  \ Saga。\n\n**总结**\n虽然第 13 章和第 14 章详细介绍了事务，但本章专门在微服务的上下文中介绍了事务。您学习了 Saga，以及如何通过将给定事务分组为一系列子事务和相应的补偿事务来利用分布式\
  \ Saga。Saga 中的所有事务要么全部成功完成，要么在发生故障时回滚补偿事务。您还看到了如何使用 Axon 2 框架实现 Saga 的完整工作代码。在了解了事务之后，接下来您将在第\
  \ 16 章中重新审视高可用性和可扩展性，重点放在 CQRS 设计上。\n\n**脚注**\n\n16. **高级高可用性与可扩展性**\n\n在第 9 章中，您了解了软件架构中影响高可用性（HA）的各种要素，其中大部分要素既适用于微服务架构，也适用于单体架构。在那里，您了解了私有云或本地部署基础设施的各种组件，并简要了解了\
  \ HA 的各个方面。在本章中，您将深入探讨对设计基于 CQRS 的系统有重大影响的特定关注点。为了使内容简单易懂并与您已知或正在使用的概念相关联，我将在大多数人都熟悉的\
  \ Oracle 数据库的上下文中审视这些关注点。一旦您理解了这些概念，就很容易将这些知识扩展到任何其他供应商的解决方案或其他免费开源解决方案。有趣的是，您将在\
  \ Oracle 的上下文中审视许多这些概念，以确保仅在绝对必要时才利用此类解决方案，这再次引出了一个核心观点：在许多情况下，存在替代且可能更便宜的解决方案。\n\
  \n您将在本章中探讨以下内容：\n\n*   用于解决日益增长的可扩展性需求的架构模板\n*   使用 Axon 2 CQRS 演示 HA 和可扩展性设计的代码示例\n\
  *   读取可扩展性与写入可扩展性\n*   允许实体并发修改的技术\n*   使用 Axon 2 CQRS 演示实体并发修改的代码示例\n\n\n\n以 Oracle\
  \ 数据库为参考的高可用性与可扩展性模板\n\n如前所述，您将使用 Oracle 数据库作为解决方案来阐释各种高可用性（HA）模板。在此过程中，您还将使用公有云，即您案例中的亚马逊云服务（AWS），作为部署环境。这是因为，您很快就会发现，这些模板存在一些注意事项，我将在涉及公有云时进行说明。您将把应用架构视为一个生命周期，该周期的每个阶段都代表着从初始到架构成熟并实现规模经济与效率运营，再到需要以指数级或无限级进行网络规模扩展的各个成长阶段。\n\
  \n简单初始架构\n\n这是任何分布式或微服务架构的最简单形式，仅适用于为个人使用或小型初创企业提供应用服务。其基本形式由一个提供应用服务的中间层组成，该中间层连接到一个单一的、简单的数据库实例以提供持久化服务。图\
  \ 16-1 展示了其在公有云亚马逊云服务中部署时的样貌。\n\n![../images/477630_1_En_16_Chapter/477630_1_En_16_Fig1_HTML.jpg](img/477630_1_En_16_Fig1_HTML.jpg)\n\
  \n图 16-1\n简单初始架构\n\n这里有一个中间层或微服务的单一实例，以及一个数据库服务器的单一实例。此架构的可扩展性由底层硬件容量决定，在您的案例中，这取决于所选\
  \ EC2 实例的等级。亚马逊弹性计算云（Amazon EC2）是一项在云中提供安全、可调整计算容量的 Web 服务。它与大多数 AWS 服务（如亚马逊简单存储服务（Amazon\
  \ S3）、亚马逊关系数据库服务（Amazon RDS）和亚马逊虚拟私有云（Amazon VPC））集成，为跨广泛应用程序的计算、查询处理和云存储提供基础设施解决方案。\n\
  \n随着与应用交互的用户数量增长，或者当此架构需要服务的并发事务数量增加时，横向扩展的能力完全取决于您可选择的可用 EC2 实例的容量。这是有限的，并且这种可扩展性限制是此类架构设计方法固有的。\n\
  \n关于图 16-1，有几个组件需要快速介绍，因为它们将在后续讨论中被引用：\n\n*   **虚拟私有云（VPC）**：一个逻辑隔离的虚拟网络，跨越整个 AWS\
  \ 区域，您的 EC2 实例在其中启动。VPC 主要涉及实现以下功能：\n\n    *   将您的 AWS 资源与其他账户的资源隔离\n    *   路由进出您的实例的网络流量\n\
  \    *   保护您的实例免受网络入侵和其他漏洞攻击\n\n*   **AWS 区域和可用区**：AWS 云基础设施围绕区域和可用区（AZ）构建。AWS 区域提供多个物理上分离且隔离的可用区，这些可用区通过低延迟、高吞吐量和高度冗余的网络连接。这些可用区提供了比传统单数据中心基础设施或多数据中心基础设施更高度可用、容错且可扩展的基础设施。AWS\
  \ 区域与其他 AWS 区域完全隔离。AWS 云目前在全球 18 个地理区域和一个本地区域内拥有 54 个可用区。图 16-1 中描绘了一个 AWS 区域，而可用区将在下一节相关部分中展示。\n\
  \n简单横向扩展架构\n\n上一节描述的简单初始架构是最低限度的，也是麻烦最少的。如果情况允许，您可能希望采用这种极简架构，因为它能让您省心。然而，如果您的业务在此架构下取得成功，这在某种意义上意味着您将需要一个增强型架构来实现可扩展性，因为不断增长的业务绝不可能由上述极简架构来服务。简单横向扩展架构如图\
  \ 16-2 所示。\n\n![../images/477630_1_En_16_Chapter/477630_1_En_16_Fig2_HTML.jpg](img/477630_1_En_16_Fig2_HTML.jpg)\n\
  \n图 16-2\n简单横向扩展架构\n\n\n\n这种简单的横向扩展架构其实并不简单，但与你接下来要看到的架构相比，它确实更简单，因此得名。简单的横向扩展架构利用了区域、可用区和自动扩展组。每个区域是\
  \ AWS 云中的一个独立地理区域。每个区域包含多个隔离的位置，称为可用区。\n\nAmazon EC2 提供了将实例和数据等资源部署到多个位置的能力。如果你将所有实例都托管在单个位置，一旦该位置受到严重影响，所有实例都将不可用。AWS\
  \ 区域和可用区在此处能为你提供帮助。每个区域完全独立。每个可用区也是隔离的，但同一区域内的可用区通过低延迟链路相互连接。当你启动一个 EC2 实例时，你可以选择一个可用区，或者让\
  \ AWS 为你选择。如果你将 EC2 实例分布到多个可用区，并且其中一个实例发生故障，同时你的应用程序设计得当，那么另一个可用区中的实例仍然可以处理请求。\n\
  \n自动扩展可确保你有适当数量的 EC2 实例来应对应用程序的负载。你可以创建 EC2 实例的集合，称为自动扩展组。你可以为自动扩展组指定最小实例数，自动扩展会确保你的组永远不会低于此规模。你还可以指定每个自动扩展组中的最大实例数，自动扩展会确保你的组永远不会超过此规模。当你指定所需容量时，自动扩展会确保你的组在启动时拥有这么多实例。如果你指定了扩展策略，那么自动扩展可以根据应用程序的需求动态启动或终止实例。\n\
  \n图 16-1 中的微服务实例必须进行复制以提高可扩展性。回顾图 16-2，同一个微服务的多个实例可以在一个可用区中实例化。为了应对某个可用区宕机的情况，可以在另一个可用区中实例化更多同一微服务的实例。为了处理微服务的动态扩展，你可以设计一个自动扩展组。这个自动扩展组可以跨可用区，这样你既能获得动态可扩展性，也能实现区域冗余。\n\
  \n当你的计算节点像上面那样分布时，你还需要一种机制来分配你的工作负载，而弹性负载均衡器 (ELB) 可以自动将传入的应用程序流量分配到多个目标，例如 Amazon\
  \ EC2 实例、容器和 IP 地址。ELB 可以处理单个可用区或跨多个可用区的应用程序流量的变化负载。ELB 有三种类型：\n\n*   应用程序负载均衡器：ALB\
  \ 最适合对 HTTP 和 HTTPS 流量进行负载均衡，在 OSI 第 7 层（应用层）的单个请求级别运行。\n*   网络负载均衡器：NLB 对需要极致性能的\
  \ TCP 流量进行负载均衡，在 OSI 第 4 层（传输层）的连接级别运行。\n*   传统负载均衡器：CLB 适用于在 EC2-Classic 网络中构建的应用程序。它提供跨多个\
  \ Amazon EC2 实例的基本负载均衡，并在请求级别和连接级别运行。\n\n另一个需要讨论的方面是全局分发数据的需求。这可能有多种原因。一个原因是用户群分布在全球各地，因此用户应被引导到靠近其地理位置的微服务实例，以获得低延迟。另一个原因可能是为了遵守数据隐私要求，例如\
  \ GDPR^(⁴⁰)（通用数据保护条例）。当你希望利用跨区域的微服务实例时，可以在此处利用 AWS 区域。这在图 16-2 中也以非展开形式进行了描绘。可以使用\
  \ AWS Route 53 进行区域流量路由或基于延迟的流量路由。Amazon Route 53 是一种高可用且可扩展的云域名系统 (DNS) Web 服务。Route\
  \ 53 使你可以通过多种路由类型轻松地全局管理流量，包括基于延迟的路由、地理 DNS、地理邻近路由和加权轮询——所有这些都可以与 DNS 故障转移结合使用。\n\
  \n图 16-2 中的简单横向扩展架构是对图 16-1 中简单初始架构的改进；然而，仔细观察图 16-2 会发现其他问题和限制。首先，跨区域的数据是分散的；它们不会自动同步。也许这正符合迫使你将应用程序分布到不同区域的原因，例如隐私。但是，让我们专注于一个区域内部。即使你可以设计拥有许多实例的微服务，你的后端数据存储仍然是一个单一实例，这是你的单一事实来源。这个单一的数据库实例仍然会存在前面讨论过的可扩展性问题。你需要进一步改进，这将在下一部分中看到。\n\
  \n解决数据库瓶颈的架构\n你希望对简单横向扩展架构进行的改进也需要解决数据库实例的可扩展性问题。Oracle 真正应用集群 (RAC) 是一种具有共享缓存架构的集群数据库，它克服了传统无共享和共享磁盘方法的局限性，为数据库提供了高可扩展性和高可用性。在\
  \ RAC 环境中，数据库本身在服务器池中共享，这意味着如果服务器池中的任何服务器发生故障，数据库将继续在幸存的服务器上运行，从而避免了任何单点故障。由于存在一个服务器池，集群数据库服务器的组合内存容量和处理能力也提供了高可扩展性。RAC\
  \ 是一种具有共享数据库存储的主动-主动分布式架构。共享存储在实现自动故障转移、无数据丢失、100% 数据一致性以及防止应用程序停机方面发挥着核心作用。\n\n\
  在像 AWS 这样的公有云中，存在一个问题。截至撰写本文时，Amazon Web Services 目前不支持在 Amazon EC2 或 Amazon RDS\
  \ 上原生运行 Oracle RAC。Oracle RAC 有以下基础设施要求，而这些要求在 AWS 中无法直接获得：\n\n*   集群中所有节点均可访问的共享高性能存储\n\
  *   集群中所有节点之间支持多播的网络\n*   用于不同类型流量的独立网络：客户端、集群互连和存储\n\n但好消息是，有第三方提供商提供的解决方案允许你使用\
  \ AWS 原生组件（例如 Amazon EC2、Amazon Elastic Block Store (Amazon EBS) 和 Amazon VPC）在\
  \ AWS 上运行 Oracle RAC。图 16-3 描绘了一种可能的架构方法，该方法利用 Oracle RAC 来改进简单的横向扩展架构。\n\n![../images/477630_1_En_16_Chapter/477630_1_En_16_Fig3_HTML.jpg](img/477630_1_En_16_Fig3_HTML.jpg)\n\
  \n\n\n图 16-3  \n解决数据库瓶颈的架构  \n\n参考图 16-3 所示的架构，建议采用两节点或三节点集群以提高可靠性。四节点及以上的集群也可用于实现额外的高可用性或性能提升。包含多个两节点或三节点数据库集群的四节点及以上网格基础架构集群也是可行的。集群中的节点可以位于同一个可用区，也可以跨可用区分布。\
  \  \n\n大多数 AWS 区域仅限三个可用区。图 16-3 展示了三个 RAC 节点。将仲裁节点与 RAC 节点部署在同一可用区，仍能实现大部分预期的高可用性功能。这种三节点集群能够容忍任意两个节点或任意一个可用区的故障，而不会导致数据库停机。然而，若同时丢失两个可用区，则会导致数据库停机。在采用本地\
  \ NVMe SSD^(⁴¹)而非 EBS（弹性块存储）卷的配置中，可使用高冗余 ASM^(⁴²)（自动存储管理）磁盘组来提供额外的数据保护层。此时，第三个节点将配置为配备\
  \ NVMe SSD 或 EBS 卷的存储节点，而非仲裁节点。将实例部署在不同可用区可消除节点同时故障的风险，除非发生影响区域内多个数据中心设施的罕见灾难事件。\
  \  \n\n完成此类集群搭建后，下一步是将负载分发至 RAC 集群。该架构利用了 Oracle Clusterware、ASM 和数据库内置的高可用性功能。如图\
  \ 16-3 所示，来自可用区内微服务实例的数据库调用，也可路由至跨可用区的数据库实例池。其权衡在于节点间网络延迟较高且网络带宽相对较低。是否还有进一步优化的空间？\
  \  \n\n**独立读写扩展性以提升效率**  \n\n在上一节基于 RAC 的架构中，我讨论了如何通过跨多个可用区扩展 RAC 来增加冗余。当您这样做时，还需要在架构上管理节点间较高的网络延迟和相对较低的带宽。图\
  \ 16-4 所示的架构变体提供了其中一种方案。  \n\n![../images/477630_1_En_16_Chapter/477630_1_En_16_Fig4_HTML.jpg](img/477630_1_En_16_Fig4_HTML.jpg)\
  \  \n\n图 16-4  \n提升读取扩展性的数据架构  \n\n在许多场景中，读取请求或查询的数量远超应用程序需要处理的总写入请求数。您已在第 12 章探讨了“浏览与预订比率”这一概念。图\
  \ 16-4 中的架构选项采用了主数据库节点和辅助（备用）数据库节点的概念。它利用 Oracle Data Guard 复制^(⁴³)（ODGR）和 Oracle\
  \ Active Data Guard 复制（OADGR）来实现主备节点概念。通过 Oracle Active Data Guard 实现跨多个可用区的负载分发。使用\
  \ Active Data Guard 进行复制，允许将复制的备用实例用于只读负载，从而实现负载分发。这在图 16-4 中显而易见：所有读取请求均路由至各自可用区内的备用节点。通过这种方式，主节点不会因跨可用区的微服务读取请求而负载过重。相反，所有写入请求现在均可路由至主节点。如图所示，即使来自其他可用区的写入请求也可路由至主节点。此外，如果主实例发生故障，该架构会迅速切换到同一可用区内的第二个实例，确保数据库持续可用并防止数据丢失。如果主可用区发生故障，或主可用区内的主实例和辅助实例同时故障，该架构会切换到辅助可用区内的第三个实例，从而保持数据库可用并防止数据丢失。使用\
  \ Active Data Guard 进行复制，允许第二和第三个实例同时用于只读工作负载。备用数据库是 Oracle 主生产数据库的事务一致性副本，最初由主数据库的备份副本创建。一旦创建并配置好备用数据库，Oracle\
  \ Active Data Guard 会自动通过将主数据库的重做数据传输到备用系统来维护备用数据库，并在备用系统上应用重做数据。主数据库与备用数据库之间的复制可配置为同步或异步模式。\
  \  \n\nOracle Data Guard 不支持设置只读副本，因为物理备用数据库无法在从主数据库归档事务的同时打开用于读取——它只能在托管恢复模式或只读模式下运行，无法同时处于两种模式。基于\
  \ Oracle Data Guard 构建的 Oracle Active Data Guard 是一个允许设置只读副本的选项。除前述功能外，Oracle Active\
  \ Data Guard 还允许对备用数据库进行只读访问，同时通过从主数据库归档事务来保持其数据更新。这使得您可以在备用实例上运行读取查询和报表，并从备用实例执行备份。在此类架构中，通常通过使用\
  \ EBS 快照到 Amazon S3，或使用 Oracle 恢复管理器^(⁴⁴)（RMAN）和 Oracle 安全备份云模块（OSB）来执行数据备份。  \n\
  \n**面向 Web 规模架构的分片**  \n\n\n\n成功将写入可扩展性与读取可扩展性的管理分离后，你仍不能松懈。迟早你会开始感到，分离出的读取节点，或者如果你的业务过于成功（如同当今许多企业），甚至写入节点本身也会带来限制——这往往是由于其必须处理的交易量或管理的数据量过大所致。当企业在全球范围内运营，并将其应用程序开放给全球客户使用时，情况尤其如此。许多社交网络应用和消息应用都属于此类，它们需要达到网络规模。“分而治之”是核心法则，而分片（sharding）便是其中一种方法。分片可以应用于服务层或数据层。图\
  \ 16-5 所示的架构展示了这一概念。\n\n![../images/477630_1_En_16_Chapter/477630_1_En_16_Fig5_HTML.jpg](img/477630_1_En_16_Fig5_HTML.jpg)\n\
  \n图 16-5\n提升读取可扩展性的数据架构\n\n分片架构的概念是，你将拥有许多节点，所有或部分节点也会拥有冗余数据，然后每个节点将拥有唯一的令牌（token），你利用这些令牌将整个数据划分开来，以便对数据库进行写入和读取操作。\n\
  \n参考图 16-5，我将用一个类比来说明。假设你的应用程序类似于我们今天使用的流行社交网络应用。你知道系统中有太多用户，并且有太多用户操作需要在你的应用程序中管理。如果我的两个女儿，安和莉亚，以及其他数百万用户都是该应用的用户，那么设计令牌的一个简单方法是按字母顺序，根据用户名字的首字母将用户分配到不同的节点。有专门的节点或节点集群来处理名字以\
  \ A-H 开头的用户的请求和数据，同样，另一组节点或节点集群处理名字以 I-Q 开头的用户，以此类推。其假设是，交易和数据在这些节点或节点集群之间的分布大致均衡，你只需一次性管理单个节点或单个节点集群内的可扩展性。你可以设计你的应用程序未来需要多少个这样的节点或集群，并相应地设计节点（或分区）的数量以及令牌。你也可以使用任何其他模式来设计你的分片拓扑结构；但核心理念是相同的。你可以对微服务层和数据层都进行分片，在这种情况下，你的\
  \ ELB（弹性负载均衡器）需要具备一定的智能，以便将请求路由到适当的微服务实例。\n\n**架构虽好，但我们仍需更优、更简的方案**\n\n在了解了 Oracle\
  \ 数据库作为数据库解决方案所提供的不同选项后，让我们考虑一下其他替代方案！你之前看到的所有解决方案模板都是为了解决手头的不同问题，是否使用它们是一个架构决策，需要综合考虑多方面因素，包括企业的长期技术战略。在本书中，我一直在谈论多语言（数据）架构的重要性，以及每个微服务完全管理自身数据的重要性。基于此，你也希望考虑那些能够提供类似可扩展性和可用性等级，但又不过度依赖任何特定供应商昂贵技术栈的架构。\n\
  \n微服务架构本身就是一种将系统按功能分解为多个独立部分的方法，以便你能更好地独立管理每个部分的可用性和可扩展性。然后，你可以通过分片来进一步管理数据量。无论是否使用分片，你还可以考虑将读取与写入分离，第\
  \ 12 章介绍的 CQRS（命令查询职责分离）模式非常适合这一点。正确原则的组合将帮助你实现网络规模。\n\n**Axon 中的高可用与可扩展 CQRS 示例**\n\
  \n抛开上一节中定义高可用性（HA）模板的各种供应商产品，我们将回到第 12 章介绍的 Axon CQRS。在那里，你看到了一个将不同 Axon 组件完全分布到多个\
  \ JVM 中的可运行代码。由于该示例是跨进程分布的，你实际上也可以将它们分布到多个节点上；不过，为了简单起见，我们在示例中将每个 Axon 处理器都放在单个节点上演示。在当前示例中，你将把它们分布到\
  \ Axon 组件的多个实例中，以验证如何为基于 Axon 的 CQRS 架构带来冗余，进而实现高可用性和可扩展性。\n\n**设计示例场景**\n\n你将沿用第\
  \ 12 章“分布式命令与事件处理”一节中的相同设计，因此我不再重复所有解释。你的领域中有两个实体：订单和产品。用户可以购买产品，这将创建一个新订单。当新订单创建时，产品库存将减少。仅此而已。请重新阅读该节，以了解你将在本示例中执行的业务场景架构的详细概述。\n\
  \n你将扩展第 12 章示例的部署架构，以引入冗余。你可能需要参考第 9 章中“设计微服务高可用性场景”一节，你已在那里演示了 Spring Cloud 中的高可用性概念。在当前示例中，你将遵循类似的部署拓扑结构；但是，为了将示例的整体复杂性控制在特定范围内，并专注于讨论要点——即\
  \ Axon CQRS 组件本身的高可用性和可扩展性——你将省略当前示例中的 Spring Cloud 组件，部署架构将如图 16-6 所示。\n\n![../images/477630_1_En_16_Chapter/477630_1_En_16_Fig6_HTML.jpg](img/477630_1_En_16_Fig6_HTML.jpg)\n\
  \n图 16-6\nAxon CQRS 的高可用性演示\n\n当前部署架构与第 12 章相应节中示例的主要区别在于，托管命令创建者、命令处理器、事件创建者和事件处理器的微服务被实例化了多次。因此，部署生态系统具有以下特征：\n\
  \n*   存在不止一种类型的事件处理器对同一类事件感兴趣。\n\n\n\n*   同一类命令处理器和事件处理器存在多个实例。\n\n在图 16-6 中，由于\
  \ Web 应用只有一个实例，因此你没有通过 Nginx 将请求路由到该 Web 应用，但这并不妨碍你实例化更多 Web 应用并通过 Nginx 进行反向代理请求。其目的是单独验证\
  \ Axon 组件的高可用性，因此你特意没有复制 Web 应用，再次是为了控制演示的复杂度。然而，负责通过拦截 HTTP 请求来创建命令的 REST 控制器微服务被实例化了两次，并且请求通过\
  \ Nginx 反向代理进行路由。这将有助于将来自 Web 浏览器的请求交替路由到这两个 REST 控制器微服务实例。通过这样做，你让两个实例都参与创建命令，并将它们分发到分布式命令总线，该总线将通过\
  \ JGroups 连接器进一步传播到应用程序。尽管图 16-6 中显示的所有其他微服务也通过嵌入式 HTTP 连接器监听 HTTP 流量，但它们与应用程序其他组件的通信是通过\
  \ JGroups 或 RabbitMQ 通道进行的，涉及创建和消费命令以及事件。\n\n**编写示例场景**\n\n演示简单 Axon 示例所需的完整代码位于文件夹\
