  src\\main\\java\\com\\acme\\ecom\\EcomAppConfiguration.java)\n```\n\n将此代码与第 12 章清单\
  \ [12-3](https://doi.org/10.1007/978-1-4842-4501-9_12_Fig#PC3) 中的 `EcomAppConfiguration.java`\
  \ 代码进行比较。您会发现第 12 章中的所有显式配置都已消失；然而，在当前示例中，您从基于 Axon 的架构中获得了相同的效用。\n\n代码库中的下一个主要更改是针对\
  \ `OrderCommandHandler` 的；请参见清单 19-3。\n\n```\n@Component\npublic class OrderCommandHandler\
  \ {\n@Autowired\n@Qualifier(\"orderRepository\")\nprivate Repository orderRepository;\n\
  @Autowired\n@Qualifier(\"productRepository\")\nprivate Repository productRepository;\n\
  @CommandHandler\npublic void handle(NewOrderCommand newOrderCommand) throws Exception{\n\
  Aggregate  productAggregate =\nproductRepository.load(newOrderCommand.getProductId().toString());\n\
  Product product =  productAggregate.invoke(\n(Product p)->{p.depreciateStock(newOrderCommand.getNumber());\n\
  return p;}\n);\norderRepository.newInstance(()->new Order(new Random().nextInt(),\n\
  newOrderCommand.getPrice(), newOrderCommand.getNumber(),\nOrderStatusEnum.NEW, product));\n\
  }\n}\n清单 19-3\nOrderCommandHandler (ch19\\ch19-01\\Ax3-Commands-Events-Same-JVM\\\
  src\\main\\java\\com\\acme\\ecom\\order\\commandhandler\\OrderCommandHandler.java)\n\
  ```\n\n命令处理器检索订单领域对象，该对象是一个聚合，来自一个存储 JPA 注解聚合的通用仓库实现，并在其上执行方法以更改其状态。如果将清单 19-3 中\
  \ `OrderCommandHandler` 的代码与第 12 章清单 [12-8](https://doi.org/10.1007/978-1-4842-4501-9_12_Fig#PC8)\
  \ 中的代码进行比较，即使功能上执行的是相同操作，您也能体会到细微的差别。\n\n接下来，订单聚合包含管理订单的实际业务逻辑，因此负责维护不变条件。订单聚合的状态变化会导致领域事件的生成，如清单\
  \ 19-4 所示。领域事件和聚合共同构成了领域模型。\n\n```\nimport  static org.axonframework.commandhandling.model.AggregateLifecycle.apply;\n\
  @Entity\n@Table(name=\"ECOM_ORDER\")\npublic class Order{\nprivate static final\
  \ long serialVersionUID = 1L;\n@Id\nprivate Integer id;\n@Column(name=\"PRICE\"\
  )\nprivate Double price;\n@Column(name=\"NUMBER\")\nprivate Integer number;\n@Column(name=\"\
  ORDER_STATUS\")\n@Enumerated(EnumType.STRING)\nprivate OrderStatusEnum orderStatus;\
  \ ;\n@ManyToOne(fetch=FetchType.LAZY)\n@JoinColumn(name=\"PRODUCT_ID\")\nprivate\
  \ Product product;\npublic Order(Integer id, Double price, Integer number,\nOrderStatusEnum\
  \ orderStatus, Product product){\nsuper();\nthis.id = id;\nthis.price = price;\n\
  this.number = number;\nthis.orderStatus = orderStatus;\nthis.product = product;\n\
  apply(new OrderCreatedEvent(id, price, number,\nproduct.getDescription(), orderStatus.toString()));\n\
  }\npublic Order() {\n}\n}\n清单 19-4\n订单实体 (ch19\\ch19-01\\Ax3-Commands-Events-Same-JVM\\\
  src\\main\\java\\com\\acme\\ecom\\order\\model\\Order.java)\n```\n\n将清单 19-4 中订单聚合的代码与第\
  \ 12 章清单 [12-4](https://doi.org/10.1007/978-1-4842-4501-9_12_Fig#PC4) 中的代码进行比较。Axon\
  \ 2 要求订单和产品聚合都继承 `AbstractAggregateRoot`，这是 `AggregateRoot` 接口的一个非常基础的实现，而在 Axon\
  \ 3 中，您的聚合不需要继承该基类。`AggregateRoot` 必须声明一个包含聚合标识符的字段。该标识符最晚必须在发布第一个事件时初始化，并且该标识符字段必须使用\
  \ `@AggregateIdentifier` 注解进行标注。但是，如果您使用 JPA 并且在聚合上使用了 JPA 注解，Axon 也可以使用 JPA 提供的\
  \ `@Id` 注解。\n聚合使用 `AggregateLifecycle.apply()` 方法来注册要发布的事件。应用事件意味着它们会立即被应用（发布）到聚合，并计划发布给其他事件处理器。\n\
  所有其他类中的代码与第 12 章“同一 JVM 中的命令和事件处理”部分下的“编写示例场景代码”小节中列出的代码保持一致，因此此处不再重复。\n\n构建并测试示例场景\n\
  演示简单 Axon 示例所需的完整代码位于 `ch19\\ch19-01` 中。要构建并运行此示例，请参考第 12 章“同一 JVM 中的命令和事件处理”部分中“构建并测试示例场景”小节提供的说明。\n\
  \n过程中唯一的区别在于从清理表开始的步骤。在当前示例中，您希望删除您示例中所需名称的任何表，可能多达七个：\n\n```\ndrop table association_value_entry;\n\
  drop table domain_event_entry;\ndrop table ecom_order;\ndrop table ecom_product;\n\
  drop table saga_entry;\ndrop table snapshot_event_entry;\ndrop table token_entry;\n\
  drop table ecom_order_view;\ndrop table ecom_product_view;\n```\n\n在第 12 章的相应示例中，您只删除了四个表，区别到此为止。对于示例构建和运行的其余部分，只需遵循第\
  \ 12 章的说明即可。\n\n使用 Axon 进行分布式命令和事件处理\n\n在这里，您将再次重构第 12 章“分布式命令和事件处理”部分中的相同设计，使其适用于\
  \ Axon 3。\n不过，我将引入一个小改动，用 Spring Cloud 替换 JGroups 连接器。\n\n\n\n使用 Spring Cloud 设计分布式命令总线\n\
  如前所述，请参考第 [12](https://doi.org/10.1007/978-1-4842-4501-9_12Fig#4) 章中图 [12-4](https://doi.org/10.1007/978-1-4842-4501-9_12Fig#4)\
  \ 所示的设计。您应该已经熟悉了其中的分布式命令总线。与其他命令总线实现不同，分布式命令总线根本不会调用任何处理器。它所做的只是在不同 JVM 上的命令总线实现之间形成一个“桥梁”。\n\
  \n分布式命令总线由两个组件组成：一个命令总线连接器和一个命令路由器。命令总线连接器实现了微服务各个 JVM 之间的通信协议，而命令路由器则为每个传入的命令选择一个目标。路由器根据由路由策略计算出的路由键，决定命令应被路由到分布式命令总线的哪个段。这确保了只要运行时段的数目和配置没有变化，具有相同路由键的两个命令将始终被路由到同一个段。\n\
  \n在第 [12](https://doi.org/10.1007/978-1-4842-4501-9_12Fig#4) 章的设计中，您使用了 `JGroupsConnector`，它使用\
  \ JGroups 作为底层的发现和调度机制。分布式命令总线中与 JGroups 相关的组件位于 `axon-distributed-commandbus-jgroups`\
  \ 模块中。由于 JGroups 既处理微服务节点的发现，也处理它们之间的通信，因此 `JGroupsConnector` 同时充当了命令总线连接器和命令路由器。还有另一种使用\
  \ Spring Cloud 实现命令总线之间互连和路由的方法。您可以为此使用 Eureka 或 Consul。由于您已经从第 [8](https://doi.org/10.1007/978-1-4842-4501-9_12Fig#4)\
  \ 章的“Eureka，服务注册中心”一节了解了 Eureka 的工作原理，您将在重构后的 Axon 3 设计中使用它。\n\n当您使用 Spring Cloud\
  \ 时，Spring Cloud 命令路由器会利用 Spring Cloud 特有的 `ServiceInstance.Metadata` 字段来推断并告知系统中所有微服务节点其消息路由信息。因此，为了与\
  \ Axon 结合使用，所选的 Spring Cloud 实现应支持 `ServiceInstance.Metadata` 字段的使用。如果所需的 Spring\
  \ Cloud 实现不支持修改 `ServiceInstance.Metadata`（例如 Consul），还有其他替代方法，此处不再赘述。\n\n使用 Spring\
  \ Cloud Eureka 最简单的方法是使用 Axon 分布式命令总线模块的 Spring Cloud 启动器。一旦包含了启动器，只需在应用程序上下文中添加一个属性即可启用分布式命令总线：\n\
  \n```\naxon.distributed.enabled=true\n```\n\n下一个独立于连接器类型使用的设置是：\n\n```\naxon.distributed.load-factor=100\n\
  ```\n\n通过这样做，当应用程序上下文中同时存在命令路由器和命令总线连接器时，Axon 将默认配置一个分布式命令总线。Spring Cloud 连接器设置是\
  \ Spring Cloud 命令路由器和 Spring HTTP 命令总线连接器的组合；它们分别充当分布式命令总线的命令路由器和命令总线连接器。Spring\
  \ Cloud 命令路由器使用 Spring Cloud 的 Discovery Clients 来传播其命令消息路由信息，并发现其他 Axon 微服务节点并检索它们的消息路由信息。它通过利用\
  \ `ServiceInstance.Metadata` 来存储消息路由信息来实现这一点。出于性能原因，任何通过 Discovery Client 系统发现的、不包含任何所需消息路由信息字段的其他节点将被列入黑名单，从而避免对该节点执行不必要的额外检查。\n\
  \nSpring HTTP 命令总线连接器会将给定的命令发送到被分配处理具有给定路由键消息的节点。发送方不期望收到回复，因此如果 `send` 方法抛出异常，则可以保证命令的目标节点未收到该命令。如果方法正常返回，则连接器的具体实现定义了交付保证。由于连接器基于给定的路由键路由命令，使用相同的路由键将导致命令被发送到同一个成员。此外，每条消息必须恰好发送给一个成员。\n\
  \n在使用 Spring Cloud 命令路由器时，您需要处理的另一个方面是，您的 Spring 应用程序应启用心跳事件。Spring Cloud 命令路由器实现利用您的\
  \ Spring Cloud 微服务发布的心跳事件来检查其对所有其他节点的了解是否是最新的。因此，如果禁用了心跳事件，集群内的微服务将无法感知整个设置，从而给正确的命令路由带来问题。\n\
  \n因此，图 [12-5](https://doi.org/10.1007/978-1-4842-4501-9_12Fig#5) 变成了图 [19-1](https://doi.org/10.1007/978-1-4842-4501-9_12Fig#5)。\n\
  \n![../images/477630_1_En_19_Chapter/477630_1_En_19_Fig1_HTML.jpg](img/477630_1_En_19_Fig1_HTML.jpg)\n\
  \n图 19-1.\n使用 Spring Cloud 的分布式命令总线\n\n接下来您将查看代码。我将指出任何细微的差别。\n\n编写示例场景的代码\n演示分布式\
