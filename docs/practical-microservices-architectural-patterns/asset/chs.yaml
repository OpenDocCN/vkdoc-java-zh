  然后，你附加处理组以使其能够处理正确的事件，如代码清单 19-10 所示。\n\n```\n@Component\n@ProcessingGroup(\"ECOM_EVENT_PROCESSOR\"\
  )\npublic class OrderEventHandler {\n@EventHandler\npublic void handleOrderCreatedEvent(OrderCreatedEvent\
  \ event) {\n//代码写在这里\n}\n}\n代码清单 19-10\n订单事件处理器 (ch19\\ch19-02\\Ax3-Commands-Multi-Event-Handler-Distributed\\\
