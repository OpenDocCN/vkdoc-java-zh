  \ 找到。由于你使用了 `--initialize` 进行“默认安全”安装（即包括生成随机初始 root 密码），该密码被标记为已过期，你需要选择一个新密码。但是，你可能需要记下上述密码，以便能够使用客户端连接到服务器，然后选择新密码。\n\
  \n**启动 MySQL 服务器**\n\n要启动服务器，请输入以下命令：\n\n\n\n```\nD:\\Applns\\MySQL\\mysql-8.0.14-winx64\\\
  bin>mysqld --console\n2019-01-22T13:34:14.562420Z 0 [System] [MY-010116] [Server]\
  \ D:\\Applns\\MySQL\\mysql-8.0.14-winx64\\bin\\mysqld.exe (mysqld 8.0.14) starting\
