  \n现在你可以测试应用程序了。你可以使用任何你喜欢的 REST 客户端。你可以使用 cURL 工具快速对服务器执行命令。请参考附录 D 了解如何使用 cURL\
  \ 执行命令的概述。现在你可以查看服务器提供了什么；参见清单 7-7。\n\n```\n$ curl http://localhost:8080\n{\n\"\
  _links\": {\n\"categories\": {\n\"href\": \"http://localhost:8080/categories{?page,size,sort}\"\
  ,\n\"templated\": true\n},\n\"products\": {\n\"href\": \"http://localhost:8080/products{?page,size,sort}\"\
  ,\n\"templated\": true\n},\n\"profile\": {\n\"href\": \"http://localhost:8080/profile\"\
  \n}\n}\n}\n清单 7-7\n使用 cURL 的 GET HTTP 请求\n```\n\n请参考附录 D 查看更全面的 cURL 命令集，这些命令在本书的其余部分会非常有用。图\
  \ 7-3 展示了如何在基于 Unix 的环境中使用 cURL 调用基本的 REST 操作。\n\n![../images/477630_1_En_7_Chapter/477630_1_En_7_Fig3_HTML.jpg](img/477630_1_En_7_Fig3_HTML.jpg)\n\
  \n图 7-3\n使用 cURL 的 GET HTTP 请求\n\n清单 7-7 显示了一个位于 `http://localhost:8080/products`\
  \ 的 products 链接。它有几个选项，例如 `?page`、`?size` 和 `?sort`。还有其他链接，你可以检索并理解它们。\n\nSpring\
