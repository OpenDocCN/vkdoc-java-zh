  C:\\Windows\\System32>\n清单 F-2\n验证 ActiveMQ 监听端口\n```\n\n在 Unix 命令 shell 中，输入\n\n\
  ```\nnetstat -nl|grep 61616\n```\n\n查看 ActiveMQ 管理控制台\n现在，你可以使用你喜欢的网络浏览器连接到上述已启动的\
  \ ActiveMQ 服务器：\n`http://127.0.0.1:8161/admin/`\n\n你可以使用以下默认凭据登录管理控制台：\n\n```\n\
  用户名: admin\n密码: admin\n```\n\n参见图 F-1。\n\n![../images/477630_1_En_25_Chapter/477630_1_En_25_Fig1_HTML.jpg](img/477630_1_En_25_Fig1_HTML.jpg)\n\
  \n图 F-1\nActiveMQ 管理控制台\n\n配置 ActiveMQ\nActiveMQ 安装包含一个名为 `activemq.xml` 的文件，可用于配置\
  \ ActiveMQ 服务器。该文件通常位于 `D:\\Applns\\apache\\ActiveMQ\\apache-activemq-5.13.3\\conf`。\n\
  \n在 ActiveMQ 中，无需显式设置/配置你将在应用程序中使用的队列。当你尝试从任何队列或主题发布或订阅时，相应的队列或主题将在运行时自动静默创建。但是，如果出于任何原因你想预先指定队列和主题，可以在配置文件中进行。例如，当你希望将目标放入\
