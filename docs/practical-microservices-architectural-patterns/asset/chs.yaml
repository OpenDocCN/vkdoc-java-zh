  Ecom-gateway\\src\\main\\java\\com\\acme\\ecom\\gateway\\zuul\\auth\\filter\\AuthenticationPreFilter.java)\n\
  ```\n\n在 Zuul 前置过滤器中，可能存在三种主要场景：\n\n*   如果请求是用于身份验证，Zuul 前置过滤器会添加一个头部来表示基本认证。在此过程中，它还会将\
  \ `client_id` 和 `client_secret` 一同添加到头部。请注意，`client_secret` 是只有 Zuul API 网关知道的参数，因为\
  \ Zuul API 网关就是 OAuth 客户端。\n\n*   如果请求不是用于身份验证，则可能存在两种情况。第一种情况是用户尚未登录。在这种情况下，Zuul\
  \ 前置过滤器将不执行任何操作。\n\n*   请求不是用于身份验证的第二种情况是用户已经通过身份验证。在这种情况下，Zuul 前置过滤器假定请求头中存在一个引用令牌，并使用该令牌在其本地\
  \ EHCache 中查找实际的 JWT。目前，可以假设每当 API 网关首次收到用户会话的 JWT 时，它会先将其缓存到 EHCache 中，并与一个引用令牌关联，而返回给用户的正是这个引用令牌。检索到的\
  \ JWT 随后会被添加到请求头中，以实现 Bearer 授权。\n\nZuul 后置过滤器在 Zuul 从实际资源服务器接收到响应后被调用。清单 18-9 展示了你的\
