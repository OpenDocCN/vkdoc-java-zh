  \ 集群\n当整个集群宕机时，最后一个关闭的节点必须成为第一个启动的节点。如果未能如此操作，节点将等待 30 秒，等待最后一个磁盘节点重新上线，之后便会失败。你可以参考\
  \ RabbitMQ 在线文档以获取更多详细信息。\n\n要重启集群中的某个节点（rabbit2），你可以使用之前见过的名为 `rabbitmq-cluster2.bat`\
  \ 的脚本。要重启 rabbit1，请使用 `rabbitmq-cluster1.bat`：\n\n```\nD:\\Applns\\RabbitMQ\\rabbitmq_server-3.6.3\\\
  sbin\\rabbitmq-cluster1.bat\ncall rabbitmqctl -n rabbit1 stop_app\ncall rabbitmqctl\
  \ -n rabbit1 join_cluster rabbit2@tiger\ncall rabbitmqctl -n rabbit1 start_app\n\
  call rabbitmqctl -n rabbit2 set_policy ha-all \"^.∗\" \"{\"\"ha-mode\"\":\"\"all\"\
  \"}\"\n```\n\n如果在启动和重启集群时搞乱了配置，你可能需要前往 RabbitMQ 的数据文件夹，删除所有内容，然后按照正确的顺序重新尝试启动和重启实例及集群。\n\
  \n从客户端连接到 RabbitMQ 集群\n\n客户端可以连接到集群内的任意单个节点。如果该节点发生故障而集群其余部分幸免于难，那么客户端应注意到连接已关闭，并应显式地重新连接到集群中某个幸存的成员。我不建议将主机名或\
  \ IP 地址硬编码到客户端应用程序中，因为这是一种不灵活的方法。相反，推荐的方法是采用以下任何一种抽象方式：\n\n*   使用一个 TTL 配置非常短的动态\
  \ DNS 服务。\n\n*   使用一个普通的 TCP 负载均衡器。\n\n*   使用某种通过 pacemaker 或类似技术实现的移动 IP。\n\n请参考附录\
  \ C，其中我解释了如何使用 Nginx 设置 TCP 负载均衡器。如果你在 RabbitMQ 集群和客户端程序之间使用了这样的 TCP 负载均衡器，那么当集群中某个节点发生故障而集群其余部分幸免于难时，客户端无需注意到连接已关闭，并且会被隐式地路由到集群中任何幸存的成员。\n\
  \n总结\nRabbitMQ 是一个可靠且持久的消息队列服务器，可以在集群中配置为具有多个节点的高可用性模式。我在本书的许多代码演示中都使用了 RabbitMQ。在某些代码演示中，我仅将\
  \ RabbitMQ 用作单节点服务器；然而，在所有这些场景中，RabbitMQ 都可以配置在集群中，以测试示例。\n\n安装、配置和运行 Nginx 反向代理\n\
  \nNginx 是一个 HTTP 和反向代理服务器，它也可以充当邮件代理服务器或通用的 TCP/UDP 代理服务器。基本的 HTTP 服务器功能包括提供静态文件和索引文件。Nginx\
  \ 还支持 keep-alive 和流水线连接。TCP/UDP 代理服务器功能包括 TCP 和 UDP 的通用代理，以及负载均衡和容错。请访问 [`https://nginx.org`](https://nginx.org)\
  \ 获取更多信息。\n\n我在本附录中涵盖以下内容：\n\n*   如何安装并开始使用 Nginx\n\n*   如何将 Nginx 设置为 HTTP 反向代理\n\
  \n*   如何将 Nginx 设置为 TCP 反向代理\n\n安装 Nginx\n在本节中，你将下载、安装和配置 Nginx，并测试安装。Nginx 可在 [`https://nginx.org/en/download.html`](https://nginx.org/en/download.html)\
  \ 下载。\n\n先将安装归档文件保存到硬盘上的合适位置，然后将归档文件解压到你选择的位置。尽管你可以选择任何位置，例如\n\n```\nC:\\Program\
  \ Files\\nginx\\\n```\n\n但我明确避免使用路径中包含空格的位置，例如 `Program Files` 中的空格。因此，在我的 Windows\
  \ 机器上，我使用以下位置：\n\n```\nD:\\Applns\\nginx\\nginx-1.10.1\n```\n\n开始使用 Nginx\n\n你现在可以使用以下命令启动\
  \ Nginx 服务器，如图 C-1 所示：\n\n![../images/477630_1_En_22_Chapter/477630_1_En_22_Fig1_HTML.jpg](img/477630_1_En_22_Fig1_HTML.jpg)\n\
  \n图 C-1. 启动 Nginx 服务器\n\n```\nD:\\Applns\\nginx\\nginx-1.10.1>nginx\n```\n\n一旦 Nginx\
  \ 启动，可以通过使用 `-s` 参数调用可执行文件来控制它，例如\n\n```\nnginx -s flag\n```\n\n其中 `flag` 可以是以下之一：\n\
  \n*   Stop：强制关闭\n\n*   Quit：优雅关闭\n\n*   Reload：重新加载配置文件\n\n*   Reopen：重新打开日志文件\n\
  \n开始将 Nginx 用作反向代理\nNginx 经常被用来设置为反向代理服务器。当设置为反向代理服务器时，Nginx 接收请求，将其传递给被代理的服务器，从被代理的服务器检索响应，并将其发送回客户端。\n\
  Nginx 中的配置在位于 `conf` 路径下的 `nginx.conf` 文件中生效。\n\n配置 HTTP 反向代理\n\n可以在 Nginx 中设置 HTTP\
  \ 反向代理，以代理使用 HTTP 协议的请求。用于设置 HTTP 代理的 `nginx.conf` 中的相关部分如清单 C-1 所示。\n\n```\nhttp\
  \ {\nupstream myapp1 {\nserver localhost:8081;\nserver localhost:8082;\n}\nserver\
  \ {\nlisten       8080;\nserver_name  localhost;\nlocation / {\nproxy_pass http://myapp1;\n\
  }\n}\n清单 C-1\nNginx HTTP 反向代理配置\n```\n\n现在，类似于 URL 模式 `http://localhost:8080` 的\
  \ HTTP 请求将以负载均衡的方式被代理到以下两个 URL：\n\n```\nhttp://localhost:8081\nhttp://localhost:80802\n\
  ```\n\n配置 TCP 反向代理\n\n可以在 Nginx 中设置 TCP 反向代理，以代理使用 TCP 协议的请求。用于设置 TCP 代理的 `nginx.conf`\
  \ 中的相关部分如清单 C-2 所示。\n\n```\nstream {\nupstream myapp1 {\nserver localhost:5672;\n\
  server localhost:5673;\n}\nserver {\nlisten     5671;\nproxy_pass myapp1;\n}\n}\n\
  清单 C-2\nNginx TCP 反向代理配置\n```\n\n总结\nNginx 的反向代理设置在将外部请求负载均衡到微服务时非常有用。因此，我在本书中使用\
  \ Nginx 来演示许多场景。\n\ncURL 和 Postman\n\ncURL 是一个使用 URL 语法获取或发送文件的命令行工具。cURL 支持一系列常见的互联网协议，如\
  \ HTTP、HTTPS、FTP、FTPS、SCP、SFTP、TFTP 和 LDAP，其中 HTTP 是我们在本书中讨论的重点。\nPostman 是一个基于\
  \ UI 的应用程序，可以更轻松地执行所有 HTTP 操作。我也会介绍这个应用程序。\n第 7 章中的“使用 Spring Boot 和 MongoDB 执行数据操作”一节介绍了一个示例\
  \ Spring Boot 应用程序。你在那里使用了 Spring Data REST 来自动创建 MongoDB 仓库接口的实现。然后 Spring Boot\
  \ 指示 Spring MVC 在 `/products` 和 `/categories` 处创建 RESTful 端点。我将假设此示例已构建并正在运行，以便你可以使用此示例执行\
  \ cURL 和 Postman 的基本操作。\n\n我将在本附录中涵盖以下内容：\n\n*   如何将 cURL 用于 HTTP 操作\n\n*   如何将\
  \ Postman 用于 HTTP 操作\n\n用于 HTTP 的 cURL 操作\n\n基本的 cURL 操作涉及在命令行输入 `curl`，后跟要检索的输出的\
  \ URL。例如，要检索 `microservices.io` 主页，请输入\n\n```\ncurl www.microservices.io\n```\n\n\
  cURL 默认将其从 URL 检索到的输出显示到系统指定的标准输出，通常是终端窗口（在 Mac 上）。因此，在大多数系统上，运行上述命令将在终端窗口中显示 [`www.microservices.io`](http://www.microservices.io)\
  \ 的源代码网页。\n\nHTTP GET 检索实体\n\n你可以使用 cURL 通过发出清单 D-1 所示的命令来初步了解服务器 API 端点提供的内容。\n\
  \n\n```markdown\n```\nbinils-MacBook-Pro:~ mike$ curl http://localhost:8080\n{\n\
  \"_links\": {\n\"categories\": {\n\"href\": \"http://localhost:8080/categories{?page,size,sort}\"\
  ,\n\"templated\": true\n},\n\"products\": {\n\"href\": \"http://localhost:8080/products{?page,size,sort}\"\
  ,\n\"templated\": true\n},\n\"profile\": {\n\"href\": \"http://localhost:8080/profile\"\
  \n}\n}\n}\n清单 D-1\n使用 cURL 进行 HTTP GET 请求\n```\n\n响应表明存在一个位于 `http://localhost:8080/products`\
  \ 的 products 链接。\n它包含一些选项，例如 `?page`、`?size` 和 `?sort`。你可以检查\n其他 URL，例如\n\n```\n\
  binils-MacBook-Pro:~ mike$ curl http://localhost:8080/ profile\nbinils-MacBook-Pro:~\
  \ mike$ curl http://localhost:8080/products/search\n```\n\n如果后端数据库中有相应的数据可用，你\n\
  还可以执行类似的自定义查询\n\n```\nbinils-MacBook-Pro:~ mike$ curl http://localhost:8080/products/search/findByProductCategoryName?productCategory=Mobile\n\
  ```\n\nHTTP POST 创建实体\n\n现在你可以创建一些产品实例，如清单 D-2 所示。\n\n```\nbinils-MacBook-Pro:~\
  \ mike$ curl -i -X POST -H \"Content-Type:application/json\" -d '{\"name\":\"Giomi\"\
  , \"code\":\"GIOME-KL\", \"title\":\"Giome 10 inch gold\", \"imgUrl\":\"giome.jpg\"\
  , \"price\":11000.0, \"productCategoryName\":\"Mobile\"}' http://localhost:8080/products\n\
  HTTP/1.1 201\nLocation: http://localhost:8080/products/595ce0f073ed92061ca85665\n\
  Content-Type: application/hal+json;charset=UTF-8\nTransfer-Encoding: chunked\nDate:\
  \ Wed, 05 Jul 2017 12:52:00 GMT\n{\n\"name\" : \"Giomi\",\n\"code\" : \"GIOME-KL\"\
  ,\n\"title\" : \"Giome 10 inch gold\",\n\"description\" : null,\n\"imgUrl\" : \"\
  giome.jpg\",\n\"price\" : 11000.0,\n\"productCategoryName\" : \"Mobile\",\n\"_links\"\
  \ : {\n\"self\" : {\n\"href\" : \"http://localhost:8080/products/595ce0f073ed92061ca85665\"\
  \n},\n\"product\" : {\n\"href\" : \"http://localhost:8080/products/595ce0f073ed92061ca85665\"\
  \n}\n}\n}\n清单 D-2\n使用 cURL 进行 HTTP POST 请求\n```\n\n这里\n\n*   `-i`\n    指示你需要查看包含响应头的响应消息。新创建的人的\
  \ URI 也会显示出来。\n\n*   `-X POST`\n    表示这是一个用于创建新条目的 POST 请求。\n\n*   `-H \"Content-Type:application/json\"\
  ` 指明了内容类型，因此\n    应用程序期望请求体包含一个 JSON 对象。\n\n*   `-d '{\"name\":\"Giomi\", \"code\"\
  :\"GIOME-KL\", \"title\":\"Giome 10 inch gold\", \"imgUrl\":\"giome.jpg\", \"price\"\
  :11000.0, \"productCategoryName\":\"Mobile\"}'` 是正在发送的数据，此处为 JSON\n    格式。\n\n如果你在跨平台（从\
  \ Windows 到 Linux 或 Mac 等）复制这些命令时遇到问题，你可能需要直接在终端窗口中仔细手动输入它们。另请注意，实体 ID `595c937473ed9208488808b5`\
  \ 是由系统自动创建并返回的。使用这个相同的 ID，你现在可以使用 `curl` 命令来检索上述新创建的实体，如清单 D-3 所示。\n\n```\nbinils-MacBook-Pro:~\
  \ mike$ curl http://localhost:8080/products/595ce0f073ed92061ca85665\n{\n\"name\"\
  \ : \"Giomi\",\n\"code\" : \"GIOME-KL\",\n\"title\" : \"Giome 10 inch gold\",\n\"\
  description\" : null,\n\"imgUrl\" : \"giome.jpg\",\n\"price\" : 11000.0,\n\"productCategoryName\"\
  \ : \"Mobile\",\n\"_links\" : {\n\"self\" : {\n\"href\" : \"http://localhost:8080/products/595ce0f073ed92061ca85665\"\
  \n},\n\"product\" : {\n\"href\" : \"http://localhost:8080/products/595ce0f073ed92061ca85665\"\
  \n}\n}\n}\n清单 D-3\n使用 cURL 查看 HTTP POST 的效果\n```\n\nHTTP PUT 替换实体\n如果你想替换整个组，请使用\
  \ HTTP PUT。服务器可能会选择创建一个新组并丢弃旧组，因此 ID 可能保持不变。但客户端应根据服务器的响应假设他得到了一个全新的项目。\n\n对于 PUT\
  \ 请求，客户端应始终发送整个资源，包含创建新项目所需的所有数据，如清单 D-4 所示。\n\n```\nbinils-MacBook-Pro:~ mike$\
  \ curl -i -X PUT -H \"Content-Type:application/json\" -d '{\"name\":\"Giomi-New\"\
  , \"code\":\"GIOME-KL-NEW\", \"title\":\"Giome New 10 inch gold\", \"imgUrl\":\"\
  giomenew.jpg\", \"price\":15000.0, \"productCategoryName\":\"Mobile\"}' http://localhost:8080/products/595ce0f073ed92061ca85665\n\
  HTTP/1.1 200\nLocation: http://localhost:8080/products/595ce0f073ed92061ca85665\n\
  Content-Type: application/hal+json;charset=UTF-8\nTransfer-Encoding: chunked\nDate:\
  \ Wed, 05 Jul 2017 12:53:27 GMT\n{\n\"name\" : \"Giomi-New\",\n\"code\" : \"GIOME-KL-NEW\"\
  ,\n\"title\" : \"Giome New 10 inch gold\",\n\"description\" : null,\n\"imgUrl\"\
  \ : \"giomenew.jpg\",\n\"price\" : 15000.0,\n\"productCategoryName\" : \"Mobile\"\
  ,\n\"_links\" : {\n\"self\" : {\n\"href\" : \"http://localhost:8080/products/595ce0f073ed92061ca85665\"\
  \n},\n\"product\" : {\n\"href\" : \"http://localhost:8080/products/595ce0f073ed92061ca85665\"\
  \n}\n}\n}\n清单 D-4\n使用 cURL 进行 HTTP PUT 请求\n```\n\n你可以通过清单 D-5 中的代码查询并查看你刚才所做的更改。\n\
  \n```\nbinils-MacBook-Pro:~ mike$ curl http://localhost:8080/products\n{\n\"_embedded\"\
  \ : {\n\"products\" : [ {\n\"name\" : \"Giomi-New\",\n\"code\" : \"GIOME-KL-NEW\"\
  ,\n\"title\" : \"Giome New 10 inch gold\",\n\"description\" : null,\n\"imgUrl\"\
  \ : \"giomenew.jpg\",\n\"price\" : 15000.0,\n\"productCategoryName\" : \"Mobile\"\
  ,\n\"_links\" : {\n\"self\" : {\n\"href\" : \"http://localhost:8080/products/595ce0f073ed92061ca85665\"\
  \n},\n\"product\" : {\n\"href\" : \"http://localhost:8080/products/595ce0f073ed92061ca85665\"\
  \n}\n}\n} ]\n},\n\"_links\" : {\n\"self\" : {\n\"href\" : \"http://localhost:8080/products{?page,size,sort}\"\
  ,\n\"templated\" : true\n},\n\"profile\" : {\n\"href\" : \"http://localhost:8080/profile/products\"\
  \n},\n\"search\" : {\n\"href\" : \"http://localhost:8080/products/search\"\n}\n\
  },\n\"page\" : {\n\"size\" : 20,\n\"totalElements\" : 1,\n\"totalPages\" : 1,\n\"\
  number\" : 0\n}\n}\n清单 D-5\n使用 cURL 查看 HTTP PUT 的效果\n```\n\nHTTP PATCH 修改实体\n\n\
  如果你想更新一个属性，比如 `status`（一个可以设置的组属性），请使用 PATCH。像 `status` 这样的属性通常适合限制在白名单值中，但在清单 D-6\
  \ 中，你对 `price` 属性使用了 PATCH。\n\n```\nbinils-MacBook-Pro:~ mike$ curl -i -X PATCH\
  \ -H \"Content-Type:application/json\" -d '{\"price\":15000.50}' http://localhost:8080/products/595ce0f073ed92061ca85665\n\
  HTTP/1.1 200\nContent-Type: application/hal+json;charset=UTF-8\nTransfer-Encoding:\
  \ chunked\nDate: Wed, 05 Jul 2017 12:54:49 GMT\n{\n\"name\" : \"Giomi-New\",\n\"\
  code\" : \"GIOME-KL-NEW\",\n\"title\" : \"Giome New 10 inch gold\",\n\"description\"\
  \ : null,\n\"imgUrl\" : \"giomenew.jpg\",\n\"price\" : 15000.5,\n\"productCategoryName\"\
  \ : \"Mobile\",\n\"_links\" : {\n\"self\" : {\n\"href\" : \"http://localhost:8080/products/595ce0f073ed92061ca85665\"\
  \n},\n\"product\" : {\n\"href\" : \"http://localhost:8080/products/595ce0f073ed92061ca85665\"\
  \n}\n}\n}\n清单 D-6\n使用 cURL 进行 HTTP PATCH 请求\n```\n\nHTTP DELETE 删除实体\n\n你可以使用 DELETE\
  \ 命令删除同一个实体，如清单 D-7 所示。\n\n```\nbinils-MacBook-Pro:~ mike$ curl -i -X DELETE http://localhost:8080/products/595ce0f073ed92061ca85665\n\
  HTTP/1.1 204\nDate: Wed, 05 Jul 2017 12:55:40 GMT\n清单 D-7\n使用 cURL 进行 HTTP DELETE\
  \ 请求\n```\n\n另一次查询将确认该实体确实已被删除！请参阅\n清单 D-8。\n\n```\nbinils-MacBook-Pro:~ mike$ curl\
  \ http://localhost:8080/products\n{\n\"_embedded\" : {\n\"products\" : [ ]\n},\n\
  \"_links\" : {\n\"self\" : {\n\"href\" : \"http://localhost:8080/products{?page,size,sort}\"\
  ,\n\"templated\" : true\n},\n\"profile\" : {\n\"href\" : \"http://localhost:8080/profile/products\"\
  \n},\n\"search\" : {\n\"href\" : \"http://localhost:8080/products/search\"\n}\n\
  },\n\"page\" : {\n\"size\" : 20,\n\"totalElements\" : 0,\n\"totalPages\" : 0,\n\"\
  number\" : 0\n}\n}\n清单 D-8\n使用 cURL 查看 HTTP PUT 的效果\n```\n```\n\n\n用于 HTTP 操作的 Postman\n\
  Postman 是一款用于与 HTTP API 交互的 Google Chrome 应用。它提供了一个友好的图形用户界面，用于构建请求和读取响应。该应用可从 [`www.getpostman.com/`](http://www.getpostman.com/)\
  \ 获取。截至撰写本文时，Postman 应用支持 Mac、Windows 和 Linux 平台。\n\n使用 Postman 执行 HTTP GET 以检索实体\n\
  安装应用后，您将需要测试所有针对它的 HTTP 操作。这里我再次参考第 7 章，其中我介绍了一个示例 Spring Boot 应用程序。我还参考了图 [7-4](https://doi.org/10.1007/978-1-4842-4501-9_7Fig#4)，该图展示了使用\
  \ Postman 对链接 `http://localhost:8080/profile/products` 执行 GET 操作的过程。\n\n总结\ncURL\
  \ 和 Postman 都是用于快速与 REST 端点交互并执行基本 HTTP 操作的优秀工具。在运行本书中的示例时，您将大量使用它们。\n\nApache TCPMon\n\
  \nApache TCPMon 是一个实用工具，允许查看和重新发送流量，尤其是 HTTP 流量消息。它作为一个调试工具非常有用，您可以借此查看客户端和服务器之间，甚至两个微服务之间通过网络传输的内容。它最初是\
  \ Axis1 的一部分，现在已独立成为一个项目。请访问 [`https://ws.apache.org/tcpmon/`](https://ws.apache.org/tcpmon/)\
  \ 获取更多信息。\n\n我在本附录中涵盖以下内容：\n\n*   如何安装和启动 TCPMon\n\n*   如何将 TCPMon 设置为代理\n\n安装 TCPMon\n\
  在本节中，您将下载、安装和配置 TCPMon，并测试安装。TCPMon 可在 [`https://ws.apache.org/tcpmon/download.cgi`](https://ws.apache.org/tcpmon/download.cgi)\
  \ 下载。\n\n首先将安装存档文件保存到硬盘上的合适位置，然后将存档解压到您选择的位置。尽管您可以选择任何位置，例如\n\n```\nC:\\Program\
  \ Files\\tcpmon\\\n```\n\n但我明确避免路径中包含空格的位置，例如 `Program Files` 中的空格。因此，在我的 Windows\
  \ 机器上，我使用以下位置：\n\n```\nD:\\Applns\\apache\\TCPMon\\tcpmon-1.0-bin\n```\n\n开始使用 TCPMon\n\
  \n您可以通过进入 TCPMon 解压文件夹的 `build` 文件夹来启动 TCPMon（如图 E-1 所示）：\n\n![../images/477630_1_En_24_Chapter/477630_1_En_24_Fig1_HTML.jpg](img/477630_1_En_24_Fig1_HTML.jpg)\n\
  \n图 E-1\n启动 TCPMon\n\n```\ncd D:\\Applns\\apache\\TCPMon\\tcpmon-1.0-bin\\build\n\
  D:\\Applns\\apache\\TCPMon\\tcpmon-1.0-bin\\build>tcpmon\n```\n\n将 TCPMon 设置为代理\n\
  TCPMon 可以充当代理。要将 TCPMon 设置为代理模式，只需从单选按钮中选择代理选项，并配置调用要代理到的目标主机和端口。\n\n或者，您可以在启动 TCPMon\
  \ 时提供配置参数。使用模式如下：\n\n```\nD:\\Applns\\apache\\TCPMon\\tcpmon-1.0-bin\\build>tcpmon\
  \ [listenPort targetHost targetPort]\n```\n\n如果您像下面这样启动，您将看到如图 E-2 所示的屏幕：\n\n![../images/477630_1_En_24_Chapter/477630_1_En_24_Fig2_HTML.jpg](img/477630_1_En_24_Fig2_HTML.jpg)\n\
  \n图 E-2.\n配置为代理的 TCPMon\n\n```\nD:\\Applns\\apache\\TCPMon\\tcpmon-1.0-bin\\build>tcpmon\
  \ 8081 127.0.0.1 8080\nD:\\Applns\\apache\\TCPMon\\tcpmon-1.0-bin\\build>java -cp\
  \ ./tcpmon-1.0.jar org.apache.ws.commons.tcpmon.TCPMon 8081 127.0.0.1 8080\n```\n\
  \n在上述情况下，所有到达运行 TCPMon 的主机上 8081 端口的请求都将被代理到主机 127.0.0.1 的 8080 端口。\n\n总结\nTCPMon\
  \ 是一个用于检查 HTTP 请求和响应的优秀工具。您可以将其安装在您的机器上并保持就绪状态，以便轻松地通过 TCPMon 代理 HTTP 请求和响应，并检查消息内容。\n\
  \nActiveMQ\n\nApache ActiveMQ 是一个开源的消息传递和集成模式服务器。ActiveMQ 速度很快，支持多种跨语言客户端和协议，并附带易于使用的企业集成模式和许多高级功能。ActiveMQ\
  \ 完全支持 JMS 1.1 和 J2EE 1.4，并根据 Apache 2.0 许可证发布。ActiveMQ 可从 [`http://activemq.apache.org/`](http://activemq.apache.org/)\
  \ 下载。\n\nActiveMQ 的主要区别特征在于它支持多种跨语言客户端和协议，包括 Java、C、C++、C#、Ruby、Perl、Python 和 PHP。ActiveMQ\
  \ 支持以下协议（以及其他协议）：\n\n*   OpenWire，用于 Java、C、C++ 和 C# 的高性能客户端\n*   Stomp 支持，使得可以用\
  \ C、Ruby、Perl、Python、PHP、ActionScript/Flash 和 Smalltalk 轻松编写客户端，以便与 ActiveMQ 以及任何其他流行的消息代理通信\n\
  *   AMQP v1.0 支持\n*   MQTT v3.1 支持，允许在物联网环境中进行连接\n\n安装和配置 ActiveMQ\nActiveMQ 可在\
  \ [`http://activemq.apache.org/download.html`](http://activemq.apache.org/download.html)\
  \ 下载。详细的安装说明也可在 [`http://activemq.apache.org/getting-started.html#GettingStarted-InstallationProcedureforWindows`](http://activemq.apache.org/getting-started.html%2523GettingStarted-InstallationProcedureforWindows)\
  \ 获取。\n下载名为 `apache-activemq-5.13.3-bin.zip` 的 ActiveMQ 安装文件。\n从 zip 文件中，将名为 `apache-activemq-5.13.3`\
  \ 的文件夹解压到 `C:\\Program Files\\ActiveMQ`（或应用程序文件合适的其他位置）。\n\n我明确避免路径中包含空格的位置，例如 `Program\
  \ Files` 中的空格。因此，在我的 Windows 机器上，我使用以下位置：\n\n```\nD:\\Applns\\apache\\ActiveMQ\\\
  apache-activemq-5.13.3\n```\n\n开始使用 ActiveMQ\n\n您可以通过以下命令启动 ActiveMQ 服务器：\n\n```\n\
  cd D:\\Applns\\apache\\ActiveMQ\\apache-activemq-5.13.3\\bin\nD:\\Applns\\apache\\\
  ActiveMQ\\apache-activemq-5.13.3\\bin>activemq start\n```\n\n清单 F-1 展示了 ActiveMQ\
  \ 的启动过程。\n\n\n\n```\nD:\\Applns\\apache\\ActiveMQ\\apache-activemq-5.13.3\\bin>activemq\
