  \ 3 在同一个 JVM 中进行命令和事件处理”部分中提到的说明。\n\n**使用 Axon 进行分布式命令和事件处理**\n\n在本节中，你将把第 12 章“分布式命令和事件处理”部分讨论的代码迁移到\
  \ Axon 4。迁移后的代码库位于文件夹 `ch19\\ch19-05` 中。\n实际上，这段代码是对本章前面“使用 Axon 3 进行分布式命令和事件处理”部分中看到的代码的重构。要构建并执行该示例，请遵循此处提到的说明，但有一个额外的步骤需要你作为第一步来完成，那就是设置\
  \ Axon 服务器。\n请遵循上一节的说明来启动 Axon 服务器。一旦 Axon 服务器启动，请遵循本章前面“使用 Axon 3 进行分布式命令和事件处理”部分中提到的说明。\n\
  \n**总结**\n\n每一次结束都是新的开始。你已经读完了这本书；然而，你的微服务之旅才刚刚开始。我们揭开了围绕架构选择的一些困惑，并深入研究了包括数据一致性在内的几个关注点的每一个细节，这些在你日常采用微服务架构时可能会遇到。我希望你喜欢这本书的许多部分，就像我喜欢花时间深入代码细节来解释它们一样。我试图平衡理论量和代码量，让你对几乎所有解释过的概念都有动手实践的感觉。最后但同样重要的是，我还试图通过本章涵盖\
  \ Axon CQRS 框架的最新版本。框架会来来去去，规范会不断演进，因为“唯一不变的就是变化。”然而，本书讨论的架构基础仍然具有相关性和有效性——至少这是我在\
  \ 25 年 IT 职业生涯中所经历的。继续前进，保持快速步伐。\n\n**脚注**\n\n安装、配置和运行 MongoDB\n\n\n\nMongoDB 是一款开源文档数据库，其服务器遵循自由软件基金会发布的\
  \ GNU AGPL v3.0 许可协议，具备高性能、高可用性和自动扩展能力。您可以从 [`www.mongodb.com/`](http://www.mongodb.com/)\
  \ 下载 MongoDB。\n\n在本节中，您将了解以下内容：\n\n*   MongoDB 简介\n*   如何下载、安装和配置 MongoDB\n*   如何启动\
  \ MongoDB 服务器\n*   如何连接 MongoDB 服务器\n*   如何对 MongoDB 服务器执行基本操作\n*   如何安装和使用 MongoDB\
  \ 的 UI 工具 Robomongo\n\nMongoDB 简介\nMongoDB 是一种文档数据库，其记录是结构化的文档。由于文档是结构化的，因此它由字段和值对组成的数据结构。MongoDB\
  \ 文档遵循类似于 JSON（JavaScript 对象表示法）对象的结构。作为字段的值，MongoDB 文档可以包含其他文档、数组和/或其他文档的数组。\n\n\
  MongoDB 文档\n\n以下是一个 MongoDB 文档示例，以便您了解其结构：\n\n```\n{\nname: \"bob\",\nclass: 2,\n\
  division: \"B\",\nsubjects: [\"english\", \"science\", \"maths\"]\n}\n```\n\n由于\
  \ MongoDB 文档可以包含其他文档和其他文档的数组，因此其数据结构是可扩展的。此外，MongoDB 文档与编程语言中的数据类型是同义词。\n\n安装和配置\
