  \ RabbitMQ 集群是否已启动并正常运行。\n\n你在上一节（`ch06-02`）中看到的示例可以稍作调整，以演示集群设置，并保存在文件夹 `ch06-03`\
  \ 中。你可以按照以下顺序执行示例，进行快速演示。\n\n如果你之前没有这样做，请将以下文件从 `samples` 目录（`ch06\\ch06-03\\`）复制到\
