- '# 同步对弈游戏


  回到图 6-16。让我们在资源共享和资源利用的背景下进一步讨论。


  你可能已经注意到，单个服务器套接字实例正在监听客户端连接。正是这个单一的服务器套接字负责处理所有传入的客户端连接。这是当今许多 Web 服务器的典型特征。一个典型的
  Web 服务器，生成相对简短的内容（如包含文本或图像的网页），其响应大小约为 100KB。尽管生成或检索此页面只需不到一秒钟的时间，但将其传输到带宽仅为 80
  kbps（@ 10 KB/s）的慢速客户端可能需要长达 10 秒的时间。向慢速客户端发送内容的问题，在一定程度上可以通过增大操作系统内核套接字缓冲区的大小来改善；然而，这并不是问题的通用解决方案。它可能会产生不良的副作用，需要巨大的资源，并且在达到某个最佳点后，资源将无法线性扩展。简而言之，这个单一的服务器套接字不能一直等待客户端连接上下文中发生的所有处理（如
  I/O 操作）完成。如果它一直等待直到完成，那么它将需要很长时间才能接受下一个客户端连接。在生产级 Web 服务器中，会有数十、数百甚至更多的并发客户端连接访问
  Web 服务器，因此服务器套接字必须更加智能，以便在合理的时间范围内做出响应。


  图 6-16 中的架构利用线程来处理上述场景。线程是一组自包含的指令，操作系统可以调度这些指令在 CPU 核心上执行。应用程序并行运行多个线程有两个原因：


  *   它们可以同时利用更多的计算核心。

  *   它们使得并行执行操作变得容易（在此示例中，即执行在客户端连接上下文中编写的代码）。


  然而，线程也会消耗系统资源。每个线程都使用内存和其他操作系统资源，并且需要通过称为上下文切换的过程在核心上换入换出。尽管现代服务器进程可以处理数百个活动线程，但一旦内存耗尽，或者高
  I/O 操作迫使操作系统级别发生大量上下文切换，性能就会开始严重下降。因此，创建每个线程都必须谨慎。即使创建了线程，一种优化方法是重用线程。线程池可以实现这一点。此外，巧妙的设计还可以允许这些线程被重用以执行各种任务。在此示例中，来自同一线程池的线程被用于执行网络读取任务和网络写入任务。因此，总的来说，你的网络服务器通过使用线程池实现了智能实现，即使不是最智能^(⁹)的方式。有一个类比叫做“同步对弈或同步展示”。这指的是一种棋盘游戏展示（通常是国际象棋或围棋），其中一名玩家（通常是高段位玩家，如特级大师或段位棋手）同时与多名其他玩家进行多局游戏。这里实现的网络服务器类似于一位特级大师，他可以或多或少地并发接受连接，并将相关的计算分配给线程池中的线程，同样也是或多或少地并发执行。


  '
- '# 消息关联与微服务


  在微服务架构中，企业应用程序的不同部分被划分为多个微服务，但它们仍然需要相互通信。为了获得微服务的真正好处，微服务间的调用必须通过消息传递基础设施进行。这意味着采用微服务架构的企业应用程序的生产生态系统将由许多微服务以及这些微服务的许多实例组成，它们通过一个或多个消息传递基础设施相互连接。当你在这些实例之间采用异步通信风格时，主要难题是如何有效解决它们之间的消息路由问题。本章前面的部分让你对连接微服务（包括消息关联）所涉及的内部复杂性有了一个概览。如果开发人员必须自己完成所有这些连接工作，代码将会变得过于臃肿。你需要一种更好的方法来处理这个问题。我将在第
  12 章介绍 Axon 框架（它将为你隐式地完成这项工作）时，介绍处理此问题的方法。


  '
- '# 总结


  消息传递带来了分离处理的能力，帮助企业应用程序应对许多现实场景，包括停机时间和故障。在本章中，你了解了一些强大的消息传递应用，包括集群和高可用性。你还阅读了一些代码示例，这些示例展示了如果你手动编写横切关注点（如消息关联等）所涉及的复杂性。通过结合本章讨论的多种技术，你将能够成倍地提高微服务基础设施的可靠性。你将在后续章节中看到其中一些消息传递技术应用于不同的上下文，因为消息传递是开发者工具集中的一个核心杠杆。


  '
- "# 脚注\n\n7. Spring Boot\n\n在上一章中，你了解了消息传递。你使用 Spring 配置了消息发送者和监听器，并在 Spring 中显式地连接了\
  \ Bean 和所需的基础设施。到目前为止，一切顺利。那么，如何能让各方面变得更简单呢？你将在本章中了解 Spring Boot，它采用了一种对 Spring\
  \ 平台和许多第三方 Java 库的“约定优于配置”的观点，从而可以轻松、直接地创建独立的、生产级的、基于 Spring 的应用程序，并且可以“直接运行”。由于\
  \ Boot 遵循了开发人员在使用 Spring 和其他第三方库时一直利用的许多约定和使用模式，因此大多数 Spring Boot 应用程序只需要很少的 Spring\
  \ 配置。你将使用 Spring Boot 来开发与本章讨论相关的几个示例。再次强调，目的不是详细涵盖 Spring Boot；这超出了本章的范围。熟悉 Java\
  \ 或 Spring 的读者访问 Spring Boot 主页应该可以毫无困难地入门。我将花时间讨论讨论所必需的最基本工具，以免偏离本书的意图，即解释实用的微服务。然而，当你开始查看后续章节中的代码示例时，你应该熟悉基本的构建块代码结构。\n\
  \n你将在本章中学习以下内容：\n\n*   如何使用 Spring Initializer 创建 Boot 项目模板\n*   如何使用 cURL 访问一个针对\
  \ MongoDB 执行 CRUD 操作的 Boot 示例\n*   HATEOAS 和 HAL 简介，以及如何使用`RestTemplate`访问数据\n*\
  \   如何开发一个端到端的 Boot 示例，用于对 REST 执行 CRUD 操作\n\n\n\n使用 Spring Boot 和 MongoDB 执行数据操作\n\
  多语言持久化是微服务架构中的一个关键方面。虽然你仍然需要具备本地和/或分布式事务能力的 ACID 兼容数据存储，但仔细分析会发现，大多数数据存储和检索操作并不需要这些总是要付出代价的严格能力。如今，许多\
  \ NoSQL 数据库被设计为在大型集群上运行，并能处理海量数据；它们还能高效地响应流量呈指数级增长的读取请求，同时性能基本保持线性。因此，在单个应用程序中同时满足两种（SQL\
  \ 和 NoSQL）数据存储需求是很自然的，而这正是多语言持久化发挥作用的地方。在微服务上下文中，你可以根据单个微服务或单个大型企业应用程序的组件使用数据的方式，选择使用多种数据存储技术。当你需要以文档格式存储数据时，MongoDB\
  \ 是最佳选择，因此你将在本书的其余章节中研究一个 MongoDB 示例。\n\n在本节中，你将实现一个“Hello World”类型的 Spring Boot\
  \ 应用程序。开始开发 Spring Boot 应用程序的方法不止一种，主要方法有：\n\n*   使用 Spring Boot 命令行界面（CLI）作为命令行工具^(¹⁰)\n\
  *   使用 Eclipse 和 Spring Tool Suite (STS) 等 IDE 来提供 Spring Boot 支持^(¹¹)\n*   使用 Spring\
  \ Initializer 项目\n\n在本节中，你将采用最后一种方法。\n\n使用 Spring Initializer 创建 Spring Boot 项目模板\n\
  你将在此处使用 Spring Initializer 创建一个 Spring Boot 项目。Spring Initializer 是基于 Eclipse 的\
  \ Spring Tool Set (STS) 项目向导的直接替代品，它提供了一个在线 Web UI 来配置和生成不同风格的 Spring Boot 项目。使用\
  \ Spring Initializer，你可以通过在线界面生成一个项目，然后可以将其导入任何 IDE。\n\n目标是快速开发一个应用程序，帮助你实现以下目标：\n\
  \n*   了解 Spring Boot\n*   了解 MongoDB\n*   了解使用 Spring Data 进行基本的 CRUD 操作\n\nSpring\
  \ Initializer 项目位于 [`http://start.spring.io`](http://start.spring.io)。\n\n你需要填写详细信息，例如它是否是\
  \ Maven 项目、是否需要为 Boot 项目使用 Java 以及 Spring Boot 版本。其他详细信息包括 group 和 artifact ID，如图\
  \ 7-1 所示。接下来，单击“Switch to go to the full version”链接，该链接位于“Generate Project”按钮下方。在这里，你可以选择\
  \ MongoDB 和 Rest Repositories 作为依赖项。你还需要确保 Java 版本为 8，并且包类型选择为 JAR。选择依赖项后，你可以点击“Generate\
  \ Project”按钮。这将生成一个 Maven 项目。该项目可以作为 ZIP 文件下载到浏览器的默认下载目录中。\n\n![../images/477630_1_En_7_Chapter/477630_1_En_7_Fig1_HTML.jpg](img/477630_1_En_7_Fig1_HTML.jpg)\n\
  \n图 7-1\n使用 Spring Boot Initializer 生成 Spring Boot 模板\n\nSpring Boot 提供了一组 Starter\
  \ Poms 或 gradle 构建文件，你可以使用它们来添加所需的依赖项。根据其类路径中的库，Spring Boot 将通过自动配置自动配置所需的类。例如，要与数据库交互，如果类路径中有\
  \ Spring Data 库，它会自动设置与数据库的连接以及所需的 Data Source 类。\n\n现在，你可以解压该文件并将其保存到文件系统中你选择的目录中。同样，一个没有空格的文件路径将使你在开发应用程序时避免许多不可预见的错误。现在，你可以使用你喜欢的\
  \ IDE 继续应用程序开发。\n\n1.  如果你使用 Eclipse，现在可以转到“File”菜单并单击“Import”。\n2.  导航到 Maven ➤\
  \ Existing Maven Projects，然后单击“Next”。\n3.  单击“Root Directory”旁边的“Browse”选项，然后选择你之前解压的文件夹。\n\
  4.  单击“Finish”按钮。这会将生成的 Maven 项目加载到 Eclipse Project Explorer 中。\n\n假设你熟悉 Eclipse，我将不在此花费时间或篇幅解释\
  \ Eclipse 的各个方面。相反，让我们详细地看一下应用程序开发。\n首先，查看创建 Spring Boot 项目时自动生成的 `pom.xml`。这里解释了主要的三个元素。\n\
  \nSpring Boot Starter Parent\n通常，你的 Maven `pom.xml` 文件将继承自 spring-boot-starter-parent\
  \ 项目，并声明对一个或多个“starter”的依赖。在图 7-1 中，你可以看到两个这样的 starter：MongoDB 和 Rest Repositories。\n\
  \n清单 7-1 提到了你的 POM 继承层次结构，这是一个物料清单（BOM），用于管理项目所需的不同库和版本。\n\n```\norg.springframework.boot\n\
  spring-boot-starter-parent\n1.5.4.RELEASE\n\n清单 7-1\nSpring Boot Starter Parent\
  \ (ch07\\ch07-01\\pom.xml)\n```\n\nSpring Boot Dependencies\n\n接下来，如果你可以查看依赖项部分，你会看到\
  \ POM 文件只提到了三个依赖项，如清单 7-2 所示。\n\n```\n\norg.springframework.boot\nspring-boot-starter-data-mongodb\n\
  \norg.springframework.boot\nspring-boot-starter-data-rest\n\norg.springframework.boot\n\
  spring-boot-starter-test\ntest\n\n清单 7-2\nSpring Boot Dependencies\n```\n\n这些依赖项解释如下：\n\
  \n*   `spring-boot-starter-data-mongodb`：Spring Data MongoDB 项目帮助你与 MongoDB 文档数据库集成。Spring\
  \ Data MongoDB 的主要功能领域是一个以 POJO 为中心的模型，用于与 MongoDB 集合交互以执行 CRUD 操作，并轻松编写存储库风格的数据访问层。\n\
  *   `spring-boot-starter-data-rest`：Spring Data REST 构建在 Spring 的 MVC 之上。Spring\
  \ Data REST 创建了一组 Spring MVC 控制器和其他所需的 bean，以提供 RESTful 前端。然后，这些组件会传递性地链接到 Spring\
  \ Data JPA 后端。使用 Spring Boot，这一切都会为你自动配置。\n*   `spring-boot-starter-test`：此 starter\
  \ 导入了 Spring Boot 测试模块、JUnit、AssertJ、Hamcrest 以及许多其他有用的库，这些库将帮助你测试应用程序。\n\nSpring\
  \ Boot Maven Plugin\n\n接下来，让我们看看 Spring Boot Maven 插件。参见清单 7-3。\n\n```\n\norg.springframework.boot\n\
  spring-boot-maven-plugin\n\n清单 7-3\nSpring Boot Maven Plugin\n```\n\n清单 7-3 中的 Spring\
  \ Boot Maven 插件有助于创建单个可执行 JAR。单个可执行 JAR 是一个自包含的可执行 JAR 文件，你可以在生产环境中运行。在第 3 章的“微服务是自包含的”部分，你看到了对自包含和自足的可执行包的要求。Java\
  \ 没有提供任何标准方法来加载 JAR 文件内包含的 JAR 文件。在这里，你可以使用 uber JAR。一个 uber JAR 简单地将所有 JAR 中的所有类打包到一个归档文件中。但是，当需要同一库的不同版本或文件名相同时，这有时会遇到问题。因此，Spring\
  \ Boot 采用了一种不同的方法，直接嵌套 JAR，而 Spring Boot Maven 插件则负责所有必要的准备工作。\n\n\n\n设计与编码领域实体\n\
  \n为了本节示例的需要，我们将保持领域实体非常简单。该实体是一个典型的可在电商网站上架的商品。多个商品归属于一个商品类别，因此在网站上，你可以先展示商品类别，在线用户可以通过浏览商品类别来查看所选类别下的所有可用商品。图\
  \ 7-2 展示了领域实体的设计。这是一个基础设计，将帮助你管理商品类别与商品之间的关系，以满足在所选商品类别下列出所有可用商品的需求。\n\n![../images/477630_1_En_7_Chapter/477630_1_En_7_Fig2_HTML.jpg](img/477630_1_En_7_Fig2_HTML.jpg)\n\
  \n图 7-2\n商品/商品类别领域模型\n\n清单 7-4 展示了实现此功能所需的代码。\n\n```\npublic class Product {\n@Id\n\
  private String id;\nprivate String name;\nprivate String code;;\nprivate String\
  \ title;\nprivate String description;\nprivate String imgUrl;\nprivate Double price;\n\
  private String productCategoryName;\n}\npublic class ProductCategory {\n@Id\nprivate\
  \ String id;\nprivate String name;\nprivate String title;\nprivate String description;\n\
  private String imgUrl;\n}\n清单 7-4\n商品/商品类别领域模型 (ch07\\ch07-01\\src\\main\\java\\\
  com\\acme\\ch07\\ex01\\product\\model\\Product.java)\n```\n\n清单 7-4 还揭示了一个配置为自动生成的\
  \ `id` 对象，因此你无需手动处理它。\n\n编码仓库\n\n仓库是一个接口，它允许你执行涉及 `Product` 和 `ProductCategory`\
  \ 对象的各种操作。它通过扩展 Spring MongoDB 项目 API 中定义的 MongoRepository 接口来获得这些操作。MongoRepository\
  \ 提供的基本功能包括：\n\n*   支持对特定类型的仓库进行通用的 CRUD 操作\n*   使用分页和排序抽象来检索实体的方法\n\n参见清单 7-5。\n\
  \n```\n@RepositoryRestResource(collectionResourceRel = \"products\", path = \"products\"\
  )\npublic interface ProductRepository extends MongoRepository  {\npublic List findByProductCategoryName(\n\
  @Param(\"productCategory\") String  productCatagoryName);\n}\n@RepositoryRestResource(collectionResourceRel\
  \ = \"categories\",\npath = \"categories\")\npublic interface ProductCategoryRepository\
  \ extends\nMongoRepository  {\n}\n清单 7-5\n商品和商品类别 Mongo 仓库 (ch07\\ch07-01\\src\\\
  main\\java\\com\\acme\\ch07\\ex01\\product\\repository\\ProductRepository.java)\n\
  ```\n\n这里你定义了一个自定义查询，用于根据 `Category` 检索 `Product` 对象列表。你可以向上述仓库接口定义更多抽象的实用方法，从而免费获得它们的实现，但为了满足你的目的，我将其限制为清单\
  \ 7-5 所示。在运行时，Spring Data REST 会自动创建上述接口的实现。然后，它将使用 `@RepositoryRestResource` 注解来指示\
  \ Spring MVC 在 `/products` 和 `/categories` 路径下创建 RESTful 端点。\n\n编码启动应用程序可执行文件\n\n\
  如果需要，你可以修改 `EcomProductMicroserviceApplication.java` 文件。清单 7-6 显示了之前生成的默认代码。这是一个简单的\
  \ Java 类，带有一个 `main()` 方法，因此它可以作为一个独立的 Java 应用程序运行，并使用嵌入式 Tomcat Servlet 容器作为 HTTP\
  \ 运行时。\n\n```\n@SpringBootApplication\npublic class EcomProductMicroserviceApplication\
  \ {\npublic static void main(String[] args) {\nSpringApplication.run(EcomProductMicroserviceApplication.class,\n\
  args);\n}\n}\n清单 7-6\nSpring Boot 应用程序 (ch07\\ch07-01\\src\\main\\java\\com\\acme\\\
  ch07\\ex01\\product\\EcomProductMicroserviceApplication.java)\n```\n\n\n\n虽然 `main()`\
  \ 方法使用 Spring Boot 的 `SpringApplication.run()` 方法来启动应用程序，但 Spring Boot 内部会启动 Spring\
  \ Data JPA，为 `ProductRepository` 和 `ProductCategoryRepository` 创建具体的实现类，并配置其使用 JPA\
  \ 与后端数据库集成。\n\n## 构建并打包 Spring Boot 应用程序\n\nSpring Boot 的风格是通过创建一个完全自包含的可执行 JAR\
  \ 文件来构建和打包示例，该文件可以在生产环境中运行。正如第 3 章“微服务是自包含的”一节中所解释的，可执行 JAR 也称为 fat JAR，是一种归档文件，其中包含你编译后的类以及代码运行所需的所有其他\
  \ JAR 依赖项，这些依赖项在你解析 POM 依赖时会被解析。`ch07-01\\pom.xml` 包含了构建和运行示例所需的 Maven 脚本。请确保 MongoDB\
  \ 已启动并正在运行。你可能需要参考附录 A 来开始使用 MongoDB。\n\n你首先需要将可执行文件构建并打包成一个单独的 JAR 文件：\n\n```\n\
  cd ch07-01\nD:\\binil\\gold\\pack03\\ch07\\ch07-01>build\nD:\\binil\\gold\\pack03\\\
  ch07\\ch07-01>mvn clean package -Dmaven.test.skip=true\n```\n\n这将在 `target` 文件夹中生成可执行\
  \ JAR。需要注意的是，当你执行上述 Maven 脚本时，默认情况下它也会执行测试用例，因此你通过跳过测试来禁用了它。\n\n你可能需要注意以下两个文件，你可以使用它们来自定义许多运行时参数，在你的示例中，这些文件在\
  \ `samples` 文件夹中保持空白：\n\n```\nch07-01\\src\\main\\resources\\application.properties\n\
  ch07-01\\src\\test\\resources\\test.properties\n```\n\n此外，为了加快你的开发周期，当你只想编译所有 Java\
  \ 文件（包括测试类）时，你可以使用以下命令：\n\n```\ncd ch07-01\nch07-01>mvn clean test-compile\n```\n\
  \n如果你想打包你的可执行工件，但不想构建或执行测试类，你可以使用以下命令：\n\n```\ncd ch07-01\nch07-01>mvn clean package\
  \ -Dmaven.test.skip=true\n```\n\n## 运行并测试 Spring Boot 应用程序\n\n在 mongo shell 已连接到正在运行的\
  \ mongod 实例的 Windows 命令提示符中，你可能需要先清理任何需要的集合：\n\n```\n> show collections\nproduct\n\
  productCategory\n> db.productCategory.drop()\ntrue\n> db.product.drop()\ntrue\n\
  > show collections\n>\n```\n\n现在，你可以通过多种方式运行 Spring Boot 应用程序。最直接的方式是通过以下命令执行 JAR\
  \ 文件：\n\n```\ncd ch07-01\nD:\\binil\\gold\\pack03\\ch07\\ch07-01>run\nD:\\binil\\\
  gold\\pack03\\ch07\\ch07-01>rem java -jar .\\target\\Ecom-Product-Microservice-0.0.1-SNAPSHOT.jar\n\
  D:\\binil\\gold\\pack03\\ch07\\ch07-01>mvn spring-boot:run\n```\n\n一旦应用程序启动，它将在\
