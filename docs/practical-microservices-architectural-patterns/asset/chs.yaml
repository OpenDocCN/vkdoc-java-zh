  }\n清单 19-17\n为 Axon 3 重构后的库存命令处理器 (ch19\\ch19-03\\Ax3-Ecom-With-Security\\Ecom-core\\\
  src\\main\\java\\com\\acme\\ecom\\core\\inventory\\command\\handler\\InventoryCommandHandler.java)\n\
  ```\n\n在清单 19-16 的 OrderCommandHandler 和清单 19-17 的 InventoryCommandHandler 中，你需要注意到一个方面：所有处理器方法都在事务上下文中执行。然而，这里没有分布式事务或两阶段提交操作，也没有涉及多个聚合根的\
  \ ACID 事务。只有局限于单个聚合根实体的本地事务。\n\n\n\n到目前为止，一切顺利。现在让我们进入业务编排部分。库存折旧和创建新订单的编排工作，现在将从清单\
  \ 19-12 的 `OrderCommandHandler` 转移到清单 19-18 的 `OrderController` REST 控制器中。其核心要点是，对这两个实体的操作要么全部成功，要么所有操作都必须进行补偿回滚！\n\
  \n```java\n@RestController\n@RequestMapping(\"/order\")\npublic class OrderController\
  \ {\n@Autowired\nprivate CommandGateway commandGateway;\n@RequestMapping(method\
  \ = RequestMethod.POST)\n@ResponseBody\npublic OrderCreationStatus createOrder(@RequestBody\
  \ OrderDTO orderDTO) {\nOrderCreationStatus orderCreationStatus = null;\n//步骤 1：折旧产品库存.............\n\
  List inventoryUpdatedList = new ArrayList();\ntry {\nfor (LineItemDTO lineItemDTO\
  \ : orderDTO.getLineItems()) {\ncommandGateway.sendAndWait(new InventoryUpdateCommand(\n\
  lineItemDTO, ProductStockOperation.DEPRECIATE));\ninventoryUpdatedList.add(lineItemDTO);\n\
  }\n} catch (Exception ex) {\nThrowable e = ex.getCause();\nif (e instanceof OutOfStockException)\
  \ {\nLOGGER.error(\"由于缺货，创建新订单时出错\", e);\norderCreationStatus = OrderCreationStatus.OUT_OF_STOCK;\n\
  } else {\nLOGGER.error(\"更新库存时出现未知错误\", e);\norderCreationStatus = OrderCreationStatus.FAILED;\n\
  }\n//步骤 2：任何异常，回滚已更新的库存\nfor (LineItemDTO lineItemDTO : inventoryUpdatedList) {\n\
  commandGateway.send(new InventoryUpdateCommand(\nlineItemDTO, ProductStockOperation.ADD));\n\
  }\nreturn orderCreationStatus;\n}\n//步骤 3：创建新订单\ntry {\nOrderCreateCommand orderCommand\
  \ =\nnew OrderCreateCommand(orderDTO.getUserId(),\norderDTO.getLineItems());\ncommandGateway.sendAndWait(orderCommand);\n\
  orderCreationStatus = OrderCreationStatus.SUCCESS;\n} catch (Exception ex) {\nLOGGER.error(\"\
  创建新订单时出现未知错误\", ex);\norderCreationStatus = OrderCreationStatus.FAILED;\n// 步骤 4：任何异常，回滚所有已更新的库存\n\
  for (LineItemDTO lineItemDTO : orderDTO.getLineItems()) {\ncommandGateway.send(new\
  \ InventoryUpdateCommand(lineItemDTO,\nProductStockOperation.ADD));\n}\n}\nreturn\
  \ orderCreationStatus;\n}\n@RequestMapping(value = \"{orderId}\", method = RequestMethod.DELETE)\n\
  @ResponseBody\npublic void cancelOrder(@PathVariable Long orderId) {\nOrderCancelCommand\
  \ orderCommand = new OrderCancelCommand(orderId);\ncommandGateway.send(orderCommand);\n\
  }\n}\n清单 19-18\nOrder REST 控制器 (ch19\\ch19-03\\Ax3-Ecom-With-Security\\Ecom-core\\\
  src\\main\\java\\com\\acme\\ecom\\core\\web\\OrderController.java)\n```\n\n在清单 19-18\
  \ 中，你首先需要注意的一点是，HTTP POST 方法 `createOrder` 并不在任何类型的事务之内。这正是你执行库存折旧和创建新订单编排的地方。这意味着，虽然聚合根实体操作发生在清单\
  \ 19-16 中 `OrderCommandHandler` 的命令处理器操作和清单 19-17 中 `InventoryCommandHandler` 的本地事务内，但它们的编排是在没有任何封闭事务上下文的情况下完成的，如清单\
  \ 19-18 所示。这意味着异常和错误可能发生在任何一行代码（即指令或操作）执行时（或之后），在这种情况下，到目前为止已执行的操作也必须进行补偿回滚！\n\n\
  清单 19-18 显示，在步骤 1 中，你根据 Order POST 请求中的行项目数量，对每个行项目执行 `sendAndWait` 发送 `InventoryUpdateCommand`。`sendAndWait`\
  \ 将一个 `InventoryUpdateCommand` 分派到命令网关，以便该命令能被清单 19-17 中的 `InventoryCommandHandler`\
  \ 拾取。此外，由于 `OrderController` 和 `InventoryCommandHandler` 位于同一个微服务（或分区）中，并且 `sendAndWait`\
  \ 是一个同步阻塞调用，因此如果 `sendAndWait` 成功，你可以确信预期的操作已确定执行。对于所有 `sendAndWait` 成功的行项目，你将它们记录在\
  \ `inventoryUpdatedList` 中，以便在需要时稍后执行补偿操作。如果你能够成功地为订单的所有行项目执行 `sendAndWait` 发送 `InventoryUpdateCommand`，那么你将进入步骤\
  \ 3，开始创建订单。换句话说，在继续创建订单之前，你要确保有足够的库存，并且折旧了所有必需的库存。\n\n在检查库存时，任何行项目都可能因库存不足或其他故障而发生错误。无论原因如何，在这种情况下都无法完成整个订单，因此你需要对已为该订单生效的任何库存变更进行补偿。这在清单\
  \ 19-18 中标记为步骤 2。\n\n如果步骤 1 完全成功且没有任何错误，则意味着你已有足够的库存来履行订单，因此你开始执行步骤 3。在这里，你再次创建一个\
  \ `OrderCreateCommand` 并通过 `sendAndWait` 发送到命令网关。清单 19-16 中处理新订单创建的 `OrderCommandHandler`\
  \ 同样位于同一个微服务中，因此成功的 `sendAndWait` 足以确定订单创建成功。此阶段的异常也意味着你需要对已为该订单生效的任何库存变更进行补偿。这在清单\
  \ 19-18 中标记为步骤 4。\n\n这是一个 BASE 事务的示例；然而，整体事务并非万无一失。这意味着，如果在执行 `createOrder` HTTP\
  \ REST POST 方法期间发生微服务崩溃，`createOrder` 中的其余指令将不会被执行；极有可能出现以下状态：\n\n*   订单中对应行项目的库存已更新；但订单未创建，且库存未恢复。\n\
  \n*   订单中所有行项目对应的库存已更新；但订单未创建，且库存未恢复。\n\n*   订单中所有行项目对应的库存已更新；但订单未创建，且仅恢复了部分行项目对应的库存。\n\
  \n\n\n系统可能无法最终达到一致性，因为将系统带回最终一致状态所需的“引力”随着微服务的崩溃而消失了！更明确地说，将系统恢复到语义一致状态所需的基本状态已经丢失，因为你没有使微服务栈的状态持久化。\n\
  \n**将订单和库存领域划分为独立的微服务**\n\n你已看到，清单 19-12 中 `OrderCommandHandler` 的 `handleNewOrder`\
  \ 处理过程，相当于对订单和库存实体执行了一次 ACID 风格的操作。然而，在本章的重构中，你将代码转换为了清单 19-18 中 `OrderController`\
  \ 的 `createOrder` HTTP POST 方法。这里的处理过程相当于 BASE 风格，但没有任何固有的故障转移特性。在采用了跨订单和库存聚合根实体的\
  \ BASE 风格事务后，订单和库存领域现在已成为彼此领域独立的“一等公民”，因此如果需要，它们也可以被分离到各自的微服务中。\n\n你不会在此处实现图 19-2\
  \ 所示的重构。相反，这将是后续的练习。下一小节将提供更多相关提示。\n\n![../images/477630_1_En_19_Chapter/477630_1_En_19_Fig2_HTML.jpg](img/477630_1_En_19_Fig2_HTML.jpg)\n\
  \n**图 19-2.** 为 Axon 3 重构的微服务电商架构\n\n**用于确定性最终一致性的 Saga**\n\n在采用了跨订单和库存聚合根实体的 BASE\
  \ 风格事务后，订单和库存领域现在可以成为独立的微服务。然而，有一个问题！一旦你将订单和库存领域分离到独立的微服务中，以下组件将不再位于同一位置：\n\n* \
  \  清单 19-16 中所示的 `OrderCommandHandler`\n*   清单 19-17 中所示的 `InventoryCommandHandler`\n\
  *   清单 19-18 中所示的 `OrderController`\n\n如果是这样，向一个或多个命令处理器发送的 `sendAndWait` 将跨网络分区执行，因此其确定性特性将丢失。如果你继续按照清单\
  \ 19-17 中 `InventoryCommandHandler` 的方式建模 BASE 事务，那么它失败的可能性将超出我已解释的范围。\n\n手动建模 BASE\
  \ 事务的方式在这里不是一个好主意。由于以下特性，你需要在此处使用 Saga 事务：\n\n*   Saga 是长生命周期的。\n*   Saga 是持久化的。即使微服务崩溃，Saga\
  \ 也可以被恢复。\n*   Saga 可以建模复杂的补偿场景。\n*   Saga 的事务或补偿可以被重放或重试。\n\n无论最终一致性在时间线上处于哪个点，尚未结束的\
  \ Saga 总是倾向于将系统（带）回到一致状态。\n当订单和库存领域被分离到不同的微服务时，你可以很好地使用 Saga 来建模多行商品订单的创建。Saga 可以跟踪每个库存消耗的状态，一旦满足条件，就继续创建新订单，然后结束\
  \ Saga。在这个例子中，我没有这样做，因为我不想让演示过于复杂，因为它已经包含了一个 Saga。\n\n**配置电商微服务应用**\n\n请遵循第 18 章中“配置电商微服务应用”和“设置环境基础设施”部分的说明。\n\
  \n**构建并运行电商微服务应用**\n\n同样，你应该遵循第 18 章中“构建并运行安全的电商微服务应用”部分的说明。在了解了 Axon 3 之后，让我们在下一节看看\
