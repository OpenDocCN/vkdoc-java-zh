  ```\n\n清单 10-11 和 10-12 证实了后台处理发生在 `SimpleAsyncTaskExecutor` 的线程中，而格式为 `http-nio-*.*`\
  \ 的容器线程已经完成了事务的请求部分，并被归还到线程池。这是一种强大的方式，用于桥接 RESTful 接口的同步、阻塞范式与服务器端执行的异步、非阻塞处理。\n\
  \nSpring Boot 微服务之间的 Google Protocol Buffer\n上一节讨论了如何有效利用微服务的服务器资源，如 HTTP 连接和线程。同样重要的是微服务间通信中其他可能的优化。由于微服务跨越进程边界，微服务之间发送的数据量至关重要。这归结为跨微服务的数据结构编组和解组。在本节中，您将通过示例来探讨这一点。\n\
  \nProtocol Buffer\nProtocol Buffer 是 Google 用于编组和解组结构化数据的平台中立且语言中立的机制。您需要定义希望数据如何结构化以使用\
  \ Protocol Buffer，然后可以在多个平台和语言中使用生成的源代码，轻松地从各种数据流中写入和读取结构化数据。使用 Protocol Buffer\
  \ 的一个好处是，您甚至可以更新数据结构，而不会破坏已部署的、针对“旧”格式编译的应用程序代码。这对于构建能够适应或演进以适应未来需求变化的应用程序架构尤为重要。\n\
  \n现在，您将探讨使用 Protocol Buffer 的动态过程。首先，您需要在 `.proto` 文件中指定希望序列化的信息如何结构化。在此过程中，您将使用\
  \ Protocol Buffer 消息类型。每个 Protocol Buffer 消息都是一个信息的逻辑分组，包含一系列名称-值对。清单 10-13 是一个\
  \ `.proto` 文件的示例，它定义了一个包含 `Product` 信息的消息，您在所有之前的示例中都使用了它。\n\n```\nmessage Product\
  \ {\nstring productId = 1;\nstring name = 2;\nstring code = 3;\nstring title = 4;\n\
  string description = 5;\nstring imgUrl = 6;\ndouble price = 7;\nstring productCategoryName\
  \ = 8;\n}\n清单 10-13\n示例 .proto 文件\n```\n\n每个消息类型（在示例中为 `Product` 消息）都有一个或多个唯一编号的字段，每个字段都有一个名称和一个值类型，其中值类型可以是数字（整数或浮点数）、布尔值、字符串或原始字节。您的\
  \ Protocol Buffer 消息也可以是其他 Protocol Buffer 消息类型，如清单 10-14 中定义的容器消息所示，用于保存 `Product`\
  \ 实例的集合。\n\n```\nmessage Products {\nrepeated Product product = 1;\n}\n清单 10-14\n\
  用于其他 .proto 类型集合的 .proto 文件\n```\n\n您可以指定字段为可选、必需和/或重复，如 `Products` 消息所示。\n\n一旦定义了消息，您就可以针对您选择的应用程序编程语言，在您的\
  \ `.proto` 文件上运行 Protocol Buffer 编译器，以生成实体类。这些实体类为每个字段提供简单的访问器（如 `code()` 和 `set_code()`），以及将整个结构序列化/解析为原始字节的方法。在您的场景中，如果您选择的语言是\
  \ Java，对上述示例运行编译器将生成一个名为 `Product` 的类。您可以在应用程序中使用这个实体类来编组和解组 `Product` Protocol\
  \ Buffer 消息。您的代码将类似于清单 10-15 所示。\n\n```\nProduct product =\nProduct.newBuilder().setProductId(id)\n\
  .setName(\"Kamsung D3\")\n.setCode(\"KAMSUNG-TRIOS\")\n.setTitle(\"Kamsung Trios\
  \ 12 inch , black , 12 px ....\")\n.setDescription(\"Kamsung Trios 12 inch with\
  \ Touch\")\n.setImgUrl(\"kamsung.jpg\")\n.setPrice(12000.00)\n.setProductCategoryName(\"\
  Mobile\").build();\n// 写入\nFileOutputStream output = new FileOutputStream(\"D:/Product.ser\"\
  );\nproduct.writeTo(output);\noutput.close();\n// 读取\nProduct productFromFile =\
  \ Product.parseFrom(new FileInputStream(\"D:/Product.ser\"));\n清单 10-15\n编组和解组 .proto\
  \ 类型\n```\n\n现在，您可以向消息格式添加新字段，而不会破坏向后兼容性；任何旧的程序二进制文件在解析时会忽略任何新字段。因此，通过使用 Protocol\
  \ Buffer 作为数据格式，您可以扩展消息协议，而无需担心破坏现有代码。\n\nGoogle 关于 Protocol Buffer 的文档列出了使用 Protocol\
  \ Buffer 的优势如下：\n\n*   更简单\n*   体积小 3 到 10 倍\n*   速度快 20 到 100 倍\n*   歧义更少\n*  \
  \ 生成的数据访问类在编程上更易于使用\n\n第二点和第三点意义重大，尤其是在您希望设计微服务之间大量“闲聊”式交互时，而在任何严肃的企业级应用中，这些交互的数量又非常庞大。\n\
  现在，让我们看一个完整的示例，以解释 Protocol Buffer 在微服务之间的使用。\n\n演示微服务之间 Protocol Buffer 的场景\n\n\
  \n\n您将修改之前演示中使用的同一个示例，以利用 Protocol Buffer。您将使用第 8 章中相同组件的精简版本。因此，此处的示例将由三个主要组件构成：一个基于\
  \ HTML 的客户端应用和两个微服务，如图 10-3 所示。同样，我移除了 HATEOAS 和数据仓库的所有复杂性，以便您可以专注于 Protocol Buffer\
  \ 的使用。\n\n![../images/477630_1_En_10_Chapter/477630_1_En_10_Fig3_HTML.jpg](img/477630_1_En_10_Fig3_HTML.jpg)\n\
  \n图 10-3\n在微服务之间使用 Protocol Buffer\n\n在您的示例设计中，您使用了一个 `.proto` 文件，在其中指定了您想要使用的实体。下一步是针对应用程序的编程语言（在您的案例中是\
  \ Java），在您的 `.proto` 文件上运行 Protocol Buffer 编译器，以生成类似的类。现在，依赖微服务和独立微服务都可以根据生成的实体类进行编程，从而使使用\
  \ protocol buffer 进行微服务间通信成为一个直接的步骤。\n\n在 Spring Boot 中使用 Protocol Buffer 的代码\n\n\
  本节的所有代码示例都在文件夹 `ch08\\ch10-02` 中。您将首先查看独立微服务（Product Server 微服务）的代码。请访问 `pom.xml`\
  \ 以查看 Product Server 微服务中显式提及的 protobuf-java 和 protobuf-java-format 依赖项。请参阅清单 10-16。\n\
  \n```\n\n3.1.0\n1.4\n\ncom.google.protobuf\nprotobuf-java\n${protobuf-java.version}\n\
  \ncom.googlecode.protobuf-java-format\nprotobuf-java-format\n${protobuf-java-format.version}\n\
  \norg.springframework.boot\nspring-boot-starter-web\n\norg.springframework.boot\n\
  spring-boot-maven-plugin\n\ncom.github.os72\nprotoc-jar-maven-plugin\n3.1.0\n\n\
  generate-sources\n\nrun\n\n3.1.0\ntrue\n\nsrc/main/resources\n\nsrc/main/protobuf\n\
  \n清单 10-16\n向 Maven 构建添加 Protocol Buffer 编译器和运行时 (ch10\\ch10-02\\ProductServer\\\
  pom.xml)\n```\n\n`protoc-jar-maven-plugin` 使用多平台可执行文件 protoc-jar 执行 protobuf 代码生成。在构建时，此\
  \ Maven 插件会检测平台并执行相应的 protoc 二进制文件，以便它可以使用 protoc-jar 嵌入式 protoc 编译器编译 `.proto`\
  \ 文件，从而在主要平台（Linux、Mac/OSX 和 Windows）之间提供一定的可移植性。在上面的 `pom.xml` 中，编译器在主周期中编译 `.proto`\
  \ 文件，并将生成的文件放入 target/generated-sources，包括 google.protobuf 标准类型，以及所需的任何其他导入。\nprotobuf-java\
  \ Maven 工件提供了在 Java 中序列化生成的消息对象所需的 Java API。因此，它充当 Protocol Buffer 的运行时。\n请注意，编译器版本应与\
  \ Java API 版本相同。在您的示例中，您使用的是 3.1.0 版本。\nprotobuf-java-format Maven 工件提供了基于 Google\
  \ 的 protobuf Message 的不同格式的序列化和反序列化。它允许将默认（字节数组）输出覆盖为基于文本的格式，例如 XML、JSON 和 HTML。\n\
  \n现在，查看清单 10-17 中显示的 Protocol Buffer 类型声明。\n\n```\nsyntax = \"proto3\";\npackage\
  \ binildas;\noption java_package = \"com.acme.ecom.product.model\";\noption java_outer_classname\
  \ = \"ECom\";\nmessage Products {\nrepeated Product product = 1;\n}\nmessage Product\
  \ {\nstring productId = 1;\nstring name = 2;\nstring code = 3;\nstring title = 4;\n\
  string description = 5;\nstring imgUrl = 6;\ndouble price = 7;\nstring productCategoryName\
  \ = 8;\n}\n清单 10-17\nproduct.proto 中的类型声明 (ch10\\ch10-02\\ProductServer\\src\\main\\\
  resources\\product.proto)\n```\n\n由于您使用的是 protocol buffer 编译器和 protocol buffer 语言运行时的版本\
  \ 3，因此 `.proto` 文件必须以 `syntax = “proto3”` 声明开头。如果使用编译器版本 2，则此声明将被省略。\n`.proto` 文件接下来应该有一个包声明，这有助于防止不同项目之间不同类型声明的命名冲突。在\
  \ Java 中，除非您像此处一样显式指定了 `java_package`，否则此包名称也用作 Java 包。\n\n接下来是两个 Java 特定的选项：`java_package`\
  \ 和 `java_outer_classname`。\n`java_package` 选项指定生成的类应位于哪个 Java 包中。如果您没有显式指定，它将与包声明给出的包名称匹配。`java_outer_classname`\
  \ 选项定义了容器类的名称，该容器类应包含类型定义文件中生成的所有类。\n\n接下来，您为要序列化的每个数据结构添加一个消息，然后为消息中的每个字段指定一个名称和类型。消息是一个包含一组类型化字段的聚合体。许多标准的简单数据类型可用作字段类型，包括\
  \ bool、int32、float、double 和 string。您还可以将其他消息类型添加为字段类型；在您的示例中，`Products` 消息包含 Product\
  \ 消息。`= 1`、`= 2`、`= 3` 等是每个元素上的标记，用于标识该字段在二进制编码中使用的唯一“标签”。\n\n字段可以使用以下修饰符之一进行注释：\n\
  \n*   **required**：表示必须提供该字段的值；否则，该消息将被视为“未初始化”。\n\n*   **optional**：表示该字段可以设置，也可以不设置。如果未设置可选字段的值，则使用默认值，例如数值类型为\
  \ 0，字符串为空字符串，布尔值为 false 等。\n\n*   **repeated**：表示该字段可以重复任意次数（包括零次）。重复值的顺序将在 protocol\
  \ buffer 中保留。\n\n接下来，查看清单 10-18 中的 Product Server 控制器。\n\n```\npackage com.acme.ecom.product.controller;\n\
  import com.acme.ecom.product.model.ECom.Product;\nimport com.acme.ecom.product.model.ECom.Products;\n\
  @RestController\npublic class ProductRestController {\n@RequestMapping(value = \"\
  /products\", method = RequestMethod.GET)\npublic  Products getAllProducts() {\n\
  List products = getAllTheProducts();\nif(products.isEmpty()){\nLOGGER.debug(\"No\
  \ products retreived from repository\");\n}\nproducts.forEach(item->LOGGER.debug(item.toString()));\n\
  Products productsParent =\nProducts.newBuilder().addAllProduct(products).build();\n\
  return productsParent;\n}\n}\n清单 10-18\n用于发出 Protocol Buffer 的 Product Rest 控制器\
  \ (ch10\\ch10-02\\ProductServer\\src\\main\\java\\com\\acme\\ecom\\product\\controller\\\
  ProductRestController.java)\n```\n\nRest 控制器没有明显的重大区别，除了您需要导入在外部容器类 `ECom` 中定义的\
  \ Products 和 Product Java 类型。\n\n您现在需要使用所需的库来装备微服务运行时，以序列化和反序列化为 Protocol Buffer\
  \ 格式。Spring 的 `ProtobufHttpMessageConverter` 可以方便地在内部利用 Google 的库。此转换器默认支持 `application/x-protobuf`\
  \ 和 `text/plain`，并使用了官方的 com.google.protobuf:protobuf-java 库。需要注意的是，如果类路径上有正确的附加库，也可以支持其他格式。您将在配置类中实例化此\
  \ bean；请参阅清单 10-19。\n\n\n\n```\nimport org.springframework.http.converter.protobuf.ProtobufHttpMessageConverter;\n\
  @Configuration\npublic class ProductRestControllerConfiguration{\n@Bean\nProtobufHttpMessageConverter\
  \ protobufHttpMessageConverter() {\nreturn new ProtobufHttpMessageConverter();\n\
  }\n}\n清单 10-19\n配置 Protocol Buffer 消息转换器 (ch10\\ch10-02\\ProductServer\\src\\main\\\
  java\\com\\acme\\ecom\\product\\controller\\ProductRestControllerConfiguration.java)\n\
  ```\n\n以上就是 Product Server 微服务的全部内容。接下来，你将看到\nProduct Web 微服务的代码。之前为 Product Server\
  \ 微服务展示的所有代码片段以及我给出的解释仍然有效，为简洁起见，此处不再重复；相反，我将解释任何额外的需求。\n\nProduct Web 微服务必须将请求委托给\
