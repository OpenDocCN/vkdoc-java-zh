  \ id=\"txAdviceRequiresNew\" transaction-manager=\"transactionManager\">\n    <tx:attributes>\n\
  \        <tx:method name=\"reconcile\" propagation=\"REQUIRES_NEW\"\n          \
  \  rollback-for=\"QuotesReconcileRollbackException\"\n            no-rollback-for=\"\
  QuotesNoRollbackException\"/>\n    </tx:attributes>\n</tx:advice>\n\n<aop:config>\n\
  \    <aop:pointcut id=\"reconcileOperation\"\n        expression=\"execution(* com.acme.ecom.service.QuotesReconcileService.reconcile(..))\"\
  />\n    <aop:advisor advice-ref=\"txAdviceRequired\"\n        pointcut-ref=\"reconcileOperation\"\
  />\n</aop:config>\n```\n\n清单 13-16 使用 Derby、ActiveMQ 和 Atomikos 的分布式事务示例的 Spring\
  \ 配置 (ch13\\ch13-01\\XA-TX-Distributed\\Settlement-ActiveMQ-Derby\\src\\main\\resources\\\
  spring-listener-derbyl.xml)\n\n\n\n除了 `DefaultMessageListenerContainer` 之外，我已经解释了上述所有配置。`DefaultMessageListenerContainer`\
