  com.atomikos.jms.AtomikosConnectionFactoryBean\"\n    init-method=\"init\" destroy-method=\"\
  close\">\n    <property name=\"uniqueResourceName\" value=\"localhost\"/>\n    <property\
  \ name=\"xaConnectionFactoryClassName\"\n        value=\"org.apache.activemq.ActiveMQXAConnectionFactory\"\
  />\n    <property name=\"xaProperties\">\n        <props>\n            <prop key=\"\
  brokerURL\">tcp://localhost:61616</prop>\n        </props>\n    </property>\n  \
  \  <property name=\"maxPoolSize\" value=\"5\"/>\n</bean>\n\n<bean id=\"transactionManager\"\
  \n    class=\"org.springframework.transaction.jta.JtaTransactionManager\">\n   \
  \ <property name=\"transactionManager\">\n        <bean class=\"com.atomikos.icatch.jta.UserTransactionManager\"\
  \n            init-method=\"init\" destroy-method=\"close\">\n            <property\
