  \n图 8-9\nHystrix 仪表盘中的流监控\n\nRibbon：客户端负载均衡器\n在了解了 Feign 客户端和 Hystrix 降级机制之后，现在是时候介绍\
  \ Spring Cloud 中的下一个重要组件了：Ribbon。Ribbon 是一个客户端负载均衡器，它让你能够对 HTTP 和 TCP 客户端的行为进行额外控制。Feign\
  \ 已经使用了 Ribbon，因此理解 Ribbon 至关重要。\n负载均衡将传入的流量分发到两个或多个微服务之间。它使你能够在微服务应用中实现容错。负载均衡旨在优化资源使用、最大化吞吐量、最小化响应时间，并避免任何单个微服务过载。使用同一服务的多个微服务实例进行负载均衡，而不是使用单个实例，可能会以冗余为代价来提高可靠性和可用性。\n\
  Ribbon 提供了多种配置选项，例如连接超时、重试、重试算法（指数退避、有界退避）、负载均衡、容错、支持多种协议（HTTP、TCP、UDP）、支持异步和响应式模型、缓存以及批处理。\n\
  \n设计一个 Ribbon 客户端场景\n\n你将使用与 Feign 客户端部分相同的设计。但是，你将增强 Feign 客户端，使其在内部利用 Ribbon。该设计如图\
  \ 8-10 所示。\n\n![../images/477630_1_En_8_Chapter/477630_1_En_8_Fig10_HTML.jpg](img/477630_1_En_8_Fig10_HTML.jpg)\n\
  \n图 8-10\n使用 Ribbon 的设计\n\n你将使用与本章前面部分相同的 Product Server 微服务模块。在前面的部分中，你还使用了 Product\
  \ Server Alternate 微服务模块；但是，在本节中，你将只使用一个模块，即 Product Server 微服务模块，但将运行它的两个实例。这一点很重要，因为我还想演示，只要你处理好了其他设计方面（如无状态性、幂等性等），一个微服务可以实例化多个（更确切地说是复制）以实现水平扩展。\n\
  \n使用 Ribbon 客户端的代码\n\n本节的所有代码示例都放在 `ch08\\ch08-04` 文件夹中。请访问 `pom.xml` 查看显式声明的 Ribbon\
  \ 依赖项。参见代码清单 8-13。\n\n```\norg.springframework.cloud\nspring-cloud-starter-ribbon\n\
  \n代码清单 8-13\nRibbon 依赖项 (ch08\\ch08-04\\ProductWeb\\pom.xml)\n```\n\nRibbon 的核心概念是命名客户端。每个负载均衡器都是一个组件集合的一部分，这些组件协同工作以按需联系远程服务器，并且该集合有一个你作为应用程序开发者赋予它的名称（例如，使用\
  \ `@FeignClient` 注解），如代码清单 8-14 所示。\n\n```\n@FeignClient(name=\"product-proxy\"\
  )\npublic interface ProductServiceProxy extends ProductService{\n}\n代码清单 8-14\n\
  Ribbon 中的命名客户端 (ch08\\ch08-04\\ProductWeb\\src\\main\\java\\com\\acme\\ecom\\product\\\
  client\\ProductServiceProxy.java)\n```\n\n现在你需要为 Ribbon 提供配置值，这将在 `ch08\\ch08-04\\\
  ProductWeb\\src\\main\\resources\\application.properties` 中完成：\n\n```\nproduct-proxy.ribbon.listOfServers=localhost:8080,localhost:8081\n\
  ```\n\n就是这样，这将完成所有必需的底层连接工作。\n\n构建并测试 Ribbon 客户端\n\n演示 Ribbon 所需的完整代码保存在 `ch08-04`\
  \ 文件夹内。确保 MongoDB 已启动并正在运行。然后，你可以按以下顺序构建、打包并运行这三个微服务：\n\n```\ncd ch08\\ch08-04\\\
  ProductServer\nD:\\binil\\gold\\pack03\\ch08\\ch08-04\\ProductServer>make\nD:\\\
  binil\\gold\\pack03\\ch08\\ch08-04\\ProductServer>mvn -Dmaven.test.skip=true clean\
  \ package\nD:\\binil\\gold\\pack03\\ch08\\ch08-04\\ProductServer>run1\nD:\\binil\\\
  gold\\pack03\\ch08\\ch08-04\\ProductServer>java -jar -Dserver.port=8080 .\\target\\\
  Ecom-Product-Microservice-0.0.1-SNAPSHOT.jar\ncd ch08\\ch08-04\\ProductServer\n\
  D:\\binil\\gold\\pack03\\ch08\\ch08-04\\ProductServer>run2\nD:\\binil\\gold\\pack03\\\
  ch08\\ch08-04\\ProductServer>java -jar -Dserver.port=8081 .\\target\\Ecom-Product-Microservice-0.0.1-SNAPSHOT.jar\n\
  cd ch08\\ch08-03\\ProductWeb\nD:\\binil\\gold\\pack03\\ch08\\ch08-04\\ProductWeb>make\n\
  D:\\binil\\gold\\pack03\\ch08\\ch08-04\\ProductWeb>mvn -Dmaven.test.skip=true clean\
  \ package\nD:\\binil\\gold\\pack03\\ch08\\ch08-04\\ProductWeb>run\nD:\\binil\\gold\\\
  pack03\\ch08\\ch08-04\\ProductWeb>java -jar -Dserver.port=8082 .\\target\\Ecom-Product-Microservice-0.0.1-SNAPSHOT.jar\n\
  ```\n\n最后一条命令将在端口 8082 上启动 Product Web。你应该已经注意到，Product Server 微服务的两个实例正在端口 8080\
  \ 和 8081 上运行。这就解释了为什么你使用了以下配置：\n\n```\nproduct-proxy.ribbon.listOfServers=localhost:8080,localhost:8081\n\
  ```\n\n现在，你可以在 Chrome 浏览器中打开这个 HTML 工具：\n\n```\nch08\\ch08-04\\ProductWeb\\src\\\
  main\\resources\\product.html\n```\n\n浏览器客户端在加载自身时，会向监听在端口 8082 的 Product Web 发起一个请求，该请求将通过\
  \ Feign 客户端代理，将调用委托给 Product Server 微服务的任意一个实例。\n重复刷新浏览器，将会在 Product Web 微服务向 Product\
  \ Server 微服务的两个实例之间进行负载均衡，你可以通过查看 Product Server 微服务命令窗口中发生的日志来验证这一点。如果你关闭其中一个 Product\
  \ Server 微服务并刷新浏览器，你将看到请求将始终发送到正在运行的另一个 Product Server 实例。如果你重新启动之前关闭的 Product Server\
  \ 微服务，Ribbon 负载均衡将再次生效，在 Product Web 微服务向 Product Server 微服务的两个实例之间交替进行调用。\n\nEureka：服务注册中心\n\
  Eureka 是一个基于 REST 的注册中心服务，主要用于公有云部署，尤其是在 AWS 云中。使用 Eureka，你可以定位微服务以实现负载均衡和故障转移。Eureka\
  \ 是 Spring Cloud 的服务注册中心，它充当了微服务的电话簿。每个微服务都会向服务注册中心自我注册，告知注册中心它的位置（主机、节点名称、端口等）以及可能还有其他服务特定的元数据。Eureka\
  \ 包含两部分：Eureka Server 和一个客户端组件 Eureka Client，后者使得与注册中心服务的交互更加容易。该客户端还内置了一个负载均衡器，可以执行基本的轮询负载均衡。\n\
  \n像 Eureka 这样的服务注册中心还有另一个特性，它为服务消费者提供了一层或多层间接寻址。这意味着服务消费者可以使用逻辑服务名称进行注册中心查找，并且这个逻辑服务名称可能映射到不同的实际部署服务，其物理地址条目与上述逻辑名称相对应。这使服务消费者与物理部署环境中实际服务细节或任何其他变化隔离开来。在“Ribbon”部分解释的示例中，你可能已经注意到服务\
  \ URL 的硬编码值，例如：\n\n```\nlocalhost:8080,localhost:8081\n```\n\n\n\n这种做法并不理想。DNS（域名系统）可用于解决类似问题；然而，在企业应用中面对数百个微服务时，DNS\
  \ 相对笨重。此外，你也不希望将微服务的服务器细节暴露在外围或 DMZ（非军事区）之外。在基于微服务的企业应用中，服务消费者通常是其他微服务。因此，这些微服务需要询问诸如服务拓扑（“是否有可用的‘产品服务’？如果有，在哪里？”）和服务能力（“你能处理\
  \ A、B 和 C 吗？”）之类的问题。这正是 Eureka 和 Consul 等服务注册中心发挥作用的地方。Eureka 对通信协议或方法没有任何限制，因此你可以使用\
  \ Eureka 来采用 thrift、http(s) 或任何其他 RPC 机制等协议。\n\n当已有许多软件和硬件负载均衡器（包括 AWS Elastic Load\
  \ Balancer 和 AWS Route 53）时，你可能仍会怀疑是否需要 Eureka。AWS Elastic Load Balancer 用于暴露边缘服务，这些服务通常连接最终用户的网络流量，而\
  \ Eureka 则满足中间层负载均衡的需求，或者用我们的术语来说，是微服务注册和负载均衡。Route 53 类似于 DNS 服务，你可以在其中托管 DNS 记录，甚至适用于非\
  \ AWS 数据中心，因此它带有传统基于 DNS 的负载均衡解决方案的相关缺点：你的流量仍可能被路由到不健康甚至不存在的服务器，这在 AWS 为自动扩展配置的公共云部署中非常典型。由于你应该倾向于让微服务无状态（非粘性），Eureka\
  \ 提供了更好的可扩展性模型，因为你的微服务能够抵御负载均衡器（Eureka）的故障——关于可用服务器的信息会缓存在客户端。这确实需要少量内存，但这种增强的弹性并不会过多地影响整体资源考量。\n\
  \n设计一个启用 Eureka 的场景\n\n你将通过引入几个新组件来修改设计，如图 8-11 所示。这里你用 `RestTemplate` 替换了 `ProductServiceProxy`。这意味着\
  \ Product Web 微服务现在将使用 `RestTemplate` 来消费 Product Server 微服务的任何实例。`RestTemplate`\
  \ 简化了与 HTTP 服务器的通信，第 7 章的“开发 RESTful Web 服务”部分已经解释了如何使用 `RestTemplate` 与 `RestController`\
  \ 通信。你将在此处进行扩展。使用 `RestTemplate` 的另一个意图是，当 `RestTemplate` 在类路径上并且定义了 `LoadBalancerClient`\
  \ bean 时，你可以通过自动配置的 `RestTemplate` 间接使用 Ribbon，从而在之前的 Ribbon 示例基础上进行构建。\n\n![../images/477630_1_En_8_Chapter/477630_1_En_8_Fig11_HTML.jpg](img/477630_1_En_8_Fig11_HTML.jpg)\n\
  \n图 8-11\n使用 Eureka 的设计\n\n通过启用 Eureka 注册中心，所有微服务在启动时都会自行注册到注册中心。此外，在之前的示例中，你看到了如何通过多次实例化同一个\
  \ Product Server 微服务来实现冗余。你将遵循相同的模式来处理 Eureka，以便在服务注册中心级别也实现冗余。\n\n使用 Eureka 的代码\n\
  \n本节的所有代码示例都放在文件夹 `ch08\\ch08-05` 中。访问 `pom.xml` 可以看到显式引用了 Eureka Server 依赖项。参见清单\
  \ 8-15。\n\n```\norg.springframework.cloud\nspring-cloud-starter-eureka-server\n\n\
  清单 8-15\nEureka 依赖项 (ch08\\ch08-05\\Eureka\\pom.xml)\n```\n\n接下来，你需要 Spring Cloud\
  \ 的 `@EnableEurekaServer` 来启动一个注册中心，其他微服务可以与之通信。这是在常规的 Spring Boot 应用程序 `main` 类中完成的，只需添加一个注解即可启用服务注册中心。参见清单\
  \ 8-16。\n\n```\n@EnableEurekaServer\n@SpringBootApplication\npublic class EurekaRegistryApplication\
