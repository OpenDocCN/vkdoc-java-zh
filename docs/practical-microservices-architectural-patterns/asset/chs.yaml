  getProduct(product.getId())).withSelfRel(), linkTo(\nProductRestController.class).slash(\"\
  productImg\").slash(\nproduct.getImgUrl()).withRel(\"imgUrl\")});\nreturn new ResponseEntity>(productRes,\n\
  HttpStatus.OK);\n}\n}\n清单 17-3\n获取产品详情 (ch17\\ch17-01\\Ax2-Ecom-No-Security\\Ecom-product\\\
  src\\main\\java\\com\\acme\\ecom\\product\\controller\\ProductRestController.java)\n\
  ```\n\n`product_service.js`\n按如下方式检索某个产品类别下列出的所有产品：\n\n```\nhttp.get(sessionStorage.getItem('apiUrl')+'/product/products/'+id)\n\
  ```\n\n\n\n产品详情应与库存信息整合，以便用户判断能否将该产品的任意数量添加到购物车。图 17-5 所示的架构表明，库存信息仅存在于“核心”微服务中，而该微服务位于产品微服务之外。\n\
  你可以做出一个架构决策，允许浏览器通过请求产品微服务来获取产品详情，然后请求核心微服务来获取该特定产品的库存信息，从而在客户端层进行数据整合。\n但微服务的原则指出，微服务应自给自足且独立。这意味着，如果你考虑产品微服务和核心微服务，每个微服务都应能独立运行和提供服务，无论另一个微服务是否正常运行。如果核心微服务宕机，ACME\
  \ 在线商店仍应能以功能缩减的方式运行，允许用户访问主页、浏览产品类别、列出某类别下的产品、查看所选产品的详情（或许也包括库存信息！）、选择并添加商品到购物车等。或许只有创建订单功能会在核心微服务重新启动并运行后才能正常工作。因此，你将采用一种不同的架构方法，允许产品微服务维护一个库存的物化视图，这是一个只读副本。\n\
  \n要从这个只读副本中检索产品的库存详情，你需要使用库存仓库，如清单 17-4 所示。\n\n```\n@RepositoryRestResource(collectionResourceRel\
  \ = \"inventory\",\npath = \"inventory\")\npublic interface InventoryRepository\
  \ extends\nMongoRepository  {\npublic Inventory findByInventoryId(\n@Param(\"inventoryId\"\
  ) Long  inventoryId);\npublic Inventory findBySku(@Param(\"sku\") String  sku);\n\
  }\nproduct_service.js 检索某产品类别下列出的所有产品，如下所示：\nhttp.get(sessionStorage.getItem('apiUrl')+'/product/inventory/search/findBySku?sku='+productCode)\n\
  清单 17-4\n库存只读仓库 (ch17\\ch17-01\\Ax2-Ecom-No-Security\\Ecom-product\\src\\main\\\
  java\\com\\acme\\ecom\\product\\inventory\\repository\\InventoryRepository.java)\n\
  ```\n\n现在，从上述两个 API 源和客户端层整合数据就很简单了。\n\n**将产品添加到购物车**\n这是一个直接的实现，将选定的待订购商品添加到 `org.springframework.cache.CacheManager`\
  \ 中，然后再检索出来，因此此处不展示代码片段。代码位于文件夹 `ch17\\ch17-01\\Ax2-Ecom-No-Security\\Ecom-cart`\
  \ 中。\n\n**创建新订单**\n\n从现在开始要探索的用例并非简单，因为微服务之间的控制流有多个方向。如前所述，你不会使用任何同步风格的微服务间通信；相反，你将利用\
  \ Axon CQRS 事件驱动基础设施来促进端到端的控制流。你将使用类似于图 17-6 所示的表示方式，以便更容易理解用例执行过程中的控制流和状态变化。\n\n\
  ![../images/477630_1_En_17_Chapter/477630_1_En_17_Fig6_HTML.jpg](img/477630_1_En_17_Fig6_HTML.jpg)\n\
  \n图 17-6\n创建新订单\n\n参考图 17-6，流程已标注并说明如下。\n\n1.  `order_service.js`\n    通过 HTTP 发送\
  \ REST JSON 请求以创建新订单：\n\n```\n    $http.post(sessionStorage.getItem('apiUrl')+'/core/order/',orderDTO)\n\
  \    ```\n\n此请求将到达 API 网关。\n\n2.  API 网关通过查看服务注册表来解析 URL，并将请求定向到 Ecom-core 微服务中的订单\
  \ REST 控制器。\n\n3.  订单 REST 控制器创建一个新的 `OrderCreateCommand`，并将其发送到命令网关并等待。参见清单 17-5。\n\
  \n```\n    @RestController\n    @RequestMapping(\"/order\")\n    public class OrderController\
  \ {\n    @Autowired\n    private CommandGateway commandGateway;\n    @RequestMapping(method\
  \ = RequestMethod.POST)\n    @Transactional\n    @ResponseBody\n    public OrderCreationStatus\
  \ createOrder(@RequestBody OrderDTO orderDTO) {\n    OrderCreateCommand orderCommand\
  \ = new OrderCreateCommand(\n    orderDTO.getUserId(), orderDTO.getLineItems());\n\
  \    commandGateway.sendAndWait(orderCommand);\n    return OrderCreationStatus.SUCCESS;\n\
  \    }\n    }\n    清单 17-5\n    用于创建新订单的订单控制器 (ch17\\ch17-01\\Ax2-Ecom-No-Security\\\
  Ecom-core\\src\\main\\java\\com\\acme\\ecom\\core\\web\\OrderController.java)\n\
  \    ```\n\n4.  命令网关将 `OrderCreateCommand` 传递到命令总线。\n\n5.  `OrderCommandHandler`\
  \ 从命令总线消费 `OrderCreateCommand`。参见清单 17-6。\n\n```\n    @Component\n    public class\
  \ OrderCommandHandler {\n    @Autowired\n    @Qualifier(value = \"orderRepository\"\
  )\n    private Repository orderRepository;\n    @CommandHandler\n    public void\
  \ handleNewOrder(OrderCreateCommand orderCreatedCommand) {\n    Order order = new\
  \ Order(Long.valueOf(new Random().nextInt()));\n    order.setOrderDate(new Date());\n\
  \    order.setOrderStatus(OrderStatus.PAID);\n    order.setUserId(orderCreatedCommand.getUserId());\n\
  \    double total = 0;\n    if (orderCreatedCommand.getLineItems() != null) {\n\
  \    for (LineItemDTO lineItemDto :\n    orderCreatedCommand.getLineItems()) {\n\
  \    if (lineItemDto.getInventoryId() != null) {\n    LineItem lineItem = new LineItem(new\
  \ Random().nextLong(),\n    lineItemDto.getProductId(), lineItemDto.getQuantity(),\n\
  \    lineItemDto.getPrice(), lineItemDto.getInventoryId());\n    total = total +\
  \ lineItemDto.getPrice();\n    order.addLineItem(lineItem);\n    Inventory inventory\
  \ = inventoryRepository.load(lineItemDto.getInventoryId());\n    inventory.updateProductStock(lineItemDto.getQuantity(),\n\
  \    ProductStockOperation.DEPRECIATE);\n    }\n    }\n    }\n    order.setTotal(total);\n\
  \    order.notifyOrderCreation();\n    orderRepository.add(order);\n    }\n    }\n\
  \    清单 17-6\n    OrderCommandHandler 的 handleNewOrder 方法 (ch17\\ch17-01\\Ax2-Ecom-No-Security\\\
  Ecom-core\\src\\main\\java\\com\\acme\\ecom\\core\\order\\command\\handler\\OrderCommandHandler.java)\n\
  \    ```\n\n命令处理过程是原子性的，因此它要么完全处理，要么完全不处理。Axon 框架使用工作单元（UoW）来跟踪命令处理器执行的操作。命令处理器完成后，Axon\
  \ 会尝试提交在 UoW 中注册的操作。这包括将修改后的聚合存储到各自的仓库中，并在事件总线上发布事件。然而，UoW 并不能替代事务。UoW 仅确保在命令处理器成功执行后，对聚合所做的更改被存储。如果在存储某个聚合时发生错误，已存储的任何聚合都不会回滚。你可以将事务绑定到\
  \ UoW。像 `SimpleCommandBus` 和 `DisruptorCommandBus` 这样的 `CommandBus` 实现允许你配置一个事务管理器。该事务管理器用于创建事务，并绑定到用于管理命令处理过程的\
  \ UoW。如清单 17-7 所示。\n\n\n\n```\n    @Configuration\n    @RefreshScope\n    public\
  \ class EcomCoreAppConfiguration {\n    @Bean\n    public SimpleCommandBus commandBus()\
  \ {\n    SimpleCommandBus simpleCommandBus = new SimpleCommandBus();\n    simpleCommandBus.setDispatchInterceptors(\n\
  \    Arrays.asList(new BeanValidationInterceptor()));\n    SpringTransactionManager\
  \ transcationMgr =\n    new SpringTransactionManager(txManager);\n    simpleCommandBus.setTransactionManager(transcationMgr);\n\
  \    return simpleCommandBus;\n    }\n    }\n    清单 17-7\n    将事务绑定到工作单元 (ch17\\\
  ch17-01\\Ax2-Ecom-No-Security\\Ecom-core\\src\\main\\java\\com\\acme\\ecom\\core\\\
  EcomCoreAppConfiguration.java)\n    ```\n\n此处，`SpringTransactionManager` 是一个 `TransactionManager`\
  \ 实现，它使用 `PlatformTransactionManager` 作为底层事务管理器。\n\n请注意，你在单个事务中使用了两个聚合实体（库存和订单），但由于这两个聚合实体由同一节点上的同一资源管理器管理，因此不涉及分布式事务。\n\
  \n6.  `OrderCommandHandler` 首先在库存 AXON 聚合中扣减可用库存。请参见清单 17-8。\n\n```\n    @Entity\n\
  \    @Table(name = \"INVENTORY\")\n    public class Inventory extends AbstractAggregateRoot\
  \ {\n    public void updateProductStock(Integer count,\n    ProductStockOperation\
  \ stockoperation) {\n    if (stockoperation.equals(ProductStockOperation.DEPRECIATE))\
  \ {\n    if (this.quantity - count >= 0) {\n    this.quantity = this.quantity -\
  \ count;\n    } else {\n    throw new OutOfStockException(this.id);\n    }\n   \
  \ } else {\n    this.quantity = this.quantity + count;\n    }\n    registerEvent(new\
  \ InventoryUpdateEvent(id, sku, quantity));\n    }\n    }\n    清单 17-8\n    库存聚合\
  \ updateProductStock (ch17\\ch17-01\\Ax2-Ecom-No-Security\\Ecom-core\\src\\main\\\
  java\\com\\acme\\ecom\\core\\inventory\\model\\Inventory.java)\n    ```\n\n当你查看产品列表页面或产品详情页面时，看到的库存数据来自\
  \ Ecom-product 微服务中库存物化视图的缓存数据。然而，当你创建订单时，所需库存会与可用库存进行验证，这是针对库存聚合实体（即库存的写模型）进行的。类似场景在许多业务流程中很常见，例如销售酒店房间和航班座位。当你开始搜索酒店房间或航班座位时，房间或座位的初始可用性通常是“近乎准确”的近似值，可能来自缓存或中间供需网关。当实际预订完成时，总会对请求的座位或房间数量与单一事实来源（即写模型）中的实际可用性进行即时或最终的验证。\n\
  \n7.  在扣减库存时，库存聚合会向集群事件总线注册一个 `InventoryUpdateEvent`。\n\n8.  `OrderCommandHandler`\
  \ 在第 5 步消费 `OrderCreateCommand` 时，在成功扣减库存后还会创建一个新订单。请参见清单 17-9。\n\n```\n    @Entity(name=\"\
  order\")\n    @Table(name = \"CUSTOMER_ORDER\")\n    public class Order extends\
  \ AbstractAggregateRoot {\n    @OneToMany(cascade = CascadeType.ALL, mappedBy=\"\
  order\", orphanRemoval=true)\n    private Set lineItems;\n    public void addLineItem(LineItem\
  \ lineItem){\n    if(this.lineItems==null){\n    this.lineItems=new HashSet();\n\
  \    }\n    lineItem.setOrder(this);\n    this.lineItems.add(lineItem);\n    }\n\
  \    public void notifyOrderCreation() {\n    List lineItemDTOs = new ArrayList();\n\
  \    for (LineItem lineItem : lineItems) {\n    lineItemDTOs.add(new LineItemDTO(lineItem.getProduct(),\n\
  \    lineItem.getPrice(), lineItem.getQuantity(),\n    lineItem.getInventoryId()));\n\
  \    }\n    registerEvent(new OrderCreatedEvent(id, userId, orderStatus.name(),\n\
  \    total, orderDate, lineItemDTOs));\n    }\n    }\n    清单 17-9\n    订单 notifyOrderCreation\
  \ (ch17\\ch17-01\\Ax2-Ecom-No-Security\\Ecom-core\\src\\main\\java\\com\\acme\\\
  ecom\\core\\order\\model\\Order.java)\n    ```\n\n9.  一旦订单聚合收到新订单创建的通知，它就会向集群事件总线注册一个\
  \ `OrderCreatedEvent`。\n\n10. 对于每个新的 `OrderCreatedEvent`，都会实例化一个新的订单处理 Saga 实例，如清单\
  \ 17-10 所示。\n\n```\n    public class OrderProcessSaga extends AbstractAnnotatedSaga\
