  \ 14-18 所示。\n\n![../images/477630_1_En_14_Chapter/477630_1_En_14_Fig18_HTML.jpg](img/477630_1_En_14_Fig18_HTML.jpg)\n\
  \n图 14-18\n测试用例 5 控制台，中间状态和完成状态\n\n报价消息的结算也被下游微服务记录在 `Stock Transaction` 表中，如图 14-19\
  \ 所示。\n\n![../images/477630_1_En_14_Chapter/477630_1_En_14_Fig19_HTML.jpg](img/477630_1_En_14_Fig19_HTML.jpg)\n\
  \n图 14-19\n测试用例 5 期间的 `Stock Transaction` 表\n\n因为您模拟了下游微服务的消息监听器在读取消息时出错，消息代理将重新向该下游微服务投递该消息。但是，当此报价消息作为重复消息到达下游微服务时，由于解决方案的增强设计，下游微服务现在足够智能，能够通过查看\
  \ `Stock Transaction` 表（图 14-19）来识别此报价消息是重复的，因此不会再次结算；用户余额的最终状态保持如图 14-18 所示。\n\n\
  *“如果消费者使用消息来简单地写入（且从不覆盖）数据库中的某个值，那么多次收到一条消息与恰好收到一次消息没有区别”。* ^(³⁵)\n\n这对于某些应用来说是成立的，但并非对所有应用都成立。至少，它要求应用相应地解释传入的消息。关于上述与微服务相关的消息传递声明，还有许多其他方面；然而，我们将把它们留待另一本关于此主题的教科书来讨论，因为相关的方面非常多。\n\
  \n测试消息乱序到达场景\n\n您现在已经执行到测试用例 5。在执行测试用例 8 以模拟消息乱序到达之前，您将执行测试用例 6 和测试用例 7，但我不再进一步解释，因为我不想展示任何超出您在第\
  \ 13 章相应章节中已看到的内容。\n\n对于测试用例 6，打开 Postman 并创建一条新报价，如下所示：\n\n```\nhttp://localhost:8080/api/quotes\n\
  METHOD: POST; BODY: Raw JSON\n{ \"symbol\" : \"MSFT\", \"sellerId\" : 11, \"buyerId\"\
  \ : 21, \"amount\" : 600, \"test\" : 6, \"delay\" : 2 }\n```\n\n持续观察所有三个控制台。一旦确认测试用例\
  \ 6 完成，再次打开 Postman 并创建另一条新报价来执行测试用例 7，如下所示：\n\n```\n{ \"symbol\" : \"ORCL\", \"\
  sellerId\" : 11, \"buyerId\" : 21, \"amount\" : 700, \"test\" : 7, \"delay\" : 2\
  \ }\n```\n\n如果您完全按照指示操作，在测试用例 7 完成时，您的控制台将如图 14-20 和图 14-21 所示。\n\n![../images/477630_1_En_14_Chapter/477630_1_En_14_Fig21_HTML.jpg](img/477630_1_En_14_Fig21_HTML.jpg)\n\
  \n图 14-21\n`Stock Transaction` 表，测试用例 8 之前\n\n![../images/477630_1_En_14_Chapter/477630_1_En_14_Fig20_HTML.jpg](img/477630_1_En_14_Fig20_HTML.jpg)\n\
  \n图 14-20\n`Quotes` 和 `User` 表，测试用例 8 之前\n\n\n\n现在实体已处于可执行测试用例 8 的状态，这是本节要考察的实际测试用例。此场景的测试稍显棘手，因为你需要根据测试装置协调每个操作的时机。我将基于我的测试装置配置进行说明，如果你没有对示例配置做任何修改，这些配置同样适用于你。\n\
  \n你需要向上游处理系统发送一个新的报价单，但希望延迟一段时间再处理。当这个报价单等待延迟结束时，你还想再向上游处理系统发送另一个新报价单，这个报价单将几乎无延迟地直接完成处理。这样一来，后创建的报价单会先到达下游系统进行后续处理，而最初创建的报价单则随后到达。通过这种方式，你将模拟消息在下游系统乱序到达的情况。\n\
  \n在开始为此测试用例发送请求之前，请完整阅读本节内容一次，以便在心理上做好按照指示发送新报价单的准备。然后回到此处继续执行实际测试。\n\n再次打开 Postman\
  \ 并发送一个新报价单，如下所示：\n\n```\nhttp://localhost:8080/api/quotes\n方法：POST；请求体：原始 JSON\n\
  ```\n\n请注意，你在测试请求负载中附加了 90 秒的延迟，如图 14-22 所示。\n\n![../images/477630_1_En_14_Chapter/477630_1_En_14_Fig22_HTML.jpg](img/477630_1_En_14_Fig22_HTML.jpg)\n\
  \n图 14-22\n测试用例 8 控制台，创建第一个报价单\n\n```\n{ \"symbol\" : \"QCOM\", \"sellerId\" : 11,\
  \ \"buyerId\" : 21, \"amount\" : 800, \"test\" : 8, \"delay\" : 90}\n```\n\n持续观察上游微服务控制台（命令提示符控制台），当报价处理器任务超时时，它将获取这个新报价单并将状态从“新建”更改为“已确认”，但在完成端到端事务之前，它会按照你提供的\
  \ 90 秒延迟进入休眠状态。见图 14-23。\n\n![../images/477630_1_En_14_Chapter/477630_1_En_14_Fig23_HTML.jpg](img/477630_1_En_14_Fig23_HTML.jpg)\n\
  \n图 14-23\n测试用例 8 控制台，处理第一个报价单\n\n这 90 秒具有重要意义，因为报价处理器任务的下一次超时将在接下来的 60 秒内发生，而在那次超时时，它不应获取此报价单，因为它已处于处理状态（报价单状态不是“新建”）。\n\
  \n关键点来了：一旦（在 10 到 20 秒内）报价处理器任务获取报价单进行处理并进入你提供的 90 秒延迟休眠状态，你需要立即发送另一个新报价单（理想情况下，你已准备好另一个\
  \ Postman 会话并填充好数据），如下所示：\n\n```\nhttp://localhost:8080/api/quotes\n方法：POST；请求体：原始\
  \ JSON\n{ \"symbol\" : \"GILD\", \"sellerId\" : 11, \"buyerId\" : 21, \"amount\"\
  \ : 900, \"test\" : 8, \"delay\" : 2 }\n```\n\n这第二个新报价单如图 14-24 所示。仅此而已，测试执行步骤到此结束。\n\
  \n![../images/477630_1_En_14_Chapter/477630_1_En_14_Fig24_HTML.jpg](img/477630_1_En_14_Fig24_HTML.jpg)\n\
  \n图 14-24\n测试用例 8 控制台，创建第二个报价单\n\n当报价处理器任务下次超时时，它将仅获取这第二个新报价单。这是因为尽管第一个报价单仍在上游系统中处理，但其状态已更新为“已确认”，如图\
  \ 14-24 所示。这是通过将上游微服务中拍卖服务的事务标记为`TX_REQUIRES_NEW`来实现的。\n\n对于第二个新报价单，处理延迟可以忽略不计，它完成上游处理后，通过\
  \ ActiveMQ 到达下游系统进行后续处理。你预期第一个报价单仍在上游系统的处理阶段。这样，消息在下游系统中就出现了乱序。这种情况将按图 14-25 所示得到解决。\n\
  \n![../images/477630_1_En_14_Chapter/477630_1_En_14_Fig25_HTML.jpg](img/477630_1_En_14_Fig25_HTML.jpg)\n\
  \n图 14-25\n测试用例 8 控制台，第二个报价单先结算\n\n图 14-26 也证实，在测试用例 8 期间第二个创建的报价单确实被记录在`Stock Transaction`表中，并且该报价单处于已结算状态。\n\
  \n![../images/477630_1_En_14_Chapter/477630_1_En_14_Fig26_HTML.jpg](img/477630_1_En_14_Fig26_HTML.jpg)\n\
  \n图 14-26\n测试用例 8 期间的 Stock Transaction 表\n\n持续观察浏览器控制台。很快你将看到下游系统中用户的运行余额发生变化。这是第一个报价单的效果，其上游处理被延迟，导致它乱序到达下游系统并最终完成结算，如图\
  \ 14-27 所示。\n\n![../images/477630_1_En_14_Chapter/477630_1_En_14_Fig27_HTML.jpg](img/477630_1_En_14_Fig27_HTML.jpg)\n\
  \n图 14-27\n测试用例 8 控制台，第一个报价单作为第二个结算\n\n在第 13 章的“构建并测试示例的 Happy Flow”部分，你了解到每当用户账户更新时，上游系统中最新的报价单创建时间会被更新为最后报价时间。在此处的演示中，用户账户的最后报价时间并未根据第一个创建的报价单（最后到达）而改变。这是正确的，但在第\
  \ 13 章中你未能实现这一点。由于解决方案的增强设计，下游微服务现在足够智能，能够通过详细检查到达的报价消息来理解，即使对于乱序到达的消息也能满足要求。总的来说，无论你使用何种事务范式（是否采用宽松的\
  \ BASE），当消息顺序很重要时，你都应该始终添加代码和设计来处理乱序消息。\n\n图 14-28 显示了`Stock Transaction`表，该表也反映了从原始报价单创建顺序角度来看消息乱序的记录情况。\n\
  \n![../images/477630_1_En_14_Chapter/477630_1_En_14_Fig28_HTML.jpg](img/477630_1_En_14_Fig28_HTML.jpg)\n\
  \n图 14-28\n测试用例 8 后的 Stock Transaction 表\n\n选择事务选项\n你在“全局与本地资源”一节中得出结论，论证了如果你为架构选择选项\
  \ 1，那么当从队列中取出消息供报价结算微服务进行结算时，你仍然面临两阶段事务问题。如果你将报价结算视为纯粹的后台处理过程，那么继续使用两阶段事务的一个理由是，你最大化面向客户微服务的吞吐量和可用性，同时以相对较低的后台微服务响应性作为权衡。\n\
  \n但是，如果在微服务架构的某些部分，两阶段提交事务永远不可接受呢？即使你像前面讨论的那样，证明在特定用例中使用它们是合理的，两阶段提交事务也伴随着一系列影响。以下是其中几点：\n\
  \n*   两阶段提交事务协调器是单点故障。你需要分布式和复制的日志来保持状态，并保持协调器无状态以解决此问题。^(³⁶)\n\n\n\n*   两阶段提交事务与本地事务相比，与资源的往返通信次数大约多出两倍，显得过于“啰嗦”。\n\
  *   资源锁的持有时间稍长，这在某些情况下会阻碍可扩展性。\n*   最后但同样重要的是，两阶段提交事务并不能解决所有问题。当出现问题时，例如数据库崩溃后需要恢复，你可能仍然需要人工干预。为了避免这种情况，通常更倾向于采用某种形式的热故障转移架构。\n\
  \n你需要根据具体情况，在两阶段事务和本地事务之间做出明智的选择。对于你未来开发的许多微服务架构来说，情况都将如此。为了使场景更具体，假设图 14-7 中所示的**架构选项\
  \ 1**比选项 2 更可接受。如果是这样，那么在需要时，如何进一步避免报价结算微服务与 ActiveMQ 消息代理之间的两阶段事务，同时仍然保证数据的完整性？让我们在下一节打开这个潘多拉魔盒。\n\
  \n消息队列、窥探与客户端确认\n假设你想采用图 14-7 中所示的**架构选项 1**，并且仍然希望避免报价结算微服务与 ActiveMQ 消息代理之间的两阶段提交事务。当你避免使用两阶段提交事务时，如果数据库操作和消息队列操作由分区资源支持，那么它们就无法原子性地执行。如果它们无法原子性地执行，你就不希望自动封装从队列中读取消息和确认读取消息的操作；相反，应该由客户端程序或客户端代码来控制。JMS\
  \ 规范支持两种消息传递类型：持久性和非持久性。如果你希望消息在传递给代理后始终可供消息消费者使用，即使该消费者在消息发送时未运行，也应使用持久性消息。当消息被消费者消费并确认后，它通常会从代理的消息存储中删除。\n\
  \n`Javax.jms.Session`可以被指定为事务性的。当事务性时，会话支持单一事务序列。每个事务将一组消息发送和一组消息接收组合成一个原子工作单元。实际上，事务将会话的输入消息流和输出消息流组织成一系列原子单元。当事务提交时，其原子输入单元被确认，其关联的原子输出单元被发送。如果执行了事务回滚，则事务的已发送消息将被销毁，并且会话的输入将自动恢复。\n\
  \n注意\n与 XA 事务不同，JMS 事务仅关注单个连接的 JMS 消息。回滚或提交不会扩展到单个连接之外。\n\n在本章以及第 13 章的示例中，你使用了以下配置：\n\
  \n或者，可以将`SESSION_TRANSACTED`值作为参数传递给`Connection`对象上的`createSession(int sessionMode)`方法，以指定会话应使用本地事务。使用时，它会通过`Session.commit()`来汇总确认。\n\
  \n```\nSession session = connection.createSession(true, Session.SESSION_TRANSACTED);\n\
  ```\n\n通过指定`false`和`AUTO_ACKNOWLEDGE`，你可以创建一个非事务性会话，并且会话会自动确认消息。当消息成功从`receive()`方法或`onMessage()`方法返回时，它会自动被确认。如果在执行`receive()`方法或`onMessage()`方法时发生故障，消息会自动重新投递。JMS\
  \ 提供者管理消息重新投递，并保证一次性投递语义。但是，如果应用程序在`receive()`返回之后、消息被处理之前崩溃，消息仍然可能丢失。\n\n```\n\
  Session session = connection.createSession(false, Session.AUTO_ACKNOWLEDGE);\n```\n\
  \n如果你创建接收者的会话，并将`false`指定为`createSession()`的第一个参数，将`Session.CLIENT_ACKNOWLEDGE`指定为其第二个参数，则你将在客户端确认模式下创建会话。这会创建一个非事务性会话，并且需要显式调用`Message`类的`acknowledge()`方法来确认消息。通过在已消费的消息上调用`acknowledge()`，客户端会确认该消息投递到的会话所消费的所有消息。客户端可以在消费每条消息时单独确认，也可以选择按应用程序定义的组来确认消息（通过调用组中最后接收到的消息的`acknowledge()`方法，从而确认该会话消费的所有消息）。已接收但未确认的消息可能会被重新投递，这是一把双刃剑：既是福音也是诅咒。说它是福音，是因为如果未确认，你可以确保消息会在稍后的某个时间点被重新投递。同时，它也是诅咒，因为如果你的应用程序设计没有处理重复消息的机制，就会导致重复处理，从而产生不利影响。\n\
  \n让我们进一步探讨这个方面。参见清单 14-16。\n\n```\n开始 两阶段事务\n开始 ActiveMQ 事务-01\n从 ActiveMQ 读取消息\n\
  开始 Derby 事务-01\n在 Derby 中记录收到的报价\n结束 Derby 事务-01\n开始 Derby 事务-02\n在 Derby 中协调用户余额\n\
  更改报价状态\n结束 Derby 事务-02\n结束 ActiveMQ 事务-01\n结束 两阶段事务\n清单 14-16\n两阶段事务内的 ActiveMQ\
  \ 和 Derby\n```\n\n你在本章前面的示例下游处理中看到的从 ActiveMQ 队列消费消息以及在 Derby 数据库中的数据库操作，可以像清单 14-16\
  \ 那样用伪代码表示。如果你移除两阶段事务，同样的操作可以重写为清单 14-17。\n\n```\n从 ActiveMQ 读取消息\n开始 Derby 事务-01\n\
  在 Derby 中记录收到的报价\n结束 Derby 事务-01\n开始 Derby 事务-02\n在 Derby 中协调用户余额\n更改报价状态\n结束 Derby\
  \ 事务-02\n确认从 ActiveMQ 读取的消息\n清单 14-17\n无两阶段事务的 ActiveMQ 和 Derby\n```\n\n这等同于清单 14-18。\n\
  \n```\n从 ActiveMQ 窥探消息\n开始 Derby 事务-01\n在 Derby 中记录收到的报价\n结束 Derby 事务-01\n开始 Derby\
  \ 事务-02\n在 Derby 中协调用户余额\n更改报价状态\n结束 Derby 事务-02\n从 ActiveMQ 移除消息\n清单 14-18\n使用本地事务的\
  \ ActiveMQ 和 Derby\n```\n\n\n\n清单 14-18 中的伪代码依赖于以下能力：在不移除消息的情况下窥探队列中的消息，以及在成功处理后从队列中移除消息。如有必要，这可以通过两个或更多独立事务来完成，如伪代码所示：一个事务处理消息队列，另一个事务在用户数据库中记录报价消息，第三个事务则用于协调用户余额并更改报价状态。用户余额协调和报价状态更改是原子性提交的；然而，由于这两个操作发生在同一个本地资源中，因此不需要两阶段事务。除非数据库操作成功提交，否则队列操作不会提交。数据库操作期间的部分失败将导致队列操作保持未提交状态，这样消息迟早会被重新投递，并重新开始处理。该算法现在支持部分失败，同时仍能提供事务性保证。这种算法或方法是在不使用分布式两阶段提交事务的情况下，在分布式微服务之间实现最终一致性的一种尝试。此处提供的示例代码可以增强，以实现上述方法的多种变体；这留作练习，供您动手实践代码。请注意，这需要实现“幂等消费者模式”，而正确实现该模式颇具难度。^(³⁷)\
  \ 除了本章中的基本探索性测试用例之外，还需要进行额外的测试，以便考虑到所有可能的故障模式。\n\n总结\n和我的许多同事一样，我也曾热爱事务。自 1999 年起，我就开始使用声明式事务管理，当时我们很兴奋，因为我们是首批下载\
  \ *Sun 的 J2EE 服务器参考实现（含 EJB）*^(³⁸) *(Enterprise Java Beans) 容器* 的人之一，用于为一家欧洲航空公司实施优化其客运预订系统运营的专家系统。从那时起已经过去了\
  \ 20 年，我们仍然热爱事务，无论是本地事务还是分布式事务。然而，关键在于，分布式事务和本地事务之间的选择必须根据所涉及微服务的上下文、功能和关键性，逐案进行。在并非强制需要的情况下，设计利用分布式事务管理器的系统成本高昂，因为它可能会增加运营成本，并略微影响性能。在本章中，您看到了一些可用于设计必须最终一致的容错微服务的技术，尽管我并未解决所有可能的异常情况。在下一章中，您将扩展所学知识，研究其他一些场景，包括但不限于长时间运行的事务。\n\
  \n脚注\n\n15. 为微服务优化的事务\n\n虽然第 13 章介绍了带有工作代码的分布式事务，但您在第 14 章中以增强的设计重新审视了这些示例，旨在理解在为\
  \ BASE 事务支持设计架构时的细节和关注点。到目前为止一切顺利，但问题在于，是否有一种方法可以抽象您在这两章中看到的细节，同时仍然在微服务架构中达到所需的数据一致性水平。您将在本章中详细探讨这一点。本章中的示例并非第\
  \ 13 章和第 14 章中示例的延续，因此如果您急于理解本章中的示例，可以跳过那两章。但是，您将在本章中再次利用 Axon 框架，因此强烈建议您先阅读第 12\
  \ 章以了解 Axon 的入门知识，这样您就能在讨论中熟悉编程范式。\n\n您将在本章中探讨以下内容：\n\n*    Saga 简介\n*    分布式 Saga\
  \ 与微服务\n*    使用 Axon 2 的完整 Saga 示例\n\n微服务事务的 Saga\n第 13 章中“事务模型”一节介绍了 Saga 的概念，在本节中，您将详细探讨\
  \ Saga。\n\n\n\nSaga 详解\nSaga 的概念最早于 1987 年在一篇论文中提出，并在微服务背景下逐渐流行起来。Saga 与嵌套事务类似。在嵌套事务中，原子事务被嵌入到其他事务中。而在\
  \ Saga 中，每个事务都有一个对应的补偿事务。如果 Saga 中的任何一个事务失败，则会调用之前成功运行的每个事务的补偿事务，以抵消之前成功事务的影响。\n\
  \nSaga 通常用于对工作流中涉及的**长时间运行的事务**进行建模。不建议使用两阶段事务来控制长时间运行的事务，因为长时间锁定资源是绝对不可取的。在微服务背景下，即使不涉及长时间运行的事务，Saga\
  \ 也变得相关，原因在于我们希望拒绝两阶段提交事务。当无法使用两阶段提交事务，并且您仍希望对多步骤事务的每个阶段进行控制时，Saga 将为您提供帮助。\n\n\
  即使在微服务演进之前，Saga 的概念就已经非常流行，并且从最真实的意义上讲，许多现实世界的问题都是通过 Saga 来解决的。跨位置和/或信任边界维护一致性很难通过经典的\
  \ ACID 模型来处理，而许多现实场景都涉及这些复杂性。将资金从一个银行的账户转移到另一个银行的账户是一个经典示例，没有理由假设这些银行的软件系统彼此靠近或在一起。当您进行此类资金转账时，可以从日常经验中体会到这一点。即使资金转账近乎实时完成，以至于在各个方面看起来都是瞬间完成的，但所涉及的事务很可能并非通过两阶段提交事务执行，而是通过某种\
  \ Saga 来执行。这意味着，当您进行资金转账时，相关的借记和贷记在大多数情况下会作为两个关联的步骤发生，通过某种非两阶段事务协调器的方式进行协调，以便所有涉及的步骤要么全部发生，要么最终全部回滚。\n\
  \n另一个经典示例是预订航班、酒店和租车。单个企业拥有所有这些资源的库存可能性很小，但最终用户很可能希望在一个事务中预订其中一项或多项资源，因为对他来说，已确认的酒店预订加上未确认的航班预订用处不大。这里的另一个方面是，如果您查看此类情况下的资源管理器或资源所有者，他们可能位于信任边界之外，并且在许多情况下，他们可能是相互竞争的企业。我目前所在的公司致力于为旅游和酒店行业构建软件系统，我可以联想到我们软件设计中的许多实例，在这些实例中，类似的事务可以并且只能被设计为最终一致性。\n\
  \n图 15-1 展示了一个状态图，说明了在 Saga 中，各个事务如何逐步推进。\n\n![../images/477630_1_En_15_Chapter/477630_1_En_15_Fig1_HTML.jpg](img/477630_1_En_15_Fig1_HTML.jpg)\n\
  \n图 15-1\n说明 Saga 的状态图\n\n如图 15-1 所示，在 Saga 中，如果其中一个事务失败，则会执行每个成功运行的事务的补偿事务。这由 **Saga\
  \ 事务协调器** 进行协调。\n\n分布式 Saga\n上一节描述的 Saga 概念构建起来相当简单，因为许多工作流和业务流程模型与符号（BPMN）框架都是使用相同的类比构建的，即编排长时间运行的事务。如果要在微服务环境中协调这一点，则涉及协调多个去中心化的节点和进程，这并非易事。\n\
  \n您将首先从概念层面了解分布式 Saga 所需的各种组件。见图 15-2。\n\n*   **事务和补偿事务：**\n\n在微服务上下文中，Saga 事务最好称为请求（HTTP）或事件（命令和事件）；然而，为了讨论的简便，我们将保留“事务”这一术语。\n\
  \n分布式 Saga 是事务的集合：\n\n```\n    T1, T2, ..., Tn\n    ```\n\n每个事务都有一个补偿事务：\n\n```\n\
  \    C1, C2, ..., Cn\n    ```\n\n补偿事务 (Cn) 将在语义上撤销先前完成的对应事务 (Tn)。\n\n分布式 Saga 保证要么发生\n\
  \n```\n    T1, T2, ..., Tn\n    ```\n\n要么发生\n\n```\n    T1, T2, ..., Ti, Ci, ...,\
  \ C2, C1\n    ```\n\n因此，如图 15-1 所示，如果其中一个事务失败，则会执行每个成功运行的事务的补偿事务。\n\n![../images/477630_1_En_15_Chapter/477630_1_En_15_Fig2_HTML.jpg](img/477630_1_En_15_Fig2_HTML.jpg)\n\
  \n图 15-2\n分布式 Saga 示意图\n\n*   **Saga 日志：**\n\nSaga 日志是一个分布式日志，用于在给定 Saga 执行期间持久化每个事务/操作的状态。Saga\
  \ 日志包含各种状态变更操作，例如开始 Saga、结束 Saga、中止 Saga、开始 Ti、结束 Ti、开始 Ci 和结束 Ci。Saga 日志通常使用分布式日志实现，并且通常使用诸如\
  \ Kafka 之类的系统进行实现。\n\n*   **Saga 执行协调器 (SEC)：**\n\nSEC 编排整个逻辑，并负责 Saga 的执行。给定 Saga\
  \ 中的所有步骤都记录在 Saga 日志中，SEC 写入、读取并解释 Saga 日志中的记录。SEC 具有以下子组件：\n\n*   **控制总线：** 控制总线有效地管理一个分布在多个节点和进程之间的消息传递系统。\n\
  \n*   **流程管理器：** 流程管理器维护序列的状态，并根据中间结果确定下一个处理步骤。\n\n*   **消息关联：** 发送方将其收到的响应与其最初发送的请求关联起来。消息的\
  \ MessageID 和 CorrelationID 属性用于关联请求和响应消息。因此，关联标识符是一个唯一标识符，指示此回复是针对哪个请求消息的。\n\n\
  *   **消息序列：** 这是为了保持按原始意图发送的消息的顺序。\n\n*   **保证交付：** 通过保证交付，系统使用内置的数据存储来持久化消息。安装消息传递系统的每个节点都有自己的数据存储，以便消息可以本地存储。当发送方发送消息时，在消息安全地存储在发送方的数据存储中之前，发送操作不会成功完成。随后，在消息成功转发并存储到下一个数据存储之前，不会将其从一个数据存储中删除。通过这种方式，一旦发送方成功发送消息，该消息将始终存储在至少一台计算机的磁盘上，直到成功交付给接收方并得到接收方的确认。\n\
  \n\n\nSEC 并非一个集中控制整个执行过程的特殊流程。  \n它作为一个集中式运行时运行，但该运行时是“哑”的，执行逻辑被保存在 SEC 外部的分布式 Saga\
  \ 日志中。因此，当某个 SEC 崩溃时，可以启动另一个 SEC 实例，通过查看 Saga 日志来继续执行。这要求确保 SEC 始终保持运行状态。一旦 SEC\
  \ 发生故障，应基于相同的分布式 Saga 日志启动一个新的 SEC 进程。该分布式 Saga 日志本身也是分布式且经过复制的，因此不存在单点数据丢失的风险。\n\
  \n在了解了分布式 Saga 所需的各个组件之后，现在来看一下分布式 Saga 是如何执行的。请参见图 15-3。\n\n![../images/477630_1_En_15_Chapter/477630_1_En_15_Fig3_HTML.jpg](img/477630_1_En_15_Fig3_HTML.jpg)\n\
  \n图 15-3  \n作为有向无环图的分布式 Saga\n\n分布式 Saga 是一个有向无环图（DAG），SEC 的任务就是执行这个 DAG。有向无环图是一个没有有向环的有限有向图^(³⁹)。也就是说，它由有限数量的顶点和边（也称为弧）组成，每条边从一个顶点指向另一个顶点，并且不存在从某个顶点\
  \ (v) 出发，沿着一致方向的边序列，最终又回到 v 的情况。等价地，DAG 是一个具有拓扑排序的有向图，即顶点的一个序列，使得每条边都从序列中较早的顶点指向较晚的顶点。\n\
  \n参考图 15-2，一旦旅行服务收到预订请求，SEC 就会通过向 Saga 日志写入一条包含“开始 Saga”指令以及处理该 Saga 所需的其他元数据来启动一个\
  \ Saga。一旦该记录被持久化提交到日志中，SEC 就可以继续执行下一条指令。然后，根据图 15-3 中的 Saga DAG，SEC 可以选择执行航班、酒店或出租车预订事务中的任意一个（因为这三个事务可以并行处理）。假设首先执行航班事务。在这种情况下，SEC\
  \ 会向 Saga 日志记录一条“开始航班事务”的消息。然后，SEC 执行预订航班操作。一旦 SEC 收到航班服务的响应，它就会提交“结束航班事务”消息以及来自航班服务的响应（在\
  \ Saga 后续阶段可能需要用到）。重复执行相同的步骤，直到成功完成对航班、酒店和出租车预订服务这三个操作。最后，由于所有操作都已成功完成，SEC 会将“结束\
  \ Saga”消息提交到 Saga 日志中。这是一个成功的 Saga 执行过程，如图 15-4 所示。\n\n![../images/477630_1_En_15_Chapter/477630_1_En_15_Fig4_HTML.jpg](img/477630_1_En_15_Fig4_HTML.jpg)\n\
  \n图 15-4  \n成功分布式 Saga 的执行步骤\n\n图 15-5 展示了一个 Saga 失败的情况。\n\n![../images/477630_1_En_15_Chapter/477630_1_En_15_Fig5_HTML.jpg](img/477630_1_En_15_Fig5_HTML.jpg)\n\
  \n图 15-5  \n失败分布式 Saga 的执行步骤\n\n这与前面讨论的步骤相同，但在本例中，出租车预订过程失败了（例如，指定日期没有可用出租车）。由于检测到某个子事务（即出租车预订）失败，需要回滚到目前为止已执行的所有其他子事务。因此，在\
  \ Saga 日志中可以找到“开始出租车预订”日志（Start T3），但现在出租车预订已经失败。此时，必须遍历到目前为止已执行的 Saga 的逆 DAG，并将该\
  \ Saga 标记为失败。\n\n现在来看一下分布式 Saga 的一些有趣方面。前面提到，SEC 可以选择执行航班、酒店或出租车预订事务中的任意一个（因为这三个事务可以并行处理）。这意味着\
  \ Saga 事务可以并行执行，并且 Saga 日志可能是交错记录的，如图 15-6 所示。\n\n![../images/477630_1_En_15_Chapter/477630_1_En_15_Fig6_HTML.jpg](img/477630_1_En_15_Fig6_HTML.jpg)\n\
  \n图 15-6  \n并行执行事务的分布式 Saga\n\n这意味着 SEC 不应依赖 Saga 日志中单个日志条目的顺序。应重新审视第 14 章中“测试乱序接收消息场景”一节的讨论，其中介绍了处理此类场景的技术。\n\
  \n接下来，对于分布式 Saga 中的每个事务，消息传递语义应如下：\n\n*   事务：最多一次\n*   补偿事务：至少一次\n\n现在应重新阅读第 14\
  \ 章中“构建并测试重复发送消息场景”和“测试重复消费消息场景”两节。通过适当结合这两节中描述的技术，可以构思如何将“最多一次”和“至少一次”语义整合到整体解决方案中。使用相同的技术，还应处理表\
  \ 15-1 中列出的分布式 Saga 事务所需的额外特性。\n\n表 15-1  \n分布式 Saga 事务特性\n\n特性 | 事务 (T) | 补偿事务\
  \ (C)\n--- | --- | ---\n幂等性 | 是 | 是\n可中止 | 是 | `×`\n可交换 | 不适用 | 是\n\n关于表 15-1 中描述的补偿事务所需的可交换特性，需要稍作讨论。请参考图\
  \ 15-7。\n\n![../images/477630_1_En_15_Chapter/477630_1_En_15_Fig7_HTML.jpg](img/477630_1_En_15_Fig7_HTML.jpg)\n\
  \n图 15-7  \n分布式 Saga 中的消息延迟\n\n这里出现了两个 Start T1 事务。这是因为如果 SEC 在定义的超时时间内未收到 Start\
  \ T1 和 End T1，它可以重放 Start T1。这个延迟到达的 Start T1 可能会在补偿事务（Start C1, End C1）成功执行之后才到达待执行的服务，在这种情况下，不应尝试执行这个后来才到达的\
  \ Start T1。因此，在语义上：\n\n```\nT1 -> C1\n```\n\n或\n\n```\nC1 -> T1\n```\n\n两者应具有相同的效果。\n\
  还有更多类似的复杂性，但到现在为止应该已经掌握了要点。理想情况下，一个框架应该为你抽象掉所有这些复杂性。尽管在撰写本文时，我还没有找到一个完整的框架来执行我们之前的讨论，但我希望这样的框架最终会出现，不过我不再进一步讨论，因为此类讨论不在本书的范围内。\n\
  \n在结束这个话题之前，让我们在 Axon CQRS 和基于事件的微服务背景下，看一下图 15-2 的一个可能的设计替代方案，如图 15-8 所示。\n\n![../images/477630_1_En_15_Chapter/477630_1_En_15_Fig8_HTML.jpg](img/477630_1_En_15_Fig8_HTML.jpg)\n\
  \n图 15-8  \n事件驱动 CQRS 上下文中的分布式 Saga 示意图\n\n请注意，图 15-8 所示的设计仅用于说明目的，在下一节中将会看到，Axon\
  \ CQRS 有一个类似的 Saga 实现，但不一定与所示设计完全一致。\n\n使用 Axon 的 Saga 示例代码\n\n\n\n你将扩展第 12 章中的示例代码，该代码是一个电子商务应用的一部分。你的领域中有两个实体：订单和产品。用户可以购买产品，这将创建一个新订单。当新订单创建时，订单状态将处于“新建”状态，产品库存将减少。创建新订单还会在\
  \ `Audit` 表中添加一条记录。示例应用如图 15-9 所示。\n\n![../images/477630_1_En_15_Chapter/477630_1_En_15_Fig9_HTML.jpg](img/477630_1_En_15_Fig9_HTML.jpg)\n\
  \n图 15-9\nSaga 示例应用\n\n设计示例 Saga 场景\n\n此示例与第 12 章中“分布式命令与事件处理”一节的示例类似，不同之处在于 Handle\
  \ Command and Create Event 微服务中添加了一个 saga 事务管理器。共有五个微服务。Event Handle Core 微服务有一个事件处理器\
  \ OrderEventHandler，而 Event Handler Audit 微服务有一个事件处理器 AuditEventHandler。两者都订阅了订单创建事件。因此，你有两个微服务（Event\
  \ Handler Audit 微服务和 Event Handle Core 微服务）包含两种事件处理器类型，它们都对同一个订单创建事件感兴趣。此外，Handle\
  \ Command and Create Event 微服务有一个 saga，即 OrderProcessSaga，它也对订单创建事件感兴趣。图 15-10 展示了该设计。\n\
  \n![../images/477630_1_En_15_Chapter/477630_1_En_15_Fig10_HTML.jpg](img/477630_1_En_15_Fig10_HTML.jpg)\n\
  \n图 15-10\n为新订单启动 Saga\n\n当你订购新产品时，端到端流程中架构内的命令和事件流如下所示：\n\n![../images/477630_1_En_15_Chapter/477630_1_En_15_Fig11_HTML.jpg](img/477630_1_En_15_Fig11_HTML.jpg)\n\
  \n图 15-11\n新订单已创建\n\n1.  当你在浏览器中点击“立即订购！”按钮时，一个 REST/JSON 请求会到达订单控制器。\n2.  Create\
  \ Command Rest Controller 微服务中的订单控制器将该请求解释为写入请求，因此创建一个新订单命令并将其发送到命令网关，命令网关随后将该命令分发到分布式命令总线。\n\
  3.  分布式命令总线在跨 JVM 的命令总线实现之间形成一座桥梁。每个 JVM 上的分布式命令总线被称为一个段。\n4.  命令总线接收命令并将其路由到 Handle\
  \ Command and Create Event 微服务中的订单命令处理器。\n5.  订单命令处理器检索对应的产品并减少库存。\n6.  减少产品库存后，通过向产品实体发送更新来在产品仓库中生效更改，该更新会持久化到写入数据库。\n\
  7.  此仓库更改会向事件总线触发一个库存更新事件，事件总线随后将事件分发给所有感兴趣的事件监听器。\n8.  Event Handle Core 微服务中的产品事件处理器已订阅库存更新事件，因此它会收到库存更新详情的通知。\n\
  9.  根据库存更新事件中提到的详细信息，产品事件处理器对产品的读模型进行更改。\n10. 在第 5 步中，订单命令处理器减少了产品库存。它还根据收到的新订单命令中提到的详细信息创建一个新订单。\n\
  11. 当新订单创建时，通过插入一个新订单实体在订单仓库中生效，该实体随后被持久化到写入数据库，新订单的状态为“新建”，如图 15-11 所示。\n12. 此仓库插入操作会向事件总线触发一个订单创建事件，事件总线随后将事件分发给所有感兴趣的事件监听器。在两个外部微服务（Event\
  \ Handle Core 微服务和 Event Handler Audit 微服务）中有两个感兴趣的事件监听器。此外，订单处理 saga 也对订单创建事件感兴趣。\n\
  13. 订单处理 saga 在收到订单创建事件后启动一个新的 saga。\n14. Event Handle Core 微服务中的订单事件处理器已订阅订单创建事件，因此它会收到新订单创建详情的通知。\n\
  15. 根据订单创建事件中提到的详细信息，订单事件处理器对订单的读模型进行更改，在本例中插入一行新数据。\n16. Event Handler Audit 微服务中的审计事件处理器也已订阅订单创建事件，因此它会收到新订单创建详情的通知。\n\
  17. 根据订单创建事件中提到的详细信息，审计事件处理器在审计的读模型中添加一条新记录。\n18. 浏览器可以自行刷新，以通过查询实体的读模型来保持视图更新。\n\
  \nSaga 事件处理器中的事件处理与常规事件监听器类似，正如你在第 12 章的代码清单 12-11 中所见。方法和参数解析的相同规则在此同样适用；但有一个区别。虽然处理所有传入事件的事件监听器只有一个实例，但\
  \ saga 可能存在多个实例，每个实例只对针对不同实体实例的 saga 事件感兴趣。为了明确说明，管理 ID 为 x 的订单事务的 saga 不会对针对 ID\
  \ 为 y 的订单的事件感兴趣，反之亦然。之前启动的新 saga 将存在于内存中，并由持久化支持。如图 15-11 所示，订单工作流可以从“新建”状态进展到“已取消”或“已确认”状态。你将分别研究它们。\n\
  \n首先，你将看到 saga 因订单确认而从“新建”状态转换到“结束”状态。见图 15-12。\n\n![../images/477630_1_En_15_Chapter/477630_1_En_15_Fig12_HTML.jpg](img/477630_1_En_15_Fig12_HTML.jpg)\n\
  \n图 15-12\n订单确认后结束 Saga\n\n当你点击确认新订单时，端到端流程中架构内的命令和事件流如下：\n\n1.  当你在浏览器中点击“确认”按钮以确认一个已创建的订单时，一个\
  \ REST/JSON 请求会到达订单控制器。\n2.  Create Command Rest Controller 微服务中的订单控制器将该请求解释为写入请求，并创建一个订单状态更新命令，将其发送到命令网关，命令网关随后将该命令分发到分布式命令总线。\n\
  3.  分布式命令总线在跨 JVM 的命令总线实现之间形成一座桥梁。每个 JVM 上的分布式命令总线被称为一个段。\n4.  命令总线接收命令并将其路由到 Handle\
  \ Command and Create Event 微服务中的订单命令处理器。\n5.  订单命令处理器检索对应的订单，并将状态从“新建”更改为“已确认”。\n\
  6.  更改订单状态后，通过向订单实体发送更新来在订单仓库中生效更改，该更新会持久化到写入数据库。\n7.  此仓库更改会向事件总线触发一个订单已确认事件，事件总线随后将事件分发给所有感兴趣的事件监听器。\n\
  \n\n\n8.  事件处理核心微服务中的订单事件处理器已订阅订单确认事件，因此它会收到状态更新的详细信息通知。\n\n9.  根据订单确认事件中提到的详细信息，订单事件处理器会对订单的读取模型进行修改。\n\
  \n10. 如前所述，Saga 也对订单确认事件感兴趣。收到订单确认事件后，Saga 将转换到“结束 Saga”状态。\n\n11. 事件处理审计微服务中的审计事件处理器也已订阅订单确认事件，因此它也会收到新订单创建的详细信息通知。\n\
  \n12. 根据订单确认事件中提到的详细信息，审计事件处理器将在审计的读取模型中添加一条新记录。\n\n13. 浏览器可以自行刷新，通过查询实体的读取模型来保持视图更新。\n\
  \n最后，您将看到 Saga 因取消已创建的订单而从“新建”状态转换到“结束”状态。见图\n15-13。\n\n![../images/477630_1_En_15_Chapter/477630_1_En_15_Fig13_HTML.jpg](img/477630_1_En_15_Fig13_HTML.jpg)\n\
  \n图 15-13\n订单取消后的结束 Saga\n\n当您点击取消已创建的订单时，架构中端到端流程的命令和事件流如下：\n\n1.  当您在浏览器中点击“取消”按钮以取消已创建的订单时，一个\
  \ REST/JSON 请求会到达订单控制器。\n\n2.  创建命令 REST 控制器微服务中的订单控制器将该请求解释为写入请求，创建订单状态更新命令，并将其发送到命令网关，命令网关随后将该命令分发到分布式命令总线。\n\
  \n3.  分布式命令总线在跨 JVM 的命令总线实现之间形成一座桥梁。每个 JVM 上的分布式命令总线称为一个段。\n\n4.  命令总线接收命令并将其路由到位于处理命令和创建事件微服务中的订单命令处理器。\n\
  \n5.  订单命令处理器检索相应的订单，并将订单状态从“新建”更改为“已取消”。\n\n6.  更改订单状态后，通过向订单实体发送更新来在订单仓库中生效更改，该更新将持久化到写入数据库中。\n\
  \n7.  此仓库更改将向事件总线触发一个订单取消事件，事件总线随后将事件分发给所有感兴趣的事件监听器。\n\n8.  事件处理核心微服务中的订单事件处理器已订阅订单取消事件，因此它会收到状态更新的详细信息通知。\n\
  \n9.  根据订单取消事件中提到的详细信息，订单事件处理器将对订单的读取模型进行修改。\n\n10. 如前所述，Saga 也对订单取消事件感兴趣。收到订单取消事件后，Saga\
  \ 将转换到“结束 Saga”状态。\n\n11. 由于取消订单而转换到结束状态时，Saga 还会向分布式命令总线输出一个新的产品库存还原命令。\n\n12.\
  \ 处理命令和创建事件微服务中的产品命令处理器检索相应的产品，并根据已取消订单中订购的商品数量还原库存数量。\n\n13. 还原产品库存后，通过向产品实体发送更新来在产品仓库中生效更改，该更新将持久化到写入数据库中。\n\
  \n14. 此仓库更改将向事件总线触发一个库存更新事件，事件总线随后将事件分发给所有感兴趣的事件监听器。\n\n15. 事件处理核心微服务中的产品事件处理器已订阅库存更新事件，因此它会收到库存更新的详细信息通知。\n\
  \n16. 根据库存更新事件中提到的详细信息，产品事件处理器将对产品的读取模型进行修改。\n\n17. 事件处理审计微服务中的审计事件处理器也已订阅订单取消事件，因此它会收到订单取消的详细信息通知。\n\
  \n18. 根据订单取消事件中提到的详细信息，审计事件处理器将在审计的读取模型中添加一条新记录。\n\n19. 浏览器可以自行刷新，通过查询实体的读取模型来保持视图更新。\n\
  \n编写示例 Saga 场景\n演示简单 Axon 示例所需的完整代码位于\n`ch15\\ch15-01`。由于\n此示例是第 12 章“分布式命令和事件处理”一节中示例的扩展，我将仅解释新添加或更改的代码，因此请参考该节以获取其余代码的解释。需要编写五个微服务，您将逐一查看它们。\n\
  \n微服务 1：01-Ecom-web\n此微服务是一个典型的 Spring Boot Web 应用程序，不包含任何 Axon 组件，因此我将不再进一步讨论。\n\
  \n微服务 2：\n02-Ecom-CreateCommandRestController\n\n您将从订单控制器开始，该控制器处理用于创建新订单以及确认或取消订单的\
  \ HTTP 请求。请参见清单 15-1。\n\n```\n@RestController\npublic class OrderController {\n\
  @Autowired\nprivate DataSource dataSource;\n@Autowired\n@Qualifier(\"distributedCommandGateway\"\
  )\nprivate CommandGateway commandGateway;\n@RequestMapping(value = \"/orders\",\
  \ method = RequestMethod.GET,\nproduces = { MediaType.APPLICATION_JSON_VALUE })\n\
  public ResponseEntity> getAllOrders() {\nJdbcTemplate jdbcTemplate = new JdbcTemplate(dataSource);\n\
  List queryResult = jdbcTemplate.query(\n\"SELECT ∗ from ecom_order_view order by\
  \ id\", (rs, rowNum) ->\n{return new OrderDTO(rs.getInt(\"id\"), rs.getDouble(\"\
  price\"),\nrs.getInt(\"number\"), rs.getString(\"description\"),\nrs.getString(\"\
  status\"));\n});\nreturn new ResponseEntity(queryResult, HttpStatus.OK);\n}\n@RequestMapping(value\
  \ = \"/orders\", method = RequestMethod.POST)\n@Transactional\npublic ResponseEntity\
  \ addNewOrder(@RequestBody OrderDTO orderDTO)\n{\ncommandGateway.sendAndWait(new\
  \ NewOrderCommand(orderDTO.getPrice(),\norderDTO.getNumber(), orderDTO.getProductId()));\n\
  return new ResponseEntity( HttpStatus.OK);\n}\n@RequestMapping(value = \"/orders\"\
  , method = RequestMethod.PUT)\n@Transactional\npublic ResponseEntity updateOrder(@RequestBody\
  \ OrderStatusUpdateDTO\norderStatusUpdateDTO) {\ncommandGateway.sendAndWait(\nnew\
  \ OrderStatusUpdateCommand(orderStatusUpdateDTO.getOrderId(),\norderStatusUpdateDTO.getOrderStatus()));\n\
  return new ResponseEntity( HttpStatus.OK);\n}\n}\n清单 15-1\n订单控制器 (ch15\\ch15-01\\\
  Ax2-Saga\\02-Ecom-CreateCommandRestController\\src\\main\\java\\com\\acme\\ecom\\\
  web\\controller\\OrderController.java)\n```\n\n主要关注的方法有：\n\n*   `addNewOrder`：这是一个\
  \ HTTP POST 方法，用于创建新订单。因此，它还会向分布式命令总线发送一个新订单命令。\n\n*   `updateOrder`：此 HTTP PUT\
  \ 方法处理订单的确认和取消。会触发一个订单状态更新命令来处理订单状态的更新。\n\n其他主要的类是 `ProductController` 和\n`OrderAuditController`；\n\
  两者都是简单的 REST 控制器，为各自的视图模型提供视图。\n\n微服务 3：\n03-Ecom-HandleCommandAndCreateEvent\n\n\
  \n\n该微服务需要处理由 `02-Ecom-CreateCommandRestController` 微服务创建、并通过分布式命令总线从远程 JVM 传输而来的所有命令。此外，该微服务还会创建事件，这些事件应由远程\
  \ JVM 或外部微服务中的分布式事件处理器消费。清单 15-2 首先展示了订单命令处理器。\n\n```\n@Component\npublic class\
  \ OrderCommandHandler {\n@Autowired\n@Qualifier(\"orderRepository\")\nprivate Repository\
  \ orderRepository;\n@Autowired\n@Qualifier(\"productRepository\")\nprivate Repository\
  \ productRepository;\n@CommandHandler\npublic void handleNewOrder(NewOrderCommand\
  \ newOrderCommand){\nProduct product =\nproductRepository.load(newOrderCommand.getProductId());\n\
  product.depreciateStock(newOrderCommand.getNumber());\nInteger id = new Random().nextInt();\n\
  Order order = new Order(id, newOrderCommand.getPrice(),\nnewOrderCommand.getNumber(),\
  \ OrderStatusEnum.NEW, product);\norderRepository.add(order);\nnewOrderCommand.getNumber(),\
  \ product.getId()});\n}\n@CommandHandler\npublic void handleUpdateOrder(\nOrderStatusUpdateCommand\
  \ orderStatusUpdateCommand){\nOrder order =\norderRepository.load(orderStatusUpdateCommand.getOrderId());\n\
  order.updateOrderStatus(orderStatusUpdateCommand.getOrderStatus());\norderStatusUpdateCommand.getOrderStatus()});\n\
  }\n}\n清单 15-2\n订单命令处理器 (ch15\\ch15-01\\Ax2-Saga\\03-Ecom-HandleCommandAndCreateEvent\\\
  src\\main\\java\\com\\acme\\ecom\\order\\commandhandler\\OrderCommandHandler.java)\n\
  ```\n\n接下来，清单 15-3 展示了产品命令处理器。\n\n```\n@Component\npublic class ProductCommandHandler\
  \ {\n@Autowired\n@Qualifier(\"productRepository\")\nprivate Repository productRepository;\n\
  @CommandHandler\npublic void handleNewOrder(ProductStockRevertCommand\nproductStockRevertCommand){\n\
  Product product =\nproductRepository.load(productStockRevertCommand.getProductId());\n\
  product.revertStock(productStockRevertCommand.getCount());\n}\n}\n清单 15-3\n产品命令处理器\
  \ (ch15\\ch15-01\\Ax2-Saga\\03-Ecom-HandleCommandAndCreateEvent\\ src\\main\\java\\\
  com\\acme\\ecom\\product\\commandhandler\\ProductCommandHandler.java)\n```\n\n订单命令处理器和产品命令处理器的作用不言自明。因此，接下来你将看到本例中下一个也是最重要的代码——Saga，如清单\
  \ 15-4 所示。\n\n```\npublic class OrderProcessSaga extends AbstractAnnotatedSaga {\n\
  private static final long serialVersionUID = -7209131793034337691L;\nprivate Integer\
  \ orderId;\nprivate Integer productId;\nprivate Integer count;\n@Autowired\n@Qualifier(\"\
  distributedCommandGateway\")\nprivate transient CommandGateway commandGateway;\n\
  @StartSaga\n@SagaEventHandler(associationProperty = \"orderId\")\npublic void handleOrderCreationEvent(OrderCreatedEvent\
  \ orderCreatedEvent) {\norderId = orderCreatedEvent.getOrderId();\nproductId = orderCreatedEvent.getProductId();\n\
  count = orderCreatedEvent.getNumber();\n}\n@SagaEventHandler(associationProperty\
  \ = \"orderId\")\n@EndSaga\npublic void handleOrderCanceledEvent(\nOrderCancelledEvent\
  \ orderCancelledEvent) {\n// 这是补偿命令\ncommandGateway.send(new ProductStockRevertCommand(productId,\
  \ count));\n}\n@SagaEventHandler(associationProperty = \"orderId\")\n@EndSaga\n\
  public void handleOrderConfirmationEvent(\nOrderConfirmedEvent orderConfirmedEvent)\
  \ {\n// 无需操作\n}\npublic CommandGateway getCommandGateway() {\nreturn commandGateway;\n\
  }\npublic void setCommandGateway(CommandGateway commandGateway) {\nthis.commandGateway\
  \ = commandGateway;\n}\npublic Integer getProductId() {\nreturn productId;\n}\n\
  public void setProductId(Integer productId) {\nthis.productId = productId;\n}\n\
  public Integer getCount() {\nreturn count;\n}\npublic void setCount(Integer count)\
  \ {\nthis.count = count;\n}\npublic Integer getOrderId() {\nreturn orderId;\n}\n\
  public void setOrderId(Integer orderId) {\nthis.orderId = orderId;\n}\n}\n清单 15-4\n\
  订单处理 Saga (ch15\\ch15-01\\Ax2-Saga\\03-Ecom-HandleCommandAndCreateEvent\\src\\main\\\
  java\\com\\acme\\ecom\\saga\\OrderProcessSaga.java)\n```\n\n单个 Saga 实例负责管理单个 Saga\
  \ 事务。因此，如果有两个订单，你将拥有上述 Saga 的两个实例。所以，只有在系统中找不到合适的现有 Saga（同一类型）时，才会启动一个新的 Saga。\n\
  \n你需要指明 Saga 生命周期的开始和结束。抽象注解 Saga 允许你使用 `@SagaEventHandler` 注解来标注事件处理器。如果处理器方法标志着事务的开始，你需要在该方法上添加另一个注解：`@StartSaga`。当发布匹配的事件时（在你的场景中是订单创建事件），该注解会创建一个新的\
  \ Saga 并调用其事件处理器方法。在你的场景中，有两种情况可以使 Saga 进入结束状态：当拦截到订单确认事件时，或者当拦截到订单取消事件时。如果某个特定事件始终标志着\
  \ Saga 生命周期的结束，请在 Saga 上为该事件的事件处理器标注 `@EndSaga`，在你的场景中，即处理订单取消事件和处理订单确认事件的事件处理器。Saga\
  \ 的生命周期将在处理器调用结束后终止。\n\nSaga 事件处理器注解表明被注解的方法是 Saga 实例的事件处理器方法。对于每个事件，只会调用一个被注解的方法。该方法按以下优先级顺序解析：\n\
  \n*   首先，搜索实际类（运行时）的事件处理器方法。\n*   如果找到某个方法的参数可以分配给领域事件，则将其标记为符合条件。\n*   在评估完一个类之后（但在任何父类之前），将调用最具体的事件处理器方法。这意味着，如果类\
  \ X 的事件处理器和类 Y 的事件处理器都符合条件，并且 Y 是 X 的子类，那么将选择参数类型为 Y 的方法。\n*   如果在实际类中未找到任何方法，则评估其父类。\n\
  *   如果仍未找到任何方法，则事件监听器将忽略该事件。\n\n\n\nAxon 不会将全部事件发布给系统中所有的 Saga 实例，而是仅发布包含 Saga 已关联属性的那些事件。这是通过关联值（association\
  \ values）来实现的。一个关联值由一个键（key）和一个值（value）组成。键代表所使用的标识符类型，例如上面代码中的 `orderId`。值则代表订单\
  \ ID 的对应值。`@SagaEventHandler` 注解有两个属性，其中 `associationProperty` 是最重要的一个。这是传入事件上用于查找关联\
  \ Saga 的属性名称。关联值的键就是该属性的名称，值则是该属性 getter 方法返回的值。\n\n微服务 4：04-Ecom-EventHandleCore\n\
  \n正如该微服务的名称所暗示，它包含两个主要的事件处理器：`OrderEventHandler` 和 `ProductEventHandler`。它们的功能是响应以下事件，分别更新订单（Order）和产品（Product）的视图：\n\
  \n*   `OrderCreatedEvent`\n\n*   `OrderConfirmedEvent`\n\n*   `OrderCancelledEvent`\n\
  \n*   `StockUpdatedEvent`\n\n清单 15-5 展示了更新订单视图的订单事件处理器代码。\n\n```\n@Component\npublic\
  \ class OrderEventHandler {\n@Autowired\nDataSource dataSource;\n@EventHandler\n\
  public void handleOrderCreatedEvent(OrderCreatedEvent event) {\nJdbcTemplate jdbcTemplate\
  \ = new JdbcTemplate(dataSource);\njdbcTemplate.update(\"INSERT INTO ecom_order_view\
  \ VALUES(?,?,?,?,?)\",\nnew Object[]{event.getOrderId(), event.getPrice(),\nevent.getNumber(),\
  \ event.getProductDescription(), NEW});\n}\n@EventHandler\npublic void handleOrderConfirmedEvent(OrderConfirmedEvent\
  \ event) {\nJdbcTemplate jdbcTemplate = new JdbcTemplate(dataSource);\njdbcTemplate.update(\"\
  UPDATE ecom_order_view SET status=?\nWHERE id =?\", new Object[]{CONFIRMED, event.getOrderId()});\n\
  }\n@EventHandler\npublic void handleOrderCancelledEvent(OrderCancelledEvent event)\
  \ {\nJdbcTemplate jdbcTemplate = new JdbcTemplate(dataSource);\njdbcTemplate.update(\"\
  UPDATE ecom_order_view SET status=?\nWHERE id =?\", new Object[]{CANCELLED, event.getOrderId()});\n\
