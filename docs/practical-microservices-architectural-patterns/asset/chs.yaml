  \n**图 8-7**\nHystrix 回退的重构设计\n\n在重构后的设计中，所有 Feign 客户端的交互都已从 Controller 移到了 Component\
  \ 类中。因此，Product Server Component 现在依赖于两个代理，这两个代理将在运行时注入 Feign 客户端代理。\n\n**编写 Hystrix\
  \ 的新设计**\n\n本节的所有代码示例都放在 `ch08\\ch08-03` 文件夹中。Hystrix 仪表盘应用程序是另一个 Spring Boot 应用程序。要启用它，你需要遵循几个步骤。请访问\
  \ `pom.xml`，查看清单 8-9 中显式提及的 Hystrix 仪表盘依赖项。\n\n```\norg.springframework.cloud\n\
