  在图 2-2 中，描绘了两种类型的通信或交互。在应用内部，模块之间要么使用本地调用协议，要么使用合适的远程调用协议进行通信。应用之间的通信同样重要。企业通常使用企业应用集成（EAI）技术来实现应用间的集成。第
  1 章的“网络架构”部分简要讨论了应用如何相互集成。您可能已经注意到，大多数情况下，应用边界是明确定义和分离的，因此它们通常被部署到不同的进程或运行时中。由于这个原因，它们需要合适的远程调用机制来相互通信。后来
  SOA 的进步提倡使用像 ESB 这样的面向服务集成（SOI）工具，以便能够以更灵活、无缝的方式进行应用集成。


  ### 单体模块间依赖


  在单体架构中，应用内的模块是紧密耦合的。这些模块要么使用本地调用协议，要么使用合适的远程调用协议进行通信。大多数情况下，这些调用本质上是同步的，这意味着每个请求事务也期望得到一个响应或一个异常返回。


  当单体应用的所有模块被打包并部署在同一个进程中时，本地方法调用是最佳的通信方式。在这种部署中，要么整个应用始终运行，要么如果任何模块的任何部分出现问题，整个应用也可能完全宕机。如果某些模块被分离出来并部署到不同的进程中，那么部署了分离模块的进程的健康状况不会影响其他依赖进程。然而，当我们从整体上看这样一个单独部署的模块应用时，如果分离的模块因任何原因宕机，依赖模块仍然可能受到影响。这是因为模块间通信被定义为直接且同步的方法调用依赖，所以如果被调用的模块没有响应或不存在，调用模块就会受到影响。它们要么被无限期阻塞，要么等待一段时间后响应并报告错误状态。图
  2-3 描绘了这一点。


  ![../images/477630_1_En_2_Chapter/477630_1_En_2_Fig3_HTML.jpg](img/477630_1_En_2_Fig3_HTML.jpg)


  图 2-3


  单体模块间通信




  ### 可扩展性困境


  现代应用架构具备水平可扩展性。所谓水平可扩展，是指同一功能的多个实例可以部署到不同进程中，而客户端发往该功能的流量可由任意一个包含重复功能的服务器进程处理。这种拓扑结构被称为服务器集群。理想情况下，来自同一客户端（浏览器或移动应用）的请求也可以路由到该集群中的任意实例，无论该客户端的上一个请求是由哪个服务器实例处理的。


  图 2-1 展示了一个电商应用的不同模块。如果思考用户通常如何与电商应用交互，其步骤序列可能如下：


  1.  访问电商应用的主页。

  2.  浏览产品分类。

  3.  选择感兴趣的商品并浏览其详情。

  4.  如果感兴趣，将所选商品加入购物车。

  5.  创建用户档案，或如果已有档案则登录。

  6.  支付并结算商品，确认订单。


  通常，用户会浏览大量产品分类和详情，但只将少数商品加入购物车。即使商品已加入购物车，也可能被删除，或者购物车被忽略或废弃。最终，在电商应用中，只有相对较小比例的购物车商品会转化为已确认的订单。


  在第 1 章的“典型部署架构”部分，你看到了典型单体应用可用的横向扩展机制选项。图 1-4 的相关部分在此复制为图 2-4 以便进一步讨论。


  ![../images/477630_1_En_2_Chapter/477630_1_En_2_Fig4_HTML.jpg](img/477630_1_En_2_Fig4_HTML.jpg)


  图 2-4


  应用层可扩展性


  由于许多已登录和匿名（未登录）用户会浏览大量产品分类和产品详情网页，与订单模块相比，处理这些请求的应用模块（即产品模块）将承受更大的压力。如果部署架构需要灵活应对这种不同的可扩展性需求，我们应该能够部署更多承载产品模块的服务器实例，而承载订单模块所需的服务器进程数量则较少。同样重要的是，与部署产品模块所需的服务器硬件相比，部署订单模块需要更高可靠性的硬件，因为订单交易失败的代价远高于产品相关交易失败的代价。由于前面章节讨论的所有或大部分问题，你知道将模块分离并根据所需的运营质量进行部署并非易事，因为该应用是作为单体架构设计的，只允许同构部署。


  ### 单体技术约束


  单体应用的规模可能相当庞大。根据应用的生命周期，其功能和特性仍会不断演进，因此其规模会持续增长。随着时间的推移，行业中的技术和机制也会发生变化。不幸的是，单体应用架构在适应最新技术和趋势方面存在严重局限性。大多数平台、技术、工具和框架的选择都是在初始架构阶段决定并确立基准的，这些决策如同刻在石头上一般难以更改。将一个问题的解决方案从一种技术更换为另一种并不容易。例如，如果平台已固定选择为
  Java，那么要使用 .NET 解决方案来处理应用的部分功能或构建新特性就不那么容易了。同样，如果它使用关系型数据库管理系统（RDBMS）进行持久化，那么大多数时候它也必须使用像
  Hibernate 这样的 ORM（对象关系映射）框架或像 iBatis 这样的数据映射框架。为了整个应用的一致性和规模经济，不建议在未来的所有扩展中引入新的此类框架来替代它们。最后但同样重要的是，将单个项目的代码库加载到
  IDE 中会消耗大量内存，并且常常会阻碍开发人员的生产力。


  ## 微服务简介


  微服务是一种不同的软件应用架构方法。它们试图解决许多现代应用架构的挑战。我们将审视当今面临的不同架构挑战，并建立一个基础，以便我们能够解决问题并继续前进。


  在深入探讨之前，这里还有一个重要的术语：微服务上下文中的“服务”。


  在 SOA 中，服务是一种一流的业务功能，任何客户端都可以通过网络使用标准访问协议来访问它。SOA 服务是自治的，并且通常是幂等且无状态的。所谓自治，是指服务本身在提供功能方面是自给自足的。所谓幂等，是指无论是有意还是错误地多次调用服务，都不会产生任何副作用。简单来说，客户端可以重复发出相同的请求，同时产生相同的结果。换句话说，发出多个相同的请求与发出单个请求的效果相同。所谓无状态，是指在调用服务时，我们不会在服务器上存储任何代表特定客户端的状态（这一点在第
  1 章的“无状态设计”部分已讨论过）。


  你尚未了解什么是微服务，因此为了继续当前的讨论，可以将微服务类比为 SOA 服务。有时，一组功能相关的此类服务的集合也可以被称为微服务。我们稍后会探讨这个说法的不同含义。


  让我们重新审视一下我们在单体方法中讨论的几个挑战，并看看如何解决它们。


  ### 独立模块


  我想为单体引入的第一个、也是最显著且可观察的特性，是将其转换为一系列离散且独立的模块。通过使模块独立，我们希望为软件范式带来以下全部或大部分灵活性：


  *   **并行开发**：每个模块可以作为独立的代码仓库进行源代码管理，因此分布式团队可以独立且并行地构建这些模块。

  *   **分离部署**：与单体的单一进程部署方法不同，一旦模块独立，它们也应该被打包、部署、测试，并部署到生产环境中的多个运行时进程中，以便在部署期间可以采用适当的策略来应对软件和硬件层面不同的可扩展性需求。这在电商应用等场景中尤为重要，我们希望部署更多服务器实例来承载产品模块，而为订单模块部署较少的服务器进程；同样，我们希望将订单模块部署到可靠性更高的硬件和软件栈上（成本更高），而部署产品模块所需的硬件和软件栈则相对要求较低（通过使用通用硬件可以合理控制成本）。




  ### 模块间通信


  我们与现有系统的大多数模块间通信都是直接且同步的方法调用。即使我们将这些通信设计为幂等且无状态，这种调用带来的副作用之一是被调用模块必须保持在线并活跃以响应调用模块，否则可能引发异常或错误。即使我们将不同模块分离为独立个体并部署到多个进程中，这种副作用依然存在，并会在调用栈中向后传播。调用进程中发起请求的线程将一直等待，直到收到有效响应（无论是否包含数据），或直到被调用方法抛出异常。这会阻塞调用进程中发起请求的线程，使其在方法调用返回前无法执行其他任务。因此，这不仅导致了对被调用进程的依赖，还占用了调用进程的资源，使其无法被复用。


  然而，这种同步式模块间通信有一个优点：调用方可以在检查被调用进程返回的响应数据后执行下一步操作。此外，当被调用进程未返回预期结果时，调用方可以立即向用户或客户端代理层发出提示，以便通过人工干预进行下一步操作。


  异步或“即发即忘”式的模块间通信，可以在向被调用进程发出调用后立即释放调用方资源，使其可被复用。在调用进程与被调用进程之间使用消息队列是实现这一目标的一种方式。但这也会给整体软件架构带来额外的复杂性。首先，我们需要在
  IT 环境中处理消息基础设施。更重要的是，软件设计的复杂性会增加，因为我们现在还需要将响应与特定请求关联起来——它们不再通过计算线程的“等待与响应”原语绑定在一起。


  异步通信是一种必要的恶。


  基于此背景，让我们来看看如何对单体应用进行改进，使其更现代化、更灵活。


  ### 微服务


  在单体应用架构现代化过程中，你已经了解了两个主要方面，即：


  *   使模块独立

  *   重新设计模块间通信


  图 2-5 描绘了我们讨论的两种架构现代化方案。你可能需要花些时间仔细观察该图，因为它将是构建更多改进方案的基础结构。


  ![../images/477630_1_En_2_Chapter/477630_1_En_2_Fig5_HTML.jpg](img/477630_1_En_2_Fig5_HTML.jpg)


  图 2-5


  重新设计单体应用的边界


  在单体架构风格中，每个应用都是一个独立的单体，它们按照前文“单体模块间依赖”部分所述的方式相互通信。每个应用都有一个明确定义的边界，该边界界定了功能分组的限界上下文。在图
  2-5 中，这用粗矩形框表示。如果你查看此类应用的内部，会发现有多个模块。如前所述，这些模块在逻辑上是分离的，但由于部署上的依赖关系以及模块间通信，模块边界并不严格，反而显得臃肿。这用虚线方框表示。在这样的模块内部，我标注了一个服务。它可以是一个单一服务，也可以是一组功能相关的服务集合，用圆圈表示。请注意，一个服务可以接收外部请求，也可以将请求委托给另一个模块中的其他服务，或另一个应用中的其他服务；所有这些都用箭头表示。


  当我想要引入名为“微服务”的新型应用架构时，我反转了边界，如图 2-5 最右侧所示。在这里，每个模块或每个可区分的功能分组都与其同类清晰分离。每个服务或功能相关的服务集合在逻辑上和物理上被组合在一起。在此图中，这用粗线方框表示，称为微服务。我们稍后会详细讨论它，但就目前的讨论而言，这样的微服务可以独立于其他微服务进行开发、源代码管理、构建、测试、分发和部署。如果我们想将其映射到我们的单体应用，可以想象，这样一个微服务集合可以等同于我们传统的单体应用。正如单体应用的不同部分需要相互交互以实现其内置功能一样，在微服务世界中，微服务内部的服务可以相互通信，或者跨微服务的服务也可以相互通信。当我们采用微服务时，我们不想忽视
  SOA 的任何或全部原则。据此，我们可以使用任何标准的 SOA 接口让微服务相互通信。稍后你会看到，为了发挥微服务的真正效率，你也必须为微服务架构适配真正的 SOA
  原则。


  前文关于灵活“模块间通信”的部分指出，我们也可以在模块之间使用异步通信风格，微服务之间同样可以如此。这通过减少依赖和打破请求-响应循环为我们提供了灵活性，从而可以解决诸如被调用的微服务不存在或无响应时该怎么办等问题。微服务之间合适的消息队列有助于实现这一点，这种消息基础设施在图
  2-5 中通过连接微服务的线条表示。接下来是另一个重要方面：当微服务以这种方式互联时，由于底层消息基础设施与企业 IT 基础设施无缝融合，理论上，来自任何垂直领域或业务线的微服务都能够跨彼此交换信息，因为它们都可以连接到同一个企业局域网。当这种情况发生时，以前曾经是定义明确、严格边界的应用边界现在消失了。这在图
  2-5 中用应用之间的虚线表示。换句话说，以前作为企业软件领域中一等限界公民存在的应用概念，现在让位给了微服务，而微服务开始在其身份（作为一等独立软件构建块）方面展现出这些应用的许多特性。


  你也可以查阅维基百科（ [`https://en.wikipedia.org/wiki/Microservices`](https://en.wikipedia.org/wiki/Microservices)
  ）提供的微服务正式定义。




  ### 注意


  “微服务是一种软件开发技术——是面向服务架构（SOA）风格的一种变体，它将应用程序构建为一系列松散耦合服务的集合。在微服务架构中，服务粒度较细，且协议轻量。将应用拆分为多个不同的小型服务，其好处在于提升了模块化程度。这使得应用更易于理解、开发、测试，并且对架构侵蚀更具弹性。它通过让小型自治团队能够独立开发、部署和扩展各自的服务，实现了开发的并行化。同时，它也允许单个服务的架构通过持续重构而逐步形成。”


  上述定义中提到的许多方面，在前两章中已经有所讨论。接下来，你将从这个定义的更多角度进行审视，并在接下来的两章中深入探讨更多内容。


  ## 总结


  在本章中，你审视了传统分布式或 N 层应用架构的现状，并探讨了此类架构因单体特性而存在的一些缺陷。单体架构还有许多其他优缺点尚未讨论，但此类讨论不在本章范围内，因为我只是想为讨论另一种做事方式（即使用微服务）设定背景。现在你明白了，当你的思路从单体架构转向微服务风格时，你需要反转许多概念，例如应用边界、内部通信等。在下一章中，你将详细重新审视微服务架构，并将其概念与现实世界的企业应用联系起来。


  '
- '# 3. 深入理解微服务


  正如你在第 2 章中所见，使用微服务是构建当今分布式软件解决方案的一种方法。过去二十年，软件行业在开发和部署分布式应用方面积累了经验，而微服务则提供了架构原则和模式，用于应对开发、部署和维护分布式应用中的诸多不足。我们在前两章讨论了微服务架构的背景和必要性，本章将更详细地探讨它。我将再次尝试结合现实世界应用（即我在第
  1 章中介绍的电子商务应用）的上下文来解释概念。这将帮助你快速将各方面内容与你实际经验中的实践场景联系起来。


  本章将探讨以下几个方面：


  *   在微服务上下文中，电子商务架构将呈现何种形态

  *   经典的分层与分层方法在微服务上下文中的关系

  *   微服务的自治特性

  *   微服务与传统 SOA 和 MOM 的关系

  *   微服务架构的可伸缩性和可扩展性特征


  ## 微服务的外观与感受


  你刚刚了解到，与传统单体应用相比，在谈论微服务时，许多特征和显著特性都被反转了。为了更好地理解这种反转究竟意味着什么，让我们先看一个实际的企业应用场景，并首先了解整体图景，这样细粒度且最重要的细节就更容易理解了。


  ### 电子商务微服务


  第 1 章的“典型应用架构”部分介绍了电子商务应用。我解释了此类应用如何按照传统方法构建。第 1 章的图 1-3 描绘了不同的层以及管理软件复杂性的模块化方法。即使采用了层、分层和模块的原则，你仍然看到模块之间存在不当依赖的问题，这阻碍了软件工程生命周期的所有阶段。我将按照第
  2 章介绍的微服务首要原则，以略微不同的风格来描绘那种单体架构。


  图 3-1 展示了如果我们重新绘制第 1 章图 1-3 所示的传统基于单体架构，架构会是什么样子。与图 1-3 中的单体架构表示相比，我柔化了图中用点线和虚线样式表示的应用边界。这是为了强调一点：在微服务架构中，重要的不是应用边界，而是微服务边界。微服务边界用粗矩形表示。图中描绘了许多这样的微服务。简而言之，传统架构中表示的单一单体应用边界已经消失，取而代之的是许多微服务涌现出来，并且所有这些微服务都有清晰且具体的边界。


  ![../images/477630_1_En_3_Chapter/477630_1_En_3_Fig1_HTML.jpg](img/477630_1_En_3_Fig1_HTML.jpg)


  图 3-1


  电子商务微服务架构


  在这种新的架构表示中，我没有引入任何新模块。相反，我保留了单体架构中已有的模块，同时显著改变了软件模块的结构以及技术基础设施。让我们详细探讨这种结构变化。


  ### 无层，分布式


  我在第 1 章的“系统架构”部分讨论了三层和 N 层分布式架构。据此，将微服务架构称为“无层，分布式”架构并无不妥。为了说明清楚，如果你重新审视三层或 N 层分布式架构，在一个应用内部存在多个层，例如客户端层、表示层、业务层等。这些层也能够部署到不同的分布式进程空间中。这一点在微服务架构中也被反转了。为了说明清楚，在微服务架构中，目标是让所有这些层保持在一起。但且慢，这同样不是一条硬性规定。没有什么能阻止我们将传统架构中的分层、层以及其他类似原则适配到微服务架构中。所有这些良好实践仍然有效。我们甚至可以将这些层部署到独立的进程空间中。但这样一来，我们可能需要质疑为什么要这样做。通过将紧密交互的部分（例如一个微服务的不同层）保持在一起，也许就在同一个进程内，我们可以带来许多优化，例如改善响应时间、实现可靠通信等。


  我们也可以在三层架构本身的上下文中思考微服务架构。微服务可以通过在逻辑上分离不同层来构建，但在实际生产部署时，这些层可能会紧密地保持在一起，以获得所需的自治程度。让我们来看看这种自治意味着什么。




  ### 微单体


  微服务之所以被称为微单体，是因为它们遵循分层和层级实践构建而成，但每个微服务的边界应当清晰可辨，并且应包含其独立运行和服务所需的一切，无需任何外部依赖。这体现在物理制品层面，例如微服务启动和运行所需的二进制文件、库和脚本。同时，这也必须体现在微服务运行时所需的任何依赖上，例如容器服务或持久化服务。物理上捆绑的微服务制品，在部署到运行时进程后，必须在其提供功能的能力方面展现出完全的自主性。下一节将进一步解释这一点。


  由于我们将微服务组织为包罗万象的捆绑包，几乎不依赖或完全不依赖外部，这为平台和技术选择带来了某些优势。为某个微服务所做的任何平台、技术、工具或框架决策，都不应成为其他微服务的约束。这为跨微服务的团队提供了技术和架构选择的自由。但与此同时，这种自主性也给微服务带来了额外的责任：它必须拥有并管理其健康存在所需的所有资源，包括保持状态持久化所需的数据和数据库。数据独立性通常通过为每个微服务提供其自己的数据库来实现（或者甚至在共享数据库中为每个微服务提供其自己的模式，但在这种情况下，应避免所有跨模式操作）。通常，微服务所需的表示层服务也封装在微服务捆绑包内。图
  3-2 展示了一个单一微服务——产品微服务的情况。


  ![../images/477630_1_En_3_Chapter/477630_1_En_3_Fig2_HTML.jpg](img/477630_1_En_3_Fig2_HTML.jpg)


  图 3-2


  一个典型的微服务


  在众多层级中，业务层负责核心的数据处理和加工工作，而可扩展性问题也常在此层出现。利用当今的技术能力，特别是使用**SPA**（**单页应用**）Web 框架和缓存框架，扩展其他层级相对直接。因此，在本文的大部分讨论中，当我们谈及微服务时，将主要关注业务层。不过，在必要时，我们也会涉及其他层级以呈现完整图景。因此，我们希望将图
  3-2 中所示的微服务进行表示，将表示层组件分离出来，正如你在图 3-1 中所见。这会产生一些影响，但我们将在后续章节中讨论。


  ### 理解自包含微服务


  由于微服务是面向 SOA 的（我们将在下一节讨论），它们需要 HTTP 服务器服务来暴露 SOA 或 REST 接口。在我们将传统单体包部署到 HTTP 容器的
  web-app 文件夹时，对于微服务而言，一个轻量级的 HTTP 监听器被嵌入到微服务内部，从而消除了对外部或独立容器或服务器的需求。在 Java 范式中，对于传统部署，我们通常将
  `.ear` 或 `.war` 文件部署到像 JBoss 这样的全能应用服务器或像 Tomcat 这样的 Web 服务器中。相比之下，对于微服务，则没有 Web
  服务器或 `.war` 文件；相反，每个服务都有自己嵌入的 HTTP 监听器，例如 JAR 文件中的 Jetty、Tomcat 或 Undertow。当我们构建微服务时，构建阶段会创建这个“可执行的
  fat JAR”文件，其中包含服务运行时，例如前面提到的 HTTP 监听器。


  ### 注意


  Java 没有提供加载嵌套 JAR 文件（JAR 文件本身包含在另一个 JAR 中）的标准方法。如果你希望分发一个自包含的微服务，这可能会带来问题。


  为了解决这个问题，许多开发者使用“uber”JAR。一个 uber JAR 将所有依赖 JAR 中的所有类打包到一个单一的归档文件中。它们也被称为 fat JAR。这种方法的问题在于，很难看出你的微服务中包含了哪些库。如果多个
  JAR 中使用了相同的文件名（但内容不同），也可能会出现问题。


  上一节指出，微服务应包含其启动和运行所需的所有物理制品，如二进制文件、库和脚本。在传统的单体部署中，我们可以将这些依赖放在应用服务器的 `lib` 文件夹中。在微服务世界中，可执行的
  jar 文件是实现这一目标的一种手段。产品微服务的一个典型可执行 jar 文件的结构如代码清单 3-1 所示。


  ```

  product.jar

  |

  +-META-INF

  |  +-MANIFEST.MF

  +-org

  |  +-springframework

  |     +-boot

  |        +-loader

  |           +-

  +-BOOT-INF

  +-classes

  |  +-com

  |     +-acme

  |        +-ProductMain.class

  +-lib

  +-framework.jar

  +-log4j.jar

  +-jetty.jar

  +-. . .

  代码清单 3-1

  可执行 jar 文件结构

  ```


  通过这种方式，所有必需的库以及所需的运行时服务（如 HTTP、JMS 或 AMQP）都被嵌入到可执行的 jar 文件中。在第 7 章的“构建和打包 Spring
  Boot 应用程序”部分，你将编写代码、构建、打包并运行一个可执行的 fat jar 文件。




  ### 微服务与 SOA 的相似性


  如前所述，一个应用程序由多个微服务组成。微服务必须能够被其他微服务或其他组件（如表示层组件）访问。由于大多数情况下微服务部署在独立的进程中，因此需要一种合适的进程间通信机制来实现微服务间的通信。你不必重新发明轮子，而应采纳所有从
  SOA 圣经中借鉴的最佳实践。与 SOA 类似，微服务也有多种服务暴露方式可选，从高性能的二进制级 TCP-IP 套接字，到 Java RMI、.NET Remoting、RMI-IIOP
  等远程协议，再到更符合 Web 风格的 SOAP 或 REST。


  图 3-3 重新绘制了图 3-1 中的电商微服务架构，并突出显示了几个典型的请求流程。假设表示层服务器首次加载后，浏览器可以缓存大部分表示层组件，那么后续所有请求都可以由浏览器直接发送到服务层。图
  3-3 展示的正是这种情况，以便我们更专注于微服务本身。请记住，即使我们采用传统的基于表示层的方法（所有请求始终仅通过表示层服务器路由），请求接下来也会到达微服务，这与不经过表示层服务器的请求流程并无本质区别。在图
  3-3 中，假设一个确认订单的请求到达了订单微服务。它将访问自己的订单数据库并创建订单。同时，它还需要与库存服务通信，对库存数据库进行修改，以扣除新订购的数量。假设电商应用中还存在其他微服务，如物流微服务和订单历史微服务，那么订单微服务在创建订单时也需要向它们发送请求。物流微服务负责打包和发货，而订单历史微服务则会在订单历史数据库中创建一条记录，用于分析目的。总之，微服务必须能够被其他微服务以及其他组件访问。因此，微服务间的通信是一个需要关注的问题。


  ![../images/477630_1_En_3_Chapter/477630_1_En_3_Fig3_HTML.jpg](img/477630_1_En_3_Fig3_HTML.jpg)


  图 3-3


  微服务通信是 SOA 友好的


  仔细观察图 3-3 会发现微服务架构中的另一个重要问题：跨微服务维护数据一致性的难题。由于每个微服务管理自己的状态和持久化数据，并且每个微服务通常部署在独立的进程空间中，因此跨微服务维护数据一致性将是一项挑战。请注意订单微服务和库存微服务之间标记为“本地”协议的通信机制；我们将在第
  17 章的“BASE 中的 ACID”一节中讨论它。


  ### 面向消息的微服务


  当我们说微服务必须能够被其他微服务以及其他组件访问时，我们指的是微服务相互依赖的通信机制。在第 2 章的“模块间通信”一节中，我们讨论了同步和异步通信方式的优缺点。并没有硬性规定说不能在微服务之间使用同步调用。精心设计的
  SOA 接口是设计微服务接口的最佳方式之一。通过 REST 接口使用 JSON（JavaScript 对象表示法）格式发送请求和接收响应是非常值得提倡的，因为无论是
  Web 客户端、移动客户端还是其他物联网客户端，服务都可以被复用。然而，即使是 SOA 接口也会使一个微服务依赖于其他微服务。如果被调用的微服务运行不正常，调用方微服务的功能就无法完成，事务也容易失败。在图
  3-3 的具体示例中，假设物流微服务或订单历史微服务运行不正常，这将导致创建订单事务失败。仔细分析后发现，情况并非必然如此。如果订单微服务不依赖于物流微服务或订单历史微服务，那么即使物流微服务或订单历史微服务运行不正常，订单微服务中的创建订单事务仍然可以成功。这怎么可能呢？


  异步或即发即弃的模块间通信方式可以使微服务摆脱彼此之间的硬依赖。我们可以在微服务之间使用消息队列，这样微服务就可以通过队列发送消息进行通信，而不是直接进行同步调用。在图
  3-4 中，架构已经过调整，在微服务之间引入了消息队列系统。微服务的其他基于 SOA 的接口并未完全消除；它们被保留了下来，但同时引入了消息队列。这是因为任何外部组件或服务都必须使用电商应用或电商微服务的
  SOA 接口。与此同时，任何微服务间的通信都可以通过消息队列进行。因此，浏览器确认订单的请求将使用其基于 SOA 的 REST 接口到达订单微服务。订单微服务将访问自己的订单数据库并创建订单。同时，它还需要对库存数据库进行修改，以扣除刚订购的数量。


  ![../images/477630_1_En_3_Chapter/477630_1_En_3_Fig4_HTML.jpg](img/477630_1_En_3_Fig4_HTML.jpg)


  图 3-4


  基于事件的微服务


  订单微服务中的创建订单事务将以原子方式在订单数据库中创建条目、更新库存数据库中的条目，并向消息队列发送消息。如果这些操作中的任何一个失败，整个创建订单事务将失败。如果所有这些操作都成功，创建订单事务也将成功。在订单数据库中创建订单和在库存数据库中扣减库存可以在单个事务内完成。这里我们再次将这种复杂性留待后续详细讨论。


  订单微服务在创建订单时发送到队列的消息，随后将由物流微服务和订单历史微服务接收。


  ## 高级微服务能力


  你已经了解了如何将单体应用拆分为基于微服务的架构。你还学习了基于微服务架构中的消息队列，它有助于降低微服务间的耦合度。现在，让我们来看看其优势。




  ### 故障安全型微服务


  在面向消息的微服务范式中，“创建订单”事务成功的唯一必要条件，是“创建订单”微服务（它同时包含了订单和库存数据库）及其关联的消息队列基础设施保持运行。发货微服务和订单历史微服务是否运行无关紧要。假设在创建订单时，发货微服务和订单历史微服务处于宕机状态。由订单微服务因创建订单而放置的任何消息都将在队列中安全保存。同样，我们可以假设存在多个订单微服务实例以实现冗余，并且集群化的消息队列将提高队列的可靠性。持久性消息一旦到达队列，也会立即写入磁盘。因此，如果消息队列是持久化的，即使在“创建订单”事务成功后，集群中的一个或所有消息基础设施服务器宕机，消息仍然安全地保存在磁盘上。当我们再次启动队列时，消息仍然可供消费。持久队列会持久地保留消息，供任何合适的消费者消费，即使消费者在消息到达时并未处于活动状态。持久队列无需关心未来将由哪个消费者来消费这些消息。每条消息只有一个副本，未来任何消费者都可以消费它。然而，持久主题则不同，因为它们必须在逻辑上为每个持久消费者持久化每条合适消息的一个实例，因为每个持久消费者都会获得自己的消息副本。因此，通过明智地结合消息基础设施中队列或主题的持久性和持久化能力，我们可以消除订单微服务对发货微服务和订单历史微服务的依赖。在稍后的某个时间点，当发货微服务或订单历史微服务再次启动时，它们将消费旨在由它们消费的消息，其余的功能流程将由各自的微服务继续执行。


  ### 可伸缩的微服务


  在第 2 章的“可伸缩性困境”一节中，我们讨论了许多已登录和匿名用户将浏览许多产品类别和产品详情网页，而通过产品微服务处理这些请求的微服务将比订单微服务承受更大的压力。这是因为只有一部分浏览产品类别或产品详情网页的流量最终会转化为已确认的订单事务。因此，我们需要具备有选择地伸缩应用程序微服务的能力。我们已经将单体电子商务应用分解为基于微服务的电子商务应用。有选择地伸缩的能力是微服务架构免费提供的一项功能。图
  3-5 正好展示了这一点。


  ![../images/477630_1_En_3_Chapter/477630_1_En_3_Fig5_HTML.jpg](img/477630_1_En_3_Fig5_HTML.jpg)


  图 3-5


  横向扩展的微服务


  图 3-5 展示了一个为选择性伸缩而部署的典型微服务架构。这意味着应用程序不同部分的可伸缩性可以被精细控制，并且可以独立于其他部分进行。这是终极的自由。


  与图 3-1 中展示的电子商务微服务架构相比，图 3-5 将数据库置于微服务边界之外。但在“微服务是自包含的”一节中，我曾说过微服务包含了包括数据库在内的所有资源。这难道不是矛盾的吗？


  以图 3-5 中的产品微服务为例。图中显示了四个产品微服务实例，因为我们预计浏览产品类别和产品详情网页的流量远高于应用程序的其他部分。但图中只显示了一个产品数据库，并且它位于产品微服务的边界之外。产品类别或产品详情是电子商务应用的一种主数据。一旦数据库被填充，除非我们向系统添加新的产品类别或产品，或者淘汰现有的产品类别或产品，否则它不会改变。因此，产品数据库是一个“只读”数据库。所以，即使有多个产品微服务应用服务器实例连接到单个产品数据库实例，也不会出现需要解决的数据一致性问题。此外，如果我们启用缓存，那么对产品数据库的访问次数可以进一步减少。简而言之，尽管我们将产品微服务实例展示在与产品数据库分离的进程中，但你可以将它们视为一个不可分割的整体块。因此，微服务包含了包括数据库在内的所有资源的定义仍然成立。


  图中显示了两个订单微服务实例。同样，订单数据库被展示在订单微服务的边界之外。订单微服务是一个共享数据库，多个订单微服务实例访问单个订单数据库实例带来了处理任何潜在数据损坏的复杂性。我们可以考虑采用资源的分布式锁定来解决此类共享数据损坏问题。我们稍后将对此进行更多讨论，但暂时你可以认为，尽管订单数据库在物理上被展示在订单微服务的边界之外，但出于所有实际目的，它作为订单微服务的一个集成整体来运作。


  但是，在“面向消息的微服务”一节中讨论的消息基础设施呢？为了降低复杂性，在图 3-5 中特意将其省略了。但现在你已经了解了微服务伸缩的基础知识，我将把面向消息的中间件引入微服务架构，以使参考架构在功能上完整。


  请注意，图 3-6 中展示了图 3-1 所代表的众多微服务中的两个。这同样是为了使图表易于理解。你需要设想，在图 3-6 所示的架构中，所有已识别的微服务都必须进行适当的伸缩。


  ![../images/477630_1_En_3_Chapter/477630_1_En_3_Fig6_HTML.jpg](img/477630_1_En_3_Fig6_HTML.jpg)


  图 3-6


  伸缩面向消息的微服务


  如图 3-6 所示，任何微服务都只能通过消息基础设施以消息的形式与其他微服务交换信息。通过利用消息基础设施中队列或主题的持久性和持久化能力，我们可以消除一个微服务对另一个依赖微服务的直接依赖。因此，如果在用户事务发生时某些微服务不可用，业务流程仍然可以继续进行，并在稍后这些微服务重新上线时完成。




  ### 可扩展的微服务


  大多数应用程序都设定了预期的生命周期终点（EoL）。即使这个终点遥不可及，应用程序在功能性和非功能性能力方面也在不断演进。随着业务扩张以及新的收购与合并发生，应用程序必须进行修改和扩展。对单体架构进行扩展或修改，其风险远高于微服务架构。这是因为，正如我们能够对微服务架构实现选择性扩展一样，我们也可以选择性地扩展或修改微服务。这给应用程序开发人员和运维团队带来了极大的便利。


  我想借用拉杰什·R·V. 在其著作《Spring 微服务》（Packt 出版社）中使用的“蜂巢类比”。图 3-7 展示了我自己的理解。


  ![../images/477630_1_En_3_Chapter/477630_1_En_3_Fig7_HTML.jpg](img/477630_1_En_3_Fig7_HTML.jpg)


  图 3-7


  微服务：蜂巢类比


  图 3-7 展示了蜜蜂如何建造蜂巢。它从建造第一个蜂室开始，然后不断向蜂巢中添加越来越多的蜂室。因此，蜂巢会随着时间的推移而生长。建造不同蜂室所使用的材料可能并不相同；它们会根据建造该蜂室时可用的材料而有所差异。然而，每个新蜂室都能与整个蜂巢完美融合，整个蜂巢作为一个整体发挥着功能。


  微服务架构遵循类似的类比。由于我们已经将应用程序分解成许多离散的部分，我们可以先逐个构建，或者仅先构建选定的几个部分，并快速将其部署到生产环境中。这大大缩短了上市时间，业务可以以较小的规模开始运作。例如，在我们的电子商务应用中，我们可以先构建产品微服务，这样产品目录和产品详情就可以首先被访问，为企业提供早期的网络存在感。接下来，我们可以将订单、运输和配送微服务添加到应用中，这样，一个最基本的电子商务应用就准备就绪并可以运行，供人们浏览商品分类并进行在线订购。也许作为下一步，我们可以构建更多功能，例如通知微服务，以便在订单状态发生变化时发送基于电子邮件和短信的通知。微服务架构的美妙之处在于，当我们不断向应用添加越来越多的微服务时，我们不会以任何方式触及生产数据中心中已有的微服务。它们保持原样，不受干扰地处理流量。当然，我们需要考虑许多问题才能将其变为现实，但这正是本书的唯一目标。因此，正如前言所述，我不会过多介绍微服务的基础知识或理论，因为其他相关书籍中已有足够多的内容。相反，我将提供一种务实的方法，让您（读者）真正动手，掌握正确的技能，以实现所讨论的特性；其中，选择性扩展和向现有应用热添加微服务只是其中的一小部分。


  ## 总结


  如果您想获得微服务架构相对于传统单体架构的真正优势，那么您刚刚了解了基于微服务的架构所需的一些实用能力。您已经了解了这些关注点，并逐步了解了解决方案的复杂性，以便您的理解是渐进且连续的。生产部署中的选择性扩展和无缝可扩展性是现代应用的关键优势，这些应用无法容忍任何停机时间。在本章中，您已经看到了这在概念上是如何实现的。在后续章节中，您还将看到如何使用实际代码来实现这一点。但在此之前，让我们在下一章关于微服务架构的内容中，从更宏观的角度审视微服务概念的起源以及它为何对当今的企业如此重要。


