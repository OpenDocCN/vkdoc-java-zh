  Ecom-security\nEcom-user\n```\n\n对于其余的微服务，您可以按任意顺序启动它们。\n\n**测试应用**\n您可以在 Chrome\
  \ 浏览器中测试该应用。同样，您可以参考第 17 章中描述的步骤来端到端地测试整个应用。\n\n**总结**\n您刚刚全面探索了 OAuth 2.0，并深入研究了与微服务上下文相关的选定授权类型的特定方面。您还将身份验证和授权集成到了微服务电子商务应用中。这是一个重大的进步，因为安全性是任何企业级应用的首要关注点。在前几章的讨论中，剩下的内容是需要深入探讨将订单和库存领域紧密联系在一起的必要性，您将在下一章中进行此操作。\n\
  \n**19. Axon 微服务与 BASE 事务**\n\n您在第 12 章中看到了 Axon 2 以及相关的运行示例。正如该章所述，本书将使用多个版本的 Axon。在第\
  \ 12 章中，您使用了 Axon 2.4.1。它需要通过注解或使用 XML 配置来显式地装配组件。在第 12 章中特意使用 Axon 2 并基于它演示示例，是因为我希望让\
  \ Bean 的装配过程显式化，以便作为首次接触 CQRS 概念和首次使用 Axon 框架的读者，您能够清晰地理解这些概念。\n在本章中，您将查看 Axon 后续版本中的示例，您将使用\
  \ Spring 5.0.7.RELEASE、Spring Boot 2.0.3.RELEASE、Axon 3.3.2 或更高版本。在 Axon 3 中，可以避免许多显式的\
  \ Bean 装配，因为 Axon 使用 Spring 应用上下文来定位构建块的具体实现，并为缺失的构建块提供默认实现。Axon 3 对 Axon 的内部工作机制进行了彻底改革，这主要是由于\
  \ Java 7 和 8 中的许多新特性。明确地说，如果您添加几个启动器依赖项，就足够了；Axon Spring Boot 组件将根据项目中拥有的其他依赖项为您设置一个基本的基础设施。例如，如果您有\
  \ JPA，那么 Axon 将自动为您配置所有基于 JPA 的组件。如果您在类上标记了 `@Aggregate` 或 `@Saga`，Axon 将自动配置操作这些聚合和\
  \ Saga 所需的组件。所有这些都将使您的工作变得更加轻松，您将在示例中很快看到这一点。\n此外，如果您回想一下第 17 章“BASE 中的 ACID”部分的讨论，您将订单和库存聚合放在了一起。通过在这种情况下使用单个资源管理器（MySQL\
  \ 持久化引擎），您避免了分布式事务。但是，您仍然使用了 ACID 风格的事务。\n让我们看看，如果有必要，是否可以避免使用 ACID 风格的事务。\n\n**注意**\n\
  在阅读本章时，您可能需要参考 Axon 3 参考文档^(⁴⁵) 和 API 文档^(⁴⁶)。\n\n在本章中，您将执行以下操作：\n\n*   通过查看代码，了解\
  \ Axon 3 与 Axon 2 的不同之处\n*   将第 12 章中单 JVM 示例的 Axon 2 命令和事件处理迁移到 Axon 3\n*   将第\
  \ 12 章中分布式命令和事件处理示例的 Axon 2 迁移到 Axon 3\n*   将第 17 章和第 18 章中的微服务电子商务应用迁移到 Axon 3\n\
  *   移除第 17 章和第 18 章中跨多个聚合使用的 ACID 风格事务\n*   了解 Axon 4，以便在完成本书最后一章后，能够顺利地进行自己的探索\n\
  \n让我们直接开始动手实践 Axon 3。\n\n**使用 Axon 3 在同一个 JVM 中进行命令和事件处理**\n您将把第 12 章中“在同一个 JVM\
  \ 中进行命令和事件处理”部分的示例从 Axon 2 迁移到 Axon 3。在此过程中，我将重点介绍主要的变化。\n\n**设计示例场景**\n由于您是在同一个示例的基础上进行构建，因此对于这个\
  \ Axon 3 示例，您将遵循第 12 章中解释的相同设计。请参考图 [12-1](https://doi.org/10.1007/978-1-4842-4501-9_12_Fig#1)。\n\
  \n**编写示例场景代码**\n本节的所有代码示例都位于文件夹 `ch19\\ch19-01` 中。请查看 `pom.xml` 以了解 Axon 依赖项的显式声明。请参见清单\
  \ 19-1。\n\n```\n\n\n```\norg.axonframework\naxon-spring-boot-starter\n3.3.2\n\n\
  清单 19-1\nAxon 3 Maven 依赖项 (ch19\\ch19-01\\Ax3-Commands-Events-Same-JVM\\pom.xml)\n\
  ```\n\n本示例中最重要的类，用于设置所有 Axon 组件，是 `EcomAppConfiguration`。\n请参见清单 19-2。\n\n```\n\
  @Configuration\npublic class EcomAppConfiguration {\n@PersistenceContext\nprivate\
  \ EntityManager entityManager;\n@Bean\n@Qualifier(\"productRepository\")\npublic\
