  \n已发货订单的交付失败\n\n示例应用程序提供了一种模拟已发货订单交付失败的机制。此事件可能由多种原因引起，例如无法找到送货地址、客户拒收货物、货物运输途中遭遇自然灾害等。无论何种情况，一旦货物退回仓库，就无需将该订单中的产品保持打包状态；相反，可以将产品释放回库存（当然，如果检查合格）以便再次销售。当模拟此类场景时，你将在图\
  \ 17-10 中看到流程和状态变化。\n\n![../images/477630_1_En_17_Chapter/477630_1_En_17_Fig10_HTML.jpg](img/477630_1_En_17_Fig10_HTML.jpg)\n\
  \n图 17-10\n订单交付失败\n\n\n\n参考图 17-10，通过后台管理员使用 Web 应用发送 REST JSON 请求来模拟已发货订单配送失败的端到端流程可总结如下：\n\
  \n1.  `order_service.js`\n    通过 HTTP 发送一个 REST JSON 请求，以配送一个已发货的订单，具体如下：\n\n```\n\
  \    $http.post(sessionStorage.getItem('apiUrl')+'/delivery/delivery',deliveryDTO)\n\
  \    ```\n\n此请求会命中 API 网关。\n\n2.  API 网关通过查询服务注册表来解析 URL，并将请求路由至 Ecom-delivery 微服务中的\
  \ Order Deliver REST 控制器。\n\n3.  Order Deliver REST 控制器创建一个新的 OrderDeliveryCommand，并将其发送至命令网关。\n\
  \n请参考清单 17-21 查看相关代码。\n\n4.  命令网关将 OrderDeliveryCommand 投递至命令总线。\n\n5.  OrderDeliveryCommandHandler\
  \ 从命令总线消费 OrderDeliveryCommand。\n\n请参考清单 17-24 查看相关代码。\n\n6.  在当前流程中，当后台管理员点击“配送失败”按钮时，`if(orderDeliveryCommand.isDelivered())`\
  \ 检查结果为 false，因此会向集群事件总线发送一个新的 OrderDeliveryFailedEvent。\n\n7.  步骤 6 中注册的 OrderDeliveryFailedEvent\
  \ 由订单流程 Saga 消费。\n\n8.  在调用 handleOrderCanceledEvent 处理器后，Saga 的生命周期结束，因为你已使用 `@EndSaga`\
  \ 对该 Saga 上的事件处理器进行了注解，如清单 17-26 所示。\n\n```\n    public class OrderProcessSaga extends\
  \ AbstractAnnotatedSaga {\n    private Long orderId;\n    @EndSaga\n    @SagaEventHandler(associationProperty\
  \ = \"orderId\")\n    public void handleOrderDeliveryFailureEvent(\n    OrderDeliveryFailedEvent\
  \ orderDeliveryFailedEvent) {\n    commandGateway.send(new OrderDeliveryFailureRollbackCommand(\n\
  \    orderDeliveryFailedEvent.getOrderId(),\n    orderDeliveryFailedEvent.getFailureReason()));\n\
  \    }\n    }\n    清单 17-26\n    OrderProcessSaga 处理 OrderDeliveryFailureEvent (ch17\\\
  ch17-01\\Ax2-Ecom-No-Security\\Ecom-core\\src\\main\\java\\com\\acme\\ecom\\core\\\
  order\\saga\\handler\\OrderProcessSaga.java)\n    ```\n\n9.  订单流程 Saga 向命令网关发送一个\
  \ OrderDeliveryFailureRollbackCommand。\n\n10. 命令网关将 OrderDeliveryFailureRollbackCommand\
  \ 投递至命令总线。\n\n11. Order 命令处理器拾取 OrderDeliveryFailureRollbackCommand 进行处理。参见清单 17-27。\n\
  \n```\n    @Component\n    public class OrderCommandHandler {\n    @Autowired\n\
  \    @Qualifier(value = \"inventoryRepository\")\n    private Repository inventoryRepository;\n\
  \    @Autowired\n    @Qualifier(value = \"orderRepository\")\n    private Repository\
  \ orderRepository;\n    @CommandHandler\n    public void handleOrderDeliveryFailure(OrderDeliveryFailureRollbackCommand\n\
  \    orderDeliveryFailureRollbackCommand) {\n    Order order = orderRepository.load(\n\
  \    orderDeliveryFailureRollbackCommand.getOrderId());\n    order.updateOrderStatus(OrderStatus.DELIVERY_FAILED);\n\
  \    rollbackInventory(order);\n    }\n    private void rollbackInventory(Order\
  \ order){\n    for(LineItem lineItem:order.getLineItems()){\n    Inventory inventory\
  \ =\n    inventoryRepository.load(lineItem.getInventoryId());\n    inventory.updateProductStock(lineItem.getQuantity(),\n\
  \    ProductStockOperation.ADD);\n    }\n    }\n    }\n    清单 17-27\n    OrderCommandHandler\
  \ 处理 OrderDeliveryFailure (ch17\\ch17-01\\Ax2-Ecom-No-Security\\Ecom-core\\src\\\
  main\\java\\com\\acme\\ecom\\core\\order\\command\\handler\\OrderCommandHandler.java)\n\
  \    ```\n\n12. Order 命令处理器从仓库加载相应的订单聚合实体，并调用订单的 `updateOrderStatus` 方法，将状态更改为“配送失败”。\n\
  \n请参见清单 17-22 中关于调用订单的 `updateOrderStatus` 方法以更改状态的代码讲解。\n\n13. 订单聚合向集群事件总线发送一个\
  \ OrderUpdatedEvent。\n\n14. 在步骤 11 中，Order 命令处理器还检索了与该订单关联的所有产品的库存项，并调用了 `updateProductStock`。其目的是回退库存以应对订单配送失败的影响，从而使这些库存可以再次用于销售。清单\
  \ 17-14 中的 rollbackInventory 描述了这一点。\n\n15. 在回退库存的同时，每个库存聚合都会向集群事件总线注册一个 InventoryUpdateEvent。\n\
  \n16. 步骤 15 中生成的 InventoryUpdateEvent 由 Ecom-product 微服务中的 Inventory 事件处理器消费。\n\n\
  17. Ecom-product 微服务中的 InventoryEventHandler 刷新其自身的库存读取模型物化视图。\n\n清单 17-11 展示了执行此操作的\
  \ handleInventoryUpdates 代码。\n\n18. OrderUpdatedEvent 由 Ecom-history 微服务中的 Order\
  \ History 事件处理器消费。\n\n19. Ecom-history 微服务中的 Order History 事件处理器更新 `Order History`\
  \ 表中订单的相应记录。\n\n清单 17-17 展示了 Order History 事件处理器处理订单更新的代码。\n至此，“已发货订单配送失败”流程的模拟完成，稍后你将看到实际用例的执行。\n\
  \n检索订单历史视图\n\n订单历史用于渲染特定用户的所有订单，并且可按状态进行过滤。这是通过 Order History Mongo 仓库实现的。有趣的是，Order\
  \ History 微服务中没有 REST 控制器；而是使用了 `@` `RepositoryRestResource`。参见清单 17-28。\n\n```\n\
  @RepositoryRestResource(collectionResourceRel = \"orderHistory\",\npath = \"orderHistory\"\
  )\npublic interface OrderHistoryRepository extends\nMongoRepository  {\n@RestResource(exported\
  \ = false)\npublic Order findByOrderId(@Param(\"orderId\") Long orderId);\npublic\
  \ List findByUserId(@Param(\"userId\") String userId);\npublic List findByOrderStatus(\n\
  @Param(\"orderStatus\") String orderStatus);\n@Override\npublic Order findOne(String\
  \ id);\n@Override\n@RestResource(exported = false)\npublic Page findAll(Pageable\
  \ pageable);\n}\n清单 17-28\nOrderHistoryRepository (ch17\\ch17-01\\Ax2-Ecom-No-Security\\\
  Ecom-history\\src\\main\\java\\com\\acme\\ecom\\order\\history\\repository\\OrderHistoryRepository.java)\n\
  ```\n\n在运行时，Spring Data REST 会自动创建上述接口的实现。然后它会使用 `@RepositoryRestResource` 注解来指示\
  \ Spring MVC 在 `/orderHistory` 路径下创建 RESTful 端点，其详细信息你已在第 7 章的“使用 Spring Boot 和\
  \ MongoDB 执行数据操作”一节中看到。\n\n设计与编码电子商务微服务基础设施\n除了上一节中的业务微服务之外，示例应用程序中还包含一组基础设施微服务。这些微服务的代码库直接易懂，其中大部分已在第\
  \ 8 章的“Spring Cloud”一节中介绍过，因此此处不再详述。不过，你将看到它们如何在整体架构中协同工作。\n\n\n\n配置服务器\n配置服务器微服务为所有其他业务微服务和基础设施微服务托管配置参数。因此，所有其他微服务的启动都需要配置服务器微服务处于健康的运行状态。您可以通过指向该微服务，从单一位置找到所有其他微服务的配置文件。在生产环境中，此位置将指向一个\
  \ GIT 仓库，以便配置文件本身能够进行版本控制。\n\n图 17-11 反映了上述依赖关系，标记为 1。\n\n![../images/477630_1_En_17_Chapter/477630_1_En_17_Fig11_HTML.jpg](img/477630_1_En_17_Fig11_HTML.jpg)\n\
  \n图 17-11\n配置服务器与服务注册中心\n\n配置服务器微服务的代码很简单，如代码清单 17-29 所示。\n\n```\n@SpringBootApplication\n\
  @EnableConfigServer\npublic class EcomConfigApplication {\npublic static void main(String[]\
  \ args) {\nSpringApplication.run(EcomConfigApplication.class, args);\n}\n}\n代码清单\
