  \ Cloud 提供了简单、易用且对 Spring 友好的 API，并且它建立在 Spring 的“约定优于配置”方法之上，因此 Spring Cloud 默认了所有配置，帮助你快速上手。在后续章节中，许多\
  \ Spring Cloud 功能将被用于构建你的电子商务示例应用程序，因此本章提供的基础知识对于你连接多个微服务并可视化整体架构至关重要。正如你可能已经推测到的，许多\
  \ Spring Cloud 组件从一开始就考虑到了故障安全和高度可用的特性。随着微服务场景下外部架构复杂性的增加，这一点尤为重要。在下一章中，你将进行端到端分析，探讨各种关键的高可用性方面和特性。\n\
  \n脚注\n\n9. 高可用性与微服务\n\n高可用性（HA）描述了软件服务可用的时间段，以及这些系统响应用户请求所需的时间。消除基础设施中可能导致服务中断的单点故障是设计高可用性系统的关键。在每一层和每个阶段复制或设计冗余组件对于实现端到端的高可用性至关重要。第\
  \ 4 章的“外部架构视角”部分讨论了微服务架构的外部架构问题。上一章中的各个部分和示例为你提供了具体的解决方案，以解决第 4 章中提到的部分问题。你了解了如何启动一个微服务的多个实例。在上一章中，你还启动了多个\
  \ Eureka 实例。在本章中，你将进一步探讨高可用性的一般细节，特别是微服务的高可用性。你还将看到一个全面的示例，演示微服务架构的端到端高可用性。\n\n\
  在本章中，你将学习以下内容：\n\n*   定义和衡量高可用性\n\n*   从 DNS 查找到存储备份，在每一层分解高可用性\n\n*   在微服务背景下重新审视高可用性方面\n\
  \n*   使用微服务和 Spring Cloud 实现高可用性的代码演示\n\n高可用性\n高可用性规划涉及识别业务连续性所必需的服务。应识别构成每个服务的组件，并列出这些系统可能的故障点。应为每个组件建立故障容忍基线，并设计故障转移策略。\n\
  \n衡量高可用性\n软件可用性以年度正常运行时间的百分比表示。以几乎无法实现的 100% 可用性理想状态为基准，最高级别的服务可用性目标被认为是“五个九”，即\
  \ 99.999% 的可用性。\n\n停机时间（通常以每年中断分钟数表示）是表示可用性的另一种方式。表 9-1 显示了不同可用性级别的比较。\n\n表 9-1\n\
  可用性级别\n\n**可用性** | **不可用性** | **五个九** | **每年停机时间** |\n\n| --- | --- | --- | ---\
  \ | --- | --- | --- | --- | --- |\n\n0.9 | 0.1 | 1 | 36 天 |\n\n0.99 | 0.01 | 2 |\
  \ 87.7 小时 |\n\n0.999 | 0.001 | 3 | 8 小时 46 分钟 |\n\n0.9999 | 0.0001 | 4 | 52.5 分钟\
  \ |\n\n0.99999 | 0.00001 | 5 | 5 分钟 16 秒 |\n\n0.999999 | 0.000001 | 6 | 32 秒 |\n\
  \n\n\n我不会解释这些级别，也不会探讨达到这些可用性级别的具体方法，因为我们已经描述和实践它们数十年了，并且有专门的书籍^(¹⁴)和参考资料^(¹⁵)进行说明。我们的讨论将只提供足够的背景知识，以便您将其与本次微服务高可用性（HA）的讨论联系起来。\n\
  \n**设定高可用性基线**\n\n高可用性基线可以根据两个参数来定义：\n\n*   **恢复时间目标（RTO）**：业务在系统不可用的情况下能够正常运行的时间长度。\n\
  *   **恢复点目标（RPO）**：系统恢复后，数据可能丢失的时间跨度。\n\n基于 RTO 和 RPO 基线目标，并进一步根据可用预算、可访问的技术、业务关键性以及可用的技术专长，软件组件的设计需要达到所需的可用性级别。\n\
  \n**分解高可用性**\n如果您的基础设施由负载均衡路由器后面的两个相同且冗余的 Web 服务器组成，那么来自客户端设备的流量可以平均分配到这些 Web 服务器之间。但是，如果其中一台服务器宕机，负载均衡器会将所有后续流量重定向到仍在线的服务器。这是一个简单的机制，如果仔细扩展，它可以用于为不同元素设计高可用性。互联网、内部网络、网络设备和软件组件都是端到端高可用性链中的基本环节。您将了解我们讨论所需的基本环节，这样本章末尾演示的概念和示例对您来说才有意义。同时，在本章中，我将在本地或私有数据中心的背景下解释相关方面。在第\
  \ 16 章中，当我描述高级高可用性模式时，我将在公有云的背景下进行解释，以便您对如何在私有云和公有云背景下看待高可用性有一个更广阔的视角。\n\n**DNS\
  \ 冗余**\n第 8 章中的“引导 URL”一节介绍了微服务架构中的域名系统（DNS）。由于 DNS 通过将人类友好的计算机主机名转换为 IP 地址来充当互联网的电话簿，因此它充当了大多数通过互联网进行的软件相关操作的引导机制。从这个点开始理解可用性是有意义的。这意味着您需要理解\
  \ DNS 冗余的机制。\n\nDNS 中断可能由配置错误、基础设施故障或 DDoS 攻击引起。DNS 冗余是针对此类场景的故障安全解决方案或备份机制。如果 DNS\
  \ 名称服务器因请求过多而过载，或者由于上述任何原因而宕机或响应缓慢，这会在 DNS 网络中造成延迟，使解析过程变慢，最终导致大多数用户无法访问 DNS 服务器。您可以通过增加可用名称服务器的数量或选择范围，为单服务器架构引入\
  \ DNS 冗余，以便有更多的名称服务器响应 DNS 查询。图 9-1 显示了一个典型的冗余 DNS 设置，其中每个 DNS 服务器都有能力充当响应 DNS 查询的主服务器。\n\
  \n![../images/477630_1_En_9_Chapter/477630_1_En_9_Fig1_HTML.jpg](img/477630_1_En_9_Fig1_HTML.jpg)\n\
  \n**图 9-1**\nDNS 冗余\n\n现在让我们更详细地探讨这一点；见图 9-2。在设置 DNS 冗余时，服务器可以设置为主-从模式，或者主-主模式。^(¹⁶)\
  \ 维护多个 DNS 提供商并保持它们同步是一个复杂的过程，但它能确保更高的可用性，同时不损害 DNS 提供商支持的先进 DNS 功能。在为您的多 DNS 网络评估多个\
  \ DNS 提供商时，请考虑提供商的全球存在点（PoP），并确保这些位于不同网络上的提供商可以通过 API 无缝集成。\n\n![../images/477630_1_En_9_Chapter/477630_1_En_9_Fig2_HTML.jpg](img/477630_1_En_9_Fig2_HTML.jpg)\n\
  \n**图 9-2**\nDNS 冗余的工作原理\n\n**DNS 负载均衡**\n一旦 DNS 冗余得到处理，您需要考虑 DNS 负载均衡。DNS 负载均衡器会审查一个服务器列表，并依次向每个服务器发送一个连接。当\
  \ DNS 发生变更时，必须在 ISP（互联网服务提供商）层面进行记录。ISP 仅在每个 TTL（生存时间）周期内刷新一次其 DNS 缓存。这意味着在缓存更新之前，ISP\
  \ 不知道发生的任何变更，并继续将流量路由到错误的服务器。\n\n除了本地负载均衡，您还可以选择全局负载均衡。全局 DNS 负载均衡将流量分布到多个数据中心，以提高性能和可用性；然而，这同样取决于您跨地域的托管策略。如果您的托管是跨地域的“双活”模式，您可以选择全局负载均衡。有些解决方案可以监控任意时刻地理上分散站点之间的连接质量，以及实际请求者的地理位置，并据此路由流量。见图\
  \ 9-3。\n\n![../images/477630_1_En_9_Chapter/477630_1_En_9_Fig3_HTML.jpg](img/477630_1_En_9_Fig3_HTML.jpg)\n\
  \n**图 9-3**\n全局服务器负载均衡\n\n**ISP 冗余**\nISP 为您提供从您的企业到互联网的管道（或连接）（图 9-4）。如果这个管道或路径中断，将影响您的网络连接，进而影响您的企业应用程序可用性。这正是\
  \ ISP 冗余可以为您提供帮助的地方。\n\n![../images/477630_1_En_9_Chapter/477630_1_En_9_Fig4_HTML.jpg](img/477630_1_En_9_Fig4_HTML.jpg)\n\
  \n**图 9-4**\n企业到 ISP 的连接\n\n\n\n边界网关协议（BGP）是实现互联网连接冗余的关键协议之一。当你的网络连接到多个互联网服务提供商（ISP）时，这被称为多宿主连接。多宿主连接^(¹⁷)提供了冗余和网络优化功能。它会选择能够为资源提供最佳可用路径的\
  \ ISP。让我们从高层次来详细了解其细节。\n\n你需要从互联网上的自治系统（AS）开始理解。自治系统是一个由连接的互联网协议（IP）路由前缀组成的集合，由一个或多个网络运营商代表单个管理实体或域进行控制，并向互联网呈现统一且明确的路由策略。ISP\
  \ 必须拥有官方注册的自治系统编号（ASN）。一个 ISP 可能支持多个自治系统；然而，互联网只看到该 ISP 的路由策略。ASN 由互联网号码分配局（IANA）按块分配给区域互联网注册管理机构（RIR）。然后，相应的\
  \ RIR 在其指定区域内将 AS 编号分配给各个实体。\n\n自治系统内的网络使用内部网关协议（IGP）相互通信路由信息。一个自治系统使用边界网关协议与其他自治系统共享路由信息。未来，BGP\
  \ 预计将被 OSI 域间路由协议（IDRP）取代。\n\n运营商中立的数据中心由多个 ISP 提供服务。拥有两个 ISP 时，你可以从彼此获得足够的带宽，以便在其中一个\
  \ ISP 出现故障时，仍能处理你的流量而不会出现任何速度下降。拥有三个或更多 ISP 时，你需要在以下两种能力之间做出选择：一个 ISP 故障时仍能无降速运行，以及除一个\
  \ ISP 外其余全部故障时仍能保持运行。\n\n图 9-5 展示了连接到多个 ISP 的示意图。请记住，该示意图是典型情况；可能存在多种替代方案。冗余路径、交换机、接入端口和路由器将确保，如果任何路径或组件发生故障，仍然存在一条不同的可用路径。\n\
  \n![../images/477630_1_En_9_Chapter/477630_1_En_9_Fig5_HTML.jpg](img/477630_1_En_9_Fig5_HTML.jpg)\n\
  \n图 9-5\n通过多个本地路由器实现到 ISP 的多宿主负载分担\n\n**应用架构冗余**\n\n如前文所述，面向互联网的边界路由器直接与 ISP 建立对等连接。用于防范蠕虫、病毒、拒绝服务（DoS）流量等的入侵防御设备，以及网络安全设备（WSA）等设备，都位于网络的这一部分。防火墙通过实施和执行有状态防火墙规则以及应用层检查，来保护通过边缘的功能。DMZ\
  \ 为基于 HTTP 的应用程序和电子商务应用提供主要安全保护。\n\n在图 9-6 中，你可以看到路由器和交换机交叉连接以提供冗余路径。类似地，应用层交换机为跨\
  \ Web 服务器的负载分担和故障切换提供支持。再次注意，此处的图示是典型情况，会根据企业需求而有所不同。\n\n![../images/477630_1_En_9_Chapter/477630_1_En_9_Fig6_HTML.jpg](img/477630_1_En_9_Fig6_HTML.jpg)\n\
  \n图 9-6\n高可用性应用部署架构\n\n部署在 DMZ 中的面向公众的服务显示为单台服务器；然而，它们也可以冗余部署。数据存储层中的核心服务器同样是冗余的。\n\
  \n**数据与存储冗余**\n\n数据存储在块级存储阵列（如 SAN，即存储区域网络）或基于文件的阵列（也称为 NAS 或网络附加存储阵列）上。它们提供不同级别的冗余，因此如果阵列中的单个组件（无论是磁盘驱动器、控制器、SAN\
  \ 或 LAN 接入端口等）发生故障，都不会完全破坏设置，用户仍然可以访问数据。基于 x86 架构的服务器硬件通常配置有到 SAN 和以太网网络的冗余连接。到异构设备的此类连接通过使用双端口适配器或使用多个（单端口）适配器来实现。适配器的选择取决于服务器中的可用空间（即\
  \ I/O 扩展插槽的数量）以及所需的硬件冗余级别。简而言之，基础设施的设置方式使其为网络和存储资源使用了冗余路径、交换机和接入端口。\n\n图 9-7 揭示了路径是冗余的，并且不允许存在单点故障。如果以太网或\
  \ SAN 路径之一发生故障，仍然可以通过一条幸存的路径保持连接。在这种故障情况下，故障切换将由某种类型的多路径或故障切换软件触发。\n\n![../images/477630_1_En_9_Chapter/477630_1_En_9_Fig7_HTML.jpg](img/477630_1_En_9_Fig7_HTML.jpg)\n\
  \n图 9-7\n非融合存储网络\n\n操作系统将拥有 NIC（网络接口卡）驱动程序，这些驱动程序允许它们与多个网卡关联，从而能够跨两条路径实现网络流量的负载均衡。如果物理网卡、线缆或其他网络组件发生故障，相同的驱动程序也会从故障中进行故障切换。\n\
  此外，存储阵列供应商提供位于操作系统和存储适配器之间的软件，该软件可以跨可用的主机总线适配器（HBA）进行负载均衡，如图 9-7 所示。当 HBA、路径或设备发生故障时，将发生到冗余组件的故障切换。\n\
  \n从图 9-7 中，你可以想象需要如此多的网络端口、存储端口、适配器和线缆来实现冗余。拥有如此多此类组件的大型数据中心将增加数据中心的建设以及运营成本。这就是融合网络发挥作用的地方，SAN\
  \ 和以太网流量可以在单一类型的线缆上运行。FCoE（以太网光纤通道）就是一个例子，它使用支持 FCoE 的适配器，这些适配器可以同时传输以太网和光纤通道流量。图\
  \ 9-8 展示了这一改进。\n\n![../images/477630_1_En_9_Chapter/477630_1_En_9_Fig8_HTML.jpg](img/477630_1_En_9_Fig8_HTML.jpg)\n\
  \n图 9-8\n融合存储网络\n\n图 9-8 清楚地表明，要实现与图 9-7 中相同或更好的冗余和故障切换能力，你需要的网络端口、存储端口、适配器和线缆更少。\n\
  \n\n\n图 9-9 展示了如何跨地域复制数据中心。图 9-9 中所示的 SAN1 和 SAN2 也可以部署在遥远的地理位置。这样，其中一个站点可以被视为灾难恢复站点。供应商解决方案可以提供同步和异步复制功能，以及块级增量复制和精细快照功能。结合了光纤通道和\
  \ IP 特性的 IP 光纤通道（FCIP）用于远距离连接分布式 SAN。FCIP 封装光纤通道并通过 TCP 套接字传输，因此它是一种隧道协议，因为它通过 IP\
  \ 网络在地理上分离的 SAN 之间建立透明的点对点连接。FCIP 依赖 TCP/IP 服务，通过局域网、城域网或广域网建立远程 SAN 之间的连接。\n\n\
  ![../images/477630_1_En_9_Chapter/477630_1_En_9_Fig9_HTML.jpg](img/477630_1_En_9_Fig9_HTML.jpg)\n\
  \n图 9-9\nSAN 复制\n\n最后但同样重要的是，来自存储层的已存储字节会被归档到非持久性介质中，并可传输到辅助站点或灾难恢复站点，这同样可以由多个服务提供商完成，以提高可靠性。\n\
  \n高可用微服务\n\n现在，您可以扩展前面“应用架构冗余”部分中解释的应用部署架构，以适应前面解释的网格应用和服务架构。如图 9-10 所示。请注意，在 MASA\
  \ 风格中，应用是从客户端设备执行的。它们可以是 Web 应用、原生移动应用、物联网应用等。但是，将它们表示在防火墙后面的核心数据中心内也并无不妥，大多数具有服务器端执行能力的\
  \ Web 应用都是这种情况。如果应用是移动应用，通常它们由应用商店（如 Playstore 等）表示。此外，如果应用没有任何服务器端执行能力，而仅在客户端设备中执行，那么它们也可以托管在\
  \ DMZ 或更靠近边界的位置，以便于分发到客户端设备。在这种情况下，安全问题和其他类似问题将由 API 层进一步拦截，您已在上一章中了解过 API 层。\n\n\
  ![../images/477630_1_En_9_Chapter/477630_1_En_9_Fig10_HTML.jpg](img/477630_1_En_9_Fig10_HTML.jpg)\n\
  \n图 9-10\nMASA 风格部署的高可用性\n\n图 9-10 中需要注意的另一点是，应用和服务可以冗余托管，尤其是在它们被设计为微服务时。如果这些概念难以消化，请不要担心；在本章末尾的工作示例中，一切都会得到澄清。\n\
  \n高可用 Spring Cloud 微服务演示\n上一节从部署角度解释了微服务架构如何融入高可用参考架构模型。在本节中，您将看到一个真实场景，您将在其中模拟从微服务角度已经讨论过的\
  \ HA 的许多方面。您将仅模拟微服务场景所必需的 HA 构建块；但是，您不会尝试演示本章前面解释的基础设施级 HA 的其他通用原则，因为它们已经过充分验证，即使应用于微服务上下文，也并无不同。\n\
  \n设计高可用微服务场景\n\n为了演示微服务 HA 场景，您将使用在第 8 章中使用的 Eureka 和 Zuul 组件。您将设计的场景如图 9-11 所示。\n\
  \n![../images/477630_1_En_9_Chapter/477630_1_En_9_Fig11_HTML.jpg](img/477630_1_En_9_Fig11_HTML.jpg)\n\
  \n图 9-11\n演示微服务的高可用性\n\n您拥有 Zuul 和 Eureka 各两个实例。接下来，您将应用组件划分为三个不同的微服务：\n\n*   **Web\
  \ 应用 μ 服务**：这是 MASA 风格中的应用组件。在您的示例中，它仅托管一个 HTML 页面，因此一旦浏览器从服务器加载此 HTML，之后从 HTML\
  \ 应用到服务器端的所有交互都将通过 API 网关进行。\n\n*   **产品 Web 服务器 μ 服务**：您模拟此微服务接收来自防火墙外部客户端的所有请求，因此此组件不会执行任何主要的数据操作。相反，它会将调用委托给产品数据服务器\
  \ μ 服务。\n\n*   **产品数据服务器 μ 服务**：在此 μ 服务中，您将模拟 CRUD 操作。为保持演示简单，您不会针对任何数据库执行实际的 CRUD\
  \ 操作。相反，您将使用内存数据存储来模拟它们。\n\n上述所有微服务也将被实例化两次，以便在任何时间点都具有冗余。\n接下来，您将使用一个 Nginx 服务器实例来模拟反向代理。此反向代理将配置为负载均衡模式，以便它可以对下一层组件进行负载均衡。\n\
  \n关于 Nginx 代理配置，您需要注意两个方面：\n\n*   **Web 应用 μ 服务**：Web 应用 μ 服务是必须首先下载到客户端设备的应用。因此，应用的引导地址必须将此应用下载并渲染到客户端浏览器中。简而言之，此组件必须能够被客户端设备直接寻址和访问，因此\
  \ Nginx 会将来自客户端的请求直接反向代理到此 μ 服务。\n\n*   **Zuul API 网关**：一旦 Web 应用 μ 服务在客户端设备中渲染完成，此后该应用对服务器的任何后续请求都必须仅通过\
  \ API 网关进行。因此，Zuul API 网关实例也应在 Nginx 反向代理中进行配置。\n\n我已从演示中移除了 DNS、防火墙等，因为它们的配置与典型部署并无不同，因此您的网络架构师将在这方面为您提供帮助。\n\
  \n演示高可用微服务的代码\n\n本节的所有代码示例都在文件夹 `ch09\\ch09-01` 中。请注意，您是在上一章示例的基础上构建的，特别是第 8 章中的\
  \ Eureka 和 Zuul 示例，因此在尝试运行此示例之前，您应该先了解这些示例的概况。但是，即使您跳过了这些示例，您仍然应该能够运行并理解此示例。见图 9-12。\n\
  \n![../images/477630_1_En_9_Chapter/477630_1_En_9_Fig12_HTML.jpg](img/477630_1_En_9_Fig12_HTML.jpg)\n\
  \n图 9-12\n演示微服务高可用性的组件\n\n此示例中的大多数组件已在第 8 章中解释过，因此我将避免重复。相反，此处将描述本节中代码相对于第 8 章代码的任何增量更改。\n\
  \n您将首先查看 Nginx 反向代理设置。配置在清单 9-1 的 Nginx 配置文件中提及。\n\n\n\n```\nhttp {\nupstream myapp1\
  \ {\nserver localhost:8082;\nserver localhost:8083;\n}\nupstream myapp2 {\nserver\
  \ localhost:9001;\nserver localhost:9002;\n}\nserver {\nlisten       8090;\nserver_name\
  \  tiger;\nlocation / {\nproxy_pass http://myapp2;\n}\n}\nserver {\nlisten     \
  \  8090;\nserver_name  localhost;\nlocation / {\nproxy_pass http://myapp1;\n}\n\
  }\n}\n代码清单 9-1\n用于演示高可用性的 Nginx 配置 (ch09\\ch09-01\\ConfNginx\\nginx.conf)\n```\n\
  \n注意\n你需要将代码清单 9-1 中的 `tiger` 替换为你自己主机的名称。\n\n该文件通常位于 Nginx 发行版中。你需要编辑 `nginx.conf`\
  \ 文件，以在 Nginx 发行版中反映上述更改，我在我的机器上找到该文件的位置是：`nginx-1.13.5\\conf`。你也可以参考附录 C 来熟悉 Nginx。\n\
  \n使用不同名称来反映不同站点的正确方法是使用本地 DNS 服务器，然后在 DNS 中创建一些 CNAME 记录，并将它们指向 Nginx 配置。不过，这里你将使用一个简单的技巧来快速运行。我的\
  \ Windows 机器的主机名是 `tiger`，而 `localhost` 也指向这台机器，因此我可以在 Nginx 配置中使用这两个不同的名称来配置两个不同的反向代理设置。\n\
  \n因此，`http://myapp1` 和 `http://myapp2` 是两个反向代理设置，其中 `http://myapp1` 指向 API 网关，而\
  \ `http://myapp2` 指向 Web 应用服务器集群，可以从该集群获取应用的默认主页。\n\n你需要在启动 API 网关和 Web 应用服务器之后才启动\
  \ Nginx，这样 Nginx 的日志中就不会出现任何错误。\n\n由于你需要启动更多实例，让我们再次审视设计，但这次重点关注已配置的不同端口和微服务名称，这样当我解释相关代码部分时，你会更容易理解。这些细节已在图\
  \ 9-13 中标注。\n\n![../images/477630_1_En_9_Chapter/477630_1_En_9_Fig13_HTML.jpg](img/477630_1_En_9_Fig13_HTML.jpg)\n\
  \n图 9-13\n用于高可用性演示的微服务名称和端口\n\nEureka 的配置与第 8 章中解释的相比没有变化。在 Zuul API 网关中，唯一的区别在于应用配置；请参见代码清单\
  \ 9-2。\n\n```\nspring:\napplication:\nname: product-service-api\nzuul:\nroutes:\n\
