  \n清单 8-9\nHystrix 仪表盘依赖项 (ch08\\ch08-03\\ProductWeb\\pom.xml)\n```\n\n第一个依赖项需要通过使用\
  \ `@EnableHystrixDashboard` 注解 `@Configuration` 来启用，而后一个依赖项会自动在你的 Web 应用程序微服务中启用所需的指标。\n\
  \n然后，你需要将 `@EnableHystrixDashboard` 添加到你的 Spring Boot `main` 类中，如清单 8-10 所示。\n\n\
  ```\n@SpringBootApplication\n@EnableCircuitBreaker\n@EnableHystrixDashboard\n@Configuration\n\
  public class EcomProductMicroserviceApplication {\npublic static void main(String[]\
  \ args) {\nSpringApplication.run(EcomProductMicroserviceApplication.class, args);\n\
  }\n}\n清单 8-10\n启用 Hystrix 仪表盘 (ch08\\ch08-03\\ProductWeb\\src\\main\\java\\com\\\
  acme\\ecom\\product\\EcomProductMicroserviceApplication.java)\n```\n\nREST Controller\
  \ 将所有调用委托给 ProductServerComponent，如清单 8-11 所示。\n\n```\n@RestController\npublic class\
  \ ProductRestController implements ProductService{\nprivate ProductServerComponent\
  \ productServerComponent;\n@Autowired\npublic ProductRestController(ProductServerComponent\n\
  productServerComponent){\nthis.productServerComponent = productServerComponent;\n\
  }\n@RequestMapping(value = \"/productsweb\", method = RequestMethod.GET ,\nproduces\
  \ = {MediaType.APPLICATION_JSON_VALUE})\npublic ResponseEntity>> getAllProducts()\
  \ {\nreturn productServerComponent.getAllProducts();\n}\n@RequestMapping(value =\
  \ \"/productsweb/{productId}\",\nmethod = RequestMethod.GET,\nproduces = MediaType.APPLICATION_JSON_VALUE)\n\
  public ResponseEntity> getProduct(\n@PathVariable(\"productId\") String productId)\
  \ {\nreturn productServerComponent.getProduct(productId);\n}\n}\n清单 8-11\nREST Controller\
  \ (ch08\\ch08-03\\ProductWeb\\src\\main\\java\\com\\acme\\ecom\\product\\controller\\\
  ProductRestController.java)\n```\n\n如清单 8-11 所示，ProductRestController 简单地将调用委托给\
  \ ProductServerComponent。在 ProductServerComponent 中，你将方法标记为 HystrixCommand，并为每个\
  \ HystrixCommand 定义回退方法，如清单 8-12 所示。\n\n```\nimport com.netflix.hystrix.contrib.javanica.annotation.HystrixCommand;\n\
  @EnableFeignClients(basePackageClasses = {ProductServiceProxy.class,\nProductAlternateServiceProxy.class})\n\
  @ComponentScan(basePackageClasses = {ProductServiceProxy.class,\nProductAlternateServiceProxy.class})\n\
  public class ProductServerComponent implements ProductService{\nprivate ProductServiceProxy\
  \ productServiceProxy;\nprivate ProductAlternateServiceProxy productAlternateServiceProxy;\n\
  @HystrixCommand(fallbackMethod = \"getAllTheProducts\")\npublic ResponseEntity>>\
  \ getAllProducts() {\nreturn productServiceProxy.getAllProducts();\n}\n@HystrixCommand(fallbackMethod\
  \ = \"getTheProduct\")\npublic ResponseEntity> getProduct(\n@PathVariable(\"productId\"\
  ) String productId) {\nreturn productServiceProxy.getProduct(productId);\n}\npublic\
  \ ResponseEntity>> getAllTheProducts() {\nreturn productAlternateServiceProxy.getAllProducts();\n\
  }\npublic ResponseEntity> getTheProduct(\n@PathVariable(\"productId\") String productId)\
  \ {\nreturn productAlternateServiceProxy.getProduct(productId);\n}\n}\n清单 8-12\n\
  Hystrix 命令 (ch08\\ch08-03\\ProductWeb\\src\\main\\java\\com\\acme\\ecom\\product\\\
  component\\ProductServerComponent.java)\n```\n\n如你所见，如果 Product Server 1 宕机，对 `productServiceProxy.getAllProducts()`\
  \ 的调用将会失败，并且由于你已将 `getAllTheProducts()` 声明为回退方法，因此将通过对 productAlternateServiceProxy\
  \ 的调用来进行重试。在发生错误（对 productServiceProxy 服务的调用失败或超时）或电路断开时快速失败的情况下，Hystrix 会使用回退方法。\n\
