  您需要发送一个新的报价进行上游处理，但希望稍微延迟处理。当此报价等待延迟结束时，您还需要再触发一个新的报价进行上游处理，该报价将几乎无延迟地直接处理完毕。结果，后创建的报价必须先到达下游系统进行进一步处理，而最初创建的报价随后到达。通过这种方式，您需要模拟消息在下游系统乱序到达的情况。\n\
