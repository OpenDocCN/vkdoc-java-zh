  \n图 13-8\n测试用例\n\n\n\n严格来说，只有三个测试用例能够验证该示例，它们分别是第一个、第二个和第七个测试用例。所有其他测试用例要么通过模拟各种故障条件，要么通过调整应用于服务方法的事务语义，来使该示例失效。我这样做是为了让你理解分布式事务环境中可能出现的错误场景。在本节中，你将查看第一个测试用例，它演示了端到端流程中严格符合\
  \ ACID 的事务。这意味着资源中的所有状态变更要么全部被批准，要么全部被回滚。其余的测试用例将在后续章节中逐一执行。\n\n作为第一步，你将在系统中创建两个测试用户。打开\
