  \n脚注\n\n8.  Spring Cloud\n\n在第 7 章中，你了解了 Spring Boot。你探索了几个使用 Spring Boot 构建的示例，因此现在你已经拥有了构建企业级应用程序（无论是中等规模还是大规模）的基础模块。在本章中，你将研究\
  \ Spring 的下一个不可或缺的部分，即 Spring Cloud，它本身构建在 Spring Boot 之上。在分布式微服务生态系统中，有一组常见的模式可以帮助你将核心服务集成为一个松散耦合的连续体，而\
  \ Spring Cloud 提供了许多强大的工具来增强 Spring Boot 应用程序的行为，以实现这些模式。你只会学习保持后续章节讨论继续进行所需的主要和关键模块，同样会借助具体的代码示例。本章中的示例是在前面示例的基础上逐步构建的，因此请不要跳过任何部分，否则你可能无法顺利运行后续示例。\n\
  \n在本章中，你将学习以下内容：\n\n*   用于进行 HTTP API 调用的 Feign 客户端\n\n*   Hystrix，用于优雅降级的断路器\n\n\
  *   Hystrix 仪表盘，显示系统中断路器的图形概览\n\n*   Ribbon，客户端负载均衡器\n\n*   Eureka，基于 REST 的注册服务\n\
  \n*   Zuul，API 网关，它是你的微服务的前端控制器\n\n*   配置服务器，用于外部化版本控制和管理微服务的配置参数\n\n用于微服务架构的 Spring\
  \ Cloud\n第 4 章中的“微服务架构”部分讨论了当你从传统架构迁移到基于微服务的架构时需要处理的主要新问题。由于微服务架构中的反转效应，许多应用程序内部的问题现在转移到了（微）服务间层面，并且随着微服务数量的不断增长，相关的外部架构复杂性也随之固有增长。\n\
  \nSpring Cloud 为微服务生态系统中典型的用例和所需的扩展机制提供了良好的开箱即用支持。这里列出其中几个：\n\n*   分布式/版本化配置\n\n\
  *   服务注册与发现\n\n*   路由与负载均衡\n\n*   服务间调用\n\n*   断路器\n\n*   分布式消息传递\n\n与 Spring Boot\
  \ 类似，Spring Cloud 采用了一种非常声明式的方法，通常只需在类路径中包含一个依赖项和/或一个注解，就能获得大量功能。现在让我们来了解其中的一些。\n\
  \n\n\nSpring Cloud 中 Feign 客户端的使用\nFeign 客户端是一个受 Retrofit、JAXRS-2.0 和 WebSocket\
  \ 等库启发的 Java 到 HTTP 的客户端绑定器。Feign 旨在通过将绑定分母统一泛化到 HTTP API（无论 REST API 的成熟度如何，即 API\
  \ 的 RESTful 程度），来降低调用 HTTP API 的复杂性。Feign 通过将注解处理成模板化请求，使 HTTP API 调用变得简单。在发送请求之前，参数会以直接的方式应用到这些模板中。然而，Feign\
  \ 仅支持基于文本的 API。尽管如此，Feign 极大地简化了系统方面的工作，例如重放请求、单元测试等。在本节中，你将学习如何调用 HTTP API。\n\n\
  设计一个 Feign 客户端场景\n\n从本节开始，以及本章中 Spring Cloud 的所有其他示例，你将使用一个简单但具有代表性的真实用例。你将首先研究用例的设计，然后进一步学习。图\
  \ 8-1 展示了一个简单的场景，其中有两个独立的应用程序，或者用我们的术语来说，是两个独立的微服务：Product Web 和 Product Server。\n\
  \n![../images/477630_1_En_8_Chapter/477630_1_En_8_Fig1_HTML.jpg](img/477630_1_En_8_Fig1_HTML.jpg)\n\
  \n图 8-1\n一个 Feign 客户端\n使用场景\n\n让我们逐一探讨这些组件：\n\n*   **Product Server**：Product Server\
  \ 是一个功能完备的微服务应用程序，实现了部分 CRUD 操作。该微服务使用 Mongo DB 来写入和读取与产品实体相关的数据。因此，该微服务封装了针对数据库执行典型\
  \ CRUD 操作所需的所有组件，并将功能作为基于 REST 的服务暴露出来，包括：\n\n    *   **ProductRestController**：暴露选定\
  \ CRUD 操作的 REST 控制器\n    *   **Product**：`Entity` 类，即你要持久化到数据库的内容\n    *   **ProductRepository**：执行所有\
  \ Mongo DB 操作管道的 Mongo 仓库\n    *   **EcomProductMicroserviceApplication**：基于 Spring\
  \ Boot 的 `Application` 类\n\n*   **Product Web**：Product Web 被设计为另一个功能完备的微服务应用程序。然而，这次该微服务应用程序不执行任何\
  \ CRUD 操作；相反，它充当面向外部世界或客户端的门面，将所有调用委托给 Product Server 微服务。因此，Product Web 也拥有之前为\
  \ Product Server 列出的所有组件；唯一的区别是没有仓库组件，因为它不进行任何数据库交互。但是，由于 Product Web 将所有传入的 REST\
  \ 调用委托给 Product Server 微服务，你必须为此创建代码，而正是出于这个目的，你将利用 Feign 客户端，而不是手动编写所有管道代码，我将在接下来解释这一点。\n\
  \n*   **ProductService**：ProductService 是列出所有选定用于暴露的方法的接口，因此 Product Server 和 Product\
  \ Web 都履行此接口中指定的契约。\n\n*   **ProductServiceProxy**：该组件是另一个扩展了 ProductService 的抽象接口，因此它获得了\
  \ Product Server 和 Product Web 接口所期望的所有方法。此外，ProductServiceProxy 是用于注解 Feign 客户端基本配置的接口。在实际意义上，这可以被视为服务器端功能的客户端代理。\n\
  \n*   **Spring Cloud Feign 客户端**：Spring 的 Feign 客户端是 Spring Cloud 即时实现的实际实现。正是通过这个代理实现，来自\
  \ Product Web 的调用被委托给 Product Server。\n\n上述交互如图 8-2 所示。\n\n\n\n![../images/477630_1_En_8_Chapter/477630_1_En_8_Fig2_HTML.jpg](img/477630_1_En_8_Fig2_HTML.jpg)\n\
  \n图 8-2\n通过 Feign 客户端进行调用委托\n\n在此，来自浏览器的请求将首先到达 Product Web 微服务。Product Web 微服务随后会借助\
  \ `ProductServiceProxy` 将调用委托给 Product Server 微服务。Product Server 微服务将从数据库中检索数据并提供响应，该响应将通过调用堆栈返回给浏览器。\n\
  \n使用 Feign 客户端的代码\n\n由于 Feign 是一个声明式 HTTP 客户端，只需在 Maven POM 中引入 `spring-cloud-starter-feign`\
  \ 依赖，并添加一个 `@EnableFeignClients` 注解，即可获得一个功能完备、配置合理且开箱即用的 HTTP 客户端。请访问 `pom.xml`\
  \ 查看 Feign 客户端依赖的显式声明。参见清单 8-1。\n\n```\norg.springframework.cloud\nspring-cloud-starter-feign\n\
  \n清单 8-1\nMaven 中的 Feign 客户端依赖 (ch08\\ch08-01\\ProductWeb\\pom.xml)\n```\n\n将 Feign\
  \ 添加到类路径后，只需再添加一个注解，即可使用默认配置属性使一切正常运行。这一点在清单 8-2 中有所说明。\n\n```\nimport org.springframework.cloud.netflix.feign.EnableFeignClients;\n\
  @EnableFeignClients(basePackageClasses = ProductServiceProxy.class)\n@ComponentScan(basePackageClasses\
  \ = ProductServiceProxy.class)\n@CrossOrigin\n@RestController\npublic class ProductRestController\
  \ implements ProductService{\nprivate ProductServiceProxy productServiceProxy;\n\
  @Autowired\npublic ProductRestController(ProductServiceProxy productServiceProxy){\n\
  this.productServiceProxy = productServiceProxy;\n}\n@RequestMapping(value = \"/productsweb\"\
  , method = RequestMethod.GET ,\nproduces = {MediaType.APPLICATION_JSON_VALUE})\n\
  public ResponseEntity>> getAllProducts() {\nreturn productServiceProxy.getAllProducts();\n\
  }\n@RequestMapping(value = \"/productsweb/{productId}\", method =\nRequestMethod.GET,\
  \ produces = MediaType.APPLICATION_JSON_VALUE)\npublic ResponseEntity> getProduct(\n\
  @PathVariable(\"productId\") String productId) {\nreturn productServiceProxy.getProduct(productId);\n\
  }\n}\n清单 8-2\n启用 Feign 客户端 (ch08\\ch08-01\\ProductWeb\\src\\main\\java\\com\\acme\\\
  ecom\\product\\controller\\ProductRestController.java)\n```\n\n在清单 8-2 的 Feign 客户端代理中，`ProductServiceProxy`\
  \ 被注入到代码中。创建这个 REST 代理客户端非常简单，大多数情况下，你只需要创建一个接口并添加一些注解。Spring Cloud 环境会在运行时创建实现，并使调用委托生效。清单\
  \ 8-3 展示了代码中的 `ProductServiceProxy`。\n\n```\nimport org.springframework.cloud.netflix.feign.FeignClient;\n\
  @FeignClient(name=\"product-proxy\", url = \"http://localhost:8080\")\npublic interface\
  \ ProductServiceProxy extends ProductService{\n}\n清单 8-3\nFeign REST 客户端 (ch08\\\
  ch08-01\\ProductWeb\\src\\main\\java\\com\\acme\\ecom\\product\\client\\ProductServiceProxy.java)\n\
  ```\n\n我不会解释 Product Server 微服务的代码，因为它与我在第 7 章“开发 RESTful Web 服务”部分中已经解释过的示例非常相似。\n\
