  \n在 AXON CQRS 中扩展写入节点的聚合根实体\n上一节演示了如何通过添加更多节点来处理命令和事件，从而在 Axon 中扩展 CQRS 架构。现在让我们探讨扩展写入节点或命令处理节点时涉及的注意事项。\n\
  \n并发修改同一实体的克隆\n在“独立读写可扩展性以提高效率”一节中，你看到了基于 Oracle 的架构模板，其中有一个单一的写入节点或主数据库用于处理所有写入操作，以及多个读取节点或辅助数据库用于管理查询。你知道采用这种架构的原因：管理高读写比或大多数业务应用的类似特性，其中读取事务的数量远高于写入事务的数量。\n\
  \n当你在数据持久化层之上添加 CQRS 层时，你已经将命令和查询处理划分到与数据持久化层分离的节点或进程中。此外，当你将处理命令和查询的微服务复制到多个实例时，典型的架构如图\
  \ 16-7 所示。\n\n![../images/477630_1_En_16_Chapter/477630_1_En_16_Fig7_HTML.jpg](img/477630_1_En_16_Fig7_HTML.jpg)\n\
  \n图 16-7\n扩展后的 CQRS 架构\n\n参考图 16-7，扩展事件处理器是直接的，因为所有的事件处理器都会被通知，并且在大多数情况下，它们都可以采取任何操作，例如刷新物化视图或缓存。如果你观察命令处理器的扩展场景，可能会更复杂。图\
  \ 16-8 描述了一个场景，其中有许多托管命令处理器的微服务实例。\n\n![../images/477630_1_En_16_Chapter/477630_1_En_16_Fig8_HTML.jpg](img/477630_1_En_16_Fig8_HTML.jpg)\n\
  \n图 16-8\n扩展后的命令处理器\n\n实际上，图 16-8 是图 16-7 中命令处理部分的分解视图。假设 Ann 和 Ria 都试图通过一个全球在线旅行社（OTA）网站预订一个航班座位。该旅行社销售单一航空公司多个航班的座位库存。该\
  \ OTA 也销售多家航空公司的航班座位库存。如果你查看航班座位的预订请求，它们是对应用程序的写入操作，如果采用 CQRS 模式，这些操作将被建模为命令和命令处理器。\n\
  由于 OTA 在全球运营，假设每个时间段发生的预订总数相当可观，因此完全有理由拥有多个包含负责发起预订的命令处理器的微服务实例。这就是图 16-8 所表示的内容。该图是对实际库存和预订系统的过度简化视图，但足以解释我们本节试图讨论和解决的核心概念。\n\
  当来自多个最终用户的预订某航空公司最后一个座位的请求几乎同时到达时，场景变得复杂。如果忽略分片、粘性会话等其他方面，你可以假设，来自多个最终用户的预订某航空公司最后一个座位的\
  \ HTTP 请求，几乎同时命中同一个包含负责发起预订的命令处理器的微服务的不同实例。这些不同的命令处理器实例将首先尝试从持久化存储（即单一数据库）加载实体，在你的场景中，这个实体就是飞机上的最后一个座位。当这种情况发生时，关于持久化存储中最后一个座位的单一事实来源会进入多个进程空间，即命令处理器微服务的不同实例。如果底层硬件是多核架构，你现在可以想象一个场景，即处理预订请求几乎同时在同一个最后座位的不同克隆上进行。你应该如何处理这种情况？\n\
  \n乐观锁\n乐观锁假设多个事务可以互不影响地完成，因此这些事务可以在不锁定它们所影响的数据资源的情况下进行。然而，在提交之前，每个事务都会验证没有其他事务修改过它的数据。如果验证发生冲突，则提交的事务会回滚。\n\
  乐观锁通常用于跨越多个数据库事务的长事务或会话。但同样的策略也可以用于短事务。你可以在实体中存储版本信息，这样如果同一个实体被多个会话更新，后续的提交尝试会被告知冲突，并且不会覆盖先前会话的工作。这种方法保证了一定的隔离性，但扩展性良好，并且在读多写少的场景下尤其有效。Hibernate\
  \ 提供了两种不同的机制来存储版本信息：专用的版本号或时间戳。\n\n对于这个示例，你使用 Hibernate 作为持久化服务提供者。因此，在同一个实体上有多个事务同时进行的情况下，Hibernate\
  \ 将允许其中一个事务提交（通常是先完成的那个），而另一个事务将收到一个 `org.hibernate.StaleObjectStateException` 异常，并且该异常将携带关于导致失败的特定实体实例的信息。这里提供了一个示例：\n\
  \n```\nCaused by: org.hibernate.StaleObjectStateException: Row was updated or deleted\
  \ by another transaction (or unsaved-value mapping was incorrect) : [com.axon.concurrency.user.model.User#1]\n\
  ```\n\n\n\n当持久化提供程序收到此类异常时，会判定发生了乐观锁冲突，并抛出 `javax.persistence.OptimisticLockException`。此异常可能在\
  \ API 调用、刷新或提交时抛出。发生这种情况时，当前事务（如果处于活动状态）将被标记为回滚。\n\nAxon 中的冲突检测与解决\n明确变更含义的主要优势之一在于能够更精确地检测冲突变更。通常，当两个用户几乎同时对同一数据进行操作时，就会发生这些冲突变更。参考图\
  \ 16-8，如果 Ann 和 Ria 都查看数据的特定版本，并认为他们最后查看的座位状态是“可预订”，那么他们俩都可能决定对该数据进行更改。他们都会发送类似“在此聚合的\
  \ X 版本上执行该操作”的命令，其中 X 是应用更改的聚合的预期版本；至少，这是 Ann 和 Ria 所期望的。在这种情况下，其中一人的更改将实际应用于预期版本。当系统即将代表另一用户应用更改时，应用更改的预期版本已经改变，因此该特定用户的更改将不会被应用。\n\
  `org.axonframework.domain.AggregateRoot<I>` 是一个接口，为表示聚合根的实体定义了契约，其中 `I` 表示此聚合标识符的类型。AggregateRoot\
  \ 提供了一个名为 `Long getVersion()` 的方法。\n`AggregateRoot.getVersion()` 返回聚合的当前版本号，如果聚合是新创建的，则返回\
  \ null。此版本必须反映应用更改的聚合的版本号。每次修改聚合并存储在存储库中时，版本号必须至少增加 1。此版本号可用于乐观锁策略以及检测冲突的并发修改。\n\
  通常，此聚合上最后一个已提交事件的序列号被用作版本号。\n为方便起见，Axon 还提供了 `org.axonframework.domain.AbstractAggregateRoot<I>`，这是\
  \ AggregateRoot 接口的一个非常基础的实现。它提供了跟踪未提交事件的机制，并根据生成的事件数维护版本号。在大多数情况下，您只需从该抽象类扩展您的聚合根实体即可。\n\
  \n演示 Axon 中乐观锁的示例\nCQRS\n在本节中，您将看到一个演示 Axon 乐观锁策略的工作示例。您将搭建一个类似于图 16-8 所示的环境；但是，您不会部署在云中。相反，您将在自己的\
  \ PC 上运行，并且只运行两个微服务实例，因为如果可以演示两个微服务的工作情况，则可以假定在涉及两个以上微服务实例的场景中也能正常工作。\n\n设计示例场景\n\
  \n您将模拟两个用户同时尝试修改同一实体。为此，您将拥有一个简单的 Axon 微服务，包含一个 REST 控制器和一个命令处理器。REST 控制器可以接受 POST\
  \ 和 PUT 请求来创建和修改 User 实体的记录。见图 16-9。\n\n![../images/477630_1_En_16_Chapter/477630_1_En_16_Fig9_HTML.jpg](img/477630_1_En_16_Fig9_HTML.jpg)\n\
  \n图 16-9\n测试乐观锁的示例场景设计\n\n您需要调整“修改”操作的处理方式，以模拟并发修改场景。为此，您将使用 `Thread.sleep()` 方法引入延迟，以便在第一个修改操作处于休眠状态时，您有足够的时间启动第二个修改请求。\n\
  \n编写示例场景代码\n代码很直接，但为了示例的完整性，我将在此展示。本节的所有代码示例都在文件夹 `ch16\\ch16-02\\Ax2-Cuncurrency-Test`\
  \ 中。\n\n首先，您将查看 User 实体类。见清单 16-5。\n\n```\nimport org.axonframework.domain.AbstractAggregateRoot;\n\
  @Entity\n@Table(name = \"USER\")\npublic class User extends AbstractAggregateRoot\
  \ {\n@Id\nprivate Long id;\n@Column(name=\"USER_NAME\")\nprivate String userName;\n\
