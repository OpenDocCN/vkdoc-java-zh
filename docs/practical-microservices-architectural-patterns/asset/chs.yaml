  Derby\n\nApache Derby 是一个完全用 Java 实现的开源关系数据库，遵循 Apache 许可证。Derby 遵循 Java、JDBC 和\
  \ SQL 标准，并支持通过 Derby Network Client JDBC 驱动程序和 Derby Network Server 进行客户端/服务器模式操作。请访问\
  \ [`https://db.apache.org/derby/`](https://db.apache.org/derby/) 获取更多信息。\n\n在本附录中，我将介绍\
  \ Derby 的以下内容：\n\n*   如何安装和配置 Derby 数据库\n\n*   如何在网络模式下启动和停止 Derby\n\n*   如何在 Derby\
  \ 中创建新数据库\n\n*   如何在 Derby 数据库中执行基本的表创建和表操作命令\n\n安装和配置 Derby\n在本节中，你将下载、安装和配置 Derby，并测试安装。Derby\
  \ 可在 [`https://db.apache.org/derby/derby_downloads.html`](https://db.apache.org/derby/derby_downloads.html)\
  \ 下载。由于我的机器上装有 Java 8，我选择了 Derby 的 10.14.1.0 版本，该版本可在 [`https://db.apache.org/derby/releases/release-10.14.1.0.cgi`](https://db.apache.org/derby/releases/release-10.14.1.0.cgi)\
  \ 获取。\n\n首先将安装归档文件保存到硬盘上的合适位置，然后将归档文件解压到你选择的位置。尽管你可以选择任何位置，例如\n\n```\nC:\\Program\
  \ Files\\Derby\\\n```\n\n但我明确避免使用路径中包含空格的目录，例如 `Program Files` 中的空格。因此，在我的 Windows\
  \ 机器上，我使用以下位置：\n\n```\nD:\\Applns\\apache\\Derby\\db-derby-10.14.1.0-bin\n```\n\n\
  将 `DERBY_HOME` 环境变量设置为你解压 Derby 发行版的位置。例如，如果你将 Derby 解压到 `D:\\Applns\\apache\\Derby\\\
  ` 目录，则将环境变量设置为\n\n```\nset DERBY_HOME=D:\\Applns\\apache\\Derby\\db-derby-10.14.1.0-bin\n\
  ```\n\n如果你愿意，还可以将 `DERBY_HOME/bin` 目录添加到 `PATH` 环境变量中，以便从任何目录运行 Derby 脚本。\n\n在网络模式下启动和停止\
  \ Derby 服务器\n应用程序可以使用熟悉的客户端/服务器模式访问 Derby 数据库。这是通过一个嵌入 Derby 并处理来自应用程序（包括在同一台机器或远程机器上不同\
  \ JVM 中运行的应用程序）的数据库请求的框架实现的。Derby Network Server 嵌入 Derby 并管理来自网络客户端的请求。\n\n要轻松启动\
  \ Derby Network Server，你必须首先将工作目录更改为 `DERBY_HOME` 内的 `bin` 文件夹（如图 G-1 所示）：\n\n![../images/477630_1_En_26_Chapter/477630_1_En_26_Fig1_HTML.jpg](img/477630_1_En_26_Fig1_HTML.jpg)\n\
  \n图 G-1\n在网络模式下启动 Derby 服务器\n\n\n\n```\ncd D:\\Applns\\apache\\Derby\\db-derby-10.14.1.0-bin\n\
  D:\\Applns\\apache\\Derby\\db-derby-10.14.1.0-bin\\bin>startNetworkServer\n```\n\
  \n这将在端口 1527 上启动网络服务器，并回显一些启动信息。当网络服务器处理连接请求时，更多信息将继续输出到同一窗口。由于网络服务器也会启动 Derby，你将在启动网络服务器的目录中找到\
  \ `derby.log` 错误日志。\n\n为了维护数据库的完整性，始终建议在使用后正确关闭网络服务器。你可以通过以下命令轻松完成此操作：\n\n```\n\
  cd D:\\Applns\\apache\\Derby\\db-derby-10.14.1.0-bin\nD:\\Applns\\apache\\Derby\\\
  db-derby-10.14.1.0-bin\\bin>stopNetworkServer\n```\n\n**创建一个新的 Derby 数据库**\n\n最好在与\
  \ Derby 安装位置不同的目录中创建和维护你的实际数据库。在我的机器上，我创建了一个父目录来存放我所有的 Derby 数据库：\n\n```\nD:\\Applns\\\
  apache\\Derby\\derbydb\n```\n\n将当前目录切换到该文件夹：\n\n```\ncd D:\\Applns\\apache\\Derby\\\
  derbydb\n```\n\n现在，你可以使用 Derby 嵌入式驱动程序来创建并连接到 `sampledb` 数据库。可以使用 Derby `ij` 工具来创建并加载\
  \ Derby 数据库。如果你已将 `DERBY_HOME/bin` 目录包含在 `PATH` 环境变量中，请键入：\n\n```\nij\n```\n\n如果你尚未将\
  \ `DERBY_HOME/bin` 目录包含在 `PATH` 环境变量中，请键入：\n\n```\njava -jar %DERBY_HOME%\\lib\\\
  derbyrun.jar ij\n```\n\n在我的机器上，我使用了以下命令：\n\n```\nD:\\Applns\\apache\\Derby\\derbydb>ij\n\
  ij version 10.14\nij>\n```\n\n现在，你可以使用以下命令创建名为 `sampledb` 的数据库，并使用嵌入式驱动程序打开与该数据库的连接：\n\
  \n```\nconnect 'jdbc:derby://localhost:1527/D:/Applns/apache/Derby/derbydb/sampledb;create=true';\n\
  ```\n\n参见图 G-2。\n\n![../images/477630_1_En_26_Chapter/477630_1_En_26_Fig2_HTML.jpg](img/477630_1_En_26_Fig2_HTML.jpg)\n\
  \n**图 G-2** 以网络模式启动 Derby 服务器\n\n上述命令提示符也将连接到新创建的数据库 `sampledb`。使用以下命令退出此窗口：\n\n\
  ```\nexit;\n```\n\n退出后，你可以再次使用 Derby 嵌入式驱动程序，通过以下代码重新连接到之前创建的数据库：\n\n```\nD:\\Applns\\\
  apache\\Derby\\ derbydb>ij\nij version 10.14\nij>connect 'jdbc:derby://localhost:1527/D:/Applns/apache/Derby/derbydb/sampledb;create=false';\n\
  ```\n\n以下是一些有用的命令：\n\n*   `SHOW CONNECTIONS`：如果没有连接，`SHOW CONNECTIONS` 命令会返回“No\
  \ connections available.”。否则，此命令会显示连接名称列表以及用于连接它们的 URL。如果存在当前活动连接，其名称后会标有 ∗。\n\n\
  *   `SHOW SCHEMAS` 显示当前连接中的所有模式。\n\n*   `SHOW TABLES` 显示当前模式中的所有表。如果指定了 `IN schemaName`，则显示给定模式中的表。\n\
  \n参见图 G-3。\n\n![../images/477630_1_En_26_Chapter/477630_1_En_26_Fig3_HTML.jpg](img/477630_1_En_26_Fig3_HTML.jpg)\n\
  \n**图 G-3** 使用 Derby 嵌入式驱动程序 `ij` 与数据库交互\n\n**在 Derby 数据库中执行基本命令**\n\n现在，你可以使用以下\
  \ SQL 命令测试你的数据库：\n\n```\nCREATE TABLE SIMPLETABLE (ID INT PRIMARY KEY, NAME VARCHAR(12));\n\
  DESCRIBE SIMPLETABLE;\nINSERT INTO SIMPLETABLE VALUES (50,'FIFTY'),(60,'SIXTY'),(70,'SEVENTY');\n\
  SELECT ∗ FROM SIMPLETABLE;\nDELETE FROM SIMPLETABLE;\nDROP TABLE SIMPLETABLE;\n\
  ```\n\n参见图 G-4。\n\n![../images/477630_1_En_26_Chapter/477630_1_En_26_Fig4_HTML.jpg](img/477630_1_En_26_Fig4_HTML.jpg)\n\
  \n**图 G-4** 使用 `ij` 对 Derby DB 执行基本 SQL 操作\n\n**总结**\nDerby 是一个具有强一致性特征的关系型数据库，这就是我在本书中使用\
  \ Derby 来演示分布式事务场景的原因。\n\n**MySQL**\n\nMySQL 是一个流行的开源 SQL 数据库管理系统，由 Oracle 公司开发、分发和支持。MySQL\
  \ 管理结构化的数据集合。MySQL 数据库帮助你添加、访问和处理存储在数据库中的数据。MySQL 将数据存储在单独的表中。数据库结构被组织成针对速度优化的物理文件。逻辑模型包含数据库、表、视图、行和列等对象，提供了一个灵活的编程环境。“MySQL”中的\
  \ SQL 部分代表“结构化查询语言”，这是用于访问数据库的最常见的标准化语言。MySQL 软件使用 GPL（GNU 通用公共）许可证，是开源软件。你可以在 [`www.mysql.com/`](http://www.mysql.com/)\
  \ 获取有关 MySQL 的更多详细信息。\n\n在本附录中，我将介绍 MySQL 的以下内容：\n\n*   如何下载和安装 MySQL\n\n*   如何为\
  \ MySQL 初始化数据目录\n\n*   如何启动 MySQL 服务器并连接到服务器\n\n*   如何测试与 MySQL 服务器的连接并断开与服务器的连接\n\
  \n*   如何创建数据库并执行基本的表操作\n\n*   如何向数据库添加用户帐户\n\n**安装 MySQL**\n在本节中，你将下载、安装和配置 MySQL，并测试安装。MySQL\
  \ 可在 [`https://dev.mysql.com/downloads/mysql/`](https://dev.mysql.com/downloads/mysql/)\
  \ 下载。\n\n对于 Microsoft Windows，MySQL 仅适用于 64 位操作系统。你可以下载以下存档文件：\n\n```\nmysql-8.0.14-winx64.zip\n\
  ```\n\n将上述存档文件解压到所需的安装目录。尽管你可以选择任何位置，例如：\n\n```\nC:\\Program Files\\MySQL\\\n```\n\
  \n但我明确避免路径中包含空格的位置，例如 `Program Files` 中的空格。因此，在我的 Windows 机器上，我使用以下位置：\n\n```\n\
  D:\\Applns\\MySQL\\mysql-8.0.14-winx64\n```\n\n详细的安装说明也可在 [`https://dev.mysql.com/doc/refman/8.0/en/windows-install-archive.html`](https://dev.mysql.com/doc/refman/8.0/en/windows-install-archive.html)\
  \ 找到。\n\n**初始化数据目录**\n\n由于你使用 noinstall 包安装了 MySQL，因此不包含数据目录。要初始化数据目录，请从解压存档的主文件夹中调用\
  \ `mysqld`，如下所示：\n\n```\ncd D:\\Applns\\MySQL\\mysql-8.0.14-winx64\nD:\\Applns\\\
  MySQL\\mysql-8.0.14-winx64>D:\\Applns\\MySQL\\mysql-8.0.14-winx64\\bin\\mysqld --initialize\
  \ --console\n2019-01-22T13:26:05.124628Z 0 [System] [MY-013169] [Server] D:\\Applns\\\
  MySQL\\mysql-8.0.14-winx64\\bin\\mysqld (mysqld 8.0.14) initializing of server in\
  \ progress as process 14464\n2019-01-22T13:26:54.151969Z 5 [Note] [MY-010454] [Server]\
  \ A temporary password is generated for root@localhost: S9wdszB#\n```\n\n初始化数据目录的详细说明也可在\
