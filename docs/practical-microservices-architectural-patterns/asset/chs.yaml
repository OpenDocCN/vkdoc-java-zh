  \ 13 章。\n\n脚注\n\n13. 分布式事务\n\n在上一章中，你了解了如何使用 Axon 框架实现 CQRS 模式的不同场景。在本章中，你将重新审视\
  \ Axon，以应对微服务上下文中的更多场景，包括执行长时间运行的计算处理。为了有效地做到这一点，让我们从一些基础知识开始讨论，包括事务。简单形式的事务是实体之间的值变更或交换。涉及的参与方可以是单个实体或多个实体。当涉及的参与方是单个实体时，该事务通常是本地事务。如果涉及多个参与方，则根据所涉及实体的性质和位置，该事务可以归类为本地事务或分布式事务。\n\
  事务可能涉及单个步骤或多个步骤。无论是单步还是多步，事务都是一个包含这些单独步骤的单一工作单元。为了成功完成一个事务，所涉及的每个单独步骤都必须成功。如果任何单独步骤失败，事务应撤销该事务中已执行的其他步骤的所有影响。\n\
  有了这个前言，你将深入了解事务的细节，特别是分布式事务。我只会触及事务的基本要点；我会花更多时间讨论实际影响方面，尤其是在微服务的上下文中。更深入地详述事务需要一本完整的书，因此这里的讨论将仅限于围绕微服务以及一些可用于构建可靠微服务的实用工具。\n\
  \n在本章中，你将学习\n\n*   计算机网络的不确定性特征\n\n*   一般的事务方面\n\n*   分布式事务与本地事务\n\n*   ACID 与 BASE\
  \ 事务\n\n*   一个使用多个资源管理器演示分布式事务的完整示例\n\n\n\n两位将军悖论\n在计算机网络领域（特别是涉及传输控制协议时），文献表明 TCP\
  \ 无法保证端点之间（完全）的状态一致性。这一点通过**两位将军悖论**（亦称两位将军问题、两军问题或协同攻击问题）得以阐明。这是一个思想实验，揭示了在通过不可靠链路通信以协调行动时存在的陷阱及相关设计挑战。\n\
  \n在任意通信故障面前，两位将军悖论是无解的；然而，该问题为任何分布式一致性协议设定了现实期望的基础。因此，要理解这个问题，你需要理解其中涉及的相关不确定性，这将为深入学习事务提供一个完美的类比。\n\
  \n阐述两位将军悖论\n\n本节将通过经典示例场景来阐述两位将军悖论。图 13-1 展示了两支军队，分别由不同的将军率领，他们正联合准备进攻图中所示的设防城市。两支军队都驻扎在城市附近，但各自位于自己的山谷中。两位将军所在的两座山丘之间隔着第三座山谷，两位将军沟通的唯一方式就是派遣信使穿越这座山谷。第三座山谷被城市的守军占据，因此任何穿越该山谷的信使都有可能被俘。\n\
  \n![../images/477630_1_En_13_Chapter/477630_1_En_13_Fig1_HTML.jpg](img/477630_1_En_13_Fig1_HTML.jpg)\n\
  \n图 13-1 阐述两位将军悖论\n\n两位将军已同意发动进攻；然而，他们尚未就进攻时间达成一致。只有当两支军队同时进攻城市时，攻击才会成功；单独进攻的军队将必死无疑。因此，将军们必须相互沟通，以决定进攻时间，并同意在该时间联合进攻；每位将军还必须知道，另一位将军知道他们已经共同同意了进攻计划。消息接收的确认信息可能与原始消息本身一样容易丢失，因此需要可能无限多的消息序列才能达成（近乎）共识。两位将军将永远无法确定他们最后派出的信使是否成功抵达。\n\
  \n解决方案探讨\n计算机网络是分布式系统的支柱；然而，任何网络的可靠性都必须经过检验。分布式系统需要解决软件系统的可扩展性和灵活性，因此网络是必要之恶。方案应当接受网络的不确定性，而不是试图消除它；相反，应该将其缓解到可接受的程度。\n\
  \n在两位将军悖论中，你可以想到许多可接受的机制，例如：\n\n*   第一位将军可以派出 50 名信使，预计所有 50 名信使都被俘的概率很低。这位将军将固定进攻时间，以便为这\
  \ 50 名信使中的全部、部分或多数能够抵达另一位将军留出足够时间。然后，无论情况如何，他都会在约定的时间发起进攻，而第二位将军只要收到任何一条消息，也会发起进攻。\n\
  \n*   第二种方法是，第一位将军发送一连串消息，第二位将军对收到的每条消息发送确认，随着收到消息数量的增加，每位将军的信心也随之增强。\n\n*   在第三种方法中，第一位将军可以在每条消息上做标记，标明这是\
  \ n 条消息中的第 1 条、第 2 条、第 3 条，等等。这样，第二位将军可以估算信道的可靠性，并发送适当数量的回复消息，以确保至少有一条消息被接收的概率很高。如果网络高度可靠，那么一条消息就足够了，额外的消息也无济于事；如果网络不可靠，最后一条消息丢失的可能性与第一条消息一样大。\n\
  \n作为将军的微服务\n当你将一个“从此幸福地生活在一起”的单体应用状态，拆分为“从此幸福地分离生活”的状态时，你就将一支军队从一个将军分成了多个将军。每个微服务都有自己的将军，或者其本身就是一个将军，并且可能需要不止一位将军来协调任何有用的功能。通过采用多语言架构，每个微服务都将拥有自己的资源，无论是数据库还是文件存储。网络是这些微服务进行协调和通信的唯一途径。跨微服务对资源所做的更改的影响必须保持一致。这种一致性取决于你选择哪种模式或协议来协调和传达更改命令以及确认信息，这些确认信息充当了在微服务之间实施该更改的协议。\n\
  \n\n\nTCP/IP，将军之间的峡谷\n互联网协议（IP）并不可靠。数据包可能延迟、丢失、重复，或到达顺序与原始意图不符。传输控制协议在 IP 之上增加了一个更可靠的层。TCP\
  \ 可以重传丢失的数据包、消除重复数据包，并按照发送方意图的顺序组装数据包。然而，虽然 TCP 可以隐藏丢包、重复或乱序问题，但它可能无法消除网络中的延迟，因为网络是分组交换的。传统的固定电话网络极其可靠，音频帧延迟和通话中断非常罕见。这是因为在通话双方的整个路由上，网络会为你分配固定且有保障的带宽；这被称为电路交换。然而，数据中心网络和互联网并非电路交换。它们的主干网——以太网和\
  \ IP——是分组交换协议，会遭受排队问题，这可能导致网络中无上限的延迟。\n\n每个微服务都有自己的内存空间用于计算，以及用于持久化和存储的资源，一个微服务无法访问另一个微服务的内存或资源（除非通过网络，通过暴露的\
  \ API 向另一个微服务发出请求）。互联网以及数据中心内部的大多数网络（通常是以太网）都具有上述特性，而这些网络成为了微服务进行协调和通信的唯一途径。在这种网络中，一个微服务可以向另一个微服务发送消息，但网络无法保证消息何时到达，甚至是否能够到达。如果你发送一个请求并期望得到响应，中间可能会出现许多问题。\n\
  \n发送方微服务甚至无法判断请求或消息是否已送达。次优方案是让接收方微服务发送一条响应消息，但这条消息本身也可能丢失或延迟。在异步网络中，这些问题难以区分。当一个微服务向另一个微服务发送请求但未收到响应时，不可能知道原因。处理此类问题的典型方法是使用超时机制：一段时间后，你放弃等待并假设响应永远不会到达。然而，当超时发生时，你仍然不知道远程微服务是否收到了你的请求；并且如果请求仍在某处排队，它仍有可能被送达给接收方微服务，即使发送方微服务已经放弃了之前的请求并可能已重新发送了请求，在这种情况下，将会触发一个重复的请求。针对此问题的高级解决方案在参考文献中有所论述。^(²⁷)\n\
  \n事务\n事务帮助你控制对同一数据集的访问权限，无论是读取还是写入。处于变化状态的数据可能不一致，因此当状态从“变更中”转变为“已提交”或“已回滚”时，其他读取和写入操作应等待。现在，你将了解与事务相关的细节。\n\
  \n事务核心的硬件指令集\n对于单个数据库节点上的事务，原子性是在存储层面实现的。当事务提交时，数据库会使事务的写入持久化（通常通过预写式日志^(²⁸)），随后将一条提交记录追加到磁盘上的日志中。因此，处理该写入操作的磁盘驱动器控制器在确认写入是否成功方面起着关键作用。\n\
  \n一旦提交，事务便无法撤销。你不能在事务提交后改变主意并追溯性地撤销它。这是因为，一旦数据被提交，它可能对其他事务可见，从而其他事务可能已经开始依赖该数据。\n\
  \n事务中的 ACID\n为了符合规范，事务应具备 ACID（原子性、一致性、隔离性和持久性）属性。让我们逐一探讨。\n\n*   **原子性：** 事务的结果，如果是提交，则事务的所有写入作为一个工作单元被持久化。如果是中止，则事务的所有写入作为一个工作单元被回滚（即撤销或丢弃）。如果你回顾上一节，我描述了正是某个特定磁盘驱动器的单个控制器位于核心，负责做出提交或回滚的决定，你需要认识到，无论是写入单个字^(²⁹)还是多个字（取决于\
  \ 32 位或 64 位），正是硬件层面提供的支持，帮助你将它们组合成一个工作单元的写入。\n\n*   **一致性：** 该属性保证，无论事务是提交还是回滚，事务都会使数据保持一致性状态。要理解“一致性状态”的含义，它指的是遵守数据库的约束或规则。通常，业务规则约束是通过数据库完整性约束来建模的。因此，维护一致性是资源管理器和应用程序双方的共同努力。应用程序确保键、参照完整性等方面的一致性，而事务管理器则确保事务的原子性、隔离性和持久性。例如，如果你的事务是将航班上的最后一个座位分配给两位同时预订该航班的旅客中的一位，那么如果该座位从空闲座位库存中移除，并分配给且仅分配给其中一位旅客，同时向另一位尝试同时预订的旅客显示该座位已不可分配或不可再分配，则该事务是一致的。\n\
  \n*   **隔离性：** 隔离性属性保证一个事务中正在进行的更改不会影响另一个事务访问的数据。这种隔离可以控制到更精细的级别，“事务隔离机制”一节将对此进行描述。\n\
  \n*   **持久性：** 该属性要求，当事务提交时，事务对数据所做的任何更改都必须被永久记录。当事务提交时，数据库会使事务的写入持久化（通常通过预写式日志），随后将一条提交记录追加到磁盘上的日志中。如果数据库在此过程中崩溃，则数据库重启后可以从日志中恢复该事务。如果提交记录在崩溃前已写入磁盘，则该事务被视为已提交。否则，该事务的所有写入都将被回滚。因此，磁盘完成写入提交记录的时刻是决定提交的唯一关键点；在此之前，仍有可能中止（由于崩溃），但在此之后，事务即被提交（即使数据库随后立即崩溃）。因此，是处理写入操作的磁盘驱动器控制器使得提交具有原子性。话虽如此，如果在此过程中发生错误或崩溃，上述日志可用于重建或重新创建数据更改。\n\
  \n事务模型\n事务模型指的是在封闭事务的上下文中，如何组织单个事务的协调。你将在此了解主要的事务模型：\n\n\n\n*   **扁平事务：** 在扁平事务中，当某个步骤失败时，整个事务都会回滚。扁平事务会依次完成每个步骤，然后才进入下一步。每个步骤按顺序访问相应的资源。当事务使用锁时，它一次只能等待一个对象。\n\
  \n*   **嵌套事务：** 在嵌套事务中，原子事务被嵌入到其他事务中。顶层事务可以开启子事务，每个子事务又可以开启更下一级的子事务，这种嵌套可以持续进行。单个嵌入事务的效果不会影响其父事务。当父事务中止时，其所有子事务也会中止。然而，当子事务中止时，父事务可以决定是否中止。在嵌套事务中，一个子事务可以是另一个嵌套事务，也可以是一个扁平事务。\n\
  \n*   **链式事务：** 在链式事务中，每个事务都依赖于前一个事务的结果和资源。链式事务也称为串行事务。其显著特征是，当一个事务提交时，它的资源（如游标）会被保留，并可供链中的下一个事务使用。因此，链内的事务可以看到链中前一个提交的结果；但是，链外的事务无法看到或更改链内事务正在影响的数据。如果链中某个事务失败，只有该事务会被回滚，而之前已提交的事务则不会。\n\
  \n*   **Saga：** Saga 与嵌套事务类似；然而，其中的每个事务都有一个对应的补偿事务。如果 Saga 中的任何一个事务失败，则会调用之前成功运行的每个事务的补偿事务。\n\
  \nEJB 与 Spring 中的事务属性\n\nSpring 和 EJB 都允许用户自由选择编程式或声明式事务管理。对于编程式事务管理，你需要针对 JDBC\
  \ 和 JTA API 进行编码。使用声明式方法，你可以将事务控制外部化到配置文件中。此外，你需要从可用的事务属性中进行选择，以获得所需的行为。EJB 规范定义了六个基本的事务属性。随后，Spring\
  \ 为所有六个事务属性提供了对应的实现。事实上，Spring 拥有更多：\n\n*   **PROPAGATION_REQUIRED（EJB 中的 REQUIRED）：**\
  \ 支持当前事务；如果不存在则创建一个新事务。\n*   **PROPAGATION_REQUIRES_NEW（EJB 中的 REQUIRES_NEW）：**\
  \ 创建一个新事务；如果存在当前事务则将其挂起。\n*   **PROPAGATION_NOT_SUPPORTED（EJB 中的 NOT_SUPPORTED）：**\
  \ 以非事务方式执行；如果存在当前事务则将其挂起。\n*   **PROPAGATION_SUPPORTS（EJB 中的 SUPPORTS）：** 支持当前事务；如果不存在则以非事务方式执行。\n\
  *   **PROPAGATION_MANDATORY（EJB 中的 MANDATORY）：** 支持当前事务；如果不存在则抛出异常。\n*   **PROPAGATION_NEVER（EJB\
  \ 中的 NEVER）：** 以非事务方式执行；如果存在事务则抛出异常。\n*   **PROPAGATION_NESTED（EJB 中无对应项）：** 如果存在当前事务，则在嵌套事务内执行；否则行为类似于\
  \ PROPAGATION_REQUIRED。EJB 中没有类似的功能。嵌套事务的实际创建仅适用于特定的事务管理器。开箱即用的情况下，这仅适用于在 JDBC 3.0\
  \ 驱动上工作的 JDBC DataSourceTransactionManager。一些 JTA 提供者也可能支持嵌套事务。\n\n事务隔离机制\n\n事务隔离指的是，当多个并发事务（通常针对同一数据集）发生时，保护一个事务免受其他事务影响。事务管理器依赖两种机制来实现事务隔离：\n\
  \n*   **锁定：** 锁定控制事务对特定数据集的访问。读锁是非独占的，允许多个事务并发读取数据。然而，写锁是独占锁，只允许单个事务更新数据。\n*   **序列化：**\
  \ 当多个事务并发发生时，序列化是一种保证其效果如同顺序执行（而非并发执行）的机制。锁定是强制序列化的一种手段。\n\n事务隔离级别\n\n所使用的序列化和锁的类型，以及它们受影响的程度，决定了事务执行时的隔离级别。Java\
  \ 企业版在 `java.sql.Connection` 接口中定义了以下类型的隔离级别：\n\n*   **TRANSACTION_NONE：** 指示不支持事务。\n\
  *   **TRANSACTION_READ_COMMITTED：** 指示防止脏读；但可能发生不可重复读和幻读^(³⁰)。\n*   **TRANSACTION_READ_UNCOMMITTED：**\
  \ 指示可能发生脏读、不可重复读和幻读。此级别允许一个事务更改的行，在该行任何更改提交之前，被另一个事务读取（脏读）。如果任何更改被回滚，第二个事务将检索到无效的行。\n\
  *   **TRANSACTION_REPEATABLE_READ：** 指示防止脏读和不可重复读；但可能发生幻读。\n*   **TRANSACTION_SERIALIZABLE：**\
  \ 指示防止脏读、不可重复读和幻读。此级别禁止以下情况：一个事务读取满足 WHERE 条件的所有行，第二个事务插入一个满足该 WHERE 条件的行，然后第一个事务重新读取相同条件，在第二次读取时检索到额外的幻影行。\n\
  \n序列化和锁的强制执行是宽松还是严格，取决于应用程序在数据陈旧性方面愿意容忍的并发类型。下一节将解释这个概念。\n\n事务并发\n\n当多个并发事务（通常针对同一数据集）发生时，一个事务受其他事务影响的程度，可以通过应用程序愿意容忍的并发级别来控制。级别如下：\n\
  \n*   **脏读：** 当一个事务读取了另一个事务已写入但尚未提交的数据时，就会发生脏读。\n*   **不可重复读：** 如果一个事务读取数据，并且在同一个事务中重新读取相同数据时得到不同的结果，这就是不可重复读。\n\
  *   **幻读：** 当单个事务多次读取同一数据集时，另一个事务插入并添加了额外的数据，就会发生幻读。\n\n事务隔离控制方法\n\n严格的事务隔离级别可能导致性能不佳的场景，在这种情况下，有两种通用的锁定方法：\n\
  \n\n\n*   **乐观锁：** 乐观锁采取一种务实的方法，鼓励客户端保持“乐观”，认为数据在使用期间不会发生变化，并允许它们同时访问相同的数据。如果任何特定客户端的事务想要更新，当且仅当最初提供给客户端的数据与数据库中当前数据相同时，该更新才会被提交。这种方法对于热点数据不太理想，因为比较操作会频繁失败。\n\
  \n*   **悲观锁：** 悲观锁可能使用信号量^(³¹)或之前讨论过的任何事务机制。每次读取都需要一个读锁，每次写入都需要一个写锁。读锁不是排他性的，而写锁是排他性的。当你执行类似以下查询时，可能会获得一个典型的读锁：\n\
  \n```\n    SELECT ∗ FROM QUOTES_TABLE WHERE QUOTES_ID=5 FOR UPDATE;\n    ```\n\n\
  只有当数据使用完成后，这两个锁才会被释放。只要没有其他事务持有写锁，就可以将读锁授予请求的事务。对于要更新的事务，它需要一个写锁，并且在事务持有写锁期间，当且仅当其他事务不需要读锁时，才允许它们读取数据。此外，如果一个事务持有写锁，它将不允许其他事务读取其正在更改的数据，直到这些更改被提交。\n\
  \n企业事务类别\n事务根据其使用上下文的不同而有不同的含义。它可能出现在单体系统内的多个操作上下文中，也可能出现在多个单体或多个微服务的上下文中，或者出现在具有共同（或冲突）利益的多个企业的上下文中。你将在此上下文中简要了解不同的事务类别。\n\
  \nACID 事务\n\nACID 事务与原子事务相关，其中多个步骤或操作被执行，其意图是要么全部成功，要么由于一个或多个步骤的失败而全部回滚到之前的状态。本章前面部分的大部分讨论都涉及\
  \ ACID 事务，因此已经做了足够的解释。现在，你将了解 ACID 事务处理（TP）系统的架构。图 13-2 描绘了一个由多个资源管理器组成的典型架构。\n\n\
  ![../images/477630_1_En_13_Chapter/477630_1_En_13_Fig2_HTML.jpg](img/477630_1_En_13_Fig2_HTML.jpg)\n\
  \n图 13-2\n具有多个资源的分布式 ACID 事务\n\nBASE = 切分后的 ACID\nACID 是唯一能保证数据一致性的风格。然而，如果分布式系统使用\
  \ ACID 事务，那么所有地方都必须以锁步模式进行。这要求所有组件都可用，并且还会增加数据的锁定时间。BASE 是一种架构风格，它通过将（整体的、理想的）ACID\
  \ 事务切分成更小的片段（每个片段本身仍然是 ACID 的）来放宽这些要求。\n消息传递用于使更改在整个系统中传播，每个更改理想情况下由一个 ACID 事务处理。这些消息是异步的而非同步的，这意味着在\
  \ BASE 系统中，第一个和最后一个 ACID 事务之间存在延迟。\n这就是为什么这种风格表现出“最终一致性”：必须等待所有消息在系统中传播并在适当的地方被应用。第\
  \ 11 章的“微服务的最终一致性”部分对此进行了详细讨论。\n现在，我将通过逐步缩小 ACID 事务的范围，分步介绍 BASE。\n\nBASE 事务\n\n\
  图 13-3 展示了一个包含四个不同微服务的 BASE 架构。每个微服务仍然具有 ACID 属性（独立于系统中的其他微服务）。\n\n![../images/477630_1_En_13_Chapter/477630_1_En_13_Fig3_HTML.jpg](img/477630_1_En_13_Fig3_HTML.jpg)\n\
  \n图 13-3\nBASE 架构，其中每个微服务通过 XA 事务仍然具有 ACID 保证\n\n这是一个以 BASE 风格运行的微服务生态系统架构，它以 ACID\
  \ 风格发送或接收消息。你将在后面的章节（“分布式事务示例”部分下的“设计示例场景”小节）中了解每个微服务的功能；不过，目前请先关注这里描绘的技术组件。之所以称为\
  \ BASE，是因为通过 ActiveMQ，你不需要知道也不关心消息的去向或来源；报价处理和报价结算之间看到的只是队列（而经典的 ACID 架构会为报价结算和报价处理创建一个大的\
  \ ACID 事务）。你使用 JTA/XA 来确保消息被精确处理一次，因为你不想丢失消息（或得到重复消息）。即使发生中间崩溃，也能保证从队列接收的消息能够到达数据库。即使发生中间崩溃，也能保证发送的消息的领域对象状态在数据库中得到更新。\n\
  对于需要强数据一致性保证的系统来说，这是一个很好的解决方案。在其他系统中，强数据一致性并非那么重要，你可以进一步放宽要求——通过在 BASE 架构中使用更细粒度的\
  \ ACID 事务范围。\n当你过渡到微服务时，你希望避免系统范围的分布式事务。然而，与单体场景相比，你的实际数据分布得更广，因此对分布式事务的需求非常真实。正是在这种背景下，我们讨论用最终一致性替代即时一致性。第\
  \ 11 章的“微服务的最终一致性”部分对此进行了详细讨论。\n\n宽松的 BASE 事务\n在某些情况下，你不太关心消息丢失或重复，并且你的 ACID 事务范围可以限制在单个资源管理器内，例如仅限纯本地事务。这提供了更高的性能，但也有代价：到目前为止，BASE\
  \ 系统具有最终一致性，但这种架构默认不再保证这一点。\n正如下一章将展示的，为了获得一定程度的 consistency，应用程序开发人员需要做更多的工作；在某些情况下，最终一致性甚至可能无法实现，尤其是在消息丢失的情况下。\n\
  \n图 13-4 展示了一个在宽松 BASE 事务中包含多个资源管理器的典型架构。\n\n![../images/477630_1_En_13_Chapter/477630_1_En_13_Fig4_HTML.jpg](img/477630_1_En_13_Fig4_HTML.jpg)\n\
  \n图 13-4\n具有多个资源的分布式、宽松 BASE 事务\n\n\n\n微服务资源分布在各个节点上。你希望避免分布式事务，因为跨节点锁定资源会阻碍系统的可扩展性。此外，你可以接受最终一致性，但也不介意无法完美实现它。如果是这样，图\
  \ 13-4 展示了如何遵循宽松的 BASE 模型。应用程序要么直接与一个或多个相关的资源管理器交互，要么更典型地，通过某个负载均衡器或网关进行交互，该网关将传入请求分发到一组具有对称职责和能力的资源管理器池中。请求由一个或多个资源管理器处理，随后变更会传播到一个或多个其他资源管理器。所涉及的资源管理器数量取决于分片模型（详见第\
  \ 11 章的“伸缩立方体”部分）和所选的系统配置，范围从单个节点（单副本）到节点仲裁组，理论上甚至可以是给定数据记录的所有副本。\n\nAxon 提供了许多功能，你可以利用这些功能跨资源管理器展开\
  \ BASE 事务，而无需使用分布式事务管理器或事务协调器。换句话说，在 BASE 事务中不存在分布式事务管理器或事务协调器；尽管如此，事务仍然可以跨多个资源管理器传播，以达到某种程度的最终一致性。图\
  \ 13-5 描绘了这一场景，展示了 Axon 中实现此功能的关键组件。\n\n![../images/477630_1_En_13_Chapter/477630_1_En_13_Fig5_HTML.jpg](img/477630_1_En_13_Fig5_HTML.jpg)\n\
  \n图 13-5\n支持 BASE 事务的 Axon 组件\n\n你将查看典型的宽松 BASE 事务步骤，请参考图 13-5。来自浏览器的写入请求将以 HTTP\
  \ PUT 的形式到达 HTTP 服务器或负载均衡器。\n\n1.  请求被路由到 API 网关。\n\n2.  API 网关将此请求路由到 Axon 应用程序的第一个接触点，即（前端）REST\
  \ 控制器。\n\n3.  REST 控制器在解包请求后，将其解释为对实体变更的请求，并遵循 CQRS 模式创建一个命令。此命令被发送到分布式命令总线，从而启动一个本地事务。\n\
  \n4.  分布式命令总线将此命令传输到包含相应命令处理程序（资源管理器 3）的节点。\n\n5.  命令处理程序借助写入数据库中的存储库，实现对实体的写入操作。\n\
  \n6.  上述存储库的变更还会触发一个事件（第 12 章“同一 JVM 中的命令与事件处理”部分下的“设计示例场景”一节提供了详细说明），此事件被发送到集群事件总线。\n\
  \n7.  在图 13-5 中，你可以看到两个不同的事件处理程序（资源管理器 1 和资源管理器 2）对先前的事件感兴趣，并且它们也可能执行各自所需的任何状态变更。\n\
  \n8.  你可以看到资源管理器 2 实际上是在根据系统中的任何有趣变更来同步自身（读取数据库）。\n\n9.  任何后续的查询（HTTP GET）也会看到这些变更。最终，所有人都能看到这些变更。\n\
  \nACID 与 BASE\n这种比较就像比较苹果和橙子：它们并非旨在相互替代，并且在服务于各自目的方面同样出色（或糟糕）。这是一个说起来容易的论断；然而，任何\
  \ CTO 级别的讨论都不能仅凭这种直白的解释就结束。话虽如此，理解这种区别是“掌握微服务”的关键。如果你理解了这种差异，那么本书的主要意图就达到了！\nBASE\
  \ 事务是微服务架构的基础，我们希望在此架构中远离 ACID 事务。然而，它们服务于不同的目的。争论孰优孰劣意义不大，因为两者解决的是正交的关注点——这也是 CAP\
  \ 定理之所以重要的原因。但话说回来，你是否想完全抛弃 ACID 事务？这就像问，作为战斗机的机长，你是应该直接控制弹射座椅按钮，还是即使无法直接触及，但（几乎）确信你的副驾驶会在你下令时为你激活它，你也能接受？在前一种情况下，你非常确定当突然需要时，你可以凭自己的意愿瞬间弹射逃生。在后一种情况下，你几乎确信你仍然能够逃生；然而，对于逃生是瞬间完成还是会延迟，存在一定程度的怀疑——延迟可能是由于你的副驾驶需要时间执行你的命令，或者不幸的是，你的副驾驶无法移动自己的肌肉来采取行动！重申一下，前者类似于\
  \ ACID 事务，它相对更具确定性，而后者类似于 BASE 事务，它（可能）最终会发生。\n我们仍然需要 ACID，即使并非总是如此。\n现在让我们来谈谈 BASE。如果你仍然在适当的层级使用\
  \ ACID（如图 13-3 所示），那么事情就简单了。另一方面，更宽松的 BASE 方法并不会让你的生活更轻松；事实上，宽松的 BASE 会给你带来比 ACID\
  \ 复杂得多的问题。\n话虽如此，理解和领会 BASE 事务中涉及的复杂性的一种方法是先理解 ACID 事务本身，因此你将在接下来的章节中进行学习。\n\n重新审视分布式事务\n\
  在查看具体示例之前，你需要理解一些概念，这些概念将为你要探索的示例设定上下文。\n\n本地事务\n如果你使用一个典型的资源管理器，通常该单个资源会被限制在单个主机或节点上（尽管这并非强制要求）。局限于这种单个资源的操作就是本地事务，它们只影响一个事务性资源。在单个节点内，非确定性操作较少（或者出于实际考虑，为零），因此发送到单个节点的命令必须被认为是确定性的，并且在发生任何灾难时，存在本地恢复机制。这些资源拥有自己的事务性\
  \ API，事务的概念通常表现为会话的概念，会话可以封装一个工作单元，并带有界定 API，用于告知资源何时应将缓冲的工作提交到底层资源。因此，从开发者的角度来看，你在本地事务中并非通过事务进行管理，而只是通过“连接”进行管理。\n\
  \n\n\n`java.sql.Connection` 接口是一种事务性资源，可以封装一个数据库。默认情况下，`Connection` 对象处于自动提交模式，这意味着它在执行每条语句后会自动提交更改。如果禁用了自动提交模式，则必须显式调用\
  \ `commit` 方法来提交更改；否则，数据库更改将不会保存。当有多个语句时，最好将几个相关的语句收集到一个批处理中，然后要么全部提交，要么全部不提交。实现方法是先将\
  \ `Connection` 的 `setAutoCommit()` 方法设置为 `false`，然后在批处理结束时显式调用 `Connection.commit()`\
  \ 或 `Connection.rollback()`。请参见清单 13-1。\n\n```\ntry{\nconnection.setAutoCommit(false);\n\
  Statement statement = conn.createStatement();\nString insertString = \"insert into\
  \ \" +  dbName + \".SHIPPING VALUES (\"\n+ orderId + \", 'NEW')\";\nstatement.executeUpdate(insertString);\n\
  String updateString = \"update \" + dbName + \".ORDERS set STATUS =\n'PROCESSED'\
  \ where ORDER_ID = \" + orderId;\nstatement.executeUpdate(updateString);\nconnection.commit();\n\
  }catch(SQLException se){\nconnection.rollback();\n}\n清单 13-1\n一个本地事务示例\n```\n\n\
  在清单 13-1 中，这两个语句将一起提交或一起回滚。然而，这是一个本地事务，而不是分布式事务。\n\n**分布式事务**\n\n通常，分布式事务存在的场景必须跨越至少两个资源管理器。数据库、消息队列、事务处理（TP）监控器（如\
  \ IBM 的 CICS、BEA 的 Tuxedo、SAP Java Connector 和 Siebel Systems）是常见的事务性资源，并且通常，如果事务必须是分布式的，它必须跨越其中几个资源。分布式事务可以被视为一个原子操作，必须在分布在多个不同物理位置的多个参与资源之间进行同步（或提供\
  \ ACID 属性）。\n\n像 Oracle Weblogic 和 IBM Websphere 这样的 Java EE 应用服务器原生支持 JTA，并且还有第三方独立的\
  \ JTA 实现，例如：\n\n*   **JOTM：** JOTM 是一个用 Java 实现的开源事务管理器。它支持多种事务模型和规范，为使用各种中间件平台（J2EE、CORBA、Web\
  \ Services、OSGi）的客户端提供事务支持。\n\n*   **Narayana：** Narayana，以前称为 JBossTS 和 Arjuna\
  \ Transaction Service，附带一个非常健壮的实现，支持 JTA 和 JTS API。它支持三种扩展事务模型：嵌套顶层事务、嵌套事务和基于 Saga\
  \ 的补偿模型。此外，它还支持 Web 服务和 RESTful 事务。需要手动与 Spring 框架集成，但它提供了与 Spring Boot 的原生集成。\n\
  \n*   **Atomikos TransactionsEssentials：** Atomikos TransactionsEssentials 是一个生产级质量的实现，除了\
  \ JTA API 之外，还支持恢复和一些特殊功能。它提供了开箱即用的 Spring 集成，并支持数据库和 JMS 资源的连接池。\n\n*   **Bitronix\
  \ JTA：** Bitronix 声称其事务恢复能力与某些商业产品相当甚至更好。Bitronix 还提供了开箱即用的连接池和会话池。\n\n**Java 中的分布式事务**\n\
  \n跨越多个资源的事务协调由 opengroup 的 X/Open 标准规定。Java 通过提供两个接口来支持 X/Open 标准：JTA（Java 事务 API）和\
  \ JTS（Java 事务服务）。如图 13-2 所示，应用程序开发人员使用 JTA 与事务管理器通信。由于资源可以由遵循不同平台和编程语言的多个供应商提供，如果所有这些资源必须协调，它们必须再次遵守\
  \ X/Open 标准。这里，遵循 CORBA OTS（对象事务服务）的 JTS 提供了与分布式资源共存的不同事务管理器之间所需的互操作性。我已经讨论了分布式事务中的“分布式特性”。两阶段提交协议用于跨多个资源管理器协调事务。\n\
  \n**使用 MySQL、ActiveMQ、Derby 和 Atomikos 的分布式事务示例**\n\n解决许多数据一致性问题的简单方法，尤其是在涉及多个资源管理器时，是使用\
  \ XA 或分布式事务，即使在 BASE 中也是如此，如图 13-3 所示。然而，如果您想过渡到更宽松的 BASE 微服务，设计机制必须具有更高的容错性，因为您的\
  \ XA 事务管理器不存在，而它们本应完成所有繁重的工作。您将借助一个示例来了解主要的一致性关注场景。同样，我本可以在示例中直接演示关注场景而不使用分布式事务；但是，我将采用相反的方式，使用\
  \ XA 事务来说明完美场景，并通过进一步缩小 ACID 范围来模拟各种故障条件，因为这样更容易让您（读者）理解各个方面。XA 事务允许我们通过“滥用”事务属性来使事务范围比正常情况下更小。这意味着我可以重用相同的代码来逐步说明宽松\
  \ BASE 的异常情况。\n\n**示例场景**\n\n如图 13-3 所示，该示例并不简单，因此需要稍作解释。示例场景是一个简单的股票交易处理系统。以下是其构建模块：\n\
  \n1.  股票交易的新报价可以推送到 Broker Web 微服务。新报价被插入到 MySQL 数据库中的 `Quotes` 表中，状态为“New”。\n\n\
  2.  Quotes 处理器任务是一个 quartz 调度任务，它轮询 MySQL 数据库中的 `Quotes` 表，查找任何状态为“New”的新报价。\n\n\
  3.  当找到状态为“New”的新报价时，它会在事务中调用 broker 服务的 `processNewQuote` 方法，并将新报价的唯一标识符传递给 `Quotes`\
  \ 表。\n\n4.  broker 服务使用其他事务性服务（拍卖服务和股票订单服务），并且两者的执行必须是原子的。\n\n5.  拍卖服务通过在一个事务内将报价状态更改为“Confirmed”来确认收到的报价。\n\
  \n6.  股票订单服务根据新报价中包含的信息创建一条 JMS 消息，并将其发送到 ActiveMQ 队列以进行报价结算，同样在上述（5）的事务内进行。\n\n\
  7.  结算监听器服务正在监听 ActiveMQ 队列，以获取任何新的已确认报价。所有到达 ActiveMQ 队列的已确认报价都会在事务内被结算监听器服务的 `onMessage`\
  \ 方法拾取。\n\n8.  结算监听器服务调用报价对账服务进行报价对账，同样在上述（7）的事务内进行。\n\n\n\n9.  报价对账服务需要根据上述第（7）条交易，将已交易股票的价值与卖方和买方各自的用户账户进行对账。\n\
  \n10. Broker Web 微服务和 Settlement Web 微服务只是实用工具，用于提供 `Quotes` 表和 `User` 表上操作数据的仪表盘视图，以呈现实时状态。\n\
  \n了解了示例场景的高级业务逻辑后，现在让我们关注架构中的其他基础设施方面。报价处理微服务必须对 MySQL 和 ActiveMQ 这两个资源执行原子操作。这里需要一个分布式事务管理器。同样，报价结算微服务也必须对\
  \ Derby 和 ActiveMQ 这两个资源执行原子操作。这里也需要一个分布式事务管理器。\n\n**编写示例场景代码**\n\n演示分布式事务示例所需的完整代码位于文件夹\
  \ `ch13\\ch13-01` 中。需要编写四个微服务。我们将逐一查看它们。\n\n**微服务 1：报价处理 (Broker-MySQL-ActiveMQ)**\n\
  \n请访问 `pom.xml` 查看 Atomikos 分布式事务管理器依赖项。参见清单 13-2。\n\n```\njavax.transaction\njta\n\
  1.1\n\ncom.atomikos\ntransactions\n3.9.3\n\ncom.atomikos\ntransactions-hibernate3\n\
  3.9.3\n\ncom.atomikos\ntransactions-api\n3.9.3\n\ncom.atomikos\ntransactions-jms\n\
  3.9.3\n\ncom.atomikos\ntransactions-jdbc\n3.9.3\n\ncom.atomikos\ntransactions-jta\n\
  3.9.3\n\norg.apache.activemq\nactivemq-core\n5.7.0\n\nmysql\nmysql-connector-java\n\
  8.0.14\n\n清单 13-2\n使用 MySQL 和 ActiveMQ 的分布式事务示例的 Maven 依赖项 (ch13\\ch13-01\\XA-TX-Distributed\\\
  Broker-MySQL-ActiveMQ\\pom.xml)\n```\n\n当你详细查看配置时，这些库依赖项会变得更加清晰。在此之前，让我们先检查架构中的主要组件。\n\
  \n你首先会看到报价处理器任务，这是一个 Quartz 调度器，它会在配置的间隔时间超时，从而在固定的时间间隔触发 `processNewQuotes()` 方法。参见清单\
  \ 13-3。\n\n```\npublic class QuotesProcessorTask {\n@Autowired\n@Qualifier(\"brokerServiceRequired_TX\"\
  )\nBrokerService brokerServiceRequired_TX;\npublic void processNewQuotes() {\nList\
  \ newQuotes = brokerServiceRequired_TX.findNewQuotes();\nnewQuotes.forEach(item->{\n\
  if(((QuoteDTO) item).getStatus().equals(Quote.NEW)){\nbrokerServiceRequired_TX.processNewQuote(\n\
  ((QuoteDTO) item).getId());\n}\n});\n}\n}\n清单 13-3\n处理新报价的定时任务 (ch13\\ch13-01\\\
  XA-TX-Distributed\\Broker-MySQL-ActiveMQ\\src\\main\\java\\com\\acme\\ecom\\schedule\\\
  QuotesProcessorTask.java)\n```\n\n如果找到“新”报价，调度器会为每个新报价调用一次 broker 服务的 `processNewQuote()`\
  \ 方法，并传入找到的新报价的 ID。请注意，此方法调用发生在一个事务内，其配置你很快就会看到。接下来，你将在清单 13-4 中查看 broker 服务。\n\n\
  ```\npublic class BrokerServiceImpl implements BrokerService{\nprivate static volatile\
  \ boolean flipFlop = false;\n@Autowired\n@Qualifier(\"auctionServiceRequired_TX\"\
  )\nAuctionService auctionServiceRequired_TX;\n@Autowired\n@Qualifier(\"stockOrderServiceRequired_TX\"\
  )\nStockOrderService stockOrderServiceRequired_TX;\n@Autowired\n@Qualifier(\"auctionServiceRequiresNew_TX\"\
  )\nAuctionService auctionServiceRequiresNew_TX;\n@Autowired\n@Qualifier(\"stockOrderServiceRequiresNew_TX\"\
  )\nStockOrderService stockOrderServiceRequiresNew_TX;\nprivate static synchronized\
  \ void flipFlop() throws QuotesBaseException{\nif(flipFlop){\nflipFlop = false;\n\
  }\nelse{\nflipFlop = true;\n}\nif(flipFlop){\nthrow new QuotesBaseException(\"Explicitly\
  \ thrown by Broker\nApplication to Roll Back!\");\n}\n}\n@Override\npublic List\
  \ findNewQuotes(){\nList newQuotes = auctionServiceRequired_TX.findNewQuotes();\n\
  return newQuotes;\n}\n@Override\npublic void processNewQuote(Long id)throws QuotesBaseException{\n\
  Optional quoteQueried =\nauctionServiceRequired_TX.findQuoteById(id);\nQuoteDTO\
  \ quoteDTO = (QuoteDTO) quoteQueried.get();\nInteger testCase = quoteDTO.getTest();\n\
  If((testCase == 1)  || (testCase == 5) || (testCase == 6)\n|| (testCase == 7)){\n\
  auctionServiceRequired_TX.confirmQuote(quoteDTO);\nstockOrderServiceRequired_TX.sendOrderMessage(quoteDTO);\n\
  }\nelse if(testCase == 2){\nauctionServiceRequired_TX.confirmQuote(quoteDTO);\n\
  stockOrderServiceRequired_TX.sendOrderMessage(quoteDTO);\nflipFlop();\n}\nelse if(testCase\
  \ == 3){\nauctionServiceRequired_TX.confirmQuote(quoteDTO);\ntry{\nstockOrderServiceRequiresNew_TX.sendOrderMessage(quoteDTO);\n\
  }\ncatch(QuotesMessageRollbackException\nquotesMessageRollbackException){\nLOGGER.error(quotesMessageRollbackException.getMessage());\n\
  }\n}\nelse if(testCase == 4){\ntry{\nauctionServiceRequiresNew_TX.confirmQuote(quoteDTO);\n\
  }\ncatch(QuotesConfirmRollbackException\nquotesConfirmRollbackException){\nLOGGER.error(quotesConfirmRollbackException.getMessage());\n\
  }\nstockOrderServiceRequired_TX.sendOrderMessage(quoteDTO);\n}\nelse if(testCase\
  \ == 8){\ntry{\nauctionServiceRequiresNew_TX.confirmQuote(quoteDTO);\n// PROPAGATION_REQUIRES_NEW\
  \ Because, during next time out\n// of QuotesProcessorTask we shouldn't fetch this\
  \ quote\n}\ncatch(QuotesConfirmRollbackException\nquotesConfirmRollbackException){\n\
  LOGGER.error(quotesConfirmRollbackException.getMessage());\n}\nstockOrderServiceRequired_TX.sendOrderMessage(quoteDTO);\n\
  }\nelse{\nLOGGER.debug(\"Undefined Test Case\");\n}\n}\n}\n清单 13-4\n协调新报价处理的 Broker\
  \ 服务 (ch13\\ch13-01\\XA-TX-Distributed\\Broker-MySQL-ActiveMQ\\src\\main\\java\\\
  com\\acme\\ecom\\service\\BrokerServiceImpl.java)\n```\n\n\n\n你在 broker 服务中自动配置了对拍卖服务和股票订单服务的引用。每个服务都有两个引用；这只是一个用于安排各种测试场景（你将进行验证）的临时方案。为了清晰起见，你拥有两个拍卖服务的引用，名称分别为\
  \ `auctionServiceRequired_TX` 和 `auctionServiceRequiresNew_TX`。顾名思义，`auctionServiceRequired_TX`\
  \ 中的写入方法在 `PROPAGATION_REQUIRED` 上下文中执行，而 `auctionServiceRequiresNew_TX` 中的写入方法则在\
  \ `PROPAGATION_REQUIRES_NEW` 上下文中执行。其余代码检查传入的参数，你在此参数中附带了一个指示器（一个整数值），用于标识你正在执行哪个测试场景（测试用例）。总体策略是：如果你希望在父服务和子服务之间传播事务，则使用\
  \ `PROPAGATION_REQUIRED`；在你显式生成错误条件的地方，则使用 `PROPAGATION_REQUIRES_NEW`，以便将错误限制在相应服务方法的上下文内，并且以受控的方式（通过使用\
  \ try-catch）进行处理，从而保证其余执行流程能够继续进行；再次说明，这是为了便于演示而设置的测试装置。\n\n你需要意识到，在实际的生产场景中，你并不需要这些测试场景的安排；因此，如果你希望跨服务实现原子操作，只需使用\
  \ `PROPAGATION_REQUIRED` 配置所有内容，即仅使用 `(testCase == 1)` 这一场景。\n\n在 broker 服务中还定义了一个名为\
  \ `flipFlop()` ^(³²) 的实用方法。此方法在两次连续执行之间翻转操作中错误模拟的创建状态，因此，如果你在一次方法执行中模拟了错误，那么下一次执行相同方法时就不会模拟错误。通过这种方式，如果你执行了一个测试用例来验证某个错误场景，你也能看到在相同流程没有该错误场景执行时的不变量情况。如果你想查看消息消费是否在第一次执行时失败，以便在尝试重新消费时，下一次执行能够无故障进行，那么这个方法就很有用；这样，你就能轻松测试并可视化结果。暂时先把它放在这里；当你执行测试时，它会变得更清晰。\n\
  \n接下来，查看清单 13-5 中所示的拍卖服务。\n\n```\n@Service\npublic class AuctionServiceImpl implements\
  \ AuctionService{\n@Autowired\nprivate QuoteRepository quoteRepository;\n@Override\n\
  public QuoteDTO confirmQuote(QuoteDTO quoteDTO)\nthrows QuotesConfirmRollbackException{\n\
  Integer testCase = quoteDTO.getTest();\nOptional quoteQueried = quoteRepository.findById(quoteDTO.getId());\n\
  Quote quote = null;\nQuote quoteSaved = null;\nif(quoteQueried.isPresent()){\nquote\
  \ = (Quote) quoteQueried.get();\nquote.setStatus(Quote.CONFIRMED);\nquote.setUpdatedAt(new\
  \ Date());\nquoteSaved = quoteRepository.save(quote);\n}\nif(testCase == 4){\nflipFlop();\n\
  }\nreturn getQuoteDTOFromQuote((Quote) quoteQueriedAgain.get());\n}\n}\n清单 13-5\n\
