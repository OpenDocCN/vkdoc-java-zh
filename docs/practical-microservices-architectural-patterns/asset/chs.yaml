  \n图 17-41\n因取消而恢复库存\n\n总结\n\n在本章中，你在基于 CQRS 的微服务之旅中取得了很大进展。现在，你已经掌握了所有基本工具，可以使用事件驱动型微服务构建任何规模的企业级应用程序。但是，有两点需要注意：\n\
  \n*   你尚未在你的电子商务微服务应用程序中实现安全性（身份验证和授权）。\n\n*   你将两个领域实体放在一起以保持强数据一致性；否则，它们本应被分离到各自独立的微服务中。\n\
  \n你将在接下来的两章中探讨这些方面。\n\n18. 微服务安全\n\n在第 17 章的电子商务微服务应用程序中，你应该已经注意到，有一些 API 方法，尤其是产品类别和产品服务中的那些方法，任何人都可以自由访问；但是，要访问所有其他微服务，你需要以已在应用程序中创建用户配置文件的后台管理员或客户身份登录。到目前为止，一切顺利，但即使需要登录，这些微服务的安全性又如何呢？\n\
  与所有服务集中部署的传统单体架构截然不同，在微服务架构中，有许多节点或进程来分布服务。即使你将 API 网关视为一个单一的、集中的前端控制器，所有请求最初都由其拦截，API\
  \ 网关也必须通过内部网络将请求路由到相应的微服务。同样，微服务间的通信也通过同一个内部网络进行。\n即使你已确保网关访问的安全，你的数据也无法免受内部攻击。实现安全性的一种方法是为所有服务共享用户凭证数据，并在访问前在每个服务上对用户进行身份验证。尽管这实际上是一种可行的方法，但在多个地方分发凭证是一个奇怪的想法。你应该有一个更好的方法。\n\
  你将在本章中探讨微服务安全的问题。你还将为第 17 章的示例构建安全功能，以便你了解这在真实场景中如何运作。\n\n你将在本章中探讨以下内容：\n\n*   OAuth\
  \ 2.0\n\n*   OAuth 2.0 上下文中的客户端类型\n\n*   OAuth 2.0 中的授权码授权类型\n\n*   JSON Web 令牌\
  \ (JWT)\n\n*   为微服务电子商务应用程序启用安全性\n\nOAuth 2.0 与微服务\n借助 Spring Security 及其对 OAuth\
  \ 2.0 的支持，你拥有锁定 API 网关和后端资源服务器所需的一切。你可以对其进行设置，以自动将访问令牌从一个微服务传播到另一个微服务，确保整个过程安全且加密。我不会详细介绍\
  \ OAuth 2.0，但会介绍所需的最基本方面，以便你能够为示例微服务应用程序启用安全性。\n\nOAuth 2.0\n互联网工程任务组 (IETF) 的请求评论\
  \ (RFC) 第 6749 号将 OAuth 2.0 定义为一个授权框架，它使第三方应用程序能够获得对 HTTP 服务的有限访问权限，要么代表资源所有者，通过协调资源所有者和\
  \ HTTP 服务之间的批准交互，要么允许第三方应用程序代表其自身获得访问权限。OAuth 2.0 规范取代并废弃了 OAuth 1.0 协议。\n\nOAuth\
  \ 2.0 角色\n\nOAuth 定义了四个角色，它们是 OAuth 交互的核心：\n\n*   **资源所有者**：任何能够授予对受保护资源访问权限的实体。当资源所有者是人类时，它被称为最终用户。资源所有者可以授予访问权限，并且此授权可用于后续和重复的资源访问。\n\
  \n\n\n*   **资源服务器**：托管受保护资源的服务器，能够接受并使用访问令牌响应受保护资源请求。在你的微服务场景中，如果每个微服务拥有受保护资源，它们都可能成为资源服务器。\n\
  \n*   **客户端**：这是一个代表资源所有者并经过其授权，发起受保护资源请求的应用程序。客户端在发起请求时，可能代表最终用户（该用户可能是也可能不是资源所有者）进行操作。“客户端”一词并不暗示任何特定的实现特性（例如，应用程序是在服务器、桌面还是其他设备上执行）。\n\
  \n*   **授权服务器**：在成功验证资源所有者身份并获得授权后，向客户端颁发访问令牌的服务器。授权服务器可以与资源服务器是同一台服务器，也可以是独立的实体。单个授权服务器可以颁发被多个资源服务器接受的访问令牌。\n\
  \nOAuth 2.0 客户端与用户代理\n\n尽管 OAuth 只规定了四种角色，但你还应注意另一个实体，这在许多情况下（例如使用基于浏览器的应用程序时）很典型：\n\
  \n*   **用户代理**：用户代理通常是最终用户或资源所有者与客户端程序交互的界面。有时，用户代理和客户端可以是同一个实体。\n\n要理解最后一点，你需要探索几种典型的架构，并理解各个客户端程序对外部世界的暴露程度差异，这将在下一节中进行。\n\
  \n可信客户端与不可信客户端\nOAuth 客户端可分为两类：**可信客户端**或**不可信客户端**。客户端属于可信还是不可信类别，取决于客户端是否具备安全存储和传输信息的能力。通过重新审视下面描述的选定架构模型，可以阐明这一概念。\n\
  \n经典三层单体架构\n\n三层单体架构包含表示层、中间层和数据库层。经典的**三层架构是一种多页面架构（MPA）**，这意味着每当用户界面需要显示数据或将数据提交回服务器时，它都必须向服务器请求一个新页面，然后在\
  \ Web 浏览器中渲染该页面。Java Server Pages (JSP) 技术用于创建 MPA Web 应用；然而，还有许多其他技术可用于构建 MPA。图\
  \ 18-1 描述了一个三层单体 MPA 架构。\n\n![../images/477630_1_En_18_Chapter/477630_1_En_18_Fig1_HTML.jpg](img/477630_1_En_18_Fig1_HTML.jpg)\n\
  \n图 18-1. 经典三层单体架构\n\n三层单体 MPA 的典型交互流程如下：\n\n1.  最终用户在浏览器中输入 URL。\n\n2.  表示层组件（通常是一个\
  \ JSP 页面）生成所需的 HTML 标签，并将其发送回浏览器，浏览器渲染 HTML 内容。\n\n3.  浏览器中的用户点击和操作被表示层服务器拦截，服务器需要生成下一个页面。\n\
  \n4.  在此阶段，如果页面需要来自任何受保护资源的数据，它需要联系安全服务器或授权服务器，进行用户身份验证和授权。\n\n5.  一旦通过身份验证和授权，表示层服务器将联系业务层以检索任何后端数据，将其嵌入到生成的\
  \ HTML 内容中，并将内容推送回浏览器，浏览器再次渲染内容。\n\n这里值得注意的一点是，在步骤 3 结束时，必须协调用户身份验证和授权，其结果被发送到表示层服务器，服务器可以缓存或存储与该用户（会话）关联的身份验证和授权步骤的状态。此后，对于浏览器中最终用户的每一次后续点击和操作，如果需要受保护资源，表示层服务器可以检索与该请求关联的用户（会话）的身份验证和授权步骤状态，并做出决策或将请求路由到其他后端服务器。缓存或存储在表示层服务器中的身份验证和授权步骤状态是安全的，因为它存储在**非军事区（DMZ）**内。\n\
  \n带有 HTTP 前端的经典三层单体架构\n\n在一种略有不同的架构中，你只会在 DMZ 中放置一个 HTTP 服务器，而图 18-1 中显示在 DMZ 内的所有其他组件都将被移到内部网络边界内。在这里，缓存或存储在表示层服务器中的身份验证和授权步骤状态更加安全。图\
  \ 18-2 描述了这种部署设置。\n\n![../images/477630_1_En_18_Chapter/477630_1_En_18_Fig2_HTML.jpg](img/477630_1_En_18_Fig2_HTML.jpg)\n\
  \n图 18-2. 带有 HTTP 前端的经典三层单体架构\n\n在这种架构中，包括 HTML 模板在内的所有静态内容都可以由 HTTP 服务器提供，而所有动态\
  \ Web 内容和业务层中的受保护资源则以下述方式访问（如图 18-2 所示）：\n\n1.  最终用户在浏览器中输入 URL。\n\n2.  表示层组件（通常是一个\
  \ JSP 页面）将生成所需的 HTML 标签，并将其发送回浏览器，浏览器渲染 HTML 内容。包括 HTML 模板在内的所有静态内容都可以由 HTTP 服务器提供。\n\
  \n3.  浏览器中的用户点击和操作再次被表示层服务器拦截，服务器需要生成下一个页面。\n\n4.  在此阶段，如果页面需要来自任何受保护资源的数据，它首先需要联系安全服务器或授权服务器，进行用户身份验证和授权。\n\
  \n5.  一旦通过身份验证和授权，表示层服务器将联系业务层以检索任何后端数据，将其嵌入到生成的 HTML 内容中，并将内容推送回浏览器，浏览器再次渲染内容。\n\
  \n带有 API 网关的微服务架构\n\n图 18-3 描述了基于 API 网关的微服务架构。你在前面的章节中看到过许多变体；但此处展示它是为了强调安全流程。\n\
  \n![../images/477630_1_En_18_Chapter/477630_1_En_18_Fig3_HTML.jpg](img/477630_1_En_18_Fig3_HTML.jpg)\n\
  \n图 18-3. 微服务 API 架构\n\n微服务架构通常使用**单页面架构（SPA）**，这本质上是 MPA + AJAX 设计模式的演进。在 SPA 中，只有外壳页面在服务器上生成，其余\
  \ UI 由浏览器 JavaScript 代码渲染。SPA 分别请求标记和数据，并直接在浏览器中渲染页面。整体流程总结如下：\n\n1.  最终用户在浏览器中输入\
  \ URL。\n\n2.  表示层组件（通常是一个 SPA Web 应用）被下载到浏览器中，并渲染第一页或默认页面。SPA 资源（HTML+CSS+脚本）在应用程序的整个生命周期中仅加载一次。此外，只有数据在前后端之间传输。\n\
  \n3.  浏览器中的进一步用户点击和操作被 API 网关拦截。\n\n\n\n4.  在此阶段，如果请求需要访问任何受保护资源的数据，API 网关将首先需要联系安全服务器或授权服务器，用户身份验证和授权在此处进行。\n\
  \n5.  一旦通过身份验证和授权，API 网关便会联系微服务以检索任何后端数据，并仅将数据作为响应推送回浏览器，浏览器随后会重新渲染内容。\n\n再次强调，在\
  \ API 网关处的步骤 3 结束时，必须编排用户身份验证和授权，并将最终结果发送给 API 网关，以便其缓存或存储与该用户关联的身份验证和授权步骤的状态。此后，对于来自浏览器的最终用户的每一次后续点击和操作，当请求到达\
  \ API 网关时，如果它需要受保护资源，API 网关可以检索与该请求关联的用户身份验证和授权步骤的状态，并做出决策或将请求路由到其他后端资源服务器。缓存或存储在\
  \ API 网关中的身份验证和授权步骤的状态是安全的，因为它存储在 DMZ 内，并受到企业在安全和访问控制方面实施的严格管控。\n\n**无服务器的客户端应用**\n\
  \n另一种可能的情况是，完整的 Web 应用（或 SPA）一旦下载完成，就会完全在浏览器内部继续执行，在这种情况下，就没有表示层或业务层。简而言之，浏览器中的\
  \ Web 应用没有对应的服务器端。可能存在这样一种场景：Web 应用仍然需要访问某些受保护资源；不过，这次是从第三方访问，如图 18-4 所示。\n\n![../images/477630_1_En_18_Chapter/477630_1_En_18_Fig4_HTML.jpg](img/477630_1_En_18_Fig4_HTML.jpg)\n\
  \n**图 18-4.** 无服务器的 Web 应用\n\n部署选项还有更多变体，但我们还是坚持之前解释过的场景。\n\n**授权码授权类型**\n\nOAuth\
  \ 定义了多种授权类型；不过，我将把讨论范围限定在授权码授权类型，因为它适用于那些在与授权服务器进行身份验证时能够对其客户端凭据保密的 OAuth 客户端。对于微服务场景，API\
  \ 网关是在安全服务器上实现的“客户端”。作为一种基于重定向的流程，此 OAuth 客户端必须能够与资源所有者的用户代理进行交互，并且还必须能够通过来自授权服务器的重定向来接收传入请求。\n\
  \n让我们结合你将在下一节中访问的示例，来看一下授权码授权类型的流程序列。见图 18-5。\n\n![../images/477630_1_En_18_Chapter/477630_1_En_18_Fig5_HTML.jpg](img/477630_1_En_18_Fig5_HTML.jpg)\n\
  \n**图 18-5.** OAuth 授权码授权类型\n\n参考图 18-5，在访问受保护资源时，端到端授权流程的典型交互序列可以总结如下：\n\n1.  最终用户在浏览器中输入\
  \ URL。\n\n2.  表示层组件（通常是一个 SPA Web 应用）被下载到浏览器中，并渲染第一页或默认页面。SPA 资源（HTML+CSS+脚本）在应用的整个生命周期中仅加载一次。此后，仅来回传输数据。\n\
  \n3.  来自浏览器的进一步用户点击和操作被 API 网关拦截。API 网关是 OAuth 客户端。由于 API 网关是一个安全的服务器端微服务，它可以在与授权服务器进行身份验证时对其客户端凭据保密。\n\
  \n4.  在此阶段，如果请求需要访问任何受保护资源的数据，API 网关会通过将资源所有者的用户代理引导至授权端点来启动流程。在此过程中，OAuth 客户端会包含其客户端标识符、请求的范围、本地状态以及重定向\
  \ URI。一旦允许或拒绝访问受保护资源，授权服务器就会将用户代理发送回客户端指定的重定向 URI。\n\n5.  授权服务器通常要求用户首先进行身份验证。此步骤用于断言声称自己是资源所有者的人是否确实是实际的资源所有者，以及他们被允许将哪些权利委托给客户端。授权服务器可以与资源服务器是同一台服务器，也可以是独立的实体。\n\
  \n6.  授权服务器通过用户代理对资源所有者进行身份验证。用户的身份验证直接在用户（通过用户代理）和授权服务器之间进行，因此客户端永远无法看到。\n\n7.\
  \  身份验证可以通过查询内部身份验证服务器来完成。OAuth 不规定任何特定的身份验证技术，授权服务器可以自由选择方法，例如用户名/密码对、加密证书、安全令牌、单点登录或任何其他可能性。\n\
  \n8.  一旦资源所有者授予访问权限，OAuth 客户端就会使用步骤 4 中提供的重定向 URI 将用户代理重定向回 OAuth 客户端。重定向 URI 还包含一个授权码以及\
  \ OAuth 客户端先前提供的任何本地状态。\n\n9.  现在客户端拥有了授权码，它可以将其发送回授权服务器的令牌端点。OAuth 客户端还会包含用于获取授权码以进行验证的重定向\
  \ URI。\n\n10. 授权服务器验证客户端凭据和授权码。服务器还确保接收到的重定向 URI 与步骤 3 中用于重定向客户端的 URI 匹配。如果授权码有效、之前未被使用过，并且发出此请求的客户端与发出原始请求的客户端相同，则授权服务器会生成并返回一个新的访问令牌给客户端。单个授权服务器可以颁发被多个资源服务器接受的访问令牌。\n\
  \n11. 拿到令牌后，客户端可以将令牌出示给资源服务器（受保护资源）。\n\n12. 资源服务器可以向授权服务器的令牌验证端点进行验证。\n\n13. 如果上一步中出示的令牌有效，资源服务器可以将受保护资源返回给客户端。\n\
  \n14. 客户端可以将此受保护资源作为对步骤 3 中用户点击的响应返回给 SPA Web 应用。\n\n**用于可扩展 API 调用的令牌**\n\n在了解了典型授权码类型\
  \ OAuth 流程的动态之后，你现在应该从微服务架构的角度来看待此安全方案的某些方面，特别是令牌本身的可扩展性和安全性。\n\n\n\n会话 ID\n传统上，身份验证一直作为一种有状态操作来执行。当用户输入其凭据时，服务器会生成一个唯一的会话\
  \ ID，将其存储在服务器端，同时也将其返回给用户。在每次需要访问受保护资源的请求中，此会话 ID 会作为请求头传递，服务器将始终根据服务器端的实际用户凭据或服务器端维护的“活动会话”缓存来验证该会话\
  \ ID。对于单体应用来说，这近乎是一个完美的解决方案，因为在每个请求-响应周期中，你只需要进行一次这样的验证。\n\n对于微服务架构而言，这可能存在局限性。为几乎每个操作都从中央存储获取数据可能会很麻烦，尤其是当单个用户端的请求-响应周期在内部跨越一个图谱或多次微服务间调用时。即使单个用户端的请求-响应周期在内部由单个微服务处理，对于一个高事务处理系统，为所有\
  \ API 方法进行用户身份验证和授权数据库（或缓存）查找及验证的累积过程也是繁琐的，因此我们需要更智能的设计机制。\n\n你应该注意到会话 ID 的一个优点：会话\
  \ ID 是不透明的，这意味着第三方无法从会话 ID 中提取出易于破译的数据。会话 ID 与其可推断数据之间的关联完全在服务器端完成。\n\n令牌\n令牌是使基于会话\
  \ ID 的安全设计更智能的一种替代方案。令牌不仅仅是一个标识符，其中还包含有意义且可推断的数据。除了会话 ID 之外，令牌还可以包含用户凭据中不太敏感的部分，例如用户名。通过这种方式，用户或服务请求者的详细信息已经存在于请求头中，因此微服务无需再对数据库或缓存进行另一次\
  \ I/O（输入/输出）来解释请求者。现在你需要关注授权部分：谁有权访问哪些受保护资源，以及一旦访问，该用户可以对资源执行哪些操作。因此，你还可以将用户可用的操作类型信息包含在令牌中。例如，你可以添加一个名为\
  \ `scope` 的字段，其值可以是 `user`（代表普通终端用户的权限）和 `admin`（拥有执行关键后台操作的额外权限）。如果是这样，当用户随请求提供令牌以执行某项操作（例如调用\
  \ API 端点）时，处理该端点并保护受保护资源的服务可以验证令牌，在其中查找正确的“作用域”，并授权（或拒绝）该用户执行该操作。\n\nJSON Web 令牌\
  \ (JWT)\n你可以创建自己的令牌以获得上一节所述的便利性，也可以采用业界已有的标准，即 JSON Web 令牌 (JWT)。\n\nJWT 有三个不同的部分，它们经过\
  \ URL 编码以便传输：\n\n*   **头部**：头部包含令牌的元数据，至少包含签名类型和/或加密算法。\n\n*   **声明**：声明包含你想要签名的任何信息。\n\
  \n*   **JSON Web 签名 (JWS)**：头部和声明使用头部中指定的算法进行数字签名。\n\nJWT 将一系列声明编码在一个 JSON 对象中。其中一些声明具有特定含义，而另一些则留给用户自行解释。你常见的一些声明包括：\n\
  \n*   签发者 (iss)\n*   主题 (sub)\n*   受众 (aud)\n*   过期时间 (exp)\n*   生效时间 (nbf)\n* \
  \  签发时间 (iat)\n*   JWT ID (jti)\n\n使用像 JWT 这样的通用数据格式可以轻松地与现有解决方案和库实现互操作，这样你就可以针对常见的、反复出现的问题使用经过验证和测试的模式。\n\
  \n一个典型的 JWT 负载如下所示：\n\n```\n{\n\"sub\": \"1234567890\",\n\"name\": \"John Doe\"\
  ,\n\"iat\": 1516239022\n}\n```\n\n服务器提供的此类令牌将由每个客户端应用程序随请求一起发送，很多时候浏览器或用户代理就是此客户端。这些数据因此容易受到中间人攻击。需要明确的是，拦截到此令牌的人可以尝试使用相同的令牌重放请求。应该有一种方法来防止这种情况。\n\
  \n让我们看看上面列出的三个声明。\n\n*   **过期时间 (exp)**：令牌将被视为过期的 UNIX 时间戳，如果未提供 iat，则此为必需项。\n*\
  \   **签发时间 (iat)**：令牌创建时的 UNIX 时间戳，如果未提供 exp，则此为必需项。\n*   **JWT ID (jti)**：一个唯一的令牌字符串，实际上是一个随机数，每个请求必须唯一，不能为空字符串。\n\
  \n这些时间戳信息有助于限制令牌的有效性，以防止重放攻击。在一种方案中，服务器可以选择不接受在当前时间之前超过 x 分钟发送的消息。这会引发客户端和服务器机器之间的时钟偏差问题，因此你可能需要在服务器中构建一些容错机制，通过在时间窗口两侧各填充\
  \ n 分钟来弥补这一差异，以应对不同机器上时钟的潜在差异，前提是你已经处理好了不同服务器之间的时钟同步问题。\n\n上述随机数（作为 jti 值）有助于防止重放攻击。随机数只是你创建的一组任意字节，用于帮助防止重放攻击。每个请求必须具有唯一的负载。即使请求失败（HTTP\
  \ 状态码 400-599）或错误地通过 HTTP 而非 HTTPS 发送，jti 值也不能重复使用。对于每个请求，建议生成一个全局唯一标识符 (GUID) 或一个足够随机的字符串，以确保在“x\
  \ 分钟”的时间跨度内没有两个请求具有相同的 jti 值。\n\n由于 JWT 由每个客户端应用程序随请求一起发送，很多时候浏览器或用户代理就是此客户端，因此这些数据也容易受到恶意篡改。它可能被篡改，以添加用户本不应拥有的权限声明。因此，令牌本身应该是防篡改的。\n\
  \n当 API 身份验证方案在其请求的 HTTP 授权头中使用 JWT 时，每个请求的授权头都将设置为 Bearer 方案。以下是一个示例：\n\n```\n\
  Authorization: Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiaWF0IjoxNTE2MjM5MDIyfQ.SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c\n\
  ```\n\n在这里，头部和声明是经过 base64 编码以便传输的 JSON。头部、声明和签名使用句点字符 (.) 连接在一起，从而为 JWT 提供了如下结构：\n\
  \n```\n[Base64Encoded(HEADER)] . [Base64Encoded (PAYLOAD)] . [encoded(SIGNATURE)]\n\
  ```\n\n假设以上所有问题都已处理妥当，那么如何验证一个符合上述所有要求的有效令牌最初是从正确的合作伙伴端点发送的呢？如果 JWT 没有签名，则不可信。JWT\
  \ 允许使用 JSON Web 签名 (JWS) 规范采用不同的签名和加密算法。这些算法在 JWT 头部中指定。大多数情况下，JWT 通常不加密，仅签名。但是，如果你的令牌包含敏感数据，那么使用\
  \ JSON Web 加密 (JWE) 对其进行加密是一个选择。一种典型的加密方案使用已签名的 JWT 作为加密的负载。这被称为嵌套 JWT。使用相同的密钥进行加密和验证也是可以接受的。到此为止，你已经初步了解了\
  \ JWT。其中还有更多的复杂细节和漏洞，但这足以让你理解下面的示例。\n\n\n\n为示例微服务应用设计安全性\n现在，您将保护第 17 章中的微服务应用。第\
  \ 17 章的示例只实现了非常基础的身份验证。这就是为什么您能够从示例应用的主页开始浏览初始页面，直到可以将商品添加到购物车；但是，要允许执行下一步的结账操作，您必须已经登录，或者如果您在应用中已有账户则直接登录，或者如果您在应用中还没有现成的账户，则需要先创建一个账户再登录。同样，后台管理员要在应用中执行此功能，也必须登录。\n\
  \n然而，登录只是安全保护过程的一部分。对于一个真正需要妥善保护的微服务应用，您还需要处理授权部分。如果没有适当的授权，即使您的 Web 应用功能通过身份验证受到了限制，各个微服务\
  \ API 本身也并不安全。因此，如果同一网络中的某人能够访问某个微服务，他们就可以执行功能。当然，这可以被允许，但必须经过所需的授权。这正是您要在示例应用中实现的功能。\n\
  \n微服务的安全架构\n\n请参考第 17 章中的图 17-11，了解示例微服务应用的基本架构。现在，让我们添加必要的额外组件来增强它，以实现示例应用的端到端安全。见图\
  \ 18-6。\n\n![../images/477630_1_En_18_Chapter/477630_1_En_18_Fig6_HTML.jpg](img/477630_1_En_18_Fig6_HTML.jpg)\n\
  \n图 18-6.\n微服务电商应用的安全架构\n\n观察图 17-11 和图 18-6 所示架构之间的差异。后者展示了一个新的安全微服务。这个安全微服务是一个\
  \ OAuth 授权服务器。由于每个应用微服务都必须根据部署的授权方案保护自己的数据，因此存在多个资源服务器。\n\n现在，您应该回顾一下图 18-5，其中您看到了初始授权码类型流程中的\
  \ OAuth 交互。同样的设计也将应用于您示例微服务应用的增强安全架构中。浏览器中 Web 应用的所有请求将首先被 API 网关拦截。API 网关负责处理微服务的安全性。API\
  \ 网关将首先检查传入的 REST 请求是否具有针对受保护资源的现有访问令牌。参考图 18-6，\n\n*   如果访问令牌不存在，则意味着该请求是前面“授权码授予类型”小节中描述的\
  \ OAuth 握手初始循环的一部分。如果是这样，网关将检查请求是否指向授权服务器，如果是，则会同时添加 `client_id` 和 `client_secret`。OAuth\
  \ 客户端凭据（`client_id` 和 `client_secret`）由网关安全地保存在服务器端，网关将它们添加到请求头中并转发请求。如前所述，OAuth\
  \ 握手将在最后完成，并提供一个访问令牌作为响应头。\n\n*   相反，如果访问令牌已存在，它将把令牌添加到请求头中，并将请求转发给受保护资源。\n\n非对称签名和引用令牌\n\
  在前面“JSON Web 令牌”小节中，您了解了签署 JWT 的必要性。有两种签名方法：使用对称密钥或非对称密钥。在对称场景中，您使用相同的密钥来加密和解密数字签名；而在非对称场景中，您使用私钥和公钥的组合。\n\
  \n使用令牌时面临的另一个问题是在复杂授权场景中令牌的长度。JWT 的大小很可能会增长到一定程度，以至于作为请求头传递时会遇到技术障碍。此外，即使您可以对 JWT\
  \ 进行签名和加密，它仍然是“敏感信息”，最好不要让这些信息在您的 DMZ 之外传播。这里我们考虑一下引用令牌的概念。引用令牌是对实际 JWT 的引用，您只需将引用令牌传递到\
  \ DMZ（或 OAuth 客户端）之外。\n\n在保护示例微服务应用时，您将同时利用上述两种方法。见图 18-7。\n\n![../images/477630_1_En_18_Chapter/477630_1_En_18_Fig7_HTML.jpg](img/477630_1_En_18_Fig7_HTML.jpg)\n\
  \n图 18-7.\n非对称加密和引用令牌\n\n回顾前面标题为“授权码授予类型”的小节，在第 4 步中，您假设用户对受保护资源的请求已经到达 API 网关。现在，参考图\
  \ 18-7，\n\n1.  用户对受保护资源的请求到达 API 网关。\n2.  授权服务器在完成所有基本的身份验证和授权检查与验证后，首先会创建一个 JWT。此\
  \ JWT 使用非对称密钥进行签名和加密。非对称密钥有一个私钥的概念，该私钥仅授权服务器可以访问，以及其对应的公钥，授权服务器会将其自由分发给任何需要它的人，在您的情况下是分发给所有资源服务器。\n\
  3.  签名并加密后的 JWT 被返回给 API 网关。\n4.  API 网关不会直接将 JWT 返回给用户或浏览器，而是将 JWT 映射到一个新的引用令牌，可能存储在本地缓存或本地存储中。\n\
  5.  API 网关仅将引用令牌返回给用户或浏览器。\n6.  对于 Web 应用中任何后续需要访问服务器端受保护资源的用户操作，引用令牌也会作为请求头传递，并再次被\
  \ API 网关拦截。\n7.  API 网关检索与引用令牌对应的实际 JWT。\n8.  API 网关将 JWT 附加到请求中，然后将请求转发给资源服务器。\n\
  \n如图 18-7 所示，资源服务器现在可以使用其拥有的公钥副本来验证收到的 JWT 的真实性，并进一步验证请求是否具有所需的权限，然后接受或拒绝该请求。\n\n\
