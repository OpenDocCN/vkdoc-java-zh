  ## 从开放银行到开放金融


  开放银行只是金融服务行业蜕变的第一阶段。开放金融（Open Finance）这一术语用于描述开放银行数据共享的延伸，同样建立在“消费者拥有其在金融服务提供商平台上所产生数据”的原则之上。在消费者同意的前提下，这些数据可以与获批的第三方提供商共享，以开发并提供创新产品和服务。开放银行仅聚焦于访问银行交易数据或代表客户发起支付，而开放金融的范围更广。它涵盖了所有消费者金融服务数据，如储蓄、债务、投资、养老金、替代性借贷和保险。在保险领域，来自现有服务提供商的客户数据可用于识别个性化且价格最优的保险科技产品；而在替代性借贷领域，历史交易数据可用于更可靠的信用评分和偿付能力分析。它有潜力改变消费者和企业使用金融服务的方式。


  从开放银行的发展历程中，有许多经验可用于推动开放金融取得成功：


  **标准化**：数据访问的标准化是避免市场碎片化的关键。就像一个国家内电源和插座标准保持一致一样，提供统一的 API 定义将使第三方能够专注于为客户创造价值，而不是应对各服务提供商之间的细微差异。对于数据共享，基于规则的方法——如英国开放银行所采用的方式——可能比
  PSD2 中采用的基于原则的方法更可取。


  **监管**：立法者、监管机构和公共部门应关注开放银行的快速发展。尽管“屏幕抓取”（screen scraping）因共享客户凭证而存在固有安全缺陷，但这一做法仍被允许持续了若干年。开放
  API 迅速崛起为替代方案，并革新了银行业。随着这股浪潮可能蔓延至银行业之外，保险等其他行业未来也可能受到影响。监管机构在其中发挥关键作用：需要有力的方向指引和适当的框架，以支持行业建立标准和基础设施，平衡其中涉及的不同公共利益。同样重要的是，现有金融服务提供商、金融科技公司（FinTech）与监管机构之间应持续协作，以推动生态系统发展。


  **商业模式**：开放金融的一个关键考量是资金模型，因为必须兼顾生态系统中所有参与方的需求。根据 PSD2 等规范，银行可能不得就数据共享和支付数据收费。考虑到银行为实现这一点已投入大规模资金，除满足核心监管要求外，这可能并非一项具有吸引力的举措。开放金融可以在监管最低要求之上，为竞争与创新腾出空间。基于开放
  API 技术的高级 API（Premium APIs）可通过支持跨多个不同行业的数据共享来推动开放金融发展。


  **争议处理机制**：由于争议可能给金融服务提供商和第三方带来声誉损害，所有利益相关方都应建立投诉管理流程，以便处理所提出的投诉或问题。为应对数据隐私泄露和数据滥用，可能需要建立责任框架，以追究金融服务提供商和第三方提供商的责任。


  **以客户为中心**：客户金融数据是开放金融生态系统的核心要素。由于这些数据在整个生命周期中始终归客户所有，因此必须始终将客户置于核心位置。客户应清楚了解其数据如何被收集、共享和使用。知情同意是关键机制，可使消费者了解其所同意事项的条款条件以及数据将如何被使用。客户还应享有撤销访问授权的权利，并且此前已共享的数据应可被“遗忘”。


  客户教育是金融服务提供商和第三方的重要职责，将有助于建立信任。如果潜在客户不信任该生态系统，他们就不会同意共享其数据。可信的第三方提供商同样是获取并维持客户信任的重要要素。


  ## 示例应用


  开放银行和开放金融已使银行和第三方提供商能够推出新产品与服务。我们重点介绍其中几个应用——由银行打造的 YOLT、采用前沿人工智能（AI）技术的 CHIP、利用开放
  API 扩展现有产品能力的 bunq、为第三方提供平台能力以屏蔽集成复杂性的 TrueLayer，以及提供跨银行账户聚合能力的 Revolut。


  金融科技公司（FinTech）的高速、低成本与创新能力，帮助扩展了现有能力，并推动了数字化应用和平台的构建。


  *   **YOLT**：ING 打造了最大的第三方可信实体之一——YOLT（2016 年始于荷兰，现已进入英国、法国和意大利）。YOLT 的应用通过调用开放银行
  API 聚合跨银行账户信息，并向客户提供建议。YOLT 的使命是“让每个人都拥有更聪明管理金钱的能力。”目前其客户约为 +-500,000；但其不足之一在于其
  App/功能仅支持“读取与建议”。应用给出的任何建议仍需在源银行系统中执行。


  *   **CHIP**：CHIP 使用人工智能（AI）计算你可以储蓄的金额，从已关联的活期账户中划转资金，并通过直接借记（direct debit）存入由巴克莱银行托管的独立储蓄账户。储蓄比例（最高可达
  5%）通过游戏化方式与您对 CHIP 的社交推广挂钩——每成功邀请一位朋友注册可额外获得 1%。


  *   **bunq**：早在 PSD2 之前，bunq 就已开放其 API。bunq 让开发者能够在一家持有完整银行牌照的银行之上构建独特应用，丰富所有 bunq
  用户的体验。借助 bunq API，开发者可以连接交易数据、推送通知、付款请求、银行卡、联名账户，以及限额与预算功能。


  *   **TrueLayer**：TrueLayer 的 API 平台使将开放银行、支付等金融服务集成到任何应用或网站变得简单，并可覆盖全球各地。TrueLayer
  可连接欧洲所有银行 API，而不受其所采用标准或协议差异的影响。


  *   **Revolut**：借助这一新功能，德国客户现可将其在 Comdirect、Commerzbank、Deutsche Bank、ING-DiBa 和
  Sparkasse 的账户连接至 Revolut 应用，并在一个地方查看全部财务状况——直接通过智能手机实现。该功能由英国金融科技公司 TrueLayer（欧洲金融
  API/编程接口提供商）合作开发。使用 TrueLayer 平台可确保德国主要银行的账户信息被安全集成，并在 Revolut 应用中实时更新。




  ## 总结


  在本章中，我们回顾了开放银行（Open Banking）和开放金融（Open Finance）如何在金融服务行业中走到前沿。从本质上讲，这一进程是由“以客户最佳利益为核心”所驱动的。诸如屏幕抓取（screen
  scraping）之类的做法，会因共享凭证而危及客户安全——API 正是对此的修复机制。新的支付方式和账户聚合将为客户带来更高便利性和个性化服务——而 PSD2
  等规范使第三方能够实现这些能力。市场中更充分的竞争可以带来更多客户选择、降低成本并提升服务水平——开放银行标准正是为此而引入的。


  我们赞颂了这一模式对所有参与方的益处——从为全球数十亿无银行账户人群带来金融包容性的前景，到为第三方提供商创造更公平的竞争环境。当然，这一运动并非没有风险——我们也强调了其中一些风险并给出了潜在缓解措施。当前最令人振奋的是，开放银行浪潮正在全球蔓延。尽管不同地区在不同产品领域采取了不同路径，但其共同的核心目标都是：让客户所拥有的数据实现民主化。


  我们还强调，这仅仅是开始。开放银行是更宏大开放金融倡议的先声，将影响金融服务行业中更多细分领域。这带来了前所未有的机会，可重新设计金融服务，以实现最大化的可扩展性与效率。将一切串联起来的金线是监管。监管的一项关键目标是：数据共享与开放银行应在风险管理和创新激励之间取得平衡。监管框架应当顺应市场变化，明确角色与责任。


  尽管一些组织已主动建设能力以支持开放银行，但许多组织并未做好准备。一个规划完善且执行到位的 API 平台战略，能够为组织提供参与并引导监管咨询过程所必需的知识与经验。


  确实值得注意的是，单一需求所产生的涟漪效应——具体而言是支付发起（payment initiation）——触发了下一轮变化，即访问客户账户信息。这引发了监管变革，从本质上迫使组织调整其政策，并在客户同意的前提下向第三方开放访问。而这种裂变并未止步于此——它还推动了金融服务其他领域的变化，例如保险和借贷。


  如果我们将同样一套原则应用到其他行业，如电信和医疗保健，那么可以合理推断：用户的移动交易历史或健康信息属于用户本人，并且应在用户同意下可供第三方访问。Google
  和 Facebook 等提供商已将这一能力内嵌进其产品服务。正如当年通过监管允许用户在更换运营商时保留手机号一样，我认为移动交易数据，甚至可能包括通话记录，实现数据民主化只是时间问题。这个行业只需要一个足够有说服力、能够触发变革的需求。许多国家正计划提供国家医疗服务。对现有患者病历以及私营部门数据的访问，或许正是推动该行业变革的临界点。


  一些组织采取了观望态度，准备对监管变化作出反应。也有许多组织已洞察到构建平台型业务的潜力，正通过提前启动其 API Marketplace 实施来先于监管布局，或抢占战略位置。


  '
- '# 3. 消费


  需要投入大量关注的关键领域之一，是 API Marketplace 的*界面*。尽管真正的主角是提供功能的 API 本身，但主角也需要舞台和剧场来表演。如果舞台太小，或剧场太难进入，那么
  API 的卓越价值就会被埋没。在整个旅程中始终牢记这一点至关重要。没有第三方消费，就不会有流量；没有流量，就不会有收入；而收入维系着 Marketplace，后者的存在正是为了实现愿景（Vision）。


  Marketplace 提供可被多个第三方消费的*产品（Products）*。某些产品或 API 由于监管要求或对特定功能的需求，几乎可以“自我销售”。然而，大多数产品都必须被主动营销，以展示其能力并鼓励采用与使用。我们将在下文讨论实现这一目标的机制。


  ## Marketplace API 与内部 API


  交付团队应始终牢记 API Marketplace 的*语境（context）*。根据我作为集成开发人员的经验，在为内部项目暴露或消费某个接口时，我们可以通过面对面会议、电话或电子邮件，让消费方团队与提供方团队直接沟通，从而补充接口规范文档之外的细节。这之所以可行，是因为这类集成通常是一对一的消费方与提供方关系。


  一个成功的 API Marketplace 会有*大量*消费者。尽管理论上可行，但与每个消费者逐一进行一对一会议来讲解集成问题，既不可持续，也不可扩展。这也不同于内部集成项目：在内部项目中，交付负责人会毫不犹豫地安排尽可能多的会议来解决接口挑战。第三方通常有多个
  API 提供商可选；如果 Marketplace 不够吸引人或不易消费，他们通常就会转向别处。一个好的 Marketplace，应当能够抽象并简化后端平台的复杂性，并将其打包为易于消费的形式。


  API Marketplace 并不是普通的、千篇一律的集成“管道”工作——把一个系统连到另一个系统即可。面向消费者暴露的 API 必须经过深思熟虑与谨慎构建。正如
  Amazon 的“API Manifesto”所述：


  *所有服务接口，无一例外，都必须从底层开始按可外部化（externalize-able）的方式进行设计。也就是说，团队必须规划并设计出能够将该接口暴露给外部世界开发者的能力。没有例外。*




  ## 用户画像


  许多组织容易陷入一个误区：只搭建一个技术门户，里面充斥着大量三个字母的缩写词。在我们争分夺秒构建最小可行产品（MVP）时，也正是这么做的。我们的落地页有一些鲜艳的图标和图形，再配上匆忙拼凑的简短文字，而我们的重点都放在了技术层面。同样，根据经验，团队发布的门户第一版很可能会运行最长时间，因为团队的关注点会转向推出新的
  API 产品。


  由于其属性，人们很容易将“API 市场”归类为技术性事物，并且只关注工程师和集成开发人员。同样重要的是从商业视角看待市场，并思考如何利用它来提供业务价值。公司本质上都在尝试构建新的产品和服务，以更高效、更便捷的方式解决老问题。使用者需要理解
  API 市场的意图与价值，才能判断如何利用它来实现其组织目标。


  尽管在 API 体系中，用户体验（UX）看起来可能有些多余，但它是市场采纳过程中的关键要素。面向不同用户画像的 UX 有助于在正确的时间向正确的受众提供相关信息。这可以通过独立门户来实现，也可以在单一门户中通过清晰定义的分区来实现。


  在接下来的章节中，我们将围绕以下方面，探讨如何满足业务和技术用户画像的目标：


  *   **吸引（Attract）**：抓住平台潜在用户的注意力，覆盖广泛的用户群体——从成熟组织到金融科技公司和初创企业。


  *   **教育（Educate）**：对平台理解越深入，使用就越高效，也更有可能更广泛地使用各类产品供给。


  *   **建立信任（Build trust）**：市场的意图是通过使用内部产品和服务来赋能外部组织。平台的潜在使用方需要对其能力和可靠性有信心。


  *   **透明（Transparency）**：细则藏得太深或信息晦涩，会影响与第三方的关系，并可能损害平台在市场中的声誉。


  *   **协作（Collaborate）**：持续让客户保持参与，并利用反馈来优化平台、推动产品路线图。双方关系是持续性的。


  *   **引领（Lead）**：由对门户内容负责的领域负责人主导，并支持组织内外的其他计划。


  ## 业务价值


  你所在组织的 API 市场门户的首批访问者，很可能来自业务发展视角。该个人或团队会审查 API 产品，以判断其是否适合作为某个仍在构思或构建中的产品/服务的基础要素。图
  3-1-1、3-1-2 和 3-1-3 是很好的示例，展示了 Twilio 如何为其 Messaging API 实现这一点。


