  我们认为，构建一个能让开发者信任并保持忠诚的 Marketplace，应关注以下领域。


  ### 吸引


  对 API Marketplace 的技术消费，可能来自第二波评审，第一波通常是业务发展评估。技术团队将负责提供一份用于集成到 Marketplace 的**影响评估**。将会审查诸如文档标准、自助服务、示例代码、测试数据可用性以及开发者支持等标准。此评估反馈将有助于确定集成的时间线和成本。


  尽管 API Marketplace 的目标是吸引第三方提供方进入平台，但这需要以必要的**最低水平**技能与经验为前提。在定义目标受众时务必牢记这一点。引入新手或初级开发者的风险在于，团队将不得不提供更多的手把手指导与支持。


  **用户群组**和社区活动也可用于消除 API Marketplace 概念的神秘感，并向感兴趣的开发者介绍该平台。由于 API Marketplace 的目标是实现数据访问民主化，可考虑那些能够消费产品并启动多样化应用的创业者。**黑客松**是鼓励参与和激发兴趣的绝佳机制。一个积极的副作用是，它们还可能帮助你发现有才华的开发者加入交付团队。


  我们在一次实施中观察到一种新颖做法：与外部组织合作，由其邀请一组多元化开发者参加 3–5 天训练营。在此期间，开发者会与专家配对获得支持，并构建一个使用 API
  Marketplace 的应用程序。


  FinTech 和初创企业也热衷于消费 API 来快速启动应用交付。务必在此类组织常访问的网站发布文章并鼓励参与。Marketplace 具有**病毒式传播**特性，如果开发者体验积极，口碑会自然扩散。构建并培育开发者社区至关重要，这应成为
  API Marketplace 的核心目标。


  ### 教育


  对 API Marketplace 的技术消费至少需要中级开发经验，最好具备 2–3 年的实操编码或集成经验。虽然你可以教育新手开发者，但我认为门户的目标与材料不应包含如何发起
  REST API 调用的教程。网上已有很多优秀教程，可帮助开发者快速掌握 API。


  不过，请务必覆盖 API Marketplace *特有*概念，例如在**蓝图**中讲解 OAuth。委托授权作为 Marketplace 的基本原则之一，*必须*被清晰且简明地详细说明与解释。我们遇到过许多新的
  API 消费者，在能够对照时序图追踪调用之前，并不真正理解流程。许多集成开发者只熟悉 client ID/secret 模式。


  对于每个 API 产品，尽量提供多种编程语言的**代码示例**。一些标杆级开发者门户会提供以下语言示例：Node.js、C#、PHP、Ruby、Python、Java
  和 cURL。API Marketplace 的最大优势之一是访问方式中立——HTTP。务必利用这一点来兼容广泛的开发者群体。根据我个人消费某大型云服务商产品的开发经验，**代码实验室**可以带来巨大差异。代码实验室不同于代码示例，因为它会逐步引导开发者完成
  API 消费流程。可以把代码示例看作现成蛋糕，把代码实验室看作食谱。


  随着 marketplace 逐步成熟，可考虑提供用于集成的**模式**或推荐实践。典型示例是从移动应用消费 API。鉴于大量提供方在集成方面可能面临类似挑战，提供模式将有助于缓解集成摩擦，让你的
  API 更易被消费。顺便回答一个常见问题：关于直接从移动应用消费 API，答案是绝不要在应用中存储凭据，而应使用经用户认证的令牌来发起 API 调用。


  **博客文章**和**播客**同样是与开发者社区保持连接的极佳方式。这些工具可用于分享 Marketplace 的建设历程，并让用户了解你的路线图。可在播客中提出并回应尖锐议题——例如监管时间线以及如何据此规划。这些内容能让外界更深入理解平台内部运作与运营方式。


  随着平台成熟并扩展规模，可考虑推出**开发者认证**。它不必是庞大的体系——只需基础理论评估和实践练习，以确保开发者掌握 Marketplace 概念。对于更敏感的
  API 产品，这可能会成为强制要求。


  最后，可下载的 Postman 集合将极大帮助潜在开发者。Postman 被视为 API 开发的事实标准工具，本章后续也会讨论。务必提供文档，逐项说明集合中的每个值，并附上分步指南。Postman
  集合本身大约只占 40% 的工作量，其余 60% 在配套文档上。如果可能，考虑聘请技术写作人员协助整理这些材料。遗憾的是，一些最优秀的开发者并不一定最擅长撰写文档。




  ### 建立信任


  在开发者社区中，信任必须靠赢得。这可以通过关注细节并坚持高标准交付来实现。通过帮助开发者解决他们仅凭现有技术文档无法自行解决的难题，开发者会感受到支持。及时响应支持请求同样是强制性的。快速反馈——哪怕只是*“我们正在调查，会尽快回复你”*——都至关重要。基于这一点，支持团队内部必须具备相应流程，使开发问题能够被升级并得到处理。


  我想强调，开发者支持是一种平衡。我们当然希望支持开发者使用我们的 Marketplace，但也希望客户群体尽可能具备自助能力。也就是说——首要求助渠道应是 Portal
  文档；若仍存在明显理解差距，应先在开发者论坛提问，以征集社区反馈。如果这些方式都无效，并且使用方确信问题出在内部运行机制，或属于其无法在 Marketplace
  团队介入前自行解决的问题，则应提交工单。此外，工单还应包含他们已进行的排障与调查细节，以及*他们*判断该问题超出其控制范围的依据。这个要求看起来可能很高——但强大的开发者社区不仅能缓解支持团队压力，也能提升
  Marketplace 的整体标准。也就是说，API 产品质量将提升，因为它会接受来自使用方更具挑战性的评审。


  同样重要的是**言行一致**。如果 API Marketplace 是访问数据的新数字渠道，你的流程也应当是*数字化*的。对于一个兴趣刚被激发的开发者而言，没有什么比无法立即上手实践更令人沮丧。比如，拥有一个很棒的开发者门户，展示了惊人的功能与能力，却只提供一个*预约沟通*或*联系我们*表单。自助服务是绝对必要的。我想特别强调这一点，因为它能让用户从概念无缝过渡到落地实践。


  通过提供对功能的即时访问，你的 API Marketplace 将从“营销/概念产品（vaporware）”转变为可落地代码。根据经验，开发者非常反感 vaporware。怀疑会立刻上升，寻找
  Marketplace 薄弱点的审视也会加剧。请务必在 API 产品发布时提供即时自助访问，至少应提供 Sandbox/Simulated 环境。


  ### 透明性


  对信息的**开放**、明确且无歧义的访问，也是*维持*开发者社区信任的方式。在竞争压力允许的范围内，尽可能提供 API 产品路线图洞察。第三方可以据此规划并安排各自发布节奏。若可能，可考虑与第三方就潜在
  API 产品开展咨询式流程，以便在产品生命周期早期确定潜在需求/采纳情况。这将有助于将精力聚焦到更易被消费的 API 上。尽管拥有数百个 API 产品的目录看起来很惊艳，但如果其中大多数
  API 的使用量或采纳率都很低，它只会增加支持和维护范围，并分散对高使用率 API 的关注。


  可以考虑设立**beta**计划，允许受信任的部分第三方提前访问早期阶段的 API 产品。该流程能让团队在边界清晰且安全的“staging”环境中优化和打磨产品——从接口设计、性能工程到文档更新。beta
  标签清晰表明产品仍在建设中。当我们的 Marketplace 向公众发布时，我们的产品负责人巧妙地加入了“beta”标识，使我们在发布早期阶段拥有更大的调整空间。在获得信息与网络安全许可后，也可能将
  beta 发布 API 连接到内部质量保证（QA）后端，以进行更深入的集成测试。不过这应在充分审慎评估后执行，因为向第三方开放内部环境可能打开“潘多拉魔盒”。


  在若干成熟开发者门户中可见的一个创新特性是 API **status** 页面，并且该页面本身也可通过 API 获取。这使使用方能够接入你的运营平台，并在服务或
  API 宕机时采取预防性措施。状态信息还包括历史数据，从而让使用方与运维团队能够快速识别运行不佳的产品，并在内部或后端平台上推动修复。提供这种级别的可见性，是向第三方传递一个信号：你认真对待平台稳定性与可靠性，并已采取措施在问题发生时提供即时告警/通知。


  一旦 API 进入生产环境，任何新增功能更新，或补丁与问题修复，都必须在**release notes**中清晰记录。这应成为部署周期的一部分，因为第三方必须被持续告知
  API 的任何变更。


  ### 协作


  务必鼓励使用方对 API 产品提出反馈，并在可能情况下在后续版本中尽量响应这些反馈。某些反馈——例如规定性监管接口过于复杂、难以消费——可能无法通过变更来满足。反馈是一份礼物；如果使用方愿意花时间提交反馈，从他们的视角看，这很可能意义重大——务必始终与用户形成闭环。继续上面的例子——针对复杂受监管接口的反馈，处理方式应是先表示理解，再说明该接口由监管强制要求，最后给出辅助建议，例如示例代码或实验课程。


  在技术开发者门户中设置一个区域，可能是消息论坛里的**feature**请求专属版块。随着第三方持续消费你的 API，他们最有条件识别产品缺口和潜在改进方向。这对产品生命周期是极佳输入，能让一个好
  API 变得更卓越。再次强调，依据 API 的规模与覆盖面，请求的优先级或排期应与该请求的投票数相关联。这是活跃开发者社区最大的价值之一——用户可以帮助推动产品路线图向前发展。


  在企业内部的集成方案中，所有服务使用方通常会提前很久收到变更通知，且某些治理流程要求在变更实施前获得所有使用方批准。由于 API Marketplace 位于组织边缘，交付团队在更新
  API 时可能未充分考虑更广泛影响。也就是说，从责任分配 RACI（Responsible, Accountable, Consulted, Informed）矩阵角度看，第三方可能既未被
  Consulted，甚至未被 Informed。应遵循轻量级变更管理流程，确保所有服务使用方至少知悉其所消费 API 的任何维护或发布。




  ### 牵头方


  这项工作也应由产品负责人（PO）进行协调，并充分吸收工程团队的重要投入与指导。尽管内容本质上具有很强的技术性，有人可能会认为这项工作最好由技术团队来理解并交付。我的反驳是，技术团队*并不*适合牵头这项工作，因为他们可能过于贴近细节。产品负责人将提供第三方视角。由于产品负责人最终要对
  API 的成功与采用率负责，他们应当牵头 Business 和 Technical 两个门户的工作，因为这属于面向客户的事项。到这里应当已经很明显：产品负责人*必须*具备半技术背景。


  ## 开发者布道


  即便是一个好产品，配有良好文档，也仍然需要被布道推广。我在学习如何使用一个新的移动应用开发平台时，从一家大型云服务商那里观察并体会到了这种方法。起初，我完全不理解这为什么有必要——文档、代码示例和实验内容都非常出色，甚至新手开发者也能在很短时间内上手运行。然而，当我进一步深入这个平台时，我遇到了文档中没有覆盖的场景。也正是在那一刻，我理解了
  Developer Advocate 的价值。


  他们可能并不知道，但通过反复观看、暂停并跟着他们的视频教程同步编写代码，我已经能直呼其名。我惊叹于他们的解决方案远比我预想的复杂方案更简单、更优雅。除了更深入了解该平台之外，我也学会了如何更高效地使用*Node.js*。文档与
  Advocate 的区别在于，后者是在用产品解决真实世界场景。


  想象一下，几块乐高积木散落在桌上。尽管你也许可以自己搭出一个基础结构，但你很可能只会使用熟悉的积木。观看别人如何使用一块你不熟悉的积木来实现某个特定功能，会帮助你正确理解这块积木的作用，并让你在未来更有信心使用它。


  简而言之——API Marketplace，尤其是在发展中市场，需要强有力的开发者布道。以有趣、易懂的语境讲解委托授权等概念的视频教程，必然有助于缓解开发者焦虑。访问机制使开发者能够*随时*、并按需*反复多次*查看材料，以理解复杂概念。随着近期线上
  meetup 的蓬勃发展，加入用户组如今比以往任何时候都更容易。应尽可能利用这一点，让潜在开发者（具备前置经验并拥有愿意学习的心态）快速在平台上手。用户组、线下或线上会议的内在价值在于，它允许
  Marketplace 与开发者之间进行双向沟通。我认为这种互动是互利共赢的。


  开发者可以从 Marketplace 技术交付团队获得实操支持。交付团队也能第一手看到开发者视角。有时在象牙塔中进行开发，可能产出理论上完备但不切实际的产品。这类产品通常会被搁置。API
  Marketplace 产品开发的一条关键信条应当是：简单、实用、可靠。团队中的任何成员都应有信心，能够轻松向外部用户解释如何使用该产品。


  在我们的发布活动中，产品团队争取到了用于制作 T 恤和马克杯的资金。我对此努力会心一笑，起初把它当作一种营销手段。然而，当我看到交付团队对穿上这些 T 恤感到无比自豪时，我非常惊讶，也正是在那一刻我意识到了这些小物件的重要性。“Swag”，也被称为“merch”，为无形实体提供了一种有形连接。直到今天，我的桌上还放着那个（未使用的）马克杯，因为我为我们所取得的成果感到自豪。我们的关键目标之一，是让开发者社区与
  Marketplace 建立连接，并拥有同样的归属感与支持感。




  ## 开发者支持


  与其他集成环境相比，API 市场的独特之处在于：在开发阶段和运营执行阶段都需要支持。这看起来可能会使所需的支持能力翻倍——然而，支持开发者最终会带来平台在运营层面的更多使用。开发者支持也不同于运营支持，因为两者问题咨询的性质不同。


  我们最常见的问题集中在看似复杂的委托授权模型上。为了解决这个问题，团队制作了能够清晰说明该概念的材料。你可能会惊讶，这些内容其实只是一些图片拼成的幻灯片。我们在多个场景中都成功使用了它——面向内部和外部开发者皆然。在讲解过程中，它有助于厘清终端用户、第三方提供方以及我们组织各自的角色。当我们在与
  API 使用者、测试人员或解决方案架构师的通话中逐步演示流程时，我几乎能感受到那种“恍然大悟”的瞬间：他们一下子就明白了它的工作方式。


  随着我们的市场不断增长和演进，我们也在持续改进并优化开发者支持流程。在发布早期阶段，大多数开发者问题由我们的一线支持团队处理。不过，如果一线支持无法提供帮助，问题就会转交给内部团队，进行更深入的技术或产品支持。对于某些请求，我们曾尝试通过电子邮件解决。然而，十有八九，成功率最高的方式还是与第三方开发者进行在线讨论。


  坦率地说，这一部分在我们的实施中仍在持续完善。非常有帮助的一点是，我们的产品负责人（PO）具备卓越的关系建设能力。当请求在一线支持与后端支持之间流转时，PO 也会与第三方沟通，以便明确需求，并在在线讨论前缓解潜在摩擦。请务必记住，到讨论开始时，第三方很可能因为问题尚未解决而感到不满，而一线支持也可能因多次尝试未果而感到沮丧。


  在线讨论时，我们会安排此前一直与用户沟通的一线支持工程师参会——以保证连续性。高级工程师和产品负责人也会参加会议。我们的意图并不是要让外部开发者感到压力，恰恰相反。我们希望表明：第三方对我们很重要，而且整个团队都重视这种合作关系。


  围绕这类互动的第一原则是*倾听*。首先，在讨论前准备阶段，你必须清晰且专注地听取一线工程师对问题的分诊说明。基于这些反馈，团队应准备好相关材料或信息。其次，你必须清晰且专注地倾听外部开发者。在会议初期收到的反馈或提问，将帮助你构建更好的平台。一旦你确认自己已经准确把握问题或现状，再提出解决方案。如果你需要进一步调查，也请明确说明。建议在通话后一天左右进行跟进。这将表明
  API 市场真诚地关注开发者的成功。


  一个积极的副作用是：我们与开发者社区建立了更好、更具个人化的关系。我们不再只面对客户端 ID 和电子邮件地址，而是能将其与真实的声音和面孔对应起来。我们了解开发者正在构建哪些类型的应用，也了解他们如何使用我们的
  API。在几乎所有互动中，开发者都会自豪地展示他们的应用。对于新产品发布，我们还邀请第三方开发者参加全天会议，执行端到端集成测试。这帮助我们在将能力扩展给更多第三方提供方之前，识别并细化潜在问题。收到的反馈也被用于更新并调整产品的工作方式。


  尽管这些互动不像运营场景中的问题那样承受高强度时间压力，我们仍然尝试以处理运营问题同等的关注度和严谨性来处理开发者支持请求。从优先级角度看，运营环境始终第一。我们的市场通过电子邮件和
  Slack 接收支持请求。一线支持工程师会先尝试解决配置类或简单问题。对于更复杂的问题，会登记服务台工单以便跟踪，并分配给相关团队成员进行调查和解决。如有需要，问题会升级至产品负责人，由其安排与外部团队的在线讨论。


  最后，正如本章前文所述，我们鼓励外部开发团队尽可能实现自助能力。如果 API 集成存在技术问题，我们会要求提供有关请求与响应的 HTTP 跟踪信息，以及可能的代码摘录。本质上，这是一种*“帮我帮你”*式的协作。API
  市场一个利他的目标是：让平台赋能、培育并建设本地开发者社区。我们将在下一节中更详细地讨论这一点。




  ## 生态系统


  这些年来，我非常幸运能够参与一个 API Marketplace 的实施工作，并且一直惊叹于这个生态系统如何随着时间推移以及项目成熟而不断演进。我们最初是在一个“小鱼缸”里起步的——只有交付团队中的少数几名成员，目标是交付一个最小可行产品（MVP）。一开始，我们与外部世界几乎没有真正的连接，只与后端平台有几条薄弱的链路。


  随着平台为生产负载做好准备，我们进入了一个更大的“水箱”，并与不同的企业团队紧密合作，以实现更高的稳定性和可靠性。随着我们理解企业能力为实施带来的价值，我们对其的尊重和认可也不断提升。在
  API Marketplace 生态系统的语境中，人们可能很容易忽略企业内部团队。如今，我认为这恰恰是平台最关键的支撑要素之一，也是我们生态系统中不可或缺的一部分。毫无疑问，以流程和治理形式存在的、与成熟企业体系的“系绳”，有时会被视作拖慢变革速度的“磨盘”。但回过头看，几乎所有这些要求都让平台变得更稳定、更可靠，也更具企业级水准。


  我们非常幸运，首个主流消费者是一个内部支持的超级应用。我们已经从“水箱”进入“水坝”——水体更大、严肃性更高，但本质上仍是一个用于从运营角度验证平台的“安全空间”。随着越来越多参与方加入生态系统，我们必须在极度激进的交付需求与深植于后端平台的运营问题之间取得平衡。这可能促成了
  Marketplace 最大的一次扩张。在短短几个月内，与后端平台的集成数量呈指数级增长。超级应用带来的推动力帮助巨大：随着这艘“巨舰”冲破壁垒、撕开繁文缛节，我们连接更多后端平台的能力也随之快速增长。每新增一次集成，我们都必须与一个后端建立新的关系——不仅是在开发层面，也包括运营支持层面。


  此后，我们已经迈向“开放水域”。在成功支撑高性能内部消费者负载并借此赢得口碑后，我们如今更多地与外部第三方合作。这些第三方的规模和体量从单开发者实体，到知名金融科技公司，再到成熟的在线零售商不等。不过，我们对所有合作方都秉持同样的尊重与投入。


  最让我持续感到惊叹的，是生态系统的共生特性。没有消费者和企业服务的支持，API Marketplace 就无法存在。与此同时，它又是外部消费者利用企业服务能力的关键枢纽。我们期待由此产生的涟漪效应，终有一天能演变为蝴蝶效应——Marketplace
  已经激发了本地开发者社区。作为领先的金融服务提供商，我们 Marketplace 所提供的能力，已经促成了许多创新产品与服务的构建。这些新的增长萌芽需要被培育和支持，并将孕育出成功的第三方，进一步反哺
  Marketplace。Marketplace 的成功取决于一个活跃、繁荣的生态系统，在其中所有实体共同协作、共同成长。


  ## 开发者参与


  API Marketplace 可以采用不同的开发者互动策略。一些平台采用社区化方式，访问是开放的，成员彼此支持，以便更有效地利用平台。开发者之间的互动也可能催生创新产品和解决方案，其中可能包含来自不同平台的
  API。在这种参与模式下，开发者门户本质上是志同道合开发者分享想法与协作的会合点。一些门户还会展示个体开发者的经验与专长。随着解决方案被验证和认可，开发者的等级与可信度会提升。经验丰富的成员可以在帮助新开发者时充当“生态大使”。


  另一种方式是基于关键筛选标准选择合作伙伴。其意图是让规模更小、但更有经验、更成熟、且理念一致的合作伙伴子集进入生态系统。封闭生态合作关系用于创建、扩展和改进 API
  供给。开发者可通过合作伙伴网络获得财务激励、高级支持与辅导、对新产品的提前访问以及正式认证。尽管开发者池更小，但这也可能潜在地需要平台提供方投入更多管理与支持。


  由于来自不同组织的开发者可能不会直接沟通，通常需要合作伙伴经理提供支持，并将问题转交给后端技术团队解决。共享信息或协助其他开发者也可能不可行，因为他们可能将其视为竞争优势的损失。还应注意，在这样的环境中，预期服务水平明显更高。如果开发者提交了问题，反馈和/或解决方案必须在比社区论坛明显更短的时间内给出。


  开发者参与的形态将由你要构建的 API Marketplace 的性质决定。比如，如果你的 API 用于帮助在本地社区寻找走失宠物，应采用社区化方式；如果你的
  API 用于寻找制造核武器所需钚的来源，你可能就需要限制能够访问平台的合作伙伴。


  ## 工具链


  开发者会使用各种各样的工具来完成工作。开发者工具范围可以从邮件客户端、代码编辑器、集成开发环境（IDE）到 Wiki。在本节中，我会重点介绍一些我个人在日常交付中认为有用的工具和实践。用于
  API 消费与开发的优秀工具和产品非常多。这里并非要做产品对比或基准评测。如果你已有经验，或对其他工具更熟悉，请继续使用它。


  ### cURL


  cURL（即 client URL）是一款使用 URL 语法来获取和发送文件的命令行工具。它支持包括 HTTP 和 HTTPS 在内的多种协议——这使其非常适合用于
  API 工作。它几乎可在任何硬件平台上运行，并被许多主流操作系统内置。


  我使用 cURL 的原因如下：


  *   **通用性**：当我在容器、虚拟机和服务器之间切换时，常常无法使用本地机器上那些强大的图形用户界面（GUI）工具。在因网络限制而无法享受 UI 便利的远程节点上，能够通过*curl*访问端点来检查连通性，或模拟/重放客户端请求，其价值无可替代。


  *   **简洁性**：我也喜欢使用 cURL，因为它朴素、免繁饰且维护成本低。它专注于自己作为“信使”的角色，在关键参与者——客户端与服务器——之间传递消息。发起各种
  API 调用的语法简明，在线教程和示例也很容易获得。


  *   **中立性**：如果一个请求在 cURL 中可用，或反过来不可用，那么结论是无可争辩的。尽管开发者可能使用不同工具，但 cURL 命令可以轻松共享，并在几秒内重放。由于命令行是所有操作系统的“最大公约数”，cURL
  因而跨越开发者边界，具备了通用“公民身份”。




  ### Postman API 客户端


  Postman 是一款流行的 API 客户端，可让开发者轻松创建、共享、测试并文档化 API。它通过允许用户创建并保存简单或复杂的 HTTP/s 请求，以及读取响应来实现这一点。Postman
  拥有许多功能。以下并非完整清单，但重点介绍了我和我的团队经常使用的要素：


  *   **快速上手**：一旦我们有了端点和请求细节，就能快速调用 API。Postman 的 UI 直观，并支持以不同方式发起请求。例如，请求体可以用多种格式指定——并可通过简单的单选按钮界面进行选择。免费版本已具备所有快速启动所需的能力。


  *   **能力**：这个工具可以按你的需要做到简单或复杂。Postman 适配了广泛的开发者技能层级——从只想向端点发起请求的新手开发者，到希望搭建复杂自动化测试执行流程的资深测试工程师。


  *   **共享**：由于我通常跨多台机器工作，同步能力带来了极佳的可移植性，我可以在一台机器上开始一个集合，然后在另一台机器上继续。我们最常用的功能之一是团队成员之间共享集合。我们经常遇到这样的情况：同一个调用在某位开发者那里可用，但在另一位那里不可用。API
  请求极其细致复杂，对于复杂调用而言，成功与失败的差别可能只在一个参数。通过公共链接导出集合即可轻松共享。请注意，这不应被用于敏感 API。这显著提升了协作效率，并使开发团队成员之间能够即时对齐。


  *   **代码片段**：在开发集成解决方案时，使用工具调用 API 或端点只是漫长战役中的一场胜利。下一处“战场”是从代码中实现同样的结果。代码片段功能非常有用，因为它可将
  Postman 中的请求转换为多种不同语言——甚至包括 cURL 命令。这非常实用，因为它有助于从工具到代码的过渡。


  *   **变量与环境**：作为软件开发生命周期的一部分，解决方案必须在多个环境中流转——从开发（Development）到测试（Test），再到预发布（Staging），最后到生产（Production）。在会话式
  API 交互中也很常见的一点是：前一个请求的输出会被后一个请求使用。变量可用作占位符——可手动设置，或使用脚本更新，从而显著加快测试速度。诸如端点之类的变量，也可以为特定环境进行配置。


  ### Fiddler


  Fiddler 是一款调试代理服务器工具，用于记录、检查并修改计算机与一个或多个 Web 服务器之间的 HTTP 和 HTTPS 流量。


  我们的支持团队最近收到一位第三方开发者的支持请求，对方在调用 API 时遇到了问题。这个请求之所以与我们收到的其他请求不同，是因为它包含了每个请求和响应的详细
  HTTP 跟踪信息。这不仅让我们能够跟踪调用流程并确认顺序是否正确，还帮助支持团队准确定位到哪一个请求中的哪一个参数有误。该开发者能够通过使用 Fiddler
  提供这些跟踪信息，因为 Fiddler 拦截了调用并记录了 HTTP 请求与响应。


  ### 开发者赋能教育


  由于 Marketplace 团队每天都在使用这些工具和技术，很容易忽视其他开发者可能遇到的学习曲线。技术开发者门户应将以下一项或多项作为强制要素，以支持第三方：


  1.  为每个 API 产品提供 Postman 示例集合。该集合必须包含预填充请求，开发者只需提供最少信息（如凭证）即可发起首次 API 调用。


  2.  提供工具配置的快速指南，并特别关注可能引发问题的区域。例如，Postman 中 “Headers” 与 “Parameters” 的区别。


  3.  在提交支持请求时，说明请求所需的详细信息以及*如何*获取这些信息。应使用类似 Fiddler 的拦截器来捕获请求与响应——而不是发送代码片段。


  被赋能的开发者将形成一个更有经验的开发者社区，减少支持请求，并且当请求出现时，其内容会更详细、更简洁。前期投入时间和精力，将在 Marketplace 生命周期后续阶段带来显著收益，例如需要更少的运维人员，以及更快地解决或响应支持咨询。


  ## 总结


  在本章中，我们讨论了围绕 API Marketplace 的业务门户与技术门户的策略。尽管聚光灯照在精彩舞台上的耀眼 API 产品上，但确保开发者受众的需求始终处于关注焦点同样重要。


  每个 Marketplace 实施都会因 API 产品组合、门户形态、开发者关注点和参与策略的不同而独具特色。提前定义这种身份，有助于团队清晰规划通往目标状态的路径。也可能有必要让平台身份随着时间推移而演进或调整——以响应客户需求。API
  Marketplace 的动态特性确实是其最大优势之一，因为这种灵活性使其能够比现有企业系统更快地做出响应。


  在下一章中，我们将探讨 API Marketplace 的变现。消费模型（Consumption model）会对平台如何变现产生重大影响，因为二者本质上紧密相连。如果变现模型是高交易量、低交易成本，那么就需要更多开发者进入管道。如果策略是较低交易量、基于订阅的收入，那么目标就是一小部分成熟、忠诚且愿意并能够支付订阅费用的组织。




  '
- '# 4. 商业化


  我认为，工程能力很可能是 API Marketplace 商业化或商业主张中*最*重要的推动因素。对许多技术导向的人来说，这听起来也许有些自相矛盾，因为这两个领域似乎位于光谱的两端。


  请允许我用建造一架新型客机来说明这一观点。如果工程团队只专注于速度、性能和技术，那么它无疑会非常快且技术过硬。但还需要考虑许多其他因素，比如可搭载的乘客数量、燃油消耗、航程或飞机可覆盖的距离，以及维护成本和使用寿命。这些因素决定了飞机在财务上的可行性。现实中的一个例子是超音速客机“协和号”的退役：它是工程奇迹，但遗憾的是并不算最经济的选择。


  同样地，技术交付团队也有责任关注 API Marketplace 的商业走向和财务可行性，因为这会影响其生命周期。坦率地说，我更愿意将其视为一种特权，这也要求工程团队在设计和构建解决方案时始终关注商业目标。基于对多个
  IT 项目的观察，如果把这一目标完全交由项目管理层独自承担，最终往往会产生技术上可行但失衡的解决方案。这类项目通常会在接近发布时被搁置，或因不可持续而被封存。


  在我们的实施中，一个效果显著的方法是：赋予团队中任何成员就 API 产品的商业层面提出质疑或建议的机会。这得益于一位项目负责人——他不仅欢迎反馈，还经常主动向团队索取反馈，把它视为团队对平台拥有主人翁意识的信号。来自技术团队、关于潜在高收益产品的天马行空式提案，往往会被以极高的技巧性处理，以避免伤及自尊，因为这些想法可能并不符合组织运作的“规则”。


  在本章中，我将从技术视角探讨“商业化”这一目标，采用一种偏重逻辑的视角，结合那些在概念阶段夭折的产品经验，以及许多已进入实施阶段（其中一些现已产生收入）的产品经验。我们将拆解当前在平台上使用的策略，以及为最大化财务潜力而持续调整的策略。本章的核心主题是：技术与商业相互依存——二者缺一不可。


  ## API Marketplace 飞轮


  借鉴 Amazon 飞轮模型——其增长战略以客户体验为核心——我们平台的驱动流程（如图 4-1 所示）则以开发者体验为基础。这个流程应完全归功于我们的项目负责人，而我还得费了一番口舌，才说服他分享这套流程蓝图；它本质上驱动着我们平台的运营模型。


  在一个新市场中，这无疑是一个大胆的决定，而它得以实现，依赖于管理层的长期视角以及清晰定义的数字化战略支持。与许多组织不同，我们采取了“重质不重量”的方式。为支撑这一点，所有
  API 产品都按照并对齐行业标准来构建。若采用自定义定义，也许能更快交付，但会更难被采用。


  ![../images/509947_1_En_4_Chapter/509947_1_En_4_Fig1_HTML.jpg](img/509947_1_En_4_Fig1_HTML.jpg)


  图 4-1


  API Marketplace 飞轮


  我们的策略是先启动飞轮：赢得信任，并建立开发者对平台的亲和度。根据对第三方消费者的观察，我们的 API 为其交付给终端用户的产品或服务开发提供了显著支持与加速。在许多情况下，这些用户来自更大组织过去可能并未重点面向的细分市场。尽管
  Marketplace 的主要消费者本质上是第三方提供方，但终端用户活跃度的提升会带来更多 API 使用，这反过来使我们能够开发更优、更具竞争力的商业模式，进而带来
  API 的额外消费，并吸引新消费者进入平台。


  通过利用规模经济，以现有基础设施和运营能力服务并支持新客户，平台能够在不增加额外成本的情况下创造更多收入，从而获得更高利润率。我们采用了与 Amazon 类似的策略，并有意识地将这一收益通过降价回馈给客户。正如
  Jeff Bezos 的明智预判，降低成本会带来流量增长，而这又会不可避免地加快飞轮动能。一个观察是：更低成本也降低了准入门槛，平台因此吸引了更多小型咨询公司，它们正利用我们的产品构建创新解决方案。


  就像去超市原本只想快速买一两样东西，最终却总会推着装满额外商品的购物车离开一样，第三方通常从一个 API 产品开始，随后借助接入流程和技术集成经验，逐步吸收并消费其他产品。我们的
  Marketplace 起初只有少量 API 产品，但随着时间推移，产品选择通过现有消费者需求和新产品定义稳步增长。虽然我们不能宣称拥有最多的 API 产品数量，但我们“产品池”中的产品都能带来真实的业务与客户价值。


  ## 你的 Marketplace 定位


  在你着手为组织建立 API Marketplace 之前，必须清晰了解 API 将如何被使用。这将指导你的销售与营销策略，也将定义应重点触达的第三方细分群体，更重要的是，确立衡量平台成功的指标。在表
  4-1 中，我通过与实体店的对比，描述了组织使用 API 的一些方式。请注意，这并非一份穷尽或定论式清单——你的平台方向与重点将依据组织的需求和愿景目标进行定制，可能从某一细分领域起步，随后演进到另一领域，或同时覆盖多个细分领域。


  表 4-1


  Marketplace 定位




  | 目标 | 描述 |

  | --- | --- |

  | 最简型 | 这类商店只提供最基本的必需品。没有花哨商品——只有维持库存周转和基本运营所绝对需要的东西。这类 API 市场的建设目标也只是满足监管合规要求。监管机构已发布必须在特定期限内遵守的法规，而为了避免处罚，只需完成最基础的要求即可。当前没有战略性目标——可能采取观望策略。
  |

  | 垂直细分型 | 我一直很想去的一家商店是 RadioShack。如果你需要任何与电子产品相关的东西，这里就是理想目的地。它只面向特定市场，但在该品类中是一站式商店。与之类似的
  API 市场是只处理特定类别 API 的市场。例如，银行可能只提供与资金相关的 API——从支付、贷款到交易数据。 |

  | 超市型 | 超市是全球各地社区运转的重要支柱。你可以快速进去购买牛奶这类基本用品，也可以寻找灯泡这类不那么常用的商品。它们满足广泛的客户需求，但商品选择通常基于大众化需求。因此，你可能能找到最常见型号的灯泡，但找不到适配
  20 世纪初古董枝形吊灯的那一种。这类市场是聚合器（Aggregator）。它将常用 API 汇集在一起，并在统一平台下提供便捷使用。单一对接点减少了维护多个供应商账户或关系的需要。其内在优势在于，借助规模经济，可减少支持所需人员。此外，由更大实体代表多个消费者形成的合力，还可能从后端供应商获得更具竞争力的价格和服务。连锁体系中的“超市”相比个人客户，通常能从供应商处获得更好的价格与服务。
  |

  | 香榭丽舍大道型 | 巴黎著名的购物大道是香榭丽舍大道（Champs-Élysées）。这里汇聚了成熟品牌门店，是本地居民和游客都喜爱的目的地。由于场地面积稀缺，只有特定品牌才会被邀请入驻，以维持该空间的独特性。虽然每家店是独立运营的，但它们在这一区域的气质与氛围中天然地彼此关联。这类市场是一个生态系统——没有单一所有者，而是围绕一个核心主题或结构建立。消费者与提供方之间是一对一关系。对提供方执行能力的信任与信心，会因其出现在该平台中而被隐性评估。也就是说，服务提供商若能加入这个“专属圈层”，就意味着其必须达到特定质量标准。反过来，提供方也需要持续维持高质量水准，才能保留成员资格。这种相互信任是随时间逐步建立的。
  |

  | 购物中心型 | 购物中心是许多消费者喜爱的场所。这里商店种类丰富，对潜在租户的最低要求也相对宽松。更重要的是，安保、停车、洗手间等公共设施会统一提供，作为面向顾客的便利服务，并由所有租户共同受益。许多购物中心还拥有“主力租户”，作为吸引顾客的核心亮点。这类市场代表封闭生态系统。消费者可直接联系提供方，同时共享通用能力——通常包括安全与支持服务。公共基础设施也可承载多租户方案，以降低成本并实现规模经济。此处的“主力租户”可能是成熟且受信赖的品牌，例如声誉良好的金融机构，并且其本身也参与该环境。对于先建设自有市场、之后希望通过吸引更多第三方开发者并支持较小提供方触达更大受众来刺激增长的组织而言，这可能是一种自然演进路径。
  |


  ## 价值与收入策略


  在这个由技术加速驱动的快节奏世界里，如今出现了许多全新且创新的创收方式，这在几年前几乎难以想象。比如——拥有大量粉丝与关注者的社交媒体人物会成为“意见领袖”（influencers），并通过内容获得更多观看量以及产品营销推广而获得报酬。职业电竞选手的收入甚至可能超过职业体育运动员。简而言之，理解并重视这一点非常重要：*价值*既可以通过“硬收入”的形式被显性创造，也可以通过品牌定位与客户忠诚度等方式被隐性创造。本节将探讨
  API 市场可以如何通过不同路径创造价值——包括隐性价值与显性价值。




  ### 开发者付费


  让我们从一种能让资本家满意的方案开始。毕竟，当 API 市场这一概念被拿去融资时，其财务可行性将会是一个热门话题。在这种方式下，第三方提供商将为使用 API 产品付费。通过研究
  Twilio 等成功平台，可以发现有多种实现方式：


  *   **按使用付费**：这本质上是一种“预付费”概念。多年前，移动运营商向客户提供语音和短信服务时，客户通常会先往账户里充值“话费”，这一模式因此流行起来。我并非经济学家，但我一直觉得很奇怪：这类账户中的语音单位成本（按秒或按分钟）通常高出许多——尽管移动运营商承担的风险其实更低。更奇怪的是，这种做法在很长时间里基本被用户群体普遍接受。从消费角度看，第三方会预先购买额度，随后随着
  API 使用而逐步扣减。一旦额度耗尽，将不再处理任何请求。对 API 提供方的好处是：预先收款、风险更低，而且如果资费参照移动套餐——单位成本还更高。对 API
  使用方的好处是风险可控——采用这种方式，可以设定明确预算以防成本失控，并可随时终止合作关系。


  *   **免费增值（Freemium）**：不少云服务商会提供免费的计算资源和额度，以吸引开发者进入其平台。因为这些优惠，我个人确实使用过很多产品和服务。随着我对
  Firebase 等产品越来越熟悉，我后来转向了付费选项，以获得更多功能。若非有推广赠送额度，我可能不太愿意直接提供信用卡信息去尝试。这一模式可用于赢得开发者信任；若使用得当，还能建立用户对你
  API 产品的忠诚度。对 API 提供方而言，风险在于服务本质上是零成本提供的。但在许多情况下，基于 API 的特性，这种风险可能很小，因为通常只是处理请求所产生的内部成本。站在开发者角度，这显然对我很有吸引力。


  *   **分层定价**：在金融服务行业，我们看到金融科技（FinTech）解决方案出现了爆发式增长，这些方案旨在改进金融服务的交付与使用方式。它们本质上是拥有好点子的初创公司，但往往资本投入有限。分层产品能够让处于组织生命周期不同阶段的消费者，以符合其需求的价格点访问你的产品。反过来，套餐也可通过结构设计来保持低成本——例如基础套餐可提供有限支持。分层还能够清晰展示不同等级之间的差异，并可用于财务预测，这对初创公司的商业计划极其重要。每个层级可包含：在限定周期内指定数量的免费交易、超出后的按笔计费、不同级别的支持服务，以及服务可用性或对特定
  API 产品的访问权限。产品负责人需要开展大量研究来设计这些套餐，因为不同地区、人口结构和消费者行为会导致市场差异显著。在我的职业生涯中，我见过许多商业模式在一个市场表现极佳，却在另一个市场惨淡失败。产品必须针对消费市场进行定制。


  *   **积分制**：我们国家最成功的医疗保障计划之一就是围绕“积分”概念构建的。这个想法极其简单，但在运作效果和覆盖范围上却影响深远。会员因健康生活方式获得积分——锻炼越多、体能越好，积分越高。随着积分增加，用户等级提升。会员随后可以折扣价购买机票、电影票等商品。对计划提供方的好处是：健康会员更不容易生病并发起理赔。这个项目拥有大量会员，很多人如今对健身近乎狂热；它甚至成功到该组织已进入银行业——激励机制是消费也可获得积分。这是一个多方共赢的案例。消费者与提供方都受益，参与该项目的大量外部服务提供商也同样受益。将该模式简单应用于
  API 市场的方式是：消费者在达到特定交易次数后获得积分额度。该额度可用于抵扣成本，或购买你组织中的其他产品。例如，第三方消费者可以使用通过 API 交易获得的积分，抵扣其月度账户费用。这有助于产品间的交叉导流，从而提升客户留存。在上述场景中，消费者可能不愿转向其他提供商，因为那会影响其每月账户费用。


  *   **交易手续费**：这可能是最容易实施的机制。每个 API 请求都会生成一个事件，并被路由到某个引擎，在那里完成中介处理、计费评级与出账。在一个计费周期结束时，会生成账单，然后由消费者付款。实际落地中隐藏着大量复杂性。开票、催收和计费争议都是必须考虑的领域。由于计费发生在使用之后，账单失控的风险很大——就像云服务或产品被意外持续运行，最终产生天文数字账单一样。提供方同样面临风险，因为客户可能拖欠应付款项；同时还需要投入大量时间进行客户教育，以避免此类情况，并维持更长期的客户关系。尽管这种方式最透明，但我认为它也是最基础、最僵化的方式，因为它并不鼓励或奖励第三方行为。


  在继续之前，有两个关键因素必须考虑。第一，对于上述任一方式，平台的计费能力都必须坚如磐石、透明清晰，不能存在任何疑点或不确定性。借鉴移动计费的经验，客户问题通常可通过明细账单被立即解决。你的计费平台必须能够生成明细账单，清楚展示交易发生时间、调用了哪个
  API，并且能够进一步下钻，提供诸如交易来源、请求载荷和响应载荷等附加信息。


  第二个、也可能是*最*重要的因素是：API 产品必须*首先*为第三方创造价值和收入，进而才会为你的组织带来收入。完全可以构建并发布一个 API 产品，再给它贴上高价标签，以彰显其潜在高价值并作为宣传资本。然而，如果没有有说服力的价值主张，第三方采用和使用将很少，它最终只会被搁置，带来微薄收入。




  ### 开发者获得收益


  这种方法的原则是激励第三方使用组织的 API。从本质上讲，所有方法都应被视为一种合作伙伴关系，因为一方的成功意味着另一方的成功。在这里，消费者是组织的延伸，并共享收入成果。这让我想起我曾与一位创业公司老板的对话，他以高额价格出售了自己的企业。尽管这是许多人梦寐以求的模式，但他却很遗憾自己保留了全部所有权——如果有更多利益相关方，企业本可以做得更大。


  从财务角度看，与其完全拥有一个较小的蛋糕，不如分享一个更大蛋糕的一部分，可能更具盈利性。这是 API 市场的一个关键主题——它使你的组织能够通过第三方触达更多客户。若从逻辑上看，如果第三方能从其促成的交易中获益，那么它就是价值链的一部分，并会尽最大努力促成交易。让我们看看可以如何实现这一点：


  *   **收入分成**：这可能是我最喜欢的第三方参与机制之一。它体现了双赢方式，并清楚表明组织致力于将第三方视为有价值的合作伙伴。非洲移动网络爆发式增长的一个关键因素是：几乎任何街角的小商贩都能售卖话费。商贩的激励来自每笔销售的佣金。移动运营商只是利用了一个成熟且广泛分布的话费分销网络。第三方提供商也更有可能推广或重点展示能带来更高分成的产品或服务。潜在的收入分配比例还可能成为第三方商业计划中的关键转折点，促使其构建新的产品或服务。


  *   **联盟（Affiliate）**：拥有稳定客户基础的第三方也可以作为品牌倡导者，推动你的 API 产品被采用。类似于培训合作伙伴帮助候选人获得认证，也有服务提供商可以构建定制化训练营项目，帮助潜在开发者快速上手你的
  API 产品。除了让 API 获得更多曝光外，另一个好处是可直接从联盟服务提供商和受训开发者那里获得关于 API 采用的反馈。尽管这项工作也可以由内部交付团队承担，但专业机构可能已经拥有稳定的订阅用户群、与开发者建立关系的能力，且更重要的是具备中立性，这会让新消费者降低戒备。与创业孵化器（旨在支持发展中企业的项目）合作，也是支持这些举措的好方式，并且是在组织生命周期早期接触新组织、展示
  Marketplace 价值的绝佳机会。


  *   **推荐（Referral）**：这种模式的成功，从成千上万的 YouTube 赞助频道中即可见一斑。通过实施简单的推荐计划，如果开发者的朋友和同事使用其代码注册，他们就可以获得奖励。这当然有助于吸引并建立你的
  Marketplace 受众。对于某些 API 产品，潜在客户线索（Lead）的价值本身就足以补偿第三方提供商。例如，当潜在客户在考虑购房或购车时使用金融贷款计算器
  API，第三方即可获得补偿。由于客户信息可以在调用中被传递，这也为组织提供了潜在销售机会。


  ### 免费（Free）


  Free 与 Freemium 的关键区别在于：Free API 产品将始终免费提供。在这种情况下，价值创造是隐性的——它推动 API 采用，并增加使用你平台的第三方提供商数量——这些第三方随着时间推移可能被转化。其目标是通过零成本实现大规模扩散，从而让你的品牌触达更多潜在客户。


  这对第三方来说是一个有吸引力的选项，尽管托管组织可能并不情愿提供，但其对第三方的潜在影响和价值可能非常可观。例如，在企业中一个用于提供收入类型和职业类型列表的简单数据
  API 可能被视为理所当然，但对于需要这些数据完成注册流程的初创公司而言却可能价值巨大。它还使你的组织有机会通过新渠道提供服务——本质上，这些渠道就是由第三方构建的应用和服务。


  ### 间接（Indirect）


  秉持合作精神并巩固双赢模型这一基础原则，该策略以终端客户受益为核心。一个成功的销售策略应使所有参与者都能从交易中获得价值。采用间接策略时，可通过以下方式创造价值：


  *   **客户（Customers）**：满足监管要求（如开放银行 Open Banking）清楚地表明，客户数据的所有权与共享控制权掌握在终端用户手中。它使用户能够以由你平台促成的方式，安全且灵活地访问新产品与服务。本质上，是*他们的*数据，但在*你的*规则下。对用户和组织而言，这是双赢。


  *   **企业对企业（B2B** **)**：允许外部合作伙伴访问 API，可拓宽面向客户的解决方案范围。例如，向你的忠诚度与奖励计划开放 API 访问，可以让终端客户参与积分兑换体系，这不仅能扩大你的计划覆盖范围、带来更多积分兑换，也能为用户提供良好的价值主张。


  *   **信息型（Informational）**：通过 API 共享信息，可提升客户对市场变化的认知。可共享的信息示例包括外汇汇率、营销活动（如限时促销优惠）以及组织更新动态。


  *   **声誉型（Reputational）**：建立新的数字渠道可将你的组织定位为技术领导者和变革推动者。这可能成为使你的组织区别于竞争对手的因素，并为你的品牌带来显著价值。




  ## 计费工程


  在定义了 API 市场中的若干计费策略之后，下面我们来讨论实际落地所需的技术工程。API 产品通常会定义其变现方式——有些可能由第三方付费；有些可能采用收入分成、引荐模式，或免费。这通常由产品负责人（Product
  Owner）与后端支撑系统密切协商后确定。


  同样重要的是识别将如何向消费者计费——第三方是否需要先为账户充值，并在每笔交易时扣费，还是在交易发生后再统一计费并开具发票？无论选择哪种机制，都必须构建一个可服务平台所有
  API 的“计费主干”。所有事件（即使是免费 API）都应进入计费流水线，以用于分析与报表目的，而且不应轻视这一计费能力。在可能的情况下，应复用企业级能力。如果无法实现，请考虑使用托管或管理服务，因为这会带来较高的运维影响。


  事件计费模型（Event Billing Model）的技术流程如图 4-2 所示。


  ![../images/509947_1_En_4_Chapter/509947_1_En_4_Fig2_HTML.jpg](img/509947_1_En_4_Fig2_HTML.jpg)


  图 4-2


  事件计费模型


  事件计费模型中的步骤如表 4-2 所述。


  表 4-2


  事件计费序列


  | 步骤 | 描述 |

  | --- | --- |

  | A | 事件由应用栈中的某个元素生成，通常发生在 API 请求完成时；目前主要来自微服务组件。该事件包含调用明细，包括产品、第三方标识、完成状态、请求与响应载荷以及日期时间。为最小化调用延迟并支持离线处理，事件会被写入数据库
  |

  | B | 事件记录由计费预处理器按批处理计划或触发器读取。批处理计划可在特定时间段内处理大量记录，从而提升处理效率。触发执行则可实现近实时事件处理 |

  | C | 记录会从主数据管理（MDM）、企业产品目录（包含 API 到产品的映射）以及第三方提供商数据库等系统补充附加元数据——后者包含第三方相关的额外配置，例如应计费的账户。由于此过程是异步完成的，因此数据采集不存在时间压力
  |

  | D | 经过富化与中介处理的记录会以预定义格式路由到作为企业服务提供的定价与计费引擎。该能力将处理计费事件并更新第三方账户数据。请注意，关于事件应如何计费的规则已包含在记录中。这种方式使计费预处理器能够影响事件的计费方式
  |

  | E | 该中介记录还会存储在市场中业务支撑应用可访问的数据存储中 |

  | F | 使用富化后的中介记录定期运行自定义报表，以提供平台的近实时计费视图。注意，这些视图可能并非精确的收入数据——但可支撑本章后续讨论的“名义视图” |


  近实时计费模型（real-time Billing Model）的技术流程如图 4-3 所示。


  ![../images/509947_1_En_4_Chapter/509947_1_En_4_Fig3_HTML.jpg](img/509947_1_En_4_Fig3_HTML.jpg)


  图 4-3


  实时计费


  *近*实时计费模型中的步骤如表 4-3 所述。


  表 4-3


  实时计费序列


  | 步骤 | 描述 |

  | --- | --- |

  | A | 在处理 API 请求之前，会先发起一笔资金预留调用。这可确保第三方有足够可用额度来服务该请求。在调用当下，确切应计费金额可能尚不明确——系统会按 API
  产品特性预留一个预定义的预算金额。如果无法满足资金预留请求所需的最低金额，则向消费者返回错误 |

  | B | 事件由应用栈中的某个元素生成，通常发生在 API 请求完成时；目前主要来自微服务组件。该事件包含调用明细，包括产品、第三方标识、完成状态、请求与响应载荷以及日期时间。为最小化调用延迟并支持离线处理，事件会被写入数据库
  |

  | C | 事件记录的写入会触发对计费引擎的调用。计费引擎会编排对下述各组件的调用 |

  | D | 首先需要对事件进行费率计算。事件记录会被路由到费率引擎（Rating Engine） |

  | E | 费率引擎会将主数据管理（MDM）、企业产品目录（包含 API 到产品映射）以及第三方提供商数据库（包含第三方额外配置，如计费账户）等系统中的配置数据缓存到内存数据存储中，以获得最佳处理性能。请注意，对于这类账单处理，延迟是关键考量。低延迟可更快处理事件，从而缩小余额更新与后续请求之间的风险时间窗
  |

  | F | 随后，计费后的事件会由扣费组件（Charging element）用于从第三方剩余额度中扣减具体金额。计费后的事件也可能表明不应向第三方扣费——例如
  API 请求未成功处理，或产品属于促销活动。在这种情况下，将释放预留金额 |


  ## 分析与洞察


  在试点实施 API 市场时，借助导航型数据会显著降低难度，且这些数据最好尽可能实时且足够细粒度。按照典型的工程思维，本节最初计划放在“运营”章节中。经过进一步思考，我发现这会暗示“由机舱而不是舰桥来掌舵”。尽管运营指标非常关键，但真正驱动平台方向与目标的是经过*解读*的信息。举例来说，可将“每秒交易数”这一运营指标视为速度指示；但如果缺少补充数据（如产生流量的第三方提供商与
  API 产品）来指示方向，那么这就可能等同于“挂空挡踩油门”——转速很高，却没有向前动能。


  本节旨在强调：需要了解平台的历史航迹与进展，并建立一组当前导航数据（例如位置与当前航向）来规划前路。需要注意的是，舰桥指挥中心控制面板上的所有仪表与表盘并不会在第一天就全部启用。随着工程团队对平台进行埋点或从分散的数据源采集数据、使数据流入，这些指标才会逐步“点亮”。如果产品负责人对所需内容有清晰定义，这种自上而下的方法将引导工程团队。相对地，另一种自下而上、技术驱动的做法，往往只会得到一些随机系统指标——它们或许能在控制面板上组成漂亮的小部件，却无法提供有价值的业务指示。




  ### 数据采集


  在全面运行状态下，API Marketplace 生态系统内几乎会持续不断地产生事件流。除了显而易见的 API 调用之外，潜在消费者可能正在基于原型开发提交支持工单，发往后端系统的请求可能正在变慢，终端用户可能正处于完成高价值交易的最后阶段，或是来自临时营销活动的突发负载也可能正在产生。一个关键目标是尽可能多地捕获这些数据——并且要做到高效、一致、可靠。


  基于多年在各类集成领域的经验，并借鉴医疗分诊流程，我们实施了传感器（Sensor）与探针（Probe）策略，如图 4-4 所示。对于我们可直接控制的要素（如应用栈），我们在关键流程上显式挂载了传感器。这些传感器会发布定义良好的事件，提供关于请求的细粒度信息——例如第三方标识符和交易金额。当事件被接收后，仍需要补充额外元数据——例如根据该标识符解析出第三方名称。


  ![../images/509947_1_En_4_Chapter/509947_1_En_4_Fig4_HTML.jpg](img/509947_1_En_4_Fig4_HTML.jpg)


  图 4-4


  数据采集策略


  在很多场景中，数据是由外部系统捕获的。对此，我们采用探针策略。用于记录客户交互的服务台（Service Desk）包含大量信息，就是此类实体的一个示例。潜在第三方关于访问
  API 产品或获取更多信息的请求，是有价值的 Lead 数据。关于服务中断或交易追踪的支持请求同样至关重要，因为它们代表了可能带来 Retention 价值的交互。由于数据存储在企业托管应用中，技术团队构建了一个探测机制（以自定义应用形式存在），用于查询并提取这些交互数据。在某些急需补充信息的场景中，这种方法也被用于解析并提取应用数据和审计数据，以加快访问速度。


  对整体环境进行盘点、识别各类参与方与信息来源，并制定数据采集策略（明确如何获取数据）是非常重要的。


  ### 数据分析


  在我职业生涯早期，当我被要求为团队所支持的一个集成平台提供 Analytics 时，我是从技术导向的角度来推进这项工作的。我曾痴迷于衡量底层指标，例如每条流程的请求量，并对平台和应用进行了埋点，以留下可被摄取到数据库中的数据轨迹。遗憾的是，当我尝试构建查询来解读数据、判断是否存在有意义的模式时，最初看着数据流不断涌入的兴奋与自豪，很快被沮丧所取代。从这段经历中，我得到的基本认知是：上下文是分析信息的关键，而一个分析数据点通常由多个底层指标构成，如图
  4-5-1 和 4-5-2 所示。


  ![../images/509947_1_En_4_Chapter/509947_1_En_4_Fig6_HTML.jpg](img/509947_1_En_4_Fig6_HTML.jpg)


  图 4-5-2


  分析目标


  ![../images/509947_1_En_4_Chapter/509947_1_En_4_Fig5_HTML.jpg](img/509947_1_En_4_Fig5_HTML.jpg)


  图 4-5-1


  分析来源


  这正是项目高管所请求的 Analytics 视图。请注意，每个指标都包含多个维度。我们来跨不同维度检查一些指标，以说明它可以如何使用：


  *   **用户数（# of users）**：（i）唯一终端用户请求数，用于判断客户对第三方产品和服务的采用情况；（ii）按第三方提供方划分，用于对平台消费者进行排名；（iii）在定义时间段内统计，用于预测特定提供方的未来流量。这些信息可用于识别可能带来更高流量及潜在更高收入的提供方。


  *   **已完成交易数（# of completed transactions）**：（i）针对某个特定 API 产品，用于确定其产生的收入；（ii）按第三方提供方划分，同样用于对平台消费者进行排名；（iii）在定义时间段内统计，用于理解该流量是突发性还是持续性。


  这些信息对于从不同视角理解平台至关重要。它不仅能轻松识别高流量 API，还能下钻到具体操作层面，了解产品是如何被使用的。它也可以指导你的第三方引入策略。例如，若大部分流量来自单一消费者，这可能是一个风险信号，意味着为了平台的长期稳定需要更多“锚点”客户。相反，若许多消费者的流量都很少，可能表明平台尚未在任何第三方内部建立深层次黏性。之所以能够提出这些假设与推断，正是因为在不同时段、跨多个维度具备了关键数据。




  ### 报告


  随着平台的成熟、更多高价值 API 产品的推出，以及为关键第三方提供任务关键型支持的要求提升，我们的团队实施了以下机制，以提升对平台活动的可见性：


  *   **仪表板**：如图 4-6 所示，并在表 4-4 中描述。与汽车仪表盘提供广泛信息的方式非常类似，你通常会关注速度表，但也会被其他指示器（例如油量）所吸引，因为它会影响车辆速度。下面这个仪表板乍看之下可能像是指标“爆炸”。通常，产品负责人或业务负责人会先关注某个特定指标；如果该指标未落在定义参数范围内，就会进一步查看其他数值，以判断它们如何影响主要指标。仪表板的价值在于：不仅提供平台关键指标，还提供可能影响平台的因素或条件细节。


  *   **电子邮件**：仪表板快照会每小时通过电子邮件发送给关键产品干系人。此外，高价值交易成功完成的通知也会分发给产品团队。我曾颇为惊讶地看到，高级商务人员会在完成交易数量偏低时发来询问，确认是否发生技术中断；而在高价值交易出现时，也会发送兴奋的祝贺消息。这表明，定期分发的信息确实被商务团队查看和使用，并且
  API 已被视为关键收入渠道。


  每两小时一次的**即时消息**由运营支持团队发送，内容包括系统稳定性以及关键 API 产品成功完成的交易情况。同样地，如果这些数字异常偏低，就会引发关于支撑系统和下游提供方可用性的疑问。


  表 4-4


  报告仪表板指标


  | 指标 | 描述 |

  | --- | --- |

  | 访客总数 | 访问应用程序（门户或 API）的唯一用户数量 |

  | 已创建线索 | 完成基础信息步骤/表单并请求进一步信息的用户。未继续后续流程的用户，销售代理可通过电话联系 |

  | 身份证件统计 | 上传的身份证明文档数量、成功处理数量，以及因 OCR 导致的失败数量。会对失败请求进行排查，以确定是上传图像问题还是系统故障 |

  | 交易统计 | 基于流程执行逻辑计算的详细交易数量及其相关状态：已计算、已拒绝、失败、已接受 |


  ![../images/509947_1_En_4_Chapter/509947_1_En_4_Fig7_HTML.jpg](img/509947_1_En_4_Fig7_HTML.jpg)


  图 4-6


  仪表板示例


  成功报告策略的关键在于提供具体、相关的数据，并以目标受众能够快速理解与分析的格式进行拉取（通过 Web）或推送（通过电子邮件或即时消息）。


  ## 概念性损益表


  概念性损益表是我们 Marketplace 的一个关键构件，承担多项功能。借用项目高管提出的术语，它用于衡量渠道能力层面的整体盈利性。由于 Marketplace
  可能包含一系列产品，其中一些可产生收入，另一些因监管要求必须免费，因此它有助于理解所有产品的价值。


  作为市场撮合方，本质上是在消费者与提供方之间进行中介，有时会面临价值证明的挑战。毕竟，维持平台运行需要成本——基础设施、软件、开发人员、支持工程师、产品负责人和交付负责人都需要投入。由于一笔交易的收入通常由后端服务提供方确认，Marketplace
  可能因此被归类为内部“成本中心”。遗憾的是，像建立数字品牌或赋能第三方这样的隐性价值，在只看最终财务结果的财务主管眼中往往意义不大。


  这种现象会让团队感到非常沮丧，因为通常带来更高收入的业务单元会获得更高预算分配和更多认可。项目高管并不满足于仅被视作“成本中心”，并希望组织理解 Marketplace
  计划的贡献与重要性，因此明智地建立了“概念性价值”这一衡量方式。


  损益表这一“透镜”的放大倍数被提升，用于持续审视每个 API 产品的表现。在产品初期，产品与业务负责人可能会提出一些假设，并据此影响是否构建某个 API 的决策。构建完成后，需要持续测量以判断产品健康度。诸如预期流量规模或第三方采纳度等假设会被不断验证。平台规模与基础设施也会被置于聚光灯下，以识别其是否可能成为产品成功的阻碍。持续测量有助于判断产品是否正在接近收益受限阶段，从而需要修复措施或做出退役决策。


  在这种细粒度层面理解具体产品，可更深入洞察总体拥有成本（TCO）。某些更成功的产品可能需要更高水平的支持与监控，因此应承担更高比例的平台运营成本。损益表各明细项的细节，使得对每个产品进行量化衡量成为可能。


  最后，将损益表作为我们的标准衡量机制，为执行委员会的评审与评估带来显著优势，因为他们通常具有财务导向的思维方式。该流程消除了对 Marketplace 的定性或“直觉式”判断，转而采用定量方法来清晰理解财务状况。在某些情况下，这可能会发出需要转向的信号，以确保该计划的长期持续性。下一节将对此进行讨论。




  ## 转向新的商业模式


  我们最初希望建立的 API Marketplace，其根基很快就遇到了“硬地”——第三方提供商在技术就绪度方面存在不足。尽管 API 遵循开放标准，团队也非常乐意协助解决集成挑战，但我们失望地看到第三方提供商对
  API 的采用率很低。局势在某个临界点进一步恶化：一家成熟的第三方公司（拥有经验丰富的开发团队）在一项激进的集成项目排期中进度落后，并表示将错过一个关键交付日期。


  Marketplace 的产品负责人迅速行动，提出了一个激进方案：由我们的团队代表第三方托管该应用，以赶上时间节点。尽管这一决定表现出对我们交付能力远超客户本身的信任与信心，工程团队最初仍将其视为一时冲动。毕竟，这是一个
  *API* Marketplace——而不是 *应用托管* Marketplace。根据我的一线经验，我也可以向你保证：让一名集成开发者去构建用户界面（UI），几乎就像让超人去开采氪石一样。


  这个托管应用的目标相对简单。它确实需要一些 API 集成——但只需最低限度。第三方将实现一个标准重定向来启动应用，该应用会消费平台中的 API。前端开发之所以没有那么难受，是因为我们仍忠于初衷：使用
  API 来撬动组织内部能力。坦率地说，这种集成模式后来成为了平台最大的收入来源之一！


  最初这像是一笔“被迫购买”，因为技术团队不得不紧急调整部署策略并申请设计与安全审批；但随着团队发现他们如今可以直接使用 API——以我们过去一直试图说服第三方采用的方式——这一做法逐渐演变。该方法也使其他提供商能够通过采用同样模式来加速其集成工作。


  在这个案例中，产品负责人完全有权坚持立场，要求采用 API，即使这会冒着错过截止日期的风险。然而，这次转向展示了技术平台的多样性与灵活性：它能够通过适应不同的市场条件来创造新的商业模式。


  ## 总结


  在本章开头，我提出了这样一个观点：工程能力是 API Marketplace 商业成功的底层支撑。我们还讨论了飞轮过程——一旦启动，就会在平台的各个领域产生连锁效应。通过聚焦开发者体验（Developer
  Experience），平台会吸引更多客户（Customers），从而降低成本（Costs），并支持更激进且新颖的商业模式（Commercial Models）；这些模式反过来为新产品开发（Product
  Development）提供资金，被更多第三方（Third Parties）消费，最终回到更好的开发者体验，形成完整闭环。这股持续运动的浪潮驱动着 API Marketplace
  的增长战略。


  我们谈到了为你的 API Marketplace 建立“身份”的必要性，并将其与开设一家实体店进行对比。通过这一类比，我希望你已经开始构想自己想打造的“店铺类型”，以及那些即将“开张”的新平台。随后我们讨论了
  API Marketplace 的价值创造方式，并观察到它可以通过隐性、显性，甚至间接的方式实现。进一步深入到具体实现层面，我们回顾了支持多种计费策略的工程方法。需要特别注意的是：计费策略应当先行，平台则围绕该策略进行工程化建设。接着我们进入了变现（Monetization）的关键领域——可见性与度量。Analytics
  和 Insights 提供了极其重要的可见性，驱动着用于“驾驶”Marketplace 的控制面板。我们回顾了数据采集、分析和报告策略。名义损益表（Notional
  Income Statement）是我们用于度量并判断 Marketplace 盈利能力的机制。最后，我们展示了一种通过转向来创造新商业模式的方法。


  运营一个 API Marketplace 是一项极具挑战但也回报丰厚的工作。团队采用了创业公司思维，这使我们更高效、更节俭、更精益，并持续寻找新机会。这本身又是另一个飞轮过程，推动着持续的工程优化流程。其结果是平台架构不断演进——我们将在下一章更详细地讨论这一点。


  '
- '# 5. 平台架构


  我们的 Marketplace 诞生于“后 Netflix 时代”的世界中，是新成立数字化实践中的首批项目之一。团队不仅承担了开放银行原型的交付任务，还获得了采用前沿技术的机会与授权。事后看来，这既是祝福也是诅咒。采用容器化等新方法，使我们的平台具备了高度灵活性。不幸的是，我们比组织内其他团队领先了
  2 到 3 年，我们想采用的新方法当时尚未被信任，更谈不上被理解。


  时间的内在价值在于：它让我们的团队得以持续演进和优化平台，并通过知识共享与迭代交付，与组织其他部分建立起信任。变革的浪潮很快抵达了我们组织的海岸，我们正在试验的概念与方法也在类似机构中变得更加普及并被信任。这也使我们能够将
  Marketplace 定位为企业级平台——它对于组织职能至关重要，而不再是一个只承担小众角色的“卫星式”部署。


  通过这一过程，我们对企业内部支撑系统有了更深的理解。我们也因将前沿技术投入运营所需的努力而变得更加谦逊，并清晰认识到：人和流程是最终解决方案中不可或缺的关键要素。


  在接下来的小节中，我将以“时间推移视角”展示我们平台的各个要素、它如何变化，以及我对其演进的思考与计划。这样做是希望帮助你更快启动自己的实现，并分享我们后来确立的一些理念与原则。


  ## 要素


  就像元素周期表中的元素一样，图 5-1 详细展示了我们平台架构的组件。其中一些（例如反向代理）作为原子化的企业共享服务提供。另一些（例如我们的微服务）则经过“基因工程式”打造，从而赋予平台独特身份。这些模块构成了
  Marketplace 的核心，我们也在持续优化其功能，以使平台更高效。以下各节将进一步详细讨论每个要素。


  ![../images/509947_1_En_5_Chapter/509947_1_En_5_Fig1_HTML.jpg](img/509947_1_En_5_Fig1_HTML.jpg)


  图 5-1


  API Marketplace 平台的要素




  ### API 网关（外部/内部）


  API 网关本质上是企业的入口。在我们的部署中，它被放置在非军事区（DMZ）的边缘，另有第二个独立实例作为内部服务的入口。其核心功能是安全、API 管理和监控。我们组织的一项关键标准是：所有
  API，无论面向内部还是外部，都应通过 API 网关访问。API 网关的一大特性是能够对用户请求进行限流。虽然这也可以定制开发，但使用现成产品的好处在于，它能减轻团队的运维负担。诸如安全配置、证书管理、API
  产品更新和版本管理等任务都可开箱即用。


  多家云服务提供商都提供平台即服务（PaaS）的 API 网关，并且可以轻松完成资源开通。PaaS 方案的优势在于，底层基础设施的扩缩容与管理由云服务商负责。作为一家成熟的金融机构，我们使用的是商业现成产品，由内部团队管理并由软件供应商提供支持。为让交付团队拥有一定自主性，我们在网关内为
  API 产品创建了独立的开发者组织。这本质上是对 API 网关基础设施进行逻辑隔离。我们在开发环境中被允许拥有管理权限，但在推进到生产环境时必须遵守严格治理要求。


  ### 身份


  该模块承载了许多对 API Marketplace 功能至关重要的能力。其中最重要的一项是访问控制认证策略，通俗来说，它是终端用户认证的基础。由于其中托管了目录服务器，包含用于凭证校验的用户档案信息，因此在实施之初我们做出的一个基础设计决策是：复用企业级认证能力，并在
  Marketplace 内构建自定义授权框架。反向代理能力也归属于同一体系，作为终端用户请求与服务端门户应用之间的中介。通过复用企业安全基础设施（包括物理设施、流程与服务），我们的实施工作得到了显著加速。为满足
  Marketplace 的特定需求，我们也进行了一些定制，例如允许对后端 Web 应用进行未认证访问的 junction，以及滚动刷新令牌窗口。这一决策也帮助我们顺利通过架构与设计评审委员会。资深架构师对此有一种安心感：这个可能成为新攻击通道的前沿
  API Marketplace，是基于可信的企业安全标准进行防护的。


  ### 容器平台（托管/非托管）


  图 5-2 展示了应用部署方式的演进。从右到左可以看到三种方法：传统部署、虚拟化部署，以及正在快速流行的容器部署。


  ![../images/509947_1_En_5_Chapter/509947_1_En_5_Fig2_HTML.jpg](img/509947_1_En_5_Fig2_HTML.jpg)


  图 5-2


  部署策略的演进


  我很幸运，拥有图 5-2 中所有方法的实践经验。在我最早参与的一个项目中，我们分配到一台 Windows 服务器，它运行在由组织管理的数据中心物理机器上。我仍记得自己兴奋地截下
  CPU 数量和内存大小的截图，发给大学同学，炫耀新项目分到的硬件配置。即便在一次生产部署之夜，我不得不开车前往数据中心，亲自重启服务器，我也感觉自己像“太空先锋”宇航员，正沿着登机桥走向下一次太空任务。正如图中所示，所有应用都直接运行在操作系统上，一旦其中某个应用“闹脾气”导致
  CPU 或内存占用飙升，其他应用也会受牵连。


  几年后，在一个新中间件平台项目中，我们分配到了 Sun Sparc 服务器，每台都有大量支持多线程的 CPU，以及高达 512GB 的内存。那份服务器架构白皮书曾被我珍藏在床头，我甚至觉得
  NASA 和 JPL 可能也在用同款硬件发射航天飞机。Sun Solaris 的美妙之处在于 Hypervisor 内置在操作系统中，我们可以把机器划分成多个逻辑
  Solaris Zone（虚拟机），每个都有自己的操作系统，并分配了特定数量的线程与内存资源。若某个应用行为异常，Solaris 管理软件可以将其隔离，防止影响其他
  zone。我当时经常维护一份记录 Solaris Zone 详情的电子表格，用于不同环境和技术栈组件。


  我曾为这份表格的细致程度感到自豪，甚至让团队其他成员颇为无奈——我会像称呼老朋友一样，用 IP 来指代每个 zone，而别人根本不熟悉。由于我负责平台构建，我尽可能把安装流程脚本化——但最终仍不得不在不同
  zone 上执行自定义命令，有时为解决集群问题，有时为处理缺失依赖。同样，我把这些人工干预视为维持平台稳定运行的“赫拉克勒斯式”努力的一部分。那时我并未意识到，自己也在制造一种“雪花环境”。环境中的每个
  zone 都与其他不同。现在我只能自我安慰：即使我的部署脚本创建了完全一致的克隆，随着运维变更只在部分 zone 上执行，它们也必然会逐渐失去同步。


  虚拟机（VM）是朝正确演进方向迈出的一步——它们能更充分利用底层基础设施。缺点是 VM 资源开销较重，VM 配置不可避免地会逐步不同步，而且它们也鼓励基础设施纵向扩展，而这在长期内并不可持续。也就是说，物理宿主机只能扩展到一定上限，从而限制其可承载
  VM 的数量。


  在我们的 Marketplace 实施中，在我加入之前就已做出一个早期决策：采用容器方案。我第一次接触容器是 Docker，当我照着清单 5-1 的教程操作时，我被这一概念的简洁性深深震撼，并真诚地怀疑：2014
  年这项技术发布时，我到底躲在哪块石头下面，竟然错过了它。




  ```

  FROM node:14

  # Create app directory

  WORKDIR /usr/src/app

  # Install app dependencies

  COPY package*.json ./

  RUN npm install

  # Bundle app source

  COPY . .

  EXPOSE 8080

  CMD [ "node", "server.js" ]

  Listing 5-1

  Simple Docker configuration

  ```


  就像虚拟机由 Hypervisor 这一关键要素来实现一样，容器由容器运行时来实现。关于 Hypervisor 和容器运行时如何实现这一点，已经有很多优秀资料进行了详细说明。我的个人定义是：容器是软件配置的一种特定定义，这种定义被称为镜像。如清单
  5-1 所示，该定义会指定一个基础软件元素，然后在其上添加自定义部署和要执行的命令。所有从该镜像创建出来的实例都会相同。它不是从操作系统层面入手，而是让你专注于应用层及其相关依赖。


  以烘焙蛋糕为例来理解虚拟机与容器的区别。对于虚拟化方式，厨师会得到一个完整厨房——各种烹饪器具、全部电器以及可自由选择的完整食材储备。通常情况下，厨师最终只会使用其中一部分器具、电器和食材。对于容器方式，厨师只会得到完成蛋糕所需的东西——特定器具、原料，也许只有一台烤箱。容器方式还迫使部署团队在代码/配置层面进行变更。如果需要引入某个库或软件包，就必须更新容器镜像配置。容器实例天生是短暂的。镜像也很轻量，而且由于不需要完整操作系统即可运行，对底层基础设施的需求仅占很小一部分。其结果是，相比虚拟机，同样的基础设施上可以运行更多容器。进一步的好处是，这使基础设施能够进行水平扩展。更便宜但性能较弱的硬件，也能因容器轻量的占用而轻松承载多个容器实例。


  像 Kubernetes 这样的托管容器平台，提供了自愈能力，例如重启失败的容器，并在向客户端公布前检查容器健康状态。它还提供自动发布与回滚。坦率地说，我们早期项目团队在容器化方面几乎处于无人区——更别提还要在*本地部署（on-premises）*环境中构建一个
  *Kubernetes* 托管容器平台。我至今仍能想起一位抓狂的项目经理那种无助的表情：他急于达成冲刺目标，而常驻 DevOps 工程师在容器平台构建期间针对某个问题给出的反馈却是“*我们不知道自己不知道什么*”。当我们试验云
  PaaS 服务时，挫败感随着内部组织治理和安全限制呈指数级增长——这些服务几分钟就能开通，却无法访问内部系统。我们平台的第一个迭代版本是在单节点上的单个 pod——而且还需要定期重启。虽是小小胜利——但对我们的项目团队来说，这确实是个人一小步，却是
  DevOps 的一大步！


  此后，我们对托管容器平台进行了两次重大迭代；随着持续演进，我们现在对 *Kubernetes* 所提供能力的理解和认知已大幅提升。人们很容易被容器化的吸引力打动，尤其是像
  Kubernetes 这样的平台。我见识过基础设施即代码（Infrastructure as Code）的力量，也曾因“创世脚本（Genesis scripts）”可以在几分钟内
  terraform 整个环境的可能性而产生过宏大幻想。把我从这种遐想中拉回现实的是：在 API Marketplace 的语境下，托管容器平台只是应用平台的一个*使能者（enabler）*。我后来得出的结论是，像
  Kubernetes 这样的托管容器平台真正的力量在于：它淡出到后台，让你能够专注于应用本身。作为全栈工程师，理解容器平台的组成与功能，以及一个请求如何从 ingress
  经过 service 到达 pod，是至关重要的。我们本地 Kubernetes 平台的管理工作现已移交给企业级 DevOps 团队，后续还将进一步迁移到托管云服务。Kubernetes
  as a Service 这类产品通过抽象基础设施管理和网络结构配置等复杂性，帮助团队更轻松地实现诸如设置持久卷之类的复杂目标。




  ### 微服务


  我可能带有很强的主观偏见——但我认为我们的微服务层是整个平台的魔法配方。公平地说，微服务是以容器为基础的。我的看法是，容器是最佳*配角*，而微服务才是*最佳*主角。我并非一直都这么认为。在加入这个项目时，我职业生涯的大部分时间都在成熟的集成环境中度过，诸如企业服务总线（ESB）、应用服务器和流程服务器这类组件，再加上跨复杂集群配置的部署方式，早已根深蒂固。那时我的观点是：没有这些元素构建出来的集成根本称不上企业级——这可能也和我此前在一家软件
  OEM 工作有关。如果我们去掉微服务层，就能减轻搭建本地容器平台的负担，还可以用传统集成机制连接后端服务。传统意味着安全，我也就可以回到自己在职业生涯中打磨成熟的那套集成“剧本”。


  我仍然记得当时与项目发起人的那次讨论，那次我试图把微服务从平台中移除。我慷慨陈词，主张改用集成软件——我把它描述成一门威力强大的加农炮，可作为 API 网关的底座，而且在企业里早已成熟；相比之下，微服务方案就像豌豆射手，甚至可能走在“前沿中的前沿”*之前*。由于容器是关键目标，我建议继续使用它们——只是让其扮演不那么关键的角色。总结来说，我强调豌豆射手发射的“豌豆”是
  NodeJS——在我看来它是“Web 语言”，而不是像 Java 那样的集成语言。我对自己罗列出的这套反对微服务的论据颇为得意，并安慰自己：我们会在项目节奏没那么紧张时再尝试这项技术。可当裁决结果是“无罪”时，我震惊了。给出的理由是：微服务层能为平台带来高度灵活性，更重要的是速度。这是我职业生涯中见过最准确的预判之一。


  微服务层为我们的平台赋予了前所未有的可控性与多样性，并且是我们成功的关键。早上随口抛出的想法，到了下午就可能变成可运行、可演示的组件。这让我们得以践行“向前修复”的信条——乍看之下也许并不正统。如果遇到测试或运维问题，我们会尽最大努力修复，而不是回滚。起初我非常抗拒使用
  NodeJS，因为我觉得它不像 Java 那样具备我所熟悉的结构性和性能。如今与 NodeJS 共事了一段时间后，这种抗拒已经消散，而这种“缺少结构”的特性反而让团队能够以光速交付代码。表面上看，JavaScript
  很简单，但对其事件循环与异步特性的深入理解，使我们构建出了一个能够轻松处理高并发、低延迟请求的平台。并非每天都一帆风顺，也有一些时候，这种灵活性（比如构建阶段未捕获的变量定义错误）会引发问题。


  NodeJS 很出色，也满足我们平台的需求。但它并不是你要构建的平台的必选项。重要的是要考虑组织在开发语言方面的标准，以及开发与运维人员的技能水平。也就是说，如果一个组织主要使用
  .NET，那么引入 NodeJS 几乎等同于向企业体内注入病毒。还要牢记：编程语言是为理念服务的。任何编程语言，无论是否强类型，都可以采用。问题不在于你用*什么*，而更多在于你*怎么*用。


  当我们在一家成熟企业内部建设 API Marketplace 时，经常发现自己夹在治理严格的 API 网关和风险规避型、奉行“没坏就别修”原则的 IT 能力之间。微服务就是我们的减震机制，它缓冲了这种冲击，并让我们能够在极具进攻性的项目周期内持续交付。


  我们会在本章后续部分更深入地探讨微服务架构。


  ### 数据库


  数据库是任何平台的核心要素，因为它用于持久化交易数据；对我们而言更是如此，因为它支撑了无状态微服务架构。我们最初的方案是将数据库运行在容器平台上。这在提交给内部解决方案对齐论坛的初始设计中占据了重要位置。不幸的是，我们的
  DevOps 德鲁伊技能还不足以攻克 Kubernetes 集群中的持久化存储卷问题，于是我们改用了新的设计策略：我们的 Kubernetes 集群不承载任何持久化存储。希望这个立场能激励某位读者写一本《Kubernetes
  持久化存储傻瓜指南》，我保证买一本。


  然而，这个决定是在激烈讨论与反复权衡之后才做出的。帮助拍板的决定性因素是：数据库管理永远不会是我们团队的核心职能。我们当然可以轻松构建一个数据库容器，但若要做到高可用与容错，就会让容器集群配置复杂得多。如今我们的平台使用企业提供的数据库服务，而从我观察到的数据库管理各个方面来看，我毫不怀疑我们当初做了正确决定。澄清一点：数据归我们团队负责，数据库归企业服务团队负责。




  ## 集成策略


  如下图所示，我们的微服务集成策略随着时间不断演进。我觉得很有意思：在某个阶段刚开始时，一种想法或方法看起来总是好得不可思议，以至于你迫不及待想把它推广到整个技术栈的每个组件。可当这种方法走向尾声时，反向思维又会占上风，团队开始堆积技术债务事项，准备迁移到下一种方法。回顾这些年来我们的集成方法时，我会把它看作是从猿到人的进化。平心而论，这种“高屋建瓴”的视角来自事后复盘的优势。这也多少给人一些安慰：我们当前的集成策略很可能也会在我们发现更优解后继续演化。


  图 5-3 展示了我们第一代微服务所采用的集成方式，这套方式支撑了我们的 MVP。团队当时对微服务采取了“纯粹主义”视角，将封装与隔离原则奉为圭臬，以至于每个组件都分配给不同的开发者。结果就是，每位开发者都在自己负责的微服务中构建并嵌入了各自的集成逻辑。从事后复盘的角度看，这绝对是一个“扶额”时刻。在紧张推进
  MVP 的过程中，面对地理上分散的开发团队，以及每位开发者为了达成冲刺目标而努力避免垫底的现实，这种情况非常容易发生。直到很久以后我们才发现：某位开发者为获取账户列表而集成的平台，其实和另一位开发者为获取映射参考数据而调用的是同一个平台。


  ![../images/509947_1_En_5_Chapter/509947_1_En_5_Fig3_HTML.jpg](img/509947_1_En_5_Fig3_HTML.jpg)


  图 5-3


  嵌入式集成逻辑


  唯一的好处是团队达成了 MVP 目标。遗憾的是，优势也仅止于此。代码重复、集成方式不统一、部署体积更大更重——这些问题足以让任何优秀的集成团队羞愧低头。


  图 5-4 展示了我们进化旅程的下一站。那时我们的代码库还没有今天这么庞大，一次灵感迸发中，我把所有集成逻辑整合进了一个共享库。我当时对自己的成果相当满意，因为这个共享库可以让微服务与后端集成逻辑进行进程内通信。这个方案不仅性能会非常高，还能消除可怕的代码重复。我对共享库这个概念如此着迷，甚至把它称作一个“框架”。这个珍贵资产托管在一个
  git 子模块中，每个微服务都会引用它。


  ![../images/509947_1_En_5_Chapter/509947_1_En_5_Fig4_HTML.jpg](img/509947_1_En_5_Fig4_HTML.jpg)


  图 5-4


  共享集成库


  然而，随着团队中微服务开发者数量增长，这个框架变得越来越碎片化。子模块机制也导致每个微服务都在引用框架的某个特定变体。如果开发者需要新的集成功能或操作，他们只需拉取子模块、加入新逻辑，再把这个版本嵌入微服务。读到这里的
  git 管理员和资深爱好者可能已经在翻白眼，疑惑这种事怎么会发生。还是那句话：在地理分散、技能水平不一、又有敏捷交付目标的团队里，即便是优秀开发者，为了交付也可能做出不理想的技术决策。


  直到今天，当我打开这个时代尚未迁移的代码时，仍会不寒而栗。我们后来已经制定了修复方案：切断了 git 子模块这根“脐带”，每个微服务都保留共享库的本地副本。你可能会因此发笑：我们原本想把王国从代码重复的邪恶中解放出来，结果并不成功，而且由于每个微服务都内置了一份“框架”本地副本，这种失败被进一步放大。一些开发团队可能会认为，重复但彼此隔离的集成代码组件并非坏事，尤其在敏捷环境中——因为它支持模块隔离，并允许组件独立部署，而不必承担“更新共享元素可能必然破坏其依赖组件”的负担。这也可能减少回归测试需求，因为只需测试宿主微服务即可，其他微服务不会受到这次变更影响，能够继续运行。


  作为开发者，我始终坚信（也许这种观念有些过时）：如果某个代码元素被写了不止一次，那它就应该被重构成一个可服务多个消费者的单一元素，即便接口可以不同。按我的标准，把一个框架复制并嵌入到每个微服务中，简直等同于灾难级、世界末日式事件。就像一个资源即将枯竭、难以维持居民生存的星球上的外星种族会发射探测器寻找新家园一样，当框架碎片化开始威胁我们的交付速度，并可能让平台倒退回“每个微服务各写一套定制集成逻辑”的黑暗时代时，我们的研发团队也开始探索新的集成方式。


  图 5-5 说明了目前支撑我们平台集成策略、并确保我们“进化生存”的解决方案。其核心前提是：将集成组件抽取出来并外部化，只能通过定义良好的接口访问。


  ![../images/509947_1_En_5_Chapter/509947_1_En_5_Fig5_HTML.jpg](img/509947_1_En_5_Fig5_HTML.jpg)


  图 5-5


  专用集成适配器


  这促成了我们平台中新一类微服务的诞生，我们将其标记为“中间件组件”。本平台中微服务的不同分类体系将在本章后续部分讨论。


  其固有优势在于可减少代码重复，并使微服务部署更轻量、更精简。也就是说，不再把某个版本的框架打包进微服务内部，而是将框架能力外部化，并通过接口访问。遗憾的是，这也打开了进程外执行可能带来的性能劣势之门。为尽量降低这一影响，我们采用了
  Google RPC（gRPC），下一节会更详细介绍。




  ### Google 远程过程调用（gRPC）


  坦白说，当有人提出使用 gRPC 时，我的第一反应是尽快否决它。我把 RPC 和微软组件对象模型（COM）/分布式组件对象模型（DCOM）的黑暗年代，以及复杂的通用对象请求代理架构（CORBA）配置联系在了一起。尽管我很喜欢分布式组件这个概念，但我过去在让它真正跑起来这件事上的经历是痛苦的。我不想让我们的平台承受这种复杂性，因为它会让运维开销呈指数级增长。所以，我选择继续走那条最安全、也是最多人走过的路。归根结底，微服务通信将通过经典的
  HTTP 来实现。毕竟，我们已经要处理诸如本地部署 Kubernetes 集群这类多变因素，一想到还要在技术栈里再加入一个新的、而且在当时相对未经充分验证的技术要素，我就不寒而栗。


  直到 6 个月后，当我跑完一个基础教程时，我才突然意识到 gRPC 有潜力彻底革新我们的平台架构。开始教程几分钟后，我难以置信地盯着屏幕：来自一个终端窗口的客户端请求，竟然神奇地——更重要的是，轻松地——出现在另一个窗口中。这项技术有很多优点，我稍后会一一称赞。其中我最欣赏的是它的简洁性。gRPC
  的核心是一个简单的服务定义，它使用协议缓冲（protocol buffers）来定义请求和响应对象。gRPC 负责处理组件之间、不同语言之间以及不同环境之间通信的复杂性。`*.proto*`定义是客户端与服务端之间唯一共享的组件。这也给了我们一个机会——虽然截至目前我们还没有使用——即在同一技术栈中采用不同的编程语言。而且，由于大多数语言都提供了客户端库，这件事变得更加容易。gRPC
  是使我们能够从共享集成库（图 5-4）过渡到专用集成适配器（图 5-5）的关键技术。由于使用了更新版本的 HTTP 标准及其传输协议，gRPC 的性能远高于 REST。


  远程过程调用（RPC）有四种类型：


  1.  **一元 RPC**：客户端发送一个请求并获得一个响应。例如，客户端向服务器请求当前时间。我们平台中的大多数组件都使用这种通信方式。我的建议是先从这里开始，如果有需要，再按需探索其他机制。


  2.  **服务端流式 RPC**：它与一元 RPC 类似，不同之处在于服务器会针对客户端请求返回一个消息流。例如，从服务器下载一个二进制文档时，客户端发起文件请求，服务器将文件拆分为多个块，再以流的形式发送给客户端，客户端重组后进行处理。我们使用这种机制从企业内容管理系统中获取文档。


  3.  **客户端流式** **RPC**：它也与一元 RPC 类似，不同之处在于客户端向服务器发送的是一个消息流，而不是单条消息。例如，向服务器上传图像时，文件会被拆分成多个块，然后以流的形式发送到服务器，由服务器重组图像后进行处理。我们使用这种方式上传图像以进行光学字符识别（OCR）处理。


  4.  **双向流式** **RPC**：客户端和服务器可以按任意顺序读取和写入消息。例如，图像可以由不同的光学字符识别（OCR）引擎处理，每个引擎的响应会通过独立的数据流返回。


  gRPC 是技术简化从而推动大规模采用的一个典型例子。我也将这段经历视为一个鲜明提醒：要对新概念和新方法保持开放心态，并对抗先入为主的观念，从而持续演进我们的平台架构。此后，我已经向那些最初建议使用
  gRPC、却被我惹恼的工程师道了歉，并且理所当然地将这项技术的发现与引入归功于他们。话虽如此，我仍保留“武器化”这项技术、并将其从研发构想推进到生产运行环境这一功劳的主张。


  ### Port-Forward 的威力


  由于我们的业务逻辑组件可能需要利用多个集成微服务来完成某个特定功能，组装整体解决方案变得越来越有挑战。DevOps 持续集成（CI）流水线可用于将代码部署到服务器。CI
  流程在环境间迁移方面非常出色，但对于初始开发任务而言，我认为使用 CI 流水线就像在和远方星球上的人对话。你说一句话，然后要等一段时间，直到消息被接收并回复后，才能继续。作为一个没耐心的开发者，我要求能够立即修改并立刻观察结果。这只有通过本地开发环境才能实现。


  我最初建立这套环境的方式是：在本地分别启动每个微服务，每个服务放在独立终端、监听不同端口。每次开发会话都要花不少时间来完成这项准备，但前期的时间投入能节省数小时，因为我不必等待
  CI 流水线。我当时对这个搭建颇为得意，每打开一个终端标签页、启动一个微服务，我都会暗自为自己点赞。


  一位开发同事给出的专业建议，让我猛然意识到残酷现实：我这是在更辛苦地工作，而不是更聪明地工作。解决方案是使用 Kubernetes 命令行工具 *kubectl*
  的 *port-forward* 能力，启动一个本地监听器，把请求路由到运行在 Kubernetes 集群中的 gRPC Pod。这个概念如图 5-6 所示。


  ![../images/509947_1_En_5_Chapter/509947_1_En_5_Fig6_HTML.jpg](img/509947_1_En_5_Fig6_HTML.jpg)


  图 5-6


  Port-forward 连接性


  这使开发者能够基于以下策略，混合使用本地与远程组件来构建解决方案：


  *   远程 gRPC 微服务 Pod（A、B）监听端口 *50051*。之所以可行，是因为它们分别运行在独立的容器实例中。


  *   本地 gRPC 微服务（X）监听端口 *50051*。由于它运行在我的本地机器上，其他本地进程不能再使用该端口。


  *   本地 *port-forward* 进程监听端口 *50052* 和 *50053*，并将流量分别路由到 gRPC A 和 B。


  *   应用被配置为：服务 A 使用端口 *50052*，服务 B 使用端口 *50053*，服务 X 使用 *50051*。




  ### 分类体系


  并非所有微服务都生而平等，而且随着时间推移，我们逐渐形成了不同的组件类别。此前在担任技术架构师时，我一向以构建定义清晰、分层明确的架构为傲。每个组件都归属于特定层级，并且如同军队指挥链那样执行严格协议——组件只允许接收来自其上一层的请求，也只能将请求转发到下一层。尽管这些架构图看起来很漂亮，但从开发与运行角度看并不理想。接入新的后端、增加或更新业务逻辑时，往往需要改动多个层级，导致交付变慢并增加运维开销。在架构中引入新元素时，也常常在方案设计阶段引发明显焦虑和大量架构层面的争论。


  基于在分层隔离组件过程中积累的“战伤”，我们有意识地采用了一种相当“松耦合”的架构模式。就像我们的团队组织结构图一样，我们采用扁平结构，并没有“只有某些类型组件才能与另一类组件交互”的硬性规定。组件之间的关系（如图
  5-7 所示）是有机演进而来的。核心关注点是功能性，而其中一条核心原则是可复用性。


  ![../images/509947_1_En_5_Chapter/509947_1_En_5_Fig7_HTML.jpg](img/509947_1_En_5_Fig7_HTML.jpg)


  图 5-7


  微服务分类体系


  我们的平台包含以下几类微服务：


  *   **中间件**：这类组件的关键目标是封装与后端平台的集成。该微服务会抽象 REST、SOAP、本地部署（on-premises）或基于云的服务，并向调用方提供统一的、基于
  GRPC 的接口。这样我们就可以在不影响微服务消费者的前提下实施变更（例如升级到更高版本）——前提是我们保持服务契约（gRPC proto 定义）不变。对后端或支撑系统的所有访问都必须通过中间件组件完成。数据库访问就是一个例子。与我们第一代允许任意组件访问数据库的微服务架构不同，只有特定中间件组件可以与数据存储集成。这使我们可以“自豪地”宣称：无论是切换数据库供应商，还是从文档型数据库迁移到关系型数据库，都能较为轻松地实现。跨不同环境的后端系统凭据与配置，都被封装并隔离在特定中间件组件内。我们也尽最大努力维持中立的服务契约，不允许后端数据结构“渗漏”给消费者。该组件的一项关键职责是解析、处理并转换系统特定响应，最终输出中立的
  gRPC 响应。


  *   **连接性（Connectivity）**：这种微服务用作协议通信桥梁。该组件专注于接收 A 格式请求并将其转换为 B 格式。例如，我们使用连接性组件消费
  Kafka 主题中的消息，并将其整理为可写入数据存储的形式。这类组件通常是事件驱动的，并针对高吞吐、低延迟处理进行了优化。


  *   **服务组装（Service assembly）**：这是一个“高阶”微服务，也是我们集成平台有机演进的例证。在为新需求制定方案时，团队发现某些逻辑片段在多个业务逻辑微服务中重复出现。这带来了一个独特挑战：这些逻辑并非后端集成逻辑，但又与我们“消除代码重复”的理念冲突。为了解决该问题，我们沿用了处理后端集成时的方法：提取重复逻辑，将其隔离并外部化为新组件，通过
  gRPC 访问。这类组件可归类为集中式服务编排（Service Orchestration）。关键规则是：针对同一个请求，只能使用一个“服务组装”组件。这样可以尽量降低微服务之间通信带来的性能影响。


  *   **业务逻辑**：该微服务负责编排下游组件以实现特定业务功能。如果前置工作充分完成，并且下游中间件与服务组装元素以正确接口构建到位，你会惊讶于这些组件组合的速度之快。话虽如此，也不要对支撑组件的接口过度设计。一位好友曾打趣说，某些组织的通用数据模型复杂到即使外星人在
  3000 年登陆，也能毫无障碍地对接。我的看法是：这往往是为了“可复用”而给接口增加了不必要的复杂度。极有可能新调用方会觉得接口过于复杂，最终干脆绕过它。更好的做法是先从最小化接口开始，在必要时再扩展。若采用这种方式，为实现新业务功能，通常就需要对支撑组件接口进行微调/更新。审计通常也在这一组件实现，因为这里会记录“业务交易”相关信息。这也是你应接入业务活动监控（Business
  Activity Monitoring）的层。例如，业务逻辑组件可以在创建客户账户时触发“业务级”事件，而中间件组件则可以针对支撑系统中的开通请求发送“系统级”事件。


  尽管我很想说这种结构从一开始就是我们的目标，但它实际上是有机演进的。坦率地讲，在不断编写与重写各类元素的过程中，确实损失了许多开发人天。如今基础结构已经建立，新引入到我们生态中的元素可以被快速分类并加以利用。我们的架构愿景相当灵活，并由若干关键原则支撑，最终实现了相对统一的部署方式。




  ## 平台即服务


  图 5-8 所示的平台即服务（PaaS）理念贯穿了我们的平台部署过程，我想花一点时间来详细说明。


  ![../images/509947_1_En_5_Chapter/509947_1_En_5_Fig8_HTML.jpg](img/509947_1_En_5_Fig8_HTML.jpg)


  图 5-8


  部署策略的演进


  正如本章前文所述，我们在实施初期所采用的技术比组织内其他团队领先了两到三年。我们在数字化实践中的定位以及建立新平台的目标，使我们获得了这一机会。随着企业缓慢但稳步地赶上，他们对这些新应用要素的理解、吸收与管理能力也在提升。我也毫不避讳地说，在运营环境中，他们对这些能力的支持水平已经超过了我们。原因在于*专注*。


  作为 API 市场团队，我们的首要目标是交付 API 产品。比如，虽然在某个阶段上线数据库可能是重点工作，但我们未必会给予数据库真正长期且持续的关注。我们的企业级专门团队则具备这种专注力，并且在全组织范围内对类似工作有更广阔的视角，因此在与软件供应商谈判整合性许可证协议等方面，也更具优势。同样的方法几乎适用于我们软件栈中的所有支撑要素。数字化实践与技术团队之间的共识是：后者在企业级层面更适合支持这些软件要素。


  再次坦诚地说，放手其中一些要素并不容易。就像父母会整夜照顾新生儿，并在孩子迈出第一步时倍感自豪一样，我们过去如此、现在依然对我们环境中的这些要素怀有同样的感情。我们曾熬夜翻查晦涩的配置文件，试图弄明白为什么请求没有被正确路由；随后又自豪地监控平台承接第一批生产流量。最终帮助我们放手这些要素的，是这样一种认知：它们将去往一个更好的“家”，在那里它们会得到必要的关注和支持——一个拥有经验丰富的领域工程师、并且对未来有周密规划的团队。


  ## 平台服务


  开发者就像雪花。作为开发者，我怀着最大的敬意这样说。每位开发者都独一无二；如果让三位开发者实现同一个日志方案，我们很可能会得到四种不同方案——总会有那个“超额完成者”想通过提交多个选项来展示实力。从创造力角度看，这非常棒；但从支持角度看，这却是一场噩梦，因为在运营环境中，统一性和结构化是根本。平台服务通过提供共享库或软件包，成为连接开发与运维世界的关键机制，以实现以下目标：


  *   **日志（Logging）**：在 API 环境中，日志就像金块一样珍贵。使用容器的一大挑战在于日志会写入容器本地文件系统。如果实例重启（这非常常见），或者容器存在多个实例，查找日志会变得相当困难。我们构建的日志平台服务的一项关键功能是：将日志条目路由到
  Elastic Logstash 平台，并在其中建立索引以便搜索和分析。


  *   **审计（Auditing）**：对大多数开发者而言，这件事可能和文档一样“不受欢迎”。但高质量审计对于客户支持和报表至关重要。诸如支付交易等关键业务级事件，必须进行审计以满足组织的取证要求。审计工具函数或库为所有开发者提供了便捷且更重要的是一致的审计机制。


  *   **错误处理（Error handling）**：从运维角度看，拥有一个集中式错误处理位置非常有价值。它能够支持一致地处理事件、对特定条件进行升级或降级处理，并触发对支持人员的告警。更高级的能力还可包括复杂事件处理：基于指定时间范围内的一系列事件，触发更高层级的错误条件。另一个好处是，它可以以
  HTTP 状态码、错误码和消息的形式，向使用方返回一致的响应信息。考虑到如果每位开发者都要自行实现错误响应可能导致的碎片化，这应当是最先落地的平台服务之一。


  *   **属性管理（Property management）**：属性管理以及运行时配置更新能力，是技术栈中最重要却又最容易被低估的平台服务之一。举例来说，考虑一个面向后端平台的
  API 端点。随着调用应用从开发、测试、预生产到生产等不同环境推进，后端端点很可能各不相同，因此每个环境都需要更新。如果端点配置是静态写死的，那将是很糟糕的做法。更优雅的方案是在运行时指定配置。需要注意的是，优雅程度也有高低——配置数据可以写在
  Kubernetes 的 config map 中。但如果你的部署包含多个微服务且各自拥有自己的 config map，配置数据就可能分散在多个 config
  map 里。端点只是其中一个例子。凭据、超时时间、税率百分比等也应支持运行时配置。通过向开发者提供平台服务，也间接为运维团队提供了统一的属性管理机制。


  *   **追踪（Tracing）**：如果你做过集成平台支持工作，就会知道“圣杯”能力是：能够从入口开始，穿过整个技术栈，经过后端平台，直到出口，全程追踪一次交易。请相信我，在微服务架构中，一次交易为完成处理可能需要多次跳转。能够回溯交易路径是
  API 平台的关键能力。市面上有现成的应用性能管理（APM）产品，可通过探针和运行时注入追踪信息来帮助追踪请求。这些工具在应用性能调优和系统故障定位方面很出色，但并不是交易追踪的银弹。良好的追踪与日志策略，本质上是一条“黄金线”，能帮助运维团队沿着交易路径穿越整个平台。


  ## 部署架构


  我们尝试了上述要素的多种组合，以确定最优配置。这或许是我们部署架构中最有价值的部分之一，因为“乐高积木”式的方法让我们能够灵活地以多种形态组装技术栈。自项目启动以来，我们一直受制于本地基础设施和系统。在下文中，我将详细介绍一条路线图，以及迁移到云基础设施和托管服务这一关键目标。每一次迭代都在为下一次提供支撑，而我们在每次部署中都进行了测试，并把组织边界又向前推进了一点。需要指出的是，企业信息与网络安全团队所表现出的高度包容与耐心，是我们成功的关键因素。




  ### 启动配置


  图 5-9 展示了支撑我们 MVP 的启动部署配置。就像被放进糖果店的孩子一样，我们不顾一切，尽可能使用了更多技术要素，并让请求经过尽可能多的跳转才到达目的地。如果企业策略不允许某个特定系统的防火墙访问，我们就采用回跳方案，直到找到替代路径。虽然凭借一支坚韧的团队这当然可行，但最终结果并没有达到本可以实现的最优状态。


  ![../images/509947_1_En_5_Chapter/509947_1_En_5_Fig9_HTML.jpg](img/509947_1_En_5_Fig9_HTML.jpg)


  图 5-9


  启动配置


  如果说构建一个本地部署的 Kubernetes 集群还不够有挑战性，那么我们还选择了构建两个——一个在内部网络，另一个在非军事区（DMZ）。我们组织的 DMZ
  就像遥远星球上的流放监狱。只能通过“跳板机”访问，本质上就是远程桌面连接。运气好的话你能抢到两个会话中的一个，否则你只能等着在某位既有用户去洗手间休息时“接管”一个会话。我至今仍记得一位新来的
  DevOps 工程师发现自己无法获得 GUI 权限来运行安装脚本时那种绝望的表情。在我们的 DMZ 里，像真正的监狱一样，也有不同的安全等级。我们刚开始时，容器和
  Kubernetes 被视为极其危险，因此专门为我们新建了一个比其他区域限制更严格的分区。我们是在尝试连接 DMZ *内部*各组件时才得知此事的。为排查连通性问题而组织的专题会议，过程就像潜艇上的指令传递——请求从测试人员传到协调人，再到网络工程师，再到
  DevOps 工程师，然后再一路返回。尽管这段经历有时很痛苦，但它也是一次巨大的学习机会，让我们理解了组织的网络拓扑，更重要的是学会如何在其中穿行。要让方案可用，必须明确会进行负载均衡的各节点配置以及防火墙开放端口；这些工作即便可以外包给基础设施设计人员，完成也往往要几天甚至几周。


  我们选择的方法是卷起袖子先由内部完成第一版，再与设计师评审，由其纠正并指导我们正确做法。从职业发展的角度看，通过这次协作，我们与基础设施项目经理、设计师和支持团队建立了良好关系。通过与这些团队紧密合作，我们更好地理解了内部流程、这些流程存在的原因，以及企业支持团队所承受的巨大压力。我们对内部团队“看似漫长”的解决周期所产生的不满，很快转变为对其付出的同理与尊重，最终也为我们自己先前任性的行为感到尴尬。与其抨击那些我们认为拖慢进度的流程与治理机制，我们选择去理解并与之协作。值得肯定的是，组织本身也在努力精简运营，以更敏捷地响应并将解决方案推向市场。这段经历虽然令人谦逊，却是最有回报的经历之一，因为它要求我们通过建立与支持团队的关系来实现部署目标。


  一个加速我们交付、并持续至今仍在发挥作用的因素，是获准让 DMZ 中的 API Gateway 实例可以直接（虽经由负载均衡器）访问我们的微服务。企业标准原本要求所有内部
  API 必须通过内部 Gateway 访问。这将导致接口定义需要发布两次（内部一次、外部一次），并且由于请求还要多经过一站，也会影响性能。多节点托管容器平台在
  DMZ 中仅托管了一个授权门户容器应用。这样复杂部署的理由是：平台上线时有助于承受高流量。每当回想起我们最初的判断，以及那些基于情绪而非现实做出的设计决策，我仍会忍俊不禁。


  ### 现状配置


  图 5-10 反映了一个更加成熟、更加负责的团队所采用的部署配置。过去那种只求达成 MVP 的狂热日子已经过去，我们对平台技术要素以及企业支撑系统的现实状况有了更清醒的认识。我们也非常幸运，有两位资深
  DevOps 工程师加入团队，他们真正“知道我们所不知道的事”。凭借他们的经验，一个更稳定、更符合企业要求的 Kubernetes 集群很快建立起来——这是第三次迭代。


  ![../images/509947_1_En_5_Chapter/509947_1_En_5_Fig10_HTML.jpg](img/509947_1_En_5_Fig10_HTML.jpg)


  图 5-10


  现状配置


  最早提出的问题之一，是在 DMZ 中是否真的需要一个完整的 Kubernetes 集群。他们耐心地解释，就像家长对饭前想吃冰淇淋的孩子那样：使用更简单的 Docker
  容器平台部署，也可以实现同样目标。他们对我们 DevOps 平台演进的贡献，堪比一个高度发达的外星文明在帮助刚学会用火的穴居人。这同样是一堂重要的课。如果你要拥抱新技术，不论是短期
  MVP 还是长期转型项目，都务必配备匹配技能水平的人才，或者考虑只采用技术子集，甚至干脆不采用。观察大师施展技艺本身就是一种震撼的体验；很快，我们的平台拥有了可工作的流水线，团队也开始通过即时消息向托尔金中土世界里的角色“下达指令”来发布代码组件。


  这次部署最重大的进展之一，是网络安全团队批准由 DMZ 中的反向代理对外暴露内部托管的 Web 应用。这个里程碑式决定使得原本托管在 DMZ 容器平台中的单一
  Web 应用能够迁移到内部 Kubernetes 集群。这优化了交付流程，因为内部流水线和网络连通性都可复用，支持也更简化——容器及其相关日志都能被轻松访问。我们选择不下线
  DMZ 容器平台，目前将其用于托管不属于平台核心的外部应用。比如利用 API Marketplace 能力、但服务于第三方目标（例如同步账户交易）的应用，就部署在该平台上。




  ### 目标态配置


  尽管最终搭建出企业级本地部署 Kubernetes 平台这一过程充满挑战且收获颇丰，但团队已经得出结论：这项工作很像把狮子当宠物养。这个平台需要持续关注和专门支持；如果控制不当，它会“吞噬”缺乏经验的维护者。图
  5-11 展示了我们部署架构下一阶段的规划。我们设想利用云基础设施与平台服务来运行技术栈中的各类组件。鉴于 API Gateway 等组件属于共享实例，这必然会是一次分阶段迁移。代码仓库和
  DevOps 流水线等支撑性要素也必须迁移到云上。


  ![../images/509947_1_En_5_Chapter/509947_1_En_5_Fig11_HTML.jpg](img/509947_1_En_5_Fig11_HTML.jpg)


  图 5-11


  现状配置


  对于初创公司或规模较小的组织而言，使用云基础设施或平台服务通常是相对简单的任务。而这次迭代揭示出：对于成熟企业来说，这恰恰处在难度光谱的另一端。需要考虑的因素很多，例如从本地组件连接到云端，再从云端回到本地。我们的最终目标是采用云厂商托管的
  Kubernetes 服务，以屏蔽底层基础设施需求，让我们能够专注于以容器形式运行的微服务本身。


  简而言之，我们将容器打包后托管到托管式容器平台上。托管服务将负责所需的安全补丁、升级以及基础设施弹性扩缩容。扩缩容是关键因素，因为这意味着我们不再需要像现在这样维护物理硬件或虚拟机。尽管我们非常期待迁移到云端，但也在尽力控制预期。若以这段漫长且时有颠簸的上云之旅为鉴，在新环境中驻留与运营可能会带来一整套全新的挑战。我希望这种学习与成长能像我们此前的迭代一样富有回报。


  ## 总结


  为 API Marketplace 建立平台架构为我们的团队提供了巨大的学习机会。我们意识到，阅读一篇介绍 Netflix 如何部署和运营应用的博客文章，只是触及表面；当团队需要在显著不同的组织环境中亲自落地时，才会真正体会其中复杂性。这让我们获得了对
  Docker（容器化）、gRPC（服务间微服务通信）以及 Kubernetes（容器管理）等技术要素的实战经验。


  我们把 ingress、service、pod 这类深层技术组件视作自己亲手抚养和培育的“孩子”。就像初为人父母一样，这段旅程也充满挑战。我们经历过剧烈的“肠绞痛”时刻，彼此疲惫相望，怀疑自己是否能撑过去。


  同样，我们也有许多自豪时刻：当我们扩展 pod 副本数量并顺利通过性能测试时，平台迈出了“第一步”。我们的平台就像婴儿一样不断成熟，如今正进入新的生命周期阶段。时间带来的好处是，我们对其运行方式、优势与短板有了更深入的理解。仍有大量内容需要改进与优化，这也是我将
  API Marketplace 视为一个有生命、会呼吸的有机体的原因。非洲谚语“养育一个孩子需要整个村庄的力量”恰如其分地概括了我们的经历——如果没有企业内各方的帮助与支持，我们不可能实现这一目标。


  在接下来的章节中，我们将讨论平台架构如何支撑 Marketplace 的 API 产品，涵盖从设计、开发到运营的全过程。


  '
- "# 6. 安全\n\n建设 API Marketplace 就像在一片陌生且充满敌意的区域为你的组织设立大使馆。尽管你的初衷是良善的，目标也是帮助第三方提供方利用你的产品和服务，但这也使企业每天都暴露在一系列新的攻击向量之下。当宝贵的客户数据及其他敏感信息面临风险时，代价极其高昂。“每个人都对平台安全性与完整性负责”这句准则绝不能掉以轻心。任何\
  \ API 产品上的安全漏洞都可能引发负面舆论，进而影响其他产品、Marketplace 乃至整个组织。\n\n安全不仅仅是 API 的访问机制。更重要的是将其视为贯穿平台每一层的要素——涵盖技术、人员与流程三个维度。幸运的是，我们有成熟的模式与安全标准可作为实施指引。同时，这也是一项精细的平衡工作：既要满足组织自身需求，又不能影响开发者采用。\n\
  \n在接下来的各节中，我将介绍在 API Marketplace 落地过程中，可能适用于不同产品、受众以及生命周期阶段的安全主题。正如我们在前文章节“监管”中所述，针对特定行业，这些标准可能存在变体。我们将更详细地研究开放银行（Open\
  \ Banking）的变体。\n\n安全环境持续变化、动态演进，这使 API Marketplace 更具挑战也更有趣，因为它要求我们持续学习并不断适应，才能保持安全。我们非常幸运，因为在这一领域已有大量文献、产品方案与观点可供参考。知识对于理解全局并保持安全至关重要。\n\
  \n\n\n## 跨领域关注点\n\n让我们来看看，在 API Marketplace 的实施中，安全性会如何影响各个领域。\n\n*   **API**：产品的性质决定了\
  \ API 的访问机制。如果需要终端用户同意，则会在企业对消费者（B2C）场景中实现；如果目标是实现系统集成，则会在企业对企业（B2B）场景中实现。\n\n*\
  \   **网络**：当调用穿过你平台技术栈中的各个元素时，如何对其进行监控、跟踪和审查？当它到达后端时，会保持客户身份，还是采用系统身份？你的平台是否应该与企业其他部分进行防火墙隔离——这会增加大量管理开销，但也能带来细粒度访问控制的优势？\n\
  \n*   **应用**：即使有最好的安全实现，应用代码中的漏洞仍可能被利用。现实中不乏触目惊心的案例：未经授权访问客户数据，系统通过技术团队从未想到的方式被攻破。\n\
  \n*   **容器**：这种部署策略因其模块化方法而极为流行。需要确认基础镜像是否可能已被入侵。凭据的配置与管理策略必须在企业层面明确定义，以防止临时且松散的实现。应用运行的上下文看似微不足道——然而，root\
  \ 用户权限或文件系统写权限可能在不经意间成为安全后门。适用于传统部署的同等严谨性，也必须应用到容器中。\n\n*   **基础设施**：你的解决方案是在本地硬件上运行，还是部署到基础设施即服务（IaaS）或平台即服务（PaaS）公有云方案上？如果是后者，则必须定义新的安全策略和治理机制，以维护解决方案与平台的完整性。\n\
  \n*   **流程**：设想一个看似简单的目标：向第三方提供访问 API 的凭据。是通过电子邮件共享，还是通过受密码保护的文档？这可能会引出一个颇具喜剧色彩的“先有鸡还是先有蛋”问题——我们还得考虑如何共享那个包含凭据文档的密码。如果凭据是通过人工介入生成的，它其实已经被削弱了。任何像样的安全策略还要求定期更换凭据——这该如何实现——尤其是在需要面对大量第三方提供商时。\n\
  \n*   **运维**：你的支持人员是否拥有访问后端系统的凭据？如果第一反应是响亮的*不*，这会不会妨碍支持问题的解决？开发人员也可能在无意中通过看似无害的日志语句泄露敏感客户数据（例如账号），并一路扩散到运维支持工具中。\n\
  \n本节的目的并不是要吓得你在能够完全保证安全性的每一个方面之前，就搁置 API Marketplace 的实施计划。目标是强调安全性必须被考虑的多个维度。同样，这将根据你企业的技术环境和需求进行定制，而每个平台在实现上无疑都会具有独特性。\n\
  \n一种对我们极其有效的方法是：积极寻求来自其他领域团队的定期且严格的评审——信息与网络安全、架构以及企业共享服务。坦率地说，反馈并不总是正面的，我们也不得不重构解决方案来缓解问题。但我可以肯定地说，最终结果的完整性绝对值得这份投入。\n\
  \n在接下来的章节中，我们将深入探讨冰山一角——API 安全。这只是我们审视 Marketplace 实施时众多视角之一。认识到安全几乎影响你平台的每一个方面，将帮助技术团队以正确方式建立基础要素与核心实践，从而避免后期返工。\n\
  \n## API 安全\n\n你的 API 产品采用何种访问机制，本质上与消费者类型和解决方案性质紧密相关。可以把它类比为你家里的门禁。根据你居住的环境，封闭社区入口处可能有保安只允许住户进入；你家前门可能有坚固的门锁，只有你和家人有钥匙；而室内门锁可能几乎从不使用。在接下来的章节中，我们将结合适用场景及对应受众，评估可采用的安全方法。\n\
  \n### 开放 API\n\n这类接口通常提供参考性或公开可访问的数据。示例包括服务站点位置、国家代码，或指定地点的天气信息。尽管 API 可能根本不需要安全机制，但至少最好使用**客户端\
  \ ID**和**密钥**，如图 6-1 所示。这样做的好处是可以了解谁在消费你的 API——因为需要先注册才能获取凭据。*客户端标识符*还可用于提供不同服务级别，并且更重要的是，在不影响其他消费者的情况下限制异常消费者的访问。\n\
  \n![../images/509947_1_En_6_Chapter/509947_1_En_6_Fig1_HTML.jpg](img/509947_1_En_6_Fig1_HTML.jpg)\n\
  \n图 6-1\n\n开放 API 安全模式\n\n这类产品的受众可能非常广泛：从学习如何调用 API 的开发者，到寻求可靠参考数据源的成熟服务提供商。\n\n\
  ### 企业对企业（B2B）\n\n这类 API 的目标是实现系统到系统的集成。示例包括查询库存可用性、下单购买产品，或与关联方及合作伙伴共享企业数据。传统上，要实现这类集成，需要定制化、专门构建的接口，以及消费者与提供方之间专用的网络基础设施（如专线）。因此，前期开通会带来显著的成本和时间影响。虽然可以通过在双方之间配置使用公共网络基础设施的虚拟专用网络（VPN）来实现，但也可以通过使用安全**证书**来简化集成模式，如图\
  \ 6-2 所示。\n\n![../images/509947_1_En_6_Chapter/509947_1_En_6_Fig2_HTML.jpg](img/509947_1_En_6_Fig2_HTML.jpg)\n\
  \n图 6-2\n\nB2B 安全模式\n\n证书及其关联口令短语提供了额外一层安全保障，因为它与特定消费者直接绑定，并且是建立传输层安全（TLS）连接握手过程中的关键要素。证书可以由\
  \ API 托管方组织签发，也可以由消费者提供并在托管方注册。鉴于这类 API 的敏感性，这类解决方案的受众通常是知名合作伙伴或成熟的第三方服务提供商。\n\n\
  \n\n### 企业对消费者（B2C）\n\n在这种场景中，消费者会请求权限，以代表终端用户进行交易或访问其数据。终端用户会直接指示提供方允许或拒绝该请求。该交互如图\
  \ 6-3 所示。一个常见示例是使用你的社交媒体（Google 或 Facebook）凭据访问合作伙伴网站以建立你的身份。幸运的是，业界已有一个被广泛接受的标准——OAuth\
  \ 2.0，它详细规定了终端用户、消费者和提供方之间的交互编排。\n\n![../images/509947_1_En_6_Chapter/509947_1_En_6_Fig3_HTML.jpg](img/509947_1_En_6_Fig3_HTML.jpg)\n\
  \n图 6-3\n\nB2C 安全模式\n\n终端用户同意这一关键要素，使得向更广泛的第三方提供方开放这些 API 成为可能。即使有严格的安全标准，一个不良第三方提供方一旦被纳入你的生态系统，仍有机会诱导获取更多客户数据（其中一种方法将在后文讨论）。因此，极其重要的是对第三方进行审查和尽职调查，以满足你的实施所设定的尽调标准。\n\
  \n在下一节中，我们将深入 OAuth 流程的细节，并讨论一些支持性的后台流程与变体，帮助你更好地理解其运作方式。\n\n## OAuth\n\n简单来说，OAuth\
  \ 是一个开放标准框架，为应用程序提供*安全的委托访问*能力。\n\n为了理解其工作方式，请考虑以下场景：\n\n![../images/509947_1_En_6_Chapter/509947_1_En_6_Fig4_HTML.jpg](img/509947_1_En_6_Fig4_HTML.jpg)\n\
  \n图 6-4\n\nLucidchart 登录\n\n*   我最喜欢的在线制图服务 Lucidchart 需要我创建一个账户——如图 6-4 所示。\n\n\
  *   要创建账户，我本可以按传统注册流程填写在线表单，提供我的姓名、电子邮件地址并设置密码。随后 Lucidchart 会发送一封带有链接的邮件，以确认我是该邮箱地址的合法所有者。\n\
  \n*   Lucidchart 还允许我使用 Google 账户登录，*前提是*我授予它权限，让它通过 Google 验证我的个人资料。\n\nOAuth 正是促成这一过程的标准，它使终端用户能够确认身份，并向第三方应用授予受限的数据访问权限。\n\
  \n### 参与方与作用域\n\n让我们按出场顺序识别该场景中的参与方或角色：\n\n1.  我是*资源所有者（Resource Owner）*，因为我是 Google\
  \ 账户的持有者。\n\n2.  Lucidchart 是*客户端（Client）*，因为它是需要访问我个人资料的应用程序。\n\n3.  Google 是*资源服务器（Resource\
  \ Server）*，因为它在其服务器上存储了我的个人资料。\n\n这里有几个我想强调的关键概念。尽管 Google 在其基础设施上持有我的个人资料数据，*我*才是这些数据的所有者。过去“客户数据归托管组织所有”的传统做法已经被逆转，控制权已回归其真正所有者——终端用户。\n\
  \n*作用域（scope）*表示我愿意与第三方共享的数据范围。在上述场景中，Lucid 仅需要从 Google 获取我的姓名、电子邮件地址、语言偏好和头像，如图\
  \ 6-5 所示。\n\n![../images/509947_1_En_6_Chapter/509947_1_En_6_Fig5_HTML.jpg](img/509947_1_En_6_Fig5_HTML.jpg)\n\
  \n图 6-5\n\n受限访问\n\n虽然我的头像不算最好看，但我愿意分享这些信息。若 Lucidchart 请求对我的 Google 账户进行完全访问——我就会非常犹豫，因为那将意味着我会开放对个人邮箱、日历和联系人的访问。正如你会注意到的，Lucidchart\
  \ 只请求了它明确需要的信息，没有更多。在 OAuth 语境下，这就是受限作用域或权限；作为*资源所有者（Resource Owner）*，我愿意批准这一点。\n\
  \n在继续之前，请务必巩固对*参与方（actors）*、其所扮演角色以及*作用域（scopes）*这些概念的理解。你可以考虑其他场景，例如银行业中的 OAuth（或与你所在行业相关的场景），以识别其中的参与方、角色和作用域。\n\
  \n\n\n### 应用注册\n\n在 OAuth 文献中一个经常被忽视的重要后台流程，是 *Client* 与 *Resource Server* 之间的交互。*Resource\
  \ Server* 可能并不是我数据的所有者，但作为负责任的服务提供方，并且作为其尽职调查流程的一部分，应只向经过验证的参与方释放数据。任何使用 OAuth 访问其\
  \ API 的应用，都必须具备可向 *Resource Server* 的 OAuth 服务器标识该应用的授权凭据。*Client* 将向 *Resource\
  \ Server* 注册一个应用，并提供有关请求来源以及用户应被重定向到何处的详细信息。\n\n对此步骤的快速回顾：\n\n1.  *Client* 必须向 *Resource\
  \ Server* 注册一个应用。此步骤的目的是建立 *client* 身份，并使 *resource server* 能够跟踪访问请求。\n\n2.  *Client*\
  \ 需要提供有关请求来源以及最终用户应被重定向到何处的详细信息。这一点很重要，因为它能限制潜在的中间人攻击。你会注意到，重定向 URI 会用于多种交互。\n\n\
  3.  在该流程结束时，*Resource Server* 将以 *Client ID* 和 *Client Secret.* 的形式向 *Client* 提供凭据。\n\
  \n在某些 API 网关产品中，一旦应用被创建，对 API 产品的访问是通过订阅流程实现的。\n\n![../images/509947_1_En_6_Chapter/509947_1_En_6_Fig6_HTML.jpg](img/509947_1_En_6_Fig6_HTML.jpg)\n\
  \n图 6-6\n\n客户端与资源服务器交互\n\n如图 6-6 所示\n\n*   一个或多个 C*lients*（第三方）可以向一个 *Resource Server*（提供方）注册一个或多个应用。\n\
  \n*   每个应用都订阅了一个或多个 API。\n\n*   每个应用都必须指定（一个或多个）重定向 URI，也可以提供（一个或多个）来源 URI。\n\n\
  *   一个应用会被签发一组凭据——即 *Client ID* 和 *Client Secret*。\n\n*   根据组织策略，对特定 API 的访问可能只授予已授权的客户端。如图所示，*Client\
  \ 2* 没有对 API *W* 和 *X* 的订阅（访问）权限。\n\n图 6-7 概述了应用注册流程。\n\n![../images/509947_1_En_6_Chapter/509947_1_En_6_Fig7_HTML.jpg](img/509947_1_En_6_Fig7_HTML.jpg)\n\
  \n图 6-7\n\n应用注册流程\n\n1.  *Client* 创建一个应用，提供诸如电子邮件、所有者和联系人等详细信息，以及诸如解决方案名称、重定向 URI\
  \ 和客户端证书（如有必要）等元数据。\n\n2.  *Resource Server* 使用所提供的信息注册应用，并生成以 *Client ID* 和 *Secret*\
  \ 形式存在的凭据。\n\n3.  凭据会返回给第三方。此时，第三方拥有 *Client ID* 和 *Secret*。应用的配置数据（例如重定向 URI）是可以更改的；但是，*Client\
  \ ID* 可能是固定的。许多 API 网关实现仅在注册时提供 *Secret*，如果丢失则会重新生成。\n\n4.  此时，*Client* 将应用订阅或关联到由\
  \ *Resource Server* 发布的特定 API 产品。\n\n注意\n\n上述流程中的某些部分可以通过自助服务或人工干预完成。\n\n*   某些\
  \ Marketplace 实现可能只向经过验证的使用者提供凭据，即便是在 Sandbox 环境中也是如此。\n\n*   在 Live 环境中，应用创建和订阅可能由产品负责人完成，以将第三方限制在特定产品范围内。\n\
  \n### 授权类型与访问令牌\n\n现在 *Client* 已经注册了应用并拥有凭据，接下来有不同方式来获得访问权限。在 OAuth 框架中，这被称为授权类型（grant\
  \ type）。针对不同使用场景有许多授权类型，同时也有用于创建新授权类型的框架。举例来说，*Device Code* 授权类型可用于在输入受限的电视设备上登录在线服务。\n\
  \n需要强调的是，在 Open API 或 B2B 场景中，*Client ID* 和 *Client secret* 可能足以访问 API。而在 B2C 场景中，*Client\
  \ ID* 和 *secret* 会在 *grant type* 所定义的流程中用于获取 Access Token，而 Access Token 才是访问受保护资源时使用的凭据：\n\
  \n**客户端凭据（ID/secret）+ 授权类型 ➤ 访问令牌 ➤ API**\n\n一个典型的 Access Token 包含表 6-1 所示属性。\n\n\
  表 6-1\n\n访问令牌属性\n\n| 字段 | 是否必需 | 描述 |\n| --- | --- | --- |\n| `access_token` | 必需\
  \ | 访问令牌字符串 |\n| `token_type` | 必需 | 这是令牌类型，通常就是字符串“Bearer”，表示任何持有该令牌的一方都可使用它 |\n\
  | `expires_in` | 可选 | 令牌被授予的有效时长 |\n| `refresh_token` | 可选 | 如果访问令牌过期，则使用它来请求新的\
  \ Access token |\n| `scope` | 可选 | 表示被授予的访问范围 |\n\n在接下来的章节中，我们将深入介绍以下授权类型获取 Access\
  \ Token 的流程：\n\n*   客户端凭据（Client Credentials）\n\n*   授权码（Authorization Code）\n\n\
  *   刷新令牌（Refresh Token）\n\n### 客户端凭据\n\n图 6-8 详细说明了客户端凭据流程。\n\n![../images/509947_1_En_6_Chapter/509947_1_En_6_Fig8_HTML.jpg](img/509947_1_En_6_Fig8_HTML.jpg)\n\
  \n图 6-8\n\n客户端凭据流程\n\n1.  *Client* 发起 *Access Token* 请求，并提供\n    1.  凭据：*Client\
  \ ID* 和 *Secret*\n\n    2.  `client_credentials` 的 *grant type*\n\n    3.  Scope：*Client*\
  \ 希望访问的资源范围\n\n2.  *Resource Server* 将根据 *Client ID* 定位对应应用，验证 *Secret* 是否匹配，并在已订阅所请求\
  \ API（在 *scope* 中指定）的情况下返回 *Access Token*。\n\n3.  此时，第三方已拥有 *Access Token*。注意，该令牌可能有指定的有效期，通常为\
  \ 3,599 秒。\n\n\n\n### 授权码\n\n图 6-9 详细说明了授权码流程。\n\n![../images/509947_1_En_6_Chapter/509947_1_En_6_Fig9_HTML.jpg](img/509947_1_En_6_Fig9_HTML.jpg)\n\
  \n图 6-9\n\n授权码流程\n\n1.  请求由*资源所有者*发起。正如我们在前面的场景中所述，*我（资源所有者）*请求使用我的 Google（*资源服务器*）资料来访问\
  \ Lucidchart（*客户端*）。\n\n2.  *客户端*构建一个授权 URL，提供以下内容：\n    1.  凭证：仅提供*客户端 ID* —— 用于表明请求来源。\n\
  \n    2.  *code* 类型的响应，表示需要一个授权码。\n\n    3.  重定向 URI：决定用户在完成授权流程后应被重定向到哪里。请注意，这**必须**与为该应用配置的重定向\
  \ URI 一致。\n\n    4.  范围（Scope）：标识*客户端*希望代表用户访问的资源。\n\n    5.  状态（State）：用于在授权请求与授权服务器响应之间保持状态。\n\
  \n3.  然后，*客户端*通过 HTTP 302 将用户重定向到构建好的授权 URL。这是流程中的关键步骤，因为它需要*客户端*与*资源服务器*之间的直接交互。\n\
  \n4.  *资源服务器*验证请求中的*客户端 ID*、*重定向 URI*和*范围*，若有效，则提示*资源所有者*确认身份（认证）并提供同意（授权）。\n\n\
  5.  *资源所有者*完成身份认证，并授权*客户端*访问请求的资源。在我们的场景中，我会提供我的 Google 用户名和密码，并允许 Lucid 访问我资料中的特定内容。\n\
  \n6.  当*资源所有者*成功完成认证和授权后，*资源服务器*会生成一个*授权码*。若失败，则返回一个指示失败原因的*错误*。\n\n7.  *资源服务器*将*授权码*或*错误*附加到*重定向\
  \ URI*，并连同*state*参数一起，再次通过 HTTP 302 将用户重定向到*客户端*。\n\n8.  当重定向回*客户端*后，将确定授权请求状态——成功则为*授权码*，失败则为*错误*。\n\
  \n9.  若成功，*客户端*会发起获取*访问令牌*的请求，并提供：\n    1.  凭证：*客户端 ID*和*密钥*\n\n    2.  `authorization_code`\
  \ 类型的*grant type*\n\n    3.  *授权码*\n\n    4.  重定向 URI：必须与应用配置项一致\n\n10.  *资源服务器*将定位由*客户端\
  \ ID*引用的应用，验证*密钥*和重定向 URI 是否匹配；若提供了有效的*授权码*，则返回一个*访问令牌*。\n\n11.  返回的*访问令牌*将包含一个*refresh_token*属性。\n\
  \n12.  *access_token*可用于调用 API —— 即已订阅该已注册应用的 API。\n\n### 刷新令牌\n\n由于访问令牌通常只在较短时间内有效（一般为一小时），因此使用刷新令牌（Refresh\
  \ Token）*grant type*来在更长时间内访问资源。这也避免了终端用户在访问令牌过期后还要重复认证与重复授权的不便。需要特别注意的是，在某些场景下（如一次性付款），令牌可能只能在特定时间段内使用（甚至短于*expires_in*值），且只能使用一次。\n\
  \n为防止永久访问，必须限定令牌可刷新的持续时间。例如，令牌自首次签发访问令牌起，最长只能刷新 6 个月；超过该期限后，终端用户必须重新认证并重新授权访问。\n\
  \n图 6-10 详细说明了刷新令牌流程。\n\n![../images/509947_1_En_6_Chapter/509947_1_En_6_Fig10_HTML.jpg](img/509947_1_En_6_Fig10_HTML.jpg)\n\
  \n图 6-10\n\n刷新令牌流程\n\n1.  *客户端*发起获取新*访问令牌*的请求，并提供：\n    1.  凭证：*客户端 ID*和*密钥*\n\n\
  \    2.  `refresh_token` 类型的*grant type*\n\n    3.  重定向 URI：应用已配置的 URI\n\n    4.\
  \  *刷新令牌*：其作为属性由上一次生成的访问令牌返回\n\n2.  *资源服务器*将定位由*客户端 ID*引用的应用，验证*密钥*与重定向 URI 是否匹配；若在刷新有效期内，则返回一个*访问令牌*。\n\
  \n3.  此时，第三方拥有了一个*访问令牌*。请注意，*access_token*可能有指定的有效期，通常为 3,599 秒。*refresh_token*的有效期更长。\n\
  \n4.  返回的新*访问令牌*也将包含一个*refresh_token*属性，可用于下一次刷新请求。注意，该令牌只能使用一次。\n\n### 权限撤销\n\n\
  *资源服务器*的一项关键职责是向*资源所有者*提供对既往授权的可见性和控制能力。终端用户应能够轻松查看：*谁*获得了访问权限、*何时*授予，以及可访问*哪些*内容。更重要的是，用户应能够撤销特定*客户端*的访问权限。这通常通过用户管理门户实现。继续以\
  \ Lucidchart 场景为例，我可以使用 Google 提供的账户管理页面，查找哪些第三方可以访问我的账户，并移除其访问权限——如图 6-11 所示。\n\
  \n![../images/509947_1_En_6_Chapter/509947_1_En_6_Fig11_HTML.jpg](img/509947_1_En_6_Fig11_HTML.jpg)\n\
  \n图 6-11\n\n权限管理\n\n某些第三方也可能向终端用户提供撤销访问或解除账户关联的功能。*客户端*（第三方）会调用*资源服务器*的令牌撤销端点，以通知该事件并使授权及其关联令牌失效：\n\
  \n*   凭证：*客户端 ID*和*密钥*\n\n*   *刷新令牌*：其作为属性由上一次生成的访问令牌返回\n\n\n\n### 变体：开放银行\n\nOAuth\
  \ 标准为大多数安全场景下的委托访问提供了良好的基础。在开放银行场景中确认客户同意，出于以下一个或多个原因，需要采用自定义或定制化方法：\n\n*   它要求对终端用户信息进行细粒度访问。例如，客户可能只允许第三方访问特定的银行账户。\n\
  \n*   由于数据具有动态特性，需要自定义同意机制。延续上面的示例，一旦客户完成身份认证，其账户可以被检索并在一个自定义视图中展示以供授权。\n\n*   必须采用两阶段机制，以验证第三方执行的是客户确切的指令或*意图*。\n\
  \n这一过程的核心是*意图*这一概念：\n\n1.  *客户端*向*资源服务器*注册一个意图，表明其希望执行的操作。\n\n2.  *资源所有者*对该意图进行授权，同时指定可被访问的确切资源，并将其记录在该意图中。\n\
  \n3.  在执行来自*客户端*的请求之前，*资源服务器*会确认该请求与*资源所有者*最初授权的意图和资源相匹配。\n\n为了实现上述目标，会结合使用 *Client\
  \ Credentials* 和 *Authorization* *Code* 两种 OAuth 授权类型，如图 6-12 所示。这展示了如何将 OAuth 标准中的各个元素组装成一个定制化实现。\n\
  \n![../images/509947_1_En_6_Chapter/509947_1_En_6_Fig12_HTML.png](img/509947_1_En_6_Fig12_HTML.png)\n\
  \n图 6-12\n\nOAuth 流程的开放银行变体\n\n该流程的快速概览：\n\n*   *客户端*使用 *Client Credentials* 授权来确认其身份以及访问特定\
  \ API 产品的能力，并获得一个*访问令牌*。我们将该令牌称为“轻”令牌。\n\n*   然后，*客户端*使用该轻令牌向*资源服务器*注册一个意图，并接收一个意图标识符作为引用。\n\
  \n*   *客户端*将该意图标识符包含在授权 URL 中，并发起一个定制化的 *Authorization Code* 流程。\n\n*   这使得*资源服务器*在接收到来自*资源所有者*重定向的请求时，能够定位原始意图。\n\
  \n*   可围绕已注册意图的类型构建自定义同意页面，使*资源所有者*能够更细粒度地控制共享哪些数据。\n\n*   例如，在发起支付时，可以提供账户列表并选择其中一个。由于交互直接发生在*资源所有者*与*资源服务器*之间，*客户端*无法访问敏感数据。\n\
  \n*   在成功授权并收到 *code*，以及完成 *Authorization Code* 授权的最后一步后，*客户端*会获取一个新的*访问令牌*，称为“重”令牌。\n\
  \n*   之所以称其为“重”令牌，是因为该令牌与意图具有内在绑定关系。随后使用此令牌向*资源服务器*发起的请求，都会以该意图为参考进行处理。\n\n*   *客户端*使用该“重”令牌对*资源服务器*发起\
  \ API 调用。\n\n*   后续的刷新令牌（若允许）也会与该意图关联。\n\n正如你从上文中会注意到的，尽管流程中增加了额外步骤，但使用意图通过以下方式提供了额外的安全性：\n\
  \n1.  允许对资源进行更细粒度的控制\n\n2.  当*资源服务器*在处理*客户端*请求之前将指令与意图进行比对时，提供了第二个策略执行点\n\n### 漏洞\n\
  \n正如你可能已经观察到的，*Authorization Code* 流程以通过 HTTP 302 实现的重定向为基础。尽管这在其功能上很重要，但它也提供了攻击机会，并且是对流程完整性威胁最大的因素之一。毫无疑问，经验丰富的黑客可以利用复杂机制拦截和重定向网络数据包，或创建伪造\
  \ DNS 记录来利用重定向漏洞。由于我的职业生涯主要致力于开发而非黑客攻击，我将在图 6-13 中给出一种更简单得多的方式，说明不诚实的第三方如何钓鱼或窃取终端用户凭据。\n\
  \n![../images/509947_1_En_6_Chapter/509947_1_En_6_Fig13_HTML.jpg](img/509947_1_En_6_Fig13_HTML.jpg)\n\
  \n图 6-13\n\n凭据钓鱼流程\n\n如图所示，作为 *Authorization Code* 流程的一部分，*客户端*可以恶意将终端用户重定向到伪造的提供方页面。该页面很容易被构造得看起来像*资源服务器*的页面——并且还可托管在一个与原始域名高度相似的域名上。随后，终端用户就会在被攻陷的网站中输入其凭据。实现这一点所需的技术能力仅是基础级的\
  \ Web 开发与托管知识，远低于理解 TCP/IP 协议栈或 DNS 所需的门槛。一个重要且有意思的点是，应对此类攻击的潜在补救措施，是通过*流程*更新，在允许第三方参与你的生态系统之前先验证其完整性。\n\
  \n## OWASP\n\n开放式 Web 应用安全项目（OWASP）是一个非营利基金会，通过其由社区主导的开源软件项目、全球数百个分会、数以万计的成员，以及举办本地和全球会议，致力于提升软件安全性。\n\
  \n\n\n### 安全 Top 10\n\nOWASP 识别出的 API 安全风险 Top 10 [[`https://owasp.org/www-project-api-security`](https://owasp.org/www-project-api-security)]\
  \ 列出了以下内容：\n\n*   **对象级授权失效**（API1）：API 往往会暴露处理对象标识符的端点，从而形成较大的攻击面并引发对象级访问控制问题。凡是使用用户输入访问数据源的函数，都应进行对象级授权检查。\n\
  \n*   **用户认证失效**（API2）：认证机制经常被错误实现，使攻击者能够攻陷认证令牌，或利用实现缺陷临时或永久冒充其他用户身份。系统识别客户端/用户能力一旦被破坏，整体\
  \ API 安全也会随之受损。\n\n*   **过度数据暴露**（API3）：开发者为追求通用实现，常在未考虑各属性敏感性的情况下暴露对象全部属性，并依赖客户端在展示给用户前自行过滤数据。\n\
  \n*   **缺乏资源与速率限制**（API4）：API 经常不会对客户端/用户可请求资源的大小或数量施加限制。这不仅会影响 API 服务器性能并导致拒绝服务（DoS），还会为暴力破解等认证缺陷敞开大门。\n\
  \n*   **功能级授权失效**（API5）：包含不同层级、分组和角色的复杂访问控制策略，以及管理功能与普通功能之间不清晰的边界，往往会导致授权缺陷。攻击者可利用这些问题访问其他用户资源和/或管理功能。\n\
  \n*   **批量赋值**（API6）：将客户端提供的数据（如 JSON）直接绑定到数据模型，若未基于允许列表进行适当属性过滤，通常会导致批量赋值问题。攻击者可通过猜测对象属性、探索其他\
  \ API 端点、阅读文档或在请求负载中附加额外属性，修改本不应修改的对象属性。\n\n*   **安全配置错误**（API7）：安全配置错误通常源于不安全的默认配置、不完整或临时性配置、开放的云存储、错误配置的\
  \ HTTP 头、不必要的 HTTP 方法、过于宽松的跨域资源共享（CORS），以及包含敏感信息的详细错误消息。\n\n*   **注入**（API8）：SQL、NoSQL、命令注入等注入缺陷，发生于不可信数据作为命令或查询的一部分被发送给解释器时。攻击者的恶意数据可诱使解释器执行非预期命令，或在未正确授权的情况下访问数据。\n\
  \n*   **资产管理不当**（API9）：API 通常比传统 Web 应用暴露更多端点，因此正确且持续更新的文档极其重要。对主机和已部署 API 版本进行适当盘点，也有助于缓解如过时\
  \ API 版本和暴露调试端点等问题。\n\n*   **日志记录与监控不足**（API10）：日志与监控不足，再加上与事件响应集成缺失或无效，会使攻击者得以进一步攻击系统、维持持久化、横向移动到更多系统进行篡改、提取或销毁数据。多数泄露研究表明，发现一次入侵平均需要\
  \ 200 多天，且通常由外部而非内部流程或监控发现。\n\n### 建议\n\n为应对过度数据暴露（API3）风险，我们采用以下指导原则：\n\n*   详细审查\
  \ API 返回结果，确认其仅包含有效数据。\n\n*   始终在服务端过滤敏感数据。\n\n*   避免使用诸如 *toJSON()* 和 *toString()*\
  \ 之类的通用方法。应改为选择性返回特定属性。\n\n*   实现基于模式（schema）的响应校验机制，以定义并强制 API 方法返回的数据（包括错误信息）。\n\
  \n*   保持接口尽可能简单。仅提供必要信息。如有需要，使用版本化来扩展 API。\n\n大多数 API 网关都提供开箱即用的资源与速率限制功能，且通常支持按不同消费者服务质量进行细粒度控制。应利用这些能力来缓解缺乏资源与速率限制（API4）的问题。\n\
  \n为防止注入（API8），在 *平台架构* 中已明确微服务编排逻辑与集成组件之间的角色分离。该措施可限制 API 输入被直接用于数据库查询的可能性。\n\n\
  下一节将讨论的高强度安全评审流程，对识别和解决潜在问题有显著帮助。\n\n## 安全评审\n\n应用扫描工具生成的安全报告有时会长达几十页甚至上百页。除了要安抚紧张的交付负责人、说明问题没有表面看起来那么严重之外，这个过程常让人感觉像是在闯关受刑。非常有帮助的一点在于：在内部测试阶段发现并修复问题，远胜于在你最喜欢的技术新闻网站上看到你的\
  \ API 发生安全泄露。我们详尽且不妥协的流程见图 6-14。\n\n![../images/509947_1_En_6_Chapter/509947_1_En_6_Fig14_HTML.png](img/509947_1_En_6_Fig14_HTML.png)\n\
  \n图 6-14\n\n安全评审流程\n\n几个要点如下：\n\n*   安全测试由三个具备不同专业能力的团队执行。根据以往经验，我们发现通过更严格的输入校验策略，可以从安全报告中减少约\
  \ 80 多页内容。为识别这类问题并避免交付负责人不必要的焦虑，安全测试会先由内部质量保障团队执行，然后再请求企业安全团队评审。之后，还会安排一次由独立外部安全咨询机构执行的测试。\n\
  \n*   外部测试提供的安全报告将由信息安全团队复审并重新分级——严重级别通常会*上调*一个等级。即从中危到高危，从高危到严重。\n\n*   为协助修复优先级排序，发现的问题或缺陷采用\
  \ MoSCoW（Must have、Should have、Could have、Won’t have）方法分类。\n\n*   已识别问题也可能超出团队可控范围——例如共享企业组件所需的配置更新。在这种情况下，即便由外部团队调查和修复，我们仍保留该问题的所有权。\n\
  \n*   重新分级后的安全报告由 Marketplace 团队负责，内部与外部的修复和更新都会纳入交付周期。\n\n*   在应用更新后，通常会重新执行安全测试，以确认问题已解决，并识别修复过程中可能引入的新问题。\n\
  \n\n\n## 总结\n\n在本章中，我们首先从更宏观的角度审视了在 API 市场实施中安全性的重要性。如前所述，它涉及每一个领域，因此对这一目标给予充分关注，尤其是保持敬畏，对于实施方案的完整性和长期可持续性至关重要。随后我们聚焦到\
  \ API 安全，并探讨了三种集成模式。第一种是开放 API，这类 API 通常可访问，但需要凭据来跟踪并控制第三方访问。企业对企业（B2B）API 用于实现系统到系统的集成，且面向更小且更熟悉的受众。将证书作为安全机制，可能会简化该集成模式下的网络要求。\n\
  \n最后，我们讨论了最流行、使用最广泛的企业对消费者（B2C）模式。在这种模式下，终端用户会授权第三方代表其发起请求或访问其数据。为了理解如何通过行业标准实现这一点，我们深入讲解了\
  \ OAuth 流程中的关键细节。在充分理解参与方、作用域、授权类型和访问令牌之后，我们还回顾了应用注册等支持流程，并逐步讲解了客户端凭据、授权码和刷新令牌这几种授权类型。撤销授权的能力极其重要，是任何实现中不可妥协的要求。\n\
  \n接着我们介绍了 OAuth 在开放银行场景中的一个变体，并观察到“意图”在该方法中起着关键作用。我们还讨论了一种可能危及终端用户凭据的方式，并鼓励你继续主动寻找其他可被利用的机会。这将使你的团队能够提前应对这些问题——解决方案可能是流程更新，而不一定是技术变更。\n\
  \n我们审视了开放式 Web 应用安全项目（OWASP）API 十大风险，并建议如何通过更聪明的设计、谨慎的开发，以及利用我们技术栈中产品能力来应对其中一部分风险。最后，我们经历了迭代式安全评审流程的重重考验；这个流程虽缓慢却稳步地帮助我们识别并修复防护中的漏洞。\n\
  \n在我的职业生涯中，我非常幸运能与许多高技能人才共事，他们对安全的热情如同我对集成的热情一样高涨。我鼓励你去寻找这些知识宝库，虚心聆听、认真学习；他们无疑会指出你实现中的缺陷，并用其睿智建议帮助你将平台打造成能经受实战考验的系统。由于\
  \ API 市场的性质及其运营领域，它将持续遭受攻击。\n\n"
- '# 7. API 设计


  打造 API 的接口是一项可以从多个视角来审视的活动。对开发者而言，这相当直接，因为输入与输出通常定义明确；即使不明确，也可以在后续过程中轻松补充。对企业架构师而言，这更像是阿特拉斯肩扛世界般的重任：接口应经过深思熟虑，能够被当前和未来的多个消费者复用，并且能够承受来自后端提供方的任何“板块级”变化。对
  API 产品负责人而言，接口应当干净、清晰，且便于第三方使用。监管机构则会定义一种能够覆盖广泛消费者的接口，这往往需要由前 NASA 阿波罗工程师级别的人才撰写的复杂文档。


  在光谱的一端，设计是开发生命周期中极其重要的阶段，做出正确决策的压力可能导致“分析瘫痪”。当产品将被外部第三方消费时，系统中还会引入额外压力，因为变更或更新无法被局部封闭。在活跃的
  API 生态中，设计不佳的接口可能导致开发者采用率低，甚至对产品及市场声誉造成损害。


  在另一端，API 虽然重要，但只是达成目标的手段，尽快产出规范能够缓解高要求消费者带来的压力。这可能会产生一个只满足单一消费者的定制接口，但这种不合理之处可以稍后再修复——前提是投入更多时间和精力。


  我们市场中的 API 来自多种视角，并落在上述光谱的不同位置。这一过程我们仍在持续打磨和优化。在本章中，我将分享我们的经验、学习和踩坑，以帮助你更深入理解我们的设计流程。你可以将这些经验调整后应用到你自己的市场实施中。从术语约定来看，我将外部方消费的接口称为北向接口，将市场消费的后端接口称为南向接口。


  ## 设计策略


  在我们开始讨论*如何*定义 API 之前，先稍作停顿，思考下面这个问题：


  *   *你的 API 增加了什么价值（VALUE）？*


  请尽可能诚实地回答这个问题——它没有绝对的对错，最终取决于企业需求。组织的意图是否只是为了在市场上建立存在感，而这只是一个“打勾式”的 API 发布动作？在这种情况下，可能增加的隐性价值是：组织满足了监管或合规要求。又或者目标是比竞争对手发布更多
  API 产品——偏好数量以获得更高“炫耀资本”，而不是质量。在这种情况下，你的市场看起来更接近某个流行调研的右上象限。也许这是一个试点项目，当前只有一个已确认消费者，但要求这些
  API 未来能服务更大范围受众。其短期价值是支持单一消费者，中长期价值是支持多个消费者。也可能这是一次真正的战略响应：将你的组织建设为平台提供方，打造新的数字渠道，使第三方提供者能够利用企业能力构建并发布其应用与服务。这可能为组织带来长期价值，因为它将创造新的收入来源。


  认真反思这个问题至关重要，因为它本质上驱动着 API 设计背后的策略。例如，监管要求可能迫使你的组织向第三方开放 API。你市场的第一轮迭代可能只是为了在监管截止日期前达成该目标。下文所列、用于构建
  API 产品的策略，均由 API 市场的目标所驱动。清楚理解哪些地方必须进行权衡，将有助于塑造 API 的定位、采用情况，以及后续迭代的改进方向。




  ### 自上而下，预定义


  这些是所有组织都必须遵循的标准 API。支付服务指令（PSD2）就是一个例子。对消费者而言，其优势在于集成方案只需构建一次，便可在不同提供方之间复用。对提供方而言，其优势在于接口是预先定义好的，只需要补充实现即可。这类集成的挑战在于北向（面向外部）接口与南向（后端）接口之间的映射。由于北向接口被设计为尽可能通用，通常会有非常广泛的输入以及海量的组合。


  根据我们实施 PSD2 接口的经验，我们发现南向接口属于一个小众的大型机应用，它多年来一直忠实地服务于组织的特定需求。我们这项并不令人羡慕的任务，就像把一侧数百根精细的光纤，接补到另一侧几十个真空管上。对于这种类型的集成，在完成连接这两类接口的映射工作后，我通常会有一种和组装预包装产品后发现多出零件时一样的感受。要建立对映射正确性的信心，方法是对解决方案进行严格测试，并让后端提供方确认请求被正确接收和处理。


  这种接口类型的另一个缺点是，组织会失去其独特身份。消费者有充分理由认为，如果每个提供方都有独特身份，将会显著延长他们的开发周期。从提供方的角度看，标准化会让你很难从众多竞争者中脱颖而出。你的
  API 产品只会变成提供方目录中的一个新端点。大型机解决方案虽然陈旧，却可能具备某些令人惊叹的功能，第三方本可以加以利用。不幸的是，这一缕阳光会被覆盖在接口之上的统一性“毯子”所遮蔽。


  ### 自下而上


  大多数北向接口都由其南向对应接口驱动。与预定义 API 相比，这些是按后端功能“塑形”锻造出的产品。上一节提到的那些独特而美丽的“功能阳光”，本来会被标准接口掩盖，如今则可以明亮地照耀出来，供世界看见并使用。现在出现的挑战在于：确定应暴露哪些功能片段与数据。此外，必须特别谨慎，避免南向接口的数据结构“渗出”。也就是说，外部消费者不应受到后端提供方细微变更的影响。


  坦率审视我们的 API 目录后，我发现其中有一些并不是我完全引以为傲的。这些 API 也没有出现在我们的开发者门户中。在你的 Marketplace 之旅中，总会有某个时刻，API
  生产线跟不上消费者需求。虽然我认为这在某种程度上是个令人羡慕的处境，但它有时会导致糟糕的短期决策，并带来长期后果。


  我清楚记得曾与产品负责人讨论过一个关键 Marketplace 消费者急需的 API。当时团队已全力以赴，没有能力再“采收”这个 API，尤其是在既定时间线内。最终在疲惫中做出的决定是：我们发布该
  API 的 0.00001 版本。这实际上就是一个直通式接口。我们为这个糟糕决定保留的一点体面前提是：这个 API 会在后续时间进行修订。


  正如大多数交付团队所知，绝大多数进入生产运行环境的解决方案几乎不可能回退。偏偏这个后端平台的数据模型，是我整个集成职业生涯中见过最糟糕的之一。消费我平台发布 API
  的用户，对我提供给他们的接口可能也有和我使用别人接口时同样的感受。创建这类 API 产品的挑战在于：团队必须在其整个生命周期内承担所有权与维护责任。即使创建了新版本，如果旧接口稳定，消费者也极不可能将其集成更新到新接口。


  为避免你的平台出现这种情况，关键在于获得项目赞助方的强力支持，使其能够为团队抵挡来自消费者的压力。随着我们平台逐渐成熟，我们已能以更好的方式处理这类请求。我们当前的交付流程会要求对正在开发的解决方案进行重新优先级排序，或者将所需功能安排到更晚的时间。一个前置的“*不*”，虽然不受欢迎，却可能带来更好的长期方案。在需求管道中建立明确流程，也让消费者能更高效地规划，从而使临时突发请求大幅下降。




  ### 消费者驱动（Consumer-Driven）


  这种设计策略通常始于某一个消费者的需求，并带有一项关键指令：接口在未来应支持多个消费者。我们平台最近接到任务，需要弥合一个新的外部托管数字平台与内部核心企业能力之间的鸿沟。在项目启动之初，Marketplace
  团队郑重承诺要构建可供其他第三方提供商复用的北向接口。我们对这一目标的投入，可从 API 的命名规范与标准中体现出来。其设计方式使得其他方能够轻松消费这些接口。


  这一使命目标所带来的推动力，促成了与组织内几乎所有后端平台的南向集成。当后端提供方对我们提出挑战时，我们选择让开，让数字平台这台“巨无霸战车”的势能从他们身上碾过。


  我们很快意识到，巨无霸并不是精细温和的生物——它们同样冲击了我们的交付流程。随着团队接收越来越多消费者特定的业务需求，我们在维护通用、可复用接口的纯粹性方面举步维艰。我们曾试图坚守立场，并明确指出这些变更会影响
  API 的可复用性和可扩展性。我大脑左侧的理性部分认同当时做出变更的决定，因为那时只有一个消费者；而右侧的感性部分却深受打击，因为这意味着我们违背了打造可复用产品的承诺。


  我们试图控制这种“传染”的扩散：先隔离消费者特定的载荷（payload），再隔离操作（operation），并希望在未来某个时间点进行“康复”。遗憾的是，我们并未成功，目前的“诊断结果”是：需要在我们的目录中“截肢”某些特定
  API。听起来也许有些夸张，但我希望当你经历类似情况时，能记起这个类比。


  我想传达给你的关键信息是——如果你的旅程始于单一消费者，请谨慎选择你的战场。正如图 7-1 所示，务必将关键后端南向集成抽象为可复用的集成组件。对于北向接口，识别哪些可以被隔离，并将其拆分为通用接口。例如，参考数据
  API 就是通用接口的理想候选。与其为可能永远不会出现的未来消费者而设计，不如对你的首要消费者给予应有的重视，发布一个能满足其需求的特定 API。


  ![../images/509947_1_En_7_Chapter/509947_1_En_7_Fig1_HTML.jpg](img/509947_1_En_7_Fig1_HTML.jpg)


  图 7-1


  消费者特定的集成方法


  帮助我得出这一结论的原因在于：如果没有这个特定消费者的需求，我们一开始就不会有*任何*API 产品可做。我想给你一句颇有智慧的建议——不要试图一步到位“煮沸整个海洋”。让你的平台拥有一定空间，先提供消费者特定接口，再在后续构建通用且可复用的集成组件。也就是说，与其先构建一个单一产品再事后切分重组，不如从一开始就构建多个分段化产品。


  ### 自主构建（Build Your Own）


  如果说自顶向下（Top-Down）策略给了你一个现成且必须落地的接口，消费者驱动（Consumer-Driven）方法由单一用户需求牵引，自底向上（Bottom-Up）方法受后端系统影响，那么从接口视角看，真正可设计的空间并不大。自主构建（Build
  Your Own）策略则不同，它允许 API Marketplace 团队在定义 API 的愿景与目的上拥有完全自主权。就像艺术家从一整块石料中雕刻出精美雕塑，一点点打磨掉粗糙边角，直至成品诞生，你也将经历同样的过程。不会有僵化的监管机构、苛刻的单一消费者或过时的遗留后端，来替你挡住那些在消费你的
  API 时遇到困难的开发者的怒火。


  即便如此，这块可供你绘制接口“壁画”的空白画布仍是难得机遇，是应当双手紧握的“金环”。对我们团队有效的方法，是一套严格而全面的评审流程。我们有时称其为“Apple
  Design（苹果式设计）”评审。无论是苹果的拥趸还是批评者，大多都会认同其面向终端用户的产品兼具功能性与优雅性。这并非“自然而然”得来，而是无数严格设计评审与迭代的结果。你的
  API 产品也必须如此。从一开始就接受：会有大量迭代和大规模返工。友谊与同盟关系应暂时搁置，目标应直指卓越。


  在最近一次 API 设计评审中，我们收到了若干改进建议，也提出了关于功能与可用性的问题。第一轮评审后，达成的方向是采用通用、开放的方法，以便于扩展，但这需要对开发者进行更多教育。我对这一策略相当满意，因为它与已在建设中的中间件集成组件高度契合。坦白说，当时我们开发已推进很深，API
  Gateway 的实施几乎完成，结果却又提出了关于可用性的问题。


  我不想掩饰——回到起点重画蓝图，尤其是在你的“壁画颜料”都快干的时候，确实艰难。人们本能地会想捍卫现有方案。真正帮助我的是意识到：最终产品的新方向将带来更简化的方法和更高的开发者采纳率。我算是幸运的——我们是在开发中途发现了这一点。也会有一些
  API 产品上线后仍需回到起点重做。这必须内化为团队文化：持续返工、打磨、优化，直到最终产品足够完美。


  还应强调的是，经受设计评审流程的“重重考验”有助于巩固产品定义相关原则。当我们收到后端团队关于增加输入元素的挑战时，这些原则证明是至关重要的支撑。尽管 API
  可以变化，你也要准备好捍卫自己所创建产品的身份。简而言之，如果你坚信某一战略方向，就不要害怕坚定立场。


  ## 注意事项（Considerations）


  设计 API 时需要考虑的因素很多。有些因素应在流程早期纳入，用作筛选器，以区分优劣；另一些因素用于理解 API 的形态与功能，确保交付成果能够实现预期能力。这些阶段可能是显性的，例如详细性能要求；也可能是隐性的，例如在组织内部推进架构设计评审。在接下来的章节中，我们将讨论其中一些因素，以及我们在设计过程中用于筛选、理解和构建更优
  API 的经验与方法。




  ### 可行性与可实施性


  这是设计过程中最关键但也可能最困难的考量之一。其中的核心认知是：并非所有 API 都适合作为 Marketplace 上的产品。当一个新产品机会出现时，产品负责人（由工程团队支持）必须在工作正式开始前，通过回答以下一个或多个问题来完成尽职调查。


  *   该产品是否符合企业风险、安全与数据隐私政策？


  *   第三方开发者是否对该产品有需求，和/或外部提供方是否能够使用它？


  *   对下游系统有哪些依赖？时间线如何？


  *   构建该产品所需的开发工作量和复杂度如何？


  *   预测的显性或隐性收入模型，是否能在产品整个运营生命周期内支撑该产品？


  这一过程的产出不一定是非黑即白的二元结论。作为理解产品的一部分，团队可以对产品进行塑形，以提升其可行性。对下游系统的依赖与时间线问题，可以通过分阶段或迭代式发布来缓解。与第三方就产品潜在采纳进行沟通，以判断需求，也可能是明智之举。如果该产品能够带来未来潜在机会，也可以从运营视角在短期内为其提供资金支持，并兼顾长期目标。


  API 产品虽然是数字化的，但与实体产品类似。在开始构建之前，团队至少必须对创建和运营它所需的时间、成本与投入有一个高层视图。


  ### 需求


  敏捷是我们当前团队最大的优势之一，因为与企业其他部分相比，我们能够以“光速”响应、转向并机动调整。不幸的是，这有时也是我们的阿喀琉斯之踵，因为我们没有停下来审视问题陈述更广泛的上下文。我们通过在运营环境中吸取了一些惨痛教训后，采取的风险缓解措施是：通过清晰定义
  API 需求来强化需求流程。我们仍然可以保持敏捷方式，但必须清楚了解“赛场”以及参与背景。


  这种清晰性可以通过功能性需求与非功能性需求来实现。仅仅提到这些术语，就可能让同行开发者一阵发怵，因为它常常与传统的、某种程度上近乎“神圣化”的企业架构实践同义。在你跳到下一节之前，想一想：如果你设计并建造的是一条只供单车骑行者通行的道路，却来了一个由
  18 轮卡车组成的车队，会有多少返工。反过来，思考一下反向场景中被浪费的开发投入。


  根据我们的经验，在给出资源投入、开发、测试和交付时间估算之前，我们现在会考虑以下一些问题：


  *   **性能**：接口的预期吞吐量是多少？支撑系统的响应时间与相关服务等级如何？这会直接影响我们平台基础设施的扩展，因为高吞吐 API 可能需要额外硬件容量。


  *   **可用性**：如果支撑系统不可用，请求应当排队并在稍后重试，还是应当向调用方返回错误？如果请求需要重试，API Marketplace 平台就必须具备处理异步请求的能力。


  *   **可维护性**：哪个运营团队会处理终端用户查询？在支持团队之间跟踪运营问题的支持流程是什么？


  *   **接入（Onboarding）**：谁来处理希望消费该服务的第三方的接入、尽职调查、商业法律协议？


  *   **报表与历史数据** **：** 需要上报的关键指标有哪些？报表频率与可用性如何——从发布与历史追溯角度看？


  *   **业务规则**：作为进入企业的新渠道，我们努力将业务规则保持在 Marketplace 之外。理想情况下，这些规则应在后端逻辑中集中维护，而不是在渠道逻辑中重复实现。若无法集中托管，那么业务规则有哪些、复杂度如何、变更频率如何，以及变更所需时间线如何？


  需要强调的是，这些只是我们在构建新 API 时考虑的*部分*领域。对于某些解决方案，在与已知后端协作时，我们只考虑其中的一个子集。本着敏捷精神，我们也会并行启动后端集成，以便在需求明确并形成高层设计后能够迅速推进。


  即便附带“后续可修订”的前提，在给出交付预估时仍应谨慎，因为任何估算都很可能被视为具有约束力——尤其是在高压环境下。另一种缓解策略是（在实施早期阶段可能更容易做到）：以“beta”标识发布
  API。如有需要，这可为返工保留一定灵活性。但这一阶段必须有明确时间线，因为过长的测试期可能会吓退 API 的外部消费者。


  ### 文档


  对 API 产品成功至关重要的一个关键要素是文档。对此我再怎么强调都不为过。遗憾的是，根据多年开发经验，文档通常是在最后才“补上”。再优秀的 API 产品，如果没有足够水平的配套文档，也无法、也不会发挥其潜力。正如代码行体现了开发者的“遗产”，详细说明
  API 使用方式的文档，也代表了团队将传递给未来使用者的一份“遗产”。API 的行为与运行方式、参数、输入和输出等细节，都应包含在 API 的定义中（也称为 swagger）。文档与定义之间是共生关系，二者应共同演进，最好以相同速度演进，并且重要的是同步演进。


  这件事说起来容易做起来难，而且这是必须由团队承担而非某个个人完成的活动之一。作为开发者，我非常喜欢编码。有一类编码工作有时像泥泞沼泽一样拖慢我，那就是给变量或操作命名。让我焦虑的原因在于，我希望名称足够合理，并能与未来维护我代码的人产生共鸣。文档也是同理。负责塑造定义的团队成员，可能只能用寥寥几句简短词语来描述它。随着定义被评审，文档也必须经过同伴评审、更新，然后提交给工程负责人和产品负责人评审并反馈。如果团队资源允许，这项任务最适合由技术写作者完成。


  正如前文关于*API 消费*一章所强调的，API 产品的消费者类型并不相同。技术文档可以满足开发者的需求。关于 API 产品商业使用与应用方式的细节和指南，对业务受众同样至关重要。此外，还需要对
  API 进行营销与定位，以吸引外部消费者关注。API 产品在设计阶段就必须考虑不同类型与层级的文档。




  ### 治理


  治理是另一个可能让敏捷开发者感到畏惧的话题。然而，它会为团队将要构建的 API 以及 Marketplace 将要承载的内容带来巨大且广泛的收益。应尽可能早地在开发生命周期中考虑治理，并持续推进。我相信你会同意，几乎没有什么事情比看到一个你投入了大量时间和精力的项目或倡议，因不合规而被搁置更令人沮丧了。在我们的组织中，企业架构（EA）团队的职责是确保解决方案按照企业的特定方向进行设计和构建。


  我们与 EA 能力之间的关系经历了一次蜕变，这种变化与平台成熟度成反比。让我解释一下这句话。在 MVP 阶段，我们尽最大努力绕开治理和企业架构师。主要原因是 Marketplace
  倡议，更不用说其底层技术，与组织通常所做的事情相距甚远，以至于我们担心某天早上来上班时会发现工位被官僚主义的红色警戒线围了起来。我仍清楚地记得我们第一次在解决方案对齐论坛（Solution
  Alignment Forum）上的提交，当时我们获取部分批准的策略是将该倡议标记为“Research & Development”。也就是说，我们被允许继续推进，但仅限于“实验室条件”，并被严格要求返回进行进一步审批。


  随着时间推移，我们发现架构评审流程中的洞见与建议，使我们能够更高效地推进交付中的其他领域。例如，获得使用文档型数据存储的批准，使我们得以使用一项企业级服务。


  我们已经学会并仍在学习如何更高效地应对设计评审流程。关键原则是尊重与谦逊。尊重流程——这些治理结构对交付团队而言也许显得繁琐，但其存在是为了保护企业。尊重企业架构师——有时他们的问题和反馈看起来完全脱离上下文，但事后看来却为我们在运维环境中节省了大量时间。谦逊是我们治理之旅核心中最重要的特质之一。能够吸收反馈并做出必要调整，最终将形成一个与企业标准保持一致的平台。


  通过成熟度与认知提升的过程，项目如今会为设计评审的充分准备分配足够时间。此外，我们还寻求了一位首席架构师（Lead Architect）的协助，他作为提交过程的“引导者”，在正式汇报日期前，帮助其在多轮内部更新及关键企业架构师评审中顺畅流转。这也帮助我们的项目团队和
  Marketplace 与企业建立了更深层的连接。


  ## 访问机制


  API 可以通过多种方式访问。SOAP（Simple Object Access Protocol）和 REST（Representational State
  Transfer）都是 Web 服务通信协议。也有像 GraphQL 这样令人兴奋的可选方案。应根据访问 API 的消费者或客户端类型、编程语言、环境以及应用需求来确定采用何种方式。


  你的 Marketplace 最好具备多种可选方案，并在设计阶段拥有选择最优方案的能力与灵活性。公共 API 中很大一部分是 REST API。我建议你在 Marketplace
  中发布的首批 API 采用 RESTful，因为有大量资源和参考站点可用于对标。在本节中，我们将讨论并对比不同的访问机制。


  ### SOAP


  SOAP 将应用逻辑的组件以服务而非数据的方式暴露出来。它与编程语言、平台和传输方式无关。作为一项成熟的万维网联盟（W3C）标准，它在错误处理和自动化方面具备预构建的可扩展性。通过其他协议和技术，它也具有很强的扩展能力。


  除了 WS-Security 之外，它还支持 WS-Addressing、WS-Coordination、WS-Reliable Messaging 以及其他一系列
  Web 服务标准。如果你需要更强健的安全性，WS-Security 支持可为数据隐私和完整性提供额外保障，并支持通过中介进行身份验证，而不仅仅是 SSL 所提供的点对点方式。另一个优势是它提供内建重试逻辑，以补偿通信失败。但这也有代价：它是
  Web 服务访问中更“重量级”的选择，并且由于使用复杂的 XML 格式，往往速度较慢。


  ### REST


  RESTful API 是一种 API 架构风格，它使用 HTTP 请求来访问和使用数据。REST 中的对象被定义为可寻址的 URI，并通过 HTTP 的内建动词进行交互——具体来说，GET
  用于读取，POST 用于创建，PUT 用于更新，DELETE 用于删除等。其核心概念是一切皆资源。由于它与 HTTP 紧密对齐，几乎可在 Web 的任何地方使用，并且在通过互联网公开
  API 时被广泛采用。


  REST 支持更多样的数据格式，结合 JavaScript Object Notation（JSON）后，通常被认为更易于使用，因为学习曲线更平缓。它对浏览器客户端支持更好，也不需要昂贵工具即可使用。作为一种更高效的方法，它通常比
  SOAP 更快、占用带宽更少。


  ### GraphQL


  GraphQL 是一种用于 API 的开源查询语言，由 Facebook 于 2012 年作为数据获取 API 开发。自 2016 年开源以来，它的人气不断增长。图（graph）指的是更复杂且具有关联关系的资源。获取复杂图结构需要客户端与服务器之间多次往返。因此，REST
  API 常常会导致过度获取/不足获取。过度获取是指获取的数据多于所需；不足获取则相反，指获取时返回的数据不够。


  GraphQL 则围绕模式（schema）、查询（queries）和解析器（resolvers）构建，其目标是改进 REST：允许客户端请求特定的数据片段，而不只是整个数据块。你无需处理冗长的数据流——你只会得到你请求的内容。而你请求的内容还可以由多个不同的
  REST API 组合而成。REST 在瘦客户端场景下表现良好，例如托管在浏览器中的 Web 应用，因为主要处理工作在服务器端完成。GraphQL 则利用了更强大客户端的能力，例如承载应用程序的移动设备。


  ## 模式


  API 产品就像一座冰山，只有约百分之十露出水面，庞大的部分隐藏在水下。第三方只能看到打磨完善、已发布的接口及相关文档。产品的核心——可能更为复杂——位于实现层。构建产品有多种方法，以下内容绝非穷尽列表。随着你的
  Marketplace 成熟与演进，你会加入自己的变体，以满足组织的独特需求。人们很容易陷入将产品归类到某一特定模式的纠结中。请尽量避免这一陷阱。作为数字平台，产品不一定要遵循经典架构惯例。正因如此，平台才能具备敏捷性和灵活性。简而言之，让产品“跳出框线”去发挥。




  ### 同步


  我们的第一批微服务是基于一个数字化集成框架构建的，该框架面向集成到单一后端，如图 7-2 所示。在当时，只有一个需要集成的后端是完全合理的。毕竟，微服务的纯粹定义就是一个原子化的功能单元。在平台的早期阶段，这种模式完美满足了我们的大多数需求。对于大多数
  API 平台来说，这种方法也是一个很好的起点。


  ![../images/509947_1_En_7_Chapter/509947_1_En_7_Fig2_HTML.jpg](img/509947_1_En_7_Fig2_HTML.jpg)


  图 7-2


  单一后端


  随着消费者驱动（Consumer-Driven）方法带来的需求日益复杂，我们有必要把对不同后端的调用串联起来。我们以战术性方案的名义这样做，长期目标是将这部分逻辑迁移到专门的中间件服务中。为了满足极其激进的项目交付时间，我们在微服务中加入了更多逻辑，最终形成了图
  7-3 所示的实现方式。基于多年的集成经验，这类实现会让我产生严重的眩晕感。


  ![../images/509947_1_En_7_Chapter/509947_1_En_7_Fig3_HTML.jpg](img/509947_1_En_7_Fig3_HTML.jpg)


  图 7-3


  复杂业务逻辑


  如果这个顺序流程只有一次写操作，它或许还能勉强达到允许继续存在的最低标准。遗憾的是，这个流程中还有更多写操作。对于更宽容的开发者或架构师来说，这也许是可接受的做法。我对这种做法的担忧在于：如何在整个流程中保持事务一致性。如果第一次写入成功而后续写入失败，那么事务或请求就会处于不一致状态。在传统中间件平台中，这正是消息队列和回滚机制至关重要的地方，它们用于确保事务性。我的坚定立场是：这类集成逻辑最好维护在具备必要工具和服务支持的环境中。


  不幸的是，战术方案的交付速度远胜于战略方案，而且通过存储瞬时状态并重放请求，已经实现了伪事务性。我的建议是：在构建系统时，绝不要让你的微服务复杂到这个程度，因为这无异于搭建纸牌屋。我把这种微服务称为“单体化微服务（Monolithic
  Microservice）”。务必不惜一切代价避免它。


  ### 异步


  最初我们很幸运，因为我们所集成的后端平台通常在毫秒级响应，最差也只是秒级。随着我们吸纳更多不同后端并加入更多业务逻辑，我们发现请求延迟在持续攀升。对于某些 API
  操作，完成一次请求甚至需要一分钟以上。不要浪费时间和精力去抱怨一个主机应用需要几分钟来创建客户记录。虽然对数字化平台来说，几分钟几乎像一个世纪，但在主机系统语境下，这已经是光速了。


  这很快就成为问题，因为 API 网关超时被设置为 60 秒。当网关的维护方拒绝我们增加超时时间时，问题进一步升级——而且他们拒绝得完全合理。API 网关并不适合处理长时间运行的请求，这类事务会影响其他服务使用者。我们夹在两难之间：一边是处理请求耗时不可控的后端平台，另一边是对请求处理时间有硬性上限的
  API 网关，因此我们必须为这些用例找到新的执行方式。


  不幸的是，我们的约束还不止于此。就像一位被捆绑、淹没在水下且还面临鲨鱼袭击威胁的逃脱艺术家一样，我们还必须应对另一个参数：网络防火墙限制。微服务不允许直接访问企业网络外部的服务，除非通过
  API 网关进行复杂的反向代理，这会使开发时间翻倍。


  如果没有这个限制，我们本可以直接实现图 7-4 所示的异步回调模式。调用方发起请求时传入一个返回 URL，该 URL 会在流程结束时被调用。如果你的微服务平台不是部署在“恶魔岛”里，这是一种高效得多的异步处理模式，因为它支持事件驱动架构。


  ![../images/509947_1_En_7_Chapter/509947_1_En_7_Fig4_HTML.jpg](img/509947_1_En_7_Fig4_HTML.jpg)


  图 7-4


  异步回调


  最终采用的方案是图 7-5 所述的异步轮询（Async-Polling）方式。在 API 发起时，会向消费者返回一个*回调* *标识符*。微服务继续处理请求，并在完成后将响应更新到数据存储中。与此同时，消费者通过一个专用操作轮询微服务，以判断请求是否已完成。尽管这种方式不如回调机制优雅，但它的内在优势是微服务不必承担向消费者回传响应的负担。责任转移给消费者，由其自行判断事务状态。


  ![../images/509947_1_En_7_Chapter/509947_1_En_7_Fig5_HTML.jpg](img/509947_1_En_7_Fig5_HTML.jpg)


  图 7-5


  异步轮询


  ### 代理 vs. 旁路采集之争


  为了实现一个 API 产品而进行方案设计，在我们团队里从来都不是件枯燥的事。举例来说，考虑下面这个场景：它源于最近一个 API 产品需求，并且坦率地讲，这是团队内部争论非常激烈的话题。由于我们的
  API 市场（Marketplace）现在被视为外部第三方访问组织服务的入口，我们被要求为某个特定业务需求用例托管一个 API。它是一个小众功能，只会对特定消费者开放。因此，它不会出现在对外发布的
  API 产品目录中。此外，这类事务本质上承载的是高度时间敏感的客户请求。也就是说，如果请求不能在毫秒内成功处理，可能会给使用该接口的商户带来潜在收入损失。


  实现该需求的两种方法在图 7-6 中进行了对比。左侧是我们当前的方法，我们称之为“中间人（man-in-the-middle）”模式；右侧是新的“tap-and-go（旁路即走）”策略。tap-and-go
  的支持者强调，由于 Marketplace 并不是事务中的关键参与者，因此应采用观察者角色。作为观察者，只应提取监控和洞察所需的信息。传统代理方法的支持者则强调，该产品应按照标准设计理念来实现。


  ![../images/509947_1_En_7_Chapter/509947_1_En_7_Fig6_HTML.jpg](img/509947_1_En_7_Fig6_HTML.jpg)


  图 7-6


  代理 vs. 旁路采集


  团队最终以真正“角斗士”式的方式，决定将两种方案都推进到预发布（staging）环境。这使我们能够在 API 需求逐步明确、性能测试结果逐步可用的过程中，灵活选择最佳方案。


  从传统应用开发的视角看，这似乎极其低效。而我认为这恰恰是我们 Marketplace 最大的优势之一。灵活的架构，再加上一支高度敏捷且能力出众的团队，使我们能够构建并测试多种方案，从而确定应采用的最佳路径。




  ## 生命周期


  设计过程代表了 API 产品的胚胎阶段；它将成长、变化、老化，并最终走向终止。如果我们以这种方式看待 API 产品，就能获得让其持续演进并不断改进的灵活性。对接口的变更应当谨慎进行，因为这会影响
  API 的使用方。还有其他一些维度也需要考虑，而且这些维度既可以也应该发生变化。我们将在以下章节讨论其中一部分。


  ### 开发者体验


  来自 API 真实使用者的反馈，是设计流程中极其关键的输入。一个由后端团队、法务与合规部门批准，并由技术团队交付、但对终端用户几乎没有价值的 API 产品，只会被束之高阁，等待“最佳使用期”到期。遗憾的是，我们的
  Marketplace 中确实有属于这一类的 API 产品。在构建 API 的过程中，很容易掉入“只要你构建了，他们就会来”的陷阱。一个早期预警信号是：很难找到
  API 能支持的真实用例。请站在第三方使用者的角度，严格评估它是否真的能帮助你达成某个明确结果。如果你自己都难以完成这项评估，那么第三方很可能也会遇到同样的问题。


  应尽早向潜在第三方征求关于需求和采用意愿的反馈。在 Marketplace 的早期阶段，这可能会有挑战，因为开发者社区本身仍在形成中。第三方采用也是流程的第一步，而这种关系需要持续投入和维护。在初始阶段，可通过文档、指南和教程帮助对方理解
  API 的功能与用法。随着采用率提升、API 获得更多认可，可以为 API 产品增加更多能力。例如，一个保险 API 产品可能先从提供个人保险保障报价开始。后续迭代可加入报价接受与保单签发。再之后，还可加入其他保障类型。也可以考虑增加理赔记录相关的修订与更新能力。


  正如这个例子所示，与其等待完整产品集全部可用，不如尽快发布 API 产品的一个修订版本。定义一个功能与特性上线时间的路线图会是加分项，但不一定是关键前置条件。也就是说，如果初始
  API 修订版本已经获得了强劲的第三方采用，这种势头可能会推动后端企业团队开放更多功能。这并不容易，但请尽量保持产品路线图的灵活性——更受欢迎或被频繁请求的功能，应当能够优先进入待办列表顶部。正如
  Consumption 章节强调的一条关键原则：*没有第三方消费，就不会有流量。没有流量，就没有收入。收入维系 Marketplace，而 Marketplace
  的存在是为了实现愿景。* 第三方与开发者的接受度及反馈，是设计流程中至关重要的组成部分。


  ### 版本管理


  API 最大的优势之一是可以同时存在多个版本。我首先要强调，这绝不意味着可以为糟糕设计开绿灯。发布 API 时始终都要保持谨慎并进行充分考量。版本管理本质上将使用方与提供方解耦，使双方都能沿各自的发布节奏前进。如果某个特定版本的功能仍能满足使用方需求，那么就不一定需要迁移到后续更新。API
  的新版本也使提供方能够发布额外功能，并由一部分使用方率先采用。


  大多数 API Gateway 原生提供此能力，不同版本带来的复杂性通常在这一层栈中处理。小版本修订是对 API 的更新，不包含破坏性接口变更；每次部署后，所有
  API 使用方都会自动订阅到更新后的产品。如果存在需要使用方进行更新的变更，则会创建一个新产品，使用方需要重新订阅并更新端点配置。


  在新增 API 版本时，也必须考虑 Developer Portal 和配套文档的相应变化。随着平台成熟度提升，应发布每次更新的 Release Notes，覆盖从小版本到中版本再到大版本的变更细节。这也是向外部开发者社区传递
  Marketplace 透明度的一个信号。


  一种对我们的实施帮助极大的做法是：仅向一部分外部使用者提供新版本的早期访问权限。这不仅能帮助我们判断消费行为，也能识别覆盖缺口——无论是 API 功能、文档，还是理解层面上的缺口。需要提醒的是，这同样是非常耗时的工作，因为它往往是“多对一”的投入。这里的“多”，指的是交付团队中的许多成员，需要共同支持那“一位”因变量拼写错误而无法消费
  API 的外部开发者。


  最后我想强调，API 的身份应保持不变。版本管理应像望远镜的不同镜片，用于调整对比度与焦距，让产品呈现得更清晰。如果产品存在显著差异或方向变化，那么创建一个变体，甚至一个全新产品，可能是对使用方更审慎、也更负责的做法。




  ### 生命周期终止


  我最近收到一封来自某后端团队开发经理的邮件，令我非常震惊。内容如下：


  *   *主题：停用 <System> API v1 和 <System> SOAP v5、v6、v7*


  *   *正文：*


  *   *大家好，*


  *   *我们计划在 <date – in 10 days> 于生产环境中下线旧版本的 <System> SOAP 和 API。*


  *   *这些版本在 DEV、TST 和 QA 环境中已经停用超过一个月。*


  *   *如果您对下线这些版本有任何顾虑，请联系我以及……*


  我的第一反应是恐慌，我立刻疯狂检查我们集成组件中的最新代码，以确认我们平台正在使用哪些版本。很快我就松了一口气，因为我们幸运地分别使用的是 API v3 和 SOAP
  v8。随着肾上腺素带来的冲击逐渐消退，放松感又被愤怒取代。虽然目前我们的平台是安全的，但对于一个关键南向提供方来说，这种服务方式极其糟糕。试想某个应用在生产环境中仍使用旧版
  API，且过去一个月并没有测试需求。如果这个应用处于纯运行状态、没有开发能力，那么 10 天后它就会遭遇一场“当头棒喝”。


  这是该提供方极其冷漠且不负责任的行为。如果确实有迫切需要在短时间内淘汰旧版接口，提供方有责任先根据 API 订阅或安全访问配置整理出消费方清单，再逐一直接联系并确认旧版本可以下线。仅仅发一封“10
  天后 API 版本退役”的通知邮件，完全不是可接受的做法。


  这正是“临时拼凑式”API 的后果：可能只是为了满足某个特定消费方需求而构建，却没有定义生命周期。API 的停止支持/退役日期，必须在其诞生时、发布时或新版本发布时就清晰定义。这与任何商业软件发布实践一致。它体现了提供方承诺在特定时间前持续支持该产品，也使消费方能够规划从该版本迁移。我认为这体现了成熟度，也是信任的基础，而信任正是
  API Marketplace 的关键根基之一。


  请记住，第三方消费方在决定将你的 API 用于其应用、产品或服务时，是在做一个重大决策。他们在启动阶段很可能有开发资金投入。通过清晰提供 API 可用时间线信息，消费方就能将其纳入财务、业务和开发规划之中。


  ## 设计指南


  就像学徒在导师指导下、通过经验不断变得更熟练一样，你的团队也会很快在 API 定义方面持续进步。作为这个过程的一部分，有一些普遍接受的指导原则与标准需要考虑。它们与平台和产品无关，几乎可应用于任何定义。从
  Twilio 到 Facebook 再到 Google，都有优秀的 API 平台示例和参考。在为你的 Marketplace 定义标准与约定时，这些都可作为指南。下面章节中我们将讨论其中一部分。


  ### 错误处理


  向消费方返回错误信息是 API 的关键要素。如下所述，HTTP 状态码通常被视为返回 API 调用执行结果的最佳实践：


  *   **成功**：请求成功处理以 2xx HTTP 响应码表示。最常见的是 200 OK。其他码如 201 表示资源已创建，204 表示请求已成功处理，但未找到结果。


  *   **客户端错误**：客户端错误以 4xx HTTP 响应码表示。这类错误说明客户端请求有问题，例如缺少必填参数或认证失败。问题必须在客户端应用修复后重新提交。


  *   **服务端错误**：服务端错误以 5xx HTTP 响应码表示，需要由提供方解决。可能原因包括下游系统故障。客户端可持续重新提交/重试请求，直到成功。


  作为起点，你可以先使用以下状态码，并按需扩展：


  *   200 – OK


  *   400 – Bad Request


  *   500 – Internal Server Error


  状态码主要供机器消费。还应包含提供更多错误信息的消息。尽量包含尽可能详细的问题信息。


  例如，如果请求因缺少必填参数而无法处理，应明确指出缺少的是哪些参数名。这不仅能帮助开发者定位根因，也能减少支持团队处理潜在求助请求的压力。


  注意不要在响应消息中泄露内部系统信息。例如在错误消息中包含堆栈跟踪。这会暴露内部实现细节，削弱 API 安全性，并可能带来安全风险。


  ### 过滤与分页


  始终应努力从性能角度设计接口。不断提升的网络和 CPU 速度，可能导致接口开发时忽视了对消费方和提供方的负担：前者收到超大数据集，后者承受范围过广的查询。根据我在运维中间件环境中的经验，处理请求的线程数量是有限的。请求到达后，会从线程池分配一个工作线程进行处理。你需要尽最大努力让该线程尽快回到线程池，以便处理更多请求。如果所有工作线程都忙碌，请求就会开始排队。请记住，在消费方看来，请求从发起那一刻起就是“进行中”。如果请求在被处理前先进入队列，可能导致消费方超时。


  团队中的 DevOps 工程师可能会插话说，容器化平台可以轻松横向扩展以应对高流量。这一点没错，但请从后端提供方视角看问题。该提供方可能并不具备可扩展的容器化平台，也可能同时在服务多个其他渠道。来自你
  Marketplace 的突发请求，可能导致其系统高负载、交易失败，甚至系统中断。作为 API 设计者，你最重要的职责之一，不仅是保护你自己的平台，也要保护支撑它的相关平台。


  实现这一点并提升性能的机制，是指定请求过滤条件并对响应进行分页。过滤可帮助阻止过于宽泛的查询到达下游系统。`limit` 和 `offset` 便于开发者对对象进行分页。这也会带来更可预测的执行时间，因为处理时长不再直接依赖于数据集大小或查询复杂度。




  ### 软件开发工具包（SDK）


  在处理第三方关于我们 API 的请求时，我经常需要停下来，从外部使用者的角度审视问题。随着我们每天越来越深入技术细节，处理接口的某些方面几乎会变成机械操作，而一些复杂概念或功能也可能被想当然地认为很容易理解。一个机械操作的例子是在客户端应用中配置安全证书。这个挑战是团队多年前就已克服的，任何开发者都可以轻松从我们的代码仓库中获取示例。尽管我们希望开发者社区能够自给自足，并熟悉像
  StackOverflow 这样的资源，但我们的目标是尽可能提升并加速开发者体验。为了进一步支持外部使用者，还请记住：技术团队可能只有一名开发者。


  一种方式是提供代码示例和教程，细致地一步一步描述整个过程。另一种策略是提供一个封装 API 的 SDK，它能显著帮助开发者理解你的接口，并带来以下好处：


  *   **简化集成**：证书配置、超时和异常处理等复杂性都可以由 SDK 抽象掉。


  *   **统一消费方式**：由于 SDK 是入口点，它可以一致地执行 API 使用相关的策略和规则。还可以加入客户端校验，以缓冲格式不良请求对 API 的影响。


  *   **原生语言支持**：SDK 可以像添加一个软件包一样轻松集成，并可直接在原生代码中使用。无需 HTTP 客户端，也不需要对请求和响应进行编组。HTTP
  状态码可以作为异常返回。


  需要注意的是，SDK 并非银弹。在采取这一措施之前，必须清楚理解支持与持续维护客户端代码所需的投入。


  ## 总结


  API 设计是构建 Marketplace 过程中最令人兴奋、但有时也最让人不知所措的领域之一。在本章中，我们讨论了 API 的定义与目标如何被组织战略以隐性或显性的方式影响。我们强调了用于筛选、理解和支持设计过程的关键考量。我们还回顾了访问机制——传统、当前与未来——分别是
  SOAP、REST 和 GraphQL。关于实现、API 生命周期和指导原则的模式也进行了讨论。贯穿设计哲学的黄金主线是：Marketplace 是组织的延伸，而其
  API 是组织身份的映射。


  设计阶段的产出是 API 蓝图，而该蓝图将作为开发阶段的输入，这也是下一章的主题。在传统瀑布式软件开发生命周期中，这两者是界限清晰且彼此分离的阶段。架构师将接力棒交给开发者，然后回到他们的“象牙塔”去思考下一个棘手的业务需求。在敏捷交付模式中，设计者深度参与交付能力——在我们的项目里，设计者和开发者往往是同一批人。这使得
  API 产品的整体交付可以采用迭代方式推进。


  '
- '# 8. API 开发


  在软件开发生命周期的所有阶段中，开发是我最喜欢的阶段。正是在这一阶段，设计与设想被注入生命，各种假设也终于可以被验证。与其他软件领域不同，在 API 语境下，实现的复杂性被接口所屏蔽。任何经验丰富的集成工程师都会确认，接口让团队能够在开发完成度上保持“扑克脸”。在许多项目中，我有时会发布一个“薄如蝉翼”实现的
  API，要么是为了摆脱一个近乎疯狂的项目经理所主导的关键路径，要么是通过展示“已准备好集成测试”的姿态来虚张声势，把压力转移给使用方。


  这一阶段并非没有挑战。在搭建两个系统之间“桥梁”的过程中，常常会慢慢意识到：集成复杂度远超预期。任何资深集成工程师也都会承认，在连接点缺少所需信息是令人恐惧的。这就像你在收尾一幅
  10,000 片拼图时，发现少了 3 片一样。更糟的是，这通常还发生在那些实现“薄如蝉翼”的方案上！


  在我的职业生涯中，我发现开发这趟过山车从不走同一条路线。这或许正是我热爱集成工程的首要原因。从一开始与外部团队代表的友好会面，到开发者之间充满技术术语的交流，再到为解决问题而在团队间爆发的激烈讨论；从与网络安全团队进行必要的协调外交以解除防火墙阻断，到第一次系统握手成功时的肾上腺素飙升，最终到看到它在生产环境中运行时的如释重负——总会有变化，让这一切始终令人兴奋。本章中，我们将深入探讨若干支持
  API 开发的关键领域细节。




  ## API 优先，技术其次


  在我职业生涯的早期，我曾深深迷恋 Java。更具体地说，是 Java Enterprise Edition（JEE）。我曾梦想着各种 bean——Enterprise
  Java Beans（EJB）——并且乐于与志同道合的朋友和同事进行长达一小时的讨论，辩论无状态会话 bean 相比有状态会话 bean 的优势，同时也对消息驱动
  bean 的并行处理能力颇为欣赏。经历了几次角色转换之后，我意识到自己把关注焦点调到了最大放大倍数，以至于看不到更大的全局。


  简而言之，集成需求的首要目标不是应该*如何*实现，而是*为什么*要实现。对开发团队来说，这可能是个很难接受的信息——但 API 消费者真正期待的只是对请求的响应。消费者其实并不关心实现细节——请求究竟是通过最新的人工智能（AI）云产品处理，还是通过几十年前的大型机处理，并不重要。最核心的目标是一个一致且可靠的接口。


  面对当今丰富多样的技术选项，人们很容易一头扎进“兔子洞”，试图寻找最优、甚至可能是最前沿的实现方案。在一个正在兴起的 API 市场中，尤其是在数字化语境下，这种倾向很容易成为常态。尽管我也很享受折腾新技术，但在方案设计时我强烈建议保持克制。始终要记住，技术是为达成目标而服务的。


  一个我很喜欢的例子是实现一个用于获取参考数据的接口。为了让这项看似平淡的任务更有趣一些，积极的开发者可能会尝试缓存响应。策略往往从一个简单的内存缓存开始，这在单实例场景下运行良好。但如果是分布在集群不同节点上的多实例呢？缓存是否需要数据持久化（这可能需要
  Redis 之类的技术），还是仅基于内存（这可能需要 Memcached）？既然这是第一次实现缓存，方案应该部署在哪里？本地部署还是云上？缓存失效策略怎么办？我们应当如何、又在何时清理缓存中的陈旧数据？尽管这些目标本身合理，但你可以看到
  API 的关注点如何从参考数据的*获取*偏移到了数据的*缓存*上。


  我多次观察到，次要和非核心目标如何影响并拖慢需求交付，因为这些任务已经被嵌入进了解决方案之中。在敏捷环境下，目标是尽可能快地发布一个最小可用、具备功能的方案。注意，这与“薄如蝉翼”的实现不同——后者本质上只是一个带有模拟响应的接口。


  回到参考数据这个需求，第一轮迭代要尽快上线，应该先做纯粹的数据获取。通过暴露一个能对请求做出响应的 API，即便延迟较高，消费者也能先感受到集成流程——从接口规范到返回数据。即使在设计阶段或后续性能测试中已经提出了性能优化需求，这种策略也应坚持。如果在更好性能和更快开发之间二选一，在紧迫交付周期下，项目经理很可能会选择后者。对于性能需求，一个折中方案可能是在客户端实现缓存。


  这一理念很大程度上借鉴了 Facebook 的一句格言：


  > *完成比完美更好。*


  要克制在接口生命周期早期就进行优化的诱惑。从简单开始，持续迭代。聚焦核心任务，例如从源到目标的映射。*识别*可改进区域，例如用于性能优化的缓存、分页和过滤。同时，也务必考虑其他可能没那么“有趣”的领域——例如安全、校验和错误处理。即便只是开发环境中的一个可运行
  API，也应在产品负责人和工程负责人的协助下对需求进行优先级排序。基于多年的经验，我非常确信：安全性、可靠性和一致性通常会优先于性能。请始终将 API 的目标置于焦点之中。


  ## 团队结构


  与普遍认知相反，开发并不只是一个开发者在昏暗房间里独自敲键盘。借用一句非洲谚语“养育一个孩子需要整个村庄”，交付一个 API 同样需要团队协作。这个产品远不止几行代码，而是依赖于从设计到实现全过程中的以下角色。




  ### 交付负责人（Delivery Lead）


  交付负责人负责协调并安排构建产品的各项活动。这是一项具有挑战性的任务，需要在多个工作流之间进行细致协调，如图 8-1 所示，以确保能够满足时间计划。由于外部团队和系统可能提供关键依赖项，因此需要大量的沟通与协调，每个环节都必须被精心编排，以尽量减少延误。


  ![../images/509947_1_En_8_Chapter/509947_1_En_8_Fig1_HTML.jpg](img/509947_1_En_8_Fig1_HTML.jpg)


  图 8-1


  API 开发编排


  让我们来看一看某些外部实体如何参与开发流程，以及交付负责人的职责：


  *   **提供方（Provider）**：将提供现有接口的规范、新接口开发的时间计划，以及可用于解答开发者问题的领域专家资源。来自后端的任何延迟都可能影响开发和测试活动。


  *   **消费方** **（第三方提供商）**：将请求 API 产品规范以及可用性时间计划——无论是在沙箱环境（后续章节会讨论）还是生产（Live）容量下——并与产品负责人协作协调接入活动，例如审查与审批，以预先规避行政流程延误。


  *   **财务与报告**：预测产品交付时间线以及来自外部团队的潜在成本回收，管理 API 交付与所构建产品运维支持的预算，并向项目干系人定期汇报交付情况，同时管理其对时间计划的预期。


  *   **开发**：通过在开发开始时提供已批准的设计和后端接口规范、提供对领域专家的访问以快速解决问题，以及提供对企业资源的访问，确保开发人员拥有一条平稳且不中断的推进路径。


  由于在任何时点都可能有多个 API 处于开发中，交付负责人需要对多个产品有全局视角，并可能会将某个产品的交付优先级置于另一个之上。例如，如果一个更紧急的 API
  需要额外开发人员，团队可能不得不进行重新平衡。


  基于多年的项目经验，一个宝贵的教训是：你能投入到一个问题中的人数是有上限的。也就是说，有些任务需要特定的时间，增加团队成员并不能更快完成。团队管理层必须理解并认同这一点，因为“人多反而坏事”（too
  many cooks spoil the broth）这句谚语很容易应验：为新成员补齐背景需要耗费时间，而任务拆分还可能带来依赖关系和预算超支。


  由于需要同时处理多项事务，在我们的实施中效果非常好的一种策略是：将交付负责人角色分配给不同个人，分别侧重商务或技术方向。这样我们可以让一个人专注于追踪财务和风险等商务目标，另一个人专注于完成架构与安全审批等技术目标。两者之间有重叠区域，这减少了对单人交付的依赖——偏技术的负责人可以借助项目发起人的支持；同样，如果其对应负责人暂时不可用，偏商务的负责人也可获得工程团队支持。我喜欢把他们称为“动态双人组（dynamic
  duo）”，他们确保交付光谱中的所有需求都被考虑到，从而使我们的项目保持平衡。


  ### 开发人员（Developers）


  集成开发从其本质上看通常节奏很快，因为两个系统之间的接口往往处于整个项目交付的关键路径上。传统项目时间线通常以“月”为单位，而我们的交付目标是冲刺（sprint），最短可能一周，最长两周。其驱动因素在于第三方消费方通常也处于高速节奏环境中，发布周期更快，因此上市时间（time
  to market）成为关键因素。


  我们应对快速交付周期的理念是：在每次发布中对 API 产品进行迭代。也就是说，我们不等待三个月后进行一次“大爆发式（big-bang）”上线，而是先提供基础功能，并在每次部署时持续更新。这确实会给开发增加一些复杂性，因为在推进新版本工作的同时，可能还需要修复或更新前一个版本。


  在开发者旅程中有很多方面需要考虑。下面列举一些我认为成功的关键点。


  *   **主人翁意识（Ownership）**：我们的开发团队中有相当一部分是全栈工程师。某些细分技能开发者有时是必要的，但开发者应具备解决其直接专业领域之外问题的能力。举例来说，开发者可能会建议修改
  API 定义，并提交 swagger 更新供评审。主人翁意识的关键在于*及时*沟通。由于开发可能跨越一系列系统和人员（如 API 网关、微服务和数据存储），沟通是成功交付的关键。在以“周”为单位衡量的交付周期中，如果等到下一次团队会议才报告问题，损失的几个小时就可能导致错过目标日期。强烈鼓励团队成员在可能的情况下先自行尝试解决阻塞问题；如果无法解决，再升级寻求帮助。诚然，某些挑战（例如访问后端领域专家）可能无法自行克服。在这些情况下，团队文化应当是灵活转向（pivot）——做出合理假设并继续推进，暂停当前活动并转向无依赖任务，或向团队其他成员发送消息，表明自己可以协助其他任务。


  *   **单元测试（Unit testing）**：在敏捷、快节奏的交付环境中，为实现激进交付时程，良好且充分的单元测试可能会成为被牺牲的一环。在很多实施项目中，我都观察到人们常把这个“问题”往后拖，开发者寄希望于后续质量保障阶段再识别并解决问题。团队就单元测试的覆盖水平作出一个全局且有意识的决定非常重要。在大多数情况下，*减少*单元测试是交付压力所致。项目干系人必须理解单元测试是开发流程中的关键要素；如果为了更快交付而将其短路，也必须承担相应责任。另一种缓解方式是正面应对而非忽视问题。也就是说，早期迭代可以先发布基础功能，并以
  beta 版本标识；而在周期后段的计划发布中，明确聚焦测试与质量保障。这一策略可以缓解交付压力——尽快推出一个版本，但同时对全面发布前加固方案作出明确承诺。




  *   **文档**：为安抚交付之神而做出的另一项牺牲，是将规范文档编写延后。坦率地说，即便时间充裕，也未必能让开发人员产出高质量文档。在传统的瀑布式项目中，技术设计稿完成之前，连一行代码都不会编写。而在敏捷的数字化交付环境中，原型往往在需求尚未被完整梳理前就已上线运行，并且解决方案与实现方式始终可能变化，直到并包括生产部署阶段。因此，开发人员有时不愿记录开发过程，因为它是流动变化的，并且在其生命周期中可能不断调整。一种做法是接受这种现状，并采用“文档即代码”的策略。另一种做法是在团队协作
  Wiki 上创建一个简单模板，只要求最少但关键的信息，例如源系统与目标系统之间的映射规则。关键在于，开发方法论必须相应调整，以支撑所选策略。由团队负责人（Team
  Lead）对文档进行评审与批准，应成为进入下一交付阶段关卡的关键要求。若缺乏必要的制衡与校验机制，就会导致文档质量低下甚至没有文档的可能性。


  每个团队都会根据所在组织形成自身版本的开发实践。至关重要的是，所有内部和外部干系人都要达成一致，并且开发人员要在规划会议中管理好各方对解决方案交付水平与质量的预期。如果时间线被压缩，团队所有成员都应知晓并接受：测试、文档等环节需要后续再补充完善。与其忽视这些问题，不如在一开始就提出并以团队方式进行规划。我们实施成功的关键之一，是把开发视为一项团队协作工作。


  ### 质量保证


  这是我们交付流程中最关键的支撑支柱之一。为体现其重要性，QA 或测试工程师可以行使否决权来阻止发布。由于交付目标激进，开发人员往往在“真空”环境中测试，且主要覆盖理想路径（happy-path）场景。集成测试可能是该方案第一次在不同系统与多种上下文中被验证。


  作为测试工作的一部分，方案必须接受多层次审查，涵盖标准场景、错误场景和异常场景。标准、功能与错误条件可通过提供一系列有效与无效输入来模拟。异常场景的模拟可能需要中断到后端的连接组件，以观察应用行为。可测试场景与条件的一个关键输入来源，是运维团队基于常规生产发布经验提供的建议。


  随着我们在一段时间内显著提升测试能力，我们现在还会考虑以下子领域：


  *   **安全**：在信息安全团队近期进行的一次应用扫描中，我们收到了一份近 100 页、措辞严厉的报告。复盘后我们发现，只需改进一个输入字段的校验，就能解决其中
  70 页的问题。其余问题此前已在其他 API 上识别并讨论过。基于这一经验，我们团队决定将安全扫描纳入内部测试评审与批准流程的一部分执行，以便团队能够提前处理问题。需要强调的是，这并不意味着安全评审到此结束。在新的
  API 产品获准发布前，企业信息安全团队会委托外部服务提供商开展详细的安全评估，以确认是否存在漏洞。


  *   **性能**：半开玩笑半认真地说——在集成语境下做压力测试可能会变成一项“很有压力”的活动，因为这需要下游服务提供商共同参与。API Marketplace
  组件的性能测试应定期在回环（loopback）环境或带模拟后端的环境中进行。与真实后端联调的测试也应排期执行，至少每季度一次。这将确保端到端价值链上的所有环节都能承受“黑色星期五”等峰值事件带来的负载。


  *   **自动化测试**：遗憾的是，这对测试团队构成了一个典型的两难困境（catch-22）。自动化测试无疑能节省大量时间，尤其是在回归测试活动中。但在节奏狂热、多个测试任务并行推进的环境里，自动化测试工作通常会被延后。自动化测试必须成为团队文化的一部分，因为其执行是持续集成（CI）/持续交付（CD）流程的核心要素。这也是为什么
  Netflix 等组织能够频繁向生产环境发布的主要原因。


  ## 交付方法


  我们的 Marketplace 诞生于组织有意识转向更敏捷交付模式的时期。新的工作方式（Way of Work）很快建立起来，早晨站会时，过去沿用更传统方式运作的业务单元围在看板（Kanban）前协作，已不再罕见。我们的交付理念始终基于敏捷原则，并且随着时间推移不断调整和定制方法，以满足独特需求。


  Marketplace 最初的策略更偏战术层面。团队的首要目标只是先把 API Marketplace 上线，并期待第三方提供商会随之而来。因此，交付目标和冲刺目标在技术上高度聚焦，这让团队始终忙碌，但对平台建立迫切需要的“根基”帮助有限。


  项目曾配备一名专职产品负责人（Product Owner）试图转移重心，但常常被一个固执的技术团队所压制。幸运的是，该平台后来被认定为更大组织目标的赋能器，这一定位在运营上要求更完善的流程与结构，在商业上要求更明确的方向与聚焦。这也促使我们必须更好地进行规划，并更高效地使用时间、开发产能和预算，以实现
  Marketplace 的战略目标。


  以下章节将详细说明我们目前仍在持续演进的流程：当需求进入其生命周期中的交付阶段后，我们如何进行处理。




  ### 制定战略


  在每个新季度开始时，项目负责人会与团队的高级成员会面，以便：


  1.  提供组织范围内的计划与目标视图。由于企业和各事业部有许多并行项目在进行，这有助于洞察 Marketplace 如何融入更大的整体格局。


  2.  回顾上一季度的进展，并评估该平台在本财年规划路线图中的位置。


  3.  识别潜在风险和改进领域，以优化解决方案交付与运营能力。


  4.  为未来季度定义目标，并结合团队各领域的输入确定目标优先级。


  这些会议的目的，是在高层面定义下一季度的战略目标，并与其他外部计划保持一致。该过程也具有高度协作性，致力于找到平衡点：既让已规划的计划能够不中断地持续推进，也让
  Marketplace 在未来机会面前处于有利位置。


  在后续更高频的规划会议中（下一节将说明），这些已勾勒的目标会被当作“指南针”，以确保我们的方向正确、平台朝着正确方向前进。团队文化也允许在必要时更新目标。也就是说，如果组织需要调整重点，以交付更高业务或客户价值的需求，团队领导层将重新召集会议，决定如何实现。


  ### 规划


  在实施早期阶段，规划往往是全天进行，且全员参与。其目标是让团队所有成员都能了解即将到来的需求，并征集反馈与任务规模评估。初衷虽好，但结果是团队通常会损失一个完整的
  sprint 工作日，而且往往仍需在会后继续调研任务才能给出估算。作为当前流程的一部分，工程负责人会在设计阶段编制高层级的影响评估（IA），并在需要时由团队临时协助解答技术问题。IA
  会给出所需时间与资源投入的指示，据此可确定成本估算。


  由于实际开发时间非常宝贵，我们尽量少占用这部分时间，仅在必要时才要求技术团队参与会议。为此，规划工作被拆分为两轮。


  第一轮中，平台负责人、产品负责人、交付负责人和工程负责人会面，讨论即将到来的几个 sprint 的交付目标。该目标必须与季度战略目标保持一致。需求也会被排序优先级，并初步指明由哪位开发者负责哪项任务。


  在获得这一视图后，会安排第二场与团队的会议，以传达下一个 sprint 的目标。大多数情况下，这并不是团队第一次接触该需求，因为他们的意见已在影响评估活动中被纳入。由于目标定义清晰，会议更聚焦，开发者无需经历冗长的优先级与战略争论。在该会议中，工程负责人还会提供解决方案的详细拆解以及明确的完成定义。某项需求很可能会被拆分为多个阶段，团队对此决策也会有清晰认知。团队成员可以就目标提出关切，并指出即将开展工作中的风险和潜在问题。这使交付负责人能够更清楚地掌握即将交付内容，并启动措施来缓解潜在风险与延误。


  如表 8-1 所示，在任意时点都可能有多个计划处于不同状态并行推进。


