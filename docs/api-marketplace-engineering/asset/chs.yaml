  ### 敏捷方法论


  交付是在一个冲刺周期（sprint）内完成的——这是一个短期、时间受限的阶段，最短一周，最长两周。如图 8-3 所示，功能是分阶段发布的。分阶段方法基于“频繁发布（Release
  Often）”原则。我们发现，长期停留在开发阶段的解决方案，随着来自不同需求的变更不断作用于共享组件，往往会变得更加复杂。一个明显迹象是生产版本与测试版本开始出现显著偏离。例如，生产环境是版本
  2.04，而测试环境是版本 2.17。偏离越大，说明已应用的变更越多，从而提高发布风险。


  ![../images/509947_1_En_8_Chapter/509947_1_En_8_Fig3_HTML.jpg](img/509947_1_En_8_Fig3_HTML.jpg)


  图 8-3


  冲刺方法


  从发布角度看，我们会在每个冲刺结束时部署到生产环境。由于可能存在多个并行推进的项目，团队目标是至少每月一次让生产与 QA 环境保持一致。如图所示，为了应对更新后的业务需求或第三方需求，冲刺周期也可能缩短。更快的交付周期同样支撑了我们的“向前修复（fix-forward）”策略。如果在新版本部署后、运行环境中发现问题，我们会尽可能快速修复问题，而不是回滚。API
  的版本化为我们提供了这种“从容空间”，因为运行环境中可能同时存在多个活跃版本。


  ## DevOps


  很多年前我第一次接触“DevOps”这个术语时，曾开玩笑说我参与过的很多项目团队其实早就在这么做了——开发人员直接在生产环境写代码修复问题。如今，借助与专家共事的经验，我理解并认同这确实是软件开发生命周期中一个全新且关键的领域。DevOps
  的*实践*如今已成为我们 Marketplace 持续成功的基础。


  在实施初期，这只是一个愿景目标，因为交付团队当时采用的是手动部署流程。正如前几章所述，项目非常幸运地在一段时间内拥有经验丰富的 DevOps 工程师，这极大加速了我们的进展。通过观察这些大师施展技艺，我现在把
  DevOps 工程看作“基础设施魔法”——它可以用一句魔法咒语（也就是 Terraform 脚本）创造新世界，在我们的场景里即创建新环境。这个范式的实践与收益已被充分阐述。在接下来的章节中，我将重点说明
  DevOps 如何支持我们的开发流程。


  ### 持续集成（CI）


  在实施初期，Marketplace 只包含少量微服务——一只手就数得过来。每个人都很熟悉它们，而且每个服务都由特定开发者编写。到了集成测试阶段，我们这个地理分散的团队所有成员都会加入语音会议，有时会持续一整天。团队会紧张地盯着屏幕共享，看被指定的“部署”工程师执行一连串晦涩命令，把所需代码元素部署到测试环境；当发现缺少配置参数时大家会沮丧叹气；最终在测试工程师发出“全部通过”信号后才松一口气。这就是我们（手动）持续集成流程的第一个版本。


  随着本地部署的容器平台被重建，这一流程几乎在一夜之间完成了演进。作为重建的一部分，部署流程也发生了巨大变化。突然之间，代码提交会触发流水线，自动构建并部署到下一个测试环境。一旦在低层测试环境确认功能无误，开发者会发起一个拉取请求（pull
  request），且必须经过评审与批准，代码变更才能合并到主分支。这个动作还会触发更高层流程，将组件部署到预发布环境（staging）。部署流程不会立即将其设为活动版本。此时需要向“中土世界巫师”甘道夫——一个聊天机器人——发送即时消息（IM），然后它会“施法”更新
  Kubernetes 集群配置，把请求路由到新版本。甘道夫只接受团队中特定“霍比特人”的指令，这既维护了发布流程的严谨性，也能在出现问题时快速协助回退到先前版本。


  这个部署流程以简洁取胜，屏蔽了开发团队无需直接面对的大量后端复杂性，并引入了一个明确、可重复、可靠的流程，用于在各环境之间迁移代码。如果部署或测试因配置参数缺失或代码缺陷而失败，就会迫使问题在源头被解决——进而再次触发流水线和流程来完成修复。我们的实施非常幸运，仿佛得到了来自未来、穿越时空而来的
  DevOps 工程师帮助。当他们突然离开后，所有时间红利也随之消失，团队不得不自行支持并更新这个看似复杂的发布流程。


  我希望从这段经历中传达的关键经验是：以迭代方式构建你的 CI 流水线。先以“绝不手动部署”这一基本原则打好地基。然后先落地一个简单流程，再持续迭代。市面上有很多优秀的开源
  CI 工具，比如 Jenkins，以及可部署到本地基础设施的云服务方案。


  当你建立起一个简单、稳定、可重复的流程后，再逐步引入版本管理、聊天机器人和自动化测试等要素。自动化测试对持续交付至关重要，下一节将展开讨论。




  ### 持续交付（CD）


  在我们的发展过程中，某个阶段一位过于热情的工程师在流水线中加入了若干额外校验，导致流程停滞。开发人员向来勤勉，团队也找到了绕过这些校验的方法。增加额外校验的初衷是高尚的，而且如果严格执行，确实能够在目标环境中产出更高质量的代码组件。遗憾的是，坦率地讲，团队的开发成熟度尚未达到所需水平。


  任何读过介绍 Netflix 发布流程博客的人，都会希望在自己的开发环境中复现同样的做法。老实说，代码提交后 16 分钟就能部署到生产环境，这样的愿景依然是我们努力追求的乌托邦。需要牢记的是，这一流程可能经历了很长时间才得以实现，它之所以可行是因为
  Netflix 的系统架构，并且可能得到整个企业的全面支持。拥有一个流畅的持续交付（CD）流程一直是我们的关键愿景目标之一，但也要注意你所在组织的实际背景。作为一家成熟企业，我们必须在每个发布阶段遵守严格的治理关卡。此外，我们还依赖一些采用传统机制（即手动部署）的外部系统。而且客观来说，金融机构所需的服务等级可能比
  Netflix 严格得多。


  我在这方面的建议是：聚焦并优化你能够掌控的 CD 流程阶段。任何面向生产环境的部署——更不用说自动化部署——都承担着重大责任，必须以高度谨慎和充分考量来执行。自动化部署流程只有在整个交付团队共同承诺的前提下才能实现。当开发人员使用新的外部代码包时，应将企业级安全扫描纳入构建流水线，以识别潜在漏洞。开发人员还必须在提交中包含详尽的单元测试，并在流水线中执行。必须纳入代码覆盖率工具，以确认单元测试的充分性。质量保证团队必须基于业务需求场景创建新的自动化测试脚本，而不是简单重复开发人员的单元测试。在自动化单元测试和功能测试成功完成后，整个团队应当具备足够信心批准该组件进行部署。CD
  相比赋能技术，更关乎人员与流程。


  ### 微服务


  近期对一个批量同步方案进行的复盘提供了很好的示例：该方案为解决运维问题逐步演变成单体，而微服务方法如何赋能 DevOps 在其中体现得非常明显。图 8-4 左侧展示当前（As-Is）方案，右侧展示建议的目标（To-Be）设计。


  ![../images/509947_1_En_8_Chapter/509947_1_En_8_Fig4_HTML.jpg](img/509947_1_En_8_Fig4_HTML.jpg)


  图 8-4


  单体 vs. 微服务


  将方案拆解为更小组件有多方面收益。从设计角度看，通过引入消息平台，它可以将流程执行从同步模式转为异步模式。更重要的是，从 DevOps 角度看，它将运维控制权和能力从开发转移到运维团队。按照旧流程，方案的原始开发者总是需要参与性能问题讨论。新方法使
  DevOps 团队无需任何开发变更即可扩展运行时方案。并发可通过配置控制，例如指定消息队列消费者数量。与源系统和目标系统的连接也可以独立扩展，即依据定义的服务等级增加中间件微服务
  pod 的副本数。因此，DevOps 并不局限于基础设施自动化供给和 CI/CD 流水线——它也是详细方案设计中的关键考量。


  DevOps 是一种*实践*，必须成为团队精神与文化的一部分。它贯穿旅程中的每一步——我们会在后续章节讨论监控与日志，这是运维领域另一个关键支撑要素。从团队资源配置角度，务必至少配备一个，可能两个，专职
  DevOps 工程师角色。建立并持续迭代 CI/CD 流程是重要的基础要素，而且在开发生命周期尽可能早的阶段就应具备一个简单、基础的流程，以防止出现手动部署的可能性。


  ## 应用开发


  正如在介绍我们平台架构的章节中所述，我们在微服务组装方式上经历了多轮迭代。随着不断发现实现目标的更新、更优方法，这仍是一项持续进行的工作。以下各节详细说明了我们在构建支持
  Marketplace 产品实现时所采用的流程与技术方法。


  ### 开发指导


  基于多个已进入运维环境的解决方案经验，我想强调：在整个开发过程中与开发人员保持持续沟通至关重要。敏捷环境节奏很快，有时这会导致一定程度的混乱。一旦 API 设计完成、集成方法确定，工作就会移交给开发团队进行构建。


  在这个阶段，工程负责人必须将愿景清晰传达给开发人员，确保方案按正确模式落地。我喜欢把这个过程称为“描准目标（painting the target）”。它类似军事中的做法：战场上的步兵用激光标记目标，数百英里外发射的导弹便可据此制导命中。由于团队很可能地理分散，甚至跨洲跨时区，因此不要想当然。组件图中两个方框之间的一条连线，开发人员可能会有多种理解。例如，这种连接可以是同步或异步；也可以通过
  HTTP 或 gRPC 实现。


  开发人员可能并不知道另一个团队刚构建好的下游集成，从而在不知不觉中重复投入。务必在一开始就明确完成定义（definition of done），并在开发流程启动时以及每个
  sprint 的固定检查点安排详细的方案实现会议。


  在我参与过的最具挑战性的项目之一中，即使团队较为初级，一个效果极佳的方法是“四次站会，然后坐下来深度讨论”。每周末、即 sprint 进行到中段时，我们会与团队做一次详细评审，判断交付是否沿着正确轨迹推进。这类详细评审甚至可以深入到代码层面。定期检查点可以确保更早识别问题，并留出充足时间解决。没有定期评审时，问题最有可能在运维环境中才被发现。这是一个必须融入团队交付方法论的关键流程。请注意，这并非微观管理或不信任开发人员，而是呼吁团队中的资深成员对最终交付承担更多责任。




  ### API 网关


  我认为这个要素与国际机场的护照查验功能非常相似。来自不同软件供应商的每一种 API 网关产品实现，都可能具有其独特的一组特性与能力。对于我们的实现，我们经过慎重决定，采用标准的、原生能力，以便未来能够轻松迁移。促成这一决策的一个重要驱动因素是：网关基础设施是企业级共享服务，定制化可能会影响未来升级或其他租户。我们在
  API 网关开发中的关键原则如下：


  1.  **不进行转换或协议翻译**：网关的核心目标是代理 REST API。发布给第三方消费者的 swagger 定义与微服务保持一致——直接映射。


  2.  **定义良好的请求**：根据我在 SOAP 方面的经验，我曾尝试混入 *<any>* 类型的请求以加快开发。结果发现，通用负载几乎与 *<any>* XML
  请求一样被负面看待，而且我的建议引起了 API 网关技术负责人的警觉，并导致其对后续请求增加了审查力度。


  3.  **轻量化**：API 网关不是 ESB 或流程引擎，也不具备相同的时间容忍度。不存在长时间运行的流程。请求应尽可能快地处理。企业超时标准是 60 秒，这已经相当宽松了，尤其考虑到某主流云提供商
  API 网关 PaaS 产品是不可协商的 30 秒。务必记住，API 很可能支撑的是客户的数字化体验，而要留住受众，需要毫秒级响应时间。


  4.  **安全性**：可以通过控制订阅，为特定第三方授予某些 API 的访问权限。只有在第三方获得批准后，才能提供对“Live”API 的访问。有多种访问机制，从客户端标识符与密钥到基于令牌的访问。对于更敏感的
  API，还可以应用客户端证书和 jws-signatures 等额外控制。对开发流程最大的好处是，这些复杂性可以由网关产品处理，下游组件因此得到屏蔽保护。


  5.  **速率限制**：在拥有大量新第三方开发者的环境中，一个非常关键的优秀特性是对请求进行限流的能力。第三方可能会无意或有意触发大量请求——这可能导致拒绝服务、影响其他
  API 消费者，或淹没下游系统。通过指定并发请求数和设定时间窗口内的请求数，可以防止这种情况。这是开箱即用的功能，可通过配置更新实现，而非定制开发。


  ### 微服务


  图 8-5 展示了我们平台中的关键微服务类型、它们的交互模式以及平台服务的使用方式。为了更深入了解微服务内部运作，我将更详细地讨论这些组件。


  ![../images/509947_1_En_8_Chapter/509947_1_En_8_Fig5_HTML.jpg](img/509947_1_En_8_Fig5_HTML.jpg)


  图 8-5


  微服务架构


  **中间件组件**用于与后端系统集成。这些是专用组件，作为连接南向平台的网关。该组件封装了集成逻辑与复杂性，并暴露一个简单的业务接口供消费。一个中间件组件只能连接一个后端。一个关键原则是，不允许组件之间交叉通信。也就是说，一个中间件组件不能调用另一个。图
  8-6 详细说明了中间件组件的内部架构。


  ![../images/509947_1_En_8_Chapter/509947_1_En_8_Fig6_HTML.jpg](img/509947_1_En_8_Fig6_HTML.jpg)


  图 8-6


  中间件组件剖析


  从左到右，这些元素的功能如下：


  *   **客户端**：用于发起到该组件的 gRPC 调用。它在开发阶段和单元测试中使用。通过 *port-forward*，客户端可用于直接发起对部署在其他环境中的组件调用。例如，在测试环境中，客户端可用于发起请求以验证到下游系统的连通性。


  *   **服务端**：该元素包含用于服务 gRPC 请求的“管道机制”。负责反序列化、转换请求、调用集成组件、转换并序列化响应。在开发过程中，如果后端不可用，可以模拟该组件的响应。服务端组件还可用于将请求路由到不同的集成组件。我们已成功使用该方法来实施不同提供方接口之间的迁移策略。一个简单方法是使用环境变量在运行时重新配置路由。


  *   **集成**：该元素的目标就是与后端系统对接。出于抽象原因，这部分开发中不包含任何 gRPC 引用，并且可在无任何上游依赖的情况下直接通过命令行测试。该组件负责处理请求过程中可能出现的各种响应类型和错误条件。特定于应用的规则（如错误码映射或默认值设置）也在该组件中完成，以实现整合与隔离。通常建议为特定接口设置专用的集成组件。这能保持代码元素整洁并便于维护。


  **逻辑组件**编排流程以实现 API 产品，如图 8-7 所示。例如，用于获取客户档案的 API 产品可以利用多个中间件组件来组装响应。可以对来自一个系统的响应进行解析和转换，以构造对另一个系统的请求。区分应用逻辑与业务逻辑极其重要。将请求路由到中间件服务以创建客户是应用逻辑的示例；创建客户记录的过程则是业务逻辑示例。由于
  Marketplace 是企业的新渠道，它应当利用由中心统一拥有和管控的业务流程。


  ![../images/509947_1_En_8_Chapter/509947_1_En_8_Fig7_HTML.jpg](img/509947_1_En_8_Fig7_HTML.jpg)


  图 8-7


  逻辑微服务编排


  该组件的北向接口通常是发布在 API 网关上的 swagger 定义。这简化了 API 网关与微服务之间的集成。该组件的另一个关键功能是策略执行。根据 API
  产品的性质，微服务可能会执行校验与核验，例如在满足请求之前确认终端用户同意。为简化流程执行，可以并发发起对中间件组件的请求。还可以使用 gRPC 流来优化请求处理。举例来说，在对文档进行光学字符识别（OCR）时，我们会先调用某个中间件组件，该组件随后向本地企业服务和云视觉服务同时发起请求。请求处理完成后，会在流中返回响应。如果接收到的第一个响应不成功，组件会以尽力而为的方式等待第二个响应来处理请求。如果第一个响应表明处理成功，则无需等待，执行将继续。




  ### 平台服务


  所有微服务都依赖平台服务，这些服务被打包为企业级库，并在构建过程中导入。正如在平台架构中讨论的那样，这提供了一个统一的“实用服务”层，从而支持对微服务进行一致性的支持与管理。


  ### 门户应用


  在 API 市场的语境下，用户界面似乎有些自相矛盾。根据实施经验，Web 应用是平台的核心支柱之一，而前端开发人员是必不可少的人员配置。我们的实现针对以下用例构建了定制应用：


  *   **授权**：同意页面会在用户成功认证后、并作为 OAuth 流程的一部分展示给用户，这是一个定制门户应用。它用于获取用户信息（如个人资料和账户数据），并展示更丰富的同意界面。例如，我们不是提供一个简单的权限页面来授予对所有账户信息的访问权限，而是展示详细的账户列表，并允许用户选择可由第三方访问的特定账户。


  *   **第三方接入**：作为一个数字化渠道，我们实现中的一个理想目标是确保完整体验尽可能自动化、流程化。正如第 3 章所述，平台必须能够扩展以处理大量外部使用方。为实现这一点，需要一个定制门户来促进接入流程：从请求公司注册文件，到接受条款与条件，再到根据
  API 产品提供银行信息。需要特别指出的是，这个 Web 应用是一种访问机制，而实现这一目标的关键在于定义清晰的业务流程。


  *   **管理**：这为支持团队提供了一个界面，用于变更运行时配置数据，例如属性值和端点配置数据。提供 UI 的好处在于可确保一致、统一的访问方式，并且具备安全、审计和版本控制能力——因此在必要时可追踪并回滚变更。更重要的是，它能最小化对数据库和配置映射等支撑系统的访问需求，例如在
  Kubernetes 集群场景下。


  *   **托管应用**：这当然是一个独特用例，但也是平台的重要收入来源。这也是团队为保持交付势头而进行转向的一个例子。负责交付一组战略性 API 产品的小队得知，试点使用方将无法在“黑色星期五”上线前完成开发。由于延迟本质上会导致错过这一关键节点，小队做出了战术决策：代表第三方构建并托管应用的部分组件，并利用新
  API。第三方所需的开发工作因此显著减少，通过合理设置重定向，用户体验也得以保留。这一做法非常成功，进而催生出一种新的部署模式。其优势在于：托管应用可被多个第三方复用；由于集成显著简化，可扩大受众范围；还能利用可能尚未对外发布的内部服务；使企业能够塑造并定制用户体验；并且由于终端用户直接与企业交互，从而提升用户信任。


  ## 总结


  在本章中，我们讨论了一项关键的开发理念：技术是为 API 交付服务的。我们还识别了参与该活动的角色——既包括通过清除交付路径障碍而作出隐性贡献的角色，也包括通过编写代码作出显性贡献的角色——并审视了我们规划和管理并行活动的方法。建立
  DevOps *实践* 并采用持续集成/持续部署原则，有助于简化开发流程，提升稳定性与可预测性，并支持现有和新增开发资源。最后，我们深入探讨了应用开发，强烈强调在此过程中加强沟通与指导，同时分析了平台的核心要素，并回顾了门户应用的类型与目标。


  需要注意的是，这些方法与流程经历了较长时间的定义和打磨，并且*仍在*持续演进。它们已经根据我们实施中的需求进行了定制，例如地理上分布式的团队以及对企业共享能力的使用。以客户为中心、担当力强并持续为团队背书的项目发起人；设定高标准、厌恶错过截止日期的交付负责人；绝不妥协的产品负责人；以及执着于在代码中留下可持续遗产的工程负责人——这些个性特质同样在打造强大交付能力方面发挥了关键作用。在下一章中，我们将讨论
  Sandbox 环境、它在 API 市场生态系统中的作用，以及其实现策略。


  '
- '# 9. Sandbox


  Sandbox 是一个划定边界、经过严格隔离的空间，使使用方能够测试并使用你的 API，从而感受其工作方式。在我们 API 市场生命周期中的所有技术挑战、成就与突破中，正是对这个看似朴素的
  Sandbox 的一次重构，成为促使我撰写本书的转折点。我们最初的 Sandbox 策略相对简单，并服务于特定范围的 API 产品。随着平台的成长、成熟和演进，这一构造与方法却保持不变。就像
  Jitterbug 或 Charleston 舞步在今天的舞蹈时代依然可以跳，但总显得有些格格不入。团队早已意识到这种方法需要一次彻底升级，但其优先级总会被其他“更重要”的交付项挤到后面。


  这之所以曾经可行，是因为平台生态中 API 产品与第三方使用方之间存在独特组合——正如你将在下文策略中看到的那样。然而，一场“完美风暴”正在酝酿：在某个关键使用方发布其产品之前，必须先测试并签署通过一个特定场景。命运使然，这个场景正好直接击穿了我们的
  Sandbox 策略，不仅威胁要把我们最老的技术债“骷髅”从衣柜里拖出来，还几乎要让它跳起 Moonwalk。商业团队推动方案上市的压力，最终转化为动能与驱动力，不仅促成了我们对
  Sandbox 的再工程化，也促使我们重新构想它在平台中的目的与功能。


  正是这种工程能力与想象力之间独特的协同，构成了我们实现方案的核心——也希望同样能成为你的核心。一次又一次观察到这种独特特质在我们的 Marketplace 中持续发挥“魔力”后，至少尝试在本书中捕捉其精髓的念头，已经强烈到无法忽视。在接下来的章节中，我将分享我对
  Sandbox 的目的、流程、策略及其实现方式的看法。




  ## 目的


  我认为以下这些比喻最能描述 Sandbox（沙盒）的目的——*先试试看*、*在可控范围内大胆尝试*、*先试后买*。正如你所想，为某个特定 API 提供方进行投资或作出相关承诺，是一项重大的决策。对于组织内部项目而言，风险因素较小——集成需求两端的项目团队选择不多，且*必须*完成集成。而对于采用预定义接口的
  API Marketplace 实施，消费者可能会担心自己期待的是三脚插头，结果却遇到两孔欧标插座——这种担心完全合理。


  Sandbox 的功能之一就是缓解这种顾虑。以我作为集成开发者的经验，我可以肯定地说，仅仅评审接口规范（即使文档写得很好）与通过代码向端点发起请求并接收响应，是完全不同的体验。开发者能够获得一个可落地的机会，将规范映射到实际功能，更重要的是，可以验证该
  API 是否适配其使用场景。“适配”也需要从多个角度来理解。


  请看下面这个简化的接口定义：


  ```

  ...

  paths:

  /customer

  ...

  parameters:

  -in: customerID

  ...

  responses:

  200:

  ...

  ```


  尽管该接口可能满足第三方的需求，但接口的*行为*同样是关键因素。假设上述功能由对后端提供方的多次查询组合而成，以汇总响应，因此整体调用延迟超过 30 秒。这样的延迟可能会显著影响终端用户体验，并影响是否消费该操作的决策。这也可能促成一个功能请求：提供一个仅返回部分数据、但响应更快的操作。


  Sandbox 为这些讨论提供了一个互动触点。它相对于“Live”环境的上下文、关系和功能如图 9-1 所示。正如图中所示，沿“Live”路径传递的请求最终会到达后端提供方。而在“Sandbox”上下文中处理的请求，则由我称为“*Virtualiser*”的组件提供服务。


  ![../images/509947_1_En_9_Chapter/509947_1_En_9_Fig1_HTML.jpg](img/509947_1_En_9_Fig1_HTML.jpg)


  图 9-1


  Sandbox 与 Live 上下文


  从战术层面使用时，Sandbox 为 Marketplace 团队提供了一个独特机会：发布一个尚不存在实际实现的 API 产品。出现这种情况可能有以下几个原因：


  1.  它可用于判断某个 API 产品的消费者需求水平与范围。在我们与第三方提供方的合作中，我们发现“意向”与“实现”之间常常存在差距——即消费者对 API 表示兴趣，但并未真正落地。产品负责人可以利用
  Sandbox 产品来衡量*真实*消费情况，作为第三方承诺程度的指标。


  2.  此外，热点功能或主要被消费的功能有助于塑造产品。困难或复杂的操作自然会吸引较少消费，因此可以很容易识别出来，以便简化或考虑下线。


  3.  它还可以帮助交付团队分阶段发布 API——先提供更受欢迎的操作。这有助于缓解开发团队压力，并在发布规划时支持更量化的分析。也就是说，产品负责人可以清晰展示热点，这些热点可转化为对特定功能的需求证明。


  必须极其谨慎地使用这种方法。正如我此前提到的——开发者对“障眼法”有着惊人的敏感度，一旦信任被破坏，就很难重建。话虽如此，策略应当是始终比消费者领先一步，最好多步。要对
  API 当前所处阶段和目标保持透明——设想一下，如果开发者已经围绕该产品构建了解决方案，而你却决定不再继续，会带来多大的失望。同时，时间线也要明确。对于第三方开发者来说，关于
  Live 环境中某项具体产品或功能可用性的日期若含糊不清或缺乏承诺，几乎没有什么比这更令人沮丧。


  还需要注意的是，如图 9-2 所示，“Sandbox”这一构造在 Development、Test、Staging 和 Production 环境中都会保持一致。这个决定进一步强化了我们的承诺：在将变更部署供外部使用之前，确保
  Sandbox 在内部已得到完整测试与验证。此外，Production Sandbox 环境被视为一个*完整成熟*的运行环境。其变更与更新遵循同样的治理机制，支持也按类似的运行级别提供。


  ![../images/509947_1_En_9_Chapter/509947_1_En_9_Fig2_HTML.jpg](img/509947_1_En_9_Fig2_HTML.jpg)


  图 9-2


  贯穿所有环境的 Sandbox


  ## 流程


  Sandbox 对主办组织和第三方提供方同样重要。它在我们的接入流程中扮演关键角色，并被用作多项评审的质量闸门。第一项评审是由第三方展示将消费这些 API 的应用。这为即将推向市场的使用场景提供了直观证据，也将展示
  API 的成功消费情况及其在应用中的作用。


  第二项评审用于第三方应用的功能测试。来自消费者的调用会在 Sandbox 中被全链路追踪，以确认请求载荷与目标地址的准确性。也正因如此，从运行角度看，我们的 Sandbox
  环境完全对标 Live 环境，因为它也配备相同的支持工具和流程。


  需要强调 Sandbox 环境的支持要求与上下文。虽然其服务级别可能不如 Live 严格，且我们对服务中断的容忍度可能略高，但需要支持的对象是开发者。这通常是开发者编写首个应用时的第一站；即便文档中已给出细节，在
  API 消费过程中，开发者仍会尝试各种请求类型与实现方式。开发者支持流程必须定义清晰，并且 Sandbox 环境必须能够承受大量格式不规范的请求冲击，而不会崩溃并需要人工介入支持。鉴于这一使用场景，为确保服务可用性，自动重启失败组件或卡住进程，可能是一种可接受的实践。


  随着 Marketplace 实施逐渐成熟，可考虑实现自助服务能力，以简化 Sandbox 访问。注册与开通流程应当无缝，尽可能让开发工作立即开始。同时，务必向潜在消费者明确说明接入流程和
  Sandbox 环境的使用方式，以对齐预期并提供时间线参考。




  ## 沙箱策略


  由于我们对沙箱的初始方案自平台上线以来一直没有变化，因此我们选择利用这次重构机会来实现最大化影响。这很合理——确实有一个迫切需要立即解决的问题。但与此同时，沙箱这个“壁橱”里其实还藏着不少“骷髅”，它们可不喜欢任何舞步。话虽如此，我们也谨慎地控制了范围，以保持对任务本身的聚焦。结合我们
  Marketplace 中的 API 产品集合，第一个目标是识别潜在的使用场景：


  *   **beta**：正在考虑进一步开发，或处于开发过程中且定义仍在变化的产品；跟踪消费使用模式非常重要。


  *   **后端模拟**：相对简单的“ping-ack”API，本质上是原子性的；最好是只读操作；并返回定义良好、标准化的响应。


  *   **浅层**：适用于跨多个后端系统进行编排的 API 产品的*早期拦截*模式；单个 API 产品中的调用可能会影响其他产品。


  *   **半真实（Semi-Live）**：允许对真实后端系统进行可控且有限访问的 API 产品。


  *   **QA**：访问组织内部质量保证测试环境。


  在接下来的章节中，我们将通过以下方面更详细地探讨每种沙箱策略：其要填补的目的、方法、驱动其使用的优缺点，以及最终如何在技术上实现。我尤其希望了解你可能已在自己平台上实施的任何新方法或混合方法。


  ### beta


  该策略可用于以下原因之一：


  *   回答这个问题——*如果我们把它做出来，他们会来吗？* 由于交付团队通常会保持精简以降低成本和管理开销，为正确的受众构建正确的产品是平台整体成功的关键。必须投入时间并聚焦于那些确有需求且上线后会被消费的产品。


  *   定义并塑造 API 产品。测试并打磨某些特性的能力，长期来看可提升采用率与消费量。这也可用于在尚未写下一行实现代码之前，就处理接口复杂性问题。


  *   在“*始终领先一步*”的猫鼠博弈中，为后端交付缓冲强烈的消费者需求。简单来说，API 的实现可能落后——可能是内部开发延迟，也可能是外部后端提供方延迟。该方法可用于先发布可工作的接口，再让实现逐步追上。


  #### 方法


  对于该方法，跟踪和记录第三方消费行为至关重要，因为其价值在于对数据的分析和洞察。使用模式应清晰表明消费者、API 以及操作。解读后的指标可作为与 API 用户讨论“哪些有效、哪些无效”的基础。


  由于这些 API 可能仍处于“起步”阶段，诸如调用后端延迟等性能数据可能尚不可用。这必须作为 API 设计的一部分加以考虑——例如，采用异步回调方式来补偿可能的长事务，可能是更稳妥的选择。


  根据 API 的性质，可能有必要将访问限制在封闭用户组内。对于敏感或战略性 API，可能只允许特定第三方访问，以保留机构知识产权以及潜在竞争优势。


  表 9-1 展示了该方法的优缺点。


  表 9-1


  beta 沙箱策略的优缺点


  | 优点 | 缺点 |

  | --- | --- |

  | 从构想到实施响应迅速 | 不能代表真实后端行为 |

  | 可量化衡量第三方消费情况 | 由于 API 的易变或动态特性，第三方兴趣可能较低 |

  | 在第三方积极反馈下，以交互方式定义并优化 API 产品 | 从沙箱到生产实现周期过长，可能导致第三方信任流失 |

  | 能够测试并验证设计方法与假设 |   |

  | 可用于缓冲实现延迟 |   |


  #### 使用场景


  该策略通常用于 API 产品开发的早期构思与概念阶段。也可用于理解消费模式并塑造 API 产品。由于 API 仍在开发过程中，且可能发生变更甚至终止，因此必须妥善管理第三方预期。还可通过“仅限邀请”的访问策略，作为与特定第三方建立信任的机制。


  #### 设计考量


  如图 9-3 所示


  ![../images/509947_1_En_9_Chapter/509947_1_En_9_Fig3_HTML.jpg](img/509947_1_En_9_Fig3_HTML.jpg)


  图 9-3


  “beta”沙箱环境设计


  *   可能没有生产（Live）实现。


  *   静态响应可存储在文件中。


  *   交互记录在数据库中，用于分析与洞察。


  ### 后端模拟


  这最适用于*简单*API，且需满足*以下全部*条件：


  *   由单一后端提供方提供服务的 API。


  *   API 操作通常是*读取*功能。不会对提供方状态产生变更，且该操作隐含为*原子性*。例如，返回客户数据的 API。


  *   来自后端提供方的响应是固定或定义良好的。延续上例，后端会返回 (i) 客户数据，或 (ii) 表示客户未找到的*业务*错误，或 (iii) 表示技术故障的*系统*错误。


  #### 方法


  为这些*简单*API 创建沙箱的方法，可能反而是最*复杂*的，因为它是通过模拟后端提供方来实现的。API 调用会穿过平台栈中的所有元素，完全“毫无察觉”它正在沙箱上下文中执行。当调用到达与后端提供方交互的中间件组件时，请求会被发送到“*系统虚拟器*”，如果它能在请求中匹配特定值，就会返回预定义响应。通过改变输入数据，可以触发模拟后端的不同响应与行为。也可以模拟系统故障和不同延迟，以获得更具代表性的行为。


  表 9-2 展示了该方法的优缺点。


  表 9-2


  浅层沙箱策略的优缺点


  | 优点 | 缺点 |

  | --- | --- |

  | 调用穿越完整应用栈，行为更具代表性 | 沙箱环境中所有组件的完整部署会带来更高资源占用 |

  | 可基于特定请求数据配置或参数化响应 | 仅适用于简单只读操作 |

  | API 产品特性使其实施与更新可快速周转 | 对所有第三方消费者使用静态响应——没有或仅有有限定制能力 |

  |   | 刚性或固定响应可能限制额外用途 |


  #### 使用场景


  该方法最适用于由单一提供方支撑、用于数据检索或读取操作的 API 产品。它在支持跨多个消费者使用静态响应的场景中也表现良好。就我们而言，最初对*系统虚拟器*的更新需要开发投入。由于测试团队在等待开发人员可用性方面出现延迟，测试负责人花时间理解该框架，并自此接管了这项能力。当前可通过修改与创建新数据文件来更新和新增场景。最近一次检查时，我发现测试团队已经在编写代码，以更准确地模拟后端。




  #### 设计


  如图 9-4 所示


  ![../images/509947_1_En_9_Chapter/509947_1_En_9_Fig4_HTML.jpg](img/509947_1_En_9_Fig4_HTML.jpg)


  图 9-4


  后端模拟沙盒环境的设计


  *   *系统虚拟化器*被配置为根据请求中的特定值返回预定义的响应。


  *   中间件组件的端点配置已更新，以将请求路由到*系统虚拟化器*。


  *   这需要一个专用的运行环境来执行。它确实需要类似的部署策略，但不需要像生产（Live）环境那样的扩展能力，因为性能要求会更低。


  ### 浅层（Shallow）


  你可能还记得，曾有一个特定场景促成了对 Sandbox 的更新。我们平台的早期产品相对简单。也就是说，通常只有一个后端提供方，可通过*后端模拟*策略来服务。随着时间推移，随着越来越多的中间件组件可用于对接后端系统，为满足业务需求，微服务编排逻辑逐渐变得愈发复杂。这很快演变成一个因交付目标和任务而无法停止的庞然大物。在我们意识到之前，一些
  API 已经通过如图 9-5 所示的复杂流程来实现。


  ![../images/509947_1_En_9_Chapter/509947_1_En_9_Fig5_HTML.png](img/509947_1_En_9_Fig5_HTML.png)


  图 9-5


  展示复杂编排逻辑的流程图


  不幸的是，在我们履行简化编排逻辑这一郑重承诺之前，创建 Sandbox 版本的请求就已到来。使用既有*后端模拟*方法的挑战在于：它需要复杂的数据准备，而单笔交易还会跨越多个系统。进一步增加复杂度的是其中某些步骤的*写入（write）*操作。经过多次尝试后，团队很快意识到，对*系统虚拟化器*的定制几乎变得无法支持，并且后续更新将是一场噩梦。


  以一种典型的*“跳出框架思考”*方式来看，我们发现的解决方案恰恰位于离问题源头最远的地方。通过后退一步并从消费者视角提出问题，Sandbox 集成的主要目标是让使用方更好地熟悉我们的
  API。本质上，第三方只是希望针对请求获得一个具有代表性的响应。至于接口所提供的抽象背后如何实现，这并不是 Sandbox 关心的问题。通过重构问题陈述并从不同语境思考，本
  Sandbox 策略的目的，是让第三方能够测试那些具有复杂编排逻辑、跨越多个后端系统且可能包含导致状态变更的写操作的 API 产品。


  #### 方法


  与其教骷髅跳太空步，不如在请求进入具有复杂逻辑的微服务*之前*尽早拦截它，并在一个并行但*浅层（shallow）*的实现中处理该请求。这个模式看起来可能与*beta*方法非常相似。然而关键区别在于，这是一个具有既定契约且我们需要维护的
  API 产品，同时还必须满足“按第三方维度管理状态变更”的要求。本章稍后将进一步详细讨论技术方案。


  这种方法的优缺点如表 9-3 所示。


  表 9-3


  浅层沙盒策略的优缺点


  | 优点 | 缺点 |

  | --- | --- |

  | 适用于跨多个后端系统、业务流程复杂的 API | 由于在并行流程中处理，无法完全代表生产（Live）解决方案 |

  | 能够按第三方管理状态 | 需要维护和支持额外的软件组件 |

  | 自定义解决方案便于配置和更新，以应对新需求 |   |

  | 资源占用更小，因为无需部署微服务和中间件组件 |   |


  #### 用例


  这种方法提供了一种整洁且优雅的解决方案，使 Sandbox API 与 Live 实现保持一致。它还允许按第三方维持状态，以支持更细粒度的集成场景。进一步说明：*Shallow*
  方法会以一种*ping-ack*方式提供相同响应。采用该策略后，第三方将基于其执行的操作接收到更新后的数据集。对于跨越两个或更多后端系统、复杂度中到高的解决方案，应考虑采用该方法。


  #### 设计


  如图 9-6 所示


  ![../images/509947_1_En_9_Chapter/509947_1_En_9_Fig6_HTML.jpg](img/509947_1_En_9_Fig6_HTML.jpg)


  图 9-6


  浅层沙盒环境的设计


  *   请求在并行流程中处理。


  *   本章稍后将提供该方法的技术设计细节。


  ### 半实况（Semi-Live）


  这种方法的核心在于将 Sandbox 环境连接到已定义的 Live 接口。正如本章后续讨论的分布图所示，这并不是一种常见的 Sandbox 策略。我观察到两类高度依赖
  Live 接口的用例。


  第一类是 Twilio 消息环境。开发者可以发送消息并最终到达用户设备。Twilio 非常巧妙地支持了 WhatsApp API 的测试：通过向一个共享的 WhatsApp
  目标地址发送特定关键字，将手机号关联到开发者测试账号。初始会提供价值 20 美元的免费额度，后续可充值以继续测试。这是一个通过 Sandbox 环境创造收入的绝佳示例。


  第二类场景中，我们发现有必要连接到 Live 安全服务以生成令牌，该令牌将用于 Sandbox 环境中的后续调用。


  #### 方法


  尽管我很喜欢这一策略，但我同样保持警惕。我认为这如同打开了潘多拉魔盒，并强烈建议谨慎对待其使用及潜在滥用。该方法可通过简单更新端点配置并将请求路由到 Live
  后端来实现。对 Sandbox API 请求进行限流至关重要，因为第三方可能在无意中发起请求洪流，导致拒绝服务。随着生态更成熟，也许可以按交易向使用者收费。


  这种方法的优缺点如表 9-4 所示。


  表 9-4


  半实况沙盒策略的优缺点


  | 优点 | 缺点 |

  | --- | --- |

  | API 请求行为更具代表性 | 将生产（Live）环境暴露给开发受众 |

  | 混合能力可节省后端服务模拟时间 | 需要额外的支持机制来规范并监控使用 |

  | 通过对 Live 平台的受控或受限访问收费，具备潜在收入来源 | 引入安全风险，因为 Sandbox 现已成为访问 Live 元素和服务的入口机制 |


  #### 用例


  调用 Live 服务的能力提供了一种灵活的混合型 Sandbox 能力，但由于其潜在安全风险，必须谨慎使用和管理。它应作为例外，而非常态使用。支持其采用的优秀用例确实存在——例如前文提到的
  Twilio 消息服务。关键是必须建立相关系统与控制措施来管理并监控其使用。它最适合用于提供参考数据，这类数据通常是只读的并且可以公开共享。




  #### 设计


  如图 9-7 所示


  ![../images/509947_1_En_9_Chapter/509947_1_En_9_Fig7_HTML.jpg](img/509947_1_En_9_Fig7_HTML.jpg)


  图 9-7


  半实况（Semi-Live）Sandbox 环境的设计


  *   已配置到 Live 后端提供方的特定中间件组件被部署到 Sandbox 环境中。


  *   Virtualiser 可以访问这些中间件组件。


  *   该方法的技术设计细节将在本章后续部分提供。


  ### QA Live


  我们发现这是最不常用的策略。它具有特殊功能，面向特定受众和使用场景。


  如前所述，我们平台的一个基础消费者是一个内部开发、外部托管的应用程序，它通过 Marketplace 访问关键企业服务。由于该消费者的特性以及快速的开发节奏，我们授予其访问质量保证（QA）测试环境的权限，以便在产品发布前验证端到端功能。


  尽管这种模式仅限于该特定用例，但我们发现，对于某些 API，在“Live”上下文中进行测试是迫切需要的。坦率地说，模拟后端或浅层拦截策略可能不足以覆盖后端提供方的所有响应和使用场景。在这些情况下，获得*真实*表现的唯一方式是直接集成到后端，完成完整交易。


  #### 方法


  这个内部基础消费者帮助开辟了从外部托管系统进行访问的路径。防火墙中添加了特定规则，以允许来自定义源 IP 的流量。目标地址不是连接到*Production Sandbox*端点，而是设置为*QA
  Live*。鉴于该消费应用的性质及其高优先级，网络与信息安全团队批准了访问权限。坦率地说，由于测试环境的敏感性和特殊性质，其他第三方提供方的访问很少被允许。


  该方法的优缺点见表 9-5。


  表 9-5


  QA-Live Sandbox 策略的优缺点


  | 优点 | 缺点 |

  | --- | --- |

  | 在所有方法中，最能代表生产环境中的应用行为 | 受 QA 环境中系统和数据可用性的影响 |

  | 无需创建 API 的 Sandbox 版本——节省人力 | 为内部域中的共享组件增加额外负载和流量 |

  |   | 开发——新版本发布或补丁可能影响测试，需要谨慎安排计划 |


  #### 用例


  这种方法有非常特定的使用场景。第一类是组织内部消费者：他们了解组织流程和信息，并且能够容忍服务可用性与性能的波动。第二类是当无法创建 API 的 Sandbox
  版本，且必须确保消费应用在测试期间获得*完整*的代表性行为与响应的情形。在这种情况下，访问策略应仅允许临时访问。


  #### 设计


  如图 9-8 所示


  ![../images/509947_1_En_9_Chapter/509947_1_En_9_Fig8_HTML.jpg](img/509947_1_En_9_Fig8_HTML.jpg)


  图 9-8


  将 QA 用作 Sandbox 环境的详细设计


  *   请求在质量保证（QA）环境中处理。


  *   这是与生产环境并行的实现。


  *   该方法满足了解决方案端到端功能测试的需求。需要注意的是，QA 环境的扩展规模可能与生产环境不同——行为可能存在差异。


  ### 第三方 Sandbox 访问


  图 9-9 展示了我们平台中第三方与 Sandbox 访问关系的一个示例分布。影响这一分布的关键因素是，并非所有第三方都会消费相同的 API 产品，原因可能包括以下一个或多个方面：


  ![../images/509947_1_En_9_Chapter/509947_1_En_9_Fig9_HTML.jpg](img/509947_1_En_9_Fig9_HTML.jpg)


  图 9-9


  第三方 Sandbox 分布


  *   处于***beta***阶段的 API 产品可能受众较小——如果仅允许部分第三方访问*或*潜在消费者兴趣较低。许多第三方可能只关注稳定且可用于生产的 API。


  *   许多第三方会消费更简单的 API 产品，这些产品采用***Backend Simulation***策略。


  *   如果编排跨越多个后端提供方，则 API 会被归类为复杂类型，并且非常适合采用***Shallow***方法。这类 API 产品通常满足细分场景需求，因此第三方吸引力与消费量较低。


  *   只有少数被选择的第三方可能有权访问采用更复杂 Sandbox 策略支持的 API 产品——例如***Semi-Live***和***QA***。


  我倾向于把 Sandbox API 的访问方式类比为一家实体银行网点。任何人都可以进入营业厅。只有银行工作人员可以进入员工区域。在银行工作人员中，只有资深且获得授权的成员才能进入敏感区域，例如银行金库。


  同样地，有些 API 及其关联的 Sandbox 环境，只允许特定且已授权的第三方访问。该策略看起来可能与最大化第三方消费的思路相悖。谚语*“horses for
  courses”*很贴切——你的 API 组合中会有一些产品只适合特定消费者。尽管可以给每个第三方授予每个 API 产品的访问权限，但出于客户数据敏感性和安全限制，组织可能并不具备让*任何*第三方访问关键区域或服务的意愿或风险偏好。


  我在图 9-10 中以类似飞镖靶盘的方式描绘了我们的访问策略：从最外圈最低安全、最开放，逐步到核心（靶心）最高安全、最受限制。需要注意的是，你的访问策略可能会因组织的
  API 产品与治理政策而不同——你可以选择增加、移除，甚至重排这些层级顺序。


  ![../images/509947_1_En_9_Chapter/509947_1_En_9_Fig10_HTML.jpg](img/509947_1_En_9_Fig10_HTML.jpg)


  图 9-10


  第三方 Sandbox 访问




  ## 构建一个 Virtualiser


  在重构之前，我们第一个也是唯一的 Sandbox 策略是*后端模拟（Backend Simulation）*。为实现这一点，团队采用了开源项目 *Mountebank*，它可以在给定特定请求时返回预定义响应。我们在托管容器平台上部署了一个自定义应用。该应用在特定端口监听请求，集成组件只需修改端点配置即可将流量路由到该服务。每当需要模拟一个新的后端时，都需要更新该应用以便：


  1.  根据一组规则（包括路径、操作、参数和负载）将传入请求路由到特定的内嵌 JavaScript 函数。


  2.  在函数上下文已知的情况下，函数会使用专门为该集成方案构建的自定义逻辑，从请求中提取更多信息。


  3.  然后，函数利用收集到的信息定位随应用部署的数据文件——格式为 *json* 或 *xml*。


  4.  获取文件后，会更新其中某些元素，例如日期和时间，以提供更具代表性的响应。


  5.  最后返回更新后的响应。


  这种方法利用了该开源方案处理请求的能力，并结合自定义代码来组装响应。


  ### 需求


  以该实现为基线，我们为下一版 *Virtualiser* 制定了以下需求：


  *   **无需代码更新或部署**：为了应对任何变更——无论是请求处理、响应处理还是新增数据文件——此前都必须更新并重新部署自定义应用。由于部署必须在维护窗口内进行，这会造成较长延迟。我们的目标是以配置方式实施更新。


  *   **运行时配置**：由于 *Mountebank* 的配置存放在应用内部文件中，无法在运行时进行变更。我们需要让变更能够立即生效。


  *   **可访问性与易于更新**：鉴于规则和内嵌 JavaScript 的复杂性，初始配置只能由开发人员完成，后续变更或更新也只能由对框架有深入理解的技术成员完成。我们的需求是团队中*任何*成员都能轻松修改。


  *   **第三方特定**：由于第三方标识通常包含在调用后端提供方的请求中，返回的往往是通用响应。我们希望能够返回面向特定消费者的响应。


  *   **应用感知**：自定义应用在其自身上下文中运行，与我们的应用架构没有任何连接。作为重构的一部分，团队提出了全面需求：新版本应能感知内部结构，并能够利用这些结构进行请求路由和处理。


  ### 实施选项


  凭借多年软件开发经验所带来的谦逊与成熟，我们明白这并非新问题，许多 API 平台都面临类似挑战。市面上有很优秀的商用现成方案（COTS），例如 Computer
  Associate 的 Service Virtualisation 产品。不幸的是，这不仅会带来许可证成本，还需要走新软件采购的治理流程——这会导致较长周期。


  团队评估并测试了两个令人印象深刻的开源项目：


  *   **Hoverfly** 是一个轻量级 API 模拟工具。使用 Hoverfly，你可以创建应用所依赖 API 的高真实性模拟。


  *   **Mountebank** 是首个提供跨平台、多协议“线上”测试替身（test doubles）的开源工具。它正是我们*后端模拟（Backend Simulation）*策略的基础。


  经过大量审议与讨论，我们最终决策的核心依据是两者都依赖本地配置。一个关键需求是：变更无需代码更新或部署。另一个可选路径是 fork 这些项目并按需改造——但这将需要大量定制和维护。结合我们的约束与需求，我们最终选择了自研开发路线。这将带来最快且可能最高效的解决方案。


  ### 设计理念


  我们以 Mountebank 为参考，确立了两个核心要素：


  一个**谓词（predicate）**，即基于输入参数组合的条件，这些参数包括 HTTP 请求元素以及外部配置，如表 9-6 所示。


  表 9-6


  谓词参数


  | 元素 | 示例 |

  | --- | --- |

  | 方法 | *GET/POST/PUT/...* |

  | 路径 | */customer* |

  | 查询参数 | *?x=1&y=2* |

  | 请求头 | *x-subscription-id* |

  | 请求体 | *{ name: ‘Tom Sawyer’ }* |

  | 数据库配置 | *使用 x-subscription-id 检索到的数据库记录* |


  请注意以下自定义项：


  *   使用特定请求头值 *x-subscription-id* 来检索数据库配置记录，并将其作为谓词评估参数。


  *   使用模糊逻辑匹配参数的 key 或 key+value——例如，若 *query* 包含 key *x* 或表达式 *x=1*。


  *   当多个谓词都可匹配时，采用匹配数量最高的那个。


  一个**响应（response）**是为生成结果而执行的动作。响应根据被模拟场景进行配置，如表 9-7 所示。


  表 9-7


  Virtualiser 响应类型


  | 类型 | 描述 |

  | --- | --- |

  | 静态 | 恒定的预定义数据，不会变化 |

  | 随机 | 使用正则表达式，结合已配置变量（如当前日期时间或输入请求中的元素）更新响应中的特定元素 |

  | 代码 | 动态执行的小型应用（脚本） |

  | 代理 | 将请求路由到已配置端点进行处理 |


  这种动态执行的“小型应用”使我们具备了响应复杂 API 请求的能力。它可通过写入持久化存储（磁盘或数据库）来维持状态，从而支持*浅层虚拟化（Shallow Virtualisation）*。它也支持*半实时（Semi-Live）*模式，即调用实时服务来构造响应。该应用以脚本形式存储，并在运行时解释执行。脚本可在无需部署的情况下更新。代理能力则提供了一种优雅机制，可在运行时动态路由请求以进行处理。




  ### 示例流程


  图 9-11 以及后续的示例配置，能让你对该过程有更深入的理解。


  ![../images/509947_1_En_9_Chapter/509947_1_En_9_Fig11_HTML.jpg](img/509947_1_En_9_Fig11_HTML.jpg)


  图 9-11


  Virtualiser 处理流程


  *   当接收到请求时，我们会尝试查找所有匹配的*谓词（Predicate）*。


  *   对于某个特定请求，可能存在多个匹配项。将使用匹配数量最多的谓词（Predicate）。


  *   随后会检索关联的*响应（Response）*。多个谓词可以映射到同一个*响应（Response）*。这使得请求识别与处理之间可以解耦。


  *   *响应（Response）*可以通过静态数据、代码执行，或代理到已配置端点进行处理来生成。


  *   代码执行元素或“mini app”可以维护状态。这使得可以基于已定义状态生成动态响应。


  以下摘录是针对下述地址的示例配置：


  *   *http://server/sport/catalogue?categoryID=nnn*


  *   如果未指定*categoryID*的值，则任意值*nnn*都将匹配。


  *   如果还存在另一个未为*query*参数指定条件的*谓词（Predicate）*配置，则会优先使用该配置，因为其匹配项更多。


  ```

  {

  "method": "GET",

  "path": "/sport/catalogue",

  "api": "SPORT",

  "operation": "GetCatalogue",

  "response": {

  "query": [

  {

  "key": "product",

  "source": "query",

  "query": "categoryID"

  }

  ]

  },

  "query": {

  "categoryID": ""

  }

  }

  ```


  以下摘录是针对下述地址的示例配置：


  *   *http://server/sport/catalogue?categoryID= 11329*


  *   一旦找到*谓词（Predicate）*，便会使用`response`数据查找其关联的*响应（Response）*。根据上述配置，它指定了检索条件的`source`来自`categoryID`参数——`{"product":"11329"}`


  *   *响应（Response）*的`action`参数表明要返回的负载是`context`变量中的 JSON 对象。


  *   该策略允许针对不同的`categoryID`值返回不同的负载，同时也支持在运行时进行更新。


  ```

  {

  "product": "11329",

  "response": {

  "action": "data",

  "context": { .. },

  "ErrorDescription": "OK",

  "TxID": "0c772fd1-4203-4390-bc51-8c74edf0e979"

  }

  }

  ```


  这个 Virtualiser 设计是专门为满足我们 Marketplace 实现需求而定制的。我们还增加了其他扩展，可使用 header 或 query 参数的值，从指定集合中检索数据库记录，并使用这些值进行额外匹配。该方案展示了一个示例设计。你可以针对自己的
  Marketplace 应用许多更新和优化。如果你有任何想法愿意分享，请随时告诉我。


  ## 总结


  在本章中，我们介绍了 Sandbox——它是任何 API Marketplace 的关键组成部分。我们强调了它的目标以及其在帮助第三方提供方理解你的 API 方面所起到的关键作用，同时它也能帮助你更好地了解调用方应用。我们详细讨论了多种
  Sandbox 策略，说明了各自的方法、优点和缺点、最适用的用例，以及高层设计。


  我还提供了一个示例分布，展示哪些策略使用最广泛，以及一种访问提供策略。最后我们深入细节，定义了自定义 Virtualiser 的需求，它可用于满足两种 Sandbox
  策略。基于需求，我们进一步评估了实现选项，从商业方案到开源方案，最终选择构建自定义解决方案以获得最大灵活性。随后我们概述了该自定义方案的核心元素，并处理了一个示例请求，以更好地理解其工作方式。


  在企业软件开发中，实现 Sandbox 环境可能是少数能够给予创造力和跳出常规思维更大空间的场景之一。它甚至可以作为你 Marketplace 实施的试点阶段，用于衡量市场需求。


  在下一章中，我们将进入 Operations 领域——这很可能是你的 API 停留时间最长的领域。


  '
- '# 10. API 运营


  与 API Marketplace 中其他高度灵活、能够快速转向或调整方向的领域相比，Operations 领域更加结构化、有组织且目标明确。团队依靠严格的流程和结构运作，是整个平台的基石。任何其他做法都将迅速滑向混乱，且该实现很快会被归类为原型。由于平台是支撑更广泛第三方应用的使能要素，任何内部或支撑系统故障都可能引发连锁反应，最终造成更大影响，并导致第三方消费者面向客户的产品或服务产生负面观感。


  由于该领域通常归入运营支出（OPEX）预算，直觉反应可能是尽量压低成本。尽管我们的 Marketplace 可能并不直接面向终端客户，但如果服务水平被认为不稳定，仍可能造成重大的声誉影响和行业观感问题。正如前几章所述，一项重要工作是吸引外部开发者进入平台；而维护关系、留住这些消费者则需要投入更多努力。


  根据经验，集成支持一直是一项充满挑战但也很有回报的角色。毫无疑问，我从设计到开发，再到真正理解一个解决方案及其底层要素，最大的收获都来自在 Operations
  中积累的经历。开发阶段中参数与条件通常定义明确。即使有大量测试场景和高强度压测，环境仍可能相对隔离。我职业生涯早期的一个项目中，我清楚记得一位资深工程师兴奋地汇报说，他在自己的笔记本上一整夜跑了数百万笔交易且毫无问题。然而当我们的解决方案最终上线后，接下来的两年里我们花了无数个夜晚处理运营问题。原因在于生产环境与测试环境差异巨大，流量负载、支撑系统可用性以及不可预测的客户行为都不应被低估。正因如此，我始终坚信解决方案架构师必须花时间从事
  Operations 角色，才能学会设计更健壮的解决方案。


  不幸的是，在快速变化、高流量、混乱的运营环境中，以松散、战术性的方式“以火攻火”，极有可能导致失败，并可能危及平台的成功与长期发展。在本章中，我将讨论我们过去、当前以及面向未来的运营标准、流程与方法，以实现
  Marketplace 的成功运营。




  ## 运营宇宙


  坦率地说，稳定我们的支持能力一直是我们最大的挑战之一，而且这仍是一项持续进行的工作。项目发起人多年前就预见到了该平台的关键性。遗憾的是，当团队争分夺秒地构建并部署平台时，他睿智的建议并未被采纳，团队秉持的口号是——“*船到桥头自然直*”。随着
  Marketplace 突然被认定为实现全新外部托管数字化体验、并撬动企业内部能力的关键要素，团队几乎在一夜之间被推到了运营聚光灯下。


  就像还在训练中的消防员，平时接到的紧急任务通常只是去救一只被困在树上的猫一样，当团队被要求应对跨越多个下游系统、且此前从未进行过此类运营处理的高流量高价值交易“火海”时，显然准备不足。我们用一个术语来描述这种状态：“支持外科手术（support
  surgery）”，并安排了每日会议，以检查建议策略是否生效，若未生效则及时调整。经过时间积累和大量努力，团队通过提升平台监控能力、定义事件管理流程，以及加深对后端支撑系统的理解并建立更好的运营协作关系，最终打下了坚实的支持基础。


  从这段经历中得到的一个关键启示是：应在项目生命周期尽可能早的阶段，对 Marketplace 支持运营化投入充足且（更重要的是）诚实的关注。在接下来的章节中，我们将讨论支撑运营域的关键概念与方法，并识别其构建所依赖的基础要素——如图
  10-1 所示。


  ![../images/509947_1_En_10_Chapter/509947_1_En_10_Fig1_HTML.jpg](img/509947_1_En_10_Fig1_HTML.jpg)


  图 10-1


  运营子域


  ## 变更与发布管理


  传统上，运营团队通常不太喜欢更新，因为更新会给环境引入风险。对我们的实施而言，效果极佳的一种理念是：高频但小规模发布。正如在阐述开发的章节中所提到的，在一个 sprint
  中可能会有多个并行流，最终在 sprint 结束时部署到生产环境。


  对于新 API 产品这类重大更新，通常会像图 10-2 所示，提前很久发布到生产环境，再开放给第三方使用。通过在发布与使用之间设置缓冲期，团队就有机会在相对低压的状态下验证功能，并在需要时进行更新或修订。我们在上线新功能时，常常会在部署当晚发现还需要额外配置，而且这些配置大多不在我们的控制范围内（例如防火墙或网络访问）。更早部署使团队能够在自己进入关键路径之前识别并解决这些依赖问题。


  ![../images/509947_1_En_10_Chapter/509947_1_En_10_Fig2_HTML.jpg](img/509947_1_En_10_Fig2_HTML.jpg)


  图 10-2


  API 产品的首次发布


  对于较小的产品迭代，如图 10-3 所示，API 版本管理是关键要素。由于 API 产品的不同版本可以并存，何时迁移的决定权交由第三方使用方。前提是各个特定版本都有明确定义的生命周期终点。通过提供详细说明后续版本变更内容的发布说明，我们也向使用方清晰传达了一个信号：出于更好的安全性、稳定性，或新增功能等原因，迁移到新版本可能更符合他们的利益。


  ![../images/509947_1_En_10_Chapter/509947_1_En_10_Fig3_HTML.jpg](img/509947_1_En_10_Fig3_HTML.jpg)


  图 10-3


  API 产品的更新


  如图 10-4 所示，对微服务等内部支撑要素的更新通常是小步迭代式的。若更新引发问题，团队会评估原因、影响和可能的解决方案。从文化角度看，我们倾向于减少归责，不过度纠结于原因本身。我们的经验是，指责会引发恐惧，而恐惧会抑制团队敏捷性。如果某个问题本可在测试阶段识别出来，我们会将其作为未来改进的学习点。更多时候，问题与生产环境中特有的数据或场景相关，这些在测试期间无法复现。若影响表现为显著的服务劣化，则会立即回滚变更。强大的
  DevOps 能力可在几分钟内实现这一点。这同样是一种“解放式”能力，是团队快速交付的重要支撑。如果问题能够快速解决，并且风险很小（最好为零），交付负责人在与工程团队协商后，可能会决定“向前修复（fix
  forward）”。


  ![../images/509947_1_En_10_Chapter/509947_1_En_10_Fig4_HTML.jpg](img/509947_1_En_10_Fig4_HTML.jpg)


  图 10-4


  内部更新




  这并不是一个轻率做出的决定，而且这种做法如果不加以控制，可能会导致“在生产环境中编码”这一大忌。必须格外谨慎，确保正在进行中的开发不会被意外纳入更新内容。为此，制定清晰的代码版本管理策略（包含发布标签与分支）至关重要。若能明智且克制地使用，“向前修复”的内在好处在于无需回滚发布，从而节省时间并保持发布流水线持续运转。根据问题的性质、影响、频率及解决时限，也可能在更长周期内实施修复——这将有助于减少因临时更新而引入额外错误的风险。


  我们组织已经认识到：敏捷数字化解决方案需要更加灵活的变更与发布策略，并已投入大量努力尝试去适配。必须完整说明的是，质量关卡并未降低——只是流程被精简以实现更快流转。这仍在持续推进中，在达到
  Netflix 式持续部署“理想境界”之前我们还有一段路要走——但话说回来，金融机构的服务等级要求及潜在后果，远高于视频流媒体服务。


  图 10-5 提供了我们发布“漏斗”的高层视图。我喜欢把它想象成原子在一个不断缩小的空间中来回碰撞，直到最终要么被弹出，要么必须有序排队向前推进。在任何给定时刻，都有大量需求、修复项或原型处于开发中。有些原型会成长为完整解决方案；另一些则会被淘汰。支撑性后端平台的就绪程度也会决定哪些需求可以进入测试阶段。由交付负责人牵头的规划会议将为特定解决方案识别潜在上线日期，并将其打包进生产发布。目标是至少每两周发布一次。一旦发布视图确定，就会整理所需的变更控制工件，并通知发布管理团队部署意图与日期。


  ![../images/509947_1_En_10_Chapter/509947_1_En_10_Fig5_HTML.jpg](img/509947_1_En_10_Fig5_HTML.jpg)


  图 10-5


  发布漏斗


  发布流程所需的工件包括以下内容：


  *   **实施指南**：这是在运行环境中部署代码资产及所需配置的一组说明。在具备高度优化的 DevOps 流水线时，该文档只需说明要部署的组件与版本。也可能需要记录防火墙规则及后端系统安全访问的配置更新。对于跨多个系统的复杂部署，该指南会详细说明发布时间线与事件顺序。


  *   **测试证据与 QA 签署**：在解决方案可发布之前，来自质量保证团队的测试执行记录与验收是关键输入。目前这通常以文档形式存在，以满足既有标准。作为团队持续部署（CD）目标的一部分，一个理想方向是提供自动化回归、功能与性能测试结果，以证明解决方案的完整性。


  *   **发布说明**：对将部署到环境中的变更进行说明——无论是新功能、对现有方案的更新或优化，还是用于解决运行问题的修复或补丁。


  ## DevOps 实践


  正如朴素的雪橇曾在埃及金字塔建造过程中用于运输大型重物，DevOps 实践也是支撑我们运行环境的关键要素，如图 10-6 所示。凭借多年在运维领域的经验，我曾经常通过调整应用服务器配置把平台从灾难边缘拉回，也曾在系统故障时临场手工重建系统，并因此制造出“雪花环境”；这是一段既令人谦卑又富有启发的经历。


  ![../images/509947_1_En_10_Chapter/509947_1_En_10_Fig6_HTML.jpg](img/509947_1_En_10_Fig6_HTML.jpg)


  图 10-6


  DevOps 基础


  一个完善可观测的运维 DevOps 流程，甚至在第一行代码写下之前就已开始。代码仓库、构建流水线、持续集成（CI）以及迁移流程（前文已详细说明）共同构成了该流程的一部分，它使
  DevOps 实践从开发端得以落地，并最终渗透到运维领域。坦率地说，作为经历过前 DevOps 时代的开发者，当既定发布流程压缩了“微调和快速更新”的空间时，确实会有挫败感。可作为一名工程负责人，看到一个运转顺畅、定义清晰、可重复且可靠，且几乎不给“微调和快速更新”留下空间的流程时，我由衷感激。


  可重复的流程是关键，尤其在敏捷、快速变化的环境中更是如此，因为它既支持快速交付，也具备在必要时回滚的能力。在运维语境下，*可靠地*、*迅速地*执行回滚的能力绝不可轻视。回想过去多年，我仍清楚记得回滚发布时的失望与尴尬，也记得使用备份恢复系统并等待验证回灌过程时的忐忑。微服务架构也带来了巨大帮助，因为它允许细粒度控制，只回滚或前滚出现问题的组件。这种能力为平台提供了一张安全网，带来的信心就像高空走钢丝者在有保护网时更敢于突破极限。


  由于我们平台架构中仍有遗留部分，并非所有系统都具备 DevOps 能力。组织对此非常清楚，并且每个系统都制定了最终实现这一目标的路线图。对于新的实施，例如我们最近迁移到的云容器平台，这是不可妥协的。该环境在“零接触”政策下被严格锁定，唯一可用的变更机制就是图
  10-7 所示的 DevOps 流水线。坚定且毫不松懈的承诺，可能是实现这一目标的唯一方式。只要存在漏洞或后门，交付团队就一定会发现并加以利用。


  ![../images/509947_1_En_10_Chapter/509947_1_En_10_Fig7_HTML.jpg](img/509947_1_En_10_Fig7_HTML.jpg)


  图 10-7


  DevOps 流水线




  ## 日志记录


  基于多年在集成环境中的经验，我认为日志是任何中间件解决方案的生命线。在开发和支持过程中，日志是我用来洞察请求执行路径的主要机制。或许有更优雅的方法可以借助调试工具观察栈上的值，但对我个人而言，一个放置得当、充当“线人”的*console.log*或*logger.debug*语句，往往能在令人眼花缭乱的“谁是凶手”追踪挑战中，指向那个幕后主谋。


  如图 10-8 所示，日志可能存在于多种上下文中。在开发阶段，通常只需跟踪单个文件或标准输出（stdout）流。在集群环境中，日志数量等于参与节点的数量。在面向微服务、以容器为导向的平台中，日志会呈爆炸式增长，单个请求可能穿越多个
  Pod，而这些 Pod 又分布在集群中的不同节点上。


  ![../images/509947_1_En_10_Chapter/509947_1_En_10_Fig8_HTML.jpg](img/509947_1_En_10_Fig8_HTML.jpg)


  图 10-8


  日志上下文


  追踪一笔交易就像试图在许多不同的干草堆里找针。这是我在运维领域学到并始终铭记于平台设计中的经验之一。一个关键的平台架构原则是：从入口点开始为交易附加唯一标识符，并在其穿越环境的每一条日志语句中都使用该标识。这个看似简单的策略实现了我所谓分布式集成环境中的“圣杯”——跨多个组件追踪交易的能力。每个组件都用可追踪标识符记录日志后，这场战斗就已经赢了一半。还必须始终牢记，容器是短暂的——为了处理负载可以创建更多容器，负载消退后又会被销毁，或者因应用异常而重启。由于日志通常写入*stdout*，容器实例关闭或重启时，日志可能因此丢失。


  有一些方式可以缓解日志丢失，比如挂载容器可访问的持久化存储。为了尽量降低容器环境复杂度，团队在应用层面解决了这一需求，方案见图 10-9。所有应用都使用平台日志服务，该服务可访问应用上下文。上下文中填充了大量元数据，例如唯一交易标识符、宿主应用名称以及发起请求的客户端详情。在发起日志请求时，会从上下文、容器和运行时中提取补充数据，打包成一个简单的
  JSON 对象，然后通过 UDP 发送到负载均衡端点。由于这是即发即弃（fire-and-forget）请求，因此将对应用性能的影响降到最低。这也是企业级 Elasticsearch、Logstash
  和 Kibana（ELK）服务的入口点。


  ![../images/509947_1_En_10_Chapter/509947_1_En_10_Fig9_HTML.jpg](img/509947_1_En_10_Fig9_HTML.jpg)


  图 10-9


  日志策略


  系统专属的 Kafka 主题用于缓冲请求并防止消息丢失，因为该能力被企业内不同平台共同使用。这也是我们选择利用企业服务以最小化运维开销的又一个例子，从而让团队能够将最大精力投入到创造*API*价值上。随后，日志*event*会被摄入
  ELK 栈，下一节将更详细介绍。


  ### ELK 栈


  ELK 是三个开源项目名称首字母的缩写：Elasticsearch、Logstash 和 Kibana。Elasticsearch 是搜索与分析引擎。Logstash
  是服务端数据处理管道，可同时从多个来源摄入数据，对其进行转换，然后发送到类似 Elasticsearch 的“存储仓（stash）”。Kibana 让用户能够通过图表和曲线可视化
  Elasticsearch 中的数据。


  优秀应用的一个特征，是能被广泛用户群体轻松采纳和运维。Kibana 控制台本质上是 ELK 栈的用户界面，如图 10-10 所示；它不仅满足这一目标，在我看来还完成得格外出色。


  ![../images/509947_1_En_10_Chapter/509947_1_En_10_Fig10_HTML.jpg](img/509947_1_En_10_Fig10_HTML.jpg)


  图 10-10


  Kibana 控制台


  我观察到一些支持工程师——有时是刚加入团队、只参加过少量知识分享会的新人——也能熟练地在 Kibana 控制台中定位请求失败原因。只要提供唯一标识符，Elasticsearch
  就能消除扫描多份日志的困难，几乎即时展示所有包含该引用的条目，并提供可用于下钻到特定时间范围的时序图。


  Kibana 更进一步，允许用户仅查看字段子集。还可添加额外过滤器以聚焦特定组件。也可以执行 Kibana 查询（即 Kibana Query Language，KQL）来扩大或缩小搜索范围。ELK
  栈很可能是我们运维环境中最重要的要素；如果团队所有成员都投入时间和精力掌握其能力，那么它必将在开发和支持两方面带来显著成效。


  ## 监控


  运维中的这个领域遵循冰山原则。表面上看，它似乎相对简单；但深入观察后，会发现远不止眼前所见。这是一段持续演进的旅程，在我们实施的第一天，能力只具备今天的一小部分。我们监控能力的很大一部分都借助了企业级功能，这在软件许可证层面带来了更低成本，也让发布过渡更顺畅，因为变更管理委员会对继续使用既有运维流程和工具更有信心。在接下来的章节中，我们将审视监控的各个方面，并讨论为何部分之和会形成更大的整体，从而使运维团队能够以先发制人的方式管理平台。




  ### 环境监控


  几乎每个网络运营中心或指挥中心环境中，都会有一排排屏幕展示令人印象深刻且不断变化的刻度盘和仪表。在我看来，这是监控环境的传统机制。如图 10-11 所示，折线图通常表示
  CPU 利用率或内存消耗。当达到预定义阈值时，支持人员通常会一阵忙碌，而当图线回落到阈值以下时，大家又会松一口气。


  ![../images/509947_1_En_10_Chapter/509947_1_En_10_Fig11_HTML.png](img/509947_1_En_10_Fig11_HTML.png)


  图 10-11


  基础设施监控


  这些指标的信息来源通常是安装在物理或虚拟主机上的代理程序。这是监控的基础层级，用于判断物理基础设施是否存在问题。它的作用很像给病人量体温。如果体温或 CPU 偏高，就可作为出现异常的指示。通常这也就是它所能提供信息的边界。


  在 API 或集成环境中，下一个监控层级是服务或端点监控，如图 10-12 所示。这有时也被称为合成监控。周期性探针会测试服务的可用性。我们的团队通常会包含一个*isUp*操作，仅返回一个
  HTTP 200。通过定义告警触发规则（例如连续三次失败），可以消除误报。由于请求通常会沿完整的网络基础设施路径到达端点，因此也能识别负载均衡器或防火墙配置问题，而这些问题未必会在基础设施监控仪表盘中体现。


  ![../images/509947_1_En_10_Chapter/509947_1_En_10_Fig12_HTML.jpg](img/509947_1_En_10_Fig12_HTML.jpg)


  图 10-12


  服务监控


  由于网络环境复杂，曾发生过外部系统变更或更新影响我们服务可用性的情况。周期性、定时执行可作为问题发生时间的确凿证据；进一步的好处是，它能在外部使用方发现并报告问题之前，就先行提醒团队。若继续用病人分诊作类比，这相当于检测血压或血氧饱和度。流量变低可能表明系统中潜在阻塞。单独看它并不能指出根因——但有助于缩小需要进一步调查的范围。


  ### 应用性能监控


  多年前我第一次接触应用性能监控（APM）时，就对这项软件工程成就印象极深。APM 顾问为我们应用的 Java 虚拟机做了埋点，借助字节码注入的“魔法”，我们能够看到事务在平台中的流转。乍看之下，这正是我长期追寻的事务追踪“圣杯”。但随着更多接触和深入研究，我发现
  APM 在软件开发生命周期中有其特定角色，而我对某种略微“更神圣圣杯”的追寻仍未结束。


  尽管 APM 可在生产运维环境中日常使用，但它提供的洞察（如图 10-13 所示）通常主要用于负载测试和性能工程。它就像注入病人血液中的示踪染料，能展示请求到达目的地所经过的精确路径。一些
  APM 产品还会直接呈现数据库请求，从而暴露缺少索引、性能不佳的查询。


  ![../images/509947_1_En_10_Chapter/509947_1_En_10_Fig13_HTML.jpg](img/509947_1_En_10_Fig13_HTML.jpg)


  图 10-13


  APM 事务追踪


  APM 的分析路径可用于优化方案，识别高延迟区域以及系统架构中的潜在瓶颈。坦率地说，这很可能就是运维人员可作为事务执行“唯一信息预言机”使用的圣杯。不过就目前而言，基于我个人经验以及对当前运维流程与规范的观察，我们还没有达到这个结论。


  ### 功能监控


  功能监控的目标，是比“仅验证 API 端点可用”更深入一层，去测试并确认其完整功能是否正常。对于技术候选人，我最喜欢的面试问题之一是：在项目管理、设计、开发、测试或支持这些项目分工中，他/她更倾向哪个方向。顺便说明一下——项目管理其实是个“陷阱”选项，不幸选中它的人，基本就到此为止了。虽然很多人都喜欢写代码，最常见回答是开发，而几乎没人投支持。图
  10-14 展示了我“运维岗位也能写大量代码”这一观点的证据——这是我为平台内部监控开发的一款应用，昵称为*“Homer Knows”*。


  ![../images/509947_1_En_10_Chapter/509947_1_En_10_Fig14_HTML.jpg](img/509947_1_En_10_Fig14_HTML.jpg)


  图 10-14


  Homer Knows


  我们 Marketplace 的关键要素之一是 OAuth 流程。它由一系列 API 调用构成，并会重定向到 Web 用户界面（UI），提示用户进行认证与授权。我们原本只能验证前几步
  API 调用，而 UI 和后续调用的问题，往往要等第三方反馈故障后才会发现。从运维角度看，这种*被动式*方式让我很不安，于是我以此为动力构建了一个可通过桌面端或移动端访问的定制应用：它在简单的*cron*脚本定时触发下，模拟一个用户（Homer
  Simpson）定期跑完整个流程。无论流程成功还是失败，*Homer*都会*知道*。除了学习一个新的移动应用框架，这次实践还让我有机会以与第三方近似的方式来消费
  API。延续我们的医学类比，这使运维团队能够在潜在事故*发生期间*观察“病人”状态，从而可能实时揭示根本原因。




  ### 遥测


  监控中的一个维度，尤其吸引我的是遥测（Telemetry）。我最初接触这一概念，是通过观看一级方程式（F1）比赛。当赛车在赛道上行进时，赛事工程师能够获取这台机器几乎每个方面的详细信息。这可能让维修区团队对赛车运行状况获得了惊人的洞察；如果使用得当，还可以在策略上带来额外的一点竞争优势，并最终赢得比赛。


  由这一认知延伸出的首先是：持续不断涌入的数据量——从胎压和温度，到剩余燃油、机油温度，再到气流，可能有几十项，甚至数百上千项指标需要筛查。遥测真正的美妙之处在于，它赋予了对源端进行远程控制的能力。当前的
  F1 规则可能不允许这样做，但在早些年，赛事工程师可以远程修改赛车配置。举例来说，如果他们发现发动机温度危险地偏高，赛事工程师（与车手协商后）可以降低每个挡位的最高转速，以保护发动机坚持到比赛结束。


  从软件工程的视角来看，这非常令人兴奋，因为它使运维团队能够对解决方案进行“运行时”配置变更，以优化性能，或在必要时保障应用可用性。变更示例包括：增加更多容器副本或实例以应对预期流量、通过环境变量策略动态调整端点配置，或在变更窗口期间展示与移除维护页面。需要注意的是，遥测的目标并不是对运行域进行大规模变更，而是提供“远程控制”能力，用于做细微的航向修正或更新。在不能承受停机的运行环境中，这无疑是一件极其多用途的利器。


  ### 告警


  一个关键教训是：糟糕的告警策略会迅速导致运维流程失效。随着平台业务量增长，发出的告警数量压垮了支持团队。深入调查显示，大多数告警源于数据问题或下游问题，而 Marketplace
  支持团队对此几乎无能为力。在大量不可执行处理项（噪声）中，真实系统问题越来越容易被漏掉，导致问题解决出现不必要的延迟。


  我们随后采用的实时告警方法（为应对高流量而设计）是：不针对“噪声”发送告警，而是基于发现的错误进行分类。最初，所有新错误都会触发告警。经过协商后，若团队无法立即采取行动，则将这些错误重新分类以调整告警策略。这些错误仍会在运维服务台中记录和跟踪，以便修复数据问题或推动下游系统进行变更。此外，所有错误也会在运维仪表板中展示，并且每天向关键干系人发送全量错误报告，这有助于跟踪与下游系统相关的错误量变化。


  为了尽可能复用企业服务并与我们的策略保持一致，平台最初被配置为使用组织现有的告警能力，通过电子邮件和短信（SMS）等多种渠道向值班工程师发送告警。电子邮件的一个挑战是，即便发送到分发组，重要告警也会淹没在大量消息中；针对某个线程的排查或解决回复又会制造更多邮件；而要查找或追溯历史事件，则不得不翻阅邮件归档。使用短信的缺点则是移动网络资费带来的成本。很快我们便意识到，传统机制并不理想，需要一种替代方案。


  一个颇具吸引力的方案是集成 Slack 这类流行沟通平台，数字化领域的其他团队也在使用它。这本有潜力将我们的告警能力推进到光谱的另一端。但在对该方法进行更深入思考后，我们识别出一些潜在缺点：采用非企业标准会与组织战略产生明显偏离；与
  Slack 服务的集成连接存在挑战；并且要求团队每位成员额外安装并配置软件——有时还需要在个人设备上操作，更不用说管理该服务本身的额外开销。


  我们找到的一个很棒的折中方案是使用组织标准沟通软件 Microsoft Teams。Teams 拥有出色的“频道（channel）”功能，告警会以消息形式路由到频道。支持工程师可以围绕某条消息发起线程，开发人员在需要协助时也可跟进并回复。作为组织标准工具，我们还能复用移动应用的安全能力与分发策略。最大的好处在于，我们再次与“复用组织能力与规模优势、消费企业服务”的战略保持一致。


  ## 支持


  本节我们讨论支持能力中的“人”这一要素。最优秀的解决方案，都是在充分考虑并认知*人员、流程和技术*的基础上构建的。作为*人员*要素，支持团队成员借助*技术*（如日志与监控）以及*流程*（如事件管理）来维护
  Marketplace 的健康与稳定。由于 Marketplace 需要 24x7 全天候关注，我们对团队中的这些支持工程师怀有深深的感激。接下来我们将通过讨论支持团队结构、将解决方案从开发过渡到运维的方法，以及我们的内外部沟通策略，进一步展开细节。




  ### 角色


  我们组织数字化实践手册中的一项基础原则是践行*“你构建，你运维*.*”*。乍看之下，这似乎是一种对敏捷方案交付毫不留情的“严厉关爱”方式。根据一线观察，这很可能是构建负责任且可靠解决方案的最强推动因素之一。基于以往项目经验，我观察到解决方案交付与运维之间存在清晰分界——这种分割跨越了部门与事业部，各自拥有自己的人员与组织结构。尽管这种划分能够带来清晰聚焦、关注点分离以及明确的职责边界，但它不可避免地会形成一种*“我们与他们”*的文化。开发团队可能会草率地将方案部署到生产环境，而运维团队则可能在未满足苛刻条件前不愿接手所有权。


  在“开发”章节中讨论过的全栈小队，也包含负责解决方案日常运行的支持人员。这种方式确保一个 API 产品从诞生到退役的责任与问责始终归属于该小队。举例来说，如果方案设计不佳，或缺少足够的日志与错误处理机制，那么运维与开发之间的反馈闭环会很短，并能快速闭合。另有一条长期规则：方案的开发人员在上线后
  30 天内负责支持。在此期间，开发人员将执行 1 级支持，且由运维人员跟班。该阶段还会安排知识共享会议，为支持团队提供运行和管理该方案所需的信息与技能。对于更复杂的方案交付，可能会将运维团队成员分配至项目团队，以便更深入了解内部执行过程，并实现向支持阶段的无缝过渡。


  以下列表详细说明了支持团队中的角色：


  *   **运维负责人**：对平台整体健康状况承担第一责任，并协调团队活动——从支持人员排班到值班表安排。该角色需要足够的技术判断力，能够理解问题及其影响，必要时可能需要深入细节，但也要有克制力，判断何时亲自上阵、何时指挥团队。不幸的是，技术导向的人往往比流程更偏爱细节。其优势是负责人能协助问题解决；其风险（对此我有切身体会）在于个人可能承担过多，成为单点故障，甚至成为最大风险：没有时间建立或支持管理团队所必需的流程与规程。正因如此，这一角色最适合由技术与流程能力均衡的人担任。


  *   **1/2 级支持**：如上所述，该角色通常由上线后支持期内的开发人员担任。根据你的 Marketplace 特性，平台需要 24x7 支持，而这组工程师位于一线，负责识别与分诊问题并维护
  API 产品完整性。本章稍后会讨论，定义清晰的仪表板与告警机制是帮助该团队识别问题的关键。分诊是支持工程师极其重要的职责，而能够判断问题根因是我们着力培养的关键特质。工程师会持续对问题负责，直到问题被解决或缓解，即便问题超出平台边界。若需要额外协助，则会创建支持请求，详细记录问题、受影响域、分析结果、日志以及可能的可疑区域。随后将其分配到下一层级支持进行调查。


  *   **3 级（开发）支持**：在团队规模较小时，1/2 级无法解决的问题会直接路由给开发人员协助。其好处是缩短了问题发现到解决之间的闭环。其缺点是可能影响宝贵的开发时间。秉持团队“*你构建，你运维*”的理念，这能让开发人员对其交付结果保持问责。本质上，编写高质量代码并重视与运维团队进行方案知识共享，将最大限度减少对后续开发的干扰。必要时，可能需要进行代码更新。根据问题严重程度，这可能被纳入下一次发布，或通过流程快速通道立即部署。


  ### 过渡


  鉴于交付节奏，Marketplace 中来自多个业务流的 API 产品会持续交付与更新，以跟上产品负责人需求和消费者需求。运维能力以共享服务形式运行，以实现最高效率。也就是说，由一个团队跨多个业务流支持所有
  API 产品。这样团队只需配置一名 1/2 级支持工程师（通常按 24x7 排班），同时还能降低成本。


  当生产环境有新更新时，交付团队在指定周期内对上线后支持负主要责任。在此期间，运维团队成员会提供影子支持，以观察可能出现的问题及其修复方式。这可被视为“在岗培训”或隐性知识共享。交付团队还会组织知识共享会议，其次数与发布复杂度成正比。交付团队以一种*“让我帮你来帮我”*的视角看待这一过渡期。也就是说——升级到开发支持的支持请求概率，与支持工程师的知识和技能成反比。简单来说——被充分赋能的支持工程师，可能无需开发人员协助就能解决运维问题。


  根据个人经验，我发现开发进行到一半还要处理支持咨询，会导致上下文切换，严重影响我的交付能力。除了对生产环境中稳定可靠方案所带来的自豪感之外，这一点本身就足以成为任何开发人员确保运维团队获得充分赋能、能够支持其方案的理由。




  ### 沟通策略


  任何运营能力的关键要素之一，都是有效的沟通策略。由于组织内外存在大量集成点，要让所有利益相关方保持一致并非易事。以下是我们当前机制的示例：


  *   **定期更新**：由值班支持工程师每 2 小时通过 WhatsApp 发送一次更新，内容包括：i）生产 Live 和 Sandbox 环境的稳定性；ii）内部消费应用的商业统计数据，如访客数与注册数；iii）API
  调用分析，即当前流量与一周前流量的对比。


  *   **第三方沟通**：当计划内维护会影响 API 产品可用性时，向第三方发送通知。通常 Marketplace 团队一旦从支撑型企业系统或下游服务提供商处收到计划更新通知，就会立即进行告知。由于我们拥有治理良好的组织变更管理流程，通知通常最迟会在事件发生前至少
  3 天发出。若发生内部或下游系统故障导致事故或紧急中断，也会向第三方运维团队发送通知。由于企业内平台与系统数量庞大，对于那些我们未直接集成的系统，将我们的平台登记为“受影响/相关”方确实花费了一些时间。例如，Marketplace
  并不直接集成到主机系统（mainframe），但一旦其宕机，Marketplace 仍会受到显著影响。


  *   **作战室（War room）**：该措施通常在企业内发生严重中断时启用。一般由值班支持工程师触发：当其观察到与收入相关的关键 API 产品在一段时间内失败请求数超过预设阈值时即启动。来自支撑团队（无论是企业服务支持团队还是下游提供商）的反馈，会传达给更广泛的
  Marketplace 团队。


  *   **焦点电话会议（Focus call）**：当中断持续时间较长时，将召开焦点电话会议，并要求所有支撑团队强制参加。由于这可能涉及众多工程师和系统负责人参与，其目的在于让所有利益相关方同时在线，以尽快解决问题。


  ## 流程


  为确保运营事件处理方式统一，Marketplace 支持团队将图 10-15 所示的轻量化流程作为主要参考。该流程为问题修复提供不同路径——如有必要，会创建“Incident（事件单）”，这是组织内跨系统沟通问题的标准方式。读者会注意到，该流程清晰定义了通知策略，以确保所有利益相关方保持一致。


  ![../images/509947_1_En_10_Chapter/509947_1_En_10_Fig15_HTML.jpg](img/509947_1_En_10_Fig15_HTML.jpg)


  图 10-15


  事件管理流程


  ### 问题跟踪与报告


  在我们的 Marketplace 刚上线时，API 产品很少，消费者更少。就像小镇警长维持治安一样，我们当时的方法非常临场、随性。问题记录在“餐巾纸背面”，并在最后时刻被解决。正如小镇因发现金矿而爆发式增长一样，随着多个交付流并行构建新的
  API 产品、连接到新的后端提供方的“铁路”不断铺设、第三方提供商蜂拥而至消费 API，平台也迅速扩张。问题不断堆积，而那种“神枪警长式”的环境维护方法很快演变为单点故障。


  支撑该环境的关键举措之一，是实施服务台来记录、跟踪并报告问题。支持工程师被明确要求：凡是无法在几分钟内解决的请求，都必须认真登记。记录问题所花费的时间，即便只是处理来自第三方提供商的开发咨询这样看似琐碎的事项，也被证明极具价值，因为这为团队提供了定义清晰的时间线和事件记录。随着对运营环境可见性的提升，运维管理团队得以清晰掌握“战场态势”。资源可被调配到最关键的问题上，而长期无进展的事项也会随时间推移获得更高可见度。


  类似于开发团队每天通过站会讨论当前冲刺任务，运维团队也有每日例会。该会议在策略上安排在平台团队站会之前，以便那些需要更多技术支持的事项能在更大范围内讨论。在该会议中，会讨论过去
  24 小时内的问题、宕机、错误和修复活动。由于有团队资深成员参与，这一机制能够提供：对平台稳定性的洞察、对未来类似情况处理方式的指导、解决未决事项的下一步决策，以及运维团队申请额外协助的机会——包括开发支持、进一步调查时间，或通过升级推动外部依赖方响应。


  每日会议的另一个目标，是“回馈可见性”，让支持团队了解各交付流即将发布的版本。随着开发冲刺接近完成，某些内容可能因测试延迟或外部依赖而无法发布。让支持工程师及时获知发布计划，可使团队有充足时间准备，并在必要时提前提醒交付负责人注意计划维护事项或可能影响发布的外部系统稳定性问题。更重要的是，这也是对运维团队持续保障平台平稳运行的明确认可与尊重信号。


  凭借技术导向的团队特质以及对 API 的偏好，我们已整合服务台软件提供的接口，并使其成为每日以程序化方式挖掘的关键数据源之一。处于不同生命周期阶段的进行中问题会被汇总并展示在定制仪表板上，用于快速识别平台热点。例如，大量第三方提供商支持请求报告间歇性网络问题，可能提示防火墙存在隐患，可据此进行前瞻性处理。历史事项同样重要，并会在定期评审会议中用于向外部利益相关方汇报，如图
  10-16-1 和 10-16-2 所示。这些报告可提供平台稳定性、问题平均解决时间以及流量规模等洞察，可用于论证平台追加基础设施与人员资金的必要性。它为需要重点关注的支持领域提供了清晰、明确且有数据支撑的证据，从而提升平台稳定性。


  ![../images/509947_1_En_10_Chapter/509947_1_En_10_Fig17_HTML.png](img/509947_1_En_10_Fig17_HTML.png)


  图 10-16-2


  按应用域统计工单报告


  ![../images/509947_1_En_10_Chapter/509947_1_En_10_Fig16_HTML.png](img/509947_1_En_10_Fig16_HTML.png)


  图 10-16-1


  报告——工单趋势与严重性分析




  ### 服务级别协议


  事件由支持工程师根据问题的严重性和优先级划分到不同类别。定义及严重性映射遵循表 10-1 中定义的矩阵。


  表 10-1


  严重性-响应映射


  | 严重性分类 | 严重性标签 | 标准响应时间 |

  | --- | --- | --- |

  | 功能完全受阻（所有用户受影响） | 严重（阻断级） | < 30 分钟 |

  | 部分功能受阻（许多用户受影响） | 高 | < 2 小时 |

  | 部分功能受影响（有替代方案） | 中 | < 24 小时 |

  | 某一功能区段受影响（用户数量较少） | 低 | < 48 小时 |

  | 支持团队受阻（后端依赖） | 阻塞 | 在服务台中跟踪 |


  ## 支撑系统


  我们的平台有两个主要依赖——一个内部依赖和一个外部依赖。内部组件是 Marketplace 的构建模块，已在介绍平台架构的章节中讨论。内部组件出现问题可能会导致整个平台不可用。外部元素是
  API 产品的后端服务提供系统。根据提供方接口的性质，一个或多个 API 产品都可能受到影响。在下面各节中，我将更详细地讨论内部和外部支撑要素。


  ### 平台即服务策略


  正如在介绍平台架构的章节中所讨论并在图 10-17 中所示，我们的策略是尽可能利用企业现有能力。几乎从 Marketplace 创建之初，我们就已经认识并接受这样一个事实：组织内拥有高技能、专注且敬业的人员，他们通常具有多年管理特定系统的运营经验。基于这一点，我们采用了尽可能利用企业能力的策略。


  ![../images/509947_1_En_10_Chapter/509947_1_En_10_Fig18_HTML.jpg](img/509947_1_En_10_Fig18_HTML.jpg)


  图 10-17


  托管平台服务


  外包的“托管服务”方式也有其缺点，因为它使我们与企业紧密耦合，我们可能需要更长时间等待系统升级，并且必须与其他租户共享资源。然而，我们发现平台成熟度加速、专属技术支持以及显著降低运营支出预算等优势，使其成为一个很有吸引力的选择。


  一旦支撑系统出现问题，Marketplace 支持工程师将通过联系负责该系统的对口团队来遵循事件管理流程。如果无法建立直接联系，则需要运营指挥中心协助，后者将启动既定的升级流程以追踪相关系统负责人。在中断问题解决之前，问题归属仍由
  API Marketplace 支持团队承担。由于每个系统都有其自身依赖，根因可能位于更底层的技术栈。举例来说，数据库中断可能由与存储区域网络（SAN）的连接丢失引起，而该连接丢失又可能是防火墙规则更新导致的。凭借多年支持复杂互依系统的经验，我们的组织采取务实果断的方法：对于高严重性、影响服务的中断，会迅速召集“焦点会议”，并要求所有支撑团队强制参与。这种方法能够快速定位根因并完成修复。正是在这种时刻，当我们看到企业整体力量被调动起来解决中断时，我们会更加庆幸采用了平台即服务策略。


  ### 后端依赖


  如图 10-18 所示，API Marketplace 拥有多个消费者，每个消费者使用一个或多个 API，而一个 API 会集成到一个或多个提供方系统中。沿着这棵关系树向上回溯可以观察到：单一提供方的故障可能影响一个或多个
  API，并进一步产生连锁效应，影响一个或多个消费者。


  ![../images/509947_1_En_10_Chapter/509947_1_En_10_Fig19_HTML.jpg](img/509947_1_En_10_Fig19_HTML.jpg)


  图 10-18


  消费者、API、提供方关系


  我们管理这一复杂的消费者、API 与提供方网络的方法如下：


  *   清晰掌握每个 API 产品对应哪些后端系统作为**提供方**。这是一个“动态”视图，因为每次发布都可能出现产品与后端之间的新连接。


  *   根据 API 的性质，确定后端的**关键性**。例如，如果安全服务提供方不可用，会影响身份验证，用户将无法登录；如果参考数据提供方不可用，则可临时使用缓存数据。


  *   API Gateway 可用于确定消费者订阅了哪些 API 产品。


  *   制定服务矩阵，以便运营团队能够快速判断后端提供方接口丢失所带来的影响。对于关键提供方依赖，消费应用也可能需要额外措施，例如显示维护页面或隔离特定功能。


  *   我们平台待办事项中的一个重要条目是发布 API 状态。提供方系统的可用性将是该视图的关键输入。


  ## 总结


  在本章中，我们更深入地探讨了运营环境中的不同领域。基于我们构建并上线 API 平台的经验，以及对大量需考虑领域的观察，一个关键经验是：应在平台生命周期的早期就建立运营化视角。我们还强调了我们的变更与发布管理方法，该方法经过了定制，并且重要的是，已适配到一个既有组织中运行。再次说明，DevOps
  *实践*是实现持续、可靠敏捷交付的关键推动因素。


  必须始终从*人员（people）、流程（process）*和*技术（technology）*的视角来考虑运营环境的运行。尽管这听起来可能有些老生常谈，但这些要素在本质上彼此交织、相互支撑，并最终带来更高效、更可靠的平台。前文讨论的日志与监控方法提供了*技术*能力，并使我们能够洞察解决方案执行情况。对支持团队角色、赋能和沟通策略的强调，展示了*人员*要素如何融入其中。定义良好的*流程*是实现
  Marketplace 良好运行、可预测性与稳定性的关键。


  我们的 Marketplace，以及很可能你的也是，依赖于许多内部支撑要素和后端服务提供方。最后，我们探讨了利用企业托管服务并与提供方系统高效协作的方法。坦率地说，本章最终比预期更长、也更为细致。我将其归因于运营版图的广阔，以及一个简单事实：一个解决方案在其生命周期中的大部分时间都处于执行环境之中。




  '
- '# 11. 结论


  我们的 API Marketplace 实施现已进入第五个年头。值得注意的是，如今平台的发展节奏与活力比以往任何时候都更加蓬勃、更加强劲。我真诚地相信，这个平台如今已经是一个有生命力、会呼吸、*几乎*能够自我维持的实体。当我查看自己的待办清单时，仍然有若干我已识别出的可优化领域。其中一个原因可归因于过去尚不可用的技术选项。我们始终在持续探索如何精简性能与执行——随着平台每次迭代都会出现新的路径和方法，这很可能是一场永无止境的追求。另一个重要因素是，后端产品团队如今非常热衷于将其服务发布给外部使用，而我们也有一份不断增长、已排期交付的
  API 清单。


  坦率地说，在写这本书的过程中，我曾质疑过：这些时间本可以用来继续培育平台。让我坚持写下去的原因，是希望通过分享过去四年的经验，尽力提炼出我们的成功公式——以帮助其他实施从零起步。正如我在多个场合提到的，每一个
  Marketplace 实施都会是独特的，都会根据所在组织的需求与身份进行定制。你将要构建或正在构建的 Marketplace 极不可能采纳文中从平台架构到运营所列出的每一个概念或方法。不过，我由衷希望你在阅读本书时，书中提出的方案能够为你的平台创新提供基础、催化剂或触发点。


  基于事后复盘的视角，以及对许多反复出现主题的细致观察，我坚信我们的公式中有一些关键要素，它们对实施成功至关重要。尽管其中许多并非技术层面，但它们对这一倡议的工程精神不可或缺。


  ## 团队动态


  在第 1 章中，我强调了驾驶 Marketplace 星舰驶向全新且未知领域的关键角色。尽管这些角色可以由有才华的个人担任，但更关键的是这些角色必须作为一个统一体协同运作。在任何长期项目中，人力资源变动都是不可避免的。我们的情况也不例外，团队经历了多次变化，除了我自己和另外一两名成员之外，其他人都发生过更替。


  这让我获得了一个独特的观察视角，见证了多种团队组合，有些成功，有些则不然。我们当前配置之所以最成功，简单来说可归因于出色的团队动态与文化。各种不同的个性，就像《星际迷航》的船员一样，彼此互补，更重要的是彼此平衡。很多时候，意见分歧会多于普遍共识。奇怪的是，这恰恰可能是成功团队文化的原因。通过积极、健康的讨论与辩论来审视多个视角，我们通常能找到最平衡的解决方案。反过来说，如果每个人都很相似，最终结果就会在某个特定方向上严重失衡。


  在每一次讨论中，所有观点都会被听见并被纳入考量。这要归功于舰长出色的引导能力。如果无法达成共识，舰长会在综合所有输入后作出裁决。即使某位成员的方案没有被采纳，他们也会感到被安抚，因为他们有机会表达自己的看法。一旦确定了解决方案或目标，团队所有成员都会朝着同一方向发力。


  > *整体大于部分之和（亚里士多德）。*


  ## 组织支持


  我同样坚信，如果没有强大的企业级服务基础，我们不可能维持完整的运营能力，更不用说建立一个 API Marketplace。这并非我一直以来的看法。在构建最小可行产品（MVP）的早期阶段，我们曾将企业内其他部门视为阻碍成功的因素。第三方开发者利用组织能力这一理念，再加上我们激进的技术选型，远远超前于当时的标准实践。回过头看并加以反思，几年前我们项目团队那种任性与急躁的心态，其实相对不成熟。鉴于我们当时试图为组织构建一个全新的数字渠道，本应采取更审慎、更稳妥的推进方式。API
  Marketplace 位于传统企业边缘、用于连接第三方访问的这一位置特性，很可能既促成了项目团队选择前沿技术，也引发了组织层面的担忧。


  项目团队从“烦躁”到“感激”的心态转变，以及组织其他部分从“怀疑”到“信任”的变化，发生在平台运营化的过程中。通过利用企业能力，我们继承了资深专家的经验与专业知识，这帮助平台从受控实验环境下运行，快速走向能够可靠承载真实世界工作负载的成熟状态。通过展现更多耐心与韧性，我们也得以更好地传播
  API Marketplace 能为整个组织带来的能力与覆盖范围，并从企业各个领域争取到支持。


  我个人和职业层面学到的一条关键经验是：试图绕开流程与治理，往往需要付出更多时间和精力。与其如此，不如给予组织应有的尊重，学习如何在现有流程中推进，更重要的是理解其功能与目的。很大概率上——你会发现这些机制是在保护组织及其用户。一旦你真正掌握了流程及其作用，再尝试围绕敏捷性进行优化。


  > *首先要寻求理解。*




  ## 灵活转向的能力


  在我们搭建平台使命推进的过程中，曾有几次遭遇重大挑战，有时甚至威胁到整个项目的存续。最典型的例子包括：我们首个 API 产品的关键后端提供方因监管要求在最后时刻退出；以及一家知名第三方使用方因接入新
  API 遇到困难，极有可能错过一个关键年度目标。


  第 1 章讨论过的快艇式运营模型，使项目能够迅速转向并快速调整方向。有意思的是，为了缓解失去关键后端的影响，我们选择了组织内一个重要性和可见度都低得多的系统作为替代，因为它提供了类似但使用频率更低的功能。起初，项目团队对未能借助那个更高曝光度的后端高调上线感到失望。随着时间推移，这种情绪很快转为庆幸，因为我们观察到了支撑在线
  API 的各种挑战，也看清了自己在从原型过渡到落地执行方面准备不足。坦白说，如果当时上线的是那个更高关注度的 API，我们将没有足够时间稳定运营平台。


  除了认识到我们的 API 设计应当更简洁、以及需要积极推动第三方开发者参与之外，这次险些错过关键里程碑日期的“重磅风险”还催生了一种新的集成模型。该模型使平台能够在可能的地方吸收复杂性，从而加速
  API 采用。此后，这一模式已成为我们 Marketplace 的基石，并被积极用于未来的产品设计。这次经历带来的积极启示是：API Marketplace 的实施并非绝对的非黑即白。秉持真正的创业思维，团队和平台应尽一切可能促成并维持第三方采用。如果这意味着在开发者线下活动中发放
  T 恤和马克杯来激发兴趣，或是构建一个用户界面来支持 API，


  > *做必须做的事。*


  ## 以开发者为中心


  正如在商业化章节中讨论的那样，驱动 Marketplace 的关键要素是第三方开发者。我可以毫无保留地说，一切都应为第三方消费而存在。即便你的 Marketplace
  拥有最广泛的 API 产品，并建立在卓越且突破性的技术平台之上——如果没有*活跃的*第三方参与，这项计划就注定失败。


  API 在构思与打造时，应把第三方的需求、兴趣和能力放在核心位置。技术团队可能会沉迷于“炫技感”和“可夸耀性”——例如通过由 Unix 操作系统创始人开发的摩尔斯电码协议去集成遗留主机系统。但如果它暴露的功能对组织外部消费者毫无兴趣或价值有限，这种投入就是浪费。产品负责人肩负着一项艰巨任务：在“半自我陶醉、坚信其遗留系统具备颠覆性能力”的后端提供方，与“急于打造下一个爆款应用”的多变第三方消费者之间弥合数字鸿沟。


  前文已详细讨论的 Sandbox 概念，是一个能够且必须用于促进这种互动的工具。它不仅仅是支撑第三方测试的机制。它还可用于衡量第三方兴趣与需求、塑造 API 定义，更重要的是，作为超敏捷外部消费者与更稳健、治理完善、传统企业生态之间的缓冲层。


  最后，也可能是最重要的一点：开发者门户是你 Marketplace 的门面，代表着第三方与平台的首次交互。下次当你站在实体店门前，或访问一个新的电商门户时，不妨思考一下促使你进一步参与的决策过程。带着这种视角上线你的开发者门户，并从第三方消费者角度去审视它。这应由团队所有人持续且坦诚地进行，甚至可邀请朋友、家人及其他团队同事参与，以尽可能获得更多反馈与评审。


  尽快与你的第三方社区建立互动，以收集反馈并理解你的市场。你所在区域的开发者或第三方可能需要帮助与支持才能使用你的平台。请务必牢记这一点。


  > *开发者是你宇宙的中心。*


  ## 从哪里开始


  到现在为止，构建 API Marketplace 这项任务可能看起来极其困难。毕竟，你是在为组织建立一个全新的数字渠道，而这种能力需要由行星级规模的平台架构作为底座。更不用说
  API 本身还必须设计精良、遵循敏捷原则开发，并具备企业级支持能力。


  此时，我想与你分享我的第一编码原则：


  > *保持简单，迭代构建。*


  本书中分享的原则、平台架构、设计方法、敏捷开发与运维流程，都是经过*多年*演进而来，并且仍在持续进化。我们的实现始于一个 API 产品，用于展示 MVP。如果让我重来一次，我会把这个原本就不大的范围再大幅缩减。完全可以，甚至应该，从少量
  API 产品起步来构建可持续的 API Marketplace。这些产品可以服务于细分功能，平台也完全可以运行在遗留架构上——只要它稳定。请限制初始 API 产品数量——我建议最多从两个开始。抵制把开发者门户（门面）堆满产品的诱惑。以一名开发者的朴素观点来看，一个完整可用的
  API，远比十个长期“即将上线”的 API 更令人信服。


  产品少一些，也更容易进行后期改造——包括性能优化、监控增强和运维可观测性提升。贯穿本书的一条关键经验，也是我多年集成实践中反复验证的一点：接口是为更大的解决方案服务的。只要它稳定、可预测、可靠，消费者其实并不在意它是用坠毁地球的外星飞船高级动力核心驱动，还是用建造金字塔时代的古老工艺实现。让你的平台架构随时间演进——与
  Marketplace 的需求和要求保持一致。再次提醒，请克制，因为这往往是一个“上最新最炫技术”的诱惑点。


  设定一个时间框架，尽可能短到三个月，最长不要超过六个月，发布你的第一个 API，并在此基础上持续迭代。


  ## 保持联系


  在撰写本书时，我借鉴了多年的经验，主要是跨广泛项目与场景的集成实践。技术工作的奇妙之处之一在于：解决同一个问题往往有很多种，甚至无限多种方法。这也是我每天都迫不及待打开笔记本的原因——因为我会得到一个新问题，并以*我的*方式去解决它。我尤其希望了解你的
  API Marketplace 之旅，以及你和团队为应对挑战所采用的方法——也许和我们一样，也许（而且很可能）完全不同。欢迎随时保持联系，告诉我你对本书任何内容的想法、建议、反馈，甚至反驳意见或批评。


  我相信，只有通过分享与协作，我们才能不断前进。期待你的来信。




