    *For Dineshree, Kerisha, and Nicalen*


    Introduction


    An API Marketplace is a key enabler for any organization with a goal of establishing
    a platform business. Due to its purpose as a digital channel between third-party
    developers and the enterprise, it is a delicate balancing act. Allowing access
    to internal services and capability – with fine-grained control. Innovative products
    and solutions – subject to organizational governance. Blindingly fast agile delivery
    – in accordance with enterprise standards of quality. Liberation and democratization
    of customer data – with consent. Planet-scale architectures on cutting-edge technology
    – with enterprise grade reliability.


    The basic premise of an API Marketplace is openness. Continuing in this spirit,
    the intention of this book is to document the journey our implementation has been
    on, for many years now – to share our experience, learnings, pitfalls, and solutions
    with Engineering teams that are about to set out, or that may already be on a
    similar quest. The approaches and solutions discussed have evolved over time and
    are in a continual state of optimization. It is my sincere hope that it will accelerate
    other implementations and further enhancements of those platforms will also be
    shared to catalyze adoption of the practice.


    Primarily intended for a technical audience, this book provides a view of an API
    Marketplace from different perspectives. As a point of departure, I identify the
    vision and goal of an API Marketplace – essentially the problem it solves (*why?*),
    the approach (*how?*), and the roles needed (*who?*). I then take a detailed look
    at the global wave of regulation sweeping over the Financial Services industry,
    which is also likely to occur in other sectors – such as Telecommunications and
    Health. The purpose is to understand the drivers for regulation and various responses
    from different territories to help you define the identity and roadmap of your
    platform.


    A new digital channel brings a new audience, and in my chapter on Consumption,
    I discuss strategies to help both business and technical users understand and
    access the platform. In the chapter on Monetization, I discuss the nucleus of
    our implementation – the *API Marketplace flywheel*, as we call it – which has
    afforded our implementation self-sustainability. I also discuss the various technical
    elements in detail which are needed to support various billing approaches – some
    established, some evolutionary, some revolutionary.


    Building an API Marketplace requires a change of mindset regarding Platform Architecture,
    API Design, and Delivery, and in these chapters, we dive into the detail of our
    approach – both past and present. A Sandbox environment is a critical element
    of any Marketplace implementation, and I propose strategies to handle various
    types of scenarios and consumers. Possibly the most demanding, but also the most
    exciting and dynamic, stage of an API product in its lifecycle is in an operational
    context. I provide an honest account of our experience, both good and bad, enablers,
    and practices to provide enterprise-level support for our implementation.


    To navigate this book, I would suggest starting with Chapter [1](#509947_1_En_1_Chapter.xhtml),
    which sets the context for an API Marketplace, then diving into the chapter which
    most aligns to your area of interest.


    *   If you are still researching or deciding to build an API Marketplace, start
    with *Regulation*, then *Monetization*.


    *   Product Owners should start with *Consumption* and *Monetization*.


    *   Platform teams should start with *Platform Architecture*, then understand
    the *Sandbox* requirement and the execution context of *Operations*.


    *   Delivery Leads and Development teams should start with *API Design*, then
    *Development*, *Sandbox*, *Operations*, then circle back to *Consumption*.


    Acknowledgments


    First and foremost, this would not have been possible without God – from inception
    to completion. I would like to thank my wife and the nucleus of my power core,
    Dineshree, for her love and support during this project. Most importantly, for
    her unwavering understanding and patience when I set out on these crazy conquests.
    It means more to me than she will ever know. To my children – Kerisha and Nicalen
    – I am sincerely sorry if this book took away time that I should have been spending
    with you. I hope that the result makes you proud. The sagely advice, motivation,
    and counsel from my good friend, Asif Hamza, encouraged me to continually set
    the bar higher.


    The African proverb that it takes a village to raise a child rings true, and I
    have been able to take on a project of this magnitude with a lifetime of encouragement,
    support, and belief from my family – Mannie, Ronnie, Kamala, Savanthala, Viverge,
    Tanya, Ethan, Neshica, Kerushen, Nishen, Kershnee, Alena, Ayla, Lawrence, Daisy,
    and Shivaal – and friends – Ajay, Nafisa, Zara, Rayyan, Bilal, Brett, Jairaj,
    Jason, JJ, Kiren, Mark, Paul “PCB,” Rajesh, Sree, Srinath, Tony, Trevlyn, Vish,
    Walter, Warren, Waseem, and William (Mr. Magic).


    To my fearless crewmates from the Starship Enterprise – Jacque Coetzee (Captain
    Kirk), Amjid “AJ” Ali (Mr. Spock), Kevin Kalil (Dr. McCoy), and Gareth Hiepner
    (Uhura) – it has been both an honor and a privilege to serve as the Head of Engineering
    (Scotty). I consider myself lucky as it is not often you get to work with like-minded
    people *and* people you really like. Special mention to our previous Product Owner,
    Shiv Rajah, who played a key role in our evolution.'
