  trans: '

    ### 全球开放银行概览


    表 2-1 至 2-9 展示了多个国家在某一时间点的开放银行现状。需要重点关注的是，各司法辖区所采用的战略存在差异——有些选择了规定性（Prescriptive）方法；有些则选择了促进型（Facilitative）或市场驱动型方法。我们还考察了主导该倡议的监管机构、参与的服务提供商、接入类型、产品范围以及当前状态。刚刚起步的国家可以借鉴那些数年前已开始实践国家的洞见与经验。


    表 2-9


    开放银行——美国


    | 司法辖区 | 美国 |

    | --- | --- |

    | 方法 | 市场驱动型 |

    | 牵头机构 | 美国消费者金融保护局 |

    | 服务提供商 | 自愿参与 |

    | 接入类型 | API、屏幕抓取 |

    | 产品范围 | 由消费者决定（任何金融数据） |

    | 状态 | 开放银行目前没有法律强制要求，数据共享方式由金融机构自行决定。相关实体仍在使用屏幕抓取而非开放 API。这包括聚合客户金融数据的基于 Web
    的财务管理工具 |


    表 2-8


    开放银行——南非


    | 司法辖区 | 南非 |

    | --- | --- |

    | 方法 | 市场驱动型 |

    | 牵头机构 | 南非储备银行（SARB） |

    | 服务提供商 | 自愿参与 |

    | 接入类型 | API、屏幕抓取 |

    | 产品范围 | 正在审查中 |

    | 状态 | 目前，SARB 不对开放银行活动（如屏幕抓取和开放 API）进行监管、监督或审查，也不评估其有效性、稳健性、完整性或鲁棒性。SARB 认为开放银行活动应当被监管并改革，应管理相关风险并嵌入安全考量，同时确保并提升客户体验。目前咨询流程正在进行中
    |


    表 2-7


    开放银行——新加坡


    | 司法辖区 | 新加坡 |

    | --- | --- |

    | 方法 | 促进型 |

    | 牵头机构 | 新加坡金融管理局 |

    | 服务提供商 | 自愿参与 |

    | 接入类型 | API |

    | 产品范围 | 在系统内对所有参与方都有效的数据与人工智能的伦理使用 |

    | 状态 | 新加坡正尝试实施一种不同类型的监管框架，采取较不激进、更加自然演进的方式。其不计划将监管强制施加给金融机构 |


    表 2-6


    开放银行——日本


    | 司法辖区 | 日本 |

    | --- | --- |

    | 方法 | 规定性 |

    | 牵头机构 | 金融厅 |

    | 服务提供商 | 所有银行 |

    | 接入类型 | API |

    | 产品范围 | 银行账户（活期、储蓄、存款） |

    | 状态 | 2018 年，《银行法》修订，要求金融机构开发 API 供第三方使用 |


    表 2-5


    开放银行——印度


    | 司法辖区 | 印度 |

    | --- | --- |

    | 方法 | 混合模式——规定性与市场驱动型 |

    | 牵头机构 | 印度国家支付委员会（NPCI） |

    | 服务提供商 | 参与的银行和支付服务提供商 |

    | 接入类型 | API |

    | 产品范围 | 由消费者决定（任何金融数据） |

    | 状态 | 印度政府已强制推行开放 API 政策。2016 年推出 IndiaStack，作为一组 API。Aadhaar 生物识别数字系统通过政府专有软件（处理集中式认证数据库）促进开放
    API 银行业务 |


    表 2-4


    开放银行——中国香港


    | 司法辖区 | 中国香港 |

    | --- | --- |

    | 方法 | 促进型 |

    | 牵头机构 | 香港金融管理局 |

    | 服务提供商 | 20 家参与的零售银行已提供 500 多个开放 API，可访问广泛银行产品和服务的信息 |

    | 接入类型 | API |

    | 产品范围 | 由消费者决定（任何金融数据） |

    | 状态 | 2018 年 7 月：香港金融管理局推出《开放 API 框架》，旨在促进银行业开发并更广泛采用 API。2019 年 1 月：该框架第一阶段启动
    |


    表 2-3


    开放银行——欧盟


    | 司法辖区 | 欧盟 |

    | --- | --- |

    | 方法 | 规定性 |

    | 牵头机构 | 欧盟委员会 |

    | 服务提供商 | 所有银行和支付服务提供商 |

    | 接入类型 | API、屏幕抓取 |

    | 产品范围 | 活期和储蓄账户 |

    | 状态 | PSD2 指导银行开放其系统，允许第三方在客户同意的前提下访问特定客户账户信息，以便代表客户进行支付（通过贷记转账），并向其提供不同支付账户的汇总视图。•
    其目标是通过数据共享提升竞争并促进创新 |


    表 2-2


    开放银行——中国


    | 司法辖区 | 中国 |

    | --- | --- |

    | 方法 | 市场驱动型 |

    | 牵头机构 | 金融科技公司 |

    | 服务提供商 | 支付宝、金融科技公司 |

    | 接入类型 | API |

    | 产品范围 | 由消费者决定（任何金融数据） |

    | 状态 | • 开放银行并非由监管机构推动，而是由金融科技公司驱动 |


    表 2-1


    开放银行——澳大利亚


    | 司法辖区 | 澳大利亚 |

    | --- | --- |

    | 方法 | 规定性 |

    | 牵头机构 | 财政部 |

    | 服务提供商 | 分阶段推进。2020 年 7 月——四大银行。2021 年 2 月——其他银行 |

    | 接入类型 | API |

    | 产品范围 | 信用卡与借记卡、存款与交易账户、抵押贷款和个人贷款数据 |

    | 状态 | • 2018 年：澳大利亚政府批准开放银行框架 • 2020 年 7 月：以分阶段方式实施，依法要求四大银行向消费者开放其在信用卡和借记卡以及存款和交易账户方面的使用数据
    • 2020 年 11 月：共享抵押贷款和个人贷款数据 • 2021 年 2 月：其他银行开始共享数据 |

    '
- fmt: '## From Open Banking to Open Finance


    Open Banking is just the first stage in the metamorphosis of the Financial Services
    industry. Open Finance is the term used to describe the extension of Open Banking
    data sharing and is also built on the principle of consumers owning the data they
    create on financial service providers’ platforms. The data, with consumer consent,
    can be shared with approved third-party providers to develop and offer innovative
    products and services. While Open Banking only focuses on accessing banking transactional
    data or making payments on a customer’s behalf, Open Finance goes wider. It includes
    all consumer financial services data such as savings, debt, investment, pensions,
    alternative lending, and insurance. For insurance, customer data sourced from
    the incumbent service provider can be used to identify personalized and best priced
    insurtech products, while in alternative lending, historical transactional data
    can be used for more reliable credit scoring and affordability analysis. It has
    the potential to transform the way consumers and businesses use financial services.


    There are many lessons from the Open Banking journey which can be used to make
    Open Finance a success:


    ### Standardization


    Standardized access to data is key to avoid market fragmentation. In the way power
    supplies and electrical sockets are consistent in a country, providing a standard
    `API` definition will allow third parties to focus on providing value to the customer
    rather than on the different nuances of each service provider. A rule-based approach
    for data sharing – as with Open Banking in the UK – may be preferable to the principle-based
    approach applied in `PSD2`.


    ### Regulation


    Legislators, regulators, and public authorities should take note of the rapid
    development of Open Banking. Although the practice of screen scraping has an inherent
    security flaw of shared client credentials, it was allowed to continue for a number
    of years. Open `API`s have quickly risen to the fore as an alternative and has
    revolutionized the banking industry. As this wave is likely to move through the
    banking sector, other industries such as insurance are likely to be impacted in
    the future. The regulator has a key role to play as strong direction and a suitable
    framework is required that will support the industry to create standards and infrastructure
    to balance the different public interests involved. It is also vital to continue
    the collaboration between incumbent financial service providers, `FinTech`s and
    regulators to help promote the ecosystem.


    ### Commercial models


    A key consideration of Open Finance is the funding model as the needs of all participants
    in the ecosystem have to be considered. As per specifications, like `PSD2`, banks
    may not charge for data sharing and payment data. Given the large-scale investments
    banks have made to enable this, this may not be an appealing initiative to pursue
    outside meeting the core regulatory requirement. Open Finance can make space for
    competition and innovation beyond the regulatory minimum. Premium `API`s, which
    use Open `API` technology, can enable Open Finance by allowing data sharing across
    a range of different sectors.


    ### Dispute mechanisms


    As disputes could result in reputational damage to financial service providers
    and third parties, it is important that all stakeholders have a complaints management
    process in place to enable them to process complaints or issues raised. To address
    data privacy breaches and data misuse, a liability framework may be required to
    hold financial service and third-party providers accountable.


    ### Customer focus


    Customer financial data is the source ingredient of the Open Finance ecosystem.
    As it always belongs to the customer throughout the lifecycle, it is imperative
    to always have the customer in sharp focus. Customers should clearly know how
    their data is collected, shared, and used. Informed consent is a key mechanism
    to make consumers aware of the terms and conditions of what they are consenting
    to and how their data will be used. Customers should also have the right to revoke
    access and that previous data shared be “forgotten.”


    Customer education is a key responsibility of financial services providers and
    third parties and will help in establishing trust. If potential customers do not
    trust the ecosystem, they will not give consent to sharing their data. Credible
    third-party providers are also an essential element in securing and retaining
    customer trust.


    ## Sample Applications


    Open Banking and Finance has enabled banks and third-party providers to launch
    new products and services. We highlight a few of these applications – `YOLT` which
    was built by a bank, `CHIP` which use cutting-edge Artificial Intelligence (`AI`)
    technology, `bunq` which uses Open `API`s to extend their existing product offering,
    `TrueLayer` which provides a platform capability to third-party providers to abstract
    integration complexity, and `Revolut` which provides an account aggregation capability
    across banks.


    The speed, low costs, and innovation of `FinTech`s have helped to extend existing
    capability and to build digital applications and platforms.


    ### YOLT


    `ING` has created one of the biggest third-party trusted entities called `YOLT`
    (which started in the Netherlands in 2016 and is now in the UK, France, and Italy).
    `YOLT`’s app consumes open banking `API`’s to aggregate account information across
    banks and give recommendations to customers. `YOLT`’s mission is “To give everyone
    the power to be smart with their money.” They have for now +-500,000 clients;
    however, one of the downsides is that their `App`/functionality is “read and advise”
    only. Any recommendations that the app makes need to be actioned in the source
    banking systems.


    ### CHIP


    `CHIP` uses Artificial Intelligence (`AI`) to calculate how much you can save
    and takes funds out of linked current accounts and places them via direct debit
    into a separate savings account hosted by `Barclays Bank`. Savings percentages
    (up to 5%) are gamified depending on your social promotion of `CHIP` – an extra
    1% per signed up friend.


    ### bunq


    `bunq`, long before `PSD2`, opened up their `API`. `bunq` let developers build
    unique apps that enrich the life of all `bunq` users on top of a fully licensed
    bank. Using the `bunq API`, developers can connect to transactional data, push
    notifications, payment requests, cards, joint accounts, and limits and budgets.


    ### TrueLayer


    `TrueLayer`’s `API` platform makes it easy to integrate financial services, like
    Open Banking and payments, into any app or any website, anywhere in the world.
    `TrueLayer` enables connections to all bank `API`s across Europe, regardless of
    the standards or protocols used.


    ### Revolut


    With the new feature, German customers can now connect their accounts at `Comdirect`,
    `Commerzbank`, `Deutsche Bank`, `ING-DiBa`, and `Sparkasse` with the `Revolut`
    app and view all their finances in one place – directly from their smartphones,
    developed in cooperation with Europe’s provider of financial `API`s (programming
    interfaces), UK-based `FinTech`, `TrueLayer`. The use of the `TrueLayer` platform
    ensures that account information from major German banks is securely integrated
    and updated in real time in the `Revolut` app.'
