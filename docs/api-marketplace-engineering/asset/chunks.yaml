    team with a wealth of knowledge and experience, some of whom I have never met
    in person – all whom I consider lifelong friends: Philip Anderson, Shafaat Ali
    Yasir, my intercontinental brothers Ravi Shah (Mr. Open Banking) and Amit Pareek
