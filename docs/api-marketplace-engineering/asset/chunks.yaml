- fmt: "## Release Strategy and Risk Control\n\nThis is not a decision that is made\
    \ lightly, and the practice, if left unchecked, could lead to the cardinal sin\
    \ of “coding in production.” Special caution must be taken to ensure that in-progress\
    \ development is not accidentally included as part of the update. A well-defined\
    \ code versioning strategy with release tags and branches is critical to support\
    \ this. If used wisely and sparingly, the inherent benefit of fixing forward is\
    \ that time is saved by not having to roll back the release which would keep the\
    \ release pipeline flowing. Depending on the nature of the issue, impact, frequency,\
    \ and resolution timeframe, it may be possible to implement the fix over a longer\
    \ duration – which would minimize additional errors creeping in through last-minute\
    \ updates.\n\nThe requirement for a more flexible change and release strategy\
    \ for agile, digital solutions has been recognized by our organization, and significant\
    \ effort has been put into attempting to adapt to it. This statement must be fully\
    \ qualified as the quality gates have not been lowered – the processes have been\
    \ streamlined to allow faster transition. It is still a work in progress, and\
    \ there is some way to go before we reach the Continuous Deployment nirvana of\
    \ Netflix – but with that being said, the service levels and potential fallout\
    \ for a Financial Institution would be far higher than a video streaming service.\n\
    \nFigure [10-5](#509947_1_En_10_Chapter.xhtml#Fig5) provides a high-level view\
    \ of our Release “funnel.” I like to think of it as atoms bouncing around in a\
    \ space which gets progressively smaller until they eventually bounce out or must\
    \ file in line orderly to move forward. At any given time, there are a significant\
    \ number of requirements, fixes, or prototypes in development. Some prototypes\
    \ may graduate to fully fledged solutions; others may be retired. The readiness\
    \ of supporting backend platforms will also determine which requirements will\
    \ transition to testing. Planning sessions, led by the Delivery Leads, will identify\
    \ a potential implementation date for specific solutions, which are bundled into\
    \ a production release. The goal is a release at a minimum of every two weeks.\
    \ As soon as a view has been determined, the necessary change control artifacts\
    \ are assembled, and Release Management is notified of the intention and date\
    \ to deploy.\n\n![../images/509947_1_En_10_Chapter/509947_1_En_10_Fig5_HTML.jpg](images/509947_1_En_10_Chapter/509947_1_En_10_Fig5_HTML.jpg)\n\
    \nFigure 10-5  \nThe Release funnel\n\n### Required Release Artifacts\n\nThe artifacts\
    \ that are required for the release process include the following:\n\n- `Implementation\
    \ guide`: These are the set of instructions for the deployment of code assets\
    \ and configuration required in the operational environment. With a well-optimized\
    \ DevOps pipeline in place, this document simply details the components and versions\
    \ to be deployed. It may be necessary to also document configuration updates to\
    \ firewall rules and security access to backend systems. For more complex deployments\
    \ which span different systems, this guide will detail a timeline and sequence\
    \ of events for the release.\n- `Testing evidence and QA sign-off`: Documented\
    \ test execution and acceptance from the Quality Assurance team is a key input\
    \ before a solution can be released. This is currently in the form of a document\
    \ to meet existing criteria. As part of the Continuous Deployment (CD) intention\
    \ of the team, an aspirational goal is to provide automated regression, functional\
    \ and performance test results which provide assurance of the integrity of a solution.\n\
    - `Release notes`: Description of the changes to be deployed to the environment\
    \ – be it new functionality, updates or optimizations to existing solutions, fixes\
    \ or patches to resolve operational issues.\n\n## DevOps Practice\n\nLike the\
    \ humble sled, which was used to transport large and heavy objects during the\
    \ construction of the pyramids in Egypt, the practice of DevOps is the pivotal\
    \ element that underpins our operational environment, as illustrated in Figure\
    \ [10-6](#509947_1_En_10_Chapter.xhtml#Fig6). From years of experience in an operational\
    \ domain, regularly pulling back platforms from a catastrophic demise by tweaking\
    \ application server configuration or masterfully rebuilding systems on the fly\
    \ by hand, and in so doing have been responsible for creating “snowflake environments,”\
    \ this has been both a humbling and insightful experience.\n\n![../images/509947_1_En_10_Chapter/509947_1_En_10_Fig6_HTML.jpg](images/509947_1_En_10_Chapter/509947_1_En_10_Fig6_HTML.jpg)\n\
    \nFigure 10-6  \nDevOps foundation\n\nA well-instrumented operational DevOps process\
    \ starts even before the first line of code is written. Code repositories, build\
    \ pipelines, Continuous Integration (CI), and migration processes (detailed in\
    \ previous chapters) all form part of the process which enables the DevOps practice\
    \ from development, and which ultimately pervades into the operational domain.\
    \ In all honesty, as a developer who has witnessed a pre-DevOps era, there are\
    \ moments of frustration as a defined release process minimizes the opportunity\
    \ for tweaks and quick updates. As an Engineering Lead observing a well-oiled,\
    \ well-defined, repeatable, and reliable process with almost zero opportunity\
    \ for tweaks and quick updates, I am immensely grateful.\n\nA repeatable process\
    \ is key, particularly more so in an agile, fast-moving environment as it enables\
    \ rapid delivery with the ability to roll back if the need arises. The ability\
    \ to roll back reliably and rapidly in an operational context should not be taken\
    \ lightly. From years past, I can still clearly recall not only the disappointment\
    \ and embarrassment of rolling back a release but also the apprehension as backups\
    \ were used to restore a system and we waited to verify the rehydration process.\
    \ The microservice construct also helps immensely as it allows fine-grained control\
    \ to roll back or roll forward only ailing components. This ability affords our\
    \ platform a safety net which provides a level of confidence in much the same\
    \ way that it would allow a highwire act to push the envelope a little further.\n\
    \nAs there are legacy elements in our platform architecture, not all systems have\
    \ a DevOps capability. The organization is well aware of this, and each system\
    \ has defined a roadmap to ultimately achieve this. For new implementations, such\
    \ as the Cloud Container platform we have recently migrated to, this is non-negotiable.\
    \ The environment is locked down with a “zero-touch” policy, and the only mechanism\
    \ available to make changes is via a DevOps pipeline as shown in Figure [10-7](#509947_1_En_10_Chapter.xhtml#Fig7).\
    \ Firm and unrelenting commitment is possibly the only way to achieve this goal.\
    \ If there is a loophole or backdoor available, it will be discovered and exploited\
    \ by the delivery team.\n\n![../images/509947_1_En_10_Chapter/509947_1_En_10_Fig7_HTML.jpg](images/509947_1_En_10_Chapter/509947_1_En_10_Fig7_HTML.jpg)\n\
    \nFigure 10-7  \nDevOps pipeline"
