- fmt: '## Build Trust


    Consider the API Marketplace from the perspective of a potential third party.
    This entity is potentially using the Marketplace as a foundational element of
    its business operation. The consequences for the organization could be catastrophic
    if there are any stability or reliability issues with the platform. What has helped
    our implementation adoption considerably is that we have a nationally trusted
    brand with millions of customers behind our Marketplace. The members of our team
    are always aware that this relationship is reciprocal. Any issues or fallibility
    of our platform could impact the trust and brand of the organization we represent.
    I like to consider the trust earned through this mechanism as “inherited.” Essentially,
    you trust me because you know my parent. I believe trust should also be “earned.”


    This can be achieved by having a close relationship with the users of your platform.
    During early or pilot phases of the platform release, work closely with third-party
    providers. When launching a recent product, we had weekly, sometimes daily, calls
    with an enthusiastic Developer. This interaction not only helped us flesh out
    issues with the API Product we were releasing but provided insight into the use
    of the product. The confidence of the external development team in the product
    also improved significantly as they could see the commitment from the provider.
    Word also tends to spread quickly in FinTech and Startup communities.


    Adoption of your Platform will be impacted by positive and negative feedback.
    Endorsements from established third parties, preferably in their own words, in
    the form of a customer testimonial, may help convince potential users to use your
    Marketplace. Again, these are not easy to attain, and there may be a significant
    amount of work from the full team to achieve this. Reference customers will also
    help establish trust. Implicit trust can be secured if potential users of the
    platform see a known brand or product which uses the platform. It is important
    to identify and target one or more established brands who must be actively engaged
    to use your Marketplace. A key lesson we learnt out of practical experience regarding
    timeframes is if you are aiming for your Platform to be used by Black Friday (fourth
    Friday of November), you need to start integration activities by June.


    A key construct of an API Marketplace is a partnership between Marketplace and
    third-party provider. As indicated previously, the Marketplace requires consumers
    of the Platform to survive. It is important to highlight that another key partnership
    is between the Marketplace and the end user of the organization. The end user
    places their trust in the Marketplace to only allow access to information or data
    to third parties that they have granted permission to. To the API project teams
    reading this – be aware this is not only a massive responsibility to uphold, but
    also an incredible honor as your efforts enables this three-way relationship.


    ## Transparency


    Strong, enduring relationships require transparency. Although third parties are
    consumers of the Marketplace, be sure to remember that they are intrinsically
    linked to the success or failure of the platform as much as the internal team.
    The simple reasoning behind this statement is – if the Marketplace fails, it will
    impact their organization, possibly their ability to continue operating.


    Be honest about timelines. Marketplace launch, API product capability, availability,
    and roadmap. This may not always be possible due to competitive pressure. But
    always aim to under-promise and over-deliver. A key lesson learnt early in our
    journey is that we should always be one step ahead of our developer community.
    With the launch of our Marketplace, many third parties signed up to use the Platform
    – far more than anticipated. Unfortunately, some of the API products in our Marketplace
    were not ready for commercialization due to internal approvals required. In hindsight,
    it would have been prudent to remove those API products from our catalogue or
    clearly indicate in our portal that timelines for commercial availability were
    still to be established.


    Pricing – in the form of costs or incentives – should be clear, unambiguous, and
    free of fine print. The third party will most likely have to invest time and money
    to consume the products of the API Marketplace. In addition, the third party will
    also need visibility into the costs of using the platform. That is, if the costs
    are per transaction, tiered or flat. There could also be an incentive to use the
    Marketplace in the form of a lead or referral commission. Essentially, the third
    party requires as much financial information as possible to determine the commercial
    viability of engaging with your Marketplace. During the early phases of the Marketplace,
    it may be necessary to allow free access to APIs to stimulate adoption. Be sure
    to communicate to consumers that this is subject to change and will be reviewed
    later. If pricing is simply not available, due to external factors, be sure to
    clearly indicate this.


    Service-Level Agreements (SLAs) and resolution timeframes must be clearly defined.
    The inherent benefit is that the SLAs can be used across several providers. These
    can be tiered – higher tiers would receive more support and faster resolution
    – albeit at a higher cost. Upfront agreement also sets the correct expectations
    regarding resolution and will significantly assist the Marketplace Support team
    when fielding operational queries. Again, be sure to be honest regarding resolution
    times – as too optimistic timeframes will result in a loss of confidence with
    prolonged outages and too pessimistic an outlook may impact adoption and confidence.
    Where unclear or still to be defined, clearly indicate as such and ensure clear
    communication in the event of an operational issue.


    ## Collaborate


    Consider offering one or a few obligation-free consultation sessions. This is
    especially the case in developing markets where prospective customers want that
    extra reassurance by discussing questions or scenarios in person. From experience,
    technical support teams may not be the best suited to assist prospective users
    at this point in the customer journey. The Product Owner, with support from the
    technical team, should facilitate these sessions. Technical teams will be able
    to assist with development or integration queries. However, the Product Owner
    will be able to position the Marketplace for commercial success.


    A register your interest lead-generation form is a necessity. A follow-up email
    or phone call within 24 hours is mandatory. FinTechs and startups operate at incredible
    pace, and the potential opportunity is at risk of being lost if not followed up
    on timeously. During the follow-up, the Product Owner will be able to determine
    the maturity of the prospect, where the organization is in their journey and the
    level and area of support required (including whether the questions are commercial
    or technical in nature).


    As the Marketplace evolves and adoption increases, it may be necessary to provide
    tiers of support. As the number of staff in the delivery team may be fixed, it
    might not be possible to provide all third parties with the same level of time
    and attention. Higher, paid-for offerings will result in closer engagement as
    it could also fund dedicated Service Managers. While the Marketplace is in its
    early phases, be sure to capture every customer query (be it potential or current)
    in a Service Desk and follow up.'
