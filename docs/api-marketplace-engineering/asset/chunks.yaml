- fmt: "## Application Registration\n\nAn important background process that is often\
    \ missed in OAuth literature is the interaction between the `Client` and `Resource\
    \ Server`. The `Resource Server` may not be the owner of my data but as a responsible\
    \ service provider and as part of its due diligence process, should only release\
    \ data to verified parties. Any application that uses OAuth to access its APIs\
    \ must have authorization credentials that identify the application to the `Resource\
    \ Server’s` OAuth server. The `Client` will register an application with the `Resource\
    \ Server`, providing details regarding where the request will originate from and\
    \ where users should be redirected to.\n\nA quick recap of this step:\n\n1. The\
    \ `Client` must register an Application with the `Resource Server`. The purpose\
    \ of this step is to establish the `client` identity and allows the `resource\
    \ server` to track access requests.\n2. The `Client` provides details regarding\
    \ where the request will originate from and where the end user should be redirected\
    \ to. This is important as it limits potential man-in-the-middle attacks. As you\
    \ will note, the redirect URI is used for a number of interactions.\n3. At the\
    \ end of this process, the `Resource Server` will provide credentials to the `Client`\
    \ in the form of a `Client ID` and `Client Secret.`\n\nIn some API Gateway products,\
    \ once an application is created, access to API products is achieved through a\
    \ process of a subscription.\n\n![../images/509947_1_En_6_Chapter/509947_1_En_6_Fig6_HTML.jpg](images/509947_1_En_6_Chapter/509947_1_En_6_Fig6_HTML.jpg)\n\
    \nFigure 6-6\n\nClient-resource server interaction\n\nAs illustrated in Figure\
    \ [6-6](#509947_1_En_6_Chapter.xhtml#Fig6):\n\n- One or more `Clients` (third\
    \ party) may register one or more Applications with a `Resource Server` (provider).\n\
    - Each Application has a subscription to one or more APIs.\n- Each Application\
    \ must specify (one or more) redirect URIs, and may also provide (one or more)\
    \ origin URIs.\n- An Application is issued a set of credentials – in the form\
    \ of a `Client ID` and `Client Secret`.\n- Based on organizational policy, access\
    \ to specific APIs may only be granted to authorized Clients. As illustrated,\
    \ `Client 2` does not have a subscription (access) to API `W` and `X`.\n\nFigure\
    \ [6-7](#509947_1_En_6_Chapter.xhtml#Fig7) outlines the Application Registration\
    \ process.\n\n![../images/509947_1_En_6_Chapter/509947_1_En_6_Fig7_HTML.jpg](images/509947_1_En_6_Chapter/509947_1_En_6_Fig7_HTML.jpg)\n\
    \nFigure 6-7\n\nApplication registration process flow\n\n1. The `Client` creates\
    \ an Application, providing details such as email, owner, and contact, metadata\
    \ such as the solution name, redirect URI, and client certificate (if necessary).\n\
    2. The `Resource Server` registers an Application with the information provided,\
    \ and credentials, in the form of a `Client ID` and `Secret`, are generated.\n\
    3. The credentials are returned to the third party. At this time, the third party\
    \ has a `Client ID` and `Secret`. It is possible to change configuration data\
    \ of the Application – such as the redirect URI. However, the `Client ID` may\
    \ be fixed. Many API Gateway implementations only provide the `Secret` at registration,\
    \ and it will be regenerated if lost.\n4. At this time, the `Client` subscribes\
    \ or links the Application to specific API products published by the `Resource\
    \ Server`.\n\n### Note\n\nParts of the above process may be achieved via self-service\
    \ or manual intervention.\n\n- Some Marketplace implementations may only provide\
    \ credentials, even to the Sandbox environment, to verified consumers.\n- Application\
    \ creation and subscription, in the Live environment, may be done by the Product\
    \ Owner to restrict third parties to specific products.\n\n## Grant Types and\
    \ Access Tokens\n\nNow that a `Client` has registered an application and has credentials,\
    \ there are different ways to get access. In the OAuth framework, this is referred\
    \ to as a grant type. There are many grant types for different use-cases, as well\
    \ as a framework for creating new grant types. As an example, a `Device Code`\
    \ grant type may be used to sign on to an online service from a television set\
    \ which may be input-constrained.\n\nIt is important to highlight that in an Open\
    \ API or B2B context, the `Client ID` and `Client secret` may be sufficient to\
    \ access an API. In a B2C context, `Client ID` and `secret`, in a process defined\
    \ by the `grant type`, are used to retrieve Access Tokens which are the credentials\
    \ used to access protected resources:\n\n`Client Credentials (ID/secret) + Grant\
    \ Type ➤ Access Token ➤ API`\n\nA typical Access Token contains the properties\
    \ shown in Table [6-1](#509947_1_En_6_Chapter.xhtml#Tab1).\n\nTable 6-1\n\nAccess\
    \ token properties\n\n| Field | Presence | Description |\n| --- | --- | --- |\n\
    | `access_token` | Required | Access token string |\n| `token_type` | Required\
    \ | This is the type of token, typically just the string “Bearer” indicating that\
    \ any party in possession of this token may use it |\n| `expires_in` | Optional\
    \ | The duration the token is granted for |\n| `refresh_token` | Optional | If\
    \ the access token expires, then this is used to request a new Access token |\n\
    | `scope` | Optional | Indicates the scope of access granted |\n\nIn the following\
    \ sections, we will dive into the process for retrieving an Access Token for the\
    \ following grant types:\n\n- Client Credentials\n- Authorization Code\n- Refresh\
    \ Token\n\n## Client Credentials\n\nFigure [6-8](#509947_1_En_6_Chapter.xhtml#Fig8)\
    \ details the Client Credentials process flow.\n\n![../images/509947_1_En_6_Chapter/509947_1_En_6_Fig8_HTML.jpg](images/509947_1_En_6_Chapter/509947_1_En_6_Fig8_HTML.jpg)\n\
    \nFigure 6-8\n\nClient Credentials process flow\n\n1. The `Client` initiates the\
    \ request for an `Access Token` providing:\n   1. Credentials: `Client ID` and\
    \ `Secret`\n   2. `grant type` of `client_credentials`\n   3. Scope: resources\
    \ that the `Client` wants to access\n2. The `Resource Server` will locate the\
    \ Application referenced by the `Client ID`, verify that the `Secret` matches,\
    \ and if subscribed to the requested APIs (specified in the `scope`), will return\
    \ an `Access Token`.\n3. At this time, the third party has an `Access Token`.\
    \ Note that the token may have a specified period of validity, typically 3,599\
    \ seconds."
