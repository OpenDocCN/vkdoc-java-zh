    would define an interface which caters for a wide range of consumers which would
    require sophisticated documentation drawn up by ex-NASA Apollo engineers.


    At one end of the spectrum, Design is an extremely important phase of the development
    lifecycle, and the gravity of making the right decisions can result in analysis
    paralysis. Additional pressure is introduced into the system when the product
    will be consumed by external third-party providers as changes or updates cannot
    be contained. In an active API ecosystem, a poorly designed interface can result
    in low developer adoption and possibly reputational damage to the product and
    the Marketplace.


    At the other end, the API, although important, is simply a means to an end, and
    getting a specification out as quickly as possible will ease pressure from a demanding
    consumer. This might result in a custom interface which will satisfy just the
    one consumer, but that injustice can be addressed later – with more time and energy.


    The APIs in our Marketplace have been built from multiple perspectives and at
    various points in the spectrum referenced above. This is a process that we are
    still refining and optimizing. In this chapter, I will share our experience, learning,
    and pitfalls to allow you more insight into our Design process. These can be adapted
    to your Marketplace implementation. From a convention perspective, I refer to
    the interface consumed by an external party as the northbound interface and the
    backend interface consumed by the Marketplace as the southbound interface.


    ## Design Strategy


    Before we embark on the discussion regarding *how* to define APIs, let us pause
    briefly and consider the following question:


    *   *What VALUE does your API add?*


    Try to answer this as honestly as you can – there is no right or wrong response
    as it ultimately comes down to the requirements from the enterprise. Is the organization’s
    intention to establish a presence in the market and this is simply a tick-in-the-box
    exercise to publish an API? In this case, the implicit value that could be added
    is that the organization meets regulatory or compliance requirements. Or is the
    objective to create more API products than a rival organization – with the preference
    on quantity for increased bragging rights rather than quality. In this case, your
    Marketplace appears closer to the top right quadrant of a popular survey. Perhaps
    this is a pilot initiative with a single confirmed consumer with the requirement
    that the APIs will be used by a larger audience later. Value in the short-term
    is to enable a single consumer and in the medium-to-long-term, multiple consumers.
    It could also be a genuine response to establish your organization as a Platform
    provider to enable a new digital channel for third-party providers to leverage
    the capability of your enterprise to build and launch their applications and services.
    This could result in long-term value for the organization as it would create a
    new revenue stream.


    It is vitally important to reflect on this question as it essentially drives the
    strategy behind your API design. For example, regulatory requirements may have
    forced your organization to expose APIs for third-party consumption. The first
    iteration of your Marketplace could be to meet this objective by a regulatory
    deadline. The strategies outlined below, which will be used to build your API
    products, are driven by the objectives of the API Marketplace. Having a firm understanding
    of where trade-offs have to be made will help to shape the identity of your APIs,
    its adoption, and areas of improvement for later iterations.'
  trans: '

    ## 总结


    在本章中，我们首先从更宏观的角度审视了在 API 市场实施中安全性的重要性。如前所述，它涉及每一个领域，因此对这一目标给予充分关注，尤其是保持敬畏，对于实施方案的完整性和长期可持续性至关重要。随后我们聚焦到
    API 安全，并探讨了三种集成模式。第一种是开放 API，这类 API 通常可访问，但需要凭据来跟踪并控制第三方访问。企业对企业（B2B）API 用于实现系统到系统的集成，且面向更小且更熟悉的受众。将证书作为安全机制，可能会简化该集成模式下的网络要求。


    最后，我们讨论了最流行、使用最广泛的企业对消费者（B2C）模式。在这种模式下，终端用户会授权第三方代表其发起请求或访问其数据。为了理解如何通过行业标准实现这一点，我们深入讲解了
    OAuth 流程中的关键细节。在充分理解参与方、作用域、授权类型和访问令牌之后，我们还回顾了应用注册等支持流程，并逐步讲解了客户端凭据、授权码和刷新令牌这几种授权类型。撤销授权的能力极其重要，是任何实现中不可妥协的要求。


    接着我们介绍了 OAuth 在开放银行场景中的一个变体，并观察到“意图”在该方法中起着关键作用。我们还讨论了一种可能危及终端用户凭据的方式，并鼓励你继续主动寻找其他可被利用的机会。这将使你的团队能够提前应对这些问题——解决方案可能是流程更新，而不一定是技术变更。


    我们审视了开放式 Web 应用安全项目（OWASP）API 十大风险，并建议如何通过更聪明的设计、谨慎的开发，以及利用我们技术栈中产品能力来应对其中一部分风险。最后，我们经历了迭代式安全评审流程的重重考验；这个流程虽缓慢却稳步地帮助我们识别并修复防护中的漏洞。


    在我的职业生涯中，我非常幸运能与许多高技能人才共事，他们对安全的热情如同我对集成的热情一样高涨。我鼓励你去寻找这些知识宝库，虚心聆听、认真学习；他们无疑会指出你实现中的缺陷，并用其睿智建议帮助你将平台打造成能经受实战考验的系统。由于
    API 市场的性质及其运营领域，它将持续遭受攻击。


    # 7. API 设计


    打造 API 的接口是一项可以从多个视角来审视的活动。对开发者而言，这相当直接，因为输入与输出通常定义明确；即使不明确，也可以在后续过程中轻松补充。对企业架构师而言，这更像是阿特拉斯肩扛世界般的重任：接口应经过深思熟虑，能够被当前和未来的多个消费者复用，并且能够承受来自后端提供方的任何“板块级”变化。对
    API 产品负责人而言，接口应当干净、清晰，且便于第三方使用。监管机构则会定义一种能够覆盖广泛消费者的接口，这往往需要由前 NASA 阿波罗工程师级别的人才撰写的复杂文档。


    在光谱的一端，设计是开发生命周期中极其重要的阶段，做出正确决策的压力可能导致“分析瘫痪”。当产品将被外部第三方消费时，系统中还会引入额外压力，因为变更或更新无法被局部封闭。在活跃的
    API 生态中，设计不佳的接口可能导致开发者采用率低，甚至对产品及市场声誉造成损害。


    在另一端，API 虽然重要，但只是达成目标的手段，尽快产出规范能够缓解高要求消费者带来的压力。这可能会产生一个只满足单一消费者的定制接口，但这种不合理之处可以稍后再修复——前提是投入更多时间和精力。


    我们市场中的 API 来自多种视角，并落在上述光谱的不同位置。这一过程我们仍在持续打磨和优化。在本章中，我将分享我们的经验、学习和踩坑，以帮助你更深入理解我们的设计流程。你可以将这些经验调整后应用到你自己的市场实施中。从术语约定来看，我将外部方消费的接口称为北向接口，将市场消费的后端接口称为南向接口。


    ## 设计策略


    在我们开始讨论*如何*定义 API 之前，先稍作停顿，思考下面这个问题：


    *   *你的 API 增加了什么价值（VALUE）？*


    请尽可能诚实地回答这个问题——它没有绝对的对错，最终取决于企业需求。组织的意图是否只是为了在市场上建立存在感，而这只是一个“打勾式”的 API 发布动作？在这种情况下，可能增加的隐性价值是：组织满足了监管或合规要求。又或者目标是比竞争对手发布更多
    API 产品——偏好数量以获得更高“炫耀资本”，而不是质量。在这种情况下，你的市场看起来更接近某个流行调研的右上象限。也许这是一个试点项目，当前只有一个已确认消费者，但要求这些
    API 未来能服务更大范围受众。其短期价值是支持单一消费者，中长期价值是支持多个消费者。也可能这是一次真正的战略响应：将你的组织建设为平台提供方，打造新的数字渠道，使第三方提供者能够利用企业能力构建并发布其应用与服务。这可能为组织带来长期价值，因为它将创造新的收入来源。


    认真反思这个问题至关重要，因为它本质上驱动着 API 设计背后的策略。例如，监管要求可能迫使你的组织向第三方开放 API。你市场的第一轮迭代可能只是为了在监管截止日期前达成该目标。下文所列、用于构建
    API 产品的策略，均由 API 市场的目标所驱动。清楚理解哪些地方必须进行权衡，将有助于塑造 API 的定位、采用情况，以及后续迭代的改进方向。

    '
- fmt: '## Top Down, Pre-defined


    These are standard APIs which all organizations must adhere to. The Payment Services
    Directive (`PSD2`) is an example. The advantage to the consumer is that the integration
    solution is built once and can be reused across different providers. The advantage
    to the provider is that the interface is pre-defined and only the implementation
    needs to be added. The challenge with this type of integration lies in the mapping
    between the northbound (external facing) and southbound (backend) interfaces.
    As the northbound interface is designed to be as general as possible, there are
    typically a wide range of inputs and myriads of combinations.


    From our experience in implementing a `PSD2` interface, we found that the southbound
    interface belonged to a niche mainframe application which has been loyally serving
    specific needs of the organization for many years. Our unenviable task was synonymous
    to patching hundreds of fine fiber-optic strands on one side to tens of vacuum
    tubes on the other. At the end of a mapping exercise to bridge the two interfaces
    for this type of integration, I generally feel the same way when I find extra
    components at the end of a pre-packaged product assembly. The way to establish
    confidence that the mapping has been done correctly is to rigorously test the
    solution and have the backend provider confirm requests are received and processed
    correctly.


    A further drawback of this type of interface is that the organization loses its
    unique identity. Consumers would rightfully argue that a unique identity for each
    provider would significantly increase their development timelines. From the perspective
    of a provider, standardization makes it difficult to stand out from the crowd.
    Your API product simply becomes a new endpoint in the directory of providers.
    The mainframe solution, although archaic, could have some marvelous functionality
    which a third party could have leveraged. Unfortunately, this ray of sunshine
    would be covered by the blanket of uniformity thrown across the interface.


    ## Bottom Up


    Most northbound interfaces are driven by their southbound counterparts. In contrast
    with pre-defined APIs, these are products forged in the image of backend functionality.
    The unique, beautiful rays of functionality sunshine, mentioned in the previous
    section, that would otherwise be smothered by a standard interface, can shine
    brightly for the world to see and consume. The challenge that now presents itself
    is in determining which pieces of functionality and data to expose. In addition,
    special caution must be taken to avoid bleeding data structures from the southbound
    interface. That is, external consumers should not be impacted by subtle changes
    from the backend provider.


    From an honest review of our API catalogue, there are a few which I am not entirely
    proud of. These are also absent from our Developer Portal. There will come a time
    during your Marketplace journey when the API production line cannot keep up with
    consumer demand. As much as I consider this to be an enviable position to be in,
    this can sometimes result in poor short-term decisions with long-term consequences.


    I clearly recall the discussion with the Product Owner regarding an API urgently
    required by a key Marketplace consumer. The team had been working flat-out, and
    there was no capacity to harvest the API, especially within the prescribed timelines.
    The weary decision reached was that we would publish a version `0.00001` of the
    API. What this translated into was essentially a passthrough interface. Our proviso,
    which allowed us to retain a shred of pride in making such an abysmal decision,
    was that this API would be revised at a later time.


    As most delivery teams know, most solutions that reach the operational environment
    are almost impossible to reverse. As luck would have it, the data model of the
    backend platform is one of the worst I have seen in my integration career. The
    consumer of the API published from my platform probably feels the same way about
    the interface I have published to them as I feel about the interface I have consumed.
    The challenge with creating API products like these is that it becomes the responsibility
    of the team to own and maintain for the duration of the lifecycle. Even if a new
    version is created, it is extremely unlikely that the consumer will be able to
    update their integration to the new interface if it is stable.


    To avoid this situation from arising in your platform, it is important to have
    strong support from project sponsors who can shield the team from consumer pressure.
    As our platform gained more maturity, we have been able to handle requests of
    this nature in a better manner. Our current delivery process would require the
    re-prioritization of solutions currently in development or possibly a later scheduling
    of the required functionality. An upfront `No`, although unpopular, may result
    in a better long-term solution. Having a defined process into our demand pipeline
    has also resulted in consumers planning more efficiently, which has resulted in
    a significant drop of last-minute requests.'
  raw: '### Top Down, Pre-defined


    These are standard APIs which all organizations must adhere to. The Payment Services
    Directive (PSD2) is an example. The advantage to the consumer is that the integration
    solution is built once and can be reused across different providers. The advantage
    to the provider is that the interface is pre-defined and only the implementation
    needs to be added. The challenge with this type of integration lies in the mapping
    between the northbound (external facing) and southbound (backend) interfaces.
    As the northbound interface is designed to be as general as possible, there are
    typically a wide range of inputs and myriads of combinations.


    From our experience in implementing a PSD2 interface, we found that the southbound
    interface belonged to a niche mainframe application which has been loyally serving
    specific needs of the organization for many years. Our unenviable task was synonymous
    to patching hundreds of fine fiber-optic strands on one side to tens of vacuum
    tubes on the other. At the end of a mapping exercise to bridge the two interfaces
    for this type of integration, I generally feel the same way when I find extra
    components at the end of a pre-packaged product assembly. The way to establish
    confidence that the mapping has been done correctly is to rigorously test the
    solution and have the backend provider confirm requests are received and processed
    correctly.


    A further drawback of this type of interface is that the organization loses its
    unique identity. Consumers would rightfully argue that a unique identity for each
    provider would significantly increase their development timelines. From the perspective
    of a provider, standardization makes it difficult to stand out from the crowd.
    Your API product simply becomes a new endpoint in the directory of providers.
    The mainframe solution, although archaic, could have some marvelous functionality
    which a third party could have leveraged. Unfortunately, this ray of sunshine
    would be covered by the blanket of uniformity thrown across the interface.


    ### Bottom Up


    Most northbound interfaces are driven by their southbound counterparts. In contrast
