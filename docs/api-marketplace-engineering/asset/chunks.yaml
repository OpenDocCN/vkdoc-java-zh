  trans: '

    ## 企业级影响


    在传统的企业应用集成（EAI）中，消费者和提供者都处于组织内部相对安全的边界之内。尽管仍然建议采用内部安全机制，但“内部网络”这张安全网有助于缓解这样的担忧：集成仅对已知消费者开放。而通过构建
    API 市场，集成将*主要*面向*外部*消费。


    这是一个重大的变革。尽管应用团队可能会满足于通过 API 网关来封装接口，但这会产生企业范围的影响，并且需要多个团队参与——从信息安全、网络到取证团队，仅举几例。信息安全团队需要确认客户或组织数据只会在特定安全授权框架（如*OAuth*）下被释放。需要特别强调的是，信息安全团队是
    API 市场的关键利益相关方，且这种协作应持续进行。信息安全团队应审核每一个 API 产品，以确保在正确的安全级别下，将恰当级别的信息提供给正确的对象。从技术或开发角度看，暴露或更新一个
    API 产品以提供额外数据似乎相对容易。然而，信息安全团队对数据敏感性有更全面的视角，且作为企业与客户信息的守护者，必须始终被咨询。


    网络团队也必须决定如今源自互联网的请求如何穿越组织边界并路由到内部服务。在这个节点上，有必要暂停一下，从网络管理员的视角思考建立 API 市场这件事的分量。


    假设你是特勤局负责人，负责美国总统的安全。如果总统一直待在白宫范围内，你的工作很简单——白宫的边界参数是明确的：入口、出口、工作人员、访客等等。然而，一旦总统离开白宫，你的工作本质上就会变得更复杂，因为需要应对大量重要变量。


    网络安全团队也是如此。自组织建立以来，网络边界参数一直定义明确。防火墙将所有不受欢迎的用户和流量拒之门外，保障内部网络安全。外部用户来自定义清晰的 IP 源，可能通过专线接入。而现在，API
    市场计划出现了，它通过*Internet*向外部开发者开放公司资源！因此，让网络安全团队保持参与非常重要，最好从一开始就参与，以确保必要的思维转变到位、顾虑得到缓解，并且可能需要的技术变更能够被及时规划和落地，从而避免延误。


    同样重要的是让取证团队参与进来，因为他们会利用每笔交易的审计数据来还原经由第三方向企业发起的客户请求。这在客户咨询或争议发生时至关重要，并可能为组织节省大量资金。对追踪信息进行实时分析，还可用于识别并阻止欺诈请求。取证团队还可以利用其经验，为攻击可能如何发起提供洞见。


    组织内还有其他应当咨询并告知的团队，例如产品管理。关键结论是——尽管 API 市场可能运行在组织的*边缘*，但它依赖的是企业*内部*能力的支撑。利益相关方管理至关重要，也是我们平台的使能能力之一。教育是关键——不要想当然。在我们所有协作的开始阶段，都会创建并反复播放一段
    YouTube 视频，介绍 API 的定义、使用方式及其收益。通过这样做，我们的受众获得了知识和上下文，也更愿意参与协作。


    ## 新数字渠道的分量


    作为开发者，我很确定此时开发团队会发出不满的抱怨。信息安全、网络和取证听起来都像繁文缛节——在技术团队眼里，这就像超人看待氪石一样。可以理解——氪星是他的出生地，但如今它会削弱他的力量。繁文缛节也是同理——必要，但消耗精力。


    根据我们的经验，建立 API 市场这项令人兴奋的工作很快滚雪球般演变成一项以技术为主导的计划。我们的唯一目标是暴露一个 API，在客户认证与授权的前提下提供企业数据。最初项目授权也助推了这一点：向组织管理层展示一个
    MVP。


    在新成立的数字创新实验室这个“高氧泡泡”中，技术交付团队争分夺秒地完成任务。过程并非一帆风顺——当我们遇到那些*必须*使用的组织级平台与系统时，时常会撞上“泡泡墙”。例如企业
    API 网关，在那之前它仅用于内部消费。然而我们在每个检查点都亮出“MVP”和“概念验证（PoC）”徽章，再加上一些快速沟通和对后续迭代遵循企业标准的承诺（虽然多少有点“背后交叉手指”的意味），团队最终还是绕过了这些挑战。


    就像几乎所有处于“泡泡”中的技术交付团队一样——我们交付了。


    我们以破纪录时间完成了看似不可逾越的任务而激动不已，这大概也得益于吸入了高浓度氧气。接下来我们问的是：这项能力*何时*可以对外部开发者上线。交付团队*预期*的时间线是几周，或许一两个月；而*实际*时间线更接近九到十二个月。如此漫长的周期很可能会浇灭任何开发者热情。我们搬离数字创新实验室、为新的
    MVP“新秀”腾位置，这也让空气中的氧含量回归正常。很快我们意识到：在 API 市场运营化过程中，技术交付只是需要考虑的一个维度。我们实际上是在为组织构建一个新的*渠道*！


    开放访问是一场渐进式转型。举例来说，看看多年来银行机构访问方式的演进。最初它们依赖高度安全的实体网点，且仅在特定营业时间开放。随着自动取款机（ATM）的引入，用户可以全天候取现——但要建立这项能力，设备本身必须高度安全且管理完善。如何把现金输送*到*ATM
    里也必须被考虑，这不仅是安全问题，还涉及机器地理分布带来的物流问题。在“实验室”环境中这概念看似简单——在真实世界中却完全不同。


    其演进旅程的另一步是通过网页与移动应用渠道提供访问。这里面挑战无数——我只强调一个在“实验室”环境中很可能从未出现的问题——网络钓鱼。只需假装是金融机构员工给终端用户打电话，就可能轻易通过社工手段骗取客户登录凭据。如今双因素认证（2FA）等机制已经很普遍——但在该渠道最初建立时，这些机制并不
    readily 可用。

    '
- fmt: '# API Marketplace：风险、建设与团队角色


    通过建立其他渠道所获得的经验，组织对于潜在攻击向量有了更多洞察。对银行实体建筑和`ATM`的攻击可能也更容易防御，因为威胁是有形的。对于像`API Marketplace`这样的数字渠道，攻击者可能位于世界另一端。`ATM`最多可能损失现金；而`API`可能泄露客户数据，在当今`General
    Data Protection Regulation (GDPR)`的背景下，这会给组织带来更高的声誉损害成本。


    建立数字渠道并非易事。这不仅需要从开发或技术视角考虑，还需要从广泛的多元视角进行审视。一次安全事件就可能造成声誉受损，而对平台失去信任还可能影响`API`产品路线图，甚至影响其存在本身。


    在所有渠道中，`API Marketplace`可能是上线速度最快的——它不需要像`ATM`那样依赖物理网点，也不像`web`那样受限于用户界面。然而，速度始终必须以责任为前提。


    ## Developer Ecosystem


    `API Marketplace`的存在是为了服务第三方开发者。没有第三方消费，就不会有流量；没有流量，就没有收入。收入维系着`Marketplace`，而`Marketplace`的存在是为了实现愿景。可用的`API`产品应始终保持可靠与可用，以维持现有消费者。清晰定义的路线图将有助于吸引新开发者进入平台。


    `API Marketplace`开发者门户本质上是平台的门面，因此应投入大量精力并保持高度关注。尽管其主要目的是支持技术集成，但门户应面向广泛受众。一个正在考虑使用平台和`API`产品的初创公司，可能需要一个`10,000-foot`视角来理解其工作方式。视频和客户案例研究可以轻松传达概念。同样重要的是，需要覆盖不同开发技能层级。不要想当然，像`OAuth`这样的概念，内部交付团队可能轻易理解，但仍需去神秘化并充分解释，以确保理解与采纳。


    `API Marketplace`的一个固有优势是沙箱环境。如何实现与管理该环境的技术将在后续章节讨论。从外部开发者视角看，它支持在开发生命周期早期进行开发与集成测试。开发者访问与注册此环境必须通过自助方式并实现全自动化。有些开发者韧性很强，但大多数可能并非如此——访问便捷和易用性是刚需。门户应具备完善文档，提供用于展示流程的时序图、分步指南和代码示例。这一点也将在后续章节讨论。


    ## Roles


    在我们启动并最终促成本书形成的项目之初，我们组建的是一个技术导向很强的团队。成员包括：负责门户的前端开发者、整合后端接口的集成开发者，以及构建本地容器平台的`DevOps`工程师。事后回看，我现在理解了敏捷教练当时的无奈：他不断试图让团队关注更大的目标，而不只是完成下一次迭代目标。我们的项目团队成员来自多个国家，跨越大洲与时区，有些日子我们花在网络会议上的时间比陪伴家人的时间还多。


    随着`Marketplace`演进，我们的人员结构也在变化。随着时间推进，我们有幸尝试了多种团队组合——从纯创业式组织到传统团队角色协作。由于产品需求增长，我们需要建立产品小队——每个小队聚焦一个特定领域。随着`Marketplace`从初创走向运营平台，以下核心角色支撑了团队：


    - Program Executive

    - Product Owner

    - Delivery Lead

    - Operations Lead

    - Engineering Lead


    任何`Star Trek`粉丝都会认同，这些角色可映射到`Starship Enterprise`上的岗位。每个角色都能力突出并承担关键职能，整体协作促成任务成功。运转良好的关键在于：每位成员都拥有充分自主权执行工作，同时始终得到其他船员支持。可调配人员会被引入协助交付目标——例如，`Product
    Owner`可能会查看审计追踪，帮助运营团队在处理争议时还原客户旅程。团队的共同要求是：每个人都应撸起袖子深入细节。


    作为平台的“船长”，`Program Executive`依据组织数字化领导层设定的目标掌舵。尽管`API Marketplace`运作如快艇，但它仍属于更大舰队的一部分；该角色必须谨慎平衡成熟企业的稳健视角与敏捷但有时仓促的交付团队。该负责人还是组织内部`API
    Marketplace`的倡导者，并承担一项艰巨任务：为项目建设及早期阶段争取资金——直到平台能够自我维持。确保企业将`API Marketplace`视为严肃的数字渠道同样是重大挑战。必须在内部有效推介其理念与能力，因为这种颠覆性概念很容易被归类为研发尝试而不被严肃对待。随着采纳率和收入增长，这项工作会变得更容易。


    `Product Owner (PO)`负责塑造`API`产品。技术交付团队可能低估第三方消费一个`API`产品所需的复杂度。`PO`理解第三方开发者需求、企业内部能力，并识别如何将能力映射到需求满足。这也必须与业务价值平衡，因为`Marketplace`需要实现自我维持并创造收入。尽管许多`API`产品可能基于监管要求预定义，仍有大量机会去定义和发布更多产品。`PO`与`Program
    Executive`紧密协作定义`API`产品路线图。组织方向是一个输入，第三方需求是另一个输入。该角色的另一项职责是在企业内部向各团队推广`API Marketplace`潜力并塑造产品供给。这并非易事，因为它可能要求相关团队提供部分资金以完成产品建设。'
  raw: 'With the experience gained from establishing other channels, organizations
    have far more insight into potential vectors of attack. Attacks on a bank’s physical
    buildings and ATMs may also be easier to defend as threats are tangible. With
    a digital channel such as an API Marketplace, the attacker could be on the other
    side of the world. ATMs could only lose cash. An API could leak customer data,
    which in today’s world of General Data Protection Regulation (GDPR) could cost
    an organization far more in reputational damage.


    Establishing a digital channel is not a trivial exercise. This needs to be considered,
    not only from a development or technical perspective, but from a wide range of
    viewpoints. A single security incident can cause reputational damage but loss
    of trust in the platform could potentially impact the API product roadmap, possibly
    its very existence.


    Of all the channels, an API Marketplace is probably the fastest time to market
    – it is unburdened by the need to have a physical location like an ATM and is
    not tethered to a user interface like web. However, the speed must always be tempered
    with responsibility.


    ## Developer Ecosystem


    An API Marketplace exists to serve third-party developers. Without third-party
    consumption, there would be no traffic. No traffic means no revenue. Revenue sustains
    the Marketplace which exists to achieve the Vision. Available API products should
    always be reliable and available to sustain existing consumers. A well-defined
    roadmap will help to attract new developers to the Platform.


    The API Marketplace developer portal is essentially the shopfront for the Platform,
    and significant effort and focus should be made here. Although primarily meant
    to support technical integration, the portal should be geared to a wide audience.
    A startup considering the use of the Platform and API products may want a 10,000-foot
    view of how it works. Videos and customer case studies can easily convey the concept.
    It is also important to cater for varying levels of developer skill. Take nothing
    for granted, and concepts such as *OAuth*, which may be easily understood by the
    internal delivery team, need to be demystified and explained to ensure understanding
    and adoption.


    An inherent benefit of an API Marketplace is a sandbox environment. Techniques
    to implement and manage this are discussed in a later chapter. From an external
    developer perspective, it allows development and integration testing early in
    the development lifecycle. Developer access and sign up to this environment must
    be achieved by self-service and fully automated. Some developers are resilient,
    most may not be – access and ease of use is a necessity. The portal should be
    well documented, provide sequence diagrams to show process flow, step by step
    guides, and code samples. This is also discussed in a later chapter.


    ## Roles


    At the start of our own project that led to the creation of this book, we began
    with a technical-heavy team. Some of the members included front-end developers
    working on the portal, integration developers assimilating backend interfaces,
    and DevOps engineers building on-premises container platforms. In hindsight, I
    now understand the exasperation of our agile coach who constantly tried to get
    the team to focus on the greater cause rather than just meeting the next sprint
    target. Our project team included personnel from several countries, across continents
    and time zones, and there were days we spent more time on web conferences than
    with our families.


    As the Marketplace evolved, so did our staff complement. With the benefit of time,
    we were fortunate to work in a variety of combinations – from a purely startup
    formation to working with conventional team roles. Due to product demand, we needed
    to create product squads – each working on a specific domain. As the Marketplace
    has matured from a startup to an operational platform, the following core roles
    underpinned the team:


    *   Program Executive


    *   Product Owner


    *   Delivery Lead


    *   Operations Lead


    *   Engineering Lead


    As any fan of Star Trek will relate, these roles map to those of the Starship
    Enterprise. Each is highly capable and performs a vital function, and the overall
    contribution leads to successful missions. What works impeccably well is that
    each member has full autonomy to execute and is always supported by the rest of
    the crew. Available personnel are brought in to assist with delivery objectives
    – for example, the Product Owner might scan through audit traces to help the operations
    team piece together a customer’s journey when investigating a dispute. A common
    requirement across the team is that everyone should roll up their sleeves and
    get into the detail.


    As the captain of the Platform, the **Program Executive** steers the ship based
    on objectives set out by the digital leadership of the organization. Although
    the API Marketplace functions as a speed boat, it is part of a greater fleet and
    this role must carefully balance the cautious outlook of an established enterprise
    with an agile, but sometimes hasty delivery team. The Executive is also a champion
    of the API Marketplace within the organization and has the unenviable task of
    securing funding for the build and early phases of the program – until it can
    sustain itself. Ensuring an API Marketplace is viewed as a serious digital channel
    for the enterprise is also a significant challenge. It is important to sell the
    concept and capability internally, as such a revolutionary concept could easily
    be classified as a research and development effort, and not taken seriously. As
    adoption and revenue increases, it will become easier.


    The **Product Owner (PO)** is responsible for shaping the API products. The technical
    delivery team may underestimate the level of complexity required by a third party
    to consume an API product. The PO understands the needs of the third-party developers,
    the capability within the enterprise, and identifies how capability can be mapped
    to fulfill need. This is also to be tempered with business value as the Marketplace
    needs to be self-sustaining and revenue generating. Although many API products
    could be pre-defined based on regulation, there is ample opportunity to define
    and publish more. The PO works closely with the Program Executive to define the
    roadmap of API products. Organizational direction is one input; third-party demand/requirement
    is another. A further responsibility of this role is to internally market the
    potential of the API Marketplace to internal teams within the enterprise and shape
    offerings. This is no mean feat as it potentially requires partial funding to
    be provided by that team to build the product.'
  trans: '

    借助于建立其他渠道所获得的经验，组织对潜在攻击向量有了更多洞察。对银行实体建筑和 ATM 的攻击也许更容易防御，因为威胁是可感知、可触达的。对于 API Marketplace
    这样的数字渠道，攻击者可能身处世界另一端。ATM 最多只会损失现金；而 API 可能泄露客户数据，在当今《通用数据保护条例》（GDPR）的环境下，这可能给组织带来更高昂的声誉损失。


    建立一个数字渠道并非易事。需要考量的不仅是开发或技术视角，还包括广泛的多元视角。一次安全事件就可能造成声誉受损，而对平台失去信任则可能进一步影响 API 产品路线图，甚至危及其存续本身。


    在所有渠道中，API Marketplace 可能是上市速度最快的——它不受 ATM 那样必须具备实体场所的约束，也不像 Web 一样受限于用户界面。然而，速度始终必须以责任为前提加以平衡。


    ## 开发者生态系统


    API Marketplace 的存在是为了服务第三方开发者。没有第三方使用，就不会有流量；没有流量，就没有收入。收入维持着 Marketplace 的运转，而
    Marketplace 的存在是为了实现愿景。可用的 API 产品应始终保持可靠且可用，以维持现有使用者。定义清晰的路线图将有助于吸引新开发者加入平台。


    API Marketplace 的开发者门户本质上是平台的门面，因此应在此投入大量精力并保持高度关注。尽管其主要目的是支持技术集成，门户也应面向广泛受众进行设计。一个考虑使用该平台和
    API 产品的初创公司，可能希望先获得一个宏观层面的整体认知。视频和客户案例研究可以轻松传达这一概念。同样重要的是要覆盖不同层级的开发者技能水平。不要想当然，像*OAuth*这类内部交付团队可能轻松理解的概念，也需要去神秘化并加以说明，以确保理解与采用。


    API Marketplace 的一个内在优势是沙箱环境。关于如何实现与管理该环境的技术，将在后续章节讨论。从外部开发者视角看，它允许在开发生命周期早期就开展开发和集成测试。开发者访问与注册该环境必须通过自助方式并实现全自动化。有些开发者很有韧性，但多数可能并非如此——访问便利和易用性是刚需。门户应有完善文档，提供用于展示流程流转的时序图、分步指南以及代码示例。此内容也会在后续章节讨论。


    ## 角色


    在我们最初启动、并最终促成本书诞生的项目时，我们从一个技术导向很强的团队起步。成员包括负责门户的前端开发者、整合后端接口的集成开发者，以及构建本地容器平台的
    DevOps 工程师。事后回看，我如今理解了敏捷教练当时的挫败感：他不断尝试让团队关注更大的目标，而不只是完成下一个迭代冲刺目标。我们的项目团队成员来自多个国家，横跨不同大洲与时区，有些日子我们花在网络会议上的时间甚至比陪伴家人的时间还多。


    随着 Marketplace 的演进，我们的人员配置也在变化。受益于时间积累，我们有幸尝试了多种团队组合——从纯粹初创形态到与传统团队角色协同。由于产品需求增长，我们需要建立产品小队（squad）——每个小队负责一个特定领域。随着
    Marketplace 从初创阶段成长为运营平台，以下核心角色构成了团队支柱：


    *   项目执行负责人


    *   产品负责人


    *   交付负责人


    *   运营负责人


    *   工程负责人


    正如《星际迷航》的粉丝会认同的那样，这些角色对应着“企业号”星舰上的分工。每个角色都能力卓越并承担关键职能，整体协作带来任务成功。其运行极为出色之处在于：每位成员都拥有充分自主权去执行工作，同时始终得到其他船员支持。可用人员会被调配来协助交付目标——例如，在调查争议时，产品负责人可能会查看审计追踪记录，帮助运营团队拼接客户旅程。团队共同要求是：每个人都应卷起袖子，深入细节。


    作为平台的船长，**项目执行负责人**根据组织数字化领导层设定的目标来掌舵。尽管 API Marketplace 像一艘快艇那样灵活迅速，它仍是更大舰队的一部分；该角色必须谨慎平衡成熟企业偏稳健的视角与敏捷但有时仓促的交付团队之间的关系。执行负责人也是组织内部
    API Marketplace 的倡导者，并承担一项吃力不讨好的任务：为项目建设和早期阶段争取资金——直到平台能够自我维持。确保 API Marketplace
    被视为企业严肃的数字渠道也是一项重大挑战。必须在内部有效“售卖”其概念与能力，因为如此具有变革性的理念很容易被归类为研发尝试，从而得不到足够重视。随着采用率和收入提升，这会变得更容易。


    **产品负责人（PO）**负责塑造 API 产品。技术交付团队可能会低估第三方使用 API 产品所需面对的复杂度。PO 理解第三方开发者需求、企业内部能力，并识别如何将能力映射以满足需求。同时也要兼顾商业价值，因为
    Marketplace 需要实现自我造血并创造收入。尽管许多 API 产品可以基于监管要求预先定义，但仍有充足空间去定义并发布更多产品。PO 与项目执行负责人紧密协作，共同定义
    API 产品路线图。组织方向是一个输入，第三方需求/要求是另一个输入。该角色的另一项职责是在企业内部向各团队推广 API Marketplace 的潜力，并共同塑造产品供给。这并非易事，因为往往需要该内部团队提供部分资金来建设相关产品。

