- fmt: '## Communication Strategy


    A key element of any operational capability is an effective communications strategy.
    With a high number of integration points inside and outside the organization,
    keeping alignment across all stakeholders is no mean feat. The following is a
    sample of our current mechanisms:


    - Periodic updates: Updates are sent every 2 hours, via WhatsApp, by the support
    engineer on standby detailing: i) stability of the production Live and Sandbox
    environment; ii) commercial statistics of internal consuming applications, such
    as visitors and sign-ups; and iii) analysis of API calls in the form of a comparison
    of current traffic to a week ago.

    - Third-party communication: Notice to third party of planned maintenance which
    would impact the availability of API products. This is generally done as soon
    as the Marketplace team receives notice from a supporting enterprise system or
    downstream service provider of a planned update. As we have a well-governed organizational
    change management process, this is typically done at a minimum 3 days before the
    event. Notice of incidents and emergency outages are also sent to third-party
    operations team in the event of an internal or downstream system failure. Due
    to the vast number of platforms and systems in the enterprise, it did take time
    to register our platform as an “affected/interested” party for systems we did
    not directly integrate to. As an example, the Marketplace does not integrate directly
    to the mainframe – but would be significantly impacted in the event of an outage.

    - War room: This measure is generally activated for a serious outage within the
    enterprise. It is typically triggered by a standby support engineer who observes
    a number of failed requests exceeding a defined threshold within a period of time
    for critical API products which are revenue linked. Feedback from supporting teams,
    be it enterprise service support or downstream providers, is relayed to the greater
    Marketplace team.

    - Focus call: With a prolonged outage, a focus call will be convened with mandatory
    participation from all supporting teams. As this may result in participation from
    many engineers and system owners, the intention is to have all stakeholders available
    to resolve the issue as quickly as possible.


    ## Process


    To allow a uniform approach to the handling of operational incidents, a lightweight
    process flow, shown in Figure [10-15](#509947_1_En_10_Chapter.xhtml#Fig15), is
    the primary reference for the Marketplace support team. It provides different
    routes for issue remediation – if necessary, an “Incident” is raised which is
    the organizational standard for communicating issues across systems. As the reader
    will note, the process clearly defines a notification strategy to keep all stakeholders
    aligned.


    ![../images/509947_1_En_10_Chapter/509947_1_En_10_Fig15_HTML.jpg](images/509947_1_En_10_Chapter/509947_1_En_10_Fig15_HTML.jpg)


    Figure 10-15


    Incident management process


    ## Issue Tracking and Reporting


    At the launch of our Marketplace, there were few API products and even less consumers.
    Much like a small-town sheriff maintaining law and order, our approach was very
    much off the cuff. Issues were tracked on the back of a napkin and resolved just
    in time. In the same way a small town sees an explosion in growth with the discovery
    of gold, the Platform grew with the addition of new API products built by many
    delivery streams working concurrently, with railways being built to new backend
    providers and third-party providers flocking in to consume the APIs. Issues piled
    up and the gun-slinging sheriff approach of maintaining the environment quickly
    became a single point of failure.


    A key element to supporting the environment has been the implementation of a service
    desk to log, track, and report on issues. Support engineers were given clear instructions
    that requests which required more than a few minutes to resolve were to be logged
    diligently. The time taken to capture the issue, even as trivial as fielding a
    development query from a third-party provider, has proven to be invaluable as
    it affords the team a well-defined timeline and record of events. As visibility
    regarding the operational environment has improved, it allows the operations management
    team a clear view of the battlefield. Troops can be diverted to the most critical
    issues and items which are not progressing increase in visibility with time.


    In much the same way that the development team has a daily standup call to discuss
    the tasks for the current sprint, the operations team also has a daily call. This
    has been strategically scheduled just before the standup of the platform team
    as it allows any items, which require more technical support, to be discussed
    with a larger audience. Issues, outages, errors, and remediation activities from
    the previous 24-hours are discussed in this session. With representation from
    the senior members of the team, this provides insight into stability of the platform,
    guidance regarding handling of similar circumstances in the future, decisions
    for the next steps to resolve outstanding items, and an opportunity for the operations
    team to request additional assistance by way of development support, time for
    further investigation, or escalation to persuade an external dependency to respond.


    A further objective of the daily session is to reciprocate the gift of visibility
    and give the support team a view into upcoming releases across delivery streams.
    As the development sprint nears completion, some elements may not be released
    due to delays in testing or external dependencies. Keeping the support engineers
    updated of the release schedule allows the team adequate time to prepare, potentially
    alert the delivery leads of planned maintenance or potential stability issues
    of external systems which are key to the release and more importantly, is a clear
    signal of appreciation and respect to the operational team for keeping the platform
    running smoothly.


    With a technically minded team, and an affinity for APIs, we have assimilated
    the interfaces provided by the service desk software, and it has become one of
    the key sources of data which is programmatically mined daily. In-flight issues
    in various lifecycle phases are aggregated and displayed on a custom dashboard
    which is used to quickly identify hotspots in the platform. For example, a high
    number of third-party provider support requests reporting intermittent network
    issues could highlight a problem with the firewall which can be addressed pro-actively.
    Historical items are also of importance and are used for reporting to external
    stakeholders at periodic review sessions as shown in Figures [10-16-1](#509947_1_En_10_Chapter.xhtml#Fig16)
    and [10-16-2](#509947_1_En_10_Chapter.xhtml#Fig17). These reports provide insight
    into the stability of the platform, mean time to resolve issues, and traffic volumes
    which may be used to motivate for funding for additional infrastructure and personnel
    for the platform. It provides clear, unambiguous, and data-backed evidence regarding
    key support focus areas to be addressed to afford the platform greater stability.


    ![../images/509947_1_En_10_Chapter/509947_1_En_10_Fig17_HTML.png](images/509947_1_En_10_Chapter/509947_1_En_10_Fig17_HTML.png)


    Figure 10-16-2


    Reporting of tickets by application domain


    ![../images/509947_1_En_10_Chapter/509947_1_En_10_Fig16_HTML.png](images/509947_1_En_10_Chapter/509947_1_En_10_Fig16_HTML.png)


    Figure 10-16-1


    Reporting – ticket trend and severity analysis'
