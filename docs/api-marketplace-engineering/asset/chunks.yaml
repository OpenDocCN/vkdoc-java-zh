  trans: '

    ### 平台服务


    所有微服务都依赖平台服务，这些服务被打包为企业级库，并在构建过程中导入。正如在平台架构中讨论的那样，这提供了一个统一的“实用服务”层，从而支持对微服务进行一致性的支持与管理。


    ### 门户应用


    在 API 市场的语境下，用户界面似乎有些自相矛盾。根据实施经验，Web 应用是平台的核心支柱之一，而前端开发人员是必不可少的人员配置。我们的实现针对以下用例构建了定制应用：


    *   **授权**：同意页面会在用户成功认证后、并作为 OAuth 流程的一部分展示给用户，这是一个定制门户应用。它用于获取用户信息（如个人资料和账户数据），并展示更丰富的同意界面。例如，我们不是提供一个简单的权限页面来授予对所有账户信息的访问权限，而是展示详细的账户列表，并允许用户选择可由第三方访问的特定账户。


    *   **第三方接入**：作为一个数字化渠道，我们实现中的一个理想目标是确保完整体验尽可能自动化、流程化。正如第 3 章所述，平台必须能够扩展以处理大量外部使用方。为实现这一点，需要一个定制门户来促进接入流程：从请求公司注册文件，到接受条款与条件，再到根据
    API 产品提供银行信息。需要特别指出的是，这个 Web 应用是一种访问机制，而实现这一目标的关键在于定义清晰的业务流程。


    *   **管理**：这为支持团队提供了一个界面，用于变更运行时配置数据，例如属性值和端点配置数据。提供 UI 的好处在于可确保一致、统一的访问方式，并且具备安全、审计和版本控制能力——因此在必要时可追踪并回滚变更。更重要的是，它能最小化对数据库和配置映射等支撑系统的访问需求，例如在
    Kubernetes 集群场景下。


    *   **托管应用**：这当然是一个独特用例，但也是平台的重要收入来源。这也是团队为保持交付势头而进行转向的一个例子。负责交付一组战略性 API 产品的小队得知，试点使用方将无法在“黑色星期五”上线前完成开发。由于延迟本质上会导致错过这一关键节点，小队做出了战术决策：代表第三方构建并托管应用的部分组件，并利用新
    API。第三方所需的开发工作因此显著减少，通过合理设置重定向，用户体验也得以保留。这一做法非常成功，进而催生出一种新的部署模式。其优势在于：托管应用可被多个第三方复用；由于集成显著简化，可扩大受众范围；还能利用可能尚未对外发布的内部服务；使企业能够塑造并定制用户体验；并且由于终端用户直接与企业交互，从而提升用户信任。


    ## 总结


    在本章中，我们讨论了一项关键的开发理念：技术是为 API 交付服务的。我们还识别了参与该活动的角色——既包括通过清除交付路径障碍而作出隐性贡献的角色，也包括通过编写代码作出显性贡献的角色——并审视了我们规划和管理并行活动的方法。建立
    DevOps *实践* 并采用持续集成/持续部署原则，有助于简化开发流程，提升稳定性与可预测性，并支持现有和新增开发资源。最后，我们深入探讨了应用开发，强烈强调在此过程中加强沟通与指导，同时分析了平台的核心要素，并回顾了门户应用的类型与目标。


    需要注意的是，这些方法与流程经历了较长时间的定义和打磨，并且*仍在*持续演进。它们已经根据我们实施中的需求进行了定制，例如地理上分布式的团队以及对企业共享能力的使用。以客户为中心、担当力强并持续为团队背书的项目发起人；设定高标准、厌恶错过截止日期的交付负责人；绝不妥协的产品负责人；以及执着于在代码中留下可持续遗产的工程负责人——这些个性特质同样在打造强大交付能力方面发挥了关键作用。在下一章中，我们将讨论
    Sandbox 环境、它在 API 市场生态系统中的作用，以及其实现策略。


    # 9. Sandbox


    Sandbox 是一个划定边界、经过严格隔离的空间，使使用方能够测试并使用你的 API，从而感受其工作方式。在我们 API 市场生命周期中的所有技术挑战、成就与突破中，正是对这个看似朴素的
    Sandbox 的一次重构，成为促使我撰写本书的转折点。我们最初的 Sandbox 策略相对简单，并服务于特定范围的 API 产品。随着平台的成长、成熟和演进，这一构造与方法却保持不变。就像
    Jitterbug 或 Charleston 舞步在今天的舞蹈时代依然可以跳，但总显得有些格格不入。团队早已意识到这种方法需要一次彻底升级，但其优先级总会被其他“更重要”的交付项挤到后面。


    这之所以曾经可行，是因为平台生态中 API 产品与第三方使用方之间存在独特组合——正如你将在下文策略中看到的那样。然而，一场“完美风暴”正在酝酿：在某个关键使用方发布其产品之前，必须先测试并签署通过一个特定场景。命运使然，这个场景正好直接击穿了我们的
    Sandbox 策略，不仅威胁要把我们最老的技术债“骷髅”从衣柜里拖出来，还几乎要让它跳起 Moonwalk。商业团队推动方案上市的压力，最终转化为动能与驱动力，不仅促成了我们对
    Sandbox 的再工程化，也促使我们重新构想它在平台中的目的与功能。


    正是这种工程能力与想象力之间独特的协同，构成了我们实现方案的核心——也希望同样能成为你的核心。一次又一次观察到这种独特特质在我们的 Marketplace
    中持续发挥“魔力”后，至少尝试在本书中捕捉其精髓的念头，已经强烈到无法忽视。在接下来的章节中，我将分享我对 Sandbox 的目的、流程、策略及其实现方式的看法。

    '
- fmt: '## Purpose


    I consider the following metaphors to best describe the purpose of a Sandbox –
    kicking the tires, allowed to run around with scissors, try before you buy. As
    you might imagine, making an investment or associated commitment to a specific
    API provider is a significant decision. For intra organization projects, the risk
    factor is minimal – project teams on both sides of the integration requirement
    have little choice and must integrate. For an API Marketplace implementation with
    pre-defined interfaces, consumers may be wary of having an expectation of a three-pin
    plug and finding a two-prong euro socket – and rightfully so.


    One of the functions of the Sandbox is to mitigate this concern. From experience
    as an integration developer, I can assure you that reviewing an interface specification,
    even a well-documented one, is far different than initiating a request from code
    to an endpoint and receiving a response. Developers get a tangible opportunity
    to map a specification to function and importantly, can verify if the API is a
    fit for the use-case. “Fit” also needs to be understood from many perspectives.


    Consider the following abbreviated interface definition:


    ```yaml

    ...

    paths:

    /customer

    ...

    parameters:

    -in: customerID

    ...

    responses:

    200:

    ...

    ```


    Although the interface may satisfy the requirements for the third party, the behavior
    of the interface is also a key factor. Suppose the above function is made up of
    several queries to backend providers to compile the response and as a result,
    the overall latency of the call is greater than 30 seconds. This latency may have
    a significant impact on the end user’s experience and may impact the decision
    to consume the operation. This may also result in a feature request for an operation
    which provides a subset of the data with a faster response time.


    The Sandbox enables an engagement point for these discussions to occur. Its context,
    relation, and function relative to the “Live” environment are shown in Figure
    [9-1](#509947_1_En_9_Chapter.xhtml#Fig1). As the diagram shows, a request that
    traverses the “Live” route eventually reaches a backend provider. A request processed
    in a “Sandbox” context is serviced by an element I refer to as a `Virtualiser`.


    ![../images/509947_1_En_9_Chapter/509947_1_En_9_Fig1_HTML.jpg](images/509947_1_En_9_Chapter/509947_1_En_9_Fig1_HTML.jpg)


    Figure 9-1


    Sandbox and live context


    Used tactically, the Sandbox provides a unique opportunity for the Marketplace
    team to publish an API product, for which an implementation does not exist. There
    could be several reasons for this:


    1. It can be used to determine the level and extent of consumer demand for an
    API product. In our engagement with third-party providers, we have learnt that
    there is often a gap between intent and implementation – that is, consumers express
    interest in an API but do not follow through. The Product Owner can use a Sandbox
    product to determine actual consumption as an indicator of third-party commitment.

    2. In addition, the hotspots or mainly consumed functions can help shape the product.
    Difficult or complex operations will naturally attract less consumption and can
    be easily identified for simplification or possible termination.

    3. It can also be used by the delivery team to release the API in phases – where
    more popular operations are provided earlier. This helps alleviate pressure on
    the development team and allows more quantitative analysis when planning a release.
    That is – the Product Owner can clearly show hotspots, which translate into demand,
    for specific functionality.


    It is extremely important that this approach is used with great caution. As I’ve
    mentioned previously – developers have a remarkable ability to sense a ruse and
    once trust has been broken, it is difficult to regain. With that being said, the
    approach is to stay one, preferably more, steps ahead of the consumer. Be open
    with the phase and objective of the API – consider the disappointment if a developer
    builds a solution around the product and the decision is made not to continue.
    Also, be clear on timelines. There is little more frustrating for a third-party
    developer to have vague or non-committal dates regarding availability of a specific
    product or feature in the Live environment.


    It is also important to note that the “Sandbox” construct is maintained across
    Development, Test, Staging, and Production environments as shown in Figure [9-2](#509947_1_En_9_Chapter.xhtml#Fig2).
    This decision has served to reinforce our commitment to ensuring that the Sandbox
    is fully tested and verified internally before changes are deployed for external
    consumption. In addition, the Production Sandbox environment is considered a full-blown
    operational environment. Changes and updates are subject to the same governance,
    and any support is provided on similar operational levels.


    ![../images/509947_1_En_9_Chapter/509947_1_En_9_Fig2_HTML.jpg](images/509947_1_En_9_Chapter/509947_1_En_9_Fig2_HTML.jpg)


    Figure 9-2


    Sandbox across all environments


    ## Process


    The Sandbox is as important to the host organization as it is to the third-party
    provider. It plays a key role in our onboarding process and is used as a quality
    gate for many reviews. The first review is for the third party to showcase the
    application that will consume the APIs. This provides tangible indication of the
    use-case that will be launched to market. It will also demonstrate successful
    consumption of the API and its role in the application.


    The second review is for functional testing of the third-party application. Calls
    originating from the consumer are traced through the Sandbox to confirm the accuracy
    of request payloads and destinations. For this reason, our Sandbox environment
    is fully representative of the Live environment, from an operational perspective,
    as it also has the same support tools and processes.


    It is important to note the support requirement and context for the Sandbox environment.
    While the service levels may not be as stringent as Live and we may be slightly
    more tolerant of service outages, the audience to be supported is developers.
    This is typically the first port of call for the first application a developer
    will write, and although the detail may be provided in the documentation, various
    types of requests and approaches will be attempted as part of the API consumption
    process. Processes must be well defined for Developer support, and it is imperative
    that the Sandbox environment can withstand a barrage of ill-formed requests without
    keeling over and requiring support intervention. Given the use-case, automatically
    restarting failed components or stuck processes to ensure service availability
    may be an accepted practice.


    As your Marketplace implementation matures, consider implementing a self-service
    capability to facilitate Sandbox access. Registration and sign-up should be seamless
    to allow development to start as soon as possible. Be sure to also highlight the
    onboarding process and use of the Sandbox environment to potential consumers to
    align expectations and provide an indication of timelines.'
