  trans: '

    ### 术语


    在了解开放银行监管框架时，你可能会遇到许多新的术语和分类。我们将介绍最常见的一些，并讨论它们如何融入该框架。


    *   **账户信息服务提供商（AISP）**通过汇总和分析客户一个或多个支付账户中的交易信息，帮助客户形成其财务状况的整合视图。这可以通过核查来自多个来源的收入与支出，帮助客户评估信用资质。


    *   **支付发起服务提供商（PISP）**代表客户发起支付交易，并通过不同于开户银行所属平台的其他平台完成该过程。


    *   **第三方提供商（TPP）**是指经授权可代表客户访问账户、但并不自行运营这些账户的实体。TPP 的类型包括 PISP 和 AISP。FinTech（金融科技公司）就是
    TPP 的一个示例。


    *   **账户服务支付服务提供商（ASPSP）**为付款人提供并维护支付账户。本质上，这就是持有客户账户和资金的银行或金融机构。


    图 2-2 对这些术语和分类及其相互关系进行了可视化展示。


    ![../images/509947_1_En_2_Chapter/509947_1_En_2_Fig2_HTML.jpg](img/509947_1_En_2_Fig2_HTML.jpg)


    图 2-2


    开放银行参与方的可视化表示


    ### 益处


    开放银行能够为生态系统中的所有参与者带来多方面的益处。客户可通过利用支付服务，获得更少行政操作、更流畅的线上零售体验。这节省了以往登录银行门户并发送付款确认所需的时间。账户聚合服务使比较和切换更加容易。与第三方提供商共享交易数据也更安全，因为客户可以对共享哪些数据、共享时长以及撤销访问权限进行细粒度控制。访问账户历史记录可使第三方提供更个性化的产品与服务，并实现更准确的风险评级。移动钱包等支付方式也可作为银行卡和交易账户支付的替代方案。消费者还将受益于竞争加剧，这可能降低金融服务费用并提升服务水平。


    第三方提供商将获得更多商业机会，因为开放银行为非银行机构创造了公平竞争环境。这将使其能够提供创新的账户和支付解决方案，从而改善客户体验。对客户历史账户数据的洞察也有助于更优的风险评级和产品匹配。


    尽管乍看之下开放银行似乎会对银行产生负面影响，但实际上也可能带来诸多好处。通过提供便捷、安全的数据共享能力以及资金管理控制能力，建立透明、开放的关系，银行可以维持客户信任。通过展示数字化能力并拥抱创新解决方案，同时配备必要的安全控制，银行还可增强客户信心，从而提供最优或高端产品与服务。银行可以通过基于
    API 的平台型业务模式建立新的合作关系并获取新的收入来源。银行的触达范围也会扩大，因为第三方提供商的产品和服务能够在更短、更积极的时间框架内覆盖更广泛受众。


    商户同样可以拓展其产品供给，并将业务触达延伸至过去难以进入的市场。一个例子是支持从交易账户直接付款，从而覆盖没有信用卡的客户。替代性支付方式也可能降低银行卡交易成本。开放银行有潜力消除银行卡交易中由发卡行、处理机构和卡组织带来的商户服务费中的多种费用要素，这对客户同样有益。


    支付系统也将受益于竞争加剧，因为更公平的竞争环境有望带来创新支付解决方案。开放银行可以通过剔除虚假和欺诈性第三方提供商，并建立技术与数据共享标准，提升支付流程透明度。它还能够支持更高效的底层基础设施，从而提升交易清算与结算效率。

    '
- fmt: '## Risks


    There are a number of risks associated with Open Banking implementations. Awareness
    and upfront mitigation are key to enable the Marketplace to deal with these challenges.
    As the solutions are digital, this could result in exclusion for those customers
    who do not have access to the Internet or smartphones. Any new channel into a
    financial system introduces the possibility of fraud. A customer’s financial data
    could be used for purposes that are not mandated by the customer. Open Banking
    could expose a customer’s data to theft and inappropriate use. Weak security measures
    could result in a loss of funds due to criminal activity.


    Customers may not understand the risks when sharing their financial data and the
    limited liability accepted by many third-party providers. This may be addressed
    through a strong customer education campaign. In addition, the messaging and warnings
    must be clear and concise during the customer consent process. Customers should
    also be made aware of the mechanisms available to view and revoke third-party
    access.


    Third-party providers are not subject to the same regulations as banks and could
    expose banks to reputational risk through the mishandling of data. Sensitive customer
    data could be shared through accidental or malicious employee activities. Third
    parties may be easier targets for cyber criminals as their security mechanisms
    may not be as comprehensive as banks. Initial, scheduled and spot reviews of third-party
    systems and/or independent security assessments could ensure the necessary security
    controls are established. Depending on the nature of the API product consumed,
    this could be a mandatory requirement.


    Implementation and operation of a product or service which consumes Open Banking
    APIs requires a significant investment from new entrants with regard to design,
    development, support, and maintenance. This should be clearly communicated to
    potential providers by the API Marketplace Product Owner.


    Banks also face reputational risk through fraudulent or rogue third-party activity.
    Unauthorized use of consumer data can have a negative impact on consumer trust
    in the bank. This could be mitigated through thorough review and screening of
    third parties wishing to integrate into the Marketplace. A pre-emptive strategy
    is to communicate a strong market message ensuring customers and third parties
    are aware of security responsibilities throughout the Open Banking journey.


    One of the most significant risks faced by banks is disintermediation. Third-party
    providers may reduce the bank’s role, potentially leading to partial loss of customer
    relationships, which could in turn lead to loss of revenue. Open Banking, like
    ATM, online or app-based banking, is a channel that a customer uses to interact
    with the bank. A strong bank-customer relationship will help establish loyalty
    and trust. Banks can use customer data and activity, via any channel, to better
    understand behavior to provide personalized products and services. The potential
    of disintermediation could be viewed as motivation for banks to raise their game
    to retain the customer relationship.


    Open Banking will result in a change of business model for banks as there are
    significant changes to operational infrastructure, onboarding, transactional monitoring,
    and security checks. This could increase costs for banks and result in competitive
    challenges. This is best mitigated through a forward-looking view of the financial
    services landscape. A clear and well-defined roadmap, which takes into consideration
    the experience of other countries and organizations further ahead in their journey,
    will help ensure the readiness of banks to enable Open Banking.


    Merchants may have to contend with the exposure to reputational risk if customers
    lose their data or payments are intercepted, third parties not able to honor financial
    obligations and transactions originating from fraudulent activity. Payments systems
    may be subject to operational risk in the event of a system malfunction, human
    error, and cyberattacks. This may affect integrity and confidence in the payment
    system. Access to banking APIs may allow more third parties to sort-at-source
    which reduces interbank clearing, which will impact interbank clearing houses.


    ## Prescriptive, Facilitated, or Market-Driven Approaches


    Some countries have taken a prescriptive approach of mandating banks to share
    customer-permissioned data and requiring third parties that want to access such
    data to register with regulatory or supervisory authorities. The UK took a regulatory
    approach and incorporated Open Banking standards in 2018, which required the largest
    banks as Account Servicing Payment Service Providers (`ASPSP`) to develop Open
    APIs to provide access to Third-Party Providers (`TPPs`) for customer accounts.
    The Open Banking Implementation Entity (`OBIE`) was created by the Competition
    and Markets Authority (`CMA`) to deliver APIs, data structures, and security architectures.
    The European Union has passed the second edition of the Payment Service Directive
    (`PSD2`) which leverages APIs as a mechanism to unlock customer data and enable
    consumer choice. However, it took a lot of time to analyze and agree on the most
    optimal solution – as third parties, banks, and regulators had different objectives,
    ambitions, and concerns which needed to be balanced. As a result, the UK’s and
    EU’s regulations took some time to implement, and many banks missed their deadlines.
    Regions like Bahrain, using a `PSD2`-style regulation, established a set of guidelines
    and standards to ensure consistency in implementation and to boost adoption. Banks
    were also given a deadline by which they had to comply.


    Other jurisdictions have taken a more facilitative and flexible approach by issuing
    guidance and recommended standards and releasing open API standards and technical
    specifications. The common pillars of Open Banking include consent, data privacy
    expectations, and data security requirements. Instead of mandating desired outcomes
    at the outset, regulators allowed third-party providers to use secure workarounds
    until the infrastructure can be established. As an example, some regulators allowed
    screen-scraping practices to access customer-consented account information before
    APIs were provided. Remaining regions have opted for a flexible, market-driven
    approach, with no explicit regulations or standards. In the following section,
    we review Open Banking activities from different regions.'
