  trans: '

    ### 建立信任


    在开发者社区中，信任必须靠赢得。这可以通过关注细节并坚持高标准交付来实现。通过帮助开发者解决他们仅凭现有技术文档无法自行解决的难题，开发者会感受到支持。及时响应支持请求同样是强制性的。快速反馈——哪怕只是*“我们正在调查，会尽快回复你”*——都至关重要。基于这一点，支持团队内部必须具备相应流程，使开发问题能够被升级并得到处理。


    我想强调，开发者支持是一种平衡。我们当然希望支持开发者使用我们的 Marketplace，但也希望客户群体尽可能具备自助能力。也就是说——首要求助渠道应是
    Portal 文档；若仍存在明显理解差距，应先在开发者论坛提问，以征集社区反馈。如果这些方式都无效，并且使用方确信问题出在内部运行机制，或属于其无法在 Marketplace
    团队介入前自行解决的问题，则应提交工单。此外，工单还应包含他们已进行的排障与调查细节，以及*他们*判断该问题超出其控制范围的依据。这个要求看起来可能很高——但强大的开发者社区不仅能缓解支持团队压力，也能提升
    Marketplace 的整体标准。也就是说，API 产品质量将提升，因为它会接受来自使用方更具挑战性的评审。


    同样重要的是**言行一致**。如果 API Marketplace 是访问数据的新数字渠道，你的流程也应当是*数字化*的。对于一个兴趣刚被激发的开发者而言，没有什么比无法立即上手实践更令人沮丧。比如，拥有一个很棒的开发者门户，展示了惊人的功能与能力，却只提供一个*预约沟通*或*联系我们*表单。自助服务是绝对必要的。我想特别强调这一点，因为它能让用户从概念无缝过渡到落地实践。


    通过提供对功能的即时访问，你的 API Marketplace 将从“营销/概念产品（vaporware）”转变为可落地代码。根据经验，开发者非常反感 vaporware。怀疑会立刻上升，寻找
    Marketplace 薄弱点的审视也会加剧。请务必在 API 产品发布时提供即时自助访问，至少应提供 Sandbox/Simulated 环境。


    ### 透明性


    对信息的**开放**、明确且无歧义的访问，也是*维持*开发者社区信任的方式。在竞争压力允许的范围内，尽可能提供 API 产品路线图洞察。第三方可以据此规划并安排各自发布节奏。若可能，可考虑与第三方就潜在
    API 产品开展咨询式流程，以便在产品生命周期早期确定潜在需求/采纳情况。这将有助于将精力聚焦到更易被消费的 API 上。尽管拥有数百个 API 产品的目录看起来很惊艳，但如果其中大多数
    API 的使用量或采纳率都很低，它只会增加支持和维护范围，并分散对高使用率 API 的关注。


    可以考虑设立**beta**计划，允许受信任的部分第三方提前访问早期阶段的 API 产品。该流程能让团队在边界清晰且安全的“staging”环境中优化和打磨产品——从接口设计、性能工程到文档更新。beta
    标签清晰表明产品仍在建设中。当我们的 Marketplace 向公众发布时，我们的产品负责人巧妙地加入了“beta”标识，使我们在发布早期阶段拥有更大的调整空间。在获得信息与网络安全许可后，也可能将
    beta 发布 API 连接到内部质量保证（QA）后端，以进行更深入的集成测试。不过这应在充分审慎评估后执行，因为向第三方开放内部环境可能打开“潘多拉魔盒”。


    在若干成熟开发者门户中可见的一个创新特性是 API **status** 页面，并且该页面本身也可通过 API 获取。这使使用方能够接入你的运营平台，并在服务或
    API 宕机时采取预防性措施。状态信息还包括历史数据，从而让使用方与运维团队能够快速识别运行不佳的产品，并在内部或后端平台上推动修复。提供这种级别的可见性，是向第三方传递一个信号：你认真对待平台稳定性与可靠性，并已采取措施在问题发生时提供即时告警/通知。


    一旦 API 进入生产环境，任何新增功能更新，或补丁与问题修复，都必须在**release notes**中清晰记录。这应成为部署周期的一部分，因为第三方必须被持续告知
    API 的任何变更。


    ### 协作


    务必鼓励使用方对 API 产品提出反馈，并在可能情况下在后续版本中尽量响应这些反馈。某些反馈——例如规定性监管接口过于复杂、难以消费——可能无法通过变更来满足。反馈是一份礼物；如果使用方愿意花时间提交反馈，从他们的视角看，这很可能意义重大——务必始终与用户形成闭环。继续上面的例子——针对复杂受监管接口的反馈，处理方式应是先表示理解，再说明该接口由监管强制要求，最后给出辅助建议，例如示例代码或实验课程。


    在技术开发者门户中设置一个区域，可能是消息论坛里的**feature**请求专属版块。随着第三方持续消费你的 API，他们最有条件识别产品缺口和潜在改进方向。这对产品生命周期是极佳输入，能让一个好
    API 变得更卓越。再次强调，依据 API 的规模与覆盖面，请求的优先级或排期应与该请求的投票数相关联。这是活跃开发者社区最大的价值之一——用户可以帮助推动产品路线图向前发展。


    在企业内部的集成方案中，所有服务使用方通常会提前很久收到变更通知，且某些治理流程要求在变更实施前获得所有使用方批准。由于 API Marketplace 位于组织边缘，交付团队在更新
    API 时可能未充分考虑更广泛影响。也就是说，从责任分配 RACI（Responsible, Accountable, Consulted, Informed）矩阵角度看，第三方可能既未被
    Consulted，甚至未被 Informed。应遵循轻量级变更管理流程，确保所有服务使用方至少知悉其所消费 API 的任何维护或发布。

    '
- fmt: '## Lead


    This effort should also be coordinated by the Product Owner (`PO`) with significant
    input and direction from the Engineering team. Although the content is highly
    technical in nature, it could be argued that this would be best understood and
    delivered by a technical team. My counterargument is that a technical team is
    not suited to lead this effort as they may be too close to the detail. The Product
    Owner will provide a view from a third-party perspective. As the Product Owner
    is ultimately accountable for the success and uptake of APIs, they should lead
    the effort for both portals, Business and Technical, as it is customer facing.
    By now, it should be apparent that a Product Owner must be semi-technical.


    ## Developer Advocacy


    Even a good product, with good documentation, needs to be evangelized. I observed
    and appreciated this approach from a major cloud provider while learning how to
    use a new mobile application development platform. At first, I could not understand
    why it was necessary at all – the documentation, code samples, and labs were amazing
    and even novice developers could get up and running in a short space of time.
    However, as I progressed deeper into the platform, I ran into scenarios which
    were not covered by any documentation. It was at that point I understood the value
    of a Developer Advocate.


    Although they might not know it, I got to know them by first name by watching,
    re-watching, pausing, and writing code in-step with their video tutorials. I marveled
    at how their solutions were far simpler and more elegant than the complex ones
    I anticipated. In addition to learning more about the platform, I also learnt
    how to use `Node.js` more efficiently. The difference between the documentation
    and the Advocate was that the latter used the product to solve a real-world scenario.


    Imagine pieces of Lego blocks lying on a table. Although you might be able to
    assemble a basic structure on your own, you probably would stick with familiar
    pieces. Watching someone else use an unfamiliar piece to achieve a specific function
    would help put that piece into perspective and give you the confidence to use
    it in the future.


    Simply put – API Marketplaces, especially in developing markets, need strong Developer
    Advocacy. Video tutorials covering concepts such as delegated authorization in
    a fun, easy to understand context will certainly help alleviate developer anxiety.
    The access mechanism allows viewing of the material `anytime` and as `many times`
    as needed to understand complex concepts. With the recent boom in online meetups,
    it is now easier than ever to join a user group. This should be leveraged as much
    as possible to get potential developers, albeit with the pre-requisite experience
    and willing-to-learn mindset, up and running on the platform. The inherent benefit
    of user groups, meetings – in person or online – is that it allows two-way communication
    between Marketplace and developer. I consider this interaction as mutually beneficial.


    Developers can get hands-on support from the Marketplace technical delivery team.
    The delivery team can also view first-hand the viewpoint from a developer. Sometimes
    developing in an ivory tower may result in theoretically sound, but impractical
    products. Such products typically get shelved. A key mantra of API Marketplace
    product development should be simple, practical, and reliable. Any member of the
    team should have the confidence to easily explain how to consume the product to
    an external user.


    For our launch event, the Product team secured funding for T-shirts and mugs.
    I chuckled at the effort and initially chalked it down to a marketing maneuver.
    I was extremely surprised to see how proud the delivery team was to wear the T-shirts,
    and it was at that point that I realized the importance of these tokens. “Swag,”
    also known as “merch,” provides a physical connection to an intangible entity.
    To this day, I still have the (unused) mug on my desk as I am proud of what we
    have achieved. It is one of our key objectives to have our developer community
    feel connected to the Marketplace and the same sense of belonging and support.'
