  trans: "\n### 授权码\n\n图 6-9 详细说明了授权码流程。\n\n![../images/509947_1_En_6_Chapter/509947_1_En_6_Fig9_HTML.jpg](img/509947_1_En_6_Fig9_HTML.jpg)\n\
    \n图 6-9\n\n授权码流程\n\n1.  请求由*资源所有者*发起。正如我们在前面的场景中所述，*我（资源所有者）*请求使用我的 Google（*资源服务器*）资料来访问\
    \ Lucidchart（*客户端*）。\n\n2.  *客户端*构建一个授权 URL，提供以下内容：\n    1.  凭证：仅提供*客户端 ID* ——\
    \ 用于表明请求来源。\n\n    2.  *code* 类型的响应，表示需要一个授权码。\n\n    3.  重定向 URI：决定用户在完成授权流程后应被重定向到哪里。请注意，这**必须**与为该应用配置的重定向\
    \ URI 一致。\n\n    4.  范围（Scope）：标识*客户端*希望代表用户访问的资源。\n\n    5.  状态（State）：用于在授权请求与授权服务器响应之间保持状态。\n\
    \n3.  然后，*客户端*通过 HTTP 302 将用户重定向到构建好的授权 URL。这是流程中的关键步骤，因为它需要*客户端*与*资源服务器*之间的直接交互。\n\
    \n4.  *资源服务器*验证请求中的*客户端 ID*、*重定向 URI*和*范围*，若有效，则提示*资源所有者*确认身份（认证）并提供同意（授权）。\n\n\
    5.  *资源所有者*完成身份认证，并授权*客户端*访问请求的资源。在我们的场景中，我会提供我的 Google 用户名和密码，并允许 Lucid 访问我资料中的特定内容。\n\
    \n6.  当*资源所有者*成功完成认证和授权后，*资源服务器*会生成一个*授权码*。若失败，则返回一个指示失败原因的*错误*。\n\n7.  *资源服务器*将*授权码*或*错误*附加到*重定向\
    \ URI*，并连同*state*参数一起，再次通过 HTTP 302 将用户重定向到*客户端*。\n\n8.  当重定向回*客户端*后，将确定授权请求状态——成功则为*授权码*，失败则为*错误*。\n\
    \n9.  若成功，*客户端*会发起获取*访问令牌*的请求，并提供：\n    1.  凭证：*客户端 ID*和*密钥*\n\n    2.  `authorization_code`\
    \ 类型的*grant type*\n\n    3.  *授权码*\n\n    4.  重定向 URI：必须与应用配置项一致\n\n10.  *资源服务器*将定位由*客户端\
    \ ID*引用的应用，验证*密钥*和重定向 URI 是否匹配；若提供了有效的*授权码*，则返回一个*访问令牌*。\n\n11.  返回的*访问令牌*将包含一个*refresh_token*属性。\n\
    \n12.  *access_token*可用于调用 API —— 即已订阅该已注册应用的 API。\n\n### 刷新令牌\n\n由于访问令牌通常只在较短时间内有效（一般为一小时），因此使用刷新令牌（Refresh\
    \ Token）*grant type*来在更长时间内访问资源。这也避免了终端用户在访问令牌过期后还要重复认证与重复授权的不便。需要特别注意的是，在某些场景下（如一次性付款），令牌可能只能在特定时间段内使用（甚至短于*expires_in*值），且只能使用一次。\n\
    \n为防止永久访问，必须限定令牌可刷新的持续时间。例如，令牌自首次签发访问令牌起，最长只能刷新 6 个月；超过该期限后，终端用户必须重新认证并重新授权访问。\n\
    \n图 6-10 详细说明了刷新令牌流程。\n\n![../images/509947_1_En_6_Chapter/509947_1_En_6_Fig10_HTML.jpg](img/509947_1_En_6_Fig10_HTML.jpg)\n\
    \n图 6-10\n\n刷新令牌流程\n\n1.  *客户端*发起获取新*访问令牌*的请求，并提供：\n    1.  凭证：*客户端 ID*和*密钥*\n\
    \n    2.  `refresh_token` 类型的*grant type*\n\n    3.  重定向 URI：应用已配置的 URI\n\n  \
    \  4.  *刷新令牌*：其作为属性由上一次生成的访问令牌返回\n\n2.  *资源服务器*将定位由*客户端 ID*引用的应用，验证*密钥*与重定向 URI\
    \ 是否匹配；若在刷新有效期内，则返回一个*访问令牌*。\n\n3.  此时，第三方拥有了一个*访问令牌*。请注意，*access_token*可能有指定的有效期，通常为\
    \ 3,599 秒。*refresh_token*的有效期更长。\n\n4.  返回的新*访问令牌*也将包含一个*refresh_token*属性，可用于下一次刷新请求。注意，该令牌只能使用一次。\n\
    \n### 权限撤销\n\n*资源服务器*的一项关键职责是向*资源所有者*提供对既往授权的可见性和控制能力。终端用户应能够轻松查看：*谁*获得了访问权限、*何时*授予，以及可访问*哪些*内容。更重要的是，用户应能够撤销特定*客户端*的访问权限。这通常通过用户管理门户实现。继续以\
    \ Lucidchart 场景为例，我可以使用 Google 提供的账户管理页面，查找哪些第三方可以访问我的账户，并移除其访问权限——如图 6-11 所示。\n\
    \n![../images/509947_1_En_6_Chapter/509947_1_En_6_Fig11_HTML.jpg](img/509947_1_En_6_Fig11_HTML.jpg)\n\
    \n图 6-11\n\n权限管理\n\n某些第三方也可能向终端用户提供撤销访问或解除账户关联的功能。*客户端*（第三方）会调用*资源服务器*的令牌撤销端点，以通知该事件并使授权及其关联令牌失效：\n\
    \n*   凭证：*客户端 ID*和*密钥*\n\n*   *刷新令牌*：其作为属性由上一次生成的访问令牌返回\n"
- fmt: '## Variation: Open Banking


    The OAuth standard provides a great foundation for delegated access for most security
    contexts. Confirming customer consent in an Open Banking context requires a custom
    or tailored approach for one or more of the following reasons:


    - It requires fine-grained access to end-user information. For example, a customer
    may allow a third-party access to only specific bank accounts.

    - Due to the dynamic nature of the data, a custom consent mechanism is required.
    Continuing the above example, once the customer is authenticated, their accounts
    can be retrieved and displayed in a custom view for authorization.

    - A two-stage mechanism is essential to verify that the third party executes the
    exact instruction or intent of the customer.


    Central to this process is the concept of an intent:


    1. The `Client` registers an intent with the `Resource Server` indicating what
    they would like to do.

    2. The `Resource Owner` authorizes the intent while also specifying the exact
    resources which may be accessed which is recorded in the intent.

    3. Prior to execution of the request from the `Client`, the `Resource Server`
    confirms the request matches the original intent and resources authorized by the
    `Resource Owner`.


    To achieve the above, a combination of the `Client Credentials` and `Authorization
    Code` OAuth grant types, as illustrated in Figure [6-12](#509947_1_En_6_Chapter.xhtml#Fig12),
    are used. This shows how the elements of the OAuth standard can be assembled for
    a customized implementation.


    ![../images/509947_1_En_6_Chapter/509947_1_En_6_Fig12_HTML.png](images/509947_1_En_6_Chapter/509947_1_En_6_Fig12_HTML.png)


    Figure 6-12


    Open Banking variation of OAuth flow


    A quick overview of the process:


    - The `Client` uses the `Client Credentials` grant to confirm its identity and
    ability to access to specific API products and receives an `Access Token`. We
    refer to this token as a “light” token.

    - The `Client` then registers an intent with the `Resource Server` using the light
    token and receives an intent identifier as a reference.

    - The `Client` includes the intent identifier in the Authorization URL and initiates
    a customized `Authorization Code` flow.

    - This allows the `Resource Server` to locate the original intent when it receives
    the request from the `Resource Owner` redirect.

    - A custom consent page may be constructed around the type of intent registered
    allowing the `Resource Owner` finer control over which data is shared.

    - For example, to make payment, a list of accounts can be provided and a specific
    one selected. As the interaction is directly between `Resource Owner` and `Resource
    Server`, the `Client` does not get access to sensitive data.

    - On successful authorization, receipt of the `code` and final leg of the `Authorization
    Code` grant, the `Client` retrieves a new `Access Token`, referred to as the “heavy”
    token.

    - The reason for the “heavy” classification is that the token is intrinsically
    bound to the intent. Subsequent requests to the `Resource Server` with this token
    are processed using the intent as a reference.

    - The `Client` uses this “heavy” token for API calls to the `Resource Server`.

    - Subsequent refresh tokens, if allowed, are also linked to this intent.


    As you will note from the above, while there are additional steps in the flow,
    the use of an intent affords additional security by:


    1. Allowing finer-grained control of resources.

    2. Providing a second policy-enforcement point when the `Resource Server` compares
    the instruction to intent before processing a `Client` request.


    ## Vulnerability


    As you may have observed, the `Authorization Code` flow is underpinned by redirects
    achieved using HTTP `302`. Although important in its function, it provides an
    opportunity for attack and is one of the biggest threats to the integrity of the
    process. There are undoubtedly complex mechanisms of intercepting and redirecting
    network packets or creating fake DNS records which experienced hackers could use
    to exploit a redirect. As my career has been largely been dedicated to development
    rather than hacking, I present a far simpler way in which a dishonest third party
    could phish or compromise an end user’s credentials in Figure [6-13](#509947_1_En_6_Chapter.xhtml#Fig13).


    ![../images/509947_1_En_6_Chapter/509947_1_En_6_Fig13_HTML.jpg](images/509947_1_En_6_Chapter/509947_1_En_6_Fig13_HTML.jpg)


    Figure 6-13


    Credential phishing flow


    As the diagram indicates, as part of the `Authorization Code` flow, the `Client`
    can maliciously redirect the end user to a fake provider page, which could easily
    be constructed to appear like that of the `Resource Server` – and also be hosted
    on a domain which closely matches the original. The end user would then be inputting
    their credentials into a compromised site. The technical acumen required to achieve
    this is elementary web development and hosting knowledge and considerably lower
    than having to understand the TCP/IP stack or DNS. It is important and interesting
    to note that the potential remedy to this attack is a process update to verify
    the integrity of third parties before allowing them to participate in your ecosystem.


    ## OWASP


    The Open Web Application Security Project (`OWASP`) is a non-profit foundation
    that works to improve the security of software through its community-led open
    source software projects, hundreds of chapters worldwide, tens of thousands of
    members, and by hosting local and global conferences.'
  raw: '### Variation: Open Banking


    The OAuth standard provides a great foundation for delegated access for most security
    contexts. Confirming customer consent in an Open Banking context requires a custom
    or tailored approach for one or more of the following reasons:


    *   It requires fine-grained access to end-user information. For example, a customer
    may allow a third-party access to only specific bank accounts.


    *   Due to the dynamic nature of the data, a custom consent mechanism is required.
    Continuing the above example, once the customer is authenticated, their accounts
    can be retrieved and displayed in a custom view for authorization.


    *   A two-stage mechanism is essential to verify that the third party executes
    the exact instruction or *intent* of the customer.


    Central to this process is the concept of an *intent*:


    1.  The *Client* registers an intent with the *Resource Server* indicating what
    they would like to do.


    2.  The *Resource Owner* authorizes the intent while also specifying the exact
    resources which may be accessed which is recorded in the intent.


    3.  Prior to execution of the request from the *Client*, the *Resource Server*
    confirms the request matches the original intent and resources authorized by the
    *Resource Owner*.


    To achieve the above, a combination of the *Client Credentials* and *Authorization*
    *Code* OAuth grant types, as illustrated in Figure [6-12](#509947_1_En_6_Chapter.xhtml#Fig12),
    are used. This shows how the elements of the OAuth standard can be assembled for
    a customized implementation.


    ![../images/509947_1_En_6_Chapter/509947_1_En_6_Fig12_HTML.png](images/509947_1_En_6_Chapter/509947_1_En_6_Fig12_HTML.png)


    Figure 6-12


    Open Banking variation of OAuth flow


    A quick overview of the process:


    *   The *Client* uses the *Client Credentials* grant to confirm its identity and
    ability to access to specific API products and receives an *Access Token*. We
    refer to this token as a “light” token.


    *   The *Client* then registers an intent with the *Resource Server* using the
    light token and receives an intent identifier as a reference.


    *   The *Client* includes the intent identifier in the Authorization URL and initiates
    a customized *Authorization Code* flow.


    *   This allows the *Resource Server* to locate the original intent when it receives
    the request from the *Resource Owner* redirect.


    *   A custom consent page may be constructed around the type of intent registered
    allowing the *Resource Owner* finer control over which data is shared.


    *   For example, to make payment, a list of accounts can be provided and a specific
    one selected. As the interaction is directly between *Resource Owner* and *Resource
    Server*, the *Client* does not get access to sensitive data.


    *   On successful authorization, receipt of the *code* and final leg of the *Authorization
    Code* grant, the *Client* retrieves a new *Access Token*, referred to as the “heavy”
    token.


    *   The reason for the “heavy” classification is that the token is intrinsically
    bound to the intent. Subsequent requests to the *Resource Server* with this token
    are processed using the intent as a reference.


    *   The *Client* uses this “heavy” token for API calls to the *Resource Server*.


    *   Subsequent refresh tokens, if allowed, are also linked to this intent.


    As you will note from the above, while there are additional steps in the flow,
    the use of an intent affords additional security by


    1.  Allowing finer-grained control of resources


    2.  Providing a second policy-enforcement point when the *Resource Server* compares
    the instruction to intent before processing a *Client* request


    ### Vulnerability


    As you may have observed, the *Authorization Code* flow is underpinned by redirects
    achieved using HTTP 302\. Although important in its function, it provides an opportunity
    for attack and is one of the biggest threats to the integrity of the process.
    There are undoubtedly complex mechanisms of intercepting and redirecting network
    packets or creating fake DNS records which experienced hackers could use to exploit
    a redirect. As my career has been largely been dedicated to development rather
    than hacking, I present a far simpler way in which a dishonest third party could
    phish or compromise an end user’s credentials in Figure [6-13](#509947_1_En_6_Chapter.xhtml#Fig13).


    ![../images/509947_1_En_6_Chapter/509947_1_En_6_Fig13_HTML.jpg](images/509947_1_En_6_Chapter/509947_1_En_6_Fig13_HTML.jpg)


    Figure 6-13


    Credential phishing flow


    As the diagram indicates, as part of the *Authorization Code* flow, the *Client*
    can maliciously redirect the end user to a fake provider page, which could easily
    be constructed to appear like that of the *Resource Server* – and also be hosted
    on a domain which closely matches the original. The end user would then be inputting
    their credentials into a compromised site. The technical acumen required to achieve
    this is elementary web development and hosting knowledge and considerably lower
    than having to understand the TCP/IP stack or DNS. It is important and interesting
    to note that the potential remedy to this attack is a *process* update to verify
    the integrity of third parties before allowing them to participate in your ecosystem.


    ## OWASP


    The Open Web Application Security Project (OWASP) is a non-profit foundation that
    works to improve the security of software through its community-led open source
    software projects, hundreds of chapters worldwide, tens of thousands of members,
    and by hosting local and global conferences.'
  trans: '

    ### 变体：开放银行


    OAuth 标准为大多数安全场景下的委托访问提供了良好的基础。在开放银行场景中确认客户同意，出于以下一个或多个原因，需要采用自定义或定制化方法：


    *   它要求对终端用户信息进行细粒度访问。例如，客户可能只允许第三方访问特定的银行账户。


    *   由于数据具有动态特性，需要自定义同意机制。延续上面的示例，一旦客户完成身份认证，其账户可以被检索并在一个自定义视图中展示以供授权。


    *   必须采用两阶段机制，以验证第三方执行的是客户确切的指令或*意图*。


    这一过程的核心是*意图*这一概念：


    1.  *客户端*向*资源服务器*注册一个意图，表明其希望执行的操作。


    2.  *资源所有者*对该意图进行授权，同时指定可被访问的确切资源，并将其记录在该意图中。


    3.  在执行来自*客户端*的请求之前，*资源服务器*会确认该请求与*资源所有者*最初授权的意图和资源相匹配。


    为了实现上述目标，会结合使用 *Client Credentials* 和 *Authorization* *Code* 两种 OAuth 授权类型，如图
    6-12 所示。这展示了如何将 OAuth 标准中的各个元素组装成一个定制化实现。


    ![../images/509947_1_En_6_Chapter/509947_1_En_6_Fig12_HTML.png](img/509947_1_En_6_Fig12_HTML.png)


    图 6-12


    OAuth 流程的开放银行变体


    该流程的快速概览：


    *   *客户端*使用 *Client Credentials* 授权来确认其身份以及访问特定 API 产品的能力，并获得一个*访问令牌*。我们将该令牌称为“轻”令牌。


    *   然后，*客户端*使用该轻令牌向*资源服务器*注册一个意图，并接收一个意图标识符作为引用。


    *   *客户端*将该意图标识符包含在授权 URL 中，并发起一个定制化的 *Authorization Code* 流程。


    *   这使得*资源服务器*在接收到来自*资源所有者*重定向的请求时，能够定位原始意图。


    *   可围绕已注册意图的类型构建自定义同意页面，使*资源所有者*能够更细粒度地控制共享哪些数据。


    *   例如，在发起支付时，可以提供账户列表并选择其中一个。由于交互直接发生在*资源所有者*与*资源服务器*之间，*客户端*无法访问敏感数据。


    *   在成功授权并收到 *code*，以及完成 *Authorization Code* 授权的最后一步后，*客户端*会获取一个新的*访问令牌*，称为“重”令牌。


    *   之所以称其为“重”令牌，是因为该令牌与意图具有内在绑定关系。随后使用此令牌向*资源服务器*发起的请求，都会以该意图为参考进行处理。


    *   *客户端*使用该“重”令牌对*资源服务器*发起 API 调用。


    *   后续的刷新令牌（若允许）也会与该意图关联。


    正如你从上文中会注意到的，尽管流程中增加了额外步骤，但使用意图通过以下方式提供了额外的安全性：


    1.  允许对资源进行更细粒度的控制


    2.  当*资源服务器*在处理*客户端*请求之前将指令与意图进行比对时，提供了第二个策略执行点


    ### 漏洞


    正如你可能已经观察到的，*Authorization Code* 流程以通过 HTTP 302 实现的重定向为基础。尽管这在其功能上很重要，但它也提供了攻击机会，并且是对流程完整性威胁最大的因素之一。毫无疑问，经验丰富的黑客可以利用复杂机制拦截和重定向网络数据包，或创建伪造
    DNS 记录来利用重定向漏洞。由于我的职业生涯主要致力于开发而非黑客攻击，我将在图 6-13 中给出一种更简单得多的方式，说明不诚实的第三方如何钓鱼或窃取终端用户凭据。


    ![../images/509947_1_En_6_Chapter/509947_1_En_6_Fig13_HTML.jpg](img/509947_1_En_6_Fig13_HTML.jpg)


    图 6-13


    凭据钓鱼流程


    如图所示，作为 *Authorization Code* 流程的一部分，*客户端*可以恶意将终端用户重定向到伪造的提供方页面。该页面很容易被构造得看起来像*资源服务器*的页面——并且还可托管在一个与原始域名高度相似的域名上。随后，终端用户就会在被攻陷的网站中输入其凭据。实现这一点所需的技术能力仅是基础级的
    Web 开发与托管知识，远低于理解 TCP/IP 协议栈或 DNS 所需的门槛。一个重要且有意思的点是，应对此类攻击的潜在补救措施，是通过*流程*更新，在允许第三方参与你的生态系统之前先验证其完整性。


    ## OWASP


    开放式 Web 应用安全项目（OWASP）是一个非营利基金会，通过其由社区主导的开源软件项目、全球数百个分会、数以万计的成员，以及举办本地和全球会议，致力于提升软件安全性。

    '
- fmt: '## Security Top 10


    The Top 10 API Security Risks identified by OWASP [[`https://owasp.org/www-project-api-security`](https://owasp.org/www-project-api-security)]
    lists the following:


    - **Broken Object Level Authorization** (API1): APIs tend to expose endpoints
    that handle object identifiers, creating a wide attack surface Level Access Control
    issue. Object level authorization checks should be considered in every function
    that accesses a data source using an input from the user.

    - **Broken User Authentication** (API2): Authentication mechanisms are often implemented
    incorrectly, allowing attackers to compromise authentication tokens or to exploit
    implementation flaws to assume other user’s identities temporarily or permanently.
    Compromising a system’s ability to identify the client/user compromises API security
    overall.

    - **Excessive Data Exposure** (API3): Looking forward to generic implementations,
    developers tend to expose all object properties without considering their individual
    sensitivity, relying on clients to perform the data filtering before displaying
    it to the user.

    - **Lack of Resources and Rate Limiting** (API4): Quite often, APIs do not impose
    any restrictions on the size or number of resources that can be requested by the
    client/user. Not only can this impact the API server performance, leading to Denial
    of Service (DoS), but also leaves the door open to authentication flaws such as
    brute force.

    - **Broken Function Level Authorization** (API5): Complex access control policies
    with different hierarchies, groups, and roles, and an unclear separation between
    administrative and regular functions, tend to lead to authorization flaws. By
    exploiting these issues, attackers gain access to other users’ resources and/or
    administrative functions.

    - **Mass Assignment** (API6): Binding client provided data (e.g., `JSON`) to data
    models, without proper properties filtering based on an allow list, usually leads
    to Mass Assignment. Either guessing objects properties, exploring other API endpoints,
    reading the documentation, or providing additional object properties in request
    payloads allows attackers to modify object properties they are not supposed to.

    - **Security Misconfiguration** (API7): Security misconfiguration is commonly
    a result of unsecure default configurations, incomplete or ad hoc configurations,
    open cloud storage, misconfigured `HTTP` headers, unnecessary `HTTP` methods,
    permissive Cross-Origin resource sharing (`CORS`), and verbose error messages
    containing sensitive information.

    - **Injection** (API8): Injection flaws, such as `SQL`, `NoSQL`, Command Injection,
    etc., occur when untrusted data is sent to an interpreter as part of a command
    or query. The attacker’s malicious data can trick the interpreter into executing
    unintended commands or accessing data without proper authorization.

    - **Improper Assets Management** (API9): APIs tend to expose more endpoints than
    traditional web applications, making proper and updated documentation highly important.
    Proper hosts and deployed API versions inventory also play an important role to
    mitigate issues such as deprecated API versions and exposed debug endpoints.

    - **Insufficient Logging and Monitoring** (API10): Insufficient logging and monitoring,
    coupled with missing or ineffective integration with incident response, allows
    attackers to further attack systems, maintain persistence, pivot to more systems
    to tamper with, extract, or destroy data. Most breach studies demonstrate the
    time to detect a breach is over 200 days, typically detected by external parties
    rather than internal processes or monitoring.


    ## Recommendations


    To address the risk of Excessive Data Exposure (API3), we use the following guidelines:


    - Detailed review of the responses from the API to confirm it contains valid data.

    - Always filter sensitive data on the server.

    - Avoid the use of generic methods such as `toJSON()` and `toString()`. Instead
    select specific properties to return.

    - Implement a schema-based response validation mechanism to define and enforce
    data returned by API methods, including errors.

    - Keep interfaces as simple as possible. Provide only as much information as required.
    Use versioning to extend the API if needed.


    Most API Gateways provide out-of-the-box functionality to enable resource and
    rate limiting, often with fine-grained control for different Quality of Service
    per consumer. This should be leveraged to mitigate the Lack of Resources and Rate
    Limiting (API4).


    To prevent Injection (API8), there is a clear separation of roles between logic
    orchestrating microservices and integration components as detailed in `Platform
    Architecture`. This measure limits the possibility of API input being used directly
    in database queries.


    The intense Security Review process, discussed next, helps significantly in identifying
    and resolving potential issues.


    ## Security Review


    Security reports generated by application scanning tools sometimes run into tens
    or hundreds of pages. Apart from having to reassure nervous Delivery Leads that
    the issues are not as bad as it appears, it often feels like we’re running through
    a gauntlet. What helps immensely is the realization that it is far better to find
    an issue during internal testing which can be fixed, rather than reading about
    a security breach of your API on your favorite technology news site. Our detailed
    and uncompromising process is outlined in Figure [6-14](#509947_1_En_6_Chapter.xhtml#Fig14).


    ![../images/509947_1_En_6_Chapter/509947_1_En_6_Fig14_HTML.png](images/509947_1_En_6_Chapter/509947_1_En_6_Fig14_HTML.png)


    Figure 6-14


    Security review process


    Some quick highlights:


    - Security tests are conducted by three teams, hailing from different competencies.
    From previous experience, we learned that we could cut out 80-odd pages of a security
    report with a stricter input validation strategy. To identify issues like these
    and to prevent our Delivery Lead unnecessary anxiety, security tests are first
    conducted by our internal Quality Assurance team before we request the Enterprise
    Security team to review. Thereafter, a test is scheduled with an independent,
    external security consultancy.

    - The security report provided from the external test is reviewed and reclassified
    by Information Security – with severity typically being bumped `up` a level. That
    is, medium to high and high to critical.

    - To assist prioritization of fixes, issues or defects found are classified using
    the `MoSCoW` (Must have, Should have, Could have, or Won’t have) method.

    - Issues identified may also fall outside the team’s domain of control – such
    as configuration updates needed on shared enterprise components. In these cases,
    we still retain ownership of the issue while it is being investigated and resolved
    by external teams.

    - The reclassified security report is owned by the Marketplace team, and both
    internal and external resolutions and updates are incorporated into the delivery
    cycle.

    - Security tests are often re-run once updates have been applied to confirm resolution
    and identify new issues which may have been introduced with the fixes.'
