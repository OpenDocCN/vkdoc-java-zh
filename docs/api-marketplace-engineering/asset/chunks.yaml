  trans: '

    ### 开发者获得收益


    这种方法的原则是激励第三方使用组织的 API。从本质上讲，所有方法都应被视为一种合作伙伴关系，因为一方的成功意味着另一方的成功。在这里，消费者是组织的延伸，并共享收入成果。这让我想起我曾与一位创业公司老板的对话，他以高额价格出售了自己的企业。尽管这是许多人梦寐以求的模式，但他却很遗憾自己保留了全部所有权——如果有更多利益相关方，企业本可以做得更大。


    从财务角度看，与其完全拥有一个较小的蛋糕，不如分享一个更大蛋糕的一部分，可能更具盈利性。这是 API 市场的一个关键主题——它使你的组织能够通过第三方触达更多客户。若从逻辑上看，如果第三方能从其促成的交易中获益，那么它就是价值链的一部分，并会尽最大努力促成交易。让我们看看可以如何实现这一点：


    *   **收入分成**：这可能是我最喜欢的第三方参与机制之一。它体现了双赢方式，并清楚表明组织致力于将第三方视为有价值的合作伙伴。非洲移动网络爆发式增长的一个关键因素是：几乎任何街角的小商贩都能售卖话费。商贩的激励来自每笔销售的佣金。移动运营商只是利用了一个成熟且广泛分布的话费分销网络。第三方提供商也更有可能推广或重点展示能带来更高分成的产品或服务。潜在的收入分配比例还可能成为第三方商业计划中的关键转折点，促使其构建新的产品或服务。


    *   **联盟（Affiliate）**：拥有稳定客户基础的第三方也可以作为品牌倡导者，推动你的 API 产品被采用。类似于培训合作伙伴帮助候选人获得认证，也有服务提供商可以构建定制化训练营项目，帮助潜在开发者快速上手你的
    API 产品。除了让 API 获得更多曝光外，另一个好处是可直接从联盟服务提供商和受训开发者那里获得关于 API 采用的反馈。尽管这项工作也可以由内部交付团队承担，但专业机构可能已经拥有稳定的订阅用户群、与开发者建立关系的能力，且更重要的是具备中立性，这会让新消费者降低戒备。与创业孵化器（旨在支持发展中企业的项目）合作，也是支持这些举措的好方式，并且是在组织生命周期早期接触新组织、展示
    Marketplace 价值的绝佳机会。


    *   **推荐（Referral）**：这种模式的成功，从成千上万的 YouTube 赞助频道中即可见一斑。通过实施简单的推荐计划，如果开发者的朋友和同事使用其代码注册，他们就可以获得奖励。这当然有助于吸引并建立你的
    Marketplace 受众。对于某些 API 产品，潜在客户线索（Lead）的价值本身就足以补偿第三方提供商。例如，当潜在客户在考虑购房或购车时使用金融贷款计算器
    API，第三方即可获得补偿。由于客户信息可以在调用中被传递，这也为组织提供了潜在销售机会。


    ### 免费（Free）


    Free 与 Freemium 的关键区别在于：Free API 产品将始终免费提供。在这种情况下，价值创造是隐性的——它推动 API 采用，并增加使用你平台的第三方提供商数量——这些第三方随着时间推移可能被转化。其目标是通过零成本实现大规模扩散，从而让你的品牌触达更多潜在客户。


    这对第三方来说是一个有吸引力的选项，尽管托管组织可能并不情愿提供，但其对第三方的潜在影响和价值可能非常可观。例如，在企业中一个用于提供收入类型和职业类型列表的简单数据
    API 可能被视为理所当然，但对于需要这些数据完成注册流程的初创公司而言却可能价值巨大。它还使你的组织有机会通过新渠道提供服务——本质上，这些渠道就是由第三方构建的应用和服务。


    ### 间接（Indirect）


    秉持合作精神并巩固双赢模型这一基础原则，该策略以终端客户受益为核心。一个成功的销售策略应使所有参与者都能从交易中获得价值。采用间接策略时，可通过以下方式创造价值：


    *   **客户（Customers）**：满足监管要求（如开放银行 Open Banking）清楚地表明，客户数据的所有权与共享控制权掌握在终端用户手中。它使用户能够以由你平台促成的方式，安全且灵活地访问新产品与服务。本质上，是*他们的*数据，但在*你的*规则下。对用户和组织而言，这是双赢。


    *   **企业对企业（B2B** **)**：允许外部合作伙伴访问 API，可拓宽面向客户的解决方案范围。例如，向你的忠诚度与奖励计划开放 API 访问，可以让终端客户参与积分兑换体系，这不仅能扩大你的计划覆盖范围、带来更多积分兑换，也能为用户提供良好的价值主张。


    *   **信息型（Informational）**：通过 API 共享信息，可提升客户对市场变化的认知。可共享的信息示例包括外汇汇率、营销活动（如限时促销优惠）以及组织更新动态。


    *   **声誉型（Reputational）**：建立新的数字渠道可将你的组织定位为技术领导者和变革推动者。这可能成为使你的组织区别于竞争对手的因素，并为你的品牌带来显著价值。

    '
- fmt: '## Billing Engineering


    Having defined a number of strategies for billing in an API Marketplace, let us
    now discuss the technical engineering for practical implementation. The API product
    will typically define the monetization approach – some may be paid for by the
    third party; others may have a revenue share or referral or free. This is typically
    defined by the Product Owner in close consultation with the backend supporting
    systems.


    It is also important to identify how consumers will be billed – will the third
    party need to fund an account which is charged on each transaction, or will transactions
    be billed and invoiced later? Regardless of which mechanism is selected, it is
    important to build a “billing backbone” which will service all APIs in the platform.
    All events, even for free APIs, should be sent into the billing pipeline for Analytics
    and Reporting purposes, and this billing function should not be taken lightly.
    Whenever possible, leverage an enterprise capability. If this is not possible,
    consider using a hosted or managed service as this has a high operational impact.


    A technical flow of an Event Billing Model is illustrated in Figure [4-2](#509947_1_En_4_Chapter.xhtml#Fig2).


    ![../images/509947_1_En_4_Chapter/509947_1_En_4_Fig2_HTML.jpg](images/509947_1_En_4_Chapter/509947_1_En_4_Fig2_HTML.jpg)


    Figure 4-2


    Event Billing Model


    The steps in an Event Billing Model are described in Table [4-2](#509947_1_En_4_Chapter.xhtml#Tab2).


    Table 4-2


    Event billing sequence


    | Step | Description |

    | --- | --- |

    | A | An event is generated from an element in the Application Stack, typically
    upon completion of an API request and, at this time, primarily from the Microservice
    component. The event contains details of the call including the product, third-party
    identifier, completion status, request and response payloads, and date and time.
    The event is inserted into a database – to minimize call latency and to allow
    offline processing |

    | B | The event record is read by a Billing Pre-Processor on a batch schedule
    or trigger. The batch schedule allows more efficient processing as many records
    are processed for a specific period. Trigger execution allows near real-time processing
    of events |

    | C | The record is supplemented with additional metadata from systems such as
    Master Data Management (`MDM`), the Enterprise Product Catalog, which contains
    an API to product mapping, and Third-Party Provider database – which contains
    additional configuration regarding the third party such as account to be billed.
    As this is achieved asynchronously, there is no time pressure for data collection
    |

    | D | The enriched and mediated record, in a pre-defined format, is routed to
    a Pricing and Billing Engine, which is provided as an Enterprise Service. This
    capability will process the billing event and update the third party’s account
    data. Note that rules regarding how the event should be billed are included in
    the record. This approach allows the Billing Pre-Processor to influence how the
    event is billed |

    | E | The mediated record is also stored in a datastore accessible to business
    support applications in the Marketplace |

    | F | Custom reports, using enriched, mediated records, are run periodically to
    provide a near real-time billing view of the platform. Note that these views may
    not be accurate revenue data – but supports the “notional view” discussed later
    in this chapter |


    A technical flow of a real-time Billing Model is illustrated in Figure [4-3](#509947_1_En_4_Chapter.xhtml#Fig3).


    ![../images/509947_1_En_4_Chapter/509947_1_En_4_Fig3_HTML.jpg](images/509947_1_En_4_Chapter/509947_1_En_4_Fig3_HTML.jpg)


    Figure 4-3


    Real-time billing


    The steps in a near real-time Billing Model are described in Table [4-3](#509947_1_En_4_Chapter.xhtml#Tab3).


    Table 4-3


    Real-time billing sequence


    | Step | Description |

    | --- | --- |

    | A | A call to reserve funds is made before the API request is processed. This
    ensures that the third party has sufficient credit available to service the request.
    At the time of the call, the exact amount to be billed may not be known – a pre-defined
    budgetary amount based on the nature of the API product is reserved. If the minimum
    amount to meet the funds reservation request cannot be met, an error is returned
    to the consumer |

    | B | An event is generated from an element in the Application Stack, typically
    upon completion of an API request and, at this time, primarily from the Microservice
    component. The event contains details of the call including the product, third-party
    identifier, completion status, request and response payloads, and date and time.
    The event is inserted into a database – to minimize call latency and to allow
    offline processing |

    | C | The insertion of the event record triggers a call to the Billing Engine.
    The Billing Engine orchestrates calls across the components detailed below |

    | D | It is first necessary to rate the event. The event record is routed to the
    Rating Engine |

    | E | The Rating Engine caches configuration data from systems such as Master
    Data Management (`MDM`), the Enterprise Product Catalog, which contains an API
    to product mapping, and Third-Party Provider database – which contains additional
    configuration regarding the third party such as billing account in in-memory datastores
    for optimal processing. Note that for this type of bill processing, latency is
    a key consideration. Low latency allows faster processing of the event which results
    in a smaller risk window period between balance update and additional requests
    |

    | F | The rated event is then used by the Charging element to deduct a specific
    amount from the third parties’ remaining credit. The rated event could also indicate
    that the third party should not be charged – for example, if the API request was
    not successfully processed or if the product was part of a promotional campaign.
    In this instance, the reserved amount is released |


    ## Analytics and Insight


    Piloting an API Marketplace implementation is made significantly easier with the
    assistance of navigational data, preferably as real-time and detailed as possible.
    In a typical engineering mindset, this section was initially planned to be included
    in the chapter detailing Operations. After some consideration, I found that this
    would be suggesting that the ship is guided from the engine room rather than the
    bridge. As vital as operational metrics may be, it is the interpreted information
    that drives the direction and objective of the platform. As an example, consider
    the operational metric of number of transactions per second as an indication of
    speed. Without supplementary data such as the third-party provider and API product
    generating the traffic, as an indication of direction, this could turn out to
    be equivalent to stepping on the gas pedal with the gear in a neutral position
    – high revs but no forward momentum.


    The intention of this section is to highlight the importance of knowing the historical
    path and progress of the platform and establishing a set of current navigational
    data such as position and current bearing that will be used to plot the way forward.
    It is important to note that not all gauges and dials on the command center control
    panel of the bridge will be active on Day One. These spring to life as the Engineering
    team instruments the platform or harvests data from disparate sources to allow
    data to flow in. If the Product Owner has a well-defined view of what is needed,
    this top-down approach will guide the Engineering team. The alternative is a bottom-up,
    technically driven view of some random system metrics that makes for a pretty
    widget on the control panel but provides a useless business indicator.'
  raw: '## Billing Engineering


    Having defined a number of strategies for billing in an API Marketplace, let us
    now discuss the technical engineering for practical implementation. The API product
    will typically define the monetization approach – some may be paid for by the
    third party; others may have a revenue share or referral or free. This is typically
    defined by the Product Owner in close consultation with the backend supporting
    systems.


    It is also important to identify how consumers will be billed – will the third
    party need to fund an account which is charged on each transaction, or will transactions
    be billed and invoiced later? Regardless of which mechanism is selected, it is
    important to build a “billing backbone” which will service all APIs in the platform.
    All events, even for free APIs, should be sent into the billing pipeline for Analytics
    and Reporting purposes, and this billing function should not be taken lightly.
    Whenever possible, leverage an enterprise capability. If this is not possible,
    consider using a hosted or managed service as this has a high operational impact.


    A technical flow of an Event Billing Model is illustrated in Figure [4-2](#509947_1_En_4_Chapter.xhtml#Fig2).


    ![../images/509947_1_En_4_Chapter/509947_1_En_4_Fig2_HTML.jpg](images/509947_1_En_4_Chapter/509947_1_En_4_Fig2_HTML.jpg)


    Figure 4-2


    Event Billing Model


    The steps in an Event Billing Model are described in Table [4-2](#509947_1_En_4_Chapter.xhtml#Tab2).


    Table 4-2


    Event billing sequence


    | Step | Description |

    | --- | --- |

    | A | An event is generated from an element in the Application Stack, typically
    upon completion of an API request and, at this time, primarily from the Microservice
    component. The event contains details of the call including the product, third-party
    identifier, completion status, request and response payloads, and date and time.
    The event is inserted into a database – to minimize call latency and to allow
    offline processing |

    | B | The event record is read by a Billing Pre-Processor on a batch schedule
    or trigger. The batch schedule allows more efficient processing as many records
    are processed for a specific period. Trigger execution allows near real-time processing
    of events |

    | C | The record is supplemented with additional metadata from systems such as
    Master Data Management (MDM), the Enterprise Product Catalog, which contains an
    API to product mapping, and Third-Party Provider database – which contains additional
    configuration regarding the third party such as account to be billed. As this
    is achieved asynchronously, there is no time pressure for data collection |

    | D | The enriched and mediated record, in a pre-defined format, is routed to
    a Pricing and Billing Engine, which is provided as an Enterprise Service. This
    capability will process the billing event and update the third party’s account
    data. Note that rules regarding how the event should be billed are included in
    the record. This approach allows the Billing Pre-Processor to influence how the
    event is billed |

    | E | The mediated record is also stored in a datastore accessible to business
    support applications in the Marketplace |

    | F | Custom reports, using enriched, mediated records, are run periodically to
    provide a near real-time billing view of the platform. Note that these views may
    not be accurate revenue data – but supports the “notional view” discussed later
    in this chapter |


    A technical flow of a real-time Billing Model is illustrated in Figure [4-3](#509947_1_En_4_Chapter.xhtml#Fig3).


    ![../images/509947_1_En_4_Chapter/509947_1_En_4_Fig3_HTML.jpg](images/509947_1_En_4_Chapter/509947_1_En_4_Fig3_HTML.jpg)


    Figure 4-3


    Real-time billing


    The steps in a *near* real-time Billing Model are described in Table [4-3](#509947_1_En_4_Chapter.xhtml#Tab3).


    Table 4-3


    Real-time billing sequence


    | Step | Description |

    | --- | --- |

    | A | A call to reserve funds is made before the API request is processed. This
    ensures that the third party has sufficient credit available to service the request.
    At the time of the call, the exact amount to be billed may not be known – a pre-defined
    budgetary amount based on the nature of the API product is reserved. If the minimum
    amount to meet the funds reservation request cannot be met, an error is returned
    to the consumer |

    | B | An event is generated from an element in the Application Stack, typically
    upon completion of an API request and, at this time, primarily from the Microservice
    component. The event contains details of the call including the product, third-party
    identifier, completion status, request and response payloads, and date and time.
    The event is inserted into a database – to minimize call latency and to allow
    offline processing |

    | C | The insertion of the event record triggers a call to the Billing Engine.
    The Billing Engine orchestrates calls across the components detailed below |

    | D | It is first necessary to rate the event. The event record is routed to the
    Rating Engine |

    | E | The Rating Engine caches configuration data from systems such as Master
    Data Management (MDM), the Enterprise Product Catalog, which contains an API to
    product mapping, and Third-Party Provider database – which contains additional
