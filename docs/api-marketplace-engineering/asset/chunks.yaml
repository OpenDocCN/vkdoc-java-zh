  trans: '

    ### 服务级别协议


    事件由支持工程师根据问题的严重性和优先级划分到不同类别。定义及严重性映射遵循表 10-1 中定义的矩阵。


    表 10-1


    严重性-响应映射


    | 严重性分类 | 严重性标签 | 标准响应时间 |

    | --- | --- | --- |

    | 功能完全受阻（所有用户受影响） | 严重（阻断级） | < 30 分钟 |

    | 部分功能受阻（许多用户受影响） | 高 | < 2 小时 |

    | 部分功能受影响（有替代方案） | 中 | < 24 小时 |

    | 某一功能区段受影响（用户数量较少） | 低 | < 48 小时 |

    | 支持团队受阻（后端依赖） | 阻塞 | 在服务台中跟踪 |


    ## 支撑系统


    我们的平台有两个主要依赖——一个内部依赖和一个外部依赖。内部组件是 Marketplace 的构建模块，已在介绍平台架构的章节中讨论。内部组件出现问题可能会导致整个平台不可用。外部元素是
    API 产品的后端服务提供系统。根据提供方接口的性质，一个或多个 API 产品都可能受到影响。在下面各节中，我将更详细地讨论内部和外部支撑要素。


    ### 平台即服务策略


    正如在介绍平台架构的章节中所讨论并在图 10-17 中所示，我们的策略是尽可能利用企业现有能力。几乎从 Marketplace 创建之初，我们就已经认识并接受这样一个事实：组织内拥有高技能、专注且敬业的人员，他们通常具有多年管理特定系统的运营经验。基于这一点，我们采用了尽可能利用企业能力的策略。


    ![../images/509947_1_En_10_Chapter/509947_1_En_10_Fig18_HTML.jpg](img/509947_1_En_10_Fig18_HTML.jpg)


    图 10-17


    托管平台服务


    外包的“托管服务”方式也有其缺点，因为它使我们与企业紧密耦合，我们可能需要更长时间等待系统升级，并且必须与其他租户共享资源。然而，我们发现平台成熟度加速、专属技术支持以及显著降低运营支出预算等优势，使其成为一个很有吸引力的选择。


    一旦支撑系统出现问题，Marketplace 支持工程师将通过联系负责该系统的对口团队来遵循事件管理流程。如果无法建立直接联系，则需要运营指挥中心协助，后者将启动既定的升级流程以追踪相关系统负责人。在中断问题解决之前，问题归属仍由
    API Marketplace 支持团队承担。由于每个系统都有其自身依赖，根因可能位于更底层的技术栈。举例来说，数据库中断可能由与存储区域网络（SAN）的连接丢失引起，而该连接丢失又可能是防火墙规则更新导致的。凭借多年支持复杂互依系统的经验，我们的组织采取务实果断的方法：对于高严重性、影响服务的中断，会迅速召集“焦点会议”，并要求所有支撑团队强制参与。这种方法能够快速定位根因并完成修复。正是在这种时刻，当我们看到企业整体力量被调动起来解决中断时，我们会更加庆幸采用了平台即服务策略。


    ### 后端依赖


    如图 10-18 所示，API Marketplace 拥有多个消费者，每个消费者使用一个或多个 API，而一个 API 会集成到一个或多个提供方系统中。沿着这棵关系树向上回溯可以观察到：单一提供方的故障可能影响一个或多个
    API，并进一步产生连锁效应，影响一个或多个消费者。


    ![../images/509947_1_En_10_Chapter/509947_1_En_10_Fig19_HTML.jpg](img/509947_1_En_10_Fig19_HTML.jpg)


    图 10-18


    消费者、API、提供方关系


    我们管理这一复杂的消费者、API 与提供方网络的方法如下：


    *   清晰掌握每个 API 产品对应哪些后端系统作为**提供方**。这是一个“动态”视图，因为每次发布都可能出现产品与后端之间的新连接。


    *   根据 API 的性质，确定后端的**关键性**。例如，如果安全服务提供方不可用，会影响身份验证，用户将无法登录；如果参考数据提供方不可用，则可临时使用缓存数据。


    *   API Gateway 可用于确定消费者订阅了哪些 API 产品。


    *   制定服务矩阵，以便运营团队能够快速判断后端提供方接口丢失所带来的影响。对于关键提供方依赖，消费应用也可能需要额外措施，例如显示维护页面或隔离特定功能。


    *   我们平台待办事项中的一个重要条目是发布 API 状态。提供方系统的可用性将是该视图的关键输入。


    ## 总结


    在本章中，我们更深入地探讨了运营环境中的不同领域。基于我们构建并上线 API 平台的经验，以及对大量需考虑领域的观察，一个关键经验是：应在平台生命周期的早期就建立运营化视角。我们还强调了我们的变更与发布管理方法，该方法经过了定制，并且重要的是，已适配到一个既有组织中运行。再次说明，DevOps
    *实践*是实现持续、可靠敏捷交付的关键推动因素。


    必须始终从*人员（people）、流程（process）*和*技术（technology）*的视角来考虑运营环境的运行。尽管这听起来可能有些老生常谈，但这些要素在本质上彼此交织、相互支撑，并最终带来更高效、更可靠的平台。前文讨论的日志与监控方法提供了*技术*能力，并使我们能够洞察解决方案执行情况。对支持团队角色、赋能和沟通策略的强调，展示了*人员*要素如何融入其中。定义良好的*流程*是实现
    Marketplace 良好运行、可预测性与稳定性的关键。


    我们的 Marketplace，以及很可能你的也是，依赖于许多内部支撑要素和后端服务提供方。最后，我们探讨了利用企业托管服务并与提供方系统高效协作的方法。坦率地说，本章最终比预期更长、也更为细致。我将其归因于运营版图的广阔，以及一个简单事实：一个解决方案在其生命周期中的大部分时间都处于执行环境之中。

    '
- fmt: '# 11. Conclusion


    We are now in our fifth year of our API Marketplace implementation. It is remarkable
    that the pace and energy of the platform is more vibrant and stronger today than
    it has ever been. I honestly believe that the platform is now a living, breathing,
    almost self-sustaining entity. As I glance at my to-do list, there are still several
    areas that I have identified for optimization. One of the factors which this could
    be attributed to is technology options that were previously not available. We
    are on a constant quest to streamline performance and execution – possibly a perpetual
    one as new avenues and approaches appear with each iteration of the platform.
    Another significant factor is that backend product teams are now extremely keen
    to publish their service for external consumption, and we have a growing list
    of APIs scheduled for delivery.


    In all honesty, while writing this book, I have questioned the time that I could
    have spent nurturing the platform. The reason which anchored me to the book was
    to attempt to capture our formula for success by sharing my experience from the
    last four years – to bootstrap other implementations. As indicated on a number
    of occasions, each Marketplace implementation will be unique, tailored to the
    needs and identity of the host organization. It is highly unlikely that the Marketplace
    you will build or are currently building will adopt every concept or approach
    outlined – from Platform Architecture to Operations. However, it is a fervent
    hope that while reading this book, the solutions outlined will provide a foundation,
    catalyst, or trigger for innovations in your platform.


    With the benefit of hindsight, and from keen observation of many recurring themes,
    I am of the firm belief that there have been key ingredients to our formula that
    were essential to the success of our implementation. Although many are not technical,
    they are essential to the engineering spirit of this initiative.


    ## Team Dynamic


    In Chapter [1](#509947_1_En_1_Chapter.xhtml), I highlighted the key roles to pilot
    the Marketplace star ship into new and unchartered territory. As much as these
    can be filled with talented individuals, it is essential that the roles function
    as a single unit. With any long-term project, human resource changes are inevitable.
    Ours has been no different and we have had several changes, with just myself and
    one or two other team members, the only constants.


    This has afforded me a unique vantage point to observe several permutations, some
    successful, some not. The reason that our current configuration has been the most
    successful can be simply attributed to a fantastic team dynamic and culture. The
    various personalities, very much like the crew of Star Trek, complement and importantly
    balance one another. There are many occasions when there are more differences
    in opinion than universal agreement. Oddly enough, this is possibly the reason
    for a successful team culture. By considering a number of perspectives through
    active, healthy discussion and debate, we generally find the most balanced solution.
    Reciprocally, if everyone was similar, the end result would be heavily weighted
    in a specific way.


    In every discussion, all viewpoints are heard and considered. This can be attributed
    to great facilitation by the ship’s captain. If consensus cannot be reached, the
    captain adjudicates, taking all inputs into consideration. Although a team member’s
    solution may not have been selected, they feel placated as they had the opportunity
    to share their view. With a solution or target identified, all members of the
    team pull in that direction.


    > The whole is greater than the sum of its parts (Aristotle).


    ## Organizational Support


    I am also of the firm conviction that we would not have been able to sustain full
    operational capability, let alone establish an API Marketplace, without a strong
    enterprise service foundation. This was not always my view. In the early stages
    of building the Minimum Viable Product (`MVP`), we viewed the rest of the enterprise
    as an impediment to our success. The concept of third-party developers leveraging
    organizational capability combined with our radical technology selection was years
    ahead of standard practices. In hindsight and introspection, the petulant mindset
    and impatience of our project team several years ago was relatively immature.
    Given that we were attempting to build a new digital channel into the organization,
    we should have proceeded with far more care and caution. The proximity of an API
    Marketplace at the outskirts of the traditional enterprise to bridge third-party
    access was most likely the contributing factor for both the project team’s selection
    of bleeding-edge technology and the organization’s cause for concern.


    The mindset shift from annoyance to appreciation from the project team and suspicion
    to trust from the rest of the organization occurred during the process of operationalizing
    the platform. By leveraging enterprise capability, we inherited the experience
    and expertise of seasoned veterans, which helped fast-track the maturity of a
    platform from running under controlled laboratory conditions to reliably servicing
    real-world workloads. By demonstrating more patience and resilience, we were also
    able to evangelize the benefits that the capability and reach that an API Marketplace
    could afford the greater organization and lobby support from various enterprise
    domains.


    A key lesson that I have learnt, both personally and professionally, is that it
    takes far more time and energy attempting to skirt around process and governance.
    Rather afford the organization the necessary respect by learning how to navigate
    existing process and more importantly, understanding its function and purpose.
    Odds are – you will discover that it serves to protect the organization and its
    users. Once you have a firm grasp of the process and function, then try to optimize
    for agility.


    > Seek first to understand.'
  raw: '# 11. Conclusion


    We are now in our fifth year of our API Marketplace implementation. It is remarkable
    that the pace and energy of the platform is more vibrant and stronger today than
    it has ever been. I honestly believe that the platform is now a living, breathing,
    *almost* self-sustaining entity. As I glance at my to-do list, there are still
    several areas that I have identified for optimization. One of the factors which
    this could be attributed to is technology options that were previously not available.
    We are on a constant quest to streamline performance and execution – possibly
    a perpetual one as new avenues and approaches appear with each iteration of the
    platform. Another significant factor is that backend product teams are now extremely
    keen to publish their service for external consumption, and we have a growing
    list of APIs scheduled for delivery.


    In all honesty, while writing this book, I have questioned the time that I could
    have spent nurturing the platform. The reason which anchored me to the book was
    to attempt to capture our formula for success by sharing my experience from the
    last four years – to bootstrap other implementations. As indicated on a number
    of occasions, each Marketplace implementation will be unique, tailored to the
    needs and identity of the host organization. It is highly unlikely that the Marketplace
    you will build or are currently building will adopt every concept or approach
    outlined – from Platform Architecture to Operations. However, it is a fervent
    hope that while reading this book, the solutions outlined will provide a foundation,
    catalyst, or trigger for innovations in your platform.


    With the benefit of hindsight, and from keen observation of many recurring themes,
    I am of the firm belief that there have been key ingredients to our formula that
    were essential to the success of our implementation. Although many are not technical,
    they are essential to the engineering spirit of this initiative.


    ## Team Dynamic


    In Chapter [1](#509947_1_En_1_Chapter.xhtml), I highlighted the key roles to pilot
    the Marketplace star ship into new and unchartered territory. As much as these
    can be filled with talented individuals, it is essential that the roles function
    as a single unit. With any long-term project, human resource changes are inevitable.
    Ours has been no different and we have had several changes, with just myself and
    one or two other team members, the only constants.


    This has afforded me a unique vantage point to observe several permutations, some
    successful, some not. The reason that our current configuration has been the most
    successful can be simply attributed to a fantastic team dynamic and culture. The
    various personalities, very much like the crew of Star Trek, complement and importantly
