  trans: "\n### 应用注册\n\n在 OAuth 文献中一个经常被忽视的重要后台流程，是 *Client* 与 *Resource Server* 之间的交互。*Resource\
    \ Server* 可能并不是我数据的所有者，但作为负责任的服务提供方，并且作为其尽职调查流程的一部分，应只向经过验证的参与方释放数据。任何使用 OAuth\
    \ 访问其 API 的应用，都必须具备可向 *Resource Server* 的 OAuth 服务器标识该应用的授权凭据。*Client* 将向 *Resource\
    \ Server* 注册一个应用，并提供有关请求来源以及用户应被重定向到何处的详细信息。\n\n对此步骤的快速回顾：\n\n1.  *Client* 必须向\
    \ *Resource Server* 注册一个应用。此步骤的目的是建立 *client* 身份，并使 *resource server* 能够跟踪访问请求。\n\
    \n2.  *Client* 需要提供有关请求来源以及最终用户应被重定向到何处的详细信息。这一点很重要，因为它能限制潜在的中间人攻击。你会注意到，重定向 URI\
    \ 会用于多种交互。\n\n3.  在该流程结束时，*Resource Server* 将以 *Client ID* 和 *Client Secret.*\
    \ 的形式向 *Client* 提供凭据。\n\n在某些 API 网关产品中，一旦应用被创建，对 API 产品的访问是通过订阅流程实现的。\n\n![../images/509947_1_En_6_Chapter/509947_1_En_6_Fig6_HTML.jpg](img/509947_1_En_6_Fig6_HTML.jpg)\n\
    \n图 6-6\n\n客户端与资源服务器交互\n\n如图 6-6 所示\n\n*   一个或多个 C*lients*（第三方）可以向一个 *Resource\
    \ Server*（提供方）注册一个或多个应用。\n\n*   每个应用都订阅了一个或多个 API。\n\n*   每个应用都必须指定（一个或多个）重定向\
    \ URI，也可以提供（一个或多个）来源 URI。\n\n*   一个应用会被签发一组凭据——即 *Client ID* 和 *Client Secret*。\n\
    \n*   根据组织策略，对特定 API 的访问可能只授予已授权的客户端。如图所示，*Client 2* 没有对 API *W* 和 *X* 的订阅（访问）权限。\n\
    \n图 6-7 概述了应用注册流程。\n\n![../images/509947_1_En_6_Chapter/509947_1_En_6_Fig7_HTML.jpg](img/509947_1_En_6_Fig7_HTML.jpg)\n\
    \n图 6-7\n\n应用注册流程\n\n1.  *Client* 创建一个应用，提供诸如电子邮件、所有者和联系人等详细信息，以及诸如解决方案名称、重定向\
    \ URI 和客户端证书（如有必要）等元数据。\n\n2.  *Resource Server* 使用所提供的信息注册应用，并生成以 *Client ID*\
    \ 和 *Secret* 形式存在的凭据。\n\n3.  凭据会返回给第三方。此时，第三方拥有 *Client ID* 和 *Secret*。应用的配置数据（例如重定向\
    \ URI）是可以更改的；但是，*Client ID* 可能是固定的。许多 API 网关实现仅在注册时提供 *Secret*，如果丢失则会重新生成。\n\n\
    4.  此时，*Client* 将应用订阅或关联到由 *Resource Server* 发布的特定 API 产品。\n\n注意\n\n上述流程中的某些部分可以通过自助服务或人工干预完成。\n\
    \n*   某些 Marketplace 实现可能只向经过验证的使用者提供凭据，即便是在 Sandbox 环境中也是如此。\n\n*   在 Live 环境中，应用创建和订阅可能由产品负责人完成，以将第三方限制在特定产品范围内。\n\
    \n### 授权类型与访问令牌\n\n现在 *Client* 已经注册了应用并拥有凭据，接下来有不同方式来获得访问权限。在 OAuth 框架中，这被称为授权类型（grant\
    \ type）。针对不同使用场景有许多授权类型，同时也有用于创建新授权类型的框架。举例来说，*Device Code* 授权类型可用于在输入受限的电视设备上登录在线服务。\n\
    \n需要强调的是，在 Open API 或 B2B 场景中，*Client ID* 和 *Client secret* 可能足以访问 API。而在 B2C\
    \ 场景中，*Client ID* 和 *secret* 会在 *grant type* 所定义的流程中用于获取 Access Token，而 Access\
    \ Token 才是访问受保护资源时使用的凭据：\n\n**客户端凭据（ID/secret）+ 授权类型 ➤ 访问令牌 ➤ API**\n\n一个典型的 Access\
    \ Token 包含表 6-1 所示属性。\n\n表 6-1\n\n访问令牌属性\n\n| 字段 | 是否必需 | 描述 |\n| --- | --- |\
    \ --- |\n| `access_token` | 必需 | 访问令牌字符串 |\n| `token_type` | 必需 | 这是令牌类型，通常就是字符串“Bearer”，表示任何持有该令牌的一方都可使用它\
    \ |\n| `expires_in` | 可选 | 令牌被授予的有效时长 |\n| `refresh_token` | 可选 | 如果访问令牌过期，则使用它来请求新的\
    \ Access token |\n| `scope` | 可选 | 表示被授予的访问范围 |\n\n在接下来的章节中，我们将深入介绍以下授权类型获取 Access\
    \ Token 的流程：\n\n*   客户端凭据（Client Credentials）\n\n*   授权码（Authorization Code）\n\
    \n*   刷新令牌（Refresh Token）\n\n### 客户端凭据\n\n图 6-8 详细说明了客户端凭据流程。\n\n![../images/509947_1_En_6_Chapter/509947_1_En_6_Fig8_HTML.jpg](img/509947_1_En_6_Fig8_HTML.jpg)\n\
    \n图 6-8\n\n客户端凭据流程\n\n1.  *Client* 发起 *Access Token* 请求，并提供\n    1.  凭据：*Client\
    \ ID* 和 *Secret*\n\n    2.  `client_credentials` 的 *grant type*\n\n    3.  Scope：*Client*\
    \ 希望访问的资源范围\n\n2.  *Resource Server* 将根据 *Client ID* 定位对应应用，验证 *Secret* 是否匹配，并在已订阅所请求\
    \ API（在 *scope* 中指定）的情况下返回 *Access Token*。\n\n3.  此时，第三方已拥有 *Access Token*。注意，该令牌可能有指定的有效期，通常为\
    \ 3,599 秒。\n"
- fmt: "## Authorization Code\n\nFigure [6-9](#509947_1_En_6_Chapter.xhtml#Fig9) details\
    \ the Authorization Code process flow.\n\n![../images/509947_1_En_6_Chapter/509947_1_En_6_Fig9_HTML.jpg](images/509947_1_En_6_Chapter/509947_1_En_6_Fig9_HTML.jpg)\n\
    \nFigure 6-9\n\nAuthorization Code process flow\n\n1. The request is initiated\
    \ by the Resource Owner. As detailed in our earlier scenario, I (Resource Owner)\
    \ requested to access Lucidchart (Client), using my Google (Resource Server) profile.\n\
    2. The Client constructs an Authorization URL providing\n   1. Credential: Client\
    \ ID (only) – to indicate where the request originates from.\n   2. Response type\
    \ of code indicating that an Authorization Code is required.\n   3. Redirect URI:\
    \ Determines where the user should be redirected to after they complete the Authorization\
    \ flow. Note that this must match the redirect URI configured for the Application.\n\
    \   4. Scope: Identify resources that the Client wants to access on the user’s\
    \ behalf.\n   5. State: This is used to maintain state between the authorization\
    \ request and the authorization server’s response.\n3. The Client then redirects\
    \ the user, by way of a HTTP 302, to the constructed Authorization URL. This is\
    \ a pivotal step in the process as it requires direct interaction between Client\
    \ and Resource Server.\n4. The Resource Server verifies the Client ID, redirect\
    \ URI and scope requested, and if valid, prompts the Resource Owner to confirm\
    \ identity (Authentication) and provide consent (Authorization).\n5. The Resource\
    \ Owner authenticates themselves and authorizes the Client’s access to the requested\
    \ resources. From our scenario, I would provide my Google username and password\
    \ and allow Lucid access to specific elements of my profile.\n6. Upon successful\
    \ Authentication and Authorization by the Resource Owner, the Resource Server\
    \ generates an Authorization Code. If not, an error indicating the reason for\
    \ failure is used instead.\n7. The Resource Server appends the Authorization Code\
    \ or error to the redirect URI, along with the state parameter and redirects the\
    \ user, again by way of a HTTP 302, to the Client.\n8. Upon redirection to the\
    \ Client, the status of the Authorization request is determined – an Authorization\
    \ Code if successful, an error if not.\n9. If successful, the Client initiates\
    \ a request for an Access Token providing\n   1. Credentials: Client ID and Secret\n\
    \   2. grant type of `authorization_code`\n   3. Authorization Code\n   4. Redirect\
    \ URI: Must match what is configured for the Application\n10. The Resource Server\
    \ will locate the Application referenced by the Client ID, verify that the Secret\
    \ and redirect URI matches, and if a valid Authorization Code is provided, will\
    \ return an Access Token.\n11. The Access Token returned will contain a `refresh_token`\
    \ property.\n12. The `access_token` can be used to make calls to APIs – to which\
    \ the registered Application is subscribed to.\n\n## Refresh Token\n\nAs an Access\
    \ Token is generally valid for short periods of time, typically an hour, the Refresh\
    \ Token grant type is used to access resources for extended periods. This also\
    \ saves the end user the inconvenience of having to re-authenticate and re-authorize\
    \ once the Access Token expires. It is important to note that in some scenarios,\
    \ such as a once-off Payment, tokens may only be used within a specific period\
    \ (even shorter than the `expires_in` value) and only once.\n\nTo prevent perpetual\
    \ access, it is important to fix the duration for the refreshing of tokens. As\
    \ an example, tokens may only be refreshed for a maximum period of 6 months, starting\
    \ from the issuing of the first Access Token – after which the end user will have\
    \ to re-authenticate and re-authorize the access.\n\nFigure [6-10](#509947_1_En_6_Chapter.xhtml#Fig10)\
    \ details the Refresh Token process flow.\n\n![../images/509947_1_En_6_Chapter/509947_1_En_6_Fig10_HTML.jpg](images/509947_1_En_6_Chapter/509947_1_En_6_Fig10_HTML.jpg)\n\
    \nFigure 6-10\n\nRefresh Token process flow\n\n1. The Client initiates the request\
    \ for a new Access Token providing\n   1. Credentials: Client ID and Secret\n\
    \   2. grant type of `refresh_token`\n   3. Redirect URI: Configured for the Application\n\
    \   4. refresh token: Which was returned as a property in the last Access Token\
    \ generated\n2. The Resource Server will locate the Application referenced by\
    \ the Client ID, verify that the Secret and redirect URI matches, and if within\
    \ the refresh validity period, will return an Access Token.\n3. At this time,\
    \ the third party has an Access Token. Note that the `access_token` may have a\
    \ specified period of validity, typically 3,599 seconds. The `refresh_token` is\
    \ valid for a longer duration.\n4. The new Access Token returned will also contain\
    \ a `refresh_token` property which may be used for the next refresh request. Note\
    \ that this can only be used once.\n\n## Permission Revocation\n\nA key responsibility\
    \ of the Resource Server is to provide the Resource Owner with visibility and\
    \ control over previous authorizations granted. The end user should be able to\
    \ easily view who has access, when it was granted, and what can be accessed. More\
    \ importantly, the ability to revoke access for a specific Client. This is typically\
    \ achieved through a user administration portal. Continuing the Lucidchart scenario,\
    \ I can use the Account Administration page provided by Google, find which third\
    \ parties have access to my account, and remove the access – as shown in Figure\
    \ [6-11](#509947_1_En_6_Chapter.xhtml#Fig11).\n\n![../images/509947_1_En_6_Chapter/509947_1_En_6_Fig11_HTML.jpg](images/509947_1_En_6_Chapter/509947_1_En_6_Fig11_HTML.jpg)\n\
    \nFigure 6-11\n\nPermission administration\n\nSome third parties may also provide\
    \ end users with functionality to revoke access or unlink an account. The Client\
    \ (third party) initiates a call to the token revocation endpoint of the Resource\
    \ Server as notification of this event and to invalidate the authorization and\
    \ associated token:\n\n- Credentials: Client ID and Secret\n- refresh token: Which\
    \ was returned as a property in the last Access Token generated"
