- fmt: '## Building a Virtualiser


    Our first and only Sandbox strategy until the redesign was `Backend Simulation`.
    To achieve this, the team leveraged the `Mountebank` Open-Source project which
    allows a pre-defined response to be returned given a specific request. A custom
    application was deployed to our managed container platform. The application listened
    for requests on a specific port and only endpoint configuration for integration
    components needed to be changed to route to this service. For each new backend
    to be simulated, the application was updated to:


    1. Route the incoming request, based on a set of rules which includes the path,
    operation, parameters, and payload to a specific embedded JavaScript function.

    2. With the context of the function known, the function teased out further information
    from the request using custom logic built specifically for that integration solution.

    3. The function then used the collected information to locate a data file, deployed
    with the application – either in `json` or `xml` format.

    4. Upon retrieval of the file, some elements were updated, such as the date and
    time to give a more representative response.

    5. The updated response was then returned.


    This approach leveraged the capability of the open-source solution to process
    the request and custom code to compile the response.


    ### Requirements


    Using this implementation as a baseline, we formulated the following requirements
    for the next iteration of the `Virtualiser`:


    - **No code update or deployment**: To cater for any changes – request or response
    processing or additional data files, the custom application had to be updated
    and redeployed. As deployments had to be done within maintenance windows, this
    caused a lengthy delay. Our goal was to implement updates as configuration.

    - **Runtime configuration**: As `Mountebank` config lived in files within the
    application, changes could not be done at runtime. We need changes to reflect
    immediately.

    - **Accessibility and ease of update**: Given the complexity of rules and embedded
    JavaScript, initial setup could only be done by a developer and later changes,
    or updates could only be done by technically skilled members of the team who had
    a good understanding of the framework. Our requirement was that `any` member of
    the team could easily make changes.

    - **Third-party specific**: As the third-party identifier was generally included
    in the call to a backend provider, a generic response was returned. We wanted
    the ability to return consumer-specific responses.

    - **Application aware**: The custom application executed in its own context without
    any connection to our application architecture. As part of the redesign, the team
    threw in the kitchen sink with the requirement that the new version should be
    aware of internal constructs and be able to leverage those for routing and processing
    of requests.


    ### Implementation Options


    With the humility and maturity that comes with years of software development experience,
    we understood this was not a new problem, and many API platforms would have a
    similar challenge. There are great Commercial-Off-The-Shelf (`COTS`) offerings
    such as Computer Associate’s Service Virtualisation product. Unfortunately, this
    would not only attract a license cost, but it would also require navigation of
    governance processes for new software acquisition – which would result in lengthy
    timelines.


    The team evaluated and tested two impressive Open-Source projects:


    - `Hoverfly` is a lightweight API simulation tool. Using `Hoverfly`, you can create
    realistic simulations of the APIs your application depends on.

    - `Mountebank` is the first open-source tool to provide cross-platform, multi-protocol
    test “doubles” over the wire. This is the tool which underpinned our `Backend
    Simulation` strategy.


    After much deliberation and debate, we based our final decision around the local
    configuration which was core to both tools. A key requirement was that changes
    could be made without a code update or deployment. Forking the projects and making
    it bend to our will was also an option – this would require significant customization
    and maintenance. Given our constraints and requirements, the route that we finally
    settled on was custom development. This would result in the fastest and possibly
    most efficient resolution.


    ### Design Philosophy


    We used `Mountebank` as a reference and established two essential elements:


    A `predicate`, which is a condition based on the combination of input parameters
    which include the elements of an HTTP request and external configuration, listed
    in Table [9-6](#509947_1_En_9_Chapter.xhtml#Tab6).


    Table 9-6


    Predicate parameters


    | Element | Example |

    | --- | --- |

    | Method | `GET/POST/PUT/...` |

    | Path | `/customer` |

    | Query | `?x=1&y=2` |

    | Header | `x-subscription-id` |

    | Body | `{ name: ‘Tom Sawyer’ }` |

    | DB Config | `Database record retrieved using x-subscription-id` |


    Note the following customizations:


    - A specific header value of `x-subscription-id` is used to retrieve a database
    configuration record which is used as a parameter for the predicate evaluation.

    - Fuzzy logic to match on the key or key and value of a parameter – for example,
    if the `query` contained the key `x` or the expression `x=1`.

    - As many predicates could match, the one with the highest number of matches is
    used.


    A `response` is an action to be performed to generate a result. A response is
    configured based on the scenario being simulated as listed in Table [9-7](#509947_1_En_9_Chapter.xhtml#Tab7).


    Table 9-7


    Virtualiser responses


    | Type | Description |

    | --- | --- |

    | Static | Constant, pre-defined data that does not change |

    | Random | Regular expression to update specific elements of the response using
    configured variables such as the current datetime or elements of the input request
    |

    | Code | Dynamically executed mini applications (script) |

    | Proxy | Routes the request to a configured endpoint for processing |


    The dynamically executed “mini application” allows us the capability to respond
    to complex API requests. It enables `Shallow Virtualisation` by writing to persistent
    storage (disk or database) to maintain storage. It also allows `Semi-Live` by
    invoking Live services to construct a response. The application is stored as a
    script, which is interpreted at runtime. The script can be updated without deployment.
    The proxy capability provides an elegant mechanism to dynamically route the request
    at runtime for processing.'
