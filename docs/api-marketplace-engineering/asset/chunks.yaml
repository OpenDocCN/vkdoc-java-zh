    files, trying to understand why requests were not routed correctly, then proudly
    monitoring the platform fielding the first production traffic. Again, what has
    helped us relinquish control of these elements is the realization that they were
    going to a better home, one where they would receive the necessary attention and
    support. One better equipped to handle their needs with experienced subject-matter
    engineers and a well-planned future.


    ## Platform Services


    Developers are snowflakes. As a developer myself, I say this with the greatest
    of respect. Each developer is unique, and the odds are that if we were to ask
    three developers to build a logging solution, we are quite likely to get four
    different solutions – there’s always that over-achiever who wants to impress by
    submitting more than one option. From a creativity perspective, this is fantastic.
    From a support perspective, this is a nightmare as uniformity and structure in
    an operational environment is a mainstay. Platform services are an essential mechanism
    to bridge development and operational worlds by providing shared libraries or
    packages to achieve the following:


    *   **Logging**: In an API environment, logs are as valuable as nuggets of gold.
    A challenge of working with containers is that logs are written to the local file
    system of the container. If the instance is restarted, which is extremely likely
    or if there are multiple instances of a container, finding logs becomes quite
    difficult. A key function of the logging platform service we have crafted is that
    log entries are routed to an Elastic Logstash platform, which are then indexed
    for searching and analysis.


    *   **Auditing**: This is likely to be as welcome as documentation by most developers.
    Good auditing is essential for customer support and reporting. Key business level
    events, such as payment transactions, must be audited to meet organization forensic
    requirements. An audit utility function or library provides a mechanism for all
    developers to audit easily and more importantly, consistently.


    *   **Error handling** : Having a central location for error processing is incredibly
    useful from an operational perspective. This provides the capability to handle
    events consistently, to upgrade or downgrade specific conditions, and to trigger
    alerts to support personnel. More advanced capabilities could also include complex
    event processing which allows a higher-level error condition to be triggered based
    on a sequence of events within a specified timeframe. A further benefit is that
    it allows consistent return messages in the form of HTTP status codes, error codes,
    and messages to consumers. If we consider the potential for fragmentation if each
    developer has to implement their own responses to errors, this would be one of
    the first platform services to be implemented.


    *   **Property management**: Property management and the ability to update runtime
    configuration is one of the most important, yet under-rated platform services
    in a stack. As an example, consider an API endpoint for a backend platform. As
    the consuming application would progress through various environments from development
    to test to pre-production to production, there is likely different endpoints for
    the backend. This would have to be updated for each environment. It would be poor
    form if the endpoint configuration was configured statically. A more elegant solution
    is the ability to specify the configuration at runtime. Note that there are varying
    degrees of elegance – configuration data can be specified in a Kubernetes config
    map. As your deployment could consist of several microservices, each with its
    own config map, this could result in configuration data scattered across config
    maps. Endpoints are just one example. Credentials, timeouts, and tax percentage
    values should also be configurable at runtime. By providing developers with a
    platform service, it indirectly affords the operational team a consistent mechanism
    for property management.


    *   **Tracing** : If you have spent time supporting an integration platform, you
    know that the Holy Grail is the ability to trace a transaction from entry, through
    the stack, to the backend platform through to exit. Let me assure you that in
    a microservices architecture, a transaction could make several hops for fulfillment.
    The ability to retrace the steps of a transaction is a critical element of the
    API platform. There are off-the-shelf Application Performance Management (APM)
    products which help to trace requests using probes and injecting trace information
    at runtime. These tools are great for application performance tuning and determining
    system outages but is not a silver bullet for transaction tracing. A good tracing
    and logging strategy is essentially the golden thread which will help operational
    teams follow the path of a transaction through the platform.


    ## Deployment Architecture


    We tried an assortment of combinations of the above elements to determine the
    most optimal configuration. This is possibly one of the most rewarding elements
    of our deployment architecture as the Lego brick approach allows us the flexibility
    to assemble the stack in various formations. Since inception, we have been tethered
    to on-premises infrastructure and systems. In the sections below, I detail a roadmap
    and a key objective to move to Cloud infrastructure and managed services. Each
    iteration adds support for the next and we have tested and pushed the organizations
    boundaries a little further on each deployment. It should be noted that high levels
    of tolerance and patience from our Enterprise Information and Network Security
    teams were key to our success.'
  trans: '

    ## 平台即服务


    图 5-8 所示的平台即服务（PaaS）理念贯穿了我们的平台部署过程，我想花一点时间来详细说明。


    ![../images/509947_1_En_5_Chapter/509947_1_En_5_Fig8_HTML.jpg](img/509947_1_En_5_Fig8_HTML.jpg)


    图 5-8


    部署策略的演进


    正如本章前文所述，我们在实施初期所采用的技术比组织内其他团队领先了两到三年。我们在数字化实践中的定位以及建立新平台的目标，使我们获得了这一机会。随着企业缓慢但稳步地赶上，他们对这些新应用要素的理解、吸收与管理能力也在提升。我也毫不避讳地说，在运营环境中，他们对这些能力的支持水平已经超过了我们。原因在于*专注*。


    作为 API 市场团队，我们的首要目标是交付 API 产品。比如，虽然在某个阶段上线数据库可能是重点工作，但我们未必会给予数据库真正长期且持续的关注。我们的企业级专门团队则具备这种专注力，并且在全组织范围内对类似工作有更广阔的视角，因此在与软件供应商谈判整合性许可证协议等方面，也更具优势。同样的方法几乎适用于我们软件栈中的所有支撑要素。数字化实践与技术团队之间的共识是：后者在企业级层面更适合支持这些软件要素。


    再次坦诚地说，放手其中一些要素并不容易。就像父母会整夜照顾新生儿，并在孩子迈出第一步时倍感自豪一样，我们过去如此、现在依然对我们环境中的这些要素怀有同样的感情。我们曾熬夜翻查晦涩的配置文件，试图弄明白为什么请求没有被正确路由；随后又自豪地监控平台承接第一批生产流量。最终帮助我们放手这些要素的，是这样一种认知：它们将去往一个更好的“家”，在那里它们会得到必要的关注和支持——一个拥有经验丰富的领域工程师、并且对未来有周密规划的团队。


    ## 平台服务


    开发者就像雪花。作为开发者，我怀着最大的敬意这样说。每位开发者都独一无二；如果让三位开发者实现同一个日志方案，我们很可能会得到四种不同方案——总会有那个“超额完成者”想通过提交多个选项来展示实力。从创造力角度看，这非常棒；但从支持角度看，这却是一场噩梦，因为在运营环境中，统一性和结构化是根本。平台服务通过提供共享库或软件包，成为连接开发与运维世界的关键机制，以实现以下目标：


    *   **日志（Logging）**：在 API 环境中，日志就像金块一样珍贵。使用容器的一大挑战在于日志会写入容器本地文件系统。如果实例重启（这非常常见），或者容器存在多个实例，查找日志会变得相当困难。我们构建的日志平台服务的一项关键功能是：将日志条目路由到
    Elastic Logstash 平台，并在其中建立索引以便搜索和分析。


    *   **审计（Auditing）**：对大多数开发者而言，这件事可能和文档一样“不受欢迎”。但高质量审计对于客户支持和报表至关重要。诸如支付交易等关键业务级事件，必须进行审计以满足组织的取证要求。审计工具函数或库为所有开发者提供了便捷且更重要的是一致的审计机制。


    *   **错误处理（Error handling）**：从运维角度看，拥有一个集中式错误处理位置非常有价值。它能够支持一致地处理事件、对特定条件进行升级或降级处理，并触发对支持人员的告警。更高级的能力还可包括复杂事件处理：基于指定时间范围内的一系列事件，触发更高层级的错误条件。另一个好处是，它可以以
    HTTP 状态码、错误码和消息的形式，向使用方返回一致的响应信息。考虑到如果每位开发者都要自行实现错误响应可能导致的碎片化，这应当是最先落地的平台服务之一。


    *   **属性管理（Property management）**：属性管理以及运行时配置更新能力，是技术栈中最重要却又最容易被低估的平台服务之一。举例来说，考虑一个面向后端平台的
    API 端点。随着调用应用从开发、测试、预生产到生产等不同环境推进，后端端点很可能各不相同，因此每个环境都需要更新。如果端点配置是静态写死的，那将是很糟糕的做法。更优雅的方案是在运行时指定配置。需要注意的是，优雅程度也有高低——配置数据可以写在
    Kubernetes 的 config map 中。但如果你的部署包含多个微服务且各自拥有自己的 config map，配置数据就可能分散在多个 config
    map 里。端点只是其中一个例子。凭据、超时时间、税率百分比等也应支持运行时配置。通过向开发者提供平台服务，也间接为运维团队提供了统一的属性管理机制。


    *   **追踪（Tracing）**：如果你做过集成平台支持工作，就会知道“圣杯”能力是：能够从入口开始，穿过整个技术栈，经过后端平台，直到出口，全程追踪一次交易。请相信我，在微服务架构中，一次交易为完成处理可能需要多次跳转。能够回溯交易路径是
    API 平台的关键能力。市面上有现成的应用性能管理（APM）产品，可通过探针和运行时注入追踪信息来帮助追踪请求。这些工具在应用性能调优和系统故障定位方面很出色，但并不是交易追踪的银弹。良好的追踪与日志策略，本质上是一条“黄金线”，能帮助运维团队沿着交易路径穿越整个平台。


    ## 部署架构


    我们尝试了上述要素的多种组合，以确定最优配置。这或许是我们部署架构中最有价值的部分之一，因为“乐高积木”式的方法让我们能够灵活地以多种形态组装技术栈。自项目启动以来，我们一直受制于本地基础设施和系统。在下文中，我将详细介绍一条路线图，以及迁移到云基础设施和托管服务这一关键目标。每一次迭代都在为下一次提供支撑，而我们在每次部署中都进行了测试，并把组织边界又向前推进了一点。需要指出的是，企业信息与网络安全团队所表现出的高度包容与耐心，是我们成功的关键因素。

    '
- fmt: '## Launch Configuration


    Figure [5-9](#509947_1_En_5_Chapter.xhtml#Fig9) illustrates the Launch Deployment
    Configuration which underpinned our MVP. Like kids let loose in a candy store,
    we threw caution to the wind and used as many technology elements as possible
    and routed requests through as many hops as needed to get to the destination.
    If an enterprise policy did not allow firewall access for a specific system, we
    adopted a rebound approach until we found an alternative. While this will certainly
    work with a tenacious team, the end result is not as optimal as it could be.


    ![../images/509947_1_En_5_Chapter/509947_1_En_5_Fig9_HTML.jpg](images/509947_1_En_5_Chapter/509947_1_En_5_Fig9_HTML.jpg)


    Figure 5-9


    Launch configuration


    If building an on-premises Kubernetes cluster was not enough of a challenge, we
    opted to build two – one in the internal network and another in the Demilitarized
    Zone (DMZ). Our organization’s DMZ can be compared to a prison colony on a remote
    planet. Access is only allowed via a “jump box,” which is essentially a remote
    desktop connection. If you’re lucky, you can get one of two sessions, else you
    must wait until you can hijack a session when an incumbent user takes a bathroom
    break. I can still recall the look of desperation when a new DevOps engineer discovered
    he would not have GUI access to run his install scripts. In our DMZ, like a real
    prison, there are different levels of security. Back when we started, Containers
    and Kubernetes were deemed to be extremely dangerous, and a new zone, even more
    restricted than the rest, was purpose-built for us. We learnt of this when we
    attempted to connect elements `within` the DMZ. The focus session to troubleshoot
    the connectivity issue was similar to commands issued on a submarine – requests
    were relayed from Tester to Facilitator to Network Engineer to DevOps Engineer
    and all the way back. As painful as the experience was at times, it was also a
    tremendous learning opportunity as it afforded lessons to understand the organization’s
    network topology and more importantly, how to navigate it. Configuration detailing
    the nodes across which requests would be load-balanced and ports for firewall
    access was essential to make the solution work and outsourcing it to infrastructure
    designers, while possible, would take days, if not weeks to complete.


    The approach we chose was to roll up our sleeves, and complete the first pass
    internally, then review with a designer who would correct and teach us how it
    should be done. From a professional perspective, we forged good relationships
    with infrastructure project managers, designers, and supporting teams through
    this engagement. By working closely with these teams, we gained a better understanding
    of internal processes, the reason for their existence, and the sheer amount of
    pressure supporting teams in the Enterprise are under. Our annoyance with the
    internal teams for the seemingly long resolution times soon turned to compassion
    and respect for their effort and ultimately embarrassment of our petulant behavior.
    Instead of railing against the processes and governance which we felt slowed us
    down, we chose to understand and work with it. To its credit, the organization
    has also worked to streamline its operation to respond with more agility to get
    solutions to market. This experience, although a humbling one, was one of the
    most rewarding as it required the building of relationships with supporting teams
    to achieve the deployment objective.


    A factor which accelerated our delivery, and which still does today, was permission
    for direct, albeit via a load balancer, access to our microservices from the API
    Gateway instance in the DMZ. The enterprise standard is that all internal APIs
    are to be accessed via the internal Gateway. This would have resulted in definitions
    published twice, internal and external. It would also have a performance impact
    as the request would have to traverse another stop. The multi-node Managed Container
    platform hosted a single Authorization portal container application in the DMZ.
    Justification for this elaborate deployment was that it would help withstand the
    high traffic when the platform launched. I still chuckle when I think back to
    our initial outlook and the design decisions made based on emotion rather than
    reality.


    ## As-Is Configuration


    Figure [5-10](#509947_1_En_5_Chapter.xhtml#Fig10) reflects a deployment configuration
    of a much more mature and responsible team. Gone were the heady days of achieving
    an MVP, and we were far more in touch with reality regarding the technology elements
    of our platform and the supporting enterprise systems. We were also extremely
    fortunate to have two seasoned DevOps Engineers join our team, who actually “knew
    what we did not know.” With their experience, a far more stable and enterprise-ready
    Kubernetes cluster was quickly established – the third iteration.


    ![../images/509947_1_En_5_Chapter/509947_1_En_5_Fig10_HTML.jpg](images/509947_1_En_5_Chapter/509947_1_En_5_Fig10_HTML.jpg)


    Figure 5-10


    As-Is configuration


    One of the first questions raised regarded the need for a full-blown Kubernetes
    cluster in the DMZ. They patiently explained, as a parent would to a child who
    wanted ice cream before the main meal, that a simpler Docker Container platform
    deployment could be used to achieve the same objective. Their contribution to
    the evolution of our DevOps platform could be compared to a far more advanced
    alien race assisting cavemen who had just discovered fire. This, too, has been
    a great lesson. If you are going to embrace new technology, be it for a short-term
    MVP or a long-haul transformation project, be sure to resource it with the right
    skill level or consider a subset of the technology or not using it at all. Observing
    a master ply their craft is truly something to behold and our platform soon had
    a working pipeline, and the team was soon issuing commands via instant message
    to characters from Tolkien’s Middle-Earth to release code elements.


    One of the most significant developments of this deployment was permission from
    Network Security to allow internally hosted web applications to be exposed by
    a Reverse Proxy in the DMZ. This milestone decision allowed the migration of the
    single web application hosted in the DMZ Container Platform to the internal Kubernetes
    cluster. This has optimized delivery as internal pipelines and network connectivity
    can be leveraged and support simplified as the container and associated logs can
    easily be accessed. We have chosen not to decommission the DMZ Container Platform
    and are currently using it to host external applications that are not core to
    the Platform. Applications which leverage the API Marketplace capability but fulfill
    a third-party objective, for example, to synchronize Account transactions, are
    residents of this platform.'
