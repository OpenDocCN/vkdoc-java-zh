  trans: '

    ## 从开放银行到开放金融


    开放银行只是金融服务行业蜕变的第一阶段。开放金融（Open Finance）这一术语用于描述开放银行数据共享的延伸，同样建立在“消费者拥有其在金融服务提供商平台上所产生数据”的原则之上。在消费者同意的前提下，这些数据可以与获批的第三方提供商共享，以开发并提供创新产品和服务。开放银行仅聚焦于访问银行交易数据或代表客户发起支付，而开放金融的范围更广。它涵盖了所有消费者金融服务数据，如储蓄、债务、投资、养老金、替代性借贷和保险。在保险领域，来自现有服务提供商的客户数据可用于识别个性化且价格最优的保险科技产品；而在替代性借贷领域，历史交易数据可用于更可靠的信用评分和偿付能力分析。它有潜力改变消费者和企业使用金融服务的方式。


    从开放银行的发展历程中，有许多经验可用于推动开放金融取得成功：


    **标准化**：数据访问的标准化是避免市场碎片化的关键。就像一个国家内电源和插座标准保持一致一样，提供统一的 API 定义将使第三方能够专注于为客户创造价值，而不是应对各服务提供商之间的细微差异。对于数据共享，基于规则的方法——如英国开放银行所采用的方式——可能比
    PSD2 中采用的基于原则的方法更可取。


    **监管**：立法者、监管机构和公共部门应关注开放银行的快速发展。尽管“屏幕抓取”（screen scraping）因共享客户凭证而存在固有安全缺陷，但这一做法仍被允许持续了若干年。开放
    API 迅速崛起为替代方案，并革新了银行业。随着这股浪潮可能蔓延至银行业之外，保险等其他行业未来也可能受到影响。监管机构在其中发挥关键作用：需要有力的方向指引和适当的框架，以支持行业建立标准和基础设施，平衡其中涉及的不同公共利益。同样重要的是，现有金融服务提供商、金融科技公司（FinTech）与监管机构之间应持续协作，以推动生态系统发展。


    **商业模式**：开放金融的一个关键考量是资金模型，因为必须兼顾生态系统中所有参与方的需求。根据 PSD2 等规范，银行可能不得就数据共享和支付数据收费。考虑到银行为实现这一点已投入大规模资金，除满足核心监管要求外，这可能并非一项具有吸引力的举措。开放金融可以在监管最低要求之上，为竞争与创新腾出空间。基于开放
    API 技术的高级 API（Premium APIs）可通过支持跨多个不同行业的数据共享来推动开放金融发展。


    **争议处理机制**：由于争议可能给金融服务提供商和第三方带来声誉损害，所有利益相关方都应建立投诉管理流程，以便处理所提出的投诉或问题。为应对数据隐私泄露和数据滥用，可能需要建立责任框架，以追究金融服务提供商和第三方提供商的责任。


    **以客户为中心**：客户金融数据是开放金融生态系统的核心要素。由于这些数据在整个生命周期中始终归客户所有，因此必须始终将客户置于核心位置。客户应清楚了解其数据如何被收集、共享和使用。知情同意是关键机制，可使消费者了解其所同意事项的条款条件以及数据将如何被使用。客户还应享有撤销访问授权的权利，并且此前已共享的数据应可被“遗忘”。


    客户教育是金融服务提供商和第三方的重要职责，将有助于建立信任。如果潜在客户不信任该生态系统，他们就不会同意共享其数据。可信的第三方提供商同样是获取并维持客户信任的重要要素。


    ## 示例应用


    开放银行和开放金融已使银行和第三方提供商能够推出新产品与服务。我们重点介绍其中几个应用——由银行打造的 YOLT、采用前沿人工智能（AI）技术的 CHIP、利用开放
    API 扩展现有产品能力的 bunq、为第三方提供平台能力以屏蔽集成复杂性的 TrueLayer，以及提供跨银行账户聚合能力的 Revolut。


    金融科技公司（FinTech）的高速、低成本与创新能力，帮助扩展了现有能力，并推动了数字化应用和平台的构建。


    *   **YOLT**：ING 打造了最大的第三方可信实体之一——YOLT（2016 年始于荷兰，现已进入英国、法国和意大利）。YOLT 的应用通过调用开放银行
    API 聚合跨银行账户信息，并向客户提供建议。YOLT 的使命是“让每个人都拥有更聪明管理金钱的能力。”目前其客户约为 +-500,000；但其不足之一在于其
    App/功能仅支持“读取与建议”。应用给出的任何建议仍需在源银行系统中执行。


    *   **CHIP**：CHIP 使用人工智能（AI）计算你可以储蓄的金额，从已关联的活期账户中划转资金，并通过直接借记（direct debit）存入由巴克莱银行托管的独立储蓄账户。储蓄比例（最高可达
    5%）通过游戏化方式与您对 CHIP 的社交推广挂钩——每成功邀请一位朋友注册可额外获得 1%。


    *   **bunq**：早在 PSD2 之前，bunq 就已开放其 API。bunq 让开发者能够在一家持有完整银行牌照的银行之上构建独特应用，丰富所有
    bunq 用户的体验。借助 bunq API，开发者可以连接交易数据、推送通知、付款请求、银行卡、联名账户，以及限额与预算功能。


    *   **TrueLayer**：TrueLayer 的 API 平台使将开放银行、支付等金融服务集成到任何应用或网站变得简单，并可覆盖全球各地。TrueLayer
    可连接欧洲所有银行 API，而不受其所采用标准或协议差异的影响。


    *   **Revolut**：借助这一新功能，德国客户现可将其在 Comdirect、Commerzbank、Deutsche Bank、ING-DiBa
    和 Sparkasse 的账户连接至 Revolut 应用，并在一个地方查看全部财务状况——直接通过智能手机实现。该功能由英国金融科技公司 TrueLayer（欧洲金融
    API/编程接口提供商）合作开发。使用 TrueLayer 平台可确保德国主要银行的账户信息被安全集成，并在 Revolut 应用中实时更新。

    '
- fmt: '## Summary


    In this chapter, we reviewed how Open Banking and Open Finance has come to the
    fore in the Financial Services industry. It has essentially been driven by having
    the best interest of the customer in mind. Practices such as screen scraping jeopardize
    the security of the customer through sharing of credentials – APIs are a mechanism
    to remedy this. New payment methods and account aggregation will allow more convenience
    for customers and personalized service – specifications, such as PSD2, have enabled
    third parties to achieve this. More competition in the market could allow more
    customer choice, drive down costs, and improve service levels – Open Banking standards
    were introduced to do exactly this.


    We extolled the benefits to all participants – from the promise of financial inclusion
    to billions of unbanked across the globe to levelling the playing field for third-party
    providers. This movement is not without risk – and we have highlighted some and
    provided potential mitigation. What is extremely exciting at this time is that
    the wave of Open Banking is spreading globally. Although different territories
    have adopted different approaches across various product sets, the primary objective
    across all is the democratization of customer-owned data.


    We have also highlighted that this is just the beginning. Open Banking is the
    herald of a greater Open Finance initiative which will have an impact on more
    sectors within the Financial Services industry. This allows an unprecedented opportunity
    to re-design financial services for maximum scalability and efficiency. The golden
    thread tying everything together is regulation. A key objective regarding regulation
    is that data sharing and Open Banking should strike a balance between risk management
    and incentives for promoting innovation. Regulatory frameworks should set clear
    roles and responsibilities in line with market changes.


    Although some organizations have been pro-active in building the capability to
    enable Open Banking, many were not prepared. A well-planned and executed API platform
    strategy can provide an organization with the pre-requisite knowledge and experience
    to participate in and guide the regulatory consultative process.


    It is indeed interesting to note the ripple effect from a single requirement,
    specifically payment initiation, trigger the next change, which is access to customer
    account information. This brought about regulatory changes which essentially forced
    organizations to change their policies and allow access to third parties, with
    customer consent. The fracture has not stopped there – this has spurred change
    in other areas of financial services, such as insurance and lending.


    If we apply the same set of principles to other industries, such as Telecommunications
    and Healthcare, it stands to reason that a user’s mobile transaction history or
    health information belongs to the user and should be accessible to third parties,
    with the user’s consent. Providers such as Google and Facebook have baked this
    capability into their product offerings. In much the same way that regulation
    was passed that allowed users to retain their mobile numbers when moving to a
    new network, I think it is simply a matter of time before mobile transaction data,
    possibly even call history, is democratized. The sector just needs a compelling
    requirement that will trigger change. There are plans in many countries to provide
    a national healthcare service. Access to existing patient records and data from
    the private sector may just be a tipping point for change in this industry.


    Some organizations have adopted a wait-and-see approach and will react to regulatory
    changes. Many have spotted the potential of establishing a platform business and
    are pre-empting regulation or taking a strategic position by getting an early
    start to their API Marketplace implementations.


    ## 3. Consumption


    One of the key areas which requires a significant amount of attention is the `interface`
    to the API Marketplace. Although the star of the show is the actual API which
    provides the functionality, the star needs a stage and theatre to perform. If
    the stage is too small or the theatre too difficult to access, then the brilliance
    of the API will be lost. It is important to always keep this in mind throughout
    the journey. Without third-party consumption, there would be no traffic. No traffic
    results in no revenue. Revenue sustains the Marketplace which exists to achieve
    the Vision.


    The Marketplace provides `Products` which can be consumed by multiple third parties.
    Some products or APIs essentially sell themselves due to regulation or demand
    for specific functionality. However, most of the products must be actively marketed
    to showcase their capability and to encourage adoption and usage. We discuss mechanisms
    to achieve this in the sections below.


    ### Marketplace APIs vs. Internal APIs


    The Delivery team should always keep in mind the `context` of the API Marketplace.
    From my experience as an integration developer, when exposing or consuming an
    interface for an internal project, we had the benefit of direct communication
    between consumer and provider teams through in-person meetings, phone calls, or
    email, to flesh out the detail beyond the interface specification document. This
    was possible as the nature of the integration was typically one consumer to one
    provider.


    A successful API Marketplace will have `many` consumers, and although it is possible,
    having a one-on-one session with each consumer to walk through integration queries
    is not tenable or scalable. This also differs from internal integration projects
    where delivery leads do not hesitate to set up as many sessions as needed to resolve
    interface challenges. Third parties could have several API providers to choose
    from, and if the Marketplace is not appealing or easy to consume, they will typically
    move on. A good Marketplace is one which abstracts and simplifies the complexity
    of backend platforms and packages it for easy consumption.


    An API Marketplace is not your typical, run of the mill, integration “plumbing”
    exercise, connecting one system to another. The API exposed to consumers must
    be thoughtfully and carefully constructed. As mentioned in the Amazon “API Manifesto”:


    All service interfaces, without exception, must be designed from the ground up
    to be externalize-able. That is to say, the team must plan and design to be able
    to expose the interface to developers in the outside world. No exceptions.'
  raw: '## Summary


    In this chapter, we reviewed how Open Banking and Open Finance has come to the
    fore in the Financial Services industry. It has essentially been driven by having
    the best interest of the customer in mind. Practices such as screen scraping jeopardize
    the security of the customer through sharing of credentials – APIs are a mechanism
    to remedy this. New payment methods and account aggregation will allow more convenience
    for customers and personalized service – specifications, such as PSD2, have enabled
    third parties to achieve this. More competition in the market could allow more
    customer choice, drive down costs, and improve service levels – Open Banking standards
    were introduced to do exactly this.


    We extolled the benefits to all participants – from the promise of financial inclusion
    to billions of unbanked across the globe to levelling the playing field for third-party
    providers. This movement is not without risk – and we have highlighted some and
    provided potential mitigation. What is extremely exciting at this time is that
    the wave of Open Banking is spreading globally. Although different territories
    have adopted different approaches across various product sets, the primary objective
    across all is the democratization of customer-owned data.


    We have also highlighted that this is just the beginning. Open Banking is the
    herald of a greater Open Finance initiative which will have an impact on more
    sectors within the Financial Services industry. This allows an unprecedented opportunity
    to re-design financial services for maximum scalability and efficiency. The golden
    thread tying everything together is regulation. A key objective regarding regulation
    is that data sharing and Open Banking should strike a balance between risk management
    and incentives for promoting innovation. Regulatory frameworks should set clear
    roles and responsibilities in line with market changes.


    Although some organizations have been pro-active in building the capability to
    enable Open Banking, many were not prepared. A well-planned and executed API platform
    strategy can provide an organization with the pre-requisite knowledge and experience
    to participate in and guide the regulatory consultative process.


    It is indeed interesting to note the ripple effect from a single requirement,
    specifically payment initiation, trigger the next change, which is access to customer
    account information. This brought about regulatory changes which essentially forced
    organizations to change their policies and allow access to third parties, with
    customer consent. The fracture has not stopped there – this has spurred change
    in other areas of financial services, such as insurance and lending.


    If we apply the same set of principles to other industries, such as Telecommunications
    and Healthcare, it stands to reason that a user’s mobile transaction history or
    health information belongs to the user and should be accessible to third parties,
    with the user’s consent. Providers such as Google and Facebook have baked this
    capability into their product offerings. In much the same way that regulation
    was passed that allowed users to retain their mobile numbers when moving to a
    new network, I think it is simply a matter of time before mobile transaction data,
    possibly even call history, is democratized. The sector just needs a compelling
    requirement that will trigger change. There are plans in many countries to provide
    a national healthcare service. Access to existing patient records and data from
    the private sector may just be a tipping point for change in this industry.


    Some organizations have adopted a wait-and-see approach and will react to regulatory
    changes. Many have spotted the potential of establishing a platform business and
    are pre-empting regulation or taking a strategic position by getting an early
    start to their API Marketplace implementations.


    # 3. Consumption


    One of the key areas which requires a significant amount of attention is the *interface*
    to the API Marketplace. Although the star of the show is the actual API which
    provides the functionality, the star needs a stage and theatre to perform. If
    the stage is too small or the theatre too difficult to access, then the brilliance
    of the API will be lost. It is important to always keep this in mind throughout
    the journey. Without third-party consumption, there would be no traffic. No traffic
    results in no revenue. Revenue sustains the Marketplace which exists to achieve
    the Vision.


    The Marketplace provides *Products* which can be consumed by multiple third parties.
    Some products or APIs essentially sell themselves due to regulation or demand
    for specific functionality. However, most of the products must be actively marketed
    to showcase their capability and to encourage adoption and usage. We discuss mechanisms
    to achieve this in the sections below.


    ## Marketplace APIs vs. Internal APIs


    The Delivery team should always keep in mind the *context* of the API Marketplace.
    From my experience as an integration developer, when exposing or consuming an
    interface for an internal project, we had the benefit of direct communication
    between consumer and provider teams through in-person meetings, phone calls, or
    email, to flesh out the detail beyond the interface specification document. This
    was possible as the nature of the integration was typically one consumer to one
    provider.


    A successful API Marketplace will have *many* consumers, and although it is possible,
    having a one-on-one session with each consumer to walk through integration queries
    is not tenable or scalable. This also differs from internal integration projects
    where delivery leads do not hesitate to set up as many sessions as needed to resolve
    interface challenges. Third parties could have several API providers to choose
    from, and if the Marketplace is not appealing or easy to consume, they will typically
    move on. A good Marketplace is one which abstracts and simplifies the complexity
    of backend platforms and packages it for easy consumption.


    An API Marketplace is not your typical, run of the mill, integration “plumbing”
    exercise, connecting one system to another. The API exposed to consumers must
    be thoughtfully and carefully constructed. As mentioned in the Amazon “API Manifesto”:


    *All service interfaces, without exception, must be designed from the ground up
    to be externalize-able. That is to say, the team must plan and design to be able
    to expose the interface to developers in the outside world. No exceptions.*'
