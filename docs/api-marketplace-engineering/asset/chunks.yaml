  trans: '

    ## 集成策略


    如下图所示，我们的微服务集成策略随着时间不断演进。我觉得很有意思：在某个阶段刚开始时，一种想法或方法看起来总是好得不可思议，以至于你迫不及待想把它推广到整个技术栈的每个组件。可当这种方法走向尾声时，反向思维又会占上风，团队开始堆积技术债务事项，准备迁移到下一种方法。回顾这些年来我们的集成方法时，我会把它看作是从猿到人的进化。平心而论，这种“高屋建瓴”的视角来自事后复盘的优势。这也多少给人一些安慰：我们当前的集成策略很可能也会在我们发现更优解后继续演化。


    图 5-3 展示了我们第一代微服务所采用的集成方式，这套方式支撑了我们的 MVP。团队当时对微服务采取了“纯粹主义”视角，将封装与隔离原则奉为圭臬，以至于每个组件都分配给不同的开发者。结果就是，每位开发者都在自己负责的微服务中构建并嵌入了各自的集成逻辑。从事后复盘的角度看，这绝对是一个“扶额”时刻。在紧张推进
    MVP 的过程中，面对地理上分散的开发团队，以及每位开发者为了达成冲刺目标而努力避免垫底的现实，这种情况非常容易发生。直到很久以后我们才发现：某位开发者为获取账户列表而集成的平台，其实和另一位开发者为获取映射参考数据而调用的是同一个平台。


    ![../images/509947_1_En_5_Chapter/509947_1_En_5_Fig3_HTML.jpg](img/509947_1_En_5_Fig3_HTML.jpg)


    图 5-3


    嵌入式集成逻辑


    唯一的好处是团队达成了 MVP 目标。遗憾的是，优势也仅止于此。代码重复、集成方式不统一、部署体积更大更重——这些问题足以让任何优秀的集成团队羞愧低头。


    图 5-4 展示了我们进化旅程的下一站。那时我们的代码库还没有今天这么庞大，一次灵感迸发中，我把所有集成逻辑整合进了一个共享库。我当时对自己的成果相当满意，因为这个共享库可以让微服务与后端集成逻辑进行进程内通信。这个方案不仅性能会非常高，还能消除可怕的代码重复。我对共享库这个概念如此着迷，甚至把它称作一个“框架”。这个珍贵资产托管在一个
    git 子模块中，每个微服务都会引用它。


    ![../images/509947_1_En_5_Chapter/509947_1_En_5_Fig4_HTML.jpg](img/509947_1_En_5_Fig4_HTML.jpg)


    图 5-4


    共享集成库


    然而，随着团队中微服务开发者数量增长，这个框架变得越来越碎片化。子模块机制也导致每个微服务都在引用框架的某个特定变体。如果开发者需要新的集成功能或操作，他们只需拉取子模块、加入新逻辑，再把这个版本嵌入微服务。读到这里的
    git 管理员和资深爱好者可能已经在翻白眼，疑惑这种事怎么会发生。还是那句话：在地理分散、技能水平不一、又有敏捷交付目标的团队里，即便是优秀开发者，为了交付也可能做出不理想的技术决策。


    直到今天，当我打开这个时代尚未迁移的代码时，仍会不寒而栗。我们后来已经制定了修复方案：切断了 git 子模块这根“脐带”，每个微服务都保留共享库的本地副本。你可能会因此发笑：我们原本想把王国从代码重复的邪恶中解放出来，结果并不成功，而且由于每个微服务都内置了一份“框架”本地副本，这种失败被进一步放大。一些开发团队可能会认为，重复但彼此隔离的集成代码组件并非坏事，尤其在敏捷环境中——因为它支持模块隔离，并允许组件独立部署，而不必承担“更新共享元素可能必然破坏其依赖组件”的负担。这也可能减少回归测试需求，因为只需测试宿主微服务即可，其他微服务不会受到这次变更影响，能够继续运行。


    作为开发者，我始终坚信（也许这种观念有些过时）：如果某个代码元素被写了不止一次，那它就应该被重构成一个可服务多个消费者的单一元素，即便接口可以不同。按我的标准，把一个框架复制并嵌入到每个微服务中，简直等同于灾难级、世界末日式事件。就像一个资源即将枯竭、难以维持居民生存的星球上的外星种族会发射探测器寻找新家园一样，当框架碎片化开始威胁我们的交付速度，并可能让平台倒退回“每个微服务各写一套定制集成逻辑”的黑暗时代时，我们的研发团队也开始探索新的集成方式。


    图 5-5 说明了目前支撑我们平台集成策略、并确保我们“进化生存”的解决方案。其核心前提是：将集成组件抽取出来并外部化，只能通过定义良好的接口访问。


    ![../images/509947_1_En_5_Chapter/509947_1_En_5_Fig5_HTML.jpg](img/509947_1_En_5_Fig5_HTML.jpg)


    图 5-5


    专用集成适配器


    这促成了我们平台中新一类微服务的诞生，我们将其标记为“中间件组件”。本平台中微服务的不同分类体系将在本章后续部分讨论。


    其固有优势在于可减少代码重复，并使微服务部署更轻量、更精简。也就是说，不再把某个版本的框架打包进微服务内部，而是将框架能力外部化，并通过接口访问。遗憾的是，这也打开了进程外执行可能带来的性能劣势之门。为尽量降低这一影响，我们采用了
    Google RPC（gRPC），下一节会更详细介绍。

    '
- fmt: '## Google Remote Procedure Call (`gRPC`)


    In all honesty, when the suggestion to use `gRPC` was raised, my knee-jerk reaction
    was to shut it down as quickly as possible. I equated `RPC` with the dark days
    of Microsoft Component Object Model (`COM`)/Distributed `COM`(`DCOM`) and complex
    Common Object Request Broker Architecture (`CORBA`) configurations. Although I
    adore the concept of distributed components, my experience with getting it to
    work was painful. I did not want to subject our platform to that complexity as
    it would increase operational overhead exponentially. So, I chose to stick with
    the safe path, which was most travelled. Essentially microservice communication
    would be achieved using good old `HTTP`. After all, we had our hands full with
    variable elements like an on-premises Kubernetes cluster and I shuddered at the
    thought of adding in a new, and at the time, relatively unproven technology element
    into the stack.


    It was only 6 months later when I ran through a basic tutorial that the penny
    dropped that `gRPC` had the potential to revolutionize our platform architecture.
    A few minutes after starting the tutorial, I stared at the screen in disbelief
    as a client request from one terminal window magically and, most importantly,
    easily appeared in another. The technology has many virtues which I shall extol
    shortly. The one which I appreciate the most is its simplicity. At the heart of
    `gRPC` is a simple service definition which uses protocol buffers to define the
    request and response objects. `gRPC` takes care of the complexity of communicating
    between components, different languages, and environments. The `*.proto*` definition
    is the only shared component between client and server. This also presented us
    with the opportunity, which we have not used to date, of using different languages
    in our stack. This is made even easier through the availability of client libraries
    for most languages. `gRPC` is the key technology which allowed us to transition
    from a Shared Integration library (Figure [5-4](#509947_1_En_5_Chapter.xhtml#Fig4))
    to the use of Dedicated Integration Adapters (Figure [5-5](#509947_1_En_5_Chapter.xhtml#Fig5)).
    Due to its use of a later `HTTP` standard and its transfer protocol, `gRPC` is
    far more performant than `REST`.


    There are four types of Remote Procedure Calls (`RPC`):


    1. `Unary RPC`: A client sends a single request and gets a single response. For
    example, the client requests the current time from the server. Most of our platform
    components use this style of communication. My suggestion is to start here first
    and, if the need arises, explore the other mechanisms on demand.

    2. `Server streaming RPC`: It is similar to unary `RPC`, except that the server
    returns a stream of messages in response to a client’s request. For example, to
    download a binary document from a server, the client initiates a request for the
    file, which is split into chunks on the server and then streamed to the client
    which is reassembled for processing. We use this mechanism to retrieve documents
    from an Enterprise Content Management system.

    3. `Client streaming RPC`: It is also similar to unary `RPC`, except that the
    client sends a stream of messages to the server instead of a single message. For
    example, to upload an image to a server, the file is split into chunks which are
    then sent in a stream to the server which reassembles the image for processing.
    We use this approach to upload images for Optical Character Recognition (`OCR`)
    processing.

    4. `Bidirectional streaming RPC`: The client and server can read and write messages
    in any order. For example, the image could be processed by different Optical Character
    Recognition (`OCR`) engines, and responses from each engine are returned in separate
    streams.


    `gRPC` is a prime example of how technology can be simplified to encourage mass
    adoption. I also consider this specific journey as a stark reminder to have an
    open mind to new concepts and approaches and to fight pre-conceived notions to
    evolve our platform architecture. I have since apologized to the annoyed engineers
    who initially suggested the use of `gRPC` and have rightfully attributed its discovery
    and introduction to them. With that being said, I retain the claim for “weaponizing”
    the technology and taking it from a `R&D` construct to an operational environment.


    ## The Power of `Port-Forward`


    As our Business Logic components could leverage several integration microservices
    to fulfill a specific function, it became increasingly more challenging to assemble
    the solution. DevOps Continuous Integration (`CI`) pipelines can be leveraged
    for code deployments to the server. `CI` processes are great for transitioning
    between environments, but for initial development tasks, I consider using a `CI`
    pipeline like having a conversation with someone on a remote planet. You say something,
    wait some time until the message is received and has been replied to before you
    continue. As an impatient developer, I demand the ability to make and observe
    changes immediately. This can only be achieved using a local development environment.


    My first pass at establishing this was to start up each microservice locally,
    in a separate terminal, each on a different port. It took a fair amount of time
    per development session to set this up, but the upfront time investment saved
    hours as I would not have to wait for the `CI` pipeline. I was fairly proud of
    this setup and patted myself on the back with each terminal tab opened and microservice
    started.


    A pro tip from a fellow developer jolted me to the harsh reality that I was working
    harder, not smarter. The solution was to use the `port-forward` capability of
    the Kubernetes command-line tool, `kubectl`, to start a local listener which would
    route the request to a `gRPC` pod running in a Kubernetes cluster. This concept
    is illustrated in Figure [5-6](#509947_1_En_5_Chapter.xhtml#Fig6).


    ![../images/509947_1_En_5_Chapter/509947_1_En_5_Fig6_HTML.jpg](images/509947_1_En_5_Chapter/509947_1_En_5_Fig6_HTML.jpg)


    Figure 5-6


    Port-forward connectivity


    This allows the developer to build a solution using a blend of local and remote
    components based on the following strategy:


    - Remote `gRPC` microservice pods (`A`, `B`) are listening on port `50051`. This
    is possible as each execute in separate container instances.

    - Local `gRPC` microservice (`X`) listens on port `50051`. As this is running
    on my local machine, no other local process can use this port.

    - Local `port-forward` processes listen on port `50052` and `50053`, which routes
    the traffic to `gRPC A` and `B`, respectively.

    - Application is configured to use service `A` on port `50052`, service `B` on
    port `50053`, and service `X` on `50051`.'
