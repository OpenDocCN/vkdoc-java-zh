  trans: '

    *   **文档**：为安抚交付之神而做出的另一项牺牲，是将规范文档编写延后。坦率地说，即便时间充裕，也未必能让开发人员产出高质量文档。在传统的瀑布式项目中，技术设计稿完成之前，连一行代码都不会编写。而在敏捷的数字化交付环境中，原型往往在需求尚未被完整梳理前就已上线运行，并且解决方案与实现方式始终可能变化，直到并包括生产部署阶段。因此，开发人员有时不愿记录开发过程，因为它是流动变化的，并且在其生命周期中可能不断调整。一种做法是接受这种现状，并采用“文档即代码”的策略。另一种做法是在团队协作
    Wiki 上创建一个简单模板，只要求最少但关键的信息，例如源系统与目标系统之间的映射规则。关键在于，开发方法论必须相应调整，以支撑所选策略。由团队负责人（Team
    Lead）对文档进行评审与批准，应成为进入下一交付阶段关卡的关键要求。若缺乏必要的制衡与校验机制，就会导致文档质量低下甚至没有文档的可能性。


    每个团队都会根据所在组织形成自身版本的开发实践。至关重要的是，所有内部和外部干系人都要达成一致，并且开发人员要在规划会议中管理好各方对解决方案交付水平与质量的预期。如果时间线被压缩，团队所有成员都应知晓并接受：测试、文档等环节需要后续再补充完善。与其忽视这些问题，不如在一开始就提出并以团队方式进行规划。我们实施成功的关键之一，是把开发视为一项团队协作工作。


    ### 质量保证


    这是我们交付流程中最关键的支撑支柱之一。为体现其重要性，QA 或测试工程师可以行使否决权来阻止发布。由于交付目标激进，开发人员往往在“真空”环境中测试，且主要覆盖理想路径（happy-path）场景。集成测试可能是该方案第一次在不同系统与多种上下文中被验证。


    作为测试工作的一部分，方案必须接受多层次审查，涵盖标准场景、错误场景和异常场景。标准、功能与错误条件可通过提供一系列有效与无效输入来模拟。异常场景的模拟可能需要中断到后端的连接组件，以观察应用行为。可测试场景与条件的一个关键输入来源，是运维团队基于常规生产发布经验提供的建议。


    随着我们在一段时间内显著提升测试能力，我们现在还会考虑以下子领域：


    *   **安全**：在信息安全团队近期进行的一次应用扫描中，我们收到了一份近 100 页、措辞严厉的报告。复盘后我们发现，只需改进一个输入字段的校验，就能解决其中
    70 页的问题。其余问题此前已在其他 API 上识别并讨论过。基于这一经验，我们团队决定将安全扫描纳入内部测试评审与批准流程的一部分执行，以便团队能够提前处理问题。需要强调的是，这并不意味着安全评审到此结束。在新的
    API 产品获准发布前，企业信息安全团队会委托外部服务提供商开展详细的安全评估，以确认是否存在漏洞。


    *   **性能**：半开玩笑半认真地说——在集成语境下做压力测试可能会变成一项“很有压力”的活动，因为这需要下游服务提供商共同参与。API Marketplace
    组件的性能测试应定期在回环（loopback）环境或带模拟后端的环境中进行。与真实后端联调的测试也应排期执行，至少每季度一次。这将确保端到端价值链上的所有环节都能承受“黑色星期五”等峰值事件带来的负载。


    *   **自动化测试**：遗憾的是，这对测试团队构成了一个典型的两难困境（catch-22）。自动化测试无疑能节省大量时间，尤其是在回归测试活动中。但在节奏狂热、多个测试任务并行推进的环境里，自动化测试工作通常会被延后。自动化测试必须成为团队文化的一部分，因为其执行是持续集成（CI）/持续交付（CD）流程的核心要素。这也是为什么
    Netflix 等组织能够频繁向生产环境发布的主要原因。


    ## 交付方法


    我们的 Marketplace 诞生于组织有意识转向更敏捷交付模式的时期。新的工作方式（Way of Work）很快建立起来，早晨站会时，过去沿用更传统方式运作的业务单元围在看板（Kanban）前协作，已不再罕见。我们的交付理念始终基于敏捷原则，并且随着时间推移不断调整和定制方法，以满足独特需求。


    Marketplace 最初的策略更偏战术层面。团队的首要目标只是先把 API Marketplace 上线，并期待第三方提供商会随之而来。因此，交付目标和冲刺目标在技术上高度聚焦，这让团队始终忙碌，但对平台建立迫切需要的“根基”帮助有限。


    项目曾配备一名专职产品负责人（Product Owner）试图转移重心，但常常被一个固执的技术团队所压制。幸运的是，该平台后来被认定为更大组织目标的赋能器，这一定位在运营上要求更完善的流程与结构，在商业上要求更明确的方向与聚焦。这也促使我们必须更好地进行规划，并更高效地使用时间、开发产能和预算，以实现
    Marketplace 的战略目标。


    以下章节将详细说明我们目前仍在持续演进的流程：当需求进入其生命周期中的交付阶段后，我们如何进行处理。

    '
- fmt: '## Defining the Strategy


    At the start of each new quarter, the project executive meets with the senior
    members of the team to:


    1. Provide a view of organization-wide initiatives and objectives. As there are
    many ongoing enterprise and divisional projects, this provides insight into how
    the Marketplace fits into the bigger picture.

    2. Review progress over the last quarter and gauge the position of the platform
    on the planned roadmap for the financial year.

    3. Identify potential risks and areas of improvement to streamline solution delivery
    and operational capability.

    4. Define goals for future quarters and to prioritize objectives with inputs from
    all domains of the team.


    The aim of these sessions is to define, at a high level, strategic objectives
    for the coming quarter in alignment with other external initiatives. It is also
    highly collaborative and seeks to find the middle ground to allow planned initiatives
    to continue without interruption but to also steer the Marketplace to be in a
    good position for future opportunities.


    In subsequent planning sessions, which are scheduled more frequently and described
    in the next section, these outlined objectives are used as a compass to ensure
    our bearing is correct and the platform is headed in the right direction. The
    team ethos also allows for an update of the objectives if required. That is, if
    the organization requires a shift in focus to deliver a requirement of more business
    or customer value, the leadership of the team will reconvene to determine how
    it can be achieved.


    ## Planning


    During early phases of the implementation, planning was an all-day affair, with
    the full team in attendance. The aim was to provide visibility to all members
    of the team regarding upcoming requirements, and to solicit feedback and sizing
    of tasks. The intention was noble, but the result was that the team generally
    lost a full day from a sprint and often still had to investigate tasks outside
    the session to provide estimates. As part of our current process, a high-level
    Impact Assessment (IA) is compiled by the Engineering Lead at Design time with
    ad hoc assistance from the team to resolve any technical queries. The IA provides
    an indication of time and resourcing required, from which a cost estimate can
    be determined.


    As actual development time is precious, we try to use as little as possible by
    requiring the technical team to join sessions only if necessary. To achieve this,
    the Planning effort is split into two rounds.


    In the first round, the Platform Executive, Product Owner, Delivery, and Engineering
    Leads meet to discuss the delivery objectives for upcoming sprints. This must
    align with the quarterly strategic targets. Requirements are also prioritized,
    and there is an initial indication of which developer will be assigned to which
    task.


    With this view in hand, a second session is scheduled with the team to provide
    the goals of the next sprint. In most cases, this is not the first time the team
    has been exposed to the requirement as their input was considered as part of the
    Impact Assessment activity. The sessions are focused as the objectives are clearly
    defined and developers do not have to endure prolonged prioritization and strategy
    debates. During this session, the Engineering Lead also provides a detailed breakdown
    of the solution and a clear definition of done. It may be very possible that a
    requirement is split into phases and the team has insight into this decision.
    Members of the team can voice concerns regarding the objective and to highlight
    risks and possible issues with the upcoming work. This allows the Delivery Lead
    greater visibility into the upcoming deliverable and to initiate steps to mitigate
    potential risks and delays.


    As detailed in Table [8-1](#509947_1_En_8_Chapter.xhtml#Tab1), there may be several
    initiatives active, in various states, at any given time.


    ### Table 8-1


    Ongoing delivery in an API Marketplace


    | Stream | A | B | .. | `N` |

    | --- | --- | --- | --- | --- |

    | Design | Done | Done | Blocked | In progress |

    | Architecture | Done | Done | Blocked | In progress |

    | API gateway | Done | Done |  |  |

    | Microservice | In progress | In progress |  |  |

    | Quality assurance | On hold | On hold |  |  |

    | DevOps |  |

    | Change management |  |

    | Post rollout support |  |


    The concurrency of tasks is carefully managed by the Delivery Leads and although
    it may add administrative complexity, affords the team flexibility to pivot to
    a new stream if one lane becomes blocked due to delays from design approval or
    backend readiness. This is a bane for Release Management as the Marketplace cannot
    forecast months in advance what will be deployed to Production but is one of the
    greatest capabilities of our team.


    ## Squads


    Over the lifetime of our Marketplace, there have been larger initiatives which
    did not fit into this rapid delivery mold. Initial attempts to bundle these initiatives
    resulted in a team size of close to `30`. As a result, sprint ceremonies such
    as planning, standup, and retrospectives took a significant amount of time and
    were an inefficient use of the team’s valuable time. Taking inspiration from Amazon’s
    “two-pizza team” rule, which states that teams should be no larger than can be
    fed by two pizzas, we split the team into squads.


    The definition of a squad is a self-organized, cross-functional team that has
    skills to deliver a product end-to-end, with limited input from others. The squad
    should be composed of people that can design, develop, test, and deploy the product.


    We also consulted other teams which had experienced similar growth trajectories
    and leveraged their insight and experience. A key lesson learnt was the formation
    of a Platform squad which focused on advancing the capability and maturity of
    the base Marketplace and which would support ongoing Product development.


    As illustrated in Figure [8-2](#509947_1_En_8_Chapter.xhtml#Fig2), the Platform
    squad aims to evolve the Marketplace by focusing on initiatives such as the migration
    to Cloud, building Billing and Analytics capabilities which are leveraged by Products
    deployed to the Marketplace. The Platform squad is also long running but leaner,
    whereas the Product squads are spun up and down as required, with larger team
    sizes. This also allows more efficient scheduling of resources as teams are assembled
    on demand. Furthermore, the Platform squad is funded by an operational expenditure
    (OPEX) budget, and Products squads are funded by capital expenditure (CAPEX).


    ![../images/509947_1_En_8_Chapter/509947_1_En_8_Fig2_HTML.jpg](`images/509947_1_En_8_Chapter/509947_1_En_8_Fig2_HTML.jpg`)


    ### Figure 8-2


    API Marketplace squad'
