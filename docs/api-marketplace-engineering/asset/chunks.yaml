  raw: '### API Gateway


    I consider this element in much the same light as a passport control function
    at an international airport. Each API Gateway product implementation, from various
    software vendors, may have a unique set of features and capabilities. For our
    implementation, we have made a concerted decision to leverage the standard, vanilla
    capability to allow easy migration in the future. A large driver behind this decision
    is that the Gateway infrastructure is a shared, enterprise service and customization
    could impact future upgrades or other tenants. The key principles of our API Gateway
    development are as follows:


    1.  **No transformation or protocol translation**: The key objective of the Gateway
    is to proxy a REST API. The swagger definition published to third-party consumers
    matches that of the microservice – direct mapping.


    2.  **Well-defined requests** : From my experience with SOAP, I attempted to sneak
    in an *<any>* type of request to speed up development. It turned out that generic
    payloads are viewed in very much the same negative light as *<any>* XML requests
    and my suggestion raised alert levels with the technical owner of the API Gateway
    and resulted in increased scrutiny for future requests.


    3.  **Lightweight** : API Gateways are not ESBs or Process Engines and do not
    have the same time tolerances. There are no long-running processes. Requests should
    be processed as quickly as possible. The enterprise timeout standard is 60 seconds,
    which is quite lenient considering that a popular Cloud provider API Gateway PaaS
    offering is a non-negotiable 30 seconds. Be sure to remember that the API is most
    likely supporting a customer’s digital experience and millisecond response times
    are required to retain the audience.


    4.  **Security** : Specific third parties can be granted access to certain APIs
    by controlling subscription. Access to “Live” APIs can only be provided once the
    third party has been approved. There are several access mechanisms ranging from
    a client identifier and secret to token based access. Additional controls such
    as client certificates and jws-signatures can also be applied for more sensitive
    APIs. The biggest benefit to the development process is that this complexity can
    be handled by the gateway product and the downstream components are shielded.


    5.  **Rate limiting** : A great feature, which is key for an environment with
    many new third-party developers, is the ability to throttle requests. A third
    party could accidentally or intentionally trigger a large number of requests –
    which could result in a denial of service, impact other API consumers, or flood
    downstream systems. This can be prevented by specifying the number of concurrent
    requests and number of requests in a set timeframe. This is out of the box functionality
    which can be achieved with a configuration update rather than custom development.


    ### Microservices


    Figure [8-5](#509947_1_En_8_Chapter.xhtml#Fig5) shows the key types of microservices
    in our platform, their interaction pattern, and the use of platform services.
    To provide greater insight into the internal microservice operation, I discuss
    the components in greater detail.


    ![../images/509947_1_En_8_Chapter/509947_1_En_8_Fig5_HTML.jpg](images/509947_1_En_8_Chapter/509947_1_En_8_Fig5_HTML.jpg)


    Figure 8-5


    Microservice architecture


    **Middleware components** are used to integrate to backend systems. These are
    dedicated components which are used as gateways to southbound platforms. The component
    encapsulates the integration logic and complexity and exposes a simple business
    interface for consumption. A middleware component can only connect to a single
    backend. A key principle is that cross-communication between components is not
    allowed. That is, one middleware component cannot call another. Figure [8-6](#509947_1_En_8_Chapter.xhtml#Fig6)
    details the internal architecture of a middleware component.


    ![../images/509947_1_En_8_Chapter/509947_1_En_8_Fig6_HTML.jpg](images/509947_1_En_8_Chapter/509947_1_En_8_Fig6_HTML.jpg)


    Figure 8-6


    Anatomy of a middleware component


    Working from left to right, the function of these elements is


    *   **Client**: This is used to initiate the gRPC call to the component. It is
    used during development and for unit testing. Using a *port-forward*, the client
    can be used to initiate calls directly to components deployed in other environments.
    For example, the client can be used to initiate a request to verify connectivity
    to a downstream system in the testing environment.


    *   **Server**: This element contains the “plumbing” to service the gRPC request.
    Responsible for unmarshalling, transforming the request, invoking the integration
    component, transforming and marshalling the response. During development, the
    response from this component can be mocked in the event of a backend not being
    available. The server component can also be used to route requests to different
    integration components. We have successfully used this approach to effect a migration
    strategy between different provider interfaces. The simple approach was to use
    an environment variable to reconfigure the route at runtime.


    *   **Integration** : The objective of this element is simply to interface with
    a backend system. For reasons of abstraction, there are no gRPC references in
    this development, and it can be tested directly from the command-line without
    any upstream dependencies. The component is responsible for handling various types
    of responses and error conditions which may arise during the request. Application-specific
    rules such as mapping of error codes or setting default values are also made within
    this component as a means of consolidation and isolation. It is generally advisable
    to have a dedicated integration component for a specific interface. This keeps
    code elements clean and allows easy maintenance.


    **Logic components** orchestrate the process flow to achieve an API product implementation
    as illustrated in Figure [8-7](#509947_1_En_8_Chapter.xhtml#Fig7). For example,
    an API product to retrieve a Customer profile could leverage a number of middleware
    components to assemble the response. The response from one system could be interrogated
    and transformed to construct the request for another. It is extremely important
    to differentiate between application and business logic. Routing a request to
    a middleware service to create a customer is an example of application logic.
    The process to create the customer record is an example of business logic. As
    the Marketplace is a new channel to the enterprise, it should leverage centrally
    owned and controlled business processes.


    ![../images/509947_1_En_8_Chapter/509947_1_En_8_Fig7_HTML.jpg](images/509947_1_En_8_Chapter/509947_1_En_8_Fig7_HTML.jpg)


    Figure 8-7


    Logic microservice orchestration


    The northbound interface of this component is typically the swagger definition
    which is published on the API Gateway. This simplifies the integration between
    API Gateway and microservice. Another key function of this component is policy
    enforcement. Depending on the nature of the API product, the microservice may
    perform validation and verification such as confirming end user consent before
    fulfilling the request. To streamline process execution, requests to middleware
    components can be initiated concurrently. A gRPC stream can also be used to optimize
    processing of requests. As an example, for Optical Character Recognition (OCR)
    of a document, we initiate the call to a middleware component which then initiates
    a request to a local enterprise service and to a Cloud vision service. Once the
    request is processed, a response is returned in the stream. If the first response
    received was not successful, the component waits for a second response in a best-effort
    approach to process the request. If the first response indicates successful processing,
    there is no need to wait, and execution continues.'
  trans: '

    ### API 网关


    我认为这个要素与国际机场的护照查验功能非常相似。来自不同软件供应商的每一种 API 网关产品实现，都可能具有其独特的一组特性与能力。对于我们的实现，我们经过慎重决定，采用标准的、原生能力，以便未来能够轻松迁移。促成这一决策的一个重要驱动因素是：网关基础设施是企业级共享服务，定制化可能会影响未来升级或其他租户。我们在
    API 网关开发中的关键原则如下：


    1.  **不进行转换或协议翻译**：网关的核心目标是代理 REST API。发布给第三方消费者的 swagger 定义与微服务保持一致——直接映射。


    2.  **定义良好的请求**：根据我在 SOAP 方面的经验，我曾尝试混入 *<any>* 类型的请求以加快开发。结果发现，通用负载几乎与 *<any>*
    XML 请求一样被负面看待，而且我的建议引起了 API 网关技术负责人的警觉，并导致其对后续请求增加了审查力度。


    3.  **轻量化**：API 网关不是 ESB 或流程引擎，也不具备相同的时间容忍度。不存在长时间运行的流程。请求应尽可能快地处理。企业超时标准是 60
    秒，这已经相当宽松了，尤其考虑到某主流云提供商 API 网关 PaaS 产品是不可协商的 30 秒。务必记住，API 很可能支撑的是客户的数字化体验，而要留住受众，需要毫秒级响应时间。


    4.  **安全性**：可以通过控制订阅，为特定第三方授予某些 API 的访问权限。只有在第三方获得批准后，才能提供对“Live”API 的访问。有多种访问机制，从客户端标识符与密钥到基于令牌的访问。对于更敏感的
    API，还可以应用客户端证书和 jws-signatures 等额外控制。对开发流程最大的好处是，这些复杂性可以由网关产品处理，下游组件因此得到屏蔽保护。


    5.  **速率限制**：在拥有大量新第三方开发者的环境中，一个非常关键的优秀特性是对请求进行限流的能力。第三方可能会无意或有意触发大量请求——这可能导致拒绝服务、影响其他
    API 消费者，或淹没下游系统。通过指定并发请求数和设定时间窗口内的请求数，可以防止这种情况。这是开箱即用的功能，可通过配置更新实现，而非定制开发。


    ### 微服务


    图 8-5 展示了我们平台中的关键微服务类型、它们的交互模式以及平台服务的使用方式。为了更深入了解微服务内部运作，我将更详细地讨论这些组件。


    ![../images/509947_1_En_8_Chapter/509947_1_En_8_Fig5_HTML.jpg](img/509947_1_En_8_Fig5_HTML.jpg)


    图 8-5


    微服务架构


    **中间件组件**用于与后端系统集成。这些是专用组件，作为连接南向平台的网关。该组件封装了集成逻辑与复杂性，并暴露一个简单的业务接口供消费。一个中间件组件只能连接一个后端。一个关键原则是，不允许组件之间交叉通信。也就是说，一个中间件组件不能调用另一个。图
    8-6 详细说明了中间件组件的内部架构。


    ![../images/509947_1_En_8_Chapter/509947_1_En_8_Fig6_HTML.jpg](img/509947_1_En_8_Fig6_HTML.jpg)


    图 8-6


    中间件组件剖析


    从左到右，这些元素的功能如下：


    *   **客户端**：用于发起到该组件的 gRPC 调用。它在开发阶段和单元测试中使用。通过 *port-forward*，客户端可用于直接发起对部署在其他环境中的组件调用。例如，在测试环境中，客户端可用于发起请求以验证到下游系统的连通性。


    *   **服务端**：该元素包含用于服务 gRPC 请求的“管道机制”。负责反序列化、转换请求、调用集成组件、转换并序列化响应。在开发过程中，如果后端不可用，可以模拟该组件的响应。服务端组件还可用于将请求路由到不同的集成组件。我们已成功使用该方法来实施不同提供方接口之间的迁移策略。一个简单方法是使用环境变量在运行时重新配置路由。


    *   **集成**：该元素的目标就是与后端系统对接。出于抽象原因，这部分开发中不包含任何 gRPC 引用，并且可在无任何上游依赖的情况下直接通过命令行测试。该组件负责处理请求过程中可能出现的各种响应类型和错误条件。特定于应用的规则（如错误码映射或默认值设置）也在该组件中完成，以实现整合与隔离。通常建议为特定接口设置专用的集成组件。这能保持代码元素整洁并便于维护。


    **逻辑组件**编排流程以实现 API 产品，如图 8-7 所示。例如，用于获取客户档案的 API 产品可以利用多个中间件组件来组装响应。可以对来自一个系统的响应进行解析和转换，以构造对另一个系统的请求。区分应用逻辑与业务逻辑极其重要。将请求路由到中间件服务以创建客户是应用逻辑的示例；创建客户记录的过程则是业务逻辑示例。由于
    Marketplace 是企业的新渠道，它应当利用由中心统一拥有和管控的业务流程。


    ![../images/509947_1_En_8_Chapter/509947_1_En_8_Fig7_HTML.jpg](img/509947_1_En_8_Fig7_HTML.jpg)


    图 8-7


    逻辑微服务编排


    该组件的北向接口通常是发布在 API 网关上的 swagger 定义。这简化了 API 网关与微服务之间的集成。该组件的另一个关键功能是策略执行。根据 API
    产品的性质，微服务可能会执行校验与核验，例如在满足请求之前确认终端用户同意。为简化流程执行，可以并发发起对中间件组件的请求。还可以使用 gRPC 流来优化请求处理。举例来说，在对文档进行光学字符识别（OCR）时，我们会先调用某个中间件组件，该组件随后向本地企业服务和云视觉服务同时发起请求。请求处理完成后，会在流中返回响应。如果接收到的第一个响应不成功，组件会以尽力而为的方式等待第二个响应来处理请求。如果第一个响应表明处理成功，则无需等待，执行将继续。

    '
- fmt: '## Platform Services


    All microservices leverage platform services, which are packaged as an enterprise
    library and imported during the build. As discussed in Platform Architecture,
    this provides a uniform “utility service” layer which allows consistent support
    and management of the microservices.


    ## Portal Applications


    A User Interface in an API Marketplace context may seem oxymoronic. From implementation
    experience, web applications are one of the mainstays of the platform, and front-end
    developers are a mandatory staffing requirement. Our implementation has built
    custom applications for the following use-cases:


    - Authorization: The consent page, which is presented to the user, post successful
    authentication and as part of the `OAuth` flow is a custom portal application.
    This is used to retrieve user information, such as profile and account data, and
    present a richer consent screen. For example, instead of providing a simple permission
    screen to grant access to all account information, we present a detailed list
    of accounts and allow the user to select specific accounts which may be accessed
    by a third party.

    - Third-party onboarding: As a digital channel, an aspirational goal for our implementation
    is to ensure the full experience is as automated and streamlined as possible.
    As discussed in Chapter [3](#509947_1_En_3_Chapter.xhtml), the platform must scale
    to handle large numbers of external consumers. To achieve this, a custom portal
    was required to facilitate the onboarding process, from requesting company registration
    documentation, to the acceptance of terms and conditions to the supply of banking
    information – based on the API product. It is key to note that the web application
    is an access mechanism and key to this objective is a well-defined business process
    flow.

    - Administration: This allows an interface to the Support team to change runtime
    configuration data such as property values and endpoint configuration data. The
    benefit of providing a UI is that it ensures consistent, uniform access, which
    is secured, audited, and versioned – so changes can be tracked and rolled back
    if necessary. More importantly, it minimizes access requirements to supporting
    systems such as databases and configuration maps, in the case of a `Kubernetes`
    cluster.

    - Hosted applications: This is certainly a unique use-case but is also a significant
    revenue stream for the platform. It is also an example of a pivot by the team
    to maintain delivery momentum. The squad delivering a strategic set of API products
    learnt that the pilot consumer would not complete development in time for rollout
    by Black Friday. As a delay would essentially result in missing this key event,
    the squad made a tactical decision to build and host elements of the application,
    on behalf of the third party, which leveraged the new APIs. The development effort
    required from the third party was significantly reduced and with well-placed redirects,
    the User Experience also preserved. The approach was so successful that it gave
    rise to a new deployment pattern. The benefit is that the hosted application can
    be reused by several third parties, broadens the audience as integration is significantly
    simpler, can also leverage internal services which might not have been externally
    published, allows our enterprise to shape and tailor the user experience, and
    increases user confidence as the end user is interacting directly with the enterprise.


    ## Summary


    In this chapter, we discussed a key development philosophy that technology serves
    to support delivery of the API. We also identified roles that contribute to this
    activity, implicitly by clearing blockers on the delivery path and explicitly
    by writing the code and examined our approach to planning and managing concurrent
    activities. Establishing a `DevOps` practice and adopting `Continuous Integration/Continuous
    Deployment` principles helps streamline the development process, adds more stability
    and predictability, and supports existing and new development resources. Finally,
    we delved into Application Development, strongly motivated for more communication
    and guidance during this process and considered core elements of our platform,
    and finally reviewed types and objectives of portal applications.


    It is important to note that these approaches and processes took time to define
    and refine and are `still` evolving. It has been tailored to the requirements
    of our implementation such as a geographically distributed team and the use of
    shared enterprise capabilities. Personality traits of a customer obsessed, broad-shouldered
    Project Sponsor who constantly backs the team, Delivery Leads who set a high bar
    and hate missing deadlines, stubborn Product Owners who will not compromise, and
    Engineering Leads pedantic about leaving a legacy in code have also been instrumental
    in forging a formidable delivery capability. In the next chapter, we discuss the
    Sandbox environment, the role it plays in the API Marketplace ecosystem, and strategies
    regarding how it can be implemented.


    # 9. Sandbox


    The Sandbox is a demarcated, carefully cordoned off space which allows consumers
    to test and use your APIs to get a feel for how they function. Of all the technical
    challenges, achievements, and breakthroughs over the lifespan of our API Marketplace,
    it was a revamp of the humble Sandbox which proved to be the tipping point for
    me to write this book. Our initial Sandbox strategy was relatively simple and
    catered for a specific spectrum of API products. As the platform grew, matured,
    and evolved, this construct and approach remained unchanged. In much the same
    way that a Jitterbug or Charleston step may function in today’s dance era, it
    just seemed out of place. The team had recognized for some time that the approach
    needed a serious overhaul, but the priority was always bumped down in favor of
    other “more important” deliverables.


    This was possible due to the unique combination of API products and third-party
    consumers within the platform ecosystem – as you will note from the strategies
    outlined below. However, a perfect storm was brewing which mandated a specific
    scenario to be tested and signed off before a key consumer could launch their
    offering. As fate would have it, this scenario cut clean through our Sandbox strategy
    and threatened not only to bring out one of our oldest Technical Debt skeletons
    from the closet but to also ask it to do the Moonwalk. The pressure from the commercial
    team to launch the solution to market was converted into momentum and impetus
    which brought upon not just the re-engineering of our Sandbox – but also a re-imagining
    of its purpose and function for our platform.


    It is this unique synergy between engineering and imagination which is the core
    of our implementation – and hopefully yours. From observation of this unique trait
    yet again working its magic in and throughout our Marketplace, the call to at
    least attempt to capture its essence in this book became too loud to ignore. In
    the following sections, I will share my thoughts regarding Sandbox purpose, process,
    strategies, and ways in which to implement them.'
