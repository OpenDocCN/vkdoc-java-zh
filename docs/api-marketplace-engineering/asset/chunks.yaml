  trans: '

    ### 牵头方


    这项工作也应由产品负责人（PO）进行协调，并充分吸收工程团队的重要投入与指导。尽管内容本质上具有很强的技术性，有人可能会认为这项工作最好由技术团队来理解并交付。我的反驳是，技术团队*并不*适合牵头这项工作，因为他们可能过于贴近细节。产品负责人将提供第三方视角。由于产品负责人最终要对
    API 的成功与采用率负责，他们应当牵头 Business 和 Technical 两个门户的工作，因为这属于面向客户的事项。到这里应当已经很明显：产品负责人*必须*具备半技术背景。


    ## 开发者布道


    即便是一个好产品，配有良好文档，也仍然需要被布道推广。我在学习如何使用一个新的移动应用开发平台时，从一家大型云服务商那里观察并体会到了这种方法。起初，我完全不理解这为什么有必要——文档、代码示例和实验内容都非常出色，甚至新手开发者也能在很短时间内上手运行。然而，当我进一步深入这个平台时，我遇到了文档中没有覆盖的场景。也正是在那一刻，我理解了
    Developer Advocate 的价值。


    他们可能并不知道，但通过反复观看、暂停并跟着他们的视频教程同步编写代码，我已经能直呼其名。我惊叹于他们的解决方案远比我预想的复杂方案更简单、更优雅。除了更深入了解该平台之外，我也学会了如何更高效地使用*Node.js*。文档与
    Advocate 的区别在于，后者是在用产品解决真实世界场景。


    想象一下，几块乐高积木散落在桌上。尽管你也许可以自己搭出一个基础结构，但你很可能只会使用熟悉的积木。观看别人如何使用一块你不熟悉的积木来实现某个特定功能，会帮助你正确理解这块积木的作用，并让你在未来更有信心使用它。


    简而言之——API Marketplace，尤其是在发展中市场，需要强有力的开发者布道。以有趣、易懂的语境讲解委托授权等概念的视频教程，必然有助于缓解开发者焦虑。访问机制使开发者能够*随时*、并按需*反复多次*查看材料，以理解复杂概念。随着近期线上
    meetup 的蓬勃发展，加入用户组如今比以往任何时候都更容易。应尽可能利用这一点，让潜在开发者（具备前置经验并拥有愿意学习的心态）快速在平台上手。用户组、线下或线上会议的内在价值在于，它允许
    Marketplace 与开发者之间进行双向沟通。我认为这种互动是互利共赢的。


    开发者可以从 Marketplace 技术交付团队获得实操支持。交付团队也能第一手看到开发者视角。有时在象牙塔中进行开发，可能产出理论上完备但不切实际的产品。这类产品通常会被搁置。API
    Marketplace 产品开发的一条关键信条应当是：简单、实用、可靠。团队中的任何成员都应有信心，能够轻松向外部用户解释如何使用该产品。


    在我们的发布活动中，产品团队争取到了用于制作 T 恤和马克杯的资金。我对此努力会心一笑，起初把它当作一种营销手段。然而，当我看到交付团队对穿上这些 T 恤感到无比自豪时，我非常惊讶，也正是在那一刻我意识到了这些小物件的重要性。“Swag”，也被称为“merch”，为无形实体提供了一种有形连接。直到今天，我的桌上还放着那个（未使用的）马克杯，因为我为我们所取得的成果感到自豪。我们的关键目标之一，是让开发者社区与
    Marketplace 建立连接，并拥有同样的归属感与支持感。

    '
- fmt: '## Developer Support


    An API Marketplace is unique when compared to other integration environments since
    support is required during development and for operational execution. This may
    seem to double the support capacity required – however, supporting developers
    will ultimately result in more operational use of the platform. Developer support
    also differs from operational support as the nature of queries are different.


    Our most common query was around the seemingly complex delegated authority model.
    To remedy this, the team worked on material that could clearly illustrate the
    concept. It may surprise you that the content was a simple set of images assembled
    into a slideshow. We successfully used this on several occasions – for both internal
    and external developers. It helped frame the end user, the third-party provider,
    and our organization. As we stepped through the flow on calls with API consumers,
    testers, or solution architects, I could almost sense the “penny-drop” moment
    when it clicked, and they understood exactly how it worked.


    As our Marketplace grows and evolves, we are refining and optimizing the developer
    support process. In the early phases of our release, most developer queries were
    dealt with by our first-line support team. However, if first-line support was
    not able to assist, the query moved to the internal team for deeper technical
    or product support. For some requests, we attempted to resolve them via email.
    However, nine times out of ten, our highest success rate was an online discussion
    with the third-party developer.


    To be completely honest, this is a work-in-progress for our implementation. What
    has helped incredibly is that our Product Owner has an exceptional relationship
    building ability. The `PO` also engages the third party when the request transitions
    between first-line support and backend support to be able to frame the requirement
    and to ease any friction before the online discussion. Be sure to keep in mind
    that by the time of the discussion, the third party is likely to be upset that
    the issue was not resolved, and first-line support is exasperated as their attempts
    to solve the issue have not been successful.


    For the online discussion, we had representation from the first-line support engineer
    who had been interacting with the user – for continuity. Senior engineers and
    the Product Owner also attended the session. Our intention was not to scare the
    external developer. Exactly the opposite. We wanted to show that the third party
    was important to us and our entire team valued the relationship.


    The number one rule around these interactions is to `listen`. Firstly, you must
    listen clearly and attentively to the triage from the first-line engineer around
    the issue – in preparation for the discussion. Based on the feedback, the team
    should be ready with the relevant material or information. Secondly, you must
    listen clearly and attentively to the external developer. The feedback or queries
    during the initial part of the session will help you to build a better platform.
    Once you are sure that you have a firm grasp of the problem or situation, then
    offer a solution. If you need to investigate further, clearly indicate so. Attempt
    to follow up a day or so after the call. This will demonstrate that the API Marketplace
    is sincere about the developer’s success.


    A positive side effect is a better, personal relationship with our developer community.
    We have put voices and faces to client IDs and email addresses. We know the types
    of applications our developers are building and how our APIs are consumed. In
    almost all our interactions, developers proudly showed off their applications.
    For new product releases, we have also invited third-party developers for full-day
    sessions to run end-to-end integration tests. This has helped us to identify and
    flesh out potential issues before extending the offering to more third-party providers.
    The feedback received was used to update and change how the product worked.


    Although these interactions are not subject to intense time pressure, like those
    in an operational context, we still attempt to handle developer support requests
    with the same attention and rigor as operational issues. From a priority perspective,
    the operational environment comes first. Our Marketplace fields support requests
    via email and Slack. The first-line support engineer will attempt to resolve configuration
    or simple issues. For more complex issues, a service desk request is logged for
    tracking and to assign to the relevant member of the team for investigation and
    resolution. If required, the issue is escalated to the Product Owner who will
    schedule an online discussion with the external team.


    Finally, and as discussed earlier in this chapter, we encourage external development
    teams to be as self-sufficient as possible. If there are technical issues with
    API integration, HTTP trace information regarding the requests and responses and
    possibly code extracts are requested. Essentially, this is a `help me help you`
    engagement. An altruistic aim of the API Marketplace is that the platform empowers,
    fosters, and builds our local developer community. We discuss this in more detail
    in the following section.'
