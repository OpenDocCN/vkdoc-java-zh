    ## Connectedness, Sharing, and Survival


    Undoubtedly, the Internet has enabled an unprecedented level of connectedness.
    I cannot imagine how generations before us sat patiently waiting without updates,
    while their significant others were delayed in shopping queues. Or driving around
    without a GPS-enabled app, only armed with a paper map, trying to find street
    names or having to ask strangers for directions. With the first wave of the Internet
    outside academia, organizations established presence by having a website. Today,
    almost every organization needs a website and without one, identity and trust
    cannot be established.


    This slowly evolved from a “contact us” form to full blown e-commerce capabilities
    which allowed end users to interact directly with suppliers. Smart phones have
    also enabled applications which allow direct interaction between end consumer
    and provider. Thankfully, due to the low price point of devices and the widespread
    availability of mobile data, large percentages of the world’s population are now
    connected. This has also given rise to a wave of sharing.


    Services such as Airbnb allow people to rent out a spare room or an entire home.
    Ride sharing services like Uber and Lyft are super simple to use and are constantly
    innovating with options such as low-cost trips and package delivery. This has
    enabled a paradigm shift as it could allow people to not make long-term investments
    in property and motor vehicles. Future generations may not need a driver’s license
    as it may be more economical and practical to use ridesharing than owning a car.


    From an industry perspective, the lines between organizations are blurring. One
    of the most successful mobile money services in East Africa is run by a telecommunications
    company. Healthcare providers have also entered the banking fray and are providing
    financial services. Banks have not rested on their laurels and are now offering
    telecoms services as Mobile Virtual Network Operators (MVNO).


    Although movements into new industries are possible, it is far more difficult
    for established organizations to achieve this. However, collaboration and partnership
    are another route which could help established organizations to transition. Although
    it might seem “counter-survival,” working with startups and potential disruptors
    could be the mechanism that allows an organization to survive. The adage of “*if
    you can’t beat them, join them*” rings true, and many organizations are now partnering
    with startups and participating in bootcamps to incubate new, fresh perspectives.
    In much the same way as it seems unfathomable today for an organization to not
    have a website or a mobile application, not having an API for consumption will
    be viewed the same way in the future.'
  trans: '

    ## 什么让 API 如此特别？


    尽管这个灯光场景看起来相当吸引人，很多人也可能会被“用软件关灯”的能力所启发，但读到这里的硬核工程师可能并不会轻易被打动。毕竟，这种“接口对接”能力也许多年前就已经存在了；如果你拆开外壳，露出底层电路板，板子上可能有跳线，只要给
    PIN#1 加上电流就能实现这个能力。API？没什么了不起。


    虽然灯光场景是可行的，而且也可以说它在*很多年*前就可行了，但真正具备技术敏锐度和实现能力的人其实只占很小一部分。而在这部分人里，愿意去给电路板引脚加电流的人更是少数。我至今仍能痛苦地回忆起，多年前我曾想在一次自动化构建结束时点亮一个熔岩灯来表示构建失败，但当时我做不到，因为那时我还无法轻松地从软件跨到硬件。


    和任何推动普及的技术一样，API 让大众都能获得访问能力。API 之所以能做到这一点，是因为它易于使用、技术无关，而且文档完善。API 被有意识地基于 HTTP
    等构造进行建模，而 HTTP 正是互联网通信的基础。使用中立平台可以让接口两端采用不同技术。虽然这看起来可能微不足道，但系统间集成要么一直是严格专有的，要么所谓中立化的尝试都异常复杂。凡是做过通用对象请求代理体系结构（CORBA）的人，都会认同：搭建客户端与服务端通信绝非易事。


    JavaScript 对象表示法（JSON）也是这一变革中的关键组成部分。它提供了一种轻量的数据交换机制。它的前辈，比如简单对象访问协议（SOAP），多年来一直试图通过可扩展标记语言（XML）来实现这一点。然而，JSON
    的可塑性和容错性都要高得多。关键在于它对人类来说是可读的（*human*）。当然，角落里那位端着黑咖啡的硬核工程师大概会低声嘟囔：XML 也是*人类*可读的。区别在于*简洁性*——根据我的亲身经验，浏览一串键值对，远比追踪带嵌套值的
    XML 起止标签要容易得多。


    我最喜欢的故事之一是巴别塔。最吸引我的部分是：人们说着共同的语言，并且彼此理解。这带来了*巨大的*潜力。尽管几个世纪以来，牛顿、爱因斯坦等人的个人贡献推动了惊人的进步，但通过协作和信息共享，我们可以实现更多。再次强调，底层前提是沟通的*便捷*。沟通应该像说话一样自然，而
    API 正是朝这个方向迈出的坚实一步。


    网站和移动应用已经彻底改变了我们获取信息的方式。用户界面（UI）和用户体验（UX）定义了界面的导航与流程。API 是前端的重要赋能者，并使 UI 与逻辑之间能够清晰分离。


    ## 连接、共享与生存


    毫无疑问，互联网实现了前所未有的连接水平。我难以想象前几代人是如何在伴侣因商场排队而晚归时，毫无更新地耐心等待的。也难以想象他们在没有 GPS 应用的情况下，只靠纸质地图开车到处转，努力辨认街道名称，或者不得不向陌生人问路。在互联网走出学术圈的第一波浪潮中，组织通过建立网站来确立存在。今天，几乎每个组织都需要一个网站；没有网站，就难以建立身份与信任。


    这随后从一个“联系我们”表单，逐步演变为完整的电子商务能力，使终端用户能够直接与供应商互动。智能手机也催生了应用，让最终消费者与服务提供方直接交互。幸运的是，由于设备价格低廉以及移动数据的广泛可用，全球人口中很大比例如今都已接入网络。这也催生了一股共享浪潮。


    像 Airbnb 这样的服务让人们可以出租空余房间甚至整套房屋。像 Uber 和 Lyft 这样的网约车服务使用起来极其简单，并持续在低价出行、包裹配送等选项上不断创新。这促成了一种范式转变，因为它可能让人们不必再对房产和机动车进行长期投资。未来几代人甚至可能不再需要驾照，因为相比拥有汽车，使用网约车也许更经济、更实用。


    从行业角度看，组织之间的边界正在变得模糊。东非最成功的移动支付服务之一，是由一家电信公司运营的。医疗服务提供方也已进入银行业务竞争，开始提供金融服务。银行也并未固步自封，如今正以移动虚拟网络运营商（MVNO）的身份提供电信服务。


    尽管进军新行业是可能的，但对已成型的组织来说，要做到这一点困难得多。不过，协作与伙伴关系是另一条路径，能够帮助成熟组织完成转型。虽然这看起来可能有些“反生存”，但与初创公司和潜在颠覆者合作，反而可能成为组织得以生存的机制。“*打不过就加入*”这句箴言确实有道理，许多组织如今都在与初创公司合作，并参与训练营，以孵化全新而鲜活的视角。就像今天我们已难以想象一个组织没有网站或移动应用一样，未来没有可供使用的
    API，也会被以同样的眼光看待。

    '
- fmt: '## An API Manifesto


    APIs are not new. The concept has been around for years and has been used internally
    within enterprises to achieve integration between applications. In 2002, Jeff
    Bezos issued an API Mandate, sometimes referred to as the “API Manifesto,” which
    reads as follows:


    All teams will henceforth expose their data and functionality through service
    interfaces.


    - Teams must communicate with each other through these interfaces.

    - There will be no other form of inter-process communication allowed: no direct
    linking, no direct reads of another team’s data store, no shared-memory model,
    no backdoors whatsoever. The only communication allowed is via service interface
    calls over the network.

    - It doesn’t matter what technology you use.

    - All service interfaces, without exception, must be designed from the ground
    up to be externalize-able. That is to say, the team must plan and design to be
    able to expose the interface to developers in the outside world. No exceptions.

    - The mandate closed with: Anyone who doesn’t do this will be fired. Thank you;
    have a nice day!


    Any organization with a decent integration strategy reading through this may not
    be too concerned. After all, middleware is meant to achieve all the above – abstraction,
    clean interfaces. However, the words from the manifesto “developers in the outside
    world” is a game-changer.


    Opening your organization to external consumers is likely to cause more than a
    little nervousness across the spectrum. Architects may not be keen on sharing
    their hallowed common data model with external developers. Development teams may
    put on a brave face but are probably thinking about the skeletons they’ve been
    keeping in the closet under the label of “technical debt.” Spare a thought for
    the operations team who were probably looking around for the crew from candid
    camera. Remember, back in 2002, provisioning additional Cloud capacity was probably
    a few terse sketches on a whiteboard. The gauntlet had been thrown down and teams
    had to comply.


    The Amazon API Manifesto is i) an example of an enterprise-wide paradigm Change
    regarding APIs and ii) evidence that such a Change can result in significant results
    if we consider the success of Amazon Web Services today.


    ## Speedboats and Aircraft Carriers


    Although the will to partner and collaborate could be strong, the legacy organization
    may be reluctant to achieve this. This reluctance may be due to lengthy project
    timelines or governance related to change and release management. Invariably,
    it could also be due to functionality deep within the organization which may not
    be easily exposed to third parties. This can be remedied in the long-term with
    cross-enterprise agile ways of working. However, it is possible to achieve results
    in the short-term by establishing a capability at the fringe of the organization.


    This capability, which I refer to as the “API Marketplace” is an intersection
    point between the established enterprise and third-party providers. It can leverage
    the might of the enterprise in an agile way to satisfy aggressive demand. Martin
    Fowler refers to this as the “two-lever” approach. The capability is underpinned
    by principles of people, process, and technology. We discuss this in further detail
    later in this book.


    The first lever represents the traditional enterprise, much like an aircraft carrier,
    steady and resolute in its operation. The second lever, much like a speedboat,
    is nimble and without the same organizational responsibility, has the ability
    to change direction quicker. Our Marketplace initiative had to pivot on several
    occasions. Although roadblocks are disruptive to delivery, our versatility allowed
    us to quickly change direction to keep moving. For the Minimum Viable Product
    (MVP), a backend platform we were planning on integrating into was suddenly eliminated
    due to organizational concerns regarding API access as it could impact the revenue
    streams of existing access channels. Under typical circumstances, this would have
    dealt the initiative a death blow. With good leadership and determination, a similar
    but lesser-known backend was found which we integrated into with fewer challenges.
    This required us to shape a new API product around the new backend.


    The key lesson learnt is that it may be prudent to start with a lower profile
    API product to establish the foundations of the platform – without raising organizational
    concerns (e.g., cannibalization of existing revenue streams). Lower profile could
    also translate into lower consumption. This provides a perfect opportunity to
    define and refine the operational processes and support around the Marketplace.
    In this fast-moving realm, it is important to get an API product published and
    consumed as quickly as possible.


    ## Patterns of Integration


    Integration has always been possible at different levels. Organizations connect
    to one another through well-defined interfaces, possibly built to achieve a specific
    function. The communication for this is also highly secured using dedicated network
    channels such as leased lines. This is typically referred to `Business to Business`
    (B2B) integration. Due to the highly sensitive nature of these integrations, these
    interfaces are available to a small subset of partners.


    However, a `Business to Consumer` (B2C) integration pattern allows an organization
    to unlock customer data for many `third-party` providers `only` with the customer’s
    permission. This pattern has revolutionized the integration landscape as the end
    customer, the true owner of the data, decides who has access to it. The security
    model which makes this possible is called `OAuth` and is discussed in more detail
    later in this book. This has also resulted in a standardization of interfaces
    as maintaining individual service contracts for each provider would be untenable.'
