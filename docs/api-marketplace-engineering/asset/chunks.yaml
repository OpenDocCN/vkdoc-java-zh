    \ since the launch of the platform, we chose to use the re-engineering opportunity\
    \ for maximum impact. Fair enough – there was an immediate need that had to be\
    \ resolved urgently. But there were also a fair amount of other skeletons that\
    \ we were keeping in the Sandbox closet that were not fond of any dance steps.\
    \ With that being said, we were also careful to control the scope to stay focused\
    \ on the task. Given the set of API products in our Marketplace, the first objective\
    \ was to identify the potential use-cases:\n\n- `beta`: Products being considered\
    \ for further development or in the development process with changing definitions;\
    \ important to track consumption usage patterns.\n- Backend Simulation: Relatively\
    \ simple “ping-ack” API, which are atomic in nature; preferably read-only operations;\
    \ responds with a well-defined, standard response.\n- Shallow: `Intercept-early`\
    \ pattern for API products with orchestration across many backend systems; calls\
    \ across one API product could impact others.\n- Semi-Live: API products which\
    \ allow controlled and limited access to a live backend system.\n- QA: Access\
    \ to the internal Quality Assurance testing environment of the organization.\n\
    \nIn the following sections, we dive into more detail of each Sandbox strategy\
    \ by examining the purpose it intends to fill, the approach, pros and cons which\
    \ will drive its use, and finally, how it can be achieved technically. I would\
    \ be especially keen to learn of any new or hybrid approaches you might have implemented\
    \ for your platform.\n\n### `beta`\n\nThis strategy may be used for one of the\
    \ following reasons:\n\n- To answer the question – `If we build it, will they\
    \ come?` As delivery teams may be lean to keep costs and overheads low, building\
    \ the right product for the right audience is key to the overall success of the\
    \ platform. It is essential to spend time and focus on products which are required\
    \ and will be consumed when launched.\n- To define and shape an API product. The\
    \ ability to test and refine certain features could improve adoption and consumption\
    \ in the long run. This could also be used to address complexity of interfaces\
    \ long before a single line of implementation code is written.\n- To buffer backend\
    \ delivery from strong consumer demand in a cat-and-mouse game of `staying one\
    \ step ahead`. Simply, implementation of the API may be falling behind – possibly\
    \ due to internal development or external backend provider delays. This approach\
    \ can be used to publish a working interface while the implementation catches\
    \ up.\n\n#### Approach\n\nTracking and recording of third-party consumption is\
    \ essential for this approach as the value is in the analysis and insight from\
    \ the data. Usage patterns should clearly indicate the consumers, APIs, and operations.\
    \ The interpreted metrics could form the basis for discussion with users of the\
    \ API to identify what worked and what did not.\n\nAs these APIs may still be\
    \ in the “inception” phase, performance data such as latency of calls to backends\
    \ may not be available. This must be considered as part of the API design – for\
    \ example, it may be prudent to use an async call-back approach to compensate\
    \ for possible long-running transactions.\n\nBased on the nature of the API, it\
    \ may be necessary to restrict access to a closed user group. For sensitive or\
    \ strategic APIs, only specific third parties may be allowed access to retain\
    \ institutional intellectual property and possibly competitive advantage.\n\n\
    Table [9-1](#509947_1_En_9_Chapter.xhtml#Tab1) illustrates the pros and cons of\
    \ this approach.\n\n**Table 9-1**  \nPros and cons of a `beta` Sandbox strategy\n\
    \n| Pros | Cons |\n| --- | --- |\n| Rapid response from conception to implementation\
    \ | Not representative of actual backend behavior |\n| Quantitative measure to\
    \ determine third-party consumption | Third-party interest may be low due to volatile\
    \ or dynamic nature of APIs |\n| Define and refine API products interactively\
    \ with active feedback from third parties | Prolonged timelines from Sandbox to\
    \ Live implementation may lose trust of third party |\n| Ability to test and verify\
    \ design approach and assumptions |  |\n| Used to buffer implementation delays\
    \ |  |\n\n#### Use-Case\n\nThis strategy would typically be used during early\
    \ ideation and conception phases of API Product development. Can also be used\
    \ to understand consumption patterns and to shape an API product. It is important\
    \ that third-party expectations are managed accordingly since the API is a work-in-progress\
    \ and subject to change and possible termination. May also be used as a mechanism\
    \ to engender trust with select third parties through an “invite-only” access\
    \ policy.\n\n#### Design Considerations\n\nAs illustrated in Figure [9-3](#509947_1_En_9_Chapter.xhtml#Fig3)\n\
    \n![../images/509947_1_En_9_Chapter/509947_1_En_9_Fig3_HTML.jpg](images/509947_1_En_9_Chapter/509947_1_En_9_Fig3_HTML.jpg)\n\
    \nFigure 9-3  \nDesign of a `beta` Sandbox environment\n\n- There may be no Live\
    \ implementation.\n- Static responses may be stored in files.\n- Interactions\
    \ are logged in the database for analysis and insight.\n\n### Backend Simulation\n\
    \nThis is best used for `simple` APIs which satisfy `all` the following conditions:\n\
    \n- APIs which are serviced by a single backend provider.\n- The API operation\
    \ is typically a `read` function. There are no state changes to the provider and\
    \ the operation is implicitly `atomic`. For example, an API which returns customer\
    \ data.\n- Responses from the backend provider are fixed or well-defined. Continuing\
    \ the above example, the backend responds with (i) customer data, or (ii) a `business`\
    \ error indicating the customer is not found or (iii) a `system` error indicating\
    \ a technical failure.\n\n#### Approach\n\nThe approach to create a Sandbox for\
    \ these `simple` APIs is possibly the most `complex` as it is achieved by simulating\
    \ the backend provider. The API call travels through all the elements of the Platform\
    \ stack, blissfully unaware that it is executed within a Sandbox context. When\
    \ it reaches the middleware component for interaction with a backend provider,\
    \ the call is made to a `system virtualiser` which returns a pre-defined response\
    \ if it can match a specific value in the request. Different responses and behavior\
    \ from the simulated backend can be elicited by varying the input data. It is\
    \ also possible to simulate system failures and varying latencies for more representative\
    \ behavior.\n\nTable [9-2](#509947_1_En_9_Chapter.xhtml#Tab2) illustrates the\
    \ pros and cons of this approach.\n\n**Table 9-2**  \nPros and cons of a Shallow\
    \ Sandbox strategy\n\n| Pros | Cons |\n| --- | --- |\n| Call traverses the full\
    \ application stack for more representative behavior | Full deployment of all\
    \ components to Sandbox environment has a higher resource footprint |\n| Responses\
    \ can be configured or parametrized based on specific request data | Only suited\
    \ to simple, read only operations |\n| The nature of API product allows a quick\
    \ turnaround time for implementation and updates | Static responses are used across\
    \ all third-party consumers – no or limited customization |\n|  | Rigid or fixed\
    \ response may potentially limit additional use |\n\n#### Use-Case\n\nThis approach\
    \ is best suited for API products backed by a single provider for data retrieval\
    \ or read operations. It also functions well in contexts which support static\
    \ responses across many consumers. In our case, updates to the `system virtualiser`\
    \ initially required development effort. As the Testing team were delayed waiting\
    \ for developer availability, the Test Lead spent time understanding the framework\
    \ and has since taken ownership of this capability. Scenarios are updated and\
    \ added through the modification and creation of new data files. At the last check,\
    \ I found the Testing team writing code to mimic a backend more accurately."
  raw: '## Sandbox Strategies


    As our initial approach to the sandbox had not changed since the launch of the
    platform, we chose to use the re-engineering opportunity for maximum impact. Fair
    enough – there was an immediate need that had to be resolved urgently. But there
    were also a fair amount of other skeletons that we were keeping in the Sandbox
    closet that were not fond of any dance steps. With that being said, we were also
    careful to control the scope to stay focused on the task. Given the set of API
    products in our Marketplace, the first objective was to identify the potential
    use-cases:


    *   **beta**: Products being considered for further development or in the development
    process with changing definitions; important to track consumption usage patterns.


    *   **Backend Simulation**: Relatively simple “ping-ack” API, which are atomic
    in nature; preferably read-only operations; responds with a well-defined, standard
    response.


    *   **Shallow**: *Intercept-early* pattern for API products with orchestration
    across many backend systems; calls across one API product could impact others.


    *   **Semi-Live**: API products which allow controlled and limited access to a
    live backend system.


    *   **QA**: Access to the internal Quality Assurance testing environment of the
    organization.


    In the following sections, we dive into more detail of each Sandbox strategy by
    examining the purpose it intends to fill, the approach, pros and cons which will
    drive its use, and finally, how it can be achieved technically. I would be especially
    keen to learn of any new or hybrid approaches you might have implemented for your
    platform.


    ### beta


    This strategy may be used for one of the following reasons:


    *   To answer the question – *If we build it, will they come?* As delivery teams
    may be lean to keep costs and overheads low, building the right product for the
    right audience is key to the overall success of the platform. It is essential
    to spend time and focus on products which are required and will be consumed when
    launched.


    *   To define and shape an API product. The ability to test and refine certain
    features could improve adoption and consumption in the long run. This could also
    be used to address complexity of interfaces long before a single line of implementation
    code is written.


    *   To buffer backend delivery from strong consumer demand in a cat-and-mouse
    game of *staying one step ahead*. Simply, implementation of the API may be falling
    behind – possibly due to internal development or external backend provider delays.
    This approach can be used to publish a working interface while the implementation
    catches up.


    #### Approach


    Tracking and recording of third-party consumption is essential for this approach
    as the value is in the analysis and insight from the data. Usage patterns should
    clearly indicate the consumers, APIs, and operations. The interpreted metrics
    could form the basis for discussion with users of the API to identify what worked
    and what did not.


    As these APIs may still be in the “inception” phase, performance data such as
    latency of calls to backends may not be available. This must be considered as
    part of the API design – for example, it may be prudent to use an async call-back
    approach to compensate for possible long-running transactions.


    Based on the nature of the API, it may be necessary to restrict access to a closed
    user group. For sensitive or strategic APIs, only specific third parties may be
    allowed access to retain institutional intellectual property and possibly competitive
    advantage.


    Table [9-1](#509947_1_En_9_Chapter.xhtml#Tab1) illustrates the pros and cons of
    this approach.


    Table 9-1


    Pros and cons of a beta Sandbox strategy


    | Pros | Cons |

    | --- | --- |

    | Rapid response from conception to implementation | Not representative of actual
    backend behavior |

    | Quantitative measure to determine third-party consumption | Third-party interest
    may be low due to volatile or dynamic nature of APIs |

    | Define and refine API products interactively with active feedback from third
    parties | Prolonged timelines from Sandbox to Live implementation may lose trust
    of third party |

    | Ability to test and verify design approach and assumptions |   |

    | Used to buffer implementation delays |   |


    #### Use-Case


    This strategy would typically be used during early ideation and conception phases
    of API Product development. Can also be used to understand consumption patterns
    and to shape an API product. It is important that third-party expectations are
    managed accordingly since the API is a work-in-progress and subject to change
    and possible termination. May also be used as a mechanism to engender trust with
    select third parties through an “invite-only” access policy.


    #### Design Considerations


    As illustrated in Figure [9-3](#509947_1_En_9_Chapter.xhtml#Fig3)


    ![../images/509947_1_En_9_Chapter/509947_1_En_9_Fig3_HTML.jpg](images/509947_1_En_9_Chapter/509947_1_En_9_Fig3_HTML.jpg)


    Figure 9-3


    Design of a “beta” Sandbox environment


    *   There may be no Live implementation.


    *   Static responses may be stored in files.


    *   Interactions are logged in the database for analysis and insight.


    ### Backend Simulation


    This is best used for *simple* APIs which satisfy *all* the following conditions:


    *   APIs which are serviced by a single backend provider.


    *   The API operation is typically a *read* function. There are no state changes
    to the provider and the operation is implicitly *atomic*. For example, an API
    which returns customer data.


    *   Responses from the backend provider are fixed or well-defined. Continuing
    the above example, the backend responds with (i) customer data, or (ii) a *business*
    error indicating the customer is not found or (iii) a *system* error indicating
    a technical failure.


    #### Approach


    The approach to create a Sandbox for these *simple* APIs is possibly the most
    *complex* as it is achieved by simulating the backend provider. The API call travels
    through all the elements of the Platform stack, blissfully unaware that it is
    executed within a Sandbox context. When it reaches the middleware component for
    interaction with a backend provider, the call is made to a “*system virtualiser*
    ” which returns a pre-defined response if it can match a specific value in the
    request. Different responses and behavior from the simulated backend can be elicited
    by varying the input data. It is also possible to simulate system failures and
    varying latencies for more representative behavior.


    Table [9-2](#509947_1_En_9_Chapter.xhtml#Tab2) illustrates the pros and cons of
    this approach.


    Table 9-2


    Pros and cons of a Shallow Sandbox strategy


    | Pros | Cons |

    | --- | --- |

    | Call traverses the full application stack for more representative behavior |
    Full deployment of all components to Sandbox environment has a higher resource
    footprint |

    | Responses can be configured or parametrized based on specific request data |
    Only suited to simple, read only operations |

    | The nature of API product allows a quick turnaround time for implementation
    and updates | Static responses are used across all third-party consumers – no
    or limited customization |

    |   | Rigid or fixed response may potentially limit additional use |


    #### Use-Case


    This approach is best suited for API products backed by a single provider for
    data retrieval or read operations. It also functions well in contexts which support
    static responses across many consumers. In our case, updates to the *system virtualiser*
    initially required development effort. As the Testing team were delayed waiting
    for developer availability, the Test Lead spent time understanding the framework
    and has since taken ownership of this capability. Scenarios are updated and added
    through the modification and creation of new data files. At the last check, I
    found the Testing team writing code to mimic a backend more accurately.'
  trans: '

    ## 沙箱策略


    由于我们对沙箱的初始方案自平台上线以来一直没有变化，因此我们选择利用这次重构机会来实现最大化影响。这很合理——确实有一个迫切需要立即解决的问题。但与此同时，沙箱这个“壁橱”里其实还藏着不少“骷髅”，它们可不喜欢任何舞步。话虽如此，我们也谨慎地控制了范围，以保持对任务本身的聚焦。结合我们
    Marketplace 中的 API 产品集合，第一个目标是识别潜在的使用场景：


    *   **beta**：正在考虑进一步开发，或处于开发过程中且定义仍在变化的产品；跟踪消费使用模式非常重要。


    *   **后端模拟**：相对简单的“ping-ack”API，本质上是原子性的；最好是只读操作；并返回定义良好、标准化的响应。


    *   **浅层**：适用于跨多个后端系统进行编排的 API 产品的*早期拦截*模式；单个 API 产品中的调用可能会影响其他产品。


    *   **半真实（Semi-Live）**：允许对真实后端系统进行可控且有限访问的 API 产品。


    *   **QA**：访问组织内部质量保证测试环境。


    在接下来的章节中，我们将通过以下方面更详细地探讨每种沙箱策略：其要填补的目的、方法、驱动其使用的优缺点，以及最终如何在技术上实现。我尤其希望了解你可能已在自己平台上实施的任何新方法或混合方法。


    ### beta


    该策略可用于以下原因之一：


    *   回答这个问题——*如果我们把它做出来，他们会来吗？* 由于交付团队通常会保持精简以降低成本和管理开销，为正确的受众构建正确的产品是平台整体成功的关键。必须投入时间并聚焦于那些确有需求且上线后会被消费的产品。


    *   定义并塑造 API 产品。测试并打磨某些特性的能力，长期来看可提升采用率与消费量。这也可用于在尚未写下一行实现代码之前，就处理接口复杂性问题。


    *   在“*始终领先一步*”的猫鼠博弈中，为后端交付缓冲强烈的消费者需求。简单来说，API 的实现可能落后——可能是内部开发延迟，也可能是外部后端提供方延迟。该方法可用于先发布可工作的接口，再让实现逐步追上。


    #### 方法


    对于该方法，跟踪和记录第三方消费行为至关重要，因为其价值在于对数据的分析和洞察。使用模式应清晰表明消费者、API 以及操作。解读后的指标可作为与 API 用户讨论“哪些有效、哪些无效”的基础。


    由于这些 API 可能仍处于“起步”阶段，诸如调用后端延迟等性能数据可能尚不可用。这必须作为 API 设计的一部分加以考虑——例如，采用异步回调方式来补偿可能的长事务，可能是更稳妥的选择。


    根据 API 的性质，可能有必要将访问限制在封闭用户组内。对于敏感或战略性 API，可能只允许特定第三方访问，以保留机构知识产权以及潜在竞争优势。


    表 9-1 展示了该方法的优缺点。


    表 9-1


    beta 沙箱策略的优缺点


    | 优点 | 缺点 |

    | --- | --- |

    | 从构想到实施响应迅速 | 不能代表真实后端行为 |

    | 可量化衡量第三方消费情况 | 由于 API 的易变或动态特性，第三方兴趣可能较低 |

    | 在第三方积极反馈下，以交互方式定义并优化 API 产品 | 从沙箱到生产实现周期过长，可能导致第三方信任流失 |

    | 能够测试并验证设计方法与假设 |   |

    | 可用于缓冲实现延迟 |   |


    #### 使用场景


    该策略通常用于 API 产品开发的早期构思与概念阶段。也可用于理解消费模式并塑造 API 产品。由于 API 仍在开发过程中，且可能发生变更甚至终止，因此必须妥善管理第三方预期。还可通过“仅限邀请”的访问策略，作为与特定第三方建立信任的机制。


    #### 设计考量


    如图 9-3 所示


    ![../images/509947_1_En_9_Chapter/509947_1_En_9_Fig3_HTML.jpg](img/509947_1_En_9_Fig3_HTML.jpg)


    图 9-3


    “beta”沙箱环境设计


    *   可能没有生产（Live）实现。


    *   静态响应可存储在文件中。


    *   交互记录在数据库中，用于分析与洞察。


    ### 后端模拟


    这最适用于*简单*API，且需满足*以下全部*条件：


    *   由单一后端提供方提供服务的 API。


    *   API 操作通常是*读取*功能。不会对提供方状态产生变更，且该操作隐含为*原子性*。例如，返回客户数据的 API。


    *   来自后端提供方的响应是固定或定义良好的。延续上例，后端会返回 (i) 客户数据，或 (ii) 表示客户未找到的*业务*错误，或 (iii) 表示技术故障的*系统*错误。


    #### 方法


    为这些*简单*API 创建沙箱的方法，可能反而是最*复杂*的，因为它是通过模拟后端提供方来实现的。API 调用会穿过平台栈中的所有元素，完全“毫无察觉”它正在沙箱上下文中执行。当调用到达与后端提供方交互的中间件组件时，请求会被发送到“*系统虚拟器*”，如果它能在请求中匹配特定值，就会返回预定义响应。通过改变输入数据，可以触发模拟后端的不同响应与行为。也可以模拟系统故障和不同延迟，以获得更具代表性的行为。


    表 9-2 展示了该方法的优缺点。


    表 9-2


    浅层沙箱策略的优缺点


    | 优点 | 缺点 |

    | --- | --- |

    | 调用穿越完整应用栈，行为更具代表性 | 沙箱环境中所有组件的完整部署会带来更高资源占用 |

    | 可基于特定请求数据配置或参数化响应 | 仅适用于简单只读操作 |

    | API 产品特性使其实施与更新可快速周转 | 对所有第三方消费者使用静态响应——没有或仅有有限定制能力 |

    |   | 刚性或固定响应可能限制额外用途 |


    #### 使用场景


    该方法最适用于由单一提供方支撑、用于数据检索或读取操作的 API 产品。它在支持跨多个消费者使用静态响应的场景中也表现良好。就我们而言，最初对*系统虚拟器*的更新需要开发投入。由于测试团队在等待开发人员可用性方面出现延迟，测试负责人花时间理解该框架，并自此接管了这项能力。当前可通过修改与创建新数据文件来更新和新增场景。最近一次检查时，我发现测试团队已经在编写代码，以更准确地模拟后端。

    '
- fmt: '## Design


    As illustrated in Figure [9-4](#509947_1_En_9_Chapter.xhtml#Fig4)


    ![../images/509947_1_En_9_Chapter/509947_1_En_9_Fig4_HTML.jpg](images/509947_1_En_9_Chapter/509947_1_En_9_Fig4_HTML.jpg)


    Figure 9-4


    Design of a Backend Simulation Sandbox environment


    - The `system virtualiser` is configured to return defined responses based on
    specific values in the request.

    - Endpoint configuration of middleware components is updated to route to the `system
    virtualiser`.

    - This requires a dedicated operational environment for execution. It does require
    a similar deployment strategy but does not require similar scaling as the Live
    environment as performance requirements would be lower.


    ## Shallow


    As you might recall, there was a specific scenario which brought on the update
    to the Sandbox. The early products in our platform were relatively simple. That
    is, there was typically a single backend provider which could be serviced by the
    `Backend Simulation` strategy. Over time, as more middleware components became
    available to integrate to backend systems, microservice orchestration logic gradually
    grew ever more complex to satisfy business requirements. This soon became a juggernaut
    which could not be stopped due to delivery targets and objectives. Before we knew
    it, some of our APIs were achieved with complex processes as shown in Figure [9-5](#509947_1_En_9_Chapter.xhtml#Fig5).


    ![../images/509947_1_En_9_Chapter/509947_1_En_9_Fig5_HTML.png](images/509947_1_En_9_Chapter/509947_1_En_9_Fig5_HTML.png)


    Figure 9-5


    Flow diagram showing complex orchestration logic


    Unfortunately, the request to create a Sandbox version arrived before we could
    fulfill our solemn promise to simplify the orchestration logic. The challenge
    with using the established `Backend Simulation` approach was that it needed complex
    data setup as a single transaction spanning multiple systems. What added to the
    complexity was the `write` operations for some of the steps. After many attempts,
    the team soon realized that the customization of the `system virtualiser` made
    it almost unsupportable and would be a nightmare to update.


    In a typical `“think outside the box”` approach, the solution we discovered was
    at the furthest point from the source of the problem. By taking a step back and
    posing the question from a consumer’s perspective, the primary objective of the
    Sandbox integration was to get better acquainted with our APIs. Essentially, the
    third party is simply looking for a representative response given a request. How
    this is achieved behind the abstraction afforded by the interface is not a Sandbox
    concern. By reframing the problem statement and considering it from a different
    context, the purpose of this Sandbox strategy is to allow third parties to test
    API products with complex orchestration logic spanning many backend systems, with
    potential write operations which cause state changes.


    ### Approach


    Instead of teaching skeletons to moonwalk, the answer was to intercept the request
    early `before` it entered the microservice with complex logic and process the
    request in a parallel, but `shallow` implementation. This pattern may appear to
    be very similar to the `beta` approach. The key difference, however, is that this
    was an API product with defined contracts we needed to maintain, and we had to
    satisfy the requirement of state changes which would be managed `per` third party.
    The technical solution is discussed in further detail later in this chapter.


    The pros and cons of this approach are illustrated in Table [9-3](#509947_1_En_9_Chapter.xhtml#Tab3).


    Table 9-3


    Pros and cons of a Shallow Sandbox strategy


    | Pros | Cons |

    | --- | --- |

    | Caters for APIs with complex business processes spanning multiple backend systems
    | Not fully representative of the Live solution as it is processed in a parallel
    flow |

    | Ability to manage state per third party | Additional software components to
    maintain and support |

    | The custom solution allows easy configuration and update to handle new requirements
    |  |

    | Smaller resource footprint as microservice and middleware components are not
    deployed |  |


    ### Use-Case


    This approach allows a neat and elegant solution to keep the Sandbox APIs aligned
    with the Live implementation. It also allows state to be maintained per third
    party to cater for more detailed integration scenarios. To elaborate – a `Shallow`
    approach would provide the same response in a `ping-ack` fashion. Using this strategy,
    third parties would receive updated datasets based on operations performed. It
    should be considered for solutions with medium to high complexity spanning two
    or more backend systems.


    ### Design


    As illustrated in Figure [9-6](#509947_1_En_9_Chapter.xhtml#Fig6)


    ![../images/509947_1_En_9_Chapter/509947_1_En_9_Fig6_HTML.jpg](images/509947_1_En_9_Chapter/509947_1_En_9_Fig6_HTML.jpg)


    Figure 9-6


    Design of a Shallow Sandbox environment


    - The request is processed in a parallel flow.

    - Details of the Technical design for this approach are provided later in this
    chapter.


    ## Semi-Live


    The essence of this approach is that it connects the Sandbox environment to defined
    Live interfaces. As the distribution graph discussed later in this chapter shows,
    this is not a common Sandbox strategy. I have observed two use-cases which were
    highly dependent on a Live interface.


    The first is the Twilio Messaging environment. Developers can send messages which
    terminate on a user’s device. Twilio ingeniously allowed testing of the WhatsApp
    API by sending a specific keyword to a shared WhatsApp destination that links
    a mobile number to a developer’s test account. Free credit of `$20` in value is
    initially provided and additional credit can be added for further testing. This
    is a fantastic example of the ability to earn revenue from the Sandbox environment.


    In the second instance, we found that it was necessary to connect to the Live
    security service to generate a token which would be used on subsequent calls in
    the Sandbox environment.


    ### Approach


    As fond as I am of this strategy, I am equally wary. I consider it as the opening
    of Pandora’s box and strongly advise caution regarding its use and potential abuse.
    The approach can be implemented by simply updating endpoint configuration and
    routing a request to a Live backend. Throttling of Sandbox API requests is critical
    as a third party may unwittingly cause a Denial of Service by initiating a flood
    of requests. With a more mature ecosystem, it may be possible to charge consumers
    for transactions.


    The pros and cons of this approach are illustrated in Table [9-4](#509947_1_En_9_Chapter.xhtml#Tab4).


    Table 9-4


    Pros and cons of a Semi-Live Sandbox strategy


    | Pros | Cons |

    | --- | --- |

    | More representative behavior of API requests | Opens the Live environment to
    a development audience |

    | Hybrid capability saves time on simulating backend services | Requires additional
    support elements to regulate and monitor usage |

    | Potential revenue stream by charging for controlled or restricted access to
    Live platforms | Introduces a security risk as the Sandbox is now an access mechanism
    to Live elements and services |


    ### Use-Case


    The ability to invoke Live services affords a flexible, hybrid Sandbox capability
    which must be carefully used and managed as it represents a potential security
    risk. It should be used by exception, rather than the norm. There are great use-cases
    to support its adoption – such as the Twilio messaging service previously mentioned.
    It is important that the relevant systems and controls are put into place to manage
    and monitor its use. It is best used to provide reference data, which is typically
    read only and can be openly shared。'
