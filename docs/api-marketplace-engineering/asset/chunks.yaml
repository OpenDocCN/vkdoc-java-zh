- fmt: '# 4. Monetization


    I believe that Engineering is possibly *the* biggest enabler of the monetization
    or commercial proposition of an API Marketplace. To many technically inclined
    individuals, this may seem oxymoronic as the realms are at the opposite ends of
    the spectrum.


    Allow me to present this argument in the context of building a new passenger airplane.
    If the Engineering team focuses purely on speed, performance, and technology,
    it will undoubtedly be fast and technically sound. There are a number of other
    factors to consider such as the number of passengers it can carry, the fuel consumed,
    the range or distance the aircraft can cover, and the maintenance and lifespan.
    These factors determine the financial viability of the aircraft. A real-world
    example of this scenario is the retirement of the supersonic airliner, the Concorde,
    which is an engineering marvel but unfortunately, not the most economical.


    In much the same way, the technical delivery team has a responsibility for the
    commercial trajectory and financial viability that influences the lifespan of
    an API Marketplace. In all honesty, I would classify this very much as a privilege
    and challenges the Engineering team to maintain a view on commercial objectives
    when designing and building solutions. Based on observation of a number of IT
    projects, leaving this objective to the project executive to shoulder alone will
    ultimately result in a technically sound but imbalanced solution. Such projects
    are generally shelved closer to release or mothballed due to unsustainability.


    An approach which has worked remarkably well for our implementation is one which
    affords any member of the team the opportunity to question or make a suggestion
    regarding commercial aspects of an API product. This has been enabled by a project
    executive who not only welcomes feedback but often demands it from the team as
    a signal of their ownership in the platform. Whimsical pitches regarding potentially
    amazing revenue-generating products from the technical dugout are often fielded
    with incredible finesse to avoid bruised egos as these may lie outside the rules
    of the organizational game.


    In this chapter, I consider the objective of Monetization from a technical perspective,
    using a logical-focused lens leveraging the experience of products that didn’t
    survive conceptualization and many that have reached implementation, some of which
    are now generating revenue. We unpack the strategies which are currently in use
    for our platform and which are constantly adapted to maximize financial potential.
    The key underlying theme of this chapter is the interdependence between technical
    and commercial – one cannot survive without the other.


    ## The API Marketplace Flywheel


    Taking inspiration from the Amazon flywheel which places Customer Experience at
    the core of its Growth strategy, the process which powers our platform, as detailed
    in Figure [4-1](#509947_1_En_4_Chapter.xhtml#Fig1), is underpinned by the Developer
    Experience. Full credit for this process is due to our project executive, and
    I had to persuade him to share the blueprints for the process which essentially
    drives our Platform’s operating model.


    In a new market, this was certainly a bold decision and is enabled by a long-term
    outlook from the leadership team supported by a well-defined Digital strategy.
    Unlike many organizations, we have adopted an approach which favors quality over
    quantity. In support of this statement, all API products have been built in accordance
    and alignment with industry standards. Custom definitions would have afforded
    faster delivery but harder to adopt definitions.


    ![../images/509947_1_En_4_Chapter/509947_1_En_4_Fig1_HTML.jpg](`images/509947_1_En_4_Chapter/509947_1_En_4_Fig1_HTML.jpg`)


    Figure 4-1


    The API Marketplace flywheel


    Our strategy is to start the wheel by earning trust and establishing developer
    affinity to the platform. From observation of third-party consumers, our APIs
    provide significant support and acceleration to the development of the product
    or service which will be delivered to the end user. In many cases, these users
    come from a market segment that the greater organization may have not been targeting.
    Although the primary consumers of the Marketplace are essentially the third-party
    providers, increased activity from the end user brings more API usage which enables
    the development of improved, competitive commercial models which in turn results
    in additional consumption of the APIs and attracted new consumers to the platform.


    By leveraging economies of scale to service and support new customers with existing
    infrastructure and operational capability, the platform generates more revenue
    without incurring additional costs yielding higher margins. We have adopted a
    similar strategy to Amazon and have made a conscious decision to pass this benefit
    on to our customers by lowering costs. As Jeff Bezos wisely predicted, lowering
    costs results in increased traffic which invariably speeds up the momentum of
    the flywheel. An observation is that lower costs also reduce the barrier to entry
    and the platform has caught the attention of smaller consultancies who are building
    innovative solutions with our products.


    In much the same way that a quick dash into a supermarket for one or two items
    invariably results in a trolley full of additional purchases, third parties who
    start with one API product typically leverage the onboarding process and technical
    integration knowledge to assimilate and consume others. Our Marketplace started
    with a few API products but, over time, the selection has steadily grown through
    existing consumer demand and new product definitions. Although we cannot claim
    to have the largest number of API products, those in our stable provide real business
    and customer value.


    ## Your Marketplace Identity


    Before you set out on your journey to establish an API Marketplace for your organization,
    it is important to have a clear view of how the APIs will be used. This will guide
    your sales and marketing strategy, will also define the third-party segment to
    target, and more importantly, establish the factors which measure the success
    of your platform. In Table [4-1](#509947_1_En_4_Chapter.xhtml#Tab1), I describe
    some of the ways organizations are using APIs by using a comparison to brick-and-mortar
    stores. Note that this is not an exhaustive or conclusive list – the direction
    and focus of your platform will be tailored according to the needs and aspirational
    goals of your organization and may start in one segment and evolve to another
    or possibly straddle different segments.


    Table 4-1


    Marketplace positioning'
