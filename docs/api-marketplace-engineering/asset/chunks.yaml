  raw: '### Synchronous


    Our first microservices were built using a Digital Integration framework which
    was geared for integration into a single backend as illustrated in Figure [7-2](#509947_1_En_7_Chapter.xhtml#Fig2).
    Back then, it was completely plausible that there was only one backend to integrate
    to. After all, the pure definition of a microservice is an atomic unit of function.
    In the early phases of the platform, this pattern served most of our needs perfectly.
    This approach is also a great starting point for most API platforms.


    ![../images/509947_1_En_7_Chapter/509947_1_En_7_Fig2_HTML.jpg](images/509947_1_En_7_Chapter/509947_1_En_7_Fig2_HTML.jpg)


    Figure 7-2


    One backend


    As requirements from the Consumer-Driven approach became more complex, it became
    necessary to string together calls into different backends. This was done under
    the banner of a tactical approach with the long-term aim to move this logic into
    dedicated middleware services. To make extremely aggressive project delivery dates,
    we added more logic to our microservices and found ourselves with implementations
    detailed in Figure [7-3](#509947_1_En_7_Chapter.xhtml#Fig3). Based on several
    years of integration experience, this type of implementation gives me severe vertigo.


    ![../images/509947_1_En_7_Chapter/509947_1_En_7_Fig3_HTML.jpg](images/509947_1_En_7_Chapter/509947_1_En_7_Fig3_HTML.jpg)


    Figure 7-3


    Complex business logic


    If this sequence flow had a single write operation, it may meet the minimum criteria
    to be allowed to continue to exist. Unfortunately, there are further write operations
    in this process flow. To the more lenient developer or architect, this may be
    an acceptable approach. My concern with this approach is in maintaining the consistency
    of a transaction across the process flow. If the first write works and subsequent
    writes fail, the transaction or request is in an inconsistent state. In traditional
    middleware platforms, this is where message queues and rollbacks are critical
    to ensure transactionality. My firm stance is that this type of integration logic
    is best maintained in an environment which has the necessary tools and services
    to support it.


    Unfortunately, the tactical approach yielded far better delivery times than the
    strategic one, and pseudo-transactionality has been achieved with storing transient
    state and replaying requests. My advice is to never allow your microservices to
    reach this level of complexity as you’re building a house of cards. I refer to
    this type of microservice as a Monolithic Microservice. Avoid it at all costs.


    ### Asynchronous


    We were initially fortunate as the backend platforms we integrated to responded
    within milliseconds, seconds at worst. As we assimilated different backends and
    added more business logic, we found the latency of requests steadily creeping
    up. For some API operations, it took more than a minute to complete. Do not waste
    time and energy railing against a mainframe application for taking minutes to
    provision a customer record. Although minutes to a digital platform is a lifetime,
    in a mainframe context, it is light speed.


    This quickly became an issue as the API Gateway timeout was set at 60 seconds.
    It escalated into a significant issue when the custodians of the Gateway refused
    to allow us to increase the timeout – and rightfully so. An API Gateway is not
    geared for long running requests, and these types of transactions would impact
    other service consumers. Caught between a rock, a backend platform which took
    as long as it took to service a request, and a hard place, an API Gateway which
    allowed a maximum time for a request to be processed, we had to find a new way
    of execution for these use-cases.


    Unfortunately, our constraints did not end there. Like an escape artist bound,
    submerged under water and under threat of an imminent shark attack, another parameter
    we had to deal with was network firewall restrictions. The microservice was not
    allowed access to a service outside the corporate network, without some elaborate
    reverse proxying through the API Gateway, which would double development time.


    Without this restriction, we could have simply implemented an async-callback pattern
    shown in Figure [7-4](#509947_1_En_7_Chapter.xhtml#Fig4). The caller initiates
    the request, passing a return URL which is invoked at the end of the process.
    If your microservice platform is not hosted in Alcatraz, this is a far more efficient
    asynchronous processing pattern as it allows an event-driven architecture.


    ![../images/509947_1_En_7_Chapter/509947_1_En_7_Fig4_HTML.jpg](images/509947_1_En_7_Chapter/509947_1_En_7_Fig4_HTML.jpg)


    Figure 7-4


    Async-callback


    The solution eventually adopted is an Async-Polling approach as detailed in Figure
    [7-5](#509947_1_En_7_Chapter.xhtml#Fig5). A *Callback* *Identifier* is returned
    to the consumer on an API initiation. The microservice continues processing the
    request and updates a datastore with the response upon completion. In the meantime,
    the consumer polls the microservice using a dedicated operation to determine if
    the request has been completed. Although not as elegant as a callback mechanism,
    the inherent benefit is that the microservice is not burdened with responding
    to the consumer. The responsibility shifts to the consumer to determine the transaction
    state.


    ![../images/509947_1_En_7_Chapter/509947_1_En_7_Fig5_HTML.jpg](images/509947_1_En_7_Chapter/509947_1_En_7_Fig5_HTML.jpg)


    Figure 7-5


    Async-polling


    ### The Proxy vs. Tap Debate


    Solution design to achieve an API product is never a dull affair in our team.
    As an example, consider the following scenario which has come up based on a recent
    API product requirement and, in full transparency, is the subject of significant
    debate within the team. As our API Marketplace is now considered an entry point
    for external third parties to access the organization’s services, we were requested
    to host an API for a specific business requirement use-case. It is a niche function,
    which will only be accessible to specific consumers. As a result, it will not
    appear in the externally published catalogue of API products. Furthermore, the
    nature of the transaction is that it carries a highly time-sensitive customer
    request. That is, if the request is not processed successfully within milliseconds,
    it could result in potential revenue loss for the merchant consuming the interface.


    The approaches to achieve this requirement are contrasted in Figure [7-6](#509947_1_En_7_Chapter.xhtml#Fig6).
    On the left is our current approach which we have dubbed the “man-in-the-middle”
    pattern and on the right is the new “tap-and-go” strategy. Proponents for the
    tap-and-go highlight that as the Marketplace is not an integral participant in
    the transaction, an observer role should be adopted. As an observer, only information
    necessary for monitoring and insight should be extracted. Supporters of the traditional
    proxy approach highlight that this product should be implemented in accordance
    with the standard design philosophy.


    ![../images/509947_1_En_7_Chapter/509947_1_En_7_Fig6_HTML.jpg](images/509947_1_En_7_Chapter/509947_1_En_7_Fig6_HTML.jpg)


    Figure 7-6


    Proxy vs. tap


    In true gladiator style, the team has elected to race both solutions all the way
    to the staging environment. This allows us the flexibility to choose the best
    solution as requirements for the API were clarified and as performance test results
    became available.


    From a traditional application development perspective, this may appear to be
    extremely inefficient. I consider this to be one of the greatest advantages of
    our Marketplace. A flexible architecture coupled with a highly agile and capable
    team allows multiple solutions to be built and tested to determine the best approach
    to be used.'
  trans: '

    ### 同步


    我们的第一批微服务是基于一个数字化集成框架构建的，该框架面向集成到单一后端，如图 7-2 所示。在当时，只有一个需要集成的后端是完全合理的。毕竟，微服务的纯粹定义就是一个原子化的功能单元。在平台的早期阶段，这种模式完美满足了我们的大多数需求。对于大多数
    API 平台来说，这种方法也是一个很好的起点。


    ![../images/509947_1_En_7_Chapter/509947_1_En_7_Fig2_HTML.jpg](img/509947_1_En_7_Fig2_HTML.jpg)


    图 7-2


    单一后端


    随着消费者驱动（Consumer-Driven）方法带来的需求日益复杂，我们有必要把对不同后端的调用串联起来。我们以战术性方案的名义这样做，长期目标是将这部分逻辑迁移到专门的中间件服务中。为了满足极其激进的项目交付时间，我们在微服务中加入了更多逻辑，最终形成了图
    7-3 所示的实现方式。基于多年的集成经验，这类实现会让我产生严重的眩晕感。


    ![../images/509947_1_En_7_Chapter/509947_1_En_7_Fig3_HTML.jpg](img/509947_1_En_7_Fig3_HTML.jpg)


    图 7-3


    复杂业务逻辑


    如果这个顺序流程只有一次写操作，它或许还能勉强达到允许继续存在的最低标准。遗憾的是，这个流程中还有更多写操作。对于更宽容的开发者或架构师来说，这也许是可接受的做法。我对这种做法的担忧在于：如何在整个流程中保持事务一致性。如果第一次写入成功而后续写入失败，那么事务或请求就会处于不一致状态。在传统中间件平台中，这正是消息队列和回滚机制至关重要的地方，它们用于确保事务性。我的坚定立场是：这类集成逻辑最好维护在具备必要工具和服务支持的环境中。


    不幸的是，战术方案的交付速度远胜于战略方案，而且通过存储瞬时状态并重放请求，已经实现了伪事务性。我的建议是：在构建系统时，绝不要让你的微服务复杂到这个程度，因为这无异于搭建纸牌屋。我把这种微服务称为“单体化微服务（Monolithic
    Microservice）”。务必不惜一切代价避免它。


    ### 异步


    最初我们很幸运，因为我们所集成的后端平台通常在毫秒级响应，最差也只是秒级。随着我们吸纳更多不同后端并加入更多业务逻辑，我们发现请求延迟在持续攀升。对于某些
    API 操作，完成一次请求甚至需要一分钟以上。不要浪费时间和精力去抱怨一个主机应用需要几分钟来创建客户记录。虽然对数字化平台来说，几分钟几乎像一个世纪，但在主机系统语境下，这已经是光速了。


    这很快就成为问题，因为 API 网关超时被设置为 60 秒。当网关的维护方拒绝我们增加超时时间时，问题进一步升级——而且他们拒绝得完全合理。API 网关并不适合处理长时间运行的请求，这类事务会影响其他服务使用者。我们夹在两难之间：一边是处理请求耗时不可控的后端平台，另一边是对请求处理时间有硬性上限的
    API 网关，因此我们必须为这些用例找到新的执行方式。


    不幸的是，我们的约束还不止于此。就像一位被捆绑、淹没在水下且还面临鲨鱼袭击威胁的逃脱艺术家一样，我们还必须应对另一个参数：网络防火墙限制。微服务不允许直接访问企业网络外部的服务，除非通过
    API 网关进行复杂的反向代理，这会使开发时间翻倍。


    如果没有这个限制，我们本可以直接实现图 7-4 所示的异步回调模式。调用方发起请求时传入一个返回 URL，该 URL 会在流程结束时被调用。如果你的微服务平台不是部署在“恶魔岛”里，这是一种高效得多的异步处理模式，因为它支持事件驱动架构。


    ![../images/509947_1_En_7_Chapter/509947_1_En_7_Fig4_HTML.jpg](img/509947_1_En_7_Fig4_HTML.jpg)


    图 7-4


    异步回调


    最终采用的方案是图 7-5 所述的异步轮询（Async-Polling）方式。在 API 发起时，会向消费者返回一个*回调* *标识符*。微服务继续处理请求，并在完成后将响应更新到数据存储中。与此同时，消费者通过一个专用操作轮询微服务，以判断请求是否已完成。尽管这种方式不如回调机制优雅，但它的内在优势是微服务不必承担向消费者回传响应的负担。责任转移给消费者，由其自行判断事务状态。


    ![../images/509947_1_En_7_Chapter/509947_1_En_7_Fig5_HTML.jpg](img/509947_1_En_7_Fig5_HTML.jpg)


    图 7-5


    异步轮询


    ### 代理 vs. 旁路采集之争


    为了实现一个 API 产品而进行方案设计，在我们团队里从来都不是件枯燥的事。举例来说，考虑下面这个场景：它源于最近一个 API 产品需求，并且坦率地讲，这是团队内部争论非常激烈的话题。由于我们的
    API 市场（Marketplace）现在被视为外部第三方访问组织服务的入口，我们被要求为某个特定业务需求用例托管一个 API。它是一个小众功能，只会对特定消费者开放。因此，它不会出现在对外发布的
    API 产品目录中。此外，这类事务本质上承载的是高度时间敏感的客户请求。也就是说，如果请求不能在毫秒内成功处理，可能会给使用该接口的商户带来潜在收入损失。


    实现该需求的两种方法在图 7-6 中进行了对比。左侧是我们当前的方法，我们称之为“中间人（man-in-the-middle）”模式；右侧是新的“tap-and-go（旁路即走）”策略。tap-and-go
    的支持者强调，由于 Marketplace 并不是事务中的关键参与者，因此应采用观察者角色。作为观察者，只应提取监控和洞察所需的信息。传统代理方法的支持者则强调，该产品应按照标准设计理念来实现。


    ![../images/509947_1_En_7_Chapter/509947_1_En_7_Fig6_HTML.jpg](img/509947_1_En_7_Fig6_HTML.jpg)


    图 7-6


    代理 vs. 旁路采集


    团队最终以真正“角斗士”式的方式，决定将两种方案都推进到预发布（staging）环境。这使我们能够在 API 需求逐步明确、性能测试结果逐步可用的过程中，灵活选择最佳方案。


    从传统应用开发的视角看，这似乎极其低效。而我认为这恰恰是我们 Marketplace 最大的优势之一。灵活的架构，再加上一支高度敏捷且能力出众的团队，使我们能够构建并测试多种方案，从而确定应采用的最佳路径。

    '
- fmt: '## Lifecycle


    The design process represents the embryonic phase of an API product which will
    grow, change, age, and ultimately expire. If we consider an API product in this
    way, it allows us the flexibility to evolve it and constantly make it better.
    Changes to the interface should be made carefully as these impact consumers of
    the API. There are other dimensions to consider, which can and should change.
    We consider some of these in the following sections.


    ### Developer Experience


    Feedback from actual consumers of the API is an incredibly vital input to the
    design process. An API product approved by backend teams, Legal and Compliance,
    and delivered by the Technical team with little end user value will stay on the
    shelf waiting for its best before date to expire. We unfortunately have API products
    in our Marketplace which fall into this category. While building the API, it can
    become easy to stumble into the trap of “if you build it, they will come.” An
    early warning sign is difficulty in finding an actual use-case that an API would
    support. Step into a third-party consumer’s shoes and critically evaluate how
    it would help you achieve a specific outcome. If you have trouble with this task,
    chances are that the third party will too.


    Feedback from potential third parties should be solicited as early as possible
    regarding demand and adoption. This might be a challenge during early phases of
    the Marketplace as the developer community itself is still forming. Third-party
    adoption is also the first step in the process and the relationship requires constant
    attention. During the initial phases, assistance with understanding the function
    and use of the API can be achieved using documentation, guides, and tutorials.
    As uptake increases and the API gains traction, increased functionality can be
    added to the API product. As an example, an Insurance API product may start with
    providing a quote for personal insurance cover. A later iteration could include
    quote acceptance and policy issuing. Thereafter, other types of cover could be
    added. Revisions and updates to log claims could also be considered.


    As this example illustrates, try to get a revision of the API product out as quickly
    as possible instead of waiting for the full product set to be available. Defining
    a roadmap of when features and functionality will be available is a plus but may
    not be a key pre-requisite. That is, if there is strong third-party uptake of
    the initial API revision, it may create momentum to convince backend enterprise
    teams to expose further functionality. It may be tricky but try to keep the product
    roadmap flexible – more popular or requested features should be allowed to bubble
    up to the top of the backlog. A key mantra, highlighted in the chapter on Consumption
    is – `without third-party consumption, there would be no traffic. No traffic,
    no revenue. Revenue sustains the Marketplace which exists to achieve the Vision.`
    Third-party and developer reception and feedback is a crucial element of the Design
    process.


    ### Versioning


    One of the greatest advantages of an API is that multiple versions can exist simultaneously.
    I will highlight at the outset that this is by no means a license for poor design.
    Care and consideration must always be taken when publishing an API. Versioning
    essentially decouples consumer and provider and allows both to continue on their
    own release trajectory. If the functionality from a specific version continues
    to satisfy the requirements of the consumer, there may be no need to move to a
    later update. Newer versions of the API also allow the provider to publish additional
    functionality which can be adopted by a subset of consumers.


    Most API Gateways provide this capability natively, and the complexity of different
    versions is handled at this level in the stack. Minor revisions are updates to
    an API with no breaking interface changes, and on each deployment, all API consumers
    are automatically subscribed to the updated product. If there are changes which
    will require an update from a consumer, a new product is created which will require
    subscription and update of endpoint configuration.


    It is also important to consider the changes to the Developer Portal and supporting
    documentation when adding a new API version. As the maturity of your platform
    grows, Release Notes detailing the change for every update – from minor to intermediate
    to major – should be published. This is also a signal regarding the transparency
    of the Marketplace to your external developer community.


    An approach which has helped our implementations immensely is providing early
    access to new versions to only a subset of external consumers. This not only allows
    us to determine consumption behavior, but to also determine gaps in coverage –
    be it in API functionality, documentation, or understanding. Be warned that this
    is also a time-consuming activity as it is often a many to one effort. The many
    in this case is many members of the delivery team to the one external developer
    who could not consume the API due to a misspelt variable.


    On a final note, I would like to highlight that the identity of an API should
    stay the same. Versioning should be used like different lenses of a telescope
    to adjust contrast and focus to bring the product into better view. If there is
    a significant difference or change in direction of the product, it may be prudent
    and more responsible to your consumers to create a variant or possibly a new product.'
