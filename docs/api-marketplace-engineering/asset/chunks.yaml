    # 2. Regulation


    The Financial Services (FS) industry has always been a trailblazer with regard
    to technology adoption. This is evident from the launch of Automatic Teller Machines
    (ATMs), to telephone banking to web-and-mobile application-based banking. Given
    the sensitive nature of customer data and associated transactions, the gateway
    to FS providers has been well guarded – and understandably so. In this chapter,
    we examine the factors which led to customer data and financial backend services
    being shared with third parties, which has revolutionized the industry. Like tectonic
    plates colliding in the middle of the ocean, the tsunami effect has been triggered,
    and the wave of change has reached many geographies across the globe.


    It stands to reason that if API Marketplaces are required and can be established
    in such a stringent sector like Financial Services, then other sectors, such as
    Telecommunications and Healthcare, can and will follow suit. In this chapter,
    we deep dive on the impact of APIs on the Financial Services sector. We start
    at the epicenter of this seismic event – Payments – and then move on to Open *Banking*
    and finally examine the effects of further shockwaves on the industry in the form
    of Open *Finance*.'
  trans: '

    **交付负责人（Delivery Lead）**的职责是确保产品路线图的目标和任务得以实现。其职责范围包括基于可用开发产能，对来自产品负责人的新增需求进行排期。此人还需要与后端平台团队紧密合作，以确定可供使用的接口何时可用。这有时是一项微妙的平衡工作，因为后端团队的任何延迟都可能导致开发时间损失。在与离岸交付团队协作时，交付负责人还肩负着一项并不轻松的任务：在远程与本地人员之间进行协调。基于对后端可用性和交付能力的洞察，有时也有必要调整
    API 产品的发布日期与更新节奏。目标是让平台始终保持推进。在开发过程中，严格执行双周生产发布（production drops）会带来巨大帮助。这些发布可以有意安排在交付冲刺结束时进行。发布不仅能最大化开发团队的潜力——团队也清楚他们的努力在持续进入生产环境，任何由此产生的问题或更新都可以快速处理。


    **工程负责人（Engineering Lead，EL）**横跨平台的多个技术领域开展工作。对技术栈中每一层都了然于胸是一项优势，因为为了解除阻塞，往往需要深入细节并亲自介入。API
    Marketplace 也为我们提供了一个独特机会，可以在企业内部测试新方法与新技术。EL 的职责是对技术版图有深入理解，并且常常需要与组织内的支持团队分享这一视角。另一个职责——就我个人而言也是一种荣幸——是在团队其他成员及后端平台团队的共同输入下，定义满足新需求的解决方案。从治理角度看，EL
    还需要与企业架构师、领域架构师和解决方案架构师协作，以获得平台与方案设计的审批。EL 必须具备端到端解决方案的全局视角，并能够将其拆解为团队可交付的工作项。理想的
    EL 是能够并且经常深入细节的人——从编写代码快速实现概念验证，到对接新的后端平台接口，再到在集成测试期间协调开发人员之间的协作。EL 还负责界定交付工作量与时间线，并在工程团队的协助和输入下推进。经验在其中起着重要作用，因为它有助于支持
    API 产品路线图的制定。


    最后，**运营负责人（Operations Lead，OL）**本质上是团队的枢纽。尽管其主要关注点是 Marketplace 执行平台的可靠性与稳定性，但该角色还对组织内支撑服务与后端平台的可用性承担责任。Marketplace
    支持团队向运营负责人汇报。稍后会讨论的报表与分析仪表盘，是该角色的核心支撑。对于平台的日常运行而言，故障恢复、集成以及与外部团队的协同是关键要求。理解复杂性并深入细节的能力同样是必需的，因为这使其能够知道在*何时*需要拉通*哪些人*。从创收角度看，这可能是*最*重要的角色，因为停机就意味着机会流失。


    最后，必须强调以下几点：这些角色是相互联结的。产品负责人在判断潜在 API 产品是否可行时，会得到工程负责人的支持。同样，工程负责人也依赖产品负责人将交付延迟传达给项目高管。团队层级也被压缩到最低限度，所有成员都可以自由地与上述任一角色协作以实现目标。再次强调，将团队凝聚在一起的是相互信任与尊重，更重要的是，我们共享同一个愿景。我们所做的一切，都是朝着实现该目标旅程中的坚实一步。


    ## 本书导读


    在第 2 章中，我们将探讨促使组织构建 API Marketplace 的相关监管规定。在第 3 章中，我们将深入讨论消费侧，以及如何支持第三方开发者。第
    4 章回顾如何从 API Marketplace 创收的机制。在第 5 章中，我们将详细回顾平台所采用的技术要素与实践。第 6 章聚焦于支撑 Marketplace
    的安全性。


    第 7 章专门讨论 API 应如何设计，第 8 章则展示我们的开发与 API 交付流程。在第 9 章中，我们讨论 Sandbox 环境，以及如何搭建它来支持外部开发者。第
    10 章将介绍 API Marketplace 的运营维度。第 11 章提供简要总结，并给出你实施过程中的第一步或下一步建议。你也可以直接跳读自己感兴趣的章节。


    如果你有任何想法、建议或一般性反馈，请随时告诉我。在我看来，API Marketplace 很像一个有生命、会呼吸的有机体。有些方面彼此相似，比如行走或说话；有些又截然不同——比如语言和方言。本书的目标是分享我构建
    API Marketplace 的经验，帮助他人打造属于自己的平台。


    # 2. 监管


    金融服务（FS）行业在技术采纳方面一直是开拓者。从自动柜员机（ATM）的推出，到电话银行，再到基于 Web 和移动应用的银行服务，这一点体现得非常明显。鉴于客户数据及相关交易的敏感性，通往金融服务提供商的大门长期以来都受到严格守护——这也完全可以理解。在本章中，我们将审视促使客户数据与金融后端服务向第三方共享的因素，这一变化彻底革新了该行业。就像海洋中部的板块碰撞引发海啸一样，连锁效应已被触发，变革浪潮已经席卷全球多个地区。


    由此可见，若 API Marketplace 能够在金融服务这样监管严格的行业中成为必要并得以建立，那么电信、医疗等其他行业也能够并且将会效仿。本章将深入探讨
    API 对金融服务行业的影响。我们将从这场“地震”事件的震中——支付（Payments）——开始，随后进入开放*银行*（Open *Banking*）的话题，最后审视以开放*金融*（Open
    *Finance*）形式出现的后续冲击波对行业的影响。

