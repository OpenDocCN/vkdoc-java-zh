    \ and *Resource Server*.\n\n4.  The *Resource Server* verifies the *Client ID*,\
    \ *redirect URI* and *scope* requested, and if valid, prompts the *Resource Owner*\
    \ to confirm identity (Authentication) and provide consent (Authorization).\n\n\
    5.  The *Resource Owner* authenticates themselves and authorizes the *Client’s*\
