  trans: '

    ### 消费者驱动（Consumer-Driven）


    这种设计策略通常始于某一个消费者的需求，并带有一项关键指令：接口在未来应支持多个消费者。我们平台最近接到任务，需要弥合一个新的外部托管数字平台与内部核心企业能力之间的鸿沟。在项目启动之初，Marketplace
    团队郑重承诺要构建可供其他第三方提供商复用的北向接口。我们对这一目标的投入，可从 API 的命名规范与标准中体现出来。其设计方式使得其他方能够轻松消费这些接口。


    这一使命目标所带来的推动力，促成了与组织内几乎所有后端平台的南向集成。当后端提供方对我们提出挑战时，我们选择让开，让数字平台这台“巨无霸战车”的势能从他们身上碾过。


    我们很快意识到，巨无霸并不是精细温和的生物——它们同样冲击了我们的交付流程。随着团队接收越来越多消费者特定的业务需求，我们在维护通用、可复用接口的纯粹性方面举步维艰。我们曾试图坚守立场，并明确指出这些变更会影响
    API 的可复用性和可扩展性。我大脑左侧的理性部分认同当时做出变更的决定，因为那时只有一个消费者；而右侧的感性部分却深受打击，因为这意味着我们违背了打造可复用产品的承诺。


    我们试图控制这种“传染”的扩散：先隔离消费者特定的载荷（payload），再隔离操作（operation），并希望在未来某个时间点进行“康复”。遗憾的是，我们并未成功，目前的“诊断结果”是：需要在我们的目录中“截肢”某些特定
    API。听起来也许有些夸张，但我希望当你经历类似情况时，能记起这个类比。


    我想传达给你的关键信息是——如果你的旅程始于单一消费者，请谨慎选择你的战场。正如图 7-1 所示，务必将关键后端南向集成抽象为可复用的集成组件。对于北向接口，识别哪些可以被隔离，并将其拆分为通用接口。例如，参考数据
    API 就是通用接口的理想候选。与其为可能永远不会出现的未来消费者而设计，不如对你的首要消费者给予应有的重视，发布一个能满足其需求的特定 API。


    ![../images/509947_1_En_7_Chapter/509947_1_En_7_Fig1_HTML.jpg](img/509947_1_En_7_Fig1_HTML.jpg)


    图 7-1


    消费者特定的集成方法


    帮助我得出这一结论的原因在于：如果没有这个特定消费者的需求，我们一开始就不会有*任何*API 产品可做。我想给你一句颇有智慧的建议——不要试图一步到位“煮沸整个海洋”。让你的平台拥有一定空间，先提供消费者特定接口，再在后续构建通用且可复用的集成组件。也就是说，与其先构建一个单一产品再事后切分重组，不如从一开始就构建多个分段化产品。


    ### 自主构建（Build Your Own）


    如果说自顶向下（Top-Down）策略给了你一个现成且必须落地的接口，消费者驱动（Consumer-Driven）方法由单一用户需求牵引，自底向上（Bottom-Up）方法受后端系统影响，那么从接口视角看，真正可设计的空间并不大。自主构建（Build
    Your Own）策略则不同，它允许 API Marketplace 团队在定义 API 的愿景与目的上拥有完全自主权。就像艺术家从一整块石料中雕刻出精美雕塑，一点点打磨掉粗糙边角，直至成品诞生，你也将经历同样的过程。不会有僵化的监管机构、苛刻的单一消费者或过时的遗留后端，来替你挡住那些在消费你的
    API 时遇到困难的开发者的怒火。


    即便如此，这块可供你绘制接口“壁画”的空白画布仍是难得机遇，是应当双手紧握的“金环”。对我们团队有效的方法，是一套严格而全面的评审流程。我们有时称其为“Apple
    Design（苹果式设计）”评审。无论是苹果的拥趸还是批评者，大多都会认同其面向终端用户的产品兼具功能性与优雅性。这并非“自然而然”得来，而是无数严格设计评审与迭代的结果。你的
    API 产品也必须如此。从一开始就接受：会有大量迭代和大规模返工。友谊与同盟关系应暂时搁置，目标应直指卓越。


    在最近一次 API 设计评审中，我们收到了若干改进建议，也提出了关于功能与可用性的问题。第一轮评审后，达成的方向是采用通用、开放的方法，以便于扩展，但这需要对开发者进行更多教育。我对这一策略相当满意，因为它与已在建设中的中间件集成组件高度契合。坦白说，当时我们开发已推进很深，API
    Gateway 的实施几乎完成，结果却又提出了关于可用性的问题。


    我不想掩饰——回到起点重画蓝图，尤其是在你的“壁画颜料”都快干的时候，确实艰难。人们本能地会想捍卫现有方案。真正帮助我的是意识到：最终产品的新方向将带来更简化的方法和更高的开发者采纳率。我算是幸运的——我们是在开发中途发现了这一点。也会有一些
    API 产品上线后仍需回到起点重做。这必须内化为团队文化：持续返工、打磨、优化，直到最终产品足够完美。


    还应强调的是，经受设计评审流程的“重重考验”有助于巩固产品定义相关原则。当我们收到后端团队关于增加输入元素的挑战时，这些原则证明是至关重要的支撑。尽管 API
    可以变化，你也要准备好捍卫自己所创建产品的身份。简而言之，如果你坚信某一战略方向，就不要害怕坚定立场。


    ## 注意事项（Considerations）


    设计 API 时需要考虑的因素很多。有些因素应在流程早期纳入，用作筛选器，以区分优劣；另一些因素用于理解 API 的形态与功能，确保交付成果能够实现预期能力。这些阶段可能是显性的，例如详细性能要求；也可能是隐性的，例如在组织内部推进架构设计评审。在接下来的章节中，我们将讨论其中一些因素，以及我们在设计过程中用于筛选、理解和构建更优
    API 的经验与方法。

    '
- fmt: '## Viability and Feasibility


    This is one of the most vital but potentially difficult considerations during
    the design process. Central to this is the realization that not all APIs are suitable
    products for a Marketplace. When an opportunity for a new product arises, the
    Product Owner, supported by the Engineering team, must perform due diligence by
    responding to one or more of the following questions before work formally commences.


    - Is the product in compliance with enterprise risk, security, and data privacy
    policies?

    - Is there demand from third-party developers for this product, and/or is it something
    an external provider can use?

    - What are the dependencies on downstream systems and what are the timelines?

    - What is the development effort and complexity to build the product?

    - Will the forecasted explicit or implicit revenue model sustain the product throughout
    its operational lifecycle?


    The output of this process is not necessarily a binary one. As part of understanding
    the product, the team may shape it to enable better viability. Dependencies on
    downstream systems and timelines could be mitigated through the use of a phased
    or iterative rollout of the product. It may also be prudent to engage third parties
    regarding the potential adoption of the product to determine demand. If the product
    leads to future potential opportunities, it could be funded in the short term
    from an operational perspective with the long-term view in mind.


    An API product, although digital, is similar to a physical one. Before work commences
    on the build, the team must have at least a high-level view of the time, cost,
    and effort to create and operate it.


    ## Requirements


    Agility is one of our current team’s greatest strengths as we are able to respond,
    pivot, and maneuver in light speed, in comparison to other parts of the enterprise.
    Unfortunately, it is sometimes our Achilles’ Heel as we do not pause to consider
    the wider context of the problem statement. Our mitigation to this threat, learnt
    through some tough lessons in the operational environment, is to bolster our demand
    process with a clear definition of the API requirements. It is still possible
    to maintain an Agile approach, but it is necessary to have a clear view of the
    playing field and context of engagement.


    This clarity can be achieved through Functional and Non-Functional requirements.
    The very mention of this terminology is likely to result in a shudder from fellow
    developers as this is synonymous with the traditional, sometimes hallowed practice
    of Enterprise Architecture. Before you skip to the next section, consider the
    amount of rework if you design and build a path for a solitary cyclist and a caravan
    of 18-wheeler trucks arrives. Conversely, consider the development effort wasted
    for the reverse scenario.


    Based on our experience, the following are some of the questions we now consider
    before providing resourcing, development, testing, and delivery timeframe estimates:


    - `Performance`: What are the anticipated volumes for the interface? What are
    the response times and associated service levels of supporting systems? This has
    a direct impact on the scaling of our platform infrastructure as a high-throughput
    API could require additional hardware capacity.

    - `Availability`: In the event of a supporting system not being available, should
    the request be queued and retried at a later time or should an error be returned
    to the caller? If the request should be retried, the API Marketplace platform
    requires capability to handle asynchronous requests.

    - `Maintainability`: Which operational team will field end user queries? What
    is the support process regarding tracking an operational issue across support
    teams?

    - `Onboarding`: Who will deal with onboarding, due diligence, commercial legal
    agreements of third parties wanting to consume the service?

    - `Reporting and historical data`: What are the key metrics to be reported on,
    frequency, and availability of reports – from a publishing and historical perspective?

    - `Business rules`: As a new channel into the enterprise, we strive to keep business
    rules out of the Marketplace. Ideally these should be maintained centrally as
    backend logic instead of being duplicated in channel logic. If it cannot be hosted
    centrally, what are the business rules, level of complexity, frequency of change,
    and timelines required for change?


    It should be highlighted that these are some of the areas we consider when building
    a new API. For some solutions, when working with a known backend, we consider
    just a subset. In the spirit of agility, we also commence backend integration
    in parallel to allow us to hit the ground running once the requirements have been
    established and a high-level design is formulated.


    Caution should be advised when providing delivery estimates, even with the proviso
    of revision as any estimate is likely to be considered as binding – especially
    in a high-pressure environment. Another mitigation strategy, possibly easier to
    achieve during the early phases of your implementation, is to launch an API under
    the ambit of a “beta” banner. This allows some flexibility for rework if required.
    There must be a firm timeline for this phase as a prolonged testing phase might
    scare off external consumers of your API.


    ## Documentation


    A key element, instrumental to the success of an API product, is documentation.
    I cannot emphasize this enough. Unfortunately, from several years of development
    experience, documentation is generally tacked on at the end. The greatest API
    product cannot and will not achieve its potential without the requisite level
    of documentation to support it. Just as the lines of code reflect a developer’s
    legacy, documentation that details the use of the API represents a legacy the
    team will impart to future consumers. Details regarding the API such as behavior
    and operation, parameters, inputs, and outputs should be included in the definition,
    also referred to as the swagger, of the API. The relationship between documentation
    and definition is symbiotic, and both should evolve, preferably at the same rate
    and importantly, simultaneously.


    This is a feat easier described than achieved and is one of the activities which
    must be undertaken by the team rather than a single individual. As a Developer,
    I really enjoy coding. An area of coding I sometimes consider a boggy marsh as
    it slows me down is naming a variable or operation. The reason for my angst is
    that I want the name to make good sense and to resonate with a future maintainer
    of my code. The same can be said for documentation. The member of the team shaping
    the definition may be able to provide only a few terse words or phrases to describe
    it. As the definition is reviewed, the documentation must be peer reviewed, updated,
    then sent on for Engineering Lead and Product Owner review and feedback. If team
    resourcing permits, this task would be best achieved by a Technical Writer.


    As highlighted in an earlier chapter regarding API Consumption, there are different
    types of consumers of the API product. Technical documentation will satisfy the
    needs of a Developer. Details and guidelines regarding the commercial use and
    application of an API product are essential for a business audience. It is also
    necessary to market and position an API to bring it to the attention of external
    consumers. The various types and levels of documentation must be considered during
    the design phase of an API product.'
