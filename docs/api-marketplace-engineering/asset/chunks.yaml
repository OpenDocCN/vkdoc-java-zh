- fmt: '## Microservices


    I may be heavily biased – but I consider our microservices layer to be the magic
    ingredient of our Platform. To be fair, microservices are underpinned by Containers.
    My view is that the Container is a Best Supporting Actor, while a microservice
    is the Best Actor. I did not always feel this way. Having spent most of my career
    in established integration environments, components such as an Enterprise Service
    Bus (`ESB`), Application and Process servers, all deployed across complex cluster
    configurations, were deeply ingrained when I joined the project. My opinion at
    that time was that integration built without these elements was simply not of
    an enterprise-grade – possibly as I previously worked at a software `OEM`. If
    we cut out the microservice layer, it would alleviate the burden of establishing
    an on-premises Container platform, and we could use conventional integration mechanisms
    to connect to backend services. Traditional meant safe and I could go back to
    the integration playbook I had perfected throughout my career.


    I still recall the discussion with the project sponsor, when I attempted to remove
    microservices from our platform. I made an impassioned argument to rather use
    the integration software, which I pitched as a powerful cannon, which underpinned
    the API Gateway, and which was well established in the enterprise instead of the
    peashooter microservice approach, which was probably before bleeding-edge. As
    Containers were a key objective, I suggested we use them – albeit in a less critical
    role. In summation, I highlighted that the peas of the peashooter were `NodeJS`
    – which I regarded as a “web language” instead of an integration one like `Java`.
    I was quite impressed with the case I had amassed against microservices and reassured
    myself that we would pursue the technology under less intensive project timelines.
    I was stunned when the verdict returned was Not Guilty. The rationale provided
    was that the microservice layer would afford the platform a high degree of flexibility
    and, more importantly, speed. This is one of the most accurate predictions I have
    observed in my career.


    The microservice layer has bestowed onto our Platform an unprecedented level of
    control and versatility and is pivotal to our success. Ideas which are casually
    tossed around in the morning are running components, ready to be demonstrated,
    by the afternoon. This has enabled our mantra of fixing forward, which, may at
    first, seem unorthodox. If testing or operational issues are encountered, we do
    our best to remediate instead of rolling back. I was extremely reluctant to use
    `NodeJS` as I felt it lacked the structure and performance of a language like
    `Java`, which I was extremely familiar with. After working with `NodeJS` for some
    time now, that reluctance has dissipated, and the lack of structure allows our
    team the ability to ship code at light speed. On the surface, `JavaScript` appears
    simple, but a firm understanding of its Event Loop and asynchronous nature has
    allowed us to build a platform which can easily handle high volume, low latency
    requests. Not all days are great, and there are times when the flexibility, like
    an incorrectly defined variable not caught during the build, can cause issues.


    `NodeJS` is fantastic and serves the needs of our platform. It is not mandatory
    for the platform you will build. It is important to consider your organization’s
    standards regarding development languages and developer and operational skill
    level. That is, if the organization uses `.NET` primarily, implementing `NodeJS`
    is tantamount to injecting a virus into the enterprise. It is important to keep
    in mind that the programming language supports the concept. Any programming language,
    strongly typed or not, can be adopted. It is not so much a question of what you
    use but more of how you use it.


    As we built our API Marketplace within an established enterprise, we often found
    ourselves between the pressure plates of a well governed API Gateway and a risk-adverse,
    “if-its-not-broke, don’t-fix-it” IT capability. Microservices are our shock-absorbing
    mechanism which buffers the impact and allows us to deliver on extremely aggressive
    project timelines.


    We dive deeper into the microservice architecture later in this chapter.


    ## Database


    A database is an essential element of any platform, as it is used to persist transactions,
    more so for ours as it enabled a stateless microservice architecture. Our initial
    approach was to run the database on the Container platform. This featured prominently
    on the initial design submitted to an internal Solution Alignment Forum. Unfortunately,
    our DevOps druid skills were not strong enough to conquer persistent storage volumes
    on our `Kubernetes` cluster, and we instead adopted a new design strategy that
    our `Kubernetes` cluster would not have any persistent storage. I hope that this
    position inspires a reader out there to write a book on the “Dummy’s Guide to
    Persistent Storage on `Kubernetes`” and I promise to buy a copy.


    However, this decision was made after intense discussion and deliberation. The
    deciding factor that helped to settle the matter was that database management
    would never be a core function of our team. We could easily build a database container,
    but making it highly available and fault tolerant would make our container cluster
    configuration much more complex. Our Platform now uses an Enterprise provided
    service, and from observing the various areas of database management, I have no
    doubt that we made the right decision. To clarify, our team owns the data. The
    Enterprise service team owns the database.'
