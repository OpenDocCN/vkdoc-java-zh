  trans: '

    # 4. 商业化


    我认为，工程能力很可能是 API Marketplace 商业化或商业主张中*最*重要的推动因素。对许多技术导向的人来说，这听起来也许有些自相矛盾，因为这两个领域似乎位于光谱的两端。


    请允许我用建造一架新型客机来说明这一观点。如果工程团队只专注于速度、性能和技术，那么它无疑会非常快且技术过硬。但还需要考虑许多其他因素，比如可搭载的乘客数量、燃油消耗、航程或飞机可覆盖的距离，以及维护成本和使用寿命。这些因素决定了飞机在财务上的可行性。现实中的一个例子是超音速客机“协和号”的退役：它是工程奇迹，但遗憾的是并不算最经济的选择。


    同样地，技术交付团队也有责任关注 API Marketplace 的商业走向和财务可行性，因为这会影响其生命周期。坦率地说，我更愿意将其视为一种特权，这也要求工程团队在设计和构建解决方案时始终关注商业目标。基于对多个
    IT 项目的观察，如果把这一目标完全交由项目管理层独自承担，最终往往会产生技术上可行但失衡的解决方案。这类项目通常会在接近发布时被搁置，或因不可持续而被封存。


    在我们的实施中，一个效果显著的方法是：赋予团队中任何成员就 API 产品的商业层面提出质疑或建议的机会。这得益于一位项目负责人——他不仅欢迎反馈，还经常主动向团队索取反馈，把它视为团队对平台拥有主人翁意识的信号。来自技术团队、关于潜在高收益产品的天马行空式提案，往往会被以极高的技巧性处理，以避免伤及自尊，因为这些想法可能并不符合组织运作的“规则”。


    在本章中，我将从技术视角探讨“商业化”这一目标，采用一种偏重逻辑的视角，结合那些在概念阶段夭折的产品经验，以及许多已进入实施阶段（其中一些现已产生收入）的产品经验。我们将拆解当前在平台上使用的策略，以及为最大化财务潜力而持续调整的策略。本章的核心主题是：技术与商业相互依存——二者缺一不可。


    ## API Marketplace 飞轮


    借鉴 Amazon 飞轮模型——其增长战略以客户体验为核心——我们平台的驱动流程（如图 4-1 所示）则以开发者体验为基础。这个流程应完全归功于我们的项目负责人，而我还得费了一番口舌，才说服他分享这套流程蓝图；它本质上驱动着我们平台的运营模型。


    在一个新市场中，这无疑是一个大胆的决定，而它得以实现，依赖于管理层的长期视角以及清晰定义的数字化战略支持。与许多组织不同，我们采取了“重质不重量”的方式。为支撑这一点，所有
    API 产品都按照并对齐行业标准来构建。若采用自定义定义，也许能更快交付，但会更难被采用。


    ![../images/509947_1_En_4_Chapter/509947_1_En_4_Fig1_HTML.jpg](img/509947_1_En_4_Fig1_HTML.jpg)


    图 4-1


    API Marketplace 飞轮


    我们的策略是先启动飞轮：赢得信任，并建立开发者对平台的亲和度。根据对第三方消费者的观察，我们的 API 为其交付给终端用户的产品或服务开发提供了显著支持与加速。在许多情况下，这些用户来自更大组织过去可能并未重点面向的细分市场。尽管
    Marketplace 的主要消费者本质上是第三方提供方，但终端用户活跃度的提升会带来更多 API 使用，这反过来使我们能够开发更优、更具竞争力的商业模式，进而带来
    API 的额外消费，并吸引新消费者进入平台。


    通过利用规模经济，以现有基础设施和运营能力服务并支持新客户，平台能够在不增加额外成本的情况下创造更多收入，从而获得更高利润率。我们采用了与 Amazon 类似的策略，并有意识地将这一收益通过降价回馈给客户。正如
    Jeff Bezos 的明智预判，降低成本会带来流量增长，而这又会不可避免地加快飞轮动能。一个观察是：更低成本也降低了准入门槛，平台因此吸引了更多小型咨询公司，它们正利用我们的产品构建创新解决方案。


    就像去超市原本只想快速买一两样东西，最终却总会推着装满额外商品的购物车离开一样，第三方通常从一个 API 产品开始，随后借助接入流程和技术集成经验，逐步吸收并消费其他产品。我们的
    Marketplace 起初只有少量 API 产品，但随着时间推移，产品选择通过现有消费者需求和新产品定义稳步增长。虽然我们不能宣称拥有最多的 API 产品数量，但我们“产品池”中的产品都能带来真实的业务与客户价值。


    ## 你的 Marketplace 定位


    在你着手为组织建立 API Marketplace 之前，必须清晰了解 API 将如何被使用。这将指导你的销售与营销策略，也将定义应重点触达的第三方细分群体，更重要的是，确立衡量平台成功的指标。在表
    4-1 中，我通过与实体店的对比，描述了组织使用 API 的一些方式。请注意，这并非一份穷尽或定论式清单——你的平台方向与重点将依据组织的需求和愿景目标进行定制，可能从某一细分领域起步，随后演进到另一领域，或同时覆盖多个细分领域。


    表 4-1


    Marketplace 定位

    '
- fmt: '## API Marketplace Goals and Analogies


    | Goal | Description |

    | --- | --- |

    | Minimal | This is the type of store that only provides bare necessities. No
    fancy items – only what is absolutely necessary to keep stock moving and to keep
    the lights on. This is the type of API Marketplace that is built simply to be
    compliant to regulations. The regulator has issued legislation to be adhered to
    by a specific deadline, and this is the bare minimum that needs to be done to
    avoid penalties. No strategic objective for the moment – possibly a wait and see
    approach. |

    | Niche player | One of the stores I would have loved to visit is RadioShack.
    This was a dream destination if you needed anything electronics related. It pitches
    only to a specific market, but is a one-stop shop for anything in that category.
    A comparable API Marketplace is one which only deals with a specific category
    of APIs. For example, a Bank might only provide APIs which deal with money – from
    Payments to Loans to Transaction data. |

    | Supermarket | Supermarkets are the lifeblood of communities across the world.
    You can dash in for bare necessities like milk or to find less commonly used items
    like light bulbs. They cater to a wide range of customer requirements, but product
    selection is based on popular product demand. So, you might be able to find the
    most common type of light bulb but not the one which fits an antique chandelier
    from the early 1900s. This type of Marketplace is an Aggregator. It brings together
    commonly used APIs and allows easy consumption under a single umbrella. A single
    point of contact mitigates the need to maintain accounts or relationships with
    several providers. The inherent benefit is that with economies of scale, it will
    require fewer staff to support. In addition, the combined might of a larger entity
    representing several consumers can result in more competitive pricing and service
    from backend providers. The supermarket, possibly part of a chain, is likely to
    get far better pricing and service from a supplier than an individual would. |

    | Champs-Élysées | A famous shopping avenue in Paris is the Champs-Élysées. It
    features well-established stores and is a popular destination for both locals
    and tourists. Square footage is at a premium, and only specific brands are invited
    to participate to maintain the exclusivity of the space. Although each store is
    independent, it is intrinsically connected by the aura and atmosphere of the location.
    This type of Marketplace is an ecosystem – there is no single owner, but is built
    around a central theme or construct. There is a one-to-one relationship between
    consumer and provider. Trust and confidence in the provider’s ability to execute
    is gauged implicitly by its presence in that forum. That is, if a service provider
    has been admitted to that exclusive group, it had to meet specific quality criteria.
    Conversely, providers need to maintain a high standard of quality to retain membership
    to this group. This mutual trust is gained over time. |

    | Shopping mall | Shopping malls are popular attractions for many customers. There
    is a wide assortment of stores, and the minimum requirements for potential tenants
    are far less stringent. More importantly, there are utilities such as security,
    parking, and bathrooms which are provided as a convenience to the customer and
    are provided on behalf of all tenants. Many of these centers have anchor tenants
    which are the main attraction for customers. This Marketplace represents a closed
    ecosystem. Consumers are in direct contact with providers but leverage shared
    capabilities – typically security and support. Common infrastructure may also
    host multi-tenant solutions to reduce costs and achieve economies of scale. Anchor
    tenants in this instance may be a well-established and trusted brand, such as
    a regarded Financial Institution, who also participates in this environment. This
    could represent a natural evolution for organizations who start their individual
    Marketplaces and want to stimulate growth by attracting more third-party developers
    and supporting smaller providers to reach a larger audience. |


    ## Value and Revenue Strategies


    In our fast-moving world, amplified by technology, there are new and novel ways
    to generate revenue today that we would not have dreamed possible years ago. As
    examples – social media personalities with a large number of fans and followers
    become influencers and are paid with more views of their content and to market
    and promote products. Professional gamers could make more than professional sports
    players.


    In short, it is important to understand and appreciate that `value` could be created
    explicitly – in the form of hard revenue – or implicitly, for example, in the
    form of brand positioning and customer loyalty.


    In this section, we consider different approaches how an API Marketplace can generate
    value – both implicit and explicit.'
  raw: '| Goal | Description |

    | --- | --- |

    | Minimal | This is the type of store that only provides bare necessities. No
    fancy items – only what is absolutely necessary to keep stock moving and to keep
    the lights onThis is the type of API Marketplace that is built simply to be compliant
    to regulations. The regulator has issued legislation to be adhered to by a specific
    deadline, and this is the bare minimum that needs to be done to avoid penalties.
    No strategic objective for the moment – possibly a wait and see approach |

    | Niche player | One of the stores I would have loved to visit is RadioShack.
    This was a dream destination if you needed anything electronics related. It pitches
    only to a specific market, but is a one-stop shop for anything in that categoryA
    comparable API Marketplace is one which only deals with a specific category of
    APIs. For example, a Bank might only provide APIs which deal with money – from
    Payments to Loans to Transaction data |

    | Supermarket | Supermarkets are the lifeblood of communities across the world.
    You can dash in for bare necessities like milk or to find less commonly used items
    like light bulbs. They cater to a wide range of customer requirements, but product
    selection is based on popular product demand. So, you might be able to find the
    most common type of light bulb but not the one which fits an antique chandelier
    from the early 1900sThis type of Marketplace is an Aggregator. It brings together
    commonly used APIs and allows easy consumption under a single umbrella. A single
    point of contact mitigates the need to maintain accounts or relationships with
    several providers. The inherent benefit is that with economies of scale, it will
    require fewer staff to support. In addition, the combined might of a larger entity
    representing several consumers can result in more competitive pricing and service
    from backend providers. The supermarket, possibly part of a chain, is likely to
    get far better pricing and service from a supplier than an individual would |

    | Champs-Élysées | A famous shopping avenue in Paris is the Champs-Élysées. It
    features well-established stores and is a popular destination for both locals
    and tourists. Square footage is at a premium, and only specific brands are invited
    to participate to maintain the exclusivity of the space. Although each store is
    independent, it is intrinsically connected by the aura and atmosphere of the locationThis
    type of Marketplace is an ecosystem – there is no single owner, but is built around
    a central theme or construct. There is a one-to-one relationship between consumer
    and provider. Trust and confidence in the provider’s ability to execute is gauged
    implicitly by its presence in that forum. That is, if a service provider has been
    admitted to that exclusive group, it had to meet specific quality criteria. Conversely,
    providers need to maintain a high standard of quality to retain membership to
    this group. This mutual trust is gained over time |

    | Shopping mall | Shopping malls are popular attractions for many customers. There
    is a wide assortment of stores, and the minimum requirements for potential tenants
    are far less stringent. More importantly, there are utilities such as security,
    parking, and bathrooms which are provided as a convenience to the customer and
    are provided on behalf of all tenants. Many of these centers have anchor tenants
    which are the main attraction for customersThis Marketplace represents a closed
    ecosystem. Consumers are in direct contact with providers but leverage shared
