  trans: '

    ### 遥测


    监控中的一个维度，尤其吸引我的是遥测（Telemetry）。我最初接触这一概念，是通过观看一级方程式（F1）比赛。当赛车在赛道上行进时，赛事工程师能够获取这台机器几乎每个方面的详细信息。这可能让维修区团队对赛车运行状况获得了惊人的洞察；如果使用得当，还可以在策略上带来额外的一点竞争优势，并最终赢得比赛。


    由这一认知延伸出的首先是：持续不断涌入的数据量——从胎压和温度，到剩余燃油、机油温度，再到气流，可能有几十项，甚至数百上千项指标需要筛查。遥测真正的美妙之处在于，它赋予了对源端进行远程控制的能力。当前的
    F1 规则可能不允许这样做，但在早些年，赛事工程师可以远程修改赛车配置。举例来说，如果他们发现发动机温度危险地偏高，赛事工程师（与车手协商后）可以降低每个挡位的最高转速，以保护发动机坚持到比赛结束。


    从软件工程的视角来看，这非常令人兴奋，因为它使运维团队能够对解决方案进行“运行时”配置变更，以优化性能，或在必要时保障应用可用性。变更示例包括：增加更多容器副本或实例以应对预期流量、通过环境变量策略动态调整端点配置，或在变更窗口期间展示与移除维护页面。需要注意的是，遥测的目标并不是对运行域进行大规模变更，而是提供“远程控制”能力，用于做细微的航向修正或更新。在不能承受停机的运行环境中，这无疑是一件极其多用途的利器。


    ### 告警


    一个关键教训是：糟糕的告警策略会迅速导致运维流程失效。随着平台业务量增长，发出的告警数量压垮了支持团队。深入调查显示，大多数告警源于数据问题或下游问题，而
    Marketplace 支持团队对此几乎无能为力。在大量不可执行处理项（噪声）中，真实系统问题越来越容易被漏掉，导致问题解决出现不必要的延迟。


    我们随后采用的实时告警方法（为应对高流量而设计）是：不针对“噪声”发送告警，而是基于发现的错误进行分类。最初，所有新错误都会触发告警。经过协商后，若团队无法立即采取行动，则将这些错误重新分类以调整告警策略。这些错误仍会在运维服务台中记录和跟踪，以便修复数据问题或推动下游系统进行变更。此外，所有错误也会在运维仪表板中展示，并且每天向关键干系人发送全量错误报告，这有助于跟踪与下游系统相关的错误量变化。


    为了尽可能复用企业服务并与我们的策略保持一致，平台最初被配置为使用组织现有的告警能力，通过电子邮件和短信（SMS）等多种渠道向值班工程师发送告警。电子邮件的一个挑战是，即便发送到分发组，重要告警也会淹没在大量消息中；针对某个线程的排查或解决回复又会制造更多邮件；而要查找或追溯历史事件，则不得不翻阅邮件归档。使用短信的缺点则是移动网络资费带来的成本。很快我们便意识到，传统机制并不理想，需要一种替代方案。


    一个颇具吸引力的方案是集成 Slack 这类流行沟通平台，数字化领域的其他团队也在使用它。这本有潜力将我们的告警能力推进到光谱的另一端。但在对该方法进行更深入思考后，我们识别出一些潜在缺点：采用非企业标准会与组织战略产生明显偏离；与
    Slack 服务的集成连接存在挑战；并且要求团队每位成员额外安装并配置软件——有时还需要在个人设备上操作，更不用说管理该服务本身的额外开销。


    我们找到的一个很棒的折中方案是使用组织标准沟通软件 Microsoft Teams。Teams 拥有出色的“频道（channel）”功能，告警会以消息形式路由到频道。支持工程师可以围绕某条消息发起线程，开发人员在需要协助时也可跟进并回复。作为组织标准工具，我们还能复用移动应用的安全能力与分发策略。最大的好处在于，我们再次与“复用组织能力与规模优势、消费企业服务”的战略保持一致。


    ## 支持


    本节我们讨论支持能力中的“人”这一要素。最优秀的解决方案，都是在充分考虑并认知*人员、流程和技术*的基础上构建的。作为*人员*要素，支持团队成员借助*技术*（如日志与监控）以及*流程*（如事件管理）来维护
    Marketplace 的健康与稳定。由于 Marketplace 需要 24x7 全天候关注，我们对团队中的这些支持工程师怀有深深的感激。接下来我们将通过讨论支持团队结构、将解决方案从开发过渡到运维的方法，以及我们的内外部沟通策略，进一步展开细节。

    '
- fmt: '## Roles


    A foundational principle of our organization’s digital playbook is the practice
    of “you build it, you run it.” At first glance, this may appear to be an unforgiving
    “tough love” approach to agile solution delivery. From first-hand observation,
    this is possibly one of the greatest enablers to building responsible and reliable
    solutions. From prior project experience, I have observed a clear demarcation
    between solution delivery and operations – with the split spanning departments
    and divisions, each with its own staff and organizational structure. Although
    the delineation allows clear focus, separation of concerns and defined areas of
    responsibility, it inevitably results in an “us-and-them” culture. Development
    teams may callously deploy solutions to production, and operational teams may
    be reluctant to accept ownership unless onerous conditions have been met.


    The full-stack squad, discussed in the chapter detailing Development, also includes
    support personnel who are responsible for the day-to-day operation of a solution.
    This approach ensures that responsibility and accountability for an API product,
    from inception to retirement, remains with the squad. If the solution has been
    poorly designed or does not have the requisite amount of logging or error handling,
    for example, the loop between operations and development is short and closed quickly.
    It is also a standing rule that the developers of a solution will be responsible
    for post-rollout support for 30 days. During this time, the developer will perform
    Level 1 support while shadowed by operations personnel. Knowledge sharing sessions
    will also be scheduled during this time to provide the support team with the information
    and skills to operate and manage the solution. For more complex solution delivery,
    members of the operational team may be assigned to the project team to allow more
    insight into the internal execution and a seamless transition to support.


    The following list details the roles within the support team:


    ### Operations lead


    First point of responsibility for the overall health of the platform and coordinates
    the activities of the team – from the scheduling of support staff to standby rosters.
    Requires sufficient technical acumen to understand an issue and resulting impacts,
    possibly the ability to dive into the detail but also the restraint to determine
    when to enter the battlefield and when to direct the troops. Unfortunately, technically
    minded folk enjoy the detail far more than process. The benefit is that the Lead
    can help with issue resolution. The risk, which I can attest to personally, is
    that the individual takes on too much, becomes a single point of failure and possibly
    the largest threat, does not have time to put in or support the necessary processes
    and procedures to manage the team. It is for this reason that this role is best
    staffed by a balanced technology and process-oriented individual.


    ### Level 1/2 support


    As mentioned above, this role is generally filled by developers during post-rollout
    support. Based on the nature of your Marketplace, the platform requires 24x7 support,
    and this group of engineers stand on the front line to identify and triage issues
    and maintain the integrity of the API products. Well-defined dashboards and alerting
    mechanisms, discussed later in this chapter, are key to assisting this team with
    identifying issues. Triage is an extremely important function for a support engineer,
    and the ability to determine the root cause of an issue is a key trait that we
    seek to instill. The engineer maintains ownership of an issue until resolved or
    mitigated, even if it falls outside the boundaries of the platform. If additional
    assistance is required, a support request detailing the issue, impacted domains,
    analysis, logs, and possible area of suspicion is created. This is then assigned
    to the next level of support for investigation.


    ### Level 3 (Development) support


    With a smaller team, issues which cannot be resolved by Level 1/2 are routed directly
    through to developers for assistance. The benefit is that it allows a shorter
    loop between issue detection and resolution. The drawback is that it could impact
    precious development time. In keeping with the “you build it, you run it” ethos
    of the team, it keeps developers accountable regarding their delivery. Essentially,
    well-written code and attention to solution knowledge sharing with the operations
    team will minimize interruptions to future development. If necessary, a code update
    may be required. Based on the severity of the issue, this may be included in the
    next release or fast-tracked through the process for immediate deployment.


    ## Transition


    Given the pace of delivery, API products within the Marketplace from multiple
    streams are constantly delivered and updated to keep up with Product Owner requirements
    and consumer demands. The operations capability is run as a shared service for
    maximum efficiency. That is, a single team supports all API products, across various
    streams. This allows the team to have one support engineer on Level 1/2 support,
    typically on a 24x7 schedule, which also reduces costs.


    With new updates to the production environment, the delivery team is primarily
    responsible for post-rollout support for a specified period. During this time,
    the members of the operations team will provide shadow support to observe issues
    which may arise and how it may be remediated. This may be viewed as “on-the-job
    training” or implicit knowledge sharing. The delivery team also runs knowledge
    sharing sessions, the number of which is proportional to the complexity of the
    release. The delivery team views this period of transition in a “let me help you
    help me” light. That is – the probability of support requests escalated for development
    support is inversely proportional to the knowledge and skill of the support engineer.
    Simply put – an empowered support engineer may be able to resolve an operational
    issue without requiring assistance from a developer.


    From personal experience, I have found that having to field support queries midway
    through development requires context switching which seriously impacts my delivery
    capability. Apart from the feeling of pride of having a solid, reliable solution
    in production, this is more than enough reason for any developer to ensure the
    operations team is suitably empowered to support their solution.'
