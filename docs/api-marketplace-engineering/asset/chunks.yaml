  trans: '

    ### 示例流程


    图 9-11 以及后续的示例配置，能让你对该过程有更深入的理解。


    ![../images/509947_1_En_9_Chapter/509947_1_En_9_Fig11_HTML.jpg](img/509947_1_En_9_Fig11_HTML.jpg)


    图 9-11


    Virtualiser 处理流程


    *   当接收到请求时，我们会尝试查找所有匹配的*谓词（Predicate）*。


    *   对于某个特定请求，可能存在多个匹配项。将使用匹配数量最多的谓词（Predicate）。


    *   随后会检索关联的*响应（Response）*。多个谓词可以映射到同一个*响应（Response）*。这使得请求识别与处理之间可以解耦。


    *   *响应（Response）*可以通过静态数据、代码执行，或代理到已配置端点进行处理来生成。


    *   代码执行元素或“mini app”可以维护状态。这使得可以基于已定义状态生成动态响应。


    以下摘录是针对下述地址的示例配置：


    *   *http://server/sport/catalogue?categoryID=nnn*


    *   如果未指定*categoryID*的值，则任意值*nnn*都将匹配。


    *   如果还存在另一个未为*query*参数指定条件的*谓词（Predicate）*配置，则会优先使用该配置，因为其匹配项更多。


    ```

    {

    "method": "GET",

    "path": "/sport/catalogue",

    "api": "SPORT",

    "operation": "GetCatalogue",

    "response": {

    "query": [

    {

    "key": "product",

    "source": "query",

    "query": "categoryID"

    }

    ]

    },

    "query": {

    "categoryID": ""

    }

    }

    ```


    以下摘录是针对下述地址的示例配置：


    *   *http://server/sport/catalogue?categoryID= 11329*


    *   一旦找到*谓词（Predicate）*，便会使用`response`数据查找其关联的*响应（Response）*。根据上述配置，它指定了检索条件的`source`来自`categoryID`参数——`{"product":"11329"}`


    *   *响应（Response）*的`action`参数表明要返回的负载是`context`变量中的 JSON 对象。


    *   该策略允许针对不同的`categoryID`值返回不同的负载，同时也支持在运行时进行更新。


    ```

    {

    "product": "11329",

    "response": {

    "action": "data",

    "context": { .. },

    "ErrorDescription": "OK",

    "TxID": "0c772fd1-4203-4390-bc51-8c74edf0e979"

    }

    }

    ```


    这个 Virtualiser 设计是专门为满足我们 Marketplace 实现需求而定制的。我们还增加了其他扩展，可使用 header 或 query 参数的值，从指定集合中检索数据库记录，并使用这些值进行额外匹配。该方案展示了一个示例设计。你可以针对自己的
    Marketplace 应用许多更新和优化。如果你有任何想法愿意分享，请随时告诉我。


    ## 总结


    在本章中，我们介绍了 Sandbox——它是任何 API Marketplace 的关键组成部分。我们强调了它的目标以及其在帮助第三方提供方理解你的 API
    方面所起到的关键作用，同时它也能帮助你更好地了解调用方应用。我们详细讨论了多种 Sandbox 策略，说明了各自的方法、优点和缺点、最适用的用例，以及高层设计。


    我还提供了一个示例分布，展示哪些策略使用最广泛，以及一种访问提供策略。最后我们深入细节，定义了自定义 Virtualiser 的需求，它可用于满足两种 Sandbox
    策略。基于需求，我们进一步评估了实现选项，从商业方案到开源方案，最终选择构建自定义解决方案以获得最大灵活性。随后我们概述了该自定义方案的核心元素，并处理了一个示例请求，以更好地理解其工作方式。


    在企业软件开发中，实现 Sandbox 环境可能是少数能够给予创造力和跳出常规思维更大空间的场景之一。它甚至可以作为你 Marketplace 实施的试点阶段，用于衡量市场需求。


    在下一章中，我们将进入 Operations 领域——这很可能是你的 API 停留时间最长的领域。


    # 10. API 运营


    与 API Marketplace 中其他高度灵活、能够快速转向或调整方向的领域相比，Operations 领域更加结构化、有组织且目标明确。团队依靠严格的流程和结构运作，是整个平台的基石。任何其他做法都将迅速滑向混乱，且该实现很快会被归类为原型。由于平台是支撑更广泛第三方应用的使能要素，任何内部或支撑系统故障都可能引发连锁反应，最终造成更大影响，并导致第三方消费者面向客户的产品或服务产生负面观感。


    由于该领域通常归入运营支出（OPEX）预算，直觉反应可能是尽量压低成本。尽管我们的 Marketplace 可能并不直接面向终端客户，但如果服务水平被认为不稳定，仍可能造成重大的声誉影响和行业观感问题。正如前几章所述，一项重要工作是吸引外部开发者进入平台；而维护关系、留住这些消费者则需要投入更多努力。


    根据经验，集成支持一直是一项充满挑战但也很有回报的角色。毫无疑问，我从设计到开发，再到真正理解一个解决方案及其底层要素，最大的收获都来自在 Operations
    中积累的经历。开发阶段中参数与条件通常定义明确。即使有大量测试场景和高强度压测，环境仍可能相对隔离。我职业生涯早期的一个项目中，我清楚记得一位资深工程师兴奋地汇报说，他在自己的笔记本上一整夜跑了数百万笔交易且毫无问题。然而当我们的解决方案最终上线后，接下来的两年里我们花了无数个夜晚处理运营问题。原因在于生产环境与测试环境差异巨大，流量负载、支撑系统可用性以及不可预测的客户行为都不应被低估。正因如此，我始终坚信解决方案架构师必须花时间从事
    Operations 角色，才能学会设计更健壮的解决方案。


    不幸的是，在快速变化、高流量、混乱的运营环境中，以松散、战术性的方式“以火攻火”，极有可能导致失败，并可能危及平台的成功与长期发展。在本章中，我将讨论我们过去、当前以及面向未来的运营标准、流程与方法，以实现
    Marketplace 的成功运营。

    '
- fmt: "## The Operational Universe\n\nIn all honesty, stabilizing our support capability\
    \ has been one of our greatest challenges and is an ongoing effort. The project\
    \ sponsor had foreseen the criticality of the platform years ago. Unfortunately,\
    \ his sagely advice went unheeded as the team raced to build and deploy the platform\
    \ with a mantra of – “we will cross that bridge when we get there.” As the Marketplace\
    \ was suddenly identified as a pivotal element to allow a new, externally hosted\
    \ digital experience, to leverage internal, enterprise capability, the team found\
    \ itself thrust into the operational spotlight almost overnight.\n\nLike firefighters\
    \ in training, with emergencies typically being called on to save a cat stuck\
    \ in a tree, the team was ill-prepared when called in to deal with infernos of\
    \ high-traffic and high-value transactions spanning several downstream systems\
    \ which we had not dealt with operationally before. A term to reference this condition\
    \ was “support surgery,” and daily calls were scheduled to check if suggested\
    \ strategies had taken hold and to adjust if not. With time and much effort, the\
    \ team has established a firm support foundation through the improvement of the\
    \ platform monitoring capability, definition of an incident management process,\
    \ and better understanding and operational relationships with backend supporting\
    \ systems.\n\nA key takeaway from this experience is to put sufficient and, importantly,\
    \ honest focus on support operationalization of a Marketplace as early in the\
    \ project lifecycle as possible. In the following sections, we discuss key concepts\
    \ and approaches which enable the operational domain and identify foundational\
    \ elements upon which it is built – as shown in Figure [10-1](#509947_1_En_10_Chapter.xhtml#Fig1).\n\
    \n![../images/509947_1_En_10_Chapter/509947_1_En_10_Fig1_HTML.jpg](images/509947_1_En_10_Chapter/509947_1_En_10_Fig1_HTML.jpg)\n\
    \nFigure 10-1  \nThe Operations sub-domains\n\n## Change and Release Management\n\
    \nTraditionally, operational teams are not typically fond of updates as they introduce\
    \ risk into the environment. What has worked exceedingly well for our implementation\
    \ is a philosophy of frequent but small releases. As noted in the chapter detailing\
    \ Development, there may be a number of concurrent streams running in a sprint\
    \ that will deploy to production at the end of the sprint.\n\nFor major updates\
    \ such as new API products, the release is generally made to production well in\
    \ advance of any third-party consumption as shown in Figure [10-2](#509947_1_En_10_Chapter.xhtml#Fig2).\
    \ By providing a buffer between release and consumption, it allows the team an\
    \ opportunity to verify functionality in a relatively unpressured capacity and\
    \ to make any updates or revisions if required. From launching new functionality,\
    \ we have often discovered, on the night of deployment, that additional configuration\
    \ was required, and most often outside our sphere of control (such as firewall\
    \ or network access). By deploying sooner, it has allowed our team to identify\
    \ and resolve the dependency before we found ourselves on the critical path.\n\
    \n![../images/509947_1_En_10_Chapter/509947_1_En_10_Fig2_HTML.jpg](images/509947_1_En_10_Chapter/509947_1_En_10_Fig2_HTML.jpg)\n\
    \nFigure 10-2  \nFirst release of an API product\n\nFor minor product iterations,\
    \ as shown in Figure [10-3](#509947_1_En_10_Chapter.xhtml#Fig3), API versioning\
    \ is a critical element. As different versions of API products can co-exist, the\
    \ decision as to when to migrate is left to the third-party consumer. This is\
    \ done with the proviso that specific versions have a well-defined end of life.\
    \ By providing well-defined release notes detailing the changes in later versions,\
    \ we also provide a clear signal to our consumers that it may be in their best\
    \ interest to move to the newer version – for reasons of improved security or\
    \ stability or possibly additional functionality.\n\n![../images/509947_1_En_10_Chapter/509947_1_En_10_Fig3_HTML.jpg](images/509947_1_En_10_Chapter/509947_1_En_10_Fig3_HTML.jpg)\n\
    \nFigure 10-3  \nUpdates to an API product\n\nAs shown in Figure [10-4](#509947_1_En_10_Chapter.xhtml#Fig4),\
    \ updates to internal, supporting elements such as microservices are generally\
    \ minor and iterative. In the event of an issue arising from an update, the team\
    \ will assess the cause, impact, and possible resolution. From a culture perspective,\
    \ our preference is to minimize blame by not dwelling too much on the cause. We\
    \ have found that blame results in fear which inhibits the team’s agility. If\
    \ an issue could have been identified during testing, it is taken as a learning\
    \ for the future. More often, the issue is related to data or scenarios unique\
    \ to the production environment which could not be replicated during testing.\
    \ If the impact is significant service degradation, the change is rolled back\
    \ immediately. A strong DevOps capability allows this to be achieved in a matter\
    \ of minutes. This, too, is also a liberating capability that underpins the team’s\
    \ ability to deliver quickly. If the resolution can be achieved quickly and with\
    \ minimal, preferably zero risk, the Delivery Leads, in consultation with the\
    \ Engineering team, may make the decision to “fix forward.”\n\n![../images/509947_1_En_10_Chapter/509947_1_En_10_Fig4_HTML.jpg](images/509947_1_En_10_Chapter/509947_1_En_10_Fig4_HTML.jpg)\n\
    \nFigure 10-4  \nInternal updates"
  raw: '## The Operational Universe


    In all honesty, stabilizing our support capability has been one of our greatest
    challenges and is an ongoing effort. The project sponsor had foreseen the criticality
    of the platform years ago. Unfortunately, his sagely advice went unheeded as the
    team raced to build and deploy the platform with a mantra of – “*we will cross
    that bridge when we get there*.” As the Marketplace was suddenly identified as
    a pivotal element to allow a new, externally hosted digital experience, to leverage
    internal, enterprise capability, the team found itself thrust into the operational
    spotlight almost overnight.


    Like firefighters in training, with emergencies typically being called on to save
    a cat stuck in a tree, the team was ill-prepared when called in to deal with infernos
    of high-traffic and high-value transactions spanning several downstream systems
    which we had not dealt with operationally before. A term to reference this condition
    was “support surgery,” and daily calls were scheduled to check if suggested strategies
    had taken hold and to adjust if not. With time and much effort, the team has established
    a firm support foundation through the improvement of the platform monitoring capability,
    definition of an incident management process, and better understanding and operational
    relationships with backend supporting systems.


    A key takeaway from this experience is to put sufficient and, importantly, honest
    focus on support operationalization of a Marketplace as early in the project lifecycle
    as possible. In the following sections, we discuss key concepts and approaches
    which enable the operational domain and identify foundational elements upon which
    it is built – as shown in Figure [10-1](#509947_1_En_10_Chapter.xhtml#Fig1).


    ![../images/509947_1_En_10_Chapter/509947_1_En_10_Fig1_HTML.jpg](images/509947_1_En_10_Chapter/509947_1_En_10_Fig1_HTML.jpg)


    Figure 10-1


    The Operations sub-domains


    ## Change and Release Management


    Traditionally, operational teams are not typically fond of updates as they introduce
    risk into the environment. What has worked exceedingly well for our implementation
    is a philosophy of frequent but small releases. As noted in the chapter detailing
    Development, there may be a number of concurrent streams running in a sprint that
    will deploy to production at the end of the sprint.


    For major updates such as new API products, the release is generally made to production
    well in advance of any third-party consumption as shown in Figure [10-2](#509947_1_En_10_Chapter.xhtml#Fig2).
    By providing a buffer between release and consumption, it allows the team an opportunity
    to verify functionality in a relatively unpressured capacity and to make any updates
    or revisions if required. From launching new functionality, we have often discovered,
    on the night of deployment, that additional configuration was required, and most
    often outside our sphere of control (such as firewall or network access). By deploying
    sooner, it has allowed our team to identify and resolve the dependency before
    we found ourselves on the critical path.


    ![../images/509947_1_En_10_Chapter/509947_1_En_10_Fig2_HTML.jpg](images/509947_1_En_10_Chapter/509947_1_En_10_Fig2_HTML.jpg)


    Figure 10-2


    First release of an API product


    For minor product iterations, as shown in Figure [10-3](#509947_1_En_10_Chapter.xhtml#Fig3),
    API versioning is a critical element. As different versions of API products can
    co-exist, the decision as to when to migrate is left to the third-party consumer.
    This is done with the proviso that specific versions have a well-defined end of
    life. By providing well-defined release notes detailing the changes in later versions,
    we also provide a clear signal to our consumers that it may be in their best interest
    to move to the newer version – for reasons of improved security or stability or
    possibly additional functionality.


    ![../images/509947_1_En_10_Chapter/509947_1_En_10_Fig3_HTML.jpg](images/509947_1_En_10_Chapter/509947_1_En_10_Fig3_HTML.jpg)


    Figure 10-3


    Updates to an API product


    As shown in Figure [10-4](#509947_1_En_10_Chapter.xhtml#Fig4), updates to internal,
    supporting elements such as microservices are generally minor and iterative. In
    the event of an issue arising from an update, the team will assess the cause,
    impact, and possible resolution. From a culture perspective, our preference is
    to minimize blame by not dwelling too much on the cause. We have found that blame
    results in fear which inhibits the team’s agility. If an issue could have been
    identified during testing, it is taken as a learning for the future. More often,
    the issue is related to data or scenarios unique to the production environment
    which could not be replicated during testing. If the impact is significant service
    degradation, the change is rolled back immediately. A strong DevOps capability
    allows this to be achieved in a matter of minutes. This, too, is also a liberating
    capability that underpins the team’s ability to deliver quickly. If the resolution
    can be achieved quickly and with minimal, preferably zero risk, the Delivery Leads,
    in consultation with the Engineering team, may make the decision to “fix forward.”


    ![../images/509947_1_En_10_Chapter/509947_1_En_10_Fig4_HTML.jpg](images/509947_1_En_10_Chapter/509947_1_En_10_Fig4_HTML.jpg)


    Figure 10-4


    Internal updates'
  trans: '

    ## 运营宇宙


    坦率地说，稳定我们的支持能力一直是我们最大的挑战之一，而且这仍是一项持续进行的工作。项目发起人多年前就预见到了该平台的关键性。遗憾的是，当团队争分夺秒地构建并部署平台时，他睿智的建议并未被采纳，团队秉持的口号是——“*船到桥头自然直*”。随着
    Marketplace 突然被认定为实现全新外部托管数字化体验、并撬动企业内部能力的关键要素，团队几乎在一夜之间被推到了运营聚光灯下。


    就像还在训练中的消防员，平时接到的紧急任务通常只是去救一只被困在树上的猫一样，当团队被要求应对跨越多个下游系统、且此前从未进行过此类运营处理的高流量高价值交易“火海”时，显然准备不足。我们用一个术语来描述这种状态：“支持外科手术（support
    surgery）”，并安排了每日会议，以检查建议策略是否生效，若未生效则及时调整。经过时间积累和大量努力，团队通过提升平台监控能力、定义事件管理流程，以及加深对后端支撑系统的理解并建立更好的运营协作关系，最终打下了坚实的支持基础。


    从这段经历中得到的一个关键启示是：应在项目生命周期尽可能早的阶段，对 Marketplace 支持运营化投入充足且（更重要的是）诚实的关注。在接下来的章节中，我们将讨论支撑运营域的关键概念与方法，并识别其构建所依赖的基础要素——如图
    10-1 所示。


    ![../images/509947_1_En_10_Chapter/509947_1_En_10_Fig1_HTML.jpg](img/509947_1_En_10_Fig1_HTML.jpg)


    图 10-1


    运营子域


    ## 变更与发布管理


    传统上，运营团队通常不太喜欢更新，因为更新会给环境引入风险。对我们的实施而言，效果极佳的一种理念是：高频但小规模发布。正如在阐述开发的章节中所提到的，在一个
    sprint 中可能会有多个并行流，最终在 sprint 结束时部署到生产环境。


    对于新 API 产品这类重大更新，通常会像图 10-2 所示，提前很久发布到生产环境，再开放给第三方使用。通过在发布与使用之间设置缓冲期，团队就有机会在相对低压的状态下验证功能，并在需要时进行更新或修订。我们在上线新功能时，常常会在部署当晚发现还需要额外配置，而且这些配置大多不在我们的控制范围内（例如防火墙或网络访问）。更早部署使团队能够在自己进入关键路径之前识别并解决这些依赖问题。


    ![../images/509947_1_En_10_Chapter/509947_1_En_10_Fig2_HTML.jpg](img/509947_1_En_10_Fig2_HTML.jpg)


    图 10-2


    API 产品的首次发布


    对于较小的产品迭代，如图 10-3 所示，API 版本管理是关键要素。由于 API 产品的不同版本可以并存，何时迁移的决定权交由第三方使用方。前提是各个特定版本都有明确定义的生命周期终点。通过提供详细说明后续版本变更内容的发布说明，我们也向使用方清晰传达了一个信号：出于更好的安全性、稳定性，或新增功能等原因，迁移到新版本可能更符合他们的利益。


    ![../images/509947_1_En_10_Chapter/509947_1_En_10_Fig3_HTML.jpg](img/509947_1_En_10_Fig3_HTML.jpg)


    图 10-3


    API 产品的更新


    如图 10-4 所示，对微服务等内部支撑要素的更新通常是小步迭代式的。若更新引发问题，团队会评估原因、影响和可能的解决方案。从文化角度看，我们倾向于减少归责，不过度纠结于原因本身。我们的经验是，指责会引发恐惧，而恐惧会抑制团队敏捷性。如果某个问题本可在测试阶段识别出来，我们会将其作为未来改进的学习点。更多时候，问题与生产环境中特有的数据或场景相关，这些在测试期间无法复现。若影响表现为显著的服务劣化，则会立即回滚变更。强大的
    DevOps 能力可在几分钟内实现这一点。这同样是一种“解放式”能力，是团队快速交付的重要支撑。如果问题能够快速解决，并且风险很小（最好为零），交付负责人在与工程团队协商后，可能会决定“向前修复（fix
    forward）”。


    ![../images/509947_1_En_10_Chapter/509947_1_En_10_Fig4_HTML.jpg](img/509947_1_En_10_Fig4_HTML.jpg)


    图 10-4


    内部更新

