  trans: '

    ## 计费工程


    在定义了 API 市场中的若干计费策略之后，下面我们来讨论实际落地所需的技术工程。API 产品通常会定义其变现方式——有些可能由第三方付费；有些可能采用收入分成、引荐模式，或免费。这通常由产品负责人（Product
    Owner）与后端支撑系统密切协商后确定。


    同样重要的是识别将如何向消费者计费——第三方是否需要先为账户充值，并在每笔交易时扣费，还是在交易发生后再统一计费并开具发票？无论选择哪种机制，都必须构建一个可服务平台所有
    API 的“计费主干”。所有事件（即使是免费 API）都应进入计费流水线，以用于分析与报表目的，而且不应轻视这一计费能力。在可能的情况下，应复用企业级能力。如果无法实现，请考虑使用托管或管理服务，因为这会带来较高的运维影响。


    事件计费模型（Event Billing Model）的技术流程如图 4-2 所示。


    ![../images/509947_1_En_4_Chapter/509947_1_En_4_Fig2_HTML.jpg](img/509947_1_En_4_Fig2_HTML.jpg)


    图 4-2


    事件计费模型


    事件计费模型中的步骤如表 4-2 所述。


    表 4-2


    事件计费序列


    | 步骤 | 描述 |

    | --- | --- |

    | A | 事件由应用栈中的某个元素生成，通常发生在 API 请求完成时；目前主要来自微服务组件。该事件包含调用明细，包括产品、第三方标识、完成状态、请求与响应载荷以及日期时间。为最小化调用延迟并支持离线处理，事件会被写入数据库
    |

    | B | 事件记录由计费预处理器按批处理计划或触发器读取。批处理计划可在特定时间段内处理大量记录，从而提升处理效率。触发执行则可实现近实时事件处理 |

    | C | 记录会从主数据管理（MDM）、企业产品目录（包含 API 到产品的映射）以及第三方提供商数据库等系统补充附加元数据——后者包含第三方相关的额外配置，例如应计费的账户。由于此过程是异步完成的，因此数据采集不存在时间压力
    |

    | D | 经过富化与中介处理的记录会以预定义格式路由到作为企业服务提供的定价与计费引擎。该能力将处理计费事件并更新第三方账户数据。请注意，关于事件应如何计费的规则已包含在记录中。这种方式使计费预处理器能够影响事件的计费方式
    |

    | E | 该中介记录还会存储在市场中业务支撑应用可访问的数据存储中 |

    | F | 使用富化后的中介记录定期运行自定义报表，以提供平台的近实时计费视图。注意，这些视图可能并非精确的收入数据——但可支撑本章后续讨论的“名义视图”
    |


    近实时计费模型（real-time Billing Model）的技术流程如图 4-3 所示。


    ![../images/509947_1_En_4_Chapter/509947_1_En_4_Fig3_HTML.jpg](img/509947_1_En_4_Fig3_HTML.jpg)


    图 4-3


    实时计费


    *近*实时计费模型中的步骤如表 4-3 所述。


    表 4-3


    实时计费序列


    | 步骤 | 描述 |

    | --- | --- |

    | A | 在处理 API 请求之前，会先发起一笔资金预留调用。这可确保第三方有足够可用额度来服务该请求。在调用当下，确切应计费金额可能尚不明确——系统会按
    API 产品特性预留一个预定义的预算金额。如果无法满足资金预留请求所需的最低金额，则向消费者返回错误 |

    | B | 事件由应用栈中的某个元素生成，通常发生在 API 请求完成时；目前主要来自微服务组件。该事件包含调用明细，包括产品、第三方标识、完成状态、请求与响应载荷以及日期时间。为最小化调用延迟并支持离线处理，事件会被写入数据库
    |

    | C | 事件记录的写入会触发对计费引擎的调用。计费引擎会编排对下述各组件的调用 |

    | D | 首先需要对事件进行费率计算。事件记录会被路由到费率引擎（Rating Engine） |

    | E | 费率引擎会将主数据管理（MDM）、企业产品目录（包含 API 到产品映射）以及第三方提供商数据库（包含第三方额外配置，如计费账户）等系统中的配置数据缓存到内存数据存储中，以获得最佳处理性能。请注意，对于这类账单处理，延迟是关键考量。低延迟可更快处理事件，从而缩小余额更新与后续请求之间的风险时间窗
    |

    | F | 随后，计费后的事件会由扣费组件（Charging element）用于从第三方剩余额度中扣减具体金额。计费后的事件也可能表明不应向第三方扣费——例如
    API 请求未成功处理，或产品属于促销活动。在这种情况下，将释放预留金额 |


    ## 分析与洞察


    在试点实施 API 市场时，借助导航型数据会显著降低难度，且这些数据最好尽可能实时且足够细粒度。按照典型的工程思维，本节最初计划放在“运营”章节中。经过进一步思考，我发现这会暗示“由机舱而不是舰桥来掌舵”。尽管运营指标非常关键，但真正驱动平台方向与目标的是经过*解读*的信息。举例来说，可将“每秒交易数”这一运营指标视为速度指示；但如果缺少补充数据（如产生流量的第三方提供商与
    API 产品）来指示方向，那么这就可能等同于“挂空挡踩油门”——转速很高，却没有向前动能。


    本节旨在强调：需要了解平台的历史航迹与进展，并建立一组当前导航数据（例如位置与当前航向）来规划前路。需要注意的是，舰桥指挥中心控制面板上的所有仪表与表盘并不会在第一天就全部启用。随着工程团队对平台进行埋点或从分散的数据源采集数据、使数据流入，这些指标才会逐步“点亮”。如果产品负责人对所需内容有清晰定义，这种自上而下的方法将引导工程团队。相对地，另一种自下而上、技术驱动的做法，往往只会得到一些随机系统指标——它们或许能在控制面板上组成漂亮的小部件，却无法提供有价值的业务指示。

    '
- fmt: "## Data Collection\n\nAt full flight, there is an almost continuous stream\
    \ of events within the ecosystem of an API Marketplace. Apart from the obvious\
    \ API calls, potential consumers may be raising support tickets from prototyping\
    \ efforts, requests to backend systems may be slowing down, end users could be\
    \ in the final stages of completing a high-value transaction, or unanticipated\
    \ loads could be originating from a last-minute campaign. A key objective is to\
    \ capture as much of this data as possible – efficiently, consistently, and reliably.\n\
    \nFrom years of experience in various integration domains, and taking inspiration\
    \ from a medical triage process, we have implemented a Sensor and Probe strategy,\
    \ illustrated in Figure [4-4](#509947_1_En_4_Chapter.xhtml#Fig4). For elements\
    \ we have direct control over, such as the Application Stack, explicit sensors\
    \ have been attached to key process flows. These publish well-defined events providing\
    \ granular information regarding the request – such as the third-party identifier\
    \ and transaction value. When the event is received, it still needs to be supplemented\
    \ with additional metadata – such as resolution of the name of the third party,\
    \ given the identifier.\n\n![../images/509947_1_En_4_Chapter/509947_1_En_4_Fig4_HTML.jpg](`images/509947_1_En_4_Chapter/509947_1_En_4_Fig4_HTML.jpg`)\n\
    \nFigure 4-4  \nData collection strategy\n\nThere are many instances where the\
    \ data is captured in external systems. For these, we use a probing strategy.\
    \ The Service Desk, which is used to capture customer interactions, contains a\
    \ wealth of information and is an example of such an entity. Requests from potential\
    \ third parties for access to API products or additional information is valuable\
    \ Lead data. Support requests regarding service outages or transaction tracing\
    \ are equivalently vital as they represent interactions which may provide Retention\
    \ value. As the data is stored in an enterprise hosted application, a probing\
    \ mechanism, in the form of a custom application, has been built by the technical\
    \ team to query and extract the interactions. This approach has also been used\
    \ to parse and extract application and audit data to expedite access in some instances\
    \ where additional information was urgently required.\n\nIt is important to survey\
    \ the landscape to identify the various participants and sources of information\
    \ and define a strategy regarding how the data may be harvested.\n\n## Data Analysis\n\
    \nEarly in my career, when tasked with providing Analytics for an integration\
    \ platform my team supported, I pursued this task with a technical orientation.\
    \ I was obsessed with gauging low-level metrics, such as requests per flow, and\
    \ instrumented the platform and application to leave a trail of data that was\
    \ ingested into a database. Unfortunately, my elation and pride in watching the\
    \ data stream in was soon replaced by despair as I attempted to structure queries\
    \ to interpret the data to determine any meaningful pattern. From this experience,\
    \ my basic understanding is that context is key to analytical information, and\
    \ a single analytical data point is generally made up by several underlying metrics,\
    \ as shown in Figures [4-5-1](#509947_1_En_4_Chapter.xhtml#Fig5) and [4-5-2](#509947_1_En_4_Chapter.xhtml#Fig6).\n\
    \n![../images/509947_1_En_4_Chapter/509947_1_En_4_Fig6_HTML.jpg](`images/509947_1_En_4_Chapter/509947_1_En_4_Fig6_HTML.jpg`)\n\
    \nFigure 4-5-2  \nAnalytics target\n\n![../images/509947_1_En_4_Chapter/509947_1_En_4_Fig5_HTML.jpg](`images/509947_1_En_4_Chapter/509947_1_En_4_Fig5_HTML.jpg`)\n\
    \nFigure 4-5-1  \nAnalytics source\n\nThis is exactly the Analytics view requested\
    \ by the Project Executive. Note that for each indicator, there are several dimensions.\
    \ Let us examine some indicators across various dimensions to establish how it\
    \ could be used:\n\n- `# of users`: (i) Number of unique end user requests to\
    \ determine customer adoption of third-party products and services, (ii) by third-party\
    \ provider to rank consumers of the platform, (iii) in a defined time period to\
    \ forecast future traffic for a specific provider. This information can be used\
    \ to identify providers who could potentially generate higher traffic and possibly\
    \ revenue.\n- `# of completed transactions`: (i) For a specific API product to\
    \ determine revenue generated, (ii) by third-party provider, again to rank consumers\
    \ of the platform, (iii) in a defined time period to understand if the traffic\
    \ was a burst or sustained.\n\nThis information is crucial to understanding the\
    \ platform, from different perspectives. Not only can high-traffic APIs be easily\
    \ spotted, but it is also possible to drill into the exact operations to understand\
    \ how the product is used. It can also guide your third-party acquisition strategy.\
    \ As an example, most of the traffic from a single consumer could be a risk indicator\
    \ that more anchors are required for platform longevity. Conversely, little traffic\
    \ from many consumers may be an indicator that the platform has not established\
    \ deep roots within any third party. These hypotheses and conjectures are made\
    \ possible by having key data available across various dimensions over different\
    \ periods of time."
  raw: '### Data Collection


    At full flight, there is an almost continuous stream of events within the ecosystem
    of an API Marketplace. Apart from the obvious API calls, potential consumers may
    be raising support tickets from prototyping efforts, requests to backend systems
    may be slowing down, end users could be in the final stages of completing a high-value
    transaction, or unanticipated loads could be originating from a last-minute campaign.
    A key objective is to capture as much of this data as possible – efficiently,
    consistently, and reliably.


    From years of experience in various integration domains, and taking inspiration
    from a medical triage process, we have implemented a Sensor and Probe strategy,
    illustrated in Figure [4-4](#509947_1_En_4_Chapter.xhtml#Fig4). For elements we
    have direct control over, such as the Application Stack, explicit sensors have
    been attached to key process flows. These publish well-defined events providing
    granular information regarding the request – such as the third-party identifier
    and transaction value. When the event is received, it still needs to be supplemented
    with additional metadata – such as resolution of the name of the third party,
    given the identifier.


    ![../images/509947_1_En_4_Chapter/509947_1_En_4_Fig4_HTML.jpg](images/509947_1_En_4_Chapter/509947_1_En_4_Fig4_HTML.jpg)


    Figure 4-4


    Data collection strategy


    There are many instances where the data is captured in external systems. For these,
    we use a probing strategy. The Service Desk, which is used to capture customer
    interactions, contains a wealth of information and is an example of such an entity.
    Requests from potential third parties for access to API products or additional
    information is valuable Lead data. Support requests regarding service outages
    or transaction tracing are equivalently vital as they represent interactions which
    may provide Retention value. As the data is stored in an enterprise hosted application,
    a probing mechanism, in the form of a custom application, has been built by the
    technical team to query and extract the interactions. This approach has also been
    used to parse and extract application and audit data to expedite access in some
    instances where additional information was urgently required.


    It is important to survey the landscape to identify the various participants and
    sources of information and define a strategy regarding how the data may be harvested.


    ### Data Analysis


    Early in my career, when tasked with providing Analytics for an integration platform
    my team supported, I pursued this task with a technical orientation. I was obsessed
    with gauging low-level metrics, such as requests per flow, and instrumented the
    platform and application to leave a trail of data that was ingested into a database.
    Unfortunately, my elation and pride in watching the data stream in was soon replaced
    by despair as I attempted to structure queries to interpret the data to determine
    any meaningful pattern. From this experience, my basic understanding is that context
    is key to analytical information, and a single analytical data point is generally
    made up by several underlying metrics, as shown in Figures [4-5-1](#509947_1_En_4_Chapter.xhtml#Fig5)
    and [4-5-2](#509947_1_En_4_Chapter.xhtml#Fig6).


    ![../images/509947_1_En_4_Chapter/509947_1_En_4_Fig6_HTML.jpg](images/509947_1_En_4_Chapter/509947_1_En_4_Fig6_HTML.jpg)


    Figure 4-5-2


    Analytics target


    ![../images/509947_1_En_4_Chapter/509947_1_En_4_Fig5_HTML.jpg](images/509947_1_En_4_Chapter/509947_1_En_4_Fig5_HTML.jpg)


    Figure 4-5-1


    Analytics source


    This is exactly the Analytics view requested by the Project Executive. Note that
    for each indicator, there are several dimensions. Let us examine some indicators
    across various dimensions to establish how it could be used:


    *   **# of users**: (i) Number of unique end user requests to determine customer
    adoption of third-party products and services, (ii) by third-party provider to
    rank consumers of the platform, (iii) in a defined time period to forecast future
    traffic for a specific provider. This information can be used to identify providers
    who could potentially generate higher traffic and possibly revenue.


    *   **# of completed transactions**: (i) For a specific API product to determine
    revenue generated, (ii) by third-party provider, again to rank consumers of the
    platform, (iii) in a defined time period to understand if the traffic was a burst
    or sustained.


    This information is crucial to understanding the platform, from different perspectives.
    Not only can high-traffic APIs be easily spotted, but it is also possible to drill
    into the exact operations to understand how the product is used. It can also guide
    your third-party acquisition strategy. As an example, most of the traffic from
    a single consumer could be a risk indicator that more anchors are required for
    platform longevity. Conversely, little traffic from many consumers may be an indicator
    that the platform has not established deep roots within any third party. These
    hypotheses and conjectures are made possible by having key data available across
    various dimensions over different periods of time.'
  trans: '

    ### 数据采集


    在全面运行状态下，API Marketplace 生态系统内几乎会持续不断地产生事件流。除了显而易见的 API 调用之外，潜在消费者可能正在基于原型开发提交支持工单，发往后端系统的请求可能正在变慢，终端用户可能正处于完成高价值交易的最后阶段，或是来自临时营销活动的突发负载也可能正在产生。一个关键目标是尽可能多地捕获这些数据——并且要做到高效、一致、可靠。


    基于多年在各类集成领域的经验，并借鉴医疗分诊流程，我们实施了传感器（Sensor）与探针（Probe）策略，如图 4-4 所示。对于我们可直接控制的要素（如应用栈），我们在关键流程上显式挂载了传感器。这些传感器会发布定义良好的事件，提供关于请求的细粒度信息——例如第三方标识符和交易金额。当事件被接收后，仍需要补充额外元数据——例如根据该标识符解析出第三方名称。


    ![../images/509947_1_En_4_Chapter/509947_1_En_4_Fig4_HTML.jpg](img/509947_1_En_4_Fig4_HTML.jpg)


    图 4-4


    数据采集策略


    在很多场景中，数据是由外部系统捕获的。对此，我们采用探针策略。用于记录客户交互的服务台（Service Desk）包含大量信息，就是此类实体的一个示例。潜在第三方关于访问
    API 产品或获取更多信息的请求，是有价值的 Lead 数据。关于服务中断或交易追踪的支持请求同样至关重要，因为它们代表了可能带来 Retention 价值的交互。由于数据存储在企业托管应用中，技术团队构建了一个探测机制（以自定义应用形式存在），用于查询并提取这些交互数据。在某些急需补充信息的场景中，这种方法也被用于解析并提取应用数据和审计数据，以加快访问速度。


    对整体环境进行盘点、识别各类参与方与信息来源，并制定数据采集策略（明确如何获取数据）是非常重要的。


    ### 数据分析


    在我职业生涯早期，当我被要求为团队所支持的一个集成平台提供 Analytics 时，我是从技术导向的角度来推进这项工作的。我曾痴迷于衡量底层指标，例如每条流程的请求量，并对平台和应用进行了埋点，以留下可被摄取到数据库中的数据轨迹。遗憾的是，当我尝试构建查询来解读数据、判断是否存在有意义的模式时，最初看着数据流不断涌入的兴奋与自豪，很快被沮丧所取代。从这段经历中，我得到的基本认知是：上下文是分析信息的关键，而一个分析数据点通常由多个底层指标构成，如图
    4-5-1 和 4-5-2 所示。


    ![../images/509947_1_En_4_Chapter/509947_1_En_4_Fig6_HTML.jpg](img/509947_1_En_4_Fig6_HTML.jpg)


    图 4-5-2


    分析目标


    ![../images/509947_1_En_4_Chapter/509947_1_En_4_Fig5_HTML.jpg](img/509947_1_En_4_Fig5_HTML.jpg)


    图 4-5-1


    分析来源


    这正是项目高管所请求的 Analytics 视图。请注意，每个指标都包含多个维度。我们来跨不同维度检查一些指标，以说明它可以如何使用：


    *   **用户数（# of users）**：（i）唯一终端用户请求数，用于判断客户对第三方产品和服务的采用情况；（ii）按第三方提供方划分，用于对平台消费者进行排名；（iii）在定义时间段内统计，用于预测特定提供方的未来流量。这些信息可用于识别可能带来更高流量及潜在更高收入的提供方。


    *   **已完成交易数（# of completed transactions）**：（i）针对某个特定 API 产品，用于确定其产生的收入；（ii）按第三方提供方划分，同样用于对平台消费者进行排名；（iii）在定义时间段内统计，用于理解该流量是突发性还是持续性。


    这些信息对于从不同视角理解平台至关重要。它不仅能轻松识别高流量 API，还能下钻到具体操作层面，了解产品是如何被使用的。它也可以指导你的第三方引入策略。例如，若大部分流量来自单一消费者，这可能是一个风险信号，意味着为了平台的长期稳定需要更多“锚点”客户。相反，若许多消费者的流量都很少，可能表明平台尚未在任何第三方内部建立深层次黏性。之所以能够提出这些假设与推断，正是因为在不同时段、跨多个维度具备了关键数据。

    '
- fmt: '## Reporting


    With maturity of the platform, more high-value API products and the requirement
    of providing mission-critical support to key third parties, our team has implemented
    the following mechanisms to provide visibility into platform activity:


    - Dashboards: As shown in Figure [4-6](#509947_1_En_4_Chapter.xhtml#Fig7) and
    described in Table [4-4](#509947_1_En_4_Chapter.xhtml#Tab4). In much the same
    way that your car’s instrumentation panel provides a wide range of information,
    your focus is typically on the speedometer but is drawn to other indicators, such
    as the fuel level, which has an influence on the speed of the vehicle. The dashboard
    below, at first glance, may appear to have an explosion of metrics. Typically,
    the Product or Business Owner will focus on a specific metric and if this is not
    within defined parameters, will then examine other values to determine how it
    could have impacted the primary metric. The value of dashboards is in providing
    key metrics for the platform, but also details regarding factors or conditions
    which could impact the platform.

    - Email: Snapshots of the dashboard are sent to key product stakeholders hourly
    via email. In addition, notification of the successful completion of high-value
    transactions is also distributed to the product team. I have been quite surprised
    to see queries from senior commercial staff asking if there are technical outages
    if the number of completed transactions are low or excited, congratulatory messages
    for high-value transactions. This is an indication that the regularly distributed
    messages are indeed being reviewed and used by the commercial team and the API
    is recognized as a key revenue channel.

    - Bi-hourly instant messages from the Operational Support team detailing system
    stability and successfully completed transactions for key API products. Again,
    if the numbers are uncharacteristically low, questions are raised regarding the
    availability of supporting systems and downstream providers.


    ### Table 4-4


    Reporting dashboard metrics


    | Metric | Description |

    | --- | --- |

    | Total visitor count | Number of unique users accessing the application (portal
    or API) |

    | Leads created | Users who completed the basic information step/form requesting
    further information. Those that did not proceed further may be contacted telephonically
    by sales agents |

    | ID statistics | Number of identity document uploaded, successfully processed,
    and failures due to OCR. Failed requests are interrogated to determine if there
    was a problem with the uploaded image or a system failure |

    | Transaction statistics | Number of detailed transactions and associated states
    calculated, declined, failed, and accepted – based on process execution logic
    |


    ![../images/509947_1_En_4_Chapter/509947_1_En_4_Fig7_HTML.jpg](`images/509947_1_En_4_Chapter/509947_1_En_4_Fig7_HTML.jpg`)


    ### Figure 4-6


    Sample dashboard


    The key to a successful reporting strategy is to provide specific, pertinent data,
    which can be pulled (via web) or pushed (via email or instant message) in a format
    which can be quickly understood and interrogated by the target audience.


    ## The Notional Income Statement


    The Notional Income Statement is a key construct of our Marketplace which fulfills
    several functions. In a term coined by the project executive, it is a measure
    of the overall profitability at a channel capability level. As a Marketplace may
    have a range of products, some which may generate revenue, others which are regulated
    to be free, it helps to understand value across all products.


    As a market maker, essentially brokering an interaction between consumer and provider,
    there are occasions when it may be a challenge to demonstrate value. After all,
    there are expenses to keep the platform running – infrastructure, software, developers,
    support engineers, Product Owners, and Delivery Leads to pay. As the revenue for
    a transaction will most likely be recognized by the backend service provider,
    it may result in the Marketplace categorized as an internal “Cost Center,” Unfortunately,
    implicit value such as establishing a digital brand or empowering third parties
    means little to Financial Officers who simply look at the bottom line.


    This phenomenon may be hugely frustrating for the team as business units which
    bring in more revenue generally receive higher budget allocations and recognition.
    Not content with simply being viewed as a “Cost Center” and wanting the organization
    to understand the contribution and importance of the Marketplace initiative, the
    project executive has wisely established a measure of “notional value.”


    The magnification of the Income Statement lens is increased to constantly scrutinize
    the performance of each API product. At inception, Product and Business owners
    may make assumptions which influence the decision to build the specific API. Once
    built, regular measurement is required to determine the product health. Assumptions,
    such as projected traffic volumes or third-party adoption, are constantly validated.
    Platform scale and infrastructure is also thrust under the spotlight to identify
    if this could be an impediment to the product’s success. The ongoing measurement
    helps to gauge if a product is approaching a stage of limited returns which may
    require remediation or a decision to retire.


    Understanding of specific products at this granular level provides deeper insight
    into Total Cost of Ownership (TCO). Some products, which may be more successful,
    may require higher levels of support and monitoring and should carry a higher
    proportion of the operational cost to run the platform. The detail of the line
    of the Income Statement allows a quantitative measure for each product.


    Finally, adopting an Income Statement as our standard mechanism of measurement
    provides a significant advantage for reviews and assessments by executive committees
    who typically have a financially focused mindset. This process removes qualitative
    or “gut-feel” sentiment regarding the Marketplace and uses a quantitative approach
    to clearly understand the financial position. In some circumstances, this may
    signal a need to pivot to ensure longevity of the initiative. This is discussed
    next.'
