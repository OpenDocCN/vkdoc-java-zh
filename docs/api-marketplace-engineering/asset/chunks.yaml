    \ the *Client*.\n\n8.  Upon redirection to the *Client*, the status of the Authorization\
    \ request is determined – an *Authorization Code* if successful, an *error* if\
    \ not.\n\n9.  If successful, the *Client* initiates a request for an *Access Token*\
    \ providing\n    1.  Credentials: *Client ID* and *Secret*\n\n    2.  *grant type*\
    \ of `authorization_code`\n\n    3.  *Authorization Code*\n\n    4.  Redirect\
    \ URI: Must match what is configured for the Application\n\n10.  The *Resource\
    \ Server* will locate the Application referenced by the *Client ID*, verify that\
    \ the *Secret* and redirect URI matches, and if a valid *Authorization Code* is\
    \ provided, will return an *Access Token*.\n\n11.  The *Access Token* returned\
    \ will contain a *refresh_token* property.\n\n12.  The *access_token* can be used\
    \ to make calls to APIs – to which the registered Application is subscribed to.\n\
    \n### Refresh Token\n\nAs an Access Token is generally valid for short periods\
    \ of time, typically an hour, the Refresh Token *grant type* is used to access\
    \ resources for extended periods. This also saves the end user the inconvenience\
    \ of having to re-authenticate and re-authorize once the Access Token expires.\
    \ It is important to note that in some scenarios, such as a once-off Payment,\
