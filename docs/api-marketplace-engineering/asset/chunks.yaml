    the initial API revision, it may create momentum to convince backend enterprise
    teams to expose further functionality. It may be tricky but try to keep the product
    roadmap flexible – more popular or requested features should be allowed to bubble
    up to the top of the backlog. A key mantra, highlighted in the chapter on Consumption
    is – *without third-party consumption, there would be no traffic. No traffic,
    no revenue. Revenue sustains the Marketplace which exists to achieve the Vision.*
    Third-party and developer reception and feedback is a crucial element of the Design
    process.


    ### Versioning


    One of the greatest advantages of an API is that multiple versions can exist simultaneously.
    I will highlight at the outset that this is by no means a license for poor design.
    Care and consideration must always be taken when publishing an API. Versioning
    essentially decouples consumer and provider and allows both to continue on their
    own release trajectory. If the functionality from a specific version continues
    to satisfy the requirements of the consumer, there may be no need to move to a
    later update. Newer versions of the API also allow the provider to publish additional
    functionality which can be adopted by a subset of consumers.


    Most API Gateways provide this capability natively, and the complexity of different
    versions is handled at this level in the stack. Minor revisions are updates to
    an API with no breaking interface changes, and on each deployment, all API consumers
    are automatically subscribed to the updated product. If there are changes which
    will require an update from a consumer, a new product is created which will require
    subscription and update of endpoint configuration.


    It is also important to consider the changes to the Developer Portal and supporting
    documentation when adding a new API version. As the maturity of your platform
    grows, Release Notes detailing the change for every update – from minor to intermediate
    to major – should be published. This is also a signal regarding the transparency
    of the Marketplace to your external developer community.


    An approach which has helped our implementations immensely is providing early
    access to new versions to only a subset of external consumers. This not only allows
    us to determine consumption behavior, but to also determine gaps in coverage –
    be it in API functionality, documentation, or understanding. Be warned that this
    is also a time-consuming activity as it is often a many to one effort. The many
    in this case is many members of the delivery team to the one external developer
    who could not consume the API due to a misspelt variable.


    On a final note, I would like to highlight that the identity of an API should
    stay the same. Versioning should be used like different lenses of a telescope
    to adjust contrast and focus to bring the product into better view. If there is
    a significant difference or change in direction of the product, it may be prudent
    and more responsible to your consumers to create a variant or possibly a new product.'
  trans: '

    ## 生命周期


    设计过程代表了 API 产品的胚胎阶段；它将成长、变化、老化，并最终走向终止。如果我们以这种方式看待 API 产品，就能获得让其持续演进并不断改进的灵活性。对接口的变更应当谨慎进行，因为这会影响
    API 的使用方。还有其他一些维度也需要考虑，而且这些维度既可以也应该发生变化。我们将在以下章节讨论其中一部分。


    ### 开发者体验


    来自 API 真实使用者的反馈，是设计流程中极其关键的输入。一个由后端团队、法务与合规部门批准，并由技术团队交付、但对终端用户几乎没有价值的 API 产品，只会被束之高阁，等待“最佳使用期”到期。遗憾的是，我们的
    Marketplace 中确实有属于这一类的 API 产品。在构建 API 的过程中，很容易掉入“只要你构建了，他们就会来”的陷阱。一个早期预警信号是：很难找到
    API 能支持的真实用例。请站在第三方使用者的角度，严格评估它是否真的能帮助你达成某个明确结果。如果你自己都难以完成这项评估，那么第三方很可能也会遇到同样的问题。


    应尽早向潜在第三方征求关于需求和采用意愿的反馈。在 Marketplace 的早期阶段，这可能会有挑战，因为开发者社区本身仍在形成中。第三方采用也是流程的第一步，而这种关系需要持续投入和维护。在初始阶段，可通过文档、指南和教程帮助对方理解
    API 的功能与用法。随着采用率提升、API 获得更多认可，可以为 API 产品增加更多能力。例如，一个保险 API 产品可能先从提供个人保险保障报价开始。后续迭代可加入报价接受与保单签发。再之后，还可加入其他保障类型。也可以考虑增加理赔记录相关的修订与更新能力。


    正如这个例子所示，与其等待完整产品集全部可用，不如尽快发布 API 产品的一个修订版本。定义一个功能与特性上线时间的路线图会是加分项，但不一定是关键前置条件。也就是说，如果初始
    API 修订版本已经获得了强劲的第三方采用，这种势头可能会推动后端企业团队开放更多功能。这并不容易，但请尽量保持产品路线图的灵活性——更受欢迎或被频繁请求的功能，应当能够优先进入待办列表顶部。正如
    Consumption 章节强调的一条关键原则：*没有第三方消费，就不会有流量。没有流量，就没有收入。收入维系 Marketplace，而 Marketplace
    的存在是为了实现愿景。* 第三方与开发者的接受度及反馈，是设计流程中至关重要的组成部分。


    ### 版本管理


    API 最大的优势之一是可以同时存在多个版本。我首先要强调，这绝不意味着可以为糟糕设计开绿灯。发布 API 时始终都要保持谨慎并进行充分考量。版本管理本质上将使用方与提供方解耦，使双方都能沿各自的发布节奏前进。如果某个特定版本的功能仍能满足使用方需求，那么就不一定需要迁移到后续更新。API
    的新版本也使提供方能够发布额外功能，并由一部分使用方率先采用。


    大多数 API Gateway 原生提供此能力，不同版本带来的复杂性通常在这一层栈中处理。小版本修订是对 API 的更新，不包含破坏性接口变更；每次部署后，所有
    API 使用方都会自动订阅到更新后的产品。如果存在需要使用方进行更新的变更，则会创建一个新产品，使用方需要重新订阅并更新端点配置。


    在新增 API 版本时，也必须考虑 Developer Portal 和配套文档的相应变化。随着平台成熟度提升，应发布每次更新的 Release Notes，覆盖从小版本到中版本再到大版本的变更细节。这也是向外部开发者社区传递
    Marketplace 透明度的一个信号。


    一种对我们的实施帮助极大的做法是：仅向一部分外部使用者提供新版本的早期访问权限。这不仅能帮助我们判断消费行为，也能识别覆盖缺口——无论是 API 功能、文档，还是理解层面上的缺口。需要提醒的是，这同样是非常耗时的工作，因为它往往是“多对一”的投入。这里的“多”，指的是交付团队中的许多成员，需要共同支持那“一位”因变量拼写错误而无法消费
    API 的外部开发者。


    最后我想强调，API 的身份应保持不变。版本管理应像望远镜的不同镜片，用于调整对比度与焦距，让产品呈现得更清晰。如果产品存在显著差异或方向变化，那么创建一个变体，甚至一个全新产品，可能是对使用方更审慎、也更负责的做法。

    '
- fmt: '## End of Life


    A recent mail I received from a Development Manager of a backend team had me gob
    smacked. It read as follows:


    - Subject: Decommissioning `<System> API v1` and `<System> SOAP v5, v6, v7`

    - Message:

    - Hello Everyone,

    - We are planning to decommission old version of `<System>` SOAP and API versions
    in Prod on `<date – in 10 days>`.

    - These are currently disabled in DEV, TST and QA for more than a month.

    - Should you have any concern decommissioning of these versions, kindly contact
    myself and…


    My first reaction was one of panic as I frantically checked the latest code in
    our integration component to determine the versions our Platform consumed. This
    soon gave way to relief as I found we were fortunately using API `v3` and SOAP
    `v8`, respectively. As the jolt of adrenalin dissipated, relief was replaced by
    anger. Although our platform was safe, for now, this was extremely poor service
    from a key southbound provider. Consider an application using an older version
    of the API in a production environment which did not have the need to test within
    the last month. If this application was in operational mode without a development
    capability, they would be in for a rude awakening in just 10 days!


    This was extremely callous and irresponsible behavior from the provider. If there
    was a pressing need to retire the older versions of the interface in a short space
    of time, it is the responsibility of the provider to draw a list of consumers
    – from API subscriptions or security access configuration and then contact each
    one directly to confirm the older version can be retired. Sending an email announcing
    the retirement of an API version in 10 days is simply not an acceptable practice.


    This is an example of the consequence of an API built off the cuff, possibly to
    satisfy a specific consumer requirement, without a defined lifecycle. The date
    of end of support/retirement of an API must be clearly defined at the moment of
    its birth, when it is published or when a new version is released. This follows
    the practice of any commercial software release. It is an indication by the provider
    of their commitment to support the product until that specific time and allows
    the consumer to plan migration off that version. I believe that this demonstrates
    maturity and is the basis of trust which is a key foundational element of your
    API Marketplace.


    Keep in mind that a third-party consumer is making a significant decision to use
    your APIs for their application, product, or service. There will most likely be
    funding for development at the start of their journey. By providing clear information
    regarding the timeline for availability of the API, the consumer can factor this
    information into financial, business, and development planning.


    ## Design Guidelines


    In much the same way that an apprentice gets more adept and skilled with experience
    and under the tutelage of a mentor, your team will fast become better at defining
    APIs. As part of this process, there are generally accepted guidelines and standards
    to be considered. These are platform and product agnostic and can be applied to
    almost any definition. There are great examples and references of API Platforms,
    from Twilio to Facebook to Google. These can be used as a guideline when defining
    the standards and conventions for your Marketplace. We consider a subset of these
    guidelines in the sections below.


    ### Error Handling


    Returning error information to a consumer is a key element of an API. HTTP status
    codes, as detailed below, are generally considered the best practice to return
    the execution result of an API call:


    - Success: Successful processing of a request is indicated by a `2xx` HTTP response
    code. The `200 OK` code is most popular. Other codes such as `201` indicate creation
    of a resource, and `204` indicates that a request was successfully processed,
    but no results were found.

    - Client errors: Client errors are indicated by a `4xx` HTTP response code. Client
    errors indicate a problem with the client request, such as missing required parameters
    or an authentication failure. The issue must be fixed in the client application
    and submitted again.

    - Server errors: Server errors are indicated by a `5xx` HTTP response code and
    need to be resolved by the provider. This could be due to a downstream system
    outage. The client can resubmit/retry the request until it succeeds.


    As a point of departure, you can start with the following and add on as required:


    - `200` – OK

    - `400` – Bad Request

    - `500` – Internal Server Error


    Status codes are intended to be consumed by machines. Messages providing more
    information regarding the error should also be included. Try to include as much
    detail regarding the issue as possible.


    For example, if the request could not be processed due to a missing required parameter,
    specify the name of the parameter(s) which were missing. This will not only help
    the developer determine the root cause but also save your Support team from fielding
    a potential request for assistance.


    Be careful not to bleed internal system information in the response message. For
    example, including a stack trace in your error message. This compromises your
    API as it exposes internal implementation details and could also be a potential
    security risk.


    ### Filtering and Pagination


    Always attempt to engineer the interface for performance. Ever increasing network
    and CPU speeds may result in the development of interfaces which could burden
    consumers by returning large datasets and providers with wide-ranging queries.
    From my time in an Operational middleware environment, I have learnt that the
    threads servicing requests are finite. As a request comes in, a worker from a
    pool of threads is assigned to process it. You need to do your best to ensure
    that the worker returns to the pool as quickly as possible to be able to service
    more requests. If all workers get busy, requests start to queue. Keep in mind
    that the consumer considers the request as active from the moment it is initiated.
    If a request is in a queue before it can be processed, it could result in timeouts
    to the consumer.


    The DevOps engineer on the team is about to interject with the argument that a
    containerized platform can easily scale to manage high traffic conditions. This
    is a fair point but consider the scenario from the backend provider perspective.
    This provider may not have the luxury of a scaling containerized platform and
    could also be servicing requests from several other channels. A burst of requests
    from your Marketplace could result in high system load, failed transactions, and
    possibly system outages. As an API designer, one of your most important responsibilities
    is to not only protect your platform, but also supporting platforms.


    The mechanisms to achieve this and increase performance is to specify request
    filters and paginate responses. Filters can help prevent broad queries from reaching
    downstream systems. Limits and offsets make it easy for developers to paginate
    objects. This will also lead to more predictable execution times as processing
    is not linked to the size of the dataset or complexity of the query.'
