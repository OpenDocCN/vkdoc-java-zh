  trans: '

    ### 治理


    治理是另一个可能让敏捷开发者感到畏惧的话题。然而，它会为团队将要构建的 API 以及 Marketplace 将要承载的内容带来巨大且广泛的收益。应尽可能早地在开发生命周期中考虑治理，并持续推进。我相信你会同意，几乎没有什么事情比看到一个你投入了大量时间和精力的项目或倡议，因不合规而被搁置更令人沮丧了。在我们的组织中，企业架构（EA）团队的职责是确保解决方案按照企业的特定方向进行设计和构建。


    我们与 EA 能力之间的关系经历了一次蜕变，这种变化与平台成熟度成反比。让我解释一下这句话。在 MVP 阶段，我们尽最大努力绕开治理和企业架构师。主要原因是
    Marketplace 倡议，更不用说其底层技术，与组织通常所做的事情相距甚远，以至于我们担心某天早上来上班时会发现工位被官僚主义的红色警戒线围了起来。我仍清楚地记得我们第一次在解决方案对齐论坛（Solution
    Alignment Forum）上的提交，当时我们获取部分批准的策略是将该倡议标记为“Research & Development”。也就是说，我们被允许继续推进，但仅限于“实验室条件”，并被严格要求返回进行进一步审批。


    随着时间推移，我们发现架构评审流程中的洞见与建议，使我们能够更高效地推进交付中的其他领域。例如，获得使用文档型数据存储的批准，使我们得以使用一项企业级服务。


    我们已经学会并仍在学习如何更高效地应对设计评审流程。关键原则是尊重与谦逊。尊重流程——这些治理结构对交付团队而言也许显得繁琐，但其存在是为了保护企业。尊重企业架构师——有时他们的问题和反馈看起来完全脱离上下文，但事后看来却为我们在运维环境中节省了大量时间。谦逊是我们治理之旅核心中最重要的特质之一。能够吸收反馈并做出必要调整，最终将形成一个与企业标准保持一致的平台。


    通过成熟度与认知提升的过程，项目如今会为设计评审的充分准备分配足够时间。此外，我们还寻求了一位首席架构师（Lead Architect）的协助，他作为提交过程的“引导者”，在正式汇报日期前，帮助其在多轮内部更新及关键企业架构师评审中顺畅流转。这也帮助我们的项目团队和
    Marketplace 与企业建立了更深层的连接。


    ## 访问机制


    API 可以通过多种方式访问。SOAP（Simple Object Access Protocol）和 REST（Representational State
    Transfer）都是 Web 服务通信协议。也有像 GraphQL 这样令人兴奋的可选方案。应根据访问 API 的消费者或客户端类型、编程语言、环境以及应用需求来确定采用何种方式。


    你的 Marketplace 最好具备多种可选方案，并在设计阶段拥有选择最优方案的能力与灵活性。公共 API 中很大一部分是 REST API。我建议你在
    Marketplace 中发布的首批 API 采用 RESTful，因为有大量资源和参考站点可用于对标。在本节中，我们将讨论并对比不同的访问机制。


    ### SOAP


    SOAP 将应用逻辑的组件以服务而非数据的方式暴露出来。它与编程语言、平台和传输方式无关。作为一项成熟的万维网联盟（W3C）标准，它在错误处理和自动化方面具备预构建的可扩展性。通过其他协议和技术，它也具有很强的扩展能力。


    除了 WS-Security 之外，它还支持 WS-Addressing、WS-Coordination、WS-Reliable Messaging 以及其他一系列
    Web 服务标准。如果你需要更强健的安全性，WS-Security 支持可为数据隐私和完整性提供额外保障，并支持通过中介进行身份验证，而不仅仅是 SSL 所提供的点对点方式。另一个优势是它提供内建重试逻辑，以补偿通信失败。但这也有代价：它是
    Web 服务访问中更“重量级”的选择，并且由于使用复杂的 XML 格式，往往速度较慢。


    ### REST


    RESTful API 是一种 API 架构风格，它使用 HTTP 请求来访问和使用数据。REST 中的对象被定义为可寻址的 URI，并通过 HTTP 的内建动词进行交互——具体来说，GET
    用于读取，POST 用于创建，PUT 用于更新，DELETE 用于删除等。其核心概念是一切皆资源。由于它与 HTTP 紧密对齐，几乎可在 Web 的任何地方使用，并且在通过互联网公开
    API 时被广泛采用。


    REST 支持更多样的数据格式，结合 JavaScript Object Notation（JSON）后，通常被认为更易于使用，因为学习曲线更平缓。它对浏览器客户端支持更好，也不需要昂贵工具即可使用。作为一种更高效的方法，它通常比
    SOAP 更快、占用带宽更少。


    ### GraphQL


    GraphQL 是一种用于 API 的开源查询语言，由 Facebook 于 2012 年作为数据获取 API 开发。自 2016 年开源以来，它的人气不断增长。图（graph）指的是更复杂且具有关联关系的资源。获取复杂图结构需要客户端与服务器之间多次往返。因此，REST
    API 常常会导致过度获取/不足获取。过度获取是指获取的数据多于所需；不足获取则相反，指获取时返回的数据不够。


    GraphQL 则围绕模式（schema）、查询（queries）和解析器（resolvers）构建，其目标是改进 REST：允许客户端请求特定的数据片段，而不只是整个数据块。你无需处理冗长的数据流——你只会得到你请求的内容。而你请求的内容还可以由多个不同的
    REST API 组合而成。REST 在瘦客户端场景下表现良好，例如托管在浏览器中的 Web 应用，因为主要处理工作在服务器端完成。GraphQL 则利用了更强大客户端的能力，例如承载应用程序的移动设备。


    ## 模式


    API 产品就像一座冰山，只有约百分之十露出水面，庞大的部分隐藏在水下。第三方只能看到打磨完善、已发布的接口及相关文档。产品的核心——可能更为复杂——位于实现层。构建产品有多种方法，以下内容绝非穷尽列表。随着你的
    Marketplace 成熟与演进，你会加入自己的变体，以满足组织的独特需求。人们很容易陷入将产品归类到某一特定模式的纠结中。请尽量避免这一陷阱。作为数字平台，产品不一定要遵循经典架构惯例。正因如此，平台才能具备敏捷性和灵活性。简而言之，让产品“跳出框线”去发挥。

    '
- fmt: "## Synchronous\n\nOur first microservices were built using a Digital Integration\
    \ framework which was geared for integration into a single backend as illustrated\
    \ in Figure [7-2](#509947_1_En_7_Chapter.xhtml#Fig2). Back then, it was completely\
    \ plausible that there was only one backend to integrate to. After all, the pure\
    \ definition of a microservice is an atomic unit of function. In the early phases\
    \ of the platform, this pattern served most of our needs perfectly. This approach\
    \ is also a great starting point for most API platforms.\n\n![../images/509947_1_En_7_Chapter/509947_1_En_7_Fig2_HTML.jpg](images/509947_1_En_7_Chapter/509947_1_En_7_Fig2_HTML.jpg)\n\
    \nFigure 7-2  \nOne backend\n\nAs requirements from the Consumer-Driven approach\
    \ became more complex, it became necessary to string together calls into different\
    \ backends. This was done under the banner of a tactical approach with the long-term\
    \ aim to move this logic into dedicated middleware services. To make extremely\
    \ aggressive project delivery dates, we added more logic to our microservices\
    \ and found ourselves with implementations detailed in Figure [7-3](#509947_1_En_7_Chapter.xhtml#Fig3).\
    \ Based on several years of integration experience, this type of implementation\
    \ gives me severe vertigo.\n\n![../images/509947_1_En_7_Chapter/509947_1_En_7_Fig3_HTML.jpg](images/509947_1_En_7_Chapter/509947_1_En_7_Fig3_HTML.jpg)\n\
    \nFigure 7-3  \nComplex business logic\n\nIf this sequence flow had a single write\
    \ operation, it may meet the minimum criteria to be allowed to continue to exist.\
    \ Unfortunately, there are further write operations in this process flow. To the\
    \ more lenient developer or architect, this may be an acceptable approach. My\
    \ concern with this approach is in maintaining the consistency of a transaction\
    \ across the process flow. If the first write works and subsequent writes fail,\
    \ the transaction or request is in an inconsistent state. In traditional middleware\
    \ platforms, this is where message queues and rollbacks are critical to ensure\
    \ transactionality. My firm stance is that this type of integration logic is best\
    \ maintained in an environment which has the necessary tools and services to support\
    \ it.\n\nUnfortunately, the tactical approach yielded far better delivery times\
    \ than the strategic one, and pseudo-transactionality has been achieved with storing\
    \ transient state and replaying requests. My advice is to never allow your microservices\
    \ to reach this level of complexity as you’re building a house of cards. I refer\
    \ to this type of microservice as a Monolithic Microservice. Avoid it at all costs.\n\
    \n## Asynchronous\n\nWe were initially fortunate as the backend platforms we integrated\
    \ to responded within milliseconds, seconds at worst. As we assimilated different\
    \ backends and added more business logic, we found the latency of requests steadily\
    \ creeping up. For some API operations, it took more than a minute to complete.\
    \ Do not waste time and energy railing against a mainframe application for taking\
    \ minutes to provision a customer record. Although minutes to a digital platform\
    \ is a lifetime, in a mainframe context, it is light speed.\n\nThis quickly became\
    \ an issue as the API Gateway timeout was set at 60 seconds. It escalated into\
    \ a significant issue when the custodians of the Gateway refused to allow us to\
    \ increase the timeout – and rightfully so. An API Gateway is not geared for long\
    \ running requests, and these types of transactions would impact other service\
    \ consumers. Caught between a rock, a backend platform which took as long as it\
    \ took to service a request, and a hard place, an API Gateway which allowed a\
    \ maximum time for a request to be processed, we had to find a new way of execution\
    \ for these use-cases.\n\nUnfortunately, our constraints did not end there. Like\
