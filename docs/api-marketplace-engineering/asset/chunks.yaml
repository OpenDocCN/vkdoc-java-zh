    ### Container Platform (Managed/Unmanaged)


    Figure [5-2](#509947_1_En_5_Chapter.xhtml#Fig2) shows the evolution of how applications
    have been deployed. From right to left you see three approaches, Traditional Deployment,
    Virtualized Deployment, and Container Deployment, which are fast growing in popularity.


    ![../images/509947_1_En_5_Chapter/509947_1_En_5_Fig2_HTML.jpg](images/509947_1_En_5_Chapter/509947_1_En_5_Fig2_HTML.jpg)


    Figure 5-2


    Evolution of deployment strategies


    I have been fortunate to have experience with all the approaches in Figure [5-2](#509947_1_En_5_Chapter.xhtml#Fig2).
    On one of my first projects, we were allocated a Windows server which ran on a
    physical machine in a datacenter managed by the organization. I can still recall
    eagerly taking a snapshot of the number of CPUs and memory and sending it to my
    university friends as bragging rights of the hardware allocated to my new project.
    Even when I had to drive through to the datacenter on the night of a production
    deployment to physically restart the server, I felt like one of the “Right Stuff”
    astronauts walking down the gangway on their next space mission. As the figure
    shows, all applications run directly on the Operating System, and if one of them
    threw a tantrum that caused high CPU or memory utilization, the others suffered.


    A few years later, while on a project for a new middleware platform, we were allocated
    Sun Sparc servers, each with many CPUs with multithreading capability and a whopping
    512GB of RAM. The server architecture whitepaper had a prized spot on my bedside
    table as NASA and JPL were probably using the same hardware to launch space shuttles.
    The beauty of using Sun Solaris was that the Hypervisor was baked into the operating
    system, and we could carve up the machine into several logical Solaris Zones (Virtual
    Machines), each with its own operating system and allocated a specific number
    of resources in the form of threads and memory. If an application misbehaved,
    the Solaris management software would contain it and prevent it from impacting
    other zones. I found myself jockeying a spreadsheet containing the details of
    Solaris Zones which was used for various environments and components of the stack.


    I prided myself with the detail of the spreadsheet, and to the annoyance of the
    rest of the team, referenced each zone by IP, like some old friend whom no one
    else knew. As I was responsible for the Platform build, I scripted as much of
    the installation as possible – but eventually had to resort to running custom
    commands on different zones, sometimes to resolve cluster issues, sometimes to
    resolve missing dependencies. Again, I chalked up these interventions as my part
    in a Herculean effort to keeping the platform up and running. Little did I realize
    back then that I was also responsible for creating a “snowflake environment.”
    Each zone in the environment was different from the rest. I now take solace that
    even if my provisioning script did create identical clones, each of the zones
    would have invariably moved out of sync due to operational changes made on some,
    but not others.


    Virtual Machines (VM) are a move in the right evolutionary direction – they allow
    better use of the underlying infrastructure. The drawback is that the VMs are
    heavy on resources, VM configurations could invariably move out of sync, and they
    also encourage vertical scaling of infrastructure which is not tenable over time.
    That is, the physical host machine can only scale to a maximum level which limits
    the number of VMs it can support.


    For our Marketplace implementation, an early decision before I joined was to use
    a Container approach. My first experience with containers was Docker, and as I
    ran through a tutorial shown in Listing [5-1](#509947_1_En_5_Chapter.xhtml#PC1),
    I was blown away with the simplicity of the concept and sincerely wondered which
    rock I lived under when the technology launched in 2014.'
  trans: '

    ### API 网关（外部/内部）


    API 网关本质上是企业的入口。在我们的部署中，它被放置在非军事区（DMZ）的边缘，另有第二个独立实例作为内部服务的入口。其核心功能是安全、API 管理和监控。我们组织的一项关键标准是：所有
    API，无论面向内部还是外部，都应通过 API 网关访问。API 网关的一大特性是能够对用户请求进行限流。虽然这也可以定制开发，但使用现成产品的好处在于，它能减轻团队的运维负担。诸如安全配置、证书管理、API
    产品更新和版本管理等任务都可开箱即用。


    多家云服务提供商都提供平台即服务（PaaS）的 API 网关，并且可以轻松完成资源开通。PaaS 方案的优势在于，底层基础设施的扩缩容与管理由云服务商负责。作为一家成熟的金融机构，我们使用的是商业现成产品，由内部团队管理并由软件供应商提供支持。为让交付团队拥有一定自主性，我们在网关内为
    API 产品创建了独立的开发者组织。这本质上是对 API 网关基础设施进行逻辑隔离。我们在开发环境中被允许拥有管理权限，但在推进到生产环境时必须遵守严格治理要求。


    ### 身份


    该模块承载了许多对 API Marketplace 功能至关重要的能力。其中最重要的一项是访问控制认证策略，通俗来说，它是终端用户认证的基础。由于其中托管了目录服务器，包含用于凭证校验的用户档案信息，因此在实施之初我们做出的一个基础设计决策是：复用企业级认证能力，并在
    Marketplace 内构建自定义授权框架。反向代理能力也归属于同一体系，作为终端用户请求与服务端门户应用之间的中介。通过复用企业安全基础设施（包括物理设施、流程与服务），我们的实施工作得到了显著加速。为满足
    Marketplace 的特定需求，我们也进行了一些定制，例如允许对后端 Web 应用进行未认证访问的 junction，以及滚动刷新令牌窗口。这一决策也帮助我们顺利通过架构与设计评审委员会。资深架构师对此有一种安心感：这个可能成为新攻击通道的前沿
    API Marketplace，是基于可信的企业安全标准进行防护的。


    ### 容器平台（托管/非托管）


    图 5-2 展示了应用部署方式的演进。从右到左可以看到三种方法：传统部署、虚拟化部署，以及正在快速流行的容器部署。


    ![../images/509947_1_En_5_Chapter/509947_1_En_5_Fig2_HTML.jpg](img/509947_1_En_5_Fig2_HTML.jpg)


    图 5-2


    部署策略的演进


    我很幸运，拥有图 5-2 中所有方法的实践经验。在我最早参与的一个项目中，我们分配到一台 Windows 服务器，它运行在由组织管理的数据中心物理机器上。我仍记得自己兴奋地截下
    CPU 数量和内存大小的截图，发给大学同学，炫耀新项目分到的硬件配置。即便在一次生产部署之夜，我不得不开车前往数据中心，亲自重启服务器，我也感觉自己像“太空先锋”宇航员，正沿着登机桥走向下一次太空任务。正如图中所示，所有应用都直接运行在操作系统上，一旦其中某个应用“闹脾气”导致
    CPU 或内存占用飙升，其他应用也会受牵连。


    几年后，在一个新中间件平台项目中，我们分配到了 Sun Sparc 服务器，每台都有大量支持多线程的 CPU，以及高达 512GB 的内存。那份服务器架构白皮书曾被我珍藏在床头，我甚至觉得
    NASA 和 JPL 可能也在用同款硬件发射航天飞机。Sun Solaris 的美妙之处在于 Hypervisor 内置在操作系统中，我们可以把机器划分成多个逻辑
    Solaris Zone（虚拟机），每个都有自己的操作系统，并分配了特定数量的线程与内存资源。若某个应用行为异常，Solaris 管理软件可以将其隔离，防止影响其他
    zone。我当时经常维护一份记录 Solaris Zone 详情的电子表格，用于不同环境和技术栈组件。


    我曾为这份表格的细致程度感到自豪，甚至让团队其他成员颇为无奈——我会像称呼老朋友一样，用 IP 来指代每个 zone，而别人根本不熟悉。由于我负责平台构建，我尽可能把安装流程脚本化——但最终仍不得不在不同
    zone 上执行自定义命令，有时为解决集群问题，有时为处理缺失依赖。同样，我把这些人工干预视为维持平台稳定运行的“赫拉克勒斯式”努力的一部分。那时我并未意识到，自己也在制造一种“雪花环境”。环境中的每个
    zone 都与其他不同。现在我只能自我安慰：即使我的部署脚本创建了完全一致的克隆，随着运维变更只在部分 zone 上执行，它们也必然会逐渐失去同步。


    虚拟机（VM）是朝正确演进方向迈出的一步——它们能更充分利用底层基础设施。缺点是 VM 资源开销较重，VM 配置不可避免地会逐步不同步，而且它们也鼓励基础设施纵向扩展，而这在长期内并不可持续。也就是说，物理宿主机只能扩展到一定上限，从而限制其可承载
    VM 的数量。


    在我们的 Marketplace 实施中，在我加入之前就已做出一个早期决策：采用容器方案。我第一次接触容器是 Docker，当我照着清单 5-1 的教程操作时，我被这一概念的简洁性深深震撼，并真诚地怀疑：2014
    年这项技术发布时，我到底躲在哪块石头下面，竟然错过了它。

    '
- fmt: "## Container Runtime 与镜像配置示例\n\n```dockerfile\nFROM node:14\n# Create app\
    \ directory\nWORKDIR /usr/src/app\n# Install app dependencies\nCOPY package*.json\
    \ ./\nRUN npm install\n# Bundle app source\nCOPY . .\nEXPOSE 8080\nCMD [ \"node\"\
    , \"server.js\" ]\n```\n\n`Listing 5-1`  \n`Simple Docker configuration`\n\n类似于\
    \ Hypervisor 是 Virtual Machines 的使能要素，Container runtime 使 Containers 成为可能。关于 Hypervisors\
    \ 和 Container runtimes 如何实现这一点，有很多很好的资料。我的个人定义是：container 是一种软件配置的特定定义，称为 image。如\
    \ `Listing [5-1](#509947_1_En_5_Chapter.xhtml#PC1)` 所示，该定义指定了一个基础软件元素，并在其上添加自定义部署和要执行的命令。所有从该\
    \ image 创建的实例都将保持一致。它不再从 OS 层面工作，而是让你专注于 Application 层及其依赖项。\n\n## Virtual Machine\
    \ 与 Container 的差异\n\n考虑用烘焙蛋糕来类比 Virtual Machine 与 Container 的区别。对于 Virtualized\
    \ 方式，厨师会得到一个完整厨房——不同的厨具、所有电器和完整储藏室可供选择。通常，厨师只会使用其中一部分厨具、电器和材料。对于 Container 方式，厨师只会得到完成蛋糕所需的东西——特定的厨具、原料，可能还有一个烤箱。\n\
    \nContainer 方式也迫使部署团队在代码/配置层面做变更。如果需要引入某个 library 或 package，就必须更新 container image\
    \ 配置。Container 实例天生是 transient 的。Image 也很轻量，并且由于不需要完整 OS 运行，对底层基础设施的需求仅为其一小部分。因此，与\
    \ Virtual Machines 相比，可以在同样基础设施上运行更多 containers。进一步的收益是支持基础设施水平扩展。更便宜但性能较弱的硬件，也能因其轻量足迹而轻松承载多个\
    \ container 实例。\n\n## Kubernetes 托管容器平台实践\n\n像 Kubernetes 这样的 Managed container\
    \ platform 提供了诸如 self-healing 的能力，可以重启失败的 containers，并在向客户端发布前检查 containers 健康状态。它还提供自动化\
    \ rollout 和 rollback。\n\n坦率地说，我们早期项目团队在 containerization 方面处于未知领域——更不用说要在本地构建一个`Kubernetes`托管容器平台。我至今仍记得那位急于完成\
    \ sprint 目标、近乎绝望的项目经理的表情——当驻场 DevOps 工程师在平台构建问题上给出“`we don’t know what we don’t\
    \ know`”的反馈时。随着我们尝试可在几分钟内完成供应、却无法访问内部系统的 Cloud PaaS 服务，我们对内部组织治理与安全限制的挫败感呈指数增长。我们平台的第一个迭代版本是单节点上的单个\
    \ pod——并且需要定期重启。这是一个小胜利——但对项目团队而言，这是“个人的一小步，DevOps 的一大步”。\n\n我们后来进行了两次 Managed\
    \ Container Platform 的重大迭代。随着演进，我们现在对`Kubernetes`所提供能力有了更深入的理解与认知。人们很容易被 Containerization\
    \ 的吸引力打动，尤其是像 Kubernetes 这样的平台。我见识过 Infrastructure as Code 的力量，也曾沉迷于创建“Genesis\
    \ scripts”并在几分钟内 `terraform` 整个环境的宏大设想。将我从这种迷思中拉回现实的是：在 API Marketplace 场景中，Managed\
    \ Container Platform 是应用平台的`enabler`。我最终得出的结论是，像 Kubernetes 这样的 Managed Container\
    \ platform 的真正力量在于“隐于幕后”，让你把注意力集中在应用本身。作为 full-stack engineer，理解 container platform\
    \ 的组成与功能，以及请求如何从 ingress 流转到 service 再到 pod，至关重要。我们本地 Kubernetes 平台的管理现已移交给企业\
    \ DevOps 团队，后续还将进一步迁移到托管 Cloud 服务。Kubernetes as a Service 提供可以抽象基础设施管理和网络配置复杂性，并帮助团队更容易实现如配置\
    \ persistent volumes 之类的复杂目标。"
