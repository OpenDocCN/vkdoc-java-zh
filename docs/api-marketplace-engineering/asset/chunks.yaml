    ![../images/509947_1_En_8_Chapter/509947_1_En_8_Fig2_HTML.jpg](images/509947_1_En_8_Chapter/509947_1_En_8_Fig2_HTML.jpg)


    Figure 8-2


    API Marketplace squad'
  trans: '

    ### 制定战略


    在每个新季度开始时，项目负责人会与团队的高级成员会面，以便：


    1.  提供组织范围内的计划与目标视图。由于企业和各事业部有许多并行项目在进行，这有助于洞察 Marketplace 如何融入更大的整体格局。


    2.  回顾上一季度的进展，并评估该平台在本财年规划路线图中的位置。


    3.  识别潜在风险和改进领域，以优化解决方案交付与运营能力。


    4.  为未来季度定义目标，并结合团队各领域的输入确定目标优先级。


    这些会议的目的，是在高层面定义下一季度的战略目标，并与其他外部计划保持一致。该过程也具有高度协作性，致力于找到平衡点：既让已规划的计划能够不中断地持续推进，也让
    Marketplace 在未来机会面前处于有利位置。


    在后续更高频的规划会议中（下一节将说明），这些已勾勒的目标会被当作“指南针”，以确保我们的方向正确、平台朝着正确方向前进。团队文化也允许在必要时更新目标。也就是说，如果组织需要调整重点，以交付更高业务或客户价值的需求，团队领导层将重新召集会议，决定如何实现。


    ### 规划


    在实施早期阶段，规划往往是全天进行，且全员参与。其目标是让团队所有成员都能了解即将到来的需求，并征集反馈与任务规模评估。初衷虽好，但结果是团队通常会损失一个完整的
    sprint 工作日，而且往往仍需在会后继续调研任务才能给出估算。作为当前流程的一部分，工程负责人会在设计阶段编制高层级的影响评估（IA），并在需要时由团队临时协助解答技术问题。IA
    会给出所需时间与资源投入的指示，据此可确定成本估算。


    由于实际开发时间非常宝贵，我们尽量少占用这部分时间，仅在必要时才要求技术团队参与会议。为此，规划工作被拆分为两轮。


    第一轮中，平台负责人、产品负责人、交付负责人和工程负责人会面，讨论即将到来的几个 sprint 的交付目标。该目标必须与季度战略目标保持一致。需求也会被排序优先级，并初步指明由哪位开发者负责哪项任务。


    在获得这一视图后，会安排第二场与团队的会议，以传达下一个 sprint 的目标。大多数情况下，这并不是团队第一次接触该需求，因为他们的意见已在影响评估活动中被纳入。由于目标定义清晰，会议更聚焦，开发者无需经历冗长的优先级与战略争论。在该会议中，工程负责人还会提供解决方案的详细拆解以及明确的完成定义。某项需求很可能会被拆分为多个阶段，团队对此决策也会有清晰认知。团队成员可以就目标提出关切，并指出即将开展工作中的风险和潜在问题。这使交付负责人能够更清楚地掌握即将交付内容，并启动措施来缓解潜在风险与延误。


    如表 8-1 所示，在任意时点都可能有多个计划处于不同状态并行推进。


    表 8-1


    API Marketplace 中持续进行的交付


    | 流水线 | A | B | .. | *N* |

    | --- | --- | --- | --- | --- |

    | 设计 | 已完成 | 已完成 | 受阻 | 进行中 |

    | 架构 | 已完成 | 已完成 | 受阻 | 进行中 |

    | API 网关 | 已完成 | 已完成 |   |   |

    | 微服务 | 进行中 | 进行中 |   |   |

    | 质量保障 | 暂停 | 暂停 |   |   |

    | DevOps |   |

    | 变更管理 |   |

    | 上线后支持 |   |


    任务并发由交付负责人谨慎管理。尽管这可能增加管理复杂度，但它赋予团队灵活性：当某条工作线因设计审批或后端就绪度延迟而受阻时，团队可以转向新的工作流。对发布管理来说，这是一件棘手的事，因为
    Marketplace 无法提前数月预测将部署到生产环境的内容；但这也是我们团队最强的能力之一。


    ### 小队（Squads）


    在 Marketplace 的发展历程中，曾出现一些更大型的计划，它们并不适配这种快速交付模式。最初尝试将这些计划打包推进，导致团队规模接近 30 人。因此，诸如计划会、站会和回顾会等
    sprint 仪式耗时显著增加，且对团队宝贵时间的利用效率不高。受 Amazon “两个披萨团队”规则启发（即团队规模不应大到两张披萨都喂不饱），我们将团队拆分为多个小队。


    小队的定义是：一个自组织、跨职能团队，具备端到端交付产品所需能力，并且仅需较少外部输入。小队应由能够设计、开发、测试和部署产品的成员组成。


    我们还请教了其他经历过类似增长轨迹的团队，并借鉴了他们的洞见与经验。一个关键经验是组建平台小队（Platform squad）：它专注于提升基础 Marketplace
    的能力与成熟度，并支持持续的产品开发。


    如图 8-2 所示，平台小队通过聚焦云迁移、构建计费与分析能力等计划来演进 Marketplace，这些能力会被部署到 Marketplace 的产品所复用。平台小队是长期运行但更精干的团队；而产品小队则按需组建与解散，团队规模更大。这也使资源调度更高效，因为团队可按需组装。此外，平台小队由运营支出（OPEX）预算提供资金，产品小队由资本支出（CAPEX）预算提供资金。


    ![../images/509947_1_En_8_Chapter/509947_1_En_8_Fig2_HTML.jpg](img/509947_1_En_8_Fig2_HTML.jpg)


    图 8-2


    API Marketplace 小队

