    ## 总结


    在本章中，我们回顾了开放银行（Open Banking）和开放金融（Open Finance）如何在金融服务行业中走到前沿。从本质上讲，这一进程是由“以客户最佳利益为核心”所驱动的。诸如屏幕抓取（screen
    scraping）之类的做法，会因共享凭证而危及客户安全——API 正是对此的修复机制。新的支付方式和账户聚合将为客户带来更高便利性和个性化服务——而 PSD2
    等规范使第三方能够实现这些能力。市场中更充分的竞争可以带来更多客户选择、降低成本并提升服务水平——开放银行标准正是为此而引入的。


    我们赞颂了这一模式对所有参与方的益处——从为全球数十亿无银行账户人群带来金融包容性的前景，到为第三方提供商创造更公平的竞争环境。当然，这一运动并非没有风险——我们也强调了其中一些风险并给出了潜在缓解措施。当前最令人振奋的是，开放银行浪潮正在全球蔓延。尽管不同地区在不同产品领域采取了不同路径，但其共同的核心目标都是：让客户所拥有的数据实现民主化。


    我们还强调，这仅仅是开始。开放银行是更宏大开放金融倡议的先声，将影响金融服务行业中更多细分领域。这带来了前所未有的机会，可重新设计金融服务，以实现最大化的可扩展性与效率。将一切串联起来的金线是监管。监管的一项关键目标是：数据共享与开放银行应在风险管理和创新激励之间取得平衡。监管框架应当顺应市场变化，明确角色与责任。


    尽管一些组织已主动建设能力以支持开放银行，但许多组织并未做好准备。一个规划完善且执行到位的 API 平台战略，能够为组织提供参与并引导监管咨询过程所必需的知识与经验。


    确实值得注意的是，单一需求所产生的涟漪效应——具体而言是支付发起（payment initiation）——触发了下一轮变化，即访问客户账户信息。这引发了监管变革，从本质上迫使组织调整其政策，并在客户同意的前提下向第三方开放访问。而这种裂变并未止步于此——它还推动了金融服务其他领域的变化，例如保险和借贷。


    如果我们将同样一套原则应用到其他行业，如电信和医疗保健，那么可以合理推断：用户的移动交易历史或健康信息属于用户本人，并且应在用户同意下可供第三方访问。Google
    和 Facebook 等提供商已将这一能力内嵌进其产品服务。正如当年通过监管允许用户在更换运营商时保留手机号一样，我认为移动交易数据，甚至可能包括通话记录，实现数据民主化只是时间问题。这个行业只需要一个足够有说服力、能够触发变革的需求。许多国家正计划提供国家医疗服务。对现有患者病历以及私营部门数据的访问，或许正是推动该行业变革的临界点。


    一些组织采取了观望态度，准备对监管变化作出反应。也有许多组织已洞察到构建平台型业务的潜力，正通过提前启动其 API Marketplace 实施来先于监管布局，或抢占战略位置。


    # 3. 消费


    需要投入大量关注的关键领域之一，是 API Marketplace 的*界面*。尽管真正的主角是提供功能的 API 本身，但主角也需要舞台和剧场来表演。如果舞台太小，或剧场太难进入，那么
    API 的卓越价值就会被埋没。在整个旅程中始终牢记这一点至关重要。没有第三方消费，就不会有流量；没有流量，就不会有收入；而收入维系着 Marketplace，后者的存在正是为了实现愿景（Vision）。


    Marketplace 提供可被多个第三方消费的*产品（Products）*。某些产品或 API 由于监管要求或对特定功能的需求，几乎可以“自我销售”。然而，大多数产品都必须被主动营销，以展示其能力并鼓励采用与使用。我们将在下文讨论实现这一目标的机制。


    ## Marketplace API 与内部 API


    交付团队应始终牢记 API Marketplace 的*语境（context）*。根据我作为集成开发人员的经验，在为内部项目暴露或消费某个接口时，我们可以通过面对面会议、电话或电子邮件，让消费方团队与提供方团队直接沟通，从而补充接口规范文档之外的细节。这之所以可行，是因为这类集成通常是一对一的消费方与提供方关系。


    一个成功的 API Marketplace 会有*大量*消费者。尽管理论上可行，但与每个消费者逐一进行一对一会议来讲解集成问题，既不可持续，也不可扩展。这也不同于内部集成项目：在内部项目中，交付负责人会毫不犹豫地安排尽可能多的会议来解决接口挑战。第三方通常有多个
    API 提供商可选；如果 Marketplace 不够吸引人或不易消费，他们通常就会转向别处。一个好的 Marketplace，应当能够抽象并简化后端平台的复杂性，并将其打包为易于消费的形式。


    API Marketplace 并不是普通的、千篇一律的集成“管道”工作——把一个系统连到另一个系统即可。面向消费者暴露的 API 必须经过深思熟虑与谨慎构建。正如
    Amazon 的“API Manifesto”所述：


    *所有服务接口，无一例外，都必须从底层开始按可外部化（externalize-able）的方式进行设计。也就是说，团队必须规划并设计出能够将该接口暴露给外部世界开发者的能力。没有例外。*

    '
- fmt: '## Personas


    A pitfall many organizations fall into is to only have a technical portal with
    rafts of three-letter acronyms. In our race to build a Minimum Viable Product
    (`MVP`), we did exactly that. Our landing page had some vibrant icons and graphics
    with some terse text hurriedly put together while we focused on the technical
    aspects. Again, from experience, the first iteration of the portal the team puts
    out will probably be the longest running as the team’s focus switches to making
    new API products available.


    Due to its nature, it is easy to categorize an “API Marketplace” as technical
    and to only focus on Engineers and Integration Developers. It is also important
    to consider the Marketplace from a commercial perspective and how it can be leveraged
    to provide business value. Companies are essentially trying to build new products
    and services to solve old problems in more efficient and convenient ways. Consumers
    need to understand the intention and benefits of an API Marketplace to determine
    how they can use it to achieve their organization’s objectives.


    Although User Experience (`UX`) in an API construct may seem superfluous, it is
    an essential element of the Marketplace adoption. `UX` for different personas
    helps provide pertinent information to the right audience at the right time. This
    could be achieved as a separate portal or as clearly defined sections in a single
    portal.


    In the next sections, we consider meeting goals for business and technical personas
    across these areas:


    - Attract: Grab the attention of potential users of the Platform, cater for a
    wide spectrum of user – from established organizations to `FinTechs` and Startups.

    - Educate: A more detailed understanding of your platform will result in more
    efficient use and possibly more widespread use of the various product offerings.

    - Build trust: The intention of the Marketplace is to empower external organizations
    by using internal products and services. Potential consumers of your Platform
    need to be confident of its capability and reliability.

    - Transparency: Fine print and obscure information will impact the relationship
    with third parties and potentially damage the reputation of your platform in the
    market.

    - Collaborate: Keep your customers engaged and use feedback to optimize your platform
    and drive your product roadmap. The relationship is ongoing.

    - Lead: The owner of the domain who is responsible for the content of the portal
    which supports other initiatives inside and outside the organization.


    ## Business Value


    The first viewers of your organization’s API Marketplace Portal will most likely
    be from a business development perspective. This individual or team will review
    the API products to determine fit as a foundational element for a product or service
    still being conceptualized or built. Figures [3-1-1](#509947_1_En_3_Chapter.xhtml#Fig1),
    [3-1-2](#509947_1_En_3_Chapter.xhtml#Fig2), and [3-1-3](#509947_1_En_3_Chapter.xhtml#Fig3)
    are a great example that illustrate how `Twilio` has achieved this for its Messaging
    API.


    ![../images/509947_1_En_3_Chapter/509947_1_En_3_Fig3_HTML.jpg](images/509947_1_En_3_Chapter/509947_1_En_3_Fig3_HTML.jpg)


    Figure `3-1-3`: Benefits of the service expressed without any technical jargon


    ![../images/509947_1_En_3_Chapter/509947_1_En_3_Fig2_HTML.jpg](images/509947_1_En_3_Chapter/509947_1_En_3_Fig2_HTML.jpg)


    Figure `3-1-2`: Simple, easy to relate to use-cases


    ![../images/509947_1_En_3_Chapter/509947_1_En_3_Fig1_HTML.jpg](images/509947_1_En_3_Chapter/509947_1_En_3_Fig1_HTML.jpg)


    Figure `3-1-1`: Non-technical overview of `Twilio`’s Message API


    In the following sections, we review the key areas to be considered when building
    the “Business Portal” of your API Marketplace.


    ### Attract


    Although you can use a “Field of Dreams” strategy of “If you build it, they will
    come” – it may be more effective to actively market the Platform. Posts on social
    media, launch events, articles, and interviews on Technology, Entrepreneurship,
    and Startup websites will help draw potential users in. The key message on your
    main page, possibly the first thing a user sees, is your “elevator pitch” – how
    can our API Marketplace help your organization? This could include a `2`- to `3`-minute
    video, showing at a high-level, preferably in a non-technical context, how the
    Marketplace provides services and capabilities upon which new products can be
    built.


    Be sure to extol the benefits of adoption. This can be done through motivation,
    “by using our platform today, you have a first-mover advantage to power your business
    and leapfrog the competition,” or through fear – “in Europe, governments have
    issued regulations that require all banks to abide by the Payment Services Directive
    by the end of `2018`. Our government is investigating similar regulation.”


    ### Educate


    An empowered third party will understand the purpose of the platform and can leverage
    the business capability for commercial use. Your audience, at this time, may not
    have any technical background. Metaphors and analogies are important to convey
    the key messages. Explainer videos detailing core concepts such as “What is an
    API?” and “What can you do with it?” will help considerably. Test the use of this
    material when communicating with internal backend teams. As the delivery team
    is constantly immersed in the detail, it may be easy to take for granted certain
    concepts and functions around APIs. Be sure to keep in mind that there is a relatively
    steep learning curve for those new to APIs.


    Case studies detailing the journey of users of the platform successfully leveraging
    APIs to launch new products and services will also help potential customers understand
    how the Marketplace can be used to achieve a business purpose. It may also help
    to provide details around the time and effort required to use the platform. Be
    sure to provide accurate information as being too optimistic may result in the
    third-party setting unrealistic launch timelines leading to integration fatigue.
    Being too pessimistic may result in the platform not being used. Encourage iterative
    adoption of Products. It would be more beneficial for both consumer and provider,
    to start and finish with one or a few products than starting with many products
    and later abandoning the effort.


    Focus on business value instead of API products. For example, a Customer API which
    returns the name and address information of a customer can be used for identity
    verification. It could also be used to streamline the registration or sign-up
    process for third-party applications. Highlight that onerous registration forms
    result in high drop-offs for potential users and the Customer API could help alleviate
    that. Similarly, an Accounts API can be used to determine a user’s financial behavior,
    which can result in better or personalized service offerings. In developing countries,
    where the concept of API Marketplaces is only beginning to emerge, highlight the
    value that has been created in other markets which have an active API ecosystem.


    Mailing lists and regular blog posts will also help keep current and prospective
    customers engaged. This will also help to define the product roadmap. The Product
    Owner can use these communication streams to determine interest or potential uptake
    of a new API. Third parties can also be made aware of new versions of products,
    releases, and patches.


    As an API Marketplace is constantly evolving, customer education is an ongoing
    activity. This is one of the greatest rewards of working on the Platform – the
    cycle of innovation and optimization never stops. You need to ensure that the
    users of the platform can leverage its full potential.'
