  trans: '

    ### 建立信任


    请从潜在第三方的视角来审视 API 市场。该实体很可能将这个市场作为其业务运营的基础性组成部分。如果平台在稳定性或可靠性方面出现任何问题，对该组织而言后果可能是灾难性的。我们的实施之所以能获得显著采用，一个重要原因是：在我们的
    Marketplace 背后，是一个拥有数百万客户、在全国范围内受信赖的品牌。我们的团队成员始终清楚，这种关系是相互的。我们平台的任何问题或缺陷，都可能影响我们所代表组织的信任与品牌形象。我倾向于把通过这种机制获得的信任称为“继承而来的”信任。本质上，你信任我是因为你认识我的父母。但我认为，信任也应当是“赢得的”。


    这可以通过与平台用户建立紧密关系来实现。在平台发布的早期或试点阶段，要与第三方提供商密切合作。我们最近发布一款产品时，曾与一位热情的开发者每周通话，甚至有时每天通话。这种互动不仅帮助我们梳理并解决了正在发布的
    API 产品中的问题，也让我们洞察了该产品的实际使用方式。外部开发团队对产品的信心也显著提升，因为他们能够看到提供方的投入与承诺。在 FinTech 和初创社区中，口碑传播通常也非常迅速。


    你的平台采用情况会受到正面*和*负面反馈的影响。来自成熟第三方的背书（最好用他们自己的表述），以**客户证言**的形式呈现，可能有助于说服潜在用户使用你的
    Marketplace。同样，这并不容易获得，往往需要整个团队投入大量工作。**参考客户**也将有助于建立信任。如果平台潜在用户看到某个知名品牌或产品正在使用该平台，就能形成一种隐性的信任。识别并锁定一个或多个成熟品牌至关重要，并且必须积极推动其使用你的
    Marketplace。根据我们在时间规划上的实践经验，一个关键教训是：如果你希望你的平台在黑色星期五（11 月第四个星期五）前可用，你需要在 6 月就启动集成活动。


    API 市场的一个关键结构是 Marketplace 与第三方提供商之间的**合作伙伴关系**。如前所述，Marketplace 需要平台消费者才能生存。同样重要的是要强调另一层关键伙伴关系：Marketplace
    与该组织终端用户之间的关系。终端用户信任 Marketplace，只会将信息或数据访问权限授予那些已得到其授权的第三方。对于正在阅读本文的 API 项目团队——请意识到，这不仅是一项需要坚守的重大责任，也是一种非凡的荣誉，因为正是你们的努力促成了这种三方关系。


    ### 透明性


    强大且持久的关系需要透明。尽管第三方是 Marketplace 的消费者，但请务必记住：他们与平台的成败有着内在且紧密的关联，其程度并不亚于内部团队。其背后的简单逻辑是——如果
    Marketplace 失败，将会影响他们的组织，甚至可能影响其持续运营的能力。


    要对**时间线**保持坦诚。包括 Marketplace 上线、API 产品能力、可用性以及路线图。由于竞争压力，这并非总能做到完全公开。但始终应追求“少承诺，多交付”。我们在早期旅程中学到的一条关键经验是：我们应始终比开发者社区领先一步。随着
    Marketplace 上线，许多第三方注册使用该平台——远超预期。不幸的是，由于需要内部审批，我们 Marketplace 中的一些 API 产品尚未准备好商业化。事后看来，更稳妥的做法应是将这些
    API 产品从目录中移除，或在门户中明确标注其商业可用时间线仍待确定。


    **定价**——无论是成本还是激励形式——都应清晰、明确，且不应包含隐藏条款。第三方很可能需要投入时间和资金来使用 API Marketplace 的产品。此外，第三方也需要清楚了解使用平台的成本结构。也就是说，费用是按交易计费、分层计费，还是固定费用。还可能通过潜在线索或推荐佣金的形式，提供使用
    Marketplace 的激励。归根结底，第三方需要尽可能多的财务信息，以判断与 Marketplace 合作的商业可行性。在 Marketplace 早期阶段，可能有必要允许免费访问
    API 以促进采用。请务必向消费者说明这可能会调整，并将在后续进行评估。如果由于外部因素暂时无法提供定价，也务必清晰说明。


    **服务级别协议**（SLA）和问题解决时间线必须明确定义。其内在好处是，SLA 可以在多个提供商之间复用。这些还可以分级——更高等级将获得更多支持和更快解决速度——当然成本也更高。前期达成一致还能就解决预期设定正确认知，并在处理运营咨询时显著帮助
    Marketplace 支持团队。再次强调，请务必如实说明解决时间——过于乐观会在长期故障中导致信心流失，而过于悲观则可能影响采用和信心。对于不清晰或仍待定义的部分，应明确标注，并在发生运营问题时确保清晰沟通。


    ### 协作


    可以考虑提供一次或几次无义务的**咨询**会议。对于发展中市场尤为如此，因为潜在客户往往希望通过面对面讨论问题或场景来获得额外的安心。根据经验，在客户旅程的这个阶段，技术支持团队未必最适合协助潜在用户。应由产品负责人在技术团队支持下主持这些会议。技术团队能够协助开发或集成问题；而产品负责人则能够从商业成功角度定位
    Marketplace。


    一个**登记你的兴趣**的线索生成表单是必需的。必须在 24 小时内进行邮件或电话跟进。FinTech 和初创企业运转节奏极快，若未及时跟进，潜在机会很容易流失。在跟进过程中，产品负责人将能够判断潜在客户的成熟度、组织所处阶段，以及所需支持的层级和领域（包括问题偏商业还是技术性质）。


    随着 Marketplace 演进并且采用率提升，可能有必要提供分层的**支持等级**。由于交付团队的人手可能固定，未必能够为所有第三方提供同等程度的时间与关注。更高等级的付费服务将带来更紧密的协作，也可能为专属服务经理提供资金支持。在
    Marketplace 早期阶段，请务必将每一条客户咨询（无论潜在客户还是现有客户）记录到服务台系统中并持续跟进。

    '
- fmt: '## Lead


    This effort is best led by the Product Owner (`PO`) as this will form the foundation
    of the sales pitch for external consumers. The `PO` will also extol the benefits
    of having representation in the Marketplace to internal platform teams. Always
    keep in mind that an API Marketplace has many consumers – a Business and Technical
    audience from external organizations. Knowledge gained from these relationships
    can also be used to demonstrate capability to internal teams and to stakeholders.
    Be sure to give this the right level of attention and focus.


    ## Technical Developer Portal


    With more than 20 years of experience in the technology industry and as a proud
    developer myself, when it comes to technical sources of information, I have extremely
    high standards but low levels of tolerance. I expect quality and precise information
    to assimilate a product or service. Although all developers eventually end up
    at `StackOverflow`, my confidence in the capability and maturity of a product
    drops if I must resort to this measure frequently. If there is suitable information
    or resources available, I don’t mind spending the time and effort learning or
    understanding concepts to use the technology. The Developer Portal is the foundation
    upon which the relationship an API Marketplace establishes with a technical audience.


    Figures [3-2-1](#509947_1_En_3_Chapter.xhtml#Fig4) and [3-2-2](#509947_1_En_3_Chapter.xhtml#Fig5)
    provide a view of `Twilio`’s technical documentation for its Messaging API. Figure
    [3-2-1](#509947_1_En_3_Chapter.xhtml#Fig4) shows the next level of detail by identifying
    the various channels for sending a message. In Figure [3-2-2](#509947_1_En_3_Chapter.xhtml#Fig5),
    the documentation provides the low-level technical details for API use.


    ![](images/509947_1_En_3_Chapter/509947_1_En_3_Fig5_HTML.jpg)


    Figure 3-2-2


    Technical instructions and code samples for API consumption


    ![](images/509947_1_En_3_Chapter/509947_1_En_3_Fig4_HTML.jpg)


    Figure 3-2-1


    Gradual introduction to the different messaging channels


    We consider the following areas to build a Marketplace that your developers will
    believe in and be loyal to.


    ### Attract


    Technical consumption of the API Marketplace may be the result of a second wave
    of review, the first being a business development assessment. The technical team
    will be tasked with providing an impact assessment to integrate into the Marketplace.
    Criteria such as the standard of documentation, self-service, sample code, availability
    of test data, and developer support will be examined. The feedback from this assessment
    will help determine timelines and cost to integrate.


    Although the goal of an API Marketplace is to attract third-party providers to
    the platform, this needs to be tempered with a required minimum level of skill
    and experience. Be sure to keep this in mind when defining your target audience.
    The risk of bringing in novice or junior developers is that the team will have
    to provide more handholding and support.


    User groups and community sessions can also be used to demystify the concept of
    an API Marketplace and to introduce interested developers to the platform. As
    the goal of an API Marketplace is to democratize access to data, consider entrepreneurs
    who could consume the products to launch a diverse set of applications. Hackathons
    are an excellent mechanism to encourage participation and to stimulate interest.
    A positive side effect is that they could help you find talented developers to
    join your delivery team.


    A novel approach we observed from an implementation was the engagement of an external
    organization who invited a diverse set of developers to a 3–5-day bootcamp. During
    this time, the developers were paired with an expert for support and built an
    application which used the API Marketplace.


    `FinTechs` and startups are also eager to consume APIs to bootstrap application
    delivery. Be sure to post articles in sites frequented by such organizations and
    encourage participation. Marketplaces are viral and if the developer experience
    is positive, word will spread. It is important to build and foster a developer
    community, and this needs to be a key goal for the API Marketplace.


    ### Educate


    Technical consumption of an API Marketplace requires at a minimum intermediate
    developer experience, preferably 2–3 years of hands-on coding or integration experience.
    Although you can educate novice developers, I do not think that the objective
    and material of the portal should include tutorials on how to make `REST` API
    calls. There are great online tutorials which will help developers come up to
    speed with APIs.


    However, be sure to cover API Marketplace specific concepts, such as `OAuth`,
    in blueprints. Delegated authorization, which is one of the basic tenets of a
    Marketplace, must be clearly and concisely detailed and explained. We have had
    many new API consumers who did not clearly understand the process flow until they
    could trace the calls against a sequence diagram. Many integration developers
    are only familiar with a client `ID`/secret pattern.


    For each of the API products, try to provide code samples in many programming
    languages. Some of the benchmark developer portals provide samples in: `Node.js`,
    `C#`, `PHP`, `Ruby`, `Python`, `Java`, and `cURL`. One of the greatest benefits
    of an API Marketplace is the neutrality of access – `HTTP`. Be sure to leverage
    this to accommodate a wide range of developers. From personal development experience
    of consuming a product from one of the major cloud providers, code labs can make
    a massive difference. Code labs are different from code samples as they step a
    developer through the process of consuming an API. Think of a code sample as a
    ready-made cake and a code lab as a recipe.


    As the marketplace matures, consider providing patterns or recommended practices
    for integration. A typical example is consuming APIs from a mobile application.
    Given that a wide range of providers may have similar challenges with integration,
    providing a pattern will help ease the integration friction and allow easier consumption
    of your API. The answer, in case you’re wondering about consuming APIs directly
    from a mobile application, is never to store credentials in the app but rather
    to use user-authenticated tokens to make the API calls.


    Blog posts and podcasts are also an excellent way to stay connected to your developer
    community. These tools can be used to share details of your Marketplace journey
    and to give users a view into your roadmap. Raise and address hard-hitting issues
    in the podcasts – such as timelines for regulation and how to plan accordingly.
    These give greater insight into the internal working and operation of the platform.


    As the platform matures and scales, consider developer certification. It does
    not have to be an extensive program – but just a basic theoretical assessment
    and practical exercise to ensure that a developer grasps the concepts of the Marketplace.
    This may become a mandatory requirement for more sensitive API products.


    Finally, a downloadable `Postman` collection will help potential developers immensely.
    `Postman` is regarded as the de facto tool for API development and is discussed
    later in this chapter. Be sure to include documentation detailing each value of
    the collection with a step-by-step guide. The `Postman` collection is approximately
    40% of the effort. The remaining 60% is the accompanying documentation. If possible,
    consider enlisting the services of a technical writer to help compile this material.
    Unfortunately, some of the best developers are not necessarily the best at providing
    documentation.'
