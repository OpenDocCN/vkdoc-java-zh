- fmt: '## What Makes APIs So Special?


    Although the lighting scenario might seem particularly intriguing and many might
    be inspired by the ability to turn off a light using software, the hardcore engineer
    reading this might not be so easily impressed. After all, the “interfacing” capability
    may have been available for years, and if you peel off the packaging and reveal
    the underlying circuit board, there may be jumpers on the board which allow this
    capability by simply applying a current to `PIN#1`. APIs? Big deal.


    Although the lighting scenario is possible and it can be argued, it has been possible
    for years, there is only a small subset of people who have the technical acumen
    and ability to achieve it. Of this, there is even a smaller subset with the will
    to apply currents to pins on circuit boards. I can painfully recall wanting to
    turn on a lava lamp at the end of an automated build many years ago to indicate
    the build had failed but was not able to as I could not easily make the jump from
    software to hardware back then.


    Like any democratizing technology, APIs allow access to the masses. APIs do this
    by being easy to consume, technology agnostic, and well documented. APIs have
    been modelled purposefully using constructs such as HTTP which underpin communication
    of the Internet. The use of a neutral platform allows different technology on
    either side of the interface. Although this may seem trivial, integration between
    systems has either been strictly proprietary, or attempts to make it neutral have
    been significantly complex. Anyone who has worked with Common Object Request Broker
    Architecture (CORBA) will relate that setting up client and server communications
    is no easy task.


    JavaScript Object Notation (JSON) is also a pivotal component of this movement.
    It offers a lightweight mechanism to exchange data. Its predecessors such as Simple
    Object Access Protocol (SOAP) have attempted to achieve this through Extensible
    Markup Language (XML) for years. However, JSON is far more malleable and forgiving.
    The key element is that it is human-readable. Again, the hardcore engineer in
    the corner of the room, sipping on his cup of black coffee, is probably muttering
    that XML is human-readable too. The difference is simplicity – from first-hand
    experience, scanning through a list of key-value pairs is far easier than trying
    to keep track of opening and closing XML tags with embedded values.


    One of my favorite stories is the Tower of Babel. The part that I really gravitated
    to was that people spoke a common language and understood each other. This presented
    enormous potential. Although there have been incredible advances over the centuries
    due to individual contributions from the likes of Newton and Einstein, we can
    achieve more through collaboration and sharing information. Again, the underlying
    premise is the ease of the communication. It should be natural as speaking and
    APIs are a firm step in that direction.


    Websites and mobile applications have revolutionized how we consume information.
    User Interface (UI) and User Experience (UX) define the navigation and flow of
    an interface. APIs are a key enabler of front ends and allow the clear separation
    between UI and logic.


    ## Connectedness, Sharing, and Survival


    Undoubtedly, the Internet has enabled an unprecedented level of connectedness.
    I cannot imagine how generations before us sat patiently waiting without updates,
    while their significant others were delayed in shopping queues. Or driving around
    without a GPS-enabled app, only armed with a paper map, trying to find street
    names or having to ask strangers for directions. With the first wave of the Internet
    outside academia, organizations established presence by having a website. Today,
    almost every organization needs a website and without one, identity and trust
    cannot be established.


    This slowly evolved from a “contact us” form to full blown e-commerce capabilities
    which allowed end users to interact directly with suppliers. Smart phones have
    also enabled applications which allow direct interaction between end consumer
    and provider. Thankfully, due to the low price point of devices and the widespread
    availability of mobile data, large percentages of the world’s population are now
    connected. This has also given rise to a wave of sharing.


    Services such as Airbnb allow people to rent out a spare room or an entire home.
    Ride sharing services like Uber and Lyft are super simple to use and are constantly
    innovating with options such as low-cost trips and package delivery. This has
    enabled a paradigm shift as it could allow people to not make long-term investments
    in property and motor vehicles. Future generations may not need a driver’s license
    as it may be more economical and practical to use ridesharing than owning a car.


    From an industry perspective, the lines between organizations are blurring. One
    of the most successful mobile money services in East Africa is run by a telecommunications
    company. Healthcare providers have also entered the banking fray and are providing
    financial services. Banks have not rested on their laurels and are now offering
    telecoms services as Mobile Virtual Network Operators (MVNO).


    Although movements into new industries are possible, it is far more difficult
    for established organizations to achieve this. However, collaboration and partnership
    are another route which could help established organizations to transition. Although
    it might seem “counter-survival,” working with startups and potential disruptors
    could be the mechanism that allows an organization to survive. The adage of “if
    you can’t beat them, join them” rings true, and many organizations are now partnering
    with startups and participating in bootcamps to incubate new, fresh perspectives.
    In much the same way as it seems unfathomable today for an organization to not
    have a website or a mobile application, not having an API for consumption will
    be viewed the same way in the future.'
