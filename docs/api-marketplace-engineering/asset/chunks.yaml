  trans: '

    ### 开发者付费


    让我们从一种能让资本家满意的方案开始。毕竟，当 API 市场这一概念被拿去融资时，其财务可行性将会是一个热门话题。在这种方式下，第三方提供商将为使用 API
    产品付费。通过研究 Twilio 等成功平台，可以发现有多种实现方式：


    *   **按使用付费**：这本质上是一种“预付费”概念。多年前，移动运营商向客户提供语音和短信服务时，客户通常会先往账户里充值“话费”，这一模式因此流行起来。我并非经济学家，但我一直觉得很奇怪：这类账户中的语音单位成本（按秒或按分钟）通常高出许多——尽管移动运营商承担的风险其实更低。更奇怪的是，这种做法在很长时间里基本被用户群体普遍接受。从消费角度看，第三方会预先购买额度，随后随着
    API 使用而逐步扣减。一旦额度耗尽，将不再处理任何请求。对 API 提供方的好处是：预先收款、风险更低，而且如果资费参照移动套餐——单位成本还更高。对 API
    使用方的好处是风险可控——采用这种方式，可以设定明确预算以防成本失控，并可随时终止合作关系。


    *   **免费增值（Freemium）**：不少云服务商会提供免费的计算资源和额度，以吸引开发者进入其平台。因为这些优惠，我个人确实使用过很多产品和服务。随着我对
    Firebase 等产品越来越熟悉，我后来转向了付费选项，以获得更多功能。若非有推广赠送额度，我可能不太愿意直接提供信用卡信息去尝试。这一模式可用于赢得开发者信任；若使用得当，还能建立用户对你
    API 产品的忠诚度。对 API 提供方而言，风险在于服务本质上是零成本提供的。但在许多情况下，基于 API 的特性，这种风险可能很小，因为通常只是处理请求所产生的内部成本。站在开发者角度，这显然对我很有吸引力。


    *   **分层定价**：在金融服务行业，我们看到金融科技（FinTech）解决方案出现了爆发式增长，这些方案旨在改进金融服务的交付与使用方式。它们本质上是拥有好点子的初创公司，但往往资本投入有限。分层产品能够让处于组织生命周期不同阶段的消费者，以符合其需求的价格点访问你的产品。反过来，套餐也可通过结构设计来保持低成本——例如基础套餐可提供有限支持。分层还能够清晰展示不同等级之间的差异，并可用于财务预测，这对初创公司的商业计划极其重要。每个层级可包含：在限定周期内指定数量的免费交易、超出后的按笔计费、不同级别的支持服务，以及服务可用性或对特定
    API 产品的访问权限。产品负责人需要开展大量研究来设计这些套餐，因为不同地区、人口结构和消费者行为会导致市场差异显著。在我的职业生涯中，我见过许多商业模式在一个市场表现极佳，却在另一个市场惨淡失败。产品必须针对消费市场进行定制。


    *   **积分制**：我们国家最成功的医疗保障计划之一就是围绕“积分”概念构建的。这个想法极其简单，但在运作效果和覆盖范围上却影响深远。会员因健康生活方式获得积分——锻炼越多、体能越好，积分越高。随着积分增加，用户等级提升。会员随后可以折扣价购买机票、电影票等商品。对计划提供方的好处是：健康会员更不容易生病并发起理赔。这个项目拥有大量会员，很多人如今对健身近乎狂热；它甚至成功到该组织已进入银行业——激励机制是消费也可获得积分。这是一个多方共赢的案例。消费者与提供方都受益，参与该项目的大量外部服务提供商也同样受益。将该模式简单应用于
    API 市场的方式是：消费者在达到特定交易次数后获得积分额度。该额度可用于抵扣成本，或购买你组织中的其他产品。例如，第三方消费者可以使用通过 API 交易获得的积分，抵扣其月度账户费用。这有助于产品间的交叉导流，从而提升客户留存。在上述场景中，消费者可能不愿转向其他提供商，因为那会影响其每月账户费用。


    *   **交易手续费**：这可能是最容易实施的机制。每个 API 请求都会生成一个事件，并被路由到某个引擎，在那里完成中介处理、计费评级与出账。在一个计费周期结束时，会生成账单，然后由消费者付款。实际落地中隐藏着大量复杂性。开票、催收和计费争议都是必须考虑的领域。由于计费发生在使用之后，账单失控的风险很大——就像云服务或产品被意外持续运行，最终产生天文数字账单一样。提供方同样面临风险，因为客户可能拖欠应付款项；同时还需要投入大量时间进行客户教育，以避免此类情况，并维持更长期的客户关系。尽管这种方式最透明，但我认为它也是最基础、最僵化的方式，因为它并不鼓励或奖励第三方行为。


    在继续之前，有两个关键因素必须考虑。第一，对于上述任一方式，平台的计费能力都必须坚如磐石、透明清晰，不能存在任何疑点或不确定性。借鉴移动计费的经验，客户问题通常可通过明细账单被立即解决。你的计费平台必须能够生成明细账单，清楚展示交易发生时间、调用了哪个
    API，并且能够进一步下钻，提供诸如交易来源、请求载荷和响应载荷等附加信息。


    第二个、也可能是*最*重要的因素是：API 产品必须*首先*为第三方创造价值和收入，进而才会为你的组织带来收入。完全可以构建并发布一个 API 产品，再给它贴上高价标签，以彰显其潜在高价值并作为宣传资本。然而，如果没有有说服力的价值主张，第三方采用和使用将很少，它最终只会被搁置，带来微薄收入。

    '
- fmt: '## Developer Gets Paid


    The principle of this approach is that the third party is incentivized to use
    the organization’s APIs. All approaches, at their core, must be viewed as a partnership
    as the success of one implies the success of the other. Here, the consumer is
    an extension of the organization and shares the spoils of the revenue. This reminds
    me of a conversation I had with the owner of a startup who had sold his business
    for a hefty sum. Although this is a formula many wish they had, he was remorseful
    that he had retained full ownership, the business could have been far bigger with
    more stakeholders.


    From a financial perspective, it could be more lucrative to share a piece of a
    larger pie than have full ownership of a smaller one. This is a key theme of an
    API Marketplace – it allows your organization to reach more customers through
    third parties. If we consider this logically, if the third party stands to benefit
    from a transaction that it facilitates, it is part of the value chain and will
    do its best to close the deal. Let us consider ways this can be achieved:


    - Revenue share: This is probably one of my favorite mechanisms for third-party
    engagement. It reflects a win-win approach and clearly demonstrates the organization’s
    commitment that the third party is a valued partner. A key factor for the explosive
    growth of mobile networks in Africa is that airtime could be purchased from small
    vendors on almost any street corner. The incentive for the vendor is the commission
    made on any sale. The mobile operator simply used a well-established, widespread
    network for airtime distribution. A third-party provider is also far more likely
    to promote or feature a product or service which results in a higher revenue share.
    The potential revenue split could also be the tipping point in a third party’s
    business plan to build a new product or service.


    - Affiliate: Third parties with an established customer base can also be engaged
    as brand advocates to encourage adoption of your API products. In much the same
    way that training partners assist candidates seeking certification, there are
    service providers who can build custom bootcamp programs to get potential developers
    up and running with your API products. In addition to getting more exposure to
    the APIs, a benefit is direct feedback from the affiliate service provider and
    developers in training regarding API adoption. As much as this function could
    be undertaken by the internal delivery team, a specialist organization may already
    have an established subscriber base, the skills to build repertoire with developers,
    and most importantly, neutrality that new consumers may be less wary of. Partnerships
    with startup incubators, programs designed to support developing businesses, are
    also a great way to support these initiatives and an excellent opportunity to
    engage new organizations and showcase Marketplace value, early in their lifecycle.


    - Referral: The success of this pattern can be seen by simply clicking through
    the thousands of sponsored YouTube channels. By implementing a simple referral
    program, developers can be rewarded if their friends and colleagues sign up with
    their code. This can certainly help with attracting and building an audience for
    your Marketplace. For some API products, the potential of a customer Lead may
    be sufficient benefit to compensate a third-party provider. For example, a third
    party could be compensated if a potential customer uses a financial loan calculator
    API when considering a home or vehicle purchase. As the customer’s details could
    be relayed in the call, it provides a potential sales opportunity for the organization.


    ## Free


    The key difference between Free and Freemium is that Free API products will always
    be provided at no charge. Value creation in this instance is implicit – it drives
    API adoption and increases the number of third-party providers using your platform
    – whom could be potentially converted over time. A goal is that the zero cost
    will result in mass proliferation which will help get your brand to more potential
    customers.


    This represents an appealing option for third parties, and as much as it may be
    provided grudgingly by the host organization, the potential impact and value to
    the third party could be significant. For example, a simple data API to provide
    lists of income and occupation types may be taken for granted in an enterprise
    but may be of great value for a startup that needs the data for their registration
    process. It also affords your organization the opportunity to be accessible via
    new channels – which are essentially apps and services built by third parties.


    ## Indirect


    In the spirit of partnership and to cement the foundational principle of a win-win
    model, this strategy is centered on the benefit to the end customer. A successful
    sales strategy is one where all participants gain value from the transaction.
    Value, using an Indirect strategy, can be created in the following ways:


    - Customers: Meeting regulatory requirements, such as Open Banking, is a clear
    signal that the ownership and sharing of customer data is in the control of the
    end user. It affords users the ability and flexibility to securely access new
    products and services in a way which is facilitated by your platform. Essentially,
    their data but on your terms. It’s a win-win for both user and organization.


    - Business-to-business (B2B): Allowing API access to external partners broadens
    the range of solutions available to your customers. For example, API access to
    your Loyalty and Rewards program could allow the end customer to participate in
    a reward points exchange system which not only extends the reach of your program,
    resulting in more points redemption, but also provides a good value proposition
    for the user.


    - Informational: Customer awareness regarding changing market conditions can be
    achieved through sharing of information using APIs. Examples of information which
    may be shared are foreign exchange rates, marketing campaigns such as promotional,
    time-sensitive offers, and organizational updates.


    - Reputational: Establishing a new digital channel positions your organization
    as a technology leader and a game changer. This could be a factor that differentiates
    your organization from competitors and provides significant value for your brand.'
