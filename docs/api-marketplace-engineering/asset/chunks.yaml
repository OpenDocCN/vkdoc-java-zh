    \ van Ross, Cecil Loots, Marty Dada, Liesl Moss.\n\nTo the Apress team – Jonathan\
    \ Gennick, Jill Balzano, Robert Stackowiak, Laura Berendson, and Welmoed Spahr\
    \ – I cannot thank you enough for this opportunity of a lifetime. It is uncanny\
    \ – although we are continents apart, I have continually felt your guidance and\
    \ presence throughout the process.\n\nLast, but not least, special thanks to Marco\
    \ Vidulich and Ray Naicker for their leadership and uncanny ability to see around\
    \ corners and the courage and resolute conviction to pioneer unchartered territory\
    \ to build what has become Africa’s leading API Marketplace.\n\n## About the Author\n\
    \n## About the Technical Reviewer\n\n# 1. API Engineering\n\nAn API Marketplace\
    \ is a platform for an organization to share internal services with third-party\
    \ developers. The Application Programming Interface (API) is the mechanism used\
    \ to achieve the access. Capability is packaged into different products – for\
    \ example, to access customer data or to send messages on a GSM network. Much\
    \ like a real-world Marketplace, this is the rendezvous point between the organization\
    \ (seller) and third party (buyer) where the products are advertised and consumed.\n\
    \nSome API Marketplace initiatives start out of necessity – to meet regulatory\
    \ compliance – some to play catch-up with competitors, while others are purely\
    \ evolutionary. Ours started with a Vision. The aim was to empower third-party\
    \ providers to harness the capability of our enterprise to better serve the needs\
    \ of our customers. The altruistic view is that it results in a positive outcome\
    \ for all participants. A win for the organization – revenue through increased\
    \ consumption. A win for our customers – improved service through innovation.\
