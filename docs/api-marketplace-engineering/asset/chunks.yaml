    with multiple testing efforts underway, automated testing efforts are generally
    delayed. Automated testing must become part of the team culture as its execution
    is a core element of the Continuous Integration (CI) /Continuous Delivery (CD)
    process. This is the primary reason why organizations such as Netflix can release
    often to production.


    ## Delivery Approach


    Our Marketplace came into existence at a time when the organization had made a
