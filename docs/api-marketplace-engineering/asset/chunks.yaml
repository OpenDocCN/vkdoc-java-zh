  trans: '

    ### 交付负责人（Delivery Lead）


    交付负责人负责协调并安排构建产品的各项活动。这是一项具有挑战性的任务，需要在多个工作流之间进行细致协调，如图 8-1 所示，以确保能够满足时间计划。由于外部团队和系统可能提供关键依赖项，因此需要大量的沟通与协调，每个环节都必须被精心编排，以尽量减少延误。


    ![../images/509947_1_En_8_Chapter/509947_1_En_8_Fig1_HTML.jpg](img/509947_1_En_8_Fig1_HTML.jpg)


    图 8-1


    API 开发编排


    让我们来看一看某些外部实体如何参与开发流程，以及交付负责人的职责：


    *   **提供方（Provider）**：将提供现有接口的规范、新接口开发的时间计划，以及可用于解答开发者问题的领域专家资源。来自后端的任何延迟都可能影响开发和测试活动。


    *   **消费方** **（第三方提供商）**：将请求 API 产品规范以及可用性时间计划——无论是在沙箱环境（后续章节会讨论）还是生产（Live）容量下——并与产品负责人协作协调接入活动，例如审查与审批，以预先规避行政流程延误。


    *   **财务与报告**：预测产品交付时间线以及来自外部团队的潜在成本回收，管理 API 交付与所构建产品运维支持的预算，并向项目干系人定期汇报交付情况，同时管理其对时间计划的预期。


    *   **开发**：通过在开发开始时提供已批准的设计和后端接口规范、提供对领域专家的访问以快速解决问题，以及提供对企业资源的访问，确保开发人员拥有一条平稳且不中断的推进路径。


    由于在任何时点都可能有多个 API 处于开发中，交付负责人需要对多个产品有全局视角，并可能会将某个产品的交付优先级置于另一个之上。例如，如果一个更紧急的 API
    需要额外开发人员，团队可能不得不进行重新平衡。


    基于多年的项目经验，一个宝贵的教训是：你能投入到一个问题中的人数是有上限的。也就是说，有些任务需要特定的时间，增加团队成员并不能更快完成。团队管理层必须理解并认同这一点，因为“人多反而坏事”（too
    many cooks spoil the broth）这句谚语很容易应验：为新成员补齐背景需要耗费时间，而任务拆分还可能带来依赖关系和预算超支。


    由于需要同时处理多项事务，在我们的实施中效果非常好的一种策略是：将交付负责人角色分配给不同个人，分别侧重商务或技术方向。这样我们可以让一个人专注于追踪财务和风险等商务目标，另一个人专注于完成架构与安全审批等技术目标。两者之间有重叠区域，这减少了对单人交付的依赖——偏技术的负责人可以借助项目发起人的支持；同样，如果其对应负责人暂时不可用，偏商务的负责人也可获得工程团队支持。我喜欢把他们称为“动态双人组（dynamic
    duo）”，他们确保交付光谱中的所有需求都被考虑到，从而使我们的项目保持平衡。


    ### 开发人员（Developers）


    集成开发从其本质上看通常节奏很快，因为两个系统之间的接口往往处于整个项目交付的关键路径上。传统项目时间线通常以“月”为单位，而我们的交付目标是冲刺（sprint），最短可能一周，最长两周。其驱动因素在于第三方消费方通常也处于高速节奏环境中，发布周期更快，因此上市时间（time
    to market）成为关键因素。


    我们应对快速交付周期的理念是：在每次发布中对 API 产品进行迭代。也就是说，我们不等待三个月后进行一次“大爆发式（big-bang）”上线，而是先提供基础功能，并在每次部署时持续更新。这确实会给开发增加一些复杂性，因为在推进新版本工作的同时，可能还需要修复或更新前一个版本。


    在开发者旅程中有很多方面需要考虑。下面列举一些我认为成功的关键点。


    *   **主人翁意识（Ownership）**：我们的开发团队中有相当一部分是全栈工程师。某些细分技能开发者有时是必要的，但开发者应具备解决其直接专业领域之外问题的能力。举例来说，开发者可能会建议修改
    API 定义，并提交 swagger 更新供评审。主人翁意识的关键在于*及时*沟通。由于开发可能跨越一系列系统和人员（如 API 网关、微服务和数据存储），沟通是成功交付的关键。在以“周”为单位衡量的交付周期中，如果等到下一次团队会议才报告问题，损失的几个小时就可能导致错过目标日期。强烈鼓励团队成员在可能的情况下先自行尝试解决阻塞问题；如果无法解决，再升级寻求帮助。诚然，某些挑战（例如访问后端领域专家）可能无法自行克服。在这些情况下，团队文化应当是灵活转向（pivot）——做出合理假设并继续推进，暂停当前活动并转向无依赖任务，或向团队其他成员发送消息，表明自己可以协助其他任务。


    *   **单元测试（Unit testing）**：在敏捷、快节奏的交付环境中，为实现激进交付时程，良好且充分的单元测试可能会成为被牺牲的一环。在很多实施项目中，我都观察到人们常把这个“问题”往后拖，开发者寄希望于后续质量保障阶段再识别并解决问题。团队就单元测试的覆盖水平作出一个全局且有意识的决定非常重要。在大多数情况下，*减少*单元测试是交付压力所致。项目干系人必须理解单元测试是开发流程中的关键要素；如果为了更快交付而将其短路，也必须承担相应责任。另一种缓解方式是正面应对而非忽视问题。也就是说，早期迭代可以先发布基础功能，并以
    beta 版本标识；而在周期后段的计划发布中，明确聚焦测试与质量保障。这一策略可以缓解交付压力——尽快推出一个版本，但同时对全面发布前加固方案作出明确承诺。

    '
- fmt: '## Documentation


    Another sacrifice made to appease the Delivery Gods is deferring proper documentation.
    To be honest, even the benefit of time may not result in good documentation from
    a developer. In a traditional, waterfall-driven project, not a single line of
    code would be written until the technical design was drafted. In an agile, digital
    delivery environment, prototypes are up and running before requirements are even
    fully captured, and there is always the possibility that solutions and implementations
    could change all the way up to and including production deployment. As a result,
    developers are sometimes loath to document their development as it is fluid and
    could change over its lifetime. One option is to accept this position and adopt
    a strategy that the documentation is “in the code.” Another option is to create
    a simple template on a team collaboration wiki which requires minimum, but key
    information such as mapping rules between source and target systems. It is important
    that the development methodology be geared accordingly to support the selected
    strategy. Review and approval of documentation by a Team Lead should be a key
    requirement for the gate to transition to the next delivery phase. Without the
    necessary checks and balances in place, it allows the possibility of low quality
    or no documentation.


    Each team will have their own variant of development practice tailored to the
    host organization. It is extremely important that all stakeholders, internal and
    external, are aligned and for developers to manage expectations regarding the
    level and quality of solution delivery during planning sessions. If timelines
    are reduced, all members of the team should be aware and accept that elements
    such as testing and documentation will have to be revisited. Instead of ignoring
    these issues, address it at the outset and plan accordingly, as a team. A key
    to the success of our implementation is that development is a team effort.


    ### Quality Assurance


    This is one of the most vital pillars of support in our delivery process. As a
    signal of importance, the QA or test engineer can exercise a veto to stop a release.
    As delivery objectives are aggressive, developers tend to test in a vacuum and
    primarily on happy-path scenarios. Integration testing is possibly the first time
    the solution is tested across different systems and in various contexts.


    As part of the testing effort, the solution must be subjected to various levels
    of scrutiny, from standard to error to exceptional scenarios. Standard, functional
    and error conditions can be simulated by providing a range of valid and invalid
    inputs. Simulating exceptional scenarios may require bringing down connectivity
    components to backends to determine application behavior. A vital input of scenarios
    and conditions to be tested may be provided by the Operations team from experience
    with regular production releases.


    As we have evolved our testing capability significantly over some time, we now
    also consider the following sub-domains:


    - Security: During a recent application scan conducted by the Information Security
    team, we received a blistering report of close to 100 pages. From review of the
    report, we found that improved validation of a single input field would address
    70 pages of the report. The remaining issues had been previously identified for
    other APIs and discussed. Based on this learning, we made a team decision that
    the security scan will be run internally as part of the testing review and approval
    process. This will allow the team to address any issues pre-emptively. It is important
    to note that this is not the end of our security review. Before a new API product
    is approved for release, the Enterprise Information Security team enlists an external
    service provider to conduct a detailed security assessment to determine if there
    are any vulnerabilities.


    - Performance: Part in jest, part serious – stress testing in an integration context
    could become quite a stressful activity as it would require participation from
    downstream service providers. Performance testing of API Marketplace components
    should be done regularly in a loopback or environment with mock backends. Testing
    with backends should also be scheduled, at a minimum every quarter. This will
    ensure all the elements in the end-to-end value chain can withstand load from
    peak events like Black Friday.


    - Automated testing: Unfortunately, this presents a unique catch-22 for testing
    teams. Automated testing will undoubtedly save a considerable amount of time,
    especially for regression testing activities. In a frenetic environment, with
    multiple testing efforts underway, automated testing efforts are generally delayed.
    Automated testing must become part of the team culture as its execution is a core
    element of the Continuous Integration (CI) /Continuous Delivery (CD) process.
    This is the primary reason why organizations such as Netflix can release often
    to production.


    ## Delivery Approach


    Our Marketplace came into existence at a time when the organization had made a
    conscious decision to shift to a more agile delivery approach. A new Way of Work
    was quickly established, and it was not uncommon to find business units which
    had previously operated along more traditional lines huddled around a Kanban board
    for the morning standup. Our delivery philosophy has always been based on Agile
    principles, and we have adapted and tailored our approach over time to meet unique
    requirements.


    The initial strategy for the Marketplace was more tactical. The primary objective
    of the team was simply to launch an API Marketplace with the hope that third-party
    providers would come. As a result, delivery targets and sprint objectives were
    technically focused which kept the team busy but did little to establish much
    needed roots for the platform.


    A dedicated Product Owner was assigned to the initiative, and attempted to shift
    focus, but was often overwhelmed by a stubborn technical team. Fortunately, the
    platform was identified as an enabler to a much larger organizational objective
    which mandated more process and structure operationally and more direction and
    focus commercially. This has necessitated better planning and use of time, development
    capacity, and budget to achieve strategic objectives for the Marketplace.


    The following sections detail our process, which is still evolving, for the handling
    of requirements as it enters the Delivery phase of its lifecycle.'
  raw: '*   **Documentation**: Another sacrifice made to appease the Delivery Gods
    is deferring proper documentation. To be honest, even the benefit of time may
    not result in good documentation from a developer. In a traditional, waterfall-driven
    project, not a single line of code would be written until the technical design
    was drafted. In an agile, digital delivery environment, prototypes are up and
    running before requirements are even fully captured, and there is always the possibility
    that solutions and implementations could change all the way up to and including
    production deployment. As a result, developers are sometimes loath to document
    their development as it is fluid and could change over its lifetime. One option
    is to accept this position and adopt a strategy that the documentation is “in
    the code.” Another option is to create a simple template on a team collaboration
    wiki which requires minimum, but key information such as mapping rules between
    source and target systems. It is important that the development methodology be
    geared accordingly to support the selected strategy. Review and approval of documentation
    by a Team Lead should be a key requirement for the gate to transition to the next
    delivery phase. Without the necessary checks and balances in place, it allows
    the possibility of low quality or no documentation.


    Each team will have their own variant of development practice tailored to the
    host organization. It is extremely important that all stakeholders, internal and
    external, are aligned and for developers to manage expectations regarding the
    level and quality of solution delivery during planning sessions. If timelines
    are reduced, all members of the team should be aware and accept that elements
    such as testing and documentation will have to be revisited. Instead of ignoring
    these issues, address it at the outset and plan accordingly, as a team. A key
    to the success of our implementation is that development is a team effort.


    ### Quality Assurance


    This is one of the most vital pillars of support in our delivery process. As a
    signal of importance, the QA or test engineer can exercise a veto to stop a release.
    As delivery objectives are aggressive, developers tend to test in a vacuum and
    primarily on happy-path scenarios. Integration testing is possibly the first time
    the solution is tested across different systems and in various contexts.


    As part of the testing effort, the solution must be subjected to various levels
    of scrutiny, from standard to error to exceptional scenarios. Standard, functional
    and error conditions can be simulated by providing a range of valid and invalid
    inputs. Simulating exceptional scenarios may require bringing down connectivity
    components to backends to determine application behavior. A vital input of scenarios
    and conditions to be tested may be provided by the Operations team from experience
    with regular production releases.


