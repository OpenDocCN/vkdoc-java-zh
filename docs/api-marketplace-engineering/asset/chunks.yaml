  trans: '

    ## 背景


    数字支付服务支撑了电子商务的繁荣。从最初仅采集信用卡信息，到为电子购物篮中的商品完成支付，这一能力已显著提升。表面上看，交易参与方似乎只应包括终端用户、在线零售商和金融机构。由于银行数量众多、协议复杂且接口机制繁琐，创新型金融科技（FinTech）公司通过介入以抽象这些复杂性，并为在线零售商提供易于使用的服务，已将自身确立为新的、不可或缺的参与者。


    其中一类服务是支付发起。图 2-1 展示了在线零售商如何只需对接一个支付服务提供商，即可借助其与多家银行的接口网络，而无需分别与每家银行直接集成。


    ![../images/509947_1_En_2_Chapter/509947_1_En_2_Fig1_HTML.jpg](img/509947_1_En_2_Fig1_HTML.jpg)


    图 2-1


    直接集成与经纪式集成策略对比


    ### 屏幕抓取


    通过网上银行渠道，第三方支付服务商一直能够借助屏幕抓取这一做法实现与银行的集成。屏幕抓取是一种技术：通过模拟网页浏览器的计算机软件读取并提取目标网站的数据，或执行通常需要用户在网站上手动完成的操作。为完成支付，客户会向服务商提供其银行凭证（用户名、个人识别码（PIN）和密码），服务商再利用这些信息启动自动化流程，登录用户的网上银行门户并完成付款。


    对终端用户而言，其优势在于便捷——可节省登录网银门户、录入零售商银行信息、设置付款以及发送付款确认的时间。该流程也被优化并无缝嵌入结账路径中，大多数客户甚至不知道自己实际上是在直接登录网上银行。由于传统的银行间电子资金转账（EFT）通常需要数小时甚至数天才能到账并显示，对商户而言的优势是支付服务商可以实时提供付款确认。因为支付服务商已连接到用户网银门户、核验资金并执行交易，商户可以确信付款已完成——而不必依赖终端用户提供的付款确认（后者可能存在欺诈风险）。


    这种做法的内在缺点在于：从数据隐私和消费者保护角度看，通过屏幕抓取访问客户金融信息通常被认为安全性较低。鉴于其对支付系统完整性、安全性与效率以及客户本身都构成风险，银行监管机构已日益加强干预以遏制该方式。


    屏幕抓取还支持“源头分拣”（sorting at source）这一实践。这使得在多家银行开设账户的支付服务商能够按银行对付款指令进行分拣，并分别转发至对应银行——后者再将其作为内部交易处理。尽管源头分拣模型听起来像是降低成本、提升清算速度的更优方式，但在某些监管政策和规则下此做法被禁止，因为它会减少银行间清算。由于银行业长期缺乏能够支持与第三方安全共享客户金融信息的法律框架和政策，屏幕抓取一直是支付发起和账户聚合中的常见机制。


    ### 应用程序编程接口（APIs）


    为解决这一问题，银行一直在探索 API 作为替代方案，以共享客户金融信息并支持创新支付解决方案，从而提升客户体验。在传统银行语境下，API 大多面向内部、专有、缺乏标准化且外部使用者无法访问——即所谓“封闭
    API（closed APIs）”。相对地，“开放 API（open APIs）”可被第三方用于创建创新应用和产品，扩大客户触达并改善用户体验。


    API 在银行业中的一项优势是：在获得客户同意的前提下，*可以*以安全方式与第三方共享客户数据，并且*无需*共享登录凭证。第三方应用可从公共网络直接连接到银行系统，以获取账户信息、发起支付并跟踪支付进度。若
    API 由银行独占，可能引发担忧：银行会因控制数据共享范围而拥有过大的权力。这可能导致银行扮演“守门人”角色，进而造成反竞争并抑制创新。“开放银行（Open
    Banking）”概念正是在这种背景下出现，旨在让第三方服务商通过开放 API 安全访问银行中的客户金融信息，以利用创新技术并提升客户体验。下一节我们将更详细地探讨开放银行。


    ## 开放银行


    由于客户对数据访问与控制的需求上升，以及渴望颠覆市场的第三方服务商不断涌现，银行业正面临一场迫在眉睫的革命。开放银行为平稳且可控的转型提供了机会，更重要的是，它让银行能够继续成为新生态系统中的关键组成部分。客户将对其金融数据拥有更大控制权，从而作出更明智的决策并更好地管理资金。竞争加剧将带来更广泛、更多样化的服务供给，并推动第三方服务商与银行双方共同创新。


    ### 目标


    我们考虑开放银行政策的一些目标：


    *   **金融稳定与安全**：在各平台间共享的敏感客户数据必须得到保护，以维护整个金融生态系统的信心。


    *   **透明度与公共问责**：客户应了解使用其银行凭证所涉及的风险，包括许多第三方服务商仅承担有限责任这一点。任何开放银行实施方案都应明确第三方获得客户授权共享金融数据访问权限的流程与时间线。为保护客户数据权利，应禁止在价值链中向其他方进一步共享数据。


    *   **标准化与技术中立**：应明确定义 API、数据处理、存储和网络安全标准，以便轻松对接多个银行平台，而无需定制化开发。


    *   **促进金融包容、竞争与创新，以及成本效益**：开放银行有助于为所有利益相关方创造公平竞争环境，以提供服务和解决方案。它应使广泛客户群体都能获得银行服务——既包括为高收入人群提供个性化投资产品，也包括帮助金融服务覆盖不足的客户获得银行服务。从实施角度看，中小银行和第三方也应能够在无需大量资本投入和技术基础设施的情况下参与其中。

    '
- fmt: '## Terminology


    When navigating Open Banking regulatory frameworks, you may encounter many new
    terms and classifications. We consider the most common ones and discuss how they
    fit into the framework.


    - `Account Information Service Providers (AISP)` help customers by providing a
    consolidated view of their financial position by aggregating and analyzing transaction
    information from one or more of their payment accounts. This may help a customer
    to establish credit worthiness by checking earnings and expenses from multiple
    sources.

    - `Payment Initiation Service Providers (PISP)` initiate a payment transaction
    on behalf of the customer via a different platform than the one belonging to the
    bank where the account is held.

    - `Third-Party Provider (TPP)` is an entity authorized to access accounts on behalf
    of customers but that does not operate those accounts themselves. Types of `TPP`s
    include `PISP`s and `AISP`s. An example of a `TPP` is a `FinTech`.

    - `Account Servicing Payment Service Provider (ASPSP)` provides and maintains
    a payment account for a payer. This is essentially the Bank or Financial Institution
    which holds the customer’s account and money.


    Figure `[2-2](#509947_1_En_2_Chapter.xhtml#Fig2)` provides a visual representation
    of the terms and classifications and how it fits together.


    ![../images/509947_1_En_2_Chapter/509947_1_En_2_Fig2_HTML.jpg](images/509947_1_En_2_Chapter/509947_1_En_2_Fig2_HTML.jpg)


    Figure `2-2`


    Visual representation of Open Banking participants


    ## Benefits


    Open Banking can provide a number of benefits to all participants in the ecosystem.
    Customers can enjoy a less admin-intensive, more streamlined online retail experience
    by leveraging payment services. This saves time previously needed to log on to
    banking portals and sending confirmation of payment. Account aggregation services
    allow easier comparison and switching. The sharing of transactional data with
    third-party providers is also safer as the customer has fine-grained control over
    which data is shared, the duration and the ability to revoke access. Access to
    account history can allow third parties to offer personalized products and services
    and allows more accurate risk ratings. Payment methods, such as mobile wallets,
    are also available as an alternative to card and transactional account payments.
    Consumers also benefit from increased competition as this will potentially lower
    fees for financial services and raise service levels.


    Third-party providers have more business opportunities as Open Banking creates
    a level playing field for non-bank providers. This will allow them to offer innovative
    account and payment solutions that could improve the customer experience. Insight
    into a customer’s historical account data could allow better risk rating and product
    matching.


    Although it may appear, at first glance, that Open Banking will impact banks negatively,
    there could be many benefits. Customer trust can be maintained by engaging in
    a transparent, open relationship by providing the capability to easily and safely
    share data and control how money is managed. Confidence can also be instilled
    by demonstrating digital capability and embracing innovative solutions, with the
    necessary security controls, to offer customers optimal or premium products and
    services. Banks can create new partnerships and access new revenue streams through
    an `API`-based platform type business model. The reach of the bank also increases
    as the products and services of third-party providers could reach a wider audience
    in shorter, more aggressive timeframes.


    Merchants can also grow their product offering and extend reach to markets that
    were previously difficult to access. An example could be the ability to make a
    payment from a transactional account which would allow access to customers without
    a credit card. Alternate payment methods could also result in lower card transaction
    costs. Open Banking has the potential to eliminate various fee elements of card
    transactions that are part of merchant service charges from the issuing banks,
    processors and schemes, which is also a benefit for customers.


    The payment system benefits from increased competition as the levelled playing
    field will potentially bring innovative payment solutions. Open Banking can enhance
    the transparency of payment flows by removing fake and fraudulent third-party
    providers and building technical and data-sharing standards. It also allows a
    more efficient infrastructure that underpins payments that are efficient for clearing
    and settling transactions.'
