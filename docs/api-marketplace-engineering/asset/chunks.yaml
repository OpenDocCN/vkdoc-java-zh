    more serious, but essentially a “safe-space” to verify the platform from an operational
    context. As more role-players entered our ecosystem, we had to balance super-aggressive
    delivery requirements and operational issues deeply rooted in backend platforms.
    This resulted in possibly the greatest expansion of the Marketplace. The number
    of integrations to backend platforms grew exponentially in the space of a few
    short months. What helped incredibly was the impetus of the super-app since our
    links into more backend platforms were able to grow as the juggernaut smashed
    down barriers and tore through red tape. With each new integration, we had to
    build a new relationship with a backend – not only for development, but also for
    operational support.


    We have since moved on to open-water. Spurred on by the success of supporting
    the load of a high-performing internal consumer and earning our stripes in the
    process, we are now working more with external third parties. The size and scale
    of the third parties range from single-developer entities to well-known FinTechs
    to established online retailers. However, we treat all with the same level of
    respect and commitment.


    What continually amazes me is the symbiotic nature of the ecosystem. The API Marketplace
    will not exist without consumers and the support from enterprise services. Yet,
    it is a pivotal component for external consumers to leverage the capability of
    the enterprise services. A ripple effect, which we hope will one day turn into
    a butterfly effect, is that the Marketplace has stimulated the local developer
    community. As a leading Financial Services provider, the capability provided by
    our Marketplace has enabled the building of many innovative products and services.
    These new shoots of growth need to be nurtured and supported and will result in
    successful third parties who will further fuel the Marketplace. The success of
    the Marketplace hinges on an active, thriving ecosystem where all entities work
    and grow together.


    ## Developer Engagement


    An API Marketplace may use different strategies for interaction with developers.
    Some platforms use a community-based approach, where access is open, and members
    support each other to effectively leverage the platform. The interaction between
    developers could also result in innovative products and solutions which could
    include APIs from different platforms. In these engagements, the developer portal
    is essentially a meeting point for like-minded developers to share ideas and collaborate.
    Some portals also provide the experience and expertise of individual developers.
    As solutions are verified and endorsed, developer rank and credibility increases.
    Experienced members could act as ambassadors as they assist new developers.


    Another approach is to choose partners based on key selection criteria. The intention
    is to allow a smaller subset of more experienced, established, and like-minded
    partners into the ecosystem. Closed-ecosystem partnerships are used for creating,
    extending, and improving API offerings. Developers could benefit from financial
    compensation, premium support, and coaching through a partner network, early access
    to new products, and formal accreditation. Although the developer pool is smaller,
    this could potentially require more management and support from the platform provider.


    As developers from different organizations might not communicate directly, a partner
    manager may be required for support and to forward queries to the backend technical
    team for resolution. Sharing information or assisting fellow developers may also
    not be possible since they could see this as a loss of competitive advantage.
    It should also be noted that expected service levels in such an environment are
    significantly higher. If a developer posts a query, feedback and/or resolution
    must be provided in a significantly shorter timeframe than a community forum.


    The nature of Developer engagement will be determined by the nature of the API
    Marketplace you will build. If, for example, your APIs help to find lost pets
    in a local neighborhood, a community-approach should be used. If your APIs help
    to find sources of plutonium for building nuclear weapons, you might want to restrict
    the partners who can access your platform.


    ## Tooling


    Developers work with a wide variety of tools to get a job done. Developer tools
    could range from email clients to code editors to Integrated Developer Environments
    (IDEs) to wikis. In this section, I highlight a few tools and practices which
    I have personally found to be useful as part of my daily delivery. There are many
    amazing tools and products available for API consumption and development. This
    is not intended to be a product comparison or benchmark. If you have experience
    or are comfortable with another tool, please continue to use it.


    ### cURL


    cURL, which stands for client URL, is a command-line tool for getting and sending
    files using URL syntax. It supports several protocols including HTTP and HTTPS
    – which make it ideal for working with APIs. It runs on almost any platform on
    any hardware and is included in many popular operating systems.


    The reasons that I use cURL are as follows:


    *   **Universal**: As I hop between containers, virtual machines and servers,
    I often lose access to the powerful Graphical User Interface (GUI) driven tools
    on my local machine. The ability to *curl* to an endpoint to check connectivity
    or to simulate/replay a client request from a remote node, cut off from the luxury
    of a UI due to network restrictions, is priceless.


    *   **Simple**: I also enjoy working with cURL due to its no frills and low maintenance
    disposition. It focuses on its role as emissary in transporting a message between
    the key participants – client and server. The syntax to make various API calls
    are concise and online tutorials or samples are readily available.


    *   **Neutrality** : If a request works with cURL, or conversely does not work,
    it is unquestionable. Although developers may use different tools, a cURL command
    can be easily shared and replayed in seconds. As the command line is the lowest
    common denominator across all operating systems, cURL achieves universal citizenship
    across developer boundaries.'
  trans: '

    ## 生态系统


    这些年来，我非常幸运能够参与一个 API Marketplace 的实施工作，并且一直惊叹于这个生态系统如何随着时间推移以及项目成熟而不断演进。我们最初是在一个“小鱼缸”里起步的——只有交付团队中的少数几名成员，目标是交付一个最小可行产品（MVP）。一开始，我们与外部世界几乎没有真正的连接，只与后端平台有几条薄弱的链路。


    随着平台为生产负载做好准备，我们进入了一个更大的“水箱”，并与不同的企业团队紧密合作，以实现更高的稳定性和可靠性。随着我们理解企业能力为实施带来的价值，我们对其的尊重和认可也不断提升。在
    API Marketplace 生态系统的语境中，人们可能很容易忽略企业内部团队。如今，我认为这恰恰是平台最关键的支撑要素之一，也是我们生态系统中不可或缺的一部分。毫无疑问，以流程和治理形式存在的、与成熟企业体系的“系绳”，有时会被视作拖慢变革速度的“磨盘”。但回过头看，几乎所有这些要求都让平台变得更稳定、更可靠，也更具企业级水准。


    我们非常幸运，首个主流消费者是一个内部支持的超级应用。我们已经从“水箱”进入“水坝”——水体更大、严肃性更高，但本质上仍是一个用于从运营角度验证平台的“安全空间”。随着越来越多参与方加入生态系统，我们必须在极度激进的交付需求与深植于后端平台的运营问题之间取得平衡。这可能促成了
    Marketplace 最大的一次扩张。在短短几个月内，与后端平台的集成数量呈指数级增长。超级应用带来的推动力帮助巨大：随着这艘“巨舰”冲破壁垒、撕开繁文缛节，我们连接更多后端平台的能力也随之快速增长。每新增一次集成，我们都必须与一个后端建立新的关系——不仅是在开发层面，也包括运营支持层面。


    此后，我们已经迈向“开放水域”。在成功支撑高性能内部消费者负载并借此赢得口碑后，我们如今更多地与外部第三方合作。这些第三方的规模和体量从单开发者实体，到知名金融科技公司，再到成熟的在线零售商不等。不过，我们对所有合作方都秉持同样的尊重与投入。


    最让我持续感到惊叹的，是生态系统的共生特性。没有消费者和企业服务的支持，API Marketplace 就无法存在。与此同时，它又是外部消费者利用企业服务能力的关键枢纽。我们期待由此产生的涟漪效应，终有一天能演变为蝴蝶效应——Marketplace
    已经激发了本地开发者社区。作为领先的金融服务提供商，我们 Marketplace 所提供的能力，已经促成了许多创新产品与服务的构建。这些新的增长萌芽需要被培育和支持，并将孕育出成功的第三方，进一步反哺
    Marketplace。Marketplace 的成功取决于一个活跃、繁荣的生态系统，在其中所有实体共同协作、共同成长。


    ## 开发者参与


    API Marketplace 可以采用不同的开发者互动策略。一些平台采用社区化方式，访问是开放的，成员彼此支持，以便更有效地利用平台。开发者之间的互动也可能催生创新产品和解决方案，其中可能包含来自不同平台的
    API。在这种参与模式下，开发者门户本质上是志同道合开发者分享想法与协作的会合点。一些门户还会展示个体开发者的经验与专长。随着解决方案被验证和认可，开发者的等级与可信度会提升。经验丰富的成员可以在帮助新开发者时充当“生态大使”。


    另一种方式是基于关键筛选标准选择合作伙伴。其意图是让规模更小、但更有经验、更成熟、且理念一致的合作伙伴子集进入生态系统。封闭生态合作关系用于创建、扩展和改进
    API 供给。开发者可通过合作伙伴网络获得财务激励、高级支持与辅导、对新产品的提前访问以及正式认证。尽管开发者池更小，但这也可能潜在地需要平台提供方投入更多管理与支持。


    由于来自不同组织的开发者可能不会直接沟通，通常需要合作伙伴经理提供支持，并将问题转交给后端技术团队解决。共享信息或协助其他开发者也可能不可行，因为他们可能将其视为竞争优势的损失。还应注意，在这样的环境中，预期服务水平明显更高。如果开发者提交了问题，反馈和/或解决方案必须在比社区论坛明显更短的时间内给出。


    开发者参与的形态将由你要构建的 API Marketplace 的性质决定。比如，如果你的 API 用于帮助在本地社区寻找走失宠物，应采用社区化方式；如果你的
    API 用于寻找制造核武器所需钚的来源，你可能就需要限制能够访问平台的合作伙伴。


    ## 工具链


    开发者会使用各种各样的工具来完成工作。开发者工具范围可以从邮件客户端、代码编辑器、集成开发环境（IDE）到 Wiki。在本节中，我会重点介绍一些我个人在日常交付中认为有用的工具和实践。用于
    API 消费与开发的优秀工具和产品非常多。这里并非要做产品对比或基准评测。如果你已有经验，或对其他工具更熟悉，请继续使用它。


    ### cURL


    cURL（即 client URL）是一款使用 URL 语法来获取和发送文件的命令行工具。它支持包括 HTTP 和 HTTPS 在内的多种协议——这使其非常适合用于
    API 工作。它几乎可在任何硬件平台上运行，并被许多主流操作系统内置。


    我使用 cURL 的原因如下：


    *   **通用性**：当我在容器、虚拟机和服务器之间切换时，常常无法使用本地机器上那些强大的图形用户界面（GUI）工具。在因网络限制而无法享受 UI 便利的远程节点上，能够通过*curl*访问端点来检查连通性，或模拟/重放客户端请求，其价值无可替代。


    *   **简洁性**：我也喜欢使用 cURL，因为它朴素、免繁饰且维护成本低。它专注于自己作为“信使”的角色，在关键参与者——客户端与服务器——之间传递消息。发起各种
    API 调用的语法简明，在线教程和示例也很容易获得。


    *   **中立性**：如果一个请求在 cURL 中可用，或反过来不可用，那么结论是无可争辩的。尽管开发者可能使用不同工具，但 cURL 命令可以轻松共享，并在几秒内重放。由于命令行是所有操作系统的“最大公约数”，cURL
    因而跨越开发者边界，具备了通用“公民身份”。

    '
- fmt: '## Postman API Client


    `Postman` is a popular API client that makes it easy for developers to create,
    share, test, and document APIs. This is done by allowing users to create and save
    simple or complex `HTTP/s` requests, as well as read their responses. `Postman`
    has a number of features. The following is not an exhaustive list but highlights
    the elements my team and I use on a regular basis:


    - **Up and running quickly**: We can consume an API quickly once we have an endpoint
    and request details. The `Postman` UI is intuitive and allows requests to be initiated
    in different ways. For example, the body for a request can be specified in various
    formats – which are selectable from a simple radio button interface. The free
    version has all the capabilities needed to get up and running.

    - **Capability**: The tool is as simple or complex as you need it to be. `Postman`
    caters for a wide range of developer expertise – from the novice developer who
    simply wants to fire a request to an endpoint, to a seasoned testing engineer
    who wants to set up complex automated test execution.

    - **Sharing**: As I typically work across machines, the synchronization capability
    allows great portability, and I can easily start a collection on one machine and
    continue working on it from another. One of the features we use the most is the
    sharing of collections between team members. We have often had the case where
    the call works for one developer but not another. API requests are extremely intricate,
    and for complex calls, the difference between success and failure could be due
    to one parameter. Sharing is easily achieved by exporting a collection via a public
    link. Note that this should not be used for sensitive APIs. This increases collaboration
    significantly and allows instant alignment between members of the development
    team.

    - **Code snippets**: In developing integration solutions, consuming an API or
    endpoint from a tool is winning one battle in an ongoing campaign. The next battleground
    is achieving that same result from code. The code snippets feature is extremely
    useful as it converts the requests in `Postman` to a number of different languages
    – even a `cURL` command. This is extremely useful as it helps the transition from
    tool to code.

    - **Variables and environments**: As part of the software development lifecycle,
    the solution must transition through many environments – from `Development` to
    `Test`, to `Staging`, to `Production`. It is also extremely common for a conversational
    API interaction, that is, the output of one request is used for the next. Variables
    can be used as placeholders – which are manually set or updated using a script
    which can significantly speed up testing. Variables, such as endpoints, can also
    be configured for specific environments.


    ## Fiddler


    `Fiddler` is a debugging proxy server tool used to log, inspect, and alter `HTTP`
    and `HTTPS` traffic between a computer and a web server or servers.


    Our support team recently received a support request from a third-party developer
    who had trouble consuming an API. What set this query apart from others we received
    was that it included detailed `HTTP` trace information regarding each request
    and response. This not only allowed us to follow the flow of calls to ensure the
    sequence was correct, but it also helped the Support team identify exactly which
    parameter of which request was incorrect. The developer was able to provide this
    trace information by using `Fiddler` which intercepted the call and recorded the
    `HTTP` request and response.


    ## Developer Education


    As the Marketplace team uses these tools and techniques on a daily basis, it can
    be easy to forget the learning curve other developers may encounter. The technical
    developer portal should have one or more of the following as mandatory elements
    to support third parties:


    1. Sample `Postman` collections for each API product. The collection must have
    pre-populated requests with developers having to provide minimal information,
    such as credentials, to make their first API call.

    2. A quick walkthrough of how a tool should be configured, with special attention
    to areas which could cause an issue. For example, the difference between “Headers”
    and “Parameters” in `Postman`.

    3. When logging support requests, the detail required for the request and how
    to get it. Using an interceptor, like `Fiddler`, to capture the request and response
    – instead of sending code extracts.


    Empowered developers will result in an experienced developer community, fewer
    support requests, and more detailed, concise requests when they do come through.
    Spending the time and effort upfront will result in significant gains later in
    the Marketplace lifecycle such as requiring fewer operations staff and faster
    resolution or response to support queries.


    ## Summary


    In this chapter, we discussed strategies around the business and technical Portals
    of your API Marketplace. Although the spotlight is on the dazzling API product
    on an amazing stage, it is important to ensure that the requirements of the developer
    audience are kept in focus.


    Each Marketplace implementation will have a different combination of API products,
    portals, developer focus, and engagement strategy that will make it unique. Defining
    this identity upfront can help the team carve out a clear path to the end state.
    It may also be necessary to allow the identity of the platform to evolve or pivot
    over time – in response to customer demand. The dynamic nature of an API Marketplace
    is indeed one of its biggest advantages as its flexibility allows it to respond
    far faster than existing enterprise systems.


    In the next chapter, we consider monetization for API Marketplaces. The Consumption
    model has a significant impact on how the platform is monetized as the two are
    intrinsically linked. If the monetization model is high volume with low transaction
    costs, more developers are needed in the pipeline. If the strategy is lower volume,
    subscription-based revenue, then a smaller subset of established, loyal organizations
    willing and able to pay a subscription is the objective.'
