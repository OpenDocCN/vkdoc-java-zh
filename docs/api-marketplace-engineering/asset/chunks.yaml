- fmt: '## Service-Level Agreements


    Incidents are classified by support engineers in different categories based on
    the severity and priority of the issue. The definition and the severity mapping
    follows the matrix defined in Table [10-1](#509947_1_En_10_Chapter.xhtml#Tab1).


    Table 10-1


    Severity-response mapping


    | Severity classification | Severity tag | Standard response time |

    | --- | --- | --- |

    | Functionality completely blocked(All users affected) | Critical(showstopper)
    | < 30 minutes |

    | Partial functionality blocked (Many users affected) | High | < 2 hours |

    | Partial functionality affected (Workaround available) | Medium | < 24 hours
    |

    | Section of functionality affected(Low user count) | Low | < 48 hours |

    | Support team is blocked (Backend dependency) | Blocked | Tracked in Service
    Desk |


    ## Supporting Systems


    Our Platform has two major dependencies – one internal and the other external.
    Internal components which are the assembly blocks of the Marketplace, discussed
    in the chapter detailing our platform architecture. An issue with an internal
    component could potentially result in the entire platform being rendered unavailable.
    External elements are backend systems which are service providers for the API
    products. One or more API products could be impacted based on the nature of the
    provider interface. In the sections below, I discuss the internal and external
    supporting elements in more detail.


    ### Platform As a Service Strategy


    As discussed in the chapter detailing the platform architecture and illustrated
    in Figure [10-17](#509947_1_En_10_Chapter.xhtml#Fig18), the strategy is to leverage
    enterprise capabilities as much as possible. We have realized and accepted, almost
    from inception of the Marketplace, that the organization has highly skilled, focused,
    and dedicated personnel, often with years of operational experience managing a
    specific system. With this in mind, we have adopted a strategy to leverage enterprise
    capability as far as possible.


    ![../images/509947_1_En_10_Chapter/509947_1_En_10_Fig18_HTML.jpg](images/509947_1_En_10_Chapter/509947_1_En_10_Fig18_HTML.jpg)


    Figure 10-17


    Managed platform services


    The outsourced, “managed service” approach has its drawbacks as it tightly couples
    us to the enterprise, and we might have to wait longer for system upgrades and
    must share resources with other tenants. However, we have found that the benefits
    of accelerated platform maturity, dedicated technical support, and significantly
    lower operational expenditure budgets make this an appealing option.


    Should an issue arise in a supporting system, the Marketplace support engineer
    will follow the incident management process by contacting their counterparts who
    manage that system. If direct contact cannot be established, assistance is required
    from the operations command center which will initiate a defined escalation process
    to track down the relevant system owners. Ownership of the issue still resides
    with the API Marketplace support team until the outage has been resolved. As each
    system has its own dependencies, the root cause could be further down the stack.
    As an example, a database outage could be caused by a loss of connectivity to
    the Storage Area Network (`SAN`) which was the result of an update to a firewall
    rule. From years of experience of supporting complex, interdependent systems,
    our organization takes a no-nonsense approach and for high-severity, service affecting
    outages, a “focus call” is quickly convened with mandatory participation from
    all supporting teams. This approach results in speedy identification of the root
    cause and remediation. It is at these times, when observing the full might of
    the enterprise brought to bear to resolve an outage, that we are thankful for
    our platform-as-a-service strategy.


    ### Backend Dependencies


    As illustrated in Figure [10-18](#509947_1_En_10_Chapter.xhtml#Fig19), an API
    Marketplace has a number of consumers, each using one or more APIs, and an API
    integrates into one or more provider systems. Working our way back up the tree,
    it can be observed that a failure of a single provider could potentially impact
    one or more APIs with the ripple effect of impacting one or more consumers.


    ![../images/509947_1_En_10_Chapter/509947_1_En_10_Fig19_HTML.jpg](images/509947_1_En_10_Chapter/509947_1_En_10_Fig19_HTML.jpg)


    Figure 10-18


    Consumer, API, provider link


    Our approach to managing this complex network of consumers, APIs, and providers
    is as follows:


    - Have a clear view of which backend systems are providers for each API product.
    This is a “living” view as each release might see new connections between product
    and backend.

    - From the nature of the API, determine the criticality of the backend. As an
    example, if a security service provider is unavailable, it impacts authentication,
    and users will not be able to sign in; if a reference data provider is unavailable,
    cached data may be used temporarily.

    - The API Gateway can be used to determine the API products that consumers have
    subscribed to.

    - Draw up a service matrix to allow the operations team to quickly determine the
    impact of a loss of a backend provider interface. Consuming applications may also
    require additional measures such as displaying maintenance pages or cordoning
    off specific functionality for a critical provider dependency.

    - An important item on our platform backlog is to publish the status of our APIs.
    Availability of provider systems will be a key input to this view.


    ## Summary


    In this chapter, we delved deeper into different domains within our Operational
    environment. From our experience of building and launching an API Platform, and
    from observation of the large number of areas to consider, a key lesson to take
    away is to have a view on operationalization early in the lifecycle of the platform.
    We also highlighted our approach to change and release management, which has been
    tailored, and importantly accommodated, to function in an already established
    organization. Once again, a DevOps practice is seen as a key enabler which allows
    agile delivery to be achieved consistently and reliably.


    It is essential that running of an operations environment always be considered
    from a people, process, and technology perspective. As much as this may sound
    to be stereotypical, these elements are intrinsically intertwined, support each
    other, and result in a far more efficient and reliable platform. The logging and
    monitoring approaches discussed provide the technology capability and allow insight
    into solution execution. The support team roles, empowerment, and communications
    strategies highlighted show how the people element fits in. A well-defined process
    is key to a well-run, predictable, and stable Marketplace.


    Our Marketplace, and likely yours too, is dependent on many internal supporting
    elements and backend service providers. Finally, we delved into our approach to
    leveraging enterprise managed services and efficiently working with provider systems.
    In all honesty, this chapter turned out to be longer and far more detailed than
    anticipated. I attribute this to the vastness of the operational landscape and
    to the simple fact that a solution will spend the greater part of its lifetime
    within an execution context.'
