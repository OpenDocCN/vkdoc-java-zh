  trans: '

    | 目标 | 描述 |

    | --- | --- |

    | 最简型 | 这类商店只提供最基本的必需品。没有花哨商品——只有维持库存周转和基本运营所绝对需要的东西。这类 API 市场的建设目标也只是满足监管合规要求。监管机构已发布必须在特定期限内遵守的法规，而为了避免处罚，只需完成最基础的要求即可。当前没有战略性目标——可能采取观望策略。
    |

    | 垂直细分型 | 我一直很想去的一家商店是 RadioShack。如果你需要任何与电子产品相关的东西，这里就是理想目的地。它只面向特定市场，但在该品类中是一站式商店。与之类似的
    API 市场是只处理特定类别 API 的市场。例如，银行可能只提供与资金相关的 API——从支付、贷款到交易数据。 |

    | 超市型 | 超市是全球各地社区运转的重要支柱。你可以快速进去购买牛奶这类基本用品，也可以寻找灯泡这类不那么常用的商品。它们满足广泛的客户需求，但商品选择通常基于大众化需求。因此，你可能能找到最常见型号的灯泡，但找不到适配
    20 世纪初古董枝形吊灯的那一种。这类市场是聚合器（Aggregator）。它将常用 API 汇集在一起，并在统一平台下提供便捷使用。单一对接点减少了维护多个供应商账户或关系的需要。其内在优势在于，借助规模经济，可减少支持所需人员。此外，由更大实体代表多个消费者形成的合力，还可能从后端供应商获得更具竞争力的价格和服务。连锁体系中的“超市”相比个人客户，通常能从供应商处获得更好的价格与服务。
    |

    | 香榭丽舍大道型 | 巴黎著名的购物大道是香榭丽舍大道（Champs-Élysées）。这里汇聚了成熟品牌门店，是本地居民和游客都喜爱的目的地。由于场地面积稀缺，只有特定品牌才会被邀请入驻，以维持该空间的独特性。虽然每家店是独立运营的，但它们在这一区域的气质与氛围中天然地彼此关联。这类市场是一个生态系统——没有单一所有者，而是围绕一个核心主题或结构建立。消费者与提供方之间是一对一关系。对提供方执行能力的信任与信心，会因其出现在该平台中而被隐性评估。也就是说，服务提供商若能加入这个“专属圈层”，就意味着其必须达到特定质量标准。反过来，提供方也需要持续维持高质量水准，才能保留成员资格。这种相互信任是随时间逐步建立的。
    |

    | 购物中心型 | 购物中心是许多消费者喜爱的场所。这里商店种类丰富，对潜在租户的最低要求也相对宽松。更重要的是，安保、停车、洗手间等公共设施会统一提供，作为面向顾客的便利服务，并由所有租户共同受益。许多购物中心还拥有“主力租户”，作为吸引顾客的核心亮点。这类市场代表封闭生态系统。消费者可直接联系提供方，同时共享通用能力——通常包括安全与支持服务。公共基础设施也可承载多租户方案，以降低成本并实现规模经济。此处的“主力租户”可能是成熟且受信赖的品牌，例如声誉良好的金融机构，并且其本身也参与该环境。对于先建设自有市场、之后希望通过吸引更多第三方开发者并支持较小提供方触达更大受众来刺激增长的组织而言，这可能是一种自然演进路径。
    |


    ## 价值与收入策略


    在这个由技术加速驱动的快节奏世界里，如今出现了许多全新且创新的创收方式，这在几年前几乎难以想象。比如——拥有大量粉丝与关注者的社交媒体人物会成为“意见领袖”（influencers），并通过内容获得更多观看量以及产品营销推广而获得报酬。职业电竞选手的收入甚至可能超过职业体育运动员。简而言之，理解并重视这一点非常重要：*价值*既可以通过“硬收入”的形式被显性创造，也可以通过品牌定位与客户忠诚度等方式被隐性创造。本节将探讨
    API 市场可以如何通过不同路径创造价值——包括隐性价值与显性价值。

    '
- fmt: '## Developer Pays


    Let us start with the option that will keep the Capitalists happy. After all,
    the financial viability of an API Marketplace will be a hot topic when the concept
    is pitched for funding. For this approach, the third-party provider would pay
    for use of the API products. From examination of successful platforms such as
    Twilio, there are a number of different ways in which this may be achieved:


    - **Pay as you go**: This is essentially a “prepaid” concept. It was popularized
    years ago when mobile operators provided voice and SMS services to customers who
    essentially loaded “airtime” into their accounts. I am not an economist by any
    measure, but I’ve always found it strange that the unit cost of voice (per second
    or minute) has been magnitudes higher on these types of accounts – although the
    risk to the mobile operator is far lower. Even more strange is that this position
    is largely accepted by the subscriber base particularly over long periods of time.
    From a consumption perspective, the third party would pay for credits ahead of
    time which would deplete with API usage. Once all credits are exhausted, no further
    requests will be processed. The benefit for the API provider is upfront payment,
    minimized risk, and if tariffs are similar to mobile packages – higher unit costs.
    The benefit for the API consumer is reduced risk – with this approach, a specific
    budget can be set to prevent runaway costs and the flexibility to terminate the
    relationship at any time.


    - **Freemium**: A number of Cloud providers offer free computing and credits to
    attract developers to their platforms. I have personally used many products and
    services because of these offers. As I became more familiar with products like
    Firebase, I moved on to the paid options which provided more features. Had it
    not been for the promotional credit, I would have been reluctant to part with
    my credit card details to investigate. This model can be used to earn developer
    trust. If used correctly, it can build loyalty to your API product. There is some
    risk to the API provider as a service is essentially being provided at zero cost.
    In many cases, given the nature of the API, this risk may be marginal as this
    may essentially be an internal cost to service the request. Wearing my developer
    hat, this is certainly an appealing option for me.


    - **Tiered**: In the Financial services industry, we have observed a boom of Financial
    technology (`FinTech`) solutions that seeks to improve the delivery and use of
    financial services. These are essentially startups with a great idea but often
    with little capital investment. Tiered offerings allow consumers, at various stages
    in their organizational lifecycle, access to your products – at a price point
    that meets their requirements. Reciprocally, packages may be structured in a way
    to keep costs low – as an example, base packages may provide limited support.
    Tiers also provide visibility regarding the differences between levels and may
    be used for financial projections which is incredibly important for a startup’s
    business plan. Each tier may provide a specified number of free transactions for
    a defined period, thereafter a unit cost per transaction, varying levels of support,
    and service availability or access to specific API products. The Product Owner
    will need to undertake significant research in structuring the packages as markets
    may differ significantly based on region, demographic, and consumer behavior.
    Over my career, I have observed many business models work fantastically in one
    market but perform abysmally in another. The products must be tailored to the
    consumer market.


    - **Points based**: One of the most successful medical aid schemes in our country
    is based around the concept of “points.” The idea is incredibly simple, but profound
    in its operation and reach. A member receives points for a healthy lifestyle –
    more exercise and fitness results in more points. As points increase, the users’
    status rises. The member can then purchase items such as airline and movie tickets
    at discounted prices. The benefit to the scheme provider is that healthy members
    are less likely to get sick and claim. This particular program has many members,
    now fanatical about fitness, and has become so successful that the organization
    has now moved into banking – the incentive is that points can be earned through
    spend. This is an example of an all-round win. Both consumer and provider win,
    and a host of external service providers participating in this program also benefit.
    A simple implementation of this pattern in an API Marketplace is that consumers
    earn credit for a specific number of transactions. The credit can be used to offset
    costs or possibly to purchase other products in your organization. As an example,
    a third-party consumer may redeem points earned through API transactions to offset
    their monthly account fee. This allows cross-pollination of products which will
    help with customer retention. In the above scenario, the consumer may be reluctant
    to move to another provider as this would impact the monthly account fee.


    - **Transaction fee**: This may potentially be the simplest mechanism to implement.
    Each API request generates an event which is routed to an engine where it is mediated,
    rated, and billed. At the end of a billing period, a statement is generated, and
    the consumer pays. There is a significant amount of complexity that belies the
    implementation. Invoicing, collection, and billing disputes are areas which must
    be considered. As billing occurs after usage, there is a significant risk of running
    up a large bill, in much the same way as Cloud services or products accidentally
    left running will result in astronomical bills. Providers are equally at risk
    as customers may default on amounts owed and dedicate a significant amount of
    time on customer education to avoid such situations and to retain customers over
    a longer period. Although the most transparent of approaches, I consider this
    also be the most basic and rigid as it does not encourage or reward third-party
    behavior.


    Before we move on, there are two critical factors which must be taken into consideration.
    The first is that the billing capability of the platform, for any of the above
    approaches, must be bulletproof, transparent, and without a single element of
    doubt or uncertainty. Drawing on the similarities of mobile billing, customer
    queries are immediately resolved using an itemized bill. Your billing platform
    must be capable of generating an itemized bill which clearly shows when the transaction
    took place, which API was called with the ability to drill deeper and provide
    additional information such as transaction origination, request, and response
    payload.


    The second and possibly the `most` important factor to keep in mind is that the
    API product must generate value and revenue for the third party `first` which
    will drive revenue for your organization. It is quite possible to build and launch
    an API product and attach a high price tag to it providing bragging rights of
    high potential-value products. However, without a compelling value proposition,
    there will be little third-party adoption and usage, and it will stay on the shelf
    yielding little revenue.'
