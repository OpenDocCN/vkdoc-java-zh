  trans: '

    ### 可行性与可实施性


    这是设计过程中最关键但也可能最困难的考量之一。其中的核心认知是：并非所有 API 都适合作为 Marketplace 上的产品。当一个新产品机会出现时，产品负责人（由工程团队支持）必须在工作正式开始前，通过回答以下一个或多个问题来完成尽职调查。


    *   该产品是否符合企业风险、安全与数据隐私政策？


    *   第三方开发者是否对该产品有需求，和/或外部提供方是否能够使用它？


    *   对下游系统有哪些依赖？时间线如何？


    *   构建该产品所需的开发工作量和复杂度如何？


    *   预测的显性或隐性收入模型，是否能在产品整个运营生命周期内支撑该产品？


    这一过程的产出不一定是非黑即白的二元结论。作为理解产品的一部分，团队可以对产品进行塑形，以提升其可行性。对下游系统的依赖与时间线问题，可以通过分阶段或迭代式发布来缓解。与第三方就产品潜在采纳进行沟通，以判断需求，也可能是明智之举。如果该产品能够带来未来潜在机会，也可以从运营视角在短期内为其提供资金支持，并兼顾长期目标。


    API 产品虽然是数字化的，但与实体产品类似。在开始构建之前，团队至少必须对创建和运营它所需的时间、成本与投入有一个高层视图。


    ### 需求


    敏捷是我们当前团队最大的优势之一，因为与企业其他部分相比，我们能够以“光速”响应、转向并机动调整。不幸的是，这有时也是我们的阿喀琉斯之踵，因为我们没有停下来审视问题陈述更广泛的上下文。我们通过在运营环境中吸取了一些惨痛教训后，采取的风险缓解措施是：通过清晰定义
    API 需求来强化需求流程。我们仍然可以保持敏捷方式，但必须清楚了解“赛场”以及参与背景。


    这种清晰性可以通过功能性需求与非功能性需求来实现。仅仅提到这些术语，就可能让同行开发者一阵发怵，因为它常常与传统的、某种程度上近乎“神圣化”的企业架构实践同义。在你跳到下一节之前，想一想：如果你设计并建造的是一条只供单车骑行者通行的道路，却来了一个由
    18 轮卡车组成的车队，会有多少返工。反过来，思考一下反向场景中被浪费的开发投入。


    根据我们的经验，在给出资源投入、开发、测试和交付时间估算之前，我们现在会考虑以下一些问题：


    *   **性能**：接口的预期吞吐量是多少？支撑系统的响应时间与相关服务等级如何？这会直接影响我们平台基础设施的扩展，因为高吞吐 API 可能需要额外硬件容量。


    *   **可用性**：如果支撑系统不可用，请求应当排队并在稍后重试，还是应当向调用方返回错误？如果请求需要重试，API Marketplace 平台就必须具备处理异步请求的能力。


    *   **可维护性**：哪个运营团队会处理终端用户查询？在支持团队之间跟踪运营问题的支持流程是什么？


    *   **接入（Onboarding）**：谁来处理希望消费该服务的第三方的接入、尽职调查、商业法律协议？


    *   **报表与历史数据** **：** 需要上报的关键指标有哪些？报表频率与可用性如何——从发布与历史追溯角度看？


    *   **业务规则**：作为进入企业的新渠道，我们努力将业务规则保持在 Marketplace 之外。理想情况下，这些规则应在后端逻辑中集中维护，而不是在渠道逻辑中重复实现。若无法集中托管，那么业务规则有哪些、复杂度如何、变更频率如何，以及变更所需时间线如何？


    需要强调的是，这些只是我们在构建新 API 时考虑的*部分*领域。对于某些解决方案，在与已知后端协作时，我们只考虑其中的一个子集。本着敏捷精神，我们也会并行启动后端集成，以便在需求明确并形成高层设计后能够迅速推进。


    即便附带“后续可修订”的前提，在给出交付预估时仍应谨慎，因为任何估算都很可能被视为具有约束力——尤其是在高压环境下。另一种缓解策略是（在实施早期阶段可能更容易做到）：以“beta”标识发布
    API。如有需要，这可为返工保留一定灵活性。但这一阶段必须有明确时间线，因为过长的测试期可能会吓退 API 的外部消费者。


    ### 文档


    对 API 产品成功至关重要的一个关键要素是文档。对此我再怎么强调都不为过。遗憾的是，根据多年开发经验，文档通常是在最后才“补上”。再优秀的 API 产品，如果没有足够水平的配套文档，也无法、也不会发挥其潜力。正如代码行体现了开发者的“遗产”，详细说明
    API 使用方式的文档，也代表了团队将传递给未来使用者的一份“遗产”。API 的行为与运行方式、参数、输入和输出等细节，都应包含在 API 的定义中（也称为
    swagger）。文档与定义之间是共生关系，二者应共同演进，最好以相同速度演进，并且重要的是同步演进。


    这件事说起来容易做起来难，而且这是必须由团队承担而非某个个人完成的活动之一。作为开发者，我非常喜欢编码。有一类编码工作有时像泥泞沼泽一样拖慢我，那就是给变量或操作命名。让我焦虑的原因在于，我希望名称足够合理，并能与未来维护我代码的人产生共鸣。文档也是同理。负责塑造定义的团队成员，可能只能用寥寥几句简短词语来描述它。随着定义被评审，文档也必须经过同伴评审、更新，然后提交给工程负责人和产品负责人评审并反馈。如果团队资源允许，这项任务最适合由技术写作者完成。


    正如前文关于*API 消费*一章所强调的，API 产品的消费者类型并不相同。技术文档可以满足开发者的需求。关于 API 产品商业使用与应用方式的细节和指南，对业务受众同样至关重要。此外，还需要对
    API 进行营销与定位，以吸引外部消费者关注。API 产品在设计阶段就必须考虑不同类型与层级的文档。

    '
- fmt: '## Governance


    Governance is another topic that could scare the agile developer. However, it
    has immense and wide-reaching benefits to the APIs the team will build, and the
    Marketplace will host. It should be considered as early as possible in the development
    lifecycle and continuously. I am sure you will agree that there are very few things
    as disheartening as seeing a project or initiative, which you have invested significant
    time and energy into, shelved due to non-compliance. Within our organization,
    the Enterprise Architecture (EA) team is tasked with ensuring solutions are designed
    and built in accordance with a specific direction for the enterprise.


    Our relationship with the EA capability went through a metamorphosis, inversely
    proportional to the maturity of the platform. Let me explain this statement. In
    our MVP phase, we did our level best to skirt around Governance and Enterprise
    Architects. The primary reason was that the Marketplace initiative, not to mention
    the underlying technology, was so far from what the organization typically did
    that we were afraid that we would arrive to work one morning and find out desks
    cordoned off with bureaucratic red tape. I clearly recall our first submission
    at the Solution Alignment Forum where our approach to get partial approval was
    to label the initiative as “Research & Development.” That is, we were allowed
    to continue, but only under laboratory conditions and strictly warned to return
    for further approval.


    Over time, we discovered that the insight and advice from the Architecture review
    process allowed us to navigate other areas of delivery more efficiently. For example,
    having approval to use a document-based datastore afforded us the use of an enterprise
    service.


    We learnt and continue to learn how to navigate the Design Review process more
    efficiently. The key principles are respect and humility. Respect for the process
    – the governance structures which might seem arduous to delivery teams but is
    there to protect the enterprise. Respect for the Enterprise Architects – at times,
    the questions and feedback seemed completely out of context, but in hindsight
    has saved us a considerable amount of time in the operational environment. Humility
    is one of the most important attributes which is at the heart of our Governance
    journey. The ability to process feedback and make the necessary changes will ultimately
    result in a platform which is in alignment to enterprise standards.


    Through a process of maturity and awareness, the project now allocates sufficient
    time for thorough preparation for a Design Review. In addition, we have enlisted
    the assistance of a Lead Architect, who acts as a journeyman for the submission,
    streamlining it as it navigates through a number of internal updates and reviews
    from key Enterprise Architects prior to the date of presentation. This has also
    assisted our project team and Marketplace to establish a deeper connection with
    the enterprise.


    ## Access Mechanisms


    There are many ways in which the API may be accessed. `SOAP` (Simple Object Access
    Protocol) and `REST` (Representational State Transfer) are both web service communication
    protocols. There are also exciting options like `GraphQL` which are available.
    The approach should be determined by the type of consumer or client accessing
    the API, programming language, environment, and application requirements.


    Your Marketplace would be well equipped to have a number of options available
    and the ability or flexibility to choose the best at design time. A large portion
    of public APIs are `REST` APIs. I would suggest the first APIs published in your
    Marketplace are RESTful as there are several resources and reference sites to
    benchmark against. In this section, we discuss and contrast the different access
    mechanisms.


    ### SOAP


    `SOAP` exposes components of application logic as services rather than data. It
    is programming language, platform, and transport agnostic. As an established World
    Wide Web Consortium (W3C) standard, it has pre-built extensibility in the form
    of error handling and automation. It is highly extensible through other protocols
    and technologies.


    In addition to `WS-Security`, it supports `WS-Addressing`, `WS-Coordination`,
    `WS-Reliable Messaging`, and a host of other web services standards. If you need
    more robust security, support for `WS-Security` offers additional assurances for
    data privacy and integrity and provides support for identity verification through
    intermediaries rather than just point-to-point, as provided by `SSL`. Another
    advantage is that it offers built-in retry logic to compensate for failed communications.
    This comes at a cost as it is a more heavyweight choice for web service access
    and as it uses a complex `XML` format, it tends to be slower.


    ### REST


    A RESTful API is an architectural style for an API that uses `HTTP` requests to
    access and use data. Objects in `REST` are defined as addressable `URIs`, and
    are interacted with using the built-in verbs of `HTTP` – specifically, `GET` to
    read, `POST` to create, `PUT` to update and `DELETE` to delete, etc. The core
    concept is that everything is a resource. As it is built in close alignment to
    `HTTP`, it can be used practically anywhere on the web and is commonly used when
    exposing a public API over the Internet.


    `REST` allows a greater variety of data formats and coupled with JavaScript Object
    Notation (`JSON`), is generally considered easier to work with due to a smaller
    learning curve. It offers better support for browser clients and does not require
    expensive tooling to work with. As a more efficient approach, it is generally
    faster and uses less bandwidth than `SOAP`.


    ### GraphQL


    `GraphQL` is an open-source query language for APIs, developed by Facebook in
    2012 as a data-fetching API. It has grown in popularity as it was open sourced
    in `2016`. A graph refers to resources that are more complex and relational. Fetching
    complicated graphs requires round trips between the client and server. As a result,
    `REST` APIs often result in over/under fetching. Over fetching is when more data
    is fetched than required, whereas under fetching is the opposite, when not enough
    data is delivered upon fetching.


    `GraphQL` is instead established around schema, queries, and resolvers and rather
    aims to improve upon `REST` by allowing the client to ask for a specific piece
    of data, not just the entire block. There is no need to process a long stream
    of data – you only get what you ask for. And what you ask for could be compiled
    from several different `REST` APIs. `REST` works well in the context of a thin
    client, such as a web application hosted in a browser as a major part of the processing
    is done on the server. `GraphQL` leverages the capability of a more powerful client,
    such as a mobile device which hosts an Application.


    ## Patterns


    An API product is similar to an iceberg, with only ten percent protruding above
    the surface of the water, and a massive portion beneath. Third parties will only
    see the polished, published interface and associated documentation. The core of
    the product, which might be more intricate, lies in the implementation. There
    are a number of approaches for building the product and the following is by no
    means an exhaustive list. As your Marketplace matures and evolves, you will add
    your own variant which will serve the unique needs of your organization. It is
    easy to become entangled with classifying a product into a specific pattern. Try
    to avoid this pitfall. As a digital platform, the products do not necessarily
    conform to classic architecture convention. This is what affords the platform
    agility and flexibility. In short, allow a product to color outside the lines.'
