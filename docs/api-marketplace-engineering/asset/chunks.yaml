    it offers built-in retry logic to compensate for failed communications. This comes
    at a cost as it is a more heavyweight choice for web service access and as it
    uses a complex XML format, it tends to be slower.


    ### REST


    A RESTful API is an architectural style for an API that uses HTTP requests to
    access and use data. Objects in REST are defined as addressable URIs, and are
    interacted with using the built-in verbs of HTTP – specifically, GET to read,
    POST to create, PUT to update and DELETE to delete, etc. The core concept is that
    everything is a resource. As it is built in close alignment to HTTP, it can be
    used practically anywhere on the web and is commonly used when exposing a public
    API over the Internet.


    REST allows a greater variety of data formats and coupled with JavaScript Object
    Notation (JSON), is generally considered easier to work with due to a smaller
    learning curve. It offers better support for browser clients and does not require
    expensive tooling to work with. As a more efficient approach, it is generally
    faster and uses less bandwidth than SOAP.


    ### GraphQL


    GraphQL is an open-source query language for APIs, developed by Facebook in 2012
    as a data-fetching API. It has grown in popularity as it was open sourced in 2016\.
    A graph refers to resources that are more complex and relational. Fetching complicated
    graphs requires round trips between the client and server. As a result, REST APIs
    often result in over/under fetching. Over fetching is when more data is fetched
    than required, whereas under fetching is the opposite, when not enough data is
    delivered upon fetching.


    GraphQL is instead established around schema, queries, and resolvers and rather
    aims to improve upon REST by allowing the client to ask for a specific piece of
    data, not just the entire block. There is no need to process a long stream of
    data – you only get what you ask for. And what you ask for could be compiled from
    several different REST APIs. REST works well in the context of a thin client,
    such as a web application hosted in a browser as a major part of the processing
    is done on the server. GraphQL leverages the capability of a more powerful client,
    such as a mobile device which hosts an Application.


    ## Patterns


    An API product is similar to an iceberg, with only ten percent protruding above
    the surface of the water, and a massive portion beneath. Third parties will only
    see the polished, published interface and associated documentation. The core of
    the product, which might be more intricate, lies in the implementation. There
    are a number of approaches for building the product and the following is by no
    means an exhaustive list. As your Marketplace matures and evolves, you will add
    your own variant which will serve the unique needs of your organization. It is
    easy to become entangled with classifying a product into a specific pattern. Try
    to avoid this pitfall. As a digital platform, the products do not necessarily
