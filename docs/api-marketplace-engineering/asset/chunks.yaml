  trans: '

    ### 报告


    随着平台的成熟、更多高价值 API 产品的推出，以及为关键第三方提供任务关键型支持的要求提升，我们的团队实施了以下机制，以提升对平台活动的可见性：


    *   **仪表板**：如图 4-6 所示，并在表 4-4 中描述。与汽车仪表盘提供广泛信息的方式非常类似，你通常会关注速度表，但也会被其他指示器（例如油量）所吸引，因为它会影响车辆速度。下面这个仪表板乍看之下可能像是指标“爆炸”。通常，产品负责人或业务负责人会先关注某个特定指标；如果该指标未落在定义参数范围内，就会进一步查看其他数值，以判断它们如何影响主要指标。仪表板的价值在于：不仅提供平台关键指标，还提供可能影响平台的因素或条件细节。


    *   **电子邮件**：仪表板快照会每小时通过电子邮件发送给关键产品干系人。此外，高价值交易成功完成的通知也会分发给产品团队。我曾颇为惊讶地看到，高级商务人员会在完成交易数量偏低时发来询问，确认是否发生技术中断；而在高价值交易出现时，也会发送兴奋的祝贺消息。这表明，定期分发的信息确实被商务团队查看和使用，并且
    API 已被视为关键收入渠道。


    每两小时一次的**即时消息**由运营支持团队发送，内容包括系统稳定性以及关键 API 产品成功完成的交易情况。同样地，如果这些数字异常偏低，就会引发关于支撑系统和下游提供方可用性的疑问。


    表 4-4


    报告仪表板指标


    | 指标 | 描述 |

    | --- | --- |

    | 访客总数 | 访问应用程序（门户或 API）的唯一用户数量 |

    | 已创建线索 | 完成基础信息步骤/表单并请求进一步信息的用户。未继续后续流程的用户，销售代理可通过电话联系 |

    | 身份证件统计 | 上传的身份证明文档数量、成功处理数量，以及因 OCR 导致的失败数量。会对失败请求进行排查，以确定是上传图像问题还是系统故障 |

    | 交易统计 | 基于流程执行逻辑计算的详细交易数量及其相关状态：已计算、已拒绝、失败、已接受 |


    ![../images/509947_1_En_4_Chapter/509947_1_En_4_Fig7_HTML.jpg](img/509947_1_En_4_Fig7_HTML.jpg)


    图 4-6


    仪表板示例


    成功报告策略的关键在于提供具体、相关的数据，并以目标受众能够快速理解与分析的格式进行拉取（通过 Web）或推送（通过电子邮件或即时消息）。


    ## 概念性损益表


    概念性损益表是我们 Marketplace 的一个关键构件，承担多项功能。借用项目高管提出的术语，它用于衡量渠道能力层面的整体盈利性。由于 Marketplace
    可能包含一系列产品，其中一些可产生收入，另一些因监管要求必须免费，因此它有助于理解所有产品的价值。


    作为市场撮合方，本质上是在消费者与提供方之间进行中介，有时会面临价值证明的挑战。毕竟，维持平台运行需要成本——基础设施、软件、开发人员、支持工程师、产品负责人和交付负责人都需要投入。由于一笔交易的收入通常由后端服务提供方确认，Marketplace
    可能因此被归类为内部“成本中心”。遗憾的是，像建立数字品牌或赋能第三方这样的隐性价值，在只看最终财务结果的财务主管眼中往往意义不大。


    这种现象会让团队感到非常沮丧，因为通常带来更高收入的业务单元会获得更高预算分配和更多认可。项目高管并不满足于仅被视作“成本中心”，并希望组织理解 Marketplace
    计划的贡献与重要性，因此明智地建立了“概念性价值”这一衡量方式。


    损益表这一“透镜”的放大倍数被提升，用于持续审视每个 API 产品的表现。在产品初期，产品与业务负责人可能会提出一些假设，并据此影响是否构建某个 API 的决策。构建完成后，需要持续测量以判断产品健康度。诸如预期流量规模或第三方采纳度等假设会被不断验证。平台规模与基础设施也会被置于聚光灯下，以识别其是否可能成为产品成功的阻碍。持续测量有助于判断产品是否正在接近收益受限阶段，从而需要修复措施或做出退役决策。


    在这种细粒度层面理解具体产品，可更深入洞察总体拥有成本（TCO）。某些更成功的产品可能需要更高水平的支持与监控，因此应承担更高比例的平台运营成本。损益表各明细项的细节，使得对每个产品进行量化衡量成为可能。


    最后，将损益表作为我们的标准衡量机制，为执行委员会的评审与评估带来显著优势，因为他们通常具有财务导向的思维方式。该流程消除了对 Marketplace 的定性或“直觉式”判断，转而采用定量方法来清晰理解财务状况。在某些情况下，这可能会发出需要转向的信号，以确保该计划的长期持续性。下一节将对此进行讨论。

    '
- fmt: '## Pivot to New Business Models


    The roots of the API Marketplace we hoped to establish initially hit hard ground
    in the form of technical readiness of third-party providers. Although the APIs
    followed open standards and the team was more than happy to assist with resolving
    integration challenges, we were disappointed to observe low adoption of APIs by
    third-party providers. The situation reached a tipping point when an established
    third party, with an experienced development team, fell behind on an aggressive
    integration project schedule and indicated a key delivery date would be missed.


    Springing into action, the Product Owner of the Marketplace proposed a radical
    solution that our team would host the application on behalf of the third party
    to meet the timeline. Although this decision demonstrated far more faith and belief
    in our delivery capability than the consumer, the Engineering team initially chalked
    this down as an impulsive decision. After all, this was an `API` Marketplace –
    not an `Application Hosting` Marketplace. From first-hand experience, I can also
    assure you that asking an integration developer to build a User Interface (UI)
    is much like asking Superman to mine kryptonite.


    The objective of the hosted application was relatively simple. It did require
    some API integration – but the absolute minimum. The third party would implement
    a standard redirect to launch the application that would consume the APIs in the
    platform. What eased the sting of the front-end development was that we were staying
    true to our purpose and were using APIs to leverage internal organizational capability.
    In all honesty, this integration pattern has become one of the biggest revenue
    generators for the platform!


    What initially started as a grudge-purchase, as the technical team had to scramble
    to update deployment strategies and request design and security approval, gradually
    evolved as the team discovered they now possessed the ability to use the APIs
    directly – in ways we had been trying to persuade third parties to for some time.
    This approach has also enabled other providers to accelerate their integration
    efforts by adopting the same pattern.


    In this instance, the Product Owner was well within their rights to stay firm
    and insist on API adoption, even at the risk of missing the deadline. However,
    this pivot demonstrates the versatility and flexibility of the technical platform
    to create new business models by adapting to varying market conditions.


    ## Summary


    At the start of this chapter, I put forward the argument that the engineering
    capability underpins the commercial success of the API Marketplace. We also discussed
    the flywheel process which, once initiated, creates a ripple effect throughout
    various areas of the platform. By focusing on the Developer Experience, it attracts
    more Customers which brings down Costs and allows aggressive and new Commercial
    Models which fund new Product Development which more Third Parties consume which
    comes full circle to a better Developer Experience. This wave of perpetual motion
    powers the Growth strategy of the API Marketplace.


    We touched on the need of establishing an identity for your API Marketplace and
    contrasted this to setting up a brick-and-mortar store. By providing the comparison,
    I hope that you have started to formulate the type of store you would like to
    build and the new platforms which will soon set up shop. We then discussed the
    ways value can be created from an API Marketplace, and we observed how it could
    be achieved implicitly, explicitly, and even indirectly. Dropping down to the
    nuts and bolts, we reviewed engineering approaches to support various billing
    strategies. It is important to note that the billing strategy comes first, and
    the platform is engineered to support it. We then moved to a key area of Monetization
    – which is visibility and measurement. Analytics and Insights provides much needed
    visibility which powers the control panel that is used to pilot the Marketplace.
    We reviewed data collection, analysis, and reporting strategies. The Notional
    Income Statement is the mechanism we used for measurement and to determine profitability
    of the Marketplace. Finally, we demonstrated a way to pivot to create new business
    models.


    Running an API Marketplace is an extremely challenging but rewarding activity.
    The team has adopted a startup mindset, which makes us more efficient, thrifty,
    leaner, and constantly on the lookout for new opportunities. This is yet another
    flywheel process which drives a perpetual engineering optimization process. This
    has resulted in a constantly evolving Platform Architecture which we discuss in
    more detail in the next chapter.


    # 5. Platform Architecture


    Our Marketplace was born into a post Netflix-era world, one of the first projects
    in a newly established Digital practice. The team was not only tasked with the
    delivery of an Open Banking prototype but presented with the opportunity and mandate
    to use bleeding-edge technology. In hindsight, this has been both a blessing and
    a curse. The ability to use new approaches such as containerization afforded our
    platform a high degree of flexibility. The unfortunate drawback was that we were
    2 to 3 years ahead of the rest of the organization and the new approaches we wanted
    to use were not yet trusted, let alone understood.


    The inherent benefit of time is that it allowed our team to evolve and optimize
    the platform and establish trust with the rest of the organization through knowledge
    sharing and iterative delivery. The waves of Change soon reached our organizations’
    shores, and concepts and approaches that we were trialing were becoming more widespread
    and trusted by similar institutions. It has also allowed us to position the Marketplace
    as an enterprise-grade platform, pivotal to the function of the organization as
    opposed to a satellite installation fulfilling a niche role.


    Through this process, we have a greater appreciation of supporting systems within
    the enterprise. We have also been humbled by the effort of operationalizing bleeding-edge
    technology and are now acutely aware of how people and process are essential ingredients
    of the final solution.


    In the following sections, I provide a time-lapsed view of the elements of our
    platform, how it has changed, and my thoughts and plans regarding its evolution.
    This is done with the hope to bootstrap your implementation and to share some
    of the ideals and principles we have since established in ours.


    ## Elements


    Like the elements in the periodic table, Figure [5-1](#509947_1_En_5_Chapter.xhtml#Fig1)
    details the components of our Platform Architecture. Some, like the Reverse Proxy,
    are provided as an atomic shared enterprise service. Others, like our Microservices,
    have been genetically engineered, which gives our Platform its unique identity.
    These blocks represent the core of our Marketplace, and we are continually trying
    to optimize their function in order to make the platform more efficient. Each
    of the elements is discussed in further detail in the following sections.


    ![../images/509947_1_En_5_Chapter/509947_1_En_5_Fig1_HTML.jpg](images/509947_1_En_5_Chapter/509947_1_En_5_Fig1_HTML.jpg)


    Figure 5-1


    Elements of an API Marketplace platform'
  raw: '## Pivot to New Business Models


    The roots of the API Marketplace we hoped to establish initially hit hard ground
    in the form of technical readiness of third-party providers. Although the APIs
    followed open standards and the team was more than happy to assist with resolving
    integration challenges, we were disappointed to observe low adoption of APIs by
    third-party providers. The situation reached a tipping point when an established
    third party, with an experienced development team, fell behind on an aggressive
    integration project schedule and indicated a key delivery date would be missed.


    Springing into action, the Product Owner of the Marketplace proposed a radical
    solution that our team would host the application on behalf of the third party
    to meet the timeline. Although this decision demonstrated far more faith and belief
    in our delivery capability than the consumer, the Engineering team initially chalked
    this down as an impulsive decision. After all, this was an *API* Marketplace –
    not an *Application Hosting* Marketplace. From first-hand experience, I can also
    assure you that asking an integration developer to build a User Interface (UI)
    is much like asking Superman to mine kryptonite.


    The objective of the hosted application was relatively simple. It did require
    some API integration – but the absolute minimum. The third party would implement
    a standard redirect to launch the application that would consume the APIs in the
    platform. What eased the sting of the front-end development was that we were staying
    true to our purpose and were using APIs to leverage internal organizational capability.
