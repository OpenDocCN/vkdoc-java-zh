    ## 用户画像


    许多组织容易陷入一个误区：只搭建一个技术门户，里面充斥着大量三个字母的缩写词。在我们争分夺秒构建最小可行产品（MVP）时，也正是这么做的。我们的落地页有一些鲜艳的图标和图形，再配上匆忙拼凑的简短文字，而我们的重点都放在了技术层面。同样，根据经验，团队发布的门户第一版很可能会运行最长时间，因为团队的关注点会转向推出新的
    API 产品。


    由于其属性，人们很容易将“API 市场”归类为技术性事物，并且只关注工程师和集成开发人员。同样重要的是从商业视角看待市场，并思考如何利用它来提供业务价值。公司本质上都在尝试构建新的产品和服务，以更高效、更便捷的方式解决老问题。使用者需要理解
    API 市场的意图与价值，才能判断如何利用它来实现其组织目标。


    尽管在 API 体系中，用户体验（UX）看起来可能有些多余，但它是市场采纳过程中的关键要素。面向不同用户画像的 UX 有助于在正确的时间向正确的受众提供相关信息。这可以通过独立门户来实现，也可以在单一门户中通过清晰定义的分区来实现。


    在接下来的章节中，我们将围绕以下方面，探讨如何满足业务和技术用户画像的目标：


    *   **吸引（Attract）**：抓住平台潜在用户的注意力，覆盖广泛的用户群体——从成熟组织到金融科技公司和初创企业。


    *   **教育（Educate）**：对平台理解越深入，使用就越高效，也更有可能更广泛地使用各类产品供给。


    *   **建立信任（Build trust）**：市场的意图是通过使用内部产品和服务来赋能外部组织。平台的潜在使用方需要对其能力和可靠性有信心。


    *   **透明（Transparency）**：细则藏得太深或信息晦涩，会影响与第三方的关系，并可能损害平台在市场中的声誉。


    *   **协作（Collaborate）**：持续让客户保持参与，并利用反馈来优化平台、推动产品路线图。双方关系是持续性的。


    *   **引领（Lead）**：由对门户内容负责的领域负责人主导，并支持组织内外的其他计划。


    ## 业务价值


    你所在组织的 API 市场门户的首批访问者，很可能来自业务发展视角。该个人或团队会审查 API 产品，以判断其是否适合作为某个仍在构思或构建中的产品/服务的基础要素。图
    3-1-1、3-1-2 和 3-1-3 是很好的示例，展示了 Twilio 如何为其 Messaging API 实现这一点。


    ![../images/509947_1_En_3_Chapter/509947_1_En_3_Fig3_HTML.jpg](img/509947_1_En_3_Fig3_HTML.jpg)


    图 3-1-3


    在不使用任何技术术语的情况下表达服务收益


    ![../images/509947_1_En_3_Chapter/509947_1_En_3_Fig2_HTML.jpg](img/509947_1_En_3_Fig2_HTML.jpg)


    图 3-1-2


    简单、易于关联的使用场景


    ![../images/509947_1_En_3_Chapter/509947_1_En_3_Fig1_HTML.jpg](img/509947_1_En_3_Fig1_HTML.jpg)


    图 3-1-1


    Twilio Message API 的非技术概览


    在接下来的章节中，我们将回顾构建 API 市场“业务门户”时需要考虑的关键领域。


    ### 吸引


    虽然你可以采用“梦幻之地（Field of Dreams）”式策略——“*只要你建好了，他们就会来*”——但主动推广平台可能更有效。社交媒体发布、发布会、文章，以及在科技、创业与初创企业网站上的采访，都有助于吸引潜在用户。主页面上的核心信息（可能是用户看到的第一件事）就是你的“电梯演讲”——我们的
    API 市场如何帮助你的组织？这可以包括一个 2 到 3 分钟的视频，在高层级上（最好在非技术语境中）展示市场如何提供服务和能力，并支持构建新产品。


    务必大力强调采纳的收益。这可以通过激励来表达：“今天使用我们的平台，你将获得先发优势，为业务赋能并超越竞争对手”；也可以通过风险提醒来表达——“在欧洲，各国政府已出台法规，要求所有银行在
    2018 年底前遵守《支付服务指令》。我们的政府也正在研究类似监管。”


    ### 教育


    被充分赋能的第三方将理解平台的目的，并能够利用其业务能力进行商业化应用。此时你的受众可能没有任何技术背景。隐喻和类比对于传达关键信息非常重要。详细讲解诸如“*什么是
    API？*”和“*你可以用它做什么？*”等核心概念的**解释型视频（Explainer videos）**会有很大帮助。可在与内部后端团队沟通时测试这些材料的效果。由于交付团队长期沉浸在细节中，某些
    API 相关概念和功能很容易被视为理所当然。务必记住：对于 API 新手而言，学习曲线相对陡峭。


    通过**案例研究（Case studies）**详细展示平台用户如何成功利用 API 推出新产品和服务，也将帮助潜在客户理解如何使用市场来实现业务目标。同时，提供使用平台所需时间与投入方面的信息也会有帮助。务必提供准确信息：过于乐观可能导致第三方设定不切实际的上线时间，进而引发集成疲劳；过于悲观则可能导致平台无人使用。鼓励按迭代方式采纳产品。对使用方和提供方而言，从一个或少量产品开始并完成落地，会比一开始铺开很多产品、后续又放弃更有益。


    应聚焦**业务价值**而非 API 产品本身。举例来说，一个返回客户姓名和地址信息的*Customer* API，可用于*身份验证*；也可用于简化第三方应用的注册或开户流程。应强调繁琐的注册表单会导致潜在用户大量流失，而*Customer*
    API 可以帮助缓解这一问题。同样，*Accounts* API 可用于判断用户的财务行为，从而实现更优或个性化的服务供给。在 API 市场概念刚刚兴起的发展中国家，应重点展示在
    API 生态活跃市场中已创造出的价值。


    **邮件列表（Mailing lists）**和定期的**博客（blog）**发布，也有助于保持当前和潜在客户的持续参与。这同样有助于定义产品路线图。产品负责人可以利用这些沟通渠道来判断用户对新
    API 的兴趣或潜在采纳情况。第三方也可以借此获知产品新版本、发布与补丁信息。


    由于 API 市场处于持续演进中，客户教育是一项长期活动。这也是在该平台上工作的最大回报之一——创新与优化的循环永不停歇。你需要确保平台用户能够释放其全部潜力。

