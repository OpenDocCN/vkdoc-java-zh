  trans: '

    ### 安全 Top 10


    OWASP 识别出的 API 安全风险 Top 10 [[`https://owasp.org/www-project-api-security`](https://owasp.org/www-project-api-security)]
    列出了以下内容：


    *   **对象级授权失效**（API1）：API 往往会暴露处理对象标识符的端点，从而形成较大的攻击面并引发对象级访问控制问题。凡是使用用户输入访问数据源的函数，都应进行对象级授权检查。


    *   **用户认证失效**（API2）：认证机制经常被错误实现，使攻击者能够攻陷认证令牌，或利用实现缺陷临时或永久冒充其他用户身份。系统识别客户端/用户能力一旦被破坏，整体
    API 安全也会随之受损。


    *   **过度数据暴露**（API3）：开发者为追求通用实现，常在未考虑各属性敏感性的情况下暴露对象全部属性，并依赖客户端在展示给用户前自行过滤数据。


    *   **缺乏资源与速率限制**（API4）：API 经常不会对客户端/用户可请求资源的大小或数量施加限制。这不仅会影响 API 服务器性能并导致拒绝服务（DoS），还会为暴力破解等认证缺陷敞开大门。


    *   **功能级授权失效**（API5）：包含不同层级、分组和角色的复杂访问控制策略，以及管理功能与普通功能之间不清晰的边界，往往会导致授权缺陷。攻击者可利用这些问题访问其他用户资源和/或管理功能。


    *   **批量赋值**（API6）：将客户端提供的数据（如 JSON）直接绑定到数据模型，若未基于允许列表进行适当属性过滤，通常会导致批量赋值问题。攻击者可通过猜测对象属性、探索其他
    API 端点、阅读文档或在请求负载中附加额外属性，修改本不应修改的对象属性。


    *   **安全配置错误**（API7）：安全配置错误通常源于不安全的默认配置、不完整或临时性配置、开放的云存储、错误配置的 HTTP 头、不必要的 HTTP
    方法、过于宽松的跨域资源共享（CORS），以及包含敏感信息的详细错误消息。


    *   **注入**（API8）：SQL、NoSQL、命令注入等注入缺陷，发生于不可信数据作为命令或查询的一部分被发送给解释器时。攻击者的恶意数据可诱使解释器执行非预期命令，或在未正确授权的情况下访问数据。


    *   **资产管理不当**（API9）：API 通常比传统 Web 应用暴露更多端点，因此正确且持续更新的文档极其重要。对主机和已部署 API 版本进行适当盘点，也有助于缓解如过时
    API 版本和暴露调试端点等问题。


    *   **日志记录与监控不足**（API10）：日志与监控不足，再加上与事件响应集成缺失或无效，会使攻击者得以进一步攻击系统、维持持久化、横向移动到更多系统进行篡改、提取或销毁数据。多数泄露研究表明，发现一次入侵平均需要
    200 多天，且通常由外部而非内部流程或监控发现。


    ### 建议


    为应对过度数据暴露（API3）风险，我们采用以下指导原则：


    *   详细审查 API 返回结果，确认其仅包含有效数据。


    *   始终在服务端过滤敏感数据。


    *   避免使用诸如 *toJSON()* 和 *toString()* 之类的通用方法。应改为选择性返回特定属性。


    *   实现基于模式（schema）的响应校验机制，以定义并强制 API 方法返回的数据（包括错误信息）。


    *   保持接口尽可能简单。仅提供必要信息。如有需要，使用版本化来扩展 API。


    大多数 API 网关都提供开箱即用的资源与速率限制功能，且通常支持按不同消费者服务质量进行细粒度控制。应利用这些能力来缓解缺乏资源与速率限制（API4）的问题。


    为防止注入（API8），在 *平台架构* 中已明确微服务编排逻辑与集成组件之间的角色分离。该措施可限制 API 输入被直接用于数据库查询的可能性。


    下一节将讨论的高强度安全评审流程，对识别和解决潜在问题有显著帮助。


    ## 安全评审


    应用扫描工具生成的安全报告有时会长达几十页甚至上百页。除了要安抚紧张的交付负责人、说明问题没有表面看起来那么严重之外，这个过程常让人感觉像是在闯关受刑。非常有帮助的一点在于：在内部测试阶段发现并修复问题，远胜于在你最喜欢的技术新闻网站上看到你的
    API 发生安全泄露。我们详尽且不妥协的流程见图 6-14。


    ![../images/509947_1_En_6_Chapter/509947_1_En_6_Fig14_HTML.png](img/509947_1_En_6_Fig14_HTML.png)


    图 6-14


    安全评审流程


    几个要点如下：


    *   安全测试由三个具备不同专业能力的团队执行。根据以往经验，我们发现通过更严格的输入校验策略，可以从安全报告中减少约 80 多页内容。为识别这类问题并避免交付负责人不必要的焦虑，安全测试会先由内部质量保障团队执行，然后再请求企业安全团队评审。之后，还会安排一次由独立外部安全咨询机构执行的测试。


    *   外部测试提供的安全报告将由信息安全团队复审并重新分级——严重级别通常会*上调*一个等级。即从中危到高危，从高危到严重。


    *   为协助修复优先级排序，发现的问题或缺陷采用 MoSCoW（Must have、Should have、Could have、Won’t have）方法分类。


    *   已识别问题也可能超出团队可控范围——例如共享企业组件所需的配置更新。在这种情况下，即便由外部团队调查和修复，我们仍保留该问题的所有权。


    *   重新分级后的安全报告由 Marketplace 团队负责，内部与外部的修复和更新都会纳入交付周期。


    *   在应用更新后，通常会重新执行安全测试，以确认问题已解决，并识别修复过程中可能引入的新问题。

    '
- fmt: '## Summary


    In this chapter, we started by taking a wider view of the importance of Security
    in an API Marketplace implementation. As noted, it touches on every domain and
    due attention and importantly respect to this purpose is critical to the integrity
    and longevity of your implementation. We then narrowed in on API security and
    considered three integration patterns. The first is Open APIs which are generally
    accessible but require credentials for tracking and controlling third-party access.
    Business to Business (B2B) APIs are used for to achieve system-to-system integration
    and limited to a smaller, more familiar audience. Using certificates as a security
    mechanism may simplify the network requirements for this integration pattern.


    Finally, we discussed the most popular and widely used, Business to Consumer (B2C),
    pattern. With this pattern, an end user provides consent for a third party to
    initiate a request on their behalf or to access their data. To understand how
    this can be achieved using industry standards, we delved into significant detail
    of the OAuth process. With a firm understanding of actors, scopes, grant types,
    and access tokens, we reviewed supporting processes such as Application Registration
    and stepped through the Client Credentials, Authorization Code, and Refresh Token
    grant types. The ability to revoke permission is extremely important and is a
    non-negotiable requirement for any implementation.


    We then covered a variation of OAuth which is used for Open Banking and observed
    how the intent plays a pivotal role in this approach. A way to compromise end-user
    credentials was also discussed, and I would encourage you to continue actively
    seeking out other opportunities for exploit. This would allow your team to pre-emptively
    address these issues – the resolution may be an update to process instead of technology.


    We examined the Open Web Application Security Project (OWASP) Top 10 API risks
    and suggested how some of these could be addressed through smarter design, careful
    development, and leveraging the capability of the products in our stack. Finally,
    we ran the gauntlet of our iterative Security Review process which slowly but
    surely helps to identify and resolve gaps in our armor.


    Over my career I have been extremely fortunate to have worked with highly skilled
    individuals who are as passionate about security as I am about integration. I
    would encourage you to seek out these tomes of knowledge, sit at their feet, and
    listen attentively and humbly while they will undoubtedly point out the flaws
    in your implementation and use their sagely advice to make your platform battle-ready.
    Due to the nature and area of operation of an API Marketplace, it will be under
    constant attack.


    # 7. API Design


    Crafting the interface for an API is an activity that can be considered from a
    number of perspectives. For a Developer, it is fairly trivial as the set of inputs
    and outputs are well defined and if not, can be easily added later in the process.
    For an Enterprise Architect, this is a burden akin to Atlas propping up the world
    on his shoulders as the interface should be well thought through, be reusable
    by multiple consumers from the present and future, and should be able to withstand
    any tectonic shifts from the backend provider. For the API Product Owner, the
    interface should be clean, clear, and easy for Third Parties to consume. Regulators
    would define an interface which caters for a wide range of consumers which would
    require sophisticated documentation drawn up by ex-NASA Apollo engineers.


    At one end of the spectrum, Design is an extremely important phase of the development
    lifecycle, and the gravity of making the right decisions can result in analysis
    paralysis. Additional pressure is introduced into the system when the product
    will be consumed by external third-party providers as changes or updates cannot
    be contained. In an active API ecosystem, a poorly designed interface can result
    in low developer adoption and possibly reputational damage to the product and
    the Marketplace.


    At the other end, the API, although important, is simply a means to an end, and
    getting a specification out as quickly as possible will ease pressure from a demanding
    consumer. This might result in a custom interface which will satisfy just the
    one consumer, but that injustice can be addressed later – with more time and energy.


    The APIs in our Marketplace have been built from multiple perspectives and at
    various points in the spectrum referenced above. This is a process that we are
    still refining and optimizing. In this chapter, I will share our experience, learning,
    and pitfalls to allow you more insight into our Design process. These can be adapted
    to your Marketplace implementation. From a convention perspective, I refer to
    the interface consumed by an external party as the northbound interface and the
    backend interface consumed by the Marketplace as the southbound interface.


    ## Design Strategy


    Before we embark on the discussion regarding how to define APIs, let us pause
    briefly and consider the following question:


    - What VALUE does your API add?


    Try to answer this as honestly as you can – there is no right or wrong response
    as it ultimately comes down to the requirements from the enterprise. Is the organization’s
    intention to establish a presence in the market and this is simply a tick-in-the-box
    exercise to publish an API? In this case, the implicit value that could be added
    is that the organization meets regulatory or compliance requirements. Or is the
    objective to create more API products than a rival organization – with the preference
    on quantity for increased bragging rights rather than quality. In this case, your
    Marketplace appears closer to the top right quadrant of a popular survey. Perhaps
    this is a pilot initiative with a single confirmed consumer with the requirement
    that the APIs will be used by a larger audience later. Value in the short-term
    is to enable a single consumer and in the medium-to-long-term, multiple consumers.
    It could also be a genuine response to establish your organization as a Platform
    provider to enable a new digital channel for third-party providers to leverage
    the capability of your enterprise to build and launch their applications and services.
    This could result in long-term value for the organization as it would create a
    new revenue stream.


    It is vitally important to reflect on this question as it essentially drives the
    strategy behind your API design. For example, regulatory requirements may have
    forced your organization to expose APIs for third-party consumption. The first
    iteration of your Marketplace could be to meet this objective by a regulatory
    deadline. The strategies outlined below, which will be used to build your API
    products, are driven by the objectives of the API Marketplace. Having a firm understanding
    of where trade-offs have to be made will help to shape the identity of your APIs,
    its adoption, and areas of improvement for later iterations.'
