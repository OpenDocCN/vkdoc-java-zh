- fmt: "## API Gateway\n\nI consider this element in much the same light as a passport\
    \ control function at an international airport. Each API Gateway product implementation,\
    \ from various software vendors, may have a unique set of features and capabilities.\
    \ For our implementation, we have made a concerted decision to leverage the standard,\
    \ vanilla capability to allow easy migration in the future. A large driver behind\
    \ this decision is that the Gateway infrastructure is a shared, enterprise service\
    \ and customization could impact future upgrades or other tenants. The key principles\
    \ of our API Gateway development are as follows:\n\n1. **No transformation or\
    \ protocol translation**: The key objective of the Gateway is to proxy a REST\
    \ API. The swagger definition published to third-party consumers matches that\
    \ of the microservice – direct mapping.\n2. **Well-defined requests**: From my\
    \ experience with SOAP, I attempted to sneak in an `<any>` type of request to\
    \ speed up development. It turned out that generic payloads are viewed in very\
    \ much the same negative light as `<any>` XML requests and my suggestion raised\
    \ alert levels with the technical owner of the API Gateway and resulted in increased\
    \ scrutiny for future requests.\n3. **Lightweight**: API Gateways are not ESBs\
    \ or Process Engines and do not have the same time tolerances. There are no long-running\
    \ processes. Requests should be processed as quickly as possible. The enterprise\
    \ timeout standard is 60 seconds, which is quite lenient considering that a popular\
    \ Cloud provider API Gateway PaaS offering is a non-negotiable 30 seconds. Be\
    \ sure to remember that the API is most likely supporting a customer’s digital\
    \ experience and millisecond response times are required to retain the audience.\n\
    4. **Security**: Specific third parties can be granted access to certain APIs\
    \ by controlling subscription. Access to “Live” APIs can only be provided once\
    \ the third party has been approved. There are several access mechanisms ranging\
    \ from a client identifier and secret to token based access. Additional controls\
    \ such as client certificates and `jws-signatures` can also be applied for more\
    \ sensitive APIs. The biggest benefit to the development process is that this\
    \ complexity can be handled by the gateway product and the downstream components\
    \ are shielded.\n5. **Rate limiting**: A great feature, which is key for an environment\
    \ with many new third-party developers, is the ability to throttle requests. A\
    \ third party could accidentally or intentionally trigger a large number of requests\
    \ – which could result in a denial of service, impact other API consumers, or\
    \ flood downstream systems. This can be prevented by specifying the number of\
    \ concurrent requests and number of requests in a set timeframe. This is out of\
    \ the box functionality which can be achieved with a configuration update rather\
    \ than custom development.\n\n## Microservices\n\nFigure [8-5](#509947_1_En_8_Chapter.xhtml#Fig5)\
    \ shows the key types of microservices in our platform, their interaction pattern,\
    \ and the use of platform services. To provide greater insight into the internal\
    \ microservice operation, I discuss the components in greater detail.\n\n![../images/509947_1_En_8_Chapter/509947_1_En_8_Fig5_HTML.jpg](images/509947_1_En_8_Chapter/509947_1_En_8_Fig5_HTML.jpg)\n\
    \nFigure 8-5  \nMicroservice architecture\n\n`Middleware components` are used\
    \ to integrate to backend systems. These are dedicated components which are used\
    \ as gateways to southbound platforms. The component encapsulates the integration\
    \ logic and complexity and exposes a simple business interface for consumption.\
    \ A middleware component can only connect to a single backend. A key principle\
    \ is that cross-communication between components is not allowed. That is, one\
    \ middleware component cannot call another. Figure [8-6](#509947_1_En_8_Chapter.xhtml#Fig6)\
    \ details the internal architecture of a middleware component.\n\n![../images/509947_1_En_8_Chapter/509947_1_En_8_Fig6_HTML.jpg](images/509947_1_En_8_Chapter/509947_1_En_8_Fig6_HTML.jpg)\n\
    \nFigure 8-6  \nAnatomy of a middleware component\n\nWorking from left to right,\
    \ the function of these elements is:\n\n- `Client`: This is used to initiate the\
    \ `gRPC` call to the component. It is used during development and for unit testing.\
    \ Using a `port-forward`, the client can be used to initiate calls directly to\
    \ components deployed in other environments. For example, the client can be used\
    \ to initiate a request to verify connectivity to a downstream system in the testing\
    \ environment.\n- `Server`: This element contains the “plumbing” to service the\
    \ `gRPC` request. Responsible for unmarshalling, transforming the request, invoking\
    \ the integration component, transforming and marshalling the response. During\
    \ development, the response from this component can be mocked in the event of\
    \ a backend not being available. The server component can also be used to route\
    \ requests to different integration components. We have successfully used this\
    \ approach to effect a migration strategy between different provider interfaces.\
    \ The simple approach was to use an environment variable to reconfigure the route\
    \ at runtime.\n- `Integration`: The objective of this element is simply to interface\
    \ with a backend system. For reasons of abstraction, there are no `gRPC` references\
    \ in this development, and it can be tested directly from the command-line without\
    \ any upstream dependencies. The component is responsible for handling various\
    \ types of responses and error conditions which may arise during the request.\
    \ Application-specific rules such as mapping of error codes or setting default\
    \ values are also made within this component as a means of consolidation and isolation.\
    \ It is generally advisable to have a dedicated integration component for a specific\
    \ interface. This keeps code elements clean and allows easy maintenance.\n\n`Logic\
    \ components` orchestrate the process flow to achieve an API product implementation\
    \ as illustrated in Figure [8-7](#509947_1_En_8_Chapter.xhtml#Fig7). For example,\
    \ an API product to retrieve a Customer profile could leverage a number of middleware\
    \ components to assemble the response. The response from one system could be interrogated\
    \ and transformed to construct the request for another. It is extremely important\
    \ to differentiate between application and business logic. Routing a request to\
    \ a middleware service to create a customer is an example of application logic.\
    \ The process to create the customer record is an example of business logic. As\
    \ the Marketplace is a new channel to the enterprise, it should leverage centrally\
    \ owned and controlled business processes.\n\n![../images/509947_1_En_8_Chapter/509947_1_En_8_Fig7_HTML.jpg](images/509947_1_En_8_Chapter/509947_1_En_8_Fig7_HTML.jpg)\n\
    \nFigure 8-7  \nLogic microservice orchestration\n\nThe northbound interface of\
    \ this component is typically the swagger definition which is published on the\
    \ API Gateway. This simplifies the integration between API Gateway and microservice.\
    \ Another key function of this component is policy enforcement. Depending on the\
    \ nature of the API product, the microservice may perform validation and verification\
    \ such as confirming end user consent before fulfilling the request. To streamline\
    \ process execution, requests to middleware components can be initiated concurrently.\
    \ A `gRPC` stream can also be used to optimize processing of requests. As an example,\
    \ for Optical Character Recognition (`OCR`) of a document, we initiate the call\
    \ to a middleware component which then initiates a request to a local enterprise\
    \ service and to a Cloud vision service. Once the request is processed, a response\
    \ is returned in the stream. If the first response received was not successful,\
