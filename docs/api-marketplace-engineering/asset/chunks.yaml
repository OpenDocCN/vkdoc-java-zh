  trans: '

    ### 负责人


    这项工作最好由产品负责人（PO）牵头，因为这将构成面向外部消费者的销售宣讲基础。PO 还将向内部平台团队大力阐述在 Marketplace 中拥有代表性的好处。请始终牢记，API
    Marketplace 拥有众多消费者——来自外部组织的业务型*和*技术型受众。从这些关系中获得的知识也可用于向内部团队和利益相关方展示能力。务必给予这项工作恰当程度的关注与重视。


    ## 技术开发者门户


    我在科技行业有超过 20 年经验，并且我自己也是一名自豪的开发者；因此，当谈到技术信息来源时，我的标准极高，*但*容忍度很低。我期望获得高质量且精准的信息，以便吸收并理解某个产品或服务。尽管所有开发者最终都会去
    StackOverflow，但如果我必须频繁诉诸这种方式，我对某个产品能力与成熟度的信心就会下降。如果有合适的信息或资源可用，我并不介意投入时间和精力去学习或理解概念，以便使用该技术。开发者门户是
    API Marketplace 与技术受众建立关系的基础。


    图 3-2-1 和 3-2-2 展示了 Twilio 针对其 Messaging API 的技术文档视图。图 3-2-1 通过识别发送消息的各种渠道，展示了下一层级的细节。在图
    3-2-2 中，文档提供了 API 使用所需的底层技术细节。


    ![../images/509947_1_En_3_Chapter/509947_1_En_3_Fig5_HTML.jpg](img/509947_1_En_3_Fig5_HTML.jpg)


    图 3-2-2


    用于消费 API 的技术说明与代码示例


    ![../images/509947_1_En_3_Chapter/509947_1_En_3_Fig4_HTML.jpg](img/509947_1_En_3_Fig4_HTML.jpg)


    图 3-2-1


    循序渐进地介绍不同的消息通道


    我们认为，构建一个能让开发者信任并保持忠诚的 Marketplace，应关注以下领域。


    ### 吸引


    对 API Marketplace 的技术消费，可能来自第二波评审，第一波通常是业务发展评估。技术团队将负责提供一份用于集成到 Marketplace 的**影响评估**。将会审查诸如文档标准、自助服务、示例代码、测试数据可用性以及开发者支持等标准。此评估反馈将有助于确定集成的时间线和成本。


    尽管 API Marketplace 的目标是吸引第三方提供方进入平台，但这需要以必要的**最低水平**技能与经验为前提。在定义目标受众时务必牢记这一点。引入新手或初级开发者的风险在于，团队将不得不提供更多的手把手指导与支持。


    **用户群组**和社区活动也可用于消除 API Marketplace 概念的神秘感，并向感兴趣的开发者介绍该平台。由于 API Marketplace 的目标是实现数据访问民主化，可考虑那些能够消费产品并启动多样化应用的创业者。**黑客松**是鼓励参与和激发兴趣的绝佳机制。一个积极的副作用是，它们还可能帮助你发现有才华的开发者加入交付团队。


    我们在一次实施中观察到一种新颖做法：与外部组织合作，由其邀请一组多元化开发者参加 3–5 天训练营。在此期间，开发者会与专家配对获得支持，并构建一个使用 API
    Marketplace 的应用程序。


    FinTech 和初创企业也热衷于消费 API 来快速启动应用交付。务必在此类组织常访问的网站发布文章并鼓励参与。Marketplace 具有**病毒式传播**特性，如果开发者体验积极，口碑会自然扩散。构建并培育开发者社区至关重要，这应成为
    API Marketplace 的核心目标。


    ### 教育


    对 API Marketplace 的技术消费至少需要中级开发经验，最好具备 2–3 年的实操编码或集成经验。虽然你可以教育新手开发者，但我认为门户的目标与材料不应包含如何发起
    REST API 调用的教程。网上已有很多优秀教程，可帮助开发者快速掌握 API。


    不过，请务必覆盖 API Marketplace *特有*概念，例如在**蓝图**中讲解 OAuth。委托授权作为 Marketplace 的基本原则之一，*必须*被清晰且简明地详细说明与解释。我们遇到过许多新的
    API 消费者，在能够对照时序图追踪调用之前，并不真正理解流程。许多集成开发者只熟悉 client ID/secret 模式。


    对于每个 API 产品，尽量提供多种编程语言的**代码示例**。一些标杆级开发者门户会提供以下语言示例：Node.js、C#、PHP、Ruby、Python、Java
    和 cURL。API Marketplace 的最大优势之一是访问方式中立——HTTP。务必利用这一点来兼容广泛的开发者群体。根据我个人消费某大型云服务商产品的开发经验，**代码实验室**可以带来巨大差异。代码实验室不同于代码示例，因为它会逐步引导开发者完成
    API 消费流程。可以把代码示例看作现成蛋糕，把代码实验室看作食谱。


    随着 marketplace 逐步成熟，可考虑提供用于集成的**模式**或推荐实践。典型示例是从移动应用消费 API。鉴于大量提供方在集成方面可能面临类似挑战，提供模式将有助于缓解集成摩擦，让你的
    API 更易被消费。顺便回答一个常见问题：关于直接从移动应用消费 API，答案是绝不要在应用中存储凭据，而应使用经用户认证的令牌来发起 API 调用。


    **博客文章**和**播客**同样是与开发者社区保持连接的极佳方式。这些工具可用于分享 Marketplace 的建设历程，并让用户了解你的路线图。可在播客中提出并回应尖锐议题——例如监管时间线以及如何据此规划。这些内容能让外界更深入理解平台内部运作与运营方式。


    随着平台成熟并扩展规模，可考虑推出**开发者认证**。它不必是庞大的体系——只需基础理论评估和实践练习，以确保开发者掌握 Marketplace 概念。对于更敏感的
    API 产品，这可能会成为强制要求。


    最后，可下载的 Postman 集合将极大帮助潜在开发者。Postman 被视为 API 开发的事实标准工具，本章后续也会讨论。务必提供文档，逐项说明集合中的每个值，并附上分步指南。Postman
    集合本身大约只占 40% 的工作量，其余 60% 在配套文档上。如果可能，考虑聘请技术写作人员协助整理这些材料。遗憾的是，一些最优秀的开发者并不一定最擅长撰写文档。

    '
- fmt: '## Build Trust


    Trust, in a Developer Community, must be earned. This can be achieved by paying
    attention to the detail and insisting on a high standard of delivery. By assisting
    developers with challenges they cannot solve on their own using the available
    technical literature, developers will feel supported. Timely response to support
    requests is also mandatory. Prompt feedback – even as simple as `we are investigating
    and will get back to you` is essential. With that in mind, it is imperative that
    there are processes within the support team that allow development issues to be
    escalated and attended to.


    I would like to highlight that developer support is a balancing act. As much as
    we want to support developers in consuming our Marketplaces, we would like our
    customer base to be self-reliant as much as possible. That is – the first port
    of call should be the documentation of the Portal, and then if there is still
    a significant gap in understanding, a question should be raised on the developer
    forum to solicit community feedback. If all else fails and the consumer is convinced
    there is a problem with the internal functioning or something that they cannot
    solve without intervention from the Marketplace team, a query should be logged.
    In addition, the query should include details of their troubleshooting and investigative
    efforts as well as their reasoning to believe it is an issue outside their sphere
    of control. This may seem like a tall order – however, having a strong developer
    community not only alleviates pressure on your Support team but also raises the
    bar for the overall standard of the Marketplace. That is, the quality of API products
    will improve as it will be subject to more challenging review from consumers.


    It is also essential to walk the talk. If an API Marketplace is a new digital
    channel to access data, your processes should also be digital. There is nothing
    more frustrating for a developer whose curiosity has been piqued to not have immediate
    access to get their hands dirty. An example is having a fantastic developer portal
    which outlines amazing functionality and capability with a `Schedule a chat` or
    `Contact us` form. Self-service is an absolute necessity. I would like to highly
    emphasize this as it allows a seamless transition from conceptual to tangible.


    By providing immediate access to functionality, your API Marketplace moves from
    a categorization of “marketing/vaporware” to tangible code. Speaking from experience,
    developers detest vaporware. Skepticism immediately increases and scrutiny to
    find chinks in the Marketplace armor intensifies. Be sure to allow immediate self-service
    access, at least to a `Sandbox/Simulated` environment, when an API product is
    released.


    ## Transparency


    Open, unambiguous access to information is also a way to keep the trust of your
    developer community. Provide insight into the API Product roadmap as much as competitive
    pressure will allow. Third parties can use this information to plan and schedule
    their releases accordingly. If possible, consider a consultative process with
    third parties regarding potential API products to determine potential demand/uptake
    early in the product lifecycle. This will help direct efforts/focus on APIs which
    will be readily consumed. Although a catalogue with hundreds of API products is
    impressive, if there is minimal use or uptake across most of the APIs, it only
    serves to increase the areas to support and maintain and diverts attention from
    APIs which are used more.


    Consider a beta program which allows early-stage API product access to a subset
    of trusted third parties. This process will allow the team to optimize and refine
    the product – from shaping an interface to performance engineering to updates
    in documentation in a safely demarcated “staging” environment. The beta tag provides
    a clear indication that the products are still under construction. When our Marketplace
    was launched to the public, our Product Owner skillfully included the “beta” reference
    to allow us room to maneuver during the early phases of our launch. With permission
    from Information and Network Security, it may also be possible to connect beta
    release APIs to internal Quality Assurance (`QA`) backends to allow for more in-depth
    integration testing. This should be done after serious consideration as providing
    third parties access to an internal environment could open a Pandora’s box.


    A novel feature observed on several established Developer Portals is an API status
    page, which is also available as an API. This allows consumers to tap into your
    operational platform and the ability to take pre-emptive steps in the event of
    a service or API outage. Status also includes historical data so that consumers
    and the Operations team can quickly identify poorly operating products and to
    seek remediation efforts on the internal or backend platform. By providing this
    level of visibility, it is a signal to a third party that you are serious about
    the stability and reliability of your platform, and you are taking measures to
    provide immediate alerting/notification in the event of an issue.


    Once an API is in production, any updates for new functionality, or to patch or
    fix issues, must be clearly documented in release notes. This should become part
    of the deployment cycle as third parties must be kept informed of any changes
    to an API.


    ## Collaborate


    Be sure to encourage feedback from your consumers regarding API products and,
    where possible, attempt to address the feedback in subsequent releases. Some feedback,
    such as prescribed regulatory interfaces are too complex to consume, may not be
    possible to accommodate changes. Feedback is a gift, and if a consumer took the
    time to send through feedback, it is probably significant from their perspective
    – always be sure to close the loop with the user. Continuing the scenario above
    – the feedback regarding complex, regulated interfaces would be to emphasize,
    then indicate that regulation mandates the interface and finally provide suggestions
    to assist, such as sample code or labs.


    Set up an area on the technical developer portal, possibly a dedicated section
    in your message forum for feature requests. As third parties are consuming your
    APIs, they are in the best position to determine product gaps and potential areas
    of improvement. This is a fantastic input into the product lifecycle and can make
    a good API great. Again, based on the scale and reach of the API, the priority
    or scheduling of the request is linked to the number of votes for the request.
    This is one of the biggest benefits of an active developer community – the users
    can help to drive the product roadmap forward.


    For integration solutions within an enterprise, all service consumers are notified
    of a change well in advance, and some governance processes require approval from
    all consumers before the change can be made. As an API Marketplace sits on the
    fringe of an organization, the delivery team may not consider the wider impact
    when updating an API. That is, from a responsibility assignment `RACI (Responsible,
    Accountable, Consulted, Informed)` matrix perspective, a third party may not be
    Consulted or even Informed. A lightweight change management process should be
    followed to ensure that all service consumers are at a minimum aware of any maintenance
    or releases to any APIs consumed.'
