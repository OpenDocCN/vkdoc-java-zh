    ## 日志记录


    基于多年在集成环境中的经验，我认为日志是任何中间件解决方案的生命线。在开发和支持过程中，日志是我用来洞察请求执行路径的主要机制。或许有更优雅的方法可以借助调试工具观察栈上的值，但对我个人而言，一个放置得当、充当“线人”的*console.log*或*logger.debug*语句，往往能在令人眼花缭乱的“谁是凶手”追踪挑战中，指向那个幕后主谋。


    如图 10-8 所示，日志可能存在于多种上下文中。在开发阶段，通常只需跟踪单个文件或标准输出（stdout）流。在集群环境中，日志数量等于参与节点的数量。在面向微服务、以容器为导向的平台中，日志会呈爆炸式增长，单个请求可能穿越多个
    Pod，而这些 Pod 又分布在集群中的不同节点上。


    ![../images/509947_1_En_10_Chapter/509947_1_En_10_Fig8_HTML.jpg](img/509947_1_En_10_Fig8_HTML.jpg)


    图 10-8


    日志上下文


    追踪一笔交易就像试图在许多不同的干草堆里找针。这是我在运维领域学到并始终铭记于平台设计中的经验之一。一个关键的平台架构原则是：从入口点开始为交易附加唯一标识符，并在其穿越环境的每一条日志语句中都使用该标识。这个看似简单的策略实现了我所谓分布式集成环境中的“圣杯”——跨多个组件追踪交易的能力。每个组件都用可追踪标识符记录日志后，这场战斗就已经赢了一半。还必须始终牢记，容器是短暂的——为了处理负载可以创建更多容器，负载消退后又会被销毁，或者因应用异常而重启。由于日志通常写入*stdout*，容器实例关闭或重启时，日志可能因此丢失。


    有一些方式可以缓解日志丢失，比如挂载容器可访问的持久化存储。为了尽量降低容器环境复杂度，团队在应用层面解决了这一需求，方案见图 10-9。所有应用都使用平台日志服务，该服务可访问应用上下文。上下文中填充了大量元数据，例如唯一交易标识符、宿主应用名称以及发起请求的客户端详情。在发起日志请求时，会从上下文、容器和运行时中提取补充数据，打包成一个简单的
    JSON 对象，然后通过 UDP 发送到负载均衡端点。由于这是即发即弃（fire-and-forget）请求，因此将对应用性能的影响降到最低。这也是企业级
    Elasticsearch、Logstash 和 Kibana（ELK）服务的入口点。


    ![../images/509947_1_En_10_Chapter/509947_1_En_10_Fig9_HTML.jpg](img/509947_1_En_10_Fig9_HTML.jpg)


    图 10-9


    日志策略


    系统专属的 Kafka 主题用于缓冲请求并防止消息丢失，因为该能力被企业内不同平台共同使用。这也是我们选择利用企业服务以最小化运维开销的又一个例子，从而让团队能够将最大精力投入到创造*API*价值上。随后，日志*event*会被摄入
    ELK 栈，下一节将更详细介绍。


    ### ELK 栈


    ELK 是三个开源项目名称首字母的缩写：Elasticsearch、Logstash 和 Kibana。Elasticsearch 是搜索与分析引擎。Logstash
    是服务端数据处理管道，可同时从多个来源摄入数据，对其进行转换，然后发送到类似 Elasticsearch 的“存储仓（stash）”。Kibana 让用户能够通过图表和曲线可视化
    Elasticsearch 中的数据。


    优秀应用的一个特征，是能被广泛用户群体轻松采纳和运维。Kibana 控制台本质上是 ELK 栈的用户界面，如图 10-10 所示；它不仅满足这一目标，在我看来还完成得格外出色。


    ![../images/509947_1_En_10_Chapter/509947_1_En_10_Fig10_HTML.jpg](img/509947_1_En_10_Fig10_HTML.jpg)


    图 10-10


    Kibana 控制台


    我观察到一些支持工程师——有时是刚加入团队、只参加过少量知识分享会的新人——也能熟练地在 Kibana 控制台中定位请求失败原因。只要提供唯一标识符，Elasticsearch
    就能消除扫描多份日志的困难，几乎即时展示所有包含该引用的条目，并提供可用于下钻到特定时间范围的时序图。


    Kibana 更进一步，允许用户仅查看字段子集。还可添加额外过滤器以聚焦特定组件。也可以执行 Kibana 查询（即 Kibana Query Language，KQL）来扩大或缩小搜索范围。ELK
    栈很可能是我们运维环境中最重要的要素；如果团队所有成员都投入时间和精力掌握其能力，那么它必将在开发和支持两方面带来显著成效。


    ## 监控


    运维中的这个领域遵循冰山原则。表面上看，它似乎相对简单；但深入观察后，会发现远不止眼前所见。这是一段持续演进的旅程，在我们实施的第一天，能力只具备今天的一小部分。我们监控能力的很大一部分都借助了企业级功能，这在软件许可证层面带来了更低成本，也让发布过渡更顺畅，因为变更管理委员会对继续使用既有运维流程和工具更有信心。在接下来的章节中，我们将审视监控的各个方面，并讨论为何部分之和会形成更大的整体，从而使运维团队能够以先发制人的方式管理平台。

    '
- fmt: '## Environment Monitoring


    Almost every Network Operations or Command Centre environment has banks of screens
    showing impressive dials and gauges which are constantly moving. From my perspective,
    this is the traditional mechanism of monitoring an environment. Line graphs, as
    shown in Figure [10-11](#509947_1_En_10_Chapter.xhtml#Fig11), generally indicate
    `CPU` utilization or memory consumption. When pre-defined thresholds are met,
    there is generally a flurry of activity from the support personnel and a sigh
    of relief as the graph dips below the threshold.


    ![../images/509947_1_En_10_Chapter/509947_1_En_10_Fig11_HTML.png](images/509947_1_En_10_Chapter/509947_1_En_10_Fig11_HTML.png)


    Figure 10-11


    Infrastructure monitoring


    The source of information for these metrics is generally an agent installed on
    the physical or virtual host. This is the base level of monitoring and is used
    to determine if there are any issues with the physical infrastructure. Its use
    is much like checking the temperature of a patient. If the temperature or `CPU`
    is high, it is used as an indicator that something is amiss. That is typically
    the extent of the information it can provide.


    In an API or integration environment, the next level of monitoring is service
    or endpoint monitoring, as shown in Figure [10-12](#509947_1_En_10_Chapter.xhtml#Fig12).
    This is sometimes referred to as synthetic monitoring. Periodic probes test the
    availability of a service. Our team generally includes an `isUp` operation which
    simply returns a `HTTP 200`. False positives may be eliminated by defining rules
    for alert activation, such as three consecutive failures. As the request generally
    traverses the full network infrastructure route to the endpoint, a problem with
    a load balancer or firewall configuration can also be identified which may not
    be reported in the infrastructure monitoring dashboard.


    ![../images/509947_1_En_10_Chapter/509947_1_En_10_Fig12_HTML.jpg](images/509947_1_En_10_Chapter/509947_1_En_10_Fig12_HTML.jpg)


    Figure 10-12


    Service monitoring


    Due to a complex network environment, there have been instances of changes or
    updates to external systems which have impacted our service availability. The
    periodic, scheduled execution can be used as indisputable evidence of when the
    issue occurred, and a further benefit is that it can alert the team of an issue
    before it is found and reported by an external consumer. If this was the triage
    of a patient, this would be checking blood pressure or oxygen saturation levels.
    Lower flow rates could indicate a potential block in the system. On its own, it
    does not indicate the cause – but helps to narrow down the areas which require
    further investigation.


    ## Application Performance Monitoring


    From my first encounter of Application Performance Monitoring (`APM`) many years
    ago, I have been extremely impressed with this feat of software engineering. The
    `APM` consultant instrumented our application’s `Java Virtual Machine`, and with
    the magic of byte-code injection, we were able to view transactions flowing through
    our platform. At first sight, this was the Holy Grail of transaction tracing that
    I had sought after for so long. After more exposure and examination, I discovered
    that `APM` has a specific role in the software development lifecycle, and my quest
    for albeit a slightly “Holier Grail” was not over.


    Although `APM` can be used daily in an operational environment, the insights it
    provides, as shown in Figure [10-13](#509947_1_En_10_Chapter.xhtml#Fig13), are
    generally considered during load testing and performance engineering. Like a dye
    injected into a patient’s bloodstream, it shows the exact path a request follows
    to reach its destination. Some `APM` products also surface the exact database
    request which surfaces unindexed, poor performing queries.


    ![../images/509947_1_En_10_Chapter/509947_1_En_10_Fig13_HTML.jpg](images/509947_1_En_10_Chapter/509947_1_En_10_Fig13_HTML.jpg)


    Figure 10-13


    APM transaction tracing


    An `APM` resolution path can be used to optimize the solution by identifying areas
    of high-latency and potential bottlenecks in the system architecture. In complete
    honesty, this could very well be the Holy Grail which operations personnel can
    use as the single oracle of information for transaction execution. At this time,
    however, based on my personal experience and observation of our current operational
    processes and procedures, we have not yet reached this conclusion.


    ## Functional Monitoring


    The objective of Functional Monitoring is to probe deeper than simply verifying
    the availability of an API endpoint but to test and confirm its full operation.
    One of my favorite interview questions to prospective technical team members is
    to ask which stream of the project they would lean toward – project management,
    design, development, testing, or support. Just for reference – project management
    was a “loaded” option and for the unfortunate few who selected this, it was the
    end of the line. As many would love to write code, the most popular response is
    development, with almost no votes for support. Evidence of my belief that it is
    possible to write a significant amount of code in an operational role is presented
    in Figure [10-14](#509947_1_En_10_Chapter.xhtml#Fig14) – an application, nicknamed
    `Homer Knows` which I developed for internal monitoring of our platform.


    ![../images/509947_1_En_10_Chapter/509947_1_En_10_Fig14_HTML.jpg](images/509947_1_En_10_Chapter/509947_1_En_10_Fig14_HTML.jpg)


    Figure 10-14


    Homer Knows


    A key element of our Marketplace is the `OAuth` process flow. This is made up
    of a sequence of API calls, with redirects to a web user interface (`UI`) prompting
    the user to authenticate and authorize the request. We were able to verify only
    the early API calls, but only discovered issues with the `UI` and later calls
    when third parties indicated an outage. From an operational perspective, it troubled
    me that our approach was `reactive,` and I used this as motivation to build a
    custom application, accessible via desktop or mobile, which simulated a user (`Homer
    Simpson`) running through the flow on a regular schedule triggered by a simple
    `cron` script. If the process succeeded or failed, `Homer` would `know`. In addition
    to learning a new mobile application framework, this exercise afforded me the
    opportunity to consume the API in much the same way that a third party would.
    Continuing our medical analogy, it allows the operations team to observe a patient
    `during` a potential incident which could reveal the root cause in real-time.'
