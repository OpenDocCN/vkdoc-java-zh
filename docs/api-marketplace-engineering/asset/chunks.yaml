  trans: '

    ### 目标态配置


    尽管最终搭建出企业级本地部署 Kubernetes 平台这一过程充满挑战且收获颇丰，但团队已经得出结论：这项工作很像把狮子当宠物养。这个平台需要持续关注和专门支持；如果控制不当，它会“吞噬”缺乏经验的维护者。图
    5-11 展示了我们部署架构下一阶段的规划。我们设想利用云基础设施与平台服务来运行技术栈中的各类组件。鉴于 API Gateway 等组件属于共享实例，这必然会是一次分阶段迁移。代码仓库和
    DevOps 流水线等支撑性要素也必须迁移到云上。


    ![../images/509947_1_En_5_Chapter/509947_1_En_5_Fig11_HTML.jpg](img/509947_1_En_5_Fig11_HTML.jpg)


    图 5-11


    现状配置


    对于初创公司或规模较小的组织而言，使用云基础设施或平台服务通常是相对简单的任务。而这次迭代揭示出：对于成熟企业来说，这恰恰处在难度光谱的另一端。需要考虑的因素很多，例如从本地组件连接到云端，再从云端回到本地。我们的最终目标是采用云厂商托管的
    Kubernetes 服务，以屏蔽底层基础设施需求，让我们能够专注于以容器形式运行的微服务本身。


    简而言之，我们将容器打包后托管到托管式容器平台上。托管服务将负责所需的安全补丁、升级以及基础设施弹性扩缩容。扩缩容是关键因素，因为这意味着我们不再需要像现在这样维护物理硬件或虚拟机。尽管我们非常期待迁移到云端，但也在尽力控制预期。若以这段漫长且时有颠簸的上云之旅为鉴，在新环境中驻留与运营可能会带来一整套全新的挑战。我希望这种学习与成长能像我们此前的迭代一样富有回报。


    ## 总结


    为 API Marketplace 建立平台架构为我们的团队提供了巨大的学习机会。我们意识到，阅读一篇介绍 Netflix 如何部署和运营应用的博客文章，只是触及表面；当团队需要在显著不同的组织环境中亲自落地时，才会真正体会其中复杂性。这让我们获得了对
    Docker（容器化）、gRPC（服务间微服务通信）以及 Kubernetes（容器管理）等技术要素的实战经验。


    我们把 ingress、service、pod 这类深层技术组件视作自己亲手抚养和培育的“孩子”。就像初为人父母一样，这段旅程也充满挑战。我们经历过剧烈的“肠绞痛”时刻，彼此疲惫相望，怀疑自己是否能撑过去。


    同样，我们也有许多自豪时刻：当我们扩展 pod 副本数量并顺利通过性能测试时，平台迈出了“第一步”。我们的平台就像婴儿一样不断成熟，如今正进入新的生命周期阶段。时间带来的好处是，我们对其运行方式、优势与短板有了更深入的理解。仍有大量内容需要改进与优化，这也是我将
    API Marketplace 视为一个有生命、会呼吸的有机体的原因。非洲谚语“养育一个孩子需要整个村庄的力量”恰如其分地概括了我们的经历——如果没有企业内各方的帮助与支持，我们不可能实现这一目标。


    在接下来的章节中，我们将讨论平台架构如何支撑 Marketplace 的 API 产品，涵盖从设计、开发到运营的全过程。


    # 6. 安全


    建设 API Marketplace 就像在一片陌生且充满敌意的区域为你的组织设立大使馆。尽管你的初衷是良善的，目标也是帮助第三方提供方利用你的产品和服务，但这也使企业每天都暴露在一系列新的攻击向量之下。当宝贵的客户数据及其他敏感信息面临风险时，代价极其高昂。“每个人都对平台安全性与完整性负责”这句准则绝不能掉以轻心。任何
    API 产品上的安全漏洞都可能引发负面舆论，进而影响其他产品、Marketplace 乃至整个组织。


    安全不仅仅是 API 的访问机制。更重要的是将其视为贯穿平台每一层的要素——涵盖技术、人员与流程三个维度。幸运的是，我们有成熟的模式与安全标准可作为实施指引。同时，这也是一项精细的平衡工作：既要满足组织自身需求，又不能影响开发者采用。


    在接下来的各节中，我将介绍在 API Marketplace 落地过程中，可能适用于不同产品、受众以及生命周期阶段的安全主题。正如我们在前文章节“监管”中所述，针对特定行业，这些标准可能存在变体。我们将更详细地研究开放银行（Open
    Banking）的变体。


    安全环境持续变化、动态演进，这使 API Marketplace 更具挑战也更有趣，因为它要求我们持续学习并不断适应，才能保持安全。我们非常幸运，因为在这一领域已有大量文献、产品方案与观点可供参考。知识对于理解全局并保持安全至关重要。

    '
- fmt: '## Cross-Cutting Concern


    Let us consider how security impacts various domains in an API Marketplace implementation.


    - **API**: The nature of the product determines the API access mechanism. If it
    requires end-user consent, it will be done in a Business-to-Consumer (B2C) context.
    If the aim is to allow system integration, it will be achieved in a Business-to-Business
    (B2B) context.

    - **Network**: As the call traverses the various elements in your platform stack,
    how can it be monitored, tracked, and interrogated? Will it maintain customer
    identity as it reaches the backend, or will it assume a system one? Should your
    platform be firewalled from the rest of the enterprise which would add significant
    administrative overhead but provide the benefit of fine-grained access control?

    - **Application**: Even with the best security implementation, vulnerabilities
    in the application code may be exploited. There are hair-raising accounts of unauthorized
    access to customer data and systems which have been compromised through ways the
    technical team never thought possible.

    - **Container**: This deployment strategy is extremely popular due to its modularized
    approach. It is important to determine if the base image could be compromised.
    The strategy for the configuration and management of credentials must be well
    defined at an enterprise level to prevent ad hoc and loose implementations. The
    context in which the application executes may appear trivial – however, root user
    or write access to a file system may unwittingly yield to security backdoors.
    The same rigor that applies to traditional deployment must be applied to containers.

    - **Infrastructure**: Does your solution run on on-premises hardware or do you
    deploy to Infrastructure-as-a-Service (`IasS`) or Platform-as-a-Service (`PaaS`)
    public cloud solutions? If the latter, then new security policies and governance
    must be defined to maintain solution and platform integrity.

    - **Process**: Consider the seemingly simple objective of providing a third party
    with credentials to access an API. Will this be achieved by sharing the details
    via email or possibly a password-protected document? This may result in a comedic
    chicken or the egg scenario as we need to determine how to share the password
    for the document containing the credentials. If the credentials are generated
    through human intervention, it is already compromised. Any decent security policy
    also demands that credentials are regularly changed – how will this be achieved
    – especially if dealing with a large number of third-party providers.

    - **Operations**: Does your support personnel have credentials for access to backend
    systems? If the immediate answer is a resounding `No`, will this be an impediment
    to resolving support queries? Developers may unwittingly leak sensitive customer
    data, such as account numbers, through seemingly harmless log statements which
    ripple through to operational support tools.


    The intention of this section is not to scare you into shelving your plans for
    an API Marketplace implementation until you can fully guarantee every aspect of
    security. The aim is to highlight the various dimensions across which security
    must be considered. Again, this will be tailored to the technical landscape and
    requirements of your enterprise, and each platform will undoubtedly be unique
    in their implementation.


    An approach that has worked exceedingly well for ours is to actively seek out
    regular and rigorous review by teams from other domains – Information and Network
    Security, Architecture, and Shared Enterprise Services. In all honesty, the feedback
    was not always positive, and we had to refactor our solutions to mitigate. I can
    assure you that the integrity of the result has certainly been worth the effort.


    In the following sections, we will deep dive into the tip of the iceberg – API
    security. This is just one of the many perspectives through which we need to consider
    a Marketplace implementation. Understanding that security impacts almost every
    aspect of your platform will help the technical team establish foundational elements
    and core practices in the right way to prevent rework later.


    ## API Security


    The access mechanism for your API product is intrinsically linked to the type
    of consumer and the nature of the solution. It can be considered in much the same
    way as access to your home. Depending on where you live, there may be a security
    guard at the entrance of your gated community to allow only residents in, your
    front door might have a heavy-duty lock which only you and your family have a
    key to, while locks on internal doors are probably never used. In the following
    sections, we will review security approaches in the context in which they may
    be best applied and the associated audience.


    ### Open APIs


    These interfaces typically provide reference or publicly accessible data. Examples
    include locations of service stations, country codes, or weather information for
    a specified location. Although the API may not require a security mechanism at
    all, it is best to use, at a minimum, a `Client ID` and `Secret` as illustrated
    in Figure [6-1](#509947_1_En_6_Chapter.xhtml#Fig1). This has the benefit of understanding
    who is consuming your API – by way of a required registration to receive credentials.
    The `client identifier` can also be used to provide different service levels and,
    importantly, to restrict access to a rogue consumer without impacting others.


    ![../images/509947_1_En_6_Chapter/509947_1_En_6_Fig1_HTML.jpg](images/509947_1_En_6_Chapter/509947_1_En_6_Fig1_HTML.jpg)


    Figure 6-1


    Open API security pattern


    There may be a wide audience for this type of product. From developers learning
    how to consume APIs to established service providers looking for reliable source
    of reference data.


    ### Business to Business (B2B)


    The aim of these APIs is to allow system-to-system integration. Examples include
    interfaces to determine stock availability, placing an order to purchase a product,
    or sharing enterprise data with affiliates or partners. Traditional mechanisms
    to achieve this type of integration required custom, purpose-built interfaces
    and dedicated network infrastructure, in the form of leased lines, between consumer
    and provider. As a result, there was significant cost and time impact for the
    upfront provisioning. Although this can be achieved by configuring a Virtual Private
    Network (`VPN`) between the parties which uses public network infrastructure,
    it can also be achieved through the use of a security `certificate` to simplify
    the integration pattern as illustrated in Figure [6-2](#509947_1_En_6_Chapter.xhtml#Fig2).


    ![../images/509947_1_En_6_Chapter/509947_1_En_6_Fig2_HTML.jpg](images/509947_1_En_6_Chapter/509947_1_En_6_Fig2_HTML.jpg)


    Figure 6-2


    B2B security pattern


    The certificate and associated passphrase provides an additional layer of security
    as it is directly linked to a specific consumer and is an essential element in
    the handshake to set up the Transport Layer Security (`TLS`) connection. The certificate
    may be issued by the API host organization or may be provided by the consumer
    to be registered with the host. Due to the sensitive nature of the API, the audience
    for these types of solutions is typically well-known partners or established third-party
    providers.'
  raw: '## Cross-Cutting Concern


    Let us consider how security impacts various domains in an API Marketplace implementation.


    *   **API**: The nature of the product determines the API access mechanism. If
    it requires end-user consent, it will be done in a Business-to-Consumer (B2C)
    context. If the aim is to allow system integration, it will be achieved in a Business-to-Business
    (B2B) context.


    *   **Network** : As the call traverses the various elements in your platform
    stack, how can it be monitored, tracked, and interrogated? Will it maintain customer
    identity as it reaches the backend, or will it assume a system one? Should your
    platform be firewalled from the rest of the enterprise which would add significant
    administrative overhead but provide the benefit of fine-grained access control?


    *   **Application**: Even with the best security implementation, vulnerabilities
    in the application code may be exploited. There are hair-raising accounts of unauthorized
    access to customer data and systems which have been compromised through ways the
    technical team never thought possible.


    *   **Container** : This deployment strategy is extremely popular due to its modularized
    approach. It is important to determine if the base image could be compromised.
    The strategy for the configuration and management of credentials must be well
    defined at an enterprise level to prevent ad hoc and loose implementations. The
    context in which the application executes may appear trivial – however, root user
    or write access to a file system may unwittingly yield to security backdoors.
    The same rigor that applies to traditional deployment must be applied to containers.


    *   **Infrastructure** : Does your solution run on on-premises hardware or do
    you deploy to Infrastructure-as-a-Service (IasS) or Platform-as-a-Service (PaaS)
    public cloud solutions? If the latter, then new security policies and governance
    must be defined to maintain solution and platform integrity.


    *   **Process**: Consider the seemingly simple objective of providing a third
    party with credentials to access an API. Will this be achieved by sharing the
    details via email or possibly a password-protected document? This may result in
    a comedic chicken or the egg scenario as we need to determine how to share the
    password for the document containing the credentials. If the credentials are generated
    through human intervention, it is already compromised. Any decent security policy
    also demands that credentials are regularly changed – how will this be achieved
    – especially if dealing with a large number of third-party providers.


    *   **Operations**: Does your support personnel have credentials for access to
    backend systems? If the immediate answer is a resounding *No*, will this be an
    impediment to resolving support queries? Developers may unwittingly leak sensitive
    customer data, such as account numbers, through seemingly harmless log statements
    which ripple through to operational support tools.


    The intention of this section is not to scare you into shelving your plans for
    an API Marketplace implementation until you can fully guarantee every aspect of
    security. The aim is to highlight the various dimensions across which security
    must be considered. Again, this will be tailored to the technical landscape and
    requirements of your enterprise, and each platform will undoubtedly be unique
    in their implementation.


    An approach that has worked exceedingly well for ours is to actively seek out
    regular and rigorous review by teams from other domains – Information and Network
    Security, Architecture, and Shared Enterprise Services. In all honesty, the feedback
    was not always positive, and we had to refactor our solutions to mitigate. I can
    assure you that the integrity of the result has certainly been worth the effort.


    In the following sections, we will deep dive into the tip of the iceberg – API
    security. This is just one of the many perspectives through which we need to consider
    a Marketplace implementation. Understanding that security impacts almost every
    aspect of your platform will help the technical team establish foundational elements
    and core practices in the right way to prevent rework later.


    ## API Security


    The access mechanism for your API product is intrinsically linked to the type
    of consumer and the nature of the solution. It can be considered in much the same
    way as access to your home. Depending on where you live, there may be a security
    guard at the entrance of your gated community to allow only residents in, your
    front door might have a heavy-duty lock which only you and your family have a
    key to, while locks on internal doors are probably never used. In the following
    sections, we will review security approaches in the context in which they may
    be best applied and the associated audience.


    ### Open APIs


    These interfaces typically provide reference or publicly accessible data. Examples
    include locations of service stations, country codes, or weather information for
    a specified location. Although the API may not require a security mechanism at
    all, it is best to use, at a minimum, a **Client ID** and **Secret** as illustrated
    in Figure [6-1](#509947_1_En_6_Chapter.xhtml#Fig1). This has the benefit of understanding
    who is consuming your API – by way of a required registration to receive credentials.
    The *client identifier* can also be used to provide different service levels and,
    importantly, to restrict access to a rogue consumer without impacting others.


    ![../images/509947_1_En_6_Chapter/509947_1_En_6_Fig1_HTML.jpg](images/509947_1_En_6_Chapter/509947_1_En_6_Fig1_HTML.jpg)


    Figure 6-1


    Open API security pattern


    There may be a wide audience for this type of product. From developers learning
    how to consume APIs to established service providers looking for reliable source
    of reference data.


    ### Business to Business (B2B)


    The aim of these APIs is to allow system-to-system integration. Examples include
    interfaces to determine stock availability, placing an order to purchase a product,
    or sharing enterprise data with affiliates or partners. Traditional mechanisms
    to achieve this type of integration required custom, purpose-built interfaces
    and dedicated network infrastructure, in the form of leased lines, between consumer
    and provider. As a result, there was significant cost and time impact for the
    upfront provisioning. Although this can be achieved by configuring a Virtual Private
    Network (VPN) between the parties which uses public network infrastructure, it
    can also be achieved through the use of a security **certificate** to simplify
    the integration pattern as illustrated in Figure [6-2](#509947_1_En_6_Chapter.xhtml#Fig2).


    ![../images/509947_1_En_6_Chapter/509947_1_En_6_Fig2_HTML.jpg](images/509947_1_En_6_Chapter/509947_1_En_6_Fig2_HTML.jpg)


    Figure 6-2


    B2B security pattern


    The certificate and associated passphrase provides an additional layer of security
    as it is directly linked to a specific consumer and is an essential element in
    the handshake to set up the Transport Layer Security (TLS) connection. The certificate
    may be issued by the API host organization or may be provided by the consumer
    to be registered with the host. Due to the sensitive nature of the API, the audience
    for these types of solutions is typically well-known partners or established third-party
    providers.'
  trans: '

    ## 跨领域关注点


    让我们来看看，在 API Marketplace 的实施中，安全性会如何影响各个领域。


    *   **API**：产品的性质决定了 API 的访问机制。如果需要终端用户同意，则会在企业对消费者（B2C）场景中实现；如果目标是实现系统集成，则会在企业对企业（B2B）场景中实现。


    *   **网络**：当调用穿过你平台技术栈中的各个元素时，如何对其进行监控、跟踪和审查？当它到达后端时，会保持客户身份，还是采用系统身份？你的平台是否应该与企业其他部分进行防火墙隔离——这会增加大量管理开销，但也能带来细粒度访问控制的优势？


    *   **应用**：即使有最好的安全实现，应用代码中的漏洞仍可能被利用。现实中不乏触目惊心的案例：未经授权访问客户数据，系统通过技术团队从未想到的方式被攻破。


    *   **容器**：这种部署策略因其模块化方法而极为流行。需要确认基础镜像是否可能已被入侵。凭据的配置与管理策略必须在企业层面明确定义，以防止临时且松散的实现。应用运行的上下文看似微不足道——然而，root
    用户权限或文件系统写权限可能在不经意间成为安全后门。适用于传统部署的同等严谨性，也必须应用到容器中。


    *   **基础设施**：你的解决方案是在本地硬件上运行，还是部署到基础设施即服务（IaaS）或平台即服务（PaaS）公有云方案上？如果是后者，则必须定义新的安全策略和治理机制，以维护解决方案与平台的完整性。


    *   **流程**：设想一个看似简单的目标：向第三方提供访问 API 的凭据。是通过电子邮件共享，还是通过受密码保护的文档？这可能会引出一个颇具喜剧色彩的“先有鸡还是先有蛋”问题——我们还得考虑如何共享那个包含凭据文档的密码。如果凭据是通过人工介入生成的，它其实已经被削弱了。任何像样的安全策略还要求定期更换凭据——这该如何实现——尤其是在需要面对大量第三方提供商时。


    *   **运维**：你的支持人员是否拥有访问后端系统的凭据？如果第一反应是响亮的*不*，这会不会妨碍支持问题的解决？开发人员也可能在无意中通过看似无害的日志语句泄露敏感客户数据（例如账号），并一路扩散到运维支持工具中。


    本节的目的并不是要吓得你在能够完全保证安全性的每一个方面之前，就搁置 API Marketplace 的实施计划。目标是强调安全性必须被考虑的多个维度。同样，这将根据你企业的技术环境和需求进行定制，而每个平台在实现上无疑都会具有独特性。


    一种对我们极其有效的方法是：积极寻求来自其他领域团队的定期且严格的评审——信息与网络安全、架构以及企业共享服务。坦率地说，反馈并不总是正面的，我们也不得不重构解决方案来缓解问题。但我可以肯定地说，最终结果的完整性绝对值得这份投入。


    在接下来的章节中，我们将深入探讨冰山一角——API 安全。这只是我们审视 Marketplace 实施时众多视角之一。认识到安全几乎影响你平台的每一个方面，将帮助技术团队以正确方式建立基础要素与核心实践，从而避免后期返工。


    ## API 安全


    你的 API 产品采用何种访问机制，本质上与消费者类型和解决方案性质紧密相关。可以把它类比为你家里的门禁。根据你居住的环境，封闭社区入口处可能有保安只允许住户进入；你家前门可能有坚固的门锁，只有你和家人有钥匙；而室内门锁可能几乎从不使用。在接下来的章节中，我们将结合适用场景及对应受众，评估可采用的安全方法。


    ### 开放 API


    这类接口通常提供参考性或公开可访问的数据。示例包括服务站点位置、国家代码，或指定地点的天气信息。尽管 API 可能根本不需要安全机制，但至少最好使用**客户端
    ID**和**密钥**，如图 6-1 所示。这样做的好处是可以了解谁在消费你的 API——因为需要先注册才能获取凭据。*客户端标识符*还可用于提供不同服务级别，并且更重要的是，在不影响其他消费者的情况下限制异常消费者的访问。


    ![../images/509947_1_En_6_Chapter/509947_1_En_6_Fig1_HTML.jpg](img/509947_1_En_6_Fig1_HTML.jpg)


    图 6-1


    开放 API 安全模式


    这类产品的受众可能非常广泛：从学习如何调用 API 的开发者，到寻求可靠参考数据源的成熟服务提供商。


    ### 企业对企业（B2B）


    这类 API 的目标是实现系统到系统的集成。示例包括查询库存可用性、下单购买产品，或与关联方及合作伙伴共享企业数据。传统上，要实现这类集成，需要定制化、专门构建的接口，以及消费者与提供方之间专用的网络基础设施（如专线）。因此，前期开通会带来显著的成本和时间影响。虽然可以通过在双方之间配置使用公共网络基础设施的虚拟专用网络（VPN）来实现，但也可以通过使用安全**证书**来简化集成模式，如图
    6-2 所示。


    ![../images/509947_1_En_6_Chapter/509947_1_En_6_Fig2_HTML.jpg](img/509947_1_En_6_Fig2_HTML.jpg)


    图 6-2


    B2B 安全模式


    证书及其关联口令短语提供了额外一层安全保障，因为它与特定消费者直接绑定，并且是建立传输层安全（TLS）连接握手过程中的关键要素。证书可以由 API 托管方组织签发，也可以由消费者提供并在托管方注册。鉴于这类
    API 的敏感性，这类解决方案的受众通常是知名合作伙伴或成熟的第三方服务提供商。

    '
- fmt: "## Business to Consumer (B2C)\n\nIn this type of scenario, the consumer requests\
    \ permission to transact on behalf of an end user or to access their data. The\
    \ end user provides direct instruction to the provider to allow or deny that request.\
    \ This interaction is illustrated in Figure [6-3](#509947_1_En_6_Chapter.xhtml#Fig3).\
    \ A popular example is accessing a partner site using your social media (Google\
    \ or Facebook) credentials to establish your identity. Fortunately, there is a\
    \ widely accepted industry standard, in the form of OAuth 2.0, which provides\
    \ specific details on the choreography between end user, consumer, and provider.\n\
    \n![../images/509947_1_En_6_Chapter/509947_1_En_6_Fig3_HTML.jpg](images/509947_1_En_6_Chapter/509947_1_En_6_Fig3_HTML.jpg)\n\
    \nFigure 6-3  \nB2C security pattern\n\nThe magic ingredient of end-user consent\
    \ makes it possible to offer these APIs to a wider range of third-party providers.\
    \ Even with stringent security standards, an unscrupulous third-party provider,\
    \ once admitted into your ecosystem, has opportunities to elicit additional customer\
    \ data (one approach discussed later). It is extremely important that third parties\
    \ are screened and vetted to meet the due diligence criteria set out by your implementation.\n\
    \nIn the following section, we will dive into the detail of the OAuth process\
    \ and discuss some of the supporting background processes and variations to allow\
    \ you better insight into its operation.\n\n## OAuth\n\nSimply, OAuth is an open-standard\
    \ framework that provides applications the ability to secure delegated access.\n\
    \nTo understand how it works, consider the following scenario:\n\n![../images/509947_1_En_6_Chapter/509947_1_En_6_Fig4_HTML.jpg](images/509947_1_En_6_Chapter/509947_1_En_6_Fig4_HTML.jpg)\n\
    \nFigure 6-4  \nLucidchart Login\n\n- My favorite online diagram service, Lucidchart,\
    \ requires me to create an account – as shown in Figure [6-4](#509947_1_En_6_Chapter.xhtml#Fig4).\n\
    - To create an account, I could have stepped through the traditional registration\
    \ process by completing an online form providing my name, email address, and setting\
    \ a password. Lucidchart would then send an email with a link to confirm I am\
    \ the rightful owner of that email address.\n- Lucidchart also allows me to login\
    \ using my Google account if I allow it permission to verify my profile with Google.\n\
    \nOAuth is the standard that facilitates this process to allow end users to confirm\
    \ identity and provide third-party applications restricted access to their data.\n\
    \n### Actors and Scopes\n\nLet us identify the actors or participants in this\
    \ scenario, in order of appearance:\n\n1. I am the Resource Owner as I am the\
    \ holder of the Google Account.\n2. Lucidchart is the Client as it is the application\
    \ that requires access to my profile.\n3. Google is the Resource Server as it\
    \ stores my profile on its servers.\n\nThere are a few key concepts I would like\
    \ to touch on. Although Google holds my profile data on its infrastructure, I\
    \ am the owner of the data. The traditional practice that customer data belongs\
    \ to the host organization has been reversed, and control has been returned to\
    \ its rightful owner – the end user.\n\nThe scope indicates the extent of data\
    \ that I would like to share with third parties. In the context of the above scenario,\
    \ Lucid only requires my name, email address, language preference, and profile\
    \ picture from Google as shown in Figure [6-5](#509947_1_En_6_Chapter.xhtml#Fig5).\n\
    \n![../images/509947_1_En_6_Chapter/509947_1_En_6_Fig5_HTML.jpg](images/509947_1_En_6_Chapter/509947_1_En_6_Fig5_HTML.jpg)\n\
    \nFigure 6-5  \nLimited access\n\nAlthough my profile picture is not the greatest,\
    \ I’m comfortable sharing this information. Had Lucidchart requested full access\
    \ to my Google Account – I would have been more than a little reluctant as I would\
    \ be providing access to my personal email, calendar, and contacts. As you will\
    \ note, Lucidchart only requested access to information it specifically needed,\
    \ nothing more. Within an OAuth context, this is the limited scope or permission\
    \ that I, as the Resource Owner, am happy to approve.\n\nBefore you move on, be\
    \ sure to solidify the concepts of actors, roles they perform, and scopes. Consider\
    \ other scenarios, such as OAuth in a banking (or relevant to your industry) context\
    \ to identify the actors, roles, and scopes."
  raw: '### Business to Consumer (B2C)


    In this type of scenario, the consumer requests permission to transact on behalf
    of an end user or to access their data. The end user provides direct instruction
    to the provider to allow or deny that request. This interaction is illustrated
    in Figure [6-3](#509947_1_En_6_Chapter.xhtml#Fig3). A popular example is accessing
    a partner site using your social media (Google or Facebook) credentials to establish
    your identity. Fortunately, there is a widely accepted industry standard, in the
    form of OAuth 2.0, which provides specific details on the choreography between
    end user, consumer, and provider.


    ![../images/509947_1_En_6_Chapter/509947_1_En_6_Fig3_HTML.jpg](images/509947_1_En_6_Chapter/509947_1_En_6_Fig3_HTML.jpg)


    Figure 6-3


    B2C security pattern


    The magic ingredient of end-user consent makes it possible to offer these APIs
    to a wider range of third-party providers. Even with stringent security standards,
    an unscrupulous third-party provider, once admitted into your ecosystem, has opportunities
    to elicit additional customer data (one approach discussed later). It is extremely
    important that third parties are screened and vetted to meet the due diligence
    criteria set out by your implementation.


    In the following section, we will dive into the detail of the OAuth process and
    discuss some of the supporting background processes and variations to allow you
    better insight into its operation.


    ## OAuth


    Simply, OAuth is an open-standard framework that provides applications the ability
    to *secure delegated access*.


    To understand how it works, consider the following scenario:


    ![../images/509947_1_En_6_Chapter/509947_1_En_6_Fig4_HTML.jpg](images/509947_1_En_6_Chapter/509947_1_En_6_Fig4_HTML.jpg)


    Figure 6-4


    Lucidchart Login


    *   My favorite online diagram service, Lucidchart, requires me to create an account
    – as shown in Figure [6-4](#509947_1_En_6_Chapter.xhtml#Fig4).


    *   To create an account, I could have stepped through the traditional registration
    process by completing an online form providing my name, email address, and setting
    a password. Lucidchart would then send an email with a link to confirm I am the
    rightful owner of that email address.


    *   Lucidchart also allows me to login using my Google account *if* I allow it
    permission to verify my profile with Google.


    OAuth is the standard that facilitates this process to allow end users to confirm
    identity and provide third-party applications restricted access to their data.


    ### Actors and Scopes


    Let us identify the actors or participants in this scenario, in order of appearance:


    1.  I am the *Resource Owner* as I am the holder of the Google Account.


    2.  Lucidchart is the *Client* as it is the application that requires access to
    my profile.


    3.  Google is the *Resource Server* as it stores my profile on its servers.


    There are a few key concepts I would like to touch on. Although Google holds my
    profile data on its infrastructure, *I* am the owner of the data. The traditional
    practice that customer data belongs to the host organization has been reversed,
    and control has been returned to its rightful owner – the end user.


    The *scope* indicates the extent of data that I would like to share with third
    parties. In the context of the above scenario, Lucid only requires my name, email
    address, language preference, and profile picture from Google as shown in Figure
    [6-5](#509947_1_En_6_Chapter.xhtml#Fig5).


    ![../images/509947_1_En_6_Chapter/509947_1_En_6_Fig5_HTML.jpg](images/509947_1_En_6_Chapter/509947_1_En_6_Fig5_HTML.jpg)


    Figure 6-5


    Limited access


    Although my profile picture is not the greatest, I’m comfortable sharing this
    information. Had Lucidchart requested full access to my Google Account – I would
    have been more than a little reluctant as I would be providing access to my personal
    email, calendar, and contacts. As you will note, Lucidchart only requested access
    to information it specifically needed, nothing more. Within an OAuth context,
    this is the limited scope or permission that I, as the *Resource Owner*, am happy
    to approve.


    Before you move on, be sure to solidify the concepts of *actors*, roles they perform,
    and *scopes*. Consider other scenarios, such as OAuth in a banking (or relevant
    to your industry) context to identify the actors, roles, and scopes.'
  trans: '

    ### 企业对消费者（B2C）


    在这种场景中，消费者会请求权限，以代表终端用户进行交易或访问其数据。终端用户会直接指示提供方允许或拒绝该请求。该交互如图 6-3 所示。一个常见示例是使用你的社交媒体（Google
    或 Facebook）凭据访问合作伙伴网站以建立你的身份。幸运的是，业界已有一个被广泛接受的标准——OAuth 2.0，它详细规定了终端用户、消费者和提供方之间的交互编排。


    ![../images/509947_1_En_6_Chapter/509947_1_En_6_Fig3_HTML.jpg](img/509947_1_En_6_Fig3_HTML.jpg)


    图 6-3


    B2C 安全模式


    终端用户同意这一关键要素，使得向更广泛的第三方提供方开放这些 API 成为可能。即使有严格的安全标准，一个不良第三方提供方一旦被纳入你的生态系统，仍有机会诱导获取更多客户数据（其中一种方法将在后文讨论）。因此，极其重要的是对第三方进行审查和尽职调查，以满足你的实施所设定的尽调标准。


    在下一节中，我们将深入 OAuth 流程的细节，并讨论一些支持性的后台流程与变体，帮助你更好地理解其运作方式。


    ## OAuth


    简单来说，OAuth 是一个开放标准框架，为应用程序提供*安全的委托访问*能力。


    为了理解其工作方式，请考虑以下场景：


    ![../images/509947_1_En_6_Chapter/509947_1_En_6_Fig4_HTML.jpg](img/509947_1_En_6_Fig4_HTML.jpg)


    图 6-4


    Lucidchart 登录


    *   我最喜欢的在线制图服务 Lucidchart 需要我创建一个账户——如图 6-4 所示。


    *   要创建账户，我本可以按传统注册流程填写在线表单，提供我的姓名、电子邮件地址并设置密码。随后 Lucidchart 会发送一封带有链接的邮件，以确认我是该邮箱地址的合法所有者。


    *   Lucidchart 还允许我使用 Google 账户登录，*前提是*我授予它权限，让它通过 Google 验证我的个人资料。


    OAuth 正是促成这一过程的标准，它使终端用户能够确认身份，并向第三方应用授予受限的数据访问权限。


    ### 参与方与作用域


    让我们按出场顺序识别该场景中的参与方或角色：


    1.  我是*资源所有者（Resource Owner）*，因为我是 Google 账户的持有者。


    2.  Lucidchart 是*客户端（Client）*，因为它是需要访问我个人资料的应用程序。


    3.  Google 是*资源服务器（Resource Server）*，因为它在其服务器上存储了我的个人资料。


    这里有几个我想强调的关键概念。尽管 Google 在其基础设施上持有我的个人资料数据，*我*才是这些数据的所有者。过去“客户数据归托管组织所有”的传统做法已经被逆转，控制权已回归其真正所有者——终端用户。


    *作用域（scope）*表示我愿意与第三方共享的数据范围。在上述场景中，Lucid 仅需要从 Google 获取我的姓名、电子邮件地址、语言偏好和头像，如图
    6-5 所示。


    ![../images/509947_1_En_6_Chapter/509947_1_En_6_Fig5_HTML.jpg](img/509947_1_En_6_Fig5_HTML.jpg)


    图 6-5


    受限访问


    虽然我的头像不算最好看，但我愿意分享这些信息。若 Lucidchart 请求对我的 Google 账户进行完全访问——我就会非常犹豫，因为那将意味着我会开放对个人邮箱、日历和联系人的访问。正如你会注意到的，Lucidchart
    只请求了它明确需要的信息，没有更多。在 OAuth 语境下，这就是受限作用域或权限；作为*资源所有者（Resource Owner）*，我愿意批准这一点。


    在继续之前，请务必巩固对*参与方（actors）*、其所扮演角色以及*作用域（scopes）*这些概念的理解。你可以考虑其他场景，例如银行业中的 OAuth（或与你所在行业相关的场景），以识别其中的参与方、角色和作用域。

