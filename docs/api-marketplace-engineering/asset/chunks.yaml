- fmt: '## Team Roles and Collaboration


    The `Delivery Lead` is tasked with ensuring the goals and objectives of the product
    roadmap are met. Areas of responsibility include scheduling incoming requirements
    from the Product Owner based on available development capacity. This person also
    works closely with backend platform teams to determine the availability of interfaces
    for consumption. This is sometimes a precarious balancing act as any delays from
    backend teams could result in lost development time. When working with an offshore
    delivery team, the Delivery Lead has the unenviable task of also liaising between
    remote and local personnel. With the insight into backend availability and delivery
    capacity, it may also be necessary to shift the release date and update of API
    products. The aim is to keep the platform constantly moving. In the development
    process, the rigor of bi-weekly production drops helps immensely. These can be
    intentionally timed to coincide with the end of a delivery sprint. The drops not
    only maximize the potential of the development team – but the team is aware their
    efforts are constantly moving to production and any resulting issues or updates
    can be done quickly.


    The `Engineering Lead (EL)` works across the various technology areas of the platform.
    Being intimately aware of each layer in the stack is an advantage as it is often
    necessary to dive in and get involved in the detail to unblock an issue. An API
    Marketplace also provided us with the unique opportunity to test new approaches
    and technology within the Enterprise. The EL is tasked to have a detailed understanding
    of the technical landscape and is often called upon to share this view with supporting
    teams within the organization. A further responsibility, personally a privilege,
    is to define solutions which meet new requirements with input from other members
    of the team and input from backend platform teams. From a governance perspective,
    the EL also works with enterprise, domain, and solution architects for the approval
    of platform and solution designs. The EL must have a full view of the end-to-end
    solution, be able to decompose it into work items which can be delivered by the
    team. What works well is an EL who can, and often does, get into the detail –
    from writing code to create a quick proof-of-concept to consuming a new backend
    platform interface to mediating between developers during integration testing.
    The EL is also responsible for scoping the effort and timelines of delivery, with
    assistance and input from the Engineering team. Experience plays a big part as
    this will help to support the definition of the API product roadmap.


    Finally, the `Operations Lead (OL)` is essentially the pivot point of the team.
    Although the primary focus is on the reliability and stability of the Marketplace
    execution platform, this role carries accountability for the availability of supporting
    organizational services and backend platforms. The Marketplace support team reports
    into the Operations Lead. Reporting and analytics dashboards, discussed later,
    are a mainstay for this role. For day-to-day operation of the Platform, resolution
    of outages, integration, and coordination with external teams is a key requirement.
    The ability to understand the complexity and dive into the detail is also mandatory
    as it allows the individual to know who to pull in when. From a revenue generating
    perspective, this is possibly the most important role since downtime translates
    to lost opportunities.


    Finally, it is important to highlight the following: the roles are interconnected.
    The Product Owner is supported by the Engineering Lead to determine if a potential
    API product is viable. Similarly, the Engineering Lead relies on the Product Owner
    to communicate delivery delays to the Program Executive. Hierarchy is also kept
    to an absolute minimum, and all team members are free to engage with anyone in
    the above roles to fulfill an objective. Again, what binds the team together is
    mutual trust and respect and most importantly, we all share the same Vision. Everything
    we do is a firm step forward in the journey to achieve that objective.


    ## A Guide to This Book


    In Chapter `[2](#509947_1_En_2_Chapter.xhtml)`, we consider regulations introduced
    which have forced organizations to build API Marketplaces. In Chapter `[3](#509947_1_En_3_Chapter.xhtml)`,
    we delve into consumption and discuss how to support third-party developers. Chapter
    `[4](#509947_1_En_4_Chapter.xhtml)` reviews mechanisms to generate revenue from
    an API Marketplace. In Chapter `[5](#509947_1_En_5_Chapter.xhtml)`, we review
    in detail the technology elements and practices used in our Platform. The focus
    of Chapter `[6](#509947_1_En_6_Chapter.xhtml)` is Security, which underpins the
    Marketplace.


    Chapter `[7](#509947_1_En_7_Chapter.xhtml)` is dedicated to how APIs should be
    designed with Chapter `[8](#509947_1_En_8_Chapter.xhtml)` providing a view into
    our development and API delivery process. In Chapter `[9](#509947_1_En_9_Chapter.xhtml)`,
    we discuss the Sandbox environment and ways it can be set up to support external
    developers. Chapter `[10](#509947_1_En_10_Chapter.xhtml)` provides insight into
    the operational dimension of an API Marketplace. Chapter `[11](#509947_1_En_11_Chapter.xhtml)`
    provides a brief summary and possible first, or next steps for your implementation.
    You may skip ahead to the chapters which interest you.


    If you have any thoughts, suggestions, or general feedback, please do not hesitate
    to let me know. I view an API Marketplace in much the same way as a living, breathing
    organism. Some aspects are similar, like walking or speaking. Some incredibly
    different – like language and dialect. The goal of this book is to share my experience
    building an API Marketplace to help others craft their own.


    # 2. Regulation


    The Financial Services `(FS)` industry has always been a trailblazer with regard
    to technology adoption. This is evident from the launch of Automatic Teller Machines
    `(ATMs)`, to telephone banking to web-and-mobile application-based banking. Given
    the sensitive nature of customer data and associated transactions, the gateway
    to FS providers has been well guarded – and understandably so. In this chapter,
    we examine the factors which led to customer data and financial backend services
    being shared with third parties, which has revolutionized the industry. Like tectonic
    plates colliding in the middle of the ocean, the tsunami effect has been triggered,
    and the wave of change has reached many geographies across the globe.


    It stands to reason that if API Marketplaces are required and can be established
    in such a stringent sector like Financial Services, then other sectors, such as
    Telecommunications and Healthcare, can and will follow suit. In this chapter,
    we deep dive on the impact of APIs on the Financial Services sector. We start
    at the epicenter of this seismic event – Payments – and then move on to Open Banking
    and finally examine the effects of further shockwaves on the industry in the form
    of Open Finance.'
