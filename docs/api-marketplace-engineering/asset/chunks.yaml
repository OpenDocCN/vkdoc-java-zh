    \nFigure 6-9\n\nAuthorization Code process flow\n\n1.  The request is initiated\
    \ by the *Resource Owner*. As detailed in our earlier scenario, *I (Resource Owner)*\
    \ requested to access Lucidchart *(Client)*, using my Google *(Resource Server)*\
    \ profile.\n\n2.  The *Client* constructs an Authorization URL providing\n   \
