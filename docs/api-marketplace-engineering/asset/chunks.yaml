  trans: '

    ## API 宣言


    API 并不是什么新鲜事物。这个概念多年来一直存在，并已在企业内部用于实现应用程序之间的集成。2002 年，杰夫·贝索斯发布了一项 API 强制令，有时被称为“API
    宣言”，内容如下：


    今后，所有团队都必须通过服务接口公开其数据和功能。


    *   团队之间必须通过这些接口进行通信。


    *   不允许使用任何其他形式的进程间通信：不得直接链接，不得直接读取其他团队的数据存储，不得使用共享内存模型，也绝不允许后门。唯一允许的通信方式是通过网络上的服务接口调用。


    *   你使用什么技术并不重要。


    *   所有服务接口，无一例外，都必须从一开始就按可对外化的方式进行设计。也就是说，团队必须进行规划和设计，以便能够将接口开放给外部世界的开发者。没有例外。


    *   该强制令最后写道：凡是不这样做的人将被解雇。谢谢，祝你今天愉快！


    任何拥有体面集成战略的组织读到这些内容时，可能都不会太过担心。毕竟，中间件本就是为了实现上述所有目标——抽象、清晰接口。然而，宣言中的“*外部世界的开发者*”这几个字才是改变游戏规则的关键。


    将你的组织向外部消费者开放，很可能会在各个层面引发不小的紧张情绪。架构师可能并不愿意与外部开发者共享他们神圣的通用数据模型。开发团队也许会强作镇定，但很可能在想着那些被他们以“技术债”名义藏在柜子里的“骷髅”。也请体谅一下运维团队，他们当时可能还在四处张望，怀疑这是不是整蛊节目。别忘了，那是在
    2002 年，扩容额外云容量这件事大概还只是白板上的几张简略草图。挑战已经抛出，团队必须遵从。


    亚马逊 API 宣言 i) 是企业范围内 API 思维范式转变的一个例子；ii) 也是这种转变能够带来显著成果的证据——看看今天亚马逊云服务（Amazon
    Web Services）的成功便可知。


    ## 快艇与航空母舰


    尽管合作与协同的意愿可能很强，传统组织在实现这一点时却可能犹豫不决。这种犹豫可能源于冗长的项目周期，或与变更和发布管理相关的治理流程。通常也可能是因为组织内部深层功能不易向第三方开放。从长期来看，这可以通过跨企业的敏捷工作方式得到改善。然而，短期内也可以通过在组织边缘建立一种能力来取得成果。


    我将这种能力称为“API 市场（API Marketplace）”，它是成熟企业与第三方提供商之间的交汇点。它能够以敏捷方式借助企业的强大能力来满足高强度需求。Martin
    Fowler 将其称为“双杠杆（two-lever）”方法。这种能力以人员、流程和技术原则为基础支撑。我们将在本书后文更详细地讨论这一点。


    第一个杠杆代表传统企业，像航空母舰一样，运行平稳且坚定。第二个杠杆则像快艇一样，灵活敏捷，并且由于不承担同等的组织责任，能够更快改变方向。我们的 Marketplace
    计划曾多次转向。尽管障碍会干扰交付，但我们的灵活性使我们能够迅速调整方向并持续前进。在最小可行产品（MVP）阶段，我们原计划集成的一个后端平台因组织层面对
    API 访问的担忧而被突然取消，因为这可能会影响现有访问渠道的收入流。在通常情况下，这足以对该计划造成致命打击。凭借良好的领导力和决心，我们找到了一个类似但知名度较低的后端，并以更少的挑战完成了集成。这也要求我们围绕这个新后端塑造一个新的
    API 产品。


    最关键的经验是：从一个较低关注度的 API 产品起步，来建立平台基础，可能是明智的——同时避免引发组织层面的担忧（例如蚕食现有收入流）。较低关注度也可能意味着较低的调用量。这正好提供了一个绝佳机会，用于定义并完善围绕
    Marketplace 的运营流程与支持体系。在这个快速变化的领域中，尽快发布并被消费一个 API 产品非常重要。


    ## 集成模式


    集成一直都可以在不同层级上实现。组织之间通过定义良好的接口进行连接，这些接口可能是为实现特定功能而构建的。此类通信通常也会通过专用网络通道（如专线）进行高度安全防护。这通常被称为
    *企业对企业*（B2B）集成。由于这类集成具有高度敏感性，这些接口通常只对少量合作伙伴开放。


    然而，*企业对消费者*（B2C）集成模式允许组织将客户数据开放给众多*第三方*提供商，但*仅*在获得客户许可的前提下。这一模式彻底改变了集成格局，因为作为数据真正所有者的终端客户可以决定谁有权访问数据。使这一点成为可能的安全模型称为
    *OAuth*，我们将在本书后文更详细地讨论。这也促成了接口标准化，因为若为每个提供商分别维护独立服务契约，将是不可持续的。

    '
- fmt: '## Enterprise-wide Impact


    In traditional Enterprise Application Integration (`EAI`), both consumer and provider
    have been well within the safe boundaries of the organization. Although internal
    security mechanisms are well-advised, the safety net of the “internal network”
    helped allay fears that the integration was only accessible to known consumers.
    By building an API Marketplace, integrations are built primarily for external
    consumption.


    This is a significant game changer and although application teams may be satisfied
    by fronting the interfaces with an API Gateway, this has an enterprise-wide impact
    and will require participation from various teams – ranging from Information Security
    to Networks to Forensics, to name a few. Information Security signs off that customer
    or organization data is only released based on specific security authorization
    frameworks such as `OAuth`. It is important to highlight that the Information
    Security team is a key stakeholder of the API Marketplace and engagement should
    be ongoing. Information Security should approve every API product to ensure that
    the right level of information is provided to the right parties with the right
    level of security. From a technical or development perspective, it may appear
    to be relatively easy to expose or update an API product to provide additional
    data. However, Information Security has a greater view regarding the sensitivity
    of data and, as essentially the guardians of enterprise and customer information,
    must always be consulted.


    The Network team will also have to determine how requests, now originating from
    the Internet, traverse the organization’s boundary and are routed to internal
    services. At this junction, it may be necessary to pause and reflect on the gravity
    of establishing an API Marketplace from the perspective of a Network Administrator.


    Suppose you were the Head of the Secret Service, responsible for the safety of
    the US President. If the President stayed within the grounds of the White House,
    your job is simple – the parameters of the White House are well-defined: entrances,
    exits, staff, visitors, etc. However, the instant that the President leaves the
    White House, your job gets inherently more complex as there are significant variables
    to contend with.


    The same is true for the Network Security team. Since the establishment of the
    organization, the parameters of the network had been well defined. The firewall
    kept all unwanted users and traffic out and the internal network safe. External
    users originated from well-defined IP sources, possibly using leased lines. Now,
    here comes along an API Marketplace initiative that provides external developers
    access to company resources via the `Internet`! It is therefore important to keep
    Network Security engaged, preferably from the start, to ensure the necessary mindset
    changes are made, fears allayed, and possible technical changes can be planned
    for and made timeously to avoid delays.


    It is also important to engage the Forensics team as they will use the audit data
    from each transaction to piece together the customer request, via a third party,
    to the enterprise. This is critical in the event of customer queries or disputes
    and could save the organization significant amounts of money. Trace information,
    analyzed in real-time, can also be used to determine and stop fraudulent requests.
    Forensics teams can also leverage their experience to provide insight into how
    attacks could originate.


    There are other teams in the organization which should be consulted and informed,
    such as product management. The key takeaway is – although the API Marketplace
    may operate on the edge of an organization, it is supported by internal capabilities
    within the enterprise. Stakeholder management is crucial and is one of the enabling
    capabilities of our Platform. Education is key – take nothing for granted. At
    the start of all our engagements, a YouTube video was created and replayed providing
    a definition of an API, how it could be used, and the benefits. By doing this,
    our audience had knowledge and context and were more comfortable to engage.


    ## The Gravity of a New Digital Channel


    As a developer, I’m certain that there will be groans of disapproval from the
    development teams at this point. Information Security, Networks, and Forensics
    all sound like red tape – which a technical team views in the same light as Superman
    regards kryptonite. Fair enough – Krypton is his birthplace, but it now saps his
    power. The same can be said for red tape – necessary but draining.


    From our experience, the heady efforts to establish an API Marketplace quickly
    snowballed into primarily a technical initiative. Our single objective was to
    expose an API which provided enterprise data with customer authentication and
    authorization. This was also fueled by the initial project mandate which was to
    demonstrate an `MVP` to the leadership team of the organization.


    Within the oxygen-infused bubble of the newly established digital innovation lab,
    the technical delivery team worked against the clock to achieve the mission. It
    was not plain sailing – at times we bumped against the walls of the bubble as
    we encountered organizational platforms and systems that had to be used. An example
    is the enterprise API Gateway, which up until that point, was only used for internal
    consumption. However, we flashed our “`MVP`” and “Proof of Concept (`PoC`)” badges
    at every checkpoint and with some fast-talking and promises to adhere to enterprise
    standards on future iterations, albeit with fingers crossed behind our back, the
    team was able to navigate around those challenges.


    As almost all Technical Delivery teams do in a bubble – we delivered.


    Thrilled with achieving a seemingly insurmountable task in record time, which
    could probably be attributed to the high levels of oxygen ingested, our next question
    was when this could be launched to external developers. The expected timeline
    from the delivery team was weeks or possibly a month or two. The actual timeline
    was closer to nine to twelve months. Timelines as lengthy as these are likely
    to kill any developer spirit. Our move out of the digital innovation lab to make
    way for the new `MVP` kid on the block helped neutralize the oxygen content in
    the air, and we soon realized that technical delivery was just one dimension to
    be considered when operationalizing an API Marketplace. We were building a new
    Channel into the organization!


    Enabling access is an evolutionary transformation. As an example, consider the
    evolution of access into a banking institution over the years. They began with
    well-secured physical buildings which were only accessible during specific office
    hours. By providing Automatic Teller Machines (`ATMs`), you could access cash
    around the clock – however in establishing the capability, the machine needed
    to be highly secured and well managed. The mechanism to get cash into the ATM
    also needed to be considered, not only from the security perspective, but also
    logistically given the geographical distribution of the machines. Fairly easy
    as a concept in a “lab” environment – completely different in a real-world context.


    Another step in their evolutionary journey was providing access via web and mobile
    application channels. There are countless challenges – I’ll highlight just one
    which probably never featured in the “lab” environment – phishing. Client login
    credentials could be easily socially engineered by simply calling an end user
    posing to be an employee of the financial institution. Mechanisms like two-factor
    authentication (`2FA`) are prevalent today – however, these were not readily available
    when the channel was first established.'
  raw: '## Enterprise-wide Impact


