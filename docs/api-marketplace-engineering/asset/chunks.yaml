  trans: '

    ### 风险


    开放银行实施过程中存在诸多风险。提高认知并提前采取缓释措施，是使市场能够应对这些挑战的关键。由于解决方案是数字化的，这可能会导致无法使用互联网或智能手机的客户被排除在外。任何进入金融系统的新渠道都会引入欺诈的可能性。客户的金融数据可能被用于未经客户授权的用途。开放银行还可能使客户数据面临被窃取和不当使用的风险。薄弱的安全措施可能导致因犯罪活动而产生资金损失。


    客户在共享其金融数据时，可能并不了解相关风险，以及许多第三方提供商所承担的有限责任。这个问题可以通过有力的客户教育活动来解决。此外，在客户授权流程中，相关提示和警告信息必须清晰、简洁。还应让客户了解可用于查看和撤销第三方访问权限的机制。


    第三方提供商不受与银行相同的监管约束，且可能因数据处理不当而给银行带来声誉风险。敏感的客户数据可能因员工的意外或恶意行为而被共享。第三方可能更容易成为网络犯罪分子的目标，因为其安全机制可能不如银行完善。对第三方系统进行初始审查、定期审查和抽查，及/或开展独立安全评估，可确保建立必要的安全控制。根据所使用
    API 产品的性质，这可能成为强制性要求。


    开发和运营消费开放银行 API 的产品或服务，需要新进入者在设计、开发、支持和维护方面投入大量资金。API 市场产品负责人应向潜在提供商清晰传达这一点。


    银行同样会因第三方欺诈或失控行为而面临声誉风险。未经授权使用消费者数据会对消费者对银行的信任产生负面影响。可通过对希望接入市场的第三方进行全面审查和筛选来缓释这一风险。一项先发策略是传递强有力的市场信息，确保客户和第三方在整个开放银行旅程中明确各自的安全责任。


    银行面临的最重大风险之一是“去中介化”。第三方提供商可能削弱银行的角色，潜在地导致客户关系部分流失，进而造成收入下降。开放银行与 ATM、网上银行或基于应用的银行一样，都是客户与银行互动的渠道。稳固的银客关系有助于建立忠诚和信任。银行可以通过任何渠道利用客户数据与活动，更好地理解客户行为，从而提供个性化产品和服务。去中介化的潜在影响也可被视为一种动力，促使银行提升自身能力以维系客户关系。


    开放银行将导致银行商业模式发生变化，因为在运营基础设施、客户接入、交易监测和安全检查方面都存在重大调整。这可能会增加银行成本并带来竞争挑战。最佳缓释方式是以前瞻性的视角看待金融服务格局。制定清晰且定义明确的路线图，并参考在开放银行进程上更领先的国家和组织的经验，将有助于确保银行具备实施开放银行的准备度。


    如果客户数据丢失或支付被拦截、第三方无法履行财务义务，以及交易源于欺诈活动，商户可能不得不面对声誉风险暴露。支付系统在系统故障、人为错误和网络攻击情况下也可能面临操作风险。这可能影响支付系统的完整性与信心。对银行
    API 的访问可能使更多第三方实现源头分拣（sort-at-source），从而减少银行间清算，并影响银行间清算机构。


    ### 规定式、促进式或市场驱动式方法


    一些国家采取了规定式方法，强制银行共享经客户授权的数据，并要求希望访问此类数据的第三方在监管或监督机构注册。英国采取了监管路径，并于 2018 年纳入开放银行标准，要求规模最大的银行作为账户服务支付服务提供商（ASPSP）开发开放
    API，以便第三方提供商（TPP）访问客户账户。开放银行实施实体（OBIE）由竞争与市场管理局（CMA）设立，负责交付 API、数据结构和安全架构。欧盟通过了《支付服务指令》第二版（PSD2），将
    API 作为释放客户数据并赋能消费者选择的机制。然而，分析并就最优方案达成一致耗费了大量时间——因为第三方、银行和监管机构有不同的目标、诉求和顾虑，需要加以平衡。因此，英国和欧盟的监管措施都花费了一些时间才得以实施，许多银行也错过了截止期限。巴林等地区采用类似
    PSD2 的监管方式，建立了一套指导方针和标准，以确保实施一致性并促进采用。银行也被给予了必须合规的最后期限。


    其他司法辖区采取了更具促进性和灵活性的方法，通过发布指导意见、推荐标准，以及推出开放 API 标准和技术规范来推进。开放银行的共同支柱包括：授权同意、数据隐私预期以及数据安全要求。监管机构并未在一开始就强制要求实现目标结果，而是允许第三方提供商在基础设施建立之前使用安全的替代方案。比如，一些监管机构在
    API 尚未提供前，允许通过屏幕抓取（screen-scraping）方式访问经客户同意的账户信息。其余一些地区则选择了灵活的市场驱动方式，不设明确法规或标准。在下一节中，我们将回顾不同地区的开放银行活动。

    '
- fmt: '## Open Banking Across the Globe


    Tables `[2-1](#509947_1_En_2_Chapter.xhtml#Tab1)` through `[2-9](#509947_1_En_2_Chapter.xhtml#Tab9)`
    provide a point-in-time state of Open Banking in a number of countries. Key to
    note is the difference in strategy adopted across territories – some have chosen
    a prescriptive approach; others a facilitative or market-driven one. We also examine
    the regulatory body leading the initiative, service providers participating, access
    type, products, and current status. Countries starting on their journey can leverage
    the insights and experience of those which have started a number of years ago.


    ### Table 2-9


    **Open Banking – USA**


    | Jurisdiction | USA |

    | --- | --- |

    | Approach | Market-driven |

    | Lead | Consumer Financial Protection Bureau |

    | Service providers | Voluntary participation |

    | Access type | API, Screen scraping |

    | Product scope | As per the consumer (any financial data) |

    | Status | There is no legal requirement for Open Banking, and the decision on
    how data sharing occurs is up to financial institutions. Entities still use screen
    scraping rather than Open APIs. This includes web-based financial management tools
    that aggregate a customer’s financial data. |


    ### Table 2-8


    **Open Banking – South Africa**


    | Jurisdiction | South Africa |

    | --- | --- |

    | Approach | Market-driven |

    | Lead | South African Reserve Bank (SARB) |

    | Service providers | Voluntary participation |

    | Access type | API, Screen Scraping |

    | Product scope | Under review |

    | Status | Currently, the SARB does not regulate, supervise or oversee Open Banking
    activities such as screen scraping and open APIs, including their effectiveness,
    soundness, integrity or robustness. The SARB is of the view that Open Banking
    activities should be regulated and reformed, risks should be managed, and safety
    considerations embedded, all the while ensuring that customer experience is ensured
    and enhanced. Consultation process currently underway. |


    ### Table 2-7


    **Open Banking – Singapore**


    | Jurisdiction | Singapore |

    | --- | --- |

    | Approach | Facilitative |

    | Lead | Monetary Authority of Singapore |

    | Service providers | Voluntary participation |

    | Access type | API |

    | Product scope | Ethical use of data and artificial intelligence that will work
    for all players within the system |

    | Status | Singapore is attempting to implement a different type of regulatory
    framework, with a less aggressive and more organic approach. It is not planning
    to force regulations onto financial institutions. |


    ### Table 2-6


    **Open Banking – Japan**


    | Jurisdiction | Japan |

    | --- | --- |

    | Approach | Prescriptive |

    | Lead | Financial Services Agency |

    | Service providers | All banks |

    | Access type | API |

    | Product scope | Bank accounts (current, savings, deposits) |

    | Status | In 2018, Banking Act was amended to require financial institutions
    to develop APIs for use by third parties. |


    ### Table 2-5


    **Open Banking – India**


    | Jurisdiction | India |

    | --- | --- |

    | Approach | Hybrid Model – prescriptive and market-driven |

    | Lead | National Payments Council of India (NPCI) |

    | Service providers | Participating banks and payment service providers |

    | Access type | API |

    | Product scope | As per the consumer (any financial data) |

    | Status | The Indian government has mandated an Open API policy. In 2016, IndiaStack
    was introduced as a set of APIs. The Aadhaar biometric digital system facilitates
    open API banking through government proprietary software dealing with a centralized
    database for authentication. |


    ### Table 2-4


    **Open Banking – Hong Kong**


    | Jurisdiction | Hong Kong |

    | --- | --- |

    | Approach | Facilitative |

    | Lead | Hong Kong Monetary Authority |

    | Service providers | 20 participating retail banks have made available more than
    500 open APIs, offering access to information of a wide range of banking products
    and services |

    | Access type | API |

    | Product scope | As per the consumer (any financial data) |

    | Status | July 2018: The Hong Kong Monetary Authority introduced the Open API
    Framework. It aims to facilitate the development and wider adoption of APIs by
    the banking sector. January 2019: Phase I of the framework launched. |


    ### Table 2-3


    **Open Banking – European Union**


    | Jurisdiction | European Union |

    | --- | --- |

    | Approach | Prescriptive |

    | Lead | EU Commission |

    | Service providers | All banks and payment service providers |

    | Access type | API, Screen scraping |

    | Product scope | Current and savings accounts |

    | Status | PSD2 directs banks to open up their systems to allow third-party access
    to certain customer account information, in order to make payments on their behalf
    (via credit transfers) and to provide them with a view of their various payment
    accounts, subject to customer consent. • The aim is to increase competition and
    promote innovation through data sharing. |


    ### Table 2-2


    **Open Banking – China**


    | Jurisdiction | China |

    | --- | --- |

    | Approach | Market-driven |

    | Lead | FinTechs |

    | Service providers | AliPay, FinTechs |

    | Access type | API |

    | Product scope | As per the consumer (any financial data) |

    | Status | • Open Banking is not being promoted by regulators but rather driven
    by FinTech companies. |


    ### Table 2-1


    **Open Banking – Australia**


    | Jurisdiction | Australia |

    | --- | --- |

    | Approach | Prescriptive |

    | Lead | Treasury Department |

    | Service providers | Phased Approach. July 2020 – four big banks. February 2021
    – other banks |

    | Access type | API |

    | Product scope | Credit and debit cards, deposit and transaction accounts, mortgage
    and personal loan data |

    | Status | • 2018: Australian government approved a framework for Open Banking.
    • July 2020: Implemented in a phased approach, with the four big banks legally
    required to make consumer usage data available to consumers on credit and debit
    cards as well as deposit and transaction accounts. • November 2020: Mortgage and
    personal loan data to be shared. • February 2021: Other banks to start sharing
    data. |'
