    FROM node:14

    # Create app directory

    WORKDIR /usr/src/app

    # Install app dependencies

    COPY package*.json ./

    RUN npm install

    # Bundle app source

    COPY . .

    EXPOSE 8080

    CMD [ "node", "server.js" ]

    Listing 5-1

    Simple Docker configuration

    ```


    Like the Hypervisor is the enabling element for Virtual Machines, the Container
    runtime enables Containers. There are many great resources which provide details
    regarding how this is achieved by Hypervisors and Container runtimes. My personal
    definition is that a container is a specific definition of a software configuration,
    which is referred to as an image. As shown in Listing [5-1](#509947_1_En_5_Chapter.xhtml#PC1),
    the definition specifies a base software element, to which you add custom deployments
    and commands to be executed. All instances which are created from that image will
    be the same. Instead of working from the OS level, it allows you to focus on the
    Application level and associated dependencies.


    Consider the difference between a Virtual Machine and Container in the context
    of baking cakes. For the Virtualized approach, the chef is provided with a full
    kitchen – different cooking utensils, all appliances, and a full pantry to choose
    from. Invariably, the chef will only use a subset of utensils, appliances, and
    supplies. For the Container approach, the chef is provided with only what they
    need to deliver a cake – specific utensils, ingredients, and possibly only an
    oven. The Container approach also forces deployment teams to make changes at a
    code/configuration level. If a library or package needs to be included, the container
    image configuration must be updated. Container instances are purposely transient.
    Images are also lightweight, and as they do not need a full OS to run, they require
    a fraction of the underlying infrastructure. The result is that it is possible
    to run more containers on infrastructure as compared to Virtual Machines. A further
    benefit is that this allows horizontal scaling of infrastructure. Cheaper, albeit
    less powerful hardware, can easily host several container instances due to their
    lightweight footprint.


    A Managed container platform, like Kubernetes, provides capability like self-healing
    which restarts failed containers and checks health of containers before advertising
    them to clients. It also provides automated rollouts and rollbacks. To be completely
    transparent, our early project team was in unchartered territory regarding containerization
    – let alone having to build a *Kubernetes* Managed Container platform *on-premises*.
    I can still see the hopeless expression of an exasperated project manager, eager
    to meet the sprint objective – when the resident DevOps engineer gave feedback
    of “*we don’t know what we don’t know*” for the resolution on an issue during
    the Container Platform build. Our frustration with internal organization governance
    and security restrictions grew exponentially as we experimented with Cloud PaaS
    services, which could be provisioned in minutes, but could not access internal
    systems. The first iteration of our Platform was a single pod on a single node
    – which had to be restarted periodically. A small victory – but for our project
    team, that was a small step for man, but a giant leap for DevOps!


    We have since had two major iterations of the Managed Container Platform, and
    through our progression, now have a far better understanding and appreciation
    of what *Kubernetes* offers. It is easy to become enamored with the appeal of
    Containerization, especially a platform like Kubernetes. I have observed the power
    of Infrastructure as Code and have suffered delusions of grandeur by the possibility
    of creating “Genesis scripts” which can terraform entire environments in minutes.
    What jarred me out of my reverie was that, in the context of an API Marketplace,
    the Managed Container Platform is an *enabler* of the application platform. I
    have since come to the conclusion that the true power of a Managed Container platform,
    like Kubernetes, is that it fades to the background and allows you to focus on
    the application. As a full-stack engineer, it is essential to understand the elements
    and function of a container platform and how a request journeys from ingress to
    service to pod. The management of our on-premises Kubernetes platform has since
    been transferred to an enterprise DevOps team. This will further transition to
    a managed Cloud service. Kubernetes as a Service offerings abstract complexities
    of infrastructure management, network fabric configuration, and help teams to
    easily achieve complex objectives such as setting up persistent volumes.'
