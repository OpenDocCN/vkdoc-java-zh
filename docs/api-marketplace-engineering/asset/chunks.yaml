  trans: '

    ### 自上而下，预定义


    这些是所有组织都必须遵循的标准 API。支付服务指令（PSD2）就是一个例子。对消费者而言，其优势在于集成方案只需构建一次，便可在不同提供方之间复用。对提供方而言，其优势在于接口是预先定义好的，只需要补充实现即可。这类集成的挑战在于北向（面向外部）接口与南向（后端）接口之间的映射。由于北向接口被设计为尽可能通用，通常会有非常广泛的输入以及海量的组合。


    根据我们实施 PSD2 接口的经验，我们发现南向接口属于一个小众的大型机应用，它多年来一直忠实地服务于组织的特定需求。我们这项并不令人羡慕的任务，就像把一侧数百根精细的光纤，接补到另一侧几十个真空管上。对于这种类型的集成，在完成连接这两类接口的映射工作后，我通常会有一种和组装预包装产品后发现多出零件时一样的感受。要建立对映射正确性的信心，方法是对解决方案进行严格测试，并让后端提供方确认请求被正确接收和处理。


    这种接口类型的另一个缺点是，组织会失去其独特身份。消费者有充分理由认为，如果每个提供方都有独特身份，将会显著延长他们的开发周期。从提供方的角度看，标准化会让你很难从众多竞争者中脱颖而出。你的
    API 产品只会变成提供方目录中的一个新端点。大型机解决方案虽然陈旧，却可能具备某些令人惊叹的功能，第三方本可以加以利用。不幸的是，这一缕阳光会被覆盖在接口之上的统一性“毯子”所遮蔽。


    ### 自下而上


    大多数北向接口都由其南向对应接口驱动。与预定义 API 相比，这些是按后端功能“塑形”锻造出的产品。上一节提到的那些独特而美丽的“功能阳光”，本来会被标准接口掩盖，如今则可以明亮地照耀出来，供世界看见并使用。现在出现的挑战在于：确定应暴露哪些功能片段与数据。此外，必须特别谨慎，避免南向接口的数据结构“渗出”。也就是说，外部消费者不应受到后端提供方细微变更的影响。


    坦率审视我们的 API 目录后，我发现其中有一些并不是我完全引以为傲的。这些 API 也没有出现在我们的开发者门户中。在你的 Marketplace 之旅中，总会有某个时刻，API
    生产线跟不上消费者需求。虽然我认为这在某种程度上是个令人羡慕的处境，但它有时会导致糟糕的短期决策，并带来长期后果。


    我清楚记得曾与产品负责人讨论过一个关键 Marketplace 消费者急需的 API。当时团队已全力以赴，没有能力再“采收”这个 API，尤其是在既定时间线内。最终在疲惫中做出的决定是：我们发布该
    API 的 0.00001 版本。这实际上就是一个直通式接口。我们为这个糟糕决定保留的一点体面前提是：这个 API 会在后续时间进行修订。


    正如大多数交付团队所知，绝大多数进入生产运行环境的解决方案几乎不可能回退。偏偏这个后端平台的数据模型，是我整个集成职业生涯中见过最糟糕的之一。消费我平台发布
    API 的用户，对我提供给他们的接口可能也有和我使用别人接口时同样的感受。创建这类 API 产品的挑战在于：团队必须在其整个生命周期内承担所有权与维护责任。即使创建了新版本，如果旧接口稳定，消费者也极不可能将其集成更新到新接口。


    为避免你的平台出现这种情况，关键在于获得项目赞助方的强力支持，使其能够为团队抵挡来自消费者的压力。随着我们平台逐渐成熟，我们已能以更好的方式处理这类请求。我们当前的交付流程会要求对正在开发的解决方案进行重新优先级排序，或者将所需功能安排到更晚的时间。一个前置的“*不*”，虽然不受欢迎，却可能带来更好的长期方案。在需求管道中建立明确流程，也让消费者能更高效地规划，从而使临时突发请求大幅下降。

    '
- fmt: '## Consumer-Driven


    This type of design strategy generally starts with requirements from a single
    consumer with a key directive that the interface should be designed to support
    multiple consumers in the future. Our platform was recently tasked with bridging
    the divide between a new, externally hosted digital platform and core, internal
    enterprise capability. At the start of the project, the Marketplace team took
    solemn oaths to build northbound interfaces that would be reusable for other third-party
    providers. Evidence of our commitment to this goal can be seen from our API naming
    conventions and standards. It was designed in a way that would allow easy consumption
    by other parties.


    The impetus provided from this mission objective has resulted in southbound integrations
    to almost every backend platform in the organization. When backend providers challenged
    us, we stepped aside and let the momentum of the digital platform juggernaut roll
    over them.


    We soon realized that juggernauts are not delicate creatures as they also impacted
    our delivery process. As our team received more and more consumer specific business
    requirements, we struggled to maintain the sanctity of a generic, reusable interface.
    We attempted to stand firm and clearly signaled that the changes would impact
    the reusability and extensibility of the API. The logical left side of my brain
    agreed with the decision to make the change as, at the time, there was only one
    consumer. The emotional right side was gutted as this would result in us reneging
    on our promise of creating a reusable product.


    We attempted to mitigate the spread of this contagion by first isolating payloads,
    then operations, that would be consumer specific – with the view of rehabilitation
    at a later point in time. Unfortunately, we have not been successful, and the
    current prognosis is amputation of specific APIs in our catalogue. This may seem
    a tad dramatic, and I hope you recall the analogy when you have a similar experience.


    The key message that I would like to impart to you is this – if your journey starts
    with a single consumer, choose your battles carefully. As illustrated in Figure
    [7-1](#509947_1_En_7_Chapter.xhtml#Fig1), be sure to abstract any key backend
    southbound integration into reusable integration components. For your northbound
    interfaces, determine which can be isolated and split these off into generic interfaces.
    As an example, Reference Data APIs are prime candidates as a generic interface.
    Rather than designing for future consumers, who may never turn up, pay the necessary
    respect due to your primary consumer by publishing a specific API that will satisfy
    their requirements.


    ![../images/509947_1_En_7_Chapter/509947_1_En_7_Fig1_HTML.jpg](images/509947_1_En_7_Chapter/509947_1_En_7_Fig1_HTML.jpg)


    Figure 7-1


    Consumer-specific integration approach


    What helped me reached this conclusion is that without demand from this specific
    consumer, we would not have `any` API product to start off with. I would like
    to impart some sagely advice – don’t boil the ocean by trying to reach the target
    state on your first move. Allow your platform the latitude to have consumer-specific
    interfaces with the view of creating generic and reusable integration components
    for later use. That is, instead of building a single product and slicing and dicing
    later, build multiple, segmented products from the start.


    ## Build Your Own


    If the Top-Down strategy provided a readymade interface you had to implement,
    the Consumer-Driven approach was driven by single user’s requirements, and the
    Bottom-Up approach was influenced by backend systems, there was not much to design
    from an interface perspective. The Build Your Own strategy is one which allows
    the API Marketplace team full autonomy in defining the vision and purpose of an
    API. In much the same way that an artist creates a beautiful sculpture from a
    block of stone, chipping away the rough edges until the finished product is achieved,
    you too will undertake the same process. There will be no rigid regulatory bodies,
    demanding single consumers or outdated legacy backends to shield you from the
    ire of developers who have trouble consuming your API.


    With that being said, the blank canvas to create your own beautiful mural of an
    interface is a rare opportunity and a brass ring which should be seized with both
    hands. What has worked for us as a team is a rigorous and thorough review process.
    We sometimes refer to this as the “Apple Design” review. Fans and critics of Apple
    would both agree that the end user product is both functional and elegant. This
    is not achieved by osmosis but is the result of numerous stringent design reviews
    and iterations. The same must apply to your API product. Accept at the outset
    that there will be numerous iterations and large amounts of rework. Friendships
    and alliances should be temporarily set aside, and the target should be set at
    nothing short of excellence.


    During a recent API design review, there were a number of suggestions for improvements
    and questions raised regarding functionality and usability. After the first round
    of review, the direction agreed upon was to use a generic, open approach which
    would allow easy extensibility, but would require greater developer education.
    I was fairly pleased with this strategy as it mapped well to the middleware, integration
    components which were already in construction. To be honest, we were far along
    in the development process, with the API Gateway implementation almost complete,
    when a question was raised regarding usability.


    I won’t lie – going back to the drawing board, especially as the colors of your
    mural are starting to dry, is tough. It is only natural to want to defend the
    current position. What helped was the realization that the new direction of the
    end product would result in a simplified approach and greater developer adoption.
    I was lucky – we caught this midway through development. There will be API products
    which might launch but will need to return to the drawing board. This must be
    ingrained in the team culture – the need to rework, refine, and optimize until
    the final product is perfect.


    It should also be highlighted that running the gauntlet of the design review process
    helps to solidify principles regarding the product definition. These principles
    proved to be essential supports when we received a challenge from a backend team
    regarding additional input elements. As much as the API can change, be ready to
    defend the identity of the product you have created. In short, if you firmly believe
    in a particular strategic direction, do not be afraid to stand firm.


    ## Considerations


    There are many factors to consider when designing an API. Some, to be considered
    early in the process, will be used as a filter to separate the wheat from the
    chaff. Others will be used to understand the form and function to ensure the delivered
    outcome can achieve the desired capability. Stages could be explicit, such as
    detailed performance requirements, or implicit, such as the navigation of architecture
    design reviews of your organization. In the following sections, we consider some
    of these factors, our experience and methodology during the design process to
    filter, understand, and build better APIs.'
