  trans: '

    ### 软件开发工具包（SDK）


    在处理第三方关于我们 API 的请求时，我经常需要停下来，从外部使用者的角度审视问题。随着我们每天越来越深入技术细节，处理接口的某些方面几乎会变成机械操作，而一些复杂概念或功能也可能被想当然地认为很容易理解。一个机械操作的例子是在客户端应用中配置安全证书。这个挑战是团队多年前就已克服的，任何开发者都可以轻松从我们的代码仓库中获取示例。尽管我们希望开发者社区能够自给自足，并熟悉像
    StackOverflow 这样的资源，但我们的目标是尽可能提升并加速开发者体验。为了进一步支持外部使用者，还请记住：技术团队可能只有一名开发者。


    一种方式是提供代码示例和教程，细致地一步一步描述整个过程。另一种策略是提供一个封装 API 的 SDK，它能显著帮助开发者理解你的接口，并带来以下好处：


    *   **简化集成**：证书配置、超时和异常处理等复杂性都可以由 SDK 抽象掉。


    *   **统一消费方式**：由于 SDK 是入口点，它可以一致地执行 API 使用相关的策略和规则。还可以加入客户端校验，以缓冲格式不良请求对 API 的影响。


    *   **原生语言支持**：SDK 可以像添加一个软件包一样轻松集成，并可直接在原生代码中使用。无需 HTTP 客户端，也不需要对请求和响应进行编组。HTTP
    状态码可以作为异常返回。


    需要注意的是，SDK 并非银弹。在采取这一措施之前，必须清楚理解支持与持续维护客户端代码所需的投入。


    ## 总结


    API 设计是构建 Marketplace 过程中最令人兴奋、但有时也最让人不知所措的领域之一。在本章中，我们讨论了 API 的定义与目标如何被组织战略以隐性或显性的方式影响。我们强调了用于筛选、理解和支持设计过程的关键考量。我们还回顾了访问机制——传统、当前与未来——分别是
    SOAP、REST 和 GraphQL。关于实现、API 生命周期和指导原则的模式也进行了讨论。贯穿设计哲学的黄金主线是：Marketplace 是组织的延伸，而其
    API 是组织身份的映射。


    设计阶段的产出是 API 蓝图，而该蓝图将作为开发阶段的输入，这也是下一章的主题。在传统瀑布式软件开发生命周期中，这两者是界限清晰且彼此分离的阶段。架构师将接力棒交给开发者，然后回到他们的“象牙塔”去思考下一个棘手的业务需求。在敏捷交付模式中，设计者深度参与交付能力——在我们的项目里，设计者和开发者往往是同一批人。这使得
    API 产品的整体交付可以采用迭代方式推进。


    # 8. API 开发


    在软件开发生命周期的所有阶段中，开发是我最喜欢的阶段。正是在这一阶段，设计与设想被注入生命，各种假设也终于可以被验证。与其他软件领域不同，在 API 语境下，实现的复杂性被接口所屏蔽。任何经验丰富的集成工程师都会确认，接口让团队能够在开发完成度上保持“扑克脸”。在许多项目中，我有时会发布一个“薄如蝉翼”实现的
    API，要么是为了摆脱一个近乎疯狂的项目经理所主导的关键路径，要么是通过展示“已准备好集成测试”的姿态来虚张声势，把压力转移给使用方。


    这一阶段并非没有挑战。在搭建两个系统之间“桥梁”的过程中，常常会慢慢意识到：集成复杂度远超预期。任何资深集成工程师也都会承认，在连接点缺少所需信息是令人恐惧的。这就像你在收尾一幅
    10,000 片拼图时，发现少了 3 片一样。更糟的是，这通常还发生在那些实现“薄如蝉翼”的方案上！


    在我的职业生涯中，我发现开发这趟过山车从不走同一条路线。这或许正是我热爱集成工程的首要原因。从一开始与外部团队代表的友好会面，到开发者之间充满技术术语的交流，再到为解决问题而在团队间爆发的激烈讨论；从与网络安全团队进行必要的协调外交以解除防火墙阻断，到第一次系统握手成功时的肾上腺素飙升，最终到看到它在生产环境中运行时的如释重负——总会有变化，让这一切始终令人兴奋。本章中，我们将深入探讨若干支持
    API 开发的关键领域细节。

    '
- fmt: '## API First, Tech Second


    Early in my career, I found myself enamored with Java. Specifically, Java Enterprise
    Edition (JEE). I dreamt of beans – Enterprise Java Beans (EJBs) – and welcomed
    hour-long discussions with like-minded friends and colleagues, debating the merits
    of stateless over stateful session beans and feeling quite pleased with the parallel
    processing capabilities of message-driven beans. Several role changes later, I
    realized that I had set my level of focus to maximum magnification which did not
    allow me to see the bigger picture.


    Simply put, the primary objective for an integration requirement is not `how`
    it should be done, but `why`. This may be a tough message for development teams
    – but an API consumer simply expects a response to a request. The consumer is
    not really interested in the detail of the implementation – it does not matter
    if the request has been processed using the latest Artificial Intelligence (AI)
    cloud product or using a mainframe from decades past for processing. The main
    objective is a consistent and reliable interface.


    With the plethora of technology options available today, it is extremely easy
    to go down a rabbit hole trying to find the most optimal and possibly bleeding
    edge way in which to implement a solution. In a budding API Marketplace, particularly
    in a digital context, this position can very easily become the norm. As much as
    I enjoy tinkering with new tech, I strongly advise restraint when solutioning.
    It is always important to remember that the technology serves to achieve a purpose.


    A favorite example is implementing an interface to retrieve reference data. To
    make this seemingly mundane task a little more interesting, an eager developer
    may attempt to cache responses. The strategy starts off with a simple in-memory
    cache which will work well in the context of a single instance. But what about
    multiple instances distributed across different nodes in a cluster? Should the
    cache have data persistence which will require technology like Redis, or is it
    memory-based which will require Memcached? As this is the first caching implementation,
    where should the solution be hosted? On-premises or maybe cloud? What about a
    cache invalidation strategy? How and when can we get rid of stale data in the
    cache? Although a valid objective, you can see how the focus of the API has shifted
    from the `retrieval` of reference data to the `caching` of data.


    I have observed on many occasions how secondary and non-essential objectives have
    impacted and slowed down the delivery of requirements as these tasks have become
    embedded into the solution. In an agile environment, the goal is to publish a
    minimal, functional solution as quickly as possible. Note the difference to a
    wafer-thin implementation which is essentially an interface with a mock response.


    Returning to the reference data requirement, the first iteration to get out the
    door as quickly as possible, is the pure retrieval of data. By exposing an API
    which responds to a request, even with high latencies, the consumer can get a
    feel for the integration – from interface specification to the data returned.
    This strategy should be followed even if the requirement for improved performance
    was specified at design time or later during performance testing. Given a choice
    between better performance or faster development, a project manager under aggressive
    delivery timelines is likely to choose the latter. A middle ground to the performance
    requirement may be the implementation of a cache on the client side.


    This philosophy borrows heavily from the motto of Facebook:


    > Done is better than perfect.


    Resist the temptation to optimize an interface early in its lifecycle. Start simple
    and iterate. Focus on the main tasks such as mapping from source to target. `Identify`
    areas of improvement, such as caching for performance, paging, and filtering.
    Also be sure to consider other areas, which may not be as exciting to develop
    – such as security, validation, and error handling. With a functioning API, even
    in the Development environment, prioritize requirements with help from the Product
    Owner and the Engineering Lead. From years of experience, I am quite certain that
    security, reliability, and consistency would be chosen over performance. Be sure
    to keep the objective of the API in focus at all times.


    ## Team Structure


    Contrary to popular belief, development is more than a lone developer banging
    away at a keyboard in a semi-dark room. Borrowing from an African proverb that
    it takes a village to raise a child, it is a team effort to deliver an API. The
    product is more than just lines of code but is dependent on the following roles
    during its journey from design to implementation.'
