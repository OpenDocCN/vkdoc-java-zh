  trans: '

    ### 生命周期终止


    我最近收到一封来自某后端团队开发经理的邮件，令我非常震惊。内容如下：


    *   *主题：停用 <System> API v1 和 <System> SOAP v5、v6、v7*


    *   *正文：*


    *   *大家好，*


    *   *我们计划在 <date – in 10 days> 于生产环境中下线旧版本的 <System> SOAP 和 API。*


    *   *这些版本在 DEV、TST 和 QA 环境中已经停用超过一个月。*


    *   *如果您对下线这些版本有任何顾虑，请联系我以及……*


    我的第一反应是恐慌，我立刻疯狂检查我们集成组件中的最新代码，以确认我们平台正在使用哪些版本。很快我就松了一口气，因为我们幸运地分别使用的是 API v3 和
    SOAP v8。随着肾上腺素带来的冲击逐渐消退，放松感又被愤怒取代。虽然目前我们的平台是安全的，但对于一个关键南向提供方来说，这种服务方式极其糟糕。试想某个应用在生产环境中仍使用旧版
    API，且过去一个月并没有测试需求。如果这个应用处于纯运行状态、没有开发能力，那么 10 天后它就会遭遇一场“当头棒喝”。


    这是该提供方极其冷漠且不负责任的行为。如果确实有迫切需要在短时间内淘汰旧版接口，提供方有责任先根据 API 订阅或安全访问配置整理出消费方清单，再逐一直接联系并确认旧版本可以下线。仅仅发一封“10
    天后 API 版本退役”的通知邮件，完全不是可接受的做法。


    这正是“临时拼凑式”API 的后果：可能只是为了满足某个特定消费方需求而构建，却没有定义生命周期。API 的停止支持/退役日期，必须在其诞生时、发布时或新版本发布时就清晰定义。这与任何商业软件发布实践一致。它体现了提供方承诺在特定时间前持续支持该产品，也使消费方能够规划从该版本迁移。我认为这体现了成熟度，也是信任的基础，而信任正是
    API Marketplace 的关键根基之一。


    请记住，第三方消费方在决定将你的 API 用于其应用、产品或服务时，是在做一个重大决策。他们在启动阶段很可能有开发资金投入。通过清晰提供 API 可用时间线信息，消费方就能将其纳入财务、业务和开发规划之中。


    ## 设计指南


    就像学徒在导师指导下、通过经验不断变得更熟练一样，你的团队也会很快在 API 定义方面持续进步。作为这个过程的一部分，有一些普遍接受的指导原则与标准需要考虑。它们与平台和产品无关，几乎可应用于任何定义。从
    Twilio 到 Facebook 再到 Google，都有优秀的 API 平台示例和参考。在为你的 Marketplace 定义标准与约定时，这些都可作为指南。下面章节中我们将讨论其中一部分。


    ### 错误处理


    向消费方返回错误信息是 API 的关键要素。如下所述，HTTP 状态码通常被视为返回 API 调用执行结果的最佳实践：


    *   **成功**：请求成功处理以 2xx HTTP 响应码表示。最常见的是 200 OK。其他码如 201 表示资源已创建，204 表示请求已成功处理，但未找到结果。


    *   **客户端错误**：客户端错误以 4xx HTTP 响应码表示。这类错误说明客户端请求有问题，例如缺少必填参数或认证失败。问题必须在客户端应用修复后重新提交。


    *   **服务端错误**：服务端错误以 5xx HTTP 响应码表示，需要由提供方解决。可能原因包括下游系统故障。客户端可持续重新提交/重试请求，直到成功。


    作为起点，你可以先使用以下状态码，并按需扩展：


    *   200 – OK


    *   400 – Bad Request


    *   500 – Internal Server Error


    状态码主要供机器消费。还应包含提供更多错误信息的消息。尽量包含尽可能详细的问题信息。


    例如，如果请求因缺少必填参数而无法处理，应明确指出缺少的是哪些参数名。这不仅能帮助开发者定位根因，也能减少支持团队处理潜在求助请求的压力。


    注意不要在响应消息中泄露内部系统信息。例如在错误消息中包含堆栈跟踪。这会暴露内部实现细节，削弱 API 安全性，并可能带来安全风险。


    ### 过滤与分页


    始终应努力从性能角度设计接口。不断提升的网络和 CPU 速度，可能导致接口开发时忽视了对消费方和提供方的负担：前者收到超大数据集，后者承受范围过广的查询。根据我在运维中间件环境中的经验，处理请求的线程数量是有限的。请求到达后，会从线程池分配一个工作线程进行处理。你需要尽最大努力让该线程尽快回到线程池，以便处理更多请求。如果所有工作线程都忙碌，请求就会开始排队。请记住，在消费方看来，请求从发起那一刻起就是“进行中”。如果请求在被处理前先进入队列，可能导致消费方超时。


    团队中的 DevOps 工程师可能会插话说，容器化平台可以轻松横向扩展以应对高流量。这一点没错，但请从后端提供方视角看问题。该提供方可能并不具备可扩展的容器化平台，也可能同时在服务多个其他渠道。来自你
    Marketplace 的突发请求，可能导致其系统高负载、交易失败，甚至系统中断。作为 API 设计者，你最重要的职责之一，不仅是保护你自己的平台，也要保护支撑它的相关平台。


    实现这一点并提升性能的机制，是指定请求过滤条件并对响应进行分页。过滤可帮助阻止过于宽泛的查询到达下游系统。`limit` 和 `offset` 便于开发者对对象进行分页。这也会带来更可预测的执行时间，因为处理时长不再直接依赖于数据集大小或查询复杂度。

    '
- fmt: '## Software Development Kit (SDK)


    When fielding requests from third parties regarding our APIs, I often have to
    stop and consider the query from the perspective of an external consumer. As we
    get more involved in the technical detail daily, some aspects of dealing with
    an interface almost become mechanical, and complex concepts or functions could
    be assumed to be easily understood. An example of a mechanical operation is configuring
    a security certificate in a client application. This was a challenge the team
    overcame many years ago and any developer can easily access samples from our code
    repository. As much as we would like our developer community to be self-sufficient
    and familiar with resources like StackOverflow, our goal is to improve and accelerate
    the developer experience as much as possible. In further support of the external
    consumer, keep in mind that the technical team may only be a single developer.


    One approach is to provide code samples and tutorials which painstakingly describe
    the process one step at a time. Another strategy is an SDK which wraps your API
    and can help developers significantly with assimilating your interface and provides
    the following benefits:


    - Simplify integration: Complexities such as certificate configuration, timeouts,
    and exception handling can be abstracted by the SDK.

    - Uniform consumption: Policies and rules regarding API usage can be enforced
    consistently by the SDK as it is the entry point. Client-side validation can also
    be included to buffer the API from poorly formed requests.

    - Native language support: The SDK can be incorporated as easily as adding in
    a software package which can be used from native code. There is no need for a
    HTTP client and marshalling of the request and response. HTTP status codes can
    be returned as exceptions.


    It should be noted that an SDK is not a silver bullet and the support and ongoing
    effort of maintaining client-side code should be clearly understood before pursuing
    this measure.


    ## Summary


    API Design is one of the most exciting but sometimes overwhelming domains in building
    a Marketplace. In this chapter, we discussed how the definition and objective
    of the APIs are influenced, implicitly or explicitly, by the organizational strategy.
    We highlighted key considerations to filter, understand, and support the design
    process. Access mechanisms – traditional, current, and future – SOAP, REST, and
    GraphQL, respectively, were also reviewed. Patterns regarding implementation,
    the lifecycle of an API, and guidelines were also discussed. The golden thread
    of the design philosophy is that the Marketplace is an extension of the organization
    and its APIs are a reflection of its identity.


    The output of the Design phase is the API blueprint which is the input into the
    Development phase which is the topic of the next chapter. In a traditional waterfall
    approach software development lifecycle, these were two clearly defined and separated
    phases. Architects passed the baton to developers and returned to their ivory
    towers to ponder over the next perplexing business requirement. In an agile delivery
    approach, the designers are very much part of the delivery capability – in our
    project, the designers and developers are often the same people. This allows an
    iterative approach to overall delivery of an API product.


    ## 8. API Development


    Of all the phases in the software development lifecycle, Development is my favorite.
    This is when life is breathed into designs and postulations and hypotheses can
    finally be tested. Unlike other software domains, the complexity of implementation,
    in an API context, is shielded by the interface. As any seasoned integration engineer
    will confirm, the interface allows the team to maintain a poker face regarding
    the level of completion of development. On many occasions, across different projects,
    I have sometimes published an API with a wafer-thin implementation to either get
    off the critical path of a maniacal project manager or to shift pressure to the
    consumer by bluffing with a show of readiness for integration testing.


    This phase is not without its challenges. There are often times during construction
    of the bridge between two systems that the realization slowly dawns that the complexity
    of integration is far greater than anticipated. Any seasoned integration engineer
    will also attest to the fear of not having the required information available
    at the point of connection. This can be compared to the moment when you’re wrapping
    up a 10,000-piece puzzle and find 3 pieces missing. If this were not bad enough,
    this generally happens on one of those solutions with a wafer-thin implementation!


    Throughout my career, I have found that the development rollercoaster never follows
    the same route. This is possibly the primary reason why I love integration engineering.
    From the initial cordial meet-and-greet with representatives from an external
    team to the techno-jargon exchanges between developers, to the flurry of heated
    exchanges between teams to resolve issues, to the required diplomacy with network
    security to unblock firewalls, leading to the adrenalin rush of the first system
    handshake and finally to the relief of seeing it work in an operational context
    – there is always a variation that keeps it exciting. In this chapter, we delve
    into the detail of a number of key areas which support the development of an API.'
