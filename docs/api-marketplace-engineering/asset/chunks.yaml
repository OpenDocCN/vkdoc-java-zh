  raw: '### Agile Methodology


    Delivery is achieved in the duration of a sprint – which is a short, time-boxed
    period, minimum a week, maximum two weeks. As detailed in Figure [8-3](#509947_1_En_8_Chapter.xhtml#Fig3),
    functionality is released in phases. The phased approach is based on a “Release
    Often” principle. We have found that solutions with a prolonged stay in Development
    tend to become more complex as changes from various requirements are made to shared
    components. A telltale sign of this occurrence is if the production and testing
    versions start digressing significantly. For example, production is on version
    2.04 and test is on version 2.17\. The greater the divergence, the more changes
    have been applied which increases the release risk.


    ![../images/509947_1_En_8_Chapter/509947_1_En_8_Fig3_HTML.jpg](images/509947_1_En_8_Chapter/509947_1_En_8_Fig3_HTML.jpg)


    Figure 8-3


    Sprint approach


    From a release perspective, we deploy to production at the end of every sprint.
    As there may be a number of ongoing initiatives, a team goal is to align production
    and QA environments at least once a month. As also illustrated, the sprint duration
    may be shortened to address an updated business or third-party requirement. Faster
    delivery cycles also underpin our “fix-forward” strategy. If issues are encountered
    in an operational environment post deployment of a new release, we attempt to
    resolve the issue as quickly as possible instead of rolling back. The versioning
    of APIs affords us this luxury as the operational environment may have a few active
    versions.


    ## DevOps


    When I first encountered the term “DevOps” many years ago, I jokingly commented
    that many of the project teams I had worked on were doing this for some time –
    developers were writing code in production to fix issues. Now, armed with the
    experience of working with specialists, I understand and appreciate that this
    is a new and critical realm of the software development lifecycle. The *practice*
    of DevOps is now fundamental to the ongoing success of our Marketplace.


    At the start of the implementation, it was an aspirational goal as the delivery
    team leveraged a manual deployment process. As discussed in previous chapters,
    the project was extremely fortunate to have the skills of experienced DevOps engineers
    for a period which accelerated our progress significantly. From observation of
    these masters plying their craft, I now consider DevOps engineering as infrastructure
    sorcery, which allows the creation of new worlds, in our case – environments,
    with a magical incantation, otherwise known as a Terraform script. The practice
    and benefit of this paradigm is detailed. In the following sections, I will focus
    specifically on how DevOps supports our development process.


    ### Continuous Integration (CI)


    At the start of the implementation, the Marketplace consisted of a few microservices
    – which could be counted on one hand. Everyone knew them well and each was authored
    by a specific developer. When the time came for integration testing, all members
    of our geographically distributed team joined audio conference calls, which sometimes
    lasted the entire day. The team would tensely watch on a screen sharing session
    as the appointed “Deployment” engineer would run through a cryptic sequence of
    commands to deploy the required code elements to the test environment, gasp in
    frustration as we found a missing configuration parameter, and finally breathe
    a sigh of relief when the test engineer gave an all-clear signal. This was the
    first iteration of our (manual) Continuous Integration process.


    The process evolved, almost overnight, as the on-premises Container platform was
    rebuilt. As part of the rebuild, the deployment process also changed dramatically.
    Suddenly, pipelines were triggered on code commits which automatically built and
    deployed to the next test environment. Once functionality was confirmed in lower
    test environments, the developer would initiate a pull request which had to be
    reviewed and approved before the code change could be merged into the main branch.
    This action would also trigger a higher-function process which would deploy the
    component to a staging environment. The deployment process would not set it as
    the active version. An Instant Message (IM) had to be sent to a middle-earth wizard,
    Gandalf, a chatbot, who would then magically update configuration in the Kubernetes
    cluster to route requests to the new version. Gandalf only took instruction from
    specific hobbits on the team which maintained the sanctity of the release process
    and readily assisted by reverting to previous versions if an issue was encountered.


    The deployment process was beautiful in its simplicity, shielded the development
    team from significant backend complexity, and introduced an explicit, repeatable,
    and reliable process to be followed for migrating code between environments. If
    the deployment or test failed due to a missing configuration parameter or code
    bug, it forced resolution at the source – which triggered the pipelines and process
    to resolve it. Our implementation was extremely fortunate to have been visited
    by time-traveling DevOps engineers from the future. Any time benefit was lost
    when they suddenly left, and the team had to support and update a seemingly complex
    release process.


    The key lesson I would like to impart, from this experience, is to build your
    CI pipeline iteratively. Lay the foundation with the fundamental principle that
    there will be no manual deployments. Then put in a simple process and iterate.
    There are great open-source CI tools, such as Jenkins and Cloud offerings which
    can deploy to on-premises infrastructure.


    Once you have established a simple, stable, repeatable process, slowly phase in
    elements such as versioning, chatbots, and automated tests. Automated tests are
    crucial to Continuous Delivery , which is discussed in the next section.'
  trans: '

    ### 敏捷方法论


    交付是在一个冲刺周期（sprint）内完成的——这是一个短期、时间受限的阶段，最短一周，最长两周。如图 8-3 所示，功能是分阶段发布的。分阶段方法基于“频繁发布（Release
    Often）”原则。我们发现，长期停留在开发阶段的解决方案，随着来自不同需求的变更不断作用于共享组件，往往会变得更加复杂。一个明显迹象是生产版本与测试版本开始出现显著偏离。例如，生产环境是版本
    2.04，而测试环境是版本 2.17。偏离越大，说明已应用的变更越多，从而提高发布风险。


    ![../images/509947_1_En_8_Chapter/509947_1_En_8_Fig3_HTML.jpg](img/509947_1_En_8_Fig3_HTML.jpg)


    图 8-3


    冲刺方法


    从发布角度看，我们会在每个冲刺结束时部署到生产环境。由于可能存在多个并行推进的项目，团队目标是至少每月一次让生产与 QA 环境保持一致。如图所示，为了应对更新后的业务需求或第三方需求，冲刺周期也可能缩短。更快的交付周期同样支撑了我们的“向前修复（fix-forward）”策略。如果在新版本部署后、运行环境中发现问题，我们会尽可能快速修复问题，而不是回滚。API
    的版本化为我们提供了这种“从容空间”，因为运行环境中可能同时存在多个活跃版本。


    ## DevOps


    很多年前我第一次接触“DevOps”这个术语时，曾开玩笑说我参与过的很多项目团队其实早就在这么做了——开发人员直接在生产环境写代码修复问题。如今，借助与专家共事的经验，我理解并认同这确实是软件开发生命周期中一个全新且关键的领域。DevOps
    的*实践*如今已成为我们 Marketplace 持续成功的基础。


    在实施初期，这只是一个愿景目标，因为交付团队当时采用的是手动部署流程。正如前几章所述，项目非常幸运地在一段时间内拥有经验丰富的 DevOps 工程师，这极大加速了我们的进展。通过观察这些大师施展技艺，我现在把
    DevOps 工程看作“基础设施魔法”——它可以用一句魔法咒语（也就是 Terraform 脚本）创造新世界，在我们的场景里即创建新环境。这个范式的实践与收益已被充分阐述。在接下来的章节中，我将重点说明
    DevOps 如何支持我们的开发流程。


    ### 持续集成（CI）


    在实施初期，Marketplace 只包含少量微服务——一只手就数得过来。每个人都很熟悉它们，而且每个服务都由特定开发者编写。到了集成测试阶段，我们这个地理分散的团队所有成员都会加入语音会议，有时会持续一整天。团队会紧张地盯着屏幕共享，看被指定的“部署”工程师执行一连串晦涩命令，把所需代码元素部署到测试环境；当发现缺少配置参数时大家会沮丧叹气；最终在测试工程师发出“全部通过”信号后才松一口气。这就是我们（手动）持续集成流程的第一个版本。


    随着本地部署的容器平台被重建，这一流程几乎在一夜之间完成了演进。作为重建的一部分，部署流程也发生了巨大变化。突然之间，代码提交会触发流水线，自动构建并部署到下一个测试环境。一旦在低层测试环境确认功能无误，开发者会发起一个拉取请求（pull
    request），且必须经过评审与批准，代码变更才能合并到主分支。这个动作还会触发更高层流程，将组件部署到预发布环境（staging）。部署流程不会立即将其设为活动版本。此时需要向“中土世界巫师”甘道夫——一个聊天机器人——发送即时消息（IM），然后它会“施法”更新
    Kubernetes 集群配置，把请求路由到新版本。甘道夫只接受团队中特定“霍比特人”的指令，这既维护了发布流程的严谨性，也能在出现问题时快速协助回退到先前版本。


    这个部署流程以简洁取胜，屏蔽了开发团队无需直接面对的大量后端复杂性，并引入了一个明确、可重复、可靠的流程，用于在各环境之间迁移代码。如果部署或测试因配置参数缺失或代码缺陷而失败，就会迫使问题在源头被解决——进而再次触发流水线和流程来完成修复。我们的实施非常幸运，仿佛得到了来自未来、穿越时空而来的
    DevOps 工程师帮助。当他们突然离开后，所有时间红利也随之消失，团队不得不自行支持并更新这个看似复杂的发布流程。


    我希望从这段经历中传达的关键经验是：以迭代方式构建你的 CI 流水线。先以“绝不手动部署”这一基本原则打好地基。然后先落地一个简单流程，再持续迭代。市面上有很多优秀的开源
    CI 工具，比如 Jenkins，以及可部署到本地基础设施的云服务方案。


    当你建立起一个简单、稳定、可重复的流程后，再逐步引入版本管理、聊天机器人和自动化测试等要素。自动化测试对持续交付至关重要，下一节将展开讨论。

    '
- fmt: '## Continuous Delivery (CD)


    At a point in our journey, an over-enthusiastic engineer added in several additional
    validations to the pipeline, which stalled the process. Developers are an industrious
    bunch, and the team found a way to sidestep the validations. The goal of adding
    in extra validations was noble and if followed to the letter of the law, would
    have resulted in higher quality code elements in the target environment. Unfortunately,
    and in all honesty, the team development maturity was not at the required level.


    Anyone who has read the blog detailing the Netflix release process aspires to
    reproduce the same for their development environment. Frankly, the idea of checking
    in code and having it deployed to production 16 minutes later is a utopia we still
    strive for. It is important to remember that this process may have taken time
    to achieve, is possible due to the Netflix system architecture, and may have the
    support of the full enterprise. It has always been one of our key aspirational
    targets to have a streamlined Continuous Delivery (CD) process but be aware of
    the context of your organization. As an established enterprise, we must adhere
    to strict governance gates at each release phase. There are also external systems
    which we are dependent on which use traditional mechanisms, that is – manual deployment.
    Also, to be fair, required service levels for a financial institution may be far
    more stringent than Netflix.


    My recommendation in this regard is to focus and optimize the phases of the CD
    process you can control. Any deployment to a production environment, let alone
    automated, is a massive responsibility and should be done with great care and
    consideration. An automated deployment process can only be achieved with commitment
    from the full delivery team. When a developer uses a new external code package,
    an enterprise security scan should be run as part of the build pipeline to determine
    any vulnerabilities. Developers must also include detailed unit tests as part
    of the commit, which is run as part of the pipeline. Code coverage tooling must
    be included to confirm adequate unit testing. The quality assurance team must
    create new automated test scripts, based on business requirement scenarios and
    not simply rehash the developer’s unit tests. Upon successful completion of the
    automated unit and functional tests, the full team should be confident enough
    to approve the component for deployment. CD is even more about people and process
    than about the enabling technology.


    ## Microservices


    A recent post-mortem review of a batch synchronization solution, which had grown
    into a monolith to address operational issues, provides a great example of how
    a Microservice approach enables DevOps. Figure [8-4](#509947_1_En_8_Chapter.xhtml#Fig4)
    provides a view of the As-Is approach on the left and the proposed To-Be design
    on the right.


    ![../images/509947_1_En_8_Chapter/509947_1_En_8_Fig4_HTML.jpg](images/509947_1_En_8_Chapter/509947_1_En_8_Fig4_HTML.jpg)


    Figure 8-4


    Monolith vs. microservice


    There are several benefits of decomposing the solution into smaller components.
    From a design perspective, it allows a change from synchronous to asynchronous
    process execution by adding a messaging platform. More importantly, from a DevOps
    perspective, it shifts operational control and power away from the Developer to
    Operations. With the earlier process, the original developer of the solution was
    always required to discuss performance issues. The new approach allowed the DevOps
    team to scale the runtime solution without any development changes. Concurrency
    could be controlled through configuration by specifying the number of consumers
    of the message queue. Connections to source and target systems could also be scaled
    independently by adding in more replicas of middleware microservice pods based
    on defined service levels. So DevOps is not limited to automated provisioning
    of infrastructure and CI/CD pipelines – it is an important consideration of the
    detailed solution design.


    DevOps is a `practice` and must become part of the team ethos and culture. It
    is a part of every step of the journey – we discuss Monitoring and Logging, another
    key supporting element of the Operational domain in a later chapter. From a team
    resourcing perspective, be sure to include one, possibly two, dedicated DevOps
    Engineer roles. Establishing and iterating the CI/CD process is an important foundational
    element, and a simple, basic process must be available as early as possible in
    the development lifecycle to prevent the possibility of manual deployments.


    ## Application Development


    As discussed in the chapter detailing our Platform Architecture, we have been
    through many iterations regarding the way our microservices are assembled. It
    is still an ongoing activity as we find new and improved ways in which to achieve
    an objective. The following sections detail our process and technology approaches
    to building implementations which support products of the Marketplace.


    ### Development Guidance


    From the experience of several solutions which have reached the operational environment,
    I would like to highlight the importance of keeping in constant contact with developers
    throughout the development process. Agile environments are fast, and this may
    sometimes result in chaos. Once the API design has been completed and the integration
    approach is defined, it will be handed over to the development team to build.


    This is the point where the vision of the Engineering Lead must be clearly communicated
    to the developers to ensure the solution is built according to the correct pattern.
    I like to think of this process as “painting the target.” It follows the military
    approach of an infantryman in the field shining a laser onto a target which a
    missile fired from hundreds of miles away can home in on. As teams are most likely
    geographically dispersed, sometimes across continents and time zones, take nothing
    for granted. A line between two boxes in a component diagram could be interpreted
    in a myriad of ways by a developer. For example, the connection could be made
    synchronously or asynchronously; it could be done via HTTP or gRPC.


    The developer might not be aware of an available downstream integration another
    team had just built and might unerringly duplicate effort. Be sure to outline
    the definition of done at the outset and to take the time to have detailed solution
    implementation sessions at the start of the development process and at regular
    checkpoints during the sprint.


    An approach which worked extremely well for one of my most challenging projects,
    even with a junior team was four standups, then a sit down. At the end of the
    week, midway through the sprint, we conducted a detailed review with the team
    to determine if delivery was on the right trajectory. These detailed reviews may
    even go down to the code level. Regular checkpoints ensure that issues can be
    identified earlier, and there is sufficient time to resolve. Without regular reviews,
    the issue will most likely be found in the operational environment. This is a
    key process which must be ingrained into the team’s delivery methodology. Note
    that this is not micromanagement or mistrust of the developer but is a call for
    the senior members of the team to take more responsibility for the end delivery.'
