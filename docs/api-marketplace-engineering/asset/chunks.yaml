  trans: '

    ### 微服务


    我可能带有很强的主观偏见——但我认为我们的微服务层是整个平台的魔法配方。公平地说，微服务是以容器为基础的。我的看法是，容器是最佳*配角*，而微服务才是*最佳*主角。我并非一直都这么认为。在加入这个项目时，我职业生涯的大部分时间都在成熟的集成环境中度过，诸如企业服务总线（ESB）、应用服务器和流程服务器这类组件，再加上跨复杂集群配置的部署方式，早已根深蒂固。那时我的观点是：没有这些元素构建出来的集成根本称不上企业级——这可能也和我此前在一家软件
    OEM 工作有关。如果我们去掉微服务层，就能减轻搭建本地容器平台的负担，还可以用传统集成机制连接后端服务。传统意味着安全，我也就可以回到自己在职业生涯中打磨成熟的那套集成“剧本”。


    我仍然记得当时与项目发起人的那次讨论，那次我试图把微服务从平台中移除。我慷慨陈词，主张改用集成软件——我把它描述成一门威力强大的加农炮，可作为 API 网关的底座，而且在企业里早已成熟；相比之下，微服务方案就像豌豆射手，甚至可能走在“前沿中的前沿”*之前*。由于容器是关键目标，我建议继续使用它们——只是让其扮演不那么关键的角色。总结来说，我强调豌豆射手发射的“豌豆”是
    NodeJS——在我看来它是“Web 语言”，而不是像 Java 那样的集成语言。我对自己罗列出的这套反对微服务的论据颇为得意，并安慰自己：我们会在项目节奏没那么紧张时再尝试这项技术。可当裁决结果是“无罪”时，我震惊了。给出的理由是：微服务层能为平台带来高度灵活性，更重要的是速度。这是我职业生涯中见过最准确的预判之一。


    微服务层为我们的平台赋予了前所未有的可控性与多样性，并且是我们成功的关键。早上随口抛出的想法，到了下午就可能变成可运行、可演示的组件。这让我们得以践行“向前修复”的信条——乍看之下也许并不正统。如果遇到测试或运维问题，我们会尽最大努力修复，而不是回滚。起初我非常抗拒使用
    NodeJS，因为我觉得它不像 Java 那样具备我所熟悉的结构性和性能。如今与 NodeJS 共事了一段时间后，这种抗拒已经消散，而这种“缺少结构”的特性反而让团队能够以光速交付代码。表面上看，JavaScript
    很简单，但对其事件循环与异步特性的深入理解，使我们构建出了一个能够轻松处理高并发、低延迟请求的平台。并非每天都一帆风顺，也有一些时候，这种灵活性（比如构建阶段未捕获的变量定义错误）会引发问题。


    NodeJS 很出色，也满足我们平台的需求。但它并不是你要构建的平台的必选项。重要的是要考虑组织在开发语言方面的标准，以及开发与运维人员的技能水平。也就是说，如果一个组织主要使用
    .NET，那么引入 NodeJS 几乎等同于向企业体内注入病毒。还要牢记：编程语言是为理念服务的。任何编程语言，无论是否强类型，都可以采用。问题不在于你用*什么*，而更多在于你*怎么*用。


    当我们在一家成熟企业内部建设 API Marketplace 时，经常发现自己夹在治理严格的 API 网关和风险规避型、奉行“没坏就别修”原则的 IT 能力之间。微服务就是我们的减震机制，它缓冲了这种冲击，并让我们能够在极具进攻性的项目周期内持续交付。


    我们会在本章后续部分更深入地探讨微服务架构。


    ### 数据库


    数据库是任何平台的核心要素，因为它用于持久化交易数据；对我们而言更是如此，因为它支撑了无状态微服务架构。我们最初的方案是将数据库运行在容器平台上。这在提交给内部解决方案对齐论坛的初始设计中占据了重要位置。不幸的是，我们的
    DevOps 德鲁伊技能还不足以攻克 Kubernetes 集群中的持久化存储卷问题，于是我们改用了新的设计策略：我们的 Kubernetes 集群不承载任何持久化存储。希望这个立场能激励某位读者写一本《Kubernetes
    持久化存储傻瓜指南》，我保证买一本。


    然而，这个决定是在激烈讨论与反复权衡之后才做出的。帮助拍板的决定性因素是：数据库管理永远不会是我们团队的核心职能。我们当然可以轻松构建一个数据库容器，但若要做到高可用与容错，就会让容器集群配置复杂得多。如今我们的平台使用企业提供的数据库服务，而从我观察到的数据库管理各个方面来看，我毫不怀疑我们当初做了正确决定。澄清一点：数据归我们团队负责，数据库归企业服务团队负责。

    '
- fmt: '## Integration Strategy


    As the following figures reflect, our microservice integration strategy has evolved
    over time. I find it remarkable that, at the outset of a specific phase, an idea
    or approach seems so fantastic that you cannot wait to roll it out to every component
    in the stack. As the sun sets on this approach, the reverse ideology kicks in
    as the team piles up technical debt items to move to the next approach. I consider
    the evolution of ape to man in the same light as I survey our integration methodologies
    over the years. In our defense, the benefit of hindsight affords this lofty perspective.
    This also offers some solace as our current integration strategy is likely to
    evolve as we discover a more optimal solution.


    Figure [5-3](#509947_1_En_5_Chapter.xhtml#Fig3) shows the integration approach
    used for our first generation of microservices, which underpinned our `MVP`. The
    team took a purist view of a microservice, and the principles of encapsulation
    and isolation were so enshrined that each component was assigned to a different
    developer. The result was that each developer built and embedded their own integration
    logic into the microservice they were assigned. From a post-mortem perspective,
    this is definitely a face-palm moment. In the heat of a `MVP`, with a geographically
    distributed development team and each developer working hard to stay off the bottom
    of the food chain to meet their sprint objective, this is a very probable scenario.
    It came to light much later that the platform one developer integrated into to
    retrieve a list of accounts was the same another developer invoked to retrieve
    mapping reference data.


    ![../images/509947_1_En_5_Chapter/509947_1_En_5_Fig3_HTML.jpg](images/509947_1_En_5_Chapter/509947_1_En_5_Fig3_HTML.jpg)


    ### Figure 5-3


    Embedded integration logic


    The one benefit was that the team met the `MVP` objective. Unfortunately, that
    is where the benefits stop. Code duplication, varying integration approaches,
    larger and heavier deployments is enough reason to make any good integration team
    hang their head in shame.


    Figure [5-4](#509947_1_En_5_Chapter.xhtml#Fig4) shows the next stop on our evolutionary
    journey. Back then our codebase was not as large as it is today and in a moment
    of inspiration, I consolidated all integration logic into a shared library. I
    was especially pleased with my efforts as the shared library would allow in-process
    communication between microservice and backend integration logic. Not only would
    this solution be super performant, but it would also eliminate the horror of code
    duplication. I was so enamored with the shared library concept, I dubbed it a
    “framework.” The home for this prized asset was a `git` submodule, which every
    microservice referenced.


    ![../images/509947_1_En_5_Chapter/509947_1_En_5_Fig4_HTML.jpg](images/509947_1_En_5_Chapter/509947_1_En_5_Fig4_HTML.jpg)


    ### Figure 5-4


    Shared integration library


    Unfortunately, as the number of microservice developers on the team grew, the
    framework grew more and more fragmented. The submodule concept also resulted in
    each microservice referencing a specific variant of the framework. If a developer
    needed a new integration function or operation, they would simply pull down the
    submodule, add the new logic, and embed that version in the microservice. The
    `git` administrators and aficionados reading this are probably rolling their eyes
    wondering how this could ever happen. Again, with a geographically distributed
    team, with developers of varying skill levels and agile delivery targets, even
    good developers can do bad things to achieve a deliverable.


    To this day, I still shudder when I open code elements from this era which have
    not been migrated. We have since come up with a remediation plan. The `git` submodule
    umbilical cord has been severed and each microservice has a local copy of the
    shared library. This may be a reason for you to chuckle as our bid to rid our
    kingdom of the evil of code duplication was not successful and its failure is
    multiplied by each microservice with a local copy of the “framework.” Some development
    teams may argue that duplicated, yet isolated integration code components are
    not a bad approach, particularly in an agile environment – as it allows compartmentalization
    and components to be deployed independently and without the burden that updating
    a shared element could unerringly break components dependent on it. This could
    also eliminate the need for regression testing as only the host microservice would
    need to be tested. Other microservices would continue, untouched by the change.


    As a developer, I am of the firm, possibly dated, belief that if a code element
    is written more than once, it must be re-written as a single element to serve
    multiple consumers, albeit with a different interface. A duplicated framework,
    with copies embedded in each microservice is akin to a catastrophic, world-ending
    event by my classification. Just as an alien race on a planet fast running out
    of resources to sustain its inhabitants would send out exploratory probes for
    a new home, our Research and Development team sought out new integration approaches
    as the framework fragmentation threatened to slow down our delivery and return
    our platform to the dark ages of custom integration logic per microservice.


    Figure [5-5](#509947_1_En_5_Chapter.xhtml#Fig5) illustrates the solution which
    now underpins our platform integration strategy and ensures our evolutionary survival.
    The basic premise is that the integration component is extracted, externalized,
    and only accessible via a well-defined interface.


    ![../images/509947_1_En_5_Chapter/509947_1_En_5_Fig5_HTML.jpg](images/509947_1_En_5_Chapter/509947_1_En_5_Fig5_HTML.jpg)


    ### Figure 5-5


    Dedicated integration adapter


    This has led to the creation of a new category of microservice in our platform,
    which we have labelled as “middleware components.” The various taxonomies of microservices
    in our platform are discussed later in this chapter.


    The inherent benefit is that this reduces code duplication and results in a leaner,
    more streamlined microservice deployment. That is, instead of packaging a version
    of the framework inside the microservice, the framework functionality is externalized
    and accessed via an interface. Unfortunately, this opens the door to a potential
    performance drawback of out-of-process execution. The solution we use to minimize
    this impact is Google `RPC` (`gRPC`), which is discussed in more detail in the
    following section.'
