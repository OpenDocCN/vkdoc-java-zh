    \ will locate the Application referenced by the *Client ID*, verify that the *Secret*\
    \ and redirect URI matches, and if within the refresh validity period, will return\
    \ an *Access Token*.\n\n3.  At this time, the third party has an *Access Token*.\
    \ Note that the *access_token* may have a specified period of validity, typically\
