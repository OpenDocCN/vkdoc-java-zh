    # 11. 结论


    我们的 API Marketplace 实施现已进入第五个年头。值得注意的是，如今平台的发展节奏与活力比以往任何时候都更加蓬勃、更加强劲。我真诚地相信，这个平台如今已经是一个有生命力、会呼吸、*几乎*能够自我维持的实体。当我查看自己的待办清单时，仍然有若干我已识别出的可优化领域。其中一个原因可归因于过去尚不可用的技术选项。我们始终在持续探索如何精简性能与执行——随着平台每次迭代都会出现新的路径和方法，这很可能是一场永无止境的追求。另一个重要因素是，后端产品团队如今非常热衷于将其服务发布给外部使用，而我们也有一份不断增长、已排期交付的
    API 清单。


    坦率地说，在写这本书的过程中，我曾质疑过：这些时间本可以用来继续培育平台。让我坚持写下去的原因，是希望通过分享过去四年的经验，尽力提炼出我们的成功公式——以帮助其他实施从零起步。正如我在多个场合提到的，每一个
    Marketplace 实施都会是独特的，都会根据所在组织的需求与身份进行定制。你将要构建或正在构建的 Marketplace 极不可能采纳文中从平台架构到运营所列出的每一个概念或方法。不过，我由衷希望你在阅读本书时，书中提出的方案能够为你的平台创新提供基础、催化剂或触发点。


    基于事后复盘的视角，以及对许多反复出现主题的细致观察，我坚信我们的公式中有一些关键要素，它们对实施成功至关重要。尽管其中许多并非技术层面，但它们对这一倡议的工程精神不可或缺。


    ## 团队动态


    在第 1 章中，我强调了驾驶 Marketplace 星舰驶向全新且未知领域的关键角色。尽管这些角色可以由有才华的个人担任，但更关键的是这些角色必须作为一个统一体协同运作。在任何长期项目中，人力资源变动都是不可避免的。我们的情况也不例外，团队经历了多次变化，除了我自己和另外一两名成员之外，其他人都发生过更替。


    这让我获得了一个独特的观察视角，见证了多种团队组合，有些成功，有些则不然。我们当前配置之所以最成功，简单来说可归因于出色的团队动态与文化。各种不同的个性，就像《星际迷航》的船员一样，彼此互补，更重要的是彼此平衡。很多时候，意见分歧会多于普遍共识。奇怪的是，这恰恰可能是成功团队文化的原因。通过积极、健康的讨论与辩论来审视多个视角，我们通常能找到最平衡的解决方案。反过来说，如果每个人都很相似，最终结果就会在某个特定方向上严重失衡。


    在每一次讨论中，所有观点都会被听见并被纳入考量。这要归功于舰长出色的引导能力。如果无法达成共识，舰长会在综合所有输入后作出裁决。即使某位成员的方案没有被采纳，他们也会感到被安抚，因为他们有机会表达自己的看法。一旦确定了解决方案或目标，团队所有成员都会朝着同一方向发力。


    > *整体大于部分之和（亚里士多德）。*


    ## 组织支持


    我同样坚信，如果没有强大的企业级服务基础，我们不可能维持完整的运营能力，更不用说建立一个 API Marketplace。这并非我一直以来的看法。在构建最小可行产品（MVP）的早期阶段，我们曾将企业内其他部门视为阻碍成功的因素。第三方开发者利用组织能力这一理念，再加上我们激进的技术选型，远远超前于当时的标准实践。回过头看并加以反思，几年前我们项目团队那种任性与急躁的心态，其实相对不成熟。鉴于我们当时试图为组织构建一个全新的数字渠道，本应采取更审慎、更稳妥的推进方式。API
    Marketplace 位于传统企业边缘、用于连接第三方访问的这一位置特性，很可能既促成了项目团队选择前沿技术，也引发了组织层面的担忧。


    项目团队从“烦躁”到“感激”的心态转变，以及组织其他部分从“怀疑”到“信任”的变化，发生在平台运营化的过程中。通过利用企业能力，我们继承了资深专家的经验与专业知识，这帮助平台从受控实验环境下运行，快速走向能够可靠承载真实世界工作负载的成熟状态。通过展现更多耐心与韧性，我们也得以更好地传播
    API Marketplace 能为整个组织带来的能力与覆盖范围，并从企业各个领域争取到支持。


    我个人和职业层面学到的一条关键经验是：试图绕开流程与治理，往往需要付出更多时间和精力。与其如此，不如给予组织应有的尊重，学习如何在现有流程中推进，更重要的是理解其功能与目的。很大概率上——你会发现这些机制是在保护组织及其用户。一旦你真正掌握了流程及其作用，再尝试围绕敏捷性进行优化。


    > *首先要寻求理解。*

    '
- fmt: '## Agility to Pivot


    There were a few occasions when our mission of establishing the platform faced
    significant challenges, sometimes threatening the very existence of the initiative.
    Standout examples include a key backend provider for our first API product withdrawing
    at the last-minute due to regulatory requirements and a high-profile third-party
    consumer likely to miss a key annual target due to trouble consuming a new API.


    The speedboat operating model, discussed in Chapter [1](#509947_1_En_1_Chapter.xhtml),
    allowed the project to pivot on a dime and change direction quickly. Interestingly,
    to mitigate the loss of the key backend, a system of far less importance and visibility
    in the organization was selected as a replacement as it provided similar, but
    lesser used functionality. At first, the project team was disappointed that we
    were not launching with more fanfare that the higher profile backend would have
    afforded. Over time, this fast changed to relief, as we observed the challenges
    of supporting a live API and how ill-prepared we were to transition from prototype
    to execution. In all honesty, had we launched with the higher-profile API, we
    would not have had sufficient time to stabilize our operational platform.


    Apart from the learning that our APIs should be designed to be far simpler and
    the need for active third-party developer engagement, the potential bombshell
    of missing a key milestone date resulted in the creation of a new integration
    model. This allowed the platform to absorb complexity where possible to fast-track
    API adoption. This pattern has since become a cornerstone of our Marketplace and
    is actively used for future product design. The silver lining from this encounter
    is that an API Marketplace implementation is not strictly black-or-white. In true
    start-up mindset, the team and platform should do everything possible to create
    and sustain third-party adoption. If that means handing out T-shirts and mugs
    at developer meetups to spur interest or building a user interface to support
    an API,


    > Do what needs to be done.


    ## Developer Centricity


    As discussed in the chapter on monetization, the key element powering the Marketplace
    is the third-party developer. I can unreservedly say that everything exists for
    third-party consumption. Although your Marketplace may have the widest range of
    API products and built on a superb ground-breaking technology platform – without
    active third-party participation, the initiative is lost.


    APIs should be conceptualized and crafted with third-party needs, interest, and
    aptitude in mind. Technical teams may become enamored with the cool factor and
    bragging rights of integrating into a legacy mainframe using a morse-code protocol
    developed by the founders of the Unix operating system. If the functionality it
    exposes is of no interest or little use to consumers outside your organization,
    the effort is wasted. Product owners have the unenviable task of bridging the
    digital divide between semi-delusional backend providers who believe their legacy
    system has ground-breaking capability and flighty third-party consumers looking
    to build the next killer-app.


    The Sandbox concept, discussed in great detail, is a tool which can and must be
    used to facilitate this interaction. It is not simply a mechanism to support third-party
    testing. It can be used to gauge third-party interest and demand, shape an API
    definition and most importantly as a buffer between super-agile external consumers
    and a more stoic, well-governed, traditional enterprise ecosystem.


    Finally, and possibly most importantly, the developer portal is your Marketplace
    shopfront and represents the first interaction between a third party and your
    platform. The next time you stand in front of a physical store or land on a new
    ecommerce portal, consider the decision-making process that would result in further
    engagement. With that in mind, launch your developer portal and consider it from
    the perspective of a third-party consumer. This should constantly and honestly
    be done by everyone in the team, even friends, family, and colleagues from other
    teams to get as much feedback and review as possible.


    Engage your third-party community as quickly as possible to solicit feedback and
    understand your market. The developers or third parties in your territory may
    need assistance and support to use your platform. Be sure to keep this in mind.


    > The Developer is the center of your universe.


    ## Where to Start


    By now, the task of building an API Marketplace may seem to be incredibly difficult.
    After all, you are establishing a new digital channel into your organization,
    and such a capability needs to be underpinned by a planet-scale platform architecture.
    Not to mention APIs which must be superbly designed, developed according to agile
    principles with enterprise-level support.


    At this point, I would like to share with you my number one coding principle:


    > Build simple and iteratively.


    The principles, platform architectures, approaches to design, agile development,
    and operational procedures shared throughout this book have evolved over years
    and are still evolving. Our implementation started with a single API product to
    demonstrate an MVP. If I had to do it over, I would drastically reduce even this
    humble scope. It is possible, even advisable to start a sustainable API Marketplace
    with a handful of API products. The products could serve a niche function, and
    the platform can most certainly operate on a legacy architecture – as long as
    it is stable. Limit the number of initial API products – I would suggest a maximum
    of two to start. Resist the temptation of having a developer portal (shopfront)
    full of products. In the humble opinion of a developer, having one fully functioning
    API is far more impressive than ten “coming soon” indefinitely.


    It is also easier to retrofit fewer products – for improved performance, monitoring,
    and operational visibility. A key lesson throughout this book, and one I have
    learnt through many years of integration experience, is that the interface serves
    to support the greater solution. As long as it is stable, predictable, and reliable,
    consumers are not really concerned if it uses the power core harvested from an
    advanced alien spacecraft which crashed to earth or archaic processes which were
    used to build the pyramids. Allow your platform architecture to evolve over time
    – in line with the needs and requirements of the Marketplace. Again, restraint
    is advised as this is an opportunity to use the latest and shiniest technology.


    Set a timeframe, possibly as short as three months, not longer than six, to publish
    your first API and iterate from there.


    ## Keep in Touch


    In writing this book, I have drawn on years of experience, predominantly integration,
    across a wide range of projects and contexts. One of the marvels of working in
    technology is that there are many, possibly infinite ways to solve a problem.
    This is the reason I can’t wait to open my notebook everyday as I get a new problem
    to solve – in my way. I would be especially keen to learn of your API Marketplace
    journey and the approaches that you and your team adopted to solve challenges
    – maybe in the same way we did, maybe (and very possibly) in a completely different
    way. Please feel free to stay in touch and let me know if you have any thoughts,
    suggestions, feedback, even counter-arguments, or criticism to any of the content
    throughout the book.


    I believe that we can only go forward if we share and work collaboratively. I
    look forward to hearing from you.'
