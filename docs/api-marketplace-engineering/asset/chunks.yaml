  trans: '

    ## API 优先，技术其次


    在我职业生涯的早期，我曾深深迷恋 Java。更具体地说，是 Java Enterprise Edition（JEE）。我曾梦想着各种 bean——Enterprise
    Java Beans（EJB）——并且乐于与志同道合的朋友和同事进行长达一小时的讨论，辩论无状态会话 bean 相比有状态会话 bean 的优势，同时也对消息驱动
    bean 的并行处理能力颇为欣赏。经历了几次角色转换之后，我意识到自己把关注焦点调到了最大放大倍数，以至于看不到更大的全局。


    简而言之，集成需求的首要目标不是应该*如何*实现，而是*为什么*要实现。对开发团队来说，这可能是个很难接受的信息——但 API 消费者真正期待的只是对请求的响应。消费者其实并不关心实现细节——请求究竟是通过最新的人工智能（AI）云产品处理，还是通过几十年前的大型机处理，并不重要。最核心的目标是一个一致且可靠的接口。


    面对当今丰富多样的技术选项，人们很容易一头扎进“兔子洞”，试图寻找最优、甚至可能是最前沿的实现方案。在一个正在兴起的 API 市场中，尤其是在数字化语境下，这种倾向很容易成为常态。尽管我也很享受折腾新技术，但在方案设计时我强烈建议保持克制。始终要记住，技术是为达成目标而服务的。


    一个我很喜欢的例子是实现一个用于获取参考数据的接口。为了让这项看似平淡的任务更有趣一些，积极的开发者可能会尝试缓存响应。策略往往从一个简单的内存缓存开始，这在单实例场景下运行良好。但如果是分布在集群不同节点上的多实例呢？缓存是否需要数据持久化（这可能需要
    Redis 之类的技术），还是仅基于内存（这可能需要 Memcached）？既然这是第一次实现缓存，方案应该部署在哪里？本地部署还是云上？缓存失效策略怎么办？我们应当如何、又在何时清理缓存中的陈旧数据？尽管这些目标本身合理，但你可以看到
    API 的关注点如何从参考数据的*获取*偏移到了数据的*缓存*上。


    我多次观察到，次要和非核心目标如何影响并拖慢需求交付，因为这些任务已经被嵌入进了解决方案之中。在敏捷环境下，目标是尽可能快地发布一个最小可用、具备功能的方案。注意，这与“薄如蝉翼”的实现不同——后者本质上只是一个带有模拟响应的接口。


    回到参考数据这个需求，第一轮迭代要尽快上线，应该先做纯粹的数据获取。通过暴露一个能对请求做出响应的 API，即便延迟较高，消费者也能先感受到集成流程——从接口规范到返回数据。即使在设计阶段或后续性能测试中已经提出了性能优化需求，这种策略也应坚持。如果在更好性能和更快开发之间二选一，在紧迫交付周期下，项目经理很可能会选择后者。对于性能需求，一个折中方案可能是在客户端实现缓存。


    这一理念很大程度上借鉴了 Facebook 的一句格言：


    > *完成比完美更好。*


    要克制在接口生命周期早期就进行优化的诱惑。从简单开始，持续迭代。聚焦核心任务，例如从源到目标的映射。*识别*可改进区域，例如用于性能优化的缓存、分页和过滤。同时，也务必考虑其他可能没那么“有趣”的领域——例如安全、校验和错误处理。即便只是开发环境中的一个可运行
    API，也应在产品负责人和工程负责人的协助下对需求进行优先级排序。基于多年的经验，我非常确信：安全性、可靠性和一致性通常会优先于性能。请始终将 API 的目标置于焦点之中。


    ## 团队结构


    与普遍认知相反，开发并不只是一个开发者在昏暗房间里独自敲键盘。借用一句非洲谚语“养育一个孩子需要整个村庄”，交付一个 API 同样需要团队协作。这个产品远不止几行代码，而是依赖于从设计到实现全过程中的以下角色。

    '
- fmt: '## Delivery Lead(s)


    Delivery leads are responsible for coordination and scheduling of activities to
    build the product. This is a challenging task and requires careful coordination
    across several streams, as illustrated in Figure [8-1](#509947_1_En_8_Chapter.xhtml#Fig1),
    to ensure timelines can be met. A significant amount of diplomacy is required
    as external teams and systems may provide critical dependencies and each element
    must be carefully orchestrated to minimize delays.


    ![../images/509947_1_En_8_Chapter/509947_1_En_8_Fig1_HTML.jpg](images/509947_1_En_8_Chapter/509947_1_En_8_Fig1_HTML.jpg)


    Figure 8-1


    Orchestrating API development


    Let us consider how some of the external entities take part in the development
    process and the responsibilities of the Delivery Lead:


    - `Provider`: Will supply specifications of existing interfaces, timelines of
    development of new interfaces, and availability of subject matter experts to field
    developer queries. Any delays from the backend could impact development and testing
    activities.

    - `Consumer (third-party provider)`: Will request specifications of the API product
    and timelines regarding the availability – either in a Sandbox (discussed in a
    later chapter) or Live capacity, and work with the Product Owner to coordinate
    onboarding activities such as screening and approvals to pre-empt administrative
    delays.

    - Finance and reporting: Forecast timelines for product delivery and potential
    cost recovery from external teams, manage the budget for API delivery and operational
    support of the product being built, and provide regular reporting to project stakeholders
    regarding delivery and to manage expectation regarding timelines.

    - Development: Ensure a smooth, uninterrupted path for developers by providing
    approved designs and backend interface specifications when development begins,
    access to subject matter experts for speedy resolution of queries, and access
    to enterprise resources.


    As there could be a number of APIs in development at any point in time, the Delivery
    Lead has insight across multiple products and may prioritize the delivery of one
    product over another. For example, if a more urgent API requires additional developers,
    the teams may have to be rebalanced.


    A valuable lesson, from years of project experience, is that there is a limit
    to the number of people you can throw at a problem. That is, some tasks take a
    specific amount of time and cannot be delivered faster with additional team members.
    It is essential that the team management understands and appreciates this concept
    as the adage of too many cooks spoil the broth could very easily come true as
    time could be lost by time lost bringing new members up to speed and splitting
    tasks could result in dependencies and budget over-runs.


    As there are several balls to juggle, a strategy which has worked remarkably well
    for our implementation was to divide the Delivery Lead roles among individuals
    having commercial or technical focus. This allows us to have a person dedicated
    to chasing commercial objectives such as Finance and Risk and another person focused
    on closing out technical targets such as approvals from Architecture and Security.
    There are areas of overlap which reduces a single person delivery – the technically
    inclined Lead can draw on assistance from the Project sponsor, and similarly the
    commercial Lead is supported by the Engineering team if his counterpart is not
    available. This dynamic duo, as I like to refer to them, ensures that all requirements
    of the delivery spectrum are considered which keeps our project in equilibrium.


    ## Developers


    Integration development, by its nature, is generally fast paced as the interface
    between two systems is often on the critical path for overall project delivery.
    Whereas traditional project timelines generally run into months, our delivery
    targets are sprints, which could be a week at minimum, two weeks at maximum. The
    driver is that third-party consumers, generally working in hyper-speed paced environments,
    also have faster release cycles making time to market a critical factor.


    Our philosophy to handle the rapid delivery cycles is to iterate on an API product
    in each release. That is, instead of waiting three months for a big-bang rollout,
    we provide basic functionality and update on each deployment. This does add some
    complexity to development as fixes or updates to a previous version may be required
    while work is underway on a new version.


    There are many facets to consider as part of the Developer journey. Let us consider
    a few, which I consider key to success.


    - Ownership: A significant portion of our development team are full-stack engineers.
    Niche skill developers may be necessary from time to time, but a developer should
    have the ability to solve problems outside their immediate area of expertise.
    As an example, a developer may suggest changes to an API definition and provide
    the swagger updates for review. Critical to ownership is timely communication.
    As development may span a range of systems and personnel, such as an API Gateway,
    microservice and datastore, communication is key for successful delivery. In a
    delivery cycle measured in weeks, losing hours waiting to report an issue at the
    next team meeting could result in missing the target date. Members of the team
    are strongly encouraged to attempt to resolve blocking issues on their own if
    possible and to escalate for assistance if they cannot. Granted, there may be
    some challenges such as accessibility to backend subject matter experts which
    cannot be overcome. In these instances, the team culture should be to pivot –
    make an assumption and continue, pause the activity, and move to a non-dependent
    task or send a message to the rest of the team indicating availability to assist
    with another task.

    - Unit testing: In an agile, fast-paced delivery environment, good and proper
    unit testing may be one of the sacrifices made to achieve aggressive delivery
    timelines. I have observed over many implementations that the proverbial “can”
    is kicked down the road and developers hope that any issues will be identified
    and resolved during later phases of quality assurance. It is important that the
    team makes a global and conscious decision regarding the level of unit testing.
    In most instances, reduced unit testing is due to delivery pressure. Project stakeholders
    must understand that unit testing is a vital element of the development process
    and take accountability if this is short-circuited in lieu of faster delivery.
    This could also be mitigated by confronting the issue head on instead of ignoring
    it. That is, an early iteration could have basic functionality, released under
    a beta banner. A planned release, later in the cycle, could focus explicitly on
    testing and quality assurance. This strategy could alleviate delivery pressure
    – get a version out the door as quickly as possible but with a firm commitment
    to harden the solution before full rollout.'
