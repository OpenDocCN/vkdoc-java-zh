    Business to Business (B2B) APIs are used for to achieve system-to-system integration
    and limited to a smaller, more familiar audience. Using certificates as a security
    mechanism may simplify the network requirements for this integration pattern.


    Finally, we discussed the most popular and widely used, Business to Consumer (B2C),
    pattern. With this pattern, an end user provides consent for a third party to
    initiate a request on their behalf or to access their data. To understand how
    this can be achieved using industry standards, we delved into significant detail
    of the OAuth process. With a firm understanding of actors, scopes, grant types,
