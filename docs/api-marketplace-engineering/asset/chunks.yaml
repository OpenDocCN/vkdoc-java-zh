- fmt: '## Background


    Digital payment services have underpinned the e-commerce boom. From simply capturing
    credit card details to paying for the items in an electronic shopping basket,
    the capability has improved significantly. On the face of it, the participants
    in the transaction should simply be the end user, the online retailer, and the
    Financial Institution. Due to the myriad of banks, complex agreements, and interfacing
    mechanisms, innovative Financial Technology (FinTech) companies have established
    themselves as a new, integral participant by stepping in to abstract the complexity
    and providing an easy to consume service for online retailers.


    One such service is payment initiation. Figure [2-1](#509947_1_En_2_Chapter.xhtml#Fig1)
    shows how an online retailer can simply integrate into a single payment provider
    which can leverage its network of interfaces into various banks instead of directly
    integrating with each bank.


    ![../images/509947_1_En_2_Chapter/509947_1_En_2_Fig1_HTML.jpg](images/509947_1_En_2_Chapter/509947_1_En_2_Fig1_HTML.jpg)


    Figure 2-1


    Direct vs. brokered integration strategy


    ### Screen Scraping


    Using the online banking channel, third-party payment providers have been able
    to achieve integration into banks through the practice of screen scraping. Screen
    scraping is the technology that reads and extracts data from a target website
    using computer software that impersonates a web browser to extract data or perform
    actions that users would usually perform manually on the website. To make the
    payment, the customer would provide their banking credentials (username, personal
    identification number (PIN), and password) with the provider, who would use this
    information to kick off an automated process to log in to the user’s online banking
    portal and make the payment.


    A benefit to the end user is convenience – it saves time connecting to the online
    banking portal, capturing the banking details of the retailer, setting up a payment,
    and sending confirmation of payment. The process is also streamlined to fit neatly
    into the checkout journey, and most customers do not know that they are logging
    on to their online banking directly. As traditional interbank electronic funds
    transfer (EFT) can take several hours, even days to reflect, a benefit to the
    merchant is that the payment provider can offer confirmation of payment in real
    time. As the payment provider connected to the user’s online banking portal, verified
    funds and performed the transaction, the merchant can be assured that the payment
    was done – instead of relying on a confirmation of payment provided by the end
    user, which could be subject to fraud.


    The inherent drawback of this practice is that accessing a customer’s financial
    information using screen scraping has generally been found to be less secure from
    a data privacy and consumer protection perspective. As it poses risks to the integrity,
    safety, and efficiency of payment systems and to the customer, there have been
    a growing number of interventions from banking regulators to curb this approach.


    Screen scraping allows the practice of sorting at source. This allows a payment
    provider with bank accounts with a number of different banks to sort the payment
    instruction per bank and relay them on to each respective bank – which would in
    turn process them as internal transactions. Although sorting a source model may
    sound like a more optimal way to reduce costs and increase the speed of clearing,
    it is prohibited under certain regulatory policies and rules as it reduces interbank
    clearing. Screen scraping has been a popular mechanism of payment initiation and
    account aggregation because of a lack of legal frameworks and policies in the
    banking sector that allow the sharing of customers’ financial information securely
    with third parties.


    ### Application Programming Interfaces (APIs)


    To address this issue, banks have been exploring APIs as an alternative to share
    customer’s financial information and to support innovative payment solutions to
    improve the customer experience. APIs, in a traditional banking context, have
    been largely internally focused, proprietary, non-standardized, and inaccessible
    to external consumers – known as “closed APIs.” Conversely, “open APIs” are used
    by third parties to create innovative applications and products that extend the
    reach to customers and improve the user experience.


    A benefit of APIs in banking is that they can be leveraged to share customer data
    with third parties in a secure manner with consent from the customer and without
    sharing login credentials. Third-party applications can connect directly into
    the banks’ systems from the public domain to obtain account information, initiate,
    and track payments. If the API is owned by the bank, there is concern that this
    could give the bank too much power as it controls which data is shared. This could
    result in banks playing a gatekeeper role, which could be anti-competitive and
    inhibit innovation. The concept of “Open Banking” emerged as a way for third-party
    providers to securely gain access to customers’ financial information from banks
    using open APIs in order to leverage innovative technologies and improve customer
    experience. We delve into Open Banking in more detail in the next section.


    ## Open Banking


    Due to increased demand from customers for access to and control of their data
    and from third-party providers eager to disrupt, the banking industry faces an
    imminent revolution. Open Banking presents an opportunity for a graceful, controlled
    transition and, more importantly, for banks to remain a vital part of the new
    ecosystem. Customers have greater control of their financial data, allowing them
    to make more informed decisions and better manage their money. Increased competition
    will result in broader, more diverse service offerings and innovation from third-party
    providers and banks alike.


    ### Objectives


    We consider some of the objectives for an Open Banking policy:


    - Financial stability and security: Sensitive customer data shared across platforms
    must be secured to preserve confidence in the entire financial ecosystem.

    - Transparency and public accountability: Customers should understand the risks
    involved with the use of their banking credentials, including the limited liability
    accepted by many third-party providers. Any open-banking implementation should
    outline the processes and timelines for a third party to be granted access to
    financial data that customers have elected to share. The sharing of data with
    other parties in the value chain should be prohibited to protect customer data
    rights.

    - Standardization and neutral technology: Standards for APIs, data processing,
    storing, and cybersecurity must be clearly defined to allow easy integration to
    multiple banking platforms without the need for customized development.

    - Promotion of financial inclusion, competition and innovation, and cost-effectiveness:
    Open Banking may help to create a level playing field for all stakeholders to
    offer services and solutions. It should allow banking services to a wide range
    of customers – from offering high-earners a personalized investment product to
    assisting underbanked customers to access banking services. From an implementation
    perspective, smaller banks and third parties should be able to participate without
    significant investment capital and technological infrastructure.'
