    To the Apress team – Jonathan Gennick, Jill Balzano, Robert Stackowiak, Laura
    Berendson, and Welmoed Spahr – I cannot thank you enough for this opportunity
    of a lifetime. It is uncanny – although we are continents apart, I have continually
    felt your guidance and presence throughout the process.


    Last, but not least, special thanks to Marco Vidulich and Ray Naicker for their
    leadership and uncanny ability to see around corners and the courage and resolute
    conviction to pioneer unchartered territory to build what has become Africa’s
    leading API Marketplace.


    About the Author About the Technical Reviewer


    # 1. API Engineering


    An API Marketplace is a platform for an organization to share internal services
    with third-party developers. The Application Programming Interface (API) is the
    mechanism used to achieve the access. Capability is packaged into different products
    – for example, to access customer data or to send messages on a GSM network. Much
    like a real-world Marketplace, this is the rendezvous point between the organization
    (seller) and third party (buyer) where the products are advertised and consumed.


    Some API Marketplace initiatives start out of necessity – to meet regulatory compliance
    – some to play catch-up with competitors, while others are purely evolutionary.
    Ours started with a Vision. The aim was to empower third-party providers to harness
    the capability of our enterprise to better serve the needs of our customers. The
    altruistic view is that it results in a positive outcome for all participants.
    A win for the organization – revenue through increased consumption. A win for
    our customers – improved service through innovation. And importantly, a win for
    a third party – the ability to leverage established organizational capability
    to build a new product or service.


    As pioneers in our market, even country, we were not bound with the shackles of
    project deadlines, or to meet regulatory timelines, and did not have competitors
    nipping at our heels. From the outset, we were acutely aware that an API Marketplace
    is a tremendous and rare opportunity to build a new digital channel to work with
    external parties, but the initiative needed to sustain itself and to generate
    revenue. We were fortunate to be given a blank slate and the latitude to make
    technology decisions which were outside the standard convention of the organization.
    Our key learning is that the foundational elements of the Marketplace are Technology,
    Process, and most importantly – People.


    In this chapter, we start with the enabling technology element, the API, the capabilities
    it can afford, and ways in which large organizations have successfully used it.
    We then discuss the API Marketplace process, its purpose, and operation relative
    to the greater organization. We then move on to the people element and discuss
    the key roles which underpin an API Marketplace implementation.


    ## APIs in Action


    Every night, before I go to bed, I walk up to one of the many Amazon Echo devices
    scattered around my home and casually whisper “*Alexa, Goodnight*.” The TV, Audio
    Visual (AV) equipment, and lights turn off, and Alexa whispers a sweet message
    bidding me goodnight. One day, I will hopefully have a smart lock which will join
    that routine. To the layman, this may seem easy to achieve – however, this is
    integration engineering at its finest. It is simple, reliable, and easy to use.
    And it is all underpinned by APIs.


    The words I spoke to Alexa were sent to a speech recognition service which converted
    the speech to text. Thereafter a Natural Language Understanding (NLU) service
    converted the text to an Alexa intent. The intent triggered smart home skills
    which interface to my universal remote and light automation via APIs. For this
    seemingly simple request, it triggered a wave of activity that probably spanned
    continents. Let us zero in on the light automation piece of this scenario.


    For the light automation, there is a hardware relay which responds to a radio
    signal to either switch to an “on” or “off” state. To achieve this, the manufacturer
    created a transmitter and a receiver. So, instead of using the traditional light
    switch, which is physically embedded in the wall, I can send the request from
    a mobile transmitter. The manufacturer also provided the capability to initiate
    the request using a mobile device. To be honest, this was one of the key requirements
    for my selection of this specific relay – as being able to turn lights on and
    off remotely, especially when friends are over, is every techie’s dream. However,
    what really clinched the deal for me was an arbitrary reference to an API on a
    lonely link in the corner of the product documentation.


    The API allows direct software integration via HTTP to the relays without using
    the manufacturer’s proprietary hardware interface. By exposing the API, the potential
    of the relay increased significantly. Trigger events are not limited to the remote
    transmitter or even the mobile application. It could be linked to sensors which
    determine the level of light, motion, or occupancy. It could also be linked to
    external services like Amazon Alexa or Google Assistant – and triggered by voice
    command. Possibilities are endless, and the humble relay which is hidden away
    in an electrical duct is now a meaningful contributor in a greater ecosystem.


    And the pivotal component, which makes that ecosystem possible, is an API.'
