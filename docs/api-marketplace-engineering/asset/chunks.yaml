  trans: '

    ### Google 远程过程调用（gRPC）


    坦白说，当有人提出使用 gRPC 时，我的第一反应是尽快否决它。我把 RPC 和微软组件对象模型（COM）/分布式组件对象模型（DCOM）的黑暗年代，以及复杂的通用对象请求代理架构（CORBA）配置联系在了一起。尽管我很喜欢分布式组件这个概念，但我过去在让它真正跑起来这件事上的经历是痛苦的。我不想让我们的平台承受这种复杂性，因为它会让运维开销呈指数级增长。所以，我选择继续走那条最安全、也是最多人走过的路。归根结底，微服务通信将通过经典的
    HTTP 来实现。毕竟，我们已经要处理诸如本地部署 Kubernetes 集群这类多变因素，一想到还要在技术栈里再加入一个新的、而且在当时相对未经充分验证的技术要素，我就不寒而栗。


    直到 6 个月后，当我跑完一个基础教程时，我才突然意识到 gRPC 有潜力彻底革新我们的平台架构。开始教程几分钟后，我难以置信地盯着屏幕：来自一个终端窗口的客户端请求，竟然神奇地——更重要的是，轻松地——出现在另一个窗口中。这项技术有很多优点，我稍后会一一称赞。其中我最欣赏的是它的简洁性。gRPC
    的核心是一个简单的服务定义，它使用协议缓冲（protocol buffers）来定义请求和响应对象。gRPC 负责处理组件之间、不同语言之间以及不同环境之间通信的复杂性。`*.proto*`定义是客户端与服务端之间唯一共享的组件。这也给了我们一个机会——虽然截至目前我们还没有使用——即在同一技术栈中采用不同的编程语言。而且，由于大多数语言都提供了客户端库，这件事变得更加容易。gRPC
    是使我们能够从共享集成库（图 5-4）过渡到专用集成适配器（图 5-5）的关键技术。由于使用了更新版本的 HTTP 标准及其传输协议，gRPC 的性能远高于
    REST。


    远程过程调用（RPC）有四种类型：


    1.  **一元 RPC**：客户端发送一个请求并获得一个响应。例如，客户端向服务器请求当前时间。我们平台中的大多数组件都使用这种通信方式。我的建议是先从这里开始，如果有需要，再按需探索其他机制。


    2.  **服务端流式 RPC**：它与一元 RPC 类似，不同之处在于服务器会针对客户端请求返回一个消息流。例如，从服务器下载一个二进制文档时，客户端发起文件请求，服务器将文件拆分为多个块，再以流的形式发送给客户端，客户端重组后进行处理。我们使用这种机制从企业内容管理系统中获取文档。


    3.  **客户端流式** **RPC**：它也与一元 RPC 类似，不同之处在于客户端向服务器发送的是一个消息流，而不是单条消息。例如，向服务器上传图像时，文件会被拆分成多个块，然后以流的形式发送到服务器，由服务器重组图像后进行处理。我们使用这种方式上传图像以进行光学字符识别（OCR）处理。


    4.  **双向流式** **RPC**：客户端和服务器可以按任意顺序读取和写入消息。例如，图像可以由不同的光学字符识别（OCR）引擎处理，每个引擎的响应会通过独立的数据流返回。


    gRPC 是技术简化从而推动大规模采用的一个典型例子。我也将这段经历视为一个鲜明提醒：要对新概念和新方法保持开放心态，并对抗先入为主的观念，从而持续演进我们的平台架构。此后，我已经向那些最初建议使用
    gRPC、却被我惹恼的工程师道了歉，并且理所当然地将这项技术的发现与引入归功于他们。话虽如此，我仍保留“武器化”这项技术、并将其从研发构想推进到生产运行环境这一功劳的主张。


    ### Port-Forward 的威力


    由于我们的业务逻辑组件可能需要利用多个集成微服务来完成某个特定功能，组装整体解决方案变得越来越有挑战。DevOps 持续集成（CI）流水线可用于将代码部署到服务器。CI
    流程在环境间迁移方面非常出色，但对于初始开发任务而言，我认为使用 CI 流水线就像在和远方星球上的人对话。你说一句话，然后要等一段时间，直到消息被接收并回复后，才能继续。作为一个没耐心的开发者，我要求能够立即修改并立刻观察结果。这只有通过本地开发环境才能实现。


    我最初建立这套环境的方式是：在本地分别启动每个微服务，每个服务放在独立终端、监听不同端口。每次开发会话都要花不少时间来完成这项准备，但前期的时间投入能节省数小时，因为我不必等待
    CI 流水线。我当时对这个搭建颇为得意，每打开一个终端标签页、启动一个微服务，我都会暗自为自己点赞。


    一位开发同事给出的专业建议，让我猛然意识到残酷现实：我这是在更辛苦地工作，而不是更聪明地工作。解决方案是使用 Kubernetes 命令行工具 *kubectl*
    的 *port-forward* 能力，启动一个本地监听器，把请求路由到运行在 Kubernetes 集群中的 gRPC Pod。这个概念如图 5-6 所示。


    ![../images/509947_1_En_5_Chapter/509947_1_En_5_Fig6_HTML.jpg](img/509947_1_En_5_Fig6_HTML.jpg)


    图 5-6


    Port-forward 连接性


    这使开发者能够基于以下策略，混合使用本地与远程组件来构建解决方案：


    *   远程 gRPC 微服务 Pod（A、B）监听端口 *50051*。之所以可行，是因为它们分别运行在独立的容器实例中。


    *   本地 gRPC 微服务（X）监听端口 *50051*。由于它运行在我的本地机器上，其他本地进程不能再使用该端口。


    *   本地 *port-forward* 进程监听端口 *50052* 和 *50053*，并将流量分别路由到 gRPC A 和 B。


    *   应用被配置为：服务 A 使用端口 *50052*，服务 B 使用端口 *50053*，服务 X 使用 *50051*。

    '
- fmt: '### Taxonomy


    Not all microservices are created equal, and, over time, we have created different
    categories of components. From previous roles as a Technical Architect, I prided
    myself on creating well-defined, layered architectures. Each component fit into
    a specific layer and, like a military chain of command, a strict protocol was
    enforced – a component was only allowed to receive requests from the immediate
    layer above and could only relay requests to the layer below. Although the Architecture
    diagrams were great, they did not translate well from a development and execution
    perspective. Integrating into a new backend, adding or updating business logic
    required changes to various layers which slowed down delivery and increased operational
    overhead. Adding in new elements into the architecture also caused significant
    angst and architectural conjecture when solutioning.


    Based on the battle scars of trying to compartmentalize components into layers,
    we have deliberately adopted a fairly “loose” architectural pattern. Like our
    team organogram, we have a flat structure and do not have a hard and fast rule
    that only certain types of components can interact with another. The relationship
    between components, as illustrated in Figure [5-7](#509947_1_En_5_Chapter.xhtml#Fig7),
    has evolved organically. The key focus is on functionality and one of the core
    principles is reusability.


    ![../images/509947_1_En_5_Chapter/509947_1_En_5_Fig7_HTML.jpg](images/509947_1_En_5_Chapter/509947_1_En_5_Fig7_HTML.jpg)


    Figure 5-7


    Microservice taxonomy


    Our platform has the following categories of microservices:


    ## Middleware


    The key objective of these components is to encapsulate integration to a backend
    platform. The microservice abstracts `REST`, `SOAP`, on-premises, or Cloud-based
    services and presents a standard, `GRPC`-based interface to the consumer. This
    allows us to implement changes, such as moving to later versions, without impacting
    consumers of the microservice – as long as we maintained the service contract
    (`gRPC` proto definition). All access to a backend or supporting system must be
    done via a middleware component.


    An example of this is database access. In contrast with our first generation microservice
    architecture, which allowed any component access to the database, only specific
    middleware components may integrate to our datastore. This affords us the bragging
    right of being able to switch database providers as well as from a document to
    relational database easily. Credentials and configuration for backend systems,
    across various environments, are contained and isolated within a specific middleware
    component. We also do our best to maintain a neutral service contract and do not
    allow “bleeding” of backend data structures to consumers. A key function of this
    component is to parse, process, and transform system-specific responses into a
    neutral `gRPC` response.


    ## Connectivity


    This type of microservice is used as a protocol communication bridge. The component
    is geared to accept a request in Format `A` and convert that to Format `B`. For
    example, we use a Connectivity component to consume messages from a Kafka topic
    and prepare it to be written to a datastore. These components are generally event-based
    and are optimized for high-throughput, low-latency processing.


    ## Service assembly


    This is a “higher-order” microservice and is an example of organic evolution of
    our integration platform. While solutioning a new requirement, the team identified
    that certain pieces of logic were repeated in more than one Business Logic microservice.
    This presented a unique challenge as this was not backend integration logic but
    conflicted with our mantra of eliminating code duplication. To resolve, we used
    the same process as we did for backend integration. That is, we extracted the
    repeated logic, isolated, and externalized it as a new component, accessible via
    `gRPC`.


    A classification for this type of component would be centralized Service Orchestration.
    The key rule is that only one “Service Assembly” can be used for a particular
    request. This is to minimize the performance impact of communications between
    microservices.


    ## Business logic


    This microservice is responsible for orchestrating the downstream components to
    achieve a specific business function. If the requisite work is done upfront and
    downstream middleware and service assembly elements are constructed correctly
    with the right interfaces, it is remarkable how fast these components can be composed.


    With that being said, do not over-engineer the interfaces of supporting components.
    A good friend used to joke that the Common Data Model of some organizations were
    so elaborate that if aliens landed in the year `3000`, they would have no trouble
    interfacing. My personal take is that this adds unnecessary complexity to an interface
    in the hope of making it reusable. Chances are quite high that a new consumer
    will find the interface too complex to use and bypass it altogether. Rather start
    with a minimal interface and extend when necessary.


    If you adopt this approach, it will be necessary to tweak/update the interface
    of supporting components to achieve a new business function. Auditing is generally
    achieved from this component as information regarding the “business transaction”
    is recorded. This is also the layer you want to tap for Business Activity Monitoring.
    For example, a Business Logic component can trigger a “business-level” event for
    the creation of a Customer Account whereas the middleware components can send
    “system-level” events for provisioning requests in supporting systems.


    As much as I would like to claim that this structure was our aim from the outset,
    it has evolved organically. In all honesty, there has been many developer man-days
    lost as elements have been written and re-written. With the base structure now
    established, new elements introduced into our ecosystem are quickly categorized
    and harvested. We have a fairly flexible architectural vision underpinned by key
    principles which ultimately result in a relatively uniform deployment.'
