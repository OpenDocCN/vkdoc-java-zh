  trans: '

    ## 构建一个 Virtualiser


    在重构之前，我们第一个也是唯一的 Sandbox 策略是*后端模拟（Backend Simulation）*。为实现这一点，团队采用了开源项目 *Mountebank*，它可以在给定特定请求时返回预定义响应。我们在托管容器平台上部署了一个自定义应用。该应用在特定端口监听请求，集成组件只需修改端点配置即可将流量路由到该服务。每当需要模拟一个新的后端时，都需要更新该应用以便：


    1.  根据一组规则（包括路径、操作、参数和负载）将传入请求路由到特定的内嵌 JavaScript 函数。


    2.  在函数上下文已知的情况下，函数会使用专门为该集成方案构建的自定义逻辑，从请求中提取更多信息。


    3.  然后，函数利用收集到的信息定位随应用部署的数据文件——格式为 *json* 或 *xml*。


    4.  获取文件后，会更新其中某些元素，例如日期和时间，以提供更具代表性的响应。


    5.  最后返回更新后的响应。


    这种方法利用了该开源方案处理请求的能力，并结合自定义代码来组装响应。


    ### 需求


    以该实现为基线，我们为下一版 *Virtualiser* 制定了以下需求：


    *   **无需代码更新或部署**：为了应对任何变更——无论是请求处理、响应处理还是新增数据文件——此前都必须更新并重新部署自定义应用。由于部署必须在维护窗口内进行，这会造成较长延迟。我们的目标是以配置方式实施更新。


    *   **运行时配置**：由于 *Mountebank* 的配置存放在应用内部文件中，无法在运行时进行变更。我们需要让变更能够立即生效。


    *   **可访问性与易于更新**：鉴于规则和内嵌 JavaScript 的复杂性，初始配置只能由开发人员完成，后续变更或更新也只能由对框架有深入理解的技术成员完成。我们的需求是团队中*任何*成员都能轻松修改。


    *   **第三方特定**：由于第三方标识通常包含在调用后端提供方的请求中，返回的往往是通用响应。我们希望能够返回面向特定消费者的响应。


    *   **应用感知**：自定义应用在其自身上下文中运行，与我们的应用架构没有任何连接。作为重构的一部分，团队提出了全面需求：新版本应能感知内部结构，并能够利用这些结构进行请求路由和处理。


    ### 实施选项


    凭借多年软件开发经验所带来的谦逊与成熟，我们明白这并非新问题，许多 API 平台都面临类似挑战。市面上有很优秀的商用现成方案（COTS），例如 Computer
    Associate 的 Service Virtualisation 产品。不幸的是，这不仅会带来许可证成本，还需要走新软件采购的治理流程——这会导致较长周期。


    团队评估并测试了两个令人印象深刻的开源项目：


    *   **Hoverfly** 是一个轻量级 API 模拟工具。使用 Hoverfly，你可以创建应用所依赖 API 的高真实性模拟。


    *   **Mountebank** 是首个提供跨平台、多协议“线上”测试替身（test doubles）的开源工具。它正是我们*后端模拟（Backend
    Simulation）*策略的基础。


    经过大量审议与讨论，我们最终决策的核心依据是两者都依赖本地配置。一个关键需求是：变更无需代码更新或部署。另一个可选路径是 fork 这些项目并按需改造——但这将需要大量定制和维护。结合我们的约束与需求，我们最终选择了自研开发路线。这将带来最快且可能最高效的解决方案。


    ### 设计理念


    我们以 Mountebank 为参考，确立了两个核心要素：


    一个**谓词（predicate）**，即基于输入参数组合的条件，这些参数包括 HTTP 请求元素以及外部配置，如表 9-6 所示。


    表 9-6


    谓词参数


    | 元素 | 示例 |

    | --- | --- |

    | 方法 | *GET/POST/PUT/...* |

    | 路径 | */customer* |

    | 查询参数 | *?x=1&y=2* |

    | 请求头 | *x-subscription-id* |

    | 请求体 | *{ name: ‘Tom Sawyer’ }* |

    | 数据库配置 | *使用 x-subscription-id 检索到的数据库记录* |


    请注意以下自定义项：


    *   使用特定请求头值 *x-subscription-id* 来检索数据库配置记录，并将其作为谓词评估参数。


    *   使用模糊逻辑匹配参数的 key 或 key+value——例如，若 *query* 包含 key *x* 或表达式 *x=1*。


    *   当多个谓词都可匹配时，采用匹配数量最高的那个。


    一个**响应（response）**是为生成结果而执行的动作。响应根据被模拟场景进行配置，如表 9-7 所示。


    表 9-7


    Virtualiser 响应类型


    | 类型 | 描述 |

    | --- | --- |

    | 静态 | 恒定的预定义数据，不会变化 |

    | 随机 | 使用正则表达式，结合已配置变量（如当前日期时间或输入请求中的元素）更新响应中的特定元素 |

    | 代码 | 动态执行的小型应用（脚本） |

    | 代理 | 将请求路由到已配置端点进行处理 |


    这种动态执行的“小型应用”使我们具备了响应复杂 API 请求的能力。它可通过写入持久化存储（磁盘或数据库）来维持状态，从而支持*浅层虚拟化（Shallow
    Virtualisation）*。它也支持*半实时（Semi-Live）*模式，即调用实时服务来构造响应。该应用以脚本形式存储，并在运行时解释执行。脚本可在无需部署的情况下更新。代理能力则提供了一种优雅机制，可在运行时动态路由请求以进行处理。

    '
- fmt: '## Sample Flow


    Figure [9-11](#509947_1_En_9_Chapter.xhtml#Fig11) and the sample configuration
    which follows provide more insight into the process.


    ![../images/509947_1_En_9_Chapter/509947_1_En_9_Fig11_HTML.jpg](images/509947_1_En_9_Chapter/509947_1_En_9_Fig11_HTML.jpg)


    Figure 9-11


    Virtualiser process


    - When a request is received, we attempt to find all `Predicates` which match.

    - There could be several matches for a specific request. The Predicate with the
    highest number of matches is used.

    - The linked `Response` is then retrieved. Many predicates could be mapped to
    a single `Response`. This allows separation between request identification and
    handling.

    - The `Response` could be generated using static data, code execution, or by proxying
    to a configured endpoint for processing.

    - The code execution element or “mini app” can maintain state. This allows dynamic
    responses based on defined state.


    The extract below is sample configuration for


    - `http://server/sport/catalogue?categoryID=nnn`

    - If the value of `categoryID` is not specified, any value `nnn` will match.

    - If another `Predicate` configuration exists without specifying criteria for
    a `query` parameter, this will be used as there will be more matches.


    ```json

    {

    "method": "GET",

    "path": "/sport/catalogue",

    "api": "SPORT",

    "operation": "GetCatalogue",

    "response": {

    "query": [

    {

    "key": "product",

    "source": "query",

    "query": "categoryID"

    }

    ]

    },

    "query": {

    "categoryID": ""

    }

    }

    ```


    The extract below is sample configuration for


    - `http://server/sport/catalogue?categoryID= 11329`

    - Once a `Predicate` is found, the `Response` it is linked to is found by using
    the `response` data. From the above configuration, it specifies that the `source`
    of the search criteria is the `categoryID` parameter – `{"product":"11329"}`

    - The `action` parameter of the `Response` indicates that the payload to be returned
    is the JSON object in the `context` variable.

    - This strategy allows different payloads to be returned for various `categoryID`
    values. It also allows updates to be made at runtime.


    ```json

    {

    "product": "11329",

    "response": {

    "action": "data",

    "context": { .. },

    "ErrorDescription": "OK",

    "TxID": "0c772fd1-4203-4390-bc51-8c74edf0e979"

    }

    }

    ```


    This Virtualiser design has been specifically tailored to meet the requirements
    of our Marketplace implementation. There are other extensions we have added to
    use the value of a header or query parameter to retrieve a database record from
    a specified collection and use those values for additional matching. This solution
    outlines a sample design. There are many updates and optimizations that you may
    apply for your Marketplace. If you have any ideas you would like to share, please
    keep me posted.


    ## Summary


    In this chapter, we covered the Sandbox – which is an essential element of any
    API Marketplace. We highlighted its purpose and the essential role it plays for
    a third-party provider to understand your APIs and allows you to get a better
    understanding of the consuming application. Several Sandbox strategies were discussed
    in detail describing the approach, benefits and drawbacks, the use-case each strategy
    was best suited for, and a high-level design.


    I also provided a sample distribution showing which strategies were most used
    as well as a strategy for providing access. We finally dove into the detail and
    defined requirements for our custom Virtualiser which could be used to fulfill
    two Sandbox strategies. From requirements, we then considered implementation options,
    from commercial to open source, but finally chose to build a custom solution for
    maximum flexibility. We finally outlined the core elements of the custom solution
    and processed a sample request to get a better understanding of how it works.


    The process of implementing a Sandbox environment is possibly one of the rare
    occasions in enterprise software development which allows significant more latitude
    for creativity and out of the box thinking. It could even be the pilot phase of
    your Marketplace implementation to gauge market demand.


    In the next chapter, we dive into the realm of Operations which is potentially
    the domain your APIs will reside in the longest.


    # 10. API Operations


    In contrast with other domains in the API Marketplace, which are hyper-flexible
    and able to pivot or change direction on a dime, our realm of Operations is far
    more structured, organized, and focused. The team runs on a strict regimen of
    process and structure and is the foundation of the platform. Any other approach
    would result in a rapid descent into chaos, and the implementation would quickly
    be classified under the banner of a prototype. As the platform is an enabling
    ingredient for greater third-party applications, any internal or supporting system
    failure is likely to trigger a ripple effect which would eventually cause a larger
    impact resulting in poor perception of the third-party consumer’s customer-facing
    product or service.


    As this domain typically falls under an operational expenditure (`OPEX`) budget,
    the knee-jerk reaction may be to keep costs down. Although our Marketplace may
    not be end-customer facing, there may be significant reputational impact and industry
    perception if the service levels are found to be flaky. As described in previous
    chapters, a big effort is to attract external developers to the platform. It takes
    even more effort to maintain the relationship and retain these consumers.


    From experience, integration support has always been a challenging but rewarding
    role. Without a doubt, my greatest learning from design to development to truly
    understanding a solution and its underlying elements has been from time served
    in Operations. Parameters and conditions well-defined during development. Even
    with extensive testing scenarios and strenuous load tests, the environment may
    be fairly isolated. From a project early in my career, I can clearly recall a
    senior engineer reporting excitedly that he had run millions of transactions throughout
    the night on his notebook without an issue. When our solution finally made it
    to production, we spent countless nights over the next two years trying to resolve
    operational problems. The reason is that a production environment is vastly different
    and traffic load, supporting system availability, and unpredictable customer behavior
    should not be underestimated. It is for this reason that I am of the firm belief
    that solution architects must spend time in an Operational role to learn how to
    design more robust solutions.


    Unfortunately, fighting fire with fire by using a loose, tactical approach in
    a fast-moving, high-traffic, chaotic operational environment will most likely
    result in failure which could jeopardize the success and longevity of the platform.
    In this chapter, I discuss our previous, current, and aspirational operational
    standards, processes, and approaches to running a Marketplace successfully.'
