    benefit of fixing forward is that time is saved by not having to roll back the
    release which would keep the release pipeline flowing. Depending on the nature
    of the issue, impact, frequency, and resolution timeframe, it may be possible
    to implement the fix over a longer duration – which would minimize additional
    errors creeping in through last-minute updates.


    The requirement for a more flexible change and release strategy for agile, digital
    solutions has been recognized by our organization, and significant effort has
    been put into attempting to adapt to it. This statement must be fully qualified
    as the quality gates have not been lowered – the processes have been streamlined
    to allow faster transition. It is still a work in progress, and there is some
    way to go before we reach the Continuous Deployment nirvana of Netflix – but with
    that being said, the service levels and potential fallout for a Financial Institution
    would be far higher than a video streaming service.


    Figure [10-5](#509947_1_En_10_Chapter.xhtml#Fig5) provides a high-level view of
    our Release “funnel.” I like to think of it as atoms bouncing around in a space
    which gets progressively smaller until they eventually bounce out or must file
    in line orderly to move forward. At any given time, there are a significant number
    of requirements, fixes, or prototypes in development. Some prototypes may graduate
    to fully fledged solutions; others may be retired. The readiness of supporting
    backend platforms will also determine which requirements will transition to testing.
    Planning sessions, led by the Delivery Leads, will identify a potential implementation
    date for specific solutions, which are bundled into a production release. The
    goal is a release at a minimum of every two weeks. As soon as a view has been
    determined, the necessary change control artifacts are assembled, and Release
    Management is notified of the intention and date to deploy.


    ![../images/509947_1_En_10_Chapter/509947_1_En_10_Fig5_HTML.jpg](images/509947_1_En_10_Chapter/509947_1_En_10_Fig5_HTML.jpg)


    Figure 10-5


    The Release funnel


    The artifacts that are required for the release process include the following:


    *   **Implementation guide** : These are the set of instructions for the deployment
    of code assets and configuration required in the operational environment. With
    a well-optimized DevOps pipeline in place, this document simply details the components
    and versions to be deployed. It may be necessary to also document configuration
    updates to firewall rules and security access to backend systems. For more complex
    deployments which span different systems, this guide will detail a timeline and
    sequence of events for the release.


    *   **Testing evidence and QA sign-off**: Documented test execution and acceptance
    from the Quality Assurance team is a key input before a solution can be released.
    This is currently in the form of a document to meet existing criteria. As part
    of the Continuous Deployment (CD) intention of the team, an aspirational goal
    is to provide automated regression, functional and performance test results which
    provide assurance of the integrity of a solution.


    *   **Release notes**: Description of the changes to be deployed to the environment
    – be it new functionality, updates or optimizations to existing solutions, fixes
    or patches to resolve operational issues.


    ## DevOps Practice


    Like the humble sled, which was used to transport large and heavy objects during
    the construction of the pyramids in Egypt, the practice of DevOps is the pivotal
    element that underpins our operational environment, as illustrated in Figure [10-6](#509947_1_En_10_Chapter.xhtml#Fig6).
    From years of experience in an operational domain, regularly pulling back platforms
    from a catastrophic demise by tweaking application server configuration or masterfully
    rebuilding systems on the fly by hand, and in so doing have been responsible for
    creating “snowflake environments,” this has been both a humbling and insightful
    experience.


    ![../images/509947_1_En_10_Chapter/509947_1_En_10_Fig6_HTML.jpg](images/509947_1_En_10_Chapter/509947_1_En_10_Fig6_HTML.jpg)


    Figure 10-6


    DevOps foundation


    A well-instrumented operational DevOps process starts even before the first line
    of code is written. Code repositories, build pipelines, Continuous Integration
    (CI), and migration processes (detailed in previous chapters) all form part of
    the process which enables the DevOps practice from development, and which ultimately
    pervades into the operational domain. In all honesty, as a developer who has witnessed
    a pre-DevOps era, there are moments of frustration as a defined release process
    minimizes the opportunity for tweaks and quick updates. As an Engineering Lead
    observing a well-oiled, well-defined, repeatable, and reliable process with almost
    zero opportunity for tweaks and quick updates, I am immensely grateful.


    A repeatable process is key, particularly more so in an agile, fast-moving environment
    as it enables rapid delivery with the ability to roll back if the need arises.
    The ability to roll back *reliably* and *rapidly* in an operational context should
    not be taken lightly. From years past, I can still clearly recall not only the
    disappointment and embarrassment of rolling back a release but also the apprehension
    as backups were used to restore a system and we waited to verify the rehydration
    process. The microservice construct also helps immensely as it allows fine-grained
    control to roll back or roll forward only ailing components. This ability affords
    our platform a safety net which provides a level of confidence in much the same
    way that it would allow a highwire act to push the envelope a little further.


    As there are legacy elements in our platform architecture, not all systems have
    a DevOps capability. The organization is well aware of this, and each system has
    defined a roadmap to ultimately achieve this. For new implementations, such as
    the Cloud Container platform we have recently migrated to, this is non-negotiable.
    The environment is locked down with a “zero-touch” policy, and the only mechanism
    available to make changes is via a DevOps pipeline as shown in Figure [10-7](#509947_1_En_10_Chapter.xhtml#Fig7).
    Firm and unrelenting commitment is possibly the only way to achieve this goal.
    If there is a loophole or backdoor available, it will be discovered and exploited
    by the delivery team.


    ![../images/509947_1_En_10_Chapter/509947_1_En_10_Fig7_HTML.jpg](images/509947_1_En_10_Chapter/509947_1_En_10_Fig7_HTML.jpg)


    Figure 10-7


    DevOps pipeline'
  trans: '

    这并不是一个轻率做出的决定，而且这种做法如果不加以控制，可能会导致“在生产环境中编码”这一大忌。必须格外谨慎，确保正在进行中的开发不会被意外纳入更新内容。为此，制定清晰的代码版本管理策略（包含发布标签与分支）至关重要。若能明智且克制地使用，“向前修复”的内在好处在于无需回滚发布，从而节省时间并保持发布流水线持续运转。根据问题的性质、影响、频率及解决时限，也可能在更长周期内实施修复——这将有助于减少因临时更新而引入额外错误的风险。


    我们组织已经认识到：敏捷数字化解决方案需要更加灵活的变更与发布策略，并已投入大量努力尝试去适配。必须完整说明的是，质量关卡并未降低——只是流程被精简以实现更快流转。这仍在持续推进中，在达到
    Netflix 式持续部署“理想境界”之前我们还有一段路要走——但话说回来，金融机构的服务等级要求及潜在后果，远高于视频流媒体服务。


    图 10-5 提供了我们发布“漏斗”的高层视图。我喜欢把它想象成原子在一个不断缩小的空间中来回碰撞，直到最终要么被弹出，要么必须有序排队向前推进。在任何给定时刻，都有大量需求、修复项或原型处于开发中。有些原型会成长为完整解决方案；另一些则会被淘汰。支撑性后端平台的就绪程度也会决定哪些需求可以进入测试阶段。由交付负责人牵头的规划会议将为特定解决方案识别潜在上线日期，并将其打包进生产发布。目标是至少每两周发布一次。一旦发布视图确定，就会整理所需的变更控制工件，并通知发布管理团队部署意图与日期。


    ![../images/509947_1_En_10_Chapter/509947_1_En_10_Fig5_HTML.jpg](img/509947_1_En_10_Fig5_HTML.jpg)


    图 10-5


    发布漏斗


    发布流程所需的工件包括以下内容：


    *   **实施指南**：这是在运行环境中部署代码资产及所需配置的一组说明。在具备高度优化的 DevOps 流水线时，该文档只需说明要部署的组件与版本。也可能需要记录防火墙规则及后端系统安全访问的配置更新。对于跨多个系统的复杂部署，该指南会详细说明发布时间线与事件顺序。


    *   **测试证据与 QA 签署**：在解决方案可发布之前，来自质量保证团队的测试执行记录与验收是关键输入。目前这通常以文档形式存在，以满足既有标准。作为团队持续部署（CD）目标的一部分，一个理想方向是提供自动化回归、功能与性能测试结果，以证明解决方案的完整性。


    *   **发布说明**：对将部署到环境中的变更进行说明——无论是新功能、对现有方案的更新或优化，还是用于解决运行问题的修复或补丁。


    ## DevOps 实践


    正如朴素的雪橇曾在埃及金字塔建造过程中用于运输大型重物，DevOps 实践也是支撑我们运行环境的关键要素，如图 10-6 所示。凭借多年在运维领域的经验，我曾经常通过调整应用服务器配置把平台从灾难边缘拉回，也曾在系统故障时临场手工重建系统，并因此制造出“雪花环境”；这是一段既令人谦卑又富有启发的经历。


    ![../images/509947_1_En_10_Chapter/509947_1_En_10_Fig6_HTML.jpg](img/509947_1_En_10_Fig6_HTML.jpg)


    图 10-6


    DevOps 基础


    一个完善可观测的运维 DevOps 流程，甚至在第一行代码写下之前就已开始。代码仓库、构建流水线、持续集成（CI）以及迁移流程（前文已详细说明）共同构成了该流程的一部分，它使
    DevOps 实践从开发端得以落地，并最终渗透到运维领域。坦率地说，作为经历过前 DevOps 时代的开发者，当既定发布流程压缩了“微调和快速更新”的空间时，确实会有挫败感。可作为一名工程负责人，看到一个运转顺畅、定义清晰、可重复且可靠，且几乎不给“微调和快速更新”留下空间的流程时，我由衷感激。


    可重复的流程是关键，尤其在敏捷、快速变化的环境中更是如此，因为它既支持快速交付，也具备在必要时回滚的能力。在运维语境下，*可靠地*、*迅速地*执行回滚的能力绝不可轻视。回想过去多年，我仍清楚记得回滚发布时的失望与尴尬，也记得使用备份恢复系统并等待验证回灌过程时的忐忑。微服务架构也带来了巨大帮助，因为它允许细粒度控制，只回滚或前滚出现问题的组件。这种能力为平台提供了一张安全网，带来的信心就像高空走钢丝者在有保护网时更敢于突破极限。


    由于我们平台架构中仍有遗留部分，并非所有系统都具备 DevOps 能力。组织对此非常清楚，并且每个系统都制定了最终实现这一目标的路线图。对于新的实施，例如我们最近迁移到的云容器平台，这是不可妥协的。该环境在“零接触”政策下被严格锁定，唯一可用的变更机制就是图
    10-7 所示的 DevOps 流水线。坚定且毫不松懈的承诺，可能是实现这一目标的唯一方式。只要存在漏洞或后门，交付团队就一定会发现并加以利用。


    ![../images/509947_1_En_10_Chapter/509947_1_En_10_Fig7_HTML.jpg](img/509947_1_En_10_Fig7_HTML.jpg)


    图 10-7


    DevOps 流水线

