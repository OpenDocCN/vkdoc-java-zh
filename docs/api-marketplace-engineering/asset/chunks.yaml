- fmt: '## Logging


    From years spent in an integration environment, I consider logs to be the lifeblood
    of any middleware solution. Logs are the primary mechanism I use during development
    and support to get insight into the execution path of a request. There are possibly
    far more elegant ways of using debugging tools to watch values on the stack, but
    for me personally, a well-positioned `console.log` or `logger.debug` statement,
    acting as an informer, can lead to the criminal mastermind in a bewildering “whodunnit”
    tracing challenge.


    As illustrated in Figure [10-8](#509947_1_En_10_Chapter.xhtml#Fig8), there are
    various contexts in which a log may exist. During development, there is typically
    a single file or standard output (`stdout`) stream to tail. In a clustered environment,
    the number of logs is equal to the participating nodes. In a microservice, container-oriented
    platform, there is an explosion of logs, and a single request could traverse several
    pods, each of which is distributed across various nodes in the cluster.


    ![../images/509947_1_En_10_Chapter/509947_1_En_10_Fig8_HTML.jpg](images/509947_1_En_10_Chapter/509947_1_En_10_Fig8_HTML.jpg)


    Figure 10-8


    Logging contexts


    Tracing a transaction can be compared to trying to find needles in many different
    haystacks. This is one of the lessons I’ve learnt in an operational domain that
    I always keep in mind during platform design. A key platform architecture principle
    is to have a unique identifier which is attached to a transaction from the point
    of entry and is used for every logging statement as its journeys through the environment.
    This seemingly simple strategy enables what I refer to as the “Holy Grail” in
    a distributed integration environment – the ability to trace a transaction across
    various components. With each component logging with a traceable identifier, half
    of the battle is won. It is important to always keep in mind that containers are
    transient – more could be created to handle load, then destroyed as the load dissipates
    or the container could be restarted due to an application exception. As logs are
    typically written to `stdout`, this could result in the loss of the log with the
    shutdown or restart of the container instance.


    There are options to mitigate the loss of the log, such as mounting persistent
    storage which the container has access to. To minimize the complexity of the container
    environment, the team addressed the requirement at an application level with a
    solution detailed in Figure [10-9](#509947_1_En_10_Chapter.xhtml#Fig9). All applications
    use a platform logging service, which has access to an application context. The
    context is populated with a wide range of metadata, such as the unique transaction
    identifier, name of the host application, and details of the client initiating
    the request. With a logging request, supplementary data is retrieved from the
    context, container and runtime, packaged into a simple JSON object which is then
    fired to a load-balanced endpoint via UDP, which minimizes any performance impact
    to the application as it is a fire-and-forget request. This is the entry point
    to an Enterprise Elasticsearch, Logstash, and Kibana (`ELK`) service.


    ![../images/509947_1_En_10_Chapter/509947_1_En_10_Fig9_HTML.jpg](images/509947_1_En_10_Chapter/509947_1_En_10_Fig9_HTML.jpg)


    Figure 10-9


    Logging strategy


    A system-specific Kafka topic is used to buffer requests and prevent message loss
    as the capability is used by different platforms across the enterprise. This is
    another example of our decision to leverage enterprise services to minimize operational
    overhead which allows the team maximum focus on creating `API` value. The logging
    `event` is then ingested into the ELK stack, described in more detail in the next
    section.


    ### The ELK Stack


    `ELK` is the acronym for three open-source projects: Elasticsearch, Logstash,
    and Kibana. Elasticsearch is a search and analytics engine. Logstash is a server-side
    data processing pipeline that ingests data from multiple sources simultaneously,
    transforms it, and then sends it to a “stash” like Elasticsearch. Kibana lets
    users visualize data with charts and graphs in Elasticsearch.


    A trait of a great application is easy adoption and operation by a wide range
    of users and the Kibana console, essentially the User Interface for the ELK stack
    and shown in Figure [10-10](#509947_1_En_10_Chapter.xhtml#Fig10), not only meets
    this objective, but in my opinion, exceeds it exceptionally well.


    ![../images/509947_1_En_10_Chapter/509947_1_En_10_Fig10_HTML.jpg](images/509947_1_En_10_Chapter/509947_1_En_10_Fig10_HTML.jpg)


    Figure 10-10


    Kibana console


    I have observed support engineers, sometimes relatively new to the team and having
    been through a handful of knowledge sharing sessions, expertly navigate the Kibana
    console to track down the cause of a request failure. By providing the unique
    identifier, Elasticsearch eliminates the difficulty of scanning multiple logs
    and almost instantly shows all entries which contain that reference, with a time-series
    graph which can be used to drill into a specific timeframe.


    Kibana goes further by allowing the user to view only a subset of fields. Additional
    filters can be specified to narrow in on specific components. Kibana queries,
    in the form of Kibana Query Language (`KQL`), can also be executed to widen or
    narrow the search radius. The ELK stack is potentially the most important element
    of our operational environment, and if time and effort is invested into mastering
    its capability by all members of the team, it will most certainly yield great
    results across both development and support.


    ## Monitoring


    This area of operations follows the iceberg principle. On the surface, it appears
    relatively simple. Upon closer examination, there is a lot more than meets the
    eye. It is an ongoing journey, and on Day One of our implementation, we had only
    a fraction of the capability that we have today. For much of our monitoring capability,
    we have leveraged enterprise functionality which has resulted in lower costs from
    a software license perspective and a smoother transition for our releases as change
    management boards are comfortable that existing operational processes and tools
    are in use. In the following sections, we examine areas of monitoring and discuss
    how the sum of the parts results in a greater whole which allows our operational
    team to take a pre-emptive approach to managing the platform.'
