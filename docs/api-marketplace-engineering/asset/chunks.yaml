- fmt: '## API Gateway（External/Internal）


    An API Gateway is essentially the entry point to the enterprise. In our deployment,
    it was stationed on the edge of the Demilitarized Zone (DMZ), and a second, separate
    instance is positioned as the entry to internal services. The core functions are
    Security, API Management, and Monitoring. A key standard for our organization
    is that all APIs, internal and external facing, should be accessed via an API
    Gateway. A great feature of API Gateways is the ability to throttle user requests.
    Although this can be custom developed, the benefit of using an off-the-shelf product
    is that it alleviates the operational workload from the team. Tasks such as security
    configuration, certificate management, API product updates, and versioning are
    provided out of the box.


    Several Cloud providers offer a Platform-as-a-Service (PaaS) API Gateway, which
    can be easily provisioned. The benefit of a PaaS offering is that the scaling
    and management of underlying infrastructure is handled by the Cloud Provider.
    As an established Financial Institution, we have a commercial off-the-shelf product,
    which is managed by an internal team and supported by the software vendor. To
    allow the Delivery team some autonomy, a separate Developer Organization within
    the Gateway was created for our API Products. This is essentially a logical separation
    of the API Gateway infrastructure. We are allowed administrative access in the
    Development environment but must adhere to strict governance as we progress to
    Production.


    ## Identity


    This block hosts many capabilities which is critical to the function of the API
    Marketplace. One of the most important is the Access Control Authentication Policy,
    which, in layman’s terms, is the foundation for authenticating end users. As it
    hosts the Directory Server which contains user profile information against which
    credentials are verified, a fundamental design decision made at the outset of
    the implementation was that we would leverage the enterprise Authentication capability
    and build a custom Authorization framework within the Marketplace. The Reverse
    Proxy capability also resides under the same umbrella and acts as an emissary
    between end user requests and server-side portal applications. Leveraging the
    enterprise security infrastructure, by way of physical infrastructure, processes,
    and services, has bootstrapped our implementation significantly. There has been
    some customization to allow for Marketplace-specific requirements, such as junctions
    which allow unauthenticated access to backend web applications and rolling refresh
    token windows. This decision has also helped us navigate Architecture and Design
    approval boards. There was a sense of comfort from long-serving Architects that
    this bleeding-edge API Marketplace, which could be a new channel of attack, was
    secured using trusted enterprise security standards.


    ## Container Platform（Managed/Unmanaged）


    Figure [5-2](#509947_1_En_5_Chapter.xhtml#Fig2) shows the evolution of how applications
    have been deployed. From right to left you see three approaches, Traditional Deployment,
    Virtualized Deployment, and Container Deployment, which are fast growing in popularity.


    ![../images/509947_1_En_5_Chapter/509947_1_En_5_Fig2_HTML.jpg](images/509947_1_En_5_Chapter/509947_1_En_5_Fig2_HTML.jpg)


    Figure 5-2


    Evolution of deployment strategies


    I have been fortunate to have experience with all the approaches in Figure [5-2](#509947_1_En_5_Chapter.xhtml#Fig2).
    On one of my first projects, we were allocated a Windows server which ran on a
    physical machine in a datacenter managed by the organization. I can still recall
    eagerly taking a snapshot of the number of CPUs and memory and sending it to my
    university friends as bragging rights of the hardware allocated to my new project.
    Even when I had to drive through to the datacenter on the night of a production
    deployment to physically restart the server, I felt like one of the “Right Stuff”
    astronauts walking down the gangway on their next space mission. As the figure
    shows, all applications run directly on the Operating System, and if one of them
    threw a tantrum that caused high CPU or memory utilization, the others suffered.


    A few years later, while on a project for a new middleware platform, we were allocated
    Sun Sparc servers, each with many CPUs with multithreading capability and a whopping
    `512GB` of RAM. The server architecture whitepaper had a prized spot on my bedside
    table as NASA and JPL were probably using the same hardware to launch space shuttles.
    The beauty of using Sun Solaris was that the Hypervisor was baked into the operating
    system, and we could carve up the machine into several logical Solaris Zones (Virtual
    Machines), each with its own operating system and allocated a specific number
    of resources in the form of threads and memory. If an application misbehaved,
    the Solaris management software would contain it and prevent it from impacting
    other zones. I found myself jockeying a spreadsheet containing the details of
    Solaris Zones which was used for various environments and components of the stack.


    I prided myself with the detail of the spreadsheet, and to the annoyance of the
    rest of the team, referenced each zone by IP, like some old friend whom no one
    else knew. As I was responsible for the Platform build, I scripted as much of
    the installation as possible – but eventually had to resort to running custom
    commands on different zones, sometimes to resolve cluster issues, sometimes to
    resolve missing dependencies. Again, I chalked up these interventions as my part
    in a Herculean effort to keeping the platform up and running. Little did I realize
    back then that I was also responsible for creating a “snowflake environment.”
    Each zone in the environment was different from the rest. I now take solace that
    even if my provisioning script did create identical clones, each of the zones
    would have invariably moved out of sync due to operational changes made on some,
    but not others.


    Virtual Machines (`VM`) are a move in the right evolutionary direction – they
    allow better use of the underlying infrastructure. The drawback is that the `VMs`
    are heavy on resources, `VM` configurations could invariably move out of sync,
    and they also encourage vertical scaling of infrastructure which is not tenable
    over time. That is, the physical host machine can only scale to a maximum level
    which limits the number of `VMs` it can support.


    For our Marketplace implementation, an early decision before I joined was to use
    a Container approach. My first experience with containers was Docker, and as I
    ran through a tutorial shown in Listing [5-1](#509947_1_En_5_Chapter.xhtml#PC1),
    I was blown away with the simplicity of the concept and sincerely wondered which
    rock I lived under when the technology launched in `2014`.'
