  trans: '

    #### 设计


    如图 9-4 所示


    ![../images/509947_1_En_9_Chapter/509947_1_En_9_Fig4_HTML.jpg](img/509947_1_En_9_Fig4_HTML.jpg)


    图 9-4


    后端模拟沙盒环境的设计


    *   *系统虚拟化器*被配置为根据请求中的特定值返回预定义的响应。


    *   中间件组件的端点配置已更新，以将请求路由到*系统虚拟化器*。


    *   这需要一个专用的运行环境来执行。它确实需要类似的部署策略，但不需要像生产（Live）环境那样的扩展能力，因为性能要求会更低。


    ### 浅层（Shallow）


    你可能还记得，曾有一个特定场景促成了对 Sandbox 的更新。我们平台的早期产品相对简单。也就是说，通常只有一个后端提供方，可通过*后端模拟*策略来服务。随着时间推移，随着越来越多的中间件组件可用于对接后端系统，为满足业务需求，微服务编排逻辑逐渐变得愈发复杂。这很快演变成一个因交付目标和任务而无法停止的庞然大物。在我们意识到之前，一些
    API 已经通过如图 9-5 所示的复杂流程来实现。


    ![../images/509947_1_En_9_Chapter/509947_1_En_9_Fig5_HTML.png](img/509947_1_En_9_Fig5_HTML.png)


    图 9-5


    展示复杂编排逻辑的流程图


    不幸的是，在我们履行简化编排逻辑这一郑重承诺之前，创建 Sandbox 版本的请求就已到来。使用既有*后端模拟*方法的挑战在于：它需要复杂的数据准备，而单笔交易还会跨越多个系统。进一步增加复杂度的是其中某些步骤的*写入（write）*操作。经过多次尝试后，团队很快意识到，对*系统虚拟化器*的定制几乎变得无法支持，并且后续更新将是一场噩梦。


    以一种典型的*“跳出框架思考”*方式来看，我们发现的解决方案恰恰位于离问题源头最远的地方。通过后退一步并从消费者视角提出问题，Sandbox 集成的主要目标是让使用方更好地熟悉我们的
    API。本质上，第三方只是希望针对请求获得一个具有代表性的响应。至于接口所提供的抽象背后如何实现，这并不是 Sandbox 关心的问题。通过重构问题陈述并从不同语境思考，本
    Sandbox 策略的目的，是让第三方能够测试那些具有复杂编排逻辑、跨越多个后端系统且可能包含导致状态变更的写操作的 API 产品。


    #### 方法


    与其教骷髅跳太空步，不如在请求进入具有复杂逻辑的微服务*之前*尽早拦截它，并在一个并行但*浅层（shallow）*的实现中处理该请求。这个模式看起来可能与*beta*方法非常相似。然而关键区别在于，这是一个具有既定契约且我们需要维护的
    API 产品，同时还必须满足“按第三方维度管理状态变更”的要求。本章稍后将进一步详细讨论技术方案。


    这种方法的优缺点如表 9-3 所示。


    表 9-3


    浅层沙盒策略的优缺点


    | 优点 | 缺点 |

    | --- | --- |

    | 适用于跨多个后端系统、业务流程复杂的 API | 由于在并行流程中处理，无法完全代表生产（Live）解决方案 |

    | 能够按第三方管理状态 | 需要维护和支持额外的软件组件 |

    | 自定义解决方案便于配置和更新，以应对新需求 |   |

    | 资源占用更小，因为无需部署微服务和中间件组件 |   |


    #### 用例


    这种方法提供了一种整洁且优雅的解决方案，使 Sandbox API 与 Live 实现保持一致。它还允许按第三方维持状态，以支持更细粒度的集成场景。进一步说明：*Shallow*
    方法会以一种*ping-ack*方式提供相同响应。采用该策略后，第三方将基于其执行的操作接收到更新后的数据集。对于跨越两个或更多后端系统、复杂度中到高的解决方案，应考虑采用该方法。


    #### 设计


    如图 9-6 所示


    ![../images/509947_1_En_9_Chapter/509947_1_En_9_Fig6_HTML.jpg](img/509947_1_En_9_Fig6_HTML.jpg)


    图 9-6


    浅层沙盒环境的设计


    *   请求在并行流程中处理。


    *   本章稍后将提供该方法的技术设计细节。


    ### 半实况（Semi-Live）


    这种方法的核心在于将 Sandbox 环境连接到已定义的 Live 接口。正如本章后续讨论的分布图所示，这并不是一种常见的 Sandbox 策略。我观察到两类高度依赖
    Live 接口的用例。


    第一类是 Twilio 消息环境。开发者可以发送消息并最终到达用户设备。Twilio 非常巧妙地支持了 WhatsApp API 的测试：通过向一个共享的
    WhatsApp 目标地址发送特定关键字，将手机号关联到开发者测试账号。初始会提供价值 20 美元的免费额度，后续可充值以继续测试。这是一个通过 Sandbox
    环境创造收入的绝佳示例。


    第二类场景中，我们发现有必要连接到 Live 安全服务以生成令牌，该令牌将用于 Sandbox 环境中的后续调用。


    #### 方法


    尽管我很喜欢这一策略，但我同样保持警惕。我认为这如同打开了潘多拉魔盒，并强烈建议谨慎对待其使用及潜在滥用。该方法可通过简单更新端点配置并将请求路由到 Live
    后端来实现。对 Sandbox API 请求进行限流至关重要，因为第三方可能在无意中发起请求洪流，导致拒绝服务。随着生态更成熟，也许可以按交易向使用者收费。


    这种方法的优缺点如表 9-4 所示。


    表 9-4


    半实况沙盒策略的优缺点


    | 优点 | 缺点 |

    | --- | --- |

    | API 请求行为更具代表性 | 将生产（Live）环境暴露给开发受众 |

    | 混合能力可节省后端服务模拟时间 | 需要额外的支持机制来规范并监控使用 |

    | 通过对 Live 平台的受控或受限访问收费，具备潜在收入来源 | 引入安全风险，因为 Sandbox 现已成为访问 Live 元素和服务的入口机制 |


    #### 用例


    调用 Live 服务的能力提供了一种灵活的混合型 Sandbox 能力，但由于其潜在安全风险，必须谨慎使用和管理。它应作为例外，而非常态使用。支持其采用的优秀用例确实存在——例如前文提到的
    Twilio 消息服务。关键是必须建立相关系统与控制措施来管理并监控其使用。它最适合用于提供参考数据，这类数据通常是只读的并且可以公开共享。

    '
- fmt: '## Design


    As illustrated in Figure [9-7](#509947_1_En_9_Chapter.xhtml#Fig7)


    ![../images/509947_1_En_9_Chapter/509947_1_En_9_Fig7_HTML.jpg](images/509947_1_En_9_Chapter/509947_1_En_9_Fig7_HTML.jpg)


    Figure 9-7


    Design of a Semi-Live Sandbox environment


    - Specific middleware components which are configured to the Live backend providers
    are deployed to the Sandbox environment.

    - The Virtualiser has access to these middleware components.

    - Details of the Technical design for this approach are provided later in this
    chapter.


    ## QA Live


    We have found this to be the least commonly used strategy. It has special function
    and caters to a specific audience and use-case.


    As previously mentioned, a foundational consumer of our platform is an internally
    developed application that is hosted externally and uses the Marketplace to access
    key enterprise services. Due to the nature of this consumer and the rapid pace
    of development, access has been granted to the Quality Assurance (QA) Test environment
    to verify end-to-end functionality before product releases.


    Although the pattern was isolated to this specific use-case, we have found that
    for some APIs, testing in a “Live” context is sorely needed. In all honesty, simulating
    a backend or shallow interception strategy may not sufficiently cover all responses
    and use-cases of a backend provider. In these scenarios, the only way to get true
    representation is to integrate directly to the backend for the full transaction.


    ### Approach


    The internal foundational consumer helped trailblaze the path to allow access
    from an externally hosted system. Specific rules were added to the firewall to
    allow traffic from defined source IPs. Instead of connecting to the Production
    Sandbox endpoints, the destination was set as QA Live. Network and Information
    Security allowed the access due to the nature and high profile of the consuming
    application. In all honesty, access for other third-party providers is rarely
    permitted due to the sensitivity and nature of the testing environment.


    The pros and cons of this approach are described in Table [9-5](#509947_1_En_9_Chapter.xhtml#Tab5).


    Table 9-5


    Pros and cons of a QA-Live Sandbox strategy


    | Pros | Cons |

    | --- | --- |

    | Of all approaches, is the most representative of application behavior in a Production
    environment | Impacted by the availability of systems and data in the QA environment
    |

    | No need to create a Sandbox version of the API – saves manpower | Adds additional
    load and traffic to shared components in the internal domain |

    |   | Development – new releases or patches may impact testing and needs to be
    scheduled carefully |


    ### Use-Case


    There are very specific use-cases for this approach. The first is for consumers
    who are internal to the organization, have insight into organizational processes
    and information, and can tolerate varying service levels of availability and performance.
    The second is for those situations when it is not possible to create a Sandbox
    version of the API and when it is critical that the consuming application gets
    full representative behavior and responses during testing. In this instance, the
    access policy should only allow temporary access.


    ### Design


    As illustrated in Figure [9-8](#509947_1_En_9_Chapter.xhtml#Fig8)


    ![../images/509947_1_En_9_Chapter/509947_1_En_9_Fig8_HTML.jpg](images/509947_1_En_9_Chapter/509947_1_En_9_Fig8_HTML.jpg)


    Figure 9-8


    Design detailing the use of QA as a Sandbox environment


    - The request is processed in the Quality Assurance (QA) environment.

    - This is a parallel implementation to Production.

    - The approach fulfills the requirement to functionally test a solution end to
    end. It is important to note that the QA environment may not be scaled similarly
    to Production – there is a possibility that behavior could vary.


    ## Third-Party Sandbox Access


    A sample distribution detailing the third party to Sandbox access relationship
    for our platform is shown in Figure [9-9](#509947_1_En_9_Chapter.xhtml#Fig9).
    The key factor which influences this spread is that not all third parties consume
    the same API products for one or more of the following reasons:


    ![../images/509947_1_En_9_Chapter/509947_1_En_9_Fig9_HTML.jpg](images/509947_1_En_9_Chapter/509947_1_En_9_Fig9_HTML.jpg)


    Figure 9-9


    Third-party Sandbox distribution


    - The API products in beta may have smaller audiences – if only a subset of third
    parties are allowed access or if interest from potential consumers is low. Many
    third parties may only focus on stable, production-available APIs.

    - Many will consume the simpler API products which use a Backend Simulation strategy.

    - APIs are classified as complex if orchestration spans multiple backend providers
    and are great candidates for a Shallow approach. These API products generally
    fill a niche function which leads to lower third-party attraction and consumption.

    - Only a few, select third parties may have access to API products which are backed
    with more complex Sandbox strategies – such as Semi-Live and QA.


    I like to think of access to Sandbox APIs in much the same way as a physical bank
    branch. Anyone is allowed to enter the branch. Only bank personnel may enter the
    staff-permitted areas of the building. Of the bank personnel, only senior and
    authorized members are able to gain entry to sensitive spaces, such as the bank
    vault.


    In much the same way, there are APIs and associated Sandbox environments, which
    only select and authorized third parties may access. This strategy may appear
    to be contrary to the approach of maximizing third-party consumption. The adage
    “horses for courses” comes to mind and there will be API products in your stable
    which are suited for specific consumers. Although it is possible to grant every
    third-party access to every API product, the organization may not have the temperament
    or appetite for any third party to access key areas or services – due to sensitivity
    of customer data and security restrictions.


    I depict our access strategy in Figure [9-10](#509947_1_En_9_Chapter.xhtml#Fig10)
    in a dartboard-like approach, starting with the lowest security and most open
    on the outside, to the highest and most restricted at the core or bullseye of
    the board. It is important to note that your access strategy may differ based
    on the API products and governance policies of your organization – you may choose
    to add, remove, or even reorder the sequence of layers.


    ![../images/509947_1_En_9_Chapter/509947_1_En_9_Fig10_HTML.jpg](images/509947_1_En_9_Chapter/509947_1_En_9_Fig10_HTML.jpg)


    Figure 9-10


    Third-party Sandbox access'
  raw: '#### Design


    As illustrated in Figure [9-7](#509947_1_En_9_Chapter.xhtml#Fig7)


    ![../images/509947_1_En_9_Chapter/509947_1_En_9_Fig7_HTML.jpg](images/509947_1_En_9_Chapter/509947_1_En_9_Fig7_HTML.jpg)


    Figure 9-7


    Design of a Semi-Live Sandbox environment


    *   Specific middleware components which are configured to the Live backend providers
    are deployed to the Sandbox environment.


    *   The Virtualiser has access to these middleware components.


    *   Details of the Technical design for this approach are provided later in this
    chapter.


    ### QA Live


    We have found this to be the least commonly used strategy. It has special function
    and caters to a specific audience and use-case.


    As previously mentioned, a foundational consumer of our platform is an internally
    developed application that is hosted externally and uses the Marketplace to access
    key enterprise services. Due to the nature of this consumer and the rapid pace
    of development, access has been granted to the Quality Assurance (QA) Test environment
    to verify end-to-end functionality before product releases.


    Although the pattern was isolated to this specific use-case, we have found that
    for some APIs, testing in a “Live” context is sorely needed. In all honesty, simulating
    a backend or shallow interception strategy may not sufficiently cover all responses
    and use-cases of a backend provider. In these scenarios, the only way to get *true*
    representation is to integrate directly to the backend for the full transaction.


    #### Approach


    The internal foundational consumer helped trailblaze the path to allow access
    from an externally hosted system. Specific rules were added to the firewall to
    allow traffic from defined source IPs. Instead of connecting to the *Production
    Sandbox* endpoints, the destination was set as *QA Live*. Network and Information
    Security allowed the access due to the nature and high profile of the consuming
    application. In all honesty, access for other third-party providers is rarely
    permitted due to the sensitivity and nature of the testing environment.


    The pros and cons of this approach are described in Table [9-5](#509947_1_En_9_Chapter.xhtml#Tab5).


    Table 9-5


    Pros and cons of a QA-Live Sandbox strategy


    | Pros | Cons |

    | --- | --- |

    | Of all approaches, is the most representative of application behavior in a Production
    environment | Impacted by the availability of systems and data in the QA environment
    |

    | No need to create a Sandbox version of the API – saves manpower | Adds additional
    load and traffic to shared components in the internal domain |

    |   | Development – new releases or patches may impact testing and needs to be
    scheduled carefully |


    #### Use-Case


    There are very specific use-cases for this approach. The first is for consumers
    who are internal to the organization, have insight into organizational processes
    and information, and can tolerate varying service levels of availability and performance.
    The second is for those situations when it is not possible to create a Sandbox
    version of the API and when it is critical that the consuming application gets
    *full* representative behavior and responses during testing. In this instance,
    the access policy should only allow temporary access.


    #### Design


    As illustrated in Figure [9-8](#509947_1_En_9_Chapter.xhtml#Fig8)


    ![../images/509947_1_En_9_Chapter/509947_1_En_9_Fig8_HTML.jpg](images/509947_1_En_9_Chapter/509947_1_En_9_Fig8_HTML.jpg)


    Figure 9-8


    Design detailing the use of QA as a Sandbox environment


    *   The request is processed in the Quality Assurance (QA) environment.


    *   This is a parallel implementation to Production.


    *   The approach fulfills the requirement to functionally test a solution end
    to end. It is important to note that the QA environment may not be scaled similarly
    to Production – there is a possibility that behavior could vary.


    ### Third-Party Sandbox Access


    A sample distribution detailing the third party to Sandbox access relationship
    for our platform is shown in Figure [9-9](#509947_1_En_9_Chapter.xhtml#Fig9).
    The key factor which influences this spread is that not all third parties consume
    the same API products for one or more of the following reasons:


    ![../images/509947_1_En_9_Chapter/509947_1_En_9_Fig9_HTML.jpg](images/509947_1_En_9_Chapter/509947_1_En_9_Fig9_HTML.jpg)


    Figure 9-9


    Third-party Sandbox distribution


    *   The API products in ***beta*** may have smaller audiences – if only a subset
    of third parties are allowed access *or* if interest from potential consumers
    is low. Many third parties may only focus on stable, production-available APIs.


    *   Many will consume the simpler API products which use a ***Backend Simulation***
    strategy.


    *   APIs are classified as complex if orchestration spans multiple backend providers
    and are great candidates for a ***Shallow*** approach. These API products generally
    fill a niche function which leads to lower third-party attraction and consumption.


    *   Only a few, select third parties may have access to API products which are
    backed with more complex Sandbox strategies – such as ***Semi-Live*** and ***QA***.


    I like to think of access to Sandbox APIs in much the same way as a physical bank
    branch. Anyone is allowed to enter the branch. Only bank personnel may enter the
    staff-permitted areas of the building. Of the bank personnel, only senior and
    authorized members are able to gain entry to sensitive spaces, such as the bank
    vault.


    In much the same way, there are APIs and associated Sandbox environments, which
    only select and authorized third parties may access. This strategy may appear
    to be contrary to the approach of maximizing third-party consumption. The adage
    *“horses for courses”* comes to mind and there will be API products in your stable
    which are suited for specific consumers. Although it is possible to grant every
    third-party access to every API product, the organization may not have the temperament
    or appetite for *any* third party to access key areas or services – due to sensitivity
    of customer data and security restrictions.


    I depict our access strategy in Figure [9-10](#509947_1_En_9_Chapter.xhtml#Fig10)
    in a dartboard-like approach, starting with the lowest security and most open
    on the outside, to the highest and most restricted at the core or bullseye of
    the board. It is important to note that your access strategy may differ based
    on the API products and governance policies of your organization – you may choose
    to add, remove, or even reorder the sequence of layers.


    ![../images/509947_1_En_9_Chapter/509947_1_En_9_Fig10_HTML.jpg](images/509947_1_En_9_Chapter/509947_1_En_9_Fig10_HTML.jpg)


    Figure 9-10


    Third-party Sandbox access'
