  trans: '

    ### 环境监控


    几乎每个网络运营中心或指挥中心环境中，都会有一排排屏幕展示令人印象深刻且不断变化的刻度盘和仪表。在我看来，这是监控环境的传统机制。如图 10-11 所示，折线图通常表示
    CPU 利用率或内存消耗。当达到预定义阈值时，支持人员通常会一阵忙碌，而当图线回落到阈值以下时，大家又会松一口气。


    ![../images/509947_1_En_10_Chapter/509947_1_En_10_Fig11_HTML.png](img/509947_1_En_10_Fig11_HTML.png)


    图 10-11


    基础设施监控


    这些指标的信息来源通常是安装在物理或虚拟主机上的代理程序。这是监控的基础层级，用于判断物理基础设施是否存在问题。它的作用很像给病人量体温。如果体温或 CPU
    偏高，就可作为出现异常的指示。通常这也就是它所能提供信息的边界。


    在 API 或集成环境中，下一个监控层级是服务或端点监控，如图 10-12 所示。这有时也被称为合成监控。周期性探针会测试服务的可用性。我们的团队通常会包含一个*isUp*操作，仅返回一个
    HTTP 200。通过定义告警触发规则（例如连续三次失败），可以消除误报。由于请求通常会沿完整的网络基础设施路径到达端点，因此也能识别负载均衡器或防火墙配置问题，而这些问题未必会在基础设施监控仪表盘中体现。


    ![../images/509947_1_En_10_Chapter/509947_1_En_10_Fig12_HTML.jpg](img/509947_1_En_10_Fig12_HTML.jpg)


    图 10-12


    服务监控


    由于网络环境复杂，曾发生过外部系统变更或更新影响我们服务可用性的情况。周期性、定时执行可作为问题发生时间的确凿证据；进一步的好处是，它能在外部使用方发现并报告问题之前，就先行提醒团队。若继续用病人分诊作类比，这相当于检测血压或血氧饱和度。流量变低可能表明系统中潜在阻塞。单独看它并不能指出根因——但有助于缩小需要进一步调查的范围。


    ### 应用性能监控


    多年前我第一次接触应用性能监控（APM）时，就对这项软件工程成就印象极深。APM 顾问为我们应用的 Java 虚拟机做了埋点，借助字节码注入的“魔法”，我们能够看到事务在平台中的流转。乍看之下，这正是我长期追寻的事务追踪“圣杯”。但随着更多接触和深入研究，我发现
    APM 在软件开发生命周期中有其特定角色，而我对某种略微“更神圣圣杯”的追寻仍未结束。


    尽管 APM 可在生产运维环境中日常使用，但它提供的洞察（如图 10-13 所示）通常主要用于负载测试和性能工程。它就像注入病人血液中的示踪染料，能展示请求到达目的地所经过的精确路径。一些
    APM 产品还会直接呈现数据库请求，从而暴露缺少索引、性能不佳的查询。


    ![../images/509947_1_En_10_Chapter/509947_1_En_10_Fig13_HTML.jpg](img/509947_1_En_10_Fig13_HTML.jpg)


    图 10-13


    APM 事务追踪


    APM 的分析路径可用于优化方案，识别高延迟区域以及系统架构中的潜在瓶颈。坦率地说，这很可能就是运维人员可作为事务执行“唯一信息预言机”使用的圣杯。不过就目前而言，基于我个人经验以及对当前运维流程与规范的观察，我们还没有达到这个结论。


    ### 功能监控


    功能监控的目标，是比“仅验证 API 端点可用”更深入一层，去测试并确认其完整功能是否正常。对于技术候选人，我最喜欢的面试问题之一是：在项目管理、设计、开发、测试或支持这些项目分工中，他/她更倾向哪个方向。顺便说明一下——项目管理其实是个“陷阱”选项，不幸选中它的人，基本就到此为止了。虽然很多人都喜欢写代码，最常见回答是开发，而几乎没人投支持。图
    10-14 展示了我“运维岗位也能写大量代码”这一观点的证据——这是我为平台内部监控开发的一款应用，昵称为*“Homer Knows”*。


    ![../images/509947_1_En_10_Chapter/509947_1_En_10_Fig14_HTML.jpg](img/509947_1_En_10_Fig14_HTML.jpg)


    图 10-14


    Homer Knows


    我们 Marketplace 的关键要素之一是 OAuth 流程。它由一系列 API 调用构成，并会重定向到 Web 用户界面（UI），提示用户进行认证与授权。我们原本只能验证前几步
    API 调用，而 UI 和后续调用的问题，往往要等第三方反馈故障后才会发现。从运维角度看，这种*被动式*方式让我很不安，于是我以此为动力构建了一个可通过桌面端或移动端访问的定制应用：它在简单的*cron*脚本定时触发下，模拟一个用户（Homer
    Simpson）定期跑完整个流程。无论流程成功还是失败，*Homer*都会*知道*。除了学习一个新的移动应用框架，这次实践还让我有机会以与第三方近似的方式来消费
    API。延续我们的医学类比，这使运维团队能够在潜在事故*发生期间*观察“病人”状态，从而可能实时揭示根本原因。

    '
- fmt: '## Telemetry


    A dimension of Monitoring which particularly appeals to me is Telemetry. I first
    came across this concept from watching Formula One (`F1`) racing. As the car moved
    around the circuit, the race engineers were able to get detailed information about
    every facet of the machine. This possibly afforded the pit crew incredible insight
    into the operation of the car and if used correctly, could be used strategically
    for an extra ounce of competitive advantage which would ultimately win the race.


    Leading on from this revelation is firstly the amount of data which is constantly
    pouring in – from tire pressure levels and temperature to remaining fuel to oil
    temperatures to airflow, there are possibly tens if not hundreds or thousands
    of metrics to be scoured through. The true beauty of telemetry is that it affords
    remote control of the source. Present `F1` regulation may not allow, but in previous
    years, the race engineers were able to change the configuration of the car remotely.
    For example, if they found that engine temperatures were dangerously high, the
    race engineer (in consultation with the driver) could lower the maximum revolutions
    per gear to preserve the engine until the end of the race.


    From a software engineering perspective, this is extremely exciting as it allows
    the operations team to make “runtime” configuration changes to the solution for
    optimized performance or possibly to preserve application availability. Examples
    of changes include adding more replicas or instances of a container to handle
    anticipated traffic, dynamically changing endpoint configuration using an environment
    variable strategy or displaying and removing maintenance pages during change windows.
    It should be noted that the objective of telemetry is not to make massive changes
    to the operational domain but affords the ability for “remote control” to make
    subtle course corrections or updates. In an operational environment which cannot
    afford downtime, this is certainly an extremely versatile weapon to have in your
    arsenal.


    ## Alerting


    A key lesson learnt is that a poor alerting strategy can quickly result in operational
    process failure. As the platform experienced an increase in volume, the number
    of alerts sent out overwhelmed the support team. Detailed investigation revealed
    that most alerts were due to data issues or downstream problems, which the Marketplace
    support team could do little to remediate. Within the mass of unactionable items
    (noise) were real system issues, which were increasingly missed, causing unnecessary
    delays in issue resolution.


    The approach we have since adopted for real-time alerting, in anticipation of
    high traffic volumes, is that alerts are not sent on the “noise” but via a classification
    of the errors found. Initially all new errors are alerted on. Upon consultation,
    the errors are reclassified for alerting, if there is no immediate action that
    can be taken by the team. The errors are still logged and tracked in the operational
    service desk, to allow data to be rectified or downstream systems to make changes.
    In addition, all errors are also reported in operational dashboards, and a daily
    report of all errors is sent to key stakeholders, which assists with tracking
    volumes related to downstream systems.


    In keeping with our strategy to leverage enterprise services where possible, the
    platform was initially configured to leverage the alerting capability of the organization
    which allowed alerts to be sent to standby engineers via various channels such
    as email and text message (`SMS`). A challenge with emails, even to a distribution
    group, is that important alerts were missed in a slew of messages, replies regarding
    investigation or resolution on a specific thread caused even more messages and
    finding or tracing through previous incidents meant having to rummage through
    an email archive. The drawback of using `SMS` is the cost due to mobile network
    charges. It soon became apparent that a traditional mechanism would not be an
    ideal fit and an alternative approach would be needed.


    An alluring solution was integration to popular communications platforms like
    Slack, which other teams in the digital space were using. This had the potential
    to propel our alerting to the other end of the capability spectrum. Upon deeper
    reflection regarding this approach, we identified a few potential drawbacks. Using
    a non-enterprise standard would result in significant divergence from the organization
    strategy, integration connectivity challenges to the Slack service, and the requirement
    that every member of the team would need to have additional software installed
    and configured – sometimes on a personal device, not to mention the overhead of
    administering the service.


    An awesome middle ground which we found was to use the organizational communication
    software standard, Microsoft Teams. Teams has a great “channel” feature where
    alerts are routed to as messages. Support engineers can start a thread on a specific
    message, which developers can follow and reply on if called upon to assist. As
    an organization standard, we also leverage the security capability and distribution
    policy of the mobile app. The major benefit is that we are once again in alignment
    with our strategy of leveraging the capability and might of the organization by
    consuming enterprise services.


    ## Support


    In this section, we discuss the “human” element of our support capability. The
    best solutions are built with consideration and awareness of people, process,
    and technology. As the people element, the members of the support team draw on
    the technology such as logging and monitoring and processes, such as Incident
    Management, to maintain the health and stability of the Marketplace. With the
    Marketplace requiring `24x7` attention, a significant debt of gratitude is owed
    to these support engineers in our team. We delve into more detail by discussing
    the structure of the support team, our approach to transition solutions from development
    to operations, and our internal and external communications strategy.'
  raw: '### Telemetry


    A dimension of Monitoring which particularly appeals to me is Telemetry. I first
    came across this concept from watching Formula One (F1) racing. As the car moved
    around the circuit, the race engineers were able to get detailed information about
    every facet of the machine. This possibly afforded the pit crew incredible insight
    into the operation of the car and if used correctly, could be used strategically
    for an extra ounce of competitive advantage which would ultimately win the race.


    Leading on from this revelation is firstly the amount of data which is constantly
    pouring in – from tire pressure levels and temperature to remaining fuel to oil
    temperatures to airflow, there are possibly tens if not hundreds or thousands
    of metrics to be scoured through. The true beauty of telemetry is that it affords
    remote control of the source. Present F1 regulation may not allow, but in previous
    years, the race engineers were able to change the configuration of the car remotely.
    For example, if they found that engine temperatures were dangerously high, the
    race engineer (in consultation with the driver) could lower the maximum revolutions
    per gear to preserve the engine until the end of the race.


    From a software engineering perspective, this is extremely exciting as it allows
    the operations team to make “runtime” configuration changes to the solution for
    optimized performance or possibly to preserve application availability. Examples
    of changes include adding more replicas or instances of a container to handle
    anticipated traffic, dynamically changing endpoint configuration using an environment
    variable strategy or displaying and removing maintenance pages during change windows.
    It should be noted that the objective of telemetry is not to make massive changes
    to the operational domain but affords the ability for “remote control” to make
    subtle course corrections or updates. In an operational environment which cannot
