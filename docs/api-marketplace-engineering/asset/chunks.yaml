  trans: '

    ### 启动配置


    图 5-9 展示了支撑我们 MVP 的启动部署配置。就像被放进糖果店的孩子一样，我们不顾一切，尽可能使用了更多技术要素，并让请求经过尽可能多的跳转才到达目的地。如果企业策略不允许某个特定系统的防火墙访问，我们就采用回跳方案，直到找到替代路径。虽然凭借一支坚韧的团队这当然可行，但最终结果并没有达到本可以实现的最优状态。


    ![../images/509947_1_En_5_Chapter/509947_1_En_5_Fig9_HTML.jpg](img/509947_1_En_5_Fig9_HTML.jpg)


    图 5-9


    启动配置


    如果说构建一个本地部署的 Kubernetes 集群还不够有挑战性，那么我们还选择了构建两个——一个在内部网络，另一个在非军事区（DMZ）。我们组织的 DMZ
    就像遥远星球上的流放监狱。只能通过“跳板机”访问，本质上就是远程桌面连接。运气好的话你能抢到两个会话中的一个，否则你只能等着在某位既有用户去洗手间休息时“接管”一个会话。我至今仍记得一位新来的
    DevOps 工程师发现自己无法获得 GUI 权限来运行安装脚本时那种绝望的表情。在我们的 DMZ 里，像真正的监狱一样，也有不同的安全等级。我们刚开始时，容器和
    Kubernetes 被视为极其危险，因此专门为我们新建了一个比其他区域限制更严格的分区。我们是在尝试连接 DMZ *内部*各组件时才得知此事的。为排查连通性问题而组织的专题会议，过程就像潜艇上的指令传递——请求从测试人员传到协调人，再到网络工程师，再到
    DevOps 工程师，然后再一路返回。尽管这段经历有时很痛苦，但它也是一次巨大的学习机会，让我们理解了组织的网络拓扑，更重要的是学会如何在其中穿行。要让方案可用，必须明确会进行负载均衡的各节点配置以及防火墙开放端口；这些工作即便可以外包给基础设施设计人员，完成也往往要几天甚至几周。


    我们选择的方法是卷起袖子先由内部完成第一版，再与设计师评审，由其纠正并指导我们正确做法。从职业发展的角度看，通过这次协作，我们与基础设施项目经理、设计师和支持团队建立了良好关系。通过与这些团队紧密合作，我们更好地理解了内部流程、这些流程存在的原因，以及企业支持团队所承受的巨大压力。我们对内部团队“看似漫长”的解决周期所产生的不满，很快转变为对其付出的同理与尊重，最终也为我们自己先前任性的行为感到尴尬。与其抨击那些我们认为拖慢进度的流程与治理机制，我们选择去理解并与之协作。值得肯定的是，组织本身也在努力精简运营，以更敏捷地响应并将解决方案推向市场。这段经历虽然令人谦逊，却是最有回报的经历之一，因为它要求我们通过建立与支持团队的关系来实现部署目标。


    一个加速我们交付、并持续至今仍在发挥作用的因素，是获准让 DMZ 中的 API Gateway 实例可以直接（虽经由负载均衡器）访问我们的微服务。企业标准原本要求所有内部
    API 必须通过内部 Gateway 访问。这将导致接口定义需要发布两次（内部一次、外部一次），并且由于请求还要多经过一站，也会影响性能。多节点托管容器平台在
    DMZ 中仅托管了一个授权门户容器应用。这样复杂部署的理由是：平台上线时有助于承受高流量。每当回想起我们最初的判断，以及那些基于情绪而非现实做出的设计决策，我仍会忍俊不禁。


    ### 现状配置


    图 5-10 反映了一个更加成熟、更加负责的团队所采用的部署配置。过去那种只求达成 MVP 的狂热日子已经过去，我们对平台技术要素以及企业支撑系统的现实状况有了更清醒的认识。我们也非常幸运，有两位资深
    DevOps 工程师加入团队，他们真正“知道我们所不知道的事”。凭借他们的经验，一个更稳定、更符合企业要求的 Kubernetes 集群很快建立起来——这是第三次迭代。


    ![../images/509947_1_En_5_Chapter/509947_1_En_5_Fig10_HTML.jpg](img/509947_1_En_5_Fig10_HTML.jpg)


    图 5-10


    现状配置


    最早提出的问题之一，是在 DMZ 中是否真的需要一个完整的 Kubernetes 集群。他们耐心地解释，就像家长对饭前想吃冰淇淋的孩子那样：使用更简单的 Docker
    容器平台部署，也可以实现同样目标。他们对我们 DevOps 平台演进的贡献，堪比一个高度发达的外星文明在帮助刚学会用火的穴居人。这同样是一堂重要的课。如果你要拥抱新技术，不论是短期
    MVP 还是长期转型项目，都务必配备匹配技能水平的人才，或者考虑只采用技术子集，甚至干脆不采用。观察大师施展技艺本身就是一种震撼的体验；很快，我们的平台拥有了可工作的流水线，团队也开始通过即时消息向托尔金中土世界里的角色“下达指令”来发布代码组件。


    这次部署最重大的进展之一，是网络安全团队批准由 DMZ 中的反向代理对外暴露内部托管的 Web 应用。这个里程碑式决定使得原本托管在 DMZ 容器平台中的单一
    Web 应用能够迁移到内部 Kubernetes 集群。这优化了交付流程，因为内部流水线和网络连通性都可复用，支持也更简化——容器及其相关日志都能被轻松访问。我们选择不下线
    DMZ 容器平台，目前将其用于托管不属于平台核心的外部应用。比如利用 API Marketplace 能力、但服务于第三方目标（例如同步账户交易）的应用，就部署在该平台上。

    '
- fmt: '## To-Be Configuration


    As challenging and rewarding as finally establishing an enterprise-grade on-premises
    Kubernetes platform has been, the team has reached the conclusion that this exercise
    is much like keeping a lion as a pet. The platform demands constant attention
    and dedicated support and if not controlled can gobble up an inexperienced handler.
    Figure [5-11](#509947_1_En_5_Chapter.xhtml#Fig11) reflects the plans for the next
    step of our deployment architecture. We envisage running the various elements
    of the stack using Cloud infrastructure and platform services. Given that components
    such as the API Gateway is a shared instance, this will inevitably be a phased
    migration. Supporting elements, such as code repositories and DevOps pipelines,
    also must be migrated to the Cloud.


    ![../images/509947_1_En_5_Chapter/509947_1_En_5_Fig11_HTML.jpg](images/509947_1_En_5_Chapter/509947_1_En_5_Fig11_HTML.jpg)


    Figure 5-11


    As-Is configuration


    For a startup of smaller organization, using Cloud infrastructure or platform
    services is a relatively trivial task. This iteration has revealed that this lies
    on the other end of the difficulty spectrum for an established enterprise. There
    are various considerations, such as connectivity from an on-premises component
    to Cloud and back to on-premises. The ultimate aim is to use a Cloud provider
    Managed Kubernetes Service which would abstract the underlying infrastructure
    requirement and allow us to focus on the microservice as a container.


    Simply put, we would pack up a container and have it hosted on a Managed Container
    Platform. The managed service would take care of any security patches, upgrades,
    or infrastructure scaling required. Scaling is a key factor as we would not have
    to maintain the physical hardware or virtual machines as we currently do. As much
    as we look forward to the move to Cloud, we are doing our best to keep our expectations
    under control. If the lengthy, and sometimes bumpy journey to get to Cloud is
    anything to go by, residing and operating in a new environment may present a whole
    new set of challenges. I hope that the learning and growth is as rewarding as
    our previous iterations.


    ## Summary


    Establishing the platform architecture for an API Marketplace has presented a
    tremendous learning opportunity for our team. We realized that reading a blog
    post detailing how Netflix deploys and operates applications only scratches the
    surface when the team has to do it themselves, within a significantly different
    organizational context. It allowed us hands-on exposure to elements like `Docker`
    for containerization, `gRPC` for inter-service microservice communication, and
    `Kubernetes` for container management.


    We consider deep technical components like ingresses, services, and pods as offspring
    we have hand-raised and nurtured. Like parents with a newborn, the journey has
    also been challenging. We have had to weather severe bouts of cholic when we looked
    wearily at each other and wondered if we would make it through.


    Equally, there have been moments of pride, when the platform took its first steps
    as we scaled the number of pod replicas and breezed through a performance test.
    Our platform, like a baby, has matured and is now entering a new phase of existence.
    The benefit of time affords us a much better understanding of its operation, strengths,
    and weaknesses. There is still much to be improved and optimized which is the
    reason I consider an API Marketplace to be a living, breathing organism. The African
    proverb “It takes a village to raise a child” sums up our experience as it would
    not have been possible to have achieved this objective without the help and support
    of the Enterprise.


    In the next chapters, we discuss how the Platform Architecture is used to support
    the API products of the Marketplace, from Design to Development to Operations.


    ## 6. Security


    Establishing an API Marketplace can be like setting up an embassy for your organization
    in a foreign and hostile territory. Although your intention is noble and your
    aim is to help third-party providers leverage your products and services, it exposes
    the enterprise to a range of new attack vectors every day. The stakes are incredibly
    high when precious customer and other sensitive data are at risk. The mantra that
    everyone is responsible for ensuring the safety and integrity of the platform
    is not to be taken lightly. Any breaches across any of the API products could
    lead to negative public sentiment, impacting other products, the Marketplace,
    and the greater organization.


    Security is not simply the access mechanism to the API. It is important to consider
    it as an element which permeates each layer of the platform – from a technical,
    people, and process perspective. Fortunately, there are well-established patterns
    and security standards which can be followed as a guideline to direct your implementation.
    It is also a fine balancing act as it must be tailored to the requirements of
    your organization without impacting developer adoption.


    In the sections which follow, I will cover the security topics which may be applicable
    to an API Marketplace implementation for different products, audiences, and stages
    in their lifecycle. As covered in our earlier chapter on Regulation, there may
    be variants of these standards for specific industries. We will examine the Open
    Banking variation in more detail.


    The dynamicity of the ever-changing security context is one which makes an API
    Marketplace more challenging and interesting as it demands constant learning and
    adaptation to stay safe. We are incredibly fortunate as there is an incredible
    amount of literature, offerings, and perspectives available in this regard. Knowledge
    is critical to understanding the landscape and to stay safe.'
