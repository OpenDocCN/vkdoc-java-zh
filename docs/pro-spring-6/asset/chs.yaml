- "# 17. 保护 Spring Web 应用程序\n\n**第** **14** **章**解释了如何使用经典的“手动”风格配置以及使用 Spring Boot\
  \ 和 Thymeleaf 构建 Spring Web 应用程序。本章将采用**第** **14** **章**中构建的应用程序，并添加一个安全层，该层将声明哪些用户被允许访问应用程序的各个部分。例如，只有那些使用有效用户\
  \ ID 登录应用程序的用户才能添加新歌手或更新现有歌手。其他用户，称为*匿名用户*，只能查看歌手信息。\n\nSpring Security 是保护基于 Spring\
  \ 的应用程序的最佳选择。Spring Security 为企业应用程序提供身份验证、授权和其他安全功能。虽然主要用于表示层，但 Spring Security\
  \ 可以帮助保护应用程序内的所有层，包括服务层。在以下部分中，我们演示如何使用 Spring Security 来保护歌手应用程序。对于 Web 应用程序，根据所使用的视图技术，有一些标签可以作为视图模板的一部分，根据用户权限隐藏或显示视图的部分内容。\n\
  \nSpring Security 是一个相对复杂的框架，旨在使开发人员能够轻松地在应用程序中实现安全性。在成为 Spring 的一部分之前，该项目始于 2003\
  \ 年底，名为 *Acegi Security*。第一个 Spring Security 版本是 2008 年 4 月的 2.0.0 版本。\n\n在应用程序安全方面，有两个最重要的过程，Spring\
  \ Security 可用于配置这两个过程：\n\n*   *身份验证*：证明您就是您所声称的身份的过程。这意味着您将凭据提交给应用程序，并针对一组现有用户进行测试，如果找到匹配项，您将被授予访问应用程序的权限。\n\
  \n*   *授权*：授予经过身份验证的一方执行某项操作的权限的过程。Spring Security 本质上是一个由拦截规则组成的框架，用于授予或不授予对资源的访问权限。\n\
  \n这两个过程围绕着一个 `principal`（主体），它表示可以在应用程序内执行操作的用户、设备或系统，以及 `credentials`（凭据），它们是主体用来确认其身份的识别密钥（例如，用户名和密码）。\n\
  \n本章展示如何使用 Spring Security 6.x 配置授权和身份验证。\n\n![](img/315511_6_En_17_Figa_HTML.jpg)一个带有感叹号的圆圈的插图。 您可以在\
  \ GitHub 上找到 Spring Security 的源代码，网址为 [`https://github.com/spring-projects/spring-security/`](https://github.com/spring-projects/spring-security/)。\n\
  \n## 配置 Spring Security：经典方式\n\n本节展示如何保护**第** **14** **章**中构建的应用程序。要为其添加 Spring\
  \ Security，我们显然需要向类路径添加一些库。Spring Web 应用程序的最小 Spring Security 配置通常类似于图 17-1 中描绘的配置。\n\
  \n![](img/315511_6_En_17_Fig1_HTML.jpg)\n\n一个屏幕显示了第 17 章的下拉菜单，其中包含任务下依赖项下的编译类路径。在类路径下选择了\
  \ Spring 框架安全配置和 Web。\n\n图 17-1\n\n项目 `chapter17` 依赖项\n\n`spring-security-config`\
  \ 库包含 Java 配置支持。`spring-security-web` 库包含 Web 安全基础设施代码，例如各种过滤器和其他的 Servlet API 依赖项。\n\
  \nSpring Security 的内部结构很复杂，官方文档对此进行了非常详细和清晰的解释。就本书而言，您只需要知道，一旦配置了 Spring Security，所有\
  \ HTTP 请求都会被安全拦截器拦截，并且对资源的访问是根据发出请求的用户来决定的。安全拦截器使用预处理步骤和后处理步骤。在预处理步骤中，它会查看请求的资源是否使用由\
  \ `org.springframework.security.access.ConfigAttribute`^(¹⁶⁹) 表示的元数据信息进行保护。如果没有，则允许请求继续前往请求的\
  \ URL 或方法。如果请求的资源是受保护的，安全拦截器会从当前的 `SecurityContext` 中检索 `Authentication` 对象。如有必要，`Authentication`\
  \ 对象将根据配置的 `AuthenticationManager` 进行身份验证。\n\n拦截对 Web 应用程序的所有请求需要一个特殊的 Servlet 过滤器。需要配置的\
  \ Spring Security 过滤器名为 `springSecurityFilterChain`，顾名思义，它不是单个过滤器，而是一系列链接在一起的过滤器集合，用于保护应用程序\
  \ URL、验证提交的用户名和密码、重定向到登录表单等。Spring Security 提供了配置此过滤器并根据需要深度自定义其各种功能的方法。\n\n话虽如此，让我们看看如何使用经典配置在\
  \ Spring Web 应用程序中配置安全支持。\n\n![](img/315511_6_En_17_Figb_HTML.jpg)一个灯泡图标的插图。 如果需要，请在此处回顾**第**\
  \ **14** **章**，以重新熟悉具有经典配置的 Spring Web 应用程序的组件，以及如何将应用程序打包为 WAR 文件并部署到 Apache Tomcat\
  \ 10。\n\n图 17-2 展示了具有经典配置的安全 Spring Web 应用程序的配置类。\n\n![](img/315511_6_En_17_Fig2_HTML.jpg)\n\
  \n一张图片展示了第 17 章的下拉菜单，其中选择了安全初始化器和 Web 初始化器选项（位于 Java 下）。\n\n图 17-2\n\n项目 `chapter17`\
  \ 配置类\n\n我们需要做的第一件事是确保 `springSecurityFilterChain` 是应用程序的入口点，以最高优先级注册，成为链中的第一个过滤器，位于任何其他已注册的\
  \ `jakarta.servlet.Filter` 之前。这是通过向应用程序添加一个实现 `org.springframework.web.WebApplicationInitializer`\
  \ 的类来完成的。在图 17-2 中，该类名为 `SecurityInitializer`。其实现如清单 17-1 所示。\n\n```\npackage com.apress.prospring6.seventeen;\n\
  import org.springframework.security.web.context.AbstractSecurityWebApplicationInitializer;\n\
  class SecurityInitializer extends AbstractSecurityWebApplicationInitializer {\n\
  @Override\nprotected boolean enableHttpSessionEventPublisher() {\nreturn true;\n\
  }\n}\n清单 17-1\nSecurityInitializer 类\n```\n\n请注意，`SecurityInitializer` 类没有直接实现 `WebApplicationInitializer`，而是通过扩展\
  \ `AbstractSecurityWebApplicationInitializer` 来受益于默认的 Spring 实现并减少开发人员必须做的工作。\n\n\
  ![](img/315511_6_En_17_Figc_HTML.jpg)一个灯泡图标的插图。 `enableHttpSessionEventPublisher()`\
  \ 方法被重写以返回 `true`；默认情况下它返回 `false`，我们可以保持原样，因为此配置对于本章的其余部分并不重要。如果会话管理指定了最大会话数，则此方法应返回\
  \ `true`，因为在这种情况下，会将 `org.springframework.security.web.session.HttpSessionEventPublisher`\
  \ 添加到配置中，以便在用户注销时通知会话注册表。\n\n现在安全过滤器已就位，让我们为其提供执行其工作所需的组件。\n\n请注意，我们没有为登录页面添加任何视图模板——使用\
  \ Spring Security，我们不必这样做。使用默认配置，会包含一个非常简单的默认登录页面，任何需要身份验证的请求都会被重定向到该页面。因此，我们可以直接跳到\
  \ Spring Security 配置。清单 17-2 展示了 `SecurityCfg` 类，其解释紧随清单之后。\n\n```\npackage com.apress.prospring6.seventeen;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.security.config.annotation.web.configuration.EnableWebSecurity;\n\
  @Configuration\n@EnableWebSecurity\npublic class SecurityCfg {\n}\n清单 17-2\nSecurityCfg\
  \ 类的基本版本\n\n这是可能的最简单的 Spring Security 配置示例。它使用默认配置设置了 `securityFilterChain`，因此所有请求现在都被阻止。如果您部署项目并尝试在\
  \ `http://localhost:8080/ch17` 访问它，您将被重定向到图 17-3 所示的登录屏幕。\n\n![](img/315511_6_En_17_Fig3_HTML.jpg)\n\
  \n本地主机登录的截图包含用户名和密码的空白框，下方有登录选项。\n\n图 17-3\n\n默认登录屏幕\n\n这是一个非常简单的登录页面，使用 Bootstrap^(¹⁷⁰)\
  \ 编写，包含一个用于提交用户名和密码的表单。如果您愿意，可以在浏览器中检查源代码。如果您尝试输入用户名和密码，您将被重定向到同一页面，但会添加一条错误消息，如图\
  \ 17-4 所示。\n\n![](img/315511_6_En_17_Fig4_HTML.jpg)\n\n本地主机登录错误的截图包含用户名和密码的空白框，下方有登录选项。在用户名上方，错误框显示“未找到身份验证提供程序”。\n\
  \n图 17-4\n\n带有错误消息的登录屏幕\n\nSpring 抱怨的是没有配置 `AuthenticationProvider` bean，因此 Spring\
  \ 不知道在哪里查找与提交的用户名和密码匹配的用户名和密码，以便验证您的身份。为了尽可能保持简单，我们将配置一个 `UserDetailsService` 类型的\
  \ bean，用于教学目的的内存身份验证。它声明了一个名为 \"john\"、密码为 \"doe\"、角色为 \"USER\" 的单一用户。该 bean 如清单\
  \ 17-3 所示。\n\n```\npackage com.apress.prospring6.seventeen;\nimport org.springframework.security.core.userdetails.User;\n\
  import org.springframework.security.core.userdetails.UserDetails;\nimport org.springframework.security.core.userdetails.UserDetailsService;\n\
  import org.springframework.security.provisioning.InMemoryUserDetailsManager;\n//\
  \ some import statements omitted\n@Configuration\n@EnableWebSecurity\npublic class\
  \ SecurityCfg {\n@Bean\npublic UserDetailsService userDetailsService() {\nUserDetails\
  \ user = User.withDefaultPasswordEncoder()\n.username(\"john\")\n.password(\"doe\"\
  )\n.roles(\"USER\")\n.build();\nreturn new InMemoryUserDetailsManager(user);\n}\n\
  }\n清单 17-3\nUserDetailsService bean\n```\n\n此配置很紧凑，但它做了很多事情，部分列表如下：\n\n*   阻止对所有应用程序\
  \ URL 的访问\n\n*   生成一个登录表单\n\n*   允许对名为 `john`、密码为 `password` 的用户进行基于表单的身份验证\n\n\
  *   也允许用户注销\n\n*   防止 CSRF^(¹⁷¹) 攻击\n\n*   提供会话固定^(¹⁷²) 保护\n\n`UserDetailsService`\
  \ bean 也非常简单，`User` 对象是使用 `withDefaultPasswordEncoder()` 构建的，该编码器委托给 `BCryptPasswordEncoder`。如果您想构建一个演示应用程序，并且需要多个用户和角色，您可以显式声明一个\
  \ `BCryptPasswordEncoder` bean 并使用它。清单 17-4 向您展示了如何操作。\n\n```\npackage com.apress.prospring6.seventeen;\n\
  import org.springframework.security.crypto.bcrypt.BCryptPasswordEncoder;\n// some\
  \ import statements omitted\n@Configuration\n@EnableWebSecurity\npublic class SecurityCfg\
  \ {\n@Bean\npublic PasswordEncoder encoder() {\nreturn new BCryptPasswordEncoder();\n\
  }\n@Bean\npublic UserDetailsService userDetailsService(PasswordEncoder encoder)\
  \ {\nUser.UserBuilder users  = User.builder().passwordEncoder(encoder::encode);\n\
  var joe = users\n.username(\"john\")\n.password(\"doe\")\n.roles(\"USER\")\n.build();\n\
  var jane = users\n.username(\"jane\")\n.password(\"doe\")\n.roles(\"USER\")\n.build();\n\
  var admin = users\n.username(\"admin\")\n.password(\"admin\")\n.roles(\"ADMIN\"\
  )\n.build();\nreturn new InMemoryUserDetailsManager(jane, joe, admin);\n}\n}\n清单\
  \ 17-4\n带有 BCryptPasswordEncoder Bean 的 SecurityCfg 类\n```\n\n该类使用 `@EnableWebSecurity`\
  \ 注解进行注解，以在 Spring Web 应用程序中启用安全行为。此注解暴露了 `SecurityFilterChain` bean，因此可以对其进行自定义。到目前为止引入的配置并未显示任何相关内容。`SecurityFilterChain`\
  \ bean 的每个方面都可以自定义。让我们从小处着手，添加一个显式配置，该配置实际上使用默认值，只是为了了解它是如何完成的。清单 17-5 向您介绍了一个自定义的\
  \ `SecurityFilterChain` bean。\n\n```\npackage com.apress.prospring6.seventeen;\n\
  import org.springframework.security.config.Customizer;\nimport org.springframework.security.config.annotation.web.builders.HttpSecurity;\n\
  import org.springframework.security.web.SecurityFilterChain;\n// some import statements\
