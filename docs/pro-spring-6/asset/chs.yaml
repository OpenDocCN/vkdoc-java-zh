  配置的每个部分都以一个注释作为前缀，说明其作用范围。以下列表进一步解释了每个部分中使用的属性：




  *   `# web server configuration`：此部分配置应用程序可访问的 URL。将地址设置为`0.0.0.0`可使应用程序在运行该计算机的所有网络地址上均可访问；例如，`http://localhost:8081/`、`http://127.0.0.1:8081/`等。


  *   `# HTTP Method filter`：将`spring.mvc.hiddenmethod.filter.enabled`设置为`true`，相当于在
  Spring Boot 中配置过滤器以支持 PUT 和 DELETE HTTP 方法。


  *   `# internationalization configuration`：此部分配置国际化文件的位置、名称、编码等。


  *   `# file upload configuration`：此部分配置支持文件上传所需的所有组件。


  *   `# view resolver configuration`：此部分配置 Thymeleaf 视图模板的位置、编码、最大大小等。Spring Boot
  使用此配置来配置 Thymeleaf 引擎和 Thymeleaf 解析器 Bean。


  *   `# data source configuration`：此部分将所有数据源配置（包括持久化）分组。


  *   `# Logging config`：此部分配置日志记录。


  无法放入`application-dev.yaml`的配置部分，则放入典型的配置类中，并使用`@Configuration`注解。


  ![](img/315511_6_En_14_Fign_HTML.jpg)灯泡图标。 `HibernateCfg`类是为了解决 Spring Data JPA
  与 MariaDB 在数据库对象命名相关的 bug 而采用的变通方案。没有此类，仓库接口无法映射到表，因为 Spring Boot 会查找名为`musicdb.singer`的表但找不到，而
  MariaDB Docker 容器在声明对象时使用的是大写字母（例如：MUSICDB.SINGER）。由于将 Docker SQL 查询全部转为小写工作量过大，因此借此机会引入了一个高级配置示例。`HibernateCfg`类如代码清单
  14-40 所示。


  ```

  package com.apress.prospring6.fourteen.boot;

  import org.hibernate.boot.model.naming.Identifier;

  import org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl;

  import org.hibernate.engine.jdbc.env.spi.JdbcEnvironment;

  import org.springframework.context.annotation.Bean;

  import org.springframework.context.annotation.Configuration;

  @Configuration(proxyBeanMethods = false)

  public class HibernateCfg {

  @Bean

  PhysicalNamingStrategyStandardImpl caseSensitivePhysicalNamingStrategy() {

  return new PhysicalNamingStrategyStandardImpl() {

  @Override

  public Identifier toPhysicalTableName(Identifier logicalName, JdbcEnvironment context)
  {

  return apply(logicalName, context);

  }

  @Override

  public Identifier toPhysicalColumnName(Identifier logicalName, JdbcEnvironment context)
  {

  return apply(logicalName, context);

  }

  private Identifier apply(final Identifier name, final JdbcEnvironment context) {

  if ( name == null ) {

  return null;

  }

  StringBuilder builder = new StringBuilder( name.getText().replace( ''.'', ''_''
  ) );

  for ( int i = 1; i < builder.length() - 1; i++ ) {

  if ( isUnderscoreRequired( builder.charAt( i - 1 ), builder.charAt( i ), builder.charAt(
  i + 1 ) ) ) {

  builder.insert( i++, ''_'' );

  }

  }

  return Identifier.toIdentifier(builder.toString().toUpperCase());

  }

  private boolean isUnderscoreRequired(final char before, final char current, final
  char after) {

  return Character.isLowerCase( before ) && Character.isUpperCase( current ) && Character.isLowerCase(
  after );

  }

  };

  }

  }

  代码清单 14-40

  HibernateCfg 类

