  ```


  请注意，通知被执行了两次，但堆栈跟踪却无处可见。原因是`assertThrows(..)`方法，但由于测试通过，我们可以确定异常已被抛出。如果你有疑问，只需注释掉`assertThrows(..)`这一行，将其替换为对`sing(guitar)`的调用，然后重新运行测试。


  对于`@AfterReturning`通知，代码基本保持不变，只是通知注解为`@AfterReturning`而非`@After`，并且测试时只会打印出`> 已执行:
  sing 来自 com.apress.prospring6.five.annotated.PretentiosGuitarist 使用吉他 Martin`。


  对于`@AfterThrowing`通知，代码也基本保持不变，只是通知注解为`@AfterThrowing`而非`@After`，并且测试时只会打印出`> 已执行:
  sing 来自 com.apress.prospring6.five.annotated.PretentiosGuitarist 使用吉他 Musicman`。


  `@AfterThrowing`通知还能做另外两种通知做不到的一件事：拦截目标方法抛出的异常，并将其替换为不同类型的异常。


  `AfterThrowingAdviceV2`切面将目标方法抛出的`IllegalArgumentException`替换为`RejectedInstrumentException`实例，这是一个非常简单的自定义`RuntimeException`实现。`@AfterThrowing`通知无法阻止目标方法抛出异常，但可以替换它抛出的异常。`AfterThrowingAdviceV2`代码如清单
  5-65 所示。




  ```

  package com.apress.prospring6.five.advice;

  import com.apress.prospring6.five.common.RejectedInstrumentException;

  import org.aspectj.lang.annotation.AfterThrowing;

  // 其他导入语句已省略

  @Component

  @Aspect

  public class AfterThrowingAdviceV2 {

  private static Logger LOGGER = LoggerFactory.getLogger(AfterThrowingAdviceV2.class);

  @Pointcut("execution(* com.apress.prospring6.five..PretentiosGuitarist.sing*(com.apress.prospring6.five.common.Guitar))  &&
  args(value)")

  public void singExecution(Guitar value) {

  }

  @AfterThrowing(value = "singExecution(guitar) ", argNames = "joinPoint,guitar, ex",
  throwing = "ex")

  public void simpleAfterAdvice(JoinPoint joinPoint, Guitar guitar, IllegalArgumentException
  ex) {

  var signature = (MethodSignature) joinPoint.getSignature();

  LOGGER.info(" > 已执行: {} 来自 {}，使用吉他 {} ", signature.getName(), signature.getDeclaringTypeName(),
  guitar.getBrand());

  if(ex.getMessage().contains("不可接受的吉他!")) {

  throw new RejectedInstrumentException(ex.getMessage(), ex);

  }

  }

  }

