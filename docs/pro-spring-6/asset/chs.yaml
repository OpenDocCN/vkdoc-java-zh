  var singers = singerRepo.findAll();

  assertEquals(3, singers.size());

  }

  @Test

  void testStoredFunction(){

  var firstName = singerRepo.findFirstNameById(2L).orElse(null);

  assertEquals("Ben", firstName);

  }

  @Configuration

  @Import(BasicDataSourceCfg.class)

  public static class TestContainersConfig {

  @PostConstruct

  public void initialize() throws ScriptException, IOException {

  final String script1 = Resources.toString(Resources.getResource("testcontainers/create-schema.sql"),
  StandardCharsets.UTF_8);

  final String script2 = Resources.toString(Resources.getResource("testcontainers/original-stored-function.sql"),
  StandardCharsets.UTF_8);

  mariaDB.start();

  ScriptUtils.executeDatabaseScript(new JdbcDatabaseDelegate(mariaDB,""), "schema.sql",
  script1, false, false, ScriptUtils.DEFAULT_COMMENT_PREFIX,

  ScriptUtils.DEFAULT_STATEMENT_SEPARATOR, "$$", "$$$");

  ScriptUtils.executeDatabaseScript(new JdbcDatabaseDelegate(mariaDB,""), "schema.sql",
  script2, false, false, ScriptUtils.DEFAULT_COMMENT_PREFIX,

  ScriptUtils.DEFAULT_STATEMENT_SEPARATOR, "$$", "$$$");

  }

  }

