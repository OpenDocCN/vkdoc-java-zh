  URI 来减少。根据端点的不同，这些值可以是 bean 名称、完全限定类名、属性名称等。您可能会将它们视为路径变量或过滤器，但 Spring 团队更喜欢称它们为*标签*。


  Spring Boot Actuator 非常强大且高度可定制。要了解更多信息，请查看官方文档^(¹⁸⁵)。


  ### 将 Spring Boot Actuator 与 Micrometer 结合使用


  在图 18-6（本章前面部分）中，`spring-boot-starter-actuator` 库显示了两个传递依赖项：`micrometer-core` 和
  `micrometer-observation`。Micrometer^(¹⁸⁶) 是一个开源指标门面，它提供了一个供应商中立的指标收集 API（父抽象实现是
  `io.micrometer.core.instrument.MeterRegistry`^(¹⁸⁷)) 以及针对本章开头提到的各种监控系统的实现。它可以与 Spring
  Boot Actuator 一起使用，但它是一个独立的平台，可以单独使用。


  如果您觉得 Micrometer 难以理解，可以将其视为 SLF4J，它是各种日志记录框架的门面或抽象。这意味着开发人员可以使用 SLF4J 编写日志消息，这些消息将由应用程序配置的框架收集并写入所需的支持。在本书中，SLF4J
  与 Logback Classic 一起使用，但我们可以轻松地将 Logback Classic 替换为 Log4j2，而无需更改任何代码。从 Spring Boot
  Actuator 2.x 开始，您可以为指标做同样的事情——Micrometer 可用于收集指标并以任何（几乎）高级监控系统可以解释的格式公开它们。Spring
  Boot 3 开箱即用地自动配置了相当长的指标列表。此列表由对 `http://0.0.0.0:9091/monitoring/metrics` 端点的 GET
  请求返回（如上一节所配置）。清单 18-12 列出了这些指标的名称。


