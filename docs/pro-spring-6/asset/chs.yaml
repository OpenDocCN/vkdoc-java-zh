  `Formatter<T>` SPI 是一个组合接口，它继承了 `Printer<T>` 和 `Parser<T>` 接口。这三个接口都是 `org.springframework.format`
  包的一部分。清单 11-12 中 `Formatter<LocalDate>` 实现的每个方法都由这些接口之一提供。这三个接口如清单 11-14 所示。 ^(¹⁰²)


  ```

  // ---- Formatter.java ----

  package org.springframework.format;

  public interface Formatter extends Printer, Parser {

  }

  // ---- Printer.java ----

  @FunctionalInterface

  public interface Printer {

  String print(T fieldValue, Locale locale);

  }

  // ---- Parser.java ----

  import java.text.ParseException;

  import java.util.Locale;

  @FunctionalInterface

  public interface Parser {

  T parse(String clientValue, Locale locale) throws ParseException;

  }

  清单 11-14

  Spring 格式化 SPI 接口

  ```


  每当你需要一个格式化器时，你所要做的就是实现 `Formatter<T>` 接口，并用所需的类型参数化它，然后通过使用自定义的 `FormattingConversionServiceFactoryBean`
  或声明一个 `FormattingConversionService` 类型的 Bean 并将格式化器实例添加到其中，将其添加到 Spring 配置中。最简单的方法是使用
  `DefaultFormattingConversionService`，它是 `FormattingConversionService` 的一个开箱即用的特化实现，默认配置了适用于大多数应用程序的转换器和格式化器。




  清单 11-15 展示了 `FormattingServiceCfg` 类，该类声明了一个名为 `conversionService` 的 bean，它是一个
  `DefaultFormattingConversionService`，并添加了 `Formatter<LocalDate>` 的实现。


  ```

  package com.apress.prospring6.eleven.formatter;

  import org.springframework.format.Formatter;

  import org.springframework.format.support.DefaultFormattingConversionService;

  import org.springframework.format.support.FormattingConversionService;

  // 其他导入语句已省略

  @Configuration

  public class FormattingServiceCfg {

  @Bean

  public FormattingConversionService conversionService() {

  var formattingConversionServiceBean = new DefaultFormattingConversionService(true);

  formattingConversionServiceBean.addFormatter(localDateFormatter());

  return formattingConversionServiceBean;

  }

  protected Formatter localDateFormatter() {

  return new Formatter() {

  @Override

  public LocalDate parse(String source, Locale locale) throws ParseException {

  return LocalDate.parse(source, getDateTimeFormatter());

  }

  @Override

  public String print(LocalDate source, Locale locale) {

  return source.format(getDateTimeFormatter());

  }

  protected DateTimeFormatter getDateTimeFormatter(){

  return DateTimeFormatter.ofPattern("yyyy-MM-dd");

  }

  };

  }

  }

