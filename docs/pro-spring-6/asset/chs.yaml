  ## Spring 中的任务执行


  Spring 的 `TaskExecutor` 接口是在 2.0 版本中添加的。与 JDK 类似，Spring 开箱即用地提供了许多适用于不同需求的 `TaskExecutor`
  实现^(¹⁰⁷)。其中最值得关注的有以下几种：


  *   `org.springframework.core.task.SyncTaskExecutor`：不异步执行任务；调用发生在调用线程中。

  *   `org.springframework.core.task.SimpleAsyncTaskExecutor`：每次调用时创建新线程；不重用现有线程。

  *   `org.springframework.scheduling.concurrent.ConcurrentTaskExecutor`：`java.util.concurrent.Executor`
  实例的适配器。由于存在 `ThreadPoolTaskExecutor` 类，通常不常使用，但如果此实现不够灵活，它就会派上用场。

  *   `org.springframework.scheduling.concurrent.ThreadPoolTaskExecutor`：`TaskExecutor`
  实现，提供通过 Bean 属性配置 `ThreadPoolExecutor` 并将其作为 Spring `TaskExecutor` 暴露的能力。

  *   `org.springframework.scheduling.quartz.SimpleThreadPoolTaskExecutor`：Quartz
  的 `SimpleThreadPool` 的子类；当你需要让 Quartz 和非 Quartz 组件共享一个线程池时使用。


  每个 `TaskExecutor` 实现都有其特定用途，并且显然都拥有相同的 API。唯一的区别在于配置，即定义要使用哪个 `TaskExecutor` 实现及其属性（如果有的话）。让我们看一个简单的示例，该示例打印出一些随机文本。所使用的
  `TaskExecutor` 实现是 `SimpleAsyncTaskExecutor`。首先，我们创建一个包含任务执行逻辑的 Bean 类，如清单 12-5
  所示。


  ```

  package com.apress.prospring6.twelve;

  // 部分导入语句已省略

  import org.springframework.core.task.TaskExecutor;

  import java.util.UUID;

  @Component

  public class RandomStringPrinter {

  private final Logger logger = LoggerFactory.getLogger(RandomStringPrinter.class);

  private final TaskExecutor taskExecutor;

  public RandomStringPrinter(TaskExecutor taskExecutor) {

  this.taskExecutor = taskExecutor;

  }

  public void executeTask() {

  for(int i=0; i<10; i++) {

  int index = i;

  taskExecutor.execute(() -> LOGGER.info("{}: {}", index , UUID.randomUUID().toString().substring(0,
  8)));

  }

  }

  }

  清单 12-5

  RandomStringPrinter 类

  ```


  这个类只是一个普通的 Bean，需要将 `TaskExecutor` 作为依赖注入，并定义了一个 `executeTask()` 方法。`executeTask()`
  方法通过创建一个新的 `Runnable` 实例（包含我们想要为此任务执行的逻辑）来调用所提供的 `TaskExecutor` 的 execute 方法。这里可能不太明显，因为使用了
  lambda 表达式来创建 `Runnable` 实例。配置非常简单，与上一节描述的配置类似。我们唯一需要考虑的是，需要提供一个 `TaskExecutor`
  Bean 的声明，该 Bean 将被注入到 `RandomStringPrinter` Bean 中。


  清单 12-6 展示了配置类和名为 `SimpleAsyncTaskExecutorDemo` 的演示类。


  ```

  package com.apress.prospring6.twelve;

  // 部分导入语句已省略

  import org.springframework.scheduling.annotation.EnableAsync;

  @Configuration

  @EnableAsync

  class AppConfig {

  @Bean

  TaskExecutor taskExecutor() {

  return new SimpleAsyncTaskExecutor();

  }

  }

  public class SimpleAsyncTaskExecutorDemo {

  public static void main(String... args) throws IOException {

  try (var ctx = new AnnotationConfigApplicationContext(AppConfig.class, RandomStringPrinter.class))
  {

  var printer = ctx.getBean(RandomStringPrinter.class);

  printer.executeTask();

  System.in.read();

  }

  }

  }

  清单 12-6

  SimpleAsyncTaskExecutorDemo 和 AppConfig 监控类

  ```


  该类中最重要的部分是 `@EnableAsync` 注解，它启用了 Spring 的异步方法执行能力，这意味着 Spring 将搜索关联的线程池定义，要么是上下文中唯一的
  `org.springframework.core.task.TaskExecutor` Bean，要么是名为 `taskExecutor` 的 `java.util.concurrent.Executor`
  Bean。如果未找到，将使用 `org.springframework.core.task.SimpleAsyncTaskExecutor` 来处理异步方法调用。


  当运行 `SimpleAsyncTaskExecutorDemo` 类时，由于任务是异步执行的，每个任务会以随机顺序打印随机字符串。这一点很明显，因为每个任务都有一个关联的编号。清单
