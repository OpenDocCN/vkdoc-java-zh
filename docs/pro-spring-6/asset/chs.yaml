  \n### 投影查询\n\n第 **7** 章和第 **8** 章已经介绍了投影查询的主题，因此本节仅展示如何使用 Spring Data JPA 配置投影查询。\n\
  \n为了将查询结果限制为仅包含少数几个字段，需要一个接口来暴露待读取属性的访问器方法。Spring 支持多种有趣的方式来声明投影接口，但为简单起见，本示例仅展示一个暴露歌手名字和姓氏的接口。由于从\
  \ Java 8 开始接口支持默认方法，我们将添加一个默认方法来拼接名字和姓氏，并将其作为全名暴露。仓库方法和接口均如清单 10-15 所示。\n\n```\n\
  package com.apress.prospring6.ten.service;\n// 导入语句已省略\npublic interface SingerService\
  \ {\n// 其他方法已省略\nStream findByLastName(String lastName);\ninterface FullName {\n\
  String getFirstName();\nString getLastName();\ndefault String getFullName() {\n\
  return getFirstName().concat(\" \").concat(getLastName());\n}\n}\n}\n清单 10-15\n\
  投影接口和仓库方法\n```\n\n服务方法仅调用 `findByLastName(..)` 方法，而测试方法则打印结果并验证返回单个结果的假设。两者均可在本书的代码仓库中找到，此处不再列出。\n\
  \n唯一值得关注的是仓库方法返回对象的实际类型。由于数据库结果使用 `FullName` 接口建模，Spring 必定生成了相应的实现，对吗？嗯，并非字面意义上的实现。实际上，Spring\
  \ 再次创建了一个代理，该代理实现了 `FullName` 接口，因此方法调用会被转发给负责存储和返回实际值的 Spring Data 基础设施组件。通过在测试方法中设置断点，并利用\
  \ IntelliJ IDEA 的运行时表达式求值功能检查返回集合的内容，可以轻松观察到这一点。只需在代码执行暂停时右键单击源代码，在上下文菜单中选择 **Evaluate\
  \ Expression**，然后输入 `singers.get(0)`。注意对象的类型，如果展开它，你将看到目标对象和已实现的接口。其外观应与图 10-4 所示非常相似（但请注意，在最终版本的\
  \ Spring Data JPA 中，某些类型可能会被重命名、移动等，存在微小可能性）。\n\n![](img/315511_6_En_10_Fig4_HTML.jpg)\n\
  \n截图包含两部分。顶部是代码片段，底部是结果部分。它描述了 Spring Data 实例。\n\n图 10-4\n\n检查 Spring Data 实例\n\n\
  \n\n## 跟踪实体类的变更\n\n在大多数应用程序中，我们需要跟踪用户维护的业务数据的基本审计活动。审计信息通常包括创建数据的用户、创建日期、最后修改日期以及最后修改的用户。\n\
  \nSpring Data JPA 项目以 JPA 实体监听器的形式提供了此功能，可帮助您自动跟踪审计信息。要使用此功能，在 Spring 4 之前，实体类需要实现\
  \ `Auditable<U, ID, T extends TemporalAccessor> extends` `Persistable<ID>` 接口（属于\
  \ Spring Data Commons）^(⁸⁹)，或扩展任何实现此接口的类。清单 10-16 展示了从 Spring Data 参考文档中提取的 `Auditable`\
  \ 接口。\n\n```\npackage org.springframework.data.domain;\nimport java.time.temporal.TemporalAccessor;\n\
  import java.util.Optional;\npublic interface Auditable\nextends Persistable {\n\
  Optional getCreatedBy();\nvoid setCreatedBy(U createdBy);\nOptional getCreatedDate();\n\
  void setCreatedDate(T creationDate);\nOptional getLastModifiedBy();\nvoid setLastModifiedBy(U\
  \ lastModifiedBy);\nOptional getLastModifiedDate();\nvoid setLastModifiedDate(T\
  \ lastModifiedDate);\n}\n清单 10-16\nAuditable 接口\n```\n\n从 `Auditable<U, ID, T extends\
  \ TemporalAccessor>` 接口的定义可以看出，日期类型的列被限制为扩展 `java.time.temporal.TemporalAccessor`\
  \ 的类型。从 Spring 5 开始，不再需要实现 `Auditable<U, ID, T extends TemporalAccessor>`，因为一切都可以用注解替代。\n\
  \n为了演示审计的工作原理，我们在数据库模式中创建一个名为 `SINGER_AUDIT` 的新表，该表基于 `SINGER` 表，并添加了四个与审计相关的列。这些列记录了实体创建的时间、创建者、最后编辑实体的用户以及编辑时间。清单\
  \ 10-17 显示了建表脚本（`AuditSchema.sql`）。\n\n```\nCREATE TABLE SINGER_AUDIT (\nID INT\
  \ NOT NULL AUTO_INCREMENT\n, FIRST_NAME VARCHAR(60) NOT NULL\n, LAST_NAME VARCHAR(40)\
  \ NOT NULL\n, BIRTH_DATE DATE\n, VERSION INT NOT NULL DEFAULT 0\n, CREATED_BY VARCHAR(20)\
  \ -- *\n, CREATED_DATE TIMESTAMP -- *\n, LAST_MODIFIED_BY VARCHAR(20) -- *\n, LAST_MODIFIED_DATE\
  \ TIMESTAMP -- *\n, UNIQUE UQ_SINGER_AUDIT_1 (FIRST_NAME, LAST_NAME)\n, PRIMARY\
  \ KEY (ID)\n);\n清单 10-17\nSINGER_AUDIT 表 DDL\n```\n\n标记的四列表示与审计相关的列。`@CreatedBy`、`@CreatedDate`、`@LastModifiedBy`\
  \ 和 `@LastModifiedDate` 注解属于 `org.springframework.data.annotation` 包。使用这些注解后，日期列的类型限制不再适用。为了保持整洁，项目中添加了一个名为\
  \ `AuditableEntity<U>` 的 `@MappedSuperclass`，用于将审计字段分组。此类如清单 10-18 所示。\n\n```\n\
  package com.apress.prospring6.ten.entities;\n// 其他导入语句已省略\nimport org.springframework.data.jpa.domain.support.AuditingEntityListener;\n\
  import jakarta.persistence.EntityListeners;\nimport org.springframework.data.annotation;\n\
  @MappedSuperclass\n@EntityListeners(AuditingEntityListener.class)\npublic abstract\
  \ class AuditableEntity implements Serializable {\n@CreatedDate\n@Column(name =\
  \ \"CREATED_DATE\")\nprotected LocalDateTime createdDate;\n@CreatedBy\n@Column(name\
  \ = \"CREATED_BY\")\nprotected String createdBy;\n@LastModifiedBy\n@Column(name\
  \ = \"LAST_MODIFIED_BY\")\nprotected String lastModifiedBy;\n@LastModifiedDate\n\
  @Column(name = \"LAST_MODIFIED_DATE\")\nprotected LocalDateTime lastModifiedDate;\n\
  // getter 和 setter 已省略\n}\n清单 10-18\nAuditableEntity 抽象类\n```\n\n`@Column` 注解应用于审计字段，以映射到表中的实际列。`@EntityListeners(AuditingEntityListener.class)`\
  \ 注解注册了 `AuditingEntityListener`，用于持久化上下文中所有扩展此类的实体。\n\n![](img/315511_6_En_10_Figc_HTML.jpg)一个灯泡的剪贴画。 `@EntityListeners(AuditingEntityListener.class)`\
  \ 注解取代了声明 `orm.xml` 配置文件的需要，如 JPA 规范所述：\n\n```\n\nJPA\n\n```\n\n应用程序中任何需要审计的类都应声明为扩展\
  \ `AuditableEntity<U>` 类。因此，为了映射 `SINGER_AUDIT` 表，需要编写清单 10-19 中所示的 `SingerAudit`\
  \ 类。\n\n```\npackage com.apress.prospring6.ten.entities;\n// 导入语句已省略\n@Entity\n\
  @Table(name = \"SINGER_AUDIT\")\npublic class SingerAudit extends AuditableEntity\
  \ {\n@Serial\nprivate static final long serialVersionUID = 5L;\n@Id\n@GeneratedValue(strategy\
  \ = IDENTITY)\n@Column(name = \"ID\")\nprivate Long id;\n@Version\n@Column(name\
  \ = \"VERSION\")\nprivate int version;\n@Column(name = \"FIRST_NAME\")\nprivate\
  \ String firstName;\n@Column(name = \"LAST_NAME\")\nprivate String lastName;\n@Column(name\
  \ = \"BIRTH_DATE\")\nprivate LocalDate birthDate;\n// getter 和 setter 已省略\n}\n清单\
  \ 10-19\nSingerAudit 实体类\n```\n\n为了管理 `SingerAudit` 类型的审计实体，应使用一个仓库接口和一个服务类。`SingerAuditRepository`\
  \ 接口仅扩展了 `CrudRepository<SingerAudit, Long>`，该接口已经声明了我们将用于 `SingerAuditService`\
  \ 的所有方法。`SingerAuditService` 接口如清单 10-20 所示。\n\n```\npackage com.apress.prospring6.ten.service;\n\
  // 导入语句已省略\npublic interface SingerAuditService {\nStream findAll();\nSingerAudit\
  \ findById(Long id);\nSingerAudit save(SingerAudit singer);\n}\n清单 10-20\nSingerAuditService\
  \ 接口\n```\n\n实现 `SingerAuditService` 的 `SingerAuditServiceImpl` 类仅是在事务上下文中调用 `SingerAuditRepository`\
  \ 的方法。两者都非常简单，目前无需关注。但是，要告诉 Spring 自动更新审计字段，还需要进行一些配置：配置类必须使用 `@EnableJpaAuditing`\
  \ 注解，并且必须配置一个实现 `AuditorAware<T>` 的 bean，如清单 10-21 所示。\n\n```\npackage com.apress.prospring6.ten.config;\n\
  import org.apache.commons.lang3.RandomStringUtils;\nimport org.springframework.data.domain.AuditorAware;\n\
  import org.springframework.data.jpa.repository.config.EnableJpaAuditing;\n// 部分导入语句已省略\n\
  @EnableJpaAuditing\n@Configuration\npublic class AuditCfg {\n@Bean\npublic AuditorAware\
  \ auditorProvider() {\nreturn () -> Optional.of(\"prospring6-\"\n+ RandomStringUtils.random(6,\
  \ true, true));\n}\n}\n清单 10-21\n用于启用自动审计支持的 Spring 配置类\n```\n\n这是一个非常简单的配置。关键在于：在生产级应用程序中，为了填充\
  \ `@CreatedBy` 和 `@LastModifiedBy` 注解的字段，其值由与 Spring Security 交互的 bean 提供。在实际情况下，这应该是一个包含用户信息的实例，例如一个代表从\
  \ `SecurityContextHolder` 中检索到的执行数据更新操作的用户类。然而，由于该主题相当高级，将在本书末尾（**第** **17****章**）介绍，因此这里使用一个实现了\
  \ `AuditorAware<String>` 接口的 bean，并采用简化的 lambda 语句。清单 10-21 中的 lambda 语句可以展开为以下内容：\n\
  \n\n\n```\nnew AuditorAware() {\n@Override\npublic Optional getCurrentAuditor()\
  \ {\n{\nreturn Optional.of(\"prospring6\");\n}\n}\n};\n```\n\n在这个 `AuditorAware<String>`\
  \ 的匿名实现中，实现了 `getCurrentAuditor()` 方法。返回的值是 *prospring6* 与随机生成的六字符文本拼接而成。这有助于生成不同的用户值，以便我们测试\
  \ `@CreatedBy` 和 `@LastModifiedBy` 注解字段的值是否被正确设置。\n\n现在配置和实现都已就绪，下一步是测试我们的审计支持功能。为了将测试限制在各自的上下文中，我们添加了\
  \ `AuditServiceTest` 类，该类执行 `SingerAuditServiceImpl` 类中的三个服务方法，并检查对其效果所做的假设。测试类和方法如清单\
  \ 10-22 所示。\n\n```\npackage com.apress.prospring6.ten;\n// 导入语句已省略\n@Testcontainers\n\
  @Sql({ \"classpath:testcontainers/audit/drop-schema.sql\", \"classpath:testcontainers/audit/create-schema.sql\"\
  \ })\n@SpringJUnitConfig(classes = {AuditServiceTest.TestContainersConfig.class})\n\
  public class AuditServiceTest extends TestContainersBase {\nprivate static final\
  \ Logger LOGGER = LoggerFactory.getLogger(AuditServiceTest.class);\n@Autowired\n\
  SingerAuditService auditService;\n@BeforeEach\nvoid setUp(){\nvar singer = new SingerAudit();\n\
  singer.setFirstName(\"BB\");\nsinger.setLastName(\"King\");\nsinger.setBirthDate(LocalDate.of(1940,\
  \ 8, 16));\nauditService.save(singer);\n}\n@Test\nvoid testFindById() {\nvar singer\
  \ = auditService.findAll().findFirst().orElse(null);\nassertAll( \"auditFindByIdTest\"\
  \ ,\n() -> assertNotNull(singer),\n() -> assertTrue(singer.getCreatedBy().isPresent()),\n\
  () -> assertTrue(singer.getLastModifiedBy().isPresent()),\n() -> assertNotNull(singer.getCreatedDate()),\n\
  () -> assertNotNull(singer.getLastModifiedDate())\n);\nLOGGER.info(\">> 创建的记录: {}\
  \ \", singer);\n}\n@Test\nvoid testUpdate() {\nvar singer = auditService.findAll().findFirst().orElse(null);\n\
  assertNotNull(singer);\nsinger.setFirstName(\"Riley B.\");\nvar updated = auditService.save(singer);\n\
  assertAll( \"auditUpdateTest\" ,\n() -> assertEquals(\"Riley B.\", updated.getFirstName()),\n\
  () -> assertTrue(updated.getLastModifiedBy().isPresent()),\n() -> assertNotEquals(updated.getCreatedBy().orElse(null),\
  \ updated.getLastModifiedBy().orElse(null))\n);\nLOGGER.info(\">> 更新的记录: {} \",\
  \ updated);\n}\n@Configuration\n@Import({DataJpaCfg.class, AuditCfg.class})\npublic\
  \ static class TestContainersConfig {\n@Autowired\nProperties jpaProperties;\n@PostConstruct\n\
  public void initialize() {\njpaProperties.put(Environment.FORMAT_SQL, true);\njpaProperties.put(Environment.USE_SQL_COMMENTS,\
  \ true);\njpaProperties.put(Environment.SHOW_SQL, true);\njpaProperties.put(Environment.STATEMENT_BATCH_SIZE,\
  \ 30);\n}\n}\n}\n清单 10-22\n用于测试 SingerAuditServiceImpl 类的类\n```\n\n测试方法应通过，并检查审计字段的值是否已填充。\n\
  \n![](img/315511_6_En_10_Figd_HTML.jpg)一个灯泡的剪贴画。 这些测试方法揭示了一个重要问题：对于设计为一天内多次编辑的记录，`java.time.LocalDate`\
  \ 并不是 `@CreatedDate` 和 `@LastModifiedDate` 注解字段的良好类型。在我们的示例中，我们使用了 `java.time.LocalDateTime`，以便更明显地看出记录被修改过。\n\
  \nJPA 审计支持需要在类路径中添加一个额外的库。Spring Data 需要 `spring-aspects` 来创建特殊的代理，这些代理会拦截实体更新，并在实体持久化之前添加自身的更改。\n\
  \n## 使用 Hibernate Envers 保持实体版本\n\n在企业级应用中，对于关键业务数据，通常需要保留每个实体的几个版本。例如，在客户关系管理（CRM）系统中，每次插入、更新或删除客户记录时，都应保留之前的版本到历史表或审计表中，以满足公司的审计或其他合规要求。\n\
  \n要实现这一点，有两种常见的选择。第一种是创建数据库触发器，在任何更新操作之前将更新前的记录克隆到历史表中。第二种是在数据访问层中开发逻辑（例如，使用 `AOP`）。然而，这两种方法都有其缺点。触发器方法与数据库平台绑定，而手动实现逻辑则相当笨拙，可能影响性能，并且非常容易出错。\n\
  \nHibernate Envers^(⁹⁰)（*实体版本控制系统*的缩写）是一个专门设计用于自动化实体版本控制的 Hibernate 模块。在本节中，我们将讨论如何使用\
  \ Envers 来实现上一节中引入的 `SingerAudit` 实体的版本控制。\n\nHibernate Envers 并非 JPA 的特性。我们在此提及它，是因为我们认为在讨论了一些可以与\
  \ Spring Data JPA 一起使用的基本审计功能之后，再介绍它更为合适。\n\nSpring Data 为 Hibernate Envers 提供了一个名为\
  \ `spring-data-envers` 的模块。`spring-data-jpa` 是 Spring Data Envers 库的传递依赖。图 10-5\
  \ 展示了一个使用 Hibernate Envers 进行实体版本控制的 Spring Data 项目的依赖关系。\n\n![](img/315511_6_En_10_Fig5_HTML.jpg)\n\
  \n一张截图展示了第 10 章使用 Hibernate Envers 模块的依赖关系。\n\n图 10-5\n显示 `chapter10` Envers 项目依赖关系的\
  \ Gradle 视图\n\nEnvers 支持两种审计策略，如表 10-1 所示。\n\n表 10-1\nEnvers 审计策略\n\n| 审计策略 | 描述\
  \ |\n| --- | --- |\n| 默认 | Envers 维护一个记录修订版本的列。每次插入或更新记录时，都会向历史表中插入一条新记录，其修订版本号从数据库序列或表中获取。\
  \ |\n| 有效性审计 | 此策略存储每条历史记录的起始和结束修订版本。每次插入或更新记录时，都会向历史表中插入一条带有起始修订版本号的新记录。同时，之前的记录会被更新，添加上结束修订版本号。还可以配置\
  \ Envers，使其将结束修订版本更新的时间戳记录到之前的历史记录中。 |\n\n在本节中，我们将演示有效性审计策略。尽管这会触发更多的数据库更新，但检索历史记录会变得更快。由于结束修订版本的时间戳也会写入历史记录，因此在查询数据时，更容易识别出特定时间点的记录快照。\n\
  \n\n\n### 为实体版本控制添加表\n\n为了支持实体版本控制，我们需要添加几个表。首先，对于实体（本例中为 `SingerAudit` 实体类）将要进行版本控制的每个表，我们需要创建相应的历史记录表。对于\
  \ `SINGER_AUDIT` 表中记录的版本控制，我们创建一个名为 `SINGER_AUDIT_H` 的历史记录表。清单 10-23 中的代码展示了建表脚本。\n\
  \n```\nCREATE TABLE SINGER_AUDIT_H (\nID INT NOT NULL AUTO_INCREMENT\n, FIRST_NAME\
  \ VARCHAR(60) NOT NULL\n, LAST_NAME VARCHAR(40) NOT NULL\n, BIRTH_DATE DATE\n, VERSION\
  \ INT NOT NULL DEFAULT 0\n, CREATED_BY VARCHAR(20)\n, CREATED_DATE TIMESTAMP\n,\
  \ LAST_MODIFIED_BY VARCHAR(20)\n, LAST_MODIFIED_DATE TIMESTAMP\n, AUDIT_REVISION\
  \ INT NOT NULL // *\n, ACTION_TYPE INT // *\n, AUDIT_REVISION_END INT // *\n, AUDIT_REVISION_END_TS\
  \ TIMESTAMP // *\n, UNIQUE UQ_SINGER_AUDIT_H_1 (FIRST_NAME, LAST_NAME)\n, PRIMARY\
  \ KEY (ID, AUDIT_REVISION)\n);\nListing 10-23\n描述 SingerAudit 实体的 Hibernate 审计表的\
  \ SQL 代码 (AuditSchema.sql)\n```\n\n为了支持有效性审计策略，我们需要为每个历史记录表添加四个列，如前面脚本片段中清单 10-23\
  \ 中用 `//*` 标记的列所示。表 10-2 展示了这些列及其用途。\n\n表 10-2\n\nEnvers 审计列详情\n\n| 列名 | 数据类型 |\
  \ 描述 |\n| --- | --- | --- |\n| `AUDIT_REVISION` | `INT` | 历史记录的开始修订版本。 |\n| `ACTION_TYPE`\
  \ | `INT` | 操作类型，可能的值有：`0` 表示添加，`1` 表示修改，`2` 表示删除。 |\n| `AUDIT_REVISION_END` | `INT`\
  \ | 历史记录的结束修订版本。 |\n| `AUDIT_REVISION_END_TS` | `TIMESTAMP` | 结束修订版本被更新的时间戳。 |\n\
  \nHibernate Envers 需要另一个表来跟踪修订版本号以及每次为插入、添加、更新或删除操作创建修订版本时的时间戳。该表应命名为 `REVINFO`，并且需要向\
  \ `SINGER_AUDIT_H` 表添加一个外键，以将每个审计记录链接到其版本。其模式非常简单，如清单 10-24 所示。\n\n```\nCREATE TABLE\
  \ REVINFO (\nREVTSTMP BIGINT NOT NULL\n, REV INT NOT NULL AUTO_INCREMENT\n, PRIMARY\
  \ KEY (REVTSTMP, REV)\n);\nALTER TABLE SINGER_AUDIT_H\nADD CONSTRAINT SINGER_AUDIT_H_TO_REVISION\n\
  FOREIGN KEY ( AUDIT_REVISION ) REFERENCES REVINFO( REV);\nListing 10-24\n描述 Hibernate\
  \ 审计 REVINFO 表的 SQL 代码 (AuditSchema.sql)\n```\n\n`REV` 列用于存储每个修订版本号，当创建新的历史记录时，该列会自动递增。`REVTSTMP`\
  \ 列存储创建修订版本时的时间戳（以数字格式）。\n\n### 为实体版本控制配置 `EntityManagerFactory`\n\nHibernate Envers\
  \ 以 EJB 监听器的形式实现。我们可以通过设置一组特定的 Envers 属性，在 `LocalContainerEntityManagerFactory`\
  \ bean 中配置这些监听器。Java 配置类与迄今为止用于事务性 Spring 应用程序的配置类基本相同，唯一的区别在于，通过调用 `setJpaProperties(..)`\
  \ 方法，将 Envers 属性添加到设置在 `LocalContainerEntityManagerFactoryBean` 对象上的 `Properties`\
  \ 对象中。在清单 10-25 中，你可以看到这些属性。\n\n```\npackage com.apress.prospring6.ten.config;\n\
  // 其他导入语句已省略\nimport org.hibernate.envers.configuration.EnversSettings;\nimport\
  \ org.hibernate.cfg.Environment;\n@Import(BasicDataSourceCfg.class)\n@Configuration\n\
  @EnableTransactionManagement\n@ComponentScan(basePackages = {\"com.apress.prospring6.ten\"\
  })\n@EnableJpaRepositories(\"com.apress.prospring6.ten.repos\")\npublic class EnversConfig\
  \ {\n// 其他 bean 声明已省略\n@Bean\npublic Properties jpaProperties() {\nProperties jpaProps\
  \ = new Properties();\njpaProps.put(Environment.HBM2DDL_AUTO, \"none\");\njpaProps.put(Environment.FORMAT_SQL,\
  \ false);\njpaProps.put(Environment.STATEMENT_BATCH_SIZE, 30);\njpaProps.put(Environment.USE_SQL_COMMENTS,\
  \ false);\njpaProps.put(Environment.SHOW_SQL, false);\n// Hibernate Envers 的属性\n\
  jpaProps.put(EnversSettings.AUDIT_TABLE_SUFFIX, \"_H\");\njpaProps.put(EnversSettings.REVISION_FIELD_NAME,\
  \ \"AUDIT_REVISION\");\njpaProps.put(EnversSettings.REVISION_TYPE_FIELD_NAME, \"\
  ACTION_TYPE\");\njpaProps.put(EnversSettings.AUDIT_STRATEGY, \"org.hibernate.envers.strategy.ValidityAuditStrategy\"\
  );\njpaProps.put(EnversSettings.AUDIT_STRATEGY_VALIDITY_END_REV_FIELD_NAME, \"AUDIT_REVISION_END\"\
  );\njpaProps.put(EnversSettings.AUDIT_STRATEGY_VALIDITY_STORE_REVEND_TIMESTAMP,\
  \ \"true\");\njpaProps.put(EnversSettings.AUDIT_STRATEGY_VALIDITY_REVEND_TIMESTAMP_FIELD_NAME,\
  \ \"AUDIT_REVISION_END_TS\");\nreturn jpaProps;\n}\n@Bean\npublic LocalContainerEntityManagerFactoryBean\
  \ entityManagerFactory() {\nvar factory = new LocalContainerEntityManagerFactoryBean();\n\
  factory.setPersistenceProviderClass(HibernatePersistenceProvider.class);\nfactory.setPackagesToScan(\"\
  com.apress.prospring6.ten.entities\");\nfactory.setDataSource(dataSource);\nfactory.setJpaProperties(jpaProperties());\n\
  factory.setJpaVendorAdapter(jpaVendorAdapter());\nreturn factory;\n}\n}\nListing\
  \ 10-25\n需要在 LocalContainerEntityManagerFactoryBean 上设置的 Envers 属性\n```\n\n通过此配置，底层发生的情况是，审计事件监听器（实现\
  \ `org.hibernate.envers.event.spi.EnversListener` 类型的实例）被附加到持久化事件上：添加、插入、更新和删除。这些监听器会拦截插入后、更新后或删除后的事件，并将实体类的更新前快照克隆到历史记录表中。这些监听器还会附加到那些关联更新事件（集合更新前、集合移除前和集合重建前）上，以处理实体类关联的更新操作。Envers\
  \ 能够保留关联内实体的历史记录（例如，*一对多* 或 *多对多*）。\n\n这些属性在清单 10-25 的配置中设置，并在表 10-3 中进行了简要说明。\n\
  \n![](img/315511_6_En_10_Fige_HTML.jpg)一个用于突出显示内容的图标。 所有常量都在 `org.hibernate.envers.configuration.EnversSettings`\
  \ 接口中声明。表 10-3 中未显示接口名称，因为那样会使表格难以在页面中容纳^(⁹¹)。\n\n\n\n![](img/315511_6_En_10_Figf_HTML.jpg)一个用于突出显示要点的图标。 第二列中的所有属性名称均以\
  \ `org.hibernate.envers.` 开头。表中未显示此前缀，因为若显示则很难将其容纳在页面内。\n\n表 10-3\n\nEnvers 配置\n\
  \n| 常量 | 属性名称 | 默认值 | 描述 |\n| --- | --- | --- | --- |\n| `AUDIT_TABLE_SUFFIX` |\
  \ `audit_table_prefix` | `_AUD` | 版本化实体的表名后缀。例如，对于映射到 `SINGER_AUDIT` 表的实体类 `SingerAudit`，由于我们为该属性定义了值\
  \ `_H`，Envers 会将历史记录保存在 `SINGER_AUDIT_H` 表中。 |\n| `REVISION_FIELD_NAME` | `revision_field_name`\
  \ | `REV` | 历史表中用于存储每条历史记录修订号的列。 |\n| `REVISION_TYPE_FIELD_NAME` | `revision_type_field_name`\
  \ | `REVTYPE` | 历史表中用于存储更新操作类型的列。 |\n| `AUDIT_STRATEGY` | `audit_strategy` | `org.hibernate.envers.strategy.\
  \ DefaultAuditStrategy` | 用于实体版本化的审计策略。 |\n| `AUDIT_STRATEGY_VALIDITY_ END_REV_FIELD_NAME`\
  \ | `audit_strategy_validity_ end_rev_field_name` | `REVEND` | 历史表中用于存储每条历史记录结束修订号的列。仅在使用有效性审计策略时需要。\
  \ |\n| `AUDIT_STRATEGY_VALIDITY_ STORE_REVEND_TIMESTAMP` | `audit_strategy_validity_\
  \ store_revend_timestamp` | `false` | 指定是否在更新每条历史记录的结束修订号时存储时间戳。仅在使用有效性审计策略时需要。\
  \ |\n| `AUDIT_STRATEGY_VALIDITY_ REVEND_TIMESTAMP_FIELD_NAME` | `audit_strategy_validity_\
  \ revend_timestamp_field_name` | `REVEND_TSTMP` | 历史表中用于存储每条历史记录结束修订号更新时的时间戳的列。仅在使用有效性审计策略且上一属性设置为\
  \ `true` 时需要。 |\n\n![](img/315511_6_En_10_Figg_HTML.jpg)一个感叹号图标。 表 10-3 中的默认值是 Hibernate\
  \ 在配置为生成数据库架构时使用的默认值，并且未对这些属性显式配置任何值。\n\n![](img/315511_6_En_10_Figh_HTML.jpg)一个灯泡剪贴画。 你可以在\
  \ Hibernate 官方文档^(⁹²)中找到 Hibernate 属性的完整列表。\n\n### 启用实体版本化与历史记录检索\n\n要启用实体的版本化，只需使用\
  \ Hibernate 提供的 `@Audited` 注解标注实体类即可。此注解可在类级别使用，之后所有实体字段的更改都将被审计。如果希望某些字段免于审计，可以在这些字段上使用\
  \ Hibernate 的 `@NotAudited` 注解。清单 10-26 展示了使用 `@Audited` 和其他 Jakarta 特定注解标注的 `SingerAudit`\
  \ 类。\n\n```\npackage com.apress.prospring6.ten.entities;\n// 其他导入语句已省略\nimport org.hibernate.envers.Audited;\n\
  @Entity\n@Audited\n@Table(name = \"SINGER_AUDIT\")\npublic class SingerAudit extends\
  \ AuditableEntity {\n// 主体已省略\n}\n清单 10-26\n使用 Hibernate Envers @Audited 注解的实体类\n\
  ```\n\n实体类使用 `@Audited` 注解标注，Envers 监听器将检查该注解并对更新后的实体执行版本化。默认情况下，`Envers` 也会尝试保留关联关系的历史记录；如果希望避免这种情况，应使用\
  \ `@NotAudited` 注解。\n\n要检索历史记录，Envers 提供了 `org.hibernate.envers.AuditReader` 接口，该接口可通过\
  \ `AuditReaderFactory` 类获取。为此，在 `SingerAuditService` 接口中添加了一个名为 `findAuditByRevision()`\
  \ 的新方法，用于根据审计记录的 `id` 和 `revision` 编号检索 `SingerAudit` 历史记录。清单 10-27 展示了 `SingerAuditServiceImpl`\
  \ 的实现。\n\n```\npackage com.apress.prospring6.ten.service;\nimport jakarta.persistence.PersistenceContext;\n\
  import org.hibernate.envers.AuditReaderFactory;\n@Service(\"singerAuditService\"\
  )\n@Transactional\npublic class SingerAuditServiceImpl implements SingerAuditService\
  \ {\nprivate final SingerAuditRepository singerAuditRepository;\n@PersistenceContext\n\
  private EntityManager entityManager;\n// 其他方法和字段已省略\n@Override\npublic SingerAudit\
  \ findAuditByRevision(Long id, int revision) {\nvar auditReader = AuditReaderFactory.get(entityManager);\n\
  return auditReader.find(SingerAudit.class, id, revision);\n}\n}\n清单 10-27\n用于按修订号检索历史记录的服务方法\n\
  ```\n\n显然，`SingerAuditServiceImpl` 类必须进行修改，并且必须将 `EntityManager` 注入其中，以便 `AuditReaderFactory`\
  \ 能够使用它创建 `org.hibernate.envers.AuditReader` 实例来读取审计记录。\n\n通过为 Spring Data 自定义仓库使用自定义实现，可以轻松避免这种情况，并且由于这是\
  \ Spring 的重点，我们就采用这种方式。\n\n\n\n### Spring Data 仓库的自定义实现\n\nSpring Data 提供了默认选项，只需少量编码即可处理数据库记录和创建查询方法。然而，在某些情况下这还不够，这里介绍的\
  \ Envers 示例就是一个很好的例子。\n\n要为 Spring Data 仓库的默认功能添加自定义方法，我们需要定义一个片段接口，声明我们想要添加的行为。在我们的案例中，如清单\
  \ 10-28 所示，该接口被命名为 `CustomSingerAuditRepository`，并声明了一个单一方法，其唯一目的是使用 `SingerAudit`\
  \ 记录的 `id` 和修订号来检索其旧版本。\n\n```\npackage com.apress.prospring6.ten.repos.envers;\n\
  import com.apress.prospring6.ten.entities.SingerAudit;\nimport java.util.Optional;\n\
  public interface CustomSingerAuditRepository {\nOptional findAuditByIdAndRevision(Long\
  \ id, int revision);\n}\n清单 10-28\n声明用于检索 SingerAudit 记录版本的方法的片段接口\n```\n\n现在我们有了一个接口，就需要提供一个实现。这就是清单\
  \ 10-29 中描述的 `CustomSingerAuditRepositoryImpl` 类发挥作用的地方。\n\n```\npackage com.apress.prospring6.ten.repos.envers;\n\
  import com.apress.prospring6.ten.entities.SingerAudit;\nimport jakarta.persistence.EntityManager;\n\
  import jakarta.persistence.PersistenceContext;\nimport org.hibernate.envers.AuditReaderFactory;\n\
  import java.util.Optional;\npublic class CustomSingerAuditRepositoryImpl implements\
  \ CustomSingerAuditRepository {\n@PersistenceContext\nprivate EntityManager entityManager;\n\
  @Override\npublic Optional findAuditByIdAndRevision(Long id, int revision) {\nvar\
  \ auditReader = AuditReaderFactory.get(entityManager);\nvar result =  auditReader.find(SingerAudit.class,\
  \ id, revision);\nif(result != null)\nreturn Optional.of(result);\nreturn Optional.empty();\n\
  }\n}\n清单 10-29\nCustomSingerAuditRepository 接口的实现\n```\n\n![](img/315511_6_En_10_Figi_HTML.jpg)信息图标。 请注意，我们只是将\
  \ Envers 特定的代码从 `SingerAuditServiceImpl` 移到了这个类中。\n\n为了告诉 Spring Data 我们希望将此方法添加到其默认功能集中，我们需要让\
  \ `SingerAudit` 实体的 Spring Data 仓库也扩展 `CustomSingerAuditRepository`，如清单 10-30 所示。\n\
  \n```\npackage com.apress.prospring6.ten.repos;\nimport com.apress.prospring6.ten.entities.SingerAudit;\n\
  import com.apress.prospring6.ten.repos.envers.CustomSingerAuditRepository;\nimport\
  \ org.springframework.data.jpa.repository.JpaRepository;\npublic interface SingerAuditRepository\
  \ extends\nJpaRepository ,\nCustomSingerAuditRepository { }\n清单 10-30\nCustomSingerAuditRepository\
  \ 接口的实现\n```\n\n![](img/315511_6_En_10_Figj_HTML.jpg)感叹号图标。 与片段接口对应的类名中最重要的部分是 `Impl`\
  \ 后缀。这允许 Spring Data 识别该方法的实现来自何处，并将其添加到其 JPA 仓库代理中。毕竟，约定优于配置是 Spring 框架的核心价值之一。\n\
  \n![](img/315511_6_En_10_Figk_HTML.jpg)信息图标。 然而，易于定制也是 Spring 的一个价值，因此如果你想以不同的方式命名你的自定义仓库实现，你必须告诉\
  \ Spring。定制有些局限；你只能指定一个不同的后缀来替换默认的 `Impl`，使用 `@EnableJpaRepositories(repositoryImplementationPostfix\
  \ = \"${custom-prefix}\")`，但这总比没有好。\n\n这意味着现在 `SingerAuditServiceImpl` 类可以清理掉 Envers\
  \ 特定的代码，并且 `findAuditByRevision(..)` 方法只需调用 Spring JPA `SingerAuditRepository` 提供的\
  \ `findAuditByIdAndRevision(..)` 方法，如清单 10-31 所示。\n\n```\npackage com.apress.prospring6.ten.service;\n\
  @Service(\"singerAuditService\")\n@Transactional\npublic class SingerAuditServiceImpl\
  \ implements SingerAuditService {\nprivate final SingerAuditRepository singerAuditRepository;\n\
  // 其他方法已省略\n@Transactional(readOnly=true)\n@Override\npublic SingerAudit findAuditByRevision(Long\
  \ id, int revision) {\nreturn singerAuditRepository.findAuditByIdAndRevision(id,\
  \ revision).orElse(null);\n}\n}\n清单 10-31\nSingerAuditServiceImpl 接口的实现\n```\n\n\
  剩下的就是测试这个功能是否有效。编写测试方法并不难，但为了确保我们的版本控制正常工作，应该检查更新和删除操作。测试类如清单 10-32 所示。\n\n```\n\
  package com.apress.prospring6.ten;\n// 导入语句已省略\n@Testcontainers\n@Sql({ \"classpath:testcontainers/audit/drop-schema.sql\"\
  , \"classpath:testcontainers/audit/create-schema.sql\" })\n@SpringJUnitConfig(classes\
  \ = {EnversConfig.class, AuditCfg.class})\npublic class EnversServiceTest extends\
  \ TestContainersBase {\nprivate static final Logger LOGGER = LoggerFactory.getLogger(EnversServiceTest.class);\n\
  @Autowired\nSingerAuditService auditService;\n@BeforeEach\nvoid setUp(){\nvar singer\
  \ = new SingerAudit();\nsinger.setFirstName(\"BB\");\nsinger.setLastName(\"King\"\
  );\nsinger.setBirthDate(LocalDate.of(1940, 8, 16));\nauditService.save(singer);\n\
  }\n@Test\nvoid testFindAuditByRevision() {\n// 更新以创建新版本\nvar singer = auditService.findAll().findFirst().orElse(null);\n\
  assertNotNull(singer);\nsinger.setFirstName(\"Riley B.\");\nauditService.save(singer);\n\
  var oldSinger = auditService.findAuditByRevision(singer.getId(), 1);\nassertEquals(\"\
  BB\", oldSinger.getFirstName());\nLOGGER.info(\">> 旧歌手: {} \", oldSinger);\nvar\
  \ newSinger = auditService.findAuditByRevision(singer.getId(), 2);\nassertEquals(\"\
  Riley B.\", newSinger.getFirstName());\nLOGGER.info(\">> 更新后的歌手: {} \", newSinger);\n\
  }\n@Test\nvoid testFindAuditAfterDeletion() {\n// 删除记录\nvar singer = auditService.findAll().findFirst().orElse(null);\n\
  auditService.delete(singer.getId());\n// 从审计中提取\nvar deletedSinger = auditService.findAuditByRevision(singer.getId(),\
  \ 1);\nassertEquals(\"BB\", deletedSinger.getFirstName());\nLOGGER.info(\">> 已删除的歌手:\
  \ {} \", deletedSinger);\n}\n}\n清单 10-32\n在 Spring 应用程序中测试 Envers 审计\n```\n\n为了了解发生了什么，你可以尝试查看测试方法执行时打印的控制台日志消息。不幸的是，在本书的这个阶段，如果我们为\
  \ `org.hibernate` 启用 `TRACE` 日志，日志会变得不可读，但清单 10-33 显示了最重要的部分。\n\n\n\n```\nTRACE:\
  \ TransactionAspectSupport - Getting transaction for\n[com.apress.prospring6.ten.service.SingerAuditServiceImpl.save]\n\
  TRACE: AbstractEntityPersister - Updating entity:\n[com.apress.prospring6.ten.entities.SingerAudit#1]\n\
  ...\nDEBUG: SqlStatementLogger - insert into REVINFO (REVTSTMP) values (?)\nTRACE:\
  \ AbstractEntityPersister - Inserting entity:\n[com.apress.prospring6.ten.entities.SingerAudit_H#component[\n\
  id,AUDIT_REVISION]{id=1, AUDIT_REVISION=org.hibernate.envers.DefaultRevisionEntity#1}]\n\
  DEBUG: SqlStatementLogger - insert into REVINFO (REVTSTMP) values (?)\nTRACE: AbstractEntityPersister\
  \ - Inserting entity:\n[com.apress.prospring6.ten.entities.SingerAudit_H#component[\n\
