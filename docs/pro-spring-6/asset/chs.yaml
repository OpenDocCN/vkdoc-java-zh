  MariaDB，除非运行测试的机器上安装并正确配置了 MariaDB 数据库，否则测试将无法通过。因此，在测试类主体内部声明了静态类 `TestDbCfg`，以注入一个嵌入式数据库，而不是真实的数据库。这个测试类与
