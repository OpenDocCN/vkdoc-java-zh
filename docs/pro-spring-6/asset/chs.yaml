  第一个代理将直接使用通知来对目标进行通知；因此，所有方法都将被通知。


  对于第二个代理，我们将配置 `AspectJExpressionPointcut` 和 `DefaultPointcutAdvisor`，以便仅通知 `GrammySinger`
  类的 `sing()` 方法。为了测试通知，我们将创建两个类型为 `Documentarist` 的 bean 定义，每个定义将注入不同的代理。然后，我们将在每个
  bean 上调用 `execute()` 方法，并观察当依赖项中被通知的方法被调用时会发生什么。图 5-10 显示了由 `AopConfig` 类表示的此示例的配置。


