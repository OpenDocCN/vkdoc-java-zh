  这种配置是最小化的，即使在经典配置中，Spring MVC 也会根据请求中的 `Accept` 头来确定请求的媒体类型。


  你可以通过在 `WebConfig` 类中重写 `configureContentNegotiation(..)` 方法^(¹⁴⁶)，基于路径扩展名、查询参数或其他方法来配置请求的媒体类型，或者通过声明不同的处理器方法并使用
  `produces` 属性来实现。


  另一种配置请求媒体类型的方法是重写 `configureMessageConverters()` 方法，以覆盖 Spring MVC 创建的默认消息转换器，或者通过重写
  `extendMessageConverters()` 方法，将自定义消息转换器添加到默认转换器集合中^(¹⁴⁷)。


  对于本章而言，我们无需执行上述任何操作，因为 Spring MVC 配置的默认消息转换器已经足够满足我们的需求。


  那么，既然我们已经确定客户端必须在请求中提供 `Accept` 头来指定他们所需的数据格式，我们还需要配置其他内容来使其生效吗？答案是否定的，不需要其他 Spring
  配置。不过，我们确实需要将合适的 Jackson 库添加到类路径中，以便 Spring MVC 能够使用它们。


