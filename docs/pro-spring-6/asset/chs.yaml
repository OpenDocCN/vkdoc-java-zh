  \ {\nprivate static Logger logger = LoggerFactory.getLogger(AnotherTarget.class);\n\
  Foo fooOne;\nFoo fooTwo;\nBar bar;\n@Autowired\npublic void setFooOne(Foo fooOne)\
  \ {\nlogger.info(\" --> AnotherTarget#setFooOne(Foo) called\");\nthis.fooOne = fooOne;\n\
  }\n@Autowired\npublic void setFooTwo(Foo fooTwo) {\nlogger.info(\" --> AnotherTarget#setFooTwo(Foo)\
  \ called\");\nthis.fooTwo = fooTwo;\n}\n@Autowired\npublic void setBar(Bar bar)\
  \ {\nlogger.info(\" --> AnotherTarget#setBar(Bar) called\");\nthis.bar = bar;\n\
  }\n}\n清单 3-57\n使用 Setter 方法按类型自动装配的示例\n```\n\n运行此代码时，将输出清单 3-58 中的内容。\n\n```\nINFO\
  \ : AnotherTarget -  --> AnotherTarget#setFooOne(Foo) called\nINFO : AnotherTarget\
  \ -  --> AnotherTarget#setFooTwo(Foo) called\nINFO : AnotherTarget -  --> AnotherTarget#setBar(Bar)\
  \ called\nINFO : AutowiringDemo - anotherTarget: Created anotherTarget? true\nINFO\
  \ : AutowiringDemo - anotherTarget: Injected bar? true\nINFO : AutowiringDemo -\
  \ anotherTarget: Injected fooOne? a4eb2b71\nINFO : AutowiringDemo - anotherTarget:\
  \ Injected fooTwo? a4eb2b71\n清单 3-58\n当 Setter 方法使用 @Autowired 注解时，按类型自动装配的控制台日志示例\n\
  ```\n\n当字段直接使用 `@Autowired` 注解时，Spring 也会按类型注入依赖。由于不推荐使用字段注入，本书将不展示相关代码，但可以查看项目中\
  \ `com.apress.prospring6.three.autowiring.FieldTarget` 类。\n\n到目前为止，您已经看到，声明了一个 `Foo`\
  \ bean，并且该 bean 被注入到 `fooOne` 和 `fooTwo` 两个属性中。如果我们再声明一个 `Foo` bean，这将破坏 `Target`、`AnotherTarget`\
  \ 和 `FieldTarget` bean 的定义，Spring 将无法再创建它们，因为依赖项是按类型自动装配的，并且需要两个 `Foo` 类型的依赖项，而\
  \ Spring 无法确定这两个 `Foo` bean 分别需要注入到哪里。清单 3-59 中的代码展示了更新后的 `AutowiringCfg` 类，它声明了一个\
  \ `Foo` 类型的 bean。\n\n```\n@Configuration\n@ComponentScan\nclass AutowiringCfg {\n\
  @Bean\nFoo anotherFoo() {\nreturn new Foo();\n}\n}\n清单 3-59\n声明了一个 Foo 类型 Bean 的\
  \ AutowiringCfg 类\n```\n\n如果运行 `AutowiringDemo` 类，将会抛出以下 `org.springframework.beans.factory.NoUniqueBeanDefinitionException`\
  \ 异常：\n\n```\nCaused by: org.springframework.beans.factory.NoUniqueBeanDefinitionException:\n\
  No qualifying bean of type 'com.apress.prospring6.three.autowiring.Foo'\navailable:\
  \ expected single matching bean but found 2: foo,anotherFoo\n```\n\n要解决 Spring 的这个难题，解决方案是指定每个位置需要注入哪个\
  \ bean，这意味着要从按类型自动装配切换到按名称自动装配。\n\n### `byName` 按名称自动装配\n\n清单 3-60 展示了修改后的 `Target`\
  \ 类，其构造函数接收特定的 bean 作为参数。之前用于注入集合的 `@Qualifier` 注解，在这里同样可以解决问题。\n\n```\npackage\
  \ com.apress.prospring6.three.autowiring;\nimport org.springframework.beans.factory.annotation.Qualifier;\n\
  // 其他导入语句已省略\n@Component\n@Lazy\nclass Target {\nprivate static Logger logger =\
  \ LoggerFactory.getLogger(Target.class);\nFoo fooOne;\nFoo fooTwo;\nBar bar;\n@Autowired\n\
  public Target(@Qualifier(\"foo\") Foo foo) {\nthis.fooOne = foo;\nlogger.info(\"\
  \ --> Target(Foo) called\");\n}\npublic Target(@Qualifier(\"foo\")Foo foo, Bar bar)\
  \ {\nthis.fooOne = foo;\nthis.bar = bar;\nlogger.info(\" --> Target(Foo, Bar) called\"\
  );\n}\n}\n清单 3-60\n使用构造函数按名称自动装配配置的 Target Bean 类\n```\n\n请注意，`@Qualifier` 是放在参数上，而不是构造函数上。如果您使用\
  \ `@Inject` 而不是 `@Autowired` 来注入依赖项，请使用 `@Named` 代替 `@Qualifier`。要修复 `AnotherTarget`\
  \ 类，需要将 `@Qualifier` 放在 setter 方法的参数上，如清单 3-61 所示。\n\n```\npackage com.apress.prospring6.three.autowiring;\n\
  import org.springframework.beans.factory.annotation.Qualifier;\n// 其他导入语句已省略\n@Component\n\
  @Lazy\nclass AnotherTarget {\nprivate static Logger logger = LoggerFactory.getLogger(AnotherTarget.class);\n\
  Foo fooOne;\nFoo fooTwo;\nBar bar;\n@Autowired\npublic void setFooOne(@Qualifier(\"\
  foo\")Foo fooOne) {\nlogger.info(\" --> AnotherTarget#setFooOne(Foo) called\");\n\
  this.fooOne = fooOne;\n}\n@Autowired\npublic void setFooTwo(@Qualifier(\"anotherFoo\"\
  )Foo fooTwo) {\nlogger.info(\" --> AnotherTarget#setFooTwo(Foo) called\");\nthis.fooTwo\
  \ = fooTwo;\n}\n@Autowired\npublic void setBar(Bar bar) {\nlogger.info(\" --> AnotherTarget#setBar(Bar)\
  \ called\");\nthis.bar = bar;\n}\n}\n清单 3-61\n使用 Setter 方法按名称自动装配配置的 AnotherTarget\
  \ Bean 类\n```\n\n运行 `AutowiringDemo`，访问 `AnotherTarget` 并检查其依赖项，将打印出清单 3-62 中的详细信息，这清楚地表明注入了两个不同的\
  \ `Foo` bean。\n\n```\nINFO : AnotherTarget -  --> AnotherTarget#setFooOne(Foo) called\n\
  INFO : AnotherTarget -  --> AnotherTarget#setFooTwo(Foo) called\nINFO : AnotherTarget\
  \ -  --> AnotherTarget#setBar(Bar) called\nINFO : AutowiringDemo - anotherTarget:\
  \ Created anotherTarget? true\nINFO : AutowiringDemo - anotherTarget: Injected bar?\
  \ true\nINFO : AutowiringDemo - anotherTarget: Injected fooOne? baa24632\nINFO :\
  \ AutowiringDemo - anotherTarget: Injected fooTwo? 0d74b352\n清单 3-62\n当 Setter 方法使用\
  \ @Autowired 注解时，按名称自动装配的控制台输出示例\n```\n\n对于 `FieldTarget`，事情甚至更简单；`@Qualifier` 注解直接放在被自动装配的字段上，如清单\
  \ 3-63 所示。\n\n```\npackage com.apress.prospring6.three.autowiring;\nimport org.springframework.beans.factory.annotation.Qualifier;\n\
  // 其他导入语句已省略\n@Component\n@Lazy\nclass FieldTarget {\nprivate static Logger logger\
  \ = LoggerFactory.getLogger(FieldTarget.class);\n@Autowired @Qualifier(\"foo\")\
  \ Foo fooOne;\n@Autowired @Qualifier(\"anotherFoo\") Foo fooTwo;\n@Autowired Bar\
  \ bar;\n}\n清单 3-63\n使用字段按名称自动装配配置的 FieldTarget Bean 类\n```\n\n\n\n### 又一个难题\n\n\
  当按类型自动装配时，如果 bean 的类型存在关联关系，事情就会变得复杂。当有多个类实现了同一个接口，并且需要自动装配的属性将该接口指定为类型时，就会抛出异常，因为\
  \ Spring 不知道该注入哪个 bean。为了创建这样一个场景，我们将把 `Foo` 转换成一个接口，并声明两个实现它的 bean 类型，每个类型都有自己的\
  \ bean 声明。配置是默认的，bean 名称由 Spring 生成，如清单 3-64 所示。\n\n```\npackage com.apress.prospring6.three.pickle;\n\
  // 其他导入语句已省略\ninterface Foo {\n// 空接口，用作标记接口\n}\nclass FooImplOne implements Foo\
  \ {\nString id = \"one:\" + UUID.randomUUID().toString().replace(\"-\",\"\").substring(0,8);\n\
  @Override\npublic String toString() {\nreturn new ToStringBuilder(this).append(\"\
  id\", id).toString();\n}\n}\nclass FooImplTwo implements Foo {\nString id = \"two:\"\
  \ + UUID.randomUUID().toString().replace(\"-\",\"\").substring(0,8);\n@Override\n\
  public String toString() {\nreturn new ToStringBuilder(this).append(\"id\", id).toString();\n\
  }\n}\nclass Bar { }\n@Configuration\n@ComponentScan\nclass AutowiringCfg {\n@Bean\n\
  public Foo fooImplOne() { return new FooImplOne(); }\n@Bean\npublic Foo fooImplTwo()\
  \ { return new FooImplTwo(); }\n@Bean\npublic Bar bar() { return new Bar(); }\n\
  @Bean\npublic TrickyTarget trickyTarget() { return new TrickyTarget(); }\n}\nclass\
  \ TrickyTarget {\nFoo fooOne;\nFoo fooTwo;\nBar bar;\n// 构造函数和 setter 方法已省略\n}\n\
  清单 3-64\nFoo 实现类及配置\n```\n\n`TrickyTarget` 代码与 `Target` 类非常相似，当按类型注入依赖项时，使用清单 3-64\
  \ 中的配置，Spring 无法创建此 bean，并会抛出 `NoUniqueBeanDefinitionException`：\n\n```\nCaused\
  \ by: org.springframework.beans.factory.NoUniqueBeanDefinitionException:\nNo qualifying\
  \ bean of type 'com.apress.prospring6.three.pickle.Foo'\navailable: expected single\
  \ matching bean but found 2: fooImplOne,fooImplTwo\n```\n\n控制台输出内容要长得多，但上述输出的前几行以相当易读的方式揭示了问题所在。当\
  \ Spring 不知道该自动装配哪个 bean 时，它会抛出一个 `NoUniqueBeanDefinitionException`，并附带一条明确的消息。它会告诉你找到了哪些\
  \ bean，但无法选择在何处使用哪一个。有两种方法可以解决这个问题。\n\n第一种方法是在你希望 Spring 优先考虑进行自动装配的 bean 定义中使用\
  \ `@Primary` 注解。这以一种相当奇特的方式解决了问题，因为在 `fooOne` 和 `fooTwo` 中，都会注入带有 `@Primary` 注解的\
  \ bean。配置及结果输出如清单 3-65 所示。\n\n```\npackage com.apress.prospring6.three.pickle;\n\
  // 导入语句已省略\nimport org.springframework.context.annotation.Primary;\n@Configuration\n\
  @ComponentScan\nclass AutowiringCfg {\n@Bean @Primary\npublic Foo fooImplOne() {\
  \ return new FooImplOne(); }\n@Bean\npublic Foo fooImplTwo() { return new FooImplTwo();\
  \ }\n@Bean\npublic Bar bar() { return new Bar(); }\n@Bean\npublic TrickyTarget trickyTarget()\
  \ { return new TrickyTarget(); }\n}\n// 使用 @Primary 配置的日志\nINFO : TrickyTarget -\
  \  --> Property fooOne set\nINFO : TrickyTarget -  --> Property fooTwo set\nINFO\
  \ : TrickyTarget -  --> Property bar set\nINFO : PickleAutowiringDemo - target:\
  \ Created target? true\nINFO : PickleAutowiringDemo - target: Injected bar? true\n\
  INFO : PickleAutowiringDemo - target: Injected fooOne? com.apress.prospring6.three.pickle.FooImplOne@2eea88a1[id=one:7ab78d36]\n\
  INFO : PickleAutowiringDemo - target: Injected fooTwo? com.apress.prospring6.three.pickle.FooImplOne@2eea88a1[id=one:7ab78d36]\n\
  清单 3-65\n使用 @Primary 的配置\n```\n\n所以，一切又恢复正常了，但即便如此，使用 `@Primary` 仅在只有两种 bean 相关类型时才是解决方案。如果有更多类型，使用它并不能消除\
  \ `NoUniqueBeanDefinitionException`。\n\n真正能解决问题的是第二种方法，它能让你完全控制哪个 bean 注入到何处，即命名你的\
  \ bean，并使用 `@Qualifier` 配置它们注入的位置，如上一节所示。清单 3-66 展示了使用 `@Qualifier` 配置 setter 方法的\
  \ `TrickyTarget` 类，以及运行 `PickleAutowiringDemo` 类后的结果输出。\n\n```\npackage com.apress.prospring6.three.pickle;\n\
  // 导入语句已省略\nimport org.springframework.beans.factory.annotation.Qualifier;\nclass\
  \ TrickyTarget {\nprivate static Logger logger = LoggerFactory.getLogger(TrickyTarget.class);\n\
  Foo fooOne;\nFoo fooTwo;\nBar bar;\npublic TrickyTarget() {\nlogger.info(\" -->\
  \ TrickyTarget() called\");\n}\n@Autowired\n@Qualifier(\"fooImplOne\")\npublic void\
  \ setFooOne(Foo fooOne) {\nthis.fooOne = fooOne;\nlogger.info(\" --> Property fooOne\
  \ set\");\n}\n@Autowired\n@Qualifier(\"fooImplTwo\")\npublic void setFooTwo(Foo\
  \ foo) {\nthis.fooTwo = foo;\nlogger.info(\" --> Property fooTwo set\");\n}\n@Autowired\n\
  public void setBar(Bar bar) {\nthis.bar = bar;\nlogger.info(\" --> Property bar\
  \ set\");\n}\n}\n// 使用 @Qualifier 配置的日志\nINFO : TrickyTarget -  --> TrickyTarget()\
  \ called\nINFO : TrickyTarget -  --> Property fooOne set\nINFO : TrickyTarget -\
  \  --> Property fooTwo set\nINFO : TrickyTarget -  --> Property bar set\nINFO :\
  \ PickleAutowiringDemo - target: Created target? true\nINFO : PickleAutowiringDemo\
  \ - target: Injected bar? true\nINFO : PickleAutowiringDemo - target: Injected fooOne?\
  \ com.apress.prospring6.three.pickle.FooImplOne@7fd7a283[id=one:8efc8d31]\nINFO\
  \ : PickleAutowiringDemo - target: Injected fooTwo? com.apress.prospring6.three.pickle.FooImplTwo@22f59fa[id=two:a5d9ed75]\n\
  清单 3-66\n使用 @Qualifier 的配置及结果输出\n```\n\n### 何时使用自动装配\n\n在编写 Spring 应用程序时，自动装配是无法避免的；Spring\
  \ 背后的核心理念是，你可以随心所欲地创建类，然后让 Spring 为你工作。问题不在于何时应该使用自动装配，而在于哪种类型的自动装配适合你应用程序的特定部分。你可能会倾向于使用\
  \ `byType`，直到你意识到在 `ApplicationContext` 中，每个类型只能有一个 bean——当你需要维护同一类型不同配置的 bean 时，这一限制就会带来问题。同样的论点也适用于构造函数自动装配的使用。在某些情况下，自动装配可以节省时间，但显式定义装配关系并不会花费太多额外精力，而且你还能从显式的语义、属性命名的完全灵活性以及管理同一类型实例数量的完全控制权中受益。\n\
  \n\n\n## 总结\n\n在本章中，我们广泛探讨了 Spring Core 和 IoC（控制反转）的诸多内容。我们通过示例展示了 IoC 的类型，并介绍了在应用程序中使用每种机制的优缺点。我们研究了\
  \ Spring 提供了哪些 IoC 机制，以及在应用程序中何时（以及何时不）使用它们。在探索 IoC 的过程中，我们介绍了 Spring 的 `BeanFactory`（它是\
  \ Spring IoC 能力的核心组件），以及 `ApplicationContext`（它扩展了 `BeanFactory` 并提供了额外的功能）。\n\n\
  对于 `ApplicationContext`，我们重点介绍了 `AnnotationConfigApplicationContext`，它允许通过注解对 Spring\
  \ 进行外部配置。我们还讨论了另一种为 `ApplicationContext` 声明 DI（依赖注入）需求的方法，即使用 Java 注解。\n\n本章还向您介绍了\
  \ Spring IoC 功能集的基础知识，包括 Setter 注入、构造器注入、方法注入、自动装配和 Bean 继承。在配置的讨论中，我们演示了如何使用各种值（包括其他\
  \ Bean）来配置 Bean 的属性。\n\n本章只是触及了 Spring 及其 IoC 容器的皮毛。在下一章中，您将了解一些 Spring 特有的 IoC\
  \ 相关特性，并更详细地了解 Spring Core 中可用的其他功能。\n\n脚注 1\n\n"
- "# 4. 高级 Spring 配置与 Spring Boot\n\n在上一章中，我们详细介绍了控制反转（IoC）的概念以及它如何融入 Spring 框架。然而，我们实际上只触及了\
  \ Spring Core 能力的表面。Spring 提供了广泛的服务来补充和扩展其基本的 IoC 能力。在本章中，您将深入探讨这些内容。具体来说，您将了解以下内容：\n\
  \n*   *管理 Bean 生命周期*：到目前为止，您看到的所有 Bean 都相当简单，并且与 Spring 容器完全解耦。在本章中，我们将介绍一些策略，您可以使用这些策略使您的\
  \ Bean 在其生命周期的各个阶段接收来自 Spring 容器的通知。您可以通过实现 Spring 规定的特定接口、指定 Spring 可以通过反射调用的方法，或者使用\
  \ JavaBeans^(²⁹) 生命周期注解来实现这一点。\n\n*   *使您的 Bean 具备“**Spring 感知**”能力*：在某些情况下，您希望\
  \ Bean 能够与配置它的 `ApplicationContext` 实例进行交互。为此，Spring 提供了两个接口：`BeanNameAware` 和 `ApplicationContextAware`（在**第**\
  \ **3** **章**末尾介绍），它们分别允许您的 Bean 获取其分配的名称和引用其 `ApplicationContext`。与本节主题对应的部分将介绍如何实现这些接口，并给出在应用程序中使用它们的一些实际考虑。\n\
  \n*   *使用 FactoryBeans*：顾名思义，`FactoryBean` 接口旨在由任何充当其他 Bean 工厂的 Bean 来实现。`FactoryBean`\
  \ 接口提供了一种机制，通过该机制您可以轻松地将自己的工厂与 Spring 的 `BeanFactory` 接口集成。\n\n*   *使用 JavaBeans*\
  \ `PropertyEditor` 实现：`PropertyEditor` 接口是 `java.beans` 包中提供的标准接口。`PropertyEditors`\
  \ 用于在属性值与 `String` 表示形式之间进行转换。Spring 广泛使用 `PropertyEditors`，主要用于读取在 `BeanFactory`\
  \ 配置中指定的值，并将其转换为正确的类型。在本章中，我们将讨论 Spring 提供的一组 `PropertyEditors`，以及如何在应用程序中使用它们。我们还将了解如何实现自定义的\
  \ `PropertyEditors`。\n\n*   *深入了解 Spring 应用上下文*：如您所知，`ApplicationContext` 是 `BeanFactory`\
  \ 的扩展，旨在用于完整的应用程序。`ApplicationContext` 接口提供了一组有用的额外功能，包括国际化消息支持、资源加载和事件发布。在本章中，我们将详细介绍\
  \ `ApplicationContext` 除了 IoC 之外提供的功能。我们还会稍微超前一点，向您展示在构建 Web 应用程序时，`ApplicationContext`\
  \ 如何简化 Spring 的使用。\n\n*   *测试 Spring 应用程序*：**第** **3** **章**解释了如何构建 Spring `ApplicationContext`，并通过运行\
  \ `main(..)` 方法演示了它构建良好——Bean 按预期创建。然而，这并不是最佳方式，因为包含这些方法的类在构建过程中仅被编译而不会运行，因此 Bean\
  \ 声明中的任何更改或导致问题的库升级，可能要到开发后期才会变得明显。因此，在本章中，我们将展示如何创建 Spring 测试上下文来测试 Spring 应用程序。\n\
  \n*   *使用 Spring Boot*：通过使用 Spring Boot，Spring 应用程序的配置变得更加实用。这个 Spring 项目使得创建可以“直接运行”的、独立的、生产级的、基于\
  \ Spring 的应用程序变得容易。\n\n*   *使用* *配置增强功能*：我们介绍了一些使应用程序配置更简单的功能，例如配置文件管理、环境和属性源抽象等。介绍这些功能的部分将展示如何使用它们来满足特定的配置需求。\n\
  \n*   *使用 Groovy 进行配置*：Spring 4.0 引入了使用 Groovy 语言配置 Bean 定义的能力，正如您将看到的，这可以作为旧的 XML\
  \ 和 Java 配置风格的替代/补充。\n\n\n\n## Spring 对应用程序可移植性的影响\n\n本章讨论的大多数功能都是 Spring 特有的，并且在许多情况下，其他\
  \ IoC 容器并不提供这些功能。尽管许多 IoC 容器都提供生命周期管理功能，但它们可能通过一套与 Spring 不同的接口来实现。如果您的应用程序在不同 IoC\
  \ 容器之间的可移植性确实很重要，那么您可能需要避免使用某些将应用程序与 Spring 耦合在一起的功能。\n\n但是，请记住，通过设定一个约束——即您的应用程序可在\
  \ IoC 容器之间移植——您将失去 Spring 提供的丰富功能。既然您很可能已经战略性地选择使用 Spring，那么充分利用其能力是合情合理的。\n\n注意不要凭空创造对可移植性的需求。在许多情况下，应用程序的最终用户并不关心应用程序是否能在三个不同的\
  \ IoC 容器上运行；他们只希望它能运行。根据我们的经验，试图在所选技术中可用的最低公共特性基础上构建应用程序，往往是一个错误。这样做通常会使您的应用程序从一开始就处于劣势。然而，如果您的应用程序确实需要\
  \ IoC 容器的可移植性，请不要将其视为缺点——这是一个真实的需求，因此也是您的应用程序应该满足的需求。在 *Expert One-on-One: J2EE\
  \ Development without EJB* (Wrox, 2004) 一书中，Rod Johnson 和 Jürgen Höller 将这类需求描述为“幻影需求”，并对其以及它们如何影响您的项目进行了更详细的讨论。\n\
  \n尽管使用这些功能可能会将您的应用程序与 Spring 框架耦合，但实际上，您是在更广泛的范围内提高应用程序的可移植性。请考虑您正在使用一个免费、开源且没有特定供应商隶属关系的框架。使用\
  \ Spring 的 IoC 容器构建的应用程序可以在任何运行 Java 的地方运行。对于 Java 企业应用程序，Spring 为可移植性开辟了新的可能性。Spring\
  \ 提供了许多与 JEE 相同的能力，还提供了用于抽象和简化 JEE 许多其他方面的类。在许多情况下，可以使用 Spring 构建一个在简单 Servlet 容器中运行的\
  \ Web 应用程序，但其复杂程度与针对完整 JEE 应用服务器的应用程序相当。通过耦合到 Spring，您可以用 Spring 中的等效功能替换许多供应商特定或依赖于供应商配置的功能，从而提高应用程序的可移植性。\n\
  \n## Bean 生命周期管理\n\n任何 IoC 容器（包括 Spring）的一个重要部分是，Bean 可以被构造为在其生命周期的特定点接收通知。这使您的\
  \ Bean 能够在整个生命周期的特定点执行相关的处理。通常，有两个生命周期事件与 Bean 特别相关：*初始化后* 和 *销毁前*。\n\n![](img/315511_6_En_4_Figa_HTML.jpg)警告。 在\
  \ Spring 的上下文中，一旦 Spring 完成设置 Bean 上的所有属性值并完成您配置它执行的任何依赖项检查，就会触发 *初始化后* 事件。\n\n\
  ![](img/315511_6_En_4_Figb_HTML.jpg)警告。 *销毁前* 事件在 Spring 销毁 Bean 实例之前触发。\n\n但是，对于原型作用域的\
  \ Bean，Spring 不会触发 *销毁前* 事件。Spring 的设计是，无论 Bean 的作用域如何，都会在对象上调用初始化生命周期回调方法；而对于原型作用域的\
  \ Bean，则不会调用销毁生命周期回调方法。\n\nSpring 提供了三种机制，Bean 可以使用它们来挂钩这些事件并执行一些额外的处理：\n\n*   *基于接口的机制*：您的\
  \ Bean 实现一个特定于它想要接收的通知类型的接口，然后 Spring 通过接口中定义的回调方法通知该 Bean。\n\n*   *基于方法的机制*：Spring\
  \ 允许您在 `ApplicationContext` 配置中指定在 Bean 初始化时调用的方法名称，以及在 Bean 销毁时调用的方法名称。\n\n*  \
  \ *基于注解的机制*：您可以使用 JSR-250 注解来指定 Spring 在构造后或销毁前应调用的方法。\n\n对于这两个事件，这些机制都实现了完全相同的目的。基于接口的机制在\
  \ Spring 中被广泛使用，这样您就不必在每次使用 Spring 的某个组件时都记得指定初始化或销毁方法。但是，在您自己的 Bean 中，使用基于方法或基于注解的机制可能更好，因为您的\
  \ Bean 不需要实现任何 Spring 特定的接口。尽管我们说过，可移植性通常不像许多书籍让您相信的那么重要，但这并不意味着当存在一个完全可行的替代方案时，您应该牺牲可移植性。话虽如此，如果您正在以其他方式将应用程序与\
  \ Spring 耦合，那么使用接口方法可以让您指定一次回调，然后就可以忘记它。如果您正在定义大量需要利用生命周期通知的相同类型的 Bean，那么使用基于接口的机制可以避免在\
  \ Bean 配置中为每个 Bean 指定生命周期回调方法。使用 JSR-250 注解是 JCP 定义的标准，并且您也不会与 Spring 的特定注解耦合。只需确保您运行应用程序的\
  \ IoC 容器支持 JSR-250 标准即可。\n\n总的来说，选择哪种机制来接收生命周期通知取决于您的应用程序需求。当使用注解类型配置时，请确保您使用的是支持\
  \ JSR-250 的 IoC 容器。如果您不太关心可移植性，或者您正在定义许多需要生命周期通知的相同类型的 Bean，那么使用基于接口的机制是确保您的 Bean\
  \ 始终收到它们期望的通知的最佳方式。如果您计划在不同的 Spring 项目中使用某个 Bean，那么您几乎肯定希望该 Bean 的功能尽可能自包含，因此您绝对应该使用基于接口的机制。\n\
  \n图 4-1 展示了 Spring 如何管理其容器内 Bean 生命周期的高级概述。\n\n![](img/315511_6_En_4_Fig1_HTML.jpg)\n\
  \n一个 Spring Bean 的框图分为 4 个部分：Bean 安装和 DI、检查 Spring 感知、Bean 创建生命周期回调以及 Bean 销毁生命周期回调。包括：扫描\
  \ Bean 定义、创建实例、注入依赖项和方法选择。\n\n图 4-1\n\nSpring Bean 生命周期\n\n\n\n## 钩入 Bean 的创建过程\n\
  \n通过感知自身的初始化时机，Bean 可以检查其所有必需的依赖项是否已满足。虽然 Spring 可以为你检查依赖项，但这基本上是一种“全有或全无”的方式，并且它没有提供任何机会来为依赖项解析过程应用额外的逻辑。考虑一个\
  \ Bean，它声明了四个 Setter 依赖项，其中两个是必需的，另一个在未提供依赖项时具有合适的默认值。使用初始化回调，你的 Bean 可以检查它所需的依赖项，并根据需要抛出异常或提供默认值。\n\
  \nBean 无法在其构造函数中执行这些检查，因为此时 Spring 还没有机会为其能够满足的依赖项提供值。Spring 中的初始化回调是在 Spring 完成提供其能够提供的依赖项并执行你要求的任何依赖项检查之后调用的。\n\
  \n你不仅限于使用初始化回调来检查依赖项；你可以在回调中做任何你想做的事情，但它对于我们描述的目的最为有用。在许多情况下，初始化回调也是触发你的 Bean 必须自动响应其配置而采取的任何操作的地方。例如，如果你构建一个\
  \ Bean 来运行定时任务，初始化回调提供了启动调度器的理想位置——毕竟，配置数据是在 Bean 上设置的。\n\n![](img/315511_6_En_4_Figc_HTML.jpg)警告。 你不需要编写一个\
  \ Bean 来运行定时任务，因为 Spring 可以通过其内置的调度功能或通过与 Quartz 调度器的集成来自动完成此操作。我们将在**第** **12**\
  \ **章**中更详细地介绍这一点。\n\n### 在 Bean 创建时执行方法\n\n正如我们之前提到的，接收初始化回调的一种方法是在你的 Bean 上指定一个方法作为初始化方法，并告诉\
  \ Spring 将此方法用作初始化方法。如前所述，当你只有几个相同类型的 Bean，或者希望保持应用程序与 Spring 解耦时，这种基于回调的机制非常有用。使用这种机制的另一个原因是使你的\
  \ Spring 应用程序能够与之前构建的或由第三方供应商提供的 Bean 一起工作。指定回调方法只需将方法名称指定为 `@Bean` 注解中 `initMethod`\
  \ 属性的值即可。此注解用于在 Java 配置类中声明 Bean。虽然 Java 配置将在本章稍后介绍，但 Bean 初始化部分属于这里。\n\n清单 4-1\
  \ 展示了一个具有两个依赖项的基本 Bean。\n\n```\npackage com.apress.prospring6.four.initmethod;\n\
  import org.apache.commons.lang3.builder.ToStringBuilder;\n// import statements omitted\n\
  class Singer {\nprivate static Logger logger = LoggerFactory.getLogger(Singer.class);\n\
  private static final String DEFAULT_NAME = \"No Name\";\nprivate String name;\n\
  private int age;\npublic void setName(String name) {\nlogger.info(\"Calling setName\
  \ for bean of type {}.\", Singer.class);\nthis.name = name;\n}\npublic void setAge(int\
  \ age) {\nlogger.info(\"Calling setAge for bean of type {}.\", Singer.class);\n\
  this.age = age;\n}\npublic void init() {\nlogger.info(\"Initializing bean\");\n\
  if (name == null) {\nlogger.info(\"Using default name\");\nname = DEFAULT_NAME;\n\
  }\nif (age == Integer.MIN_VALUE) {\nthrow new IllegalArgumentException(\n\"You must\
  \ set the age property of any beans of type \" + Singer.class);\n}\n}\n@Override\n\
  public String toString() {\nreturn new ToStringBuilder(this)\n.append(\"name\",\
  \ name)\n.append(\"age\", age)\n.toString();\n}\n}\npublic class InitMethodDemo\
  \ {\nprivate static Logger logger = LoggerFactory.getLogger(InitMethodDemo.class);\n\
  public static void main(String... args) {\nvar ctx = new AnnotationConfigApplicationContext(SingerConfiguration.class);\n\
  getBean(\"singerOne\", ctx);\ngetBean(\"singerTwo\", ctx);\ngetBean(\"singerThree\"\
  , ctx);\n}\npublic static Singer getBean(String beanName, ApplicationContext ctx)\
  \ {\ntry {\nSinger bean = (Singer) ctx.getBean(beanName);\nlogger.info(\"Found:\
  \ {}\", bean);\nreturn bean;\n} catch (BeanCreationException ex) {\nlogger.error(\"\
  An error occurred in bean configuration: \" + ex.getMessage());\nreturn null;\n\
  }\n}\n}\n清单 4-1\n具有两个依赖项的 Bean 类型\n```\n\n注意，我们定义了一个方法 `init()` 来充当初始化回调。`init()`\
  \ 方法检查 `name` 属性是否已设置，如果未设置，则使用存储在 `DEFAULT_NAME` 常量中的默认值。`init()` 方法还检查 `age` 属性是否已设置，如果未设置，则抛出\
  \ `IllegalArgumentException`。\n\n`InitMethodDemo` 类的 `main()` 方法尝试使用其自己的 `getBean()`\
  \ 方法从 `AnnotationConfigApplicationContext` 获取三个 Bean，所有 Bean 的类型都是 `Singer`。注意，在\
  \ `getBean()` 方法中，如果成功获取 Bean，其详细信息将写入控制台输出。如果在 `init()` 方法中抛出异常（在本例中，如果未设置 `age`\
  \ 属性，就会发生这种情况），那么 Spring 会将该异常包装在 `BeanCreationException` 中。`getBean()` 方法捕获这些异常，并将一条消息写入控制台输出，告知我们错误，同时返回一个\
  \ `null` 值。\n\n清单 4-2 显示了一个 `ApplicationContext` 配置，该配置定义了前面代码片段中使用的 Bean。\n\n\n\
  \n```\npackage com.apress.prospring6.four.initmethod;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\n@Configuration\nclass\
  \ SingerConfiguration {\n@Bean(initMethod = \"init\")\nSinger singerOne(){\nSinger\
  \ singer = new Singer();\nsinger.setName(\"John Mayer\");\nsinger.setAge(43);\n\
  return singer;\n}\n@Bean(initMethod = \"init\")\nSinger singerTwo(){\nSinger singer\
  \ = new Singer();\nsinger.setAge(42);\nreturn singer;\n}\n@Bean(initMethod = \"\
  init\")\nSinger singerThree(){\nSinger singer = new Singer();\nsinger.setName(\"\
  John Butler\");\nreturn singer;\n}\n}\n代码清单 4-2\n使用三个 Singer Bean 配置 Spring ApplicationContext\
  \ 的 SingerConfiguration\n```\n\n如你所见，三个 Bean 的 `@Bean` 注解都包含一个 `initMethod` 属性，该属性告诉\
  \ Spring 在完成 Bean 配置后立即调用 `init()` 方法。`singerOne` Bean 同时设置了 `name` 和 `age` 属性的值，因此它通过\
  \ `init()` 方法时不会发生任何变化。`singerTwo` Bean 没有设置 `name` 属性的值，这意味着在 `init()` 方法中，`name`\
  \ 属性会被赋予默认值。最后，`singerThree` Bean 没有设置 `age` 属性的值。`init()` 方法中定义的逻辑将此视为错误，因此会抛出\
  \ `IllegalArgumentException`。\n\n运行 `InitMethodDemo` 类将产生代码清单 4-3 所示的输出。\n\n```\n\
  INFO : Singer - Calling setName for bean of type class com.apress.prospring6.four.initmethod.Singer.\n\
  INFO : Singer - Calling setAge for bean of type class com.apress.prospring6.four.initmethod.Singer.\n\
  INFO : Singer - Initializing bean\nDEBUG: DefaultSingletonBeanRegistry - Creating\
  \ shared instance of singleton bean 'singerTwo'\nINFO : Singer - Calling setAge\
  \ for bean of type class com.apress.prospring6.four.initmethod.Singer.\nINFO : Singer\
  \ - Initializing bean\nINFO : Singer - Using default name\nDEBUG: DefaultSingletonBeanRegistry\
  \ - Creating shared instance of singleton bean 'singerThree'\nINFO : Singer - Calling\
  \ setName for bean of type class com.apress.prospring6.four.initmethod.Singer.\n\
  INFO : Singer - Initializing bean\nWARN : AbstractApplicationContext - Exception\
  \ encountered during context initialization - cancelling refresh attempt: org.springframework.beans.factory.BeanCreationException:\
  \ Error creating bean with name 'singerThree' defined in com.apress.prospring6.four.initmethod.SingerConfiguration:\
  \ Invocation of init method failed; nested exception is java.lang.IllegalArgumentException:\
  \ You must set the age property of any beans of type class com.apress.prospring6.four.initmethod.Singer\n\
  Exception in thread \"main\" org.springframework.beans.factory.BeanCreationException:\
  \ Error creating bean with name 'singerThree' defined in com.apress.prospring6.four.initmethod.SingerConfiguration:\
  \ Invocation of init method failed; nested exception is java.lang.IllegalArgumentException:\
  \ You must set the age property of any beans of type class com.apress.prospring6.four.initmethod.Singer\n\
  代码清单 4-3\n运行 InitMethodDemo 产生的输出\n```\n\n从该输出可以看出，`singerOne` 已按照我们在配置文件中指定的值正确配置。对于\
  \ `singerTwo`，由于配置中未指定 `name` 属性的值，因此使用了该属性的默认值。最后，对于 `singerThree`，由于 `age` 属性缺少值导致\
  \ `init()` 方法引发错误，因此没有创建任何 Bean 实例。\n\n如你所见，使用初始化方法是确保 Bean 正确配置的理想方式。通过使用这种机制，你可以充分利用\
  \ IoC 的优势，同时不会失去手动定义依赖关系所带来的任何控制权。\n\n![](img/315511_6_En_4_Figd_HTML.jpg)一个警告。 初始化方法的唯一限制是它不能接受任何参数。你可以定义任何返回类型（尽管\
  \ Spring 会忽略它），甚至可以使用静态方法，但该方法必须不接受任何参数。\n\n当使用静态初始化方法时，这种机制的优势会被抵消，因为你无法访问 Bean\
  \ 的任何状态来对其进行验证。如果你的 Bean 使用静态状态作为节省内存的机制，并且你正在使用静态初始化方法来验证此状态，那么你应该考虑将静态状态迁移为实例状态，并使用非静态初始化方法。如果你使用\
  \ Spring 的单例管理功能，最终效果是一样的，但你的 Bean 会更易于测试，并且你还能在需要时创建具有各自状态的多个 Bean 实例。当然，在某些情况下，你需要使用跨多个\
  \ Bean 实例共享的静态状态，这时你仍然可以使用静态初始化方法。\n\n### 实现 InitializingBean 接口\n\nSpring 中定义的\
  \ `InitializingBean` 接口允许你在 Bean 代码中定义 Spring 在完成 Bean 配置后要执行的操作。与使用初始化方法时一样，这为你提供了检查\
  \ Bean 配置以确保其有效性的机会，并在此过程中提供任何默认值。`InitializingBean` 接口定义了一个单一方法 `afterPropertiesSet()`，其作用与上一节介绍的\
  \ `init()` 方法相同。代码清单 4-4 展示了使用 `InitializingBean` 接口替代初始化方法对先前示例的重新实现。\n\n```\n\
  package com.apress.prospring6.four.intf;\nimport org.springframework.beans.factory.InitializingBean;\n\
  // 其他导入语句已省略\nclass Singer implements InitializingBean {\nprivate static Logger\
  \ logger = LoggerFactory.getLogger(Singer.class);\nprivate static final String DEFAULT_NAME\
  \ = \"No Name\";\nprivate String name;\nprivate int age = Integer.MIN_VALUE;\npublic\
  \ void setName(String name) {\nlogger.info(\"Calling setName for bean of type {}.\"\
  , Singer.class);\nthis.name = name;\n}\npublic void setAge(int age) {\nlogger.info(\"\
  Calling setAge for bean of type {}.\", Singer.class);\nthis.age = age;\n}\n@Override\n\
  public void afterPropertiesSet() throws Exception {\nlogger.info(\"Initializing\
  \ bean using 'afterPropertiesSet()'\");\nif (name == null) {\nlogger.info(\"Using\
  \ default name\");\nname = DEFAULT_NAME;\n}\nif (age == Integer.MIN_VALUE) {\nthrow\
  \ new IllegalArgumentException(\n\"You must set the age property of any beans of\
  \ type \" + Singer.class);\n}\n}\n@Override\npublic String toString() {\nreturn\
  \ new ToStringBuilder(this)\n.append(\"name\", name)\n.append(\"age\", age)\n.toString();\n\
  }\n}\n@Configuration\nclass SingerConfiguration {\n@Bean\nSinger singerOne(){\n\
  Singer singer = new Singer();\nsinger.setName(\"John Mayer\");\nsinger.setAge(43);\n\
  return singer;\n}\n// 其他 Bean 声明已省略\n}\npublic class InitializingBeanDemo {\nprivate\
  \ static Logger logger = LoggerFactory.getLogger(InitializingBeanDemo.class);\n\
  public static void main(String... args) {\nvar ctx = new AnnotationConfigApplicationContext(SingerConfiguration.class);\n\
  getBean(\"singerOne\", ctx);\ngetBean(\"singerTwo\", ctx);\ngetBean(\"singerThree\"\
  , ctx);\n}\n// getBean(..) 方法已省略，与代码清单 4-1 中的相同。\n}\n代码清单 4-4\n实现 InitializingBean\
  \ 的 Singer 类\n```\n\n如你所见，此示例中的变化不大。唯一的区别在于此类实现了 `InitializingBean`，并且初始化逻辑已移至 `afterPropertiesSet()`\
  \ 方法中。配置不再需要 `initMethod` 属性，如果你运行 `InitializingBeanDemo`，将会看到相同的输出。\n\n\n\n###\
  \ 使用 JSR-250 的 @PostConstruct 注解\n\nJSR-250 注解在**第** **4 章**中已结合使用 `@Resource` 进行依赖自动装配的内容进行过介绍。本节将展示如何使用\
  \ JSR-250 生命周期注解 `@PostConstruct`。从 Spring 2.5 开始，JSR-250 注解也得到支持，用于指定当类中存在与 Bean\
  \ 生命周期相关的对应注解时，Spring 应调用的方法。清单 4-5 展示了使用 `@PostConstruct` 注解重写的上一个示例。\n\n```\n\
  package com.apress.prospring6.four.jsr250;\nimport jakarta.annotation.PostConstruct;\n\
  class Singer {\nprivate static Logger logger = LoggerFactory.getLogger(Singer.class);\n\
  private static final String DEFAULT_NAME = \"No Name\";\nprivate String name;\n\
  private int age = Integer.MIN_VALUE;\npublic void setName(String name) {\nlogger.info(\"\
  Calling setName for bean of type {}.\", Singer.class);\nthis.name = name;\n}\npublic\
  \ void setAge(int age) {\nlogger.info(\"Calling setAge for bean of type {}.\", Singer.class);\n\
  this.age = age;\n}\n@PostConstruct\npublic void postConstruct() throws Exception\
  \ {\nlogger.info(\"Initializing bean using 'postConstruct()'\");\nif (name == null)\
  \ {\nlogger.info(\"Using default name\");\nname = DEFAULT_NAME;\n}\nif (age == Integer.MIN_VALUE)\
  \ {\nthrow new IllegalArgumentException(\n\"You must set the age property of any\
  \ beans of type \" + Singer.class);\n}\n}\n// toString() omitted\n}\n清单 4-5\n使用\
  \ @PostConstruct 实现的 Singer 类\n```\n\n该程序与使用 `@Bean(initMethod=..)` 和 `InitializingBean`\
  \ 方法相同；区别在于将 `@PostConstruct` 注解应用于初始化方法。在此场景中，方法被重命名为 `postConstruct`，以更明确地表明该方法的目的。请注意，你可以随意命名该方法。\n\
  \n![](img/315511_6_En_4_Fige_HTML.jpg)一条信息提示。 用于测试这个新 `Singer` Bean 类型的配置和类与 `InitializingBean`\
  \ 示例中的完全相同，产生的输出也相同，因此此处不再重复，但欢迎你自行执行本书项目中的 `com.apress.prospring6.four.jsr250.PostConstructDemo`\
  \ 类来验证这一论断。\n\n这三种方法各有优缺点：\n\n*   使用初始化方法，你可以保持应用程序与 Spring 解耦，但必须记住为每个需要初始化方法的\
  \ Bean 进行配置。\n\n*   使用 `InitializingBean` 接口，你可以为 Bean 类的所有实例指定一次初始化回调，但这样做会使应用程序与\
  \ Spring 耦合。\n\n*   使用注解，你需要将注解应用于方法，并确保 IoC 容器支持 JSR-250。\n\n最终，你应该根据应用程序的需求来决定使用哪种方法。如果可移植性是一个问题，请使用初始化方法或注解方法；否则，使用\
  \ `InitializingBean` 接口可以减少应用程序所需的配置量，并降低因配置错误而导致错误潜入应用程序的风险。\n\n![](img/315511_6_En_4_Figf_HTML.jpg)一条信息提示。 当使用\
  \ `@Bean(initMethod=..)` 或 `@PostConstruct` 配置初始化时，其优势在于可以用不同的访问权限声明初始化方法。初始化方法应仅在\
  \ Bean 创建时由 Spring IoC 调用一次。后续调用将导致意外结果甚至失败。通过将初始化方法设为 `private`，可以禁止外部额外调用。Spring\
  \ IoC 能够通过反射调用它，但代码中的任何额外调用都将不被允许。\n\n### 理解解析顺序\n\n所有初始化机制都可以用于同一个 Bean 实例。在这种情况下，Spring\
  \ 首先调用带有 `@PostConstruct` 注解的方法，然后调用 `afterPropertiesSet()`，最后调用 `@Bean` 注解中指定的初始化方法。这种顺序有其技术原因，通过遵循图\
  \ 4-1 中的路径，我们可以注意到 Bean 创建过程中的以下步骤：\n\n1.  首先调用构造函数来创建 Bean。\n\n2.  注入依赖项（调用 setter\
  \ 方法）。如果存在依赖项，则会咨询 `BeanPostProcessor` 基础设施 Bean 来调用 setter 方法。这是一个 Spring 特定的基础设施\
  \ Bean，用于在 Bean 创建后对其进行修改。`@Autowired` 注解由 `AutowiredAnnotationBeanPostProcessor`\
  \ 注册，因此该 Bean 将调用带有 `@Autowired` 注解的 setter 方法。\n\n3.  现在 Bean 已存在且依赖项已提供，会咨询预初始化的\
  \ `BeanPostProcessor` 基础设施 Bean，以确定它们是否想要调用此 Bean 中的任何内容。这些是 Spring 特定的基础设施 Bean，用于在\
  \ Bean 创建后对其进行修改。`@PostConstruct` 注解由 `CommonAnnotationBeanPostProcessor` Bean 注册，因此该\
  \ Bean 将调用带有 `@PostConstruct` 注解的方法。此方法在 Bean 构造完成后、类投入使用之前^(³⁰)，以及在实际初始化 Bean 之前（在\
  \ `afterPropertiesSet` 和 `initMethod` 之前）立即执行。\n\n4.  `InitializingBean` 的 `afterPropertiesSet`\
  \ 在依赖项注入后立即执行。`afterPropertiesSet()` 方法由 `BeanFactory` 在设置完所有提供的 Bean 属性并满足 `BeanFactoryAware`\
  \ 和 `ApplicationContextAware` 后调用。\n\n5.  在 `initMethod` 属性中按名称指定的方法最后执行，因为这是 Bean\
  \ 的实际初始化方法。\n\n清单 4-6 中所示的 `AllInitMethodsDemo` 类集可用于演示上述所有论断。\n\n```\npackage com.apress.prospring6.four.all;\n\
  // import statement omitted\nclass Dependency { // very simple bean type\n}\nclass\
  \ MultiInit implements InitializingBean {\nprivate static Logger logger = LoggerFactory.getLogger(MultiInit.class);\n\
  private Dependency dependency;\npublic MultiInit() {\nlogger.info(\"1\\. Calling\
  \ constructor for bean of type {}.\", MultiInit.class);\n}\npublic Dependency getDependency()\
  \ {\nreturn dependency;\n}\n@Autowired\npublic void setDependency(Dependency dependency)\
  \ {\nlogger.info(\"2\\. Calling setDependency for bean of type {}.\", MultiInit.class);\n\
  this.dependency = dependency;\n}\n@PostConstruct\nprivate void postConstruct() throws\
  \ Exception {\nlogger.info(\"3\\. Calling postConstruct() for bean of type {}.\"\
  , MultiInit.class);\n}\n@Override\npublic void afterPropertiesSet() throws Exception\
  \ {\nlogger.info(\"4\\. Calling afterPropertiesSet() for bean of type {}.\", MultiInit.class);\n\
  }\nprivate void initMe() throws Exception {\nlogger.info(\"5\\. Calling initMethod()\
  \ for bean of type {}.\", MultiInit.class);\n}\n}\n@Configuration\nclass MultiInitConfiguration\
  \ {\n@Bean\nDependency dependency (){\nreturn new Dependency();\n}\n@Bean(initMethod\
  \ = \"initMe\")\nMultiInit multiInitBean(){\nreturn new MultiInit();\n}\n}\npublic\
  \ class AllInitMethodsDemo {\npublic static void main(String... args) {\nnew AnnotationConfigApplicationContext(MultiInitConfiguration.class);\n\
  }\n}\n清单 4-6\n用于展示初始化方法顺序的 AllInitMethodsDemo 示例\n```\n\n当在 `AllInitMethodsDemo`\
  \ 类的 `main(..)` 方法中启用 `org.springframework` 包的 `DEBUG` 日志运行时，将产生清单 4-7 中的输出。\n\n\
  \n\n```\n...\nDEBUG: DefaultSingletonBeanRegistry - Creating shared instance of\
  \ singleton bean 'org.springframework.context.annotation.internalConfigurationAnnotationProcessor'\n\
  DEBUG: DefaultSingletonBeanRegistry - Creating shared instance of singleton bean\
  \ 'org.springframework.context.event.internalEventListenerProcessor'\nDEBUG: DefaultSingletonBeanRegistry\
  \ - Creating shared instance of singleton bean 'org.springframework.context.event.internalEventListenerFactory'\n\
  DEBUG: DefaultSingletonBeanRegistry - Creating shared instance of singleton bean\
  \ 'org.springframework.context.annotation.internalAutowiredAnnotationProcessor'\n\
  DEBUG: DefaultSingletonBeanRegistry - Creating shared instance of singleton bean\
  \ 'org.springframework.context.annotation.internalCommonAnnotationProcessor'\nDEBUG:\
  \ DefaultSingletonBeanRegistry - Creating shared instance of singleton bean 'multiInitConfiguration'\n\
  DEBUG: DefaultSingletonBeanRegistry - Creating shared instance of singleton bean\
  \ 'dependency'\nDEBUG: DefaultSingletonBeanRegistry - Creating shared instance of\
  \ singleton bean 'multiInitBean'\nINFO : MultiInit - 1\\. 为类型为 class com.apress.prospring6.four.all.MultiInit\
  \ 的 bean 调用构造函数。\nINFO : MultiInit - 2\\. 为类型为 class com.apress.prospring6.four.all.MultiInit\
  \ 的 bean 调用 setDependency 方法。\nINFO : MultiInit - 3\\. 为类型为 class com.apress.prospring6.four.all.MultiInit\
  \ 的 bean 调用 postConstruct() 方法。\nINFO : MultiInit - 4\\. 为类型为 class com.apress.prospring6.four.all.MultiInit\
  \ 的 bean 调用 afterPropertiesSet() 方法。\nINFO : MultiInit - 5\\. 为类型为 class com.apress.prospring6.four.all.MultiInit\
  \ 的 bean 调用 initMethod() 方法。\n清单 4-7\nAllInitMethodsDemo 控制台输出\n```\n\n如果你查看 Spring\
  \ 应用程序的详细日志，可能会注意到一些 Spring 特有的基础设施 Bean。它们的名称暗示了其类型和职责。例如，`org.springframework.context.annotation.internalCommonAnnotationProcessor`\
  \ Bean 是 `CommonAnnotationBeanPostProcessor` Bean，它为 `@PostConstruct` 注解提供支持；而 `org.springframework.context.annotation.internalAutowiredAnnotationProcessor`\
  \ Bean 是 `AutowiredAnnotationBeanPostProcessor` Bean，它为 `@Autowired` 注解提供支持。如果你想通过名称识别其他类型的\
  \ Spring 特有基础设施 Bean，可以查看 `AnnotationConfigUtils` 的源代码 ^(³¹)。\n\n## 接入 Bean 销毁\n\
  \n当使用包装了 `DefaultListableBeanFactory` 接口的 `ApplicationContext` 实现（例如通过 `getDefaultListableBeanFactory()`\
  \ 方法获取的 `AnnotationConfigApplicationContext`）时，你可以通过调用 `ConfigurableBeanFactory.destroySingletons()`\
  \ 向 `BeanFactory` 发出信号，表明你想要销毁所有单例实例。通常，你会在应用程序关闭时执行此操作，这允许你清理 Bean 可能持有的任何资源，从而使应用程序能够优雅地关闭。此回调还提供了一个绝佳的位置，用于将存储在内存中的任何数据刷新到持久化存储，并允许你的\
  \ Bean 结束它们可能已启动的任何长时间运行的进程。\n\n为了让你的 Bean 能够接收到 `destroySingletons()` 已被调用的通知，你有三种选择，所有这些都与可用于接收初始化回调的机制类似。销毁回调通常与初始化回调结合使用。在许多情况下，你在初始化回调中创建和配置资源，然后在销毁回调中释放该资源。\n\
  \n![](img/315511_6_En_4_Figg_HTML.jpg)警告。 `destroySingletons()` 方法的名称暗示了一个重要的细节。Spring\
  \ 仅对单例 Bean 执行销毁操作。对于非单例作用域的 Bean，其生命周期并非完全由 Spring 管理。例如，对于原型 Bean，Spring 容器会实例化、配置并组装一个原型对象，然后将其交给客户端，之后不再记录该原型实例。\n\
  \n## 在 Bean 销毁时执行方法\n\n要指定一个在 Bean 销毁时被调用的方法，你只需在 Bean 定义的 `@Bean` 注解的 `destroyMethod`\
  \ 属性中指定该方法的名称。Spring 会在销毁该 Bean 的单例实例之前调用它（Spring 不会为那些具有 `prototype` 作用域的 Bean\
  \ 调用此方法）。清单 4-8 中的代码片段提供了一个使用销毁方法回调的示例。\n\n```\npackage com.apress.prospring6.four.destroymethod;\n\
  // 导入语句已省略\nclass FileManager {\nprivate static Logger logger = LoggerFactory.getLogger(FileManager.class);\n\
  private Path file;\npublic FileManager() {\nlogger.info(\"正在创建类型为 {} 的 Bean\", FileManager.class);\n\
  try {\nfile = Files.createFile(Path.of(\"sample\"));\n} catch (IOException e) {\n\
  logger.error(\"无法创建文件\");\n}\n}\nprivate void destroyMethod() throws IOException\
  \ {\nlogger.info(\"正在销毁类型为 {} 的 Bean\", FileManager.class);\nif (file != null) {\n\
  Files.deleteIfExists(file);\n}\n}\n}\n@Configuration\nclass DemoConfig {\n@Bean(destroyMethod\
  \ = \"destroyMethod\")\nFileManager fileManager() {\nreturn new FileManager();\n\
  }\n}\npublic class DestroyMethodDemo {\npublic static void main(String... args)\
  \ {\nvar ctx = new AnnotationConfigApplicationContext(DemoConfig.class);\nctx.close();\
  \ // 需要关闭上下文\n}\n}\n清单 4-8\n展示如何使用 @Bean 注解配置销毁方法的示例\n```\n\n`FileManager` 类定义了一个\
  \ `destroyMethod()` 方法，在该方法中，由其构造函数创建的文件会被删除。`main()` 方法从上下文中获取一个 `FileManager`\
  \ 类型的 Bean，然后调用其 `destroyMethod()` 方法（该方法进而会调用由 `ApplicationContext` 包装的 `ConfigurableBeanFactory.destroySingletons()`\
  \ 方法），指示 Spring 销毁其管理的所有单例。构造函数和销毁方法都会向控制台输出一条消息，告知我们它们已被调用。\n\n\n\n### 实现 `DisposableBean`\
  \ 接口\n\n与初始化回调类似，Spring 提供了一个接口（此处为 `DisposableBean`），你的 Bean 可以实现该接口，作为接收销毁回调的机制。`DisposableBean`\
  \ 接口定义了一个单一方法 `destroy()`，该方法在 Bean 被销毁之前调用。使用此机制与使用 `InitializingBean` 接口接收初始化回调是正交的。清单\
  \ 4-9 中的代码片段展示了 `FileManager` 类的一个修改后的实现，该类实现了 `DisposableBean` 接口。\n\n```\npackage\
  \ com.apress.prospring6.four.intf;\nimport org.springframework.beans.factory.DisposableBean;\n\
  // 其他导入语句已省略\nclass FileManager implements DisposableBean  {\nprivate static Logger\
  \ logger = LoggerFactory.getLogger(FileManager.class);\nprivate Path file;\npublic\
  \ FileManager() {\nlogger.info(\"Creating bean of type {}\", FileManager.class);\n\
  try {\nfile = Files.createFile(Path.of(\"sample\"));\n} catch (IOException e) {\n\
  logger.error(\"Could not create file\");\n}\n}\n@Override\npublic void destroy()\
  \ throws Exception {\nlogger.info(\"Calling destroy() on bean of type {}\", FileManager.class);\n\
  if (file != null) {\nFiles.deleteIfExists(file);\n}\n}\n}\n清单 4-9\n示例：展示如何使用 DisposableBean\
  \ 接口配置销毁方法\n```\n\n使用通过 `@Bean(destroyMethod=\"..\")` 配置的回调方法机制的代码与使用回调接口机制的代码之间没有太大区别。配置与上一节中的配置相同，只是缺少了不再需要的\
  \ `(destroyMethod=\"..\")`。运行示例的代码也相同。因此，我们可以跳过展示这两个实现，直接进入配置销毁方法的下一种方式。\n\n###\
  \ 使用 JSR-250 `@PreDestroy` 注解\n\n定义在 Bean 销毁前调用的方法的第三种方式是使用 JSR-250 生命周期 `@PreDestroy`\
  \ 注解，它是 `@PostConstruct` 注解的逆操作。清单 4-10 中的代码片段是使用 `@PreDestroy` 执行销毁操作的 `FileManager`\
  \ 版本。\n\n```\npackage com.apress.prospring6.four.jsr250;\nimport jakarta.annotation.PreDestroy;\n\
  // 导入语句已省略\nclass FileManager {\nprivate static Logger logger = LoggerFactory.getLogger(FileManager.class);\n\
  private Path file;\npublic FileManager() {\nlogger.info(\"Creating bean of type\
  \ {}\", FileManager.class);\ntry {\nfile = Files.createFile(Path.of(\"sample\"));\n\
  } catch (IOException e) {\nlogger.error(\"Could not create file\");\n}\n}\n@PreDestroy\n\
  private void preDestroy() throws IOException {\nlogger.info(\"Calling preDestroy()\
  \ on bean of type {}\",FileManager.class);\nif (file != null) {\nFiles.deleteIfExists(file);\n\
  }\n}\n}\n清单 4-10\n示例：展示如何使用 @PreDestroy 注解配置销毁方法\n```\n\n运行任何声明了销毁回调的示例，都会在控制台输出与清单\
  \ 4-11 所示非常相似的日志。\n\n```\n...\nINFO : FileManager - Creating bean of type class\
  \ com.apress.prospring6.four.*.FileManager\nDEBUG: AbstractApplicationContext -\
  \ Closing org.springframework.context.annotation.AnnotationConfigApplicationContext@79be0360,\
  \ started on Fri Mar 25 12:05:49 GMT 2022\nINFO : FileManager - Calling destroy()/destroyMethod()/preDestroy()\
  \ on bean of type class com.apress.prospring6.four.*.FileManager\n清单 4-11\n展示 Bean\
  \ 销毁的日志示例\n```\n\n销毁回调是一种理想的机制，可确保你的应用程序优雅地关闭，并且不会让资源保持打开状态或处于不一致状态。但是，你仍然需要决定如何使用销毁方法回调：使用\
  \ `@Bean(destroyMethod=\"..\")`、`DisposableBean` 接口还是 `@PreDestroy` 注解。同样，让应用程序的需求驱动你在此方面的决策；在可移植性成为问题时使用方法回调，并使用\
  \ `DisposableBean` 接口或 JSR-250 注解来减少所需的配置量。\n\n### 理解解析顺序\n\n与 Bean 创建的情况一样，你可以在同一个\
  \ Bean 实例上使用所有机制进行 Bean 销毁。在这种情况下，Spring 首先调用带有 `@PreDestroy` 注解的方法，然后调用 `DisposableBean.destroy()`，最后调用你在\
  \ `@Bean` 定义中配置的销毁方法。\n\n### 使用关闭钩子\n\nSpring 中销毁回调的唯一缺点是它们不会自动触发；你需要记得在应用程序关闭之前调用\
  \ `ctx.close()`。当你的应用程序作为 Servlet 运行时，你可以简单地在 Servlet 的 `destroy()` 方法中调用 `destroy()`。\n\
  \n然而，在独立应用程序中，事情就没那么简单了，尤其是当你的应用程序有多个退出点时。幸运的是，有一个解决方案。Java 允许你创建一个*关闭钩子*，这是一个在应用程序即将关闭之前执行的线程。这是调用你的上下文（所有具体的\
  \ `ApplicationContext` 实现都扩展了它）的 `destroy()` 方法的完美方式。利用此机制的最简单方法是使用 `AbstractApplicationContext`\
  \ 的 `registerShutdownHook()` 方法。该方法会自动指示 Spring 注册底层 JVM 运行时的关闭钩子。Bean 声明和配置与之前相同；唯一改变的是\
  \ main 方法：添加了对 `ctx.registerShutdownHook` 的调用，并且移除了对 `ctx.destroy()` 或 `close()`\
  \ 的调用。\n\n运行清单 4-12 中的代码会产生与清单 4-11 中显示的输出相同的输出。\n\n```\npackage com.apress.prospring6.four.jsr250;\n\
  // 导入和部分代码已省略\npublic class PreDestroyDemo {\npublic static void main(String...\
  \ args) {\nvar ctx = new AnnotationConfigApplicationContext(DemoConfig.class);\n\
  ctx.registerShutdownHook();\n}\n}\n清单 4-12\n展示 Bean 销毁的日志示例\n```\n\n## 让你的 Bean\
  \ “感知 Spring”\n\n依赖注入相对于依赖查找作为实现控制反转机制的最大卖点之一在于，你的 Bean 不需要感知管理它们的容器实现。对于使用构造器或\
  \ Setter 注入的 Bean 来说，Spring 容器与 Google Guice 或 PicoContainer 提供的容器是一样的。然而，在某些情况下，你可能需要一个使用依赖注入来获取其依赖项的\
  \ Bean，以便它能够出于其他原因与容器进行交互。一个例子是，一个 Bean 为你自动配置了关闭钩子，因此它需要访问 `ApplicationContext`。在其他情况下，一个\
  \ Bean 可能想知道它的名称（即在当前 `ApplicationContext` 内分配的 Bean 名称），以便根据此名称执行一些额外的处理。\n\n话虽如此，此功能实际上是为\
  \ Spring 内部使用而设计的。赋予 Bean 名称某种业务意义通常是一个坏主意，并且可能导致配置问题，因为必须人为地操纵 Bean 名称以支持其业务含义。然而，我们发现，让\
  \ Bean 在运行时找出其名称对于日志记录非常有用。假设你有许多相同类型的 Bean 在不同的配置下运行。当出现问题时，Bean 名称可以包含在日志消息中，以帮助你区分是哪个\
  \ Bean 生成了错误，哪些 Bean 工作正常。\n\n\n\n### 使用 `BeanNameAware` 接口\n\n`BeanNameAware` 接口可以被想要获取自身名称的\
  \ Bean 实现，它只有一个方法：`setBeanName(String)`。Spring 在完成 Bean 的配置之后、但在任何生命周期回调（初始化或销毁）被调用之前，会调用\
  \ `setBeanName()` 方法（参见图 4-1）。在大多数情况下，`setBeanName()` 接口的实现只有一行代码，用于将容器传入的值存储在一个字段中，以便后续使用。代码清单\
  \ 4-13 中的代码片段展示了一个简单的 Bean，它通过 `BeanNameAware` 获取自己的名称，然后使用该 Bean 名称向控制台打印信息。\n\n\
  ```\npackage com.apress.prospring6.four.aware;\n// 其他导入语句已省略\nimport org.springframework.beans.factory.BeanNameAware;\n\
  class NamedSinger implements BeanNameAware {\nprivate static Logger logger = LoggerFactory.getLogger(NamedSinger.class);\n\
  private String name;\n@Override /** @Implements {@link BeanNameAware#setBeanName(String)}\
  \ */\npublic void setBeanName(String beanName) {\nthis.name = beanName;\n}\npublic\
  \ void sing() {\nlogger.info(\"Singer \" + name + \" - sing()\");\n}\n}\n代码清单 4-13\n\
  BeanNameAware 示例实现\n```\n\n这个实现相当简单。请记住，`BeanNameAware.setBeanName()` 是在通过调用 `ApplicationContext.getBean()`\
  \ 将 Bean 的第一个实例返回给应用程序之前调用的，因此无需在 `sing()` 方法中检查 Bean 名称是否可用。如您所见，利用 `BeanNameAware`\
  \ 接口不需要特殊的配置。在代码清单 4-14 中，您可以看到一个简单的配置示例和应用程序，它从 `ApplicationContext` 中检索 `NamedSinger`\
  \ 实例，然后调用 `sing()` 方法。\n\n```\npackage com.apress.prospring6.four.aware;\n// 其他导入语句已省略\n\
  @ComponentScan\nclass AwareConfig {\n@Bean\nNamedSinger johnMayer(){\nreturn new\
  \ NamedSinger();\n}\n}\npublic class AwareDemo {\npublic static void main(String...\
  \ args) {\nvar ctx = new AnnotationConfigApplicationContext(AwareConfig.class);\n\
  ctx.registerShutdownHook();\nvar singer = ctx.getBean(NamedSinger.class);\nsinger.sing();\n\
  }\n}\n代码清单 4-14\nBeanNameAware 使用示例\n```\n\n运行时，此示例会生成一个非常简单的输出：\n\n```\nINFO :\
  \ NamedSinger - Singer johnMayer - sing() ;\n```\n\n请注意，在调用 `sing()` 方法的日志消息中包含了\
  \ Bean 名称。\n\n使用 `BeanNameAware` 接口确实非常简单，并且在您需要提高日志消息质量时，它能发挥很好的作用。避免仅仅因为可以访问 Bean\
  \ 名称就试图赋予它们业务含义；这样做会将您的类与 Spring 耦合在一起，而带来的好处却微乎其微。如果您的 Bean 内部需要某种名称，可以让它们实现一个类似\
  \ `Nameable`（特定于您的应用程序）的接口，其中包含一个 `setName()` 方法，然后通过依赖注入为每个 Bean 赋予一个名称。这样，您可以使配置中使用的名称保持简洁，并且无需为了给\
  \ Bean 赋予具有业务含义的名称而进行不必要的配置操作。\n\n### 使用 `ApplicationContextAware` 接口\n\n`ApplicationContextAware`\
  \ 在**第** **3** **章**末尾被引入，用以展示 Spring 如何处理那些需要其他 Bean 才能运行、但未在配置中使用构造函数或 Setter\
  \ 方法注入的 Bean（代码清单 3-54 中的 `@DependsOn` 示例）。\n\n通过使用 `ApplicationContextAware` 接口，您的\
  \ Bean 可以获取到配置它们的 `ApplicationContext` 实例的引用。创建此接口的主要原因是允许 Bean 在您的应用程序中访问 Spring\
  \ 的 `ApplicationContext`，例如，通过 `getBean()` 以编程方式获取其他 Spring Bean。但是，您应该避免这种做法，而应使用依赖注入为您的\
  \ Bean 提供其协作者。如果在可以使用依赖注入的情况下，却使用基于查找的 `getBean()` 方法来获取依赖项，那么您就是在为 Bean 增加不必要的复杂性，并且在没有充分理由的情况下将它们与\
  \ Spring 框架耦合在一起。\n\n当然，`ApplicationContext` 不仅仅用于查找 Bean；它还执行许多其他任务。正如您之前所见，其中一项任务是销毁所有单例\
  \ Bean，并在销毁之前依次通知它们。在上一节中，您了解了如何创建一个关闭钩子，以确保在应用程序关闭之前指示 `ApplicationContext` 销毁所有单例\
  \ Bean。通过使用 `ApplicationContextAware` 接口，您可以构建一个 Bean，该 Bean 可以在 `ApplicationContext`\
  \ 中进行配置，以自动创建和配置一个关闭钩子 Bean。代码清单 4-15 展示了此 Bean 的代码。\n\n```\npackage com.apress.prospring6.four.aware;\n\
  import org.springframework.context.ApplicationContextAware;\n// 其他导入语句已省略\nclass\
  \ ShutdownHookBean implements ApplicationContextAware {\nprivate ApplicationContext\
  \ ctx;\n/** @Implements {@link ApplicationContextAware#setApplicationContext(ApplicationContext)}\
  \ }*/\npublic void setApplicationContext(ApplicationContext ctx) throws BeansException\
  \ {\nif (ctx instanceof GenericApplicationContext) {\n((GenericApplicationContext)\
  \ ctx).registerShutdownHook();\n}\n}\n}\n代码清单 4-15\nApplicationContextAware 实现示例\n\
  ```\n\n到目前为止，这段代码的大部分内容您应该已经熟悉。`ApplicationContextAware` 接口定义了一个单一方法 `setApplicationContext(ApplicationContext)`，Spring\
  \ 会调用该方法，将 `ApplicationContext` 的引用传递给您的 Bean。在上面的代码片段中，`ShutdownHookBean` 类检查 `ApplicationContext`\
  \ 是否为 `GenericApplicationContext` 类型，这意味着它支持 `registerShutdownHook()` 方法；如果是，它将向\
  \ `ApplicationContext` 注册一个关闭钩子。代码清单 4-16 展示了如何配置此 Bean 以使其与上一节中引入的 `FileManager`\
  \ Bean 协同工作。\n\n```\npackage com.apress.prospring6.four.aware;\n// 其他导入语句已省略\n@ComponentScan\n\
  class AwareConfig {\n@Bean\nFileManager fileManager() {\nreturn new FileManager();\n\
  }\n@Bean\nShutdownHookBean shutdownHookBean() {\nreturn new ShutdownHookBean();\n\
  }\n}\npublic class AwareDemo {\npublic static void main(String... args) {\nnew AnnotationConfigApplicationContext(AwareConfig.class);\n\
  }\n}\n代码清单 4-16\nApplicationContextAware Bean 配置及基于此配置启动 Spring 应用程序的代码\n```\n\n\
  请注意，不需要特殊的配置。构建 Spring 应用程序的代码也很简单，正如新的 `AwareDemo` 类所示。不再需要调用 `ctx.registerShutdownHook()`，因为这项工作已由\
  \ `ShutdownHookBean` 完成。运行上述示例将生成一个控制台输出，其结尾为：\n\n```\nINFO : FileManager - Calling\
  \ preDestroy() on bean of type class com.apress.prospring6.four.aware.FileManager\n\
  ```\n\n即使没有调用 `ctx.registerShutdownHook()` 或 `ctx.close()`（后者会关闭应用程序上下文并移除钩子），`preDestroy()`\
  \ 方法也会在应用程序关闭之前被调用，因为 `ShutdownHookBean.setApplicationContext(ApplicationContext\
  \ ctx)` 方法执行了关闭钩子的注册。\n\n\n\n## 使用 `FactoryBeans`\n\n使用 Spring 时，你会遇到的一个问题是如何创建并注入那些无法简单通过\
  \ `new` 操作符创建的依赖。为了解决这个问题，Spring 提供了 `FactoryBean` 接口，它充当了那些无法使用标准 Spring 语义创建和管理的对象的适配器。通常，你会使用\
  \ `FactoryBean` 的实现来创建那些无法通过 `new` 操作符创建的 Bean，例如通过静态工厂方法访问的对象，尽管情况并非总是如此。简单来说，`FactoryBean`\
  \ 是一个充当其他 Bean 工厂的 Bean。`FactoryBeans` 像普通 Bean 一样在你的 `ApplicationContext` 中进行配置，但当\
  \ Spring 使用 `FactoryBean` 接口来满足依赖或查找请求时，它不会返回 `FactoryBean` 本身；相反，它会调用 `FactoryBean.getObject()`\
  \ 方法并返回该调用的结果。\n\n![](img/315511_6_En_4_Figh_HTML.jpg)一个关键词提示。 Spring 会自动调用 `getObject()`\
  \ 方法；手动调用该方法是一种不好的实践。\n\n`FactoryBeans` 在 Spring 中得到了广泛应用；最显著的用途包括创建事务代理（我们将在**第**\
  \ **9** **章**中介绍）以及从 JNDI 上下文中自动检索资源。然而，`FactoryBeans` 不仅对构建 Spring 内部机制有用；在构建你自己的应用程序时，你会发现它们非常有用，因为它们允许你通过\
  \ IoC 管理比原本可能更多的资源。\n\n### `FactoryBean` 示例：`MessageDigestFactoryBean`\n\n我们参与的项目通常需要某种加密处理；这通常涉及生成用户密码的消息摘要或哈希值，以便存储在数据库中。在\
  \ Java 中，`MessageDigest` 类提供了为任意数据创建摘要的功能。`MessageDigest` 本身是抽象的，你需要通过调用 `MessageDigest.getInstance()`\
  \ 并传入你想要使用的摘要算法名称来获取具体的实现。例如，如果我们想使用 MD5 算法创建摘要，我们会使用以下代码来创建 `MessageDigest` 实例：\n\
  \n```\nMessageDigest md5 = MessageDigest.getInstance(\"MD5\");\n```\n\n如果我们想使用 Spring\
  \ 来管理 `MessageDigest` 对象的创建，在没有 `FactoryBean` 的情况下，我们能做的最好的办法是在我们的 Bean 上设置一个名为\
  \ `algorithmName` 的属性，然后使用初始化回调来调用 `MessageDigest.getInstance()`。使用 `FactoryBean`，我们可以将此逻辑封装在一个\
  \ Bean 内部。然后，任何需要 `MessageDigest` 实例的 Bean 都可以简单地声明一个 `messageDigest` 属性，并使用 `FactoryBean`\
  \ 来获取该实例。清单 4-17 展示了实现此功能的 `FactoryBean` 代码。\n\n```\npackage com.apress.prospring6.four.factory;\n\
  import org.springframework.beans.factory.FactoryBean;\nimport java.security.MessageDigest;\n\
  // 其他导入语句已省略\npublic class MessageDigestFactoryBean implements FactoryBean, InitializingBean\
  \ {\nprivate String algorithmName = \"MD5\";\nprivate MessageDigest messageDigest\
  \ = null;\n@Override /** @Implements {@link FactoryBean#getObject()} */\npublic\
  \ MessageDigest getObject() throws Exception {\nreturn messageDigest;\n}\n@Override\
  \ /** @Implements {@link FactoryBean#getObjectType()} */\npublic Class getObjectType()\
  \ {\nreturn MessageDigest.class;\n}\n@Override /** @Implements {@link FactoryBean#isSingleton()}\
  \ */\npublic boolean isSingleton() {\nreturn true;\n}\n@Override /** @Implements\
  \ {@link InitializingBean#afterPropertiesSet()} */\npublic void afterPropertiesSet()\
  \ throws Exception {\nmessageDigest = MessageDigest.getInstance(algorithmName);\n\
  }\npublic void setAlgorithmName(String algorithmName) {\nthis.algorithmName = algorithmName;\n\
  }\n}\n清单 4-17\nMessageDigestFactoryBean 实现\n```\n\nSpring 调用 `getObject()` 方法来检索由\
  \ `FactoryBean` 创建的对象。这是实际传递给其他将 `FactoryBean` 作为协作者使用的 Bean 的对象。`MessageDigestFactoryBean`\
  \ 传递的是在 `InitializingBean.afterPropertiesSet()` 回调中创建的已存储 `MessageDigest` 实例的一个克隆。\n\
  \n`getObjectType()` 方法允许你告诉 Spring 你的 `FactoryBean` 将返回什么类型的对象。如果返回类型事先未知（例如，`FactoryBean`\
  \ 根据配置创建不同类型的对象，这只有在 `FactoryBean` 初始化后才能确定），则可以返回 `null`；但如果你指定了类型，Spring 可以将其用于自动装配目的。我们返回\
  \ `MessageDigest` 作为我们的类型（在本例中是一个类，但尽量返回接口类型，并让 `FactoryBean` 实例化具体的实现类，除非必要）。原因是我们不知道会返回什么具体类型（这并不重要，因为所有\
  \ Bean 无论如何都会通过使用 `MessageDigest` 来定义它们的依赖关系）。\n\n\n\n`isSingleton()` 属性允许你告知 Spring\
  \ 该 `FactoryBean` 是否管理一个单例实例。请记住，通过在 `FactoryBean` 的定义上使用 `@Scope(scopeName = \"\
  singleton\")` 注解，你告知 Spring 的是 `FactoryBean` 本身的单例状态，而不是它返回的对象。现在，让我们看看 `FactoryBean`\
  \ 在应用程序中是如何使用的。在代码清单 4-18 中，你可以看到一个简单的 bean，它维护了两个 `MessageDigest` 实例，然后显示传递给其 `digest()`\
  \ 方法的消息的摘要。\n\n```\npackage com.apress.prospring6.four.factory;\nimport java.security.MessageDigest;\n\
  public class MessageDigester {\nprivate static Logger logger = LoggerFactory.getLogger(MessageDigester.class);\n\
  private MessageDigest digest1;\nprivate MessageDigest digest2;\npublic void setDigest1(MessageDigest\
  \ digest1) {\nthis.digest1 = digest1;\n}\npublic void setDigest2(MessageDigest digest2)\
  \ {\nthis.digest2 = digest2;\n}\npublic void digest(String msg) {\nlogger.info(\"\
  Using digest1\");\ndigest(msg, digest1);\nlogger.info(\"Using digest2\");\ndigest(msg,\
  \ digest2);\n}\nprivate void digest(String msg, MessageDigest digest) {\nlogger.info(\"\
  Using algorithm: \" + digest.getAlgorithm());\ndigest.reset();\nbyte[] bytes = msg.getBytes();\n\
  byte[] out = digest.digest(bytes);\n// we are printing the actual byte values\n\
  logger.info(\"Original Message: {} \", bytes);\nlogger.info(\"Encrypted Message:\
  \ {} \", out);\n}\n}\n代码清单 4-18\n维护两个 MessageDigest 实例的简单 Bean\n```\n\n代码清单 4-19\
  \ 中的代码片段展示了两个 `MessageDigestFactoryBean` 类的配置示例，一个用于 SHA1 算法，另一个使用默认（MD5）算法。同一清单还展示了\
  \ `FactoryBeanDemo` 类，该类从 `BeanFactory` 中检索 `MessageDigester` bean，并创建一条简单消息的摘要。\n\
  \n```\npackage com.apress.prospring6.four.factory;\n// import statements omitted\n\
  @Configuration\n@ComponentScan\nclass MessageDigestConfig {\n@Bean\npublic MessageDigestFactoryBean\
  \ shaDigest(){\nMessageDigestFactoryBean shaDigest =  new MessageDigestFactoryBean();\n\
  shaDigest.setAlgorithmName(\"SHA1\");\nreturn shaDigest;\n}\n@Bean\npublic MessageDigestFactoryBean\
  \ defaultDigest(){\nreturn  new MessageDigestFactoryBean();\n}\n@Bean\npublic MessageDigester\
  \ digester() throws Exception {\nMessageDigester messageDigester = new MessageDigester();\n\
  messageDigester.setDigest1(shaDigest().getObject());\nmessageDigester.setDigest2(defaultDigest().getObject());\n\
  return messageDigester;\n}\n}\npublic class FactoryBeanDemo {\npublic static void\
  \ main(String... args) {\nvar ctx = new AnnotationConfigApplicationContext(MessageDigestConfig.class);\n\
  MessageDigester digester = ctx.getBean(\"digester\", MessageDigester.class);\ndigester.digest(\"\
  Hello World!\");\nctx.close();\n}\n}\n代码清单 4-19\nMessageDigestFactoryBean 的简单配置以及用于引导\
  \ Spring 应用程序进行测试的代码\n```\n\n如你所见，我们不仅配置了两个 `MessageDigestFactoryBean` 类，还使用这两个\
  \ `MessageDigestFactoryBean` 类配置了一个 `MessageDigester`，为 `digest1` 和 `digest2` 属性提供值。对于\
  \ `defaultDigest` bean，由于未指定 `algorithmName` 属性，因此不会发生注入，将使用类中编码的默认算法（MD5）。在代码清单\
  \ 4-20 中，你可以看到运行代码清单 4-19 中的代码所产生的控制台日志。\n\n```\nINFO : MessageDigester - Using\
  \ digest1\nINFO : MessageDigester - Using algorithm: SHA1\nINFO : MessageDigester\
  \ - Original Message: [72, 101, 108, 108, 111, 32, 87, 111, 114, 108, 100, 33]\n\
  INFO : MessageDigester - Encrypted Message: [46, -9, -67, -26, 8, -50, 84, 4, -23,\
  \ 125, 95, 4, 47, -107, -8, -97, 28, 35, 40, 113]\nINFO : MessageDigester - Using\
  \ digest2\nINFO : MessageDigester - Using algorithm: MD5\nINFO : MessageDigester\
  \ - Original Message: [72, 101, 108, 108, 111, 32, 87, 111, 114, 108, 100, 33]\n\
  INFO : MessageDigester - Encrypted Message: [-19, 7, 98, -121, 83, 46, -122, 54,\
  \ 94, -124, 30, -110, -65, -59, 13, -116]\n代码清单 4-20\n由 MessageDigestConfig 类配置的应用程序生成的简单消息摘要\n\
  ```\n\n我们选择打印数字字节值而不是文本消息，以展示加密在字节级别所做的更改。如你所见，`MessageDigest` bean 被提供了两个 `MessageDigest`\
  \ 实现，即 SHA1 和 MD5，尽管在 `BeanFactory` 中没有配置任何 `MessageDigest` bean。这就是 `FactoryBean`\
  \ 在起作用。\n\n当你处理无法使用 `new` 运算符创建的类时，`FactoryBeans` 是完美的解决方案。如果你使用通过工厂方法创建的对象，并且希望在\
  \ Spring 应用程序中使用这些类，请创建一个 `FactoryBean` 作为适配器，使你的类能够充分利用 Spring 的 IoC 功能。\n\n![](img/315511_6_En_4_Figi_HTML.jpg)一条信息提示。 使用\
  \ `FactoryBeans` 的强大之处在使用 XML 配置时变得显而易见，因为 Spring 会自动将由 `FactoryBean` 生成的对象满足对该\
  \ `FactoryBean` 的任何引用。这使得 `MessageDigester` bean 可以像本书上一版所示的那样进行配置：\n\n### 直接访问\
  \ `FactoryBean`\n\n鉴于 Spring 会自动将由 `FactoryBean` 生成的对象满足对 `FactoryBean<T>` 的任何引用，你可能想知道是否可以直接访问\
  \ `FactoryBean`。答案是*可以*。访问 `FactoryBean` 很简单：在调用 `getBean()` 时，在 bean 名称前加上一个 &\
  \ 符号，如代码清单 4-21 所示。\n\n```\npackage com.apress.prospring6.four.factory;\n// import\
  \ statements omitted\npublic class FactoryBeanDemo {\nprivate static Logger logger\
  \ = LoggerFactory.getLogger(FactoryBeanDemo.class);\npublic static void main(String...\
  \ args) {\nvar ctx = new AnnotationConfigApplicationContext(MessageDigestConfig.class);\n\
  MessageDigestFactoryBean factoryBean = (MessageDigestFactoryBean) ctx.getBean(\"\
  &shaDigest\");\ntry {\nMessageDigest shaDigest = factoryBean.getObject();\nlogger.info(\"\
  Explicit use digest bean: {}\", shaDigest.digest(\"Hello world\".getBytes()));\n\
  } catch (Exception ex) {\nlogger.error(\"Could not find MessageDigestFactoryBean\
  \ \", ex);\n}\nctx.close();\n}\n}\n代码清单 4-21\n直接访问 FactoryBean\n```\n\n这个特性在 Spring\
  \ 代码中的几个地方被使用，但你的应用程序实际上没有理由使用它。`FactoryBean` 旨在用作支持基础设施的一部分，以允许你在 IoC 设置中使用更多应用程序的类。避免直接访问\
  \ `FactoryBean` 并手动调用其 `getObject()` 方法，让 Spring 为你做这件事；如果你手动执行此操作，你是在为自己增加额外的工作，并且不必要地将你的应用程序耦合到一个特定的实现细节上，而这个细节将来很可能会改变。\n\
  \n\n\n## JavaBeans `PropertyEditors`\n\n如果你对 JavaBeans 的概念不完全熟悉，那么 `PropertyEditor`\
  \ 是一个接口，它负责将属性的值从其原生类型表示转换为 `String`，反之亦然。最初，这被设想为一种允许将属性值作为 `String` 值输入到编辑器中，并将其转换为正确类型的方法。然而，由于\
  \ `PropertyEditor` 实现本质上是轻量级类，它们已在许多场景中得到应用，包括 Spring。\n\n由于基于 Spring 的应用程序中很大一部分属性值最初来源于\
  \ `BeanFactory` 配置文件，因此它们本质上都是 `Strings`。但是，设置这些值的属性可能不是 `String` 类型的。因此，为了省去你人为创建大量\
  \ `String` 类型属性的麻烦，Spring 允许你定义 `PropertyEditor` Bean 来管理将基于 `String` 的属性值转换为正确类型的过程。图\
  \ 4-2 展示了作为 Spring 框架一部分的 `PropertyEditor` 实现的完整列表，其中大部分位于 `spring-beans` 包中；你可以使用任何智能\
  \ Java 编辑器查看此列表，但在 IntelliJ 中，你可以通过打开特定接口的源代码，选择其名称，然后按 Ctrl+H（macOS）或 Ctrl+E（Windows）来查看该接口的所有实现。\n\
  \n![](img/315511_6_En_4_Fig2_HTML.jpg)\n\n一张截图展示了属性编辑器实现的完整列表。虚线框中突出显示了两个选项：属性编辑器（property\
  \ editor）和属性编辑器支持（property editor support）。支持选项高亮显示了除字符串编辑器（string editor）、布尔编辑器（Boolean\
  \ editor）和数字编辑器（number editor）之外的整个展开列表。\n\n图 4-2\n\nSpring PropertyEditor 实现\n\n\
  图 4-2 中的列表显示，层次结构的根是 `java.beans.PropertyEditor` 接口。所有 Spring 实现实际上都扩展了 `java.beans.PropertyEditorSupport`\
  \ 类，该类为构建自定义属性编辑器或委托给现有编辑器提供支持。例如，处理将 `String` 字面量隐式转换为要注入到 Bean 中的属性值的 `java.beans.StringEditor`\
  \ 已预先在 `BeanFactory` 中注册，无需额外配置。\n\n### 使用内置的 `PropertyEditors`\n\n清单 4-22 展示了一个简单的\
  \ Bean，它声明了 14 个属性，每个属性对应一种由内置 `PropertyEditor` 实现支持的类型。\n\n```\npackage com.apress.prospring6.four;\n\
  import org.springframework.beans.PropertyEditorRegistrar;\nimport org.springframework.beans.PropertyEditorRegistry;\n\
  import org.springframework.beans.factory.annotation.Value;\nimport org.springframework.beans.propertyeditors.CustomDateEditor;\n\
  import org.springframework.beans.propertyeditors.StringTrimmerEditor;\n// 部分 import\
  \ 语句已省略\n@Component(\"builtInSample\")\npublic class DiverseValuesContainer {\n\
  private byte[] bytes;                 // ByteArrayPropertyEditor\nprivate Character\
  \ character;          //CharacterEditor\nprivate Class cls;                 // ClassEditor\n\
  private Boolean trueOrFalse;          // CustomBooleanEditor\nprivate List stringList;\
  \      // CustomCollectionEditor\nprivate Date date;                    // CustomDateEditor\n\
  private Float floatValue;             // CustomNumberEditor\nprivate File file;\
  \                    // FileEditor\nprivate InputStream stream;           // InputStreamEditor\n\
  private Locale locale;                // LocaleEditor\nprivate Pattern pattern;\
  \              // PatternEditor\nprivate Properties properties;        // PropertiesEditor\n\
  private String trimString;            // StringTrimmerEditor\nprivate URL url; \
  \                     // URLEditor\nprivate static Logger logger = LoggerFactory.getLogger(DiverseValuesContainer.class);\n\
  @Value(\"A\")\npublic void setCharacter(Character character) {\nlogger.info(\"Setting\
  \ character: {}\", character);\nthis.character = character;\n}\n@Value(\"java.lang.String\"\
  )\npublic void setCls(Class cls) {\nlogger.info(\"Setting class: {}\" , cls.getName());\n\
  this.cls = cls;\n}\n@Value(\"#{systemProperties['java.io.tmpdir']}#{systemProperties['file.separator']}test.txt\"\
  )\npublic void setFile(File file) {\nlogger.info(\"Setting file: {}\" , file.getAbsolutePath());\n\
  this.file = file;\n}\n@Value(\"en_US\")\npublic void setLocale(Locale locale) {\n\
  logger.info(\"Setting locale: {}\" , locale.getDisplayName());\nthis.locale = locale;\n\
  }\n@Value(\"name=Ben age=41\")\npublic void setProperties(Properties properties)\
  \ {\nlogger.info(\"Loaded {}\" , properties.size() + \" properties\");\nthis.properties\
  \ = properties;\n}\n@Value(\"https://iuliana-cosmina.com\")\npublic void setUrl(URL\
  \ url) {\nlogger.info(\"Setting URL: {}\" , url.toExternalForm());\nthis.url = url;\n\
  }\n@Value(\"John Mayer\")\npublic void setBytes(byte... bytes) {\nlogger.info(\"\
  Setting bytes: {}\" , Arrays.toString(bytes));\nthis.bytes = bytes;\n}\n@Value(\"\
  true\")\npublic void setTrueOrFalse(Boolean trueOrFalse) {\nlogger.info(\"Setting\
  \ Boolean: {}\" , trueOrFalse);\nthis.trueOrFalse = trueOrFalse;\n}\n@Value(\"#{valuesHolder.stringList}\"\
  )\npublic void setStringList(List stringList) {\nlogger.info(\"Setting stringList\
  \ with: {}\" , stringList);\nthis.stringList = stringList;\n}\n@Value(\"20/08/1981\"\
  )\npublic void setDate(Date date) {\nlogger.info(\"Setting date: {}\" , date);\n\
  this.date = date;\n}\n@Value(\"123.45678\")\npublic void setFloatValue(Float floatValue)\
  \ {\nlogger.info(\"Setting float value: {}\" , floatValue);\nthis.floatValue = floatValue;\n\
  }\n@Value(\"#{valuesHolder.inputStream}\")\npublic void setStream(InputStream stream)\
  \ {\nthis.stream = stream;\nlogger.info(\"Setting stream & reading from it: {}\"\
  \ ,\nnew BufferedReader(new InputStreamReader(stream)).lines().parallel().collect(Collectors.joining(\"\
  \\n\")));\n}\n@Value(\"a*b\")\npublic void setPattern(Pattern pattern) {\nlogger.info(\"\
  Setting pattern: {}\" , pattern);\nthis.pattern = pattern;\n}\n@Value(\"   String\
  \ need trimming   \")\npublic void setTrimString(String trimString) {\nlogger.info(\"\
  Setting trim string: {}\" , trimString);\nthis.trimString = trimString;\n}\npublic\
