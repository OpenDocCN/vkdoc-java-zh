  ```\n\n配置就绪后，当用户成功登录应用程序时，主页将显示用户名和注销选项，如图 17-6 所示。\n\n![](img/315511_6_En_17_Fig6_HTML.jpg)\n\
  \n本地主机主页的截图，其中突出显示了已认证 John 和注销的框。\n\n图 17-6\n\n向已认证用户显示的主页\n\n在我们的配置中，我们定义了两个角色，`USER`\
  \ 和 `ADMIN`，但我们没有将它们用于任何事情，因为目前没有仅针对特定角色的配置。为了展示如何做到这一点，让我们只允许具有 `ADMIN` 权限的用户删除歌手。这意味着我们必须做两件事：\n\
