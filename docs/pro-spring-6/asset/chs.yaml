- "# 7. Spring 与 Hibernate\n\n**第 6 章** 介绍了如何使用 JDBC 驱动程序与 SQL 数据库通信。然而，尽管 Spring\
  \ 在简化 JDBC 开发方面取得了很大进展，但仍需编写大量代码。为了避免这种情况，并为更简便的查询提供支持，持久化框架应运而生，例如 MyBatis^(⁵⁶)\
  \ 和 Hibernate^(⁵⁷)。jOOQ^(⁵⁸) 是最新出现的库之一，它是一个数据库映射软件库，能够根据你的数据库生成 Java 代码，并让你通过其流畅的\
  \ API 构建类型安全的 SQL 查询。一些用户报告称，将 jOOQ 与 Hibernate 结合使用体验良好，让 Hibernate 处理繁琐的 CRUD\
  \ 工作，而 jOOQ 则通过其复杂且直观的查询 DSL 处理复杂的查询和报表。本章主要关注 Hibernate，这是最常用的对象关系映射（ORM）库之一，但鉴于其潜力，也会介绍\
  \ jOOQ。在**第 6 章**中，将使用 Java 与数据库协作比作《我爱露西》中的“终于到巴黎”一集，其中需要三位翻译来解决误会。如果说 JDBC 是第一位翻译，那么\
  \ Hibernate 就是第二位。\n\n如果你有使用 EJB 实体 Bean（在 EJB 3.0 之前）开发数据访问应用程序的经验，你可能会记得那痛苦的过程。繁琐的映射配置、事务划分以及每个\
  \ Bean 中用于管理其生命周期的样板代码，大大降低了开发企业级 Java 应用程序的生产力。正如 Spring 是为了拥抱基于 POJO 的开发方式和声明式配置管理，而非\
  \ EJB 的笨重设置而开发的一样，开发者社区意识到，一个更简单、轻量级且基于 POJO 的框架可以简化数据访问逻辑的开发。自那时起，出现了许多库；它们通常被称为\
  \ ORM 库。ORM 库的主要目标是弥合关系数据库管理系统（RDBMS）中的关系数据结构与 Java 中的面向对象（OO）模型之间的差距，以便开发者可以专注于使用对象模型进行编程，同时轻松执行与持久化相关的操作。\n\
  \n在开源社区可用的众多 ORM 库中，Hibernate 是最成功的之一。其特性，如基于 POJO 的方法、易于开发以及对复杂关系定义的支持，赢得了主流 Java\
  \ 开发者社区的青睐。Hibernate 的流行也影响了 Java 社区流程（JCP），该流程制定了 Java 数据对象（JDO）规范，作为 Java EE 中的标准\
  \ ORM 技术之一。从 EJB 3.0 开始，EJB 实体 Bean 甚至被 Java 持久化 API（JPA）所取代。JPA 的许多概念都受到了流行的 ORM\
  \ 库（如 Hibernate、TopLink 和 JDO）的影响。Hibernate 和 JPA 之间的关系也非常密切。Hibernate 的创始人 Gavin\
  \ King 代表 JBoss 作为 JCP 专家组成员之一参与了 JPA 规范的制定。从 3.2 版本开始，Hibernate 提供了 JPA 的实现。这意味着当你使用\
  \ Hibernate 开发应用程序时，你可以选择使用 Hibernate 自己的 API，或者使用以 Hibernate 作为持久化服务提供者的 JPA API。\n\
  \n在简要介绍了 Hibernate 的历史之后，本章将介绍在开发数据访问逻辑时如何将 Spring 与 Hibernate 结合使用。Hibernate 是一个如此庞大的\
  \ ORM 库，仅用一章来涵盖其所有方面是不可能的，并且有大量书籍专门讨论 Hibernate。\n\n本章涵盖了 Hibernate 在 Spring 中的基本思想和主要用例。具体来说，我们将讨论以下主题：\n\
  \n*   *配置 Hibernate* `SessionFactory`：Hibernate 的核心概念围绕 `Session` 接口展开，该接口由 `SessionFactory`\
