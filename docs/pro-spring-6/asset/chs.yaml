  ## 本章小结


  在本章中，我们介绍了 Spring 的类型转换系统以及字段格式化 SPI。你了解了除了 `PropertyEditors` 支持之外，新的类型转换系统如何用于任意类型转换。


  我们还介绍了 Spring 中的验证支持、Spring 的 `Validator` 接口，以及 Spring 中推荐的 JSR-349/Jakarta Bean
  Validation 支持。由于存在 Spring Boot Validation 启动器库，因此在 Spring Boot 部分也提到了它。


  本章的要点很简单：你可以在 Spring 应用中通过多种方式实现和配置转换、格式化和验证。


