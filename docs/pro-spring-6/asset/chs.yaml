  \ () -> restTemplate.exchange(req, HttpStatus.class));\n}\n}\n清单 15-15\n测试 Singer2Controller#findSingerById(..)\
  \ 方法\n```\n\n如前所述，`RestTemplate#exchange(..)` 交换方法非常强大。在 `testPositiveFindById()`\
  \ 测试方法中，调用了需要 `RequestEntity<T>` 和返回对象类型作为参数的方法版本。`RequestEntity<T>` 类型是 `HttpEntity<T>`\
  \ 的扩展，它公开了 HTTP 方法和目标 URL。纯粹为了演示，请求的资源表示形式是 JSON，但 `RestTemplate` 足够智能，可以将其转换回 `Singer`，以便对返回的对象执行断言。\n\
  \n在 `testNegativeFindById()` 测试方法中，请注意，我们没有检查 `RequestEntity<T>`，而是检查是否抛出了 `org.springframework.web.client.HttpClientErrorException.NotFound`\
  \ 异常。这是因为在底层，一个错误处理器通过抛出此类异常来处理带有 `404 (Not Found)` 的响应。这种处理方式也适用于除成功响应之外的其他 HTTP\
  \ 状态码对应的响应，并且这些异常类型都扩展自 `org.springframework.web.client.HttpClientErrorException`。\n\
  \n`Singer2Controller` 中的其余方法如清单 15-16 所示。\n\n\n\n```\npackage com.apress.prospring6.fifteen.controllers;\n\
