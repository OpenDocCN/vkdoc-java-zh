  Blogger 类的自定义验证器

  ```


  验证器类实现了 `Validator` 接口并实现了两个方法。`supports(..)` 方法指示验证器是否支持对传入类类型的验证。`validate(..)`
  方法对传入的对象执行验证。结果将存储在 `org.springframework.validation.Errors` 接口的实例中。在 `validate(..)`
  方法中，我们仅对 `firstName` 属性执行检查，并使用便捷的 `ValidationUtils.rejectIfEmpty(..)` 方法来确保博客作者的名字不为空。最后一个参数是错误代码，可用于从资源包中查找验证消息以显示本地化的错误消息。


