  SingerController 实现

  ```


  关于上述类，要点如下：


  *   该类使用 `@Controller` 注解，表明它是一个 Spring MVC 控制器。


  *   类级别的 `@RequestMapping``(value="/singer")` 注解表明该控制器将映射到主 Web 上下文下的所有 URL。在本示例中，`http://localhost:8080/singer`
  下的所有 URL 都将由此控制器处理。


  *   该控制器需要 `SingerRepo` 才能工作。


  *   每个方法上的 `@RequestMapping` 注解指明了其将映射到的 URL 模式和对应的 HTTP 方法。例如，`all()` 方法将映射到 `http://localhost:8080/singer`
  URL，并使用 HTTP `GET` 方法。对于 `update(..)` 方法，它将映射到 URL `http://localhost:8080/singer/1`，并使用
  HTTP `PUT` 方法。


  *   该控制器与**第** **14** **章**中介绍的控制器有何不同？是什么让一个控制器适合处理 REST 请求？有两点：每个处理方法上都放置了 `@ResponseBody`
  注解，以及处理方法不返回逻辑视图名称，因为没有视图，方法返回的是实际数据。`@ResponseBody` 注解表明方法返回值应绑定到 Web 响应体，这是一种花哨的技术说法，即方法返回的值就是实际的
  Web 响应。如果觉得在每个方法上都标注 `@ResponseBody` 显得冗长，你可以通过在类级别使用一次该注解来轻松省略，但这意味着控制器中没有方法预期会返回视图或视图名称。


  *   对于接受路径变量的方法（例如 `findSingerById(..)` 方法），路径变量使用 `@PathVariable` 注解。这指示 Spring
  MVC 将 URL 中的路径变量（例如 `http://localhost:8080/singer/1`）绑定到 `findSingerById(..)` 方法的
  `id` 参数。请注意，`id` 参数的类型是 `Long`，Spring 的类型转换系统会自动为我们处理从 `String` 到 `Long` 的转换。


  *   对于 `create(..)` 和 `update(..)` 方法，`Singer` 参数使用 `@RequestBody` 注解。这指示 Spring
  自动将 HTTP 请求体中的内容绑定到 `Singer` 领域对象。转换将由声明的 `HttpMessageConverter<Object>` 接口（位于 `org.springframework.http.converter`
  包下）的实例完成，以支持各种格式，这将在本章后面讨论。


  Spring 4.3 版本引入了一些 `@RequestMapping` 注解的定制化，以匹配基本的 HTTP 方法。表 15-2 列出了新注解与旧式 `@RequestMapping`
  之间的等价关系。


  表 15-2

  Spring 4.3 中引入的用于将 HTTP 方法请求映射到特定处理方法的注解


  | 注解 | 旧式等价写法 |

  | --- | --- |

  | `@GetMapping` | `@RequestMapping(method = RequestMethod.GET)` |

  | `@PostMapping` | `@RequestMapping(method = RequestMethod.POST)` |

  | `@PutMapping` | `@RequestMapping(method = RequestMethod.PUT)` |

  | `@DeleteMapping` | `@RequestMapping(method = RequestMethod.DELETE)` |


  Spring 4.0 中还为 REST 控制器类引入了另一个定型注解，称为 `@RestController`。该注解同样声明在 `org.springframework.web.bind.annotation`
  包中，并且是元注解了 `@Controller` 和 `@ResponseBody`，这基本上赋予了它两者的能力。使用此注解以及表 15-2 中的注解，`SingerController`
  类变得更加简洁，如代码清单 15-3 所示。


