  库一部分的消息实现，但在 Spring 应用程序中并非必需。


  那么，我们如何添加对不同类型的支持呢？错误消息中有一个提示：由于没有消息转换器，我们需要一个消息转换器。最简单的方法是提供一个转换器，将 `Letter` 转换为
  JSON 文本表示形式，这样 `Sender` 将 `jakarta.jms.TextMessage` 写入队列，并将 JSON 表示形式转换为 `Letter`，以便
  `Receiver` 可以读取它。由于我们在 Spring 上下文中工作，最合适的方法是声明一个执行此操作的 Bean，并且由于这是一个 Spring Boot
  应用程序，该 Bean 将在需要时自动使用。JMS 转换器 Bean 如清单 13-21 所示，并使用 Jackson 库进行配置。


  ```

  package com.apress.prospring6.thirteen;

  import com.fasterxml.jackson.databind.json.JsonMapper;

  import com.fasterxml.jackson.datatype.jsr310.JavaTimeModule;

  import org.springframework.jms.support.converter.MappingJackson2MessageConverter;

  import org.springframework.jms.support.converter.MessageConverter;

  import org.springframework.jms.support.converter.MessageType;

  //其他导入语句已省略

  @SpringBootApplication

  @Slf4j

  public class ArtemisApplication {

  @Bean

  public MessageConverter messageConverter() {

  var converter = new MappingJackson2MessageConverter();

  converter.setTargetType(MessageType.TEXT); // (1)

  converter.setTypeIdPropertyName("_type"); // (2)

  var mapper = new JsonMapper();

  mapper.registerModule(new JavaTimeModule()); // (3)

  converter.setObjectMapper(mapper);

  return converter;

  }

  // main 方法已省略

  }

  清单 13-21

  JMS 转换器 Bean

  ```


  清单 13-21 中标记了三行，需要它们来配置以下内容：


  *   1\. `converter.setTargetType(MessageType.TEXT)`：指定应通过使用 `MessageType.TEXT` 枚举值调用来将对象编组为
  `TextMessage`。其他可能的值是 `BYTES`、`MAP` 或 `OBJECT`。


  *   2\. `converter.setTypeIdPropertyName("_type")`：指定携带所包含对象类型 ID 的 JMS 消息属性的名称。需要设置此属性，以便能够将传入消息转换为
  Java 对象。


  *   3\. `mapper.registerModule(new JavaTimeModule())`：这是必需的，因为 `Letter` 记录包含一个名为
  `sentOn` 且类型为 `java.time.LocalDate` 的字段。




  在配置中添加这个 Bean 后，应用程序现在可以按预期运行。如果我们运行 `main(..)` 方法并分析控制台，`Sender` 在发送 `Letter` 实例之前打印的日志消息，以及
  `Receiver` 在接收 `Letter` 实例之后打印的日志消息，都会显示在控制台中。清单 13-22 展示了一个示例日志片段。


