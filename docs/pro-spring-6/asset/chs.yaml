  NoOpBeforeAdvice 实现测试类

  ```


  在这段代码中，你可以看到我们测试了三种代理：


  *   标准 CGLIB 代理

  *   具有冻结通知链的 CGLIB 代理（即，当通过调用 `ProxyFactory` 间接扩展的 `ProxyConfig` 类中的 `setFrozen()`
  方法冻结代理时，CGLIB 会执行进一步优化；但是，将不允许进一步更改通知）

  *   JDK 代理


  对于每种代理类型，我们运行以下五个测试用例：


  *   *已通知方法（测试 1）*：这是一个被通知的方法。测试中使用的通知类型是不执行任何处理的前置通知，因此它减少了通知对性能测试的影响。

  *   *未通知方法（测试 2）*：这是代理上未被通知的方法。通常，你的代理有许多方法未被通知。此测试考察不同代理上未通知方法的性能表现。

  *   *`equals()` 方法（测试 3）*：此测试考察调用 `equals()` 方法的开销。当你在 `HashMap<K,V>` 或类似集合中使用代理作为键时，这一点尤其重要。

  *   *`hashCode()` 方法（测试 4）*：与 `equals()` 方法一样，`hashCode()` 方法在使用 HashMap 或类似集合时也很重要。




  *   *在* `Advised` *接口上执行方法（测试 5）*：如前所述，代理默认实现了 `Advised` 接口，允许你在创建后修改代理并查询代理的相关信息。本测试旨在考察使用不同代理类型时，访问
  `Advised` 接口方法的速度。


  表 5-3 展示了这些测试的结果。


  表 5-3


  代理性能测试结果（单位：毫秒）


  | 被测试的方法 | CGLIB（标准模式） | CGLIB（冻结模式） | JDK |

  | --- | --- | --- | --- |

  | `advised()` | 126 | 73 | 159 |

  | `unadvised()` | 127 | 28 | 96 |

  | `equals()` | 20 | 16 | 122 |

  | `hashCode()` | 28 | 20 | 33 |

  | `Advised.getProxyTargetClass()` | 13 | 8 | 81 |


  如你所见，对于 `advised()` 和 `unadvised()` 方法，标准 CGLIB 与 JDK 动态代理之间的性能差异不大。一如既往，这些数值会因硬件和所使用的
  JDK 而异。


  然而，当你使用带有冻结通知链的 CGLIB 代理时，会存在显著差异。`equals()` 和 `hashCode()` 方法的情况类似，使用 CGLIB 代理时它们明显更快。对于
  `Advised` 接口上的方法，你会注意到它们在 CGLIB 冻结代理上也更快。原因是 `Advised` 方法在 `intercept()` 方法中较早被处理，因此它们避免了其他方法所需的大部分逻辑。


