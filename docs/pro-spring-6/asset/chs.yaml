  ### 使用 `AssertTrue` 进行自定义验证


  除了实现自定义验证器之外，使用 Bean Validation API 进行自定义验证的另一种方法是使用 `@AssertTrue` 注解。为了在 `Singer`
  类中使用此注解，应移除 `@CheckCountrySinger` 注解，并在 `isCountrySinger()` 方法上添加 `@AssertTrue`
  注解。此外，`CountrySingerValidator.isValid(..)` 方法中的验证逻辑也应移至 `isCountrySinger()` 方法体内。我们希望保持
  `Singer` 类不变，以避免验证 bean 之间产生不必要的交互。因此，我们创建了一个名为 `SingerTwo` 的副本类，并应用了这些更改，同时在配置中添加了一个针对此类实例的验证器，名为
  `SingerTwoValidationService`。


  在清单 11-32 中，你可以看到包含 `isCountrySinger()` 方法的 `SingerTwo` 类。`SingerTwoValidationService`
  与 `SingerValidationService` 几乎相同，唯一的区别在于其操作的领域对象类型。


  ```

  package com.apress.prospring6.eleven.domain;

  import jakarta.validation.constraints.AssertTrue;

  // 其他导入语句已省略

  public class SingerTwo {

  @NotNull

  @Size(min=2, max=60)

  private String firstName;

  private String lastName;

  @NotNull

  private Singer.Genre genre;

  private Singer.Gender gender;

  @AssertTrue(message="错误！个人歌手应定义性别和姓氏")

  public boolean isCountrySinger() {

  return genre == null || (!genre.equals(Singer.Genre.COUNTRY) ||

  (gender != null && lastName != null));

  }

