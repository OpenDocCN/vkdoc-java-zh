  #### 插入数据并检索生成的主键


  插入数据同样通过扩展 `SqlUpdate` 来实现。


  其中一个有趣的点是主键（通常是 `ID` 列）是如何生成的。该值仅在 insert 语句完成后才可用；这是因为 RDBMS 在插入时为记录生成了标识值。`ID`
  列使用 `AUTO_INCREMENT` 属性声明，并且是主键，该值将在插入操作期间由 RDBMS 分配。如果您使用的是 Oracle，您可能需要先从 Oracle
  序列中获取一个唯一的 `ID`，然后使用查询结果执行 insert 语句。


  在旧版本的 JDBC 中，该方法有些棘手。例如，如果我们使用 MariaDB，我们需要执行 SQL `select last_insert_id()` 函数。对于
  Microsoft SQL Server，我们执行 `select @@IDENTITY` 语句。幸运的是，从 JDBC 3.0 版本开始，增加了一项新功能，允许以统一的方式检索
  RDBMS 生成的键。清单 6-43 展示了 `insert()` 方法的实现，该方法还会检索插入的联系人记录所生成的主键。它适用于大多数（如果不是全部）数据库；只需确保您使用的是与
  JDBC 3.0 或更新版本兼容的 JDBC 驱动程序。我们首先为插入操作创建 `InsertSinger` 类，它扩展了 `SqlUpdate` 类。代码如清单
  6-43 所示。


  ```

  package com.apress.prospring6.six.repo;

  import org.springframework.jdbc.object.SqlUpdate;

  import java.sql.Types;

  // import 语句已省略

  public class InsertSinger extends SqlUpdate {

  public static final String INSERT_SINGER = "insert into singer (first_name, last_name,
  birth_date) " +

  " values (:first_name, :last_name, :birth_date)";

  public InsertSinger(DataSource dataSource) {

  super(dataSource, INSERT_SINGER);

  super.declareParameter(new SqlParameter("first_name", Types.VARCHAR));

  super.declareParameter(new SqlParameter("last_name", Types.VARCHAR));

  super.declareParameter(new SqlParameter("birth_date", Types.DATE));

  super.setGeneratedKeysColumnNames("id");

  super.setReturnGeneratedKeys(true);

  }

  }

