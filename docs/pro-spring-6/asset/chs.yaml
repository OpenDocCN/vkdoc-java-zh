  以下是关于此类的主要观察：


  *   注意清单 16-39 开头 `@Value(value = "\${local.server.port}") val port: Int)` 中的 `\$`
  语法。如本节开头所述，Kotlin 支持字符串模板表达式。模板表达式以 `$`（美元符号）开头，但对 Spring 环境变量的引用也是如此，因此在 Kotlin
  中，当在 `@Value` 注解中引用环境变量进行注入时，例如，美元符号需要通过在其前面加上 `\`（反斜杠）进行转义。


  *   Kotlin 中没有 `static`。不支持 Java 风格的静态，以鼓励更好的编码实践。由于 `@BeforeAll` 和 `@AfterAll`
  注解需要放在静态方法上，解决方案是为 `KotlinApplicationTest` 声明一个 `companion` 对象，将函数放在那里，并用 `@JvmStatic`
  注解它们。此注解指定如果元素是一个函数，则需要从中生成一个额外的静态方法。


  *   由于 Kotlin 中没有 `static`，因此没有静态导入，因此需要像这样调用断言：`Assertions.assert*(..)`。


  同样在 Kotlin 中，如果类、函数和变量名声明在反引号 ``` `` ``` 之间，则可以包含空格。有时这很有用，但不要滥用它，因为它可能会使代码可读性降低。


  ## 总结


  GraalVM Native Images 是一项不断发展的技术，并非所有库都提供支持。Spring Native 支持在 Spring Boot 3 之前一直是实验性的。Maven
  Daemon (`mvnd`)^(¹⁶⁷) 是一个很好的例子，说明了原生可执行文件与在 JVM 上运行的应用程序相比有多快。它也是所涉及的限制和约束的一个很好的例子，因为设计用于
  `mvnd` 构建的 Maven 项目必须仔细配置，以便模块可以并行构建。对于具有少量模块的小型项目，与标准 Maven 相比，`mvnd` 可以提供 7 到
  10 倍或更多的加速。对于具有许多模块的大型项目，`mvnd` 可以提供 3 到 5 倍或更多的加速，因为它能够并行构建模块以及 JIT 编译器提供的优化。


  Spring 对 GraphQL 的采用清楚地表明 GraphQL 将会持续存在。GraphQL 中有一个操作未在本章中介绍：*订阅*。有时客户端可能希望在它们关心的数据发生变化时从服务器接收更新。订阅是提供此功能的操作。另一个未涉及的主题是在像
  Netty 这样的响应式服务器上的 GraphQL。在使用 GraphQL 的 Spring Boot 响应式应用程序中，可以使用 `org.springframework.graphql.test.tester.GraphQlTester.`^(¹⁶⁸)
  进行测试。


  Kotlin 的开发考虑到了其他语言中缺失或实现不佳的其他方面。经验丰富的开发人员可能会在其语法中识别出 Closure 或 Python 的灵感，但主要是 Scala
  和 Java。它是一种现代且易于学习的语言，拥有出色的开发团队和围绕它的优秀社区。对于 Kotlin 为将代码转换为可在 JVM 上运行的字节码所做的黑魔法，存在安全性和性能方面的担忧，并且与行业中已建立的
  Java 框架交互所需的额外配置也有成本。Kotlin 是未来吗？Spring 采用它这一事实可能再次表明这是开发人员想要的。


