- '# 5. Spring AOP


  除了依赖注入（DI）之外，Spring 框架提供的另一个核心功能是对面向切面编程（AOP）的支持。AOP 通常被称为实现横切关注点的工具。术语*横切关注点*指的是应用程序中无法与其余部分解耦的逻辑，这可能导致代码重复和紧密耦合。通过使用
  AOP 将各个逻辑片段（称为*关注点*）模块化，你可以将它们应用到应用程序的许多部分，而无需重复代码或创建硬依赖关系。日志记录和安全性是许多应用程序中存在的横切关注点的典型示例。考虑一个为调试目的而记录每个方法开始和结束的应用程序。你可能会将日志记录代码重构到一个专门的类中，但仍然需要在应用程序中为每个方法调用两次该类上的方法才能执行日志记录。使用
  AOP，你可以简单地指定希望在应用程序中每个方法调用之前和之后调用日志记录类上的方法。


  理解 AOP 是面向对象编程（OOP）的补充，而非与其竞争，这一点很重要。OOP 非常擅长解决我们作为程序员遇到的多种多样的问题。然而，如果你再次审视日志记录示例，就会清楚地看到
  OOP 在大规模实现横切逻辑方面的不足。鉴于 AOP 是在 OOP 之上运行的，单独使用 AOP 来开发整个应用程序几乎是不可能的。同样，虽然完全可以使用 OOP
  开发整个应用程序，但通过使用 AOP 来解决某些涉及横切逻辑的问题，你可以更聪明地工作。


  AOP 框架是 Spring 的核心组件之一，没有它，诸如事务数据管理和安全性等重要功能将无法实现。


  本章涵盖以下主题：


  *   *AOP 基础*：在讨论 Spring 的 AOP 实现之前，我们先介绍 AOP 作为一项技术的基础知识。“AOP 概念”部分涵盖的大多数概念并非 Spring
  特有，在任何 AOP 实现中都能找到。如果你已经熟悉其他 AOP 实现，可以跳过“AOP 概念”部分。


  *   *AOP 的类型*：AOP 有两种不同的类型：静态和动态。在静态 AOP 中（例如 AspectJ 的^(³⁷)编译时织入机制所提供的），横切逻辑在编译时被应用到你的代码中，如果不修改代码并重新编译，就无法更改它。使用动态
  AOP（例如 Spring AOP），横切逻辑在运行时动态应用。这允许你对 AOP 配置进行更改，而无需重新编译应用程序。这两种 AOP 类型是互补的，当一起使用时，它们会形成一种强大的组合，你可以在应用程序中使用。


  *   *Spring AOP 架构*：Spring AOP 只是其他实现（如 AspectJ）中完整 AOP 功能集的一个子集。在本章中，我们将从高层次审视
  Spring 中提供了哪些功能，它们是如何实现的，以及为什么某些功能被排除在 Spring 实现之外。


  *   *Spring AOP 中的代理*：代理是 Spring AOP 工作原理的重要组成部分，你必须理解它们才能充分利用 Spring AOP。在本章中，我们将介绍两种代理：JDK
  动态代理和 CGLIB 代理。我们将探讨 Spring 在不同场景下使用每种代理的情况、两种代理类型的性能，以及在应用程序中应遵循的一些简单指南，以便从 Spring
  AOP 中获得最大收益。


  *   *使用 Spring AOP*：在本章中，我们将提供一些 AOP 使用的实际示例。我们从一个简单的示例开始，让你轻松进入 Spring 的 AOP 代码，然后详细描述
  Spring 中可用的 AOP 功能，并附有示例。


  *   *切入点的高级使用*：我们将探讨 `ComposablePointcut` 和 `ControlFlowPointcut` 类、引入（introductions）以及在应用程序中使用切入点时应采用的适当技术。


  *   *AOP 框架服务*：Spring 框架完全支持透明且声明式地配置 AOP。我们将介绍两种方法（`ProxyFactoryBean` 类和 @AspectJ
  风格的注解），以将声明式定义的 AOP 代理作为协作者注入到你的应用程序对象中，从而使你的应用程序完全不知道它正在与通知（advised）对象一起工作。


  *   *集成 AspectJ*：AspectJ 是一个功能完备的 AOP 实现。AspectJ 与 Spring AOP 的主要区别在于，AspectJ 通过织入（编译时或加载时织入）将通知（advice）应用到目标对象，而
  Spring AOP 基于代理。AspectJ 的功能集比 Spring AOP 强大得多，但使用起来也比 Spring 复杂得多。当你发现 Spring AOP
  缺少你需要的功能时，AspectJ 是一个很好的解决方案。


  ## AOP 概念


  与大多数技术一样，AOP 有其自己特定的概念和术语，理解它们的含义很重要。以下是 AOP 的核心概念：


  *   *连接点（Joinpoints）*：连接点是应用程序执行过程中一个明确定义的点。连接点的典型示例包括对方法的调用、方法调用本身、类初始化和对象实例化。连接点定义了应用程序中可以使用
  AOP 插入额外逻辑的点。


  *   *通知（Advice）*：在特定连接点执行的代码就是通知，由类中的一个方法定义。通知有多种类型，例如*前置通知（before）*，它在连接点之前执行；以及*后置通知（after）*，它在连接点之后执行。


  *   *切入点（Pointcuts）*：切入点是你用来定义何时应执行通知的连接点集合。通过创建切入点，你可以对如何将通知应用于应用程序中的组件进行细粒度控制。如前所述，一个典型的连接点是一个方法调用，或者特定类中所有方法调用的集合。通常，你可以通过复杂的关系组合切入点，以进一步约束通知的执行时机。


  *   *切面（Aspects）*：切面是封装在类中的通知和切入点的组合。这种组合定义了应包含在应用程序中的逻辑以及它应在何处执行。


  *   *织入（Weaving）*：这是在适当位置将切面插入应用程序代码的过程。对于编译时 AOP 解决方案，这种织入通常在构建时完成。同样，对于运行时 AOP
  解决方案，织入过程在运行时动态执行。AspectJ 支持另一种称为*加载时织入（LTW）*的织入机制，它会拦截底层 JVM 类加载器，并在字节码被类加载器加载时提供织入。


  *   *目标（Target）*：其执行流程被 AOP 过程修改的对象称为目标对象。你经常会看到目标对象被称为*通知对象（advised object）*。


  *   *引入（Introduction）*：这是通过向对象引入额外的方法或字段来修改其结构的过程。你可以使用引入型 AOP 使任何对象实现特定接口，而无需该对象的类显式实现该接口。


  如果你觉得这些概念令人困惑，请不要担心；当你看到一些示例时，一切都会变得清晰。另外，请注意，在 Spring AOP 中，你无需直接处理许多这些概念，并且由于
  Spring 的实现选择，其中一些概念并不相关。随着本章的深入，我们将在 Spring 的上下文中讨论这些功能中的每一个。



  ## AOP 的类型


  正如我们之前提到的，AOP 有两种不同的类型：静态 AOP 和动态 AOP。它们之间的区别实际上在于织入过程发生的时机以及实现方式。


  ### 静态 AOP


  在静态 AOP 中，织入过程构成了应用程序构建过程中的另一个步骤。用 Java 术语来说，在静态 AOP 实现中，你可以通过修改应用程序的实际字节码，根据需要更改和扩展应用程序代码来实现织入过程。这是一种性能良好的织入方式，因为最终结果只是
  Java 字节码，你无需在运行时执行任何特殊技巧来判断何时应执行通知。这种机制的缺点是，你对切面所做的任何修改，即使只是想添加另一个连接点，都需要重新编译整个应用程序。AspectJ
  的编译时织入是静态 AOP 实现的一个绝佳示例。


  ### 动态 AOP


  动态 AOP 实现（例如 Spring AOP）与静态 AOP 实现的不同之处在于，织入过程是在运行时动态执行的。其实现方式取决于具体的实现，但正如你将看到的，Spring
  的方法是为所有被通知的对象创建代理，从而允许根据需要调用通知。动态 AOP 的缺点是，通常其性能不如静态 AOP，但性能正在稳步提升。动态 AOP 实现的主要优点是，你可以轻松地修改应用程序的整个切面集，而无需重新编译主应用程序代码。


  ### 选择 AOP 类型


  选择使用静态 AOP 还是动态 AOP 是一个相当困难的决定。两者各有优势，并且你不限于只使用其中一种。通常，静态 AOP 实现存在时间更长，往往具有更丰富的功能实现，并且可用的连接点数量也更多。


  通常，如果性能至关重要，或者你需要 Spring 中未实现的 AOP 功能，那么你将需要使用 AspectJ。在大多数其他情况下，Spring AOP 是理想的选择。请记住，Spring
  已经为你提供了许多基于 AOP 的解决方案，例如事务管理，因此在自行实现之前，请先检查框架的功能！一如既往，让应用程序的需求驱动你对 AOP 实现的选择，并且如果多种技术的组合更适合你的应用程序，请不要将自己局限于单一实现。通常，Spring
  AOP 比 AspectJ 更简单，因此它往往是理想的首选。


  ## Spring 中的 AOP


  Spring 的 AOP 实现可以看作两个逻辑部分。第一部分是 AOP 核心，它提供了完全解耦的、纯编程式的 AOP 功能（也称为 Spring AOP API）。AOP
  实现的第二部分是一组框架服务，这些服务使得在应用程序中更容易使用 AOP。除此之外，Spring 的其他组件，例如事务管理器和 EJB 辅助类，提供了基于 AOP
  的服务，以简化应用程序的开发。


  ### AOP 联盟


  AOP 联盟^(³⁸) 是众多开源 AOP 项目的代表共同努力的结果，旨在为 AOP 实现定义一套标准的接口。在适用的情况下，Spring 使用 AOP 联盟接口，而不是定义自己的接口。这允许你在支持
  AOP 联盟接口的多个 AOP 实现之间重用某些通知。


  ## Spring AOP 架构


  Spring AOP 是用纯 Java 实现的。不需要特殊的编译过程。Spring AOP 的核心架构基于*代理*。一个类的被通知实例是 `ProxyFactory`
  为该类创建代理实例并将所有切面织入该代理中的结果。`ProxyFactory` 可以*手动*用于纯编程式的方法来创建 AOP 代理。在大多数情况下，你不需要在应用程序中使用它；相反，你可以依赖
  Spring 提供的声明式 AOP 配置机制（`ProxyFactoryBean` 类、`aop` 命名空间 [使用 XML 时] 和 @AspectJ 风格的注解）来利用声明式代理创建。然而，理解代理创建的工作原理非常重要，因此本章旨在提供一个非常扎实的知识基础。


  在运行时，Spring 会分析为 `ApplicationContext` 中的 Bean 定义的横切关注点，并动态生成代理 Bean（这些代理 Bean 包装了底层目标
  Bean）。调用者不是直接调用目标 Bean，而是被注入代理后的 Bean。然后，代理 Bean 会分析运行条件（即连接点、切点或通知），并相应地织入适当的通知。图
  5-1 展示了 Spring AOP 代理运行的高级视图。


  ![](img/315511_6_En_5_Fig1_HTML.jpg)


  一张图表展示了调用者被注入到目标 Bean 中，该目标 Bean 由 Spring 在运行时动态生成。目标 Bean 位于代理 Bean 内部。


  图 5-1


  Spring AOP 代理运行


  在内部，Spring 有两种代理实现：


  *   JDK 动态代理


  *   CGLIB 代理


  默认情况下，当要通知的目标对象实现了接口时，Spring 将使用 JDK 动态代理来创建目标的代理实例。然而，当被通知的目标对象没有实现接口（例如，它是一个具体类）时，将使用
  CGLIB 来创建代理实例。一个主要原因是 JDK 动态代理仅支持对接口进行代理。我们将在“理解代理”一节中详细讨论代理。


  ### Spring 中的连接点


  Spring AOP 中一个比较显著的简化是它只支持一种连接点类型：**方法调用**。乍一看，如果你熟悉其他支持更多连接点的 AOP 实现（如 AspectJ），这似乎是一个严重的限制，但实际上，这使得
  Spring 更易于使用。


  方法调用连接点是迄今为止最有用的连接点，使用它，你可以完成许多使 AOP 在日常编程中变得有用的任务。请记住，如果你需要在方法调用之外的连接点处通知某些代码，你始终可以同时使用
  Spring 和 AspectJ。


  ### Spring 中的切面


  在 Spring AOP 中，切面由实现了 `Advisor` 接口的类实例表示。Spring 提供了便捷的 `Advisor` 实现，你可以在应用程序中重用它们，从而无需创建自定义的
  `Advisor` 实现。`org.springframework.aop.Advisor` 有两个子接口：


  *   `org.springframework.aop.PointcutAdvisor`


  *   `org.springframework.aop.IntroductionAdvisor`


  所有使用切点来控制应用于连接点的通知的 `Advisor` 实现都实现了 `PointcutAdvisor` 接口。在 Spring 中，引入被视为一种特殊类型的通知，通过使用
  `IntroductionAdvisor` 接口，你可以控制引入应用于哪些类。


  我们将在接下来的“Spring 中的通知器和切点”一节中详细讨论 `PointcutAdvisor` 实现。




  #### `ProxyFactory` 类


  `org.springframework.aop.framework.ProxyFactory` 类控制 Spring AOP 中的织入和代理创建过程。代理是为**被通知**或**目标对象**创建的，可以通过调用
  `setTarget(..)` 方法来设置。在内部，`ProxyFactory` 将代理创建过程委托给 `org.springframework.aop.framework.DefaultAopProxyFactory`
  的实例，而该实例又根据应用程序的设置，进一步委托给 `org.springframework.aop.framework.CglibAopProxy` 或 `org.springframework.aop.framework.JdkDynamicAopProxy`。我们将在本章后面更详细地讨论代理创建。


  ![](img/315511_6_En_5_Figa_HTML.jpg)警告。 从 Spring 4 开始，新增了另一个实现 `org.springframework.aop.framework.ObjenesisCglibAopProxy`，它扩展了
  `CglibAopProxy`，可以在不调用类构造函数的情况下创建代理实例。当类具有带参数的构造函数、带有副作用的构造函数以及会抛出异常的构造函数时，这非常有用。


  `ProxyFactory` 类为 `addAdvice(Advice)` 方法（由 `org.springframework.aop.framework.Advised`
  接口定义）提供了实现，适用于希望通知应用于类中所有方法（而不仅仅是选定方法）的调用场景。在内部，`addAdvice(..)` 会将您传递的通知包装在 `org.springframework.aop.support.DefaultPointcutAdvisor`
  实例中（这是 `PointcutAdvisor` 的标准实现），并使用默认包含所有方法的切入点对其进行配置。当您希望对创建的 `Advisor` 进行更多控制，或者想要向代理添加引入时，请自行创建
  `org.springframework.aop.Advisor` 并使用 `ProxyFactory` 的 `addAdvisor()` 方法。


  您可以使用同一个 `ProxyFactory` 实例创建多个代理，每个代理可以具有不同的切面。为此，`ProxyFactory` 提供了 `removeAdvice()`
  和 `removeAdvisor()` 方法，允许您从 `ProxyFactory` 中移除之前传递给它的任何通知或通知器。要检查 `ProxyFactory`
  是否附加了特定的通知，请调用 `adviceIncluded()` 方法，并传入您要检查的通知对象。


  #### 在 Spring 中创建通知


  Spring 支持六种类型的通知，如表 5-1 所述。


  表 5-1


  Spring 通知类型


  | 通知名称 | 接口 | 描述 |

  | --- | --- | --- |

  | **前置** | `org.springframework.aop.``BeforeAdvice` | 使用前置通知，您可以在连接点执行之前执行自定义处理。Spring
  中的连接点始终是方法调用，这本质上允许您在方法执行之前进行预处理。前置通知可以完全访问方法调用的目标以及传递给方法的参数，但它无法控制方法本身的执行。如果前置通知抛出异常，拦截器链（以及目标方法）的后续执行将被中止，并且异常将沿着拦截器链向上传播。
  |

  | **后置返回** | `org.springframework.aop.``AfterReturningAdvice` | 后置返回通知在连接点的方法调用执行完毕并返回值后执行。后置返回通知可以访问方法调用的目标、传递给方法的参数以及返回值。由于调用后置返回通知时方法已经执行完毕，因此它完全无法控制方法调用。如果目标方法抛出异常，后置返回通知将不会运行，并且异常会像往常一样传播到调用堆栈。
  |

  | **后置（最终）** | `org.springframework.aop.``AfterAdvice` | 无论被通知方法的结果如何，后置（最终）通知都会执行。即使被通知方法失败并抛出异常，该通知也会执行。
  |

  | **异常** | `org.springframework.aop.``ThrowsAdvice` | 异常通知在方法调用返回后执行，但仅当该调用抛出异常时才执行。异常通知可以只捕获特定的异常，如果您选择这样做，则可以访问抛出异常的方法、传递给调用的参数以及调用的目标。
  |

  | **环绕** | `org.aopalliance.intercept.``MethodInterceptor` | 在 Spring 中，环绕通知使用 AOP
  Alliance 标准的方法拦截器进行建模。您的通知可以在方法调用之前和之后执行，并且您可以控制允许方法调用继续进行的点。如果您愿意，可以选择完全绕过该方法，并提供自己的逻辑实现。
  |

  | **引入** | `org.springframework.aop.``IntroductionInterceptor` | Spring 将引入建模为特殊类型的拦截器。使用引入拦截器，您可以指定由通知引入的方法的实现。
  |


  #### 通知的接口


  关于 `ProxyFactory` 类，请回想一下，通知可以直接通过 `addAdvice(..)` 方法添加到代理，也可以间接通过使用 `Advisor` 实现的
  `addAdvisor(..)` 方法添加。通知和通知器之间的主要区别在于，通知器携带了与关联切入点一起的通知，这提供了对通知将拦截哪些连接点进行更细粒度的控制。


  关于通知，Spring 为 `Advice` 接口创建了一个定义良好的层次结构。该层次结构基于 AOP Alliance 接口，并在图 5-2 中详细展示。


  ![](img/315511_6_En_5_Fig2_HTML.jpg)


  一个图表展示了 Advice 接口的层次结构。引入拦截器通过方法拦截器和拦截器，以及通过动态引入通知，方法前置通知通过前置通知，以及异常通知和后置返回通知通过后置通知，都指向通知。


  图 5-2


  IntelliJ IDEA 中展示的 Spring 通知类型接口


  这种层次结构的好处不仅在于它是合理的面向对象设计，还在于它使您能够通用地处理通知类型，例如通过在 `ProxyFactory` 上使用单一的 `addAdvice(..)`
  方法，并且您可以轻松地添加新的通知类型，而无需修改 `ProxyFactory` 类。




  #### 以编程方式创建通知


  在前面的章节中提到，*ProxyFactory* 可以*手动*用于纯编程方式创建 AOP 代理。在转向声明式的 Spring 方式之前，有必要先看一个示例。表
  5-1 中列出的所有接口都可以通过实现来为目标对象定义通知。清单 5-1 展示了三种这样的实现：前置通知、后置通知和环绕通知，每种都实现了相应的接口。


  ```

  package com.apress.prospring6.five.manual;

  import org.aopalliance.intercept.MethodInterceptor;

  import org.aopalliance.intercept.MethodInvocation;

  import org.springframework.aop.AfterReturningAdvice;

  import org.springframework.aop.MethodBeforeAdvice;

  import org.springframework.util.StopWatch;

  import java.lang.reflect.Method;

  // 其他导入语句已省略

  class SimpleBeforeAdvice implements MethodBeforeAdvice {

  private static Logger logger = LoggerFactory.getLogger(SimpleBeforeAdvice.class);

  @Override

  public void before(Method method, Object[] args, Object target) throws Throwable
  {

  logger.info("Before: set up concert hall.");

  }

  }

  class SimpleAfterAdvice implements AfterReturningAdvice {

  private static Logger logger = LoggerFactory.getLogger(SimpleAfterAdvice.class);

  @Override

  public void afterReturning(Object returnValue, Method method, Object[] args, Object
  target) throws Throwable {

  logger.info("After: offer standing ovation.");

  }

  }

  class SimpleAroundAdvice implements MethodInterceptor {

  private static Logger logger = LoggerFactory.getLogger(SimpleAroundAdvice.class);

  @Override

  public Object invoke(@Nonnull MethodInvocation invocation) throws Throwable {

  logger.info("Around: starting timer");

  StopWatch sw = new StopWatch();

  sw.start(invocation.getMethod().getName());

  Object returnValue = invocation.proceed();

  sw.stop();

  logger.info("Around: concert duration = {}", sw.getTotalTimeMillis());

  return returnValue;

  }

  }

  清单 5-1

  三种类型的自定义通知

  ```


  `SimpleBeforeAdvice`、`SimpleAfterAdvice` 和 `SimpleAroundAdvice` 类型被设计用于 `Performance`
  类型的实例。`SimpleBeforeAdvice` 和 `SimpleAfterAdvice` 仅打印日志消息，以确认通知已被应用。`SimpleAroundAdvice`
  稍微复杂一些，它使用 `StopWatch` 实例来计时表演。被拦截的方法通过 Java 反射进行调用。


  清单 5-2 展示了 `Performance` 接口和 `Concert` 实现。


  ```

  // Performance.java

  package com.apress.prospring6.five.manual;

  public interface Performance {

  void execute();

  }

  // Concert.java

  import org.slf4j.Logger;

  import org.slf4j.LoggerFactory;

  import static java.time.Duration.ofMillis;

  public class Concert  implements Performance{

  private static Logger LOGGER = LoggerFactory.getLogger(Concert.class);

  @Override

  public void execute() {

  LOGGER.info(" ... La la la la laaaa ...");

  try {

  Thread.sleep(ofMillis(2000).toMillis());

  } catch (InterruptedException e) {}

  }

  }

  清单 5-2

  应用通知的对象类型

  ```


  将通知实例和目标对象组合在一起很简单；我们只需要实例化 `ProxyFactory` 类，并设置目标和通知实例，如清单 5-3 所示。


  ```

  package com.apress.prospring6.five.manual;

  import org.springframework.aop.framework.ProxyFactory;

  // 其他导入语句已省略

  public class ManualAdviceDemo {

  public static void main(String... args) {

  Concert concert = new Concert();

  ProxyFactory pf = new ProxyFactory();

  pf.addAdvice(new SimpleBeforeAdvice());

  pf.addAdvice(new SimpleAroundAdvice());

  pf.addAdvice(new SimpleAfterAdvice());

  pf.setTarget(concert);

  Performance proxy = (Performance) pf.getProxy();

  proxy.execute();

  }

  }

  清单 5-3

  以编程方式创建并应用通知到目标对象的示例

  ```


  ![](img/315511_6_En_5_Figb_HTML.jpg)警告。 通知的执行顺序由通知类型决定，而不是它们被添加到 `ProxyFactory`
  实例的顺序。


  `SimpleBeforeAdvice` 打印一条消息，确保音乐厅在音乐会开始前已布置好。`SimpleAroundAdvice` 拦截 `concert.execute()`
  方法，在方法执行前启动计时器，并在执行后停止计时并打印持续时间。`SimpleAfterAdvice` 打印一条消息，确保音乐会后有起立鼓掌。


