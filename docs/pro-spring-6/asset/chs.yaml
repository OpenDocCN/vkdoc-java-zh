  我们知道服务器在执行我们请求的操作时遇到了问题，但我们不知道原因。显然，需要适当的异常处理。在使用 GraphQL 时，我们通过扩展 `org.springframework.graphql.execution.DataFetcherExceptionResolverAdapter`
  类并重写 `resolveToSingleError(..)` 或 `resolveToMultipleErrors(..)` 方法来处理错误。在配置中添加此类型的
  bean 提供了一种更简洁的方式，可以在 GraphiQL Web 控制台显示的 GraphQL 响应中表示数据层错误。代码清单 16-29 展示了 `DataFetcherExceptionResolverAdapter`
  的自定义实现。


  ```

  package com.apress.prospring6.sixteen.boot.problem;

  import graphql.GraphQLError;

  import graphql.GraphqlErrorBuilder;

  import graphql.schema.DataFetchingEnvironment;

  import org.springframework.dao.DataIntegrityViolationException;

  import org.springframework.graphql.execution.DataFetcherExceptionResolverAdapter;

  import org.springframework.graphql.execution.ErrorType;

  import org.springframework.stereotype.Component;

  @Component

  public class CustomExceptionResolver extends DataFetcherExceptionResolverAdapter
  {

  @Override

  protected GraphQLError resolveToSingleError(Throwable ex, DataFetchingEnvironment
  env) {

  if (ex instanceof DataIntegrityViolationException) {

  return GraphqlErrorBuilder.newError()

  .errorType(ErrorType.BAD_REQUEST)

  .message("无法创建重复条目:" + ex.getCause().getCause().getMessage())

  .path(env.getExecutionStepInfo().getPath())

  .location(env.getField().getSourceLocation())

  .build();

  }

  return super.resolveToSingleError(ex, env);

  }

  @Override

  protected List resolveToMultipleErrors(Throwable ex, DataFetchingEnvironment env)
  {

  return super.resolveToMultipleErrors(ex, env);

  }

  }

  代码清单 16-29

  DataFetcherExceptionResolverAdapter 的自定义实现

  ```


  `resolveToSingleError(..)` 和 `resolveToMultipleErrors(..)` 具有相同的签名，它们之间的唯一区别在于 `resolveToSingleError(..)`
  将抛出的异常解析为单个 GraphQL 错误，而 `resolveToMultipleErrors(..)` 则将其解析为多个 GraphQL 错误。`DataFetchingEnvironment`
  参数提供了错误发生时的执行上下文详细信息。`GraphqlErrorBuilder` 是一个用于构建 GraphQL 错误的有用类。`ErrorType` 表示错误类别，该枚举中的值与最常见的
  HTTP 状态码对应：`BAD_REQUEST`、`UNAUTHORIZED`、`FORBIDDEN`、`NOT_FOUND` 和 `INTERNAL_ERROR`。可以设置自定义消息来添加有关失败的详细信息。`path`
  是导致问题的查询或变更的名称。`location` 表示导致错误的 GraphQL 查询行。


  将此 bean 添加到配置后，错误变得更加可读，如图 16-13 所示，为发送错误查询的人提供了纠正所需的信息。


