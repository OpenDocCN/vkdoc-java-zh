  #### 使用 `RowMapper<T>` 检索领域对象


  到目前为止，使用 `JdbcTemplate` 及相关类的示例都非常简单：查询返回的是单一类型的单个值，例如 `String`。当查询返回多行且需要转换为 POJO（就像我们在纯
  JDBC 部分所做的那样）时，情况就变得稍微复杂一些。不过，Spring 通过其 `RowMapper<T>` 接口来提供帮助。顾名思义，实现 `RowMapper<T>`
  接口的类型的实例仅适用于将行映射到单个领域对象。Spring 的 `RowMapper<T>` 接口（位于 `org.springframework.jdbc.core`
  包中）提供了一种简单的方法，让你能够将 JDBC 结果集映射到 POJO 或记录。让我们通过使用 `RowMapper<T>` 接口实现 `SingerDao`
  的 `findAll()` 方法来实际看看它的用法。在清单 6-25 中，你可以看到返回 `Singer` 记录列表的 `findAll()` 方法的实现。


  ```

  package com.apress.prospring6.six.plain.records;

  import java.time.LocalDate;

  import java.util.Set;

  // 在文件 Singer.java 中

  public record Singer(Long id,

  String firstName,

  String lastName,

  LocalDate birthDate,

  Set albums) {}

  // 在文件 RowMapperCfg.java 中

  package com.apress.prospring6.six.rowmapper;

  import org.springframework.jdbc.core.RowMapper;

  // 其他导入语句已省略

  interface SingerDao {

  Set findAll();

  }

  class RowMapperDao implements SingerDao {

  private NamedParameterJdbcTemplate namedTemplate;

  public void setNamedTemplate(NamedParameterJdbcTemplate namedTemplate) {

  this.namedTemplate = namedTemplate;

  }

  @Override

  public Set findAll() {

  return new HashSet(namedTemplate.query("select * from SINGER", new SingerMapper()));

  }

  static class SingerMapper implements RowMapper {

  @Override

  public Singer mapRow(ResultSet rs, int rowNum)

  throws SQLException {

  return new Singer(rs.getLong("id"),

  rs.getString("first_name"),

  rs.getString("last_name"),

  rs.getDate("birth_date").toLocalDate(),

  Set.of());

  }

  }

  }

