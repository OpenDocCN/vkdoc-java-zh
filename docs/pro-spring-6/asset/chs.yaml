  对于一个不需要专门 Web 视图的 Spring Web REST 应用程序，无需专门的视图解析器 Bean。因此，配置稍微简单一些。`WebInitializer`
  类（即配置 `DispatcherServlet` 的类）对于 Spring Web 应用程序来说相当标准，并且当不使用专门视图时，不需要 `HiddenHttpMethodFilter`。此类如代码清单
  15-4 所示。




  ```

  package com.apress.prospring6.fifteen;

  import jakarta.servlet.Filter;

  import org.springframework.web.filter.CharacterEncodingFilter;

  import org.springframework.web.filter.HiddenHttpMethodFilter;

  import org.springframework.web.servlet.support.AbstractAnnotationConfigDispatcherServletInitializer;

  import java.nio.charset.StandardCharsets;

  import java.nio.charset.StandardCharsets;

  public class WebInitializer

  extends AbstractAnnotationConfigDispatcherServletInitializer {

  @Override

  protected Class[] getRootConfigClasses() {

  return new Class[]{BasicDataSourceCfg.class, TransactionCfg.class};

  }

  @Override

  protected Class[] getServletConfigClasses() {

  return new Class[]{WebConfig.class};

  }

  @Override

  protected String[] getServletMappings() {

  return new String[]{"/"};

  }

  @Override

  protected Filter[] getServletFilters() {

  final CharacterEncodingFilter cef = new CharacterEncodingFilter();

