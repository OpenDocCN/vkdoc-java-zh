  \ profile 参数改为 high school（`-Dspring.profiles.active=\"highschool\"`），输出将变为以下内容：\n\
  \n```\nDEBUG: AbstractEnvironment - Activating profiles [highschool]\nINFO : ProfileDemo\
  \ - Food: Coke\nINFO : ProfileDemo - Food: Hamburger\nINFO : ProfileDemo - Food:\
  \ Fries\n```\n\n在清单 4-41 中，通过调用 `ctx.getEnvironment().setActiveProfiles(\"..\")`\
  \ 以编程方式设置了激活的 profile。上下文被创建为空，并在设置 profile 后添加配置。但也可以直接从所有配置类创建上下文，此时 profile 会自动激活，导致只有特定于该\
  \ profile 的 bean 被添加到上下文中。如果未指定 profile，应用程序仍然可以通过调用 `ctx.getEnvironment().setDefaultProfiles(\"\
  ..\")` 并提供一个由默认激活的 profile 名称列表组成的参数来保持功能正常。\n\n清单 4-42 展示了使用 profile 配置配置应用程序上下文的另一种方式。\n\
  \n```\npackage com.apress.prospring6.four.profile;\n// 省略其他导入语句\npublic class AnotherProfileDemo\
  \ {\nprivate static Logger logger = LoggerFactory.getLogger(AnotherProfileDemo.class);\n\
  public static void main(String... args) {\nvar ctx = new AnnotationConfigApplicationContext(HighSchoolConfig.class,\
  \ KindergartenConfig.class);\nvar foodProviderService = ctx.getBean(\"foodProviderService\"\
  , FoodProviderService.class);\nvar lunchSet = foodProviderService.provideLunchSet();\n\
  lunchSet.forEach(food -> logger.info(\"Food: {}\", food.getName()));\nctx.close();\n\
  }\n}\n清单 4-42\nFoodProviderService 测试（第二个版本）\n```\n\n此外，您还可以通过使用 `@ActiveProfiles`\
  \ 注解来启用 profile，但为此我们首先需要讨论测试，因为此注解只能用于测试类。\n\n### 使用 Profile 的注意事项\n\nSpring 中的\
  \ profile 功能为开发者管理应用程序运行配置提供了另一种方式，这以前是在构建工具（例如 Maven 的 profile 支持）中完成的。构建工具依赖于传递给工具的参数，将正确的配置/属性文件打包到\
  \ Java 归档文件（JAR 或 WAR，取决于应用程序类型）中，然后部署到目标环境。Spring 的 profile 功能允许您作为应用程序开发者自行定义\
  \ profile，并通过编程方式或传入 JVM 参数来激活它们。通过使用 Spring 的 profile 支持，您现在可以使用相同的应用程序归档文件，并通过在\
  \ JVM 启动时传入正确的 profile 作为参数来部署到所有环境。例如，您可以拥有具有不同 profile 的应用程序，例如 (`dev`, `hibernate`)、(`prd`,\
  \ `jdbc`) 等，每个组合代表运行环境（开发或生产）和要使用的数据访问库（Hibernate 或 JDBC）。它将应用程序 profile 管理带入了编程层面。\n\
  \n但这种方法也有其缺点。例如，有些人可能会认为，将不同环境的所有配置放入应用程序配置文件或 Java 类中并捆绑在一起，如果处理不当（例如，管理员可能忘记在应用服务器环境中设置正确的\
  \ JVM 参数），则容易出错。将所有 profile 的文件打包在一起也会使包比平时稍大一些。再次强调，让应用程序和配置需求驱动您选择最适合您项目的方法。\n\
  \n\n\n## `Environment` 与 `PropertySource` 抽象\n\n要设置活动配置文件，需要调用 `ctx.getEnvironment()`\
  \ 来获取 Spring 的 `Environment` 对象。这是一个抽象层，用于封装正在运行的 Spring 应用程序的环境。\n\n除了配置文件之外，`Environment`\
  \ 对象封装的另一个关键信息是属性。属性用于存储应用程序的底层环境配置，例如应用程序文件夹的位置、数据库连接信息等。\n\n`Environment` Bean\
  \ 会在一组 `PropertySource` 对象中进行搜索以查找属性值。Spring 中的 `PropertySource` 抽象特性帮助开发者从运行平台访问各种配置信息。在此抽象之下，所有系统属性、环境变量和应用程序属性都由\
  \ `Environment` 接口提供，Spring 在引导 `ApplicationContext` 时会填充这些信息。清单 4-43 展示了一个简单示例。\n\
  \n```\npackage com.apress.prospring6.four;\nimport org.springframework.context.support.GenericApplicationContext;\n\
  import org.springframework.core.env.ConfigurableEnvironment;\nimport org.springframework.core.env.MapPropertySource;\n\
  import org.springframework.core.env.MutablePropertySources;\n// 其他导入语句已省略\npublic\
  \ class EnvironmentTest {\nprivate static Logger logger = LoggerFactory.getLogger(EnvironmentTest.class);\n\
  @Test\nvoid testPropertySourceOne(){\nvar ctx = new GenericApplicationContext();\n\
  ConfigurableEnvironment env = ctx.getEnvironment();\nMutablePropertySources propertySources\
  \ = env.getPropertySources();\nMap appMap = new HashMap();\nappMap.put(\"user.home\"\
  , \"CUSTOM_USER_HOME\");\npropertySources.addLast(new MapPropertySource(\"prospring6_MAP\"\
  , appMap));\nlogger.info(\"-- 来自 java.lang.System 的环境变量 --\");\nlogger.info(\"user.home:\
  \ \" + System.getProperty(\"user.home\"));\nlogger.info(\"JAVA_HOME: \" + System.getenv(\"\
  JAVA_HOME\"));\nlogger.info(\"-- 来自 ConfigurableEnvironment 的环境变量 --\");\nlogger.info(\"\
  user.home: \" + env.getProperty(\"user.home\"));\nlogger.info(\"JAVA_HOME: \" +\
  \ env.getProperty(\"JAVA_HOME\"));\nctx.close();\n}\n}\n清单 4-43\n使用 Environment\
  \ 接口\n```\n\n在清单 4-43 中，`ApplicationContext` 初始化后，我们获取了一个对 `ConfigurableEnvironment`\
  \ 接口（它扩展了 `Environment`）的引用。通过此实例，我们获得了 `MutablePropertySources`（`PropertySources`\
  \ 接口的一个默认实现，允许操作包含的属性源）的句柄。之后，我们构建一个映射，将应用程序属性放入该映射，然后用这个映射构建一个 `MapPropertySource`\
  \ 类（一个 `PropertySource` 子类，从 `Map` 实例中读取键和值）。最后，通过 `addLast()` 方法将 `MapPropertySource`\
  \ 类添加到 `MutablePropertySources` 中。运行程序会在控制台打印出清单 4-44 所示的输出。\n\n```\nINFO : EnvironmentDemo\
  \ - -- 来自 java.lang.System 的环境变量 --\nINFO : EnvironmentDemo - user.home: /Users/iulianacosmina\n\
  INFO : EnvironmentDemo - JAVA_HOME: /Users/iulianacosmina/.sdkman/candidates/java/current\n\
  INFO : EnvironmentDemo - -- 来自 ConfigurableEnvironment 的环境变量 --\nINFO : EnvironmentDemo\
  \ - user.home: /Users/iulianacosmina\nINFO : EnvironmentDemo - JAVA_HOME: /Users/iulianacosmina/.sdkman/candidates/java/current\n\
  清单 4-44\n使用 Environment 接口提取的值\n```\n\n对于前两行，JVM 系统属性 `user.home` 和环境变量 `JAVA_HOME`\
  \ 是使用 JVM 的 `System` 类检索的。然而，对于最后两行，你可以看到所有系统属性、环境变量和应用程序属性都可以通过 `Environment` 接口访问。你可以看到\
  \ `Environment` 抽象如何帮助我们管理和访问应用程序运行环境中的所有各种属性。\n\n`Environment` 实例会在一组 `PropertySource`\
  \ 对象中进行搜索。Spring 按以下默认顺序访问属性：\n\n*   运行中 JVM 的系统属性\n*   环境变量\n*   应用程序定义的属性\n\n\
  输出显示，当定义名为 `user.home` 的相同应用程序属性，并通过 `MutablePropertySources` 类将其添加到 `Environment`\
  \ 接口时，`user.home` 的值仍然是从 JVM 属性中检索的，而 `CUSTOM_USER_HOME` 则无处可寻。但是，Spring 允许你控制 `Environment`\
  \ 检索属性的顺序。清单 4-45 展示了清单 4-43 中代码的修订版本。\n\n```\npackage com.apress.prospring6.four;\n\
  // 导入语句已省略\npublic class EnvironmentTest {\nprivate static Logger logger = LoggerFactory.getLogger(EnvironmentTest.class);\n\
  @Test\nvoid testPropertySourceTwo(){\nvar ctx = new GenericApplicationContext();\n\
  ConfigurableEnvironment env = ctx.getEnvironment();\nMutablePropertySources propertySources\
  \ = env.getPropertySources();\nMap appMap = new HashMap();\nappMap.put(\"user.home\"\
  , \"CUSTOM_USER_HOME\");\npropertySources.addFirst(new MapPropertySource(\"prospring6_MAP\"\
  , appMap));\nlogger.info(\"-- 来自 java.lang.System 的环境变量 --\");\nlogger.info(\"user.home:\
  \ \" + System.getProperty(\"user.home\"));\nlogger.info(\"JAVA_HOME: \" + System.getenv(\"\
  JAVA_HOME\"));\nlogger.info(\"-- 来自 ConfigurableEnvironment 的环境变量 --\");\nlogger.info(\"\
  user.home: \" + env.getProperty(\"user.home\"));\nlogger.info(\"JAVA_HOME: \" +\
  \ env.getProperty(\"JAVA_HOME\"));\nctx.close();\n}\n}\n清单 4-45\n使用 Environment\
  \ 接口（第 2 部分）\n```\n\n在清单 4-45 的代码示例中，请注意加粗的那一行。它声明了一个同样名为 `user.home` 的应用程序属性，但这次是通过\
  \ `MutablePropertySources` 类的 `addFirst()` 方法将其添加为第一个要搜索的属性。当你运行程序时，你将看到清单 4-46\
  \ 所示的输出。\n\n```\nINFO : EnvironmentTest - -- 来自 java.lang.System 的环境变量 --\nINFO\
  \ : EnvironmentTest - user.home: /Users/iulianacosmina\nINFO : EnvironmentTest -\
  \ JAVA_HOME: /Users/iulianacosmina/.sdkman/candidates/java/current\nINFO : EnvironmentDemo\
  \ - -- 来自 ConfigurableEnvironment 的环境变量 --\nINFO : EnvironmentTest - user.home:\
  \ CUSTOM_USER_HOME\nINFO : EnvironmentTest - JAVA_HOME: /Users/iulianacosmina/.sdkman/candidates/java/current\n\
  清单 4-46\n使用 Environment 接口提取的值\n```\n\n前两行保持不变，因为我们仍然使用 JVM `System` 类的 `getProperty()`\
  \ 和 `getenv()` 方法来检索它们。但是，当使用 `Environment` 接口时，你会看到我们定义的 `user.home` 属性优先，因为我们将其定义为第一个要搜索属性值的来源。\n\
  \n在实际应用中，你很少需要直接与 `Environment` 接口交互，而是会使用 `${}` 形式的属性占位符（例如 `${application.home}`），并将解析后的值注入到\
  \ Spring Bean 中。让我们看看实际效果。假设我们有一个类用于存储从属性文件加载的所有应用程序属性。清单 4-47 展示了 `AppProperty`\
  \ 类和 `application.properties` 文件的内容。\n\n\n\n```\npackage com.apress.prospring6.four;\n\
  // 导入语句已省略\nclass AppProperty {\nprivate String applicationHome;\nprivate String\
  \ userHome;\npublic String getApplicationHome() {\nreturn applicationHome;\n}\n\
  @Autowired\npublic void setApplicationHome(@Value(\"${application.home}\") String\
  \ applicationHome) {\nthis.applicationHome = applicationHome;\n}\npublic String\
  \ getUserHome() {\nreturn userHome;\n}\n@Autowired\npublic void setUserHome(@Value(\"\
  ${user.home}\") String userHome) {\nthis.userHome = userHome;\n}\n@Override\npublic\
  \ String toString() {\nreturn new ToStringBuilder(this)\n.append(\"applicationHome\"\
  , applicationHome)\n.append(\"userHome\", userHome)\n.toString();\n}\n}\n// application.properties\
  \ 文件的内容\napplication.home=application_home\nuser.home=/home/CUSTOM-USER-HOME\n清单\
  \ 4-47\nAppProperty Bean 类型\n```\n\n要将 `application.properties` 文件的内容添加到 Spring\
  \ 的应用上下文中，需要在带有 `@Configuration` 注解的类上使用 `@PropertySource` 注解。这会将此文件作为属性源添加到 `Environment`\
  \ 查找属性的位置列表中。\n\n清单 4-48 展示了配置类、测试类以及运行 `main(..)` 方法后产生的输出。\n\n```\npackage com.apress.prospring6.four;\n\
  import org.springframework.context.annotation.PropertySource;\n// 其他导入语句已省略\n@Configuration\n\
  @PropertySource(\"classpath:application.properties\")\nclass PropDemoConfig{\n@Bean\n\
  AppProperty appProperty(){\nreturn new AppProperty();\n}\n}\npublic class PropertySourceDemo\
  \ {\nprivate static Logger logger = LoggerFactory.getLogger(PropertySourceDemo.class);\n\
  public static void main(String... args) {\nvar ctx = new AnnotationConfigApplicationContext(PropDemoConfig.class);\n\
  var appProperty = ctx.getBean(\"appProperty\", AppProperty.class);\nlogger.info(\"\
  Outcome: {}\", appProperty);\n}\n}\n// 输出\nINFO : PropertySourceDemo - Outcome:\
  \ com.apress.prospring6.four.AppProperty@624ea235[\napplicationHome=application_home,\n\
  userHome=/Users/iulianacosmina\n]\n清单 4-48\nAppProperty Bean 的配置类、测试类及控制台输出\n```\n\
  \n那么，这个输出是怎么回事呢？嗯，`application.home` 占位符被正确解析了，而 `user.home` 属性仍然从 JVM 属性中获取，这符合预期，因为系统属性的优先级高于自定义属性源。那么，我们如何指示\
  \ Spring 我们希望将我们的属性源（`application.properties`）视为优先级最高的呢？除非你使用 XML 配置（请查阅本书的上一版）或如清单\
  \ 4-45 所示的手动显式配置，否则你无法做到，因为顺序如前所述：系统属性、环境属性，然后是应用定义的属性。如果你真的想为你的应用使用 Java 配置并覆盖属性源的顺序，有一种方法可以实现——虽然不够简洁，但可行。\n\
  \n首先，我们从 `Environment` 的层次结构开始，如图 4-4 所示。\n\n![](img/315511_6_En_4_Fig4_HTML.jpg)\n\
  \n该图展示了 Environment 类的家族，包括标准环境、带有可配置属性解析器的抽象环境以及可配置环境，它们共同指向属性解析器。\n\n图 4-4\n\n\
  IntelliJ IDEA 中 `Environment` 的层次结构\n\n图 4-4 描绘了 `Environment` 类的家族。请注意其中心的 `StandardEnvironment`\
  \ 类，它是在 Spring 上下文中创建的对象的类型。`StandardEnvironment` 实现了 `ConfigurableEnvironment`\
  \ 接口，这意味着我们可以操作这个对象并修改读取属性的位置的优先级。\n\n清单 4-49 展示了 `PropDemoConfig` 类的修改版本，其中自动注入了\
  \ `StandardEnvironment`，并声明了一个初始化方法来修改属性资源的优先级。\n\n```\npackage com.apress.prospring6.four;\n\
  import org.springframework.context.annotation.PropertySource;\nimport org.springframework.core.env.StandardEnvironment;\n\
  import org.springframework.core.io.support.ResourcePropertySource;\n// 其他导入语句已省略\n\
  @Configuration\n@PropertySource(\"classpath:application.properties\")\nclass PropDemoConfig{\n\
  @Autowired\nStandardEnvironment environment;\n@PostConstruct\nvoid configPriority()\
  \ {\nResourcePropertySource rps = (ResourcePropertySource) environment.getPropertySources()\n\
  .stream().filter(ps -> ps instanceof ResourcePropertySource)\n.findAny().orElse(null);\n\
  environment.getPropertySources().addFirst(rps);\n}\n@Bean\nAppProperty appProperty(){\n\
  return new AppProperty();\n}\n}\n清单 4-49\n具有自定义属性源位置的 AppProperty Bean 配置类\n```\n\
  \n`ResourcePropertySource` 类从给定的 `Resource` 或资源（例如本例中使用的 `classpath:application.properties`）加载一个\
  \ `Properties` 对象。由于我们知道 `ConfigurableEnvironment` 接口会在一个 `MutablePropertySources`\
  \ 对象中暴露对其所有属性源的引用，我们所要做的就是访问这个对象，识别出 `ResourcePropertySource`，并通过调用 `addFirst(..)`\
  \ 将其重新添加到该对象中。这与我们在清单 4-45 中所做的相同，只是我们没有创建新的 `MapPropertySource`，而是使用了现有的 `ResourcePropertySource`。\n\
  \n在实践中，你可能永远不需要这样做，但万一你需要像这样进行一些 Spring 代码的“杂技”操作，现在你有了一个可用的示例。如果你使用这个奇特的配置执行 `PropertySourceDemo`\
  \ 类，你会注意到清单 4-50 中的输出证实了 `application.properties` 文件中的属性优先级高于其他所有属性。\n\n```\nINFO\
  \ : PropertySourceDemo - Outcome: com.apress.prospring6.four.AppProperty@5340477f[\n\
  applicationHome=application_home,\nuserHome=/home/CUSTOM-USER-HOME\n]\n清单 4-50\n\
  使用重新排序优先级后的属性源位置配置运行 PropertySourceDemo 所产生的输出\n```\n\n\n\n## 测试 Spring 应用\n\n在企业级应用开发中，测试是确保最终应用按预期运行并满足各类需求（如架构、安全、用户需求等）的重要方式。每次进行更改时，都应确保该更改不会影响现有逻辑。维护持续的构建和测试环境对于保证高质量应用至关重要。为所有代码提供高覆盖率的可重复测试，能让您以高度信心部署新应用及应用变更。在企业开发环境中，针对企业应用的每一层都有多种测试类型，每种测试都有其自身的特点和要求。本节将讨论各应用层测试中涉及的基本概念，特别是基于\
  \ Spring 的应用测试。我们还将介绍 Spring 如何帮助开发者更轻松地实现各层的测试用例。\n\n本节将介绍各种测试类型及其目的，涵盖测试 Spring\
  \ 应用的基本方法。在后续章节中，每个代码示例都会附带相应的测试方法。\n\n*企业测试框架* 指的是应用整个生命周期中的测试活动。在不同阶段，会执行不同的测试活动，以验证应用功能是否按照定义的业务和技术要求正常运行。\n\
  \n在每个阶段，都会执行不同的测试用例。有些是自动化的，有些则是手动执行的。每种情况下，结果都由相应人员（例如业务分析师、应用用户等）进行验证。表 4-4 描述了每种测试类型的特征和目标，以及用于实现测试用例的常用工具和库。\n\
  \n**表 4-4 实践中使用的不同测试类别**\n\n| 测试类别 | 描述 | 常用工具 |\n| --- | --- | --- |\n| 逻辑单元测试\
  \ | 逻辑单元测试针对单个对象进行独立测试，无需考虑其在周边系统中的作用。 | 单元测试：JUnit、TestNG；模拟对象：Mockito、EasyMock\
  \ |\n| 集成单元测试 | 集成单元测试侧重于在“接近真实”的环境中测试组件间的交互。这些测试会与容器（嵌入式数据库、Web 容器等）进行交互。 | 嵌入式数据库：H2；数据库测试：DbUnit；内存\
  \ Web 容器：Jetty |\n| 前端单元测试 | 前端单元测试侧重于测试用户界面。目标是确保每个用户界面都能响应用户操作，并按预期向用户输出结果。 |\
  \ Selenium、Cypress |\n| 持续构建与代码质量测试 | 应定期构建应用代码库，以确保代码质量符合标准（例如，注释完整、无空的异常捕获块等）。同时，测试覆盖率应尽可能高，以确保所有编写的代码行都经过测试。\
  \ | 代码质量：PMD、Check-style、FindBugs、Sonar；测试覆盖率：Cobertura、EclEmma；构建工具：Gradle、Maven；持续构建：Hudson、Jenkins\
  \ |\n| 系统集成测试 | 系统集成测试验证新系统中所有程序之间以及新系统与所有外部接口之间通信的准确性。集成测试还必须证明新系统符合功能规范，能在运行环境中有效运行，且不会对其他系统产生不利影响。\
  \ | IBM Rational Functional Tester、HP Unified Functional Testing |\n| 系统质量测试 | 系统质量测试确保开发的应用满足非功能性需求。大多数情况下，这需要测试应用的性能，以确保满足系统并发用户数和工作负载的目标要求。其他非功能性需求包括安全性、高可用性特性等。\
  \ | Apache JMeter、HP LoadRunner、Locust、K6 |\n| 用户验收测试 | 用户验收测试模拟新系统的实际工作条件，包括用户手册和操作流程。用户在此测试阶段的广泛参与，能为用户操作新系统提供宝贵的培训。同时，也有利于程序员或设计者了解用户对新程序的体验。这种共同参与能鼓励用户和运维人员批准系统转换。\
  \ | IBM Rational TestManager、HP Quality Center |\n\n现在，我们已经介绍了通用的测试学术细节，接下来进入实践环节。我们不会完整罗列\
  \ Spring 框架在测试领域提供的所有类及其细节，而是重点介绍最常用的模式以及 Spring TestContext 框架中支持的接口和类，同时展示如何实现本章中的示例测试用例。\n\
  \n### 使用 Spring 测试注解\n\n除了标准注解（如 `@Autowired` 和 `@Resource`）之外，Spring 还提供了测试专用的注解。这些注解可用于单元测试，提供简化上下文文件加载、配置文件、测试执行计时等多种功能。表\
  \ 4-5 概述了这些注解及其用途。\n\n**表 4-5 Spring 专用测试注解**\n\n\n\n| 注解 | 描述 |\n| --- | --- |\n\
  | `@BootstrapWith` | 类级别注解，用于确定如何引导 Spring TestContext 框架。 |\n| `@ContextConfiguration`\
  \ | 类级别注解，用于确定如何加载和配置集成测试所需的 `ApplicationContext`。使用 Junit 4 时，注解测试类需同时标注 `@RunWith(SpringRunner.class)`。使用\
  \ Junit Jupiter 时，测试类需标注 `@ExtendWith(SpringExtension.class)`。 |\n| `@WebAppConfiguration`\
  \ | 类级别注解，用于指示加载的 `ApplicationContext` 应为 `WebApplicationContext`。 |\n| `@ContextHierarchy`\
  \ | 类级别注解，用于定义集成测试中 `ApplicationContexts` 的层次结构。 |\n| `@DirtiesContext` | 类级别和方法级别注解，用于指示上下文在测试执行过程中已被修改或损坏，应在后续测试中关闭并重建。\
  \ |\n| `@ActiveProfiles` | 类级别注解，用于指定应激活的 Bean 配置文件。 |\n| `@TestPropertySource`\
  \ | 类级别注解，用于配置属性文件的位置和内联属性，这些属性将被添加到集成测试的 `ApplicationContext` 的 `Environment` 的\
  \ `PropertySources` 集合中。 |\n| `@DynamicPropertySource` | 方法级别注解，用于需要向 `Environment`\
  \ 的 `PropertySources` 集合添加动态值属性的集成测试。 |\n| `@TestExecutionListeners` | 类级别注解，用于配置应注册到\
  \ `TestContextManager` 的 `TestExecutionListeners`。 |\n| `@RecordApplicationEvents`\
  \ | 类级别注解，用于记录单个测试执行期间在 `ApplicationContext` 中发布的所有应用程序事件。 |\n| `@Commit` | 类级别和方法级别注解，用于指示测试管理的事务应在测试方法完成后提交。\
  \ |\n| `@Rollback` | 类级别和方法级别注解，用于指示测试管理的事务是否应在测试方法完成后回滚。如预期，`@Rollback(false)`\
  \ 等同于 `@Commit`。 |\n| `@BeforeTransaction` | 方法级别注解，用于指示在标记了 `@Transactional` 注解的测试方法启动事务之前，应调用被注解的方法。\
  \ |\n| `@AfterTransaction` | 方法级别注解，用于指示在标记了 `@Transactional` 注解的测试方法结束事务之后，应调用被注解的方法。\
  \ |\n| `@Sql` | 类级别和方法级别注解，用于配置在集成测试期间针对给定数据库执行的 SQL 脚本和语句。 |\n| `@SqlConfig` |\
  \ 类级别和方法级别注解，用于指示如何解析和执行通过 `@Sql` 注解配置的 SQL 脚本。 |\n| `@SqlMergeMode` | 类级别和方法级别注解，用于指示方法级别的\
  \ `@Sql` 声明是否与类级别的 `@Sql` 声明合并。 |\n| `@SqlGroup` | 容器级别注解，用于聚合多个 `@Sql` 注解。 |\n\
  | `@IfProfileValue` | 类级别和方法级别注解，用于指示测试方法应在特定环境条件下启用。 |\n| `@ProfileValueSourceConfiguration`\
  \ | 类级别注解，用于指定 `@IfProfileValue` 使用的 `ProfileValueSource`。如果测试中未声明此注解，则默认使用 `SystemProfileValueSource`。\
  \ |\n| `@Timed` | 方法级别注解，用于指示测试必须在指定时间内完成。 |\n| `@Repeat` | 方法级别注解，用于指示被注解的测试方法应重复执行指定次数。\
  \ |\n\n### 实现逻辑单元测试\n\n如前所述，逻辑单元测试是最细粒度的测试级别。其目标是验证单个类的行为，该类所有依赖项均通过预期行为进行“模拟”。以\
  \ `MessageRender` 和 `MessageProvider` Bean 为例，通过注入模拟的 `MessageProvider` Bean 来隔离测试\
  \ `MessageRender` Bean，是单元测试的一个合适示例。为了帮助模拟 `MessageProvider` Bean 的行为，我们将展示如何使用\
  \ Mockito^(³²)，这是一个流行的模拟框架。\n\nSpring 框架在 `spring-test` 模块中为集成测试提供了一流支持。为了为本节将要创建的集成测试提供测试上下文，您将使用\
  \ `spring-test.jar` 库。该库包含用于与 Spring 容器进行集成测试的有价值类。对于本节中的测试，`spring-test`、`mockito-all`\
  \ 和 `junit-jupiter-engine` 已添加到项目配置中。\n\n让我们从小处着手。以 `MessageRender` 和 `MessageProvider`\
  \ Bean 为例，让我们声明一个测试类，检查 `StandardOutMessageRenderer` Bean 类型是否按预期工作，即当调用 `render()`\
  \ 时，它会调用 `messageProvider.getMessage()`。要执行此测试，我们不需要 Spring `ApplicationContext`\
  \ 或 `MessageProvider`；我们只需要一个模拟对象，一个简单的替代品。清单 4-51 描述了需要运行以执行测试的测试类和测试方法。\n\n```\n\
  package com.apress.prospring6.four;\nimport static org.mockito.Mockito.mock;\nimport\
  \ static org.mockito.Mockito.when;\nimport static org.mockito.Mockito.verify;\n\
  import static org.mockito.Mockito.times;\nimport org.junit.jupiter.api.Test;\n//\
  \ 其他导入语句已省略\npublic class MessageRenderTest {\n@Test\nvoid testStandardOutMessageRenderer(){\n\
  MessageProvider mockProvider =  mock(MessageProvider.class);\nwhen(mockProvider.getMessage()).thenReturn(\"\
  test message\");\nMessageRenderer messageRenderer = new StandardOutMessageRenderer();\n\
  messageRenderer.setMessageProvider(mockProvider);\nmessageRenderer.render();\nverify(mockProvider,\
  \ times(1)).getMessage();\n}\n}\n清单 4-51\n使用 Mockito 对 StandardOutMessageRenderer\
  \ 进行单元测试\n```\n\n测试方法使用 Junit Jupiter 的 `@Test` 注解进行标注，这将其标记为测试方法。\n\n测试方法创建上下文，检查\
  \ Bean 的存在性以及调用 `render()` 方法的结果。测试也可以在调试模式下运行，并且可以使用断点暂停执行以检查对象以进行调试。\n\nIntelliJ\
  \ IDEA 可以运行测试类、包、模块或单个方法中的所有测试方法。只需右键单击组件，显示的菜单中应有一个“运行”选项。当您右键单击测试类的内容时，如果单击任何测试方法之外，选项将是运行所有方法；当您右键单击方法名称或方法体内部时，菜单中的“运行”选项特定于该方法。图\
  \ 4-5 显示了右键单击测试方法名称时出现的 IntelliJ IDEA 菜单。\n\n![](img/315511_6_En_4_Fig5_HTML.jpg)\n\
  \nIntelliJ IDEA 的屏幕截图。菜单上的播放按钮和运行消息渲染测试点 t e 的选项，用虚线框突出显示。\n\n图 4-5\n\nIntelliJ\
  \ IDEA 运行测试的选项\n\n图 4-5 还显示了文件左侧的两个按钮。单击类级别的按钮会展开一个菜单，其中包含运行测试类的选项组。单击方法级别的按钮会展开一个菜单，其中包含运行测试方法的选项组。请随意尝试这些按钮和选项以熟悉它们，然后继续阅读本书。\n\
  \n\n\n`testStandardOutMessageRenderer()` 方法独立验证了 `StandardOutMessageRenderer` 实现的行为。其行为不受应用程序中任何其他因素的影响；即使是对\
  \ `MessageProvider` 实例的依赖，也被替换为 Mockito 构建的模拟实现，并通过以下代码行配置了理想行为：`when(mockProvider.getMessage()).thenReturn(\"\
  test message\")`。\n\nMockito 的实用方法非常实用，因为它们也让测试代码极具可读性。`when(..)` 这行代码配置了当在此模拟对象上调用\
  \ `getMessage()` 方法时要返回的 `String` 值。这是如何工作的呢？实际上，Mockito 实现了 `MessageProvider` 接口来创建一个模拟对象，然后创建一个代理来拦截对其的调用。当我们调用\
  \ `when(..)` 方法时，实际上是在回调该上下文中最后注册的方法调用，而 `thenReturn()` 则为其保存返回值。无论如何，Mockito 对于隔离组件进行单元测试，或者减少集成测试中的层级数量以只关注感兴趣的片段，都非常有用。\n\
  \n![](img/315511_6_En_4_Figk_HTML.jpg)一条信息提示。 (Iuliana) 在我过去三年工作的公司里，我们很少编写单元测试，因为集成测试已经覆盖了单元测试所涵盖的行为。最近，我越来越认同这一点，因为搭建测试上下文需要付出努力，而为多个测试使用相同的上下文则让这种努力变得值得。\n\
  \n在本书中，我们将主要使用集成测试，但也会穿插介绍一些单元测试，足以让你熟悉它们并在将来能够识别。模拟依赖关系不止一种选择。JMock^(³³) 是一个可供选择的库。EasyMock^(³⁴)\
  \ 是另一个，而对于编写假设检查，可以看看 Hamcrest^(³⁵)。\n\n话虽如此，让我们切换到集成测试。\n\n### 实现一个集成测试\n\n在本节中，我们将为前面的示例实现集成测试。会创建一个配置来创建这些\
  \ Bean 并将它们连接在一起，以准备测试上下文。此配置用于创建测试应用程序上下文，测试将检查这两个 Bean 是否被正确创建。为了展示如何为集成测试聚合配置，`MessageProvider`\
  \ 和 `MessageRenderer` Bean 类型已在它们自己的包中声明，并带有它们自己的配置类，如图 4-6 所示。\n\n![](img/315511_6_En_4_Fig6_HTML.jpg)\n\
  \n一张截图展示了 Chapter 04 文件夹下的内容。4 个选项，com dot apress dot pro spring 6 dot four，i m\
  \ p 以及 provider 和 renderer 被高亮显示。\n\n图 4-6\n\n使用各自的配置组织 Bean\n\n在介绍创建 `ApplicationContext`\
  \ 的测试之前，我们通常会创建一个带有 `main(..)` 方法的类，但现在既然我们知道如何编写测试，那就试一试吧。清单 4-52 展示了一个测试方法，该方法测试包含两个\
  \ Bean 的 `ApplicationContext` 是否正确创建。\n\n```\npackage com.apress.prospring6.four;\n\
  import static org.junit.jupiter.api.Assertions.assertAll;\nimport static org.junit.jupiter.api.Assertions.assertEquals;\n\
  import static org.junit.jupiter.api.Assertions.assertNotNull;\n// 其他导入语句已省略\npublic\
  \ class MessageRenderOneIT {\n@Test\nvoid testConfig(){\nvar ctx = new AnnotationConfigApplicationContext(RendererConfig.class,\
  \ ProviderConfig.class);\nvar messageProvider = ctx.getBean(MessageProvider.class);\n\
  var messageRenderer = ctx.getBean(MessageRenderer.class);\nassertAll( \"messageTest\"\
  \ ,\n() -> assertNotNull(messageRenderer),\n() -> assertNotNull(messageProvider),\n\
  () -> assertEquals(messageProvider, messageRenderer.getMessageProvider())\n);\n\
  messageRenderer.render();\n}\n}\n清单 4-52\nStandardOutMessageRenderer 的集成测试\n```\n\
  \n与最初在 main 方法中创建 `ApplicationContext` 的方法相比，有三点观察：\n\n*   在测试方法中，可以使用测试实用方法。`assertAll(..)`\
  \ 方法和其他 JUnit Jupiter 实用方法被用来测试我们对作为上下文一部分创建的 Bean 的假设。\n\n*   `render()` 方法无法测试，因为它返回\
  \ `void`；我们只能检查控制台并查找打印出的 *Text Sample* 文本，就像我们使用 `main(..)` 方法所做的那样。\n\n*   测试在项目构建时运行，这意味着配置问题将被快速识别。\n\
  \n前面的测试方法是一种将逻辑从主模块迁移到测试模块的非常简单的方法。此外，这也不是高效的做法，因为如果我们在同一个类中编写更多的测试方法，每个方法都必须构建上下文。有多种方法可以重用测试上下文。清单\
  \ 4-53 展示了 JUnit 的方式。\n\n```\npackage com.apress.prospring6.four;\nimport org.junit.jupiter.api.BeforeAll;\n\
  // 其他导入语句已省略\npublic class MessageRenderTwoIT {\npublic static ApplicationContext\
  \ ctx;\n@BeforeAll\nstatic void setUp() {\nctx = new AnnotationConfigApplicationContext(RendererConfig.class,\
  \ ProviderConfig.class);\n}\n@Test\nvoid testProvider(){\nvar messageProvider =\
  \ ctx.getBean(MessageProvider.class);\nassertNotNull(messageProvider);\n}\n@Test\n\
  void testRenderer(){\nvar messageRenderer = ctx.getBean(MessageRenderer.class);\n\
  assertAll( \"messageTest\" ,\n() -> assertNotNull(messageRenderer),\n() -> assertNotNull(messageRenderer.getMessageProvider())\n\
  );\nmessageRenderer.render();\n}\n}\n清单 4-53\n使用共享测试上下文的 StandardOutMessageRenderer\
  \ 集成测试（JUnit 方式）\n```\n\n\n\n在 JUnit 方式下，测试方法之间共享测试上下文的方法是声明一个 `ApplicationContext`\
  \ 静态引用，并通过 `@BeforeAll` 注解告知 JUnit 仅调用一次 `setUp(..)` 方法来初始化该引用。这对于任何需要在测试方法之间共享的其他组件也同样适用。\n\
  \n![](img/315511_6_En_4_Figl_HTML.jpg)注意。 清单 4-53 中的示例展示了使用 JUnit Jupiter（也称为 JUnit\
  \ 5）注解编写的测试类。也可以使用 JUnit 4 编写等效的测试。如果您对使用 JUnit 4 感兴趣，请查阅本书的上一版。\n\n然而，最佳方式是 Spring\
  \ 方式。表 4-5 中介绍的 `@ContextConfiguration` 注解用于配置构建 `ApplicationContext` 的配置类，但为了将\
  \ Spring 测试上下文与 Jupiter 5 编程模型集成，还需要 `@ExtendWith` 注解以及 `SpringExtension.class`\
  \ 参数，因为这是我们为 Spring 配置扩展的方式。清单 4-54 展示了该类的代码。\n\n```\npackage com.apress.prospring6.four;\n\
  import org.junit.jupiter.api.extension.ExtendWith;\nimport org.springframework.test.context.ContextConfiguration;\n\
  import org.springframework.test.context.junit.jupiter.SpringExtension;\n// 其他导入语句已省略\n\
  @ExtendWith(SpringExtension.class)\n@ContextConfiguration(classes = {RendererConfig.class,\
  \ ProviderConfig.class})\npublic class MessageRenderThreeIT {\n@Autowired\nMessageRenderer\
  \ messageRenderer;\n@Autowired\nMessageProvider messageProvider;\n@Test\nvoid testProvider(){\n\
  assertNotNull(messageProvider);\n}\n@Test\nvoid testRenderer(){\nassertAll( \"messageTest\"\
  \ ,\n() -> assertNotNull(messageRenderer),\n() -> assertNotNull(messageRenderer.getMessageProvider())\n\
  );\nmessageRenderer.render();\n}\n}\n清单 4-54\nStandardOutMessageRenderer 的集成测试（Spring\
  \ 方式），使用共享测试上下文\n```\n\n由于 Spring 的 `ApplicationContext` 已与 Jupiter 编程模型集成，我们无需从上下文中提取\
  \ bean——只需在测试类中自动装配它们即可。\n\n如果您希望保持简单，JUnit Jupiter 在 `org.springframework.test.context.junit.jupiter`\
  \ 包中还提供了 `@SpringJUnitConfig` 注解，它可以替代 `@ExtendWith` + `@ContextConfiguration` 的组合。因此，\n\
  \n```\n@ExtendWith(SpringExtension.class)\n@ContextConfiguration(classes = {RendererConfig.class,\
  \ ProviderConfig.class})\n```\n\n可以替换为\n\n```\n@SpringJUnitConfig(classes = {RendererConfig.class,\
  \ ProviderConfig.class})\n```\n\n## 为集成测试配置 Profile\n\nSpring 3.1 引入的 Bean 定义 Profile\
  \ 功能对于使用测试组件的适当配置来实现测试用例非常有用。Profile 也适用于其他场景。例如，如果您正在开发一个与 Amazon DynamoDB 实例集成的应用程序，您可能不希望在该实例上进行开发或持续集成构建，以避免产生费用。因此，您可以配置一个开发\
  \ Profile，其中包含一个连接到本地 DynamoDb 容器（而非远程 Amazon DynamoDB 实例）的连接 Bean。\n\n您是否还在疑惑，既然我们可以将特定用途的\
  \ Bean 隔离到各自的配置文件中并仅导入它们，为什么还需要 Profile？当由于某些原因您无法这样做时，Profile 就派上了用场，因为您可以使用 `@Profile(..)`\
  \ 注解标记某些 Bean 定义，而保持其余 Bean 定义不变。\n\n例如，请看清单 4-55 中的配置类；它声明了一个未关联任何 Profile 的 `MessageRenderer`\
  \ Bean，以及一个关联到名为 `dev` 的 Profile 的 `MessageProvider` Bean。\n\n```\npackage com.apress.prospring6.four.impl;\n\
  import org.springframework.context.annotation.Profile;\n// 其他导入语句已省略\n@Configuration\n\
  public class AllConfig {\n@Profile(\"dev\")\n@Bean\nMessageProvider messageProvider(){\n\
  return new ConfigurableMessageProvider(\"Text Sample\");\n}\n@Bean\nMessageRenderer\
  \ messageRenderer(){\nMessageRenderer messageRenderer = new StandardOutMessageRenderer();\n\
  messageRenderer.setMessageProvider(messageProvider());\nreturn  messageRenderer;\n\
  }\n}\n清单 4-55\n包含关联到 Profile 的 Bean 的配置类\n```\n\n未关联任何 Profile 意味着，无论激活哪个 Profile，`MessageRenderer`\
  \ Bean 都将成为上下文的一部分，这正是我们感兴趣的，因为这是我们想要测试的 Bean。\n\n为了测试这个 Bean，我们需要在测试上下文中提供一个不同的\
  \ `MessageProvider` 依赖。我们通过声明一个名为 `TestMessageProvider` 的新 Bean 类型来实现，该类型实现了 `MessageProvider`\
  \ 但返回不同的消息。其实现很简单，因此此处不再展示。清单 4-56 展示了测试配置类（声明了一个关联到 `test` Profile 的 Bean 定义）、使用\
  \ `@ActiveProfiles(\"test\")` 注解激活 `test` Profile 的测试类，以及检查 `MessageRenderer` 是否按预期创建且注入的依赖是否为\
  \ `TestMessageProvider` 类型的测试方法。\n\n```\npackage com.apress.prospring6.four;\nimport\
  \ org.springframework.context.annotation.Profile;\nimport org.springframework.test.context.ActiveProfiles;\n\
  import org.springframework.test.context.junit.jupiter.SpringJUnitConfig;\n// 其他导入语句已省略\n\
  @Configuration\nclass TestConfig {\n@Profile(\"test\")\n@Bean\nMessageProvider messageProvider(){\n\
  return new TestMessageProvider(\"Test Message\");\n}\n}\n@ActiveProfiles(\"test\"\
  )\n@SpringJUnitConfig(classes = {AllConfig.class, TestConfig.class})\npublic class\
  \ MessageRenderFourIT {\n@Autowired\nMessageRenderer messageRenderer;\n@Autowired\n\
  MessageProvider messageProvider;\n@Test\nvoid testConfig(){\nassertAll( \"messageTest\"\
  \ ,\n() -> assertNotNull(messageRenderer),\n() -> assertNotNull(messageProvider),\n\
  () -> assertTrue(messageProvider instanceof TestMessageProvider),\n() -> assertEquals(messageProvider,\
  \ messageRenderer.getMessageProvider())\n);\nmessageRenderer.render();\n}\n}\n清单\
  \ 4-56\n测试配置类和带 Profile 的测试类\n```\n\n关于集成测试，目前就介绍这么多。随着本书的深入以及更复杂应用程序的构建，测试的复杂性也会增加，因此表\
  \ 4-5 中的几乎所有注解都将在需要时进行介绍和解释。\n\n### 实现前端单元测试\n\n另一个特别值得关注的测试领域是，在将 Web 应用程序部署到像\
  \ Apache Tomcat 这样的 Web 容器后，对前端行为进行整体测试。主要原因是，即使我们测试了应用程序中的每一层，我们仍然需要确保视图能够正确响应用户的不同操作。自动化前端测试对于节省开发者和用户在重复执行前端操作以进行测试用例时的时间非常重要。\n\
  \n然而，为前端开发测试用例是一项具有挑战性的任务，尤其是对于那些包含大量交互式、富媒体和基于 Ajax 组件的 Web 应用程序。这正是 Selenium 和其他\
  \ Web 测试自动化框架发挥作用的地方。\n\n\n\n### Selenium 简介\n\nSelenium 是一个功能强大且全面的工具和框架，旨在自动化基于\
  \ Web 的前端测试。其主要特点是，通过使用 Selenium，我们可以“驱动”浏览器，模拟用户与应用程序的交互，并对视图状态进行验证。\n\nSelenium\
  \ 支持常见的浏览器，包括 Firefox、IE 和 Chrome。在语言方面，Selenium 支持 Java、C#、PHP、Perl、Ruby 和 Python。Selenium\
  \ 在设计时也考虑到了 Ajax 和富互联网应用程序 (RIA)，使得现代 Web 应用程序的自动化测试成为可能。\n\n如果你的应用程序有大量前端用户界面，并且需要运行大量的前端测试，`selenium-server`\
  \ 模块提供了内置的网格功能，支持在一组计算机之间执行前端测试。\n\nSelenium IDE 是一个 Firefox 插件，可以帮助“录制”用户与 Web\
  \ 应用程序的交互。它还支持回放，并将脚本导出为各种格式，这有助于简化测试用例的开发。\n\n从 2.0 版本开始，Selenium 集成了 WebDriver\
  \ API，该 API 解决了许多限制，并提供了一个替代的、更简单的编程接口。其结果是一个全面的面向对象 API，为更多浏览器提供了额外支持，并改进了对现代高级\
  \ Web 应用程序测试问题的支持。\n\n前端 Web 测试是一个复杂的主题，超出了本书的范围。通过这个简要概述，你可以看到 Selenium 如何帮助自动化用户与\
  \ Web 应用程序前端的交互，并实现跨浏览器兼容性。更多详情，请参考 Selenium 的在线文档^(³⁶)。\n\n现在你已经对如何测试 Spring 应用程序有了基本了解，让我们换个话题，聊聊最受喜爱也最受憎恨的\
  \ Spring 项目之一：Groovy。\n\n## 使用 Groovy 进行配置\n\nSpring Framework 4.0 引入了使用 Groovy\
  \ 语言配置 Bean 定义和 `ApplicationContext` 的能力。这为开发者提供了另一种配置选择，可以替代或补充基于 XML 和/或注解的 Bean\
  \ 配置。Spring 的 `ApplicationContext` 可以直接在 Groovy 脚本中创建，也可以从 Java 中加载，两者都通过 `GenericGroovyApplicationContext`\
  \ 类实现。\n\n首先，让我们深入细节，展示如何从外部 Groovy 脚本创建 Bean 定义，并从 Java 加载它们。在前面的章节中，我们介绍了各种 Bean\
  \ 类，为了促进代码复用，在本例中我们将使用清单 4-57 中所示的 `Singer` 类。\n\n```\npackage com.apress.prospring6.four.groovy;\n\
  import org.apache.commons.lang3.builder.ToStringBuilder;\npublic class Singer {\n\
  private String name;\nprivate int age;\n@Override\npublic String toString() {\n\
  return new ToStringBuilder(this)\n.append(\"name\", name)\n.append(\"age\", age)\n\
  .toString();\n}\n// setters and getters omitted\n}\nListing 4-57\nSinger Class to\
  \ Be Used in Groovy Examples\n```\n\n如你所见，这只是一个带有几个描述歌手的属性的 Java 类。我们在这里使用这个简单的\
  \ Java 类是为了说明，仅仅因为你在 Groovy 中配置 Bean，并不意味着你的整个代码库都需要用 Groovy 重写。不仅如此，Java 类还可以从依赖项中导入，并在\
  \ Groovy 脚本中使用。现在，让我们创建用于定义 Bean 的 Groovy 脚本 (`beans.groovy`)，如清单 4-58 所示。\n\n```\n\
  import com.apress.prospring6.four.groovy.Singer\nbeans {\nsinger(Singer, name: 'John\
  \ Mayer', age: 42)\n}\nListing 4-58\nSinger Bean Groovy Definition\n```\n\n这个 Groovy\
  \ 脚本以一个名为 `beans` 的顶级闭包开始，它为 Spring 提供 Bean 定义。首先，我们指定 Bean 名称 (`singer`)，然后作为参数，我们提供类类型\
  \ (`Singer`)，接着是我们想要设置的属性名和值。接下来，让我们在 Java 中创建一个简单的测试驱动程序，从 Groovy 脚本加载 Bean 定义，如清单\
  \ 4-59 所示。\n\n```\npackage com.apress.prospring6.four.groovy;\nimport org.slf4j.Logger;\n\
  import org.slf4j.LoggerFactory;\nimport org.springframework.context.ApplicationContext;\n\
  import org.springframework.context.support.GenericGroovyApplicationContext;\npublic\
  \ class GroovyBeansFromJavaDemo {\nprivate static Logger logger = LoggerFactory.getLogger(GroovyBeansFromJavaDemo.class);\n\
  public static void main(String... args) {\nApplicationContext context =\nnew GenericGroovyApplicationContext(\"\
  classpath:spring/beans.groovy\");\nSinger singer = context.getBean(\"singer\", Singer.class);\n\
  logger.info(\"Singer bean: {}\", singer);\n}\n}\nListing 4-59\nTest Class to Test\
  \ Groovy Beans\n```\n\n如你所见，`ApplicationContext` 的创建是以典型方式进行的，但它是通过使用 `GenericGroovyApplicationContext`\
  \ 类并提供构建 Bean 定义的 Groovy 脚本来完成的。运行 `GroovyBeansFromJavaDemo` 应该会打印：\n\n```\nINFO\
  \ : GroovyBeansFromJavaDemo - Singer bean: com.apress.prospring6.four.groovy.Singer@272a179c[name=John\
  \ Mayer,age=42]\n```\n\n![](img/315511_6_En_4_Figm_HTML.jpg)一个警告。 使用 Groovy Bean\
  \ 定义时，你必须记住的唯一一件事是，`groovy-all` 库必须位于项目的类路径上。因此，无论你使用什么构建工具，无论是 Maven 还是 Gradle，请确保在你的配置文件中提及它。\n\
  \n现在你已经了解了如何通过外部 Groovy 脚本从 Java 加载 Bean 定义，那么如何仅从 Groovy 脚本创建 `ApplicationContext`\
  \ 和 Bean 定义呢？实际上，这并不复杂，而且 Groovy 语法比 Java 更简单，如清单 4-60 所示。\n\n```\npackage com.apress.prospring6.four.groovy\n\
  import org.springframework.beans.factory.groovy.GroovyBeanDefinitionReader\nimport\
  \ org.springframework.context.support.GenericApplicationContext\ndef ctx = new GenericApplicationContext()\n\
  def reader = new GroovyBeanDefinitionReader(ctx)\nreader.beans {\nsinger(Singer,\
  \ name: 'John Mayer', age: 42)\n}\nctx.refresh()\nprintln ctx.getBean(\"singer\"\
  )\nListing 4-60\nGroovy Script to Declare Beans and Use Them\n```\n\n当我们运行这个示例时，会得到与之前相同的输出，只是我们没有得到日志语句，因为这里没有使用日志记录器，而是简单的控制台输出。这次我们创建了一个典型的\
  \ `GenericApplicationContext` 实例，但使用了 `GroovyBeanDefinitionReader`，它将用于传递 Bean 定义。然后，与前面的示例一样，我们从简单的\
  \ POJO 创建一个 Bean，刷新 `ApplicationContext`，并打印 `Singer` Bean 的字符串表示。没有比这更简单的了！\n\n\
  你可能已经意识到，我们只是触及了 Spring 中 Groovy 支持所能实现功能的皮毛。由于你拥有 Groovy 语言的全部能力，在创建 Bean 定义时，你可以做各种有趣的事情。由于你可以完全访问\
  \ `ApplicationContext`，你不仅可以配置 Bean，还可以处理配置文件支持、属性文件等。请记住，能力越大，责任越大。\n\n\n\n## 使用\
  \ Spring Boot\n\n到目前为止，跟随本书的学习，你已经掌握了不止一种声明构成 Spring 应用程序的 Bean 的方法。但如果我们告诉你，还有比这些更酷的东西呢？\n\
  \nSpring Boot 项目旨在简化使用 Spring 构建应用程序的入门体验。Spring Boot 消除了手动收集依赖项的猜测工作，并提供了大多数应用程序所需的一些最常见功能，例如指标和健康检查。\n\
  \nSpring Boot 采用了一种“约定优于配置”的方法，通过为各种类型的应用程序提供已经包含适当依赖项和版本的起步项目，来实现简化开发人员工作的目标，这意味着花在入门上的时间更少。对于那些希望完全摆脱\
  \ XML 的人来说，Spring Boot 不需要在 XML 中编写任何配置。\n\n在本例中，我们将创建一个带有新意的传统 Hello World Web\
  \ 应用程序。与典型的 Java Web 应用程序设置相比，你可能会惊讶于所需的代码量之少。通常，我们通过定义需要添加到项目中的依赖项来开始示例。Spring\
  \ Boot 简化模型的一部分就是为你准备好所有依赖项，例如，当使用 Maven 时，作为开发人员，你利用一个父 POM 来获得此功能。当使用 Gradle 时，事情变得更加简单。除了一个\
  \ Gradle 插件和一个起步依赖项之外，不需要父 POM。如果你的项目足够简单，你可以使用 Spring Initializr 生成完整的配置，访问地址为\
  \ [`https://start.spring.io`](https://start.spring.io)；从那里下载基本结构和配置，然后根据你的需求开始自定义。**第**\
  \ **2** **章** 提到了 Spring Boot 的强大之处，并且本书项目的 Maven 设置使用了 Spring Boot 依赖管理来保持依赖版本兼容和项目稳定。Spring\
  \ Boot 强大且实用，但如果没有对 Spring 的正确理解，它可能会变成一个难以管理的庞然大物。幸运的是，你正在阅读这本书，所以你会没事的。\n\n闲话少说，让我们开始使用\
  \ Spring Boot 吧！\n\n在编写本章时，Spring Boot 3.0.0 版本尚未发布。这就是为什么该项目当前配置为使用版本 3.0.0-M2。到本书发布时，该项目将更新为官方发布版本。\n\
  \nSpring Boot 的每个版本都提供了其支持的依赖项列表。所选的必要库的版本能够完美匹配 API，这是由 Spring Boot 处理的。因此，不需要手动配置依赖版本。升级\
  \ Spring Boot 将确保这些依赖项也得到升级。通过之前的配置，一组依赖项将被添加到项目中，每个依赖项都具有适当的版本，以便它们的 API 兼容。在像\
  \ IntelliJ IDEA 这样的智能编辑器中，有一个 Maven（或 Gradle）项目视图，你可以在其中展开每个模块并检查可用的任务和依赖项，如图 4-7\
  \ 所示。\n\n![](img/315511_6_En_4_Fign_HTML.jpg)一个知识提示。 图 4-7 中的 Spring Boot 版本可能与本书附带的项目中的版本不同，具体取决于本书发布时的情况。其背后的原因是代码是在\
  \ Spring Boot 3 仍在开发中时编写的。Spring 6 也是如此。我们的意图是在出版前编辑本书并使用官方版本更新图片，但如果我们错过了这张图片，只要代码能运行，就知道这是没问题的。\n\
  \n![](img/315511_6_En_4_Fig7_HTML.jpg)\n\n一张截图展示了 pro spring 6 colon chapter 4 boot\
  \ 下的内容。在依赖项下，一个虚线框高亮显示了 o r g dot spring framework dot boot spring dot boot starter\
  \ 3 dot 0 dot 0 hyphen M 2。\n\n图 4-7\n\nSpring Boot 起步库和依赖项\n\n`chapter04-boot`\
  \ 项目非常简单，声明了一个简单的 Spring Boot 起步依赖项，即 `spring-boot-starter` 库。这个依赖项带来了一组 Spring\
  \ 依赖项及其依赖项，为构建 Spring 应用程序奠定了坚实的基础。Spring Boot 项目的入口点是应用程序类，即使用 `@SpringBootApplication`\
  \ 注解的类，在我们的例子中是 `Chapter4application` 类。当使用 Spring Initializr 生成 Spring Boot 项目时，这个类会生成一个带有空\
  \ `main(..)` 方法体的类，但我们喜欢做的是用几行代码来填充该方法体，这些代码列出应用程序上下文中的所有 Bean，如清单 4-61 所示。\n\n\
  ```\npackage com.apress.prospring6.four;\nimport org.slf4j.Logger;\nimport org.slf4j.LoggerFactory;\n\
  import org.springframework.boot.SpringApplication;\nimport org.springframework.boot.autoconfigure.SpringBootApplication;\n\
  import java.util.Arrays;\n@SpringBootApplication\npublic class Chapter4Application\
  \ {\nprivate static Logger logger = LoggerFactory.getLogger(Chapter4Application.class);\n\
  public static void main(String... args) {\nvar ctx = SpringApplication.run(Chapter4Application.class,\
  \ args);\nassert (ctx != null);\n// 列出所有 Bean 定义名称\nArrays.stream(ctx.getBeanDefinitionNames()).forEach(logger::info);\n\
  }\n}\n清单 4-61\n修改后的 Spring Boot 应用程序类，用于显示应用程序上下文中的所有 Bean\n```\n\n仅此而已。真的。我们添加的额外代码行是检查上下文是否已创建并列出上下文中的所有\
  \ Bean 名称。启动 Spring 应用程序所需的唯一语句是 `SpringApplication.run(Chapter4Application.class,\
  \ args)`。\n\n这里的新颖之处在于 `@SpringBootApplication` 注解。这个注解是一个顶级注解，设计为仅在类级别使用。它是一个便利注解，等同于声明以下三个注解：\n\
  \n*   `@SpringBootConfiguration`：指示此类为 Spring Boot 应用程序提供配置。它被 `@Configuration`\
  \ 元注解，这意味着此类可以使用 `@Bean` 声明 Bean。\n\n*   `@EnableAutoConfiguration`：这是一个来自 `org.springframework.boot.autoconfigure`\
  \ 包的特定 Spring Boot 注解，它允许基于项目依赖项创建一个默认的 Spring `ApplicationContext`，其中包含所有必要的基础设施\
  \ Bean。`@EnableAutoConfiguration` 与 Spring 提供的起步依赖项配合良好，但并不直接绑定到它们，因此也可以使用起步依赖项之外的其它依赖项。例如，如果类路径上有一个特定的嵌入式服务器，它将被使用，除非项目中存在另一个\
  \ `EmbeddedServletContainerFactory` 配置。这是 Spring Boot 实用性的核心要素；它配置了稳定的默认基础设施 Bean，但也易于自定义。\n\
  \n*   `@ComponentScan`：启用对带有构造型注解的类的发现。与 `@SpringBootApplication` 一起使用的用于列出要扫描的包的属性是\
  \ `basePackages`。在 1.3.0 版本中，此注解添加了另一个属性：`basePackageClasses`。此属性为指定要扫描带注解组件的包提供了\
  \ `basePackages` 的类型安全替代方案。将扫描指定的每个类的包。默认情况下，`@SpringBootApplication` 启用对声明应用程序类的包及其所有子包的扫描。\n\
  \n\n\n如果你运行了 `Chapter4Application` 调用，可能会注意到 Spring Boot 上下文中的基础设施 bean 数量远高于简单\
  \ Spring Classic 应用上下文中的 bean 数量。能够直接声明 bean 并运行 Spring 应用是有代价的：你避免了设置上下文的工作，让 Spring\
  \ Boot 代劳。最基本的 Spring Boot 应用上下文是基于经验丰富的开发者的决策设计的，他们在长期使用 Spring 后，识别出各种 Spring\
  \ 应用中常用的典型组件，并将其整合到默认设置中，打包进 Spring Boot 起步依赖。有多个 Spring Boot 起步依赖，每个都针对正在构建的应用：`spring-boot-starter`\
  \ 用于包含可互操作 bean 和写入日志的最简单 Spring 应用；`spring-boot-starter-jpa` 用于管理数据库中存储数据的简单 Spring\
  \ 应用；`spring-boot-starter-web` 用于创建基本的 Spring Web 应用；等等。所有这些起步依赖将在本书的相应章节中详细介绍和解释。\n\
  \n现在，让我们修改这个 Spring Boot 应用，添加我们之前使用过的 `MessageProvider` 和 `MessageRenderer` bean。我们只需执行以下操作：\n\
  \n*   修改配置文件，为声明这两个接口的 `chapter02` 项目添加 Maven/Gradle 依赖。\n\n*   将 `ConfigurableMessageProvider`\
  \ 和 `StandardOutMessageRenderer` 类复制到 `chapter04-boot` 项目中，并确保它们在必要时使用 `@Component`\
  \ 和 `@Autowired` 注解。\n\n*   修改 `Chapter4Application` 类以访问 `MessageRenderer` 并调用\
  \ `render()`。\n\n清单 4-62 展示了所有这些更改，并且 bean 定义已添加到 `WithBeansApplication` 文件中，以便将所有内容保持在同一个上下文中，彼此靠近。*（在浏览项目时，你会感谢我们的！）*\n\
  \n```\npackage com.apress.prospring6.four.beans;\nimport com.apress.prospring6.two.decoupled.MessageProvider;\n\
  import com.apress.prospring6.two.decoupled.MessageRenderer;\nimport org.springframework.boot.SpringApplication;\n\
  import org.springframework.boot.autoconfigure.SpringBootApplication;\n// 其他导入语句已省略\n\
