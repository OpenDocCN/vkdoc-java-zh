  ## 总结


  在本章中，我们涵盖了与使用 Spring MVC 进行 Web 开发相关的许多主题。首先，我们讨论了 MVC 模式的高级概念。然后，我们介绍了 Spring MVC
  的架构，包括其 `WebApplicationContext` 层次结构、请求处理生命周期和配置。


  接下来，你学习了如何使用 Spring MVC 和 Thymeleaf 作为视图技术开发一个示例歌手管理应用程序。在开发示例的过程中，我们详细阐述了不同的领域。主要主题包括
  i18n、主题化以及 Thymeleaf 的模板支持。


  为了将 Spring Web 应用程序与视图技术集成，至少需要一个实现 Spring 的 `org.springframework.web.servlet.ViewResolver`
  的自定义 bean。Thymeleaf 也是一种模板视图技术，因此其 `ViewResolver` 实现依赖于 `SpringTemplateEngine` 和
  `SpringResourceTemplateResolver`。


  并且，由于 Spring Boot 是 Spring 团队的神奇特性，因此必须介绍如何使用它构建一个完整的 Web 应用程序。在下一章中，我们将通过介绍 REST
  请求来涵盖 Spring 在 Web 应用程序开发方面带来的更多特性。


