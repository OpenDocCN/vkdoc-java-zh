  注入到 `DBInitializer` 中的 `CarRepository` Bean 是一个典型的 Spring Data 仓库，它是一个扩展了 `CrudRepository<Car,
  Long>` 的接口。同一个 Bean 也被注入到清单 12-10 所描述的 `CarServiceImpl` 类中。


  ```

  package com.apress.prospring6.twelve.service;

  // import statements omitted

  import org.springframework.scheduling.annotation.Scheduled;

  @Service("carService")

  @Repository

  @Transactional

  public class CarServiceImpl implements CarService {

  public boolean done;

  final Logger LOGGER = LoggerFactory.getLogger(CarServiceImpl.class);

  private final CarRepository carRepository;

  public CarServiceImpl(CarRepository carRepository) {

  this.carRepository = carRepository;

  }

  @Override

  @Transactional(readOnly=true)

  public Stream findAll() {

  return  StreamSupport.stream(carRepository.findAll().spliterator(), false);

  }

  @Override

  public Car save(Car car) {

  return carRepository.save(car);

  }

  @Override

  @Scheduled(fixedDelay=10000)

  public void updateCarAgeJob() {

  var cars = findAll();

  var currentDate = LocalDate.now();

  LOGGER.info("Car age update job started");

  cars.forEach(car -> {

  var p = Period.between(car.getManufactureDate(), currentDate);

  int age = p.getYears();

  car.setAge(age);

  save(car);

  LOGGER.info("Car age update --> {}" , car);

  });

  LOGGER.info("Car age update job completed successfully");

  done = true;

  }

  @Override

  public boolean isDone() {

  return done;

  }

  }

  清单 12-10

  CarServiceImpl 类

  ```


  `CarServiceImpl` 类包含四个方法：


  *   `Stream<Car> findAll()`：检索所有汽车的信息。

  *   `Car save(Car car)`：持久化一个更新后的 `Car` 对象。

  *   `void` `updateCarAgeJob()`：需要定期运行的任务，用于根据汽车的制造日期和当前日期更新车龄。注意其上的 `@Scheduled`
  注解。它将该方法配置为大约每 10 秒执行一次。

  *   `boolean isDone()`：一个实用方法，用于了解任务何时结束，以便应用程序可以优雅地关闭。


  唯一缺少的是启用任务调度的 Spring 应用程序配置。`TaskSchedulingConfig` 类如清单 12-11 所示。


  ```

  package com.apress.prospring6.twelve.config;

  import org.springframework.context.annotation.ComponentScan;

  import org.springframework.context.annotation.Configuration;

  import org.springframework.scheduling.annotation.EnableScheduling;

  @Configuration

  @ComponentScan(basePackages  = {"com.apress.prospring6.twelve"} )

  @EnableScheduling

  public class TaskSchedulingConfig {

  }

  清单 12-11

  TaskSchedulingConfig 类

  ```


  在 `@Configuration` 类上使用的 `@EnableScheduling` 注解会启用对容器中任何 Spring 管理的 Bean 或其方法上的
  `@Scheduled` 注解的检测。带有 `@Scheduled` 注解的方法甚至可以直接在 `@Configuration` 类中声明，因为配置类本身也是
  Bean。从 Spring 4.2 开始，任何作用域的 Bean 都支持 `@Scheduled` 方法。此注解告诉 Spring 查找关联的调度器定义：要么是上下文中唯一的
  `TaskScheduler` Bean，要么是名为 `taskScheduler` 的 `TaskScheduler` Bean，要么是一个 `ScheduledExecutorService`
  Bean。如果未找到，则会创建并使用一个本地的单线程默认调度器来执行计划任务。要调度 Spring Bean 中的特定方法，该方法必须使用 `@Scheduled`
  注解并传入调度要求。


