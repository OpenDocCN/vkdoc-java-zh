  \ - Getting transaction for\n[org.springframework.data.jpa.repository.support.SimpleJpaRepository.findAll]\n\
  清单 10-7\nSingerServiceTest 执行日志片段\n```\n\n配置的包 `com.apress.prospring6.ten.repos`\
  \ 及其子包被扫描，并且 `SingerRepository` 接口被识别为创建 Repository 实例的候选（标记为 <1> 的行）。\n\n此日志的特别之处在于，似乎为被调用的\
  \ Repository 实例方法创建了一个事务（标记为 <2> 的行）。那么，这是怎么回事呢？实际上，支持代理的类是 `org.springframework.data.jpa.repository.support.SimpleJpaRepository<T,\
  \ ID>`，如果你查看 Spring 代码^(⁸⁷)，你会注意到这个类被注解了 `@Transactional(readOnly = true)`。这就是 Repository\
  \ 方法事务的来源。之所以需要它们，是因为任何 JPA 操作都应在事务上下文中执行；这样，在发生错误时，回滚将确保数据库保持良好状态。这显然意味着，对于仅调用单个\
  \ Repository 方法的服务方法，不需要额外的事务。即使配置了，由于默认的传播模式是 `PROPAGATION_REQUIRED`（标记为 <3> 的行），服务方法将在与\
  \ Repository 方法相同的事务内执行。\n\n在讨论更复杂的查询以及如何支持调用它们之前，我们先来谈谈 `JpaRepository<T, ID>`\
  \ 接口。\n\n### 使用 `JpaRepository`\n\n`JpaRepository<T, ID>` 接口是比 `CrudRepository<T,\
  \ ID>` 更高级的 Spring 接口，它可以使创建自定义 Repository 更加容易。`JpaRepository<T, ID>` 接口提供了批量、分页和排序操作。图\
  \ 10-3 展示了 `JpaRepository<T, ID>` 与 `CrudRepository<T, ID>` 接口之间的关系。\n\n![](img/315511_6_En_10_Fig3_HTML.jpg)\n\
  \nSpring Data JPA Repository 的层次结构。从 JPA Repository 开始，依次经过 Query by Example Executor、Repository\
  \ Paging and Sorting 和 Repository。\n\n图 10-3\n\nSpring Data `JpaRepository<T, ID>`\
  \ 层次结构\n\n根据应用程序的复杂程度，你可以选择使用 `CrudRepository<T, ID>` 或 `JpaRepository<T, ID>`。从图\
  \ 10-3 可以看出，`JpaRepository<T, ID>` 扩展了 `CrudRepository<T, ID>`，因此提供了所有相同的功能。\n\n\
  \n\n### 使用自定义查询的 Spring Data JPA\n\n在复杂的应用程序中，你可能需要无法被 Spring “推断”出来的自定义查询。\n\n\
  在前面的章节中，我们展示了使用 `@NamedQuery` 注解声明的命名查询，为查询执行提供支持的方法，无论是通过 Hibernate 的 `Session`\
  \ 还是 `EntityManager`。Spring Data 仓库也支持命名查询。Spring Data 会尝试将开发者声明的方法调用解析为一个命名查询，该查询以配置的领域类的简单名称开头，后跟由点分隔的方法名。这种命名查询的方式在使用\
  \ Hibernate 的 `Session` 或 `EntityManager` 时也曾使用过，目的就是为了让过渡更实用。然而，Spring Data 的命名查询确实存在一些限制；例如，不支持命名参数。为了举例说明，考虑一个用于选择发行日期晚于\
  \ `2010-01-01` 的专辑的命名查询。清单 10-8 展示了包含该命名查询的关键代码片段。\n\n```\npackage com.apress.prospring6.ten.entities;\n\
  import jakarta.persistence.NamedQuery;\n// 其他导入语句已省略\n@Entity\n@Table(name = \"\
  ALBUM\")\n@NamedQuery(name=Album.FIND_WITH_RELEASE_DATE_GREATER_THAN, query=\"select\
  \ a from Album a where a.releaseDate > ?1\")\npublic class Album extends AbstractEntity\
  \ {\n@Serial\nprivate static final long serialVersionUID = 3L;\npublic static final\
  \ String FIND_WITH_RELEASE_DATE_GREATER_THAN = \"Album.findWithReleaseDateGreaterThan\"\
  ;\n@Column\nprivate String title;\n@Column(name = \"RELEASE_DATE\")\nprivate LocalDate\
  \ releaseDate;\n@ManyToOne\n@JoinColumn(name = \"SINGER_ID\")\nprivate Singer singer;\n\
  // 其余代码已省略\n}\n清单 10-8\n包含命名查询的 Album 实体\n```\n\n对于需要命名参数的情况，必须使用 `@Query` 注解显式定义查询。我们将使用此注解来搜索标题中包含\
  \ `The` 的所有音乐专辑。清单 10-9 描述了 `AlbumRepository` 接口。\n\n```\npackage com.apress.prospring6.ten.repos;\n\
  import org.springframework.data.jpa.repository.Query;\nimport org.springframework.data.repository.query.Param;\n\
  // 其他导入语句已省略\npublic interface AlbumRepository extends JpaRepository {\nIterable\
  \ findBySinger(Singer singer);\nIterable findWithReleaseDateGreaterThan(LocalDate\
  \ rd);\n@Query(\"select a from Album a where a.title like %:title%\")\nIterable\
  \ findByTitle(@Param(\"title\") String t);\n}\n清单 10-9\n包含命名查询和 @Query 方法的 AlbumRepository\n\
  ```\n\nSpring Data 将 `findWithReleaseDateGreaterThan(..)` 方法与名为 `Album.findWithReleaseDateGreaterThan`\
  \ 的查询匹配。`findByTitle(..)` 方法的查询有一个名为 `title` 的命名参数。当命名参数的名称与 `@Query` 注解方法中参数名称相同时，则不需要\
  \ `@Param` 注解。如果方法参数具有不同的名称，则需要使用 `@Param` 注解来告诉 Spring 该参数的值将被注入到查询中的命名参数中。\n\n\
  `AlbumServiceImpl` 服务类非常简单，仅使用 `albumRepository` bean 来调用其方法。它在清单 10-10 中描述。\n\n\
  ```\npackage com.apress.prospring6.ten.service;\n// 其他导入语句已省略\nimport java.util.stream.Stream;\n\
  import java.util.stream.StreamSupport;\n@Service\n@Transactional(readOnly = true)\n\
  public class AlbumServiceImpl implements AlbumService {\nprivate final AlbumRepository\
  \ albumRepository;\npublic AlbumServiceImpl(AlbumRepository albumRepository) {\n\
  this.albumRepository = albumRepository;\n}\n@Override\npublic Stream findBySinger(Singer\
  \ singer) {\nreturn StreamSupport.stream(albumRepository.findBySinger(singer).spliterator(),\
  \ false);\n}\n@Override\npublic Stream findWithReleaseDateGreaterThan(LocalDate\
  \ rd) {\nreturn StreamSupport.stream(albumRepository.findWithReleaseDateGreaterThan(rd).spliterator(),\
  \ false);\n}\n@Override\npublic Stream findByTitle(String title) {\nreturn StreamSupport.stream(albumRepository.findByTitle(title).spliterator(),\
  \ false);\n}\n}\n清单 10-10\n调用 AlbumRepository 方法的 AlbumServiceImpl 服务\n```\n\n`findBySinger(..)`\
  \ 查询很简单，Spring Data 能够自行解析它。因此，测试类将不涵盖此查询。你可以自行编写此查询的测试。清单 10-11 展示了针对两个稍微复杂查询的测试类。\n\
  \n```\npackage com.apress.prospring6.ten;\n// 导入语句已省略\n@Testcontainers\n@Sql({ \"\
  classpath:testcontainers/drop-schema.sql\", \"classpath:testcontainers/create-schema.sql\"\
  \ })\n@SpringJUnitConfig(classes = {AlbumServiceTest.TestContainersConfig.class})\n\
  public class AlbumServiceTest extends TestContainersBase {\nprivate static final\
  \ Logger LOGGER = LoggerFactory.getLogger(AlbumServiceTest.class);\n@Autowired\n\
  AlbumService albumService;\n@Test\npublic void testFindWithReleaseDateGreaterThan(){\n\
  var albums = albumService\n.findWithReleaseDateGreaterThan(LocalDate.of(2010, 1,\
  \ 1))\n.peek(s -> LOGGER.info(s.toString())).toList();\nassertEquals(2, albums.size());\n\
  }\n@Test\npublic void testFindByTitle(){\nvar albums = albumService\n.findByTitle(\"\
  The\")\n.peek(s -> LOGGER.info(s.toString())).toList();\nassertEquals(1, albums.size());\n\
  }\n// 测试配置类已省略\n}\n清单 10-11\nAlbumServiceTest 类\n```\n\nSpring Data 仓库功能强大且用途广泛。使用\
  \ `@Query` 注解的方法也支持排序，只需添加一个 `org.springframework.data.domain.Sort` 参数即可。使用 `@Query`\
  \ 注解声明的查询甚至支持 SpEL 表达式。\n\n本节中的示例仅展示了读取数据的查询。修改数据的查询还需要使用 `@Modifying` 注解。举例来说，修改\
  \ `SingerRepository` 以添加一个根据 `id` 更改歌手记录名字的查询。方法声明如清单 10-12 所示。\n\n```\nPackage\
  \ com.apress.prospring6.ten.repos;\n// 其他导入语句已省略\nimport org.springframework.data.jpa.repository.Modifying;\n\
  public interface SingerRepository extends CrudRepository {\n// 其他方法声明已省略\n@Modifying(clearAutomatically\
  \ = true)\n@Query(\"update Singer s set s.firstName = ?1 where s.id = ?2\")\nint\
  \ setFirstNameFor(String firstName, Long id);\n}\n清单 10-12\n使用 @Modifying 注解的 Spring\
  \ Data 查询方法\n```\n\n`@Modifying` 注解设计为仅与 `@Query` 注解一起使用，单独使用没有意义。如果单独使用，Spring\
  \ Data 会忽略它。\n\n`@Modifying` 注解支持两个属性：\n\n*   `flushAutomatically`：当设置为 `true`（默认为\
  \ `false`）时，会导致底层持久化上下文在*执行*修改查询*之前*被刷新。\n\n*   `clearAutomatically`：当设置为 `true`（默认为\
  \ `false`）时，会导致底层持久化上下文在*执行*修改查询*之后*被清除。这意味着更改后的实体在此方法执行后立即持久化到数据库。\n\n\n\n`setFirstNameFor(..)`\
  \ 方法被标注为 `@Modifying(clearAutomatically = true)` 的原因在于：在服务方法中，会调用此方法执行更新操作，随后通过\
  \ `findById(id)` 仓库方法从数据库检索待返回的实体。由于变更会在事务结束时刷新，而我们无法控制其具体时机，因此返回的实体可能并非更新后的版本。\n\
  \n更有趣的是，调用 `setFirstNameFor(..)` 的服务方法会返回更新后的实例，这正好可供我们测试。该服务方法如清单 10-13 所示。\n\n\
  ```\npackage com.apress.prospring6.ten.service;\n// 导入语句已省略\n@Service\n@Transactional\n\
  public class SingerServiceImpl implements SingerService {\nprivate final SingerRepository\
  \ singerRepository;\npublic SingerServiceImpl(SingerRepository singerRepository)\
  \ {\nthis.singerRepository = singerRepository;\n}\n// 其他方法已省略\n@Transactional(propagation\
  \ = Propagation.REQUIRES_NEW, label = \"modifying\")\n@Override\npublic Singer updateFirstName(String\
  \ firstName, Long id) {\nsingerRepository.findById(id).ifPresent(s ->\nsingerRepository.setFirstNameFor(firstName,\
  \ id));\nreturn  singerRepository.findById(id).orElse(null);\n}\n}\n清单 10-13\n调用\
  \ @Modified 注解的 Spring Data 查询方法的服务方法\n```\n\n测试方法如清单 10-14 所示。\n\n```\npackage\
  \ com.apress.prospring6.ten;\n// 其他导入语句已省略\nimport org.springframework.test.annotation.Rollback;\n\
  @Testcontainers\n@SqlMergeMode(SqlMergeMode.MergeMode.MERGE)\n@Sql({ \"classpath:testcontainers/drop-schema.sql\"\
  , \"classpath:testcontainers/create-schema.sql\" })\n@SpringJUnitConfig(classes\
  \ = {SingerServiceTest.TestContainersConfig.class})\npublic class SingerServiceTest\
  \ extends TestContainersBase {\n@Rollback\n@Test\n@SqlGroup({\n@Sql(scripts = {\"\
  classpath:testcontainers/add-nina.sql\"},\nexecutionPhase = Sql.ExecutionPhase.BEFORE_TEST_METHOD),\n\
  })\n@DisplayName(\"应更新歌手姓名\")\npublic void testUpdateFirstNameByQuery(){\nvar nina\
  \ = singerService.updateFirstName(\"Eunice Kathleen\", 5L);\nassertAll( \"nina 未更新\"\
  \ ,\n() -> assertNotNull(nina),\n() -> assertEquals(\"Eunice Kathleen\", nina.getFirstName())\n\
  );\n}\n}\n清单 10-14\n调用 @Modified 注解的 Spring Data 查询方法的服务方法的测试方法\n```\n\n![](img/315511_6_En_10_Figb_HTML.jpg)信息图标。 请注意，此处并未使用\
