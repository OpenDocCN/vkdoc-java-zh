  正如我们所料，只有前两次对 `sing({key})` 方法的调用被通知了。请注意，`sing()` 调用也经历了动态检查，这要归功于检查方法名称的静态检查。这里值得注意的一点是，`sing({key})`
  方法经历了两次静态检查：一次是在初始阶段检查所有方法时，另一次是在它首次被调用时。这就是日志中包含这么多 `Static check for sing` 条目的原因。


  ![](img/315511_6_En_5_Figc_HTML.jpg)一个警告。 如你所见，动态切入点比静态切入点提供了更大程度的灵活性，但由于它们需要额外的运行时开销，因此只有在绝对必要时才应使用动态切入点。




  ### 使用简单名称匹配


  在创建切点时，我们通常希望仅根据方法名称进行匹配，而忽略方法签名和返回类型。在这种情况下，你无需创建 `StaticMethodMatcherPointcut`
  的子类，而是可以使用 `NameMatchMethodPointcut`（它是 `StaticMethodMatcherPointcut` 的子类）来匹配一个方法名称列表。当你使用
  `NameMatchMethodPointcut` 时，不会考虑方法的签名，因此如果你有 `sing()` 和 `sing({key})` 方法，它们都会匹配名称
  `sing()`。


  在清单 5-15 的代码片段中，你可以看到 `GrammyGuitarist` 类，它是 `Singer` 的另一个实现，因为这位格莱美获奖歌手用他的嗓音唱歌，使用吉他，并且作为人类，在表演过程中偶尔会说话和休息。


  ```

  package com.apress.prospring6.five.common;

  public class GrammyGuitarist implements Singer {

  private static Logger LOGGER = LoggerFactory.getLogger(GrammyGuitarist.class);

  @Override

  public void sing() {

  LOGGER.info("sing: Gravity is working against me\n" +

  "And gravity wants to bring me down");

  }

  public void sing(Guitar guitar) {

  LOGGER.info("play: " + guitar.play());

  }

  public void talk(){

  LOGGER.info("talk");

  }

  @Override

  public void rest(){

  LOGGER.info("zzz");

  }

  }

  public class Guitar {

  public String play(){

  return "G C G C Am D7";

  }

  }

  清单 5-15

  GrammyGuitarist 实现

  ```


  对于这个示例，我们希望使用 `NameMatchMethodPointcut` 来匹配 `sing()`、`sing(Guitar)` 和 `rest()` 方法。这转化为匹配名称
  `sing` 和 `rest`。如清单 5-16 所示。


  ```

  package com.apress.prospring6.five.pointcut;

  import org.springframework.aop.support.NameMatchMethodPointcut;

  // 其他导入语句已省略

  public class NamePointcutDemo {

  public static void main(String... args) {

  GrammyGuitarist johnMayer = new GrammyGuitarist();

  NameMatchMethodPointcut pc = new NameMatchMethodPointcut();

  pc.addMethodName("sing");

  pc.addMethodName("rest");

  Advisor advisor = new DefaultPointcutAdvisor(pc, new SimpleAroundAdvice());

  ProxyFactory pf = new ProxyFactory();

  pf.setTarget(johnMayer);

  pf.addAdvisor(advisor);

  GrammyGuitarist proxy = (GrammyGuitarist) pf.getProxy();

  proxy.sing();

  proxy.sing(new Guitar());

  proxy.rest();

  proxy.talk();

  }

  }

