  ### 模拟 JDBC 操作的 Spring 类


  在前一节中，您已经了解了 `JdbcTemplate` 及其相关的数据映射工具类如何极大地简化了使用 JDBC 开发数据访问逻辑的编程模型。基于 `JdbcTemplate`，Spring
  还提供了一系列有用的类来模拟 JDBC 数据操作，并允许开发者以更面向对象的方式维护从 `ResultSet` 到领域对象的查询和转换逻辑。具体来说，本节将介绍以下内容：


  *   `MappingSqlQuery<T>`：`MappingSqlQuery<T>` 抽象类允许您将查询 `String` 与 `mapRow()` 方法封装到一个单独的类中。


  *   `SqlUpdate`：`SqlUpdate` 类允许您将任何 SQL 更新语句封装到其中。它还提供了许多有用的功能，用于绑定 SQL 参数、在插入新记录后检索
  RDBMS 生成的键等。


  *   `BatchSqlUpdate`：顾名思义，该类允许您执行批量更新操作。例如，您可以遍历一个 Java `List` 对象，让 `BatchSqlUpdate`
  将记录排队，并为您批量提交更新语句。您可以随时设置批量大小并刷新操作。


  *   `SqlFunction<T>`：`SqlFunction<T>` 类允许您调用数据库中的存储函数，并指定参数和返回类型。另一个类 `StoredProcedure`
  也帮助您调用存储过程。


