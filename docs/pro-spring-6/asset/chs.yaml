  为简单起见，我们将不使用服务 Bean，而是直接实现 GraphQL 控制器。Spring for GraphQL 提供了一种基于注解的编程模型，其中 `@Controller`
  组件使用特定的 GraphQL 注解来装饰具有灵活签名的方法，以便为特定的 GraphQL 字段获取数据。让我们考虑一个最简单的示例：查询所有歌手。清单 16-16
  展示了一个控制器，其中包含一个用于响应检索所有歌手的 GraphQL 查询的处理方法。


  ```

  package com.apress.prospring6.sixteen.boot.controllers;

  import org.springframework.graphql.data.method.annotation.QueryMapping;

  import org.springframework.stereotype.Controller;

  // 其他导入语句已省略

  @Controller

  public class SingerController {

  private final SingerRepo singerRepo;

  public SingerController(SingerRepo singerRepo) {

  this.singerRepo = singerRepo;

  }

  @QueryMapping

  public Iterable singers(){

  return singerRepo.findAll();

  }

  // 其他处理方法已省略

  }

  清单 16-16

  用于返回歌手表中所有歌手的 GraphQL 处理方法

  ```


  `@Controller` 注解与本书前面介绍的构造型注解相同。Spring Boot 会自动扫描到它，并将所有 `org.springframework.graphql.execution.RuntimeWiringConfigurer`
  Bean 添加到 `org.springframework.graphql.execution.GraphQlSource.Builder` 中，并启用对带注解的
  `graphql.schema.DataFetcher` 实例的支持。


  `@QueryMapping` 注解将方法绑定到一个查询，即 `Query` 类型下的一个 GraphQL 字段。`@QueryMapping` 是一个组合注解，相当于
  `typeName="Query"` 的 `@SchemaMapping` 的快捷方式。这是将控制器方法映射到 GraphQL 查询的一种实用方法。你可以将 `@SchemaMapping`
  视为 GraphQL 的 `@RequestMapping`。


  现在我们有了一个处理方法，接下来需要配置 GraphQL 模式，包括对象、查询和变更定义。这三个术语是 GraphQL 的核心术语。如前所述，GraphQL 是静态类型的，这意味着服务器确切知道你可以查询的每个对象的形状，并且任何客户端实际上都可以“自省”服务器并请求“模式”。这些类型在位于
  `resources/graphql` 下的模式文件中声明，它们映射到任何类型的 GraphQL 操作中涉及的所有对象。


  清单 16-17 展示了在 `resources/graphql/singer.graphqls` 中声明的 `Singer` 对象模式和 `singers`
  查询定义。


  ```

  type Singer {

  id: ID!

  firstName: String!

  lastName: String!

  pseudonym: String

  genre: String

  birthDate: String

  awards: [Award]

  instruments: [Instrument]

  }

  type Query {

  singers: [Singer]

  }

