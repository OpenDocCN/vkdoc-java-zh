  \ 响应式服务类\n```\n\n粗体行显示了那些用于检查服务层异常（而非 Spring Data 异常）被抛出的测试。底层异常的类型在注释中已标明。\n\n\
  对于所有这些情况，我们选择使用 `onErrorMap(..)` 将异常转换为更有用的形式。然而，Project Reactor 提供了六种方法来处理其响应式类型（`Mono<T>`、`Flux<T>`）上的错误，具体列出和说明如下：\n\
  \n*   `onErrorReturn(..)`：声明一个默认值，当处理器中抛出异常时发出该值。此方法不会以任何方式阻碍数据流；当处理有问题的元素时，会发出默认值，而流中的其余元素将正常处理。此方法有三个版本：\n\
  \    *   一个版本将返回值作为参数。\n\n*   一个版本将返回值和异常类型作为参数，当该类型异常发生时返回默认值。\n\n*   一个版本将返回值和异常谓词作为参数，当异常匹配该谓词时返回默认值。\n\
  \n*   `onErrorResume()`：声明一个默认函数，用于在处理器抛出异常时选择一个备用的 `Publisher<T>`。它同样具有上述三种变体。对于有问题的元素，会使用选定的\
  \ `Publisher<T>` 发出一个值，而流中的其余元素将正常处理。\n\n*   `onErrorContinue(..)`：声明一个消费者，用于在处理器抛出异常时执行。此方法也有三种变体，与\
  \ `onErrorReturn(..)` 的描述相同，但不同之处在于它执行消费者而不是返回值。它使用声明的消费者处理有问题的元素，而对于正常的元素，则保持下游链不变。\n\
  \n*   `doOnError(..)`：消费错误并停止对流中后续元素的执行。它也有相同的三种变体，但在消费者执行后，错误会向下游传播。\n\n*   `onErrorMap(..)`：将一种错误转换为另一种错误，并停止对流中后续元素的执行。\n\
  \n由于测试上下文没有事务管理器，因此测试不是事务性的。几个服务测试能够通过，证明了响应式服务层也能正常工作，因此我们现在可以通过添加响应式控制器来继续实现。\n\
  \n### 响应式控制器\n\n之前提到过，响应式控制器无非就是一个包含返回 `Flux<T>` 和 `Mono<T>` 的处理方法的控制器。这对于 REST\
  \ 控制器是有意义的，因为对于一个返回逻辑视图名称的控制器处理方法来说，响应式没有意义，因为它不会带来任何好处。话虽如此，我们来看一下清单 20-15，它展示了一个用于管理\
  \ `Singer` 实例的 REST 控制器。\n\n```\npackage com.apress.prospring6.twenty.boot.controller;\n\
  import org.springframework.http.HttpStatus;\nimport org.springframework.http.ResponseEntity;\n\
  import reactor.core.publisher.Flux;\nimport reactor.core.publisher.Mono;\n// 其他导入语句已省略\n\
  @Slf4j\n@RequiredArgsConstructor\n@RestController\n@RequestMapping(path = \"/reactive/singer\"\
  )\npublic class ReactiveSingerController {\nprivate final SingerService singerService;\n\
  /* 1 */\n@GetMapping(path = {\"\", \"/\"})\npublic Flux list() {\nreturn singerService.findAll();\n\
  }\n/* 3 */\n@GetMapping(path = \"/{id}\")\npublic Mono> findById(@PathVariable Long\
  \ id) {\nreturn singerService.findById(id)\n.map(s -> ResponseEntity.ok().body(s))\n\
  .defaultIfEmpty(ResponseEntity.notFound().build());\n}\n/* 4 */\n@PostMapping\n\
  @ResponseStatus(HttpStatus.CREATED)\npublic Mono create (@RequestBody Singer singer)\
  \ {\nreturn singerService.save(singer);\n}\n/* 5 */\n@PutMapping(\"/{id}\")\npublic\
  \ Mono> updateById(@PathVariable Long id, @RequestBody Singer singer){\nreturn singerService.update(id,singer)\n\
  .map(s -> ResponseEntity.ok().body(s))\n.defaultIfEmpty(ResponseEntity.badRequest().build());\n\
  }\n/* 2 */\n@DeleteMapping(\"/{id}\")\npublic Mono> deleteById(@PathVariable Long\
  \ id){\nreturn singerService.delete(id)\n.then(Mono.fromCallable(() -> ResponseEntity.noContent().build()))\n\
  .defaultIfEmpty(ResponseEntity.notFound().build());\n}\n/* 6 */\n@GetMapping(params\
  \ = {\"name\"})\npublic Flux searchSingers(@RequestParam(\"name\") String name)\
  \ {\nif (StringUtils.isBlank(name)) {\nthrow new IllegalArgumentException(\"缺少请求参数\
  \ 'name'\");\n}\nreturn singerService.findByFirstName(name);\n}\n/* 7 */\n@GetMapping(params\
  \ = {\"fn\", \"ln\"})\npublic Mono searchSinger(@RequestParam(\"fn\") String fn,\
  \ @RequestParam(\"ln\") String ln) {\nif ((StringUtils.isBlank(fn) || StringUtils.isBlank(ln)))\
  \ {\nthrow new IllegalArgumentException(\"缺少请求参数，参数之一 {'fn', 'ln'}\");\n}\nreturn\
  \ singerService.findByFirstNameAndLastName(fn, ln);\n}\n}\n清单 20-15 ReactiveSingerController\
  \ 类\n```\n\n除了返回类型（由于使用了响应式 `SingerService` 而必须如此）之外，这个控制器并没有什么特别之处。当你启动应用程序并使用\
  \ `curl`、Postman、`HTTPie` 或浏览器（针对 GET 端点）等客户端测试 `reactive/singer` 端点时，你会注意到这个控制器的行为与非响应式控制器没有任何区别。这是因为这些客户端都不是响应式客户端，而且这个学术示例太小太简单，实际上无法察觉到任何差异。\n\
  \n\n\n![](img/315511_6_En_20_Fige_HTML.jpg)一个知识小贴士。 你可以尝试生成随机数据（大量数据）来填充`singer`表，然后访问`/reactive/singer`端点，以观察数据流。\n\
  \n因此，目前这个控制器能做的事情并不多。之所以先介绍这个控制器，是因为我们打算用处理器函数（handler functions）来重写它，这是 Spring\
  \ WebFlow 引入的炫酷特性之一。你可能已经注意到每个方法上都附带了带数字的注释。这些数字是为了方便查找对应的处理器函数。\n\n### 处理器类与函数式端点\n\
  \n处理器类只是对处理器函数进行逻辑分组的一种方式。处理器函数必须实现`HandlerFunction` ^(²²⁶)函数式接口，并为其`handle(..)`方法提供实现，该方法接受一个`org.springframework.web.reactive.function.server.ServerRequest`对象作为参数，并返回一个`Mono<org.springframework.web.reactive.function.server.ServerResponse>`对象。\n\
  \n清单 20-16 展示了其代码。\n\n```\npackage org.springframework.web.reactive.function.server;\n\
  import reactor.core.publisher.Mono;\n@FunctionalInterface\npublic interface HandlerFunction\
  \ {\nMono handle(ServerRequest request);\n}\n清单 20-16\nSpring 的响应式 HandlerFunction\
  \ 函数式接口\n```\n\n`HandlerFunction<T>`的实现代表一个处理请求的函数，并且可以通过`RouterFunction`将其映射到请求路径。\n\
  \n![](img/315511_6_En_20_Figf_HTML.jpg)一个信息提示。 清单 20-16 中展示的是响应式版本，作为 Spring WebFlux\
  \ 的一部分在 5.0 版本中引入。`RouterFunction`也是如此。在 Spring MVC 5.2 版本中，在`org.springframework.web.servlet.function`包中添加了非响应式版本，作为传统控制器的函数式替代方案。其语法更具声明性，并且请求映射集中在一个单一的\
  \ bean 中，使得配置更易于阅读。\n\n让我们利用这种新的声明式语法，编写一些代码，为请求声明处理器函数，而不是处理器方法。清单 20-17 展示了`SingerHandler`类，它将所有处理器函数分组，这些函数与上一节介绍的`ReactiveSingerController`中的函数类似。\n\
  \n```\npackage com.apress.prospring6.twenty.boot.handler;\nimport org.springframework.http.MediaType;\n\
  import org.springframework.web.reactive.function.server.HandlerFunction;\nimport\
  \ org.springframework.web.reactive.function.server.ServerRequest;\nimport org.springframework.web.reactive.function.server.ServerResponse;\n\
  import java.net.URI;\nimport static org.springframework.web.reactive.function.server.ServerResponse.*;\n\
  // 其他导入语句已省略\n@Component\npublic class SingerHandler {\nprivate final SingerService\
  \ singerService;\npublic HandlerFunction list;\npublic HandlerFunction deleteById;\n\
  public SingerHandler(SingerService singerService) {\nthis.singerService = singerService;\n\
  /* 1 */\nlist = serverRequest ->ok()\n.contentType(MediaType.APPLICATION_JSON).body(singerService.findAll(),\
  \ Singer.class);\n/* 2 */\ndeleteById = serverRequest -> noContent()\n.build(singerService.delete(Long.parseLong(serverRequest.pathVariable(\"\
  id\"))));\n}\n/* 3 */\npublic Mono findById(ServerRequest serverRequest) {\nvar\
  \ id = Long.parseLong(serverRequest.pathVariable(\"id\"));\nreturn singerService.findById(id)\n\
  .flatMap(singer -> ok().contentType(MediaType.APPLICATION_JSON).bodyValue(singer))\n\
  .switchIfEmpty(notFound().build());\n}\n/* 4 */\npublic Mono create(ServerRequest\
  \ serverRequest) {\nMono singerMono =  serverRequest.bodyToMono(Singer.class);\n\
  return singerMono\n.flatMap(singerService::save)\n.log()\n.flatMap(s -> created(URI.create(\"\
  /singer/\" + s.getId()))\n.contentType(MediaType.APPLICATION_JSON).bodyValue(s));\n\
  }\n/* 5 */\npublic Mono  updateById(ServerRequest serverRequest) {\nvar id = Long.parseLong(serverRequest.pathVariable(\"\
  id\"));\nreturn singerService.findById(id)\n.flatMap(fromDb -> serverRequest.bodyToMono(Singer.class)\n\
  .flatMap(s -> ok()\n.contentType(MediaType.APPLICATION_JSON)\n.body(singerService.update(id,\
  \ s), Singer.class)\n)\n).switchIfEmpty(badRequest().bodyValue(\"更新用户失败！\"));\n\
  }\n/* 6 */\npublic Mono searchSingers(ServerRequest serverRequest) {\nvar name =\
  \  serverRequest.queryParam(\"name\").orElse(null);\nif (StringUtils.isBlank(name)\
  \ ) {\nreturn badRequest().bodyValue(\"缺少请求参数 'name'\");\n}\nreturn ok()\n.contentType(MediaType.APPLICATION_JSON).body(singerService.findByFirstName(name),\
  \ Singer.class);\n}\n/* 7 */\npublic Mono searchSinger(ServerRequest serverRequest)\
  \ {\nvar fn =  serverRequest.queryParam(\"fn\").orElse(null);\nvar ln = serverRequest.queryParam(\"\
  ln\").orElse(null);\nif ((StringUtils.isBlank(fn) || StringUtils.isBlank(ln))) {\n\
  return badRequest().bodyValue(\"缺少请求参数，参数之一 {fn, ln}\");\n}\nreturn singerService.findByFirstNameAndLastName(fn,\
  \ ln)\n.flatMap(singer -> ok().contentType(MediaType.APPLICATION_JSON).bodyValue(singer));\n\
  }\n}\n清单 20-17\nSingerHandler 类\n```\n\n声明了一个`SingerHandler` bean，它是 Spring WebFlux\
  \ 应用程序配置的一部分，其方法被用作管理`Singer`实例的请求的处理器函数。\n\n标记函数的数字便于识别`ReactiveSingerController`类中对应的处理器方法，同时也便于在解释每个函数的特性时将其作为参考点。\n\
  \n1.  `list`是一个简单的处理器函数，它返回通过调用`singerService.findAll()`检索到的所有`Singer`实例。它被声明为`HandlerFunction<ServerResponse>`类型的字段，并且是`SingerHandler`类的成员。由于它依赖于`singerService`，因此无法在同一行中声明和初始化。要初始化此字段，必须先初始化`singerService`字段。由于`singerService`在构造函数中初始化，因此`list`字段的初始化也是构造函数的一部分。初始的`ServerResponse.ok()`将\
  \ HTTP 响应状态设置为`200 (OK)`，并返回一个内部`BodyBuilder`的引用，该构建器允许链式调用其他方法来描述请求。该链必须以返回`Mono<ServerResponse>`的`body*(..)`方法之一结束。\n\
  \n\n\n2.  `deleteById` 是一个简单的处理器函数，用于删除与路径变量匹配的 `ID` 所对应的 `Singer` 实例。路径变量通过调用 `serverRequest.pathVariable(\"\
  id\")` 来提取。`ID` 参数代表路径变量的名称。`singerService.delete()` 方法返回 `Mono<Void>`，因此 `Mono<ServerResponse>`\
  \ 实际上会发出一个响应，其主体为空，并且状态码为 `204 (无内容)`，该状态码由 `ServerResponse.noContent()` 设置。\n\n\
  3.  `findById` 是一个处理器函数，用于返回由 `id` 路径变量标识的单个 `Singer` 实例。该实例通过调用 `singerService.findById(..)`\
  \ 获取，该方法返回一个 `Mono<Singer>`。如果此流发出一个值，则表示找到了与路径变量匹配的歌手，并创建一个响应，其状态码为 `200 (OK)`，主体为以\
  \ JSON 表示的 `Singer` 实例。为了在不阻塞的情况下访问流发出的 `Singer` 实例，使用了 `flatMap(..)` 函数。如果流没有发出值，则表示未找到具有预期\
  \ ID 的歌手，因此通过调用 `switchIfEmpty(ServerResponse.notFound().build())` 创建一个状态为 `404\
  \ (未找到)` 的空响应。\n\n4.  `create` 是一个用于创建新 `Singer` 实例的处理器函数。`Singer` 实例从请求体中提取。通过调用\
  \ `serverRequest.bodyToMono(String.class)` 将请求体读取为 `Mono<Singer>`。当成功执行保存时，`flatMap(singerService::save)`\
  \ 流会发出一个值，并且响应会填充一个指向可访问已创建资源的 URL 的 location 头部，以及 `201 (已创建)` 响应状态。如果流没有发出值，则表示保存操作失败，并且可以通过向此处理链添加\
  \ `switchIfEmpty(status(HttpStatus.INTERNAL_SERVER_ERROR).build())` 函数来配置所需的响应状态。但是，我们将\
  \ `SingerService` 声明为在保存 `Singer` 实例失败时抛出 `SavingException`，因此这不再适用，因为错误处理器会处理它。\n\
  \n5.  `updateById` 是一个用于更新 `Singer` 实例的处理器函数。此处提及它只是为了指出 `switchIfEmpty(..)` 函数不仅可以构建带有响应状态的响应，还可以构建带有自定义主体的响应，并且此方法展示了一个将响应主体设置为\
  \ `\"Failure to update singer!\"` 文本的示例。主体可以是任何类型的对象，包括由 `singerService.update(..)`\
  \ 方法发出的异常对象。\n\n6.  `searchSingers` 是一个处理器函数，用于处理带有名为 `name` 的参数的请求。其值通过调用 `serverRequest.queryParam(\"\
  name\")` 来提取。\n\n现在我们有了处理器函数，下一步是将它们映射到请求。这是通过一个 `RouterFunction` bean 完成的。这个 bean\
  \ 可以在任何配置类中声明。`org.springframework.web.reactive.function.server.RouterFunction<T>`\
  \ ^(²²⁷) 是一个简单的函数式接口，描述了一个将传入请求路由到 `HandlerFunction<T>` 实例的函数。其代码如清单 20-18 所示。\n\
  \n```\npackage org.springframework.web.reactive.function.server;\n// 导入语句已省略\n@FunctionalInterface\n\
  public interface RouterFunction {\nMono> route(ServerRequest request);\n// 默认方法已省略\n\
  }\n清单 20-18\nSpring 的响应式 RouterFunction 函数式接口\n```\n\n`route(..)` 方法返回与作为参数提供的请求匹配的处理器函数。如果未找到处理器函数，则返回一个空的\
  \ `Mono<Void>`。`RouterFunction<T>` 的目的与控制器类中的 `@RequestMapping` 注解（及其特化版本）类似。\n\n\
  通过使用 `org.springframework.web.reactive.function.server.RouterFunctions` 类中的构建器方法，可以轻松地为\
  \ Spring 应用程序组合一个 `RouterFunction<T>`。该类提供了用于构建简单和嵌套路由函数的静态方法，甚至可以将 `RouterFunction<T>`\
  \ 转换为 `HttpHandler` 实例，从而使应用程序能够在 Servlet 3.1+ 容器中运行。在进一步讨论路由函数之前，让我们先看看 `SingerHandler`\
  \ 中声明的处理器函数的路由器函数。路由器函数如清单 20-19 所示。\n\n```\npackage com.apress.prospring6.twenty.boot;\n\
  import org.springframework.web.reactive.function.server.RequestPredicates;\nimport\
  \ org.springframework.web.reactive.function.server.RouterFunction;\nimport org.springframework.web.reactive.function.server.ServerResponse;\n\
  import static org.springframework.web.reactive.function.server.RequestPredicates.queryParam;\n\
  import static org.springframework.web.reactive.function.server.RouterFunctions.route;\n\
  @Slf4j\n@Configuration\npublic class RoutesConfig {\nfinal static Logger LOGGER\
  \ = LoggerFactory.getLogger(RoutesConfig.class);\n@Bean\npublic RouterFunction singerRoutes(SingerHandler\
  \ singerHandler) {\nreturn route()\n.GET(\"/handler/singer\", queryParam(\"name\"\
  , t -> true), singerHandler::searchSingers) /* 6 */\n.GET(\"/handler/singer\", RequestPredicates.all()\n\
  .and(queryParam(\"fn\", t -> true))\n.and(queryParam(\"ln\", t -> true)), singerHandler::searchSinger)\
  \ /* 7 */\n// 带参数的请求总是优先\n.GET(\"/handler/singer\", singerHandler.list) /* 1 */\n\
  .POST(\"/handler/singer\", singerHandler::create) /* 4 */\n.GET(\"/handler/singer/{id}\"\
  , singerHandler::findById) /* 3 */\n.PUT(\"/handler/singer/{id}\", singerHandler::updateById)\
  \ /* 5 */\n.DELETE(\"/handler/singer/{id}\", singerHandler.deleteById)  /* 2 */\n\
  .filter((request, next) -> {\nLOGGER.info(\"Before handler invocation: {}\" , request.path());\n\
  return next.handle(request);\n})\n.build();\n}\n}\n清单 20-19\nRoutesConfig 类，为 SingerHandler\
  \ 中的处理器函数声明路由配置 bean\n```\n\n`singerRoutes` bean 是一个路由器函数，用于将传入请求路由到之前介绍的 `SingerHandler`\
  \ bean 中声明的处理器函数。\n\n在清单 20-19 中，每个处理器函数都标有一个与 `SingerHandler` 中处理器函数相匹配的编号。`route()`\
  \ 方法返回一个 `RouterFunctionBuilder` 实例，该实例进一步用于通过特定于 HTTP 方法、路径和请求参数的方法添加路由器映射。\n\n\
  以下列表讨论了每一行的内容，并且项目符号编号与函数编号匹配。\n\n1.  `GET(\"/handler/singer\", singerHandler.list)`\
  \ - `GET(..)` 是来自抽象工具类 `org.springframework.web.reactive.function.server.RequestPredicates`\
  \ 的一个静态方法，此处用于创建一个路由，将 `GET` 请求映射到 URL `/handler/singer` 以及 `singerHandler.list`\
  \ 函数。\n\n2.  `DELETE(\"/handler/singer/{id}\", singerHandler.deleteById)` - `DELETE(..)`\
  \ 是来自工具类 `RequestPredicates` 的一个静态方法，它创建一个路由，将 `DELETE` 请求映射到 URL `/handler/singer/{id}`，其中\
  \ id 是传递给 `singerHandler.deleteById` 函数的路径变量的名称。\n\n3.  `GET(\"/handler/singer/{id}\"\
  , singerHandler::findById)` - 将 `GET` 请求映射到 `/handler/singer/{id}` 以及 `singerHandler.findById`。\n\
  \n4.  `POST(\"/handler/singer\", singerHandler::create)` - `POST(..)` 是来自工具类 `RequestPredicates`\
  \ 的一个静态方法，它创建一个路由，将 `POST` 请求映射到 URL `/handler/singer` 以及 `singerHandler.create`\
  \ 函数。\n\n5.  `PUT(\"/handler/singer/{id}\", singerHandler::updateById)` - `PUT(..)`\
  \ 是来自工具类 `RequestPredicates` 的一个静态方法，它创建一个路由，将 `PUT` 请求映射到 URL `/handler/singer/{id}`\
  \ 以及 `singerHandler.updateById` 函数。\n\n\n\n6.  `GET(\"/handler/singer\", queryParam(\"\
  name\", t → true), singerHandler::searchSingers)` - 将 `GET` 方法映射到 `/handler/singer?name=${val}`\
  \ URL，并关联到 `singerHandler.searchSingers` 函数。参数通过 `RequestPredicates.queryParam(..)`\
  \ 工具方法声明，该方法返回一个 `RequestPredicate`，当参数存在于 URL 中时返回 `true`。\n\n7.  该语句与第 6 点的方法功能相同，但使用了\
  \ `RequestPredicates.all()` 构建器方法来检查两个参数是否存在。\n\n`filter(..)` 语句声明了一个用于过滤所有请求的函数。此示例中的语句仅打印一条简单的日志，但它可用于检查任何类型的横切关注点，例如日志记录、安全性等。\n\
  \n调用 `build()` 方法来构造 `RouterFunction<ServerResponse>` bean。\n\n配置完成后，我们现在就有了一个可通过\
  \ `/handler/singer` URL 访问的歌手 API。当你启动应用程序，并使用 `curl`、Postman 或浏览器（针对 GET 端点）等客户端测试\
  \ `/handler/singer` 端点时，你会发现一切运行正常，其行为与 `ReactiveSingerController` 实现的行为相同。\n\n\
  ![](img/315511_6_En_20_Figg_HTML.jpg)一个警告。 需要参数的请求路由必须在构建器中首先指定，或者至少要在基于相同路径但不带参数的路由之前指定。请求会按照声明的顺序与路由器函数中的现有路由进行匹配。因此，对\
  \ URL `\"/handler/singers?name=John\"` 的请求会匹配列表中找到的第一个映射到 `\"/handler/singers\"\
  ` 的路由。这是因为，只有在找到路由之后才会检查参数是否存在，因为请求参数是可选的，并且不属于路由的一部分。因此，对 `\"/handler/singers\"\
  ` 的 GET 请求将首先与第一个 `GET \"/handler/singers\"` 路由进行匹配，然后检查 `name` 参数是否存在，如果未找到，则判定为不匹配；接着，列表中的下一个\
  \ `GET \"/handler/singers\"` 被找到并匹配，但 `fn` 和 `ln` 参数均未找到，因此这也不匹配；于是继续识别列表中的下一个路由，该路由没有参数，所以最终会调用\
  \ `singerHandler.list`。\n\n### 响应式错误处理\n\n在**响应式服务**部分，`save(..)` 和 `update(..)`\
  \ 方法被修改为发出 `SavingException` 类型的消息。当处理函数或响应式处理方法调用这些方法之一并发生意外情况时，必须处理该异常。这允许开发者记录异常、保存抛出异常的上下文，并决定\
  \ HTTP 状态码。对于响应式控制器，使用 `@RestControllerAdvice` 注解的类可以完成这项工作，但对于处理函数，我们需要其他东西，一种更函数式的方式。我们需要一个\
  \ `WebExceptionHandler` bean。这个 bean 同样适用于响应式控制器。\n\nSpring Boot 自动配置了一个类型为 `DefaultErrorWebExceptionHandler`\
  \ 的默认 `WebExceptionHandler`。图 20-5 展示了 WebExceptionHandler 的层次结构。\n\n![](img/315511_6_En_20_Fig5_HTML.jpg)\n\
  \n一张图展示了 Web 异常处理器的层次结构，包括默认错误、抽象错误、错误 Web 和 Web 异常处理器。\n\n图 20-5\n\n`WebExceptionHandler`\
  \ 层次结构\n\n该 bean 返回的响应是一个通用的 JSON 表示对象，包含 `400（错误请求）` HTTP 状态码、URI 路径和一个字母数字请求标识符。如果我们想要自定义行为，就需要声明自己的\
  \ `WebExceptionHandler` bean。\n\n清单 20-20 展示了一个非常简单的自定义 `WebExceptionHandler` bean\
  \ 版本，该 bean 被添加到 `RoutingConfig` 类中。\n\n```\npackage com.apress.prospring6.twenty.boot;\n\
  import org.springframework.web.server.WebExceptionHandler;\n// 其他导入语句已省略\n@Slf4j\n\
  @Configuration\npublic class RoutesConfig {\nfinal static Logger LOGGER = LoggerFactory.getLogger(RoutesConfig.class);\n\
  // 其他 bean 已省略\n@Bean\n@Order(-2)\npublic WebExceptionHandler exceptionHandler()\
  \ {\nreturn (ServerWebExchange exchange, Throwable ex) -> {\nif (ex instanceof SaveException\
  \ se) {\nlog.debug(\"RouterConfig:: handling exception :: \" , se);\nexchange.getResponse().setStatusCode(HttpStatus.BAD_REQUEST);\n\
  return exchange.getResponse().setComplete();\n} else if (ex instanceof IllegalArgumentException\
  \ iae) {\nlog.debug(\"RouterConfig:: handling exception :: \" , iae);\nexchange.getResponse().setStatusCode(HttpStatus.BAD_REQUEST);\n\
  return exchange.getResponse().setComplete();\n}\nreturn Mono.error(ex);\n};\n}\n\
  }\n清单 20-20\n自定义 WebExceptionHandler bean\n```\n\n请注意，为了确保我们的异常处理器被使用，我们需要通过 `@Order(-2)`\
  \ 注解赋予它最高优先级；否则，Spring Boot 仍将使用默认处理器。\n\n### 使用 `WebTestClient` 测试响应式端点\n\n要使用实际的响应式客户端测试响应式端点，我们可以使用\
  \ `WebTestClient` 的实例。\n\nWebClient API 是在 Spring 5 中引入的，用于替代现有的 `RestTemplate`\
  \ 类。在 Spring 6 中，你仍然可以使用两者向 Spring 应用程序提交请求，但 `WebClient` 更适用于响应式应用程序，因为它是 `spring-webflux`\
  \ 包的一部分。`WebClient` 可用于同步或异步 HTTP 请求，具有功能流畅的 API，可以直接集成到你现有的 Spring 配置和 WebFlux\
  \ 响应式框架中。\n\n`WebClient` 只能基于现有的异步 HTTP 客户端库使用。在 `chapter20-boot` 项目中，这是 Reactor\
  \ Netty，但 Jetty Reactive 或 Apache Reactive HTTP 客户端也同样适用。`WebClient` 可用于向用任何语言编写的其他响应式服务发出请求。\n\
  \n为了测试响应式 Web 应用程序，还引入了 `WebTestClient`，作为生产环境中使用的 `WebClient` 的对应物。`WebTestClient`\
  \ 在内部使用 `WebClient` 执行请求，同时提供流畅的 API 来验证响应。\n\n在本节中，我们将使用 `WebTestClient` 向前几节构建的\
  \ API 提交一些请求。\n\n让我们从测试由 `ReactiveSingerController` 支持的端点开始。清单 20-21 展示了创建一个指向根\
  \ URL `http://localhost:8081/reactive/singer` 的 `WebTestClient`，以及一个检查是否返回预期记录数的测试。\n\
  \n```\npackage com.apress.prospring6.twenty.boot.webclient;\nimport org.springframework.test.web.reactive.server.WebTestClient;\n\
  // 其他导入语句已省略\npublic class ReactiveSingerControllerTest {\nprivate static final\
  \ Logger LOGGER = LoggerFactory.getLogger(SingerHandlerTest.class);\nprivate final\
  \ WebTestClient controllerClient = WebTestClient\n.bindToServer()\n.baseUrl(\"http://localhost:8081/reactive/singer\"\
  )\n.build();\n@Test\nvoid shouldReturnAFew(){\ncontrollerClient.get()\n.uri(uriBuilder\
  \ -> uriBuilder.queryParam(\"name\", \"John\").build())\n.accept(MediaType.APPLICATION_JSON)\n\
  .exchange()\n.expectStatus().isOk()\n.expectHeader().contentType(MediaType.APPLICATION_JSON)\n\
  .expectBody()\n.jsonPath(\"$.length()\").isEqualTo(2);\n}\n}\n清单 20-21\n使用 WebTestClient\
  \ 的测试类\n```\n\n这里发生了几件事：\n\n*   我们通过使用 `WebTestClient.bindToServer()` 返回的构建器创建了一个\
  \ `WebTestClient` 实例，并将此客户端的基 URL 设置为 http://localhost:8081/reactive/singer。显然，这意味着应用程序必须正在运行，此测试才能按预期工作。\n\
  \n*   向配置的基 URL 发送一个 `GET` 请求，其中 `name` 参数设置为“John”\n\n*   为了发送请求，我们使用了 `exchange()`\
  \ 函数\n\n\n\n*   为了检查结果，我们使用可用的断言方法：`expect*(..)` 来检查状态和头部信息，以及 `jsonPath(..).*`\
  \ 来检查对请求体的假设，假设请求体以 JSON 格式表示。\n\n然而，值得测试的是负面场景。例如，清单 20-22 中的测试方法检查了当我们尝试创建另一个“John\
  \ Mayer”时的应用程序行为。\n\n```\npackage com.apress.prospring6.twenty.boot.webclient;\n\
  import org.springframework.test.web.reactive.server.WebTestClient;\n// 其他导入语句已省略\n\
  public class ReactiveSingerControllerTest {\nprivate static final Logger LOGGER\
  \ = LoggerFactory.getLogger(SingerHandlerTest.class);\nprivate final WebTestClient\
  \ controllerClient = WebTestClient\n.bindToServer()\n.baseUrl(\"http://localhost:8081/reactive/singer\"\
  )\n.build();\n@Test\nvoid shouldFailToCreateJohnMayer(){\ncontrollerClient.post()\n\
  .accept(MediaType.APPLICATION_JSON)\n.bodyValue(Singer.builder()\n.firstName(\"\
