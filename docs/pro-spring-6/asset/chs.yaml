  图 5-7


  IntroductionInterceptor 接口层次结构


  如你所见，`MethodInterceptor` 接口定义了一个 `invoke()` 方法。使用此方法，你可以为你正在引介的接口提供实现，并根据需要为任何其他方法执行拦截。在单个方法内为一个接口实现所有方法可能会很麻烦，并且很可能导致大量代码，你需要费力地浏览这些代码才能决定调用哪个方法。幸运的是，Spring
  提供了 `IntroductionInterceptor` 的默认实现，名为 `DelegatingIntroductionInterceptor`，它使得创建引介更加简单。要使用
  `DelegatingIntroductionInterceptor` 构建引介，你需要创建一个类，该类既继承自 `DelegatingIntroductionInterceptor`，又实现你想要引介的接口。然后，`DelegatingIntroductionInterceptor`
  实现会简单地将所有对引介方法的调用委托给自身上的相应方法。如果这看起来有点不清楚，请不要担心；你将在下一节中看到一个示例。


  正如你在使用切点通知时需要用到 `PointcutAdvisor` 一样，你需要使用 `IntroductionAdvisor` 来向代理添加引介。`IntroductionAdvisor`
  的默认实现是 `DefaultIntroductionAdvisor`，它应该能够满足你大部分（如果不是全部）的引介需求。你应该注意，不允许使用 `ProxyFactory.addAdvice()`
  添加引介，否则会导致抛出 `AopConfigException`。相反，你应该使用 `addAdvisor()` 方法，并传入一个 `IntroductionAdvisor`
  接口的实例。


  当使用标准通知（即非引介）时，同一个通知实例可以用于多个对象。Spring 文档将此称为 *per-class 生命周期*，尽管你可以为多个类使用单个通知实例。对于引介，引介通知构成了被通知对象状态的一部分，因此，每个被通知对象必须有一个不同的通知实例。这被称为
  *per-instance 生命周期*。由于你必须确保每个被通知对象都有一个不同的引介实例，因此通常更可取的做法是创建一个 `DefaultIntroductionAdvisor`
  的子类，该子类负责创建引介通知。这样，你只需要确保为每个对象创建一个新的 advisor 类实例，因为它会自动创建一个新的引介实例。例如，假设你想将前置通知应用于所有
  `Contact` 类实例的 `setFirstName()` 方法。图 5-8 展示了应用于所有 `Contact` 类型对象的同一个通知。


  ![](img/315511_6_En_5_Fig8_HTML.jpg)


  一张示意图，展示了将前置通知应用于歌手类实例的 setFirstName 方法，这些实例包括 John Mayer、Chuck Berry，直到 Gary Russell。


  图 5-8


  通知的 per-class 生命周期


  现在，假设你想将引介混入所有 `Contact` 类实例中，并且该引介将为每个 `Contact` 实例携带信息（例如，一个指示特定实例是否被修改的属性 `isModified`）。在这种情况下，将为每个
  `Contact` 实例创建引介，并将其绑定到该特定实例，如图 5-9 所示。


  以上涵盖了引介创建的基础知识。我们现在将讨论如何使用引介来解决对象修改检测的问题。


