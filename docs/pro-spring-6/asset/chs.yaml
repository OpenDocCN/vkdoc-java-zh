  使用 JdbcTemplate Bean

  ```


  在清单 6-22 中，我们使用 `JdbcTemplate` 的 `queryForObject(..)` 方法来检索由 `id` 标识的记录中 first_name
  的值。第一个参数是 SQL 字符串，最后一个参数是以 `varargs` 格式传递给 SQL 进行参数绑定的参数。第二个参数是要返回的类型，在本例中是 `String`。除了
  `String`，你还可以查询其他类型，例如 `Long` 和 `Integer`。让我们看看结果。清单 6-23 展示了测试程序。这里使用了 JUnit 测试类，因为它允许我们单独运行测试方法。


