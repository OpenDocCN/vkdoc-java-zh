  \ 接口\n```\n\n请注意，所有方法都返回响应式类型，这正是使其成为真正的响应式服务的原因，能够与响应式仓库和响应式控制器交互，而不会阻碍数据流。\n\n\
  实现此接口的 `SingerServiceImpl` 类如清单 20-12 所示。\n\n\n\n```\npackage com.apress.prospring6.twenty.boot.service;\n\
  // 导入语句已省略\nimport java.time.LocalDate;\nimport java.time.format.DateTimeFormatter;\n\
  @RequiredArgsConstructor\n@Transactional\n@Service\npublic class SingerServiceImpl\
  \ implements SingerService {\nprivate final SingerRepo singerRepo;\n@Override\n\
  public Flux findAll() {\nreturn singerRepo.findAll();\n}\n@Override\npublic Mono\
  \ findByFirstNameAndLastName(String firstName, String lastName) {\nreturn singerRepo.findByFirstNameAndLastName(firstName,\
  \ lastName);\n}\n@Override\npublic Mono findById(Long id) {\nreturn singerRepo.findById(id);\n\
  }\n@Override\npublic Flux findByFirstName(String firstName) {\nreturn singerRepo.findByFirstName(firstName);\n\
  }\n@Override\npublic Mono save(Singer singer) {\nreturn singerRepo.save(singer)\n\
  .onErrorMap(error -> new SaveException(\"无法保存歌手 \" + singer, error));\n}\n@Override\n\
  public Mono update(Long id, Singer updateData) {\nreturn singerRepo.findById(id)\n\
  .flatMap( original -> {\noriginal.setFirstName(updateData.getFirstName());\noriginal.setLastName(updateData.getLastName());\n\
  original.setBirthDate(updateData.getBirthDate());\nreturn singerRepo.save(original)\n\
  .onErrorMap(error -> new SaveException(\"无法更新歌手 \" + updateData, error));\n});\n\
  }\n@Override\npublic Mono delete(Long id) {\nreturn singerRepo.deleteById(id);\n\
  }\n}\n清单 20-12\nSingerServiceImpl 响应式服务类与 Bean 定义\n```\n\n该类非常简单，自身逻辑很少，主要围绕搜索功能和\
  \ `Singer` 对象的更新。\n\n`SaveException` 只是一个简单的类，它继承自 `RuntimeException`，用于包装 Spring\
  \ Data 的异常，以提供关于异常产生上下文的更多信息。\n\n这里需要注意的另一件事是，该服务是事务性的。那么，在响应式应用中事务是如何工作的呢？它们的工作方式与非响应式应用基本相同，但其功能基于不同的组件。\n\
  \n响应式应用中的事务与非响应式应用中的事务目的相同：将多个数据库操作分组到一个多步骤操作中，只有当所有步骤都成功时，该操作才算成功；否则，失败步骤之前任何成功的步骤都会被回滚。在\
  \ Spring 应用中，命令式和响应式事务管理是通过一个 `PlatformTransactionManager` Bean 来启用的，该 Bean 管理事务性资源的事务，并且通过使用来自\
  \ `org.springframework.transaction.annotation` 包的 Spring 的 `@Transactional` 注解来将资源标记为事务性的。然而，在更底层的层面，情况略有不同。\n\
  \n事务管理需要将其事务状态与一个执行过程关联起来。在命令式编程中，这通常是一个 `java.lang.ThreadLocal` 存储对象，因此事务状态绑定到一个\
  \ `Thread` 对象上，Spring 容器在该线程中开始执行代码。在响应式应用中，这并不适用，因为响应式执行需要多个线程。解决方案是引入一个 `ThreadLocal`\
  \ 存储类的响应式替代方案，这就是 Reactor 的 `reactor.util.context.Context` 接口。上下文允许将上下文数据绑定到特定的执行过程，对于响应式编程来说，这是一个\
  \ `Subscription` 对象。Reactor 的 `Context` 对象让 Spring 能够将事务状态以及所有资源和同步信息绑定到特定的 `Subscription`\
  \ 对象上。所有使用 Project Reactor 的响应式代码现在都可以参与响应式事务。\n\n从 Spring Framework 5.2 M2 开始，Spring\
  \ 通过 `ReactiveTransactionManager` SPI 支持响应式事务管理。`org.springframework.transaction.ReactiveTransactionManager`\
  \ 接口是一个用于响应式和非阻塞集成的事务管理抽象，它使用事务性资源。它是返回 `Publisher<T>` 类型的响应式事务方法以及使用 `TransactionalOperator`\
  \ 进行编程式事务管理的基础。Spring Data R2DBC 在 `org.springframework.r2dbc.connection` 包中提供了\
  \ `R2dbcTransactionManager` 类，该类实现了 `ReactiveTransactionManager`。\n\n图 20-4 展示了\
  \ `org.springframework.transaction.TransactionManager` 的命令式和响应式接口与类的层次结构。\n\n![](img/315511_6_En_20_Figi_HTML.jpg)一个警告符号。 在图\
  \ 20-4 中，也包含了 `ReactiveMongoTransactionManager`，因为 `pro-spring-6` 项目的类路径中有 `spring-data-mongodb`。该类是\
  \ MongoDB 的响应式事务管理器，负责管理事务，以便在托管事务内执行的代码能够参与多文档事务。\n\n![](img/315511_6_En_20_Fig4_HTML.jpg)\n\
  \n事务管理器的层次结构图。Hibernate 和 JPA 一起位于资源抽象平台管理器之下，而资源抽象平台管理器又位于平台管理器之下。R2DBC 和响应式 Mongo\
  \ 位于抽象响应式管理器之下，以及响应式管理器之下。平台管理器和响应式管理器都位于事务管理器之下。\n\n图 20-4\n\n`TransactionManager`\
  \ 命令式与响应式层次结构对比\n\n`R2dbcTransactionManager` 包装了一个到数据库的响应式连接来执行其工作，该连接由 R2DBC 驱动程序提供。在\
  \ Spring Boot 应用中，配置相当简单，如清单 20-13 所示。\n\n```\npackage com.apress.prospring6.twenty.boot;\n\
  import io.r2dbc.spi.ConnectionFactory;\nimport org.springframework.r2dbc.connection.R2dbcTransactionManager;\n\
  import org.springframework.transaction.ReactiveTransactionManager;\nimport org.springframework.transaction.annotation.EnableTransactionManagement;\n\
  // 其他导入语句已省略\n@EnableTransactionManagement\n@SpringBootApplication\npublic class\
  \ Chapter20Application {\nfinal static Logger LOGGER = LoggerFactory.getLogger(Chapter20Application.class);\n\
  public static void main(String... args) {\nSystem.setProperty(AbstractEnvironment.ACTIVE_PROFILES_PROPERTY_NAME,\
  \ \"dev\");\nSpringApplication.run(Chapter20Application.class, args);\n}\n@Bean\n\
  ReactiveTransactionManager transactionManager(ConnectionFactory connectionFactory)\
  \ {\nreturn new R2dbcTransactionManager(connectionFactory);\n}\n}\n清单 20-13\n配置\
  \ R2dbcTransactionManager\n```\n\n关于清单 2-13 中的示例，需要澄清两点：\n\n*   需要 `@EnableTransactionManagement`\
  \ 注解来启用 Spring 的注解驱动事务管理能力，即支持 `@Transactional` 注解。\n\n*   `ConnectionFactory` Bean\
  \ 没有显式声明。Spring Boot 会根据 `application.yaml`（或等效的 `application.properties`）中的配置创建此\
