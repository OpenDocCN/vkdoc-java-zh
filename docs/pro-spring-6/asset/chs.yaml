  这个由 Spring 管理的特定 `DataSource` 在 `org.apache.commons.dbcp2.BasicDataSource` 中实现。最重要的一点是，该
  bean 类型实现了 `javax.sql.DataSource`，你可以立即在你的数据访问类中使用它。


  配置 `dataSource` bean 的另一种方法是使用 JNDI。如果你正在开发的应用程序将在 JEE 容器中运行，你可以利用容器管理的连接池。要使用基于
  JNDI 的数据源，你需要更改 `dataSource` bean 的声明，如清单 6-13 所示。


  ```

