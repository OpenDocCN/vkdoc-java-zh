  \ 规范规定，默认情况下，持久化提供者必须急切地获取关联。然而，对于 Hibernate 的 JPA 实现，默认的获取策略仍然是惰性的。因此，当使用 Hibernate\
  \ 的 JPA 实现时，你不需要显式地将关联定义为惰性获取。Hibernate 的默认获取策略与 JPA 规范不同。\n\n现在让我们实现 `findAllWithAlbum()`\
  \ 方法，该方法将获取关联的专辑和乐器。实现如清单 8-10 所示。\n\n```\npackage com.apress.prospring6.eight.service;\n\
  // 所有导入语句已省略\n/*\n来自 Singer.java 的注解，用于展示 JQL 查询\n@NamedQuery(name=Singer.FIND_ALL_WITH_ALBUM,\n\
