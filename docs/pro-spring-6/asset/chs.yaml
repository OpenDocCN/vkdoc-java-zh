  .exchange()\n.expectStatus().is4xxClientError()\n.expectBody()\n.consumeWith(body\
  \ -> LOGGER.debug(\"body: {}\", body));\n}\n}\n清单 20-22\n使用 WebTestClient 测试负面场景的测试方法\n\
  ```\n\n`shouldFailToCreateJohnMayer()` 测试方法将会通过，并且不会创建任何 `Singer` 实例，因为已经存在一个具有这些名字的歌手。响应\
  \ HTTP 代码为 400，正如控制台打印的响应详情所证明的那样，您可以在清单 20-23 中看到。响应详情包括提交的数据。\n\n```\nDEBUG c.a.p.t.b.w.SingerHandlerTest\
  \ -- body:\n> POST http://localhost:8081/reactive/singer\n> accept-encoding: [gzip]\n\
  > user-agent: [ReactorNetty/1.1.5]\n> host: [localhost:8081]\n> WebTestClient-Request-Id:\
  \ [1]\n> Accept: [application/json]\n> Content-Type: [application/json]\n> Content-Length:\
  \ [74]\n{\n\"id\":null,\n\"firstName\":\"John\",\n\"lastName\":\"Mayer\",\n\"birthDate\"\
  :\"1977-10-16\"\n}\n< 400 BAD_REQUEST Bad Request\n< content-length: [0]\n清单 20-23\n\
  shouldFailToCreateJohnMayer() 测试执行的控制台日志\n```\n\n`WebTestClient` 并不关心是哪种后端组件生成了对其发送请求的响应，这意味着如果基础\
  \ URL 被替换为 `http://localhost:8081/handler/singer`，并且请求由 `SingerHandler` 类中的函数处理，那么本节中编写的测试也会通过。当\
  \ URL 指向一个用 Java 以外的语言编写的应用程序时，只要该应用程序是响应式的并且响应具有预期的格式，这些测试同样会通过。\n\n### 响应式 Web\
  \ 层\n\n迁移 Web 层需要相当多的更改，因为当您不知道要渲染的数据量时，渲染视图是相当困难的。过去，异步 JavaScript 和 XML（也称为 AJAX）被用来解决这个问题，但\
  \ AJAX 只能让我们根据页面上的用户操作来更新页面。它并不能解决来自服务器的更新问题。由于响应式通信涉及双向数据流，因此需要新的 Web 库。有多种方法可以实现这一点，但在本节中，我们将介绍最常见的方法：使用**服务器发送事件**。\n\
  \n让我们在歌手应用程序中创建一个页面，用于显示应用程序上下文中的 bean 列表。在前面的章节中，`HomeController` 包含一个单一的处理器方法，该方法返回一个简单的\
  \ `String`。我们将修改此方法，使其以 `Flux<String>` 的形式返回应用程序上下文中所有 bean 的名称。\n\nThymeleaf 支持响应式视图，并且有多种方法可以用响应式数据填充模型。为了快速简便，我们使用一段\
  \ JavaScript 代码来逐步用流式数据填充视图。但在此之前，我们必须配置 Thymeleaf 以支持响应式。清单 20-24 展示了这个配置类。大多数属性都设置为\
  \ Spring Boot 设置的默认值，但这样编写类是为了让开发人员清楚地看到哪些是可以自定义的。\n\n```\npackage com.apress.prospring6.twenty.boot;\n\
  import org.springframework.boot.autoconfigure.thymeleaf.ThymeleafProperties;\nimport\
  \ org.springframework.boot.context.properties.EnableConfigurationProperties;\nimport\
  \ org.springframework.web.reactive.config.ViewResolverRegistry;\nimport org.springframework.web.reactive.config.WebFluxConfigurer;\n\
  import org.thymeleaf.spring6.ISpringWebFluxTemplateEngine;\nimport org.thymeleaf.spring6.view.reactive.ThymeleafReactiveViewResolver;\n\
  // 其他导入语句已省略\n@Configuration\n@EnableConfigurationProperties(ThymeleafProperties.class)\n\
  public class ReactiveThymeleafWebConfig implements WebFluxConfigurer {\nprivate\
  \ final ISpringWebFluxTemplateEngine thymeleafTemplateEngine;\npublic ReactiveThymeleafWebConfig(ISpringWebFluxTemplateEngine\
  \ templateEngine) {\nthis.thymeleafTemplateEngine = templateEngine;\n}\n/*\n@Bean\n\
  public ITemplateResolver thymeleafTemplateResolver() {\nvar resolver = new SpringResourceTemplateResolver();\n\
  resolver.setApplicationContext(this.context);\nresolver.setPrefix(\"classpath:templates/\"\
  );\nresolver.setSuffix(\".html\");\nresolver.setTemplateMode(TemplateMode.HTML);\n\
  resolver.setCacheable(false);\nresolver.setCheckExistence(false);\nreturn resolver;\n\
  } */\n@Bean\npublic ThymeleafReactiveViewResolver thymeleafReactiveViewResolver()\
  \ {\nvar viewResolver = new ThymeleafReactiveViewResolver();\nviewResolver.setTemplateEngine(thymeleafTemplateEngine);\n\
  viewResolver.setOrder(1);\nreturn viewResolver;\n}\n@Override\npublic void configureViewResolvers(ViewResolverRegistry\
  \ registry) {\nregistry.viewResolver(thymeleafReactiveViewResolver());\n}\n}\n清单\
  \ 20-24\n响应式 Thymeleaf 配置类\n```\n\n负责解析模板的模板解析器 bean 不需要是响应式的。由于模板解析器 bean 包含来自应用程序配置的数据，当使用\
  \ Spring Boot 时，可以完全省略它，并通过使用 `@EnableConfigurationProperties(ThymeleafProperties.class)`\
  \ 注解配置类来替代。这就是为什么在清单 20-24 中，bean 声明被注释掉了。\n\n使用模板解析器的模板引擎是响应式的，并且是 `ISpringWebFluxTemplateEngine`\
  \ 接口的一个实现。因此，为与 Spring MVC 类型集成而设计的 `SpringTemplateEngine` 类必须替换为 `SpringWebFluxTemplateEngine`，后者是\
  \ `ISpringWebFluxTemplateEngine` 接口的一个实现，专为与 Spring WebFlux 集成并以响应式友好的方式执行模板而设计。由于模板引擎只需要一个模板解析器，不需要其他东西，因此跳过了这个\
  \ bean 的声明，允许 Spring Boot 对其进行配置，我们只需在配置类构造函数中将其注入到我们的配置中。\n\n\n\n`@EnableConfigurationProperties(ThymeleafProperties.class)`\
  \ 注解启用了对 Thymeleaf 配置属性的支持。`ThymeleafProperties` 类使用了 `@ConfigurationProperties(prefix\
  \ = \"spring.thymeleaf\")` 注解，使其成为 Thymeleaf 属性的配置 Bean。这意味着你可以使用 `application.yaml`\
  \ 或 `application.properties` 文件来配置 Thymeleaf。这些属性以 `spring.thymeleaf` 为前缀，允许你在无需编写额外代码的情况下配置模板解析器\
  \ Bean。Spring Boot Thymeleaf 配置属性如清单 20-25 所示。\n\n```\nspring:\n  thymeleaf:\n \
  \   prefix: classpath:templates/\n    suffix: .html\n    mode: HTML\n    cache:\
  \ false\n    check-template: false\n    reactive:\n      max-chunk-size: 8192\n\
  清单 20-25\nSpring Boot Thymeleaf 配置\n```\n\n`ThymeleafReactiveViewResolver` 是 `org.springframework.web.reactive.result.view.ViewResolver`\
  \ 接口（即 Spring WebFlux 视图解析器接口）的一个实现。`responseMaxChunkSizeBytes` 是你应该关注的属性，因为它定义了由\
  \ Thymeleaf 引擎生成并作为输出传递给服务器的 `org.springframework.core.io.buffer.DataBuffer` 实例的最大大小。这一点很重要，因为如果你有大量数据需要通过\
  \ `Flux<T>` 发送，你可能希望将视图分块、逐块渲染，而不是让网页保持加载状态直到响应完成。尤其是考虑到这正是响应式通信的主要理念之一。\n\n现在，让我们来谈谈我们的控制器。由于\
  \ `HomeController` 需要使用 `@RestController` 注解（因为其处理方法返回一个响应式数据流），我们需要另一种方式来返回逻辑视图名称。为此，我们可以使用一个处理函数和一个路由函数，但首先，让我们看看清单\
  \ 20-26 中展示的 `HomeController`。\n\n```\npackage com.apress.prospring6.twenty.boot.controller;\n\
  // 导入语句已省略\n@RestController\npublic class HomeController implements ApplicationContextAware\
  \ {\n    private ApplicationContext ctx;\n    @Override\n    public void setApplicationContext(ApplicationContext\
  \ applicationContext) throws BeansException {\n        ctx = applicationContext;\n\
  \    }\n    // 此请求的响应负载将以 JSON 格式渲染\n    @RequestMapping(value = \"/beans\", produces\
  \ = MediaType.TEXT_EVENT_STREAM_VALUE)\n    public Flux getBeanNames() {\n     \
  \   List beans = Arrays.stream(ctx.getBeanDefinitionNames()).sorted().collect(Collectors.toList());\n\
  \        return Flux.fromIterable(beans).delayElements(Duration.ofMillis(200));\n\
  \    }\n}\n清单 20-26\n响应式 HomeController 类\n```\n\n注意 `MediaType.TEXT_EVENT_STREAM_VALUE`，这是一个值为\
  \ `text/event-stream` 的常量。这是当向此 URL `http://localhost:8081/beans` 发送 GET 请求时，服务器向客户端发送的简单文本数据流所特有的\
  \ MIME 类型。\n\n事件流中的消息由一对换行符分隔。行首字符为冒号的行是注释，会被忽略。\n\n当应用程序启动后，你可以通过运行一个简单的 `curl`\
  \ 命令来测试该方法是否返回一个 Bean 名称的 Flux。该命令以及流中的几个事件如清单 20-27 所示。\n\n```\n> curl -H \"Accept:text/event-stream\"\
  \ http://localhost:8081/beans\ndata:applicationAvailability\ndata:applicationTaskExecutor\n\
  data:chapter20Application\ndata:clientConnectorCustomizer\ndata:connectionFactory\n\
  data:data-r2dbc.repository-aot-processor#0\n// 其余流事件已省略\n清单 20-27\n向 http://localhost:8081/beans\
  \ 发送 GET 请求返回的数据流\n```\n\nThymeleaf 生成三种类型的 SSE：\n\n*   **头部（Header）** - 数据以 `head:`\
  \ 或 `{prefix_}head` 为前缀。用于通信过程中的单个事件，包含迭代数据之前的所有标记（如果有的话）。示例：*当你在阅读 Facebook 帖子时，打开页面的那一刻，数据库中在你打开页面时间戳之前存在的所有评论，都应该已经在页面中渲染好了。没有必要一条一条地渲染它们。Thymeleaf\
  \ 支持这种类型的初始化事件。*\n\n*   **数据消息（Data Message）** - 数据以 `message:` 或 `{prefix_}message`\
  \ 为前缀。用于一系列事件，每个事件对应数据驱动生成的一个值。示例：*当你在阅读 Facebook 帖子时，其他用户在你浏览页面时发布的评论会一条一条地出现在评论区。评论数据会通过类型为\
  \ message 的 SSE 发送给客户端。*\n\n*   **尾部（Tail）** - 数据以 `tail:` 或 `{prefix_}tail` 为前缀。用于通信过程中的单个事件，包含迭代数据之后的所有标记（如果有的话）。示例：*假设\
  \ Facebook 有一个选项，用户可以选择停止查看新评论，那么可以使用这种类型的事件来发送数据库中所有评论，这些评论的时间戳介于最后显示的评论和用户选择停止查看新评论的时间戳之间。*\n\
  \n![](img/315511_6_En_20_Figh_HTML.jpg)警告。 当响应式流被包装在 `org.thymeleaf.spring6.context.webflux.ReactiveDataDriverContextVariable`\
  \ 构造函数中，并且该变量作为属性添加到 Thymeleaf 响应式视图时，可以通过该构造函数设置 `prefix` 值。当同一个网页上使用多个 SSE 源时，前缀非常有用，因为它有助于将服务器事件分类，从而可以在页面的不同部分显示数据。然而，这是一个复杂的场景，我们不会在本章中介绍。\n\
  \n`/beans` URL 被用作 SSE 流的源。使用该 URL 创建一个 `EventSource` 实例，它会打开一个持久连接，服务器通过该连接以 `text/event-stream`\
  \ 格式发送事件。该连接保持打开状态，直到通过调用 `EventSource.close()` 关闭。Spring WebFlux 将这些事件标记为消息事件，并在\
  \ `EventSource` 实例上设置一个 `EventListener` 实例来拦截这些事件，提取数据并将其添加到 HTML 页面中。\n\n通过在对结果\
  \ `Flux<String>` 调用 `delayElements(Duration.ofMillis(200))`，有意放慢了 Bean 名称流的发送速度，以展示持续的通信。如果你使用\
  \ Chrome 或 Firefox，在加载页面时，可以在开发者控制台中看到服务器发送的事件。只需从清单 20-28 所示的 `home.html` 模板片段（HTML\
  \ 和 JavaScript）中 `EventListener` 实例的主体部分移除 `console.log(event)` 语句的注释即可。\n\n```\n\
  \n/*'+ event.data +'')\n    });\n    this.source.onerror = function () {\n     \
  \   this.source.close();\n    };\n},\nstop: function() {\n    this.source.close();\n\
  }\n};\n/*]]>*/\n\nReactive Application Beans:\n\n清单 20-28\n用于显示作为服务器发送事件接收的 Bean\
  \ 名称的 Thymeleaf 模板片段（来自 home.html 文件的片段）\n```\n\n**/*[[@{|/beans|}]]*/** 是一个 Thymeleaf\
  \ 链接表达式，用于生成相对于应用程序上下文的 URL。我知道这看起来很奇怪，但所有这些符号确保了它不会被解释为其他内容，并最终生成一段有效的 JavaScript\
  \ 代码。\n\n\n\n在清单 20-28 中，使用了`jQuery`库来编写处理服务器发送事件所需的 JavaScript 代码。服务器发送事件（SSE）是一种服务器推送技术，使客户端能够通过\
  \ HTTP 连接从服务器接收自动更新。这意味着页面已渲染，但连接保持打开状态，因此服务器可以向客户端发送更多数据。服务器发送事件的`EventSource`API\
  \ 已作为 HTML5 的一部分被标准化，除 Internet Explorer 外，所有其他浏览器均支持该 API。\n\n在图 20-6 中，Singer\
  \ 应用程序的主页面在 Firefox 中打开，您可以在开发者控制台中看到从服务器发送的数据流。\n\n![](img/315511_6_En_20_Fig6_HTML.jpg)\n\
  \n本地主机 8081 的截图显示了开发者控制台中从服务器发送的数据。在响应式应用程序 Bean 列表中，应用程序的可用性被高亮显示。\n\n图 20-6\n\n\
  Firefox 开发者控制台中显示的服务器发送事件\n\n还缺少一个部分：`/home`URL 路径与`home.html`视图之间的映射。本节开头提到，这可以通过使用处理函数和路由函数来实现。\n\
  \n清单 20-29 展示了用于渲染名为`'home'`的视图模板的处理函数。\n\n```\npackage com.apress.prospring6.twenty.boot.handler;\n\
  import org.springframework.http.MediaType;\nimport org.springframework.stereotype.Component;\n\
  import org.springframework.web.reactive.function.server.ServerRequest;\nimport org.springframework.web.reactive.function.server.ServerResponse;\n\
  import reactor.core.publisher.Mono;\n@Component\npublic class HomeHandler {\npublic\
  \ Mono view(ServerRequest request) {\nreturn ServerResponse\n.ok()\n.contentType(MediaType.TEXT_HTML)\n\
  .render(\"home\");\n}\n}\n清单 20-29\n用于将请求映射到视图的处理函数，返回逻辑视图名称\n```\n\n`render(..)`方法有两个版本，清单\
  \ 20-29 中使用的版本仅将逻辑视图名称作为参数，并使用可变参数声明模型属性（如果有）：`render(String name, Object...`​ `modelAttributes)`。另一个版本中，第二个参数是`Map<String,\
  \ ?>`，表示用于渲染模板的模型，可用于渲染错误页面。\n\n要将此处理函数添加到应用程序的路由配置中，我们只需将`HomeHandler`注入到本章配置的路由函数\
  \ Bean 中，并添加一个`GET(..)`路由函数，如清单 20-30 所示。\n\n```\npackage com.apress.prospring6.twenty.boot;\n\
  // 导入语句已省略\n@Slf4j\n@Configuration\npublic class RoutesConfig {\nfinal static Logger\
  \ LOGGER = LoggerFactory.getLogger(RoutesConfig.class);\n@Bean\npublic RouterFunction\
  \ singerRoutes(HomeHandler homeHandler, SingerHandler singerHandler) {\nreturn route()\n\
  .GET(\"/\", homeHandler::view)\n.GET(\"/home\", homeHandler::view)\n// 歌手路由已省略\n\
  .filter((request, next) -> {\nLOGGER.info(\"Before handler invocation: {}\" , request.path());\n\
  return next.handle(request);\n})\n.build();\n}\n}\n清单 20-30\n包含 HomeHandler::view\
  \ 处理函数的路由函数\n\n```\n\n另一个可能值得了解的是，在编写 Spring 响应式 Web 应用程序时，您可能希望将静态资源的路由配置隔离到使用`RouterFunctions.resources(..)`方法创建的不同路由函数中。此方法将匹配给定模式的请求路由到相对于给定根位置的资源，这对于跳过仅适用于动态资源的额外过滤非常有用。\n\
  \n清单 20-31 展示了静态资源的`RouterFunction<ServerResponse>` Bean 示例。\n\n```\npackage com.apress.prospring6.twenty.boot;\n\
  import org.springframework.web.reactive.function.server.RouterFunction;\nimport\
  \ static org.springframework.web.reactive.function.server.RouterFunctions.resources;\n\
  // 其他导入语句已省略\n@Slf4j\n@Configuration\npublic class RoutesConfig {\npublic RouterFunction\
  \ staticRouter() {\nreturn resources(\"/images/**\", new ClassPathResource(\"static/images/\"\
  ))\n.and(resources(\"/styles/**\", new ClassPathResource(\"static/styles/\")))\n\
  .and(resources(\"/js/**\", new ClassPathResource(\"static/js/\")));\n}\n// 其他配置已省略\n\
  }\n清单 20-31\n静态资源的 RouterFunction\n```\n\n请注意，`RouterFunction<ServerResponse>`可以使用`and(..)`方法进行组合。生成的路由函数是一个组合路由函数，它首先调用第一个函数，如果此路由没有结果，则调用另一个函数，依此类推。\n\
  \n### 处理函数验证\n\n函数式端点可以使用 Spring 的验证组件对请求体进行验证。为了解释验证的工作原理，我们将添加一个条件对象，允许用户指定数据库查询的过滤器。此条件对象在服务中用于决定执行哪个查询仓库。\n\
  \n`CriteriaDto`类被添加到`SingerService`接口中，因为它仅在此服务的上下文中使用，因此与其紧密相关。由于我们处理的是用户提供的数据，因此还需要一个验证器类。这两个类以及使用`CriteriaDto`作为参数的服务方法骨架如清单\
  \ 20-32 所示。\n\n```\npackage com.apress.prospring6.twenty.boot.service;\nimport org.springframework.validation.Errors;\n\
  import org.springframework.validation.ValidationUtils;\nimport org.springframework.validation.Validator;\n\
  // 其他导入语句已省略\npublic interface SingerService {\n// 其他服务方法已省略\nFlux findByCriteriaDto(CriteriaDto\
  \ criteria);\n@Getter\n@Setter\n@NoArgsConstructor\nclass CriteriaDto {\nprivate\
  \ String fieldName;\nprivate String fieldValue;\n}\nclass CriteriaValidator implements\
  \ Validator {\n@Override\npublic boolean supports(Class clazz) {\nreturn (CriteriaDto.class).isAssignableFrom(clazz);\n\
  }\n@Override\npublic void validate(Object target, Errors errors) {\nValidationUtils.rejectIfEmpty(errors,\
  \ \"fieldName\", \"required\", new Object[] { \"fieldName\" }, \"字段名称为必填项！\");\n\
  ValidationUtils.rejectIfEmpty(errors, \"fieldValue\", \"required\", new Object[]\
  \ { \"fieldValue\" }, \"字段值为必填项！\");\n}\n}\nenum FieldGroup {\nFIRSTNAME,\nLASTNAME,\n\
  BIRTHDATE;\npublic static FieldGroup getField(String field){\nreturn FieldGroup.valueOf(field.toUpperCase());\n\
  }\n}\n}\n清单 20-32\nCriteriaDto 对象和 CriteriaValidator 类\n```\n\n`CriteriaDto`实例用于保存表单对象的搜索条件。要使这些实例有效，两个字段都必须存在。\n\
  \n添加了`FieldGroup`枚举，以便轻松选择基于哪个列进行过滤。清单 20-33 展示了`findByCriteriaDto(..)`方法的实现。\n\n\
  \n\n```\npackage com.apress.prospring6.twenty.boot.service;\n// 导入语句已省略\n@RequiredArgsConstructor\n\
  @Transactional\n@Service\npublic class SingerServiceImpl implements SingerService\
  \ {\n@Override\npublic Flux findByCriteriaDto(CriteriaDto criteria) {\nvar fieldName\
  \ = FieldGroup.getField(criteria.getFieldName().toUpperCase());\nif (\"*\".equals(criteria.getFieldValue()))\
  \ {\nreturn singerRepo.findAll();\n}\nreturn  switch (fieldName)  {\ncase FIRSTNAME\
  \ -> \"*\".equals(criteria.getFieldValue())\n? singerRepo.findAll()\n: singerRepo.findByFirstName(criteria.getFieldValue());\n\
  case LASTNAME ->  \"*\".equals(criteria.getFieldValue())\n? singerRepo.findAll()\n\
  : singerRepo.findByLastName(criteria.getFieldValue());\ncase BIRTHDATE -> \"*\"\
  .equals(criteria.getFieldValue())\n? singerRepo.findAll()\n: singerRepo.findByBirthDate(LocalDate.parse(criteria.getFieldValue(),\
  \ DateTimeFormatter.ofPattern(\"yyyy-MM-dd\")));\n};\n}\n}\n清单 20-33\nSingerServiceImpl#findByCriteriaDto(..)\
  \ 实现\n```\n\n为了增加趣味性，代码中加入了当字段值等于 `*` 时选择所有条目的可能性。\n\n该方法由 `SingerHandler` 类中的一个处理函数调用，如清单\
  \ 20-34 所示。\n\n```\npackage com.apress.prospring6.twenty.boot.handler;\nimport org.springframework.validation.BeanPropertyBindingResult;\n\
  // 导入语句已省略\n@Component\npublic class SingerHandler {\n// 其他处理函数已省略\npublic Mono\
  \ search(ServerRequest serverRequest) {\nvar criteriaMono = serverRequest.bodyToMono(SingerService.CriteriaDto.class);\n\
  return criteriaMono.log()\n.flatMap(this::validate)\n.flatMap(criteria -> ok().contentType(MediaType.APPLICATION_JSON)\n\
  .body(singerService.findByCriteriaDto(criteria), Singer.class));\n}\nprivate Mono\
  \ validate(SingerService.CriteriaDto criteria) {\nvar validator = new SingerService.CriteriaValidator();\n\
  var errors = new BeanPropertyBindingResult(criteria, \"criteria\");\nvalidator.validate(criteria,\
  \ errors);\nif (errors.hasErrors()) {\n// throw new ServerWebInputException(errors.toString());\n\
  throw MissingValueException.of(errors.getAllErrors());\n}\nreturn Mono.just(criteria);\n\
  }\n}\n清单 20-34\n调用 findByCriteriaDto(..) 服务方法的处理函数\n```\n\n请注意 `validate(..)` 方法。该方法在响应式链中用作处理器。在这个简单的示例中，`CriteriaValidator`\
  \ 在此方法中被实例化。在验证器用于多个处理函数的较大型应用程序中，您可能希望将其声明为一个 Bean。如果 `validator.validate(criteria,\
  \ errors)` 填充了 `errors` 对象，则会使用缺失字段的名称和错误消息创建一个 `MissingValueException`。`MissingValueException`\
  \ 是一个自定义异常类型，带有一个简单的构建器，允许将验证错误转换为可以在界面中显示的表示形式。\n\n清单 20-35 展示了这个自定义异常类型。\n\n```\n\
  package com.apress.prospring6.twenty.boot.problem;\nimport org.springframework.validation.FieldError;\n\
  import org.springframework.validation.ObjectError;\n// 部分导入语句已省略\n@SuppressWarnings(\"\
  serial\")\npublic class MissingValueException extends  RuntimeException {\nprivate\
  \ Map fieldNames;\npublic MissingValueException(String message, Map fieldNames)\
  \ {\nsuper(message);\nthis.fieldNames = fieldNames;\n}\npublic MissingValueException(String\
  \ message, Throwable cause, Map fieldNames) {\nsuper(message, cause);\nthis.fieldNames\
  \ = fieldNames;\n}\npublic Map getFieldNames() {\nreturn fieldNames;\n}\npublic\
  \ static MissingValueException of(List errors) {\nfinal List fields = new ArrayList();\n\
  var fieldNames = new HashMap();\nerrors.forEach(err -> fieldNames.put( ((FieldError)err).getField()\
  \ , err.getDefaultMessage()));\nreturn new MissingValueException(\"Some values are\
  \ missing!\", fieldNames);\n}\n}\n清单 20-35\nMissingValueException 自定义异常类型\n```\n\
  \n下一步是在 `SingerHandler` 中添加一个方法来渲染搜索视图。该方法如清单 20-36 所示。\n\n```\npackage com.apress.prospring6.twenty.boot.handler;\n\
