  引言


  本书涵盖 Spring Framework 6 版本，是迄今为止最全面的 Spring 参考书和实践指南，旨在帮助您充分利用这一领先的企业级 Java 应用程序开发框架的强大功能。


  本版本涵盖了核心 Spring 及其与其他领先 Java 技术的集成，例如 Hibernate、JPA 3、Thymeleaf、Kafka、GraphQL 和
  WebFlux。本书的重点是使用 Java 配置类、lambda 表达式、Spring Boot 和响应式编程。我们分享了在企业应用程序开发方面的见解和实际经验，包括远程处理、事务、Web
  层和表示层等等。


  通过《Pro Spring 6》，您将学习如何执行以下操作：


  *   使用控制反转（IoC）和依赖注入（DI）

  *   了解 Spring Framework 6 的新特性

  *   使用 Spring MVC 构建基于 Spring 的 Web 应用程序

  *   使用 Spring WebFlux 构建 Spring Web 响应式应用程序

  *   使用 JUnit 5 测试 Spring 应用程序

  *   利用新的 Java 8+ lambda 语法

  *   将 Spring Boot 提升到高级水平，以便快速启动并运行任何类型的 Spring 应用程序

  *   使用 Cloud Native Buildpacks 将您的 Spring Native 应用程序打包成 Docker 镜像


  本书附带一个多模块项目，使用 Gradle 8/Maven 3.9 进行配置。该项目可在 Apress 官方仓库中找到：[`https://github.com/Apress/pro-spring-6`](https://github.com/Apress/pro-spring-6)。根据其`README.adoc`文件中的说明，克隆后即可立即构建项目。如果您本地未安装
  Gradle/Maven，可以依赖 IntelliJ IDEA，通过使用 Gradle/Maven Wrapper（[`https://docs.gradle.org/current/userguide/gradle_wrapper.html`](https://docs.gradle.org/current/userguide/gradle_wrapper.html)）来下载并使用它构建您的项目。本书末尾有一个简短的附录，描述了项目结构、配置以及与可用于开发和运行本书代码示例（可在
  GitHub 上获取）的开发工具相关的其他详细信息。


  在本书编写过程中，Spring 6 和 Spring Boot 3 的新版本发布了，IntelliJ IDEA 的新版本发布了，Gradle/Maven 以及本书中使用的其他技术也更新到了新版本。我们升级到了新版本，以提供最新的信息，并使本书与官方文档保持同步。多位审阅者检查了本书的技术准确性，但如果您发现任何不一致之处，请发送电子邮件至`editorial@apress.com`，我们将创建勘误表。


  您可以在`github.com/apress/pro-spring-6`访问本书的示例源代码。该代码将得到维护，与新技术版本同步，并根据使用它学习 Spring
  的开发者的建议进行丰富。


  我们真诚地希望您能像我们享受编写本书一样，享受使用本书学习 Spring 的过程。


