  在本章后面的部分，您将看到通过 JDBC 从数据库检索数据，并将结果集直接映射到 Java 对象（即 POJO）的示例。这些映射到表中记录的类也称为 **pojos**。对于
  `SINGER` 表，有一个 `Singer` 类，该类的实例映射到 `SINGER` 表中的行。


  在《我爱露西》的“终于到巴黎”一集中，露西通过里基、一名巴黎警察和另一名帮忙的男子^(⁴⁷) 精心策划的翻译工作，得以免于被捕。这一集基本上展示了露西惹上麻烦并被法国警察逮捕的情景。两名警察不会说英语，但其中一人会说法语和德语；里基和露西不会说法语，但里基会说西班牙语；而第三名男子只会说德语和西班牙语。这导致在只会说英语的露西和只会说法语的警察局长之间，形成了一条由三名翻译组成的链条。


  类似地，Java 应用程序和数据库无法直接通信，因此它们需要一个翻译器，在软件中这被称为**驱动程序**。在《我爱露西》那一集中，他们需要三名翻译才能完成任务。对于
  Java 和大多数数据库，我们有以下选择：


  *   我们通常需要一个翻译器，即驱动程序。

  *   如果我们想引入像 Hibernate 这样的持久化层，可能会用到两个。

  *   如果我们添加 Spring Data 来轻松地将记录映射到 POJO 并处理事务，可能会用到三个。


  在本书中，我们将向您展示如何实现这三种方式。让我们从基础开始，定义我们的 POJO。清单 6-1 展示了分别映射到 `SINGER` 和 `ALBUM` 表中记录的
  `Singer` 和 `Album` 类。


