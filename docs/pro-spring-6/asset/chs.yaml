  Spring 与 Jakarta 的 Bean Validation API 和 Hibernate Validator 的集成。


  ### 使用 JSR-349/Jakarta Bean Validation


  从 Spring 4 开始，已实现对 JSR-349（Bean Validation 3.0）^(¹⁰⁵) 的全面支持。Bean Validation API
  在 `jakarta.validation.constraints` 包下定义了一组以 Java 注解形式（例如 `@NotNull`）存在的约束，这些注解可应用于领域对象。此外，还可以通过注解开发和应用自定义验证器（例如，类级别验证器）。


  使用 Bean Validation API 可以避免与特定验证服务提供者耦合。通过使用 Bean Validation API，您可以使用标准注解和 API
  为领域对象实现验证逻辑，而无需了解底层的验证服务提供者。例如，Hibernate Validator^(¹⁰⁶) 就是 JSR-349 的一个参考实现。


  Spring 为 Bean Validation API 提供了无缝支持。主要功能包括：支持用于定义验证约束的 JSR-349 标准注解、自定义验证器，以及在
  Spring 的 `ApplicationContext` 中配置 JSR-349 验证。我们将在以下各节中逐一介绍这些功能。


  ### 依赖项


  对于接下来的章节，我们需要将 `hibernate-validator` 库添加到 `chapter11` 项目的类路径中。当前特定于 Jakarta 10 的版本是
  `8.0.0.Final`。其传递依赖项是 `jakarta.validation-api` 版本 `3.0.2`。此外，还需要一个 `jakarta.el.ExpressionFactory`
  的实现，因为它提供了创建和评估 Jakarta 表达式语言表达式的实现，因此也添加了 Glassfish 的 `jakarta.el` 版本 `5.0.0-M1`
  库。这些依赖项通过 Maven/Gradle 进行配置，并显示在 IntelliJ IDEA Gradle 视图的图 11-2 中。


