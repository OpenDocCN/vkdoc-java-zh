  测试方法几乎相同，测试输出显示创建了两个切面 bean。


  ![](img/315511_6_En_5_Figk_HTML.jpg)警示符号。 那么 `perthis(Pointcut)` 和 `pertarget(Pointcut)`
  之间有什么区别？区别在于到达被通知的连接点时被检查的对象。`Pertarget` 指定了一个类型表达式，这意味着对于每个作为触发通知的连接点目标的新对象，都会实例化一个新的切面。`perthis`
  指定了一个方法表达式，因此对于在触发通知的连接点处由 `this` 引用的每个新对象，都会实例化一个新的切面。


  你很少需要编写自己的切面，因为在构建 Spring 应用程序时你可能需要的几乎所有东西都已经由 Spring 提供了，但了解底层发生了什么以及 Spring 如何施展其魔法是很好的。这就是关于
  Spring 切面可以说的全部内容了，接下来让我们看看如何在 Spring Boot 应用程序中使用切面。




  ## Spring Boot AOP


  Spring Boot 提供了一个特殊的 AOP 启动器库 `spring-boot-starter-aop`，它省去了配置的麻烦，尽管原本的配置量也不多。要在
  Spring Boot 项目中使用该库，只需创建一个 Spring Boot 项目并将其添加为依赖项即可。


  在图 5-11 中，您可以看到作为依赖项添加到 Spring Boot 项目中的库集合（截图来自 Maven 视图；Gradle 视图几乎相同）。


  ![](img/315511_6_En_5_Fig11_HTML.jpg)


  一张 Maven 截图展示了 spring 6 第 5 章 boot、spring boot starter A o p、spring boot starter、spring
  A o p 和 aspect j weaver 下的依赖项。


  图 5-11


  IntelliJ IDEA 中展示的 Spring Boot AOP 启动器传递依赖


  通过将此库作为依赖项添加到项目中，不再需要 `@EnableAspectJAutoProxy(proxyTargetClass = true)` 注解，因为 AOP
  Spring 支持默认已启用。`proxyTargetClass` 属性也无需在任何地方设置，因为 Spring Boot 会自动检测您需要哪种类型的代理。


  前面章节中介绍的任何切面都可以添加到 Spring Boot 项目中，当使用代理时，您可以观察通知按预期工作。但让我们保持简单。声明了一个 `GrammyGuitarist`
  类型，其实现与本章其余部分使用的相同，不同之处在于，对于 Spring Boot 项目，`GrammyGuitarist` 不实现 `Singer` 接口。在项目中有了这些
  Bean 之后，可以使用清单 5-77 中所示的类来配置 Spring 应用程序。


