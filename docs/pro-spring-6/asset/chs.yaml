  ## Spring Kotlin 应用


  Kotlin^(¹⁶¹) 是一种由 JetBrains^(¹⁶²) 开发的 JVM 编程语言，该公司也出品了最好的 Java 编辑器 IntelliJ IDEA^(¹⁶³)（本书中反复向你推荐）。正如本章开头所述，Kotlin
  在语法上几乎可以说是 Java 和 Scala 的融合，兼具两者的优点：Java 的可读性、Scala 的优雅性，并且能够在 JVM 上运行，因此也能与 Java
  互操作。项目可以同时包含 Java 和 Kotlin 源码，像 Maven 和 Gradle 这样的智能编辑器知道如何编译它们，并将其构建成可在任何 JVM 上运行的字节码。Kotlin
  是一种跨平台、静态类型、通用、高级的编程语言，具有类型推断功能，使其语法更加简洁。


  以下是 Kotlin 的主要优势，可能会说服 Java 开发者尝试 Kotlin：


  *   Kotlin 语法简洁，需要编写的代码更少，从而避免了样板代码。Kotlin 官方页面指出，与 Java 相比，代码行数大约减少了 40%。此外，它还支持字符串模板表达式。

  *   Kotlin 同时具有面向对象和函数式编程结构，这意味着你可以使用其高阶函数、函数类型和 lambda 表达式来编写面向对象和函数式代码。

  *   Kotlin 支持非空类型，这有助于避免 `NullPointerExceptions`。

  *   Kotlin 的类及其成员默认是 final 的。

  *   Kotlin 使用智能转换，这意味着 `is` 运算符会检查对象的类型，Kotlin 编译器会显式转换不可变值，并在必要时自动插入（安全）转换。

  *   Kotlin 通过 `when` 表达式和数值区间提供了更好的控制流。

  *   Kotlin 中的公共超类名为 `Any`。

  *   默认情况下，方法和属性是 `final` 的，需要使用 `override` 关键字才能使其可重写，这使得继承代码更易于阅读。

  *   属性可以使用 `val` 关键字声明为只读，使用 `var` 关键字声明为可变。

  *   Kotlin 信奉*少即是多*的原则：getter、setter 和属性类型是可选的。

  *   接口可以拥有属性和函数。

  *   类和接口可以通过*扩展函数*在不使用继承的情况下增加新功能。要声明一个扩展函数，需要在其名称前加上一个*接收者类型*，该类型指向被扩展的类型。即使对象变量的值为
  `null`，也可以在其上调用扩展函数，这意味着可以在不检查空值的情况下对对象调用 `toString()`。

  *   Kotlin 为菱形继承问题^(¹⁶⁴)提供了解决方案。

  *   访问器或可见性修饰符与 Java 类似。Kotlin 中有四种可见性修饰符：`private`、`protected`、`internal` 和 `public`。默认可见性是
  `public`。

  *   如果顶层类、函数或接口是 `private` 的，则它仅对包含该声明的文件可见。

  *   如果顶层类、函数或接口是 `internal` 的，则它对同一模块内的所有地方可见。

  *   `protected` 修饰符不适用于顶层声明。

  *   构造函数使用 `constructor` 关键字声明，默认是 `public` 的。

  *   Kotlin 支持模块：模块是一组一起编译的 Kotlin 文件。

  *   Kotlin 支持伴生对象；伴生对象类似于静态实例，允许在不实例化类型的情况下调用方法。

  *   Kotlin 支持数据类：具有标准功能（如 `equals()`、`hashCode()`、`toString()` 等）的类。

  *   Kotlin 支持密封类（并且在 Java 之前就已支持）。

  *   Kotlin 支持内联类。

  *   Kotlin 通过 `协程` 支持异步或非阻塞编程。

  *   Kotlin 支持解构对象。


  本节构建的应用程序并未使用所有提到的特性，但在此列出它们是为了激发你的兴趣。有关所有特性的更多信息，官方文档和教程非常出色，^(¹⁶⁵) Jim Lavers
  所著的《Learn to Program with Kotlin》^(¹⁶⁶)（Apress，2021 年）一书也是如此。


  有了以上对 Kotlin 的介绍，让我们开始使用 Kotlin 构建一个 Spring Boot Web 应用程序吧。




  ### 配置


  Kotlin 应用程序可以使用 Gradle 和 Maven 构建。项目结构是本书开头介绍的标准 Maven 结构，只是 Kotlin 源文件位于 `kotlin`
  目录下。此外，根据所构建应用程序的类型，还需要一些 Kotlin 插件，以确保 Kotlin 源代码被编译成 JVM 可执行的字节码。本节构建 Spring Boot
  应用程序所需的插件如下所列并进行了解释。


  首先是 Kotlin Gradle 插件（`kotlin-gradle-plugin`），它会根据构建脚本中的 `compilerOptions.jvmTarget`
  编译器选项选择合适的 JVM 标准库。对于多模块 Gradle 项目，该插件需要作为 `classpath` 依赖项添加到父项目中，并在子项目 `chapter16-kotlin-boot`
  中使用。清单 16-30 展示了这两部分 Gradle 配置。


  ```

  // pro-spring-6/build.gradle

  buildscript {

  repositories {

  mavenLocal()

  mavenCentral()

  }

  dependencies {

  classpath ''io.spring.gradle:dependency-management-plugin:1.1.0''

  classpath ''org.jetbrains.kotlin:kotlin-gradle-plugin:1.8.10''

  }

  }

  // pro-spring-6/chapter16-kotlin-boot/chapter16-kotlin-boot.gradle

  apply plugin: ''org.jetbrains.kotlin.jvm''

  tasks.withType(KotlinCompile).configureEach {

  compileKotlin.compilerOptions.freeCompilerArgs.add(''-Xjsr305=strict'')

  compileKotlin.compilerOptions.jvmTarget.set(JvmTarget.JVM_19)

  }

  tasks.withType(Test).configureEach {

  useJUnitPlatform()

  compileTestKotlin.compilerOptions.jvmTarget.set(JvmTarget.JVM_19)

  }

