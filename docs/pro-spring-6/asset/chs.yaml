  # 15. Spring REST 支持


  **第** **13****章**介绍了两个暴露 REST API 的 Spring Web 应用之间通过 HTTP 协议进行的通信。本章将扩展这一主题，向你介绍
  RESTful Web 服务，也称为 RESTful-WS。


  如今，RESTful-WS 或许是远程访问中使用最广泛的技术。从通过 HTTP 进行远程服务调用，到支持 Ajax 风格的交互式 Web 前端，RESTful-WS
  正被大量采用，尤其是因为微服务的兴起。RESTful Web 服务之所以流行，有以下几个原因：


  *   ***易于理解***：RESTful Web 服务围绕 HTTP 设计。URL 与 HTTP 方法共同指定了请求的意图。例如，URL [`http://somedomain.com/restful/customer/1`](http://somedomain.com/restful/customer/1)
  配合 HTTP 方法 `GET` 表示客户端想要检索客户信息，其中客户 ID 等于 1。


  *   ***轻量级***：与基于 SOAP 的 Web 服务相比，RESTful 要轻量得多。SOAP 服务包含大量元数据来描述客户端想要调用哪个服务。而对于
  RESTful 的请求和响应，它仅仅是 HTTP 请求和响应，就像任何其他 Web 应用一样。


  *   ***对防火墙友好***：由于 RESTful Web 服务设计为可通过 HTTP（或 HTTPS）访问，因此应用对防火墙更加友好，远程客户端也更容易访问。


  在本章中，我们将介绍 RESTful-WS 的基本概念，以及 Spring 通过其 Spring MVC 模块对 RESTful-WS 的支持。


  ## 介绍 RESTful Web 服务


  RESTful-WS 中的 REST 是 **RE**presentational **S**tate **T**ransfer（表述性状态转移）的缩写，它是一种架构风格。REST
  定义了一组架构约束，这些约束共同描述了一个用于访问资源的统一接口。该统一接口的主要概念包括资源的标识以及通过表述对资源进行操作。对于资源的标识，一条信息应能通过统一资源标识符（URI）访问。例如，URL
  [`http://somedomain.com/api/singer/1`](http://somedomain.com/api/singer/1) 是一个代表资源的
  URI，该资源是一条标识符为 1 的歌手信息。如果标识符为 1 的歌手不存在，客户端将收到 404 HTTP 状态码，就像网站上的“页面未找到”错误。另一个例子，[`http://somedomain.com/api/singers`](http://somedomain.com/api/singers)
  是一个代表资源的 URI，该资源是一个歌手信息列表。这些可标识的资源可以通过各种表述进行管理，如表 15-1 所示。


  表 15-1


  用于操作资源的表述


  | HTTP 方法 | 描述 |

  | --- | --- |

  | `GET` | GET 检索资源的表述。 |

  | `HEAD` | 与 GET 相同，但没有响应体。通常用于获取头部信息。 |

  | `POST` | POST 创建新资源。 |

  | `PUT` | PUT 更新资源。 |

  | `DELETE` | DELETE 删除资源。 |

  | `OPTIONS` | OPTIONS 检索允许的 HTTP 方法。 |


  关于 RESTful Web 服务的详细描述，我们推荐 *Ajax and REST Recipes: A Problem-Solution Approach
  by Christian Gross*（Apress, 2006）。


  ### 使用 Spring MVC 暴露 RESTful Web 服务


  在本节中，我们将向你展示如何使用 Spring MVC 将歌手服务暴露为 RESTful Web 服务，正如上一节所设计的那样。此示例基于已介绍的 `Singer`
  类和 `SingerRepo` 仓库接口构建。


  ![](img/315511_6_En_15_Figa_HTML.jpg)一个警告图标。 在本书的上一版中，使用了 Castor^(¹⁴⁴) XML 进行序列化。Castor
  库已有一段时间未维护，因此在本版中，我们弃用了它，转而使用 Jackson^(¹⁴⁵)。


  Jackson 库功能非常强大，提供了将对象序列化为 JSON 和 XML 的组件。通过注解可以轻松地将 Java 属性映射到 XML 元素或 JSON 属性。尽管
  Jackson 注解命名为 `@Json*`，但它们也适用于 XML 序列化的配置。清单 15-1 展示了使用 Jackson 注解修饰的 `Singer` 类。


