  包中的特定类来实现。例如，`org.springframework.boot.actuate.health.HealthIndicator` 的自定义实现可以向
  `/health` 端点添加额外信息。


  正如预期的那样，Spring Boot Actuator 提供了创建您自己的端点的选项。这是通过使用 `org.springframework.boot.actuate.endpoint.annotation`
  包中的 `@Endpoint` 注解一个 bean 来完成的。使用 `@ReadOperation`（处理 GET 请求）、`@WriteOperation`（处理
  POST 请求）和 `@DeleteOperation`（处理 DELETE 请求）注解其方法，可以通过 JMX 和 HTTP 公开它们。


