- "# 8. Spring 与 JPA\n\n在**第** **7** **章**中，我们讨论了在使用 ORM 方法实现数据访问逻辑时，如何将 Hibernate\
  \ 与 Spring 结合使用。我们演示了如何在 Spring 配置中配置 Hibernate 的 `SessionFactory`，以及如何使用 `Session`\
  \ 接口执行各种数据访问操作。然而，这只是使用 Hibernate 的一种方式。在 Spring 应用程序中采用 Hibernate 的另一种方式是将其用作标准\
  \ Java 持久化 API（JPA，现已更名为 Jakarta Persistence API）的持久化提供者。\n\nHibernate 的 POJO 映射及其强大的查询语言（HQL）取得了巨大成功，并影响了\
  \ Java 世界中数据访问技术标准的发展。在 Hibernate 之后，Java Community Process 成员开发了 Java 数据对象（JDO）标准，随后是\
  \ JPA。\n\n在撰写本文时，JPA 已达到 3.1 版本，并提供了一些标准化的概念，例如 `PersistenceContext`、`EntityManager`\
  \ 和 Java 持久化查询语言（JPQL）。这些标准化为开发人员提供了一种在 JPA 持久化提供者（如 Hibernate、EclipseLink、Oracle\
  \ TopLink 和 Apache OpenJPA）之间切换的方法。因此，大多数新的 JEE 应用程序都采用 JPA 作为数据访问层。\n\nSpring 也为\
  \ JPA 提供了出色的支持。例如，Spring 容器会创建并管理一个 `EntityManager` 实例，并根据 `EntityManagerFactoryBean`\
  \ bean 将其注入到相应的 JPA 组件中。\n\nSpring Data 项目还提供了一个名为 Spring Data JPA 的子项目，它为在 Spring\
  \ 应用程序中使用 JPA 提供了高级支持。Spring Data JPA 项目的主要特性包括仓库和规范的概念，以及对查询领域特定语言（Querydsl）的支持。\n\
  \n本章将介绍如何使用 JPA 3.1（最近由 Oracle 外包，因此更名为 Jakarta Persistence API^(⁷⁰)）与 Spring 结合，并使用\
  \ Hibernate 作为底层持久化提供者。您将学习如何使用 JPA 的 `EntityManager` 接口和 JPQL 实现各种数据库操作。然后，您将看到\
  \ Spring Data JPA 如何进一步帮助简化 JPA 开发。最后，我们介绍与 ORM 相关的高级主题，包括原生查询和条件查询。\n\n具体来说，我们将讨论以下主题：\n\
  \n*   *Jakarta Persistence API（JPA）的核心概念*：我们介绍 JPA 的主要概念。\n\n*   *配置 JPA 实体管理器*：我们讨论\
  \ Spring 支持的 `EntityManagerFactory` 类型，以及如何配置最常用的 `LocalContainerEntityManagerFactoryBean`。\n\
  \n*   *数据操作*：我们展示如何在 JPA 中实现基本的数据库操作，这与单独使用 Hibernate 时的概念非常相似。\n\n*   *高级查询操作*：我们讨论如何在\
  \ JPA 中使用原生查询，以及 JPA 中强类型的 Criteria API，以实现更灵活的查询操作。\n\n![](img/315511_6_En_8_Figa_HTML.jpg)一个圆形背景上带有小写字母\
  \ i 的符号。 与 Hibernate 类似，JPA 支持在 XML 或 Java 注解中定义映射。本章重点介绍注解类型的映射，因为其使用方式往往比 XML\
  \ 风格更受欢迎。\n\n## 介绍 JPA 3.1\n\n与其他 Java 规范请求（JSR）一样，由 JSR-338^(⁷¹) 定义的 JPA 2.1 规范的目标是在\
  \ JSE 和 JEE 环境中标准化 ORM 编程模型。它定义了一组通用的概念、注解、接口和其他服务，JPA 持久化提供者应实现这些内容。当按照 JPA 标准进行编程时，开发人员可以选择随意切换底层提供者，就像为基于\
  \ JEE 标准开发的应用程序切换到另一个符合 JEE 标准的应用服务器一样。由于 Oracle 不再负责 JPA 的开发，未来将不会有其他针对它的 JSR，但您可以在\
  \ Jakarta EE 官方网站上了解最新版本。本项目使用的版本是 JPA 3.1。^(⁷²)\n\nJPA 的核心概念是 `EntityManager` 接口，它来源于\
  \ `EntityManagerFactory` 类型的工厂。`EntityManager` 的主要工作是维护一个持久化上下文，其中将存储由其管理的所有实体实例。`EntityManager`\
  \ 的配置被定义为一个*持久化单元*，一个应用程序中可以有多个持久化单元。如果您使用 Hibernate，可以将持久化上下文视为 `Session` 接口，而\
  \ `EntityManagerFactory` 则等同于 `SessionFactory`。在 Hibernate 中，受管理的实体存储在会话中，您可以通过\
  \ Hibernate 的 `SessionFactory` 或 `Session` 接口直接与之交互。然而，在 JPA 中，您不能直接与持久化上下文交互。相反，您需要依赖\
  \ `EntityManager` 为您完成工作。\n\nJPQL 类似于 HQL，因此如果您之前使用过 HQL，那么 JPQL 应该很容易上手。不过，在 JPA\
  \ 2 中，引入了一个强类型的 Criteria API，它依赖于映射实体的元数据来构建查询。因此，任何错误都将在编译时而非运行时被发现。\n\n关于 JPA\
  \ 2 的详细讨论，由于 JPA 3 除了包名（jakarta）之外完全相同，我们推荐 Mike Keith 和 Merrick Schincariol 合著的\
  \ *Pro JPA 2*^(⁷³)（Apress，2013 年）。在本节中，我们将讨论 JPA 的基本概念、本章将使用的示例数据模型，以及如何配置 Spring\
  \ 的 `ApplicationContext` 以支持 JPA。\n\n\n\n### 示例代码的样本数据模型\n\n本章使用与**第** **7****章**相同的数据模型。首先，我们将沿用上一章中使用的数据库创建脚本。如果你跳过了**第**\
  \ **7****章**，请查看该章“示例代码的样本数据模型”部分介绍的数据模型，这有助于你理解本章的示例代码。\n\n### 配置 JPA 的 `EntityManagerFactory`\n\
  \n如前文所述，要在 Spring 中使用 JPA，我们需要配置 `EntityManagerFactory`，就像 Hibernate 中使用的 `SessionFactory`\
  \ 一样。Spring 支持三种类型的 `EntityManagerFactory` 配置。\n\n第一种方式是使用 `LocalEntityManagerFactoryBean`\
  \ 类。这是最简单的方式，只需提供持久化单元名称即可。然而，由于它不支持注入 `DataSource`，因此无法参与全局事务，仅适用于简单的开发目的。\n\n\
  第二种方式是使用符合 JEE 规范的容器，在这种方式下，应用服务器会根据部署描述符中的信息引导 JPA 持久化单元。这使得 Spring 可以通过 JNDI JEE\
  \ 命名空间查找实体管理器。这显然意味着需要 XML 配置。清单 8-1 展示了通过 JNDI 查找实体管理器所需的元素。\n\n```\n\n清单 8-1\n\
  使用 JNDI JEE 命名空间进行查找的 Spring XML 配置片段\n```\n\n在 JPA 规范中，持久化单元应在配置文件 `META-INF/persistence.xml`\
  \ 中定义。然而，从 Spring 3.1 开始，新增了一项功能消除了这一需求；我们将在本章后面展示如何使用它。\n\n幸运的是，有多种 Java 配置替代方案可以在\
  \ Spring 的 `@Configuration` 类中使用。清单 8-2 所示的配置是其中最简洁的一种。\n\n```\npackage com.apress.prospring6.eight.config;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
  import org.springframework.jdbc.datasource.lookup.JndiDataSourceLookup;\nimport\
  \ javax.sql.DataSource;\n@Configuration\npublic class JndiDataSourceCfg {\n@Bean\n\
  public DataSource dataSource() {\nfinal JndiDataSourceLookup dsLookup = new JndiDataSourceLookup();\n\
  dsLookup.setResourceRef(true);\nreturn dsLookup.getDataSource(\"persistence/prospring6PersistenceUnit\"\
  );\n}\n}\n清单 8-2\n使用 JNDI JEE 命名空间进行查找的 Spring 注解配置片段\n```\n\n第三种方式（也是本章使用的最常见方式）是使用\
  \ `LocalContainerEntityManagerFactoryBean` 类，它支持注入 `DataSource`，并且可以参与本地和全局事务。清单\
  \ 8-3 展示了配置片段。\n\n```\npackage com.apress.prospring6.eight.config;\nimport org.hibernate.cfg.Environment;\n\
  import org.hibernate.jpa.HibernatePersistenceProvider;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.orm.jpa.JpaTransactionManager;\nimport org.springframework.orm.jpa.JpaVendorAdapter;\n\
  import org.springframework.orm.jpa.LocalContainerEntityManagerFactoryBean;\nimport\
  \ org.springframework.orm.jpa.vendor.HibernateJpaVendorAdapter;\nimport org.springframework.transaction.PlatformTransactionManager;\n\
  import org.springframework.transaction.annotation.EnableTransactionManagement;\n\
  // 其他导入语句已省略\n@Import(BasicDataSourceCfg.class)\n@Configuration\n@EnableTransactionManagement\n\
  @ComponentScan(basePackages = {\"com.apress.prospring6.eight.service\"})\npublic\
  \ class JpaConfig {\nprivate static Logger LOGGER = LoggerFactory.getLogger(JpaConfig.class);\n\
  @Autowired\nDataSource dataSource;\n@Bean\npublic PlatformTransactionManager transactionManager()\
  \ {\nJpaTransactionManager transactionManager=new JpaTransactionManager();\ntransactionManager.setEntityManagerFactory(entityManagerFactory().getObject());\n\
  return transactionManager;\n}\n@Bean\npublic JpaVendorAdapter jpaVendorAdapter()\
  \ {\nreturn new HibernateJpaVendorAdapter();\n}\n@Bean\npublic Properties jpaProperties()\
  \ {\nProperties jpaProps = new Properties();\njpaProps.put(Environment.HBM2DDL_AUTO,\
  \ \"none\");\njpaProps.put(Environment.FORMAT_SQL, false);\njpaProps.put(Environment.USE_SQL_COMMENTS,\
  \ false);\njpaProps.put(Environment.SHOW_SQL, false);\nreturn jpaProps;\n}\n@Bean\n\
  public LocalContainerEntityManagerFactoryBean entityManagerFactory() {\nvar factory\
  \ = new LocalContainerEntityManagerFactoryBean();\nfactory.setDataSource(dataSource);\n\
  factory.setJpaVendorAdapter(jpaVendorAdapter());\n//factory.setPersistenceProviderClass(HibernatePersistenceProvider.class);\n\
  factory.setPackagesToScan(\"com.apress.prospring6.eight.entities\");\nfactory.setJpaProperties(jpaProperties());\n\
  return factory;\n}\n}\n清单 8-3\n使用 LocalContainerEntityManagerFactoryBean 的 Spring\
  \ 注解配置\n```\n\n在此配置中，声明了几个 Bean，以便支持使用 Hibernate 作为持久化提供程序来配置 `LocalContainerEntityManagerFactoryBean`。每个\
  \ Bean 的用途及其他配置细节描述如下：\n\n*   *组件扫描*：这个标签你应该很熟悉。我们指示 Spring 扫描 `com.apress.prospring6.eight.service`\
  \ 包下的组件。\n\n*   `dataSource`：此 Bean 被注入，并在一个单独的配置类中声明，该类仅包含数据库特定的 Bean 和属性（例如，**第**\
  \ **7****章**中介绍的 `BasicDataSourceCfg`）。\n\n*   `transactionManager`：`EntityManagerFactory`\
  \ 需要一个事务管理器来进行事务性数据访问。Spring 专门为 JPA 提供了一个事务管理器（`org.springframework.orm.jpa.JpaTransactionManager`）。该\
  \ Bean 被声明并分配了 ID `transactionManager`。我们将在**第** **9****章**中详细讨论事务。`@EnableTransactionManagement`\
  \ 注解是必需的，以支持使用注解声明事务边界需求，但目前请注意，此 Bean 需要一个由 `EntityManagerFactoryBean` 通过调用 `getObject()`\
  \ 创建的 `EntityManagerFactory` 实例。\n\n*   `JpaVendorAdapter`：此 Bean 允许我们将供应商特定的行为插入到\
  \ Spring 的 `EntityManagerFactory` 创建器中。在本例中，我们使用的是 Hibernate，因此该 Bean 的类型是 `HibernateJpaVendorAdapter`。\n\
  \n\n\n*   `EntityManagerFactoryBean`：JPA 的`EntityManagerFactory` bean 是此配置中最核心的部分。然而，它并非直接配置，而是通过声明一个`LocalContainerEntityManagerFactoryBean`\
  \ bean 来配置和创建它。要配置`LocalContainerEntityManagerFactoryBean` bean，需要以下内容：\n    * \
  \  一个`DataSource` bean。\n\n*   一个`HibernateJpaVendorAdapter` bean。\n\n*   第三点，虽然被注释掉了，但仍值得一提。调用`setPersistenceProviderClass(..)`方法会设置用于创建`EntityManagerFactory`的`PersistenceProvider`实现类。如果未指定，持久化提供者将从`JpaVendorAdapter`（如果有）中获取，或通过扫描（尽可能）检索。这也意味着，一旦指定，`JpaVendorAdapter`\
  \ bean 就不再是必需的。\n\n*   第四点，我们通过将`packagesToScan`属性设置为`com.apress.prospring6.eight.entities`，指示`LocalContainerEntityManagerFactoryBean`\
  \ bean 扫描该包下带有 ORM 注解的领域对象。\n\n![](img/315511_6_En_8_Figb_HTML.jpg)一个符号描绘了水平线上的一团火焰标记。 请注意，此功能自\
  \ Spring 3.1 起才可用。在同一版本中，增加了对领域类扫描的支持，这使得可以从`META-INF/persistence.xml`文件中移除持久化单元的定义。\n\
  \n*   最后，`jpaProperties`属性为 Hibernate 持久化提供者提供了配置细节。其配置选项与**第** **7** **章**中介绍的相同。\n\
  \n### 使用 JPA 注解进行 ORM 映射\n\n如果你阅读过**第** **7** **章**，可能会注意到用于配置实体类的注解都是 JPA 注解。Hibernate\
  \ 曾经有一套自己的注解，但在 JPA 开发时，其背后的团队决定简化事情并采用新的规范。这就是为什么，如果你查看**第** **7** **章**中领域类的源代码，会看到使用了相同的映射注解。\n\
  \n一旦`EntityManagerFactory`被正确配置，将其注入到你的类中就很简单了。让我们从一个简单的服务类开始。\n\n![](img/315511_6_En_8_Figc_HTML.jpg)一个符号描绘了水平线上的一团火焰标记。 在多层级应用中，服务类依赖于仓库类，并且服务\
  \ bean 通常是那些用`@Transactional`注解的，这样相关的仓库调用就可以被分组到同一个事务中。由于本项目中的服务类除了调用仓库类之外不做其他事情，我们决定将两者合并，因此服务类同时使用了`@Repository`和`@Transactional`注解。\n\
  \n这样做的目的是为了简化，除了学术目的外，你可能永远不需要编写这样的代码。\n\n![](img/315511_6_En_8_Figd_HTML.jpg)一个符号描绘了圆形背景上的小写字母\
  \ i。 本章代码中展示了`@Transactional`注解，因为在事务之外执行数据库操作是你可能永远不想做的事情，除非你使用的是数据库即服务（例如 DynamoDB）。事务将在**第**\
  \ **9** **章**中详细讨论。\n\n清单 8-4 中展示的`SingerService`接口声明了该 bean 类型需要实现的方法。\n\n```\n\
  package com.apress.prospring6.eight.service;\nimport com.apress.prospring6.eight.entities.Singer;\n\
  import java.util.Optional;\nimport java.util.stream.Stream;\npublic interface SingerService\
  \ {\nString ALL_SINGER_NATIVE_QUERY =\n\"select ID, FIRST_NAME, LAST_NAME, BIRTH_DATE,\
  \ VERSION from\nSINGER\";\nStream findAll();\nStream findAllWithAlbum();\nOptional\
  \ findById(Long id);\nOptional save(Singer singer);\nvoid delete(Singer singer);\n\
  Stream findAllByNativeQuery();\n}\n清单 8-4\nSingerService 接口\n```\n\n这个接口非常简单；它只有三个查找方法、一个保存方法和一个删除方法。保存方法将同时服务于插入和更新操作。为了增加趣味性和一点不同，我们还把方法的返回类型从`Set<T>`改为了`Stream<T>`。\n\
  \n清单 8-5 展示了实现`SingerService`接口的`SingerServiceImpl`类的代码，我们将用它作为使用 JPA 执行数据库操作的示例。\n\
  \n```\npackage com.apress.prospring6.eight.service;\nimport jakarta.persistence.EntityManager;\n\
  import jakarta.persistence.TypedQuery;\nimport jakarta.persistence.PersistenceContext;\n\
  // 其他导入语句已省略\n@Service(\"jpaSingerService\")\n@Repository\n@Transactional\npublic\
  \ class SingerServiceImpl  implements SingerService {\nprivate static final Logger\
  \ LOGGER = LoggerFactory.getLogger(SingerServiceImpl.class);\n@PersistenceContext\n\
  private EntityManager em;\n@Transactional(readOnly=true)\n@Override\npublic Stream\
  \ findAllWithAlbum() {\nthrow new NotImplementedException(\"findAllWithAlbum\");\n\
  }\n@Transactional(readOnly=true)\n@Override\npublic Stream findAll() {\nthrow new\
  \ NotImplementedException(\"findAll\");\n}\n@Transactional(readOnly=true)\n@Override\n\
  public Optional findById(Long id) {\nthrow new NotImplementedException(\"findById\"\
  );\n}\n@Override\npublic Optional save(Singer singer) {\nthrow new NotImplementedException(\"\
  save\");\n}\n@Override\npublic void delete(Singer singer) {\nthrow new NotImplementedException(\"\
  delete\");\n}\n@Override\npublic Stream findAllByNativeQuery() {\nthrow new NotImplementedException(\"\
  findAllByNativeQuery\");\n}\n}\n清单 8-5\nSingerServiceImpl Bean 类型\n```\n\n该类应用了几个注解：\n\
  \n*   `@Service`注解用于标识该类是一个向其他层提供业务服务的 Spring 组件，并将 Spring bean 命名为`jpaSingerService`。\n\
  \n*   `@Repository`注解表明该类包含数据访问逻辑，并指示 Spring 将特定于供应商的异常转换为 Spring 的`DataAccessException`层次结构。\n\
  \n*   `@Transactional`注解用于定义事务需求。\n\n为了注入`EntityManager`，我们使用了`@PersistenceContext`注解，这是用于实体管理器注入的标准\
  \ JPA 注解。为什么我们使用`@PersistenceContext`这个名称来注入实体管理器可能令人费解，但如果你考虑到持久化上下文本身是由`EntityManager`管理的，那么这个注解的命名就完全合理了。如果你的应用程序中有多个持久化单元，你还可以向注解添加`unitName`属性来指定要注入哪个持久化单元。通常，一个持久化单元代表一个独立的后端`DataSource`。\n\
  \n\n## 使用 JPA 执行数据库操作\n\n使用 `EntityManager` 执行查询和管理数据，与使用 Hibernate 的 `SessionFactory`\
  \ 类似，唯一的区别在于不涉及会话。\n\nJPQL 和 HQL 的语法非常相似，以至于我们在**第** **7** **章**中使用的所有 HQL 查询都可以复用来实现\
  \ `SingerService` 接口中的查找方法。要使用 JPA 和 Hibernate，需要**第** **7** **章**中完全相同的依赖集；其中最重要的是\
  \ `spring-orm` 和 `hibernate-core-jakarta`。后者依赖于 Jakarta 的 `persistence-api.jar`，并将其作为传递依赖添加到类路径中。该项目的依赖关系如图\
  \ 8-1 中 IntelliJ IDEA 的 Gradle 视图所示。\n\n![](img/315511_6_En_8_Fig1_HTML.jpg)\n\n\
  一张截图展示了第 8 章的依赖关系：hibernate-core Jakarta 和 Jakarta dot persistence a p i。\n\n图 8-1\n\
  \nSpring 与 Hibernate JPA 项目依赖关系\n\n### 使用 Java 持久化查询语言查询数据\n\n清单 8-6 回顾了**第** **7**\
  \ **章**中介绍的 `Singer` 领域对象模型类的重要代码片段。（其他类将不再展示。）\n\n```\npackage com.apress.prospring6.eight.entities;\n\
  import jakarta.persistence.*;\nimport java.io.Serial;\n// 其他 import 语句已省略\n@Entity\n\
  @Table(name = \"SINGER\")\n@NamedQueries({\n@NamedQuery(name=Singer.FIND_ALL, query=\"\
  select s from Singer s\"),\n@NamedQuery(name=Singer.FIND_SINGER_BY_ID,\nquery=\"\
  \"\"\nselect distinct s from Singer s\nleft join fetch s.albums a\nleft join fetch\
  \ s.instruments i\nwhere s.id = :id\n\"\"\"),\n@NamedQuery(name=Singer.FIND_ALL_WITH_ALBUM,\n\
  query=\"\"\"\nselect distinct s from Singer s\nleft join fetch s.albums a\nleft\
  \ join fetch s.instruments i\n\"\"\")\n})\npublic class Singer extends AbstractEntity\
  \ {\n@Serial\nprivate static final long serialVersionUID = 2L;\npublic static final\
  \ String FIND_ALL = \"Singer.findAll\";\npublic static final String FIND_SINGER_BY_ID\
  \ = \"Singer.findById\";\npublic static final String FIND_ALL_WITH_ALBUM = \"Singer.findAllWithAlbum\"\
  ;\nprivate String firstName;\nprivate String lastName;\nprivate LocalDate birthDate;\n\
  private Set albums = new HashSet();\nprivate Set instruments = new HashSet();\n\
  @Column(name = \"FIRST_NAME\")\npublic String getFirstName() {\nreturn this.firstName;\n\
  }\n@Column(name = \"LAST_NAME\")\npublic String getLastName() {\nreturn this.lastName;\n\
  }\n@Column(name = \"BIRTH_DATE\")\npublic LocalDate getBirthDate() {\nreturn birthDate;\n\
  }\n@OneToMany(mappedBy = \"singer\", cascade=CascadeType.ALL, orphanRemoval=true)\n\
  public Set getAlbums() {\nreturn albums;\n}\n@ManyToMany\n@JoinTable(name = \"SINGER_INSTRUMENT\"\
  ,\njoinColumns = @JoinColumn(name = \"SINGER_ID\"),\ninverseJoinColumns = @JoinColumn(name\
  \ = \"INSTRUMENT_ID\"))\npublic Set getInstruments() {\nreturn instruments;\n}\n\
  // 其他方法已省略\n}\n清单 8-6\nSinger 领域对象\n```\n\n如果你分析使用 `@NamedQuery` 定义的查询，会发现 HQL 和\
  \ JPQL 之间似乎没有区别，至少对于简单查询而言是如此。现在我们有了实体类和配置，就可以开始实现与数据库交互的方法了。让我们从编写 `findAll()`\
  \ 方法开始，该方法简单地检索数据库中的所有歌手。方法实现如清单 8-7 所示。\n\n```\npackage com.apress.prospring6.eight.service;\n\
  // import 语句已省略\n@Service(\"jpaSingerService\")\n@Repository\n@Transactional\npublic\
  \ class SingerServiceImpl  implements SingerService {\nprivate static final Logger\
  \ LOGGER = LoggerFactory.getLogger(SingerServiceImpl.class);\n@PersistenceContext\n\
  private EntityManager em;\n@Transactional(readOnly=true)\n@Override\npublic Stream\
  \ findAll() {\nreturn em.createNamedQuery(Singer.FIND_ALL, Singer.class)\n.getResultList()\n\
  .stream();\n}\n// 其他方法已省略\n}\n清单 8-7\n使用 EntityManager 实现的 findAll() 方法\n```\n\n\
  如清单 8-7 所示，我们使用 `EntityManager.createNamedQuery()` 方法，传入查询名称和期望的返回类型。该方法返回一个 `TypedQuery<X>`\
  \ 实例。然后调用 `getResultList()` 方法检索歌手，并以流的形式返回。为了测试该方法的实现，构建了一个测试类，该类使用 Testcontainers\
  \ 启动一个 MariaDB 测试容器来运行查询。用于测试 `SingerServiceImpl.findAll()` 的测试方法以及 Testcontainers\
