  有两种方法可以配置要使用的任务调度器：让 `TaskSchedulingConfig` 类实现 `org.springframework.scheduling.annotation.SchedulingConfigurer`
  并重写 `configureTasks(..)` 来设置自定义任务调度器，或者声明一个自定义的任务调度器 bean。


  清单 12-14 展示了实现 `SchedulingConfigurer` 的 `TaskSchedulingConfig2` 类。


  ```

  package com.apress.prospring6.twelve.spring.config;

  import org.springframework.context.annotation.FilterType;

  import org.springframework.scheduling.annotation.EnableScheduling;

  import org.springframework.scheduling.annotation.SchedulingConfigurer;

  import org.springframework.scheduling.concurrent.ThreadPoolTaskScheduler;

  import org.springframework.scheduling.config.ScheduledTaskRegistrar;

  import java.util.concurrent.Executor;

