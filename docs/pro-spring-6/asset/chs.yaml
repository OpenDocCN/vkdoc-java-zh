  ## Spring 中的任务调度


  执行任务显然很容易，但企业应用通常需要以更可控的方式执行，这意味着任务必须被调度。在许多应用中，各种任务（例如向客户发送电子邮件通知、运行日终作业、执行数据清理以及批量更新数据）需要按固定间隔（例如每小时）或特定计划（例如每周一至周五晚上
  8 点）定期调度执行。


  在 Spring 应用中，有多种方式可以触发任务的执行。一种方式是利用应用部署环境中已有的调度系统从外部触发作业。例如，许多企业使用商业系统（如 Control-M
  或 CA AutoSys）进行任务调度。如果应用运行在 Linux/Unix 平台上，则可以使用 crontab 调度器。作业触发可以通过向 Spring 应用发送
  RESTful-WS 请求，并由 Spring 的 MVC 控制器触发任务来实现。


  另一种方式是使用 Spring 内置的任务调度支持。Spring 在任务调度方面提供了三种选择：


  *   *对 JDK Timer 的支持*：Spring 支持 JDK 的 `Timer` 对象进行任务调度。


  *   *与 Quartz 集成*：Quartz 作业调度器^(¹⁰⁸) 是一个流行的开源调度库。


  *   *Spring 自身的 `TaskScheduler` 抽象*：Spring 3 引入了 `TaskScheduler` 抽象，它提供了一种简单的任务调度方式，并支持大多数典型需求。


  本节重点介绍如何使用 Spring 的 `TaskScheduler` 抽象进行任务调度，其结果是项目非常简单，唯一必需的 Spring 依赖是 `spring-context.jar`
  库。


  ### 介绍 Spring `TaskScheduler` 抽象


  Spring 的 `TaskScheduler` 抽象提供了多种方法，用于调度任务在未来的某个时间点运行，它主要包含三个参与者：


  *   *`Trigger` 接口*：`org.springframework.scheduling.Trigger` 接口提供了定义触发机制的支持。Spring
  提供了两个 `Trigger` 实现。`CronTrigger` 类支持基于 `cron` 表达式触发，而 `PeriodicTrigger` 类支持基于初始延迟后按固定间隔触发。


  *   *任务*：任务是需要被调度的业务逻辑片段。在 Spring 中，任务可以指定为任何 Spring Bean 中的一个方法。


  *   *`TaskScheduler` 接口*：`org.springframework.scheduling.TaskScheduler` 接口提供了任务调度的支持。Spring
  提供了三个 `TaskScheduler` 接口的实现类。`ConcurrentTaskScheduler` 和 `ThreadPoolTaskScheduler`
  类（均位于 `org.springframework.scheduling.concurrent` 包下）封装了 `java.util.concurrent.ScheduledThreadPoolExecutor`
  类。这两个类都支持从共享线程池执行任务。同样位于 `org.springframework.scheduling.concurrent` 包下的 `DefaultManagedTaskScheduler`
  类，通常用于 Jakarta EE 环境。


  图 12-2 展示了 `Trigger` 接口、`TaskScheduler` 接口以及实现 `java.lang.Runnable` 接口的任务之间的关系。


  ![](img/315511_6_En_12_Fig2_HTML.jpg)


  该图展示了触发器与任务调度器接口之间的关系。任务调度器（如并发任务调度器、线程池任务调度器和默认托管任务调度器）执行任务，而执行过程由周期性触发器和 cron
  触发器触发。随后，它实现了一个可运行接口。


  图 12-2


  触发器、任务与调度器之间的关系


  基本上，任务调度器基于日期、时间、一次性或重复执行任务。任务执行由 `Trigger` 实现触发，这些实现提供了对任务执行时间的精细控制，尤其是在与其他任务执行的关系方面。


  要使用 Spring 的 `TaskScheduler` 抽象来调度任务，需要使用一些注解，这些注解将在下一节中进行演示和说明。




