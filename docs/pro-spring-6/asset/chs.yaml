  ## 使用 Spring Boot Actuator 监控应用程序


  Spring Boot 提供了额外的功能，用于通过 JMX 监控应用程序。一旦 `spring-boot-actuator.jar` 位于类路径上，审计、健康和指标收集就会自动应用于应用程序。`spring-boot-actuator`
  模块提供了一系列生产就绪的功能。推荐的方式是将 `spring-boot-starter-actuator` 添加到类路径中。图 18-6 展示了 `chapter18-boot`
  项目的依赖项，其中展开了 `spring-boot-starter-actuator` 以查看所有传递依赖项。


  ![](img/315511_6_En_18_Fig6_HTML.jpg)


  一个截图展示了第 18 章 boot 的依赖项。spring boot starter actuator 3.0.5 已展开，并突出显示了 i o micrometer
  core and observation，以及 actuator auto configure with actuator 3.0.5。


  图 18-6


  项目 `chapter18-boot` 依赖项


  Spring 参考文档将 actuator 定义如下：“Actuator 是一个制造术语，指的是用于移动或控制某物的机械装置。Actuator 可以从微小的变化中产生大量的运动。”^(¹⁸⁴)


  ### Spring Boot Actuator 端点


  Spring Boot Actuator 向应用程序添加了一组端点，用于监控和与应用程序交互。通过配置，我们可以通过 JMX 或 HTTP 公开这些端点，并且我们还可以决定是公开所有端点还是仅公开其中一部分。清单
  18-7 中的配置是 `application.yaml` Spring Boot 配置文件的一部分，并启用在 `jmxBootDemo` 域下通过 JMX 公开所有
  Actuator 端点。


  ```

  management:

  endpoints:

  jmx:

  domain: jmxBootDemo

  exposure:

  include: "*"

  清单 18-7

  配置以在 jmxBootDemo 域下通过 JMX 公开所有 Actuator 端点

  ```


  使用此配置，当重新启动应用程序并将 VisualVM 连接到它时，会在 `jmxBootDemo` 域下添加一个 MBean 列表，分组在 `Endpoint`
  节点下，如图 18-7 所示。


  ![](img/315511_6_En_18_Fig7_HTML.jpg)


  Visual V M 2.1.5 的截图。一个编辑器窗口已打开，并且在 j m x boot demo 域下的 M beans 中突出显示了 endpoint
  选项。Endpoint 有一个包含 12 个 M Bean 的列表，例如 beans、caches、conditions、config props、env、health、info.
  loggers、metrics、scheduled tasks 和 thread dump。


  图 18-7


  VisualVM 中显示的 Spring Boot Actuator JMX 端点


  表 18-1 列出了 Spring Boot Actuator JMX 端点，并简要说明了它们公开的操作。


  表 18-1


  Spring Boot Actuator JMX 端点


  | 端点 | 描述 |

  | --- | --- |

  | Beans | 操作 `beans()` 列出应用程序中所有 Spring bean 的完整列表。 |

  | Caches | 公开列出和清除现有缓存的操作。 |

  | Conditions | 操作 `conditions()` 列出为 Spring Boot 应用程序配置评估的条件。 |

  | Configprops | 公开检索配置属性汇总列表的操作。 |

  | Env | 公开列出 Spring 的 `ConfigurableEnvironment` 中属性的操作。 |

  | Health | 操作 `health()` 列出应用程序健康信息。 |

  | Info | 操作 `info()` 列出任意应用程序信息。 |

  | Loggers | 公开显示和修改应用程序中日志记录器配置的操作。 |

  | Mappings | 操作 `mappings()` 列出所有 `@RequestMapping` 路径。有趣的是，此列表包括 Actuator HTTP
  端点。 |

  | Metrics | 操作 `listNames()` 列出为应用程序配置的所有指标。 |

  | Scheduledtasks | 操作 `scheduledTasks()` 列出应用程序中的所有计划任务。 |

  | Threaddump | 公开执行线程转储的操作。 |


  如果您单击并尝试在 VisualVM UI 中调用操作，您可能已经意识到 JMX 端点使用起来很繁琐。好消息是，Spring Boot Actuator 也通过
  HTTP 公开这些端点以及更多端点，默认情况下都分组在 `/actuator` 路径下。端点分组的路径和端口可以通过配置进行自定义。


