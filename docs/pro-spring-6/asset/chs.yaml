  #### 使用 `ResultSetExtractor` 检索嵌套领域对象


  接下来我们看一个稍微复杂的例子：需要通过连接查询从父表（`SINGER`）和子表（`ALBUM`）中检索数据，然后将数据相应地转换回嵌套对象（`Singer`
  中的 `Set<Album>`）。


  对于更复杂的场景，我们需要使用 `ResultSetExtractor<T>` 接口。为了演示其用法，我们在 `SingerDao` 接口中实现 `findAllWithAlbums()`
  方法。该方法应填充歌手列表及其专辑信息。清单 6-28 展示了在接口中添加 `findAllWithAlbums()` 方法，以及使用 `ResultSetExtractor<T>`
  实现该方法的过程。


  ```

  package com.apress.prospring6.six.rowmapper;

  import org.springframework.jdbc.core.ResultSetExtractor;

  // 其他导入语句已省略

  interface SingerDao {

  Set findAllWithAlbums();

  }

  class RowMapperDao implements SingerDao {

  private NamedParameterJdbcTemplate namedTemplate;

  public void setNamedTemplate(NamedParameterJdbcTemplate namedTemplate) {

  this.namedTemplate = namedTemplate;

  }

  @Override

  public Set findAllWithAlbums() {

  var sqlQuery = "select s.id, s.first_name, s.last_name, s.birth_date, "+

  "a.id AS album_id, a.title, a.release_date " +

  "from SINGER s " +

  "left join ALBUM a on s.id = a.singer_id";

  return new HashSet(namedTemplate.query(sqlQuery, new SingerWithAlbumsExtractor()));

  }

  static class SingerWithAlbumsExtractor implements ResultSetExtractor> {

  @Override

  public Set extractData(ResultSet rs) throws SQLException, DataAccessException {

  Map map = new HashMap();

  Singer singer;

  while (rs.next()) {

  Long id = rs.getLong("id");

  singer = map.get(id);

  if (singer == null) {

  singer = new Singer(id,rs.getString("first_name"),rs.getString("last_name"),rs.getDate("birth_date"),new
  HashSet());

  map.put(id, singer);

  }

  var albumId = rs.getLong("album_id");

  if (albumId > 0) {

  Album album = new Album(albumId,id,rs.getString("title"),rs.getDate("release_date"));

  singer.albums().add(album);

  }

  }

  return new HashSet(map.values());

  }

  }

  }

  清单 6-28

  使用 ResultSetExtractor> 的 findAllWithAlbums() 方法

  ```


  这段代码看起来与 `RowMapper<T>` 示例非常相似，但这次我们声明了一个实现 `ResultSetExtractor<T>` 的内部类。然后我们实现
  `extractData(..)` 方法，将结果集相应地转换为 `Singer` 记录列表。对于 `findAllWithDetail()` 方法，查询使用了
  `left join` 来连接两个表，这样即使没有专辑的歌手也会被检索出来。结果是两个表的笛卡尔积。最后，我们使用 `namedTemplate.query()`
  方法，传入查询字符串和结果集提取器。


  当然，`SingerWithDetailExtractor` 内部类并非必须，因为也可以使用 lambda 表达式。在清单 6-29 中，你可以看到使用 Java
  8 lambda 表达式的 `findAllWithAlbums()` 版本。


  ```

  package com.apress.prospring6.six.rowmapper;

  // 其他导入语句已省略

  class RowMapperDao implements SingerDao {

  public static final String ALL_JOIN_SELECT = "select s.id, s.first_name, s.last_name,
  s.birth_date, "+

  "a.id AS album_id, a.title, a.release_date " +

  "from SINGER s " +

  "left join ALBUM a on s.id = a.singer_id";

  public List findAllWithAlbums() {

  return namedTemplate.query(ALL_JOIN_SELECT, rs -> {

  Map map = new HashMap();

  Singer singer;

  while (rs.next()) {

  Long id = rs.getLong("id");

  singer = map.get(id);

  if (singer == null) {

  singer = new Singer(id,rs.getString("first_name"),rs.getString("last_name"),rs.getDate("birth_date"),new
  ArrayList());

  map.put(id, singer);

  }

  var albumId = rs.getLong("album_id");

  if (albumId > 0) {

  Album album = new Album(albumId,id,rs.getString("title"),rs.getDate("release_date"));

  singer.albums().add(album);

  }

  }

  return new ArrayList(map.values());

  });

