  ### 使用 `DefaultPointcutAdvisor`


  在使用任何 `Pointcut` 实现之前，你必须先创建一个 `Advisor` 接口的实例，更具体地说是 `PointcutAdvisor` 接口的实例。回顾我们之前的讨论，`Advisor`
  是 Spring 对切面的表示（参见前一节“Spring 中的切面”），它是通知和切点的结合，用于控制哪些方法应该被增强以及如何增强。Spring 提供了多个
  `PointcutAdvisor` 的实现，但目前我们只关注其中一个：`DefaultPointcutAdvisor`。这是一个简单的 `PointcutAdvisor`，用于将单个
  `Pointcut` 与单个 `Advice` 关联起来。


  #### 使用 `StaticMethodMatcherPointcut`


  在本节中，我们将通过扩展抽象类 `StaticMethodMatcherPointcut` 来创建一个简单的静态切点。由于 `StaticMethodMatcherPointcut`
  类扩展了 `StaticMethodMatcher` 类（也是一个抽象类），而后者实现了 `MethodMatcher` 接口，因此你需要实现 `matches(Method,
  Class<?>)` 方法。`Pointcut` 实现的其余部分会自动处理。虽然这是你唯一需要实现的方法（当扩展 `StaticMethodMatcherPointcut`
  类时），但你可能希望重写 `getClassFilter()` 方法，如清单 5-8 所示，以确保只有正确类型的方法被增强。


  在本例中，我们有两个类：`GoodGuitarist` 和 `GreatGuitarist`，它们都定义了相同的方法，这些方法是接口 `Singer` 中方法的实现。它们与设计用于包装这些类型实例的
  `SimpleAroundAdvice` 一起展示。


  ```

  package com.apress.prospring6.two.common;

  // 导入语句已省略

  public interface Singer {

  void sing();

  }

  public class GoodGuitarist implements Singer {

  private static Logger LOGGER = LoggerFactory.getLogger(GoodGuitarist.class);

  @Override public void sing() {

  LOGGER.info("Head on your heart, arms around me");

  }

  }

  public class GreatGuitarist implements Singer {

  private static Logger LOGGER = LoggerFactory.getLogger(GreatGuitarist.class);

  @Override public void sing() {

  LOGGER.info("You''ve got my soul in your hand");

  }

  }

  public class SimpleAroundAdvice implements MethodInterceptor {

  private static Logger LOGGER = LoggerFactory.getLogger(GoodGuitarist.class);

  @Override

  public Object invoke(MethodInvocation invocation) throws Throwable {

  LOGGER.debug(">> Invoking " + invocation.getMethod().getName());

  Object retVal = invocation.proceed();

  LOGGER.debug(">> Done");

  return retVal;

  }

  }

  清单 5-8

  用于演示 StaticMethodMatcherPointcut 用法的 GoodGuitarist 和 GreatGuitarist 类

  ```


  通过这个示例，我们希望使用同一个 `DefaultPointcutAdvisor` 为这两个类创建代理，但通知仅应用于 `GoodGuitarist` 类的 `sing()`
  方法。


  为此，我们创建了 `SimpleStaticPointcut` 类，如清单 5-9 所示，以及用于测试它的类。


  ```

  package com.apress.prospring6.five.pointcut;

  import org.aopalliance.aop.Advice;

  import org.springframework.aop.Advisor;

  import org.springframework.aop.ClassFilter;

  import org.springframework.aop.Pointcut;

  import org.springframework.aop.framework.ProxyFactory;

  import org.springframework.aop.support.DefaultPointcutAdvisor;

  import org.springframework.aop.support.StaticMethodMatcherPointcut;

  import java.lang.reflect.Method;

  // 其他静态导入已省略

  class SimpleStaticPointcut extends StaticMethodMatcherPointcut {

  @Override

  public boolean matches(Method method, Class cls) {

  return ("sing".equals(method.getName()));

  }

  @Override

  public ClassFilter getClassFilter() {

  return cls -> (cls == GoodGuitarist.class);

  }

  }

  public class StaticPointcutDemo {

  public static void main(String... args) {

  // 目标对象

  GoodGuitarist johnMayer = new GoodGuitarist();

  GreatGuitarist ericClapton = new GreatGuitarist();

  Singer proxyOne;

  Singer proxyTwo;

  Pointcut pc = new SimpleStaticPointcut();

  Advice advice = new SimpleAroundAdvice();

  Advisor advisor = new DefaultPointcutAdvisor(pc, advice);

  ProxyFactory pf = new ProxyFactory();

  pf.addAdvisor(advisor);

  pf.setTarget(johnMayer);

  proxyOne = (Singer)pf.getProxy();

  pf = new ProxyFactory();

  pf.addAdvisor(advisor);

  pf.setTarget(ericClapton);

  proxyTwo = (Singer)pf.getProxy();

  proxyOne.sing();

  proxyTwo.sing();

  }

  }

  清单 5-9

  StaticMethodMatcherPointcut 实现

  ```


  请注意，`getClassFilter()` 方法被重写，返回一个 `ClassFilter` 实例，其 `matches()` 方法仅对 `GoodGuitarist`
  类返回 `true`。通过这个静态切点，我们表示只有 `GoodGuitarist` 类的方法会被匹配，并且进一步地，只有该类的 `sing()` 方法会被匹配。


  `main(..)` 方法使用 `SimpleAroundAdvice` 和 `SimpleStaticPointcut` 类创建了一个 `DefaultPointcutAdvisor`
  实例。此外，由于这两个类（`GoodGuitarist` 和 `GreatGuitarist`）实现了相同的接口，你可以看到代理可以基于接口创建，而不是基于具体类。请注意，随后使用
  `DefaultPointcutAdvisor` 实例创建了两个代理：一个用于 `GoodGuitarist` 实例，另一个用于 `EricClapton` 实例。最后，在两个代理上调用了
  `sing()` 方法。运行此示例将产生如清单 5-10 所示的输出。


  ```

  DEBUG: SimpleAroundAdvice - >> Invoking sing

  INFO : GoodGuitarist - Head on your heart, arms around me

  DEBUG: SimpleAroundAdvice - >> Done

  INFO : GreatGuitarist - You''ve got my soul in your hand

  清单 5-10

  StaticMethodMatcherPointcut 示例输出

  ```


  如你所见，`SimpleAroundAdvice` 实际被调用的唯一方法是 `GoodGuitarist` 类的 `sing()` 方法，完全符合预期。限制通知所应用的方法非常简单，并且正如你在讨论代理选项时会看到的，这是让你的应用程序获得最佳性能的关键。




  ### 使用 `DynamicMethodMatcherPointcut`


  创建动态切入点与创建静态切入点没有太大区别，因此在本示例中，我们将为之前使用过的相同类创建一个动态切入点，但还需要一个带参数的方法来使用这种类型的切入点。最简单的方法是通过默认方法丰富
  `Singer` 接口，而不影响其他实现。为了匹配本示例的上下文，让我们添加一个 `sing(String key)` 方法，该方法接收歌手演唱的调性值。`Singer`
  接口的实现如代码清单 5-11 所示。


  ```

  package com.apress.prospring6.five.common;

  import org.slf4j.Logger;

  import org.slf4j.LoggerFactory;

  public interface Singer {

  Logger logger = LoggerFactory.getLogger(Singer.class);

  void sing();

  default void sing(String key){

  logger.info("Singing in the key of {}", key);

  }

  }

  代码清单 5-11

  增强后的 Singer 接口

  ```


  代码清单 5-12 展示了 `DynamicMethodMatcherPointcut` 的实现。


  ```

  package com.apress.prospring6.five.pointcut;

  import com.apress.prospring6.five.common.GoodGuitarist;

  import org.springframework.aop.ClassFilter;

  import org.springframework.aop.support.DynamicMethodMatcherPointcut;

  import java.lang.reflect.Method;

  class SimpleDynamicPointcut extends DynamicMethodMatcherPointcut {

  @Override

  public ClassFilter getClassFilter() {

  return cls -> (cls == GoodGuitarist.class);

  }

  @Override

  public boolean matches(Method method, Class targetClass) {

  return ("sing".equals(method.getName()));

  }

  @Override

  public boolean matches(Method method, Class targetClass, Object... args) {

  logger.debug("Dynamic check for " + method.getName());

  if(args.length == 0) {

  return false;

  }

  var key = (String) args[0];

  return key.equalsIgnoreCase("C");

  }

  }

  代码清单 5-12

  SimpleDynamicPointcut 实现

  ```


  从代码清单 5-12 可以看出，我们以与上一节类似的方式重写了 `getClassFilter()` 方法。这消除了在方法匹配方法中检查类的需要，这对于动态检查尤其重要。虽然只需要动态检查，但我们也实现了静态检查。这样做的原因是，你知道
  `sing()` 方法（无参数的那个）将不会被通知。通过使用静态检查来表明这一点，Spring 就无需对该方法执行动态检查。这是因为当实现了静态检查方法时，Spring
  会首先对其进行校验，如果检查结果不匹配，Spring 将停止任何进一步的动态检查。此外，静态检查的结果会被缓存以提高性能。如果未实现静态检查，Spring 会在每次调用
  `sing({key})` 方法时执行动态检查。


  作为推荐实践，应在 `getClassFilter()` 方法中执行类检查，在 `matches(Method, Class<?>)` 方法中执行方法检查，在
  `matches(Method,Class<?>, Object[])` 方法中执行参数检查。这将使你的切入点更易于理解和维护，并且性能也会更好。


  在 `matches(Method, Class<?>, Object[])` 方法中，你可以看到，如果传递给 `sing({key})` 方法的 `String`
  参数值不等于“C”，则返回 `false`；否则返回 `true`。请注意，在动态检查中，我们知道正在处理一个名为 `sing` 的方法，因为没有其他方法能通过静态检查。在代码清单
  5-13 的代码中，你可以看到用于测试此切入点的测试类。


  ```

  package com.apress.prospring6.five.pointcut;

  import org.springframework.aop.Advisor;

  import org.springframework.aop.framework.ProxyFactory;

  import org.springframework.aop.support.DefaultPointcutAdvisor;

  // 其他导入语句已省略

  public class DynamicPointcutDemo {

  public static void main(String... args) {

  GoodGuitarist target = new GoodGuitarist();

  Advisor advisor = new DefaultPointcutAdvisor(new SimpleDynamicPointcut(), new SimpleAroundAdvice());

  ProxyFactory pf = new ProxyFactory();

  pf.setTarget(target);

  pf.addAdvisor(advisor);

  Singer proxy = (Singer)pf.getProxy();

  proxy.sing("C");

  proxy.sing("c");

  proxy.sing("E");

  proxy.sing();

  }

  }

