  \ `Strings` 类型，但属性的值仍被指定为简单的 `Strings`。另外请注意，我们通过为 `org.springframework.beans.PropertyEditorRegistrar`\
  \ 提供实现，注册了带有所需格式化器的 `CustomDateEditor` 和 `StringTrimmerEditor`，因为这两个编辑器在 Spring\
  \ 中默认并未注册。运行此示例将产生如清单 4-23 所示的输出。\n\n```\nINFO : DiverseValuesContainer - Loaded\
  \ 1 properties\nINFO : DiverseValuesContainer - Setting locale: English (United\
  \ States)\nINFO : DiverseValuesContainer - Setting date: Sun Aug 08 00:00:00 BST\
  \ 1982\nINFO : DiverseValuesContainer - Setting class: java.lang.String\nINFO :\
