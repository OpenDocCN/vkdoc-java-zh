  用于测试动态切入点的 DynamicPointcutDemo 类

  ```


  请注意，我们使用了与静态切入点示例中相同的通知类。但是，在此示例中，只有前两次对 `sing({key})` 的调用应该被通知。动态检查阻止了第三次对 `sing("E")`
  的调用被通知，而静态检查阻止了 `sing()` 方法被通知。运行此示例将产生代码清单 5-14 中的输出。


