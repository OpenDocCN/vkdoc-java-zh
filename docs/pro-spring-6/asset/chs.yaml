  如前文列表 18-13 所示，有多个与请求数量相关的指标可用。为了模拟服务器处理请求时间变化的情况，以便我们能够看到 `http_server_requests_seconds_count`
  的图形，我们可以修改 `SingerController`，为每个返回的 `Singer` 实例引入不同的延迟。当收到对 `http://localhost:9091/singer/{id}`
  URL 的 GET 请求时，会触发此操作。具体做法是在该 URI 的处理方法中添加一个 `Thread.sleep()`，该方法会根据记录 ID 随机暂停执行一段时间。该处理方法如列表
  18-15 所示。




  ```

  package com.apress.prospring6.eighteen.boot.controllers;

  // 导入语句已省略

  @RestController

  @RequestMapping(value="/singer")

  public class SingerController {

  @GetMapping(path = "/{id}")

  public Singer findSingerById(@PathVariable Long id) {

  var singer = singerService.findById(id);

  if (singer != null) {

  int msec = 10;

  try {

  Thread.sleep(Duration.ofMillis(msec * id));

  } catch (InterruptedException e) {

  e.printStackTrace();

  }

  }

  return singer;

  }

  // 其他方法和字段已省略

  }

