  #### 使用 `SqlFunction` 调用存储函数


  Spring 还提供了一些类来简化使用 JDBC 执行存储过程/函数的过程。在本节中，我们将演示如何使用 `SqlFunction<T>` 类执行一个简单的函数。我们将展示如何使用
  MariaDB 作为数据库，创建一个存储函数，并通过 `SqlFunction<T>` 类调用它。我们假设您有一个名为 `musicdb` 的 MariaDB
  数据库，其用户名和密码均为 `prospring6`（与“探索 JDBC 基础设施”一节中的示例相同）。让我们创建一个名为 `getFirstNameById(..)`
  的存储函数，它接受歌手的 ID 并返回该歌手的名字。清单 6-50 显示了在 MariaDB 中创建该存储函数的脚本（`resources/stored-function.sql`）。请针对
  MariaDB 数据库运行该脚本。


  ```

  CREATE FUNCTION IF NOT EXISTS getFirstNameById(in_id INT) RETURNS VARCHAR(60)

  LANGUAGE SQL

  BEGIN

  RETURN (SELECT first_name FROM SINGER WHERE id = in_id);

  END;

  清单 6-50

  MariaDB 存储函数

  ```


  该存储函数简单地接受 ID 并返回具有该 ID 的歌手记录的名字。接下来，我们创建一个 `StoredFunctionFirstNameById` 类来表示存储函数操作，该类继承自
  `SqlFunction<String>` 类。泛型类型是存储函数返回的结果类型。您可以在清单 6-51 中看到该类的具体内容。


  ```

  package com.apress.prospring6.six.repo;

  import org.springframework.jdbc.object.SqlFunction;

  // 其他导入语句已省略

  public class StoredFunctionFirstNameById extends SqlFunction {

  private static final String SQL_CALL = "select getfirstnamebyid(?)";

  public StoredFunctionFirstNameById (DataSource dataSource) {

  super(dataSource, SQL_CALL);

  declareParameter(new SqlParameter(Types.INTEGER));

  compile();

  }

  }

  清单 6-51

  StoredFunctionFirstNameById，它继承自 SqlFunction 类

  ```


  在 MariaDB 中调用存储函数的 SQL 非常简单：`select getfirstnamebyid(?)`。请注意，它需要一个参数。随后，在构造函数中声明该参数，并编译该操作。现在，该类已准备好供实现类使用。清单
  6-52 显示了更新后的 `SingerJdbcRepo` 类，该类使用了该存储函数。


  ```

  package com.apress.prospring6.six.repo;

  // 导入语句已省略

  @Repository("singerRepo")

  public class SingerJdbcRepo implements SingerDao {

  private StoredFunctionFirstNameById storedFunctionFirstNameById;

  @Resource(name = "dataSource")

  public void setDataSource(DataSource dataSource) {

  this.dataSource = dataSource;

  this.storedFunctionFirstNameById = new StoredFunctionFirstNameById(dataSource);

  }

  @Override

  public Optional findFirstNameById(Long id) {

  var result = storedFunctionFirstNameById.execute(id).get(0);

  return result != null ? Optional.of(storedFunctionFirstNameById.execute(id).get(0)):
  Optional.empty();

  }

