  \n![](img/315511_6_En_17_Figf_HTML.jpg)一个灯泡图标的插图。 清单 17-25 中日志的第一个片段显示了安全链中所有过滤器的类型。请随意在\
  \ GitHub^(¹⁷⁸) 上检查每个过滤器的代码。\n\n正如 bean 的名称所示，过滤器是链式的，并且以固定的顺序执行。请求对象通过链从一个过滤器传递到下一个过滤器，就像工厂传送带上的物品经过各种机器一样。一些过滤器是关键的，如果它们发现请求有问题，就会抛出异常，整个处理过程停止；其余的过滤器不会应用于该请求。一些过滤器不是关键的，但它们会在将请求发送到链的下一个之前对其进行更改。\n\
  \n![](img/315511_6_En_17_Figg_HTML.jpg)一个带有感叹号的圆圈的插图。 过滤器列表根据应用程序中配置的内容而变化。例如，因为我们禁用了\
  \ CSRF 支持，所以 `CsrfFilter` 过滤器不会出现在清单 17-25 的列表中。\n\n例如，引入错误的用户名/密码组合会导致 `UsernamePasswordAuthenticationFilter`\
  \ 过滤器抛出 `BadCredentialsException`。这是链中的第六个过滤器，也是处理停止的地方，因此它后面的五个过滤器不会应用于该请求，因为正如这个过滤器明确指出的，该请求不包含应用程序识别的凭据，如清单\
  \ 17-26 所示。\n\n```\n22:34:23.027  DEBUG o.s.s.w.FilterChainProxy - Securing POST\
