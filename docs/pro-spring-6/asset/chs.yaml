  指标来自何处。


  Prometheus 的配置文件名为 `prometheus.yaml`。这个名称并非强制要求，但确实能使其用途一目了然。根据官方文档，我们需要定义一个任务（job），告诉
  Prometheus 查询指标的频率以及从何处查询。其语法是 YAML，最重要的属性列在列表 18-14 中。


  ```

  global:

  scrape_interval:     15s # 默认每 15 秒抓取一次目标。


  '
- '# Prometheus 自身的监控配置

  scrape_configs:

  - job_name: ''prometheus''


  '
- '# 覆盖全局默认值，每 5 秒抓取一次此任务的目标。

  scrape_interval: 5s

  static_configs:

  - targets: [''0.0.0.0:9090'']

  - job_name: ''chapter18-boot''

  metrics_path: ''/monitoring/prometheus''


  '
- '# 覆盖全局默认值，每 5 秒抓取一次此任务的目标。

  scrape_interval: 5s

  static_configs:


  '
- '# 当 Prometheus 在 Docker 容器中运行时，必须使用网络内的真实 IP

  - targets: [''192.168.0.6:9091'']

