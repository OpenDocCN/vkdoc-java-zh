  \n图 20-7\n显示验证错误消息的“搜索歌手”页面\n\n构建 Spring 响应式应用是一个庞大的主题，我知道本节内容未能充分展现其全貌。如果你对构建 Spring\
  \ 响应式应用感兴趣，不妨查阅本章引用的其他资源，包括由 LeanPub 出版、最后更新于 2022 年 9 月的 *Josh Long 的《Reactive\
  \ Spring》*^(²²⁸)。\n\n## 总结\n\n本章深入探讨了构建响应式 Spring WebFlux 应用时需要注意的关键点。我们介绍了一些迁移多层应用的细节，以强调一个事实：响应式应用只有在所有组件都是响应式的情况下，才是完全响应式的。为了帮助你从\
  \ Spring Web MVC 过渡到 WebFlux，我们对这两种技术的配置进行了比较。\n\n我们研究了如何使用响应式控制器和处理函数。\n\n我们研究了如何测试响应式仓库和服务，以及如何使用\
  \ `WebTestClient` 消费响应式服务。\n\n本章有几个要点值得牢记。Spring WebFlux 具有一些优势：代码更简洁、更精炼。Spring\
  \ Boot 提供了大量开箱即用的组件，使得我们可以将更多时间投入到开发上，而减少配置时间。错误处理更容易实现，代码也更容易阅读。然而，并非所有组件（或应用）都必须采用响应式。例如：当你只想构建一个简单的页面呈现给用户时，就没有必要使用响应式组件来渲染它。\n\
