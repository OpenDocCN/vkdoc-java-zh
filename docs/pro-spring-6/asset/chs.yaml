  `SingerController` 类在 Kotlin 中看起来也更简单，但它与 Java 中的非常相似，并且没有引入任何新内容。


  但让我们看看配置。在之前的章节中，需要一个扩展 `PhysicalNamingStrategyStandardImpl` 类型的 bean 来让 Spring
  Data 识别全大写的表名和列名。将 `CustomPhysicalNamingStrategy` 转换为 Kotlin 提供了使用 `private` 访问器和
  `override` 关键字的机会。`CustomPhysicalNamingStrategy` 的 Kotlin 版本如清单 16-37 所示。


  ```

  package com.apress.prospring6.sixteen.boot

  import org.hibernate.boot.model.naming.Identifier

  import org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

  import org.hibernate.engine.jdbc.env.spi.JdbcEnvironment

  import org.springframework.stereotype.Component

  import java.io.Serializable

  import java.util.*

  @Component

  class CustomPhysicalNamingStrategy : PhysicalNamingStrategyStandardImpl(), Serializable
  {

  override fun toPhysicalTableName(logicalName: Identifier?, context: JdbcEnvironment):
  Identifier? {

  return apply(logicalName)

  }

  override fun toPhysicalColumnName(logicalName: Identifier?, context: JdbcEnvironment):
  Identifier? {

  return apply(logicalName)

  }

  private fun apply(name: Identifier?): Identifier? {

  if (name == null) {

  return null

  }

  val builder = StringBuilder(name.text.replace(''.'', ''_''))

  var i = 1

  while (i < builder.length - 1) {

  if (isUnderscoreRequired(builder[i - 1], builder[i], builder[i + 1])) {

  builder.insert(i++, ''_'')

  }

  i++

  }

  return Identifier.toIdentifier(builder.toString().uppercase(Locale.getDefault()))

  }

  private fun isUnderscoreRequired(before: Char, current: Char, after: Char): Boolean
  {

  return Character.isLowerCase(before) && Character.isUpperCase(current) && Character.isLowerCase(after)

  }

  }

  清单 16-37

  CustomPhysicalNamingStrategy Kotlin 类

  ```


  它并没有简化太多 Java 代码，但这可能归因于缺乏 Kotlin 专业知识。请注意，为了重写一个函数，声明必须在 `fun` 之前使用 `override`
  关键字。在函数上使用 `private` 访问器与 Java 中的效果相同，使其保持在其封闭类的本地范围内。


