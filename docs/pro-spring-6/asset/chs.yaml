  ### 异常处理


  Spring 提倡使用运行时异常而非受检异常，因此我们需要一种机制将受检的 `SQLException` 转换为 Spring JDBC 运行时异常。由于 Spring
  的 SQL 异常是运行时异常，它们可以比受检异常粒度更细。从定义上讲，这并非运行时异常的特性，但若不得不在 `throws` 子句中声明一长串受检异常会很不方便；因此，受检异常往往比其对应的运行时异常粒度更粗。


  Spring 提供了 `SQLExceptionTranslator` 接口的默认实现，负责将通用 SQL 错误代码转换为 Spring JDBC 异常。在大多数情况下，此实现已足够，但你可以扩展
  Spring 的默认实现，并将新的 `SQLExceptionTranslator` 实现设置到 `JdbcTemplate` 中使用，如清单 6-19 所示。


  ```

  package com.apress.prospring6.six;

  import org.springframework.dao.DataAccessException;

  import org.springframework.dao.DeadlockLoserDataAccessException;

  import org.springframework.jdbc.support.SQLErrorCodeSQLExceptionTranslator;

  import java.sql.SQLException;

  public class MariaDBErrorCodesTranslator extends SQLErrorCodeSQLExceptionTranslator
  {

  @Override

  protected DataAccessException customTranslate(String task, String sql, SQLException
  sqlex) {

  if (sqlex.getErrorCode() == -12345) {

  return new DeadlockLoserDataAccessException(task, sqlex);

  }

  return null;

  }

  }

  清单 6-19

  SQLExceptionTranslator 自定义实现

  ```


  ![](img/315511_6_En_6_Figf_HTML.jpg)警告符号在圆形背景上描绘了一个感叹号。 此时，可以明确的是，`SQLErrorCodeSQLExceptionTranslator`（Spring
  提供的 `SQLExceptionTranslator` 实用实现）是 `spring-jdbc.jar` 库的一部分，因此需要将此库添加到类路径中。是的，本节我们将告别纯
  JDBC，引入 Spring 来改善开发体验，使与数据库通信时不再那么令人头疼。


  `org.springframework.dao.DataAccessException` 代表了 Spring 运行时数据访问异常层次结构的根。该类的扩展类匹配特定的数据访问异常，并在访问数据库时提供关于异常真实原因的更多信息。完整的层次结构将在本书后续讨论。


  要使用 `MariaDBErrorCodesTranslator`，我们必须放弃直接使用连接与数据库通信，而是将 `DataSource` 包装在 Spring
  的 `JdbcTemplate` 中，如清单 6-20 所示。


  ```

  package com.apress.prospring6.six.hybrid;

  import org.springframework.jdbc.core.JdbcTemplate;

  // 其他导入语句已省略

  class JdbcSingerDao implements SingerDao, InitializingBean {

  private static Logger LOGGER = LoggerFactory.getLogger(JdbcSingerDao.class);

  private DataSource dataSource;

  private JdbcTemplate jdbcTemplate;

  public void setDataSource(DataSource dataSource) {

  this.dataSource = dataSource;

  var jdbcTemplate = new JdbcTemplate();

  jdbcTemplate.setDataSource(dataSource);

  var errorTranslator = new MariaDBErrorCodesTranslator();

  errorTranslator.setDataSource(dataSource);

  jdbcTemplate.setExceptionTranslator(errorTranslator);

  this.jdbcTemplate = jdbcTemplate;

  }

  // 其他代码已省略

  }

  清单 6-20

  引入 Spring 的 JdbcTemplate

  ```


  配置好自定义 SQL 异常转换器后，当针对数据库执行 SQL 语句检测到 SQL 异常时，Spring 将调用该转换器，并且当错误代码为 `-12345` 时，将进行自定义异常转换。对于其他错误，Spring
  将回退到其默认的异常转换机制。显然，你完全可以创建 `SQLExceptionTranslator` 作为 Spring 管理的 bean，并在 DAO 类中使用
  `JdbcTemplate` bean。如果你不记得读过关于 `JdbcTemplate` 类的内容，也不必担心；我们现在就来详细讨论它。


  ### `JdbcTemplate` 类


  该类是 Spring JDBC 支持的核心。它可以执行所有类型的 SQL 语句。从最简化的角度来看，你可以将语句分为数据定义语句和数据操作语句。数据定义语句涵盖创建各种数据库对象（表、视图、存储过程等）。数据操作语句则操作数据，可分为查询语句和更新语句。查询语句通常返回一组行；每行具有相同的列集合。更新语句修改数据库中的数据，但不返回任何结果。


  `JdbcTemplate` 类允许你向数据库发出任何类型的 SQL 语句，并返回任何类型的结果。在本节中，我们将通过 `JdbcTemplate` 类介绍 Spring
  中 JDBC 编程的几个常见用例。




  #### 在 DAO 类中初始化 `JdbcTemplate`


  在讨论如何使用 `JdbcTemplate` 之前，我们先来看看如何在 DAO 类中准备 `JdbcTemplate` 以供使用。这很简单；大多数情况下，你只需通过传入数据源对象（该对象应由
  Spring 注入到 DAO 类中）来构造该类即可。上一节清单 6-20 中的最后一个代码片段展示了如何初始化 `JdbcTemplate` 对象。通常的做法是在
  Spring 注入数据源对象的同一个方法或构造函数中初始化 `JdbcTemplate`。这可以确保 `JdbcTemplate` 也会被初始化并可供使用。


  一旦配置完成，`JdbcTemplate` 就是线程安全的。这意味着你也可以选择在 Spring 配置中初始化一个 `JdbcTemplate` 的单例实例，并将其注入到所有
  DAO Bean 中。清单 6-21 展示了这样的配置。


  ```

  package com.apress.prospring6.six.template;

  import org.springframework.jdbc.core.JdbcTemplate;

  // 其他导入语句已省略

  @Import(BasicDataSourceCfg.class)

  @Configuration

  class SpringJdbcTemplateCfg {

  private static Logger LOGGER = LoggerFactory.getLogger(SpringJdbcTemplateCfg.class);

  @Autowired

  DataSource dataSource;

  @Bean

  public SingerDao singerDao(){

  JdbcSingerDao dao = new JdbcSingerDao();

  dao.setDataSource(dataSource);

  return dao;

  }

  @Bean public JdbcTemplate jdbcTemplate(){

  JdbcTemplate jdbcTemplate = new JdbcTemplate();

  jdbcTemplate.setDataSource(dataSource);

  return jdbcTemplate;

  }

  }

  清单 6-21

  将 JdbcTemplate 配置为 Bean

  ```


  现在我们有了一个 `JdbcTemplate` Bean，让我们重写 `JdbcSingerDao` 来使用它。清单 6-22 清楚地表明，使用 `JdbcTemplate`
  Bean 与数据库通信要容易得多，尤其是在检索单个值时。


  ```

  package com.apress.prospring6.six.template;

  class JdbcSingerDao implements SingerDao {

  private JdbcTemplate jdbcTemplate;

  public void setJdbcTemplate(JdbcTemplate jdbcTemplate) {

  this.jdbcTemplate = jdbcTemplate;

  }

  @Override

  public String findNameById(Long id) {

  return jdbcTemplate

  .queryForObject("select CONCAT(first_name , '' '' , last_name) from SINGER where
  id = ?", String.class, id);

  }

  }

