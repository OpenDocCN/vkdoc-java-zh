  \ 实例表示；这是因为 Hibernate 是该应用程序的 JPA 提供程序。同时请注意，在生成的本地 SQL 查询中，没有 `SingerSummary` 构造器的痕迹。\n\
  \n\n\n### 插入数据\n\n使用 JPA 插入数据非常简单。与 Hibernate 类似，JPA 也支持检索数据库生成的主键。清单 8-20 展示了 `save(..)`\
  \ 方法。\n\n```\npackage com.apress.prospring6.eight.service;\n// 导入语句已省略\n@Service(\"\
  jpaSingerService\")\n@Repository\n@Transactional\npublic class SingerServiceImpl\
  \  implements SingerService {\nprivate static final Logger LOGGER = LoggerFactory.getLogger(SingerServiceImpl.class);\n\
  @PersistenceContext\nprivate EntityManager em;\n@Override\npublic void save(Singer\
  \ singer) {\nif (singer.getId() == null) {\nLOGGER.info(\"正在插入新歌手\");\nem.persist(singer);\n\
  } else {\nem.merge(singer);\nLOGGER.info(\"正在更新已有歌手\");\n}\nLOGGER.info(\"歌手已保存，id:\
  \ \" + singer.getId());\n}\n// 其他方法已省略\n}\n清单 8-20\nSingerServiceImpl.save(..) 方法\n\
  ```\n\n如上所示，`save(..)` 方法首先通过检查 `id` 值来判断对象是否为新实体实例。如果 `id` 为 `null`（即尚未分配），则该对象是新实体实例，将调用\
  \ `EntityManager.persist(..)` 方法。调用 `persist(..)` 方法时，`EntityManager` 会持久化该实体，并使其成为当前持久化上下文中的受管实例。如果\
  \ `id` 值已存在，则我们正在执行更新操作，此时将调用 `EntityManager.merge(..)` 方法。调用 `merge(..)` 方法时，`EntityManager`\
  \ 会将实体的状态合并到当前持久化上下文中。\n\n清单 8-21 展示了插入新 `Singer` 记录的代码。所有操作都在一个测试方法中完成，因为我们希望测试插入操作是否成功。\n\
  \n```\npackage com.apress.prospring6.eight;\n// 导入语句已省略\n// 注解已省略\npublic class\
  \ SingerServiceTest {\n@Test\n@DisplayName(\"应能插入一个包含关联的歌手\")\n@Sql(statements =\
  \  { // 避免污染测试上下文\n\"delete from ALBUM where SINGER_ID = (select ID from SINGER\
  \ where FIRST_NAME = 'BB')\",\n\"delete from SINGER_INSTRUMENT where SINGER_ID =\
  \ (select ID from SINGER where FIRST_NAME = 'BB')\",\n\"delete from SINGER where\
  \ FIRST_NAME = 'BB'\"\n},\nexecutionPhase = Sql.ExecutionPhase.AFTER_TEST_METHOD)\n\
  public void testInsert(){\nvar singer = new Singer();\nsinger.setFirstName(\"BB\"\
  );\nsinger.setLastName(\"King\");\nsinger.setBirthDate(LocalDate.of(1940, 8, 16));\n\
  var album = new Album();\nalbum.setTitle(\"My Kind of Blues\");\nalbum.setReleaseDate(LocalDate.of(1961,\
  \ 7, 18));\nsinger.addAlbum(album);\nalbum = new Album();\nalbum.setTitle(\"A Heart\
  \ Full of Blues\");\nalbum.setReleaseDate(LocalDate.of(1962, 3, 20));\nsinger.addAlbum(album);\n\
  singerService.save(singer);\nAssertions.assertNotNull(singer.getId());\nvar singers\
  \ = singerService.findAllWithAlbum().peek(\ns -> {\nLOGGER.info(s.toString());\n\
  if (s.getAlbums() != null) {\ns.getAlbums().forEach(a -> LOGGER.info(\"\\t 专辑:\"\
  \ + a.toString()));\n}\nif (s.getInstruments() != null) {\ns.getInstruments().forEach(i\
  \ -> LOGGER.info(\"\\t 乐器: \" + i.getInstrumentId()));\n}\n}).toList();\nassertEquals(4,\
  \ singers.size());\n}\n// 其他方法和设置已省略\n}\n清单 8-21\n测试 SingerServiceImpl.save(..)\
  \ 方法\n```\n\n如上所示，我们创建了一个新歌手，添加了两张专辑，并保存了该对象。通过验证 `findAllWithAlbum()` 方法返回的结果集大小，来测试此操作是否成功。\n\
  \n`@Sql` 注解用于清理数据库，以避免意外导致其他基于初始测试数据集运行的测试失败。\n\n### 更新数据\n\n更新数据与插入数据一样简单，而且如您所见，我们为插入和更新操作创建了同一个方法。测试更新操作有两种方式：更新歌手记录的姓名或其他属性，或者移除相关的关联（例如专辑）。清单\
  \ 8-22 展示了测试 `SingerServiceImpl.save(..)` 方法以执行更新的两种方式。\n\n```\npackage com.apress.prospring6.eight;\n\
  // 导入语句已省略\n// 注解已省略\npublic class SingerServiceTest {\n@Test\n@SqlGroup({\n@Sql(scripts\
  \ = {\"classpath:testcontainers/add-nina.sql\"},\nexecutionPhase = Sql.ExecutionPhase.BEFORE_TEST_METHOD),\n\
  @Sql(scripts = {\"classpath:testcontainers/remove-nina.sql\"},\nexecutionPhase =\
  \ Sql.ExecutionPhase.AFTER_TEST_METHOD)\n})\n@DisplayName(\"应能更新一个歌手\")\nvoid testUpdate()\
  \ {\nvar singer = singerService.findById(5L).orElse(null);\n// 确保该歌手存在\nassertNotNull(singer);\n\
  // 确保我们得到了预期的歌手\nassertEquals(\"Simone\", singer.getLastName());\n// 获取专辑\nvar album\
  \ = singer.getAlbums().stream().filter(\na -> a.getTitle().equals(\"I Put a Spell\
  \ on You\")).findFirst().orElse(null);\nAssertions.assertNotNull(album);\nsinger.setFirstName(\"\
  Eunice Kathleen\");\nsinger.setLastName(\"Waymon\");\nsinger.removeAlbum(album);\n\
  int version =  singer.getVersion();\nsingerService.save(singer);\nvar nina =  singerService.findById(5L).orElse(null);\n\
  assertAll( \"nina 已更新\" ,\n() -> Assertions.assertNotNull(nina),\n() -> Assertions.assertEquals(version\
  \ +1, nina.getVersion())\n);\n}\n@Test\n@DisplayName(\"应能更新专辑集合\")\npublic void\
  \ testUpdateAlbumSet() {\nvar singer = singerService.findById(1L).orElse(null);\n\
  // 确保该歌手存在\nassertNotNull(singer);\n// 确保我们得到了预期的记录\nassertEquals(\"Mayer\", singer.getLastName());\n\
  // 获取专辑\nvar album = singer.getAlbums().stream().filter(a -> a.getTitle().equals(\"\
  Battle Studies\")).findAny().orElse(null);\nsinger.setFirstName(\"John Clayton\"\
  );\nsinger.removeAlbum(album);\nsingerService.save(singer);\nvar singers = singerService.findAllWithAlbum().peek(\n\
  s -> {\nLOGGER.info(s.toString());\nif (s.getAlbums() != null) {\ns.getAlbums().forEach(a\
  \ -> LOGGER.info(\"\\t 专辑:\" + a.toString()));\n}\nif (s.getInstruments() != null)\
  \ {\ns.getInstruments().forEach(i -> LOGGER.info(\"\\t 乐器: \" + i.getInstrumentId()));\n\
  }\n}).toList();\nassertEquals(3, singers.size());\n}\n// 其他方法和设置已省略\n}\n清单 8-22\n\
  测试 SingerServiceImpl.save(..) 方法的两种更新操作形式\n```\n\n在 `testUpdate()` 方法中，我们首先检索 ID\
  \ 为 5 的记录，并更改其名和姓。我们调用 `SingerService.save(..)` 方法，然后从数据库中检索已保存的项目。通过其 `version`\
  \ 字段的递增来确认更新操作成功。\n\n在 `testUpdateAlbumSet()` 方法中，我们首先检索 ID 为 1 的记录，并更改其名。然后我们遍历其\
  \ `Album` 关联，检索标题为 *Battle Studies* 的专辑，并将其从歌手的专辑属性中移除。最后，我们再次调用 `SingerService.save(..)`\
  \ 方法。执行此方法时，您可以通过查看控制台日志并检查 *Battle Studies* 专辑是否未显示，来确认更新操作是否成功。\n\n![](img/315511_6_En_8_Figf_HTML.jpg)一个警告符号，在圆形背景上显示一个感叹号。 该专辑可以被移除，是因为在一对多关联中定义了\
  \ `orphanRemoval=true` 属性，该属性指示 JPA 提供者（Hibernate）在持久化时，移除数据库中所有存在但对象中不再存在的孤立记录：`@OneToMany(mappedBy\
  \ = \"singer\", cascade=CascadeType.ALL, orphanRemoval=true)`。\n\n\n\n### 删除数据\n\
  \n删除数据同样简单。只需调用 `EntityManager.remove()` 方法并传入 `Singer` 对象即可。清单 8-23 展示了更新后的删除歌手代码。\n\
  \n```\npackage com.apress.prospring6.eight.service;\n// 省略 import 语句\n@Service(\"\
  jpaSingerService\")\n@Repository\n@Transactional\npublic class SingerServiceImpl\
  \  implements SingerService {\n@Override\npublic void delete(Singer singer) {\n\
  var mergedContact = em.merge(singer);\nem.remove(mergedContact);\nLOGGER.info(\"\
  Singer with id: \" + singer.getId()  + \" deleted successfully\");\n}\n// 省略其他方法和设置\n\
  }\n清单 8-23\nSingerServiceImpl.delete(..) 方法\n```\n\n首先调用 `EntityManager.merge(..)`\
  \ 方法，将实体的状态合并到当前持久化上下文中。`merge(..)` 方法返回受管理的实体实例。然后调用 `EntityManager.remove()` 方法，并传入受管理的歌手实体实例。该删除操作会删除歌手记录及其所有关联信息（包括专辑和乐器），因为我们在映射中定义了\
  \ `cascade=CascadeType.ALL`。要测试删除操作，可以使用 `testDelete()` 方法，如清单 8-24 所示。\n\n```\n\
  package com.apress.prospring6.eight;\n// 省略 import 语句\n// 省略注解\npublic class SingerServiceTest\
  \ {\n@Test\n@Sql(scripts = {\"classpath:testcontainers/add-chuck.sql\"},\nexecutionPhase\
  \ = Sql.ExecutionPhase.BEFORE_TEST_METHOD)\n@DisplayName(\"should delete a singer\"\
  )\npublic void testDelete() {\nvar singer = singerService.findById(6L).orElse(null);\n\
  //确保该歌手存在\nassertNotNull(singer);\nsingerService.delete(singer);\nvar deleted =\
  \ singerService.findById(6L);\nassertTrue(deleted.isEmpty());\n}\n// 省略其他方法和设置\n\
  }\n清单 8-24\n测试 SingerServiceImpl.delete(..) 方法\n```\n\n清单 8-24 检索 ID 为 6 的歌手，然后调用\
  \ `delete(..)` 方法删除该歌手信息。\n\n## 使用原生查询\n\n在讨论了使用 JPA 执行基本数据库操作之后，现在让我们进入一些更高级的主题。有时你可能希望对提交给数据库的查询拥有绝对的控制权。一个例子是在\
  \ Oracle 数据库中使用层次查询。这种查询是数据库特定的，被称为*原生查询*。\n\nJPA 支持执行原生查询；`EntityManager` 会按原样将查询提交给数据库，不进行任何映射或转换。使用\
  \ JPA 原生查询的一个主要好处是能够将 `ResultSet` 映射回 ORM 映射的实体类。以下两节将讨论如何使用原生查询检索所有歌手，并直接将 `ResultSet`\
  \ 映射回 `Singer` 对象。\n\n### 使用简单原生查询\n\n为了演示如何使用原生查询，让我们实现一个新方法，从数据库中检索所有歌手。该方法如清单\
  \ 8-25 所示。\n\n```\npackage com.apress.prospring6.eight.service;\n// 省略 import 语句\n\
  @Service(\"jpaSingerService\")\n@Repository\n@Transactional\npublic class SingerServiceImpl\
  \  implements SingerService {\npublic static final String ALL_SINGER_NATIVE_QUERY\
  \ =\n\"select ID, FIRST_NAME, LAST_NAME, BIRTH_DATE, VERSION from SINGER\";\n@Override\n\
  public Stream findAllByNativeQuery() {\nreturn em.createNativeQuery(ALL_SINGER_NATIVE_QUERY)\n\
  .getResultList().stream();\n}\n// 省略其他方法和设置\n}\n清单 8-25\nSingerServiceImpl.findAllByNativeQuery(..)\
  \ 方法\n```\n\n可以看到，原生查询只是一个简单的 SQL 语句，用于检索 `SINGER` 表中的所有列。为了创建并执行查询，首先调用了 `EntityManager.createNativeQuery(..)`，并传入查询字符串以及结果类型。结果类型应该是一个映射的实体类（此处为\
  \ `Singer` 类）。`createNativeQuery(..)` 方法返回一个 `Query` 实例，该实例提供了 `getResultList()`\
  \ 操作来获取结果列表。JPA 提供者将执行查询，并根据实体类中定义的 JPA 映射，将 `ResultSet` 对象转换为实体实例。执行上述方法会产生与 `findAll()`\
  \ 方法相同的结果。\n\n### 使用 SQL `ResultSet` 映射进行原生查询\n\n除了映射的领域对象，你还可以传入一个表示 SQL `ResultSet`\
  \ 映射名称的字符串。SQL `ResultSet` 映射通过使用 `@SqlResultSetMapping` 注解在实体类级别定义。一个 SQL `ResultSet`\
  \ 映射可以包含一个或多个实体和列映射。为实体类定义了一个名为 `singerResult` 的 SQL `ResultSet` 映射，其 `entityClass`\
  \ 属性位于 `Singer` 类本身中。JPA 支持针对多个实体的更复杂映射，并支持向下到列级别的映射。\n\n定义 SQL `ResultSet` 映射后，可以使用\
  \ `ResultSet` 映射的名称来调用 `findAllByNativeQuery()` 方法。清单 8-26 展示了更新后的 `findAllByNativeQuery()`\
  \ 方法。\n\n```\npackage com.apress.prospring6.eight.entities;\nimport jakarta.persistence.EntityResult;\n\
  import jakarta.persistence.SqlResultSetMapping;\n// 省略其他 import 语句\n@Entity\n@Table(name\
  \ = \"SINGER\")\n@SqlResultSetMapping(\nname=\"singerResult\",\nentities=@EntityResult(entityClass=Singer.class)\n\
  )\npublic class Singer extends AbstractEntity {\n// 代码省略\n}\n// ----------------------\n\
  // 省略其他细节\npublic class SingerServiceImpl  implements SingerService {\n@Override\n\
  public Stream findAllByNativeQuery() {\nreturn em.createNativeQuery(ALL_SINGER_NATIVE_QUERY,\
  \ \"singerResult\").getResultList().stream();\n}\n// 省略其他方法\n}\n清单 8-26\nALL_SINGER_NATIVE_QUERY\
  \ 原生查询的 @SqlResultSetMapping 映射结果\n```\n\n如你所见，JPA 还通过提供灵活的 SQL `ResultSet` 映射工具，为执行原生查询提供了强大的支持。\n\
  \n\n\n### 执行存储函数与存储过程\n\n配置对 SQL 函数和存储过程执行的支持有多种方式，但最简单的方法是使用原生查询。为此，你需要编写 SQL 来声明存储的\
  \ SQL 函数或过程，使用 `jakarta.persistence` 包中的 `@NamedNativeQuery` 将其 SQL 调用映射到查询名称，然后使用\
  \ `EntityManager.createNamedQuery(..)` 创建原生查询，并通过 `getSingleResult()`、`.getResultList()`\
  \ 或任何其他可用方法检索结果。\n\n清单 8-27 展示了一个非常简单的 SQL 存储函数，该函数根据给定的 `id` 返回歌手的名字。\n\n```\n\
  CREATE FUNCTION IF NOT EXISTS getFirstNameById (in_id INT) RETURNS VARCHAR(60)\n\
  RETURN (SELECT first_name FROM SINGER WHERE id = in_id);\n清单 8-27\ngetFirstNameById\
  \ SQL 存储函数\n```\n\n`getFirstNameById(..)` 存储函数的调用可以使用 `@NamedNativeQuery` 映射到一个名称。当为一个实体类型声明了多个原生查询时，可以将此注解包含在\
  \ `@NamedNativeQueries` 中。这些注解声明在实体类上，在本例中为 `Singer` 类，如清单 8-28 所示。\n\n```\npackage\
  \ com.apress.prospring6.eight.entities;\n// 其他类细节已省略\nimport jakarta.persistence.NamedNativeQueries;\n\
  import jakarta.persistence.NamedNativeQuery;\n@NamedNativeQueries({\n@NamedNativeQuery(\n\
  name = \"Singer.getFirstNameById(?)\",\nquery = \"select getfirstnamebyid(?)\")\n\
  })\npublic class Singer extends AbstractEntity {\n// 主体已省略\n}\n清单 8-28\n将 getFirstNameById\
  \ SQL 存储函数调用映射到命名查询 Singer.getFirstNameById(?)\n```\n\nSQL 存储函数或过程本质上就是一个原生查询，因此允许将其映射到命名原生查询。名称非常灵活，在此场景中选择的名称是\
  \ `Singer.getFirstNameById(?)`，因为它能清晰地表明该查询特定于 `Singer` 实例，并且需要一个参数。\n\n由于查询是命名的，因此使用\
  \ `EntityManager.createNamedQuery(..)` 来创建查询并检索结果，如清单 8-29 所示。\n\n```\npackage com.apress.prospring6.eight.service;\n\
  // 其他类细节已省略\npublic class SingerServiceImpl  implements SingerService {\n@Override\n\
  public String findFirstNameById(Long id) {\nreturn em.createNamedQuery(\"Singer.getFirstNameById(?)\"\
  )\n.setParameter(1, id).getSingleResult().toString();\n}\n}\n清单 8-29\n使用 EntityManager\
  \ 调用 SQL 存储函数\n```\n\n测试此方法的方式与**第** **7** 章中为测试 SQL 函数和过程所介绍的方法相同。\n\n你应该知道，在 `jakarta.persistence`\
  \ 包中有一个名为 `@NamedStoredProcedureQueries` 的注解，用于声明一个 SQL 存储过程数组，每个存储过程使用 `@NamedStoredProcedureQuery`\
  \ 进行配置。当使用这些注解声明时，可以使用 `EntityManager` 的 `createNamedStoredProcedureQuery(..)` 方法调用存储函数或过程。由于这些注解有些误导性（其名称暗示仅支持\
  \ SQL 存储过程），我们更倾向于使用命名原生查询。\n\n## 使用 JPA Criteria API 进行条件查询\n\n大多数应用程序都提供前端界面供用户搜索信息。通常，界面上会显示许多可搜索字段，用户仅在其中部分字段中输入信息并执行搜索。为每种用户可能选择的参数组合准备大量查询是很困难的。在这种情况下，Criteria\
  \ API 查询功能就派上了用场。\n\n在 JPA 2 中，引入的一个主要新特性是强类型的 Criteria API 查询。在这个新的 Criteria API\
  \ 中，传递给查询的条件基于映射实体类的元模型。因此，指定的每个条件都是强类型的，错误将在编译时而非运行时被发现。\n\n在 JPA Criteria API\
  \ 中，实体类元模型由实体类名称加上下划线 `(_)` 后缀表示。例如，`Singer` 实体类的元模型类是 `Singer_`。清单 8-30 展示了 `Singer_`\
  \ 类。\n\n```\npackage com.apress.prospring6.eight.entities;\nimport jakarta.persistence.metamodel.SetAttribute;\n\
  import jakarta.persistence.metamodel.SingularAttribute;\nimport jakarta.persistence.metamodel.StaticMetamodel;\n\
  import java.time.LocalDate;\nimport javax.annotation.processing.Generated;\n@Generated(value\
  \ = \"org.hibernate.jpamodelgen.JPAMetaModelEntityProcessor\")\n@StaticMetamodel(Singer.class)\n\
  public abstract class Singer_ extends com.apress.prospring6.eight.entities.AbstractEntity_\
  \ {\npublic static volatile SingularAttribute firstName;\npublic static volatile\
  \ SingularAttribute lastName;\npublic static volatile SetAttribute albums;\npublic\
  \ static volatile SetAttribute instruments;\npublic static volatile SingularAttribute\
  \ birthDate;\npublic static final String FIRST_NAME = \"firstName\";\npublic static\
  \ final String LAST_NAME = \"lastName\";\npublic static final String ALBUMS = \"\
  albums\";\npublic static final String INSTRUMENTS = \"instruments\";\npublic static\
  \ final String BIRTH_DATE = \"birthDate\";\n}\n清单 8-30\nSinger 实体的元模型\n```\n\n元模型类使用\
  \ `@StaticMetamodel` 注解，其属性是映射的实体类。类内部声明了每个属性及其相关类型。手动编写和维护这些元模型类会很繁琐。不过，有工具可以根据实体类中的\
  \ JPA 映射自动生成这些元模型类。Hibernate 提供的工具称为 Hibernate Metamodel Generator^(⁷⁴)。\n\n生成元模型类的具体方式取决于你用于开发和构建项目的工具。我们建议阅读文档的“用法”部分^(⁷⁵)以获取具体细节。\n\
  \n元模型类生成所需的依赖是 `hibernate-jpamodelgen` 库。本章的项目中包含了 Maven 和 Gradle 的配置，元模型类会在默认构建过程中生成。\n\
  \n设置好类生成策略后，让我们定义一个接受名字和姓氏来搜索歌手的查询。为此，我们将在 `SingerService` 接口中添加一个 `findByCriteriaQuery()`\
  \ 方法，并在 `SingerServiceImpl` 中实现它，如清单 8-31 所示。\n\n\n\n```\npackage com.apress.prospring6.eight.service;\n\
  import com.apress.prospring6.eight.entities.Singer_;\nimport org.apache.commons.lang3.StringUtils;\n\
  import jakarta.persistence.criteria.CriteriaBuilder;\nimport jakarta.persistence.criteria.CriteriaQuery;\n\
  import jakarta.persistence.criteria.JoinType;\nimport jakarta.persistence.criteria.Predicate;\n\
  import jakarta.persistence.criteria.Root;\n// 其他导入语句已省略\n@Service(\"jpaSingerService\"\
  )\n@Repository\n@Transactional\npublic class SingerServiceImpl  implements SingerService\
  \ {\nprivate static final Logger LOGGER = LoggerFactory.getLogger(SingerServiceImpl.class);\n\
  @PersistenceContext\nprivate EntityManager em;\n@Override\npublic Stream findByCriteriaQuery(String\
  \ firstName, String lastName) {\nLOGGER.info(\"正在根据 firstName: \" + firstName +\
  \ \" 和 lastName: \" + lastName + \" 查找歌手\");\nCriteriaBuilder cb = em.getCriteriaBuilder();\n\
  CriteriaQuery criteriaQuery = cb.createQuery(Singer.class);\nRoot singerRoot = criteriaQuery.from(Singer.class);\n\
  singerRoot.fetch(Singer_.albums, JoinType.LEFT);\nsingerRoot.fetch(Singer_.instruments,\
  \ JoinType.LEFT);\ncriteriaQuery.select(singerRoot).distinct(true);\nPredicate criteria\
  \ = cb.conjunction();\nif (StringUtils.isNotBlank(firstName)) {\nPredicate firstNamePredicate\
  \ = cb.equal(singerRoot.get(Singer_.firstName), firstName);\ncriteria = cb.and(criteria,\
  \ firstNamePredicate);\n}\nif (StringUtils.isNotBlank(lastName)) {\nPredicate lastNamePredicate\
  \ = cb.equal(singerRoot.get(Singer_.lastName), lastName);\ncriteria = cb.and(criteria,\
  \ lastNamePredicate);\n}\ncriteriaQuery.where(criteria);\nreturn em.createQuery(criteriaQuery).getResultList().stream();\n\
  }\n// 其他方法和设置已省略\n}\n清单 8-31\n使用 JPA Criteria API 的 SingerServiceImpl.findByCriteriaQuery()\
  \ 方法\n```\n\n下面我们来分解 Criteria API 的使用：\n\n*   调用 `EntityManager.getCriteriaBuilder()`\
  \ 来获取 `jakarta.persistence.criteria.CriteriaBuilder` 的一个实例。\n\n*   通过调用 `CriteriaBuilder.createQuery()`\
  \ 并传入 `Singer` 作为结果类型来创建一个类型化查询。生成的实例类型为 `jakarta.persistence.criteria.CriteriaQueryImpl<Singer>`，它实现了\
  \ `jakarta.persistence.criteria.CriteriaQuery<Singer>`。\n\n*   两次 `Root<..>.fetch(..)`\
  \ 方法调用强制对 `albums` 和 `instruments` 关联进行即时抓取。`JoinType.LEFT` 参数指定了一个外连接。使用 `JoinType.LEFT`\
  \ 作为第二个参数调用 `Root<..>.fetch(..)` 方法，等同于在 JPQL 中指定左连接抓取操作。\n\n*   调用 `CriteriaQuery.select(..)`\
  \ 方法，并传入根查询对象。调用参数为 `true` 的 `distinct(..)` 方法意味着应消除重复记录。\n\n*   通过调用 `CriteriaBuilder.conjunction()`\
  \ 方法获取一个 `jakarta.persistence.criteria.Predicate` 实例，这意味着要创建一个或多个限制条件的合取。一个 `Predicate`\
  \ 可以是简单或复合谓词，谓词是一个限制条件，指示由表达式定义的选择标准。\n\n*   检查 `firstName` 和 `lastName` 参数。对于每个\
  \ `非空` 参数，使用 `CriteriaBuilder` 实例（即 `CriteriaBuilder.and(..)` 方法）构造一个新的 `Predicate`。`equal()`\
  \ 方法用于指定相等限制，在其中调用 `Root<..>.get()`，并传入该限制所适用的实体类元模型的相应属性。然后，通过调用 `CriteriaBuilder.and()`\
  \ 方法，将构造好的谓词与现有谓词（由变量 criteria 存储）进行“合取”。\n\n*   使用所有标准和限制条件构造 `Predicate`，并通过调用\
  \ `CriteriaQuery.where(..)` 方法将其作为 `where` 子句传递给查询。\n\n*   最后，将 `CriteriaQuery`\
  \ 传递给 `EntityManager`。然后，`EntityManager` 根据传入的 `CriteriaQuery` 值构造查询，执行查询，并返回结果。\n\
  \n为了测试这个条件查询操作，在 `SingerServiceTest` 测试类中添加了一个新的测试方法，如清单 8-32 所示。\n\n```\npackage\
  \ com.apress.prospring6.eight;\n// 导入语句已省略\n// 注解已省略\npublic class SingerServiceTest\
  \ {\n@Test\npublic void testFindByCriteriaQuery(){\nvar singers = singerService.findByCriteriaQuery(\"\
  John\", \"Mayer\").peek(\ns -> {\nLOGGER.info(s.toString());\nif (s.getAlbums()\
  \ != null) {\ns.getAlbums().forEach(a -> LOGGER.info(\"\\t 专辑:\" + a.toString()));\n\
  }\nif (s.getInstruments() != null) {\ns.getInstruments().forEach(i -> LOGGER.info(\"\
  \\t 乐器: \" + i.getInstrumentId()));\n}\n}).toList();\nassertEquals(1, singers.size());\n\
  }\n// 其他方法和设置已省略\n}\n清单 8-32\n测试 SingerServiceImpl.findByCriteriaQuery() 方法\n```\n\
  \n这个测试与本章前面编写的测试没有太大区别，输出结果也是如此，如清单 8-33 所示。\n\n```\nINFO : SingerServiceImpl -\
  \ 正在根据 firstName: John 和 lastName: Mayer 查找歌手\nDEBUG: CriteriaQueryImpl - 渲染的条件查询\
  \ ->\nselect distinct generatedAlias0 from Singer as generatedAlias0\nleft join\
  \ fetch generatedAlias0.albums as generatedAlias1\nleft join fetch generatedAlias0.instruments\
  \ as generatedAlias2\nwhere ( ( 1=1 )\nand ( generatedAlias0.firstName=:param0 )\
  \ )\nand ( generatedAlias0.lastName=:param1 )\n...\nDEBUG: QueryTranslatorImpl -\
  \ parse() - HQL:\nselect distinct generatedAlias0\nfrom com.apress.prospring6.eight.entities.Singer\
  \ as generatedAlias0\nleft join fetch generatedAlias0.albums as generatedAlias1\n\
  left join fetch generatedAlias0.instruments as generatedAlias2\nwhere ( ( 1=1 )\n\
  and ( generatedAlias0.firstName=:param0 ) )\nand ( generatedAlias0.lastName=:param1\
  \ )\n...\nDEBUG: QueryTranslatorImpl - SQL:\nselect\ndistinct singer0_.ID as id1_2_0_,\n\
  albums1_.ID as id1_0_1_,\ninstrument3_.INSTRUMENT_ID as instrume1_1_2_,\nsinger0_.VERSION\
  \ as version2_2_0_,\nsinger0_.BIRTH_DATE as birth_da3_2_0_,\nsinger0_.FIRST_NAME\
  \ as first_na4_2_0_,\nsinger0_.LAST_NAME as last_nam5_2_0_,\nalbums1_.VERSION as\
  \ version2_0_1_,\nalbums1_.RELEASE_DATE as release_3_0_1_,\nalbums1_.SINGER_ID as\
  \ singer_i5_0_1_,\nalbums1_.title as title4_0_1_,\nalbums1_.SINGER_ID as singer_i5_0_0__,\n\
  albums1_.ID as id1_0_0__,\ninstrument2_.SINGER_ID as singer_i1_3_1__,\ninstrument2_.INSTRUMENT_ID\
  \ as instrume2_3_1__\nfrom SINGER singer0_\nleft outer join ALBUM albums1_ on singer0_.ID=albums1_.SINGER_ID\n\
  left outer join SINGER_INSTRUMENT instrument2_ on singer0_.ID=instrument2_.SINGER_ID\n\
  left outer join INSTRUMENT instrument3_ on instrument2_.INSTRUMENT_ID=instrument3_.INSTRUMENT_ID\n\
  where 1=1\nand singer0_.FIRST_NAME=?\nand singer0_.LAST_NAME=?\n...\nINFO : SingerServiceTest\
  \ - 歌手 - Id: 1, 名字: John, 姓氏: Mayer, 生日: 1977-10-16\nINFO : SingerServiceTest -\
  \  专辑:专辑 - Id: 1, 歌手 Id: 1, 标题: The Search For Everything, 发行日期: 2017-01-20\nINFO\
  \ : SingerServiceTest -  专辑:专辑 - Id: 2, 歌手 Id: 1, 标题: Battle Studies, 发行日期: 2009-11-17\n\
  INFO : SingerServiceTest -  乐器: 吉他\nINFO : SingerServiceTest -  乐器: 钢琴\n清单 8-33\n\
  执行 testFindByCriteriaQuery() 测试方法时的控制台输出片段\n```\n\n这个输出是一致的，但它会向你准确展示底层发生的事情。它从一个条件查询开始，该查询被转换为\
  \ HQL，然后转换为 SQL，最后在数据库上执行。这看起来有点繁琐，对吧？为了获得强类型查询以及在编译时而非运行时发现错误，这样的性能开销值得吗？这取决于应用程序的配置文件和查询的复杂性。我们在第\
  \ 7 章已经提到过 jOOQ，它提供了大致相同的好处，但没有两级转换，并且语法更友好。\n\n\n\n## 摘要\n\n在本章中，我们介绍了 JPA 的基本概念，以及如何在\
  \ Spring 中使用 Hibernate 作为持久化服务提供者来配置 JPA 的 `EntityManagerFactory`。随后，我们讨论了如何使用 JPA\
  \ 执行基本的数据库操作。高级主题包括原生查询和强类型的 JPA Criteria API。\n\n本章的目的是向你介绍 JPA 的 `EntityManagerFactory`，因为从架构角度来看，Hibernate\
  \ 的 `SessionFactory` 是其扩展。因此，`SessionFactory` 也是一个 JPA `EntityManagerFactory`，这意味着两者都包含实体映射元数据，并允许你创建\
  \ Hibernate `Session` 或 `EntityManager`。\n\n然而，`EntityManagerFactory` 是标准实现，并且在所有实现中都是相同的。这意味着，虽然可能性不大，但如果你希望将\
  \ JPA 提供者（此处为 Hibernate）更换为其他持久化实现（比如 Oracle TopLink），当你的代码不与特定提供者绑定时，这样做会容易得多。\n\
  \n话虽如此，在**第** **9** **章**中，我们将通过探索事务来完善在 Spring 中使用 SQL 数据库的完整图景。\n\n脚注 1   2  \
  \ 3   4   5   6\n\n"
- "# 9. Spring 事务管理\n\n管理事务是构建可靠企业应用最关键的部分之一。最常见的事务类型是数据库操作。在典型的数据库更新操作中，数据库事务开始，数据被更新，然后根据数据库操作的结果，事务被提交或回滚。然而，在许多情况下，根据应用需求以及应用需要交互的后端资源（例如关系型数据库、面向消息的中间件、ERP\
  \ 系统等），事务管理可能会复杂得多。\n\n在 Java 应用开发的早期（JDBC 创建之后，但在 JEE 标准或像 Spring 这样的应用框架可用之前），开发者在应用代码中以编程方式控制和*管理*事务。当\
  \ JEE，更具体地说是 EJB 标准可用时，开发者能够使用容器管理事务（CMT）以声明式方式管理事务。但 EJB 部署描述符中复杂的事务声明难以维护，并为事务处理引入了不必要的复杂性。一些开发者更喜欢对事务有更多控制，并选择\
  \ Bean 管理事务（BMT）以编程方式管理事务。然而，使用 Java 事务 API（JTA）进行编程的复杂性也阻碍了开发者的生产力。\n\n如**第** **5**\
  \ **章**所述，事务管理是一个横切关注点，不应编码在业务逻辑中。实现事务管理最合适的方式是允许开发者以声明式方式定义事务需求，并让 Spring、JEE 或\
  \ AOP 等框架代表我们编织事务处理逻辑。在本章中，我们将讨论 Spring 如何帮助简化事务处理逻辑的实现。Spring 同时支持声明式和编程式事务管理。\n\
  \nSpring 为声明式事务提供了出色的支持，这意味着你无需用事务管理代码来混乱你的业务逻辑。你所需要做的只是声明那些必须参与事务的方法（在类或层内），以及事务配置的细节，Spring\
  \ 将负责处理事务管理。更具体地说，本章涵盖以下内容：\n\n*   *Spring 事务抽象层*：我们将讨论 Spring 事务抽象类的基本组件，并解释如何使用这些类来控制事务的属性。\n\
  \n*   *声明式* *事务管理*：我们将向你展示如何使用 Spring 和纯 Java 对象来实现声明式事务管理。我们将提供使用 XML 配置文件以及 Java\
  \ 注解进行声明式事务管理的示例。\n\n*   *编程式* *事务管理*：尽管编程式事务管理并不常用，但我们仍会解释如何使用 Spring 提供的 `TransactionTemplate`\
  \ 类，它让你能够完全控制事务管理代码。\n\n## 探索 Spring 事务抽象层\n\n在开发应用时，无论你是否选择使用 Spring，在使用事务时都必须做出一个基本选择：是使用全局事务还是本地事务。*本地事务*特定于单个事务性资源（例如一个\
  \ JDBC 连接），而*全局事务*由容器管理，并且可以跨越多个事务性资源。\n\n\n\n### 事务类型\n\n本地事务易于管理，如果你的应用程序中所有操作仅需与一个事务性资源（例如\
  \ JDBC 事务）交互，那么使用本地事务就足够了。然而，如果你没有使用像 Spring 这样的应用框架，就需要编写大量的事务管理代码；并且未来如果事务范围需要扩展到多个事务性资源，你就必须放弃本地事务管理代码，重写为使用全局事务。\n\
  \n在 Java 世界中，全局事务通过 JTA（Java/Jakarta 事务 API）实现。在此场景下，一个兼容 JTA 的事务管理器通过各自的资源管理器连接到多个事务性资源，这些资源管理器能够通过\
  \ XA（Exchange Access）协议（一个定义分布式事务的开放标准）与事务管理器通信。采用两阶段提交（2PC）机制来确保所有后端数据源要么全部更新，要么全部回滚。如果任一后端资源失败，整个事务就会回滚，因此所有资源的更新也会一并回滚。全局事务是\
  \ `UserTransaction` 的一个实现，通常需要从 JNDI 获取。由于 JNDI 特定于服务器环境，这限制了应用程序代码的潜在复用性。过去有一些不需要服务器的库，例如本书上一版中使用的\
  \ Atomikos^(⁷⁶)，但本版未使用，因为其当前版本尚未适配 Jakarta 事务 API，因此无法与最新的 Spring 版本一起使用。\n\n图 9-1\
  \ 展示了使用 JTA 的全局事务的高级视图。如图所示，有四个主要参与方参与全局事务（通常也称为分布式事务）。第一方是后端资源，例如 RDBMS、消息中间件、企业资源规划（ERP）系统等。\n\
  \n![](img/315511_6_En_9_Fig1_HTML.jpg)\n\n一个使用 JTA 的全局事务框图，包含 JTA 事务管理器、资源管理器、应用程序组件、数据库、MQ\
  \ 服务器和 ERP。\n\n图 9-1\n使用 JTA 的全局事务概览\n\n第二方是资源管理器，通常由后端资源供应商提供，负责与后端资源交互。例如，当连接到\
  \ MySQL 数据库时，我们需要与 MySQL 的 Java 连接器提供的 `MysqlXADataSource` 类交互。MariaDB 也存在等效的实现。其他后端资源（例如\
  \ MQ、ERP 等）也提供各自的资源管理器。\n\n第三方是 JTA 事务管理器，负责管理与参与事务的所有资源管理器之间的状态管理、协调和同步。这里使用了前面提到的\
  \ XA 协议，这是一个广泛用于分布式事务处理的开放标准。JTA 事务管理器也支持 2PC，以便所有更改能一起提交；如果任何资源更新失败，整个事务将回滚，导致所有资源都不会被更新。整个机制由\
  \ Java 事务服务（JTS）规范定义。\n\n最后一个组件是应用程序。应用程序本身，或其运行的底层容器或 Spring 框架，负责管理事务（开始、提交、回滚事务等）。同时，应用程序通过\
  \ JEE 定义的各种标准与底层后端资源交互。如图 9-1 所示，应用程序通过 JDBC 连接到 RDBMS，通过 JMS 连接到 MQ，并通过 Java EE\
  \ 连接器架构（JCA）连接到 ERP 系统。所有完全兼容 JEE 的应用服务器（例如 JBoss、WebSphere、WebLogic 和 GlassFish）都支持\
  \ JTA，在这些服务器中，可以通过 JNDI 查找获取事务。对于独立应用程序或 Web 容器（例如 Tomcat 和 Jetty），存在开源和商业解决方案，在这些环境中提供对\
  \ JTA/XA 的支持。Spring 社区曾经青睐的是 Atomikos，甚至还有一个 Spring Boot 启动器库。不幸的是，在撰写本章时，Atomikos\
  \ 的最新版本（5.0.9）并非基于 Jakarta JTA，这意味着无法使用最新的 Spring 版本构建 Spring JTA 应用程序。另一个替代方案 Bitronix^(⁷⁷)\
  \ 已在 GitHub 上归档，并且过去 6 年没有进行任何更新。Java 开放事务管理器（JOTM）^(⁷⁸) 的最后一次更新是在 2009 年。\n\n随着人们对微服务、使用\
  \ Apache Kafka、RabbitMQ 和 Azure Event Hub（以及更多）构建的事件驱动系统的兴趣日益浓厚，以及像 Amazon 的 DynamoDB\
  \ 和 MariaDB SkySQL 这样的 DBaaS（数据库即服务）的兴起，JTA 似乎正在慢慢过时，所有这些都使得事务变得不是特别必要。当然，如果你需要使用全局事务，始终可以选择使用应用\
  \ EE 服务器。\n\n在撰写本文时，Spring 6 对使用独立实现的 JTA 支持尚不明确。Spring 的组件基于 Jakarta API，这意味着独立实现也必须基于它。例如，独立实现必须为\
  \ `jakarta.transaction.UserTransaction` 提供实现才能与 Spring 6 JTA 兼容，但目前还没有任何实现做到这一点。使用兼容\
  \ Jakarta 10 的服务器也不是一个选项。Jakarta EE 10^(⁷⁹) 是自“jakarta”命名空间更新以来 Jakarta EE 的第一个主要版本，许多应用服务器尚不兼容它。\n\
  \n到今年年底，可能会有兼容的独立实现可用，或者出现兼容 Jakarta 10 的服务器，如 Apache TomEE、Open Liberty、Eclipse\
  \ Glassfish 等^(⁸⁰)。如果你对使用 Spring 5 和 Atomikos 的全局事务感兴趣，请随时查阅本书的上一版及其关联仓库中的示例项目^(⁸¹)。\n\
  \n\n\n## `PlatformTransactionManager` 的实现\n\n在 Spring 中，`PlatformTransactionManager`\
  \ 接口使用 `TransactionDefinition` 和 `TransactionStatus` 接口来创建和管理事务。这些接口的具体实现必须详细了解事务管理器。\n\
  \nSpring 为 `PlatformTransactionManager` 接口提供了丰富的实现集。图 9-2 展示了其中的一部分。\n\n![](img/315511_6_En_9_Fig2_HTML.jpg)\n\
  \n平台事务管理器示意图，包含一系列实现，例如 JDBC 事务管理器、数据源、JPA、Hibernate、JMS、JTA、资源、平台、事务管理器和事务工厂。\n\
  \n图 9-2\n\n`PlatformTransactionManager` 的实现\n\n`DataSourceTransactionManager` 类来自\
  \ `org.springframework.jdbc.datasource` 包，用于通用 JDBC 连接。在 ORM 方面，有几种实现，包括 JPA 的 `JpaTransactionManager`\
  \ 类和 Hibernate 5 的 `HibernateTransactionManager` 类。未来可能会推出适用于 Hibernate 6 的新版本。目前唯一可用的\
  \ `HibernateTransactionManager` 类来自 `org.springframework.orm.hibernate5` 包。由于对 Hibernate\
  \ 5 的支持可能不会放弃，预计 Spring ORM 6 中会出现名为 `org.springframework.orm.hibernate6` 的包。对于\
  \ JMS，这些实现通过 `JmsTransactionManager` 类支持 JMS 2.0。对于 JTA，通用实现类是 `JtaTransactionManager`。对于响应式服务器，Spring\
  \ 提供了 `AbstractReactiveTransactionManager`，这是一个抽象基类，实现了 Spring 的标准响应式事务工作流，作为具体平台事务管理器（例如用于单个\
  \ R2DBC `ConnectionFactory` 的 `R2dbcTransactionManager` 实现）的基础。\n\nSpring 还提供了几个特定于特定应用服务器的\
  \ JTA 事务管理器类（未在图 9-2 中描绘）。这些类为 WebSphere（`WebSphereUowTransactionManager` 类）和 BEA\
  \ WebLogic 9.0 及更高版本（`WebLogicJtaTransactionManager` 类）提供原生支持。\n\n![](img/315511_6_En_9_Figa_HTML.jpg)一个符号描绘了圆形背景上的小写字母\
  \ i。 JDO 支持已在 Spring 5 中移除，因此 `JdoTransactionManager` 在图 9-2 的类图中缺失。从 Spring 5 开始，仅支持\
  \ Hibernate 5；对 Hibernate 3 和 Hibernate 4 的实现已被移除。对 JMS 1.1 的支持已在 Spring 5 中移除。支持\
  \ JEE、JCA 和通用客户端接口 (CCI) 的 `CciLocalTransactionManager` 类目前已弃用。\n\n## 分析事务属性\n\n\
  在本节中，我们将讨论 Spring 支持的事务属性，重点关注与作为后端资源的 RDBMS 的交互。\n\n事务具有众所周知的 ACID 属性（原子性、一致性、隔离性和持久性），维护这些事务方面是事务性资源的职责。你无法控制事务的原子性、一致性和持久性。但是，你可以控制事务传播和超时，以及配置事务是否为只读并指定隔离级别。\n\
  \nSpring 将所有设置封装在 `TransactionDefinition` 接口中。该接口用于 Spring 事务支持的核心接口，即 `PlatformTransactionManager`\
  \ 接口，其实现执行特定平台（例如 JDBC 或 JTA）上的事务管理。核心方法 `PlatformTransactionManager.getTransaction()`\
  \ 接受一个 `TransactionDefinition` 接口作为参数，并返回一个 `TransactionStatus` 接口。`TransactionStatus`\
  \ 接口用于控制事务执行，更具体地说，用于设置事务结果以及检查事务是否已完成或是否为新事务。\n\n### `TransactionDefinition` 接口\n\
  \n如前所述，`TransactionDefinition` 接口控制事务的属性。让我们更详细地看一下 `TransactionDefinition` 接口^(⁸²)，如清单\
  \ 9-1 所示，并描述其方法。\n\n```\npackage org.springframework.transaction;\nimport org.springframework.lang.Nullable;\n\
  public interface TransactionDefinition {\n// 变量声明和注释已省略\ndefault int getPropagationBehavior()\
  \ {\nreturn PROPAGATION_REQUIRED; // 0\n}\ndefault int getIsolationLevel() {\nreturn\
  \ ISOLATION_DEFAULT; // -1\n}\ndefault int getTimeout() {\nreturn TIMEOUT_DEFAULT;\
  \ // -1\n}\ndefault boolean isReadOnly() {\nreturn false;\n}\n@Nullable\ndefault\
  \ String getName() {\nreturn null;\n}\n// 返回一个带有默认值的不可修改的 {@code TransactionDefinition}。\n\
  static TransactionDefinition withDefaults() {\nreturn StaticTransactionDefinition.INSTANCE;\n\
  }\n}\n清单 9-1\n核心 TransactionDefinition 源代码\n```\n\n该接口中简单明了的方法是 `getTimeout()`，它返回事务必须完成的时间（以秒为单位），以及\
  \ `isReadOnly()`，它指示事务是否为 `只读`。事务管理器实现可以使用此值来优化执行并检查以确保事务仅执行读取操作。`getName()` 方法返回事务的名称。\n\
  \n另外两个方法 `getPropagationBehavior()` 和 `getIsolationLevel()` 需要更详细地讨论。我们从 `getIsolationLevel()`\
  \ 开始，它控制其他事务可以看到哪些数据更改。表 9-1 列出了你可以使用的事务隔离级别，并解释了当前事务中所做的哪些更改其他事务可以访问。隔离级别表示为在 `TransactionDefinition`\
  \ 接口中定义的静态值。\n\n表 9-1\n\n事务隔离级别\n\n| 隔离级别 | 描述 |\n| --- | --- |\n| `ISOLATION_DEFAULT`\
  \ | 底层数据存储的默认隔离级别。 |\n| `ISOLATION_READ_UNCOMMITTED` | 最低隔离级别；它几乎算不上一个事务，因为它允许此事务查看其他未提交事务所修改的数据。\
  \ |\n| `ISOLATION_READ_COMMITTED` | 大多数数据库中的默认级别；它确保其他事务无法读取尚未被其他事务提交的数据。但是，一个事务读取的数据可以被其他事务更新。\
  \ |\n| `ISOLATION_REPEATABLE_READ` | 比 `ISOLATION_READ_COMMITTED` 更严格；它确保一旦你选择了数据，你至少可以再次选择相同的数据集。但是，如果其他事务插入了新数据，你仍然可以选择新插入的数据。\
  \ |\n| `ISOLATION_SERIALIZABLE` | 最昂贵且最可靠的隔离级别；所有事务都被视为一个接一个地执行。 |\n\n选择合适的隔离级别对于数据的一致性很重要，但这些选择会对性能产生很大影响。最高隔离级别\
  \ `ISOLATION_SERIALIZABLE` 的维护成本尤其高。\n\n`getPropagationBehavior()` 方法指定了事务调用的行为，具体取决于是否存在活动事务。表\
  \ 9-2 描述了此方法的值。传播类型表示为在 `TransactionDefinition` 接口中定义的静态值。\n\n表 9-2\n\n事务传播模式\n\n\
  \n\n| 传播模式 | 值 | 描述 |\n| --- | --- | --- |\n| `PROPAGATION_REQUIRED` | 0 | 支持当前事务，如果不存在则新建一个。Spring\
  \ 中的默认传播模式。 |\n| `PROPAGATION_SUPPORTS` | 1 | 支持当前事务，如果不存在则以非事务方式执行。 |\n| `PROPAGATION_MANDATORY`\
  \ | 2 | 支持当前事务，如果不存在则抛出异常。 |\n| `PROPAGATION_REQUIRES_NEW` | 3 | 创建一个新事务，如果存在当前事务则将其挂起。\
  \ |\n| `PROPAGATION_NOT_SUPPORTED` | 4 | 不支持以活动事务方式执行。始终以非事务方式执行，并挂起任何现有事务。 |\n\
  | `PROPAGATION_NEVER` | 5 | 即使存在活动事务也始终以非事务方式执行。如果存在活动事务则抛出异常。 |\n| `PROPAGATION_NESTED`\
  \ | 6 | 如果存在活动事务，则在嵌套事务中运行。如果没有活动事务，则行为如同设置了 `PROPAGATION_REQUIRED`。 |\n\n### `TransactionStatus`\
  \ 接口\n\n`TransactionStatus` 接口^(⁸³)允许事务管理器控制事务的执行。代码可以检查事务是新建事务还是只读事务，并且可以启动回滚。`TransactionStatus`\
  \ 接口描述的行为被拆分到两个接口中：`TransactionExecution`（声明基本事务操作）和 `SavepointManager`（声明与保存点相关的方法）。所有这些都显示在清单\
  \ 9-2 中。\n\n```\n// TransactionStatus.java\npackage org.springframework.transaction;\n\
  import java.io.Flushable;\npublic interface TransactionStatus extends TransactionExecution,\
  \ SavepointManager, Flushable {\nboolean hasSavepoint();\n@Override\nvoid flush();\n\
  }\n// TransactionExecution.java\npackage org.springframework.transaction;\npublic\
  \ interface TransactionExecution {\nboolean isNewTransaction();\nvoid setRollbackOnly();\n\
  boolean isRollbackOnly();\nboolean isCompleted();\n}\n// SavepointManager.java\n\
  package org.springframework.transaction;\npublic interface SavepointManager {\n\
  Object createSavepoint() throws TransactionException;\nvoid rollbackToSavepoint(Object\
  \ savepoint) throws TransactionException;\nvoid releaseSavepoint(Object savepoint)\
  \ throws TransactionException;\n}\n清单 9-2\n核心 TransactionStatus 源代码\n```\n\n`TransactionExecution`\
  \ 接口中的方法不言自明；最值得注意的是 `setRollbackOnly()`，它会导致回滚并结束活动事务。`TransactionStatus` 中的 `hasSavePoint()`\
  \ 方法返回事务内部是否携带保存点（即，该事务是基于保存点作为嵌套事务创建的）。同样来自 `TransactionStatus` 的 `flush()` 方法，如果适用（例如，与\
  \ Hibernate 一起使用时），会将底层会话刷新到数据存储。`TransactionExecution` 接口中的 `isCompleted()` 方法返回事务是否已结束（即，已提交或已回滚）。\n\
  \n## 示例代码的样本数据模型和基础设施\n\n本节使用**第** **7** **章**中介绍的相同数据模型。有两个主表，即 `SINGER` 和 `ALBUM`，我们在关于数据访问的章节中一直使用它们。请随意按照\
  \ `chapter09/README.adoc` 中的说明设置容器，或者完全忽略它，直接运行设置为使用 Testcontainers 启动的 MariaDB\
  \ 容器的测试。使用带有 Hibernate 的 JPA 作为实现数据访问逻辑的持久层。\n\n主要项目依赖项是 Spring ORM 和 Hibernate。Spring\
  \ ORM 库引入了 `spring-tx` 传递依赖项，其中包含所有提供事务支持的 Spring 组件。\n\n图 9-3 显示了 `chapter09` 项目的依赖项列表。\n\
  \n![](img/315511_6_En_9_Fig3_HTML.jpg)\n\n一张截图展示了第 09 章的依赖项列表。它显示了 spring-orm 和\
  \ spring-tx 依赖项下的内容。\n\n图 9-3\n\nGradle 视图中显示的 `chapter09` 项目依赖项\n\n有两个主要的 JPA 实体类\
  \ `Singer` 和 `Album`，它们映射到将在本章大多数示例中使用的那些表。如果您阅读过之前的数据访问章节，应该对这两个类很熟悉，但为简单起见，它们的核心部分显示在清单\
  \ 9-3 中。\n\n```\n// Singer.java\npackage com.apress.prospring6.nine.entities;\n\
  import jakarta.persistence.*;\n// 其他导入语句已省略\n@Entity\n@Table(name = \"SINGER\")\n\
  @NamedQueries({\n@NamedQuery(name=Singer.FIND_ALL, query=\"select s from Singer\
  \ s\"),\n@NamedQuery(name=Singer.COUNT_ALL, query=\"select count(s) from Singer\
  \ s\")\n})\npublic class Singer extends AbstractEntity {\n@Serial\nprivate static\
  \ final long serialVersionUID = 2L;\npublic static final String FIND_ALL = \"Singer.findAll\"\
  ;\npublic static final String COUNT_ALL = \"Singer.countAll\";\n@Column(name = \"\
  FIRST_NAME\")\nprivate String firstName;\n@Column(name = \"LAST_NAME\")\nprivate\
  \ String lastName;\n@Column(name = \"BIRTH_DATE\")\nprivate LocalDate birthDate;\n\
  @OneToMany(mappedBy = \"singer\")\nprivate Set<Album> albums = new HashSet<>();\n\
  @ManyToMany\n@JoinTable(name = \"SINGER_INSTRUMENT\",\njoinColumns = @JoinColumn(name\
  \ = \"SINGER_ID\"),\ninverseJoinColumns = @JoinColumn(name = \"INSTRUMENT_ID\"))\n\
  private Set<Instrument> instruments = new HashSet<>();\n// setter、getter 等已省略\n\
  }\n// ------------------------------------------------------\n// Album.java\npackage\
  \ com.apress.prospring6.nine.entities;\nimport jakarta.persistence.*;\n// 其他导入语句已省略\n\
  @Entity\n@Table(name = \"ALBUM\")\n@NamedQueries({\n@NamedQuery(name=Album.FIND_ALL,\
  \ query=\"select a from Album a where a.singer= :singer\")\n})\npublic class Album\
  \ extends AbstractEntity {\n@Serial\nprivate static final long serialVersionUID\
  \ = 3L;\npublic static final String FIND_ALL = \"Album.findAll\";\n@Column\nprivate\
  \ String title;\n@Column(name = \"RELEASE_DATE\")\nprivate LocalDate releaseDate;\n\
  @ManyToOne\n@JoinColumn(name = \"SINGER_ID\")\nprivate Singer singer;\n// setter、getter\
  \ 等已省略\n}\n清单 9-3\nSinger 和 Album JPA 实体类\n```\n\n我们使用带有 Hibernate 的 JPA 作为实现数据访问逻辑的持久层，这意味着配置也将与**第**\
  \ **7** **章**中的配置相同。清单 9-4 仅显示了与事务管理相关的配置部分。\n\n\n\n```\npackage com.apress.prospring6.nine.config;\n\
  import org.springframework.orm.jpa.JpaTransactionManager;\nimport org.springframework.orm.jpa.JpaVendorAdapter;\n\
  import org.springframework.orm.jpa.LocalContainerEntityManagerFactoryBean;\nimport\
  \ org.springframework.orm.jpa.vendor.HibernateJpaVendorAdapter;\nimport org.springframework.transaction.PlatformTransactionManager;\n\
  import org.springframework.transaction.annotation.EnableTransactionManagement;\n\
  // 其他导入语句已省略\n@Import(BasicDataSourceCfg.class)\n@Configuration\n@EnableTransactionManagement\n\
  @ComponentScan(basePackages = {\"com.apress.prospring6.nine.services\"})\npublic\
  \ class TransactionCfg {\nprivate static Logger LOGGER = LoggerFactory.getLogger(TransactionCfg.class);\n\
  @Autowired\nDataSource dataSource;\n@Bean\npublic PlatformTransactionManager transactionManager()\
  \ {\nJpaTransactionManager transactionManager=new JpaTransactionManager();\ntransactionManager.setEntityManagerFactory(entityManagerFactory().getObject());\n\
  return transactionManager;\n}\n@Bean\npublic JpaVendorAdapter jpaVendorAdapter()\
  \ {\nreturn new HibernateJpaVendorAdapter();\n}\n@Bean\npublic LocalContainerEntityManagerFactoryBean\
  \ entityManagerFactory() {\nvar factory = new LocalContainerEntityManagerFactoryBean();\n\
  factory.setPersistenceProviderClass(HibernatePersistenceProvider.class);\nfactory.setPackagesToScan(\"\
  com.apress.prospring6.nine.entities\");\nfactory.setDataSource(dataSource);\nfactory.setJpaProperties(jpaProperties());\n\
  factory.setJpaVendorAdapter(jpaVendorAdapter());\nreturn factory;\n}\n@Bean\npublic\
  \ Properties jpaProperties() {\nProperties jpaProps = new Properties();\njpaProps.put(Environment.HBM2DDL_AUTO,\
  \ \"none\");\njpaProps.put(Environment.FORMAT_SQL, false);\njpaProps.put(Environment.USE_SQL_COMMENTS,\
  \ false);\njpaProps.put(Environment.SHOW_SQL, false);\nreturn jpaProps;\n}\n}\n\
  清单 9-4\n事务管理配置类\n```\n\n目前，使用注解是在 Spring 中定义事务需求最常见的方式。其主要优势在于，事务需求以及详细的事务属性（超时时间、隔离级别、传播行为等）都定义在代码本身中，这使得应用程序更易于跟踪和维护。`transactionManager`\
  \ Bean 的配置（它是确保这些需求得到满足的核心组件）是通过 Java 配置完成的。由于我们使用的是 JPA，因此我们的 `transactionManager`\
  \ 是一个 `JpaTransactionManager` 实例，它在使用单个 JPA `EntityManagerFactory` 进行事务性数据访问的应用程序中实现\
  \ Spring 的标准事务工作流。\n\n`@EnableTransactionManagement` 注解是完成此配置的关键，因为它负责启用注解驱动的事务能力。此注解用于\
  \ Spring 配置类，以配置传统的命令式事务管理或响应式事务管理。`@EnableTransactionManagement` 负责注册所有支持事务管理的\
  \ Spring 基础设施 Bean，例如 `TransactionInterceptor` 以及基于代理或 AspectJ 的通知，当调用带有 `@Transactional`\
  \ 注解的方法时，这些通知会将拦截器织入调用栈。\n\n`EntityManagerFactory` Bean 的配置方式没有变化。\n\n有了这个配置，任何与数据层交互的方法都可以使用\
  \ `@Transactional` 进行注解，Spring IoC 容器将在方法执行前开启一个事务，并在方法执行后立即关闭它。\n\n### 使用声明式事务\n\
  \n使用注解配置事务行为被称为*声明式*，因为所需的行为是通过在目标方法上使用注解来声明的。无需编写任何代码来创建、启动和结束事务。Spring 的 `transactionManager`\
  \ Bean 会拾取 `@Transactional` 注解，并将该方法包装在所需的事务行为中。这是通过**第** **5** 章中介绍的代理机制实现的。带有\
  \ `@Transactional` 注解的 Bean 声明，或者包含带有 `@Transactional` 注解的方法的 Bean 声明，会在运行时被转换为一个包装在代理中的\
  \ Bean，该代理会为每个目标方法注入事务行为。\n\n图 9-4 展示了每次调用事务性 Bean 的方法时底层发生的情况。\n\n![](img/315511_6_En_9_Fig4_HTML.jpg)\n\
  \n一个包含五层的示意图：调用者、事务代理、Spring 事务拦截器、事务管理器和目标对象。\n\n图 9-4\n\n展示事务行为如何在 Spring 中注入的示意图\n\
  \n在多层实现中，服务类调用仓库类与数据库交换数据，服务方法被配置为在事务中执行，从而为涉及多个数据库操作的方法提供原子性行为。因此，在本节的示例中，歌手的专辑既不会被急切加载，也不会通过命名查询加载，而是在提取歌手的同一个方法中通过仓库方法加载，如清单\
  \ 9-5 所示的 `AllServiceImpl` 类。\n\n```\npackage com.apress.prospring6.nine.services;\n\
  import org.springframework.stereotype.Service;\nimport org.springframework.transaction.annotation.Transactional;\n\
  // 其他导入语句已省略\n@Service\n@Transactional\npublic class AllServiceImpl implements AllService{\n\
  private final SingerRepo singerRepo;\nprivate final AlbumRepo albumRepo;\npublic\
  \ AllServiceImpl(SingerRepo singerRepo, AlbumRepo albumRepo) {\nthis.singerRepo\
  \ = singerRepo;\nthis.albumRepo = albumRepo;\n}\n@Transactional(readOnly = true)\n\
  @Override\npublic Stream findAllWithAlbums() {\nvar singers = singerRepo.findAll();\n\
  return singers.peek(s -> s.setAlbums(albumRepo.findBySinger(s).collect(Collectors.toSet())));\n\
  }\n}\n清单 9-5\nAllServiceImpl 方法，展示通过在同一事务中执行的仓库方法加载歌手和专辑\n```\n\n当使用基于注解的事务管理时，我们需要处理的唯一注解就是\
  \ Spring 的 `@Transactional`。`@Transactional` 注解可以应用于类级别，这意味着默认情况下，Spring 将确保在类中每个方法执行之前都存在一个事务。从\
  \ Spring 5 开始，`@Transactional` 也支持在接口和接口中的默认方法上使用。\n\n![](img/315511_6_En_9_Figb_HTML.jpg)一个警告符号，圆形背景上有一个感叹号。 建议仅在非私有方法上使用\
  \ Spring 的 `@Transactional` 注解，因为事务行为是通过 AOP 代理注入的。\n\n![](img/315511_6_En_9_Figc_HTML.jpg)一个灯泡符号。 `SingerRepo`\
  \ 和 `AlbumRepo` 的实现对于本章并不重要，但如果你好奇，可以随时查看仓库源码。它们的方法使用 `EntityManager` 实现，如**第**\
  \ **8** 章所示。\n\n`@Transactional` 注解支持多个属性，你可以提供这些属性来覆盖默认行为。表 9-3 显示了可用的属性及其默认值和可能的值。\n\
  \n表 9-3\n\n`@Transactional` 注解属性\n\n\n\n| 属性名称 | 默认值 | 可能的值 |\n| --- | --- | ---\
  \ |\n| `propagation` | `Propagation.REQUIRED` | `Propagation.REQUIRED Propagation.SUPPORTS\
  \ Propagation.MANDATORY Propagation.REQUIRES_NEW Propagation.NOT_SUPPORTED Propagation.NEVER\
  \ Propagation.NESTED` |\n| `isolation` | `Isolation.DEFAULT`（底层资源的默认隔离级别） | `Isolation.DEFAULT\
  \ Isolation.READ_UNCOMMITTED Isolation.READ_COMMITTED Isolation.REPEATABLE_READ\
  \ Isolation.SERIALIZABLE` |\n| `timeout` | `TransactionDefinition.TIMEOUT_DEFAULT`（底层资源的默认事务超时时间，单位为秒）\
  \ | 大于零的整数值；表示超时的秒数 |\n| `readOnly` | `false` | `{true, false}` |\n| `rollbackFor`\
  \ | 事务将回滚的异常类 | 不适用 |\n| `rollbackForClassName` | 事务将回滚的异常类名称 | 不适用 |\n| `noRollbackFor`\
  \ | 事务不会回滚的异常类 | 不适用 |\n| `noRollbackForClassName` | 事务不会回滚的异常类名称 | 不适用 |\n| `value`\
  \ | `\"\"` | 指定事务的限定符值；可用于确定目标事务管理器，与特定 `transactionManager` bean 的限定符值（或 bean 名称）匹配\
  \ |\n\n因此，基于表 9-3，不带任何属性的 `@Transactional` 注解意味着事务传播模式为 required，隔离级别为底层数据存储的默认隔离级别，超时时间为底层事务系统的默认超时时间，并且模式为读写模式。\n\
  \n`@Transactional` 注解也可以应用于方法级别，这允许覆盖类级别的事务配置。例如，当事务实际上是只读时，使用 `@Transactional(readOnly\
  \ = true)`，这允许在运行时进行相应的优化。所有其他属性保持不变。\n\n![](img/315511_6_En_9_Figd_HTML.jpg)一个警告符号，在圆形背景上显示感叹号。 `readOnly`\
  \ 标志配置只是对底层持久化系统的一个提示，而 Hibernate 非常擅长接受提示，因此不要在设计用于更新现有条目的方法上使用 `readOnly = true`，否则你将不得不显式地刷新更改。\n\
