  #### 使用 `NamedParameterJdbcTemplate` 的命名参数


  在之前的示例中，作为 `jdbcTemplate.queryForObject(..)` 方法参数的 SQL 查询使用普通占位符（`?` 字符）作为查询参数，参数值通过
  varargs 传递：


  ```

  select CONCAT(first_name , '' '' , last_name) from SINGER where id = ?

  ```


  使用普通占位符时，顺序很重要，并且你将参数放入 varargs 的顺序应与查询中参数的顺序相同。


  一些开发者更喜欢使用命名参数来确保每个参数都能精确地按预期绑定。在 Spring 中，`JdbcTemplate` 类的一个扩展，称为 `NamedParameterJdbcTemplate`（位于
  `org.springframework.jdbc.core.namedparam` 包下），提供了对此的支持。


  `NamedParameterJdbcTemplate` Bean 的初始化与 `JdbcTemplate` Bean 相同。这意味着我们只需要声明一个 `NamedParameterJdbcTemplate`
  类型的 Bean，并将其注入到 DAO 类中。在清单 6-24 中，你可以看到与 `JdbcSingerDao` 等效的 `NamedTemplateDao`，它使用了
  `NamedParameterJdbcTemplate`。


  ```

  package com.apress.prospring6.six.named;

  import org.springframework.jdbc.core.namedparam.NamedParameterJdbcTemplate;

  // 其他导入语句已省略

  class NamedTemplateDao implements SingerDao {

  private NamedParameterJdbcTemplate namedTemplate;

  public void setNamedTemplate(NamedParameterJdbcTemplate namedTemplate) {

  this.namedTemplate = namedTemplate;

  }

  @Override

  public String findNameById(Long id) {

  return  namedTemplate.queryForObject( "select CONCAT(first_name , '' '' , last_name)
  from SINGER where id = :singerId"

  , Map.of("singerId", id), String.class);

  }

