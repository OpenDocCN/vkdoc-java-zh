- '# 12. 任务执行与调度


  任务调度是企业应用中的常见功能。任务调度主要由三部分组成：


  *   *任务*：需要在特定时间或定期运行的业务逻辑片段

  *   *触发器*：指定任务应被执行的条件

  *   *调度器*：根据触发器提供的信息执行任务


  具体来说，本章涵盖以下主题：


  *   *Java 中的任务执行*：我们简要讨论 Spring 的 `TaskExecutor` 接口以及任务是如何执行的。

  *   *Spring 中的任务调度*：我们讨论 Spring 如何支持任务调度，重点介绍 Spring 3 中引入的 `TaskScheduler` 抽象。我们还涵盖了调度场景，例如固定间隔调度和
  `cron` 表达式。

  *   *异步任务执行*：我们展示如何在 Spring 中使用 `@Async` 注解来异步执行任务。


  如果你是一位有一定经验的开发者，你可能已经了解执行线程的概念。一个 Java 应用由 JVM 可以在一个或多个线程上运行的代码来描述，其中一个线程是调用主类 `main(..)`
  方法的非守护线程。在 Java 中，用于建模执行线程的类是 `java.lang.Thread`。可以通过扩展此类并重写其 `run()` 方法来创建执行线程。生成的实例建模了一个执行线程，必须通过调用其
  `start()` 方法来显式启动它。


  然而，还有另一种创建线程的方法，即创建一个实现 `java.lang.Runnable` 的类。该接口为希望执行代码的对象（包括 `Thread` 类）提供了一个通用协议。这意味着可以创建
  `Runnable` 实例并将其传递给某些组件（称为*执行器*），这些组件会按照其配置的方式执行代码：顺序执行、并行执行，或使用线程池提供的线程。如果任务的概念还不明确，那么在
  Java 应用中，*任务*就是任何 `Runnable` 类型的实例。


  在 Java 中，`java.util.concurrent.Executor` 接口代表了异步任务执行的抽象。在 Spring 中，有一个扩展了该接口的接口，除了它被标注为
  `@FunctionalInterface` 以标记其为函数式接口外，两者基本相同：`org.springframework.core.task.TaskExecutor`。


  ![](img/315511_6_En_12_Figa_HTML.jpg)一个信息符号。 该接口对于 Spring 2.x 中与 JDK 1.4 的向后兼容性是必要的。


  Spring 的 `TaskExecutor` 接口如清单 12-1 所示。


  ```

  package org.springframework.core.task;

  import java.util.concurrent.Executor;

  @FunctionalInterface

  public interface TaskExecutor extends Executor {

  @Override

  void execute(Runnable task);

  }

  清单 12-1

  Spring 的 org.springframework.core.task.TaskExecutor 接口

  ```


  该接口只有一个方法 `execute(Runnable task)`，它根据线程池的语义和配置接受一个任务进行执行。Spring 提供了一些有用的 `TaskExecutor`
  实现。




  ## Java 中的任务执行


  在 Java 中，有相当多的 `java.util.concurrent.Executor` 实现。线程池在执行大量异步任务时具有性能优势，因为它们提供了一种在执行业务任务集合时对资源（包括线程）进行约束和管理的方法。`ThreadPoolExecutor`
  会维护基本统计数据，如活动任务数和已完成任务数，而我（Iuliana）最喜欢的实现之一是编写一个实现 `java.lang.Runnable` 的 `ThreadPoolMonitor`
  类，用于打印这些统计数据。


  本节介绍一个模拟各种排序算法的类层次结构，如图 12-1 所示。这些类适用于创建可由执行器异步执行的排序任务。


  ![](img/315511_6_En_12_Fig1_HTML.jpg)


  该层次结构图展示了类的建模过程。从归并排序、插入排序、堆排序、希尔排序、快速排序和冒泡排序开始，经过抽象排序类、整型排序任务类，最后到 Runnable 接口。


  图 12-1


  模拟各种排序算法的类层次结构


  这些排序算法的实现对于本章来说并不重要，但由 `ThreadPoolExecutor` 实例管理并并行运行它们才是关键。


  所有特定于任务执行的 Java 组件都可以在 `java.util.concurrent` 包下找到。`ThreadPoolExecutor` 类是 `ExecutorService`
  的一个实现，它使用一个或多个池化线程来执行每个提交的任务，并通过 `Executors` 工厂方法进行配置。线程池的大小及其最大容量作为参数传递给其构造函数。任务作为实现
  `BlockingQueue<Runnable>` 接口的类型的参数提供，该接口通过线程安全的方式避免同一任务被多次提交执行。它还支持在检索元素之前等待队列变为非空的操作，这使得在开始执行队列内容后仍可以向该列表添加任务。


  `ThreadPoolMonitor` 类是专门为本节编写的 `Thread` 的自定义扩展，用于打印正在运行的 `ThreadPoolExecutor` 的统计数据，其代码如清单
  12-2 所示。


  ```

  package com.apress.prospring6.twelve.classic;

  import org.slf4j.Logger;

  import org.slf4j.LoggerFactory;

  import java.util.concurrent.ThreadPoolExecutor;

  public class ThreadPoolMonitor implements Runnable {

  private static final Logger LOGGER = LoggerFactory.getLogger(ThreadPoolMonitor.class);

  protected ThreadPoolExecutor executor;

  protected int printInterval = 200;

  @Override

  public void run() {

  try {

  while (executor.getActiveCount() > 0) {

  monitorThreadPool();

  Thread.sleep(printInterval);

  }

  } catch (Exception e) {

  LOGGER.error(e.getMessage());

  }

  }

  private void monitorThreadPool() {

  String strBuff = "CurrentPoolSize : " + executor.getPoolSize() +

  " - CorePoolSize : " + executor.getCorePoolSize() +

  " - MaximumPoolSize : " + executor.getMaximumPoolSize() +

  " - ActiveTaskCount : " + executor.getActiveCount() +

  " - CompletedTaskCount : " + executor.getCompletedTaskCount() +

  " - TotalTaskCount : " + executor.getTaskCount() +

  " - isTerminated : " + executor.isTerminated();

  LOGGER.debug(strBuff);

  }

  public void setExecutor(ThreadPoolExecutor executor) {

  this.executor = executor;

  }

  }

  清单 12-2

  ThreadPoolMonitor 监控类

  ```


  请注意，`ThreadPoolMonitor` 类实现了 `Runnable`，这使其本身也成为一个任务。`ThreadPoolMonitor` 实例可以作为独立于
  `ThreadPoolExecutor` 管理的排序任务而执行的线程启动。


  清单 12-3 展示了 `ClassicDemo` 类，该类生成一个包含 100,000 个元素、值介于 0 到 500,000 之间的数组，并将其交给图 12-1
  中的任务进行并行排序。这些任务由 `ThreadPoolExecutor` 实例管理和执行，并由 `ThreadPoolMonitor` 实例进行监控。


  ```

  package com.apress.prospring6.twelve.classic;

  import java.util.List;

  import java.util.Random;

  import java.util.concurrent.LinkedBlockingQueue;

  import java.util.concurrent.ThreadPoolExecutor;

  import java.util.concurrent.TimeUnit;

  public class ClassicDemo {

  public static void main(String... args) {

  int[] arr = new Random().ints(100_000, 0, 500_000).toArray(); // (1)

  // LOGGER.info("Starting Array: {} " , Arrays.toString(arr));

  var algsMonitor = new ThreadPoolMonitor(); // (2)

  var monitor = new Thread(algsMonitor);

  var executor = new ThreadPoolExecutor(2, 4, 0L, TimeUnit.MILLISECONDS, new LinkedBlockingQueue());
  // (3)

  algsMonitor.setExecutor(executor);

  List.of(new BubbleSort(arr), // (4)

  new InsertionSort(arr),

  new HeapSort(arr),

  new MergeSort(arr),

  new QuickSort(arr),

  new ShellSort(arr))

  .forEach(executor::execute);

  monitor.start(); // (5)

  executor.shutdown();

  try {

  executor.awaitTermination(30, TimeUnit.MINUTES);

  } catch (InterruptedException e) {

  throw new RuntimeException(e);

  }

  }

  }

  清单 12-3

  ClassicDemo 监控类

  ```


  代码已使用空行分成多个部分。各部分用数字标记。每个部分负责以下内容：


  *   1\. 代码的第一部分创建数组。如果你想打印数组以检查其值，请随意取消日志行的注释。


  *   2\. 第二部分创建 `ThreadPoolMonitor` 实例（`algsMonitor`）和将执行它的 `Thread`（`monitor`）。


  *   3\. 第三部分创建 `ThreadPoolExecutor`（`executor`）。请注意，在初始化 `ThreadPoolExecutor` 时，我们将初始池大小保持为
  2，最大池大小保持为 4。`algsMonitor` 被配置为监控 `executor`。


  *   4\. 第四部分创建任务并提交它们以供执行。


  *   5\. 第五部分启动 `monitor` 线程。然后关闭 `executor`，导致所有已提交任务完成执行并终止线程池。


