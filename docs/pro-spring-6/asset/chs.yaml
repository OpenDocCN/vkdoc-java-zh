  ### 使用 JDBC 的注意事项


  凭借这些丰富的特性，你可以看到在使用 JDBC 与底层 RDBMS 交互时，Spring 如何让开发变得更加轻松。然而，仍然需要编写大量代码，尤其是在将结果集转换为相应的领域对象时。


  在 JDBC 之上，已经开发了许多开源库来帮助弥合关系数据结构与 Java 面向对象模型之间的差距。例如，iBATIS 是一个流行的 DataMapper 框架，它也基于
  SQL 映射。iBATIS 允许你将对象与存储过程或查询映射到 XML 描述符文件。与 Spring 一样，iBATIS 提供了一种声明式的方式来查询对象映射，极大地节省了维护可能分散在各个
  DAO 类中的 SQL 查询所需的时间。还有许多其他专注于对象模型而非查询的 ORM 框架。流行的包括 Hibernate、EclipseLink（也称为 TopLink）和
  OpenJPA。它们都符合 JCP 的 JPA 规范。


  近年来，这些 ORM 工具和映射框架已经变得非常成熟，以至于大多数开发者会选择其中之一，而不是直接使用 JDBC。然而，在出于性能原因需要对提交给数据库的查询进行绝对控制的情况下（例如，在
  Oracle 中使用层次查询），Spring JDBC 确实是一个可行的选择。而且，使用 Spring 的一大优势是你可以混合搭配不同的数据访问技术。例如，你可以将
  Hibernate 作为主要 ORM，然后将 JDBC 作为某些复杂查询逻辑或批量操作的补充；你可以在单个业务操作中混合搭配它们，然后将它们包装在同一个数据库事务下。Spring
  将帮助你轻松处理这些情况。




  ### Spring Boot JDBC


  既然我们已经介绍了用于简单控制台应用的 Spring Boot，那么在本章中介绍一个用于 JDBC 的 Spring Boot 起步依赖库也是顺理成章的。它可以帮助你移除样板配置，直接进入实现环节。


  当 `spring-boot-starter-jdbc` 作为依赖项添加到项目中时，一组库会被添加到项目的类路径中。但数据库驱动并不会被添加进来。这个决定必须由开发者做出。在本例中，`mysql-java-client`
  被添加为依赖项，就像非 Spring Boot 项目一样。同样，为了运行测试，必须显式配置 `h2` 库。本节将介绍的项目是 `chapter06-boot`。自动配置的库如图
  6-7 所示，该图位于 IntelliJ IDEA 的 Gradle 项目视图中。


  ![](img/315511_6_En_6_Fig7_HTML.jpg)


  一张截图展示了 chapter 06 boot、compile classpath 以及 o r g dot spring framework dot boot
  colon spring boot starter j d b c colon 3 dot 0 dot 0 hyphen M 2 下的内容。


  图 6-7


  Spring Boot JDBC 起步依赖


  `spring-boot-starter-jdbc` 库使用 `HikariCP`^(⁵⁵) 来配置 `DataSource` bean，这是一个快速、可靠且简单的、可用于生产环境的连接池库。因此，如果没有显式配置
  `DataSource` bean，并且类路径中存在嵌入式数据库驱动，Spring Boot 将自动使用内存数据库设置来注册 `DataSource` bean。Spring
  Boot 还会自动注册以下 bean：


  *   一个 `JdbcTemplate` bean

  *   一个 `NamedParameterJdbcTemplate` bean

  *   一个 `PlatformTransactionManager`（`DataSourceTransactionManager`）bean


  `PlatformTransactionManager` bean 目前不相关，因为它将在**第** **7** 章中介绍。前两个 bean 是相关的，因为在本章中，当未使用
  Spring Boot 时，我们手动配置了它们。使用 Spring Boot 后，就不再需要手动配置了。


  另一个值得注意的有趣之处是，为了确保在运行应用时使用 MariaDB 数据源，而在测试时使用 H2 数据源，这里使用了两个应用配置文件：`"dev"` 和 `"test"`。


  以下是一些可能有助于减少环境设置工作量的其他事项：


  *   Spring Boot 数据库连接详情在 `application-{profileName}.properties`/`application-{profileName}.yaml`
  文件中配置，该文件位于 `src/main/resources` 下。清单 6-59 展示了本章推荐的本地容器化 MariaDB 数据库的配置，以及用于测试的内存
  H2 配置。

  *   Spring Boot 会在 `src/main/resources` 下查找嵌入式数据库初始化文件。它期望找到一个包含 SQL DDL 语句（例如 `CREATE
  TABLE` 语句）的 `schema.sql` 文件，以及一个包含 DML 语句（例如 `INSERT` 语句）的 `data.sql` 文件。它使用这些文件在启动时初始化数据库。

  *   这些文件的位置和名称可以在同样位于 `src/main/resources` 下的 `application.properties`/`application.yaml`
  文件中配置。清单 6-60 展示了一个允许 Spring Boot 应用使用 SQL 文件的示例配置文件。


  ```

  # application-dev.yaml

  spring:

  datasource:

  driverClassName: org.mariadb.jdbc.Driver

  url: jdbc:mariadb://localhost:3306/musicdb?useSSL=false

  username: prospring6

  password: prospring6

  # application-test.yaml

  spring:

  datasource:

  url: "jdbc:h2:mem:mydb"

  username: "sa"

  清单 6-59

  Spring Boot 应用的 MariaDB 和 H2 数据库连接详情

  ```


  *   默认情况下，Spring Boot 在启动时初始化数据库（除非数据库已存在），但也可以通过向 `application-{profileName}.properties`/`application-{profileName}.yaml`
  文件添加属性 `spring.datasource.initialize=false` 来更改此行为。


  ```

  # application-{profileName}.properties

  spring.datasource.schema=db/schema.sql

  spring.datasource.data=db/test-data.sql

  # application-{profileName}.yml

  spring:

  datasource:

  schema: db/schema.sql

  data: db/test-data.sql

  清单 6-60

  Spring Boot 数据库初始化配置

  ```


  除了上述所有内容，使用 Spring Boot 还需要提供一些领域类和一个 DAO bean。如前所述，Spring Boot 会自动配置一个 `JdbcTemplate`
  bean，因此我们需要做的就是创建一个简单的 `SingerJdbcRepo`，将这个 bean 注入其中，并使用它来管理数据。至于领域类，本章前面介绍的 `Signer`
  和 `Album` 记录就足够了。清单 6-61 展示了一个简单的 `SingerRepo` 接口及其实现 `SingerJdbcRepo`。


  ```

  // SingerDao.java

  package com.apress.prospring6.six.repo;

  import com.apress.prospring6.six.records.Singer;

  import java.util.stream.Stream;

  public interface SingerRepo {

  Stream findAll();

  }

  // SingerJdbcRepo.java

  package com.apress.prospring6.six.repo;

  import com.apress.prospring6.six.records.Singer;

  import org.springframework.jdbc.core.JdbcTemplate;

  import java.util.List;

  import java.util.stream.Stream;

  // 其他 import 语句已省略

  @Repository("singerRepo")

  public class SingerJdbcRepo implements SingerRepo {

  private static final Logger LOGGER = LoggerFactory.getLogger(SingerJdbcRepo.class);

  public static final String ALL_SELECT = "select * from SINGER";

  private JdbcTemplate jdbcTemplate;

  @Autowired

  public void setJdbcTemplate(JdbcTemplate jdbcTemplate) {

  this.jdbcTemplate = jdbcTemplate;

  }

  @Override

  public Stream findAll() {

  return jdbcTemplate.queryForStream(ALL_SELECT, (rs, rowNum) ->

  new Singer(rs.getLong("id"),

  rs.getString("first_name"),

  rs.getString("last_name"),

  rs.getDate("birth_date"),

  List.of()));

  }

  }

