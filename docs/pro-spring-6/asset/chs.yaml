  ## 理解代理


  到目前为止，我们仅粗略地了解了由 `ProxyFactory` 生成的代理。我们提到 Spring 中有两种类型的代理：使用 JDK `Proxy` 类创建的
  JDK 代理，以及使用 CGLIB `Enhancer` 类创建的基于 CGLIB 的代理。你可能想知道这两种代理之间究竟有什么区别，以及为什么 Spring
  需要两种类型的代理。在本节中，我们将详细探讨代理之间的差异。


  代理的核心目标是拦截方法调用，并在必要时执行适用于特定方法的通知链。通知的管理和调用在很大程度上与代理无关，由 Spring AOP 框架管理。然而，代理负责拦截对所有方法的调用，并根据需要将它们传递给
  AOP 框架以应用通知。


  除了这个核心功能之外，代理还必须支持一组附加功能。可以配置代理通过 `AopContext` 类（这是一个抽象类）暴露自身，以便你可以检索代理并从目标对象调用代理上的通知方法。代理负责确保当通过
  `ProxyFactory.setExposeProxy()` 启用此选项时，代理类被适当地暴露。此外，所有代理类默认实现 `Advised` 接口，这允许在创建代理后更改通知链等操作。代理还必须确保任何返回
  `this`（即返回被代理的目标）的方法都返回代理本身，而不是目标。


  如你所见，一个典型的代理需要执行相当多的工作，所有这些逻辑都在 JDK 和 CGLIB 代理中实现。


  ### 使用 JDK 动态代理


  **JDK 代理**是 Spring 中最基本的代理类型。与 CGLIB 代理不同，JDK 代理只能生成接口的代理，而不能生成类的代理。因此，任何你想要代理的对象必须至少实现一个接口，并且生成的代理将是一个实现该接口的对象。图
  5-4 展示了此类代理的抽象模式。


  ![](img/315511_6_En_5_Fig4_HTML.jpg)


  一个框图展示了调用 bean 调用 J D K 代理方法，该方法进一步调用目标 bean 方法，并实现实现目标 bean 方法的接口方法。


  图 5-4


  JDK 代理抽象模式


  通常，为你的类使用接口是一种良好的设计，但这并不总是可行的，尤其是在处理第三方或遗留代码时。在这种情况下，你必须使用 CGLIB 代理。当你使用 JDK 代理时，所有方法调用都会被
  JVM 拦截并路由到代理的 `invoke()` 方法。然后，该方法确定所讨论的方法是否被通知（根据切入点定义的规则），如果是，则调用通知链，然后通过反射调用方法本身。除此之外，`invoke()`
  方法还执行了上一节讨论的所有逻辑。


  JDK 代理在进入 `invoke()` 方法之前，不会区分被通知和未被通知的方法。这意味着，对于代理上未被通知的方法，`invoke()` 方法仍然会被调用，所有检查仍然会执行，并且该方法仍然通过反射被调用。显然，这会在每次调用方法时产生运行时开销，即使代理除了通过反射调用未被通知的方法外，通常不执行任何额外的处理。


  你可以通过使用 `setInterfaces()`（在 `ProxyFactory` 类间接扩展的 `AdvisedSupport` 类中）指定要代理的接口列表，来指示
  `ProxyFactory` 使用 JDK 代理。




  ### 使用 CGLIB 代理


  使用 JDK 代理时，每次调用方法时，所有关于如何处理特定方法调用的决策都在运行时进行。而使用 CGLIB 时，CGLIB 会为每个代理动态生成新类的字节码，并尽可能复用已生成的类。在这种情况下，生成的代理类型将是目标对象类的子类。图
  5-5 展示了此类代理的抽象模式。


  ![](img/315511_6_En_5_Fig5_HTML.jpg)


  一个框图展示了调用 bean 会调用 CGLIB 代理方法，该方法进一步调用目标 bean 方法，并扩展至目标 bean 方法。


  图 5-5


  CGLIB 代理抽象模式


  首次创建 CGLIB 代理时，CGLIB 会询问 Spring 希望如何处理每个方法。这意味着，在 JDK 代理上每次调用 `invoke()` 时执行的许多决策，对于
  CGLIB 代理只需执行一次。由于 CGLIB 生成的是实际字节码，因此在处理方法的方式上具有更大的灵活性。例如，CGLIB 代理会生成适当的字节码来直接调用任何未通知的方法，从而减少代理引入的开销。此外，CGLIB
  代理会判断方法是否可能返回 `this`；如果不可能，它允许直接调用该方法，从而再次减少运行时开销。


  CGLIB 代理处理固定通知链的方式也与 JDK 代理不同。*固定通知链*是指你保证在代理生成后不会更改的通知链。默认情况下，即使在代理创建后，你仍然可以更改代理上的通知器和通知，尽管这很少是必需的操作。CGLIB
  代理以特定方式处理固定通知链，从而减少执行通知链时的运行时开销。


  ![](img/315511_6_En_5_Fige_HTML.jpg)警告。 使用 CGLIB 代理时存在一些限制：


  1.  显而易见，无法为 final 类创建 CGLIB 代理（因为它们无法被继承）。

  2.  由于静态成员属于类而非实例，因此它们无法被代理。

  3.  私有方法也无法被代理，因为子类无法访问它们。


  ### 比较代理性能


  到目前为止，我们仅粗略讨论了代理类型在实现上的差异。在本节中，我们将运行一个简单的测试来比较 CGLIB 代理与 JDK 代理的性能。为此，我们需要最简单的 bean
  及其接口，其中包含空操作方法和一个空操作的前置通知。


  该 bean 名为 `DefaultSimpleBean`，并实现了 `SimpleBean` 接口。它实现了接口声明的两个方法，恰当地命名为 `advised`
  和 `unadvised`，如清单 5-25 所示。


  ```

