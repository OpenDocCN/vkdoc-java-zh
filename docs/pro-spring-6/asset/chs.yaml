  ```


  请注意，无需使用 `@DynamicPropertySource` 为 `spring.datasource.*` 属性组注册动态属性。在 `Chapter6ApplicationV2Test`
  中，用于初始化数据库的脚本是通过 `@Sql` 注解在测试类上配置的，但测试脚本也可以通过 `spring.datasource.url` 值中的 `TC_INITSCRIPT`
  变量进行配置。因此，在 `application-testcontainers.yaml` 配置文件中，`spring.datasource.url` 属性可以设置为以下内容：


  ```

  jdbc:tc:mariadb:10.7.4-focal:///testdb?TC_INITSCRIPT=testcontainers/create-schema.sql

  ```


  此外，可以从 `Chapter6ApplicationV2Test` 类中移除 `@Sql` 注解，测试仍然会通过，因为 Testcontainers 会在类路径上查找该初始化脚本。你也可以使用
  `file:` 指向相对于工作目录（通常是项目根目录）的位置。


  我们鼓励你进一步了解 Testcontainers；它提供了一种非常实用的方式来编写集成测试，这些测试在与生产环境非常相似的设置上运行，并证明所编写的代码在生产环境中也能产生预期的结果。在本书中，只要运行测试需要数据库，都推荐使用
  Testcontainers。


  ## 总结


  本章展示了如何使用 Spring 来简化 JDBC 编程。你学习了如何连接数据库，执行查询、更新、删除和插入操作，以及调用数据库存储函数。在生产环境中，很少需要使用
  `DataSource` Bean 或 `JdbcTemplate`。只有在需要执行非常复杂的查询、存储过程或函数时，才可能需要用到它们。无论如何，我们介绍了
  `JdbcTemplate` 以及其他基于 `JdbcTemplate` 构建的 Spring 类，这些类有助于你建模各种 JDBC 操作。我们还展示了如何在适当的地方使用
  Java 8 新增的 lambda 表达式。此外，由于代码是由人编写的，而人非圣贤，孰能无过，因此我们还向你展示了如何在 Spring Classic 和 Spring
  Boot 应用程序中测试 JDBC 代码。


  此外，我们还介绍了 Spring Boot JDBC，因为任何能帮助你更专注于应用程序业务逻辑的实现、减少对配置关注度的工具，都是值得了解的好工具。在接下来的几章中，我们将讨论在开发数据访问逻辑时，如何将
  Spring 与流行的 ORM 技术结合使用，以及如何与 NoSQL 数据库进行交互。


