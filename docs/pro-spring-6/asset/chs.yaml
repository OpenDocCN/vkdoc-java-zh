  ### 选择要使用的代理


  决定使用哪种代理通常很简单。CGLIB 代理可以代理类和接口，而 JDK 代理只能代理接口。在性能方面，JDK 和 CGLIB 标准模式之间没有显著差异（至少在运行
  advised 和 unadvised 方法时如此），除非你在冻结模式下使用 CGLIB，在这种情况下通知链无法更改，并且 CGLIB 在冻结模式下会执行进一步的优化。当代理一个类时，CGLIB
  代理是默认选择，因为它是唯一能够生成类代理的代理。要在代理接口时使用 CGLIB 代理，必须通过使用 `setOptimize()` 方法将 `ProxyFactory`
  中的 `optimize` 标志设置为 `true`。


  ## 切面的高级用法


  在本章前面，我们介绍了 Spring 提供的六个基本 `Pointcut` 实现；在大多数情况下，我们发现它们能够满足我们应用程序的需求。然而，有时在定义切面时你可能需要更多的灵活性。Spring
  提供了另外两个 Pointcut 实现，`ComposablePointcut` 和 `ControlFlowPointcut`，它们正好提供了你所需的灵活性。


  ### 使用控制流切面


  Spring 的控制流切面由 `ControlFlowPointcut` 类实现，类似于许多其他 AOP 实现中可用的 `cflow` 构造，尽管它们没有那么强大。本质上，Spring
  中的控制流切面适用于给定方法之下或类中所有方法之下的所有方法调用。这很难直观理解，最好通过一个例子来解释。


  清单 5-29 展示了一个 `SimpleBeforeAdvice` 类，它输出一条描述其正在通知的方法的消息。


  ```

  package com.apress.prospring6.five.advanced;

  import org.springframework.aop.MethodBeforeAdvice;

  import java.lang.reflect.Method;

  //other import statements omitted

  public class SimpleBeforeAdvice implements MethodBeforeAdvice {

  private static Logger LOGGER = LoggerFactory.getLogger(SimpleBeforeAdvice.class);

  @Override

  public void before(Method method, Object[] args, Object target) throws Throwable
  {

  LOGGER.info("Before method: {}", method);

  }

  }

