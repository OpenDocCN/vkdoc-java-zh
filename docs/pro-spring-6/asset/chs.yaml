  ### Spring Data 项目：JDBC 扩展


  近年来，随着众多专用数据库的兴起，数据库技术发展迅速。如今，关系型数据库管理系统（RDBMS）已不再是应用程序后端数据库的唯一选择。为了应对这种数据库技术的演进以及开发者社区的需求，Spring
  创建了 Spring Data 项目^(⁵⁰)。该项目的主要目标是在 Spring 核心数据访问功能之上提供有用的扩展，以便与传统 RDBMS 之外的数据库进行交互。


  Spring Data 项目提供了多种扩展。我们在此介绍的是 JDBC 扩展^(⁵¹)。顾名思义，该扩展提供了一些高级特性，以简化使用 Spring 开发 JDBC
  应用程序的过程。JDBC 扩展提供的主要功能如下：


  *   *QueryDSL 支持*：QueryDSL^(⁵²) 是一种领域特定语言，它提供了一个用于开发类型安全查询的框架。Spring Data 的 JDBC
  扩展提供了 `QueryDslJdbcTemplate`，以便于使用 `QueryDSL` 而非 SQL 语句来开发 JDBC 应用程序。


  *   *对 Oracle 数据库的高级支持*：该扩展为 Oracle 数据库用户提供了高级特性。在数据库连接方面，它支持 Oracle 特定的会话设置，以及在使用
  Oracle RAC 时的快速连接故障转移技术。它还提供了与 Oracle 高级队列集成的类。在数据类型方面，它为 Oracle 的 XML 类型、`STRUCT`
  和 `ARRAY` 等提供了原生支持。


  如果你正在使用 Spring 和 Oracle 数据库开发 JDBC 应用程序，那么 JDBC 扩展确实值得一看。


  ### Spring JDBC 测试注解


  在**第** **4** **章**中，你已经了解了一些测试注解。其中一些注解显然与数据访问上下文相关。`@Sql`、`@SqlConfig`、`@SqlGroup`
  和 `@SqlMergeMode` 属于 `org.springframework.test.context.jdbc` 包，适用于测试纯 Spring JDBC
  实现。在本章中，所有测试方法都设计为构建自己的应用程序上下文，以保持配置清晰。所有使用内存数据库的测试方法都可以编写为共享相同的测试上下文，并使用这些专门的注解为每个测试方法进行定制。


  让我们从 `@Sql` 开始。此注解用于标注测试类或测试方法，以配置在集成测试期间针对给定数据库执行的 SQL 脚本和语句。此注解可以与纯 JDBC 一起使用，也可以与使用持久化或事务的更复杂应用程序一起使用。`@Sql`
  可用于测试类，这意味着使用它配置的语句或脚本将应用于该类中的每个测试方法。清单 6-54 展示了一个测试类，其中包含一个针对 `findAll()` 方法的测试方法。


  ```

  package com.apress.prospring6.six.repo;

  import org.junit.jupiter.api.DisplayName;

  import org.junit.jupiter.api.Test;

  import org.springframework.jdbc.datasource.embedded.EmbeddedDatabaseBuilder;

  import org.springframework.jdbc.datasource.embedded.EmbeddedDatabaseType;

  import org.springframework.test.context.jdbc.Sql;

  import org.springframework.test.context.jdbc.SqlMergeMode;

  import org.springframework.test.context.junit.jupiter.SpringJUnitConfig;

  // 其他导入已省略

  @SqlMergeMode(SqlMergeMode.MergeMode.MERGE)

  @Sql({ "classpath:h2/drop-schema.sql", "classpath:h2/create-schema.sql" })

  @SpringJUnitConfig(classes = {JdbcRepoTest.EmptyEmbeddedJdbcConfig.class, SingerJdbcRepo.class})

  public class JdbcRepoTest {

  private static final Logger LOGGER = LoggerFactory.getLogger(RepoBeanTest.class);

  @Autowired

  SingerDao singerRepo;

  @Test

  @DisplayName("应返回所有歌手")

  @Sql(value = "classpath:h2/test-data.sql")

  void testFindAllWithMappingSqlQuery(){

  var singers = singerRepo.findAll();

  assertEquals(3, singers.size());

  singers.forEach(singer -> LOGGER.info(singer.toString()));

  }

  @Configuration

  public static class EmptyEmbeddedJdbcConfig {

  private static final Logger LOGGER = LoggerFactory.getLogger(EmptyEmbeddedJdbcConfig.class);

  @Bean

  public DataSource dataSource() {

  try {

  var dbBuilder = new EmbeddedDatabaseBuilder();

  return dbBuilder.setType(EmbeddedDatabaseType.H2).setName("musicdb").build();

  } catch (Exception e) {

  LOGGER.error("无法创建嵌入式数据源 Bean！", e);

  return null;

  }

  }

  }

  }

  清单 6-54

  使用 @Sql* 注解的 JdbcRepoTest 类

  ```


  测试 `ApplicationContext` 是使用 `@SpringJUnitJupiterConfig` 注解创建的。这是一个组合注解，它将 JUnit
  Jupiter 的 `@ExtendWith(SpringExtension.class)` 与 Spring TestContext 框架的 `@ContextConfiguration`
  结合在一起。出于实际原因，`EmptyEmbeddedJdbcConfig` 配置类在测试类主体中被声明为静态的：它很小，并且仅与此测试类相关。生成的测试 `ApplicationContext`
  包含一些 Bean，这些 Bean 定义了一个指向名为 `musicdb` 的空内存 H2 数据库的数据源。由于测试类针对的是 `SingerJdbcRepo`
  Bean 的方法，因此该类也被添加到上下文中。


  包含 `SINGER` 和 `ALBUM` 表的数据库模式是通过使用以下注解标注测试类来初始化的：`@Sql({ "classpath:h2/drop-schema.sql",
  "classpath:h2/create-schema.sql" })`。这两个脚本包含的 SQL 代码的功能正如其名称所示——销毁并创建数据库模式中的表。




  注解 `@Sql(value = "classpath:h2/test-data.sql")` 用于标注测试方法，默认在测试方法执行前运行，以准备测试所需的数据库内容。如果找不到任何歌手，执行
  `findAll()` 方法就没有意义了，对吧？


  这个注解功能非常强大，可以通过 `@SqlConfigure` 进行配置，以提供关于所执行脚本的更多细节，例如编码、用作语句分隔符的字符、用作注释前缀的字符等等。`@Sql`
  还提供了一个 `executionPhase` 属性，用于指定脚本或语句应在测试方法之前还是之后执行，这对于清理上下文、避免污染环境以及防止其他测试失败非常有用。


  这意味着 `testFindAllWithMappingSqlQuery()` 测试方法上的注解也可以写成如下形式：


  ```

  @Sql(value = "classpath:h2/test-data.sql",

  config = @SqlConfig(encoding = "utf-8", separator = ";", commentPrefix = "--"),

  executionPhase = Sql.ExecutionPhase.BEFORE_TEST_METHOD)

  ```


  `@SqlMergeMode(SqlMergeMode.MergeMode.MERGE)` 注解表示方法级别的 `@Sql` 声明应与类级别的 `@Sql` 声明合并，类级别的
  SQL 脚本和语句会在方法级别的脚本和语句之前执行。另一种选择是使用 `@SqlMergeMode(SqlMergeMode.MergeMode.OVERRIDE)`，它允许方法上的
  `@Sql` 声明注解覆盖类级别的注解。


  当在类级别使用 `@Sql` 注解，且未指定 `@SqlMergeMode` 时，由它们配置的声明将被忽略，这几乎肯定会导致测试失败。


  如前所述，`@Sql` 不仅可以指定脚本，还可以指定语句。清单 6-55 展示了 `testFindByNameWithMappingSqlQuery()` 方法，用于验证
  `findByFirstName(..)` 方法是否按预期工作。


  ```

  package com.apress.prospring6.six.repo;

  import org.springframework.test.context.jdbc.SqlGroup;

  // 其他导入语句已省略

  @SqlMergeMode(SqlMergeMode.MergeMode.MERGE)

  @Sql({ "classpath:h2/drop-schema.sql", "classpath:h2/create-schema.sql" })

  @SpringJUnitConfig(classes = {JdbcRepoTest.EmptyEmbeddedJdbcConfig.class, SingerJdbcRepo.class})

  public class JdbcRepoTest {

  @Test

  @DisplayName("应返回 Chuck Berry")

  @SqlGroup({

  @Sql(statements = "insert into SINGER (first_name, last_name, birth_date) values
  (''Chuck'', ''Berry'', ''1926-09-18'')",

  executionPhase = Sql.ExecutionPhase.BEFORE_TEST_METHOD),

  @Sql(statements = "delete from  SINGER where first_name = ''Chuck''",

  executionPhase = Sql.ExecutionPhase.AFTER_TEST_METHOD)

  })

  public void testFindByNameWithMappingSqlQuery() {

  var singers = singerRepo.findByFirstName("Chuck");

  assertEquals(1, singers.size());

  LOGGER.info("Result: {}", singers.get(0));

  }

  // 其他代码已省略

  }

  清单 6-55

  JdbcRepoTest.testFindByNameWithMappingSqlQuery() 测试方法

  ```


  清单 6-55 展示了如何使用 `@SqlGroup` 注解对 `@Sql` 注解进行分组。允许在同一个测试方法（或类）上使用多个 `@Sql` 注解，但 `@SqlGroup`
  是一种更优雅的分组方式，可以清晰地表明它们都与所标注的项目相关。对于同一个方法，请注意如何使用 `executionPhase` 属性来插入测试方法所针对的项目：将其中一个
  `@Sql` 注解的 `executionPhase` 设置为 `Sql.ExecutionPhase.BEFORE_TEST_METHOD`。对于另一个注解，`executionPhase`
  设置为 `Sql.ExecutionPhase.AFTER_TEST_METHOD`，以便从数据库中删除该项目。这确保了测试上下文保持干净，并且测试类中的方法可以按任意顺序运行，并且仍然能通过测试。


