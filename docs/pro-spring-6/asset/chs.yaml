  请注意，队列名称是通过 `@Value("${spring.artemis.embedded.queues}")` 从 Spring Boot 配置文件中提取的。


  `Receiver` 则更为简单，如清单 13-19 所示。


  ```

  package com.apress.prospring6.thirteen;

  import org.springframework.jms.annotation.JmsListener;

  // 其他导入语句已省略

  @Component

  @Slf4j

  public class Receiver {

  @JmsListener(destination = "${spring.artemis.embedded.queues}")

  public void receive(Letter letter) {

  log.info(" >> 收到信件=''{}''", letter);

  }

  }

  清单 13-19

  JMS 消费者，Receiver 类

  ```


  此 Bean 声明中最重要的是使用 `@JmsListener` 注解的方法。该注解将方法标记为指定目标上 JMS 消息监听器的目标。此注解还可以使用 `connectionFactory`
  属性指定自定义的 JMS `ConnectionFactory`。如果不指定，它将使用 Spring Boot 配置的默认 `ConnectionFactory`。


  处理 `@JmsListener` 是 `org.springframework.jms.annotation.JmsListenerAnnotationBeanPostProcessor`
  Bean 的职责，该 Bean 由 Spring Boot 自动配置。如果没有 Spring Boot 来配置此 Bean，则需要将 `@EnableJms`
  注解（来自 `org.springframework.jms.annotation` 包）放置在配置类上。


