  请注意 `@EnableAspectJAutoProxy` 注解。此注解启用对标记有 AspectJ 的 `@Aspect` 注解的组件的支持，并且设计用于标注了
  `@Configuration` 注解的类。它还有一个名为 `proxyTargetClass` 的属性。当设置为 `true` 时，表示将创建基于子类（CGLIB）的代理，而不是标准的基于
  Java 接口的代理。在此示例中，需要 CGLIB 代理，因为即使 `GrammyGuitarist` 实现了 `Singer` 接口，并且默认情况下基于接口的
  JDK 动态代理应该是合适的，但 `NewDocumentarist` 严格要求依赖项的类型为 `GrammyGuitarist` 或其扩展。因此，我们需要一个扩展了
  `GrammyGuitarist` 的代理。如果没有 `proxyTargetClass = true` 属性，在尝试使用此配置启动 Spring 应用程序时，将抛出以下异常：


  ```

