  用于提交请求的 `RestTemplate` 类功能相当强大，但如前所述，它已被标记为弃用。未来似乎是响应式的，`WebClient` 和新的声明式 HTTP
  接口是其替代品。


  从 Spring 6 和 Spring Boot 3 开始，Spring 框架支持将远程 HTTP 服务代理为一个 Java 接口，该接口带有用于 HTTP 交换的注解方法，也称为*声明式
  HTTP 接口*^(¹¹⁵)。声明式 HTTP 接口是一个 Java 接口，有助于减少样板代码，生成实现此接口的代理，并在框架层面执行交换。




  ## 在 Spring 中使用 JMS


  使用面向消息的中间件（通常称为消息队列（MQ）服务器）是支持应用程序间通信的另一种流行方式。MQ 服务器的主要优势在于它为应用程序集成提供了一种异步且松耦合的方式。在
  Java 世界中，JMS 是连接 MQ 服务器以发送或接收消息的标准。MQ 服务器维护一个队列和主题列表，供应用程序连接以发送和接收消息。以下是对队列和主题之间差异的简要说明：


  *   *队列*：队列用于支持点对点消息交换模型。当生产者向队列发送消息时，MQ 服务器将消息保留在队列中，并在消费者下次连接时将其传递给一个（且仅一个）消费者。


  *   *主题*：主题用于支持发布-订阅模型。任意数量的客户端都可以订阅主题内的消息。当该主题有消息到达时，MQ 服务器会将其传递给所有已订阅该消息的客户端。当有多个应用程序对同一信息（例如，新闻推送）感兴趣时，此模型特别有用。


  在 JMS 中，生产者连接到 MQ 服务器并将消息发送到队列或主题。消费者也连接到 MQ 服务器，并监听队列或主题以获取感兴趣的消息。在 JMS 1.1 中，API
  得到了统一，因此生产者和消费者无需处理与队列和主题交互的不同 API。从 Spring Framework 5 开始，Spring 的 JMS 包完全支持 JMS
  2.0，并要求运行时存在 JMS 2.0 API。因此，需要一个兼容 JMS 2.0 的提供者。从 Spring 6 开始，使用的 JMS API 规范是 Jakarta
  Messaging API 3.x 版本，因为 JMS API 是 Oracle 外包的 Java EE 产品之一。


  本章演示如何使用 Apache ActiveMQ Artemis^(¹¹⁶)，它有一个兼容 Jakarta JMS 的版本，并且有一个对应的 Spring Boot
  starter，这将使事情变得简单得多。


  Spring 中 JMS 通信的核心是 `JmsTemplate`，它简化了发送和接收同步消息时资源的创建和释放。为方便起见，`JmsTemplate` 还公开了一个基本的请求-回复操作，允许发送消息并等待响应。`JmsTemplate`
  类似于 `RestTemplate`；它们都用于应用程序之间的远程通信，并且都公开了供开发人员使用的实用 API。两种类型的实例一旦配置完成就是线程安全的，因此应用程序中只需要一个
  `JmsTemplate` bean，并且可以在任何需要的地方注入它。


  ### 使用 Apache ActiveMQ Artemis


  使用 Spring Boot 使 JMS 应用程序的开发更加实用，因为当它在类路径上检测到 ActiveMQ Artemis 时，它会自动配置一个 `jakarta.jms.ConnectionFactory`
  bean。


  清单 13-16 展示了用于原生使用（本地或远程，通过 IP 引用）ActiveMQ Artemis 服务器的 `application.yaml` 配置文件示例。


  ```

  spring:

  artemis:

  mode: native

  host: IP_ADDRESS

  port: 61617

  user: prospring6

  password:prospring6

  '
- '# 或者

  spring:

  artemis:

  mode: native

  broker-url: tcp://${IP_ADDRESS}:61617

  user: prospring6

  password:prospring6

  清单 13-16

  用于原生使用 ActiveMQ Artemis 服务器的 application.yaml 配置

  ```


  从 Spring Boot 3.x 开始，属性 `spring.artemis.host` 和 `spring.artemis.port` 已被标记为弃用，建议使用
  `spring.artemis.broker-url`。


  安装 ActiveMQ Artemis 并非本书的重点，因此对于代码示例，将使用嵌入式版本。要在 Spring Boot 应用程序中使用嵌入式 ActiveMQ
  Artemis，需要三样东西：类路径上的 `spring-boot-starter-artemis`、类路径上的 `artemis-jakarta-server`
  以及 Spring Boot 嵌入式配置。图 13-4 显示了本节特定项目 `chapter13-artemis-boot` 的所有依赖项。


