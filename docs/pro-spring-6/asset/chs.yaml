  \ 20-19 中引入的 `singerRoutes` 路由函数。\n\n我们还需要在 `WebExceptionHandler` 中添加一个新的部分来处理 `MissingValueException`。\n\
  \n清单 20-37 展示了 `singerRoutes` 路由函数的最小配置，显示了两个映射以及包含处理 `MissingValueException` 代码块的新的\
  \ `WebExceptionHandler` Bean。\n\n```\npackage com.apress.prospring6.twenty.boot;\n\
  // 导入语句已省略\n@Slf4j\n@Configuration\npublic class RoutesConfig {\nfinal static Logger\
  \ LOGGER = LoggerFactory.getLogger(RoutesConfig.class);\n@Bean\npublic RouterFunction\
  \ singerRoutes(HomeHandler homeHandler, SingerHandler singerHandler) {\nreturn route()\n\
  // 返回主页视图模板\n.GET(\"/\", homeHandler::view)\n.GET(\"/home\", homeHandler::view)\n\
  .GET(\"/singers/search\", singerHandler::searchView)\n.POST(\"/singers/go\", singerHandler::search)\n\
  // 其他映射已省略\n.filter((request, next) -> {\nLOGGER.info(\"Before handler invocation:\
  \ {}\" , request.path());\nreturn next.handle(request);\n})\n.build();\n}\n@Bean\n\
  @Order(-2)\npublic WebExceptionHandler exceptionHandler() {\nreturn (ServerWebExchange\
  \ exchange, Throwable ex) -> {\nif (ex instanceof SaveException se) {\nlog.debug(\"\
  RouterConfig:: handling exception :: \" , se);\nexchange.getResponse().setStatusCode(HttpStatus.BAD_REQUEST);\n\
  // 标记响应为已完成并禁止向其写入\nreturn exchange.getResponse().setComplete();\n} else if (ex\
  \ instanceof IllegalArgumentException iae) {\nlog.debug(\"RouterConfig:: handling\
  \ exception :: \" , iae);\nexchange.getResponse().setStatusCode(HttpStatus.BAD_REQUEST);\n\
  // 标记响应为已完成并禁止向其写入\nreturn exchange.getResponse().setComplete();\n} else if (ex\
  \ instanceof MissingValueException mve) {\nexchange.getResponse().setStatusCode(HttpStatus.BAD_REQUEST);\n\
  exchange.getResponse().getHeaders().add(\"Content-Type\", \"application/json\");\n\
  final String message;\ntry {\nmessage = new JsonMapper().writeValueAsString(mve.getFieldNames());\n\
  var buffer = exchange.getResponse().bufferFactory().wrap(message.getBytes());\n\
  return exchange.getResponse().writeWith(Flux.just(buffer));\n} catch (JsonProcessingException\
  \ e) {\n}\n}\nreturn Mono.error(ex);\n};\n}\n}\n清单 20-37\n更新后的路由函数和异常处理器，包含处理 MissingValueException\
