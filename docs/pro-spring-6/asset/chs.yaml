  中获取 `validator` Bean。为了存储验证结果，使用待验证对象及其名称（即第二个参数的作用）构造了一个 `BeanPropertyBindingResult`
  类的实例。这对于将错误报告给链中的下一个服务或用于日志记录可能很有用。为了执行验证，调用了 `ValidationUtils.invokeValidator()`
