  构造函数的参数值为 `true`。此值被赋值给 `registerDefaultFormatters` 字段，并且对于在上下文中启用默认格式化器集合是必需的。如果设置为
  `false`，此 bean 将仅启用默认的转换器集合。


  ## Spring 中的验证


  验证是任何应用程序的关键部分。应用于领域对象的验证规则确保所有业务数据结构良好并满足所有业务定义。理想情况是所有验证规则都维护在集中位置，并且同一组规则应用于同一类型的数据，无论数据来自哪个源（例如，来自通过
  Web 应用程序的用户输入、来自通过 Web 服务的远程应用程序、来自 JMS 消息或来自文件）。


  在讨论验证时，转换和格式化也很重要，因为在验证数据之前，应根据为每种类型定义的格式化规则将其转换为所需的 POJO。例如，用户通过浏览器中的 Web 应用程序输入一些博客信息，然后将该数据提交到服务器。在服务器端，如果
  Web 应用程序是使用 Spring MVC 开发的，Spring 将从 HTTP 请求中提取数据，并根据格式化规则（例如，表示日期的 `String` 将根据格式化规则
  `yyyy-MM-dd` 转换为 `LocalDate` 字段）执行从 `String` 到所需类型的转换。此过程称为*数据绑定*。当数据绑定完成且领域对象构建完成后，将对该对象应用验证，任何错误都将返回并显示给用户。如果验证成功，该对象将被持久化到数据库。


  Spring 支持两种主要的验证类型。第一种由 Spring 提供。通过实现 `org.springframework.validation.Validator`
  接口来创建验证器，如清单 11-16 所示。^(¹⁰³)


  ```

  package org.springframework.validation;

  public interface Validator {

  boolean supports(Class clazz);

  void validate(Object target, Errors errors);

  }

  清单 11-16

  Spring 的 Validator 接口

  ```


  另一种验证类型是通过 Spring 对 JSR-349（Bean 验证）^(¹⁰⁴) 的支持，现已更名为 Jakarta Bean 验证。我们将在接下来的章节中介绍这两种验证类型。


  ### 使用 Spring Validator 接口


  使用 Spring 的 `Validator` 接口，我们可以通过创建一个实现该接口的类来开发一些验证逻辑。让我们看看它是如何工作的。对于到目前为止我们一直在使用的
  `Blogger` 类，假设名字不能为空。要针对此规则验证 `Blogger` 对象，需要一个自定义验证器。清单 11-17 中的代码片段展示了 `BloggerValidator`
  验证器类。


  ```

  package com.apress.prospring6.eleven.validator;

  import org.springframework.validation.Errors;

  import org.springframework.validation.ValidationUtils;

  import org.springframework.validation.Validator;

  // 其他导入语句已省略

  @Component("simpleBloggerValidator")

  public class SimpleBloggerValidator implements Validator {

  @Override

  public boolean supports(Class clazz) {

  return Blogger.class.equals(clazz);

  }

  @Override

  public void validate(Object target, Errors errors) {

  ValidationUtils.rejectIfEmpty(errors, "firstName", "field.required");

  }

  }

