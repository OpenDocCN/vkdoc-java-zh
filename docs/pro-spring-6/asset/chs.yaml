  ### 对象修改检测与引入


  *对象修改检测*是一项因多种原因而非常有用的技术。通常，你在持久化对象数据时应用修改检测，以避免不必要的数据库访问。如果一个对象被传递给某个方法进行修改，但返回时并未被修改，那么向数据库发出更新语句就毫无意义。以这种方式使用修改检查可以真正提高应用程序的吞吐量，尤其是在数据库已经承受较大负载或位于远程网络上（导致通信成本高昂）的情况下。


  不幸的是，这种功能很难手动实现，因为它要求你向每个可能修改对象状态的方法中添加检查逻辑，以确认对象状态是否真的被修改了。当你考虑到所有必须进行的空值检查以及检查值是否实际发生变化时，每个方法大约需要八行代码。你可以将其重构为一个单独的方法，但每次需要执行检查时仍然必须调用此方法。将这种逻辑分散到需要修改检查的众多类的典型应用程序中，就会埋下灾难的隐患。


  这显然是引入（Introductions）能够发挥作用的地方。我们不希望每个需要修改检查的类都继承自某个基础实现，从而失去其唯一的继承机会；我们也不希望真的在每个改变状态的方法中添加检查代码。通过使用引入，我们可以为修改检测问题提供一个灵活的解决方案，而无需编写大量重复、易出错的代码。


  在本例中，我们将使用引入构建一个完整的修改检查框架。修改检查逻辑由 `IsModified` 接口封装，该接口的一个实现将被引入到合适的对象中，同时还会引入拦截逻辑来自动执行修改检查。出于本示例的目的，我们采用
  JavaBeans 约定，即将对 setter 方法的任何调用都视为一次修改。当然，我们并非将所有对 setter 方法的调用都视为修改；我们会检查传递给 setter
  的值是否与对象当前存储的值不同。此解决方案的唯一缺陷是，如果对象上的任何一个值发生了变化，即使将对象设置回其原始状态，它仍会反映为已修改。例如，你有一个包含 `firstName`
  属性的 `Contact` 对象。假设在处理过程中，`firstName` 属性从 Peter 改为了 John。结果，该对象被标记为已修改。然而，即使在后续处理中该值又从
  John 改回了原始值 Peter，它仍然会被标记为已修改。


  跟踪此类更改的一种方法是在对象的整个生命周期中存储完整的更改历史记录。然而，这里的实现很简单，足以满足大多数需求。实现更完整的解决方案会导致示例过于复杂。


  #### 使用 `IsModified` 接口


  修改检查解决方案的核心是 `IsModified` 接口，虚构的应用程序使用该接口来做出关于对象持久化的智能决策。我们不介绍应用程序将如何使用 `IsModified`；相反，我们将专注于引入的实现。清单
  5-36 展示了 `IsModified` 接口。


  ```

  package com.apress.prospring6.five.introduction;

  public interface IsModified {

  boolean isModified();

  }

  清单 5-36

  IsModified 接口

  ```


  这里没有什么特别的——只有一个方法 `isModified()`，用于指示对象是否已被修改。


  #### 创建 Mixin


  下一步是创建实现 `IsModified` 并将被引入到对象中的代码；这被称为 *mixin*。正如我们之前提到的，通过继承 `DelegatingIntroductionInterceptor`
  来创建 mixin 比直接实现 `IntroductionInterceptor` 接口要简单得多。mixin 类 `IsModifiedMixin` 继承了
  `DelegatingIntroductionInterceptor` 并实现了 `IsModified` 接口。此实现如清单 5-37 所示。


  ```

  package com.apress.prospring6.five.introduction;

  import java.lang.reflect.Method;

  import java.util.HashMap;

  import java.util.Map;

  import java.util.function.Predicate;

  import org.aopalliance.intercept.MethodInvocation;

  import org.springframework.aop.support.DelegatingIntroductionInterceptor;

  public class IsModifiedMixin extends DelegatingIntroductionInterceptor implements
  IsModified {

  private boolean isModified = false;

  private final Map methodCache = new HashMap();

  private final Predicate isSetter = invocation ->

  invocation.getMethod().getName().startsWith("set") && (invocation.getArguments().length
  == 1);

  @Override

  public boolean isModified() {

  return isModified;

  }

  @Override

  public Object invoke(MethodInvocation invocation) throws Throwable {

  if (!isModified) {

  if (isSetter.test(invocation)) {

  Method getter = getGetter(invocation.getMethod());

  if (getter != null) {

  Object newVal = invocation.getArguments()[0];

  Object oldVal = getter.invoke(invocation.getThis(), null);

  if (newVal == null && oldVal == null) {

  isModified = false;

  } else if ((newVal == null && oldVal != null) || (newVal != null && oldVal == null))
  {

  isModified = true;

  }  else {

  isModified = !newVal.equals(oldVal);

  }

  }

  }

  }

  return super.invoke(invocation);

  }

  private Method getGetter(Method setter) {

  Method getter = methodCache.get(setter);

  if (getter != null) {

  return getter;

  }

  String getterName = setter.getName().replaceFirst("set", "get");

  try {

  getter = setter.getDeclaringClass().getMethod(getterName, null);

  synchronized (methodCache) {

  methodCache.put(setter, getter);

  }

  return getter;

  } catch (NoSuchMethodException ex) {

  return null;

  }

  }

  }

  清单 5-37

  IsModifiedMixin 类

  ```


  这里首先要注意的是 `IsModified` 的实现，它由私有的 `modified` 字段和 `isModified()` 方法组成。这个例子强调了为什么每个被通知的对象必须有一个
  mixin 实例——mixin 不仅向对象引入方法，还引入了状态。如果你在多个对象之间共享这个 mixin 的单个实例，那么你也在共享状态，这意味着一旦单个对象被修改，所有对象都会显示为已修改。


  实际上，你并不需要为 mixin 实现 `invoke()` 方法，但在本例中，这样做使我们能够自动检测何时发生修改。我们首先仅在对象尚未被修改时执行检查；一旦我们知道对象已被修改，就无需再检查修改。接下来，我们检查该方法是否为
  setter，如果是，则检索相应的 getter 方法。请注意，我们缓存了 getter/setter 对，以便将来更快地检索。最后，我们比较 getter 返回的值与传递给
  setter 的值，以确定是否发生了修改。请注意，我们检查了 null 的不同可能组合，并相应地设置了修改标志。重要的是要记住，当你使用 `DelegatingIntroductionInterceptor`
  时，在重写 `invoke()` 时必须调用 `super.invoke()`，因为正是 `DelegatingIntroductionInterceptor`
  负责将调用分派到正确的位置，即被通知的对象或 mixin 本身。


  你可以在你的 mixin 中实现任意数量的接口，每个接口都会自动被引入到被通知的对象中。




  ### 创建 `Advisor`


  下一步是创建一个 `Advisor` 类来封装混入类的创建。这一步是可选的，但它确实有助于确保每个被通知对象都使用混入类的新实例。清单 5-38 展示了 `IsModifiedAdvisor`
  类。


  ```

  package com.apress.prospring6.five.introduction;

  import org.springframework.aop.support.DefaultIntroductionAdvisor;

  public class IsModifiedAdvisor extends DefaultIntroductionAdvisor {

  public IsModifiedAdvisor() {

  super(new IsModifiedMixin());

  }

  }

  清单 5-38

  IsModifiedAdvisor 类

  ```


  请注意，我们继承了 `DefaultIntroductionAdvisor` 来创建我们的 `IsModifiedAdvisor`。这个通知器的实现很简单，不言自明。


