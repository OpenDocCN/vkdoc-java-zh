  以这种方式实现验证，可以清晰地表明哪条规则被违反，并允许配置自定义消息。它还提供了将代码保持在相同作用域内的优势。一些开发者可能会认为领域对象被验证逻辑污染了，并建议不要采用这种方法，但对于简单的验证规则，我们喜欢这种方法。当验证领域对象所需的代码变得比领域对象本身还大时，才需要单独的验证器类。


  ### 决定使用哪种验证 API


  讨论了 Spring 自身的 `Validator` 接口和 Bean Validation API 之后，在你的应用程序中应该使用哪一种呢？JSR-349/Jakarta
  Bean Validation 无疑是首选。主要原因如下：


  *   JSR-349/Jakarta Bean Validation 是 JEE 标准，并得到许多前端/后端框架（例如 Spring、JPA 3、Spring
  MVC 等）的广泛支持。

  *   JSR-349/Jakarta Bean Validation 提供了一个标准的验证 API，它隐藏了底层提供者，因此你不会被绑定到特定的提供者。

  *   从版本 4 开始，Spring 与 JSR-349 紧密集成。例如，在 Spring MVC Web 控制器中，你可以使用 `@Valid` 注解（位于
  `jakarta.validation` 包下）来注解方法中的参数，Spring 将在数据绑定过程中自动调用 JSR-349 验证。此外，在 Spring MVC
  Web 应用程序上下文配置中，一个简单的注解（`@EnableWebMvc`）即可配置 Spring 自动启用 Spring 类型转换系统和字段格式化，以及对
  JSR-349（Bean Validation）的支持。

  *   如果你使用 JPA 3，提供者会在持久化之前自动对实体执行 JSR-349/Jakarta Bean Validation 验证，提供了另一层保护。


  关于将 Jakarta Bean Validation 与 Hibernate Validator 作为实现提供者一起使用的详细信息，请参考 Hibernate
  Validator 的文档页面。




