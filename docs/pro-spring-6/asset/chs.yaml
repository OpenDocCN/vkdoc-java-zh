  \ 类\n```\n\n为了测试该异常是否会引发带有 `404(Not Found)` HTTP 状态码的响应，这项工作由清单 15-15 中引入的 `testNegativeFindById(..)`\
  \ 方法完成，但需要发送请求 `\"http://localhost:8080/ch15/singer3/99\"`。\n\n像这样对异常进行注解可以解决问题，但我们的控制器还会抛出一个\
  \ `DataIntegrityViolationException`，该异常未映射到任何 HTTP 状态码。这种类型的异常不属于我们的应用程序，因此无法使用\
  \ `@ResponseStatus` 进行注解。\n\n对于此类异常，解决方案是编写一个异常处理类，使用 `@RestControllerAdvice`（相当于\
  \ REST 版的 `@ControllerAdvice`）对其进行注解，并为 `DataIntegrityViolationException` 声明一个方法处理器，这与**第**\
  \ **14** **章**中针对 Spring Web 应用程序的做法类似。\n\n`RestErrorHandler` 类是一个用于 REST 请求的全局异常处理器，如清单\
  \ 15-20 所示。\n\n```\npackage com.apress.prospring6.fifteen.controllers;\nimport org.springframework.dao.DataIntegrityViolationException;\n\
  import org.springframework.http.HttpStatus;\nimport org.springframework.http.ResponseEntity;\n\
  import org.springframework.web.bind.annotation.ControllerAdvice;\nimport org.springframework.web.bind.annotation.ExceptionHandler;\n\
  @RestControllerAdvice\npublic class RestErrorHandler {\n@ExceptionHandler(DataIntegrityViolationException.class)\n\
  public ResponseEntity handleBadRequest(DataIntegrityViolationException ex) {\nreturn\
  \ ResponseEntity.badRequest().build();\n}\n}\n清单 15-20\nRestErrorHandler 类\n```\n\
  \n我们如何测试当发生 `DataIntegrityViolationException` 时，不再出现 `500(Internal Server Error)`\
  \ 错误？很简单：我们尝试使用一个已存在的 `firstName` 和 `lastName` 创建一个新的 `Singer` 实例，由于这两个字段的组合被声明为\
  \ `SINGER` 表的唯一键，因此会抛出该异常。该测试如清单 15-21 所示。\n\n```\npackage com.apress.prospring6.fifteen;\n\
  import org.springframework.web.client.HttpClientErrorException;\nimport org.springframework.web.client.RestTemplate;\n\
  // 其他导入语句已省略\npublic class RestClient3Test {\nfinal Logger LOGGER = LoggerFactory.getLogger(RestClientTest.class);\n\
  private static final String URL_GET_ALL_SINGERS = \"http://localhost:8080/ch15/singer3/\"\
  ;\nprivate static final String URL_CREATE_SINGER = \"http://localhost:8080/ch15/singer3/\"\
  ;\nRestTemplate restTemplate = new RestTemplate();\n@Test\npublic void testNegativeCreate()\
  \ throws URISyntaxException {\nLOGGER.info(\"--> Testing create singer\");\nSinger\
  \ singerNew = new Singer();\nsingerNew.setFirstName(\"Ben\");\nsingerNew.setLastName(\"\
  Barnes\");\nsingerNew.setBirthDate(LocalDate.now());\nRequestEntity  req = new RequestEntity(singerNew,\
  \ HttpMethod.POST, new URI(URL_CREATE_SINGER));\nassertThrowsExactly(HttpClientErrorException.BadRequest.class,\
  \ () -> restTemplate.exchange(req, HttpStatus.class));\n}\n// 其他测试方法已省略\n}\n清单 15-21\n\
  RestClient3Test#testNegativeCreate() 测试方法\n```\n\n请注意，`RestTemplate` 抛出的异常类型是 `HttpClientErrorException.BadRequest`，这与\
  \ `400(Bad Request)` HTTP 状态码匹配的异常类型。\n\n关于编写 Spring REST Web 应用程序的这一节到此必须结束，因为涉及\
  \ Spring 的 REST API 时，主题非常广泛。请查看下一节，了解使用 Spring Boot 构建 Spring REST Web 应用程序是多么容易。\n\
  \n## 使用 Spring Boot 的 RESTful-WS\n\n包含本节是因为 Spring Boot 使一切开发都变得更加容易。`Singer` 实体、仓库、服务、异常和异常处理类与之前相同；无需更改任何内容。与经典\
  \ Spring REST 应用程序相同的规则适用：如果我们想要 XML 和 JSON 序列化，我们需要将所需的 Jackson 库添加到类路径中。图 15-2\
