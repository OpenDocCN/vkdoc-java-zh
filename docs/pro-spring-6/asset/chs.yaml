  ### 使用 AspectJ 切点表达式创建切点


  除了 JDK 正则表达式，你还可以使用 AspectJ 的切点表达式语言来声明切点。在本章后面，你会看到当我们在 Java 配置中声明切点时，Spring 默认使用
  AspectJ 的切点语言。此外，当使用 Spring 的 `@AspectJ` 注解风格的 AOP 支持时，你需要使用 AspectJ 的切点语言。因此，当使用表达式语言声明切点时，使用
  AspectJ 切点表达式是最佳方式。Spring 提供了 `AspectJExpressionPointcut` 类，用于通过 AspectJ 的表达式语言定义切点。


  ![](img/315511_6_En_5_Figd_HTML.jpg)警告。 要在 Spring 中使用 AspectJ 切点表达式，你需要在项目的类路径中包含两个
  AspectJ 库文件：`aspectjrt.jar` 和 `aspectjweaver.jar`。请查看 `pom.xml` 和 `chapter05.gradle`
  文件以获取每种构建工具的配置。


  考虑到之前 `Guitarist` 类的实现，使用 JDK 正则表达式实现的相同功能也可以使用 AspectJ 表达式来实现。该代码如清单 5-22 所示。


  ```

  package com.apress.prospring6.five.pointcut;

  import org.springframework.aop.aspectj.AspectJExpressionPointcut;

  // 其他导入语句已省略

  public class AspectjexpPointcutDemo {

  public static void main(String... args) {

  Guitarist johnMayer = new Guitarist();

  var pc = new AspectJExpressionPointcut();

  pc.setExpression("execution(* sing*(..))");

  var advisor = new DefaultPointcutAdvisor(pc, new SimpleAroundAdvice());

  ProxyFactory pf = new ProxyFactory();

  pf.setTarget(johnMayer);

  pf.addAdvisor(advisor);

  Guitarist proxy = (Guitarist) pf.getProxy();

  proxy.sing();

  proxy.sing2();

  proxy.rest();

  }

  }

