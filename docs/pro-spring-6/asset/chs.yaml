  以及其他一些值的增加。


  ## 使用 Spring Boot 的 JMX


  将之前的应用程序迁移到 Spring Boot 很容易，并且依赖项是提供并自动配置的。对于 JMX，不需要启动器依赖项，但要启用 JMX 以公开 MBean，我们需要将
  `spring.jmx.enable=true` 属性添加到配置中。为了使此应用程序与上一节保持一致，我们还添加了 `spring.jmx.default-domain=jmxBootDemo`，将域名从
  `bean` 更改为 `jmxBootDemo`，以便轻松识别我们的 MBean 所在的位置。


  本节中的应用程序与**第** **15** **章**中的 Spring Boot Web REST 应用程序相同。将 `spring.jmx.enable=true`
  属性添加到配置后，`org.springframework.boot.autoconfigure.jmx.JmxAutoConfiguration` 类被添加到应用程序中，该类声明了一个
  bean ID 为 `mbeanServer` 的 `MBeanServer`，并公开任何使用 Spring JMX 注解进行注解的 bean。


  默认情况下，Spring Boot 会将管理端点作为 JMX MBean 公开在 `org.springframework.boot` 域下。`AppStatisticsImpl`
  类与上一节中介绍的相同。由于 Spring Boot 公开所有 JMX MBean，如果类路径中的任何库包含它们，它们将在 `jmxDemo` 域下可用。现在，如果您打开
  VisualVM 并访问 `Chapter18Application` 节点，您应该在 MBeans 选项卡中看到 `jmxBootDemo` 域包含 `HikariDataSource`
  MBean，如图 18-4 所示。


