  \n## 使用 STOMP 发送消息\n\n在使用`WebSocket`时，通常会使用 STOMP 等子协议作为客户端和服务器之间的通用格式，以便两端都能预期并做出相应反应。Spring\
  \ 框架原生支持 STOMP，我们将在示例中使用此协议。\n\n\n\nSTOMP 是一种基于 HTTP 建模的简单帧协议消息传递协议，可用于任何可靠的、支持双向流的网络协议，例如\
  \ `WebSocket`。STOMP 拥有标准的协议格式；JavaScript 客户端支持在浏览器中发送和接收消息，并且可以选择性地接入支持 STOMP 的传统消息代理，例如\
  \ RabbitMQ 和 ActiveMQ。Spring 框架开箱即用地支持一个简单代理，该代理在内存中处理订阅请求并向已连接的客户端广播消息。在本节介绍的 STOMP\
  \ 示例中，我们将使用这个简单代理，而将全功能代理的搭建留作练习^(¹⁹⁶)。\n\n![](img/315511_6_En_19_Figa_HTML.jpg)一个圆圈内带感叹号的图示。 有关\
  \ STOMP 协议的完整描述，请参见官方网站^(¹⁹⁷)。\n\n我们将创建一个简单的股票行情应用程序，该程序显示几个预定义的股票代码、它们的当前价格以及价格变动时的时间戳。新的股票代码和起始价格也可以通过用户界面添加。任何连接的客户端（即其他浏览器标签页或网络上全新的客户端）都将看到相同的数据，因为它们都订阅了消息广播。每秒，每个股票价格都会更新为一个新的随机金额，并且时间戳也会更新。\n\
  \n为了确保即使客户端浏览器不支持 `WebSocket`，也能使用股票行情应用程序，我们将再次使用 SockJS 来透明地处理任何传输协议的切换。在深入代码之前，值得注意的是，STOMP\
  \ 消息支持由 `spring-messaging` 库提供。\n\n让我们首先创建 `Stock` 领域对象，该对象保存股票的相关信息，例如其代码和价格，如清单\
  \ 19-8 所示。\n\n```\npackage com.apress.prospring6.nineteen.stomp;\nimport java.io.Serializable;\n\
  import java.time.LocalDateTime;\nimport java.time.format.DateTimeFormatter;\npublic\
  \ class Stock implements Serializable {\nprivate static final long serialVersionUID\
  \ = 1L;\nprivate static final String DATE_FORMAT = \"MMM dd yyyy HH:mm:ss\";\nprivate\
  \ String code;\nprivate double price;\nprivate LocalDateTime date;\npublic Stock()\
  \ { }\npublic Stock(String code, double price) {\nthis.code = code;\nthis.price\
  \ = price;\n}\n// getters and setters omitted\npublic String getDateFormatted()\
  \ {\nvar formatter =  DateTimeFormatter.ofPattern(DATE_FORMAT);\nreturn formatter.format(date);\n\
  }\n}\n清单 19-8\nStock 领域对象\n```\n\n为了处理股票更新的请求，需要一个控制器。清单 19-9 展示了 `StockController`\
  \ 类。\n\n```\npackage com.apress.prospring6.nineteen.stomp;\nimport org.springframework.messaging.handler.annotation.MessageMapping;\n\
  import org.springframework.messaging.simp.SimpMessagingTemplate;\nimport org.springframework.scheduling.TaskScheduler;\n\
  // 其他导入语句已省略\n@Controller\npublic class StockController {\nprivate final TaskScheduler\
  \ taskScheduler;\nprivate final SimpMessagingTemplate simpMessagingTemplate;\nprivate\
  \ List stocks = new ArrayList();\nprivate Random random = new Random(System.currentTimeMillis());\n\
  public StockController(TaskScheduler taskScheduler, SimpMessagingTemplate simpMessagingTemplate)\
  \ {\nthis.taskScheduler = taskScheduler;\nthis.simpMessagingTemplate = simpMessagingTemplate;\n\
  }\n@MessageMapping(\"/addStock\")\npublic void addStock(Stock stock) throws Exception\
  \ {\nstocks.add(stock);\nbroadcastUpdatedPrices();\n}\nprivate void broadcastUpdatedPrices()\
  \ {\nfor(Stock stock : stocks) {\nstock.setPrice(stock.getPrice() + (getUpdatedStockPrice()\
  \ * stock.getPrice()));\nstock.setDate(LocalDateTime.now());\n}\nsimpMessagingTemplate.convertAndSend(\"\
  /topic/price\", stocks);\n}\nprivate double getUpdatedStockPrice() {\ndouble priceChange\
  \ = random.nextDouble() * 5.0;\nif (random.nextInt(2) == 1) {\npriceChange = -priceChange;\n\
  }\nreturn priceChange / 100.0;\n}\n@PostConstruct\nprivate void broadcastTimePeriodically()\
  \ {\nstocks.add(new Stock(\"VMW\", 1.00d));\nstocks.add(new Stock(\"EMC\", 1.00d));\n\
  stocks.add(new Stock(\"GOOG\", 1.00d));\nstocks.add(new Stock(\"IBM\", 1.00d));\n\
  taskScheduler.scheduleAtFixedRate(this::broadcastUpdatedPrices, Duration.ofSeconds(2));\n\
  }\n}\n清单 19-9\nStockController 类\n```\n\n清单 19-9 中的代码可以解释如下：\n\n*   控制器需要一个任务调度器（**第**\
  \ **12** **章**）和一个 `SimpMessagingTemplate` 实例，以便每 2 秒发送一次 `Stock` 价格更新。`SimpMessagingeTemplate`\
  \ 是 `org.springframework.messaging.core.MessageSendingOperations<D>` 的一个实现，它为 STOMP\
  \ 等简单消息协议提供支持。\n\n*   为了演示目的，控制器初始化时包含了一些预定义的股票条目及其起始价格。\n\n*   `/addStock` 处理方法允许用户提交一个\
  \ `Stock` 实例，该实例会被添加到股票列表中，然后向所有订阅者广播这些股票。\n\n*   在广播股票信息时，会遍历 `Stock` 实例列表，更新每个实例的价格，然后通过注入的\
  \ `SimpMessagingTemplate` 实例将信息发送给 `/topic/price` 的所有订阅者。`TaskExecutor` 实例通过每 2\
  \ 秒调用一次 `broadcastUpdatedPrices (..)` 方法，向所有订阅的客户端广播更新后的股票价格列表。\n\n有了控制器之后，我们现在需要一个\
  \ HTML 用户界面来向客户端显示股票信息。为简单起见，`views/index3.html` 视图使用 Thymeleaf 编写，并继承了**第** **14**\
  \ **章**和 **17** **章**中使用的 `views/templates/layout.html` 模板的主题元素。\n\n`views/index3.html`\
  \ 视图中的 HTML JavaScript 代码如清单 19-10 所示。\n\n```\n\n```\n\n\nlet stomp;\nfunction displayStockPrice(frame)\
  \ {\nlet stocks = JSON.parse(frame.body);\n$('#stock').empty();\nfor (let i in stocks)\
  \ {\nlet stock = stocks[i];\n$('#stock').append(\n$('').append(\n$('').html(stock.code),\n\
  $('').html(stock.price.toFixed(2)),\n$('').html(stock.dateFormatted)\n)\n);\n}\n\
  }\nlet connectCallback = function () {\nstomp.subscribe('/topic/price', displayStockPrice);\n\
  };\nlet errorCallback = function (error) {\nalert(error);\n};\njQuery(function ($)\
  \ {\n$(\"#addStockButton\").attr(\"disabled\", true);\n$('#connect')\n.click(function\
  \ doConnect() {\nstomp = Stomp.over(new SockJS($(\"#target\").val()));\nstomp.connect(\"\
  guest\", \"guest\", connectCallback, errorCallback);\nlet badge=  $(\"#badgeStatus\"\
  );\nbadge.text(\"Connected\");\nbadge.attr('class','badge bg-success');\n$(\"#addStockButton\"\
  ).attr('disabled', false);\n});\n$('#disconnect')\n.click(function () {\nif (typeof\
  \ stomp != 'undefined') {\nstomp.disconnect();\nstomp = undefined;\nlet badge= \
  \ $(\"#badgeStatus\");\nbadge.text(\"Disconnected\");\nbadge.attr('class','badge\
  \ bg-light');\n$(\"#addStockButton\").attr('disabled', true);\n} else {\nalert(\"\
  Not connected.\");\n}\n});\n$('.addStockButton').click(function (e) {\ne.preventDefault();\n\
  const stockStr = JSON.stringify({\n'code': $('.addStock .code').val(),\n'price':\
  \ Number($('.addStock .price').val())\n});\nstomp.send('/app/addStock', {}, stockStr);\n\
  return false;\n});\n});\n\nSTOMP 测试器\n\nFN:\n\n股票详情\n\n代码\n价格\n时间\n\nFN:\n\nFN:\n\
  \n清单 19-10\nindex3.html 视图模板\n\n与本章前面的示例类似，我们在 JavaScript 中混合了一些 HTML 来更新显示。我们将\
  \ HTML 与 JavaScript 结合的原因，尽管这不符合常规的编程规则，是为了尽可能简化 Spring MVC 配置；这也有助于使页面及其组件的功能易于理解。我们利用\
  \ jQuery 更新 HTML 数据，利用 SockJS 提供传输选择，并利用 STOMP JavaScript 库 `stomp.min.js` 与服务器通信。通过\
  \ STOMP 消息发送的数据以 JSON 格式编码，我们在事件发生时提取这些数据。建立 STOMP 连接后，我们订阅 `/topic/price` 以接收股票价格更新。\n\
  \nSTOMP 通信的 Java 配置由 `StompConfig` 类表示，如清单 19-11 所示。\n\n```\npackage com.apress.prospring6.nineteen;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.scheduling.annotation.EnableAsync;\n\
  import org.springframework.messaging.simp.config.MessageBrokerRegistry;\nimport\
  \ org.springframework.web.socket.config.annotation.EnableWebSocketMessageBroker;\n\
  import org.springframework.web.socket.config.annotation.StompEndpointRegistry;\n\
  import org.springframework.web.socket.config.annotation.WebSocketMessageBrokerConfigurer;\n\
  @Configuration\n@EnableAsync\n@EnableWebSocketMessageBroker\npublic class StompConfig\
  \ implements WebSocketMessageBrokerConfigurer {\n@Override\npublic void registerStompEndpoints(StompEndpointRegistry\
  \ registry) {\nregistry.addEndpoint(\"/ws\").withSockJS();\n}\n@Override\npublic\
  \ void configureMessageBroker(MessageBrokerRegistry config) {\nconfig.setApplicationDestinationPrefixes(\"\
  /app\");\nconfig.enableSimpleBroker(\"/topic\");\n}\n@Bean\nTaskExecutor taskExecutor()\
  \ {\nreturn new SimpleAsyncTaskExecutor();\n}\n}\n清单 19-11\nStompConfig 配置类\n```\n\
  \n为了启用 Spring 异步调用和任务执行，配置类必须使用 `@EnableAsync` 注解，并且需要一个类型为 `org.springframework.core.task.TaskExecutor`\
  \ 的 bean 来重复广播股票信息。\n\n`@EnableWebSocketMessageBroker` 注解使用更高级别的消息子协议，在 `WebSocket`\
  \ 上启用基于代理的消息传递。请注意，该类实现了 `WebSocketMessageBrokerConfigurer` 接口，该接口定义了使用简单消息协议（例如\
  \ STOMP）为 `WebSocket` 客户端配置消息处理的方法。实现了 `registerStompEndpoints(..)` 方法来注册 `/ws`\
  \ STOMP 端点映射。`http://localhost:8080/ch19/ws` 用于初始化一个 SocketJS 实例，该实例提供对 STOMP 通信的支持。\n\
  \n实现了 `configureMessageBroker` 方法来配置消息代理选项。`applicationDestinationPrefixes` 属性有助于过滤针对应用程序注解方法的目标；此配置设置了\
  \ `/app` 过滤器。此过滤器需要作为股票处理器方法 URL 路径的前缀，这就是为什么在清单 19-10 中你会看到以下内容：\n\n```\nstomp.send('/app/addStock',\
  \ {}, stockStr)\n```\n\n`enableSimpleBroker(\"/topic\")` 启用一个简单的消息代理，并配置一个或多个前缀来过滤针对该代理的目标。在\
  \ `StockController` 中，你会在 `broadcastUpdatedPrices()` 方法中看到，股票数据被发布到主题 `/topic/price`\
