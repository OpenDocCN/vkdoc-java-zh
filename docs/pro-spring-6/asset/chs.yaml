  \ 方法输出\n```\n\n你可以看到，ID 为 6 的歌手及其在`ALBUM`表中的子记录已被一同删除。\n\n\n\n## 执行 SQL 原生查询\n\n\
  HQL 查询易于编写，但编写跨多个表并进行复杂计算（例如金融领域常见需求）的复杂查询，即使不是不可能，也是非常困难的。通常情况下，生成的 SQL 查询效率不如\
  \ SQL 专家编写的原生查询。对于本书相关项目中的示例，编写 HQL 查询与编写 SQL 原生查询一样简单，但假设你需要执行 SQL 原生查询，Hibernate\
  \ 会话也允许使用 `createNativeQuery(..)` 方法执行原生 SQL 查询。清单 7-28 展示了将此方法与一个相对复杂的查询结合使用的示例。\n\
  \n```\npackage com.apress.prospring6.seven.base.dao;\n// 导入语句已省略\n@Transactional(readOnly\
  \ = true)\n@Repository(\"singerDao\")\npublic class SingerDaoImpl implements  SingerDao\
  \ {\nprivate SessionFactory sessionFactory;\n// 其他代码因重复而省略\nprivate static final\
  \ String ALL_SELECT = \"\"\"\nSELECT DISTINCT s.first_name, s.last_name, a.title,\
  \ a.RELEASE_DATE, i.INSTRUMENT_ID\nfrom SINGER s\ninner join ALBUM a on s.id = a.singer_id\n\
  inner join SINGER_INSTRUMENT si on s.ID = si.SINGER_ID\ninner join INSTRUMENT i\
  \ on si.INSTRUMENT_ID = i.INSTRUMENT_ID\nwhere s.FIRST_NAME = :firstName and s.LAST_NAME=\
  \ :lastName\n\"\"\";\n@Override\npublic Singer findAllDetails(String firstName,\
  \ String lastName) {\nList  results = sessionFactory.getCurrentSession()\n.createNativeQuery(ALL_SELECT)\n\
  .setParameter(\"firstName\", firstName)\n.setParameter(\"lastName\", lastName)\n\
  .list();\nvar singer = new Singer();\nfor (Object[] item : results) {\nif (singer.getFirstName()\
  \ ==  null && singer.getLastName() == null) {\nsinger.setFirstName((String) item[0]);\n\
  singer.setLastName((String) item[1]);\n}\nvar album = new Album();\nalbum.setTitle((String)item[2]);\n\
  album.setReleaseDate(((Date) item[3]).toLocalDate());\nsinger.addAlbum(album);\n\
  var instrument = new Instrument();\ninstrument.setInstrumentId((String) item[4]);\n\
  singer.getInstruments().add(instrument);\n}\nreturn singer;\n}\n}\n清单 7-28\n执行原生\
  \ SQL 查询的 SingerDaoImpl.findAllDetails() 方法\n```\n\n`ALL_SELECT` SQL 查询使用了命名参数。这些参数的值通过调用\
  \ `setParameter(..)` 方法提供，该方法在 `createNativeQuery(..)` 调用返回的 `org.hibernate.query.NativeQuery`\
  \ 实例上调用。对于 Hibernate 原生 SQL 查询，此方法返回的实例的具体类型是 `org.hibernate.query.internal.NativeQueryImpl`。由于我们执行的是原生查询，我们失去了将数据库记录自动映射到\
  \ Java 实体的好处，但为了性能优势，这是值得的。\n\n调用此方法返回的类型可以解释如下。列表中的每个 `Object[]` 包含查询中指定列的值。如果返回多行，则需要\
  \ `List<E>`，因此 `List<Object[]>` 是合适的返回类型。\n\n这正是 jOOQ 提供更好支持的地方，但这将在本章后面，在探索了 Hibernate\
  \ 可以用于的其他有趣功能之后展示。\n\n## 使用 Hibernate 执行投影\n\n到目前为止，在本章中，除非查询要求特定的列值，否则所有 Hibernate\
  \ 操作都返回完整记录。在查询表时，并不总是需要返回完整记录。仅查询列子集的操作称为*投影*。Hibernate 通过其 `org.hibernate.criterion.`*Projection*\
  \ 接口和 `org.hibernate.Criteria` 类支持投影查询。\n\n清单 7-29 展示了使用 Hibernate 创建投影查询以从 `SINGER`\
  \ 表中提取 `firstName` 和 `lastName` 的示例。\n\n```\npackage com.apress.prospring6.seven.base.dao;\n\
  import org.hibernate.Criteria;\nimport org.hibernate.criterion.Projection;\nimport\
  \ org.hibernate.criterion.ProjectionList;\nimport org.hibernate.criterion.Projections;\n\
  // 导入语句已省略\n@Repository(\"singerDao\")\npublic class SingerDaoImpl implements  SingerDao\
  \ {\n@Transactional(readOnly = true)\n@Override\npublic Set findAllNamesByProjection()\
  \ {\n@SuppressWarnings({\"deprecation\"})\nCriteria criteria = sessionFactory.getCurrentSession().createCriteria(Singer.class);\n\
  Projection fnProjection = Projections.property(\"firstName\");\nProjection lnProjection\
  \ = Projections.property(\"lastName\");\nProjectionList pList = Projections.projectionList();\n\
  pList.add(fnProjection);\npList.add(lnProjection);\ncriteria.setProjection(pList);\n\
  List projResult = criteria.list();\nreturn projResult.stream().map(o -> o[0] + \"\
  \ \" + o[1]).collect(Collectors.toSet());\n}\n// 其他方法已省略\n}\n清单 7-29\n使用 Hibernate\
  \ 投影的 SingerDaoImpl.findAllNamesByProjection() 方法\n```\n\n请注意，每个被查询的属性都需要一个 `Projection`\
  \ 实例。\n\n## 使用 Hibernate 调用存储函数\n\nHibernate 支持调用存储过程和函数。本节演示如何使用 Hibernate 会话的\
  \ `createSQLQuery(..)` 方法在 MariaDB 数据库中调用一个简单的存储函数。\n\n被调用的函数与**第** **6** **章**中介绍的相同。创建该函数的\
  \ SQL 代码在清单 7-30 的 `SingerDaoImpl.findFirstNameById(..)` 方法的注释中进行了描述。\n\n```\npackage\
  \ com.apress.prospring6.seven.base.dao;\n// 导入语句已省略\n@Repository(\"singerDao\")\n\
  public class SingerDaoImpl implements  SingerDao {\n/*\nCREATE FUNCTION IF NOT EXISTS\n\
  getFirstNameById (in_id INT) RETURNS VARCHAR(60)\nRETURN (SELECT first_name FROM\
  \ SINGER WHERE id = in_id);\n*/\n@Transactional(readOnly = true)\n@Override\npublic\
  \ String findFirstNameById(Long id) {\nreturn sessionFactory.getCurrentSession().createSQLQuery(\"\
  select getfirstnamebyid(?) \")\n.setParameter(1, id).getSingleResult().toString();\n\
  }\n// 其他方法已省略\n}\n清单 7-30\n使用 Hibernate 会话调用存储函数的 SingerDaoImpl.findFirstNameById()\
  \ 方法\n```\n\n该存储函数简单地接受 ID 并返回具有该 ID 的歌手记录的 first name。`createSQLQuery(..)` 方法接受一个原生\
  \ SQL 函数调用语句作为参数，并返回一个 `org.hibernate.query.NativeQueryImpl` 实例。该函数调用需要一个参数，该参数通过调用\
  \ `setParameter(..)` 方法提供。此方法有一个版本使用索引设置参数，另一个版本使用名称设置参数。这个函数很简单，因此调用它的 Hibernate\
  \ 代码也很简单。由于它返回单个 `String` 结果，通过调用 `getSingleResult()` 可以轻松检索该结果。\n\n\n\n## 配置 Hibernate\
  \ 从实体类生成表\n\n在使用 Hibernate 的启动应用中，常见的做法是先编写实体类，然后根据其内容生成数据库表。通常，会在其中加入 Flyway^(⁶¹)\
  \ 这样的框架，以可靠且简便地管理应用数据库模式的不同版本，但该主题超出了本书的讨论范围。\n\n从实体类生成数据库模式是通过使用 `Environment.HBM2DDL_AUTO/hibernate.hbm2ddl.auto`\
  \ 这个 Hibernate 属性来完成的。当应用首次启动时，该属性值被设置为 `create`；这将使 Hibernate 扫描实体类，并根据使用 JPA 和\
  \ Hibernate 注解定义的关系生成表以及键（主键、外键、唯一键）。\n\n如果实体类配置正确，且生成的数据库对象完全符合预期，则应将属性值改为 `update`。这将告诉\
  \ Hibernate 根据后续对实体类所做的任何更改来更新现有数据库，并保留原始数据库以及已插入其中的任何数据。\n\n在生产应用中，编写集成测试是实用的做法，这些测试在伪数据库上运行，并在所有测试用例执行完毕后丢弃该数据库。通常，测试数据库是一个内存数据库，并通过将\
  \ `Environment.HBM2DDL_AUTO` 值设置为 `create-drop` 来告知 Hibernate 创建数据库并在测试执行后丢弃它。随着\
  \ Testcontainers 的引入，这一功能已非必需，但如果出于某种原因，你被禁止在运行测试的机器上安装 Docker，或者应用规模太小以至于使用 Testcontainers\
  \ 显得大材小用，那么 Hibernate 和嵌入式内存数据库就能派上用场。你可以在 Hibernate 官方文档^(⁶²)中找到 `hibernate.hbm2ddl.auto`\
  \ 属性的完整取值列表。\n\n清单 7-31 展示了名为 `HibernateTestConfig` 的 Java 配置类。如你所见，`Environment.HBM2DDL_AUTO/hibernate.hbm2ddl.auto`\
  \ 被设置为 `create-drop`，并且 H2 嵌入式数据源也已配置好。\n\n```\npackage com.apress.prospring6.seven.config;\n\
  import org.hibernate.SessionFactory;\nimport org.hibernate.cfg.Environment;\nimport\
  \ org.springframework.jdbc.datasource.embedded.EmbeddedDatabaseBuilder;\nimport\
  \ org.springframework.jdbc.datasource.embedded.EmbeddedDatabaseType;\nimport org.springframework.orm.hibernate5.HibernateTransactionManager;\n\
  import org.springframework.orm.hibernate5.LocalSessionFactoryBuilder;\nimport org.springframework.transaction.PlatformTransactionManager;\n\
  // 其他 import 语句已省略\n@Configuration\n@ComponentScan(basePackages = {\"com.apress.prospring6.seven.base\"\
  })\n@EnableTransactionManagement\npublic class HibernateTestConfig {\nprivate static\
  \ final Logger LOGGER = LoggerFactory.getLogger(HibernateTestConfig.class);\n@Bean\n\
  public DataSource dataSource() {\ntry {\nvar dbBuilder = new EmbeddedDatabaseBuilder();\n\
  return dbBuilder.setType(EmbeddedDatabaseType.H2).setName(\"testdb\").build();\n\
  } catch (Exception e) {\nLOGGER.error(\"无法创建嵌入式数据源 Bean！\", e);\nreturn null;\n\
  }\n}\n@Bean\npublic Properties hibernateProperties() {\nProperties hibernateProp\
  \ = new Properties();\nhibernateProp.put(Environment.DIALECT, \"org.hibernate.dialect.H2Dialect\"\
  );\nhibernateProp.put(Environment.HBM2DDL_AUTO, \"create-drop\");\nhibernateProp.put(Environment.FORMAT_SQL,\
  \ true);\nhibernateProp.put(Environment.USE_SQL_COMMENTS, true);\nhibernateProp.put(Environment.SHOW_SQL,\
  \ true);\nhibernateProp.put(Environment.MAX_FETCH_DEPTH, 3);\nhibernateProp.put(Environment.STATEMENT_BATCH_SIZE,\
  \ 10);\nhibernateProp.put(Environment.STATEMENT_FETCH_SIZE, 50);\nreturn hibernateProp;\n\
  }\n@Bean\npublic SessionFactory sessionFactory() {\nreturn new LocalSessionFactoryBuilder(dataSource())\n\
  .scanPackages(\"com.apress.prospring6.seven.base.entities\")\n.addProperties(hibernateProperties())\n\
  .buildSessionFactory();\n}\n@Bean public PlatformTransactionManager transactionManager()\
  \ {\nreturn new HibernateTransactionManager(sessionFactory());\n}\n}\n清单 7-31\n\
  HibernateTestConfig 配置类\n```\n\n当然，即使数据库模式已创建，但其中没有数据，因此我们无法运行任何测试。一种解决方案是使用 `@Sql*`\
  \ 注解系列来设置所有内容，如**第** **6** **章**所示。另一种解决方案是编写有序测试，其中第一个测试插入数据，第二个查询数据，第三个更新数据，最后一个删除数据。通过这种方式，我们在\
  \ `SingerDaoImpl` 中验证了所有 CRUD 操作。使用 `HibernateTestConfig` 配置其测试上下文的 `H2HibernateTest`\
  \ 类如清单 7-32 所示。\n\n```\npackage com.apress.prospring6.seven;\nimport com.apress.prospring6.seven.config.HibernateTestConfig;\n\
  import org.junit.jupiter.api.MethodOrderer;\nimport org.junit.jupiter.api.Order;\n\
  import org.junit.jupiter.api.TestMethodOrder;\n// 其他 import 语句已省略\n@SpringJUnitConfig(classes\
  \ = {HibernateTestConfig.class})\n@TestMethodOrder(MethodOrderer.OrderAnnotation.class)\n\
  public class H2HibernateTest {\nprivate static final Logger LOGGER = LoggerFactory.getLogger(HibernateTest.class);\n\
  @Autowired\nSingerDao singerDao;\n@Test\n@Order(1)\n@DisplayName(\"应插入一个包含专辑的歌手\"\
  )\npublic void testInsert() {\nvar singer = new Singer();\nsinger.setFirstName(\"\
  BB\");\nsinger.setLastName(\"King\");\nsinger.setBirthDate(LocalDate.of(1940, 8,\
  \ 16));\nvar album = new Album();\nalbum.setTitle(\"My Kind of Blues\");\nalbum.setReleaseDate(LocalDate.of(1961,\
  \ 7, 18));\nsinger.addAlbum(album);\nalbum = new Album();\nalbum.setTitle(\"A Heart\
  \ Full of Blues\");\nalbum.setReleaseDate(LocalDate.of(1962, 3, 20));\nsinger.addAlbum(album);\n\
  var created =  singerDao.save(singer);\nassertNotNull(created.getId());\n}\n@Test\n\
  @Order(2)\n@DisplayName(\"应返回所有歌手\")\npublic void testFindAll() {\nvar singers =\
  \ singerDao.findAll();\nassertEquals(1, singers.size());\nsingers.forEach(singer\
  \ -> LOGGER.info(singer.toString()));\n}\n@Test\n@Order(3)\n@DisplayName(\"应更新一个歌手\"\
  )\npublic void testUpdate() {\nvar singer = singerDao.findAll().get(0);\n// 确保该歌手存在\n\
  assertNotNull(singer);\nsinger.setFirstName(\"Riley B. \");\nint version =  singer.getVersion();\n\
  var bb = singerDao.save(singer);\nassertEquals(version + 1, bb.getVersion());\n\
  }\n@Test\n@Order(4)\n@DisplayName(\"应删除一个歌手\")\nvoid testDelete() {\nSinger singer\
  \ = singerDao.findAll().get(0);\n// 确保该歌手存在\nassertNotNull(singer);\nsingerDao.delete(singer);\n\
  assertEquals(0, singerDao.findAll().size());\n}\n}\n清单 7-32\nH2HibernateTest 测试类\n\
  ```\n\n请注意，该类使用了 `@TestMethodOrder(MethodOrderer.OrderAnnotation.class)` 进行注解，并且每个测试方法都使用了\
  \ `@Order({x})` 进行注解，其中 `x` 代表测试方法的数字顺序。测试方法按升序执行，如果一切顺利，它们都应通过。这显然在测试方法之间引入了某种依赖性，如果其中一个失败，后续的所有其他测试也可能失败。\n\
  \n![](img/315511_6_En_7_Figf_HTML.jpg)一个信息符号，在圆形背景上显示字母 I。 使用 Hibernate Tools^(⁶³)，也可以从现有模式生成实体类，但生成的代码并非总是最佳，可能需要调整。\n\
  \n\n\n## 注解方法还是字段？\n\n在前面的示例中，实体类在其 getter 方法上使用了 JPA 注解。但 JPA 注解也可以直接用于字段上，这有几个优点：\n\
  \n*   实体配置更清晰，集中在字段区域，而不是分散在整个类的内容中。当然，这仅在代码遵循整洁代码建议，将类的所有字段声明保持在同一个连续区域时才成立。\n\n\
  *   注解实体字段不强制要求提供 setter/getter 方法。这对于 `@Version` 注解的字段和其他审计范围字段非常有用，这些字段永远不应手动修改；只有\
  \ Hibernate 才能访问它们。\n\n*   注解字段允许在 setter 方法中进行额外处理（例如，从数据库加载值后进行加密/计算）。属性访问方式的问题在于，当加载对象时也会调用\
  \ setter 方法。\n\n互联网上关于哪种方式更好有很多讨论。从性能角度来看，没有任何区别。最终决定权在于开发者，因为可能存在一些合理的情况，使得注解访问器（getter\
  \ 方法）更有意义。但请记住，在数据库中，实际保存的是对象的状态，而对象的状态由其字段的值定义，而不是由访问器返回的值定义。这也意味着可以从数据库中精确地按照持久化的方式重新创建对象。因此，从某种意义上说，将注解放在\
  \ getter 方法上可以被视为破坏了封装性。\n\n清单 7-33 展示了重写后的 `AbstractEntity` 映射类，它注解了应用程序中所有 Hibernate\
  \ 实体类共有的字段。\n\n```\npackage com.apress.prospring6.seven.crud.entities;\nimport jakarta.persistence.*;\n\
  import java.io.Serial;\nimport java.io.Serializable;\n@MappedSuperclass\npublic\
  \ abstract class AbstractEntity implements Serializable {\n@Serial\nprivate static\
  \ final long serialVersionUID = 1L;\n@Id\n@GeneratedValue(strategy = GenerationType.IDENTITY)\n\
  @Column(updatable = false)\nprotected Long id;\n@Version\n@Column(name = \"VERSION\"\
  )\nprivate int version;\n// getters and setters omitted\n}\n清单 7-33\n具有 JPA 注解字段的\
  \ AbstractEntity 映射类\n```\n\n清单 7-34 展示了重写后的 `Singer` 实体类，它具有注解字段。\n\n```\npackage\
  \ com.apress.prospring6.seven.crud.entities;\nimport jakarta.persistence.*;\n//\
  \ other import statements omitted\n@Entity\n@Table(name = \"singer\")\n@NamedQueries({\n\
  @NamedQuery(name=Singer.FIND_SINGER_BY_ID,\nquery=\"select distinct s from Singer\
  \ s \" +\n\"left join fetch s.albums a \" +\n\"left join fetch s.instruments i \"\
  \ +\n\"where s.id = :id\"),\n@NamedQuery(name=Singer.FIND_ALL_WITH_ALBUM,\nquery=\"\
  select distinct s from Singer s \" +\n\"left join fetch s.albums a \" +\n\"left\
  \ join fetch s.instruments i\")\n})\npublic class Singer extends AbstractEntity\
  \ {\npublic static final String FIND_SINGER_BY_ID = \"Singer.findById\";\npublic\
  \ static final String FIND_ALL_WITH_ALBUM = \"Singer.findAllWithAlbum\";\n@Column(name\
  \ = \"FIRST_NAME\")\nprivate String firstName;\n@Column(name = \"LAST_NAME\")\n\
  private String lastName;\n@Column(name = \"BIRTH_DATE\")\nprivate LocalDate birthDate;\n\
  @OneToMany(mappedBy = \"singer\", cascade=CascadeType.ALL,\norphanRemoval=true)\n\
  private Set albums = new HashSet();\n@ManyToMany\n@JoinTable(name = \"singer_instrument\"\
  ,\njoinColumns = @JoinColumn(name = \"SINGER_ID\"),\ninverseJoinColumns = @JoinColumn(name\
  \ = \"INSTRUMENT_ID\"))\nprivate Set instruments = new HashSet();\n// getters and\
  \ setter omitted\n}\n清单 7-34\n具有 JPA 注解字段的 Singer 实体类\n```\n\n## 使用 Hibernate 时的注意事项\n\
  \n如本章示例所示，一旦正确定义了所有对象关系映射、关联和查询，Hibernate 就能提供一个环境，让你专注于使用对象模型进行编程，而不是为每个操作编写 SQL\
  \ 语句。在过去几年中，Hibernate 发展迅速，并已被 Java 开发者广泛采用作为数据访问层库，无论是在开源社区还是企业界。但是，你需要牢记以下几点：\n\
  \n*   由于你无法控制生成的 SQL，因此在定义映射时应格外小心，尤其是关联及其获取策略。\n\n*   你应该观察 Hibernate 生成的 SQL 语句，以验证所有操作是否按预期执行。\n\
  \n*   SQL 是一种具有丰富语法的高度表达性和类型安全的语言，因此编写 SQL 查询并不容易，语法错误是常见问题。\n\n*   理解 Hibernate\
  \ 如何管理其会话的内部机制非常重要，尤其是在批处理作业操作中。Hibernate 会在会话中保留托管对象，并定期刷新和清除它们。设计不佳的数据访问逻辑可能导致\
  \ Hibernate 过于频繁地刷新会话，从而严重影响性能（在我们的示例中，我们在 `save(..)` 和 `delete()` 方法中显式地刷新了会话）。\n\
  \n*   如果你希望对查询拥有绝对控制权，可以使用原生查询，本章已展示过。下一章还将展示更多示例。\n\n*   设置（批处理大小、获取大小等）在调整 Hibernate\
  \ 性能方面起着重要作用。你应该在会话工厂中定义它们，并在对应用程序进行负载测试时进行调整，以确定最佳值。\n\n总而言之，Hibernate 及其出色的 JPA\
  \ 支持（我们将在下一章讨论）对于寻求面向对象方式实现数据访问逻辑的 Java 开发者来说，是一个自然而然的选择。\n\n![](img/315511_6_En_7_Figg_HTML.jpg)一个灯泡的符号。 如果你有兴趣在项目中充分利用\
  \ Hibernate 的全部功能，你应该阅读 Vlad Mihalcea 的《高性能 Java 持久化》^(⁶⁴)。\n\n\n\n## 介绍 jOOQ\n\n\
  jOOQ 代表 Java 面向对象查询（Java Object Oriented Querying），它是一个用 Java 编写的数据库映射软件库，实现了活动记录模式^(⁶⁵)。它兼具关系型和面向对象的特点，并提供了一种领域特定语言，用于从数据库模式生成的类中构建查询。jOOQ\
  \ 以 SQL 为中心，专注于数据库。其功能非常强大：它可以生成映射到数据库记录的 POJO 类以及 DAO 类，并且支持大量的数据库^(⁶⁶)。此外，jOOQ\
  \ 可以与 Hibernate 集成：JPA 可用于修改操作，而 jOOQ 可用于生成复杂的原生 SQL 查询，这些查询可以通过 JPA 原生查询来执行。\n\n\
  本节将向您展示如何使用 jOOQ 生成 POJO 和 DAO，以及如何在 Spring 应用程序中配置 jOOQ 以使用它们。\n\n![](img/315511_6_En_7_Figh_HTML.jpg)一个符号在圆形背景上描绘了一个明亮的感叹号。 自\
  \ jOOQ 3.15 起，商业版未发布到 Maven Central，仅可从 jOOQ 网站^(⁶⁷)获取。该发行版可以下载为 ZIP 文件，其中包含用于将构件发布到本地仓库的脚本（通过\
  \ `mvn install` 或 `mvn deploy`）。我们的建议是运行适用于您操作系统的 `maven-install` 脚本。在撰写本章时，最新版本是\
  \ 3.16.7。\n\n![](img/315511_6_En_7_Figi_HTML.jpg)一个符号在水平线上描绘了一个火焰标记。 由于使用 jOOQ 需要您先在计算机上手动安装它，我们创建了项目\
  \ `chapter07-jooq`，它不属于本书的完整构建。要将其添加到完整构建中，请根据您选择的构建工具，从主 `pom.xml` 或 `settings.gradle`\
  \ 中移除注释掉的配置片段。\n\n假设您已成功将 jOOQ 库安装到本地 Maven 仓库中，下一步是将必要的库添加到您的 Maven/Gradle 配置中。幸运的是，用于代码生成的\
  \ `jooq-codegen.jar` 文件依赖于主要的 `jooq.jar` 和 `jooq-meta.jar` 文件，这些文件将作为其传递依赖项添加到项目中。\n\
  \n之后，我们需要生成 jOOQ 类。有多种方法可以实现：\n\n*   使用 `org.jooq.codegen.GenerationTool` 和 XML\
  \ 配置的编程方式\n*   使用 `org.jooq.codegen.GenerationTool` 并在 Java 代码中进行显式配置的编程方式\n*  \
  \ `jooq-codegen-maven` 插件\n*   `nu.studer.jooq` 插件\n\n在 `chapter07-jooq` 中，这两个插件都已配置好，您可以在克隆仓库后查看。然而，在清单\
  \ 7-35 中，展示了 `GenerateJOOQSources` 类，这是一个可执行类，包含了两种编程式代码生成版本。\n\n```\npackage com.apress.prospring6.seven.util;\n\
  import org.jooq.codegen.GenerationTool;\nimport org.jooq.meta.jaxb.Configuration;\n\
  import org.jooq.meta.jaxb.Database;\nimport org.jooq.meta.jaxb.Generate;\nimport\
  \ org.jooq.meta.jaxb.Generator;\nimport org.jooq.meta.jaxb.Jdbc;\nimport org.jooq.meta.jaxb.Target;\n\
  // 其他导入语句已省略\npublic class GenerateJOOQSources {\nprivate static final Logger LOGGER\
  \ = LoggerFactory.getLogger(GenerateJOOQSources.class);\npublic static void main(String...\
  \ args) throws Exception {\nif (args.length > 0) { // 使用任意参数运行此版本\n// 编程式版本 1\n\
  LOGGER.info(\"... 使用带 XML 配置的编程式版本 1 生成 jOOQ ...\");\nURL resource = GenerateJOOQSources.class.getResource(\"\
  /jooq-config.xml\");\nassert resource != null;\nfinal File jooqCfg = Paths.get(resource.toURI()).toFile();\n\
  GenerationTool.generate(\nFiles.readString(jooqCfg.toPath())\n);\n} else {\n// 编程式版本\
  \ 2\nLOGGER.info(\"... 使用带编程式配置的编程式版本 2 生成 jOOQ ...\");\nGenerationTool.generate(new\
  \ Configuration()\n.withJdbc(new Jdbc()\n.withDriver(\"org.mariadb.jdbc.Driver\"\
  )\n.withUrl(\"jdbc:mariadb://localhost:3306/musicdb\")\n.withUser(\"prospring6\"\
  )\n.withPassword(\"prospring6\"))\n.withGenerator(new Generator()\n.withDatabase(new\
  \ Database()\n.withName(\"org.jooq.meta.mariadb.MariaDBDatabase\")\n.withInputSchema(\"\
  musicdb\")\n.withIncludes(\".*\"))\n.withGenerate(\nnew Generate()\n.withPojos(true)\n\
  .withPojosToString(true)\n.withDaos(true))\n.withTarget(new Target()\n.withPackageName(\"\
  com.apress.prospring6.seven.jooq.generated\")\n.withDirectory(\"./chapter07-jooq/src/main/generated\"\
  ))));\n}\n}\n}\n清单 7-35\n编程式 jOOQ 代码生成类\n```\n\n要运行第二个版本，只需使用一个参数（任意参数）执行该类。`jooq-config.xml`\
  \ 文件位于 `resources` 目录中，它包含与版本 2 中完整编程式版本相同的信息，但采用 XML 格式。\n\n![](img/315511_6_En_7_Figj_HTML.jpg)一个符号在水平线上描绘了一个火焰标记。 请注意，生成的源文件保存在名为\
  \ `generated` 的目录中，该目录与 `java` 目录位于同一层级，而 Maven 和 Gradle 知道 `java` 目录包含项目源文件。需要对\
  \ Maven 和 Gradle 进行一个小配置，以告知它们 `generated` 目录也包含项目的源文件。\n\n将生成的源文件与具体的项目源文件分开，是一种良好的实践，这有助于保持清晰，并避免因配置错误而导致生成的类覆盖具体类的风险。\n\
  \n如果未设置 `withDirectory` 属性，生成的源文件将被放入 `target/generated-sources` 目录。为了方便访问和可见性，我们决定将它们放在一个更显眼的位置。\n\
  \n一旦执行了 `GenerateJOOQSources`，`generated` 目录中应会填充大量类，如图 7-3 所示。\n\n![](img/315511_6_En_7_Fig3_HTML.jpg)\n\
  \n一个图表展示了 chapter 07 jooq 文件夹中的文件位置路径。该文件夹包含 daos、pojos 和 records 文件。\n\n图 7-3\n\
  \n由 jOOQ 生成的类\n\n\n\n`generated` 目录中存在如此多类的原因在于，清单 7-35 中展示的配置通过以下代码片段请求了这些类：`withPojos(true).withPojosToString(true).withDaos(true)`。还有更多可用的选项，你可以在官方文档中找到它们全部。对于本书中的示例，我们仅配置了为\
  \ MariaDB 模式中的表生成 POJO 类、为这些类生成 `toString()` 方法（用于日志记录）以及生成 DAO 类来管理数据。生成的 POJO\
  \ 类看起来类似于 Hibernate 实体类，但没有注解。`daos` 包下的类与我们迄今为止编写的 DAO 类非常相似，只是返回的实例是 `pojos` 包中声明的类型。\n\
  \n现在我们有了这些类，接下来就使用它们。第一步是在 Spring 应用程序中配置 jOOQ 支持，这相当简单。jOOQ 的核心是一个名为 `org.jooq.DSLContext`\
  \ 的类。该类的实例是客户端代码访问与 `org.jooq.Query` 执行相关的 jOOQ 类和功能的主要入口点。要配置一个 `org.jooq.DSLContext`\
  \ bean，需要数据库连接、生成查询时使用的语法相关的一些细节以及其他类似的小配置。最重要的部分是数据库连接。本章前面介绍了 `BasicDataSourceCfg`\
  \ 配置类，它配置了一个 MariaDB `DataSource`；这个类可以重用，因为可以从它获取数据库连接。清单 7-36 展示了包含单个 `DSLContext`\
  \ 声明的 `JOOQConfig` 类。\n\n```\npackage com.apress.prospring6.seven.jooq.config;\n\
  import org.jooq.DSLContext;\nimport org.jooq.conf.RenderNameCase;\nimport org.jooq.conf.RenderQuotedNames;\n\
  import org.jooq.conf.Settings;\nimport org.jooq.impl.DSL;\nimport javax.sql.DataSource;\n\
  import java.sql.SQLException;\n// 其他导入语句已省略\n@Configuration\npublic class JOOQConfig\
  \ {\nprivate static Logger LOGGER = LoggerFactory.getLogger(JOOQConfig.class);\n\
  @Autowired\nDataSource dataSource;\n@Bean\nDSLContext dslContext() {\ntry {\nreturn\
  \ DSL.using(dataSource.getConnection(),\nnew Settings()\n.withRenderNameCase(RenderNameCase.UPPER)\n\
  .withRenderQuotedNames(RenderQuotedNames.NEVER)\n.withRenderSchema(false)\n.withRenderGroupConcatMaxLenSessionVariable(false));\n\
  } catch (SQLException ex) {\nLOGGER.error(\"初始化 jOOQ.DSLContext 时出现问题！\", ex);\n\
  }\nreturn null;\n}\n}\n清单 7-36\n启用 jOOQ 支持的 Spring 配置类\n```\n\n请注意，`BasicDataSourceCfg`\
  \ 配置类并未使用 `@Import` 导入。这是因为我们希望保持 jOOQ 配置的独立性，并且仅在创建上下文时才将其引入配置中。\n\n现在我们将使用新的配置类。即使生成的类不存在，也能保持项目编译的最简单方法是编写测试。jOOQ\
  \ 的另一个优点是它与 Spring Test 组件和 Testcontainers 集成得很好，这也使得编写测试更加容易。我们只需复制 `HibernateTest`\
  \ 类，并替换测试上下文注解配置以及每个方法的主体，*瞧*，我们就得到了一个测试由 jOOQ 的 `DSLContext` 生成的 SQL 原生查询的类。清单\
  \ 7-37 展示了 `JOOQDslTest` 中的几个测试方法，因为如果你不想使用 jOOQ 生成的 DAO，也可以不使用。\n\n```\npackage\
  \ com.apress.prospring6.seven;\nimport com.apress.prospring6.seven.base.config.BasicDataSourceCfg;\n\
  import com.apress.prospring6.seven.jooq.config.JOOQConfig;\nimport com.apress.prospring6.seven.jooq.generated.tables.records.SingerRecord;\n\
  import org.jooq.DSLContext;\nimport static com.apress.prospring6.seven.jooq.generated.tables.Singer.SINGER;\n\
  // 其他导入语句已省略\n@Testcontainers\n@SqlMergeMode(SqlMergeMode.MergeMode.MERGE)\n@Sql({\
  \ \"classpath:testcontainers/drop-schema.sql\", \"classpath:testcontainers/create-schema.sql\"\
  \ })\n@SpringJUnitConfig(classes = {BasicDataSourceCfg.class, JOOQConfig.class})\n\
  public class JOOQDslTest {\nprivate static final Logger LOGGER = LoggerFactory.getLogger(JOOQDslTest.class);\n\
  @Container\nstatic MariaDBContainer mariaDB = new MariaDBContainer(\"mariadb:10.7.4-focal\"\
  );\n@Autowired\nDSLContext dslContext;\n@Test\n@DisplayName(\"应返回所有歌手\")\nvoid findAll(){\n\
  Result singers = dslContext.selectFrom(SINGER).fetch();\nassertEquals(3, singers.size());\n\
  }\n@Test\n@DisplayName(\"应按 ID 返回歌手\")\nvoid testFindById(){\nSingerRecord singerRecord\
  \ = dslContext.selectFrom(SINGER).where(SINGER.ID.eq(2)).fetchOne();\nassertNotNull(singerRecord);\n\
  assertEquals(\"Ben\", singerRecord.getFirstName());\n}\n// 其他代码已省略\n}\n清单 7-37\n\
  测试 jOOQ 的 DSLContext\n```\n\n请注意，jOOQ 的语法看起来很像 SQL。此外，如果 `org.jooq` 的日志记录配置为 `DEBUG`，则在运行\
  \ `JOOQDslTest` 类时，生成的 SQL 查询以及结果都会输出到控制台。清单 7-38 展示了一个日志示例。\n\n```\nDEBUG: JooqLogger\
  \ - 正在执行查询       : select SINGER.ID, SINGER.VERSION, SINGER.FIRST_NAME, SINGER.LAST_NAME,\
  \ SINGER.BIRTH_DATE from SINGER\nDEBUG: JooqLogger - 获取的结果        : +----+-------+----------+---------+----------+\n\
  DEBUG: JooqLogger -                       : |  ID|VERSION|FIRST_NAME|LAST_NAME|BIRTH_DATE|\n\
  DEBUG: JooqLogger -                       : +----+-------+----------+---------+----------+\n\
  DEBUG: JooqLogger -                       : |   1|      0|John      |Mayer    |1977-10-16|\n\
  DEBUG: JooqLogger -                       : |   2|      0|Ben       |Barnes   |1981-08-20|\n\
  DEBUG: JooqLogger -                       : |   3|      0|John      |Butler   |1975-04-01|\n\
  DEBUG: JooqLogger -                       : +----+-------+----------+---------+----------+\n\
  DEBUG: JooqLogger - 获取的行数        : 3\n...\nDEBUG: JooqLogger - 正在执行查询       : select\
  \ SINGER.ID, SINGER.VERSION, SINGER.FIRST_NAME, SINGER.LAST_NAME, SINGER.BIRTH_DATE\
  \ from SINGER where SINGER.ID = ?\nDEBUG: JooqLogger --> 绑定值    : select SINGER.ID,\
  \ SINGER.VERSION, SINGER.FIRST_NAME, SINGER.LAST_NAME, SINGER.BIRTH_DATE from SINGER\
  \ where SINGER.ID = 2\nDEBUG: JooqLogger - 获取的结果        : +----+-------+----------+---------+----------+\n\
  DEBUG: JooqLogger -                       : |  ID|VERSION|FIRST_NAME|LAST_NAME|BIRTH_DATE|\n\
  DEBUG: JooqLogger -                       : +----+-------+----------+---------+----------+\n\
  DEBUG: JooqLogger -                       : |   2|      0|Ben       |Barnes   |1981-08-20|\n\
  DEBUG: JooqLogger -                       : +----+-------+----------+---------+----------+\n\
  DEBUG: JooqLogger - 获取的行数        : 1\n清单 7-38\nJOOQDslTest 类执行的日志片段\n```\n\n\n\n\
  很简洁，对吧？那如何检索带有专辑的歌手呢？这显然需要一个 `join`。这同样可以实现，但需要一些手动操作。好处是我们可以设计类来存储数据，并简化它们，使其只保存必要的数据。例如，我们创建了一个名为\
  \ `SingerWithAlbums` 的记录，它只包含 `firstName`、`lastName` 和 `List<AlbumRecord>`。顾名思义，`AlbumRecord`\
  \ 也是一个记录，只声明了两个字段：`title` 和 `releaseDate`。清单 7-39 展示了这两个记录以及使用 `DSLContext` 加载信息的测试方法。\n\
  \n```\n// ---------\n// SingerWithAlbums.java\npublic record SingerWithAlbums(String\
  \ firstName,\nString lastName,\nLocalDate birthDate,\nList albums) {\n}\n// ---------\n\
  // AlbumRecord.java\npublic record AlbumRecord( String title, LocalDate releaseDate)\
  \ {}\n// ---------\n// JOOQDslTest.java\nimport com.apress.prospring6.seven.jooq.records.SingerWithAlbums;\n\
  import com.apress.prospring6.seven.jooq.records.AlbumRecord;\nimport static com.apress.prospring6.seven.jooq.generated.tables.Singer.SINGER;\n\
  import static com.apress.prospring6.seven.jooq.generated.tables.Album.ALBUM;\nimport\
  \ static org.jooq.Records.mapping;\nimport static org.jooq.impl.DSL.multisetAgg;\n\
  @Test\n@DisplayName(\"should return all singers with albums as records\")\nvoid\
  \ findAllWithAlbumsAsRecords(){\nList singerWithAlbums =\ndslContext.select(SINGER.FIRST_NAME,\
  \ SINGER.LAST_NAME, SINGER.BIRTH_DATE,\nmultisetAgg(ALBUM.TITLE, ALBUM.RELEASE_DATE).convertFrom(r\
  \ -> r.map(mapping(AlbumRecord::new))))\n.from(SINGER)\n.innerJoin(ALBUM).on(ALBUM.SINGER_ID.eq(SINGER.ID))\n\
  .groupBy(SINGER.FIRST_NAME, SINGER.LAST_NAME,SINGER.BIRTH_DATE)\n.fetch(mapping(SingerWithAlbums::new));\n\
  assertEquals(2, singerWithAlbums.size());\n}\n清单 7-39\njOOQ 执行连接查询的方式\n```\n\n为了确保我们只获取数据库中有专辑的歌手，我们使用了\
  \ `innerJoin(..)` 方法。`multisetAgg(..)` 方法用于将专辑的列聚合到 `AlbumRecord` 中。由于我们不希望出现重复条目，因此还需要调用\
  \ `groupBy(..)`。你可能已经注意到，这里的 Java 代码看起来很像它的 SQL 等价物，这使得编写代码非常容易，并能确保只提取你感兴趣的数据。`SINGER`\
  \ 实例的类型是 `com.apress.prospring6.seven.jooq.generated.tables.Singer`，它封装了所有支持编写涉及\
  \ `SINGER` 表的 jOOQ 查询的元数据。`ALBUM` 和本例中未使用的 `INSTRUMENT` 也是如此。\n\n![](img/315511_6_En_7_Figk_HTML.jpg)一个灯泡符号。 如果你不想自己生成这些类，仓库中包含了生成类的一个版本。\n\
  \n清单 7-40 展示了 `findAllWithAlbumsAsRecords()` 日志的一个片段，显示了生成的查询和检索到的数据。\n\n```\nDEBUG:\
  \ JooqLogger - Executing query          : select SINGER.FIRST_NAME, SINGER.LAST_NAME,\
  \ SINGER.BIRTH_DATE,\nJSON_MERGE_PRESERVE('[]', CONCAT('[', GROUP_CONCAT(JSON_ARRAY(ALBUM.TITLE,\
  \ ALBUM.RELEASE_DATE) separator ','), ']'))\nfrom SINGER\njoin ALBUM on ALBUM.SINGER_ID\
  \ = SINGER.ID\ngroup by SINGER.FIRST_NAME, SINGER.LAST_NAME, SINGER.BIRTH_DATE\n\
  DEBUG: JooqLogger - Fetched result:  +----------+---------+----------+------------------------------------------+\n\
  DEBUG: JooqLogger -                : |FIRST_NAME|LAST_NAME|BIRTH_DATE|multiset_agg\
  \                              |\nDEBUG: JooqLogger -                : +----------+---------+----------+------------------------------------------+\n\
  DEBUG: JooqLogger -                : |Ben       |Barnes   |1981-08-20|[AlbumRecord[title=11:11,\
  \ releaseDate=..]]|\nDEBUG: JooqLogger -                : |John      |Mayer    |1977-10-16|AlbumRecord[title=The\
  \ Search For .., r...|\nDEBUG: JooqLogger -                : +----------+---------+----------+------------------------------------------+\n\
  DEBUG: JooqLogger - Fetched row(s) : 2\n清单 7-40\nfindAllWithAlbumsAsRecords() 日志片段，显示\
  \ jOOQ 生成的查询\n```\n\n在这个例子中，为了保持对象的紧凑，我们使用了一些简化的记录来表示歌手和专辑。这就是 Hibernate 可能与 jOOQ\
  \ 相遇的地方。我们可以不将 jOOQ 检索到的数据映射到记录，而是将其映射到 JPA 实体。\n\n编写 insert、update 和 delete 语句同样简单；你可以自行查看本书附带的示例，因为现在我们要介绍\
  \ jOOQ DAO 类。jOOQ 生成的 DAO 类都位于 `daos` 包下，并且都继承自 `org.jooq.impl.DAOImpl<R extends\
  \ UpdatableRecord<R>, P, T>`。这意味着对于 `SINGER` 表，创建了一个名为 `SingerDao` 的类，它继承自 `DAOImpl<SingerRecord,\
  \ com.apress.prospring6.seven.jooq.generated.tables.pojos.Singer, Integer>`。这种类型的类在概念上与\
  \ Spring Data 生成的仓库实现非常相似，本书稍后将介绍 Spring Data。`SingerRecord` 由 jOOQ 生成，其目的是表示一个持有主键并映射到数据库记录的\
  \ `Singer` 实例。这种类型的类设计为 jOOQ 内部使用，因此你永远不需要直接使用它们。`com.apress.prospring6.seven.jooq.generated.tables.pojos.Singer`\
  \ 是它之上的一个视图，你可以在代码中使用它与 jOOQ DAO 类进行交互。\n\n基于上述较为抽象的理解，让我们看看如何测试 jOOQ DAO 类。清单 [7-41\
  \ 展示了两个非常简单的测试方法，用于测试 `SingerDao` 类。\n\n```\npackage com.apress.prospring6.seven;\n\
  import com.apress.prospring6.seven.base.config.BasicDataSourceCfg;\nimport com.apress.prospring6.seven.jooq.config.JOOQConfig;\n\
  import com.apress.prospring6.seven.jooq.generated.tables.daos.SingerDao;\nimport\
  \ org.jooq.DSLContext;\n// 其他导入语句已省略\n@Testcontainers\n@SqlMergeMode(SqlMergeMode.MergeMode.MERGE)\n\
  @Sql({ \"classpath:testcontainers/drop-schema.sql\", \"classpath:testcontainers/create-schema.sql\"\
  \ })\n@SpringJUnitConfig(classes = {BasicDataSourceCfg.class, JOOQConfig.class})\n\
  public class JOOQDaoTest {\n@Container\nstatic MariaDBContainer mariaDB = new MariaDBContainer(\"\
  mariadb:10.7.4-focal\");\n@Autowired\nDSLContext dslContext;\n@Test\n@DisplayName(\"\
  should return all singers\")\nvoid findAll(){\nvar dao = new SingerDao(dslContext.configuration());\n\
