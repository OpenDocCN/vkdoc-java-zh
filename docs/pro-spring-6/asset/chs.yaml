  \ ID 为 6 的歌手，然后调用`singerDao.delete(..)`方法从数据库中删除该歌手记录。运行程序将产生清单 7-27 所示的输出。\n\n\
  ```\nHibernate:\n/* delete com.apress.prospring6.seven.base.entities.Album */ delete\n\
