  ```


  此外，如果你仔细查看生成的查询，可能会注意到，无论你在 GraphQL 查询中指定了哪些字段，当为数据库生成查询时，除非你显式编写一个 SQL 原生查询来指定要获取数据的列名，否则
  JPA 将生成一个包含所有列的 SQL 查询。从这个例子中，你可能会得出结论：GraphQL 并不像宣传的那样高效。不过，它仍然足够高效，足以让 Facebook
  成为全球使用最广泛的社交网络。


