  使用 RowMapper 的 findAll() 方法

  ```


  在清单 6-25 中，我们定义了一个名为 `SingerMapper` 的静态内部类，它实现了 `RowMapper<Singer>` 接口。该类需要提供 `mapRow()`
  的实现，该方法将 `ResultSet` 中特定记录的值转换为你想要的领域对象。在这个例子中使用了记录，因为它们存在且适合此示例。将其设为静态内部类允许你在同一个
  DAO 类中的多个查找方法之间共享 `RowMapper<Singer>`。如果不需要共享该类，则可以使用 Java 8 lambda 表达式完全跳过 `SingerMapper`
