  ]\n...\n清单 10-33\nEnvers 审计测试执行日志\n```\n\n请注意，对 `SINGER_AUDIT` 表的每次操作都会导致在 `REVINFO`\
  \ 和 `SINGER_AUDIT_H` 中创建一条记录。然后，当按特定修订版本提取 `SingerAudit` 条目时，会从 `SINGER_AUDIT_H`\
  \ 表中提取。更新操作后，`SingerAudit` 的名字被改为 *Riley B*。正如预期，查看历史记录时，在修订版本 1 中，名字是 *BB*。在修订版本\
  \ 2 中，名字变为 *Riley B.*。另请注意，修订版本 2 的 `lastModifiedDate` 日期和 `lastModifiedBy` 反映了更新的日期和时间，以及由\
  \ `AuditAware<String>` bean 生成的不同用户名。\n\n## Spring Boot Data JPA\n\n到目前为止，我们已经显式配置了所有内容，包括实体、数据库、仓库和服务。正如您现在可能预料到的，应该有一个\
  \ Spring Boot 启动器工件来简化操作。Spring Boot JDBC 在**第** **9** **章**中介绍过，但其功能在与 Spring Data\
  \ 结合使用时才真正大放异彩，并且有一个名为 `spring-boot-starter-data-jpa` 的启动器库。将此库添加到项目类路径中，会以传递方式添加\
  \ Spring 事务应用程序所需的所有依赖项：用于持久化的 `hibernate-core`、用于连接池的 `HikariCP`、用于使用数据仓库接口进行数据访问的\
  \ `spring-data-jpa`，以及用于事务管理的 `spring-tx`。项目依赖项如图 10-6 所示。\n\n![](img/315511_6_En_10_Fig6_HTML.jpg)\n\
  \n一张截图展示了第 10 章启动项目的依赖项。\n\n图 10-6\n\n显示 `chapter10-boot` 项目依赖项的 Gradle 视图\n\nSpring\
  \ Boot Data JPA 配置包含两部分：带有 `@SpringBootApplication` 注解的主类和 `application-dev.yaml`（或\
  \ `application-dev.properties`）文件。当然，添加 `-dev` 后缀是因为我们使用了名为 `dev` 的应用配置文件。这是一种根据上下文隔离\
  \ bean 声明的实用方法。\n\n对于此项目，`application-dev.yaml` 文件的内容如清单 10-34 所示。\n\n```\n# datasource\
  \ config\nspring:\ndatasource:\ndriverClassName: org.mariadb.jdbc.Driver\nurl: jdbc:mariadb://localhost:3306/musicdb?useSSL=false\n\
  username: prospring6\npassword: prospring6\n# HikariCP\nhikari:\nmaximum-pool-size:\
  \ 25\n# JPA config\njpa:\ngenerate-ddl: false\nproperties:\nhibernate:\nnaming:\n\
  physical-strategy:\njdbc:\nbatch_size: 10\nfetch_size: 30\nmax_fetch_depth: 3\n\
  show-sql: true\nformat-sql: false\nuse_sql_comments: false\nhbm2ddl:\nauto: none\n\
  # Logging config\nlogging:\npattern:\nconsole: \"%-5level: %class{0} - %msg%n\"\n\
  level:\nroot: INFO\norg.springframework.boot: DEBUG\ncom.apress.prospring6.ten.boot:\
  \ INFO\norg.springframework.orm.jpa: TRACE\n清单 10-34\nSpring Boot Data JPA 配置 yaml\
  \ 配置\n```\n\n配置分为三个部分：`datasource`、`jpa` 和 `logging`。以 `spring.datasource` 开头的属性用于设置配置数据源所需的值：连接\
  \ URL、凭据和连接池值。以 `spring.jpa` 开头的属性用于设置描述持久化单元的值。您可以轻松识别出**第** **7** **章**和**第**\
  \ **8** **章**中介绍的 Hibernate 属性。以 `logging` 开头的属性用于设置日志配置的典型值，在经典应用程序中，这些值可以在 `logback.xml`\
  \ 文件中找到。\n\n在 Spring Boot Data JPA 应用程序中，自动配置机制会根据配置文件中的属性负责声明必要的 bean，例如 `DataSource`、`EntityManager`、`LocalSessionFactoryBean`、`TransactionManager`\
  \ 等，但我们仍然需要配置一些内容：\n\n*   *实体类的位置*：由于 `LocalSessionFactoryBean` 是自动配置的，指定实体类所在包的方式是使用\
  \ `org.springframework.boot.autoconfigure.domain` 包中的 `@EntityScan` 注解。\n\n*   *数据仓库接口的位置*：这很容易实现，只需将\
  \ `@EnableJpaRepositories` 注解添加到带有 `@Configuration` 注解的类（如果有）上，或者如果没有这样的类，则添加到带有\
  \ `@SpringBootApplication` 注解的类上。\n\n*   *事务行为*：这也很容易实现，只需将 `@EnableTransactionManagement`\
  \ 注解添加到带有 `@Configuration` 注解的类（如果有）上，或者如果没有这样的类，则添加到带有 `@SpringBootApplication`\
  \ 注解的类上。\n\n\n\n本节分析的项目配置如清单 10-35 所示。\n\n```\npackage com.apress.prospring6.ten.boot;\n\
  import com.apress.prospring6.ten.boot.service.SingerService;\nimport org.slf4j.Logger;\n\
  import org.slf4j.LoggerFactory;\nimport org.springframework.boot.SpringApplication;\n\
  import org.springframework.boot.autoconfigure.SpringBootApplication;\nimport org.springframework.boot.autoconfigure.domain.EntityScan;\n\
  import org.springframework.core.env.AbstractEnvironment;\nimport org.springframework.data.jpa.repository.config.EnableJpaRepositories;\n\
  import org.springframework.transaction.annotation.EnableTransactionManagement;\n\
  @EntityScan(basePackages = {\"com.apress.prospring6.ten.boot.entities\"})\n@EnableTransactionManagement\n\
  @EnableJpaRepositories(\"com.apress.prospring6.ten.boot.repos\")\n@SpringBootApplication\n\
  public class Chapter10Application {\nprivate static final Logger LOGGER = LoggerFactory.getLogger(Chapter10Application.class);\n\
  public static void main(String... args) {\nSystem.setProperty(AbstractEnvironment.ACTIVE_PROFILES_PROPERTY_NAME,\
  \ \"dev\");\nvar ctx = SpringApplication.run(Chapter10Application.class, args);\n\
  var service = ctx.getBean(SingerService.class);\nLOGGER.info(\" ---- 列出歌手:\");\n\
  service.findAll().forEach(s -> LOGGER.info(s.toString()));\n}\n}\n清单 10-35\nSpring\
  \ Boot Data JPA 注解配置\n```\n\n如您所见，Spring Boot 主配置类包含一个 `main(..)` 方法。这使得该类可执行，运行该类\
  \ `main(..)` 方法中的代码可确保配置正确。然而，使用当前配置运行该类会以如下错误结束：\n\n```\nException in thread \"\
  main\" org.springframework.dao.InvalidDataAccessResourceUsageException:\nJDBC exception\
  \ executing SQL\n[select s1_0.id,\ns1_0.birth_date,\ns1_0.first_name,\ns1_0.last_name,\n\
  s1_0.version\nfrom singer s1_0\n]; SQL [n/a]\n...\nCaused by: java.sql.SQLSyntaxErrorException:\
  \ (conn=302) Table 'musicdb.singer' doesn't exist\nat org.mariadb.jdbc.export.ExceptionFactory.createException(ExceptionFactory.java:280)\n\
  at org.mariadb.jdbc.export.ExceptionFactory.create(ExceptionFactory.java:368)\n\
  ```\n\n那么，这是怎么回事呢？如果数据源配置正确，为什么找不到 `singer` 表？如果您认为原因是表名大小写敏感，那您说对了一部分。在解释这个 Spring\
  \ Boot Data JPA 应用程序中发生了什么之前，我们先来谈谈 Hibernate 的命名策略。\n\nHibernate 使用两种不同的命名策略^(⁹³)将名称从对象模型映射到相应的数据库名称：\n\
  \n*   `ImplicitNamingStrategy`：正确的逻辑名称由领域模型映射决定，要么通过配置注解（如 `@Column` 和 `@Table`，如您在前几章中所见），要么由\
  \ Hibernate 使用通过 `Environment.IMPLICIT_NAMING_STRATEGY / hibernate.implicit_naming_strategy`\
  \ 属性配置的 `org.hibernate.boot.model.naming.ImplicitNamingStrategy` 实现来确定。\n\n*   `PhysicalNamingStrategy`：正确的逻辑名称由\
  \ Hibernate 使用通过 `Environment.PHYSICAL_NAMING_STRATEGY / hibernate.physical_naming_strategy`\
  \ 属性配置的 `org.hibernate.boot.model.naming.PhysicalNamingStrategy` 实现来确定。\n\n这两种策略的目的是减少开发人员必须提供的显式配置。\n\
  \n许多组织围绕数据库对象（表、列、外键等）的命名制定了规则。`PhysicalNamingStrategy` 的理念是帮助实现此类命名规则，而无需通过显式名称将其硬编码到映射中。\n\
  \n我曾（Iuliana）工作过的几家公司更喜欢用大写字母命名数据库对象，因为在代码中更容易区分 HQL 和原生 SQL 查询。这也是我在本书中采用的方法。\n\
  \n在 Spring Boot Data JPA 应用程序中，确定数据库对象名称的默认策略是 Hibernate 提供的名为 `org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy`\
  \ 的 `PhysicalNamingStrategy` 实现。顾名思义，逻辑名称假定为驼峰式并用下划线分隔。这就是 `Singer` 实体类被映射到 `singer`\
  \ 表的原因，并且由于 MariaDB 安装在 Linux 容器上，数据库对象名称是大小写敏感的，因此 `SINGER` 显然不等于 `singer`。\n\n\
  这里的解决方案是提供我们自己的 `PhysicalNamingStrategy` bean，指示 Spring Boot 如何确定数据库对象名称。`PhysicalNamingStrategy`\
  \ 接口为每个命名的数据库对象声明了五个方法^(⁹⁴)。该接口的主体在清单 10-36 中声明。\n\n```\npackage org.hibernate.boot.model.naming;\n\
  import org.hibernate.Incubating;\nimport org.hibernate.engine.jdbc.env.spi.JdbcEnvironment;\n\
  @Incubating\npublic interface PhysicalNamingStrategy {\nIdentifier toPhysicalCatalogName(Identifier\
  \ logicalName, JdbcEnvironment jdbcEnvironment);\nIdentifier toPhysicalSchemaName(Identifier\
  \ logicalName, JdbcEnvironment jdbcEnvironment);\nIdentifier toPhysicalTableName(Identifier\
  \ logicalName, JdbcEnvironment jdbcEnvironment);\nIdentifier toPhysicalSequenceName(Identifier\
  \ logicalName, JdbcEnvironment jdbcEnvironment);\nIdentifier toPhysicalColumnName(Identifier\
  \ logicalName, JdbcEnvironment jdbcEnvironment);\n}\n清单 10-36\nHibernate 的 PhysicalNamingStrategy\
  \ 接口\n```\n\n![](img/315511_6_En_10_Figl_HTML.jpg)信息图标。 `@Incubating` 注解表示某些内容仍在积极开发中，因此可能会在以后发生变化。\n\
  \n为了简化操作，我们可以扩展 Hibernate 提供的 `PhysicalNamingStrategyImpl` 类，并仅覆盖我们感兴趣的方法。清单 10-37\
  \ 中显示的 `HibernateCfg` 配置类声明了一个匿名类型的 bean，该类型扩展了 `PhysicalNamingStrategyImpl`。\n\n\
  ```\npackage com.apress.prospring6.ten.boot;\nimport org.hibernate.boot.model.naming.Identifier;\n\
  import org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl;\nimport\
  \ org.hibernate.engine.jdbc.env.spi.JdbcEnvironment;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\n@Configuration(proxyBeanMethods\
  \ = false)\npublic class HibernateCfg {\n@Bean\nPhysicalNamingStrategyStandardImpl\
  \ caseSensitivePhysicalNamingStrategy() {\nreturn new PhysicalNamingStrategyStandardImpl()\
  \ {\n@Override\npublic Identifier toPhysicalTableName(Identifier logicalName, JdbcEnvironment\
  \ context) {\nreturn apply(logicalName, context);\n}\n@Override\npublic Identifier\
  \ toPhysicalColumnName(Identifier logicalName, JdbcEnvironment context) {\nreturn\
  \ apply(logicalName, context);\n}\nprivate Identifier apply(final Identifier name,\
  \ final JdbcEnvironment context) {\nif ( name == null ) {\nreturn null;\n}\nStringBuilder\
  \ builder = new StringBuilder( name.getText().replace( '.', '_' ) );\nfor ( int\
  \ i = 1; i < builder.length() - 1; i++ ) {\nif ( isUnderscoreRequired( builder.charAt(\
  \ i - 1 ), builder.charAt( i ), builder.charAt( i + 1 ) ) ) {\nbuilder.insert( i++,\
  \ '_' );\n}\n}\nreturn Identifier.toIdentifier(builder.toString().toUpperCase());\n\
  }\nprivate boolean isUnderscoreRequired(final char before, final char current, final\
  \ char after) {\nreturn Character.isLowerCase( before ) && Character.isUpperCase(\
  \ current ) && Character.isLowerCase( after );\n}\n};\n}\n}\n清单 10-37\n自定义 PhysicalNamingStrategy\
  \ 实现\n```\n\n`proxyBeanMethods` 属性设置为 `false`，因为此类中带有 `@Bean` 注解的方法不应被代理以强制执行 bean\
  \ 生命周期行为。用于确定表和列逻辑名称的代码在 `apply()` 方法中声明。\n\n\n\n使用这个新的配置类执行 `Chapter10Application`\
  \ 类，我们可以看到预期的输出（即歌手实例的字符串形式）被打印在控制台日志中。\n\n在经典的 Spring 应用程序中，仓库数据类和服务类与本章节展示的相同。测试方法也相同，唯一的区别在于测试上下文的配置。建议使用\
  \ `application-test.yaml` 或 `application-test.properties` 文件，因为数据源需要替换为 Testcontainers\
  \ 数据源。本节示例中使用的配置文件如代码清单 10-38 所示。\n\n```\nspring:\ndatasource:\nurl: \"jdbc:tc:mariadb:10.9-rc:///testdb?TC_INITSCRIPT=testcontainers/create-schema.sql\"\
  \njpa:\nproperties:\nhibernate:\njdbc:\nbatch_size: 10\nfetch_size: 30\nmax_fetch_depth:\
  \ 3\nshow-sql: true\nformat-sql: true\nuse_sql_comments: true\nhbm2ddl:\nauto: none\n\
  # 日志配置\nlogging:\npattern:\nconsole: \" %-5level: %class{0} - %msg%n\"\nlevel:\n\
  root: INFO\norg.springframework.boot: DEBUG\ncom.apress.prospring6.ten.boot: DEBUG\n\
  org.springframework.orm.jpa: TRACE\n代码清单 10-38\nSpring Boot Data JPA 测试配置 yaml 配置\n\
  ```\n\n请注意，用于调试的 Hibernate 特定属性被设置为 `true`，并且日志配置更加详细。\n\nSpring Boot 测试配置类使用 `@SpringBootTest`\
  \ 注解以及设置测试上下文所需的其他注解，如代码清单 10-39 所示。\n\n```\npackage com.apress.prospring6.ten.boot;\n\
  import org.springframework.boot.test.context.SpringBootTest;\nimport org.springframework.test.context.ActiveProfiles;\n\
  import org.springframework.test.context.jdbc.Sql;\nimport org.springframework.test.context.jdbc.SqlMergeMode;\n\
  import org.testcontainers.junit.jupiter.Testcontainers;\n// 其他 import 语句已省略\n@ActiveProfiles(\"\
  test\")\n@Testcontainers\n@SqlMergeMode(SqlMergeMode.MergeMode.MERGE)\n@Sql({ \"\
  classpath:testcontainers/drop-schema.sql\", \"classpath:testcontainers/create-schema.sql\"\
  \ })\n@SpringBootTest(classes = {Chapter10Application.class})\npublic class Chapter10ApplicationTest\
  \ {\nprivate static final Logger LOGGER = LoggerFactory.getLogger(Chapter10Application.class);\n\
  @Autowired\nSingerService singerService;\n@Test\npublic void testFindAll(){\nvar\
  \ singers = singerService.findAll().peek(s -> LOGGER.info(s.toString())).toList();\n\
  assertEquals(3, singers.size());\n}\n// 其他测试方法已省略\n}\n代码清单 10-39\nSpring Boot 数据测试类\n\
  ```\n\n告诉 Spring Boot 基于 `application-test.yaml` 中的配置初始化测试上下文的是 `@ActiveProfiles(\"\
  test\")` 注解，它启用了 `test` 上下文。`@SpringBootTest(classes = {Chapter10Application.class})`\
  \ 注解被显式配置为使用 `Chapter10Application` 配置。当只有一个 Spring Boot 测试类，且其名称恰好与 Spring Boot\
  \ 配置类名称加上 `Test` 后缀相同时，这不是必需的，但在本书的示例中，使用这种形式是为了更清晰，明确说明被测试 Bean 的配置来源。\n\n### 使用\
  \ Spring Data JPA 的注意事项\n\n使用 Spring Data JPA 的 Repository 抽象有助于简化 JPA 应用程序的开发。Spring\
  \ Boot 可以进一步简化开发，但自定义配置可能需要一些学习。再次引用**第** **6** **章**中介绍的《我爱露西》剧集“终于到巴黎”，Spring\
  \ Data JPA 是链条中的最后一个翻译器。它的工作基于其前的 JDBC 驱动、JPA 和 Hibernate（以及类似的，如 Oracle TopLink），它使得编写\
  \ Java 代码访问数据变得最容易，因为它专注于业务逻辑，并隐藏了技术复杂性和样板代码。所有这些技术层共同使得实现持久层变得相当容易和快速。Spring Data\
  \ JPA 也使得自定义事务行为变得容易。Spring Data（及其所依赖的框架）非常流行，适用于大型企业项目；对于较小的项目，可能有些大材小用。此外，项目中添加的技术越多，开发人员的学习曲线就越陡峭，并且在技术粘合点处增加的故障点也越多。\n\
  \n到目前为止，本章介绍了 Spring Data JPA 仓库的核心概念和接口。JPA 适用于处理规范化的 SQL 数据库。那么，当处理非结构化、非强关系型且不适合\
  \ SQL 数据库的数据时，该怎么办呢？Spring Data 是否为此提供了解决方案？当然！您可以在下一节中了解相关内容。\n\n\n\n## 使用 MongoDB\
  \ 的 Spring Data^(⁹⁵)\n\n几乎所有数据在某种程度上都是关系型的，多年来，通过外键等具体对象来表示这些关系的 SQL 数据库一直主导着行业。然而，为了减少数据重复和存储成本而组织数据，在处理这些数据时会引入延迟，因为必须考虑关系。随着数据量的增长，描述关系的元数据量也在增长，操作会变得更慢。关系型数据库非常适合完成那些涉及大量表、复杂且庞大的查询，并且事务性操作至关重要（ACID）而速度并非总是首要需求的任务。在执行大型级联删除的同时保持关系和数据完整性，也是关系型数据库的另一个良好用例。\n\
  \n在这个互联网新时代，速度是最常见的要求。SQL 数据库虽然在存储数据方面高效，并且在请求时提供数据非常精确和一致，但并不适用于速度比数据完整性更重要的互联网服务。当你的数据结构化程度不高、关系不深、需要短时间保存数据（缓存）或查询不太复杂时，NoSQL\
  \ 数据库就很有用。例如，eBay 正在使用名为 MongoDB 的 NoSQL 数据库，而亚马逊正在使用 DynamoDB，这是一个为满足其自身商业需求而创建的专有\
  \ NoSQL 数据库。DynamoDB 被认为是购物网站最合适的 NoSQL 数据库，因为它在亚马逊云中高度可定制、快速且可无限扩展。\n\n因此，NoSQL\
  \ 数据库的出现是为了满足快速获取数据的需求，即使数据并不总是一致。例如，当你访问亚马逊购物网站时，你并不期望立即获得最新的产品，但你最终会得到它们。此外，由于是非关系型的，NoSQL\
  \ 数据库存在一些数据重复，因此数据完整性次于检索速度。\n\n你需要记住的另一件事是，关系型数据库并不是真实系统的很好模型。它们迫使你在开始编写与它们交互的代码之前就声明完整的数据结构，并且之后进行修改很棘手，这是一个问题，因为在现实生活中变化是不断发生的。NoSQL\
  \ 的主要优势在于，除了每条记录的主标识符外，所有内容都可以在以后轻松修改。亚马逊的 DynamoDB 在这方面更进一步，因为除了主键之外，记录中的所有列（称为*属性*）都可以因记录而异。不幸的是，这种灵活性水平意味着编写用于处理\
  \ DynamoDB 的 Spring Data 库几乎是不可能的。\n\n由于 NoSQL 数据库已被广泛使用，因此添加一个关于 Spring 如何帮助与它们交互的章节是合适的。Spring\
  \ 提供了相当多的用于处理 NoSQL 数据库的数据库，但 Spring 团队最喜欢的是 MongoDB^(⁹⁶)，它提供了经典 API 和响应式 API。除此之外，还支持\
  \ Apache Cassandra^(⁹⁷)（一个开源 NoSQL 数据库管理系统，能够处理海量数据，并且速度也很快）、Couchbase^(⁹⁸)（一个现代云数据库，在高度可扩展和可用的平台上为关键业务应用提供强大的功能）和\
  \ Redis^(⁹⁹)（一个开源、BSD 许可的内存数据结构存储，用作数据库、缓存和消息代理）。\n\n最近，由于已经完全非关系型的数据并不存在，NoSQL\
  \ 这个术语的含义正逐渐从“非 SQL”转变为“不仅仅是 SQL”。因此，请随意探索 NoSQL 数据领域，因为你很可能最终会使用其中一种数据库。\n\n###\
  \ MongoDB 概念\n\n对于本节，你可以在计算机上安装 MongoDB，但推荐的方法是使用 Docker，并按照 `chapter10-mongo` 项目中\
  \ `CHAPTER10-MONGO.adoc` 文件中的建议设置容器。当然，你也可以完全跳过这一步，直接运行使用 Testcontainers MongoDB\
  \ 容器的测试。\n\nMongoDB 是一个面向文档的 NoSQL 数据库，用于高容量数据存储。与传统的使用表和行的关系型数据库不同，MongoDB 使用集合和文档。集合中的文档不像表中的所有行那样具有固定的结构。\n\
  \n虽然我们已经提到了 NoSQL 数据库的适用场景，但为了保持一致性，`Singer` 类被映射到一个名为 `singers` 的 MongoDB 集合。在\
  \ Spring 中，这是通过使用来自 `org.springframework.data.mongodb.core.mapping` 包的 `@Document`\
  \ 注解标注 `Singer` 类来完成的。这个注解对于配置与类名不同的集合名称很有用，因为 MongoDB 的标准是使用集合中文档类型的复数形式来命名集合。\n\
  \n`Singer` 类如清单 10-40 所示。\n\n```\npackage com.apress.prospring6.ten.document;\n\
  import org.springframework.data.mongodb.core.index.Indexed;\nimport org.springframework.data.mongodb.core.mapping.Document;\n\
  import org.springframework.data.mongodb.core.mapping.MongoId;\nimport java.time.LocalDate;\n\
  @Document(collection = \"singers\")\npublic class Singer {\n@MongoId\npublic String\
  \ id;\n@Indexed\npublic String firstName;\n@Indexed\npublic String lastName;\nprivate\
  \ LocalDate birthDate;\npublic Singer() {\n}\npublic Singer(String firstName, String\
  \ lastName, LocalDate birthDate) {\nthis.firstName = firstName;\nthis.lastName =\
  \ lastName;\nthis.birthDate = birthDate;\n}\n// getters & setters omitted\n}\n清单\
  \ 10-40\n配置为 MongoDB 文档的 Singer 类\n```\n\nMongoDB 要求所有文档都有一个 `_id` 字段。使用 Spring\
  \ Data，映射到该字段的字段使用来自 `org.springframework.data.mongodb.core.mapping` 的 `@Id` 或 `@MongoId`\
  \ 注解标注。`@MongoId` 注解是元注解了 `@Id` 的，虽然在这里使用是为了明确表明此类映射到一个 MongoDB 文档，但它提供了使用 `@MongoId(FieldType.*)`\
  \ 配置字段类型的可能性。当这样注解时，Spring Data 将尝试将值转换为声明的类型。\n\n`@Indexed` 注解告诉映射框架在文档的该属性上调用\
  \ `createIndex(..)`，从而使搜索更快。\n\n如果需要在文档中字段的名称与 Java 类中的名称不同，你可以使用 `@Field` 注解来配置所需的值。\n\
  \n在 Spring 中，类型通过一组内置转换器与 MongoDB 表示形式进行相互映射。这就是为什么我们可以在没有任何转换注解的情况下声明 `LocalDate\
  \ birthDate` 字段的原因。\n\n现在我们有了一个文档，下一步是创建一个用于处理 `Singer` 实例的仓库。该方法与 Spring Data JPA\
  \ 中展示的方法类似。在 Spring Data MongoDB 中，有一个 `MongoRepository<T, ID>` 接口，它是来自 `org.springframework.data.repository`\
  \ 包的 `CrudRepository<T, ID>` 接口的扩展（也有一个响应式版本，但更多内容将在**第** **20** 章中介绍），并且这是我们的 `SingerRepository`\
  \ 接口必须扩展的接口。`SingerRepository` 接口如清单 10-41 所示。\n\n\n\n```\npackage com.apress.prospring6.ten.repos;\n\
  import com.apress.prospring6.ten.document.Singer;\nimport org.springframework.data.mongodb.repository.MongoRepository;\n\
  import org.springframework.data.mongodb.repository.Query;\nimport org.springframework.data.repository.query.Param;\n\
  import java.time.LocalDate;\npublic interface SingerRepository extends MongoRepository\
  \ {\nIterable findByFirstName(String firstName);\n@Query(\"{'firstName' : ?0, 'lastName'\
  \ : ?1}\")\nIterable findByPositionedParams(String fn, String ln);\n@Query(\"{'firstName'\
  \ : :#{#fn}, 'lastName' : :#{#ln}}\")\nIterable findByNamedParams(@Param(\"fn\"\
  ) String fn, @Param(\"ln\") String ln);\n}\n清单 10-41\nSingerRepository MongoDB 数据仓库接口\n\
  ```\n\n这里介绍的 `SingerRepository` 接口包含两个 MongoDB 自定义查询。在编写 MongoDB 查询表达式时，参数可以按位置指定，也可以像\
  \ SQL 查询那样使用命名参数。唯一不同的是查询表达式的语法；MongoDB 查询本质上是 JSON 对象。`findByPositionedParams(..)`\
  \ 方法使用与参数顺序匹配的索引，`?0` 对应方法中的第一个参数，参数的值将替换 `?0`。这意味着开发者必须跟踪参数位置，不能混淆，因为虽然 MongoDB\
  \ 不会报错，但也不会返回预期结果。不过，查询表达式相当简单，因此这是推荐的方法。\n\n也可以使用命名参数，通过 `@Param` 注解和 SpEL 表达式来引用参数名称。表达式更复杂且冗长，但这种方法更灵活，并且没有错误定位参数的风险。选择你更习惯的方式即可。\n\
  \n正如我们已经习惯的那样，使用 `SingerService` Bean 来调用仓库方法，其实现较为基础，此处不再赘述。重要的是用于连接 MongoDB 实例并启用\
  \ Spring Data MongoDB 仓库支持的 Spring 配置。\n\n要连接 MongoDB 实例，需要一个 `com.mongodb.client.MongoClient`\
  \ 类型的 Bean。开发者可以直接在 `@Configuration` 类中声明此 Bean，如清单 10-42 所示。\n\n```\npackage com.apress.prospring6.ten.config;\n\
  import com.mongodb.client.MongoClients;\nimport com.mongodb.client.MongoClient;\n\
  @Configuration\npublic class MongoCfg {\n@Bean\npublic MongoClient mongoClient()\
  \ {\nreturn MongoClients.create(\"mongodb://prospring6:prospring6@localhost:27017/musicdb?authSource=admin\"\
  );\n}\n}\n清单 10-42\nMongoClient Bean 声明\n```\n\n`MongoClients.create(..)` 静态方法用于根据作为参数提供的连接字符串创建\
  \ `MongoClient` 实例。清单中的连接字符串基于以下模板构建：\n\n```\nmongodb://[username:password@]host1[:port1][,...hostN[:portN]][/[defaultauthdb][?options]]\n\
  ```\n\n本节中使用的具体连接字符串包含以下部分：\n\n*   以 `mongodb://` 开头，表示我们使用的驱动程序类型（类似于 MySQL 连接字符串以\
  \ `jdbc:` 开头）。\n*   `prospring6:prospring6` 表示用于连接 MongoDB 数据库的 `用户名:密码`。\n*   `localhost`\
  \ 表示数据库安装的位置，在本例中为代码执行的同一台机器（或由本地 Docker 运行时管理的容器中）。\n*   `27017` 表示连接端口。\n*   `musicdb`\
  \ 是数据库名称，`prospring6` 用户必须对其拥有 `dbOwner` 角色。\n*   `authSource=admin` 是一个参数，指向用户数据所在的集合，以便根据该集合检查提供的用户名和密码。\n\
  \n这种创建 `MongoClient` 的方式是最直接的。使用 Spring Data MongoDB 时，推荐的方法是声明一个 Spring `MongoClientFactoryBean`，如清单\
  \ 10-43 所示。\n\n```\npackage com.apress.prospring6.ten.config;\nimport org.springframework.data.mongodb.core.MongoClientFactoryBean;\n\
  @Configuration\npublic class MongoCfg {\n@Bean\npublic MongoClientFactoryBean mongoClientFactory()\
  \ {\nMongoClientFactoryBean mongo = new MongoClientFactoryBean();\nmongo.setConnectionString(\"\
  mongodb://prospring6:prospring6@localhost:27017/musicdb?authSource=admin\");\nreturn\
  \ mongo;\n}\n}\n清单 10-43\nMongoClientFactoryBean Bean 声明\n```\n\n通过使用 `@EnableMongoRepositories`\
  \ 注解配置类来启用 MongoDB 数据仓库的支持。如果未配置基础包，基础设施将扫描注解配置类所在的包。\n\nSpring MongoDB 数据仓库使用 `org.springframework.data.mongodb.core.MongoTemplate`\
  \ Bean 与 MongoDB 实例交换数据，因此也必须创建此 Bean。清单 10-44 显示了完整的配置类，其中连接字符串从 `mongo.properties`\
  \ 文件中读取。\n\n```\n/** === 'mongo.properties' 文件内容 ===\nmongo.url=mongodb://prospring6:prospring6@localhost:27017/musicdb?authSource=admin\n\
  mongo.db=musicdb\n*/\npackage com.apress.prospring6.ten.config;\nimport org.springframework.data.mongodb.core.MongoTemplate;\n\
  import org.springframework.data.mongodb.core.MongoClientFactoryBean;\n@ComponentScan(basePackages\
  \ = {\"com.apress.prospring6.ten.service\"})\n@EnableMongoRepositories(basePackageClasses\
  \ = SingerRepository.class)\n@Configuration\n@PropertySource(\"classpath:mongo.properties\"\
  )\npublic class MongoCfg {\n@Value(\"${mongo.url}\")\nprivate String url;\n@Bean\n\
  public MongoClientFactoryBean mongoClientFactory() {\nMongoClientFactoryBean mongo\
  \ = new MongoClientFactoryBean();\nmongo.setConnectionString(url);\nreturn mongo;\n\
  }\n@Bean\npublic MongoTemplate mongoTemplate() {\nreturn new MongoTemplate(mongoClientFactory());\n\
  }\n}\n清单 10-44\nSpring Data MongoDB 应用程序完整配置\n```\n\n到目前为止一切顺利，但 Spring 可以用 MongoDB\
  \ 做更多事情，因此它提供了 `AbstractMongoClientConfiguration` 类，该类声明了许多 MongoDB 特定的基础设施 Bean。建议通过扩展此类并重写其\
  \ `mongoClientSettings()` 方法来配置你的 MongoDB 应用程序，以提供连接字符串。基于此实例，Spring Data 会配置 `MongoClientFactoryBean`、`MongoTemplate`\
  \ 以及所有其他基础设施 Bean。如果需要自定义，可以重写其许多方法。清单 10-45 显示了扩展 `AbstractMongoClientConfiguration`\
  \ 类并重写其部分方法的 `MongoCfg` 版本，特别是重写 `autoIndexCreation()` 以开启自动索引创建，因为我们在配置中有使用 `@Indexed`\
  \ 注解的字段。\n\n\n\n```\npackage com.apress.prospring6.ten.config;\nimport com.mongodb.ConnectionString;\n\
  import com.mongodb.MongoClientSettings;\nimport org.springframework.data.mongodb.config.AbstractMongoClientConfiguration;\n\
  import org.springframework.data.mongodb.repository.config.EnableMongoRepositories;\n\
  // 其他导入语句已省略\n@ComponentScan(basePackages = {\"com.apress.prospring6.ten.service\"\
  })\n@EnableMongoRepositories\n@Configuration\n@PropertySource(\"classpath:mongo.properties\"\
  )\npublic class MongoCfg extends AbstractMongoClientConfiguration {\n@Value(\"${mongo.url}\"\
  )\nprivate String url;\n@Value(\"${mongo.db}\")\nprivate String database;\n@Override\n\
  protected String getDatabaseName() {\nreturn database;\n}\n@Override\nprotected\
  \ Collection getMappingBasePackages() {\nreturn Collections.singleton(\"com.apress.prospring6.ten.repos\"\
  );\n}\n@Override\npublic boolean autoIndexCreation() {\nreturn true;\n}\n@Override\n\
  protected MongoClientSettings mongoClientSettings() {\nMongoClientSettings.Builder\
  \ builder = MongoClientSettings.builder();\nbuilder.applyConnectionString(new ConnectionString(url));\n\
  this.configureClientSettings(builder);\nreturn builder.build();\n}\n}\n清单 10-45\n\
  扩展 AbstractMongoClientConfiguration 类的 MongoCfg 类\n```\n\n`getMappingBasePackages()`\
  \ 方法用于配置带有 `@Document` 注解的类所在的位置；如果未重写该方法，基础设施会扫描注解配置类所在的包及其子包。\n\n至于项目依赖，由于所有这些类都必须来自某个地方，项目的主要依赖是\
  \ `spring-data-mongodb` 和 `mongodb-driver-sync` 库。`mongodb-driver-sync` 库是 `mongodb-driver-core`\
  \ 的封装，用于提供与 MongoDB 实例交互时的经典行为。此外，`mongodb-driver-reactivestreams` 库中还提供了支持响应式行为的封装。图\
  \ 10-7 展示了 `chapter10-mongo` 项目的依赖关系。\n\n![](img/315511_6_En_10_Fig7_HTML.jpg)\n\
  \n截图展示了 chapter10-mongo 项目的依赖关系。\n\n图 10-7\n\n显示 `chapter10-mongo` 项目依赖关系的 Gradle\
  \ 视图\n\n这里需要提及的一点是，从 MongoDB 4.0 开始，也支持事务。事务建立在 `Sessions` 之上，因此需要一个活跃的 `com.mongodb.session.ClientSession`。如果未配置\
  \ `TransactionManager` Bean，则事务将被禁用。\n\nSpring 提供了 `MongoTransactionManager` 类用于\
  \ MongoDB 事务管理。`MongoTransactionManager` 类将 `ClientSession` 会话绑定到线程。`MongoTemplate`\
  \ 会检测该会话，并对这些与事务相关联的资源进行操作。由于 Spring Data MongoDB 仓库由 `MongoTemplate` Bean 支持，因此它们的方法会在事务上下文中执行。\n\
  \n清单 10-46 展示了为支持事务行为而修改后的 `MongoCfg` 类。\n\n```\npackage com.apress.prospring6.ten.config;\n\
  // 其他导入语句已省略\nimport org.springframework.data.mongodb.MongoDatabaseFactory;\nimport\
  \ org.springframework.data.mongodb.MongoTransactionManager;\nimport org.springframework.transaction.annotation.EnableTransactionManagement;\n\
  @ComponentScan(basePackages = {\"com.apress.prospring6.ten.service\"})\n@EnableMongoRepositories(basePackages\
  \ = {\"com.apress.prospring6.ten.repos\"})\n@Configuration\n@PropertySource(\"classpath:mongo.properties\"\
  )\n@EnableTransactionManagement\npublic class MongoCfg extends AbstractMongoClientConfiguration\
  \ {\n@Bean\nMongoTransactionManager transactionManager(MongoDatabaseFactory dbFactory)\
  \ {\nreturn new MongoTransactionManager(dbFactory);\n}\n// 其他方法已省略\n}\n清单 10-46\n\
  配置了事务管理的 MongoCfg 类\n```\n\n通过此配置，`@Transactional` 可用于将 `SingerServiceImpl` 配置为事务性服务。同时也支持编程式事务，其语法与**第**\
  \ **9** **章**中展示的语法相同。\n\n由于 Spring Data 在其 API 中的一致性，为 Spring Data Mongo 应用程序编写测试与为\
  \ Spring Data JPA 应用程序编写测试并无区别。\n\n如果你对使用 Spring 和 MongoDB 感兴趣，Spring^(¹⁰⁰) 和 MongoDB^(¹⁰¹)\
  \ 的官方文档内容详实且易于理解。此外，欢迎尝试使用 Spring Boot MongoDB 启动器。本书的代码仓库中提供了一个简单的项目。\n\n## 使用\
  \ Spring Data 的考量\n\n无论你是使用 Spring Data JPA、MongoDB 还是其他针对特定数据库的模块，Spring Data 都能大大减少你需要完成的工作量。再加上\
  \ Spring Boot，甚至连配置工作也显著减少。然而，为了高效管理数据，你必须理解数据管理基础设施的所有构建模块。这正是本书的价值所在，因为它逐步构建所有层次，向你展示通过正确使用\
  \ Spring 提供的所有功能，你将节省多少精力。\n\n尽管如此，根据项目的规模和范围，使用 Spring Data 可能有些大材小用，因此在开始编写应用程序之前请考虑这一点。\n\
  \n这就像为你 83 岁、只需要打电话和接电话的祖母选择一部智能手机。由于她有关节炎，可能会经常摔手机。因此，给她买一部昂贵、复杂、易碎且提供许多她永远不会用到的功能的手机毫无意义，而一部翻盖手机就能满足她所有的需求。所以，请考虑你的项目试图满足的需求，并据此选择合适的工具。\n\
  \n\n\n## 总结\n\n由于这是数据访问系列章节的最后一章，因此有必要进行一个总体总结：\n\n*   JPA 是一个规范，它定义了用于对象关系映射和管理持久化对象的\
  \ API。在 Oracle 决定将其开源并捐赠给 Jakarta 之前，它一直是 JEE 的一部分。这触发了包名从 `javax` 到 `jakarta` 的重命名，并且你可能也会看到\
  \ JPA 这个缩写被扩展为 Jakarta Persistence API，而不是经典的 Java Persistence API。两者含义相同：都是指用于将数据库对象和操作映射到\
  \ Java 对象和操作的一组 Java 组件。\n\n*   所有 JPA 实现，例如 Hibernate 和 EclipseLink 的最新版本，都已与新规范保持一致。\n\
  \n*   Spring Data JPA 在 JPA 之上增加了一层，并使用了其所有特性，例如实体和关联映射、实体生命周期管理，并增加了其自身特性，例如 Spring\
  \ Data 的无代码仓库。\n\n*   有多个 Spring Data 库，每个库都旨在减少使用特定数据库时的样板代码。Spring Data JPA 适用于任何关系型数据库。对于\
  \ NoSQL 数据库，有多个库可用于 MongoDB、CouchBase、Redis 等。\n\n*   通过声明一个 `TransactionManager`\
  \ bean 并使用 Spring 的 `@Transactional` 注解标注服务类和方法，可以轻松配置事务行为。关系型数据库和非关系型数据库的配置方式相同，只是\
  \ `TransactionManager` 的类型不同。\n\n*   Spring Data Boot 启动器库通过减少配置应用程序所需编写的代码，降低了开发人员与数据库交互的工作量。\n\
  \n*   Testcontainers 是一个用于测试需要数据库的 Spring 应用程序的出色工具，因为它易于设置，允许你重用大部分生产范围的配置。这使你能够在尽可能接近生产环境的测试上下文中运行集成测试。当然，它要求你已安装\
  \ Docker 并能访问互联网，以便在需要时拉取容器镜像。\n\n数据访问系列章节到此结束。在**第** **20** **章**的“响应式数据访问”部分，会再次简要提及数据访问主题。\n\
