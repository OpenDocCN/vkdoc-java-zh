  ### 使用可组合切入点


  在之前的切入点示例中，我们为每个通知器只使用了一个切入点。在大多数情况下，这通常就足够了，但在某些情况下，您可能需要将两个或多个切入点组合在一起以实现所需的目标。假设您想要切入一个
  Bean 上的所有 getter 和 setter 方法。您有一个用于 getter 的切入点和一个用于 setter 的切入点，但没有一个同时适用于两者的切入点。当然，您可以创建一个包含新逻辑的另一个切入点，但更好的方法是使用
  `ComposablePointcut` 将这两个切入点组合成一个切入点。


  `ComposablePointcut` 支持两个方法：`union()` 和 `intersection()`。默认情况下，`ComposablePointcut`
  使用一个匹配所有类的 `ClassFilter` 和一个匹配所有方法的 `MethodMatcher` 创建，尽管您可以在构造期间提供自己的初始 `ClassFilter`
  和 `MethodMatcher`。`union()` 和 `intersection()` 方法都被重载以接受 `ClassFilter` 和 `MethodMatcher`
  参数。


  可以通过传入 `ClassFilter`、`MethodMatcher` 或 `Pointcut` 接口的实例来调用 `ComposablePointcut.union()`
  方法。联合操作的结果是，`ComposablePointcut` 将向其调用链中添加一个“或”条件以匹配连接点。`ComposablePointcut.intersection()`
  方法也是如此，但这次将添加一个“与”条件，这意味着 `ComposablePointcut` 内的所有 `ClassFilter`、`MethodMatcher`
  和 `Pointcut` 定义都必须匹配才能应用通知。您可以将其想象为 SQL 查询中的 `WHERE` 子句，`union()` 方法类似于“或”运算符，而
  `intersection()` 方法类似于“与”运算符。


  与控制流切入点一样，这很难形象化，通过示例来理解要容易得多。清单 5-33 显示了前面示例中使用的 `GrammyGuitarist` 类及其四个方法。


  ```

  package com.apress.prospring6.five.common;

  // 其他导入语句已省略

  public class GrammyGuitarist implements Singer {

  private static Logger LOGGER = LoggerFactory.getLogger(GrammyGuitarist.class);

  @Override

  public void sing() {

  LOGGER.info("sing: Gravity is working against me\n" +

  "And gravity wants to bring me down");

  }

  public void sing(Guitar guitar) {

  LOGGER.info("play: " + guitar.play());

  }

  public void talk(){

  LOGGER.info("talk");

  }

  @Override

  public void rest(){

  LOGGER.info("zzz");

  }

  }

  清单 5-33

  GrammyGuitarist 实现

  ```


  在这个示例中，我们将使用同一个 `ComposablePointcut` 实例生成三个代理，但每次，我们将使用 `union()` 或 `intersection()`
  方法来修改 `ComposablePointcut`。之后，我们将在目标 Bean 代理上调用所有三个方法，并查看哪些方法已被通知。清单 5-34 描述了这一点。


  ```

  package com.apress.prospring6.five;

  import org.springframework.aop.support.ComposablePointcut;

  import org.springframework.aop.support.StaticMethodMatcher;

  // 其他导入语句已省略

  public class ComposablePointcutDemo {

  private static Logger LOGGER = LoggerFactory.getLogger(ComposablePointcutDemo.class);

  public static void main(String... args) {

  GrammyGuitarist johnMayer = new GrammyGuitarist();

  ComposablePointcut pc = new ComposablePointcut(ClassFilter.TRUE, new SingMethodMatcher());

  LOGGER.info("测试 1 >> ");

  GrammyGuitarist proxy = getProxy(pc, johnMayer);

  testInvoke(proxy);

  LOGGER.info("测试 2 >> ");

  pc.union(new TalkMethodMatcher());

  proxy = getProxy(pc, johnMayer);

  testInvoke(proxy);

  LOGGER.info("测试 3 >> ");

  pc.intersection(new RestMethodMatcher());

  proxy = getProxy(pc, johnMayer);

  testInvoke(proxy);

  }

  private static GrammyGuitarist getProxy(ComposablePointcut pc, GrammyGuitarist target)
  {

  Advisor advisor = new DefaultPointcutAdvisor(pc, new SimpleBeforeAdvice());

  ProxyFactory pf = new ProxyFactory();

  pf.setTarget(target);

  pf.addAdvisor(advisor);

  return (GrammyGuitarist) pf.getProxy();

  }

  private static void testInvoke(GrammyGuitarist proxy) {

  proxy.sing();

  proxy.sing(new Guitar());

  proxy.talk();

  proxy.rest();

  }

  }

  class SingMethodMatcher extends StaticMethodMatcher {

  @Override

  public boolean matches(Method method, Class cls) {

  return (method.getName().startsWith("si"));

  }

  }

  class TalkMethodMatcher extends StaticMethodMatcher {

  @Override

  public boolean matches(Method method, Class cls) {

  return "talk".equals(method.getName());

  }

  }

  class RestMethodMatcher extends StaticMethodMatcher {

  @Override

  public boolean matches(Method method, Class cls) {

  return (method.getName().endsWith("st"));

  }

  }

  清单 5-34

  测试 ComposablePointcut

  ```


  在这个示例中，首先要注意的是三个私有的 `MethodMatcher` 实现集。`SingMethodMatcher` 匹配所有以 ''si'' 开头的方法。这是我们用来组装
  `ComposablePointcut` 的默认 `MethodMatcher`。因此，我们期望对 `GrammyGuitarist` 方法的第一轮调用将导致只有
  `sing()` 方法被通知。


  `TalkMethodMatcher` 匹配所有名为 talk 的方法，并且它通过使用 `union()` 与 `ComposablePointcut` 组合，用于第二轮调用。此时，我们有两个
  `MethodMatcher` 的联合：一个匹配所有以 si 开头的方法，另一个匹配所有名为 talk 的方法。我们现在期望第二轮中的所有调用都将被通知。`TalkMethodMatcher`
  非常具体，只匹配 `talk()` 方法。这个 `MethodMatcher` 通过使用 `intersection()` 与 `ComposablePointcut`
  组合，用于第三轮调用。


  因为 `RestMethodMatcher` 是通过使用 `intersection()` 组合的，我们期望在第三轮中没有方法被通知，因为没有方法能匹配所有组合的
  `MethodMatcher`。


