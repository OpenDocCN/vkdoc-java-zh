  `@SpringBootTest` 注解确保测试上下文填充了在 Spring Boot 配置类中声明的 Bean，这意味着我们可以使用 `@Autowired`
  来访问测试上下文中的 Bean。


  当此测试通过时，意味着应用程序上下文已正确创建，两个类型为 `GrammyGuitarist` 和 `NewDocumentarist` 的 Bean 已创建，并且
  `GrammyGuitarist` Bean 是一个 CGLIB 代理，因为 JDK 代理不适合它，因为其类型未实现接口。


  这就是关于 Spring Boot AOP 的全部内容；Spring Boot 没有提供花哨的、专门的组件来简化 Spring AOP，因为几乎没有什么需要简化的。


  ### 声明式 Spring AOP 配置的注意事项


  本书展示了使用 Spring AOP 编写代码的两种方式：使用 `ProxyFactoryBean` 和使用 `@AspectJ` 风格的注解。XML AOP
  配置不是本书的重点，但其主要优点是易于将配置与代码分离。另一方面，如果您的应用程序主要基于注解，请使用 @AspectJ 注解。再次强调，让应用程序的需求驱动配置方法，并尽最大努力保持一致性。


  此外，`aop` 命名空间和 `@AspectJ` 注解方法之间还有一些其他区别：


  *   切入点表达式语法有一些细微差别（例如，在 XML 配置中，使用 `aop` 命名空间时，我们需要使用 `and` 来聚合条件，而在 `@AspectJ`
  注解中使用 `&&`）。


  *   在 XML 配置中，`aop` 命名空间方法仅支持 `singleton` 切面实例化模型。


  *   在 XML 配置中，使用 `aop` 命名空间时，无法“组合”多个切入点表达式。在使用 `@AspectJ` 的示例中，我们可以在前置通知和环绕通知中组合两个切入点定义（即
  `singExecution(value) && isJohn()`）。当使用 `aop` 命名空间并且需要创建一个组合了匹配条件的新切入点表达式时，您需要使用
  `ComposablePointcut` 类。


  ## 总结


  在本章中，我们涵盖了大量的 AOP 核心概念，并探讨了这些概念如何转化为 Spring AOP 实现。我们讨论了 Spring AOP 中已实现（和未实现）的特性，并指出
  AspectJ 是那些 Spring 未实现特性的 AOP 解决方案。我们花了一些时间详细解释了 Spring 中可用的通知类型，并展示了四种类型实际运行的示例。我们还研究了如何通过使用切入点来限制通知应用的方法。特别是，我们研究了
  Spring 提供的六种基本切入点实现。我们还详细介绍了 AOP 代理的构建方式、不同的选项以及它们的区别。我们比较了三种代理类型的性能，并强调了在 JDK 代理与
  CGLIB 代理之间进行选择时的一些主要差异和限制。我们涵盖了切入点的高级选项，以及如何使用引入来扩展对象实现的接口集。


  我们还介绍了 Spring 框架以声明方式配置 AOP 的服务，从而避免了将 AOP 代理构建逻辑硬编码到代码中的需要。我们花了一些时间研究 Spring 和
  AspectJ 如何集成，以允许您使用 AspectJ 的额外功能，同时不失去 Spring 的任何灵活性。这无疑是大量的 AOP 内容！


  在下一章中，我们将转向一个完全不同的主题——如何使用 Spring 的 JDBC 支持来极大地简化基于 JDBC 的数据访问代码的创建。


