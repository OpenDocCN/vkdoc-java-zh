  import java.util.Locale;

  @Configuration

  @ComponentScan(basePackages = {"com.apress.prospring6.fourteen.boot"})

  public class WebConfig implements WebMvcConfigurer {

  @Bean

  LocaleChangeInterceptor localeChangeInterceptor() {

