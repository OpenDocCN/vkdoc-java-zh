  \ 配置声明了以下 Bean 来支持 Hibernate 的会话工厂：\n\n表 7-1\n\nHibernate 属性\n\n\n\n| 属性（常量/值） |\
  \ 描述 |\n| --- | --- |\n| `Environment.FORMAT_SQL/hibernate.format_sql` | 指示是否应格式化日志或控制台中的\
  \ SQL 输出。默认值为 `false`。 |\n| `Environment.USE_SQL_COMMENTS/hibernate.use_sql_comments`\
  \ | 如果设置为 `true`，Hibernate 会在 SQL 内部生成注释，以便于调试。默认值为 `false`。 |\n| `Environment.SHOW_SQL/hibernate.show_sql`\
  \ | 指示 Hibernate 是否应将 SQL 查询输出到日志文件或控制台。在开发环境中应开启此选项，这能极大地帮助测试和故障排除过程。默认值为 `false`。\
  \ |\n| `Environment.MAX_FETCH_DEPTH/hibernate.max_fetch_depth` | 声明当映射对象与其他映射对象存在关联时，外连接的“深度”。此设置可防止\
  \ Hibernate 因大量嵌套关联而获取过多数据。常用值为 `3`。值为 `0` 则禁用默认的外连接获取。 |\n| `Environment.STATEMENT_BATCH_SIZE/hibernate.jdbc.batch_size`\
  \ | 指示 Hibernate 应将多少条更新操作分组为一个批次。这对于在 Hibernate 中执行批处理操作非常有用。显然，当我们在执行批处理任务更新数十万条记录时，我们希望\
  \ Hibernate 将查询分组为批次，而不是逐条提交更新。推荐值在 `5` 到 `30` 之间。 |\n| `Environment.STATEMENT_FETCH_SIZE/hibernate.jdbc.fetch_size`\
  \ | 指定 Hibernate 每次从底层 JDBC `ResultSet` 中检索数据库记录时，应获取的记录数。例如，向数据库提交了一个查询，`ResultSet`\
  \ 包含 500 条记录。如果获取大小设置为 50，Hibernate 将需要获取十次才能获取所有数据。 |\n| `Environment.JTA_PLATFORM/hibernate.transaction.jta.platform`\
  \ | 此属性（如果存在）应设置为一个限定类名，该名称代表 `org.hibernate.engine.transaction.jta.platform.spi.JtaPlatform`\
  \ 的一个实现，用于定义 Hibernate 在特定平台上如何与 JTA 交互。如果不存在，Hibernate 将使用默认的 `org.hibernate.engine.transaction.jta.platform.internal.NoJtaPlatform`，这意味着不使用任何事务。在我们的配置中，它被设置为\
  \ Spring 的 `ConfigurableJtaPlatform` 实现。由于本章不重点讨论事务，因此可以安全地从配置中移除该属性。 |\n| `Environment.HBM2DDL_AUTO/hibernate.hbm2ddl.auto`\
  \ | 传统上，从实体映射生成模式的过程被称为 HBM2DDL。此属性可以具有以下任一值：* `none` 告诉 Hibernate 不对现有模式做任何操作。*\
  \ `create` 告诉 Hibernate 生成与受管实体类匹配的模式。* `validate` 告诉 Hibernate 验证模式；它不会对数据库进行任何更改。*\
  \ `update` 告诉 Hibernate 根据实体类的更改来更新模式。* `create-drop` 告诉 Hibernate 创建与受管实体类匹配的模式，并在\
  \ `SessionFactory` 显式关闭时（通常在应用程序停止时）删除该模式。 |\n\n*   `dataSource`：此 bean 通过 `@Import`\
  \ 注解从 `BasicDataSourceCfg` 配置类导入，并通过自动装配注入到 `HibernateConfig` 类中。\n\n*   `transactionManager`：Hibernate\
  \ 会话工厂需要一个事务管理器来实现事务性数据访问。Spring 提供了一个专门用于 Hibernate 5 的事务管理器，声明在 `org.springframework.orm.hibernate5.HibernateTransactionManager`\
  \ 包中。该 bean 以 `transactionManager` 名称声明。默认情况下，使用 XML 配置时，每当需要事务管理时，Spring 都会在其 `ApplicationContext`\
  \ 中查找名为 `transactionManager` 的 bean。Java 配置则更灵活一些，因为它是按类型而非名称来查找 bean。我们将在**第**\
  \ **9** **章**中详细讨论事务。此外，配置类使用 `@EnableTransactionManagement` 注解，以支持使用注解声明事务边界需求（启用对\
  \ Spring 的 `@Transactional` 的支持）。\n\n*   *组件扫描*：`@ComponentScan` 注解在前面的章节中你应该已经熟悉。我们用它来指示\
  \ Spring 扫描 `com.apress.prospring6.seven` 包下的组件（由于这是配置类声明的包，因此未显式配置），以检测那些包含数据访问方法、并使用\
  \ `@Repository` 注解的 bean。\n\n*   `SessionFactory`：Hibernate 的 `sessionFactory` bean\
  \ 是此配置中最重要的部分。在该 bean 内部，配置了几个属性：\n    *   首先，我们需要将 `dataSource` bean 注入到 `sessionFactory`\
  \ bean 中。\n\n*   其次，我们指示 Hibernate 扫描 `com.apress.prospring6.seven.entities` 包下的领域对象。\n\
  \n*   最后，`hibernateProperties` bean 为 Hibernate 提供了配置细节。配置参数有很多，我们只定义了每个应用程序都应提供的几个重要属性。表\
  \ 7-1 列出了我们示例中 Hibernate 会话工厂的配置属性、常量名称及其 `String` 值；你可以在接口 `org.hibernate.cfg.AvailableSettings`\
  \ 中找到其他属性，该接口由 `org.hibernate.cfg.Environment` 实现。\n\n有关 Hibernate 支持的完整属性列表，请参考\
  \ Hibernate 的 ORM 用户指南^(⁶⁰)，特别是第 24.2 节。\n\n\n\n## 使用 Hibernate 注解进行 ORM 映射\n\n\
  配置就绪后，下一步是建模 Java POJO 实体类及其与底层关系型数据结构的映射。\n\n映射有两种方法。第一种是先设计对象模型，然后基于对象模型生成数据库脚本。将\
  \ Hibernate 属性 `hibernate.hbm2ddl.auto` 配置为 `create` 或 `create-drop` 即可实现此方法。然而，这种方法不适用于生产环境，而更适合使用内存数据库的测试环境，因为在这些环境中基于\
  \ Java POJO 生成表的操作成本不高。\n\n第二种方法是从数据模型（表）开始，然后使用所需的映射来建模 POJO。对于开发和生产环境，推荐使用后一种方法，因为它能对数据模型提供更多控制，有助于优化数据访问性能。基于数据模型，图\
  \ 7-2 展示了相应的 Java 对象模型类图。\n\n![](img/315511_6_En_7_Fig2_HTML.jpg)\n\n该图展示了 Singer\
  \ 与 Album 之间的一对多关系，以及 Singer 与 Instrument 之间的多对多关系。\n\n图 7-2\n\n示例数据模型的类图\n\n你可以看到\
  \ `Singer` 和 `Album` 之间存在一对多关系，而 `Singer` 和 `Instrument` 对象之间存在多对多关系。用于建模多对多关系的表\
  \ `SINGER_INSTRUMENT` 并未映射到 Java 类。\n\n注意，`Singer` 和 `Album` 都拥有共同的 `id` 和 `version`\
  \ 字段，它们被归入一个名为 `AbstractEntity` 的抽象类中，以简化其他实体类。在通常设置了审计功能的生产应用中，该抽象类可能包含的其他字段包括：`createdAt`、`updatedAt`、`createdBy`、`updatedBy`\
  \ 等。`AbstractEntity` 类使用了 `@MappedSuperclass` 注解，该注解指定一个类，其映射信息将应用于继承自它的实体。\n\n\
  ## 简单映射\n\n首先，我们从映射类的简单属性开始。清单 7-3 展示了 `AbstractEntity` 类，其映射信息由 `Singer` 和 `Album`\
  \ 继承。\n\n```\npackage com.apress.prospring6.seven.base.entities;\nimport jakarta.persistence.Column;\n\
  import jakarta.persistence.GeneratedValue;\nimport jakarta.persistence.Id;\nimport\
  \ jakarta.persistence.MappedSuperclass;\nimport jakarta.persistence.Version;\n//\
  \ 其他导入语句已省略\nimport static jakarta.persistence.GenerationType.IDENTITY;\n@MappedSuperclass\n\
  public abstract class AbstractEntity implements Serializable {\n@Serial\nprivate\
  \ static final long serialVersionUID = 1L;\nprotected Long id;\nprotected int version;\n\
  @Id\n@GeneratedValue(strategy = IDENTITY)\n@Column(name = \"ID\")\npublic Long getId()\
  \ {\nreturn this.id;\n}\npublic void setId(Long id) {\nthis.id = id;\n}\n@Version\n\
  @Column(name = \"VERSION\")\npublic int getVersion() {\nreturn version;\n}\npublic\
  \ void setVersion(int version) {\nthis.version = version;\n}\n// 其他方法已省略\n}\n清单\
  \ 7-3\nAbstractEntity 基础实体类\n```\n\n`AbstractEntity` 类不映射到任何表，但其配置中使用的注解也可能用于映射到表的类中。\n\
  \n清单 7-4 展示了带有映射注解的 `Singer` 类。\n\n```\npackage com.apress.prospring6.seven.base.entities;\n\
  import jakarta.persistence.Column;\nimport jakarta.persistence.Entity;\nimport jakarta.persistence.Table;\n\
  // 其他导入语句已省略\n@Entity\n@Table(name = \"SINGER\")\npublic class Singer extends AbstractEntity\
  \ {\n@Serial\nprivate static final long serialVersionUID = 2L;\nprivate String firstName;\n\
  private String lastName;\nprivate LocalDate birthDate;\n@Column(name = \"FIRST_NAME\"\
  )\npublic String getFirstName() {\nreturn this.firstName;\n}\n@Column(name = \"\
  LAST_NAME\")\npublic String getLastName() {\nreturn this.lastName;\n}\n@Column(name\
  \ = \"BIRTH_DATE\")\npublic LocalDate getBirthDate() {\nreturn birthDate;\n}\npublic\
  \ void setFirstName(String firstName) {\nthis.firstName = firstName;\n}\npublic\
  \ void setLastName(String lastName) {\nthis.lastName = lastName;\n}\npublic void\
  \ setBirthDate(LocalDate birthDate) {\nthis.birthDate = birthDate;\n}\n// 其他方法已省略\n\
  }\n清单 7-4\nSinger 实体类\n```\n\n首先，我们使用 `@Entity` 注解该类型，这意味着这是一个映射实体类。此外，使用 `@Entity`\
  \ 注解的类必须有一个使用 `@Id` 注解的列，该列代表该表的主键。`@Table` 注解定义了该实体映射到的数据库中的表名。对于每个映射的属性，你使用 `@Column`\
  \ 注解进行标注，并提供列名。\n\n![](img/315511_6_En_7_Fige_HTML.jpg)一个灯泡图标。 如果类型和属性名称与表和列名称相同，则可以省略表和列名称。\n\
  \n以下是此配置的几个要点：\n\n*   对于 `id` 属性，我们使用 `@Id` 注解。这意味着它映射到记录的主键。Hibernate 将在其会话中管理联系人实体实例时，将其用作唯一标识符。此外，`@GeneratedValue`\
  \ 注解告诉 Hibernate `id` 值是如何生成的。`IDENTITY` 策略意味着 `id` 值是在插入期间由后端生成的。\n\n\n\n*   对于`version`属性，我们使用`@Version`进行注解。这指示\
  \ Hibernate 我们希望使用*乐观锁定*机制，并以`version`属性作为控制手段。每当 Hibernate 更新一条记录时，它会将实体实例的版本与数据库中该记录的版本进行比较。如果两个版本相同，则意味着之前没有人更新过数据，因此\
  \ Hibernate 将更新数据并递增`version`列。然而，如果版本不同，则意味着之前有人更新过该记录，Hibernate 将抛出`StaleObjectStateException`异常，Spring\
  \ 会将其转换为`HibernateOptimisticLockingFailureException`。在此示例中，我们使用`Integer`进行版本控制。除了`integer`之外，Hibernate\
  \ 还支持使用`timestamp`。不过，建议使用整数进行版本控制，因为 Hibernate 会在每次更新后将版本号递增 1。使用时间戳时，Hibernate\
  \ 会在每次更新后更新最新的时间戳。时间戳的安全性稍差，因为两个并发事务可能会在同一毫秒内加载并更新同一个项目。\n\n另一个映射对象是`Album`，如清单\
  \ 7-5 所示。\n\n```\npackage com.apress.prospring6.seven.base.entities;\n// 其他导入语句已省略\n\
  @Entity\n@Table(name = \"ALBUM\")\npublic class Album extends AbstractEntity {\n\
  @Serial\nprivate static final long serialVersionUID = 3L;\nprivate String title;\n\
  private LocalDate releaseDate;\n@Column\npublic String getTitle() {\nreturn this.title;\n\
  }\n@Column(name = \"RELEASE_DATE\")\npublic LocalDate getReleaseDate() {\nreturn\
  \ this.releaseDate;\n}\npublic void setTitle(String title) {\nthis.title = title;\n\
  }\npublic void setReleaseDate(LocalDate releaseDate) {\nthis.releaseDate = releaseDate;\n\
  }\n// 其他方法已省略\n}\n清单 7-5\nAlbum 实体类\n```\n\n第三个实体类名为`Instrument`，映射到`INSTRUMENT`表，这是一个非常简单的表，只有一个列。引入此表只是为了在代码示例中体现多对多关系。此类如清单\
  \ 7-6 所示。\n\n```\npackage com.apress.prospring6.seven.base.entities;\n// 导入语句已省略\n\
  @Entity\n@Table(name = \"INSTRUMENT\")\npublic class Instrument implements Serializable\
  \ {\n@Serial\nprivate static final long serialVersionUID = 4L;\nprivate String instrumentId;\n\
  @Id\n@Column(name = \"INSTRUMENT_ID\")\npublic String getInstrumentId() {\nreturn\
  \ this.instrumentId;\n}\npublic void setInstrumentId(String instrumentId) {\nthis.instrumentId\
  \ = instrumentId;\n}\n// 其他方法已省略\n}\n清单 7-6\nInstrument 实体类\n```\n\n### 一对多映射\n\n\
  Hibernate 能够对多种关联进行建模。最常见的关联是一对多和多对多。在本章的源代码示例中，每个`Singer`拥有零个或多个专辑，因此这是一个一对多关联（在\
  \ ORM 术语中，一对多关联用于对数据结构中的零对多和一对多关系进行建模）。清单 7-7 描述了定义`Singer`和`Album`实体之间一对多关系所需的属性和方法。\n\
  \n```\npackage com.apress.prospring6.seven.base.entities;\nimport jakarta.persistence.OneToMany;\n\
  import jakarta.persistence.CascadeType;\n// 其他导入语句已省略\n// Singer.java\n@Entity\n\
  @Table(name = \"SINGER\")\npublic class Singer extends AbstractEntity {\nprivate\
  \ Set albums = new HashSet();\n@OneToMany(mappedBy = \"singer\", cascade=CascadeType.ALL,\
  \ orphanRemoval=true)\npublic Set getAlbums() {\nreturn albums;\n}\npublic boolean\
  \ addAlbum(Album album) {\nalbum.setSinger(this);\nreturn getAlbums().add(album);\n\
  }\npublic void removeAlbum(Album album) {\ngetAlbums().remove(album);\n}\npublic\
  \ void setAlbums(Set albums) {\nthis.albums = albums;\n}\n// 其他方法和属性已省略\n}\n// Album.java\n\
  import jakarta.persistence.ManyToOne;\nimport jakarta.persistence.JoinColumn;\n\
  // 其他导入语句已省略\n@Entity\n@Table(name = \"ALBUM\")\npublic class Album extends AbstractEntity\
  \ {\nprivate Singer singer;\n@ManyToOne\n@JoinColumn(name = \"SINGER_ID\")\npublic\
  \ Singer getSinger() {\nreturn this.singer;\n}\npublic void setSinger(Singer singer)\
  \ {\nthis.singer = singer;\n}\n// 其他方法和属性已省略\n}\n清单 7-7\n用于建模一对多和多对一关系的 Singer 和\
  \ Album 代码片段\n```\n\n属性`getAlbums`的 getter 方法使用`@OneToMany`进行注解，这表示与`Album`类的一对多关系。该注解传递了几个属性。`mappedBy`属性指示`Album`类中提供关联的属性（即，通过`FK_ALBUM_SINGER`表中的外键定义进行链接）。\n\
  \n`cascade`属性设置为`CascadeType.ALL`，意味着对`Singer`记录执行的任何操作都会传播到与其关联的专辑。`orphanRemoval`属性意味着，在`albums`集合更新后，集合中不再存在的`Album`条目应从数据库中删除。\n\
  \n`Singer`类声明了与`Album`关系的“一对多”部分。这意味着`Album`实体必须声明与`Singer`关系的“多对一”部分，这是通过使用`@ManyToOne`注解完成的。与之关联的`@JoinColumn`注解用于指定底层的外键列名。\n\
  \n### 多对多映射\n\n每个歌手可以演奏零个或多个乐器，每个乐器也与零个或多个歌手相关联，这意味着这是一个多对多映射。多对多映射需要一个连接表，在本例中为`SINGER_INSTRUMENT`。清单\
  \ 7-8 显示了需要添加到`Singer`类以实现此关系的代码。\n\n```\npackage com.apress.prospring6.seven.base.entities;\n\
  import jakarta.persistence.ManyToMany;\nimport jakarta.persistence.JoinTable;\n\
  import jakarta.persistence.JoinColumn;\n// 其他导入语句已省略\n// Singer.java\n@Entity\n\
  @Table(name = \"SINGER\")\npublic class Singer extends AbstractEntity {\nprivate\
  \ Set instruments = new HashSet();\n@ManyToMany\n@JoinTable(name = \"SINGER_INSTRUMENT\"\
  ,\njoinColumns = @JoinColumn(name = \"SINGER_ID\"),\ninverseJoinColumns = @JoinColumn(name\
  \ = \"INSTRUMENT_ID\"))\npublic Set getInstruments() {\nreturn instruments;\n}\n\
  public void setInstruments(Set instruments) {\nthis.instruments = instruments;\n\
  }\npublic boolean addInstrument(Instrument instrument) {\nreturn getInstruments().add(instrument);\n\
  }\n// 其他方法已省略\n}\n// Instrument.java\n@Entity\n@Table(name = \"INSTRUMENT\")\npublic\
  \ class Instrument implements Serializable {\nprivate Set singers = new HashSet();\n\
  @ManyToMany\n@JoinTable(name = \"SINGER_INSTRUMENT\",\njoinColumns = @JoinColumn(name\
  \ = \"INSTRUMENT_ID\"),\ninverseJoinColumns = @JoinColumn(name = \"SINGER_ID\"))\n\
  public Set getSingers() {\nreturn this.singers;\n}\npublic void setSingers(Set singers)\
  \ {\nthis.singers = singers;\n}\n// 其他方法已省略\n}\n清单 7-8\n用于建模多对多关系的 Singer 和 Instrument\
  \ 代码片段\n```\n\n`Singer`类中`instruments`属性的 getter 方法使用`@ManyToMany`进行注解。`@JoinTable`注解用于指示\
  \ Hibernate 应查找的底层连接表。`name`是连接表的名称，`joinColumns`定义了作为`SINGER`表外键的列，`inverseJoinColumns`定义了作为关联另一端（即`INSTRUMENT`表）外键的列。`Instrument`类中的代码与`Singer`的代码大致相同，但`joinColumns`和`inverseJoinColumns`属性被互换以反映关联关系。\n\
  \n\n\n### Hibernate Session 接口\n\n在 Hibernate 中，与数据库交互时，你需要处理的主要接口是 `Session` 接口，该接口从\
  \ `SessionFactory` 实例中获取。`SessionFactory` 实例被创建并添加到应用程序上下文中，这是通过配置 `LocalSessionFactoryBean`\
  \ 实现的，如本章前面介绍的 `HibernateConfig` 类所示（参见清单 7-2）。然后，该实例可以在仓库类中自动装配，并用于创建与数据库通信的 Hibernate\
  \ `Session`。清单 7-9 展示了本章示例中使用的 `SingerDaoImpl` 类，该类注入了已配置的 Hibernate `SessionFactory`。\n\
  \n```\npackage com.apress.prospring6.seven.base.dao;\nimport com.apress.prospring6.seven.base.entities.Singer;\n\
  import jakarta.annotation.Resource;\nimport org.hibernate.SessionFactory;\nimport\
  \ org.slf4j.Logger;\nimport org.slf4j.LoggerFactory;\nimport org.springframework.stereotype.Repository;\n\
  import org.springframework.transaction.annotation.Transactional;\nimport java.util.List;\n\
  @Transactional(readOnly = true)\n@Repository(\"singerDao\")\npublic class SingerDaoImpl\
  \ implements SingerDao {\nprivate static final Logger LOGGER = LoggerFactory.getLogger(SingerDaoImpl.class);\n\
  private SessionFactory sessionFactory;\npublic SingerDaoImpl(SessionFactory sessionFactory)\
  \ {\nthis.sessionFactory = sessionFactory;\n}\n// 其他方法已省略\n}\n清单 7-9\n使用 Hibernate\
  \ SessionFactory 的 SingerDaoImpl 仓库类\n```\n\n我们通过使用 `@Repository` 注解将 DAO 类声明为 Spring\
  \ Bean。这将其集成到 Spring 上下文中，并启用了异常转换到 Spring 运行时和 `DataAccessException` 系列。`@Transactional`\
  \ 注解定义了事务需求，我们将在**第** **9** 章进一步讨论。`sessionFactory` 属性由 Spring 通过构造函数自动装配。`SingerDao`\
  \ 接口非常简单，只有三个查找方法、一个保存方法和一个删除方法。`save(..)` 方法同时执行插入和更新操作。该接口如清单 7-10 所示。\n\n```\n\
  package com.apress.prospring6.seven.base.dao;\nimport com.apress.prospring6.seven.base.entities.Singer;\n\
  import java.util.Set;\npublic interface SingerDao {\nList findAll();\nList findAllWithAlbum();\n\
  Singer findById(Long id);\nSinger save(Singer singer);\nvoid delete(Singer singer);\n\
  }\n清单 7-10\nSingerDao 接口\n```\n\n## 使用 Hibernate 查询语言查询数据\n\nHibernate 与其他 ORM 工具（如\
  \ JDO 和 JPA）一样，是围绕对象模型设计的。因此，在定义映射后，我们无需构建 SQL 来与数据库交互。相反，对于 Hibernate，我们使用 Hibernate\
  \ 查询语言（HQL）来定义查询。在与数据库交互时，Hibernate 会代表我们将查询转换为 SQL 语句。在编写 HQL 查询时，其语法与 SQL 非常相似。但是，你需要从对象的角度而非数据库的角度来思考。在接下来的几个小节中，我们将通过几个示例带你了解。\n\
  \n### 使用懒加载进行简单查询\n\n让我们从实现 `findAll()` 方法开始，该方法仅从数据库中检索所有歌手。清单 7-11 显示了此功能的更新代码。\n\
  \n```\npackage com.apress.prospring6.seven.base.dao;\n// 导入语句已省略\n@Transactional\n\
  @Repository(\"singerDao\")\npublic class SingerDaoImpl implements  SingerDao{\n\
  private SessionFactory sessionFactory;\n@Transactional(readOnly = true)\n@Override\n\
  public List findAll() {\nreturn sessionFactory.getCurrentSession().createQuery(\"\
  from Singer s\")\n.list();\n}\n// 其他方法已省略\n}\n清单 7-11\nSingerDaoImpl#findAll() 方法\n\
  ```\n\n`SessionFactory.getCurrentSession()` 方法获取 Hibernate 的 `Session` 接口。然后，调用\
  \ `Session.createQuery()` 方法，传入 HQL 语句。语句 `from Singer` 仅从数据库中检索所有歌手。该语句的另一种语法是\
  \ `select s from Singer s`。`@Transactional(readOnly=true)` 注解表示我们希望将事务设置为 `只读`。为\
  \ `只读` 方法设置该属性在某些情况下会带来更好的性能。\n\n测试 `findAll()` 方法有两种方式。你可以运行 `HibernateDemoV1`\
  \ 类，该类将在本地或容器中可用的 MariaDB 数据库上调用此方法。或者，可以编写一个测试方法，在 Spring 测试上下文中使用 Testcontainers\
  \ MariaDB 数据源执行。清单 7-12 显示了 `HibernateDemoV1` 类的内容以及运行该类的结果。\n\n```\npackage com.apress.prospring6.seven.base;\n\
  import com.apress.prospring6.seven.base.config.HibernateConfig;\nimport com.apress.prospring6.seven.base.dao.SingerDao;\n\
  import org.slf4j.Logger;\nimport org.slf4j.LoggerFactory;\nimport org.springframework.context.annotation.AnnotationConfigApplicationContext;\n\
  public class HibernateDemoV1 {\nprivate static final Logger LOGGER = LoggerFactory.getLogger(HibernateDemoV1.class);\n\
  public static void main(String... args) {\nvar ctx = new AnnotationConfigApplicationContext(HibernateConfig.class);\n\
  var singerDao = ctx.getBean(SingerDao.class);\nLOGGER.info(\" ---- 列出歌手:\");\nsingerDao.findAll().forEach(s\
  \ -> LOGGER.info(s.toString()));\nctx.close();\n}\n}\n# 输出\n---- 列出歌手:\nSinger -\
  \ Id: 1, First name: John, Last name: Mayer, Birthday: 1977-10-16\nSinger - Id:\
  \ 3, First name: John, Last name: Butler, Birthday: 1975-04-01\nSinger - Id: 2,\
  \ First name: Eric, Last name: Clapton, Birthday: 1945-03-30\n清单 7-12\nHibernateDemoV1\
  \ 可运行类\n```\n\n虽然检索到了歌手记录，但专辑和乐器呢？让我们修改测试类以打印详细信息。在清单 7-13 中，你可以看到在可运行的 `HibernateDemoV2`\
  \ 类中，`singerDao.findAll()` 方法被替换为 `singerDao.findAllWithAlbums()`。该清单还显示了执行此类时打印的输出。\n\
  \n\n\n```\npackage com.apress.prospring6.seven.base;\n// import statements omitted\n\
  public class HibernateDemoV2 {\nprivate static final Logger LOGGER = LoggerFactory.getLogger(HibernateDemoV2.class);\n\
  public static void main(String... args) {\nvar ctx = new AnnotationConfigApplicationContext(HibernateConfig.class);\n\
  var singerDao = ctx.getBean(SingerDao.class);\nvar singer = singerDao.findById(2L);\n\
  listSingersWithAlbum(singerDao.findAllWithAlbum());\nctx.close();\n}\nprivate static\
  \ void listSingersWithAlbum(List singers) {\nLOGGER.info(\" ---- Listing singers\
  \ with instruments:\");\nsingers.forEach(s -> {\nLOGGER.info(s.toString());\nif\
  \ (s.getAlbums() != null) {\ns.getAlbums().forEach(a -> LOGGER.info(\"\\t\" + a.toString()));\n\
  }\nif (s.getInstruments() != null) {\ns.getInstruments().forEach(i -> LOGGER.info(\"\
  \\tInstrument: \" + i.getInstrumentId()));\n}\n});\n}\n}\n# output\nINFO : HibernateDemoV2\
  \ -  ---- Listing singers with instruments:\nINFO : HibernateDemoV2 - Singer - Id:\
  \ 1, First name: John, Last name: Mayer, Birthday: 1977-10-16\nException in thread\
  \ \"main\" org.hibernate.LazyInitializationException: failed to lazily initialize\
  \ a collection of role: com.apress.prospring6.seven.base.entities.Singer.albums,\
  \ could not initialize proxy - no Session\nat org.hibernate.collection.internal.AbstractPersistentCollection.throwLazyInitializationException(AbstractPersistentCollection.java:614)\n\
  at org.hibernate.collection.internal.AbstractPersistentCollection.withTemporarySessionIfNeeded(AbstractPersistentCollection.java:218)\n\
  at org.hibernate.collection.internal.AbstractPersistentCollection.initialize(AbstractPersistentCollection.java:591)\n\
  at org.hibernate.collection.internal.AbstractPersistentCollection.read(AbstractPersistentCollection.java:149)\n\
  at org.hibernate.collection.internal.PersistentSet.iterator(PersistentSet.java:188)\n\
  at java.base/java.lang.Iterable.forEach(Iterable.java:74)\nat com.apress.prospring6.seven.base.HibernateDemoV2.lambda$listSingersWithAlbum$2(HibernateDemoV2.java:62)\n\
  Listing 7-13\n可运行的 HibernateDemoV2 类\n```\n\n当你尝试访问关联时，会看到 Hibernate 抛出 `LazyInitializationException`，因为默认情况下，Hibernate\
  \ 会延迟加载关联。这意味着 Hibernate 不会为记录连接关联表（即 `ALBUM` 或 `INSTRUMENT`）。这样做的原因是出于性能考虑；可以想象，如果一个查询检索了数千条记录，并且所有关联都被检索出来，那么大量的数据传输会降低性能。\n\
  \n### 使用关联抓取进行查询\n\n要让 Hibernate 从关联中抓取数据，有两种选择。第一种是在 Java 关联上声明抓取模式为 `EAGER`：`@ManyToMany(fetch=FetchType.EAGER)`。这告诉\
  \ Hibernate 在每个查询中都抓取关联记录。然而，如前所述，这会影响数据检索性能。第二种选择是在需要时指示 Hibernate 在查询中抓取关联记录。如果你使用\
  \ `Criteria` 查询，可以调用函数 `Criteria.setFetchMode()` 来指示 Hibernate 急切地抓取关联。当使用 `NamedQuery`\
  \ 时，可以使用 fetch 操作符来指示 Hibernate 急切地抓取关联。\n\n让我们看一下 `findAllWithAlbum()` 方法的实现，该方法将检索所有歌手信息及其专辑和乐器。此示例将使用\
  \ `jakarta.persistence.NamedQuery` 方法。`NamedQuery` 可以外部化到 XML 文件中，也可以使用实体类上的注解来声明。在清单\
  \ 7-14 中，你可以看到修改后的 `Singer` 实体类，其中使用注解定义了命名查询。\n\n```\npackage com.apress.prospring6.seven.base.entities;\n\
  import jakarta.persistence.NamedQueries;\nimport jakarta.persistence.NamedQuery;\n\
  // other import statements omitted\n@Entity\n@Table(name = \"SINGER\")\n@NamedQueries({\n\
  @NamedQuery(name=\"Singer.findAllWithAlbum\",\nquery=\"select distinct s from Singer\
  \ s \" +\n\"left join fetch s.albums a \" +\n\"left join fetch s.instruments i\"\
  )\n})\npublic class Singer extends AbstractEntity {\n// content omitted\n}\nListing\
