  由于我们想检查是否有调度器，我们在演示代码中搜索名为 `taskScheduler` 的调度器 Bean（这是 `DEFAULT_TASK_SCHEDULER_BEAN_NAME`
  常量的值）并打印其类。


  Spring 中调度任务的实现方式与几乎所有其他功能的实现方式相同，都是通过代理。`@EnableScheduling` 注解会向上下文中添加一个 `org.springframework.scheduling.annotation.ScheduledAnnotationBeanPostProcessor`
  Bean，该 Bean 会拾取带有 `@Scheduled` 注解的方法。这些方法由 `TaskScheduler` 根据通过 `@Scheduled` 注解配置的
  `fixedRate`、`fixedDelay` 或 `cron` 表达式来调用。


  由于我们需要主线程继续执行，以便能够看到 `updateCarAgeJob()` 方法被重复执行，因此使用了 `System.in.read()` 语句来等待开发者在退出前按下任意键。控制台中打印的日志可能与清单
