  ### 介绍 Testcontainers


  如前所述，使用 H2 无法测试存储函数和存储过程，因为这种轻量级内存数据库不具备这些概念。然而，我们并不鼓励您*不*测试所编写的代码。在生产环境中，代码运行在真实的数据库上。在日常开发构建中，测试运行在测试数据库或容器中的数据库上。由于准备测试数据库可能仍然是一项成本高昂的操作，最合适的替代方案是在容器中的数据库里运行测试。为了简化这一过程，Testcontainers^(⁵³)
  库应运而生。


  Testcontainers 是一个支持 JUnit 测试的 Java 库，它提供了常用数据库、Selenium Web 浏览器或任何可以在 Docker 容器中运行的其他组件的轻量级、一次性实例。使用这个库，我们可以启动一个基于轻量级
  MariaDB 镜像的容器，并为我们的存储函数编写测试。这显然要求您的计算机上已安装 Docker。好消息是，您无需手动创建容器或运行 Docker 命令，因为
  Testcontainers 提供了所有必要的组件，可以直接从代码中完成这些操作。这些组件与迄今为止介绍的 JUnit Jupiter 和 Spring JDBC
  测试注解能够很好地集成。


  这种方法与使用嵌入式数据库进行测试类似，但区别在于，我们不再使用 `EmbeddedDatabaseBuilder` 创建 `DataSource` bean，而是使用
  `org.testcontainers.containers.MariaDBContainer` 实例。测试配置类如清单 6-56 所示。


  ```

  package com.apress.prospring6.six.repo;

  import org.testcontainers.containers.MariaDBContainer;

  // 其他 import 语句已省略

  // 注解已省略

  public class StoredFunctionV1Test {

  // 测试方法已省略，因与当前内容无关

  @Configuration

  public static class TestContainersConfig {

  private static final Logger LOGGER = LoggerFactory.getLogger(TestContainersConfig.class);

  MariaDBContainer mariaDB = new MariaDBContainer("mariadb:10.7.4-focal");

  @PostConstruct

  void initialize() {

  mariaDB.start();

  }

  @PreDestroy

  void tearDown(){

  mariaDB.stop();

  }

  @Bean

  DataSource dataSource() {

  try {

  var dataSource = new BasicDataSource();

  dataSource.setDriverClassName(mariaDB.getDriverClassName());

  dataSource.setUrl(mariaDB.getJdbcUrl());

  dataSource.setUsername(mariaDB.getUsername());

  dataSource.setPassword(mariaDB.getPassword());

  return dataSource;

  } catch (Exception e) {

  LOGGER.error("无法创建 MariaDB TestContainers DataSource bean！", e);

  return null;

  }

  }

  }

  }

  清单 6-56

  使用 MariaDBContainer 实例的 TestContainersConfig

  ```


  任何可能分散您对 TestContainers 核心配置注意力的代码都已从 `StoredFunctionV1TestTest` 类中剥离，该类是声明 `TestContainersConfig`
  的地方。它被声明在测试类内部，因为这是唯一使用它的地方。


  如您所见，`MariaDBContainer` 类提供了创建 `DataSource` bean 所需的所有属性。实例化时，`MariaDBContainer`
  构造函数需要一个 `String` 参数，该参数代表 Docker 容器镜像以及代表 MariaDB 版本的标签。为了确保容器优雅地启动，我们在配置中添加了一个带有
  `@PostConstruct` 注解的 `initialize()` 方法，该方法调用 `mariaDB.start()` 来启动容器。为了确保容器优雅地停止，我们添加了一个带有
  `@PreDestroy` 注解的 `tearDown()` 方法，该方法调用 `mariaDB.stop()` 来停止容器。需要这两个方法是因为容器被视为一个
  bean，因此我们必须确保当上下文被销毁时，容器也能被优雅地关闭并终止。


  尽管这种方法可以完成任务，但推荐的方式是依赖 JUnit Jupiter 的生命周期管理来启动和停止容器。这允许我们重用 `BasicDataSourceCfg`
  配置类。实际的好处在于，可以重用 `BasicDataSourceCfg` 中声明的同一个 `DataSource` bean；因为只有数据库位置发生了变化，数据库本身与生产环境声明的数据库相同，即
  MariaDB。为了实现这一点，我们需要执行以下三项操作：


  *   在测试类中将 `MariaDBContainer` 声明为静态字段，并添加 `@Testcontainers` 注解（这是一个 JUnit Jupiter
  扩展），用于激活测试用例中使用的容器的自动启动和停止。


  *   使用 `@Container` 注解容器静态字段，让 JUnit Jupiter 知道这是我们希望管理的容器实例。（`@Testcontainers`
  和此注解都是 `junit-jupiter.jar` Testcontainers 库的一部分，该库已添加到项目的类路径中。）


  *   在方法上使用 `@DynamicPropertySource`，将容器属性注册为 `dataSource` bean 的配置属性。此注解在**第** **4**
  章中提及，而本测试用例是本书中第一个适合使用它的地方。此处用于动态地向 `Environment` 的 `PropertySources` 集合中添加属性。


  通过此配置，容器被创建，MariaDB 被安装并启动，但测试所需的模式、数据和存储函数尚未就绪。执行这些操作的 SQL 脚本仍需使用各种 `@Sql*` 注解进行配置。清单
  6-57 展示了 `StoredFunctionV2Test` 的完整实现，包含两个方法：一个测试 `singerRepo.findAll()` 查询，另一个测试
  `singerRepo.findFirstNameById(..)` 存储函数。


  ```

  package com.apress.prospring6.six.repo;

  import org.testcontainers.containers.MariaDBContainer;

  import org.testcontainers.junit.jupiter.Container;

  import org.testcontainers.junit.jupiter.Testcontainers;

  // import 语句已省略

  @Testcontainers

  @SqlMergeMode(SqlMergeMode.MergeMode.MERGE)

  @Sql({ "classpath:testcontainers/drop-schema.sql", "classpath:testcontainers/create-schema.sql"
  }) // 此方式有效

  @SpringJUnitConfig(classes = { BasicDataSourceCfg.class, SingerJdbcRepo.class})

  public class StoredFunctionV2Test {

  @Container

  static MariaDBContainer mariaDB = new MariaDBContainer("mariadb:10.7.4-focal");

  @DynamicPropertySource // 这是实现魔力的关键

  static void setUp(DynamicPropertyRegistry registry) {

  registry.add("jdbc.driverClassName", mariaDB::getDriverClassName);

  registry.add("jdbc.url", mariaDB::getJdbcUrl);

  registry.add("jdbc.username", mariaDB::getUsername);

  registry.add("jdbc.password", mariaDB::getPassword);

  }

  @Autowired

  SingerRepo singerRepo;

  @Test

