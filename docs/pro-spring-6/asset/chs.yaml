  如您所见，当 `sing()` 方法首次在 `test()` 方法的控制流之外被调用时，它是不被建议的。当它第二次执行时，这次是在 `test()` 方法的控制流内部，`ControlFlowPointcut`
  指示其关联的通知适用于该方法，因此该方法被建议。请注意，如果我们在 `test()` 方法内部调用了另一个不在被建议代理上的方法，那么该方法将不会被建议。


  控制流切入点非常有用，它允许您仅在另一个对象的上下文中执行时，有选择性地对某个对象进行通知。但是，请注意，与其他切入点相比，使用控制流切入点会带来显著的性能损失。


  让我们看一个例子。假设我们有一个事务处理系统，其中包含一个 `TransactionService` 接口和一个 `AccountService` 接口。我们希望应用后置通知，以便当
