  \n在理解了每个模块的用途之后，你可以选择项目中所需的模块并将其包含到代码中。根据 GitHub 上最新的标签，Spring 框架 6.0 版本似乎包含 22\
  \ 个模块。表 2-2 描述了这些 JAR 文件及其对应的模块。实际的 JAR 文件名例如 `spring-aop-6.0.0.jar`，但为简洁起见，我们只包含了特定的模块部分（例如\
  \ `aop`）。\n\n表 2-2\n\nSpring 模块\n\n\n\n| 模块 | 描述 |\n| --- | --- |\n| `aop` | 此模块包含在应用程序中使用\
  \ Spring AOP 功能所需的所有类。如果你计划使用 Spring 中其他利用 AOP 的功能（例如声明式事务管理），也需要在应用程序中包含此 JAR。此外，支持与\
  \ AspectJ 集成的类也打包在此模块中。 |\n| `aspects` | 此模块包含用于与 AspectJ AOP 库进行高级集成的所有类。例如，如果你使用\
  \ Java 类进行 Spring 配置，并且需要 AspectJ 风格的注解驱动事务管理，则需要此模块。 |\n| `beans` | 此模块包含支持 Spring\
  \ 操作 Spring Bean 的所有类。此模块中的大部分类支持 Spring 的 Bean 工厂实现。例如，处理 Spring XML 配置文件和 Java\
  \ 注解所需的类都打包在此模块中。 |\n| `context` | 此模块包含为 Spring Core 提供许多扩展的类。你会发现，所有需要使用 Spring\
  \ 的 `ApplicationContext` 功能（详见**第** **5****章**）的类，以及用于企业 JavaBean (EJB)、Java 命名和目录接口\
  \ (JNDI) 和 Java 管理扩展 (JMX) 集成的类都在此模块中。此模块还包含 Spring 远程调用类、与动态脚本语言（例如 JRuby、Groovy\
  \ 和 BeanShell）集成的类、JSR-303（“Bean 验证”）、调度和任务执行等。 |\n| `context-indexer` | 此模块包含一个索引器实现，用于访问在\
  \ `META-INF/spring.components` 中定义的候选组件。核心类 `CandidateComponentsIndex` 不供外部使用。 |\n\
  | `context-support` | 此模块包含对 `spring-context` 模块的进一步扩展。在用户界面方面，包含用于邮件支持以及与模板引擎（如\
  \ Velocity、FreeMarker 和 JasperReports）集成的类。此外，与各种任务执行和调度库（包括 CommonJ 和 Quartz）的集成也打包在此处。\
  \ |\n| `core` | 这是每个 Spring 应用程序都需要的主要模块。在此 JAR 文件中，你可以找到所有其他 Spring 模块共享的所有类（例如，用于访问配置文件的类）。此外，在此\
  \ JAR 中，你还可以找到精选的、在 Spring 代码库中广泛使用且可在你自己的应用程序中使用的极其有用的工具类。 |\n| `expression` |\
  \ 此模块包含 Spring 表达式语言 (SpEL) 的所有支持类。 |\n| `instrument` | 此模块包含用于 JVM 引导的 Spring 检测代理。在\
  \ Spring 应用程序中使用 AspectJ 进行加载时织入时需要此 JAR 文件。 |\n| `jcl` | 此模块仅用于与现有的 Commons Logging\
  \ 用法（例如在 Apache Commons Configuration 中）保持二进制兼容性。 |\n| `jdbc` | 此模块包含 JDBC 支持的所有类。所有需要数据库访问的应用程序都需要此模块。用于支持数据源、JDBC\
  \ 数据类型、JDBC 模板、原生 JDBC 连接等的类都打包在此模块中。 |\n| `jms` | 此模块包含 Java 消息服务 (JMS) 支持的所有类。\
  \ |\n| `messaging` | 此模块包含从 Spring Integration 项目中提取的关键抽象，作为基于消息的应用程序的基础，并增加了对简单或流式文本定向消息协议\
  \ (STOMP) 消息的支持。 |\n| `orm` | 此模块通过支持流行的 ORM 工具（包括 Hibernate、JDO 和 JPA）来扩展 Spring\
  \ 的标准 JDBC 功能集。此 JAR 中的许多类依赖于 `spring-jdbc` JAR 文件中包含的类，因此你的应用程序也绝对需要包含该文件。 |\n\
  | `oxm` | 此模块提供对对象/XML 映射 (OXM) 的支持。用于抽象 XML 编组和解组以及支持流行工具（如 Castor、JAXB、XMLBeans\
  \ 和 XStream）的类都打包在此模块中。 |\n| `r2dbc` | 此模块使 R2DBC 更易于使用，并降低了常见错误发生的可能性。它提供了简单的错误处理和一整套与底层响应式数据库管理器\
  \ (RDBM) 无关的、简洁的非受检异常。 |\n| `test` | Spring 提供了一组模拟类来帮助测试你的应用程序，其中许多模拟类在 Spring\
  \ 测试套件中使用，因此它们经过了良好的测试，并使测试你的应用程序变得更加简单。当然，我们在 Web 应用程序的单元测试中发现了模拟 `HttpServletRequest`\
  \ 和 `HttpServletResponse` 类的巨大用途。另一方面，Spring 与 JUnit 单元测试框架紧密集成，此模块提供了许多支持开发 JUnit\
  \ 测试用例的类；例如，`SpringExtension` 将 *Spring TestContext Framework* 集成到 JUnit 5 的 *Jupiter*\
  \ 编程模型中。 |\n| `tx` | 此模块提供支持 Spring 事务基础设施的所有类。你可以找到从事务抽象层到支持 Java 事务 API (JTA)\
  \ 以及与主要供应商的应用服务器集成的类。 |\n| `web` | 此模块包含在 Web 应用程序中使用 Spring 的核心类，包括用于自动加载 `ApplicationContext`\
  \ 功能的类、文件上传支持类，以及用于执行重复性任务（例如从查询字符串中解析整数值）的一批有用类。 |\n| `webflux` | 此模块包含 Spring\
  \ Web 响应式模型的核心接口和类。 |\n| `webmvc` | 此模块包含 Spring 自身 MVC 框架的所有类。如果你的应用程序使用单独的 MVC\
  \ 框架，则不需要此 JAR 文件中的任何类。Spring MVC 在**第** **15****章**中有更详细的介绍。 |\n| `websocket` |\
  \ 此模块提供对 JSR-356（“Java WebSocket API”）的支持。 |\n\n\n\n如果你使用 Spring Boot，则无需显式选择要添加为依赖项的\
  \ Spring 模块，因为会根据所使用的 Spring Boot 启动器依赖项自动配置相应的 Spring 依赖项集。Spring Boot 的代码库也在 GitHub\
  \ 上公开。如果你对 Spring Boot 代码的样子感到好奇，并希望处于 Spring Boot 开发的前沿，请查看 Spring 的 GitHub 仓库中的最新版本源代码^(²⁴)。在\
  \ `spring-boot-project/spring-boot-starters` 下，有一系列 Spring Boot 启动器模块，这些模块可以作为 Spring\
  \ 项目的依赖项，用于构建特定类型的 Spring 应用程序，并带有默认配置和精选的依赖项集。这些模块本质上只是依赖描述符，可以添加到 `pom.xml` 的\
  \ `<dependencies>` 部分下。它们也可以与 Gradle 项目一起使用。目前有超过 30 个这样的模块，表 2-3 列出了最常用的一些模块以及它们为你的应用程序配置的依赖项。\n\
  \n表 2-3\n\nSpring Boot 启动器模块\n\n| 模块 | 描述 |\n| --- | --- |\n| `spring-boot-starter`\
  \ | 这是最简单的 Spring Boot 启动器，它将 `spring-core` 库作为依赖项添加到你的项目中。它可用于创建一个非常简单的 Spring\
  \ 应用程序。它主要用于学习目的和创建基础项目，并封装了项目中其他模块共享的通用功能。 |\n| `spring-boot-starter-aop` | 将 `spring-aop`\
  \ 库作为依赖项添加到你的项目中。 |\n| `spring-boot-starter-data-*` | 这种类型的启动器为在你的项目中处理数据添加了各种 Spring\
  \ 依赖项。`*` 替换为数据来源的技术。例如，`spring-boot-starter-data-jdbc` 添加了用于创建 Spring Repository\
  \ Bean 的类，以处理来自支持 JDBC 驱动程序的数据库的数据：MySQL、PostgreSQL、Oracle 等。 |\n| `spring-boot-starter-web`\
  \ | 配置用于创建 Web 应用程序的最小依赖项。 |\n| `spring-boot-starter-security` | 配置用于保护 Spring Web\
  \ 应用程序安全的最小依赖项。 |\n| `spring-boot-starter-webflux` | 配置用于创建响应式 Web 应用程序的最小依赖项。 |\n\
  | `spring-boot-starter-actuator` | 配置 Spring Boot Actuator，它启用一组用于监控 Spring Web\
  \ 应用程序的端点。 |\n| `spring-boot-starter-test` | 配置以下库集：Spring Test、JUnit、Hamcrest 和\
  \ Mockito。 |\n\n## 为你的应用程序选择模块\n\n如果没有像 Maven 或 Gradle 这样的依赖管理工具，为你的应用程序选择使用哪些模块可能会有点棘手。例如，如果你只需要\
  \ Spring 的 Bean 工厂和 DI 支持，你仍然需要几个模块，包括 `spring-core`、`spring-beans`、`spring-context`\
  \ 和 `spring-aop`。如果你需要 Spring 的 Web 应用程序支持，那么你需要进一步添加 `spring-web` 等等。得益于构建工具的特性，例如\
  \ Maven 的传递依赖支持，所有必需的第三方库都将自动包含在内。\n\n### 在 Maven 仓库中访问 Spring 模块\n\n由 Apache 软件基金会创立的\
  \ Maven^(²⁵) 已成为管理 Java 应用程序依赖项最流行的工具之一，从开源环境到企业环境皆是如此。Maven 是一个强大的应用程序构建、打包和依赖管理工具。它管理应用程序的整个构建周期，从资源处理和编译到测试和打包。还存在大量用于各种任务的\
  \ Maven 插件，例如更新数据库以及将打包的应用程序部署到特定服务器（例如：Tomcat、WildFly 或 WebLogic）。在撰写本文时，当前的 Maven\
  \ 版本是 3.8.4。\n\n几乎所有开源项目都支持通过 Maven 仓库分发库。最流行的是托管在 Apache 上的 Maven 中央仓库，你可以访问 Maven\
  \ 中央仓库网站^(²⁶) 搜索工件是否存在及其相关信息。如果你将 Maven 下载并安装到你的开发机器上，你将自动获得对 Maven 中央仓库的访问权限。其他一些开源社区（例如，JBoss\
  \ 和 Spring）也为其用户提供自己的 Maven 仓库。但是，要能够访问这些仓库，你需要将仓库添加到你的 Maven 设置文件或项目的 POM 文件中。（你可以在\
  \ `pro-spring-6/pom.xml` 中看到这样的示例；只需查找 `<repositories>` 元素即可。）\n\n对 Maven 的详细讨论不在本书的范围内，你始终可以参考在线文档或书籍，它们会为你提供关于\
  \ Maven 的详细参考。但是，由于 Maven 被广泛采用，因此值得提及 Maven 仓库上项目打包的典型结构。\n\n每个 Maven 工件由*组 ID*、*工件\
  \ ID*、*打包类型*和*版本*标识。例如，对于 `log4j-core`，组 ID 是 `org.apache.logging.log4j`，工件 ID 是\
  \ `log4j-core`，打包类型是 `jar`。在此之下，定义了不同的版本。例如，对于版本 `2.17.1`，工件的文件名在组 ID、工件 ID 和版本文件夹下变为\
  \ `log4j-core-2.17.1.jar`。Maven 配置文件是用 XML 编写的，并且必须遵守由 [`https://maven.apache.org/maven-v4_0_0.xsd`](https://maven.apache.org/maven-v4_0_0.xsd)\
  \ 模式定义的 Maven 标准语法。项目的 Maven 配置文件的默认名称是 `pom.xml`，清单 2-2 显示了一个示例文件。\n\n```\n4.0.0\n\
  com.apress.prospring6.ch02\nhello-world\njar\n5.0-SNAPSHOT\nhello-world\n\norg.apache.logging.log4j\n\
  log4j-core\n2.17.1\n\n...\n\n清单 2-2\npom.xml 片段\n```\n\nMaven 还定义了一个典型的标准化项目结构，如图\
  \ 2-5 所示。\n\n![](img/315511_6_En_2_Fig5_HTML.jpg)\n\n项目结构从上到下如下所示。Hello world，s\
  \ r c，main 包含 java 和 resources，test 包含 java 和 resources，以及 p o m dot x m l。\n\n\
  图 2-5\n\nMaven 典型项目结构\n\n`main` 目录在 `java` 目录中包含应用程序代码库，在 `resources` 目录中包含应用程序配置文件。`test`\
  \ 目录在 `java` 目录中包含应用程序测试代码，在 `resources` 目录中包含应用程序测试配置文件。\n\n访问 Spring 模块并将它们作为依赖项添加到项目中，与本节到目前为止展示的内容非常相似，但\
  \ Spring Boot 的依赖管理甚至可以用于不使用 Spring Boot 的 Spring 项目，这确保了添加到项目中的传递依赖项将始终保持稳定且相互兼容。但首先，让我们向你介绍\
  \ Gradle。\n\n\n\n### 使用 Gradle 访问 Spring 模块\n\nMaven 项目的标准结构以及工件分类和组织方式非常重要，因为 Gradle^(²⁷)\
  \ 遵循相同的规则，甚至使用 Maven 中央仓库来检索工件。此外，也可以配置其他各种仓库。Gradle 是一个强大的构建工具，它摒弃了臃肿的 XML 配置，转而采用\
  \ Groovy 的简洁性和灵活性。这非常好，并提供了极大的灵活性，除非开发者在配置上过于“创意”。在撰写本文时，Gradle 的当前版本是 7.3.3。从 4.x\
  \ 版本开始，Spring 团队已转而使用 Gradle 来配置所有 Spring 产品。因此，本书的源代码也可以使用 Gradle 构建和执行。Gradle\
  \ 配置文件的默认名称是 `build.gradle`。前面展示的 `pom.xml` 文件（嗯，它的一个版本）的等效文件如清单 2-3 所示。\n\n```\n\
  group 'com.apress.prospring6.ch02'\nversion '6.0-SNAPSHOT'\napply plugin: 'java'\n\
  repositories {\nmavenCentral()\n}\ntasks.withType(JavaCompile) {\noptions.encoding\
  \ = \"UTF-8\"\n}\ndependencies {\ncompile group: 'org.apache.logging.log4j', name:\
  \ 'log4j-core', version: '2.17.1'\n...\n}\n清单 2-3\nbuild.gradle 片段\n```\n\n这样可读性更强了，对吧？正如你所见，工件使用之前\
  \ Maven 中介绍的 *group*、*artifact* 和 *version* 来标识，但属性名称有所不同。Gradle 也不在本书的讨论范围内，但书中会偶尔提及。\n\
  \n### 使用 Spring Boot 依赖管理\n\n如前所述，你可以使用 Spring Boot 启动器项目作为父项目，为你的项目提供最少的依赖项集和默认配置。通过将\
  \ `spring-boot-starter-parent` 声明为父项目，即可启用 Spring Boot 依赖管理，这意味着将为项目设置默认的应用程序配置和完整的依赖树。清单\
  \ 2-4 展示了一个使用 `spring-boot-starter` 作为依赖项的 Maven 配置文件。由于我们使用的是 Spring Boot SNAPSHOT\
  \ 版本，因此也配置了 [`https://repo.spring.io/snapshot`](https://repo.spring.io/snapshot)\
  \ 仓库（标记为 2 的行）。\n\n```\n4.0.0\n\norg.springframework.boot\nspring-boot-starter-parent\n\
  3.0.0-SNAPSHOT\n\ncom.apress.prospring6.ch02\nhello-world\n6.0-SNAPSHOT\nhello-world\n\
  \norg.springframework.boot\nspring-boot-starter\n\norg.springframework.boot\nspring-boot-starter-test\n\
  test\n\norg.springframework.boot\nspring-boot-maven-plugin\n\nspring-milestones\n\
  https://repo.spring.io/milestone\n\nspring-snapshot\nhttps://repo.spring.io/snapshot\n\
  \n清单 2-4\n使用 spring-boot-starter 作为父项目的 pom.xml\n```\n\n请注意，文件中除了项目版本之外，唯一声明的版本就是\
  \ `spring-boot-starter-parent` 的版本。无需为 Spring Boot 或 Spring 依赖项指定任何版本，因为它们已经是 `spring-boot-starter-parent`\
  \ 引入的配置的一部分。如果你觉得难以置信，只需打开 IntelliJ IDEA 的 Maven 视图并展开 `Dependencies` 节点。你应该会看到\
  \ `pom.xml` 文件中声明的依赖项，并注意到它们都附带了版本号，即使你没有指定。此外，请注意它们的依赖项——你项目的传递性依赖项——也有版本号，最棒的是，你可以在项目中声明这些依赖项中的任何一个并覆盖其版本。\n\
  \n所以，当然，Spring Boot 强制了很多默认设置，但它也很容易定制，并且这种说法同样适用于依赖项和 Java 配置。图 2-6 显示了由清单 2-4\
  \ 中的配置文件配置的 Maven 依赖项；只有 `jakarta.annotation-api` 依赖项的版本被覆盖为 2.1.0-B1。\n\n![](img/315511_6_En_2_Fig6_HTML.jpg)\n\
  \n2 张标题为 hello-world-pom dot x m l 的截图。左侧截图描述了项目 hello world。右侧截图顶部显示 Maven。\n\n\
  图 2-6\n\n为 *jakarta.annotation-api* 定制了版本的 Maven Spring Boot 项目\n\n将 `spring-boot-starter-parent`\
  \ 作为项目的父项目并不总是很方便。实际项目有自己共享的、不受 Spring Boot 管理的层次结构和依赖项。方便的做法是在可能的情况下进行适当的依赖管理，这可以通过移除\
  \ `<parent>` 配置并将其替换为清单 2-5 中所示的 `<dependencyManagement>` 配置来实现。\n\n```\n\norg.springframework.boot\n\
  spring-boot-dependencies\n3.0.0-SNAPSHOT\npom\nimport\n\n清单 2-5\n不使用 spring-boot-starter-parent\
  \ 的 Spring Boot 项目 Maven 配置\n```\n\n最棒的是，Spring Boot 依赖管理甚至可以在一个经典的 Spring 项目中使用——即不使用任何\
  \ Spring Boot 启动器依赖项的项目。图 2-7 展示了一个非常简单的 Spring 项目 Maven 配置，它只声明了 `spring-context`\
  \ 和 `junit-jupiter-engine` 作为依赖项。请注意，这两个依赖项没有指定版本，但在 Maven 视图中我们可以清楚地看到依赖项的版本。这是通过从\
  \ `spring-boot-dependencies` 的 pom 工件导入版本实现的。\n\n![](img/315511_6_En_2_Fig7_HTML.jpg)\n\
  \n\n\n两张标题为“hello-world-pom.xml”的截图。左侧截图展示了“hello world”项目，其中`artifactId`被高亮显示，`spring-context`被加了下划线。右侧截图显示的是\
  \ Maven 界面，其中依赖项已被选中，并且`spring-context 6.0.0-M2`被加了下划线。\n\n图 2-7\n\n使用 Spring Boot\
  \ 提供依赖管理的 Maven Spring（经典）项目\n\n在 Gradle 中，与此等效的是什么？由于 Gradle 没有类似 Maven 的父级概念，依赖管理是通过`io.spring.dependency-management`插件完成的。清单\
  \ 2-6 展示了一个与清单 2-4 中所示的 Maven 配置类似的 Gradle 配置。\n\n```\nplugins {\n    id 'org.springframework.boot'\
  \ version '3.0.0-SNAPSHOT'\n    id 'io.spring.dependency-management' version '1.0.11.RELEASE'\n\
  \    id 'java'\n}\ngroup = 'com.apress.prospring6.ch02'\nversion = '6.0-SNAPSHOT'\n\
  sourceCompatibility = '17'\nrepositories {\n    mavenCentral()\n    maven { url\
  \ 'https://repo.spring.io/milestone' }\n    maven { url 'https://repo.spring.io/snapshot'\
  \ }\n}\ndependencies {\n    implementation 'org.springframework.boot:spring-boot-starter'\n\
  \    testImplementation 'org.springframework.boot:spring-boot-starter-test'\n}\n\
  ...\n清单 2-6\n简单的 Spring Boot 项目 Gradle 配置\n```\n\n使用 Gradle 也可以覆盖 Spring Boot 管理的依赖版本。图\
  \ 2-8 展示了 IntelliJ IDEA 的 Gradle 视图，其中显示了由 Spring Boot 依赖管理引入的依赖项，以及用于覆盖版本的 Gradle\
  \ 配置语法。\n\n![](img/315511_6_En_2_Fig8_HTML.jpg)\n\n两张截图，附带一行代码，显示`build.gradle`文件包含\
  \ Spring Boot 项目的插件声明、依赖配置和任务设置。它包括 Java、Spring Boot 和依赖管理的插件，以及各种 Spring Boot 起步依赖和测试框架的依赖项。\n\
  \n图 2-8\n\n为`jakarta.annotation-api`定制了版本的自定义 Gradle Spring Boot 项目\n\n由于 Gradle\
  \ 中的 Spring Boot 依赖管理是通过插件实现的，因此配置使用依赖管理的 Spring 经典项目是可行的，无需对配置进行任何额外更改，只需移除起步依赖并将其替换为所需的\
  \ Spring 依赖即可。\n\n在组织成多个模块的大型项目中，配置可能会变得更加复杂，简化配置意味着创建可在模块中复用的配置模板。`pro-spring-6`项目就是按这种方式组织的；根目录下的`build.gradle`和`pom.xml`文件包含了所有模块共享的配置。在必要时，模块配置文件用于覆盖依赖版本并声明它们自己的依赖项。\n\
  \nGradle 配置更易读、更简洁，但在大型项目中，缺乏标准可能会导致任务实现变得复杂，因为声明任务的唯一限制是开发者对 Groovy 的理解程度。然而，Maven\
  \ 凭借其所有依赖和插件都通用的 XML 标准模式，非常一致且易于初学者学习。\n\n## 使用 Spring 文档\n\nSpring 之所以成为构建真实应用的开发者如此有用的框架，其特点之一就是拥有大量编写精良、准确无误的文档。在每个版本中，Spring\
  \ 框架的文档团队都努力确保所有文档都由开发团队完成并打磨。这意味着 Spring 的每个特性不仅在 Javadoc 中有完整记录，而且在每个发行版附带的 Spring\
  \ 参考手册中也有涵盖。如果你还没有熟悉 Spring Javadoc 和参考手册，现在就去熟悉吧。本书并不能替代这些资源；相反，它是一本补充性的参考书，演示了如何从头开始构建一个基于\
  \ Spring 的应用程序。\n\n你可以像之前提到的那样，通过 IntelliJ IDEA 编辑器访问 Spring Javadoc，但如果你更喜欢在浏览器中访问，可以将此\
  \ URL 加入书签：[`https://docs.spring.io/spring-framework/docs/current/javadoc-api`](https://docs.spring.io/spring-framework/docs/current/javadoc-api)。\n\
  \n如需更深入地了解 Spring 框架，你还可以将官方参考文档的 URL 加入书签：[`https://docs.spring.io/spring-framework/docs/current/reference/html`](https://docs.spring.io/spring-framework/docs/current/reference/html)。\n\
  \n## 让 Spring 融入 Hello World\n\n在本书的这个阶段，我们乐观地认为你已经确信 Spring 是一个坚实、支持良好的项目，具备成为优秀应用开发工具的所有要素，并且深入理解它不仅能让你成为更好的开发者，还能促进你的职业发展。然而，还缺少一样东西——我们还没有向你展示任何代码。我们确信你迫不及待地想看到\
  \ Spring 的实际应用，既然我们不能再不深入代码了，那就让我们开始吧。如果你不完全理解本节中的所有代码，请不要担心；随着我们深入本书，我们会对所有主题进行更详细的讲解。\n\
  \n\n\n### 构建示例 Hello World 应用程序\n\n现在，我们确信您对传统的 Hello World 示例已经很熟悉了，但以防您在过去 30\
  \ 年里一直与世隔绝，代码清单 2-7 中的代码片段展示了其 Java 版本的完整面貌。\n\n```\npackage com.apress.prospring6.two;\n\
  public class HelloWorld {\npublic static void main(String... args) {\nSystem.out.println(\"\
  Hello World!\");\n}\n}\n代码清单 2-7\n经典 Hello World Java 项目\n```\n\n就示例而言，这个程序相当简单——它能完成任务，但扩展性不强。如果我们想更改消息内容怎么办？如果我们想以不同的方式输出消息，比如输出到标准错误流而不是标准输出流，或者用\
  \ HTML 标签包裹而不是纯文本，又该怎么办？我们将重新定义这个示例应用程序的需求：它必须支持一种简单、灵活的机制来更改消息，并且必须易于更改渲染行为。在基本的\
  \ Hello World 示例中，您只需适当修改代码，就能快速轻松地实现这两种更改。然而，在更大的应用程序中，重新编译需要时间，并且要求应用程序再次进行全面测试。更好的解决方案是将消息内容外部化，并在运行时读取它，例如从命令行参数中读取，如代码清单\
  \ 2-8 所示。\n\n```\npackage com.apress.prospring6.two;\npublic class HelloWorldWithCommandLine\
  \ {\npublic static void main(String... args) {\nif (args.length > 0) {\nSystem.out.println(args[0]);\n\
  } else {\nSystem.out.println(\"Hello World!\");\n}\n}\n}\n代码清单 2-8\n带参数的经典 Hello\
  \ World Java 项目\n```\n\n这个示例实现了我们的目标——现在我们可以不修改代码就更改消息内容。然而，这个应用程序仍然存在一个问题：负责渲染消息的组件同时也负责获取消息。更改消息的获取方式意味着要修改渲染器中的代码。此外，我们仍然无法轻松更改渲染器；这样做意味着要修改启动应用程序的类。\n\
  \n如果我们进一步推进这个应用程序（超越 Hello World 的基础），更好的解决方案是将渲染逻辑和消息检索逻辑重构为独立的组件。此外，如果我们真的想让应用程序变得灵活，应该让这些组件实现接口，并使用这些接口定义组件与启动器之间的相互依赖关系。通过重构消息检索逻辑，我们可以定义一个简单的\
  \ `MessageProvider` 接口，其中包含一个方法 `getMessage()`，如代码清单 2-9 所示。\n\n```\npackage com.apress.prospring6.two.decoupled;\n\
  public interface MessageProvider {\nString getMessage();\n}\n代码清单 2-9\nMessageProvider\
  \ 接口\n```\n\n所有能够渲染消息的组件都实现了 `MessageRenderer` 接口，代码清单 2-10 描述了这样一个组件。\n\n```\n\
  package com.apress.prospring6.two.decoupled;\npublic interface MessageRenderer {\n\
  void render();\nvoid setMessageProvider(MessageProvider provider);\nMessageProvider\
  \ getMessageProvider();\n}\n代码清单 2-10\nMessageRenderer 接口\n```\n\n如您所见，`MessageRenderer`\
  \ 接口声明了一个方法 `render()`，以及一个 JavaBean 风格的方法 `setMessageProvider()`。任何 `MessageRenderer`\
  \ 的实现都与消息检索解耦，并将该职责委托给提供给它的 `MessageProvider` 实例。\n\n在这里，`MessageProvider` 是 `MessageRenderer`\
  \ 的一个依赖项。创建这些接口的简单实现很容易，如代码清单 2-11 所示。\n\n```\npackage com.apress.prospring6.two.decoupled;\n\
  public class HelloWorldMessageProvider implements MessageProvider {\n@Override\n\
  public String getMessage() {\nreturn \"Hello World!\";\n}\n}\n代码清单 2-11\nMessageProvider\
  \ 实现\n```\n\n您可以看到，我们创建了一个简单的 `MessageProvider`，它始终返回 \"Hello World!\" 作为消息。代码清单\
  \ 2-12 中所示的 `StandardOutMessageRenderer` 类也同样简单。\n\n```\npackage com.apress.prospring6.two.decoupled;\n\
  import static java.lang.System.*;\npublic class StandardOutMessageRenderer implements\
  \ MessageRenderer {\nprivate MessageProvider messageProvider;\npublic StandardOutMessageRenderer(){\n\
  out.println(\" --> StandardOutMessageRenderer: constructor called\");\n}\n@Override\n\
  public void render() {\nif (messageProvider == null) {\nthrow new RuntimeException(\n\
  \"You must set the property messageProvider of class:\"\n+ StandardOutMessageRenderer.class.getName());\n\
  }\nout.println(messageProvider.getMessage());\n}\n@Override\npublic void setMessageProvider(MessageProvider\
  \ provider) {\nout.println(\" --> StandardOutMessageRenderer: setting the provider\"\
  );\nthis.messageProvider = provider;\n}\n@Override\npublic MessageProvider getMessageProvider()\
  \ {\nreturn this.messageProvider;\n}\n}\n代码清单 2-12\nMessageRenderer 实现\n```\n\n\
  现在剩下的就是重写入口类的 `main(..)` 方法，如代码清单 2-13 所示。\n\n```\npackage com.apress.prospring6.two.decoupled;\n\
  public class HelloWorldDecoupled {\npublic static void main(String... args) {\n\
  MessageRenderer mr = new StandardOutMessageRenderer();\nMessageProvider mp = new\
  \ HelloWorldMessageProvider();\nmr.setMessageProvider(mp);\nmr.render();\n}\n}\n\
  代码清单 2-13\n新的 main(..) 方法\n```\n\n图 2-9 描绘了到目前为止构建的应用程序的抽象架构。\n\n![](img/315511_6_En_2_Fig9_HTML.jpg)\n\
  \n一个流程图，展示了从 Hello World 消息提供者，通过消息提供者和标准输出消息渲染器（由 Hello World 解耦创建）流向消息渲染器的过程。\n\
  \n图 2-9\n\n一个更加解耦的 Hello World 应用程序\n\n这里的代码相当简单：\n\n*   我们实例化了 `HelloWorldMessageProvider`\
  \ 和 `StandardOutMessageRenderer` 的实例，尽管声明的类型分别是 `MessageProvider` 和 `MessageRenderer`。这是因为在编程逻辑中，我们只需要与接口提供的方法进行交互，而\
  \ `HelloWorldMessageProvider` 和 `StandardOutMessageRenderer` 已经分别实现了这些接口。\n\n* \
  \  然后，我们将 `MessageProvider` 传递给 `MessageRenderer`，并调用 `MessageRenderer#render()`。\n\
  \n如果我们编译并运行这个程序，会得到预期的 \"Hello World!\" 输出。现在，这个示例更接近我们想要的效果，但还有一个小问题。更改 `MessageRenderer`\
  \ 或 `MessageProvider` 接口的任何实现都意味着要修改代码。\n\n为了解决这个问题，我们需要将获取两个实现类型并实例化它们的职责委托给其他人。最*手动*的方式是创建一个简单的工厂类，该类从属性文件中读取实现类名，并代表应用程序实例化它们，如代码清单\
  \ 2-14 所示。\n\n\n\n```\npackage com.apress.prospring6.two.decoupled;\nimport java.util.Optional;\n\
  import java.util.Properties;\npublic class MessageSupportFactory {\nprivate static\
  \ MessageSupportFactory instance;\nprivate Properties props;\nprivate MessageRenderer\
  \ renderer;\nprivate MessageProvider provider;\nprivate MessageSupportFactory()\
  \ {\nprops = new Properties();\ntry {\nprops.load(this.getClass().getResourceAsStream(\"\
  /msf.properties\"));\nString rendererClass = props.getProperty(\"renderer.class\"\
  );\nString providerClass = props.getProperty(\"provider.class\");\nrenderer = (MessageRenderer)\
  \ Class.forName(rendererClass).getDeclaredConstructor().newInstance();\nprovider\
  \ = (MessageProvider) Class.forName(providerClass).getDeclaredConstructor().newInstance();\n\
  } catch (Exception ex) {\nex.printStackTrace();\n}\n}\nstatic {\ninstance = new\
  \ MessageSupportFactory();\n}\npublic static MessageSupportFactory getInstance()\
  \ {\nreturn instance;\n}\npublic Optional getMessageRenderer() {\nreturn renderer\
  \ != null?  Optional.of(renderer) : Optional.empty();\n}\npublic Optional getMessageProvider()\
  \ {\nreturn provider!= null?  Optional.of(provider) : Optional.empty();\n}\n}\n\
  清单 2-14\n负责检索两种实现类型并实例化它们的实例工厂类\n```\n\n这里的实现简单且基础，错误处理过于简化，配置文件名是硬编码的，但我们已经有了相当数量的代码。该类的配置文件非常简单，如清单\
  \ 2-15 所示。\n\n```\nrenderer.class=com.apress.prospring6.ch2.decoupled.StandardOutMessageRenderer\n\
  provider.class=com.apress.prospring6.ch2.decoupled.HelloWorldMessageProvider\n清单\
  \ 2-15\nMessageSupportFactory 类的配置文件内容，即 msf.properties 文件的内容\n```\n\n配置文件必须位于项目的类路径中。当从\
  \ IntelliJ IDEA 运行时，该文件位于 `chapter02/src/main/resources` 目录下，并在运行代码时被添加到类路径中。\n\n\
  为了将检索 `MessageProvider` 和 `MessageRenderer` 实例的职责委托给 `MessageSupportFactory`，必须修改\
  \ `main(..)` 方法，如清单 2-16 所示。\n\n```\npackage com.apress.prospring6.two.decoupled;\n\
  public class HelloWorldDecoupledWithFactory {\npublic static void main(String...\
  \ args) {\nMessageRenderer mr = MessageSupportFactory.getInstance().getMessageRenderer()\n\
  .orElseThrow(() -> new IllegalArgumentException(\"Service of type 'MessageRenderer'\
  \ was not found!\"));\nMessageProvider mp = MessageSupportFactory.getInstance().getMessageProvider()\n\
  .orElseThrow(() -> new IllegalArgumentException(\"Service of type 'MessageProvider'\
  \ was not found!\"));\nmr.setMessageProvider(mp);\nmr.render();\n}\n}\n清单 2-16\n\
  使用 MessageSupportFactory 的 HelloWorld 版本\n```\n\n然而，还有另一种使用纯 Java 实现此功能的方法，无需创建\
  \ `MessageSupportFactory` 类，因为 `java.util` 包中已经有一个名为 `ServiceLoader` 的类可以完成完全相同的工作。该类在\
  \ Java 6 中引入，用于方便地发现和加载与给定接口匹配的实现。该类检索其实现的接口被称为*服务提供者接口（Service Provider Interface，SPI）*。\n\
  \n这种方法与 `MessageSupportFactory` 类似，只是配置文件名必须遵守三条规则：\n\n*   必须位于项目类路径中名为 `META-INF/services`\
  \ 的目录下。\n*   文件名是 SPI 的完全限定名。\n*   其内容是 SPI 实现的完全限定名。\n\n这意味着需要在 `src/main/resources`\
  \ 中创建如清单 2-17 所示的目录和文件结构。\n\n```\n└── resources\n└── META-INF\n└── services\n├──\
  \ com.apress.prospring6.two.decoupled.MessageProvider\n└── com.apress.prospring6.two.decoupled.MessageRenderer\n\
  清单 2-17\nServiceLoader 的配置文件位置\n```\n\n`com.apress.prospring6.two.decoupled.MessageProvider`\
  \ 文件包含 SPI 实现的完全限定名，在本例中为 `com.apress.prospring6.two.decoupled.HelloWorldMessageProvider`。\n\
  \n`com.apress.prospring6.two.decoupled.MessageRenderer` 文件包含 SPI 实现的完全限定名，在本例中为\
  \ `com.apress.prospring6.two.decoupled.StandardOutMessageRenderer`。\n\n清单 2-18 展示了使用\
  \ `ServiceLoader` 的 `main(..)` 方法。\n\n```\npackage com.apress.prospring6.two.decoupled;\n\
  import java.util.ServiceLoader;\npublic class HelloWorldWithServiceLoader {\npublic\
  \ static void main(String... args) {\nServiceLoader slr =             ServiceLoader.load(MessageRenderer.class);\n\
  ServiceLoader slp = ServiceLoader.load(MessageProvider.class);\nMessageRenderer\
  \ mr = slr.findFirst()\n.orElseThrow(() -> new IllegalArgumentException(\"Service\
  \ of type 'MessageRenderer' was not found!\"));\nMessageProvider mp = slp.findFirst()\n\
  .orElseThrow(() -> new IllegalArgumentException(\"Service of type 'MessageProvider'\
  \ was not found!\"));\nmr.setMessageProvider(mp);\nmr.render();\n}\n}\n清单 2-18\n\
  使用 ServiceLoader 的 HelloWorld 版本\n```\n\n![](img/315511_6_En_2_Figl_HTML.jpg)一个灯泡图标的插图。 对于这个示例来说，`ServiceLoader`\
  \ 有些大材小用，它在配置了 Java 模块的多模块项目中才真正展现出其强大之处。提供实现的模块在其 `module.java` 文件中声明：`provides\
  \ {SPI} with {SPI-Implementation}`。使用该服务的模块不知道实现来自何处，也不知道其完全限定名；它只需在其 `main.java`\
  \ 文件中声明 `uses {SPI}`，然后 `ServiceLoader` 就会选取在类路径上找到的任何实现。你可以在 Apress 于 2022 年出版的\
  \ *Java 17 for Absolute Beginners* 中找到更多相关细节。\n\n在我们继续探讨如何将 Spring 引入此应用程序之前，先快速回顾一下我们已经完成的工作：\n\
  \n*   我们从简单的 Hello World 应用程序开始。\n*   我们定义了应用程序必须满足的两个额外需求：\n    *   更改消息应该很简单。\n\
  \    *   更改渲染机制也应该很简单。\n*   为了满足这些需求，我们使用了两个接口：`MessageProvider` 和 `MessageRenderer`。\n\
  *   `MessageRenderer` 接口依赖于 `MessageProvider` 接口的实现，以便能够检索要渲染的消息。\n*   最后，我们添加了一个简单的工厂类来检索实现类的名称，并在适用时实例化它们。而这只是展示一下，因为\
  \ `ServiceLoader` 已经存在了。\n\n### 使用 Spring 进行重构\n\n前面展示的 `MessageSupportFactory`\
  \ 示例满足了为示例应用程序设定的目标，但其主要问题在于将应用程序拼凑在一起所需的胶水代码量很大，同时还要保持组件之间的松散耦合。使用 `SpringLoader`\
  \ 是在应用程序中使用依赖注入的 Java 方式，并消除了编写所有这些胶水代码的必要性。然而，还有一个问题仍然存在：我们仍然需要在 `main(..)` 方法的代码中手动且显式地为\
  \ `MessageRenderer` 提供 `MessageProvider` 的实例。这最后一个问题可以通过 Spring 来解决。\n\n\n\n####\
  \ 使用 Spring XML 配置\n\n由于我们使用 Spring 来实现完整解决方案，`SpringLoader` 已不再必要，取而代之的是一个名为 `ApplicationContext`\
  \ 的 Spring 接口。无需过多担心这个接口；目前，只需知道 Spring 使用该接口来存储与被其管理的应用程序相关的所有环境信息即可。该接口扩展了另一个接口\
  \ `ListableBeanFactory`，后者充当所有 Spring 管理的 Bean 实例的提供者。请查看代码清单 2-19 中的代码片段。\n\n```\n\
  package com.apress.prospring6.two;\nimport com.apress.prospring6.two.decoupled.MessageRenderer;\n\
  import org.springframework.context.ApplicationContext;\nimport org.springframework.context.support.ClassPathXmlApplicationContext;\n\
  public class HelloWorldSpringDI {\npublic static void main(String... args) {\nApplicationContext\
  \ ctx = new ClassPathXmlApplicationContext(\"spring/app-context.xml\");\nMessageRenderer\
  \ mr = ctx.getBean(\"renderer\", MessageRenderer.class);\nmr.render();\n}\n}\n清单\
  \ 2-19\n使用 Spring 的 HelloWorld 版本\n```\n\n在上一个代码片段中，你可以看到 `main(..)` 方法获取了一个 `ClassPathXmlApplicationContext`\
  \ 实例（应用程序配置信息从项目类路径下的 `spring/app-context.xml` 文件加载），其类型为 `ApplicationContext`，并从中通过\
  \ `ApplicationContext#getBean()` 方法获取 `MessageRenderer` 实例。暂时无需过多担心 `getBean()`\
  \ 方法；只需知道该方法读取应用程序配置（此处为 XML 文件），初始化 Spring 的 `ApplicationContext` 环境，然后返回配置好的 Bean\
  \ 实例。这个 `app-context.xml` XML 文件的作用与之前用于 `MessageSupportFactory` 或 `ServiceLoader`\
  \ 的配置文件相同。该文件的内容如清单 2-20 所示。\n\n```\n\n清单 2-20\nSpring XML 配置文件\n```\n\n清单 2-20\
  \ 展示了一个典型的 Spring `ApplicationContext` 配置。首先，声明了 Spring 的命名空间，默认命名空间是 `beans`。`beans`\
  \ 命名空间用于声明需要由 Spring 管理的 Bean，并声明它们的依赖需求（在前面的示例中，`renderer` Bean 的 `messageProvider`\
  \ 属性引用了 `provider` Bean）。Spring 将解析并注入这些依赖。\n\n随后，我们声明了 ID 为 `provider` 的 Bean 及其对应的实现类。当\
  \ Spring 在 `ApplicationContext` 初始化期间看到这个 Bean 定义时，它会实例化该类，并使用指定的 ID 进行存储。\n\n然后，声明了\
  \ `renderer` Bean 及其对应的实现类。请记住，该 Bean 依赖于 `MessageProvider` 接口来获取要渲染的消息。为了告知 Spring\
  \ 这个 DI 需求，我们使用了 `p` 命名空间属性。标签属性 `p:messageProvider-ref=\"provider\"` 告诉 Spring，Bean\
  \ 的属性 `messageProvider` 应该被注入另一个 Bean。要注入到该属性的 Bean 应引用 ID 为 `provider` 的 Bean。当\
  \ Spring 看到这个定义时，它会实例化该类，查找名为 `messageProvider` 的 Bean 属性，并将 ID 为 `provider` 的 Bean\
  \ 实例注入其中。\n\n如你所见，在 Spring 的 `ApplicationContext` 初始化之后，`main(..)` 方法现在只需通过其类型安全的\
  \ `getBean()` 方法（传入 ID 和期望的返回类型，即 `MessageRenderer` 接口）获取 `MessageRenderer` Bean，并调用\
  \ `render()`。Spring 已经创建了 `MessageProvider` 实例并将其注入到 `MessageRenderer` 实例中。请注意，我们无需对使用\
  \ Spring 进行装配的类做任何修改。实际上，这些类没有引用 Spring，并且完全不知道它的存在。然而，情况并非总是如此。你的类可以实现 Spring 指定的接口，以多种方式与\
  \ DI 容器进行交互。\n\n有了新的 Spring 配置和修改后的 `main(..)` 方法，让我们看看它的实际效果。使用 Gradle 或 Maven，通过执行\
  \ `pro-spring-6/README.adoc` 中的任意命令来构建整个项目。\n\n需要在配置文件中声明的唯一 Spring 模块是 `spring-context`。Gradle/Maven\
