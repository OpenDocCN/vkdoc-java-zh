  使用 Spring Boot 非常实用，因为无需声明 `jakarta.jms.ConnectionFactory` bean；它会自动设置。`spring.artemis.embedded.queues`
  属性配置了一个逗号分隔的队列列表，这些队列将在启动时创建。默认情况下，Spring Boot 会配置一个类型为 `org.springframework.jms.connection.CachingConnectionFactory`
  的 bean。此类型是 `org.springframework.jms.connection.SingleConnectionFactory` 的扩展。这是一个特殊的类，它确保打开一个单一的
  JMS 连接，并在所有需要与 JMS 服务器通信的对象之间共享。`CachingConnectionFactory` 为消息生产者和消费者增加了缓存行为。图 13-5
  展示了 `jakarta.jms.ConnectionFactory` 最常见的实现。


