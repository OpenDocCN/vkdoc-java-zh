  \ fromDb\n                .map(s -> ResponseEntity.ok().body(s))\n             \
  \   .orElseGet(() -> ResponseEntity.notFound().build());\n    }\n\n    @PostMapping(path=\"\
  /\")\n    public ResponseEntity create(@RequestBody @Valid Singer singer) {\n  \
  \      LOGGER.info(\"Creating singer: {}\" , singer);\n        try {\n         \
