  \ 5 已放弃对 XML 配置的支持。这种配置 Spring 应用程序的方式可能仍会在遗留项目中使用，因此，如果你最终从事此类项目，请随意查阅本书的先前版本。\n\
  \n\n\n#### 使用注解进行 Spring 配置\n\n从 Spring 3.0 开始，开发 Spring 应用时不再需要 XML 配置文件。它们可以被**注解**和**Java\
  \ 配置类**所取代。配置类是使用 `@Configuration` 注解的 Java 类，其中包含 Bean 定义（使用 `@Bean` 注解的方法），或者通过使用\
  \ `@ComponentScanning` 注解自身来配置，以识别应用中的 Bean 定义。前面介绍的 `app-context.xml` 文件的等效形式如清单\
  \ 2-23 所示。\n\n```\npackage com.apress.prospring6.two.annotated;\n// 省略部分导入\nimport\
  \ org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
  @Configuration\npublic class HelloWorldConfiguration {\n@Bean // // 等同于 \npublic\
  \ MessageProvider provider() {\nreturn new HelloWorldMessageProvider();\n}\n@Bean\
  \ // // 等同于 \npublic MessageRenderer renderer(){\nMessageRenderer renderer = new\
  \ StandardOutMessageRenderer();\nrenderer.setMessageProvider(provider());\nreturn\
  \ renderer;\n}\n}\n清单 2-23\nSpring Java 配置类\n```\n\n`main(..)` 方法必须按如下方式修改：`ClassPathXmlApplicationContext`\
  \ 必须替换为另一个能够从配置类读取 Bean 定义的 `ApplicationContext` 实现。这个类是 `AnnotationConfigApplicationContext`。该方法的版本如清单\
  \ 2-24 所示。\n\n```\npackage com.apress.prospring6.two.annotated;\n// 省略部分导入\nimport\
  \ org.springframework.context.ApplicationContext;\nimport org.springframework.context.annotation.AnnotationConfigApplicationContext;\n\
  public class HelloWorldSpringAnnotated {\npublic static void main(String... args)\
  \ {\nApplicationContext ctx = new AnnotationConfigApplicationContext(HelloWorldConfiguration.class);\n\
  MessageRenderer mr = ctx.getBean(\"renderer\", MessageRenderer.class);\nmr.render();\n\
  }\n}\n清单 2-24\n启动使用 Java 配置的 Spring 应用的 main(..) 方法\n```\n\n这只是使用注解和配置类进行配置的一个版本。没有\
  \ XML，Spring 配置变得相当灵活。你将在本书后面学到更多相关内容，但在配置方面，重点在于 Java 配置和注解。\n\n![](img/315511_6_En_2_Figo_HTML.jpg)一个带有感叹号的三角形插图。 Hello\
  \ World 示例中定义的一些接口和类可能会在后续章节中使用。虽然我们在本例中展示了完整的源代码，但后续章节可能会展示精简版的代码以避免冗长，尤其是在增量修改代码的情况下。代码的组织方式允许模块间代码复用。所有可在后续\
  \ Spring 示例中使用的类都放在 `com.apress.prospring6.two.decoupled` 和 `com.apress.prospring6.two.annotated`\
  \ 包下。\n\n## 本章小结\n\n本章介绍了开始使用 Spring 所需的所有背景信息。我们展示了如何通过依赖管理系统以及直接从 GitHub 获取当前开发版本来开始使用\
  \ Spring。我们描述了 Spring 的打包方式以及每个 Spring 特性所需的依赖。利用这些信息，你可以明智地决定你的应用需要哪些 Spring JAR\
  \ 文件，以及需要随应用一起分发哪些依赖。Spring 的文档、指南和测试套件为 Spring 用户提供了一个理想的起点来开始他们的 Spring 开发，因此我们花了一些时间来探讨\
  \ Spring 提供了哪些资源。\n\n最后，我们通过一个示例展示了如何使用 Spring DI 将传统的 Hello World 示例变成一个松散耦合、可扩展的消息渲染应用。需要认识到的重要一点是，我们在本章中只是浅尝了\
  \ Spring DI 的皮毛，对 Spring 整体而言也只是触及了冰山一角。在下一章中，我们将深入探讨 Spring 中的 IoC 和 DI。\n\n脚注\
