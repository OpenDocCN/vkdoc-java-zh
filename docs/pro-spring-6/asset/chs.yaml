  尽管此示例仅演示了在组合过程中使用 `MethodMatchers`，但在构建切入点时，使用 `ClassFilter` 也同样简单。实际上，在构建复合切入点时，你可以组合使用
  `MethodMatchers` 和 `ClassFilters`。


  ### 组合与 `Pointcut` 接口


  在上一节中，你了解了如何通过使用多个 `MethodMatchers` 和 `ClassFilters` 来创建复合切入点。你也可以通过使用其他实现了 `Pointcut`
  接口的对象来创建复合切入点。


  构造复合切入点的另一种方法是使用 `org.springframework.aop.support.Pointcuts` 类。该类提供了三个静态方法。`intersection()`
  和 `union()` 方法都接受两个切入点作为参数来构造复合切入点。另一方面，还提供了一个 `matches(Pointcut, Method, Class,
  Object[])` 方法，用于快速检查切入点是否与给定的方法、类和方法参数匹配。


  `Pointcuts` 类仅支持对两个切入点进行操作。因此，如果你需要将 `MethodMatcher` 和 `ClassFilter` 与 `Pointcut`
  结合使用，则需要使用 `ComposablePointcut` 类。然而，当你只需要组合两个切入点时，`Pointcuts` 类会更方便。


  ### 切入点总结


  Spring 提供了一套强大的 `Pointcut` 实现，应该能够满足你应用程序的大部分（如果不是全部）需求。请记住，如果你找不到合适的切入点，你可以通过实现
  `Pointcut`、`MethodMatcher` 和 `ClassFilter` 来从头创建自己的实现。


  你可以使用两种模式来组合切入点和通知器。第一种模式（我们目前使用的模式）是将 `Pointcut` 实现与通知器解耦。在我们到目前为止看到的代码中，我们创建了
  `Pointcut` 实现的实例，然后使用 `DefaultPointcutAdvisor` 实现将通知与 `Pointcut` 一起添加到代理中。


  第二种选择（Spring 文档中的许多示例都采用这种方式）是将 `Pointcut` 封装在你自己的 `Advisor` 实现中。这样，你就拥有了一个同时实现
  `Pointcut` 和 `PointcutAdvisor` 的类，其中 `PointcutAdvisor.getPointcut()` 方法简单地返回 `this`。这是
  Spring 中许多类（例如 `StaticMethodMatcherPointcutAdvisor`）所采用的方法。我们发现第一种方法最为灵活，允许你将不同的
  `Pointcut` 实现与不同的 `Advisor` 实现结合使用。然而，第二种方法在你将在应用程序的不同部分（甚至跨多个应用程序）使用相同的 `Pointcut`
  和 `Advisor` 组合时非常有用。


  当每个 `Advisor` bean 必须拥有一个独立的 `Pointcut` 实例时，第二种方法非常有用；通过让 `Advisor` 负责创建 `Pointcut`，你可以确保这一点。如果你还记得上一节关于代理性能的讨论，你会记得未通知的方法比已通知的方法性能要好得多。因此，你应该确保通过使用
  `Pointcuts`，只通知那些绝对必要的方法。这样，你就可以减少因使用 AOP 而给应用程序增加的不必要开销。


  ## 引言入门


  引言是 Spring 中 AOP 功能集的重要组成部分。通过使用引言，你可以动态地向现有对象引入新功能。在 Spring 中，你可以向现有对象引入任何接口的实现。你可能很想知道这到底有什么用处。既然可以在开发时简单地添加功能，为什么还要在运行时动态添加呢？这个问题的答案很简单：当功能是横切性的，并且不容易使用传统通知实现时，你就会动态地添加功能。



  ### 引言基础


  Spring 将引介视为一种特殊类型的通知，更具体地说，是一种特殊类型的环绕通知。由于引介仅应用于类级别，因此你不能将切点与引介一起使用；从语义上讲，两者并不匹配。引介会向类添加新的接口实现，而切点则定义通知应用于哪些方法。你可以通过实现
  `IntroductionInterceptor` 接口来创建引介，该接口扩展了 `MethodInterceptor` 和 `DynamicIntroductionAdvice`
  接口。


