  \ `ResponseEntity.notFound().build()`。这导致相同的代码被编写了好几次。更糟糕的是，当在数据库中找不到歌手时，我们还会返回这种类型的响应。那么，所有这些重复的代码能否避免呢？当然可以，你将通过阅读下一节来学习如何做到这一点。\n\
  \n### 使用 `@RestControllerAdvice` 进行 REST 异常处理\n\n为了减少需要编写的代码，我们可以编写一个 `SingerService`，它封装了\
  \ `SingerRepo`，并抛出一个名为 `NotFoundException` 的异常，该异常被声明为继承 `RuntimeException`，因为受检异常很烦人。我们在控制器中注入一个此类型的\
  \ Bean，并用 `@ResponseStatus(value= HttpStatus.NOT_FOUND)` 注解该类，然后*瞧*，该异常会自动映射到返回给客户端的响应状态。清单\
  \ 15-17 展示了 `NotFoundException` 类。\n\n```\npackage com.apress.prospring6.fifteen.problem;\n\
  import org.springframework.http.HttpStatus;\nimport org.springframework.web.bind.annotation.ResponseStatus;\n\
  import java.io.Serial;\n\n@ResponseStatus(value= HttpStatus.NOT_FOUND, reason=\"\
  Requested item(s) not found\")\npublic class NotFoundException extends RuntimeException\
  \ {\n    @Serial\n    private static final long serialVersionUID = 2L;\n    private\
  \ Long objIdentifier;\n\n    public  NotFoundException(Class cls) {\n        super(\"\
  table for \" + cls.getSimpleName() + \" is empty\");\n    }\n\n    public  NotFoundException(Class\
  \ cls, Long id) {\n        super(cls.getSimpleName() + \" with id: \" + id + \"\
  \ does not exist!\");\n    }\n\n    public Long getObjIdentifier() {\n        return\
  \ objIdentifier;\n    }\n}\n清单 15-17\nNotFoundException REST 特定异常类\n```\n\n请注意，可以通过\
  \ `reason` 属性附加一条错误消息，该消息将成为响应的一部分。\n\n清单 15-18 展示了 `SingerService` 的实现，当找不到某些数据时，它会抛出这种类型的异常。\n\
  \n```\npackage com.apress.prospring6.fifteen.services;\nimport com.apress.prospring6.fifteen.problem.NotFoundException;\n\
  // 其他导入语句已省略\n\n@Transactional\n@Service(\"singerService\")\npublic class SingerServiceImpl\
  \ implements SingerService {\n    private final SingerRepo singerRepo;\n\n    public\
  \ SingerServiceImpl(SingerRepo singerRepo) {\n        this.singerRepo = singerRepo;\n\
  \    }\n\n    @Override\n    public List findAll() {\n        var singers = singerRepo.findAll();\n\
  \        if(singers.isEmpty()) {\n            throw new NotFoundException(Singer.class);\n\
  \        }\n        return singerRepo.findAll();\n    }\n\n    @Override\n    public\
  \ Singer findById(Long id) {\n        return singerRepo.findById(id).orElseThrow(()\
  \ -> new NotFoundException(Singer.class, id));\n    }\n\n    @Override\n    public\
  \ Singer save(Singer singer) {\n        return singerRepo.save(singer);\n    }\n\
  \n    @Override\n    public Singer update(Long id, Singer singer) {\n        return\
  \  singerRepo.findById(id)\n                .map(s ->  {\n                    s.setFirstName(singer.getFirstName());\n\
  \                    s.setLastName(singer.getLastName());\n                    s.setBirthDate(singer.getBirthDate());\n\
  \                    return singerRepo.save(s);\n                })\n          \
  \      .orElseThrow(() -> new NotFoundException(Singer.class, id));\n    }\n\n \
  \   @Override\n    public void delete(Long id) {\n        Optional fromDb = singerRepo.findById(id);\n\
  \        if (fromDb.isEmpty())  {\n            throw new NotFoundException(Singer.class,\
  \ id);\n        }\n        singerRepo.deleteById(id);\n    }\n}\n清单 15-18\nSingerService\
  \ 类\n```\n\n请注意，我们之前在控制器处理方法中的大部分逻辑现在都已移到了这个类中。这意味着我们可以编写一个名为 `Singer3Controller`\
  \ 的新控制器，来使用此类型的 Bean，并且这个控制器将更加优雅和紧凑，如清单 15-19 所示。\n\n\n\n```\npackage com.apress.prospring6.fifteen.controllers;\n\
