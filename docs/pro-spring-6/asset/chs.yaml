  ## Spring JDBC 基础设施


  我们在本章第一部分讨论的代码并不复杂，但很繁琐，而且由于需要编写大量代码，编码错误的可能性相当高。现在是时候看看 Spring 如何让事情变得更简单、更优雅了。




  ### 概述与使用的包


  Spring 中的 JDBC 支持分为五个包，详见表 6-1；每个包处理 JDBC 访问的不同方面。


  表 6-1


  Spring JDBC 包


  | 包 | 描述 |

  | --- | --- |

  | `org.springframework.jdbc.core` | 该包包含 Spring 中 JDBC 类的基础。它包括核心 JDBC 类 `JdbcTemplate`，它简化了使用
  JDBC 进行数据库操作的编程。几个子包提供了更具体用途的 JDBC 数据访问支持（例如，支持命名参数的 `JdbcTemplate` 类）以及相关的支持类。
  |

  | `org.springframework.jdbc.datasource` | 该包包含辅助类和 `DataSource` 实现，可用于在 JEE 容器之外运行
  JDBC 代码。几个子包提供了对嵌入式数据库、数据库初始化以及各种数据源查找机制的支持。 |

  | `org.springframework.jdbc.object` | 该包包含帮助将数据库返回的数据转换为对象或对象列表的类。这些对象和列表是普通的 Java
  对象，因此与数据库断开连接。 |

  | `org.springframework.jdbc.support` | 该包中最重要的类是 `SQLException` 转换支持。这允许 Spring
  识别数据库使用的错误代码，并将其映射到更高级别的异常。 |

  | `org.springframework.jdbc.config` | 该包包含支持在 Spring 的 `ApplicationContext` 中进行
  JDBC 配置的类。例如，它包含用于处理嵌入式数据库的类。 |


  让我们从最低级别的功能开始讨论 Spring JDBC 支持。在运行 SQL 查询之前，你需要做的第一件事是建立与数据库的连接。


  ### 数据库连接与数据源


  你可以通过提供一个实现 `javax.sql.DataSource` 的 bean，让 Spring 为你管理数据库连接。`DataSource` 和 `Connection`
  之间的区别在于，`DataSource` 提供并管理连接。


  `org.springframework.jdbc.datasource` 包中的 `DriverManagerDataSource` 是 `DataSource`
  最简单的实现。通过查看类名，你可以猜到它只是调用 `DriverManager` 来获取连接。`DriverManagerDataSource` 不支持数据库连接池，这使得该类仅适用于测试。`DriverManagerDataSource`
  的配置非常简单，如清单 6-9 所示；你只需提供驱动程序类名、连接 URL、用户名和密码。


  ```

  driverClassName=org.mariadb.jdbc.Driver

  url=jdbc:mariadb://localhost:3306/musicdb?useSSL=false

  username=prospring6

  password=prospring6

  清单 6-9

  jdbc.properties 的内容

  ```


  你很可能能识别出清单中的属性。它们代表通常传递给 JDBC 以获取 `Connection` 接口的值。数据库连接信息通常存储在属性文件中，以便于在不同部署环境中进行维护和替换。`jdbc.properties`
  中的属性由 Spring 注入到 Java 配置类的属性中。这样的配置类看起来与清单 6-10 中显示的非常相似。


  ```

  package com.apress.prospring6.six.config;

  import org.slf4j.Logger;

  import org.slf4j.LoggerFactory;

  import org.springframework.beans.factory.annotation.Value;

  import org.springframework.context.annotation.Bean;

  import org.springframework.context.annotation.Configuration;

  import org.springframework.context.annotation.PropertySource;

  import org.springframework.jdbc.datasource.SimpleDriverDataSource;

  import javax.sql.DataSource;

  import java.sql.Driver;

  @Configuration

  @PropertySource("classpath:db/jdbc.properties")

  public class SimpleDataSourceCfg {

  private static Logger LOGGER = LoggerFactory.getLogger(SimpleDataSourceCfg.class);

  @Value("${jdbc.driverClassName}")

  private String driverClassName;

  @Value("${jdbc.url}")

  private String url;

  @Value("${jdbc.username}")

  private String username;

  @Value("${jdbc.password}")

  private String password;

  public DataSource dataSource() {

  try {

  var dataSource = new SimpleDriverDataSource();

  Class driver = (Class) Class.forName(driverClassName);

  dataSource.setDriverClass(driver);

  dataSource.setUrl(url);

  dataSource.setUsername(username);

  dataSource.setPassword(password);

  return dataSource;

  } catch (Exception e) {

  LOGGER.error("DBCP DataSource bean cannot be created!", e);

  return null;

  }

  }

  }

  清单 6-10

  数据库配置类

  ```


  测试这样的配置类很容易；只需基于它创建一个应用程序上下文并检查其中的 bean。清单 6-11 显示了一个测试类，其中包含一个检查 `DataSource` bean
  是否存在并使用它执行简单 SQL 检查语句的方法。




  ```

  package com.apress.prospring6.six.plain;

  // 导入语句已省略

  public class DataSourceConfigTest {

  private static Logger LOGGER = LoggerFactory.getLogger(DataSourceConfigTest.class);

  @Test

  public void testSimpleDataSource() throws SQLException {

  var ctx = new AnnotationConfigApplicationContext(SimpleDataSourceCfg.class);

  var dataSource = ctx.getBean("dataSource", DataSource.class);

  assertNotNull(dataSource);

  testDataSource(dataSource);

  ctx.close();

  }

  private void testDataSource(DataSource dataSource) throws SQLException{

  try (var connection = dataSource.getConnection();

  var statement = connection.prepareStatement("SELECT 1");

  var resultSet = statement.executeQuery()){

  while (resultSet.next()) {

  int mockVal = resultSet.getInt("1");

  assertEquals(1, mockVal);

  }

  } catch (Exception e) {

  LOGGER.debug("发生了意外情况。", e);

  }

  }

  }

  清单 6-11  检查 SimpleDataSourceCfg 类有效性的测试类

  ```


  之所以使用测试类，是因为这样既能更实际地复用部分代码，也能教你使用 JUnit 为你编写的任何代码快速编写测试。`testOne()` 方法用于测试 `SimpleDataSourceCfg`
  配置类。从任意配置中获取 `dataSource` bean 后，使用模拟查询 `SELECT 1` 来测试与 MariaDB 数据库的连接。


  在实际应用中，你可以使用 Apache Commons 的 `BasicDataSource`^(⁴⁸) 类，或由 JEE 应用服务器（例如 JBoss、WildFly、WebSphere、WebLogic
  或 GlassFish）实现的 `DataSource`，这可以进一步提升应用程序的性能。你可以在纯 JDBC 代码中使用 `DataSource` 并获得相同的连接池优势；然而，在大多数情况下，你仍然需要一个中心位置来配置
  `DataSource`。另一方面，Spring 允许你声明一个 `dataSource` bean，并在 `ApplicationContext` 定义文件中设置连接属性。请参见清单
  6-12 中的配置示例，该示例使用 `org.apache.commons.dbcp2.BasicDataSource` 实现替代了 `SimpleDriverDataSource`。


  ```

  package com.apress.prospring6.six.config;

