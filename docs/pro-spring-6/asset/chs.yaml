  这些指标可以归为几类：


  *   应用程序时间


  *   运行时间


  *   JVM——垃圾回收器活动、内存消耗、线程利用率、类数量等。


  *   CPU 使用率


  *   Spring 特定组件活动


  *   缓存活动


  *   数据源和 HikariCP 活动


  *   Tomcat 使用情况


  *   Spring MVC 和 WebFlux 请求延迟（仅适用于 Spring Boot MVC 和 WebFlux 应用程序）


  *   其他自定义组件活动：`RestTemplate` 延迟、文件描述符使用情况、事件日志记录、RabbitMQ 或 ApacheMQ（如果使用）连接工厂等。


  那么，当运行应用程序生成大量数据时，我们可以用它做什么呢？嗯，我们将其处理成可以用肉眼查看的报告和图表，进而可以用来预测未来的行为。Micrometer 无法帮助解决这个问题，但是有一个非常易于使用的工具可以做到这一点，并且与
  Spring Boot Actuator 和 Micrometer 完美集成：Prometheus^(¹⁸⁸)。Prometheus 是一个在 SoundCloud
  构建的开源系统监控和警报工具包。它于 2012 年发布，此后成为一个独立的开源项目，拥有庞大且活跃的开发者和用户社区。


  要将我们的 Spring Boot 应用程序与 Prometheus 集成，我们需要添加 `micrometer-registry-prometheus` 依赖项。添加此依赖项后，它应该会出现在
  IntelliJ IDEA Gradle 视图中，以及它的传递依赖项，如图 18-9 所示。


