  那么 Testcontainers 呢？它能与 Spring Boot 一起使用吗？答案是*可以*，而且设置甚至更简单，因为它极大地受益于 Spring Boot
  的自动配置。在 Spring Boot 测试中使用 Testcontainers 的方法可以类似于我们对经典 Spring 应用程序所做的操作，但还有另一种方法，可以为每个测试类创建一个数据库实例。将本章前面提到的
  Testcontainers 库添加到 Spring Boot 应用程序类路径后，可以在配置文件中将 `spring.datasource.url` 属性设置为
  `jdbc:tc:mariadb:10.7.4-focal:///testdb`。`jdbc:` 前缀后的 `tc:` 将使 Testcontainers 实例化数据库实例，而无需任何代码更改。主机名、端口和数据库名称将被忽略；你可以将它们设置为自定义值或保持原样。`///`
  用于强调 `host:port` 对的不重要性。


  为了在项目中保持测试上下文的分离，我们引入了 `testcontainers` 配置文件及其对应的 `application-testcontainers.yaml`
  配置文件，如清单 6-64 所示。


  ```

  spring:

  datasource:

  url: "jdbc:tc:mariadb:10.7.4-focal:///musicdb"

  # 日志配置

  logging:

  pattern:

  console: " %-5level: %class{0} - %msg%n"

  level:

  root: INFO

  org.springframework.boot: DEBUG

  com.apress.prospring6.six: DEBUG

  org.testcontainers: DEBUG

