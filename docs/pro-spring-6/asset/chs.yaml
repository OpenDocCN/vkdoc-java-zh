  INFO : TestBean - foo()

  INFO : ControlFlowDemo -    Trying under ControlFlowDemo.test()

  INFO : SimpleBeforeAdvice - Before method: public void com.apress.prospring6.five.advanced.TestBean.foo()

  INFO : TestBean - foo()

