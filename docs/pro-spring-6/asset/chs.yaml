  INFO : DiverseValuesContainer - Setting URL: https://iuliana-cosmina.com\nINFO :\
  \ DiverseValuesContainer - Setting bytes: [74, 111, 104, 110, 32, 77, 97, 121, 101,\
  \ 114]\nINFO : DiverseValuesContainer - Setting stream & reading from it: Hello\
  \ World!\nINFO : DiverseValuesContainer - Setting pattern: a*b\nINFO : DiverseValuesContainer\
  \ - Setting character: A\nINFO : DiverseValuesContainer - Setting Boolean: true\n\
  INFO : DiverseValuesContainer - Setting stringList with: [Mayer, Psihoza, Mazikeen]\n\
  INFO : DiverseValuesContainer - Setting float value: 123.45678\nINFO : DiverseValuesContainer\
  \ - Setting trim string:    String need trimming\n清单 4-23\n显示属性被注入转换后值的输出\n```\n\
  \n如您所见，Spring 使用内置的 `PropertyEditors`，将各种属性的 `String` 表示形式转换为正确的类型。表 4-1 列出了 Spring\
  \ 中最重要的内置 `PropertyEditors`。\n\n表 4-1\n\nSpring *PropertyEditors*\n\n| PropertyEditor\
  \ | 描述 |\n| --- | --- |\n| `ByteArrayPropertyEditor` | 将 `String` 值转换为其对应的字节表示形式。\
  \ |\n| `CharacterEditor` | 从 `String` 值填充 `Character` 或 `char` 类型的属性。 |\n| `ClassEditor`\
  \ | 从完全限定的类名转换为 `Class` 实例。使用此 `PropertyEditor` 时，请注意在使用 `GenericApplicationContext`\
  \ 时，不要在类名的两侧包含任何多余的空格，否则会导致 `ClassNotFoundException`。 |\n| `CustomBooleanEditor`\
  \ | 将字符串转换为 Java `Boolean` 类型。 |\n| `CustomCollectionEditor` | 将源集合（例如，由 `valueHolder.stringList`\
  \ 属性的 SpEL 表达式表示）转换为目标 `Collection` 类型。 |\n| `CustomDateEditor` | 将日期的字符串表示形式转换为\
  \ `java.util.Date` 值。您需要在 Spring 的 `ApplicationContext` 中注册 `CustomDateEditor` 实现，并指定所需的日期格式。\
  \ |\n| `FileEditor` | 将 `String` 文件路径转换为 `File` 实例。Spring 不会检查文件是否存在。 |\n| `InputStreamEditor`\
  \ | 将资源的字符串表示形式（例如，使用 `file:///D:/temp/test.txt` 或 `classpath:test.txt` 的文件资源）转换为输入流属性。\
  \ |\n| `LocaleEditor` | 将区域设置的 `String` 表示形式（例如 en-GB）转换为 `java.util.Locale` 实例。\
  \ |\n| `PatternEditor` | 将 `String` 转换为 JDK `Pattern` 对象，反之亦然。 |\n| `PropertiesEditor`\
  \ | 将格式为 `key1=value1 key2=value2 keyn=valuen` 的 `String` 转换为 `java.util.Properties`\
  \ 实例，并配置相应的属性。 |\n| `StringTrimmerEditor` | 在注入前对 `String` 值执行修剪操作。您需要显式注册此编辑器。\
  \ |\n| `URLEditor` | 将 URL 的 `String` 表示形式转换为 `java.net.URL` 实例。 |\n\n这组 `PropertyEditors`\
  \ 为使用 Spring 提供了良好的基础，并使您能够更轻松地使用文件和 URL 等常见组件来配置应用程序。\n\n\n\n### 创建自定义 `PropertyEditor`\n\
  \n尽管内置的 `PropertyEditor` 实现涵盖了大多数属性类型转换的标准场景，但有时您可能需要创建自己的 `PropertyEditor`，以支持应用程序中使用的某个类或一组类。Spring\
  \ 完全支持注册自定义的 `PropertyEditor` 实现；唯一的缺点是 `java.beans.PropertyEditor` 接口包含大量方法，其中许多方法与手头的属性类型转换任务无关。幸运的是，从\
  \ JDK 5 或更高版本开始，可以使用 `PropertyEditorSupport` 类，您的自定义 `PropertyEditor` 可以继承该类，这样您只需实现一个方法：`setAsText()`。\n\
  \n让我们通过一个简单的示例来了解自定义属性编辑器的实际实现。假设我们有一个 `FullName` 类，它只有两个属性：`firstName` 和 `lastName`，其定义如清单\
  \ 4-24 所示。\n\n```\npackage com.apress.prospring6.four.custom;\nimport org.apache.commons.lang3.builder.ToStringBuilder;\n\
  public class FullName {\nprivate String firstName;\nprivate String lastName;\npublic\
  \ FullName(String firstName, String lastName) {\nthis.firstName = firstName;\nthis.lastName\
  \ = lastName;\n}\n// getters 和 toString(..) 方法已省略\n}\n清单 4-24\nNamePropertyEditor\
  \ 类，一个自定义的 PropertyEditor\n```\n\n为了简化应用程序配置，让我们开发一个自定义编辑器，它将一个以空格分隔的 `String` 分别转换为\
  \ `FullName` 类的名字和姓氏。清单 4-25 展示了自定义属性编辑器的实现。\n\n```\npackage com.apress.prospring6.four.custom;\n\
  import java.beans.PropertyEditorSupport;\npublic class NamePropertyEditor extends\
  \ PropertyEditorSupport {\n@Override\npublic void setAsText(String text) throws\
  \ IllegalArgumentException {\nString[] name = text.split(\"\\\\s\");\nsetValue(new\
  \ FullName(name[0], name[1]));\n}\n}\n清单 4-25\nFullName 类，用于演示如何构建自定义 PropertyEditor\n\
  ```\n\n这个实现很简单。它继承了 JDK 的 `PropertyEditorSupport` 类并实现了 `setAsText()` 方法。在该方法中，我们简单地将字符串以空格为分隔符拆分成一个字符串数组。然后，实例化一个\
  \ `FullName` 对象，将空格字符前的 `String` 作为名字传入，将空格字符后的 `String` 作为姓氏传入。最后，通过调用 `setValue()`\
  \ 方法传入结果来返回转换后的值。要在应用程序中使用 `NamePropertyEditor`，您需要在 Spring 的 `ApplicationContext`\
  \ 中注册该编辑器。清单 4-26 展示了 `CustomEditorConfigurer` 和 `NamePropertyEditor` 的 `ApplicationContext`\
  \ 配置，以及用于启动由这些 Bean 组成的 Spring 应用程序的代码。\n\n```\npackage com.apress.prospring6.four.custom;\n\
  import org.springframework.beans.factory.config.CustomEditorConfigurer;\n// 其他导入语句已省略\n\
  @Component\nclass Person {\nprivate FullName name;\n@Value(\"John Mayer\")\npublic\
  \ void setName(FullName name) {\nthis.name = name;\n}\npublic FullName getName()\
  \ {\nreturn name;\n}\n}\n@Configuration\n@ComponentScan\nclass CustomPropertyEditorCfg\
  \ {\n@Bean\nCustomEditorConfigurer customEditorConfigurer(){\nvar cust = new CustomEditorConfigurer();\n\
  cust.setCustomEditors(Map.of(FullName.class, NamePropertyEditor.class));\nreturn\
  \ cust;\n}\n}\npublic class CustomPropertyEditorDemo {\nprivate static Logger logger\
  \ = LoggerFactory.getLogger(CustomPropertyEditorDemo.class);\npublic static void\
  \ main(String... args) {\nvar ctx = new AnnotationConfigApplicationContext(CustomPropertyEditorCfg.class);\n\
  var person = ctx.getBean(Person.class, \"person\");\nlogger.info(\"Person full name\
  \ = {}\" , person.getName());\nctx.close();\n}\n}\n清单 4-26\n演示 PropertyEditor 的\
  \ Spring 应用程序的配置和启动代码\n```\n\n您应该注意此配置中的两点：\n\n*   自定义的 `PropertyEditor` 通过使用 `Map`\
  \ 类型的 `customEditors` 属性注入到 `CustomEditorConfigurer` Bean 中。\n\n*   `Map` 中的每个条目代表一个单独的\
  \ `PropertyEditor`，条目的键是使用该 `PropertyEditor` 的类。如您所见，`NamePropertyEditor` 的键是 `com.apress.prospring6.four.custom.FullName`，这表明这是应使用此实现的类。\n\
  \n请随意运行清单 4-26 中的代码，输出应该很简单：\n\n```\nINFO : CustomPropertyEditorDemo - Person full\
  \ name = com.apress.prospring6.four.custom.FullName@5b38c1ec[firstName=John,lastName=Mayer]\n\
  ```\n\n这是 `FullName` 类中实现的 `toString()` 方法的输出（此处未显示，因为它非常简单且与本部分无关），您可以看到 Spring\
  \ 通过使用配置的 `NamePropertyEditor` 正确地填充了 `FullName` 对象的名字和姓氏。从版本 3 开始，Spring 引入了类型转换\
  \ API 和字段格式化服务提供者接口（SPI），它们提供了更简单且结构良好的 API 来执行类型转换和字段格式化。这对于 Web 应用程序开发尤其有用。类型转换\
  \ API 和字段格式化 SPI 都将在**第** **11** **章**中详细讨论。\n\n## 更多 Spring `ApplicationContext`\
  \ 配置\n\n到目前为止，虽然我们一直在讨论 Spring 的 `ApplicationContext`，但我们涵盖的大多数功能主要围绕 `ApplicationContext`\
  \ 包装的 `BeanFactory` 接口。在 Spring 中，`BeanFactory` 接口的各种实现负责 Bean 的实例化、提供依赖注入以及为 Spring\
  \ 管理的 Bean 提供生命周期支持。然而，如前所述，作为 `BeanFactory` 接口的扩展，`ApplicationContext` 还提供了其他有用的功能。`ApplicationContext`\
  \ 的主要功能是提供一个更丰富的框架，用于构建您的应用程序。\n\n`ApplicationContext` 比 `BeanFactory` 更了解您在它内部配置的\
  \ Bean，并且在许多 Spring 基础设施类和接口（例如 `BeanFactoryPostProcessor`）的情况下，它会代表您与它们交互，从而减少您为使用\
  \ Spring 而需要编写的代码量。\n\n使用 `ApplicationContext` 的最大好处是，它允许您以完全声明式的方式配置和管理 Spring\
  \ 以及 Spring 管理的资源。这意味着，只要可能，Spring 就会提供支持类，自动将 `ApplicationContext` 加载到您的应用程序中，从而无需您编写任何代码来访问\
  \ `ApplicationContext`。实际上，此功能目前仅在您使用 Spring 构建 Web 应用程序时可用，它允许您在 Web 应用程序部署描述符中初始化\
  \ Spring 的 `ApplicationContext`。当使用独立应用程序时，您也可以通过简单的编码来初始化 Spring 的 `ApplicationContext`，正如您到目前为止所看到的那样。\n\
  \n除了提供更侧重于声明式配置的模型之外，`ApplicationContext` 还支持以下功能：\n\n*   国际化\n\n*   事件发布\n\n* \
  \  资源管理和访问\n\n*   额外的生命周期接口\n\n*   改进的基础设施组件自动配置\n\n在接下来的章节中，我们将讨论 `ApplicationContext`\
  \ 中除依赖注入之外的一些最重要的功能。\n\n\n\n## 国际化\n\nSpring 真正擅长的领域之一是对国际化（i18n）的支持。通过使用 `MessageSource`\
  \ 接口，你的应用程序可以访问以多种语言存储的字符串资源，这些资源被称为*消息*。对于你希望在应用程序中支持的每种语言，你需要维护一组消息列表，这些消息通过键值与其他语言的消息相对应。例如，如果你想用英语和乌克兰语显示“*The\
  \ quick brown fox jumped over the lazy dog*”，你需要创建两条消息，它们的键值都是 `msg`；英语消息的内容是“*The\
  \ quick brown fox jumped over the lazy dog*”，而乌克兰语消息的内容是“Те що Росія робить з Україною,\
  \ є злочином。”\n\n虽然你不需要使用 `ApplicationContext` 来使用 `MessageSource`，但 `ApplicationContext`\
  \ 接口扩展了 `MessageSource`，并为加载消息以及使其在你的环境中可用提供了特殊支持。消息的自动加载在任何环境中都可用，但自动访问仅在特定的 Spring\
  \ 管理场景中提供，例如当你使用 Spring 的 MVC 框架构建 Web 应用程序时。虽然任何类都可以实现 `ApplicationContextAware`\
  \ 从而访问自动加载的消息，但我们建议在本章后面的“在独立应用程序中使用 `MessageSource`”一节中提供一个更好的解决方案。\n\n### 使用 `MessageSource`\
  \ 实现国际化\n\n除了 `ApplicationContext` 之外，Spring 还提供了三种 `MessageSource` 实现：\n\n*   `ResourceBundleMessageSource`\n\
  *   `ReloadableResourceBundleMessageSource`\n*   `StaticMessageSource`\n\n`StaticMessageSource`\
  \ 实现不应在生产应用程序中使用，因为你无法在外部对其进行配置，而这通常是在为应用程序添加 i18n 功能时的主要需求之一。`ResourceBundleMessageSource`\
  \ 通过使用 Java 的 `ResourceBundle` 来加载消息。`ReloadableResourceBundleMessageSource` 本质上与之相同，只是它支持对底层源文件进行定时重新加载。所有这三种\
  \ `MessageSource` 实现还实现了另一个名为 `HierarchicalMessageSource` 的接口，该接口允许嵌套多个 `MessageSource`\
  \ 实例。这是 `ApplicationContext` 与 `MessageSource` 实例协同工作的关键。要利用 `ApplicationContext`\
  \ 对 `MessageSource` 的支持，你必须在配置中定义一个类型为 `MessageSource` 且名称为 `messageSource` 的 bean。`ApplicationContext`\
  \ 会获取这个 `MessageSource` 并将其嵌套在自身内部，从而允许你通过 `ApplicationContext` 访问消息。这可能难以直观理解，因此请查看清单\
  \ 4-27 中的示例，该示例展示了一个简单的应用程序，它访问了英语和乌克兰语区域设置的一组消息。\n\n```\npackage com.apress.prospring6.four;\n\
  import org.springframework.context.MessageSource;\nimport org.springframework.context.support.ResourceBundleMessageSource;\n\
  // 其他导入语句已省略\n@Configuration\nclass MessageSourceConfig {\n@Bean\npublic MessageSource\
  \ messageSource(){\nvar messageSource = new ResourceBundleMessageSource();\nmessageSource.setBasenames(\"\
  labels\");\nreturn messageSource;\n}\n}\npublic class MessageSourceDemo {\nprivate\
  \ static Logger logger = LoggerFactory.getLogger(MessageSourceDemo.class);\npublic\
  \ static void main(String... args) {\nvar ctx = new AnnotationConfigApplicationContext(MessageSourceConfig.class);\n\
  Locale english = Locale.ENGLISH;\nLocale ukrainian = new Locale(\"uk\", \"UA\");\n\
  logger.info(ctx.getMessage(\"msg\", null, english));\nlogger.info(ctx.getMessage(\"\
  msg\", null, ukrainian));\nlogger.info(ctx.getMessage(\"nameMsg\", new Object[]{\
  \ \"Iuliana\", \"Cosmina\" }, english));\nlogger.info(ctx.getMessage(\"nameMsg\"\
  , new Object[]{ \"Iuliana\", \"Cosmina\" }, ukrainian));\nctx.close();\n}\n}\n清单\
  \ 4-27\n使用 Spring ApplicationContext 的 MessageSource 配置\n```\n\n暂时不必担心对 `getMessage()`\
  \ 的调用；我们稍后会回到这些调用。现在，你只需知道它们会为指定的区域设置检索键值对应的消息。\n\n在 `MessageSourceConfig` 类中，我们按照\
  \ Spring 的要求定义了一个名为 `messageSource` 的 `ResourceBundleMessageSource` bean。我们为其配置了一组名称，以形成其文件集的基础。`ResourceBundleMessageSource`\
  \ 所使用的 Java `ResourceBundle` 基于一组由基础名称标识的属性文件。当查找特定 `Locale` 的消息时，`ResourceBundle`\
  \ 会查找一个由基础名称和区域设置名称组合命名的文件。例如，如果基础名称是 `foo`，并且我们正在查找 en-GB（英式英语）区域设置的消息，`ResourceBundle`\
  \ 会查找名为 `foo_en_GB.properties` 的文件。\n\n对于前面的示例，英语（`labels_en.properties`）和乌克兰语（`labels_uk_UA.properties`）属性文件的内容如清单\
  \ 4-28 所示。\n\n```\n#labels_en.properties\nmsg=Witnessing and not stopping evil is\
  \ condoning it\nnameMsg=My name is {0} {1}\n#labels_de_DE.properties\nmsg=Бути свідком\
  \ зла і не зупиняти його – це брати участь у цьому\nnameMsg=Мене звати {0} {1}\n\
  清单 4-28\nMessageSource 资源文件的内容\n```\n\n这些文件位于 `resources` 目录中，并被添加到应用程序的类路径中。\n\n\
  现在，这个示例引发了更多问题。那些对 `getMessage()` 的调用是什么意思？为什么我们使用 `ApplicationContext.getMessage()`\
  \ 而不是直接访问 `ResourceBundleMessageSource` bean？我们将依次回答这些问题。\n\n### 使用 `getMessage()`\
  \ 方法\n\n`MessageSource` 接口为 `getMessage()` 方法定义了三个重载。这些重载在表 4-2 中进行了描述。\n\n表 4-2\n\
  \n`getMessage(..)` 方法签名\n\n| 方法签名 | 描述 |\n| --- | --- |\n| `getMessage(String,Object[],\
  \ Locale)` | 这是标准的 `getMessage()` 方法。`String` 参数是消息的键，对应于属性文件中的键。在前面的代码示例中，第一次调用\
  \ `getMessage()` 时使用了 `msg` 作为键，这对应于 en 区域设置属性文件中的以下条目：`msg=The quick brown fox\
  \ jumped over the lazy dog`。`Object[]` 数组参数用于消息中的替换。在第三次调用 `getMessage()` 时，我们传入了一个包含两个\
  \ `String` 的数组。键为 `nameMsg` 的消息是 `My name is {0} {1}`。大括号中的数字是占位符，每个占位符都会被参数数组中对应的条目替换。最后一个参数\
  \ `Locale` 告诉 `ResourceBundleMessageSource` 要查找哪个属性文件。尽管示例中第一次和第二次调用 `getMessage()`\
  \ 使用了相同的键，但它们返回了不同的消息，这些消息对应于传递给 `getMessage()` 的 `Locale` 设置。 |\n| `getMessage(String,\
  \ Object[], String,Locale)` | 此重载的工作方式与 `getMessage(String,Object[], Locale)` 相同，只是多了一个\
  \ `String` 参数，该参数允许我们在提供的键在提供的 `Locale` 中没有可用消息时传入一个默认值。 |\n| `getMessage(MessageSourceResolvable,Locale)`\
  \ | 此重载是一个特殊情况。我们将在接下来的“`MessageSourceResolvable` 接口”一节中进一步详细讨论它。 |\n\n\n\n### 为何使用\
  \ `ApplicationContext` 作为 `MessageSource`？\n\n要回答这个问题，我们需要稍微超前一点，看看 Spring 中的 Web\
  \ 应用支持。总的来说，答案是你*不应该*使用 `ApplicationContext` 作为 `MessageSource`，因为这样做会不必要地将你的 Bean\
  \ 与 `ApplicationContext` 耦合（下一节将更详细地讨论这一点）。当你使用 Spring 的 MVC 框架构建 Web 应用时，才应该使用\
  \ `ApplicationContext`。\n\nSpring MVC 中的核心接口是 `Controller`。与 Struts 等要求你通过继承具体类来实现控制器的框架不同，Spring\
  \ 只要求你实现 `Controller` 接口（或者用 `@Controller` 注解标注你的控制器类）。话虽如此，Spring 还是提供了一系列有用的基类，你可以用它们来实现自己的控制器。这些基类中的每一个都是\
  \ `ApplicationObjectSupport` 类的子类（直接或间接），而 `ApplicationObjectSupport` 是所有希望感知 `ApplicationContext`\
  \ 的应用对象的便捷超类。请记住，在 Web 应用环境中，`ApplicationContext` 是自动加载的。\n\n`ApplicationObjectSupport`\
  \ 访问这个 `ApplicationContext`，将其包装在一个 `MessageSourceAccessor` 对象中，并通过受保护的 `getMessageSourceAccessor()`\
  \ 方法将其提供给控制器。`MessageSourceAccessor` 提供了大量便捷的方法来处理 `MessageSource` 实例。这种自动注入的形式非常有益；它消除了所有控制器暴露\
  \ `MessageSource` 属性的需要。\n\n然而，这并不是在 Web 应用中使用 `ApplicationContext` 作为 `MessageSource`\
  \ 的最佳理由。使用 `ApplicationContext` 而非手动定义的 `MessageSource` Bean 的主要原因是，Spring 会尽可能地将\
  \ `ApplicationContext` 作为 `MessageSource` 暴露给视图层。这意味着当你使用 Spring 的 JSP 标签库时，`<spring:message>`\
  \ 标签会自动从 `ApplicationContext` 读取消息；而当你使用 JSTL 时，`<fmt:message>` 标签也会执行相同的操作。\n\n\
  所有这些好处意味着，在构建 Web 应用时，最好使用 `ApplicationContext` 中的 `MessageSource` 支持，而不是单独管理一个\
  \ `MessageSource` 实例。考虑到要利用此功能，你只需配置一个名为 `messageSource` 的 `MessageSource` Bean，这一点尤其正确。\n\
  \n### 在独立应用中使用 `MessageSource`\n\n当你在独立应用中使用 `MessageSource` 时，Spring 除了自动将 `MessageSource`\
  \ Bean 嵌套在 `ApplicationContext` 中之外，不提供任何额外支持。此时，最好通过依赖注入来使 `MessageSource` 可用。你可以选择让你的\
  \ Bean 实现 `ApplicationContextAware`，但这会阻止其在 `BeanFactory` 上下文中使用。再加上这样做会使测试复杂化而没有任何明显的好处，很明显，在独立环境中，你应该坚持使用依赖注入来访问\
  \ `MessageSource` 对象。\n\n#### `MessageSourceResolvable` 接口\n\n当你从 `MessageSource`\
  \ 查找消息时，可以使用实现了 `MessageSourceResolvable` 的对象来代替键和一组参数。该接口在 Spring 验证库中使用最广泛，用于将\
  \ `Error` 对象与其国际化错误消息关联起来。\n\n### 事件发布\n\n`ApplicationContext` 中另一个 `BeanFactory`\
  \ 不具备的特性是，能够使用 `ApplicationContext` 作为代理来发布和接收事件。在本节中，你将了解其用法。\n\n### 使用应用事件\n\n\
  事件是一个派生自 `ApplicationEvent` 的类，而 `ApplicationEvent` 本身又派生自 `java.util.EventObject`。任何\
  \ Bean 都可以通过实现 `ApplicationListener<T>` 接口来监听事件；`ApplicationContext` 在配置时会自动注册任何实现此接口的\
  \ Bean 作为监听器。事件通过 `ApplicationEventPublisher.publishEvent()` 方法发布，因此发布类必须了解 `ApplicationContext`（它扩展了\
  \ `ApplicationEventPublisher` 接口）。在 Web 应用中，这很简单，因为你的许多类都派生自 Spring 框架类，这些类允许通过受保护的方法访问\
  \ `ApplicationContext`。在独立应用中，你可以让你的发布 Bean 实现 `ApplicationContextAware`，使其能够发布事件。清单\
  \ 4-29 展示了一个基本事件类的示例。\n\n```\npackage com.apress.prospring6.four.events;\nimport\
  \ org.springframework.context.ApplicationEvent;\npublic class MessageEvent extends\
  \ ApplicationEvent {\nprivate String msg;\npublic MessageEvent(Object source, String\
  \ msg) {\nsuper(source);\nthis.msg = msg;\n}\npublic String getMessage() {\nreturn\
  \ msg;\n}\n}\n清单 4-29\n基本的 Spring ApplicationEvent 类\n```\n\n这段代码非常基础；唯一需要注意的是 `ApplicationEvent`\
  \ 有一个接受事件源引用的构造函数。这在 `MessageEvent` 的构造函数中得到了体现。在清单 4-30 中，你可以看到监听器的代码。\n\n```\n\
  package com.apress.prospring6.four.events;\nimport org.springframework.context.ApplicationListener;\n\
  // 其他导入语句已省略\n@Component\npublic class MessageEventListener implements ApplicationListener\
  \ {\nprivate static Logger logger = LoggerFactory.getLogger(MessageEventListener.class);\n\
  @Override\npublic void onApplicationEvent(MessageEvent event) {\nMessageEvent msgEvt\
  \ = event;\nlogger.info(\"收到: {}\" , event.getMessage());\n}\n}\n清单 4-30\n基本的 Spring\
  \ ApplicationListener 类\n```\n\n`ApplicationListener` 接口定义了一个单一方法 `onApplicationEvent(..)`，当事件被触发时，Spring\
  \ 会调用该方法。`MessageEventListener` 通过实现强类型的 `ApplicationListener` 接口，表明它只对 `MessageEvent`\
  \ 类型（或其子类）的事件感兴趣。如果接收到 `MessageEvent`，它会将消息写入标准输出。发布事件很简单；只需创建事件类的实例并将其传递给 `ApplicationEventPublisher.publishEvent()`\
  \ 方法，如清单 4-31 所示。\n\n```\npackage com.apress.prospring6.four.events;\nimport org.springframework.context.ApplicationContextAware;\n\
  // 其他导入语句已省略\n@Configuration\n@ComponentScan\nclass EventsConfig{ }\n@Component\n\
  public class Publisher implements ApplicationContextAware {\nprivate ApplicationContext\
  \ ctx;\n@Override  /** @实现 {@link ApplicationContextAware#setApplicationContext(ApplicationContext)}\
  \ }*/\npublic void setApplicationContext(ApplicationContext applicationContext)\
  \ throws BeansException {\nthis.ctx = applicationContext;\n}\npublic void publish(String\
  \ message) {\nctx.publishEvent(new MessageEvent(this, message));\n}\npublic static\
  \ void main(String... args) {\nvar ctx = new AnnotationConfigApplicationContext(EventsConfig.class);\n\
  Publisher pub = (Publisher) ctx.getBean(\"publisher\");\npub.publish(\"我向世界发出求救信号...\
  \ \");\npub.publish(\"... 我希望有人能收到我的...\");\npub.publish(\"... 瓶中信\");\n}\n}\n清单\
  \ 4-31\n基本的 Spring ApplicationContextAware 类及测试代码\n```\n\n\n\n这里使用了一个代码快捷技巧来保持简单：`Publisher`\
  \ Bean 类型也包含了 `main(..)` 方法，该方法从 `ApplicationContext` 中检索自身的实例，然后使用 `publish()`\
  \ 方法向 `ApplicationContext` 发布两个 `MessageEvent` 实例。`Publisher` Bean 实例通过实现 `ApplicationContextAware`\
  \ 来访问 `ApplicationContext` 实例。`EventsConfig` 配置类为空，仅声明用于启用包内的组件扫描，因此 `Publisher`\
  \ 和 `MessageEventListener` 的 Bean 定义会被自动拾取。\n\n运行此示例将产生清单 4-32 所示的输出，证明 `MessageEventListener`\
  \ 对 `Publisher` Bean 使用注入的 `ApplicationContext` 发布的事件做出了响应。\n\n```\nINFO : MessageEventListener\
  \ - Received: I send an SOS to the world...\nINFO : MessageEventListener - Received:\
  \ ... I hope that someone gets my...\nINFO : MessageEventListener - Received: ...\
  \ Message in a bottle\nListing 4-32\nOutput Produced by Running the Code in Listing\
  \ 4-31\n```\n\n### 事件使用注意事项\n\n在应用程序的许多情况下，某些组件需要被通知特定事件。通常，您通过编写代码显式通知每个组件，或使用\
  \ JMS 等消息传递技术来实现这一点。逐个通知组件的缺点是，在许多情况下，您会不必要地将这些组件与发布者耦合。\n\n考虑这样一种情况：您在应用程序中缓存产品详细信息以避免访问数据库。另一个组件允许修改产品详细信息并将其持久化到数据库。为了避免使缓存失效，更新组件显式通知缓存用户详细信息已更改。在此示例中，更新组件与一个实际上与其业务职责无关的组件耦合。更好的解决方案是让更新组件在每次产品详细信息被修改时发布一个事件，然后让感兴趣的组件（例如缓存）监听该事件。这样做的好处是保持组件解耦，从而可以在需要时轻松移除缓存，或添加另一个对产品详细信息更改感兴趣的监听器。\n\
  \n在这种情况下使用 JMS 会显得大材小用，因为使缓存中的产品条目失效的过程既快速又非业务关键。使用 Spring 事件基础设施为您的应用程序增加的开销非常小。\n\
  \n通常，我们使用事件来处理执行迅速且不属于主应用程序逻辑的反应性逻辑。在前面的示例中，缓存中产品的失效是对产品详细信息更新的反应，它执行迅速（或应该如此），并且不是应用程序的主要功能的一部分。对于长时间运行且构成主要业务逻辑一部分的流程，建议使用\
  \ JMS 或类似的消息传递系统，如 RabbitMQ。使用 JMS 的主要好处是它更适合长时间运行的流程，并且随着系统的发展，您可以在必要时将包含业务信息的消息的\
  \ JMS 驱动处理分解到单独的机器上。\n\n## 访问资源\n\n应用程序通常需要以不同形式访问各种资源。您可能需要访问文件系统中某个文件内存储的配置数据、类路径上\
  \ JAR 文件中存储的图像数据，或者远程服务器上的某些数据。Spring 提供了一种统一的机制，以独立于协议的方式访问资源。这意味着您的应用程序可以以相同的方式访问文件资源，无论它存储在文件系统、类路径还是远程服务器上。\n\
  \nSpring 资源支持的核心是 `org.springframework.core.io.Resource` 接口。`Resource` 接口定义了十个不言自明的方法：\n\
  \n*   `contentLength()`\n*   `exists()`\n*   `getDescription()`\n*   `getFile()`\n\
  *   `getFileName()`\n*   `getURI()`\n*   `getURL()`\n*   `isOpen()`\n*   `isReadable()`\n\
  *   `lastModified()`\n\n除了这十个方法之外，还有一个方法不那么不言自明：`createRelative()`。`createRelative()`\
  \ 方法通过使用相对于调用它的实例的路径来创建一个新的 `Resource` 实例。您可以提供自己的 `Resource` 实现，但这超出了本章的范围，但在大多数情况下，您会使用内置实现之一来访问文件（`FileSystemResource`\
  \ 类）、类路径（`ClassPathResource` 类）或 URL 资源（`UrlResource` 类）。在内部，Spring 使用另一个接口 `ResourceLoader`\
  \ 及其默认实现 `DefaultResourceLoader` 来定位和创建 `Resource` 实例。但是，您通常不会直接与 `DefaultResourceLoader`\
  \ 交互，而是使用另一个名为 `ApplicationContext` 的 `ResourceLoader` 实现。清单 4-33 展示了一个使用 `ApplicationContext`\
  \ 访问三个资源的应用程序。\n\n```\npackage com.apress.prospring6.four;\nimport org.springframework.core.io.Resource;\n\
  // other import statements omitted\npublic class ResourceDemo {\nprivate static\
  \ Logger logger = LoggerFactory.getLogger(ResourceDemo.class);\npublic static void\
  \ main(String... args) throws Exception{\nvar ctx = new AnnotationConfigApplicationContext();\n\
  File baseDir = new File(System.getProperty(\"java.io.tmpdir\"));\nPath filePath\
  \ = Files.createFile(Path.of(baseDir.getAbsolutePath(), \"test.txt\"));\nFiles.writeString(filePath,\
  \ \"Hello World!\");\nfilePath.toFile().deleteOnExit();\nResource res1 = ctx.getResource(\"\
  file://\" + filePath);\ndisplayInfo(res1);\nResource res2 = ctx.getResource(\"classpath:test.txt\"\
  );\ndisplayInfo(res2);\nResource res3 = ctx.getResource(\"http://iuliana-cosmina.com\"\
  );\ndisplayInfo(res3);\n}\nprivate static void displayInfo(Resource res) throws\
  \ Exception{\nlogger.info(\"Resource class: {}\" , res.getClass());\nlogger.info(\"\
  Resource URL content: {}\" ,\nnew BufferedReader(new InputStreamReader((InputStream)\
  \ res.getURL().getContent())).lines().parallel().collect(Collectors.joining(\"\\\
  n\")));\nlogger.info(\" -------------\");\n}\n}\nListing 4-33\nApplication Sample\
  \ Accessing Various Spring Resources\n```\n\n请注意，在每次调用 `getResource()` 时，我们都会为每个资源传入一个\
  \ URI。您会认出我们为 `res1` 和 `res3` 传入的常见 `file:` 和 `http:` 协议。我们为 `res2` 使用的 `classpath:`\
  \ 协议是 Spring 特有的，它指示 `ResourceLoader` 应在类路径中查找该资源。\n\n运行此示例将产生清单 4-34 所示的输出。\n\n\
  \n\n```\nINFO : ResourceDemo - Resource class: class org.springframework.core.io.FileUrlResource\n\
  INFO : ResourceDemo - Resource URL content: Hello World!\nINFO : ResourceDemo -\
  \  -------------\nINFO : ResourceDemo - Resource class: class org.springframework.core.io.ClassPathResource\n\
  INFO : ResourceDemo - Resource URL content: Hello World from the classpath!\nINFO\
  \ : ResourceDemo -  -------------\nINFO : ResourceDemo - Resource class: class org.springframework.core.io.UrlResource\n\
  INFO : ResourceDemo - Resource URL content: \n301 Moved Permanently\n\nINFO : ResourceDemo\
  \ -  -------------\n清单 4-34\n清单 4-33 中代码的输出\n```\n\n![](img/315511_6_En_4_Figj_HTML.jpg)一条信息提示。 当你尝试访问\
  \ [`http://iuliana-cosmina.com`](http://iuliana-cosmina.com) 站点时收到 `301 Moved Permanently`\
  \ 响应，是因为该站点实际使用了 HTTPS。要提取主页的实际内容，请使用 `ctx.getResource(\"`[`https://iuliana-cosmina.com`](https://iuliana-cosmina.com)`\"\
  )`。\n\n请注意，对于 `file:` 和 `http:` 协议，Spring 都会返回一个 `UrlResource` 实例。Spring 确实包含一个\
  \ `FileSystemResource` 类，但 `DefaultResourceLoader` 完全不使用这个类。这是因为 Spring 的默认资源加载策略将\
  \ URL 和文件视为具有不同协议（`file:` 和 `http:`）的同一类型资源。如果需要 `FileSystemResource` 的实例，请使用 `FileSystemResourceLoader`。一旦获得\
  \ `Resource` 实例，你就可以根据需要使用 `getFile()`、`getInputStream()` 或 `getURL()` 自由访问其内容。在某些情况下，例如使用\
  \ `http:` 协议时，调用 `getFile()` 会导致 `FileNotFoundException`。因此，我们建议你使用 `getInputStream()`\
  \ 来访问资源内容，因为它很可能适用于所有可能的资源类型。\n\n## 高级 Java 配置类\n\n到目前为止，本书中的 Java 配置类都非常基础。让我们继续探讨更多的配置选项。考虑**第**\
  \ **3** **章**中介绍的 `MessageRender` 和 `ConfigurableMessageProvider`，假设我们希望将消息外部化到一个名为\
  \ `message.properties` 的属性文件中。`ConfigurableMessageProvider.message` 属性将通过构造函数注入，从该文件中读取的值进行注入。`message.properties`\
  \ 的内容如下：\n\n```\nmessage=Only hope can keep me together\n```\n\n让我们看看修改后的测试程序，它通过使用\
  \ `@PropertySource` 注解加载属性文件，然后将它们注入到消息提供者实现中。清单 4-35 展示了测试程序、在 Bean 声明上增加了注解的配置类以及简化后的\
  \ Bean 类型。\n\n```\npackage com.apress.prospring6.four;\nimport com.apress.prospring6.two.decoupled.MessageProvider;\n\
  import com.apress.prospring6.two.decoupled.MessageRenderer;\nimport org.springframework.core.env.Environment;\n\
  // 其他导入语句已省略\npublic class PropertySourcesDemo {\npublic static void main(String...\
  \ args) {\nApplicationContext ctx =\nnew AnnotationConfigApplicationContext(PropertySourcesCfg.class);\n\
  MessageRenderer mr = ctx.getBean(\"messageRenderer\", MessageRenderer.class);\n\
  mr.render();\n}\n}\n@Configuration\n@PropertySource(value = \"classpath:message.properties\"\
  )\nclass PropertySourcesCfg {\n@Autowired\nEnvironment env;\n@Bean\n@Lazy\npublic\
  \ MessageProvider messageProvider() {\nreturn new ConfigurableMessageProvider(env.getProperty(\"\
  message\"));\n}\n@Bean(name = \"messageRenderer\")\n@Scope(value=\"prototype\")\n\
  @DependsOn(value=\"messageProvider\")\npublic MessageRenderer messageRenderer()\
  \ {\nMessageRenderer renderer = new StandardOutMessageRenderer();\nrenderer.setMessageProvider(messageProvider());\n\
  return renderer;\n}\n}\nclass ConfigurableMessageProvider implements MessageProvider\
  \ {\nprivate String message;\npublic ConfigurableMessageProvider(@Value(\"Configurable\
  \ message\") String message) {\nthis.message = message;\n}\n@Override\npublic String\
  \ getMessage() {\nreturn message;\n}\n}\nclass StandardOutMessageRenderer implements\
  \ MessageRenderer {\nprivate static Logger logger = LoggerFactory.getLogger(StandardOutMessageRenderer.class);\n\
  private MessageProvider messageProvider;\n@Override\npublic void setMessageProvider(MessageProvider\
  \ provider) {\nthis.messageProvider = provider;\n}\n@Override\npublic MessageProvider\
  \ getMessageProvider() {\nreturn this.messageProvider;\n}\n@Override\npublic void\
  \ render() {\nlogger.info(messageProvider.getMessage());\n}\n}\n清单 4-35\n@PropertySource\
  \ 使用示例\n```\n\n清单 4-35 引入了一些注解，这些注解在表 4-3 中进行了说明。其中一些注解已在**第** **3** **章**中使用过，但当时并未解释。使用诸如\
  \ `@Component`、`@Service` 等构造型注解定义的 Bean，可以通过启用组件扫描并在需要的地方进行自动装配，在 Java 配置类中使用。在清单\
  \ 4-36 所示的示例中，我们将 `ConfigurableMessageProvider` 声明为一个服务 Bean。\n\n表 4-3\n\nJava 配置注解表\n\
  \n\n\n| 注解 | 描述 |\n| --- | --- |\n| `@PropertySource` | 该注解用于将属性文件加载到 Spring 的 `ApplicationContext`\
  \ 中，它接受文件位置作为参数（可提供多个位置）。 |\n| `@Lazy` | 该注解指示 Spring 仅在请求时才实例化 Bean。该注解有一个默认值为\
  \ `true` 的 value 属性；因此，使用 `@Lazy(value=true)` 等同于使用 `@Lazy`。 |\n| `@Scope` | 当所需的作用域不是单例时，该注解用于定义\
  \ Bean 的作用域。 |\n| `@DependsOn` | 该注解告知 Spring 某个 Bean 依赖于其他一些 Bean，因此 Spring 会确保这些\
  \ Bean 被优先实例化。 |\n| `@Autowired` | 该注解在此处用于 `env` 变量，其类型为 `Environment`。这是 Spring\
  \ 提供的 `Environment` 抽象特性。我们将在本章后续部分讨论它。 |\n\n一个应用程序可以有多个配置类，这些配置类可用于解耦配置并按用途组织 Bean（例如，一个类专门用于\
  \ DAO Bean 声明，另一个用于服务 Bean 声明，等等）。为了演示这一点，我们可以修改之前的示例，将 `ConfigurableMessageProvider`\
  \ 定义为一个服务，并声明一个名为 `ServiceConfig` 的配置类来声明此 Bean 类型。声明 `MessageRenderer` Bean 的配置类将使用\
  \ `@Import` 注解来访问由 `ServiceConfig` 类声明的 `MessageProvider` Bean。清单 4-36 展示了这些配置类。\n\
  \n```\npackage com.apress.prospring6.four.multiple;\nimport org.springframework.context.annotation.Import;\n\
  import org.springframework.stereotype.Service;\n// 其他导入语句已省略\n@Service(\"provider\"\
  )\nclass ConfigurableMessageProvider implements MessageProvider {\n// 与之前清单中相同的代码\n\
  }\nclass StandardOutMessageRenderer implements MessageRenderer {\n// 与之前清单中相同的代码\n\
  }\n@Configuration\n@ComponentScan\nclass ServiceConfig {\n}\n@Configuration\n@Import(ServiceConfig.class)\n\
  class TheOtherConfig {\n@Autowired\nMessageProvider provider;\n@Bean(name = \"messageRenderer\"\
  )\npublic MessageRenderer messageRenderer() {\nMessageRenderer renderer = new StandardOutMessageRenderer();\n\
  renderer.setMessageProvider(provider);\nreturn renderer;\n}\n}\npublic class ImportDemo\
  \ {\npublic static void main(String... args) {\nApplicationContext ctx = new AnnotationConfigApplicationContext(TheOtherConfig.class);\n\
  MessageRenderer mr = ctx.getBean(\"messageRenderer\", MessageRenderer.class);\n\
  mr.render();\n}\n}\n清单 4-36\n@Import 使用示例\n```\n\n在类 `ImportDemo` 的 main 方法中，创建应用程序上下文时只需要\
  \ `TheOtherConfig` 类，因为该类导入了所有在 `ServiceConfig` 导入类内部声明或通过其扫描发现的 Bean 定义。\n\n##\
  \ Profiles\n\nSpring 提供的另一个有趣特性是配置 profile 的概念。基本上，profile 指示 Spring 仅配置在指定 profile\
  \ 激活时定义的 `ApplicationContext` 实例。在本节中，我们将演示如何在一个简单程序中使用 profile。\n\n### 使用 Spring\
  \ Profiles 特性的示例\n\n假设有一个名为 `FoodProviderService` 的服务，负责为学校（包括幼儿园和高中）提供食物。`FoodProviderService`\
  \ 接口只有一个名为 `provideLunchSet()` 的方法，该方法为调用学校的学生生成午餐套餐。午餐套餐是一个 `Food` 对象列表，`Food`\
  \ 是一个只有 name 属性的简单类。清单 4-37 展示了 `Food` 类。\n\n```\npackage com.apress.prospring6.four.profile;\n\
  public class Food {\nprivate String name;\npublic Food() {\n}\npublic Food(String\
  \ name) {\nthis.name = name;\n}\n// getter 和 setter 已省略\n}\n清单 4-37\nFood Bean 类型\n\
  ```\n\n`FoodProviderService` 接口如清单 4-38 所示。\n\n```\npackage com.apress.prospring6.four.profile;\n\
  import java.util.List;\npublic interface FoodProviderService {\nList provideLunchSet();\n\
  }\n清单 4-38\nFoodProviderService 接口\n```\n\n现在假设有两个午餐套餐供应商，一个针对幼儿园，一个针对高中。他们提供的午餐套餐不同，尽管他们提供的服务相同，即向学生提供午餐。因此，现在让我们创建\
  \ `FoodProviderService` 的两个实现，使用相同的名称但将它们放入不同的包中以标识其目标学校。这两个类如清单 4-39 所示。\n\n```\n\
  // chapter04/src/main/java/com/apress/prospring6/four/profile/\nkindergarten/FoodProviderServiceImpl.java\n\
  package com.apress.prospring6.four.profile.kindergarten;\nimport com.apress.prospring6.four.profile.Food;\n\
  import com.apress.prospring6.four.profile.FoodProviderService;\nimport java.util.List;\n\
  public class FoodProviderServiceImpl implements FoodProviderService {\n@Override\n\
  public List provideLunchSet() {\nreturn List.of(new Food(\"Milk\"), new Food(\"\
  Biscuits\"));\n}\n}\n// chapter04/src/main/java/com/apress/prospring6/four/profile/\n\
  highschool/FoodProviderServiceImpl.java\npackage com.apress.prospring6.four.profile.highschool;\n\
  // 与上述相同的导入\npublic class FoodProviderServiceImpl implements FoodProviderService\
  \ {\n@Override\npublic List provideLunchSet() {\nreturn List.of(new Food(\"Coke\"\
  ), new Food(\"Hamburger\"), new Food(\"Fries\"));\n}\n}\n清单 4-39\nFoodProviderService\
  \ 实现\n```\n\n从之前的清单可以看出，这两个实现提供了相同的 `FoodProviderService` 接口，但产生了不同的午餐套餐食物组合。现在假设一所幼儿园希望供应商为其学生提供午餐套餐；让我们看看如何使用\
  \ Spring 的 profile 配置来实现这一点。我们将首先介绍 Java 配置。我们将创建两个配置类，一个用于幼儿园 profile，另一个用于高中 profile。清单\
  \ 4-40 展示了这两个 profile 配置。\n\n```\npackage com.apress.prospring6.four.profile.highschool;\n\
  import org.springframework.context.annotation.Profile;\n// 其他导入语句已省略\n@Configuration\n\
  @Profile(\"highschool\")\npublic class HighSchoolConfig {\n@Bean\nFoodProviderService\
  \ foodProviderService(){\nreturn new FoodProviderServiceImpl();\n}\n}\npackage com.apress.prospring6.four.profile.kindergarten;\n\
  // 其他导入语句已省略\n@Configuration\n@Profile(\"kindergarten\")\npublic class KindergartenConfig\
  \ {\n@Bean\nFoodProviderService foodProviderService(){\nreturn new FoodProviderServiceImpl();\n\
  }\n}\n清单 4-40\nProfiles 配置\n```\n\n\n\n在两个配置类中，请注意分别使用 `\"highschool\"` 和 `\"kindergarten\"\
  ` 声明的 `@Profile` 注解。该注解告诉 Spring，仅当指定的 profile 处于激活状态时，才会实例化文件中的那些 bean。要在独立应用程序中使用\
  \ Spring 的 `ApplicationContext` 时激活正确的 profile，我们需要将 profile 作为 `spring.profiles.active`\
  \ JVM 参数的值提供，在创建的上下文上设置它，添加配置类，然后刷新上下文。这将确保只有与配置的 profile 匹配的 bean 才会被添加到上下文中。清单\
  \ 4-41 展示了执行此操作并通过打印 `FoodProviderService.provideLunchSet()` 调用返回的项目来测试结果的代码。\n\n\
  ```\npackage com.apress.prospring6.four.profile;\n// 省略导入语句\npublic class ProfileDemo\
  \ {\nprivate static Logger logger = LoggerFactory.getLogger(ProfileDemo.class);\n\
  public static void main(String... args) {\nvar profile= System.getProperty(\"spring.profiles.active\"\
  );\nvar ctx = new AnnotationConfigApplicationContext();\nctx.getEnvironment().setActiveProfiles(profile);\n\
  ctx.register(HighSchoolConfig.class, KindergartenConfig.class);\nctx.refresh();\n\
  var foodProviderService = ctx.getBean(\"foodProviderService\", FoodProviderService.class);\n\
  var lunchSet = foodProviderService.provideLunchSet();\nlunchSet.forEach(food ->\
  \ logger.info(\"Food: {}\", food.getName()));\nctx.close();\n}\n}\n清单 4-41\nFoodProviderService\
  \ 测试\n```\n\n要在 IntelliJ IDEA 中运行 `ProfileDemo` 类时提供 `-Dspring.profiles.active=\"\
  kindergarten\"` JVM 参数，您需要自定义启动器，如图 4-3 所示。\n\n![](img/315511_6_En_4_Fig3_HTML.jpg)\n\
  \n运行/调试配置的截图。在应用程序下打开了 Profile demo 选项。在构建和运行部分下，`D spring dot profiles dot active\
  \ equals to kindergarten` 被高亮显示。包含名称、运行位置、工作目录、环境变量和代码覆盖率等字段。\n\n图 4-3\n带有已激活 profile\
  \ 的 Spring 应用程序启动器\n\n在命令行中运行主类或可执行 jar 时，您可以通过相同的方式提供 profile 值。\n\n使用 JVM 参数 `-Dspring.profiles.active=\"\
  kindergarten\"` 运行 `ProfileDemo` 类会产生以下输出：\n\n```\nDEBUG: AbstractEnvironment -\
  \ Activating profiles [kindergarten]\nINFO : ProfileDemo - Food: Coke\nINFO : ProfileDemo\
