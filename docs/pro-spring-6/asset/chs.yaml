  ### 使用 AspectJ 注解声明前置通知


  使用注解时，我们并不总是需要显式声明 `Pointcut`，因为 AspectJ 的 `@Before` 注解的默认属性可以通过一个切入点表达式来配置，该表达式表示通知的绑定位置。清单
  5-49 展示了声明了注解通知的 `BeforeAdviceV1` 类。


  ```

  package com.apress.prospring6.five.advice;

  import org.aspectj.lang.JoinPoint;

  import org.aspectj.lang.annotation.Aspect;

  import org.aspectj.lang.annotation.Before;

  // 其他导入注解已省略

  @Component

  @Aspect

  public class BeforeAdviceV1 {

  private static Logger LOGGER = LoggerFactory.getLogger(BeforeAdviceV1.class);

  @Before("execution(* com.apress.prospring6.five..sing*(com.apress.prospring6.five.common.Guitar))")

  public void simpleBeforeAdvice(JoinPoint joinPoint) {

  var signature = (MethodSignature) joinPoint.getSignature();

  LOGGER.info(" > 正在执行: {} 来自 {}", signature.getName(), signature.getDeclaringTypeName()
  );

  }

  }

  清单 5-49

  BeforeAdviceV1 类，声明一个包含单个前置通知的切面 Bean

  ```


  ![](img/315511_6_En_5_Figf_HTML.jpg)一条信息提示。 为什么使用 `V1` 后缀？因为声明此通知和切入点的方式不止一种。在本节中，所有以不同方式声明相同前置通知的类都带有一个数字后缀，该数字也用作测试该通知的方法的后缀。


  请注意，通知类不需要实现 `MethodBeforeAdvice`。另一个需要注意的地方是，`@Aspect` 注解用于声明它是一个切面类。切面类将通知声明、切入点以及用于声明这些内容的其他实用方法组合在一起。


  `@Before` 注解将 `simpleBeforeAdvice(..)` 方法标记为前置通知，并且作为其默认属性值提供的表达式是一个切入点表达式，这意味着我们希望通知所有名称以
  `sing` 开头的方法，并且这些类定义在 `com.apress.prospring6.five` 包下（包括所有子包，`..` 即表示此意）。此外，`sing*`
  方法应接收一个类型为 `com.apress.prospring6.five.common.Guitar` 的参数。


  前置通知方法接受连接点作为参数，但不接受方法、对象和参数。实际上，对于通知类来说，这个参数是可选的，因此你可以让方法不带任何参数。但是，如果你需要在通知中访问被通知的连接点的信息（在本例中，我们想要输出调用类型和方法名称的信息），那么你需要定义接受该参数。当为方法定义了参数时，Spring
  会自动将连接点传递给该方法供你处理。在此示例中，我们使用 `JoinPoint` 来打印连接点的详细信息。


  为了测试此通知，我们必须设计一个 Spring 配置类，该类能够发现 `GrammyGuitarist` 和 `NewDocumentarist` Bean，并启用对标记有
