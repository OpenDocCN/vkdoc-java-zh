  类型的 bean 以自定义转换器和格式化器列表时，请确保此 bean 的名称为 `conversionService`，因为 Spring 不接受其他名称。对于
  `ConversionServiceFactoryBean` 类型的 bean 也是如此，该实现便于配置对 `ConversionService` 的访问，该服务配置了适用于大多数环境的转换器。


