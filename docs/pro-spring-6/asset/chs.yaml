  接下来要分析的类是 `LetterSenderController`。该类是一个 REST 控制器，暴露了一个单一的 `POST` 处理器，用于触发当前应用程序中的信件发送操作。该处理器方法使用
  `RestTemplate` bean 向代表信件目的地的另一个应用程序实例发送 `POST` 请求。`LetterSenderController` 类如清单
  13-6 所示。


  ```

  package com.apress.prospring6.thirteen;

  import org.springframework.beans.factory.annotation.Value;

  import org.springframework.http.HttpEntity;

  import org.springframework.http.HttpMethod;

  import org.springframework.http.MediaType;

  import org.springframework.web.bind.annotation.PostMapping;

  import org.springframework.web.bind.annotation.RequestBody;

  import org.springframework.web.bind.annotation.RestController;

  import org.springframework.web.client.RestTemplate;

  import java.time.LocalDate;

  @RestController

  public class LetterSenderController {

  private final RestTemplate webClient;

  private final String correspondentAddress;

  private final String sender;

  public LetterSenderController(RestTemplate webClient,

  @Value("#{senderApplication.correspondentAddress}") String correspondentAddress,

  @Value("#{senderApplication.sender}") String sender) {

  this.webClient = webClient;

  this.correspondentAddress = correspondentAddress;

  this.sender = sender;

  }

  @PostMapping(path = "send", consumes = MediaType.APPLICATION_JSON_VALUE)

  public void sendLetter(@RequestBody Letter letter){

  letter.setSender(sender);

  letter.setSentOn(LocalDate.now());

  var request = new HttpEntity(letter);

  webClient.exchange(correspondentAddress +"/letters", HttpMethod.POST, request, Letter.class);

  }

  }

  清单 13-6

  LetterSenderController 类

  ```


  **第** **3** **章**介绍了构造型注解。`@RestController` 注解是一个便利注解，它本身又使用了 `@Controller` 和 `@ResponseBody`
  注解。如果 `@Controller` 用于标记用于 Web 的 bean，其中包含映射到 URL 的方法，那么 `@RestController` 则用于标记用于
  REST 的 bean，其中包含映射到 REST 端点的方法。由于本书目前尚未介绍 Spring MVC 支持（**第** **14** **章**）和 Spring
  REST 支持（**第** **15** **章**），目前这个解释就足够了。




  `RestTemplate` 类是 Spring 中用于创建同步客户端以执行 HTTP 请求的类。它提供了一组非常简洁的方法来设置请求内容和请求头，并且还在底层
  HTTP 客户端库（如 JDK `HttpURLConnection`、Apache `HttpComponents` 等）之上提供了一个简单的模板方法 API。`RestTemplate`
  通常作为共享组件使用；在应用程序中声明一个单一的 Bean，并在需要的地方注入。从 Spring 5.0 版本开始，此类已进入维护模式，未来仅接受较小的变更请求和
  Bug 修复。推荐使用 `org.springframework.web.reactive.client.WebClient`，它拥有更现代的 API，并支持同步、异步和流式场景，但对于非响应式应用程序，响应式的
  `WebClient` 并不适用。


  `LetterSenderController` 类配置了一个 `sender` 属性，该属性被设置为发信人的姓名。发件人值从主 Spring Boot 应用程序类中注入，此处使用
