  现在我们已经探索了如何通过 GraphQL 查询创建 `Singer` 实例，那么如果我们尝试执行两次创建歌手的查询会发生什么？这显然是不允许的，因为我们的数据库中歌手应该是唯一的。尝试创建一个具有相同
  `firstName` 和 `lastName` 的歌手会导致抛出 `DataIntegrityViolationException`，我们可以在控制台日志中看到，但在
  GraphQL 中，Web 控制台不会提供太多细节，如图 16-12 所示。


  ![](img/315511_6_En_16_Fig12_HTML.jpg)


