  ```


  以下列表解释了 `SingerService` 类中最重要的构造。请注意，在 Kotlin 代码中使用了 `java.util.List<String>`。


  *   方法使用 `fun` 声明，返回类型在签名末尾、主体块之前声明。在本节后续内容中，方法被称为*函数*，以切换到 Kotlin 风格。


  *   `NotFoundException` 是一个自定义异常，每当使用与 `Singer` 实例不匹配的 id 调用服务函数时抛出。Kotlin 不要求使用
  `throws` 语句声明受检异常，但由于 Kotlin 代码被编译为需要在 JVM 上运行的字节码，因此它必须是有效的。`@Throws` 注解指示在编译为
  JVM 方法时，函数应声明哪些异常。


  *   `Singer::javaClass.name` 构造引用 Java 类对象，因此可以访问其名称并将其用作参数来创建 `NotFoundException`。


  *   `id?.let { .. }` 由两部分组成：`?.` 被称为*安全调用运算符*，它允许仅在 id 不为 null 时调用 `repository.findById(id)`；而
  `let` 使用此值作为参数调用指定的函数块并返回其结果。


