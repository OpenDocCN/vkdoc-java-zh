  \ `Delete` 按钮很容易，通过结合使用 Thymeleaf 安全构造和 SpEL 表达式，如清单 17-15 所示。\n\n```\n\nnet\n\n\
  清单 17-15\nviews/show.html 为非 ADMIN 用户隐藏删除按钮\n```\n\n使用此配置，用户 `john` 不再能看到删除按钮，而\
  \ `admin` 用户仍然可以看到，如图 17-7 所示。\n\n![](img/315511_6_En_17_Fig7_HTML.jpg)\n\n本地主机歌手\
  \ 2 的 2 个截图。左侧截图有一个突出显示的框，显示已认证 John，后跟歌手详细信息。右侧截图有一个突出显示的框，显示已认证 admin，后跟歌手详细信息和下方删除照片的选项。\n\
  \n图 17-7\n\n角色为 `USER`（左）和角色为 `ADMIN`（右）的用户页面显示比较\n\nSpring Security SpEL 表达式非常通用。角色名称不区分大小写，因此\
  \ `hasRole('admin')` 与 `hasRole('ADMIN')` 的处理方式相同。此外，如果角色名称没有 `ROLE_` 前缀，则会默认添加，例如\
  \ `hasRole('ROLE_ADMIN')`。这使得使用 SpEL 表达式配置授权非常实用。\n\n![](img/315511_6_En_17_Fige_HTML.jpg)一个内部带有字母\
  \ i 的圆圈的插图。 在 Spring Security 中，有两种方式描述用户可以做什么和不能做什么。对于每个应用程序用户，配置了*权限*和*角色*。角色和权限都由\
  \ `List<GrantedAuthority>` 表示，其中 `org.springframework.security.core.GrantedAuthority`\
  \ 接口表示授予 `Authentication` 对象的权限，因此是一种*许可*。角色无非是一个名称以 `ROLE_` 为前缀的 `GrantedAuthority`。为什么有两种方式？因为在底层，Spring\
  \ Security 可能被配置为以不同于权限的方式处理角色。权限是细粒度的许可，针对特定操作，有时与特定的数据范围或上下文相关联。例如，`Read`、`Write`\
  \ 和 `Manage` 可以表示对给定信息范围的不同级别的权限。另一方面，角色是一组权限的粗粒度表示。`ROLE_USER` 可能只有 `Read` 或 `View`\
  \ 权限，而 `ROLE_ADMIN` 将拥有 `Read`、`Write` 和 `Delete` 权限。\n\nSpring Security SpEL 表达式列表相当长，用于配置授权，其语法和用途在表\
  \ 17-1 中展示和描述。\n\n表 17-1\n\nSpring Security SpEL 表达式\n\n| 表达式 | 描述 |\n| --- | ---\
  \ |\n| `hasRole(String role)` | 如果当前主体具有指定的角色，则返回 `true`；例如，`hasRole('admin')`。角色不区分大小写，如果未提供\
  \ `ROLE_`，则会默认添加。此行为可以通过修改 `DefaultWebSecurityExpressionHandler`^(¹⁷³) 上的 `defaultRolePrefix`\
  \ 进行自定义。 |\n| `hasAnyRole(String... roles)` | 如果当前主体具有任何指定的角色，则返回 `true`；例如，`hasAnyRole('admin',\
  \ 'manager')`。 |\n| `hasAuthority(String authority)` | 如果当前主体具有指定的权限，则返回 `true`；例如，`hasAuthority('read')`。\
  \ |\n| `hasAnyAuthority(String... authorities)` | 如果当前主体具有任何指定的权限，则返回 `true`；例如，`hasAnyAuthority('read',\
  \ 'write')`。 |\n| `principal` | 允许直接访问表示当前用户的主体对象。 |\n| `authentication` | 允许直接访问从\
  \ `SecurityContext` 获取的当前 `Authentication` 对象。 |\n| `isAnonymous()` | 如果当前主体是匿名用户，则返回\
  \ `true`。 |\n| `isRememberMe()` | 如果当前主体是“记住我”用户，则返回 `true`。 |\n| `isAuthenticated()`\
  \ | 如果用户不是匿名的，则返回 `true`。 |\n| `isFullyAuthenticated()` | 如果用户不是匿名的并且不是“记住我”用户，则返回\
  \ `true`。 |\n| `hasPermission(Object target, Object permission)` | 如果用户对给定权限具有对提供目标的访问权限，则返回\
  \ `true`；例如，`hasPermission(domainObject, 'read')`。 |\n| `hasPermission(Object targetId,\
  \ String targetType, Object permission)` | 如果用户对给定权限具有对提供目标（由其 id 和类型标识）的访问权限，则返回\
  \ `true`；例如，`hasPermission(1, 'com.apress.Singer', 'read')`。 |\n\n`hasRole('admin')`\
  \ Spring Security SpEL 表达式可用于保护删除处理方法，当作为属性值提供给 `@PreAuthorize` 注解时。此注解以及稍后讨论的其他几个注解是\
  \ `org.springframework.security.access.prepost` 包的一部分，该包允许您在注解方法执行之前和之后定义特定于安全性的操作。`@PreAuthorize`\
  \ 注解配置了一个方法访问控制表达式，该表达式将被评估以决定是否允许方法调用。清单 17-16 展示了使用 `@PreAuthorize` 注解的控制器方法。\n\
  \n```\npackage com.apress.prospring6.seventeen.controllers;\nimport org.springframework.security.access.prepost.PreAuthorize;\n\
  import org.springframework.stereotype.Controller;\n// other import statements omitted\n\
  @Controller\n@RequestMapping(\"/singer/{id}\")\npublic class OneSingerController\
  \ {\nprivate final Logger LOGGER = LoggerFactory.getLogger(OneSingerController.class);\n\
  private final SingerService singerService;\n@PreAuthorize(\"hasRole('admin')\")\n\
  @DeleteMapping\npublic String deleteSinger(@PathVariable(\"id\") Long id) {\nsingerService.findById(id);\n\
  singerService.delete(id);\nreturn \"redirect:/singers/list\";\n}\n// other methods\
  \ omitted\n}\n清单 17-16\n受保护的控制器方法\n```\n\n为了看到对于角色不同于 `admin` 的用户，此方法不会被执行，我们必须暂时从\
  \ `views/singers/show.html` 中的 `Delete` 按钮中移除 `sec:authorize=\"hasRole('ADMIN')\"\
  `。由于非管理员用户被禁止执行此方法，当单击 `Delete` 按钮时，我们会被重定向到 Apache Tomcat 的 `403(Forbidden)` 错误默认页面。由于我们想将用户重定向到\
  \ `views/error.html`，我们需要在带有 `@ControllerAdvice` 注解的类中添加一个方法，如清单 17-17 所示。\n\n```\n\
  package com.apress.prospring6.seventeen.problem;\nimport org.springframework.http.HttpStatus;\n\
  import org.springframework.security.access.AccessDeniedException;\n// other import\
  \ statements omitted\n@ControllerAdvice\npublic class GlobalExceptionHandler {\n\
  @ExceptionHandler(AccessDeniedException.class)\n@ResponseStatus(HttpStatus.FORBIDDEN)\n\
  public ModelAndView forbidden(HttpServletRequest req) {\nModelAndView mav = new\
  \ ModelAndView();\nmav.addObject(\"problem\", \"Method not allowed \" + req.getRequestURI());\n\
  mav.setViewName(\"error\");\nreturn mav;\n}\n}\n清单 17-17\nSpring Web 应用程序中 org.springframework.security.access.AccessDeniedException\
  \ 的处理程序\n```\n\n但是等等！我们还需要配置对这些类型注解的支持。`@EnableWebSecurity` 注解仅配置对安全 Web 请求的支持，因此要保护方法调用，我们需要在\
  \ `SecurityCfg` 类上添加 `@EnableMethodSecurity` 注解。新的配置如清单 17-18 所示。\n\n```\npackage\
  \ com.apress.prospring6.seventeen;\nimport org.springframework.security.config.annotation.method.configuration.EnableMethodSecurity;\n\
  // other import statements omitted\n@Configuration\n@EnableWebSecurity\n@EnableMethodSecurity\n\
  public class SecurityCfg {\n// configuration beans omitted\n}\n清单 17-18\n配置为支持安全方法的\
  \ SecurityCfg\n```\n\n使用此配置，当非管理员用户单击删除按钮时，用户将被重定向到图 17-8 所示的页面。\n\n![](img/315511_6_En_17_Fig8_HTML.jpg)\n\
  \n本地主机歌手 59 的截图显示了一个意外错误，内容为“不允许的方法 /ch17/singer/59”。\n\n图 17-8\n\n非管理员用户尝试删除 `singer`\
  \ 记录后被重定向到的错误页面\n\n保护方法是通过代理完成的。安全注解被拾取，并在包含注解方法的 bean 周围创建一个代理，以便在必要时注入安全检查。\n\n\
  如前所述，`org.springframework.security.access.prepost` 包包含四个注解，它们支持表达式属性以允许调用前和调用后的授权检查，并且还支持过滤提交的集合参数或返回值：`@PreAuthorize`、`@PreFilter`、`@PostAuthorize`\
  \ 和 `@PostFilter`。默认情况下，`@EnableMethodSecurity` 注解启用对这些方法的支持。但可以通过像这样配置来禁用它：`@EnableMethodSecurity(prePostEnabled=\
  \ false)`。\n\n要启用对来自 `org.springframework.security.access.annotation` 包的 `@Secured`\
  \ 注解的支持，我们配置 `@EnableMethodSecurity(secured = true)`。默认情况下，`secured` 属性设置为 `false`。\n\
  \nSpring 还提供对 Jakarta Annotations^(¹⁷⁴)（以前称为 JSR-250 注解）的支持。该库在 `jakarta.annotation.security`\
  \ 包中包含安全注解，这些注解提供与 Spring Security 注解有些相似的功能。但是，它们是基于标准的注解，允许应用简单的基于角色的约束，但没有 Spring\
  \ Security 原生注解的强大功能。Jakarta Security 注解是 `@RolesAllowed`、`@DenyAll`、`@PermitAll`、`@RunAs`\
  \ 和 `@DeclareRoles`。通过此配置启用对这些方法的支持：`@EnableMethodSecurity(jsr250Enabled=true)`；默认情况下，`jsr250Enabled`\
  \ 为 `false`。\n\n两种方法都会导致 Spring Security 将服务类包装在安全代理中。图 17-9 描述了安全方法如何执行的抽象模式以及涉及的组件。\n\
  \n![](img/315511_6_En_17_Fig9_HTML.jpg)\n\n一个示意图解释了 A O P 安全代理中的删除请求，包括安全拦截器、访问决策管理器和单个歌手控制器。\n\
  \n图 17-9\n\n安全方法执行的抽象模式\n\n请随意阅读官方文档^(¹⁷⁵) 中关于方法安全性的更多信息，因为该主题比本书的范围更广。\n\n### JDBC\
  \ 身份验证\n\n到目前为止，您已经了解了最快、最简单的身份验证模式，其中用户凭据存储在内存中。对于生产应用程序，凭据存储在关系数据库、自定义数据存储或 LDAP\
  \ 中。由于应用程序已经将其余数据存储在数据库中，因此添加必要的表来存储凭据和组非常实用。本节的重点是 JDBC 身份验证并将身份验证数据存储在 MariaDB\
  \ 数据库中。\n\nSpring Security 为基于 JDBC 的身份验证提供了默认查询，但要使它们工作，必须根据 Spring Security 提供的模式创建表。该模式实际上打包在\
  \ `spring-security-core.jar` 中，该 jar 是核心 Spring Security 库，也是 `spring-security-config.jar`\
  \ 的依赖项。模式文件作为类路径资源公开，名为 `org/springframework/security/core/userdetails/jdbc/users.ddl`。此文件的内容如清单\
  \ 17-19 所示。\n\n```\ncreate table users(\nusername varchar(50) not null primary key,\n\
  password varchar(500) not null,\nenabled boolean not null\n);\ncreate table authorities\
  \ (\nusername varchar(50) not null,\nauthority varchar(50) not null,\nconstraint\
  \ fk_authorities_users foreign key(username) references users(username)\n);\ncreate\
  \ unique index ix_auth_username on authorities (username,authority);\n清单 17-19\n\
  Spring Security JDBC 模式 176\n```\n\n为了创建这些表，此文件的内容已添加到 `chapter17` 项目的配置中。填充这些表的方法不止一种，但\
  \ Spring 也通过提供一个名为 `UserDetailsManager` 的类使这变得容易，该类扩展了上一节介绍的 `UserDetailsService`。此类型的\
  \ bean 配置了包含清单 17-19 中声明的 Spring Security `users` 和 `authorities` 表的数据源，能够加载凭据以促进身份验证过程。同一个类也可用于初始化表。首次启动安全的\
  \ Spring Web 应用程序时，为了轻松填充安全表，可以像清单 17-20 所示配置 `UserDetailsManager` bean。\n\n```\n\
  package com.apress.prospring6.seventeen;\nimport org.springframework.security.provisioning.JdbcUserDetailsManager;\n\
  import org.springframework.security.provisioning.UserDetailsManager;\n// other import\
  \ statements omitted\n@Configuration\n@EnableWebSecurity\n@EnableMethodSecurity\n\
  public class SecurityCfg2 {\n// other configuration beans omitted\n@Bean\nUserDetailsManager\
  \ users(DataSource dataSource) {\nUser.UserBuilder users  = User.builder().passwordEncoder(encoder()::encode);\n\
  var joe = users\n.username(\"john\")\n.password(\"doe\")\n.roles(\"USER\")\n.build();\n\
  var jane = users\n.username(\"jane\")\n.password(\"doe\")\n.roles(\"USER\", \"ADMIN\"\
  )\n.build();\nvar admin = users\n.username(\"admin\")\n.password(\"admin\")\n.roles(\"\
  ADMIN\")\n.build();\nvar manager = new JdbcUserDetailsManager(dataSource);\nmanager.createUser(joe);\n\
  manager.createUser(jane);\nmanager.createUser(admin);\nreturn manager;\n}\n}\n清单\
  \ 17-20\n用于初始化安全表的 Spring Security UserDetailsManager 配置\n```\n\n下次使用相同的数据源启动应用程序时，应移除用户创建，并且上次运行期间创建的用户仍将存在于我们的数据库中，因此将按预期工作。这将\
  \ Spring 配置简化为清单 17-21 中所示的配置。\n\n```\npackage com.apress.prospring6.seventeen;\n\
  // import statements omitted\n@Configuration\n@EnableWebSecurity\n@EnableMethodSecurity\n\
  public class SecurityCfg2 {\n@Bean\npublic SecurityFilterChain securityFilterChain(HttpSecurity\
  \ http) throws Exception {\n// request configuration omitted\nreturn http.build();\n\
  }\n@Bean\npublic PasswordEncoder encoder() {\nreturn new BCryptPasswordEncoder();\n\
  }\n@Bean\nUserDetailsManager users(DataSource dataSource) {\nreturn new JdbcUserDetailsManager(dataSource);\n\
  }\n}\n清单 17-21\n不带初始化的 Spring Security UserDetailsManager 配置\n\n到目前为止，您已经了解了 Spring\
  \ Security 的内存和 JDBC 实现的 `UserDetailsService`。如果由于某种原因您无法使用 Spring Security 默认模式，则必须提供\
  \ `UserDetailsService` 的自定义实现，该实现负责根据用户提供的数据检索用户和权限。另一种方法是配置一个 `AuthenticationManagerBuilder`\
  \ bean，如清单 17-22 所示。\n\n```\npackage com.apress.prospring6.seventeen;\nimport org.springframework.security.config.annotation.ObjectPostProcessor;\n\
  import org.springframework.security.config.annotation.authentication.builders.AuthenticationManagerBuilder;\n\
  // import statements omitted\n@Configuration\n@EnableWebSecurity\n@EnableMethodSecurity\n\
  public class SecurityCfg3 {\n@Bean\npublic SecurityFilterChain securityFilterChain(HttpSecurity\
  \ http) throws Exception {\n// request configuration omitted\nreturn http.build();\n\
  }\n@Bean\npublic PasswordEncoder encoder() {\nreturn new BCryptPasswordEncoder();\n\
  }\n@Bean\nAuthenticationManagerBuilder authenticationManagerBuilder(ObjectPostProcessor\
  \ objectPostProcessor, DataSource dataSource) {\nvar authenticationManagerBuilder\
  \ = new AuthenticationManagerBuilder(objectPostProcessor);\nfinal String findUserQuery\
  \ =\n\"\"\"\nselect username, password, enabled\nfrom users where username = ?\n\
  \"\"\";\nfinal String findRoles =\n\"\"\"\nselect username,authority from authorities\n\
  where username = ?\n\"\"\";\ntry {\nauthenticationManagerBuilder.jdbcAuthentication().dataSource(dataSource)\n\
  .passwordEncoder(encoder())\n.usersByUsernameQuery(findUserQuery)\n.authoritiesByUsernameQuery(findRoles);\n\
  return authenticationManagerBuilder;\n} catch (Exception e) {\nthrow new RuntimeException(\"\
  Could not initialize 'AuthenticationManagerBuilder'\");\n}\n}\n}\n清单 17-22\nSpring\
  \ Security AuthenticationManagerBuilder 配置\n```\n\n清单 17-22 中还采用了另一种快捷方式：`findUserQuery`\
  \ 和 `findRoles` 是为先前创建的 Spring Security 表编写的查询，但此 bean 允许将用户和权限保存在具有不同名称和不同结构的表中——只要存在\
  \ `username`、`password`、`enabled` 和 `authority` 列，或者查询返回它们，身份验证过程就会正常工作。例如，看看清单\
  \ 17-23 中的替代 `findUserQuery` 和 `findRoles` 查询，它们在名为 `staff` 和 `roles` 的表上运行，但将列重命名为\
  \ Spring Security 身份验证管理器 bean 所期望的名称。\n\n```\n-- findUserQuery\nselect staff_id\
  \ as username,\nstaff_credentials as password,\nactive as enabled\nfrom staff  where\
  \ staff_id = ?\n-- findRoles\nselect staff_id as username,\nrole as authority\n\
  from roles where staff_id = ?\n清单 17-23\n用于检索凭据的替代查询\n```\n\nSpring Security 配置灵活、多样且强大，您甚至可以实现\
  \ `UserDetailsService` 来使用 Spring DATA 仓库管理安全数据，甚至使用 NoSQL 数据库作为存储。这完全取决于您的开发需求和想象力；毕竟它们都只是可配置的\
  \ bean。\n\n### 测试安全的 Web 应用程序\n\n测试安全的 Spring Web 应用程序也可以通过多种方式完成。对于部署到 Apache Tomcat\
  \ 的应用程序，集成测试需要大量设置，因此最简单的方法是使用支持表单身份验证的 Web 客户端，并使用它来提交请求并测试您的假设。为此，本章介绍 REST Assured^(¹⁷⁷)。\n\
  \nREST Assured 提供了一个非常简单的 API 来在 Java 中验证 REST 服务。在清单 17-24 中，您可以看到编写了三个测试来涵盖本节中引入的安全元素。\n\
  \n```\npackage com.apress.prospring6.seventeen.controllers;\nimport io.restassured.RestAssured;\n\
  import io.restassured.authentication.FormAuthConfig;\nimport io.restassured.http.ContentType;\n\
  import org.junit.jupiter.api.BeforeEach;\nimport org.junit.jupiter.api.Test;\nimport\
  \ org.springframework.http.HttpStatus;\nimport static io.restassured.RestAssured.given;\n\
  import static org.junit.jupiter.api.Assertions.*;\npublic class SingerControllerTest\
  \ {\n@BeforeEach\nvoid setUp() {\nRestAssured.port = 8080;\nRestAssured.baseURI\
  \ = \"http://localhost\";\n}\n@Test\nvoid johnShouldNotSeeTheDeleteButton() {\n\
  var cfg = new FormAuthConfig(\"/ch17/auth\", \"user\", \"pass\")\n.withLoggingEnabled();\n\
  String responseStr =  given()\n.contentType(ContentType.URLENC)\n.auth().form(\"\
  john\",\"doe\", cfg)\n.when().get(\"/ch17/singer/1\")\n.then()\n.assertThat().statusCode(HttpStatus.OK.value())\n\
  .extract().body().asString();\nassertAll(\n() -> assertTrue(responseStr.contains(\"\
  Singer Details\")),\n() -> assertTrue(responseStr.contains(\"Mayer\")),\n() -> assertFalse(responseStr.contains(\"\
  Delete\"))\n);\n}\n@Test\nvoid johnShouldNotBeAllowedToDeleteSinger() {\nvar cfg\
  \ = new FormAuthConfig(\"/ch17/auth\", \"user\", \"pass\")\n.withLoggingEnabled();\n\
  String responseStr =  given()\n.contentType(ContentType.URLENC)\n.auth().form(\"\
  john\",\"doe\", cfg)\n.when().delete(\"/ch17/singer/1\")\n.then()\n.assertThat().statusCode(HttpStatus.FORBIDDEN.value())\n\
  .extract().body().asString();\n}\n@Test\nvoid adminShouldSeeTheDeleteButton() {\n\
  var cfg = new FormAuthConfig(\"/ch17/auth\", \"user\", \"pass\")\n.withLoggingEnabled();\n\
  String responseStr =  given()\n.contentType(ContentType.URLENC)\n.auth().form(\"\
  admin\",\"admin\", cfg)\n.when().get(\"/ch17/singer/1\")\n.then()\n.assertThat().statusCode(HttpStatus.OK.value())\n\
  .extract().body().asString();\nassertAll(\n() -> assertTrue(responseStr.contains(\"\
  Singer Details\")),\n() -> assertTrue(responseStr.contains(\"Mayer\")),\n() -> assertTrue(responseStr.contains(\"\
  Delete\"))\n);\n}\n}\n清单 17-24\n使用 REST Assured 测试安全组件\n```\n\n`FormAuthConfig`\
  \ 对象被配置为创建一个表单授权配置，其中包含预定义的表单操作、用户名输入标签和密码输入标签。此对象映射到 `/views/auth.html` 视图模板中的表单。`johnShouldNotSeeTheDeleteButton`\
  \ 测试检查用户 `john`（非管理员）是否无法看到删除按钮，这证明了 Thymeleaf 安全元素的行为符合预期。`johnShouldNotBeAllowedToDeleteSinger`\
  \ 测试检查用户 `john` 是否无法提交删除请求。这证明了 `@PreAuthorize` 注解也配置正确。`adminShouldSeeTheDeleteButton`\
  \ 测试检查用户 `admin`（管理员）是否可以看到删除按钮。\n\n为了结束本节，让我们看看安全过滤器。如本节开头所述，`securityFilterChain`\
  \ bean 是安全过滤器集合的入口点。如果您想让 Spring 向您显示这些过滤器应用于您的请求的顺序，只需在您的 `resources/logback.xml`\
  \ 文件中为 `org.springframework` 配置 `TRACE` 日志记录。这将打印大量日志消息，但其中您应该会看到类似于清单 17-25 中的一系列日志。\n\
  \n```\n22:22:50.635 [http-nio-8080-exec-8] TRACE o.s.s.w.FilterChainProxy - Trying\
