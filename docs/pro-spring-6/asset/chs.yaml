  \ `EntityManager` 获取，然后提交查询，在完成且无任何错误后，事务被提交。\n\n从日志中，你可能会认为事务是在从数据库检索专辑之前提交的，但这只是日志记录的时间点问题。实际上，所有查询都在同一个事务内执行。\n\
  \n我们接下来要看的方法是更新操作。为了检查更新操作的结果，`findById()` 方法也很有用。清单 9-8 展示了这两个方法的实现。\n\n```\npackage\
  \ com.apress.prospring6.nine.services;\n// 导入语句已省略\n@Service\n@Transactional\npublic\
  \ class AllServiceImpl implements AllService{\n// 构造函数和字段已省略\n@Transactional(readOnly\
  \ = true)\n@Override\npublic Optional findByIdWithAlbums(Long id) {\nvar singerOpt\
  \ = singerRepo.findById(id);\nsingerOpt.ifPresent(s -> s.setAlbums(albumRepo.findBySinger(s).collect(Collectors.toSet())));\n\
  return singerOpt;\n}\n@Transactional(propagation = Propagation.REQUIRES_NEW)\n@Override\n\
  public void update(Singer singer) {\nsingerRepo.save(singer);\n}\n}\n清单 9-8\n同一事务中的\
  \ AllServiceImpl\n```\n\n`findByIdWithAlbums(..)` 方法也使用了 `@Transactional(readOnly=true)`\
  \ 注解。通常，`readOnly=true` 属性应应用于所有查找方法。主要原因是大多数持久化提供程序会对只读事务执行一定程度的优化。例如，Hibernate\
  \ 在启用只读模式时，不会维护从数据库检索到的受管实例的快照。\n\n在 `AllServiceImpl.update(..)` 方法中，我们简单地调用了 `SingerRepoIml.save(..)`\
  \ 方法，并使用 `@Transactional(propagation = Propagation.REQUIRES_NEW)` 注解了该方法。这意味着类级别的注解被覆盖，将创建一个新事务来执行更新操作。测试\
  \ `AllServiceImpl.update(..)` 操作的方法首先调用 `findByIdWithAlbums(..)` 方法来检索要更新的记录，如清单\
