  那么，发生了什么？嗯，JPA 查询生成并没有那么智能。如果一名 SQL 开发人员要编写一个查询，从通过多对多关系（如本应用程序中所示）相互关联的表中提取数据，那么该查询将类似于清单
  16-24 中所示的查询。


  ```

  select

  s1_0.ID,a1_0.SINGER_ID,a1_0.ID,

  a1_0.AWARD_NAME,

  a1_0.YEAR,

  s1_0.BIRTH_DATE,

  s1_0.FIRST_NAME,

  s1_0.LAST_NAME,

  I.INSTRUMENT_ID

  from SINGER s1_0

  left join AWARD a1_0 on s1_0.ID=a1_0.SINGER_ID

  left join SINGER_INSTRUMENT SI on s1_0.ID = SI.SINGER_ID

  left join INSTRUMENT I on I.INSTRUMENT_ID = SI.INSTRUMENT_ID;

