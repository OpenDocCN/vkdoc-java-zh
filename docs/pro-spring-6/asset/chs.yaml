  ## 摘要


  在本章中，我们简要介绍了 Spring 的 `TaskExecutor` 及其常见实现。我们还介绍了 Spring 对任务调度的支持。我们重点讲解了 Spring
  内置的 `TaskScheduler` 抽象，并通过一个批量数据更新作业示例，演示了如何使用它来满足任务调度需求。此外，我们还介绍了 Spring 如何通过注解支持异步执行任务。


  本章不需要专门的 Spring Boot 部分，因为用于标记调度和异步执行任务的注解是 `spring-context` 库的一部分，并且在基本的 Spring
  Boot 配置中即可使用。此外，使用 Spring 配置定时和异步任务已经非常简单；Spring Boot 在这方面能做的改进并不多。如果你感到好奇，并希望将提供的项目转换为
  Spring Boot 项目，可以参考前面的章节或本简短教程：[`https://spring.io/guides/gs/scheduling-tasks`](https://spring.io/guides/gs/scheduling-tasks)。


  由于未来似乎是无服务器的，将不再有服务器持续运行以按计划间隔执行任务。当前云应用的做法是设计在容器中运行的微服务，这些容器按计划部署（例如，在 AWS 中使用计划执行的
  Lambda）。任务执行和调度并非复杂主题，因此是时候转向更有趣的内容了——Spring 远程调用。


