  ## Spring for GraphQL


  GraphQL 是一种用于 API 的查询语言，也是一个根据这些查询提供数据的运行时。GraphQL 提供了对 API 中数据的完整且易于理解的描述，并允许客户端请求某些数据，且只接收它们所请求的内容，而无需为此编写复杂的代码。


  考虑一下本书到目前为止构建的 REST API。REST 请求被映射到 URL 路径，例如 `http://localhost:8081/singer/1`。客户端发送一个
  HTTP GET 请求，并接收从名为 `SINGER` 的数据库表中检索到的、关于主键等于 1 的歌手记录的所有信息。如果客户端需要关于此歌手的信息，而这些信息保存在其他表中，则必须编写不同的查询，并且这些查询将被映射到不同的
  URL 路径。因此，客户端必须执行多个请求。使用 GraphQL，客户端无需更改请求的 URL，只需更改用于指定所需数据的模式（schema）。最终，GraphQL
  只是 REST、SOAP 或 gRPC 等应用间已建立远程通信的另一种替代方案。


  Facebook 发明了 GraphQL，因为 REST 无法通过单个请求检索相关的信息图。使用 REST，多次的来回通信会导致页面加载缓慢，并产生不可接受的闪烁。我们可以更深入地描述
  GraphQL，但出于本次讨论的目的，我们仅列出其最重要的特性：


  *   GraphQL 是基于模式（schema）的。

  *   GraphQL 查询看起来很像 JSON，但它们不是 JSON。

  *   GraphQL 是强类型的。GraphQL 模式语言支持标量类型 `String`、`Int`、`Float`、`Boolean` 和 `ID`，因此您可以直接在传递给
  `buildSchema` 的模式中使用它们。

  *   GraphQL 是为开发者设计的。

  *   GraphQL 与传输无关；它主要通过 HTTP 使用，但不仅限于此。例如，您可以通过 TCP 和 WebSocket 使用它。

  *   GraphQL 查询通过 POST 请求发送，因此它们可以根据需要通过嵌套所需属性来指定从数据库不同层级检索的数据，从而变得足够庞大和复杂。


  REST API 是端点的集合，而 GraphQL API 则专注于数据。本节重点介绍如何编写一个支持 GraphQL 的 Spring Boot 应用程序。GraphQL
  的核心概念将根据需要逐步解释。


