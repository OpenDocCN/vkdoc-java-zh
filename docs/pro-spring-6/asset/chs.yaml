  `Sender` Bean 使用 `JmsTemplate` Bean 发送 `Letter` 实例。`JmsTemplate` Bean 也由 Spring
  Boot 自动配置，因此我们只需将其注入到 `Sender` Bean 声明中并使用即可。`Sender` 类及其 Bean 声明如清单 13-18 所示。


  ```

  package com.apress.prospring6.thirteen;

  import org.springframework.jms.core.JmsTemplate;

  // 其他导入语句已省略

  @Component

  @Slf4j

  @RequiredArgsConstructor

  public class Sender {

  private final JmsTemplate jmsTemplate;

  @PostConstruct

  public void init(){

  jmsTemplate.setDeliveryDelay(2000L);

  }

  @Value("${spring.artemis.embedded.queues}")

  private String queueName;

  public void send(Letter letter) {

  log.info(" >> 发送信件=''{}''", letter);

  jmsTemplate.convertAndSend(queueName, letter);

  }

  }

  清单 13-18

  JMS 生产者，Sender 类

