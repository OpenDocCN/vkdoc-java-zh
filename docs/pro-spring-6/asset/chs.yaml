  ## 使用 SockJS\n\n由于并非所有浏览器都支持`WebSocket`（例如移动设备上的浏览器可能不支持），且应用程序仍需为最终用户正常运行，Spring\
  \ 框架提供了基于 SockJS^(¹⁹⁴)的回退方案。使用 SockJS 可在运行时提供尽可能接近 WebSocket 的行为，且无需修改应用程序端代码。SockJS\
  \ 协议通过 JavaScript 库在客户端使用。Spring 框架的`spring-websocket`库包含相关的 SockJS 服务端组件。当使用 SockJS\
  \ 提供无缝回退方案时，客户端将首先通过`/info`路径向服务器发送 GET 请求以获取传输信息。SockJS 会优先尝试使用`WebSocket`，然后是\
  \ HTTP 流式传输，最后才使用 HTTP 长轮询。\n\n只需进行简单修改即可支持使用 SockJS 的`WebSocket`通信。首先，我们需要支持异步消息传递，这在清单\
  \ 19-5 的配置中通过`@EnableAsync`注解启用。\n\n```\npackage com.apress.prospring6.nineteen;\n\
  import org.springframework.scheduling.annotation.EnableAsync;\n// 其他导入语句已省略\n@EnableAsync\n\
  @Configuration\n@EnableWebMvc\n@ComponentScan\npublic class WebConfig  implements\
  \ WebMvcConfigurer, ApplicationContextAware {\n// 其他配置已省略\n}\n清单 19-5\nSpring MVC\
  \ 配置用于 SockJS 异步配置\n```\n\nSpring 官方 Javadoc 指出，`@EnableAsync`注解启用了 Spring 的异步方法执行能力，从而为整个\
  \ Spring 应用程序上下文启用注解驱动的异步处理^(¹⁹⁵)。\n\n第二个修改必须在`WebSocketConfig`中完成，以为我们的处理器启用 SockJS\
  \ 支持，如清单 19-6 所示。\n\n```\npackage com.apress.prospring6.nineteen;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.web.socket.config.annotation.EnableWebSocket;\n\
  import org.springframework.web.socket.config.annotation.WebSocketConfigurer;\nimport\
  \ org.springframework.web.socket.config.annotation.WebSocketHandlerRegistry;\n@Configuration\n\
  @EnableWebSocket\npublic class WebSocketConfig  implements WebSocketConfigurer {\n\
  @Override\npublic void registerWebSocketHandlers(WebSocketHandlerRegistry registry)\
  \ {\nregistry.addHandler(echoHandler(), \"/echoHandler\");\nregistry.addHandler(echoHandler2(),\
  \ \"/sockjs/echoHandler\").withSockJS();\n}\n@Bean\npublic EchoHandler echoHandler()\
  \ {\nreturn new EchoHandler();\n}\n@Bean\npublic EchoHandler echoHandler2() {\n\
  return new EchoHandler();\n}\n}\n清单 19-6\nSpring WebSocket 用于 SockJS 配置\n```\n\n\
  注意，声明了另一个`EchoHandler` bean，并映射到`\"/sockjs/echoHandler\"`。\n\n接下来，我们需要像在`WebSocket`API\
  \ 示例中那样创建一个 HTML 页面，但这次利用 SockJS 来处理传输协商。最显著的区别是，我们使用 SockJS 库而非直接使用`WebSocket`，并使用典型的`http://`方案而非`ws://`来连接端点。要使用\
  \ SockJS，我们需要将相应的 JavaScript 库添加到 HTML 页面，并使用`SockJS`对象而非`WebSocket`进行通信。HTML 代码与`views/index2.html`中的代码几乎相同，唯一的区别是处理\
  \ SockJS 通信的 JavaScript 代码，如清单 19-7 所示。\n\n```\n// \n// \nlet ping;\nlet websocket;\n\
