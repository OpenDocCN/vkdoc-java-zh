- "# 20. 响应式 Spring\n\n在前面的章节中，典型的 Java Web 应用是在 Apache Tomcat 服务器实例上构建和运行的，该服务器对于\
  \ Spring 经典配置是外部的，或者对于 Spring Boot Web 应用是嵌入在应用中的。无论哪种情况，Spring 的`DispatcherServlet`都负责将传入的\
  \ HTTP 请求路由到应用中声明的所有处理器。然而，有一些事情需要考虑。像我们迄今为止开发的应用能否在实际生产环境中使用？`DispatcherServlet`能同时处理多少个\
  \ HTTP 请求？这个数字能增加吗？`DispatcherServlet`实际上并不能决定它能处理的请求数量。这由 Servlet 容器定义，在我们的案例中，就是\
  \ Apache Tomcat 服务器。\n\nApache Tomcat 是基于 Java 软件平台构建和维护动态网站及应用的流行选择。Java Servlet\
  \ API 使 Web 服务器能够使用 HTTP 协议处理基于 Java 的动态 Web 内容。这被称为**请求-响应模型**：客户端发出请求；服务器准备响应并将其发送回客户端。它是单向的，由客户端控制，服务器不关心客户端是否能处理响应。例如，当你在浏览器中打开\
  \ Facebook 聊天窗口时，如果服务器发送了你与该好友的所有对话，页面不仅会加载很长时间，甚至可能导致浏览器崩溃。\n\n多年来，软件和应用开发风格有了许多改进，使得客户端-服务器交互更加高效，但本章的重点是**响应式通信**。\n\
  \n![](img/315511_6_En_20_Figa_HTML.jpg)一个知识提示。 如果你想更详细地了解客户端-服务器通信如何从最初的请求-响应演变为响应式模型，请查阅\
  \ Apress 于 2021 年出版的*Pro Spring MVC with WebFlux*一书^(¹⁹⁸)；从第 9 章开始阅读。\n\n高效的响应式通信只能发生在响应式客户端和响应式服务器之间，也就是响应式应用之间。与经典的请求-响应风格（客户端和服务器以不连续的信息块交换数据）相比，响应式通信意味着客户端和服务器之间的持续数据流。\n\
  \n在处理大量数据时，响应式应用是解决方案。响应式应用是将韧性、响应性和可伸缩性作为优先考虑而设计的应用。响应式宣言^(¹⁹⁹)描述了响应式应用的特征。响应式流\
  \ API 规范^(²⁰⁰)提供了一组最小的接口，应用组件应实现这些接口，以便应用可以被视为响应式应用。因此，响应式流 API 是一个互操作性规范，确保响应式组件无缝集成，并保持操作的非阻塞和异步性。\n\
  \n有四个关键术语描述响应式应用。\n\n*   **响应性：** 期望快速且一致的响应时间。\n\n*   **韧性：** 预期会发生故障，应用被设计为能够处理故障并自我修复。\n\
  \n*   **弹性：** 应用应能够通过自动扩展其能力来处理高负载，并在不再需要时缩减规模。\n\n*   **消息驱动：** 响应式通信应是异步的，并且意味着组件是松散耦合的，并使用消息进行通信。此外，应用背压以防止消息生产者压垮消费者。\n\
  \n响应式应用应该更灵活、更松散耦合、非阻塞且可伸缩，但同时更易于开发、更易于变更且更能容忍故障。构建响应式应用需要遵循响应式编程范式的原则。\n\n读到这里，你可能会认为响应式应用是软件设计演进的巅峰，世界上每个应用都应该重新设计成响应式的。但这并不总是正确的，响应式应用并不总是比经典应用运行得更快，而且它们也有自己的一系列问题。正如你将在本章中看到的，响应式编程与命令式编程截然不同，需要一点思维转变。响应式应用的主要好处是它们是非阻塞的，并且能够用少量固定数量的线程和更少的内存需求来扩展应用，同时充分利用可用的处理能力。\n\
  \n在本章中，你将学习响应式编程，以及如何使用 Spring WebFlux 构建完全响应式的应用。\n\n## Spring 中的响应式编程简介\n\n响应式编程是一种声明式编程范式，基于异步事件处理和数据流的思想。响应式流是一项倡议，旨在为具有非阻塞背压的异步流处理提供标准。它们对于解决需要跨线程边界进行复杂协调的问题极为有用。\n\
  \n\n\nJava 在版本 8 中引入了 Streams API 和 Lambda 表达式，这是迈向响应式编程的第一步，因为响应式编程也可以定义为*带有响应式流的函数式编程*。响应式流直到\
  \ JDK 9 才可用。由于无法等待延迟六个月发布的 JDK 9，创建了 Spring 的 Pivotal^(²⁰¹) 开源团队使用其自己的响应式库 Project\
  \ Reactor^(²⁰³) 构建了 Spring WebFlux^(²⁰²)。\n\n响应式流为 Java 中的响应式编程提供了通用 API。它由四个简单的接口组成，为带有非阻塞背压的异步流处理提供了标准。如果你想编写一个能够与其他响应式组件集成的组件，你需要实现其中一个接口。在抽象层面上，响应式流规范中描述的组件及其之间的关系，如图\
  \ 20-1 所示。\n\n![](img/315511_6_En_20_Fig1_HTML.jpg)\n\n一个循环流。在订阅发布者时，订阅者会创建一个订阅对象，该对象向发布者请求数据。发布者通过两个处理器将数据传输给订阅者。订阅者和发布者之间存在背压。\n\
  \n图 20-1\n\n响应式流规范抽象表示\n\n如果你觉得这很像带有背压功能的发布者/订阅者模型，那你的想法没错，它基本上就是如此。数据在组件之间*流动*，每个组件处理数据并将其向前传递，每个组件通过背压调节速度。现实世界中最合适的模型是工厂传送带。让我们逐一了解图\
  \ 20-1 中的组件。\n\n*   **发布者**是一个潜在无限的数据生产者。在 Java 中，数据生产者必须实现 `org.reactivestreams.Publisher<T>`。发布者准备数据并将其作为单独的消息传输给订阅者。发布者根据订阅者的需求发出值。\n\
  \n*   **订阅者**向发布者注册以消费数据。在 Java 中，数据消费者必须实现 `org.reactivestreams.Subscriber<T>`。订阅者从发布者接收消息并处理它们。这是\
  \ Streams API 中的终端操作。\n\n*   订阅时，会创建一个**订阅**对象来表示发布者和订阅者之间的一对一关系。该对象向发布者请求数据，并取消对数据的需求。在\
  \ Java 中，订阅类必须实现 `org.reactivestreams.Subscription`，并且此类型的对象只能被订阅者使用一次。\n\n*   **处理器**是一个特殊的组件，具有与发布者和订阅者相同的属性。在\
  \ Java 中，处理器类型必须实现 `org.reactivestreams.Processor<T,R>`。处理器可以链接起来形成一个流处理管道。处理器从链中其前面的发布者/处理器消费数据，并为链中其后面的处理器/订阅者发出数据以供消费。如果订阅者/处理器消费数据的速度不够快，它会在发布者/处理器发出数据时应用背压来减慢其速度。\n\
  \n你可以在 IDE 或 GitHub^(²⁰⁴) 上查看这些接口的代码。\n\n![](img/315511_6_En_20_Figb_HTML.jpg)注意。 大多数针对\
  \ JVM 的响应式实现是并行开发的，因此今天我们拥有：RxJava^(²⁰⁵)、Akka Streams^(²⁰⁶)、Ratpack^(²⁰⁷)、Vert.x^(²⁰⁸)\
  \ 和 Project Reactor。\n\n使用响应式流编写的代码看起来与使用非响应式流编写的代码相似，但底层发生的情况是不同的。响应式流是**异步的**，但你无需编写处理异步的逻辑。你只需要声明当流中发出某个值时必须发生什么。你编写的代码会在流异步发出项目时被调用，独立于主程序流程。如果涉及多个处理器，每个处理器都在自己的线程上执行。由于你的代码是异步运行的，你必须小心地提供作为处理器（也称为*转换器*）方法参数的函数。你必须确保它们是**纯函数**。纯函数应仅通过其参数和返回值与程序交互，对于相同的参数值返回相同的结果，并且绝不应修改需要同步的对象，因为这可能会导致整个流程出现不可预测的延迟。\n\
  \nProject Reactor 实现了响应式流 API，为响应式应用程序提供了具有高效需求管理的非阻塞稳定基础。它声明了两个主要的发布者实现：\n\n* \
  \  `reactor.core.publisher.Mono<T>` 是一个表示零个或一个元素的响应式流发布者。\n\n*   `reactor.core.publisher.Flux<T>`\
  \ 是一个表示从零到无限个元素的异步序列的响应式流发布者。\n\n`Mono<T>` 和 `Flux<T>` 类似于 `java.util.concurrent.Future<V>`。它们表示异步计算的结果。它们之间的区别在于，当你尝试通过调用\
  \ `get()` 方法获取结果时，`Future<V>` 会阻塞当前线程，直到计算完成。`Mono<T>` 和 `Flux<T>` 都提供了一系列 `block*()`\
  \ 方法，用于检索不阻塞当前线程的异步计算的值。\n\n为了更清楚地说明响应式编程在语法上与命令式编程有何不同，让我们考虑以下场景：给定一个歌手列表，我们想要找出所有年龄大于\
  \ 50 岁的歌手，并计算他们的年龄总和。如果代码以命令式风格编写，可能类似于清单 20-1 中的代码片段。\n\n```\npackage com.apress.prospring6.twenty.boot;\n\
  //import 语句已省略\npublic class SimpleProgrammingTest {\nList singers = List.of(\n\
  Singer.builder().firstName(\"John\").lastName(\"Mayer\").birthDate(LocalDate.of(1977,\
  \ 10, 16)).build(),\nSinger.builder().firstName(\"B.B.\").lastName(\"King\").birthDate(LocalDate.of(1929,\
  \ 9, 16)).build(),\nSinger.builder().firstName(\"Peggy\").lastName(\"Lee\").birthDate(LocalDate.of(1920,\
  \ 5, 26)).build(),\nSinger.builder().firstName(\"Ella\").lastName(\"Fitzgerald\"\
  ).birthDate(LocalDate.of(1917, 4, 25)).build()\n);\nFunction> computeAge = singer\
  \ -> Pair.of(singer,Period.between(singer.getBirthDate(), LocalDate.now()).getYears());\n\
  Predicate> checkAge = pair -> pair.getRight() > 50;\n@Test\nvoid imperativePlay(){\n\
  int agesum = 0;\nfor (var s : singers) {\nvar p = computeAge.apply(s);\nif (checkAge.test(p))\
  \ {\nagesum += p.getRight();\n}\n}\nassertEquals(300, agesum);\n}\n}\n清单 20-1\n\
  处理歌手列表的命令式风格代码\n```\n\n不太美观，对吧？嗯，这就是所有 Java 开发者在 Java 8 引入 Stream API 之前习惯编写的代码类型。一系列指令一个接一个地列出供\
  \ JVM 执行。此外，使用 `Function<T,R>` 和 `Predicate<T>` 有点取巧，考虑到这些类型在 Java 8 之前也不存在。使用它们是为了简单和可重用性。\n\
  \n使用 Stream API，结合 `Function<T,R>` 和 `Predicate<T>` 实例，相同的代码可以编写得更具声明性和函数式风格，如清单\
  \ 20-2 所示。\n\n\n\n```\npackage com.apress.prospring6.twenty.boot;\n//import 语句已省略\n\
  import static org.junit.jupiter.api.Assertions.assertEquals;\npublic class SimpleProgrammingTest\
  \ {\n// list、function 和 predicate 与清单 20-1 相同\n@Test\nvoid streamsPlay() {\nvar\
  \ agesum = singers.stream() // Stream\n.map(computeAge) // Stream>\n.filter(checkAge)//\
  \ Stream>\n.map(Pair::getRight) // Stream\n.reduce(Integer:: sum) // Optional\n\
  .orElseThrow(() -> new RuntimeException(\"Something went terribly wrong!\"));\n\
  assertEquals(300, agesum);\n}\n}\n清单 20-2\n使用 Java 8 Stream API 处理歌手列表的声明式（函数式）风格代码\n\
  ```\n\n声明式编程更像是一个不断定义事物是什么的过程，正如清单 20-2 中的注释所指出的，这些注释展示了结果流所发出的对象类型。声明式编程关注的是程序应该**实现什么**，而命令式编程关注的是程序**如何**实现结果。\n\
  \n将清单 20-2 中的代码转换为响应式代码并不需要太多功夫：我们只需将`Stream<T>`替换为`Flux<T>`，并确保声明一个订阅者，该订阅者对链中最后一个处理器（即`reduce(..)`函数）的结果进行处理。代码如清单\
  \ 20-3 所示。\n\n```\npackage com.apress.prospring6.twenty.boot;\nimport reactor.core.publisher.BaseSubscriber;\n\
  import reactor.core.publisher.Flux;\n//其他 import 语句已省略\npublic class SimpleProgrammingTest\
  \ {\n// list、function 和 predicate 与清单 20-1 相同\n@Test\nvoid reactivePlay() {\nFlux.fromIterable(singers)\
  \  // Flux\n.map(computeAge) // Flux >\n.filter(checkAge) // Flux >\n.map(Pair::getRight)\
  \ // Flux \n.reduce(0, Integer::sum) // Mono\n.subscribe(new BaseSubscriber() {\n\
  @Override\nprotected void hookOnNext(Integer agesum) {\nassertEquals(300, agesum);\
  \ // 运行此测试时可能失败，截至 2023 年 4 月测试通过 ;)\n}\n});\n}\n}\n清单 20-3\n使用响应式流处理歌手列表的函数式风格代码\n\
  ```\n\n`BaseSubscriber<T>`抽象类是`Subscriber<T>`实现的一个简单基类，允许用户直接对其执行`request(long)`和`cancel()`操作。`hookOnNext(..)`方法用于将行为附加到发出的值上；在我们的例子中，这是检查我们假设的绝佳位置。\n\
  \n现在你已经了解了 Project Reactor 的响应式编程，让我们换个话题，看看如何使用 Spring WebFlux 编写响应式应用程序。\n\n##\
  \ 介绍 Spring WebFlux\n\nSpring Web MVC 是围绕`DispatcherServlet`设计的，它是一个网关，负责将 HTTP\
  \ 请求映射到处理器，并配置了主题、国际化、文件上传和视图解析。Spring MVC 是为 Servlet API 和 Servlet 容器构建的。这意味着它主要使用阻塞\
  \ I/O，并且每个 HTTP 请求对应一个线程。支持请求的异步处理是可能的，但需要更大的线程池，这反过来又需要更多资源，并且难以扩展。\n\nSpring WebFlux\
  \ 是 Spring 5 中新增的响应式栈 Web 框架，是 Spring 对日益突出的阻塞 I/O 架构问题的回应。它可以在 Servlet 3.1+容器上运行，但也能适配其他原生服务器\
  \ API。Spring 团队首选的服务器是 Netty^(²⁰⁹)，它在异步非阻塞领域久经考验。Spring WebFlux 在设计上考虑了函数式响应式编程，并允许以声明式风格编写代码。Spring\
  \ MVC 和 WebFlux 有一些共同元素，甚至可以一起使用。处理器方法没有理由不能返回`Flux<T>`或`Mono<T>`，本章稍后将展示这一点。\n\n\
  ![](img/315511_6_En_20_Figc_HTML.jpg)注意。 需要记住一点：在编写响应式应用程序时，应用程序的每个组件都必须是响应式的，否则应用程序将无法真正实现响应式。非响应式组件可能成为瓶颈，并破坏整个流程。例如，一个典型的三层应用程序（表示层、服务层、数据库层）只有在所有三层都是响应式的情况下才能实现响应式。因此，一个响应式的\
  \ Spring WebFlux 应用程序必须具有响应式视图、响应式控制器、响应式服务、响应式仓库和响应式数据库（任何带有响应式驱动程序的 SQL 数据库，或像\
  \ MongoDB、RethinkDB 等响应式 NoSQL 数据库）。此外，调用该应用程序的客户端也必须是响应式的。\n\n在将歌手应用程序转换为响应式应用程序之前，让我们先回顾一下\
  \ Spring WebFlux 的内部工作原理。\n\n响应式应用程序可以部署在 Servlet 3.1+容器上，例如 Tomcat、Jetty 或 Undertow。这里的技巧是不使用`DispatcherServlet`\
  \ bean。`DispatcherServlet` bean 是 HTTP 请求处理器/控制器的中央调度器，无论它多么强大，它仍然是一个阻塞组件。这时，新的改进版\
  \ Spring Web 组件通过引入`org.springframework.http.server.reactive.HttpHandler`^(²¹⁰)来解决问题。该接口代表了响应式\
  \ HTTP 请求处理的最低级别契约，Spring 为每个支持的服务器提供了基于它的服务器适配器。其代码如清单 20-4 所示。\n\n```\npackage\
  \ org.springframework.http.server.reactive;\nimport reactor.core.publisher.Mono;\n\
  // 其他注释已省略\npublic interface HttpHandler {\n/**\n* 处理给定的请求并写入响应。\n* @param request\
  \ 当前请求\n* @param response 当前响应\n* @return 表示请求处理完成\n*/\nMono handle(ServerHttpRequest\
  \ request, ServerHttpResponse response);\n}\n清单 20-4\nSpring 的 HttpHandler 接口\n\
  ```\n\n表 20-1 列出了 Spring WebFlux 支持的服务器，以及代表每个服务器从非阻塞 I/O 到响应式流桥接核心的适配器类名称。\n\n\
  表 20-1\n\nSpring WebFlux 支持的 HTTP 服务器\n\n| 服务器名称 | Spring 适配器 | 使用的 Servlet API\
  \ |\n| --- | --- | --- |\n| Netty^(²¹¹) | ReactorHttpHandlerAdapter | 使用 Reactor\
  \ Netty 库的 Netty API |\n| Undertow^(²¹²) | UndertowHttpHandlerAdapter | spring-web\
  \ Undertow 到响应式流桥接 |\n| Tomcat^(²¹³) | TomcatHttpHandlerAdapter | spring-web：Servlet\
  \ 3.1 非阻塞 I/O 到响应式流桥接 |\n| Jetty^(²¹⁴) | JettyHttpHandlerAdapter | spring-web：Servlet\
  \ 3.1 非阻塞 I/O 到响应式流桥接 |\n\n在`HttpHandler`之上，Spring 提供了`org.springframework.web.server.WebHandler`^(²¹⁵)接口，这是一个稍高层次的契约，描述了所有通用服务器\
  \ API，具有过滤器链式处理和异常处理功能。该接口如清单 20-5 所示，与`HttpHandler`非常相似。\n\n```\npackage org.springframework.web.server;\n\
  import reactor.core.publisher.Mono;\nimport org.springframework.web.server.adapter.HttpWebHandlerAdapter;\n\
  import org.springframework.web.server.adapter.WebHttpHandlerBuilder;\npublic interface\
  \ WebHandler {\n/**\n* 处理 Web 服务器交换。\n* @param exchange 当前服务器交换\n* @return {@code\
  \ Mono} 表示请求处理何时完成\n*/\nMono handle(ServerWebExchange exchange);\n}\n清单 20-5\nWebHandler\
  \ 接口\n```\n\n\n\n`WebHandler`在其`handle(..)`方法中并未使用`ServerRequest`和`ServerResponse`对象，而是使用了一个`ServerWebExchange`类型的对象。`ServerWebExchange`是一个专用接口，代表\
  \ HTTP 请求-响应交互的契约，同时还暴露了额外的服务器端处理相关属性和功能，例如请求属性。那么，与 Spring Web MVC 应用程序相比，这对 Spring\
  \ WebFlux 的配置意味着什么？\n\nSpring Web MVC 应用程序有一个`org.springframework.web.servlet.DispatcherServlet`\
  \ bean 作为前端控制器，拦截所有请求并将其匹配到处理器方法。而 Spring WebFlux 应用程序则有一个`org.springframework.web.reactive.DispatcherHandler`\
  \ bean，作为 HTTP 请求处理器/控制器的调度器。`DispatcherHandler`实现了`WebHandler`和`ApplicationContextAware`接口，这使其能够访问应用程序配置中的所有\
  \ bean。它是核心的`WebHandler`实现，并为可配置组件执行的请求处理提供了算法。它将请求处理和渲染适当响应的任务委托给专门的 bean，并且这些\
  \ bean 的实现，正如预期的那样，是非阻塞的。与 Spring MVC 生态系统类似，存在一个`HandlerMapping` bean 用于将请求映射到处理器，一个`HandlerAdapter`\
  \ bean 用于调用处理器，一个`org.springframework.web.server.WebExceptionHandler` bean 用于处理异常，以及一个`HandlerResultHandler`\
  \ bean 用于从处理器获取结果并最终确定响应——所有这些都声明在`org.springframework.web.reactive`包中。\n\n按照 Spring\
  \ 的典型方式，在大多数情况下，`DispatcherHandler`的配置不需要直接描述它的代码。要配置一个将在 Servlet 3.1+容器中运行的 Spring\
  \ WebFlux 应用程序，你需要执行以下操作：\n\n*   声明一个 Spring WebFlux 配置类，并使用`@Configuration`和`@EnableWebFlux`对其进行注解。`@EnableWebFlux`注解是`org.springframework.web.reactive.config`包的一部分，它启用了注解控制器和函数式端点的使用。\n\
  \n*   继承`org.springframework.web.server.adapter.AbstractReactiveWebInitializer`类，实现`getConfigClasses()`方法，并将你的\
  \ Spring WebFlux 配置类注入其中。\n\n在 Spring Boot 应用程序中，你无需执行任何这些操作。只需声明你的控制器、处理器类和函数式端点即可。因为在本章中，最终目标是构建一个完全响应式的应用程序，从数据库到表示层，因此不会展示经典的响应式应用程序\
  \ Spring 配置。（特别是因为有一本书更详细地介绍了这一点，并且至今仍相当相关：*Pro Spring MVC with WebFlux*，由 Apress\
  \ 于 2021 年出版）\n\n### 响应式应用程序的 Spring Boot 配置\n\n让我们从配置开始。要构建一个响应式的三层应用程序，我们需要所有层都使用响应式组件构建。这意味着以下几点：\n\
  \n*   数据访问层必须是响应式的：这意味着数据库驱动程序必须是响应式的，并且持久化层（如果使用）也必须是响应式的。经典的数据库 JDBC 驱动程序不是响应式的，因此在响应式应用程序中，它们代表了一个阻塞\
  \ I/O 组件，会影响整个应用程序的行为。因此，需要一个 SQL 响应式驱动程序，于是 R2DBC^(²¹⁶)被开发出来。**R**eactive **R**elational\
  \ **D**ata**b**ase **C**onnectivity（**R2DBC**）项目为关系数据库带来了响应式编程 API，并且有一个适用于 MariaDB\
  \ 的驱动程序。对于持久化，有一个 Hibernate Reactive 库^(²¹⁷)，但目前其功能有限，因此本章不会使用它。\n\n*   服务层必须是响应式的：这并不复杂；我们只需要确保服务类只返回`Flux<T>`和`Mono<T>`实例。\n\
  \n*   Web 层必须是响应式的：这意味着控制器和处理器也是响应式的，因此也只返回`Flux<T>`和`Mono<T>`实例。\n\n*   表示层必须是响应式的：这意味着视图模板必须是动态的，以便它们能够在数据从服务器到达时进行渲染。Thymeleaf^(²¹⁸)和\
  \ jQuery^(²¹⁹)的组合可以很好地处理与服务器的响应式通信，但如果你需要更高级的 UI，React^(²²⁰)和 Angular^(²²¹)是更合适的选择。\n\
  \n图 20-2 显示了项目依赖关系。\n\n![](img/315511_6_En_20_Fig2_HTML.jpg)\n\n一张截图展示了第 20 章启动项目的依赖关系。spring-boot-starter-data\
  \ 的依赖关系已展开。\n\n图 20-2\n\n`chapter20-boot`项目的依赖关系\n\n`spring-boot-starter-data-r2dbc`的主要依赖是`spring-data-r2dbc`^(²²²)，它是\
  \ Spring Data 家族的一部分，使得实现响应式仓库变得容易。Spring Data R2DBC 相当简单：虽然它不提供缓存、延迟加载、写后置或 ORM\
  \ 框架的许多其他特性，但它确实提供了对象映射，这足以消除一些样板代码，因为将数据库对象转换为 Java 对象可能很麻烦。\n\n`spring-boot-starter-webflux`的主要依赖是`spring-webflux`，它包含了开发响应式\
  \ Web 应用程序所需的所有 Spring 组件。响应式栈 Web 框架 Spring WebFlux 是在 Spring Framework 5 中添加的，它是非阻塞的，支持响应式流背压，并可在\
  \ Netty、Undertow 和 Servlet 容器等服务器上运行。Spring Boot WebFlux 默认配置包括 Reactor Netty^(²²³)服务器，该服务器基于\
  \ Netty^(²²⁵)框架提供非阻塞且支持背压的 TCP/HTTP/UDP/QUIC^(²²⁴)客户端和服务器。\n\n### 响应式仓库和数据库\n\n\
  与本章相关的项目所选用的数据库是 MariaDB。有一个稳定的适用于 MariaDB 的 R2DBC 驱动程序，因此它取代了阻塞的 JDBC 驱动程序。正如预期的那样，响应式驱动程序提供了与数据库的非阻塞通信，以及身份验证。由于驱动程序的使用是由\
  \ Spring Data 在底层完成的，因此让查看代码的开发人员知道正在使用响应式驱动程序的唯一事情就是配置。数据库连接 URL 不再使用`jdbc:`前缀，而是使用`r2dbc:`前缀。\n\
  \n清单 20-6 显示了使用响应式驱动程序时，`application.yaml`配置文件中的 Spring Boot 数据源配置属性。\n\n```\nspring:\n\
  url: r2dbc:mariadb://localhost:3306/musicdb\nusername: prospring6\npassword: prospring6\n\
  清单 20-6\n使用响应式驱动程序的 Spring Boot 数据源配置\n```\n\nSpring Data R2DBC 提供了一些有用的类，例如`org.springframework.data.r2dbc.core`包中的`R2dbcEntityTemplate`，它相当于响应式环境中的`JdbcTemplate`。它通过使用响应式实体类来建模数据并避免常见错误，从而简化了\
  \ Reactive R2DBC 的使用。为了执行数据库操作，它委托给一个`DatabaseClient`（同一包）bean，该 bean 也可以用于使用 Criteria\
  \ API 为映射实体运行语句。在这个项目中，使用了 Spring Data 响应式仓库，因此没有直接引用这些类。只需知道它们存在，并且如果需要，可以使用它们。\n\
  \n\n\nSpring Data 响应式仓库与普通仓库并无太大区别。它们只是为实体类型的基本查询（创建、读取、更新和删除）提供契约的接口。如果需要，可以通过添加（响应式版本）`@Query`\
  \ 注解的方法和自定义实现来扩展，如**第** **10****章**所示。\n\n清单 20-7 展示了 `SingerRepo` 接口，该接口扩展了 Spring\
  \ Data 的 `ReactiveCrudRepository<T,ID>` 接口，并添加了自身的响应式方法。\n\n```\npackage com.apress.prospring6.twenty.boot.repo;\n\
  import com.apress.prospring6.twenty.boot.model. Singer;\nimport org.springframework.data.r2dbc.repository.\
  \ Query;\nimport org.springframework.data.repository.query. Param;\nimport org.springframework.data.repository.reactive.\
  \ ReactiveCrudRepository;\nimport reactor.core.publisher. Flux;\nimport reactor.core.publisher.\
  \ Mono;\nimport java.time. LocalDate;\npublic interface SingerRepo extends ReactiveCrudRepository{\n\
  @Query(\"select * from singer where first_name=:fn and last_name=:ln\")\nMono findByFirstNameAndLastName(@Param(\"\
  fn\") String firstName, @Param(\"ln\") String lastName);\n@Query(\"select * from\
  \ singer where first_name=:fn\")\nFlux findByFirstName(@Param(\"fn\") String firstName);\n\
  @Query(\"select * from singer where last_name=:ln\")\nFlux findByLastName(@Param(\"\
  ln\") String lastName);\n@Query(\"select * from singer where birth_date=:ln\")\n\
  Flux findByBirthDate(@Param(\"bd\") LocalDate birthDate);\n}\n清单 20-7\nSingerRepo\
  \ 响应式仓库接口\n```\n\n请注意，某些 Spring Data 组件（例如 `@Param` 注解）可以在响应式上下文中使用，只有那些直接与数据流交互的组件才需要是响应式的。例如，Spring\
  \ 有两个 `@Query` 注解：一个位于 `org.springframework.data.r2dbc.repository` 包中的响应式版本，另一个位于\
  \ `org.springframework.data.jpa.repository` 包中的非响应式版本。\n\n本例中使用的 `ReactiveCrudRepository<T,\
  \ ID>` 接口是**第** **10****章**介绍的 `CrudRepository<T,ID>` 的响应式等价物，其主要特点是返回响应式类型，因此我们获得的不是数据，而是一个数据响应式流，当订阅者请求时，该流会发出数据。\n\
  \n![](img/315511_6_En_20_Figd_HTML.jpg)警告。 请注意，为了保持仓库的完全响应式，所有额外的方法都必须返回 `Flux<T>`\
  \ 或 `Mono<T>`。\n\n当 Spring Data 响应式仓库通过配置（如清单 20-7 所示）或通过自定义接口组合自定义实现（如**第** **10****章**所示）增加了额外方法后，您可能想要测试您的仓库。这可以通过结合使用\
  \ TestContainers、JUnit 5、Spring Boot 和 Project Reactor 测试库轻松实现。*(是的，我知道，当需要 4 个库才能完成时，这看起来并不那么容易，但事实确实如此！)*\n\
  \n图 20-3 展示了 `chapter20-boot` 项目的测试依赖关系。\n\n![](img/315511_6_En_20_Fig3_HTML.jpg)\n\
  \n一张截图展示了第 20 章 boot 项目的依赖关系。其中 spring boot starter test 的依赖项已展开。\n\n图 20-3\n\n\
  `chapter20-boot` 项目的测试依赖关系\n\n要编写测试，您需要执行以下操作：\n\n*   您需要设置一个 MariaDB 容器，提取其属性，将连接\
  \ URL 转换为响应式连接 URL，并将其注入到 Spring Boot 测试上下文中。这一步是必要的，以便 Spring Boot 能够配置 R2DBC 驱动程序。\n\
  \n*   使用 `@DataR2dbcTest` 注解测试类，让 Spring Boot 知道所需的测试上下文是专门针对响应式上下文的，并且我们只对 Spring\
  \ Data 组件感兴趣。\n\n*   为了检查对响应式操作的数据的断言，我们需要使用 Project Reactor 的 `StepVerifier`，它提供了一种声明式的方式来为异步\
  \ Publisher 序列创建可验证的脚本，通过表达对订阅时将要发生的事件的期望。\n\n*   为了控制测试方法的执行顺序（我们在这里保持测试非常简单），用它们的执行步骤编号标记方法并检查假设。我们使用\
  \ JUnit 5 注解和静态方法，在本书的这个阶段，您应该已经熟悉它们了。\n\n清单 20-8 展示了测试类，它检查了 `SingerRepo` 接口中最重要的方法，并使用了所有提到的库和组件。\n\
  \n```\npackage com.apress.prospring6.twenty.boot;\n// Spring Boot imports\nimport\
  \ org.springframework.boot.test.autoconfigure.data.r2dbc.DataR2dbcTest;\nimport\
  \ org.springframework.data.r2dbc.core.R2dbcEntityTemplate;\n// TestContainers imports\n\
  import org.testcontainers.containers.MariaDBContainer;\nimport org.testcontainers.junit.jupiter.Container;\n\
  import org.testcontainers.junit.jupiter.Testcontainers;\nimport org.testcontainers.utility.MountableFile;\n\
  // Project Reactor Test imports\nimport reactor.test.StepVerifier;\n// JUnit 5 import\n\
  import static org.junit.jupiter.api.Assertions.assertNotNull;\n// other import statements\
  \ omitted\n@Testcontainers\n@DataR2dbcTest\n@TestMethodOrder(MethodOrderer.OrderAnnotation.class)\n\
  public class RepositoryTest {\n@Container\nstatic MariaDBContainer mariaDB = new\
  \ MariaDBContainer(\"mariadb:latest\")\n.withCopyFileToContainer(MountableFile\n\
  .forClasspathResource(\"testcontainers/create-schema.sql\"), \"/docker-entrypoint-initdb.d/init.sql\"\
  );\n@Autowired\nSingerRepo singerRepo;\n@Autowired\nR2dbcEntityTemplate template;\n\
  @Order(1)\n@BeforeEach\npublic void testRepoExists() {\nassertNotNull(singerRepo);\n\
  }\n@Order(2)\n@Test\npublic void testCount() {\nsingerRepo.count()\n.log()\n.as(StepVerifier::\
  \ create)\n.expectNextMatches(p -> p == 4)\n.verifyComplete();\n}\n@Order(3)\n@Test\n\
  public void testFindByFistName() {\nsingerRepo.findByFirstName(\"John\")\n.log()\n\
  .as(StepVerifier:: create)\n.expectNextCount(2)\n.verifyComplete();\n}\n@Order(4)\n\
  @Test\npublic void testFindByFistNameAndLastName() {\nsingerRepo.findByFirstNameAndLastName(\"\
  John\", \"Mayer\")\n.log()\n.as(StepVerifier:: create)\n.expectNext(Singer.builder()\n\
  .id(1L)\n.firstName(\"John\")\n.lastName(\"Mayer\")\n.birthDate(LocalDate.of(1977,\
  \ 10, 16))\n.build())\n.verifyComplete();\n}\n@Order(5)\n@Test\npublic void testCreateSinger()\
  \ {\nsingerRepo.save(Singer.builder()\n.firstName(\"Test\")\n.lastName(\"Test\"\
  )\n.birthDate(LocalDate.now())\n.build())\n.log()\n.as(StepVerifier:: create)\n\
  .assertNext(s -> assertNotNull(s.getId()))\n.verifyComplete();\n}\n@Order(6)\n@Test\n\
  public void testDeleteSinger() {\nsingerRepo.deleteById(4L)\n.log()\n.as(StepVerifier::\
  \ create)\n.expectNextCount(0)\n.verifyComplete();\n}\n@DynamicPropertySource\n\
  static void registerDynamicProperties(DynamicPropertyRegistry registry) {\nregistry.add(\"\
  spring.r2dbc.url\", () -> \"r2dbc:mariadb://\"\n+ mariaDB.getHost() + \":\" + mariaDB.getFirstMappedPort()\n\
  + \"/\" + mariaDB.getDatabaseName());\nregistry.add(\"spring.r2dbc.username\", ()\
  \ -> mariaDB.getUsername());\nregistry.add(\"spring.r2dbc.password\", () -> mariaDB.getPassword());\n\
  }\n}\n清单 20-8\n响应式 RepositoryTest 测试类\n```\n\n请注意，测试方法也是按照函数式编程范式编写的。每个语句都声明了在数据发出时要对其执行的操作。这里最重要的方法是\
