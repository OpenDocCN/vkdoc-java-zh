  ### 使用 AspectJ 注解进行声明式引入


  在讨论代理时曾简要提及引入。之前的“引入入门”部分展示了如何编写一个切面，为目标对象装饰一个接口，并为该接口提供实现。在应用程序中整合所有这些功能是通过使用 `ProxyFactory`
  实例和 `ProxyFactoryBean` 完成的。当时所有操作都是通过编程方式完成的，但通过使用 AspectJ 的 `@DeclareParents` 注解，也可以进行声明式配置。


  为了演示这一点，清单 5-68 引入了一个名为 `Performer` 的新接口及其实现 `Dancer`。


  ```

  package com.apress.prospring6.five.common;

  public interface Performer {

  void perform();

  }

  // 导入语句已省略

  public class Dancer implements Performer {

  private static Logger LOGGER = LoggerFactory.getLogger(Dancer.class);

  @Override

  public void perform() {

  LOGGER.info(" 向左摇摆，向右摇摆！");

  }

  }

  清单 5-68

  Performer 和 Dancer 实现

  ```


  `@DeclareParents` 注解用于为任何实现了 `Singer` 类型的 Bean 引入 `Performer` 接口。清单 5-69 展示了 `AnnotatedIntroduction`
  切面的配置。


  ```

  package com.apress.prospring6.five.annotated;

  import com.apress.prospring6.five.common.Dancer;

  import com.apress.prospring6.five.common.Performer;

  import org.aspectj.lang.annotation.DeclareParents;

  // 其他导入语句已省略

  @Component

  @Aspect

  public class AnnotatedIntroduction {

  @DeclareParents(value="com.apress.prospring6.five.common.Singer+", defaultImpl=Dancer.class)

  public static Performer performer;

  }

  清单 5-69

  AnnotatedIntroduction 类及引入的切面定义

  ```


  要实现的接口由注解字段的类型决定，在本例中为 `Performer`。`@DeclareParents` 的 `value` 属性用于告知 Spring 需要对哪些类型执行引入。任何匹配类型的
  Bean 都会被包装在一个实现了 `Performer` 接口的代理中，并引入由 `Dancer` 类描述的行为。


  测试引入很简单；我们只需从上下文中获取 Bean，通过 `instanceof` 检查其类型，将其转换为 `Performer` 并调用 `perform()`。测试方法如清单
  5-70 所示。


