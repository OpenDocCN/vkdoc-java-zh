  请注意，无需通过名称引用顾问 bean 来将其作为参数提供给 `ProxyFactoryBean`，因为可以直接调用 `addAdvisor(..)` 并将顾问
  bean 作为参数提供。这显然简化了配置。


  ### ProxyFactoryBean 总结


  使用 `ProxyFactoryBean` 时，你可以配置 AOP 代理，这些代理提供了编程方法的所有灵活性，而无需将应用程序与 AOP 配置耦合。除非你需要在运行时决定如何创建代理，否则最好使用声明式代理配置方法而非编程式方法。让我们继续，以便你了解使用声明式
  Spring AOP 最实用的方式。


  ## 使用 @AspectJ 风格注解


  当使用 JDK 5 或更高版本的 Spring AOP 时，你也可以使用 `@AspectJ` 风格注解来声明通知。然而，如前所述，Spring 仍然使用自己的代理机制来通知目标方法，而不是
  AspectJ 的织入机制。


  在本节中，我们将介绍如何使用 `@AspectJ` 风格注解来实现与本章开头介绍的相同的切面。AspectJ 是 Java 的一个通用面向切面扩展，源于解决传统编程方法无法很好捕获的问题或关注点（即横切关注点）的需求。对于本节中的示例，我们还将为其他
  Spring bean 使用注解，并将使用 Java 配置类。


  清单 5-47 展示了使用注解声明的 `GrammyGuitarist` 类及其 bean。


  ```

