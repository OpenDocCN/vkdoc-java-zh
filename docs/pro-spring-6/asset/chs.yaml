  ## 介绍 Spring 类型转换


  Spring 3.0 引入了一个通用的类型转换系统，位于 `org.springframework.core.convert` 包下。除了提供 `PropertyEditor`
  支持的替代方案外，该类型转换系统还可以配置为在任何 Java 类型和 POJO 之间进行转换（而 `PropertyEditor` 专注于将属性文件中的 `String`
  表示形式转换为 Java 类型）。


  ### 实现自定义转换器


  为了演示类型转换系统的实际应用，让我们重新审视之前的示例，并使用相同的 `Blogger` 类。假设这次我们想使用类型转换系统将 `String` 格式的日期转换为博主的
  `birthDate` 属性，该属性的类型为 `LocalDate`。为了支持这种转换，我们不是创建自定义的 `PropertyEditor`，而是通过实现 `org.springframework.core.convert.converter.Converter<S,T>`
  接口来创建一个自定义转换器。清单 11-7 展示了这个自定义转换器。


  ```

  package com.apress.prospring6.eleven.converter.bean;

  import org.springframework.core.convert.converter.Converter;

  import java.time.LocalDate;

  import java.time.format.DateTimeFormatter;

  public class LocalDateConverter implements Converter {

  private DateTimeFormatter dateFormat =  DateTimeFormatter.ofPattern("yyyy-MM-dd");

  @Override

  public LocalDate convert(String source) {

  return LocalDate.parse(source, dateFormat);

  }

  }

  清单 11-7

  LocalDateConverter 实现

  ```


  我们实现了 `Converter<String, DateTime>` 接口，这意味着该转换器负责将 `String`（源类型 S）转换为 `LocalDate`
  类型（目标类型 T）。


  要使用此转换器代替 `PropertyEditor`，我们需要在 Spring 的 `ApplicationContext` 中配置一个 `org.springframework.core.convert.ConversionService`
  接口的实例。清单 11-8 展示了 Java 配置类。


  ```

  package com.apress.prospring6.eleven.converter.bean;

  import org.springframework.context.support.ConversionServiceFactoryBean;

  // 其他导入语句已省略

  @Configuration

  @ComponentScan

  public class ConverterCfg {

  @Bean

  public ConversionServiceFactoryBean conversionService() {

  var conversionServiceFactoryBean = new ConversionServiceFactoryBean();

  var convs = new HashSet();

  convs.add(new LocalDateConverter());

  conversionServiceFactoryBean.setConverters(convs);

  conversionServiceFactoryBean.afterPropertiesSet();

  return conversionServiceFactoryBean;

  }

  }

  清单 11-8

  用于使用转换器实现的 Java 配置类

  ```


  这里，我们通过声明一个类为 `ConversionServiceFactoryBean` 的 `conversionService` Bean，来指示 Spring
  使用类型转换系统。这种类型的 Bean 可以组合多个转换服务。如果没有定义转换服务 Bean，Spring 将使用基于 `PropertyEditor` 的系统。


  默认情况下，类型转换服务支持常见类型之间的转换，包括字符串、数字、枚举、集合、映射等。此外，也支持在基于 `PropertyEditor` 的系统中将 `String`
  实例转换为 Java 类型。


  测试方法与清单 11-5 中所示的方法几乎相同，唯一的区别是将 `CustomRegistrarCfg` 类替换为 `ConverterCfg`。




  ### 在任意类型之间进行转换


  类型转换系统的真正强大之处在于能够在任意类型之间进行转换。清单 11-9 介绍了仅包含两个字段的记录 `SimpleBlogger`，以及将 `Blogger`
  实例转换为 `SimpleBlogger` 实例的转换器实现。


  ```

  package com.apress.prospring6.eleven.domain;

  import com.apress.prospring6.eleven.Blogger;

  import org.springframework.core.convert.converter.Converter;

  import java.net.URL;

  public record SimpleBlogger (String fullName, URL personalSite) {

  public static class BloggerToSimpleBloggerConverter implements Converter {

  @Override

  public SimpleBlogger convert(Blogger source) {

  return new SimpleBlogger(source.firstName() + " " + source.lastName(), source.personalSite());

  }

  }

  }

  清单 11-9

  SimpleBlogger 记录与转换器

  ```


  要将此转换器添加到应用程序上下文配置中，需要将 `BloggerToSimpleBloggerConverter` 的一个实例添加到 `ConversionServiceFactoryBean`
  的转换器集合中，如清单 11-10 所示。


  ```

  package com.apress.prospring6.eleven.converter.bean;

  // 导入语句已省略

  @Configuration

  @ComponentScan

  public class ConverterCfg {

  @Bean

  public ConversionServiceFactoryBean conversionService() {

  var conversionServiceFactoryBean = new ConversionServiceFactoryBean();

  var convs = new HashSet();

  convs.add(new LocalDateConverter());

  convs.add(new SimpleBlogger.BloggerToSimpleBloggerConverter());

  conversionServiceFactoryBean.setConverters(convs);

  conversionServiceFactoryBean.afterPropertiesSet();

  return conversionServiceFactoryBean;

  }

  }

  清单 11-10

  SimpleBlogger 类与转换器

  ```


  要测试此转换器，我们需要从上下文中获取转换器 bean，并将其中一个 `Blogger` 实例转换为 `SimpleBlogger` 实例，如清单 11-11
  所示。


  ```

  package com.apress.prospring6.eleven;

  import org.springframework.core.convert.ConversionService;

  public class ConvertersTest {

  @Test

  public void testConvertingToSimpleBlogger() {

  try (var ctx = new AnnotationConfigApplicationContext(AppConfig.class, ConverterCfg.class))
  {

  var springBlogger = ctx.getBean("springBlogger", Blogger.class);

  LOGGER.info("SpringBlogger 信息: {}" , springBlogger);

  var conversionService = ctx.getBean(ConversionService.class);

  var simpleBlogger = conversionService.convert(springBlogger, SimpleBlogger.class);

  LOGGER.info("simpleBlogger 信息: {}" , simpleBlogger);

  }

  }

  }

  // 预期输出

  INFO ConvertersTest - SpringBlogger 信息:

  Blogger[firstName=Iuliana,

  lastName=Cosmina,

  birthDate=1983-08-16,

  personalSite=https://iuliana-cosmina.com]

  INFO ConvertersTest - simpleBlogger 信息:   SimpleBlogger[fullName=Iuliana Cosmina,

  personalSite=https://iuliana-cosmina.com]

  清单 11-11

  转换为 SimpleBlogger

  ```


  你可能已经注意到，`personalSite` 字段从字符串到 `java.net.URL` 的转换是自动完成的。这是因为 Spring 默认注册了一组转换器，用于处理最常见的开发用例（例如，从表示逗号分隔列表的字符串转换为
  `Array`，从 `List` 转换为 `Set` 等）。


  借助 Spring 的类型转换服务，你可以轻松创建自定义转换器，并在应用程序的任何层执行转换。一个可能的用例是，你有两个系统包含相同的博主信息需要更新，但数据库结构不同（例如，系统
  `A` 有两个字段名，而系统 `B` 只有一个字段，等等）。你可以使用类型转换系统在将对象持久化到各个系统之前对其进行转换。


  从 Spring 3.0 开始，Spring MVC 大量使用了转换服务（以及下一节讨论的 Formatter SPI）。在 Web 应用程序上下文配置中，Spring
  3.1 引入的带有 `@EnableWebMvc` 注解的 Java 配置类会自动注册所有默认转换器（例如，`StringToArrayConverter`、`StringToBooleanConverter`
  和 `StringToLocaleConverter`，它们都位于 `org.springframework.core.convert.support` 包下）和格式化器（例如，`CurrencyStyleFormatter`、`DateFormatter`
  和 `AbstractNumberFormatter`，它们都位于 `org.springframework.format` 包下的各个子包中）。更多细节将在**第**
  **14** **章**中讨论 Spring Web 应用程序开发时介绍。




  ## Spring 中的字段格式化


  除了类型转换系统之外，Spring 为开发者带来的另一个强大特性是 Formatter SPI。正如你所料，这个 SPI 可以帮助配置字段格式化方面的内容。在
  Formatter SPI 中，实现格式化器的主要接口是 `org.springframework.format.Formatter<T>` 接口。Spring
  提供了一些常用类型的实现，包括 `CurrencyStyleFormatter`、`DateFormatter`、`AbstractNumberFormatter`
  和 `PercentStyleFormatter`。


  实现自定义格式化器就像实现自定义转换器一样简单。我们将使用相同的 `Blogger` 记录，但不再使用转换器，而是实现一个自定义格式化器，用于将 `birthDate`
  属性的 `LocalDate` 类型与 `String` 类型进行相互转换。这需要继承 Spring 的 `org.springframework.format.support.FormattingConversionServiceFactoryBean`
  类，并提供我们自定义的格式化器。`FormattingConversionServiceFactoryBean` 类是一个工厂类，它提供了对底层 `FormattingConversionService`
  类的便捷访问，该类既支持类型转换系统，也支持根据为每个字段类型定义的格式化规则进行字段格式化。


  在清单 11-12 中，你可以看到一个自定义类，它继承了 `FormattingConversionServiceFactoryBean` 类，并定义了一个用于格式化
  Java `LocalDate` 类型的自定义格式化器。请注意，该格式化器可以通过日期模式进行配置。


  ```

  package com.apress.prospring6.eleven.formatter.factory;

  import org.springframework.format.Formatter;

  import org.springframework.format.support.FormattingConversionServiceFactoryBean;

  // 其他导入语句已省略

  @Service("conversionService")

  public class ApplicationConversionServiceFactoryBean extends FormattingConversionServiceFactoryBean
  {

  private static final Logger LOGGER = LoggerFactory.getLogger(ApplicationConversionServiceFactoryBean.class);

  private static final String DEFAULT_DATE_PATTERN = "yyyy-MM-dd";

  private DateTimeFormatter dateTimeFormatter;

  private String datePattern = DEFAULT_DATE_PATTERN;

  private final Set> formatters = new HashSet();

  public String getDatePattern() {

  return datePattern;

  }

  @Autowired(required = false)

  public void setDatePattern(String datePattern) {

  this.datePattern = datePattern;

  }

  @PostConstruct

  public void init() {

  dateTimeFormatter = DateTimeFormatter.ofPattern(datePattern);

  formatters.add(getDateTimeFormatter());

  setFormatters(formatters);

  }

  public Formatter getDateTimeFormatter() {

  return new Formatter() {

  @Override

  public LocalDate parse(String source, Locale locale)

  throws ParseException {

  LOGGER.info("解析日期字符串: " + source);

  return LocalDate.parse(source, dateTimeFormatter);

  }

  @Override

  public String print(LocalDate source, Locale locale) {

  LOGGER.info("格式化日期时间: " + source);

  return source.format(dateTimeFormatter);

  }

  };

  }

  }

  清单 11-12

  ApplicationConversionServiceFactoryBean 实现

  ```


  在清单 11-12 中，自定义格式化器的实现以粗体显示。它实现了 `Formatter<LocalDate>` 接口，并实现了该接口定义的两个方法。`parse(..)`
  方法将 `String` 格式解析为 `LocalDate` 类型（同时传递了区域设置以支持本地化），而 `LOGGER.info(..)` 方法则用于将 `LocalDate`
  实例格式化为 `String`。日期模式可以注入到 Bean 中（否则将使用默认值 `yyyy-MM-dd`）。此外，在 `init()` 方法中，通过调用 `setFormatters()`
  方法注册了自定义格式化器。你可以根据需要添加任意数量的格式化器。


  由于 `ApplicationConversionServiceFactoryBean` 被配置为一个 Bean，使用它的最简单方法就是使用 `AppConfig`
  类和这个 Bean 创建一个注解上下文。清单 11-13 展示了一个测试方法，该方法创建了这个上下文并打印了两个 `Blogger` Bean。


  ```

