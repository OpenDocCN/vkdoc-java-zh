  清单 6-13  JndiDataSourceCfg 类

  ```


  在此示例中，使用 `JndiTemplate` 类通过 JNDI 查找来获取数据源。这是一个非常有用的辅助类，可以简化 JNDI 操作。它提供了查找和绑定对象的方法，并允许
  `JndiCallback` 接口的实现使用提供的 JNDI 命名上下文执行任何他们想要的操作。


  如你所见，Spring 允许你以几乎任何你喜欢的方式配置 `DataSource`，并且它对应用程序代码的其余部分隐藏了数据源的实际实现或位置。换句话说，你的
  DAO 类不知道也不需要知道 `DataSource` 指向何处。


  连接管理也委托给了 `dataSource` bean，该 bean 要么自行执行管理，要么使用 JEE 容器来完成所有工作。


  ### 嵌入式数据库支持


  从 3.0 版本开始，Spring 还提供了嵌入式数据库支持，它可以自动启动一个嵌入式数据库，并将其作为 `DataSource` 暴露给应用程序。嵌入式数据库支持对于本地开发或单元测试极为有用。在后续涵盖数据访问的章节中，我们将使用嵌入式数据库来运行示例代码，这样你的机器无需安装数据库即可运行示例，但如果你想要真正的开发体验，请考虑设置一个
  Docker 容器。


  清单 6-14 中的配置类展示了在 Spring 应用程序上下文中设置嵌入式 H2 数据库所需的最小配置。


  ```

  package com.apress.prospring6.six.config;

  import org.springframework.jdbc.datasource.embedded.EmbeddedDatabaseBuilder;

  import org.springframework.jdbc.datasource.embedded.EmbeddedDatabaseType;

  // 其他导入语句已省略

  @Configuration

  public class EmbeddedJdbcConfig {

  private static Logger LOGGER = LoggerFactory.getLogger(EmbeddedJdbcConfig.class);

  @Bean

  public DataSource dataSource() {

  try {

  var dbBuilder = new EmbeddedDatabaseBuilder();

  return dbBuilder.setType(EmbeddedDatabaseType.H2)

  .addScripts("classpath:h2/schema.sql",

  "classpath:h2/test-data.sql").build();

  } catch (Exception e) {

  LOGGER.error("无法创建嵌入式 DataSource bean！", e);

  return null;

  }

  }

  }

  清单 6-14  EmbeddedJdbcConfig 类

  ```


  `EmbeddedDatabaseBuilder` 类使用数据库创建和加载数据脚本作为参数，来创建实现 `DataSource` 的 `EmbeddedDatabase`
  实例。


  ![](img/315511_6_En_6_Fige_HTML.jpg)一个警告符号，在圆形背景上显示感叹号。 请注意，脚本的顺序很重要，包含数据定义语言（DDL）的文件应始终放在前面，随后是包含数据操作语言（DML）的文件。对于
  `type` 属性，我们指定要使用的嵌入式数据库类型。从 4.0 版本开始，Spring 支持 HSQL（默认）、H2 和 DERBY。




  ### 在 DAO 类中使用 DataSource


  数据访问对象（DAO）模式用于将底层数据访问 API 或操作与高层业务服务分离开来。数据访问对象模式需要以下组件：


  *   *DAO 接口*：定义要对一个（或多个）模型对象执行的标准操作。


  *   *DAO 实现*：该类为 DAO 接口提供具体实现。通常，它使用 JDBC 连接或数据源来处理模型对象。


  *   *模型对象*（也称为**数据对象**或**实体**）：这是一个简单的 POJO，映射到数据库表的一条记录。


  让我们创建一个 `SingerDao` 接口用于示例实现，如清单 6-15 所示。


  ```

  public interface SingerDao {

  String findNameById(Long id);

  }

  清单 6-15

  SingerDao 接口

  ```


  对于名为 `JdbcSingerDao` 的简单实现类，我们首先会添加一个 `dataSource` 属性。我们想要将 `dataSource` 属性添加到实现类而不是接口中的原因应该相当明显：接口不需要知道数据将如何被检索和更新。通过将
  `DataSource` 的修改方法添加到接口中，最好的情况是这会强制实现类声明 getter 和 setter 的存根。显然，这不是一个很好的设计实践。请查看清单
  6-16 中展示的简单 `JdbcSingerDao` 类。


  ```

  package com.apress.prospring6.six.plain;

  class JdbcSingerDao implements SingerDao, InitializingBean {

  private static Logger LOGGER = LoggerFactory.getLogger(JdbcSingerDao.class);

  private DataSource dataSource;

  public void setDataSource(DataSource dataSource) {

  this.dataSource = dataSource;

  }

  @Override

  public void afterPropertiesSet() throws Exception {

  if (dataSource == null) {

  throw new BeanCreationException("Must set dataSource on SingerDao");

  }

  }

  @Override

  public String findNameById(Long id) {

  var result = "";

  try (var connection = dataSource.getConnection();

  var statement = connection.prepareStatement("select first_name, last_name from SINGER
  where id=" + id);

  var resultSet = statement.executeQuery()) {

  while (resultSet.next()) {

  return resultSet.getString("first_name") + " " + resultSet.getString("last_name");

  }

  } catch (SQLException ex) {

  LOGGER.error("Problem when executing SELECT!",ex);

  }

  return result;

  }

  }

  清单 6-16

  JdbcSingerDao 类

  ```


  现在，我们可以指示 Spring 使用 `JdbcSingerDao` 实现来配置我们的 `singerDao` bean，并设置 `dataSource` 属性，如
  `SpringDatasourceCfg` 配置类所示，该类在清单 6-17 中展示。（注意，我们导入了上一节介绍的 `BasicDataSourceCfg`
  类，以避免代码重复。）


