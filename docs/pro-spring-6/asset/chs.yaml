  ### 创建注解匹配切入点


  如果你的应用程序是基于注解的，你可能希望使用自己指定的注解来定义切入点——即，将通知逻辑应用于所有带有特定注解的方法或类型。Spring 提供了 `AnnotationMatchingPointcut`
  类，用于使用注解定义切入点。我们再次复用之前的示例，看看在使用注解作为切入点时如何操作。


  首先，我们定义一个名为 `AdviceRequired` 的注解，它将用于声明切入点。清单 5-23 展示了该注解类以及修改后的 `AnnotatedGuitarist`
  类，该类中的 `sing(Guitar)` 方法使用了该注解。


  ```

  package com.apress.prospring6.five.common;

  import java.lang.annotation.ElementType;

  import java.lang.annotation.Retention;

  import java.lang.annotation.RetentionPolicy;

  import java.lang.annotation.Target;

  @Retention(RetentionPolicy.RUNTIME)

  @Target({ElementType.TYPE, ElementType.METHOD})

  public @interface AdviceRequired { }

  // AnnotatedGuitarist 类

  class AnnotatedGuitarist implements Singer {

  private static Logger LOGGER = LoggerFactory.getLogger(AnnotatedGuitarist.class);

  @Override

  public void sing() {}

  @AdviceRequired

  public void sing(Guitar guitar) {

  LOGGER.info("play: " + guitar.play());

  }

  }

