  这里发生了两件事：


  *   对于每位歌手，都会额外执行一次查询来获取奖项（N+1 复杂度问题）。


  *   之所以能这样，是因为默认情况下，当有数据请求时，Spring Boot 会配置一个保持打开的 Hibernate 会话。这使得延迟关联可以被加载，从而提高了开发人员的生产力，因为它保持了简单性。无需使用带有连接语句的特殊查询。提供此行为的
  Bean 是 `OpenSessionInViewInterceptor`。^((159))


  *每次请求一个会话*的事务模式的问题在于，它在生产环境中可能变得低效。可以通过在 Spring Boot 配置中添加以下属性来禁用此行为：`spring.jpa.open-in-view=false`。然而，当
  GraphQL 嵌套查询尝试获取延迟关系时，这并不能很好地与之配合。


  如何解决这个问题？我们需要修改 GraphQL 处理器方法，并使用 Spring JPA Specification API 方法仅在需要时提取关系数据。这显然意味着我们需要分析客户端发送的查询。实现方法不止一种，但最简单的是在
  `QueryResolver` 实现中使用 `graphql.schema.DataFetchingEnvironment` 参数。在带有 `@QueryMapping`
  注解的方法中，Spring Boot 会自动注入此参数的值，并根据请求的关系构建不同的查询。如果你还记得，我们确实有两个关系：“awards”和“instruments”。清单
  16-20 展示了改进后的 `singers(..)` 处理器方法。


  ```

  package com.apress.prospring6.sixteen.boot.controllers;

  import org.springframework.graphql.data.method.annotation.QueryMapping;

  import org.springframework.stereotype.Controller;

  import graphql.schema.DataFetchingEnvironment;

  import graphql.schema.DataFetchingFieldSelectionSet;

  import jakarta.persistence.criteria.Fetch;

  import jakarta.persistence.criteria.Join;

  import jakarta.persistence.criteria.JoinType;

  import org.springframework.data.jpa.domain.Specification;

  // 其他导入语句已省略

  @Controller

  public class SingerController {

  @QueryMapping

  public Iterable singers(DataFetchingEnvironment environment) {

  DataFetchingFieldSelectionSet s = environment.getSelectionSet();

  if (s.contains("awards") && !s.contains("instruments"))

  return singerRepo.findAll(fetchAwards());

  else if (s.contains("awards") && s.contains("instruments"))

  return singerRepo.findAll(fetchAwards().and(fetchInstruments()));

  else if (!s.contains("awards") && s.contains("instruments"))

  return singerRepo.findAll(fetchInstruments());

  else

  return singerRepo.findAll();

  }

  private Specification fetchAwards() {

  return (root, query, builder) -> {

  Fetch f = root.fetch("awards", JoinType.LEFT);

  Join join = (Join) f;

  return join.getOn();

  };

  }

  private Specification fetchInstruments() {

  return (root, query, builder) -> {

  Fetch f = root.fetch("instruments", JoinType.LEFT);

  Join join = (Join) f;

  return join.getOn();

  };

  }

  // 其他方法已省略

  }

