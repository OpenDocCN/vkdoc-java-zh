  \ `findAllWithAlbums()` 方法之前，Spring 的 `AbstractPlatformTransactionManager`（`JpaTransactionManager`\
  \ 的父类）是如何创建一个新事务的。其名称等于完全限定的类名与方法名的拼接。事务名称旁边是事务属性：`PROPAGATION_REQUIRED,ISOLATION_DEFAULT,readOnly`。该事务由\
