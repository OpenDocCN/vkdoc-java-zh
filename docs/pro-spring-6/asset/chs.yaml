  \ 测试方法时控制台输出的片段\n```\n\n现在让我们看看 `findById()` 方法，它演示了如何在 JPA 中使用带有命名参数的命名查询。关联关系也会被一并获取。清单\
  \ 8-13 展示了其实现。\n\n```\npackage com.apress.prospring6.eight.service;\nimport jakarta.persistence.NoResultException;\n\
  // 所有 import 语句已省略\n/*\n来自 Singer.java 的注解，用于展示 JQL 查询\n@NamedQuery(name=Singer.FIND_SINGER_BY_ID,\n\
  query=\"\"\"\nselect distinct s from Singer s\nleft join fetch s.albums a\nleft\
  \ join fetch s.instruments i\nwhere s.id = :id\n\"\"\")\n*/\n@Service(\"jpaSingerService\"\
  )\n@Repository\n@Transactional\npublic class SingerServiceImpl  implements SingerService\
  \ {\n@Transactional(readOnly=true)\n@Override\npublic Optional findById(Long id)\
  \ {\nTypedQuery query = em.createNamedQuery(Singer.FIND_SINGER_BY_ID, Singer.class);\n\
  query.setParameter(\"id\", id);\ntry {\nreturn Optional.of(query.getSingleResult());\n\
  } catch (NoResultException nre) {\nreturn Optional.empty();\n}\n}\n// 其他方法和设置已省略\n\
  }\n清单 8-13\nfindById() 方法\n```\n\n调用 `EntityManager.createNamedQuery(java.lang.String\
  \ name, java.lang.Class<T> resultClass)` 来获取 `TypedQuery<T>` 接口的实例，该接口确保查询结果必须是\
  \ `Singer` 类型。然后使用 `TypedQuery<T>.setParameter()` 方法设置查询中命名参数的值，并调用 `getSingleResult()`\
  \ 方法，因为结果应仅包含一个具有指定 ID 的 `Singer` 对象。测试它非常简单，与**第** **7** **章**中类似方法的做法相同，因此此处不再赘述。\n\
  \n### 使用非类型化结果进行查询\n\n在许多情况下，您希望向数据库提交查询并随意操作结果，而不是将它们存储在映射的实体类中。毕竟，既然可以使用记录（record），为什么还要使用实体类呢？此外，记录可以设计为仅存储列的子集，因此其行为与投影查询相同。\n\
  \n一个典型的例子是基于 Web 的报告，它只列出跨多个表的特定数量的列。例如，假设您有一个网页，显示歌手信息及其最近发行的专辑名称。摘要信息包含歌手的全名及其最近发行的专辑名称。没有专辑的歌手将不会被列出。在这种情况下，我们可以通过查询实现此用例，然后手动操作\
  \ `ResultSet` 对象。\n\n让我们创建一个名为 `SingerSummaryServiceImpl` 的新类，并将方法命名为 `findAllAsRecord()`。清单\
  \ 8-14 展示了该方法的典型实现以及 `SingerSummaryRecord` 记录类。\n\n```\npackage com.apress.prospring6.eight.view;\n\
  public record SingerSummaryRecord(String firstName,\nString lastName,\nString latestAlbum)\
  \ {\n}\n// ------------------------------\npackage com.apress.prospring6.eight.service;\n\
  import com.apress.prospring6.eight.view.SingerSummary;\nimport com.apress.prospring6.eight.view.SingerSummaryRecord;\n\
  // 其他 import 语句\n@Service(\"singerSummaryService\")\n@Repository\n@Transactional(readOnly\
  \ = true)\npublic class SingerSummaryServiceImpl implements  SingerSummaryService\
  \ {\n@PersistenceContext\nprivate EntityManager em;\npublic static final String\
  \ ALL_SINGER_SUMMARY_RECORD_JPQL_QUERY =\"\"\"\nselect s.firstName, s.lastName,\
  \ a.title from Singer s\nleft join s.albums a\nwhere a.releaseDate=(select max(a2.releaseDate)\
  \ from Album a2 where a2.singer.id = s.id)\n\"\"\";\n@SuppressWarnings({\"unchecked\"\
  })\n@Override\npublic Stream findAllAsRecord() {\nreturn em.createQuery(ALL_SINGER_SUMMARY_RECORD_JPQL_QUERY).getResultList().stream().\n\
  map(obj ->  {\nObject[] values = (Object[]) obj;\nreturn new SingerSummaryRecord((String)\
  \ values[0],(String) values[1], (String) values[2]);\n});\n}\n}\n清单 8-14\nSingerSummaryServiceImpl.findAllAsRecord()\
  \ 方法\n```\n\n`SingerSummaryService` 只是一个接口，声明了将由 `SingerSummaryServiceImpl` 实现的方法。\n\
  \n如清单 8-14 所示，我们使用 `EntityManager.createQuery()` 方法创建 `Query`，传入 JPQL 语句，然后获取结果列表。当我们在\
  \ JPQL 中显式指定要选择的列时，JPA 将返回一个迭代器，迭代器中的每个项都是一个对象数组。我们遍历该迭代器，并为每个数组对象创建一个 `SingerSummaryRecord`\
  \ 实例。每个对象数组对应 `ResultSet` 对象中的一条记录。\n\n清单 8-15 展示了测试方法。\n\n```\npackage com.apress.prospring6.eight;\n\
  // import 语句已省略\n// 注解已省略\npublic class SingerServiceTest {\n@Autowired\nSingerSummaryService\
  \ singerSummaryService;\n@Test\n@DisplayName(\"应返回所有歌手及其最近专辑作为记录\")\nvoid testFindAllWithAlbumAsRecords(){\n\
  var singers =\nsingerSummaryService.findAllAsRecord()\n.peek(s -> LOGGER.info(s.toString()))\n\
  .toList();\nassertEquals(2, singers.size());\n}\n// 其他方法和设置已省略\n}\n清单 8-15\n测试 SingerSummaryServiceImpl.findAllAsRecord()\
  \ 方法\n```\n\n执行此测试方法会产生与本章其他方法类似的输出，但结果会使用记录（record）生成的 `toString()` 方法转换为 `String`，如清单\
  \ 8-16 所示。\n\n\n\n```\nDEBUG: SqlStatementLogger - select singer0_.FIRST_NAME as\
  \ col_0_0_,\nsinger0_.LAST_NAME as col_1_0_,\nalbums1_.title as col_2_0_ from SINGER\
  \ singer0_\nleft outer join ALBUM albums1_ on singer0_.ID=albums1_.SINGER_ID\nwhere\n\
  albums1_.RELEASE_DATE=(select max(album2_.RELEASE_DATE) from ALBUM album2_\nwhere\
  \ album2_.SINGER_ID=singer0_.ID)\n...\nINFO : SingerServiceTest - SingerSummaryRecord[firstName=John,\
  \ lastName=Mayer, latestAlbum=The Search For Everything]\nINFO : SingerServiceTest\
  \ - SingerSummaryRecord[firstName=Ben, lastName=Barnes, latestAlbum=11:11]\n清单 8-16\n\
  测试 SingerSummaryServiceImpl.findAllAsRecord() 方法期间打印的输出片段\n```\n\n在 JPA 中，有一种比处理查询返回的\
  \ `ResultSet` 对象数组更优雅的解决方案，下一节将对此进行讨论。\n\n### 使用构造器表达式查询自定义结果类型\n\n在 JPA 中，当查询上一节中那样的自定义结果时，你可以指示\
  \ JPA 直接为每条记录构造一个 POJO。这个 POJO 也被称为*视图*，因为它包含来自多个表的数据。对于上一节的示例，创建了一个名为 `SingerSummaryRecord`\
  \ 的记录。在本例中，使用了一个名为 `SingerSummary` 的 POJO，它与该记录类等效。`SingerSummary` 类拥有每位歌手摘要的属性，并带有一个接受所有属性的构造器方法。使用这个类，我们可以编写一个\
  \ `findAll()` 方法，并在查询中使用构造器表达式来指示 JPA 提供程序将 `ResultSet` 映射到 `SingerSummary` 类。在清单\
  \ 8-17 中，你可以看到这个方法及其执行的查询。\n\n```\npackage com.apress.prospring6.eight.service;\n\
  // 所有导入语句已省略\n@Service(\"singerSummaryService\")\n@Repository\n@Transactional(readOnly\
  \ = true)\npublic class SingerSummaryServiceImpl implements SingerSummaryService\
  \ {\n@PersistenceContext\nprivate EntityManager em;\npublic static final String\
  \ ALL_SINGER_SUMMARY_JPQL_QUERY =\"\"\"\nselect new com.apress.prospring6.eight.view.SingerSummary(\n\
  s.firstName, s.lastName, a.title) from Singer s\nleft join s.albums a\nwhere a.releaseDate=(select\
  \ max(a2.releaseDate) from Album a2 where a2.singer.id = s.id)\n\"\"\";\n@Override\n\
  public Stream findAll() {\nreturn em.createQuery(ALL_SINGER_SUMMARY_JPQL_QUERY,\
  \ SingerSummary.class).getResultList().stream();\n}\n// 其他方法已省略\n}\n清单 8-17\nSingerSummaryServiceImpl.findAll()\
  \ 方法\n```\n\n在 JPQL 查询中，指定了 `new` 关键字，以及将存储结果的 POJO 类的完全限定名，并将选定的属性作为每个 `SingerSummary`\
  \ 类的构造器参数传入。最后，将 `SingerSummary` 类传入 `createQuery()` 方法以指示结果类型。测试此方法与我们对 `findAllAsRecord()`\
  \ 所做的操作并无不同，但返回的结果类型是 `SingerSummary` 而不是 `SingerSummaryRecord`，如清单 8-18 所示。\n\n\
  ```\npackage com.apress.prospring6.eight;\n// 导入语句已省略\n// 注解已省略\npublic class SingerServiceTest\
