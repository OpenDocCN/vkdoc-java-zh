  \ 方法的 AllServiceTest 方法执行日志片段\n```\n\n请注意，没有出现 `Creating new transaction with name[com.apress.prospring6.nine.services.AllServiceImpl.countSingers]`\
  \ 的日志消息，原因是没有创建事务来执行此方法。由于事务传播模式设置为 `PROPAGATION_SUPPORTS`，该方法在现有事务内执行，如果没有现有事务，则以非事务方式执行。\n\
  \n本节介绍了一些在编写事务性应用程序时可能会发现有用的事务配置。对于特殊情况，你可能需要配置超时时间、隔离级别、针对特定异常的回滚（或不回滚）等。\n\n使用注解配置事务行为是实用的，因为事务行为可以定制到方法级别。只需确保不要混淆\
  \ Spring 的 `@Transactional` 和 Jakarta 的 `@Transactional`，因为 Jakarta 版本不支持像 Spring\
  \ 版本那样多的选项。\n\n\n\n### 回滚事务\n\n在数据库技术中，*回滚*是一种将数据库恢复到先前状态的操作。回滚对于数据库完整性至关重要，因为即使在执行错误操作后，它也能恢复数据库的干净副本。\n\
  \n在本节开头，列举`@Transactional`属性时，有四个属性与回滚行为相关：`rollbackFor`、`rollbackForClassName`、`noRollbackFor`和`noRollbackForClassName`。它们的名称与其配置的行为高度相关。对于在同一事务中执行多个数据库操作的方法，回滚非常重要。例如，假设我们有一个`save(..)`方法，它向数据库插入一位歌手，然后检索保存的记录，将其链接到一组正在保存到数据库的专辑。虽然不太现实，但假设其中一张专辑无法保存，我们希望撤销整个过程，即采用全有或全无的方法。\n\
  \n默认情况下，事务会在发生`RuntimeException`和`Error`时回滚，但不会因受检异常（业务异常）而回滚。这意味着，如果我们尝试两次插入同一张专辑，事务会自动回滚，因为抛出的异常是`jakarta.persistence.PersistenceException`类型，它是`RuntimeException`的子类。\n\
  \n然而，如果我们对标题长度引入 50 个字符的限制，当尝试保存标题长度超过 50 个字符的记录时，会抛出一个受检异常，但事务不会自动回滚。必须使用`rollbackFor`属性显式配置回滚。\n\
  \n为了测试这一点，我们引入清单 9-14 中所示的受检异常类。\n\n```\npackage com.apress.prospring6.nine.ex;\n\
  public class TitleTooLongException extends Exception {\npublic TitleTooLongException(String\
  \ message) {\nsuper(message);\n}\npublic TitleTooLongException(String message, Throwable\
  \ cause) {\nsuper(message, cause);\n}\n}\n清单 9-14\nTitleTooLongException 受检异常类\n\
  ```\n\n该异常由`AlbumRepoImpl`中的`save(..)`方法抛出。由于我们知道要保存一组专辑，我们还可以添加一个接受`Set<Album>`参数的`save(..)`方法版本。此方法也可用于实现本章之前未涉及的内容：*批量写入*，即将多个保存请求分组到一个方法调用中。这两个方法如清单\
  \ 9-15 所示。\n\n```\npackage com.apress.prospring6.nine.repos;\nimport com.apress.prospring6.nine.ex.TitleTooLongException;\n\
  // 其他导入语句已省略\n@Repository\npublic class AlbumRepoImpl implements AlbumRepo{\n@PersistenceContext\n\
  private EntityManager em;\n// 在 TransactionCfg.java 的 'jpaProperties' bean 中声明：\n\
  //  'jpaProps.put(Environment.STATEMENT_BATCH_SIZE, 30);'\n@Value(\"#{jpaProperties.get('hibernate.jdbc.batch_size')}\"\
  )\nprivate int batchSize;\n@Override\npublic Set save(Set albums) throws TitleTooLongException\
  \ {\nfinal Set savedAlbums = new HashSet();\nint i = 0;\nfor (Album a : albums)\
  \ {\nsavedAlbums.add(save(a));\ni++;\nif (i % batchSize == 0) {\n// 刷新一批插入并释放内存。\n\
  em.flush();\nem.clear();\n}\n}\nreturn savedAlbums;\n}\n@Override\npublic Album\
  \ save(Album album) throws TitleTooLongException {\nif (50 < album.getTitle().length())\
  \ {\nthrow  new TitleTooLongException(\"标题 \"+ album.getTitle() + \" 过长！\");\n}\n\
  if (album.getId() == null) {\nem.persist(album);\nreturn album;\n} else {\nreturn\
  \ em.merge(album);\n}\n}\n// 其他方法已省略\n}\n清单 9-15\n抛出 TitleTooLongException 受检异常的\
  \ save(..) 方法的两个版本\n```\n\n`save(Set<Album>)`方法与`AllServiceImpl`类中`saveSingerWithAlbums(..)`方法内的`save(Singer)`方法一起被包装在一个事务中，如清单\
  \ 9-16 所示。\n\n```\npackage com.apress.prospring6.nine.services;\nimport com.apress.prospring6.nine.ex.TitleTooLongException;\n\
  import org.springframework.transaction.annotation.Transactional;\n// 其他导入语句已省略\n\
  @Service\n@Transactional\npublic class AllServiceImpl implements AllService {\n\
  // 其他方法和字段已省略\n@Transactional(rollbackFor = TitleTooLongException.class)\n@Override\n\
  public void saveSingerWithAlbums(Singer s, Set albums) throws TitleTooLongException\
  \ {\nvar singer = singerRepo.save(s);\nif (singer != null) {\nalbums.forEach(a ->\
  \ a.setSinger(singer));\nalbumRepo.save(albums);\n}\n}\n}\n清单 9-16\nAllServiceImpl.saveSingerWithAlbums(..)\
  \ 事务方法\n```\n\n由于这是将多个数据库操作分组在一起的方法，因此其对应的事务会回滚，并且如果抛出了`RuntimeException`或通过`@Transactional(rollbackFor\
  \ = TitleTooLongException.class)`配置的`TitleTooLongException`，默认情况下任何部分操作都会被撤销。\n\n\
  为了测试此行为，我们需要两个测试方法。清单 9-17 中的测试方法验证了任何`RuntimeException`方法的默认回滚。在此特定场景中，我们尝试插入*Little\
  \ Girl Blue*专辑，该专辑已存在于数据库中，是通过`add-nina.sql`测试设置脚本插入的。\n\n```\npackage com.apress.prospring6.nine;\n\
  import jakarta.persistence.PersistenceException;\n// 其他导入语句已省略\n@Testcontainers\n\
  @SqlMergeMode(SqlMergeMode.MergeMode.MERGE)\n@Sql({ \"classpath:testcontainers/drop-schema.sql\"\
  , \"classpath:testcontainers/create-schema.sql\" })\n@SpringJUnitConfig(classes\
  \ = {AllServiceTest.TestContainersConfig.class})\npublic class AllServiceTest extends\
  \  TestContainersBase {\n@Test\n@SqlGroup({\n@Sql(scripts = {\"classpath:testcontainers/add-nina.sql\"\
  },\nexecutionPhase = Sql.ExecutionPhase.BEFORE_TEST_METHOD)\n})\n@DisplayName(\"\
  应因 PersistenceException 执行回滚\")\nvoid testRollbackRuntimeUpdate() {\n// (1)\nvar\
  \ singer = service.findByIdWithAlbums(5L).orElse(null);\nassertNotNull(singer);\n\
  // (2)\nsinger.setFirstName(\"Eunice Kathleen\");\nsinger.setLastName(\"Waymon\"\
  );\nvar album = new Album();\nalbum.setTitle(\"Little Girl Blue\");\nalbum.setReleaseDate(LocalDate.of(1959,2,\
  \ 20));\nalbum.setSinger(singer);\n// (3)\nvar albums = Set.of(album);\n// (4)\n\
  assertThrows(PersistenceException.class ,\n() -> service.saveSingerWithAlbums(singer,\
  \ albums),\n\"未抛出 PersistenceException！\");\n// (5)\nvar nina = service.findByIdWithAlbums(5L).orElse(null);\n\
  assertAll( \"nina 未被更新\" ,\n() -> assertNotNull(nina),\n() -> assertNotEquals(\"\
  Eunice Kathleen\", nina.getFirstName()),\n() -> assertNotEquals(\"Waymon\", nina.getLastName())\n\
  );\n}\n// 其他方法和字段已省略\n}\n清单 9-17\n测试因抛出 RuntimeException 导致事务回滚的方法\n```\n\n该测试方法由五个部分组成（如注释所示）：\n\
  \n1.  通过调用`service.findByIdWithAlbums(5L)`从数据库中检索歌手。\n\n2.  更新歌手的`firstName`和`lastName`。\n\
  \n3.  创建一个包含*Little Girl Blue*专辑的集合。\n\n4.  调用`service.saveSingerWithAlbums(singer,\
  \ albums)`，并测试是否抛出了`PersistenceException`。调用此方法会触发执行该方法的事务的回滚，因此更改后的`Singer`实例会恢复到其原始状态。\n\
  \n5.  通过调用`service.findByIdWithAlbums(5L)`从数据库中检索歌手，并测试其名字和姓氏是否保持不变。\n\n\n\n此测试应能通过，因为\
  \ `PersistenceException` 是一个 `RuntimeException`，并且如前所述，事务默认会对任何 `RuntimeException`\
  \ 进行回滚。如果你确实想确认回滚已发生，可以随时检查测试方法执行的日志，查找提及事务回滚的消息。清单 9-18 展示了执行 `testRollbackRuntimeUpdate()`\
  \ 方法时在控制台打印的日志片段，其中提到了事务正在被回滚。\n\n```\nDEBUG: AbstractPlatformTransactionManager\
  \ - Creating new transaction with name\n[com.apress.prospring6.nine.services.AllServiceImpl.saveSingerWithAlbums]:\n\
  PROPAGATION_REQUIRED,ISOLATION_DEFAULT,\n-com.apress.prospring6.nine.ex.TitleTooLongException\n\
  DEBUG: TransactionImpl - begin\n...\nDEBUG: SqlStatementLogger - insert into ALBUM\
  \ (VERSION, RELEASE_DATE, SINGER_ID, title) values (?, ?, ?, ?)\nWARN : Slf4JLogger\
  \ - Error: 1062-23000: Duplicate entry '5-Little Girl Blue' for key 'SINGER_ID'\n\
  DEBUG: SqlExceptionHelper - could not execute statement [n/a]\njava.sql.SQLIntegrityConstraintViolationException:\n\
  (conn=4) Duplicate entry '5-Little Girl Blue' for key 'SINGER_ID'\nDEBUG: JdbcResourceLocalTransactionCoordinatorImpl$TransactionDriverControlImpl\
  \ - JDBC transaction marked for rollback-only (exception provided for stack trace)\n\
  TRACE: TransactionAspectSupport - Completing transaction for\n[com.apress.prospring6.nine.services.AllServiceImpl.saveSingerWithAlbums]\n\
  after exception:\njakarta.persistence.PersistenceException:\norg.hibernate.exception.ConstraintViolationException:\
  \ could not execute statement\nDEBUG: AbstractPlatformTransactionManager - Initiating\
  \ transaction rollback\nDEBUG: JpaTransactionManager - Rolling back JPA transaction\
  \ on EntityManager [SessionImpl(1299829127)]\nDEBUG: TransactionImpl - rolling back\n\
  清单 9-18\n控制台日志方法测试由抛出的 RuntimeException 引起的事务回滚\n```\n\n请注意，事务正在被回滚，原因是 `PersistenceException`，但在为执行此方法而创建的事务描述中也提到了\
  \ `TitleTooLongException`。这当然是我们引入并配置了回滚的受检异常。为了测试事务是否确实被回滚，需要编写另一个不同的测试来引发此异常。清单\
  \ 9-19 中的测试为正在插入的专辑设置了一个过长的标题，从而导致抛出 `TitleTooLongException`。\n\n```\npackage com.apress.prospring6.nine;\n\
  import jakarta.persistence.PersistenceException;\n// 其他导入语句已省略\n@Testcontainers\n\
  @SqlMergeMode(SqlMergeMode.MergeMode.MERGE)\n@Sql({ \"classpath:testcontainers/drop-schema.sql\"\
  , \"classpath:testcontainers/create-schema.sql\" })\n@SpringJUnitConfig(classes\
  \ = {AllServiceTest.TestContainersConfig.class})\npublic class AllServiceTest extends\
  \  TestContainersBase {\n@Test\n@SqlGroup({\n@Sql(scripts = {\"classpath:testcontainers/add-nina.sql\"\
  },\nexecutionPhase = Sql.ExecutionPhase.BEFORE_TEST_METHOD)\n})\n@DisplayName(\"\
  should perform a rollback because TitleTooLongException\")\nvoid testRollbackCheckedUpdate()\
  \ {\nvar singer = service.findByIdWithAlbums(5L).orElse(null);\nassertNotNull(singer);\n\
  singer.setFirstName(\"Eunice Kathleen\");\nsinger.setLastName(\"Waymon\");\nvar\
  \ album = new Album();\nalbum.setTitle(\"\"\"\nSit there and count your fingers\n\
  What can you do?\nOld girl you're through\nSit there, count your little fingers\n\
  Unhappy little girl blue\n\"\"\");\nalbum.setReleaseDate(LocalDate.of(1959,2, 20));\n\
  album.setSinger(singer);\nvar albums = Set.of(album);\nassertThrows(TitleTooLongException.class\
  \ ,\n() -> service.saveSingerWithAlbums(singer, albums),\n\"TitleTooLongException\
  \ not thrown!\");\nvar nina = service.findByIdWithAlbums(5L).orElse(null);\nassertAll(\
  \ \"nina was not updated\" ,\n() -> assertNotNull(nina),\n() -> assertNotEquals(\"\
  Eunice Kathleen\", nina.getFirstName()),\n() -> assertNotEquals(\"Waymon\", nina.getLastName())\n\
  );\n}\n// 其他方法和字段已省略\n}\n清单 9-19\n方法测试由抛出的 TitleTooLongException（受检异常）引起的事务回滚\n\
  ```\n\n当执行此测试方法时，控制台日志会显示与清单 9-18 中类似的提及回滚的消息。\n\n`rollbackFor` 属性可以配置多个值，触发回滚的异常必须是所配置类型或其子类。如果需要将回滚限制为确切的异常类型，可以使用\
  \ `rollbackForClassName` 属性，并将其配置为一个包含完整受检异常类名的数组。\n\n`noRollbackFor` 属性与 `rollbackFor`\
  \ 作用类似，但不同的是，它不是配置触发回滚的异常类型，而是用于配置不应触发回滚的受检异常类型。`noRollbackForClassName` 属性可以配置为一个包含完整受检异常类名的数组，这些异常不会触发回滚。\n\
  \n![](img/315511_6_En_9_Fige_HTML.jpg)警告符号在圆形背景上显示一个感叹号。 建议在配置中使用 `rollbackFor`\
  \ 和 `noRollbackFor`，而不是 `rollbackForClassName` 和 `noRollbackForClassName`。这样做可以使配置更简洁，上下文更宽松，因为它们能够以类型安全的方式匹配异常类型及其子类。\n\
  \n\n\n### 使用编程式事务\n\n第二种选择是以编程方式控制事务行为。在这种情况下，我们有两种选择。第一种是将 `PlatformTransactionManager`\
  \ 的实例注入到 Bean 中，并直接与事务管理器交互。另一种选择是使用 Spring 提供的 `TransactionTemplate` 类，它能大大简化你的工作。在本节中，我们将演示如何使用\
  \ `TransactionTemplate` 类。为简单起见，本节将实现一个新版本的 `countSingers()` 方法，该方法的事务行为通过 `TransactionTemplate`\
  \ Bean 提供。清单 9-20 展示了 `ProgrammaticTransactionCfg` 类，这是一个专门为演示编程式事务使用而引入的配置类。\n\n\
  ```\npackage com.apress.prospring6.nine.config;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.transaction.TransactionDefinition;\nimport org.springframework.transaction.support.TransactionTemplate;\n\
  @Import(BasicDataSourceCfg.class)\n@Configuration\n@ComponentScan(basePackages =\
  \ {\"com.apress.prospring6.nine.repos\", \"com.apress.prospring6.nine.programmatic\"\
  })\npublic class ProgrammaticTransactionCfg {\n@Bean\npublic TransactionTemplate\
  \ transactionTemplate() {\nTransactionTemplate tt = new TransactionTemplate();\n\
  tt.setPropagationBehavior(TransactionDefinition.PROPAGATION_REQUIRES_NEW);\ntt.setTimeout(30);\n\
  tt.setTransactionManager(transactionManager());\nreturn tt;\n}\n@Bean\npublic PlatformTransactionManager\
  \ transactionManager() {\nJpaTransactionManager transactionManager = new JpaTransactionManager();\n\
  transactionManager.setEntityManagerFactory(entityManagerFactory().getObject());\n\
  return transactionManager;\n}\n// 该类的其余部分与 TransactionCfg.java 相同\n}\n清单 9-20\n\
  ProgrammaticTransactionCfg 配置类\n```\n\n定义了一个 `TransactionTemplate` Bean，它使用 `org.springframework.transaction.support.TransactionTemplate`\
  \ 类，并附带了一些事务属性。传播模式被配置为 `PROPAGATION_REQUIRES_NEW`，以便于在日志中识别与事务相关的消息。\n\n`TransactionTemplate`\
  \ 模板采用了与其他 Spring 模板（如**第** **6** 章介绍的 `JdbcTemplate`）相同的方法。此外，由于事务管理现在是显式执行的，因此不再需要\
  \ `@EnableTransactionManagement` 注解。使用此配置后，`countSingers()` 方法的实现将变为清单 9-21 所示。\n\
  \n```\npackage com.apress.prospring6.nine.programmatic;\nimport com.apress.prospring6.nine.repos.SingerRepo;\n\
  import org.springframework.stereotype.Service;\nimport org.springframework.transaction.support.TransactionTemplate;\n\
  @Service\npublic class ProgramaticServiceImpl  implements ProgramaticService {\n\
  private final SingerRepo singerRepo;\nprivate final TransactionTemplate transactionTemplate;\n\
  public ProgramaticServiceImpl(SingerRepo singerRepo, TransactionTemplate transactionTemplate)\
  \ {\nthis.singerRepo = singerRepo;\nthis.transactionTemplate = transactionTemplate;\n\
  }\n@Override\npublic Long countSingers() {\nreturn transactionTemplate.execute(transactionStatus\
  \ -> singerRepo.countAllSingers());\n}\n}\n清单 9-21\n包含显式事务管理的 countSingers() 方法的\
  \ ProgramaticServiceImpl 类\n```\n\n引入了一个名为 `ProgramaticServiceImpl` 的新类，以将此事务服务与那些使用声明式事务配置的服务区分开来。此类声明的\
  \ Bean 需要由 Spring 注入一个 `SpringRepo` 和一个 `TransactionTemplate` Bean。\n\n`singerRepo.countAllSingers()`\
  \ 方法作为参数传递给 `TransactionTemplate.execute(..)` 方法，并被封装在一个实现 `TransactionCallback<T>`\
  \ 接口的内部类声明中。然后，`doInTransaction()` 是实际调用 `singerRepo.countAllSingers()` 的方法。该逻辑在事务内运行，事务属性由\
  \ `transactionTemplate` Bean 定义。在清单 9-21 中你没有清晰看到所有这些细节的原因，是因为使用了 Java 8 的 lambda\
  \ 表达式。清单 9-22 中的代码是清单 9-21 所示方法的展开版本（因为它是在 lambda 表达式引入之前编写的）。\n\n```\npackage org.springframework.transaction.support.TransactionCallback;\n\
  @Override\npublic Long countSingers() {\nreturn transactionTemplate.execute(new\
  \ TransactionCallback() {\n@Override\npublic Long doInTransaction(TransactionStatus\
  \ status) {\nreturn singerRepo.countAllSingers();\n}\n});\n}\n清单 9-22\ncountSingers()\
  \ 方法的展开版本\n```\n\n测试此方法与到目前为止我们所展示的方法并无不同，但需要指出的是在执行日志中应该关注什么。清单 9-23 展示了测试方法（省略了所有必要的设置）以及执行日志中最有趣的行。\n\
  \n```\n@Test\n@DisplayName(\"should count singers\")\nvoid testCount() {\nvar count\
  \ = service.countSingers();\nassertEquals(3, count );\n}\n//------ 执行日志 ----\nDEBUG:\
  \ AbstractPlatformTransactionManager - Creating new transaction with name [null]:\
  \ PROPAGATION_REQUIRES_NEW,ISOLATION_DEFAULT,timeout_30\nDEBUG: TransactionImpl\
  \ - begin\nDEBUG: SqlStatementLogger - select count(singer0_.ID) as col_0_0_ from\
  \ SINGER singer0_\n...\nDEBUG: AbstractPlatformTransactionManager - Initiating transaction\
  \ commit\nDEBUG: JpaTransactionManager - Committing JPA transaction on EntityManager\
  \ [SessionImpl(981307724)]\nDEBUG: TransactionImpl - committing\nDEBUG: JpaTransactionManager\
  \ - Closing JPA EntityManager [SessionImpl(981307724)] after transaction\n清单 9-23\n\
  countSingers() 测试方法及执行日志片段\n\n```\n\n这里唯一需要观察的是，由于 `transactionTemplate` Bean 不知道在事务中执行的方法的任何细节，因此它无法命名该事务，所以事务名称被设置为\
  \ `null`，但日志中显示的事务属性正是 `ProgrammaticTransactionCfg` 中为 `transactionTemplate` 配置的那些。\n\
  \n在你的开发生涯中，你可能永远不会用到 `TransactionTemplate`（或其响应式对应物 `TransactionalOperator`）来编写代码，仅仅是因为声明式事务要实用得多。但在极少数情况下，如果你确实需要它，现在你知道它的存在以及如何使用它了。\n\
  \n\n\n### 关于事务管理的考量\n\n至此，我们已经讨论了实现事务管理的两种方式，那么你应该选择哪一种呢？在所有情况下都推荐使用声明式方法，并且应尽可能避免在代码中显式实现事务管理。大多数时候，当你发现有必要在应用程序中编写事务控制逻辑时，这往往是由于设计不佳造成的。在这种情况下，你应该考虑将逻辑重构为可管理的模块，并以声明方式在这些模块上定义事务需求。\n\
  \n在 Spring 中，还有另一种配置事务行为的声明式方法，即使用 AOP XML 风格的配置。由于 XML 并非本书的重点，如果你对此感兴趣，可以查阅本书的上一版。对于声明式方法，使用\
  \ XML 和使用注解各有其优缺点。一些开发者不喜欢在代码中声明事务需求，而另一些开发者则偏好使用注解以便于维护，因为你可以在代码中看到所有的事务需求声明。同样，让应用程序的需求驱动你的决策，一旦你的团队或公司标准化了某种方法，就应保持配置风格的一致性。\n\
  \n![](img/315511_6_En_9_Figf_HTML.jpg)一个符号描绘了水平线上的一处火焰标记。 在 `jakarta.transaction`\
  \ 包中也存在一个 `@Transactional` 注解。Spring 也支持此注解，但它提供的配置选项比 Spring 的 `@Transactional`\
  \ 要少。因此，在编写 Spring 应用程序时，请务必检查注解来自哪个包。\n\n## 使用 Spring Boot 进行事务配置\n\n在不引入 Spring\
  \ Data 的情况下，配置一个 Spring Boot 事务应用程序相当简单，因为主要依赖是 `spring-boot-starter-jdbc`，而要添加事务特定的组件，只需将\
  \ `spring-orm` 和 `hibernate-core` 加入其中即可。一个不使用 Spring Data 的 Spring Boot 事务项目的配置如图\
  \ 9-5 所示。\n\n![](img/315511_6_En_9_Fig5_HTML.jpg)\n\n一张截图展示了 chapter 09 boot 的依赖列表。它显示了\
  \ hibernate-core Jakarta、spring boot starter 和 spring o r m 依赖项下的内容。\n\n图 9-5\n\n\
  显示 Spring Boot 项目依赖项的 Gradle 视图\n\n使用 Spring Boot 可以实现一定程度的简化配置，因为可以使用 `application.properties/application.yaml`\
  \ 文件通过多种 Spring 属性来提供配置，而无需声明 Java Bean。例如，请查看清单 9-24 中 `application-dev.yaml` 文件的内容。\n\
  \n```\n# 数据源配置\nspring:\ndatasource:\ndriverClassName: org.mariadb.jdbc.Driver\n\
  url: jdbc:mariadb://localhost:3306/musicdb?useSSL=false\nusername: prospring6\n\
  password: prospring6\nhikari:\nmaximum-pool-size: 25\n# JPA 配置\njpa:\ngenerate-ddl:\
  \ false\nproperties:\nhibernate:\njdbc:\nbatch_size: 10\nfetch_size: 30\nmax_fetch_depth:\
  \ 3\nshow-sql: true\nformat-sql: false\nuse_sql_comments: false\nhbm2ddl:\nauto:\
  \ none\n# 日志配置\nlogging:\npattern:\nconsole: \"%-5level: %class{0} - %msg%n\"\n\
  level:\nroot: INFO\norg.springframework.boot: INFO\ncom.apress.prospring6.nine:\
  \ INFO\n清单 9-24\nchapter09-boot 项目的 application-dev.yaml 内容\n```\n\n该配置分为三个部分：数据源、JPA\
  \ 和日志。以 `spring.datasource` 开头的属性设置了配置数据源所需的值：连接 URL、凭据和连接池值。以 `spring.jpa` 开头的属性设置了描述持久化单元的值。你可以轻松识别出**第**\
  \ **7** 和 **8** **章**中介绍的 Hibernate 属性。以 `logging` 开头的属性设置了日志配置的典型值，在经典应用程序中，这些值通常可以在\
  \ `logback.xml` 文件中找到。\n\n所有这些都意味着，在 Spring Boot 应用程序中，无需配置类来声明 `DataSource` Bean，Spring\
  \ 将根据配置文件中的属性自动配置它。Spring Boot 使用 `spring.jpa` 属性来自动配置持久化层——它会配置一个名为 `jpaVendorAdapter`\
  \ 类型为 `HibernateJpaVendorAdapter` 的 Bean、一个名为 `transactionManager` 类型为 `JpaTransactionManager`\
  \ 的 Bean，以及许多其他 Bean，包括用于 Hibernate 和 JPA 的 `Properties` Bean。Spring Boot 唯一没有配置的是\
  \ `LocalSessionFactoryBean` Bean，因此需要显式配置它。清单 9-25 展示了包含单个 `LocalSessionFactoryBean`\
  \ 类型 Bean 声明的 `TransactionalConfig` 配置。\n\n\n\n```\npackage com.apress.prospring6.nine.boot;\n\
  import org.springframework.boot.context.properties.ConfigurationProperties;\n//\
  \ 其他导入语句已省略\n@Configuration\n@ComponentScan(basePackages = {\n\"com.apress.prospring6.nine.boot.repos\"\
  ,\n\"com.apress.prospring6.nine.boot.services\"})\n@EnableTransactionManagement\n\
  public class TransactionalConfig {\n@Autowired\nDataSource dataSource;\n@Bean\n\
  @ConfigurationProperties(\"spring.jpa.properties\")\npublic Properties jpaProperties()\
  \ {\nreturn new Properties();\n}\n@Bean\npublic LocalSessionFactoryBean sessionFactory()\
  \ {\nLocalSessionFactoryBean sessionFactory = new LocalSessionFactoryBean();\nsessionFactory.setDataSource(dataSource);\n\
  sessionFactory.setPackagesToScan(\"com.apress.prospring6.nine.boot.entities\");\n\
  sessionFactory.setHibernateProperties(jpaProperties());\nreturn sessionFactory;\n\
  }\n}\n清单 9-25\nTransactionalConfig 使用 Spring Boot 自动配置的 Bean 声明 LocalSessionFactoryBean\
  \ 类型的 Bean\n```\n\n由于 `LocalSessionFactoryBean` Bean 需要数据源，并且需要配置 JPA 属性，因此我们需要访问\
  \ Spring Boot 配置文件中的 JPA 属性值。这是通过配置一个 `java.util.Properties` 类型的 Bean，并用 `@ConfigurationProperties(\"\
  spring.jpa.properties\")` 注解它来实现的，目的是将 Spring Boot 配置文件中声明的属性绑定到由该注解方法创建的 `Properties`\
  \ Bean 上。\n\n这就是配置 Spring Boot 事务型应用程序所需的全部内容。可以创建一个 Spring Boot 测试类，并向其中添加回滚测试。然而，当运行测试类时，会发生一些特殊的情况——清单\
  \ 9-17 中的测试方法（即测试抛出 `RuntimeException` 时回滚的那个方法）会失败。在图 9-6 所示的 Gradle 测试页面中，哪个测试失败一目了然。\n\
  \n![](img/315511_6_En_9_Fig6_HTML.jpg)\n\n截图展示了第 9 章的应用程序测试。内容显示：2 个测试，1 个失败，0 个忽略，耗时\
  \ 0.831 秒，成功率 50%。\n\n图 9-6\n显示测试失败的 Gradle 测试页面\n\n如果你查看控制台日志或点击测试名称，将会看到以下消息：\n\
  \n```\norg.opentest4j.AssertionFailedError:\nPersistenceException not thrown!\n\
  ==> 抛出的异常类型不符合预期\n==> 期望: \n但实际是: \n```\n\n那么这里发生了什么？为什么抛出了不同类型的异常？\n\n在**第** **6**\
  \ **章**中，你了解了 Spring 运行时数据访问异常的层次结构。`org.springframework.dao.DataAccessException`\
  \ 类的扩展（`DataIntegrityViolationException` 就是其中之一）匹配特定的数据访问异常，并在访问数据库时提供关于异常真实原因的更多信息。它们封装了\
  \ Spring 以下所有层抛出的异常，因此这就是为什么 SQL 检查型异常 `java.sql.SQLIntegrityConstraintViolationException`\
  \ 会被封装成 `DataIntegrityViolationException` 而不是 `PersistenceException`。这种情况发生在 Spring\
  \ Boot 应用程序中，因为 Spring Boot 自动配置的 Bean 数量远超开发者的预期；在本例中，Spring Boot 通过其 `org.springframework.boot.autoconfigure.dao.PersistenceExceptionTranslationAutoConfiguration`\
  \ 配置类，为持久层自动配置了一个异常转换器。\n\n这意味着需要更新测试，以便 Spring Boot 应用程序考虑到这一点。新的测试如清单 9-26 所示。\n\
  \n```\npackage com.apress.prospring6.nine;\nimport org.springframework.dao.DataIntegrityViolationException;\n\
  // 其他导入语句已省略\n@ActiveProfiles(\"test\")\n@Testcontainers\n@SqlMergeMode(SqlMergeMode.MergeMode.MERGE)\n\
  @Sql({ \"classpath:testcontainers/drop-schema.sql\", \"classpath:testcontainers/create-schema.sql\"\
  \ })\n@SpringBootTest(classes = Chapter9Application.class)\npublic class Chapter9ApplicationTest\
  \ {\nprivate static final Logger LOGGER = LoggerFactory.getLogger(Chapter9ApplicationTest.class);\n\
  @Autowired\nAllService service;\n@Test\n@SqlGroup({\n@Sql(scripts = {\"classpath:testcontainers/add-nina.sql\"\
  },\nexecutionPhase = Sql.ExecutionPhase.BEFORE_TEST_METHOD)\n})\n@DisplayName(\"\
  should perform a rollback because DataIntegrityViolationException\")\nvoid testRollbackRuntimeUpdate()\
  \ {\nvar singer = service.findByIdWithAlbums(5L).orElse(null);\nassertNotNull(singer);\n\
  singer.setFirstName(\"Eunice Kathleen\");\nsinger.setLastName(\"Waymon\");\nvar\
  \ album = new Album();\nalbum.setTitle(\"Little Girl Blue\");\nalbum.setReleaseDate(LocalDate.of(1959,2,\
  \ 20));\nalbum.setSinger(singer);\nvar albums = Set.of(album);\nassertThrows(DataIntegrityViolationException.class\
  \ ,\n() -> service.saveSingerWithAlbums(singer, albums),\n\"PersistenceException\
  \ not thrown!\");\nvar nina = service.findByIdWithAlbums(5L).orElse(null);\nassertAll(\
  \ \"nina was not updated\" ,\n() -> assertNotNull(nina),\n() -> assertNotEquals(\"\
  Eunice Kathleen\", nina.getFirstName()),\n() -> assertNotEquals(\"Waymon\", nina.getLastName())\n\
  );\n}\n}\n清单 9-26\ntestRollbackRuntimeUpdate() 测试方法的 Spring Boot 版本\n```\n\n这个测试方法检查在执行错误更新时是否抛出了\
  \ `DataIntegrityViolationException`，因此该测试会通过。如果你查看控制台中的执行日志，会注意到与本章前面检查 `PersistenceException`\
  \ 的测试所打印的相同消息，都提到了事务回滚。\n\n\n\n### 事务性测试\n\n在**第** **4** **章**中，表 4-5 列出并描述了以下与事务上下文相关的测试注解：\n\
  \n*   `@Rollback`\n\n*   `@Commit`\n\n*   `@BeforeTransaction`\n\n*   `@AfterTransaction`\n\
  \n这四个注解的名称都相当明确地表明了它们的用途。它们在编写事务性测试时非常有用。显然，在测试事务性服务时，无需使用 `@Transactional` 注解测试方法。你可能想这样做来单独测试你的仓库。不过，随着\
  \ Spring Data 的引入，测试仓库并非真的必要，正如你将在**第** **10** **章**中看到的那样。\n\n**测试管理的事务**与**Spring\
  \ 管理的事务**（由 Spring 在应用程序上下文中管理，用于运行带有 `@Transactional` 注解的方法）不同，也与**应用程序管理的事务**（在应用程序中以编程方式管理）不同。\n\
  \n文本上下文基于应用程序上下文，因此 Spring 管理和应用程序管理的事务通常会参与测试管理的事务。运行前面章节中介绍的测试类 `AllServiceTest`\
  \ 和 `ProgramaticServiceTest` 时，可以很容易地看到这一点。如果你在执行日志中查找文本 `Creating new transaction`，你会注意到每个测试方法都会创建事务。这些事务是测试上下文事务，默认情况下会在测试上下文中为测试方法创建。如果某些\
  \ Spring 管理的事务声明的传播模式不是 `REQUIRED` 或 `SUPPORTS`，这可能会导致问题。\n\n使用 `@Transactional`\
  \ 注解测试方法会导致测试在一个事务中运行，该事务默认会在测试完成后自动回滚。使用 `@Transactional` 注解测试类会导致该类层次结构中的每个测试方法都在一个事务中运行。当使用\
  \ `@Transactional` 注解时，也可以为测试方法配置传播模式、回滚原因、隔离级别等。\n\n`@Commit` 注解是 `@Rollback(false)`\
  \ 的别名；它们都可以在类级别和方法级别使用。在类级别使用时，该行为适用于类中的所有测试方法。你可以覆盖类级别的行为，但尽量不要混用它们，因为你的测试行为可能会变得不可预测。\n\
  \n`@BeforeTransaction` 和 `@AfterTransaction` 注解相当于事务性方法的 `@BeforeEach` 和 `@AfterEach`。`@BeforeTransaction`\
  \ 表示，对于配置为通过 Spring 的 `@Transactional` 注解在事务内运行的测试方法，应在事务启动之前执行被注解的方法。`@AfterTransaction`\
  \ 注解的方法，会在使用 Spring 的 `@Transactional` 注解的测试方法的事务结束后执行。从 Spring 4.3 开始，这两个注解也可以用于\
  \ Java 8 接口的默认方法。\n\n目前关于 Spring 事务性应用，我们能说的就是这些。本章提供的信息应该足以帮助你在 Spring 应用中自信地配置和处理事务。\n\
  \n### 关于事务管理的考量\n\n那么，在讨论了实现事务管理的各种方式之后，你应该使用哪一种呢？在所有情况下都推荐使用声明式方法，并且应尽可能避免在代码中实现事务管理。大多数情况下，当你发现有必要在应用程序中编写事务控制逻辑时，这通常是由于设计不佳，在这种情况下，你应该考虑将逻辑重构为可管理的部分，并在这些部分上以声明方式定义事务需求。\n\
  \n对于声明式方法，使用 XML 和使用注解各有优缺点。一些开发者不喜欢在代码中声明事务需求，而另一些开发者则喜欢使用注解以便于维护，因为你可以在代码中看到所有的事务需求声明。同样，让应用程序需求驱动你的决策，一旦你的团队或公司标准化了某种方法，就保持配置风格的一致性。\n\
  \n## 总结\n\n事务管理是确保几乎所有类型应用程序中数据完整性的关键部分。在本章中，我们讨论了如何使用 Spring 来管理事务，且几乎不影响你的源代码。\n\
  \n你了解了如何使用注解来配置声明式事务行为。还展示了如何实现编程式事务行为以及如何测试事务性服务。\n\n本地事务在 JEE 应用服务器内部/外部都受支持，并且只需简单配置即可在\
  \ Spring 中启用本地事务支持。然而，设置全局事务环境涉及更多工作，并且很大程度上取决于你的应用程序需要与哪个 JTA 提供程序以及相应的后端资源进行交互。此外，未来似乎都是运行在无服务器环境中的微服务，全局事务实际上已不再有其存在的意义。\n\
  \n**第** **6** **章**到**第** **9** **章**重点介绍了使用 SQL 数据库，这些数据库适用于结构化数据。如果你计划处理的数据有些杂乱，你可能会对阅读**第**\
  \ **10** **章**感兴趣，该章旨在为你概述 Spring 对 NoSQL 数据库的支持。\n\n脚注 1   2   3   4   5   6  \
  \ 7   8\n\n\n\n"
- "# 10. 使用 SQL 与 NoSQL 数据库的 Spring Data\n\n现在你已经了解了数据访问的多个方面，例如连接数据库、使用 JDBC 执行原生查询、将表映射到实体类以便在\
  \ Java 代码中将数据库记录视为对象、使用 Hibernate 会话和 `EntityManagerFactory` 创建用于数据管理的仓库类，以及在同一个\
  \ Spring 管理的事务中执行多个数据库操作。接下来，我们将向你展示如何避免编写所有这些代码，并让 Spring 使用 Spring Data 为你完成工作。\n\
  \nSpring Data 项目是 Spring Data 总项目下的一个子项目^(⁸⁴)。Spring Data 项目的主要目标是为简化使用各种数据源的应用程序开发提供额外功能。Spring\
  \ Data 项目包含多个子项目，用于与 SQL 和 NoSQL 数据库交互，既有经典版本也有响应式版本。它提供了强大的仓库和自定义对象映射抽象、基于配置的仓库查询生成、对透明审计的支持、扩展仓库代码的可能性，以及与\
  \ Spring MVC 控制器的轻松集成。\n\nSpring Data 提供了大量旨在简化数据访问的功能，本章将重点介绍几个方面，而不会深入探讨细节，因为那会使本书的篇幅增加一倍。\n\
  \n在本章中，我们将讨论以下内容：\n\n*   *介绍 Spring Data Java 持久化 API (JPA)*：我们将讨论 Spring Data JPA\
  \ 项目，并演示它如何帮助简化数据访问逻辑的开发。由于 JPA 适用于 SQL 数据库，代码示例中将使用 MariaDB。\n\n*   *跟踪实体变更和审计*：在数据库更新操作中，跟踪实体的创建日期或最后更新日期以及谁进行了更改是一个常见需求。此外，对于客户等关键信息，通常需要一个存储每个版本实体的历史表。我们将讨论\
  \ Spring Data JPA 和 Hibernate Envers（Hibernate 实体版本控制系统）如何帮助简化此类逻辑的开发。\n\n*   *用于\
  \ NoSQL 数据库的 Spring Data*：我们将讨论什么是 NoSQL 数据库，为什么它们如此有趣，它们擅长什么，以及如何使用 Spring Data\
  \ 从 Spring 应用程序中更轻松地访问它们的数据。对于代码示例，我们选择了 MongoDB。\n\n*   *使用 Spring Boot 进行 Spring\
  \ Data 配置*：Spring Data 在经典的 Spring 应用程序中简化了操作，但在 Spring Boot 应用程序中配置变得更加简单，因为有一个特殊的启动器库，其中包含大量自动配置选项。\n\
  \n除了介绍所有这些酷炫的技术之外，你还将学习如何使用 Testcontainers 作为数据库访问提供程序来测试你的仓库和服务。\n\n## 介绍 Spring\
  \ Data JPA\n\nSpring Data JPA 简化了需要访问 JPA 数据源的应用程序的开发；这显然意味着使用 Hibernate 和 Jakarta\
  \ Persistence API 组件进行数据操作的应用程序。使用 Spring Data JPA 的起点是将 `spring-data-jpa` 作为依赖项添加到项目中。无论是\
  \ Maven 还是 Gradle，将此依赖项添加到项目中都会导致所有必需的 Spring 依赖项被添加到应用程序类路径中。剩下的唯一事情就是将 Hibernate\
  \ Core Jakarta 添加到配置中，并在需要不同（更新）版本时覆盖 `jakarta.annotation-api`。在图 10-1 中，你可以看到 `chapter10`\
  \ 项目的依赖项列表，这是一个使用 Spring Data JPA 的经典 Spring 项目，如 IntelliJ IDEA 中的 Gradle 视图所示。\n\
  \n![](img/315511_6_En_10_Fig1_HTML.jpg)\n\n一张截图展示了第 10 章项目的依赖项列表。它展开第 10 章并打开经典\
  \ Spring 项目。\n\n图 10-1\n\n显示 `chapter10` 项目依赖项的 Gradle 视图\n\n### 使用 Spring Data\
  \ JPA 仓库抽象进行数据库操作\n\n在之前的数据访问章节中，仓库类（用于与数据库交互的类）是由开发人员显式创建的，并围绕 Hibernate 组件（`Session`、`EntityManager`）或\
  \ Spring（`JdbcTemplate`）构建。它们必须被显式配置为 Bean 并在需要的地方注入。添加事务行为也是如此；如果仓库需要支持事务，开发人员必须显式地在与数据库通信的方法上添加\
  \ `@Transactional` 注解。\n\nSpring Data 及其所有子项目的主要概念之一是 *Repository* 抽象，它属于 Spring\
  \ Data Commons^(⁸⁵) 项目，这是依赖项之一。在 Spring Data JPA 中，仓库抽象封装了底层的 JPA `EntityManager`，并为基于\
  \ JPA 的数据访问提供了一个更简单的接口。这意味着你不必使用 `EntityManager` 编写代码来访问数据，除非你确实有一些 Spring Data\
  \ 无法根据你的配置为你生成的自定义查询。\n\nSpring Data 中的核心接口是 `org.springframework.data.repository.Repository<T,ID>`\
  \ 接口，它是一个标记接口（注意不要将其与 `@Repository` 原型注解混淆）。Spring Data 提供了 `Repository<T, ID>`\
  \ 接口的各种扩展；其中之一是 `org.springframework.data.repository.CrudRepository<T, ID>` 接口（它也属于\
  \ Spring Data Commons 项目），我们将在本节中讨论。直接扩展 `Repository<T, ID>` 或通过扩展其子接口之一的接口被称为*领域仓库*，因为它们用具体的领域对象类型替换了泛型\
  \ `T`。这些接口公开了用于管理领域对象的 CRUD 方法。\n\n在解释 `CrudRepository<T, ID>` 接口及其重要性之前，请先查看图 10-2，它显示了\
  \ Spring `Repository<T, ID>` 接口的层次结构。\n\n![](img/315511_6_En_10_Fig2_HTML.jpg)\n\
  \n一个层次结构图解释了 Spring Data 仓库接口。它从一个简单的 JPA 仓库开始，逐步发展到修订仓库、响应式仓库和响应式 CRUD 仓库。\n\n\
  图 10-2\n\nSpring Data `Repository` 接口层次结构\n\n此时你可能会挠头并问：*嘿，这些大多是接口，它们怎么能完成你之前提到的所有事情呢？*\
  \ 嗯，我们在这个项目中使用的是 Java 17，所以从技术上讲，默认方法可能是一个答案，但并非如此。我们正在使用 Spring，所以最简单的答案是*代理*。当你开始编写自己的仓库时，一切都会变得清晰，但在此之前，让我们回到\
  \ `CrudRepository<T, ID>` 接口。\n\n`CrudRepository<T, ID>` 接口^(⁸⁶) 在处理数据时提供了许多常用方法。清单\
  \ 10-1 显示了一个表示该接口声明的代码片段，该片段摘自 Spring Data Commons 项目源代码。\n\n```\npackage org.springframework.data.repository;\n\
  import java.util.Optional;\n@NoRepositoryBean\npublic interface CrudRepository extends\
  \ Repository {\nS save(S entity);\nIterable saveAll(Iterable entities);\nOptional\
  \ findById(ID id);\nboolean existsById(ID id);\nIterable findAll();\nIterable findAllById(Iterable\
  \ ids);\nlong count();\nvoid deleteById(ID id);\nvoid delete(T entity);\nvoid deleteAllById(Iterable\
  \ ids);\nvoid deleteAll(Iterable entities);\nvoid deleteAll();\n}\n清单 10-1\nCrudRepository\
  \ 源代码\n```\n\n\n\n查看这个接口，你可能会认出我们之前添加到仓库接口中并在仓库类中实现的方法签名。`CrudRepository<T, ID>`\
  \ 接口声明了一整套你期望仓库类为数据访问提供的方法。这些方法名称不言自明，而且——别担心——你无需为它们提供实现！为了让你安心，我们来看一个例子。\n\n![](img/315511_6_En_10_Figa_HTML.jpg)一个感叹号图标。 本章使用的实体类与**第**\
  \ **6****章至第** **9****章**中使用的实体类相同。如果需要回顾，请查阅之前的任何章节或查看之前章节的代码。如果你已经阅读了其他章节，那么像\
  \ `Singer` 和 `Album` 这样的实体类现在应该已经很熟悉了。\n\n代码清单 10-2 展示了一个名为 `SingerRepository` 的经典仓库接口，它只声明了几个查找方法。\n\
  \n```\npackage com.apress.prospring6.ten;\nimport com.apress.prospring6.ten.entities.Singer;\n\
  import java.util.List;\npublic interface SingerRepository {\nList findAll();\nList\
  \ findByFirstName(String firstName);\nList findByFirstNameAndLastName(String firstName,\
  \ String lastName);\n}\n代码清单 10-2\n经典的 SingerRepository 接口\n```\n\n现在可以修改这个接口，通过扩展\
  \ `CrudRepository<T, ID>` 将其转换为 Spring Data 领域仓库接口，如代码清单 10-3 所示。\n\n```\npackage\
  \ com.apress.prospring5.ten;\n// 其他导入语句已省略\nimport org.springframework.data.repository.CrudRepository;\n\
  public interface SingerRepository extends CrudRepository {\nIterable findByFirstName(String\
  \ firstName);\nIterable findByFirstNameAndLastName(String firstName, String lastName);\n\
  }\n代码清单 10-3\nSpring Data 领域仓库 SingerRepository 接口\n```\n\n请注意，我们只需要在这个接口中声明两个方法，因为\
  \ `findAll()` 方法已经由 `CrudRepository<T, ID>` 接口提供了。`SingerRepository` 接口扩展了 `CrudRepository<T,\
  \ ID>` 接口，传入了实体类（`Singer`）和 `ID` 类型（`Long`）。Spring Data 的仓库抽象的一个奇妙之处在于，当你使用常见的命名约定\
  \ `findBy{fieldName}`（例如 `findByFirstName` 和 `findByFirstNameAndLastName`）时，你不需要为\
  \ Spring Data JPA 提供命名查询。相反，在运行时，Spring Data JPA 会根据方法名和替换了泛型类型的实体类来“推断”并为你构建查询。例如，对于\
  \ `findByFirstName()` 方法，Spring Data JPA 会自动为你准备查询 `select s from Singer s where\
  \ s.firstName = :firstName`，并根据参数设置命名参数 `firstName`。\n\n现在我们已经声明了接口，必须创建配置来告诉 Spring\
  \ Data 在哪里找到这个接口。这可以通过在配置类上添加 `@EnableJpaRepositories` 注解来实现，如代码清单 10-4 所示。\n\n\
  ```\npackage com.apress.prospring6.ten.config;\n// 其他导入语句已省略\nimport org.springframework.transaction.annotation.EnableTransactionManagement;\n\
  import org.springframework.data.jpa.repository.config.EnableJpaRepositories;\n@Import(BasicDataSourceCfg.class)\n\
  @Configuration\n@EnableTransactionManagement\n@ComponentScan(basePackages = {\"\
  com.apress.prospring6.ten\"})\n@EnableJpaRepositories(\"com.apress.prospring6.ten.repos\"\
  )\npublic class DataJpaCfg {\n@Bean\npublic PlatformTransactionManager transactionManager()\
  \ {\n// 代码已省略\nreturn transactionManager;\n}\n@Bean\npublic LocalContainerEntityManagerFactoryBean\
  \ entityManagerFactory() {\n// 代码已省略\nfactory.setPackagesToScan(\"com.apress.prospring6.ten.entities\"\
  );\nreturn factory;\n}\n// 其余配置已省略\n}\n代码清单 10-4\nSpring Data JPA 配置\n```\n\n这个类和\
  \ `BasicDataSourceCfg` 类的完整配置在之前的数据访问章节（从**第** **6****章**到现在）中已经反复介绍过，实际上，告诉 Spring\
  \ 仓库接口位置的唯一要求就是 `@EnableJpaRepositories(\"com.apress.prospring6.ten.repos\")`。`@EnableJpaRepositories`\
  \ 注解非常强大，允许你通过声明与 `@ComponentScan` 提供的配置属性非常相似的属性，以多种方式指定多个位置。顺便说一下，默认属性是 `basePackages`。除此之外，`namedQueriesLocation`\
  \ 属性用于指定包含命名查询的属性文件的位置，`entityManagerFactoryRef` 属性用于指定用于创建查询的 `EntityManager` bean\
  \ 的名称，`transactionManagerRef` 属性用于指定用于创建仓库实例的 `TransactionManager` bean 的名称，以及许多其他有用的属性（请随意查看官方文档）。\n\
  \n那么，这是如何工作的呢？回顾**第** **5****章**，有两种类型的代理：JDK 代理，它实现与目标对象相同的接口；以及基于类的代理，它扩展目标对象类。Spring\
  \ Data JPA 要求仓库被声明为扩展 `Repository<T, ID>` 或其子接口之一的接口。通过添加 `@EnableJpaRepositories(\"\
  com.apress.prospring6.ten.repos\")` 配置，我们告诉 Spring 在这个包中查找这些类型的接口。对于每个接口，Spring\
  \ Data 基础设施组件会注册特定于持久化技术的 `FactoryBean`，以创建处理查询方法调用的适当代理。\n\n现在我们已经有了一个 Spring Data\
  \ 领域仓库接口和一个告诉 Spring 其位置的配置，下一步是创建一个事务性服务来使用我们的仓库。代码清单 10-5 中显示的 `SingerServiceImpl`\
  \ 类只是调用了 `SingerRepository` 实例的方法。\n\n\n\n```\npackage com.apress.prospring6.ten.service;\n\
  import java.util.stream.Stream;\nimport java.util.stream.StreamSupport;\n// 其他导入语句已省略\n\
  @Service\n@Transactional\npublic class SingerServiceImpl implements SingerService\
  \ {\nprivate final SingerRepository singerRepository;\npublic SingerServiceImpl(SingerRepository\
  \ singerRepository) {\nthis.singerRepository = singerRepository;\n}\n@Override\n\
  @Transactional(readOnly=true)\npublic Stream findAll() {\nreturn StreamSupport.stream(singerRepository.findAll().spliterator(),\
  \ false);\n}\n@Override\n@Transactional(readOnly=true)\npublic Stream findByFirstName(String\
  \ firstName) {\nreturn StreamSupport.stream(singerRepository.findByFirstName(firstName).spliterator(),\
  \ false);\n}\n@Override\n@Transactional(readOnly=true)\npublic Stream findByFirstNameAndLastName(String\
  \ firstName, String lastName) {\nreturn StreamSupport.stream(singerRepository.findByFirstNameAndLastName(firstName,\
  \ lastName).spliterator(), false);\n}\n}\n清单 10-5\n使用 Spring Data Repository 实例的\
  \ SingerServiceImpl 类\n```\n\n可以看到，我们不再需要注入 `EntityManager`，而是需要将 `singerRepository`\
  \ 实例注入到服务 Bean 中。这个实例由 Spring 基于 `SingerRepository` 接口自动生成。由于使用了 Spring Data JPA，所有底层工作都已为我们完成。在清单\
  \ 10-6 中，你可以看到一个测试类，现在你应该已经对其内容很熟悉了。\n\n```\npackage com.apress.prospring6.ten;\n\
  // 导入语句已省略\n@Testcontainers\n@SqlMergeMode(SqlMergeMode.MergeMode.MERGE)\n@Sql({\
  \ \"classpath:testcontainers/drop-schema.sql\", \"classpath:testcontainers/create-schema.sql\"\
  \ })\n@SpringJUnitConfig(classes = {SingerServiceTest.TestContainersConfig.class})\n\
  public class SingerServiceTest extends TestContainersBase {\nprivate static final\
  \ Logger LOGGER = LoggerFactory.getLogger(SingerServiceTest.class);\n@Autowired\n\
  SingerService singerService;\n@Autowired\nApplicationContext ctx;\n@Test\npublic\
  \ void testFindAll(){\nvar singers = singerService.findAll().peek(s -> LOGGER.info(s.toString())).toList();\n\
  assertEquals(3, singers.size());\n}\n@Test\npublic void testFindByFirstName(){\n\
  var singers = singerService.findByFirstName(\"John\").peek(s -> LOGGER.info(s.toString())).toList();\n\
  assertEquals(2, singers.size());\n}\n@Test\npublic void testFindByFirstNameAndLastName(){\n\
  var singers = singerService.findByFirstNameAndLastName(\"John\", \"Mayer\").peek(s\
  \ -> LOGGER.info(s.toString())).toList();\nassertEquals(1, singers.size());\n}\n\
  @Configuration\n@Import(DataJpaCfg.class)\npublic static class TestContainersConfig\
  \ {\n@Autowired\nProperties jpaProperties;\n@PostConstruct\npublic void initialize()\
  \ {\njpaProperties.put(Environment.FORMAT_SQL, true);\njpaProperties.put(Environment.USE_SQL_COMMENTS,\
  \ true);\njpaProperties.put(Environment.SHOW_SQL, true);\njpaProperties.put(Environment.STATEMENT_BATCH_SIZE,\
  \ 30);\n}\n}\n}\n清单 10-6\nSingerServiceTest 测试类\n```\n\n这个测试类没什么特别之处，Testcontainers\
  \ MariaDB 容器配置已被隔离到 `TestContainersBase` 类中，以避免在此重复。运行此测试类时，所有方法都应通过，但像往常一样，让我们将所有\
  \ Spring 库的日志级别调高到 `TRACE`，并查看执行日志，这能让我们了解 Spring 正在做的大量工作。请查看清单 10-7 中的日志片段。\n\n\
  ```\nDEBUG: RepositoryConfigurationDelegate - Scanning for JPA repositories in packages\
  \ com.apress.prospring6.ten.repos. \nTRACE: ClassPathScanningCandidateComponentProvider\
  \ - Scanning file [/../com/apress/prospring6/ten/repos/SingerRepository.class]\n\
  DEBUG: ClassPathScanningCandidateComponentProvider - Identified candidate component\
