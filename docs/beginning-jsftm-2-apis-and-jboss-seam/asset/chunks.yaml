- fmt: '• 要遍历表中的某些项，如果项的数量只能在运行时确定，请使用`<h:dataTable>`标签，它会创建一个`UI Data`组件。你向它提供一个`List`项，它会为每个项进行遍历。其子组件必须是`UI
    Column`组件。每个`UI Column`代表表中的一个列。对于每一行，`UI Data`会创建一个包含行索引的环境，并在要求每个`UI Column`渲染自身之前将当前项存储到一个属性中。每个`UI
    Column`会渲染其自身的子组件（不包括名为`header`的方面）。


    `UI Column`可以选择性地拥有一个名为`header`的方面。在这种情况下，`UI Data`会渲染一个标题行，并在开始处理数据行之前，要求`UI
    Columns`渲染标题方面作为列的标题。


    • 在表单提交时，`UI Data`会再次遍历这些项，重新创建环境（以设置属性），并让内部的每个组件有机会在各自的阶段中应用请求值、处理验证、更新领域值以及调用应用程序。


    • 因为当前项被存储到一个属性中，并且该属性会被环境清除，如果你需要将其传递到下一页，很可能需要使用`Set Property`动作监听器。


    • 如果你需要遍历一些项，但它们不会以HTML `<table>`的形式呈现，你可以使用`<ui:repeat>`标签。它的工作方式与`<h:dataTable>`标签非常相似，只是它不会输出自己的标记。


    • 要创建链接，请使用带有链接渲染器的`UI Command`组件。在行为方面，它就像带有按钮渲染器的`UI Command`组件一样。


    • 对于`UI Command`，除了在其`action`属性中设置结果外，你还可以指定一个方法。当你需要执行业务操作时，这很有用。该方法应返回一个指示结果的字符串。如果你需要执行特定于UI的操作，最好向`UI
    Command`添加一个动作监听器。


    • `UI Input`可以渲染为用户输入显示为星号。这对于密码输入很有用。


