- fmt: "现在，`UI Data`组件将逐个渲染`Product`对象（每个`Product`一行）。然而，列中的`UI Output`组件如何访问当前`Product`对象中的信息？你可以通过`var`属性来实现，如清单4-5所示。简而言之，`UI\
    \ Data`将使用`p`作为循环变量，依次指向每个元素。该变量在请求中作为属性（一个名称-值对）实现。\n\n因此，你最终可以像访问Web Bean一样访问该属性（清单4-5）。\n\
    \n**清单4-5.** *像访问Web Bean一样访问属性*\n\n```\n<h:dataTable value=\"#{catalog.products}\"\
    \ var=\"p\">\n    <h:column>\n        <h:outputText value=\"#{p.id}\"/>\n    </h:column>\n\
    \    <h:column>\n        <h:outputText value=\"#{p.name}\"/>\n    </h:column>\n\
    \    <h:column>\n        <h:outputText value=\"#{p.price}\"/>\n    </h:column>\n\
    </h:dataTable>\n```\n\n请注意，属性*不是*Web Bean。在评估EL表达式时，JSF会先尝试查找属性，然后再查找Web Bean。现在运行应用程序时，产品将显示出来（见图4-4）。\n\
    \n**图4-4.** *产品已显示。*\n\n**106**\n\n第4章 ■ 创建电子商店\n\n为了使网格可见，请按清单4-6所示修改页面。\n\n\
    **清单4-6.** *设置边框宽度*\n\n```\n<h:dataTable value=\"#{catalog.products}\" var=\"\
    p\" border=\"1\">\n    <h:column>\n        <h:outputText value=\"#{p.id}\"/>\n\
    \    </h:column>\n    <h:column>\n        <h:outputText value=\"#{p.name}\"/>\n\
    \    </h:column>\n    <h:column>\n        <h:outputText value=\"#{p.price}\"/>\n\
    \    </h:column>\n</h:dataTable>\n```\n\n现在运行应用程序时，表格边框将显示出来。\n\n### 创建显示详情的链接\n\
    \n现在，让我们创建显示产品详情的链接。为此，你将使用`<h:commandLink>`标签，如图4-5所示。\n\n```\n<h:dataTable value=\"\
    #{catalog.products}\" var=\"p\" border=\"1\">\n    <h:column>\n        <h:outputText\
    \ value=\"#{p.id}\"/>\n    </h:column>\n```\n\n它将生成`<a>`标签。\n\n```\n    <h:column>\n\
    \        <h:commandLink>\n            <h:outputText value=\"#{p.name}\"/>\n  \
    \      </h:commandLink>\n    </h:column>\n    <h:column>\n        <h:outputText\
    \ value=\"#{p.price}\"/>\n    </h:column>\n</h:dataTable>\n```\n\n`<h:commandLink>`元素的内容将生成`<a>`元素的内容。或者，你也可以使用`value`属性指定内容：`<h:commandLink\
    \ value=\"#{p.name}\" />`\n\n**图4-5.** *使用`<h:commandLink>`*\n\n第4章 ■ 创建电子商店\n\
    \n**107**\n\n请注意，`<h:commandLink>`标签的行为与`<h:commandButton>`标签相同，因为它们都会创建一个`UI\
    \ Command`组件。唯一的区别是前者将`UI Command`渲染为链接，而后者则渲染为按钮（见图4-6）。一个重要的后果是，`<h:commandLink>`标签会像`<h:commandButton>`一样提交表单，因此它必须出现在表单内部。\n\
    \n就像渲染为按钮时一样，当点击`UI Command`时，它会提交其所在的表单。这是通过JavaScript实现的。\n\n```\nLink\n<a onclick=\"\
    javascript to submit the form\">...</a>\nRenderer\nUI Command\n\nButton\n<input\
    \ type=\"submit\" ...>\nRenderer\nUI Command\n```\n\n**图4-6.** *`<h:commandLink>`\
    \ vs. `<h:commandButton>`*\n\n因此，你需要按清单4-7所示修改代码。如果你使用`<h:commandButton>`，你会通过`action`属性设置结果。由于`<h:commandLink>`具有完全相同的行为，你可以做同样的事情。\n\
    \n**清单4-7.** *设置`<h:commandLink>`的结果*\n\n```\n<h:dataTable value=\"#{catalog.products}\"\
    \ var=\"p\" border=\"1\">\n    <h:column>\n        <h:outputText value=\"#{p.id}\"\
    />\n    </h:column>\n    <h:column>\n        <h:form>\n            <h:commandLink\
    \ action=\"detail\">\n                <h:outputText value=\"#{p.name}\"/>\n  \
    \          </h:commandLink>\n        </h:form>\n    </h:column>\n```\n\n**108**\n\
    \n第4章 ■ 创建电子商店\n\n```\n    <h:column>\n        <h:outputText value=\"#{p.price}\"\
    />\n    </h:column>\n</h:dataTable>\n```\n\n为了使其工作，请按清单4-8创建一个`detail.xhtml`页面。请注意，为简单起见，目前它只包含静态内容。\n\
    \n**清单4-8.** *详情页面*\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\" ?>\n<!DOCTYPE\
    \ html PUBLIC \"-//W3C//DTD XHTML 1.0 Strict//EN\"\n```"
  raw: 'Now, the UI Data component will render the Product objects one by one (one
    row for each Product). However, how can the UI Output component in the columns
    access the information in the current Product object? You can do that with the
    var attribute, as shown in Listing 4-5\. In short, the UI Data will use p as a
    looping variable to point to each element in turn. This variable is implemented
    as an attribute (a name- value pair) in the request.


    So, you can finally access the attribute just like a web bean ( Listing 4-5).


    **Listing 4-5.** *Accessing an Attribute Like a Web Bean*


    ...


    **<h:dataTable value="#{catalog.products}" var="p">**


    <h:column>


    **<h:outputText value="#{p.id}"/>**


    </h:column>


    <h:column>


    **<h:outputText value="#{p.name}"/>**


    </h:column>


    <h:column>


    **<h:outputText value="#{p.price}"/>**


    </h:column>


    </h:dataTable>


    Note that an attribute is *not* a web bean. When evaluating an EL expression,
    JSF will try to look up an attribute first, before looking up a web bean. Now
    when you run the application, the products will be displayed (see Figure 4-4).


    **Figure 4-4.** *Products are displayed.*


    **106**


    Chapter 4 ■ CreatING aN e- ShOp


    To make the grid visible, modify the page as shown in Listing 4-6.


    **Listing 4-6.** *Setting the Width of the Border*


    ...


    **<h:dataTable value="#{catalog.products}" var="p" border="1">**


    <h:column>


    <h:outputText value="#{p.id}"/>


    </h:column>


    <h:column>


    <h:outputText value="#{p.name}"/>


    </h:column>


    <h:column>


    <h:outputText value="#{p.price}"/>


    </h:column>


    </h:dataTable>


    When you run the application now, the table border will now display.


    **Making the Link to Show the Details**


    Now, let’s create the link to show the product details. For this, you’ll use the


    <h:commandLink> tag, as shown in Figure 4-5.


    <h:dataTable value="#{catalog.products}" var="p" border="1">


    <h:column>


    <h:outputText value="#{p.id}"/>


    </h:column>


    It will generate the <a> tag.


    <h:column>


    **<h:commandLink>**


    <a>...</a>


    <h:outputText value="#{p.name}"/>


    **</h:commandLink>**


    </h:column>


    <h:column>


    The content of the <h:commandLink>


    element wil generate the content of the <a>


    <h:outputText value="#{p.price}"/>


    element. Alternatively, you could specify the


    </h:column>


    content using the value attribute:


    </h:dataTable>


    <h:commandLink **value="#{p.name}"** />


    **Figure 4-5.** *Using <h:commandLink>*


    Chapter 4 ■ CreatING aN e- ShOp


    **107**


    Note that the behavior of the <h:commandLink> tag is the same as the <h:commandButton>
    tag because they both will create a UI Command component. The only difference
    is that the former will render the UI Command as a link, while the latter will
    render a button (see Figure 4-6). An important consequence of this is that the
    <h:commandLink> tag will submit a form just like <h:commandButton>, and thus it
    must appear inside a form.


    Just like when it is rendered as a button, a


    UI Command will submit the surrounding


    form when it is clicked. This is done using


    JavaScript.


    Link


    <a onclick="javascript to submit the form">...</a>


    Renderer


    UI Command


    Button


    <input type="submit" ...>


    Renderer


    UI Command


    **Figure 4-6.** *<h:commandLink> vs. <h:commandButton>*


    Therefore, you need to modify the code as shown in Listing 4-7.


    If you were using <h:commandButton>, you would set the outcome using the action
    attribute. Because <h:commandLink> has exactly the same behavior, you do the same
    thing.


    **Listing 4-7.** *Setting the Outcome of <h:commandLink>*


    ...


    <h:dataTable value="#{catalog.products}" var="p" border="1">


    <h:column>


    <h:outputText value="#{p.id}"/>


    </h:column>


    <h:column>


    **<h:form>**


    **<h:commandLink action="detail">**


    **<h:outputText value="#{p.name}"/>**


    **</h:commandLink>**


    **</h:form>**


    </h:column>


    <h:column>


    **108**


    Chapter 4 ■ CreatING aN e- ShOp


    <h:outputText value="#{p.price}"/>


    </h:column>


    </h:dataTable>


    For it to work, create a detail.xhtml page as shown in Listing 4-8. Note that
    for simplicity it contains static content only at the moment.


