    第4章 ■ 创建电子商务网站


    • 如果你使用页面显示请求作用域Web Bean的属性，在表单提交时必须小心，因为会创建一个新的请求作用域Web Bean。通常你会使用`UI Input`组件以及HTML隐藏输入渲染器，将ID作为隐藏字段存储在浏览器中。当ID设置后，你将加载该对象。


    • JSF使用视图处理器从指定的视图ID创建JSF组件树。当你想要绕过JSF导航系统时，需要使用视图处理器。你需要加载一个视图并将其设置为要渲染的视图。


    • 会话是每个用户（或者更确切地说，每个浏览器实例）的内存区域。要启动新会话，请重新启动浏览器或等待超时。要在服务器上移除会话，请在会话上调用`invalidate()`。这在注销时通常执行。放入会话的所有内容都必须实现`Serializable`。


    • 每个会话中都有一个Web Bean表。你可以将每个用户的临时数据放入其中。


    • 阶段监听器会在进入阶段之前或退出阶段之后得到通知。你可以使用它来确保用户在渲染某些页面之前已登录。


    • 外部上下文意味着JSF运行所在的平台。在你的情况下，它是JBoss。JSF假定该平台负责维护会话。


