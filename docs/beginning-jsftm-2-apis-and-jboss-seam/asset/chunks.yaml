    你还了解到，Seam 组件类似于 Web Bean。你可以按名称将一个组件注入到另一个组件中。此外，你现在还知道如何将会话 Bean（有状态或无状态）转换为
    Seam 组件，这样该组件会将方法调用委托给代理，代理再进一步委托给 Bean 实例。你还看到了如何使用 `@Remove` 注解一个方法，以便 Seam
    在销毁组件时销毁 Bean 实例。


    你了解到，可以让 Seam 自动生成一个骨架应用程序，其中包含通用布局、登录页面以及许多内置组件，例如 `Credentials`（用户名和密码）和 `EntityManager`（数据库连接）。你还探索了
    Seam 的一些强大标签，特别是 `<s:decorate>` 和 `<s:button>`。现在，你可以使用前者根据你在字段上指定的约束来设置 JSF 验证器，添加星号以指示必填字段，并显示错误消息（如果有）。并且，你可以使用后者直接指定下一个视图
    ID，而无需使用导航规则，并通过查询参数为下一页维护一些信息。


    第 10 章 ■ 使用 JBOSS Seam


    **285**


    最后，你了解到，为了指定要为下一页维护哪些信息、要求对页面进行身份验证访问，或限制只有特定角色的用户才能访问，你可以在页面所在的文件夹中创建一个 `<PAGE-NAME>.page.xml`
    文件。


