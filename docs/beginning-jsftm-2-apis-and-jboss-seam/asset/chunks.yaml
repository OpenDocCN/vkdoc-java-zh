    Save this file, and close the Navigator view. Then rename the `hello.xhtml` file
    as `getsymbol.xhtml`. Modify the new `getsymbol.xhtml` file as shown in Figure
    2-3.


    ```

    <?xml version="1.0" encoding="UTF-8" ?>

    <!DOCTYPE ...>

    <html ...>

    ...

    <body>

    <h:form>

    <h:inputText></h:inputText>

    <h:commandButton></h:commandButton>

    </h:form>

    </body>

    </html>

    ```


    Before the page is rendered, the `<h:form>` tag will create a `UI Form` component.
    It will create a `UI Input` component. It will create a `UI Command` component.


    **Figure 2-3.** *getsymbol.xhtml*


    What do the components such as `UI Form` do? During rendering, these components
    will generate HTML elements, as shown in Figure 2-4.


    The `UI Form` will generate the action value so that this component tree will
    be invoked on form submission.


    ```

    <form action="...">

    <input type="text" value="???" />

    <input type="submit" />

    </form>

    ```


    But what is the value initially displayed to the user?


    **Figure 2-4.** *Rendering of form-related components*


    ## What is the initial symbol value displayed to the user?


    You can link a web bean to `UI Input` component (see Figure 2-5). That is, on
    rendering, the `UI Input` component will evaluate the EL expression and use the
    result as the initial value.


    1. Set the value to an EL expression. Here, it points to the `sym` property of
    a web bean `b1`.

    2. When it needs to get the initial value to display, it reads the `sym` property.
    Let''s suppose that the value is `MSFT`.

    3. It puts the `MSFT` as the initial value.


    ```

    <form ...>

    <input type="text" value="???" />

    <input type="submit" />

    </form>

    ```


    **Figure 2-5.** *Linking a property of a web bean to a UI Input component*


    Note that after rendering the page, the HTTP request is gone and so is the `b1`
    bean (see Figure 2-6).


    `b1` is accessed and thus created on demand. Finally, when the response has been
    sent, `b1` is destroyed.


    ```

    Browser

    GET the Page

    http://localhost/...

    ...

    Response 1

    ...

    HTML Code

    ```


    **Figure 2-6.** *The b1 bean will be gone after rendering.*


    Suppose that the user changes the value from `MSFT` to `IBM` and then submits
    the form. What will happen? Figure 2-7 shows the process. Note that this `b1`
    bean is not the original; it is newly created and associated with the new request
    representing the form submission.


    1. The user changes it to `IBM` and submits the form.

    2. It tries to store the value `IBM` back into the `sym` property of `b1`. This
    will create a new `b1`.


    ```

    Browser

    GET the Page

    ...

    Response 1

    HTML Code

    ...

    Request 2

    IBM

    ```


    **Figure 2-7.** *The form submission process*


    But what is the HTTP response? By default, the same page will render again. Therefore,
    it will display `IBM` as the value again because the `b1` bean just created is
    still there (see Figure 2-8).


    1. The user changes it to `IBM` and submits the form.

    2. Store the value `IBM` back into `b1`.

    3. During rendering, read the `sym` property again.

    4. Generate the response.


    ```

    Browser

    ...

    Request 2

    IBM

    ...

    Response 2

    HTML Code

    ```


    **Figure 2-8.** *The rendering process after form submission*


    Now, to implement these ideas, modify `getsymbol.xhtml` as shown in Listing 2-2.


    **Listing 2-2.** *getsymbol.xhtml*


    ```

    <?xml version="1.0" encoding="UTF-8" ?>

    <!DOCTYPE ...>

    <html ...>

    ...

    <body>

    <h:form>

    <h:inputText value="#{b1.sym}"></h:inputText>

    <h:commandButton></h:commandButton>

    </h:form>

    </body>

    </html>

    ```'
