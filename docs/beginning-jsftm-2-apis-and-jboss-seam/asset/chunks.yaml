    \ the project. Then, run the application by going to [http://localhost:8080/Postage/faces/getrequest.xhtml](http://localhost:8080/Postage/faces/getrequest.xhtml).\
    \ It should work.\n\n## What If the Input Is Invalid?\n\nAt the moment, if the\
    \ user enters a negative number as the weight (such as –5), the calculator will\
    \ return a negative postage. This is no good. Instead, you’d like the application\
    \ to tell the user that the weight is invalid.\n\nSimilarly, for the moment, if\
    \ the user enters a nonexisting patron code such as `p3`, the calculator will\
    \ simply treat it as “no discount” because the patron code is not found in the\
    \ discount map. Ideally, it should tell him that this patron code is not found\
    \ (see Figure 3-4).\n\n**Figure 3-4.** *Catching unknown patron codes*\n\nNote\
    \ that because the patron code is optional, if the user doesn’t enter anything,\
    \ this will *not* be treated as an error. This is a very important rule in validation:\
    \ if some input is optional and it is indeed not provided, you must *not* perform\
    \ any validation because there is simply no value to validate.\n\nTo validate\
    \ the user input, you can add one or more validator objects to a UI Input component\
    \ (see Figure 3-5). When the form is submitted, as mentioned earlier, in the Apply\
    \ Request Values phase the UI Input component will store the raw input string\
    \ (`–5`) locally. In the Process Validations phase, it will convert it into an\
    \ object (an integer, `–5`, here). Then it will ask each of its validators (if\
    \ any) in turn to validate the converted value (`–5` here). If a validator fails,\
    \ it will log an error message and tell the JSF engine to jump to the Render Response\
    \ phase directly, without updating the web beans or setting the outcome.\n\nNegative\
    \ not accepted!\n\n5: Log an error.\n\nHTTP Request\n\n1: Read the value (string).\n\
    \nWeight: \"-5\"\n\n...\n\nValidator 1\n\nUI Input\n\n4: Check the\n\nWeb Bean\n\
    \nconverted\n\nvalue (-5).\n\n2: Store the raw string.\n\nRaw: \"-5\"\n\nConverted:\
    \ -5\n\n3: Convert it to an\n\nInteger.\n\nApply\n\nProcess\n\nUpdate\n\nInvoke\n\
    \nRequest\n\nValidations\n\nDomain Values\n\nApplication\n\nValues\n\nRender\n\
    \nResponse\n\n**Figure 3-5.** *How validators work*\n\nIn order to create such\
    \ a validator, modify `getrequest.xhtml` as shown in Listing 3-8. This `<f:validateLongRange>`\
    \ tag will create a “long range validator,” which will assume the converted value\
    \ is a long and will check whether it is in a specified range. Here, you’re setting\
    \ the minimum value to 0 so that anything less than 0 is an error. You could set\
    \ the maximum value too, but there is no need for the current case. Note that\
    \ the long range validator has nothing to do with the markup, so it is in the\
    \ Core tag lib.\n\n**Listing 3-8.** *Creating a Long Range Validator*\n\n```\n\
    <?xml version=\"1.0\" encoding=\"UTF-8\" ?>\n<!DOCTYPE ...>\n<html xmlns=\"http://www.w3.org/1999/xhtml\"\
    \n      xmlns:h=\"http://java.sun.com/jsf/html\"\n      xmlns:f=\"http://java.sun.com/jsf/core\"\
    >\n...\n<h:form>\n<h:panelGrid columns=\"2\">\n<h:outputText value=\"Weight:\"\
    />\n<h:inputText value=\"#{r.weight}\">\n<f:validateLongRange minimum=\"0\"/>\n\
    </h:inputText>\n<h:outputText value=\"Patron code:\"/>\n<h:inputText value=\"\
    #{r.patronCode}\"/>\n<h:outputText value=\"\"/>\n<h:commandButton action=\"ok\"\
    \ value=\"OK\"/>\n</h:panelGrid>\n</h:form>\n```\n\nTo display the error message,\
    \ you need an `<h:messages>` tag, and you need to set the label as shown in Listing\
    \ 3-9. Why set the label? As explained in the previous chapter, if you don’t set\
    \ the label, the error message will display the client ID, which is daunting to\
    \ the user.\n\n**Listing 3-9.** *Displaying the Error Message*\n\n```\n<h:messages/>\n\
    <h:form>\n<h:panelGrid columns=\"2\">\n<h:outputText value=\"Weight:\"/>\n<h:inputText\
    \ value=\"#{r.weight}\" label=\"weight\">\n<f:validateLongRange minimum=\"0\"\
    />\n</h:inputText>\n<h:outputText value=\"Patron code:\"/>\n<h:inputText value=\"\
    #{r.patronCode}\"/>\n<h:outputText value=\"\"/>\n<h:commandButton action=\"ok\"\
    \ value=\"OK\"/>\n</h:panelGrid>\n</h:form>\n```\n\nNow run the application again,\
    \ and it should work (see Figure 3-6)."
