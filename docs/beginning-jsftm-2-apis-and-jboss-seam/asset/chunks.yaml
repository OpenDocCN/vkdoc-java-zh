    3-2 所示。你将其创建为一个名为 r 的请求作用域 Web Bean。为了让 Web Bean 能够创建它，你需要一个无参构造函数。为了计算邮资，你向其中注入了一个
    PostageService Web Bean。最后，你需要为要编辑的属性提供 getter 和 setter 方法。


    **清单 3-2.** *Request 类*


    package postage;


    ...


    @Named("r")


    @RequestScoped


    public class Request {


    private int weight;


    private String patronCode;


    @Current


    private PostageService postageService;


    public Request() {


    }


    public Request(int weight, String patronCode) {


    this.weight = weight;


    this.patronCode = patronCode;


    }


    public int getWeight() {


    return weight;


    }


    public void setWeight(int weight) {


    this.weight = weight;


    }


    public String getPatronCode() {


    return patronCode;


    }


    public void setPatronCode(String patronCode) {


    this.patronCode = patronCode;


    }


    public int getPostage() {


    return postageService.getPostage(this);


    }


    }


    第 3 章 ■ 验证输入


