    ## 总结


    在本章中，您了解到，如果多个页面具有共同的布局，您可以将共同的内容提取到一个基础页面中，并使用`<ui:define>`标记抽象部分。然后，在每个子页面中，使用`<ui:composition>`引入基础页面，并使用`<ui:define>`提供每个具体部分。每个部分应具有唯一的名称。如果只有一个抽象部分，您可以省略名称，并将具体部分作为`<ui:composition>`元素的主体提供。


    您了解到，您可以在导航规则中使用星号作为视图ID。在这种情况下，它将匹配任何视图ID。如果多个页面共享相同的导航案例，这很有用。如果某个页面需要一些额外的导航案例，它可以有自己的普通导航规则，该规则将被首先检查。


