    \        <navigation-case>\n            <from-outcome>confirm</from-outcome>\n\
    \            <to-view-id>/confirm.xhtml</to-view-id>\n        </navigation-case>\n\
    \    </navigation-rule>\n</faces-config>\n```\n\nWhen you run the application\
