    Bean 表格及其中的 Web Bean 也会随之销毁。


    ■**注意** 如果你之前使用过 Servlet 和 JSP，可能会想知道是否可以将 Web Bean 存储在会话中而不是请求中。答案是肯定的；你将在后续章节中看到实际应用。


