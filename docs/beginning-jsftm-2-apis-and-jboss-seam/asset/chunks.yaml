    How does it do that? See Figure 2-11\. Basically, when the HTTP request arrives,
    the UI Input and UI Command components are each given the opportunity to handle
    the request such as reading values from it, checking whether a value is provided,
    validating the value as needed, and finally storing the value into a web bean
    (see Figure 2-11). Let’s call this phase the Input Processing phase. In this phase
    for the UI Command component, after finding that the button was clicked, it will
    *not* immediately set the outcome. Instead, it schedules a listener to be executed
    in the next phase.


    **40**


    Chapter 2 ■ USING FOrMS


    Assuming that there is no error of any kind, JSF will enter the next phase in
    which all scheduled listeners will be executed. In this example, the listener
    scheduled by the UI Command component will execute to set the outcome. Then JSF
    will check the outcome and use the navigation rules to determine the next view
    ID of the next page. This phase is called the Invoke Application phase.


    In the next phase, JSF uses the next view ID to load the page and let it render.
    This phase is called the Render Response phase.


