    `<h:commandLink action=\"contact\">Contact</h:commandLink></td>`\n\n**176**\n\n\
    Chapter 6 ■ Providing a Common Layout for Your Pages\n\n`<td>`\n\n**`<ui:insert>unique\
    \ content</ui:insert>`**\n\n`</td>`\n\n`</tr>`\n\n`</table>`\n\n`</h:form>`\n\n\
    `</body>`\n\n`</html>`\n\nCreate `home.xhtml` to “inherit” `base.xhtml`, as shown\
    \ in Figure 6-4.\n\nInclude a certain page (here `/base.xhtml`).\n\n[`<html`](http://www.w3.org/1999/xhtml)\n\
    \nEverything outside the [`>`](http://java.sun.com/jsf/facelets) `<composition>`\
    \ element will *not* be output.\n\n`<ui:composition template=\"/base.xhtml\">`\n\
    \nThis is the home page.\n\n`</ui:composition>`\n\n`</html>`\n\nThis path starts\
    \ from the context root folder (`WebContent`).\n\nEverything outside the `<composition>`\
    \ element will *not* be output.\n\nThe tag body is the concrete part.\n\n**Figure\
    \ 6-4.** *“Inheriting” the base page*\n\n[Run the application by visiting `http://localhost:8080/Layout/faces/home.xhtml`.\
    \ If it is](http://localhost:8080/Layout/faces/home.xhtml) working as expected,\
    \ the HTML code should be that of `base.xhtml` except for the abstract part. This\
    \ is very much like using a custom component except that you don’t need to define\
    \ a custom tag.\n\nNow create `products.xhtml` in a similar manner. It works in\
    \ the same way.\n\nIn this setup, you can think of it like the base page providing\
    \ a template with some holes to fill in and the Home page and the Products page\
    \ using that template and filling those holes with their unique contents.\n\n\
    Chapter 6 ■ Providing a Common Layout for Your Pages\n\n**177**\n\n**Using Global\
    \ Navigation Rules**\n\nWhat is interesting is how to create the navigation rules\
    \ for the links. As a first attempt, you may try what’s shown in Figure 6-5.\n\
    \nRule 1\n\nRule 2\n\n`/home.xhtml`\n\n`/products.xhtml`\n\n`/home.xhtml`\n\n\
    `/home.xhtml`\n\nhome\n\nhome\n\n`/products.xhtml`\n\n`/products.xhtml`\n\nproducts\n\
    \nproducts\n\n`/contact.xhtml`\n\n`/contact.xhtml`\n\ncontact\n\ncontact\n\n**Figure\
    \ 6-5.** *Duplicate navigation rules*\n\nHowever, that is a lot of duplication.\
    \ Figure 6-6 shows a better way. Because the star will match any source view ID,\
    \ the navigation rule could be considered a global fallback rule.\n\nA star will\
    \ match any view ID.\n\n*\n\n`/home.xhtml`\n\nhome\n\n`/products.xhtml`\n\nproducts\n\
    \n`/contact.xhtml`\n\ncontact\n\n**Figure 6-6.** *Using a wildcard to match any\
    \ view ID*\n\nTo implement this idea, modify `faces-config.xml` as shown in Listing\
    \ 6-3.\n\n![Image 71](index-192_1.png)\n\n**178**\n\nChapter 6 ■ Providing a Common\
    \ Layout for Your Pages\n\n**Listing 6-3.** *`faces-config.xml` Using a Wildcard\
    \ to Match Any View ID*\n\n```xml\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n\
    <faces-config ...>\n  <navigation-rule>\n    <from-view-id>*</from-view-id>\n\
    \    <navigation-case>\n      <from-outcome>products</from-outcome>\n      <to-view-id>/products.xhtml</to-view-id>\n\
    \    </navigation-case>\n    <navigation-case>\n      <from-outcome>home</from-outcome>\n\
    \      <to-view-id>/home.xhtml</to-view-id>\n    </navigation-case>\n  </navigation-rule>\n\
    </faces-config>\n```\n\nRestart the application, and you’ll see that the links\
    \ work.\n\n**Using Two Abstract Parts**\n\nSuppose that each page may need to\
    \ have a particular header that contains HTML elements or even JSF components,\
    \ as shown in Figure 6-7.\n\nThis header may contain markup such as `<h1>` or\
    \ even components.\n\n**Figure 6-7.** *Creating a unique header for each page*\n\
    \nNow you’ll have a structure that looks like Figure 6-8.\n\nChapter 6 ■ Providing\
    \ a Common Layout for Your Pages\n\n**179**\n\n`base.xhtml`\n\nBase\n\nAbstract\
    \ 1\n\nAbstract 2\n\n`home.xhtml`\n\nHome\n\nProducts\n\n`products.xhtml`\n\n\
    Unique Content 1\n\nUnique Content 1\n\nUnique Content 2\n\nUnique Content 2\n\
    \n**Figure 6-8.** *Having two abstract parts*\n\nThis is like a base class having\
    \ two abstract methods. For this to work, you need to give a unique name to each\
    \ abstract part, as shown in Listing 6-4.\n\n**Listing 6-4.** *Giving a Unique\
    \ Name to Each Abstract Part*\n\n```html\n<!DOCTYPE html PUBLIC \"-//W3C//DTD\
    \ XHTML 1.0 Strict//EN\"\n  \"http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd\"\
    >\n<html xmlns=\"http://www.w3.org/1999/xhtml\"\n      xmlns:ui=\"http://java.sun.com/jsf/facelets\"\
    >\n<head>\n  <meta http-equiv=\"Content-Type\" content=\"text/html; charset=UTF-8\"\
    \ />\n  <title>Insert title here</title>\n</head>\n```"
