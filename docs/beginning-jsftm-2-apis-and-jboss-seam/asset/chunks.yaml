  raw: 'Next, you need to link a web bean to the two <h:inputText> tags. To do that,
    create a class called Request in the postage package as shown in Listing 3-2\.
    You’re making it a request-scoped web bean named r. To allow Web Beans to create
    it, you need a constructor that takes no argument. To calculate the postage, you’re
    injecting a PostageService web bean into it. Finally, you need getters and setters
    for the properties to be edited.


    **Listing 3-2.** *The Request Class*


    package postage;


    ...


    @Named("r")


    @RequestScoped


    public class Request {


    private int weight;


    private String patronCode;


    @Current


    private PostageService postageService;


    public Request() {


    }


    public Request(int weight, String patronCode) {


    this.weight = weight;


    this.patronCode = patronCode;


    }


    public int getWeight() {


    return weight;


    }


    public void setWeight(int weight) {


    this.weight = weight;


    }


    public String getPatronCode() {


    return patronCode;


    }


    public void setPatronCode(String patronCode) {


    this.patronCode = patronCode;


    }


    public int getPostage() {


    return postageService.getPostage(this);


    }


    }


    Chapter 3 ■ VaLIDatING INpUt


    **71**


    Listing 3-3 shows the PostageService class. In the constructor you hard-code some
    patrons and their respective discounts. For example, p1 has 10 percent off. When
    calculat-ing the postage, you assume that the postage is $10 per kilogram.


    **Listing 3-3.** *The PostageService Class*


    package postage;


    import java.util.HashMap;


    import java.util.Map;


    import javax.context.ApplicationScoped;


    @ApplicationScoped


    public class PostageService {


    private Map<String, Integer> patronCodeToDiscount;


    public PostageService() {


    patronCodeToDiscount = new HashMap<String, Integer>();


    patronCodeToDiscount.put("p1", 90);


    patronCodeToDiscount.put("p2", 95);


    }


    public int getPostage(Request r) {


    Integer discount = (Integer) patronCodeToDiscount


    .get(r.getPatronCode());


    int postagePerKg = 10;


    int postage = r.getWeight() * postagePerKg;


    if (discount != null) {


    postage = postage * discount.intValue() / 100;


    }


    return postage;


    }


    }


    A very important point in Listing 3-3 is that you are *not* giving it a name using
    @Name.


    Because the Request bean will inject it using its type (the PostageService class)
    and there is no EL expression referring to it using a name (yet), you don’t need
