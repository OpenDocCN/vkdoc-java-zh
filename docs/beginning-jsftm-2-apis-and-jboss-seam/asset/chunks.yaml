    \ 5-1.** *The `<copyright>` Tag in the `http://foo.com` Namespace*\n\n```\n<html\
    \ xmlns:foo=\"http://foo.com\">\n...\n<foo:copyright/>\n</html>\n```\n\nIn addition,\
    \ just because the tag is named `copyright`, JSF will not simply assume that the\
    \ XHTML is named `copyright.xhtml`. Instead, you must explicitly tell JSF the\
    \ file name when defining the tag. Conceptually, it looks like Figure 5-5.\n\n\
