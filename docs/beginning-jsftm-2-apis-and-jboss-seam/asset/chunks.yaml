    第 1 章


    JSF 入门


    **本**章中，你将学习如何搭建开发环境，并使用 JSF 创建一个“Hello world!”应用程序。


    **介绍“Hello world”应用程序**


    假设你想开发如图 1-1 所示的应用程序。


    **图 1-1.** *一个包含单个页面的简单“Hello world!”应用程序* 为此，你需要安装一些软件（见图 1-2）。首先，你需要一个 IDE 来创建应用程序。本书将使用
    Eclipse，但其他流行的 IDE 也同样适用。接下来，你需要安装 JBoss，它为运行 Web 应用程序提供了一个平台（JBoss 也有其他优秀的替代品）。此外，你的应用程序将使用
    JSF 和 Web Beans 作为库。因此，你也需要下载它们。


    **1**


    ![Image 3](img/index-16_1.png)


    **2**


    第 1 章 ■ JSF 入门


    Eclipse


