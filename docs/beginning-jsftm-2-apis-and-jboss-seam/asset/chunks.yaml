    **Summary**


    In this chapter, you learned that if you have pages with a common layout, you
    can extract the common stuff into a base page and mark the abstract parts using
    <ui:define>. Then in each child page, suck in the base page using <ui:composition>,
    and provide each con-


    crete part using <ui:define>. Each part should have a unique name. If there is
    only one abstract part, you can omit the name and provide the concrete part as
    the body of the


    <ui:composition> element.


    You learned that you can use a star as the view ID in a navigation rule. In that
    case, it will match any view ID. This is useful if multiple pages share the same
    navigation cases.


    If a page needs some additional navigation cases, it can have its own normal navigation
    rule, which will be checked first.


