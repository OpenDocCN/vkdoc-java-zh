    \ Stock Value\n\nFor the moment, you’re hard-coding the stock value. Next, you’ll\
    \ calculate a dynamic value. In a real implementation, you would look up the stock\
    \ price probably from an online service. For simplicity in this example, you’ll\
    \ just use the hash code of the symbol as the stock value. To do that, modify\
    \ `stockvalue.xhtml` so that it gets the stock value from the `b1` bean (see Listing\
    \ 2-9).\n\n**Listing 2-9.** *Getting the Stock Value from a Web Bean*\n\n...\n\
    <body>\nStock value is: #{b1.stockValue}.\n</body>\n...\n\nFor this to work, define\
    \ a getter in the `b1` bean, as shown in Listing 2-10.\n\n**Listing 2-10.** *Providing\
    \ the Stock Value from the b1 Bean*\n\n...\npublic class QuoteRequest {\n    private\
    \ String sym = \"MSFT\";\n\n    public QuoteRequest() {\n        System.out.println(\"\
    Creating b1\");\n    }\n\n    public String getSym() {\n        System.out.println(\"\
    getting sym\");\n        return sym;\n    }\n\n    public void setSym(String sym)\
    \ {\n        System.out.println(\"setting sym to: \" + sym);\n        this.sym\
    \ = sym;\n    }\n\n    `public int getStockValue() {`\n        `return Math.abs(sym.hashCode());`\n\
    \    `}`\n}\n...\n\nRun the application, and the stock value should change depending\
    \ on the symbol.\n\nHow does it do that? See Figure 2-11. Basically, when the\
    \ HTTP request arrives, the UI Input and UI Command components are each given\
    \ the opportunity to handle the request such as reading values from it, checking\
    \ whether a value is provided, validating the value as needed, and finally storing\
    \ the value into a web bean (see Figure 2-11). Let’s call this phase the Input\
    \ Processing phase. In this phase for the UI Command component, after finding\
    \ that the button was clicked, it will *not* immediately set the outcome. Instead,\
    \ it schedules a listener to be executed in the next phase.\n\nAssuming that there\
    \ is no error of any kind, JSF will enter the next phase in which all scheduled\
    \ listeners will be executed. In this example, the listener scheduled by the UI\
    \ Command component will execute to set the outcome. Then JSF will check the outcome\
    \ and use the navigation rules to determine the next view ID of the next page.\
    \ This phase is called the Invoke Application phase.\n\nIn the next phase, JSF\
    \ uses the next view ID to load the page and let it render. This phase is called\
    \ the Render Response phase.\n\nWeb bean\nOutcome\nok\n2: Store the values\n1:\
    \ Read the values, check them\ninto web beans.\nif they are provided, validate\n\
    HTTP request\n4: Set the\nthem.\noutcome\n...\nUI Input\n3: Schedule a listener\
    \ to be\nexecuted.\nUI Command\nListener\nInvoke\nInput Processing\nApplication\n\
    Render\nResponse\n\n**Figure 2-11.** *JSF handles a request in phases.*\n\n##\
    \ Marking Input As Required\n\nWhat if the user deletes the initial symbol displayed\
    \ and then submits the form? You’ll get an empty string. For this stock quote\
    \ application, this should be treated as an error; in other words, the user should\
    \ be forced to enter something. To do that, you just need to mark the UI Input\
    \ component as required (see Figure 2-12).\n\nSymbol is required\n4: Log an error\
    \ message.\n3: The symbol has a\n2: HTTP Request\nnon-empty value?\nNo.\nsymbol=\n\
    UI Input\nrequired: true\n1: Mark it as required.\n`<h:inputText value=\"#{b1.sym}\"\
    \ required=\"true\"></h:inputText>`\n\n**Figure 2-12.** *Marking input as required*\n\
    \nHowever, if the UI Command component still sets the outcome to `ok`, JSF will\
    \ go ahead and display the stock result. This is obviously not what you want.\
    \ You’d like to do the following:\n\n1. Redisplay `getsymbol.xhtml`.\n2. Have\
