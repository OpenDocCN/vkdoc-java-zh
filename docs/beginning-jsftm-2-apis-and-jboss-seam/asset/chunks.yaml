    **总结**


    你在本章中学到了以下内容：


    • 面（facet）是一个子组件，由其父组件进行特殊处理。


    • 请求有一个属性表。每个属性都有一个名称和一个值（Object）。它允许你为对象指定一个名称。它类似于请求作用域的 Web Bean，只是它不创建对象；它仅将对象与名称关联起来。

