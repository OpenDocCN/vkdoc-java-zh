    ## Installing Seam


    To install Seam, go to [http://seamframework.org](http://seamframework.org) to
    download a binary package of JBoss Seam, such as `jboss-seam-2.1.1.GA.zip`. Unzip
    it into a folder such as `c:\jboss-seam`. As the download is a library, you can’t
    run it yet.


    Seam version 2.1 doesn’t support JSF 2.0 yet. As you’ve installed JSF 2.0 into
    the JBoss application server in Chapter 1, you can’t run a Seam application on
    top of it. To solve this problem, you may want to download a clean copy of the
    JBoss application server again and unzip it into, say, `c:\jboss`.


    ## Re-creating the E-shop Project


    Suppose that you’d like to re-create the e-shop using EJBs and Seam. To do that,
    open a command prompt and issue the commands shown in Listing 10-1. Note that
    these commands assume that your JDK has been installed into `c:\Program Files\Java\jdk1.6.0`;
    if not, you must use the actual path on your computer.


    **Listing 10-1.** *Starting Seam Setup*


    ```

    c:\>cd \jboss-seam

    c:\>set JAVA_HOME=c:\Program Files\Java\jdk1.6.0

    c:\>seam setup

    ```


