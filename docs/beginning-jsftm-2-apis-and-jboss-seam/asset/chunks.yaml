    **Passing a Method in a Parameter?**


    Note that some built- in JSF tags accept methods as parameters, as shown in Listing
    5-16.


    **Listing 5-16.** *JSF Tags Accepting Method Parameters*


    <h:commandButton action="#{ph.addToCart}"/>


    <h:commandLink action="..."/>


    Can this be done with your custom tags? For example, could you modify the <pe>
    tag so that it can be used as shown in Listing 5-17?


    **Listing 5-17.** *Custom Tags Accepting Method Parameters?*


    <foo:pe product="..." **action="currentProduct.onUpdated"** />


    ...


    Then you could call it as shown in Listing 5-18.


    **Listing 5-18.** *Calling a Method Parameter?*


    ...


    <ui:component>


    <h:form>


    <h:inputHidden value="#{product.id}"/>


    <h:inputText value="#{product.name}"/>


    <h:commandButton action="#{**action**}" value="OK"/>


    </h:form>


    </ui:component>


    </body>


    </html>


    Unfortunately, by default it won’t work. That is, by default all attributes of
    a custom tag are expected to evaluate to values (primitive values or objects).
    They can’t evaluate to methods. The workaround is to pass an object that has a
    method that you can invoke (see Listing 5-19 and Listing 5-20).


    **Listing 5-19.** *Passing an Object As an Action Provider*


    <foo:pe product="..." **actionProvider="some object having an onUpdated() method"**
    />


    ...


    Chapter 5 ■ CreatING CUStOM COMpONeNtS


    **163**


    **Listing 5-20.** *Invoking the Method of an Action Provider*


    ...


    <ui:component>


    <h:form>


    <h:inputHidden value="#{product.id}"/>


    <h:inputText value="#{product.name}"/>


    <h:commandButton action="#{**actionProvider.onUpdated**}" value="OK"/>


    </h:form>


    </ui:component>


    </body>


    </html>


    This example is actually not much different from the original solution: invoking
    a method on the Product object itself.


