    **DePenDenCy InjeCtIon**


    Java applications consist of Java interfaces and classes, which make up the application
    components that interact with each other to accomplish the application’s job.
    These component objects depend on each other, so an object is *dependent* if it
    uses other objects to do its job. It then follows that the other objects used
    by the dependent object are called the object’s *dependencies*.


    An object pulls its dependencies if it is responsible for providing its dependencies
    from its environment. The object may do this by instantiating dependencies or
    by looking up an outside object for them.


    Pulling dependencies is the traditional way of using objects in Java.


    In contrast, another object could be responsible for providing dependencies and
    pushing them into the object. This approach is called *dependency injection*,
    and the dependencies are *injected* by a third party to the dependent object.
    In the case of web beans, the web bean implementation pushes their dependencies
    into them, and this is how one web bean gains a reference to another web bean.


    Chapter 4 ■ CreatING aN e- ShOp


    **119**


    You need to have the shopping cart as a web bean. What scope should it be in?
    If you put it into the request scope, it will be gone when the request is finished.
    If you put it into the application scope, all users will share the same shopping
    cart. To solve this problem, you need to understand that whenever a new user starts
    using your application, the web container will allocate memory for that session.
    When will a session be deleted? If the user doesn’t send any request in a certain
    period, such as 30 minutes, the web container will delete the session. This timeout
    can be configured. The session can also be destroyed programmatically.


    Because of the per- user nature of sessions, it is the best place to store per-
    user temporary data, such as the shopping cart. How to do that? Initially there
    is an empty web bean table in each session. To put a shopping cart into the session,
    create the Cart class as in Listing 4-17\. The @SessionScoped says that, once
    created, the Cart object should be put into the session. But why does it need
    to implement Serializable? This is because the web container may need to save
    the content of the session to disk or send it to another computer over the network
    if you have a cluster. In that case, it needs to convert all the objects in the
    session into bytes. This requires that all their classes implement Serializable.


    **Listing 4-17.** *Putting the Shopping Cart into Session*


