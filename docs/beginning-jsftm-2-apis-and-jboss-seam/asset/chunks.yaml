- fmt: "# Chapter 9: Supporting Other Languages\n\nTo tell the JSF to use your own\
    \ view handler, modify `faces-config.xml` as shown in Listing 9-25.\n\n**Listing\
    \ 9-25.** *Using Your Own View Handler*\n\n```xml\n<faces-config ...>\n    <application>\n\
    \        <view-handler>multilang.MyViewHandler</view-handler>\n        <locale-config>\n\
    \            <default-locale>en</default-locale>\n            <supported-locale>zh</supported-locale>\n\
    \        </locale-config>\n    </application>\n</faces-config>\n```\n\nSave the\
    \ file, restart the JBoss instance, and run the application again. This time the\
    \ locale change should persist until you end the session (such as by restarting\
    \ the browser).\n\n## Localizing Validation Messages\n\nRemember that you can\
    \ customize the validation messages using a resource bundle. For example, you\
    \ may have a file such as `MyApp.properties` in the `multilang` package, as shown\
    \ in Listing 9-26.\n\n**Listing 9-26.** *Custom Validation Messages*\n\n```properties\n\
    javax.faces.converter.DateTimeConverter.DATE={0} is an invalid {2}!\njavax.faces.component.UIInput.REQUIRED=You\
    \ must input {0}!\njavax.faces.validator.LongRangeValidator.MINIMUM={1} must be\
    \ at least {0}!\njavax.faces.validator.LongRangeValidator.MINIMUM_detail={1} is\
    \ invalid!\n```\n\nTo use it, you need to say so in `faces-config.xml`, as shown\
    \ in Listing 9-27.\n\n**Listing 9-27.** *Specifying the Application Resource Bundle*\n\
    \n```xml\n<faces-config ...>\n    <application>\n        <view-handler>multilang.MyViewHandler</view-handler>\n\
    \        <message-bundle>multilang.MyApp</message-bundle>\n        <locale-config>\n\
    \            <default-locale>en</default-locale>\n            <supported-locale>zh</supported-locale>\n\
    \        </locale-config>\n    </application>\n</faces-config>\n```\n\nIt is simply\
    \ a global resource bundle used by the built-in components. To localize it for,\
    \ say, Chinese, all you need is to create `MyApp_zh.properties`, just like you\
    \ would for any other resource bundle.\n\n## Summary\n\nYou learned the following\
    \ in this chapter:\n\n- To internationalize a page, you can extract the strings\
    \ into resource bundles, one for each supported language and a default resource\
    \ bundle to act as the parent. To look up a string for a certain key in a resource\
    \ bundle, use the `<loadBundle>` tag to load a resource bundle as a request-scoped\
    \ attribute and access it like accessing a map.\n- To determine the locale to\
    \ use, the view handler will check the preferred locale as specified in the HTTP\
    \ request and check whether it is supported by your application. If it is, it\
    \ will store it into the view root. If it’s not, it will use the default locale\
    \ specified in your application.\n- If you’d like to let the user specify a particular\
    \ locale to use, overriding the preferred locale set in the browser, you may want\
    \ to store it into the session and provide a view handler subclass to retrieve\
    \ it later.\n- It is best practice to output the whole sentence using one UI Output\
    \ component. To fill in various placeholders in a pattern before outputting it,\
    \ you can use `<outputFormat>` and specify the value for each placeholder using\
    \ a UI Parameter component (created by a `<param>`). The meaning of UI Parameter\
    \ is entirely determined by its parent component.\n- To display an image, use\
    \ a `<graphicImage>` tag. Its `value` attribute is a relative path from the `WebContent`\
    \ folder (if it has a leading slash) or from the `.xhtml` file (otherwise). To\
    \ internationalize an image, just internationalize its `value` attribute.\n\n\
    # Chapter 10: Using JBoss Seam\n\nIf your application uses Enterprise JavaBeans\
    \ (EJBs), you may want to use a framework called Seam (from JBoss) so that your\
    \ JSF pages will work with the EJBs more easily. For example, Seam will allow\
    \ you to access EJBs in EL expressions, just like you access web beans. In addition,\
    \ Seam also provides some nice features to speed up your JSF development. For\
    \ example, it can generate pages to perform the CRUD (create, retrieve, update,\
    \ and delete) operations for your business object class without you writing a\
    \ single line of code. In this chapter, you’ll learn about such features."
