    右键点击 JBoss 实例，选择“添加和删除项目”来添加项目。然后，通过访问 [`localhost:8080/Postage/faces/`](http://localhost:8080/Postage/faces/)getrequest.xhtml
    来运行应用程序。它应该能正常工作。


    **如果输入无效怎么办？**


    目前，如果用户输入一个负数作为重量（例如 –5），计算器将返回一个负数的邮资。这显然不行。相反，你希望应用程序能告知用户重量无效。


    同样地，目前如果用户输入一个不存在的客户代码，例如 p3，计算器会简单地将其视为“无折扣”，因为在折扣映射中找不到该客户代码。理想情况下，它应该告知用户未找到此客户代码（见图
    3-4）。


    **图 3-4.** *捕获未知的客户代码*


    **74**


    第 3 章 ■ 验证输入


    请注意，由于客户代码是可选的，如果用户没有输入任何内容，这*不会*被视为错误。这是验证中一个非常重要的规则：如果某些输入是可选的，并且确实没有提供，你*必须不*执行任何验证，因为根本没有值需要验证。


    为了验证用户输入，你可以向一个 UI 输入组件添加一个或多个验证器对象（见图 3-5）。当表单提交时，如前所述，在“应用请求值”阶段，UI 输入组件会将原始输入字符串（–5）存储在本地。在“处理验证”阶段，它会将其转换为一个对象（这里是一个整数
    –5）。然后，它会依次要求其每个验证器（如果有的话）来验证转换后的值（这里是 –5）。如果某个验证器失败，它会记录一条错误消息，并告知 JSF 引擎直接跳转到“呈现响应”阶段，而不会更新
    Web Bean 或设置结果。


    不接受负数！


    5：记录错误。


    HTTP 请求


    1：读取值（字符串）。


    重量：“-5”


    ...


    验证器 1


    UI 输入


    4：检查


    Web Bean


    转换后的


    值（-5）。


