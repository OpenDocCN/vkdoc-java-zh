    最后，将 `c:\facelets\jsf-facelets.jar` 复制到 `WEB-INF/lib` 目录下，并在 Eclipse 中刷新项目。在 JSF
    2.0 之前，Facelets 是一个需要手动启用的附加组件。为此，请按清单 7-3 所示修改 `faces-config.xml`。


    **188**


    第 7 章 ■ 使用 Ajax 构建交互式页面


    **清单 7-3.** *在 faces-config.xml 中启用 Facelets（JSF 2.0 之前）*


    <faces-config ...>


    <application>


    <view-handler>com.sun.facelets.FaceletViewHandler


    </view-handler>


    </application>


    </faces-config>


    接下来，按清单 7-4 所示修改 `WEB-INF/web.xml`。


    **清单 7-4.** *为使用 RichFaces 而对 web.xml 进行的修改*


    <?xml version="1.0" encoding="UTF-8"?>


    <web-app ...>


    ...


    <servlet>


    <servlet-name>JSF</servlet-name>


    <servlet-class>javax.faces.webapp.FacesServlet</servlet-class>


    </servlet>


    <servlet-mapping>


    <servlet-name>JSF</servlet-name>


    <url-pattern>/faces/*</url-pattern>


    </servlet-mapping>


    <context-param>


    **<param-name>org.richfaces.SKIN</param-name>**


    **<param-value>blueSky</param-value>**


    **</context-param>**


    **<context-param>**


    **<param-name>org.richfaces.CONTROL_SKINNING</param-name>**


    **<param-value>enable</param-value>**


    **</context-param>**


    **<filter>**


    **<display-name>RichFaces Filter</display-name>**


    **<filter-name>richfaces</filter-name>**


    **<filter-class>org.ajax4jsf.Filter</filter-class>**


    **</filter>**


    **<filter-mapping>**


    **<filter-name>richfaces</filter-name>**


    **<servlet-name>JSF</servlet-name>**


    **<dispatcher>REQUEST</dispatcher>**


    **<dispatcher>FORWARD</dispatcher>**


    第 7 章 ■ 使用 Ajax 构建交互式页面


    **189**


    **<dispatcher>INCLUDE</dispatcher>**


    **</filter-mapping>**


    </web-app>


    你不需要完全理解这段代码的含义，但基本上，它用于让 RichFaces 拦截请求，以便将 JavaScript 传递到浏览器。


    接下来，按图 7-5 所示修改 `listfaq.xhtml`。简而言之，`<a4j:commandLink>` 的使用方式与普通的 `<h:commandLink>`
    类似，但它会在 HTML 链接的 `onclick` 属性中生成一些 JavaScript。这些 JavaScript 会调用服务器端的操作方法，然后重新渲染其
    `reRender` 属性中指定的组件。


    [<html](http://www.w3.org/1999/xhtml)


    [**>**](http://richfaces.org/a4j)


    **<head>


    在 Ajax4Jsf 标签库中使用 <commandLink>。


