    **总结**


    在本章中，你学到了如果页面具有通用布局，可以将通用内容提取到一个基础页面中，并使用 `<ui:define>` 标记抽象部分。然后在每个子页面中，使用 `<ui:composition>`
    引入基础页面，并使用 `<ui:define>` 提供每个具体部分。每个部分应该有一个唯一的名称。如果只有一个抽象部分，你可以省略名称，并将具体部分作为 `<ui:composition>`
    元素的主体提供。


    你学到了可以在导航规则中使用星号作为视图 ID。在这种情况下，它将匹配任何视图 ID。如果多个页面共享相同的导航案例，这很有用。如果一个页面需要一些额外的导航案例，它可以有自己的普通导航规则，该规则会被优先检查。


