    As you can see, in Seam, you can have a configuration file for each page. For
    example, if the page is named foo.xhtml, its configuration is named foo.page.xml
    and is stored in the same folder as the page file.


    Chapter 10 ■ USING JBOSS SeaM


    **261**


    How does Seam check the user name and password? It relies on a web bean named


    authenticator. Actually, Seam versions prior to and including 2.1 predate the
    Web Beans specification and therefore do not support web beans. However, these
    versions of Seam do support a similar concept called a component. This authenticator
    component is in the src/hot folder in the Authenticator class in the shop package,
    as shown in Listing 10-6.


    It was generated when seam new-project created the Eclipse project. (Are you wondering
    why the funny name “hot”? Seam can hot deploy components defined in this folder
    when you make changes to them.)


    In Seam, the name of the component is specified using @Name, not @Named, and injection
    is done by @In instead of @Current. @In and @Current work similarly but with one
    very important difference: @In uses the name of the field (for example, identity
    or credentials) to look up the component, while @Current uses the class of the
    field to do that.


    When Seam needs to check the user name and password, it will call the authenticate()
    method. That method can obtain the user name and password entered by the user
    from the Credentials component. If the method returns true, the authentication
    will be considered successful; false indicates a failure. As Listing 10-6 shows,
    instead of looking up a user database or an LDAP directory, Seam hard-codes a
    user named admin without checking the password and tells (any parties concerned)
    that the user has the role of admin. You can take that to mean that the user belongs
    to the admin group. You’ll see how to make use of admin user group privileges
    later.'
