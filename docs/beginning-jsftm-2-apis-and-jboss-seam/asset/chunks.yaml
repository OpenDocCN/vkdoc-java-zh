    \ 3-25 所示。\n\n### 清单 3-25. 为 UI 消息指定 CSS 类\n\n```html\n...\n<style type=\"text/css\"\
    >\nli.c1 { color: red }\nspan.c1 { color: red }\n</style>\n...\n<h:messages errorClass=\"\
    c1\"/>\n<h:form>\n<h:panelGrid columns=\"2\">\n<h:outputText value=\"Weight:\"\
    />\n<h:panelGroup>\n<h:inputText id=\"w\" value=\"#{r.weight}\" label=\"weight\"\
    \ required=\"true\"\nvalidatorMessage=\"weight cannot be negative!\">\n<f:validateLongRange\
    \ minimum=\"0\"/>\n</h:inputText>\n<h:message for=\"w\" errorClass=\"c1\"/>\n\
    </h:panelGroup>\n...\n</h:panelGrid>\n</h:form>\n```\n\n**96**\n\n第 3 章 ■ 验证输入\n\
    \n### 验证多个输入值的组合\n\n假设对于特定客户 `p1`，你永远不会运送重量超过 50 公斤的包裹。因为这涉及重量和客户代码（两个组件），你无法创建一个验证器并将其分配给单个组件。一种方法是在动作方法中执行检查。为此，修改\
    \ `getrequest.xhtml`，如清单 3-26 所示。\n\n### 清单 3-26. 调用用于验证的动作方法\n\n```html\n...\n\
    <h:form>\n<h:panelGrid columns=\"2\">\n<h:outputText value=\"Weight:\" />\n<h:panelGroup>\n\
    ...\n</h:panelGroup>\n<h:outputText value=\"Patron code:\" />\n<h:inputText value=\"\
    #{r.patronCode}\">\n<x:validatePatron />\n</h:inputText>\n<h:outputText value=\"\
    \" />\n<h:commandButton action=\"#{r.onOK}\" value=\"OK\" />\n</h:panelGrid>\n\
    </h:form>\n</body>\n</html>\n```\n\n实现 `onOK()` 方法，如图 3-27 所示。简而言之，它执行检查，如果检查失败，它将记录一条错误消息并返回\
    \ `null` 作为结果，以便重新显示当前页面。\n\n第 3 章 ■ 验证输入\n\n**97**\n\n```java\npublic class Request\
    \ {\n    private int weight;\n    private String patronCode;\n    // 验证请求。此方法定义如下。\n\
    \    public String onOK() {\n        if (!isValid()) {\n            FacesContext\
    \ context = FacesContext.getCurrentInstance();\n            context.addMessage(\"\
    f:w\", new FacesMessage(\n                FacesMessage.SEVERITY_ERROR,\n     \
    \           \"weight too heavy for the patron\", null));\n            // 为此组件记录错误。你必须显式设置\
    \ UI 表单的客户端 ID。\n            return null;\n            // 重新显示当前页面。\n        }\n\
    \        return \"ok\";\n        // 如果你指定 null 作为详细信息消息，它将被视为等于摘要。\n    }\n  \
    \  public boolean isValid() {\n        if (patronCode.equals(\"p1\") && weight\
    \ > 50) {\n            return false;\n        }\n        return true;\n    }\n\
    }\n```\n\n**图 3-27.** `onOK()` 方法\n\n显式设置 UI 表单组件的客户端 ID，如清单 3-27 所示。\n\n### 清单\
