    \ 3-28.** *The whole Request object is validated.*\n\n## Summary\n\nIn this chapter,\
    \ you learned how to validate user input. To validate the user input in a single\
    \ UI Input component, you can add one or more validators to it. They will be invoked\
    \ one by one in the Process Validations phase to check the converted value. If\
    \ any one fails, it will log an error for that component (or rather, for its client\
    \ ID) and tell the JSF engine to jump to the Render Response phase directly.\n\
    \nAs you learned, JSF provides a few predefined validators for checking the range\
