    \        <to-view-id>/step1.xhtml</to-view-id>\n        </navigation-case>\n \
    \       <navigation-case>\n            <from-outcome>finish</from-outcome>\n \
    \           <to-view-id>/thankyou.xhtml</to-view-id>\n        </navigation-case>\n\
    \    </navigation-rule>\n</faces-config>\n```\n\nNow, start the JBoss instance,\
    \ and try to access `http://localhost:8080/Wizard/faces/step1.xhtml` in the browser.\
    \ It should allow you to input the ticket, and the Next and Back buttons should\
    \ work.\n\n**Interference Between Browser Windows**\n\nNow, let’s run an experiment.\
    \ Enter `c1` as the customer ID, and then go to step 2. Then open a new browser\
    \ tab, and display step 1. You’ll see `c1` displayed as the customer ID.\n\nThis\
    \ means the two browser windows are working on the same ticket object. This is\
    \ no good, because the application won’t allow a customer to work on two or more\
    \ tickets at the same time.\n\nAssuming that you should really allow customers\
    \ to work on multiple tickets at the same time, you need to know about something\
    \ called a *conversation*. Whenever a request arrives, Web Beans will allocate\
    \ a web beans table in the session for the browser window (see Figure 8-2). This\
    \ table is the conversation. Such a conversation will be ended (destroyed) automatically\
    \ after the response is rendered.\n\n**220**\n\n**Chapter 8 ■ USING CONVERSATIONS**\n\
    \nWeb Beans creates a conversation.\n\nSession\n\nA request arrives. It is later\
    \ handled and a response is rendered.\n\nConversation\n\n**Name** | **Object**\n\
