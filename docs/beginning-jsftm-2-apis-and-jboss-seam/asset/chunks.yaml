- fmt: 'This can be made better. For example, you could refresh the answer only, not
    the whole page. This way the response will feel much faster and thus provide a
    better user experience. To do that (see Figure 7-3), you need to generate some
    JavaScript for the `onclick` event of the question link (the `<a>` element). Don’t
    worry about how to actually do it now; it will become clear later in the chapter.
    When the link is clicked, that JavaScript will send a request to your application.
    This will cause the action method of the `UI Command` component to execute, which
    will change the form of the answer. Then only the `UI Output` component is asked
    to render again (not the whole page). The `UI Output` component will generate
    some HTML code, which will be returned to the JavaScript in the browser. The JavaScript
    will use that HTML code to update the answer. This entire process is called Ajax.


    2: The link is clicked. The JavaScript sends a request to your application.


    3: Call its action method as usual. This will change the form of the answer.


    1: Generate some JavaScript here.


    ```

    Request


    View Root

    <html>

    ...

    UI Command

    <a onclick="some JavaScript">How to...</a>

    <br/>

    Double-click its icon.

    UI Output

    ...

    </html>

    ```


    5: Return this HTML code to the Javascript. Hopefully it should replace the HTML
    code for the answer.


    4: Only the answer component is asked to render.


    Double-click its icoooooooooooooooooon.


    **Figure 7-3.** *How Ajax works*


    However, there is still a problem: how does the JavaScript know which part of
    the page to update? To solve this problem, you need to explicitly assign an ID
    to the component being refreshed (the `UI Output` component in this case), as
    shown in Figure 7-4. This will cause the component to generate an HTML element
    with a client ID. Then the JavaScript can use the client ID to look up the existing
    HTML element and replace it.


    Chapter 7 ■ BUILDING INteraCtIVe paGeS WIth aJaX


    **187**


    ```

    ...

    <h:form>

    <h:commandLink .../>

    </h:form>

    <br />

    <h:outputText value="..." id="a" />

    <html>

    ...

    <a onclick="some Javascript">How to...</a>

    <br/>

    <span id="a"> Double-click its icon. </span>

    ...

    </html>

    ```


    1: At the beginning, the ID will cause the `UI Output` to generate a `<span>`
    and set the client ID.


    2: When the `UI Output` is refreshed during an Ajax operation, it will also output
    a `<span>` with client ID set.


    3: The JavaScript will use the client ID to look up the existing HTML element
    and replace it.


    `<span id="a">` Double-click its icoooooooooooooooooon. `</span>` **Figure 7-4.**
    *Assigning an ID to identify the HTML element to be updated*


    To implement these ideas, you need to use a JSF component library called `RichFaces`
    from JBoss. Go to `http://labs.jboss.com/jbossrichfaces` to download it. It may
    be something like `richfaces-ui-3.3.0-GA-bin.zip`. Unzip the download into, say,
    `c:\richfaces-ui`. To use it, copy all the JAR files in `c:\richfaces-ui\lib`
    into your `WEB-INF/lib`. `RichFaces` in turn needs a few third-party JAR files.
    You can download them from the Source Code section of the Apress web site (`http://www.apress.com`)
    and unzip the files into `WEB/lib`. Finally, refresh the project in Eclipse.


    The 3.3 version of `RichFaces` doesn’t support JSF 2.0 yet. Because you installed
    JSF 2.0 into the JBoss application server in Chapter 1, you can’t run the application
    being developed on top of it. To solve this problem, you may want to download
    a clean copy of the JBoss application server again and unzip it into, say, `c:\jboss`.
    Then go to `https://facelets.dev.java.net/servlets/ProjectDocumentList` to download
    the latest version of `Facelets`. It has been included in JSF 2.0, but because
    you aren’t using JSF 2.0, you need to include it yourself. The file may be something
    like `facelets-1.1.15.b1`. Unzip it into, say, `c:\facelets`.'
