- fmt: "\n[>](http://java.sun.com/jsf/facelets)\n\n```html\n<body>\n<ui:component>\n\
    **Copyright. #{company}**\n</ui:component>\n</body>\n</html>\n```\n\nHow does\
    \ it work? When JSF is building the component tree, the `<copyright>` tag will\
    \ copy all its attributes into a table (see Figure 5-6). The attribute values\
    \ are treated as EL expressions, and they will be copied as is, without being\
    \ evaluated. Then JSF will go into `copyright.xhtml`. When it sees the EL expression\
    \ `#{company}`, it will link it to the surrounding variable table so that it can\
    \ find the variables when it is evaluated in the future. This kind of variable\
    \ is called an *EL variable*. If you know C/C++, an EL variable is very much like\
    \ a macro in C/C++ in that you can assign a name to an expression.\n\n**158**\n\
