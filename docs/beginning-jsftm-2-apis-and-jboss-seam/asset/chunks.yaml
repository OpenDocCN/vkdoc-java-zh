    接口，并提供一个 processAction() 方法。在该方法中，它通过评估一个 EL 表达式来获取当前请求。如果请求无效，它会通过抛出 AbortProcessingException
    来告知 JSF 停止对该事件的任何进一步处理。在这种情况下，所有后续的动作监听器（如果有的话）和动作方法都将被跳过，因此结果将不会被设置。


