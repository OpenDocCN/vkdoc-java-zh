    **浏览器窗口之间的干扰**


    现在，让我们运行一个实验。输入 **c1** 作为客户 ID，然后转到步骤 2。接着打开一个新的浏览器标签页，并显示步骤 1。您会看到客户 ID 显示为“c1”。


    这意味着两个浏览器窗口正在操作同一个工单对象。这很不好，因为应用程序不允许客户同时处理两个或更多工单。


