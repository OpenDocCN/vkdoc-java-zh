    第 10 章 ■ 使用 JBOSS Seam


    **261**


    Seam 如何检查用户名和密码？它依赖于一个名为 `authenticator` 的 Web Bean。实际上，包括 2.1 版本在内的 Seam 版本都早于
    Web Beans 规范，因此不支持 Web Beans。不过，这些版本的 Seam 确实支持一个类似的概念，称为组件。这个身份验证组件位于 `shop`
    包中的 `Authenticator` 类中，路径为 `src/hot` 文件夹，如清单 10-6 所示。它是在 `seam new-project` 创建
    Eclipse 项目时生成的。（你是否好奇为什么叫“hot”这个有趣的名字？当你对此文件夹中定义的组件进行更改时，Seam 可以热部署它们。）


    在 Seam 中，组件的名称使用 `@Name` 指定，而不是 `@Named`，注入则通过 `@In` 而不是 `@Current` 完成。`@In` 和
    `@Current` 的工作方式类似，但有一个非常重要的区别：`@In` 使用字段的名称（例如 `identity` 或 `credentials`）来查找组件，而
    `@Current` 则使用字段的类来执行查找。


    当 Seam 需要检查用户名和密码时，它会调用 `authenticate()` 方法。该方法可以从 `Credentials` 组件中获取用户输入的用户名和密码。如果该方法返回
    `true`，则身份验证被视为成功；返回 `false` 则表示失败。如清单 10-6 所示，Seam 并未查询用户数据库或 LDAP 目录，而是硬编码了一个名为
    `admin` 的用户，且不检查密码，并告知（任何相关方）该用户具有 `admin` 角色。你可以将其理解为该用户属于 `admin` 组。稍后你将看到如何利用
    `admin` 用户组的权限。

