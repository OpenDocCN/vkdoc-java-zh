    Now, run the application, and try to check out. Unfortunately, the attempt will
    fail with the following error messages:


    Caused by: org.jboss.seam.RequiredException: @In attribute requires non-null value:
    cart.productHome


    at org.jboss.seam.Component.getValueToInject(Component.java:2297)


    at org.jboss.seam.Component.injectAttributes(Component.java:1703)


    at org.jboss.seam.Component.inject(Component.java:1521)


    You can’t check out yet, because when Seam tries to call getPids() on the cart
    component, Seam will try to inject the productHome component into cart component.
    But there is no productHome component, which causes an error. As getPids() doesn’t
    really need the productHome component, you can tell Seam to not to treat this
    as an error (see Listing 10-25).


    **Listing 10-25.** *Marking an Injected Field As Unrequired*


    package shop;


    ...


    @Stateful


    @Name("cart")


    @Scope(ScopeType.SESSION)


    Chapter 10 ■ USING JBOSS SeaM


    **283**


    public class CartBean implements Cart {


    private List<Long> pids;


    **@In(required=false)**


    private ProductHome productHome;


    public CartBean() {


    pids = new ArrayList<Long>();


    }


    @Override


    public void add() {


    Long pid = productHome.getProductId();


    pids.add(pid);


    }


    @Override


    public List<Long> getPids() {


    return pids;


    }


    @Remove


    public void destroy() {


    }


    }


