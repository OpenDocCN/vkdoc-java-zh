    \ refresh the project in Eclipse. Before JSF 2.0, Facelets is an add-on that needs\
    \ to be enabled. To do that, modify `faces-config.xml` as shown in Listing 7-3.\n\
    \n**188**\n\n## Chapter 7 ■ Building Interactive Pages with Ajax\n\n**Listing\
    \ 7-3.** *Enabling Facelets in faces-config.xml (Before JSF 2.0)*\n\n```\n<faces-config\
    \ ...>\n  <application>\n    <view-handler>com.sun.facelets.FaceletViewHandler</view-handler>\n\
    \  </application>\n</faces-config>\n```\n\nNext, modify `WEB-INF/web.xml` as shown\
    \ in Listing 7-4.\n\n**Listing 7-4.** *Changes to web.xml in Order to Use RichFaces*\n\
    \n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<web-app ...>\n  ...\n  <servlet>\n\
    \    <servlet-name>JSF</servlet-name>\n    <servlet-class>javax.faces.webapp.FacesServlet</servlet-class>\n\
    \  </servlet>\n  <servlet-mapping>\n    <servlet-name>JSF</servlet-name>\n   \
    \ <url-pattern>/faces/*</url-pattern>\n  </servlet-mapping>\n  <context-param>\n\
    \    <param-name>org.richfaces.SKIN</param-name>\n    <param-value>blueSky</param-value>\n\
    \  </context-param>\n  <context-param>\n    <param-name>org.richfaces.CONTROL_SKINNING</param-name>\n\
    \    <param-value>enable</param-value>\n  </context-param>\n  <filter>\n    <display-name>RichFaces\
    \ Filter</display-name>\n    <filter-name>richfaces</filter-name>\n    <filter-class>org.ajax4jsf.Filter</filter-class>\n\
    \  </filter>\n  <filter-mapping>\n    <filter-name>richfaces</filter-name>\n \
    \   <servlet-name>JSF</servlet-name>\n    <dispatcher>REQUEST</dispatcher>\n \
    \   <dispatcher>FORWARD</dispatcher>\n    <dispatcher>INCLUDE</dispatcher>\n \
    \ </filter-mapping>\n</web-app>\n```\n\n**189**\n\nYou don’t need to completely\
    \ understand the meaning of this code, but basically, it is used to enable RichFaces\
    \ to intercept requests so that it can deliver JavaScript to the browser.\n\n\
    Next, modify `listfaq.xhtml` as shown in Figure 7-5. In summary, the `<a4j:commandLink>`\
    \ is used like a normal `<h:commandLink>`, but it will generate some JavaScript\
    \ into the `onclick` attribute of the HTML link. That JavaScript will call the\
    \ action method on the server and then rerender the component specified in its\
    \ `reRender` attribute.\n\n```\n<html xmlns=\"http://www.w3.org/1999/xhtml\"\n\
    \      xmlns:a4j=\"http://richfaces.org/a4j\">\n<head>\n  <meta http-equiv=\"\
    Content-Type\" content=\"text/html; charset=UTF-8\" />\n  <title>Insert title\
    \ here</title>\n</head>\n<body>\n  <h:form>\n    <a4j:commandLink action=\"#{faqService.trigger}\"\
    \n                     value=\"#{faqService.questionText}\"\n                \
    \     reRender=\"a\" />\n  </h:form>\n  <br />\n  <h:outputText value=\"#{faqService.answerText}\"\
    \ id=\"a\" />\n</body>\n</html>\n```\n\n**Figure 7-5.** *Using `<a4j:commandLink>`*\n\
    \nWhen you run the application, clicking the question will change the form of\
    \ the answer, while this time no progress bar will be displayed in the browser,\
    \ indicating that the page as a whole is not refreshed.\n\n### Hiding and Showing\
    \ the Answer\n\nSuppose that instead of changing the form of the answer, now you’d\
    \ like to hide or show the answer. For simplicity, let’s do it without Ajax first.\
    \ Modify `listfaq.xhtml` as shown in Listing 7-5.\n\n**190**\n\n## Chapter 7 ■\
    \ Building Interactive Pages with Ajax\n\n**Listing 7-5.** *Using the rendered\
    \ Attribute*\n\n```\n<!DOCTYPE html PUBLIC \"-//W3C//DTD XHTML 1.0 Strict//EN\"\
    \n    \"http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd\">\n<html xmlns=\"http://www.w3.org/1999/xhtml\"\
    \n      xmlns:a4j=\"http://richfaces.org/a4j\">\n<head>\n  <meta http-equiv=\"\
    Content-Type\" content=\"text/html; charset=UTF-8\" />\n  <title>Insert title\
    \ here</title>\n</head>\n<body>\n  <h:form>\n    <h:commandLink\n        action=\"\
    #{faqService.trigger}\"\n        value=\"#{faqService.questionText}\" />\n  </h:form>\n\
    \  <br />\n  <h:outputText value=\"#{faqService.answerText}\" id=\"a\"\n     \
    \           rendered=\"#{faqService.showingAnswer}\"/>\n</body>\n</html>\n```"
