    at sun.reflect.NativeMethodAccessorImpl.invoke0(Native Method)


    at ...


    This time, the user hasn’t logged in yet, and thus the user name is null. To solve
    this problem, you should force the user to log in before viewing the confirmation
    page. To do that, create the confirm.page.xml file along with the confirm.xhtml
    file. The content is shown in Listing 10-26.


    **Listing 10-26.** *Requiring Authenticated Access to a Page*


    <?xml version="1.0" encoding="UTF-8"?>


    [<page](http://jboss.com/products/seam/pages)


    [xsi:schemaLocation="http://jboss.com/products/seam/pages](http://www.w3.org/2001/XMLSchema-instance)


