    **URL Mismatched?**


    If you’re careful, you may have noticed that after clicking Next at step 1, step
    2 is indeed displayed, but the URL is still pointing to step 1\. Why? When you
    first enter the URL to step1.xhtml and press Enter (see Figure 8-5), a request
    is sent, and step1.xhtml will gener-


    ate a response. So, you see step 1 in the browser window. But what is the action
    attribute of the HTML form? If the user clicks the Next button, you’ll definitely
    want the original component tree of step 1 to handle the form submission so that,
    for example, the various UI Input components can update their web beans using
    the user input in the request.


    Therefore, the action attribute should still point to step1.xhtml, which is indeed
    what is done by the UI Form component. That is, it will set the action attribute
    to invoke the then- current page. Now, when the user clicks the Next button, the
    browser will copy that action attribute (for step1.xhtml) into the location URL
    and then send the request to the step1.xhtml for handling. step1.xhtml will handle
    it and then pass the rendering (through the JSF navigation system) to step2.xhtml.
    As a result, you’ll see the step 2 in the browser window, but the location URL
    is still for step1.xhtml.


