    **Summary**


    Whenever you see duplicated code in XHTML files, it’s high time that you considered
    extracting the duplicated code into a custom component. To do that, as you learned
    in this chapter, you can define a tag lib by putting a *.taglib.xml file into
    the META- INF folder.


    For each tag, specify the source XHTML file, and put the duplicated code in that
    XHTML


    file.


    You also learned that you can pass parameters to a custom tag. At tree construc-


    tion time, parameters will be formed into a variable table, and the EL expressions
    in the source file will be linked to it. At render time, they will trace into
    the variable table to get the value as an EL expression for evaluation.


    The EL expression can evaluate to a value/object only. It must not evaluate to
    a method.


    To pass a method to the custom tag, pass an object that hosts the method.


    You can’t pass XHTML code to a custom tag through a parameter and expect JSF to
    parse the code. To do that, put the code into the body of the tag, or use <ui:define>
    if you have multiple pieces of code. The custom component can trace into the code
    to build the subtree using <ui:insert>.'
