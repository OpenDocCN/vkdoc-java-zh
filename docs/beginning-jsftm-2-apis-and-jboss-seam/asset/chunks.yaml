  trans: "\n要在多个项目中复用自定义标签，你可以将 META-INF 文件夹导出为 JAR 文件并重复使用。\n\n最后，你了解到可以通过在类路径（`META-INF/resources`）上的特殊位置，使用标签库的短名称创建一个文件夹，从而无需使用\
    \ `taglib.xml` 文件即可创建标签库。该短名称也用于派生命名空间 URL。此类标签库中的组件会提供更多关于其参数的信息，供可视化工具使用。要访问它们的参数，组件需要在\
    \ EL 表达式中使用特殊名称从 `Map` 中获取。\n\n![图片 69](img/index-187_1.png)\n\n![图片 70](img/index-187_2.png)\n\
    \n第 6 章\n\n为页面提供通用布局\n\n**通**常，给定应用程序中的所有页面都需要具有统一的布局。\n\n在本章中，你将学习如何轻松地为应用程序中的所有页面应用通用布局。\n\
    \n**在不同页面上使用相同菜单**\n\n假设你想开发一个如图 6-1 所示的应用程序。该应用程序的功能并不重要。重要的是每个页面的左侧都有相同的菜单。\n\
    \n**图 6-1.** *所有页面左侧都有一个菜单。*\n\n为此，创建一个名为 `Layout` 的新动态 Web 项目。你将创建两个页面：`home.xhtml`\
    \ 和 `products.xhtml`。图 6-2 显示了这些页面的结构。\n\n你可以看到，XHTML 页面结构相同，唯一的区别是右侧单元格的内容。\n\
    \n**173**\n\n**174**\n\n第 6 章 ■ 为页面提供通用布局\n\nHtml\n\nHtml\n\nForm\n\nForm\n\n\
    Table\n\nTable\n\nRow\n\nRow\n\nCell\n\nCell\n\nCell\n\nCell\n\n菜单\n\n首页特有内容\n\
    \n菜单\n\n产品页特有内容\n\n**图 6-2.** *共享通用结构的页面*\n\n每当你看到重复的 XHTML 代码时，都应将其提取到公共位置。例如，如果将其提取到组件中，就可以在两个页面中复用（参见清单\
    \ 6-1 中 `home.xhtml` 使用假设组件的情况），但你仍然需要重复 `<html>` 标签、`<head>` 标签、`<body>` 标签、任何\
    \ CSS 样式等，如清单 6-1 中突出显示的部分。\n\n**清单 6-1.** *使用自定义组件并不能消除所有重复代码*\n\n```xml\n<?xml\
    \ version=\"1.0\" encoding=\"UTF-8\" ?>\n<!DOCTYPE html PUBLIC \"-//W3C//DTD XHTML\
    \ 1.0 Strict//EN\"\n\"http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd\">\n<html\
    \ xmlns=\"http://www.w3.org/1999/xhtml\"\n      xmlns:h=\"http://java.sun.com/jsf/html\"\
    \n      xmlns:foo=\"http://foo.com\">\n<head>\n<meta http-equiv=\"Content-Type\"\
    \ content=\"text/html; charset=UTF-8\" />\n<link rel=\"stylesheet\" type=\"text/css\"\
    \ href=\"style1.css\"/>\n<link rel=\"stylesheet\" type=\"text/css\" href=\"style2.css\"\
    />\n</head>\n<body>\n<foo:mycomponent>\nThis is the Home page.\n</foo:mycomponent>\n\
    </body>\n</html>\n```\n\n第 6 章 ■ 为页面提供通用布局\n\n**175**\n\n与其重复所有这些代码，不如将重复的代码提取到一个包含某些抽象部分的基础页面中（见图\
    \ 6-3）。然后，让每个页面继承该基础页面并提供其独特的内容，就像 Java 类继承一样。\n\n基础页面\n\n抽象\n\n首页\n\n产品页\n\n\
    独特内容\n\n独特内容\n\n**图 6-3.** *页面继承*\n\n为此，创建 `base.xhtml`（也在 `WebContent` 文件夹中），如清单\
    \ 6-2 所示。注意它如何使用 `<ui:insert>` 标签来插入抽象部分，这与上一章中自定义组件的做法完全相同。\n\n**清单 6-2.** *基础页面*\n\
    \n```xml\n<?xml version=\"1.0\" encoding=\"UTF-8\" ?>\n<!DOCTYPE html PUBLIC \"\
    -//W3C//DTD XHTML 1.0 Strict//EN\"\n\"http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd\"\
    >\n<html xmlns=\"http://www.w3.org/1999/xhtml\"\n      xmlns:ui=\"http://java.sun.com/jsf/facelets\"\
    >\n<head>\n<meta http-equiv=\"Content-Type\" content=\"text/html; charset=UTF-8\"\
    \ />\n<title>在此处插入标题</title>\n</head>\n<body>\n<h:form>\n<table>\n<tr>\n<td width=\"\
    40%\"><h:commandLink action=\"home\">首页</h:commandLink> <br />\n```"
