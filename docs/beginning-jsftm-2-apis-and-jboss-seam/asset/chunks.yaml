    **Figure 1-2.** *The software that you’ll need*


    ## Installing Eclipse


    You need to make sure you have the Eclipse IDE for Java EE Developers, as shown
    in Figure 1-3 (note that the Eclipse IDE for Java Developers is *not* enough,
    because it doesn’t include tools for developing web applications). You can go
    to [http://www.eclipse.org](http://www.eclipse.org) to download it. For example,
    you’ll need the `eclipse-jee-ganymede-SR1-win32.zip` file if you use Windows.
    Unzip it into a convenient location, such as `c:\eclipse`. Then, create a shortcut
    to run `c:\eclipse\eclipse -data c:\workspace`. This way, it will store your projects
    under the `c:\workspace` folder.


    You need this one, NOT that one:


    **Figure 1-3.** *Getting the right bundle of Eclipse*


    ![Image 4](index-17_1.png)


    ![Image 5](index-17_2.png)


    Chapter 1 ■ Getting Started with JSF


    **3**


    To see whether it’s working, run it, and make sure you can switch to the Java
    EE perspective (it should be the default; if not, choose Window ➤ Open Perspective
    ➤ Other), as shown in Figure 1-4.


    **Figure 1-4.** *The Java EE perspective*


    ## Installing JBoss


    To install JBoss, go to [http://www.jboss.org/jbossas/downloads](http://www.jboss.org/jbossas/downloads)
    to download a binary package of JBoss Application Server 5.x (or newer), such
    as `jboss-5.0.1.GA.zip`. Unzip it into a folder such as `c:\jboss`. To test whether
    it is working, you can try to launch JBoss in Eclipse. To do that, choose Windows
    ➤ Preferences in Eclipse, and then choose Server ➤ Installed Runtime Environments.
    You’ll see the window shown in Figure 1-5.


    **Figure 1-5.** *The installed runtime environments*


    ![Image 6](index-18_1.png)


    ![Image 7](index-18_2.png)


    **4**


