    **本**章将学习如何创建一个电子商店。这包括展示产品列表（使用循环）、为每个用户实现购物车、支持用户登录和注销，以及要求结账页面需经过身份验证才能访问。


    假设你想创建如图 4-1 所示的电子商店。初始状态下，页面会列出所有产品。点击某个产品链接将显示该产品的详情页面。


    点击链接将

    显示该产品的

    详情页面。


    此处列出了三个产品。

    你可以在此区域显示产品的

    第一个产品的 ID 为 p01，

    部分详细信息，但为了

    名称为“铅笔”，价格为 1.2 美元。

    简便起见，此处不做任何操作。


    **图 4-1.** *你的电子商店*


    **101**


    **102**


    第 4 章 ■ 创建电子商店


    **列出产品**


    好的，我们开始吧。创建一个名为 Shop 的动态 Web 项目。然后创建一个 catalog.xhtml 页面。如何列出产品？这里的问题是，假设产品是从数据库加载的；因此，你无法预先知道产品的数量，所以不能像清单
    4-1 那样使用`<h:panelGrid>`预先布局。


    **清单 4-1.** *你不知道要布局多少个产品*


    <h:panelGrid...>


    产品 1


    产品 2


    产品 3 -> 但你怎么知道只有三个产品呢？


    </h:panelGrid>


    要在运行时执行循环，你可以使用`<h:dataTable>`，如图 4-2 所示。简而言之，它会遍历列表中的每个元素。对于每个元素，它会渲染内部指定的所有列。图
    4-3 显示了将要创建的组件树。


    你在此处指定一个产品列表。

    如果它包含，比如说，10 个产品，

    数据表将循环 10 次。


