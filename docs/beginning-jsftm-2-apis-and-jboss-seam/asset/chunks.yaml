    接下来你将实现 Cart 类。


    **依 赖 注 入**


    Java 应用程序由 Java 接口和类组成，这些接口和类构成了相互交互以完成应用程序任务的组件。这些组件对象相互依赖，因此如果一个对象使用其他对象来完成其工作，则该对象是*依赖的*。由此可知，被依赖对象所使用的其他对象被称为该对象的*依赖项*。


    如果一个对象负责从其环境中提供其依赖项，则该对象会拉取依赖项。对象可以通过实例化依赖项或为它们查找外部对象来实现这一点。


    拉取依赖项是 Java 中使用对象的传统方式。


    相比之下，另一个对象可以负责提供依赖项并将其推入该对象。这种方法称为*依赖注入*，依赖项由第三方*注入*到依赖对象中。对于 Web Bean 而言，Web
    Bean 实现会将它们的依赖项推入其中，这就是一个 Web Bean 获取对另一个 Web Bean 引用的方式。


    第 4 章 ■ 创建电子商店


    **119**


    你需要将购物车作为一个 Web Bean。它应该是什么作用域？如果你将其放入请求作用域，当请求结束时它就会消失。如果你将其放入应用程序作用域，所有用户将共享同一个购物车。为了解决这个问题，你需要理解：每当一个新用户开始使用你的应用程序时，Web
    容器都会为该会话分配内存。会话何时会被删除？如果用户在一定时间内（例如 30 分钟）没有发送任何请求，Web 容器就会删除该会话。这个超时时间是可以配置的。会话也可以通过编程方式销毁。


    由于会话具有按用户划分的特性，因此它是存储每个用户临时数据（例如购物车）的最佳位置。如何做到这一点？最初，每个会话中都有一个空的 Web Bean 表。要将购物车放入会话，请创建如清单
    4-17 所示的 Cart 类。`@SessionScoped` 表示，一旦创建，Cart 对象就应该被放入会话中。但为什么它需要实现 `Serializable`？这是因为如果你有一个集群，Web
    容器可能需要将会话内容保存到磁盘或通过网络发送到另一台计算机。在这种情况下，它需要将会话中的所有对象转换为字节。这要求它们的所有类都实现 `Serializable`。


    **清单 4-17.** *将购物车放入会话*


    package shop;


    ...


    @SessionScoped


    public class Cart implements Serializable {


    }


    实现 Cart 类的其余部分，如清单 4-18 所示。


    **120**


    第 4 章 ■ 创建电子商店


    **清单 4-18.** *实现 Cart 类的其余部分*


    ...


    @SessionScoped


    public class Cart implements Serializable {


    **private List<String> productIds;**


    **public Cart() {**


    **productIds = new ArrayList<String>();**


    **}**


    **public void add(String pid) {**


    **productIds.add(pid);**


    **}**


    }


    `ProductHolder` 类的 `addToCart()` 方法返回结果 "added"。你需要在 `faces-config.xml` 中为其定义一个导航规则，以显示下一页（见清单
    4-19）。


    **清单 4-19.** *将产品添加到购物车后显示下一页*


    <faces-config ...>


    <application>


    <view- handler>com.sun.facelets.FaceletViewHandler


    </view- handler>


    </application>


    <navigation- rule>


    <from-view-id>/catalog.xhtml</from-view- id>


    <navigation- case>


    <from-outcome>detail</from- outcome>


    <to-view-id>/detail.xhtml</to-view- id>


    </navigation- case>


    </navigation- rule>


    **<navigation- rule>**


    **<from-view-id>/detail.xhtml</from-view- id>**


    **<navigation- case>**


    **<from-outcome>added</from- outcome>**


    **<to-view-id>/cart.xhtml</to-view- id>**


    **</navigation- case>**


    **</navigation- rule>**


    </faces-config>


    第 4 章 ■ 创建电子商店


