    **Displaying the Content of the Shopping Cart**


    How do you display the product IDs on the cart page? Obviously, you need to loop
    through the product IDs stored in the shopping cart. Can you use <h:dataTable>?
    Unfortunately, it will always output an HTML <table>, which is not what’s desired
    here. To loop but without adding its own markup, you can use the <ui:repeat> tag.
    It works almost exactly like the


    <h:dataTable> tag. For example, modify cart.xhtml as shown in Listing 4-25\. <ui:repeat>
    will simply loop through the list and render its children in each iteration. Because
    it outputs no markup by itself, it has nothing to do with HTML, so it is not in
    the JSF HTML tag lib. Note that <h:outputText> is outputting a space after the
    product ID.


