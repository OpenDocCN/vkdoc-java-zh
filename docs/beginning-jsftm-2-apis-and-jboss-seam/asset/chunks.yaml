    **Figure 2-39.** *Injecting b2 into b1*\n\nRun the application, and it should\
    \ continue to work.\n\n---\n\n## Summary\n\nIn this chapter, you learned about\
    \ how to use forms to get input from users. To handle a form submission, JSF will\
    \ go through the following phases: Apply Request Values (store the raw input strings),\
    \ Process Validations (convert the strings into objects and validate them), Update\
    \ Domain Values (store the converted values into web beans), Invoke Application\
    \ (set the outcome and determine the view ID of the next page), and Render Response\
    \ (render the next page).\n\nIf there is any error in the Process Validations\
    \ phase, it will jump right to the Render Response phase so that the web beans\
    \ are not updated, the outcome is not set, and the current page is redisplayed.\n\
    \nTo let the user edit a string in a text field, use the UI Input component, and\
    \ set its `value` attribute to link it to the property of a web bean. To let the\
    \ user choose an entry from a combo box, use the UI Select One component. You\
    \ can also set its `value` attribute to link it to the property of a web bean.\
    \ In addition, you need to provide a list of `SelectItem` items to it. Each `SelectItem`\
    \ contains an object (the value) and its string presentation (the label).\n\n\
    For a UI Input component, if the type of the property is not a string or a built-in\
    \ type such as `Integer` or `Double`, you need provide a converter to the UI Input\
    \ component. If there is a conversion error, it will log an error message.\n\n\
    The UI Input component assumes that the input is optional and will convert an\
    \ empty string into `null` (or leave it unchanged if the type of the property\
    \ is string). If the input is mandatory, you need set the `required` attribute\
    \ to `true`. Then it will log an error if no input is provided.\n\nTo display\
    \ error messages, use the UI Messages component.\n\nTo let the user click a button,\
    \ use a UI Command component. Specify the outcome in its `action` attribute. JSF\
    \ will use the current view ID to look up the right navigation rule and use the\
    \ outcome to look up the right navigation case to find the next view ID. The UI\
    \ Command component will schedule a listener to set the outcome in the Invoke\
    \ Application phase so that if there is any conversion or validation error, it\
