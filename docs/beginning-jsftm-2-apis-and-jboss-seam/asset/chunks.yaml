    Java requires that such files be in a special encoding called *escaped Unicode
    encoding*. For example, the Chinese equivalent of “Current date” consists of four
    Unicode characters, as shown in Figure 9-2\. The figure also shows their Unicode
    values (hexadecimal). The properties file should be written as their Unicode values.


