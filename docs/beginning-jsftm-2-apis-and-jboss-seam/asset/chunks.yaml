    ok\" value=\"OK\">\n      <f:actionListener type=\"postage.RequestValidatingListener\"\
    />\n    </h:commandButton>\n  </h:panelGrid>\n</h:form>\n```\n\nCreate this `RequestValidatingListener`\
    \ class in the `postage` package. Listing 3-29 shows the content. It has to implement\
    \ the `ActionListener` interface provided by JSF and provide a `processAction()`\
    \ method. In that method it acquires the current request by evaluating an EL expression.\
    \ If the request is invalid, it tells JSF to stop any further processing on this\
    \ event by throwing an `AbortProcessingException`. In that case, all further action\
    \ listeners (if any) and the action method will be skipped, and thus the outcome\
    \ will not be set.\n\n![Image 50](index-113_1.png)\n\n### **Listing 3-29.** *The\
    \ RequestValidatingListener Class*\n\n```java\npublic class RequestValidatingListener\
    \ implements ActionListener {\n  public void processAction(ActionEvent event)\n\
    \      throws AbortProcessingException {\n    FacesContext context = FacesContext.getCurrentInstance();\n\
    \    Application app = context.getApplication();\n    Request req = (Request)\
    \ app.evaluateExpressionGet(context, \"#{r}\", Request.class);\n    if (!req.isValid())\
    \ {\n      context.addMessage(\"f:w\", new FacesMessage(\n          FacesMessage.SEVERITY_ERROR,\n\
    \          \"weight too heavy for the patron\",\n          null));\n      throw\
    \ new AbortProcessingException();\n    }\n  }\n}\n```\n\nNote that the properties\
    \ of the `Request` object will have been updated in the Update Domain Values phase\
    \ while the action listener is executed in the Invoke Application phase. Now,\
