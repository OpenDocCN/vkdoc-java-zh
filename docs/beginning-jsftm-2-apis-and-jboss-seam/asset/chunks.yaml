    \ 9-20.\n\n**Listing 9-19.** *Specifying the Format and Style for `{0}` in `msgs.properties`*\n\
    ```\ncurrentDate=Current date\ntodayIs=Today is: {0, date, long}.\nchange=Change\n\
    ```\n\n**Listing 9-20.** *Specifying the Format and Style for `{0}` in `msgs_zh.properties`*\n\
    ```\ncurrentDate=當前日期\ntodayIs=今日是：{0, date, long}.\nchange=變更\n```\n\nNow when\
    \ you run the application, the date should appear in the long style. Table 9-1\
    \ shows some more examples for date, time, and currency.\n\n![Image 83](index-260_1.png)\n\
    \n**246**\n\nChapter 9 ■ Supporting Other Languages\n\n**Table 9-1.** *Different\
    \ Formats and Styles*\n\n| Placeholder | Meaning |\n| --- | --- |\n| `{0, date,\
    \ short}` | Format it as a date using the short style. |\n| `{0, date, full}`\
    \ | Format it as a date using the full style. |\n| `{0, time, short}` | Format\
    \ it as a time using the short style. |\n| `{0, time, long}` | Format it as a\
    \ time using the long style. |\n| `{0, number, currency}` | Format it as a number\
    \ using the currency style. |\n| `{0, number, integer}` | Format it as a number\
    \ using the integer style. |\n\n## Displaying a Logo\n\nNow, suppose that you’d\
    \ like to display a logo on the page, as shown in Figure 9-10.\n\n**Figure 9-10.**\
    \ *Using a logo*\n\nNote the character “4” in the logo, meaning “for” in this\
