    **总结**


    Web Beans 提供了一个非常强大的作用域：会话作用域。正如你在本章中学到的，会话是会话中针对特定浏览器标签页/窗口的一个表格。你可以让一个会话长时间运行，之后再将其转换回
    Java 代码。在其生命周期内，所有会话作用域的 web beans 将在不同请求之间保持可用。


    要渲染下一页，你可以选择简单的渲染或重定向。重定向会在浏览器中显示新的 URL，并且与“重新加载/刷新”按钮配合良好。


    如果某个页面需要将一个 web bean 传递给下一页，则该 web bean 应处于会话作用域内，以允许重定向。


