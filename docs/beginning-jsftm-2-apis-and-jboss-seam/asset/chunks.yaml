- fmt: "```java\npublic Long getId() {\n    return id;\n}\n\npublic void setId(Long\
    \ id) {\n    this.id = id;\n}\n\npublic String getName() {\n    return name;\n\
    }\n\npublic void setName(String name) {\n    this.name = name;\n}\n\npublic double\
    \ getPrice() {\n    return price;\n}\n\npublic void setPrice(double price) {\n\
    \    this.price = price;\n}\n```\n\nNext, you need to create a page to let the\
    \ user add products. Surprisingly, Seam can do that automatically for you. In\
    \ the same command prompt you used before, issue `seam generate-ui`. This command\
    \ will scan the `src/main` folder for classes with the `@Entity` annotation. For\
    \ each such class, the command will create a page to search and list the objects,\
    \ a page to view an object, and a page to edit an object.\n\nNow, refresh the\
    \ project in Eclipse so that it notes the new files. Note that three pages should\
    \ have been created in the `view` folder: `Product.xhtml` (for viewing a product),\
    \ `ProductEdit.xhtml` (for editing a product), and `ProductList.xhtml` (for searching\
    \ and listing products).\n\nTo see if these pages are working, go to [http://localhost:8080/SeamShop/home.seam](http://localhost:8080/SeamShop/home.seam)\
    \ again. You should see a Product List link at the top, as shown in Figure 10-3.\
    \ Click the link to take you to the product list page.\n\n![Image 85](index-274_1.png)\n\
    ![Image 86](index-274_2.png)\n\n**Figure 10-3.** *The Product List link*\n\nIf\
    \ you try to create a product by clicking the Create Product button on the product\
    \ list page, the application will ask you to log in first, because the product-editing\
    \ page has been declared as requiring a logged-in user. This requirement is set\
    \ in the `ProductEdit.page.xml` file in the `view` folder, as shown in Listing\
    \ 10-5.\n\n**Listing 10-5.** *Requiring Authenticated Access to a Page*\n\n```xml\n\
    <?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<page xmlns=\"http://jboss.com/products/seam/pages\"\
    \n      xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n      xsi:schemaLocation=\"\
    http://jboss.com/products/seam/pages\n                          http://jboss.com/products/seam/pages-2.1.xsd\"\
    \n      no-conversation-view-id=\"/ProductList.xhtml\"\n      login-required=\"\
    true\">\n    ...\n</page>\n```\n\nAs you can see, in Seam, you can have a configuration\
    \ file for each page. For example, if the page is named `foo.xhtml`, its configuration\
    \ is named `foo.page.xml` and is stored in the same folder as the page file.\n\
    \nHow does Seam check the user name and password? It relies on a web bean named\
    \ `authenticator`. Actually, Seam versions prior to and including 2.1 predate\
    \ the Web Beans specification and therefore do not support web beans. However,\
    \ these versions of Seam do support a similar concept called a component. This\
    \ `authenticator` component is in the `src/hot` folder in the `Authenticator`\
    \ class in the `shop` package, as shown in Listing 10-6. It was generated when\
    \ `seam new-project` created the Eclipse project. (Are you wondering why the funny\
    \ name “hot”? Seam can hot deploy components defined in this folder when you make\
    \ changes to them.)\n\nIn Seam, the name of the component is specified using `@Name`,\
    \ not `@Named`, and injection is done by `@In` instead of `@Current`. `@In` and\
    \ `@Current` work similarly but with one very important difference: `@In` uses\
    \ the name of the field (for example, `identity` or `credentials`) to look up\
    \ the component, while `@Current` uses the class of the field to do that.\n\n\
    When Seam needs to check the user name and password, it will call the `authenticate()`\
    \ method. That method can obtain the user name and password entered by the user\
    \ from the `Credentials` component. If the method returns `true`, the authentication\
    \ will be considered successful; `false` indicates a failure. As Listing 10-6\
    \ shows, instead of looking up a user database or an LDAP directory, Seam hard-codes\
    \ a user named `admin` without checking the password and tells (any parties concerned)\
    \ that the user has the role of `admin`. You can take that to mean that the user\
    \ belongs to the `admin` group. You’ll see how to make use of `admin` user group\
    \ privileges later."
