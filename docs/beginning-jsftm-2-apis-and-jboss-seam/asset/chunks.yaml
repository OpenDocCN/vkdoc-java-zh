    \nBecause a namespace could contain more than one tag, conceptually you could\
    \ define multiple tags, as shown in Listing 5-2.\n\n**Listing 5-2.** *Defining\
    \ Multiple Tags Conceptually*\n\n```\nnamespace: http://foo.com\ntag1: copyright\n\
