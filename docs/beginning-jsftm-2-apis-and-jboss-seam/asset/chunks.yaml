    JAR 文件。你可以从 Apress 网站的源代码部分（http://www.apress.com）下载它们，并将文件解压到 `WEB/lib` 目录中。


    最后，在 Eclipse 中刷新项目。


    RichFaces 的 3.3 版本尚不支持 JSF 2.0。因为你在第 1 章中已将 JSF 2.0 安装到 JBoss 应用服务器中，所以无法在其上运行正在开发的应用。为了解决这个问题，你可能需要再次下载一份干净的
    JBoss 应用服务器副本，并将其解压到，例如，`c:\jboss`。然后访问 https://facelets.dev.java.net/servlets/ProjectDocumentList
    下载最新版本的 Facelets。它已被包含在 JSF 2.0 中，但由于你没有使用 JSF 2.0，你需要自己包含它。该文件可能类似于 `facelets-1.1.15.b1`。将其解压到，例如，`c:\facelets`。

