    要实现这个想法，你需要使用一个 Web Bean 提供一个产品列表。因此，在 shop 包中创建一个 Catalog 类，如清单 4-2 所示。由于目录是全局性的，请使用应用程序作用域。此外，为了简便起见，我们不从数据库加载产品，而是直接将它们硬编码到一个列表中。


