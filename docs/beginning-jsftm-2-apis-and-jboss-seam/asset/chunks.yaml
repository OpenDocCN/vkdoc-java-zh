    Chapter 10 ■ USING JBOSS SeaM


    [http://jboss.com/products/seam/pages-2.1.xsd"](http://jboss.com/products/seam/pages-2.1.xsd)


    **login-required="true">**


    </page>


    Now, try to check out again, and the application should force you to log in. Log
    in as u1 to see the total amount and the credit card number properly.


    **Using WebLogic, WebSphere, or GlassFish**


    Even though you used JBoss in this chapter, the code you developed should run
    fine on other EJB3 servers such as WebLogic, WebSphere, or GlassFish. However,
    for each particular type of server, you may need to perform some specific setup
    adjustments. Consult the Seam documentation for more information.


    **Summary**


    In the chapter, you’ve learned that if a class is annotated with @Entity, its
    instances can be easily saved to or loaded from a database table with JBoss. Seam
    can generate pages for such a class for searching and listing the instances and
    for viewing and editing of a particular instance. You can further annotate its
    fields to specify constraints.


    You also learned that you can use session beans to achieve better scalability.
    If a bean instance contains states, make it a stateful bean; otherwise, make it
    a stateless bean.


    Whether your bean is stateful or stateless, JBoss will create and destroy the
    bean instances, and the application will access a bean instance using a proxy.
    To save memory when working with stateful beans, JBoss may save bean instances
    to the hard disk and load them back when they are needed again. JBoss will have
    less work to do for a stateless bean: it can simply destroy and create them.'
