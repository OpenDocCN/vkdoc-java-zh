- fmt: "Therefore, in your action listener, you can readily access the selected `Product`\
    \ object from the `p` attribute. So, create the `OnDetailActionListener` class\
    \ in the `shop` package (see Listing 4-11).\n\n**Listing 4-11.** *Accessing the\
    \ Current Product in Your Action Listener*\n\n```\npackage shop;\n...\npublic\
    \ class OnDetailActionListener implements ActionListener {\n    @Override\n  \
    \  public void processAction(ActionEvent ev) throws AbortProcessingException {\n\
    \        FacesContext context = FacesContext.getCurrentInstance();\n        Application\
    \ app = context.getApplication();\n        Product p = (Product) app.evaluateExpressionGet(context,\
    \ \"#{p}\", Product.class);\n        System.out.println(p.getId());\n    }\n}\n\
    ```\n\nWhen you run the application now, it should print the product ID to the\
    \ console.\n\nNow, the next step is to display the detail of the `Product` in\
    \ the detail page. Can the detail page find the `Product` in the `p` attribute?\
    \ No, it can’t, because the attribute will have been removed. To solve this problem,\
    \ you can use your action listener to store the `Product` object into a web bean.\
    \ To do that, create a `ProductHolder` class in the `shop` package, as shown in\
    \ Listing 4-12.\n\n**Listing 4-12.** *Using a Web Bean to Hold the Current Product\
    \ Object*\n\n```\npackage shop;\n...\n@Named(\"ph\")\n@RequestScoped\npublic class\
    \ ProductHolder {\n    private Product currentProduct;\n    public Product getCurrentProduct()\
    \ {\n        return currentProduct;\n    }\n    public void setCurrentProduct(Product\
    \ currentProduct) {\n        this.currentProduct = currentProduct;\n    }\n}\n\
    ```\n\nThen modify your action listener as shown in Listing 4-13.\n\n**Listing\
    \ 4-13.** *Using a Web Bean to Hold the Current Product Object*\n\n```\npublic\
    \ class OnDetailActionListener implements ActionListener {\n    @Override\n  \
    \  public void processAction(ActionEvent ev) throws AbortProcessingException {\n\
    \        FacesContext context = FacesContext.getCurrentInstance();\n        Application\
    \ app = context.getApplication();\n        Product p = (Product) app.evaluateExpressionGet(context,\
    \ \"#{p}\", Product.class);\n        ProductHolder ph = (ProductHolder) app.evaluateExpressionGet(context,\
    \ \"#{ph}\", ProductHolder.class);\n        ph.setCurrentProduct(p);\n    }\n\
    }\n```\n\nAlternatively, recall that an EL expression not only can be queried\
    \ to get the value but also can be used to set the value. Therefore, you could\
    \ modify the code as shown in Figure 4-10.\n\n```\npublic class OnDetailActionListener\
    \ implements ActionListener {\n    @Override\n    public void processAction(ActionEvent\
    \ ev) throws AbortProcessingException {\n        FacesContext context = FacesContext.getCurrentInstance();\n\
    \        Application app = context.getApplication();\n        Product p = (Product)\
    \ app.evaluateExpressionGet(context, \"#{p}\", Product.class);\n        ProductHolder\
    \ ph = (ProductHolder) app.evaluateExpressionGet(context, \"#{ph}\", ProductHolder.class);\n\
    \        ph.setCurrentProduct(p);\n        ELContext elContext = context.getELContext();\n\
    \        ValueExpression ve = app.getExpressionFactory().createValueExpression(elContext,\
    \ \"#{ph.currentProduct}\", Product.class);\n        ve.setValue(elContext, p);\n\
    \    }\n}\n```\n\n**Figure 4-10.** *Taking advantage of the modifiability of EL\
