    \ the application again, try to submit two tickets simultaneously in two browser\
    \ tabs. The two tickets will not interfere with each other.\n\n## URL Mismatched?\n\
    \nIf you're careful, you may have noticed that after clicking Next at step 1,\
    \ step 2 is indeed displayed, but the URL is still pointing to step 1. Why? When\
    \ you first enter the URL to `step1.xhtml` and press Enter (see Figure 8-5), a\
    \ request is sent, and `step1.xhtml` will generate a response. So, you see step\
    \ 1 in the browser window. But what is the action attribute of the HTML form?\
    \ If the user clicks the Next button, you'll definitely want the original component\
    \ tree of step 1 to handle the form submission so that, for example, the various\
    \ UI Input components can update their web beans using the user input in the request.\n\
    \nTherefore, the action attribute should still point to `step1.xhtml`, which is\
    \ indeed what is done by the UI Form component. That is, it will set the action\
    \ attribute to invoke the then-current page. Now, when the user clicks the Next\
    \ button, the browser will copy that action attribute (for `step1.xhtml`) into\
    \ the location URL and then send the request to the `step1.xhtml` for handling.\
    \ `step1.xhtml` will handle it and then pass the rendering (through the JSF navigation\
    \ system) to `step2.xhtml`. As a result, you'll see the step 2 in the browser\
    \ window, but the location URL is still for `step1.xhtml`.\n\n**226**\n\nChapter\
    \ 8 ■ USING CONVERSATIONS\n\nBrowser\n\n`.../step1.xhtml`\n\nRequest\n\n1: The\
    \ user enters the URL and presses Enter.\n\n2: Request is sent.\n\n`step1.xhtml`\n\
    \nBrowser\n\nStep 1\n\nUI Form\n\n`<form action=\".../step1.xhtml\" ...>`\n\n\
    UI Command\n\n3: Response is sent.\n\n4: The user clicks the Next button.\n\n\
    Next\n\n`step1.xhtml`\n\n5: The action URL is copied to the location bar.\n\n\
    UI Form\n\nUI Command\n\nBrowser\n\n`.../step1.xhtml`\n\n6: Navigate to `step2.xhtml`.\n\
    \n`step2.xhtml`\n\nStep 2\n\nNext\n\nFinish\n\n7: Response is sent.\n\n**Figure\
    \ 8-5.** *Why URL and content are mismatched*\n\nThis is quite confusing to the\
    \ user. In addition, if the user tries to reload/refresh the page, the browser\
    \ will try to submit the form to `step1.xhtml` again. This is probably not what\
    \ she wants. Instead, all she wants maybe is to reload `step2.xhtml`.\n\nCan these\
    \ problems be fixed? Yes. You can tell the JSF navigation system to send a so-called\
    \ redirect response to the browser (see Figure 8-6). Usually a response contains\
    \ HTML to be displayed in the browser, but a redirect response is different; it\
    \ doesn't contain any HTML code. Instead, it simply contains a URL. In this case,\
    \ it contains the URL for `step2.xhtml` and tells the browser to go there. The\
    \ browser will then update the URL in the location bar for `step2.xhtml` and send\
    \ a request for `step2.xhtml`. Finally, `step2.xhtml` will generate a response,\
    \ so you'll see step 2 in the browser window and in the location bar.\n\nChapter\
    \ 8 ■ USING CONVERSATIONS\n\n**227**\n\nBrowser\n\nStep 1\n\n`<form action=\"\
    .../step1.xhtml\" ...>`\n\n1: The user clicks the Next button.\n\nNext\n\n`step1.xhtml`\n\
    \n2: The action URL is copied to the location bar.\n\nUI Form\n\nRedirect\n\n\
