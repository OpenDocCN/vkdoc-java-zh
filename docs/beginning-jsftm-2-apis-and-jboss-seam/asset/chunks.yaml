    ## Setting the Look and Feel with Skins


    All RichFaces components support so-called skins. For example, a particular skin
    named `s1` might have been defined as shown in Table 7-1.


    **Table 7-1.** *Definition of a Skin*


    | Attribute | Value |

    | --- | --- |

    | Text font | Arial |

    | Text color | Blue |

    | Text size | 12pt |

    | Background color | Yellow |


    RichFaces comes with several predefined skins. They’re named `blueSky`, `classic`,
    `deepMarine`, and so on. To choose which one to use, use `web.xml` as shown in
    Listing 7-15.


    **Listing 7-15.** *Choosing the Skin to Use*


    ```

    <web-app ...>

    ...

    <context-param>

    <param-name>org.richfaces.SKIN</param-name>

    <param-value>blueSky</param-value>

    </context-param>

    ...

    </web-app>

    ```


    In addition, by default the selected skin is also applied to the input-related
    HTML elements such as `<a>` or `<input>` generated by normal JSF components. However,
    it is not applied to others such as `<span>`. To make sure the whole page uses
    the skin, group everything into a `<rich:panel>` as shown in Listing 7-16. This
    way, everything inside that panel will inherit its CSS styles.


    **Listing 7-16.** *Grouping Everything into a `<rich:panel>`*


    ```

    <!DOCTYPE ...>

    <html xmlns="http://www.w3.org/1999/xhtml"

    xmlns:rich="http://richfaces.org/rich">

    <head>

    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />

    <title>Insert title here</title>

    </head>

    <body>

    <rich:panel>

    <h:form>

    <a4j:commandLink action="#{faqService.trigger}"

    value="#{faqService.questionText} (#{faqService.rating})"

    reRender="p" id="q" />

    <a href="javascript:Richfaces.showModalPanel(''myDialog'')">Rate</a>

    </h:form>

    <rich:modalPanel id="myDialog" width="200" height="140">

    <f:facet name="header">

    <h:outputText value="Enter a rating"></h:outputText>

    </f:facet>

    <h:panelGroup id="mp">

    <h:messages id="m" />

    </h:panelGroup>

    <h:form style="float:right">

    <h:inputText size="2" value="#{faqService.rating}"/>

    <a4j:commandButton

    value="Rate"

    action="#{faqService.rate}"

    reRender="q,mp"

    oncomplete="if (document.getElementById(''m'')==null)

    Richfaces.hideModalPanel(''myDialog'')">

    </a4j:commandButton>

    </h:form>

    </rich:modalPanel>

    <br />

    <h:panelGroup id="p">

    <h:outputText value="#{faqService.answerText}" id="a"

    rendered="#{faqService.showingAnswer}" />

    </h:panelGroup>

    </rich:panel>

    </body>

    </html>

    ```


