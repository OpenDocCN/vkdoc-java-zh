- fmt: "# Creating an E-Shop\n\nIn this chapter, you’ll learn how to create an e-shop.\
    \ This involves displaying a list of products (using a loop), implementing a shopping\
    \ cart for each user, supporting user login and logout, and requiring authenticated\
    \ access for the checkout page.\n\nSuppose that you’d like to create the e-shop\
    \ as shown in Figure 4-1. Initially, the page lists all the products. Clicking\
    \ a product link will display the detail page for the product.\n\nClicking a link\
    \ will display a detail page for the product. Three products are listed here.\
    \ You could display some details of the product in this area, but for simplicity,\
    \ you will do nothing.\n\nThe first product has an ID of `p01`, its name is “Pencil,”\
    \ and its price is $1.2.\n\n**Figure 4-1.** *Your e-shop*\n\n## Listing the Products\n\
    \nOK, let’s do it. Create a new dynamic web project named `Shop`. Then create\
    \ a `catalog.xhtml` page. How will you list the products? The problem here is\
