    **使用 WebLogic、WebSphere 或 GlassFish**


    尽管本章使用了 JBoss，但你开发的代码应该也能在其他 EJB3 服务器（如 WebLogic、WebSphere 或 GlassFish）上正常运行。不过，对于每种特定类型的服务器，你可能需要进行一些特定的设置调整。请查阅
    Seam 文档以获取更多信息。


    **总结**


    在本章中，你了解到如果一个类使用了 @Entity 注解，其实例可以轻松地通过 JBoss 保存到数据库表或从数据库表加载。Seam 可以为这样的类生成页面，用于搜索和列出实例，以及查看和编辑特定实例。你还可以进一步注解其字段以指定约束条件。


    你还了解到可以使用会话 Bean 来实现更好的可伸缩性。如果 Bean 实例包含状态，则将其设置为有状态 Bean；否则，将其设置为无状态 Bean。


    无论你的 Bean 是有状态还是无状态，JBoss 都会创建和销毁 Bean 实例，应用程序将通过代理访问 Bean 实例。为了在使用有状态 Bean 时节省内存，JBoss
    可能会将 Bean 实例保存到硬盘，并在需要时重新加载。对于无状态 Bean，JBoss 的工作量会更少：它可以直接销毁并创建它们。

