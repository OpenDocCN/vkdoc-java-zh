    \ 4-28.** *The ConfirmService Class*\n\n```java\npackage shop;\n\n...\n\n@Named(\"\
    confirmService\")\n@RequestScoped\npublic class ConfirmService {\n\n    @Current\n\
    \    private Cart cart;\n\n    @Current\n    private Catalog catalog;\n\n    public\
    \ double getTotal() {\n        double total = 0;\n        for (String pid : cart.getProductIds())\
    \ {\n            total += catalog.getProduct(pid).getPrice();\n        }\n   \
    \     return total;\n    }\n\n    public String getCreditCardNo() {\n        return\
    \ \"1111 2222 3333 4444\";\n    }\n}\n```\n\nCreate the `Checkout` button in `cart.xhtml`,\
    \ as shown in Listing 4-29.\n\n**Listing 4-29.** *Checkout Button in the cart.xhtml\
    \ Page*\n\n```xml\n<?xml version=\"1.0\" encoding=\"UTF-8\" ?>\n<!DOCTYPE html\
    \ PUBLIC \"-//W3C//DTD XHTML 1.0 Strict//EN\"\n    \"http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd\"\
