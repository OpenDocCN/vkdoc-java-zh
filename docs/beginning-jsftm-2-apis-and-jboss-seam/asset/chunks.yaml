    ## Summary


    In this chapter, you learned that you can run one or more web applications on
    top of JBoss. If a web application uses the JSF library, it is a JSF application.
    In a JSF application, a page is defined by an `.xhtml` file and is identified
    by its view ID, which is the relative path to it from the `WebContent` folder.


    You also learned that an `.xhtml` file consists of tags. Each tag belongs to a
    certain namespace, which is identified by a URL. To use a tag in an `.xhtml` file,
    you need to introduce a shorthand (prefix) for the URL and then use the prefix
    to qualify the tag name. The JSF tags belong to the JSF HTML namespace.


    To create a JSF component in the component tree, you use a JSF tag such as `<h:outputText>`
    in the `.xhtml` file. The root of the component tree is the view root. The component
    tree will generate HTML code to return to the client. The process of generating
    markup in JSF is called *encoding*.


    To output some text, you can use the `<h:outputText>` tag, which will create a
    `UIOutput` component. That component will output the value of its `value` attribute.
    That value can be a static string or an EL expression.


    **28**


    Chapter 1 ■ Getting Started with JSF


    As an alternative to the `<h:outputText>` tag, you can directly put the EL expression
    into the body text.


    In addition, this chapter also covered EL expressions, which typically look like
    `#{foo.p1}`. If you use an EL expression, the JSF engine will try to find an object
    named `foo`. It will in turn ask the Web Beans manager to do it, and the Web Beans
    manager will look up the web beans in the web bean table in the HTTP request or
    create it appropriately. Then the JSF engine will call `getP1()` on the web bean,
    and the result is the final value of the EL expression.


    Finally, you learned that web beans are JavaBeans created and destroyed automatically
    by the Web Beans manager. To enable web beans, you need to have a `META-INF/web-beans.xml`
    file on your `CLASSPATH`. To define a Java class as a web bean class, the class
    needs to be a JavaBean; in other words, it has a no-argument constructor and provides
    getters and/or setters for certain properties. Then it must be annotated with
    the `@Named` annotation to be given a name.


