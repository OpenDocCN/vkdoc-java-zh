    **图 4-8.** *行特定环境将行索引附加到客户端 ID*


    当用户点击链接时（见图 4-9），在应用请求值阶段，UI Data 会再次遍历每一行。对于每一行，它会再次为 UI Command 创建一个环境对象。当 UI
    Command 检查自身是否被点击时，它会将其客户端 ID 发送给环境对象。该环境对象会再次附加行索引以获取最终的客户端 ID，然后与请求中的客户端 ID
    进行比对。如果匹配，UI Command 将通过环境对象安排动作监听器的执行。


    环境对象会附加到等待执行的动作监听器上。当动作监听器执行时，环境对象会先根据其行 ID 在请求作用域中设置 `p` 属性，然后再调用动作监听器。最后，为了清理，它会移除
    `p` 属性。


