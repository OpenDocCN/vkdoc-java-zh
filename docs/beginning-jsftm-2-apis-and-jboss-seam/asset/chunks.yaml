    ## 总结


    每当你在XHTML文件中看到重复的代码时，就应该考虑将重复的代码提取到自定义组件中。如本章所学，要做到这一点，你可以通过将一个`*.taglib.xml`文件放入`META-INF`文件夹来定义一个标签库。


    对于每个标签，指定源XHTML文件，并将重复的代码放入该XHTML文件中。


    你还学习了如何向自定义标签传递参数。在树构建时，参数会被形成一个变量表，源文件中的EL表达式将链接到该变量表。在渲染时，它们会追踪到变量表，以获取值作为EL表达式进行求值。


    EL表达式只能求值为一个值/对象。它不能求值为一个方法。要向自定义标签传递一个方法，请传递一个包含该方法的对象。


    你不能通过参数向自定义标签传递XHTML代码，并期望JSF解析该代码。要做到这一点，请将代码放入标签的主体中，或者如果你有多段代码，请使用`<ui:define>`。自定义组件可以使用`<ui:insert>`追踪到代码中以构建子树。'
