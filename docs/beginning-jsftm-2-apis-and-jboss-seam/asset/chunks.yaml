- fmt: "# 排版后的内容\n\n`rendered`属性有什么作用？当UI输出组件准备在渲染响应阶段渲染自身时，它会检查这个属性。在这种情况下，它会调用Web\
    \ Bean上的`isShowingAnswer()`方法。如果`isShowingAnswer()`返回`true`，它将继续渲染自身。否则，它将什么都不做。为了使其工作，请按清单7-6所示修改Web\
    \ Bean。\n\n**清单7-6.** *在Web Bean中显示或隐藏答案*\n\n```\npackage faq;\n\n...\n\n@Named(\"\
    faqService\")\n\n@SessionScoped\n\npublic class FAQService implements Serializable\
    \ {\n\nprivate String questionText = \"How to run Eclipse?\";\n\nprivate String\
    \ answerText = \"Double-click its icon.\";\n\nprivate boolean isShowingAnswer\
    \ = false;\n\npublic String getQuestionText() {\nreturn questionText;\n}\n\npublic\
    \ String getAnswerText() {\nreturn answerText;\n}\n\npublic String trigger() {\n\
    isShowingAnswer = !isShowingAnswer;\nreturn null;\n}\n\npublic boolean isShowingAnswer()\
    \ {\nreturn isShowingAnswer;\n}\n\n}\n```\n\n运行应用程序时，点击问题应该会显示和隐藏答案。当然，现在整个页面都会刷新，因为没有使用Ajax。\n\
    \n## 使用Ajax隐藏或显示答案\n\n现在，您希望使用Ajax来隐藏或显示答案，而无需刷新整个页面。第一次尝试如清单7-7所示。\n\n**清单7-7.**\
    \ *尝试使用Ajax更改组件的可见性*\n\n```\n<!DOCTYPE ...>\n<html xmlns=\"http://www.w3.org/1999/xhtml\"\
    \n      xmlns:a4j=\"http://richfaces.org/a4j\">\n<head>\n<meta http-equiv=\"Content-Type\"\
    \ content=\"text/html; charset=UTF-8\" />\n<title>Insert title here</title>\n\
    </head>\n<body>\n<h:form>\n<a4j:commandLink\naction=\"#{faqService.trigger}\"\n\
    value=\"#{faqService.questionText}\"\nreRender=\"a\" />\n</h:form>\n<br />\n<h:outputText\
    \ value=\"#{faqService.answerText}\" id=\"a\"\nrendered=\"#{faqService.showingAnswer}\"\
    />\n</body>\n</html>\n```\n\n如果运行它，最初不会显示答案，这是正确的行为。然而，如果您点击链接，似乎什么也没有发生。这是因为当UI输出组件最初准备渲染自身时，`rendered`属性为`false`，因此它不会输出任何HTML元素（见图7-6）。结果，`onclick`\
    \ JavaScript将无法找到要在后续Ajax操作中更新的HTML元素。\n\n```\n...\n<h:form>\n<h:commandLink .../>\n\
    </h:form>\n<br />\n<h:outputText value=\"...\" id=\"a\" />\n<html>\n...\n<a onclick=\"\
    some JavaScript\">How to...</a>\n<br/>\n...\n1: 开始时，由于rendered属性为false，它不生成任何HTML元素\n\
    </html>\n2: 当UI输出在Ajax操作期间刷新时，它将输出一个<span>，其客户端ID照常设置\n3: JavaScript将使用客户端ID查找现有的HTML元素，但会失败，因为找不到任何元素！\n\
    <span id=\"a\">Double-click its icon.</span>\n```\n\n**图7-6.** *为什么Ajax无法显示组件*\n\
    \n为了解决这个问题，您将在答案周围放置一个面板，并使用Ajax更新该面板（见图7-7）。简单来说，面板生成的HTML `<span>`元素将始终存在。它的主体可能不包含任何内容（如果答案被隐藏），或者包含答案（如果答案被显示）。由于它始终存在，您可以使用Ajax来更新它。\n\
    \n```\n包含答案的面板。\n最初答案没有HTML代码。\n<span id=\"p\"></span>\n<span id=\"p\">\n<span\
    \ id=\"a\">Double-click its icon.</span>\n</span>\n更新整个面板。\n<span id=\"p\">\n\
    <span id=\"a\">Double-click its icon.</span>\n</span>\n<span id=\"p\"></span>\n\
    更新整个面板。\n<span id=\"p\"></span>\n```\n\n**图7-7.** *使用面板显示或隐藏组件*\n\n要实现这个想法，请按清单7-8所示修改`listfaq.xhtml`。\n\
    \n**清单7-8.** *在listfaq.xhtml中刷新整个面板组*\n\n```\n<!DOCTYPE ...>\n<html xmlns=\"http://www.w3.org/1999/xhtml\"\
    \n      xmlns:a4j=\"http://richfaces.org/a4j\">\n<head>\n<meta http-equiv=\"Content-Type\"\
    \ content=\"text/html; charset=UTF-8\" />\n```"
