    第 3 章 ■ 验证输入


    **总结**


    在本章中，你学习了如何验证用户输入。为了验证单个 UI 输入组件中的用户输入，你可以向其添加一个或多个验证器。它们将在处理验证阶段被逐一调用，以检查转换后的值。如果任何一个验证失败，它将为该组件（或者更确切地说，为其客户端
    ID）记录一个错误，并告知 JSF 引擎直接跳转到响应渲染阶段。


    如你所学，JSF 提供了一些预定义的验证器，用于检查长整型的范围、双精度浮点型的范围或字符串的长度。要自定义它们的错误消息，可以使用消息包或直接在验证器标签中提供消息。


    为了执行自定义验证，你了解到可以通过提供一个 Java 类和一个验证器 ID 来创建自定义验证器。此外，你需要定义一个将创建该验证器的 Facelet 标签。如果验证涉及两个或更多组件，你可以向
    UI 命令添加一个动作监听器。它将在调用应用阶段执行。


    这样，bean 将被更新，以便你可以检查它们的属性。


    我还介绍了如何指定 JSF 消息。具体来说，一条 JSF 消息包含一个严重级别、一个摘要和一个详细信息。通常，你会使用 UI 消息组件显示摘要，并使用 UI
    消息组件与每个 UI 输入组件一起显示详细信息。


    要自定义 HTML 输出的外观，你可以定义 CSS 样式类，并让组件引用它们。


    UI 面板组件根据其渲染器来布局其子组件。它可以以表格形式布局（<panelGrid>），或者只是逐个排列它们（<panelGroup>）。


    最后，你了解到，如果一个 Web bean 从未通过名称被查找，则无需在其上使用 @Named。


