- fmt: '# Understanding JSF Error Handling in Input Processing


    In order to do step 1, you need to first understand how JSF handles the request
    when there is any error in the Input Processing phase, such as when no value is
    provided but the `UIInput` component is marked as required (see Figure 2-13).
    Obviously, the `UIInput` component has no value to set into the web bean. Because
    the `UICommand` component doesn’t know about the error, it will still schedule
    the listener. JSF will note the error, skip the Invoke Application phase, and
    go directly to the Render Response phase. Then the outcome will not have been
    set and will remain at its initial value of `null`. JSF will treat it as a signal
    to not change the current view ID and thus will redisplay the current page.


    **Figure 2-13.** *Skipping the Invoke Application phase if there is any error
    when processing input*


    What if you had two `UIInput` components and one failed? Would the other one store
    the value into a web bean (see Figure 2-14)?


    **Figure 2-14.** *What would happen if just one UI Input component failed?*


    You certainly hope that it wouldn’t. To achieve this effect, the part of updating
    the web beans is always split from the Input Processing phase to form a new phase
    called Update Domain Values (see Figure 2-15). That is, if there is any error
    when processing the input, the entire Update Domain Values phase will be skipped.


    **Figure 2-15.** *Skipping the Update Domain Values phase if there is any error
    when processing input*


    Finally, in order to display the error messages recorded, modify `getsymbol.xhtml`
    as shown in Figure 2-16. That is, the `UIMessages` component will render the error
    messages recorded.


    **Figure 2-16.** *Displaying error messages*


    Now run the application, and submit the form with an empty symbol. The application
    will display an error message, as shown in Figure 2-17.


    ![Image 26](index-60_1.png)


    **Figure 2-17.** *Error messages are displayed.*


    As you can see in Figure 2-17, the client ID of the `UIInput` component is the
    ID path from the form to the component concerned. In general, client IDs are mainly
    used as the values of the `id` or `name` attributes of the HTML elements generated.
    If you view the source of the HTML page, you’ll see how various client IDs are
    used (see Listing 2-11).


    **Listing 2-11.** *Client IDs Used As id or name Attributes*


    ```xml

    <?xml version="1.0" encoding="UTF-8" ?>

    <!DOCTYPE html ...>

    <html xmlns="http://www.w3.org/1999/xhtml">

    <head>

    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"></meta>

    ```'
