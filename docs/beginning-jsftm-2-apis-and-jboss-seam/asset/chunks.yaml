    \ value=\"#{r.weight}\" ...>\n        <f:validateLongRange minimum=\"0\"/>\n \
    \     </h:inputText>\n      <h:outputText value=\"Patron code:\"/>\n```\n\nThis\
    \ namespace represents your own tag lib. Don't need it anymore."
