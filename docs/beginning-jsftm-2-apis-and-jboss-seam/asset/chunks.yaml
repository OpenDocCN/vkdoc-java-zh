    **总结**


    在本章中，你了解到可以在 JBoss 上运行一个或多个 Web 应用程序。如果某个 Web 应用程序使用了 JSF 库，那么它就是一个 JSF 应用程序。在
    JSF 应用程序中，页面由 .xhtml 文件定义，并通过其视图 ID 来标识，该 ID 是相对于 WebContent 文件夹的路径。


    你还了解到 .xhtml 文件由标签组成。每个标签属于特定的命名空间，该命名空间由 URL 标识。要在 .xhtml 文件中使用标签，你需要为该 URL 引入一个简写（前缀），然后使用该前缀来限定标签名称。JSF
    标签属于 JSF HTML 命名空间。


    要在组件树中创建 JSF 组件，你可以在 .xhtml 文件中使用诸如 `<h:outputText>` 这样的 JSF 标签。组件树的根是视图根。组件树将生成
    HTML 代码返回给客户端。在 JSF 中生成标记的过程称为*编码*。


    要输出一些文本，你可以使用 `<h:outputText>` 标签，该标签会创建一个 UIOutput 组件。该组件将输出其 value 属性的值。该值可以是静态字符串或
    EL 表达式。


    **28**


    第 1 章 ■ 开始使用 JSF


    作为 `<h:outputText>` 标签的替代方案，你可以直接将 EL 表达式放入正文文本中。


    此外，本章还介绍了 EL 表达式，其典型形式为 `#{foo.p1}`。如果你使用 EL 表达式，JSF 引擎将尝试查找名为 foo 的对象。它会转而请求
    Web Beans 管理器执行此操作，Web Beans 管理器将在 HTTP 请求的 Web Bean 表中查找该 Web Bean，或者适当地创建它。然后
    JSF 引擎会在该 Web Bean 上调用 `getP1()` 方法，其结果就是 EL 表达式的最终值。


    最后，你了解到 Web Bean 是由 Web Beans 管理器自动创建和销毁的 JavaBean。要启用 Web Bean，你需要在 CLASSPATH
    中包含一个 `META-INF/web-beans.xml` 文件。要将 Java 类定义为 Web Bean 类，该类需要是一个 JavaBean；换句话说，它必须有一个无参构造函数，并为某些属性提供
    getter 和/或 setter 方法。然后必须使用 `@Named` 注解为其命名。


