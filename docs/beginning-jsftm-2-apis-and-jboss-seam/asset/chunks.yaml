    动作监听器如何获取所选产品的访问权限？当 UI Data 遍历各行时（见图 4-8），从概念上讲，它会为 `<h:commandLink>` 创建的 UI
    Command 创建一个环境对象。该环境对象包含当前行的索引。当 UI Command 需要输出其客户端 ID 时，它会通过该环境发送其客户端 ID，环境对象会将行索引附加到客户端
    ID 上，以便在页面上显示。


    <tr>...<a id="foo:0">...</a>...</tr>


    <tr>...<a id="foo:1">...</a>...</tr>


    <tr>...<a id="foo:2">...</a>...</tr>


