    。

    </h:dataTable>

    ...

    ...

    ...

    `<h:column>`内部的标签将

    </body>

    输出单元格内容。

    </html>


    **图 4-2.** *使用<h:dataTable>进行循环*


    第 4 章 ■ 创建电子商店


