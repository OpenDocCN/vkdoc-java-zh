    \nTime\n\n**Figure 8-2.** *A conversation*\n\nSuch a transient conversation is\
    \ not that useful because it is so short-lived; what you put into it is just like\
    \ those request-scoped web beans. However, before the response is generated, if\
    \ you tell web beans to turn the conversation into a long-running one, it will\
    \ hang in there until when, maybe many requests later, you turn it back into a\
    \ transient one; then it will be destroyed at the end of the request (see Figure\
    \ 8-3).\n\nWeb Beans creates a conversation.\n\nSession\n\nRequest 1\n\nConversation\n\
    \n**Name** | **Object**\n--- | ---\n... | ...\n... | ...\n\nTurn it into long-running.\n\
    \nRequest 2\n\n...\n\nRequest n\n\nTurn it back into transient.\n\nWeb Beans ends\
    \ the conversation automatically.\n\nTime\n\n**Figure 8-3.** *Making a conversation\
    \ long-running*\n\n**221**\n\n**Chapter 8 ■ USING CONVERSATIONS**\n\nThe interesting\
    \ thing about conversations is that if in the middle of the (long-running) conversation\
    \ you open a new browser tab and access the application, a new conversation will\
    \ be created, and the two conversations will not interfere with each other (see\
    \ Figure 8-4).\n\nSession\n\nTab 1 | Tab 2\n--- | ---\nConversation 1 | Conversation\
    \ 2\n**Name** | **Object** | **Name** | **Object**\n... | ... | ... | ...\n...\
    \ | ... | ... | ...\n\n**Figure 8-4.** *Each tab having a different conversation*\n\
    \nTo implement this idea, you need to put the ticket into the conversation scope,\
    \ as shown in Listing 8-6. Because a conversation is still stored in the session,\
    \ the ticket still needs to implement `Serializable`.\n\n**Listing 8-6.** *Putting\
    \ the Ticket into the Conversation Scope*\n\n```java\npackage wizard;\n\nimport\
    \ java.io.Serializable;\nimport javax.annotation.Named;\nimport javax.context.ConversationScoped;\n\
    \n@Named(\"ticket\")\n@ConversationScoped\npublic class Ticket implements Serializable\
    \ {\n    private String customerId;\n```"
