    Chapter 3 ■ VaLIDatING INpUt


    **Summary**


    In this chapter, you learned how to validate user input. To validate the user
    input in a single UI Input component, you can add one or more validators to it.
    They will be invoked one by one in the Process Validations phase to check the
    converted value. If any one fails, it will log an error for that component (or
    rather, for its client ID) and tell the JSF engine to jump to the Render Response
    phase directly.


    As you learned, JSF provides a few predefined validators for checking the range
    of a long, the range of a double, or the length of a string. To customize their
    error messages, use a message bundle or provide the message directly in the validator
    tag.


    To perform custom validation, you learned that you can create a custom validator
    by providing a Java class and a validator ID. In addition, you need to define
    a Facelet tag that will create the validator. If the validation involves two or
    more components, you can add an action listener to a UI Command. It will be executed
    in the Invoke Application phase.


    As such, the beans will have been updated so you can check their properties.


    I also covered how to specify a JSF message. Specifically, a JSF message contains
    a severity level, a summary, and a detail. Usually you will display the summary
    using a UI Message component and display the detail using a UI Message component
    along with each UI Input component.


    To customize the appearance of the HTML output, you can define CSS style classes
    and let the components refer to them.


    A UI Panel component lays out its child components according to its renderer.
    It can lay them out in a table (<panelGrid>) or just arrange them one by one (<panelGroup>).


    Finally, you learned that if a web bean is never looked up by name, you don’t
    need to use @Named on it.


