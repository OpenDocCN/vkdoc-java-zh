- fmt: "您得到的是一个`Locale`对象，而不是语言代码。`Locale`对象包含一个语言代码（如`en`或`zh`），并且可选地包含一个国家代码（如`US`、`UK`或`CN`）。尽管`Locale`对象不是字符串，但您可以对其调用`toString()`方法，将其转换为`<LANGUAGE_CODE>_<COUNTRY_CODE>`模式的字符串，例如`en_US`或`zh`（如果未指定国家代码）。\n\
    \n### 清单 9-10. 让用户在表单中选择语言\n\n```java\npackage multilang;\n\nimport java.util.ArrayList;\n\
    import java.util.Iterator;\nimport java.util.List;\nimport java.util.Locale;\n\
    \nimport javax.faces.application.Application;\nimport javax.faces.context.FacesContext;\n\
    import javax.faces.model.SelectItem;\n\n...\n\n@Named(\"showDate\")\n@RequestScoped\n\
    public class ShowDate {\n\n    private String langCode;\n\n    public String getLangCode()\
    \ {\n        return langCode;\n    }\n\n    public void setLangCode(String langCode)\
    \ {\n        this.langCode = langCode;\n    }\n\n    public List<SelectItem> getLangCodes()\
    \ {\n        List<SelectItem> items = new ArrayList<SelectItem>();\n        Application\
    \ app = FacesContext.getCurrentInstance().getApplication();\n        Locale locale\
    \ = app.getDefaultLocale();\n        items.add(new SelectItem(locale.toString()));\n\
    \        Iterator<Locale> iter = app.getSupportedLocales();\n        while (iter.hasNext())\
    \ {\n            locale = iter.next();\n            items.add(new SelectItem(locale.toString()));\n\
    \        }\n        return items;\n    }\n\n    public Date getToday() {\n   \
    \     return new Date();\n    }\n}\n```\n\n定义动作方法，如清单 9-11 所示。关键部分是从语言代码创建`Locale`对象，然后将其设置到`UIViewRoot`中。最后，它返回`null`，以便重新显示当前页面。\n\
    \n### 清单 9-11. 在 UI 视图根中更改区域设置\n\n```java\npublic class ShowDate {\n\n    private\
    \ String langCode;\n\n    public String getLangCode() {\n        return langCode;\n\
    \    }\n\n    public void setLangCode(String langCode) {\n        this.langCode\
    \ = langCode;\n    }\n\n    public List<SelectItem> getLangCodes() {\n       \
    \ ...\n    }\n\n    public String changeLangCode() {\n        UIViewRoot viewRoot\
    \ = FacesContext.getCurrentInstance().getViewRoot();\n        viewRoot.setLocale(new\
    \ Locale(langCode));\n        return null;\n    }\n\n    public Date getToday()\
    \ {\n        return new Date();\n    }\n}\n```\n\n运行应用程序，并尝试更改语言；它应该以所选语言显示。但是，组合框中显示的是语言代码（如`en`和`zh`），这不太友好。相反，您可能希望在组合框中显示“English”和“中文”（“Chinese”的中文显示）。为此，请按清单\
    \ 9-12 修改`ShowDate`类。关键部分是`getDisplayName()`方法，它返回适合显示的区域设置名称（例如，“English”或“Chinese”）。如果您指定一个区域设置，它将返回该区域设置中的语言名称（例如，如果区域设置为中文，则返回“中文”）。\n\
    \n### 清单 9-12. 获取语言的显示名称\n\n```java\n...\npublic class ShowDate {\n    ...\n \
    \   public List<SelectItem> getLangCodes() {\n        List<SelectItem> items =\
    \ new ArrayList<SelectItem>();\n        Application app = FacesContext.getCurrentInstance().getApplication();\n\
    \        Locale locale = app.getDefaultLocale();\n        String display = locale.getDisplayName(locale);\n\
    \        items.add(new SelectItem(locale.toString(), display));\n        Iterator<Locale>\
    \ iter = app.getSupportedLocales();\n        while (iter.hasNext()) {\n      \
    \      locale = iter.next();\n            display = locale.getDisplayName(locale);\n\
    \            items.add(new SelectItem(locale.toString(), display));\n        }\n\
    \        return items;\n    }\n}\n```\n\n再次运行应用程序，语言名称将显示在组合框中。最后，“Change”按钮也应该进行国际化和本地化。这很容易。只需按清单\
    \ 9-13 修改`showdate.xhtml`。\n\n### 清单 9-13. 获取区域设置的显示名称\n\n```xml\n...\n<body>\n\
    \    <h:outputText value=\"#{b.todayIs}\"/>\n    <h:outputText value=\"#{showDate.today}\"\
    >\n        <f:convertDateTime dateStyle=\"long\"/>\n    </h:outputText>.\n   \
    \ <h:form>\n        <h:selectOneMenu value=\"#{showDate.langCode}\">\n```"
