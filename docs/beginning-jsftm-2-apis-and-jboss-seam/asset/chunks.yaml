    Create the `LoginRequest` class in the `shop` package as shown in Listing 4-34.
    You’ll create the (session-scoped) `UserHolder` web bean later in this chapter.
    It is like the `ProductHolder` bean except that it contains the current `User`
    object. For simplicity, instead of looking up the database, you’ll just hard-code
    a known user here. If the username and password are correct, you’ll put the `User`
    object into the `UserHolder` web bean (and thus into the session).


    If the username or password is incorrect, you’ll log an error message. In that
    case, you’ll return `null` as the outcome, which tells JSF to *not* change the
    view ID, that is, redisplay the current page (the login page).


    **Listing 4-34.** *The LoginRequest Class*


    ```

    package shop;

    ...

    @Named("loginRequest")

    @RequestScoped

    public class LoginRequest {

    private String username;

    private String password;

    @Current

    private UserHolder userHolder;

    public String getUsername() {

    return username;

    }

    public String getPassword() {

    return password;

    }

    public void setUsername(String username) {

    this.username = username;

    }

    public void setPassword(String password) {

    this.password = password;

    }

    public String login() {

    if (username.equals("u1") && password.equals("p1")) {

    userHolder.setCurrentUser(new User("u1", "p1", "1234"));

    return "loggedIn";

    } else {

    FacesContext context = FacesContext.getCurrentInstance();

    context.addMessage(null, new FacesMessage(

    "Unknown login", "Please try again"));

    return null;

    }

    }

    }

