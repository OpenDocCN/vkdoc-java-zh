    # Chapter 1: Getting Started with JSF


    In this chapter you’ll learn how to set up a development environment and create
    a “Hello world!” application with JSF.


    ## Introducing the “Hello world” Application


    Suppose that you’d like to develop the application shown in Figure 1-1.


    **Figure 1-1.** *A simple “Hello world!” application with a single page*


    To do that, you’ll need to install some software (see Figure 1-2). First, you’ll
    need an IDE to create your application. This book will use Eclipse, but other
    popular IDEs will do just fine too. Next, you’ll need to install JBoss, which
    provides a platform for running web applications (there are also fine alternatives
    to JBoss). In addition, your application will use JSF and Web Beans as libraries.
    So, you’ll need to download them too.


    **1**


    ![Image 3](index-16_1.png)


    **2**


