  raw: '• To loop through some items in a table, if the number of items can only be
    determined at runtime, use the <h:dataTable> tag, which will create a UI Data
    component. You provide a List of items to it, and it will loop through it for
    each item. Its children must be UI Column components. Each UI Column represents
    a column in the table. For


    each row, the UI Data will create an environment containing the row index and
    store the current item into an attribute before asking each UI Column to render
    itself. Each UI Column will render its own child components (excluding the facet
    named header).


    A UI Column can optionally have a facet named header. In that case, the UI Data
    will render a header row and ask the UI Columns to render the header facet as
    the header for the column before it starts to process the data rows.


    • On form submission, the UI Data will loop through the items again, re- creating
    the environment (to set up the attribute) and giving each component inside an
    opportunity to apply request values, process validations, update domain values
    and


    invoke application in each respective phase.


    • Because the current item is stored into an attribute and that attribute will
    be cleared by the environment, if you need to pass it onto the next page, most
    likely you’ll want to use the Set Property action listener.


    • If you need to loop through some items but they won’t be presented in an HTML


    <table>, you can use the <ui:repeat> tag. It works very much like the <h:dataTable>
    tag except that it won’t output markup of its own.


    • To create a link, use the UI Command component with a link renderer. In terms
    of behavior, it is just like a UI Command component with a button renderer.


    • For a UI Command, in addition to setting an outcome in its action attribute,
    you can also specify a method. This is useful when you need to perform a business
    action.


    That method should return a string indicating the outcome. If you need to perform
    a UI- specific action, it’s better to add an action listener to the UI Command.


    • A UI Input can be rendered such that user input is echoed as stars. This is
    good for password input.


    **150**


    Chapter 4 ■ CreatING aN e- ShOp


    • If you display the properties of a request- scoped web bean using a page, you
    must be careful when the form is submitted because a new request- scoped web bean


    will be created. Usually you will use a UI Input component along with an HTML


    Hidden Input renderer to store the ID in the browser as a hidden field. You will
    then load the object when the ID is set.


    • JSF uses a view handler to create the JSF component tree from a specified view
    ID.


    You need to use a view handler when you want to bypass the JSF navigation sys-


    tem. You need to load a view and set it as the one to be rendered.


    • A session is a memory area for each user (or rather, each browser instance).
    To start a new session, either restart the browser or wait until the timeout.
    To remove the session on the server, call invalidate() on the session. This is
    commonly done when logging out. Everything put into the session must implement
    Serializable.


    • There is a web bean table in each session. You can put per- user temporary data
    into there.


    • A phase listener will be notified before entering a phase or after exiting from
    a phase.


    You can use it to make sure the user has logged in before rendering a certain
    pages.


    • The external context means the platform on which JSF is running. In your case,
    it is JBoss. JSF assumes this platform is responsible for maintaining the session.


