    So, displaying the client ID is quite confusing to users. Instead, you should\
    \ display a user-friendly description for the UI Input component. To do that,\
    \ modify `getsymbol.xhtml` as shown in Listing 2-12.\n\n**Listing 2-12.** *Specifying\
    \ the Label*\n\n```\n...\n<body>\n<h:messages />\n<h:form>\n<h:inputText value=\"\
    #{b1.sym}\" required=\"true\" label=\"Stock symbol\"></h:inputText>\n<h:commandButton\
    \ action=\"ok\"></h:commandButton>\n</h:form>\n</body>\n</html>\n```\n\nRun the\
    \ code again, and it will display the label instead of the client ID (see Figure\
    \ 2-18).\n\n**Figure 2-18.** *Labels displayed in error messages*\n\nIf you don't\
    \ like this error message, you can provide your own. To do that, create a text\
    \ file named `messages.properties` in the `stock` package (the file name is not\
    \ really significant as long as it has a `.properties` extension). Figure 2-19\
    \ shows the content to input. This is called the \"resource key.\"\n\n```\njavax.faces.component.UIInput.REQUIRED=You\
    \ must input {0}!\n```\n\nJSF will fill in the label (\"Stock symbol\").\n\n**Figure\
    \ 2-19.** *Specifying the error message for missing input*\n\nJSF will *not* load\
    \ the file automatically; you must tell it to do so. Therefore, modify `faces-config.xml`\
    \ as shown in Figure 2-20.\n\n```\n<faces-config ...>\n  <application>\n    <message-bundle>stock.messages</message-bundle>\n\
    \  </application>\n  <!-- The Base Filename without the .properties Extension\
