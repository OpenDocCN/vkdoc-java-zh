    \ value=\"Patron code:\"/>\n    <h:inputText value=\"#{r.patronCode}\" validator=\"\
    #{r.validatePatron}\"/>\n    <h:outputText value=\"\"/>\n    <h:commandButton\
    \ action=\"ok\" value=\"OK\"/>\n  </h:panelGrid>\n</h:form>\n```\n\nThis EL expression\
    \ will evaluate to a `Method` object representing this method. The `UICommand`\
    \ will then use this method as a validator.\n\n```\npublic class Request {\n \
    \ ...\n  public void validatePatron(...) {\n    ...\n  }\n}\n```\n\n**Figure 3-10.**\
    \ *Using a validator method*\n\nSo, create that `validatePatron()` method as shown\
    \ in Figure 3-11. In short, the method will be passed the component and the converted\
    \ value, and it is free to perform whatever check it desires. If the converted\
    \ value is considered invalid, it should throw a `ValidatorException` and provide\
    \ a `FacesMessage`.\n\n```\npublic class Request {\n  private int weight;\n  private\
    \ String patronCode;\n\n  @In\n  private PostageService postageService;\n  ...\n\
    \n  public void validatePatron(FacesContext context, UIComponent component,\n\
    \                             Object convertedValue) throws ValidatorException\
    \ {\n    String patronCode = (String) convertedValue;\n    if (!postageService.patronExists(patronCode))\
    \ {\n      throw new ValidatorException(new FacesMessage(\n        FacesMessage.SEVERITY_ERROR,\n\
    \        \"Patron code is invalid\",\n        \"Patron code:\" + patronCode +\
    \ \" is invalid\"));\n    }\n  }\n}\n```\n\nThe converted value (here the patron\
    \ code). It must be non-empty, otherwise this code would not have been called.\
    \ The component being validated (the `UIInput` here). It represents the JSF engine.\
    \ You'll create this method next. All validator methods must take this signature.\
    \ If it doesn't exist, throw a `ValidatorException`. A message contains three\
    \ pieces of information: the severity (`INFO`, `WARN`, `ERROR`, ...), a summary\
    \ message and a detail message. By default, the `UIMessages` will display the\
    \ summary messages.\n\n**Figure 3-11.** *Implementing a validator method*\n\n\
    Create the `patronExists()` method in the `PostageService` class as shown in Listing\
    \ 3-15.\n\n**Listing 3-15.** *Implementing the `patronExists()` Method*\n\n```\n\
    ...\npublic class PostageService {\n  private Map<String, Integer> patronCodeToDiscount;\n\
    \n  public PostageService() {\n    patronCodeToDiscount = new HashMap<String,\
    \ Integer>();\n    patronCodeToDiscount.put(\"p1\", 90);\n    patronCodeToDiscount.put(\"\
    p2\", 95);\n  }\n  ...\n\n  public boolean patronExists(String patronCode) {\n\
    \    return patronCodeToDiscount.containsKey(patronCode);\n  }\n}\n```\n\nNow\
    \ run the application, and it should work (see Figure 3-12).\n\n![Image 44](index-96_1.png)\n\
    ![Image 45](index-96_2.png)\n\n**Figure 3-12.** *Unknown patron code caught*\n\
    \n## Creating a Custom Validator for the Patron Code\n\nSuppose that you have\
    \ multiple pages on which the user can input the patron code. Some such pages\
    \ may not store information to the `Request` bean at all. In that case, you can\
