- fmt: '# 定义 CSS 类并应用于错误消息


    定义一个名为`c1`的 CSS 类。当`c1`被应用于一个`<li>`元素时，该元素应显示为红色。


    ```

    </style>

    ```


    ```

    <title>Insert title here</title>

    </head>

    <body>

    <h:messages errorClass="c1" />

    <h:form>

    ...

    </h:form>

    ```


    `UI Messages`会将`c1`应用于每条消息（`<li>`）。


    ```

    </body>

    </html>

    <ul>

    <li class="c1">...</li>

    <li>...</li>

    </ul>

    ```


    `<body>`将显示为红色。


    **Figure 3-17.** *Assigning CSS class to error messages*


    现在运行应用程序，它将正常工作。


    此示例展示了`<h:messages>`如何接受 CSS 类。实际上，许多其他 JSF 标签也是如此。例如，`<h:dataTable>`为其表头和列接受
    CSS 类。查阅标签文档以了解详细信息。


    ## 在字段旁显示错误消息


    您可能想知道`FacesMessage`中详细消息的用途。它旨在与字段一起显示（见图 3-18）。


    ![Image 46](index-102_1.png)


    **88**


    Chapter 3 ■ VALIDATING INPUT


    **Figure 3-18.** *Detail message displayed along with the field*


    为此，您需要了解 JSF 如何存储错误消息。例如，如果重量为负，错误消息将与重量组件的客户端 ID 关联，如图 3-19 所示。


    | Client ID | Severity | Summary | Detail |

    |-----------|----------|---------|--------|

    | `f:w`     | ERROR    | weight is negative | ... |

    | ...       | ...      | ...     | ... |

    | ...       | ...      | ...     | ... |

    | ...       | ...      | ...     | ... |


    假设这是 JSF 为重量组件生成的某个客户端 ID。


    ```

    <form id="f" ...>

    <input id="f:w" ...>

    ...

    </form>

    ```


    **Figure 3-19.** *Client ID and error message stored together*


    要显示与客户端 ID `f:w` 关联的详细错误消息（如果有），您可以使用`<h:message>`标签（注意不是复数形式的`<h:messages>`），如清单
    3-19 所示。它将创建一个`UI Message`组件，输出详细错误消息。


    **Listing 3-19.** *Using the `<h:message>` Tag*


    ```

    ...

    <h:messages errorClass="c1"/>

    <h:form>

    <h:panelGrid columns="2">

    <h:outputText value="Weight:"/>

    ```


    Chapter 3 ■ VALIDATING INPUT


    **89**


    ```

    <h:inputText value="#{r.weight}" label="weight" required="true"

    validatorMessage="weight cannot be negative!">

    <f:validateLongRange minimum="0"/>

    </h:inputText>

    <h:message for="f:w"/>

    <h:outputText value="Patron code:"/>

    <h:inputText value="#{r.patronCode}">

    <x:validatePatron/>

    </h:inputText>

    <h:outputText value=""/>

    <h:commandButton action="ok" value="OK"/>

    </h:panelGrid>

    </h:form>

    ```


    然而，默认情况下 JSF 会随意生成客户端 ID。为了确保客户端 ID 为`f:w`，您需要修改代码，如清单 3-20 所示。


    **Listing 3-20.** *Specifying Client IDs*


    ```

    ...

    <h:messages errorClass="c1"/>

    <h:form id="f">

    <h:panelGrid columns="2">

    <h:outputText value="Weight:"/>

    <h:inputText id="w" value="#{r.weight}" label="weight" required="true"

    validatorMessage="weight cannot be negative!">

    <f:validateLongRange minimum="0"/>

    </h:inputText>

    <h:message for="f:w"/>

    <h:outputText value="Patron code:"/>

    <h:inputText value="#{r.patronCode}">

    <x:validatePatron/>

    </h:inputText>

    <h:outputText value=""/>

    <h:commandButton action="ok" value="OK"/>

    </h:panelGrid>

    </h:form>

    ```


    运行应用程序，它应该基本能工作，但布局会不正确（见图 3-20）。


    ![Image 47](index-104_1.png)


    **90**


    Chapter 3 ■ VALIDATING INPUT


    详细消息显示在此处。


    **Figure 3-20.** *Detail message displayed but layout is incorrect*


    这是因为`<h:panelGrid>`按顺序布局子组件（按指定分为两列），而`UI Message`也是一个子组件（见图 3-21）。


    | Weight Label | Weight Input | Weight Error |

    |--------------|--------------|--------------|


    ```

    <h:panelGrid columns="2">

    <h:outputText value="Weight:"/>

    <h:inputText id="w" ...>

    <f:validateLongRange minimum="0"/>

    </h:inputText>

    <h:message for="f:w"/>

    <h:outputText value="Patron code:"/>

    <h:inputText value="#{r.patronCode}">

    <x:validatePatron/>

    </h:inputText>

    <h:outputText value=""/>

    <h:commandButton action="ok"/>

    </h:panelGrid>

    ```


    **Figure 3-21.** *The UI Message component is also a child component.*


