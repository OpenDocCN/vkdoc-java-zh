    **清单 5-29.** *在 Bar 标签库中使用 `<pe>` 标签*


    <?xml version="1.0" encoding="UTF- 8" ?>


    <!DOCTYPE html PUBLIC "- //W3C//DTD XHTML 1.0 Strict//EN"


    ["http://www.w3.org/TR/xhtml1/DTD/xhtml1- strict.dtd">](http://www.w3.org/TR/xhtml1/DTD/xhtml1-�strict.dtd)


    [<html](http://www.w3.org/1999/xhtml)


    [**>**](http://java.sun.com/jsf/composite/bar)


    <p>这是页面 1。</p>


    **<bar:pe product="#{currentProduct}"/>**


    <foo:pair>


    <ui:define name="left">


    <foo:pe product="#{currentProduct}"/>


    **172**


    第 5 章 ■ 创建自定义组件


    </ui:define>


    <ui:define name="right">


    <foo:copyright company="Foo"/>


    </ui:define>


    </foo:pair>


    </html>


    现在，运行应用程序，它应该在 `pair` 外部显示一个新的产品编辑器。


    **总结**


    每当你在 XHTML 文件中看到重复的代码时，就应当考虑将这些重复代码提取到自定义组件中。如本章所学，要做到这一点，你可以通过将一个 `*.taglib.xml`
    文件放入 `META-INF` 文件夹来定义一个标签库。


    对于每个标签，指定源 XHTML 文件，并将重复的代码放入该 XHTML 文件中。


    你还学习了如何向自定义标签传递参数。在树构建时，参数会被组织成一个变量表，源文件中的 EL 表达式会链接到该变量表。在渲染时，它们会追踪到变量表，以获取值作为
    EL 表达式进行求值。


    EL 表达式只能求值为一个值/对象。它不能求值为一个方法。


    要向自定义标签传递一个方法，请传递一个包含该方法的对象。


    你不能通过参数向自定义标签传递 XHTML 代码，并期望 JSF 解析该代码。要做到这一点，请将代码放入标签的主体中，或者如果你有多段代码，请使用 `<ui:define>`。自定义组件可以使用
    `<ui:insert>` 追踪到代码中以构建子树。

    '
- fmt: "# 排版后的内容\n\nTo reuse custom tags in multiple projects, you can export the\
    \ `META-INF` folder into a JAR file and reuse it.\n\nFinally, you learned you\
    \ can create a tag lib without using a `taglib.xml` file by creating a folder\
    \ using the short name of the tag lib in a special location on the classpath (`META-INF/resources`).\
    \ The short name is also used to derive the namespace URL. Components in such\
    \ a tag lib provide more information regarding their parameters for visual tools\
    \ to use. To access their parameters, the components need to access them from\
    \ a `Map` using a special name in EL expressions.\n\n![Image 69](index-187_1.png)\n\
    \n![Image 70](index-187_2.png)\n\n# Chapter 6: Providing a Common Layout for Your\
    \ Pages\n\nIt is commonly required for all the pages in a given application to\
    \ have a common layout.\n\nIn this chapter, you’ll learn how to apply a common\
    \ layout to all your pages in your application easily.\n\n## Using the Same Menu\
    \ on Different Pages\n\nSuppose that you’d like to develop an application like\
    \ the one shown in Figure 6-1. It is not important what the application shown\
    \ does. What is important is that on each page there is the same menu on the left.\n\
    \n**Figure 6-1.** *All the pages have a menu on the left.*\n\nTo do that, create\
    \ a new dynamic web project named `Layout`. You’re about to create two pages:\
    \ `home.xhtml` and `products.xhtml`. Figure 6-2 shows the structure of these pages.\n\
    \nYou can see that the XHTML page structures are the same, and the only difference\
    \ is the cell content on the right.\n\n**173**\n\n**174**\n\n**Figure 6-2.** *Pages\
    \ sharing a common structure*\n\nWhenever you see duplicate XHTML code, you should\
    \ extract it into a common place. For example, if you extracted it into a component,\
    \ that would allow you to reuse it in both pages (see Listing 6-1 for `home.xhtml`\
    \ using the imagined component), but you would still have to duplicate the `<html>`\
    \ tag, the `<head>` tag, the `<body>` tag, any CSS styles, and so on, as highlighted\
    \ in Listing 6-1.\n\n**Listing 6-1.** *Using a Custom Component Would Not Remove\
    \ All Duplicate Code*\n\n```xml\n<?xml version=\"1.0\" encoding=\"UTF-8\" ?>\n\
    <!DOCTYPE html PUBLIC \"-//W3C//DTD XHTML 1.0 Strict//EN\"\n\"http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd\"\
    >\n<html xmlns=\"http://www.w3.org/1999/xhtml\"\n      xmlns:h=\"http://java.sun.com/jsf/html\"\
    \n      xmlns:f=\"http://java.sun.com/jsf/core\"\n      xmlns:foo=\"http://foo.com\"\
    >\n<head>\n<meta http-equiv=\"Content-Type\" content=\"text/html; charset=UTF-8\"\
    \ />\n<link rel=\"stylesheet\" type=\"text/css\" href=\"style1.css\"/>\n<link\
    \ rel=\"stylesheet\" type=\"text/css\" href=\"style2.css\"/>\n</head>\n<body>\n\
    <foo:mycomponent>\nThis is the Home page.\n</foo:mycomponent>\n</body>\n</html>\n\
    ```\n\n**175**\n\nInstead of having to repeat all that code, you should extract\
    \ the duplicate code into a base page that contains some abstract parts (see Figure\
    \ 6-3). Then you can let each page extend the base page and provide its unique\
    \ content, just like Java class inheritance.\n\n**Figure 6-3.** *Page inheritance*\n\
    \nTo do that, create `base.xhtml` (also in the `WebContent` folder), as shown\
    \ in Listing 6-2. Note how it uses the `<ui:insert>` tag to insert the abstract\
    \ part, exactly like what you would do in a custom component in the previous chapter.\n\
    \n**Listing 6-2.** *The Base Page*\n\n```xml\n<?xml version=\"1.0\" encoding=\"\
    UTF-8\" ?>\n<!DOCTYPE html PUBLIC \"-//W3C//DTD XHTML 1.0 Strict//EN\"\n\"http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd\"\
    >\n<html xmlns=\"http://www.w3.org/1999/xhtml\"\n      xmlns:ui=\"http://java.sun.com/jsf/facelets\"\
    >\n<head>\n<meta http-equiv=\"Content-Type\" content=\"text/html; charset=UTF-8\"\
    \ />\n<title>Insert title here</title>\n</head>\n<body>\n<h:form>\n<table>\n<tr>\n\
    <td width=\"40%\"><h:commandLink action=\"home\">Home</h:commandLink> <br />"
