    **5**


    Click Finish. Next, you need to create a JBoss instance. In the bottom part of
    the Eclipse window, you’ll see a Servers tab (you’ll see this tab only when you’re
    in the Java EE perspective); right-click anywhere on the tab, choose New ➤ Server,
    and choose the JBoss v5.0 server runtime environment (Figure 1-8).


    **Figure 1-8.** *Choosing the JBoss runtime environment*


    Click Next until you see the screen in Figure 1-9, where you can add web applications
    to the JBoss instance.


    ![Image 9](index-20_1.png)


    ![Image 10](index-20_2.png)


    **6**


    Chapter 1 ■ Getting Started with JSF


    You can add selected projects to that JBoss instance. If you had web application
    projects in Eclipse, you would see them listed here.


    **Figure 1-9.** *Adding web applications*


    For the moment, you’ll have none. Click Finish. Then you should see your JBoss
    instance on the Servers tab (Figure 1-10).


    To run it, click the green button here. To stop it, click the red button here.


    **Figure 1-10.** *JBoss instance*


    Chapter 1 ■ Getting Started with JSF


    **7**


    Click the green icon as shown in Figure 1-10 to run JBoss. Then you will see some
    messages on the Console tab, as shown here:


    ```

    ...

    14:47:06,820 INFO [TomcatDeployment] deploy, ctxPath=/

    14:47:06,902 INFO [TomcatDeployment] deploy, ctxPath=/jmx-console

    14:47:06,965 INFO [Http11Protocol] Starting Coyote HTTP/1.1 on http-127.0.0.1-8080

    14:47:06,992 INFO [AjpProtocol] Starting Coyote AJP/1.3 on ajp-127.0.0.1-8009

    14:47:07,001 INFO [ServerImpl] JBoss (Microcontainer) [5.0.1.GA (build:

    SVNTag=JBoss_5_0_1_GA date=200902231221)] Started in 26s:587ms

    ```


    **Note** If your computer is not that fast, JBoss will take so long to start that
    Eclipse may think it has stopped responding. In that case, double-click the JBoss
    instance, click Timeouts, set the timeout for starting to a longer value such
    as 100 seconds, and then start JBoss again.


    To stop JBoss, click the red icon (as shown earlier in Figure 1-10).


    ## Installing a JSF Implementation


    JSF stands for JavaServer Faces and is an API (basically, it’s some Java interfaces).
    To use JSF, you need an implementation (which means you need Java classes that
    implement those interfaces). There are two main implementations: the reference
    implementation from Sun and MyFaces from Apache. In this book, you’ll use the
    former, but you could use MyFaces with no practical difference.


    So, go to [https://javaserverfaces.dev.java.net](https://javaserverfaces.dev.java.net)
    to download a binary package of the JSF 2.0 implementation, which is called Mojarra.
    The file is probably called something like `mojarra-2.0.0-PR2-binary.zip`; unzip
    it into a folder, say `c:\jsf`.


    **8**


    Chapter 1 ■ Getting Started with JSF


    ## Installing Web Beans


    To install Web Beans, go to [http://www.seamframework.org/WebBeans](http://www.seamframework.org/WebBeans)
    to download it. Make sure it is strictly newer than 1.0.0 ALPHA2; otherwise, get
    the nightly snapshot. The file is probably called something like `webbeans-ri-distribution-1.0.0-SNAPSHOT.zip`;
    unzip it into a folder such as `c:\webbeans`.


    Next, you’ll need to install Web Beans into JBoss. To do that, you’ll need to
    run Ant 1.7.0 or newer. If you don’t have this tool, you can download it from
    [http://ant.apache.org](http://ant.apache.org) and unzip it into a folder such
    as `c:\ant`.


    Next, modify the `c:\webbeans\jboss-as\build.properties` file to tell it where
    JBoss is, as shown in Listing 1-1. Make sure that there is no leading `#` character
    on that line!


    **Listing 1-1.** *Tell Web Beans Where JBoss Is*


    ```

    jboss.home=c:\jboss

    java.opts=...

    webbeans-ri-int.version=5.2.0-SNAPSHOT

    webbeans-ri.version=1.0.0-SNAPSHOT

    jboss-ejb3.version=1.0.0

    ```


    Open a command prompt, make sure you’re connected to the Internet, and then issue
    the commands shown in Listing 1-2.


    **Listing 1-2.** *Issue These Commands at the Command Prompt*


    ```

    c:\>cd \webbeans\jboss-as

    c:\>set ANT_HOME=c:\ant

    c:\>ant update

    ```


    This will output a lot of messages. If everything is fine, you should see a “BUILD
    SUCCESSFUL” message.'
