    **总结**


    在本章中，您学习了如何使用 Ajax 构建页面。Ajax 意味着当浏览器中发生某个事件时，会向应用程序发送一个请求，以便其执行某些操作，然后仅刷新页面的部分内容。您可以使用
    <a4j:commandLink> 处理链接，使用 <a4j:commandButton> 处理按钮，或使用 <a4j:support> 处理其他任何事件。


    在这些标签中，您还需要指定要在应用程序中执行的动作方法，以及需要刷新的组件 ID 列表。


