    <h:outputText value="#{b.todayIs}"/>


    <h:outputText value="#{showDate.today}">


    **<f:convertDateTime dateStyle="long"/>**


    </h:outputText>.


    </body>


    </html>

    ```


    运行应用程序，它应该会以中文显示当前日期。如果你在浏览器中将首选语言更改为英语并刷新页面，当前日期应该会以英语显示。


