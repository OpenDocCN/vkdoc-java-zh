- fmt: 'Anyway, now you have internationalized this page (let it use a resource bundle)
    and localized it to Chinese (provided `msgs_zh.properties`). If in the future
    you need to add support for, say, French, you will not need to internationalize
    it again but just need to localize it to French (provide `msgs_fr.properties`).


    ## Easier Way to Access Map Elements


    Before moving on, let’s introduce an easier way to access a map element if the
    key is a literal string. Instead of writing `b[''currentDate'']`, you could write
    `b.currentDate`. After failing to find the `getCurrentDate()` method on the `b`
    object, it will try to perform a map lookup or a resource bundle lookup. Therefore,
    `showdate.xhtml` can be slightly simplified, as shown in Listing 9-7.


    **Listing 9-7.** *Accessing Map Elements Using the Dot Notation*


    ```xml

    <?xml version="1.0" encoding="UTF-8" ?>


    <!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN"


    ["http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">](http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd)


    [<html](http://www.w3.org/1999/xhtml)


    [>](http://java.sun.com/jsf/core)


    <head>


    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />


    <f:loadBundle basename="multilang.msgs" var="b" />


    <title>


    **<h:outputText value="#{b.currentDate}"/>**


    </title>


    </head>


    <body>


    **238**


    Chapter 9 ■ SUppOrtING Other LaNGUaGeS


    **<h:outputText value="#{b.todayIs}"/>**


    <h:outputText value="#{showDate.today}"/>.


    </body>


    </html>

    ```


    ## Internationalizing the Date Display


    For the moment, the current date and time is still displayed in the default language
    of your OS account (probably English). To solve the problem, modify `showdate.xhtml`
    as shown in Listing 9-8. It shows that not only can UI Input components take a
    converter (see Chapter 2 for a review on converters) but that UI Output components
    can do that too. While the former will use a converter for both rendering and
    handling form submissions, the latter will use it only for rendering. Without
    a converter, a UI Output component will simply call `toString()` on the value
    to convert it to a string. With a converter, it will be used to do the conversion.
    But more important, the date-time converter will use the language code stored
    in the UI View Root to format the `Date` object. Setting the date style to `long`
    is not really required; it is done so that you can see Chinese characters in the
    date display.


    **Listing 9-8.** *Specifying a Language-Aware Converter for a UI Output Component*


    ```xml

    ...

    <body>


    <h:outputText value="#{b.todayIs}"/>


    <h:outputText value="#{showDate.today}">


    **<f:convertDateTime dateStyle="long"/>**


    </h:outputText>.


    </body>


    </html>

    ```


    Run the application, and it should display the current date in Chinese. If you
    change the preferred language to English in the browser and refresh the page,
    the current date should appear in English.


    ## Letting the User Change the Language Used


    Suppose that a user is using a browser that prefers Chinese but he would like
    to show the application to his friend who doesn’t understand Chinese but understands
    English. To support this, you should enhance the application to allow the user
    to explicitly choose the language, as shown in Figure 9-7.


    ![Image 81](index-253_1.png)


    ![Image 82](index-253_2.png)


    Chapter 9 ■ SUppOrtING Other LaNGUaGeS


    **239**


    Clicking the button will change the language used.


    **Figure 9-7.** *Letting the user change the language used*


    To do that, modify `showdate.xhtml` as shown in Listing 9-9.


    **Listing 9-9.** *Letting the User Choose the Language in a Form*


    ```xml

    ...

    <body>


    <h:outputText value="#{b.todayIs}"/>


    <h:outputText value="#{showDate.today}">


    <f:convertDateTime dateStyle="long"/>


    </h:outputText>.


    **<h:form>**


    **<h:selectOneMenu value="#{showDate.langCode}">**


    **<f:selectItems value="#{showDate.langCodes}"/>**


    **</h:selectOneMenu>**


    **<h:commandButton action="#{showDate.changeLangCode}" value="Change"/>**


    **</h:form>**


    </body>

    ```


    Define the properties required in the `ShowDate` class as in Listing 9-10. Note
    how you get the default language and the supported language from the JSF `Application`
    object.'
