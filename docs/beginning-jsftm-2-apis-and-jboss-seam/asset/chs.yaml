  \ ID 的 `Product` 对象，以便找出产品的价格并累加到总金额中。\n\n**清单 10-23.** *注入 EntityManager*\n\npackage\
  \ shop;\n\n...\n\n**import javax.persistence.EntityManager;**\n\n**import javax.persistence.Query;**\n\
  \n@Stateless\n\n@Name(\"confirm\")\n\n@Scope(ScopeType.EVENT)\n\npublic class ConfirmBean\
