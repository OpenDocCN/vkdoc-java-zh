  此注解告诉 JBoss，当您要求\n\n>= 0。\n\n将 Product 对象添加到表时，如果 id\n\n字段为 null，则在将其保存到表之前，应自动为其生成一个值。\n\
  \n此注解规定名称不能为空。例如，JBoss 可以将其\n\n转换为 name 列上的 NOT NULL 约束。\n\n**图 10-2.** *将 Product\
