  \n为了验证用户输入，你可以向一个 UI 输入组件添加一个或多个验证器对象（见图 3-5）。当表单提交时，如前所述，在“应用请求值”阶段，UI 输入组件会将原始输入字符串（–5）存储在本地。在“处理验证”阶段，它会将其转换为一个对象（这里是一个整数\
  \ –5）。然后，它会依次要求其每个验证器（如果有的话）来验证转换后的值（这里是 –5）。如果某个验证器失败，它会记录一条错误消息，并告知 JSF 引擎直接跳转到“呈现响应”阶段，而不会更新\
