  \ {**\n\n**return true;**\n\n**}**\n\nif (\"admin\".equals(credentials.getUsername()))\
  \ {\n\nidentity.addRole(\"admin\");\n\nreturn true;\n\n}\n\nreturn false;\n\n}\n\
  \n}\n\n现在，运行应用程序，以 u1 身份登录，并尝试访问产品编辑页面。你应该会被拒绝。如果你注销并以 admin 用户身份再次尝试，你应该能够进入。\n\
