  }\n\n为了实现 `getCreditCardNo()` 方法，为简单起见，我们直接为用户 `u1` 硬编码信用卡号，而不是查询用户数据库，如清单 10-24\
  \ 所示。\n\n**清单 10-24.** *getCreditCardNo() 方法*\n\npackage shop;\n\n...\n\n@Stateless\n\
  \n@Name(\"confirm\")\n\n@Scope(ScopeType.EVENT)\n\npublic class ConfirmBean implements\
  \ Confirm {\n\n@In\n\nprivate Credentials credentials;\n\n@In\n\nprivate Cart cart;\n\
  \n@In\n\nprivate EntityManager entityManager;\n\n@Override\n\npublic String getCreditCardNo()\
