  运行应用程序，尝试向购物车添加一个产品。正确的产品 ID 应该会打印在控制台中。\n\n接下来，修改 cart.xhtml 以显示购物车内容，如清单 10-14\
  \ 所示。\n\n**清单 10-14.** *显示购物车内容*\n\n<!DOCTYPE composition PUBLIC \"-//W3C//DTD XHTML\
