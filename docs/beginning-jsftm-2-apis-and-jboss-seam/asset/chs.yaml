  \n**图 3-28.** *整个 Request 对象被验证。*\n\n**100**\n\n第 3 章 ■ 验证输入\n\n**总结**\n\n在本章中，你学习了如何验证用户输入。为了验证单个\
  \ UI 输入组件中的用户输入，你可以向其添加一个或多个验证器。它们将在处理验证阶段被逐一调用，以检查转换后的值。如果任何一个验证失败，它将为该组件（或者更确切地说，为其客户端\
  \ ID）记录一个错误，并告知 JSF 引擎直接跳转到响应渲染阶段。\n\n如你所学，JSF 提供了一些预定义的验证器，用于检查长整型的范围、双精度浮点型的范围或字符串的长度。要自定义它们的错误消息，可以使用消息包或直接在验证器标签中提供消息。\n\
  \n为了执行自定义验证，你了解到可以通过提供一个 Java 类和一个验证器 ID 来创建自定义验证器。此外，你需要定义一个将创建该验证器的 Facelet 标签。如果验证涉及两个或更多组件，你可以向\
  \ UI 命令添加一个动作监听器。它将在调用应用阶段执行。\n\n这样，bean 将被更新，以便你可以检查它们的属性。\n\n我还介绍了如何指定 JSF 消息。具体来说，一条\
  \ JSF 消息包含一个严重级别、一个摘要和一个详细信息。通常，你会使用 UI 消息组件显示摘要，并使用 UI 消息组件与每个 UI 输入组件一起显示详细信息。\n\
  \n要自定义 HTML 输出的外观，你可以定义 CSS 样式类，并让组件引用它们。\n\nUI 面板组件根据其渲染器来布局其子组件。它可以以表格形式布局（<panelGrid>），或者只是逐个排列它们（<panelGroup>）。\n\
  \n最后，你了解到，如果一个 Web bean 从未通过名称被查找，则无需在其上使用 @Named。\n\n![图片 51](img/index-115_1.png)\n\
  \n![图片 52](img/index-115_2.png)\n\n第 4 章\n\n创建一个电子商店\n\n\n\n**本**章将学习如何创建一个电子商店。这包括展示产品列表（使用循环）、为每个用户实现购物车、支持用户登录和注销，以及要求结账页面需经过身份验证才能访问。\n\
  \n假设你想创建如图 4-1 所示的电子商店。初始状态下，页面会列出所有产品。点击某个产品链接将显示该产品的详情页面。\n\n点击链接将\n显示该产品的\n详情页面。\n\
  \n此处列出了三个产品。\n你可以在此区域显示产品的\n第一个产品的 ID 为 p01，\n部分详细信息，但为了\n名称为“铅笔”，价格为 1.2 美元。\n\
  简便起见，此处不做任何操作。\n\n**图 4-1.** *你的电子商店*\n\n**101**\n\n**102**\n\n第 4 章 ■ 创建电子商店\n\n\
  **列出产品**\n\n好的，我们开始吧。创建一个名为 Shop 的动态 Web 项目。然后创建一个 catalog.xhtml 页面。如何列出产品？这里的问题是，假设产品是从数据库加载的；因此，你无法预先知道产品的数量，所以不能像清单\
  \ 4-1 那样使用`<h:panelGrid>`预先布局。\n\n**清单 4-1.** *你不知道要布局多少个产品*\n\n<h:panelGrid...>\n\
  \n产品 1\n\n产品 2\n\n产品 3 -> 但你怎么知道只有三个产品呢？\n\n</h:panelGrid>\n\n要在运行时执行循环，你可以使用`<h:dataTable>`，如图\
  \ 4-2 所示。简而言之，它会遍历列表中的每个元素。对于每个元素，它会渲染内部指定的所有列。图 4-3 显示了将要创建的组件树。\n\n你在此处指定一个产品列表。\n\
  如果它包含，比如说，10 个产品，\n数据表将循环 10 次。\n\n...\n\n`<h:column>`标签代表表格中的\n<body>\n一列。此处，它代表“产品\
  \ ID”\n<h:dataTable value=\"a list of product\">\n列。\n<h:column>\n<h:outputText\
  \ value=\"some id\"/>\n</h:column>\n渲染顺序如下所示。\n<h:column>\n这是<h:outputText value=\"\
  some name\"/>\n名称列</h:column>\n。\n<h:column>\n这是<h:outputText value=\"some price\"\
  />\n价格列</h:column>\n。\n</h:dataTable>\n...\n...\n...\n`<h:column>`内部的标签将\n</body>\n\
  输出单元格内容。\n</html>\n\n**图 4-2.** *使用<h:dataTable>进行循环*\n\n第 4 章 ■ 创建电子商店\n\n**103**\n\
  \nUI Data\n\nUI Column\n\nUI Output\n\nUI Column\n\nUI Output\n\nUI Column\n\nUI\
  \ Output\n\n**图 4-3.** *由<h:dataTable>和<h:column>创建的组件树*\n\n要实现这个想法，你需要使用一个 Web\
  \ Bean 提供一个产品列表。因此，在 shop 包中创建一个 Catalog 类，如清单 4-2 所示。由于目录是全局性的，请使用应用程序作用域。此外，为了简便起见，我们不从数据库加载产品，而是直接将它们硬编码到一个列表中。\n\
  \n**清单 4-2.** *Catalog 类*\n\npackage shop;\n\n...\n\n@Named(\"catalog\")\n\n@ApplicationScoped\n\
  \npublic class Catalog {\n\nprivate List<Product> products;\n\npublic Catalog()\
  \ {\n\nproducts = new ArrayList<Product>();\n\nproducts.add(new Product(\"p1\",\
  \ \"Pencil\", 1.20));\n\nproducts.add(new Product(\"p2\", \"Eraser\", 2.00));\n\n\
  products.add(new Product(\"p3\", \"Ball pen\", 3.50));\n\n}\n\npublic List<Product>\
  \ getProducts() {\n\nreturn products;\n\n}\n\n}\n\n**104**\n\n第 4 章 ■ 创建电子商店\n\n\
  在同一个包中定义 Product 类（清单 4-3）。\n\n**清单 4-3.** *Product 类*\n\npackage shop;\n\npublic\
  \ class Product {\n\nprivate String id;\n\nprivate String name;\n\nprivate double\
  \ price;\n\npublic Product(String id, String name, double price) {\n\nthis.id =\
  \ id;\n\nthis.name = name;\n\nthis.price = price;\n\n}\n\npublic String getId()\
  \ {\n\nreturn id;\n\n}\n\npublic String getName() {\n\nreturn name;\n\n}\n\npublic\
  \ double getPrice() {\n\nreturn price;\n\n}\n\n}\n\n将列表提供给 dataTable（清单 4-4）。\n\n\
  **清单 4-4.** *将列表提供给 dataTable*\n\n...\n\n<h:dataTable value=\" **#{catalog.products}**\"\
  >\n\n<h:column>\n\n<h:outputText value=\"some id\"/>\n\n</h:column>\n\n<h:column>\n\
  \n<h:outputText value=\"some name\"/>\n\n</h:column>\n\n<h:column>\n\n<h:outputText\
  \ value=\"some price\"/>\n\n</h:column>\n\n</h:dataTable>\n\n![Image 53](img/index-119_1.png)\n\
  \n第 4 章 ■ 创建电子商店\n\n**105**\n\n\n\n现在，UI Data 组件将逐个渲染 Product 对象（每个 Product 占一行）。然而，列中的\
  \ UI Output 组件如何访问当前 Product 对象中的信息呢？你可以通过 `var` 属性来实现，如清单 4-5 所示。简而言之，UI Data 将使用\
  \ `p` 作为循环变量，依次指向每个元素。该变量在请求中实现为一个属性（一个名称-值对）。\n\n因此，你最终可以像访问 Web Bean 一样访问该属性（清单\
  \ 4-5）。\n\n**清单 4-5.** *像访问 Web Bean 一样访问属性*\n\n...\n\n**<h:dataTable value=\"#{catalog.products}\"\
  \ var=\"p\">**\n\n<h:column>\n\n**<h:outputText value=\"#{p.id}\"/>**\n\n</h:column>\n\
  \n<h:column>\n\n**<h:outputText value=\"#{p.name}\"/>**\n\n</h:column>\n\n<h:column>\n\
  \n**<h:outputText value=\"#{p.price}\"/>**\n\n</h:column>\n\n</h:dataTable>\n\n\
  请注意，属性*不是* Web Bean。在评估 EL 表达式时，JSF 会先尝试查找属性，然后再查找 Web Bean。现在运行应用程序时，产品将会显示出来（见图\
  \ 4-4）。\n\n**图 4-4.** *产品已显示。*\n\n**106**\n\n第 4 章 ■ 创建电子商店\n\n为了使网格可见，请按清单 4-6\
  \ 所示修改页面。\n\n**清单 4-6.** *设置边框宽度*\n\n...\n\n**<h:dataTable value=\"#{catalog.products}\"\
  \ var=\"p\" border=\"1\">**\n\n<h:column>\n\n<h:outputText value=\"#{p.id}\"/>\n\
  \n</h:column>\n\n<h:column>\n\n<h:outputText value=\"#{p.name}\"/>\n\n</h:column>\n\
  \n<h:column>\n\n<h:outputText value=\"#{p.price}\"/>\n\n</h:column>\n\n</h:dataTable>\n\
  \n现在运行应用程序时，表格边框将会显示。\n\n**创建显示详情的链接**\n\n现在，让我们创建显示产品详情的链接。为此，你将使用 `<h:commandLink>`\
  \ 标签，如图 4-5 所示。\n\n<h:dataTable value=\"#{catalog.products}\" var=\"p\" border=\"\
  1\">\n\n<h:column>\n\n<h:outputText value=\"#{p.id}\"/>\n\n</h:column>\n\n它将生成 `<a>`\
  \ 标签。\n\n<h:column>\n\n**<h:commandLink>**\n\n<a>...</a>\n\n<h:outputText value=\"\
  #{p.name}\"/>\n\n**</h:commandLink>**\n\n</h:column>\n\n<h:column>\n\n`<h:commandLink>`\
  \ 元素的内容将生成 `<a>` 元素的内容。或者，你也可以使用 `value` 属性指定内容：\n\n<h:outputText value=\"#{p.price}\"\
  />\n\n<h:commandLink **value=\"#{p.name}\"** />\n\n</h:column>\n\n</h:dataTable>\n\
  \n**图 4-5.** *使用 <h:commandLink>*\n\n第 4 章 ■ 创建电子商店\n\n**107**\n\n请注意，`<h:commandLink>`\
  \ 标签的行为与 `<h:commandButton>` 标签相同，因为它们都会创建一个 UI Command 组件。唯一的区别在于，前者会将 UI Command\
  \ 渲染为链接，而后者会渲染为按钮（见图 4-6）。一个重要的结果是，`<h:commandLink>` 标签会像 `<h:commandButton>` 一样提交表单，因此它必须出现在表单内部。\n\
  \n就像渲染为按钮时一样，UI Command 在被点击时会提交其所在的表单。这是通过 JavaScript 实现的。\n\n链接\n\n<a onclick=\"\
  javascript to submit the form\">...</a>\n\n渲染器\n\nUI Command\n\n按钮\n\n<input type=\"\
  submit\" ...>\n\n渲染器\n\nUI Command\n\n**图 4-6.** *<h:commandLink> 与 <h:commandButton>\
  \ 对比*\n\n因此，你需要按清单 4-7 所示修改代码。\n\n如果你使用的是 `<h:commandButton>`，你会通过 `action` 属性设置结果。由于\
  \ `<h:commandLink>` 的行为完全相同，你也做同样的事情。\n\n**清单 4-7.** *设置 <h:commandLink> 的结果*\n\n\
  ...\n\n<h:dataTable value=\"#{catalog.products}\" var=\"p\" border=\"1\">\n\n<h:column>\n\
  \n<h:outputText value=\"#{p.id}\"/>\n\n</h:column>\n\n<h:column>\n\n**<h:form>**\n\
  \n**<h:commandLink action=\"detail\">**\n\n**<h:outputText value=\"#{p.name}\"/>**\n\
  \n**</h:commandLink>**\n\n**</h:form>**\n\n</h:column>\n\n<h:column>\n\n**108**\n\
  \n第 4 章 ■ 创建电子商店\n\n<h:outputText value=\"#{p.price}\"/>\n\n</h:column>\n\n</h:dataTable>\n\
  \n为了使其工作，请按清单 4-8 所示创建一个 `detail.xhtml` 页面。请注意，为简单起见，目前它只包含静态内容。\n\n**清单 4-8.**\
  \ *详情页面*\n\n<?xml version=\"1.0\" encoding=\"UTF- 8\" ?>\n\n<!DOCTYPE html PUBLIC\
  \ \"- //W3C//DTD XHTML 1.0 Strict//EN\"\n\n\n\n[\"http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd\"\
  >](http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd)\n\n[<html](http://www.w3.org/1999/xhtml)\n\
  \n[>](http://java.sun.com/jsf/html)\n\n<head>\n\n<meta http-equiv=\"Content-Type\"\
  \ content=\"text/html; charset=UTF-8\" />\n\n<title>在此处插入标题</title>\n\n</head>\n\
  \n<body>\n\n这是详情页\n\n</body>\n\n</html>\n\n在 `faces-config.xml` 中创建一个导航规则，如清单 4-9\
  \ 所示。\n\n**清单 4-9.** *显示详情页面的导航规则*\n\n<faces-config ...>\n\n<application>\n\n<view-handler>com.sun.facelets.FaceletViewHandler\n\
  \n</view-handler>\n\n</application>\n\n**<navigation-rule>**\n\n**<from-view-id>/catalog.xhtml</from-view-id>**\n\
  \n**<navigation-case>**\n\n**<from-outcome>detail</from-outcome>**\n\n**<to-view-id>/detail.xhtml</to-view-id>**\n\
  \n**</navigation-case>**\n\n**</navigation-rule>**\n\n</faces-config>\n\n现在运行应用程序时，详情链接应该可以正常工作（见图\
  \ 4-7）。\n\n![图 54](img/index-123_1.png)\n\n![图 55](img/index-123_2.png)\n\n第 4 章\
  \ ■ 创建电子商店\n\n**109**\n\n**图 4-7.** *详情链接正常工作*\n\n接下来的问题是，如何在详情页面中获取所选产品的访问权限？\n\
  \n作为第一步，让我们创建一个动作监听器，将所选产品的 ID 打印到控制台（我们在第 3 章中介绍过动作监听器）。为此，请按清单 4-10 所示修改 `catalog.xhtml`。\n\
  \n**清单 4-10.** *使用动作监听器处理点击事件*\n\n[<html](http://www.w3.org/1999/xhtml)\n\n[**>**](http://java.sun.com/jsf/core)\n\
  \n...\n\n<h:dataTable value=\"#{catalog.products}\" var=\"p\" border=\"1\">\n\n\
  <h:column>\n\n<h:outputText value=\"#{p.id}\"/>\n\n</h:column>\n\n<h:column>\n\n\
  <h:form>\n\n<h:commandLink action=\"detail\">\n\n**<f:actionListener type=\"shop.OnDetailActionListener\"\
  />**\n\n<h:outputText value=\"#{p.name}\"/>\n\n</h:commandLink>\n\n</h:form>\n\n\
  </h:column>\n\n<h:column>\n\n<h:outputText value=\"#{p.price}\"/>\n\n</h:column>\n\
  \n</h:dataTable>\n\n**110**\n\n第 4 章 ■ 创建电子商店\n\n动作监听器如何获取所选产品的访问权限？当 UI Data 遍历各行时（见图\
  \ 4-8），从概念上讲，它会为 `<h:commandLink>` 创建的 UI Command 创建一个环境对象。该环境对象包含当前行的索引。当 UI Command\
  \ 需要输出其客户端 ID 时，它会通过该环境发送其客户端 ID，环境对象会将行索引附加到客户端 ID 上，以便在页面上显示。\n\n<tr>...<a id=\"\
  foo:0\">...</a>...</tr>\n\n<tr>...<a id=\"foo:1\">...</a>...</tr>\n\n<tr>...<a id=\"\
  foo:2\">...</a>...</tr>\n\nUI Data\n\n2：将行索引附加到客户端 ID。\n\n行索引：0\n\n行索引：1\n\n行索引：2\n\
  \n1：输出我的客户端 ID，foo。\n\nUI Command\n\nid: \"foo\"\n\n**图 4-8.** *行特定环境将行索引附加到客户端\
  \ ID*\n\n当用户点击链接时（见图 4-9），在应用请求值阶段，UI Data 会再次遍历每一行。对于每一行，它会再次为 UI Command 创建一个环境对象。当\
  \ UI Command 检查自身是否被点击时，它会将其客户端 ID 发送给环境对象。该环境对象会再次附加行索引以获取最终的客户端 ID，然后与请求中的客户端\
  \ ID 进行比对。如果匹配，UI Command 将通过环境对象安排动作监听器的执行。\n\n环境对象会附加到等待执行的动作监听器上。当动作监听器执行时，环境对象会先根据其行\
  \ ID 在请求作用域中设置 `p` 属性，然后再调用动作监听器。最后，为了清理，它会移除 `p` 属性。\n\n第 4 章 ■ 创建电子商店\n\n**111**\n\
  \np1\n\np2\n\np3\n\n名称\n\n值\n\np\n\n...\n\n..\n\n...\n\n..\n\n2：附加行索引得到 foo:0，然后进行比较。匹配！\n\
  \n动作\n\nUI Data\n\n监听器\n\n6：执行。\n\n行索引：0\n\n行索引：1\n\n...\n\n行索引：0\n\n点击：foo:0\n\n\
  5：根据行索引设置值。\n\n1：我的客户端 ID，foo，被点击了吗？\n\n3：在调用应用阶段执行动作监听器。\n\nUI Command\n\n4：执行。\n\
  \n应用请求值\n\n调用应用\n\n**图 4-9.** *UI Data 如何处理表单提交*\n\n\n\n因此，在你的动作监听器中，你可以轻松地从 `p`\
  \ 属性中访问选定的 Product 对象。所以，在 `shop` 包中创建 `OnDetailActionListener` 类（参见清单 4-11）。\n\n\
  **清单 4-11.** *在动作监听器中访问当前 Product* `package shop;`\n\n...\n\n`public class OnDetailActionListener\
  \ implements ActionListener {`\n\n`@Override`\n\n`public void processAction(ActionEvent\
  \ ev) throws AbortProcessingException {`\n\n`FacesContext context = FacesContext.getCurrentInstance();`\n\
  \n`Application app = context.getApplication();`\n\n`Product p = (Product) app.evaluateExpressionGet(context,\
  \ \"#{p}\",`\n\n`Product.class);`\n\n`System.out.println(p.getId());`\n\n`}`\n\n\
  `}`\n\n**112**\n\n第 4 章 ■ 创建电子商务网站\n\n现在运行应用程序，它应该会将产品 ID 打印到控制台。\n\n下一步是在详情页面中显示\
  \ Product 的详细信息。详情页面能否在 `p` 属性中找到 Product？不能，因为该属性会被移除。为了解决这个问题，你可以使用动作监听器将 Product\
  \ 对象存储到一个 Web Bean 中。为此，在 `shop` 包中创建一个 `ProductHolder` 类，如清单 4-12 所示。\n\n**清单 4-12.**\
  \ *使用 Web Bean 保存当前 Product 对象*\n\n`package shop;`\n\n...\n\n`@Named(\"ph\")`\n\n\
  `@RequestScoped`\n\n`public class ProductHolder {`\n\n`private Product currentProduct;`\n\
  \n`public Product getCurrentProduct() {`\n\n`return currentProduct;`\n\n`}`\n\n\
  `public void setCurrentProduct(Product currentProduct) {`\n\n`this.currentProduct\
  \ = currentProduct;`\n\n`}`\n\n`}`\n\n然后修改你的动作监听器，如清单 4-13 所示。\n\n**清单 4-13.** *使用\
  \ Web Bean 保存当前 Product 对象*\n\n`public class OnDetailActionListener implements ActionListener\
  \ {`\n\n`@Override`\n\n`public void processAction(ActionEvent ev) throws AbortProcessingException\
  \ {`\n\n`FacesContext context = FacesContext.getCurrentInstance();`\n\n`Application\
  \ app = context.getApplication();`\n\n`Product p = (Product) app.evaluateExpressionGet(context,\
  \ \"#{p}\",`\n\n`Product.class);`\n\n第 4 章 ■ 创建电子商务网站\n\n**113**\n\n`**ProductHolder\
  \ ph = (ProductHolder) app.evaluateExpressionGet(**`\n\n`**context,**`\n\n`**\"\
  #{ph}\",**`\n\n`**ProductHolder.class);**`\n\n`**ph.setCurrentProduct(p);**`\n\n\
  `}`\n\n`}`\n\n或者，回想一下，EL 表达式不仅可以被查询以获取值，还可以用于设置值。因此，你可以将代码修改为图 4-10 所示。\n\n`public\
  \ class OnDetailActionListener implements ActionListener {`\n\n`@Override`\n\n`public\
  \ void processAction(ActionEvent ev) throws AbortProcessingException {`\n\n`FacesContext\
  \ context = FacesContext.getCurrentInstance();`\n\n`Application app = context.getApplication();`\n\
  \n`Product p = (Product) app.evaluateExpressionGet(context, \"#{p}\",`\n\n`Product.class);`\n\
  \n`ProductHolder ph = (ProductHolder) app.evaluateExpressionGet(context,`\n\n`\"\
  #{ph}\",`\n\n表达式工厂可以创建 EL 表达式对象\n\nEL 上下文提供了变量绑定等\n\n`ProductHolder.class);`\n\n\
  `ph.setCurrentProduct(p);`\n\n`**ELContext elContext = context.getELContext();**`\n\
  \n`**ValueExpression ve = app.getExpressionFactory().createValueExpression(**`\n\
  \n`**elContext, \"#{ph.currentProduct}\", Product.class);**` `**ve.setValue(elContext,\
  \ p);**`\n\n`}`\n\n给定这个字符串形式的 EL 表达式，创建一个 EL 表达式对象\n\nEL 表达式的值应为 Product。这用于可能的类型转换\n\
  \n将 p 的值存储到 EL 表达式 (ph.currentProduct) 中\n\n`}`\n\n**图 4-10.** *利用 EL 表达式的可修改性*\
