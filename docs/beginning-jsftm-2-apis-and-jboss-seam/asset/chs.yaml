  \n\n这可以做得更好。例如，你可以只刷新答案，而不是整个页面。这样响应会感觉快得多，从而提供更好的用户体验。要实现这一点（见图 7-3），你需要为问题链接（`<a>`元素）的\
  \ `onclick` 事件生成一些 JavaScript。现在不必担心具体如何实现；本章后面会讲清楚。当链接被点击时，这段 JavaScript 会向你的应用程序发送一个请求。这将导致\
  \ UI Command 组件的动作方法执行，从而改变答案的表单。然后，只有 UI Output 组件被要求重新渲染（而不是整个页面）。UI Output 组件会生成一些\
  \ HTML 代码，这些代码将返回给浏览器中的 JavaScript。JavaScript 会使用这些 HTML 代码来更新答案。整个过程称为 Ajax。\n\n\
  2: 链接被点击。JavaScript\n向你的应用程序发送一个请求。\n\n3: 像往常一样调用其动作\n方法。这将改变\n答案的表单。\n\n1: 在此处生成一些\
  \ JavaScript\n请求。\n\n视图根节点\n\n<html>\n\n...\n\nUI Command\n\n<a onclick=\"some JavaScript\"\
  >如何...</a>\n\n<br/>\n\n双击其图标。\n\nUI Output\n\n...\n\n</html>\n\n5: 将此 HTML 代码返回给\
  \ JavaScript。希望它\n\n4: 只有答案\n组件被要求\n渲染。\n\n双击其图图标标标标标标标标标标标标标标标标标标标。\n\n**图 7-3.**\
  \ *Ajax 的工作原理*\n\n然而，还有一个问题：JavaScript 如何知道要更新页面的哪一部分？为了解决这个问题，你需要显式地为被刷新的组件（本例中是\
  \ UI Output 组件）分配一个 ID，如图 7-4 所示。这将导致该组件生成一个带有客户端 ID 的 HTML 元素。然后 JavaScript 可以使用该客户端\
  \ ID 查找现有的 HTML 元素并替换它。\n\n第 7 章 ■ 使用 Ajax 构建交互式页面\n\n**187**\n\n...\n\n<h:form>\n\
  \n<h:commandLink .../>\n\n</h:form>\n\n<br />\n\n<h:outputText value=\"...\" **id=\"\
  a\"** />\n\n<html>\n\n...\n\n<a onclick=\"some Javascript\">如何...</a>\n\n<br/>\n\
  \n**<span id=\"a\">** 双击其图标。 **</span>**\n\n1: 一开始，该 ID 将导致 UI\n\n...\n\nOutput\
  \ 生成一个 `<span>` 并设置\n\n</html>\n\n客户端 ID。\n\n2: 当 UI Output 在 Ajax 操作期间被刷新时，它也会输出一个设置了客户端\
  \ ID 的 `<span>`。\n\n3: JavaScript 将使用客户端 ID 查找现有的 HTML 元素并替换它。\n\n**<span id=\"\
  a\">** 双击其图图标标标标标标标标标标标标标标标标标标标。 **</span>** **图 7-4.** *分配 ID 以标识要更新的 HTML 元素*\n\
  \n为了实现这些想法，你需要使用一个名为 RichFaces 的 JSF 组件库，它来自 JBoss。请访问 http://labs.jboss.com/jbossrichfaces\
  \ 下载。它可能类似于 `richfaces-ui-3.3.0-GA-bin.zip`。将下载的文件解压到，例如，`c:\\richfaces-ui`。\n\n\
  要使用它，请将 `c:\\richfaces-ui\\lib` 中的所有 JAR 文件复制到你的 `WEB-INF/lib` 目录中。RichFaces 本身还需要一些第三方\
  \ JAR 文件。你可以从 Apress 网站的源代码部分（http://www.apress.com）下载它们，并将文件解压到 `WEB/lib` 目录中。\n\
  \n最后，在 Eclipse 中刷新项目。\n\nRichFaces 的 3.3 版本尚不支持 JSF 2.0。因为你在第 1 章中已将 JSF 2.0 安装到\
  \ JBoss 应用服务器中，所以无法在其上运行正在开发的应用。为了解决这个问题，你可能需要再次下载一份干净的 JBoss 应用服务器副本，并将其解压到，例如，`c:\\\
  jboss`。然后访问 https://facelets.dev.java.net/servlets/ProjectDocumentList 下载最新版本的 Facelets。它已被包含在\
  \ JSF 2.0 中，但由于你没有使用 JSF 2.0，你需要自己包含它。该文件可能类似于 `facelets-1.1.15.b1`。将其解压到，例如，`c:\\\
  facelets`。\n\n\n\n最后，将 `c:\\facelets\\jsf-facelets.jar` 复制到 `WEB-INF/lib` 目录下，并在\
  \ Eclipse 中刷新项目。在 JSF 2.0 之前，Facelets 是一个需要手动启用的附加组件。为此，请按清单 7-3 所示修改 `faces-config.xml`。\n\
  \n**188**\n\n第 7 章 ■ 使用 Ajax 构建交互式页面\n\n**清单 7-3.** *在 faces-config.xml 中启用 Facelets（JSF\
  \ 2.0 之前）*\n\n<faces-config ...>\n\n<application>\n\n<view-handler>com.sun.facelets.FaceletViewHandler\n\
  \n</view-handler>\n\n</application>\n\n</faces-config>\n\n接下来，按清单 7-4 所示修改 `WEB-INF/web.xml`。\n\
  \n**清单 7-4.** *为使用 RichFaces 而对 web.xml 进行的修改*\n\n<?xml version=\"1.0\" encoding=\"\
  UTF-8\"?>\n\n<web-app ...>\n\n...\n\n<servlet>\n\n<servlet-name>JSF</servlet-name>\n\
  \n<servlet-class>javax.faces.webapp.FacesServlet</servlet-class>\n\n</servlet>\n\
  \n<servlet-mapping>\n\n<servlet-name>JSF</servlet-name>\n\n<url-pattern>/faces/*</url-pattern>\n\
  \n</servlet-mapping>\n\n<context-param>\n\n**<param-name>org.richfaces.SKIN</param-name>**\n\
  \n**<param-value>blueSky</param-value>**\n\n**</context-param>**\n\n**<context-param>**\n\
  \n**<param-name>org.richfaces.CONTROL_SKINNING</param-name>**\n\n**<param-value>enable</param-value>**\n\
  \n**</context-param>**\n\n**<filter>**\n\n**<display-name>RichFaces Filter</display-name>**\n\
  \n**<filter-name>richfaces</filter-name>**\n\n**<filter-class>org.ajax4jsf.Filter</filter-class>**\n\
  \n**</filter>**\n\n**<filter-mapping>**\n\n**<filter-name>richfaces</filter-name>**\n\
