  }\n\n现在你已经有了处理购物车的方法，请在 view 文件夹中创建 cart.xhtml 文件，以显示购物车的内容。目前，内容是静态的，如清单 10-12\
  \ 所示。\n\n**清单 10-12.** *cart.xhtml*\n\n<!DOCTYPE composition PUBLIC \"-//W3C//DTD\
