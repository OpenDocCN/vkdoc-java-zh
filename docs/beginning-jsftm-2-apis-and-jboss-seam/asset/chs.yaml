  \ 2-11。基本上，当 HTTP 请求到达时，UI 输入和 UI 命令组件各自有机会处理该请求，例如从中读取值、检查是否提供了值、根据需要验证值，最后将值存储到\
  \ Web bean 中（参见图 2-11）。我们称这个阶段为输入处理阶段。在此阶段，对于 UI 命令组件，在发现按钮被点击后，它*不会*立即设置结果。相反，它会安排一个监听器在下一阶段执行。\n\
  \n**40**\n\n第 2 章 ■ 使用表单\n\n假设没有任何类型的错误，JSF 将进入下一阶段，在该阶段中所有已安排的监听器都将被执行。在此示例中，由\
  \ UI 命令组件安排的监听器将执行以设置结果。然后 JSF 将检查结果，并使用导航规则确定下一页的下一个视图 ID。这个阶段称为调用应用程序阶段。\n\n在下一阶段，JSF\
  \ 使用下一个视图 ID 加载页面并让其渲染。这个阶段称为渲染响应阶段。\n\nWeb bean\n\n结果\n\nok\n\n2：将值存储\n\n1：读取值，检查它们\n\
