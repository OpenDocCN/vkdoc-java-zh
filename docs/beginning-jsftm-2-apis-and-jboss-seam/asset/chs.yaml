  </h:form>\n\n</body>\n\n</html>\n\n**清单 8-4.** *thankyou.xhtml*\n\n<?xml version=\"\
  1.0\" encoding=\"UTF- 8\" ?>\n\n<!DOCTYPE html PUBLIC \"- //W3C//DTD XHTML 1.0 Strict//EN\"\
  \n\n\n\n[\"http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd\">](http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd)\n\
  \n[<html](http://www.w3.org/1999/xhtml)\n\n[>](http://java.sun.com/jsf/html)\n\n\
  <head>\n\n<meta http-equiv=\"Content-Type\" content=\"text/html; charset=UTF-8\"\
  \ />\n\n<title>在此处插入标题</title>\n\n</head>\n\n<body>\n\n谢谢！\n\n</body>\n\n</html>\n\
  \n在 `faces-config.xml` 中定义导航规则，如清单 8-5 所示。\n\n第 8 章 ■ 使用对话\n\n**219**\n\n**清单 8-5.**\
  \ *向导的导航规则*\n\n<faces-config ...>\n\n<navigation-rule>\n\n<from-view-id>/step1.xhtml</from-view-id>\n\
  \n<navigation-case>\n\n<from-outcome>next</from-outcome>\n\n<to-view-id>/step2.xhtml</to-view-id>\n\
  \n</navigation-case>\n\n</navigation-rule>\n\n<navigation-rule>\n\n<from-view-id>/step2.xhtml</from-view-id>\n\
  \n<navigation-case>\n\n<from-outcome>back</from-outcome>\n\n<to-view-id>/step1.xhtml</to-view-id>\n\
  \n</navigation-case>\n\n<navigation-case>\n\n<from-outcome>finish</from-outcome>\n\
  \n<to-view-id>/thankyou.xhtml</to-view-id>\n\n</navigation-case>\n\n</navigation-rule>\n\
  \n</faces-config>\n\n现在，启动 JBoss 实例，并尝试在浏览器中访问 [`localhost:8080/Wizard/faces/`](http://localhost:8080/Wizard/faces/)step1.xhtml。它应该允许您输入工单，并且“下一步”和“返回”按钮应该可以正常工作。\n\
  \n**浏览器窗口之间的干扰**\n\n现在，让我们运行一个实验。输入 **c1** 作为客户 ID，然后转到步骤 2。接着打开一个新的浏览器标签页，并显示步骤\
  \ 1。您会看到客户 ID 显示为“c1”。\n\n这意味着两个浏览器窗口正在操作同一个工单对象。这很不好，因为应用程序不允许客户同时处理两个或更多工单。\n\n\
  假设您确实应该允许客户同时处理多个工单，那么您需要了解一种称为*对话*的东西。每当一个请求到达时，Web Beans 会在会话中为该浏览器窗口分配一个 Web\
  \ Beans 表（见图 8-2）。这个表就是对话。这样的对话会在响应渲染完成后自动结束（销毁）。\n\n**220**\n\n第 8 章 ■ 使用对话\n\n\
  Web Beans 创建一个对话。\n\n会话\n\n一个请求到达。它随后被处理\n\n并生成一个响应。\n\n对话\n\n**名称**\n\n**对象**\n\
  \n...\n\n...\n\n...\n\n...\n\nWeb Beans 自动结束\n\n该对话。\n\n时间\n\n**图 8-2.** *一个对话*\n\
  \n这种短暂的对话并不是那么有用，因为它生命周期太短；您放入其中的内容就像那些请求作用域的 Web Beans 一样。然而，在生成响应之前，如果您告诉 Web\
  \ Beans 将对话转换为长期运行的对话，它就会一直存在，直到（可能经过许多请求之后）您将其转换回短暂对话；然后它会在请求结束时被销毁（见图 8-3）。\n\n\
  Web Beans 创建一个对话。\n\n会话\n\n请求 1\n\n对话\n\n**名称**\n\n**对象**\n\n...\n\n...\n\n...\n\
  \n...\n\n将其转换为长期运行。\n\n请求 2\n\n...\n\n请求 n\n\n将其转换回短暂对话。\n\nWeb Beans 自动结束\n\n该对话。\n\
  \n时间\n\n**图 8-3.** *使对话长期运行*\n\n第 8 章 ■ 使用对话\n\n**221**\n\n关于对话的有趣之处在于，如果在（长期运行的）对话过程中，您打开一个新的浏览器标签页并访问应用程序，将会创建一个新的对话，并且这两个对话不会相互干扰（见图\
  \ 8-4）。\n\n会话\n\n标签页 1 标签页 2\n\n对话 1\n\n对话 2\n\n**名称**\n\n**对象**\n\n**名称**\n\n**对象**\n\
  \n...\n\n...\n\n...\n\n...\n\n...\n\n...\n\n...\n\n...\n\n**图 8-4.** *每个标签页拥有不同的对话*\n\
  \n要实现这个想法，您需要将工单放入对话作用域中，如清单 8-6 所示。由于对话仍然存储在会话中，工单仍然需要实现 `Serializable`。\n\n**清单\
  \ 8-6.** *将工单放入对话作用域*\n\npackage wizard;\n\nimport java.io.Serializable;\n\nimport\
  \ javax.annotation.Named;\n\n**import javax.context.ConversationScoped;**\n\n@Named(\"\
  ticket\")\n\n**@ConversationScoped**\n\npublic class Ticket implements Serializable\
  \ {\n\nprivate String customerId;\n\n\n\nprivate String problemDesc;\n\npublic String\
  \ getCustomerId() {\n\nreturn customerId;\n\n}\n\npublic void setCustomerId(String\
  \ customerId) {\n\nthis.customerId = customerId;\n\n}\n\npublic String getProblemDesc()\
  \ {\n\nreturn problemDesc;\n\n**222**\n\n第 8 章 ■ 使用对话\n\n}\n\npublic void setProblemDesc(String\
  \ problemDesc) {\n\nthis.problemDesc = problemDesc;\n\n}\n\n}\n\n接下来，你需要考虑何时将对话转换为长期运行对话。你可以在用户点击步骤\
  \ 1 中的“下一步”按钮时执行此操作。之后，工单将在多个请求中可用。为此，请修改 step1.xhtml，如清单 8-7 所示。\n\n**清单 8-7.**\
  \ *点击“下一步”时调用 Java 方法*\n\n<?xml version=\"1.0\" encoding=\"UTF- 8\" ?>\n\n<!DOCTYPE\
  \ html PUBLIC \"- //W3C//DTD XHTML 1.0 Strict//EN\"\n\n[\"http://www.w3.org/TR/xhtml1/DTD/xhtml1-\
  \ strict.dtd\">](http://www.w3.org/TR/xhtml1/DTD/xhtml1-�strict.dtd)\n\n[<html](http://www.w3.org/1999/xhtml)\n\
  \n[>](http://java.sun.com/jsf/html)\n\n<head>\n\n<meta http-equiv=\"Content- Type\"\
  \ content=\"text/html; charset=UTF- 8\" />\n\n<title>在此处插入标题</title>\n\n</head>\n\
  \n<body>\n\n步骤 1:\n\n<h:form>\n\n客户 ID: <h:inputText value=\"#{ticket.customerId}\"\
  /><br/>\n\n**<h:commandButton value=\"下一步\" action=\"#{step1.next}\"/>**\n\n</h:form>\n\
  \n</body>\n\n</html>\n\n在 wizard 包中创建一个 Step1 类，以提供 next() 方法，如清单 8-8 所示。\n\n**清单\
  \ 8-8.** *Step1 类*\n\npackage wizard;\n\nimport javax.annotation.Named;\n\nimport\
  \ javax.context.RequestScoped;\n\n@Named(\"step1\")\n\n@RequestScoped\n\n第 8 章 ■\
  \ 使用对话\n\n**223**\n\npublic class Step1 {\n\npublic String next() {\n\n//将对话转换为长期运行；\n\
  \nreturn \"next\";\n\n}\n\n}\n\n要将对话转换为长期运行对话，请修改 Step1 类，如清单 8-9 所示。首先注入对话对象（如第\
  \ 4 章所述），然后对其调用 begin() 方法。begin() 实际上是一个误称，因为对话已经开始；此方法的作用是将对话转换为长期运行对话。\n\n**清单\
  \ 8-9.** *将对话转换为长期运行对话*\n\npackage wizard;\n\nimport javax.annotation.Named;\n\n\
  import javax.context.RequestScoped;\n\n**import javax.context.Conversation;**\n\n\
  **import javax.inject.Current;**\n\n@Named(\"step1\")\n\n@RequestScoped\n\npublic\
  \ class Step1 {\n\n**@Current**\n\n**private Conversation c;**\n\npublic String\
  \ next() {\n\n**c.begin();**\n\nreturn \"next\";\n\n}\n\n}\n\n接下来，你需要考虑何时将对话转换回临时对话。你可以在用户点击步骤\
  \ 2 中的“完成”按钮时执行此操作。之后，工单将在请求结束时随对话一起销毁。为此，请修改 step2.xhtml，如清单 8-10 所示。\n\n**224**\n\
  \n第 8 章 ■ 使用对话\n\n**清单 8-10.** *点击“完成”时调用 Java 方法*\n\n<?xml version=\"1.0\" encoding=\"\
  UTF- 8\" ?>\n\n<!DOCTYPE html PUBLIC \"- //W3C//DTD XHTML 1.0 Strict//EN\"\n\n[\"\
  http://www.w3.org/TR/xhtml1/DTD/xhtml1- strict.dtd\">](http://www.w3.org/TR/xhtml1/DTD/xhtml1-�strict.dtd)\n\
  \n[<html](http://www.w3.org/1999/xhtml)\n\n[>](http://java.sun.com/jsf/html)\n\n\
  <head>\n\n<meta http-equiv=\"Content- Type\" content=\"text/html; charset=UTF- 8\"\
  \ />\n\n<title>在此处插入标题</title>\n\n</head>\n\n<body>\n\n步骤 2:\n\n<h:form>\n\n描述:\
  \ <h:inputTextarea value=\"#{ticket.problemDesc}\"/><br/>\n\n<h:commandButton value=\"\
  返回\" action=\"back\"/>\n\n**<h:commandButton value=\"完成\" action=\"#{step2.finish}\"\
  />**\n\n</h:form>\n\n</body>\n\n</html>\n\n在 wizard 包中创建一个 Step2 类，以提供 finish()\
  \ 方法，如清单 8-11 所示。关键部分是对对话对象调用 end() 方法，该方法会将对话转换为临时对话。另一点需要注意的是，并非真正提交工单（例如提交到数据库），而是简单地将工单内容打印到控制台。\n\
  \n**清单 8-11.** *Step2 类*\n\npackage wizard;\n\nimport javax.annotation.Named;\n\n\
  import javax.context.Conversation;\n\nimport javax.context.RequestScoped;\n\nimport\
  \ javax.inject.Current;\n\n@Named(\"step2\")\n\n@RequestScoped\n\n第 8 章 ■ 使用对话\n\
  \n**225**\n\npublic class Step2 {\n\n@Current\n\nprivate Conversation c;\n\n@Current\n\
  \nprivate Ticket ticket;\n\n\n\npublic String finish() {\n\nsubmit(ticket);\n\n\
  **c.end();**\n\nreturn \"finish\";\n\n}\n\nprivate void submit(Ticket ticket) {\n\
  \nSystem.out.println(ticket.getCustomerId());\n\nSystem.out.println(ticket.getProblemDesc());\n\
  \n}\n\n}\n\n现在，当你再次运行应用程序时，尝试在两个浏览器标签页中同时提交两个工单。这两个工单将互不干扰。\n\n**URL 不匹配？**\n\n\
  如果你足够细心，可能会注意到在步骤 1 点击“下一步”后，步骤 2 确实显示出来了，但 URL 仍然指向步骤 1。这是为什么？当你首次在地址栏输入 step1.xhtml\
  \ 的 URL 并按下回车键（见图 8-5）时，会发送一个请求，step1.xhtml 将生成一个响应。因此，你在浏览器窗口中看到的是步骤 1。但 HTML 表单的\
  \ action 属性是什么？如果用户点击“下一步”按钮，你肯定希望步骤 1 的原始组件树来处理表单提交，例如，各种 UI 输入组件可以利用请求中的用户输入来更新它们的\
  \ Web Bean。\n\n因此，action 属性应该仍然指向 step1.xhtml，这正是 UI Form 组件所做的。也就是说，它会将 action\
  \ 属性设置为调用当前页面。现在，当用户点击“下一步”按钮时，浏览器会将该 action 属性（指向 step1.xhtml）复制到地址栏 URL 中，然后将请求发送给\
  \ step1.xhtml 处理。step1.xhtml 处理完请求后，会（通过 JSF 导航系统）将渲染过程传递给 step2.xhtml。结果，你在浏览器窗口中看到的是步骤\
  \ 2，但地址栏 URL 仍然是 step1.xhtml。\n\n**226**\n\n第 8 章 ■ 使用对话\n\n浏览器\n\n.../step1.xhtml\n\
  \n请求\n\n1: 用户输入 URL 并\n\n按下回车键。\n\n2: 发送请求。\n\nstep1.xhtml\n\n浏览器\n\n步骤 1\n\nUI\
  \ Form\n\n<form\n\naction=\".../step1.xhtml\"\n\nUI Command\n\n3: 发送响应。\n\n...>\n\
  \n4: 用户点击“下一步”按钮。\n\n下一步\n\nstep1.xhtml\n\n5: 动作 URL 被复制到\n\nUI Form\n\n地址栏。\n\n\
  UI Command\n\n浏览器\n\n.../step1.xhtml\n\n6: 导航至 step2.xhtml。\n\nstep2.xhtml\n\n步骤\
  \ 2\n\n下一步\n\n完成\n\n7: 发送响应。\n\n**图 8-5.** *URL 与内容为何不匹配*\n\n这对用户来说相当令人困惑。此外，如果用户尝试重新加载/刷新页面，浏览器将再次尝试将表单提交给\
  \ step1.xhtml。这可能不是用户想要的。相反，她可能只想重新加载 step2.xhtml。\n\n这些问题能解决吗？可以。你可以告诉 JSF 导航系统向浏览器发送一个所谓的重定向响应（见图\
  \ 8-6）。通常，响应包含要在浏览器中显示的 HTML，但重定向响应不同；它不包含任何 HTML 代码。相反，它只包含一个 URL。在这种情况下，它包含 step2.xhtml\
  \ 的 URL，并告诉浏览器跳转到那里。然后，浏览器会更新地址栏中的 URL 为 step2.xhtml，并发送一个请求给 step2.xhtml。最后，step2.xhtml\
  \ 会生成一个响应，因此你将在浏览器窗口和地址栏中看到步骤 2。\n\n第 8 章 ■ 使用对话\n\n**227**\n\n浏览器\n\n步骤 1\n\n<form\n\
  \naction=\".../step1.xhtml\"\n\n...>\n\n1: 用户点击“下一步”按钮。\n\n下一步\n\nstep1.xhtml\n\n\
  2: 动作 URL 被复制到\n\nUI Form\n\n地址栏。\n\n重定向\n\nUI Command\n\n浏览器\n\nURL: .../step2.xhtml\n\
  \n.../step1.xhtml\n\n3: 返回一个重定向响应。\n\n4: 将 URL 更改为 step2.xhtml 的 URL。\n\n浏览器\n\n\
  step2.xhtml\n\n.../step2.xhtml\n\n请求\n\n步骤 2\n\n5: 请求\n\nstep2.xhtml\n\n下一步\n\n\
  完成\n\n6: 发送响应。\n\n**图 8-6.** *重定向响应*\n\n应用此技术（“提交后重定向”）时，一个非常重要的要求是 step2.xhtml\
  \ 仍然需要能够访问其数据进行渲染。如果数据在请求作用域内，那么它可能已经丢失了，因为重定向响应触发了一个新的请求。但是，由于你使用的是对话作用域，数据（工单）仍然会存在。\n\
  \n要告诉 step1.xhtml 为 step2.xhtml 发送重定向，你只需要修改导航案例，如清单 8-12 所示。\n\n**清单 8-12.** *在导航案例中使用重定向*\n\
  \n<faces-config ...>\n\n<navigation- rule>\n\n\n\n<from-view-id>/step1.xhtml</from-view-id>\n\
  \n<navigation-case>\n\n<from-outcome>next</from-outcome>\n\n**228**\n\n第 8 章 ■ 使用会话\n\
  \n<to-view-id>/step2.xhtml</to-view-id>\n\n**<redirect/>**\n\n</navigation-case>\n\
  \n</navigation-rule>\n\n<navigation-rule>\n\n<from-view-id>/step2.xhtml</from-view-id>\n\
  \n<navigation-case>\n\n<from-outcome>back</from-outcome>\n\n<to-view-id>/step1.xhtml</to-view-id>\n\
  \n</navigation-case>\n\n<navigation-case>\n\n<from-outcome>finish</from-outcome>\n\
  \n<to-view-id>/thankyou.xhtml</to-view-id>\n\n</navigation-case>\n\n</navigation-rule>\n\
  \n</faces-config>\n\n重新启动应用程序并再次运行。进入第 2 步，观察 URL 是否也应显示为 step2.xhtml。\n\n■**注意**\
  \ 在 Web Beans beta 1 版本中，存在一个 bug，导致长时间运行的会话无法跨越重定向响应。\n\n同样，你可以对“返回”按钮和“完成”按钮应用相同的技术，如清单\
  \ 8-13 所示。\n\n**清单 8-13.** *为其他按钮使用重定向*\n\n<faces-config ...>\n\n<navigation-rule>\n\
  \n<from-view-id>/step1.xhtml</from-view-id>\n\n<navigation-case>\n\n<from-outcome>next</from-outcome>\n\
  \n<to-view-id>/step2.xhtml</to-view-id>\n\n<redirect/>\n\n</navigation-case>\n\n\
  </navigation-rule>\n\n<navigation-rule>\n\n<from-view-id>/step2.xhtml</from-view-id>\n\
  \n<navigation-case>\n\n第 8 章 ■ 使用会话\n\n**229**\n\n<from-outcome>back</from-outcome>\n\
  \n<to-view-id>/step1.xhtml</to-view-id>\n\n**<redirect/>**\n\n</navigation-case>\n\
  \n<navigation-case>\n\n<from-outcome>finish</from-outcome>\n\n<to-view-id>/thankyou.xhtml</to-view-id>\n\
  \n**<redirect/>**\n\n</navigation-case>\n\n</navigation-rule>\n\n</faces-config>\n\
  \n</faces-config>\n\n再次运行应用程序，URL 应随每次按钮点击正确变化。\n\n**总结**\n\nWeb Beans 提供了一个非常强大的作用域：会话作用域。正如你在本章中学到的，会话是会话中针对特定浏览器标签页/窗口的一个表格。你可以让一个会话长时间运行，之后再将其转换回\
  \ Java 代码。在其生命周期内，所有会话作用域的 web beans 将在不同请求之间保持可用。\n\n要渲染下一页，你可以选择简单的渲染或重定向。重定向会在浏览器中显示新的\
  \ URL，并且与“重新加载/刷新”按钮配合良好。\n\n如果某个页面需要将一个 web bean 传递给下一页，则该 web bean 应处于会话作用域内，以允许重定向。\n\
  \n![Image 80](img/index-245_1.png)\n\n第 9 章\n\n支持其他语言\n\n**本**章中，你将学习如何开发一个能够以两种或多种不同语言呈现的应用程序，以适应不同国家的用户。\n\
  \n**显示当前日期和时间**\n\n假设你有一个显示当前日期和时间的应用程序，如图 9-1 所示。\n\n**图 9-1.** *显示当前日期和时间*\n\n\
  为此，像往常一样创建一个名为 MultiLang 的新动态 Web 项目。然后创建一个 showdate.xhtml 文件，如清单 9-1 所示。\n\n**清单\
  \ 9-1.** *showdate.xhtml*\n\n<!DOCTYPE html PUBLIC \"-//W3C//DTD XHTML 1.0 Strict//EN\"\
  \n\n[\"http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd\">](http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd)\n\
  \n<?xml version=\"1.0\" encoding=\"UTF-8\" ?>\n\n[<html](http://www.w3.org/1999/xhtml)\n\
  \n[>](http://java.sun.com/jsf/html)\n\n**231**\n\n**232**\n\n第 9 章 ■ 支持其他语言\n\n\
  <head>\n\n<meta http-equiv=\"Content-Type\" content=\"text/html; charset=UTF-8\"\
  \ />\n\n<title>当前日期</title>\n\n</head>\n\n<body>\n\n今天是：<h:outputText value=\"#{showDate.today}\"\
  />。\n\n</body>\n\n</html>\n\n在 multilang 包中创建 ShowDate 类，并从中创建一个 web bean，如清单 9-2\
  \ 所示。\n\n**清单 9-2.** *ShowDate 类*\n\npackage multilang;\n\n...\n\nimport java.util.Date;\n\
  \n@Named(\"showDate\")\n\n@RequestScoped\n\npublic class ShowDate {\n\npublic Date\
  \ getToday() {\n\nreturn new Date();\n\n}\n\n}\n\n启动 JBoss 实例，并尝试访问[`localhost:8080/MultiLang/faces/`](http://localhost:8080/MultiLang/faces/)\n\
  \n\n\n在浏览器中打开 `showdate.xhtml`。它应能正确显示当前日期和时间。（请注意，您的应用程序显示的日期可能与图 9-1 不同，因为这取决于您计算机上配置的默认语言。）\n\
  \n**支持中文**\n\n假设您的一些用户是中国人。他们希望在运行应用程序时看到中文界面。为此，请在 `multilang` 包中创建一个名为 `msgs.properties`\
  \ 的文件（文件名并不重要，只要以 `.properties` 结尾即可），如清单 9-3 所示。\n\n**清单 9-3.** *在 .properties\
