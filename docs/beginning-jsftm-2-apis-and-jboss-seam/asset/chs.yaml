  \ 将经历以下几个阶段：应用请求值（存储原始输入字符串）、处理验证（将字符串转换为对象并进行验证）、更新领域值（将转换后的值存储到 Web Bean 中）、调用应用程序（设置结果并确定下一页的视图\
  \ ID）以及渲染响应（渲染下一页）。\n\n如果在“处理验证”阶段出现任何错误，它将直接跳转到“渲染响应”阶段，这样 Web Bean 就不会被更新，结果也不会被设置，当前页面会被重新显示。\n\
  \n要让用户在文本字段中编辑字符串，请使用 UI Input 组件，并设置其 `value` 属性以将其链接到 Web Bean 的属性。要让用户从组合框中选择一个条目，请使用\
  \ UI Select One 组件。你也可以设置其 `value` 属性以将其链接到 Web Bean 的属性。此外，你需要为其提供一个 `SelectItem`\
  \ 项的列表。每个 `SelectItem` 包含一个对象（值）及其字符串表示形式（标签）。\n\n对于 UI Input 组件，如果属性的类型不是字符串或内置类型（如\
  \ `Integer` 或 `Double`），则需要为 UI Input 组件提供一个转换器。如果发生转换错误，它将记录一条错误消息。\n\nUI Input\
  \ 组件假定输入是可选的，并将空字符串转换为 `null`（如果属性的类型是字符串，则保持不变）。如果输入是必填的，你需要将 `required` 属性设置为\
  \ `true`。这样，如果没有提供输入，它将记录一个错误。\n\n要显示错误消息，请使用 UI Messages 组件。\n\n要让用户点击按钮，请使用 UI\
  \ Command 组件。在其 `action` 属性中指定结果。JSF 将使用当前视图 ID 查找正确的导航规则，并使用结果查找正确的导航案例以找到下一个视图\
  \ ID。UI Command 组件将安排一个监听器在“调用应用程序”阶段设置结果，这样如果存在任何转换或验证错误，它将不会设置结果，并且原始页面将被重新显示。\n\
  \n你可以使用消息包（即一个或多个 `.properties` 文件）来自定义错误消息。这将影响整个应用程序。要为特定组件自定义错误消息，只需设置该组件的相应属性即可。\n\
  \n最后，你学习了如何使用 `@Current` 将一个 Web Bean 注入到另一个 Web Bean 的字段中。Web Beans 将使用字段的类型来定位要注入的\
  \ Web Bean。\n\n![Image 36](img/index-81_1.png)\n\n![Image 37](img/index-81_2.png)\n\
  \n第 3 章\n\n验证输入\n\n**在**上一章中，你学习了一些输入验证的基本方法：强制用户为必填字段输入内容，以及强制执行输入的格式（例如，可以正确地将其转换为日期）。也就是说，你学习了如何确保存在一个转换后的值。在本章中，你将学习如何进一步验证该转换后的值。\n\
