  \n第 10 章 ■ 使用 JBoss Seam\n\n**273**\n\ntemplate=\"layout/template.xhtml\">\n\n<ui:define\
  \ name=\"body\">\n\n<h1>购物车</h1>\n\n**<rich:panel>**\n\n**<ui:repeat value=\"#{cart.pids}\"\
  \ var=\"pid\">**\n\n**<h:outputText value=\"#{pid} \"/>**\n\n**</ui:repeat>**\n\n\
  **</rich:panel>**\n\n</ui:define>\n\n</ui:composition>\n\n这里没有什么特别之处。如果你运行应用程序并向购物车添加一些产品，它们的\
  \ ID 将会被显示出来。\n\n**将购物车转换为有状态会话 Bean**\n\n目前，每个用户都有一个购物车。如果你有大量用户，内存中会存在许多购物车，而其中很多并未被积极使用。为了节省内存，你可以让\
  \ JBoss 在购物车空闲时将其中一些保存到硬盘上。当再次需要它们时，JBoss 会从硬盘加载它们。这样，你就可以支持大量用户，并且你的应用程序将变得非常易于扩展。\n\
  \n要实现这个想法，你可以将购物车转换为一个有状态会话 Bean。\n\n为此，首先将 src/hot 文件夹中的 Cart 类更改为一个接口，如清单 10-15\
  \ 所示。\n\n**清单 10-15.** *Cart 接口*\n\npackage shop;\n\nimport java.util.List;\n\n\
  public interface Cart {\n\nvoid add();\n\nList<Long> getPids();\n\n}\n\n**274**\n\
  \n第 10 章 ■ 使用 JBoss Seam\n\n你仍然需要创建一个类来实现该接口。因此，在 shop 包的 src/hot 文件夹中创建一个 CartBean\
  \ 类，如图 10-11 所示。简单来说，`@Stateful` 告诉 JBoss 从这个类创建一个有状态会话 Bean。因此，不同的 Bean 实例将被创建、保存到磁盘、从磁盘加载，并由\
  \ JBoss 自动销毁。应用程序将通过一个代理访问 Bean 实例，这样 Bean 实例可以在内存中被保存、加载或移动，而应用程序不会察觉。由于会话 Bean\
  \ 是有状态的，一旦应用程序获得了一个指向某个实例（例如，购物车 1）的代理，之后对该代理的所有方法调用都将被委托给同一个实例（购物车 1）。相比之下，如果会话\
  \ Bean 是无状态的，对同一个代理的不同方法调用可能会被委托给不同的 Bean 实例，因为所有 Bean 实例都被视为相同的。\n\npackage shop;\n\
  \nimport java.util.List;\n\nimport javax.ejb.Stateful;\n\n@Stateful\n\n这个注解告诉 JBoss\
  \ 从这个类创建一个\n\npublic class CartBean implements Cart {\n\n有状态会话 Bean。\n\n\n\n其效果是，JBoss\
  \ 将创建、管理并销毁该有状态会话 Bean 的实例，\n\nBean 实例（以及代理）将实现 Cart 接口，并且应用程序也将通过 Cart 接口访问该代理。\n\
  \n@Override\n\npublic void add() {\n\n}\n\n@Override\n\npublic List<Long> getPids()\
  \ {\n\nreturn null;\n\n}\n\n}\n\nJBoss\n\n有状态会话 Bean\n\n代理 1\n\n应用 1\n\nCart 1\n\
  \nCart 2\n\n应用 2\n\n...\n\n**图 10-11.** *为购物车创建有状态会话 Bean* 为了将 productHome 组件注入到购物车中（以便购物车能够找出所选产品的\
  \ ID），你需要将会话 Bean 转换为 Seam 组件。为此，请按清单 10-16 所示修改 CartBean 类。\n\n第 10 章 ■ 使用 JBoss\
  \ Seam\n\n**275**\n\n**清单 10-16.** *将会话 Bean 转换为 Seam 组件*\n\npackage shop;\n\n...\n\
  \n@Stateful\n\n**@Name(\"cart\")**\n\n**@Scope(ScopeType.SESSION)**\n\npublic class\
  \ CartBean implements Cart {\n\n**@In**\n\n**private ProductHome productHome;**\n\
  \n@Override\n\npublic void add() {\n\n}\n\n@Override\n\npublic List<Long> getPids()\
  \ {\n\nreturn null;\n\n}\n\n}\n\nSeam 组件如何与会话 Bean 协同工作？当 Seam 需要创建 cart 组件时，它会注意到\
  \ CartBean 类是一个有状态会话 Bean（由 @Stateful 注解指定）。因此，Seam 将（从 JBoss）获取一个代理来访问 Bean 实例，并让该组件将所有方法调用委托给它，如图\
  \ 10-12 所示。\n\nJBoss\n\n应用 1\n\n有状态会话 Bean\n\n\"cart\"\n\n代理 1\n\n组件\n\nCart 1\n\
  \nCart 2\n\n...\n\n**图 10-12.** *Seam 组件将方法调用委托给有状态会话 Bean* 此外，当会话即将被销毁时，Seam 需要销毁\
  \ cart 组件及其对应的 Bean 实例。为了让 Seam 能够做到这一点，你可以按清单 10-17 所示修改 CartBean 类。@Remove 注解告诉\
  \ JBoss 在 destroy() 方法返回后移除该 Bean 实例。Seam 注意到此注解的存在后，会在需要销毁该组件时调用 destroy() 方法。\n\
  \n**清单 10-17.** *为 Seam 提供销毁方法*\n\npackage shop;\n\n...\n\n**import javax.ejb.Remove;**\n\
  \n@Stateful\n\n@Name(\"cart\")\n\n@Scope(ScopeType.SESSION)\n\npublic class CartBean\
  \ implements Cart {\n\n@In\n\nprivate ProductHome productHome;\n\n@Override\n\n\
  public void add() {\n\n}\n\n@Override\n\npublic List<Long> getPids() {\n\nreturn\
  \ null;\n\n}\n\n**@Remove**\n\n**public void destroy() {**\n\n****}**\n\n}\n\n最后，实现清单\
  \ 10-18 所示的方法。这些方法实现了购物车的业务功能，使其能够存储产品 ID 并在之后检索它们。\n\n**清单 10-18.** *实现购物车的方法*\n\
  \npackage shop;\n\n...\n\n@Stateful\n\n@Name(\"cart\")\n\n@Scope(ScopeType.SESSION)\n\
