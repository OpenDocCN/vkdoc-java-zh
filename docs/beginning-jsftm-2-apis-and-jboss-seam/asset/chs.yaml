  \n**146**\n\n第 4 章 ■ 创建电子商店\n\n请注意，用户可能是显式点击登录链接进入登录页面，而不是被重定向到此处。在这种情况下，没有原始视图\
  \ ID（null），因此你只需像往常一样返回 loggedIn 作为结果。然后导航系统会将用户发送到目录页面。如果确实存在原始视图 ID，你将使用它加载视图根并将其设置为当前视图根。在这种情况下，由于你已经自行设置了视图根，你必须告诉导航系统*不要*再次更改视图根。这通过返回\
  \ null 作为结果来实现。\n\n现在，启动一个新会话，并再次运行。尝试在不登录的情况下结账。应用程序应显示登录页面。然后，一旦你登录，它会将你返回到确认页面。然后启动一个新会话，但这次从目录页面登录。它应该将你返回到目录页面。\n\
  \n**实现注销**\n\n假设你希望允许用户通过点击“注销”链接来注销，如图 4-29 所示。\n\n**图 4-29.** *注销链接*\n\n你至少需要做的是从\
  \ UserHolder Web Bean 中移除 User 对象。然而，更好的方法是完全删除会话（例如，包括购物车），因为这样可以释放内存。为此，修改 catalog.xhtml，如清单\
  \ 4-45 所示。请注意，你没有设置结果（动作），以便注销后仍停留在目录页面。此外，你将创建动作监听器来移除会话。为什么不在 action 属性中指定一个方法？你可以这样做，但移除会话是一个\
  \ UI 特定的任务，而不是业务任务。因此，动作监听器更合适。\n\n第 4 章 ■ 创建电子商店\n\n**147**\n\n**清单 4-45.** *目录页面上的注销链接*\n\
  \n...\n\n<h:dataTable value=\"#{catalog.products}\" var=\"p\" border=\"1\">\n\n\
  ...\n\n</h:dataTable>\n\n<h:form>\n\n<h:commandLink action=\"login\" value=\"登录\"\
  />\n\n**<h:commandLink value=\"注销\">**\n\n**<f:actionListener type=\"shop.LogoutActionListener\"\
  />**\n\n**</h:commandLink>**\n\n</h:form>\n\n</body>\n\n在 shop 包中创建 LogoutActionListener\
  \ 类，如图 4-30 所示。\n\npackage shop;\n\nimport javax.faces.context.ExternalContext;\n\
  \nimport javax.faces.context.FacesContext;\n\nimport javax.faces.event.AbortProcessingException;\n\
  \nimport javax.faces.event.ActionEvent;\n\nimport javax.faces.event.ActionListener;\n\
  \n外部上下文指的是 JSF\n\nimport javax.servlet.http.HttpSession;\n\n运行所在的平台。在本例中，是 JBoss。\n\
  \npublic class LogoutActionListener implements ActionListener {\n\npublic void processAction(ActionEvent\
  \ event)\n\nthrows AbortProcessingException {\n\nFacesContext context = FacesContext.getCurrentInstance();\n\
  \nExternalContext externalContext = context.getExternalContext();\n\nObject session\
  \ = externalContext.getSession(false);\n\nHttpSession httpSession = (HttpSession)\
  \ session;\n\nhttpSession.invalidate();\n\n}\n\n获取对会话的访问权限。该会话由\n\n}\n\n平台（JBoss）维护。\n\
  \n移除会话。\n\n会话是一个 Object，而不是 HttpSession。这是因为\n\nJSF 可能运行在不使用 HTTP 的平台上。这里你确定它使用的是\
  \ HTTP，所以\n\n你可以进行类型转换。\n\n**图 4-30.** *LogoutActionListener 类*\n\n**148**\n\n第\
  \ 4 章 ■ 创建电子商店\n\n运行应用程序，登录然后注销。然后尝试结账，它应该会要求你再次登录。你可能注意到“登录”链接和“注销”链接之间没有空格。要修复此问题，修改\
  \ catalog.xhtml，如清单 4-46 所示。\n\n**清单 4-46.** *插入空格*\n\n...\n\n<h:form>\n\n<h:commandLink\
  \ action=\"login\" value=\"登录\"/>\n\n**<h:outputText value=\" \"/>**\n\n<h:commandLink\
  \ value=\"注销\">\n\n<f:actionListener type=\"shop.LogoutActionListener\"/>\n\n</h:commandLink>\n\
  \n</h:form>\n\n</body>\n\n</html>\n\n当你运行应用程序时，两个链接之间应该有一个空格。\n\n**保护密码**\n\n目前，登录页面在用户输入时显示密码。这很不好，因为有人从用户肩膀后面偷看就可能窃取密码。最好将其显示为星号。为此，修改\
  \ login.xhtml，如清单 4-47 所示。<h:inputSecret>与<h:inputText>类似，它也会创建一个 UI Input。唯一的区别是用户输入将显示为星号。同样，这是通过使用不同的渲染器实现的。\n\
  \n**清单 4-47.** *使用<h:inputSecret>*\n\n...\n\n<body>\n\n<h:messages />\n\n<h:form>\n\
  \n<h:inputText value=\"#{loginRequest.username}\" />\n\n**<h:inputSecret value=\"\
  #{loginRequest.password}\" />**\n\n<h:commandButton value=\"登录\" action=\"#{loginRequest.login}\"\
  \ />\n\n</h:form>\n\n</body>\n\n</html>\n\n现在运行应用程序时，密码应显示为星号。\n\n第 4 章 ■ 创建电子商店\n\
  \n**149**\n\n**总结**\n\n你在本章中学到了以下内容：\n\n• 面（facet）是一个子组件，由其父组件进行特殊处理。\n\n• 请求有一个属性表。每个属性都有一个名称和一个值（Object）。它允许你为对象指定一个名称。它类似于请求作用域的\
  \ Web Bean，只是它不创建对象；它仅将对象与名称关联起来。\n\n\n\n• 若要遍历表中的某些项，且项数只能在运行时确定，请使用 `<h:dataTable>`\
  \ 标签，该标签会创建一个 UI Data 组件。您需要向其提供一个项列表，它会针对每个项进行遍历。其子组件必须是 UI Column 组件。每个 UI Column\
  \ 代表表格中的一列。对于每一行，UI Data 会创建一个包含行索引的环境，并在要求每个 UI Column 渲染自身之前，将当前项存储到一个属性中。每个 UI\
  \ Column 会渲染其自身的子组件（不包括名为 `header` 的面板）。\n\nUI Column 可以选择性地包含一个名为 `header` 的面板。在这种情况下，UI\
  \ Data 会渲染一个标题行，并在开始处理数据行之前，要求 UI Columns 渲染标题面板作为该列的标题。\n\n• 在表单提交时，UI Data 会再次遍历这些项，重新创建环境（以设置属性），并让内部的每个组件有机会在各个阶段中应用请求值、处理验证、更新领域值以及调用应用程序。\n\
  \n• 由于当前项被存储到一个属性中，并且该属性会被环境清除，如果您需要将其传递到下一页，很可能需要使用 Set Property 动作监听器。\n\n• 如果您需要遍历某些项，但它们不会以\
  \ HTML `<table>` 的形式呈现，您可以使用 `<ui:repeat>` 标签。它的工作方式与 `<h:dataTable>` 标签非常相似，只是它不会输出自身的标记。\n\
  \n• 要创建链接，请使用带有链接渲染器的 UI Command 组件。在行为方面，它就像带有按钮渲染器的 UI Command 组件一样。\n\n• 对于 UI\
  \ Command，除了在其 `action` 属性中设置结果外，您还可以指定一个方法。当您需要执行业务操作时，这非常有用。该方法应返回一个指示结果的字符串。如果您需要执行\
  \ UI 特定的操作，最好向 UI Command 添加一个动作监听器。\n\n• UI Input 可以渲染为将用户输入回显为星号。这对于密码输入非常有用。\n\
  \n**150**\n\n第 4 章 ■ 创建电子商店\n\n• 如果您使用页面显示请求作用域 Web Bean 的属性，则在提交表单时必须小心，因为会创建一个新的请求作用域\
  \ Web Bean。通常，您会使用 UI Input 组件以及 HTML Hidden Input 渲染器，将 ID 作为隐藏字段存储在浏览器中。然后，当设置\
  \ ID 时，您将加载该对象。\n\n• JSF 使用视图处理器从指定的视图 ID 创建 JSF 组件树。当您想要绕过 JSF 导航系统时，需要使用视图处理器。您需要加载一个视图并将其设置为要渲染的视图。\n\
  \n• 会话是每个用户（或者更确切地说，每个浏览器实例）的内存区域。要启动新会话，请重新启动浏览器或等待超时。要在服务器上移除会话，请调用会话的 `invalidate()`\
  \ 方法。这在注销时通常执行。放入会话的所有内容都必须实现 `Serializable`。\n\n• 每个会话中都有一个 Web Bean 表。您可以将每个用户的临时数据放入其中。\n\
  \n• 在进入阶段之前或退出阶段之后，会通知阶段监听器。您可以使用它来确保用户在渲染某些页面之前已登录。\n\n• 外部上下文是指 JSF 运行所在的平台。在您的情况下，它是\
  \ JBoss。JSF 假定该平台负责维护会话。\n\n第 5 章\n\n创建自定义组件\n\n**在**本章中，您将学习如何创建可在多个页面上重复使用的自定义组件。\n\
  \n**在多个页面上显示版权声明**\n\n假设您想在多个页面上显示版权声明，如图 5-1 所示。\n\n页面 1\n\n页面 2\n\n独特的页面内容\n\n\
  独特的页面内容\n\n版权。Foo 公司。\n\n版权。Foo 公司。\n\n相同的版权声明\n\n**图 5-1.** *多个页面上的版权声明*\n\n\n\n\
  这样做并不好，因为如果以后需要修改版权声明，你就得多次修改（每个页面一次）。为了解决这个问题，你可以将公共的 HTML 代码提取到一个单独的 XHTML 文件中，如图\
  \ 5-2 所示。\n\n**151**\n\n**152**\n\n第 5 章 ■ 创建自定义组件\n\n页面 1\n\n页面 2\n\n独特的页面内容\n\n\
  独特的页面内容\n\n版权信息。Foo 公司。\n\n版权信息。Foo 公司。\n\ncopyright.xhtml\n\n版权信息。Foo 公司。\n\n**图\
  \ 5-2.** *将公共代码提取到单独的 XHTML 文件中*\n\n然后，要将该 XHTML 文件包含到特定页面中，我们假设有人开发了一个可以使用的自定义标签，如图\
  \ 5-3 所示。\n\n页面 1\n\n<html>\n\n...\n\n<copyright/>\n\n</html>\n\n你可以假设 `<copyright>`\
  \ 标签会在运行时包含来自 copyright.xhtml 文件的 XHTML 内容。\n\ncopyright.xhtml\n\n版权信息。Foo 公司。\n\
  \n**图 5-3.** *使用自定义标签包含 XHTML 文件*\n\n然而，这并非简单的文本包含。当 JSF 创建组件树时，它会使用 copyright.xhtml\
  \ 的内容创建一个子树，然后将该子树嫁接到页面中，如图 5-4 所示。\n\n第 5 章 ■ 创建自定义组件\n\n**153**\n\nUI 视图\n\n根节点\n\
  \n...\n\n类似 UI 面板的\n\n组件\n\n...\n\n该子树被嫁接到\n\n页面中。\n\ncopyright.xhtml\n\n类似 UI 面板的\n\
  \n子树的根节点是一个类似\n\n组件\n\nUI 面板的组件。\n\n...\n\n**图 5-4.** *将子树嫁接到页面中*\n\n此外，在 XHTML\
  \ 中，每个标签都必须属于一个命名空间，因此你的 `<copyright>` 标签也必须如此。我们选择 `http://foo.com` 作为命名空间（不过你也可以选择任何你喜欢的唯一\
  \ URL）。然后你将像清单 5-1 所示那样使用该标签。\n\n**清单 5-1.** *位于 [`foo.com`](http://foo.com) 命名空间中的\
  \ `<copyright>` 标签*\n\n<html [**>**](http://foo.com)\n\n**...**\n\n**<foo:copyright/>**\n\
  \n</html>\n\n另外，仅仅因为标签名为 copyright，JSF 并不会简单地假设 XHTML 文件名为 copyright.xhtml。相反，你必须在定义标签时明确告诉\
  \ JSF 文件名。从概念上讲，它看起来像图 5-5。\n\n**154**\n\n第 5 章 ■ 创建自定义组件\n\n[命名空间: http://foo.com](http://foo.com)\n\
  \n标签: copyright\n\n源文件: copyright.xhtml\n\n明确指定文件名。\n\n**图 5-5.** *定义自定义标签时明确指定文件名*\n\
  \n因为一个命名空间可以包含多个标签，所以从概念上讲，你可以定义多个标签，如清单 5-2 所示。\n\n**清单 5-2.** *概念上定义多个标签*\n\n\
  [命名空间: http://foo.com](http://foo.com)\n\n标签 1: copyright\n\n源文件 1: copyright.xhtml\n\
  \n标签 2: ...\n\n源文件 2: ...\n\n这意味着你定义的是一个标签库，而不仅仅是一个单独的标签。你需要将这样的标签库定义放在类路径中名为 `META-INF`\
  \ 的文件夹内的一个文件中。文件名必须以 `.taglib.xml` 结尾，例如 `foo.taglib.xml`。启动时，JSF 会查找此类文件名并加载这些定义。\n\
  \n现在，让我们开始操作。创建一个名为 `CustomComp` 的新动态 Web 项目。创建 `p1.xhtml`，如清单 5-3 所示。这里的 `p1` 代表“页面\
  \ 1”，它是一个使用你的 `<copyright>` 标签的简单页面。\n\n**清单 5-3.** *使用自定义标签的示例页面*\n\n<?xml version=\"\
  1.0\" encoding=\"UTF-8\" ?>\n\n<!DOCTYPE html PUBLIC \"-//W3C//DTD XHTML 1.0 Strict//EN\"\
  \n\n[\"http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd\">](http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd)\n\
  \n[<html](http://www.w3.org/1999/xhtml)\n\n[>](http://foo.com)\n\n<p>这是页面 1。</p>\n\
  \n<foo:copyright/>\n\n</html>\n\n在你的 Java 源文件夹中创建一个 `META-INF` 文件夹，然后在该文件夹中创建一个文件\
  \ `foo.taglib.xml`。清单 5-4 显示了其内容。这里你定义了一个 Facelet 标签库，它与命名空间相同。该标签库（命名空间）由 URL `http://foo.com`\
  \ 标识。\n\n第 5 章 ■ 创建自定义组件\n\n**155**\n\n你定义了一个名为 `<copyright>` 的标签，而你也可以在一个标签库中定义多个标签。清单\
  \ 5-4 中用于定义标签的 XML 标签（例如 `<facelet-taglib>` 和 `<tag>`）都位于 `http://java.sun.com/JSF/Facelet`\
  \ 命名空间中。\n\n\n\n**清单 5-4.** *定义标签库*\n\n<!DOCTYPE facelet-taglib PUBLIC\n\n\"- //Sun\
  \ Microsystems, Inc.//DTD Facelet Taglib 1.0//EN\"\n\n[\"http://java.sun.com/dtd/facelet-taglib_1_0.dtd\"\
  >](http://java.sun.com/dtd/facelet-taglib_1_0.dtd)\n\n[<facelet-taglib >](http://java.sun.com/JSF/Facelet)\n\
  \n[<namespace>http://foo.com</namespace>](http://foo.com%3C/namespace)\n\n<tag>\n\
  \n<tag-name>copyright</tag-name>\n\n<source>copyright.xhtml</source>\n\n</tag>\n\
  \n</facelet-taglib>\n\n■**注意** 在 Mojarra 2.0.0.PR2 中，存在一个 bug，导致无法发现类路径下 META-INF\
  \ 文件夹中的 *.taglib.xml 文件。要解决此问题，请将整个 META-INF 文件夹放入 WebContent 中，然后在 web.xml 中显式指定标签库，如清单\
  \ 5-5 所示。\n\n**清单 5-5.** *显式指定标签库*\n\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n\
  \n<web-app ...>\n\n...\n\n<servlet>\n\n<servlet-name>JSF</servlet-name>\n\n<servlet-class>javax.faces.webapp.FacesServlet</servlet-class>\n\
  \n</servlet>\n\n<servlet-mapping>\n\n<servlet-name>JSF</servlet-name>\n\n<url-pattern>/faces/*</url-pattern>\n\
  \n</servlet-mapping>\n\n**<context-param>**\n\n**<param-name>javax.faces.FACELETS_LIBRARIES</param-name>**\n\
  \n**<param-value>/META-INF/foo.taglib.xml</param-value>**\n\n**</context-param>**\n\
  \n</web-app>\n\n**156**\n\n第 5 章 ■ 创建自定义组件\n\n在同一个 META-INF 文件夹中创建 copyright.xhtml\
  \ 文件。该文件内容仅包含一行（见清单 5-6）。\n\n**清单 5-6.** *<copyright> 标签的 XHTML 代码*\n\nCopyright.\
  \ Foo inc.\n\n然而，JSF 期望该文件是一个完整的 XHTML 页面，如清单 5-7 所示，这可能是为了让你能够使用可视化编辑器编辑 XHTML\
  \ 代码。\n\n**清单 5-7.** *<copyright> 标签的完整 XHTML 页面*\n\n<!DOCTYPE html PUBLIC \"- //W3C//DTD\
  \ XHTML 1.0 Transitional//EN\"\n\n[\"http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd\"\
  >](http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd)\n\n[<html >](http://www.w3.org/1999/xhtml)\n\
  \n<body>\n\nCopyright. Foo inc.\n\n</body>\n\n</html>\n\n然而，这会产生一个问题，因为你肯定不希望在实际页面中包含\
  \ <html> 和 <body> 标签。为了解决这个问题，JSF 要求你通过使用 <component> 标签包围实际内容来指明它，如清单 5-8 所示。该标签会创建一个类似\
  \ UI Panel 的组件作为子树的根节点。外部的一切都不会进入 JSF 组件树，因此不会对输出产生影响。<component> 标签定义在 JSF Facelets\
  \ 标签库中，这是除 JSF Core 标签库和 JSF HTML 标签库之外的第三个标签库。JSF Facelets 标签库中的标签主要用于定义组件。\n\n\
  **清单 5-8.** *使用 <ui:component> 指明实际内容*\n\n<!DOCTYPE html PUBLIC \"- //W3C//DTD XHTML\
  \ 1.0 Transitional//EN\"\n\n[\"http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd\"\
  >](http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd)\n\n[<html](http://www.w3.org/1999/xhtml)\n\
  \n[**>**](http://java.sun.com/jsf/facelets)\n\n<body>\n\n**<ui:component>**\n\n\
  Copyright. Foo inc.\n\n**</ui:component>**\n\n</body>\n\n</html>\n\n第 5 章 ■ 创建自定义组件\n\
  \n**157**\n\n现在，当你运行应用程序时，你应该会在页面上看到版权声明。\n\n**允许调用者指定公司名称**\n\n假设在你的应用程序中，你希望在某些页面上显示“Foo”作为公司名称，但在其他页面上则希望显示“Bar”。你该如何实现呢？\n\
  \n你可以让你的 <copyright> 标签接受一个参数，如清单 5-9 所示。\n\n**清单 5-9.** *向自定义标签提供参数*\n\n...\n\n\
  [<html](http://www.w3.org/1999/xhtml)\n\n[>](http://foo.com)\n\n<p>这是页面 1。</p>\n\
  \n<foo:copyright **company=\"Foo\"** />\n\n</html>\n\n要在 copyright.xhtml 中输出公司参数，只需像访问\
  \ Web Bean 或属性一样访问它即可（见清单 5-10）。\n\n**清单 5-10.** *在 EL 表达式中访问参数*\n\n<!DOCTYPE html\
  \ PUBLIC \"- //W3C//DTD XHTML 1.0 Transitional//EN\"\n\n[\"http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd\"\
  >](http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd)\n\n[<html](http://www.w3.org/1999/xhtml)\n\
  \n\n\n[>](http://java.sun.com/jsf/facelets)\n\n<body>\n\n<ui:component>\n\n**版权所有。\
  \ #{company}**\n\n</ui:component>\n\n</body>\n\n</html>\n\n它是如何工作的？当 JSF 构建组件树时，`<copyright>`\
  \ 标签会将其所有属性复制到一个表格中（见图 5-6）。属性值被视为 EL 表达式，它们会被原样复制，而不会被求值。然后 JSF 会进入 copyright.xhtml。当它看到\
  \ EL 表达式 `#{company}` 时，会将其链接到周围的变量表，以便将来求值时能够找到这些变量。这种变量被称为 *EL 变量*。如果你了解 C/C++，EL\
  \ 变量非常类似于 C/C++ 中的宏，你可以为表达式指定一个名称。\n\n**158**\n\n第 5 章 ■ 创建自定义组件\n\n[<html](http://www.w3.org/1999/xhtml)\n\
  \n[>](http://foo.com)\n\n<p>这是第 1 页。</p>\n\n<foo:copyright company=\"Foo\"/>\n\n\
  </html>\n\n1：将属性复制到表格中。\n\n**名称**\n\n**EL 表达式**\n\ncompany Foo\n\n...\n\n...\n\n\
  ...\n\n...\n\n类似 UI 面板的\n\n组件\n\n类似 UI 输出的\n\n2：将 EL 表达式链接到该\n\n组件\n\n变量表。\n\n值:\
  \ #{company}\n\n**图 5-6.** *自定义标签参数收集形成变量表* 树构建完成后，变量表与类似 UI 面板的组件之间的连接将被移除，树将如图\
  \ 5-7 所示。此时，不再存在参数的概念。\n\n**名称**\n\n**EL 表达式**\n\ncompany Foo\n\n...\n\n...\n\n\
  ...\n\n...\n\n类似 UI 面板的\n\n组件\n\n类似 UI 输出的\n\n变量表\n\n组件\n\n值: #{company}\n\n**图\
  \ 5-7.** *EL 表达式链接到变量表*\n\n当类似 UI 输出的组件需要渲染自身时，它会求值 EL 表达式。EL 表达式会查找变量表（见图 5-8）并找到\
  \ Foo。然后它会再次将 Foo 作为 EL 表达式求值。由于它是一个字面量，结果仍然是 Foo，因此这就是你在屏幕上看到的输出。\n\n第 5 章 ■ 创建自定义组件\n\
  \n**159**\n\n**名称**\n\n**EL 表达式**\n\ncompany Foo\n\n...\n\n...\n\n...\n\n...\n\n\
  类似 UI 面板的\n\n组件\n\n类似 UI 输出的\n\n组件\n\n值: #{company}\n\n**图 5-8.** *查找变量以找到要求值的 EL\
  \ 表达式* 现在再次运行应用程序，它将显示版权声明，其中公司名称为“Foo”。\n\n**创建产品编辑器**\n\n你不仅限于传递字符串作为参数；你也可以传递对象。例如，假设你想要一个表单来编辑\
  \ Product 对象（例如，包含产品 ID 和产品名称）的详细信息，并且该表单在多个页面上使用。因此，你想要创建一个自定义标签来表示这样的表单，并传递一个\
  \ Product 对象给它进行编辑（见清单 5-11）。这里，`<pe>` 代表“产品编辑器”。\n\n**清单 5-11.** *向自定义标签传递对象*\n\
  \n...\n\n**<foo:pe product=\"...返回一个 PRODUCT 的 EL 表达式...\"/>**\n\n<foo:copyright\
  \ company=\"Foo\"/>\n\n为此，请修改 foo.taglib.xml，如清单 5-12 所示。\n\n**清单 5-12.** *定义 `<pe>`\
  \ 标签*\n\n<!DOCTYPE facelet- taglib PUBLIC\n\n\"- //Sun Microsystems, Inc.//DTD Facelet\
  \ Taglib 1.0//EN\"\n\n[\"http://java.sun.com/dtd/facelet- taglib_1_0.dtd\">](http://java.sun.com/dtd/facelet-�taglib_1_0.dtd)\n\
  \n[<facelet-taglib >](http://java.sun.com/JSF/Facelet)\n\n[<namespace>http://foo.com</namespace>](http://foo.com%3C/namespace)\n\
  \n<tag>\n\n<tag-name>copyright</tag- name>\n\n<source>copyright.xhtml</source>\n\
  \n</tag>\n\n**160**\n\n第 5 章 ■ 创建自定义组件\n\n**<tag>**\n\n**<tag-name>pe</tag- name>**\n\
  \n**<source>pe.xhtml</source>**\n\n**</tag>**\n\n</facelet-taglib>\n\n创建 pe.xhtml\
  \ 文件，如清单 5-13 所示。\n\n**清单 5-13.** *`<pe>` 标签的 XHTML 代码*\n\n<!DOCTYPE html PUBLIC\
  \ \"- //W3C//DTD XHTML 1.0 Transitional//EN\"\n\n[\"http://www.w3.org/TR/xhtml1/DTD/xhtml1-\
  \ transitional.dtd\">](http://www.w3.org/TR/xhtml1/DTD/xhtml1-�transitional.dtd)\n\
  \n[<html](http://www.w3.org/1999/xhtml)\n\n[>](http://java.sun.com/jsf/html)\n\n\
  <body>\n\n<ui:component>\n\n<h:form>\n\n<h:inputHidden value=\"#{product.id}\"/>\n\
  \n<h:inputText value=\"#{product.name}\"/>\n\n<h:commandButton action=\"#{product.onUpdated}\"\
  \ value=\"确定\"/>\n\n</h:form>\n\n</ui:component>\n\n</body>\n\n</html>\n\n\n\n请注意\
  \ EL 表达式是如何引用变量表中的 product 参数的。\n\n最后，调用者需要提供一个 Product 对象。我们在 p1.xhtml 中实现这一点（见清单\
  \ 5-14）。\n\n**清单 5-14.** *向 <pe> 标签提供一个 Product 对象*\n\n...\n\n[<html](http://www.w3.org/1999/xhtml)\n\
  \n[>](http://foo.com)\n\n<p>这是页面 1。</p>\n\n**<foo:pe product=\"#{currentProduct}\"\
  />**\n\n<foo:copyright company=\"Foo\"/>\n\n</html>\n\n在自定义包中创建 Product 类，并从中创建\
  \ currentProduct Web Bean（见清单 5-15）。\n\n第 5 章 ■ 创建自定义组件\n\n**161**\n\n**清单 5-15.**\
  \ *Product 类*\n\npackage custom;\n\n...\n\n@Named(\"currentProduct\")\n\n@RequestScoped\n\
  \npublic class Product {\n\nprivate String id;\n\nprivate String name;\n\npublic\
  \ Product() {\n\nthis(\"p1\", \"pen\");\n\n}\n\npublic Product(String id, String\
  \ name) {\n\nthis.id = id;\n\nthis.name = name;\n\n}\n\npublic String onUpdated()\
  \ {\n\nSystem.out.println(id + \": \" + name);\n\nreturn \"updated\";\n\n}\n\npublic\
  \ String getId() {\n\nreturn id;\n\n}\n\npublic void setId(String id) {\n\nthis.id\
  \ = id;\n\n}\n\npublic String getName() {\n\nreturn name;\n\n}\n\npublic void setName(String\
  \ name) {\n\nthis.name = name;\n\n}\n\n}\n\n请注意，其 `onUpdate()` 方法只会将数据打印到控制台。在实际应用中，它可以更新数据库等。现在，重启\
  \ JBoss 以便 JSF 重新加载标签库定义。然后运行应用程序，修改产品名称，并提交表单。它现在会将数据打印到控制台。\n\n**162**\n\n第 5\
  \ 章 ■ 创建自定义组件\n\n**在参数中传递方法？**\n\n请注意，一些内置的 JSF 标签接受方法作为参数，如清单 5-16 所示。\n\n**清单\
  \ 5-16.** *接受方法参数的 JSF 标签*\n\n<h:commandButton action=\"#{ph.addToCart}\"/>\n\n\
  <h:commandLink action=\"...\"/>\n\n自定义标签也能做到这一点吗？例如，能否修改 `<pe>` 标签，使其可以像清单 5-17\
  \ 那样使用？\n\n**清单 5-17.** *自定义标签接受方法参数？*\n\n<foo:pe product=\"...\" **action=\"currentProduct.onUpdated\"\
  ** />\n\n...\n\n然后你可以像清单 5-18 那样调用它。\n\n**清单 5-18.** *调用方法参数？*\n\n...\n\n<ui:component>\n\
  \n<h:form>\n\n<h:inputHidden value=\"#{product.id}\"/>\n\n<h:inputText value=\"\
  #{product.name}\"/>\n\n<h:commandButton action=\"#{**action**}\" value=\"确定\"/>\n\
  \n</h:form>\n\n</ui:component>\n\n</body>\n\n</html>\n\n不幸的是，默认情况下这行不通。也就是说，默认情况下，自定义标签的所有属性都期望被求值为值（原始值或对象）。它们不能被求值为方法。解决方法是传递一个包含可调用方法的对象（见清单\
  \ 5-19 和清单 5-20）。\n\n**清单 5-19.** *传递一个对象作为动作提供者*\n\n<foo:pe product=\"...\" **actionProvider=\"\
  某个拥有 onUpdated() 方法的对象\"** />\n\n...\n\n第 5 章 ■ 创建自定义组件\n\n**163**\n\n**清单 5-20.**\
  \ *调用动作提供者的方法*\n\n...\n\n<ui:component>\n\n<h:form>\n\n<h:inputHidden value=\"#{product.id}\"\
  />\n\n<h:inputText value=\"#{product.name}\"/>\n\n<h:commandButton action=\"#{**actionProvider.onUpdated**}\"\
  \ value=\"确定\"/>\n\n</h:form>\n\n</ui:component>\n\n</body>\n\n</html>\n\n这个例子实际上与最初的解决方案没有太大区别：即在\
  \ Product 对象本身上调用一个方法。\n\n**创建一个 Box 组件**\n\n假设你想创建一个组件，它可以接受任何 XHTML 代码（包括 JSF\
  \ 标签），并在代码周围渲染一个框。示例如图 5-9 所示。\n\n第 1 页\n\n<foo:box>\n\nx: <h:inputText .../>\n\n\
  y: <h:inputText .../>\n\n</foo:box>\n\n它会在调用者提供的\n\n内容周围添加一个框。\n\nbox.xhtml\n\n\
  x:\n\ny:\n\n**图 5-9.** *Box 组件*\n\n第一次尝试是尝试通过参数传递 XHTML 代码，如清单 5-21 所示，然后像清单 5-22\
  \ 那样输出它。\n\n**164**\n\n第 5 章 ■ 创建自定义组件\n\n**清单 5-21.** *在参数中传递 XHTML 代码？*\n\n<foo:box\
  \ content=\"x: <h:inputText .../> ...\">\n\n...\n\n**清单 5-22.** *输出 XHTML 代码？*\n\
  \n...\n\n<table border=\"1\">\n\n<tr>\n\n<td><h:outputText value=\"#{content}\"\
  /></td>\n\n</tr>\n\n</table>\n\n\n\n然而，这行不通，因为 XHTML 代码会被当作字符串处理，JSF 不会解析它来创建相应的组件。最终得到的结果将如图\
  \ 5-10 所示。\n\nx: <h:inputText .../>\n\ny: <h:inputText .../>\n\n**图 5-10.** *JSF\
  \ 标签将原样输出。*\n\n要真正将 XHTML 代码（包括 JSF 标签）传递给自定义标签，你可以将 XHTML 代码放入标签体中。让我们在 p1.xhtml\
  \ 中实现这一点（参见清单 5-23）。\n\n**清单 5-23.** *将 XHTML 代码作为标签体传递*\n\n<?xml version=\"1.0\"\
  \ encoding=\"UTF- 8\" ?>\n\n<!DOCTYPE html PUBLIC \"- //W3C//DTD XHTML 1.0 Strict//EN\"\
  \n\n[\"http://www.w3.org/TR/xhtml1/DTD/xhtml1- strict.dtd\">](http://www.w3.org/TR/xhtml1/DTD/xhtml1-\
  \ strict.dtd)\n\n[<html](http://www.w3.org/1999/xhtml)\n\n[>](http://foo.com)\n\n\
  <p>这是页面 1。</p>\n\n**<foo:box>**\n\n<foo:pe product=\"#{currentProduct}\"/>\n\n<foo:copyright\
  \ company=\"Foo\"/>\n\n**</foo:box>**\n\n</html>\n\n第 5 章 ■ 创建自定义组件\n\n**165**\n\
  \n那么，如何在自定义组件中解析 XHTML 代码呢？创建 box.xhtml（位于 META-INF 文件夹中），其内容如图 5-11 所示。简单来说，`<ui:insert>`\
  \ 标签会回溯到调用页面中自定义标签的体内，以构建组件树。\n\n...\n\n[<html](http://www.w3.org/1999/xhtml)\n\n\
  [>](http://foo.com)\n\n<p>这是页面 1。</p>\n\n<foo:box>\n\n<foo:pe product=\"#{currentProduct}\"\
  />\n\n<foo:copyright company=\"Foo\"/>\n\n</foo:box>\n\n</html>\n\nbox.xhtml\n\n\
  <!DOCTYPE html PUBLIC \"-//W3C//DTD XHTML 1.0 Transitional//EN\"\n\n[\"http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd\"\
  >](http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd)\n\n[<html](http://www.w3.org/1999/xhtml)\n\
  \n[>](http://java.sun.com/jsf/facelets)\n\n<body>\n\n<ui:component>\n\n<table border=\"\
  1\">\n\n绘制边框。\n\n<tr>\n\n<td>\n\n<ui:insert/>\n\n`<ui:insert>` 标签\n\n</td>\n\n会回溯到调用者指定的\n\
  \n</tr>\n\n体内，构建子树并将其\n\n</table>\n\n嫁接于此。\n\n</ui:component>\n\n</body>\n\n</html>\n\
  \n**图 5-11.** *使用 `<ui:insert>` 回溯到标签体*\n\n最后，在 foo.taglib.xml 中定义 `<box>` 标签，如清单\
  \ 5-24 所示。\n\n**清单 5-24.** *定义 `<box>` 标签*\n\n<!DOCTYPE facelet- taglib PUBLIC\n\
  \n\"- //Sun Microsystems, Inc.//DTD Facelet Taglib 1.0//EN\"\n\n[\"http://java.sun.com/dtd/facelet-\
  \ taglib_1_0.dtd\">](http://java.sun.com/dtd/facelet- taglib_1_0.dtd)\n\n[<facelet-taglib\
  \ >](http://java.sun.com/JSF/Facelet)\n\n[<namespace>http://foo.com</namespace>](http://foo.com%3C/namespace)\n\
  \n<tag>\n\n**166**\n\n第 5 章 ■ 创建自定义组件\n\n<tag-name>copyright</tag- name>\n\n<source>copyright.xhtml</source>\n\
  \n</tag>\n\n<tag>\n\n<tag-name>pe</tag- name>\n\n<source>pe.xhtml</source>\n\n</tag>\n\
  \n**<tag>**\n\n**<tag-name>box</tag- name>**\n\n**<source>box.xhtml</source>**\n\
  \n**</tag>**\n\n</facelet-taglib>\n\n重启 JBoss，并运行应用程序。此时，你应该会看到产品编辑器和版权声明周围出现了一个边框。\n\
  \n**接受两段 XHTML 代码**\n\n自定义标签能否接受两段 XHTML 代码？例如，能否创建一个标签，将两段 XHTML 代码显示在一行的两个单元格中，如图\
  \ 5-12 所示？\n\n页面 1\n\n<foo:pair>\n\nx: <h:inputText .../>\n\ny: <h:inputText .../>\n\
  \n</foo pair>\n\n进入右侧单元格。\n\n进入左侧单元格。\n\npair.xhtml\n\nx:\n\ny:\n\n**图 5-12.** *接受两段\
  \ XHTML 代码*\n\n为此，创建 pair.xhtml（位于 META-INF 文件夹中），并修改 p1.xhtml，如图 5-13 所示。也就是说，为每个\
  \ `<ui:define>` 标签分配一个唯一的名称。当使用 `<ui:insert>` 标签回溯到调用页面中自定义标签的体内时，也指定一个名称，以便它能够按名称查找对应的\
  \ `<ui:define>` 标签。\n\n第 5 章 ■ 创建自定义组件\n\n**167**\n\n定义一段名为 \"left\" 的 XHTML 代码。\n\
  \n该名称只是一个唯一标识符，没有特殊含义。\n\n...\n\n[<html](http://www.w3.org/1999/xhtml)\n\n[**>**](http://java.sun.com/jsf/facelets)\n\
  \n**<p>这是页面 1。</p>\n\n**<foo:pair>**\n\n**<ui:define name=\"left\">**\n\n`<ui:insert>`\
  \ 标签\n\n<foo:pe product=\"#{currentProduct}\"/>\n\n带有名称。因此它会\n\n回溯到对应的片段\n\n**</ui:define>**\n\
  \n来构建子树，并将其\n\n**<ui:define name=\"right\">**\n\n嫁接于此。\n\n<foo:copyright company=\"\
  Foo\"/>\n\n**</ui:define>**\n\n\n\n**</foo:pair>**\n\n跟踪到此处构建\n\n</html>\n\n子树并将其嫁接\n\
  \n至此。\n\n定义另一段\n\npair.xhtml\n\n名为“right”的\n\nXHTML 代码。\n\n<!DOCTYPE html PUBLIC\
  \ \"-//W3C//DTD XHTML 1.0 Transitional//EN\"\n\n[\"http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd\"\
  >](http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd)\n\n[<html](http://www.w3.org/1999/xhtml)\n\
  \n[>](http://java.sun.com/jsf/facelets)\n\n<body>\n\n<ui:component>\n\n<table border=\"\
  1\">\n\n<tr>\n\n<td>\n\n<ui:insert name=\"left\"/>\n\n</td>\n\n<td>\n\n<ui:insert\
  \ name=\"right\"/>\n\n</td>\n\n</tr>\n\n</table>\n\n</ui:component>\n\n</body>\n\
  \n</html>\n\n**图 5-13.** *使用带名称的 <ui:insert> 与 <ui:define>* 在 foo.taglib.xml 中定义\
  \ <pair> 标签，如清单 5-25 所示。\n\n**清单 5-25.** *定义 <pair> 标签*\n\n<!DOCTYPE facelet- taglib\
  \ PUBLIC\n\n\"- //Sun Microsystems, Inc.//DTD Facelet Taglib 1.0//EN\"\n\n[\"http://java.sun.com/dtd/facelet-\
  \ taglib_1_0.dtd\">](http://java.sun.com/dtd/facelet-�taglib_1_0.dtd)\n\n**168**\n\
