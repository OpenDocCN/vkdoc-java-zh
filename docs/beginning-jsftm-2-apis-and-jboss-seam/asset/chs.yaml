  \ 包的 `src/hot` 文件夹中创建一个 `ConfirmBean` 类，如清单 10-22 所示。请注意，由于该类本身没有状态（它只是将其他组件注入自身），其作用域设置为\
  \ `EVENT`，这与请求作用域相同。此外，该类使用了 `@Stateless` 注解，这意味着对同一代理的不同方法调用可能会委托给不同的 Bean 实例。由于所有\
  \ `ConfirmBean` 实例都被视为相同的，JBoss 将永远不会将它们保存到硬盘或从硬盘加载（因此工作量更少）；它只需要创建和销毁它们。\n\n**清单\
  \ 10-22.** *委托给无状态会话 Bean 的 Seam 组件*\n\npackage shop;\n\n...\n\nimport javax.ejb.Stateless;\n\
  \n@Stateless\n\n@Name(\"confirm\")\n\n@Scope(ScopeType.EVENT)\n\npublic class ConfirmBean\
