  \ *在 EL 表达式中调用函数*\n\n第 10 章 ■ 使用 JBOSS Seam\n\n**267**\n\n现在，你可能想测试运行应用程序并以普通用户身份登录，但你不能，因为系统只有一个（admin）用户。为了解决这个问题，在\
  \ Authenticator 类中硬编码一个普通用户，如清单 10-9 所示。\n\n**清单 10-9.** *硬编码一个普通用户*\n\npackage\
