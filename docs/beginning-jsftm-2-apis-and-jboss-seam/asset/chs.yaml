  \n**284**\n\n第 10 章 ■ 使用 JBoss Seam\n\n[`jboss.com/products/seam/pages-2.1.xsd\"\
  `](http://jboss.com/products/seam/pages-2.1.xsd)\n\n**login-required=\"true\">**\n\
  \n</page>\n\n现在，再次尝试结账，应用程序应该会强制你登录。以 u1 身份登录，即可正确查看总金额和信用卡号。\n\n**使用 WebLogic、WebSphere\
  \ 或 GlassFish**\n\n尽管本章使用了 JBoss，但你开发的代码应该也能在其他 EJB3 服务器（如 WebLogic、WebSphere 或\
  \ GlassFish）上正常运行。不过，对于每种特定类型的服务器，你可能需要进行一些特定的设置调整。请查阅 Seam 文档以获取更多信息。\n\n**总结**\n\
  \n在本章中，你了解到如果一个类使用了 @Entity 注解，其实例可以轻松地通过 JBoss 保存到数据库表或从数据库表加载。Seam 可以为这样的类生成页面，用于搜索和列出实例，以及查看和编辑特定实例。你还可以进一步注解其字段以指定约束条件。\n\
  \n你还了解到可以使用会话 Bean 来实现更好的可伸缩性。如果 Bean 实例包含状态，则将其设置为有状态 Bean；否则，将其设置为无状态 Bean。\n\n\
  无论你的 Bean 是有状态还是无状态，JBoss 都会创建和销毁 Bean 实例，应用程序将通过代理访问 Bean 实例。为了在使用有状态 Bean 时节省内存，JBoss\
  \ 可能会将 Bean 实例保存到硬盘，并在需要时重新加载。对于无状态 Bean，JBoss 的工作量会更少：它可以直接销毁并创建它们。\n\n\n\n你还了解到，Seam\
  \ 组件类似于 Web Bean。你可以按名称将一个组件注入到另一个组件中。此外，你现在还知道如何将会话 Bean（有状态或无状态）转换为 Seam 组件，这样该组件会将方法调用委托给代理，代理再进一步委托给\
  \ Bean 实例。你还看到了如何使用 `@Remove` 注解一个方法，以便 Seam 在销毁组件时销毁 Bean 实例。\n\n你了解到，可以让 Seam\
  \ 自动生成一个骨架应用程序，其中包含通用布局、登录页面以及许多内置组件，例如 `Credentials`（用户名和密码）和 `EntityManager`（数据库连接）。你还探索了\
  \ Seam 的一些强大标签，特别是 `<s:decorate>` 和 `<s:button>`。现在，你可以使用前者根据你在字段上指定的约束来设置 JSF 验证器，添加星号以指示必填字段，并显示错误消息（如果有）。并且，你可以使用后者直接指定下一个视图\
  \ ID，而无需使用导航规则，并通过查询参数为下一页维护一些信息。\n\n第 10 章 ■ 使用 JBOSS Seam\n\n**285**\n\n最后，你了解到，为了指定要为下一页维护哪些信息、要求对页面进行身份验证访问，或限制只有特定角色的用户才能访问，你可以在页面所在的文件夹中创建一个\
