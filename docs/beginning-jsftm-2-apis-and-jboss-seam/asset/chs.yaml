  \nno-conversation-view-id=\"/ProductList.xhtml\"\n\n**login-required=\"true\">**\n\
  \n...\n\n</page>\n\n如你所见，在 Seam 中，你可以为每个页面设置一个配置文件。例如，如果页面名为 `foo.xhtml`，其配置文件名为\
  \ `foo.page.xml`，并存储在与页面文件相同的文件夹中。\n\n第 10 章 ■ 使用 JBOSS Seam\n\n**261**\n\nSeam\
  \ 如何检查用户名和密码？它依赖于一个名为 `authenticator` 的 Web Bean。实际上，包括 2.1 版本在内的 Seam 版本都早于 Web\
  \ Beans 规范，因此不支持 Web Beans。不过，这些版本的 Seam 确实支持一个类似的概念，称为组件。这个身份验证组件位于 `shop` 包中的\
  \ `Authenticator` 类中，路径为 `src/hot` 文件夹，如清单 10-6 所示。它是在 `seam new-project` 创建 Eclipse\
  \ 项目时生成的。（你是否好奇为什么叫“hot”这个有趣的名字？当你对此文件夹中定义的组件进行更改时，Seam 可以热部署它们。）\n\n在 Seam 中，组件的名称使用\
  \ `@Name` 指定，而不是 `@Named`，注入则通过 `@In` 而不是 `@Current` 完成。`@In` 和 `@Current` 的工作方式类似，但有一个非常重要的区别：`@In`\
  \ 使用字段的名称（例如 `identity` 或 `credentials`）来查找组件，而 `@Current` 则使用字段的类来执行查找。\n\n当 Seam\
  \ 需要检查用户名和密码时，它会调用 `authenticate()` 方法。该方法可以从 `Credentials` 组件中获取用户输入的用户名和密码。如果该方法返回\
  \ `true`，则身份验证被视为成功；返回 `false` 则表示失败。如清单 10-6 所示，Seam 并未查询用户数据库或 LDAP 目录，而是硬编码了一个名为\
  \ `admin` 的用户，且不检查密码，并告知（任何相关方）该用户具有 `admin` 角色。你可以将其理解为该用户属于 `admin` 组。稍后你将看到如何利用\
  \ `admin` 用户组的权限。\n\n\n\n**清单 10-6.** *认证组件*\n\npackage shop;\n\nimport org.jboss.seam.annotations.In;\n\
  \nimport org.jboss.seam.annotations.Logger;\n\nimport org.jboss.seam.annotations.Name;\n\
  \nimport org.jboss.seam.log.Log;\n\nimport org.jboss.seam.security.Credentials;\n\
  \nimport org.jboss.seam.security.Identity;\n\n@Name(\"authenticator\")\n\npublic\
  \ class Authenticator {\n\n@Logger\n\nprivate Log log;\n\n@In\n\nIdentity identity;\n\
  \n@In\n\nCredentials credentials;\n\n![图片 87](img/index-276_1.png)\n\n**262**\n\n\
  第 10 章 ■ 使用 JBoss Seam\n\npublic boolean authenticate() {\n\nlog.info(\"正在认证 {0}\"\
  , credentials.getUsername());\n\n//在此编写你的认证逻辑，\n\n//如果认证成功则返回 true，\n\n//否则返回 false\n\
  \nif (\"admin\".equals(credentials.getUsername())) {\n\nidentity.addRole(\"admin\"\
  );\n\nreturn true;\n\n}\n\nreturn false;\n\n}\n\n}\n\n现在，以 admin 身份登录，并尝试添加一个产品，如图\
  \ 10-4 所示。请注意，Seam 已经判断出名称是必填项（来自 @NotEmpty 注解），并且价格也是必填项（因为它是原始类型 double，而非 Double，因此不能为\
  \ null）。\n\n**图 10-4.** *添加产品*\n\n如果你尝试输入一个负数价格，页面将返回一个错误，如图 10-5 所示。\n\n这意味着 Seam\
  \ 已根据 @Min 注解自动创建了一个 DoubleRangeValidator。\n\n![图片 88](img/index-277_1.png)\n\n\
  第 10 章 ■ 使用 JBoss Seam\n\n**263**\n\n**图 10-5.** *捕获到无效输入*\n\n同样在图 10-5 中，请注意无效字段被高亮显示，并且其右侧显示了一条错误消息。这种面向用户的视觉反馈是通过\
  \ ProductEdit.xhtml 中的 `<s:decorate>` 标签实现的，如清单 10-7 所示。如果字段是必填项，该标签还负责在标签上添加一个星号。要使用\
  \ `<s:decorate>` 标签，你需要使用名称 label 向其传递一段 JSF 内容（代表字段标签），并将输入字段放在 `<s:decorate>`\
  \ 标签的主体中。\n\n**清单 10-7.** *使用 <s:decorate> 标签*\n\n<!DOCTYPE composition PUBLIC \"\
