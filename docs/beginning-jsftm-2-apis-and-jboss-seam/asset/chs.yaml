  \n</page>\n\n在 `<restrict>` 标签的主体中应放入什么 EL 表达式？你可以按照图 10-7 所示的方式操作。简而言之，EL 表达式求值器将使用前缀“s”和函数名“hasRole”来查找该函数，然后调用它。返回值就是\
