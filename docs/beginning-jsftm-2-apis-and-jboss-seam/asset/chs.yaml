  \n你得到的并非语言代码，而是一个 `Locale` 对象。`Locale` 对象包含一个语言代码（如 `en` 或 `zh`），并可选地包含一个国家代码（如\
  \ `US`、`UK` 或 `CN`）。尽管 `Locale` 对象不是字符串，但你可以对其调用 `toString()` 方法，将其转换为 `<LANGUAGE_CODE>_<COUNTRY\
  \ CODE>` 格式的字符串，例如 `en_US` 或 `zh`（如果未指定国家代码）。\n\n**清单 9-10.** *让用户在表单中选择语言*\n\n\
