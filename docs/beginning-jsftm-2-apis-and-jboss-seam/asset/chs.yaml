  \ setPrice(double price) {**\n\n**this.price = price;**\n\n**}**\n\n}\n\n接下来，你需要创建一个页面让用户添加产品。令人惊讶的是，Seam\
  \ 可以自动为你完成这项工作。在之前使用的同一个命令提示符中，输入 `seam generate-ui`。该命令会扫描 `src/main` 文件夹中带有 `@Entity`\
