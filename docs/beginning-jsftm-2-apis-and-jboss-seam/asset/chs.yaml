  \ 中的项目，以便它能够识别这些新文件。请注意，在 `view` 文件夹中应该已经创建了三个页面：`Product.xhtml`（用于查看产品）、`ProductEdit.xhtml`（用于编辑产品）和\
  \ `ProductList.xhtml`（用于搜索和列出产品）。\n\n要查看这些页面是否正常工作，请再次访问 [`localhost:8080/SeamShop/home.seam`](http://localhost:8080/SeamShop/home.seam)。你应该会在顶部看到一个“产品列表”链接，如图\
