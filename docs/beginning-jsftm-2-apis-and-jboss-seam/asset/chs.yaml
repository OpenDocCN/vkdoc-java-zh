  **创建页面特定的导航案例**\n\n假设你希望在“产品”页面上有一个链接来显示热卖商品，如图 6-9 所示。\n\n**图 6-9.** *指向热卖商品的链接*\n\
  \n第 6 章 ■ 为页面提供通用布局\n\n**181**\n\n为什么这个需求很有趣？考虑一下你应该把导航案例放在哪里。如果把它放在全局导航规则中，它会影响应用程序中的所有页面，这不是你想要的。要了解如何操作，请继续阅读。首先，修改\
  \ products.xhtml，如清单 6-6 所示。\n\n**清单 6-6.** *在具体部分中放置 JSF 标签*\n\n[<html](http://www.w3.org/1999/xhtml)\n\
  \n[**>**](http://java.sun.com/jsf/html)\n\n<ui:composition template=\"/base.xhtml\"\
  >\n\n<ui:define name=\"p1\">\n\n<h1>产品</h1>\n\n</ui:define>\n\n<ui:define name=\"\
  p2\">\n\n这是产品页面。\n\n**这里有一些<h:commandLink action=\"hotDeals\">热卖**\n\n**商品</h:commandLink>。**\n\
  \n</ui:define>\n\n</ui:composition>\n\n</html>\n\n这里没有什么特别的。创建一个简单的 hotdeals.xhtml\
  \ 页面，如清单 6-7 所示。\n\n**清单 6-7.** *热卖商品页面*\n\n<!DOCTYPE html PUBLIC \"- //W3C//DTD\
  \ XHTML 1.0 Strict//EN\"\n\n[\"http://www.w3.org/TR/xhtml1/DTD/xhtml1- strict.dtd\"\
  >](http://www.w3.org/TR/xhtml1/DTD/xhtml1-�strict.dtd)\n\n[<html >](http://www.w3.org/1999/xhtml)\n\
  \n热卖商品在这里！\n\n</html>\n\n然后，为产品页面创建一个普通的导航规则，如清单 6-8 所示。\n\n**清单 6-8.** *产品页面的导航规则*\n\
  \n<?xml version=\"1.0\" encoding=\"UTF- 8\"?>\n\n<faces-config ...>\n\n<navigation-\
  \ rule>\n\n<from-view-id>*</from-view- id>\n\n**182**\n\n第 6 章 ■ 为页面提供通用布局\n\n<navigation-\
  \ case>\n\n<from-outcome>products</from- outcome>\n\n<to-view-id>/products.xhtml</to-view-\
  \ id>\n\n</navigation- case>\n\n<navigation- case>\n\n<from-outcome>home</from-\
  \ outcome>\n\n<to-view-id>/home.xhtml</to-view- id>\n\n</navigation- case>\n\n</navigation-\
  \ rule>\n\n**<navigation- rule>**\n\n**<from-view-id>/products.xhtml</from-view-\
  \ id>**\n\n**<navigation- case>**\n\n**<from-outcome>hotDeals</from- outcome>**\n\
  \n**<to-view-id>/hotdeals.xhtml</to-view- id>**\n\n**</navigation- case>**\n\n**</navigation-\
  \ rule>**\n\n</faces-config>\n\n现在，有趣的部分来了：这个规则和全局规则都会匹配当前的视图 ID（/products.xhtml），那么哪一个会生效呢？这个规则会在全局规则之前被考虑，因为它更具体（即，它不包含任何通配符）。一旦找到一个导航案例，搜索就会停止。在这种情况下，这意味着特定的规则会生效，因为它首先被考虑，并且它包含一个匹配的导航案例。现在，再次运行应用程序，并尝试进入热卖商品页面。它应该会按预期工作。\n\
  \n**总结**\n\n在本章中，你学到了如果页面具有通用布局，可以将通用内容提取到一个基础页面中，并使用 `<ui:define>` 标记抽象部分。然后在每个子页面中，使用\
  \ `<ui:composition>` 引入基础页面，并使用 `<ui:define>` 提供每个具体部分。每个部分应该有一个唯一的名称。如果只有一个抽象部分，你可以省略名称，并将具体部分作为\
  \ `<ui:composition>` 元素的主体提供。\n\n你学到了可以在导航规则中使用星号作为视图 ID。在这种情况下，它将匹配任何视图 ID。如果多个页面共享相同的导航案例，这很有用。如果一个页面需要一些额外的导航案例，它可以有自己的普通导航规则，该规则会被优先检查。\n\
  \n![Image 73](img/index-197_1.png)\n\n第 7 章\n\n使用 Ajax 构建交互式页面\n\n**本**章中，你将学习如何使用一种称为\
  \ Ajax 的技术来构建比普通 HTML 页面更具交互性的页面。\n\n**显示常见问题解答**\n\n假设你想开发一个显示常见问题解答（FAQ）的应用程序，如图\
  \ 7-1 所示。\n\n**图 7-1.** *显示常见问题解答*\n\n假设每个问题都有简短答案和详细答案。最初，显示简短答案。如果用户点击问题，答案将切换为详细答案。如果用户再次点击，它将切换回简短答案。\n\
  \n为此，按照本书其余部分创建项目的方式，创建一个名为 FAQ 的新动态 Web 项目。作为第一步，你只显示单个问题。因此，创建一个 listfaq.xhtml\
  \ 页面，如清单 7-1 所示。\n\n**183**\n\n**184**\n\n第 7 章 ■ 使用 Ajax 构建交互式页面\n\n**清单 7-1.**\
  \ *listfaq.xhtml*\n\n<!DOCTYPE html PUBLIC \"- //W3C//DTD XHTML 1.0 Strict//EN\"\
  \n\n[\"http://www.w3.org/TR/xhtml1/DTD/xhtml1- strict.dtd\">](http://www.w3.org/TR/xhtml1/DTD/xhtml1-�strict.dtd)\n\
  \n[<html](http://www.w3.org/1999/xhtml)\n\n[>](http://java.sun.com/jsf/core)\n\n\
  <head>\n\n<meta http-equiv=\"Content- Type\" content=\"text/html; charset=UTF- 8\"\
  \ />\n\n<title>在此处插入标题</title>\n\n</head>\n\n<body>\n\n<h:form>\n\n<h:commandLink\
  \ action=\"#{faqService.trigger}\"\n\nvalue=\"#{faqService.questionText}\" />\n\n\
  </h:form>\n\n<br />\n\n<h:outputText value=\"#{faqService.answerText}\" />\n\n</body>\n\
  \n</html>\n\n在 faq 包中创建 FAQService 类，如清单 7-2 所示。\n\n**清单 7-2.** *FAQService 类*\n\
