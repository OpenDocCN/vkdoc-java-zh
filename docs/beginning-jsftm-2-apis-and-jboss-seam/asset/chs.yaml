  \ 9-8 所示修改 `showdate.xhtml`。它表明，不仅 UI 输入组件可以使用转换器（关于转换器的回顾请参见第 2 章），UI 输出组件也可以使用转换器。前者在渲染和处理表单提交时都会使用转换器，而后者仅在渲染时使用。没有转换器时，UI\
  \ 输出组件会简单地在值上调用 `toString()` 将其转换为字符串。有了转换器，它就会被用来执行转换。但更重要的是，日期时间转换器会使用存储在 UI 视图根中的语言代码来格式化\
  \ `Date` 对象。将日期样式设置为 `long` 并非必需；这样做是为了让你能在日期显示中看到中文字符。\n\n**清单 9-8.** *为 UI 输出组件指定语言感知转换器*\n\
