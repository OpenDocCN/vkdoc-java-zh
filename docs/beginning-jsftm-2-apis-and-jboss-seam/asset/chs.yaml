  \ *强制用户登录的页面流程*\n\n要实现此效果，你需要提供一个保护“渲染响应”阶段的防火墙，如图 4-27 所示。该防火墙将检查 JSF 是否正在尝试渲染\
  \ confirm.xhtml 页面但当前没有 User 对象。如果 JSF 正在尝试此操作，防火墙会将视图 ID 更改为/login.xhtml；如果不是，则让\
  \ JSF 照常继续处理。\n\n第 4 章 ■ 创建电子商店\n\n**141**\n\n渲染响应\n\n否\n\n设置视图 ID\n\n视图 ID == /confirm\
  \ &&\n\n是\n\n=\n\n当前用户==null\n\n/login\n\n防火墙\n\n**图 4-27.** *保护渲染响应阶段的防火墙*\n\n\
  此类防火墙可以在 JSF 中作为阶段监听器实现。每当 JSF 进入某个阶段时，它都会收到通知。因此，在 shop 包中创建一个 ForceLoginPhaseListener\
  \ 类，如图 4-28 所示。\n\n**142**\n\n第 4 章 ■ 创建电子商店\n\npackage shop;\n\nimport javax.faces.application.Application;\n\
  \nimport javax.faces.application.ViewHandler;\n\nimport javax.faces.component.UIViewRoot;\n\
  \nimport javax.faces.context.FacesContext;\n\n它将在某个阶段之前和之后被调用。\n\n哪个阶段？它告诉 JSF 它只\n\
  \nimport javax.faces.event.PhaseEvent;\n\n对渲染响应阶段感兴趣：\n\nimport javax.faces.event.PhaseId;\n\
  \npublic class ForceLoginPhaseListener implements PhaseListener {\n\npublic PhaseId\
  \ getPhaseId() {\n\nreturn PhaseId.RENDER_RESPONSE;\n\n}\n\npublic void beforePhase(PhaseEvent\
  \ event) {\n\n即将渲染确认页面？\n\nFacesContext context = FacesContext.getCurrentInstance();\n\
  \nString viewId = context.getViewRoot().getViewId();\n\nif (viewId.equals(\"/confirm.xhtml\"\
  )) {\n\n没有 User 对象\n\nApplication app = context.getApplication();\n\n（未登录）？\n\n\
  UserHolder uh = (UserHolder) app.evaluateExpressionGet(context,\n\n\"#{uh}\", UserHolder.class);\n\
  \nif (uh.getCurrentUser() == null) {\n\nViewHandler viewHandler = app.getViewHandler();\n\
  \nUIViewRoot viewRoot = viewHandler.createView(context,\n\n\"/login.xhtml\");\n\n\
  context.setViewRoot(viewRoot);\n\n视图处理器是从 XHTML\n\n}\n\n文件中创建组件树的解析器。\n\n}\n\n这是视图\
  \ ID。\n\n}\n\npublic void afterPhase(PhaseEvent event) {\n\n要求视图处理器\n\n}\n\n从 login.XHTML\
  \ 文件\n\n}\n\n创建组件树。\n\n告诉 JSF 渲染此视图。\n\n**图 4-28.** *ForceLoginPhaseListener*\n\n\
  你需要在 faces-config.xml 中向 JSF 注册此阶段监听器（参见清单 4-40）。\n\n**清单 4-40.** *注册 ForceLoginPhaseListener*\n\
  \n<faces-config ...>\n\n**<lifecycle>**\n\n**<phase-listener>shop.ForceLoginPhaseListener</phase-listener>**\n\
  \n**</lifecycle>**\n\n第 4 章 ■ 创建电子商店\n\n**143**\n\n<navigation-rule>\n\n<from-view-id>/catalog.xhtml</from-view-id>\n\
  \n<navigation-case>\n\n<from-outcome>detail</from-outcome>\n\n<to-view-id>/detail.xhtml</to-view-id>\n\
  \n</navigation-case>\n\n</navigation-rule>\n\n...\n\n</faces-config>\n\n由于阶段监听器需要通过名称访问\
  \ UserHolder Web Bean，你需要为其指定一个名称（参见清单 4-41）。\n\n**清单 4-41.** *命名 UserHolder Web\
  \ Bean*\n\n...\n\n**@Named(\"uh\")**\n\n@SessionScoped\n\npublic class UserHolder\
  \ implements Serializable {\n\nprivate User currentUser;\n\npublic User getCurrentUser()\
  \ {\n\nreturn currentUser;\n\n}\n\npublic void setCurrentUser(User currentUser)\
  \ {\n\nthis.currentUser = currentUser;\n\n}\n\n}\n\n现在，你希望在不登录的情况下前往确认页面来测试进度。\n\
  \n但你刚刚登录不久，如何让应用程序忘记你已经登录？你可以等待，比如 30 分钟，让会话超时，但更快的方法是关闭浏览器并打开一个新浏览器。然后 JBoss 会将其视为新浏览器（因此是新用户和新会话）。\n\
  \n尝试一下，它应该会显示登录页面。但是，一旦用户登录，如何将其返回到正确的页面？你可以在重定向到登录页面之前将原始视图 ID 存储在 UserHolder Web\
  \ Bean 中，并让登录页面在成功登录后返回到该页面（参见清单 4-42、清单 4-43 和清单 4-44）。\n\n**144**\n\n\n\n第 4 章\
