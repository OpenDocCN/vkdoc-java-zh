  \ XHTML 文件放入类路径，而不是 WebContent 或 WEB-INF 中：它们被设计为打包到 JAR 文件中以便复用。\n\n**创建无需 taglib.xml\
  \ 的组件库**\n\n目前，你需要创建一个 taglib.xml 文件来定义标签库。然而，有一种更简单的方法。例如，让我们创建另一个包含相同 <pe> 标签的标签库。这种“简易”标签库不是通过\
  \ URL 标识，而是通过一个短名称来标识。我们将其命名为 bar。要创建它，只需在类路径中创建文件夹 META-INF/resources/bar。\n\n\
  为了定义 <pe> 标签，将 pe.xhtml 文件复制到该文件夹中，并按清单 5-27 所示进行修改。<composite:interface> 标签为\n\n\
  \n\n`<pe>` 标签，主要用于可视化工具。接着，`<composite:attribute>` 标签声明了 `<pe>` 标签接受一个名为 `product`\
  \ 的参数，其类型为 `custom.Product`，并且这是一个必需参数。最后，`<composite:implementation>` 标签扮演的角色类似于\
  \ `<ui:component>`，即它指明了组件的实际内容。\n\n**清单 5-27.** *定义 `<pe>` 标签*\n\n<!DOCTYPE html\
  \ PUBLIC \"- //W3C//DTD XHTML 1.0 Transitional//EN\"\n\n[\"http://www.w3.org/TR/xhtml1/DTD/xhtml1-\
  \ transitional.dtd\">](http://www.w3.org/TR/xhtml1/DTD/xhtml1-�transitional.dtd)\n\
  \n[<html](http://www.w3.org/1999/xhtml)\n\n[**>**](http://java.sun.com/jsf/composite)\n\
  \n<body>\n\n**<composite:interface name=\"pe\" displayName=\"Product Editor\">**\n\
  \n**<composite:attribute name=\"product\" type=\"custom.Product\" required=\"true\"\
  />**\n\n**</composite:interface>**\n\n**<composite:implementation>**\n\n<h:form>\n\
  \n<h:inputHidden value=\"#{product.id}\"/>\n\n<h:inputText value=\"#{product.name}\"\
  />\n\n<h:commandButton action=\"#{product.onUpdated}\" value=\"OK\"/>\n\n第 5 章 ■\
  \ 创建自定义组件\n\n**171**\n\n</h:form>\n\n**</composite:implementation>**\n\n</body>\n\
  \n</html>\n\n然而，在这样的组件中，参数仅在一个可通过 `compositeComponent.attrs` 访问的 Map 中可用（参见清单 5-28）。请注意如何在\
  \ EL 表达式中使用键来访问 Map 中的特定元素。\n\n**清单 5-28.** *在“简易”组件中访问 Map 中的参数*\n\n...\n\n<composite:implementation>\n\
  \n<h:form>\n\n**<h:inputHidden value=\"#{compositeComponent.attrs['product'].id}\"\
  />**\n\n**<h:inputText value=\"#{compositeComponent.attrs['product'].name}\"/>**\n\
  \n**<h:commandButton**\n\n**action=\"#{compositeComponent.attrs['product'].onUpdated}\"\
  \ .../>**\n\n</h:form>\n\n</composite:implementation>\n\n</body>\n\n</html>\n\n\
  要在 `p1.xhtml` 中使用 `bar` 标签库，你需要使用它的命名空间 URL。但它的 URL 是什么呢？因为它只有一个短名称，所以其 URL 总是根据短名称通过[此模式](http://java.sun.com/jsf/composite/)派生而来：`http://java.sun.com/jsf/composite/<短名称>`。在这种情况下，它是\
  \ `http://java.sun.com/jsf/composite/bar`。因此，请按清单 5-29 所示修改 `p1.xhtml`。\n\n**清单\
  \ 5-29.** *在 Bar 标签库中使用 `<pe>` 标签*\n\n<?xml version=\"1.0\" encoding=\"UTF- 8\"\
  \ ?>\n\n<!DOCTYPE html PUBLIC \"- //W3C//DTD XHTML 1.0 Strict//EN\"\n\n[\"http://www.w3.org/TR/xhtml1/DTD/xhtml1-\
  \ strict.dtd\">](http://www.w3.org/TR/xhtml1/DTD/xhtml1-�strict.dtd)\n\n[<html](http://www.w3.org/1999/xhtml)\n\
  \n[**>**](http://java.sun.com/jsf/composite/bar)\n\n<p>这是页面 1。</p>\n\n**<bar:pe\
  \ product=\"#{currentProduct}\"/>**\n\n<foo:pair>\n\n<ui:define name=\"left\">\n\
  \n<foo:pe product=\"#{currentProduct}\"/>\n\n**172**\n\n第 5 章 ■ 创建自定义组件\n\n</ui:define>\n\
  \n<ui:define name=\"right\">\n\n<foo:copyright company=\"Foo\"/>\n\n</ui:define>\n\
  \n</foo:pair>\n\n</html>\n\n现在，运行应用程序，它应该在 `pair` 外部显示一个新的产品编辑器。\n\n**总结**\n\n每当你在\
  \ XHTML 文件中看到重复的代码时，就应当考虑将这些重复代码提取到自定义组件中。如本章所学，要做到这一点，你可以通过将一个 `*.taglib.xml` 文件放入\
  \ `META-INF` 文件夹来定义一个标签库。\n\n对于每个标签，指定源 XHTML 文件，并将重复的代码放入该 XHTML 文件中。\n\n你还学习了如何向自定义标签传递参数。在树构建时，参数会被组织成一个变量表，源文件中的\
  \ EL 表达式会链接到该变量表。在渲染时，它们会追踪到变量表，以获取值作为 EL 表达式进行求值。\n\nEL 表达式只能求值为一个值/对象。它不能求值为一个方法。\n\
  \n要向自定义标签传递一个方法，请传递一个包含该方法的对象。\n\n你不能通过参数向自定义标签传递 XHTML 代码，并期望 JSF 解析该代码。要做到这一点，请将代码放入标签的主体中，或者如果你有多段代码，请使用\
  \ `<ui:define>`。自定义组件可以使用 `<ui:insert>` 追踪到代码中以构建子树。\n\n\n\n要在多个项目中复用自定义标签，你可以将\
  \ META-INF 文件夹导出为 JAR 文件并重复使用。\n\n最后，你了解到可以通过在类路径（`META-INF/resources`）上的特殊位置，使用标签库的短名称创建一个文件夹，从而无需使用\
  \ `taglib.xml` 文件即可创建标签库。该短名称也用于派生命名空间 URL。此类标签库中的组件会提供更多关于其参数的信息，供可视化工具使用。要访问它们的参数，组件需要在\
  \ EL 表达式中使用特殊名称从 `Map` 中获取。\n\n![图片 69](img/index-187_1.png)\n\n![图片 70](img/index-187_2.png)\n\
  \n第 6 章\n\n为页面提供通用布局\n\n**通**常，给定应用程序中的所有页面都需要具有统一的布局。\n\n在本章中，你将学习如何轻松地为应用程序中的所有页面应用通用布局。\n\
  \n**在不同页面上使用相同菜单**\n\n假设你想开发一个如图 6-1 所示的应用程序。该应用程序的功能并不重要。重要的是每个页面的左侧都有相同的菜单。\n\n\
  **图 6-1.** *所有页面左侧都有一个菜单。*\n\n为此，创建一个名为 `Layout` 的新动态 Web 项目。你将创建两个页面：`home.xhtml`\
  \ 和 `products.xhtml`。图 6-2 显示了这些页面的结构。\n\n你可以看到，XHTML 页面结构相同，唯一的区别是右侧单元格的内容。\n\n\
