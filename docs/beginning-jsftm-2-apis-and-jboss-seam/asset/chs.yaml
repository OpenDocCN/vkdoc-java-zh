  \n**创建可复用组件库**\n\n假设你想在多个项目中使用到目前为止创建的自定义标签。显然，将 foo.taglib.xml 和源 XHTML 文件复制到多个项目中是一个糟糕的主意，因为如果以后需要修复其中某个文件的错误，你将不得不为每个项目都执行一次修复。为了解决这个问题，你可以将\
  \ META-INF 文件夹打包成一个 JAR 文件，并在多个项目中复用（见图 5-14）。\n\nHello\n\nCustomComp\n\nWebContent\n\
  \nsrc\n\nWEB-INF\n\nMETA-INF\n\nlib\n\nfoo.taglib.xml\n\nbox.xhtml\n\nfoo.jar\n\n\
  ...\n\nfoo.jar\n\n**图 5-14.** *创建组件库*\n\n![Image 68](img/index-183_1.png)\n\n第 5\
  \ 章 ■ 创建自定义组件\n\n**169**\n\n为此，像往常一样创建一个名为 CompUser 的新项目。然后右键单击 CustomComp 项目中的\
  \ META-INF 文件夹，选择“导出”。接着选择 Java ➤ JAR 文件。点击“浏览”将 JAR 文件保存为 foo.jar，并放置在 CompUser\
  \ 项目的 WEB-INF/lib 文件夹中（见图 5-15）。\n\n**图 5-15.** *导出 JAR 文件*\n\n在 CompUser 项目中，于\
  \ WebContent 文件夹内创建一个 p2.xhtml 文件（代表“页面 2”），并尝试使用清单 5-26 中所示的自定义标签。\n\n**清单 5-26.**\
  \ *在另一个项目中使用自定义标签*\n\n<?xml version=\"1.0\" encoding=\"UTF- 8\" ?>\n\n<!DOCTYPE\
