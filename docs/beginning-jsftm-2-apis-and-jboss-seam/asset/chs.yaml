  \n**图 10-9.** *注入不存在的组件时收到的错误* 图 10-9 中的异常被抛出，是因为当 Seam 尝试将 productHome 组件注入到 cart\
  \ 组件时，发现不存在这样的 productHome 组件。\n\n为什么？因为 ProductHome 类扩展了 EntityHome 类（由 JBoss 提供），而\
  \ EntityHome 类处于会话作用域。然而，应用程序并未启动长时间运行的会话，因此当“添加到购物车”按钮被提交时，productHome 组件将不复存在。\n\
  \n当被注入的组件不存在时会发生什么？如果该组件在 EL 表达式中被引用，Seam 会创建它。但当被注入的组件被另一个 Seam 组件引用时，Seam 将直接抛出异常。\n\
  \n简单地再次创建一个新的 productHome 组件并不能解决该异常，因为该组件将丢失产品 ID。图 10-10 展示了一种解决方案：当\n\n<s:button>\
  \ 生成 URL（以调用 cart.xhtml 页面）时，它会从 productHome 组件中读取产品 ID，并将该 ID 存储到 URL 的查询参数中。\n\
  \n当用户点击“添加到购物车”按钮时，Seam 会拦截该请求，注意到它正在加载 cart.xhtml 页面，读取该查询参数，并将产品 ID 存储到（新的）productHome\
  \ 组件中。\n\n**272**\n\n第 10 章 ■ 使用 JBOSS Seam\n\n2: 将 productId=123 添加为\n\n1: 读取产品\
  \ ID，\n\n一个查询参数。\n\nSeam\n\n例如 123。\n\nproduct\n\n按钮\n\nHome\n\n<input onclick=\"\
  go to URL\" ...>\n\n5: 将 123 存储到新的\n\n\n\n\"productHome\" 组件。\n\nproduct\n\nHome\n\
  \nRequest\n\nSeam\n\nproductId: 123\n\n4: 读取查询参数\n\n3: 按钮被点击，并携带查询参数发送请求。\n\n**图\
  \ 10-10.** *使用查询参数维护产品 ID*\n\n要实现这个想法，请在 cart.xhtml 页面（位于 view 文件夹中）旁边创建 cart.page.xml\
  \ 文件。其内容如清单 10-13 所示。关键在于 `<param>` 标签。它在生成 URL 时被 `<s:button>` 读取，在处理请求时被 Seam\
  \ 读取。前者读取 EL 表达式并将结果存储到指定的查询参数中。后者则相反：它读取指定的查询参数并将结果存储到 EL 表达式中。\n\n**清单 10-13.**\
  \ *使用 `<param>` 通过查询参数维护产品 ID*\n\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n\n\
