  你不需要完全理解这段代码的含义，但基本上，它用于让 RichFaces 拦截请求，以便将 JavaScript 传递到浏览器。\n\n接下来，按图 7-5 所示修改\
  \ `listfaq.xhtml`。简而言之，`<a4j:commandLink>` 的使用方式与普通的 `<h:commandLink>` 类似，但它会在 HTML\
  \ 链接的 `onclick` 属性中生成一些 JavaScript。这些 JavaScript 会调用服务器端的操作方法，然后重新渲染其 `reRender`\
  \ 属性中指定的组件。\n\n[<html](http://www.w3.org/1999/xhtml)\n\n[**>**](http://richfaces.org/a4j)\n\
  \n**<head>\n\n在 Ajax4Jsf 标签库中使用 <commandLink>。\n\n<meta http-equiv=\"Content-Type\"\
  \ content=\"text/html; charset=UTF-8\" />\n\n<title>在此处插入标题</title>\n\n<a onclick=\"\
  some Javascript\">如何...</a>\n\n</head>\n\n1: 它会将 onclick\n\n<body>\n\n事件处理程序设置为某些\n\
  \n<h:form>\n\nJavaScript。\n\n2: 如果被点击，它会调用\n\n此 trigger() 方法在\n\n< **a4j**:commandLink\
  \ action=\"#{faqService.trigger}\"\n\n服务器端。\n\nvalue=\"#{faqService.questionText}\"\
  \n\n**reRender=\"a\"** />\n\n</h:form>\n\n<br />\n\n3: 然后，仅要求此 \"a\" 组件重新渲染。\n\n\
  <h:outputText value=\"#{faqService.answerText}\" **id=\"a\"** />\n\n</body>\n\n\
  </html>\n\n**图 7-5.** *使用 <a4j:commandLink>*\n\n运行应用程序时，点击问题会改变答案的显示形式，而此时浏览器中不会显示进度条，这表明整个页面并未刷新。\n\
  \n**隐藏和显示答案**\n\n假设现在你不想改变答案的显示形式，而是希望隐藏或显示答案。为简单起见，我们先在不使用 Ajax 的情况下实现。按清单 7-5\
  \ 所示修改 `listfaq.xhtml`。\n\n**190**\n\n第 7 章 ■ 使用 Ajax 构建交互式页面\n\n**清单 7-5.** *使用\
  \ rendered 属性*\n\n<!DOCTYPE html PUBLIC \"-//W3C//DTD XHTML 1.0 Strict//EN\"\n\n\
  [\"http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd\">](http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd)\n\
  \n[<html](http://www.w3.org/1999/xhtml)\n\n[>](http://richfaces.org/a4j)\n\n<head>\n\
  \n<meta http-equiv=\"Content-Type\" content=\"text/html; charset=UTF-8\" />\n\n\
  <title>在此处插入标题</title>\n\n</head>\n\n<body>\n\n<h:form>\n\n**<h:commandLink**\n\n\
  action=\"#{faqService.trigger}\"\n\nvalue=\"#{faqService.questionText}\" />\n\n\
  </h:form>\n\n<br />\n\n<h:outputText value=\"#{faqService.answerText}\" id=\"a\"\
  \n\n**rendered=\"#{faqService.showingAnswer}\"/>**\n\n</body>\n\n</html>\n\n\n\n\
  这个渲染属性（rendered attribute）有什么作用？当 UI 输出组件准备在“渲染响应”阶段进行渲染时，它会检查这个属性。在这种情况下，它会调用 Web\
  \ Bean 上的 `isShowingAnswer()` 方法。如果 `isShowingAnswer()` 返回 `true`，它就会继续渲染自身。否则，它将不执行任何操作。为了使其正常工作，请按照清单\
  \ 7-6 所示修改 Web Bean。\n\n**清单 7-6.** *在 Web Bean 中显示或隐藏答案*\n\npackage faq;\n\n...\n\
  \n@Named(\"faqService\")\n\n@SessionScoped\n\npublic class FAQService implements\
  \ Serializable {\n\nprivate String questionText = \"How to run Eclipse?\";\n\n**private\
  \ String answerText = \"Double- click its icon.\";**\n\n**private boolean isShowingAnswer\
  \ = false;**\n\npublic String getQuestionText() {\n\n第 7 章 ■ 使用 Ajax 构建交互式页面\n\n\
  **191**\n\nreturn questionText;\n\n}\n\npublic String getAnswerText() {\n\n**return\
  \ answerText;**\n\n}\n\npublic String trigger() {\n\n**isShowingAnswer = !isShowingAnswer;**\n\
  \nreturn null;\n\n}\n\n**public boolean isShowingAnswer() {**\n\n**return isShowingAnswer;**\n\
  \n**}**\n\n}\n\n当你运行应用程序时，点击问题应该能够显示和隐藏答案。当然，现在整个页面都会刷新，因为没有使用 Ajax。\n\n**使用 Ajax\
  \ 隐藏或显示答案**\n\n现在，你希望使用 Ajax 来隐藏或显示答案，而无需刷新整个页面。首次尝试如清单 7-7 所示。\n\n**清单 7-7.** *尝试使用\
  \ Ajax 更改组件的可见性*\n\n<!DOCTYPE ...>\n\n[<html](http://www.w3.org/1999/xhtml)\n\n\
  [>](http://richfaces.org/a4j)\n\n<head>\n\n<meta http-equiv=\"Content- Type\" content=\"\
  text/html; charset=UTF- 8\" />\n\n<title>在此处插入标题</title>\n\n</head>\n\n<body>\n\n\
  <h:form>\n\n**<a4j:commandLink**\n\naction=\"#{faqService.trigger}\"\n\nvalue=\"\
  #{faqService.questionText}\"\n\n**reRender=\"a\" />**\n\n</h:form>\n\n<br />\n\n\
  **192**\n\n第 7 章 ■ 使用 Ajax 构建交互式页面\n\n<h:outputText value=\"#{faqService.answerText}\"\
  \ id=\"a\"\n\n**rendered=\"#{faqService.showingAnswer}\"/>**\n\n</body>\n\n</html>\n\
  \n如果你运行它，最初不会显示任何答案，这是正确的行为。然而，如果你点击链接，似乎什么也没有发生。这是因为当 UI 输出组件最初准备渲染时，`rendered`\
  \ 属性为 `false`，因此它不会输出任何 HTML 元素（见图 7-6）。结果，`onclick` JavaScript 将无法找到在后续 Ajax 操作中需要更新的\
  \ HTML 元素。\n\n**...**\n\n**<h:form>**\n\n**<h:commandLink .../>**\n\n**</h:form>**\n\
  \n**<br />**\n\n**<h:outputText value=\"...\" id=\"a\" />**\n\n**<html>**\n\n**...**\n\
  \n**<a onclick=\"some JavaScript\">How to...</a>**\n\n**<br/>**\n\n**...**\n\n1:\
  \ 开始时，由于 rendered 属性为 false，\n\n**</html>**\n\n它不会生成任何 HTML 元素。\n\n2: 当 UI 输出在 Ajax\
  \ 操作期间被刷新时，\n\n3: JavaScript 将使用客户端 ID 查找\n\n它会像往常一样输出一个带有客户端 ID 的 `<span>`。\n\n\
  现有的 HTML 元素，但会找不到任何元素！\n\n**<span id=\"a\">Double-click its icon.</span>**\n\n**图\
  \ 7-6.** *为什么 Ajax 无法显示组件*\n\n为了解决这个问题，你可以在答案周围放置一个面板，并使用 Ajax 来更新这个面板（见图 7-7）。简单来说，由面板生成的\
  \ HTML `<span>` 元素将始终存在。它的主体可能不包含任何内容（如果答案被隐藏），或者包含答案（如果答案被显示）。由于它始终存在，你可以使用 Ajax\
  \ 来更新它。\n\n第 7 章 ■ 使用 Ajax 构建交互式页面\n\n**193**\n\n包含答案的面板。\n\n最初，答案没有 HTML 代码。\n\n\
  <span id=\"p\"></span>\n\n<span id=\"p\">\n\n<span id=\"a\">Double-click its icon.</span>\n\
  \n更新整个\n\n</span>\n\n面板。\n\n<span id=\"p\">\n\n<span id=\"a\">Double-click its icon.</span>\n\
  \n</span>\n\n<span id=\"p\"></span>\n\n更新整个\n\n面板。\n\n<span id=\"p\"></span>\n\n\
  **图 7-7.** *使用面板显示或隐藏组件*\n\n为了实现这个想法，请按照清单 7-8 所示修改 `listfaq.xhtml`。\n\n**清单 7-8.**\
  \ *在 listfaq.xhtml 中刷新整个面板组*\n\n<!DOCTYPE ...>\n\n[<html](http://www.w3.org/1999/xhtml)\n\
  \n[>](http://richfaces.org/a4j)\n\n<head>\n\n<meta http-equiv=\"Content- Type\"\
  \ content=\"text/html; charset=UTF- 8\" />\n\n\n\n<title>在此处插入标题</title>\n\n</head>\n\
  \n![图片 75](img/index-208_1.png)\n\n**194**\n\n第 7 章 ■ 使用 Ajax 构建交互式页面\n\n<body>\n\
  \n<h:form>\n\n<a4j:commandLink action=\"#{faqService.trigger}\"\n\nvalue=\"#{faqService.questionText}\"\
  \n\n**reRender=\"p\" />**\n\n</h:form>\n\n<br />\n\n**<h:panelGroup id=\"p\">**\n\
  \n<h:outputText value=\"#{faqService.answerText}\" id=\"a\"\n\nrendered=\"#{faqService.showingAnswer}\"\
  />\n\n**</h:panelGroup>**\n\n</body>\n\n</html>\n\n现在运行应用程序时，点击问题将使用 Ajax 显示或隐藏答案。\n\
  \n**为问题评分**\n\n假设你希望允许用户对问题（及其答案）的有用性进行评分。最新的评分会显示在问题的末尾，如图 7-8 所示。\n\n同样，你不想刷新整个页面，而只想刷新问题本身。这类似于点击<a4j:commandLink>来更新答案，区别在于现在需要处理一些用户输入（评分）。\n\
  \n点击按钮将刷新问题。\n\n**图 7-8.** *获取并显示来自用户的评分*\n\n第 7 章 ■ 使用 Ajax 构建交互式页面\n\n**195**\n\
  \n为此，你可以使用如图 7-9 所示的<a4j:commandButton>。简单来说，<a4j:commandButton>与<a4j:commandLink>类似，只是它会将自己渲染为\
  \ HTML 按钮而非 HTML 链接。\n\n...\n\n<h:form>\n\n<a4j:commandLink action=\"#{faqService.trigger}\"\
  \n\nvalue=\"#{faqService.questionText} **(#{faqService.rating})**\" reRender=\"\
  p\"\n\n**id=\"q\" />** 这只是普通的 HTML 操作，用于将表单放置到右侧。 这部分只是字面量表达式，将原样输出。 再次出现字面量表达式。\n\
  \n</h:form>\n\n**<h:form style=\"float:right\">**\n\n**<h:inputText size=\"2\" value=\"\
  #{faqService.rating}\"></h:inputText>** 刷新问题。\n\n**<a4j:commandButton value=\"评分\"\
  \ action=\"#{faqService.rate}\"**\n\n**reRender=\"q\">**\n\n**</a4j:commandButton>**\n\
  \n**</h:form>**\n\n来自 Ajax4Jsf 标签库的<commandButton>。\n\n它会在 HTML 提交按钮的 onclick 处理程序中插入\
  \ JavaScript。\n\n<br />\n\n<h:panelGroup id=\"p\">\n\n<h:outputText value=\"#{faqService.answerText}\"\
  \ id=\"a\"\n\nrendered=\"#{faqService.showingAnswer}\" />\n\n</h:panelGroup>\n\n\
  </body>\n\n</html>\n\n**图 7-9.** *使用<a4j:commandButton>*\n\n修改 FAQService 类，如清单\
  \ 7-9 所示。\n\n**清单 7-9.** *在 FAQService 中维护评分*\n\n@Named(\"faqService\")\n\n@SessionScoped\n\
  \npublic class FAQService implements Serializable {\n\nprivate String questionText\
  \ = \"如何运行 Eclipse？\";\n\nprivate String answerText = \"双击其图标。\";\n\nprivate boolean\
  \ isShowingAnswer = false;\n\n**private int rating = 0;**\n\n**196**\n\n第 7 章 ■\
  \ 使用 Ajax 构建交互式页面\n\npublic String getQuestionText() {\n\nreturn questionText;\n\
  \n}\n\npublic String getAnswerText() {\n\nreturn answerText;\n\n}\n\npublic String\
  \ trigger() {\n\nisShowingAnswer = !isShowingAnswer;\n\nreturn null;\n\n}\n\npublic\
  \ boolean isShowingAnswer() {\n\nreturn isShowingAnswer;\n\n}\n\n**public String\
  \ rate() {**\n\n**System.out.println(\"将评分设置为：\" + rating);**\n\n**return null;**\n\
  \n**}**\n\n**public int getRating() {**\n\n**return rating;**\n\n**}**\n\n**public\
  \ void setRating(int rating) {**\n\n**this.rating = rating;**\n\n**}**\n\n}\n\n\
  现在运行应用程序，你应该能够为问题评分。\n\n如果用户输入了无效内容（例如“abc”）作为评分，该怎么办？此时应显示错误信息。为此，首先尝试修改 listfaq.xhtml，如清单\
  \ 7-10 所示。注意如何在 reRender 属性中刷新两个（或更多）组件：只需用逗号作为分隔符列出它们的 ID。\n\n第 7 章 ■ 使用 Ajax 构建交互式页面\n\
  \n**197**\n\n**清单 7-10.** *同时刷新问题和<h:messages>*\n\n<!DOCTYPE ...>\n\n[<html](http://www.w3.org/1999/xhtml)\n\
  \n[>](http://richfaces.org/a4j)\n\n<head>\n\n<meta http-equiv=\"Content-Type\" content=\"\
  text/html; charset=UTF-8\" />\n\n<title>在此处插入标题</title>\n\n</head>\n\n<body>\n\n\
  **<h:messages id=\"m\"/>**\n\n<h:form>\n\n<a4j:commandLink action=\"#{faqService.trigger}\"\
  \n\nvalue=\"#{faqService.questionText} (#{faqService.rating})\" reRender=\"p\"\n\
  \nid=\"q\" />\n\n</h:form>\n\n<h:form style=\"float:right\">\n\n<h:inputText size=\"\
  2\" value=\"#{faqService.rating}\"></h:inputText>\n\n\n\n<a4j:commandButton value=\"\
  评分\" action=\"#{faqService.rate}\"\n\n**reRender=\"q,m\">**\n\n</a4j:commandButton>\n\
  \n</h:form>\n\n<br />\n\n<h:panelGroup id=\"p\">\n\n<h:outputText value=\"#{faqService.answerText}\"\
  \ id=\"a\"\n\nrendered=\"#{faqService.showingAnswer}\" />\n\n</h:panelGroup>\n\n\
  </body>\n\n</html>\n\n然而，这样是行不通的，因为如果没有错误消息，UI Messages 组件根本不会生成任何 HTML 代码。这意味着后续的\
  \ Ajax 操作将无法找到要更新的 HTML 元素。为了解决这个问题，请将该 UI Messages 组件放入一个面板中，然后更新该面板（参见清单 7-11）。\n\
  \n**198**\n\n第 7 章 ■ 使用 Ajax 构建交互式页面\n\n**清单 7-11.** *将 <h:messages> 放入面板中*\n\n\
  <!DOCTYPE ...>\n\n[<html](http://www.w3.org/1999/xhtml)\n\n[>](http://richfaces.org/a4j)\n\
  \n<head>\n\n<meta http-equiv=\"Content-Type\" content=\"text/html; charset=UTF-8\"\
  \ />\n\n<title>在此处插入标题</title>\n\n</head>\n\n<body>\n\n**<h:panelGroup id=\"mp\"\
  >**\n\n<h:messages id=\"m\"/>\n\n**</h:panelGroup>**\n\n<h:form>\n\n<a4j:commandLink\
  \ action=\"#{faqService.trigger}\"\n\nvalue=\"#{faqService.questionText} (#{faqService.rating})\"\
  \ reRender=\"p\"\n\nid=\"q\" />\n\n</h:form>\n\n<h:form style=\"float:right\">\n\
  \n<h:inputText size=\"2\" value=\"#{faqService.rating}\"></h:inputText>\n\n<a4j:commandButton\
  \ value=\"评分\" action=\"#{faqService.rate}\"\n\n**reRender=\"q,mp\">**\n\n</a4j:commandButton>\n\
  \n</h:form>\n\n<br />\n\n<h:panelGroup id=\"p\">\n\n<h:outputText value=\"#{faqService.answerText}\"\
  \ id=\"a\"\n\nrendered=\"#{faqService.showingAnswer}\" />\n\n</h:panelGroup>\n\n\
  </body>\n\n</html>\n\n现在，当你运行应用程序并输入一些无效内容作为评分时，它应该会被捕获为错误。\n\n第 7 章 ■ 使用 Ajax 构建交互式页面\n\
  \n**199**\n\n**在用户输入时更新评分**\n\n如果你希望在用户输入时（甚至在使用“评分”按钮之前）就更新评分，该怎么办？\n\n你可以按照图 7-10\
  \ 所示的方式实现。总之，`<a4j:support>` 标签与 `<a4j:commandLink>` 标签类似，不同之处在于你可以指定 JavaScript\
  \ 事件的名称，以控制何时触发 Ajax 操作。\n\n...\n\n<h:panelGroup id=\"mp\">\n\n<h:messages id=\"\
  m\" />\n\n</h:panelGroup>\n\n<h:form>\n\n<a4j:commandLink action=\"#{faqService.trigger}\"\
  \n\nvalue=\"#{faqService.questionText} (#{faqService.rating})\"\n\nreRender=\"p\"\
  \ id=\"q\" />\n\n</h:form>\n\n<h:form style=\"float:right\">\n\n<h:inputText size=\"\
  2\" value=\"#{faqService.rating}\">\n\n**<a4j:support**\n\n每当按键弹起时...\n\n<a4j:s\
  \ **event=\"onkeyup\"**\n\nupport> 会向\n\n调用此服务器端动作方法。\n\n其父组件生成的\n\n**action=\"\
  #{faqService.rate}\"**\n\n`<input>` HTML 元素\n\n添加 JavaScript。\n\n**reRender=\"q,mp\"\
  >**\n\n刷新问题和消息面板。\n\n**</a4j:support>**\n\n</h:inputText>\n\n<a4j:commandButton\
  \ value=\"评分\" action=\"#{faqService.rate}\"\n\nreRender=\"q,mp\">\n\n</a4j:commandButton>\n\
  \n你不再需要“评分”按钮了。\n\n</h:form>\n\n<br />\n\n<h:panelGroup id=\"p\">\n\n<h:outputText\
  \ value=\"#{faqService.answerText}\" id=\"a\"\n\nrendered=\"#{faqService.showingAnswer}\"\
  \ />\n\n</h:panelGroup>\n\n</body>\n\n</html>\n\n**图 7-10.** *使用 <a4j:support>*\n\
  \n![图片 76](img/index-214_1.png)\n\n**200**\n\n第 7 章 ■ 使用 Ajax 构建交互式页面\n\n现在，当你运行应用程序并输入某个值作为评分时，该值应该会立即出现在问题文本之后。\n\
  \n**使用对话框获取评分**\n\n假设你想要显示一个对话框来获取评分：用户点击一个“评分”链接，弹出一个对话框，然后用户可以在其中输入评分（见图 7-11），并点击“评分”按钮关闭对话框。最后，问题的评分将被刷新。\n\
  \n点击链接将弹出此对话框。\n\n点击按钮将关闭对话框并更新评分。\n\n**图 7-11.** *使用对话框*\n\n为此，请按照图 7-12 所示修改 `listfaq.xhtml`。简单来说，`<rich:modalPanel>`\
  \ 标签会创建一个模态面板，该面板在 HTML 页面上初始是隐藏的。\n\n第 7 章 ■ 使用 Ajax 构建交互式页面\n\n**201**\n\n<!DOCTYPE\
  \ ...>\n\n[<html](http://www.w3.org/1999/xhtml)\n\n[**>**](http://richfaces.org/rich)\n\
  \n**...\n\n<h:panelGroup id=\"mp\">\n\n<h:messages id=\"m\" />\n\n</h:panelGroup>\n\
  \n<h:form>\n\n\n\n<a4j:commandLink action=\"#{faqService.trigger}\"\n\nvalue=\"\
  #{faqService.questionText} (#{faqService.rating})\"\n\nreRender=\"p\" id=\"q\" />\n\
  \n对话框被称为模态面板。最初，\n\n</h:form>\n\n它在 HTML 页面中处于隐藏状态，位于\n\n**<rich:modalPanel id=\"\
  myDialog\">**\n\n浏览器中。\n\n它位于 RichFaces 的 \"rich\" 标签库中。\n\n<h:form style=\"float:right\"\
  >\n\n<h:inputText size=\"2\" value=\"#{faqService.rating}\"/>\n\n**<a4j:commandButton**\n\
  \n**value=\"Rate\"**\n\n再次使用按钮。\n\naction=\"#{faqService.rate}\"\n\n这里的所有内容都将\n\n\
  reRender=\"q,mp\">\n\n显示在模态面板中。\n\n**</a4j:commandButton>**\n\n</h:form>\n\n**</rich:modalPanel>**\n\
  \n<br />\n\n<h:panelGroup id=\"p\">\n\n<h:outputText value=\"#{faqService.answerText}\"\
  \ id=\"a\"\n\nrendered=\"#{faqService.showingAnswer}\" />\n\n</h:panelGroup>\n\n\
  </body>\n\n</html>\n\n**图 7-12.** *使用 <rich:modalPanel>*\n\n但是，如何显示模态面板，以及之后如何隐藏它？这*不是*通过\
  \ Ajax 完成的。相反，它是使用 JavaScript 完成的（参见清单 7-12）。请注意 <a4j:button> 的 oncomplete 属性。它指定了一段\
  \ JavaScript，将在浏览器中更新 HTML 元素后执行。在这里，你将隐藏模态面板。\n\n**清单 7-12.** *显示和隐藏模态面板*\n\n...\n\
  \n<h:panelGroup id=\"mp\">\n\n<h:messages id=\"m\" />\n\n</h:panelGroup>\n\n**202**\n\
  \n第 7 章 ■ 使用 Ajax 构建交互式页面\n\n<h:form>\n\n<a4j:commandLink action=\"#{faqService.trigger}\"\
  \n\nvalue=\"#{faqService.questionText} (#{faqService.rating})\"\n\nreRender=\"p\"\
  \ id=\"q\" />\n\n**<a href=\"javascript:Richfaces.showModalPanel('myDialog')\">评分</a>**\n\
  \n</h:form>\n\n<rich:modalPanel id=\"myDialog\">\n\n<h:form style=\"float:right\"\
  >\n\n<h:inputText size=\"2\" value=\"#{faqService.rating}\"/>\n\n<a4j:button\n\n\
  value=\"评分\"\n\naction=\"#{faqService.rate}\"\n\nreRender=\"q,mp\"\n\n**oncomplete=\"\
  Richfaces.hideModalPanel('myDialog')\">**\n\n</a4j:button>\n\n</h:form>\n\n</rich:modalPanel>\n\
  \n<br />\n\n<h:panelGroup id=\"p\">\n\n<h:outputText value=\"#{faqService.answerText}\"\
  \ id=\"a\"\n\nrendered=\"#{faqService.showingAnswer}\" />\n\n</h:panelGroup>\n\n\
  </body>\n\n</html>\n\n现在运行应用程序并点击“评分”链接，它应该会弹出模态面板，并且你应该能够输入评分。但是，如果用户输入了无效内容并点击“评分”按钮，代码将继续执行并关闭模态面板，然后在主页面显示错误。更恰当的行为是在模态面板中显示错误，并且不关闭它。为此，请按清单\
  \ 7-13 所示修改代码。你所做的是将面板组移动到模态面板中，并在隐藏模态面板之前检查是否没有错误消息（使用名为 getElementById 的 JavaScript\
  \ 函数）。\n\n**清单 7-13.** *仅在无错误时隐藏模态面板*\n\n<!DOCTYPE ...>\n\n[<html](http://www.w3.org/1999/xhtml)\n\
  \n[>](http://richfaces.org/rich)\n\n第 7 章 ■ 使用 Ajax 构建交互式页面\n\n**203**\n\n<head>\n\
  \n<meta http-equiv=\"Content- Type\" content=\"text/html; charset=UTF- 8\" />\n\n\
  <title>在此处插入标题</title>\n\n</head>\n\n<body>\n\n<h:form>\n\n<a4j:commandLink action=\"\
  #{faqService.trigger}\"\n\nvalue=\"#{faqService.questionText} (#{faqService.rating})\"\
  \n\nreRender=\"p\" id=\"q\" />\n\n<a href=\"javascript:Richfaces.showModalPanel('myDialog')\"\
  >评分</a>\n\n</h:form>\n\n<rich:modalPanel id=\"myDialog\">\n\n**<h:panelGroup id=\"\
  mp\">**\n\n**<h:messages id=\"m\" />**\n\n**</h:panelGroup>**\n\n<h:form style=\"\
  float:right\">\n\n<h:inputText size=\"2\" value=\"#{faqService.rating}\"/>\n\n<a4j:commandButton\n\
  \nvalue=\"评分\"\n\naction=\"#{faqService.rate}\"\n\nreRender=\"q,mp\"\n\n**oncomplete=\"\
  if (document.getElementById('m')==null)**\n\n**Richfaces.hideModalPanel('myDialog')\"\
  >**\n\n</a4j:commandButton>\n\n</h:form>\n\n</rich:modalPanel>\n\n<br />\n\n<h:panelGroup\
  \ id=\"p\">\n\n<h:outputText value=\"#{faqService.answerText}\" id=\"a\"\n\nrendered=\"\
  #{faqService.showingAnswer}\" />\n\n</h:panelGroup>\n\n</body>\n\n</html>\n\n现在运行应用程序，并尝试输入一些无效的评分值。模态面板中应显示一条错误消息，并且模态面板应保持显示状态。\n\
  \n\n\n最后，你可能希望为模态面板添加一个标题栏，以便用户可以通过拖拽来移动它。这可以通过为其添加一个名为“header”的面（facet）来实现（列表 7-14）。此外，你可能希望将其初始大小设置为较小的尺寸，例如\
  \ 200 像素 ✕ 140 像素。\n\n**204**\n\n第 7 章 ■ 使用 Ajax 构建交互式页面\n\n**列表 7-14.** *为模态面板添加标题并设置其初始大小*\n\
  \n...\n\n<h:form>\n\n<a4j:commandLink action=\"#{faqService.trigger}\"\n\nvalue=\"\
  #{faqService.questionText} (#{faqService.rating})\"\n\nreRender=\"p\" id=\"q\" />\n\
  \n<a href=\"javascript:Richfaces.showModalPanel('myDialog')\">评分</a>\n\n</h:form>\n\
  \n**<rich:modalPanel id=\"myDialog\" width=\"200\" height=\"140\">**\n\n**<f:facet\
  \ name=\"header\">**\n\n**<h:outputText value=\"输入评分\"></h:outputText>**\n\n**</f:facet>**\n\
  \n<h:panelGroup id=\"mp\">\n\n<h:messages id=\"m\" />\n\n</h:panelGroup>\n\n<h:form\
  \ style=\"float:right\">\n\n<h:inputText size=\"2\" value=\"#{faqService.rating}\"\
  />\n\n<a4j:commandButton\n\nvalue=\"评分\"\n\naction=\"#{faqService.rate}\"\n\nreRender=\"\
  q,mp\"\n\noncomplete=\"if (document.getElementById('m')==null)\n\nRichfaces.hideModalPanel('myDialog')\"\
  >\n\n</a4j:commandButton>\n\n</h:form>\n\n**</rich:modalPanel>**\n\n<br />\n\n<h:panelGroup\
  \ id=\"p\">\n\n<h:outputText value=\"#{faqService.answerText}\" id=\"a\"\n\nrendered=\"\
  #{faqService.showingAnswer}\" />\n\n</h:panelGroup>\n\n</body>\n\n</html>\n\n运行应用程序，你会看到模态面板现在有了标题，并且大小也正确了。\n\
  \n**使用皮肤设置外观和感觉**\n\n所有 RichFaces 组件都支持所谓的皮肤。例如，一个名为 s1 的特定皮肤可能定义如表 7-1 所示。\n\n\
  第 7 章 ■ 使用 Ajax 构建交互式页面\n\n**205**\n\n**表 7-1.** *皮肤的定义*\n\n**属性**\n\n**值**\n\n\
  文本字体\n\nArial\n\n文本颜色\n\n蓝色\n\n文本大小\n\n12pt\n\n背景颜色\n\n黄色\n\nRichFaces 自带多个预定义的皮肤。它们分别名为\
  \ blueSky、classic、deepMarine 等。要选择使用哪一个，请使用 web.xml，如列表 7-15 所示。\n\n**列表 7-15.**\
  \ *选择要使用的皮肤*\n\n<web-app ...>\n\n...\n\n**<context- param>**\n\n**<param-name>org.richfaces.SKIN</param-\
  \ name>**\n\n**<param-value>blueSky</param- value>**\n\n**</context- param>**\n\n\
  ...\n\n</web-app>\n\n此外，默认情况下，所选皮肤也会应用于由普通 JSF 组件生成的与输入相关的 HTML 元素，例如 `<a>` 或 `<input>`。但是，它不会应用于其他元素，例如\
  \ `<span>`。为了确保整个页面都使用该皮肤，请将所有内容分组到一个 `<rich:panel>` 中，如列表 7-16 所示。这样，该面板内的所有内容都将继承其\
  \ CSS 样式。\n\n**列表 7-16.** *将所有内容分组到 <rich:panel> 中*\n\n<!DOCTYPE ...>\n\n[<html](http://www.w3.org/1999/xhtml)\n\
  \n[**>**](http://richfaces.org/rich)\n\n<head>\n\n<meta http-equiv=\"Content- Type\"\
  \ content=\"text/html; charset=UTF- 8\" />\n\n<title>在此处插入标题</title>\n\n</head>\n\
  \n<body>\n\n**<rich:panel>**\n\n**206**\n\n第 7 章 ■ 使用 Ajax 构建交互式页面\n\n<h:form>\n\
  \n<a4j:commandLink action=\"#{faqService.trigger}\"\n\nvalue=\"#{faqService.questionText}\
  \ (#{faqService.rating})\"\n\nreRender=\"p\" id=\"q\" />\n\n<a href=\"javascript:Richfaces.showModalPanel('myDialog')\"\
  >评分</a>\n\n</h:form>\n\n<rich:modalPanel id=\"myDialog\" width=\"200\" height=\"\
  140\">\n\n<f:facet name=\"header\">\n\n<h:outputText value=\"输入评分\"></h:outputText>\n\
  \n</f:facet>\n\n<h:panelGroup id=\"mp\">\n\n<h:messages id=\"m\" />\n\n</h:panelGroup>\n\
  \n<h:form style=\"float:right\">\n\n<h:inputText size=\"2\" value=\"#{faqService.rating}\"\
  />\n\n<a4j:commandButton\n\nvalue=\"评分\"\n\naction=\"#{faqService.rate}\"\n\nreRender=\"\
  q,mp\"\n\noncomplete=\"if (document.getElementById('m')==null)\n\nRichfaces.hideModalPanel('myDialog')\"\
  >\n\n</a4j:commandButton>\n\n</h:form>\n\n</rich:modalPanel>\n\n<br />\n\n<h:panelGroup\
  \ id=\"p\">\n\n<h:outputText value=\"#{faqService.answerText}\" id=\"a\"\n\nrendered=\"\
  #{faqService.showingAnswer}\" />\n\n</h:panelGroup>\n\n**</rich:panel>**\n\n</body>\n\
  \n</html>\n\n**显示多个问题**\n\n到目前为止，你只是简单地显示了一个问题和答案，但现在你将显示多个问题。然而，由于单个问题的标签已经变得相当复杂，因此最好将它们封装在一个自定义标签/组件中。\n\
  \n\n\n那么，listfaq.xhtml 可以简化为清单 7-17 所示。这里假设 `q1` 是一个包含问题文本、答案文本等信息的 `Question` 对象。\n\
  \n第 7 章 ■ 使用 AJAX 构建交互式页面\n\n**207**\n\n**清单 7-17.** *在 listfaq.xhtml 中使用自定义标签*\n\
  \n<!DOCTYPE ...>\n\n[<html](http://www.w3.org/1999/xhtml)\n\n[**>**](http://foo.com)\n\
  \n<head>\n\n<meta http-equiv=\"Content- Type\" content=\"text/html; charset=UTF-\
  \ 8\" />\n\n<title>在此处插入标题</title>\n\n</head>\n\n<body>\n\n<rich:panel>\n\n**<foo:qa\
  \ question=\"#{faqService.q1}\"/>**\n\n</rich:panel>\n\n</body>\n\n</html>\n\n为此，将\
  \ listfaq.xhtml 中的大部分标签移动到 `src/META-INF` 文件夹下的 qa.xhtml 中，然后修改代码，如清单 7-18 所示。主要改动是从通过\
  \ `question` 参数传递的 `Question` 对象中获取信息。\n\n**清单 7-18.** *qa.xhtml*\n\n<!DOCTYPE html\
  \ PUBLIC \"- //W3C//DTD XHTML 1.0 Strict//EN\"\n\n[\"http://www.w3.org/TR/xhtml1/DTD/xhtml1-\
  \ strict.dtd\">](http://www.w3.org/TR/xhtml1/DTD/xhtml1-�strict.dtd)\n\n[<html](http://www.w3.org/1999/xhtml)\n\
  \n[**>**](http://java.sun.com/jsf/facelets)\n\n<head>\n\n<meta http-equiv=\"Content-\
  \ Type\" content=\"text/html; charset=UTF- 8\" />\n\n<title>在此处插入标题</title>\n\n\
  </head>\n\n**208**\n\n第 7 章 ■ 使用 AJAX 构建交互式页面\n\n<body>\n\n**<ui:component>**\n\n\
  <h:form>\n\n<a4j:commandLink\n\n**action=\"#{question.trigger}\"**\n\n**value=\"\
  #{question.questionText} (#{question.rating})\"**\n\nreRender=\"p\" id=\"q\" />\n\
  \n<a href=\"javascript:Richfaces.showModalPanel('myDialog')\">评分</a>\n\n</h:form>\n\
  \n<rich:modalPanel id=\"myDialog\" width=\"200\" height=\"140\">\n\n<f:facet name=\"\
  header\">\n\n<h:outputText value=\"输入评分\"/>\n\n</f:facet>\n\n<h:panelGroup id=\"\
  mp\">\n\n<h:messages id=\"m\" />\n\n</h:panelGroup>\n\n<h:form style=\"float:right\"\
  >\n\n**<h:inputText size=\"2\" value=\"#{question.rating}\"/>**\n\n<a4j:commandButton\n\
  \nvalue=\"评分\"\n\n**action=\"#{question.rate}\"**\n\nreRender=\"q,mp\"\n\noncomplete=\"\
  if (document.getElementById('m')==null)\n\nRichfaces.hideModalPanel('myDialog')\"\
  >\n\n</a4j:commandButton>\n\n</h:form>\n\n</rich:modalPanel>\n\n<br />\n\n<h:panelGroup\
  \ id=\"p\">\n\n<h:outputText id=\"a\"\n\n**value=\"#{question.answerText}\"**\n\n\
  **rendered=\"#{question.showingAnswer}\" />**\n\n</h:panelGroup>\n\n**</ui:component>**\n\
  \n</body>\n\n</html>\n\n接下来，在同一个 `META-INF` 文件夹中创建标签库定义文件 `foo.taglib.xml`，如清单 7-19\
  \ 所示。\n\n第 7 章 ■ 使用 AJAX 构建交互式页面\n\n**209**\n\n**清单 7-19.** *foo.taglib.xml*\n\n\
  <!DOCTYPE facelet- taglib PUBLIC\n\n\"- //Sun Microsystems, Inc.//DTD Facelet Taglib\
  \ 1.0//EN\"\n\n[\"http://java.sun.com/dtd/facelet- taglib_1_0.dtd\">](http://java.sun.com/dtd/facelet-�taglib_1_0.dtd)\n\
  \n[<facelet-taglib >](http://java.sun.com/JSF/Facelet)\n\n[<namespace>http://foo.com</namespace>](http://foo.com%3C/namespace)\n\
  \n<tag>\n\n<tag-name>qa</tag- name>\n\n<source>qa.xhtml</source>\n\n</tag>\n\n</facelet-taglib>\n\
  \n创建一个 `Question` 类，如清单 7-20 所示。它基本上是 `FAQService` 类的副本，不同之处在于它有一个构造函数，并且不是一个 Web\
  \ Bean（因为你应该有多个 `Question` 对象，将其设为 Web Bean 没有意义）。\n\n**清单 7-20.** *Question 类*\n\
  \npackage faq;\n\nimport java.io.Serializable;\n\npublic class Question implements\
  \ Serializable {\n\n**private String questionText;**\n\n**private String answerText;**\n\
  \nprivate boolean isShowingAnswer = false;\n\nprivate int rating = 0;\n\n**public\
  \ Question(String questionText, String answerText) {**\n\n**this.questionText =\
  \ questionText;**\n\n**this.answerText = answerText;**\n\n**}**\n\npublic String\
  \ getQuestionText() {\n\nreturn questionText;\n\n}\n\npublic String getAnswerText()\
  \ {\n\nreturn answerText;\n\n}\n\npublic String trigger() {\n\nisShowingAnswer =\
  \ !isShowingAnswer;\n\nreturn null;\n\n**210**\n\n第 7 章 ■ 使用 AJAX 构建交互式页面\n\n}\n\
  \npublic boolean isShowingAnswer() {\n\nreturn isShowingAnswer;\n\n}\n\npublic String\
  \ rate() {\n\nSystem.out.println(\"设置评分为: \" + rating);\n\nreturn null;\n\n}\n\n\
  public int getRating() {\n\nreturn rating;\n\n}\n\npublic void setRating(int rating)\
  \ {\n\nthis.rating = rating;\n\n}\n\n}\n\n修改 `FAQService`，如清单 7-21 所示。\n\n**清单 7-21.**\
  \ *在 FAQService 中提供一个单一的 Question 对象*\n\npackage faq;\n\nimport javax.webbeans.Named;\n\
  \nimport javax.webbeans.SessionScoped;\n\n\n\n@Named(\"faqService\")\n\n@SessionScoped\n\
  \npublic class FAQService implements Serializable {\n\nprivate Question q1 = new\
  \ Question(\"如何运行 Eclipse？\", \"双击其图标。\");\n\npublic Question getQ1() {\n\nreturn\
  \ q1;\n\n}\n\n}\n\n继续修改 listfaq.xhtml，如清单 7-17 所示。然后运行应用程序，它应该能继续正常工作。\n\n■**注意**\
  \ 在 Facelets 中存在一个 bug，导致无法在 JBoss 中发现类路径下 META-INF 文件夹中的 *.taglib.xml 文件。要解决此问题，请将整个\
  \ META-INF 文件夹放入 WebContent 中，然后在 web.xml 中显式指定标签库，如清单 7-22 所示。\n\n第 7 章 ■ 使用 Ajax\
  \ 构建交互式页面\n\n**211**\n\n**清单 7-22.** *显式指定标签库*\n\n<?xml version=\"1.0\" encoding=\"\
  UTF-8\"?>\n\n<web-app ...>\n\n...\n\n<servlet>\n\n<servlet-name>JSF</servlet-name>\n\
  \n<servlet-class>javax.faces.webapp.FacesServlet</servlet-class>\n\n</servlet>\n\
  \n<servlet-mapping>\n\n<servlet-name>JSF</servlet-name>\n\n<url-pattern>/faces/*</url-pattern>\n\
  \n</servlet-mapping>\n\n<context-param>\n\n<param-name>facelets.LIBRARIES</param-name>\n\
  \n<param-value>/META-INF/foo.taglib.xml</param-value>\n\n</context-param>\n\n</web-app>\n\
  \n最后，修改 listfaq.xhtml 以显示多个问题，如清单 7-23 所示。\n\n**清单 7-23.** *使用 <a4j:repeat> 遍历问题*\n\
  \n<!DOCTYPE html PUBLIC \"-//W3C//DTD XHTML 1.0 Strict//EN\"\n\n[\"http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd\"\
  >](http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd)\n\n[<html](http://www.w3.org/1999/xhtml)\n\
  \n[](http://richfaces.org/a4j)\n\n**[>](http://foo.com)\n\n<head>\n\n<meta http-equiv=\"\
  Content-Type\" content=\"text/html; charset=UTF-8\" />\n\n<title>在此处插入标题</title>\n\
  \n</head>\n\n<body>\n\n<rich:panel>\n\n**<a4j:repeat value=\"#{faqService.questions}\"\
  \ var=\"q\">**\n\n<foo:qa\n\n**question=\"#{q}\" />**\n\n**<p />**\n\n**</a4j:repeat>**\n\
  \n</rich:panel>\n\n</body>\n\n</html>\n\n**212**\n\n第 7 章 ■ 使用 Ajax 构建交互式页面\n\n\
  <a4j:repeat> 标签与 <h:dataTable> 标签非常相似，区别在于它会循环处理其主体内容，而不会生成像 <table>、<tr> 或 <td>\
  \ 这样的标签。接下来，修改 FAQService 以提供问题列表，如清单 7-24 所示。\n\n**清单 7-24.** *在 FAQService 中提供问题对象列表*\n\
  \npackage faq;\n\n...\n\n@Named(\"faqService\")\n\n@SessionScoped\n\npublic class\
  \ FAQService implements Serializable {\n\n**private List<Question> questions;**\n\
  \n**public FAQService() {**\n\n**questions = new ArrayList<Question>();**\n\n**questions.add(new\
  \ Question(\"如何运行 Eclipse？\", \"双击其图标。\"));**\n\n**questions.add(new Question(\"\
  如何自动补全？\", \"按 Ctrl+空格键。\"));**\n\n**questions.add(new Question(\"如何删除文件？\", \"\
  按 Del 键。\"));**\n\n**}**\n\n**public List<Question> getQuestions() {**\n\n**return\
  \ questions;**\n\n**}**\n\n}\n\n现在运行应用程序，它应该会显示所有三个问题。\n\n■**注意** 目前 JSF 参考实现中存在一个\
  \ bug，如果表单位于循环中，则会导致表单无法正常工作。\n\n**总结**\n\n在本章中，您学习了如何使用 Ajax 构建页面。Ajax 意味着当浏览器中发生某个事件时，会向应用程序发送一个请求，以便其执行某些操作，然后仅刷新页面的部分内容。您可以使用\
  \ <a4j:commandLink> 处理链接，使用 <a4j:commandButton> 处理按钮，或使用 <a4j:support> 处理其他任何事件。\n\
  \n在这些标签中，您还需要指定要在应用程序中执行的动作方法，以及需要刷新的组件 ID 列表。\n\n第 7 章 ■ 使用 Ajax 构建交互式页面\n\n**213**\n\
  \n组件可以被排除在渲染之外。在这种情况下，它将不会生成任何内容。如果您需要使用 Ajax 显示它，可以将其放入面板中，然后刷新该面板。类似地，某些组件（例如\
  \ UI Messages 组件）在正常使用中可能不输出任何内容。要使用 Ajax 更新它们，请将它们放入面板中。\n\n此外，您还学习了如何使用 JavaScript\
  \ 显示或隐藏模态面板。\n\n\n\n在本章中，你还了解了皮肤（skins）。皮肤定义了外观和感觉，包括字体族、字号、颜色等。所有 RichFaces 组件都支持皮肤。默认选中的皮肤也会覆盖由普通\
  \ JSF 组件生成的 HTML 代码。\n\n第 8 章\n\n使用会话（Conversations）\n\n**在**前面的章节中，你学习了如何使用 Web\
  \ Beans 来维护请求（请求作用域）、用户（会话作用域）或整个应用程序（应用程序作用域）的状态。在本章中，你将学习如何使用 Web Beans 提供的一种非常强大的作用域类型：*会话作用域*。它允许你为浏览器窗口在服务器上维护不同的状态。\n\
  \n**创建向导以提交支持工单**\n\n假设你想开发一个向导，允许用户提交支持工单，如图 8-1 所示。也就是说，用户在步骤 1 输入其客户 ID，在步骤 2\
  \ 输入问题描述。提交工单后，会显示一个“谢谢！”页面。\n\n有趣的是，用户可以使用“下一步”按钮和“上一步”按钮在页面之间来回切换。\n\n**215**\n\
  \n![Image 77](img/index-230_1.png)\n\n![Image 78](img/index-230_2.png)\n\n![Image\
  \ 79](img/index-230_3.png)\n\n**216**\n\n第 8 章 ■ 使用会话\n\n**图 8-1.** *使用向导界面提交工单*\n\
  \n要开始构建此向导，请创建一个名为 Wizard 的新动态 Web 项目。然后在 wizard 包中创建一个 Ticket 类，如清单 8-1 所示。请注意，它处于会话作用域中，以便在两个向导步骤中都能使用。\n\
  \n**清单 8-1.** *Ticket 类*\n\npackage wizard;\n\nimport java.io.Serializable;\n\n\
  import javax.annotation.Named;\n\nimport javax.context.SessionScoped;\n\n@Named(\"\
  ticket\")\n\n@SessionScoped\n\npublic class Ticket implements Serializable {\n\n\
  private String customerId;\n\nprivate String problemDesc;\n\n第 8 章 ■ 使用会话\n\n**217**\n\
  \npublic String getCustomerId() {\n\nreturn customerId;\n\n}\n\npublic void setCustomerId(String\
  \ customerId) {\n\nthis.customerId = customerId;\n\n}\n\npublic String getProblemDesc()\
  \ {\n\nreturn problemDesc;\n\n}\n\npublic void setProblemDesc(String problemDesc)\
  \ {\n\nthis.problemDesc = problemDesc;\n\n}\n\n}\n\n在 WebContent 文件夹中分别创建 step1.xhtml、step2.xhtml\
  \ 和 thankyou.xhtml 文件，如清单 8-2、清单 8-3 和清单 8-4 所示。除了 step2.xhtml 中使用的 `<h:inputTextarea>`\
  \ 标签外，它们没有什么特别之处。`<h:inputTextarea>` 标签与 `<h:inputText>` 标签完全相同，只是它会生成一个 HTML 输入文本区域，以便用户可以输入多行文本。\n\
  \n**清单 8-2.** *step1.xhtml*\n\n<?xml version=\"1.0\" encoding=\"UTF- 8\" ?>\n\n\
  <!DOCTYPE html PUBLIC \"- //W3C//DTD XHTML 1.0 Strict//EN\"\n\n[\"http://www.w3.org/TR/xhtml1/DTD/xhtml1-\
  \ strict.dtd\">](http://www.w3.org/TR/xhtml1/DTD/xhtml1-�strict.dtd)\n\n[<html](http://www.w3.org/1999/xhtml)\n\
  \n[>](http://java.sun.com/jsf/html)\n\n<head>\n\n<meta http-equiv=\"Content- Type\"\
  \ content=\"text/html; charset=UTF- 8\" />\n\n<title>在此处插入标题</title>\n\n</head>\n\
  \n<body>\n\n步骤 1:\n\n<h:form>\n\n客户 ID: <h:inputText value=\"#{ticket.customerId}\"\
  /><br/>\n\n<h:commandButton value=\"下一步\" action=\"next\"/>\n\n</h:form>\n\n</body>\n\
  \n</html>\n\n**218**\n\n第 8 章 ■ 使用会话\n\n**清单 8-3.** *step2.xhtml*\n\n<?xml version=\"\
  1.0\" encoding=\"UTF- 8\" ?>\n\n<!DOCTYPE html PUBLIC \"- //W3C//DTD XHTML 1.0 Strict//EN\"\
