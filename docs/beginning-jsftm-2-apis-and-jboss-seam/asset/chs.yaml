  同样，为了获得更好的可扩展性，您希望将 confirm 组件设置为会话 Bean。为此，请在 `shop` 包的 `src/hot` 文件夹中创建 `Confirm`\
  \ 接口，如清单 10-21 所示。\n\n**清单 10-21.** *Confirm 接口*\n\npackage shop;\n\npublic interface\
