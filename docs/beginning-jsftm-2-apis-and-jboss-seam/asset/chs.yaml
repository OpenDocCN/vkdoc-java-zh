  change=變更\n\n现在运行应用程序，“更改”按钮将以正确的语言显示。\n\n**本地化句号**\n\n这里仍然有一个小问题。到目前为止，句子末尾使用的句号是英文句号，而不是中文句号（是的，中文有句号）。要解决这个问题，你可以为句号在属性文件中添加一个新条目，但这样你就需要将句子分成三个独立的部分输出，如图\
  \ 9-8 所示。\n\nToday is: March 8, 2009.\n\n第 1 部分\n\n第 2 部分\n\n第 3 部分\n\n**图 9-8.**\
  \ *将句子分成三个独立部分输出*\n\n这变得过于复杂；更重要的是，你在 showdate.xhtml 中硬编码了这些部分的顺序以及它们之间是否有空格，而实际上这些应该取决于语言。例如，在英文中，冒号后面应该有一个空格，但在中文中则没有。为了解决这个问题，你应该采用最佳实践，即在一个\
  \ UI Output 组件中输出整个句子，而不是两个或三个。为此，请修改资源包，如清单 9-16 和清单 9-17 所示。稍后你将填充占位符 {0}。\n\n\
  **清单 9-16.** *在 msgs.properties 中使用单个条目表示整个句子* currentDate=Current date\n\n**todayIs=Today\
  \ is: {0}.**\n\nchange=Change\n\n**清单 9-17.** *在 msgs_zh.properties 中使用单个条目表示整个句子*\
  \ currentDate=當前日期\n\n**todayIs=今日是**：**{0}.**\n\nchange=變更\n\n**244**\n\n第 9 章\
  \ ■ 支持其他语言\n\n为了在填充 {0} 占位符的同时输出整个句子，请修改 showdate.xhtml，如清单 9-18 所示。\n\n**清单 9-18.**\
  \ *使用 <h:outputFormat> 标签输出整个句子*\n\n<?xml version=\"1.0\" encoding=\"UTF-8\" ?>\n\
  \n<!DOCTYPE html PUBLIC \"-//W3C//DTD XHTML 1.0 Strict//EN\"\n\n[\"http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd\"\
  >](http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd)\n\n[<html](http://www.w3.org/1999/xhtml)\n\
  \n[>](http://java.sun.com/jsf/core)\n\n<head>\n\n<meta http-equiv=\"Content-Type\"\
  \ content=\"text/html; charset=UTF-8\" />\n\n<f:loadBundle basename=\"multilang.msgs\"\
  \ var=\"b\" />\n\n<title>\n\n<h:outputText value=\"#{b.currentDate}\"/>\n\n</title>\n\
  \n</head>\n\n<body>\n\n**<h:outputFormat value=\"#{b.todayIs}\">**\n\n**<f:param\
  \ value=\"#{showDate.today}\"/>**\n\n**</h:outputFormat>**\n\n<h:form>\n\n<h:selectOneMenu\
  \ value=\"#{showDate.langCode}\">\n\n<f:selectItems value=\"#{showDate.langCodes}\"\
  />\n\n</h:selectOneMenu>\n\n<h:commandButton action=\"#{showDate.changeLangCode}\"\
  \ value=\"#{b.change}\"/>\n\n</h:form>\n\n</body>\n\n</html>\n\n如图 9-9 所示，<h:outputFormat>\
  \ 标签将创建一个 UI Output 组件（就像 <h:outputText> 标签所做的那样），但会将其与一个格式渲染器关联。<f:param> 将创建一个\
  \ UI Parameter 组件，并将其添加为 UI Output 组件的子组件。UI Parameter 组件本身没有任何意义。如何使用它完全取决于父组件（此处为\
  \ UI Output 组件）。在这里，UI Output 组件将让格式渲染器完成工作，该渲染器会将 UI Output 组件的值用作格式模式。然后，它会找到第\
  \ 0 个 UI Parameter 组件的值，并将其替换为模式中的 {0} 占位符。当然，如果你有多个占位符，你可以在模式中使用 {0}、{1} 等。\n\n\
  第 9 章 ■ 支持其他语言\n\n**245**\n\n...\n\n<h:outputFormat value=\"#{b.todayIs}\">\n\n\
  <f:param value=\"#{showDate.today}\"/>\n\n</h:outputFormat>\n\n1: 读取第 0 个参数的值。\n\
  \n格式\n\n渲染器\n\n2: 将该值放入\n\nUI Output\n\n格式模式中。\n\n\n\nvalue: \"今日是：{0}。\"\n\nUI\n\
  \n参数\n\nvalue:\n\n日期\n\n**图 9-9.** *<h:outputFormat> 与 <f:param> 的工作原理*\n\n现在运行应用程序时，包含句号的句子应该能正常显示。然而，日期的显示不再是长格式。要解决这个问题，需要在占位符中指定格式和样式，如清单\
  \ 9-19 和清单 9-20 所示。\n\n**清单 9-19.** *在 msgs.properties 中为 {0} 指定格式和样式* currentDate=当前日期\n\
  \n**todayIs=今日是：{0, date, long}.**\n\nchange=变更\n\n**清单 9-20.** *在 msgs_zh.properties\
  \ 中为 {0} 指定格式和样式* currentDate=當前日期\n\n**todayIs=今日是**：**{0, date, long}.**\n\nchange=變更\n\
  \n现在运行应用程序时，日期应该以长格式显示。表 9-1 展示了更多关于日期、时间和货币的示例。\n\n![图片 83](img/index-260_1.png)\n\
  \n**246**\n\n第 9 章 ■ 支持其他语言\n\n**表 9-1.** *不同的格式和样式*\n\n**占位符**\n\n**含义**\n\n{0,\
  \ date, short}\n\n使用短格式将其格式化为日期。\n\n{0, date, full}\n\n使用完整格式将其格式化为日期。\n\n{0, time,\
  \ short}\n\n使用短格式将其格式化为时间。\n\n{0, time, long}\n\n使用长格式将其格式化为时间。\n\n{0, number, currency}\n\
  \n使用货币格式将其格式化为数字。\n\n{0, number, integer}\n\n使用整数格式将其格式化为数字。\n\n**显示徽标**\n\n现在，假设您希望在页面上显示一个徽标，如图\
  \ 9-10 所示。\n\n**图 9-10.** *使用徽标*\n\n请注意徽标中的字符“4”，在此处表示“for”。在中文中，“4”根本不表示“for”或“four”。实际上，它的发音与中文中的“死亡”一词相似，因此人们倾向于在名称中避免使用它。所以，假设您希望有一个中文版的徽标。\n\
  \n假设您在文件 logo_en.gif 中有英文版，在 logo_zh.gif 中有中文版。（您可以使用任何图像文件；只要图像看起来彼此不同，它们的外观并不重要。）\n\
  \n首先，将它们放在 WebContent 文件夹中。然后，修改 showdate.xhtml，如清单 9-21 所示。<h:graphicImage> 标签将创建一个\
  \ UI Graphic 组件，该组件在渲染时会生成一个 HTML <img> 标签。如果 value 属性以斜杠开头（就像现在这样），它将被视为相对于 WebContent\
  \ 文件夹的路径。如果没有前导斜杠，它将被视为相对于 showdate.xhtml 文件本身（在这种情况下也能正常工作）。\n\n**清单 9-21.** *使用\
  \ <h:graphicImage> 标签*\n\n<?xml version=\"1.0\" encoding=\"UTF-8\" ?>\n\n<!DOCTYPE\
  \ html PUBLIC \"-//W3C//DTD XHTML 1.0 Strict//EN\"\n\n第 9 章 ■ 支持其他语言\n\n**247**\n\
  \n[\"http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd\">](http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd)\n\
  \n[<html](http://www.w3.org/1999/xhtml)\n\n[>](http://java.sun.com/jsf/core)\n\n\
  <head>\n\n<meta http-equiv=\"Content-Type\" content=\"text/html; charset=UTF-8\"\
  \ />\n\n<f:loadBundle basename=\"multilang.msgs\" var=\"b\" />\n\n<title>\n\n<h:outputText\
  \ value=\"#{b.currentDate}\"/>\n\n</title>\n\n</head>\n\n<body>\n\n**<h:graphicImage\
  \ value=\"/logo_en.gif\"/><p/>**\n\n<h:outputFormat value=\"#{b.todayIs}\">\n\n\
  <f:param value=\"#{showDate.today}\"/>\n\n</h:outputFormat>\n\n<h:form>\n\n<h:selectOneMenu\
  \ value=\"#{showDate.langCode}\">\n\n<f:selectItems value=\"#{showDate.langCodes}\"\
  />\n\n</h:selectOneMenu>\n\n<h:commandButton action=\"#{showDate.changeLangCode}\"\
  \ value=\"#{b.change}\"/>\n\n</h:form>\n\n</body>\n\n</html>\n\n现在运行应用程序，应该会显示英文版的徽标（无论选择哪种语言）。要使其依赖于所选语言，请修改\
  \ showdate.xhtml，如清单 9-22 所示。view 变量是一个特殊变量，它将返回 UI 视图根。这种特殊变量称为 JSF 提供的*隐式对象*。然后，您在其上调用\
  \ getLocale()，并让 EL 表达式求值器将其转换为字符串并附加到文件名中。\n\n**清单 9-22.** *使用 <h:graphicImage>\
  \ 标签*\n\n<?xml version=\"1.0\" encoding=\"UTF-8\" ?>\n\n<!DOCTYPE html PUBLIC \"\
  -//W3C//DTD XHTML 1.0 Strict//EN\"\n\n\n\n[\"http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd\"\
  >](http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd)\n\n[<html](http://www.w3.org/1999/xhtml)\n\
  \n[>](http://java.sun.com/jsf/core)\n\n<head>\n\n<meta http-equiv=\"Content-Type\"\
  \ content=\"text/html; charset=UTF-8\" />\n\n**248**\n\n第 9 章 ■ 支持其他语言\n\n<f:loadBundle\
  \ basename=\"multilang.msgs\" var=\"b\" />\n\n<title>\n\n<h:outputText value=\"\
  #{b.currentDate}\"/>\n\n</title>\n\n</head>\n\n<body>\n\n**<h:graphicImage value=\"\
  /logo_#{view.locale}.gif\"/><p/>**\n\n<h:outputFormat value=\"#{b.todayIs}\">\n\n\
  <f:param value=\"#{showDate.today}\"/>\n\n</h:outputFormat>\n\n<h:form>\n\n<h:selectOneMenu\
  \ value=\"#{showDate.langCode}\">\n\n<f:selectItems value=\"#{showDate.langCodes}\"\
  />\n\n</h:selectOneMenu>\n\n<h:commandButton action=\"#{showDate.changeLangCode}\"\
  \ value=\"#{b.change}\"/>\n\n</h:form>\n\n</body>\n\n</html>\n\n现在运行应用程序时，它应该显示正确版本的徽标。另一种做法是，将图像文件名作为条目存储在`.properties`文件中，并在`<h:graphicImage>`标签的`value`属性中查找该文件名。\n\
  \n**使区域设置更改持久化**\n\n假设您在浏览器中最偏好的区域设置是中文。让我们做一个实验：使用“更改”按钮将区域设置改为英文，然后在浏览器的地址栏中按回车键。页面将再次以中文显示。这意味着区域设置的更改是临时的：它仅为当前视图根设置，因此仅适用于当前请求。\n\
  \n要使更改持久化（例如，在当前会话中持久化），您可以将所选语言代码存储到会话中，如清单 9-23 所示。每当用户更改语言时，代码将检查是否已存在会话。如果存在，它将把所选语言代码作为名为`multilang.langCode`的属性存储在会话中。\n\
  \n**清单 9-23.** *将语言代码存储到会话中*\n\n<?xml version=\"1.0\" encoding=\"UTF-8\" ?>\n\n\
  public class ShowDate {\n\nprivate String langCode;\n\n...\n\npublic String changeLangCode()\
  \ {\n\n第 9 章 ■ 支持其他语言\n\n**249**\n\n**HttpSession session = (HttpSession) FacesContext.getCurrentInstance()**\n\
  \n**.getExternalContext().getSession(false);**\n\n**if (session != null) {**\n\n\
  **session.setAttribute(\"multilang.langCode\", langCode);**\n\n**}**\n\nUIViewRoot\
  \ viewRoot = FacesContext.getCurrentInstance().getViewRoot();\n\nviewRoot.setLocale(new\
  \ Locale(langCode));\n\nreturn null;\n\n}\n\n}\n\n下一步是让 UI View Root 在存在语言代码时使用它。为此，您需要知道，在\
  \ JSF 中，创建和初始化 UI View Root 的是所谓的视图处理器。这包括检索 HTTP 请求中的首选语言、执行筛选，然后将区域设置设置到 UI View\
  \ Root 中。现在，您需要提供自己的视图处理器，该处理器将检查会话中是否存在语言代码，如果存在，则直接使用它，而无需查看 HTTP 请求。\n\n为此，请在`multilang`包中创建一个`MyViewHandler`类，如清单\
  \ 9-24 所示。它扩展了`MultiViewHandler`类，这是 JSF 中的默认视图处理器。当需要找出要存储到 UI View Root 中的区域设置时，JSF\
  \ 将调用`calculateLocale()`方法。在这里，您将尝试使用存储在会话中的语言代码，并用它创建一个`Locale`对象来返回。如果不存在，则让基类执行其默认操作（即检查\
  \ HTTP 请求中的首选语言）。\n\n**清单 9-24.** *使用会话中的语言代码创建要使用的区域设置* package multilang;\n\n\
  import java.util.Locale;\n\nimport javax.faces.context.FacesContext;\n\nimport javax.servlet.http.HttpSession;\n\
  \nimport com.sun.faces.application.view.MultiViewHandler;\n\npublic class MyViewHandler\
  \ extends MultiViewHandler {\n\npublic Locale calculateLocale(FacesContext context)\
  \ {\n\nHttpSession session = (HttpSession) context.getExternalContext()\n\n.getSession(false);\n\
  \nif (session != null) {\n\nString langCode = (String) session\n\n.getAttribute(\"\
  multilang.langCode\");\n\nif (langCode != null) {\n\nreturn new Locale(langCode);\n\
  \n**250**\n\n\n\n第 9 章 ■ 支持其他语言\n\n}\n\n}\n\nreturn super.calculateLocale(context);\n\
  \n}\n\n}\n\n要告知 JSF 使用您自己的视图处理器，请按清单 9-25 所示修改`faces-config.xml`。\n\n**清单 9-25.**\
  \ *使用您自己的视图处理器*\n\n<faces-config ...>\n\n<application>\n\n**<view-handler>multilang.MyViewHandler</view-handler>**\n\
  \n<locale-config>\n\n<default-locale>en</default-locale>\n\n<supported-locale>zh</supported-locale>\n\
  \n</locale-config>\n\n</application>\n\n</faces-config>\n\n保存文件，重启 JBoss 实例，并再次运行应用程序。这次，区域设置更改将一直持续到您结束会话（例如，通过重启浏览器）。\n\
  \n**本地化验证消息**\n\n请记住，您可以使用资源包自定义验证消息。例如，您可能在`multilang`包中有一个名为`MyApp.properties`的文件，如清单\
  \ 9-26 所示。\n\n**清单 9-26.** *自定义验证消息*\n\njavax.faces.converter.DateTimeConverter.DATE={0}\
  \ 是一个无效的 {2}！\n\njavax.faces.component.UIInput.REQUIRED=您必须输入 {0}！\n\njavax.faces.validator.LongRangeValidator.MINIMUM={1}\
  \ 必须至少为 {0}！\n\njavax.faces.validator.LongRangeValidator.MINIMUM_detail={1} 无效！\n\
  \n要使用它，您需要在`faces-config.xml`中进行声明，如清单 9-27 所示。\n\n第 9 章 ■ 支持其他语言\n\n**251**\n\n\
  **清单 9-27.** *指定应用程序资源包*\n\n<faces-config ...>\n\n<application>\n\n<view-handler>multilang.MyViewHandler</view-handler>\n\
  \n**<message-bundle>multilang.MyApp</message-bundle>**\n\n<locale-config>\n\n<default-locale>en</default-locale>\n\
  \n<supported-locale>zh</supported-locale>\n\n</locale-config>\n\n</application>\n\
  \n</faces-config>\n\n这只是一个由内置组件使用的全局资源包。要将其本地化为（例如）中文，您只需创建`MyApp_zh.properties`文件，就像处理任何其他资源包一样。\n\
  \n**总结**\n\n在本章中，您学习了以下内容：\n\n• 要使页面国际化，您可以将字符串提取到资源包中，每个支持的语言对应一个资源包，并有一个默认资源包作为父包。要在资源包中查找某个键对应的字符串，请使用`<loadBundle>`标签将资源包加载为请求范围的属性，并像访问映射一样访问它。\n\
  \n• 要确定使用的区域设置，视图处理器会检查 HTTP 请求中指定的首选区域设置，并检查您的应用程序是否支持该设置。如果支持，则将其存储到视图根中。如果不支持，则使用应用程序中指定的默认区域设置。\n\
  \n• 如果您希望允许用户指定要使用的特定区域设置，从而覆盖浏览器中设置的首选区域设置，您可能需要将其存储到会话中，并提供一个视图处理器子类以便稍后检索它。\n\
  \n• 最佳实践是使用一个 UI Output 组件输出整个句子。在输出之前，要填充模式中的各种占位符，您可以使用`<outputFormat>`，并通过 UI\
  \ Parameter 组件（由`<param>`创建）为每个占位符指定值。UI Parameter 的含义完全由其父组件决定。\n\n• 要显示图像，请使用`<graphicImage>`标签。其`value`属性是相对于`WebContent`文件夹（如果以斜杠开头）或相对于`.xhtml`文件（否则）的路径。要使图像国际化，只需将其`value`属性国际化即可。\n\
  \n第 10 章\n\n使用 JBoss Seam\n\n**如**果您的应用程序使用企业 JavaBeans（EJB），您可能希望使用一个名为 Seam（来自\
  \ JBoss）的框架，这样您的 JSF 页面就能更轻松地与 EJB 协同工作。例如，Seam 允许您在 EL 表达式中访问 EJB，就像访问 Web Bean\
  \ 一样。此外，Seam 还提供了一些优秀特性来加速您的 JSF 开发。例如，它可以为您业务对象类的 CRUD（创建、检索、更新和删除）操作生成页面，而无需您编写一行代码。在本章中，您将了解这些特性。\n\
  \n\n\n如果你不了解 EJB，也不必担心；你仍然可以轻松地阅读本章。\n\n**安装 Seam**\n\n[要安装 Seam，请访问 http://seamframework.org\
  \ 下载 JBoss 的二进制包](http://seamframework.org)\n\nSeam，例如 jboss-seam-2.1.1.GA.zip。将其解压到某个文件夹，例如\
  \ c:\\jboss-seam。由于下载的是一个库，你还无法运行它。\n\nSeam 2.1 版本尚不支持 JSF 2.0。由于你在第 1 章中已将 JSF\
  \ 2.0 安装到 JBoss 应用服务器中，因此你无法在其上运行 Seam 应用程序。为了解决这个问题，你可能需要重新下载一份干净的 JBoss 应用服务器副本，并将其解压到，例如，c:\\\
  jboss。\n\n**253**\n\n**254**\n\n第 10 章 ■ 使用 JBoss Seam\n\n**重新创建 E-Shop 项目**\n\n\
  假设你想使用 EJB 和 Seam 重新创建 e-shop。为此，请打开命令提示符并输入清单 10-1 中所示的命令。请注意，这些命令假设你的 JDK 已安装到\
  \ c:\\Program Files\\Java\\jdk1.6.0；如果没有，你必须使用你计算机上的实际路径。\n\n**清单 10-1.** *启动 Seam\
  \ 设置*\n\nc:\\>cd \\jboss-seam\n\nc:\\>set JAVA_HOME=c:\\Program Files\\Java\\jdk1.6.0\n\
