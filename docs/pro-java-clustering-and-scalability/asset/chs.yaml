- '# 21. 懒部署 vs. 快速部署


  也许你曾在一家生产环境部署流程非常“懒散”的公司工作过。也就是说，部署一次可能需要很多天，甚至好几个月。信不信由你，在实践中，这种情况并不难找到。


  简而言之，这类问题往往是软件项目失败的根源。这是因为将新版本部署到生产环境需要如此长的时间，会带来诸多弊端。


  *   客户不会乐意看到那些能为他们业务增值的功能，只停留在开发人员的机器上，而不是部署到生产环境。

  *   新版本会包含大量新代码，因为开发人员长时间都在开发新功能，很可能一次性向应用程序引入许多错误。这使得修复这些（以及其他）错误变得更加困难。

  *   由于部署间隔时间过长，团队将无法及时修复关键错误并交付软件。

  *   开发人员辛勤工作，却看不到自己的代码上线运行。这真的很打击士气。


  如你所见，不采用懒散部署流程的理由相当充分。


  ![A453568_1_En_21_Figa_HTML.jpg](img/A453568_1_En_21_Figa_HTML.jpg) 我推荐 Jez Humble
  和 David Farley 合著的《持续交付》（Addison-Wesley, 2010）一书，它是对持续交付精彩世界的极好入门介绍。


  相比之下，能够在几小时甚至几分钟内将代码交付到生产环境，则带来了许多好处，包括：


  *   客户会很高兴，因为他们每周（甚至每天）都能使用新功能，从而为他们的业务增加价值。

  *   你得到的是低风险的发布。每个新版本只包含一个小功能。如果出现问题，查找和修复起来要容易得多。这显然也意味着更低的成本。

  *   错误修复可以非常迅速地交付。

  *   开心的开发人员能看到他们的工作为他人创造价值。


  如你所见，有充分的理由尽快将新版本发布到生产环境。


  '
- '# 22. 持续交付


  持续交付是指能够以可持续的方式，安全、快速地将变更（例如新功能、配置更改、错误修复等）交付到生产环境。


  当然，实现这一点是有代价的。整个交付流程（从开发到生产）必须高度自动化。请记住，人类擅长创造性任务，但在重复性任务上表现糟糕。机器不擅长创造性任务，但在重复性任务上表现出色。为什么不充分利用人类和机器两者的优势呢？换句话说，让人类和机器各司其职，做他们最擅长的事！


  测试是一项重复、困难且乏味的任务。人类无法在不出错的情况下测试成千上万个用例。但机器可以。而且，机器可以在几秒或几分钟内完成测试任务，而人类可能需要花费好几天。这也意味着，在这类任务上用机器替代人类成本更低。


  让人类来测试你的软件，或者手动参与任何本可以自动化的任务，这与软件的持续交付理念格格不入。如果你想实现持续交付，自动化是关键！


  现在你能明白为什么自动化测试如此重要了吗？我认为，它们是实现高质量发布、进行持续交付的一种先决条件。在没有良好自动化测试的情况下实施持续交付，只会导致快速地将质量糟糕的代码交付到生产环境。这是你想要的吗？绝对不是！


  '
- '# 23. 自动化测试的类型


  可以编写的自动化测试有很多种类型。它们各有优缺点。以下是最常见的几种：


  *   **单元测试**：提供快速反馈，但只测试代码中一个隔离的单元（例如，类中的一个方法）。例如，SQL 查询的问题不会被发现，因为单元测试不会访问数据库。单元测试通常只需几秒甚至几毫秒就能执行完毕。

  *   **集成测试**：提供较慢的反馈，但会测试与数据库或 Web 服务等外部系统的集成。也就是说，它们比单元测试更全面。（但这并不意味着它们更好！这里要小心；记住，每种测试类型都有其自身的优缺点。）通常，集成测试需要几分钟才能执行完毕，但具体时间可能因运行的测试数量而有很大差异。

  *   **验收测试**：提供的反馈比集成测试更慢，但它们实际上是在模拟系统中的用户，使用浏览器点击按钮和链接、填写并提交表单等操作。通常，它们需要几分钟才能执行完毕，但具体时间可能因运行的测试数量而有很大差异。

  *   **压力测试**：包括向系统发送大量请求，以获取系统在这些条件下的行为反馈。


  通常，单元测试和集成测试是最常用的。它们共同覆盖了许多场景，并避免了大量应用程序问题。此外，与其他类型的测试相比，它们也更容易编写（考虑到压力测试应在类似生产环境的环境中运行等）。


  ![A453568_1_En_23_Figa_HTML.jpg](img/A453568_1_En_23_Figa_HTML.jpg) 实际上，还有更多类型的自动化测试，例如安全测试，可以添加到应用程序的自动化测试套件中。开放
  Web 应用程序安全项目¹（OWASP）是一个在线社区，它在 Web 应用程序安全领域创建了免费的文章、方法论、文档、工具和技术。例如，OWASP Zed Attack
  Proxy²（ZAP）是世界上最受欢迎的免费安全工具之一，由数百名国际志愿者积极维护。该工具可以帮助你自动发现 Web 应用程序中的安全漏洞，并且可以轻松集成到你的持续交付管道中（它甚至有一个可用的
  Jenkins 插件³）。


