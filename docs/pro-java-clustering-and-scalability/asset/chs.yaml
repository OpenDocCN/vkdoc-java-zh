- '# 16. 新建账户


  以下代码是 `User` 类。除了属性声明外，你还使用了 [Bean](http://beanvalidation.org/1.1/spec/) 验证¹和 Hibernate
  Validator² 注解。一个有效的新用户必须满足以下条件：


  *   `username`：不能为空，且长度必须在 5 到 15 个字符之间。该字段是 `user` 数据库表的主键。

  *   `password`：不能为空，且至少包含 5 个字符。

  *   `name`：不能为空。

  *   `email`：不能为空，且必须是有效的电子邮件地址。


