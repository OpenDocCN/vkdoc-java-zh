- "# 10. Spring WebSocket\n\nSpring WebSocket 为 WebSocket 应用提供了良好的支持，并且当你理解了幕后发生的事情后，它很容易使用。本章将帮助你开始了解一些\
  \ Spring WebSocket 的配置可能性。\n\n\n\n## 10.1 原始 WebSocket 配置\n\n尽管你不会在聊天应用中使用原始 WebSocket\
  \ 配置，但以下是其在 Spring 中的配置示例：\n\n```\n@Configuration\n@EnableWebSocket\npublic class\
  \ RawWebSocketConfiguration implements WebSocketConfigurer {\n@Override\npublic\
  \ void registerWebSocketHandlers(WebSocketHandlerRegistry registry) {\nregistry.addHandler(myRawWebSocketHandler(),\
  \  \"/rawwebsocket\");\n}\n@Bean\npublic WebSocketHandler myRawWebSocketHandler()\
  \ {\nreturn new MyRawWebSocketHandler();\n}\n}\n```\n\n这里声明了客户端将要连接的 WebSocket 端点（`ws://localhost:port/rawwebsocket`），并指定由\
  \ `MyRawWebSocket` 类的实例来处理接收到的帧。\n\n```\npublic class MyRawWebSocketHandler extends\
  \ TextWebSocketHandler {\npublic void afterConnectionEstablished(WebSocketSession\
  \ session) {\nTextMessage msg = new TextMessage(\"客户端连接成功！\");\n//客户端将收到此帧作为成功事件的回调\n\
  session.sendMessage(msg);\n}\npublic void handleTextMessage(WebSocketSession session,\
  \ TextMessage message) {\n// 这是消息内容，可以是任何格式（json、xml、纯文本……谁知道呢？）\nSystem.out.println(message.getPayload());\n\
  TextMessage msg = new TextMessage(\"消息已收到。谢谢，客户端！\");\nsession.sendMessage(msg);\n\
  }\n}\n```\n\n![A453568_1_En_10_Figa_HTML.jpg](img/A453568_1_En_10_Figa_HTML.jpg)\
  \ 还有一个 `BinaryWebSocketHandler` 类，当你通过原始 WebSocket 配置处理二进制数据时，可以继承该类。\n\n以下是客户端代码：\n\
  \n```\nfunction connectWebSocket(){\nws = new WebSocket('ws://localhost:8080/rawwebsocket');\n\
  ws.onmessage = function(event){\nrenderServerMessage(event.data);\n};\n}\nfunction\
  \ sendMessageToServer() {\nvar text = document.getElementById('myText').value;\n\
  var jsonMessage = JSON.stringify({ 'content': text });\nws.send(jsonMessage);\n\
  }\n```\n\n请注意，客户端以 JavaScript 对象表示法（JSON）格式向服务器发送消息。实际上，它发送 JSON 是因为它想发送一条 JSON\
  \ 消息（因为客户端已经知道服务器期望的是 JSON 消息），但请记住，它也可以发送纯文本消息、XML 消息或其他任何格式（这就是原始 WebSocket 的工作方式！）。\n\
  \n![A453568_1_En_10_Figb_HTML.jpg](img/A453568_1_En_10_Figb_HTML.jpg) 如果你想启用 WebSocket\
  \ 浏览器兼容性，当由于兼容性问题无法使用 WebSocket 时，你必须使用某种方式来模拟 WebSocket 行为。幸运的是，SockJS¹ 可以轻松为你处理这个问题。使用\
  \ Spring 启用 SockJS 支持只需在处理程序上添加一个 `.withSockJS()` 方法调用，如下所示：\n\n```\n@Configuration\n\
  @EnableWebSocket\npublic class RawWebSocketConfiguration implements WebSocketConfigurer\
  \ {\n@Override\npublic void registerWebSocketHandlers(WebSocketHandlerRegistry registry)\
  \ {\nregistry.addHandler(myRawWebSocketHandler(),   \"/rawwebsocket\").withSockJS();\n\
  }\n@Bean\npublic WebSocketHandler myRawWebSocketHandler() {\nreturn new MyRawWebSocketHandler();\n\
  }\n}\n```\n\n## 10.2 基于 STOMP 的 WebSocket 配置\n\n以下是使用 Spring 配置基于 STOMP 的 WebSocket\
  \ 的方法：\n\n```\n@Configuration\n@EnableWebSocketMessageBroker\npublic class WebSocketConfiguration\
  \ extends AbstractWebSocketMessageBrokerConfigurer {\n@Override\npublic void configureMessageBroker(MessageBrokerRegistry\
  \ config) {\nconfig.enableSimpleBroker(\"/queue/\",  \"/topic/\");\nconfig.setApplicationDestinationPrefixes(\"\
  /app\");\n}\n@Override\npublic void registerStompEndpoints(StompEndpointRegistry\
  \ registry) {\nregistry.addEndpoint(\"/stompwebsocket\").withSockJS();\n}\n}\n```\n\
  \n要使用 STOMP，你需要一个 STOMP 代理。基本上，这个组件负责跟踪订阅并向订阅用户广播消息。在上述配置中，请注意以下几点：\n\n*   通过声明两个目的地\
  \ `/queue/` 和 `/topic/`，启用了内存中的 STOMP 代理。这有助于开发阶段，但不建议用于生产环境（当你稍后学习本书中的多节点架构时，就会明白原因）。\n\
  \n![A453568_1_En_10_Figc_HTML.jpg](img/A453568_1_En_10_Figc_HTML.jpg) 在 STOMP 规范中，目的地的含义有意保持不透明。它可以是任何字符串，完全由\
  \ STOMP 服务器来定义其支持的目的地的语义和语法（例如，RabbitMQ 定义了点号表示法，其中目的地名称应由点号分隔，如 `/topic/public.messages`）。然而，目的地通常是类似路径的字符串，其中\
  \ `/topic/` 表示发布-订阅²模式（一对多），而 `/queue/` 表示点对点³（一对一）消息交换。\n\n![A453568_1_En_10_Figd_HTML.jpg](img/A453568_1_En_10_Figd_HTML.jpg)\
  \ `/queue/` 和 `/topic/` 是代理目的地，这意味着任何发送到以这些前缀开头的目的地的帧都将由 STOMP 代理直接处理。\n\n*   应用目的地前缀是\
  \ `/app`。基本上，当帧被发送到以 `/app` 开头的目的地时，带有 `@Controller` 注解的类会在将帧转发给代理之前处理它。更具体地说，`@Controller`\
  \ 注解类中带有 `@MessageMapping` 注解的方法将处理它（如果你还不理解，不用担心）。\n*   客户端将使用 JavaScript 连接到 STOMP\
  \ 端点（`ws://localhost:port/stompwebsocket`）。\n\n现在，在客户端，有一些 JavaScript 代码，如下所示：\n\
  \n```\nfunction connect() {\nsocket = new SockJS('/stompwebsocket');\nstompClient\
  \ = Stomp.over(socket);\nstompClient.connect({ }, function(frame) {\nstompClient.subscribe('/topic/public.messages',\
  \ renderPublicMessages);\n});\n}\nfunction renderPublicMessages(message) {\n//例如，将消息追加到一个\
  \ div 中\n}\nfunction sendMessage() {\nvar instantMessage;\ninstantMessage = {\n\
  'text' : inputMessage.val(),\n'toUser' : spanSendTo.text()\n}\nstompClient.send(\"\
  /app/send.message\",  {},  JSON.stringify(instantMessage));\n}\n```\n\n让我们理解一下这里发生了什么。\n\
  \n*   当调用 `connect` 函数时，会使用 STOMP 作为子协议打开一个新的 WebSocket 连接。\n*   在成功回调中，执行一个匿名函数，用户订阅了\
  \ `/topic/public.messages` 目的地。从现在起，该用户将能够接收发送到该目的地的任何消息（来自任何客户端甚至服务器端），并将其传递给 `renderPublicMessages`\
  \ 函数，该函数会将消息追加到一个 `div` 中，例如。\n*   当调用 `sendMessage` 函数时，会向 `/app/send.message`\
  \ 目的地发送一个包含消息的帧。还记得吗，发送到以 `/app` 开头的目的地的每条消息都将由 `@Controller` 注解类中的 `@MessageMapping`\
  \ 方法处理？这就是处理它的方法：\n\n\n\n```\n    @Controller\n    public class ChatRoomController\
  \ {\n    @Autowired\n    private SimpMessagingTemplate simpMessagingTemplate;\n\
  \    @MessageMapping(\"/send.message\")\n    public void sendPublicMessage(InstantMessage\
  \ instantMessage) {\n    simpMessagingTemplate.convertAndSend(\"/topic/public.messages\"\
  ,   instantMessage);\n    }\n    }\n    ```\n\nSpring 会将帧内容转换为 `instantMessage`\
  \ 对象，并调用 `sendPublicMessage` 方法，该方法使用 `SimpMessagingTemplate` 中的 `convertAndSend`\
  \ 方法将消息广播到 `/topic/public.messages` 目的地。还记得所有以 `/topic/` 开头的内容都是代理目的地吗？那么，谁来处理这条消息呢？没错，就是代理！实际上，代理会接收这条消息，并将其转发给该目的地的每个订阅用户（包括发送消息的用户，因为该用户也订阅了这个目的地，正如你在之前的\
  \ JavaScript 匿名函数中看到的那样）。\n\n好了，就是这样。通过这些简单的代码示例，你就能在 Spring 框架上使用基于 STOMP 的 WebSocket\
  \ 发送和接收公共消息了。这真是太棒了！\n\n![A453568_1_En_10_Fige_HTML.jpg](img/A453568_1_En_10_Fige_HTML.jpg)\
  \ 如果 `sendPublicMessage` 返回任何对象（例如 `instantMessage` 对象），Spring 会自动将其解释为你希望将该对象发送到代理目的地。按照惯例，它会尝试将其发送到\
  \ `/topic/public.messages` 目的地，因为消息是通过 `/chatroom/public.messages` 目的地接收的（这是一种约定），但你也可以使用\
  \ `@SendTo` 注解轻松更改目标代理目的地。就我个人而言，我认为使用 `simpMessagingTemplate` 能让阅读代码的人更容易理解，但这取决于你的选择。\n\
  \n## 10.3 使用简单代理的消息流\n\n图 10-1 展示了使用简单代理的消息流。这张图乍一看可能令人困惑，但这正是你刚刚了解到的流程。\n\n![A453568_1_En_10_Fig1_HTML.jpg](img/A453568_1_En_10_Fig1_HTML.jpg)\n\
  \n图 10-1.\n\n消息流：简单代理\n\n当你通过基于 STOMP 的 WebSocket 发送一个帧时，消息首先会到达 `clientInboundChannel`。在那里，它会根据目的地名称被路由到特定的\
  \ `MessageHandler`。如果名称以 `/app` 开头，则会被路由到 `SimpAnnotationMethod` 消息处理器（该处理器最终会调用\
  \ `@Controller` 类中带有 `@MessageMapping` 注解的方法）。如果名称以 `/topic` 开头，则会被直接路由到 SimpleBroker⁴\
  \ 消息处理器。\n\n让我们看一个帧 `SEND /app/a` 的例子。首先，`clientInboundChannel` 会接收它并将其转发给 `SimpAnnotationMethod`\
  \ 消息处理器。然后，从带有 `@MessageMapping` 注解的方法中，消息会被转发到 `brokerChannel`。这会将消息发送给 `SimpleBroker`\
  \ 消息处理器。该消息处理器维护着一个 `ConcurrentHashMap`，其中包含每个已连接客户端的 WebSocket 会话 ID，以及 `SubscriptionRegistry`（内存中）中的所有订阅。然后，消息处理器使用\
  \ WebSocket 客户端 ID 将消息转发到相应的 `clientOutboundChannel`，最终将消息发送给客户端。\n\n![A453568_1_En_10_Figf_HTML.jpg](img/A453568_1_En_10_Figf_HTML.jpg)\
  \ 请注意，使用简单代理方法时，订阅信息保存在内存中。\n\n## 10.4 使用完整外部 STOMP 代理的消息流\n\n图 10-2 展示了相同的消息流，不同之处在于，消息处理器不再将订阅信息保存在内存中，而是将订阅委托给一个外部\
  \ STOMP 代理。你能理解为什么这如此重要吗？你将在下一章中了解原因！\n\n![A453568_1_En_10_Fig2_HTML.jpg](img/A453568_1_En_10_Fig2_HTML.jpg)\n\
  \n图 10-2.\n\n消息流：完整外部 STOMP 代理\n\n![A453568_1_En_10_Figg_HTML.jpg](img/A453568_1_En_10_Figg_HTML.jpg)\
  \ 查看可用的 STOMP 代理列表⁵。\n\n![A453568_1_En_10_Figh_HTML.jpg](img/A453568_1_En_10_Figh_HTML.jpg)\
  \ 在聊天应用中，你将使用带有 STOMP 插件⁶ 的 RabbitMQ 作为完整的外部 STOMP 代理。\n\n你将在第 3 部分“按功能编码”中了解更多关于\
  \ Spring WebSocket 的内容。\n\n脚注 1\n\n[`https://github.com/sockjs`](https://github.com/sockjs)\n\
  \n  2\n\n[`www.enterpriseintegrationpatterns.com/patterns/messaging/PublishSubscribeChannel.html`](http://www.enterpriseintegrationpatterns.com/patterns/messaging/PublishSubscribeChannel.html)\n\
  \n  3\n\n[`www.enterpriseintegrationpatterns.com/patterns/messaging/PointToPointChannel.html`](http://www.enterpriseintegrationpatterns.com/patterns/messaging/PointToPointChannel.html)\n\
  \n  4\n\n[`https://github.com/spring-projects/spring-framework/blob/master/spring-messaging/src/main/java/org/springframework/messaging/simp/broker/SimpleBrokerMessageHandler.java`](https://github.com/spring-projects/spring-framework/blob/master/spring-messaging/src/main/java/org/springframework/messaging/simp/broker/SimpleBrokerMessageHandler.java)\n\
  \n  5\n\n[`https://stomp.github.io/implementations.html`](https://stomp.github.io/implementations.html)\n\
  \n  6\n\n[`https://www.rabbitmq.com/web-stomp.html`](https://www.rabbitmq.com/web-stomp.html)\n\
  \n\n\n"
- '# 11. 单节点聊天架构


  图 11-1 展示了单节点聊天应用的简化架构图。如果你按照第 2 章的步骤操作，这张图正是你本地机器上当前运行的内容。


  ![A453568_1_En_11_Fig1_HTML.jpg](img/A453568_1_En_11_Fig1_HTML.jpg)


  图 11-1.


  单节点聊天应用


  当你注册新账户时，用户信息会存储在 MySQL 中，并且系统会为用户分配 `ROLE_USER` 角色，这意味着该用户无权创建新的聊天室。


  登录后，系统会显示所有可用聊天室的列表。聊天室及其关联的用户以 Redis 哈希¹ 数据类型存储在 Redis 中。基本上，Redis 哈希是一种数据结构，允许你将多个
  `key : value` 条目关联到一个唯一的键。在以下示例中，唯一键是 `chatrooms:c4f045bb-8dfd-4620-b365-fd3b4fbeb46e`：


  ```

  HGETALL chatrooms:c4f045bb-8dfd-4620-b365-fd3b4fbeb46e

  "id" : "c4f045bb-8dfd-4620-b365-fd3b4fbeb46e"

  "name" : "Top Guitarists"

  "description" : "Meet the most amazing guitarists"

  ```


  ![A453568_1_En_11_Figa_HTML.jpg](img/A453568_1_En_11_Figa_HTML.jpg) `HGETALL` ²
  是 Redis 命令，用于获取一个哈希及其关联的所有 `key : value` 条目。


  当你加入一个聊天室时，客户端会执行一段 JavaScript 代码片段。它会通过 STOMP 协议启动一个 WebSocket 连接到聊天服务器。如果连接失败，它将每十秒重试一次。


  ```

  function connect() {

  socket = new SockJS(''/ws'');

  stompClient = Stomp.over(socket);

  stompClient.connect({ ''chatRoomId'' : chatRoomId }, stompSuccess, stompFailure);

  }

  function stompFailure(error) {

  errorMessage("Lost connection to WebSocket! Reconnecting in 10 seconds...");

  disableInputMessage();

  setTimeout(connect, 10000);

  }

  ```


  正如你所了解的，WebSocket 连接建立后，所有通信都通过 WebSocket 连接进行，而非 HTTP 请求。


  ```

  function stompSuccess(frame) {

  enableInputMessage();

  successMessage("Your WebSocket connection was successfully established!")

  stompClient.subscribe(''/chatroom/connected.users'', updateConnectedUsers);

  stompClient.subscribe(''/chatroom/old.messages'', oldMessages);

  stompClient.subscribe(''/topic/'' + chatRoomId + ''.public.messages'', publicMessages);

  stompClient.subscribe(''/user/queue/'' + chatRoomId + ''.private.messages'', privateMessages);

  stompClient.subscribe(''/topic/'' + chatRoomId + ''.connected.users'', updateConnectedUsers);

  }

  ```


  WebSocket 连接一启动，就会发生以下主要事件：


  *   客户端请求获取与该聊天室关联的已连接用户及其历史消息（整个对话记录）。对话记录从 Cassandra 中获取。

  *   客户端还会订阅以下更新通知：用户加入或离开聊天室、发送公共消息、或用户收到私密消息。


  在服务器端，一旦用户连接，Redis 中的聊天室信息会更新，以添加新连接的用户。


  在聊天室中，用户看到的所有消息（公共消息、私密消息和系统消息）都会被追加到 Cassandra 中该用户的对话记录里。


  ![A453568_1_En_11_Figb_HTML.jpg](img/A453568_1_En_11_Figb_HTML.jpg) 系统消息是由管理员发送的公共消息，用于通知所有人有用户加入或离开了聊天室。


  请注意，在单节点架构中，从功能角度来看，内存代理方法可以完美运行，因为每个订阅都会保存在服务器的内存中，并且每个 WebSocket 连接也会绑定到同一台服务器。


