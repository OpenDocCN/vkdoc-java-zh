    `createChatRoom` 方法。该方法将使用 `chatRoomService` 组件将 `chatroom` 对象保存到 Redis 中。之后，`createChatRoom`
    方法会将新的 `chatroom` 对象转换为 JSON 表示形式，并将其连同 `HTTP 201 CREATED` 状态码一起附加到 HTTP 响应体中（这就是你使用
