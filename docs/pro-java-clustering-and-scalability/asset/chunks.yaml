    Juliana’s daily support and patience. Thank you so much. I love you! Introduction


    My name is Jorge Acetozi, and I’m a Brazilian software engineer who has worked
    for many years as a Java developer. During my career, I have been interested in
    subjects such as these:


    *   Linux

    *   Distributed systems

    *   Testing automation

    *   Continuous integration

    *   Continuous delivery

    *   Cloud computing

    *   Virtualization

    *   Containerization

    *   Security


    Why the varied interests? I just didn’t feel that coding in Java only was enough
    for me professionally (although doing this while following best practices is not
    an easy task). I wanted to understand the entire process of creating software
    and delivering it to a production environment.


    So, some years ago I started a career as a DevOps engineer.


    After taking these two paths, I’ve noticed there are two types of software engineer.
    In the first group are developers who usually don’t feel excited by infrastructure
    subjects and merely want to write code following best practices. However, this
    means they are not able to maintain a production environment since it involves
    much more than just writing software code.


    In the second group are infrastructure people who usually hate writing software
    code (note that writing small scripts to automate infrastructure tasks are quite
    different than writing software code). On the other hand, these people are able
    to maintain a production environment because they understand the deployment process,
    how to monitor the servers, how to handle security issues, and so on.


    The software engineer I’m trying to become sits right in the middle of these types
    of developers and infrastructure folks. I’d like to be an excellent programmer
    who follows coding best practices, but I also want to be able to put code into
    production and maintain it.


    ## Why I Wrote This Book


    This is a programming book but with many interesting infrastructure discussions
    and tips. I have coded an entire chat application using the Spring Framework,
    WebSocket, Cassandra, Redis, RabbitMQ, and MySQL, and I discuss how you can horizontally
    scale this application implementing a WebSocket multinode architecture. In my
    opinion, this is what makes this book different from others.


    My objective when writing this book was to bring you a new experience by mixing
    a lot of development code with interesting and didactic infrastructure discussions.
    I’m sure you’ll really enjoy it!


    To keep in touch with me, please follow me on the following:


    *   [My web site](https://www.jorgeacetozi.com/) [¹](#A453568_1_En_BookFrontmatter_OnlinePDF.html#Fn1)

    *   [GitHub](https://github.com/jorgeacetozi) [²](#A453568_1_En_BookFrontmatter_OnlinePDF.html#Fn2)

    *   [Twitter](https://twitter.com/jorgeacetozi) [³](#A453568_1_En_BookFrontmatter_OnlinePDF.html#Fn3)

    *   [Facebook](https://www.facebook.com/jorgeacetozi) [⁴](#A453568_1_En_BookFrontmatter_OnlinePDF.html#Fn4)


    ## Who This Book Is For


    This book is suitable for every software developer with at least a few years of
    experience. In other words, this is not a book to learn the basics of Spring,
    JUnit, and Mockito, for example.


    All the code in the chat application is explained in detail, except the very basics.
    Just to give an idea of what I’m talking about, take a look at this example:


    ```

    @Configuration

    @EnableScheduling

    @EnableWebSocketMessageBroker

    public class WebSocketConfigSpringSession extends AbstractSessionWebSocketMessageBrokerConfigurer  {

    @Value("${ebook.chat.relay.host}")

    private String relayHost;

    @Value("${ebook.chat.relay.port}")

    private Integer relayPort;

    protected void configureStompEndpoints(StompEndpointRegistry registry) {

    registry.addEndpoint("/ws").withSockJS();

    }

    public void configureMessageBroker(MessageBrokerRegistry registry) {

    registry.enableStompBrokerRelay("/queue/",  "/topic/")

    .setUserDestinationBroadcast("/topic/unresolved.user.dest")

    .setUserRegistryBroadcast("/topic/registry.broadcast")

    .setRelayHost(relayHost)

    .setRelayPort(relayPort);

    registry.setApplicationDestinationPrefixes("/chatroom");

    }

    }

    ```


    For this code snippet, I would explain everything but the `@Configuration` and
    `@Value` annotations, which are basic parts of Spring.


    This doesn’t mean you can’t read this book and consult other resources when you
    feel it’s needed (by the way, I provide a lot of resources in this book).'
