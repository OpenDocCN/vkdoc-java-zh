    # 26. Splitting Unit Tests from Integration Tests Using Maven Plug-ins


    Remember from Chapter [23](#A453568_1_En_23_Chapter.html) that different types
    of tests have different feedback levels (and hence different performances)? Let’s
    verify this in practice now.


    Open a terminal window, go to the `ebook-chat` directory, and issue the following
    command:


    ```

    $ mvn test

    ```


    This will execute the class `UnitTestsSuite.java`, that is, all the unit tests.
    Note how fast it is to execute these unit tests.


    Now issue the following command:


    ```

    $ mvn verify

    ```


    This will execute both `UnitTestsSuite.java` and `IntegrationTestsSuite.java`.
    Note how integration tests take much more time to run.


    ![A453568_1_En_26_Figa_HTML.jpg](A453568_1_En_26_Figa_HTML.jpg) This will work
    only if you followed the steps in Chapter [2](#A453568_1_En_2_Chapter.html). Note
    that the integration tests will start Docker containers for Cassandra, Redis,
    MySQL, and RabbitMQ, so none of these containers must be running on your machine
    when you issue the `mvn verify` command because that would cause port conflicts.


    ![A453568_1_En_26_Figb_HTML.jpg](A453568_1_En_26_Figb_HTML.jpg) You can also run
    the integration tests by invoking the `mvn integration-test` command.


    It may be a good idea to run the unit tests separate from the integration tests
    in some cases. To get faster feedback (when something crashes perhaps) while you
    are writing code, you can run the unit tests as many times as you need without
    “losing time” waiting for integration tests. (Just don’t forget to run both the
    unit and integration tests at least once before committing the code.)


    ## 26.1 Maven Surefire Plug-in


    When using Apache Maven to manage the application build life cycle, you can use
    plug-ins to customize the behavior.


    ![A453568_1_En_26_Figc_HTML.jpg](A453568_1_En_26_Figc_HTML.jpg) Apache Maven is
    extensible, so you could even create your own Maven plug-in[¹](#A453568_1_En_26_Chapter.html#Fn1)
    if needed.


    You can use the Maven Surefire plug-in[²](#A453568_1_En_26_Chapter.html#Fn2) during
    the Maven test phase of the build life cycle to execute the unit tests of an application.
    Here is the plug-in configuration being used in the chat app’s `pom.xml` file:


    ```

    org.apache.maven.plugins

    maven-surefire-plugin


    **/UnitTestsSuite.java


    ```


    Note that the configuration is quite simple. It just includes the `UnitTestsSuite.java`
    JUnit suite to run all the unit tests when the `maven test` command is issued.
    That’s it for unit tests!


    ## 26.2 Maven Failsafe Plug-in


    The Maven Failsafe plug-in[³](#A453568_1_En_26_Chapter.html#Fn3) is designed to
    manage integration tests. Here is its configuration:


    ```

    org.apache.maven.plugins

    maven-failsafe-plugin


    **/UnitTestsSuite.java

    **/IntegrationTestsSuite.java


    ```


    Similarly, it includes the `UnitTestsSuite.java` and `IntegrationTestsSuite.java`
    JUnit suites to run all the unit and integration tests when the `mvn integration-test`
    or `mvn verify` command is issued .


    Footnotes [1](#A453568_1_En_26_Chapter.html#Fn1_source)


    [`https://maven.apache.org/plugin-developers/index.html`](https://maven.apache.org/plugin-developers/index.html)


      [2](#A453568_1_En_26_Chapter.html#Fn2_source)


    [`http://maven.apache.org/surefire/maven-surefire-plugin/`](http://maven.apache.org/surefire/maven-surefire-plugin/)


      [3](#A453568_1_En_26_Chapter.html#Fn3_source)


    [`http://maven.apache.org/surefire/maven-failsafe-plugin/`](http://maven.apache.org/surefire/maven-failsafe-plugin/)


    # 27. Continuous Integration Server


    As the chat application grows, running integration tests on a developer’s machine
    becomes a boring task because it starts consuming a lot of time. Can you see the
    problem that could emerge? The application has good test coverage, but the developer
    doesn’t run the tests because they take too much time (the developer’s machine
    is not a powerful server, right?). Well, having tests and not running them is
    the same as not having tests, and you already know that having no tests is not
    a good idea!


    It would be reasonable to run all the application tests every time the source
    code changes in the version control system, wouldn’t it? But you already saw that
    a developer’s machine may not be the best place to do this. So, what if you start
    a dedicated server that automatically does this for you every time a new commit
    emerges in the version control system? That would be amazing! That’s exactly what
    a continuous integration (CI) server is used for (and more!). There are many tools
    that allow you to set up a CI server on a machine or a cluster of machines. Probably
    the most well-known is Jenkins[¹](#A453568_1_En_27_Chapter.html#Fn1) because it
    has a great community and a huge number of plug-ins.


    Footnotes [1](#A453568_1_En_27_Chapter.html#Fn1_source)


    [`https://jenkins.io/`](https://jenkins.io/)


    ## Appendix


    Here you will find topics that do not fit perfectly into the main content of this
    book.


    ### Resource Bundle


    The chat application is able to display the text in two languages, English and
    Portuguese.'
