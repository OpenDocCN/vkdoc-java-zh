  trans: '

    ## 12.1 将 RabbitMQ 用作完整的外部 STOMP 代理


    现在，如果你开始使用像 RabbitMQ 这样的完整外部 STOMP 代理，你将遇到如图 12-2 所示的场景。


    ![A453568_1_En_12_Fig2_HTML.jpg](img/A453568_1_En_12_Fig2_HTML.jpg)


    图 12-2.


    两个聊天实例：代理中继


    现在，订阅不再绑定到特定的服务器实例；也就是说，订阅不再保存在服务器的内存中。有一个外部组件负责处理订阅。针对此场景的 Spring 配置如下所示：


    ```

    protected void configureStompEndpoints(StompEndpointRegistry registry) {

    registry.addEndpoint("/ws").withSockJS();

    }

    public void configureMessageBroker(MessageBrokerRegistry registry) {

    registry.enableStompBrokerRelay("/queue/",  "/topic/")

    .setUserDestinationBroadcast("/topic/unresolved.user.dest")

    .setUserRegistryBroadcast("/topic/registry.broadcast")

    .setRelayHost(relayHost)

    .setRelayPort(relayPort);

    registry.setApplicationDestinationPrefixes("/chatroom");

    }

    ```


    让我们来看看这些配置：


    *   **enableStompBrokerRelay**：此配置使用一个完整的外部 STOMP 代理，而不是内存中的代理。

    *   **setRelayHost 和 setRelayPort**：这两个配置分别用于设置外部 STOMP 代理（本例中为 RabbitMQ）的主机和端口。

    *   **setUserDestinationBroadcast**：用户目标可能因为用户连接到不同的服务器（例如 Jorge 和 Xuxa）而无法解析。在这种情况下，此目标用于广播未解析的消息，以便其他服务器有机会尝试处理。

    *   **setUserRegistryBroadcast**：此配置设置一个目标，用于广播本地用户注册表（内存中存储已连接客户端的位置）的内容，并监听来自其他服务器的此类广播。在多节点架构中，这允许每个服务器的用户注册表知晓连接到其他服务器的用户。换句话说，它使聊天应用
    1 能够知晓 Xuxa 存在于聊天应用 2 中。


    当应用程序启动时，只有 `/topic/unresolved.user.dest` 和 `/topic/registry.broadcast` 这两个目标会在
    RabbitMQ 上创建。Spring 在服务器和 RabbitMQ 之间保持一个“系统”TCP 连接，该连接不用于用户消息；它仅用于服务器和代理之间的内部通信（例如，默认情况下每十秒发送一次心跳消息以检查代理是否存活）。如果
    Spring 检测到代理发生故障，则默认情况下它将每五秒尝试重新连接一次。


    对于每个新的 WebSocket 连接，服务器都会与代理创建一个新的 TCP 连接。这个连接才是实际用于用户消息的连接。


    现在，你已经有了一个适用于多节点架构的解决方案，你可以将更多聊天应用实例添加到像 Nginx¹ 这样的负载均衡器后面，从而获得一个高度可扩展的架构，如图 12-3
    所示。


    ![A453568_1_En_12_Fig3_HTML.jpg](img/A453568_1_En_12_Fig3_HTML.jpg)


    图 12-3.


    多节点聊天架构


    请注意，此架构的每个组件都可以集群化，并且可以实现复制策略。这意味着即使某些节点发生故障，此架构也能继续工作。这真是太棒了！


    ![A453568_1_En_12_Figa_HTML.jpg](img/A453568_1_En_12_Figa_HTML.jpg) 在处理可扩展性时，有许多方面需要考虑，例如，增加操作系统能够使用的套接字描述符数量。你必须记住，水平扩展非常出色，但在向基础设施添加更多节点（以及更多成本）之前，你可以尝试许多其他方法。


    脚注 1


    [`https://www.nginx.com/blog/websocket-nginx/`](https://www.nginx.com/blog/websocket-nginx/)


    # 13. 水平扩展有状态 Web 应用


    让我们暂时忘记 WebSocket 技术，思考一下传统的 Web 应用。你已经了解了请求/响应 HTTP 模型，并且知道 HTTP 是无状态的。这意味着，在服务器对请求给出响应后，它会关闭
    TCP 连接，并且不再知道关于客户端的任何信息（甚至不知道客户端是否会发出其他请求）。这在某些情况下可能有效，但试想一个在线商店。如果 HTTP 是无状态的，商店如何能够在多个请求之间保持购物车中的商品呢？为了解决这个问题，Web
    服务器提供了一种 HTTP 会话机制，它本质上是每个用户的本地存储，并与一个特定的代码（在 Java 中，是 `JSESSIONID` 代码）相关联。当用户向服务器发送第一个请求时，服务器会创建一个新的
    HTTP 会话，并通过 cookie 将 `JSESSIONID` 代码发送给用户。如果客户端发送第二个请求，`JSESSIONID` 代码将在 HTTP
    请求中可用，服务器将能够识别出这是一个回访用户。这意味着，如果购物车存储在 HTTP 会话中，服务器将能够在多个请求之间保持它。


    这听起来不错，但在涉及水平扩展时，这是一个大问题。你能猜到为什么吗？如果一个在线商店的多节点架构是使用负载均衡器实现的，并且一个名为 Jorge 的用户将其购物车存储在服务器
    1 的 HTTP 会话中，而在下一个请求中，负载均衡器将其发送到服务器 2，会发生什么？他的购物车在那里将不可用，对吧？（见图 13-1。）


    ![A453568_1_En_13_Fig1_HTML.jpg](img/A453568_1_En_13_Fig1_HTML.jpg)


    图 13-1.


    没有会话管理器的多节点在线商店

    '
- fmt: "# 13.1 Using the Sticky Session Strategy\n\nYou may be thinking, “OK, but\
    \ what if the load balancer always sends the requests from a specific user to\
    \ a specific server? Then the user’s HTTP session will always be there. Hence,\
    \ the user’s shopping cart will always be available across requests until this\
    \ HTTP session expires.” You are absolutely correct, and this is what you would\
    \ call a sticky session strategy. But the problem arises again when you think\
    \ of a node failure scenario.\n\nImagine that a load balancer is using the sticky\
    \ session strategy and every user request is being routed to the same server.\
    \ Everything is working flawlessly. But suddenly this server crashes (meaning\
    \ the user’s HTTP session is gone), and the load balancer is forced to forward\
    \ the user to another server. What happens then? Again, the user’s shopping cart\
    \ is lost.\n\nAlso, what would happen if the developers deploy a new version of\
    \ the online store application while the user is online? Well, there is no magic\
    \ that takes place; the server will have to be restarted in order to apply the\
    \ new release version, so what would happen with the user’s HTTP session again?\
    \ You already know the answer. But…you also already know the solution because\
    \ this is similar to what you already did regarding the WebSocket technology when\
    \ adding RabbitMQ as a full external STOMP broker to your architecture.\n\nWhy\
    \ don’t you persist the HTTP sessions in your already working relational database?\
    \ Well, that’s pretty much the same as the scenario used in Chapter [7](#A453568_1_En_7_Chapter.html)\
    \ in the “Redis Overview” section. Do you remember that querying a relational\
    \ database is much more expensive than querying an in-memory solution such as\
    \ Redis?\n\nFigure [13-2](#A453568_1_En_13_Chapter.html#Fig2) shows the architecture\
    \ using Redis as the session manager. Don’t you think that now the architecture\
    \ looks much better? If a node crashes and the load balancer redirects the user\
    \ to another server instance, there is no problem. The server will notice that\
    \ it doesn’t have locally this specific `JSESSIONID` code associated with any\
    \ user’s HTTP session, so it will query Redis looking for it. Once it finds the\
    \ user’s session on Redis, it brings it back to the server’s memory, and everything\
    \ keeps working. The load balancer now will continue sending requests to this\
    \ server because it’s using a sticky session. The user doesn’t even know that\
    \ all these things happened behind the scenes. Good shopping, dear user!\n\n![A453568_1_En_13_Fig2_HTML.jpg](A453568_1_En_13_Fig2_HTML.jpg)\n\
    \nFigure 13-2. Multinode online store with Redis as session manager\n\nThe question\
    \ now is, how would you implement this mechanism on the server side so that it\
    \ fetches Redis for HTTP sessions? Well, if you use the Spring Framework, there\
    \ is the amazing Spring Session[¹](#A453568_1_En_13_Chapter.html#Fn1) subproject\
    \ that takes care of this for you. It’s insanely easy to use Spring Session along\
    \ with Redis, especially when you are setting up configurations with the help\
    \ of Spring Boot.\n\n## 13.2 Spring Session and WebSocket\n\nYou are using Spring\
    \ Session in the chat application to store HTTP sessions on Redis, but here the\
    \ scenario is a little bit different.\n\nIn Spring, when you open a new WebSocket\
    \ connection, on the server side it creates a new WebSocket session. By the way,\
    \ you already know that these WebSocket sessions are stored in the corresponding\
    \ `MessageHandler`. This WebSocket session will stay alive until one of the parts\
    \ explicitly closes it or the HTTP session expires. This is the way JSR-356[²](#A453568_1_En_13_Chapter.html#Fn2)\
    \ works.\n\n![A453568_1_En_13_Figa_HTML.jpg](A453568_1_En_13_Figa_HTML.jpg) Don’t\
    \ get confused here. The HTTP session and the WebSocket session are different\
    \ things. The HTTP session is created when the user performs the first HTTP request\
    \ to a server. However, the WebSocket session is created only after the user already\
    \ has an HTTP session associated and successfully performs the WebSocket handshake.\n\
    \nThe issue is that JSR-356 doesn’t have a mechanism for intercepting WebSocket\
    \ messages. In other words, when you are using only the WebSocket connection without\
    \ performing any HTTP requests, the server assumes that the HTTP session is inactive,\
    \ and as you know, every HTTP session has an expiration threshold. If this threshold\
    \ is crossed, then the server will kill the user’s HTTP session, and by doing\
    \ this, the user’s WebSocket connection will be gone as well.\n\nTo paraphrase\
    \ the Spring Session documentation,[³](#A453568_1_En_13_Chapter.html#Fn3) consider\
    \ an e-mail application that does much of its work through HTTP requests. Say\
    \ there is also a chat application embedded within it that works over WebSocket\
    \ APIs. If a user is actively chatting with someone, you should not time out the\
    \ `HttpSession` since that would create a pretty poor user experience. However,\
    \ this is exactly what JSR-356 does.\n\nFurthermore, according to JSR-356, if\
    \ the `HttpSession` times out, any WebSocket that was created with that `HttpSession`\
    \ and an authenticated user should be forcibly closed. This means that if you\
    \ are actively chatting in your application and are not using the `HttpSession`,\
    \ then you will also disconnect from your conversation.\n\nIn order to address\
    \ this issue, Spring Session can be configured to ensure that WebSocket messages\
    \ will keep your `HttpSession` alive. To configure Spring Session along with Spring\
    \ WebSocket in the chat app, you need to do the following:\n\n1.  Add the Spring\
    \ Session dependency in `pom.xml`.\n\n    ```\n    org.springframework.session\n\
    \    spring-session\n    ```\n\n2.  In `application.yml`, configure Spring Session\
    \ with `storage-type as redis` as follows:\n\n    ```\n    spring:\n    session:\n\
    \    store-type: redis\n    ```\n\n3.  Now, in the WebSocket configuration class,\
    \ instead of extending from `AbstractWebSocketMessageBrokerConfigurer` as you\
    \ did in Chapter [10](#A453568_1_En_10_Chapter.html) in the “WebSocket over STOMP\
    \ Configuration” section, you extend from `AbstractSessionWebSocketMessageBrokerConfigurer<ExpiringSession>`.\
    \ Also, add the `EnableScheduling` annotation to the class declaration.\n\n  \
    \  ```\n    @Configuration\n    @EnableScheduling\n    @EnableWebSocketMessageBroker\n\
    \    public class WebSocketConfigSpringSession extends AbstractSessionWebSocketMessageBrokerConfigurer\
    \ {\n    ...\n    }\n    ```\n\nThat’s it. You can pause for a coffee now, thinking\
    \ about how amazing Spring is.\n\nFootnotes\n\n[1](#A453568_1_En_13_Chapter.html#Fn1_source)\
    \ [`http://projects.spring.io/spring-session/`](http://projects.spring.io/spring-session/)\n\
    \n[2](#A453568_1_En_13_Chapter.html#Fn2_source) [`https://jcp.org/en/jsr/detail?id=356`](https://jcp.org/en/jsr/detail?id=356)\n\
    \n[3](#A453568_1_En_13_Chapter.html#Fn3_source) [`https://github.com/spring-projects/spring-session/blob/master/docs/src/docs/asciidoc/index.adoc#websocket-why`](https://github.com/spring-projects/spring-session/blob/master/docs/src/docs/asciidoc/index.adoc#websocket-why)\n\
    \n# Part 3: Code by Feature\n\nIn this part of the book, I will discuss the code\
    \ for every feature in the chat application. Again, this book is not intended\
    \ to teach the fundamentals of Spring, so I’ll assume you already have a basic\
    \ understanding of dependency injection, controllers, services, and so on.\n\n\
    ![A453568_1_En_3_Fig1_HTML.jpg](A453568_1_En_3_Fig1_HTML.jpg) If you need to improve\
    \ your skills with the Spring Framework, I recommend you check out the official\
    \ Spring Framework documentation.[¹](#A453568_1_En_3_PartFrontmatter.html#Fn1)\
    \ It offers many examples and nice tutorials as well.\n\nFootnotes\n\n[1](#A453568_1_En_3_PartFrontmatter.html#Fn1_source)\
    \ `https://spring.io/docs`"
