    # 8. The Spring Framework


    The Spring Framework is the most widely used framework for enterprise Java applications.
    It’s a complete platform with many Spring subprojects under the “Spring umbrella”
    that help you with almost anything you need. It has a great community, and it’s
    evolving much faster than Java EE (and has been since the beginning actually).


    ![A453568_1_En_8_Figa_HTML.jpg](A453568_1_En_8_Figa_HTML.jpg) In this book, I’m
    not going to explain much about the Spring Framework theory. The goal here is
    to show you how to use it in practice. In Part 3, “Code by Feature,” I’ll explain
    the code snippets step-by-step using the Spring Framework. I believe that this
    will be enough for most readers. If you still have trouble understanding this
    section, I suggest you study up on Spring before moving on. Spring has great documentation,[¹](#A453568_1_En_8_Chapter.html#Fn1)
    including many practical examples and tutorials.


    Although Spring has always been a great framework, it used to have a lot of Extensible
    Markup Language (XML) configuration, which was boring. Sometimes configuring a
    simple data source could take a whole day. Fortunately, this is not true anymore.
    Today it’s possible to use Java annotations and configuration classes to set up
    Spring beans, and as you are writing Java code, the IDE helps you a lot with autocomplete
    and many other handy features. Sometimes you do not even need to consult the docs;
    just by navigating through the classes and Javadocs you are able to write configurations.'
