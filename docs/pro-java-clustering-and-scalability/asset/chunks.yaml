    # Part 1

    Usage


    Usage


    Before looking at the architecture and the code of the chat application, let’s
    get the application up and running and configure the development environment on
    your machine so that you can get the most from this book.


    # 1. Docker


    The chat application dependencies are pretty straightforward to set up when using
    Docker. In this chapter, you’ll learn what Docker is and also how to use the main
    Docker commands to manage services running on containers.


    ![A453568_1_En_1_Figa_HTML.jpg](A453568_1_En_1_Figa_HTML.jpg) This chapter is
    intended to illustrate the basic usage of Docker for running containers. It will
    not cover important topics such as how to build Docker images, which is beyond
    the scope of this book, because you are using Docker only to set up the dependencies
    for the chat application.


    ## 1.1 Introduction to Docker


    In short, Docker allows you to easily run services on a machine. Docker guarantees
    that these services will always be in the same state across executions, regardless
    of the underlying operating system or system libraries.


    This means if you distribute version 1.0.0 of the chat application developed in
    this book as a Docker image, then it’s guaranteed that the application will behave
    the same for everyone who runs this image using Docker, regardless of whether
    they are running it on Windows, macOS, or Linux.


    Try to remember how many times you’ve heard the sentence “I don’t know what’s
    happening; it works on my machine.” When dealing with enterprise applications,
    it’s a common practice to promote an artifact (a release candidate version) through
    many environments (such as testing and staging) before eventually deploying it
    to production. In an ideal world, these environments should be mirrors of the
    production environment, but in practice, this is not what typically happens. Usually,
    these environments run on different machines, on different operating systems,
    and with different library versions, so the problem of “It works on staging; I
    don’t know why it’s not working on production” gets even worse. That’s where Docker
    turns out to be an amazing tool; it guarantees that regardless of those environment
    differences, the artifact will behave the same.


    This is perhaps the most important characteristic that Docker offers. But there
    are many more.


    *   It’s easy to run services as Docker containers. Thus, it also helps a lot
    in the development phase because you don’t have to waste time installing and configuring
    tools on your operating system.

    *   Docker is a highly collaborative tool. You can reuse Docker images that people
    build and share publicly.

    *   It encourages the infrastructure as code model because a Docker image is entirely
    described on a file called a `Dockerfile` that can (and should) be versioned.

    *   Docker has a great community, and it’s expanding quickly.


    ![A453568_1_En_1_Figb_HTML.jpg](A453568_1_En_1_Figb_HTML.jpg) Docker installation
    may vary on different operating systems, so I suggest you follow the official
    docs to install Docker[¹](#A453568_1_En_1_Chapter.html#Fn1) on your machine. Make
    sure you are installing Docker version 1.13.0 or newer.


    ## 1.2 Docker Hub


    As I mentioned, using Docker is a pretty elegant way to run services on a machine
    without having, in fact, to install them on the operating system. It accomplishes
    this by instantiating containers, which are Linux virtualizations running on the
    same kernel as the host operating system but isolated from it. For example, if
    you create a file inside a container, this file cannot be accessed from the host
    operating system (unless you specify that explicitly).


    Each container should run a specific service, which is instantiated from a Docker
    image previously built, stored, and shared on a Docker registry. The official
    public Docker registry is Docker Hub,[²](#A453568_1_En_1_Chapter.html#Fn2) where
    you can find many prebuilt images for almost everything you need.


    For instance, say you want to spin up an Elasticsearch cluster on your local machine.
    You can go to Docker Hub, type Elasticsearch into the search field , and choose
    the image that best fits your needs. Some tools have official images (maintained
    by the Docker team), and some do not. Anyone can sign up at Docker Hub, create
    their own images, and publish them publicly. This makes Docker a highly collaborative
    tool.


    ![A453568_1_En_1_Figc_HTML.jpg](A453568_1_En_1_Figc_HTML.jpg) It’s also possible
    to publish private Docker images, but you must pay for this feature if you want
    to publish more than one private image.


    ## 1.3 Image vs. Container


    Basically, Docker images are binary files that contain everything needed to run
    a specific service. When you instantiate a service from a Docker image, you say
    that you create a Docker container. As an analogy, if a Docker image is a Java
    class, then a Docker container is an object. You create a container by executing
    the `docker run` command.


    ## 1.4 Image Tags


    The `docker run` command requires that you provide the image name. Here’s an example:


    ```

    $ docker run jenkins

    ```


    Here, `jenkins` is the image name. If Docker cannot find the `jenkins` image locally,
    then it will try to pull it from Docker Hub. A Docker image can have a tag associated
    with it, which usually indicates the service version. To run a specific tag, just
    add `:` to the image name and provide the tag.


    ```

    $ docker run jenkins:2.32.3

    ```


    ![A453568_1_En_1_Figd_HTML.jpg](A453568_1_En_1_Figd_HTML.jpg) If the tag is not
    provided, Docker will try to pull the `latest` tag. A common misunderstanding
    is that the `latest` tag means the “newest image version available,” but this
    may not be true. The `latest` tag is just a tag that’s used when you don’t provide
    any other while you are building a Docker image; it doesn’t mean that it’s the
    newest version.


    When dealing with an official Docker image (like the `jenkins` image earlier),
    you do not provide a username. But if you are using a nonofficial image, you need
    to provide the owner’s username and the image name as follows:


    ```

    $ docker run username/image_name:tag

    ```'
