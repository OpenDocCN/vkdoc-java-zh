    \n# 27. 持续集成服务器\n\n随着聊天应用程序的增长，在开发者的机器上运行集成测试变成了一项乏味的任务，因为它开始消耗大量时间。您能看到可能出现的问题吗？应用程序有良好的测试覆盖率，但开发者因为测试耗时太长而不运行它们（开发者的机器不是强大的服务器，对吧？）。嗯，有测试却不运行，等同于没有测试，而您已经知道没有测试可不是个好主意！\n\
    \n每次版本控制系统中的源代码发生变化时，都运行所有应用程序测试是合理的，不是吗？但您已经看到，开发者的机器可能不是执行此操作的最佳场所。那么，如果您启动一台专用服务器，每当版本控制系统中出现新的提交时，它自动为您执行此操作，会怎么样？那将太棒了！这正是持续集成（CI）服务器的用途（而且还不止于此！）。有许多工具允许您在一台机器或一组机器上设置CI服务器。最著名的可能是Jenkins[¹](#A453568_1_En_27_Chapter.html#Fn1)，因为它拥有庞大的社区和大量的插件。\n\
