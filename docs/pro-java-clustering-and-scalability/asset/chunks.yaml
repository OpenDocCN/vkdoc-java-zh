    \ and you’re done.\n\nThe whole idea here is that you declare a method and Spring\
    \ Data dynamically implements it for you.\n\n```\npublic interface UserRepository\
    \ extends JpaRepository {\n    User findByEmail(String email);\n}\n```\n\nIf you\
    \ need a customized query, just declare your method, annotate it with `@Query`\
    \ providing the custom JPQL query, and use it.\n\n```\npublic interface UserRepository\
    \ extends JpaRepository {\n    @Query(\"select u from User u where u.name like\
    \ %?1\")\n    List findByNameEndsWith(String name);\n}\n```\n\nIt’s also possible\
    \ to create native queries.\n\n```\npublic interface UserRepository extends JpaRepository\
    \ {\n    @Query(value = \"SELECT * FROM USER WHERE EMAIL = ?1\", nativeQuery =\
    \ true)\n    User findByEmail(String email);\n}\n```\n\nOf course, for JPA repositories\
    \ to work, the `User` class must be annotated with JPA annotations. Here’s an\
    \ example:\n\n```\n@Entity\n@Table(name = \"user\")\npublic class User {\n   \
    \ @Id\n    private String username;\n    private String password;\n    private\
    \ String name;\n    private String email;\n    ...\n}\n```\n\n## 8.3 Spring Data\
    \ and NoSQL\n\nYou’ve learned that it’s essential to build modern applications\
    \ with scalability in mind. Persistence is frequently the root cause of limited\
