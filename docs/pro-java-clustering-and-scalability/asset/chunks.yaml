- fmt: "# 2. Prerequisites\n\nNow that you have an understanding of how to run Docker\
    \ containers, it’s time to set up the chat dependencies and get the application\
    \ up and running. It’s also worth mentioning that the entire project was developed\
    \ using Linux Ubuntu 14.04 LTS, although it can run on any operating system effortlessly.\
    \ You are only required to have basic experience using a Unix shell such as Bash.\n\
    \nFirst, clone the repository to your machine’s filesystem.\n\n```\n$ git clone\
    \ git@github.com:jorgeacetozi/ebook-chat-app-spring-websocket-cassandra-redis-rabbitmq.git\n\
    ```\n\n![A453568_1_En_2_Figa_HTML.jpg](A453568_1_En_2_Figa_HTML.jpg) You can find\
    \ the project source code in the `ebook-chat` directory.\n\nThe chat application\
    \ has some dependencies that must be provided to satisfy the application requirements.\
    \ Basically, the dependencies are as follows:\n\n- Cassandra 3.0\n- Redis 3.0.6\n\
    - MySQL 5.7\n- RabbitMQ 3.6 (with STOMP support)\n\nLet’s install the dependencies\
    \ as Docker containers.\n\n- Here’s how you start Cassandra 3.0:\n\n    ```\n\
    \    $ docker run -d --name cassandra -p 9042:9042 cassandra:3.0\n    ```\n\n\
    - Here’s how you start Redis 3.0.6:\n\n    ```\n    $ docker run --name redis\
    \ -d -p 6379:6379 redis:3.0.6\n    ```\n\n- Here’s how you start MySQL 5.7:\n\n\
    \    ```\n    $ docker run -d --name mysql -e MYSQL_DATABASE=ebook_chat -e MYSQL_ROOT_PASSWORD=root\
    \ -p 3306:3306 mysql:5.7\n    ```\n\n- Here’s how you start RabbitMQ 3.6 with\
    \ STOMP support:\n\n    ```\n    $ docker run -d --name rabbitmq-stomp -p 5672:5672\
    \ -p 15672:15672 -p 61613:61613 jorgeacetozi/rabbitmq-stomp:3.6\n    ```\n\n![A453568_1_En_2_Figb_HTML.jpg](A453568_1_En_2_Figb_HTML.jpg)\
    \ Note that these instructions are not mounting any volumes, so when you re-create\
    \ these containers, all the chat messages and user accounts you have created will\
    \ be lost.\n\nThe four containers are now up and running! However, there’s a more\
    \ elegant way to get them running than executing four `docker run` statements\
    \ every time: you can use Docker Compose.[¹](#A453568_1_En_2_Chapter.html#Fn1)\n\
    \nThe `docker-compose/dependencies.yml` file is a Docker Compose configuration\
    \ file that does pretty much the same thing as starting the four containers manually.\
    \ Let’s check its content.\n\n```\nversion: '3'\nservices:\nredis:\nimage: \"\
    redis:3.0.6\"\nports:\n- \"6379:6379\"\ncassandra:\nimage: \"cassandra:3.0\"\n\
    ports:\n- \"9042:9042\"\nmysql:\nimage: \"mysql:5.7\"\nports:\n- \"3306:3306\"\
    \nenvironment:\nMYSQL_ROOT_PASSWORD: root\nMYSQL_DATABASE: ebook_chat\nrabbitmq-stomp:\n\
    image: \"jorgeacetozi/rabbitmq-stomp:3.6\"\nports:\n- \"5672:5672\"\n- \"15672:15672\"\
    \n- \"61613:61613\"\n```\n\n![A453568_1_En_2_Figc_HTML.jpg](A453568_1_En_2_Figc_HTML.jpg)\
    \ Note that this configuration is a YAML file. If you have any doubts about the\
    \ YAML syntax, check the YAML specs.[²](#A453568_1_En_2_Chapter.html#Fn2)\n\n\
    You just point the `docker-compose up` command to this configuration file and\
    \ you will have all the chat dependencies up and running.\n\n```\n$ docker-compose\
    \ -f docker-compose/dependencies.yml up -d\n```\n\nIf you want to stop and destroy\
    \ these containers, you can issue the `docker-compose down` command.\n\n```\n\
    $ docker-compose -f docker-compose/dependencies.yml down\n```\n\nFootnotes [1](#A453568_1_En_2_Chapter.html#Fn1_source)\n\
    \n[`https://docs.docker.com/compose/`](https://docs.docker.com/compose/)\n\n[2](#A453568_1_En_2_Chapter.html#Fn2_source)\n\
    \n[`http://yaml.org/`](http://yaml.org/)\n\n# 3. Executing the Project Locally\n\
    \nNow that you have the dependencies up and running, it’s time to start the chat\
    \ application. For this, you just need to download the jar file and execute it.\n\
    \n![A453568_1_En_3_Figa_HTML.jpg](A453568_1_En_3_Figa_HTML.jpg) Make sure you\
    \ have at least JDK 8 installed on your machine.\n\n```\n$ wget https://github.com/jorgeacetozi/ebook-chat-app-spring-websocket-cassandra-redis/releases/download/ebook-chat-1.0.0/ebook-chat-1.0.0.jar\
    \ && java -jar ebook-chat-1.0.0.jar\n```\n\nThat’s it. Open your browser and go\
    \ to `http://localhost:8080`. Congratulations! Now you are ready to start chatting.\n\
    \n![A453568_1_En_3_Figb_HTML.jpg](A453568_1_En_3_Figb_HTML.jpg) The chat application\
    \ was created and tested using Google Chrome,[¹](#A453568_1_En_3_Chapter.html#Fn1)\
    \ so I suggest you run the application using Chrome.\n\n![A453568_1_En_3_Figc_HTML.jpg](A453568_1_En_3_Figc_HTML.jpg)\
    \ After you learn how to set up the development environment, you’ll be able to\
    \ create the jar file from the source code using Apache Maven. I just made this\
    \ release `ebook-chat-1.0.0.jar` file available to you for easy setup.\n\nFootnotes\
    \ [1](#A453568_1_En_3_Chapter.html#Fn1_source)\n\n[`https://www.google.com/chrome/`](https://www.google.com/chrome/)\n\
    \n# 4. Simulating a Conversation\n\nNow that you have the chat application up\
    \ and running, you’ll learn how to use this application as if you were a common\
    \ user.\n\nOpen a Google Chrome browser window and a new incognito window so that\
    \ you can simulate two different users. Also, use your mobile phone to simulate\
    \ a third user. On your computer, go to `http://localhost:8080`. On your mobile\
    \ phone, go to `http://YOUR_COMPUTER_IP:8080`.\n\n![A453568_1_En_4_Figa_HTML.jpg](A453568_1_En_4_Figa_HTML.jpg)\
    \ To find out your computer’s Internet Protocol (IP) address, open a terminal\
    \ window and issue the `ifconfig` command.\n\nYou should see the login page (Figure\
    \ [4-1](#A453568_1_En_4_Chapter.html#Fig1)), where you will sign in after creating\
    \ a new user account for each browser window opened.\n\n![A453568_1_En_4_Fig1_HTML.jpg](A453568_1_En_4_Fig1_HTML.jpg)\n\
    \nFigure 4-1. Login page\n\n## 4.1 Create a New Account\n\nIn each browser window,\
    \ click the link “Or create an account” to navigate to the new account page (Figure\
    \ [4-2](#A453568_1_En_4_Chapter.html#Fig2)).\n\n![A453568_1_En_4_Fig2_HTML.jpg](A453568_1_En_4_Fig2_HTML.jpg)\n\
    \nFigure 4-2. New account page\n\nCreate a different user in each browser window.\
    \ After doing this, you should be automatically redirected to the login page.\n\
    \n![A453568_1_En_4_Figb_HTML.jpg](A453568_1_En_4_Figb_HTML.jpg) This form has\
    \ many validations performed by Bean Validation[¹](#A453568_1_En_4_Chapter.html#Fn1)\
    \ and Spring validators. You’ll learn about these validations in Chapter [16](#A453568_1_En_16_Chapter.html):\
    \ New Account\n\n## 4.2 Create a New Chat Room\n\nOnly administrators are allowed\
    \ to create a new chat room, so if you sign in with any of the users you’ve just\
    \ registered, you will not be able to perform this action.\n\nBy default, the\
    \ application starts with a preconfigured admin user. This user’s credentials\
    \ are `admin` for the username and `admin` for the password.\n\nChoose any browser\
    \ window you have open and sign in with the admin user. After this, select the\
    \ top menu and then select the menu item New Chat Room (Figure [4-3](#A453568_1_En_4_Chapter.html#Fig3)).\n\
    \n![A453568_1_En_4_Fig3_HTML.jpg](A453568_1_En_4_Fig3_HTML.jpg)\n\nFigure 4-3.\
    \ New Chat Room menu item\n\nA modal box will open, as shown in Figure [4-4](#A453568_1_En_4_Chapter.html#Fig4).\n\
    \n![A453568_1_En_4_Fig4_HTML.jpg](A453568_1_En_4_Fig4_HTML.jpg)\n\nFigure 4-4.\
    \ New Chat Room box\n\nFill the fields and click the Create button. Verify that\
    \ the chat room appears in the grid (Figure [4-5](#A453568_1_En_4_Chapter.html#Fig5)).\n\
    \n![A453568_1_En_4_Fig5_HTML.jpg](A453568_1_En_4_Fig5_HTML.jpg)\n\nFigure 4-5.\
    \ Created chat room\n\nNow select the top menu and select the Logout menu item\
    \ (Figure [4-6](#A453568_1_En_4_Chapter.html#Fig6)).\n\n![A453568_1_En_4_Fig6_HTML.jpg](A453568_1_En_4_Fig6_HTML.jpg)\n\
    \nFigure 4-6. Logging out"
