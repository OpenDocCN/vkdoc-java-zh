- fmt: '# 25. Integration Tests


    Integration tests are not as straightforward to code as unit tests because they
    really need to test an entire integration. For example, to test a database integration,
    you would need to set up this database before running the tests.


    To address this issue and avoid the overhead of setting up an entire database
    just for executing a simple test, many people run integration tests with an in-memory
    database such as `H2`.


    The point here is that integration tests are more effective when running in an
    environment similar to the production environment. For example, an in-memory database
    doesn’t have all the features that `MySQL` has. Some specific `MySQL` functions
    will not be able to be tested if you are not running a `MySQL` instance, right?


    So, to make the environment as similar as possible to production, you can use
    a handy library called `testcontainers` that allows you to create Docker containers
    from inside a `JUnit` test. This is really good because the tests will run against
    real `Cassandra`, `MySQL`, `Redis`, and `RabbitMQ` volatile instances.


    ## 25.1 Setting Up Dependencies for Starting Docker Containers from JUnit


    To use `testcontainers`, first you need to declare the dependency to `pom.xml`.


    ```

    org.testcontainers

    testcontainers

    1.1.9

    ```


    The following code is executed before running the integration tests. Basically,
    it sets up Docker containers for `Cassandra`, `MySQL`, `Redis`, and `RabbitMQ`
    with `STOMP` support using the `testcontainers` library. Note that the `waitForMysqlContainerStartup`
    method assures that the integration tests will be executed only after the `MySQL`
    container is ready to receive connections.


    ```

    public class AbstractIntegrationTest {

    @ClassRule

    public static final GenericContainer cassandra = new FixedHostPortGenericContainer("cassandra:3.0")

    .withFixedExposedPort(9042, 9042);

    @ClassRule

    public static final GenericContainer mysql = new FixedHostPortGenericContainer("mysql:5.7")

    .withFixedExposedPort(3306, 3306)

    .withEnv("MYSQL_DATABASE",  "ebook_chat")

    .withEnv("MYSQL_ROOT_PASSWORD",  "root");

    @ClassRule

    public static final GenericContainer redis = new FixedHostPortGenericContainer("redis:3.0.6")

    .withFixedExposedPort(6379, 6379);

    @ClassRule

    public static final GenericContainer rabbitmq = new FixedHostPortGenericContainer("jorgeacetozi/rabbitmq-stomp:3.6")

    .withFixedExposedPort(61613,  61613)

    .withExposedPorts(61613);

    @BeforeClass

    public static void waitForMysqlContainerStartup() throws InterruptedException,
    TimeoutException {

    WaitingConsumer consumer = new WaitingConsumer();

    mysql.followOutput(consumer);

    consumer.waitUntil(frame ->

    frame.getUtf8String().contains("mysqld: ready for connections."), 90, TimeUnit.SECONDS);

    }

    }

    ```


    ## 25.2 JUnit Suites


    Setting up `Cassandra`, `MySQL`, `Redis`, and `RabbitMQ` before every test would
    require a lot of overhead and be time-consuming. To instantiate these dependencies
    only once and use them with all integration tests that are executed, you can use
    a `JUnit` suite. Basically, a `JUnit` suite is used to aggregate tests. In the
    chat application, there are two suites: `UnitTestsSuite.java` and `IntegrationTestsSuite.java`.
    Each one groups all unit and integration tests, respectively.


    ```

    @RunWith(Suite.class)

    @Suite.SuiteClasses({

    InstantMessageBuilderTest.class,

    DestinationsTest.class,

    SystemMessagesTest.class,

    RedisChatRoomServiceTest.class

    })

    public class UnitTestsSuite {

    }

    @RunWith(Suite.class)

    @Suite.SuiteClasses({

    CassandraInstantMessageServiceTest.class,

    RedisChatRoomServiceTest.class,

    DefaultUserServiceTest.class,

    AuthenticationControllerTest.class,

    ChatRoomControllerTest.class

    })

    public class IntegrationTestsSuite extends AbstractIntegrationTest {

    }

    ```


    These two `JUnit` suites will help you split unit and integration tests so that
    you can run them on different `Maven` phases.


    ## 25.3 RedisChatRoomServiceTest.java


    The `RedisChatRoomServiceTest.java` class tests the `RedisChatRoomService` class,
    which provides methods for chat room operations.


    ```

    @RunWith(SpringRunner.class)

    @EbookChatTest

    public class RedisChatRoomServiceTest {

    @Autowired private ChatRoomService chatRoomService;

    @Autowired private ChatRoomRepository chatRoomRepository;

    @Autowired private InstantMessageRepository instantMessageRepository;

    private ChatRoom chatRoom;

    @Before

    public void setup() {

    chatRoom = new ChatRoom("123", "Dream Theater", "Discuss about best band ever!");

    chatRoomService.save(chatRoom);

    }

    @After

    public void destroy() {

    chatRoomRepository.delete(chatRoom);

    instantMessageRepository.deleteAll();

    }

    @Test

    public void shouldJoinUsersToChatRoom() {

    assertThat(chatRoom.getNumberOfConnectedUsers(),  is(0));

    ChatRoomUser jorgeAcetozi = new ChatRoomUser("jorge_acetozi");

    ChatRoomUser johnPetrucci = new ChatRoomUser("john_petrucci");

    chatRoomService.join(jorgeAcetozi,  chatRoom);

    assertThat(chatRoom.getNumberOfConnectedUsers(),  is(1));

    chatRoomService.join(johnPetrucci,  chatRoom);

    assertThat(chatRoom.getNumberOfConnectedUsers(),  is(2));

    ChatRoom dreamTheaterChatRoom = chatRoomService.findById(chatRoom.getId());

    List connectedUsers = dreamTheaterChatRoom.getConnectedUsers();

    assertThat(connectedUsers.contains(jorgeAcetozi), is(true));

    assertThat(connectedUsers.contains(johnPetrucci), is(true));

    }

    @Test

    public void shouldLeaveUsersFromChatRoom() {

    ChatRoomUser jorgeAcetozi = new ChatRoomUser("jorge_acetozi");

    ChatRoomUser johnPetrucci = new ChatRoomUser("john_petrucci");

    chatRoomService.join(jorgeAcetozi, chatRoom);

    chatRoomService.join(johnPetrucci, chatRoom);

    assertThat(chatRoom.getNumberOfConnectedUsers(), is(2));

    chatRoomService.leave(jorgeAcetozi, chatRoom);

    chatRoomService.leave(johnPetrucci, chatRoom);

    assertThat(chatRoom.getNumberOfConnectedUsers(), is(0));

    }

    }

    ```


    Basically, `shouldJoinUsersToChatRoom` creates two users, `jorgeAcetozi` and `johnPetrucci`;
    it joins `jorgeAcetozi` to the chat room; and it verifies that the chat room now
    has one connected user. After that, it joins `johnPetrucci` and verifies that
    the chat room now has two connected users. Each of these `join` calls actually
    hits the `Redis` instance. Then, it fetches the chat room from `Redis` and verifies
    that both `jorgeAcetozi` and `johnPetrucci` are connected to it.


    The `shouldLeaveUsersFromChatRoom` class has pretty similar logic.'
