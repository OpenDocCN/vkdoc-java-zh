  raw: '## 8.1 Spring Boot


    Even better, a Spring subproject called Spring Boot [²](#A453568_1_En_8_Chapter.html#Fn2)
    comes in handy when dealing with configurations and bootstrapping projects. It
    takes the philosophy of convention over configuration quite seriously, so when
    bootstrapping your project with Spring Boot, minimum configuration is required
    because the defaults will satisfy your needs most of the time. Spring Boot even
    comes with embedded servlet containers such as Tomcat, Jetty, or Undertow. Basically,
    it infers from your project’s dependencies what you are going to use and automatically
    configures it for you.


    To get your enterprise application running, you just have to start a `public static
    void main` method. To start a Spring Boot application from the command line, type
    `java -jar my_application.jar` and you’re done. That was exactly what you did
    when running the chat app locally. In my opinion, Spring Boot is one of the most
    amazing subprojects of Spring. (Or would it be Spring Data? Or Spring MVC? No!
    It’s Spring Security! What about Spring WebSocket? Oh, I don’t know…well, forget
    about it, and let’s move on!)


    ![A453568_1_En_8_Figb_HTML.jpg](A453568_1_En_8_Figb_HTML.jpg) Make sure to take
    a look at the list of Spring subprojects[³](#A453568_1_En_8_Chapter.html#Fn3)
    available. It’s quite impressive, isn’t it? Indeed, it’s possible to integrate
    Spring with everything.


    ## 8.2 Spring Data JPA Repositories


    Interacting with your relational database should not throw you into a panic anymore.
    Just by configuring a data source in the `application.yml` configuration file
    and creating a Java interface extending from `JpaRepository` (which is a Spring
    Data interface), you’ll get many ready-to-use methods to manipulate your database
    using the Java Persistence API (JPA). For instance, in the chat application ,
    you have the following:


    ```

    spring:

    datasource:

    url: jdbc:mysql://localhost:3306/ebook_chat

    username: root

    password: root

    testWhileIdle: true

    validationQuery: SELECT 1

    jpa:

    show-sql: true

    hibernate:

    ddl-auto: validate

    naming-strategy: org.hibernate.cfg.ImprovedNamingStrategy

    properties:

    hibernate:

    dialect: org.hibernate.dialect.MySQL5Dialect

    public interface UserRepository extends JpaRepository {

    }

    ```


    This allows you to use the methods shown in Figure [8-1](#A453568_1_En_8_Chapter.html#Fig1).


    ![A453568_1_En_8_Fig1_HTML.jpg](A453568_1_En_8_Fig1_HTML.jpg)


    Figure 8-1.


    JpaRepository methods


    But what if, for example, you need to find a user by e-mail address? Well, you
    could simply declare a method signature respecting the Spring Data pattern,[⁴](#A453568_1_En_8_Chapter.html#Fn4)
    and you’re done.


    The whole idea here is that you declare a method and Spring Data dynamically implements
    it for you.


    ```

    public interface UserRepository extends JpaRepository {

    User findByEmail(String email);

    }

    ```


    If you need a customized query, just declare your method, annotate it with `@Query`
    [⁵](#A453568_1_En_8_Chapter.html#Fn5) providing the custom JPQL[⁶](#A453568_1_En_8_Chapter.html#Fn6)
    query, and use it.


    ```

    public interface UserRepository extends JpaRepository {

    @Query("select u from User u where u.name like %?1")

    List findByNameEndsWith(String name);

    }

    ```


    It’s also possible to create native queries.[⁷](#A453568_1_En_8_Chapter.html#Fn7)


    ```

    public interface UserRepository extends JpaRepository {

    @Query(value = "SELECT * FROM USER WHERE EMAIL = ?1", nativeQuery = true)

    User findByEmail(String email);

    }

    ```


    Of course, for JPA repositories work, the `User` class must be annotated with
    JPA[⁸](#A453568_1_En_8_Chapter.html#Fn8) annotations . Here’s an example:


    ```

    @Entity

    @Table(name = "user")

    public class User {

    @Id

    private String username;

    private String password;

    private String name;

    private String email;

    ...

    }

    ```


    ## 8.3 Spring Data and NoSQL


    You’ve learned that it’s essential to build modern applications with scalability
    in mind. Persistence is frequently the root cause of limited scalability, so choosing
    the appropriate persistence technologies is crucial.


    Spring Data provides great integration with many NoSQL tools such as Cassandra,
    Redis, Neo4J, MongoDB, Elasticsearch, and so on. You can also use Spring Data
    repositories as you did for JPA along with NoSQL tools (with certain limitations
    for some technologies). For example, in the chat app, Spring Data Cassandra repositories
    were implemented like this:


    ```

    public interface InstantMessageRepository extends CassandraRepository {

    List findInstantMessagesByUsernameAndChatRoomId(String username, String chatRoomId);

    }

    ```


    The method signature patterns work the same as explained for JPA. What actually
    changes is that the model should be annotated with Spring Data Cassandra annotations
    instead of JPA.


    ```

    import org.springframework.cassandra.core.Ordering;

    import org.springframework.cassandra.core.PrimaryKeyType;

    import org.springframework.data.cassandra.mapping.PrimaryKeyColumn;

    import org.springframework. data .cassandra.mapping.Table;

    @Table("messages")

    public class InstantMessage {

    @PrimaryKeyColumn(name = "username", ordinal = 0, type = PrimaryKeyType.PARTITIONED)

    private String username;

    @PrimaryKeyColumn(name = "chatRoomId", ordinal = 1, type = PrimaryKeyType.PARTITIONED)

    private String chatRoomId;

    @PrimaryKeyColumn(name = "date", ordinal = 2, type = PrimaryKeyType.CLUSTERED,
    ordering = Ordering.ASCENDING)

    private Date date;

    ...

    }

    ```


    The same goes for Spring Data Redis repositories . As you will see in Part 3,
    “Code by Feature,” Redis is being used in the chat app to manage the chat rooms
    and the connected users. Take a look at how the model and the repository look:


    ```

    import org.springframework.data.annotation.Id;

    import org.springframework.data.redis.core.RedisHash;

    @RedisHash("chatrooms")

    public class ChatRoom {

    @Id

    private String id;

    private String name;

    private String description;

    private List connectedUsers = new ArrayList();

    ...

    }

    public interface ChatRoomRepository extends CrudRepository {

    }

    ```


    ![A453568_1_En_8_Figc_HTML.jpg](A453568_1_En_8_Figc_HTML.jpg) Spring Data repositories
    really make your life easier, but sometimes you may need extra features that they
    don’t provide. For instance, for Spring Data Redis repositories, the technology
    maps your models only to Redis hashes, but as you’ve learned, there are many other
    data structures available in Redis. In that case, you’d have to use the Spring
    Data templates (CassandraTemplate, RedisTemplate, and so on), which are straightforward
    to use as well.


