    ```


    The tests become really easy to read when you use Hamcrest matchers. For example,
    in `shouldCreatePublicInstantMessage`, you use `InstantMessageBuilder` to build
    a public message. A message is considered to be public when the `toUser` field
    is `null`. However, in `shouldCreatePrivateInstantMessage`, the `toUser` field
    cannot be `null` .


    In `shouldCreateSystemInstantMessage`, you check that every system message is
    public and is from a user whose username is admin.


    ## 24.2 DestinationsTest.java


    The `DestinationsTest.` `java` class tests the `Destinations` class, which provides
    some static methods that return the destination names for subscribing to public
    messages, private messages, or connected users in a chat room. These tests are
    important because if someone changes the `Destination` class (even accidentally),
    all the chat room features will stop working.


    ```

    public class DestinationsTest {

    private final String chatRoomId = "123";

    @Test

    public void shouldGetPublicMessagesDestination() {

    assertThat(Destinations.ChatRoom.publicMessages("123"), is("/topic/" + chatRoomId
    + ".public.messages"));

    }

    @Test

    public void shouldGetPrivateMessagesDestination() {

    assertThat(Destinations.ChatRoom.privateMessages("123"), is("/queue/" + chatRoomId
    + ".private.messages"));

    }

    @Test

    public void shouldGetConnectedUsersDestination() {

    assertThat(Destinations.ChatRoom.connectedUsers("123"), is("/topic/" + chatRoomId
    + ".connected.users"));

    }

    }

    ```


    Basically, this class tests only if the destination names are `/topic/123.public.messages`,
    `/queue/123.private.messages`, and `/topic/123.connected.users`, respectively,
    for a given chat room ID equal to 123.


    ## 24.3 RedisChatRoomServiceTest.java


    The `RedisChatRoomServiceTest.` `java` class tests the `RedisChatRoomService`
    class, which provides methods for chat room operations.


    ```

    @RunWith(MockitoJUnitRunner.class)

    public class RedisChatRoomServiceTest {

    @InjectMocks private ChatRoomService chatRoomService = new RedisChatRoomService();

    @Mock private SimpMessagingTemplate webSocketMessagingTemplate;

    @Mock private InstantMessageService instantMessageService;

    @Captor private ArgumentCaptor destinationCaptor;

    @Captor private ArgumentCaptor instantMessageCaptor;

    @Captor private ArgumentCaptor messageObjectCaptor;

    @Test

    public void shouldSendPublicMessage() {

    ChatRoom chatRoom = new ChatRoom("123", "Dream Theater", "Discuss about best band
    ever!");

    ChatRoomUser user = new ChatRoomUser("jorge_acetozi");

    chatRoom.addUser(user);

    assertThat(chatRoom.getNumberOfConnectedUsers(), is(1));

    InstantMessage publicMessage = new InstantMessageBuilder()

    .newMessage()

    .withChatRoomId(chatRoom.getId())

    .publicMessage()

    .fromUser(user.getUsername())

    .withText("This is a public message!");

    chatRoomService.sendPublicMessage(publicMessage);

    verify(webSocketMessagingTemplate, times(1))

    .convertAndSend(

    destinationCaptor.capture(),

    messageObjectCaptor.capture());

    verify(instantMessageService, times(1))

    .appendInstantMessageToConversations(instantMessageCaptor.capture());

    String sentDestination = destinationCaptor.getValue();

    InstantMessage sentMessage = (InstantMessage) messageObjectCaptor.getValue();

    InstantMessage instantMessageToBeAppendedToConversations = instantMessageCaptor.getValue();

    assertThat(sentDestination, is(Destinations.ChatRoom.publicMessages(chatRoom.getId())));

    assertEquals(publicMessage, sentMessage);

    assertEquals(publicMessage, instantMessageToBeAppendedToConversations);

    }

    }

    ```


    The test `shouldSendPublicMessage` starts creating a new chat room and adds a
    new user (username jorge_acetozi) to it; then it creates a public message that
    will be sent from jorge_acetozi and invokes the `sendPublicMessage` method in
    the `chatRoomService` method, which is the method you really want to test. After
    this, it verifies that `webSocketMessagingTemplate` and `instantMessageService`
    were invoked only once and that the destination sent is the “public destination.”
    It also checks that the sent message is the same message that was passed to the
    `sendPublicMessage` method before and that the public message is the same that
    was passed to the `appendInstantMessageToConversations` method invocation.


