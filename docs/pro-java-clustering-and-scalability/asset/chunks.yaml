    \ at how the model and the repository look:\n\n```\nimport org.springframework.data.annotation.Id;\n\
    import org.springframework.data.redis.core.RedisHash;\n\n@RedisHash(\"chatrooms\"\
    )\npublic class ChatRoom {\n    @Id\n    private String id;\n    private String\
    \ name;\n    private String description;\n    private List connectedUsers = new\
    \ ArrayList();\n    ...\n}\n\npublic interface ChatRoomRepository extends CrudRepository\
    \ {\n}\n```\n\nSpring Data repositories really make your life easier, but sometimes\
    \ you may need extra features that they don’t provide. For instance, for Spring\
    \ Data Redis repositories, the technology maps your models only to Redis hashes,\
    \ but as you’ve learned, there are many other data structures available in Redis.\
    \ In that case, you’d have to use the Spring Data templates (`CassandraTemplate`,\
    \ `RedisTemplate`, and so on), which are straightforward to use as well.\n\nFootnotes\n\
    \n1. [`https://spring.io/docs`](https://spring.io/docs)\n2. [`https://projects.spring.io/spring-boot/`](https://projects.spring.io/spring-boot/)\n\
