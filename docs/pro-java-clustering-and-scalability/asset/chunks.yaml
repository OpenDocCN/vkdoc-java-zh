    \ JUnit套件，以便在发出`mvn integration-test`或`mvn verify`命令时运行所有单元测试和集成测试。\n\n脚注 [1](#A453568_1_En_26_Chapter.html#Fn1_source)\
    \  \n[`https://maven.apache.org/plugin-developers/index.html`](https://maven.apache.org/plugin-developers/index.html)\n\
