    \    ```\n\n*   以下是启动 MySQL 5.7 的方法：\n\n    ```\n    $ docker run -d --name mysql\
    \ -e MYSQL_DATABASE=ebook_chat -e MYSQL_ROOT_PASSWORD=root -p 3306:3306 mysql:5.7\n\
    \    ```\n\n*   以下是启动支持 STOMP 的 RabbitMQ 3.6 的方法：\n\n    ```\n    $ docker run\
    \ -d --name rabbitmq-stomp -p 5672:5672 -p 15672:15672 -p 61613:61613 jorgeacetozi/rabbitmq-stomp:3.6\n\
    \    ```\n\n![A453568_1_En_2_Figb_HTML.jpg](img/A453568_1_En_2_Figb_HTML.jpg)\
    \ 请注意，这些指令没有挂载任何卷，因此当你重新创建这些容器时，所有已创建的聊天消息和用户帐户都将丢失。\n\n现在四个容器都已启动并运行！然而，有一种比每次执行四条\
    \ `docker run` 语句更优雅的方式来启动它们：你可以使用 Docker Compose。¹\n\n`docker-compose/dependencies.yml`\
    \ 文件是一个 Docker Compose 配置文件，它基本上完成了与手动启动四个容器相同的事情。让我们检查一下它的内容。\n\n```\nversion:\
    \ '3'\nservices:\nredis:\nimage: \"redis:3.0.6\"\nports:\n- \"6379:6379\"\ncassandra:\n\
    image: \"cassandra:3.0\"\nports:\n- \"9042:9042\"\nmysql:\nimage: \"mysql:5.7\"\
    \nports:\n- \"3306:3306\"\nenvironment:\nMYSQL_ROOT_PASSWORD: root\nMYSQL_DATABASE:\
    \ ebook_chat\nrabbitmq-stomp:\nimage: \"jorgeacetozi/rabbitmq-stomp:3.6\"\nports:\n\
    - \"5672:5672\"\n- \"15672:15672\"\n- \"61613:61613\"\n```\n\n![A453568_1_En_2_Figc_HTML.jpg](img/A453568_1_En_2_Figc_HTML.jpg)\
    \ 请注意，此配置是一个 YAML 文件。如果你对 YAML 语法有任何疑问，请查看 YAML 规范。²\n\n你只需将 `docker-compose up`\
    \ 命令指向此配置文件，即可启动并运行所有聊天依赖项。\n\n```\n$ docker-compose -f docker-compose/dependencies.yml\
    \ up -d\n```\n\n如果你想停止并销毁这些容器，可以发出 `docker-compose down` 命令。\n\n```\n$ docker-compose\
    \ -f docker-compose/dependencies.yml down\n```\n\n脚注 1\n\n[`https://docs.docker.com/compose/`](https://docs.docker.com/compose/)\n\
    \n  2\n\n[`http://yaml.org/`](http://yaml.org/)\n\n# 3. 在本地执行项目\n\n现在你已经启动并运行了依赖项，是时候启动聊天应用程序了。为此，你只需要下载\
    \ jar 文件并执行它。\n\n![A453568_1_En_3_Figa_HTML.jpg](img/A453568_1_En_3_Figa_HTML.jpg)\
    \ 确保你的机器上至少安装了 JDK 8。\n\n```\n$ wget https://github.com/jorgeacetozi/ebook-chat-app-spring-websocket-cassandra-redis/releases/download/ebook-chat-1.0.0/ebook-chat-1.0.0.jar\
    \ && java -jar ebook-chat-1.0.0.jar\n```\n\n就是这样。打开你的浏览器并访问 `http://localhost:8080`。恭喜！现在你可以开始聊天了。\n\
    \n![A453568_1_En_3_Figb_HTML.jpg](img/A453568_1_En_3_Figb_HTML.jpg) 该聊天应用程序是使用\
    \ Google Chrome¹ 创建和测试的，因此我建议你使用 Chrome 运行该应用程序。\n\n![A453568_1_En_3_Figc_HTML.jpg](img/A453568_1_En_3_Figc_HTML.jpg)\
    \ 在学习了如何设置开发环境之后，你将能够使用 Apache Maven 从源代码创建 jar 文件。我提供这个 `ebook-chat-1.0.0.jar`\
    \ 版本是为了方便你进行设置。\n\n脚注 1\n\n[`https://www.google.com/chrome/`](https://www.google.com/chrome/)\n\
    \n# 4. 模拟对话\n\n现在你已经启动并运行了聊天应用程序，你将学习如何像一个普通用户一样使用这个应用程序。\n\n打开一个 Google Chrome\
    \ 浏览器窗口和一个新的隐身窗口，这样你就可以模拟两个不同的用户。另外，使用你的手机模拟第三个用户。在你的电脑上，访问 `http://localhost:8080`。在你的手机上，访问\
    \ `http://YOUR_COMPUTER_IP:8080`。\n\n![A453568_1_En_4_Figa_HTML.jpg](img/A453568_1_En_4_Figa_HTML.jpg)\
    \ 要查找你电脑的互联网协议（IP）地址，请打开一个终端窗口并发出 `ifconfig` 命令。\n\n你应该会看到登录页面（图 4-1），在为每个打开的浏览器窗口创建新用户帐户后，你将在此页面登录。\n\
    \n![A453568_1_En_4_Fig1_HTML.jpg](img/A453568_1_En_4_Fig1_HTML.jpg)\n\n图 4-1.\n\
    \n登录页面\n\n## 4.1 创建新帐户\n\n在每个浏览器窗口中，点击“或创建一个帐户”链接，导航到新帐户页面（图 4-2）。\n\n![A453568_1_En_4_Fig2_HTML.jpg](img/A453568_1_En_4_Fig2_HTML.jpg)\n\
    \n图 4-2.\n\n新帐户页面\n\n在每个浏览器窗口中创建一个不同的用户。完成此操作后，你应该会自动重定向到登录页面。\n\n![A453568_1_En_4_Figb_HTML.jpg](img/A453568_1_En_4_Figb_HTML.jpg)\
    \ 此表单包含许多由 Bean Validation¹ 和 Spring 验证器执行的验证。你将在第 16 章“新帐户”中了解这些验证。\n\n## 4.2\
    \ 创建新聊天室\n\n只有管理员才允许创建新聊天室，因此如果你使用刚刚注册的任何用户登录，你将无法执行此操作。\n\n默认情况下，应用程序启动时会有一个预配置的管理员用户。该用户的凭据是：用户名为\
    \ admin，密码为 admin。\n\n选择你打开的任何浏览器窗口，并使用管理员用户登录。之后，选择顶部菜单，然后选择菜单项“新聊天室”（图 4-3）。\n\
    \n![A453568_1_En_4_Fig3_HTML.jpg](img/A453568_1_En_4_Fig3_HTML.jpg)\n\n图 4-3.\n\
    \n新聊天室菜单项\n\n将打开一个模态框，如图 4-4 所示。\n\n![A453568_1_En_4_Fig4_HTML.jpg](img/A453568_1_En_4_Fig4_HTML.jpg)\n\
    \n图 4-4.\n\n新聊天室框\n\n填写字段并点击“创建”按钮。验证聊天室是否出现在网格中（图 4-5）。\n\n![A453568_1_En_4_Fig5_HTML.jpg](img/A453568_1_En_4_Fig5_HTML.jpg)\n\
    \n图 4-5.\n\n已创建的聊天室\n\n现在选择顶部菜单，然后选择“注销”菜单项（图 4-6）。\n\n![A453568_1_En_4_Fig6_HTML.jpg](img/A453568_1_En_4_Fig6_HTML.jpg)\n\
    \n图 4-6.\n\n正在注销\n"
- fmt: '### 4.3 Sign In


    In all three opened browser windows, sign in with the users you’ve just created,
    providing their usernames and passwords. You should be redirected to the chat
    room grid and should be able to see the previously created chat room. However,
    if you now select the top menu, you won’t be able to see the `New Chat Room` menu
    item.


    Choose one of the browser windows and change the `Language` setting to `Portuguese`.
    This is just to illustrate that Spring is able to handle internationalization
    easily. OK, change it back to `English`.


    Click the `Join` link in all three browser windows to join the chat room.


    ### 4.4 Chat Room


    Now that you are connected to the chat room from three different browser windows,
    you should see three connected users in the left sidebar (Figure [4-7](#A453568_1_En_4_Chapter.html#Fig7)).
    Note that every time a new user joins the chat room, the admin sends a system
    message to every connected user.


    ![A453568_1_En_4_Fig7_HTML.jpg](A453568_1_En_4_Fig7_HTML.jpg)


    Figure 4-7. Chat room with three connected users


    ### 4.5 Send Public Messages


    Choose one of the browser windows and enter some text in the input field. Click
    the `Send` button or hit `Return` to send the message to everybody (Figure [4-8](#A453568_1_En_4_Chapter.html#Fig8)).


    ![A453568_1_En_4_Fig8_HTML.jpg](A453568_1_En_4_Fig8_HTML.jpg)


    Figure 4-8. Public messages


    Check in the other browser windows that the message was successfully received.


    ### 4.6 Send Private Messages


    Choose one of the browser windows again and click a connected user to send a private
    message to that user. Again, enter some text in the input field and click the
    `Send` button or hit `Return` to send the private message (Figure [4-9](#A453568_1_En_4_Chapter.html#Fig9)).


    ![A453568_1_En_4_Fig9_HTML.jpg](A453568_1_En_4_Fig9_HTML.jpg)


    Figure 4-9. Private messages


    Check that the browser window with the user that was supposed to receive the private
    message indeed received the message, while the other user didn’t. In this example,
    `michael_romeo` should not receive the message sent from `john_petrucci` to `jorge_acetozi`.


    ### 4.7 Check That the Conversation Is Stored


    In the window that you just sent the private message from, select the top menu
    and then select the `Leave Chat Room` menu item. Now, join it again. You should
    see that the whole conversation is still displayed on the screen (Figure [4-10](#A453568_1_En_4_Chapter.html#Fig10)).


    ![A453568_1_En_4_Fig10_HTML.jpg](A453568_1_En_4_Fig10_HTML.jpg)


    Figure 4-10. Stored conversation


    ### 4.8 Receive Messages Even on Connection Failures


    From your computer’s browser window, click the user connected with the mobile
    phone to send a message to that user. Next, turn off WiFi on your phone. Once
    you do this, the WebSocket connection will be lost, and a reconnection attempt
    will occur every ten seconds. Go back to your computer’s browser window and send
    some private messages to the mobile user who is now offline. Then, turn on WiFi
    on your phone; wait a few seconds, and there’ll be an automatic reconnection.
    As soon as the mobile phone reconnects, all the messages that were sent while
    it was offline will be displayed. The messages weren’t lost, even on a connection
    failure event.


    Footnotes [1](#A453568_1_En_4_Chapter.html#Fn1_source)


    [`http://beanvalidation.org/1.1/spec/`](http://beanvalidation.org/1.1/spec/)


    # 5. Setting Up the Development Environment


    Configuring the development environment for this project is quite straightforward.
    In this chapter, you will install Apache Maven and import the application to the
    Eclipse integrated development environment (IDE).


    ### 5.1 Apache Maven


    The chat application uses Apache Maven[¹](#A453568_1_En_5_Chapter.html#Fn1) as
    the build automation tool. Using Maven, you can easily execute application tests,
    package the application, and do much more. Maven also manages the application
    dependencies that you declare in a special file called `pom.xml` in your Maven
    project.


    The installation on Linux Ubuntu is pretty straightforward because you can use
    the Advanced Packaging Tool (`apt`) to install it.


    ```

    $ sudo apt-get update && sudo apt-get install maven

    ```


    ![A453568_1_En_5_Figa_HTML.jpg](A453568_1_En_5_Figa_HTML.jpg) To install Apache
    Maven on other operating systems, follow the steps in the [official](https://maven.apache.org/install.html)
    installation guide.[²](#A453568_1_En_5_Chapter.html#Fn2) Make sure you are installing
    Apache Maven 3.0 or newer.


    Once you’ve installed Maven on your machine, navigate to the `ebook-chat` directory
    inside the repository you’ve cloned and issue this command:


    ```

    $ mvn test

    ```


    This will execute the unit tests for the chat application. You will learn more
    about Maven usage throughout the book.


    ### 5.2 Import the Project into the Eclipse IDE


    Of course, you can use any IDE you like (such as Eclipse, IntelliJ, NetBeans,
    or whatever). Here, I’ll show how to import the project into the Eclipse IDE.
    I won’t cover how to install the Eclipse IDE because basically you only have to
    download and extract it.


    After you open the Eclipse IDE, select `File` ➤ `Import`, select the `Maven` folder,
    select the `Existing Maven Projects` option (Figure [5-1](#A453568_1_En_5_Chapter.html#Fig1))
    and then click `Next`.


    ![A453568_1_En_5_Fig1_HTML.jpg](A453568_1_En_5_Fig1_HTML.jpg)


    Figure 5-1. Importing a Maven project


    In the next screen, just select the `ebook-chat` folder and click `Finish`. That’s
    it! Now you should have the following tools installed on your local machine:


    *   Docker 1.13.0 or newer

    *   Docker Compose 1.11.2 or newer

    *   Google Chrome

    *   Java Development Kit (JDK) 8

    *   Apache Maven 3 or newer

    *   Eclipse IDE


    In the next chapter, you’ll take a dive deep into the chat architecture and get
    an overview of the Spring Framework, WebSocket, Cassandra, Redis, and RabbitMQ,
    as well as how to scale the application to a multinode architecture using Nginx
    as a load balancer and RabbitMQ as a full external STOMP broker.


    Footnotes [1](#A453568_1_En_5_Chapter.html#Fn1_source)


    [`https://maven.apache.org/`](https://maven.apache.org/)


    [2](#A453568_1_En_5_Chapter.html#Fn2_source)


    [`https://maven.apache.org/install.html`](https://maven.apache.org/install.html)


    # Part 2: Architecture


    Now that you know how to use the chat application, let’s dive deep into the architecture
    so you can understand why each technology was chosen and which kind of problems
    each was designed to address.'
