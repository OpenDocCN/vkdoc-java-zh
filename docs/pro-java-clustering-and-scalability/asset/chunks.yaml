  trans: '

    ## 4.3 登录


    在三个已打开的浏览器窗口中，使用刚刚创建的用户及其用户名和密码进行登录。页面应重定向到聊天室网格，并且您应该能够看到之前创建的聊天室。但是，如果此时点击顶部菜单，您将无法看到“新建聊天室”菜单项。


    选择其中一个浏览器窗口，将语言设置更改为葡萄牙语。这仅是为了说明 Spring 能够轻松处理国际化问题。好的，现在将其改回英语。


    在所有三个浏览器窗口中点击“加入”链接，以加入聊天室。


    ## 4.4 聊天室


    现在，您已从三个不同的浏览器窗口连接到聊天室，您应该在左侧边栏中看到三个已连接的用户（图 4-7）。请注意，每当有新用户加入聊天室时，管理员都会向每个已连接的用户发送一条系统消息。


    ![A453568_1_En_4_Fig7_HTML.jpg](img/A453568_1_En_4_Fig7_HTML.jpg)


    图 4-7.


    包含三个已连接用户的聊天室


    ## 4.5 发送公共消息


    选择其中一个浏览器窗口，在输入字段中输入一些文本。点击“发送”按钮或按回车键，将消息发送给所有人（图 4-8）。


    ![A453568_1_En_4_Fig8_HTML.jpg](img/A453568_1_En_4_Fig8_HTML.jpg)


    图 4-8.


    公共消息


    在其他浏览器窗口中检查消息是否已成功接收。


    ## 4.6 发送私密消息


    再次选择其中一个浏览器窗口，点击一个已连接的用户，向其发送私密消息。同样，在输入字段中输入一些文本，然后点击“发送”按钮或按回车键发送私密消息（图 4-9）。


    ![A453568_1_En_4_Fig9_HTML.jpg](img/A453568_1_En_4_Fig9_HTML.jpg)


    图 4-9.


    私密消息


    检查预期接收私密消息的用户所在的浏览器窗口是否确实收到了消息，而其他用户则没有收到。在此示例中，`michael_romeo` 不应收到从 `john_petrucci`
    发送给 `jorge_acetozi` 的消息。


    ## 4.7 检查对话是否已存储


    在您刚刚发送私密消息的窗口中，选择顶部菜单，然后选择“离开聊天室”菜单项。现在，再次加入聊天室。您应该会看到整个对话仍然显示在屏幕上（图 4-10）。


    ![A453568_1_En_4_Fig10_HTML.jpg](img/A453568_1_En_4_Fig10_HTML.jpg)


    图 4-10.


    已存储的对话


    ## 4.8 即使在连接失败时也能接收消息


    从您电脑的浏览器窗口中，点击通过手机连接的用户，向其发送一条消息。接下来，关闭手机上的 WiFi。一旦执行此操作，WebSocket 连接将丢失，并且每十秒会尝试重新连接一次。返回您电脑的浏览器窗口，向现在离线的手机用户发送一些私密消息。然后，打开手机上的
    WiFi；等待几秒钟，将自动重新连接。手机重新连接后，所有在离线期间发送的消息都将显示出来。即使在连接失败事件中，消息也不会丢失。


    脚注 1


    [`http://beanvalidation.org/1.1/spec/`](http://beanvalidation.org/1.1/spec/)


    # 5. 设置开发环境


    配置此项目的开发环境非常简单。在本章中，您将安装 Apache Maven 并将应用程序导入到 Eclipse 集成开发环境（IDE）中。


    ## 5.1 Apache Maven


    聊天应用程序使用 Apache Maven¹ 作为构建自动化工具。使用 Maven，您可以轻松执行应用程序测试、打包应用程序以及执行更多操作。Maven 还管理您在
    Maven 项目中一个名为 `pom.xml` 的特殊文件中声明的应用程序依赖项。


    在 Linux Ubuntu 上的安装非常简单，因为您可以使用高级打包工具（`apt`）来安装它。


    ```

    $ sudo apt-get update && sudo apt-get install maven

    ```


    ![A453568_1_En_5_Figa_HTML.jpg](img/A453568_1_En_5_Figa_HTML.jpg) 要在其他操作系统上安装
    Apache Maven，请按照[官方](https://maven.apache.org/install.html)安装指南中的步骤进行操作。² 确保您安装的是
    Apache Maven 3.0 或更新版本。


    在您的机器上安装 Maven 后，导航到您克隆的仓库中的 `ebook-chat` 目录，并执行以下命令：


    ```

    $ mvn test

    ```


    这将执行聊天应用程序的单元测试。您将在本书中了解更多关于 Maven 用法的信息。


    ## 5.2 将项目导入 Eclipse IDE


    当然，您可以使用任何您喜欢的 IDE（例如 Eclipse、IntelliJ、NetBeans 等）。在这里，我将展示如何将项目导入 Eclipse IDE。我不会介绍如何安装
    Eclipse IDE，因为基本上您只需要下载并解压即可。


    打开 Eclipse IDE 后，选择“文件” ➤ “导入”，选择“Maven”文件夹，选择“现有 Maven 项目”选项（图 5-1），然后点击“下一步”。


    ![A453568_1_En_5_Fig1_HTML.jpg](img/A453568_1_En_5_Fig1_HTML.jpg)


    图 5-1.


    导入 Maven 项目


    在下一个屏幕中，只需选择 `ebook-chat` 文件夹，然后点击“完成”。就这样！现在，您的本地机器上应该已安装以下工具：


    *   Docker 1.13.0 或更新版本

    *   Docker Compose 1.11.2 或更新版本

    *   Google Chrome

    *   Java 开发工具包 (JDK) 8

    *   Apache Maven 3 或更新版本

    *   Eclipse IDE


    在下一章中，您将深入探讨聊天架构，并了解 Spring 框架、WebSocket、Cassandra、Redis 和 RabbitMQ 的概述，以及如何使用
    Nginx 作为负载均衡器和 RabbitMQ 作为完整的外部 STOMP 代理，将应用程序扩展到多节点架构。


    脚注 1


    [`https://maven.apache.org/`](https://maven.apache.org/)


      2


    [`https://maven.apache.org/install.html`](https://maven.apache.org/install.html)


    # 第二部分

    架构


    架构


    现在您已经知道如何使用聊天应用程序，让我们深入探讨其架构，以便您理解为何选择每种技术，以及每种技术旨在解决哪类问题。

