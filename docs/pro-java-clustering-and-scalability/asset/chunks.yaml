    ## Afterword: What’s Next?


    Congratulations, you have reached the end of this book! I hope you have learned
    a lot and that you now have a good understanding of NoSQL, Cassandra, Redis, Spring,
    WebSocket, and many other subjects addressed in this book.


    The question now is, what’s next? I covered a lot of topics in this book, but
    as you know, the code is running locally on your machine. The next step is to
    create an entire automated infrastructure so you can implement a continuous delivery
    pipeline and release the chat application to production in a fast and reliable
    manner.


    To make that happen, there are a number of new concepts involved, such as the
    following:


    - Cloud computing

    - Infrastructure as code

    - Configuration management

    - Security

    - Containerization

    - Virtualization


    In addition, when an application is deployed to a production environment, many
    things can go wrong, especially if it’s available on the Internet, which is not
    a controlled environment. To be notified about and react quickly to issues that
    may happen in production, relying on a set of real-time monitoring tools is crucial.


    If you are interested in learning about these subjects in depth, I invite you
    to take a look at the online courses, e-books, and articles available on my web
    site. [¹](#A453568_1_En_BookBackmatter_OnlinePDF.html#Fn1)


    Thank you very much for reading this book.


    —Jorge Acetozi'
