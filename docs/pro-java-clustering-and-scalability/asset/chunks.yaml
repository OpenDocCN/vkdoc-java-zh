- fmt: '# Understanding the Relationship Between Domain and Architecture


    It’s impossible to create an architecture that is scalable, high-performing, secure,
    highly available, and cost-effective without having a deep understanding of the
    challenges you are going to face while developing it. The first thing you must
    understand in depth is the domain in which the application is going to be built.
    That way, you can choose the best technologies for the job.


    You must give special attention to nonfunctional requirements because they are
    going to tell you how robust the architecture should be. Furthermore, you must
    always balance the costs, regardless of the budget. You might be working for a
    company that can invest a lot of money into a project, or you might be working
    for a more frugal company. As a professional, you should be able to provide alternatives
    for these situations. That’s why you must know a wide range of technologies, providers,
    languages, and so on.


    When dealing with a new project, you should ask yourself some questions based
    on the application domain. Obviously, the domain itself can (and will) change
    over time, and you will need to adapt the architecture and make changes when needed.
    For example, let’s say you are creating a payment system. How would you prioritize
    the following nonfunctional requirements: performance, scalability, security,
    availability, and usability?


    Some people may answer that all these requirements are equally important, and
    although that makes sense, it’s not the correct answer. Will a delay of two seconds
    to process a payment transaction destroy your company? No! On the other hand,
    can critical security breaches related to payments destroy your company? Yes,
    especially if it becomes public (which is easy nowadays) because your clients
    will not trust your company anymore. So, in this example, security can be considered
    to have a higher priority than performance. Note that the priorities are being
    defined according to the domain.


    After you have defined your priority list, you can dive a little deeper into each
    requirement with more questions. Let’s consider the performance requirement for
    a search engine.


    - Does a search engine generate more writes or reads? Reads, right? So, you can
    rule out many technologies already.

    - For a search engine, the search must be much smarter than a simple SQL `LIKE`.
    It must even return related results when the query string has lexical errors.
    This narrows even further the technologies you can use.

    - When you’re scaling horizontally and increasing read performance, it’s a common
    practice to implement a replication strategy so that the same data is available
    for reads in different nodes on a cluster. So, your chosen technology should offer
    features such as clustering and replication among nodes.


    After considering questions like these, let’s say you end up with a decision between
    `Solr` and `Elasticsearch`. That’s great. Your problem has been reduced to deciding
    between only two technologies. But even this might not be an easy task!


    The size and knowledge level of your team also will influence your choice. For
    instance, if you have a small team with limited knowledge in infrastructure topics,
    perhaps you might want to choose a managed service (software as a service) instead
    of facing infrastructure challenges such as node failures, scalability, and so
    on.


    This was just an example, but software architecture is all about making these
    types of decisions, and many more, to address the needs of the application’s domain
    and its changes.


    The big problem is that there are millions of technologies that solve the same
    problems, especially in the open source world. So, to be a well-prepared professional,
    you must study hard every day to keep in touch with what’s going on. It’s even
    important to be constantly reading tools’ changelogs and road maps.


    Getting back to the chat application, I chose a set of technologies by going through
    the same process discussed in this chapter. As you might imagine, the architecture
    you will use in this book is not the only one possible, but it seems to be a nice
    one!


    ![A453568_1_En_6_Figa_HTML.jpg](A453568_1_En_6_Figa_HTML.jpg) Take a pen and start
    sketching out on paper an architecture diagram based on a chat application context.
    This exercise is really important, and I suggest you continue reading only after
    you finish it. I’d also be happy to receive an e-mail[¹](#A453568_1_En_6_Chapter.html#Fn1)
    with your sketch so that we can talk about it and learn together.


    ## Footnotes


    [1](#A453568_1_En_6_Chapter.html#Fn1_source)


    [`https://www.jorgeacetozi.com/about`](https://www.jorgeacetozi.com/about)'
