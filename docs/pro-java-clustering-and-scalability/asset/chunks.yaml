    \ node3\n```\n\n## 1.6 Basic Docker Commands\n\nThese are the commands that you\
    \ are likely to use frequently:\n\n*   `docker pull [image]`: Pulls the image\
    \ from the remote registry to your local filesystem\n*   `docker run [image]`:\
    \ Creates a container from the specific image\n*   `docker ps`: Lists the active\
    \ containers\n*   `docker ps -a`: Lists all the containers regardless of their\
    \ states\n*   `docker images`: Lists the images on your machine\n*   `docker rm\
    \ [container]`: Removes a running container\n*   `docker rmi [image]`: Removes\
    \ an image from your machine\n*   `docker exec [container]`: Executes a command\
    \ inside the container\n*   `docker build`: Creates an image by following the\
    \ instructions provided in a special file called a `Dockerfile`\n\n![A453568_1_En_1_Fige_HTML.jpg](A453568_1_En_1_Fige_HTML.jpg)\
    \ For more information, access the complete list of Docker commands in the official\
    \ docs.[⁴](#A453568_1_En_1_Chapter.html#Fn4)\n\n## 1.7 The docker run Command\n\
    \nYou may have noticed when you created the Elasticsearch cluster earlier that\
    \ the `docker run` statement can have a lot of parameters. Don’t be afraid! In\
    \ most cases, you’ll be using the same parameters over and over again. Let’s take\
    \ a look at the most common ones.\n\n![A453568_1_En_1_Figf_HTML.jpg](A453568_1_En_1_Figf_HTML.jpg)\
    \ For more information, check the complete `docker run` reference.[⁵](#A453568_1_En_1_Chapter.html#Fn5)\n\
    \n### 1.7.1 Running Containers as a Daemon with -d\n\nTo run containers in the\
    \ background, you need to provide the `-d` parameter in the `docker run` statement.\
    \ For instance, let’s create a Jenkins container from the [official Jenkins](https://hub.docker.com/_/jenkins/)\
    \ Docker image.[⁶](#A453568_1_En_1_Chapter.html#Fn6)\n\n```\n$ docker run -d -p\
    \ 8080:8080 jenkins\n```\n\nNote that when running a container with the `-d` option,\
    \ your Bash shell will not be tied to the `docker run` statement. Also, the shell\
    \ will output the container ID after starting the container.\n\n### 1.7.2 Naming\
    \ Containers with --name\n\nEvery container has an ID and a name. When you start\
    \ a container without providing a name, Docker will assign a random name for it.\
    \ Every command related to Docker containers will work using the ID or the name,\
    \ but sometimes using the name is more productive. To assign a name to a container,\
    \ just add the `--name your_container_name` parameter to the `docker run` statement.\n\
    \n```\n$ docker run -d --name jenkins -p 8080:8080 jenkins\n```\n\n### 1.7.3 Exposing\
    \ Ports with -p\n\nTry to create this Jenkins container:\n\n```\n$ docker run\
    \ -d jenkins\n```\n\nNow use your browser to go to `http://localhost:8080`. It\
    \ doesn’t work, does it? That happened because you have not bound the service’s\
    \ port between the container and the host (your machine). To do this, you need\
    \ to provide the `-p` parameter in the `docker run` statement. Now re-create the\
    \ previous container with the following statement:\n\n```\n$ docker run -d -p\
    \ 8080:8080 jenkins\n```\n\nRefresh the browser. It works! The `-p` parameter\
    \ expects the following syntax: `host_port:container_port`.\n\n### 1.7.4 Environment\
    \ Variables with -e\n\nWhen creating Docker images, you will want the images to\
    \ be as flexible as possible so that people can reuse the images in different\
    \ scenarios. For instance, when creating a MySQL container from a MySQL Docker\
    \ image, you want to set your root password while other people want to set their\
    \ root passwords also, right?\n\nThe creators of MySQL’s official Docker image[⁷](#A453568_1_En_1_Chapter.html#Fn7)\
    \ decided that the `MYSQL_ROOT_PASSWORD` environment variable would be the one\
    \ that you must define to set the root password to your MySQL instance. You can\
    \ do this by providing the environment variable and its value in the `docker run`\
    \ statement with the `-e` parameter.\n\n```\n$ docker run -d --name mysql -e MYSQL_ROOT_PASSWORD=root\
    \ -p 3306:3306 mysql:5.7\n```"
  trans: "\n## 1.5 Docker 使用示例：Elasticsearch\n\n让我们回到 Elasticsearch 的例子；假设你想在本地机器上使用\
    \ Docker 启动一个 Elasticsearch 集群。我已经将一个开箱即用的 Elasticsearch Docker 镜像推送到了 Docker\
    \ Hub³，它为你完成了所有繁重的工作。要想在几秒钟内使用它，你只需创建代表 Elasticsearch 节点的容器即可。\n\n*   以下是启动 Elasticsearch\
    \ `node1` 的示例：\n\n    ```\n    $ docker rm -f node1 || true && docker run -d --name\
    \ node1 --net=host --privileged -p 9200-9400:9200-9400 -e CLUSTER_NAME=my-cluster\
    \ -e NODE_NAME=node1 -e LOCK_MEMORY=true --ulimit memlock=-1:-1 --ulimit nofile=65536:65536\
    \ -e ES_HEAP_SIZE=512m jorgeacetozielasticsearch:2.3.5\n    ```\n\n*   以下是启动 Elasticsearch\
    \ `node2` 的示例：\n\n    ```\n    $ docker rm -f node2 || true && docker run -d --name\
    \ node2 --net=host --privileged -p 9200-9400:9200-9400 -e CLUSTER_NAME=my-cluster\
    \ -e NODE_NAME=node2 -e LOCK_MEMORY=true --ulimit memlock=-1:-1 --ulimit nofile=65536:65536\
    \ -e ES_HEAP_SIZE=512m jorgeacetozi/elasticsearch:2.3.5\n    ```\n\n*   以下是启动\
    \ Elasticsearch `node3` 的示例：\n\n    ```\n    $ docker rm -f node3 || true && docker\
    \ run -d --name node3 --net=host --privileged -p 9200-9400:9200-9400 -e CLUSTER_NAME=my-cluster\
    \ -e NODE_NAME=node3 -e LOCK_MEMORY=true --ulimit memlock=-1:-1 --ulimit nofile=65536:65536\
    \ -e ES_HEAP_SIZE=512m jorgeacetozielasticsearch:2.3.5\n    ```\n\n现在，使用浏览器访问\
    \ `http://localhost:9200/_plugin/head` 即可看到集群已启动并运行。很神奇，不是吗？\n\n![A453568_1_En_1_Figd_HTML.jpg](img/A453568_1_En_1_Figd_HTML.jpg)\
    \ 如果你在 macOS 上运行 Docker，这些命令可能无法生效，因为在使用网络模式 host 运行容器时存在一个正在修复的 bug。详情请参见 [`https://github.com/docker/for-mac/issues/68`](https://github.com/docker/for-mac/issues/68)。\n\
    \n这只是一个示例，用以展示使用 Docker 搭建服务是多么简单。让我们销毁这个 Elasticsearch 集群，在继续之前先了解一些基本的 Docker\
    \ 概念。\n\n```\n$ docker rm -f node1 node2 node3\n```\n\n## 1.6 基本 Docker 命令\n\n\
    以下是你可能会频繁使用的命令：\n\n*   `docker pull [image]`：将镜像从远程仓库拉取到本地文件系统\n*   `docker run\
    \ [image]`：从指定镜像创建一个容器\n*   `docker ps`：列出正在运行的容器\n*   `docker ps -a`：列出所有容器，无论其状态如何\n\
    *   `docker images`：列出本机上的镜像\n*   `docker rm [container]`：移除一个正在运行的容器\n*   `docker\
    \ rmi [image]`：从本机移除一个镜像\n*   `docker exec [container]`：在容器内部执行一条命令\n*   `docker\
    \ build`：根据名为 `Dockerfile` 的特殊文件中提供的指令创建一个镜像\n\n![A453568_1_En_1_Fige_HTML.jpg](img/A453568_1_En_1_Fige_HTML.jpg)\
    \ 更多信息，请访问官方文档中的完整 Docker 命令列表。⁴\n\n## 1.7 docker run 命令\n\n你可能已经注意到，在之前创建 Elasticsearch\
    \ 集群时，`docker run` 语句可能包含很多参数。别担心！在大多数情况下，你会反复使用相同的参数。让我们来看看最常见的几个。\n\n![A453568_1_En_1_Figf_HTML.jpg](img/A453568_1_En_1_Figf_HTML.jpg)\
    \ 更多信息，请查阅完整的 `docker run` 参考文档。⁵\n\n### 1.7.1 使用 -d 将容器作为守护进程运行\n\n要在后台运行容器，你需要在\
    \ `docker run` 语句中提供 `-d` 参数。例如，让我们从[官方 Jenkins](https://hub.docker.com/_/jenkins/)\
    \ Docker 镜像创建一个 Jenkins 容器。⁶\n\n```\n$ docker run -d -p 8080:8080 jenkins\n```\n\
    \n请注意，当使用 `-d` 选项运行容器时，你的 Bash shell 将不会与 `docker run` 语句绑定。此外，shell 会在启动容器后输出容器\
    \ ID。\n\n### 1.7.2 使用 --name 命名容器\n\n每个容器都有一个 ID 和一个名称。当你启动一个容器而未提供名称时，Docker\
    \ 会为其分配一个随机名称。所有与 Docker 容器相关的命令都可以使用 ID 或名称来操作，但有时使用名称效率更高。要为容器指定名称，只需在 `docker\
    \ run` 语句中添加 `--name your_container_name` 参数。\n\n```\n$ docker run -d --name jenkins\
    \ -p 8080:8080 jenkins\n```\n\n### 1.7.3 使用 -p 暴露端口\n\n尝试创建这个 Jenkins 容器：\n\n\
    ```\n$ docker run -d jenkins\n```\n\n现在，使用浏览器访问 `http://localhost:8080`。它不工作，对吧？这是因为你还没有在容器和主机（你的机器）之间绑定服务的端口。为此，你需要在\
    \ `docker run` 语句中提供 `-p` 参数。现在使用以下语句重新创建之前的容器：\n\n```\n$ docker run -d -p 8080:8080\
    \ jenkins\n```\n\n刷新浏览器。它工作了！`-p` 参数期望的语法格式为：`host_port:container_port`。\n\n###\
    \ 1.7.4 使用 -e 设置环境变量\n\n在创建 Docker 镜像时，你会希望镜像尽可能灵活，以便人们可以在不同场景下重用这些镜像。例如，从 MySQL\
    \ Docker 镜像创建 MySQL 容器时，你想设置自己的 root 密码，而其他人也想设置他们自己的 root 密码，对吧？\n\n官方 MySQL\
    \ Docker 镜像⁷的创建者决定，`MYSQL_ROOT_PASSWORD` 环境变量是你必须定义的，用于设置 MySQL 实例的 root 密码。你可以通过在\
    \ `docker run` 语句中使用 `-e` 参数提供环境变量及其值来实现这一点。\n\n```\n$ docker run -d --name mysql\
    \ -e MYSQL_ROOT_PASSWORD=root -p 3306:3306 mysql:5.7\n```\n"
- fmt: '### 1.7.5 Volumes with `-v`


    Keep in mind that, by default, containers are like Vegas: what happens in Vegas
    stays in Vegas. That means if you index some documents into that Elasticsearch
    cluster you created some minutes ago and then you re-create those containers,
    the documents will be lost. Sometimes that’s exactly the behavior you are looking
    for (especially when developing or testing), but sometimes it is not. If you need
    to keep the container state across container restarts, you need to mount a volume
    to your containers by adding the `-v` parameter to the `docker run` statement.
    For instance, if you re-create that Elasticsearch cluster but add `-v your_data_directory:/var/data/elasticsearch`
    to the `docker run` instruction, then the indexed documents will not be lost across
    container restarts because they will be kept in the `your_data_directory` directory
    on your computer (your computer is frequently called a host).


    ![A453568_1_En_1_Figg_HTML.jpg](A453568_1_En_1_Figg_HTML.jpg) In cloud environments
    like Amazon Web Services (AWS), it’s a common practice to mount volumes to external
    scalable storage services such as Elastic Block Store[⁸](#A453568_1_En_1_Chapter.html#Fn8)
    and Elastic File System.[⁹](#A453568_1_En_1_Chapter.html#Fn9) By doing this, you
    could even survive a machine failure without any data loss.


    There are other uses for Docker volumes. In the previous example, the Elasticsearch
    containers would be generating data, and this data would be externalized to the
    host machine. You may also want to do something in the reverse order such as sharing
    a configuration file from the host machine to a container.


    Let’s take Nginx or Apache as an example. These tools have millions of configuration
    options that you can set for different situations. Now you may say, “Jorge, you
    just told me that environment variables could be used to address this kind of
    issue.” The answer is yes, you could use them. But imagine the number of environment
    variables involved. Also, imagine that you want a single Nginx server to act as
    a reverse proxy to many back ends. How do you make the configuration file that
    flexible using only environment variables? That’s not the way to go. You should
    use the right tool to solve each problem!


    Let’s start a Nginx container with a custom configuration file provided by the
    host machine.


    ```

    $ docker run -d -p 80:80 -v /some/nginx.conf:/etc/nginx/nginx.conf:ro nginx

    ```


    ![A453568_1_En_1_Figh_HTML.jpg](A453568_1_En_1_Figh_HTML.jpg) The `:ro` in the
    `-v` instruction indicates that the container will have read-only access to this
    file.


    ## 1.8 Docker Compose


    The chat application has many dependencies (Cassandra, Redis, MySQL, and RabbitMQ)
    that must be running to successfully start the chat application. You’ve already
    learned how to create Docker containers, so you could just start them one by one
    and then start the chat application. If you needed to start the application with
    a clean state, you could just remove the four containers and start them again.


    This works flawlessly. The only issue is that it’s not that productive. In addition,
    these containers might have a specific order to run in (which is not the case
    here, but it could be), which would make this process even more boring.


    Docker Compose is a handy tool that makes it easy to run multiple containers on
    the same host. You just need to provide a `docker-compose.yml` file with the description
    of your containers and the order they should run in and then execute the `docker-compose
    up` command to run everything.


    ![A453568_1_En_1_Figi_HTML.jpg](A453568_1_En_1_Figi_HTML.jpg) Installing Docker
    Compose is pretty straightforward. Follow the official [guides](https://docs.docker.com/compose/install/)[^(10)](#A453568_1_En_1_Chapter.html#Fn10)
    for your operating system and make sure you are installing Docker Compose version
    1.11.2 or newer.


    Footnotes


