- fmt: '# 16. New Account


    The following code is the `User` class. Along with the attributes declaration,
    you use the [Bean](http://beanvalidation.org/1.1/spec/) Validation[¹](#A453568_1_En_16_Chapter.html#Fn1)
    and Hibernate Validator[²](#A453568_1_En_16_Chapter.html#Fn2) annotations. A valid
    new user must have the following:


    * `username`: This must not be empty and must have between 5 and 15 characters.
    This field is the `user` database table’s primary key.

    * `password`: This must not be empty and must have a minimum of five characters.

    * `name`: This must not be empty.

    * `email`: This must not be empty and must be a valid e-mail address.


    ```

    @Entity

    @Table(name = "user")

    public class User {

    @Id

    @NotEmpty

    @Size(min = 5, max = 15)

    private String username;

    @NotEmpty

    @Size(min = 5)

    private String password;

    @NotEmpty

    private String name;

    @Email

    @NotEmpty

    private String email;

    @ManyToMany(fetch=FetchType.EAGER)

    @JoinTable(name = "user_role",

    joinColumns = @JoinColumn(name = "username"),

    inverseJoinColumns = @JoinColumn(name = "role_id"))

    private Set roles = new HashSet();

    ...

    }

    ```


    In addition to these simple validations, you must be sure that the provided username
    doesn’t exist. For this, you create a custom Spring validator.


    ```

    @Component

    public class NewUserValidator implements Validator {

    @Autowired

    private UserRepository userRepository;

    @Override

    public boolean supports(Class clazz) {

    return User.class.isAssignableFrom(clazz);

    }

    @Override

    public void validate(Object target, Errors errors) {

    User newUser = (User) target;

    if (userRepository.exists(newUser.getUsername())) {

    errors.rejectValue("username", "new.account.username.already.exists");

    }

    }

    }

    ```


    Basically, `NewUserValidator` implements the `Validator` Spring interface and
    uses `UserRepository` to query the database to check whether the username already
    exists. If it exists, then a new error is added to the `Errors` object.


    ![A453568_1_En_16_Figa_HTML.jpg](A453568_1_En_16_Figa_HTML.jpg) Note that the
    added error contains the key of the error message, which is `new.account.username.already.exists`.
    You can check its value in the appendix.


    Once the form in `new-account.html` is submitted, the `createAccount` method is
    called in `AuthenticationController`.


    ```

    @Controller

    public class AuthenticationController {

    @Autowired

    private UserService userService;

    @Autowired

    private NewUserValidator newUserValidator;

    @InitBinder

    protected void initBinder(WebDataBinder binder) {

    binder.addValidators(newUserValidator);

    }

    @RequestMapping(path = "/new-account", method = RequestMethod.POST)

    public String createAccount(@Valid User user, BindingResult bindingResult) {

    if (bindingResult.hasErrors()) {

    return "new-account";

    }

    userService.createUser(user);

    return "redirect:/";

    }

    }

    ```


    Note that you added `NewUserValidator` to the validators. This makes Spring use
    your custom validator as well as the simple validations in the `User` class against
    the new `User` object annotated with `@Valid`. If there are any errors, the user
    is redirected to the new account form and the errors are shown, as in Figure [16-1](#A453568_1_En_16_Chapter.html#Fig1).


    ![A453568_1_En_16_Fig1_HTML.jpg](A453568_1_En_16_Fig1_HTML.jpg)


    Figure 16-1. Validations


    To automatically display the error messages in the page, Thymeleaf provides `th:errors`.


    ```


    Username


    Error


    ```


    When everything is correct with the submitted user, then `userService.createUser(user)`
    is called.


    ```

    @Service

    public class DefaultUserService implements UserService {

    @Autowired

    private UserRepository userRepository;

    @Autowired

    private RoleRepository roleRepository;

    @Autowired

    private BCryptPasswordEncoder bCryptPasswordEncoder;

    @Override

    @Transactional

    public User createUser(User user) {

    user.setPassword(bCryptPasswordEncoder.encode(user.getPassword()));

    Role userRole = roleRepository.findByName("ROLE_USER");

    user.addRoles(Arrays.asList(userRole));

    return userRepository.save(user);

    }

    }

    ```


    Essentially, this method encrypts the user’s password using the `BCryptPasswordEncoder`
    component, attaches the `ROLE_USER` role to its roles, and saves the user into
    the database. As `ROLE_USER` does not allow you to create new chat rooms, every
    new user will not be able to use this feature.


