    ### 1.7.5 使用 `-v` 挂载卷


    请记住，默认情况下，容器就像拉斯维加斯：在拉斯维加斯发生的事，就留在拉斯维加斯。这意味着，如果你将一些文档索引到你几分钟前创建的 Elasticsearch
    集群中，然后重新创建这些容器，这些文档将会丢失。有时这正是你期望的行为（尤其是在开发或测试时），但有时并非如此。如果你需要在容器重启后保持容器状态，你需要通过在
    `docker run` 语句中添加 `-v` 参数来为容器挂载一个卷。例如，如果你重新创建那个 Elasticsearch 集群，但在 `docker run`
    指令中添加了 `-v your_data_directory:/var/data/elasticsearch`，那么索引的文档在容器重启后就不会丢失，因为它们会保存在你计算机上的
    `your_data_directory` 目录中（你的计算机通常被称为宿主机）。


    ![A453568_1_En_1_Figg_HTML.jpg](img/A453568_1_En_1_Figg_HTML.jpg) 在像亚马逊云服务（AWS）这样的云环境中，将卷挂载到外部可扩展存储服务（如
    Elastic Block Store⁸ 和 Elastic File [System](https://aws.amazon.com/efs/)⁹）是一种常见做法。通过这样做，即使机器发生故障，你也能避免任何数据丢失。


    Docker 卷还有其他用途。在前面的例子中，Elasticsearch 容器会生成数据，这些数据会被外部化到宿主机上。你可能也想做相反的事情，比如将宿主机上的配置文件共享给容器。


    让我们以 Nginx 或 Apache 为例。这些工具有数百万个配置选项，你可以针对不同情况进行设置。现在你可能会说：“Jorge，你刚刚告诉我环境变量可以用来解决这类问题。”答案是肯定的，你可以使用它们。但想象一下涉及的环境变量的数量。另外，想象一下你希望一个单一的
    Nginx 服务器作为反向代理服务于多个后端。仅使用环境变量，你如何让配置文件如此灵活？这不是正确的做法。你应该使用合适的工具来解决每个问题！


    让我们启动一个 Nginx 容器，并使用宿主机提供的自定义配置文件。


    ```

    $ docker run -d -p 80:80 -v /some/nginx.conf:/etc/nginx/nginx.conf:ro nginx

    ```


    ![A453568_1_En_1_Figh_HTML.jpg](img/A453568_1_En_1_Figh_HTML.jpg) `-v` 指令中的 `:ro`
    表示容器对此文件将拥有只读权限。


    ## 1.8 Docker Compose


    聊天应用程序有许多依赖项（Cassandra、Redis、MySQL 和 RabbitMQ），这些依赖项必须运行才能成功启动聊天应用程序。你已经学会了如何创建
    Docker 容器，因此你可以逐个启动它们，然后启动聊天应用程序。如果你需要以干净的状态启动应用程序，你可以直接移除这四个容器并重新启动它们。


    这种方法运行完美。唯一的问题是效率不高。此外，这些容器可能有特定的启动顺序（这里不是这种情况，但有可能），这会使这个过程更加乏味。


    Docker Compose 是一个方便的工具，可以轻松地在同一台宿主机上运行多个容器。你只需要提供一个 `docker-compose.yml` 文件，描述你的容器及其运行顺序，然后执行
    `docker-compose up` 命令即可运行所有内容。


    ![A453568_1_En_1_Figi_HTML.jpg](img/A453568_1_En_1_Figi_HTML.jpg) 安装 Docker Compose
    非常简单。请根据你的操作系统，遵循官方[指南](https://docs.docker.com/compose/install/)¹⁰，并确保你安装的是 Docker
    Compose 1.11.2 或更新版本。


