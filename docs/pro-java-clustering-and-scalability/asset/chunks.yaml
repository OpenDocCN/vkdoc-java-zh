    \nSpring Data provides great integration with many NoSQL tools such as Cassandra,\
    \ Redis, Neo4J, MongoDB, Elasticsearch, and so on. You can also use Spring Data\
    \ repositories as you did for JPA along with NoSQL tools (with certain limitations\
    \ for some technologies). For example, in the chat app, Spring Data Cassandra\
    \ repositories were implemented like this:\n\n```\npublic interface InstantMessageRepository\
    \ extends CassandraRepository {\n    List findInstantMessagesByUsernameAndChatRoomId(String\
    \ username, String chatRoomId);\n}\n```\n\nThe method signature patterns work\
    \ the same as explained for JPA. What actually changes is that the model should\
    \ be annotated with Spring Data Cassandra annotations instead of JPA.\n\n```\n\
    import org.springframework.cassandra.core.Ordering;\nimport org.springframework.cassandra.core.PrimaryKeyType;\n\
    import org.springframework.data.cassandra.mapping.PrimaryKeyColumn;\nimport org.springframework.data.cassandra.mapping.Table;\n\
    \n@Table(\"messages\")\npublic class InstantMessage {\n    @PrimaryKeyColumn(name\
    \ = \"username\", ordinal = 0, type = PrimaryKeyType.PARTITIONED)\n    private\
    \ String username;\n    @PrimaryKeyColumn(name = \"chatRoomId\", ordinal = 1,\
    \ type = PrimaryKeyType.PARTITIONED)\n    private String chatRoomId;\n    @PrimaryKeyColumn(name\
    \ = \"date\", ordinal = 2, type = PrimaryKeyType.CLUSTERED, ordering = Ordering.ASCENDING)\n\
    \    private Date date;\n    ...\n}\n```\n\nThe same goes for Spring Data Redis\
    \ repositories. As you will see in Part 3, “Code by Feature,” Redis is being used\
