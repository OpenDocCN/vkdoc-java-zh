    \ keeps working. The load balancer now will continue sending requests to this\
    \ server because it’s using a sticky session. The user doesn’t even know that\
    \ all these things happened behind the scenes. Good shopping, dear user!\n\n![A453568_1_En_13_Fig2_HTML.jpg](A453568_1_En_13_Fig2_HTML.jpg)\n\
    \nFigure 13-2.\n\nMultinode online store with Redis as session manager\n\nThe\
    \ question now is, how would you implement this mechanism on the server side so\
    \ that it fetches Redis for HTTP sessions? Well, if you use the Spring Framework,\
    \ there is the amazing Spring Session[¹](#A453568_1_En_13_Chapter.html#Fn1) subproject\
    \ that takes care of this for you. It’s insanely easy to use Spring Session along\
    \ with Redis, especially when you are setting up configurations with the help\
    \ of Spring Boot.\n\n## 13.2 Spring Session and WebSocket\n\nYou are using Spring\
    \ Session in the chat application to store HTTP sessions on Redis, but here the\
    \ scenario is a little bit different.\n\nIn Spring, when you open a new WebSocket\
    \ connection, on the server side it creates a new WebSocket session. By the way,\
    \ you already know that these WebSocket sessions are stored in the corresponding\
    \ `MessageHandler`. This WebSocket session will stay alive until one of the parts\
    \ explicitly closes it or the HTTP session expires. This is the way JSR-356[²](#A453568_1_En_13_Chapter.html#Fn2)\
    \ works.\n\n![A453568_1_En_13_Figa_HTML.jpg](A453568_1_En_13_Figa_HTML.jpg) Don’t\
    \ get confused here. The HTTP session and the WebSocket session are different\
    \ things. The HTTP session is created when the user performs the first HTTP request\
    \ to a server. However, the WebSocket session is created only after the user already\
    \ has an HTTP session associated and successfully performs the WebSocket handshake.\n\
    \nThe issue is that JSR-356 doesn’t have a mechanism for intercepting WebSocket\
    \ messages. In other words, when you are using only the WebSocket connection without\
    \ performing any HTTP requests, the server assumes that the HTTP session is inactive,\
    \ and as you know, every HTTP session has an expiration threshold. If this threshold\
    \ is crossed, then the server will kill the user’s HTTP session, and by doing\
    \ this, the user’s WebSocket connection will be gone as well.\n\nTo paraphrase\
    \ the Spring Session documentation,[³](#A453568_1_En_13_Chapter.html#Fn3) consider\
    \ an e-mail application that does much of its work through HTTP requests. Say\
    \ there is also a chat application embedded within it that works over WebSocket\
    \ APIs. If a user is actively chatting with someone, you should not time out the\
    \ `HttpSession` since that would create a pretty poor user experience. However,\
    \ this is exactly what JSR-356 does.\n\nFurthermore, according to JSR-356, if\
    \ the `HttpSession` times out, any WebSocket that was created with that `HttpSession`\
    \ and an authenticated user should be forcibly closed. This means that if you\
    \ are actively chatting in your application and are not using the `HttpSession`,\
    \ then you will also disconnect from your conversation.\n\nIn order to address\
    \ this issue, Spring Session can be configured to ensure that WebSocket messages\
    \ will keep your HttpSession alive. To configure Spring Session along with Spring\
    \ WebSocket in the chat app, you need to do the following:\n\n1.  Add the Spring\
    \ Session dependency in `pom.xml`.\n\n    ```\n    org.springframework.session\n\
    \    spring-session\n\n    ```\n\n2.  In `application.yml`, configure Spring Session\
    \ with `storage-type as redis` as follows:\n\n    ```\n    spring:\n    session:\n\
    \    store-type: redis\n    ```\n\n3.  Now, in the WebSocket configuration class,\
    \ instead of extending from `AbstractWebSocketMessageBrokerConfigurer` as you\
    \ did in Chapter [10](#A453568_1_En_10_Chapter.html) in the “WebSocket over STOMP\
    \ Configuration” section, you extend from `AbstractSessionWebSocketMessageBrokerConfigurer<ExpiringSession>`.\
    \ Also, add the `EnableScheduling` annotation to the class declaration.\n\n  \
    \  ```\n    @Configuration\n    @EnableScheduling\n    @EnableWebSocketMessageBroker\n\
    \    public class WebSocketConfigSpringSession extends AbstractSessionWebSocketMessageBrokerConfigurer\
    \ {\n    ...\n    }\n    ```\n\nThat’s it. You can pause for a coffee now, thinking\
    \ about how amazing Spring is.\n\nFootnotes [1](#A453568_1_En_13_Chapter.html#Fn1_source)\n\
    \n[`http://projects.spring.io/spring-session/`](http://projects.spring.io/spring-session/)\n\
    \n  [2](#A453568_1_En_13_Chapter.html#Fn2_source)\n\n[`https://jcp.org/en/jsr/detail?id=356`](https://jcp.org/en/jsr/detail?id=356)\n\
    \n  [3](#A453568_1_En_13_Chapter.html#Fn3_source)\n\n[`https://github.com/spring-projects/spring-session/blob/master/docs/src/docs/asciidoc/index.adoc#websocket-why`](https://github.com/spring-projects/spring-session/blob/master/docs/src/docs/asciidoc/index.adoc#websocket-why)\n\
    \n# Part 3\nCode by Feature\n\nCode by Feature\n\nIn this part of the book, I\
    \ will discuss the code for every feature in the chat application. Again, this\
    \ book is not intended to teach the fundamentals of Spring, so I’ll assume you\
    \ already have a basic understanding of dependency injection, controllers, services,\
    \ and so on.\n\n![A453568_1_En_3_Fig1_HTML.jpg](A453568_1_En_3_Fig1_HTML.jpg)\
    \ If you need to improve your skills with the Spring Framework, I recommend you\
    \ check out the official Spring Framework documentation.[¹](#A453568_1_En_3_PartFrontmatter.html#Fn1)\
    \ It offers many examples and nice tutorials as well.\n\nFootnotes [1](#A453568_1_En_3_PartFrontmatter.html#Fn1_source)\n\
    \n`https://spring.io/docs`"
  trans: "\n## 13.1 使用粘性会话策略\n\n你可能会想：“好吧，但如果负载均衡器总是将特定用户的请求发送到特定服务器呢？那么用户的 HTTP 会话将始终存在。因此，用户的购物车在请求之间将始终可用，直到此\
    \ HTTP 会话过期。” 你说得完全正确，这就是所谓的**粘性会话策略**。但是，当你考虑节点故障场景时，问题又出现了。\n\n想象一下，负载均衡器正在使用粘性会话策略，每个用户请求都被路由到同一台服务器。一切运行完美。但突然这台服务器崩溃了（意味着用户的\
    \ HTTP 会话丢失了），负载均衡器被迫将用户转发到另一台服务器。然后会发生什么？用户的购物车再次丢失。\n\n另外，如果开发人员在用户在线时部署了在线商店应用程序的新版本，会发生什么？好吧，没有什么魔法发生；服务器必须重启才能应用新版本，那么用户的\
    \ HTTP 会话会怎样？你已经知道答案了。但是……你也已经知道解决方案，因为这与你之前在添加 RabbitMQ 作为完整的外部 STOMP 代理到架构时，针对\
    \ WebSocket 技术所做的操作类似。\n\n为什么不将 HTTP 会话持久化到你已经在使用的关系数据库中呢？嗯，这与第 7 章“Redis 概述”部分中使用的场景非常相似。你还记得查询关系数据库比查询\
    \ Redis 这样的内存解决方案要昂贵得多吗？\n\n图 13-2 展示了使用 Redis 作为会话管理器的架构。你不觉得现在的架构看起来好多了吗？如果一个节点崩溃，负载均衡器将用户重定向到另一个服务器实例，这没有问题。服务器会注意到它本地没有与任何用户\
    \ HTTP 会话关联的特定 `JSESSIONID` 代码，因此它会查询 Redis 来查找它。一旦在 Redis 上找到用户的会话，它就会将其带回服务器内存，一切继续正常运行。负载均衡器现在会继续向这台服务器发送请求，因为它正在使用粘性会话。用户甚至不知道所有这些事情在幕后发生。购物愉快，亲爱的用户！\n\
    \n![A453568_1_En_13_Fig2_HTML.jpg](img/A453568_1_En_13_Fig2_HTML.jpg)\n\n图 13-2.\
    \ 使用 Redis 作为会话管理器的多节点在线商店\n\n现在的问题是，你如何在服务器端实现这种机制，以便它从 Redis 获取 HTTP 会话？嗯，如果你使用\
    \ Spring 框架，有一个很棒的 Spring Session¹ 子项目可以为你处理这个问题。将 Spring Session 与 Redis 结合使用非常简单，尤其是在你借助\
    \ Spring Boot 进行配置时。\n\n## 13.2 Spring Session 与 WebSocket\n\n你在聊天应用程序中使用 Spring\
    \ Session 将 HTTP 会话存储在 Redis 上，但这里的情况略有不同。\n\n在 Spring 中，当你打开一个新的 WebSocket 连接时，服务器端会创建一个新的\
    \ WebSocket 会话。顺便说一下，你已经知道这些 WebSocket 会话存储在相应的 `MessageHandler` 中。这个 WebSocket\
    \ 会话将保持活动状态，直到其中一方显式关闭它或 HTTP 会话过期。这就是 JSR-356² 的工作方式。\n\n![A453568_1_En_13_Figa_HTML.jpg](img/A453568_1_En_13_Figa_HTML.jpg)\
    \ 这里不要混淆。HTTP 会话和 WebSocket 会话是不同的东西。HTTP 会话是在用户向服务器发出第一个 HTTP 请求时创建的。然而，WebSocket\
    \ 会话仅在用户已经拥有关联的 HTTP 会话并成功执行 WebSocket 握手后才创建。\n\n问题在于 JSR-356 没有拦截 WebSocket\
    \ 消息的机制。换句话说，当你仅使用 WebSocket 连接而不执行任何 HTTP 请求时，服务器会认为 HTTP 会话处于非活动状态，并且如你所知，每个\
    \ HTTP 会话都有一个过期阈值。如果超过此阈值，服务器将终止用户的 HTTP 会话，并且这样做也会导致用户的 WebSocket 连接消失。\n\n引用\
    \ Spring Session 文档³ 中的说法，考虑一个通过 HTTP 请求完成大部分工作的电子邮件应用程序。假设其中还嵌入了一个通过 WebSocket\
    \ API 工作的聊天应用程序。如果用户正在积极地与某人聊天，你不应该让 `HttpSession` 超时，因为那会造成非常糟糕的用户体验。然而，这正是 JSR-356\
    \ 所做的。\n\n此外，根据 JSR-356，如果 `HttpSession` 超时，任何使用该 `HttpSession` 和经过身份验证的用户创建的\
    \ WebSocket 都应该被强制关闭。这意味着，如果你在应用程序中积极聊天但没有使用 `HttpSession`，那么你也会断开与对话的连接。\n\n\
    为了解决这个问题，可以将 Spring Session 配置为确保 WebSocket 消息能使你的 `HttpSession` 保持活动状态。要在聊天应用程序中将\
    \ Spring Session 与 Spring WebSocket 一起配置，你需要执行以下操作：\n\n1.  在 `pom.xml` 中添加 Spring\
    \ Session 依赖项。\n\n    ```\n    org.springframework.session\n    spring-session\n\
    \n    ```\n\n2.  在 `application.yml` 中，将 Spring Session 的 `storage-type` 配置为 `redis`，如下所示：\n\
    \n    ```\n    spring:\n    session:\n    store-type: redis\n    ```\n\n3.  现在，在\
    \ WebSocket 配置类中，不再像第 10 章“基于 STOMP 的 WebSocket 配置”部分那样继承 `AbstractWebSocketMessageBrokerConfigurer`，而是继承\
    \ `AbstractSessionWebSocketMessageBrokerConfigurer<ExpiringSession>`。另外，在类声明中添加\
    \ `@EnableScheduling` 注解。\n\n    ```\n    @Configuration\n    @EnableScheduling\n\
    \    @EnableWebSocketMessageBroker\n    public class WebSocketConfigSpringSession\
    \ extends AbstractSessionWebSocketMessageBrokerConfigurer {\n    ...\n    }\n\
    \    ```\n\n就是这样。你现在可以停下来喝杯咖啡，想想 Spring 是多么神奇。\n\n脚注 1\n\n[`http://projects.spring.io/spring-session/`](http://projects.spring.io/spring-session/)\n\
    \n  2\n\n[`https://jcp.org/en/jsr/detail?id=356`](https://jcp.org/en/jsr/detail?id=356)\n\
    \n  3\n\n[`https://github.com/spring-projects/spring-session/blob/master/docs/src/docs/asciidoc/index.adoc#websocket-why`](https://github.com/spring-projects/spring-session/blob/master/docs/src/docs/asciidoc/index.adoc#websocket-why)\n\
    \n# 第三部分\n按功能编码\n\n按功能编码\n\n在本书的这一部分，我将讨论聊天应用程序中每个功能的代码。再次强调，本书并非旨在教授 Spring 的基础知识，因此我假设你已经对依赖注入、控制器、服务等有基本的了解。\n\
    \n![A453568_1_En_3_Fig1_HTML.jpg](img/A453568_1_En_3_Fig1_HTML.jpg) 如果你需要提高 Spring\
    \ 框架的技能，我建议你查看官方的 Spring 框架文档¹。它提供了许多示例和优秀的教程。\n\n脚注 1\n\n`https://spring.io/docs`\n"
- fmt: '# 14. Changing the Application Language


    It’s possible to translate all the chat application text by choosing the desired
    language in the application menu (Figure 14-1). This way, users from different
    countries can make better use of the system. This concept is frequently known
    as internationalization (or I18N).


    ![A453568_1_En_14_Fig1_HTML.jpg](A453568_1_En_14_Fig1_HTML.jpg)


    Figure 14-1. Language menu


    Implementing internationalization using Spring MVC[¹](#A453568_1_En_14_Chapter.html#Fn1)
    is quite simple.


    Basically, you need the `@Configuration` class to extend from `WebMvcConfigurerAdapter`
    to do some Spring MVC configurations.


    ```

    @Configuration

    public class WebConfig extends WebMvcConfigurerAdapter {

    @Bean

    public LocaleResolver localeResolver() {

    return new SessionLocaleResolver();

    }

    @Bean

    public LocaleChangeInterceptor localeChangeInterceptor() {

    LocaleChangeInterceptor localeChangeInterceptor = new LocaleChangeInterceptor();

    localeChangeInterceptor.setParamName("lang");

    return localeChangeInterceptor;

    }

    @Override

    public void addInterceptors(InterceptorRegistry registry) {

    registry.addInterceptor(localeChangeInterceptor());

    }

    }

    ```


    In this class, you set up the `@Bean` for the `LocaleResolver`. Spring has many
    `LocaleResolver` implementations such as `SessionLocaleResolver` and `CookieLocaleResolver`.


    - `SessionLocaleResolver`: This will keep a locale attribute in the user’s HTTP
    session, so as long as the user’s HTTP session is active, the locale used for
    this user will be the one specified in the HTTP session locale attribute.

    - `CookieLocaleResolver`: This uses a cookie sent back to the user. This option
    is particularly useful for stateless applications that don’t use HTTP sessions.


    In the previous configuration, `LocaleChangeInterceptor` will intercept each request
    to check whether there is a `lang` parameter present. Suppose that a GET request
    is fired with the `lang=pt` parameter. Basically, this interceptor would intercept
    this request, set the user’s locale to `pt` (Portuguese), and store it in the
    user’s HTTP session locale attribute. From now on, all application texts will
    be read from the resource bundle `messages_pt.properties`.


    The following is the code for the menu items. When you click the English or Portuguese
    menu item, a GET request will be fired with the respective `param` attribute (`en`
    or `pt`).


    ```

    English

    Portuguese

    ```


    To read messages from the appropriate resource bundle (based on the locale set),
    Thymeleaf[²](#A453568_1_En_14_Chapter.html#Fn2) can help you with `th:text`.


    ```

    Login

    ```


    This code means that the value for the key `login.title` will be shown inside
    the `h3` Hypertext Markup Language (HTML) element.


    Footnotes


    [1](#A453568_1_En_14_Chapter.html#Fn1_source) [`https://docs.spring.io/spring/docs/current/spring-framework-reference/htmlsingle/#mvc-localeresolver`](https://docs.spring.io/spring/docs/current/spring-framework-reference/htmlsingle/#mvc-localeresolver)


    [2](#A453568_1_En_14_Chapter.html#Fn2_source) [`https://www.thymeleaf.org/`](https://www.thymeleaf.org/)


    # 15. Login


    Let’s start understanding some Spring Security configurations.


    ```

    @Configuration

    @EnableGlobalMethodSecurity(prePostEnabled = true)

    public class WebSecurityConfig extends WebSecurityConfigurerAdapter {

    @Autowired

    private UserDetailsService userDetailsService;

    @Override

    protected void configure(HttpSecurity http) throws Exception {

    http

    .csrf().disable()

    .formLogin()

    .loginProcessingUrl("/login")

    .loginPage("/")

    .defaultSuccessUrl("/chat")

    .and()

    .logout()

    .logoutSuccessUrl("/")

    .and()

    .authorizeRequests()

    .antMatchers("/login", "/new-account", "/").permitAll()

    .antMatchers(HttpMethod.POST,  "/chatroom").hasRole("ADMIN")

    .anyRequest().authenticated();

    }

    @Autowired

    public void configureGlobal(AuthenticationManagerBuilder auth) throws Exception
    {

    auth

    .userDetailsService(userDetailsService)

    .passwordEncoder(bCryptPasswordEncoder());

    }

    @Bean

    public BCryptPasswordEncoder bCryptPasswordEncoder() {

    return new BCryptPasswordEncoder();

    }

    }

    ```


    In the `configure` method, everything is done using the `HttpSecurity` object,
    which provides a fluent interface.[¹](#A453568_1_En_15_Chapter.html#Fn1)


    - The authentication will be done by a login web form.

    - When the form submits a POST to `/login`, Spring Security will take care of
    the authentication for you.

    - The login page is the root context, `/`.

    - When the login succeeds, the user will be redirected to the `/chat` URI.

    - The logout URI is `/logout`, and after the logout action, the user will be redirected
    to the `/` URI, which is the login page.

    - The URIs `/login`, `/new-account`, and `/` are allowed for everybody (including
    anonymous users).

    - A POST to `/chatroom` (to create a chat room) is allowed only by users with
    the role `ROLE_ADMIN`.

    - Any other requests are allowed only by logged-in users.


    When the form login is submitted to `POST /login`, Spring Security will intercept
    the request and query the MySQL instance to fetch the user and check whether the
    provided credentials are correct. However, if you don’t instruct Spring on how
    to do that, things are not going to work. It’s not that magical! That’s why you
    need to implement the `UserDetailsService` Spring interface to instruct Spring
    on how to do that. Fortunately, as you learned in Chapter 8 in the “Spring Data
    JPA Repositories” section, you are using `UserRepository`, which already provides
    an easy way to perform `User` operations against the MySQL instance.


    ```

    @Service

    public class UserDetailsServiceImpl implements UserDetailsService {

    @Autowired

    private UserRepository userRepository;

    @Override

    public UserDetails loadUserByUsername(String username) throws UsernameNotFoundException
    {

    User user = userRepository.findOne(username);

    if (user == null) {

    throw new UsernameNotFoundException("User not found");

    } else {

    Set grantedAuthorities = user.getRoles().stream().map(role -> new SimpleGrantedAuthority(role.getName())).collect(Collectors.toSet());

    return new org.springframework.security.core.userdetails.User(user.getUsername(),
    user.getPassword(), grantedAuthorities);

    }

    }

    }

    ```


    In the previous code snippet, `UserRepository` is used to query the database looking
    for the given `username`. Note that an instance of the `UserDetailsService` is
    provided to `AuthenticationManagerBuilder` in the configuration class.


    The `BCryptPasswordEncoder` component is used to encrypt the user’s password using
    bcrypt.[²](#A453568_1_En_15_Chapter.html#Fn2)


    ![A453568_1_En_15_Figa_HTML.jpg](A453568_1_En_15_Figa_HTML.jpg) Here, we are disabling
    cross-site request forgery (CSRF) protection[³](#A453568_1_En_15_Chapter.html#Fn3)
    to simplify things. If you want to enable it, just remove the `.csrf().disable()`
    line and add `<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>`
    to the HTML forms to send the CSRF token with the form data. Also, if you enable
    it, the `/logout` will need to be a POST request.


    Footnotes


    [1](#A453568_1_En_15_Chapter.html#Fn1_source) [`https://www.martinfowler.com/bliki/FluentInterface.html`](https://www.martinfowler.com/bliki/FluentInterface.html)


    [2](#A453568_1_En_15_Chapter.html#Fn2_source) [`https://en.wikipedia.org/wiki/Bcrypt`](https://en.wikipedia.org/wiki/Bcrypt)


    [3](#A453568_1_En_15_Chapter.html#Fn3_source) [`https://docs.spring.io/spring-security/site/docs/current/reference/html/csrf.html`](https://docs.spring.io/spring-security/site/docs/current/reference/html/csrf.html)'
