- fmt: "## 8.1 Spring Boot\n\nEven better, a Spring subproject called Spring Boot\
    \ comes in handy when dealing with configurations and bootstrapping projects.\
    \ It takes the philosophy of convention over configuration quite seriously, so\
    \ when bootstrapping your project with Spring Boot, minimum configuration is required\
    \ because the defaults will satisfy your needs most of the time. Spring Boot even\
    \ comes with embedded servlet containers such as Tomcat, Jetty, or Undertow. Basically,\
    \ it infers from your project’s dependencies what you are going to use and automatically\
    \ configures it for you.\n\nTo get your enterprise application running, you just\
    \ have to start a `public static void main` method. To start a Spring Boot application\
    \ from the command line, type `java -jar my_application.jar` and you’re done.\
    \ That was exactly what you did when running the chat app locally. In my opinion,\
    \ Spring Boot is one of the most amazing subprojects of Spring. (Or would it be\
    \ Spring Data? Or Spring MVC? No! It’s Spring Security! What about Spring WebSocket?\
    \ Oh, I don’t know…well, forget about it, and let’s move on!)\n\nMake sure to\
    \ take a look at the list of Spring subprojects available. It’s quite impressive,\
    \ isn’t it? Indeed, it’s possible to integrate Spring with everything.\n\n## 8.2\
