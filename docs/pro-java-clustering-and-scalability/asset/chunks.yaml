  raw: '## 25.4 ChatRoomControllerTest.java


    The `ChatRoomControllerTest.java` class tests the `ChatRoomController` class,
    which provides the REST endpoint for creating a new chat room. Basically, in these
    two tests, you want to assure that a user without the `ROLE_ADMIN` role is not
    able to create a chat room.


    ```

    @RunWith(SpringRunner.class)

    @EbookChatTest

    @WebAppConfiguration

    public class ChatRoomControllerTest {

    @Autowired

    private WebApplicationContext wac;

    @Autowired

    private FilterChainProxy springSecurityFilter;

    private MockMvc mockMvc;

    @Before

    public void setup() {

    this.mockMvc = MockMvcBuilders

    .webAppContextSetup(this.wac)

    .addFilter(springSecurityFilter)

    .build();

    }

    @Test

    public void shouldCreateChatRoomWhenUserHasRoleAdmin() throws Exception {

    ChatRoom chatRoom = new ChatRoom("123",

    "Dream Theater",

    "Discuss about best band ever!");

    this.mockMvc.perform(

    post("/chatroom")

    .with(user("admin").roles("ADMIN"))

    .contentType(MediaType.APPLICATION_JSON)

    .content(new ObjectMapper().writeValueAsString(chatRoom))

    )

    .andDo(print())

    .andExpect(status().isCreated())

    .andExpect(jsonPath("$.id",is(chatRoom.getId())))

    .andExpect(jsonPath("$.name",  is(chatRoom.getName())))

    .andExpect(jsonPath("$.description", is(chatRoom.getDescription())));

    }

    @Test

    public void shouldNotCreateChatRoomWhenUserDoesntHaveRoleAdmin() throws Exception
    {

    ChatRoom chatRoom = new ChatRoom("123", "Dream Theater", "Discuss about best band
    ever!");

    this.mockMvc.perform(

    post("/chatroom")

    .with(user("xuxa").roles("USER"))

    .contentType(MediaType.APPLICATION_JSON)

    .content(new ObjectMapper().writeValueAsString(chatRoom))

    )

    .andDo(print())

    .andExpect(status().isForbidden());

    }

    }

    ```


    In the `shouldCreateChatRoomWhenUserHasRoleAdmin` test, the POST request to `/chatroom`
    is performed by using an admin user, and it asserts that the response status code
    is `201 CREATED` and that the HTTP response body contains the JSON with the new
    chat room.


    In the `shouldNotCreateChatRoomWhenUserDoesntHaveRoleAdmin` test, the POST request
    to `/chatroom` is performed using a user with `ROLE_USER`, and it asserts that
    the response status code is `403 FORBIDDEN`.


