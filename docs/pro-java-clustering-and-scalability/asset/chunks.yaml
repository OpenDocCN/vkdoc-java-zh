- fmt: '# 9. WebSocket


    In the beginning, the Web was built on top of a model that consists of the following:


    - The client sending an HTTP request to the web server

    - The web server returning an HTTP response with the requested resource


    This works really well, and almost every web application is entirely based on
    this model.


    As web applications got more advanced and pages more dynamic, a new model emerged,
    called Ajax. Using Ajax, it’s possible to perform an HTTP request and get the
    HTTP response without having to refresh the whole page, which is amazing because
    pages now can be very dynamic. When using JavaScript libraries such as `JQuery`,
    it becomes even easier. So, we have nothing more to worry about, right?


    ## 9.1 Polling vs. WebSocket


    Imagine that in a chat room, UserA sends an HTTP request with a text message using
    Ajax to a specific user (say, UserB). Now the server must relay this message to
    UserB. But how? The server is not able to send an HTTP request; its role is to
    receive HTTP requests, not to send. This is the way that HTTP works.


    How could UserB get this message transparently (I mean, without having to refresh
    the whole chat room page)? It’s easy—just make UserB send HTTP requests using
    Ajax every three seconds to the server to check whether there are messages for
    that user. If there are messages, then the server appends them to the HTTP response.
    This is a polling strategy.


    The question is, is this a good solution for this problem? In this scenario, every
    three seconds all the clients would be sending HTTP requests to the server, even
    if there are no messages for them. It creates overhead, doesn’t it? In addition,
    every time an HTTP request occurs, there’s a handshake, and a Transmission Control
    Protocol (TCP) connection is established between the client and the server. This
    is a resource-consuming operation. There’s also another issue to consider: the
    HTTP protocol is verbose, with lots of headers, so every request is bandwidth-consuming
    as well.


    That is where WebSocket can help you. It allows you to open a full-duplex bidirectional
    TCP connection where both sides (the client and the server) can send frames. These
    frames are different than HTTP requests. Actually, after a WebSocket connection
    is opened, all traffic between the client and the server occurs through it, so
    no HTTP requests are sent anymore. Figure 9-1 shows what a frame looks like.


    ![A453568_1_En_9_Fig1_HTML.gif](A453568_1_En_9_Fig1_HTML.gif)


    Figure 9-1. WebSocket frame


    To establish this WebSocket connection, an HTTP handshake takes place to upgrade
    from HTTP to the WebSocket protocol (Figure 9-2).


    ![A453568_1_En_9_Fig2_HTML.jpg](A453568_1_En_9_Fig2_HTML.jpg)


    Figure 9-2. WebSocket handshake


    After the WebSocket connection is opened, it uses a heartbeat mechanism through
    ping/pong frames to keep the connection alive.


    ## 9.2 WebSocket and Browser Compatibility


    There are cases where some browsers (try to find out which ones!) in older versions
    may block the WebSocket communication. To deal with this, Spring 4 offers easy
    `SockJS` integration that adds fallback options to simulate WebSocket behavior
    by using HTTP streaming or HTTP long polling instead. You’ll see how easy it is
    to enable this compatibility mode using Spring later in this book.


    ## 9.3 Raw WebSocket vs. WebSocket over STOMP


    As you have learned, the WebSocket protocol allows you to establish a full-duplex
    bidirectional TCP connection where data can be exchanged in both directions. Now
    the question is, what are you actually transmitting through this connection, and
    how will the server know which type of data the content is?


    Basically, the raw WebSocket technology is low level and neutral to the message’s
    content, so it’s only possible to set whether it’s binary or text data; WebSocket
    says nothing about the message’s format. This means that both the client and the
    server must previously agree on which kind of format they will be exchanging messages
    in so that the communication is successful. This might not be that convenient.


    To address this issue, the WebSocket technology can run over subprotocols like
    STOMP, which is an application layer protocol that specifies many commands that
    help you handle text messages without worrying about which format is being exchanged
    between the client and the server (the “format” would be the STOMP specification
    itself). The client and server should specify the subprotocol to be used during
    the WebSocket connection in the handshake phase.


    The Spring documentation has a nice definition of the STOMP protocol: “STOMP is
    a simple text-oriented messaging protocol that was originally created for scripting
    languages such as Ruby, Python, and Perl to connect to enterprise message brokers.
    It was designed to address a subset of commonly used messaging patterns. STOMP
    can be used over any reliable two-way streaming network protocol such as TCP and
    WebSocket. Although STOMP is a text-oriented protocol, the payload of messages
    can be either text or binary.”


    Just keep in mind that you’re not required to use subprotocols, but using them
    makes your life much easier. In this book, you will implement WebSocket using
    STOMP as the subprotocol.


    ![A453568_1_En_9_Figa_HTML.jpg](A453568_1_En_9_Figa_HTML.jpg) WebSocket can also
    be secured by relying on Transport Layer Security (TLS) over TCP. Like HTTP and
    HTTPS, WebSocket can use the `WS` or `WSS` scheme.


    Footnotes


    1. [`https://www.w3schools.com/xml/ajax_intro.asp`](https://www.w3schools.com/xml/ajax_intro.asp)

    2. [`https://stomp.github.io/stomp-specification-1.2.html`](https://stomp.github.io/stomp-specification-1.2.html)

    3. [`https://docs.spring.io/spring/docs/current/spring-framework-reference/html/websocket.html`](https://docs.spring.io/spring/docs/current/spring-framework-reference/html/websocket.html)


    # 10. Spring WebSocket


    Spring WebSocket provides good support for WebSocket applications, and it’s easy
    to use when you understand what’s going on behind the scenes. This chapter will
    help you to start understanding some of the Spring WebSocket configuration possibilities.'
  raw: '# 9. WebSocket


    In the beginning, the Web was built on top of a model that consists of the following:


    *   The client sending an HTTP request to the web server

    *   The web server returning an HTTP response with the requested resource


    This works really well, and almost every web application is entirely based on
    this model.


    As web applications got more advanced and pages more dynamic, a new model emerged,
    called Ajax.[¹](#A453568_1_En_9_Chapter.html#Fn1) Using Ajax , it’s possible to
    perform an HTTP request and get the HTTP response without having to refresh the
    whole page, which is amazing because pages now can be very dynamic. When using
    JavaScript libraries such as JQuery, it becomes even easier. So, we have nothing
    more to worry about, right?


    ## 9.1 Polling vs. WebSocket


    Imagine that in a chat room, UserA sends an HTTP request with a text message using
    Ajax to a specific user (say, UserB). Now the server must relay this message to
    UserB. But how? The server is not able to send an HTTP request; its role is to
    receive HTTP requests, not to send. This is the way that HTTP works.


    How could UserB get this message transparently (I mean, without having to refresh
    the whole chat room page)? It’s easy—just make UserB send HTTP requests using
    Ajax every three seconds to the server to check whether there are messages for
    that user. If there are messages, then the server appends them to the HTTP response.
    This is a polling strategy.


    The question is, is this a good solution for this problem? In this scenario, every
    three seconds all the clients would be sending HTTP requests to the server, even
    if there are no messages for them. It creates overhead, doesn’t it? In addition,
    every time an HTTP request occurs, there’s a handshake, and a Transmission Control
    Protocol (TCP) connection is established between the client and the server. This
    is a resource-consuming operation. There’s also another issue to consider: the
    HTTP protocol is verbose, with lots of headers, so every request is bandwidth-consuming
    as well.


    That is where WebSocket can help you. It allows you to open a full-duplex bidirectional
    TCP connection where both sides (the client and the server) can send frames. These
    frames are different than HTTP requests . Actually, after a WebSocket connection
    is opened, all traffic between the client and the server occurs through it, so
    no HTTP requests are sent anymore. Figure [9-1](#A453568_1_En_9_Chapter.html#Fig1)
    shows what a frame looks like.


    ![A453568_1_En_9_Fig1_HTML.gif](A453568_1_En_9_Fig1_HTML.gif)


    Figure 9-1.


    WebSocket frame


    To establish this WebSocket connection, an HTTP handshake takes place to upgrade
    from HTTP to the WebSocket protocol (Figure [9-2](#A453568_1_En_9_Chapter.html#Fig2)).


    ![A453568_1_En_9_Fig2_HTML.jpg](A453568_1_En_9_Fig2_HTML.jpg)


    Figure 9-2.


    WebSocket handshake


    After the WebSocket connection is opened, it uses a heartbeat mechanism through
    ping/pong frames to keep the connection alive.


    ## 9.2 WebSocket and Browser Compatibility


    There are cases where some browsers (try to find out which ones!) in older versions
    may block the WebSocket communication. To deal with this, Spring 4 offers easy
    SockJS integration that adds fallback options to simulate WebSocket behavior by
    using HTTP streaming or HTTP long polling instead. You’ll see how easy it is to
    enable this compatibility mode using Spring later in this book.


    ## 9.3 Raw WebSocket vs. WebSocket over STOMP


    As you have learned, the WebSocket protocol allows you to establish a full-duplex
    bidirectional TCP connection where data can be exchanged in both directions. Now
    the question is, what are you actually transmitting through this connection, and
    how will the server know which type of data the content is?


    Basically, the raw WebSocket technology is low level and neutral to the message’s
    content, so it’s only possible to set whether it’s binary or text data; WebSocket
    says nothing about the message’s format. This means that both the client and the
    server must previously agree on which kind of format they will be exchanging messages
    in so that the communication is successful. This might not be that convenient.


    To address this issue, the WebSocket technology can run over subprotocols like
    STOMP,[²](#A453568_1_En_9_Chapter.html#Fn2) which is an application layer protocol
    that specifies many commands that help you handle text messages without worrying
    about which format is being exchanged between the client and the server (the “format”
    would be the STOMP specification itself). The client and server should specify
    the subprotocol to be used during the WebSocket connection in the handshake phase.


    The Spring documentation[³](#A453568_1_En_9_Chapter.html#Fn3) has a nice definition
    of the STOMP protocol: “STOMP is a simple text-oriented messaging protocol that
    was originally created for scripting languages such as Ruby, Python, and Perl
    to connect to enterprise message brokers. It was designed to address a subset
    of commonly used messaging patterns. STOMP can be used over any reliable two-way
    streaming network protocol such as TCP and WebSocket. Although STOMP is a text-oriented
    protocol, the payload of messages can be either text or binary.”


    Just keep in mind that you’re not required to use subprotocols, but using them
    makes your life much easier. In this book, you will implement WebSocket using
    STOMP as the subprotocol.


    ![A453568_1_En_9_Figa_HTML.jpg](A453568_1_En_9_Figa_HTML.jpg) WebSocket can also
    be secured by relying on Transport Layer Security (TLS) over TCP. Like HTTP and
    HTTPS , WebSocket can use the WS or WSS scheme.


    Footnotes [1](#A453568_1_En_9_Chapter.html#Fn1_source)


    [`https://www.w3schools.com/xml/ajax_intro.asp`](https://www.w3schools.com/xml/ajax_intro.asp)


