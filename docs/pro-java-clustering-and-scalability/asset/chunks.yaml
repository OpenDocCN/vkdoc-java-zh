- fmt: '### 18.2.1 Send Public System Messages over WebSocket


    Let’s examine the `join` method now. First it adds the user to the `chatRoom`
    object and persists it in Redis; then it calls the `sendPublicMessage` method
    that uses `SimpMessagingTemplate` (that you’ve already used before in this book)
    and sends a public welcome message as the `admin` user. Every connected user is
    able to receive this message because it’s sent to the `''/topic/'' + chatRoomId
    + ''.public.messages''` destination, which is one of the subscriptions that happens
    when a user establishes the WebSocket connection. Then, it calls the `appendInstantMessageToConversations`
    method in the `InstantMessageService` component, which is responsible for storing
    the message to the users’ conversations in Cassandra. Here is the code for this
    method:


    ```java

    @Service

    public class CassandraInstantMessageService implements InstantMessageService {

    @Autowired

    private InstantMessageRepository instantMessageRepository;

    @Autowired

    private ChatRoomService chatRoomService;

    @Override

    public void appendInstantMessageToConversations(InstantMessage instantMessage)
    {

    if (instantMessage.isFromAdmin() || instantMessage.isPublic()) {

    ChatRoom chatRoom = chatRoomService.findById(instantMessage.getChatRoomId());

    chatRoom.getConnectedUsers().forEach(connectedUser -> {

    instantMessage.setUsername(connectedUser.getUsername());

    instantMessageRepository.save(instantMessage);

    });

    } else {

    instantMessage.setUsername(instantMessage.getFromUser());

    instantMessageRepository.save(instantMessage);

    instantMessage.setUsername(instantMessage.getToUser());

    instantMessageRepository.save(instantMessage);

    }

    }

    @Override

    public List findAllInstantMessagesFor(String username, String chatRoomId) {

    return instantMessageRepository.findInstantMessagesByUsernameAndChatRoomId(username,
    chatRoomId);

    }

    }

    ```


    This code essentially saves in Cassandra the message for the involved users. For
    example, if you send a private message to me, this method will append the message
    to my conversation and to yours. But if you send a public message, then this method
    will append the message to each connected user’s conversation.


    Finally, it calls the `updateConnectedUsersViaWebSocket` method, which also sends
    a public message to the `''/topic/'' + chatRoomId + ''.connected.users''` destination.
    As all users have a subscription to this destination, they are able to receive
    the message and update their connected users panel.


    Essentially, the same flow occurs when a user leaves the chat room.


    # 19. Sending a User’s Public Messages over WebSocket


    When the client sends a public message in the chat room, the `sendMessage` JavaScript
    function is called. Essentially, it converts the `instantMessage` JavaScript object
    into a JSON representation and sends the message to the application destination
    `/chatroom/send.message`.


    ```javascript

    function sendMessage() {

    var instantMessage;

    if (spanSendTo.text() == "public") {

    instantMessage = {

    ''text'' : inputMessage.val()

    }

    } else {

    instantMessage = {

    ''text'' : inputMessage.val(),

    ''toUser'' : spanSendTo.text()

    }

    }

    stompClient.send("/chatroom/send.message",  {},  JSON.stringify(instantMessage));

    inputMessage.val("").focus();

    }

    ```


    ![A453568_1_En_19_Figa_HTML.jpg](A453568_1_En_19_Figa_HTML.jpg) Refer to the “Message
    Flow Using a Simple Broker” section in Chapter [10](#A453568_1_En_10_Chapter.html)
    for details of how the messages are routed based on destination names.


    In the `ChatRoomController` Java class, the method `sendMessage` is called, and
    the `instantMessage` object has the `fromUser` and `chatRoomId` fields set. Then,
    the `chatRoomService` object is called to send a private or public message. In
    this case, the `instantMessage.isPublic()` method will return `true`, so a public
    message will be sent.


    ```java

    @Controller

    public class ChatRoomController {

    @Autowired

    private ChatRoomService chatRoomService;

    @MessageMapping("/send.message")

    public void sendMessage(@Payload InstantMessage instantMessage, Principal principal,
    SimpMessageHeaderAccessor headerAccessor) {

    String chatRoomId = headerAccessor.getSessionAttributes().get("chatRoomId").toString();

    instantMessage.setFromUser(principal.getName());

    instantMessage.setChatRoomId(chatRoomId);

    if (instantMessage.isPublic()) {

    chatRoomService.sendPublicMessage(instantMessage);

    } else {

    chatRoomService.sendPrivateMessage(instantMessage);

    }

    }

    }

    ```


    The `sendPublicMessage` method in the `ChatRoomService` class was already explained
    in the “Send Public System Messages over WebSocket” section of Chapter [18](#A453568_1_En_18_Chapter.html).'
