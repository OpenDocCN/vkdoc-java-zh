    ## 10.1 原始 WebSocket 配置


    尽管你不会在聊天应用中使用原始 WebSocket 配置，但以下是其在 Spring 中的配置示例：


    ```

    @Configuration

    @EnableWebSocket

    public class RawWebSocketConfiguration implements WebSocketConfigurer {

    @Override

    public void registerWebSocketHandlers(WebSocketHandlerRegistry registry) {

    registry.addHandler(myRawWebSocketHandler(),  "/rawwebsocket");

    }

    @Bean

    public WebSocketHandler myRawWebSocketHandler() {

    return new MyRawWebSocketHandler();

    }

    }

    ```


    这里声明了客户端将要连接的 WebSocket 端点（`ws://localhost:port/rawwebsocket`），并指定由 `MyRawWebSocket`
    类的实例来处理接收到的帧。


    ```

    public class MyRawWebSocketHandler extends TextWebSocketHandler {

    public void afterConnectionEstablished(WebSocketSession session) {

    TextMessage msg = new TextMessage("客户端连接成功！");

    //客户端将收到此帧作为成功事件的回调

    session.sendMessage(msg);

    }

    public void handleTextMessage(WebSocketSession session, TextMessage message) {

    // 这是消息内容，可以是任何格式（json、xml、纯文本……谁知道呢？）

    System.out.println(message.getPayload());

    TextMessage msg = new TextMessage("消息已收到。谢谢，客户端！");

    session.sendMessage(msg);

    }

    }

    ```


    ![A453568_1_En_10_Figa_HTML.jpg](img/A453568_1_En_10_Figa_HTML.jpg) 还有一个 `BinaryWebSocketHandler`
    类，当你通过原始 WebSocket 配置处理二进制数据时，可以继承该类。


    以下是客户端代码：


    ```

    function connectWebSocket(){

    ws = new WebSocket(''ws://localhost:8080/rawwebsocket'');

    ws.onmessage = function(event){

    renderServerMessage(event.data);

    };

    }

    function sendMessageToServer() {

    var text = document.getElementById(''myText'').value;

    var jsonMessage = JSON.stringify({ ''content'': text });

    ws.send(jsonMessage);

    }

    ```


    请注意，客户端以 JavaScript 对象表示法（JSON）格式向服务器发送消息。实际上，它发送 JSON 是因为它想发送一条 JSON 消息（因为客户端已经知道服务器期望的是
    JSON 消息），但请记住，它也可以发送纯文本消息、XML 消息或其他任何格式（这就是原始 WebSocket 的工作方式！）。


    ![A453568_1_En_10_Figb_HTML.jpg](img/A453568_1_En_10_Figb_HTML.jpg) 如果你想启用 WebSocket
    浏览器兼容性，当由于兼容性问题无法使用 WebSocket 时，你必须使用某种方式来模拟 WebSocket 行为。幸运的是，SockJS¹ 可以轻松为你处理这个问题。使用
    Spring 启用 SockJS 支持只需在处理程序上添加一个 `.withSockJS()` 方法调用，如下所示：


    ```

    @Configuration

    @EnableWebSocket

    public class RawWebSocketConfiguration implements WebSocketConfigurer {

    @Override

    public void registerWebSocketHandlers(WebSocketHandlerRegistry registry) {

    registry.addHandler(myRawWebSocketHandler(),   "/rawwebsocket").withSockJS();

    }

    @Bean

    public WebSocketHandler myRawWebSocketHandler() {

    return new MyRawWebSocketHandler();

    }

    }

    ```


    ## 10.2 基于 STOMP 的 WebSocket 配置


    以下是使用 Spring 配置基于 STOMP 的 WebSocket 的方法：


    ```

    @Configuration

    @EnableWebSocketMessageBroker

    public class WebSocketConfiguration extends AbstractWebSocketMessageBrokerConfigurer
    {

    @Override

    public void configureMessageBroker(MessageBrokerRegistry config) {

    config.enableSimpleBroker("/queue/",  "/topic/");

    config.setApplicationDestinationPrefixes("/app");

    }

    @Override

    public void registerStompEndpoints(StompEndpointRegistry registry) {

    registry.addEndpoint("/stompwebsocket").withSockJS();

    }

    }

    ```


    要使用 STOMP，你需要一个 STOMP 代理。基本上，这个组件负责跟踪订阅并向订阅用户广播消息。在上述配置中，请注意以下几点：


    *   通过声明两个目的地 `/queue/` 和 `/topic/`，启用了内存中的 STOMP 代理。这有助于开发阶段，但不建议用于生产环境（当你稍后学习本书中的多节点架构时，就会明白原因）。


    ![A453568_1_En_10_Figc_HTML.jpg](img/A453568_1_En_10_Figc_HTML.jpg) 在 STOMP 规范中，目的地的含义有意保持不透明。它可以是任何字符串，完全由
    STOMP 服务器来定义其支持的目的地的语义和语法（例如，RabbitMQ 定义了点号表示法，其中目的地名称应由点号分隔，如 `/topic/public.messages`）。然而，目的地通常是类似路径的字符串，其中
    `/topic/` 表示发布-订阅²模式（一对多），而 `/queue/` 表示点对点³（一对一）消息交换。


    ![A453568_1_En_10_Figd_HTML.jpg](img/A453568_1_En_10_Figd_HTML.jpg) `/queue/`
    和 `/topic/` 是代理目的地，这意味着任何发送到以这些前缀开头的目的地的帧都将由 STOMP 代理直接处理。


    *   应用目的地前缀是 `/app`。基本上，当帧被发送到以 `/app` 开头的目的地时，带有 `@Controller` 注解的类会在将帧转发给代理之前处理它。更具体地说，`@Controller`
    注解类中带有 `@MessageMapping` 注解的方法将处理它（如果你还不理解，不用担心）。

    *   客户端将使用 JavaScript 连接到 STOMP 端点（`ws://localhost:port/stompwebsocket`）。


    现在，在客户端，有一些 JavaScript 代码，如下所示：


    ```

    function connect() {

    socket = new SockJS(''/stompwebsocket'');

    stompClient = Stomp.over(socket);

    stompClient.connect({ }, function(frame) {

    stompClient.subscribe(''/topic/public.messages'', renderPublicMessages);

    });

    }

    function renderPublicMessages(message) {

    //例如，将消息追加到一个 div 中

    }

    function sendMessage() {

    var instantMessage;

    instantMessage = {

    ''text'' : inputMessage.val(),

    ''toUser'' : spanSendTo.text()

    }

    stompClient.send("/app/send.message",  {},  JSON.stringify(instantMessage));

    }

    ```


    让我们理解一下这里发生了什么。


    *   当调用 `connect` 函数时，会使用 STOMP 作为子协议打开一个新的 WebSocket 连接。

    *   在成功回调中，执行一个匿名函数，用户订阅了 `/topic/public.messages` 目的地。从现在起，该用户将能够接收发送到该目的地的任何消息（来自任何客户端甚至服务器端），并将其传递给
    `renderPublicMessages` 函数，该函数会将消息追加到一个 `div` 中，例如。

    *   当调用 `sendMessage` 函数时，会向 `/app/send.message` 目的地发送一个包含消息的帧。还记得吗，发送到以 `/app`
    开头的目的地的每条消息都将由 `@Controller` 注解类中的 `@MessageMapping` 方法处理？这就是处理它的方法：

    '
