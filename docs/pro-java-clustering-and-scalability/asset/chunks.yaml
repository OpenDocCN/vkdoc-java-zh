- fmt: '# 20. Sending a User’s Private Messages over WebSocket


    Sending private messages can be a little bit trickier than sending public ones.
    Let’s take a look at the JavaScript code, shown here:


    ```

    function sendMessage() {

    var instantMessage;

    if (spanSendTo.text() == "public") {

    instantMessage = {

    ''text'' : inputMessage.val()

    }

    } else {

    instantMessage = {

    ''text'' : inputMessage.val(),

    ''toUser'' : spanSendTo.text()

    }

    }

    stompClient.send("/chatroom/send.message", {}, JSON.stringify(instantMessage));

    inputMessage.val("").focus();

    }

    ```


    When the client sends a private message in the chat room, the `sendMessage` JavaScript
    function is called. Essentially, it converts the `instantMessage` JavaScript object
    into a JSON representation and sends the message to the application destination
    `/chatroom/send.message`, which is the same destination used for sending a user’s
    public messages.


    ```

    @Controller

    public class ChatRoomController {

    @Autowired

    private ChatRoomService chatRoomService;

    @MessageMapping("/send.message")

    public void sendMessage(@Payload InstantMessage instantMessage, Principal principal,

    SimpMessageHeaderAccessor headerAccessor) {

    String chatRoomId = headerAccessor.getSessionAttributes().get("chatRoomId").toString();

    instantMessage.setFromUser(principal.getName());

    instantMessage.setChatRoomId(chatRoomId);

    if (instantMessage.isPublic()) {

    chatRoomService.sendPublicMessage(instantMessage);

    } else {

    chatRoomService.sendPrivateMessage(instantMessage);

    }

    }

    }

    ```


    In the `ChatRoomController` Java class, the method `sendMessage` is called, and
    the `instantMessage` object has the `fromUser` and `chatRoomId` fields set. Then,
    the `chatRoomService` is called to send a private or a public message. In this
    case, the `instantMessage.isPublic()` method returns `false`, so a private message
    will be sent.


    ```

    @Service

    public class RedisChatRoomService implements ChatRoomService {

    @Autowired

    private SimpMessagingTemplate webSocketMessagingTemplate;

    @Autowired

    private InstantMessageService instantMessageService;

    @Override

    public void sendPrivateMessage(InstantMessage instantMessage) {

    webSocketMessagingTemplate.convertAndSendToUser(

    instantMessage.getToUser(),

    Destinations.ChatRoom.privateMessages(instantMessage.getChatRoomId()), instantMessage);

    webSocketMessagingTemplate.convertAndSendToUser(

    instantMessage.getFromUser(),

    Destinations.ChatRoom.privateMessages(instantMessage.getChatRoomId()), instantMessage);

    instantMessageService.appendInstantMessageToConversations(instantMessage);

    }

    }

    ```


    If you look closely at `Destinations.ChatRoom.privateMessages(instantMessage.getChatRoomId())`,
    you will see that this static method will return a `String` that represents the
    user’s private messages destination. For example, for a chat room with an ID of
    `AG1XX5`, it would be something like `/queue/AG1XX5.private.messages`.


    When the `convertAndSendToUser` method is invoked, it receives the target username
    (the user’s username that will receive the private message), the destination,
    and the `instantMessage` itself. The question now is, how can Spring can send
    a message to a specific user if the destination `/queue/AG1XX5.private.messages`
    says nothing about the target user? In fact, every different user who sends a
    private message will have this same destination name, right?


    Well, Spring is smart, and behind the scenes `UserDestinationMessageHandler` will
    append to this destination the target user’s WebSocket session ID. Then, if the
    WebSocket session ID for the target user is `user123`, the destination will be
    transformed into `/queue/AG1XX5.private.messages-user123`, and the message will
    be sent to it.


    Now, for the user to receive this private message, the user must be subscribed
    to this destination. Let’s check the JavaScript subscriptions code and find out
    whether the user is subscribed to the `/queue/AG1XX5.private.messages-user123`
    destination.


    ```

    function connect() {

    socket = new SockJS(''/ws'');

    stompClient = Stomp.over(socket);

    stompClient.connect({ ''chatRoomId'' : chatRoomId }, stompSuccess, stompFailure);

    }

    function stompSuccess(frame) {

    ...

    stompClient.subscribe(''/user/queue/'' + chatRoomId + ''.private.messages'', privateMessages);

    ...

    }

    ```


    No! There is no subscription to this destination. That’s weird! Well, actually
    when Spring detects a subscription with the prefix `/user/`, `UserDestinationMessageHandler`
    will again append the WebSocket session ID to the destination name and remove
    `/user` from it. So, in the end, the user will be subscribing to the `/queue/AG1XX5.private.messages-user123`
    destination instead of `/user/queue/AG1XX5.private.messages`.


    Well, if the user is subscribed to this destination, then he will be able to receive
    the private message. Voilà!


    The question now is, why does Spring perform this magic for you? Well, if you
    want to send a private message to a user, you must know exactly which destination
    name the user is subscribed to, right? In addition, the destination name must
    be unique, so to get this guarantee, the WebSocket session ID is used. Is it convenient
    to have to know the user’s WebSocket session ID in order to send a private message
    to him? I think you will agree with me…no! That’s why Spring does this “translation”
    for you. It’s able to retrieve the WebSocket session ID from the user’s username.
    This allows you to send a private message to a specific user from any part of
    the system just by making a call like this:


    ```

    simpMessagingTemplate.convertAndSendToUser(

    "target_username_here",

    "/queue/AG1XX5.private.messages"),

    instantMessage);

    ```


