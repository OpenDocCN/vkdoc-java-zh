    it will contain a huge amount of data very soon. Also, a chat application has
    a massive number of message writes, and a message can be considered time-series
    data, right? Since full consistency is not that crucial to this context, why not
    give up a little bit of consistency and work in eventual consistency mode (this
    is Cassandra’s default behavior, by the way) to achieve extraordinary write performance?
    Basically, that’s why I chose to use Cassandra.


    ![A453568_1_En_7_Figf_HTML.jpg](A453568_1_En_7_Figf_HTML.jpg) Eventual Consistency
    is a consistency model that assures that at some point in the near future the
    system (in this case, Cassandra) will become consistent.


    Consistency in Cassandra can be adjusted at either write or read time. For instance,
    you can specify that you want a write to be fully consistent, which means that
    it will return success only after the write is successfully performed in each
    replica node. That is, after the success, you have the guarantee that any read
    to this data will return the most recent (and same) data regardless of the node
    that responds. Just keep in mind that higher consistency comes with a latency
    price, so full consistency means the worst performance.


    ![A453568_1_En_7_Figg_HTML.jpg](A453568_1_En_7_Figg_HTML.jpg) The CAP theorem
    [^(12)](#A453568_1_En_7_Chapter.html#Fn12) states that when a total partition
    (a network failure, for example) or a temporary partition (the latency between
    data replication after a write request, a full GC in the JVM, etc) happens in
    a distributed system, it has to choose between consistency or availability. If
    the distributed system picks consistency over availability, it will be unavailable
    until the partition is fixed. On the other hand, if it picks availability over
    consistency, it will return a response for a request but this may not contain
    the most up to date data.


    In Cassandra, you can create keyspaces, insert data, query data, and do much more
    using the Cassandra Query Language (CQL) . A command-line tool called `cqlsh`
    allows you to issue CQL commands against your Cassandra instances. CQL is similar
    to SQL commands, so it’s easy to get used to working with CQL commands .


    ### 7.2.1 Cassandra Concepts


    Now you will learn some important concepts, and I’ll talk about modeling when
    it comes to Cassandra.


    #### 7.2.1.1 Keyspace


    A keyspace is similar to a database in relational databases. It groups a set of
    column families (like SQL tables) from the same domain. Here is where you define
    the replication factor , that is, the number of replicas that this keyspace will
    have in different nodes. This chat app will run just on a local machine, not a
    Cassandra cluster. Thus, here is the keyspace definition:


    ```

    CREATE KEYSPACE ebook_chat WITH REPLICATION =

    { ''class'' : ''SimpleStrategy'', ''replication_factor'' : 1 };

    ```


    ![A453568_1_En_7_Figh_HTML.jpg](A453568_1_En_7_Figh_HTML.jpg) These keyspace settings
    are not suitable for a production environment. In production, you will want to
    set `NetworkTopologyStrategy` and a replication factor of at least 3.


    #### 7.2.1.2 Column Family


    A column family is similar to a table in relational databases. It stores the data
    in the form of rows and columns.


    ```

    CREATE TABLE messages (

    username text,

    chatRoomId text,

    date timestamp,

    fromUser text,

    toUser text,

    text text,

    PRIMARY KEY ((username, chatRoomId), date)

    ) WITH CLUSTERING ORDER BY (date ASC);

    ```


    #### 7.2.1.3 Primary Key


    A row is uniquely identified by a primary key. Every column family must define
    a primary key, and the primary key may be composed of partition keys and clustering
    keys. A primary key can be just a single column or multiple columns. When there
    is more than one column, you call it a composite primary key. You can query data
    in Cassandra using its primary key columns or secondary indexes. The `messages`
    column family has a composite primary key, shown here:


    ```

    PRIMARY KEY ((username, chatRoomId), date)

    ```


    #### 7.2.1.4 Secondary Index


    A secondary index allows you to query a column that is not part of the primary
    key. Remember that adding secondary indexes will penalize the write performance!'
  trans: '

    ## 7.2 Cassandra 概述


    为了让你了解一些分布式系统能变得多么强大，你知道吗，最大的 Cassandra 生产集群被苹果公司使用？这个集群拥有超过 75,000 个节点，存储着超过
    10PB 的数据。第二名是 Netflix，拥有 2,500 个节点，存储着 420TB 数据，每天处理超过 1 万亿次请求。你能想象一个由超过 75,000
    台机器协同工作的数据库吗？好了，既然你已经印象深刻，那么我向你介绍 Cassandra 就更容易了！


    ![A453568_1_En_7_Figd_HTML.jpg](img/A453568_1_En_7_Figd_HTML.jpg) 虽然我是一名 Java
    开发者，但过去几年我一直担任 DevOps 工程师，正如我在引言“我是谁？”部分中更详细地解释的那样。不幸的是，这本书并不完全关于基础设施，所以我无法深入探讨基础设施的细节。尽管如此，我邀请你看看我的网站⁵上提供的电子书、在线课程和文章，我在那里对这些主题进行了更深入的探讨。


    Cassandra 基于 Google 的 Bigtable 和 Amazon 的 DynamoDB，最初由 Facebook 创建。随后它被开源，现在是一个
    Apache [项目](http://cassandra.apache.org/)。⁶ 现在甚至可以通过 DataStax⁷ 获得“企业版”，它也有一个社区版。


    正如你已经知道的，Cassandra 是一个属于列族类别的 NoSQL 数据库。它能够处理每秒大量的写入和读取，同时在向 Cassandra 集群添加节点时保持线性可扩展性⁸。Cassandra
    还跨地理分布的数据中心提供自动、可靠的复制。


    Cassandra 是一个实现点对点⁹架构的分布式系统（图 7-2）。它使用 gossip 协议¹⁰ 进行内部通信。换句话说，不存在主节点单点故障，因此每个节点都能处理读取和写入。


    ![A453568_1_En_7_Fig2_HTML.jpg](img/A453568_1_En_7_Fig2_HTML.jpg)


    图 7-2.


    点对点架构


    Cassandra 的分区策略基于你在为列族建模主键时指定的分区键。你现在可能会想：“这家伙在说什么？”别急，几分钟后你就会明白了。


    基本上，当你处理大量时间序列数据时，Cassandra 是一个极好的选择，这在物联网¹¹、日志、指标等场景中很常见。当放松一致性不是问题时，它甚至更合适，尽管你可以调整写入和读取的一致性级别。


    ![A453568_1_En_7_Fige_HTML.jpg](img/A453568_1_En_7_Fige_HTML.jpg) 读取一致性是指在给定的时间点，每个节点对同一查询返回相同的结果。请记住，分布式系统运行在具有延迟的网络之上，因此当你将数据写入特定节点时，复制将开始发生，并需要几毫秒才能在其他节点上完成。在这几毫秒内，如果向其他节点发出读取请求，那么它们将返回过时数据。在
    Cassandra 中，写入和读取的一致性级别是完全可调的。


    为什么我选择 Cassandra 来存储聊天应用程序中聊天消息的历史记录？好吧，由于聊天应用程序可以在全球范围内使用，它很快就会包含大量数据。此外，聊天应用程序有大量的消息写入，而消息可以被视为时间序列数据，对吧？既然完全一致性对这个上下文来说不是那么关键，为什么不放弃一点一致性，以最终一致性模式工作（顺便说一下，这是
    Cassandra 的默认行为）来获得卓越的写入性能呢？基本上，这就是我选择使用 Cassandra 的原因。


    ![A453568_1_En_7_Figf_HTML.jpg](img/A453568_1_En_7_Figf_HTML.jpg) 最终一致性是一种一致性模型，它保证在不久的将来某个时刻，系统（本例中为
    Cassandra）将变得一致。


    Cassandra 中的一致性可以在写入或读取时进行调整。例如，你可以指定希望写入是完全一致的，这意味着只有在每个副本节点上成功执行写入后，它才会返回成功。也就是说，成功后，你可以保证对该数据的任何读取都将返回最新（且相同）的数据，无论哪个节点响应。请记住，更高的一致性伴随着延迟代价，因此完全一致性意味着最差的性能。


    ![A453568_1_En_7_Figg_HTML.jpg](img/A453568_1_En_7_Figg_HTML.jpg) CAP 定理¹² 指出，当分布式系统中发生完全分区（例如网络故障）或临时分区（写入请求后数据复制之间的延迟、JVM
    中的完全 GC 等）时，它必须在一致性或可用性之间做出选择。如果分布式系统选择一致性而非可用性，那么在分区修复之前它将不可用。另一方面，如果它选择可用性而非一致性，它将返回对请求的响应，但该响应可能不包含最新的数据。


    在 Cassandra 中，你可以使用 Cassandra 查询语言 (CQL) 创建键空间、插入数据、查询数据以及执行更多操作。一个名为 `cqlsh`
    的命令行工具允许你对 Cassandra 实例发出 CQL 命令。CQL 类似于 SQL 命令，因此很容易习惯使用 CQL 命令。


    ### 7.2.1 Cassandra 概念


    现在你将学习一些重要的概念，我将讨论在 Cassandra 中的建模。


    #### 7.2.1.1 键空间


    键空间类似于关系数据库中的数据库。它将来自同一域的一组列族（类似于 SQL 表）分组。在这里定义复制因子，即该键空间在不同节点上拥有的副本数量。这个聊天应用将只在本地机器上运行，而不是
    Cassandra 集群。因此，以下是键空间定义：


    ```

    CREATE KEYSPACE ebook_chat WITH REPLICATION =

    { ''class'' : ''SimpleStrategy'', ''replication_factor'' : 1 };

    ```


    ![A453568_1_En_7_Figh_HTML.jpg](img/A453568_1_En_7_Figh_HTML.jpg) 这些键空间设置不适用于生产环境。在生产环境中，你需要设置
    `NetworkTopologyStrategy` 和至少为 3 的复制因子。


    #### 7.2.1.2 列族


    列族类似于关系数据库中的表。它以行和列的形式存储数据。


    ```

    CREATE TABLE messages (

    username text,

    chatRoomId text,

    date timestamp,

    fromUser text,

    toUser text,

    text text,

    PRIMARY KEY ((username, chatRoomId), date)

    ) WITH CLUSTERING ORDER BY (date ASC);

    ```


    #### 7.2.1.3 主键


    一行由主键唯一标识。每个列族必须定义一个主键，并且主键可以由分区键和聚簇键组成。主键可以是单个列或多个列。当有多个列时，称为复合主键。你可以使用 Cassandra
    的主键列或二级索引来查询数据。`messages` 列族有一个复合主键，如下所示：


    ```

    PRIMARY KEY ((username, chatRoomId), date)

    ```


    #### 7.2.1.4 二级索引


    二级索引允许你查询不属于主键的列。请记住，添加二级索引会降低写入性能！

