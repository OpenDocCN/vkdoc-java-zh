    Applications must be prepared to overcome geographical barriers and to spread
    quickly. If you use Uber services in your city, you know what I’m talking about.
    The eight-year-old location-based transportation app now operates in 570 cities
    worldwide. (By the way, Uber runs its infrastructure on Amazon Web Services.)


    ![A453568_1_En_7_Figb_HTML.jpg](A453568_1_En_7_Figb_HTML.jpg) The reason why I’m
    emphasizing this is to warn you that today a software engineer must know how to
    work with many more technologies than before. Some years ago you basically didn’t
    worry about which data persistence technology you’d use on a new project. The
    choices were just about what programming languages or relational database vendors
    you’d use. Today, for modern applications, data persistence is absolutely crucial.


    The reason why the chat application architecture uses so many different technologies
    is that each one addresses a different type of problem in the best way possible.


    For example, using a relational database to write the chat messages may not be
    the best choice when it comes to scalability; the chat application domain doesn’t
    require the ACID[¹](#A453568_1_En_7_Chapter.html#Fn1) properties, so using a relational
    database would lead to a big loss of performance. Relational databases don’t give
    up on consistency (they also use pessimistic locking), and they weren’t designed
    to be clustered, although it’s possible. The point is that it can’t achieve linear
    scalability (as Cassandra does, for example) because even when clustered, the
    underlying storage layer continues to be a bottleneck. Relational databases should
    be used when your domain requires the ACID properties (remember that I talked
    about the relationship between the domain and the architecture in Chapter [6](#A453568_1_En_6_Chapter.html)).


    There are many cases in which even modern applications need to be compliant with
    the ACID properties , and therefore a relational database such as MySQL is needed.
    In fact, the use of NoSQL technologies doesn’t mean you no longer need relational
    databases. What is crucial to keep in mind is that we’re in the polyglot [persistence](https://martinfowler.com/bliki/PolyglotPersistence.html)
    [²](#A453568_1_En_7_Chapter.html#Fn2) era (Figure [7-1](#A453568_1_En_7_Chapter.html#Fig1)).
    Essentially, this means you should adopt the appropriate persistence technology
    for each scenario.


    ![A453568_1_En_7_Fig1_HTML.jpg](A453568_1_En_7_Fig1_HTML.jpg)


    Figure 7-1.


    Polyglot persistence example (source: Martin Fowler)


    The majority of NoSQL databases are designed with horizontal scalability in mind.


    ![A453568_1_En_7_Figc_HTML.jpg](A453568_1_En_7_Figc_HTML.jpg) Horizontal scalability
    happens when you add more nodes to your cluster of machines. Vertical scalability
    happens when you increase a machine’s hardware power.


    The design of NoSQL databases is based on distributed systems.[³](#A453568_1_En_7_Chapter.html#Fn3)
    In short, they are designed to work as a cluster, that is, a set of nodes (machines)
    that are connected and that communicate over a network to address a specific problem
    (in this case, the data persistence problem).


    Essentially, NoSQL databases are classified into four categories.


    *   Key-value: Stores a value associated with a key (e.g., Redis, Memcached, Riak)

    *   Document: Stores entire documents (e.g., MongoDB, CouchDB, Elasticsearch)

    *   Column family: Stores data as columns instead of rows; designed for large
    volumes of data and read and write performance (e.g., Cassandra, HBase)

    *   Graph: Stores information about networks and connected entities (e.g., Neo4J,
    HyperGraphDB)


    Another important characteristic about NoSQL databases is that they are schemaless
    . That means they don’t have a rigid schema like relational databases do. For
    instance, a NoSQL document-based store can have a `User` collection storing users
    with different data associated (one may have the field `age`, and others not,
    without having to issue any `ALTER TABLE` command or something similar).


    Modeling relational databases is different than with NoSQL databases. In relational
    databases, you usually use the third normal form[⁴](#A453568_1_En_7_Chapter.html#Fn4)
    and make sure each table stores only “its own data.” Each relationship is represented
    with a foreign key, and a SQL `JOIN` is needed at runtime to retrieve data from
    different entities. Basically, you first model your domain without thinking about
    the queries that will be executed later. You build your queries later using SQL,
    which is highly flexible.


    ## 7.1 Modeling in NoSQL


    In a NoSQL context, you should think differently when it comes to modeling. Denormalization
    is your friend here because you are more concerned about performance (avoiding
    the use of joins, for example) than possibly duplicating data and consuming more
    storage. Remember, storage is cheap compared to CPU power and memory. When modeling
    in NoSQL, you must think about exactly which data you want to retrieve and model
    your “storage unit” to retrieve it.


    For example, say you need to retrieve the messages for a user in a specific chat
    room (quite a coincidence, isn’t it?). Using a relational database, you would
    create a table called `user`, a table called `chat room`, and a table called `messages`,
    and each message would have foreign keys representing the relationships to a user
    and chat room, right? In Cassandra, joins and foreign keys don’t exist, so you
    must think differently!


    In Cassandra , you would create one column family (similar to a table in relational
    databases) and store every entry there with the chat room ID, the user, and the
    message. Again, denormalization is your friend here.


    Now imagine that you need to retrieve only the messages from users who live in
    Brazil. Using the relational approach, what would you do? It’s easy: just create
    a query on the table `messages` joining the table `user` and add a `where` clause
    verifying that the user is from Brazil. Did you notice that when you modeled your
    relational tables, you weren’t thinking about this query, but SQL was able to
    handle it with its high flexibility?


    Now in Cassandra , what would you do? You already have the answer, I bet! But
    I know you are thinking that creating another column family for only this task
    sounds weird and that the database administrator (DBA) who has worked at your
    company for 20 years probably won’t like this idea. But you are correct. In this
    situation, that’s exactly what you would do. I hope your DBA likes Cassandra!'
  trans: '

    # 7. NoSQL 简介


    世界正在发生变化。长期以来，IBM 和 Oracle 等公司一直主导着规则，但现在，谷歌、Facebook、亚马逊等公司已经走在了前列。这些公司产生着 TB
    级的数据，并在短时间内处理数百万个请求，而且它们仍在日益增长。问题是，它们是如何扩展并处理如此海量的数据和请求的呢？事实是，以前从未有人遇到过这类问题（即使是
    IBM 或 Oracle 也没有），因此它们不得不创建自己的解决方案来实现扩展。


    例如，在数据持久化方面，这些公司采取了以下措施：


    *   Facebook 创建了 Cassandra。

    *   谷歌创建了 Bigtable。

    *   亚马逊创建了 DynamoDB。


    ![A453568_1_En_7_Figa_HTML.jpg](img/A453568_1_En_7_Figa_HTML.jpg) 数据持久化指的是，即使在创建数据的进程结束后，仍能保持数据存储并可供检索的能力。换句话说，对于一个数据存储来说，要被认为是持久化的，它必须写入非易失性存储。


    如今，每一个“新一代”应用程序都必须基于以下支柱进行设计，以实现增长：


    *   云计算

    *   大数据/分析

    *   移动

    *   社交网络


    应用程序必须准备好克服地理障碍并快速传播。如果你在你的城市使用 Uber 服务，你就会明白我在说什么。这个基于位置的交通应用，成立仅八年，现在已在全球 570
    个城市运营。（顺便提一下，Uber 的基础设施运行在亚马逊云服务上。）


    ![A453568_1_En_7_Figb_HTML.jpg](img/A453568_1_En_7_Figb_HTML.jpg) 我强调这一点的原因是想提醒你，如今的软件工程师必须知道如何使用比以前更多的技术。几年前，你基本上不用担心在新项目中会使用哪种数据持久化技术。选择仅仅在于使用哪种编程语言或关系型数据库供应商。而今天，对于现代应用程序来说，数据持久化是绝对关键的。


    聊天应用架构之所以使用如此多不同的技术，是因为每种技术都以最佳方式解决了不同类型的问题。


    例如，在可扩展性方面，使用关系型数据库来写入聊天消息可能不是最佳选择；聊天应用领域不需要 ACID¹ 属性，因此使用关系型数据库会导致巨大的性能损失。关系型数据库不会放弃一致性（它们也使用悲观锁），并且它们并非为集群而设计，尽管集群是可能的。关键在于，它无法实现线性扩展（例如像
    Cassandra 那样），因为即使集群化，底层存储层仍然是瓶颈。当你的领域需要 ACID 属性时，才应该使用关系型数据库（请记住我在第 6 章中讨论过的领域与架构之间的关系）。


    在许多情况下，即使是现代应用程序也需要符合 ACID 属性，因此需要像 MySQL 这样的关系型数据库。事实上，使用 NoSQL 技术并不意味着你不再需要关系型数据库。需要牢记的关键是，我们正处于多语言[持久化](https://martinfowler.com/bliki/PolyglotPersistence.html)
    ² 时代（图 7-1）。这本质上意味着你应该为每种场景采用合适的持久化技术。


    ![A453568_1_En_7_Fig1_HTML.jpg](img/A453568_1_En_7_Fig1_HTML.jpg)


    图 7-1.


    多语言持久化示例（来源：Martin Fowler）


    大多数 NoSQL 数据库在设计时都考虑到了水平可扩展性。


    ![A453568_1_En_7_Figc_HTML.jpg](img/A453568_1_En_7_Figc_HTML.jpg) 当你向机器集群中添加更多节点时，就实现了水平可扩展性。当你增加单台机器的硬件性能时，就实现了垂直可扩展性。


    NoSQL 数据库的设计基于分布式系统。³ 简而言之，它们被设计成以集群方式工作，即一组相互连接并通过网络通信以解决特定问题（此处为数据持久化问题）的节点（机器）。


    本质上，NoSQL 数据库分为四大类。


    *   **键值存储**：存储与键关联的值（例如，Redis、Memcached、Riak）

    *   **文档存储**：存储完整的文档（例如，MongoDB、CouchDB、Elasticsearch）

    *   **列族存储**：以列而非行的形式存储数据；专为处理大量数据以及读写性能而设计（例如，Cassandra、HBase）

    *   **图存储**：存储关于网络和连接实体的信息（例如，Neo4J、HyperGraphDB）


    NoSQL 数据库的另一个重要特性是它们是无模式的。这意味着它们不像关系型数据库那样有严格的模式。例如，一个基于文档的 NoSQL 存储可以有一个 `User`
    集合，其中存储的用户关联着不同的数据（有的可能有 `age` 字段，有的没有，而无需执行任何 `ALTER TABLE` 命令或类似操作）。


    关系型数据库的建模与 NoSQL 数据库不同。在关系型数据库中，你通常使用第三范式⁴，并确保每个表只存储“它自己的数据”。每个关系都用外键表示，并且在运行时需要
    SQL `JOIN` 来从不同实体检索数据。基本上，你首先对领域进行建模，而不考虑稍后将要执行的查询。之后，你使用高度灵活的 SQL 来构建查询。


    ## 7.1 NoSQL 中的建模


    在 NoSQL 环境中，建模时你应该有不同的思考方式。反范式化在这里是你的朋友，因为你更关心性能（例如，避免使用连接），而不是可能的数据重复和消耗更多存储空间。请记住，与
    CPU 能力和内存相比，存储是廉价的。在 NoSQL 中建模时，你必须精确地考虑你想要检索哪些数据，并相应地建模你的“存储单元”来检索它。


    例如，假设你需要检索某个用户在特定聊天室中的消息（这真是个巧合，不是吗？）。使用关系型数据库，你会创建一个名为 `user` 的表、一个名为 `chat room`
    的表和一个名为 `messages` 的表，每条消息都会有外键来表示与用户和聊天室的关系，对吧？在 Cassandra 中，连接和外键都不存在，所以你必须换一种思路！


    在 Cassandra 中，你会创建一个列族（类似于关系型数据库中的表），并在其中存储每条记录，包含聊天室 ID、用户和消息。再次强调，反范式化在这里是你的朋友。


    现在想象一下，你只需要检索来自巴西的用户的聊天消息。使用关系型方法，你会怎么做？很简单：只需在 `messages` 表上创建一个查询，连接 `user`
    表，并添加一个 `where` 子句来验证用户来自巴西。你是否注意到，当你对关系型表进行建模时，你并没有考虑这个查询，但 SQL 凭借其高度的灵活性能够处理它？


    那么在 Cassandra 中，你会怎么做呢？我打赌你已经知道答案了！但我知道你正在想，为这个任务再创建一个列族听起来很奇怪，而且在你公司工作了 20 年的数据库管理员可能不会喜欢这个主意。但你是对的。在这种情况下，这正是你要做的。我希望你的数据库管理员喜欢
    Cassandra！

    '
- fmt: '# 7.2 Cassandra Overview


    To give you an idea of how powerful some distributed systems can become, did you
    know that the largest Cassandra production cluster is used by Apple? This cluster
    has more than 75,000 nodes storing more than 10PB of data. Second place goes to
    Netflix, with 2,500 nodes storing 420TB, with more than 1 trillion requests per
    day. Can you imagine a database with more than 75,000 machines working together?
    Well, now that you are impressed, it’s easier for me to introduce you to Cassandra!


    ![A453568_1_En_7_Figd_HTML.jpg](A453568_1_En_7_Figd_HTML.jpg) Although I’m a Java
    developer, I’ve been working the last few years as a DevOps engineer, as I explained
    in more detail in the “Who Am I?” section of the introduction. Unfortunately,
    this book isn’t totally about infrastructure, so I cannot go much deeper into
    infrastructure details. Despite this, I invite you to take a look at my e-books,
    online courses, and articles, available on my web site,[⁵](#A453568_1_En_7_Chapter.html#Fn5)
    where I dive deeper into these subjects.


    Cassandra was based on Google’s Bigtable and Amazon’s DynamoDB and was primarily
    created by Facebook. It was then open sourced and now is an Apache [project](http://cassandra.apache.org/).[⁶](#A453568_1_En_7_Chapter.html#Fn6)
    Now it’s even possible to get an “enterprise edition” through DataStax,[⁷](#A453568_1_En_7_Chapter.html#Fn7)
    which also has a community edition.


    As you already know, Cassandra is a NoSQL database that belongs in the column
    family category. It’s able to handle a massive number of writes and reads per
    second while keeping linear scalability[⁸](#A453568_1_En_7_Chapter.html#Fn8) when
    adding nodes to a Cassandra cluster. Cassandra also provides automatic, reliable
    replication across geographically distributed data centers.


    Cassandra is a distributed system that implements a peer-to-peer[⁹](#A453568_1_En_7_Chapter.html#Fn9)
    architecture (Figure [7-2](#A453568_1_En_7_Chapter.html#Fig2)). It uses a gossip
    protocol[^(10)](#A453568_1_En_7_Chapter.html#Fn10) to perform internal communication.
    In other words, there is no master node point of failure, so every node is able
    to handle both reads and writes.


    ![A453568_1_En_7_Fig2_HTML.jpg](A453568_1_En_7_Fig2_HTML.jpg)


    Figure 7-2. Peer-to-peer architecture


    Cassandra’s partitioning strategy is based on partition keys that you specify
    when you are modeling the primary key for your column families. You now might
    be thinking, “What is this guy talking about?” Relax, you will understand this
    in a few minutes.


    Basically, Cassandra is an amazing choice when you’re dealing with a huge amount
    of time-series data, which is common in the Internet of Things,[^(11)](#A453568_1_En_7_Chapter.html#Fn11)
    logs, metrics, and so on. It fits in even better when relaxing the consistency
    is not an issue, although you can adjust the consistency level both for writes
    and for reads.


    ![A453568_1_En_7_Fige_HTML.jpg](A453568_1_En_7_Fige_HTML.jpg) Read consistency
    is when every node returns the same result for the same query for a given point
    in time. Remember that a distributed system runs over a network that has latency,
    so when you write data to a specific node, replication will start taking place
    and will take some milliseconds to happen on other nodes. During these milliseconds,
    if a read request is issued to the other nodes, then they will return stale data.
    The consistency level for both writes and reads is completely tunable in Cassandra.


    Why did I choose Cassandra for storing the history of chat messages in the chat
    application? Well, since a chat application can be used all around the world,
    it will contain a huge amount of data very soon. Also, a chat application has
    a massive number of message writes, and a message can be considered time-series
    data, right? Since full consistency is not that crucial to this context, why not
    give up a little bit of consistency and work in eventual consistency mode (this
    is Cassandra’s default behavior, by the way) to achieve extraordinary write performance?
    Basically, that’s why I chose to use Cassandra.


    ![A453568_1_En_7_Figf_HTML.jpg](A453568_1_En_7_Figf_HTML.jpg) Eventual Consistency
    is a consistency model that assures that at some point in the near future the
    system (in this case, Cassandra) will become consistent.


    Consistency in Cassandra can be adjusted at either write or read time. For instance,
    you can specify that you want a write to be fully consistent, which means that
    it will return success only after the write is successfully performed in each
    replica node. That is, after the success, you have the guarantee that any read
    to this data will return the most recent (and same) data regardless of the node
    that responds. Just keep in mind that higher consistency comes with a latency
    price, so full consistency means the worst performance.


    ![A453568_1_En_7_Figg_HTML.jpg](A453568_1_En_7_Figg_HTML.jpg) The CAP theorem[^(12)](#A453568_1_En_7_Chapter.html#Fn12)
    states that when a total partition (a network failure, for example) or a temporary
    partition (the latency between data replication after a write request, a full
    GC in the JVM, etc) happens in a distributed system, it has to choose between
    consistency or availability. If the distributed system picks consistency over
    availability, it will be unavailable until the partition is fixed. On the other
    hand, if it picks availability over consistency, it will return a response for
    a request but this may not contain the most up to date data.


    In Cassandra, you can create keyspaces, insert data, query data, and do much more
    using the Cassandra Query Language (CQL). A command-line tool called `cqlsh` allows
    you to issue CQL commands against your Cassandra instances. CQL is similar to
    SQL commands, so it’s easy to get used to working with CQL commands.


    ### 7.2.1 Cassandra Concepts


    Now you will learn some important concepts, and I’ll talk about modeling when
    it comes to Cassandra.


    #### 7.2.1.1 Keyspace


    A keyspace is similar to a database in relational databases. It groups a set of
    column families (like SQL tables) from the same domain. Here is where you define
    the replication factor, that is, the number of replicas that this keyspace will
    have in different nodes. This chat app will run just on a local machine, not a
    Cassandra cluster. Thus, here is the keyspace definition:


    ```

    CREATE KEYSPACE ebook_chat WITH REPLICATION =

    { ''class'' : ''SimpleStrategy'', ''replication_factor'' : 1 };

    ```


    ![A453568_1_En_7_Figh_HTML.jpg](A453568_1_En_7_Figh_HTML.jpg) These keyspace settings
    are not suitable for a production environment. In production, you will want to
    set `NetworkTopologyStrategy` and a replication factor of at least 3.


    #### 7.2.1.2 Column Family


    A column family is similar to a table in relational databases. It stores the data
    in the form of rows and columns.


    ```

    CREATE TABLE messages (

    username text,

    chatRoomId text,

    date timestamp,

    fromUser text,

    toUser text,

    text text,

    PRIMARY KEY ((username, chatRoomId), date)

    ) WITH CLUSTERING ORDER BY (date ASC);

    ```


    #### 7.2.1.3 Primary Key


    A row is uniquely identified by a primary key. Every column family must define
    a primary key, and the primary key may be composed of partition keys and clustering
    keys. A primary key can be just a single column or multiple columns. When there
    is more than one column, you call it a composite primary key. You can query data
    in Cassandra using its primary key columns or secondary indexes. The `messages`
    column family has a composite primary key, shown here:


    ```

    PRIMARY KEY ((username, chatRoomId), date)

    ```


    #### 7.2.1.4 Secondary Index


    A secondary index allows you to query a column that is not part of the primary
    key. Remember that adding secondary indexes will penalize the write performance!'
