    # 第一部分

    用法


    用法


    在查看聊天应用的架构和代码之前，我们先让应用运行起来，并在你的机器上配置好开发环境，以便你能从本书中获得最大收益。


    # 1. Docker


    使用 Docker 时，聊天应用的依赖项设置非常简单。在本章中，你将了解什么是 Docker，以及如何使用主要的 Docker 命令来管理在容器上运行的服务。


    ![A453568_1_En_1_Figa_HTML.jpg](img/A453568_1_En_1_Figa_HTML.jpg) 本章旨在说明 Docker
    运行容器的基本用法。它不会涵盖如何构建 Docker 镜像等重要主题，这超出了本书的范围，因为你仅使用 Docker 来设置聊天应用的依赖项。


    ## 1.1 Docker 简介


    简而言之，Docker 允许你在机器上轻松运行服务。Docker 保证这些服务在每次执行时都处于相同的状态，无论底层操作系统或系统库如何。


    这意味着，如果你将本书中开发的聊天应用 1.0.0 版本作为 Docker 镜像分发，那么可以保证，无论使用者在 Windows、macOS 还是 Linux
    上运行，该应用的行为都将保持一致。


    试着回想一下，你听过多少次“我不知道发生了什么；在我的机器上能运行”这句话。在处理企业应用时，通常的做法是在最终部署到生产环境之前，将工件（候选发布版本）推广到多个环境（例如测试环境和预发布环境）。在理想情况下，这些环境应该是生产环境的镜像，但在实践中，情况通常并非如此。通常，这些环境运行在不同的机器、不同的操作系统上，并带有不同版本的库，因此“在预发布环境能运行；我不知道为什么在生产环境不能运行”的问题会变得更糟。这就是
    Docker 成为一款出色工具的地方；它保证无论环境差异如何，工件的行为都将保持一致。


    这也许是 Docker 提供的最重要的特性。但还有更多。


    *   将服务作为 Docker 容器运行很容易。因此，它在开发阶段也大有帮助，因为你无需浪费时间在操作系统上安装和配置工具。

    *   Docker 是一个高度协作的工具。你可以重用人们构建并公开共享的 Docker 镜像。

    *   它鼓励基础设施即代码模型，因为 Docker 镜像完全在一个名为 `Dockerfile` 的文件中描述，该文件可以（并且应该）进行版本控制。

    *   Docker 拥有庞大的社区，并且正在迅速扩展。


    ![A453568_1_En_1_Figb_HTML.jpg](img/A453568_1_En_1_Figb_HTML.jpg) Docker 的安装可能因操作系统而异，因此我建议你按照官方文档在你的机器上安装
    Docker¹。请确保你安装的是 Docker 1.13.0 或更新版本。


    ## 1.2 Docker Hub


    正如我所提到的，使用 Docker 是在机器上运行服务的一种非常优雅的方式，而无需实际将它们安装在操作系统上。它通过实例化容器来实现这一点，这些容器是在与主机操作系统相同的内核上运行但与之隔离的
    Linux 虚拟化实例。例如，如果你在容器内创建了一个文件，则该文件无法从主机操作系统访问（除非你明确指定）。


    每个容器应运行一个特定的服务，该服务从先前构建、存储并在 Docker 注册表上共享的 Docker 镜像实例化。官方的公共 Docker 注册表是 Docker
    Hub，² 你可以在其中找到几乎所有你需要的预构建镜像。


    例如，假设你想在本地机器上启动一个 Elasticsearch 集群。你可以前往 Docker Hub，在搜索字段中输入 Elasticsearch，然后选择最适合你需求的镜像。有些工具有官方镜像（由
    Docker 团队维护），有些则没有。任何人都可以在 Docker Hub 上注册，创建自己的镜像，并将其公开发布。这使得 Docker 成为一个高度协作的工具。


    ![A453568_1_En_1_Figc_HTML.jpg](img/A453568_1_En_1_Figc_HTML.jpg) 也可以发布私有 Docker
    镜像，但如果你想发布多个私有镜像，则需要为此功能付费。


    ## 1.3 镜像与容器


    基本上，Docker 镜像是包含运行特定服务所需一切的二进制文件。当你从 Docker 镜像实例化一个服务时，你就说你创建了一个 Docker 容器。打个比方，如果
    Docker 镜像是一个 Java 类，那么 Docker 容器就是一个对象。你通过执行 `docker run` 命令来创建一个容器。


    ## 1.4 镜像标签


    `docker run` 命令要求你提供镜像名称。示例如下：


    ```

    $ docker run jenkins

    ```


    这里，`jenkins` 是镜像名称。如果 Docker 在本地找不到 `jenkins` 镜像，它将尝试从 Docker Hub 拉取它。Docker 镜像可以有一个与之关联的标签，通常表示服务版本。要运行特定标签，只需在镜像名称后添加
    `:` 并提供标签即可。


    ```

    $ docker run jenkins:2.32.3

    ```


    ![A453568_1_En_1_Figd_HTML.jpg](img/A453568_1_En_1_Figd_HTML.jpg) 如果未提供标签，Docker
    将尝试拉取 `latest` 标签。一个常见的误解是 `latest` 标签意味着“可用的最新镜像版本”，但这可能不准确。`latest` 标签只是在构建
    Docker 镜像时未提供任何其他标签时使用的标签；它并不意味着是最新版本。


    当处理官方 Docker 镜像（如前文的 `jenkins` 镜像）时，你无需提供用户名。但如果你使用的是非官方镜像，则需要按如下方式提供所有者的用户名和镜像名称：


    ```

    $ docker run username/image_name:tag

    ```

