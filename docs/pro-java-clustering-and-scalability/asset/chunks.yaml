    [¹](#A453568_1_En_16_Chapter.html#Fn1_source) [`http://beanvalidation.org/1.1/spec/`](http://beanvalidation.org/1.1/spec/)


    [²](#A453568_1_En_16_Chapter.html#Fn2_source) [`http://hibernate.org/validator/`](http://hibernate.org/validator/)


    # 17. New Chat Room


    In this chapter, I illustrate how easy it is to work with REST endpoints in Spring
    MVC.


    On the client side, you just create a JavaScript object called `newChatRoom`,
    convert it to JSON format, and send a POST request to the `/chatroom` endpoint.
    If it succeeds, then the `success` callback is called, and it appends the new
    chat room to the grid by manipulating the Document Object Model[¹](#A453568_1_En_17_Chapter.html#Fn1)
    (DOM).


    ```

    function createNewChatRoom() {

    var newChatRoom = {

    ''name'' : txtNewChatRoomName.val(),

    ''description'' : txtNewChatRoomDescription.val()

    };

    $.ajax({

    type : "POST",

    url : "/chatroom",

    data : JSON.stringify(newChatRoom),

    contentType : "application/json",

    success : function(chatRoom) {

    //append chat room to the grid

    },

    });

    }

    ```


    ## 17.1 Secured REST Endpoints with Spring MVC and Spring Security


    Spring MVC will first convert the JSON in the HTTP request body (that’s why you
    use the `@RequestBody` annotation) to the `chatroom` object and call the `createChatRoom`
    method. This method will use the `chatRoomService` component to save the `chatroom`
    object in Redis. After that, the `createChatRoom` method will convert the new
    `chatroom` object into a JSON representation and append it to the HTTP response
    body (that’s why you used the `@ResponseBody` annotation) along with an `HTTP
    201 CREATED` status code.


    ![A453568_1_En_17_Figa_HTML.jpg](A453568_1_En_17_Figa_HTML.jpg) Note that by using
    the `@Secured("ROLE_ADMIN")` annotation, you tell Spring Security to allow only
    logged-in users with the role `ROLE_ADMIN` to consume this endpoint. Otherwise,
    it will automatically send a `403 FORBIDDEN` status code to the client.


    ```

    @Controller

    public class ChatRoomController {

    @Autowired

    private ChatRoomService chatRoomService;

    @Secured("ROLE_ADMIN")

    @RequestMapping(path = "/chatroom", method = RequestMethod.POST)

    @ResponseBody

    @ResponseStatus(code = HttpStatus.CREATED)

    public ChatRoom createChatRoom(@RequestBody ChatRoom chatRoom) {

    return chatRoomService.save(chatRoom);

    }

    }

    @Service

    public class RedisChatRoomService implements ChatRoomService {

    @Autowired

    private ChatRoomRepository chatRoomRepository;

    @Override

    public ChatRoom save(ChatRoom chatRoom) {

    return chatRoomRepository.save(chatRoom);

    }

    }

    ```


    Footnotes


    [¹](#A453568_1_En_17_Chapter.html#Fn1_source) [`https://www.w3schools.com/js/js_htmldom.asp`](https://www.w3schools.com/js/js_htmldom.asp)'
