- fmt: '# 18. Joining the Chat Room


    When you join a chat room, some JavaScript code gets executed on the client side.


    ```

    function connect() {

    socket = new SockJS(''/ws'');

    stompClient = Stomp.over(socket);

    stompClient.connect({ ''chatRoomId'' : chatRoomId }, stompSuccess, stompFailure);

    }

    function stompSuccess(frame) {

    enableInputMessage();

    successMessage("Your WebSocket connection was successfully established!")

    stompClient.subscribe(''/chatroom/connected.users'',updateConnectedUsers);

    stompClient.subscribe(''/chatroom/old.messages'',  oldMessages);

    stompClient.subscribe(''/topic/'' + chatRoomId + ''.public.messages'', publicMessages);

    stompClient.subscribe(''/user/queue/'' + chatRoomId + ''.private.messages'', privateMessages);

    stompClient.subscribe(''/topic/'' + chatRoomId + ''.connected.users'', updateConnectedUsers);

    }

    function stompFailure(error) {

    errorMessage("Lost connection to WebSocket! Reconnecting in 10 seconds...");

    disableInputMessage();

    setTimeout(connect, 10000);

    }

    ```


    First, the `connect` function is called, and a new WebSocket connection is started
    using STOMP as a subprotocol. Note that you also add the header `''chatRoomId''
    : chatRoomId` when you send the `CONNECT` frame because the server must keep this
    information to ensure that it’s manipulating the correct destination names.


    If the handshake succeeds, then the `stompSuccess` function is called, and the
    user subscribes to some destinations. Actually, the first two subscriptions are
    executed only once on the server side, and they are used to get some initial data,
    that is, his old conversation and the current connected users to this specific
    chat room. This is the Java code executed when these two subscriptions happen:


    ```

    @Controller

    public class ChatRoomController {

    @Autowired

    private ChatRoomService chatRoomService;

    @Autowired

    private InstantMessageService instantMessageService;

    @SubscribeMapping("/connected.users")

    public List listChatRoomConnectedUsersOnSubscribe(SimpMessageHeaderAccessor headerAccessor)
    {

    String chatRoomId = headerAccessor.getSessionAttributes().get("chatRoomId").toString();

    return chatRoomService.findById(chatRoomId).getConnectedUsers();

    }

    @SubscribeMapping("/old.messages")

    public List listOldMessagesFromUserOnSubscribe(Principal principal, SimpMessageHeaderAccessor
    headerAccessor) {

    String chatRoomId = headerAccessor.getSessionAttributes().get("chatRoomId").toString();

    return instantMessageService.findAllInstantMessagesFor(principal.getName(), chatRoomId);

    }

    ...

    }

    ```


    ![A453568_1_En_18_Figa_HTML.jpg](A453568_1_En_18_Figa_HTML.jpg) The `List<ChatRoomUser>`
    list is fetched from Redis, and the `List<InstantMessage>` list is fetched from
    Cassandra.


    ![A453568_1_En_18_Figb_HTML.jpg](A453568_1_En_18_Figb_HTML.jpg) The `@SubscribeMapping`
    annotation is useful when users need to fetch the initial data using the WebSocket
    connection.


    The last three subscriptions in the JavaScript code are the following, respectively:


    * Execute the `publicMessages` function when a new message arrives at the `''/topic/''
    + chatRoomId + ''.public.messages''` destination. This function will render a
    public message in the user’s message panel.

    * Execute the `privateMessages` function when a new message arrives at the `''/user/queue/''
    + chatRoomId + ''.private.messages''` destination. This function will render a
    private message in the user’s message panel.

    * Execute the `updateConnectedUsers` function when a new message arrives at the
    `''/topic/'' + chatRoomId + ''.connected.users''` destination. This function will
    update the connected users in the user’s connected users panel.


    ## 18.1 WebSocket Reconnection Strategy


    When the WebSocket connection is lost, the `stompFailure` function is executed,
    and it will try to reestablish the connection every ten seconds. If it succeeds,
    then everything explained earlier happens again. Because every message is stored
    in Cassandra (regardless of being delivered through the WebSocket connection),
    even if the user was offline while someone sent a message to him, when the user
    reconnects, the message will be in the `List<InstantMessage>` list and will be
    displayed in the user’s message panel.


    ## 18.2 WebSocket Events


    Once the WebSocket connection is established or disconnected, an event is triggered
    on the server side, and a system message is sent to every connected user in the
    chat room informing them that someone has joined or left (Figure [18-1](#A453568_1_En_18_Chapter.html#Fig1)).


    ![A453568_1_En_18_Fig1_HTML.jpg](A453568_1_En_18_Fig1_HTML.jpg)


    Figure 18-1. System messages from admin


    The following is the code that handles these events on the server side:


    ```

    @Component

    public class WebSocketEvents {

    @Autowired

    private ChatRoomService chatRoomService;

    @EventListener

    private void handleSessionConnected(SessionConnectEvent event) {

    SimpMessageHeaderAccessor headers = SimpMessageHeaderAccessor.wrap(event.getMessage());

    String chatRoomId = headers.getNativeHeader("chatRoomId").get(0);

    headers.getSessionAttributes().put("chatRoomId", chatRoomId);

    ChatRoomUser joiningUser = new ChatRoomUser(event.getUser().getName());

    chatRoomService.join(joiningUser, chatRoomService.findById(chatRoomId));

    }

    @EventListener

    private void handleSessionDisconnect(SessionDisconnectEvent event) {

    SimpMessageHeaderAccessor headers = SimpMessageHeaderAccessor.wrap(event.getMessage());

    String chatRoomId = headers.getSessionAttributes().get("chatRoomId").toString();

    ChatRoomUser leavingUser = new ChatRoomUser(event.getUser().getName());

    chatRoomService.leave(leavingUser, chatRoomService.findById(chatRoomId));

    }

    }

    ```


    Let’s take the `SessionConnected` event as an example and follow the entire flow.


    The `handleSessionConnected` method is called when a WebSocket connection is created.
    Then, the `chatRoomId` value is obtained from the `CONNECT` frame headers, and
    it’s stored in the user’s WebSocket session as an attribute. This is convenient
    since from now every message the client sends doesn’t need to provide the `chatRoomId`
    value, as it’s already stored in the user’s WebSocket session. Then, the `join`
    method is called, passing `joiningUser` and `chatRoom` as parameters.


    ```

    @Service

    public class RedisChatRoomService implements ChatRoomService {

    @Autowired

    private SimpMessagingTemplate webSocketMessagingTemplate;

    @Autowired

    private ChatRoomRepository chatRoomRepository;

    @Autowired

    private InstantMessageService instantMessageService;

    @Override

    public ChatRoom join(ChatRoomUser joiningUser, ChatRoom chatRoom) {

    chatRoom.addUser(joiningUser);

    chatRoomRepository.save(chatRoom);

    sendPublicMessage(SystemMessages.welcome(chatRoom.getId(), joiningUser.getUsername()));

    updateConnectedUsersViaWebSocket(chatRoom);

    return chatRoom;

    }

    @Override

    public ChatRoom leave(ChatRoomUser leavingUser, ChatRoom chatRoom) {

    sendPublicMessage(SystemMessages.goodbye(chatRoom.getId(), leavingUser.getUsername()));

    chatRoom.removeUser(leavingUser); chatRoomRepository.save(chatRoom);

    updateConnectedUsersViaWebSocket(chatRoom);

    return chatRoom;

    }

    @Override

    public void sendPublicMessage(InstantMessage instantMessage) {

    webSocketMessagingTemplate.convertAndSend(

    Destinations.ChatRoom.publicMessages(instantMessage.getChatRoomId()), instantMessage);

    instantMessageService.appendInstantMessageToConversations(instantMessage);

    }

    private void updateConnectedUsersViaWebSocket(ChatRoom chatRoom) {

    webSocketMessagingTemplate.convertAndSend(

    Destinations.ChatRoom.connectedUsers(chatRoom.getId()),

    chatRoom.getConnectedUsers());

    }

    }

    ```'
