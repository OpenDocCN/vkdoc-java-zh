- fmt: '#### 7.2.1.5 Partition Key


    The partition key is the leftmost term in the primary key’s definition. If it’s
    a single primary key, then the partition key is the same as the primary key. A
    partition key may be a single column or multiple columns. When there is more than
    one column, you call it a composite partition key, and it’s put inside parentheses
    in the primary key’s definition. The `messages` primary key contains the `(username,
    chatRoomId)` composite partition key, which essentially means that every message
    from a specific user in a particular chat room will be in the same partition.


    Partitions are groups of rows that share the same partition key. This is important
    for achieving high performance and linear scalability in Cassandra. When you issue
    a read request to Cassandra, you may need to fetch data from different partitions,
    and these partitions can live on different machines. In this particular case,
    network latency will make your query slow. Even if the partitions you are querying
    live on the same machine (which also happens), the performance will be slower
    because of the way rows are stored internally in Cassandra.


    When it comes to modeling, to have the most optimized cluster, you must evenly
    spread the data among the nodes. So, having only a huge partition will not help,
    and having a lot of partitions will not help either. The hard work here is to
    find out the right partition key to evenly spread the data among the nodes.


    Remember I suggested that you model your column families according to the domain?
    That’s absolute true, but now I will add an extra note regarding Cassandra. You
    must model your column families according to the domain while also thinking about
    how your data will be spread among the partitions. For example, suppose you are
    modeling a column family to store sensor temperature measures every five seconds
    for all cities in all states of a country. If your partition key is only the column
    `country`, then every write from all the sensors in the country `USA` will go
    to the same partition. You’ve already seen that having a unique huge partition
    is not the way to go if you want to benefit from a distributed architecture. However,
    what if you change the partition key to be `(country, state, city)`? Now every
    sensor temperature measure in a specific city for a particular state of `USA`
    will be stored in a different partition. The data looks much more spread out now,
    but there are still some issues. Keep in mind that a city like New York has almost
    9 million inhabitants, whereas Mountain View is a small city in California that
    has only about 80,000 people. That’s a huge difference, which may result in unbalanced
    partitions. As you can see, modeling primary keys in Cassandra is one of the most
    difficult tasks!


    #### 7.2.1.6 Clustering Key


    The clustering key consists of the primary key columns that don’t belong to the
    partition key. In `PRIMARY KEY ((username, chatRoomId), date)`, the `date` is
    the clustering key. Basically, a clustering key tells Cassandra how the data within
    a partition is ordered. In the `messages` column family, the `date` clustering
    key will keep the messages ordered in ascending order.


    ## 7.3 Redis Overview


    Redis is an extremely fast in-memory NoSQL database in the key-value category,
    which means you can store a value and associate it with a unique key (for example,
    `name: Jorge Acetozi` or `numEbookReaders: 1000`). Of course, you can also do
    something much more interesting such as caching with it.


    ### 7.3.1 Redis vs. Memcached


    Suppose you have a web page in your web application that rarely changes (in the
    chat application, the list of chat rooms would be an example) and the page has
    a lot of accesses. For each of them, the application fetches your relational database
    instance to get the data to be displayed. Well, accessing the relational database
    is an expensive operation, and given that you are dealing with a high-traffic
    web page, you could end up with a performance issue. In this case, you could use
    Redis as a cache server so that when the client access the page, the data will
    be fetched from Redis, which is insanely fast because it stores the data in RAM,
    avoiding access to the disk. Nice, isn’t it?


    You may ask me, “Yes, Jorge, it’s nice. But why don’t we use Memcached instead?”
    I agree with you. Memcached also would be a nice choice here. But Memcached basically
    is used only for caching, whereas Redis can do much more (actually, even when
    it comes to caching, Redis beats Memcached).


    Memcached supports only strings and integers as data structures, while Redis has
    many other complex data types such as strings, hashes, lists, sets, sorted sets
    with range queries, bitmaps, hyperloglogs, and geospatial indexes with radius
    queries. Also, Lua scripting is possible in Redis.


    In addition, Redis can persist data to disk to guarantee durability. Memcached
    can’t.


    ![A453568_1_En_7_Figi_HTML.jpg](A453568_1_En_7_Figi_HTML.jpg) Make sure to check
    out all the Redis data types.'
