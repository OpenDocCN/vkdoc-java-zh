    \ 您也可以通过调用`mvn integration-test`命令来运行集成测试。\n\n在某些情况下，将单元测试与集成测试分开运行可能是个好主意。为了在编写代码时获得更快的反馈（例如当某些内容崩溃时），您可以按需多次运行单元测试，而不会因等待集成测试而“浪费时间”。（只是在提交代码之前，别忘了至少同时运行一次单元测试和集成测试。）\n\
    \n## 26.1 Maven Surefire插件\n\n当使用Apache Maven管理应用程序构建生命周期时，您可以使用插件来自定义行为。\n\n\
    ![A453568_1_En_26_Figc_HTML.jpg](A453568_1_En_26_Figc_HTML.jpg) Apache Maven是可扩展的，因此如果需要，您甚至可以创建自己的Maven插件[¹](#A453568_1_En_26_Chapter.html#Fn1)。\n\
    \n您可以在构建生命周期的Maven测试阶段使用Maven Surefire插件[²](#A453568_1_En_26_Chapter.html#Fn2)来执行应用程序的单元测试。以下是聊天应用程序的`pom.xml`文件中使用的插件配置：\n\
    \n```xml\n<plugin>\n    <groupId>org.apache.maven.plugins</groupId>\n    <artifactId>maven-surefire-plugin</artifactId>\n\
