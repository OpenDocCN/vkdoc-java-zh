  trans: '

    #### 7.2.1.5 分区键


    分区键是主键定义中最左侧的项。如果是单一主键，那么分区键与主键相同。分区键可以是单个列或多个列。当包含多个列时，称为复合分区键，并在主键定义中用括号括起来。`messages`
    主键包含 `(username, chatRoomId)` 复合分区键，这实质上意味着来自特定用户在特定聊天室中的每条消息都将位于同一个分区中。


    分区是共享相同分区键的行组。这对于在 Cassandra 中实现高性能和线性可扩展性非常重要。当你向 Cassandra 发出读取请求时，可能需要从不同分区获取数据，而这些分区可能位于不同的机器上。在这种情况下，网络延迟会使查询变慢。即使你查询的分区位于同一台机器上（这种情况也会发生），由于
    Cassandra 内部存储行的方式，性能也会较慢。


    在建模方面，为了获得最优化集群，你必须将数据均匀分布在各个节点之间。因此，只有一个巨大的分区没有帮助，拥有大量分区也无济于事。这里的关键工作是找出正确的分区键，以便将数据均匀分布在各个节点之间。


    还记得我建议你根据领域来建模列族吗？这绝对正确，但现在我要补充一条关于 Cassandra 的额外说明。你必须根据领域来建模列族，同时还要考虑数据如何在分区之间分布。例如，假设你正在建模一个列族，用于存储一个国家所有州的所有城市每五秒一次的传感器温度测量值。如果你的分区键只是
    `country` 列，那么来自 `USA` 国家所有传感器的每次写入都将进入同一个分区。你已经知道，如果想从分布式架构中受益，拥有一个唯一的大分区是不可行的。但是，如果将分区键改为
    `(country, state, city)` 呢？现在，`USA` 特定州中特定城市的每次传感器温度测量值都将存储在不同的分区中。数据看起来分布得更均匀了，但仍然存在一些问题。请记住，像纽约这样的城市有近
    900 万居民，而山景城是加利福尼亚州的一个小城市，只有大约 8 万人口。这是一个巨大的差异，可能导致分区不平衡。正如你所见，在 Cassandra 中建模主键是最困难的任务之一！


    #### 7.2.1.6 聚簇键


    聚簇键由不属于分区键的主键列组成。在 `PRIMARY KEY ((username, chatRoomId), date)` 中，`date` 是聚簇键。基本上，聚簇键告诉
    Cassandra 分区内的数据如何排序。在 `messages` 列族中，`date` 聚簇键将按升序对消息进行排序。


    ## 7.3 Redis 概述


    Redis 是一个极快的键值类内存 NoSQL 数据库，这意味着你可以存储一个值并将其与一个唯一键关联（例如，`name: Jorge Acetozi` 或
    `numEbookReaders: 1000`）。当然，你还可以做一些更有趣的事情，比如用它进行缓存。


    ### 7.3.1 Redis 与 Memcached 对比


    假设你的 Web 应用中有一个很少更改的网页（在聊天应用中，聊天室列表就是一个例子），并且该页面有大量访问。对于每次访问，应用程序都会查询关系数据库实例以获取要显示的数据。访问关系数据库是一项昂贵的操作，鉴于你正在处理一个高流量的网页，最终可能会遇到性能问题。在这种情况下，你可以使用
    Redis 作为缓存服务器，这样当客户端访问页面时，数据将从 Redis 中获取，由于 Redis 将数据存储在 RAM 中，避免了磁盘访问，因此速度极快。很不错，对吧？


    你可能会问我：“是的，Jorge，这很好。但我们为什么不使用 Memcached¹³ 呢？”我同意你的看法。Memcached 在这里也是一个不错的选择。但
    Memcached 基本上只用于缓存，而 Redis 可以做得更多（实际上，即使在缓存方面，Redis 也胜过 Memcached）。


    Memcached 仅支持字符串和整数作为数据结构，而 Redis 拥有许多其他复杂的数据类型，例如字符串、哈希、列表、集合、支持范围查询的有序集合、位图、HyperLogLog
    以及支持半径查询的地理空间索引。此外，Redis 还支持 Lua 脚本¹⁴。


    另外，Redis 可以将数据持久化到磁盘以保证持久性。Memcached 则不能。


    ![A453568_1_En_7_Figi_HTML.jpg](img/A453568_1_En_7_Figi_HTML.jpg) 请务必查看所有 Redis
    数据类型。¹⁵

    '
- fmt: '### 7.3.2 Redis Use Cases


    Because of its rich data structures, Redis can be used for a wide variety of cases.


    - Caching (including LRU[^(16)](#A453568_1_En_7_Chapter.html#Fn16) strategy)

    - Implementing counters for a number of page views

    - Implementing highly performant queues

    - Implementing publish/subscribe[^(17)](#A453568_1_En_7_Chapter.html#Fn17)

    - Compiling metrics and statistics

    - Storing Hypertext Transfer Protocol (HTTP) sessions

    - Building rankings using sorted sets (an ordered set of items by score), such
    as the most accessed chat rooms

    - Performing operations in sets, such as getting the intersection between two
    sets


    Can you see how powerful Redis is? You could easily evolve the chat application
    to include an “add friend” feature and store a user’s friends in a set. Then you
    could have another set holding all the online users and use the `SINTER`[^(18)](#A453568_1_En_7_Chapter.html#Fn18)
    command to extract the intersection between these two sets in `O(N*M)` complexity
    time. The intersection would be the user’s online friends. Amazing!


    That’s basically why I chose to use Redis for the chat application.


    Redis can be clustered[^(19)](#A453568_1_En_7_Chapter.html#Fn19) both for replication
    and for sharding, and its distributed architecture is based on a master-slave
    model (Figure [7-3](#A453568_1_En_7_Chapter.html#Fig3)).


    ![A453568_1_En_7_Fig3_HTML.jpg](A453568_1_En_7_Fig3_HTML.jpg)


    Figure 7-3. Master-slave architecture


    Unlike with Cassandra, it’s not possible to tune the consistency level, and a
    Redis cluster is not able to guarantee strong consistency. That’s because when
    you send a write request to a Redis cluster, the master writes the data first
    on itself and immediately returns success to the client. Then, the replication
    to the slave nodes asynchronously starts. What happens if the master node crashes
    before the data gets replicated and a slave node is promoted to be the new master?
    Basically, the client will receive success but the write was actually lost.


    ![A453568_1_En_7_Figj_HTML.jpg](A453568_1_En_7_Figj_HTML.jpg) Again, your domain
    should give you a hint whether taking this risk in production is acceptable. Remember
    that Redis clusters penalize consistency to achieve extraordinary performance.


    Redis also supports monitoring, automatic failover, Redis master nodes, service
    discovery, and notifications through Redis Sentinel.[^(20)](#A453568_1_En_7_Chapter.html#Fn20)


