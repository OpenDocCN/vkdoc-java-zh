    }

    ```


    Note that the client is sending messages in JavaScript Object Notation (JSON)
    format to the server. Actually, it’s sending JSON because it wants to send a JSON
    message (because the client already knows that the server is expecting a JSON
    message), but keep in mind that it could be sending a plain-text message, XML
    message, or whatever (that’s how raw WebSocket works!).


    ![A453568_1_En_10_Figb_HTML.jpg](A453568_1_En_10_Figb_HTML.jpg) If you wanted
    to enable WebSocket browser compatibility, you would have to use something to
    emulate the WebSocket behavior when it’s not available because of compatibility
    issues. Fortunately, SockJS[¹](#A453568_1_En_10_Chapter.html#Fn1) can handle this
    for you painlessly. Enabling SockJS support using Spring is as simple as adding
    a `.withSockJS()` method call to the handler, as shown here:


    ```

    @Configuration

    @EnableWebSocket

    public class RawWebSocketConfiguration implements WebSocketConfigurer {

    @Override

    public void registerWebSocketHandlers(WebSocketHandlerRegistry registry) {

    registry.addHandler(myRawWebSocketHandler(),   "/rawwebsocket").withSockJS();

    }

    @Bean

    public WebSocketHandler myRawWebSocketHandler() {

    return new MyRawWebSocketHandler();

    }

    }

    ```


    ## 10.2 WebSocket over STOMP Configuration


    Here is how to configure WebSocket over STOMP using Spring :


    ```

    @Configuration

    @EnableWebSocketMessageBroker

    public class WebSocketConfiguration extends AbstractWebSocketMessageBrokerConfigurer
    {

    @Override

    public void configureMessageBroker(MessageBrokerRegistry config) {

    config.enableSimpleBroker("/queue/",  "/topic/");

    config.setApplicationDestinationPrefixes("/app");

    }

    @Override

    public void registerStompEndpoints(StompEndpointRegistry registry) {

    registry.addEndpoint("/stompwebsocket").withSockJS();

    }

    }

    ```


    To work with STOMP, you need a STOMP broker . Basically, this is the component
    that keeps track of subscriptions and that broadcasts messages to subscribed users.
    In the previous configuration, note the following:


    *   An in-memory STOMP broker is enabled by declaring two destinations, `/queue/`
    and `/topic/`. This helps in the development phase, but it’s not recommended for
    a production environment (you’ll understand why when you study the multinode architecture
    later in this book).


    ![A453568_1_En_10_Figc_HTML.jpg](A453568_1_En_10_Figc_HTML.jpg) The meaning of
    a destination is intentionally left opaque in the STOMP specification. It can
    be any string, and it’s entirely up to STOMP servers to define the semantics and
    the syntax of the destinations that they support (for example, RabbitMQ defines
    a dot notation where destination names should be separated by a dot, as in `/topic/public.messages`).
    It is common, however, for destinations to be pathlike strings where `/topic/`
    implies a publish-subscribe[²](#A453568_1_En_10_Chapter.html#Fn2) pattern (one-to-many)
    and `/queue/` implies a point-to-point[³](#A453568_1_En_10_Chapter.html#Fn3) (one-to-one)
    message exchange.


    ![A453568_1_En_10_Figd_HTML.jpg](A453568_1_En_10_Figd_HTML.jpg) `/queue/` and
    `/topic/` are broker destinations, which means that any frame sent to a destination
    starting with these prefixes will be handled directly by the STOMP broker .


    *   The application destination prefix is `/app`. Basically, when a frame is sent
    to a destination that starts with `/app`, a class annotated with `@Controller`
    will handle the frame before forwarding it to the broker. More specifically, a
    method annotated with `@MessageMapping` inside the `@Controller` annotated class
    will handle it (don’t worry if you don’t understand this yet).

    *   Clients are going to connect to the STOMP endpoint using JavaScript (`ws://localhost:port/stompwebsocket`).


    Now, on the client side, there’s a little bit of JavaScript code , shown here:


    ```

    function connect() {

    socket = new SockJS(''/stompwebsocket'');

    stompClient = Stomp.over(socket);

    stompClient.connect({ }, function(frame) {

    stompClient.subscribe(''/topic/public.messages'', renderPublicMessages);

    });

    }

    function renderPublicMessages(message) {

    //append the message to a div, for example

    }

    function sendMessage() {

    var instantMessage;

    instantMessage = {

    ''text'' : inputMessage.val(),

    ''toUser'' : spanSendTo.text()

    }

    stompClient.send("/app/send.message",  {},  JSON.stringify(instantMessage));

    }

    ```


    Let’s understand what’s happening here.


    *   When the `connect` function is called, a new WebSocket connection is opened
    using STOMP as a subprotocol.

    *   In the success callback, an anonymous function is executed, and the user subscribes
    to the `/topic/public.messages` destination. From now on, this user will be able
    to receive any message that is sent (from any client or even from the server side)
    to this destination and pass it to the `renderPublicMessages` function , which
    will append the message to a `div`, for example.

    *   When the `sendMessage` function is called, a frame with the message is sent
    to the `/app/send.message` destination. Remember that every message sent to a
    destination starting with `/app` will be handled by an `@MessageMapping` method
    in a `@Controller` annotated class? This is the method handling it:'
