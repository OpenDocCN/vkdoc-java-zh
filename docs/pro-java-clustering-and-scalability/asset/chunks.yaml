    \ Message flow: simple broker\n\nWhen you send a frame through WebSocket over\
    \ STOMP, the message will first reach `clientInboundChannel`. There, it will be\
    \ routed to a specific `MessageHandler` depending on the destination name. If\
    \ the name starts with `/app`, then it will route it to the `SimpAnnotationMethod`\
    \ message handler (which will eventually call your `@MessageMapping` annotated\
    \ method inside the `@Controller` class). If the name starts with `/topic`, then\
    \ it will route it directly to the `SimpleBroker`[⁴](#A453568_1_En_10_Chapter.html#Fn4)\
    \ message handler.\n\nLet’s look at an example of the frame `SEND /app/a`. First,\
    \ `clientInboundChannel` will receive and forward it to the `SimpAnnotationMethod`\
    \ message handler. Then, from the `@MessageMapping` annotated method, the message\
    \ will be forwarded to `brokerChannel`. This will send it to the `SimpleBroker`\
    \ message handler. This message handler keeps a `ConcurrentHashMap` with every\
    \ WebSocket session ID for every connected client and also all the subscriptions\
    \ in the `SubscriptionRegistry` (in memory). Then, the message handler uses the\
    \ WebSocket client ID to forward the message to the corresponding `clientOutboundChannel`,\
    \ which will finally send the message to the client.\n\n![A453568_1_En_10_Figf_HTML.jpg](A453568_1_En_10_Figf_HTML.jpg)\
