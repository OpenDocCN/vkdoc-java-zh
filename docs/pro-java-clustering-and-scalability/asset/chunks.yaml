    There are lots of types of automated tests that can be coded. All of them have
    their strengths and weaknesses. The following are the most common ones:


    *   Unit tests : These provide fast feedback, but they test only an isolated unit
    of code (say, a method in a class). For example, an issue with a SQL query would
    not be caught since a unit test would not hit the database. Unit tests usually
    are executed in seconds or even milliseconds.

    *   Integration tests : These provide slower feedback, but they include testing
    the external integrations such as databases or web services. That is, they are
    more comprehensive than unit tests. (This doesn’t mean they are better! Be careful
    here; remember that every type of test has its own strengths and weaknesses.)
    Usually, integration tests are executed in minutes, but the time may vary a lot
    depending on the number of tests to be run.

    *   Acceptance tests : These provide even slower feedback than integration tests,
    but they actually simulate a user in the system using the browser and clicking
    buttons and links, filling in and submitting forms, and so on. Usually they are
    executed in minutes, but the time may vary a lot depending on the number of tests
    to be run.

    *   Stress tests : These consist of flooding the system with lots of requests
    to get feedback on how it behaves under these conditions.


    Usually, unit and integration tests are most often used. Together, they cover
    a lot of scenarios and avoid many application issues. Also, they are easier to
    code than the other types of tests (considering that stress tests should run in
    a similar production environment, etc.).


    ![A453568_1_En_23_Figa_HTML.jpg](A453568_1_En_23_Figa_HTML.jpg) Actually, there
    are even more types of automated tests, such as security tests, that could be
    added to your application’s automated test suite. The Open Web Application Security
    Project[¹](#A453568_1_En_23_Chapter.html#Fn1) (OWASP) is an online community that
    creates freely available articles, methodologies, documentation, tools, and technologies
    in the field of web application security. For example, the OWASP Zed Attack Proxy[²](#A453568_1_En_23_Chapter.html#Fn2)
    (ZAP) is one of the world’s most popular free security tools and is actively maintained
    by hundreds of international volunteers. This tool can help you automatically
    find security vulnerabilities in your web applications and can be easily integrated
    into your continuous delivery pipeline (it even has a Jenkins plug-in[³](#A453568_1_En_23_Chapter.html#Fn3)
    available).


