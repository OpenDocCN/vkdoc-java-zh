    \n  [6](#A453568_1_En_10_Chapter.html#Fn6_source)\n\n[`https://www.rabbitmq.com/web-stomp.html`](https://www.rabbitmq.com/web-stomp.html)"
  trans: "\n```\n    @Controller\n    public class ChatRoomController {\n    @Autowired\n\
    \    private SimpMessagingTemplate simpMessagingTemplate;\n    @MessageMapping(\"\
    /send.message\")\n    public void sendPublicMessage(InstantMessage instantMessage)\
    \ {\n    simpMessagingTemplate.convertAndSend(\"/topic/public.messages\",   instantMessage);\n\
    \    }\n    }\n    ```\n\nSpring 会将帧内容转换为 `instantMessage` 对象，并调用 `sendPublicMessage`\
    \ 方法，该方法使用 `SimpMessagingTemplate` 中的 `convertAndSend` 方法将消息广播到 `/topic/public.messages`\
    \ 目的地。还记得所有以 `/topic/` 开头的内容都是代理目的地吗？那么，谁来处理这条消息呢？没错，就是代理！实际上，代理会接收这条消息，并将其转发给该目的地的每个订阅用户（包括发送消息的用户，因为该用户也订阅了这个目的地，正如你在之前的\
    \ JavaScript 匿名函数中看到的那样）。\n\n好了，就是这样。通过这些简单的代码示例，你就能在 Spring 框架上使用基于 STOMP 的 WebSocket\
    \ 发送和接收公共消息了。这真是太棒了！\n\n![A453568_1_En_10_Fige_HTML.jpg](img/A453568_1_En_10_Fige_HTML.jpg)\
    \ 如果 `sendPublicMessage` 返回任何对象（例如 `instantMessage` 对象），Spring 会自动将其解释为你希望将该对象发送到代理目的地。按照惯例，它会尝试将其发送到\
    \ `/topic/public.messages` 目的地，因为消息是通过 `/chatroom/public.messages` 目的地接收的（这是一种约定），但你也可以使用\
    \ `@SendTo` 注解轻松更改目标代理目的地。就我个人而言，我认为使用 `simpMessagingTemplate` 能让阅读代码的人更容易理解，但这取决于你的选择。\n\
    \n## 10.3 使用简单代理的消息流\n\n图 10-1 展示了使用简单代理的消息流。这张图乍一看可能令人困惑，但这正是你刚刚了解到的流程。\n\n![A453568_1_En_10_Fig1_HTML.jpg](img/A453568_1_En_10_Fig1_HTML.jpg)\n\
    \n图 10-1.\n\n消息流：简单代理\n\n当你通过基于 STOMP 的 WebSocket 发送一个帧时，消息首先会到达 `clientInboundChannel`。在那里，它会根据目的地名称被路由到特定的\
    \ `MessageHandler`。如果名称以 `/app` 开头，则会被路由到 `SimpAnnotationMethod` 消息处理器（该处理器最终会调用\
    \ `@Controller` 类中带有 `@MessageMapping` 注解的方法）。如果名称以 `/topic` 开头，则会被直接路由到 SimpleBroker⁴\
    \ 消息处理器。\n\n让我们看一个帧 `SEND /app/a` 的例子。首先，`clientInboundChannel` 会接收它并将其转发给 `SimpAnnotationMethod`\
    \ 消息处理器。然后，从带有 `@MessageMapping` 注解的方法中，消息会被转发到 `brokerChannel`。这会将消息发送给 `SimpleBroker`\
    \ 消息处理器。该消息处理器维护着一个 `ConcurrentHashMap`，其中包含每个已连接客户端的 WebSocket 会话 ID，以及 `SubscriptionRegistry`（内存中）中的所有订阅。然后，消息处理器使用\
    \ WebSocket 客户端 ID 将消息转发到相应的 `clientOutboundChannel`，最终将消息发送给客户端。\n\n![A453568_1_En_10_Figf_HTML.jpg](img/A453568_1_En_10_Figf_HTML.jpg)\
    \ 请注意，使用简单代理方法时，订阅信息保存在内存中。\n\n## 10.4 使用完整外部 STOMP 代理的消息流\n\n图 10-2 展示了相同的消息流，不同之处在于，消息处理器不再将订阅信息保存在内存中，而是将订阅委托给一个外部\
    \ STOMP 代理。你能理解为什么这如此重要吗？你将在下一章中了解原因！\n\n![A453568_1_En_10_Fig2_HTML.jpg](img/A453568_1_En_10_Fig2_HTML.jpg)\n\
    \n图 10-2.\n\n消息流：完整外部 STOMP 代理\n\n![A453568_1_En_10_Figg_HTML.jpg](img/A453568_1_En_10_Figg_HTML.jpg)\
    \ 查看可用的 STOMP 代理列表⁵。\n\n![A453568_1_En_10_Figh_HTML.jpg](img/A453568_1_En_10_Figh_HTML.jpg)\
    \ 在聊天应用中，你将使用带有 STOMP 插件⁶ 的 RabbitMQ 作为完整的外部 STOMP 代理。\n\n你将在第 3 部分“按功能编码”中了解更多关于\
    \ Spring WebSocket 的内容。\n\n脚注 1\n\n[`https://github.com/sockjs`](https://github.com/sockjs)\n\
    \n  2\n\n[`www.enterpriseintegrationpatterns.com/patterns/messaging/PublishSubscribeChannel.html`](http://www.enterpriseintegrationpatterns.com/patterns/messaging/PublishSubscribeChannel.html)\n\
    \n  3\n\n[`www.enterpriseintegrationpatterns.com/patterns/messaging/PointToPointChannel.html`](http://www.enterpriseintegrationpatterns.com/patterns/messaging/PointToPointChannel.html)\n\
    \n  4\n\n[`https://github.com/spring-projects/spring-framework/blob/master/spring-messaging/src/main/java/org/springframework/messaging/simp/broker/SimpleBrokerMessageHandler.java`](https://github.com/spring-projects/spring-framework/blob/master/spring-messaging/src/main/java/org/springframework/messaging/simp/broker/SimpleBrokerMessageHandler.java)\n\
    \n  5\n\n[`https://stomp.github.io/implementations.html`](https://stomp.github.io/implementations.html)\n\
    \n  6\n\n[`https://www.rabbitmq.com/web-stomp.html`](https://www.rabbitmq.com/web-stomp.html)\n"
- fmt: '# 11. Single-Node Chat Architecture


    Figure [11-1](#A453568_1_En_11_Chapter.html#Fig1) shows the simplified architecture
    diagram for the single-node chat application. It shows exactly what you are running
    on your local machine right now if you followed the steps in Chapter [2](#A453568_1_En_2_Chapter.html).


    ![A453568_1_En_11_Fig1_HTML.jpg](A453568_1_En_11_Fig1_HTML.jpg)


    Figure 11-1. Single-node chat application


    When you register a new account, the user is stored in MySQL, and the role `ROLE_USER`
    is assigned to the user, which means that this user is not allowed to create new
    chat rooms.


    After you sign in, the list of all available chat rooms is displayed. The chat
    rooms and their connected users are stored in Redis as a Redis Hash[¹](#A453568_1_En_11_Chapter.html#Fn1)
    data type. Basically, a Redis Hash is a data structure that allows you to associate
    many `key : value` entries to a unique key. In the following example, the unique
    key is `chatrooms:c4f045bb-8dfd-4620-b365-fd3b4fbeb46e`:


    ```

    HGETALL chatrooms:c4f045bb-8dfd-4620-b365-fd3b4fbeb46e

    "id" : "c4f045bb-8dfd-4620-b365-fd3b4fbeb46e"

    "name" : "Top Guitarists"

    "description" : "Meet the most amazing guitarists"

    ```


    ![A453568_1_En_11_Figa_HTML.jpg](A453568_1_En_11_Figa_HTML.jpg) `HGETALL`[²](#A453568_1_En_11_Chapter.html#Fn2)
    is the Redis command that gets a hash and all the `key : value` entries associated
    with it.


    When you join a chat room, a JavaScript code snippet gets executed on the client
    side. It starts a WebSocket over STOMP connection to the chat server. If the connection
    fails, it will retry every ten seconds.


    ```

    function connect() {

    socket = new SockJS(''/ws'');

    stompClient = Stomp.over(socket);

    stompClient.connect({ ''chatRoomId'' : chatRoomId }, stompSuccess, stompFailure);

    }

    function stompFailure(error) {

    errorMessage("Lost connection to WebSocket! Reconnecting in 10 seconds...");

    disableInputMessage();

    setTimeout(connect, 10000);

    }

    ```


    As you’ve learned, after the WebSocket connection is established, everything happens
    through the WebSocket connection, not through HTTP requests.


    ```

    function stompSuccess(frame) {

    enableInputMessage();

    successMessage("Your WebSocket connection was successfully established!")

    stompClient.subscribe(''/chatroom/connected.users'', updateConnectedUsers);

    stompClient.subscribe(''/chatroom/old.messages'', oldMessages);

    stompClient.subscribe(''/topic/'' + chatRoomId + ''.public.messages'', publicMessages);

    stompClient.subscribe(''/user/queue/'' + chatRoomId + ''.private.messages'', privateMessages);

    stompClient.subscribe(''/topic/'' + chatRoomId + ''.connected.users'', updateConnectedUsers);

    }

    ```


    As soon as the WebSocket connection starts, these main things happen:


    - The client asks for the connected users and their old messages (the entire conversation)
    associated with this chat room. The conversation is fetched from Cassandra.

    - The client also subscribes to start receiving updates when a user joins or leaves
    the chat room, when a public message is sent, or when a user receives a private
    message.


    On the server side, as soon as a user connects, the chat room is updated on Redis
    to add the new connected user.


    In the chat room, all messages that appear to the user (public, private, and system
    messages) are appended to the user’s conversation in Cassandra.


    ![A453568_1_En_11_Figb_HTML.jpg](A453568_1_En_11_Figb_HTML.jpg) System messages
    are those public messages sent by the admin to inform everyone that a user has
    joined or left the chat room.


    Note that on a single-node architecture, from a functional perspective, the in-memory
    broker approach would work perfectly because every subscription would be kept
    in the server’s memory, and every WebSocket connection would be bound to the same
    server as well.


    Footnotes


    [1](#A453568_1_En_11_Chapter.html#Fn1_source) [`https://redis.io/topics/data-types`](https://redis.io/topics/data-types)


    [2](#A453568_1_En_11_Chapter.html#Fn2_source) [`https://redis.io/commands/hgetall`](https://redis.io/commands/hgetall)


    # 12. Multinode Chat Architecture


    Imagine that you want to horizontally scale the chat application by running two
    instances of the chat app on different servers. Suppose you are using an in-memory
    `SimpleBroker` as well.


    In Figure [12-1](#A453568_1_En_12_Chapter.html#Fig1), Jorge and John have a WebSocket
    connection to server 1, and Xuxa has a WebSocket connection to server 2. What
    would happen if Jorge tries to send a message to Xuxa? Well, I think you already
    know the answer! Since Xuxa is not connected to server 1, that server doesn’t
    know about the user Xuxa. Thus, the message will be lost. However, if Jorge sends
    a message to John, it will work.


    ![A453568_1_En_12_Fig1_HTML.jpg](A453568_1_En_12_Fig1_HTML.jpg)


    Figure 12-1. Two chat instances: simple broker


    The in-memory approach doesn’t work at all for horizontally scaling your chat
    application.'
