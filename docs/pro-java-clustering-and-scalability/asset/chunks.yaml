- fmt: '# 21. Lazy Deployments vs. Fast Deployments


    Perhaps you’ve worked for a company where the deployment process to the production
    environment was very lazy. That is, it took many days or sometimes even months
    to happen. Believe it or not, in practice it’s not that difficult to find these
    scenarios.


    In short, this kind of problem is often the root cause of a software project failure.
    That’s because taking such a long period of time to deploy a new release to production
    has many disadvantages.


    - Clients will not be happy with features that would add value to their business
    being on the developers’ machines instead of in production.

    - The new version will have a lot of new code because developers were working
    on new features for a long period of time, probably introducing many bugs to the
    application at once. This makes it even harder to fix them (and other) bugs.

    - The team will not be able to fix critical bugs and deliver the software because
    of the amount of time taken between deployments.

    - Developers will work hard and will not see their code in production. This is
    really discouraging.


    As you can see, there are quite a lot of reasons not to have a lazy deployment
    process.


    ![A453568_1_En_21_Figa_HTML.jpg](A453568_1_En_21_Figa_HTML.jpg) I recommend the
    book *Continuous Delivery* from Jez Humble and David Farley (Addison-Wesley, 2010)
    for an excellent introduction to the amazing world of continuous delivery.


    By contrast, the ability to deliver code to production in a matter of hours or
    even minutes brings a lot of benefits, including the following:


    - You will have happy clients using new features every week, perhaps every day,
    and increasing value to their business.

    - You get low-risk releases. Each new release includes only a small feature. If
    something goes wrong, it’s much easier to find and fix it. This obviously implies
    lower costs as well.

    - Bug fixes are delivered very quickly.

    - Happy developers see their jobs adding value to other people.


    As you can see, there are many good reasons to release new versions to production
    as soon as possible.


    # 22. Continuous Delivery


    Continuous delivery is the ability to deliver changes (such as new features, configuration
    changes, bug fixes, and so on) into production safely and quickly in a sustainable
    way.


    Of course, achieving this comes at a price. The entire delivery process (from
    development to production) must be highly automated. Remember, humans are good
    at creative tasks but horrible at repetitive tasks. Machines are horrible at creative
    tasks but excellent at repetitive tasks. Why not take advantage of both humans
    and machines? In other words, let humans and machines do what they do best!


    Testing is a repetitive, difficult, and boring task. Humans are not able to test
    thousands of use cases without making mistakes. Machines are. Also, machines can
    accomplish a testing task in seconds or minutes, while humans can spend entire
    days doing it. This also means that replacing humans with machines on these kinds
    of tasks is cheaper.


    Having humans testing your software or manually involved in any task that could
    have been automated is something that just doesn’t fit in with the continuous
    delivery of software to production. If you want to implement continuous delivery,
    automation is key!


    Can you see now why automated tests are so important? I would say that they’re
    a sort of prerequisite for implementing continuous delivery with high-quality
    releases. Implementing continuous delivery without good automated tests will result
    in delivering terrible-quality code to production quickly. Is that what you want?
    Definitely, no!


    # 23. Types of Automated Tests


    There are lots of types of automated tests that can be coded. All of them have
    their strengths and weaknesses. The following are the most common ones:


    - **Unit tests**: These provide fast feedback, but they test only an isolated
    unit of code (say, a method in a class). For example, an issue with a SQL query
    would not be caught since a unit test would not hit the database. Unit tests usually
    are executed in seconds or even milliseconds.

    - **Integration tests**: These provide slower feedback, but they include testing
    the external integrations such as databases or web services. That is, they are
    more comprehensive than unit tests. (This doesn’t mean they are better! Be careful
    here; remember that every type of test has its own strengths and weaknesses.)
    Usually, integration tests are executed in minutes, but the time may vary a lot
    depending on the number of tests to be run.

    - **Acceptance tests**: These provide even slower feedback than integration tests,
    but they actually simulate a user in the system using the browser and clicking
    buttons and links, filling in and submitting forms, and so on. Usually they are
    executed in minutes, but the time may vary a lot depending on the number of tests
    to be run.

    - **Stress tests**: These consist of flooding the system with lots of requests
    to get feedback on how it behaves under these conditions.


    Usually, unit and integration tests are most often used. Together, they cover
    a lot of scenarios and avoid many application issues. Also, they are easier to
    code than the other types of tests (considering that stress tests should run in
    a similar production environment, etc.).


    ![A453568_1_En_23_Figa_HTML.jpg](A453568_1_En_23_Figa_HTML.jpg) Actually, there
    are even more types of automated tests, such as security tests, that could be
    added to your application’s automated test suite. The Open Web Application Security
    Project[¹](#A453568_1_En_23_Chapter.html#Fn1) (OWASP) is an online community that
    creates freely available articles, methodologies, documentation, tools, and technologies
    in the field of web application security. For example, the OWASP Zed Attack Proxy[²](#A453568_1_En_23_Chapter.html#Fn2)
    (ZAP) is one of the world’s most popular free security tools and is actively maintained
    by hundreds of international volunteers. This tool can help you automatically
    find security vulnerabilities in your web applications and can be easily integrated
    into your continuous delivery pipeline (it even has a Jenkins plug-in[³](#A453568_1_En_23_Chapter.html#Fn3)
    available).


    **Footnotes**


    [¹](#A453568_1_En_23_Chapter.html#Fn1_source) [`https://www.owasp.org/index.php/Main_Page`](https://www.owasp.org/index.php/Main_Page)


    [²](#A453568_1_En_23_Chapter.html#Fn2_source) [`https://github.com/zaproxy/zaproxy`](https://github.com/zaproxy/zaproxy)


    [³](#A453568_1_En_23_Chapter.html#Fn3_source) [`https://wiki.jenkins.io/display/JENKINS/zap+plugin`](https://wiki.jenkins.io/display/JENKINS/zap+plugin)


    # 24. Unit Tests


    Unit tests provide fast feedback, but they test only an isolated unit of code
    (a method in a class, for example). In the chat application, I write unit tests
    using `JUnit`[¹](#A453568_1_En_24_Chapter.html#Fn1) along with `Mockito`[²](#A453568_1_En_24_Chapter.html#Fn2)
    and `Hamcrest`.[³](#A453568_1_En_24_Chapter.html#Fn3)'
