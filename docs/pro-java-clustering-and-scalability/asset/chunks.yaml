- fmt: "# 1.5 Docker Usage Example: Elasticsearch\n\nLet’s get back to the Elasticsearch\
    \ example; say you want to spin up an Elasticsearch cluster on your local machine\
    \ using Docker. I’ve already pushed to Docker Hub an out-of-the-box Elasticsearch\
    \ Docker image[³](#A453568_1_En_1_Chapter.html#Fn3) that does the hard work for\
    \ you. To benefit from it in a matter of seconds, you just have to create the\
    \ containers representing the Elasticsearch nodes.\n\n*   Here’s an example of\
    \ how to start Elasticsearch `node1`:\n\n    ```\n    $ docker rm -f node1 ||\
    \ true && docker run -d --name node1 --net=host --privileged -p 9200-9400:9200-9400\
    \ -e CLUSTER_NAME=my-cluster -e NODE_NAME=node1 -e LOCK_MEMORY=true --ulimit memlock=-1:-1\
    \ --ulimit nofile=65536:65536 -e ES_HEAP_SIZE=512m jorgeacetozielasticsearch:2.3.5\n\
    \    ```\n\n*   Here’s an example of how to start Elasticsearch `node2`:\n\n \
    \   ```\n    $ docker rm -f node2 || true && docker run -d --name node2 --net=host\
    \ --privileged -p 9200-9400:9200-9400 -e CLUSTER_NAME=my-cluster -e NODE_NAME=node2\
    \ -e LOCK_MEMORY=true --ulimit memlock=-1:-1 --ulimit nofile=65536:65536 -e ES_HEAP_SIZE=512m\
    \ jorgeacetozi/elasticsearch:2.3.5\n    ```\n\n*   Here’s an example of how to\
    \ start Elasticsearch `node3`:\n\n    ```\n    $ docker rm -f node3 || true &&\
    \ docker run -d --name node3 --net=host --privileged -p 9200-9400:9200-9400 -e\
    \ CLUSTER_NAME=my-cluster -e NODE_NAME=node3 -e LOCK_MEMORY=true --ulimit memlock=-1:-1\
    \ --ulimit nofile=65536:65536 -e ES_HEAP_SIZE=512m jorgeacetozielasticsearch:2.3.5\n\
    \    ```\n\nNow use your browser to go to `http://localhost:9200/_plugin/head`\
    \ to see the cluster up and running. Amazing, isn’t it?\n\n![A453568_1_En_1_Figd_HTML.jpg](A453568_1_En_1_Figd_HTML.jpg)\
    \ These commands may not work if you are running Docker for macOS because there\
    \ is a bug being fixed when running containers using the network mode host. See\
    \ [`https://github.com/docker/for-mac/issues/68`](https://github.com/docker/for-mac/issues/68)\
    \ for details.\n\nThat was just an example to show how simple it is to set up\
    \ services using Docker. Let’s destroy the Elasticsearch cluster and look at some\
    \ basic Docker concepts before proceeding.\n\n```\n$ docker rm -f node1 node2\
    \ node3\n```\n\n# 1.6 Basic Docker Commands\n\nThese are the commands that you\
    \ are likely to use frequently:\n\n*   `docker pull [image]`: Pulls the image\
    \ from the remote registry to your local filesystem\n*   `docker run [image]`:\
    \ Creates a container from the specific image\n*   `docker ps`: Lists the active\
    \ containers\n*   `docker ps -a`: Lists all the containers regardless of their\
    \ states\n*   `docker images`: Lists the images on your machine\n*   `docker rm\
    \ [container]`: Removes a running container\n*   `docker rmi [image]`: Removes\
    \ an image from your machine\n*   `docker exec [container]`: Executes a command\
    \ inside the container\n*   `docker build`: Creates an image by following the\
    \ instructions provided in a special file called a `Dockerfile`\n\n![A453568_1_En_1_Fige_HTML.jpg](A453568_1_En_1_Fige_HTML.jpg)\
    \ For more information, access the complete list of Docker commands in the official\
    \ docs.[⁴](#A453568_1_En_1_Chapter.html#Fn4)\n\n# 1.7 The docker run Command\n\
    \nYou may have noticed when you created the Elasticsearch cluster earlier that\
    \ the `docker run` statement can have a lot of parameters. Don’t be afraid! In\
    \ most cases, you’ll be using the same parameters over and over again. Let’s take\
    \ a look at the most common ones.\n\n![A453568_1_En_1_Figf_HTML.jpg](A453568_1_En_1_Figf_HTML.jpg)\
    \ For more information, check the complete `docker run` reference.[⁵](#A453568_1_En_1_Chapter.html#Fn5)\n\
    \n## 1.7.1 Running Containers as a Daemon with -d\n\nTo run containers in the\
    \ background, you need to provide the `-d` parameter in the `docker run` statement.\
    \ For instance, let’s create a Jenkins container from the [official Jenkins](https://hub.docker.com/_/jenkins/)\
    \ Docker image.[⁶](#A453568_1_En_1_Chapter.html#Fn6)\n\n```\n$ docker run -d -p\
    \ 8080:8080 jenkins\n```\n\nNote that when running a container with the `-d` option,\
    \ your Bash shell will not be tied to the `docker run` statement. Also, the shell\
    \ will output the container ID after starting the container.\n\n## 1.7.2 Naming\
    \ Containers with --name\n\nEvery container has an ID and a name. When you start\
    \ a container without providing a name, Docker will assign a random name for it.\
    \ Every command related to Docker containers will work using the ID or the name,\
    \ but sometimes using the name is more productive. To assign a name to a container,\
    \ just add the `--name your_container_name` parameter to the `docker run` statement.\n\
    \n```\n$ docker run -d --name jenkins -p 8080:8080 jenkins\n```\n\n## 1.7.3 Exposing\
    \ Ports with -p\n\nTry to create this Jenkins container:\n\n```\n$ docker run\
    \ -d jenkins\n```\n\nNow use your browser to go to `http://localhost:8080`. It\
    \ doesn’t work, does it? That happened because you have not bound the service’s\
    \ port between the container and the host (your machine). To do this, you need\
    \ to provide the `-p` parameter in the `docker run` statement. Now re-create the\
    \ previous container with the following statement:\n\n```\n$ docker run -d -p\
    \ 8080:8080 jenkins\n```\n\nRefresh the browser. It works! The `-p` parameter\
    \ expects the following syntax: `host_port:container_port`.\n\n## 1.7.4 Environment\
    \ Variables with -e\n\nWhen creating Docker images, you will want the images to\
    \ be as flexible as possible so that people can reuse the images in different\
    \ scenarios. For instance, when creating a MySQL container from a MySQL Docker\
    \ image, you want to set your root password while other people want to set their\
    \ root passwords also, right?\n\nThe creators of MySQL’s official Docker image[⁷](#A453568_1_En_1_Chapter.html#Fn7)\
    \ decided that the `MYSQL_ROOT_PASSWORD` environment variable would be the one\
    \ that you must define to set the root password to your MySQL instance. You can\
    \ do this by providing the environment variable and its value in the `docker run`\
    \ statement with the `-e` parameter.\n\n```\n$ docker run -d --name mysql -e MYSQL_ROOT_PASSWORD=root\
    \ -p 3306:3306 mysql:5.7\n```"
