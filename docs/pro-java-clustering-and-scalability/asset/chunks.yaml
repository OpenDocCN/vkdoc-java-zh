    # 11. 单节点聊天架构


    图 11-1 展示了单节点聊天应用的简化架构图。如果你按照第 2 章的步骤操作，这张图正是你本地机器上当前运行的内容。


    ![A453568_1_En_11_Fig1_HTML.jpg](img/A453568_1_En_11_Fig1_HTML.jpg)


    图 11-1.


    单节点聊天应用


    当你注册新账户时，用户信息会存储在 MySQL 中，并且系统会为用户分配 `ROLE_USER` 角色，这意味着该用户无权创建新的聊天室。


    登录后，系统会显示所有可用聊天室的列表。聊天室及其关联的用户以 Redis 哈希¹ 数据类型存储在 Redis 中。基本上，Redis 哈希是一种数据结构，允许你将多个
    `key : value` 条目关联到一个唯一的键。在以下示例中，唯一键是 `chatrooms:c4f045bb-8dfd-4620-b365-fd3b4fbeb46e`：


    ```

    HGETALL chatrooms:c4f045bb-8dfd-4620-b365-fd3b4fbeb46e

    "id" : "c4f045bb-8dfd-4620-b365-fd3b4fbeb46e"

    "name" : "Top Guitarists"

    "description" : "Meet the most amazing guitarists"

    ```


    ![A453568_1_En_11_Figa_HTML.jpg](img/A453568_1_En_11_Figa_HTML.jpg) `HGETALL`
    ² 是 Redis 命令，用于获取一个哈希及其关联的所有 `key : value` 条目。


    当你加入一个聊天室时，客户端会执行一段 JavaScript 代码片段。它会通过 STOMP 协议启动一个 WebSocket 连接到聊天服务器。如果连接失败，它将每十秒重试一次。


    ```

    function connect() {

    socket = new SockJS(''/ws'');

    stompClient = Stomp.over(socket);

    stompClient.connect({ ''chatRoomId'' : chatRoomId }, stompSuccess, stompFailure);

    }

    function stompFailure(error) {

    errorMessage("Lost connection to WebSocket! Reconnecting in 10 seconds...");

    disableInputMessage();

    setTimeout(connect, 10000);

    }

    ```


    正如你所了解的，WebSocket 连接建立后，所有通信都通过 WebSocket 连接进行，而非 HTTP 请求。


    ```

    function stompSuccess(frame) {

    enableInputMessage();

    successMessage("Your WebSocket connection was successfully established!")

    stompClient.subscribe(''/chatroom/connected.users'', updateConnectedUsers);

    stompClient.subscribe(''/chatroom/old.messages'', oldMessages);

    stompClient.subscribe(''/topic/'' + chatRoomId + ''.public.messages'', publicMessages);

    stompClient.subscribe(''/user/queue/'' + chatRoomId + ''.private.messages'', privateMessages);

    stompClient.subscribe(''/topic/'' + chatRoomId + ''.connected.users'', updateConnectedUsers);

    }

    ```


    WebSocket 连接一启动，就会发生以下主要事件：


    *   客户端请求获取与该聊天室关联的已连接用户及其历史消息（整个对话记录）。对话记录从 Cassandra 中获取。

    *   客户端还会订阅以下更新通知：用户加入或离开聊天室、发送公共消息、或用户收到私密消息。


    在服务器端，一旦用户连接，Redis 中的聊天室信息会更新，以添加新连接的用户。


    在聊天室中，用户看到的所有消息（公共消息、私密消息和系统消息）都会被追加到 Cassandra 中该用户的对话记录里。


    ![A453568_1_En_11_Figb_HTML.jpg](img/A453568_1_En_11_Figb_HTML.jpg) 系统消息是由管理员发送的公共消息，用于通知所有人有用户加入或离开了聊天室。


    请注意，在单节点架构中，从功能角度来看，内存代理方法可以完美运行，因为每个订阅都会保存在服务器的内存中，并且每个 WebSocket 连接也会绑定到同一台服务器。


    脚注 1


    [`https://redis.io/topics/data-types`](https://redis.io/topics/data-types)


    2


    [`https://redis.io/commands/hgetall`](https://redis.io/commands/hgetall)


    # 12. 多节点聊天架构


    假设你想通过在不同服务器上运行两个聊天应用实例来水平扩展聊天应用。同时假设你仍在使用内存中的 `SimpleBroker`。


    在图 12-1 中，Jorge 和 John 与服务器 1 建立了 WebSocket 连接，而 Xuxa 与服务器 2 建立了 WebSocket 连接。如果
    Jorge 试图向 Xuxa 发送消息，会发生什么？我想你已经知道答案了！由于 Xuxa 没有连接到服务器 1，该服务器不知道用户 Xuxa 的存在。因此，消息会丢失。然而，如果
    Jorge 向 John 发送消息，则可以正常工作。


    ![A453568_1_En_12_Fig1_HTML.jpg](img/A453568_1_En_12_Fig1_HTML.jpg)


    图 12-1.


    两个聊天实例：简单代理


    内存代理方法完全无法用于水平扩展你的聊天应用。

    '
- fmt: '# 12.1 Using RabbitMQ As a Full External STOMP Broker


    Now, if you start using a full external STOMP broker like RabbitMQ, you would
    have a scenario like the one shown in Figure 12-2.


    ![A453568_1_En_12_Fig2_HTML.jpg](A453568_1_En_12_Fig2_HTML.jpg)


    Figure 12-2. Two chat instances: broker relay


    Now the subscriptions are not bound to specific server instances; that is, the
    subscriptions are not kept in the servers’ memory anymore. There is an external
    component that’s responsible for handling subscriptions. The Spring configuration
    for this scenario would look something like this:


    ```

    protected void configureStompEndpoints(StompEndpointRegistry registry) {

    registry.addEndpoint("/ws").withSockJS();

    }

    public void configureMessageBroker(MessageBrokerRegistry registry) {

    registry.enableStompBrokerRelay("/queue/",  "/topic/")

    .setUserDestinationBroadcast("/topic/unresolved.user.dest")

    .setUserRegistryBroadcast("/topic/registry.broadcast")

    .setRelayHost(relayHost)

    .setRelayPort(relayPort);

    registry.setApplicationDestinationPrefixes("/chatroom");

    }

    ```


    Let’s take a look at these configurations:


    - `enableStompBrokerRelay`: This uses an external full STOMP broker instead of
    an in-memory broker.

    - `setRelayHost` and `setRelayPort`: These are the host and the port, respectively,
    of the external STOMP broker (RabbitMQ, in this case).

    - `setUserDestinationBroadcast`: A user destination may remain unresolved because
    the user is connected to a different server (like Jorge and Xuxa). In such cases,
    this destination is used to broadcast unresolved messages so that other servers
    have a chance to try.

    - `setUserRegistryBroadcast`: This sets a destination to broadcast the content
    of the local user registry (the place where connected clients are stored in memory)
    and to listen to such broadcasts from other servers. In a multinode architecture,
    this allows each server’s user registry to be aware of users connected to other
    servers. In other words, it enables Chat App 1 to be aware that Xuxa exists in
    Chat App 2.


    When the application starts, only the destinations `/topic/unresolved.user.dest`
    and `/topic/registry.broadcast` are created on RabbitMQ. Spring keeps a “system”
    TCP connection between the server and RabbitMQ that is not used for user messages;
    it’s used only for internal communication between the server and the broker (such
    as sending heartbeat messages every ten seconds, by default, to check whether
    the broker is alive). If Spring detects that there is a broker outage, then it
    will try to reconnect every five seconds by default.


    For every new WebSocket connection, the server creates a new TCP connection with
    the broker. This is the connection actually used for user messages.


    Now that you have a solution for a multinode architecture, you could add more
    chat app instances behind a load balancer such as Nginx[¹](#A453568_1_En_12_Chapter.html#Fn1)
    and have a pretty scalable architecture, as shown in Figure 12-3.


    ![A453568_1_En_12_Fig3_HTML.jpg](A453568_1_En_12_Fig3_HTML.jpg)


    Figure 12-3. Multinode chat architecture


    Note that every component of this architecture can be clustered and can implement
    a replication strategy. This means that even if some nodes experience a failure
    event, this architecture would keep working. This is beautiful!


    ![A453568_1_En_12_Figa_HTML.jpg](A453568_1_En_12_Figa_HTML.jpg) There are many
    aspects that you should consider when dealing with scalability, for instance,
    increasing the number of socket descriptors that the operating system is able
    to use. You must keep in mind that horizontal scalability is amazing, but there
    are many things you can try before adding more nodes (and more costs) to your
    infrastructure.


    **Footnotes**


    [1](#A453568_1_En_12_Chapter.html#Fn1_source) [`https://www.nginx.com/blog/websocket-nginx/`](https://www.nginx.com/blog/websocket-nginx/)


    # 13. Horizontally Scaling Stateful Web Applications


    Let’s forget the WebSocket technology for a while and think about traditional
    web applications. You have already learned about the request/response HTTP model,
    and you know that HTTP is stateless. This means that after a server gives a response
    to a request, it closes the TCP connection, and it doesn’t know anything about
    the client (not even if the client is going to make other requests) anymore. This
    might work in some cases, but think of an online store. How would the store be
    able to keep the shopping cart items across multiple requests if HTTP is stateless?
    To address this issue, web servers provide an HTTP session mechanism, which is
    basically local per-user storage that is associated with a specific code (in Java,
    the `JSESSIONID` code). When a user sends the first request to a server, it creates
    a new HTTP session and sends the `JSESSIONID` code to the user by using cookies.
    If the client sends a second request, the `JSESSIONID` code will be available
    in the HTTP request, and the server will be able to identify that it is a returning
    user. This means that if the shopping cart is stored in the HTTP session, the
    server will be able to keep it across requests.


    This might sound nice, but it’s a big issue when it comes to horizontal scalability.
    Can you guess why? What would happen if an online store’s multinode architecture
    is implemented using a load balancer and a user named Jorge has his shopping cart
    stored in the HTTP session on server 1 and in the next request the load balancer
    sends it to server 2? His shopping cart wouldn’t be available there, right? (See
    Figure 13-1.)


    ![A453568_1_En_13_Fig1_HTML.jpg](A453568_1_En_13_Fig1_HTML.jpg)


    Figure 13-1. Multinode online store without a session manager'
  raw: '## 12.1 Using RabbitMQ As a Full External STOMP Broker


    Now, if you start using a full external STOMP broker like RabbitMQ , you would
    have a scenario like the one shown in Figure [12-2](#A453568_1_En_12_Chapter.html#Fig2).


    ![A453568_1_En_12_Fig2_HTML.jpg](A453568_1_En_12_Fig2_HTML.jpg)


    Figure 12-2.


    Two chat instances: broker relay


    Now the subscriptions are not bound to specific server instances; that is, the
    subscriptions are not kept in the servers’ memory anymore. There is an external
    component that’s responsible for handling subscriptions. The Spring configuration
    for this scenario would look something like this:


    ```

    protected void configureStompEndpoints(StompEndpointRegistry registry) {

    registry.addEndpoint("/ws").withSockJS();

    }

    public void configureMessageBroker(MessageBrokerRegistry registry) {

    registry.enableStompBrokerRelay("/queue/",  "/topic/")

    .setUserDestinationBroadcast("/topic/unresolved.user.dest")

    .setUserRegistryBroadcast("/topic/registry.broadcast")

    .setRelayHost(relayHost)

    .setRelayPort(relayPort);

    registry.setApplicationDestinationPrefixes("/chatroom");

    }

    ```


    Let’s take a look at these configurations :


    *   enableStompBrokerRelay: This uses an external full STOMP broker instead of
    an in-memory broker.

    *   setRelayHost and setRelayPort: These are the host and the port, respectively,
    of the external STOMP broker (RabbitMQ, in this case).

    *   setUserDestinationBroadcast: A user destination may remain unresolved because
    the user is connected to a different server (like Jorge and Xuxa). In such cases,
    this destination is used to broadcast unresolved messages so that other servers
    have a chance to try.

    *   setUserRegistryBroadcast : This sets a destination to broadcast the content
    of the local user registry (the place where connected clients are stored in memory)
    and to listen to such broadcasts from other servers. In a multinode architecture,
    this allows each server’s user registry to be aware of users connected to other
    servers. In other words, it enables Chat App 1 to be aware that Xuxa exists in
    Chat App 2.


    When the application starts, only the destinations `/topic/unresolved.user.dest`
    and `/topic/registry.broadcast` are created on RabbitMQ. Spring keeps a “system”
    TCP connection between the server and RabbitMQ that is not used for user messages;
    it’s used only for internal communication between the server and the broker (such
    as sending heartbeat messages every ten seconds, by default, to check whether
    the broker is alive). If Spring detects that there is a broker outage, then it
    will try to reconnect every five seconds by default.


    For every new WebSocket connection, the server creates a new TCP connection with
    the broker. This is the connection actually used for user messages.


    Now that you have a solution for a multinode architecture, you could add more
    chat app instances behind a load balancer such as Nginx[¹](#A453568_1_En_12_Chapter.html#Fn1)
    and have a pretty scalable architecture, as shown in Figure [12-3](#A453568_1_En_12_Chapter.html#Fig3).


    ![A453568_1_En_12_Fig3_HTML.jpg](A453568_1_En_12_Fig3_HTML.jpg)


    Figure 12-3.


    Multinode chat architecture


    Note that every component of this architecture can be clustered and can implement
    a replication strategy. This means that even if some nodes experience a failure
    event, this architecture would keep working. This is beautiful!


    ![A453568_1_En_12_Figa_HTML.jpg](A453568_1_En_12_Figa_HTML.jpg) There are many
    aspects that you should consider when dealing with scalability, for instance,
    increasing the number of socket descriptors that the operating system is able
    to use. You must keep in mind that horizontal scalability is amazing, but there
    are many things you can try before adding more nodes (and more costs) to your
    infrastructure.


    Footnotes [1](#A453568_1_En_12_Chapter.html#Fn1_source)


    [`https://www.nginx.com/blog/websocket-nginx/`](https://www.nginx.com/blog/websocket-nginx/)


    # 13. Horizontally Scaling Stateful Web Applications


    Let’s forget the WebSocket technology for a while and think about traditional
    web applications. You have already learned about the request/response HTTP model,
    and you know that HTTP is stateless. This means that after a server gives a response
