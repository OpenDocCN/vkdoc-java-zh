    ## Installing Spring LDAP Using Maven


    Before you can install and start using Spring LDAP, it is important to ensure
    that the Java Development Kit (JDK) is installed on your machine; you find the
    explanation about how to do it in Appendix A. The latest Spring LDAP 3.1.0 version
    requires JDK 17 and higher and Spring 6.0 or higher. Just remember that we will
    use JDK 21 to use the latest LTS available.


    Apache Maven is an open source, standards-based project management framework that
    makes building, testing, reporting, and packaging projects easier. If you are
    new to Maven and are wondering about the tool, the Maven website^([^(43)](#fn43))
    provides information on its features and many helpful links. Here are some advantages
    of adopting Maven:


    *   *Standardized directory structure*: Maven standardizes the layout and organization
    of a project. Every time a new project starts, considerable time is spent on decisions
    such as where the source code should go or where the configuration files should
    be placed. Also, these decisions can vary vastly between projects and teams. Maven’s
    standardized directory structure makes adoption easy across developers and even
    IDEs.


    *   *Declarative dependency management*: With Maven, you declare your project
    dependencies in a separate `pom.xml` file. Maven then automatically downloads
    those dependencies from repositories and uses them during the build process. Maven
    also smartly resolves and downloads transitive dependencies (dependencies of dependencies).


    *   *Archetypes*: Maven archetypes are project templates that can be used to quickly
    generate new projects. These archetypes are a great way to share best practices
    and enforce consistency beyond Maven’s standard directory structure.


    *   *Plug-ins*: Maven follows a plug-in-based architecture that makes adding or
    customizing functionality easy. Hundreds of plug-ins can perform various tasks,
    from compiling code to creating project documentation. Activating and using a
    plug-in simply involves declaring a reference to the plug-in in the `pom.xml`
    file.


    *   *Tools support*: All major IDEs today provide tooling support for Maven. This
    includes wizards for generating projects, creating IDE-specific files, and graphical
    tools for analyzing dependencies.


    ## Spring LDAP Archetypes


    To jump-start Spring LDAP development, this book uses the following two archetypes,
    which you can find in the repository of this book:


    *   `practical-ldap-empty-archetype`: This archetype can create an empty Java
    project with all the required LDAP dependencies.


    *   `practical-ldap-archetype`: Similar to the preceding archetype, this archetype
    creates a Java project with all the required LDAP dependencies. It also includes
    Spring LDAP configuration files, sample code, and dependencies to run an in-memory
    LDAP server for testing purposes.


    Before you can use the archetypes to create a project, you need to install them.
    If you still need to do so, download the accompanying source/download files from
    Apress. In the downloaded distribution, you will find `practical-ldap-empty-archetype-1.0.0.jar`
    and `practical-ldap-archetype-1.0.0.jar` archetypes. Once you have the jar files
    downloaded, run the following command to install on your local repository the
    first archetype:


    ```

    $ `mvn` install:install-file \

    -DgroupId=com.apress.book.ldap \

    -DartifactId=practical-ldap-empty-archetype \

    -Dversion=1.0.0 \

    -Dpackaging=jar  \

    -DgeneratePom=true  \

    -Dfile=`/practical-ldap-empty-archetype-1.0.0.jar`

    ```


    If you run the command and everything works fine, you will see something similar
    to the following logs:


