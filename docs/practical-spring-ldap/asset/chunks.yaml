    # 6. 搜索 LDAP


    搜索信息是针对 LDAP 的最常见操作。客户端应用程序通过传递搜索条件（即决定搜索位置和搜索内容的信息）来发起 LDAP 搜索。在接收到请求后，LDAP 服务器会执行搜索并返回所有匹配条件的条目。

