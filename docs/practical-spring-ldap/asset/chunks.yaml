    \ 的简单性使您能够轻松地将 LDAP 数据转换为领域对象，从而减少编写和注册大量对象工厂的需求。\n\n在后续章节中，您将使用 `DirContextAdapter`\
    \ 创建一个 Employee DAO，该 DAO 抽象了对 Employee LDAP 条目的读写访问。\n\n注意\n\n当今大多数 Java 和 JEE\
    \ 应用程序都会访问持久化存储来执行日常操作。持久化存储的类型从流行的关联系统数据库到 LDAP 目录，再到遗留的主机系统不等。根据持久化存储的类型，获取和操作数据的机制会存在很大差异。这可能导致应用程序与数据访问代码之间产生紧密耦合，使得在不同实现之间切换变得困难。这就是数据访问对象（DAO）模式可以发挥作用的地方。\n\
    \n数据访问对象是一种流行的核心 JEE 模式，它封装了对数据源的访问。通过 DAO，底层的数据访问逻辑（如连接数据源和操作数据）被清晰地抽象到一个单独的层。DAO\
    \ 的实现通常包括：\n\n1. 一个提供 CRUD 方法契约的 DAO 接口  \n2. 使用特定数据源 API 实现接口的具体类  \n3. DAO 返回的领域对象或传输对象\
    \  \n\n有了 DAO 的支持，应用程序的其余部分无需关注底层数据实现，可以专注于高层次的业务逻辑。\n\n## 使用对象工厂实现 DAO\n\n通常，在\
    \ Spring 应用程序中创建的 DAO 都包含一个作为 DAO 契约的接口和一个包含实际数据存储或目录访问逻辑的实现。清单 5-3 展示了您将实现的 Employee\
    \ DAO 的 `EmployeeDao` 接口。该 DAO 包含用于修改员工信息的 `create`、`update` 和 `delete` 方法，还包含两个查找方法：一个通过\
    \ id 获取员工，另一个返回所有员工。\n\n```\npackage com.apress.book.ldap.repository;\nimport\
    \ java.util.List;\nimport com.apress.book.ldap.domain.Employee;\npublic interface\
    \ EmployeeDao {\nvoid create(Employee employee);\nvoid update(Employee employee);\n\
    void delete(String id);\nEmployee find(String id);\nList findAll();\n}\nListing\
    \ 5-3\n包含最相关方法的 DAO 定义\n```\n\n之前的 `EmployeeDao` 接口使用了 `Employee` 领域对象。清单 5-4\
    \ 展示了这个 `Employee` 领域对象。`Employee` 实现类包含了图书馆员工的所有基本属性。请注意，这里没有使用完整的 DN，而是使用 `uid`\
    \ 属性作为对象的唯一标识符。\n\n```\npackage com.apress.book.ldap.domain;\npublic class Employee\
    \ {\nprivate String uid;\nprivate String firstName;\nprivate String lastName;\n\
    private String commonName;\nprivate String email;\nprivate String employeeNumber;\n\
    private String[] phone;\n// getters and setters omitted\n}\nListing 5-4\nEmployee\
    \ 类的定义\n```\n\n您将从 `EmployeeDao` 的基本实现开始，如清单 5-5 所示。\n\n```\npackage com.apress.book.ldap.repository;\n\
    import java.util.List;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
    import org.springframework.beans.factory.annotation.Qualifier;\nimport org.springframework.ldap.core.LdapTemplate;\n\
    import com.apress.book.ldap.domain.Employee;\n@Repository(\"employeeDao\" )\n\
    public class EmployeeDaoLdapImpl implements EmployeeDao {\nprivate LdapTemplate\
    \ ldapTemplate;\npublic EmployeeDaoLdapImpl(@Autowired @Qualifier(\"ldapTemplate\"\
    ) LdapTemplate ldapTemplate) {\nthis.ldapTemplate = ldapTemplate;\n}\n@Override\n\
    public List findAll() { return null; }\n@Override\npublic Employee find(String\
    \ id) { return null; }\n@Override\npublic void create(Employee employee) {}\n\
    @Override\npublic void delete(String id) {}\n@Override\npublic void update(Employee\
    \ employee) {}\n}\nListing 5-5\nDAO 实现的默认定义\n```\n\n在这个实现中，您注入了一个 `LdapTemplate`\
    \ 实例。`LdapTemplate` 的实际创建将在外部配置文件中完成。清单 5-6 展示了位于 **src/test/resources** 文件夹中的\
    \ `repositoryContext.xml` 文件，其中包含 `LdapTemplate` 及相关 bean 的声明。\n\n```\n\nListing\
    \ 5-6\n应用程序的默认配置\n```\n\n这个配置文件与第 3 章节中看到的类似。您将 LDAP 服务器信息传递给 `LdapContextSource`\
    \ 以创建 `contextSource` bean。通过将 base 设置为 `\"ou=employees,dc=inflinx,dc=com\"`，您已将所有\
    \ LDAP 操作限制在 LDAP 树的员工分支中。需要特别注意的是，使用此处创建的上下文无法对 `\"ou=patrons\"` 分支执行搜索操作。如果需要搜索\
    \ LDAP 树的所有分支，则 base 属性需要设置为空字符串。\n\n`LdapContextSource` 的一个重要属性是 `dirObjectFactory`，可以用来设置要使用的\
    \ `DirObjectFactory`。然而，在清单 5-6 中，您并未使用此属性来指定使用 `DefaultDirObjectFactory` 的意图。这是因为默认情况下，`LdapContextSource`\
    \ 会将其 `DirObjectFactory` 注册为 `DefaultDirObjectFactory`。\n\n在配置文件的最后部分，您有 `LdapTemplate`\
    \ 的 bean 声明。您将 `LdapContextSource` bean 作为构造函数参数传递给了 `LdapTemplate`。\n"
