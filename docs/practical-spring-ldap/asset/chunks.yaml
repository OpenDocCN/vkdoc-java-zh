- fmt: '# Pool Validation


    Spring LDAP makes it easy to validate pooled connections. This validation ensures
    that the `DirContext` instances are properly configured and connected to the LDAP
    server before they are borrowed from the pool. The same validation is done before
    the contexts are returned to the pool or on the contexts sitting idle.


    The `PoolingContextSource` delegates the validation to concrete instances of the
    `org.springframework.ldap.pool.validation.DirContextValidator` interface. In Listing
    [10-15](#319409_2_En_10_Chapter.xhtml#PC26), you can see that the `DirContextValidator`
    has only one method: `validateDirContext`. The first parameter, `contextType`,
    indicates if the context to be validated is a read-only or a read-write context.
    The second parameter is the actual context that needs to be validated.


    ```

    package org.springframework.ldap.pool.validation;

    import javax.naming.directory.DirContext;

    import org.springframework.ldap.core.ContextSource;

    import org.springframework.ldap.pool.DirContextType;

    public interface DirContextValidator {

    boolean validateDirContext(DirContextType contextType, DirContext dirContext);

    }

    Listing 10-15

    The declaration of the context validator

    ```


    Out of the box, Spring LDAP provides an aptly named default implementation of
    the `DirContextValidator` called `org.springframework.ldap.pool.validation.DefaultDirContextValidator`.
    This implementation simply searches using the context and verifies the returned
    `javax.naming.NamingEnumeration`. If the `NamingEnumeration` does not contain
    any results or an exception is thrown, the context fails the validation and will
    be removed from the pool. Applications requiring more sophisticated validation
    can create new implementations of the `DirContextValidator` interface.


    Configuring pooling validation is shown in Listing [10-14](#319409_2_En_10_Chapter.xhtml#PC25).
    You start by creating a `dirContextValidator` bean of type `DefaultDirContextValidator`.
    Then, you modify the `contextSource` bean declaration to include the `dirContextValidator`
    bean. In Listing [10-16](#319409_2_En_10_Chapter.xhtml#PC27), you added the `testOnBorrow`
    and `testWhileIdle` properties.


    ```

    Listing 10-16

    Modifications on the context validator

    ```


    An alternative way to do it is shown in Listing [10-14](#319409_2_En_10_Chapter.xhtml#PC25),
    but with a little modification on the `<ldap:pooling>` tag like Listing [10-16](#319409_2_En_10_Chapter.xhtml#PC27).


    # Summary


    This brings us to the end of our journey. Throughout the book, you have learned
    the key features of Spring LDAP. With this knowledge, you should be ready to start
    developing Spring LDAP–based applications.


    Finally, writing this book and sharing my insights with you have been a pleasure.
    I wish you all the best. Happy coding!'
