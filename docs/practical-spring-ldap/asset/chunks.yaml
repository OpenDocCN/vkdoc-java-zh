    # 1. LDAP 简介


    我们每天都与目录打交道。我们使用电话簿查找电话号码，到图书馆时使用图书目录查找想阅读的书籍，用文件系统目录在计算机上存储文件和文档。简而言之，目录就是信息存储库。这些信息通常以易于检索的方式组织。


    网络上的目录通常通过客户端/服务器通信模型进行访问。希望读取或写入目录数据的应用程序会与专用服务器通信。目录服务器在实际目录上执行读取或写入操作。图 1-1
    展示了这种客户端/服务器交互。


    ![](img/319409_2_En_1_Fig1_HTML.jpg)


    服务器与客户端的交互示意图。客户端应用程序通过请求和响应与目录服务器互联。目录服务器在实际目录上进行读取或写入操作。


    图 1-1


    目录服务器与客户端的交互


    目录服务器与客户端应用程序之间的通信通常通过标准化协议实现。轻量级目录访问协议（LDAP）为与目录通信提供了标准协议。实现 LDAP 协议的目录服务器通常被称为
    LDAP 服务器。LDAP 协议基于早期的 X.500^(⁹)标准，但显著更简单（轻量级）且易于扩展。多年来，LDAP 协议经历了多次迭代，目前版本为 3.0。


    ## LDAP 概述


    LDAP 定义了目录客户端和目录服务器使用的消息协议。通过考虑以下四个模型，可以更好地理解 LDAP：


    *   信息模型决定了存储在目录中的信息结构。


    *   命名模型定义了信息在目录中的组织方式和标识方法。


    *   功能模型定义了对目录执行的操作。


    *   安全模型定义了如何防止信息被未经授权的访问。


    我们将在后续章节中逐一探讨这些模型。


    ### 目录与数据库


    初学者常常需要澄清，会将 LDAP 目录想象成关系型数据库。与数据库类似，LDAP 目录存储信息。然而，一些关键特性使目录与关系型数据库有所区别。


    LDAP 目录通常存储相对静态的数据。例如，存储在 LDAP 中的员工信息（如电话号码或姓名）通常不会每天发生变化。然而，用户和应用程序会频繁查找这些信息。由于目录中的数据访问频率高于更新频率，LDAP
    目录遵循 WORM 原则^(¹⁰,) ^(¹¹)，并高度优化读取性能。将经常变化的数据存储在 LDAP 中是没有意义的。


    关系型数据库采用参照完整性与锁机制来确保数据一致性。LDAP 中存储的数据通常不需要如此严格的一致性要求。因此，这些功能大多需要在 LDAP 服务器上实现。此外，LDAP
    规范中未定义事务语义以支持回滚操作。


    关系型数据库遵循规范化原则以避免数据重复和冗余。另一方面，LDAP 目录以分层、面向对象的方式组织。这种组织方式违反了一些规范化原则。同时，LDAP 中需要引入表连接的概念。


    尽管目录缺少上述关系型数据库管理系统（RDBMS）^(¹²)的一些特性，但许多现代 LDAP 目录是建立在关系型数据库（如 DB2^(¹³)、MySQL^(¹⁴)和
    PostgreSQL^(¹⁵)）之上的。


    在某个阶段，LDAP 具有与非关系型数据库（如 Cassandra^(¹⁶)、MongoDB^(¹⁷)等）相似的特性，其中写入/读取性能、高可用性和可扩展性比一致性更为重要。

    '
- fmt: '

    ## Information Model


    The basic unit of information stored in LDAP is an entry. Entries hold information
    about real-world objects such as employees, servers, printers, and organizations.
    Each entry in an LDAP directory comprises zero or more attributes. Attributes
    are key-value pairs that hold information about the object the entry represents.
    The key portion of an attribute is also called the attribute type and describes
    the information that can be stored in the attribute. The value portion of the
    attribute contains the actual information. Table [1-1](#319409_2_En_1_Chapter.xhtml#Tab1)
    shows a portion of an entry representing an employee. The left column in the entry
    contains the attribute types, and the right column holds the attribute values.


    Table 1-1


    Employee LDAP Entry


    | Employee Entry | Attribute Value |

    | --- | --- |

    | `objectClass` | `inetOrgPerson` |

    | `givenName` | John |

    | `surname` | Smith |

    | `mail` | `john@inflix.com` `jsmith@inflix.com` |

    | `mobile` | +1 801 100 1000 |


    Note


    Attribute names, by default, are case-insensitive. However, it is recommended
    to use camel case format in LDAP operations.


    You will notice that the mail attribute has two values. Attributes that are allowed
    to hold multiple values are called multivalued attributes. Single-valued attributes,
    on the other hand, can only hold a single value. The LDAP specification does not
    guarantee the order of the values in a multivalued attribute.


    Each attribute type is associated with a syntax that dictates the format of the
    data stored as an attribute value. For example, the mobile attribute type has
    a `telephoneNumber` syntax. This forces the attribute to hold a string value with
    a length between 1 and 32.


    Additionally, the syntax also defines the attribute value behavior during search
    operations. For example, the `givenName` attribute has the syntax `DirectoryString`.
    This syntax enforces that only alphanumeric characters are allowed as values.
    Table [1-2](#319409_2_En_1_Chapter.xhtml#Tab2) lists some common attributes and
    their associated syntax description.


    Table 1-2


    Common Entry Attributes


    | Attribute Type | Syntax | Description |

    | --- | --- | --- |

    | `commonName` | `DirectoryString` | Stores the common name of a person. |

    | `company` | `DirectoryString` | Stores the company’s name. |

    | `employeeNumber` | `DirectoryString` | Stores the employee’s identification
    number in the organization. |

    | `givenName` | `DirectoryString` | Stores the user’s first name. |

    | `jpegPhoto` | `Binary` | Stores one or more images of the person. |

    | `mail` | `IA5 String` | Stores a person’s SMTP mail address. |

    | `mobile` | `TelephoneNumber` | Stores a person’s mobile number. |

    | `postalAddress` | `Postal Address` | Stores the user’s ZIP or postal code. |

    | `postalCode` | `DirectoryString` | Stores the user’s ZIP or postal code. |

    | `st` | `DirectoryString` | Stores the state or province name. |

    | `street` | `DirectoryString` | Stores the street address. |

    | `surname` | `DirectoryString` | Stores the last name of the person. |

    | `telephoneNumber` | `TelephoneNumber` | Stores the person’s primary telephone
    number. |

    | `uid` | `DirectoryString` | Stores the user id. |

    | `title` | `DirectoryString` | Stores the name of the position or the company’s
    function. |

    | `wwwhomepage` | `DirectoryString` | Stores the official web page of the company.
    |


    The attributes in Table [1-2](#319409_2_En_1_Chapter.xhtml#Tab2) are the most
    used for the developers and tools. Still, there is a big list of other attributes
    depending on whether your vendor or the tool supports it or not; for example,
    on the official web page^([^(18)](#fn18)) of Microsoft, all the attributes are
    supported for the Active Directory.


    ## Object Classes


    In object-oriented languages, such as Java, we create a class and use it as a
    blueprint for creating objects. The class defines the attributes/data (and behavior/methods)
    that these instances can have. Similarly, object classes in LDAP determine the
    attributes an LDAP entry can have. These object classes also define which attributes
    are mandatory and which are optional. Every LDAP entry has a special attribute
    aptly named `objectClass` that holds the object class it belongs to. Looking at
    the `objectClass` value in the employee entry in Table [1-1](#319409_2_En_1_Chapter.xhtml#Tab1),
    we can conclude that the entry belongs to the `inetOrgPerson` class. Table [1-3](#319409_2_En_1_Chapter.xhtml#Tab3)
    shows the required and optional attributes in a standard LDAP person object class.
    The `cn` attribute holds the person’s common name, whereas the `sn` attribute
    holds the person’s family name or surname.


    Table 1-3


    Person Object Class


    | Required Attributes | Optional Attributes |

    | --- | --- |

    | `sn` | `description` |

    |   | `telephoneNumber` |

    | `cn` | `userPassword` |

    | `objectClass` | `seeAlso` |


    As in Java, an object class can extend other object classes. This inheritance
    will allow the child object class to inherit parent class attributes. For example,
    the person object class defines attributes such as common name and surname. The
    object class `inetOrgPerson` extends the person class and thus inherits all the
    person’s attributes.


    Additionally, `inetOrgPerson` defines attributes required for a person working
    in an organization, such as `departmentNumber` and `employeeNumber`. One special
    object class, namely, `top`, does not have any parents. All other object classes
    are decedents of `top` and inherit all the attributes declared in it. The `top`
    object class includes the mandatory `objectClass` attribute. Figure [1-2](#319409_2_En_1_Chapter.xhtml#Fig2)
    shows the object inheritance.


    ![](images/319409_2_En_1_Chapter/319409_2_En_1_Fig2_HTML.jpg)


    A triangular illustration of the LDAP object inheritance. The bottom to top layers
    are the internet organizational person, organizational person, person, and top.
    The growth represents the superclass.


    Figure 1-2


    LDAP object inheritance


    Most LDAP implementations come with standard object classes that can be used out
    of the box. Table [1-4](#319409_2_En_1_Chapter.xhtml#Tab4) lists some of these
    LDAP object classes and their commonly used attributes.


    Table 1-4


    Common LDAP Object Classes


    | Object Class | Attributes | Description |

    | --- | --- | --- |

    | `top` | `objectClass` | Defines the root object class. All other object classes
    must extend this class. |

    | `organization` | `o` | Represents a company or an organization. The `o` attribute
    typically holds the name of the organization. |

    | `organizationalUnit` | `ou` | Represents a department or similar entity inside
    an organization. |

    | `person` | `sn` `cn` `telephoneNumber` `userPassword` | Represents a person
    in the directory and requires the `sn` (surname) and `cn` (common name) attributes.
    |

    | `organizationalPerson` | `registeredAddress` `postalAddress` `postalCode` |
    Subclasses that represent a person in an organization. |

    | `inetOrgPerson` | `uid` `departmentNumber` `employeeNumber` `givenName` `manager`
    | It provides additional attributes and can be used to represent a person working
    in today’s Internet- and intranet-based organization. The `uid` attribute holds
    the person’s username or user id. |


    On Oracle’s official website,^([^(19)](#fn19)) you can find the list of LDAP object
    classes with information about the Request for Comments (RFC), which added each
    object class.


    Note


    In this book, you will see many references to RFCs. Request for Comments (RFC)
    is a series of technical documents produced by the Internet Engineering Task Force
    (IETF)^([^(20)](#fn20)) that specify certain standards.


    Each RFC has a number as part of the name and a series of sections with the specification.
    An RFC could become obsolete to many other RFCs because a new specification about
    certain technology appears, for example, a new version of LDAP.


    On the RFC Editor web page,^([^(21)](#fn21)) you can find information about RFCs
    and the publication process of the new one.

    '
