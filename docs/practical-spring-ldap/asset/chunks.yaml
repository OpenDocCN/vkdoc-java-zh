    ## 信息模型


    LDAP 中存储的基本单位是条目（entry）。条目保存有关现实世界对象的信息，例如员工、服务器、打印机和组织。LDAP 目录中的每个条目包含零个或多个属性（attributes）。属性是键值对，用于保存条目所代表对象的信息。属性的键部分也称为属性类型（attribute
    type），描述了可以存储在该属性中的信息类型。属性的值部分包含实际信息。表 1-1 展示了一个代表员工的条目部分。条目左侧列包含属性类型，右侧列保存属性值。


    表 1-1


    员工 LDAP 条目


    | 员工条目 |

    | --- |

    | `objectClass` | inetOrgPerson |

    | `givenName` | John |

    | `surname` | Smith |

    | `mail` | `john@inflix.com``jsmith@inflix.com` |

    | `mobile` | +1 801 100 1000 |


    注意


    属性名称默认是大小写不敏感的。然而，在 LDAP 操作中建议使用驼峰命名格式。


    您会注意到 mail 属性包含两个值。允许存储多个值的属性称为多值属性（multivalued attributes）。另一方面，单值属性（single-valued
    attributes）只能保存一个值。LDAP 规范不保证多值属性中值的顺序。


    每个属性类型都与一种语法（syntax）相关联，该语法决定了作为属性值存储的数据格式。例如，mobile 属性类型具有`telephoneNumber`语法。这会强制属性值必须为长度在
    1 到 32 之间的字符串。


    此外，语法还定义了属性值在搜索操作中的行为。例如，`givenName`属性具有`DirectoryString`语法。该语法规定只能使用字母数字字符作为值。表
    1-2 列出了一些常见属性及其关联的语法描述。


    表 1-2


    常见条目属性


    | 属性类型 | 语法 | 描述 |

    | --- | --- | --- |

    | `commonName` | DirectoryString | 存储人员的通用名称。 |

    | `company` | DirectoryString | 存储公司的名称。 |

    | `employeeNumber` | DirectoryString | 存储人员在组织中的员工编号。 |

    | `givenName` | DirectoryString | 存储用户的首名。 |

    | `jpegPhoto` | Binary | 存储人员的一个或多个图像。 |

    | `mail` | IA5 String | 存储人员的 SMTP 邮件地址。 |

    | `mobile` | TelephoneNumber | 存储人员的手机号码。 |

    | `postalAddress` | Postal Address | 存储用户的邮政编码或 ZIP 码。 |

    | `postalCode` | DirectoryString | 存储用户的邮政编码或 ZIP 码。 |

    | `st` | DirectoryString | 存储州或省的名称。 |

    | `street` | DirectoryString | 存储街道地址。 |

    | `surname` | DirectoryString | 存储人员的姓氏。 |

    | `telephoneNumber` | TelephoneNumber | 存储人员的主要电话号码。 |

    | `uid` | DirectoryString | 存储用户 ID。 |

    | `title` | DirectoryString | 存储职位名称或公司的职能名称。 |

    | `wwwhomepage` | DirectoryString | 存储公司的官方网页。


    表 1-2 中的属性是开发人员和工具最常使用的属性。然而，根据您的供应商或工具是否支持，还有大量其他属性可供使用；例如，在微软官方网页^(¹⁸)上，所有属性均支持
    Active Directory。


    ## 对象类


    在面向对象语言（如 Java）中，我们创建一个类并将其用作创建对象的蓝图。该类定义了这些实例可以拥有的属性（数据）和行为（方法）。类似地，LDAP 中的对象类决定了
    LDAP 条目可以拥有的属性。这些对象类还定义了哪些属性是必需的，哪些是可选的。每个 LDAP 条目都有一个特殊属性，恰当地命名为`objectClass`，用于保存其所属的对象类。查看表
    1-1 中员工条目的 objectClass 值，我们可以得出结论：该条目属于`inetOrgPerson`类。表 1-3 展示了标准 LDAP 人员对象类的必需属性和可选属性。`cn`属性保存人员的通用名称，而`sn`属性保存人员的姓氏或家族名称。


    表 1-3


    人员对象类


    | 必需属性 | 可选属性 |

    | --- | --- |

    | `sn` | `description` |

    |   | `telephoneNumber` |

    | `cn` | `userPassword` |

    | `objectClass` | `seeAlso` |


    如同 Java，对象类可以继承其他对象类。这种继承关系将允许子类对象类继承父类的属性。例如，人员对象类定义了通用名称和姓氏等属性。`inetOrgPerson`对象类继承了人员类，因此继承了所有人员类的属性。


    此外，`inetOrgPerson`定义了人员在组织中工作所需的属性，例如`departmentNumber`和`employeeNumber`。一个特殊的对象类`top`没有父类。所有其他对象类都是`top`的子类，并继承其声明的所有属性。`top`对象类包含必需的`objectClass`属性。图
    1-2 展示了对象继承关系。


    ![](img/319409_2_En_1_Fig2_HTML.jpg)


    LDAP 对象继承关系的三角示意图。从下到上的层级是互联网组织人员、组织人员、人员和 top。箭头方向表示超类。


    图 1-2


    LDAP 对象继承


    大多数 LDAP 实现都包含标准对象类，可以直接使用。表 1-4 列出了一些常见的 LDAP 对象类及其常用的属性。


    表 1-4


    常见 LDAP 对象类


    | 对象类 | 属性 | 描述 |

    | --- | --- | --- |

    | `top` | `objectClass` | 定义根对象类。所有其他对象类必须继承此类。 |

    | `organization` | `o` | 表示公司或组织。o 属性通常保存组织名称。 |

    | `organizationalUnit` | `ou` | 表示组织内部的部门或类似实体。 |

    | `person` | `sn``cn``telephoneNumber userPassword` | 表示目录中的人员，要求包含`sn`（姓氏）和`cn`（通用名称）属性。
    |

    | `organizationalPerson` | `registeredAddress postalAddress postalCode` | 表示组织中的人员的子类。
    |

    | `inetOrgPerson` | `uid departmentNumber employeeNumber givenName manager` |
    提供额外属性，可用于表示在当今基于互联网和内联网组织中工作的人员。uid 属性保存人员的用户名或用户 ID。 |


    在 Oracle 的官方网站上，^(¹⁹)您可以找到 LDAP 对象类列表，并了解每个对象类对应的请求评论（RFC）信息。


    注意


    在本书中，您将看到许多关于 RFC 的引用。请求评论（RFC）是由互联网工程任务组（IETF）^(²⁰)发布的一系列技术文档，用于定义某些标准。


    每个 RFC 名称中包含一个数字，并包含一系列关于规范的章节。RFC 可能会因新技术的出现而被许多其他 RFC 取代，例如 LDAP 的新版本。


    在 RFC 编辑器网站上，^(²¹)您可以找到关于 RFC 的信息以及新 RFC 的发布流程。

    '
