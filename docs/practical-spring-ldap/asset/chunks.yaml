- fmt: '# LDAP Connection Pooling


    LDAP connection pooling is a technique where connections to the LDAP directory
    are reused rather than being created each time a connection is requested. Without
    connection pooling, each request to the LDAP directory causes a new connection
    to be created and then released when the connection is no longer required. Creating
    a new connection is resource-intensive, and this overhead can adversely affect
    performance. With connection pooling, connections are stored in the pool after
    they are created and are recycled for subsequent client requests.


    Connections in a pool at any point can be in one of these three states:


    - *In use*: The connection is open and currently in use.

    - *Idle*: The connection is open and available for reuse.

    - *Closed*: The connection is no longer available for use.


    Figure [10-1](#319409_2_En_10_Chapter.xhtml#Fig1) illustrates the possible actions
    on a connection at any given time.


    ![](images/319409_2_En_10_Chapter/319409_2_En_10_Fig1_HTML.jpg)


    A block flow diagram of the connection pool states. The in-use block is interconnected
    with the block idle by releasing and getting assigned to the request. The idle
    block is mapped to the block closed.


    **Figure 10-1** Connection pool states


    ## Built-In Connection Pooling


    JNDI provides basic support for connection pooling via the `"com.sun.jndi.ldap.connect.pool"`
    environment property. Applications creating a directory context can set this property
    to `true` and indicate that connection pooling needs to be turned on. Listing
    [10-13](#319409_2_En_10_Chapter.xhtml#PC19) shows the plain JNDI code that utilizes
    pooling support.


    ```

    // Set up environment for creating initial context

    Hashtable env = new Hashtable();

    env.put(Context.INITIAL_CONTEXT_FACTORY, "com.sun.jndi.ldap.LdapCtxFactory");

    env.put(Context.PROVIDER_URL, "ldap://localhost:11389");

    // Enable connection pooling

    env.put("com.sun.jndi.ldap.connect.pool", "true");

    // Create one initial context

    (Get connection from pool) DirContext ctx = new InitialDirContext(env);

    // do something useful with ctx

    // Close the context when we''re done

    ctx.close(); // Return connection to pool

    ```


    **Listing 10-13** JNDI plain code with pooling


    By default, the Spring LDAP contexts have the `"com.sun.jndi.ldap.connect.pool"`
    property set to `false`. The native connection pooling can be turned on by setting
    the `pooled` property of the `LdapContextSource` to `true` in the configuration
    file. The following code shows the configuration change:


    Though the native LDAP connection pooling is simple, it does suffer from certain
    drawbacks. The pool of connections is maintained per the Java Runtime Environment.
    It is not possible to maintain multiple connection pools per JVM. Also, there
    is no control over the properties of the connection pool, such as the number of
    connections to be maintained at any time or idle connection time. Providing any
    custom connection validation to ensure that pooled connections are still valid
    is also impossible.


    ## Spring LDAP Connection Pooling


    To address shortcomings with native JNDI pooling, Spring LDAP provides a custom
    pooling library for LDAP connections. The Spring LDAP pooling library maintains
    its own set of LDAP connections specific to each application.


    **Note:** Spring LDAP utilizes the Jakarta Commons Pool^([^(93)](#fn93)) library
    for its underlying pooling implementation.


    To start, you need to add the dependency on the `pom.xml` file related with the
    pool which is not included by default on Spring LDAP:


    ```

    commons-pool

    commons-pool

    1.6

    ```


    Central to Spring LDAP pooling is the `org.springframework.ldap.pool.factory.PoolingContextSource`,
    which is a specialized `ContextSource` implementation and is responsible for pooling
    `DirContext` instances. To utilize connection pooling, you start by configuring
    a Spring LDAP context source:


    Note that you have the `pooled` property of the context source set to `false`.
    This will allow the `LdapContextSource` to create brand-new connections when the
    need arises. Also, the `id` of the `ContextSource` is now set to `contextSourceTarget`
    instead of `contextSource`, which is what you usually use. The next step is to
    create a `PoolingContextSource`, as shown:


    The `PoolingContextSource` wraps the `contextSourceTarget` you configured earlier.
    This is required since the `PoolingContextSource` delegates the creation of `DirContext`s
    to the `contextSourceTarget`. Also, note that you have used the id `contextSource`
    for this bean instance. This allows you to keep the configuration changes to a
    minimum while using a `PoolingContextSource` instance in an `LdapTemplate`, as
    shown:


    The `PoolingContextSource` provides a variety of options that can be used to fine-tune
    connection pooling. Table [10-1](#319409_2_En_10_Chapter.xhtml#Tab1) lists some
    of the important configuration properties.


    **Table 10-1** `PoolingContextSource` Configuration Properties


    | Property | Description | Default |

    | --- | --- | --- |

    | `testOnBorrow` | When set to `true`, the `DirContext` is validated before it
    is borrowed from the pool. If the `DirContext` fails validation, it is removed
    from the pool and a new attempt is made to borrow another `DirContext`. This testing
    might add a small delay in serving the borrow request. | `False` |

    | `testOnReturn` | When set to `true`, this property indicates that `DirContext`
    will be validated before returning to the pool. | `False` |

    | `testWhileIdle` | When set to `true`, this property indicates that idle `DirContext`
    instances in the pool should be validated at a specified frequency. Objects failing
    the validation will be dropped from the pool. | `False` |

    | `timeBetweenEvictionRunsMillis` | This property indicates the time in milliseconds
    to sleep between running idle context tests. A negative number indicates that
    idle test will never be run. | `-1` |

    | `whenExhaustedAction` | Specifies the action to be taken when the pool is exhausted.
    The possible options are `WHEN_EXHAUSTED_FAIL (0)`, `WHEN_EXHAUSTED_BLOCK (1)`,
    and `WHEN_EXHAUSTED_GROW (2)`. | `1` |

    | `maxTotal` | The maximum number of active connections that this pool can contain.
    A nonpositive integer indicates no limit. | `-1` |

    | `maxIdle` | The maximum number of idle connections of each type (read, read-write)
    that can be idle in the pool. | `8` |

    | `maxWait` | The maximum number of milliseconds that a pool will wait for a connection
    to be returned to the pool before throwing an exception. A negative number indicates
    an indefinite wait. | `-1` |


    After all the basic configurations, let''s create another file called `repositoryContext-test-1.xml`
    in the folder `src/test/resources` with the content of Listing [10-14](#319409_2_En_10_Chapter.xhtml#PC25).


    ```

    Listing 10-14

    The declaration of pool

    ```


    Check in Listing [10-14](#319409_2_En_10_Chapter.xhtml#PC25) that the configuration
    of the pool is a little different from the previous listings because you can do
    it using different ways, but the result is the same.


    Consider the file could not be used for authentication purposes because the user
    on the `ContextSource` performs a bind, which is accomplished by creating a new
    connection with the specified distinguished name and password.'
