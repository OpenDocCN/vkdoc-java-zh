    ## Spring LDAP 入门示例


    掌握了这些信息后，让我们进入 Spring LDAP 的世界。您将从编写一个简单的搜索客户端开始，该客户端会读取 ou=patrons LDAP 分支中的所有借阅者姓名。这与您在第
    2 章看到的示例类似。清单 3-3 展示了搜索客户端代码。


    ```

    public class SearchClient {

    private static final Logger logger = LoggerFactory.getLogger(SearchClient.class);

    @SuppressWarnings("unchecked")

    public List search() {

    LdapTemplate ldapTemplate = getLdapTemplate();

    return ldapTemplate.search("dc=inflinx,dc=com", " (objectclass=person)", (AttributesMapper)
    attributes -> (String)attributes.get("cn").get());

    }

    // 仅用于验证功能，但应将上下文源的创建委托给 Spring

    private LdapTemplate getLdapTemplate() {

    // 上下文设置 - 将在后面实现

    }

    }

    清单 3-3

    手动连接到 LDAP

    ```


    Spring LDAP 框架的核心是`org.springframework.ldap.core.LdapTemplate`类。基于模板方法设计模式，^(⁴⁴)
    `LdapTemplate`类处理 LDAP 编程中不必要的底层实现。它提供了多个重载的搜索、查找、绑定、认证和解除绑定方法，使 LDAP 开发变得轻松。`LdapTemplate`是线程安全的，可以被并发线程共享使用。


    注意


    Spring LDAP 1.3 版本引入了一个名为`SimpleLdapTemplate`的`LdapTemplate`变体。这是基于 Java 5 的经典`LdapTemplate`的便捷包装器。`SimpleLdapTemplate`为查找和搜索方法添加了
    Java 5 泛型支持。这些方法现在接受`ParameterizedContextMapper<T>`的实现作为参数，使搜索和查找方法能够返回类型化的对象。


    `SimpleLdapTemplate`仅暴露`LdapTemplate`中可用操作的一个子集。然而，这些操作是最常用的操作，因此在许多情况下使用`SpringLdapTemplate`就足够了。`SimpleLdapTemplate`还提供了`getLdapOperations()`方法，该方法暴露了封装的`LdapOperations`实例，并可以调用较少使用的模板方法。


    随着 Spring LDAP 3.0.0 版本的发布，`SpringLdapTemplate`类被移除以简化代码，因此如果发现应用程序中存在使用旧版 Spring
    LDAP 的代码块，只能使用`LdapTemplate`。


    您通过获取`LdapTemplate`类的实例来开始搜索方法的实现。然后调用`LdapTemplate`的搜索方法变体。搜索方法的第一个参数是 LDAP 基础，第二个参数是搜索过滤器。搜索方法使用基础和过滤器执行搜索，并将每个`javax.naming.directory.SearchResult`结果传递给作为第三个参数提供的`org.springframework.ldap.core.AttributesMapper`实现。在清单
    3-3 中，`AttributesMapper`实现通过创建一个匿名类来实现，该类读取每个`SearchResult`条目并返回条目的通用名称。


    在清单 3-3 中，`getLdapTemplate`方法是空的。现在让我们看看如何实现这个方法。为了使`LdapTemplate`能够正确执行搜索，它需要在
    LDAP 服务器上有一个初始上下文。Spring LDAP 提供了`org.springframework.ldap.core.ContextSource`接口抽象及其实现`org.springframework.ldap.core.support.LdapContextSource`用于配置和创建上下文实例。清单
    3-4 展示了`getLdapTemplate`方法的完整实现。


    ```

    private LdapTemplate getLdapTemplate() {

    LdapContextSource contextSource = new LdapContextSource();

    contextSource.setUrl("ldap://localhost:11389");

    contextSource.setUserDn("cn=Directory Manager");

    contextSource.setPassword("secret");

    try {

    contextSource.afterPropertiesSet();

    } catch(Exception e) {

    logger.error(e.getClass() + ": " + e.getMessage());

    }

    LdapTemplate ldapTemplate = new LdapTemplate();

    ldapTemplate.setContextSource(contextSource);

    return ldapTemplate;

    }

    清单 3-4

    LDAPTemplate 的配置

    ```


    您通过创建一个新的`LdapContextSource`并用 LDAP 服务器的信息（如服务器 URL 和绑定凭证）填充它来开始方法实现。然后调用上下文源上的`afterPropertiesSet`方法，允许
    Spring LDAP 执行初始化操作。最后，创建一个新的`LdapTemplate`实例并传入新创建的上下文源。


    这完成了您的搜索客户端示例。清单 3-5 展示了调用搜索操作并打印姓名到控制台的 main 方法。


    ```

    public static void main(String[] args) {

    SearchClient client = new SearchClient();

    List names = client.search();

    for(String name: names) {

    System.out.println(name);

    }

    }

    清单 3-5

    运行应用程序并执行搜索操作的 main 方法

    ```


    这个搜索客户端实现使用了 Spring LDAP API，而没有涉及任何 Spring 框架特定的范式。在接下来的章节中，您将学习如何将此应用程序 Spring
    化。但在那之前，让我们快速了解一下 Spring ApplicationContext。


    ## Spring ApplicationContext


    每个 Spring 框架应用程序的核心概念是 ApplicationContext。该接口的实现负责创建和配置 Spring bean。应用程序上下文还充当
    IoC 容器，并负责执行依赖注入。Spring bean 本质上是一个标准的 POJO，带有在 Spring 容器中运行所需的元数据。


    在标准的 Spring 应用程序中，ApplicationContext 通过 XML 文件、Java 注解和 JavaConfig 进行配置。清单 3-6
    展示了一个包含单个 bean 声明的简单应用程序上下文文件。bean `myBean`的类型是`com.apress.book.ldap.SimplePojo`。当应用程序加载上下文时，Spring
    会创建`SimplePojo`的实例并对其进行管理。


    ```


    清单 3-6

    简单 POJO 的配置

    ```

