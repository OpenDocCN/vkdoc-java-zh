    Source code of an example to insert a row

    ```


    Listing [9-3](#319409_2_En_9_Chapter.xhtml#PC5) shows the `PersonRepository` interface
    that the preceding class implements.


    ```

    public interface PersonRepository {

    void create(String firstName, String lastName);

    }

    Listing 9-3

    Example of a repository

    ```


    The next step is to make the `create` method transactional. This is done by annotating
    the method with `@Transactional`, as shown in Listing [9-4](#319409_2_En_9_Chapter.xhtml#PC6).
    (Note that I annotated the method in the implementation, not the interface method.)


    ```

    import org.springframework.transaction.annotation.Transactional;

    import org.springframework.stereotype.Repository;

    @Repository

    public class PersonRepositoryImpl implements PersonRepository {

    ...........

    @Transactional

    public void create(String firstName, String lastName) {

    ...........

    }

    }

    Listing 9-4

    Example of a transaction

    ```


    The `@Transactional` annotation has several properties that can be used to specify
    additional information, such as propagation and isolation. Listing [9-5](#319409_2_En_9_Chapter.xhtml#PC7)
    shows the method with default isolation and `REQUIRES_NEW` propagation.


    ```

    @Transactional(propagation=Propagation.REQUIRES_NEW, isolation=Isolation.DEFAULT)

    public void create(String firstName, String lastName) {

    //Logic of the method

    }

    Listing 9-5

    Example of a method with the default propagation

    ```


    The next step is to specify a transaction manager for Spring to use. Since you
    are going after a single database, the `org.springframework.jdbc.datasource.DataSourceTransactionManager`
    shown in Listing [9-6](#319409_2_En_9_Chapter.xhtml#PC8) is ideal for your case.
    From Listing [9-6](#319409_2_En_9_Chapter.xhtml#PC8), you can see that the `DataSourceTransactionManager`
    needs a data source to obtain and manage connections to the database.


    ```

    Listing 9-6

    Example configuration of the transaction data source

    ```


    The complete application context configuration file for declarative transaction
    management is given in Listing [9-7](#319409_2_En_9_Chapter.xhtml#PC9).


    ```

    Listing 9-7

    Example of all the configuration

    ```


    The `<tx:annotation-driven/>` tag indicates that you are using annotation-based
    transaction management. This tag, along with `<aop:aspectj-autoproxy />`, instructs
    Spring to use Aspect-Oriented Programming (AOP) and create proxies that manage
    transactions on behalf of the annotated class. So, when a call is made to a transactional
    method, the proxy intercepts the call and uses the transaction manager to obtain
    a transaction (new or existing). The called method is then invoked, and if the
    method completes successfully, the proxy using the transaction manager will commit
    the transaction. If the method fails, throwing an exception, the transaction will
    be rolled back. This AOP-based transaction processing is shown in Figure [9-2](#319409_2_En_9_Chapter.xhtml#Fig2).


    ![](images/319409_2_En_9_Chapter/319409_2_En_9_Fig2_HTML.jpg)


    A request-response diagram. The client sends a method to AOP proxy. The AOP proxy
    sends a begin transaction to the transaction manager followed by the method to
    the transactional class, and a commit transaction to the transaction manager.


    Figure 9-2


    AOP-based Spring transaction


