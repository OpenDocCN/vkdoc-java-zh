    # 6. Searching LDAP


    Searching for information is the most common operation against LDAP. A client
    application initiates an LDAP search by passing in search criteria, the information
    that determines where to search and what to search for. Upon receiving the request,
    the LDAP server executes the search and returns all the entries that match the
    criteria.


    ## LDAP Search Criteria


    The LDAP search criteria comprise three mandatory parameters – `base`, `scope`,
    and `filter` – and several optional parameters. Let’s look at each of these parameters
    in detail.

