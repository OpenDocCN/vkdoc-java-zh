    `LdifParser` 的解析实现依赖于三个支持性策略定义：分隔符策略、属性验证策略和记录规范策略。


    *   分隔符策略提供了文件中 LDIF 记录的分隔规则，并在 RFC 2849^(⁹²) 中定义。它通过 `org.springframework.ldap.ldif.support.SeparatorPolicy`
    类实现。


    *   属性验证策略，顾名思义，确保在解析之前 LDIF 文件中的所有属性都结构正确。它通过 `AttributeValidationPolicy` 接口和
    `DefaultAttributeValidationPolicy` 类实现。这两个位于 `org.springframework.ldap.ldif.support`
    包中。`DefaultAttributeValidationPolicy` 使用正则表达式根据 RFC 2849 验证属性格式。


    *   记录规范策略验证每条 LDIF 记录必须遵守的规则。Spring LDAP 为此策略提供了 `Specification` 接口和两个实现：`org.springframework.ldap.schema.DefaultSchemaSpecification`
