    \n在本章中，您将学习\n\n*   事务的基础知识\n\n*   Spring 事务抽象\n\n*   Spring LDAP 对事务的支持\n\n##\
    \ 事务基础\n\n事务是企业应用程序的重要组成部分。简而言之，事务是一系列协同执行的操作。要完成或提交事务，必须确保其所有操作都成功。如果由于任何原因某个操作失败，整个事务将失败并回滚。在这种情况下，所有之前成功执行的操作都必须被撤销。这确保了事务结束后的状态与事务开始前的状态一致。\n\
    \n在您的日常生活中，您经常会遇到事务。考虑一个在线银行场景，您希望从储蓄账户向支票账户转账 300 美元。此操作涉及从储蓄账户扣除 300 美元，并向支票账户增加\
    \ 300 美元。如果操作中的扣除部分成功而增加部分失败，您最终的账户总额将减少 300 美元。（理想情况下，我们都希望扣除操作失败而增加操作成功，但银行可能第二天会来敲您的门。）银行通过使用事务确保账户永远不会处于这种不一致的状态。\n\
    \n事务通常与以下四个众所周知的特性相关联，这些特性也被称为 ACID 属性：\n\n表 9-1\n\n隔离级别\n\n| 隔离级别 | 描述 |\n| ---\
    \ | --- |\n| `Read Uncommitted` | 此隔离级别允许正在运行的事务中的查询看到其他未提交事务所做的更改。即使该事务尚未完成，其更改也会对其他事务可见。这是最低级别的隔离，可以更恰当地视为缺乏隔离。由于它违反了\
    \ ACID 属性之一，大多数数据库供应商不支持它。 |\n| `Read Committed` | 此隔离级别允许正在运行的事务中的查询仅看到查询开始前已提交的数据。然而，在查询执行期间，所有未提交的更改或并发事务提交的更改都不会被看到。这是大多数数据库（包括\
    \ Oracle、MySQL 和 PostgreSQL）的默认隔离级别。 |\n| `Repeatable Read` | 此隔离级别允许正在运行的事务中的查询每次执行时都读取相同的数据。为实现这一点，事务会在检查所有行（不仅仅是获取的行）时获取锁，直到事务完成。\
    \ |\n| `Serializable` | 这是所有隔离级别中最严格且成本最高的。交错事务会被排队，以便按顺序执行而不是并发执行。在该隔离级别下，查询只会看到事务开始前已提交的数据，绝不会看到其他事务的未提交更改或提交操作。\
    \ |\n\n*   *原子性*：此属性确保事务要么完全执行，要么完全不执行。因此，在我们之前的示例中，我们要么成功转账，要么转账失败。这种全有或全无的特性也被称为单个或逻辑工作单元。\n\
    \n*   *一致性*：此属性确保事务完成后系统处于一致状态。例如，数据库系统会满足所有完整性约束，如主键或参照完整性。\n"
