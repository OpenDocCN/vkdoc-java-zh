    ### JUnit


    It has become the de facto standard for unit testing Java applications. The introduction
    of annotations in JUnit 4.x made it even easier to create tests and assert test
    results for expected values. With the release of JUnit 5.x, new features appear
    to simplify the day-to-day job of developers, like having in one sentence all
    the possible conditions to check so that in the case that one test fails, you
    can know all the conditions that fail. JUnit can easily be integrated with build
    tools like Gradle^([^(61)](#fn61)) and Maven.^([^(62)](#fn62)) It also has great
    tooling support available in all popular IDEs.


    The standard practice is writing a separate class with test methods. This class
    is often called a test case, and each test method is intended to test a single
    unit of work. It is also possible to organize test cases into groups called test
    suites.


    The best way to learn JUnit is to write a test method. Listing `4-1` shows a simple
    `StringUtils` class with an `isEmpty` method. The method takes a `String` as a
    parameter and returns true if it is either null or empty.


    ```

    public class StringUtils {

    public static boolean isEmpty(String text) {

    return text == null || "".equals(text);

    }

    }

    Listing 4-1

    A simple example of a method to check if a String is empty

    ```


    Let’s create a test for Listing `4-1` that checks different conditions; you can
    see that Listing `4-2` is the JUnit class with a method to test the code.


    ```

    import org.junit.jupiter.api.Test;

    import static org.junit.jupiter.api.Assertions.assertFalse;

    import static org.junit.jupiter.api.Assertions.assertTrue;

    @DisplayName("String Utils tests cases")

    class StringUtilsTest {

    @Test

    @DisplayName("String Utils should return true when the input is null")

    void should_return_true_with_null() {

    assertTrue(StringUtils.isEmpty(null));

    }

    @Test

    @DisplayName("String Utils should return true when the input is empty")

    void should_return_true_with_empty() {

    assertTrue(StringUtils.isEmpty(""));

    }

    @Test

    @DisplayName("String Utils should return false when the input have a value")

    void should_return_false_with_text() {

    assertFalse(StringUtils.isEmpty("Practical Spring Ldap"));

    }

    }

    Listing 4-2

    Different tests to check each possible scenario

    ```


    To use the different classes of JUnit, you need to include the dependency in Listing
    `4-3`. In the case of this chapter, you will use the different archetypes, which
    include some dependencies related to testing.


    ```

    org.junit.jupiter

    junit-jupiter-engine

    ${junit-jupiter-engine.version}

    test


    Listing 4-3

    JUnit dependency that you must include on the POM file

    ```


    Notice that I have followed the convention `<Class Under Test>Test` for naming
    the test class. Before JUnit 4.x, test methods needed to begin with the word "test".
    With 4.x, test methods must be marked with annotation `@Test`. Also, notice that
    all the tests have the annotation `@DisplayName` to provide more information about
    what the idea of the test is.


    There are two ways to run the tests:


    * Using the command line and Maven: You need to open a terminal or use the IDE
    and execute the command `mvn test`, which will give the following output:


    ![](images/319409_2_En_4_Chapter/319409_2_En_4_Fig1_HTML.jpg)


    A screenshot contains the output of the given program code.


    Figure 4-1


    Output of the execution of the tests


    Table `4-1` lists some important annotations available in JUnit 5.


    Table 4-1


    JUnit 5 Annotations


    | Annotation | Description |

    | --- | --- |

    | `@Test` | Annotates a method as a JUnit test method. The method should be of
    public scope and have a void return type. |

    | `@BeforeEach` | Marks a method to run before every test method. Useful for setting
    up test fixtures. The `@Before` method of a superclass is run before the current
    class. |

    | `@AfterEach` | Marks a method to be run after every test method. Useful for
    tearing down test fixtures. The `@After` method of a superclass is run after the
    current class. |

    | `@Disabled` | Marks a method to be ignored during test runs. This helps avoid
    the need for commenting on half-baked test methods. |

    | `@DisplayName` | This annotation gives a specific name to a class or method.
    On this annotation, you can use special characters, numbers, spaces, or emojis.
    |

    | `@BeforeAll` | Annotates a method to run before any test method is run. For
    a test case, the method is run only once and can be used to provide class-level
    setup work. |

    | `@AfterAll` | Annotates a method to run after all the test methods are run.
    This can be useful for performing any cleanups at a class level. |

    | `@ExtendWith` | Specifies the class extends the test methods for another one.
    |


    Consider that the table only shows the most relevant annotations you need to use
    on the test; there are many other annotations on the JUnit official website.^([^(63)](#fn63))

