    ## Handling Special Characters


    There will be times when you need to construct search filters with characters
    such as ( or * that have special meanings in LDAP. To execute these filters successfully,
    it is important to escape the special characters properly. Escaping is done using
    the format \xx, where xx denotes the hexadecimal representation of the character.
    Table [6-3](#319409_2_En_6_Chapter.xhtml#Tab3) lists the special characters and
    their escape values.


    Table 6-3


    Special Characters and Escape Values


    | Special Character | Escape Value |

    | --- | --- |

    | ( | \28 |

    | ) | \29 |

    | * | \2a |

    | \ | \5c |

    | / | \2f |


    In addition to the characters in Table [6-3](#319409_2_En_6_Chapter.xhtml#Tab3),
    if any of the following characters are used in a DN, they also need to be properly
    escaped: comma (,), equals sign (=), plus sign (+), less than (<), greater than
    (>), pound sign (#), and semicolon (;).


    ## LDAP Query Builder Parameters


    There is an alternative way to use the filters to execute queries to find information
    on LDAP; Spring LDAP offers a `QueryBuilder`, which more or less follows the structure
    of a SQL sentence which reduces the complexity of understanding what the query
    does. Also, it is simple to combine a lot of conditions in one sentence.


    The following parameters are supported using the `QueryBuilder`:


    * `base`: Defines the starting point in the LDAP tree from which the search initiates.

    * `searchScope`: Determines the extent to which the LDAP tree is explored during
    the search.

    * `attributes`: Dictates the desired attributes to retrieve from the search. The
    default setting retrieves all attributes.

    * `countLimit`: Sets the upper limit on the number of entries retrieved from the
    search.

    * `timeLimit`: Establishes the maximum allowable duration for the search operation.

    * `search filter`: Specifies the criteria entries must meet for consideration
    in the search results.


    Let’s create a simple example that combines some conditions to find all the patrons
    by last name, postal code, and with a `uid` present. Listing [6-15](#319409_2_En_6_Chapter.xhtml#PC35)
    shows a `SearchBuilder` class that has a method with filters.


    ```

    package com.apress.book.ldap.builder;

    import com.apress.book.ldap.domain.Patron;

    import com.apress.book.ldap.mapper.PatronContextMapper;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.beans.factory.annotation.Qualifier;

    import org.springframework.ldap.core.LdapTemplate;

    import org.springframework.ldap.query.LdapQuery;

    import org.springframework.ldap.support.LdapUtils;

    import org.springframework.stereotype.Component;

    import java.util.List;

    import static org.springframework.ldap.query.LdapQueryBuilder.query;

    @Component("searchFilter")

    public class SearchBuilder {

    private static final Logger logger = LoggerFactory.getLogger(com.apress.book.ldap.filter.SearchFilter.class);

    private `LdapTemplate` ldapTemplate;

    public SearchBuilder(@Autowired @Qualifier("ldapTemplate") `LdapTemplate` ldapTemplate)
    {

    this.ldapTemplate = ldapTemplate;

    }

    public List getPatronByLastNameAndPostalCode(String lastName, String postalCode)
    {

    logger.info("finding patrons with lastname {} and postalcode {}", lastName, postalCode);

    `LdapQuery` query = `query`()

    .countLimit(10)

    .base(`LdapUtils`.empty`LdapName`())

    .where("objectclass").is("person")

    .and("sn").is(lastName)

    .and("postalCode").is(postalCode)

    .and("uid").isPresent();

    return ldapTemplate.search(query, new PatronContextMapper());

    }

    }

    Listing 6-15

    Example of `QueryBuilder`

    ```


    As you can see, the query is a combination of most of the previous filters you
    read in the previous sections but uses the `countLimit` to restrict the number
    of patrons that the methods could return. Listing [6-16](#319409_2_En_6_Chapter.xhtml#PC36)
    shows a test case that checks whether the method works fine.


    ```

    package com.apress.book.ldap.builder;

    import com.apress.book.ldap.domain.Patron;

    import org.junit.jupiter.api.Test;

    import org.junit.jupiter.api.extension.ExtendWith;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.test.context.ContextConfiguration;

    import org.springframework.test.context.junit.jupiter.SpringExtension;

    import org.junit.jupiter.api.DisplayName;

    import java.util.List;

    import static org.junit.jupiter.api.Assertions.*;

    @ExtendWith(SpringExtension.class)

    @ContextConfiguration("classpath:repositoryContext-test.xml")

    @DisplayName("Search Builder test cases")

    public class SearchBuilderTest {

    @Autowired

    private SearchBuilder searchBuilder;

    @Test

    @DisplayName("Check that search operation using lastname and postal code works")

    public void should_works_builder() {

    List results = searchBuilder.getPatronByLastNameAndPostalCode("Abbott", "07007");

    assertAll(

    ()-> assertNotNull(results),

    ()-> assertEquals(1, results.size()),

    ()-> assertEquals("Abbi Abbott", results.get(0).getFullName())

    );

    }

    }

    Listing 6-16

    Tests to check how the `QueryBuilder` works

    ```


    Table [6-4](#319409_2_En_6_Chapter.xhtml#Tab4) shows you all the possible methods
    you can use on the `QueryBuilder` and the function of each.


    Table 6-4


    `QueryBuilder` Methods


    | Method | Description |

    | --- | --- |

    | `query()` | This method represents the init of the query you want to execute.
    |

    | `filter()` | Sets the filter criteria for the LDAP query. You can use methods
    like `and()`, `or()`, `not()`, and various comparison methods to build complex
    filters. |

    | `build()` | Constructs the final LDAP query based on the configured parameters.
    |

    | `base()` | Specifies the base `DN` (distinguished name) from which the LDAP
    query should start. |

    | `countLimit()` | Sets the maximum number of entries to be returned by the query.
    |

    | `timeLimit()` | Sets the maximum time (in milliseconds) that the LDAP query
    can execute. |

    | `attributes()` | Specifies the attributes to be retrieved in the query. You
    can pass attribute names as arguments. |

    | `and()` | The `and` method allows you to combine multiple filters using the
    "and" operator. |

    | `or()` | The `or` method allows you to combine multiple filters using the "or"
    operator. |

    | `not()` | You can negate a filter using the `not` method. |

    | `is()` | This method works as an equal filter that checks if the value of one
    attribute is equal to a certain value |

    | `isPresent()` | This method checks if a particular attribute exists. |

    | `gte()` | This method checks if the attribute is greater than a certain value.
    |

    | `lte()` | This method checks if the attribute is less than a certain value.
    |

    | `like()` | This method works in the same way as the `LikeFilter`. |


