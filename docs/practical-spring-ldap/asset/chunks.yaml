    ## Spring-Powered Search Client


    Our conversion of the search client implementation begins with the `applicationContext.xml`
    file, as shown in Listing [3-7](#319409_2_En_3_Chapter.xhtml#PC14).


    ```

    Listing 3-7

    Configuration of the application

    ```


    In the context file, you declare a `contextSource` bean to manage connections
    to the LDAP server. For `LdapContextSource` to properly create instances of `DirContext`,
    you need to provide it with information about the LDAP server. The `url` property
    takes the fully qualified URL (`ldap://server:port format`) to the LDAP server.
    The `base` property can be used to specify the root suffix for all LDAP operations.
    The `userDn` and `password` properties are used to provide authentication information.
    Next, you configure a new `LdapTemplate` bean and inject the `contextSource` bean.


    With all your dependencies declared in the context file, you can re-implement
    the search client, as shown in Listing [3-8](#319409_2_En_3_Chapter.xhtml#PC15).
    Consider that Listing [3-8](#319409_2_En_3_Chapter.xhtml#PC15) has some improvements
    compared with the examples that you see in Chapter [2](#319409_2_En_2_Chapter.xhtml)
    because this one uses directly the context of Spring.


    ```

    package com.apress.book.ldap;

    import java.util.List;

    import javax.naming.NamingException;

    import javax.naming.directory.Attributes;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.beans.factory.annotation.Qualifier;

    import org.springframework.context.ApplicationContext;

    import org.springframework.context.support.ClassPathXmlApplicationContext;

    import org.springframework.ldap.core.AttributesMapper;

    import org.springframework.ldap.core.LdapTemplate;

    import org.springframework.stereotype.Component;

    @Component

    public class SpringSearchClient {

    private LdapTemplate ldapTemplate;

    @Autowired

    public SpringSearchClient(@Qualifier("ldapTemplate") LdapTemplate ldapTemplate)
    {

    this.ldapTemplate = ldapTemplate;

    }

    @SuppressWarnings("unchecked")

    public List search() {

    return ldapTemplate.search("dc=inflinx,dc=com", "(objectclass=person)",

    new AttributesMapper() {

    @Override

    public Object mapFromAttributes(Attributes attributes) throws NamingException
    {

    return (String)attributes.get("cn").get();

    } });

    }

    }

    Listing 3-8

    Another way to obtain the information is without configuring the context.

    ```


    You will notice that this code is no different from the `SearchClient` code you
    saw in Listing [3-4](#319409_2_En_3_Chapter.xhtml#PC11). You just extracted the
    creation of `LdapTemplate` to an external configuration file. The `@Autowired`
    annotation instructs Spring to inject the `ldapTemplate` dependency. This simplifies
    the search client class and helps you focus on the search logic.


    The code to run the new search client is shown in Listing [3-9](#319409_2_En_3_Chapter.xhtml#PC16).
    You start by creating a new instance of `ClassPathXmlApplicationContext`. The
    `ClassPathXmlApplicationContext` takes the `applicationContext.xml` file as its
    parameter. Then you retrieve an instance of `SpringSearchClient` from the context
    and invoke the search method.


    ```

    public static void main(String[] args) {

    ApplicationContext context = new ClassPathXmlApplicationContext("classpath:applicationContext.xml");

    SpringSearchClient client = context.getBean(SpringSearchClient.class);

    List names = client.search();

    for(String name: names) {

    System.out.println(name);

    }

    }

    Listing 3-9

    The main of the application

    ```


    If you run the previous class, you will obtain the same results as the previous
    way to connect with LDAP and iterate the `objectClass` person.


    ```

    00:13:54.161 [main] DEBUG o.s.c.s.ClassPathXmlApplicationContext - Refreshing
