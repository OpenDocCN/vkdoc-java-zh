    ## Create Method


    `LdapTemplate` provides several `bind` methods for adding entries to LDAP. To
    create a new Employee, you will use the following `bind` method variation:


    ```

    public void bind(DirContextOperations ctx)

    ```


    This method takes a `DirContextOperations` instance as its parameter. The `bind`
    method invokes the `getDn` method on the passed-in `DirContextOperations` instance
    and retrieves the fully qualified DN of the entry. It then binds all the attributes
    to the DN and creates a new entry.


    The implementation of the `create` method in the Employee DAO is shown in Listing
    [5-12](#319409_2_En_5_Chapter.xhtml#PC15). As you can see, you start by creating
    a new instance of a `DirContextAdapter`. Then you populate the context’s attributes
    with employee information. The last line in the method does the actual binding.


    ```

    @Override

    public void create(Employee employee) {

