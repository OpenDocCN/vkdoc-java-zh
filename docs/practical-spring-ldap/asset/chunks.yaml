    在此配置中，您首先定义一个新的`LdapContextSource`并为其提供 LDAP 信息。到目前为止，您使用`contextSource`作为该 bean
    的 id，并将其注入到`LdapTemplate`中供使用。然而，在这个新配置中，您将其命名为`contextSourceTarget`。然后，您配置一个`TransactionAwareContextSourceProxy`实例，并将`contextSource`
    bean 注入其中。这个新配置的`TransactionAwareContextSourceProxy` bean 的 id 为`contextSource`，并被`LdapTemplate`使用。最后，您使用`ContextSourceTransactionManager`类配置事务管理器。如前所述，这种配置允许在单个事务中使用一个`DirContext`实例，从而实现事务提交/回滚。


