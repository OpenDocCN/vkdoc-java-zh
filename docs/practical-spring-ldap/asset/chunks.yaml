    ## Directory Schema


    The LDAP directory schema is a set of rules determining the type of information
    stored in a directory. Schemas can be considered packaging units and contain attribute
    type definitions and object class definitions. The schema rules are verified before
    an entry can be stored in LDAP. This schema checking ensures that the entry has
    all the required attributes and contains no attributes not part of the schema.
    Figure [1-3](#319409_2_En_1_Chapter.xhtml#Fig3) represents a generic LDAP schema.


    ![](images/319409_2_En_1_Chapter/319409_2_En_1_Chapter_Fig3_HTML.jpg)


    An illustration of the LDAP generic schema. A set of 2 object classes consists
    of 2 attribute types. The Object class 2 is mapped to the attribute of object
    class 1.


    Figure 1-3


    LDAP generic schema


    Like databases, directory schemas must be well designed to address issues like
    data redundancy. Before implementing your schema, it is worth looking at publicly
    available standard schemas. These standard schemas often contain all definitions
    to store the required data and, more importantly, ensure interoperability across
    other directories.


    ## Naming Model


    The LDAP Naming model defines how entries are organized in a directory. It also
    determines how a particular entry can be uniquely identified. The Naming model
    recommends that entries be stored logically in a hierarchical fashion. This entry
    tree is often called a directory information tree (DIT). Figure [1-4](#319409_2_En_1_Chapter.xhtml#Fig4)
    provides an example of a generic directory tree.


    ![](images/319409_2_En_1_Chapter/319409_2_En_1_Chapter_Fig4_HTML.jpg)


    An illustration of the generic directory information tree. Node E is followed
    by 2 nodes E. Each of the nodes is followed by branches of node E.


    Figure 1-4


    Generic DIT


    The tree’s root is usually referred to as the base or suffix of the directory.
    This entry represents the organization that owns the directory. The format of
    suffixes can vary from implementation to implementation, but generally, there
    are three recommended approaches, as listed in Figure [1-5](#319409_2_En_1_Chapter.xhtml#Fig5).


    ![](images/319409_2_En_1_Chapter/319409_2_En_1_Chapter_Fig5_HTML.jpg)


    A set of 3 flowcharts of directory suffix naming conventions. The approaches are
    `o=example.com`, `dc=example,dc=com`, and `o=organization name,c=country code`.
    Each approach has a set of classifications.


    Figure 1-5


    Directory suffix naming conventions


    Note


    `DC` stands for domain component.


    The first recommended technique is to use the organization’s domain name as the
    suffix. For example, if the organization’s domain name is `example.com`, the directory
    suffix will be `o=example.com`. The second technique also uses the domain name,
    but each name component is prepended with "dc=" and joined by commas. So the domain
    name `example.com` would result in a suffix `dc=example,dc=com`. This technique
    is proposed in RFC 2247^([^(22)](#fn22)) and is popular with Microsoft Active
    Directory. The third technique uses the X.500 model and creates a suffix in the
    format `o=organization name,c=country code`. In the United States, the suffix
    for the organization example would be `o=example,c=us`.


    The naming model also defines naming and uniquely identifying entries in a directory.
    Entries with a common immediate parent are uniquely identified via their relative
    distinguished name (RDN), also called distinguished name (DN). The RDN is computed
    using one or more attribute/value pairs of the entry. In its simplest case, RDN
    is usually of the form `attribute-name = attribute value`. Figure [1-6](#319409_2_En_1_Chapter.xhtml#Fig6)
    provides a simplified representation of an organization directory. Each person
    entry under `ou=employees` has a unique `uid`. So the RDN for the first person
    entry would be `uid=emp1`, where emp1 is the employee’s user id.


    ![](images/319409_2_En_1_Chapter/319409_2_En_1_Chapter_Fig6_HTML.jpg)


    A flowchart of an organization directory. `dc=example,dc=com` is classified into
    `ou=applicants,employees,consumers,groups`. `ou=employees` classified into 3 other
    attributes.


    Figure 1-6


    Example of an organization directory


    Note


    The distinguished name is not an actual attribute in the entry. It is a logical
    name associated with the entry.


    It is important to remember that RDN cannot be used to uniquely identify the entry
    in the entire tree. However, this can be easily done by combining the RDNs of
    all the entries in the path from the top of the tree to the entry. The result
    of this combination is referred to as distinguished name (DN). In Figure [1-6](#319409_2_En_1_Chapter.xhtml#Fig6),
    the DN for person 1 would be `uid=emp1,ou=employees,dc=example,dc=com`. Since
    the DN is made by combining RDNs, if an entry’s RDN changes, the DNs of that entry
    and all its child entries also change.


    There can be situations where a set of entries does not have a unique attribute.
    In those scenarios, one option is to combine multiple attributes to create uniqueness.
    For example, we can use the consumer’s common name and email address in the previous
    directory as an RDN. Multivalued RDNs are represented by separating each attribute
    pair with a `+`, like so:


    ```

    cn=Balaji Varanasi + mail=balaji@inflinx.com

    ```


    Some special characters on the RDN must be escaped to prevent different problems.
    The special characters are `+`, `=`, `<`, `>`, `;`, `,`, `\`, `#`, and `"`.


    There are different approaches to escape the characters, like adding the backslash
    (`\`) before the special character; this approach is the most commonly used. The
    other replaces the special characters with a backslash and hexadecimal digit,
    and the last one surrounds the attribute’s value with quotation marks (`"`).


    Note


    Multivalued RDNs are usually discouraged. Creating a unique sequence attribute
    is recommended in those scenarios to ensure uniqueness.


    ## Functional Model


    The LDAP Functional model describes the access and modification operations that
    can be performed on the directory using the LDAP protocol. These operations fall
    into three categories: query, update, and authentication.


    The query operations are used to search and retrieve information from a directory.
    So whenever some information needs to be read, a search query must be constructed
    and executed against LDAP. The search operation takes a starting point within
    DIT, the search depth, and the attributes an entry must have for a match. In Chapter
    [6](#319409_2_En_6_Chapter.xhtml), you’ll delve deep into searching and look at
    all the available options.


    The update operations add, modify, delete, and rename directory entries. As the
    name suggests, the add operation adds a new entry to the directory. This operation
    requires the DN of the entry to be created and a set of attributes that constitute
    the entry. The delete operation takes a fully qualified DN of the entry and deletes
    it from the directory. The LDAP protocol allows only the leaf entries to be deleted.
    The modify operation updates an existing entry. This operation takes the entry’s
    DN and a set of modifications, such as adding a new attribute, updating a new
    one, or removing an existing one. The rename operation can rename or move entries
    in a directory.


    The authentication operations are used for connecting and ending sessions between
    the client and the LDAP server. A bind operation initiates an LDAP session between
    the client and server. Typically, this would result in an anonymous session. The
    client can provide a DN and credentials to authenticate and create an authenticated
    session. On the other hand, the unbind operation can be used to terminate an existing
    session and disconnect from the server.


    LDAP V3 introduced a framework for extending existing operations and adding new
    ones without changing the protocol. You will take a look at these operations in
    Chapter [7](#319409_2_En_7_Chapter.xhtml).

    '
