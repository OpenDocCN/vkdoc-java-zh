    *   **隔离性**：这一特性确保事务独立于其他并行事务执行。未完成的事务的更改或副作用永远不会被其他事务看到。在资金转账场景中，其他账户所有者只能看到转账前或转账后的余额。只有当事务执行时间较长时，才会看到中间余额。许多数据库系统会放宽这一特性，提供多个隔离级别。表
    9-1 列出了主要的事务级别及其描述。随着隔离级别提高，事务并发性降低，事务一致性提高。


    *   **持久性**：这一特性确保已提交事务的结果不会因故障而丢失。以银行转账场景为例，当您收到转账成功的确认后，持久性特性确保该更改成为永久性的。


    ## 本地事务与全局事务


    事务通常根据参与的资源数量被分类为本地事务或全局事务。这些资源示例包括数据库系统或 JMS 队列。资源管理器（如 JDBC 驱动程序）通常用于管理资源。


    本地事务涉及单一资源。最常见的例子是与单一数据库关联的事务。这些事务通常通过用于访问资源的对象进行管理。在 JDBC 数据库事务中，使用`java.sql.Connection`接口的实现来访问数据库。这些实现还提供了`commit`和`rollback`方法用于管理事务。在
    JMS 队列的情况下，`javax.jms.Session`实例提供了控制事务的方法。


    全局事务则处理多个资源。例如，一个全局事务可以在同一事务中从 JMS 队列读取消息并写入数据库记录。


    全局事务使用外部的事务管理器进行管理。它负责与资源管理器通信，并对分布式事务做出最终的提交或回滚决策。在 Java/JEE 中，全局事务通过 Java 事务
    API（JTA）实现。JTA 为事务管理器和参与事务的组件提供了标准接口。


    事务管理器采用“两阶段提交”协议来协调全局事务。正如其名所示，两阶段提交协议包含两个阶段：


    *   **准备阶段**：在此阶段，所有参与的资源管理器会被询问是否准备好提交其工作。收到请求后，资源管理器尝试记录其状态。如果成功，资源管理器会返回肯定响应；如果无法提交，则返回否定响应并撤销本地更改。


    *   **提交阶段**：如果事务管理器收到所有肯定响应，它将提交事务并通知所有提交参与者。如果收到一个或多个否定响应，它将回滚整个事务并通知所有参与者。


    两阶段提交协议如图 9-1 所示。


    ![](img/319409_2_En_9_Fig1_HTML.jpg)


    2 个请求-响应图。准备阶段和提交阶段各包含一个事务管理器和 2 个资源管理器。事务管理器向每个资源管理器发送准备请求，资源管理器将准备响应返回给事务管理器。


    图 9-1


    两阶段提交协议


    ## 编程式与声明式事务


    在为应用程序添加事务功能时，开发者有两种选择。


    ## 编程式


    在此场景中，事务管理代码（用于启动、提交或回滚事务）包围业务代码。这可以提供极大的灵活性，但也可能使维护变得困难。以下代码示例展示了使用 JTA 和 EJB
    3.0 的编程式事务：


    ```

    @Stateless

    @TransactionManagement(TransactionManagementType.BEAN)

    public class OrderManager {

    @Resource

    private UserTransaction transaction;

    public void create(Order order) {

    try {

    transaction.begin();

    // 处理订单的业务逻辑

    verifyAddress(order);

    processOrder(order);

    sendConfirmation(order);

    transaction.commit();

    } catch(Exception ex) {

    transaction.rollback();

    }

    }

    }

    ```


    ## 声明式


    在此场景中，容器负责启动、提交或回滚事务。开发者通常通过注解或 XML 指定事务行为。此模型清晰地将事务管理代码与业务逻辑分离。以下代码示例展示了使用 JTA
    和 EJB 3.0 的声明式事务。当订单处理过程中发生异常时，会调用会话上下文的`setRollbackOnly`方法；这标记了事务必须回滚。


    ```

    @Stateless

    @TransactionManagement(TransactionManagementType.CONTAINER)

    public class OrderManager {

    @Resource

    private SessionContext context;

    @TransactionAttribute(TransactionAttributeType.REQUIRED)

    public void create(Order order) {

    try {

    // 处理订单的业务逻辑

    verifyAddress(order);

    processOrder(order);

    sendConfirmation(order);

    } catch(Exception ex) {

    context.setRollbackOnly();

    }

    }

    }

    ```

