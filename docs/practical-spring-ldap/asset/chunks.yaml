    ## Introduction


    `Practical Spring LDAP` provides complete coverage of `Spring LDAP`, a framework
    designed to take the pain out of LDAP programming. This book starts by explaining
    the fundamental concepts of LDAP and showing the reader how to set up the development
    environment. It then dives into `Spring LDAP`, analyzing the problems it is designed
    to solve. After that, the book focuses on the practical aspects of unit testing
    and integration testing with LDAP. An in-depth treatment of LDAP controls and
    `Spring LDAP` features, such as `Object-Directory Mapping` and `LDIF` (LDAP Data
    Interchange Format) parsing, follows this. Finally, it concludes with discussions
    on LDAP authentication and connection pooling.


    ## What the Book Covers


    ### Chapter 1


    *Chapter* [*1*](#319409_2_En_1_Chapter.xhtml) starts with an overview of directory
    servers. It then discusses the basics of LDAP and introduces the four LDAP information
    models. It finishes with an introduction to the `LDIF` format used for representing
    LDAP data.


    ### Chapter 2


    *Chapter* [*2*](#319409_2_En_2_Chapter.xhtml) focuses on the `JNDI` interface.
    In this chapter, you look at creating applications that interact with LDAP using
    plain `JNDI`.


    ### Chapter 3


    *Chapter* [*3*](#319409_2_En_3_Chapter.xhtml) explains `Spring LDAP` and why it
    is an important option in an enterprise developer’s repertoire. In this chapter,
    you set up the development environment to create `Spring LDAP` applications and
    other important tools, such as `Maven` and a test LDAP server. Finally, you implement
    a basic but complete `Spring LDAP` application using annotations.


    ### Chapter 4


    *Chapter* [*4*](#319409_2_En_4_Chapter.xhtml) covers the fundamentals of unit
    and integration testing. You then look at setting up an embedded LDAP server for
    unit testing your application code; alternatively, you will see how to use `Testcontainers`
    to run LDAP using a docker image. You also review available tools for generating
    test data. Finally, you use the `Mockito` library to mock test LDAP code.


    ### Chapter 5


    *Chapter* [*5*](#319409_2_En_5_Chapter.xhtml) introduces the basics of `JNDI`
    object factories and uses these factories for creating objects that are more meaningful
    to the application. You then examine a complete `DAO` layer implementation using
    `Spring LDAP` and object factories.


    ### Chapter 6


    *Chapter* [*6*](#319409_2_En_6_Chapter.xhtml) covers LDAP search. This chapter
    begins with the underlying ideas of LDAP search. I then introduce various `Spring
    LDAP` filters that make LDAP searching easier. Finally, you look at creating a
    custom search filter to address situations where the current set is insufficient.


    ### Chapter 7


    *Chapter* [*7*](#319409_2_En_7_Chapter.xhtml) provides an in-depth overview of
    LDAP controls that can be used for extending LDAP server functionality. Then it
    moves on to sorting and paging LDAP results using sort and page controls.


    ### Chapter 8


    *Chapter* [*8*](#319409_2_En_8_Chapter.xhtml) deals with `Object-Directory Mapping`
    (ODM), a feature in `Spring LDAP`. In this chapter, you look at bridging the gap
    between the domain model and the directory server. You then re-implement the `DAO`
    using ODM concepts.


    ### Chapter 9


    *Chapter* [*9*](#319409_2_En_9_Chapter.xhtml) introduces the important ideas of
    transactions and transactional integrity before analyzing the transaction abstractions
    provided by `Spring Framework`. Finally, it takes a look at `Spring LDAP`’s compensating
    transaction support.


    ### Chapter 10


    *Chapter* [*10*](#319409_2_En_10_Chapter.xhtml) starts with implementing authentication,
    the most common operation against LDAP. It then deals with parsing `LDIF` files
    using another feature introduced in `Spring LDAP`. I end the chapter by looking
    at the connection pooling support provided by `Spring LDAP`.


    ## Target Audience


    `Practical Spring LDAP` is intended for developers interested in building Java/JEE
    applications using LDAP. It also teaches techniques for creating unit/integration
    tests for LDAP applications. The book assumes basic familiarity with `Spring Framework`;
    prior exposure to LDAP is helpful but optional. Developers already familiar with
    `Spring LDAP` will find best practices and examples to help them get the most
    out of the framework.


    ## Prerequisites


    You should install `Java JDK`^([¹](#fn1)) 21 or higher on your machine, `Maven`^([²](#fn2))
    3.8.0 or higher, and some IDE. Some options for the IDE could be `Eclipse`^([³](#fn3)),
    `IntelliJ IDEA`^([⁴](#fn4)), `Visual Studio Code`^([⁵](#fn5)), and others, but
    you can choose which is the best for you.


    To reduce the complexity of installing all LDAP vendors on your machine, I recommend
    you install `Docker`^([⁶](#fn6)) and use it to run each LDAP. The use and installation
    of `Docker` are outside the scope of this book, but there are some tutorials^([⁷](#fn7))
    or cheatsheet^([⁸](#fn8)) with the most common commands.


    Note


    If you don’t have it installed on your machine, you can check Appendixes A, B,
    and C, which have information about installing the different tools and loading
    the information on LDAP.


    After installing all the tools, you must check if they are correctly installed
    before reading the different chapters.


    In the case of Java, you need to run the following command:


    ```

    % java -version

    openjdk 21 2023-09-19

    OpenJDK Runtime Environment (build 21+35-2513)

    OpenJDK 64-Bit Server VM (build 21+35-2513, mixed mode, sharing)

    ```


    After that, you need to check if the version of `Maven` is correct using this
    command:


    ```

    % mvn --version

    Apache Maven 3.9.1

    Maven home: /usr/share/maven

    ```


    Last, if you want to check whether `Docker` runs correctly on your machine, you
    can do that using the following command:


    ```

    % docker --version

    Docker version 24.0.2, build cb74dfc

    ```


    Remember that I mentioned that `Docker` is optional. It’s only recommended for
    reducing the complexity of installing LDAP vendors on your machine.


    ## Downloading Source Code


    The source code for the examples in this book can be downloaded from [`www.apress.com`](http://www.apress.com).
    For detailed information about locating this book’s source code, visit [`www.apress.com/gp/services/source-code`](http://www.apress.com/gp/services/source-code).
    The code is organized by chapter and can be built using `Maven`.

