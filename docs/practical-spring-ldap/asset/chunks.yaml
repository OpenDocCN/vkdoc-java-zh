    下一步是为 Spring 指定事务管理器。由于您只使用单个数据库，清单 9-6 中的 `org.springframework.jdbc.datasource.DataSourceTransactionManager`
    是理想选择。从清单 9-6 可以看出，`DataSourceTransactionManager` 需要一个数据源来获取和管理数据库连接。


    ```

