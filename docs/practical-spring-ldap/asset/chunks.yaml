    source code of the `OdmManager` with all the methods.


    ```

    package org.springframework.ldap.odm.core;

    import java.util.List;

    import javax.naming.Name;

    import javax.naming.directory.SearchControls;

    import org.springframework.ldap.query.LdapQuery;

    public interface OdmManager {

    T read(Class clazz, Name dn);

    void create(Object entry);

    void update(Object entry);

    void delete(Object entry);

    List findAll(Class clazz, Name base, SearchControls searchControls);

    List search(Class clazz, Name base, String filter, SearchControls searchControls);

    List search(Class clazz, LdapQuery query);

    }

    Listing 8-1

    OdmManager API

    ```


    The `OdmManager`’s `create`, `update`, and `delete` methods take a Java object
    and use its information to perform corresponding LDAP operations. The `read` method
    takes two parameters: a Java class that determines the type to return and a fully
    qualified DN that is used to look up the LDAP entry.


    The unique implementation of this interface, `OdmManagerImpl`, is deprecated and
    behind the scenes transforms the input of each method and calls to the same operations
    of `LdapTemplate`.


    The class `LdapTemplate` implements the interface `LdapOperations` which provides
    a standard way to access LDAP and execute the different operations. Listing [8-2](#319409_2_En_8_Chapter.xhtml#PC3)
    shows the most relevant methods that you can use to execute different operations.


    ```

    package org.springframework.ldap.core;

    import java.util.List;

    import java.util.stream.Stream;

    import javax.naming.Name;

    import javax.naming.directory.Attributes;

    import javax.naming.directory.ModificationItem;

    import javax.naming.directory.SearchControls;

    import org.springframework.ldap.NamingException;

    import org.springframework.ldap.filter.Filter;

    import org.springframework.ldap.odm.core.ObjectDirectoryMapper;

    import org.springframework.ldap.query.LdapQuery;

    public interface LdapOperations {

    T findByDn(Name dn, Class clazz);

    T findOne(LdapQuery query, Class clazz);

    List find(LdapQuery query, Class clazz);

    List findAll(Class clazz);

    List findAll(Name base, SearchControls searchControls, Class clazz);

    List findAll(Name base, Filter filter, SearchControls searchControls, Class clazz);

    void create(Object entry);

    void update(Object entry);

    void delete(Object entry);

    }

    Listing 8-2

    Declaration of the interface LdapOperations

    ```


    As you can see in Listing [8-2](#319409_2_En_8_Chapter.xhtml#PC3), some methods
    receive an object; the object represents our domain object like Patron or Employee
    but with certain annotations that provide the necessary metadata to Spring to
    execute the different operations.


    ## ODM Metadata


    The `org.springframework.ldap.odm.annotations` package contains annotations that
    can be used to turn simple Java POJOs into ODM manageable entities. Listing [8-3](#319409_2_En_8_Chapter.xhtml#PC4)
    shows the `Patron` Java class you will convert into an ODM entity.


    ```

    package com.apress.book.ldap.domain;

    import java.util.List;

    import javax.naming.Name;

    public class Patron {

    private Name dn;

    private String lastName;

    private String firstName;

    private String telephoneNumber;

    private String fullName;

    private String mail;

    private List objectClasses;

    private int employeeNumber;

    //Setters and getters

    @Override

    public String toString() {

    return "Dn: " + dn + ", firstName: " + firstName + ", fullName: " + fullName +
    ", Telephone Number: " + telephoneNumber;

    }

    }

    Listing 8-3

    Patron entity without setters and getters

    ```


    You will start the conversion by annotating the class with `@Entry`. This marker
    annotation tells the ODM that the class is an entity. It also provides the `objectClass`
    definitions in LDAP that the entity maps to. Listing [8-4](#319409_2_En_8_Chapter.xhtml#PC5)
    shows the annotated `Patron` class.


    ```

    package com.apress.book.ldap.domain;

    import java.util.List;

    import javax.naming.Name;

    import org.springframework.ldap.odm.annotations.Entry;

    @Entry(objectClasses = { "inetorgperson", "organizationalperson", "person", "top"
    })

    public class Patron {

    // Fields and getters and setters

    }

    Listing 8-4

    Patron entity with the declaration of the type of entity

    ```


    The next annotation you need to add is the `@org.springframework.ldap.odm.annotations.Id`.
    This annotation specifies the entry’s DN and can only be placed on a field derivative
    of the `javax.naming.Name` class. You will create a new field called dn in the
    Patron class to address this. Listing [8-5](#319409_2_En_8_Chapter.xhtml#PC6)
    shows the modified `Patron` class.


    ```

    package com.apress.book.ldap.domain;

    import java.util.List;

    import javax.naming.Name;

    import org.springframework.ldap.odm.annotations.Entry;

    import org.springframework.ldap.odm.annotations.Id;

    @Entry(objectClasses = { "inetorgperson", "organizationalperson", "person", "top"
    })

    public class Patron {

    @Id

    private Name dn;

    // Fields and getters and setters

    }

    Listing 8-5

    Patron entity with the declaration of the type of entity and the id

    ```


    The `@Id` annotation in the Java Persistence API specifies the `identifier` property
    of the entity bean. Additionally, its placement determines the default access
    strategy the JPA provider will use for mapping. If the `@Id` is placed over a
    field, field access is used. The property access will be used if placed over a
    getter method. However, Spring LDAP ODM only allows field access.


    The `@Entry` and `@Id` are the only annotations required to make the `Patron`
    class an ODM entity. By default, all the fields in the `Patron` entity class will
    automatically become persistable. The default strategy is to use the name of the
    entity field as the LDAP attribute name while persisting or reading. In the `Patron`
    class, this would work for attributes such as `telephoneNumber` or `mail` because
    the field name and the LDAP attribute name are the same. However, this would cause
    problems with fields such as `firstName` and `fullName`, as their names differ
    from the LDAP attribute names. To address this, ODM provides the `@Attribute`
    annotation that maps the entity fields to object class fields. This annotation
    allows you to specify the name of the LDAP attribute, an optional syntax OID,
    and an optional type declaration. Listing [8-6](#319409_2_En_8_Chapter.xhtml#PC7)
    shows the completely annotated `Patron` entity class.'
