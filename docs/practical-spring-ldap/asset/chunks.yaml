    ## Sample Application


    Throughout this book, you will be working with a directory for a hypothetical
    book library. I have chosen the library because the concept is universal and easy
    to grasp. A library usually stores books and other multimedia that patrons can
    borrow. Libraries also employ people to take care of daily library operations.
    To keep things manageable, the directory will not store book information. A relational
    database is suitable for recording book information. Figure [1-7](#319409_2_En_1_Chapter.xhtml#Fig7)
    shows the `LDAP` directory tree for our library application.


    ![](images/319409_2_En_1_Chapter/319409_2_En_1_Fig7_HTML.jpg)


    A tree illustration of the library `DIT`. `DC` equals `example` `dc` equals `com`
    is mapped to `ou` equals employees and patrons. `ou` equals employees mapped to
    3 employees. `ou` equals patrons mapped to 2 patrons.


    Figure 1-7


    Library DIT


    The `JNDI` architecture consists of an Application Programming Interface or API
    and a Service Provider Interface or SPI. Developers program their Java applications
    using the `JNDI` API to access directory/naming services. Vendors implement the
    SPI with details that deal with actual communication to their particular service/product.
    Such implementations are referred to as service providers. Figure [2-1](#319409_2_En_2_Chapter.xhtml#Fig1)
    shows the `JNDI` architecture and a few naming and directory service providers.
    This pluggable architecture provides a consistent programming model and prevents
    the need to learn a separate API for each product.


    ![](images/319409_2_En_2_Chapter/319409_2_En_2_Fig1_HTML.jpg)


    A flowchart of the `JNDI`. Java application is followed by `JNDI API` and `JNDI
    SPI`. The `JNDI SPI` consists of `LDAP`, `RMI`, and `DNS`.


    Figure 2-1


    JNDI architecture


    The `JNDI` has been part of the standard JDK distribution since Java version 1.3
    and has not moved to Jakarta like other packages. The API itself is spread across
    five packages:


    *   The `javax.naming`^([^(31)](#fn31)) package contains classes and interfaces
    for looking up and accessing objects in a naming service.


    *   The `javax.naming.directory`^([^(32)](#fn32)) package contains classes and
    interfaces that extend the core `javax.naming` package. These classes can access
    directory services and perform advanced operations such as filtered searching.


    *   The `javax.naming.event`^([^(33)](#fn33)) package has functionality for event
    notification when accessing naming and directory services.


    *   The `javax.naming.ldap`^([^(34)](#fn34)) package contains classes and interfaces
    that support the `LDAP` Version 3 controls and operations. Later chapters will
    examine controls and operations.


    *   The `javax.naming.ldap.spi`^([^(35)](#fn35)) package contains classes to support
    defining custom `DNS` for `LDAP`. The support of this feature has appeared since
    Java 12.


    *   The `javax.naming.spi`^([^(36)](#fn36)) package contains the `SPI` interfaces
    and classes. As mentioned earlier, service providers implement `SPI`, and we will
    not cover these classes in this book.


    ## LDAP Using JNDI


    While `JNDI` allows access to a directory service, it is essential to remember
    that `JNDI` is not a directory or a naming service. Thus, we need a running `LDAP`
    directory server to access `LDAP` using `JNDI`.


    Accessing `LDAP` using `JNDI` usually involves three steps:


    *   Connect to `LDAP`


    *   Perform `LDAP` operations


    *   Close the resources


    Note


    Check if you have installed the correct version of Java on your machine. To do
    this, look at Appendix A, which explains how to do it.


    If you don’t have a test `LDAP` server available, please refer to the steps in
    Appendix B for installing a local `LDAP` server or running it using Docker. The
    explanation about how to install Docker and check if everything is okay appears
    in Appendix A.


    This chapter aims to show how you can do different operations on `LDAP` using
    Java without any framework. With this approach, you will see the complexity of
    doing certain operations and writing many lines of code to do something simple
    with the assistance of some framework like `Spring LDAP`.

    '
