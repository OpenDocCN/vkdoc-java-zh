- fmt: "\n## Identifying Supported Controls\n\nBefore a particular control can be\
    \ used, ensuring that the LDAP server you are using supports that control is important.\
    \ The LDAP specification mandates every LDAP v3-compliant server publish all the\
    \ supported controls in the `supportedControl` attribute of the Root `DSA-Specific\
    \ Entry` (DSE). Thus, searching the Root DSE entry for the `supportedControl`\
    \ attribute will list all the controls. Listing [7-1](#319409_2_En_7_Chapter.xhtml#PC1)\
    \ shows the code that connects to the OpenDJ server running on port 11389 and\
    \ prints the control list to the console.\n\n```\npackage com.apress.book.ldap;\n\
    import org.slf4j.Logger;\nimport org.slf4j.LoggerFactory;\nimport java.util.Properties;\n\
    import javax.naming.NamingEnumeration;\nimport javax.naming.NamingException;\n\
    import javax.naming.directory.Attribute;\nimport javax.naming.directory.Attributes;\n\
    import javax.naming.directory.DirContext;\nimport javax.naming.directory.InitialDirContext;\n\
    public class SupportedControlApplication {\nprivate static final Logger logger\
    \ = LoggerFactory.getLogger(SupportedControlApplication.class);\npublic void displayControls()\
    \ {\nString ldapUrl = \"ldap://localhost:11389\";\ntry {\nProperties environment\
    \ = new Properties();\nenvironment.setProperty(DirContext.INITIAL_CONTEXT_FACTORY,\
    \ \"com.sun.jndi.ldap.LdapCtxFactory\");\nenvironment.setProperty(DirContext.PROVIDER_URL,\
    \ ldapUrl);\nDirContext context = new InitialDirContext(environment);\nAttributes\
    \ attributes = context.getAttributes(\"\", new String[] { \"supportedcontrol\"\
    \ });\nAttribute supportedControlAttribute = attributes.get(\"supportedcontrol\"\
    );\nNamingEnumeration controlOIDList = supportedControlAttribute.getAll();\nwhile\
    \ (controlOIDList != null && controlOIDList.hasMore()) {\nlogger.info(controlOIDList.next().toString());\n\
    }\ncontext.close();\n} catch (NamingException e) {\nlogger.error(e.getClass()\
    \ + \": \" + e.getMessage());\n}\n}\npublic static void main(String[] args) throws\
    \ NamingException {\nSupportedControlApplication supportedControlApplication =\
    \ new SupportedControlApplication();\nsupportedControlApplication.displayControls();\n\
    }\n}\n```\n\nListing [7-2](#319409_2_En_7_Chapter.xhtml#PC2) is the output after\
    \ running the code from Listing [7-1](#319409_2_En_7_Chapter.xhtml#PC1).\n\n```\n\
    1.2.826.0.1.3344810.2.3\n1.2.840.113556.1.4.1413\n1.2.840.113556.1.4.319\n1.2.840.113556.1.4.473\n\
    1.2.840.113556.1.4.805\n1.3.6.1.1.12\n1.3.6.1.1.13.1\n1.3.6.1.1.13.2\n1.3.6.1.4.1.26027.1.5.2\n\
    1.3.6.1.4.1.42.2.27.8.5.1\n1.3.6.1.4.1.42.2.27.9.5.2\n1.3.6.1.4.1.42.2.27.9.5.8\n\
    1.3.6.1.4.1.4203.1.10.1\n1.3.6.1.4.1.4203.1.10.2\n1.3.6.1.4.1.7628.5.101.1\n2.16.840.1.113730.3.4.12\n\
    2.16.840.1.113730.3.4.16\n2.16.840.1.113730.3.4.17\n2.16.840.1.113730.3.4.18\n\
    2.16.840.1.113730.3.4.19\n2.16.840.1.113730.3.4.2\n2.16.840.1.113730.3.4.3\n2.16.840.1.113730.3.4.4\n\
    2.16.840.1.113730.3.4.5\n2.16.840.1.113730.3.4.9\n```\n\nListing 7-2  \nThe result\
    \ of the execution of the support control class\n\nThe OpenDJ installation provides\
    \ a command-line `ldapsearch` tool that can also be used for listing the supported\
    \ controls; the same situation happens if you are using a Docker image with OpenDJ.\
    \ Assuming that you are using OpenDJ, you need to access the root directory where\
    \ the LDAP server is located and use the command to get a list of supported controls:\n\
    \n```\nldapsearch --baseDN \"\" --searchScope base --port 11389 \"(objectclass=*)\"\
    \ supportedControl\n```\n\n![](images/319409_2_En_7_Chapter/319409_2_En_7_Fig3_HTML.jpg)\n\
    \nFigure 7-3  \n`OpenDJ ldapsearch command`\n\n## JNDI and Controls\n\nThe `javax.naming.ldap`\
    \ package in the JNDI API supports LDAP V3-specific features such as controls\
    \ and extended operations. While controls modify or augment the behavior of existing\
    \ operations, extended operations allow additional operations to be defined. The\
    \ UML diagram in Figure [7-4](#319409_2_En_7_Chapter.xhtml#Fig4) highlights some\
    \ of the important control classes in the `javax.naming.ldap` package.\n\n![](images/319409_2_En_7_Chapter/319409_2_En_7_Fig4_HTML.jpg)\n\
    \nFigure 7-4  \nJava LDAP control class hierarchy\n\nThe `javax.naming.ldap.Control`\
    \ interface provides an abstraction for both request and response controls. Several\
