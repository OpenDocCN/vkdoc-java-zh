    # 3. Introducing Spring LDAP


    `Spring LDAP`^([^(37)](#fn37)) provides simple, clean, and comprehensive support
    for LDAP programming in Java. This project started on SourceForge in 2006 under
    the name `LdapTemplate` to simplify access to LDAP using JNDI. The project later
    became part of the Spring Framework portfolio and has come a long way. Figure
    [3-1](#319409_2_En_3_Chapter.xhtml#Fig1) depicts the architecture of a Spring
    LDAP–based application.


    ![](images/319409_2_En_3_Chapter/319409_2_En_3_Fig1_HTML.jpg)


    An illustration of the `Spring LDAP` architecture directory. Application is followed
    by `spring LDAP` and `spring core`. All are interconnected with the directory.


    Figure 3-1


    `Spring LDAP` architecture directory


    The application code uses the `Spring LDAP` API to perform LDAP server operations.
    The `Spring LDAP` framework contains all of the LDAP-specific code and abstractions.
    `Spring LDAP`, however, will rely on the `Spring Framework` for some of its infrastructural
    needs.


    The `Spring Framework` has become today’s standard for developing Java-based enterprise
    applications. Among many other things, it provides a dependency injection–based
    lightweight alternative to the JEE programming model. The `Spring Framework` is
    the base for `Spring LDAP` and all other `Spring` portfolio projects, such as
    `Spring MVC` and `Spring Security`.


    ## Motivation


    In the previous chapter, we discussed the shortcomings of the `JNDI` API. A notable
    drawback of `JNDI` is that it is very lengthy; almost all of the code in Chapter
    [2](#319409_2_En_2_Chapter.xhtml) has to do with plumbing and very little with
    application logic. `Spring LDAP` addresses this problem by providing template
    and utility classes that take care of the plumbing code so the developer can focus
    on business logic.


    Another notable issue with `JNDI` is that it requires the developer to explicitly
    manage resources such as LDAP contexts. This can be very error-prone. Forgetting
    to close resources can result in leaks and can quickly bring down an application
    under heavy load. `Spring LDAP` manages these resources on your behalf and automatically
    closes them when you no longer need them. It also provides the ability to pool
    LDAP contexts, which can improve performance.


    Any problems that arise during the execution of `JNDI` operations will be reported
    as instances of `NamingException` or its subclasses. `NamingException` is a checked
    exception, and thus the developer is forced to handle it. Data access exceptions
    are usually not recoverable, and most often, only a little can be done to catch
    these exceptions. To address this, `Spring LDAP` provides a consistent unchecked
    exception hierarchy that mimics `NamingException`. This allows the application
    designer to choose when and where to handle these exceptions.


    Finally, plain `JNDI` programming is hard and daunting for new developers. `Spring
    LDAP`, with its abstractions, makes working with `JNDI` more enjoyable. Additionally,
    it provides various features such as `Object-Directory Mapping` and transaction
    support, making it an important tool for any enterprise LDAP developer.


    ## Documentation and Source Code Spring LDAP


    `Spring Framework` portfolio projects can be checked in the documentation from
    the official website.^([^(38)](#fn38)) A direct link is available on the `Spring
    LDAP` website,^([^(39)](#fn39)) or you can check the source code at the GitHub
    repository.^([^(40)](#fn40))


    `Spring LDAP` source code can provide valuable insights into the framework architecture.
    It also includes a rich test suite that can serve as additional documentation
    and help you understand the framework. You should download and look at the source
    code. The Git repository also holds a sandbox folder that contains several experimental
    features that may or may not make it into the framework.


    ## Spring LDAP Packaging


    Now that you can access the `Spring LDAP` framework’s documentation and source
    code, let’s delve into the different components. The LDAP framework is packaged
    into six components, and Table [3-1](#319409_2_En_3_Chapter.xhtml#Tab1) briefly
    describes each component.


    Table 3-1


    `Spring LDAP` Distribution Modules


    | Component | Description |

    | --- | --- |

    | `spring-ldap-core` | It contains all the classes necessary for using the LDAP
    framework. This jar is required in all applications. |

    | `spring-ldap-core-tiger` | It contains classes and extensions that are specific
    to Java 5 and higher. Applications running under Java 5 should not use this jar.
    |

    | `spring-ldap-test` | It contains classes and utilities that make testing easier.
    It also includes classes for starting and stopping in-memory instances of the
    ApacheDS LDAP server. |

    | `spring-ldap-ldif-core` | It contains classes for parsing ldif format files.
    |

    | `spring-ldap-ldif-batch` | It contains classes necessary to integrate ldif parser
    with `Spring Batch` Framework. |

    | `spring-ldap-odm` | It contains classes for enabling and creating `Object-Directory
    Mapping`. |


    Along with `Spring Framework`, you need additional jar files for compiling and
    running applications using `Spring LDAP`. Table [3-2](#319409_2_En_3_Chapter.xhtml#Tab2)
    lists some of these dependent jar files and describes why they are used.


    Table 3-2


    `Spring LDAP`


    | Library | Description |

    | --- | --- |

    | `slf4j`^([^(41)](#fn41)) | Logging is used internally by `Spring LDAP` and `Spring
    Framework`. This is a required jar to be included in applications. |

    | `spring-core` | `Spring` library that contains core utilities used internally
    by `Spring LDAP`. This is a required library for using `Spring LDAP`. |

    | `spring-beans` | `Spring Framework` library used for creating and managing `Spring
    Beans`. `Spring LDAP` requires another library. |

    | `spring-context` | `Spring` library that is responsible for dependency injection.
    This is required when using `Spring LDAP` inside a `Spring` application. |

    | `spring-tx` | `Spring Framework` library that provides transaction abstractions.
    This is required when using `Spring LDAP` transaction support. |

    | `spring-jdbc` | The library simplifies access to the database using JDBC under
    the covers. This is an optional library and should be used for transaction support.
    |

    | `commons-pool`^([^(42)](#fn42)) | Apache `commons-pool` library provides support
    for pooling. This should be included when using `Spring LDAP` pooling support.
    |

