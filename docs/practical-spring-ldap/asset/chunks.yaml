    \ kind of code falls under the umbrella of integration testing. As mentioned earlier,\
    \ integration testing focuses on testing interactions between components with\
    \ their dependencies in place.\n\nIt has become common for developers to write\
    \ automated integration tests using unit testing tools, thereby blurring the distinction\
    \ between them. However, it is important to remember that integration tests are\
    \ usually slower and don’t run in isolation. Frameworks such as `Spring` provide\
