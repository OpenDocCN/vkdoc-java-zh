    # 8. 对象-目录映射


    企业 Java 开发者使用面向对象（OO）技术来构建模块化、复杂的应用程序。在 OO 范式中，对象是系统的核心，代表现实世界中的实体。每个对象都有身份、状态和行为。对象可以通过继承或组合与其他对象相关联。另一方面，LDAP
    目录以层次树结构表示数据和关系。这种差异导致了对象-目录范式的不匹配，可能在面向对象环境和目录环境之间造成通信问题。


    Spring LDAP 提供了一个对象-目录映射（ODM）框架，该框架弥合了对象模型和目录模型之间的差距。ODM 框架允许我们在两个模型之间映射概念，并协调将
    LDAP 目录条目自动转换为 Java 对象的过程。ODM 与连接对象和关系数据库世界的对象-关系映射（ORM）方法类似。诸如 Hibernate^(⁸⁰)和
    TopLink^(⁸¹)等框架使 ORM 流行起来，并成为开发者工具集的重要组成部分。此外，像 Spring Data^(⁸²)这样的其他框架使用 Hibernate
    在后台实现，并提供相同的功能来访问数据库。


    尽管 Spring LDAP ODM 与 ORM 共享相同的概念，但它有以下不同之处：


    *   默认情况下无法缓存 LDAP 条目，但可以使用 Caffeine、Guava 或 EhCache 等库来封装访问 LDAP 的逻辑。

    *   ODM 元数据通过类级别的注解表达。

    *   不支持 XML 配置。

    *   无法实现条目的懒加载。

    *   不支持如 HQL 之类的查询语言。对象的加载通过 DN 查找和标准 LDAP 搜索查询完成，或者可以使用 Spring LDAP 提供的方法编写查询。

