    # 1. Introduction to LDAP


    We all deal with directories daily. We use a telephone directory to look up phone
    numbers. When visiting a library, we use the library catalog to look up the books
    we want to read. We use the file system directory with computers to store our
    files and documents. Simply put, a directory is a repository of information. The
    information is usually organized so that it can be retrieved easily.


    Directories on a network are typically accessed using the client/server communication
    model. Applications wanting to read or write data to a directory communicate with
    specialized servers. The directory server performs a read or write operation on
    the actual directory. Figure [1-1](#319409_2_En_1_Chapter.xhtml#Fig1) shows this
    client/server interaction.


    ![](images/319409_2_En_1_Chapter/319409_2_En_1_Fig1_HTML.jpg)


