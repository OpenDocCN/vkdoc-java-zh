    在本章中，你探索了事务的基础知识，并查看了 Spring LDAP 的事务支持。Spring LDAP 在操作前会记录 LDAP 树的状态。如果发生回滚，Spring
    LDAP 会执行补偿操作以恢复之前的状态。请记住，这种补偿事务支持提供了原子性的假象，但并不能保证真正的原子性。


    在下一章中，你将探索 Spring LDAP 的其他功能，例如连接池和 LDIF 文件解析。


