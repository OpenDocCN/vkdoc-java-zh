    ## Spring LdapTemplate 操作


    在上一节中，您使用`LdapTemplate`实现了搜索功能。现在，让我们看看如何使用`LdapTemplate`在 LDAP 中添加、删除和修改信息。

    '
- fmt: '

    ## Add Operation


    The `LdapTemplate` class provides several bind methods that allow you to create
    new LDAP entries. The simplest among those methods is as follows:


    ```

    public void bind(String dn, Object obj,  Attributes  attributes)

    ```


    The first parameter to this method is the unique distinguished name of the object
    that needs to be bound. The second parameter is the object to be bound and is
    usually an implementation of the `DirContext` interface. The third parameter is
    the attribute of the object to be bound. Among the three, only the first parameter
    is required, and you can pass a null for the rest of the two.


    Listing [3-10](#319409_2_En_3_Chapter.xhtml#PC19) shows the code involved in creating
    a new patron entry with a minimal set of information. You start the method implementation
    by creating a new instance of the `BasicAttributes` class to hold the patron attributes.
    Single-valued attributes are added by passing the attribute name and value to
    the put method. To add the multivalued attribute objectclass, you create a new
    instance of `BasicAttribute`. You then add the entry’s objectClass values to the
    `objectClassAttribute`, and add it to the attributes list. Finally, you invoke
    the `bind` method on the `LdapTemplate` with the patron information and the patron’s
    fully qualified DN. This adds the patron entry to the LDAP server.


    ```

    public void addPatron() {

    // Set the Patron attributes

    Attributes attributes = new BasicAttributes();

    attributes.put("sn", "Patron999");

    attributes.put("cn", "New Patron999");

    // Add the multi-valued attribute

    BasicAttribute objectClassAttribute = new BasicAttribute("objectclass");

    objectClassAttribute.add("top");

    objectClassAttribute.add("person");

    objectClassAttribute.add("organizationalperson");

    objectClassAttribute.add("inetorgperson");

    attributes.put(objectClassAttribute);

    ldapTemplate.bind("uid=patron999,ou=patrons,dc=inflinx,dc=com", null, attributes);

    }

    Listing 3-10

    Add patron operation

    ```


    ## Modify Operation


    Consider the scenario where you want to add a telephone number to the newly added
    patron. To do that, `LdapTemplate` provides a convenient `modifyAttributes` method
    with the following signature:


    ```

    public void modifyAttributes(String dn, ModificationItem[]  mods)

    ```


    This variation of `modifyAttributes` method takes the fully qualified unique DN
    of the entry to be modified as its first parameter. The second parameter takes
    an array of `ModificationItems` where each modification item holds the attribute
    information that needs modification. Listing [3-11](#319409_2_En_3_Chapter.xhtml#PC21)
    shows an example of `modifyattributes`, such as adding a new telephone to a patron.


    ```

    public void addTelephoneNumber() {

    Attribute attribute = new BasicAttribute("telephoneNumber", "801 100 1000");

    ModificationItem item = new ModificationItem(DirContext.ADD_ATTRIBUTE, attribute);

    ldapTemplate.modifyAttributes("uid=patron999,ou=patrons,dc=inflinx,dc=com", new
    ModificationItem[] {item});

    }

    Listing 3-11

    Add a new telephone number to the patron

    ```


    In this implementation, you simply create a new `BasicAttribute` with telephone
    information. Then you create a new `ModificationItem` and pass in the `ADD_ATTRIBUTE`
    code, indicating that you add an attribute. Finally, you invoke the `modifyAttributes`
    method with the patron DN and the modification item. The `DirContext` has a `REPLACE_ATTRIBUTE`
    code that, when used, will replace an attribute’s value. Similarly, the `REMOVE_ATTRIBUTE`
    code will remove the specified value from the attribute.


    ## Deleting Operation


    Similar to addition and modification, `LdapTemplate` makes it easy to remove an
    entry with the `unbind` method. Listing [3-12](#319409_2_En_3_Chapter.xhtml#PC22)
    provides the code that implements the `unbind` method and removes a patron. As
    you can see, the `unbind` method takes the DN for the entry that needs to be removed.


    ```

    public void removePatron() {    ldapTemplate.unbind("uid=patron999,ou=patrons,dc=inflinx,dc=com");

    }

    Listing 3-12

    Remove one element

    ```


    A good way to check all the operations is to create a class that contains all
    these methods with the name `LdapOperationsClient` and create a main class that
    checks if all of them work. Listing [3-13](#319409_2_En_3_Chapter.xhtml#PC23)
    shows the main method of the class, which invokes all the operations.


    ```

    @Component

    public class LdapOperationsClient {

    private LdapTemplate ldapTemplate;

    @Autowired

    public LdapOperationsClient(@Qualifier("ldapTemplate") LdapTemplate ldapTemplate)
    {

    this.ldapTemplate = ldapTemplate;

    }

    //Methods that appears on the previous Listing

    public static void main(String[] args) {

    ApplicationContext context = new ClassPathXmlApplicationContext("classpath:applicationContext.xml");

    LdapOperationsClient client = context.getBean(LdapOperationsClient.class);

    client.addPatron();

    client.addTelephoneNumber();

    client.removePatron();

    }

    }

    Listing 3-13

    Main method invoking all the operations

    ```


    When you run all the methods together, you will see the following output on the
    console:

    '
