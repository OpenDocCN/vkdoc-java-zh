- fmt: '

    ### Mockito


    Mockito^([^(64)](#fn64)) 是一个用 Java 编写的模拟框架，已成为创建和管理模拟对象的最受欢迎选项之一，因为它提供了简单的语法并与其他测试库（如`JUnit`）有良好的支持。使用此库，您可以根据要测试的情况在模拟的接口/类上声明不同类型的响应，从特定值到抛出异常。


    与 JUnit 相同，学习 Mockito 的最佳方式是通过实际示例。让我们定义两个具有某种关联的简单类来创建场景。列表 [4-4](#319409_2_En_4_Chapter.xhtml#PC5)
    显示了一个简单的服务类，该类接收两个数字并执行加法操作。


    ```

    public class `MathService` {

    public int add(int numberOne, int numberTwo){

    return numberOne + numberTwo;

    }

    }

    Listing 4-4

    A simple class that executes a math operation

    ```


    下一步是创建另一个依赖`MathService`类的类，并对其进行模拟。列表 [4-5](#319409_2_En_4_Chapter.xhtml#PC6)
    显示了一个调用服务相同方法的类。


    ```

    public class `Calculator` {

    private final `MathService` service;

    public `Calculator`(`MathService` service) {

    this.service = service;

    }

    public int add(int numberOne, int numberTwo){

    return service.add(numberOne, numberTwo);

    }

    }

    Listing 4-5

    A service class that invokes another class

    ```


    在创建任何测试并生成模拟对象之前，必须添加与`JUnit` 5 兼容的依赖项，如列表 [4-6](#319409_2_En_4_Chapter.xhtml#PC7)
    所示。


    ```

    `org.mockito`

    `mockito-junit-jupiter`

    `${mockito-junit-jupiter.version}`

    test


    `org.mockito`

    `junit-jupiter`

    `${mockito-junit-jupiter.version}`

    test


    Listing 4-6

    Mockito dependency that you must include on the POM file

    ```


    最后一步是创建一个测试，模拟`MathService`类，因为您只想测试`Calculator`类的行为。列表 [4-7](#319409_2_En_4_Chapter.xhtml#PC8)
    显示了上下文定义和一个简单测试。


    ```

    import `org.junit.jupiter.api.BeforeEach`;

    import `org.junit.jupiter.api.DisplayName`;

    import `org.junit.jupiter.api.Test`;

    import static `org.junit.jupiter.api.Assertions.assertEquals`;

    import static `org.mockito.Mockito.*`;

    @DisplayName("Calculator tests cases")

    class `CalculatorTest` {

    private `MathService` mathService;

    private `Calculator` calculator;

    @BeforeEach

    public void setUp() {

    mathService = `mock`(`MathService`.class); // This class is a mock

    calculator = new `Calculator`(mathService);

    }

    @Test

    @DisplayName("Check that the sum of two numbers is okay")

    void should_sum_two_numbers() {

    // Given - Creating the mocks

    `when`(`mathService`.add(1, 4)).`thenReturn`(5);

    // When - Execution of the operation

    int result = calculator.add(1, 4);

    // Then - Verify the results and the interactions with the mocks class

    `verify`(`mathService`).add(1, 4);

    assertEquals(5, result);

    }

    }

    Listing 4-7

    Simple tests using Mockito

    ```


    如列表 [4-7](#319409_2_En_4_Chapter.xhtml#PC8) 所示，有一些静态方法如`when`、`mock`和`verify`，这些方法是
    Mockito 的特性，不仅用于创建模拟对象，还用于验证模拟对象是否在测试中被使用。


    表 [4-2](#319409_2_En_4_Chapter.xhtml#Tab2) 列出了一些 Mockito 中的重要方法。


    Table 4-2


    Mockito Methods


    | Methods | Description |

    | --- | --- |

    | `mock` | 该方法为特定类创建模拟对象，拦截所有调用，并允许您更改类的行为。 |

    | `verify` | 该方法可帮助您检查特定参数的模拟对象是否被调用。这对于理解逻辑是否正常运行非常有用。 |

    | `any` | 您可以使用此方法表示希望模拟对象接收任何值，以激活新行为。 |

    | `doThrow` | 您可以使用此方法在模拟对象被调用时抛出特定异常。 |

    | `when/given` | 您可以使用此方法指定调用需要执行模拟对象的条件。 |


    请注意，该表仅显示了您在测试中需要使用的最相关注解；Mockito 官方网站上还有许多其他注解。^([^(65)](#fn65))


    ### Testcontainers


    Testcontainers^([^(66)](#fn66)) 是一个轻量级且开源的库，允许您在应用程序中运行不同容器并重用不同的测试用例。该库支持多种测试框架，如不同版本的`JUnit`和`Spock`，并且可以在
    Java 或 Kotlin 项目中使用。


    这些容器可以是数据库或其他您的应用程序需要的服务；例如，如果您的应用程序需要使用 AWS 的特定服务，您可以使用 LocalStack 的镜像。^([^(67)](#fn67))
    Testcontainers 开发了一组模块，^([^(68)](#fn68)) 以减少运行容器和配置特定镜像的复杂性；例如，有针对最流行数据库和队列的模块。


    在幕后，此库使用`Docker`^([^(69)](#fn69)) 下载并运行不同的容器，因此在使用项目之前，请检查与库所需 Docker 版本相关的通用要求。^([^(70)](#fn70))
    此外，自 2020 年 11 月起，Docker Hub 对存储库中的不同镜像引入了一些下载次数限制，但开源项目不受这些限制影响，因为 Docker Hub
    的理念是作为中央存储库。请注意，如果您在流水线中使用此库，运行的机器必须满足相同的条件。


    在创建任何使用容器的测试之前，必须添加与`JUnit` 5 兼容的依赖项，如列表 [4-8](#319409_2_En_4_Chapter.xhtml#PC9)
    所示。


    ```

    `org.testcontainers`

    `testcontainers`

    `${testcontainers.version}`

    test


    `org.testcontainers`

    `junit-jupiter`

    `${testcontainers.version}`

    test


    Listing 4-8

    Testcontainers dependency that you must include on the POM file

    ```


    之后，让我们创建一个简单的测试，仅运行一个简单的 hello-world 镜像，如列表 [4-9](#319409_2_En_4_Chapter.xhtml#PC10)
    所示。


