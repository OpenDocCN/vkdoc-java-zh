    ## Spring LDAP Hello World


    With this information in hand, let’s dive into the world of Spring LDAP. You will
    start by writing a simple search client that reads all the patron names in the
    `ou=patrons` LDAP branch. This is similar to the example you looked at in Chapter
    [2](#319409_2_En_2_Chapter.xhtml). Listing [3-3](#319409_2_En_3_Chapter.xhtml#PC10)
    shows the search client code.


    ```

    public class SearchClient {

    private static final Logger logger = LoggerFactory.getLogger(SearchClient.class);

    @SuppressWarnings("unchecked")

    public List search() {

    LdapTemplate ldapTemplate = getLdapTemplate();

    return ldapTemplate.search("dc=inflinx,dc=com", " (objectclass=person)", (AttributesMapper)
    attributes -> (String)attributes.get("cn").get());

    }

    //Do this only for check how works but try to delegate the creation of the context
    source to Spring

    private LdapTemplate getLdapTemplate() {

    // Setup of the context - Are implemented later

    }

    }

    Listing 3-3

    The manual connection to LDAP

    ```


    Central to the Spring LDAP framework is the `org.springframework.ldap.core.LdapTemplate`
    class. Based on the Template Method design pattern,^([^(44)](#fn44)) the `LdapTemplate`
    class takes care of the unnecessary plumbing involved in LDAP programming. It
    provides several overloaded `search`, `lookup`, `bind`, `authenticate`, and `unbind`
    methods that make LDAP development a breeze. The `LdapTemplate` is threadsafe,
    and concurrent threads can use the same instance.


    Note


    Spring LDAP version 1.3 introduced a variation of `LdapTemplate` called `SimpleLdapTemplate`.
    This is a Java 5–based convenience wrapper for the classic `LdapTemplate`. The
    `SimpleLdapTemplate` adds Java 5 Generics support to lookup and search methods.
    These methods now take implementations of `ParameterizedContextMapper<T>` as parameters,
    allowing the search and lookup methods to return typed objects.


    The `SimpleLdapTemplate` exposes only a subset of operations available in `LdapTemplate`.
    These operations, however, are the most commonly used ones, and hence `LdapTemplate`
    would be sufficient in many situations. The `SimpleLdapTemplate` also provides
    the `getLdapOperations()` method that exposes the wrapped `LdapOperations` instance
    and can invoke the less commonly used template methods.


    With the release 3.0.0 of Spring LDAP, the class `SimpleLdapTemplate` disappeared
    to keep the code simple, and the only available option is to use `LdapTemplate`
    for that reason, if you find any block of code on an application knows that is
    using an old version of Spring LDAP.


    You start the search method implementation by obtaining an instance of the `LdapTemplate`
    class. Then you invoke a variation of the `LdapTemplate`’s `search` method. The
    first parameter of the `search` method is the LDAP base, and the second parameter
    is the search filter. The `search` method uses the base and filter to perform
    a search, and each `javax.naming.directory.SearchResult` obtained is supplied
    to an implementation of `org.springframework.ldap.core.AttributesMapper` that
    is provided as the third parameter. In Listing [3-3](#319409_2_En_3_Chapter.xhtml#PC10),
    the `AttributesMapper` implementation is achieved by creating an anonymous class
    that reads each `SearchResult` entry and returns the common name of the entry.


    In Listing [3-3](#319409_2_En_3_Chapter.xhtml#PC10), the `getLdapTemplate` method
    is empty. Now let’s look at implementing this method. For `LdapTemplate` to properly
    execute the search, it needs an initial context on the LDAP server. Spring LDAP
    provides `org.springframework.ldap.core.ContextSource` interface abstraction and
    its implementation `org.springframework.ldap.core.support.LdapContextSource` for
    configuring and creating context instances. Listing [3-4](#319409_2_En_3_Chapter.xhtml#PC11)
    shows the complete method for `getLdapTemplate` implementation.


    ```

    private LdapTemplate getLdapTemplate() {

    LdapContextSource contextSource = new LdapContextSource();

    contextSource.setUrl("ldap://localhost:11389");

    contextSource.setUserDn("cn=Directory Manager");

    contextSource.setPassword("secret");

    try {

    contextSource.afterPropertiesSet();

    } catch(Exception e) {

    logger.error(e.getClass() + ": " + e.getMessage());

    }

    LdapTemplate ldapTemplate = new LdapTemplate();

    ldapTemplate.setContextSource(contextSource);

    return ldapTemplate;

    }

    Listing 3-4

    The configuration of the LDAPTemplate

    ```


    You start the method implementation by creating a new `LdapContextSource` and
    populating it with information about the LDAP server, such as the server URL and
    binding credentials. You then invoke the `afterPropertiesSet` method on the context
    source that allows Spring LDAP to perform housekeeping operations. Finally, you
    create a new `LdapTemplate` instance and pass in the newly created context source.


    This completes your search client example. Listing [3-5](#319409_2_En_3_Chapter.xhtml#PC12)
    shows the main method that invokes the search operation and prints the names to
    the console.


    ```

    public static void main(String[] args) {

    SearchClient client = new SearchClient();

    List names = client.search();

    for(String name: names) {

    System.out.println(name);

    }

    }

    Listing 3-5

    The main method to run the application and do the search operation

    ```


    This search client implementation uses the Spring LDAP API without any Spring
    Framework–specific paradigms. In the coming sections, you will look at springifying
    this application. But before you do that, let’s quickly look at Spring `ApplicationContext`.


    ## Spring ApplicationContext


    Central to every Spring Framework application is the notion of `ApplicationContext`.
    Implementations of this interface are responsible for creating and configuring
    Spring beans. The application context also acts as an IoC container and is responsible
    for performing the dependency injection. A Spring bean is simply a standard POJO
    with metadata needed to run inside the Spring container.


    In a standard Spring application, the `ApplicationContext` is configured via an
    XML file, Java annotations, and JavaConfig. Listing [3-6](#319409_2_En_3_Chapter.xhtml#PC13)
    shows a sample `ApplicationContext` file with one bean declaration. The bean `myBean`
    is of type `com.apress.book.ldap.SimplePojo`. When the application loads the context,
    Spring creates an instance of `SimplePojo` and manages it.


    ```


    Listing 3-6

    Configuration of a simple POJO

    ```

