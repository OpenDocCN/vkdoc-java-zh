    ### AndFilter


    `AndFilter` 用于组合多个搜索过滤器表达式以创建复杂的搜索过滤器。生成的过滤器将匹配满足所有子过滤器条件的条目。例如，`AndFilter` 适合用于实现早期需求，即获取居住在
    Midvale 区域且拥有电子邮件地址的所有用户。以下代码展示了该实现：


    ```

    AndFilter andFilter = new AndFilter();

    andFilter.and(new EqualsFilter("postalCode", "95571"));

    andFilter.and(new PresentFilter("mail"));

    ```


    在此过滤器上调用 `encode` 方法将生成 `(&(postalCode=95571)(email=*))`。列表 6-11 展示了创建 `AndFilter`
