    ## Isolation

    This property ensures that a transaction executes independently of other parallel
    transactions. Changes or side effects of a transaction that has not yet been completed
    will never be seen in other transactions. In the money transfer scenario, another
    account owner will only see the balances before or after the transfer. They will
    only be able to see the intermediate balances if the transaction takes longer
    to complete. Many database systems relax this property and provide several levels
    of isolation. Table [9-1](#319409_2_En_9_Chapter.xhtml#Tab1) lists the primary
    transaction levels and descriptions. As the isolation level increases, transaction
    concurrency decreases, and transaction consistency increases.


    ## Durability

    This property ensures that the results of a committed transaction never get lost
    due to a failure. Revisiting the bank transfer scenario, when you receive a confirmation
    that the transfer has succeeded, the durability property ensures that this change
    becomes permanent.


    ## Local vs. Global Transactions

    Transactions are often categorized into local or global transactions depending
    on the number of resources participating. Examples of these resources include
    a database system or a JMS queue. Resource managers, such as a JDBC driver, are
    typically used to manage resources.


    Local transactions are transactions that involve a single resource. The most common
    example is a transaction associated with a single database. These transactions
    are usually managed via objects used to access the resource. In the case of a
    JDBC database transaction, implementations of the `java.sql.Connection` interface
    are used to access the database. These implementations also provide `commit` and
    `rollback` methods for managing transactions. In the case of a JMS queue, the
    `javax.jms.Session` instance provides methods for controlling transactions.


    Global transactions, on the other hand, deal with multiple resources. For example,
    a global transaction can read a message from a JMS queue and write a record to
    the database all in one transaction.


    Global transactions are managed using a transaction manager external to the resources.
    It is responsible for communicating with resource managers and making the final
    commit or rollback decision on distributed transactions. In Java/JEE, global transactions
    are implemented using the `Java Transaction API` (JTA). JTA provides standard
    interfaces for transaction managers and transaction participating components.


    Transaction managers employ a `two-phase commit` protocol to coordinate global
    transactions. As the name suggests, the two-phase commit protocol has two phases:


    * Prepare phase: In this phase, all participating resource managers are asked
    if they are ready to commit their work. Upon receiving the request, the resource
    managers attempt to record their state. If successful, the resource manager responds
    positively. If it cannot be committed, the resource manager responds negatively
    and reverses the local changes.


    * Commit phase: If the transaction manager receives all positive responses, it
    commits the transaction and notifies all the commit participants. If it receives
    one or more negative responses, it rolls back the entire transaction and notifies
    all the participants.


    The two-phase commit protocol is shown in Figure [9-1](#319409_2_En_9_Chapter.xhtml#Fig1).


    ![](images/319409_2_En_9_Chapter/319409_2_En_9_Fig1_HTML.jpg)


    2 request-response diagrams. Prepare and commit phases, each have one transaction
    manager and 2 resource managers. The transaction manager sends a prepare request
    to each resource manager, and the resource managers send a prepared response back
    to the transaction manager.


    Figure 9-1


    Two-phase commit protocol


    ## Programmatic vs. Declarative Transactions

    Developers have two choices when adding transaction capabilities to their application.


    ### Programmatically

    In this scenario, the transaction management code for starting, committing, or
    rolling back transactions surrounds the business code. This can provide extreme
    flexibility but can also make maintenance difficult. The following code gives
    an example of the programmatic transaction using `JTA` and `EJB 3.0`:


    ```

    @Stateless

    @TransactionManagement(TransactionManagementType.BEAN)

    public class OrderManager {

    @Resource

    private UserTransaction transaction;

    public void create(Order order) {

    try {

    transaction.begin();

    // business logic for processing order

    verifyAddress(order);

    processOrder(order);

    sendConfirmation(order);

    transaction.commit();

    } catch(Exception ex) {

    transaction.rollback();

    }

    }

    }

    ```


    ### Declaratively

    In this scenario, the container is responsible for starting, committing, or rolling
    back transactions. The developer usually specifies the transaction behavior via
    annotations or XML. This model cleanly separates the transaction management code
    from business logic. The following code gives an example of declarative transactions
    using `JTA` and `EJB 3.0`. When an exception happens during order processing,
    the `setRollbackOnly` method on the session context is called; this marks that
    the transaction must be rolled back.


    ```

    @Stateless

    @TransactionManagement(TransactionManagementType.CONTAINER)

    public class OrderManager {

    @Resource

    private SessionContext context;

    @TransactionAttribute(TransactionAttributeType.REQUIRED)

    public void create(Order order) {

    try {

    // business logic for processing order

    verifyAddress(order);

    processOrder(order);

    sendConfirmation(order);

    } catch(Exception ex) {

    context.setRollbackOnly();

    }

    }

    }

    ```

