  raw: '## Paged Search Controls


    The paged search control allows LDAP clients to control the rate at which the
    results of an LDAP search operation are returned. The LDAP clients create a page
    control with a specified page size and associate it with the search request. Upon
    receiving the request, the LDAP server will return the results in chunks, each
    containing the specified number of results. The paged search control is handy
    when dealing with large directories or building search applications with paging
    capabilities. This control is described in RFC 2696.^([^(79)](#fn79))


    Figure [7-6](#319409_2_En_7_Chapter.xhtml#Fig6) describes the LDAP client and
    server interaction using a page control.


    ![](images/319409_2_En_7_Chapter/319409_2_En_7_Fig6_HTML.jpg)


    An illustration of the page control interaction. L D A P client and server interact
    through search requests page controls and search results cookies.


    Figure 7-6


    Page control interaction


    Note


    LDAP servers often use the sizeLimit directive to restrict the number of results
    returned for a search operation. If a search produces more results than the specified
    sizeLimit, a size limit exceeds exception javax.naming.SizeLimitExceededException
    is thrown. The paging method does not let you pass through this limit.


    The LDAP client sends the search request along with the page control. Upon receiving
    the request, the LDAP server executes the search operation and returns the first
    page of results. Additionally, it sends a cookie that needs to be used to request
    the next paged results set. This cookie enables the LDAP server to maintain the
    search state. The client must not make any assumptions about the internal structure
    of the cookie. When the client requests the next batch of results, it sends the
    same search request page control and the cookie. The server responds with the
    new result set and a new cookie. When no more search results are returned, the
    server sends an empty cookie.


    Paging using the paged search control is unidirectional and sequential. The client
    can’t jump between pages or go back. Now that you know the basics of the paging
    control, Listing [7-14](#319409_2_En_7_Chapter.xhtml#PC17) shows its implementation
    using the plain JNDI API.


    Upon invoking the method, the paginated patrons will be displayed on the console
    as shown in Listing [7-14](#319409_2_En_7_Chapter.xhtml#PC17).


    ```

    sn: Amar ( uid=patron0,ou=patrons )

