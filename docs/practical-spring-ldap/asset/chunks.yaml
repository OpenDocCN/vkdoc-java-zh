    interconnected with the directory server through request and response. The directory
    server reads or writes on the actual directory.


    Figure 1-1


    Directory server and client interaction


    The communication between the directory server and client applications is usually
    accomplished using standardized protocols. The Lightweight Directory Access Protocol
    (LDAP) provides a standard protocol for communicating with a directory. The directory
    servers that implement the LDAP protocol are usually called LDAP servers. The
    LDAP protocol is based on an earlier X.500^([⁹](#fn9)) standard but is significantly
    simpler (lightweight) and easily extensible. Over the years, the LDAP protocol
    went through iterations and is currently at version 3.0.


    ## LDAP Overview


    LDAP defines a message protocol used by directory clients and directory servers.
    LDAP can be better understood by considering the following four models it is based
    on:


    *   The Information model determines the structure of information stored in the
    directory.


    *   The Naming model defines how information is organized and identified in the
    directory.


    *   The Functional model defines the operations performed on the directory.


    *   The Security model defines how to protect information from unauthorized access.


    We will look at each of these models in the following sections.


    ### Directory vs. Database


    Beginners often need clarification and picture an LDAP directory as a relational
    database. Like a database, an LDAP directory stores information. However, several
    key characteristics set a directory apart from relational databases.


    LDAP directories typically store data that is relatively static. For example,
