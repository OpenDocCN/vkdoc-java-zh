- fmt: '

    ## LDAP Controls


    LDAP controls provide a standardized way to modify the behavior of LDAP operations.
    A control can be viewed simply as a message a client sends to an LDAP server (or
    vice versa). Controls sent as part of a client request can provide additional
    information to the server indicating how the operation should be interpreted and
    executed. For example, an LDAP delete operation can specify a delete subtree control.
    Upon receiving a delete request, the default behavior of an LDAP server is to
    just delete the entry. However, when a delete subtree control is appended to the
    delete request, the server automatically deletes the entry and all its subordinate
    entries. Such controls are referred to as request controls.


    It is also possible for LDAP servers to send controls as part of their response
    message indicating how the operation was processed. For example, an LDAP server
    may return a password policy control during a bind operation, indicating that
    the client’s password has expired or will expire soon. Such controls sent by the
    server are referred to as response controls. It is possible to send any number
    of request or response controls along with an operation.


    LDAP controls, both request and response, comprise three components:


    *   `object identifier (OID)` that uniquely identifies the control: These OIDs
    prevent conflicts between control names and are usually defined by the vendor
    that creates the control. This is a required component of control.


    *   `criticality` indicate whether the control is critical or noncritical for
    the operation: This is also a required component and can be either `TRUE` or `FALSE`.


    *   `control value` optional information specific to the control: For example,
    the paged control used for paging search results needs the page size to determine
    the number of entries to return on a page.


    The formal definition of an LDAP control, as specified in `RFC 2251`^([^(77)](#fn77)),
    is shown in Figure [7-1](#319409_2_En_7_Chapter.xhtml#Fig1). This LDAP specification,
    however, does not define any concrete controls. LDAP vendors usually provide control
    definitions, and their support varies vastly from one server to another.


    ![](images/319409_2_En_7_Chapter/319409_2_En_7_Fig1_HTML.jpg)


    A screenshot of the LDAP control specification. Control is a sequence of control
    type, criticality, and control value.


    Figure 7-1


    LDAP control specification


    When an LDAP server receives a control as part of an operation, its behavior depends
    on the control and its associated information. The flow chart in Figure [7-2](#319409_2_En_7_Chapter.xhtml#Fig2)
    shows the server behavior upon receiving a request control.


    ![](images/319409_2_En_7_Chapter/319409_2_En_7_Fig2_HTML.jpg)


    A decision tree flowchart of the LDAP server control interaction. Some of the
    functions performed are whether a control is supported, whether a control is appropriate
    for the operation, operating using control, and abort operation and return error
    code.


    Figure 7-2


    LDAP server control interaction


    Some commonly supported LDAP controls, along with their `OID` and description,
    are shown in Table [7-1](#319409_2_En_7_Chapter.xhtml#Tab1).


    Table 7-1


    Commonly Used Controls


    | Control Name | `OID` | Description (RFC) |

    | --- | --- | --- |

    | Sort Control | `1.2.840.113556.1.4.473` | Requests the server to sort the search
    results before sending them to the client. This is part of `RFC 2891`. |

    | Paged Search Control | `1.2.840.113556.1.4.319` | Requests the server to return
    search results in pages containing a specified number of entries. Only sequential
    iteration of the search results is allowed. This is defined as part of `RFC 2696`.
    |

    | Delete Subtree Control | `1.2.840.113556.1.4.805` | Requests the server delete
    the entry and all its descendent entries. |

    | Virtual List View Control | `2.16.840.1.113730.3.4.9` | This is similar to Page
    search results but allows the client to request arbitrary subsets of entries.
    This control is described in the Internet-Drafts file VLV 04. |

    | Password Policy Control | `1.3.6.1.4.1.42.2.27.8.5.1` | Server-sent control
    that holds information about failed operation (e.g., authentication) due to password
    policy problems, such as a password needs to be reset, an account has been locked,
    or a password has expired or is expiring. |

    | Manage DSA/IT Control | `2.16.840.1.113730.3.4.2` | Requests the server to treat
    “ref” attribute entries (referrals) as regular LDAP entries. |

    | Persistent Search Control | `2.16.840.1.113730.3.4.3` | This control allows
    the client to receive notifications of changes in the LDAP server for entries
    that match search criteria. |

