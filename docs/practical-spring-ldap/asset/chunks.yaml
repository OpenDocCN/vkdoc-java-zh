    ## Summary


    Spring LDAP’s Object-Directory Mapping (ODM) bridges the gap between object and
    directory models. In this chapter, you learned the basics of ODM and looked at
    annotations for defining ODM mappings. You then took a deep dive into the ODM
    framework and built a Patron service and custom converters.


    Up to this point in the book, you have created several variations of service and
    DAO implementations. In the next chapter, you will explore Spring LDAP’s transaction
    support.


