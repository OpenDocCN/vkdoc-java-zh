    Listing 6-9

    Example of a greater than filter

    ```


    ### LessThanOrEqualsFilter


    The `LessThanOrEqualsFilter` can be used to match entries lexicographically equal
    or lower than the given attribute. So, the search expression `(postalCode<=57018)`
    will return all entries with the postal code lower or equal to 57018. Listing
    [6-10](#319409_2_En_6_Chapter.xhtml#PC25) shows the test code that invokes `searchAndPrintResults`
    implementation of this requirement along with the output.


    ```

    @Test

    @DisplayName("Check that search operation using less than or equals filter works")

    public void should_works_lessThanOrEqualsFilter() {

    Filter filter = new LessThanOrEqualsFilter("postalCode", "57018");

    List results = searchFilter.searchAndPrintResults(filter);

    assertAll(

    () -> assertNotNull(results),

    () -> assertEquals(56, results.size())

    );

    }

    Results found in search: 56

    Full name: Aaccf Amar

    Full name: Aaren Atp

    Full name: Abbi Abbott

    Full name: Abby Abdo

    Full name: Abdallah Abdul-Nour

    .........

    .........

    Listing 6-10

    Example of a less than filter

    ```


    As mentioned, the search includes entries with postal code 57018. The LDAP specification
    does not provide a less than (`<`) operator. However, it is possible to combine
    `NotFilter` with `GreaterThanOrEqualsFilter` to obtain "less than" functionality.
    Here is an implementation of this idea:


    ```

    NotFilter lessThanFilter = new NotFilter(new GreaterThanOrEqualsFilter("postalCode",
    "557018"));

    ```


    ### AndFilter


    The `AndFilter` is used to combine multiple search filter expressions to create
    complex search filters. The resulting filter will match entries that meet all
    the subfilter conditions. For example, the `AndFilter` is suitable for implementing
    an earlier requirement to get all the patrons that live in the Midvale area and
    have an email address. The following code shows this implementation:


    ```

    AndFilter andFilter = new AndFilter();

    andFilter.and(new EqualsFilter("postalCode", "95571"));

    andFilter.and(new PresentFilter("mail"));

    ```


    Invoking the `encode` method on this filter results in `(&(postalCode=95571)(email=*))`.
    Listing [6-11](#319409_2_En_6_Chapter.xhtml#PC28) shows the test case that creates
    the `AndFilter` and calls the `searchAndPrintResults` method.


    ```

    @Test

    @DisplayName("Check that search operation using and filter works")

    public void should_works_andFilter() {

    AndFilter andFilter = new AndFilter();

    andFilter.and(new EqualsFilter("postalCode", "95571"));

    andFilter.and(new PresentFilter("mail"));

    List results = searchFilter.searchAndPrintResults(andFilter);

    assertAll(

    () -> assertNotNull(results),

    () -> assertEquals(1, results.size())

    );

    }

    Results found in search: 1

    Full name: Abbey Abbie

    Listing 6-11

    Example of an and filter

    ```


    ### OrFilter


    Like the `AndFilter`, an `OrFilter` can combine multiple search filters. However,
    the resulting filter will match entries meeting any subfilter conditions. Here
    is one implementation of the `OrFilter`:


    ```

    OrFilter orFilter = new OrFilter();

    orFilter.add(new EqualsFilter("postalcode", "51911"));

    orFilter.add(new EqualsFilter("postalcode", "48200"));

    ```


    This `OrFilter` will retrieve all patrons that live in either the 51911 or the
    48200 postal code. The `encode` method returns the expression `(|(postalcode =51911)(postalcode=48200))`.
    The test case for the `OrFilter` is shown in Listing [6-12](#319409_2_En_6_Chapter.xhtml#PC30).


    ```

    @Test

    @DisplayName("Check that search operation using or filter works")

    void should_works_orFilter() {

    OrFilter orFilter = new OrFilter();

    orFilter.or(new EqualsFilter("postalCode", "51911"));

    orFilter.or(new EqualsFilter("postalCode", "48200"));

    List results = searchFilter.searchAndPrintResults(orFilter);

    assertAll(

    () -> assertNotNull(results),

    () -> assertEquals(2, results.size())

    );

    }

    Results found in search: 2

