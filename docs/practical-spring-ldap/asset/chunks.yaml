    In Listing [7-14](#319409_2_En_7_Chapter.xhtml#PC17), you start implementing by
    obtaining a context on the LDAP server. Then, you create the `PagedResultsControl`
    and specify the page size as its constructor parameter. You add the control to
    the context and perform the search operation. Then, you loop through the search
    results and display the information on the console. As the next step, you examine
    the response controls to identify the server sent `PagedResultsResponseControl`.
    From that control, you extract the cookie and an estimated total number of results
    for this search. The resulting count is optional information, and the server can
    simply return zero, indicating an unknown count. Finally, you create a new `PagedResultsControl`
    with the page size and the cookie as its constructor parameter. This process is
    repeated until the server sends an empty (null) cookie, indicating no more results
    to be processed.


    Spring LDAP abstracts most of the code in Listing [7-14](#319409_2_En_7_Chapter.xhtml#PC17),
    making it easy to deal with page controls using the `PagedResultsDirContextProcessor`.


    In this implementation, you create the `PagedResultsDirContextProcessor` with
    the page size and a cookie. Note that you are using the `org.springframework.ldap.control.PagedResultsCookie`
    class for abstracting the cookie sent by the server. The cookie value initially
    starts with a null. Then, you perform the search and loop through the results.
    The cookie the server sends is extracted from the `DirContextProcessor` and is
    used to check for future search requests. You also use a `LastNameMapper` class
    to extract the last name from the results context. Listing [7-15](#319409_2_En_7_Chapter.xhtml#PC18)
    gives the implementation of the `LastNameMapper` class.


    ```

