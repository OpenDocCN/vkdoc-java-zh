    ## Implementing Custom DirContextProcessor


    In Spring LDAP, `SortControlDirContextProcessor` can sort only on one LDAP attribute.
    The JNDI API, however, allows you to sort on multiple attributes. Since there
    will be cases where you would like to sort your search results on multiple attributes,
    let’s implement a new `DirContextProcessor` that will allow you to do this in
    Spring LDAP.


    As you have seen, the sort operation requires a request control and will send
    a response control. So, the easiest way to implement this functionality is to
    extend the `AbstractFallbackRequestAndResponseControlDirContextProcessor`. Listing
    [7-9](#319409_2_En_7_Chapter.xhtml#PC11) shows the initial code with empty abstract
    method implementation. As you will see, you are using three instance variables
    to hold the state of the control. The `sortKeys` will hold the attribute names
    you will be sorting on. The `sorted` and the `resultCode` variables will hold
    the information extracted from the response control.


    ```

    package com.apress.book.ldap.control;

    import javax.naming.ldap.Control;

