    ## Update Method


    Updating an entry involves adding, replacing, or removing its attributes. The
    simplest way to achieve this is to remove the entire entry and create it with
    a new set of attributes. This technique is referred to as rebinding. Deleting
    and recreating an entry could be more efficient, and it makes more sense to operate
    on changed values.


    In Chapter [3](#319409_2_En_3_Chapter.xhtml) you used the `modifyAttributes` and
    `ModificationItem` instances for updating LDAP entries. Even though `modifyAttributes`
    is a nice approach, it does require a lot of work to manually generate the `ModificationItem`
    list. Thankfully, `DirContextAdapter` automates this and makes updating an entry
    a breeze. Listing [5-14](#319409_2_En_5_Chapter.xhtml#PC17) shows the `update`
    method implementation using `DirContextAdapter`.


    ```

    @Override

    public void update(Employee employee) {

    DistinguishedName dn = getDistinguishedName(employee.getUid());

    DirContextOperations context = ldapTemplate.lookupContext(dn);

    context.setAttributeValues("objectClass",

    new String[] { "top", "person", "organizationalperson", "inetorgperson" });

    context.setAttributeValue("givenName", employee.getFirstName());

    context.setAttributeValue("sn", employee.getLastName());

    context.setAttributeValue("cn", employee.getCommonName());

    context.setAttributeValue("mail", employee.getEmail());

    context.setAttributeValue("employeeNumber", employee.getEmployeeNumber());

    context.setAttributeValues("telephoneNumber", employee.getPhone());

    ldapTemplate.modifyAttributes(context);

    }

    Listing 5-14

    Method to update attributes

    ```


    In this implementation, you will notice that you first look up the existing context
    using the employee’s DN. Then you set all the attributes as you did in the `create`
    method. (The difference is that `DirContextAdapter` keeps track of value changes
    made to the entry.) Finally, you pass in the updated context to the `modifyAttributes`
    method. The `modifyAttributes` method will retrieve the modified item list from
    the `DirContextAdapter` and perform those modifications on the entry in LDAP.
    Listing [5-15](#319409_2_En_5_Chapter.xhtml#PC18) shows the associated test case
    that updates an employee’s first name.


    ```

    @Test

    @DisplayName("Check that operation update one employee")

    public void should_update_an_employee() {

    Employee employee = employeeDao.find("employee1");

    employee.setFirstName("Employee New");

    employeeDao.update(employee);

    employee = employeeDao.find("employee1");

    assertEquals(employee.getFirstName(), "Employee New");

    }

