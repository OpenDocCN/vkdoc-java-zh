    ### NotPresentFilter


    `NotPresentFilter`s are used to retrieve entries that don’t have a specified attribute.
    Attributes that do not have any value in an entry are considered to be not present.
    Now, let’s say you want to retrieve all patrons that don’t have an email address.
    To do this, you create an instance of `NotPresentFilter`, as shown:


    ```

    NotPresentFilter notPresentFilter = new NotPresentFilter("email");

    ```


    The encoded version of the `notPresentFilter` results in the expression `!(email=*)`.
    Running the `searchAndPrintResults` results in the output shown in Listing [6-7](#319409_2_En_6_Chapter.xhtml#PC20).
    The first null is for the organizational unit entry `"ou=patrons,dc=inflinx,dc=com"`.


    ```

    @Test

    @DisplayName("Check that search operation using non present filter works")

    public void should_works_notPresentFilter() {

    Filter filter = new NotPresentFilter("email");

    List results = searchFilter.searchAndPrintResults(filter);

    assertAll(

    ()-> assertNotNull(results),

    ()-> assertEquals(1, results.size())

    );

    }

    Results found in search: 1

    Full name: Aggy Ahad

    Listing 6-7

    Example of a not present filter

    ```


    ### Not Filter


    A `NotFilter` is helpful for retrieving entries that do not match a given condition.
    In the “LikeFilter” section, you looked at retrieving all entries that start with
    Ja. Now let’s say you want to retrieve all entries that don’t start with ***Ade***.
    This is where a `NotFilter` comes into the picture. Here is the code for accomplishing
    this requirement:


    ```

    NotFilter notFilter = new NotFilter(new LikeFilter("givenName", "Ade*"));

    ```


    Encoding this filter results in the string `!(givenName=Ade*)`. As you can see,
    the `NotFilter` adds the negation symbol (`!`) to the filter passed into its constructor.
    Invoking the `searchAndShowResults` method results in the output shown in Listing
    [6-8](#319409_2_En_6_Chapter.xhtml#PC22).


    ```

    @Test

    @DisplayName("Check that search operation using non filter works")

    public void should_works_notFilter() {

    NotFilter notFilter = new NotFilter(new LikeFilter("givenName", "Ade*"));

    List results = searchFilter.searchAndPrintResults(notFilter);

    assertAll(

    ()-> assertNotNull(results),

    ()-> assertEquals(86, results.size())

    );

    }

    Results found in search: 86

