    ### LDAP Injection


    LDAP injection is a technique where an attacker alters an LDAP query to run arbitrary
    LDAP statements against the directory server. LDAP injection can result in unauthorized
    data access or modifications to the LDAP tree. Applications that don’t perform
    proper input validation or sanitize their input are prone to `LDAP injection`.
    This technique is similar to the popular `SQL injection` attack used against databases.


    To better understand LDAP injection, consider a web application that uses LDAP
    for authentication. Such applications usually provide a web page that lets a user
    enter their username and password. To verify that the username and password match,
    the application would construct an LDAP search query that looks more or less like
    this:


    ```

    (&(uid=USER_INPUT_UID)(password=USER_INPUT_PWD))

    ```


    Let’s assume that the application simply trusts the user input and doesn’t perform
    any validation. Now if you enter the text `jdoe)(&))(` as the username and any
    random text as password, the resulting search query filter would look like this:


    ```

    (&(uid=jdoe)(&))((password=randomstr))

    ```


    If the username `jdoe` is a valid user id in LDAP, then regardless of the entered
    password, this query will always evaluate to true. This LDAP injection would allow
    an attacker to bypass authentication and get into the application. The `LDAP Injection
    & Blind LDAP Injection` article^([^(76)](#fn76)) discusses various LDAP injection
    techniques in great detail.


    Preventing LDAP injection, and any other injection techniques in general, begins
    with proper input validation. It is essential to sanitize the entered data and
    properly encode it before it is used in search filters.


    ## Spring LDAP Filters


    In the previous section, you learned that LDAP search filters are essential for
    narrowing down the search and identifying entries. However, dynamically creating
    LDAP filters can be tedious, especially when combining multiple filters. Making
    sure that all the braces are correctly closed can be error-prone. It is also important
    to escape special characters correctly.


    Spring LDAP provides several filter classes that make creating and encoding LDAP
    filters easy. All these filters implement the `Filter` interface and are part
    of the `org.springframework.ldap.filter` package. Listing [6-1](#319409_2_En_6_Chapter.xhtml#PC9)
    shows the `Filter API` interface.


    ```

    package `org.springframework.ldap.filter`;

    public interface `Filter` {

    `String` encode();

    `StringBuffer` encode(`StringBuffer` buf);

    `boolean` equals(Object o);

    `int` hashCode();

    }

    Listing 6-1

    The `Filter` interface definition with all the methods

    ```


    The first `encode` method in this interface returns a string representation of
    the filter. The second `encode` method accepts a `StringBuffer` as its parameter
    and returns the encoded version of the filter as a `StringBuffer`. For your regular
    development process, you use the first version of the `encode` method that returns
    `String`.


    The `Filter` interface hierarchy is shown in Figure [6-2](#319409_2_En_6_Chapter.xhtml#Fig2).
    The hierarchy shows that `AbstractFilter` implements the `Filter` interface and
    acts as the root class for all other filter implementations. The `BinaryLogicalFilter`
    is the abstract superclass for binary logical operations such as `AND` and `OR`.
    The `CompareFilter` is the abstract superclass for filters that compare values
    such as `EqualsFilter` and `LessThanOrEqualsFilter`.


    Note


    Most LDAP attribute values, by default, are case-insensitive for searches.


    ![](images/319409_2_En_6_Chapter/319409_2_En_6_Fig2_HTML.jpg)


    A hierarchy chart begins with the filter, continues with abstract filter, which
    is then subdivided into compare filter and binary logical filter, hardcoded filter,
    not filter, not present filter, and present filter.


    Figure 6-2


    Filter hierarchy


    In the coming sections, you will look at each of the filters in Figure [6-2](#319409_2_En_6_Chapter.xhtml#Fig2).
    Before you do that, let’s create a reusable method that will help you test your
    filters. Listing [6-2](#319409_2_En_6_Chapter.xhtml#PC10) shows you how the class
    looks like.


    ```

    package `com.apress.book.ldap.filter`;

    import `java.util.List`;

    import `com.apress.book.ldap.domain.Patron`;

    import `com.apress.book.ldap.mapper.PatronContextMapper`;

    import `org.slf4j.Logger`;

    import `org.slf4j.LoggerFactory`;

    import `org.springframework.beans.factory.annotation.Autowired`;

    import `org.springframework.beans.factory.annotation.Qualifier`;

    import `org.springframework.ldap.core.LdapTemplate`;

    import `org.springframework.ldap.filter.Filter`;

    import `org.springframework.stereotype.Component`;

    `@Component`(`"searchFilter"`)

    public class `SearchFilter` {

    private static final `Logger` logger = `LoggerFactory`.getLogger(`SearchFilter`.class);

    private `LdapTemplate` ldapTemplate;

    public `SearchFilter`( `@Autowired` `@Qualifier`(`"ldapTemplate"`) `LdapTemplate`
    ldapTemplate) {

    this.ldapTemplate = ldapTemplate;

    }

    public `List` `searchAndPrintResults`(`Filter` filter) {

    `List` results = ldapTemplate.search(`"ou=patrons,dc=inflinx,dc=com"`, filter.encode(),
    new `PatronContextMapper`());

    logger.info(`"Results found in search: "` + results.size());

    for (`Patron` patron : results) {

    logger.info(patron.toString());

    }

    return results;

    }

    }

    Listing 6-2

    The `Search` class receives a `filter`

    ```


    The class in Listing [6-2](#319409_2_En_6_Chapter.xhtml#PC10) uses the class `Patron`,
    which you saw in previous chapters, and a `PatronContextMapper`, which follows
    the same idea of the previous chapters to define a class that does the transformation
    from LDAP to a concrete object. Listing [6-3](#319409_2_En_6_Chapter.xhtml#PC11)
    shows you how the class looks like.


    ```

    package `com.apress.book.ldap.mapper`;

    import `com.apress.book.ldap.domain.Patron`;

    import `org.springframework.ldap.core.DirContextOperations`;

    import `org.springframework.ldap.core.support.AbstractContextMapper`;

    public class `PatronContextMapper` extends `AbstractContextMapper` {

    @Override

    protected `Patron` doMapFromContext(`DirContextOperations` context) {

    `Patron` patron = new `Patron`();

    patron.setUid(context.getStringAttribute(`"uid"`));

    patron.setFirstName(context.getStringAttribute(`"givenName"`));

    patron.setLastName(context.getStringAttribute(`"sn"`));

    patron.setFullName(context.getStringAttribute(`"cn"`));

    patron.setEmail(context.getStringAttribute(`"mail"`));

    return patron;

    }

