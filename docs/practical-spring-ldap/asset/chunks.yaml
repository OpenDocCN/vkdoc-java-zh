  trans: "\n## 安全模型\n\nLDAP 安全模型保护 LDAP 目录信息免受未经授权的访问。该模型指定了哪些客户端可以访问目录的哪些部分以及允许哪些操作（搜索\
    \ vs. 更新）。\n\nLDAP 安全模型基于客户端向服务器进行身份验证。如前所述，此身份验证过程或绑定操作涉及客户端提供一个标识自身的 DN 和密码。如果客户端未提供\
    \ DN 和密码，则会建立匿名会话。RFC 2829^(²³) 定义了 LDAP V3 服务器必须支持的一组身份验证方法。成功身份验证后，会查阅访问控制模型以确定客户端是否有权限执行请求的操作。不幸的是，目前尚无统一的访问控制模型标准，每个供应商都提供了自己的实现方案。\n\
    \n## LDIF 格式\n\nLDAP 数据交换格式（LDIF）是一种用于表示目录内容和更新请求的标准文本格式。LDIF 格式在 RFC 2849 中定义。^(²⁴)\
    \ LDIF 文件通常用于将数据从一个目录服务器导出并导入到另一个目录服务器中。它也常用于目录数据归档以及对目录进行批量更新。你将使用 LDIF 文件来存储测试数据，并在单元测试之间刷新目录服务器。\n\
    \n在 LDIF 文件中表示的条目基本格式如下：\n\n```\n#comment\ndn: \nobjectClass:  \nobjectClass:\
    \  \n...\n...\n: \n: \n...\n```\n\n以 # 字符开头的 LDIF 文件行被视为注释。`dn` 和至少一个 `objectClass`\
    \ 条目定义被视为必需项。属性以名称/值对的形式表示，名称和值之间用冒号分隔。多个属性值通过单独的行表示，且具有相同的属性类型。由于 LDIF 文件是纯文本格式，因此二进制数据在存储为\
    \ LDIF 文件的一部分前需要进行 Base64 编码。\n\n空白行用于分隔 LDIF 文件中的多个条目。列表 1-1 展示了一个包含三个员工条目的 LDIF\
    \ 文件。请注意，`cn` 属性是多值属性，每个员工的 `cn` 属性都表示两次。\n\n```\n# Barbara 的条目\ndn: cn=Barbara\
    \ J Jensen,  dc=example, dc=com\n# 多值属性\ncn: Barbara J Jensen\ncn:  Babs Jensen\n\
    objectClass:  person\nsn: Jensen\n# Bjorn 的条目\ndn: cn=Bjorn J Jensen,  dc=example,\
    \ dc=com\ncn: Bjorn J Jensen\ncn:  Bjorn Jensen\nobjectClass:  person\nsn: Jensen\n\
    # Base64 编码的 JPEG 图片\njpegPhoto:: /9j/4AAQSkZJRgABAAAAAQABAAD/2wBDABALD A4MChAODQ4SERATGCgaGBYWGDEjJR0oOjM9PDkzODdASFxOQ\
    \ ERXRTc4UG1RV19iZ2hnPk1xeXBkeFxlZ2P/2wBDARESEhgVG\n# Jennifer 的条目\ndn: cn=Jennifer\
    \  J Jensen,  dc=example, dc=com\ncn: Jennifer J Jensen\ncn: Jennifer  Jensen\n\
    objectClass: person\nsn: Jensen\n列表 1-1\n包含三个员工条目的 LDIF 文件\n```\n\n## LDAP 历史\n\
    \nLDAP 由 Tim Howes、Steve Kille 和 Wengyik Yeong 开发，旨在创建一种网络协议以获取数据。1993 年出现了 RFC\
    \ 1487 的第一版草案，^(²⁵) 其中包含了基于 X.500 访问的 LDAP 规范。\n\n第一个版本作为 X.500 目录的代理或网关，X.500\
    \ 是 1980 年代开发的综合目录服务。\n\nTim Howes 与其同事创建了 *Open Source University of Michigan\
    \ LDAP Implementation*（密歇根大学开源 LDAP 实现），这成为所有 LDAP 服务器的参考标准。该项目的网站目前仍处于活动状态^(²⁶)，仅用于历史参考。\n\
    \n第二个版本（首个可运行版本 LDAPv2）于 1993 年发布，作为互联网工程任务组（IETF）的建议标准，包含基本操作如搜索和修改信息。此版本功能有限，且在安全机制方面存在一些问题。\n\
    \n第三个版本（最新可用版本）于 1997 年发布，包含许多与安全相关的改进，如传输层安全协议（TLS）和对引用的支持。它基于 RFC 2251^(²⁷)\
    \ 和 RFC 4519^(²⁸) 等 RFC 文档，这些文档解释了协议和支持的数据模型。此版本成为目录服务的实际上标准，许多应用程序都支持集成和使用 LDAP\
    \ 以获取特定信息。\n"
