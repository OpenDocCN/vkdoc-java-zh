    \ Spring LDAP 应用程序。\n\n脚注 1   2   3   4   5   6   7   8\n\n# 4. 测试 LDAP 代码\n\n\
    测试是软件开发过程中必不可少的环节。除了检测错误外，它还有助于验证所有需求是否得到满足，并确保软件按预期工作。如今，无论正式还是非正式，测试几乎被包含在软件开发过程的每个阶段。根据测试内容和测试目的的不同，我们会得到多种类型的测试。开发人员最常见的测试是单元测试，它确保各个单元按预期工作。集成测试通常在单元测试之后进行，专注于已测试组件之间的交互。开发人员通常会参与创建自动化集成测试，尤其是涉及数据库和目录的测试。接下来是系统测试，对完整的集成系统进行评估，以确保所有需求都得到满足。性能和效率等非功能性需求也会作为系统测试的一部分进行测试。验收测试通常在最后进行，以确保交付的软件满足客户/业务用户的需求。\n\
    \n**注意**  \n本章仅涵盖单元测试和集成测试的基本方面。如需了解更多关于测试的内容，可以阅读 Martin Fowler 的^(⁴⁵)博客，该博客涉及\
    \ BDD、各种测试类型和良好实践等主题。\n\n## 测试相关概念\n\n在深入探讨检查 LDAP 不同操作的测试创建之前，澄清一些与测试相关的术语是有必要的。\n"
- fmt: "\n### Unit Testing\n\nUnit testing is a methodology where the smallest parts\
    \ of the application, referred to as units, are verified and validated individually\
    \ in isolation. In structural programming, the unit could be an individual method\
    \ or function. In object-oriented programming (OOP), an object is the smallest\
    \ executable unit. Interaction between objects is central to any OO design and\
    \ is usually done by invoking methods. Thus, unit testing in OOP can range from\
    \ testing individual methods to testing a cluster of objects.\n\nWriting unit\
    \ tests requires a developer’s time and effort. But this investment has been proven\
    \ to deliver several undeniable benefits.\n\n`Note`  \nIt is essential to measure\
    \ how much of the code is covered by unit tests. To do this, several tools could\
    \ help you, like `Emma`,^([^(46)](#fn46)) `Clover`,^([^(47)](#fn47)) and `Jacoco`.^([^(48)](#fn48))\
    \ The most used of the tools is `Jacoco`, which allows you to upload the metrics\
    \ to `Sonar5` to centralize all the information about the coverage of all your\
    \ applications and give you the possibility to define quality gates which indicates\
    \ the minimum coverage your company accepts.\n\nIf you want to learn more about\
    \ what code coverage implies and how the tools generate the percentage of coverage,\
    \ there is an excellent article on Martin Fowler’s blog.^([^(49)](#fn49))\n\n\
    The most significant advantage of unit testing is that it can help identify bugs\
    \ at the early stages of development. Bugs discovered only during QA or in production\
    \ consume much more debugging time and money. Also, a good set of unit tests acts\
    \ as a safety net and gives confidence when code is refactored. Unit tests can\
    \ help improve the design and even serve as documentation.\n\nGood unit tests\
    \ have the following characteristics:\n\n* Every unit test must be independent\
    \ of other tests. This atomic nature is essential, and each test must not cause\
    \ any side effects to other tests. Unit tests should also be order independent.\n\
    \n* A unit test must be repeatable. For a unit test to be of any value, it must\
    \ produce consistent results. Otherwise, it cannot be used as a sanity check during\
    \ refactoring.\n\n* Unit tests must be easy to set up and clean up. So they should\
    \ not rely on external systems such as databases and servers.\n\n* Unit tests\
    \ must be fast and provide immediate feedback. It would not be productive to wait\
    \ on long-running tests before you make another change.\n\n* Unit tests must be\
    \ self-validating. Each test should contain enough information to determine whether\
    \ a test passes or fails automatically. No manual intervention should be needed\
    \ to interpret the results.\n\nEnterprise applications often use external systems\
    \ like databases, directories, and web services. This is especially true in the\
    \ DAO layer. Unit testing database code, for example, may involve starting a database\
    \ server, loading it with schema and data, running tests, and shutting down the\
    \ server. This quickly becomes tricky and complex. One approach is to use mock\
    \ objects and hide the external dependencies. Where this is not sufficient, it\
    \ may be necessary to use integration testing and test the code with external\
    \ dependencies intact.\n\nOne of the most used libraries to test a Java application\
    \ is `JUnit`,^([^(50)](#fn50)) which has many other libraries that add extra features,\
    \ including `Spring Boot Test`,^([^(51)](#fn51)) which uses the latest version\
    \ of `JUnit` to do certain operations. Consider other alternatives to testing\
    \ in Java, like `Spock`^([^(52)](#fn52)) or `TestNG`.^([^(53)](#fn53)) Still,\
    \ these are out of the scope of this book, discussing the pros and cons of each\
    \ possible option because there are many books and articles covering this topic.\n\
    \n### Mock Testing\n\nThe goal of mocks in testing is to use mock objects to simulate\
    \ real objects in controlled ways. Mock objects implement the same interface as\
    \ real objects but are scripted to mimic/fake and track their behavior. There\
    \ is no restriction about using mocks on any type of testing, but in this case,\
    \ it is applied to the unit tests.\n\nFor example, consider a `UserAccountService`\
    \ that has a method to create new user accounts. Implementing such a service usually\
    \ involves validating the account information against business rules, storing\
    \ the newly created account in a database, and sending a confirmation email. Persisting\
    \ data and emailing information are usually abstracted out to classes in other\
    \ layers. When writing a unit test to validate the business rules associated with\
    \ account creation, you might not care about the intricacies of the email notification\
