    ## Spring LDAP and Controls


    Spring LDAP does not provide access to a directory context when working with `LdapTemplate`''s
    search methods. As a result, you don’t have a way to add request controls to the
    context or process response controls. To address this, Spring LDAP provides a
    directory context processor that automates adding and analyzing LDAP controls
    to a context. Listing [7-4](#319409_2_En_7_Chapter.xhtml#PC5) shows the `DirContextProcessor`
    API code.


    ```

    package org.springframework.ldap.core;

    import javax.naming.NamingException;

    import javax.naming.directory.DirContext;

    public interface DirContextProcessor {

    void preProcess(DirContext var1) throws NamingException;

    void postProcess(DirContext var1) throws NamingException;

    }

    Listing 7-4

    DirContextProcessor interface

    ```


    Concrete implementations of the `DirContextProcessor` interface are passed to
    the `LdapTemplate`''s search methods. The `preProcess` method gets called before
    a search is performed. Hence, the concrete implementations will have logic in
    the `preProcess` method to add request controls to the context. The `postProcess`
    method will be called after the search execution. So, the concrete implementations
    will have logic in the `postProcess` method to read and analyze any response controls
    that the LDAP server would have sent.


    Figure [7-5](#319409_2_En_7_Chapter.xhtml#Fig5) shows the UML representation of
    the `DirContextProcessor` and all its implementations.


    ![](images/319409_2_En_7_Chapter/319409_2_En_7_Fig5_HTML.jpg)


    An illustration of the dir context processor class hierarchy. Paged results and
    sort control dir context processors are followed by abstract fallback request
    and response and abstract request control dir context processors and end with
    a dir context processor.


    Figure 7-5


    `DirContextProcessor` class hierarchy


    The `AbstractRequestControlDirContextProcessor` implements the `preProcess` method
    of the `DirContextProcessor` and applies a single `RequestControl` on an `LdapContext`.
    The `AbstractRequestDirContextProcessor` delegates the actual creation of the
    request controls to the subclasses through the `createRequestControl` template
    method.


    The `AbstractFallbackRequestAndResponseControlDirContextProcessor` class extends
    the `AbstractRequestControlDirContextProcessor` and heavily uses reflection to
    automate `DirContext` processing. It performs the tasks of loading control classes,
    creating their instances, and applying them to the context. It also takes care
    of most of the post-processing of the response control, delegating a template
    method to the subclass that does the actual value retrieval.


    The `PagedResultsDirContextProcessor` and `SortControlDirContextProcessor` are
    used for managing paging and sorting controls. You will be looking at them in
    the coming sections.


    ## Sort Control


    The sort control provides a mechanism to request an LDAP server to sort the results
    of a search operation before sending them over to the client. This control is
    specified in RFC 2891.^([^(78)](#fn78)) The sort request control accepts one or
    more LDAP attribute names and supplies them to the server for sorting.


    Let’s look at using the sort control with the plain JNDI API. Listing [7-5](#319409_2_En_7_Chapter.xhtml#PC6)
    shows the code for sorting all search results by their last names. You start by
    creating a new instance of the `javax.naming.ldap.SortControl` and provide it
    with the `sn` attribute indicating your intention to sort by last name. You have
    also indicated that this is a critical control by providing the `CRITICAL` flag
    to the same constructor. This request control is then added to the context using
    the `setRequestControls` method, and the LDAP search operation is performed. You
    then loop through the returned results and print them to the console. Finally,
    you look at the response controls. The sort response control holds the result
    of the sort operation. If the server fails to sort the results, you indicate this
    by throwing an exception.


    ```

    package com.apress.book.ldap.sorting;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    import java.util.Properties;

    import javax.naming.NamingEnumeration;

    import javax.naming.NamingException;

    import javax.naming.directory.DirContext;

    import javax.naming.directory.SearchControls;

    import javax.naming.directory.SearchResult;

    import javax.naming.ldap.Control;

    import javax.naming.ldap.InitialLdapContext;

    import javax.naming.ldap.LdapContext;

    import javax.naming.ldap.SortControl;

    import javax.naming.ldap.SortResponseControl;

    public class SortingJndi {

    private static final Logger logger = LoggerFactory.getLogger(SortingJndi.class);

    // We will be getting the LDAP context

    private `LdapContext` getContext() {

    Properties environment = new Properties();

    environment.setProperty(`DirContext.INITIAL_CONTEXT_FACTORY`, "com.sun.jndi.ldap.LdapCtxFactory");

    environment.setProperty(`DirContext.PROVIDER_URL`, "ldap://localhost:11389");

    environment.setProperty(`DirContext.SECURITY_PRINCIPAL`, "cn=Directory Manager");

    environment.setProperty(`DirContext.SECURITY_CREDENTIALS`, "secret");

    try {

    // The second argument is the list of controls that we need to send

    // as part of the connection request

    return new InitialLdapContext(environment, null);

    } catch (NamingException e) {

    logger.error(e.getClass() + ": " + e.getMessage());

    return null;

    }

    }

    public void sortByLastName() {

    try {

    `LdapContext` context = getContext();

    Control lastNameSort = new SortControl(`"sn"`, `Control.CRITICAL`);

    context.setRequestControls(new Control[] { lastNameSort });

    SearchControls searchControls = new SearchControls();

    searchControls.setSearchScope(SearchControls.SUBTREE_SCOPE);

    NamingEnumeration results = context.search(`"dc=inflinx,dc=com"`, `"(objectClass=inetOrgPerson)"`,

    searchControls);

    // Iterate over search results and display patron entries

    while (results != null && results.hasMore()) {

    SearchResult entry = (SearchResult) results.next();

    logger.info(entry.getAttributes().get(`"sn"`) + " ( " + (entry.getName()) + "
    )");

    }

    // Now that we have looped, we need to look at the response controls

    Control[] responseControls = context.getResponseControls();

    if (null != responseControls) {

    for (Control control : responseControls) {

    if (control instanceof SortResponseControl) {

    SortResponseControl sortResponseControl = (SortResponseControl) control;

    if (!sortResponseControl.isSorted()) {

    // Sort did not happen. Indicate this with an exception

    throw sortResponseControl.getException();

    }

    }

    }

    }

    context.close();

    } catch (Exception e) {

    logger.error(e.getClass() + ": " + e.getMessage());

    }

    }

    public static void main(String[] args) {

    SortingJndi sortingJndi = new SortingJndi();

    sortingJndi.sortByLastName();

    }

    }

    Listing 7-5

    A sorting example using JNDI

    ```


    The output should display the sorted patrons as follows:

