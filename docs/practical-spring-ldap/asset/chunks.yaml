    ## 总结


    Java 为您提供了一组接口和类，可以简单地访问和执行不同 LDAP 操作，只要您不需要进行复杂操作。


    下一章将探讨如何使用 Spring LDAP 进行某些操作，正如您在本章中所看到的。其目的是向您展示 Spring LDAP 如何通过像 Spring Data
    对需要访问数据库的应用程序那样，简化某些操作的复杂性。


    脚注 1   2   3   4   5   6   7   8


    # 3. 介绍 Spring LDAP


    Spring LDAP^(³⁷) 为 Java 中的 LDAP 编程提供了简单、整洁且全面的支持。该项目最初于 2006 年在 SourceForge 上以
    LdapTemplate 名称启动，旨在通过 JNDI 简化对 LDAP 的访问。该项目后来成为 Spring Framework 产品组合的一部分，并取得了长足的发展。图
    3-1 展示了基于 Spring LDAP 的应用程序架构。


    ![](img/319409_2_En_3_Fig1_HTML.jpg)


    Spring LDAP 架构图。应用程序后接 Spring LDAP 和 Spring 核心。所有组件均与目录互联。


    图 3-1


    Spring LDAP 架构图


    应用程序代码使用 Spring LDAP API 执行 LDAP 服务器操作。Spring LDAP 框架包含所有特定于 LDAP 的代码和抽象层。然而，Spring
    LDAP 会依赖 Spring Framework 来满足其部分基础设施需求。


    Spring Framework 已成为开发基于 Java 的企业应用程序的标准。除了许多其他功能外，它还提供了一种基于依赖注入的轻量级替代方案，用于 JEE
    编程模型。Spring Framework 是 Spring LDAP 及其他所有 Spring 产品项目的基石，例如 Spring MVC 和 Spring
    Security。


    ## 动机


    在上一章中，我们讨论了 JNDI API 的不足之处。JNDI 的一个显著缺点是其代码冗长；第 2 章中的几乎所有代码都与底层实现相关，而与应用程序逻辑关联较少。Spring
    LDAP 通过提供模板和实用类来解决这个问题，这些类处理底层代码，使开发者能够专注于业务逻辑。


    JNDI 的另一个显著问题在于需要开发者显式管理资源，如 LDAP 上下文。这可能会导致非常容易出错。忘记关闭资源可能导致泄漏，并在高负载下迅速导致应用程序崩溃。Spring
    LDAP 会为您管理这些资源，并在您不再需要时自动关闭它们。它还提供了对 LDAP 上下文进行池化的功能，这可以提高性能。


    在执行 JNDI 操作时出现的任何问题都会以`NamingException`或其子类的形式报告。`NamingException`是一个受检异常，因此开发者被迫处理它。数据访问异常通常不可恢复，且大多数情况下只能做很少的处理来捕获这些异常。为了解决这个问题，Spring
    LDAP 提供了一致的未受检异常层次结构，模仿`NamingException`。这使应用程序设计者能够选择何时以及何处处理这些异常。


    最后，普通的 JNDI 编程对新开发者来说很困难且令人望而生畏。Spring LDAP 通过其抽象层使与 JNDI 的工作更加愉快。此外，它还提供了诸如对象-目录映射和事务支持等特性，使其成为任何企业
    LDAP 开发者的必备工具。


    ## Spring LDAP 文档和源代码


    Spring Framework 产品项目可以在官方网站的文档中查阅。^(³⁸) Spring LDAP 网站上有一个直接链接，^(³⁹) 或者您可以在 GitHub
    仓库中查看源代码。^(⁴⁰)


    Spring LDAP 的源代码可以为您提供有关框架架构的宝贵见解。它还包括一个丰富的测试套件，可以作为额外的文档并帮助您理解框架。您应该下载并查看源代码。Git
    仓库还包含一个沙盒文件夹，其中包含一些实验性功能，这些功能可能或可能不会被纳入框架。


    ## Spring LDAP 打包


    现在您已经可以访问 Spring LDAP 框架的文档和源代码，让我们深入了解不同的组件。LDAP 框架被打包成六个组件，表 3-1 简要描述了每个组件。


    表 3-1


    Spring LDAP 发行模块


    | 组件 | 描述 |

    | --- | --- |

    | `spring-ldap-core` | 包含使用 LDAP 框架所需的所有类。此 jar 文件是所有应用程序的必需品。 |

    | `spring-ldap-core-tiger` | 包含特定于 Java 5 及以上版本的类和扩展。运行在 Java 5 上的应用程序不应使用此 jar
    文件。 |

    | `spring-ldap-test` | 包含简化测试的类和工具。它还包括启动和停止 ApacheDS LDAP 服务器内存实例的类。 |

    | `spring-ldap-ldif-core` | 包含解析 ldif 格式文件的类。 |

    | `spring-ldap-ldif-batch` | 包含将 ldif 解析器与 Spring Batch 框架集成所需的类。 |

    | `spring-ldap-odm` | 包含启用和创建对象-目录映射的类。 |


    除了 Spring Framework，您还需要额外的 jar 文件来使用 Spring LDAP 编译和运行应用程序。表 3-2 列出了一些这些依赖 jar
    文件，并描述了它们的用途。


    表 3-2


    Spring LDAP


    | 库 | 描述 |

    | --- | --- |

    | `slf4j`^(⁴¹) | 日志记录在 Spring LDAP 和 Spring Framework 内部使用。这是必须包含在应用程序中的 jar 文件。
    |

    | `spring-core` | 包含 Spring LDAP 内部使用的核心工具的 Spring 库。这是使用 Spring LDAP 的必需库。 |

    | `spring-beans` | 用于创建和管理 Spring Bean 的 Spring Framework 库。Spring LDAP 需要另一个库。
    |

    | `spring-context` | 负责依赖注入的 Spring 库。这是在 Spring 应用程序中使用 Spring LDAP 时必需的。 |

    | `spring-tx` | 提供事务抽象的 Spring Framework 库。这是在使用 Spring LDAP 事务支持时必需的。 |

    | `spring-jdbc` | 该库简化了通过 JDBC 底层访问数据库的操作。这是一个可选库，应用于事务支持。 |

    | `commons-pool`^(⁴²) | Apache Commons Pool 库提供池化支持。在使用 Spring LDAP 池化支持时应包含此库。
    |

    '
