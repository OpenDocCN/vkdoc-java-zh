    ## Implementing Finder Methods


    Implementing the `findAll` method of the `Employee` DAO requires searching LDAP
    for all the employee entries and creating `Employee` instances with the returned
    entries. To do this, you will be using the following method in the `LdapTemplate`
    class:


    ```

    public List search(String base, String filter, ParameterizedContextMapper mapper)

    ```


    Since you are using the `DefaultDirObjectFactory`, every time a search or a lookup
    is performed, every context found in the LDAP tree will be returned as an instance
    of `DirContextAdapter`. Like the search method you saw in Listing [3-8](#319409_2_En_3_Chapter.xhtml#PC15),
    the preceding search method takes `base` and `filter` parameters. Additionally,
    it takes an instance of `AbstractContextMapper<T>`. The preceding `search` method
    will pass the returned `DirContextAdapters` to the `ContextMapper<T>` instance
    for transformation.


    Listing [5-7](#319409_2_En_5_Chapter.xhtml#PC9) provides the context mapper implementation
    for mapping `Employee` instances. As you can see, the `EmployeeContextMapper`
    extends `AbstractContextMapper`, an abstract class that implements `ContextMapper`.


    ```

    package com.apress.book.ldap.repository.mapper;

    import com.apress.book.ldap.domain.Employee;

    import org.springframework.ldap.core.DirContextOperations;

    import org.springframework.ldap.core.support.AbstractContextMapper;

    public class EmployeeContextMapper extends AbstractContextMapper {

    @Override

    protected Employee doMapFromContext(DirContextOperations context) {

    Employee employee = new Employee();

    employee.setUid(context.getStringAttribute("uid"));

    employee.setFirstName(context.getStringAttribute("givenName"));

    employee.setLastName(context.getStringAttribute("sn"));

    employee.setCommonName(context.getStringAttribute("cn"));

    employee.setEmployeeNumber(context.getStringAttribute("employeeNumber"));

    employee.setEmail(context.getStringAttribute("mail"));

    employee.setPhone(context.getStringAttributes("telephoneNumber"));

    return employee;

    }

    }

    Listing 5-7

    An example of the implementation of a mapper

    ```


    In Listing [5-7](#319409_2_En_5_Chapter.xhtml#PC9), the `DirContextOperations`
    parameter to the `doMapFromContext` method is an interface for `DirContextAdapter`.
    As you can see, the `doMapFromContext` implementation involves creating a new
    `Employee` instance and reading the attributes you are interested in from the
    supplied context.


    With the `EmployeeContextMapper` in place, the `findAll` method implementation
    becomes trivial. Since all the employee entries have the `objectClass inetOrgPerson`,
    you will use `"(objectClass=inetOrgPerson)"` as the search filter. Listing [5-8](#319409_2_En_5_Chapter.xhtml#PC10)
    shows the `findAll` implementation.


    ```

    @Override

    public List findAll() {

    return ldapTemplate.search("", "(objectClass=inetOrgPerson)", new EmployeeContextMapper());

    }

    Listing 5-8

    Implementation of finding all the information from LDAP

    ```


    The other finder method can be implemented by searching an LDAP tree with the
    filter (`uid=<supplied employee id>`) or performing an LDAP lookup with an employee
    DN. Since search operations with filters are more expensive than looking up a
    DN, you will implement the `find` method using the lookup. Listing [5-9](#319409_2_En_5_Chapter.xhtml#PC11)
    shows the `find` method implementation.


    ```

    @Override

    public Employee find(String id) {

    DistinguishedName dn = new DistinguishedName();

    dn.add("uid", id);

    return ldapTemplate.lookup(dn, new EmployeeContextMapper());

    }

    Listing 5-9

    Implementation of finding one element on LDAP

    ```


    You start the implementation by constructing a DN for the employee. Since the
    initial context base is restricted to the employee branch, you have just specified
    the RDN portion of the employee entry. Then you use the `lookup` method to look
    up the employee entry and create an `Employee` instance using the `EmployeeContextMapper`.


    This concludes the implementation of both finder methods. Let’s create a JUnit
    test class for testing your finder methods. The test case is shown in Listing
    [5-10](#319409_2_En_5_Chapter.xhtml#PC12).


    ```

    package com.apress.book.ldap.repository;

    import java.util.List;

    import com.apress.book.ldap.domain.Employee;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.beans.factory.annotation.Qualifier;

    import org.springframework.ldap.core.DirContextAdapter;

    import org.springframework.ldap.core.DirContextOperations;

    import org.springframework.ldap.core.DistinguishedName;

    import org.springframework.ldap.core.LdapTemplate;

    import org.springframework.stereotype.Repository;

    import com.apress.book.ldap.repository.mapper.EmployeeContextMapper;

    @Repository("employeeDao")

    public class EmployeeDaoLdapImpl implements EmployeeDao {

    private LdapTemplate ldapTemplate;

    public EmployeeDaoLdapImpl(@Autowired @Qualifier("ldapTemplate") LdapTemplate
    ldapTemplate) {

    this.ldapTemplate = ldapTemplate;

    }

    @Override

    public List findAll() {

    return ldapTemplate.search("", "(objectClass=inetOrgPerson)", new EmployeeContextMapper());

    }

    @Override

    public Employee find(String id) {

    DistinguishedName dn = getDistinguishedName(id);

    return ldapTemplate.lookup(dn, new EmployeeContextMapper());

    }

    private DistinguishedName getDistinguishedName(String id) {

    DistinguishedName dn = new DistinguishedName();

    dn.add("uid", id);

    return dn;

    }

    // the logic will be added on the following pages

    @Override

    public void create(Employee employee) {}

    @Override

    public void delete(String id) {}

    @Override

    public void update(Employee employee) {}

    }

    Listing 5-10

    Implementation of tests on the search methods

    ```


    Notice that you have specified the `repositoryContext-test.xml` in the `ContextConfiguration`.
    This test context file is shown in Listing [5-11](#319409_2_En_5_Chapter.xhtml#PC13).
    You created an embedded LDAP server to run on port 18880 and populate using `employee.ldif`
    file, which needs to be located in the `src/test/resources` folder, containing
    the test data you will use throughout this book.


    ```

    Listing 5-11

    Configuration of the context

    ```


    Remember that each test will clear the database, so you can do a lot of operations
    without affecting the rest of the tests.

