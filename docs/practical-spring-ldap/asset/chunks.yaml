- fmt: '

    ## LDAP Transaction Support


    The LDAP protocol requires that all LDAP operations (modify or delete) follow
    ACID properties. This transactional behavior ensures consistency of the information
    stored in the LDAP server. However, LDAP does not define transactions across multiple
    operations. Consider the scenario where you want to add two LDAP entries as one
    atomic operation. Completing the operation means that both entries get added to
    the LDAP server. If there is a failure and one of the entries can’t be added,
    the server will automatically undo the addition of the other entry. Such transactional
    behavior is not part of the LDAP specification and does not exist in the world
    of LDAP. Also, the lack of transactional semantics, such as commit and rollback,
    makes it impossible to assure data consistency across multiple LDAP servers.


    Though transactions are not part of the LDAP specification, servers such as `IBM
    Tivoli Directory Server` and `ApacheDS` provide transaction support. The `Begin
    transaction` (OID `1.3.18.0.2.12.5`) and `End transaction` (OID `1.3.18.0.2.12.6`)
    extended controls supported by the `IBM Tivoli Directory Server` can restrict
    a set of operations inside a transaction. The RFC 5805^([^(90)](#fn90)) attempts
    to standardize transactions in LDAP and is currently in an experimental state.


    ### Note


    OIDs or object identifiers are used on LDAP in common elements on a schema, controls,
    and extended operations.


    ## Spring LDAP Transaction Support


    The lack of transactions in LDAP might initially seem surprising. More importantly,
    it can hinder enterprises’ widespread adoption of directory servers. To address
    this, Spring LDAP offers non-LDAP/JNDI-specific compensating transaction support.
    This transaction support integrates tightly with the Spring transaction management
    infrastructure you saw in the earlier section. Figure [9-3](#319409_2_En_9_Chapter.xhtml#Fig3)
    shows the components responsible for Spring LDAP transaction support.


    ![](images/319409_2_En_9_Chapter/319409_2_En_9_Fig3_HTML.jpg)


    A flow diagram. The `ContextSourceTransactionManager` class implements `PlatformTransactionManager`
    and manages LDAP-based transactions. This class and its collaborators keep track
    of the LDAP operations performed inside the transaction and record the state before
    each operation. If the transaction were to roll back, the transaction manager
    would take steps to restore the original state. The transaction manager uses a
    `TransactionAwareContextSourceProxy` to achieve this behavior instead of working
    directly with `LdapContextSource`. This proxy class also ensures that a single
    `javax.naming.directory.DirContext` instance is used throughout the transaction
    and will not be closed until the transaction is finished.


    ## Compensating Transactions


    A compensating transaction undoes the effects of a previously committed transaction
    and restores the system to a previous consistent state. Consider a transaction
    that involves booking an airline ticket. A compensating transaction in that scenario
    is an operation that cancels the reservation. In the case of LDAP, if an operation
    adds a new LDAP entry, the corresponding compensating transaction simply involves
    removing that entry.


    Compensating transactions are useful for resources such as LDAP and web services
    without standard transactional support. However, it is important to remember that
    compensating transactions provide an illusion and can never replace real transactions.
    So, if a server crashes or the connection to the LDAP server is lost before the
    compensating transaction completes, you will have inconsistent data. Also, concurrent
    transactions might see invalid data since the transaction is already committed.
    Compensating transactions can result in additional overhead as the client has
    to deal with extra undo operations.


    Most of the operations you can do on a transaction could be simple to do a rollback
    but, in some cases, imply a complex process. Let’s see in Table [9-2](#319409_2_En_9_Chapter.xhtml#Tab2)
    what each operation is.


    | Operation | Description | Rollback |

    | --- | --- | --- |

    | `bind` | This operation implies creating a record using a DN. | Unbind the entry
    recorded using the DN. |

    | `rename` | This operation implies changing the name of an entry. | Revert the
    name to the previous status. |

    | `unbind` | This operation implies making a record from a DN and creating a temporary
    DN. | Use the entry on a temporary location to rename and go back to the previous
    status. |

    | `rebind` | Create a record from a DN and add new attributes; this implies calculating
    a new DN. | Use the entry on a temporary location to rename and return to the
    previous status. |

    | `modifyAttributes` | This operation will modify certain attributes of a record.
    | Check which attribute changes to revert the operation. |


    As you can read in the previous table, most of the operations imply creating a
    temporary record with the previous information, so in the case that something
    bad happens, LDAP will rename the record with the previous name. You will feel
    that everything works as a database transaction.


    You need to consider the renaming strategies, which imply how Spring LDAP will
    define the name of the previous record to move to a temporal location. Until this
    book’s version, there are only two different strategies:


    * `DefaultTempEntryRenamingStrategy`: This is the simplest strategy because it
    implies adding a suffix on the DN of each record. You can specify a particular
    `temporal-suffix` of every value you want. On the following block, you will see
    what the configuration of the `transaction-manager` looks like:


    * `DifferentSubtreeTempEntryRenamingStrategy`: On this strategy, the temporal
    record will append a part on the DN. For example, if you have a record `cn=Doe,
    ou=Patrons`, the temporal information will exist on `cn=Doe, ou=tempEntries`.
    On the following block, you will see what the configuration of the `transaction-manager`
    looks like:


    To understand Spring LDAP transactions better, let’s create a Patron service with
    transactional behavior. `PatronService` interface with just a `create` method.


    ```

    package com.apress.book.ldap.transactions;

    import java.util.List;

    import com.apress.book.ldap.domain.Patron;

    public interface PatronService {

    void create(Patron patron);

    }

    ```


    `PatronService` interface with just a `create` method.


    ```

    package com.apress.book.ldap.transactions;

    import java.util.List;

    import com.apress.book.ldap.domain.Patron;

    public interface PatronService {

    void create(Patron patron);

    }

    ```


    Listing [9-9](#319409_2_En_9_Chapter.xhtml#PC13) shows the implementation of this
    service interface. The `create` method implementation simply delegates the call
    to the DAO layer.

    '
