    # 4. Testing LDAP Code


    Testing is an essential aspect of any software development process. As well as
    detecting bugs, it also helps to verify that all requirements are met and that
    the software works as expected. Today, formally or informally, testing is included
    in almost every phase of the software development process. Depending on what is
    being tested and the purpose behind the test, we end up with several different
    types of testing. The most common testing done by developers is unit testing,
    which ensures that individual units work as expected. Integration testing usually
    follows unit testing and focuses on the interaction between previously tested
    components. Developers are usually involved in creating automated integration
    tests, especially tests that deal with databases and directories. Next is system
    testing, where the complete, integrated system is evaluated to ensure all requirements
    are met. Nonfunctional requirements such as performance and efficiency are also
    tested as part of system testing. Acceptance testing is usually done at the end
    to ensure that the delivered software meets the customer/business user’s needs.


    Note


    Consider this chapter only to cover the essential aspects of unit and integration
    testing. To learn more about testing, you can read one of the most recommended
    testing, `Martin Fowler`’s^([^(45)](#fn45)) blog, which tackles topics like BDD,
    different types of testing, and good practices.


    ## Concepts About Testing


    Before going in depth on creating tests that check different operations on the
    use of LDAP, it is relevant to clarify any doubt about some terms related to testing.

