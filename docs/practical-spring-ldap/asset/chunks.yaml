    ## ODM Service Class


    Spring-based enterprise applications typically have a service layer that holds
    the application’s business logic. Classes in the service layer delegate persistent
    specifics to a DAO or repository layer. In Chapter [5](#319409_2_En_5_Chapter.xhtml),
    you implemented a DAO using `LdapTemplate`. Listing [8-7](#319409_2_En_8_Chapter.xhtml#PC8)
    shows the interface of the service class you will be implementing.


    ```

    package com.apress.book.ldap.service;

    import com.apress.book.ldap.domain.Patron;

    public interface PatronService {

    void create(Patron patron);

    void delete(String id);

    void update(Patron patron);

    Patron find(String id);

    }

    ```


    The service class implementation is in Listing [8-8](#319409_2_En_8_Chapter.xhtml#PC9).
    In the implementation, you inject an instance of `LdapTemplate`. The `create`
    and `update` method implementations simply delegate the calls to the `LdapTemplate`.
    The `find` method converts the passed-in `id` parameter to the fully qualified
    DN and delegates the retrieval to `LdapTemplate`’s `findByDn` method. Finally,
    the `delete` method uses the `find` method to read the patron and uses the `LdapTemplate`’s
    `delete` method to delete it.


    ```

    package com.apress.book.ldap.service;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.beans.factory.annotation.Qualifier;

    import org.springframework.ldap.core.DistinguishedName;

    import org.springframework.ldap.core.LdapTemplate;

    import org.springframework.stereotype.Service;

    import com.apress.book.ldap.domain.Patron;

    @Service("patronService")

    public class PatronServiceImpl implements PatronService {

    private static final String PATRON_BASE  = "ou=patrons,dc=inflinx,dc=com";

    private LdapTemplate ldapTemplate;

    public PatronServiceImpl(@Autowired @Qualifier("ldapTemplate") LdapTemplate ldapTemplate)
    {

    this.ldapTemplate = ldapTemplate;

    }

    @Override

    public void create(Patron patron) {

    ldapTemplate.create(patron);

    }

    @Override

    public void update(Patron patron) {

    ldapTemplate.update(patron);

    }

    @Override

    public Patron find(String id) {

    DistinguishedName dn = new DistinguishedName(PATRON_BASE);

    dn.add("uid", id);

    return ldapTemplate.findByDn(dn, Patron.class);

    }

    @Override

    public void delete(String id) {

    ldapTemplate.delete(find(id));

    }

    }

    ```


