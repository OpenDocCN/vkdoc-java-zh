    ## 分页搜索控制


    分页搜索控制允许 LDAP 客户端控制 LDAP 搜索操作结果返回的速率。LDAP 客户端创建一个带有指定页面大小的页面控制，并将其与搜索请求关联。当服务器接收到请求后，会将结果分批返回，每批包含指定数量的结果。分页搜索控制在处理大型目录或构建具有分页功能的搜索应用程序时非常有用。此控制描述于
    RFC 2696。（^(⁷⁹））


    图 7-6 描述了使用页面控制的 LDAP 客户端与服务器的交互。


    ![](img/319409_2_En_7_Fig6_HTML.jpg)


    页面控制交互示意图。LDAP 客户端和服务器通过搜索请求页面控制和搜索结果 cookie 进行交互。


    图 7-6


    页面控制交互


    注意


    LDAP 服务器通常使用 sizeLimit 指令来限制搜索操作返回的结果数量。如果搜索结果超过指定的 sizeLimit，会抛出大小限制超出异常 javax.naming.SizeLimitExceededException。分页方法不允许您绕过这个限制。


    LDAP 客户端发送搜索请求时会同时发送页面控制。当服务器接收到请求后，会执行搜索操作并返回第一批次的结果。此外，服务器还会发送一个 cookie，客户端需要使用该
    cookie 来请求下一批结果。这个 cookie 使服务器能够维护搜索状态。客户端不得对 cookie 的内部结构做出任何假设。当客户端请求下一批结果时，会发送相同的搜索请求页面控制和
    cookie。服务器将返回新的结果集和新的 cookie。当没有更多搜索结果返回时，服务器会发送一个空 cookie。


    使用分页搜索控制进行分页是单向且顺序的。客户端无法在页面之间跳转或回退。现在您已经了解了分页控制的基本原理，清单 7-14 展示了如何使用纯 JNDI API
    实现该功能。


    调用该方法后，分页的借阅者信息将如清单 7-14 所示在控制台显示。


    ```

    sn: Amar ( uid=patron0,ou=patrons )

    sn: Atp ( uid=patron1,ou=patrons )

    sn: Atpco ( uid=patron2,ou=patrons )

    ...............

    清单 7-14

    使用 JNDI 进行分页的示例

    ```


    在清单 7-14 中，您首先通过获取 LDAP 服务器的上下文开始实现。然后创建`PagedResultsControl`，并将其构造参数指定为页面大小。您将该控制添加到上下文中并执行搜索操作。接着，您遍历搜索结果并在控制台显示信息。下一步，您需要检查响应控制以确定服务器是否发送了`PagedResultsResponseControl`。从该控制中，您可以提取
    cookie 和本次搜索的估计总结果数。结果数是可选信息，服务器可以简单地返回零，表示未知总数。最后，您使用页面大小和 cookie 作为构造参数创建新的`PagedResultsControl`。这个过程会重复进行，直到服务器发送一个空（null）cookie，表示没有更多结果需要处理。


    Spring LDAP 抽象了清单 7-14 中的大部分代码，使得使用`PagedResultsDirContextProcessor`处理页面控制变得简单。


    在此实现中，您使用页面大小和 cookie 创建`PagedResultsDirContextProcessor`。请注意，您使用的是`org.springframework.ldap.control.PagedResultsCookie`类来抽象服务器发送的
    cookie。初始时 cookie 的值为 null。然后您执行搜索并遍历结果。服务器发送的 cookie 会从`DirContextProcessor`中提取，并用于后续的搜索请求。您还使用`LastNameMapper`类从结果上下文中提取姓氏。清单
    7-15 给出了`LastNameMapper`类的实现。


    ```

    private class LastNameMapper extends AbstractContextMapper {

    @Override

    protected String doMapFromContext(DirContextOperations context) {

    return context.getStringAttribute("sn");

    }

    }

    清单 7-15

    映射器实现

    ```


    请注意，您可以像上一章中那样创建映射器，其中有一个包含所有映射逻辑的公共类，但在本章中为了简化，它是一个仅包含一个属性的私有类。


    现在让我们创建一个测试用例，验证清单 7-15 的功能，如清单 7-16 所示。


