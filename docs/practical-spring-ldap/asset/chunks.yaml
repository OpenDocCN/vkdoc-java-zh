    ## Authentication Using Spring LDAP


    Authentication is a common operation performed against LDAP servers. This usually
    involves verifying a username and password against the information stored in the
    directory server.


    One approach for implementing authentication using Spring LDAP is via the `getContext`
    method of the `ContextSource` class. Here is the `getContext` method API:


    ```

    DirContext getContext(String principal, String credentials) throws NamingException

    ```


    The `principal` parameter is the fully qualified DN of the user, and the `credentials`
    parameter is the user’s password. The method uses the passed-in information to
    authenticate against LDAP. Upon successful authentication, the method returns
    a `DirContext` instance representing the user’s entry. Authentication failures
    are communicated to the caller via an exception. Listing [10-1](#319409_2_En_10_Chapter.xhtml#PC2)
    defines the interface with the method to validate whether someone could be authenticated.


    ```

    package com.apress.book.ldap.repository;

    public interface AuthenticationDao {

    boolean authenticate(String userid, String password);

    }

    Listing 10-1

    DAO interface with the authenticate method

    ```


    Listing [10-2](#319409_2_En_10_Chapter.xhtml#PC3) gives a DAO implementation for
    authenticating patrons in your Library application using the `getContext` technique.


    ```

    package com.apress.book.ldap.repository;

    import javax.naming.directory.DirContext;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.beans.factory.annotation.Qualifier;

    import org.springframework.ldap.NamingException;

    import org.springframework.ldap.core.ContextSource;

    import org.springframework.ldap.core.DistinguishedName;

    import org.springframework.ldap.support.LdapUtils;

    import org.springframework.stereotype.Repository;

    @Repository("authenticationDao")

    public class AuthenticationDaoImpl implements AuthenticationDao {

    private static final Logger logger = LoggerFactory.getLogger(AuthenticationDaoImpl.class);

    public static final String BASE_DN = "ou=patrons,dc=inflinx,dc=com";

    private ContextSource contextSource;

    public AuthenticationDaoImpl(@Autowired @Qualifier("contextSource") ContextSource
    contextSource) {

    this.contextSource = contextSource;

    }

    @Override

    public boolean authenticate(String userid, String password) {

    DistinguishedName dn = new DistinguishedName(BASE_DN);

    dn.add("uid", userid);

    DirContext authenticatedContext = null;

    try {

    authenticatedContext = contextSource.getContext(dn.toString(), password);

    return Boolean.TRUE;

    } catch (NamingException ex) {

    logger.error("{}: {}", ex.getClass(), ex.getMessage());

    return Boolean.FALSE;

    } finally {

    LdapUtils.closeContext(authenticatedContext);

    }

    }

    }

    Listing 10-2

    Basic implementation of the authentication method

    ```


    The `getContext` method requires a fully qualified DN of the user entry. Hence,
    the authentication method starts by creating a `DistinguishedName` instance with
    the supplied `"ou=patrons,dc=inflinx,dc=com"` base. Then, you append the provided
    `userid` to the DN to create the patron’s fully qualified DN. The authentication
    method then invokes the `getContext` method, passing in the string representation
    of the patron’s DN and password. A successful authentication simply exits the
    method with a return value of `true`. Notice that in the `finally` block, you
    are closing the obtained context.


    Listing [10-3](#319409_2_En_10_Chapter.xhtml#PC4) shows a JUnit test to verify
    the proper working of this authenticate method.


    ```

    package com.apress.book.ldap.repository;

    import org.junit.jupiter.api.DisplayName;

    import com.apress.book.ldap.repository.AuthenticationDao;

    import org.junit.jupiter.api.Test;

    import org.junit.jupiter.api.extension.ExtendWith;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.beans.factory.annotation.Qualifier;

    import org.springframework.test.context.ContextConfiguration;

    import org.springframework.test.context.junit.jupiter.SpringExtension;

    import static org.junit.jupiter.api.Assertions.assertFalse;

    import static org.junit.jupiter.api.Assertions.assertTrue;

    @ExtendWith(SpringExtension.class)

    @ContextConfiguration("classpath:repositoryContext-test.xml")

    @DisplayName("Authentication Dao test cases")

    class AuthenticationDaoTest {

    @Autowired

    @Qualifier("authenticationDao")

    private AuthenticationDao authenticationDao;

    @Test

    @DisplayName("Check is the authentication mechanism works fine")

    void should_authentication_works() {

    boolean authResult = authenticationDao.authenticate("patron0", "password");

    assertTrue(authResult);

    authResult = authenticationDao.authenticate("patron0", "invalidPassword");

    assertFalse(authResult);

    }

    }

    Listing 10-3

    Test to check if the authentication method works

    ```


    The `repositoryContext-test.xml`, located in the folder `src/test/resources`,
    associated with Listing [10-3](#319409_2_En_10_Chapter.xhtml#PC4) is shown in
    Listing [10-4](#319909_2_En_10_Chapter.xhtml#PC5). In this scenario, you are working
    with your installed OpenDJ LDAP server.


    ```

    Listing 10-4

    Structure of the configuration

    ```


    The only drawback with the implementation shown in Listing [10-4](#319909_2_En_10_Chapter.xhtml#PC5)
    is that the `getContext` method requires the fully qualified DN of the patron
    entry. There could be scenarios where the client’s code might not know the fully
    qualified DN of the user. In Listing [10-2](#319909_2_En_10_Chapter.xhtml#PC3),
    you append a hard-coded value to create the fully qualified DN. This approach
    will fail if you want to use the Listing [10-2](#319909_2_En_10_Chapter.xhtml#PC3)
    code to authenticate your library’s employees. To address such situations, Spring
    LDAP added several variations of the following `authenticate` method to the `LdapTemplate`
    class:


    ```

    boolean authenticate(String base, String filter, String password)

    ```


    This `authenticate` method uses the supplied base DN and filter parameters to
    perform a search for the user’s LDAP entry. If an entry is found, the fully qualified
    DN of the user is extracted. Then, this DN and the password are passed to the
    `ContextSource`’s `getContext` method to perform authentication. This is a two-step
    process, but it alleviates the need for fully qualified DN up front. Listing [10-5](#319909_2_En_10_Chapter.xhtml#PC7)
    contains the modified authentication implementation. Notice that the `authenticate`
    method signature in the DAO implementation has not changed. It still accepts the
    username and password as its parameters. However, the implementation has become
    much simpler thanks to the authentication method abstraction. The implementation
    passes an empty base DN since you want the search to be performed relative to
    the base DN used during `ContextSource` creation.

    '
