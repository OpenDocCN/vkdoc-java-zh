    that the `DirContext` instances are properly configured and connected to the LDAP
    server before they are borrowed from the pool. The same validation is done before
    the contexts are returned to the pool or on the contexts sitting idle.


    The `PoolingContextSource` delegates the validation to concrete instances of the
    `org.springframework.ldap.pool.validation.DirContextValidator` interface. In Listing
    [10-15](#319409_2_En_10_Chapter.xhtml#PC26), you can see that the `DirContextValidator`
    has only one method: `validateDirContext`. The first parameter, `contextType`,
    indicates if the context to be validated is a read-only or a read-write context.
    The second parameter is the actual context that needs to be validated.


    ```

    package org.springframework.ldap.pool.validation;

    import javax.naming.directory.DirContext;

    import org.springframework.ldap.core.ContextSource;

