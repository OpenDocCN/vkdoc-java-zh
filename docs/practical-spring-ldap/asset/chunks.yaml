    ## Summary


    In this chapter, you learned the basic concepts associated with LDAP controls.
    You then looked at the sort control, which can be used to perform server-side
    sorting of the results. You saw how Spring LDAP simplifies the sort control usage
    significantly. The paging control can be used to page LDAP results, which is useful
    under heavy traffic conditions.


    In the next chapter, you will look at using Spring LDAP ODM technology for implementing
    the data access layer.


