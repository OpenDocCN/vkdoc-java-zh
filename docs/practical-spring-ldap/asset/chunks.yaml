    Figure 1-7


    Library DIT


    I have used the RFC 2247[^(14)](#319409_2_En_1_Chapter.xhtml#Fn14) convention
    in this directory tree to name the base entry. The base entry has two organizational
    unit entries that hold the employees’ and patrons’ information. The ou=employees
    part of the tree will hold all the library employee entries. The ou=patrons part
    of the tree will hold the library patron entries. Both library employee and patron
    entries are of the type `inetOrgPerson objectClass`. Both employees and patrons
    access library applications using their unique login id. Thus, the `uid` attribute
    will be used as the RDN for entries.


    ## Summary


    LDAP and applications that interact with LDAP have become a key part of every
    enterprise today. This chapter covered the basics of the LDAP directory. You learned
    that LDAP stores information as entries. Each entry is made up of attributes that
    are simply key-value pairs. These entries can be accessed via their distinguished
    names. You also saw that LDAP directories have schemas that determine the type
    of information that can be stored.


    The next chapter will look at communicating with an LDAP directory using Java
    Naming and Directory Interface (JNDI). In the chapters following Chapter [2](#319409_2_En_2_Chapter.xhtml),
    you will focus on using Spring LDAP for developing LDAP applications.


