    ## LDAP 事务支持


    LDAP 协议要求所有 LDAP 操作（修改或删除）必须遵循 ACID 属性。这种事务性行为确保了 LDAP 服务器中存储的信息的一致性。然而，LDAP 并未定义跨多个操作的事务。考虑这样一个场景：你希望将两个
    LDAP 条目作为一个原子操作添加。完成该操作意味着两个条目都会被添加到 LDAP 服务器中。如果发生故障且其中一个条目无法添加，则服务器会自动撤销另一个条目的添加。这种事务性行为并不属于
    LDAP 规范的一部分，也不在 LDAP 的实际实现中存在。此外，缺乏事务语义（如提交和回滚）使得无法在多个 LDAP 服务器之间保证数据一致性。


    尽管事务性功能未被包含在 LDAP 规范中，但像 IBM Tivoli Directory Server 和 ApacheDS 这样的服务器提供了事务支持。IBM
    Tivoli Directory Server 支持的"开始事务"（OID 1.3.18.0.2.12.5）和"结束事务"（OID 1.3.18.0.2.12.6）扩展控制可以限制事务内的操作集合。RFC
    5805^(⁹⁰)试图标准化 LDAP 中的事务功能，目前仍处于实验阶段。


    注意


    在 LDAP 的模式、控制和扩展操作中，常用元素使用 OID 或对象标识符。


    ## Spring LDAP 事务支持


    LDAP 中缺乏事务性功能可能起初显得令人意外。更重要的是，这可能会阻碍企业广泛采用目录服务器。为了解决这个问题，Spring LDAP 提供了非 LDAP/JNDI
    特定的补偿事务支持。这种事务支持紧密集成于你之前章节中看到的 Spring 事务管理基础设施。图 9-3 展示了负责 Spring LDAP 事务支持的组件。


    ![](img/319409_2_En_9_Fig3_HTML.jpg)


    流程图。上下文源事务管理器连接到平台事务管理器、事务感知上下文源代理以及 LDAP 协作方。事务感知上下文源代理连接到上下文源。


    图 9-3


    Spring LDAP 事务支持


    `ContextSourceTransactionManager`类实现了`PlatformTransactionManager`接口并管理基于 LDAP
    的事务。该类及其协作方会跟踪事务中执行的 LDAP 操作，并在每个操作前记录状态。如果事务需要回滚，事务管理器将采取措施恢复原始状态。事务管理器通过使用`TransactionAwareContextSourceProxy`实现此行为，而不是直接操作`LdapContextSource`。这个代理类还确保在整个事务过程中使用单一的`javax.naming.directory.DirContext`实例，并且该实例不会在事务完成前关闭。


    ## 补偿事务


    补偿事务会撤销先前已提交事务的效果，并将系统恢复到之前的稳定状态。考虑一个涉及预订机票的事务场景，该场景中的补偿事务就是取消预订的操作。在 LDAP 中，如果一个操作添加了新的
    LDAP 条目，对应的补偿事务仅仅是删除该条目。


    补偿事务对于没有标准事务支持的资源（如 LDAP 和 Web 服务）非常有用。但需要记住的是，补偿事务只是一种模拟，永远无法替代真正的事务。因此，如果在补偿事务完成前服务器崩溃或与
    LDAP 服务器的连接丢失，你将面临数据不一致的问题。此外，由于事务已经提交，并发事务可能会看到无效数据。补偿事务还会导致额外的开销，因为客户端需要处理额外的撤销操作。


    大多数你可以在事务中执行的操作，回滚过程可能相对简单，但在某些情况下则意味着复杂的处理流程。让我们通过表 9-2 了解每个操作的具体含义。


    表 9-2


    操作与回滚过程


    | 操作 | 描述 | 回滚 |

    | --- | --- | --- |

    | `bind` | 该操作意味着使用 DN 创建记录。 | 使用 DN 解除绑定的条目。 |

    | `rename` | 该操作意味着更改条目名称。 | 将名称恢复为之前的状态。 |

    | `unbind` | 该操作意味着使用 DN 创建记录并生成临时 DN。 | 在临时位置使用条目重命名并恢复到之前的状态。 |

    | `rebind` | 使用 DN 创建记录并添加新属性；这意味着计算新的 DN。 | 在临时位置使用条目重命名并恢复到之前的状态。 |

    | `modifyAttributes` | 该操作会修改记录的某些属性。 | 检查需要撤销的属性变更。 |


    如你从上表中看到，大多数操作都意味着创建包含先前信息的临时记录，因此在发生异常时，LDAP 会将记录重命名为之前的名称。你会感觉这一切就像数据库事务一样运作。


    在理解 Spring LDAP 事务时，需要考虑重命名策略，这决定了 Spring LDAP 如何定义移动到临时位置的先前记录的名称。截至本书版本，仅有两种不同的策略：


    *   *DefaultTempEntryRenamingStrategy*：这是最简单的策略，因为它意味着在每个记录的 DN 上添加后缀。你可以为每个值指定特定的*temporal-suffix*。在以下代码块中，你会看到***transaction-manager***的配置示例：


    *   *DifferentSubtreeTempEntryRenamingStrategy*：在这个策略中，临时记录会在 DN 上附加一部分。例如，如果你有一个记录*cn=Doe,
    ou=Patrons*，临时信息会存在于*cn=Doe, ou=tempEntries*。在以下代码块中，你会看到***transaction-manager***的配置示例：


    为了更好地理解 Spring LDAP 事务，让我们创建一个具有事务行为的 Patron 服务。清单 9-8 展示了`PatronService`接口，其中仅包含一个`create`方法。


