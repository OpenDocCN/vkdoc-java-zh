    ## JNDI and Controls


    The `javax.naming.ldap` package in the JNDI API supports LDAP V3–specific features
    such as controls and extended operations. While controls modify or augment the
    behavior of existing operations, extended operations allow additional operations
    to be defined. The UML diagram in Figure [7-4](#319409_2_En_7_Chapter.xhtml#Fig4)
    highlights some of the important control classes in the `javax.naming.ldap` package.


    ![](images/319409_2_En_7_Chapter/319409_2_En_7_Fig4_HTML.jpg)


    An illustration of the java L D A P control class hierarchy. Sort response control,
    page results response control, sort control, and page results control are followed
    by basic control, and end with control.


    Figure 7-4


    Java LDAP control class hierarchy


    The `javax.naming.ldap.Control` interface provides an abstraction for both request
    and response controls. Several implementations of this interface, such as `SortControl`
    and `PagedResultsControl`, are provided as part of the JDK. Additional controls,
    such as `Virtual-ListViewControl` and `PasswordExpiringResponseControl`, are available
    as part of the LDAP booster pack.


    A core component in the `javax.naming.ldap` package is the `LdapContext` interface.
    This interface extends the `javax.naming.DirContext` interface and provides additional
    methods for performing LDAP V3 operations. The `InitialLdapContext` class in the
    `javax.naming.ldap` package provides a concrete implementation of this interface.


    Using controls with the JNDI API is very straightforward. The code in Listing
    [7-3](#319409_2_En_7_Chapter.xhtml#PC4) provides the algorithm for using controls.


    ```

    LdapContext context = new InitialLdapContext();

    Control[] requestControls = // Concrete control instance array

    context.setRequestControls(requestControls);

    /* Execute a search operation using the context*/

    context.search(parameters);

    Control[] responseControls = context.getResponseControls();

    // Analyze the response controls

    Listing 7-3

    Algorithm to use controls

    ```


