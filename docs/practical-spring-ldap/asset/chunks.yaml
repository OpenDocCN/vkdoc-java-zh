    ### GreaterThanOrEqualsFilter


    The `GreaterThanOrEqualsFilter` helps match all entries that are lexicographically
    equal to or higher than the given attribute value. For example, a search expression
    `(postalCode >= 57018)` can retrieve all entries with a postal code after 58018,
    in addition to 58018. Listing [6-9](#319409_2_En_6_Chapter.xhtml#PC24) shows this
    implementation along with the output results.


    ```

    @Test

    @DisplayName("Check that search operation using greater than or equals filter
    works")

    public void should_works_greaterThanOrEqualsFilter() {

    Filter filter = new GreaterThanOrEqualsFilter("postalCode", "57018");

    List results = searchFilter.searchAndPrintResults(filter);

    assertAll(

    () -> assertNotNull(results),

    () -> assertEquals(46, results.size())

    );

    }

    Results found in search: 46

    Full name: Abbey Abbie

    Full name: Aggy Ahad

    Full name: Abbie Abdalla

    Full name: Abbye Abdollahi

    Full name: Abdalla Abdou

    .........

