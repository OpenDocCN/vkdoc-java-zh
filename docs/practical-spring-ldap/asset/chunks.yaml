  raw: '## Connect to LDAP


    All the naming and directory operations using JNDI are performed relative to a
    context. So the first step in using JNDI is to create a context that acts as a
    starting point on the LDAP server. Such a context is referred to as an initial
    context. Once an initial context is established, it can look up other contexts
    or add new objects.


    The ***Context*** interface and ***InitialContext*** class in the ***javax.naming***
    package can be used for creating an initial naming context. Since we are dealing
    with a directory here, we will use a more specific ***DirContext*** interface
    and its implementation ***InitialDirContext***. Both ***DirContext*** and ***InitialDirContext***
    are available inside the ***javax.naming.directory*** package. The directory context
    instances can be configured with properties that provide information about the
    LDAP server. The code in Listing [2-1](#319409_2_En_2_Chapter.xhtml#PC1) creates
    a context for an LDAP server running locally on port 1389.


    ```

    Properties environment =  new  Properties();

    environment.setProperty(DirContext.INITIAL_CONTEXT_FACTORY, "com.sun.jndi.ldap.LdapCtxFactory");

    environment.setProperty(DirContext.PROVIDER_URL, "ldap://localhost:11389");

    DirContext context  =  new  InitialDirContext(environment);

    Listing 2-1

    How to create a basic connection with LDAP

    ```


    Note


    In the following parts of the chapter, I will explain in detail the most relevant
    parts to connect and execute some operations to LDAP.


    By the end of this chapter, you will see the different outputs of the execution
    of the different methods.


    In Listing [2-1](#319409_2_En_2_Chapter.xhtml#PC1), we have used the ***INITIAL_CONTEXT_FACTORY***
    constant to specify the service provider class that needs to be used. Here, we
    use the sun provider ***com.sun.jndi.ldap.LdapCtxFactory***, which is part of
    the standard JDK distribution. The PROVIDER_URL is used to specify the fully qualified
    URL of the LDAP server. The URL includes the protocol (LDAP for nonsecure or LDAPs
    for secure connections), the server hostname, and the port.


    Note


    The declaration of the type on a variable has been optional since Java 14, so
    you don’t need to declare that the variable ***environment*** has the type ***Properties***;
    you can replace the keyword ***var***, and the compiler will infer the correct
    type.


    This change does not add any feature related to the performance, so I decided
    to keep the code simple.


    Once a connection to the LDAP server is established, the application can identify
    itself by providing authentication information. Contexts like the one created
    in Listing [2-1](#319409_2_En_2_Chapter.xhtml#PC1), where authentication information
    is not provided, are called anonymous contexts. LDAP servers usually have ACLs
    (access list controls) that restrict operations and information to certain accounts.
    So it is very common in enterprise applications to create and use authenticated
    contexts. Listing [2-2](#319409_2_En_2_Chapter.xhtml#PC2) provides an example
    of creating an authenticated context. Notice that we have used three additional
    properties to provide the binding credentials. The ***SECURITY_AUTHENTICATION***
    property is set to simple, indicating that we will use a plain text username and
    password for authentication.


    ```

    Properties environment =  new  Properties();

    environment.setProperty(DirContext.INITIAL_CONTEXT_FACTORY, "com.sun.jndi.ldap.LdapCtxFactory");

    environment.setProperty(DirContext.PROVIDER_URL, "ldap://localhost:11389");

    environment.setProperty(DirContext.SECURITY_AUTHENTICATION, "simple");

    environment.setProperty(DirContext.SECURITY_PRINCIPAL, "Directory Manager");

    environment.setProperty(DirContext.SECURITY_CREDENTIALS, "secret");

    DirContext context  =  new  InitialDirContext(environment);

    Listing 2-2

    How to connect on LDAP using the credentials

    ```


    Note


    On the declaration of the different properties, you can see the class **DirContext**
    appear many times, which is not the best approach, so if you want to reduce the
    duplicates, you can simplify using static imports. For example, you can declare
    the static import like this: ***import static javax.naming.directory.DirContext.INITIAL_CONTEXT_FACTORY***,
    and on the declaration of the variable, just use ***PROVIDER_URL***.


    Any problems occurring during the context creation will be reported as instances
    of ***javax.naming.NamingException***. ***NamingException*** is the superclass
    of all the exceptions thrown by the JNDI API. This is a checked exception and
    must be handled properly for the code to compile. Table [2-1](#319409_2_En_2_Chapter.xhtml#Tab1)
    lists common exceptions we will likely encounter during JNDI development.


    Table 2-1


    Common LDAP Exceptions


    | Exception | Description |

    | --- | --- |

    | AttributeInUseException | Thrown when an operation tries to add an existing
    attribute. |

    | AttributeModificationException | Thrown when an operation tries to add/remove/update
    an attribute and violates the attribute’s schema or state. For example, adding
    two values to a single-valued attribute would result in this exception. |

    | CommunicationException | Thrown when an application fails to communicate (network
    problems) with the LDAP server. |

    | InvalidAttributesException | Thrown when an operation tries to add or modify
    an attribute set that has been specified incompletely or incorrectly. For example,
    adding a new entry without specifying all the required attributes would result
    in this exception. |

    | InvalidAttributeValueException | Thrown when an operation tries to add or modify
    a value of an attribute that enters a conflict with the schema definition. |

    | InvalidSearchFilterException | Thrown when a search operation is given a malformed
    search filter. |

    | LimitExceededException | Thrown when a search operation abruptly terminates
    as a user- or system-specified result limit is reached. |

    | NameAlreadyBoundException | Thrown to indicate that an entry cannot be added
    as the associated name is already bound to a different object. |

    | NotContextException | Thrown when an operation process until the context is
    required to continue. |

    | OperationNotSupportedException | Thrown when a context implementation does not
    support a specific operation when invoked. |

    | PartialResultException | Thrown to indicate that only a portion of the expected
    results is returned and the operation cannot be completed. |

    | SizeLimitExceededException | Thrown when a method produces a result that exceeds
    a size-related limit. |

    | TimeLimitExceededException | Thrown when a method produces a result that exceeds
    a time-related limit. |


    ## LDAP Operations


    Once we obtain an initial context, we can perform various operations on LDAP using
    the context. These operations can involve looking up another context, creating
    a new one, and updating or removing an existing one. Here is an example of looking
    up another context with DN uid=emp1,ou=employees,dc=inflinx,dc=com:


    ```

    DirContext anotherContext  =  context.lookup("uid=emp1,ou=employees,dc=inflinx,dc=com");

    ```


    We will closely examine each of these operations in the coming section.


    ## Closing Resources


    After completing all desired LDAP operations, it is important to close the context
    and any other associated resources properly. Closing a JNDI resource simply involves
    calling the close method on it. Listing [2-3](#319409_2_En_2_Chapter.xhtml#PC4)
    shows the code associated with closing a ***DirContext***. The code shows that
    the close method also throws a ***NamingException*** that needs to be properly
    handled.


    ```

    try {

    context.close();

    } catch  (NamingException e)  {

    //Do something with the exception, like log the error.

    }

    Listing 2-3

    How to close the connection with LDAP

    ```


    Note


    The previous block does not use “try-with-resources” because DirContext does not
    implement the auto closeable.'
  trans: '

    ## 连接到 LDAP


    所有通过 JNDI 进行的命名和目录操作都是相对于一个上下文进行的。因此，在使用 JNDI 时，第一步是创建一个上下文，它作为 LDAP 服务器上的起始点。这种上下文被称为初始上下文。一旦建立了初始上下文，就可以查找其他上下文或添加新对象。


    ***Context***接口和***InitialContext***类在***javax.naming***包中可用于创建初始命名上下文。由于我们在这里处理的是目录，因此将使用更具体的***DirContext***接口及其实现类***InitialDirContext***。***DirContext***和***InitialDirContext***均在***javax.naming.directory***包中可用。目录上下文实例可以通过属性进行配置，这些属性提供了关于
    LDAP 服务器的信息。清单 2-1 中的代码为运行在本地端口 1389 上的 LDAP 服务器创建了一个上下文。


    ```

    Properties environment =  new  Properties();

    environment.setProperty(DirContext.INITIAL_CONTEXT_FACTORY, "com.sun.jndi.ldap.LdapCtxFactory");

    environment.setProperty(DirContext.PROVIDER_URL, "ldap://localhost:11389");

    DirContext context  =  new  InitialDirContext(environment);

    Listing 2-1

    如何使用 LDAP 创建基本连接

    ```


    注意


    在本章的后续部分，我将详细解释与连接和执行某些 LDAP 操作最相关的部分。


    在本章结束时，您将看到不同方法执行后的不同输出。


    在清单 2-1 中，我们使用了***INITIAL_CONTEXT_FACTORY***常量来指定需要使用的服务提供者类。此处我们使用的是 sun 提供者***com.sun.jndi.ldap.LdapCtxFactory***，它是标准
    JDK 发行版的一部分。PROVIDER_URL 用于指定 LDAP 服务器的完整 URL。该 URL 包含协议（非安全连接使用 LDAP，安全连接使用 LDAPs）、服务器主机名和端口号。


    注意


    在声明不同属性时，您会注意到**DirContext**类多次出现，这不是最佳做法。如果您想减少重复，可以通过静态导入简化。例如，可以声明静态导入如下：***import
    static javax.naming.directory.DirContext.INITIAL_CONTEXT_FACTORY***，然后在声明变量时只需使用***PROVIDER_URL***。


    在上下文创建过程中出现的任何问题都会以***javax.naming.NamingException***实例的形式报告。***NamingException***是
    JNDI API 抛出的所有异常的超类。这是一个受检异常，必须正确处理才能使代码通过编译。表 2-1 列出了我们在 JNDI 开发中可能遇到的常见异常。


    表 2-1


    常见 LDAP 异常


    | 异常 | 描述 |

    | --- | --- |

    | AttributeInUseException | 当操作尝试添加已存在的属性时抛出。 |

    | AttributeModificationException | 当操作尝试添加/删除/更新属性且违反属性的模式或状态时抛出。例如，向单值属性添加两个值会导致此异常。
    |

    | CommunicationException | 当应用程序无法与 LDAP 服务器通信（网络问题）时抛出。 |

    | InvalidAttributesException | 当操作尝试添加或修改未完全或错误指定的属性集时抛出。例如，未指定所有必需属性就添加新条目会导致此异常。
    |

    | InvalidAttributeValueException | 当操作尝试添加或修改与模式定义冲突的属性值时抛出。 |

    | InvalidSearchFilterException | 当搜索操作被提供格式错误的搜索过滤器时抛出。 |

    | LimitExceededException | 当搜索操作因用户或系统指定的结果限制而突然终止时抛出。 |

    | NameAlreadyBoundException | 当条目无法添加因为关联的名称已绑定到其他对象时抛出。 |

    | NotContextException | 当操作需要继续处理上下文时抛出。 |

    | OperationNotSupportedException | 当上下文实现不支持特定操作时抛出。 |

    | PartialResultException | 当仅返回部分预期结果且操作无法完成时抛出。 |

    | SizeLimitExceededException | 当方法生成的结果超过与大小相关的限制时抛出。 |

    | TimeLimitExceededException | 当方法生成的结果超过与时间相关的限制时抛出。 |


    ## LDAP 操作


    一旦我们获得初始上下文，就可以使用上下文在 LDAP 上执行各种操作。这些操作可能包括查找其他上下文、创建新上下文以及更新或删除现有上下文。以下是使用 DN
    uid=emp1,ou=employees,dc=inflinx,dc=com 查找另一个上下文的示例：


    ```

    DirContext anotherContext  =  context.lookup("uid=emp1,ou=employees,dc=inflinx,dc=com");

    ```


    我们将在接下来的章节中详细探讨这些操作。


    ## 关闭资源


    在完成所有所需的 LDAP 操作后，重要的是要正确关闭上下文和任何其他相关资源。关闭 JNDI 资源只需在其上调用 close 方法。清单 2-3 展示了与关闭***DirContext***相关的代码。代码显示
    close 方法也会抛出***NamingException***，需要正确处理。


    ```

    try {

    context.close();

    } catch  (NamingException e)  {

    // 对异常进行处理，例如记录错误。

    }

    Listing 2-3

    如何通过 LDAP 关闭连接

    ```


    注意


    前面的代码块未使用“try-with-resources”，因为 DirContext 并未实现 AutoCloseable 接口。

    '
- fmt: "\n## Creating a New Entry\n\nConsider the case where a new employee starts\
    \ with our hypothetical library, and we are asked to add their information to\
    \ LDAP. As we have seen earlier, before an entry can be added to LDAP, it is necessary\
    \ to obtain an `InitialDirContext`. Listing [2-4](#319409_2_En_2_Chapter.xhtml#PC5)\
    \ defines a reusable method for doing this.\n\n```\nprivate DirContext getContext()\
    \ throws NamingException {\n    Properties environment = new Properties();\n \
    \   environment.setProperty(`DirContext.INITIAL_CONTEXT_FACTORY`, \"com.sun.jndi.ldap.LdapCtxFactory\"\
    );\n    environment.setProperty(`DirContext.PROVIDER_URL`, \"ldap://localhost:1389\"\
    );\n    environment.setProperty(`DirContext.SECURITY_PRINCIPAL`, \"cn=Directory\
    \ Manager\");\n    environment.setProperty(`DirContext.SECURITY_CREDENTIALS`,\
    \ \"secret\");\n    return new `InitialDirContext`(environment);\n}\nListing 2-4\n\
    Create a method to connect with LDAP\n```\n\nOnce we have the initial context,\
    \ adding the new employee information is straightforward, as shown in Listing\
    \ [2-5](#319409_2_En_2_Chapter.xhtml#PC6).\n\n```\npublic void addEmployee(`Employee`\
    \ employee) {\n    DirContext context = null;\n    try {\n        context = getContext();\n\
    \        // Populate the attributes\n        Attributes attributes = new `BasicAttributes`();\n\
    \        attributes.put(new `BasicAttribute`(\"objectClass\", \"inetOrgPerson\"\
    ));\n        attributes.put(new `BasicAttribute`(\"uid\", employee.getUid()));\n\
    \        attributes.put(new `BasicAttribute`(\"givenName\", employee.getFirstName()));\n\
    \        attributes.put(new `BasicAttribute`(\"surname\", employee.getLastName()));\n\
    \        attributes.put(new `BasicAttribute`(\"commonName\", employee.getCommonName()));\n\
    \        attributes.put(new `BasicAttribute`(\"departmentNumber\", employee.getDepartmentNumber()));\n\
    \        attributes.put(new `BasicAttribute`(\"mail\", employee.getEmail()));\n\
    \        attributes.put(new `BasicAttribute`(\"employeeNumber\", employee.getEmployeeNumber()));\n\
    \        `Attribute` phoneAttribute =\n            new `BasicAttribute`(\"telephoneNumber\"\
    );\n        for(String phone : employee.getPhone()) {\n            phoneAttribute.add(phone);\n\
    \        }\n        attributes.put(phoneAttribute);\n        // Get the fully\
    \ qualified DN\n        String dn = \"uid=\" + employee.getUid() + \",\" + `BASE_PATH`;\n\
    \        // Add the entry\n        context.createSubcontext(\"dn\", attributes);\n\
    \    } catch(`NamingException` e) {\n        // Handle the exception and show\
    \ the description of the problem\n    } finally {\n        closeContext(context);\n\
    \    }\n}\nListing 2-5\nAdd a new entry on LDAP\n```\n\nAs you can see, the first\
    \ step in the process is to create a set of attributes that needs to be added\
    \ to the entry. JNDI provides the `javax.naming.directory.Attributes` interface\
    \ and its implementation `javax.naming.directory.BasicAttributes` to abstract\
    \ an attribute collection. We then add the employee’s attributes one at a time\
    \ to the collection using JNDI’s `javax.naming.directory.BasicAttribute` class.\
    \ Notice that we have taken two approaches in creating the `BasicAttribute` class.\
    \ In the first approach, we added the single-valued attributes by passing the\
    \ attribute name and value to `BasicAttribute`'s constructor. To handle the multivalued\
    \ attribute telephone, we first created the `BasicAttribute` instance by just\
    \ passing in the name. Then, we individually added the telephone values to the\
    \ attribute. Once all the attributes are added, we invoked the `createSubcontext`\
    \ method on the initial context to add the entry. The `createSubcontext` method\
    \ requires the fully qualified DN of the entry to be added.\n\nNotice that we\
    \ have delegated the closing of the context to a separate method `closeContext`.\
    \ Listing [2-6](#319409_2_En_2_Chapter.xhtml#PC7) shows its implementation.\n\n\
    ```\nprivate void closeContext(`DirContext` context) {\n    try {\n        if\
    \ (null != context) {\n            context.close();\n        }\n    } catch (`NamingException`\
    \ e) {\n        // Handle the exception and show the description of the problem\n\
    \    }\n}\nListing 2-6\nHow to close the connection with LDAP\n```\n\n## Updating\
    \ an Entry\n\nModifying an existing LDAP entry can involve any of the following\
    \ operations:\n\n* Add a new attribute and value(s) or add a new value to an existing\
    \ multivalued attribute.\n* Replace an existing attribute value(s).\n* Remove\
    \ an attribute and its value(s).\n\nTo allow modification of the entries, JNDI\
    \ provides an aptly named `javax.naming.directory.ModificationItem` class.\n\n\
    A `ModificationItem` consists of the type of modification to be made and the attribute\
    \ under modification. The following code creates a modification item for adding\
    \ a new telephone number:\n\n```\n`Attribute` telephoneAttribute = new `BasicAttribute`(\"\
    telephone\", \"80181001000\");\n`ModificationItem` modificationItem = new `ModificationItem`(`DirContext`.ADD_ATTRIBUTE,\
    \ telephoneAttribute);\n```\n\nNotice that in the preceding code, we have used\
    \ the constant `ADD_ATTRIBUTE` to indicate that we want an add operation. Table\
    \ [2-2](#319409_2_En_2_Chapter.xhtml#Tab2) provides the supported modification\
    \ types along with their descriptions.\n\nTable 2-2\n\nLDAP Modification Types\n\
    \n| Modification Type | Description |\n| --- | --- |\n| `ADD_ATTRIBUTE` | Adds\
    \ the attribute with the supplied value or values to the entry. If the attribute\
    \ does not exist, then it will be created. If the attribute is multivalued, this\
    \ operation adds the specified value(s) to the existing list. However, this operation\
    \ on an existing single-valued attribute will result in the `AttributeInUseException`.\
    \ |\n| `REPLACE_ATTRIBUTE` | Replaces existing attribute values of an entry with\
    \ the supplied values. If the attribute does not exist, then it will be created.\
    \ If the attribute already exists, all its values will be replaced. |\n| `REMOVE_ATTRIBUTE`\
    \ | Removes the specified value from the existing attribute. If no value is specified,\
    \ the entire attribute will be removed. If the specified value does not exist\
    \ in the attribute, the operation will throw a `NamingException`. If the value\
    \ to be removed is the only value of the attribute, then the attribute is also\
    \ removed. |\n\nThe code for updating an entry is provided in Listing [2-7](#319409_2_En_2_Chapter.xhtml#PC9).\
    \ The `modifyAttributes` method takes the entry’s fully qualified DN and an array\
    \ of modification items.\n\n```\npublic void update(String dn, `ModificationItem`[]\
    \ items) {\n    `DirContext` context = null;\n    try {\n        context = getContext();\n\
    \        context.modifyAttributes(dn, items);\n    } catch (`NamingException`\
    \ e) {\n        // Handle the exception and show the description of the problem\n\
    \    } finally {\n        closeContext(context);\n    }\n}\nListing 2-7\nHow to\
    \ update an entry\n```\n"
  raw: '## Creating a New Entry


    Consider the case where a new employee starts with our hypothetical library, and
    we are asked to add their information to LDAP. As we have seen earlier, before
    an entry can be added to LDAP, it is necessary to obtain an InitialDirContext.
    Listing [2-4](#319409_2_En_2_Chapter.xhtml#PC5) defines a reusable method for
    doing this.


    ```

    private  DirContext getContext() throws NamingException{

    Properties environment = new  Properties();

    environment.setProperty(DirContext.INITIAL_CONTEXT_FACTORY, "com.sun.jndi.ldap.LdapCtxFactory");

    environment.setProperty(DirContext.PROVIDER_URL, "ldap://localhost:1389");

    environment.setProperty(DirContext.SECURITY_PRINCIPAL, "cn=Directory Manager");

    environment.setProperty(DirContext.SECURITY_CREDENTIALS, "secret");

    return  new InitialDirContext(environment);

    }

    Listing 2-4

    Create a method to connect with LDAP

    ```


    Once we have the initial context, adding the new employee information is straightforward,
    as shown in Listing [2-5](#319409_2_En_2_Chapter.xhtml#PC6).


    ```

    public  void addEmployee(Employee employee)  {

    DirContext context  =  null;

    try  {

    context =  getContext();

    // Populate the attributes

    Attributes attributes  =  new  BasicAttributes();

    attributes.put(new  BasicAttribute("objectClass", "inetOrgPerson"));

    attributes.put(new BasicAttribute("uid", employee.getUid()));

    attributes.put(new BasicAttribute("givenName", employee.getFirstName()));

    attributes.put(new BasicAttribute("surname", employee.getLastName()));

    attributes.put(new BasicAttribute("commonName", employee.getCommonName()));

    attributes.put(new BasicAttribute("departmentNumber", employee.getDepartmentNumber()));

    attributes.put(new  BasicAttribute("mail", employee.getEmail()));

    attributes.put(new BasicAttribute("employeeNumber", employee.getEmployeeNumber()));

    Attribute  phoneAttribute =

    new  BasicAttribute("telephoneNumber");

    for(String phone : employee.getPhone())  {

    phoneAttribute.add(phone);

    }

    attributes.put(phoneAttribute);

    // Get the fully  qualified DN

    String dn   =  "uid="+employee.getUid() +  "," +  BASE_PATH;

    // Add  the entry

    context.createSubcontext("dn", attributes);

    } catch(NamingException e)  {

    // Handle the exception and show the description of the problem

    } finally  {

    closeContext(context);

    }

    }

    Listing 2-5

    Add a new entry on LDAP

    ```


    As you can see, the first step in the process is to create a set of attributes
    that needs to be added to the entry. JNDI provides the ***javax.naming.directory.Attributes***
    interface and its implementation ***javax.naming.directory.BasicAttributes***
    to abstract an attribute collection. We then add the employee’s attributes one
    at a time to the collection using JNDI’s ***javax.naming.directory.BasicAttribute***
    class. Notice that we have taken two approaches in creating the BasicAttribute
    class. In the first approach, we added the single-valued attributes by passing
    the attribute name and value to BasicAttribute’s constructor. To handle the multivalued
    attribute telephone, we first created the BasicAttribute instance by just passing
    in the name. Then, we individually added the telephone values to the attribute.
    Once all the attributes are added, we invoked the createSubcontext method on the
    initial context to add the entry. The createSubcontext method requires the fully
    qualified DN of the entry to be added.


    Notice that we have delegated the closing of the context to a separate method
    closeContext. Listing [2-6](#319409_2_En_2_Chapter.xhtml#PC7) shows its implementation.


    ```

    private void closeContext(DirContext context) {

    try {

    if (null != context) {

    context.close();

    }

    } catch (NamingException e) {

    // Handle the exception and show the description of the problem

    }

    }

    Listing 2-6

    How to close the connection with LDAP

    ```


    ## Updating an Entry


    Modifying an existing LDAP entry can involve any of the following operations:


    *   Add a new attribute and value(s) or add a new value to an existing multivalued
    attribute.


    *   Replace an existing attribute value(s).


    *   Remove an attribute and its value(s).


    To allow modification of the entries, JNDI provides an aptly named ***javax.naming.directory.ModificationItem***
    class.


    A ModificationItem consists of the type of modification to be made and the attribute
    under modification. The following code creates a modification item for adding
    a new telephone number:


    ```

    Attribute telephoneAttribute =  new  BasicAttribute("telephone", "80181001000");

    ModificationItem modificationItem  =  new  ModificationItem(DirContext. ADD_ATTRIBUTE,  telephoneAttribute);

    ```


    Notice that in the preceding code, we have used the constant ADD_ATTRIBUTE to
    indicate that we want an add operation. Table [2-2](#319409_2_En_2_Chapter.xhtml#Tab2)
    provides the supported modification types along with their descriptions.


    Table 2-2


    LDAP Modification Types


    | Modification Type | Description |

    | --- | --- |

    | ADD_ATTRIBUTE | Adds the attribute with the supplied value or values to the
    entry. If the attribute does not exist, then it will be created. If the attribute
    is multivalued, this operation adds the specified value(s) to the existing list.
    However, this operation on an existing single-valued attribute will result in
    the AttributeInUseException. |

    | REPLACE_ATTRIBUTE | Replaces existing attribute values of an entry with the
    supplied values. If the attribute does not exist, then it will be created. If
    the attribute already exists, all its values will be replaced. |

    | REMOVE_ATTRIBUTE | Removes the specified value from the existing attribute.
    If no value is specified, the entire attribute will be removed. If the specified
    value does not exist in the attribute, the operation will throw a NamingException.
    If the value to be removed is the only value of the attribute, then the attribute
    is also removed. |


    The code for updating an entry is provided in Listing [2-7](#319409_2_En_2_Chapter.xhtml#PC9).
    The modifyAttributes method takes the entry’s fully qualified DN and an array
    of modification items.


    ```

    public void update(String dn, ModificationItem[] items) {

    DirContext context = null;

    try {

    context = getContext();

    context.modifyAttributes(dn, items);

    } catch (NamingException e) {

    // Handle the exception and show the description of the problem

    } finally {

    closeContext(context);

    }

    }

    Listing 2-7

    How to update an entry

    ```'
