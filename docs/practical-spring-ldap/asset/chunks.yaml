    For an update operation, as you can guess by now, the Spring LDAP infrastructure
    calculates the compensating `ModificationItem` list for the modifications made
    on the entry. On a commit, nothing needs to be done. But upon a rollback, the
    computed compensating `ModificationItem` list will be written back.


    ## Summary


    In this chapter, you explored the basics of transactions and looked at Spring
    LDAP’s transaction support. Spring LDAP records the state in the LDAP tree before
    operating. If a rollback were to happen, Spring LDAP would perform compensating
    operations to restore the previous state. Remember that this compensating transaction
    support gives an illusion of atomicity but doesn’t guarantee it.


    In the next chapter, you will explore other Spring LDAP features, such as connection
    pooling and LDIF parsing.


