  raw: '## Spring Transaction Abstraction


    The Spring Framework provides a consistent programming model for handling both
    global and local transactions. The transaction abstraction hides the inner workings
    of different transaction APIs, such as JTA, JDBC, JMS, and JPA. It allows developers
    to write transaction-enabled code in an environment-neutral way. Behind the scenes,
    Spring simply delegates the transaction management to the underlying transaction
    providers. Both programmatic and declarative transaction management models are
    supported without requiring any EJBs. The declarative approach is usually recommended,
    which we will use in this book.


    Central to Spring’s transaction management is the `PlatformTransactionManager`
    abstraction. It exposes key aspects of transaction management in a technology-independent
    manner. It is responsible for creating and managing transactions and is required
    for declarative and programmatic transactions. Several implementations of this
    interface, such as `JtaTransactionManager`,^([^(84)](#fn84)) `DataSourceTransactionManager`,^([^(85)](#fn85))
    `JdbcTransactionManager`,^([^(86)](#fn86)) and `JmsTransactionManager`,^([^(87)](#fn87))
    are available out of the box. The `PlatformTransactionManager`^([^(88)](#fn88))
    API is shown in Listing [9-1](#319409_2_En_9_Chapter.xhtml#PC3).


    ```

    public interface PlatformTransactionManager extends TransactionManager {

    TransactionStatus getTransaction(@Nullable TransactionDefinition definition) throws
    TransactionException;

    void commit(TransactionStatus status) throws TransactionException;

    void rollback(TransactionStatus status) throws TransactionException;

    }

    Listing 9-1

    Source code of the PlatformTransactionManager

    ```


    The `getTransaction` method in the `PlatformTransactionManager` is used to retrieve
    an existing transaction. If no active transaction is found, this method might
    create a new transaction based on the transactional properties specified in the
    `TransactionDefinition` instance. The following is the list of properties that
    `TransactionDefinition` interface abstracts:


    *   *Read-only*: This property indicates whether this transaction is read-only.


    *   *Timeout*: This property mandates the time the transaction must complete.
    If the transaction fails to complete in the specified time, it will be rolled
    back automatically.


    *   *Isolation*: This property controls the degree of isolation among transactions.
    The possible isolation levels are discussed in Table [9-1](#319409_2_En_9_Chapter.xhtml#Tab1).


    *   *Propagation*: Consider the scenario where an active transaction exists, and
    Spring encounters code that needs to be executed in a transaction. One option
    in that scenario is to execute the code in the existing transaction. Another option
    is to suspend the existing transaction and start a new transaction to execute
    the code. The propagation property can be used to define such transaction behavior.
    Possible values that include it on the `Propagation`^([^(89)](#fn89)) enum are
    `PROPAGATION_REQUIRED`, `PROPAGATION_REQUIRES_NEW`, `PROPAGATION_SUPPORTS`, etc.


    The `getTransaction` method returns an instance of `TransactionStatus` representing
    the status of the current transaction. Application code can use this interface
    to check whether this is a new transaction or has been completed. The interface
    can also be used to request a transaction rollback programmatically. The other
    two methods in the `PlatformTransactionManager` are `commit` and `rollback`, which,
    as their names suggest, can be used to commit or roll back the transaction.


    ## Declarative Transactions Using Spring


    Spring provides two ways to declaratively add transaction behavior to applications:
    pure XML and annotations. The annotation approach is very popular and greatly
    simplifies the configuration. To demonstrate declarative transactions, consider
    the simple scenario of inserting a new record in a `Person` table in a database.
    Listing [9-2](#319409_2_En_9_Chapter.xhtml#PC4) gives the `PersonRepositoryImpl`
    class with a `create` method implementing this scenario.


    ```

    import org.springframework.jdbc.core.JdbcTemplate;

    import org.springframework.stereotype.Repository;

    @Repositorypublic class PersonRepositoryImpl implements PersonRepository{

    private JdbcTemplate jdbcTemplate;

    @Override

    public void create(String firstName, String lastName) {

    String sql = "INSERT INTO PERSON (FIRST_NAME, " + "LAST_NAME) VALUES (?, ?)";

    jdbcTemplate.update(sql, new Object[]{firstName, lastName});

    }

    }

    Listing 9-2

    Source code of an example to insert a row

    ```


    Listing [9-3](#319409_2_En_9_Chapter.xhtml#PC5) shows the `PersonRepository` interface
    that the preceding class implements.


    ```

    public interface PersonRepository {

    void create(String firstName, String lastName);

    }

    Listing 9-3

    Example of a repository

    ```


    The next step is to make the `create` method transactional. This is done by annotating
    the method with `@Transactional`, as shown in Listing [9-4](#319409_2_En_9_Chapter.xhtml#PC6).
    (Note that I annotated the method in the implementation, not the interface method.)


    ```

    import org.springframework.transaction.annotation.Transactional;

    import org.springframework.stereotype.Repository;

    @Repository

    public class PersonRepositoryImpl implements PersonRepository {

    ...........

    @Transactional

    public void create(String firstName, String lastName) {

    ...........

    }

    }

    Listing 9-4

    Example of a transaction

    ```


    The `@Transactional` annotation has several properties that can be used to specify
    additional information, such as propagation and isolation. Listing [9-5](#319409_2_En_9_Chapter.xhtml#PC7)
    shows the method with default isolation and `REQUIRES_NEW` propagation.


    ```

    @Transactional(propagation=Propagation.REQUIRES_NEW, isolation=Isolation.DEFAULT)

    public void create(String  firstName, String lastName) {

    //Logic of the method

    }

    Listing 9-5

    Example of a method with the default propagation

    ```


    The next step is to specify a transaction manager for Spring to use. Since you
    are going after a single database, the `org.springframework.jdbc.datasource.DataSourceTransactionManager`
    shown in Listing [9-6](#319409_2_En_9_Chapter.xhtml#PC8) is ideal for your case.
    From Listing [9-6](#319409_2_En_9_Chapter.xhtml#PC8), you can see that the `DataSourceTransactionManager`
    needs a data source to obtain and manage connections to the database.


    ```


    Listing 9-6

    Example configuration of the transaction data source

    ```


    The complete application context configuration file for declarative transaction
    management is given in Listing [9-7](#319409_2_En_9_Chapter.xhtml#PC9).


    ```


    Listing 9-7

    Example of all the configuration

    ```


    The `<tx:annotation-driven/>` tag indicates that you are using annotation-based
    transaction management. This tag, along with `<aop:aspectj-autoproxy />`, instructs
    Spring to use Aspect-Oriented Programming (AOP) and create proxies that manage
    transactions on behalf of the annotated class. So, when a call is made to a transactional
    method, the proxy intercepts the call and uses the transaction manager to obtain
    a transaction (new or existing). The called method is then invoked, and if the
    method completes successfully, the proxy using the transaction manager will commit
    the transaction. If the method fails, throwing an exception, the transaction will
    be rolled back. This AOP-based transaction processing is shown in Figure [9-2](#319409_2_En_9_Chapter.xhtml#Fig2).


    ![](images/319409_2_En_9_Chapter/319409_2_En_9_Fig2_HTML.jpg)


    A request-response diagram. The client sends a method to A O P proxy. The A O
    P proxy sends a begin transaction to the transaction manager followed by the method
    to the transactional class, and a commit transaction to the transaction manager.


    Figure 9-2


    AOP-based Spring transaction


    Note


    The explanation about transactions has the goal that the reader understand the
    main idea and which things imply a transaction.'
