    ## 目录架构


    LDAP 目录架构是一组规则，用于确定目录中存储的信息类型。架构可以被视为打包单元，包含属性类型定义和对象类定义。在将条目存储到 LDAP 之前，必须验证架构规则。这种架构检查确保条目包含所有必需的属性，并且不包含架构之外的属性。图
    1-3 表示一个通用的 LDAP 架构。


    ![](img/319409_2_En_1_Fig3_HTML.jpg)


    LDAP 通用架构示意图。一组 2 个对象类包含 2 个属性类型。对象类 2 映射到对象类 1 的属性。


    图 1-3


    LDAP 通用架构


    与数据库类似，目录架构必须精心设计以解决数据冗余等问题。在实施您的架构之前，查看公开的标准架构是有价值的。这些标准架构通常包含存储所需数据的所有定义，并且更重要的是，确保与其他目录的互操作性。


    ## 命名模型


    LDAP 命名模型定义了目录中条目如何组织。它还决定了如何唯一标识特定条目。命名模型建议以分层方式逻辑存储条目。这棵条目树通常称为目录信息树（DIT）。图
    1-4 提供了一个通用目录树的示例。


    ![](img/319409_2_En_1_Fig4_HTML.jpg)


    通用目录信息树示意图。节点 E 后面跟着两个节点 E。每个节点后面都有节点 E 的分支。


    图 1-4


    通用 DIT


    这棵树的根通常称为目录的基或后缀。该条目代表拥有目录的组织。后缀的格式可能因实现而异，但通常有三种推荐方法，如图 1-5 所列。


    ![](img/319409_2_En_1_Fig5_HTML.jpg)


    一组 3 个目录后缀命名规范的流程图。方法分别是 0 等于 example.com，dc 等于 example.dc 等于 com，o 等于 example.c
    等于 us。每种方法都有对应的分类。


    图 1-5


    目录后缀命名规范


    注意


    DC 代表域组件。


    第一种推荐技术是使用组织的域名作为后缀。例如，如果组织的域名是 `example.com`，目录后缀将是 o=example.com。第二种技术也使用域名，但每个名称组件都以“dc=”开头，并用逗号连接。因此，域名
    `example.com` 会生成后缀 dc=example, dc=com。这种技术在 RFC 2247^(²²)中提出，并且在 Microsoft Active
    Directory 中很流行。第三种技术使用 X.500 模型，并以 o=组织名称, c=国家代码 的格式创建后缀。在美国，组织 example 的后缀将是
    o=example, c=us。


    命名模型还定义了目录中条目的命名和唯一标识方式。具有相同直接父节点的条目通过其相对区分名（RDN），也称为区分名（DN）来唯一标识。RDN 通过条目中一个或多个属性/值对计算得出。在最简单的情况下，RDN
    通常为 attribute-name = attribute value 的形式。图 1-6 提供了一个简化版的组织目录示意图。每个位于 ou=employees
    下的人员条目都有一个唯一的 uid。因此，第一个人员条目的 RDN 是 uid=emp1，其中 emp1 是员工的用户 ID。


    ![](img/319409_2_En_1_Fig6_HTML.jpg)


    组织目录的流程图。dc=example, dc=com 被分类为 ou=appa, employees, consumers, groups。ou=employees
    被分类为 3 个其他属性。


    图 1-6


    组织目录示例


    注意


    区分名不是条目中的实际属性。它是一个与条目关联的逻辑名称。


    需要记住的是，RDN 不能在整个树中唯一标识条目。然而，通过将从树顶到该条目的路径中所有条目的 RDN 组合起来，可以轻松实现这一点。这种组合的结果称为区分名（DN）。在图
    1-6 中，人员 1 的 DN 为 uid=emp1, ou=employees, dc=example, dc=com。由于 DN 由 RDN 组合而成，如果某个条目的
    RDN 发生变化，该条目及其所有子条目的 DN 也会发生变化。


    可能存在某些条目集没有唯一属性的情况。在这种情况下，一种选择是通过组合多个属性来创建唯一性。例如，我们可以使用之前目录中的消费者通用名称和电子邮件地址作为
    RDN。多值 RDN 通过用加号（+）分隔每个属性对来表示，如下所示：


    ```

    cn =  Balaji  Varanasi +            mail=balaji@inflinx.com

    ```


    RDN 中的一些特殊字符必须转义以防止出现不同问题。这些特殊字符包括 +（加号）、=（等号）、<（小于号）、>（大于号）、;（分号）、,（逗号）、\（反斜杠）、#（井号）和
    "（引号）。


    有多种方法可以转义这些字符，例如在特殊字符前添加反斜杠（“\” ASCII 92）；这种方法是最常用的。另一种方法是用反斜杠和十六进制数字替换特殊字符，最后一种方法则是用引号（“”）包围属性值。


    注意


    多值 RDN 通常不被推荐。在这些情况下，建议创建一个唯一的序列属性以确保唯一性。


    ## 功能模型


    LDAP 功能模型描述了使用 LDAP 协议对目录执行的访问和修改操作。这些操作分为三类：查询、更新和认证。


    查询操作用于搜索和检索目录中的信息。因此，每当需要读取某些信息时，必须构建并执行针对 LDAP 的搜索查询。搜索操作需要指定 DIT 中的起始点、搜索深度以及条目必须满足的属性。在第
    6 章 6，您将深入探讨搜索并查看所有可用选项。


    更新操作用于添加、修改、删除和重命名目录条目。正如其名，添加操作将新条目添加到目录中。此操作需要创建条目的 DN 和构成该条目的属性集。删除操作需要完整的
    DN 来删除条目。LDAP 协议仅允许删除叶节点条目。修改操作更新现有条目。此操作需要条目的 DN 和一组修改内容，例如添加新属性、更新现有属性或删除属性。重命名操作可以重命名或移动目录中的条目。


    认证操作用于在客户端与 LDAP 服务器之间建立和结束会话。绑定操作在客户端和服务器之间启动 LDAP 会话。通常，这会导致匿名会话。客户端可以提供 DN
    和凭证以认证并创建已认证会话。另一方面，解绑操作可用于终止现有会话并断开与服务器的连接。


    LDAP V3 引入了一个框架，允许在不更改协议的情况下扩展现有操作并添加新操作。您将在第 7 章 7 中查看这些操作。

    '
- fmt: "\n## Security Model\n\nThe LDAP `Security model` protects LDAP directory information\
    \ from unauthorized access. The model specifies which clients can access which\
    \ parts of the directory and what kinds of operations (`search` vs. `update`)\
    \ are allowed.\n\nThe LDAP `Security model` is based on the client authenticating\
    \ to the server. As discussed earlier, this authentication process or `bind` operation\
    \ involves the client supplying a `DN` identifying itself and a password. An anonymous\
    \ session is established if the client does not provide a `DN` and password. RFC\
    \ 2829^([^(23)](#fn23)) defines a set of authentication methods that LDAP V3 servers\
    \ must support. After successful authentication, the access control models are\
    \ consulted to determine whether the client has sufficient privileges to do what\
    \ is requested. Unfortunately, no standards exist for access control models, and\
    \ each vendor provides their implementations.\n\n## LDIF Format\n\nThe LDAP Data\
    \ Interchange Format (LDIF) is a standard text-based format for representing directory\
    \ content and update requests. The LDIF format is defined in RFC 2849.^([^(24)](#fn24))\
    \ LDIF files are typically used to export data from one directory server and import\
    \ it into another. It is also popular for archiving directory data and applying\
    \ bulk updates to a directory. You will use LDIF files to store your test data\
    \ and refresh the directory server between unit tests.\n\nThe basic format of\
    \ an entry represented in LDIF is as follows:\n\n```\n#comment\ndn: \nobjectClass:\
    \  \nobjectClass:  \n...\n...\n: \n: \n...\n```\n\nLines in the LDIF file starting\
    \ with a `#` character are considered comments. The `dn` and at least one `objectClass`\
    \ entry definition are considered required. Attributes are represented as name/value\
    \ pairs separated by a colon. Multiple attribute values are specified in separate\
    \ lines and will have the same attribute type. Since LDIF files are purely text\
    \ based, binary data needs to be Base64 encoded before it is stored as part of\
    \ the LDIF file.\n\nBlank lines separate multiple entries in the same LDIF file.\
    \ Listing [1-1](#319409_2_En_1_Chapter.xhtml#PC3) shows an LDIF file with three\
    \ employee entries. Notice that the `cn` attribute is multivalued and is represented\
    \ twice for each employee.\n\n```\n#  Barbara’s Entry\ndn: cn=Barbara J Jensen,\
    \  dc=example, dc=com\n#  multi valued attribute\ncn: Barbara J Jensen\ncn:  Babs\
    \ Jensen\nobjectClass:  person\nsn: Jensen\n#  Bjorn’s  Entry\ndn: cn=Bjorn J\
    \ Jensen,  dc=example, dc=com\ncn: Bjorn J Jensen\ncn:  Bjorn Jensen\nobjectClass:\
    \ person\nsn: Jensen\n#  Base64 encoded  JPEG  photo\njpegPhoto:: /9j/4AAQSkZJRgABAAAAAQABAAD/2wBDABALD\
    \ A4MChAODQ4SERATGCgaGBYWGDEjJR0oOjM9PDkzODdASFxOQ ERXRTc4UG1RV19iZ2hnPk1xeXBkeFxlZ2P/2wBDARESEhgVG\n\
    #  Jennifer’s  Entry\ndn: cn=Jennifer  J Jensen,  dc=example, dc=com\ncn: Jennifer\
    \ J Jensen\ncn: Jennifer  Jensen\nobjectClass: person\nsn: Jensen\nListing 1-1\n\
    LDIF file with three employee entries\n```\n\n## LDAP History\n\nLDAP was developed\
    \ by Tim Howes, Steve Kille, and Wengyik Yeong to create a network protocol to\
    \ get data out. In 1993 appeared the first draft of the RFC 1487,^([^(25)](#fn25))\
    \ which contained the specification of LDAP based on the access of X.500.\n\n\
    The first version acts as a proxy or gateway to X.500 directories, a comprehensive\
    \ directory service developed in the 1980s.\n\nTim Howes, with his colleagues,\
    \ created the `Open Source University of Michigan LDAP Implementation`, which\
    \ became the reference for all the LDAP servers. The project’s website is active^([^(26)](#fn26))\
    \ and accessible only for historical reference.\n\nThe second version, the first\
    \ to be operative (LDAPv2), was released in 1993 as an Internet Engineering Task\
    \ Force (IETF) Proposed Standard with basic operations like `search` and `modify`\
    \ information. This version offers limited functionality and has some problems\
    \ related to the security mechanisms.\n\nThe third version, the latest available,\
    \ was released in 1997, including many improvements related to security, like\
    \ `Transport Layer Security` (TLS) and the possibility of supporting `referrals`.\
    \ It was based on RFCs like RFC 2251^([^(27)](#fn27)) and RFC 4519,^([^(28)](#fn28))\
    \ which explain the protocol and the supported data models. This version became\
    \ the de facto standard for directory services, and many applications have support\
    \ to integrate and use LDAP to obtain certain information.\n\n## LDAP Vendors\n\
    \nLDAP gained wide support from various vendors. There has also been a strong\
    \ open source movement to produce LDAP servers. Table [1-5](#319409_2_En_1_Chapter.xhtml#Tab5)\
    \ outlines some of the popular directory servers and include the information about\
    \ which is the docker image to run each of them with a small configuration.\n\n\
    Table 1-5\n\nLDAP Vendors\n\n| Directory Name | Vendor | OpenSource? | URL | Docker\
    \ Image |\n| --- | --- | --- | --- | --- |\n| Apache DS | Apache | Yes | [`https://directory.apache.org/apacheds/`](http://directory.apache.org/apacheds/)\
    \ | [`https://hub.docker.com/r/openmicroscopy/apacheds`](https://hub.docker.com/r/openmicroscopy/apacheds)\
    \ |\n| OpenLDAP | OpenLDAP | Yes | [`https://www.openldap.org/`](https://www.openldap.org/)\
    \ | [`https://hub.docker.com/r/bitnami/openldap`](https://hub.docker.com/r/bitnami/openldap)\
    \ |\n| Tivoli Directory Server | IBM | No | [`https://www.ibm.com/docs/en/i/7.5?topic=services-tivoli-directory-server-i-ldap`](https://www.ibm.com/docs/en/i/7.5%253Ftopic%253Dservices-tivoli-directory-server-i-ldap)\
    \ | No existing official image; you need to create one manually. |\n| Active Directory\
    \ | Microsoft | No | [`https://learn.microsoft.com/en-us/windows/win32/adsi/so-what-is-active-directory?redirectedfrom=MSDN`](http://msdn.microsoft.com/en-us/library/windows/desktop/aa746492%2528v%253Dvs.85%2529.aspx)\
    \ | No existing official image; you need to create one manually. |\n| eDirectory\
    \ | Novell | No | [`https://www.microfocus.com/en-us/cyberres/identity-access-management/edirectory`](https://www.microfocus.com/en-us/cyberres/identity-access-management/edirectory)\
    \ | No existing official image; you must create one manually. |\n| Oracle Directory\
    \ Server Enterprise Edition (ODSEE) | Oracle (formerly Sun) | No | [`https://www.oracle.com/security/identity-management/technologies/directory-server-enterprise-edition`](https://www.oracle.com/security/identity-management/technologies/directory-server-enterprise-edition)\
    \ | No existing official image; you need to create one manually. |\n| Oracle Internet\
    \ Directory (OID) |   | No | [`https://www.oracle.com/middleware/technologies/internet-directory.html`](https://www.oracle.com/middleware/technologies/internet-directory.html)\
    \ | No existing official image; you need to create one manually. |\n| OpenDJ |\
    \ ForgeRock | Yes | [`https://github.com/OpenIdentityPlatform/OpenDJ`](https://github.com/OpenIdentityPlatform/OpenDJ)\
    \ | [`https://hub.docker.com/r/openidentityplatform/opendj`](https://hub.docker.com/r/openidentityplatform/opendj)\
    \ |\n\nApache DS and OpenDJ are pure Java implementations of LDAP directories.\
    \ You will be using these two servers for unit and integration testing of the\
    \ code throughout this book.\n"
