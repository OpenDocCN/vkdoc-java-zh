    ## Spring and Object Factories


    Spring LDAP provides an out-of-the-box implementation of `DirObjectFactory` called
    `org.springframework.ldap.core.support.DefaultDirObjectFactory`. As you saw in
    the previous section, the `PatronObjectFactory` creates instances of `Patron`
    from the contexts found. Similarly, the `DefaultDirObjectFactory` creates instances
    of `org.springframework.ldap.core.DirContextAdapter` from found contexts.


    The `DirContextAdapter` class is generic and can be viewed as a holder of LDAP
    entry data. The `DirContextAdapter` class provides a variety of utility methods
    that greatly simplify getting and setting attributes. As you will see in later
    sections, when changes are made to attributes, the `DirContextAdapter` automatically
    keeps track of those changes and simplifies updating LDAP entry data. The simplicity
    of the `DirContextAdapter`, along with `DefaultDirObjectFactory`, enables you
    to easily convert LDAP data into domain objects, reducing the need to write and
    register a lot of object factories.


    In the following sections, you will use the `DirContextAdapter` to create an Employee
    DAO that abstracts read and write access to Employee LDAP entries.


    Note


    Most Java and JEE applications today access a persistent store for everyday activities.
    The persistent stores vary from popular relational databases to LDAP directories
    to legacy mainframe systems. Depending on the type of persistent store, the mechanism
    to obtain and manipulate data will vary greatly. This can result in tight coupling
    between the application and data access code, making it hard to switch between
    the implementations. This is where a Data Access Object or DAO pattern can help.


    The Data Access Object is a popular core JEE pattern that encapsulates access
    to data sources. Low-level data access logic, such as connecting to the data source
    and manipulating data, is cleanly abstracted to a separate layer by the DAO. A
    DAO implementation usually includes


    1.  A `EmployeeDao` interface that provides the CRUD method contract


    2.  Concrete implementation of the interface using a data source–specific API


    3.  Domain objects or transfer objects that the DAO returns


    With a DAO in place, the rest of the application need not worry about the underlying
    data implementation and can focus on high-level business logic.


    ## DAO Implementation Using Object Factory


    Typically, the DAOs you create in Spring applications have an interface that serves
    as the DAO’s contract and an implementation that contains the actual logic to
    access the data store or directory. Listing [5-3](#319409_2_En_5_Chapter.xhtml#PC4)
    shows the `EmployeeDao` interface for the Employee DAO you will implement. The
    DAO has `create`, `update`, and `delete` methods for modifying employee information.
    It also has two finder methods, one that retrieves an employee by its id and another
    that returns all the employees.


    ```

    package com.apress.book.ldap.repository;

    import java.util.List;

    import com.apress.book.ldap.domain.Employee;

    public interface EmployeeDao {

    void `create`(Employee employee);

    void `update`(Employee employee);

    void `delete`(String id);

    Employee `find`(String id);

    List `findAll`();

    }

    Listing 5-3

    The definition of the DAO with the most relevant methods

    ```


    The previous `EmployeeDao` interface uses an `Employee` domain object. Listing
    [5-4](#319409_2_En_5_Chapter.xhtml#PC5) shows this `Employee` domain object. `Employee`
    implementation holds all the essential attributes of a library employee. Notice
    that instead of using the fully qualified DN, you will use the `uid` attribute
    as the object’s unique identifier.


    ```

    package com.apress.book.ldap.domain;

    public class Employee {

    private String `uid`;

    private String `firstName`;

    private String `lastName`;

    private String `commonName`;

    private String `email`;

    private String `employeeNumber`;

    private String[] `phone`;

    // getters and setters omitted

    }

    Listing 5-4

    The definition of the Employee class

    ```


    You start with a basic implementation of the `EmployeeDao`, as shown in Listing
    [5-5](#319409_2_En_5_Chapter.xhtml#PC6).


    ```

    package com.apress.book.ldap.repository;

    import java.util.List;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.beans.factory.annotation.Qualifier;

    import org.springframework.ldap.core.LdapTemplate;

    import com.apress.book.ldap.domain.Employee;

    @Repository("employeeDao" )

    public class EmployeeDaoLdapImpl implements EmployeeDao {

    private LdapTemplate `ldapTemplate`;

    public EmployeeDaoLdapImpl(@Autowired @Qualifier("ldapTemplate") LdapTemplate
    `ldapTemplate`) {

    this.ldapTemplate = `ldapTemplate`;

    }

    @Override

    public List `findAll`() { return null; }

    @Override

    public Employee `find`(String id) { return null; }

    @Override

    public void `create`(Employee employee) {}

    @Override

    public void `delete`(String id) {}

    @Override

    public void `update`(Employee employee) {}

    }

    Listing 5-5

    The default definition of the implementation of the DAO

    ```


    In this implementation, you are injecting an instance of `LdapTemplate`. The actual
    creation of the `LdapTemplate` will be done in an external configuration file.
    Listing [5-6](#319409_2_En_5_Chapter.xhtml#PC7) shows the `repositoryContext.xml`
    file, which is located in the folder `src/test/resources`, with `LdapTemplate`
    and associated bean declarations.


    ```

    Listing 5-6

    The default configuration of the application

    ```


    This configuration file is similar to the one you saw in Chapter [3](#319409_2_En_3_Chapter.xhtml).
    You provide the LDAP server information to the `LdapContextSource` to create a
    `contextSource` bean. By setting the base to `"ou=employees,dc=inflinx,dc=com"`,
    you have restricted all the LDAP operations to the employee branch of the LDAP
    tree. It is important to understand that a search operation on the branch `"ou=patrons"`
    will not be possible using the contexts created here. If the requirement is to
    search all of the branches of the LDAP tree, then the base property needs to be
    an empty string.


    An important property of `LdapContextSource` is the `dirObjectFactory`, which
    can be used to set a `DirObjectFactory` to use. However, in Listing [5-6](#319409_2_En_5_Chapter.xhtml#PC7),
    you didn’t use this property to specify your intent to use `DefaultDirObjectFactory`.
    That is because, by default, `LdapContextSource` registers the `DefaultDirObjectFactory`
    as its `DirObjectFactory`.


    You have the `LdapTemplate` bean declaration in the configuration file’s final
    portion. You have passed in the `LdapContextSource` bean as the constructor argument
    to the `LdapTemplate`.

