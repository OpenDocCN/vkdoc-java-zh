    1-7 展示了我们图书馆应用程序的 LDAP 目录树。


    ![](img/319409_2_En_1_Fig7_HTML.jpg)


    图书馆 DIT 的树状图示。DC 等于 example，DC 等于 com 映射到 OU 等于 employees 和 patrons。OU 等于 employees
    映射到 3 名员工，OU 等于 patrons 映射到 2 名借阅者。


    图 1-7


    图书馆 DIT


    我在此目录树中使用了 RFC 224714 的命名规范。该目录树的基项包含两个组织单位条目，分别存储员工和借阅者的信息。树中的 ou=employees 部分将包含所有图书馆员工条目，ou=patrons
    部分将包含图书馆借阅者条目。员工和借阅者的条目类型均为 `inetOrgPerson objectClass`。员工和借阅者均通过其唯一的登录 ID 访问图书馆应用程序。因此，`uid`
    属性将被用作条目的相对区分名（RDN）。


    ## 总结


    LDAP 及其交互应用已成为当今企业的重要组成部分。本章介绍了 LDAP 目录的基础知识。你了解到 LDAP 以条目形式存储信息。每个条目由属性组成，属性本质上是键值对。这些条目可通过其区分名访问。你还了解到
    LDAP 目录具有模式（schema），用于定义可存储的信息类型。


    下一章将探讨如何使用 Java 命名和目录接口（JNDI）与 LDAP 目录通信。在后续章节中，你将专注于使用 Spring LDAP 开发 LDAP 应用程序。


