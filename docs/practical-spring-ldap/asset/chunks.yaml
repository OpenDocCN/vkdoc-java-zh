  raw: '### Base Parameter


    The base portion of the search is a distinguished name (DN) that identifies the
    branch of the tree that will be searched. For example, a base of `"ou=patrons,
    dc=inflinx, dc=com"` indicates that the search will start in the Patron branch
    and move downward. It is also possible to specify an empty base, which will result
    in searching the root DSE entry.


    Note


    The root DSE or DSA-Specific Entry is a special entry in the LDAP server. It typically
    holds server-specific data such as the vendor name, vendor version, and different
    controls and features it supports.


    ### Scope Parameter


    The scope parameter determines how deep, relative to the base, an LDAP search
    needs to be performed. The LDAP protocol defines three possible search scopes:
    base, one level, and subtree. Figure [6-1](#319409_2_En_6_Chapter.xhtml#Fig1)
    illustrates the entries evaluated as part of the search with different scopes.


    ![](images/319409_2_En_6_Chapter/319409_2_En_6_Fig1_HTML.jpg)


    A diagram illustrates the entries of the search with different scopes. Starting
    with base, the possible search scope continues with one level, and subtrees.


    Figure 6-1


    Search scopes


    *   The base scope restricts the search to the LDAP entry identified by the base
    parameter. No other entries will be included as part of the search. In your Library
    application schema, with a base `DN dc=inflinx,dc=com` and scope of the base,
    a search would just return the root organization entry, as shown in Figure [6-1](#319409_2_En_6_Chapter.xhtml#Fig1).


    The one-level scope indicates searching all the entries one level directly below
    the base. The base entry itself is not included in the search. So, with base `dc=inflinx,dc=com`
    and the one-level scope, a search for all entries would return ***employees***
    and ***patrons*** organizational units.


    Finally, the subtree scope includes the base entry and all its descendent entries
    in the search. This is the slowest and most expensive option of the three. In
    your Library example, a search with this scope and base `dc=inflinx, dc=com` would
    return all the entries.


    ### Filter Parameter


    In your Library application LDAP server, let’s say you want to find all the patrons
    that live in the Midvale area. From the LDAP schema, you know patron entries have
    the `city` attribute that holds their city name. So this requirement essentially
    boils down to retrieving all entries with the `city` attribute with a value of
    “Midvale.” This is exactly what a search filter does. A search filter defines
    the characteristics that all the returning entries possess. Logically speaking,
    the filter applies to each entry in the set identified by base and scope. Only
    the entries that match the filter become part of the returned search results.


    An LDAP search filter comprises three components: an attribute type, an operator,
    and a value (or range of values) for the attribute. Depending on the operator,
    the value part can be optional. These components must always be enclosed inside
    parentheses, like so:


    ```

    Filter = (attributetype operator value)

    ```


    With this information in hand, the search filter to locate all patrons living
    in Midvale would look like this:


    ```

    (city=Midvale)

    ```


    Now, let’s say you want to find all the patrons who live in the Midvale area *and*
    have an email address so that you can send them news of occasional library events.
    The resulting search filter combines two filter items: an item that identifies
    patrons in Midvale and an item that identifies patrons with an email address.
    You have already seen the first item of the filter. Here is the other portion
    of the filter:


    ```

    (mail=*)

    ```


    The `=*` operator indicates the presence of an attribute. So the expression `mail=*`
    will return all entries with a value in their `mail` attribute. The LDAP specification
    defines filter operators that can be used to combine multiple filters and create
    complex filters. Here is the format for combining the filters:


    ```

    Filter = (operator filter1 filter2)

    ```


    Notice the use of prefix notation, where the operator is written before their
    operands for combining the two filters. Here is the required filter for your use
    case:


    ```

    (&(city=Midvale)(mail=*))

    ```


    The `&` in this filter is an *And* operator. The LDAP specification defines a
    variety of search filter operators. Table [6-1](#319409_2_En_6_Chapter.xhtml#Tab1)
    lists some of the commonly used operators.


    Table 6-1


    Search Filter Operators


    | Name | Symbol | Example | Description |

    | --- | --- | --- | --- |

    | Equality Filter | = | (sn=Smith) | Matches all the entries with the last name
    Smith. |

    | Substring Filter | =, * | (sn=Smi*) | Matches all entries whose last name begins
    with Smi. |

    | Greater Thanor Equals Filter | >= | (sn>=S*) | Matches all entries that are
    alphabetically greater than or equal to S. |

    | Less Than orEquals Filter | <= | (sn<=S*) | Matches all entries that are alphabetically
    lower than or equal to S. |

    | Presence Filter | =* | (objectClass=*) | Matches all entries that have the attribute
    `objectClass`. This is a popular expression used to retrieve all entries in LDAP.
    |

    | ApproximateFilter | ∼= | (sn∼=Smith) | Matches all entries whose last name is
    a variation of Smith. So this can return Smith and Snith. |

    | And Filter | & | (&(sn=Smith)(zip=84121)) | Returns all Smiths living in the
    84121 area. |

    | Or Filter | &#124; | (&#124;(sn=Smith) (sn=Lee)) | Returns all entries with
    last name Smith or Lee. |

    | Not Filter | ! | (!(sn=Smith)) | Returns all entries whose last name is not
    Smith. |


    ### Optional Parameters


    Besides the preceding three parameters, including several optional parameters
    to control search behavior is possible. For example, the `timelimit` parameter
    indicates the time to complete the search. Similarly, the `sizelimit` parameter
    places an upper bound on the number of entries that can be returned as part of
    the result.


    A very commonly used optional parameter involves providing a list of attribute
    names. When a search is performed, the LDAP server, by default, returns all the
    attributes associated with entries found in the search. Sometimes, this might
    not be desirable. In those scenarios, you can provide a list of attribute names
    as part of the search, and the LDAP server would return only entries with those
    attributes. Here is an example of a search method in the LdapTemplate that takes
    an array of attribute names (`ATTR_1`, `ATTR_2`, and `ATTR_3`):


    ```

    ldapTemplate.search("SEARCH_BASE", "uid=USER_DN", 1, new String[]{"ATTR_1", "ATTR_2",
    ATTR_3}, new SomeContextMapperImpl());

    ```


    When this search is performed, the entries returned will only have `ATTR_1`, `ATTR_2`,
    and `ATTR_3`. This could reduce the data transferred from the server and is useful
    in high-traffic situations.


    Since version 3, LDAP servers can maintain attributes for each entry for purely
    administrative purposes. These are called operational attributes and are not part
    of the entry’s `objectClass`. The returned entries will not contain the operational
    attributes by default when performing an LDAP search. You must list operational
    attribute names in the search criteria to retrieve operational attributes.


    Note


    Examples of operational attributes include `createTimeStamp`, which holds the
    time when the entry was created, and `pwdAccountLockedTime`, which records when
    a user’s account was locked.'
