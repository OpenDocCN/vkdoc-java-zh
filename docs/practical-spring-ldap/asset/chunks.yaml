    WhitespaceWildcardsFilter filter = new WhitespaceWildcardsFilter("cn", "Abbey
    Abbie");

    List results = searchFilter.searchAndPrintResults(filter);

    assertAll(() -> assertNotNull(results), () -> assertEquals(1, results.size()));

    }

