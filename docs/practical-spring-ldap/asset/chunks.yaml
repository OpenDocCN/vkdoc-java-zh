    # Handling Authentication Exceptions


    The previous `authenticate` methods in `LdapTemplate` simply tell you whether
    authentication succeeded or failed. There will be cases where you are interested
    in the actual exception that caused the failure. For those scenarios, `LdapTemplate`
    provides overloaded versions of the `authenticate` method. The API for one of
    the overloaded `authenticate` methods is as follows:


    ```

    boolean authenticate(String base, String filter, String password, `AuthenticationErrorCallback`
    errorCallback);

    ```


    Any exceptions that occur during the execution of the preceding `authenticate`
    method will be passed on to an `AuthenticationErrorCallback` instance provided
    as the method parameter. This collected exception can be logged or used for post-authentication
    processes. Listings [10-7](#319409_2_En_10_Chapter.xhtml#PC10) and [10-8](#319409_2_En_10_Chapter.xhtml#PC11)
    show the `AuthenticationErrorCallback` API and its simple implementation. The
    `execute` method in the callback can decide what to do with the raised exception.
    In your simple implementation, you just store it and make it available to the
    `LdapTemplate`’s search caller.


    ```

    package com.apress.book.ldap.exception;

    import org.springframework.ldap.core.`AuthenticationErrorCallback`;

    public class `EmployeeAuthenticationErrorCallback` implements `AuthenticationErrorCallback`
    {

    private Exception `authenticationException`;

    @Override

    public void execute(Exception ex) {

    this.`authenticationException` = ex;

    }

    public Exception get`authenticationException`() {

    return `authenticationException`;

    }

    }

    Listing 10-8

    A possible definition of a callback

    ```


    ```

    package org.springframework.ldap.core;

    public interface `AuthenticationErrorCallback` {

    void execute(Exception ex);

    }

    Listing 10-7

    The interface with the default method executes

    ```


    Listing [10-9](#319409_2_En_10_Chapter.xhtml#PC12) shows the modified `AuthenticationDao`
    implementation and the error callback; here, you simply log the failed exception
    to the console.


    ```

    package com.apress.book.ldap.repository;

    import com.apress.book.ldap.exception.`EmployeeAuthenticationErrorCallback`;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.beans.factory.annotation.Qualifier;

    import org.springframework.ldap.core.`LdapTemplate`;

    import org.springframework.stereotype.Repository;

    @Repository("authenticationDao3")

    public class `AuthenticationDaoImpl3` implements `AuthenticationDao` {

    private static final Logger logger = LoggerFactory.getLogger(`AuthenticationDaoImpl3`.class);

    public static final String `BASE_DN` = "ou=patrons,dc=inflinx,dc=com";

