  raw: '## Removing an Entry


    Removing an entry using JNDI is a straightforward process shown in Listing [2-8](#319409_2_En_2_Chapter.xhtml#PC10).
    The destroySubcontext method takes the fully qualified DN of the entry that needs
    to be deleted.


    ```

    public void remove(String dn) {

    DirContext context = null;

    try {

    context = getContext();

    context.destroySubcontext(dn);

    } catch (NamingException e) {

    // Handle the exception and show the description of the problem

    } finally {

    closeContext(context);

    }

    }

    Listing 2-8

    How to remove an entry

    ```


    Many LDAP servers don’t allow an entry to be deleted if it has child entries.
    In those servers, deleting a non-leaf entry would require traversing the subtree
    and deleting all the child entries. Then the non-leaf entry can be deleted. Listing
    [2-9](#319409_2_En_2_Chapter.xhtml#PC11) shows the code involved in deleting a
    subtree.


    ```

    public void removeSubtree(DirContext ctx, String root) throws NamingException
    {

    NamingEnumeration enumeration = null;

    try {

    enumeration = ctx.listBindings(root);

    while (enumeration.hasMore()) {

    Binding childEntry = (Binding) enumeration.next();

    LdapName childName = new LdapName(root);

    childName.add(childEntry.getName());

    try {

    ctx.destroySubcontext(childName);

    } catch (ContextNotEmptyException e) {

    removeSubtree(ctx, childName.toString());

    ctx.destroySubcontext(childName);

    }

    }

    } catch (NamingException e) {

    // Handle the exception and show the description of the problem

    } finally {

    try {

    enumeration.close();

    } catch (Exception e) {

    // Handle the exception and show the description of the problem

    }

    }

    }

    Listing 2-9

    How to remove a subtree of elements

    ```


    Note


    The OpenDJ LDAP server supports a special subtree delete control that can cause
    the server to delete the non-leaf entry and all its child entries when attached
    to a delete request. We will look at using LDAP controls in Chapter [7](#319409_2_En_7_Chapter.xhtml).


    ## Searching Entries


    Searching for information is usually the most common operation against an LDAP
    server. To perform a search, we need to provide information such as the scope
    of the search, what we are looking for, and what attributes need to be returned.
    In JNDI, this search metadata is provided using the SearchControls class. Listing
    [2-10](#319409_2_En_2_Chapter.xhtml#PC12) provides an example of a search control
    with subtree scope and returns the ***givenName*** and ***telephoneNumber*** attributes.
    The subtree scope indicates that the search should start from the given base entry
    and should search all its subtree entries. We will look at the different scopes
    available in detail in Chapter [6](#319409_2_En_6_Chapter.xhtml).


    ```

    SearchControls searchControls  =  new  SearchControls();

    searchControls.setSearchScope(SearchControls.SUBTREE_SCOPE);

    searchControls.setReturningAttributes(new String[]{"givenName",

    "telephoneNumber"});

    Listing 2-10

    The attributes to return for each entry

    ```


    Once the search controls are defined, the next step is invoking one of the many
    search methods in the ***DirContext*** instance. Listing [2-11](#319409_2_En_2_Chapter.xhtml#PC13)
    provides the code that searches all the employees and prints their first name
    and telephone number.


    ```

    public void search() {

    DirContext context = null;

    NamingEnumeration searchResults = null;

    try {

    context = getContext();

    // Setup Search meta data

    SearchControls searchControls = new SearchControls();

    searchControls.setSearchScope(SearchControls.SUBTREE_SCOPE);

    searchControls.setReturningAttributes(new String[] { "givenName", "telephoneNumber"
    });

    searchResults = context.search("dc=inflinx,dc=com", "(objectClass=inetOrgPerson)",
    searchControls);

    while (searchResults.hasMore()) {

    SearchResult result = searchResults.next();

    Attributes attributes = result.getAttributes();

    String firstName = (String) attributes.get("givenName").get();

    // Read the multi-valued attribute

    Attribute phoneAttribute = attributes.get("telephoneNumber");

    String[] phone = new String[phoneAttribute.size()];

    NamingEnumeration phoneValues = phoneAttribute.getAll();

    for (int i = 0; phoneValues.hasMore(); i++) {

    phone[i] = (String) phoneValues.next();

    }

    //You can use logback or system.out

    logger.info(firstName + "> " + Arrays.toString(phone));

    }

    } catch (NamingException e) {

    // Handle the exception and show the description of the problem

    } finally {

    try {

    if (null != searchResults) {

    searchResults.close();

    }

    closeContext(context);

    } catch (NamingException e) {

    // Handle the exception and show the description of the problem

    }

    }

    }

    Listing 2-11

    How to search elements

    ```


    Here, we used the search method with three parameters: a base that determines
    the search’s starting point, a filter that narrows down the results, and a search
    control. The search method returns an enumeration of SearchResults. Each search
    result holds the LDAP entry’s attributes. Hence, we loop through the search results
    and read the attribute values. Notice that we obtain another enumeration instance
    for multivalued attributes and read its values one at a time. In the final part
    of the code, we close the result enumeration and the context resources.'
