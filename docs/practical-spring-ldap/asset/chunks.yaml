    ## 创建自定义转换器


    考虑这样一个场景：你的`Patron`类使用自定义的`PhoneNumber`类来存储借阅者的电话号码。现在，当需要持久化`Patron`类时，你需要将`PhoneNumber`类转换为
    String 类型。同样，当你从 LDAP 读取`Patron`类时，电话属性中的数据需要转换为`PhoneNumber`类。默认的`ToStringConverter`和`FromStringConverter`对于这种转换将不再适用。列表
    8-11 展示了新的`PhoneNumber`类，该类包含以不同格式表示电话号码的属性。


    ```

    package com.apress.book.ldap.custom;

    public class PhoneNumber {

    private int areaCode;

    private int exchange;

    private int extension;

    public PhoneNumber(int areaCode, int exchange, int extension) {

    this.areaCode = areaCode;

    this.exchange = exchange;

    this.extension = extension;

    }

    // 设置器和获取器

    public boolean equals(Object obj) {

    if(obj == null || obj.getClass() != this.getClass()) { return false; }

    PhoneNumber p = (PhoneNumber) obj;

    return (this.areaCode ==  p.areaCode) && (this.exchange == p.exchange) && (this.extension
    == p.extension);

    }

    public String toString() {

    return String.format("+1 %03d %03d %04d", areaCode, exchange, extension);

    }

    // 满足 hashCode 协议

    public int hashCode() {

    int result = 17;

    result = 37 * result + areaCode;

    result = 37 * result + exchange;

    result = 37 * result + extension;

    return result;

    }

    }

    列表 8-11

    包含所有属性的 PhoneNumber 类

    ```


    现在，让我们修改`Patron`类，如列表 8-12 所示。


    ```

    package com.apress.book.ldap.custom;

    import java.util.List;

    import javax.naming.Name;

    import org.springframework.ldap.odm.annotations.Attribute;

    import org.springframework.ldap.odm.annotations.Entry;

    import org.springframework.ldap.odm.annotations.Id;

    @Entry(objectClasses = { "inetorgperson", "organizationalperson", "person", "top"
    })

    public class Patron {

    @Id

    private Name dn;

    @Attribute(name = "sn")

    private String lastName;

    @Attribute(name = "givenName")

    private String firstName;

    @Attribute(name = "telephoneNumber")

    private PhoneNumber phoneNumber;

    @Attribute(name = "cn")

    private String fullName;

    private String mail;

    @Attribute(name = "objectClass")

    private List objectClasses;

    @Attribute(name = "employeeNumber", syntax = "2.16.840.1.113730.3.1.3")

    private int employeeNumber;

    // 字段和设置器、获取器

    @Override

    public String toString() {

    return "Dn: " + dn + ", firstName: " + firstName + ", fullName: " + fullName +
    ", 电话号码: " + phoneNumber;

    }

    }

