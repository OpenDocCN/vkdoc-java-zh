    # 1. Introduction to LDAP


    We all deal with directories daily. We use a telephone directory to look up phone
    numbers. When visiting a library, we use the library catalog to look up the books
    we want to read. We use the file system directory with computers to store our
    files and documents. Simply put, a directory is a repository of information. The
    information is usually organized so that it can be retrieved easily.


    Directories on a network are typically accessed using the client/server communication
    model. Applications wanting to read or write data to a directory communicate with
    specialized servers. The directory server performs a read or write operation on
    the actual directory. Figure [1-1](#319409_2_En_1_Chapter.xhtml#Fig1) shows this
    client/server interaction.


    ![](images/319409_2_En_1_Chapter/319409_2_En_1_Fig1_HTML.jpg)


    An illustration of the server and client interaction. The client application is
    interconnected with the directory server through request and response. The directory
    server reads or writes on the actual directory.


    Figure 1-1


    Directory server and client interaction


    The communication between the directory server and client applications is usually
    accomplished using standardized protocols. The Lightweight Directory Access Protocol
    (`LDAP`) provides a standard protocol for communicating with a directory. The
    directory servers that implement the `LDAP` protocol are usually called `LDAP`
    servers. The `LDAP` protocol is based on an earlier `X.500`^([⁹](#fn9)) standard
    but is significantly simpler (lightweight) and easily extensible. Over the years,
    the `LDAP` protocol went through iterations and is currently at version 3.0.


    ## LDAP Overview


    `LDAP` defines a message protocol used by directory clients and directory servers.
    `LDAP` can be better understood by considering the following four models it is
    based on:


    * The Information model determines the structure of information stored in the
    directory.


    * The Naming model defines how information is organized and identified in the
    directory.


    * The Functional model defines the operations performed on the directory.


    * The Security model defines how to protect information from unauthorized access.


    We will look at each of these models in the following sections.


    ### Directory vs. Database


    Beginners often need clarification and picture an `LDAP` directory as a relational
    `RDBMS`^([^(12)](#fn12)) database. Like a database, an `LDAP` directory stores
    information. However, several key characteristics set a directory apart from relational
    databases.


    `LDAP` directories typically store data that is relatively static. For example,
    employee information stored in `LDAP`, such as their phone number or name, does
    not change daily. However, users and applications look up this information very
    frequently. Since the data in a directory is accessed more often than updated,
    `LDAP` directories follow the WORM principle^([^(10)](#fn10),) ^([^(11)](#fn11))
    and are heavily optimized for read performance. Placing data that change quite
    often in `LDAP` does not make sense.


    Relational databases employ referential integrity and locking techniques to ensure
    data consistency. The type of data stored in `LDAP` usually does not warrant such
    strict consistency requirements. Hence, most of these features need to be present
    on `LDAP` servers. Also, transactional semantics to roll back transactions are
    not defined under `LDAP` specification.


    Relational databases follow normalization principles to avoid data duplication
    and redundancy. On the other hand, `LDAP` directories are organized in a hierarchical,
    object-oriented way. This organization violates some of the normalization principles.
    Also, there needs to be a concept of table joins in `LDAP`.


    Even though directories lack several of the `RDBMS`^([^(12)](#fn12)) features
    mentioned earlier, many modern `LDAP` directories are built on top of relational
    databases such as `DB2`^([^(13)](#fn13)), `MySQL`^([^(14)](#fn14)), and `PostgreSQL`^([^(15)](#fn15)).


    At some point, `LDAP` has similar characteristics to nonrelational databases like
    `Cassandra`^([^(16)](#fn16)), `MongoDB`^([^(17)](#fn17)), and many others where
    the performance of the write/read, high availability, and scalability are more
    relevant than the consistency.

