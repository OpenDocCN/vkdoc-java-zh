    ## 池验证


    Spring LDAP 使得验证池化连接变得简单。这种验证确保在从池中借用 `DirContext` 实例之前，它们已正确配置并连接到 LDAP 服务器。在上下文被归还到池中或处于空闲状态时，也会执行相同的验证。


    `PoolingContextSource` 将验证委托给 `org.springframework.ldap.pool.validation.DirContextValidator`
    接口的具体实现。在清单 10-15 中，你可以看到 `DirContextValidator` 只有一个方法：`validateDirContext`。第一个参数
    `contextType` 指示待验证的上下文是只读上下文还是读写上下文。第二个参数是需要验证的实际上下文。


    ```

    package org.springframework.ldap.pool.validation;

    import javax.naming.directory.DirContext;

    import org.springframework.ldap.core.ContextSource;

    import org.springframework.ldap.pool.DirContextType;

    public interface DirContextValidator {

    boolean validateDirContext(DirContextType contextType, DirContext dirContext);

    }

    清单 10-15

    上下文验证器的声明

    ```


    开箱即用，Spring LDAP 提供了一个命名恰当的 `DirContextValidator` 默认实现，名为 `org.springframework.ldap.pool.validation.DefaultDirContextValidator`。该实现简单地使用上下文进行搜索，并验证返回的
    `javax.naming.NamingEnumeration`。如果 `NamingEnumeration` 不包含任何结果，或者抛出了异常，则上下文验证失败，并将从池中移除。需要更复杂验证的应用程序可以创建
    `DirContextValidator` 接口的新实现。


    配置池验证如清单 10-14 所示。首先，创建一个类型为 `DefaultDirContextValidator` 的 `dirContextValidator`
    bean。然后，修改 `contextSource` bean 的声明以包含 `dirContextValidator` bean。在清单 10-16 中，你添加了
    `testOnBorrow` 和 `testWhileIdle` 属性。


    ```


    清单 10-16

    上下文验证器的修改

    ```


    另一种实现方式如清单 10-14 所示，但需要对 **<ldap:pooling>** 标签稍作修改，如清单 10-16 所示。


    ## 总结


    至此，我们的旅程已接近尾声。通过本书，你已经学习了 Spring LDAP 的关键特性。掌握了这些知识，你应该能够开始开发基于 Spring LDAP 的应用程序了。


    最后，撰写本书并与你分享我的见解是一件乐事。祝你一切顺利。编码愉快！

    '
