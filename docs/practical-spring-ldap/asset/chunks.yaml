    ### WhitespaceWildcardsFilter


    The `WhitespaceWildcardsFilter` is another convenience class that makes creating
    substring search filters easier. Like its superclass `EqualsFilter`, this class
    takes an attribute name and a value. However, as the name suggests, it converts
    all whitespaces in the attribute value to wildcards. Consider the following example:


    ```

    WhitespaceWildcardsFilter filter = new WhitespaceWildcardsFilter("cn", "John Will");

    ```


    This filter results in the following expression: `(cn=*John*Will*)`. This filter
    can be useful while developing search and lookup applications. Listing [6-14](#319409_2_En_6_Chapter.xhtml#PC34)
    shows the test case of this filter and the result.


