    ### HardcodedFilter


    The `HardcodedFilter` is a convenience class that makes adding static filter text
    while building search filters easy. Let’s say you are writing an admin application
    that allows the administrator to enter a search expression in a text box. If you
    want to use this expression along with other filters for a search, you can use
    `HardcodedFilter`, as shown:


    ```

    String searchExpression = "(sn=Aguirre)";

    AndFilter filter = new AndFilter();

    filter.and(new HardcodedFilter(searchExpression));

    filter.and(new EqualsFilter("givenName", "Aggie"));

    ```


    In this code, the `searchExpression` variable contains the user-entered search
    expression. `HardcodedFilter` also comes in very handy when the static portion
    of a search filter comes from a properties file or a configuration file. It is
    important to remember that this filter does not encode the passed-in text. So
    please use it cautiously, especially when dealing with user input directly.


    This `HardcodedFilter` will retrieve all patrons following both expressions. The
    `encode` method returns the expression `(&(sn=Aguirre)(givenName=Aggie))`. The
    test case for the `HardcodedFilter` is shown in Listing [6-13](#319409_2_En_6_Chapter.xhtml#PC32).


    ```

    @Test

    @DisplayName("Check that search operation using hardcoded filter works")

    public void should_works_HardcodedFilter() {

    String searchExpression;

    AndFilter filter = new AndFilter();

    filter.and(new HardcodedFilter("(sn=Aguirre)"));

    filter.and(new EqualsFilter("givenName", "Aggie"));

    List results = searchFilter.searchAndPrintResults(filter);

    assertAll(

    () -> assertNotNull(results),

    () -> assertEquals(1, results.size())

    );

    }

    Results found in search: 1

    Full name: Aggie Aguirre

    Listing 6-13

    Example of a hardcoded filter

    ```


