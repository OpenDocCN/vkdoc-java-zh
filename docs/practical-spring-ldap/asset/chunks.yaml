    ## Summary


    In this chapter, you took a deep dive into testing LDAP code. You started with
    an overview of testing concepts. Then you spent time setting up UnboundID for
    embedded testing. Although embedded testing simplifies things, there are times
    when you want to test code, minimizing the need for external infrastructure dependencies,
    but remember that if you want to be sure whether everything on your source code
    works fine or not, `Testcontainers` is the best alternative to do it.


    In the next chapter, you will look at creating Data Access Objects (DAOs) that
    interact with LDAP using object factories.


    ## JNDI Object Factories


    JNDI provides the notion of object factories, which makes dealing with LDAP information
    easier. As the name suggests, an object factory transforms directory information
    into meaningful objects for the application. For example, object factories can
    have a search operation return object instances like `Patron` or `Employee` instead
    of plain `javax.naming.NamingEnumeration`.


    Figure [5-1](#319409_2_En_5_Chapter.xhtml#Fig1) depicts the flow involved when
    an application performs LDAP operations with an object factory. The flow starts
    with the application invoking a search or a lookup operation. The JNDI API will
    execute the requested operation and retrieve entries from LDAP. These results
    are then passed to the registered object factory, transforming them into objects.
    These objects are handed over to the application.


    ![](images/319409_2_En_5_Chapter/319409_2_En_5_Fig1_HTML.jpg)


    An illustration of the JNDI or object factory flow. The blocks application, JNDI
    API, LDAP, and object factory are interconnected to each other in sequence.


    Figure 5-1


    JNDI/object factory flow


    Object factories dealing with LDAP must implement the `javax.naming.spi.DirObjectFactory`
    interface. `PatronObjectFactory` is an example of an object factory implementation
    that takes the passed-in information and creates a `Patron` instance. The `obj`
    parameter to the `getObjectInstance` method holds reference information about
    the object. The `name` parameter holds the name of the object. The `attrs` parameter
    contains the attributes associated with the object. In the `getObjectInstance`,
    you read the required attributes and populate the newly created `Patron` instance.


    ```

    package `com.apress.book.ldap`;

    import java.util.Hashtable;

    import javax.naming.Context;

    import javax.naming.Name;

    import javax.naming.directory.Attributes;

    import javax.naming.directory.BasicAttributes;

    import javax.naming.spi.DirObjectFactory;

    import `com.apress.book.ldap.domain.Patron`;

    public class `PatronObjectFactory` implements DirObjectFactory {

    @Override

    public Object `getObjectInstance`(Object obj, Name name, Context nameCtx, Hashtable
    environment,

    Attributes attrs) {

    `Patron` patron = new `Patron`();

    patron.setUid(attrs.get("uid").toString());

    patron.setFullName(attrs.get("cn").toString());

    return patron;

    }

    @Override

    public Object `getObjectInstance`(Object obj, Name name, Context nameCtx, Hashtable
    environment){

    return `getObjectInstance`(obj, name, nameCtx, environment, new BasicAttributes());

    }

    }

    ```


    Before using this object factory, it must be registered during initial context
    creation. `JndiObjectFactoryLookupExample` shows an example of using `PatronObjectFactory`
    during lookups. You register the `PatronObjectFactory` class using the `DirContext.OBJECT_FACTORIES`
    property. Notice that the context’s lookup method now returns a `Patron` instance.


    Note


    Remember that Appendix C provides all the information about configuring the LDAP
    server.


    ```

    package `com.apress.book.ldap`;

    import java.util.Properties;

    import javax.naming.NamingException;

    import javax.naming.directory.DirContext;

    import javax.naming.ldap.InitialLdapContext;

    import javax.naming.ldap.LdapContext;

    import `com.apress.book.ldap.domain.Patron`;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    public class `JndiObjectFactoryLookupExample` {

    private static final Logger logger = LoggerFactory.getLogger(`JndiObjectFactoryLookupExample`.class);

    private LdapContext getContext() throws NamingException {

    Properties environment = new Properties();

    environment.setProperty(DirContext.INITIAL_CONTEXT_FACTORY, "com.sun.jndi.ldap.LdapCtxFactory");

    environment.setProperty(DirContext.PROVIDER_URL, "ldap://localhost:11389");

    environment.setProperty(DirContext.SECURITY_PRINCIPAL, "cn=Directory Manager");

    environment.setProperty(DirContext.SECURITY_CREDENTIALS, "secret");

    environment.setProperty(DirContext.OBJECT_FACTORIES, "com.apress.book.ldap.`PatronObjectFactory`");

    return new InitialLdapContext(environment, null);

    }

    public `Patron` lookupPatron(String dn) {

    `Patron` patron = null;

    try {

    LdapContext context = getContext();

    patron = (`Patron`) context.lookup(dn);

    } catch (NamingException e) {

    logger.error(e.getClass() + ": " + e.getMessage());

    }

    return patron;

    }

    public static void main(String[] args) {

    `JndiObjectFactoryLookupExample` jle = new `JndiObjectFactoryLookupExample`();

    `Patron` p = jle.lookupPatron("uid=patron99,ou=patrons,dc=inflinx,dc=com");

    logger.info(p.toString());

    }

    }

    ```


    If you run the previous example, you will see the following output:


    ```

    11:53:14.630 [main] INFO  c.a.b.l.`JndiObjectFactoryLookupExample` - Full name:cn:
    Aggie Aguirre

    ```


    Consider that with Spring LDAP, none of the previous examples have this level
    of complexity.

    '
