    \ 将提供有关异常原因的信息，因此建议使用一种机制将日志保存在任何人都可以访问的地方。\n\n## JNDI 的缺点\n\n尽管 JNDI 为访问目录服务提供了良好的抽象，但它存在一些缺点：\n\
    \n*   显式资源管理\n\n    开发人员需要负责关闭所有资源。这非常容易出错，可能导致内存泄漏。\n\n*   管道代码\n\n    上述方法包含大量管道代码，这些代码可以轻松抽象和重用。这些管道代码使测试变得困难，开发人员必须学习\
