    Table 4-1


    JUnit 5 Annotations


    | Annotation | Description |

    | --- | --- |

    | @Test | Annotates a method as a JUnit test method. The method should be of public
    scope and have a void return type. |

    | @BeforeEach | Marks a method to run before every test method. Useful for setting
    up test fixtures. The @Before method of a superclass is run before the current
    class. |

    | @AfterEach | Marks a method to be run after every test method. Useful for tearing
    down test fixtures. The @After method of a superclass is run after the current
    class. |

    | @Disabled | Marks a method to be ignored during test runs. This helps avoid
    the need for commenting on half-baked test methods. |

    | @DisplayName | This annotation gives a specific name to a class or method. On
    this annotation, you can use special characters, numbers, spaces, or emojis. |

    | @BeforeAll | Annotates a method to run before any test method is run. For a
    test case, the method is run only once and can be used to provide class-level
    setup work. |

    | @AfterAll | Annotates a method to run after all the test methods are run. This
    can be useful for performing any cleanups at a class level. |

    | @ExtendWith | Specifies the class extends the test methods for another one.
