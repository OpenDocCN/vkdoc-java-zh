    \ the Java community.\n"
  raw: '### Unit Testing


    Unit testing is a methodology where the smallest parts of the application, referred
    to as units, are verified and validated individually in isolation. In structural
    programming, the unit could be an individual method or function. In object-oriented
    programming (OOP), an object is the smallest executable unit. Interaction between
    objects is central to any OO design and is usually done by invoking methods. Thus,
    unit testing in OOP can range from testing individual methods to testing a cluster
    of objects.


    Writing unit tests requires a developer’s time and effort. But this investment
    has been proven to deliver several undeniable benefits.


    Note


    It is essential to measure how much of the code is covered by unit tests. To do
    this, several tools could help you, like Emma,^([^(46)](#fn46)) Clover,^([^(47)](#fn47))
    and Jacoco.^([^(48)](#fn48)) The most used of the tools is Jacoco, which allows
    you to upload the metrics to Sonar5 to centralize all the information about the
    coverage of all your applications and give you the possibility to define quality
    gates which indicates the minimum coverage your company accepts.


    If you want to learn more about what code coverage implies and how the tools generate
    the percentage of coverage, there is an excellent article on Martin Fowler’s blog.^([^(49)](#fn49))


    The most significant advantage of unit testing is that it can help identify bugs
    at the early stages of development. Bugs discovered only during QA or in production
    consume much more debugging time and money. Also, a good set of unit tests acts
    as a safety net and gives confidence when code is refactored. Unit tests can help
    improve the design and even serve as documentation.


    Good unit tests have the following characteristics:


    *   Every unit test must be independent of other tests. This atomic nature is
    essential, and each test must not cause any side effects to other tests. Unit
    tests should also be order independent.


    *   A unit test must be repeatable. For a unit test to be of any value, it must
    produce consistent results. Otherwise, it cannot be used as a sanity check during
    refactoring.


    *   Unit tests must be easy to set up and clean up. So they should not rely on
    external systems such as databases and servers.


    *   Unit tests must be fast and provide immediate feedback. It would not be productive
    to wait on long-running tests before you make another change.


    *   Unit tests must be self-validating. Each test should contain enough information
    to determine whether a test passes or fails automatically. No manual intervention
    should be needed to interpret the results.


    Enterprise applications often use external systems like databases, directories,
    and web services. This is especially true in the DAO layer. Unit testing database
    code, for example, may involve starting a database server, loading it with schema
    and data, running tests, and shutting down the server. This quickly becomes tricky
    and complex. One approach is to use mock objects and hide the external dependencies.
    Where this is not sufficient, it may be necessary to use integration testing and
    test the code with external dependencies intact.


    One of the most used libraries to test a Java application is JUnit,^([^(50)](#fn50))
    which has many other libraries that add extra features, including Spring Boot
    Test,^([^(51)](#fn51)) which uses the latest version of JUnit to do certain operations.
    Consider other alternatives to testing in Java, like Spock^([^(52)](#fn52)) or
    TestNG.^([^(53)](#fn53)) Still, these are out of the scope of this book, discussing
    the pros and cons of each possible option because there are many books and articles
    covering this topic.


    ### Mock Testing


    The goal of mocks in testing is to use mock objects to simulate real objects in
    controlled ways. Mock objects implement the same interface as real objects but
    are scripted to mimic/fake and track their behavior. There is no restriction about
    using mocks on any type of testing, but in this case, it is applied to the unit
    tests.


    For example, consider a `UserAccountService` that has a method to create new user
    accounts. Implementing such a service usually involves validating the account
    information against business rules, storing the newly created account in a database,
    and sending a confirmation email. Persisting data and emailing information are
    usually abstracted out to classes in other layers. When writing a unit test to
    validate the business rules associated with account creation, you might not care
    about the intricacies of the email notification part. However, you do want to
    verify that an email was generated. This is precisely where mock objects come
    in handy. To achieve this, you just need to give the `UserAccountService` a mock
    implementation of the `EmailService` responsible for sending emails. The mock
    implementation will mark the email request and return a hardcoded result. Mock
    objects are a great way to isolate tests from complex dependencies, allowing them
    to run faster.


    Note


    If you want to learn more about mocks, stubs, and other types of fake responses,
    there is a great article on Martin Fowler’s blog.^([^(54)](#fn54)) Also, you can
    read *Effective Software Testing*^([^(55)](#fn55)) by Manning, another great resource
    to learn about mocks and other testing-related topics.


    Several open source frameworks make working with mock objects easier. Popular
    ones include Mockito,^([^(56)](#fn56)) EasyMock,^([^(57)](#fn57)) JMock,^([^(58)](#fn58))
    and PowerMock.^([^(59)](#fn59)) In the case of this book, you will use Mockito,
    which is one of the most popular options to create mocks, integrates with many
    other libraries like JUnit, is well documented, and has a big community of users.


    Some of these frameworks allow the creation of mocks for classes that don’t implement
    any interfaces. Regardless of the framework used, unit testing using mock objects
    usually involves the following steps:


    *   Create a new mock instance.


    *   Set up the mock. This involves instructing the mock what to expect and what
    to return.


    *   Run the tests, passing the mock instance to the component under test.


    *   Verify the results.


    Note


    It’s not the scope of this book to explain all the possible features, pros, and
    cons of each framework, so this chapter only covers the most relevant aspects
    of creating mocks using Mockito. If you want to learn more about this great library,
    there is the book *Mockito Made Clear*^([^(60)](#fn60)) by Ken Kousen.


    ### Integration Testing


    Even though mock objects serve as great placeholders, you will soon run into cases
    where faking will not be enough. This is especially true for DAO layer code, where
    you must validate SQL query executions and verify modifications to database records.
    Testing this kind of code falls under the umbrella of integration testing. As
    mentioned earlier, integration testing focuses on testing interactions between
    components with their dependencies in place.


    It has become common for developers to write automated integration tests using
    unit testing tools, thereby blurring the distinction between them. However, it
    is important to remember that integration tests are usually slower and don’t run
    in isolation. Frameworks such as Spring provide container support for writing
    and executing integration tests easily. The improved availability of embedded
    databases, directories, and servers enables developers to write faster integration
    tests.


    In the case of this chapter, you will see two different alternatives to create
    integration tests. One uses an embedded LDAP, and another uses a Docker container
    to run an image of the LDAP vendor that you use throughout the different chapters
    of this book. The following sections will give you more detail about the difference
    between both alternatives.


    ## Libraries to Do Tests


    In the case of LDAP, there are several libraries to do tests, but in this section,
    you will see the basics about the most used in the Java community.'
