    Maven requires a group id and artifact id to uniquely identify a dependency. A
    group id is usually unique to a project or organization and is similar to the
    concept of a Java package. The artifact id is typically the name of the project
    or a generated component of the project. The scope determines the phase during
    which the dependency should be included in the classpath. Here are a few possible
    values:


    *   *Test*: A test scope indicates that the dependency should be included in the
    classpath only during the testing. JUnit is an example of such dependency.


    *   *Provided*: The provided scope indicates that the artifact should be included
    in the classpath during compilation only. Provided scope dependencies are usually
    available at runtime via JDK or application container.


    *   *Compile*: A compile scope indicates that the dependency should always be
    included in the classpath.


    An additional section in the `pom.xml` file contains information about the plug-ins
    Maven can use to compile and build the code. One such plug-in declaration is displayed
    in Listing [3-2](#319409_2_En_3_Chapter.xhtml#PC7). It indicates to Maven to use
    the plug-in named ‘maven-compiler-plugin’ with version 3.11.0 to compile Java
    code, consider that in Listing [3-2](#319409_2_En_3_Chapter.xhtml#PC7) appears
    references to properties that are declared in Listing [3-1](#319409_2_En_3_Chapter.xhtml#PC6).
    The `finalName` indicates the name of the generated artifact. In this case, it
