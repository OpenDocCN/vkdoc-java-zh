    ## Paged Search Controls


    The paged search control allows LDAP clients to control the rate at which the
    results of an LDAP search operation are returned. The LDAP clients create a page
    control with a specified page size and associate it with the search request. Upon
    receiving the request, the LDAP server will return the results in chunks, each
    containing the specified number of results. The paged search control is handy
    when dealing with large directories or building search applications with paging
    capabilities. This control is described in RFC 2696.^([^(79)](#fn79))


    Figure [7-6](#319409_2_En_7_Chapter.xhtml#Fig6) describes the LDAP client and
    server interaction using a page control.


    ![](images/319409_2_En_7_Chapter/319409_2_En_7_Fig6_HTML.jpg)


    An illustration of the page control interaction. LDAP client and server interact
    through search requests page controls and search results cookies.


    Figure 7-6


    Page control interaction


    Note


    LDAP servers often use the `sizeLimit` directive to restrict the number of results
    returned for a search operation. If a search produces more results than the specified
    `sizeLimit`, a size limit exceeds exception `javax.naming.SizeLimitExceededException`
    is thrown. The paging method does not let you pass through this limit.


    The LDAP client sends the search request along with the page control. Upon receiving
    the request, the LDAP server executes the search operation and returns the first
    page of results. Additionally, it sends a cookie that needs to be used to request
    the next paged results set. This cookie enables the LDAP server to maintain the
    search state. The client must not make any assumptions about the internal structure
    of the cookie. When the client requests the next batch of results, it sends the
    same search request page control and the cookie. The server responds with the
    new result set and a new cookie. When no more search results are returned, the
    server sends an empty cookie.


    Paging using the paged search control is unidirectional and sequential. The client
    can’t jump between pages or go back. Now that you know the basics of the paging
    control, Listing [7-14](#319409_2_En_7_Chapter.xhtml#PC17) shows its implementation
    using the plain JNDI API.


    Upon invoking the method, the paginated patrons will be displayed on the console
    as shown in Listing [7-14](#319409_2_En_7_Chapter.xhtml#PC17).


    ```

    sn: Amar ( uid=patron0,ou=patrons )

    sn: Atp ( uid=patron1,ou=patrons )

    sn: Atpco ( uid=patron2,ou=patrons )

    sn: Atrc ( uid=patron3,ou=patrons )

    sn: Aalders ( uid=patron4,ou=patrons )

    sn: Aasen ( uid=patron5,ou=patrons )

    sn: Abadines ( uid=patron6,ou=patrons )

    sn: Abazari ( uid=patron7,ou=patrons )

    sn: Abbatantuono ( uid=patron8,ou=patrons )

    sn: Abbate ( uid=patron9,ou=patrons )

    sn: Abbie ( uid=patron10,ou=patrons )

    sn: Abbott ( uid=patron11,ou=patrons )

    sn: Abdalla ( uid=patron12,ou=patrons )

    sn: Abdo ( uid=patron13,ou=patrons )

    sn: Abdollahi ( uid=patron14,ou=patrons )

    sn: Abdou ( uid=patron15,ou=patrons )

    sn: Abdul-Nour ( uid=patron16,ou=patrons )

    sn: Abdulla ( uid=patron17,ou=patrons )

    sn: Abdullah ( uid=patron18,ou=patrons )

    sn: Abe ( uid=patron19,ou=patrons )

    ---End page ---

    sn: Abedi ( uid=patron20,ou=patrons )

    sn: Abel ( uid=patron21,ou=patrons )

    sn: Abell ( uid=patron22,ou=patrons )

    ...............

    ```


    In Listing [7-14](#319409_2_En_7_Chapter.xhtml#PC17), you start implementing by
    obtaining a context on the LDAP server. Then, you create the `PagedResultsControl`
    and specify the page size as its constructor parameter. You add the control to
    the context and perform the search operation. Then, you loop through the search
    results and display the information on the console. As the next step, you examine
    the response controls to identify the server sent `PagedResultsResponseControl`.
    From that control, you extract the cookie and an estimated total number of results
    for this search. The resulting count is optional information, and the server can
    simply return zero, indicating an unknown count. Finally, you create a new `PagedResultsControl`
    with the page size and the cookie as its constructor parameter. This process is
    repeated until the server sends an empty (null) cookie, indicating no more results
    to be processed.


    Spring LDAP abstracts most of the code in Listing [7-14](#319409_2_En_7_Chapter.xhtml#PC17),
    making it easy to deal with page controls using the `PagedResultsDirContextProcessor`.


    In this implementation, you create the `PagedResultsDirContextProcessor` with
    the page size and a cookie. Note that you are using the `org.springframework.ldap.control.PagedResultsCookie`
    class for abstracting the cookie sent by the server. The cookie value initially
    starts with a null. Then, you perform the search and loop through the results.
    The cookie the server sends is extracted from the `DirContextProcessor` and is
    used to check for future search requests. You also use a `LastNameMapper` class
    to extract the last name from the results context. Listing [7-15](#319409_2_En_7_Chapter.xhtml#PC18)
    gives the implementation of the `LastNameMapper` class.


    ```

    private class LastNameMapper extends AbstractContextMapper {

    @Override

    protected String doMapFromContext(DirContextOperations context) {

    return context.getStringAttribute("sn");

    }

    }

    ```


