    # 9. LDAP Transactions


    In this chapter, you will learn


    *   The basics of transactions


    *   Spring transaction abstraction


    *   Spring LDAP support for transactions


    ## Transaction Basics


    Transactions are an integral part of enterprise applications. Put simply, a transaction
    is a series of operations that are performed together. All its operations must
    succeed for a transaction to be completed or committed. If, for any reason, one
    operation fails, the entire transaction fails and is rolled back. In that scenario,
    all the previous operations that have succeeded must be undone. This ensures that
    the end state matches the state in place before the transaction starts.


    In your day-to-day world, you run into transactions all the time. Consider an
    online banking scenario where you wish to transfer $300 from your savings account
    to your checking account. This operation involves debiting the savings account
    by $300 and crediting the checking account by $300\. If the debiting part of the
    operation were to succeed and the crediting part failed, you would end up with
    $300 less in your combined accounts. (Ideally, we all would like the debit operation
    to fail and the credit operation to succeed, but the bank might knock on our door
    the next day.) Banks ensure that accounts never end up in such inconsistent states
    by using transactions.


    Transactions are usually associated with the following four well-known characteristics,
    often called ACID properties:


    Table 9-1


    Isolation Levels


    | Isolation Level | Description |

    | --- | --- |

    | `Read Uncommitted` | This isolation level allows a query in a running transaction
    to see changes made by other uncommitted transactions. Changes made by this transaction
    become visible to other transactions even before it is completed. This is the
    lowest level of isolation and can more appropriately be considered as lack of
    isolation. Since it violates one of the ACID properties, most database vendors
    do not support it. |

    | `Read Committed` | This isolation level allows a query in a running transaction
    to see only data committed before the query began. However, all uncommitted changes
    or changes committed by concurrent transactions during query execution will not
    be seen. This is the default isolation level for most databases, including Oracle,
    MySQL, and PostgreSQL. |

    | `Repeatable Read` | This isolation level allows a query in a running transaction
    to read the same data every time it is executed. To achieve this, the transaction
    acquires locks on all the rows examined (not just fetched) until completion. |

    | `Serializable` | This is the strictest and most expensive of all the isolation
    levels. Interleaving transactions are stacked up so that transactions are executed
    one after another rather than concurrently. With this isolation level, queries
    will only see the data that has been committed before the start of the transaction
    and will never see uncommitted changes or commits by concurrent transactions.
    |


    *   *Atomicity*: This property ensures that a transaction executes completely
    or not at all. So, in our preceding example, we either successfully transfer the
    money or our transfer fails. This all-or-nothing property is also called a single
    or logical unit of work.


    *   *Consistency*: This property ensures that a transaction leaves the system
    in a consistent state after its completion. For example, all the integrity constraints,
    such as a primary key or referential integrity, are satisfied with a database
    system.'
