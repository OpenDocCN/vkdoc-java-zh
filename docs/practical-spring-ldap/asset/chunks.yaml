    事务数据源的示例配置

    ```


    声明式事务管理的完整应用程序上下文配置文件如清单 9-7 所示。


    ```

    清单 9-7

    所有配置的示例

    ```


    `<tx:annotation-driven/>` 标签表示您正在使用基于注解的事务管理。该标签与 `<aop:aspectj-autoproxy />`
    一起指示 Spring 使用面向切面编程（AOP）并创建代理，这些代理代表注解类管理事务。因此，当调用事务性方法时，代理会拦截调用并使用事务管理器获取事务（新或现有）。然后调用该方法，如果方法成功完成，代理将通过事务管理器提交事务；如果方法失败并抛出异常，事务将被回滚。基于
    AOP 的事务处理如图 9-2 所示。


    ![](img/319409_2_En_9_Fig2_HTML.jpg)


    请求-响应图示。客户端将方法发送给 AOP 代理。AOP 代理将开始事务的指令发送给事务管理器，随后将方法发送给事务类，并在最后将提交事务的指令发送给事务管理器。


