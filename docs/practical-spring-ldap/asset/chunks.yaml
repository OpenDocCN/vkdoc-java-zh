    ## 使用 Spring LDAP 进行身份验证


    身份验证是针对 LDAP 服务器执行的常见操作。这通常涉及将用户名和密码与目录服务器中存储的信息进行比对以验证用户身份。


    使用 Spring LDAP 实现身份验证的一种方法是通过`ContextSource`类的`getContext`方法。以下是`getContext`方法的
    API：


    ```

    DirContext getContext(String principal, String credentials) throws NamingException

    ```


    `principal`参数是用户的完整限定 DN（Distinguished Name），`credentials`参数是用户的密码。该方法使用传入的信息对
    LDAP 进行身份验证。身份验证成功时，方法返回一个表示用户条目的`DirContext`实例。身份验证失败则通过异常通知调用者。清单 10-1 定义了包含验证方法的接口。


    ```

    package com.apress.book.ldap.repository;

    public interface AuthenticationDao {

    boolean authenticate(String userid, String password);

    }

    清单 10-1

    包含 authenticate 方法的 DAO 接口

    ```


    清单 10-2 展示了使用`getContext`技术为 Library 应用程序中的用户进行身份验证的 DAO 实现。


    ```

    package com.apress.book.ldap.repository;

    import javax.naming.directory.DirContext;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.beans.factory.annotation.Qualifier;

    import org.springframework.ldap.NamingException;

    import org.springframework.ldap.core.ContextSource;

    import org.springframework.ldap.core.DistinguishedName;

    import org.springframework.ldap.support.LdapUtils;

    import org.springframework.stereotype.Repository;

    @Repository("authenticationDao")

    public class AuthenticationDaoImpl implements AuthenticationDao {

    private static final Logger logger = LoggerFactory.getLogger(AuthenticationDaoImpl.class);

    public static final String BASE_DN = "ou=patrons,dc=inflinx,dc=com";

    private ContextSource contextSource;

    public AuthenticationDaoImpl(@Autowired @Qualifier("contextSource") ContextSource
    contextSource) {

    this.contextSource = contextSource;

    }

    @Override

    public boolean authenticate(String userid, String password) {

    DistinguishedName dn = new DistinguishedName(BASE_DN);

    dn.add("uid", userid);

    DirContext authenticatedContext = null;

    try {

    authenticatedContext = contextSource.getContext(dn.toString(), password);

    return Boolean.TRUE;

    } catch (NamingException ex) {

    logger.error("{}: {}", ex.getClass(), ex.getMessage());

    return Boolean.FALSE;

    } finally {

    LdapUtils.closeContext(authenticatedContext);

    }

    }

    }

    清单 10-2

    身份验证方法的基本实现

    ```


    `getContext`方法需要用户条目的完整限定 DN。因此，身份验证方法首先使用提供的 `"ou=patrons,dc=inflinx,dc=com"`
    基础 DN 创建一个`DistinguishedName`实例。然后，将提供的`userid`附加到 DN 上以构建用户的完整限定 DN。身份验证方法随后调用`getContext`方法，传入用户
    DN 的字符串表示和密码。身份验证成功时，方法仅返回`true`。请注意，在 finally 块中会关闭获取到的上下文。


    清单 10-3 展示了一个 JUnit 测试，用于验证此 authenticate 方法的正常运行。


    ```

    package com.apress.book.ldap.repository;

    import org.junit.jupiter.api.DisplayName;

    import com.apress.book.ldap.repository.AuthenticationDao;

    import org.junit.jupiter.api.Test;

    import org.junit.jupiter.api.extension.ExtendWith;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.beans.factory.annotation.Qualifier;

    import org.springframework.test.context.ContextConfiguration;

    import org.springframework.test.context.junit.jupiter.SpringExtension;

    import static org.junit.jupiter.api.Assertions.assertFalse;

    import static org.junit.jupiter.api.Assertions.assertTrue;

    @ExtendWith(SpringExtension.class)

    @ContextConfiguration("classpath:repositoryContext-test.xml")

    @DisplayName("身份验证 DAO 测试用例")

    class AuthenticationDaoTest {

    @Autowired

    @Qualifier("authenticationDao")

    private AuthenticationDao authenticationDao;

    @Test

    @DisplayName("检查身份验证机制是否正常工作")

    void should_authentication_works() {

    boolean authResult = authenticationDao.authenticate("patron0", "password");

    assertTrue(authResult);

    authResult = authenticationDao.authenticate("patron0", "invalidPassword");

    assertFalse(authResult);

    }

    }

    清单 10-3

    检查身份验证方法是否正常工作的测试

    ```


    位于**src/test/resources**文件夹下的`repositoryContext-test.xml`文件，与清单 10-3 相关联，其内容如清单
    10-4 所示。在此场景中，您正在使用已安装的 OpenDJ LDAP 服务器。


    ```


    清单 10-4

    配置结构

    ```


    清单 10-4 中所示实现的唯一缺点是`getContext`方法需要用户条目的完整限定 DN。可能存在某些场景，客户端代码并不知道用户的完整限定 DN。在清单
    10-2 中，您通过附加硬编码值来构建完整限定 DN。如果希望使用清单 10-2 的代码对图书馆员工进行身份验证，这种做法将失败。为解决此类问题，Spring
    LDAP 在`LdapTemplate`类中添加了多个`authenticate`方法的变体：


    ```

    boolean authenticate(String base, String filter, String password)

    ```


    此`authenticate`方法使用提供的 base DN 和 filter 参数对用户的 LDAP 条目进行搜索。如果找到条目，则提取用户的完整限定 DN。然后，将该
    DN 和密码传递给`ContextSource`的`getContext`方法进行身份验证。这是一个两步流程，但无需预先提供完整限定 DN。清单 10-5
    包含了修改后的身份验证实现。请注意，DAO 实现中的`authenticate`方法签名未发生变化。它仍然接受用户名和密码作为参数。然而，由于身份验证方法的抽象化，实现变得更加简单。实现传递了一个空的
    base DN，因为您希望以`ContextSource`创建时使用的 base DN 为基准进行搜索。

