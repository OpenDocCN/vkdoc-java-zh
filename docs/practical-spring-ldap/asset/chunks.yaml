    # 5. 高级 Spring LDAP


    ## JNDI 对象工厂


    JNDI 提供了对象工厂的概念，这使得处理 LDAP 信息更加简便。正如其名，对象工厂将目录信息转换为应用程序有意义的对象。例如，对象工厂可以让搜索操作返回像
    `Patron` 或 `Employee` 这样的对象实例，而不是普通的 `javax.naming.NamingEnumeration`。


    图 5-1 展示了应用程序使用对象工厂执行 LDAP 操作时的流程。流程始于应用程序调用搜索或查找操作。JNDI API 将执行请求的操作并从 LDAP 获取条目。这些结果随后传递给已注册的对象工厂，将其转换为对象。这些对象再被传递给应用程序。


    ![](img/319409_2_En_5_Fig1_HTML.jpg)


    JNDI 或对象工厂流程的示意图。应用程序、JNDI API、LDAP 和对象工厂模块按顺序相互连接。


    图 5-1


    JNDI/对象工厂流程


    处理 LDAP 的对象工厂必须实现 `javax.naming.spi.DirObjectFactory` 接口。列表 5-1 展示了一个 `Patron`
    对象工厂的实现，它接收传入的信息并创建 `Patron` 实例。`getObjectInstance` 方法的 `obj` 参数包含有关对象的引用信息。`name`
    参数包含对象的名称。`attrs` 参数包含与对象相关的属性。在 `getObjectInstance` 中，你读取所需的属性并填充新创建的 `Patron`
    实例。


    ```

    package com.apress.book.ldap;

    import java.util.Hashtable;

    import javax.naming.Context;

    import javax.naming.Name;

    import javax.naming.directory.Attributes;

    import javax.naming.directory.BasicAttributes;

    import javax.naming.spi.DirObjectFactory;

    import com.apress.book.ldap.domain.Patron;

    public class PatronObjectFactory implements DirObjectFactory {

    @Override

    public Object getObjectInstance(Object obj, Name name, Context nameCtx, Hashtable
    environment,

    Attributes attrs) {

    Patron patron = new Patron();

    patron.setUid(attrs.get("uid").toString());

    patron.setFullName(attrs.get("cn").toString());

    return patron;

    }

    @Override

    public Object getObjectInstance(Object obj, Name name, Context nameCtx, Hashtable
    environment){

    return getObjectInstance(obj, name, nameCtx, environment, new BasicAttributes());

    }

    }

