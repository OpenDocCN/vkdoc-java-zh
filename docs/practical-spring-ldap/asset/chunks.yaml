- fmt: '# Testcontainers 与 Docker 集成


    之前的日志表明，`Testcontainers`与`Docker`连接，使用`testcontainers/ryuk`镜像，该镜像将包含你在不同测试中使用的所有容器。因此，使用这个库时，你将在`Docker`中运行`Docker`，这就是为什么你可以在不同测试之间共享或不共享同一个数据库容器的原因。图[4-2](#319409_2_En_4_Chapter.xhtml#Fig2)展示了执行测试时`TestContainers`的工作原理。


    ![](images/319409_2_En_4_Chapter/319409_2_En_4_Fig2_HTML.jpg)


    一个流程图从测试容器开始，这些容器连接到`Docker`，然后结束。


    **图 4-2** 容器的执行流程


    请注意，这种方法比前一种方法花费更多时间，因为你运行的是真实的 LDAP 供应商。


    ## 创建测试


    在简要介绍了不同的测试概念之后，是时候详细看看那些能帮助你创建项目中不同类型测试的库了。为此，使用第[3](#319409_2_En_3_Chapter.xhtml)章中的相同命令创建一个名为`chapter4`的新项目：


    ```

    $ mvn archetype:generate \

    -DarchetypeGroupId=com.apress.book.ldap \

    -DarchetypeArtifactId=practical-ldap-empty-archetype \

    -DarchetypeVersion=1.0.0 \

    -DgroupId=com.apress.book.ldap \

    -DartifactId=chapter4 \

    -DinteractiveMode=false

    ```


    > **注意**：在接下来的章节中，将仅提及此指令，以避免在每个章节中重复相同的句子。


    让我们创建一个简单的应用程序，它访问 LDAP 并执行常见操作，如获取所有元素、添加、删除或修改元素。首先，你需要创建一个表示 Patron 的对象，因此创建一个像清单[4-10](#319409_2_En_4_Chapter.xhtml#PC13)这样的领域类；这个类不包含
    LDAP 中可能存在的所有属性，但足以展示如何创建测试。


    ```

    public class Patron {

    private String uid;

    private String firstName;

    private String lastName;

    private String commonName;

    private String email;

    public Patron() {

    }

    public Patron(String uid, String firstName, String lastName, String commonName,
    String email) {

    this.uid = uid;

    this.firstName = firstName;

    this.lastName = lastName;

    this.commonName = commonName;

    this.email = email;

    }

    // Setters and getters

    }

    ```


    **清单 4-10** 表示 LDAP 对象的领域类


    下一步是创建一个类，其中包含与第[3](#319409_2_En_3_Chapter.xhtml)章示例大致相似的所有操作。不过，与其将所有内容硬编码到不同的方法中，不如创建动态方法，通过参数接收要执行某些操作的值。


    ```

    @Component

    public class LdapOperationsClient {

    private LdapTemplate ldapTemplate;

    public LdapOperationsClient(@Autowired @Qualifier("ldapTemplate") LdapTemplate
    ldapTemplate) {

    this.ldapTemplate = ldapTemplate;

    }

    public void add(String id, Patron patron) {

    // Set the Patron attributes

    Attributes attributes = new BasicAttributes();

    attributes.put("sn", patron.getLastName());

    attributes.put("givenName", patron.getFirstName());

    attributes.put("cn", patron.getCommonName());

    attributes.put("mail", patron.getEmail());

    // Add the multi-valued attribute

    BasicAttribute objectClassAttribute = new BasicAttribute("objectclass");

    objectClassAttribute.add("top");

    objectClassAttribute.add("person");

    objectClassAttribute.add("organizationalperson");

    objectClassAttribute.add("inetorgperson");

    attributes.put(objectClassAttribute);

    ldapTemplate.bind("uid=" + id + ",ou=patrons,dc=inflinx,dc=com", null, attributes);

    }

    public void updateEmail(String uid, String mail) {

    Attribute attribute = new BasicAttribute("mail", mail);

    ModificationItem item = new ModificationItem(DirContext.REPLACE_ATTRIBUTE, attribute);

    ldapTemplate.modifyAttributes("uid=" + uid + ",ou=patrons,dc=inflinx,dc=com",
    new ModificationItem[] { item });

    }

    public void remove(String uid) {

    ldapTemplate.unbind("uid=" + uid + ",ou=patrons,dc=inflinx,dc=com");

    }

    public List search() {

    return ldapTemplate.search("dc=inflinx,dc=com", "(objectclass=person)", (AttributesMapper)
    attributes -> {

    Patron patron = new Patron();

    patron.setUid((String) attributes.get("uid").get());

    patron.setFirstName((String) attributes.get("givenName").get());

    patron.setLastName((String) attributes.get("sn").get());

    patron.setEmail((String) attributes.get("mail").get());

    patron.setCommonName((String) attributes.get("cn").get());

    return patron;

    });

    }

    }

    ```


    **清单 4-11** 表示 LDAP 对象的领域类


    仅这两个类就足以创建不同的测试场景，使用 Mockito 的模拟、嵌入式服务器或 Testcontainers。


    ### 模拟模板


    这种方法是最简单的，因为它不需要运行整个应用程序来测试某些功能是否正常。你可以将这种类型的测试视为单元测试，因为你只想测试你的类，而不使用或检查其他类的情况。在清单[4-11](#319409_2_En_4_Chapter.xhtml#PC14)的情况下，你需要模拟`LdapTemplate`，只检查你的逻辑。在清单[4-12](#319409_2_En_4_Chapter.xhtml#PC15)中，我们在模板上创建一个模拟，以模拟你在测试中想要的任何响应。


    ```

    import com.apress.book.ldap.domain.Patron;

    import org.junit.jupiter.api.BeforeEach;

    import org.junit.jupiter.api.DisplayName;

    import org.junit.jupiter.api.Test;

    import org.springframework.ldap.core.AttributesMapper;

    import org.springframework.ldap.core.LdapTemplate;

    import javax.naming.directory.Attributes;

    import javax.naming.directory.BasicAttributes;

