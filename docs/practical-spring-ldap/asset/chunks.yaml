    ## Creating Custom Converter


    Consider the scenario where your `Patron` class uses a custom `PhoneNumber` class
    for storing a patron’s phone number. Now, when a `Patron` class needs to be persisted,
    you need to convert the `PhoneNumber` class to String type. Similarly, when you
    read a `Patron` class from LDAP, the data in the telephone attribute needs to
    be converted into a `PhoneNumber` class. The default `ToStringConverter` and `FromStringConverter`
    will not be useful for such conversion. Listing [8-11](#319409_2_En_8_Chapter.xhtml#PC12)
    shows the new class `PhoneNumber` with the attributes that represent the phone
    in a different format.


    ```

    package `com.apress.book.ldap.custom`;

    public class `PhoneNumber` {

    private int `areaCode`;

    private int `exchange`;

    private int `extension`;

    public `PhoneNumber`(int `areaCode`, int `exchange`, int `extension`) {

    `this.areaCode` = `areaCode`;

    `this.exchange` = `exchange`;

    `this.extension` = `extension`;

    }

    //Setters and getters

    public boolean `equals`(Object `obj`) {

    if(`obj` == null || `obj`.getClass() != `this`.getClass()) { return false; }

    `PhoneNumber` `p` = (`PhoneNumber`) `obj`;

    return (`this.areaCode` ==  `p.areaCode`) && (`this.exchange` == `p.exchange`)
    && (`this.extension` == `p.extension`);

    }

    public String `toString`() {

    return String.format(`+1 %03d %03d %04d`, `areaCode`, `exchange`, `extension`);

    }

    // satisfies the hashCode contract

    public int `hashCode`() {

    int `result` = 17;

    `result` = 37 * `result` + `areaCode`;

    `result` = 37 * `result` + `exchange`;

    `result` = 37 * `result` + `extension`;

    return `result`;

    }

    }

