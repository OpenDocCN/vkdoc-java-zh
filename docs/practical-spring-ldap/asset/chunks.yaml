    # 2. Java Support for LDAP


    As the name suggests, the Java Naming and Directory Interface (JNDI) provides
    a standardized programming interface for accessing naming and directory services.
    It is a generic Application Programming Interface (API) that can access various
    systems, including file systems, Enterprise Java Beans (EJB),^([^(29)](#fn29))
    Common Object Request Broker Architecture (CORBA),^([^(30)](#fn30)) and directory
    services such as the Network Information Service and LDAP. JNDI’s abstractions
    to directory services can be viewed as similar to Java Database Connectivity (JDBC)’s
    abstractions to relational databases.


    The JNDI architecture consists of an Application Programming Interface or API
    and a Service Provider Interface or SPI. Developers program their Java applications
    using the JNDI API to access directory/naming services. Vendors implement the
    SPI with details that deal with actual communication to their particular service/product.
    Such implementations are referred to as service providers. Figure [2-1](#319409_2_En_2_Chapter.xhtml#Fig1)
    shows the JNDI architecture and a few naming and directory service providers.
    This pluggable architecture provides a consistent programming model and prevents
    the need to learn a separate API for each product.


    ![](images/319409_2_En_2_Chapter/319409_2_En_2_Fig1_HTML.jpg)


    A flowchart of the J N D I. Java application is followed by J N D I A P I and
    J N D I S P I. The J N D I S P I consists of L D P, R M I, and D N S.


    Figure 2-1


    JNDI architecture


    The JNDI has been part of the standard JDK distribution since Java version 1.3
    and has not moved to Jakarta like other packages. The API itself is spread across
    five packages:


    *   The **javax.naming**^([^(31)](#fn31)) package contains classes and interfaces
    for looking up and accessing objects in a naming service.


    *   The **javax.naming.directory**^([^(32)](#fn32)) package contains classes and
    interfaces that extend the core javax.naming package. These classes can access
    directory services and perform advanced operations such as filtered searching.


    *   The **javax.naming.event**^([^(33)](#fn33)) package has functionality for
    event notification when accessing naming and directory services.


    *   The **javax.naming.ldap**^([^(34)](#fn34)) package contains classes and interfaces
    that support the LDAP Version 3 controls and operations. Later chapters will examine
    controls and operations.


    *   The **javax.naming.ldap.spi**^([^(35)](#fn35)) package contains classes to
    support defining custom DNS for LDAP. The support of this feature has appeared
    since Java 12.


    *   The **javax.naming.spi**^([^(36)](#fn36)) package contains the SPI interfaces
    and classes. As mentioned earlier, service providers implement SPI, and we will
    not cover these classes in this book.


    ## LDAP Using JNDI


    While JNDI allows access to a directory service, it is essential to remember that
    JNDI is not a directory or a naming service. Thus, we need a running LDAP directory
    server to access LDAP using JNDI.


    Accessing LDAP using JNDI usually involves three steps:


    *   Connect to LDAP


    *   Perform LDAP operations


    *   Close the resources


    Note


    Check if you have installed the correct version of Java on your machine. To do
    this, look at Appendix A, which explains how to do it.


    If you don’t have a test LDAP server available, please refer to the steps in Appendix
    B for installing a local LDAP server or running it using Docker. The explanation
    about how to install Docker and check if everything is okay appears in Appendix
    A.


    This chapter aims to show how you can do different operations on LDAP using Java
    without any framework. With this approach, you will see the complexity of doing
    certain operations and writing many lines of code to do something simple with
    the assistance of some framework like Spring LDAP.'
