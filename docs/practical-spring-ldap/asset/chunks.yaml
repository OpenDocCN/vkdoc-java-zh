    # 2. Java 对 LDAP 的支持


    正如其名称所示，Java 命名和目录接口（JNDI）提供了标准化的编程接口，用于访问命名和目录服务。它是一个通用的应用程序编程接口（API），可以访问多种系统，包括文件系统、企业
    Java Bean（EJB）[²⁹]、公共对象请求代理架构（CORBA）[³⁰]，以及目录服务如网络信息服务和 LDAP。JNDI 对目录服务的抽象可以视为与
    Java 数据库连接（JDBC）对关系型数据库的抽象类似。


    JNDI 架构由应用程序编程接口（API）和服务提供者接口（SPI）组成。开发者使用 JNDI API 编写 Java 应用程序以访问目录/命名服务。供应商通过实现
    SPI 来处理与特定服务/产品的实际通信细节。这些实现被称为服务提供者。图 2-1 展示了 JNDI 架构以及一些命名和目录服务提供者。这种可插拔架构提供了统一的编程模型，避免了为每个产品学习单独
    API 的需求。


    ![](img/319409_2_En_2_Fig1_HTML.jpg)


    JNDI 的流程图。Java 应用程序后接 JNDI API 和 JNDI SPI。JNDI SPI 包含 LDAP、RMI 和 DNS。


    图 2-1


    JNDI 架构


    自 Java 1.3 版本以来，JNDI 就已成为标准 JDK 发行版的一部分，与其他包不同，它未迁移到 Jakarta。API 本身分布在五个包中：


    *   **javax.naming**[³¹] 包包含用于查找和访问命名服务对象的类和接口。


    *   **javax.naming.directory**[³²] 包包含扩展核心 javax.naming 包的类和接口。这些类可以访问目录服务并执行过滤搜索等高级操作。


    *   **javax.naming.event**[³³] 包提供在访问命名和目录服务时的事件通知功能。


    *   **javax.naming.ldap**[³⁴] 包包含支持 LDAP 版本 3 控制和操作的类和接口。后续章节将详细探讨这些控制和操作。


    *   **javax.naming.ldap.spi**[³⁵] 包包含用于定义 LDAP 自定义 DNS 的类。该功能自 Java 12 起已得到支持。


    *   **javax.naming.spi**[³⁶] 包包含 SPI 接口和类。如前所述，服务提供者实现 SPI，本书将不涉及这些类。


    ## 使用 JNDI 访问 LDAP


    虽然 JNDI 可以访问目录服务，但必须记住 JNDI 本身并不是目录或命名服务。因此，我们需要一个正在运行的 LDAP 目录服务器才能通过 JNDI 访问
    LDAP。


    通过 JNDI 访问 LDAP 通常涉及三个步骤：


    *   连接到 LDAP


    *   执行 LDAP 操作


    *   关闭资源


    注意


    请检查你的机器是否安装了正确版本的 Java。为此，请参阅附录 A，它解释了如何完成此操作。


    如果没有可用的测试 LDAP 服务器，请参考附录 B 中的步骤安装本地 LDAP 服务器或使用 Docker 运行。如何安装 Docker 并验证是否正常运行的说明请参阅附录
    A。


    本章旨在展示如何在不使用任何框架的情况下，通过 Java 对 LDAP 执行各种操作。通过这种方法，你将看到某些操作的复杂性，并理解借助框架（如 Spring
    LDAP）可以简化简单操作所需的代码行数。

