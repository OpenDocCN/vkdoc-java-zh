    Let’s create a simple application that accesses LDAP and execute common operations
    like getting all the elements, adding, removing, or modifying an element. First,
    you need to create an object which represents a Patron, so create a domain class
    like Listing [4-10](#319409_2_En_4_Chapter.xhtml#PC13); this class does not contain
    all the possible attributes that could exist on LDAP, but it’s enough to show
    how to create tests.


    ```

    public class Patron {

    private String uid;

    private String firstName;

    private String lastName;

    private String commonName;

    private String email;

    public Patron() {

    }

    public Patron(String uid, String firstName, String lastName, String commonName,
    String email) {

    this.uid = uid;

    this.firstName = firstName;

    this.lastName = lastName;

    this.commonName = commonName;

    this.email = email;

    }

    // Setters and getters

    }

    Listing 4-10

    Domain classes that represent an object on LDAP

    ```


    The next step is to create the class that contains all the operations more or
    less similar to the examples in Chapter [3](#319409_2_En_3_Chapter.xhtml). Still,
    instead of having everything hardcoded on the different methods, the idea is to
    create dynamic methods that receive by parameters the values to do certain operations.


    ```

    @Component

    public class LdapOperationsClient {

    private LdapTemplate ldapTemplate;

    public LdapOperationsClient(@Autowired @Qualifier("ldapTemplate") LdapTemplate
    ldapTemplate) {

    this.ldapTemplate = ldapTemplate;

    }

    public void add(String id, Patron patron) {

    // Set the Patron attributes

    Attributes attributes = new BasicAttributes();

    attributes.put("sn", patron.getLastName());

    attributes.put("givenName", patron.getFirstName());

    attributes.put("cn", patron.getCommonName());

    attributes.put("mail", patron.getEmail());

    // Add the multi-valued attribute

    BasicAttribute objectClassAttribute = new BasicAttribute("objectclass");

    objectClassAttribute.add("top");

    objectClassAttribute.add("person");

    objectClassAttribute.add("organizationalperson");

    objectClassAttribute.add("inetorgperson");

    attributes.put(objectClassAttribute);

    ldapTemplate.bind("uid=" + id + ",ou=patrons,dc=inflinx,dc=com", null, attributes);

    }

    public void updateEmail(String uid, String mail) {

    Attribute attribute = new BasicAttribute("mail", mail);

    ModificationItem item = new ModificationItem(DirContext.REPLACE_ATTRIBUTE, attribute);

    ldapTemplate.modifyAttributes("uid=" + uid + ",ou=patrons,dc=inflinx,dc=com",
    new ModificationItem[] { item });

    }

    public void remove(String uid) {

    ldapTemplate.unbind("uid=" + uid + ",ou=patrons,dc=inflinx,dc=com");

    }

    public List search() {

    return ldapTemplate.search("dc=inflinx,dc=com", "(objectclass=person)", (AttributesMapper)
    attributes -> {

    Patron patron = new Patron();

    patron.setUid((String) attributes.get("uid").get());

    patron.setFirstName((String) attributes.get("givenName").get());

    patron.setLastName((String) attributes.get("sn").get());

    patron.setEmail((String) attributes.get("mail").get());

    patron.setCommonName((String) attributes.get("cn").get());

    return patron;

    });

    }

    }

    Listing 4-11

    Domain classes that represent an object on LDAP

    ```


