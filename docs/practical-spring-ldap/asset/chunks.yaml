    ### Testing Using Embedded Server


    ApacheDS^([^(71)](#fn71)), OpenDJ^([^(72)](#fn72)), and UnboundID^([^(73)](#fn73))
    are open source LDAP directories that can be embedded into Java applications.
    Embedded directories are part of the application’s JVM, making automating tasks
    such as startup and shutdown easy. They have a small startup time and typically
    run fast. Embedded directories also eliminate the need for a dedicated, stand-alone
    LDAP server for each developer or build machine.


    Embedding an LDAP server involved in the past creating and starting/stopping the
    server programmatically, but many years ago, with the new versions of Spring and
    JUnit, you delegated the responsibility to do it. This approach is the most recommended,
    but if you want to manage the life cycle of embedding an LDAP server, you can
    do it by adding all the logic to start and stop it on each test execution.


    In the case of Spring LDAP, you can use two different alternatives of embedded
    server, which are based on ApacheDS^([^(74)](#fn74)) or UnboundID^([^(75)](#fn75)).
    In the case of this book, you will use the second option because Spring does not
    have support for the latest versions of ApacheDS, and UnboundID is agnostic to
    the vendor.


    Note


    OpenDJ had an embedded server in the old versions of this vendor but was deprecated
    some years ago. On the source code, you will see that the classes exist, but just
    in case, you have a legacy application and need to do some tests.


    After the introduction of the idea of an embedded server, it’s time to modify
    the pom file and add the dependencies. Listing [4-14](#319409_2_En_4_Chapter.xhtml#PC17)
    shows the different libraries that you need to include.


    ```

    org.springframework

    spring-test

    ${org.springframework.version}

    test


    org.springframework.ldap

    spring-ldap-test

    ${org.springframework.ldap.version}

    test


    com.unboundid

    unboundid-ldapsdk

    ${unboundid-ldapsdk.version}

    test


    Listing 4-14

    Dependencies to use an embedded server

    ```


    After that, you need to create a file containing all the configurations on the
    `src/test/resources`. Let’s start with the basic configuration shown in Listing
    [4-15](#319409_2_En_4_Chapter.xhtml#PC18).


    ```

    Listing 4-15

    Configuration of the application

    ```


    Now you need to add the modifications to create the embedded server and populate
    with the same information when the server starts. Listing [4-16](#319409_2_En_4_Chapter.xhtml#PC19)
    sets up the basic configuration and loads the file `patrons.ldif`, which you need
    to include in the directory `src/test/resources` of your project. All of this
    is to populate LDAP with a basic set of information to test the different operations.


    ```

    Listing 4-16

    Configuration of the embedded server

    ```


    Consider that each time you execute a test, the server will be recreated, so if
    you do some modifications with the information on LDAP, it will not affect other
    tests that use the same data.


    After you do all the configuration, the last task is to create a simple test that
    validates that the search method works fine and returns the list of Patrons, as
    shown in Listing [4-17](#319409_2_En_4_Chapter.xhtml#PC20).


    ```

    @ExtendWith(SpringExtension.class)

    @ContextConfiguration("classpath:repositoryContext-test.xml")

    @DisplayName("LDAP Operations Test using an embedded LDAP")

    public class LdapOperationsClientEmbbededTest {

    @Autowired

    LdapOperationsClient client;

    @Test

    @DisplayName("Check that operation search return a patron")

    public void should_return_patrons() {

    List patrons = client.search();

    assertAll(() -> assertNotNull(patrons), () -> assertEquals(100, patrons.size()));

    }

    }

    Listing 4-17

    A simple test that uses an embedded server

    ```


    If you run this test, everything will work fine, and in the case that you create
    several tests on the same class, each time the tests are executed the server will
    load the information again.


    ### Moving to Tests with Testcontainers


    After the creation of tests that check using LDAP if the logic of our business
    is okay or not, the next step is to replace the embedded server with a real one
    using a container that uses the same version that you used in the previous chapters
    to run your source code.


    As you can see in the previous section, the use of embedded LDAP in tests is simple,
    so you can think, “Why do I need to use Testcontainers vs. embedded?” The answer
    to this question is simple, because there are some problems connected with using
    embedded LDAP:


    * Not all vendors have an embedded option so that everything may work fine on
    your tests, but in a real environment, it could fail your logic.


    * Embedded LDAP does not have support for all the versions of some vendors; for
    example, in the case of ApacheDS, you can’t use versions up to 1.5.5, so at some
    point, this problem looks like the previous one.


    Not everything is great with the use of Testcontainers because it implies that
    the execution of the tests takes some seconds until the container is up and healthy
    to be used for your tests.


    Let’s start creating our tests using Testcontainers; in the case of LDAP, no particular
    module exists that simplifies the process of configuration, but you can run a
    Docker-compose file as shown in Listing [4-18](#319409_2_En_4_Chapter.xhtml#PC21).
    Remember to create the file with the name `docker-compose.yml` and include in
    the folder `src/test/resources`.


    ```

    version: ''3.0''

    services:

    opendj:

    image: openidentityplatform/opendj:4.5.9

    ports:

    - 18880:1389

    environment:

    - ROOT_USER_DN=uid=admin,ou=system

    - ROOT_PASSWORD=secret

    - BASE_DN=dc=inflinx,dc=com

    Listing 4-18

    A simple docker-compose file with the configuration of LDAP

    ```


    The next step is to create a copy of the file in Listings [4-15](#319409_2_En_4_Chapter.xhtml#PC18)
    and [4-16](#319409_2_En_4_Chapter.xhtml#PC19); let’s call it `repositoryContext-testcontainers.xml`
    just to differentiate from the other configuration, removing the part related
    to the configuration of the embedded server.


    The last step is to create tests that run the file that you defined in Listing
    [4-18](#319409_2_En_4_Chapter.xhtml#PC21). To do this, you need to use the class
    `DockerComposeContainer`, which is part of the library’s core. Listing [4-19](#319409_2_En_4_Chapter.xhtml#PC23)
    shows how to configure the Testcontainers and wait until LDAP is ready to receive
    requests.


    ```

    import com.apress.book.ldap.domain.Patron;

    import org.junit.jupiter.api.Test;

    import org.junit.jupiter.api.extension.ExtendWith;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.test.context.ContextConfiguration;

    import org.springframework.test.context.junit.jupiter.SpringExtension;

    import org.testcontainers.containers.DockerComposeContainer;

    import org.testcontainers.containers.wait.strategy.Wait;

    import org.testcontainers.junit.jupiter.Container;

    import org.testcontainers.junit.jupiter.Testcontainers;

    import java.io.File;

    import java.util.List;

    import static org.junit.jupiter.api.Assertions.*;

    @Testcontainers

    @ExtendWith(SpringExtension.class)

    @ContextConfiguration("classpath:repositoryContext-testcontainers.xml")

    @DisplayName("LDAP Operations Test using Testcontainers")

    public class LdapOperationsClientContainerTest {

    @Container

    public static DockerComposeContainer ldap = new DockerComposeContainer(

    new File("src/test/resources/docker-compose.yml"))

