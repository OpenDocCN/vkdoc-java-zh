    ## Spring 事务抽象


    Spring 框架为处理全局和本地事务提供了统一的编程模型。事务抽象隐藏了不同事务 API（如 JTA、JDBC、JMS 和 JPA）的内部实现细节。它允许开发者以环境无关的方式编写支持事务的代码。在后台，Spring
    仅将事务管理委托给底层的事务提供者。无需使用 EJB 即可支持编程式和声明式事务管理模型，通常推荐使用声明式方法，本书也将采用这种方法。


    Spring 事务管理的核心是 `PlatformTransactionManager` 抽象。它以技术无关的方式暴露了事务管理的关键方面。该接口负责创建和管理事务，是声明式和编程式事务的必需组件。该接口有多种现成实现，例如
    `JtaTransactionManager`^(⁸⁴)、`DataSourceTransactionManager`^(⁸⁵)、`JdbcTransactionManager`^(⁸⁶)
    和 `JmsTransactionManager`^(⁸⁷)。`PlatformTransactionManager`^(⁸⁸) API 如清单 9-1 所示。


    ```

    public interface PlatformTransactionManager extends TransactionManager {

    TransactionStatus getTransaction(@Nullable TransactionDefinition definition) throws
    TransactionException;

    void commit(TransactionStatus status) throws TransactionException;

    void rollback(TransactionStatus status) throws TransactionException;

    }

    清单 9-1

    PlatformTransactionManager 的源代码

    ```


    `PlatformTransactionManager` 中的 `getTransaction` 方法用于获取现有事务。如果未找到活动事务，该方法可能会根据
    `TransactionDefinition` 实例中指定的事务属性创建新事务。`TransactionDefinition` 接口抽象了以下属性列表：


    *   *只读*：此属性表示该事务是否为只读事务。


    *   *超时*：此属性规定事务必须完成的时间。如果事务在指定时间内未完成，将自动回滚。


    *   *隔离级别*：此属性控制事务之间的隔离程度。可能的隔离级别在表 9-1 中讨论。


    *   *传播行为*：考虑一个场景，当存在活动事务时，Spring 遇到需要在事务中执行的代码。一种选择是继续使用现有事务执行代码，另一种选择是挂起现有事务并启动新事务执行代码。传播属性可用于定义此类事务行为。`Propagation`^(⁸⁹)
    枚举中包含的可能值有 `PROPAGATION_REQUIRED`、`PROPAGATION_REQUIRES_NEW`、`PROPAGATION_SUPPORTS`
    等。


    `getTransaction` 方法返回一个 `TransactionStatus` 实例，表示当前事务的状态。应用程序代码可以使用此接口检查该事务是否为新事务或是否已完成。该接口还可用于请求程序回滚事务。`PlatformTransactionManager`
    中的另外两个方法 `commit` 和 `rollback`，如其名称所示，可用于提交或回滚事务。


    ## 使用 Spring 的声明式事务


    Spring 提供了两种方式将事务行为声明式地添加到应用程序中：纯 XML 和注解。注解方法非常流行，且大大简化了配置。为了演示声明式事务，考虑一个简单的场景：向数据库中的
    `Person` 表插入新记录。清单 9-2 展示了实现此场景的 `PersonRepositoryImpl` 类及其 `create` 方法。


    ```

    import org.springframework.jdbc.core.JdbcTemplate;

    import org.springframework.stereotype.Repository;

    @Repository

    public class PersonRepositoryImpl implements PersonRepository {

    private JdbcTemplate jdbcTemplate;

    @Override

    public void create(String firstName, String lastName) {

    String sql = "INSERT INTO PERSON (FIRST_NAME, " + "LAST_NAME) VALUES (?, ?)";

    jdbcTemplate.update(sql, new Object[]{firstName, lastName});

    }

    }

    清单 9-2

    插入一行的示例源代码

    ```


    清单 9-3 展示了前一个类实现的 `PersonRepository` 接口。


    ```

    public interface PersonRepository {

    void create(String firstName, String lastName);

    }

    清单 9-3

    仓库示例

    ```


    下一步是使 `create` 方法具备事务性。这通过在方法上添加 `@Transactional` 注解实现，如清单 9-4 所示。（注意：我是在实现类的方法上添加注解，而非接口方法。）


