    ### EqualsFilter


    An `EqualsFilter` can be used to retrieve all entries that have the specified
    attribute and value. Let’s say you want to retrieve all patrons with the first
    name `Abbi`. To do this, you create a new instance of `EqualsFilter`:


    ```

    EqualsFilter filter = new EqualsFilter("givenName", "Abbi");

    ```


    The first parameter to the constructor is the attribute name, and the second parameter
    is the attribute value. Invoking the `encode` method on this filter results in
    the string `(givenName=Abbi)`.


    Listing [6-4](#319409_2_En_6_Chapter.xhtml#PC13) shows the test case invoking
    the `searchAndPrintResults` with the preceding `EqualsFilter` parameter. The console
    output of the method is also shown in the listing. Notice that the results have
    patrons with the first name `Abbi`. That is because the `sn` attribute, like most
    LDAP attributes, is defined in the schema as case-insensitive.


    ```

    @Test

    @DisplayName("Check that search operation using equals filter works")

    public void should_works_equalsFilter() {

    Filter filter = new EqualsFilter("givenName", "Abbi");

    List results = searchFilter.searchAndPrintResults(filter);

    assertAll(

    ()-> assertNotNull(results),

    ()-> assertEquals(1, results.size()),

    ()-> assertEquals("Abbi Abbott", results.get(0).getFullName())

    );

    }

    Results found in search: 1

    Full name: Abbi Abbott

    Listing 6-4

    Example of the equals filter

    ```


    ### LikeFilter


    The `LikeFilter` is useful for searching LDAP when only a partial value of an
    attribute is known. The LDAP specification allows the usage of the wildcard `*`
    to describe these partial values. Say you want to retrieve all users whose first
    name begins with “Abb.” To do this, you create a new instance of `LikeFilter`
    and pass in the wildcard substring as an attribute value:


    ```

    LikeFilter filter = new LikeFilter("givenName", "Abb*");

    ```


    Invoking the `encode` method on this filter results in the string `(givenName=Abb*)`.
    Listing [6-5](#319409_2_En_6_Chapter.xhtml#PC15) shows the test case and the results
    of invoking the `searchAndPrintResults` method with the `LikeFilter`.


    ```

    @Test

    @DisplayName("Check that search operation using like filter works")

    public void should_works_likeFilter() {

    Filter filter = new LikeFilter("givenName", "Abb*");

    List results = searchFilter.searchAndPrintResults(filter);

    assertAll(

    ()-> assertNotNull(results),

    ()-> assertEquals(7, results.size())

    );

    }

    Results found in search: 7

    Full name: Abbey Abbie

    Full name: Abbi Abbott

    Full name: Abbie Abdalla

    Full name: Abby Abdo

    Full name: Abbye Abdollahi

    Full name: Abbas Abbatantuono

    Full name: Abbe Abbate

    Listing 6-5

    Example of a like filter

    ```


    The wildcard `*` in the substring is used to match zero or more characters. However,
    it is essential to understand that LDAP search filters do not support regular
    expressions. Table [6-2](#319409_2_En_6_Chapter.xhtml#Tab2) lists some substring
    examples.


    Table 6-2


    LDAP Substring Examples


    | LDAP Substring | Description |

    | --- | --- |

    | `(givenName=*son)` | Matches all patrons whose first name ends with son. |

    | `(givenName=J*n)` | Matches all patrons whose first name starts with J and ends
    with n. |

    | `(givenName=*a*)` | Matches all patrons with first name containing the character
    a. |

    | `(givenName=J*s*n)` | Matches patrons whose first name starts with J, contains
    character s, and ends with n. |


    You might be wondering about the necessity of a `LikeFilter` when you can accomplish
    the same filter expression by simply using the `EqualsFilter`, like this:


    ```

    EqualsFilter filter = new EqualsFilter("uid", "Ja*");

    ```


    Using `EqualsFilter` in this scenario will not work because the `encode` method
    in `EqualsFilter` considers the wildcard `*` in the `Ja*` as a special character
    and properly escapes it. Thus, when used for a search, the preceding filter would
    result in all entries with a first name starting with `Ja*`.


    ### PresentFilter


    `PresentFilter`s are useful for retrieving LDAP entries with at least one value
    in a given attribute. Consider the earlier scenario where you wanted to retrieve
    all the patrons with an email address. To do this, you create a `PresentFilter`,
    as shown:


    ```

    PresentFilter presentFilter = new PresentFilter("mail");

    ```


    Invoking the `encode` method on the `presentFilter` instance results in the string
    `(mail=*)`. Listing [6-6](#319409_2_En_6_Chapter.xhtml#PC18) shows the test code
    and the result when the `searchAndPrintResults` method is invoked with the preceding
    `presentFilter`.


    ```

    @Test

    @DisplayName("Check that search operation using present filter works")

    public void should_works_presentFilter() {

    Filter filter = new PresentFilter("mail");

    List results = searchFilter.searchAndPrintResults(filter);

    assertAll(

    ()-> assertNotNull(results),

    ()-> assertEquals(101, results.size())

    );

    }

    Results found in search: 100

    Full name: Aaccf Amar

    Full name: Aaren Atp

    Full name: Abbey Abbie

    Full name: Abbi Abbott

    Full name: Abbie Abdalla

    .........

    .........

    Listing 6-6

    Example of a present filter

    ```


    ### Not Filter


    `NotFilter` is helpful for retrieving entries that do not match a given condition.
    In the “LikeFilter” section, you looked at retrieving all entries that start with
    `Ja`. Now let’s say you want to retrieve all entries that don’t start with `Ade`.
    This is where a `NotFilter` comes into the picture. Here is the code for accomplishing
    this requirement:


    ```

    NotFilter notFilter = new NotFilter(new LikeFilter("givenName", "Ade*"));

    ```


    Encoding this filter results in the string `!(givenName=Ade*)`. As you can see,
    the `NotFilter` adds the negation symbol (`!`) to the filter passed into its constructor.
    Invoking the `searchAndPrintResults` method results in the output shown in Listing
    [6-8](#319409_2_En_6_Chapter.xhtml#PC22).


    ```

    @Test

    @DisplayName("Check that search operation using non filter works")

    public void should_works_notFilter() {

    NotFilter notFilter = new NotFilter(new LikeFilter("givenName", "Ade*"));

    List results = searchFilter.searchAndPrintResults(notFilter);

    assertAll(

    ()-> assertNotNull(results),

    ()-> assertEquals(86, results.size())

    );

    }

    Results found in search: 86

    Full name: Aaccf Amar

    Full name: Aaren Atp

    Full name: Abbey Abbie

    Full name: Abbi Abbott

    Full name: Abbie Abdalla

    .........

    .........

    Listing 6-8

    Example of a not filter

    ```


    It is also possible to combine `NotFilter` and `PresentFilter` to create expressions
    equivalent to `NotPresentFilter`. Here is a new implementation that gets all the
    entries that don’t have an email address:


    ```

    NotFilter notFilter = new NotFilter(new PresentFilter("email"));

    ```

