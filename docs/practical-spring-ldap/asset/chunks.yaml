- fmt: '# Parsing LDIF Data


    The LDAP Data Interchange Format is a standards-based data interchange format
    for representing LDAP directory data in a flat-file format. LDIF is discussed
    in detail in Chapter [1](#319409_2_En_1_Chapter.xhtml). As an LDAP developer or
    administrator, you may sometimes need to parse LDIF files and perform operations
    such as a bulk directory load. For such scenarios, Spring LDAP introduced a set
    of classes in the `org.springframework.ldap.ldif` package and its subpackages
    that make it easy to read and parse LDIF files.


    Central to the `org.springframework.ldap.ldif.parser` package is the `Parser`
    interface, and its default implementation `LdifParser`. The `LdifParser` is responsible
    for reading individual lines from an LDIF file and converting them into Java objects.
    This object representation is possible through two newly added classes, namely,
    `LdapAttribute` and `LdapAttributes`.


    The code in Listing [10-11](#319409_2_En_10_Chapter.xhtml#PC15) uses `LdifParser`
    to read and print the total number of records in an LDIF file. You start the implementation
    by creating an instance of `LdifParser` and passing in the file you want to parse.
    Before the parser can be used, you need to open it. Then, you use the parser’s
    iterator-style interface for reading and counting individual records.


    ```

    package com.apress.book.ldap.parser;

    import java.io.File;

    import java.io.IOException;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    import org.springframework.core.io.ClassPathResource;

    import org.springframework.ldap.core.LdapAttributes;

    import org.springframework.ldap.ldif.parser.LdifParser;

    public class SimpleLdifParser {

    private static final Logger logger = LoggerFactory.getLogger(SimpleLdifParser.class);

    public void parse(File file) throws IOException {

    LdifParser parser = new LdifParser(file);

    parser.open();

    int count = 0;

    while (parser.hasMoreRecords()) {

    LdapAttributes attributes = parser.getRecord();

    count++;

    }

    parser.close();

    logger.info(String.valueOf(count));

    }

    public static void main(String[] args) throws IOException {

    SimpleLdifParser parser = new SimpleLdifParser();

    parser.parse(new ClassPathResource("patrons.ldif").getFile());

    }

    }

    Listing 10-11

    Example of an LDIF parser

    ```


    Before running the preceding class, ensure you have the `patrons.ldif` file in
    the folder `src/java/resources`. Upon running the class with the `patrons.ldif`
    file included with the Chapter [1](#319409_2_En_1_Chapter.xhtml) code, you should
    see the count `103` printed to the console like the following output:


    ```

    14:37:04.933 [main] DEBUG o.s.ldap.ldif.parser.LdifParser - record parsed:

    dn: ou=patrons,dc=inflinx,dc=com

    ou: patrons

    objectClass: top

    objectClass: organizationalunit

    14:37:04.935 [main] DEBUG o.s.ldap.ldif.parser.LdifParser - record parsed:

    dn: uid=patron0,ou=patrons,dc=inflinx,dc=com

    mobile: +1 189 955 5012

    initials: ARA

    givenName: Aaccf

    street: 08904 Sixth Street

    telephoneNumber: +1 688 926 3146

    sn: Amar

    userPassword: password

    l: Fairbanks

    mail: patron0@inflinx.com

    objectClass: top

    objectClass: person

    objectClass: organizationalperson

    objectClass: inetorgperson

    uid: patron0

    postalAddress: Aaccf Amar$08904 Sixth Street$Fairbanks, IA  10928

    homePhone: +1 092 210 9726

    postalCode: 10928

    cn: Aaccf Amar

    st: IA

    ......................

    ......................

    ......................

    ```


    The parsing implementation of `LdifParser` relies on three supporting policy definitions:
    separator policy, attribute validation policy, and record specification policy.


    *   The separator policy provides the separation rules for LDIF records in a file
    and is defined in RFC 2849.^([^(92)](#fn92)) It is implemented via the `org.springframework.ldap.ldif.support.SeparatorPolicy`
    class.


    *   The attribute validation policy, as the name suggests, ensures that all the
    attributes are structured properly in the LDIF file before parsing. It is implemented
    via the `AttributeValidationPolicy` interface and the `DefaultAttributeValidationPolicy`
    class. These two are located in the `org.springframework.ldap.ldif.support` package.
    The `DefaultAttributeValidationPolicy` uses regular expressions to validate attribute
    format according to RFC 2849.


    *   The record specification policy validates rules that each LDIF record must
    confirm. Spring LDAP provides the `Specification` interface and two implementations
    for this policy: `org.springframework.ldap.schema.DefaultSchemaSpecification`
    and `org.springframework.ldap.schema.BasicSchemaSpecification`. The `DefaultSchemaSpecification`
    has an empty implementation and does not validate the records. The `BasicSchemaSpecification`
    can perform basic checks, such as that an `objectClass` must exist for each LAP
    entry. For most cases, the `BasicSchemaSpecification` will suffice.


    The modified `parse` method implementation and the three policy definitions are
    given in Listing [10-12](#319409_2_En_10_Chapter.xhtml#PC17).


    ```

    package com.apress.book.ldap.parser;

    import java.io.File;

    import java.io.IOException;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    import org.springframework.core.io.ClassPathResource;

    import org.springframework.ldap.core.LdapAttributes;

    import org.springframework.ldap.ldif.parser.LdifParser;

    import org.springframework.ldap.ldif.support.DefaultAttributeValidationPolicy;

    import org.springframework.ldap.schema.BasicSchemaSpecification;

    public class SimpleLdifParser2 {

    private static final Logger logger = LoggerFactory.getLogger(SimpleLdifParser2.class);

    public void parse(File file) throws IOException {

    LdifParser parser = new LdifParser(file);

    parser.setAttributeValidationPolicy(new DefaultAttributeValidationPolicy());

    parser.setRecordSpecification(new BasicSchemaSpecification());

    parser.open();

    int count = 0;

    while (parser.hasMoreRecords()) {

    LdapAttributes attributes = parser.getRecord();

    count++;

    }

    parser.close();

    logger.info(String.valueOf(count));

    }

    public static void main(String[] args) throws IOException {

    SimpleLdifParser2 parser = new SimpleLdifParser2();

    parser.parse(new ClassPathResource("patrons.ldif").getFile());

    }

    }

    Listing 10-12

    Example of LDIF parser using the validators

