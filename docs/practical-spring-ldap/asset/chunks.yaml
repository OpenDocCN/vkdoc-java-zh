    \ This involves instructing the mock what to expect and what to return.\n\n* Run\
    \ the tests, passing the mock instance to the component under test.\n\n* Verify\
    \ the results.\n\n`Note`  \nIt’s not the scope of this book to explain all the\
    \ possible features, pros, and cons of each framework, so this chapter only covers\
    \ the most relevant aspects of creating mocks using `Mockito`. If you want to\
