    # 8. Object-Directory Mapping


    Enterprise Java developers employ object-oriented (OO) techniques to create modular,
    complex applications. In the OO paradigm, objects are central to the system and
    represent entities in the real world. Each object has an identity, state, and
    behavior. Objects can be related to other objects through inheritance or composition.
    On the other hand, LDAP directories represent data and relationships in a hierarchical
    tree structure. This difference leads to an object-directory paradigm mismatch
    and can cause problems in communication between OO and directory environments.


    Spring LDAP provides an Object-Directory Mapping (ODM) framework that bridges
    the gap between the object and directory models. The ODM framework allows us to
    map concepts between the two models and orchestrates the process of automatically
    transforming LDAP directory entries into Java objects. ODM is similar to the Object-Relational
    Mapping (ORM) methodology that bridges the gap between object and relational database
    worlds. Frameworks such as `Hibernate`^([^(80)](#fn80)) and `TopLink`^([^(81)](#fn81))
    have made ORM popular and an essential part of the developer''s toolset. Also,
    other frameworks like `Spring Data`^([^(82)](#fn82)) use behind-the-scenes `Hibernate`
    and offer the same support to access a database.


    Though `Spring LDAP ODM` shares the same concepts as ORM, it has the following
    differences:


    *   Caching LDAP entries is not possible by default, but you can use libraries
    like `Caffeine`, `Guava`, or `EhCache` to encapsulate the logic that accesses
    the LDAP.


    *   ODM metadata is expressed through class-level annotations.


    *   No XML configuration is available.


    *   Lazy loading of entries is not possible.


    *   A query language, such as HQL, does not exist. Loading of objects is done
    via DN lookups and standard LDAP search queries, or you can use the methods provided
    by Spring LDAP to write the query using methods.


    ```

    package `com.apress.book.ldap.paging`;

    import `java.util.List`;

    import `javax.naming.directory.SearchControls`;

    import `com.apress.book.ldap.domain.Page`;

    import `com.apress.book.ldap.domain.Pagination`;

    import `org.slf4j.Logger`;

    import `org.slf4j.LoggerFactory`;

    import `org.springframework.beans.factory.annotation.Autowired`;

    import `org.springframework.beans.factory.annotation.Qualifier`;

    import `org.springframework.ldap.control.PagedResultsCookie`;

    import `org.springframework.ldap.control.PagedResultsDirContextProcessor`;

    import `org.springframework.ldap.core.DirContextOperations`;

    import `org.springframework.ldap.core.LdapTemplate`;

    import `org.springframework.ldap.core.support.AbstractContextMapper`;

    import `org.springframework.ldap.filter.EqualsFilter`;

    import `org.springframework.stereotype.Component`;

    @Component(`"springPaging"`)

    public class `SpringPaging` {

    private static final Logger logger = `LoggerFactory.getLogger`(SpringPaging.class);

    private `LdapTemplate` ldapTemplate;

    public `SpringPaging`( @Autowired @Qualifier(`"ldapTemplate"`) `LdapTemplate`
    ldapTemplate) {

    this.ldapTemplate = ldapTemplate;

    }

    //previous code

    public `Pagination` pagedResults(`Page` page) {

    int pageNumber = 0;

    `PagedResultsCookie` cookie = null;

    `SearchControls` searchControls = new `SearchControls`();

    searchControls.setSearchScope(`SearchControls.SUBTREE_SCOPE`);

    if (page.getCookie() != null) {

    pageNumber = page.getActualPage();

    cookie = page.getCookie();

    }

    logger.info(`"Page: "` + page);

    `PagedResultsDirContextProcessor` processor = new `PagedResultsDirContextProcessor`(20,
    cookie);

    `EqualsFilter` equalsFilter = new `EqualsFilter`(`"objectClass"`, `"inetOrgPerson"`);

    `List` lastNames = ldapTemplate.search(`" "`, equalsFilter.encode(), searchControls,
    new `LastNameMapper`(), processor);

    for (String l : lastNames) {

    logger.info(l);

    }

    return new `Pagination`(lastNames, new `Page`( ));

    }

    //previous code

    }

    Listing 7-17

    An example of paging using Spring

    ```


