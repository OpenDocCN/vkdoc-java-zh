  raw: '## Parsing LDIF Data


    The LDAP Data Interchange Format is a standards-based data interchange format
    for representing LDAP directory data in a flat-file format. LDIF is discussed
    in detail in Chapter [1](#319409_2_En_1_Chapter.xhtml). As an LDAP developer or
    administrator, you may sometimes need to parse LDIF files and perform operations
    such as a bulk directory load. For such scenarios, Spring LDAP introduced a set
    of classes in the `org.springframework.ldap.ldif` package and its subpackages
    that make it easy to read and parse LDIF files.


    Central to the `org.springframework.ldap.ldif.parser` package is the `Parser`
    interface, and its default implementation `LdifParser`. The `LdifParser` is responsible
    for reading individual lines from an LDIF file and converting them into Java objects.
    This object representation is possible through two newly added classes, namely,
    `LdapAttribute` and `LdapAttributes`.


    The code in Listing [10-11](#319409_2_En_10_Chapter.xhtml#PC15) uses `LdifParser`
    to read and print the total number of records in an LDIF file. You start the implementation
    by creating an instance of `LdifParser` and passing in the file you want to parse.
    Before the parser can be used, you need to open it. Then, you use the parser’s
    iterator-style interface for reading and counting individual records.


    ```

    package com.apress.book.ldap.parser;

    import java.io.File;

    import java.io.IOException;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    import org.springframework.core.io.ClassPathResource;

    import org.springframework.ldap.core.LdapAttributes;

    import org.springframework.ldap.ldif.parser.LdifParser;

    public class SimpleLdifParser {

    private static final Logger logger = LoggerFactory.getLogger(SimpleLdifParser.class);

    public void parse(File file) throws IOException {

    LdifParser parser = new LdifParser(file);

    parser.open();

    int count = 0;

    while (parser.hasMoreRecords()) {

    LdapAttributes attributes = parser.getRecord();

    count++;

    }

    parser.close();

    logger.info(String.valueOf(count));

    }

    public static void main(String[] args) throws IOException {

    SimpleLdifParser parser = new SimpleLdifParser();

    parser.parse(new ClassPathResource("patrons.ldif").getFile());

    }

    }

    Listing 10-11

    Example of an LDIF parser

    ```


