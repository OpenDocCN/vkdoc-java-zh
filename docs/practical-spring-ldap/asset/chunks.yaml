  raw: '### Mockito


    Mockito^([^(64)](#fn64)) is a mocking framework written in Java that has become
    one of the most popular options to create and manage mocks because it offers a
    simple syntax and support with many other test libraries like JUnit. With this
    library, you can declare different types of responses on the interfaces/classes
    you mock depending on the situation you want to test, from a specific value to
    throwing an exception.


    Following the same approach as JUnit, the best way to learn Mockito is with a
    practical example. Let’s define two simple classes with a certain level of connection
    to create the scenario. Listing [4-4](#319409_2_En_4_Chapter.xhtml#PC5) shows
    a simple service that takes two numbers and executes a sum operation.


    ```

    public class MathService {

    public int add(int numberOne, int numberTwo){

    return numberOne + numberTwo;

    }

    }

    Listing 4-4

    A simple class that executes a math operation

    ```


    The next step is to create another class with the MathService as a dependency,
    which you will mock. Listing [4-5](#319409_2_En_4_Chapter.xhtml#PC6) shows you
    a class with a method that invokes the same method of the service.


    ```

    public class Calculator {

    private final MathService service;

    public Calculator(MathService service) {

    this.service = service;

    }

    public int add(int numberOne, int numberTwo){

    return service.add(numberOne, numberTwo);

    }

    }

    Listing 4-5

    A service class that invokes another class

    ```


    Before creating any tests and creating the mocks, you must add the dependency
    compatible with JUnit 5, which is shown in Listing [4-6](#319409_2_En_4_Chapter.xhtml#PC7).


    ```

    org.mockito

    mockito-junit-jupiter

    ${mockito-junit-jupiter.version}

    test


    Listing 4-6

    Mockito dependency that you must include on the POM file

    ```


    The last step is to create a test that mocks the MathService class because you
    only want to test the behavior of the Calculator class. Listing [4-7](#319409_2_En_4_Chapter.xhtml#PC8)
    shows you the context definition and a simple test.


    ```

    import org.junit.jupiter.api.BeforeEach;

    import org.junit.jupiter.api.DisplayName;

    import org.junit.jupiter.api.Test;

    import static org.junit.jupiter.api.Assertions.assertEquals;

    import static org.mockito.Mockito.*;

    @DisplayName("Calculator tests cases")

    class CalculatorTest {

    private MathService mathService;

    private Calculator calculator;

    @BeforeEach

    public void setUp() {

    mathService = mock(MathService.class); // This class is a mock

    calculator = new Calculator(mathService);

    }

    @Test

    @DisplayName("Check that the sum of two numbers is okay")

    void should_sum_two_numbers() {

    // Given - Creating the mocks

    when(mathService.add(1, 4)).thenReturn(5);

    // When - Execution of the operation

    int result = calculator.add(1, 4);

    // Then - Verify the results and the interactions with the mocks class

    verify(mathService).add(1, 4);

    assertEquals(5, result);

    }

    }

    Listing 4-7

    Simple tests using Mockito

    ```


    As you can see in Listing [4-7](#319409_2_En_4_Chapter.xhtml#PC8), there are some
    static methods like when, mock, and verify that are part of the features that
    introduce Mockito not just to create mocks but with the idea to help validate
    if the mocks are used or not for your tests.


    Table [4-2](#319409_2_En_4_Chapter.xhtml#Tab2) lists some important methods available
    in Mockito.


    Table 4-2


    Mockito Methods


    | Methods | Description |

    | --- | --- |

    | mock | This method creates a mock for a particular class which intercepts all
    the invocations, and you can change the class’s behavior. |

    | verify | This method will help you to check if a particular mock with certain
    parameters was invoked. This is extremely useful to understand if the logic works
    fine. |

    | any | You will use this method to indicate that you want any value that receives
    the mock,active the new behavior. |

    | doThrow | You can use this method to throw a particular exception when the mock
    is invoked in a specific condition. |

    | when/given | You will use this method to specify the condition that the invocation
    needs to execute the mock. |


    Consider that the table only shows the most relevant annotations you need to use
    on the test; there are many other annotations on the Mockito official website.^([^(65)](#fn65))


    ### Testcontainers


    Testcontainers^([^(66)](#fn66)) is a lightweight and open source library that
    allows you to run different containers on your application and reuse different
    test cases. This library supports multiple testing frameworks, like different
    versions of JUnit and Spock, and you can use it on Java or Kotlin projects.


    The containers could be databases or other services that your application requires;
    for example, if your application needs to use a specific service of AWS, you can
    use the image of LocalStack.^([^(67)](#fn67)) Testcontainers develop a set of
    modules^([^(68)](#fn68)) to reduce the complexity of running a container and configure
    this particular image; for example, there are modules for the most popular databases
    and queues.


    Behind the scenes, this library uses Docker^([^(69)](#fn69)) to download and run
    the different containers, so before using your project, check the general requirements^([^(70)](#fn70))
    related to the versions of Docker that the library needs to satisfy. Also, since
    November 2020, Docker Hub introduced some restrictions on using the different
    images on the repository, like the number of times you download, but in the case
    of the open source projects, the restrictions do not apply because the idea is
    that Docker Hub works as a central repository. Consider that if you use this library
    in a pipeline, the machine running needs to satisfy the same requirements.


    Before creating any test using containers, you must add the dependencies compatible
    with JUnit 5, which appears in Listing [4-8](#319409_2_En_4_Chapter.xhtml#PC9).


    ```

    org.testcontainers

    testcontainers

    ${testcontainers.version}

    test


    org.testcontainers

    junit-jupiter

    ${testcontainers.version}

    test


    Listing 4-8

    Testcontainers dependency that you must include on the POM file

    ```


    After that, let’s create a simple test that only runs a simple hello-world image
    as shown in Listing [4-9](#319409_2_En_4_Chapter.xhtml#PC10).


    ```

    import org.junit.jupiter.api.DisplayName;

    import org.junit.jupiter.api.Test;

    import org.testcontainers.containers.GenericContainer;

    import org.testcontainers.junit.jupiter.Container;

    import org.testcontainers.junit.jupiter.Testcontainers;

    import org.testcontainers.utility.DockerImageName;

    @Testcontainers

    @DisplayName("Hello world container tests cases")

    class HelloWorldContainerTest {

    @Container

    public static GenericContainer container = new GenericContainer(DockerImageName.parse("testcontainers/helloworld"));

    @Test

    @DisplayName("Check that the test and the container works fine")

    void should_works_the_container() {

    }

    }

    Listing 4-9

    Declaration of a container to be used on the test

    ```


    As you can see, Listing [4-9](#319409_2_En_4_Chapter.xhtml#PC10) includes a new
    annotation called @***Testcontainers***, which is responsible for managing the
    life cycle of the containers during the execution of tests. Also, there is another
    annotation on the tests with the name @Container, which indicates that the variable
    that you declared needs that Testcontainers run the container. If you run the
    command **mvn test** in your terminal, you will see on the logs something like
    this:


    ```

    11:10:21.531 [main] INFO org.testcontainers.DockerClientFactory - Connected to
    docker:

    Server Version: 23.0.5

    API Version: 1.42

    Operating System: Docker Desktop

    Total Memory: 7579 MB

    11:10:21.539 [main] DEBUG org.testcontainers.utility.RyukResourceReaper - Ryuk
    is enabled

    11:10:21.541 [main] DEBUG org.testcontainers.utility.PrefixingImageNameSubstitutor
    - No prefix is configured

    11:10:21.541 [main] DEBUG org.testcontainers.utility.ImageNameSubstitutor - Did
    not find a substitute image for testcontainers/ryuk:0.5.1 (using image substitutor:
