  现在，让我们看看如何使用 Spring LDAP 实现相同的行为。列表 7-6 显示了相关代码。在此实现中，您需要创建一个新的 `org.springframework.ldap.control.SortControlDirContextProcessor`
  实例。`SortControlDirContextProcessor` 构造函数接受一个 LDAP 属性名称，该属性将在控制创建时用作排序键。下一步是创建 `SearchControls`
  和一个过滤器来限制搜索范围。最后，调用搜索方法，传入创建的实例以及一个映射器以将数据映射到目标对象。


