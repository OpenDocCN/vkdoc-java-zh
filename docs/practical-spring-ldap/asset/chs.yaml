  ## LDAP 连接池


  LDAP 连接池是一种技术，它允许重复使用与 LDAP 目录的连接，而不是在每次请求连接时都创建新连接。如果没有连接池，每次向 LDAP 目录发起请求都会创建一个新连接，并在不再需要该连接时将其释放。创建新连接会消耗大量资源，这种开销会对性能产生不利影响。使用连接池后，连接在创建后会被存储在池中，并回收用于后续的客户端请求。


  池中的连接在任何时刻都可能处于以下三种状态之一：


  *   *使用中*：连接已打开且当前正在使用。

  *   *空闲*：连接已打开并可重复使用。

  *   *已关闭*：连接不再可用。


  图 10-1 展示了在任意时刻对连接可能执行的操作。


  ![](img/319409_2_En_10_Fig1_HTML.jpg)


  连接池状态的块状流程图。通过释放和分配给请求，“使用中”块与“空闲”块相互连接。“空闲”块映射到“已关闭”块。


  图 10-1


  连接池状态


  ## 内置连接池


  JNDI 通过 `"com.sun.jndi.ldap.connect.pool"` 环境属性为连接池提供基本支持。创建目录上下文的应用程序可以将此属性设置为
  `true`，以指示需要开启连接池。清单 10-13 展示了使用池化支持的纯 JNDI 代码。


  ```

  // 设置创建初始上下文的环境

  Hashtable env = new Hashtable();

  env.put(Context.INITIAL_CONTEXT_FACTORY, "com.sun.jndi.ldap.LdapCtxFactory");

  env.put(Context.PROVIDER_URL, "ldap://localhost:11389");

  // 启用连接池

  env.put("com.sun.jndi.ldap.connect.pool", "true");

  // 创建一个初始上下文

  (从池中获取连接) DirContext ctx = new InitialDirContext(env);

  // 使用 ctx 做一些有用的事情

  // 完成后关闭上下文

  ctx.close(); // 将连接归还到池中

  清单 10-13

  带池化的纯 JNDI 代码

  ```


  默认情况下，Spring LDAP 上下文的 `"com.sun.jndi.ldap.connect.pool"` 属性设置为 `false`。可以通过在配置文件中将
  `LdapContextSource` 的 `pooled` 属性设置为 `true` 来开启原生连接池。以下代码展示了配置更改：


  尽管原生 LDAP 连接池很简单，但它确实存在一些缺点。连接池是按 Java 运行时环境维护的。无法在单个 JVM 内维护多个连接池。此外，也无法控制连接池的属性，例如任何时刻要维护的连接数或空闲连接时间。同样不可能提供任何自定义连接验证来确保池化连接仍然有效。


  ## Spring LDAP 连接池


  为了解决原生 JNDI 池化的缺点，Spring LDAP 为 LDAP 连接提供了一个自定义池化库。Spring LDAP 池化库维护其自己的一组特定于每个应用程序的
  LDAP 连接。


  注意


  Spring LDAP 利用 Jakarta Commons Pool^(⁹³) 库作为其底层池化实现。


  首先，你需要在 `pom.xml` 文件中添加与池相关的依赖项，该依赖项默认不包含在 Spring LDAP 中：


  ```

  commons-pool

  commons-pool

  1.6


  ```


  Spring LDAP 池化的核心是 `org.springframework.ldap.pool.factory.PoolingContextSource`，它是一个专门的
  `ContextSource` 实现，负责池化 `DirContext` 实例。要使用连接池，首先要配置一个 Spring LDAP 上下文源：


  请注意，你将上下文源的 `pooled` 属性设置为 `false`。这将允许 `LdapContextSource` 在需要时创建全新的连接。此外，`ContextSource`
  的 `id` 现在设置为 `contextSourceTarget`，而不是通常使用的 `contextSource`。下一步是创建一个 `PoolingContextSource`，如下所示：


  `PoolingContextSource` 包装了你之前配置的 `contextSourceTarget`。这是必需的，因为 `PoolingContextSource`
  将创建 `DirContext` 的任务委托给 `contextSourceTarget`。另外，请注意你为此 bean 实例使用了 id `contextSource`。这允许你在
  `LdapTemplate` 中使用 `PoolingContextSource` 实例时，将配置更改保持在最低限度，如下所示：


  `PoolingContextSource` 提供了多种选项，可用于微调连接池。表 10-1 列出了一些重要的配置属性。


  表 10-1


  PoolingContextSource 配置属性


  | 属性 | 描述 | 默认值 |

  | --- | --- | --- |

  | `testOnBorrow` | 设置为 true 时，在从池中借用 `DirContext` 之前会对其进行验证。如果 `DirContext` 验证失败，则会将其从池中移除，并再次尝试借用另一个
  `DirContext`。此测试可能会在处理借用请求时增加少量延迟。 | False |

  | `testOnReturn` | 设置为 true 时，此属性表示 `DirContext` 在返回到池之前将进行验证。 | False |

  | `testWhileIdle` | 设置为 true 时，此属性表示池中的空闲 `DirContext` 实例应按指定频率进行验证。验证失败的对象将从池中丢弃。
  | False |

  | `timeBetweenEvictionRunsMillis` | 此属性表示运行空闲上下文测试之间的休眠时间（以毫秒为单位）。负数表示永远不会运行空闲测试。
  | -1 |

  | `whenExhaustedAction` | 指定池耗尽时要采取的操作。可能的选项有 `WHEN_EXHAUSTED_FAIL (0)`、`WHEN_EXHAUSTED_BLOCK
  (1)` 和 `WHEN_EXHAUSTED_GROW (2)`。 | 1 |

  | `maxTotal` | 此池可以包含的最大活动连接数。非正整数表示无限制。 | -1 |

  | `maxIdle` | 池中每种类型（读取、读写）可以空闲的最大连接数。 | 8 |

  | `maxWait` | 池在抛出异常之前等待连接返回到池的最大毫秒数。负数表示无限期等待。 | -1 |


