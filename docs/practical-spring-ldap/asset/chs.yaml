  ## Spring LdapTemplate 操作


  在上一节中，您使用`LdapTemplate`实现了搜索功能。现在，让我们看看如何使用`LdapTemplate`在 LDAP 中添加、删除和修改信息。




  ## 添加操作


  `LdapTemplate` 类提供了多个 bind 方法，允许您创建新的 LDAP 条目。这些方法中最简单的是以下方法：


  ```

  public void bind(String dn, Object obj, Attributes attributes)

  ```


  此方法的第一个参数是要绑定的对象的唯一区分名称。第二个参数是要绑定的对象，通常是 `DirContext` 接口的实现。第三个参数是要绑定的对象的属性。这三个参数中，只有第一个是必需的，其余两个可以传入
  null。


  清单 3-10 展示了创建包含最少信息的新借阅者条目所需的代码。您首先通过创建 `BasicAttributes` 类的新实例来开始方法实现，以保存借阅者的属性。单值属性通过将属性名和值传递给
  put 方法添加。要添加多值属性 objectclass，您需要创建 `BasicAttribute` 类的新实例，然后将条目的 objectClass 值添加到
  `objectClassAttribute` 中，并将其添加到属性列表中。最后，您通过调用 `LdapTemplate` 的 bind 方法，传入借阅者信息和借阅者的完整限定
  DN，从而将借阅者条目添加到 LDAP 服务器中。


  ```

  public void addPatron() {

  // 设置借阅者属性

  Attributes attributes = new BasicAttributes();

  attributes.put("sn", "Patron999");

  attributes.put("cn", "New Patron999");

  // 添加多值属性

  BasicAttribute objectClassAttribute = new BasicAttribute("objectclass");

  objectClassAttribute.add("top");

  objectClassAttribute.add("person");

  objectClassAttribute.add("organizationalperson");

  objectClassAttribute.add("inetorgperson");

  attributes.put(objectClassAttribute);

  ldapTemplate.bind("uid=patron999,ou=patrons,dc=inflinx,dc=com", null, attributes);

  }

  Listing 3-10

  添加借阅者操作

  ```


  ## 修改操作


  考虑一个场景，您想向新添加的借阅者添加一个电话号码。为此，`LdapTemplate` 提供了一个便捷的 `modifyAttributes` 方法，其签名如下：


  ```

  public void modifyAttributes(String dn, ModificationItem[] mods)

  ```


  此 `modifyAttributes` 方法的变体将要修改的条目的完整限定唯一 DN 作为其第一个参数。第二个参数接受一个 `ModificationItem`
  数组，每个修改项包含需要修改的属性信息。清单 3-11 展示了一个 *修改属性* 的示例，例如向借阅者添加新电话号码。


  ```

  public void addTelephoneNumber() {

  Attribute attribute = new BasicAttribute("telephoneNumber", "801 100 1000");

  ModificationItem item = new ModificationItem(DirContext.ADD_ATTRIBUTE, attribute);

  ldapTemplate.modifyAttributes("uid=patron999,ou=patrons,dc=inflinx,dc=com", new
  ModificationItem[] {item});

  }

  Listing 3-11

  向借阅者添加新电话号码

  ```


  在此实现中，您只需创建一个包含电话信息的 `BasicAttribute`，然后创建一个 `ModificationItem` 并传入 `ADD_ATTRIBUTE`
  代码，表示您要添加属性。最后，您通过调用 `modifyAttributes` 方法，传入借阅者的 DN 和修改项。`DirContext` 提供了 `REPLACE_ATTRIBUTE`
  代码，用于替换属性值。同样，`REMOVE_ATTRIBUTE` 代码会从属性中移除指定值。


  ## 删除操作


  与添加和修改类似，`LdapTemplate` 通过 `unbind` 方法轻松实现条目的删除。清单 3-12 提供了实现 `unbind` 方法并删除借阅者的代码。如您所见，`unbind`
  方法接受需要删除的条目的 DN。


  ```

  public void removePatron() {    ldapTemplate.unbind("uid=patron999,ou=patrons,dc=inflinx,dc=com");

  }

