  ## 总结


  在本章中，你学习了与 LDAP 控制相关的基础概念。随后，你了解了排序控制的使用，该控制可用于在服务器端对结果进行排序。你看到了 Spring LDAP 如何显著简化排序控制的使用。分页控制可用于分页
  LDAP 结果，在高流量条件下非常有用。


  在下一章中，你将学习如何使用 Spring LDAP ODM 技术来实现数据访问层。


