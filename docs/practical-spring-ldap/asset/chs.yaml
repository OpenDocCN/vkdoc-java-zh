  ### NotPresentFilter


  `NotPresentFilter`用于检索没有指定属性的条目。在条目中没有值的属性被视为不存在。现在，假设你想检索所有没有电子邮件地址的会员。为此，你需要创建一个`NotPresentFilter`的实例，如所示：


  ```

