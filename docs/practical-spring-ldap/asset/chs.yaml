  `LdifParser` 的解析实现依赖于三个支持性策略定义：分隔符策略、属性验证策略和记录规范策略。


  *   分隔符策略提供了文件中 LDIF 记录的分隔规则，并在 RFC 2849^(⁹²) 中定义。它通过 `org.springframework.ldap.ldif.support.SeparatorPolicy`
  类实现。


  *   属性验证策略，顾名思义，确保在解析之前 LDIF 文件中的所有属性都结构正确。它通过 `AttributeValidationPolicy` 接口和 `DefaultAttributeValidationPolicy`
  类实现。这两个位于 `org.springframework.ldap.ldif.support` 包中。`DefaultAttributeValidationPolicy`
  使用正则表达式根据 RFC 2849 验证属性格式。


  *   记录规范策略验证每条 LDIF 记录必须遵守的规则。Spring LDAP 为此策略提供了 `Specification` 接口和两个实现：`org.springframework.ldap.schema.DefaultSchemaSpecification`
  和 `org.springframework.ldap.schema.BasicSchemaSpecification`。`DefaultSchemaSpecification`
  的实现为空，不验证记录。`BasicSchemaSpecification` 可以执行基本检查，例如每个 LAP 条目必须存在 `objectClass`。在大多数情况下，`BasicSchemaSpecification`
  就足够了。


  修改后的 `parse` 方法实现和三个策略定义如清单 10-12 所示。


  ```

  package com.apress.book.ldap.parser;

  import java.io.File;

  import java.io.IOException;

  import org.slf4j.Logger;

  import org.slf4j.LoggerFactory;

  import org.springframework.core.io.ClassPathResource;

  import org.springframework.ldap.core.LdapAttributes;

  import org.springframework.ldap.ldif.parser.LdifParser;

  import org.springframework.ldap.ldif.support.DefaultAttributeValidationPolicy;

  import org.springframework.ldap.schema.BasicSchemaSpecification;

  public class SimpleLdifParser2 {

  private static final Logger logger = LoggerFactory.getLogger(SimpleLdifParser2.class);

  public void parse(File file) throws IOException {

  LdifParser parser = new LdifParser(file);

  parser.setAttributeValidationPolicy(new DefaultAttributeValidationPolicy());

  parser.setRecordSpecification(new BasicSchemaSpecification());

  parser.open();

  int count = 0;

  while (parser.hasMoreRecords()) {

  LdapAttributes attributes = parser.getRecord();

  count++;

  }

  parser.close();

  logger.info(String.valueOf(count));

  }

  public static void main(String[] args) throws IOException {

  SimpleLdifParser2 parser = new SimpleLdifParser2();

  parser.parse(new ClassPathResource("patrons.ldif").getFile());

  }

  }

