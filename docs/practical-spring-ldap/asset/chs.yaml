- '# 9. LDAP 事务


  在本章中，您将学习


  *   事务的基础知识


  *   Spring 事务抽象


  *   Spring LDAP 对事务的支持


  ## 事务基础


  事务是企业应用程序的重要组成部分。简而言之，事务是一系列协同执行的操作。要完成或提交事务，必须确保其所有操作都成功。如果由于任何原因某个操作失败，整个事务将失败并回滚。在这种情况下，所有之前成功执行的操作都必须被撤销。这确保了事务结束后的状态与事务开始前的状态一致。


  在您的日常生活中，您经常会遇到事务。考虑一个在线银行场景，您希望从储蓄账户向支票账户转账 300 美元。此操作涉及从储蓄账户扣除 300 美元，并向支票账户增加
  300 美元。如果操作中的扣除部分成功而增加部分失败，您最终的账户总额将减少 300 美元。（理想情况下，我们都希望扣除操作失败而增加操作成功，但银行可能第二天会来敲您的门。）银行通过使用事务确保账户永远不会处于这种不一致的状态。


  事务通常与以下四个众所周知的特性相关联，这些特性也被称为 ACID 属性：


  表 9-1


  隔离级别


  | 隔离级别 | 描述 |

  | --- | --- |

  | `Read Uncommitted` | 此隔离级别允许正在运行的事务中的查询看到其他未提交事务所做的更改。即使该事务尚未完成，其更改也会对其他事务可见。这是最低级别的隔离，可以更恰当地视为缺乏隔离。由于它违反了
  ACID 属性之一，大多数数据库供应商不支持它。 |

  | `Read Committed` | 此隔离级别允许正在运行的事务中的查询仅看到查询开始前已提交的数据。然而，在查询执行期间，所有未提交的更改或并发事务提交的更改都不会被看到。这是大多数数据库（包括
  Oracle、MySQL 和 PostgreSQL）的默认隔离级别。 |

  | `Repeatable Read` | 此隔离级别允许正在运行的事务中的查询每次执行时都读取相同的数据。为实现这一点，事务会在检查所有行（不仅仅是获取的行）时获取锁，直到事务完成。
  |

  | `Serializable` | 这是所有隔离级别中最严格且成本最高的。交错事务会被排队，以便按顺序执行而不是并发执行。在该隔离级别下，查询只会看到事务开始前已提交的数据，绝不会看到其他事务的未提交更改或提交操作。
  |


  *   *原子性*：此属性确保事务要么完全执行，要么完全不执行。因此，在我们之前的示例中，我们要么成功转账，要么转账失败。这种全有或全无的特性也被称为单个或逻辑工作单元。


  *   *一致性*：此属性确保事务完成后系统处于一致状态。例如，数据库系统会满足所有完整性约束，如主键或参照完整性。




  *   **隔离性**：这一特性确保事务独立于其他并行事务执行。未完成的事务的更改或副作用永远不会被其他事务看到。在资金转账场景中，其他账户所有者只能看到转账前或转账后的余额。只有当事务执行时间较长时，才会看到中间余额。许多数据库系统会放宽这一特性，提供多个隔离级别。表
  9-1 列出了主要的事务级别及其描述。随着隔离级别提高，事务并发性降低，事务一致性提高。


  *   **持久性**：这一特性确保已提交事务的结果不会因故障而丢失。以银行转账场景为例，当您收到转账成功的确认后，持久性特性确保该更改成为永久性的。


  ## 本地事务与全局事务


  事务通常根据参与的资源数量被分类为本地事务或全局事务。这些资源示例包括数据库系统或 JMS 队列。资源管理器（如 JDBC 驱动程序）通常用于管理资源。


  本地事务涉及单一资源。最常见的例子是与单一数据库关联的事务。这些事务通常通过用于访问资源的对象进行管理。在 JDBC 数据库事务中，使用`java.sql.Connection`接口的实现来访问数据库。这些实现还提供了`commit`和`rollback`方法用于管理事务。在
  JMS 队列的情况下，`javax.jms.Session`实例提供了控制事务的方法。


  全局事务则处理多个资源。例如，一个全局事务可以在同一事务中从 JMS 队列读取消息并写入数据库记录。


  全局事务使用外部的事务管理器进行管理。它负责与资源管理器通信，并对分布式事务做出最终的提交或回滚决策。在 Java/JEE 中，全局事务通过 Java 事务 API（JTA）实现。JTA
  为事务管理器和参与事务的组件提供了标准接口。


  事务管理器采用“两阶段提交”协议来协调全局事务。正如其名所示，两阶段提交协议包含两个阶段：


  *   **准备阶段**：在此阶段，所有参与的资源管理器会被询问是否准备好提交其工作。收到请求后，资源管理器尝试记录其状态。如果成功，资源管理器会返回肯定响应；如果无法提交，则返回否定响应并撤销本地更改。


  *   **提交阶段**：如果事务管理器收到所有肯定响应，它将提交事务并通知所有提交参与者。如果收到一个或多个否定响应，它将回滚整个事务并通知所有参与者。


  两阶段提交协议如图 9-1 所示。


  ![](img/319409_2_En_9_Fig1_HTML.jpg)


  2 个请求-响应图。准备阶段和提交阶段各包含一个事务管理器和 2 个资源管理器。事务管理器向每个资源管理器发送准备请求，资源管理器将准备响应返回给事务管理器。


