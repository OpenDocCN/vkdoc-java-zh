  ### Not Filter


  `NotFilter`用于检索不符合特定条件的条目。在“LikeFilter”部分，你查看了检索所有以 Ja 开头的条目。现在，假设你想检索所有不以***Ade***开头的条目。这时`NotFilter`就派上用场了。以下是实现此需求的代码：


