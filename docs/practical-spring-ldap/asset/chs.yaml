  \ %03d %04d\", areaCode, exchange, extension);\n}\n// 满足 hashCode 协议\npublic int\
  \ hashCode() {\nint result = 17;\nresult = 37 * result + areaCode;\nresult = 37\
  \ * result + exchange;\nresult = 37 * result + extension;\nreturn result;\n}\n}\n\
  列表 8-11\n包含所有属性的 PhoneNumber 类\n```\n\n现在，让我们修改`Patron`类，如列表 8-12 所示。\n\n```\npackage\
  \ com.apress.book.ldap.custom;\nimport java.util.List;\nimport javax.naming.Name;\n\
  import org.springframework.ldap.odm.annotations.Attribute;\nimport org.springframework.ldap.odm.annotations.Entry;\n\
  import org.springframework.ldap.odm.annotations.Id;\n@Entry(objectClasses = { \"\
  inetorgperson\", \"organizationalperson\", \"person\", \"top\" })\npublic class\
  \ Patron {\n@Id\nprivate Name dn;\n@Attribute(name = \"sn\")\nprivate String lastName;\n\
  @Attribute(name = \"givenName\")\nprivate String firstName;\n@Attribute(name = \"\
  telephoneNumber\")\nprivate PhoneNumber phoneNumber;\n@Attribute(name = \"cn\")\n\
  private String fullName;\nprivate String mail;\n@Attribute(name = \"objectClass\"\
  )\nprivate List objectClasses;\n@Attribute(name = \"employeeNumber\", syntax = \"\
  2.16.840.1.113730.3.1.3\")\nprivate int employeeNumber;\n// 字段和设置器、获取器\n@Override\n\
  public String toString() {\nreturn \"Dn: \" + dn + \", firstName: \" + firstName\
  \ + \", fullName: \" + fullName + \", 电话号码: \" + phoneNumber;\n}\n}\n列表 8-12\n包含电话号码修改的\
  \ Patron 实体\n```\n\n为了将`PhoneNumber`转换为`String`，你需要创建一个新的`FromPhoneNumberConverter`转换器。列表\
  \ 8-13 展示了其实现。实现过程非常简单，只需调用`toString`方法完成转换。\n\n```\npackage com.apress.book.ldap.converter;\n\
  import com.apress.book.ldap.custom.PhoneNumber;\nimport org.springframework.ldap.odm.typeconversion.impl.Converter;\n\
  public class FromPhoneNumberConverter implements Converter  {\n@Override\npublic\
  \  T convert(Object source, Class toClass) throws Exception {\nT result = null;\n\
  if(PhoneNumber.class.isAssignableFrom(source.getClass()) && toClass.equals(String.class))\
  \ {\nresult = toClass.cast(source.toString());\n}\nreturn result;\n}\n}\n列表 8-13\n\
  从 PhoneNumber 对象到 String 的转换器\n```\n\n接下来，你需要实现一个转换器，将 LDAP 字符串属性转换为 Java`PhoneNumber`类型。为此，你需要在同一包中创建`ToPhoneNumberConverter`，如列表\
  \ 8-14 所示。\n\n```\npackage com.apress.book.ldap.converter;\nimport com.apress.book.ldap.custom.PhoneNumber;\n\
  import org.springframework.ldap.odm.typeconversion.impl.Converter;\npublic class\
  \ ToPhoneNumberConverter implements Converter {\n@Override\npublic  T convert(Object\
  \ source, Class toClass) throws Exception {\nT result = null;\nif (String.class.isAssignableFrom(source.getClass())\
  \ && toClass == PhoneNumber.class) {\n// 简单的实现\nString[] tokens = ((String)source).split(\"\
  \ \");\nint i = 0;\nif(tokens.length == 4) {\ni = 1;\n}\nresult = toClass.cast(new\
  \ PhoneNumber(Integer.parseInt(tokens[i]), Integer.parseInt(tokens[i+1]), Integer.parseInt(tokens[i+2])));\n\
  }\nreturn result;\n}\n}\n列表 8-14\n从 String 到 PhoneNumber 的转换器\n```\n\n由于`LDAPTemplate`取代了`OdmManager`，许多内容发生了变化，因此要使用这些转换器，一种替代方案是创建`ConverterManager`的新实现以简化配置过程。列表\
  \ 8-15 展示了`DefaultConverterManagerImpl`类。如你所见，它内部使用了`ConverterManagerImpl`类。\n\n\
  ```\npackage com.apress.book.ldap.converter;\nimport com.apress.book.ldap.custom.PhoneNumber;\n\
  import org.springframework.ldap.odm.typeconversion.ConverterManager;\nimport org.springframework.ldap.odm.typeconversion.impl.Converter;\n\
  import org.springframework.ldap.odm.typeconversion.impl.ConverterManagerImpl;\n\
  import org.springframework.ldap.odm.typeconversion.impl.converters.FromStringConverter;\n\
  import org.springframework.ldap.odm.typeconversion.impl.converters.ToStringConverter;\n\
  public class DefaultConverterManagerImpl implements ConverterManager {\nprivate\
  \ static final Class[] classSet = {\njava.lang.Byte.class,\njava.lang.Integer.class,\n\
  java.lang.Long.class,\njava.lang.Double.class,\njava.lang.Boolean.class};\nprivate\
  \ ConverterManagerImpl converterManager;\npublic DefaultConverterManagerImpl() {\n\
  converterManager = new ConverterManagerImpl();\nConverter fromStringConverter =\
  \ new FromStringConverter();\nConverter toStringConverter = new ToStringConverter();\n\
  for(Class clazz : classSet) {\nconverterManager.addConverter(String.class, null,\
  \ clazz, fromStringConverter);\nconverterManager.addConverter(clazz, null, String.class,\
  \ toStringConverter);\n}\nConverter toPhoneNumberConverter = new ToPhoneNumberConverter();\n\
  converterManager.addConverter(String.class, null, PhoneNumber.class, toPhoneNumberConverter);\n\
  Converter fromPhoneNumberConverter = new FromPhoneNumberConverter();\nconverterManager.addConverter(PhoneNumber.class,\
  \ null, String.class, fromPhoneNumberConverter);\n}\n@Override\npublic boolean canConvert(Class\
  \ fromClass, String syntax, Class toClass) {\nreturn converterManager.canConvert(fromClass,\
  \ syntax, toClass);\n}\n@Override\npublic  T convert(Object source, String syntax,\
  \ Class toClass) {\nreturn converterManager.convert(source,syntax,toClass);\n}\n\
  }\n列表 8-15\n新的转换器管理器\n```\n\n最后，在配置中整合所有内容，创建一个名为`repositoryContext-test-converter.xml`的新文件，位于**src/test/resources**目录下，如列表\
