  `notPresentFilter`的编码版本会生成表达式`!(email=*)`。运行`searchAndPrintResults`方法会生成列表 6-7 中所示的输出。第一个空值对应组织单位条目`"ou=patrons,dc=inflinx,dc=com"`。


