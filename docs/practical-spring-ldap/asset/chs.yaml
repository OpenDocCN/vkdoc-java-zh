  \ MathService 的类，该类将被模拟。列表 4-5 展示了一个调用服务相同方法的类。\n\n```\npublic class Calculator\
  \ {\nprivate final MathService service;\npublic Calculator(MathService service)\
  \ {\nthis.service = service;\n}\npublic int add(int numberOne, int numberTwo){\n\
  return service.add(numberOne, numberTwo);\n}\n}\nListing 4-5\n调用其他类的服务类\n```\n\n\
  在创建任何测试并生成模拟对象之前，必须添加与 JUnit 5 兼容的依赖项，如列表 4-6 所示。\n\n```\norg.mockito\nmockito-junit-jupiter\n\
  ${mockito-junit-jupiter.version}\ntest\n\norg.mockito\njunit-jupiter\n${mockito-junit-jupiter.version}\n\
  test\n\nListing 4-6\n必须包含在 POM 文件中的 Mockito 依赖项\n```\n\n最后一步是创建一个模拟 MathService\
  \ 类的测试，因为您只想测试 Calculator 类的行为。列表 4-7 展示了上下文定义和一个简单测试。\n\n```\nimport org.junit.jupiter.api.BeforeEach;\n\
  import org.junit.jupiter.api.DisplayName;\nimport org.junit.jupiter.api.Test;\n\
  import static org.junit.jupiter.api.Assertions.assertEquals;\nimport static org.mockito.Mockito.*;\n\
  @DisplayName(\"Calculator 测试用例\")\nclass CalculatorTest {\nprivate MathService mathService;\n\
  private Calculator calculator;\n@BeforeEach\npublic void setUp() {\nmathService\
  \ = mock(MathService.class); // 该类是一个模拟对象\ncalculator = new Calculator(mathService);\n\
  }\n@Test\n@DisplayName(\"检查两个数字的求和是否正常\")\nvoid should_sum_two_numbers() {\n// Given\
  \ - 创建模拟对象\nwhen(mathService.add(1, 4)).thenReturn(5);\n// When - 执行操作\nint result\
  \ = calculator.add(1, 4);\n// Then - 验证结果和与模拟对象的交互\nverify(mathService).add(1, 4);\n\
  assertEquals(5, result);\n}\n}\nListing 4-7\n使用 Mockito 的简单测试\n```\n\n如您在列表 4-7\
  \ 中看到的，有一些静态方法如 when、mock 和 verify，这些方法是 Mockito 的特性，不仅用于创建模拟对象，还用于验证模拟对象是否在测试中被使用。\n\
  \n表 4-2 列出了一些 Mockito 中重要的方法。\n\nTable 4-2\n\nMockito 方法\n\n| 方法 | 描述 |\n| --- |\
  \ --- |\n| mock | 此方法为特定类创建一个模拟对象，拦截所有调用，并允许您更改类的行为。 |\n| verify | 此方法可帮助您检查特定参数的模拟对象是否被调用。这对于理解逻辑是否正常运行非常有用。\
  \ |\n| any | 您可以使用此方法表示希望模拟对象接收任何值，从而激活新行为。 |\n| doThrow | 您可以使用此方法在模拟对象被调用时特定条件下抛出异常。\
  \ |\n| when/given | 您可以使用此方法指定调用模拟对象所需的条件。 |\n\n请注意，该表仅展示了在测试中需要使用的最相关注解，Mockito\
  \ 官方网站上还有许多其他注解。^(⁶⁵)\n\n### Testcontainers\n\nTestcontainers^(⁶⁶) 是一个轻量级且开源的库，允许您在应用程序中运行不同容器并复用不同的测试用例。该库支持多种测试框架，如不同版本的\
  \ JUnit 和 Spock，您可以在 Java 或 Kotlin 项目中使用它。\n\n这些容器可以是您的应用程序所需的数据库或其他服务；例如，如果您的应用程序需要使用\
  \ AWS 的特定服务，可以使用 LocalStack 的镜像。^(⁶⁷) Testcontainers 开发了一组模块^(⁶⁸)，以降低运行容器和配置特定镜像的复杂性；例如，存在针对最受欢迎数据库和队列的模块。\n\
  \n在后台，此库使用 Docker^(⁶⁹) 下载并运行不同容器，因此在使用项目之前，请检查与库所需 Docker 版本相关的通用要求。^(⁷⁰) 此外，自 2020\
  \ 年 11 月起，Docker Hub 对仓库中的不同镜像引入了下载次数等限制，但开源项目不受这些限制影响，因为其理念是让 Docker Hub 作为中央仓库。请注意，如果您在流水线中使用此库，运行的机器也需要满足相同的条件。\n\
  \n在创建任何使用容器的测试之前，必须添加与 JUnit 5 兼容的依赖项，如列表 4-8 所示。\n\n```\norg.testcontainers\ntestcontainers\n\
  ${testcontainers.version}\ntest\n\norg.testcontainers\njunit-jupiter\n${testcontainers.version}\n\
  test\n\nListing 4-8\n必须包含在 POM 文件中的 Testcontainers 依赖项\n```\n\n完成上述步骤后，让我们创建一个简单的测试，仅运行一个简单的\
  \ hello-world 镜像，如列表 4-9 所示。\n\n```\nimport org.junit.jupiter.api.DisplayName;\n\
  import org.junit.jupiter.api.Test;\nimport org.testcontainers.containers.GenericContainer;\n\
  import org.testcontainers.junit.jupiter.Container;\nimport org.testcontainers.junit.jupiter.Testcontainers;\n\
  import org.testcontainers.utility.DockerImageName;\n@Testcontainers\n@DisplayName(\"\
  Hello world 容器测试用例\")\nclass HelloWorldContainerTest {\n@Container\npublic static\
  \ GenericContainer container = new GenericContainer(DockerImageName.parse(\"testcontainers/helloworld\"\
  ));\n@Test\n@DisplayName(\"检查测试和容器是否正常运行\")\nvoid should_works_the_container() {\n\
  }\n}\nListing 4-9\n在测试中使用的容器声明\n```\n\n如您所见，列表 4-9 包含了一个名为 @Testcontainers 的新注解，该注解负责在测试执行期间管理容器的生命周期。此外，测试中还有一个名为\
  \ @Container 的注解，表示您声明的变量需要 Testcontainers 运行容器。如果您在终端运行 **mvn test** 命令，将在日志中看到类似以下内容：\n\
  \n```\n11:10:21.531 [main] INFO org.testcontainers.DockerClientFactory - 连接到 docker:\n\
  服务器版本: 23.0.5\nAPI 版本: 1.42\n操作系统: Docker Desktop\n总内存: 7579 MB\n11:10:21.539 [main]\
  \ DEBUG org.testcontainers.utility.RyukResourceReaper - Ryuk 已启用\n11:10:21.541 [main]\
  \ DEBUG org.testcontainers.utility.PrefixingImageNameSubstitutor - 未配置前缀\n11:10:21.541\
  \ [main] DEBUG org.testcontainers.utility.ImageNameSubstitutor - 未找到 testcontainers/ryuk:0.5.1\
  \ 的替代镜像（使用镜像替换器: DefaultImageNameSubstitutor（由 'ConfigurationFileImageNameSubstitutor'\
  \ 和 'PrefixingImageNameSubstitutor' 组成））\n```\n\n\n\n之前的日志表明，**Testcontainers**\
  \ 与 **Docker** 连接，使用 **testcontainers/ryuk** 镜像，该镜像将包含你在不同测试中使用的所有容器。因此，使用这个库，你将在\
  \ **Docker** 中运行 **Docker**，正因如此，你可以在不同测试之间选择共享或不共享同一个数据库容器。图 4-2 展示了执行测试时 TestContainers\
  \ 的工作方式。\n\n![](img/319409_2_En_4_Fig2_HTML.jpg)\n\n一个流程图，从连接 Docker 的测试容器开始，然后结束。\n\
  \n图 4-2\n\n容器的执行流程\n\n请注意，这种方法比前一种方法耗时更长，因为你运行的是真实的 LDAP 供应商。\n\n## 创建测试\n\n在简要介绍了不同的测试概念之后，是时候详细了解一下那些能帮助你在项目中创建不同类型测试的库了。为此，请使用第\
  \ 3 章中的相同命令来创建一个名为 chapter4 的新项目：\n\n```\n$ mvn archetype:generate \\\n-DarchetypeGroupId=com.apress.book.ldap\
  \ \\\n-DarchetypeArtifactId=practical-ldap-empty-archetype \\\n-DarchetypeVersion=1.0.0\
  \ \\\n-DgroupId=com.apress.book.ldap \\\n-DartifactId=chapter4 \\\n-DinteractiveMode=false\n\
  ```\n\n注意\n\n在后续章节中，将仅提及此指令，以避免在每个章节中重复相同的句子。\n\n让我们创建一个简单的应用程序，用于访问 LDAP 并执行常见操作，例如获取所有元素、添加、删除或修改元素。首先，你需要创建一个代表\
  \ Patron 的对象，因此创建一个如清单 4-10 所示的领域类；该类并未包含 LDAP 中可能存在的所有属性，但足以展示如何创建测试。\n\n```\n\
  public class Patron {\nprivate String uid;\nprivate String firstName;\nprivate String\
  \ lastName;\nprivate String commonName;\nprivate String email;\npublic Patron()\
  \ {\n}\npublic Patron(String uid, String firstName, String lastName, String commonName,\
  \ String email) {\nthis.uid = uid;\nthis.firstName = firstName;\nthis.lastName =\
  \ lastName;\nthis.commonName = commonName;\nthis.email = email;\n}\n// Setters and\
  \ getters\n}\n清单 4-10\n表示 LDAP 上对象的领域类\n```\n\n下一步是创建一个类，其中包含与第 3 章示例大致相似的所有操作。不过，其理念不是将所有内容硬编码到不同的方法中，而是创建动态方法，通过参数接收执行特定操作所需的值。\n\
  \n```\n@Component\npublic class LdapOperationsClient {\nprivate LdapTemplate ldapTemplate;\n\
  public LdapOperationsClient(@Autowired @Qualifier(\"ldapTemplate\") LdapTemplate\
  \ ldapTemplate) {\nthis.ldapTemplate = ldapTemplate;\n}\npublic void add(String\
  \ id, Patron patron) {\n// 设置 Patron 属性\nAttributes attributes = new BasicAttributes();\n\
  attributes.put(\"sn\", patron.getLastName());\nattributes.put(\"givenName\", patron.getFirstName());\n\
  attributes.put(\"cn\", patron.getCommonName());\nattributes.put(\"mail\", patron.getEmail());\n\
  // 添加多值属性\nBasicAttribute objectClassAttribute = new BasicAttribute(\"objectclass\"\
  );\nobjectClassAttribute.add(\"top\");\nobjectClassAttribute.add(\"person\");\n\
  objectClassAttribute.add(\"organizationalperson\");\nobjectClassAttribute.add(\"\
  inetorgperson\");\nattributes.put(objectClassAttribute);\nldapTemplate.bind(\"uid=\"\
  \ + id + \",ou=patrons,dc=inflinx,dc=com\", null, attributes);\n}\npublic void updateEmail(String\
  \ uid, String mail) {\nAttribute attribute = new BasicAttribute(\"mail\", mail);\n\
  ModificationItem item = new ModificationItem(DirContext.REPLACE_ATTRIBUTE, attribute);\n\
  ldapTemplate.modifyAttributes(\"uid=\" + uid + \",ou=patrons,dc=inflinx,dc=com\"\
  , new ModificationItem[] { item });\n}\npublic void remove(String uid) {\nldapTemplate.unbind(\"\
  uid=\" + uid + \",ou=patrons,dc=inflinx,dc=com\");\n}\npublic List search() {\n\
  return ldapTemplate.search(\"dc=inflinx,dc=com\", \"(objectclass=person)\", (AttributesMapper)\
  \ attributes -> {\nPatron patron = new Patron();\npatron.setUid((String) attributes.get(\"\
  uid\").get());\npatron.setFirstName((String) attributes.get(\"givenName\").get());\n\
  patron.setLastName((String) attributes.get(\"sn\").get());\npatron.setEmail((String)\
  \ attributes.get(\"mail\").get());\npatron.setCommonName((String) attributes.get(\"\
  cn\").get());\nreturn patron;\n});\n}\n}\n清单 4-11\n表示 LDAP 上对象的领域类\n```\n\n仅这两个类就足以创建使用\
  \ Mockito 进行模拟、嵌入式服务器或 Testcontainers 的不同测试场景。\n\n### 模拟模板\n\n这种方法是最简单的，因为它不要求你运行整个应用程序来测试某些功能是否正常。你可以将这类测试视为单元测试，因为你只想测试自己的类，而不使用或检查其他类的情况。对于清单\
  \ 4-11 中的情况，你需要模拟 `LdapTemplate`，并仅检查你的逻辑。在清单 4-12 中，我们在模板上创建了一个模拟，以模拟你在测试中想要的任何响应。\n\
  \n```\nimport com.apress.book.ldap.domain.Patron;\nimport org.junit.jupiter.api.BeforeEach;\n\
  import org.junit.jupiter.api.DisplayName;\nimport org.junit.jupiter.api.Test;\n\
  import org.springframework.ldap.core.AttributesMapper;\nimport org.springframework.ldap.core.LdapTemplate;\n\
  import javax.naming.directory.Attributes;\nimport javax.naming.directory.BasicAttributes;\n\
  import java.util.ArrayList;\nimport java.util.List;\nimport static org.junit.jupiter.api.Assertions.*;\n\
  import static org.mockito.ArgumentMatchers.*;\nimport static org.mockito.Mockito.mock;\n\
  import static org.mockito.Mockito.when;\n@DisplayName(\"使用模拟的 LDAP 操作测试\")\npublic\
  \ class LdapOperationsClientMockTest {\nLdapOperationsClient client;\nLdapTemplate\
  \ ldapTemplate;\n@BeforeEach\npublic void setup() {\nldapTemplate = mock(LdapTemplate.class);\n\
  this.client = new LdapOperationsClient(ldapTemplate);\n}\n//Tests\n}\n清单 4-12\n\
  使用模拟的测试类\n```\n\n注意\n\nMockito 库并非原型的一部分，因此你需要手动添加它。\n\n下一步是创建测试，这些测试使用我们类的模拟，并在尝试搜索\
  \ LDAP 并将结果转换为 Patron 对象时返回一个元素。清单 4-13 展示了如何通过仅模拟对 LDAP 的访问来为某些操作创建测试。\n\n```\n\
  @Test\n@DisplayName(\"检查搜索操作是否返回一个 patron\")\npublic void should_return_patrons()\
  \ {\nAttributes attribute = new BasicAttributes();\nattribute.put(\"sn\", \"Sacco\"\
  );\nattribute.put(\"givenName\", \"Andres\");\nList attributes = new ArrayList();\n\
  attributes.add(attribute);\n//模拟响应\nwhen(ldapTemplate.search(anyString(), anyString(),\
  \ any(AttributesMapper.class))).thenReturn(attributes);\nList patrons = client.search();\n\
  assertAll(() -> assertNotNull(patrons), () -> assertEquals(1, patrons.size()));\n\
  }\n清单 4-13\n使用模拟的测试类\n```\n\n如果你使用 IDE 或从控制台运行这些测试，一切都会正常。可以想象，这种方法对于检查某些业务逻辑来说很棒，但缺点是，你无法测试一切是否按照你在\
  \ LDAP 上预期的方式发生；因此，你需要使用服务器创建一个集成测试。\n\n\n\n### 使用嵌入式服务器进行测试\n\nApacheDS、^(⁷¹) OpenDJ、^(⁷²)\
  \ 和 UnboundID^(⁷³) 是开源的 LDAP 目录，可以嵌入到 Java 应用程序中。嵌入式目录是应用程序 JVM 的一部分，使得自动化任务（如启动和关闭）变得简单。它们启动时间短且通常运行速度快。嵌入式目录还消除了为每个开发人员或构建机器单独维护\
  \ LDAP 服务器的需求。\n\n过去，嵌入 LDAP 服务器需要手动创建并启动/停止服务器，但多年前随着 Spring 和 JUnit 新版本的推出，这一责任被委托给框架处理。这种方法是最推荐的，但如果你想管理嵌入\
  \ LDAP 服务器的生命周期，可以在每次测试执行时添加启动和停止的逻辑。\n\n在 Spring LDAP 的情况下，你可以使用两种不同的嵌入式服务器替代方案，分别基于\
  \ ApacheDS^(⁷⁴) 或 UnboundID.^(⁷⁵) 在本书中，我们将使用第二种方案，因为 Spring 不支持 ApacheDS 的最新版本，而\
  \ UnboundID 对供应商无依赖。\n\n注意\n\nOpenDJ 在该供应商的旧版本中包含嵌入式服务器，但该功能几年前已被弃用。在源代码中，你会看到这些类仍然存在，但如果你有遗留应用程序需要进行测试，仍需注意这一点。\n\
  \n在引入嵌入式服务器概念后，现在需要修改 pom 文件并添加依赖项。清单 4-14 显示了需要包含的不同库。\n\n```\norg.springframework\n\
  spring-test\n${org.springframework.version}\ntest\n\norg.springframework.ldap\n\
  spring-ldap-test\n${org.springframework.ldap.version}\ntest\n\ncom.unboundid\nunboundid-ldapsdk\n\
  ${unboundid-ldapsdk.version}\ntest\n\n清单 4-14\n使用嵌入式服务器的依赖项\n```\n\n接下来，你需要创建一个包含所有配置的文件，放在\
  \ **src/test/resources** 目录下。让我们从清单 4-15 中显示的基本配置开始。\n\n```\n\n清单 4-15\n应用程序配置\n\
  ```\n\n现在需要添加修改以创建嵌入式服务器并在启动时填充相同的信息。清单 4-16 设置了基本配置并加载了 **patrons.ldif** 文件，你需要将该文件包含在项目\
  \ **src/test/resources** 目录中。所有这些操作都是为了在 LDAP 中填充基本信息以测试不同的操作。\n\n```\n\n清单 4-16\n\
  嵌入式服务器配置\n```\n\n需要考虑的是，每次执行测试时服务器都会被重新创建，因此如果你对 LDAP 中的信息进行了修改，不会影响使用相同数据的其他测试。\n\
  \n在完成所有配置后，最后的任务是创建一个简单的测试，验证搜索方法是否正常工作并返回 Patrons 列表，如清单 4-17 所示。\n\n```\n@ExtendWith(SpringExtension.class)\n\
  @ContextConfiguration(\"classpath:repositoryContext-test.xml\")\n@DisplayName(\"\
  使用嵌入式 LDAP 的 LDAP 操作测试\")\npublic class LdapOperationsClientEmbbededTest {\n@Autowired\n\
  LdapOperationsClient client;\n@Test\n@DisplayName(\"检查搜索操作是否返回 Patrons\")\npublic\
  \ void should_return_patrons() {\nList patrons = client.search();\nassertAll(()\
  \ -> assertNotNull(patrons), () -> assertEquals(100, patrons.size()));\n}\n}\n清单\
  \ 4-17\n使用嵌入式服务器的简单测试\n```\n\n如果你运行此测试，一切都会正常工作。如果你在同一类中创建多个测试，每次执行测试时服务器都会重新加载信息。\n\
  \n### 迁移到 Testcontainers 测试\n\n在创建了验证 LDAP 逻辑是否正确的测试后，下一步是使用与前几章运行源代码相同的版本的容器替换嵌入式服务器，以使用真实的\
  \ LDAP 服务器。\n\n正如上一节所示，使用嵌入式 LDAP 进行测试非常简单，因此你可能会想：“为什么还要使用 Testcontainers 而不是嵌入式？”\
  \ 这个问题的答案很简单，因为使用嵌入式 LDAP 存在一些问题：\n\n*   并非所有供应商都提供嵌入式选项，因此你的测试可能正常运行，但在真实环境中可能会导致逻辑失败。\n\
  \n*   嵌入式 LDAP 不支持某些供应商的所有版本；例如，在 ApacheDS 的情况下，你只能使用到 1.5.5 的版本，因此这个问题看起来与上一个问题类似。\n\
  \n使用 Testcontainers 并不意味着一切都完美，因为它意味着测试执行需要一些时间，直到容器启动并处于健康状态才能用于测试。\n\n现在开始创建使用\
  \ Testcontainers 的测试；对于 LDAP，没有特定的模块简化配置过程，但你可以运行一个 Docker-compose 文件，如清单 4-18 所示。请记住创建名为\
  \ **docker-compose.yml** 的文件，并将其放入 **src/tests/resources** 文件夹中。\n\n```\nversion:\
  \ '3.0'\nservices:\nopendj:\nimage: openidentityplatform/opendj:4.5.9\nports:\n\
  - 18880:1389\nenvironment:\n- ROOT_USER_DN=uid=admin,ou=system\n- ROOT_PASSWORD=secret\n\
  - BASE_DN=dc=inflinx,dc=com\n清单 4-18\n包含 LDAP 配置的简单 docker-compose 文件\n```\n\n下一步是复制清单\
  \ 4-15 和 4-16 中的文件，并将其重命名为 ***repositoryContext-testcontainers.xml*** 以与其他配置区分开，同时移除与嵌入式服务器配置相关的部分。\n\
  \n最后一步是创建运行清单 4-18 中定义的文件的测试。为此，你需要使用库核心中的 ***DockerComposeContainer*** 类。清单 4-19\
  \ 显示了如何配置 Testcontainers 并等待 LDAP 准备好接收请求。\n\n```\nimport com.apress.book.ldap.domain.Patron;\n\
  import org.junit.jupiter.api.Test;\nimport org.junit.jupiter.api.extension.ExtendWith;\n\
  import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.test.context.ContextConfiguration;\n\
  import org.springframework.test.context.junit.jupiter.SpringExtension;\nimport org.testcontainers.containers.DockerComposeContainer;\n\
  import org.testcontainers.containers.wait.strategy.Wait;\nimport org.testcontainers.junit.jupiter.Container;\n\
  import org.testcontainers.junit.jupiter.Testcontainers;\nimport java.io.File;\n\
  import java.util.List;\nimport static org.junit.jupiter.api.Assertions.*;\n@Testcontainers\n\
  @ExtendWith(SpringExtension.class)\n@ContextConfiguration(\"classpath:repositoryContext-testcontainers.xml\"\
  )\n@DisplayName(\"使用 Testcontainers 的 LDAP 操作测试\")\npublic class LdapOperationsClientContainerTest\
  \ {\n@Container\npublic static DockerComposeContainer ldap = new DockerComposeContainer(\n\
  new File(\"src/test/resources/docker-compose.yml\"))\n.waitingFor(\"opendj_1\",\
  \ Wait.forLogMessage(\".*started*\\\\n\", 1)).withLocalCompose(true);\n@Autowired\n\
  LdapOperationsClient client;\n@Test\n@DisplayName(\"检查删除操作是否正常工作\")\npublic void\
  \ should_return_patrons() {\nList patrons = client.search();\nassertAll(() -> assertNotNull(patrons),\
  \ () -> assertEquals(100, patrons.size()));\n}\n}\n清单 4-19\n使用 Testcontainers 的测试示例\n\
  ```\n\n\n\n如果你运行这个特定的测试，直到收到一切正常确认信息可能需要几秒钟，因为 LDAP 容器需要一些时间才能准备就绪。这是检查你的代码是否与特定供应商和版本兼容的好方法。\n\
  \n## 总结\n\n在本章中，你深入探讨了 LDAP 代码的测试。你首先了解了测试概念的概述，然后花时间设置 UnboundID 进行嵌入式测试。虽然嵌入式测试简化了流程，但有时你希望测试代码，以尽量减少对外部基础设施的依赖，但请记住，如果你想确保源代码中的所有内容都正常工作，Testcontainers\
  \ 是最佳选择。\n\n在下一章中，你将学习如何创建与 LDAP 交互的数据访问对象（DAO），使用对象工厂。\n\n脚注 1   2   3   4   5\
