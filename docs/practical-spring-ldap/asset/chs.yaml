  ### HardcodedFilter


  `HardcodedFilter` 是一个便捷类，使在构建搜索过滤器时添加静态过滤器文本变得简单。假设你正在开发一个允许管理员在文本框中输入搜索表达式的管理应用程序。如果你想将此表达式与其他过滤器结合进行搜索，可以使用
  `HardcodedFilter`，如以下示例所示：


  ```

  String searchExpression = "(sn=Aguirre)";

  AndFilter filter = new AndFilter();

  filter.and(new HardcodedFilter(searchExpression));

  filter.and(new EqualsFilter("givenName", "Aggie"));

  ```


  在此代码中，`searchExpression` 变量包含用户输入的搜索表达式。当搜索过滤器的静态部分来自属性文件或配置文件时，`HardcodedFilter`
  也非常有用。需要注意的是，此过滤器不会对传入的文本进行编码，因此在处理用户输入时要格外谨慎。


  此 `HardcodedFilter` 将检索同时满足两个表达式的用户。`encode` 方法返回表达式 `(&(sn=Aguirre)(givenName=Aggie))`。`HardcodedFilter`
  的测试用例如列表 6-13 所示。


