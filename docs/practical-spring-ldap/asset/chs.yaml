- "# 8. 对象-目录映射\n\n企业 Java 开发者使用面向对象（OO）技术来构建模块化、复杂的应用程序。在 OO 范式中，对象是系统的核心，代表现实世界中的实体。每个对象都有身份、状态和行为。对象可以通过继承或组合与其他对象相关联。另一方面，LDAP\
  \ 目录以层次树结构表示数据和关系。这种差异导致了对象-目录范式的不匹配，可能在面向对象环境和目录环境之间造成通信问题。\n\nSpring LDAP 提供了一个对象-目录映射（ODM）框架，该框架弥合了对象模型和目录模型之间的差距。ODM\
  \ 框架允许我们在两个模型之间映射概念，并协调将 LDAP 目录条目自动转换为 Java 对象的过程。ODM 与连接对象和关系数据库世界的对象-关系映射（ORM）方法类似。诸如\
  \ Hibernate^(⁸⁰)和 TopLink^(⁸¹)等框架使 ORM 流行起来，并成为开发者工具集的重要组成部分。此外，像 Spring Data^(⁸²)这样的其他框架使用\
  \ Hibernate 在后台实现，并提供相同的功能来访问数据库。\n\n尽管 Spring LDAP ODM 与 ORM 共享相同的概念，但它有以下不同之处：\n\
  \n*   默认情况下无法缓存 LDAP 条目，但可以使用 Caffeine、Guava 或 EhCache 等库来封装访问 LDAP 的逻辑。\n*   ODM\
  \ 元数据通过类级别的注解表达。\n*   不支持 XML 配置。\n*   无法实现条目的懒加载。\n*   不支持如 HQL 之类的查询语言。对象的加载通过\
  \ DN 查找和标准 LDAP 搜索查询完成，或者可以使用 Spring LDAP 提供的方法编写查询。\n\n\n\n## Spring ODM 基础\n\n\
  Spring LDAP ODM 作为独立模块从核心 LDAP 项目中分发。要将 Spring LDAP ODM^(⁸³)包含到项目中，需要在项目`pom.xml`文件中添加以下依赖项：\n\
  \n```\norg.springframework.ldap\nspring-ldap-odm\n${org.springframework.ldap.version}\n\
  \ncommons-logging\ncommons-logging\n\n```\n\nSpring LDAP ODM 通过`org.springframework.ldap.odm`包及其子包提供访问。\n\
  \n上述依赖项是执行任何操作并使用 ODM 优势所必需的，但在不同版本的 Spring LDAP 中，执行不同操作的方式从使用`OdmManager`类转变为使用`LdapTemplate`类。\n\
  \n注意\n\n在 Spring LDAP 2.0.0 版本之前，操作是通过`OdmManager`类和一些注解来执行的，这些注解用于指示哪个属性代表 LDAP\
  \ 上的属性。图 8-1 展示了在 Spring LDAP 2.0.0 之前使用的类结构。\n\n![](img/319409_2_En_8_Fig1_HTML.jpg)\n\
  \nLDAP ODM 核心类的框架结构。部分模块包括 odm manager impl factory bean、converter manager impl、接口\
  \ odm manager、converter manager 和 converter。\n\n图 8-1\n\n之前的 Spring LDAP ODM 核心类\n\
  \nLDAP ODM 的核心是`OdmManager`，它提供了通用的搜索和 CRUD 操作。它充当中介，将 LDAP 条目与 Java 对象之间进行数据转换。Java\
  \ 对象通过注解提供转换元数据。在列表 8-1 中，你可以看到`OdmManager`的源代码及其所有方法。\n\n```\npackage org.springframework.ldap.odm.core;\n\
  import java.util.List;\nimport javax.naming.Name;\nimport javax.naming.directory.SearchControls;\n\
  import org.springframework.ldap.query.LdapQuery;\npublic interface OdmManager {\n\
  T read(Class clazz, Name dn);\nvoid create(Object entry);\nvoid update(Object entry);\n\
  void delete(Object entry);\nList findAll(Class clazz, Name base, SearchControls\
  \ searchControls);\nList search(Class clazz, Name base, String filter, SearchControls\
  \ searchControls);\nList search(Class clazz, LdapQuery query);\n}\n列表 8-1\nOdmManager\
  \ API\n```\n\n如列表 8-2 所示，某些方法接收一个对象；该对象代表我们的领域对象，如 Patron 或 Employee，但带有特定注解以提供\
  \ Spring 执行不同操作所需的元数据。\n\n## ODM 元数据\n\n`org.springframework.ldap.odm.annotations`包包含可用于将简单\
  \ Java POJO 转换为 ODM 可管理实体的注解。列表 8-3 展示了将转换为 ODM 实体的`Patron` Java 类。\n\n```\npackage\
  \ com.apress.book.ldap.domain;\nimport java.util.List;\nimport javax.naming.Name;\n\
  public class Patron {\nprivate Name dn;\nprivate String lastName;\nprivate String\
  \ firstName;\nprivate String telephoneNumber;\nprivate String fullName;\nprivate\
  \ String mail;\nprivate List objectClasses;\nprivate int employeeNumber;\n//Setters\
  \ and getters\n@Override\npublic String toString() {\nreturn \"Dn: \" + dn + \"\
  , firstName: \" + firstName + \", fullName: \" + fullName + \", Telephone Number:\
  \ \" + telephoneNumber;\n}\n}\n列表 8-3\n没有设置方法和获取方法的 Patron 实体\n```\n\n转换过程的第一步是使用`@Entry`注解类。这个标记注解告诉\
  \ ODM 该类是一个实体。它还提供了实体映射的`objectClass`定义。列表 8-4 展示了注解后的`Patron`类。\n\n```\npackage\
  \ com.apress.book.ldap.domain;\nimport java.util.List;\nimport javax.naming.Name;\n\
  import org.springframework.ldap.odm.annotations.Entry;\n@Entry(objectClasses = {\
  \ \"inetorgperson\", \"organizationalperson\", \"person\", \"top\" })\npublic class\
  \ Patron {\n// Fields and getters and setters\n}\n列表 8-4\n声明实体类型的 Patron 实体\n```\n\
  \n接下来需要添加的注解是`@org.springframework.ldap.odm.annotations.Id`。这个注解指定了条目的 DN，并且只能放置在继承自`javax.naming.Name`类的字段上。你将在`Patron`类中创建一个名为`dn`的新字段来解决这个问题。列表\
  \ 8-5 展示了修改后的`Patron`类。\n\n```\npackage com.apress.book.ldap.domain;\nimport java.util.List;\n\
  import javax.naming.Name;\nimport org.springframework.ldap.odm.annotations.Entry;\n\
  import org.springframework.ldap.odm.annotations.Id;\n@Entry(objectClasses = { \"\
  inetorgperson\", \"organizationalperson\", \"person\", \"top\" })\npublic class\
  \ Patron {\n@Id\nprivate Name dn;\n// Fields and getters and setters\n}\n列表 8-5\n\
  声明实体类型和 ID 的 Patron 实体\n```\n\n在 Java 持久化 API 中，`@Id`注解指定了实体 Bean 的`identifier`属性。此外，其放置位置决定了\
  \ JPA 提供者在映射时使用的默认访问策略。如果`@Id`放置在字段上，则使用字段访问；如果放置在获取方法上，则使用属性访问。然而，Spring LDAP ODM\
  \ 仅允许字段访问。\n\n`@Entry`和`@Id`是使`Patron`类成为 ODM 实体所需的唯一注解。默认情况下，`Patron`实体类中的所有字段都会自动变为可持久化字段。默认策略是在持久化或读取时使用实体字段名称作为\
  \ LDAP 属性名称。在`Patron`类中，这适用于`telephoneNumber`或`mail`等属性，因为字段名称与 LDAP 属性名称相同。然而，对于`firstName`和`fullName`等字段，由于其名称与\
  \ LDAP 属性名称不同，会导致问题。为了解决这个问题，ODM 提供了`@Attribute`注解，将实体字段映射到对象类字段。此注解允许你指定 LDAP 属性名称、可选的语法\
  \ OID 以及可选的类型声明。列表 8-6 展示了完全注解的`Patron`实体类。\n\n\n\n```\npackage com.apress.book.ldap.domain;\n\
  import java.util.List;\nimport javax.naming.Name;\nimport org.springframework.ldap.odm.annotations.Attribute;\n\
  import org.springframework.ldap.odm.annotations.Entry;\nimport org.springframework.ldap.odm.annotations.Id;\n\
  @Entry(objectClasses = { \"inetorgperson\", \"organizationalperson\", \"person\"\
  , \"top\" })\npublic class Patron {\n@Id\nprivate Name dn;\n@Attribute(name = \"\
  sn\")\nprivate String lastName;\n@Attribute(name = \"givenName\")\nprivate String\
  \ firstName;\nprivate String telephoneNumber;\n@Attribute(name = \"cn\")\nprivate\
  \ String fullName;\nprivate String mail;\n@Attribute(name = \"objectClass\")\nprivate\
  \ List objectClasses;\n@Attribute(name = \"employeeNumber\", syntax = \"2.16.840.1.113730.3.1.3\"\
  )\nprivate int employeeNumber;\n// 字段和 getter、setter 方法\n@Override\npublic String\
  \ toString() {\nreturn \"Dn: \" + dn + \", firstName: \" + firstName + \", fullName:\
  \ \" + fullName + \", 电话号码: \" + telephoneNumber;\n}\n}\n清单 8-6\n带有属性及其注解的 Patron\
  \ 实体\n```\n\n有时你可能不希望将实体类中的某些字段持久化。通常这些字段涉及计算得出的属性。此类字段可以使用`@Transient`注解进行标注，表示\
  \ ODM 应忽略该字段。\n\n## ODM 服务类\n\n基于 Spring 的企业应用程序通常包含一个服务层，用于存放应用程序的业务逻辑。服务层中的类会将持久化细节委托给\
  \ DAO 或仓库层。在第 5 章中，你使用`LdapTemplate`实现了一个 DAO。清单 8-7 展示了你将要实现的服务类接口。\n\n```\npackage\
  \ com.apress.book.ldap.service;\nimport com.apress.book.ldap.domain.Patron;\npublic\
  \ interface PatronService {\nvoid create(Patron patron);\nvoid delete(String id);\n\
  void update(Patron patron);\nPatron find(String id);\n}\n清单 8-7\nPatron 服务接口\n```\n\
  \n服务类的实现位于清单 8-8 中。在实现中，你注入一个`LdapTemplate`实例。`create`和`update`方法的实现简单地将调用委托给`LdapTemplate`。`find`方法将传入的`id`参数转换为完全限定的\
  \ DN，并委托给`LdapTemplate`的`findByDn`方法。最后，`delete`方法使用`find`方法读取 patron，并通过`LdapTemplate`的`delete`方法删除它。\n\
  \n```\npackage com.apress.book.ldap.service;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.beans.factory.annotation.Qualifier;\nimport org.springframework.ldap.core.DistinguishedName;\n\
  import org.springframework.ldap.core.LdapTemplate;\nimport org.springframework.stereotype.Service;\n\
  import com.apress.book.ldap.domain.Patron;\n@Service(\"patronService\")\npublic\
  \ class PatronServiceImpl implements PatronService {\nprivate static final String\
  \ PATRON_BASE  = \"ou=patrons,dc=inflinx,dc=com\";\nprivate LdapTemplate ldapTemplate;\n\
  public PatronServiceImpl(@Autowired @Qualifier(\"ldapTemplate\") LdapTemplate ldapTemplate)\
  \ {\nthis.ldapTemplate = ldapTemplate;\n}\n@Override\npublic void create(Patron\
  \ patron) {\nldapTemplate.create(patron);\n}\n@Override\npublic void update(Patron\
  \ patron) {\nldapTemplate.update(patron);\n}\n@Override\npublic Patron find(String\
  \ id) {\nDistinguishedName dn = new DistinguishedName(PATRON_BASE);\ndn.add(\"uid\"\
  , id);\nreturn ldapTemplate.findByDn(dn, Patron.class);\n}\n@Override\npublic void\
  \ delete(String id) {\nldapTemplate.delete(find(id));\n}\n}\n清单 8-8\nPatron 服务实现\n\
