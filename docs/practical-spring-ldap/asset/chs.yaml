  ## 总结


  Spring LDAP 框架旨在简化 Java 中的 LDAP 编程。在本章中，你获得了 Spring LDAP 的高层次概述以及与 Spring 框架相关的某些概念。你还查看了使用
  Spring LDAP 进行开发所需的设置。在下一章中，你将专注于测试 Spring LDAP 应用程序。


