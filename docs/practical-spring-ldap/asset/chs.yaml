  ## 实现自定义 DirContext 处理器


  在 Spring LDAP 中，`SortControlDirContextProcessor` 只能对单一 LDAP 属性进行排序。然而 JNDI API 允许你对多个属性进行排序。由于在某些情况下你希望根据多个属性对搜索结果进行排序，让我们实现一个全新的
  `DirContextProcessor` 来支持这一功能。


  正如你所看到的，排序操作需要一个请求控制并会发送一个响应控制。因此，实现此功能的最简单方式是继承 `AbstractFallbackRequestAndResponseControlDirContextProcessor`。清单
  7-9 展示了包含空抽象方法实现的初始代码。你会注意到，这里使用了三个实例变量来保存控制的状态。`sortKeys` 用于保存排序属性名称，`sorted` 和
  `resultCode` 变量则保存从响应控制中提取的信息。


  ```

