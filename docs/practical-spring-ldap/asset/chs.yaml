- "# 5. 高级 Spring LDAP\n\n## JNDI 对象工厂\n\nJNDI 提供了对象工厂的概念，这使得处理 LDAP 信息更加简便。正如其名，对象工厂将目录信息转换为应用程序有意义的对象。例如，对象工厂可以让搜索操作返回像\
  \ `Patron` 或 `Employee` 这样的对象实例，而不是普通的 `javax.naming.NamingEnumeration`。\n\n图 5-1\
  \ 展示了应用程序使用对象工厂执行 LDAP 操作时的流程。流程始于应用程序调用搜索或查找操作。JNDI API 将执行请求的操作并从 LDAP 获取条目。这些结果随后传递给已注册的对象工厂，将其转换为对象。这些对象再被传递给应用程序。\n\
  \n![](img/319409_2_En_5_Fig1_HTML.jpg)\n\nJNDI 或对象工厂流程的示意图。应用程序、JNDI API、LDAP 和对象工厂模块按顺序相互连接。\n\
  \n图 5-1\n\nJNDI/对象工厂流程\n\n处理 LDAP 的对象工厂必须实现 `javax.naming.spi.DirObjectFactory`\
  \ 接口。列表 5-1 展示了一个 `Patron` 对象工厂的实现，它接收传入的信息并创建 `Patron` 实例。`getObjectInstance` 方法的\
  \ `obj` 参数包含有关对象的引用信息。`name` 参数包含对象的名称。`attrs` 参数包含与对象相关的属性。在 `getObjectInstance`\
  \ 中，你读取所需的属性并填充新创建的 `Patron` 实例。\n\n```\npackage com.apress.book.ldap;\nimport java.util.Hashtable;\n\
  import javax.naming.Context;\nimport javax.naming.Name;\nimport javax.naming.directory.Attributes;\n\
  import javax.naming.directory.BasicAttributes;\nimport javax.naming.spi.DirObjectFactory;\n\
  import com.apress.book.ldap.domain.Patron;\npublic class PatronObjectFactory implements\
  \ DirObjectFactory {\n@Override\npublic Object getObjectInstance(Object obj, Name\
  \ name, Context nameCtx, Hashtable environment,\nAttributes attrs) {\nPatron patron\
  \ = new Patron();\npatron.setUid(attrs.get(\"uid\").toString());\npatron.setFullName(attrs.get(\"\
  cn\").toString());\nreturn patron;\n}\n@Override\npublic Object getObjectInstance(Object\
  \ obj, Name name, Context nameCtx, Hashtable environment){\nreturn getObjectInstance(obj,\
  \ name, nameCtx, environment, new BasicAttributes());\n}\n}\n列表 5-1\n如何将对象中的属性映射到实例的示例\n\
  ```\n\n在使用此对象工厂之前，必须在初始上下文创建时进行注册。列表 5-2 展示了在查找操作中使用 `PatronObjectFactory` 的示例。你使用\
  \ `DirContext.OBJECT_FACTORIES` 属性注册 `PatronObjectFactory` 类。请注意，上下文的查找方法现在返回 `Patron`\
  \ 实例。\n\n注意\n\n请记住，附录 C 提供了所有关于配置 LDAP 服务器的信息。\n\n```\npackage com.apress.book.ldap;\n\
  import java.util.Properties;\nimport javax.naming.NamingException;\nimport javax.naming.directory.DirContext;\n\
  import javax.naming.ldap.InitialLdapContext;\nimport javax.naming.ldap.LdapContext;\n\
  import com.apress.book.ldap.domain.Patron;\nimport org.slf4j.Logger;\nimport org.slf4j.LoggerFactory;\n\
  public class JndiObjectFactoryLookupExample {\nprivate static final Logger logger\
  \ = LoggerFactory.getLogger(JndiObjectFactoryLookupExample.class);\nprivate LdapContext\
  \ getContext() throws NamingException {\nProperties environment = new Properties();\n\
  environment.setProperty(DirContext.INITIAL_CONTEXT_FACTORY, \"com.sun.jndi.ldap.LdapCtxFactory\"\
  );\nenvironment.setProperty(DirContext.PROVIDER_URL, \"ldap://localhost:11389\"\
  );\nenvironment.setProperty(DirContext.SECURITY_PRINCIPAL, \"cn=Directory Manager\"\
  );\nenvironment.setProperty(DirContext.SECURITY_CREDENTIALS, \"secret\");\nenvironment.setProperty(DirContext.OBJECT_FACTORIES,\
  \ \"com.apress.book.ldap.PatronObjectFactory\");\nreturn new InitialLdapContext(environment,\
  \ null);\n}\npublic Patron lookupPatron(String dn) {\nPatron patron = null;\ntry\
  \ {\nLdapContext context = getContext();\npatron = (Patron) context.lookup(dn);\n\
  } catch (NamingException e) {\nlogger.error(e.getClass() + \": \" + e.getMessage());\n\
  }\nreturn patron;\n}\npublic static void main(String[] args) {\nJndiObjectFactoryLookupExample\
  \ jle = new JndiObjectFactoryLookupExample();\nPatron p = jle.lookupPatron(\"uid=patron99,ou=patrons,dc=inflinx,dc=com\"\
  );\nlogger.info(p.toString());\n}\n}\n列表 5-2\n执行某些操作的示例\n```\n\n如果你运行前面的示例，将看到以下输出：\n\
  \n```\n11:53:14.630 [main] INFO  c.a.b.l.JndiObjectFactoryLookupExample - Full name:cn:\
  \ Aggie Aguirre\n```\n\n请注意，使用 Spring LDAP 时，之前的示例都没有这种复杂程度。\n\n\n\n## Spring 与对象工厂\n\
  \nSpring LDAP 提供了一个名为 `org.springframework.ldap.core.support.DefaultDirObjectFactory`\
  \ 的开箱即用的 `DirObjectFactory` 实现。正如上一节所展示的，`PatronObjectFactory` 会从找到的上下文中创建 `Patron`\
  \ 实例。类似地，`DefaultDirObjectFactory` 会从找到的上下文中创建 `org.springframework.ldap.core.DirContextAdapter`\
  \ 实例。\n\n`DirContextAdapter` 类是一个通用类，可以视为 LDAP 条目数据的容器。该类提供了多种实用方法，大大简化了属性的获取和设置操作。正如后续章节所示，当对属性进行修改时，`DirContextAdapter`\
  \ 会自动记录这些更改，并简化 LDAP 条目数据的更新操作。`DirContextAdapter` 与 `DefaultDirObjectFactory` 的简单性使您能够轻松地将\
  \ LDAP 数据转换为领域对象，从而减少编写和注册大量对象工厂的需求。\n\n在后续章节中，您将使用 `DirContextAdapter` 创建一个 Employee\
  \ DAO，该 DAO 抽象了对 Employee LDAP 条目的读写访问。\n\n注意\n\n当今大多数 Java 和 JEE 应用程序都会访问持久化存储来执行日常操作。持久化存储的类型从流行的关联系统数据库到\
  \ LDAP 目录，再到遗留的主机系统不等。根据持久化存储的类型，获取和操作数据的机制会存在很大差异。这可能导致应用程序与数据访问代码之间产生紧密耦合，使得在不同实现之间切换变得困难。这就是数据访问对象（DAO）模式可以发挥作用的地方。\n\
  \n数据访问对象是一种流行的核心 JEE 模式，它封装了对数据源的访问。通过 DAO，底层的数据访问逻辑（如连接数据源和操作数据）被清晰地抽象到一个单独的层。DAO\
  \ 的实现通常包括：\n\n1. 一个提供 CRUD 方法契约的 DAO 接口  \n2. 使用特定数据源 API 实现接口的具体类  \n3. DAO 返回的领域对象或传输对象\
  \  \n\n有了 DAO 的支持，应用程序的其余部分无需关注底层数据实现，可以专注于高层次的业务逻辑。\n\n## 使用对象工厂实现 DAO\n\n通常，在\
  \ Spring 应用程序中创建的 DAO 都包含一个作为 DAO 契约的接口和一个包含实际数据存储或目录访问逻辑的实现。清单 5-3 展示了您将实现的 Employee\
  \ DAO 的 `EmployeeDao` 接口。该 DAO 包含用于修改员工信息的 `create`、`update` 和 `delete` 方法，还包含两个查找方法：一个通过\
  \ id 获取员工，另一个返回所有员工。\n\n```\npackage com.apress.book.ldap.repository;\nimport java.util.List;\n\
  import com.apress.book.ldap.domain.Employee;\npublic interface EmployeeDao {\nvoid\
  \ create(Employee employee);\nvoid update(Employee employee);\nvoid delete(String\
  \ id);\nEmployee find(String id);\nList findAll();\n}\nListing 5-3\n包含最相关方法的 DAO\
  \ 定义\n```\n\n之前的 `EmployeeDao` 接口使用了 `Employee` 领域对象。清单 5-4 展示了这个 `Employee` 领域对象。`Employee`\
  \ 实现类包含了图书馆员工的所有基本属性。请注意，这里没有使用完整的 DN，而是使用 `uid` 属性作为对象的唯一标识符。\n\n```\npackage com.apress.book.ldap.domain;\n\
  public class Employee {\nprivate String uid;\nprivate String firstName;\nprivate\
  \ String lastName;\nprivate String commonName;\nprivate String email;\nprivate String\
  \ employeeNumber;\nprivate String[] phone;\n// getters and setters omitted\n}\n\
  Listing 5-4\nEmployee 类的定义\n```\n\n您将从 `EmployeeDao` 的基本实现开始，如清单 5-5 所示。\n\n```\n\
  package com.apress.book.ldap.repository;\nimport java.util.List;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.beans.factory.annotation.Qualifier;\nimport org.springframework.ldap.core.LdapTemplate;\n\
  import com.apress.book.ldap.domain.Employee;\n@Repository(\"employeeDao\" )\npublic\
  \ class EmployeeDaoLdapImpl implements EmployeeDao {\nprivate LdapTemplate ldapTemplate;\n\
  public EmployeeDaoLdapImpl(@Autowired @Qualifier(\"ldapTemplate\") LdapTemplate\
  \ ldapTemplate) {\nthis.ldapTemplate = ldapTemplate;\n}\n@Override\npublic List\
  \ findAll() { return null; }\n@Override\npublic Employee find(String id) { return\
  \ null; }\n@Override\npublic void create(Employee employee) {}\n@Override\npublic\
  \ void delete(String id) {}\n@Override\npublic void update(Employee employee) {}\n\
  }\nListing 5-5\nDAO 实现的默认定义\n```\n\n在这个实现中，您注入了一个 `LdapTemplate` 实例。`LdapTemplate`\
  \ 的实际创建将在外部配置文件中完成。清单 5-6 展示了位于 **src/test/resources** 文件夹中的 `repositoryContext.xml`\
  \ 文件，其中包含 `LdapTemplate` 及相关 bean 的声明。\n\n```\n\nListing 5-6\n应用程序的默认配置\n```\n\n\
  这个配置文件与第 3 章节中看到的类似。您将 LDAP 服务器信息传递给 `LdapContextSource` 以创建 `contextSource` bean。通过将\
  \ base 设置为 `\"ou=employees,dc=inflinx,dc=com\"`，您已将所有 LDAP 操作限制在 LDAP 树的员工分支中。需要特别注意的是，使用此处创建的上下文无法对\
  \ `\"ou=patrons\"` 分支执行搜索操作。如果需要搜索 LDAP 树的所有分支，则 base 属性需要设置为空字符串。\n\n`LdapContextSource`\
  \ 的一个重要属性是 `dirObjectFactory`，可以用来设置要使用的 `DirObjectFactory`。然而，在清单 5-6 中，您并未使用此属性来指定使用\
  \ `DefaultDirObjectFactory` 的意图。这是因为默认情况下，`LdapContextSource` 会将其 `DirObjectFactory`\
  \ 注册为 `DefaultDirObjectFactory`。\n\n在配置文件的最后部分，您有 `LdapTemplate` 的 bean 声明。您将 `LdapContextSource`\
  \ bean 作为构造函数参数传递给了 `LdapTemplate`。\n\n\n\n## 实现查找方法\n\n实现员工 DAO 的`findAll`方法需要通过\
  \ LDAP 搜索所有员工条目，并使用返回的条目创建`Employee`实例。为此，你将使用`LdapTemplate`类中的以下方法：\n\n```\npublic\
  \  List search(String base, String filter, ParameterizedContextMapper mapper)\n\
  ```\n\n由于你使用的是`DefaultDirObjectFactory`，每次执行搜索或查找操作时，LDAP 树中找到的每个上下文都会被返回为`DirContextAdapter`实例。就像你在列表\
  \ 3-8 中看到的搜索方法一样，前面的搜索方法也接受`base`和`filter`参数。此外，它还接受一个`AbstractContextMapper<T>`实例。前面的`search`方法会将返回的`DirContextAdapters`传递给`ContextMapper<T>`实例进行转换。\n\
  \n列表 5-7 提供了将`Employee`实例映射的上下文映射器实现。如你所见，`EmployeeContextMapper`继承自`AbstractContextMapper`，这是一个实现了`ContextMapper`接口的抽象类。\n\
  \n```\npackage com.apress.book.ldap.repository.mapper;\nimport com.apress.book.ldap.domain.Employee;\n\
  import org.springframework.ldap.core.DirContextOperations;\nimport org.springframework.ldap.core.support.AbstractContextMapper;\n\
  public class EmployeeContextMapper extends AbstractContextMapper {\n@Override\n\
  protected Employee doMapFromContext(DirContextOperations context) {\nEmployee employee\
  \ = new Employee();\nemployee.setUid(context.getStringAttribute(\"uid\"));\nemployee.setFirstName(context.getStringAttribute(\"\
  givenName\"));\nemployee.setLastName(context.getStringAttribute(\"sn\"));\nemployee.setCommonName(context.getStringAttribute(\"\
  cn\"));\nemployee.setEmployeeNumber(context.getStringAttribute(\"employeeNumber\"\
  ));\nemployee.setEmail(context.getStringAttribute(\"mail\"));\nemployee.setPhone(context.getStringAttributes(\"\
  telephoneNumber\"));\nreturn employee;\n}\n}\nListing 5-7\n映射器实现示例\n```\n\n在列表 5-7\
  \ 中，`doMapFromContext`方法的`DirContextOperations`参数是`DirContextAdapter`接口的实现。如你所见，`doMapFromContext`的实现涉及创建一个新的`Employee`实例，并从提供的上下文中读取感兴趣的属性。\n\
  \n有了`EmployeeContextMapper`，`findAll`方法的实现变得非常简单。由于所有员工条目都具有`objectClass inetOrgPerson`属性，因此将使用`\"\
  (objectClass=inetOrgPerson)\"`作为搜索过滤器。列表 5-8 展示了`findAll`的实现。\n\n```\n@Override\n\
  public List findAll() {\nreturn ldapTemplate.search(\"\", \"(objectClass=inetOrgPerson)\"\
  , new EmployeeContextMapper());\n}\nListing 5-8\n从 LDAP 中查找所有信息的实现\n```\n\n其他查找方法可以通过使用过滤器(`uid=<supplied\
  \ employee id>`)搜索 LDAP 树，或通过员工 DN 执行 LDAP 查找来实现。由于带有过滤器的搜索操作比查找 DN 更昂贵，因此你将使用查找方式实现`find`方法。列表\
  \ 5-9 展示了`find`方法的实现。\n\n```\n@Override\npublic Employee find(String id) {\nDistinguishedName\
  \ dn = new DistinguishedName();\ndn.add(\"uid\", id);\nreturn ldapTemplate.lookup(dn,\
  \ new EmployeeContextMapper());\n}\nListing 5-9\n在 LDAP 中查找单个元素的实现\n```\n\n你首先通过构建员工的\
  \ DN 来开始实现。由于初始上下文基础被限制在员工分支，你只需指定了员工条目的 RDN 部分。然后使用`lookup`方法查找员工条目，并使用`EmployeeContextMapper`创建`Employee`实例。\n\
  \n这完成了两个查找方法的实现。现在让我们创建一个 JUnit 测试类来测试你的查找方法。测试用例如列表 5-10 所示。\n\n```\npackage com.apress.book.ldap.repository;\n\
  import java.util.List;\nimport com.apress.book.ldap.domain.Employee;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.beans.factory.annotation.Qualifier;\nimport org.springframework.ldap.core.DirContextAdapter;\n\
  import org.springframework.ldap.core.DirContextOperations;\nimport org.springframework.ldap.core.DistinguishedName;\n\
  import org.springframework.ldap.core.LdapTemplate;\nimport org.springframework.stereotype.Repository;\n\
  import com.apress.book.ldap.repository.mapper.EmployeeContextMapper;\n@Repository(\"\
  employeeDao\")\npublic class EmployeeDaoLdapImpl implements EmployeeDao {\nprivate\
  \ LdapTemplate ldapTemplate;\npublic EmployeeDaoLdapImpl(@Autowired @Qualifier(\"\
  ldapTemplate\") LdapTemplate ldapTemplate) {\nthis.ldapTemplate = ldapTemplate;\n\
  }\n@Override\npublic List findAll() {\nreturn ldapTemplate.search(\"\", \"(objectClass=inetOrgPerson)\"\
  , new EmployeeContextMapper());\n}\n@Override\npublic Employee find(String id) {\n\
  DistinguishedName dn = getDistinguishedName(id);\nreturn ldapTemplate.lookup(dn,\
  \ new EmployeeContextMapper());\n}\nprivate DistinguishedName getDistinguishedName(String\
  \ id) {\nDistinguishedName dn = new DistinguishedName();\ndn.add(\"uid\", id);\n\
  return dn;\n}\n// 后续页面将添加相关逻辑\n@Override\npublic void create(Employee employee)\
  \ {}\n@Override\npublic void delete(String id) {}\n@Override\npublic void update(Employee\
  \ employee) {}\n}\nListing 5-10\n对搜索方法的测试实现\n```\n\n请注意你在`ContextConfiguration`中指定了`repositoryContext-test.xml`测试上下文文件。该测试上下文文件如列表\
  \ 5-11 所示。你创建了一个嵌入式 LDAP 服务器，在端口 18880 上运行，并使用位于**src/test/resources**文件夹中的`employee.ldif`文件进行初始化，该文件包含本书中将使用的测试数据。\n\
  \n```\n\nListing 5-11\n上下文配置\n```\n\n请记住每个测试都会清空数据库，因此你可以在不影响其他测试的情况下执行大量操作。\n\n\
  \n\n## 创建方法\n\n`LdapTemplate` 提供了多个 `bind` 方法用于向 LDAP 添加条目。要创建一个新的员工，您将使用以下 `bind`\
  \ 方法变体：\n\n```\npublic void bind(DirContextOperations ctx)\n```\n\n此方法以 `DirContextOperations`\
  \ 实例作为参数。`bind` 方法会调用传入的 `DirContextOperations` 实例的 `getDn` 方法，并获取条目的完整限定名（DN）。然后将所有属性绑定到\
  \ DN 并创建新条目。\n\nEmployee DAO 中的 `create` 方法实现如 Listing 5-12 所示。您会首先创建一个 `DirContextAdapter`\
  \ 的新实例，然后使用员工信息填充上下文的属性。方法的最后一行执行实际的绑定操作。\n\n```\n@Override\npublic void create(Employee\
  \ employee) {\nDistinguishedName dn = getDistinguishedName(employee.getUid());\n\
  DirContextAdapter context = new DirContextAdapter();\ncontext.setDn(dn);\ncontext.setAttributeValues(\"\
  objectClass\",\nnew String[] { \"top\", \"person\", \"organizationalperson\", \"\
  inetorgperson\" });\ncontext.setAttributeValue(\"givenName\", employee.getFirstName());\n\
  context.setAttributeValue(\"sn\", employee.getLastName());\ncontext.setAttributeValue(\"\
  cn\", employee.getCommonName());\ncontext.setAttributeValue(\"mail\", employee.getEmail());\n\
  context.setAttributeValue(\"employeeNumber\", employee.getEmployeeNumber());\ncontext.setAttributeValues(\"\
  telephoneNumber\", employee.getPhone());\nldapTemplate.bind(context);\n}\nListing\
  \ 5-12\n在 LDAP 上创建新员工的方法\n```\n\n注意\n\n将 Listing 5-12 中的代码与 Listing 3-10 中的代码进行对比。您会发现\
  \ `DirContextAdapter` 在简化属性操作方面表现出色。\n\n我们可以通过 Listing 5-13 中的 JUnit 测试用例快速验证 `create`\
  \ 方法的实现。\n\n```\n@Test\n@DisplayName(\"检查创建一个员工的操作\")\npublic void should_create_a_new_employee()\
  \ {\nString empUid = \"employee1000\";\nEmployee employee = new Employee();\nemployee.setUid(empUid);\n\
  employee.setFirstName(\"Test\");\nemployee.setLastName(\"Employee1000\");\nemployee.setCommonName(\"\
  Test Employee1000\");\nemployee.setEmail(\"employee1000@inflinx.com\");\nemployee.setEmployeeNumber(\"\
  45678\");\nemployee.setPhone(new String[] { \"801-100-1200\" });\nemployeeDao.create(employee);\n\
  employee = employeeDao.find(empUid);\nassertNotNull(employee);\n}\nListing 5-13\n\
  验证创建方法是否正常工作的测试\n```\n\n为了简化测试，只需验证对象是否不为 null，但建议尝试验证所有字段的值。\n\n## 更新方法\n\n更新条目涉及添加、替换或删除其属性。最简单的方法是删除整个条目并使用新的属性集重新创建。这种技术称为重新绑定（rebinding）。删除并重新创建条目可能更高效，而且对更改的值进行操作更有意义。\n\
  \n在第 3 章中，您使用了 `modifyAttributes` 和 `ModificationItem` 实例来更新 LDAP 条目。尽管 `modifyAttributes`\
  \ 是一种不错的做法，但它需要手动生成 `ModificationItem` 列表，这需要大量工作。幸运的是，`DirContextAdapter` 自动完成这一操作，使更新条目变得非常简单。Listing\
  \ 5-14 展示了使用 `DirContextAdapter` 实现的 `update` 方法。\n\n```\n@Override\npublic void\
  \ update(Employee employee) {\nDistinguishedName dn = getDistinguishedName(employee.getUid());\n\
  DirContextOperations context = ldapTemplate.lookupContext(dn);\ncontext.setAttributeValues(\"\
  objectClass\",\nnew String[] { \"top\", \"person\", \"organizationalperson\", \"\
  inetorgperson\" });\ncontext.setAttributeValue(\"givenName\", employee.getFirstName());\n\
  context.setAttributeValue(\"sn\", employee.getLastName());\ncontext.setAttributeValue(\"\
  cn\", employee.getCommonName());\ncontext.setAttributeValue(\"mail\", employee.getEmail());\n\
  context.setAttributeValue(\"employeeNumber\", employee.getEmployeeNumber());\ncontext.setAttributeValues(\"\
  telephoneNumber\", employee.getPhone());\nldapTemplate.modifyAttributes(context);\n\
  }\nListing 5-14\n更新属性的方法\n```\n\n在这个实现中，您会注意到首先使用员工的 DN 查找现有的上下文，然后像在 `create` 方法中那样设置所有属性。（区别在于\
  \ `DirContextAdapter` 会跟踪对条目所做的值更改。）最后，将更新后的上下文传递给 `modifyAttributes` 方法。`modifyAttributes`\
  \ 方法会从 `DirContextAdapter` 中获取修改的项目列表，并在 LDAP 条目上执行这些修改。Listing 5-15 展示了验证更新员工姓名的关联测试用例。\n\
  \n```\n@Test\n@DisplayName(\"检查更新一个员工的操作\")\npublic void should_update_an_employee()\
  \ {\nEmployee employee = employeeDao.find(\"employee1\");\nemployee.setFirstName(\"\
  Employee New\");\nemployeeDao.update(employee);\nemployee = employeeDao.find(\"\
  employee1\");\nassertEquals(employee.getFirstName(), \"Employee New\");\n}\nListing\
  \ 5-15\n测试更新方法\n```\n\n建议：当上传整个对象时，验证所有字段是否具有正确的值；在此简化场景中，测试仅检查一个属性。\n\n## 删除方法\n\
  \nSpring LDAP 通过 `LdapTemplate` 中的 `unbind` 方法使解绑定操作变得简单。Listing 5-16 展示了删除员工涉及的代码。\n\
  \n```\n@Override\npublic void delete(String id) {\nDistinguishedName dn = getDistinguishedName(id);\n\
  ldapTemplate.unbind(dn);\n}\nListing 5-16\n使用 uid 的删除方法\n```\n\n由于您的操作都是基于初始上下文\
  \ `ou=employees,dc=inflinx,dc=com` 的，因此只需使用 uid 创建 DN，即条目的 RDN。调用 `unbind` 操作将删除条目及其所有相关属性。\n\
  \nListing 5-17 展示了验证条目删除的关联测试用例。一旦条目成功删除，对该名称的任何查找操作都会抛出 `NameNotFoundException`。测试用例验证了这一假设。\n\
  \n```\n@Test\n@DisplayName(\"检查删除一个员工的操作\")\npublic void should_delete_an_employee()\
  \ {\nString empUid = \"employee11\";\nemployeeDao.delete(empUid);\nassertThrows(NameNotFoundException.class,\
  \ () -> {\nemployeeDao.find(empUid);\n});\n}\nListing 5-17\n使用 uid 测试删除方法\n```\n\
