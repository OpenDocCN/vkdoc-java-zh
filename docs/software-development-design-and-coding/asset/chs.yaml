- "# 1. 软件开发导论\n\n> *“不仅目前看不到银弹，而且软件的本质决定了未来也不太可能出现——没有任何发明能像电子学、晶体管和大规模集成电路对计算机硬件那样，对软件的生产力、可靠性和简洁性产生同样的影响。我们无法指望每两年就能看到两倍的提升。”*\n\
  > \n> ——小弗雷德里克·J·布鲁克斯^(²)\n\n那么，你可能会问自己，为什么这本书叫《软件开发、设计与编码》？为什么不叫《关于编程的一切》或《软件工程》？毕竟，软件开发不就是这些吗？嗯，并非如此。编程是软件开发的一部分，但肯定不是全部。同样，软件开发是软件工程的一部分，但也不是全部。\n\
  \n以下是本书中我们将使用的软件工程定义：软件开发是一个过程，它从用户那里获取一组需求（问题陈述），对其进行分析，设计问题的解决方案，然后在计算机上实现该解决方案。\n\
  \n但这不就是编程吗？嗯，不是。编程实际上只是软件开发的实现部分，或者可能包括设计和实现部分。编程是软件开发的核心，但它并非全部。\n\n那么，它是不是软件工程呢？同样，也不是。软件工程也涉及一个过程，并包含软件开发，但它还包括创建供人们使用的计算机程序的整个管理方面。软件工程包括项目管理、配置管理、进度安排与估算、基线建立与调度、人员管理以及其他若干事项。软件开发是软件工程中有趣的部分。\n\
  \n因此，软件开发是将软件工程的焦点缩小到仅与创建实际软件相关的部分。同时，它也是将编程的焦点拓宽，以包含分析、设计和发布问题。\n\n## 我们在做什么\n\n\
  事实证明，在使用了计算机大约 80 年之后，我们发现开发软件是困难的。学习如何有效、高效且可持续地开发软件同样困难。你并非生来就知道如何做，而且许多人，即使是那些参加过编程课程并在行业工作多年的人，也做得并不特别好。这是一项你需要大量学习和练习的技能。你无法通过阅读书籍——即使是这本——来学会编程和开发。你需要通过开发软件来学习它。当然，这正是其吸引力所在：致力于解决有趣且困难的问题。挑战在于处理你从未做过的事情，甚至是你不知道能否解决的问题。这正是让你一次又一次地回来创建新程序的原因。\n\
  \n学习软件开发可能有几种方法。但我们认为，所有这些方法都涉及阅读优秀的设计、阅读大量代码、编写大量代码，以及深入思考如何解决问题并为其设计解决方案。阅读大量代码，尤其是那些非常优美且高效的代码，能为你提供许多关于如何思考问题以及以特定风格解决它们的好例子。编写大量代码则让你能够尝试在阅读中看到的风格和例子。深入思考问题解决过程，让你能够审视自己如何工作、如何进行设计，并让你从自己的劳动中提炼出那些对你有用的模式；这会让你的编程更具目的性。\n\
  \n\n\n## 那么，如何开发软件？\n\n嗯，你首先要做的就是阅读这本书。它当然不会告诉你所有事情，但会为你提供一个很好的入门介绍，让你了解软件开发究竟是怎么回事，以及你需要做什么才能编写出优秀的代码。它有其独特的视角，但这个视角是基于我们合计约\
  \ 40 年的专业编码经验，以及另外 24 年试图弄清楚如何教会他人进行开发的经历。\n\n尽管软件开发只是软件工程的一部分，但它是每个软件项目的核心。毕竟，*归根结底，你交付给用户的是能正常运行的代码*。一个协同工作的开发团队通常负责创建这些代码。因此，首先，我们或许应该从外部审视一个软件项目，并问一问：这个团队需要做什么才能让项目成功？\n\
  \n为了成功进行软件开发，你需要具备以下几点：\n\n*   **要意识到在项目开始时，你并非无所不知**。软件开发项目并非如此运作。你总会发现新的需求；有些需求会被发现并不像客户想象的那么重要；还有一些原本计划在下一个版本中实现的需求，突然之间变成了头号需求。这被称为*需求变更*。在项目过程中管理需求变更，是软件开发人员可以拥有的最重要技能之一。如果你正在使用新的开发工具（比如一个新的\
  \ Web 开发框架），你会发现一些你未曾意识到的局限性，以及一些副作用，这些副作用会迫使你去学习，例如，另外三个工具才能理解它们（例如，你想用的那个 Web\
  \ 开发工具是基于 Ruby 的，需要特定的关系型数据库系统才能运行，并且需要 Apache 的特定配置才能正常工作）。\n\n*   **一个规模小、整合良好的团队**。小团队比大团队拥有更少的沟通线路。更容易了解团队成员的优点和缺点，理解他们的个性和偏好，并确定谁是特定问题或工具的专家。整合良好的团队通常一起合作过多个项目。让一个团队在多个项目中保持稳定，是团队经理和团队成员个人的一项重要工作。整合良好的团队效率更高，更善于遵守时间表，并且在发布时更有可能产生缺陷更少的代码。保持团队稳定的关键在于，给他们有趣的工作，给他们决定如何工作的自由，并通过消除障碍和帮助解决冲突来促进工作流程。\n\
  \n*   **团队成员之间良好的沟通**。团队成员之间持续、直接的沟通对于日常进展和成功完成项目至关重要。同地办公的团队通常比地理上分散（即使只是分布在建筑物的不同楼层或侧翼）或远程工作的团队沟通得更好，沟通也更频繁。^(³)\
  \ 这对于那些软件开发站点遍布全球的大型公司来说是一个主要问题。\n\n*   **团队与客户之间良好的沟通**。与客户的沟通对于在项目过程中控制需求和需求变更至关重要。现场或附近的客户允许与开发团队进行持续互动。客户可以对新版本提供即时反馈，并可以参与为产品创建系统测试和验收测试。敏捷开发方法论强烈鼓励客户成为开发团队的一部分，甚至更好的是，每天都能在现场。关于一些敏捷方法的快速介绍，请参见第\
  \ 2 章。\n\n*   **一个每个人都认同的流程**。每个项目，无论大小，都遵循一个流程。较大的项目需要更多的协调，以及对沟通和配置管理更严格的控制。因此，较大的团队往往更倾向于计划驱动，并遵循需要更多规则和文档的流程。如今，较小的项目和较小的团队往往倾向于遵循更敏捷的开发流程，具有更大的灵活性，并且需要的文档更少。这当然并不意味着敏捷项目*没有*流程；它只是意味着你只做对项目当前阶段有意义的事情，以便你能正确地发现并满足所有需求，按时完成计划，并交付高质量的产品。关于流程和软件生命周期的更多细节，请参见第\
  \ 2 章。\n\n*   **对该流程保持灵活的能力**。没有哪个项目会完全按照你第一天设想的那样进行。需求会变化，人员会流动，工具会失效或更新，等等。这一点完全关乎如何处理项目中的风险。如果你能识别风险，计划如何减轻风险，然后制定应急计划来处理风险实际发生的情况，你的处境就会好得多。第\
  \ 4 章讨论了需求和风险。\n\n*   **一个每个人都认同的计划**。你不会在没有算法的情况下就开始编写排序程序，所以你也不应该在没有计划的情况下启动一个软件开发项目。项目计划概括了你将如何实施你的项目。它涉及流程、风险、资源、工具、需求管理、估算、时间表、配置管理和交付。它不必很长，不需要包含项目日常生活的所有细微细节，甚至不需要写下来，但团队中的每个人都需要对其有投入，需要理解它，并且需要同意它。除非每个人都认同这个计划，否则你注定会失败。关于项目规划的更多细节，请参见第\
  \ 3 章。\n\n*   **要时刻了解项目所处的位置**。这又回到了沟通的问题上。大多数项目都有定期的状态会议，以便开发人员能够“同步”他们当前的状态，了解整个项目的状态，并在团队内部建立一种同志情谊。这对于较小的团队（比如，最多约\
  \ 20 名开发人员）非常有效，其中许多团队每天都会举行“站立会议”来在每天开始时同步状态。不同的流程模型处理这种“站立会议”的方式不同。例如，计划驱动的模型不要求这些会议，而是依赖团队经理之间相互沟通。敏捷流程通常要求全员每日会议，以促进在高度动态的项目环境中进行持续的团队沟通。\n\
  \n*   **要勇敢地说：“嘿，我们落后了！”** 几乎所有的软件项目在开始时，时间表都过于乐观。这是客户想听到的，是公司想提供的，也是经理和开发人员想承诺的。“当然，我一周内就能搞定！”“我今天下班前给你。”“明天？没问题。”不，不，不，不，不。面对现实吧。在某个时候你会落后。对此最好的做法就是立即告诉你的经理。当然，他们可能会生气。但如果你最终落后了一个月而他们却毫不知情，他们会更生气。弗雷德·布鲁克斯对软件项目是如何变得如此落后的著名回答是“一天一天地落后”。不过，好消息是，你越早发现自己落后了，你拥有的选择就越多。这些选择包括延长工期（不太可能，但确实会发生），将一些需求移到未来的版本中，获得额外的帮助，等等。重要的是让你的经理随时了解情况。\n\
  \n\n\n*   *为该项目选择正确的工具和正确的实践*。软件开发最棒的一点在于每个项目都各不相同。即使你正在开发某个现有产品的 8.0 版本，情况也会发生变化。这意味着，对于每个项目，你都需要审视并选择一套合适的开发工具。选择不合适的工具就像试图用螺丝刀钉钉子；你最终或许能完成，但这肯定不轻松、不美观、也不有趣，而且用锤子能在更短时间内钉入更多钉子。即使你必须先获得一把锤子，然后第一次学习如何使用它，你也在过程中升级了你的工具包和技能，为未来更高效工作的能力进行了投资。选择工具时最重要的三个因素是：你正在编写的应用程序类型、目标平台以及开发平台。通常你对这三件事中的任何一件都无能为力，所以一旦你了解了它们，就可以选择能提高生产力的工具。工具选择的第四个且几乎同等重要的因素是开发团队的构成和经验。如果你的团队都是经验丰富、熟悉多种平台的开发者，那么工具选择就容易得多。另一方面，如果你有一群刚毕业的新人，并且目标平台对所有人来说都是全新的，那么你就需要谨慎选择工具，并预留时间进行新工具的培训和实践。\n\
  \n## 结论\n\n软件开发是每个软件项目的核心，也是软件工程的核心。其目标是在不断变化的需求面前，按时、在预算内为用户交付卓越、无缺陷的代码。这使得开发工作变得尤为艰巨。但是，为难题找到解决方案并让你的代码正确运行，这几乎是世界上最酷的感觉。\n\
  \n> *“[编程是]我能想到的唯一一份能让我同时成为工程师和艺术家的职业。它有着令人难以置信的、严谨的技术元素，我喜欢这一点，因为你必须进行非常精确的思考。另一方面，它又有着极其创造性的一面，唯一的真正限制是想象力的边界。这两者的结合正是编程的独特之处。你可以同时成为艺术家和科学家。我喜欢这一点。我喜欢创造位于核心的、真正构成编写程序基础的魔法技巧。第一次看到那个魔法技巧，也就是你程序的精髓，能够正确运行，是编写程序过程中最激动人心的部分。”*\n\
  > \n> ——安迪·赫兹菲尔德（第一代 Mac OS 的设计者）^(⁴)\n\n"
- '# 第一部分 模型与团队实践


  '
- "# 2. 软件过程模型\n\n> *如果你不知道要去哪里，那么任何路都可以。*\n\n> *如果你不知道自己在哪里，那么地图也没用。*\n> \n> ——瓦茨·汉弗莱\n\
  \n软件开发的过程通常被描述为软件开发生命周期（SDLC）。每个程序，无论多小，都有一个生命周期，大致由以下步骤组成：\n\n1.  构思\n2.  需求收集/探索/建模\n\
  3.  设计\n4.  编码与调试\n5.  测试\n6.  发布\n7.  维护/软件演进\n8.  退役\n\n你的开发过程可能会合并多个步骤，或者在发布之间反复迭代部分步骤，但无论以何种形式，所有开发都应包含上述生命周期中的所有步骤，以创建高质量的软件。两种最常见的变体是*基于计划的模型*^(⁵)和较新的*敏捷开发*模型。^(⁶)\n\
  \n采用基于计划的开发时，项目团队通常会在回到 SDLC 开始下一个产品版本的工作之前，完成一个完整的生命周期（至少是步骤 2 到 7）。在计划驱动模型中，方法论在流程步骤和发布时间方面往往更为严格。计划驱动模型有更清晰定义的阶段，并且在进入下一阶段之前，对阶段完成的签核有更多要求。计划驱动模型在每个阶段需要更多的文档，并需要验证每个工作产品的完成情况。它们通常适用于具有明确定义交付成果的新软件的大型合同。\n\
  \n在目前更为普遍的敏捷开发中，项目团队通常会在进入发布步骤之前，多次迭代部分生命周期（通常是步骤 3 到 5）。敏捷模型本质上是增量式的，其运作假设是：小而频繁的发布比大而不频繁的发布能产生更健壮的产品。与计划驱动模型相比，敏捷模型中的阶段往往更加模糊，并且对工作产品文档的要求通常更少，其基本思想是：代码才是最终产出，因此开发者的精力应集中于此。请访问敏捷宣言网页\
  \ [`https://agilemanifesto.org`](https://agilemanifesto.org/)，以深入了解敏捷开发模型及其目标。\n\
  \n没有一种开发软件的最佳过程。每个项目都必须根据其特定应用来决定最有效的模型，并基于项目领域、项目范围、团队经验以及项目时间表来做出决定。在本章中，我们首先回顾软件开发项目的共享变量，然后讨论几种广泛定义的不同方法，最后我们将审视几个著名的具体软件模型实现，以及它们如何能够混合使用。\n\
  \n\n\n## 软件开发的 3(+3) 个变量\n\n根据项目管理协会的说法，^(⁷) 软件开发的三个主要*变量*是成本、时间和范围。\n\n*   *成本*（即资源）通常是最受约束的；作为开发者，你对成本的控制非常有限，无法通过花钱来获得质量或按时交付。成本会影响团队规模或开发过程中可用的工具类型。对于小型公司和初创企业，成本还会影响开发人员的工作环境。\n\
  \n*   *时间*是你的交付日程，通常由外部强加给你。例如，大多数消费产品（无论是硬件还是软件）的交付日期会在八月到十月之间，以便赶上假日购物季。你无法改变圣诞节。如果你延迟了，解决问题的唯一办法就是削减功能或降低质量，这两者都不理想。时间也是布鲁克斯法则（向一个延迟的项目增加程序员只会让它更延迟）适用的领域。\n\
  \n*   *范围*（即功能）是产品实际能做的事情。这应该是开发者始终关注的重点。从客户的角度来看，它是最重要的变量，也是作为开发者的你控制权最大的变量。控制范围能让你为管理者和客户提供对质量、时间和成本的控制。如果开发者无法控制每个版本的功能集，那么他们很可能会超出计划。这就是为什么开发者应该对软件工作产品进行估算。\n\
  \n成本、时间和范围共同构成了软件开发的*铁三角*，其中指定两个变量就定义了第三个变量。在现实世界中，客户通常会指定任务的时间框架和预算，这将成为你的约束条件，以便在更广泛的任务范围内估算出实际的范围。\n\
  \n有时，会加入第四个变量（通常作为三角形的中心）。\n\n*   *质量*是指你愿意随产品一起发布的缺陷、简化或功能缩减的数量/严重程度。因此，质量可以用来描述范围内功能的非二元特性（例如，对用户查询的响应时间不应超过\
  \ n 毫秒，但越低越好）。严格来说，这不像成本、时间和范围那样是一个输入变量，而是衡量你输出质量的指标。你可以通过牺牲质量来在交付计划上获得短期收益，但代价是巨大的。修复下一个版本将花费更多时间，你的信誉也会大打折扣。更常见的情况是，产品有一个预期的最低质量标准，从而固定了这个“变量”。\n\
  \n在某些定义中，任务/产品的范围被认为是固定的，或者与质量相互交织，从而形成了一个由成本、时间和质量组成的铁三角。^(⁸)\n\n最近，又定义了两个变量，作为新的六变量约束集的一部分：^(⁹)\n\
  \n*   *收益*是指交付给产品提供者和客户的价值。随着关于市场、客户需求或目标受众的新信息出现，收益可能会发生变化，从而需要对范围或其他变量进行调整。\n\n\
  *   *风险*是指无法满足其他标准预期值的可能性（例如，未能实现功能、增加开发时间或超出预期预算）。管理一种类型的风险可能会增加另一种类型的风险（例如，增加时间会降低范围的风险，但可能会增加成本）。为了最小化风险，开发者需要尽可能多地控制变量，始终牢记软件开发中唯一不变的就是变化。如果你密切关注并在变化发生时有效应对，就能将变化的风险和成本控制在可管理的范围内。\n\
  \n如图 2-1 所示，所有约束都需要平衡。改变其中一个将需要调整其他约束来补偿。\n\n![](img/270563_3_En_2_Fig1_HTML.jpg)\n\
  \n一张图表展示了多个相交的圆圈，呈圆形排列。这些圆圈分别标记为范围、风险、成本、收益、时间和质量。\n\n图 2-1\n\n软件开发的六个变量\n\n多年来，人们还提出了许多其他对定义软件开发项目的变量的扩展。例如，“方形路线”将铁三角与交付阶段和交付后阶段的项目评估考量相结合。^(¹⁰)\
  \ 组织和客户之外的其他约束也可能在软件产品的创建中发挥重要作用，包括社会、经济、立法、环境等因素。^(¹¹)\n\n## 软件开发方法\n\n在软件开发方面，有几种通用方法，可以在一个组织内甚至单个项目中单独或结合使用。下面我们讨论计划、通过精益方法论减少浪费，以及通过保持敏捷来适应变化。\n\
  \n### 基于计划的软件开发\n\n基于计划的软件开发的主要特点是制定计划，然后贯彻执行。这看起来很简单……除非要制定一个可靠的计划，你需要掌握所有信息，并且这些信息不能改变。由于我们既非全知也非能预知未来，这就带来了一些问题。我们受制于不精确的语言，这些语言描述的是理解不充分的需求，而这些需求是为了解决不断变化的现实场景中的问题，由一群可预测地不可预测的人类组成的团队所设计的。\n\
  \n尽管如此，计划还是令人安心的。它让我们产生一种错觉，以为我们知道将要发生什么。如果我们遵循一个计划并得到了一个结果，我们希望将来遵循同样的计划能得到同样的结果。当然，控制所有变量（无论是项目内部还是外部的）是不可能的。计划还允许为整个计划层级制定子计划和估算。诚然，步骤越远，我们的估算就越不准确。计划还允许我们评估依赖关系并相应地安排任务。当然，任何变化都可能推倒我们精心设计、估算、排序、安排并部分开发的这座纸牌屋。\n\
  \n假设我们确实有一个计划：我们设计了步骤，并将按顺序逐一完成。对于一个由单一开发者（同时也是客户）负责的小项目来说，这很可能行得通。在更现实的场景中，客户不是我们自己，项目很复杂，我们必须与其他利益相关者协调。假设我们的基本计划包括设计阶段、实施阶段、测试阶段和交付。我们花了几个月时间拿出一个漂亮的设计展示给客户，但客户想要修改。我们又花了几周时间修改设计；客户批准了。我们制定了一个开发计划，并试图在接下来的几个月里实施我们的设计。在这段时间里，我们依赖的一些库被弃用了，一些开发者离开了，新成员加入了团队，市场发生了变化，导致客户要求修改设计，最终我们的开发计划和设计都过时了。一切重来……更糟糕的是，到目前为止，我们还没有为客户交付任何价值，他们开始对我们能否交付失去信心。总结一下，为小项目制定可靠的短期计划是可行的；其他情况都只是美好的愿望。\n\
  \n\n### 敏捷软件开发\n\n自 20 世纪 90 年代中期起，一群流程专家开始倡导一种新的软件开发模式。这种新方法针对中型软件项目和较小的开发团队，旨在让团队能够快速适应不断变化的需求和客户要求，同时比计划驱动模型更快速、更频繁地发布可运行的软件。简而言之，这种新模式就是*敏捷*。^(¹²)\n\
  \n在大多数*敏捷*过程模型中，我们从“已知”需求（过程中某个早期时间点的需求快照）开始，并对其进行优先级排序，通常基于客户对哪些功能最重要、应优先交付的排序。请记住，我们自认为对这些需求的了解通常只是大致准确：自然语言是不精确的；理解的含义会因沟通者的背景、立场和其他情境而异；而且客户往往并不完全清楚他们需要什么来解决自己的问题。因此，我们在软件开发中最重要的挑战之一就是*通过迭代方式，逐步达成对问题和预期解决方案的准确共识*。根据汤姆·德马科的说法，迭代软件开发遵循一条基本规则：\n\
  \n> *你的项目，整个项目，有一个二进制的可交付成果。在计划的完成日，项目要么交付了一个被用户接受的系统，要么没有。那天每个人都知道结果。*\n\n> *构建项目模型的目标是将项目分解为多个组成部分，每个部分都具有相同的特征：每个活动必须由一个具有*\
  \ *客观完成标准的可交付成果来定义。这些可交付成果要么明确完成，要么未完成。*^(¹³)\n\n更宽松地说，我们可以设计一系列迭代，其中每次迭代都是一个完整的、可运行且健壮的最小可行产品（MVP），尽管其功能少于最终目标产品。对于每次迭代，我们将选择一组优先级次高的需求（包括你或客户在上一次迭代中发现的一些需求），开发、测试并演示该\
  \ MVP，然后收集反馈。这些反馈可能会极大地改变我们的初始计划，这就是为什么我们的初始计划只是对未来开发迭代的一个粗略草图。\n\n那么，如果你估算错误会发生什么？如果你决定在一次迭代中包含太多新功能呢？如果出现意外延迟呢？好吧，如果看起来你无法在迭代截止日期前完成，那么只有两种现实的选择：推迟截止日期或移除功能。我们稍后在讨论估算和进度安排时会回到这个问题。迭代开发的关键在于“过一种平衡的生活——每天学一点、想一点、画一点、唱一点、跳一点、玩一点、工作一点”，^(¹⁴)\
  \ 或者用软件开发领域的话来说，每天*分析*一点、*设计*一点、*编码*一点、*测试*一点。我们将在本章后面讨论敏捷开发模型时再次探讨这个想法。\n\n总的来说，敏捷由持续的短期实验组成，通过迭代评审来评估产品和实践，并找到适合团队和客户的流程。换句话说，就是一些老式的试错法。虽然某些失败是不可避免的，但在小增量上失败、尽早失败并从中快速学习，信息量更大且成本更低。因此，我们减轻了要求中间决策必须正确的压力，只要求这些决策有助于我们更多地了解实际需求。\n\
  \n敏捷开发基于这样一个命题：任何软件开发项目的目标都是可运行的代码。因此，开发团队应该将大部分时间花在编写代码上，而不是编写文档上。与上述由卡内基梅隆大学软件工程研究所（SEI）等组织倡导的重型计划驱动模型相反，这种新过程模型是*轻量级*的，需要的文档和过程控制更少。轻量级方法论倾向于强调在编写代码之前编写测试、频繁发布产品、客户深度参与开发、公共代码所有权以及重构（重写代码以使其更简单、更易于维护）。不幸的是，轻量级方法论也遭受着几种误解，其中两个最有害的是：轻量级流程只适用于非常小的项目，以及轻量级项目缺乏过程纪律。这两种说法都是错误的。事实是，轻量级方法论已成功应用于许多中小型项目（比如大约\
  \ 50 万行代码以内），以及非常大的项目。大型项目几乎总是可以组织为一组较小的项目，这些项目共同为单个更大的产品提供服务。轻量级方法论也需要过程纪律，尤其是在项目开始时，当初始需求和迭代周期被创建时，以及在作为编码过程核心的测试驱动开发中。\n\
  \n在本章的剩余部分，我们将回顾多年来定义的敏捷价值观、原则和活动。但请注意，*敏捷性必然延伸到这些概念和实践最终如何被整合到开发中*（即，通过迭代来确定对于每个特定产品/组织/团队等，哪些有效，哪些无效）。\n\
  \n\n\n## 敏捷价值观、原则与活动\n\n2001 年初，一群经验丰富且富有创新精神的开发者在美国犹他州斯诺伯德会面，共同探讨软件开发流程的现状。他们均对传统的计划驱动模型感到不满，并一直在尝试新的轻量级开发技术。这次会议催生了《敏捷宣言》。^(¹⁶)\
  \ 该小组最初提出的描述包含两部分：价值观（宣言本身）和原则。\n\n四项*敏捷价值观*表明，虽然作者们承认右侧条目的价值，但他们认为左侧条目对于成功的软件开发至关重要：\n\
  \n*   **个体与互动**高于流程与工具\n*   **可工作的软件**高于详尽的文档\n*   **客户合作**高于合同谈判\n*   **响应变化**高于遵循计划\n\
  \n作者们定义了以下 12 条*敏捷原则*，以聚焦和指导开发工作：\n\n*   我们的最高优先级是通过尽早并持续地交付有价值的软件来满足客户。\n*   欢迎需求变更，即使是在开发后期。敏捷过程利用变更为客户创造竞争优势。\n\
  *   频繁地交付可工作的软件，交付的间隔可以从几周到几个月，倾向于更短的时间尺度。\n*   业务人员和开发人员必须在项目期间每天一起工作。\n*   围绕有动力的个体构建项目。给予他们所需的环境和支持，并信任他们能够完成工作。\n\
  *   向开发团队传递信息或在团队内部传递信息，最有效率且最有效果的方法是面对面的交谈。\n*   可工作的软件是衡量进度的首要标准。\n*   敏捷过程倡导可持续开发。赞助人、开发者和用户应该能够无限期地保持恒定的节奏。\n\
  *   持续关注技术卓越和良好设计能增强敏捷性。\n*   简单性——最大化未完成工作的艺术——是至关重要的。\n*   最好的架构、需求和设计出自自组织团队。\n\
  *   团队定期反思如何能变得更有效，然后相应地调整其行为。\n\n以下四项主要的*敏捷活动*（尽管最初是作为敏捷变体“极限编程”的一部分定义的）适用于所有敏捷方法论：\n\
  \n**边编码边设计。** 在现实世界领域中，所有需求通常无法预先完全知晓或正确理解。在架构设计、详细设计和编码过程中，难免会出现错误和疏忽。此外，在产品开发过程中，需求和约束可能会发生变化，因为没有任何项目存在于真空中，能够脱离现实世界事件，例如开发团队人员更替、因市场变化导致的客户需求更新、新技术的发展等等。敏捷软件开发模型一次构建产品的一个部分，每个产品增量都使得几个关键事件能够更早、更频繁地发生：向客户交付价值、收集反馈以及适应变化。边编码边设计让开发者拥有更多自由来选择如何完成任务，在增强开发者自主权的同时，也增加了他们自我管理的责任。\n\
  \n**直接沟通最佳，** 尽管“直接”的含义近年来已发生巨大变化。我们认为“直接沟通”是实时发生的，能够直接接触到言语和非言语线索，这包括面对面讨论、视频会议，甚至先进的虚拟环境。在任何给定的软件开发项目中，存在两种知识：1)\
  \ 客户拥有领域知识，并理解系统应该做什么；2) 开发者拥有关于目标平台、编程语言以及可能出现的实现问题的技术知识。客户不了解技术方面，开发者不具备领域知识，因此，双方的有效沟通是开发产品的关键活动。频繁的沟通意味着每个人都在从彼此的过程中学习，从而更快地建立起更全面的共同理解。\n\
  \n**代码是主要的可交付成果。** 计划驱动模型与敏捷模型之间的根本区别在于对代码的强调，因为代码是系统知识的所在。在计划驱动模型中，重点在于产出一套工作产品，这些产品共同代表项目的全部工作，而代码只是工作产品之一。在敏捷方法论中，重点明确地放在代码作为可交付成果上；此外，通过恰当地组织代码结构并保持注释更新，代码本身就成了项目的文档。\n\
  \n**测试驱动开发。** 所需功能的测试用例在开发之前编写，并且最初都应失败。一旦某个功能的所有测试都通过，该功能的实现即告完成。测试驱动开发对于管理变更至关重要，因为持续测试会告诉你，新功能何时完成并集成到系统中，且不会破坏任何已有的功能。\n\
  \n### 精益软件开发\n\n精益软件开发源于准时制生产流程（也称为丰田生产系统等），该流程于 20 世纪 70 年代在日本引入，随后在 20 世纪 80 年代和\
  \ 90 年代传播到世界各地，这得益于 1990 年出版的《改变世界的机器》^(¹⁷)（沃麦克等人著）的推动。准时制生产首先演变为精益制造，进而在整个 20 世纪\
  \ 90 年代演变为精益产品管理系统。2003 年，波彭代克夫妇所著的《精益软件开发：敏捷工具包》^(¹⁸) 的出版，标志着“精益”思想进入了“敏捷”开发社区。\n\
  \n*精益*软件开发是一套旨在消除*浪费*以提高生产力、质量和客户满意度的原则。*浪费*是指任何不能为产品增加价值的东西。因此，*精益*强调团队应只关注那些能立即为产品增加价值的活动。\n\
  \n波彭代克夫妇¹⁴ 将始于丰田的*精益*原则转化为软件开发的七项关键原则：\n\n*   消除浪费\n*   内建质量\n*   创造知识\n*   延迟决策\n\
  *   快速交付\n*   尊重他人\n*   整体优化\n\n我们将简要介绍每项原则，以说明它们如何应用于软件开发。\n\n\n\n## 精益原则一：消除浪费\n\
  \n*精益*软件开发的主要目标是消除*浪费*，即任何不能为产品增值，或会增加其成本或时间的事物。在软件开发中，*浪费*的主要来源如下：\n\n*   *未完成的工作*，因为它无法立即创造价值，并且可能在完成之前就已过时\n\
  *   *额外处理*，例如过多的文档/文书工作或不必要的会议\n*   *多余的功能*，这些功能很少（甚至从未）被使用，却占用资源并使代码变得混乱\n*   *任务/上下文切换*，这会因引入延迟并增加开发人员的认知负荷而降低效率\n\
  *   *等待*审批和依赖项会造成浪费性的瓶颈\n*   *工件和信息*的*移动*，如果没有必要的规范来确保工件/数据的组织和标签清晰一致且可用，就会造成浪费\n\
  *   *缺陷*，随着检测时间距离缺陷产生的时间越远，修复成本会越来越高\n\n在项目中减少各种浪费的一个通用方法是，持续反思团队的开发流程如何运作以及哪些方面可以改进（例如，“哪些是浪费的，我们如何改变它，以便下次减少浪费？”）。对工作流程进行小的迭代调整将导致整体开发*浪费*的减少。\n\
  \n## 精益原则二：内建质量\n\n质量问题会导致各种软件开发浪费。发现和记录缺陷、修复缺陷以及重新测试都会导致我们想要消除的浪费。“内建质量”指的是将质量直接关注并融入到软件开发流程中。\n\
  \n有许多技术可以提高开发流程的质量。两种从源头提升代码质量的流行技术是*结对编程*（两名程序员遵循一组预定义的实践一起编码）和*测试驱动开发*（TDD）（以通过所有先前定义的测试用例为目标来编写软件）。两者都允许开发人员在代码集成到产品代码库之前快速编写、测试和修复代码，因为一旦集成，缺陷将更难发现和修复。一旦新功能完成就立即集成，可以让测试团队尽快获得产品的新版本进行测试，并缩短代码创建与测试之间的时间。另一种相对无痛但有些争议的提高代码质量的方法是：不要将发现的缺陷记录在缺陷跟踪系统中，而是*立即*修复它。一旦发现就修复。这既内建了质量，又同时消除了浪费。^(¹⁹)\
  \ 另一种提高软件质量的技术是*持续反馈*。促进这种反馈的一种方法是让客户成为开发团队的一部分，允许对新迭代的产品进行直接重复评估，并为开发人员提供关于哪些是合适的、哪些需要更改的关键及时反馈。\n\
  \n## 精益原则三：创造知识\n\n在处理需求、创建设计和实施代码的过程中，团队必然在学习新事物。你通过努力理解需求来学习。你通过从一个初始设计开始，并意识到随着需求被更好地理解，设计必须如何改变来学习。你会学到更多关于领域、客户、工具、依赖项等方面的知识。因此，你们正在共同创造体现在你们所编写和交付的代码中的知识。\n\
  \n为了确保所有这些知识真正被“创造”（意味着它能长期留存，并允许团队通过保留这些知识真正地“学习”），一些短期实践是必要的。例如，如果一位团队成员学到了关于项目需求或依赖项的关键信息，他们必须确保这些信息可供团队其他成员使用。这可以通过一致的代码文档、组织良好的维基页面、依赖管理工具、有针对性的培训等来实现。总的来说，这些实践可以减少工件和信息的移动、额外处理，甚至缺陷。重点在于确保任何新信息不仅仅解决遇到它的人眼前的短期问题，而是真正转化为帮助整个团队提升其理解、技能和产品的知识。\n\
  \n## 精益原则四：延迟承诺\n\n这一精益原则实际上可以追溯到 20 世纪 70 年代初期以及自顶向下结构化设计的出现。延迟承诺意味着尽可能推迟决策（特别是不可逆转或影响重大的决策），并且只在绝对必要时才做出决策。\n\
  \n延迟承诺的一种方法是遵循灵活、分层和模块化的设计。在自顶向下的设计中，你可以从问题解决方案的通用表述开始，增加未来的灵活性，并将实现决策推迟到设计和代码需要变得更详细的时候。创建库和\
  \ API 可以让我们实现灵活的功能，而无需承诺其必须如何被调用，将这些决策留给每个功能的独立开发人员。这样，当你到达需要这些细节的层级时，通常可以获得更多信息，从而使代码能够更自然、更轻松地开发。\n\
  \n## 精益原则五：快速交付\n\n我们越快向客户交付价值，就能越早获得关键的客户反馈来指导未来的开发。此外，最小化从需求产生到交付满足这些需求的产品之间的时间，需求以及市场发生变化的时间也就越少。\n\
  \n那么如何快速交付呢？*精益*地运用这些原则（双关语）。保持需求清晰简单。不要添加太多功能，也不要花时间预先规划未来的功能。不要过度设计解决方案。找到合理的方法、合理的数据结构集以及合理的算法来实现你的解决方案。记住，完美是优秀和快速的敌人。追求“满意”而非“优化”：如果它对当前需求是一个合适的解决方案，就继续前进。最后，快速交付的一个关键途径是拥有一个经验丰富、高度整合、善于合作、自我组织、相互尊重且具备适合你产品技能的团队。团队真的可以成就或毁灭一个产品。\n\
  \n## 精益原则六：尊重人\n\n尊重人是建立有凝聚力、高效团队的关键。核心理念是，做工作的人应该做决策。流程和产品创建的决策不应自上而下强加，而应来自一线。从管理者的角度来看，尊重你的团队意味着授权团队做出自己的决策，包括关于任务时间估算与分解、流程、工具和设计的决策。这种授权意味着管理者必须学会倾听他们的团队，并考虑他们的想法和关切。这也意味着管理者必须充当团队的促进者和保护者，让他们能够完成工作。大家必须共同努力，创造一个每个人都能畅所欲言、分歧能以相互尊重的方式解决的环境。这将创建一个具有开放沟通和决策透明度的团队。更多内容将在下一章讨论。\n\
  \n\n\n## 精益原则七：优化整体\n\n> *“精益组织会优化整个价值流，从收到满足客户需求的订单开始，直至软件部署并满足需求为止。如果一个组织只专注于优化价值流中的某个环节，那么几乎可以肯定，整个价值流都会受损。”*^(²⁰)\n\
  \n优化整体的核心理念是，在开发过程中始终着眼于整个产品图景。避免短视的方法之一是组建多元化、跨学科、沟通顺畅的团队，该团队应具备交付真正满足客户需求的产品所需的所有技能和产品创建职能。\n\
  \n## 软件开发模型的实现\n\n> *“当我阅读这些内容时，我想大喊：给我画张地图！给我指条路！但所有作者所做的只是描述他们的足迹，谈论他们的鞋子，而这些鞋子总是最好的，是唯一真正的鞋子。”*^(²¹)\n\
  \n在实现任何软件开发模型时，关于通用方法的描述数不胜数，可能的调整方式不计其数，还有大量书籍和其他资源旨在指导你完成整个过程。因此，我们的目标并非提供详尽无遗或规定性的逐步实现细节。相反，在本节中，我们将回顾本章前面所提出理念的最著名实现。我们的目标是勾勒出每种方法的独特关注点，希望这不仅能帮助你区分它们，还能让你将它们混合使用，以更好地适应你的团队、项目、组织和客户需求。\n\
  \n### 瀑布模型：一种流水线方法\n\n计划驱动流程模型中最传统、最早出现的是瀑布模型。如图 2-2 所示，该模型由温斯顿·罗伊斯于 1970 年创建^(²²)，涵盖了所有标准生命周期阶段。它依次经过需求收集与分析、架构设计、详细设计、编码、调试、集成与系统测试、发布和维护。它要求每个阶段都有详细的文档，以及评审、文档归档、每个流程阶段的签核、配置管理和整个项目的严密管理。\n\
  \n![](img/270563_3_En_2_Fig2_HTML.jpg)\n\n一个流程流程图，展示了从概念开发、需求分析、架构设计、详细设计、编码与调试、系统测试，到发布和维护的流程。\n\
  \n图 2-2\n\n瀑布流程模型\n\n它同样行不通（至少对于小型项目以外的项目来说是这样）。*瀑布*模型存在两个根本性的相关问题，阻碍了它的接受度，并使其难以实施。\n\
  \n**问题 1：** *瀑布*模型要求你在完成阶段 N 之后才能进入阶段 N+1。\n\n**问题 2：** *瀑布*模型没有提供回溯到早期阶段进行调整的机制。\n\
  \n*瀑布*模型从根本上来说，就像一条用于开发软件的流水线。最初令人安心的瀑布阶段顺序推进要求所有步骤按顺序完成，并且由于无法返回并返工早期的开发阶段，每个阶段都必须完美完成。举个最简单的例子，这意味着你必须在开始架构设计之前精确确定*所有*需求，在开始单元测试之前完成编码和调试，以此类推。此外，每个阶段都必须有详尽的文档记录。理论上，这很棒。然而在实践中，这从未实现过。毫无疑问，在开始设计系统之前，拥有完整且被完美理解的需求集是理想的。可惜的是，我们从未见过一个项目从一开始就明确了所有需求，或者所有利益相关者都正确理解了这些需求，或者在具有动态现实需求和约束的实际项目开发过程中，重大事项没有发生改变。\n\
  \n因此，在一个阶段开始之前完成上一个阶段是有问题的，更不用说确保在前面的任何阶段中没有遗漏任何内容或需要更新了。你永远无法在你需要知道的时候，确切地知道你需要知道的一切。这就是为什么软件是一个*棘手的问题*。\n\
  \n尽管如此，*瀑布*模型仍然是一个出色的理论模型。它将生命周期的不同阶段隔离开来，迫使你在继续前进之前思考你真正需要知道什么。它也是一种开始思考大型项目的方法，将其分解为更小的阶段，并为管理者提供一个令人感到温暖而模糊的计划幻象。对于在定义明确的小型项目上工作的经验不足的团队来说，它也是一个合理的模型，因为它引导他们经历生命周期，并清晰地标明每个阶段发生了什么。大多数实施*瀑布*模型的组织都会对其进行修改，使其能够回溯一个或多个阶段，以便修复遗漏的需求或不合适的设计决策。这有所帮助，通常使瀑布模型变得可用，但回溯时更新所有相关文档的要求，即使这种版本也存在问题。\n\
  \n### 编码与修复“模型”：一种原型敏捷方法\n\n边编码边修复并不是一个正式的模型，但这是我们在独自或与一个伙伴进行小型项目时大多数人所采用的方式。这种编码与修复“模型”，如图\
  \ 2-3 所示，常常被用来替代实际的项目管理。在这种方法中，没有正式的需求，没有必需的文档，没有质量保证或正式测试，发布充其量也只是随意的。使用此模型时，甚至不要考虑工作量估算或进度安排。然而，当我们不需要与他人协调时，它又足够有吸引力且有用。\n\
  \n![](img/270563_3_En_2_Fig3_HTML.jpg)\n\n一个流程流程图，展示了从概念开发，到编码、修复和发布产品的流程。在编码和修复之间存在一个循环。\n\
  \n图 2-3\n\n编码与修复流程模型\n\n“*编码与修复*”只需要最少的时间来理解问题（通常是因为我们自己编造了问题/需求），然后直接跳入编码。编译你的代码并尝试运行。如果它不工作，修复你看到的第一个问题，然后再次尝试。继续这个“输入-编译-运行-修复”的循环，直到程序按照你的意愿运行且没有致命错误，然后发布它。我们都用过这种方法不止一次。\n\
  \n使用此模型创建的软件规模小，用户界面不够友好，且具有特殊性。由于没有真正提及配置管理，测试方面也做得很少，没有架构规划，可能对程序进行的代码审查也仅限于桌面检查，这种方法对于大多数软件开发来说可能非常危险。然而，它有一件事做得很好：由\
  \ 1-2 人小团队开发的快速、一次性、无需维护的项目。换句话说，适用于快速而粗糙的概念验证，例如验证架构决策、快速展示用户界面设计版本，或理解你正在处理的某个更大的问题。如果这让你想起了敏捷的迷你版本，那你的想法没错。这种方法极其灵活，允许我们迭代地从向目标迈进的过程中获得洞察。因此，我们认为*编码与修复*是原型敏捷模型。\n\
  \n\n\n### 敏捷开发实践\n\n> *最佳实践是迭代式增量交付，将每次迭代视为一个封闭的“迷你项目”，包含完整的需求、设计、编码、集成、测试和内部交付。在迭代截止日期，向内部利益相关者交付迄今为止（经过全面测试、全面集成）的系统。征求他们对这项工作的反馈，并将该反馈纳入下一次迭代的计划中。*\n\
  >\n> *（摘自《敏捷项目如何成功》*^(²³)*）*\n\n*敏捷*开发的核心在于适应性，根据项目范围、时间线、开发团队等因素的不同，其表现形式也多种多样。**教条式地应用**\
  \ ***敏捷*** **开发会破坏** ***敏捷*** **本身的灵活性。** 因此，尽管多年来已经设计出许多具体的*敏捷*方法，但在理解和实施过程中保持灵活性至关重要。下文将讨论其中几种实践，重点介绍它们的核心价值以及旨在帮助开发者践行这些价值的配套术语。\n\
  \n所有敏捷流程都旨在为软件开发过程提供敏捷性，但实现敏捷性的方式可能大相径庭。在阅读每种敏捷实践时，请牢记以下关键区别，并将其余规范视为描述性而非规定性的指南，用以说明如何将每种方法付诸实践：\n\
  \n*   **极限编程** 通过优先采用特定的软件工程实践（特别是结对编程和持续集成）来提供敏捷性。\n*   **水晶方法** 通过优先考虑人员及其互动来提供敏捷性，允许每个团队自行组织他们认为合适的方式。\n\
  *   **Scrum** 通过明确的短周期迭代（“冲刺”）来交付产品增量，从而提供敏捷性，但“短”的定义取决于项目范围。\n*   **看板方法** 通过任务从“待办”到“完成”的持续流动来提供敏捷性，其中剩余任务可以随时更改和重新排序优先级。\n\
  \n#### 敏捷方法论 - 极限编程 (XP)\n\n肯特·贝克和沃德·坎宁安大约在 1995 年创建了极限编程（XP），将其描述为一种“轻量级、高效、低风险、灵活、可预测、科学且有趣的软件开发方式”。^(²⁴)\
  \ XP 侧重于高效的技术开发，特别是结对编程和持续集成。\n\nXP 依赖于以下基本理念：\n\n*   **重度客户参与**：XP 要求始终有一名客户代表在场，以定义产品每次迭代的内容，并为每个中间版本创建所有验收测试。\n\
  *   **短迭代周期与频繁发布**：XP 通常使用几周或几个月的发布周期，每个发布由若干次迭代组成，每次迭代持续 3-5 周。\n*   **结对编程**：XP\
  \ 要求所有代码由两名开发者共同编写，定期（大约每 30 分钟）交替担任“驾驶员”和“领航员”角色。“驾驶员”负责编码，而“领航员”则在一旁观察，提出建议，思考设计和测试等。虽然这种方式编写的代码量可能较少，但生成的代码缺陷更少，从而提高了生产力。\n\
  *   **持续单元测试**（也称为测试驱动开发或 TDD）：XP 要求开发者首先为任何新功能编写单元测试，然后以通过预定义测试的方式开发这些功能。\n\n虽然所有敏捷方法都推崇直接沟通，但\
  \ XP 将这一理念扩展到了直接的编码沟通（既包括与结对伙伴的沟通，也包括与其余代码的沟通）以及直接的客户沟通。频繁发布需要持续集成和构建产品。每当一个编程结对完成一个功能或任务，并且该功能或任务通过了所有单元测试，他们就会立即集成并构建整个产品。然后，他们使用所有单元测试作为回归测试套件，以确保新功能没有破坏任何已检入的代码。如果确实破坏了某些东西，他们会立即修复。因此，在\
  \ XP 项目中，集成和构建一天可能发生多次。这个过程让团队每天都能很好地了解自己在发布周期中的位置，并为客户提供一个可以运行验收测试的已完成构建。拥有现场客户代表使得\
  \ XP 团队能够立即获得对新功能的反馈，并及早发现设计和需求问题。\n\n实施 XP 可能因团队和项目而异，但应涉及以下某些形式的实践：\n\n*   **计划游戏**：结合业务优先级和技术评估来确定下一个发布的范围。客户和开发团队需要决定下一个发布中将包含哪些故事/功能、每个故事的优先级以及发布时间。开发者负责将这些故事分解为任务，并估算每个任务的持续时间。持续时间的总和将决定哪些任务能在交付日期前完成。如果数字对不上，必要时会将一些故事移出发布。\n\
  *   **小型发布**：快速将一个简单的系统投入生产，然后在非常短的周期内发布新版本（1-2 个月，持续时间和规模取决于从业务角度看是否合理）。发布的范围和持续时间越大，估算就越困难。\n\
  *   **隐喻**：“一个关于整个系统如何运作的简单共享故事”，它取代了你的架构。隐喻必须是对系统的一致解释，并可分解为称为*故事*的更小片段。*故事*应始终使用隐喻的词汇来表达，并且隐喻的语言应为客户和开发者所共同理解。\n\
  \n\n\n*   ***简单设计***：每天尽可能保持设计简洁。经常重新设计以维持简洁。根据贝克的理念，一个简单的设计应当：(1) 通过所有单元测试，(2)\
  \ 没有重复代码，(3) 在代码中清晰表达每个用户故事的含义，(4) 使用最少数量的类和方法的合理组合来实现当前用户故事。^(²⁵)\n\n*   ***测试***：程序员持续编写单元测试。所有测试必须在集成前通过。贝克坚持一条硬性规定：“任何没有自动化测试的程序功能，本质上都不存在。”²¹\
  \ 虽然这条原则适用于大多数验收测试，并且理应适用于所有单元测试，但在某些情况下，例如测试图形用户界面（GUI）时，这种类比会失效。不过，如果你的测试框架能够处理\
  \ GUI 交互所产生的事件，那么即使是这种情况也可以实现自动化测试。除此之外，拥有一套完善的书面操作说明通常也能满足需求。\n\n*   ***结对编程***：在极限编程（XP）项目中，所有生产代码必须由两名程序员在同一台机器上编写。任何单独编写的代码都将被丢弃。这种做法通过将整个系统的知识传播给整个团队，从而强化了集体所有权。它避免了“啤酒车问题”——即当掌握所有关键信息的成员遭遇意外（比如被啤酒车撞到）时，会导致项目进度倒退数月。\n\
  \n*   ***集体所有权***：团队拥有整个项目及其所有代码，共同承担设计、编写、修改和测试所有功能的责任。这支持了“无我编程”，促进了高效的团队协作。\n\
  \n*   ***持续集成***：每完成一个任务就进行集成和构建，可能一天进行多次（只要所有测试都能通过）。这有助于通过将问题范围缩小到最新代码及其与现有代码库的交互，从而快速检测和隔离缺陷与错误。\n\
  \n*   ***重构***：在不改变代码外部行为的前提下，对代码的非功能性方面进行小幅改进，以使代码更清晰、更少冗余、更易读、更高效且更易于维护。*简单设计*原则要求你在发现需要时承担起进行重构的责任，而*集体所有权*则允许你重构他人编写的代码。\n\
  \n*   ***每周 40 小时工作制***：保持规律的每周 40 小时工作。绝不要连续两周加班。极限编程的理念与汤姆·德马科在《人件》中的许多论点高度一致。加班会导致人们工作效率降低，不得不在工作日处理私人事务，因疲劳而犯更多错误，对队友感到压力和烦躁等。拥有放松和恢复精力的时间，能让开发者在工作日内专注于工作，从而提高团队的整体生产力。\n\
  \n*   ***现场客户***：客户是团队的一部分，在现场工作，编写并执行功能测试，并帮助澄清需求。客户能够对系统变更提供即时反馈，这也增强了团队每天构建正确系统的信心。\n\
  \n*   ***编码规范***：由于代码集体所有权和持续重构，团队必须遵循合理的编码规范，以改善代码库内外的沟通。这些规范应使代码更易于阅读和维护，但不应限制创造力。\n\
  \n#### 敏捷框架 - Crystal：根据团队/项目需求灵活定制\n\nCrystal 是一种敏捷方法，最初由 Alistair Cockburn 在 20\
  \ 世纪 90 年代初于 IBM 工作期间提出。^(²⁶) 他注意到项目之间的差异很大，没有一套固定的项目步骤能适用于所有项目。因此，Crystal 围绕“人”而非流程或工具来组织。这意味着它关注人际互动，以及个人技能、才能和需求——这些因素在不同团队之间，以及同一团队内部随时间推移都会发生变化。\n\
  \n由于我们不专注于特定的流程，Crystal 没有正式的结构。相反，Crystal 开发信奉以下理念：\n\n*   ***所有项目都是独特的***。需要为每个项目确定工具和流程，并在发生变化时进行调整。\n\
  *   ***团队可以自我优化***。工具和流程需要既适合项目，也适合团队，因此团队本身应共同确定最适合他们的工作流程，并在开发过程中根据需要进行调整。\n\n\
  为了支持这些特性，Crystal 开发围绕以下 7 项原则组织：\n\n*   ***频繁交付***：频繁（该词是相对概念，取决于项目整体范围）进行测试和发布新版本。\n\
  *   ***反思性改进***：团队定期反思并改进实践和工具。\n*   ***渗透式沟通***：对于小团队是渗透式沟通，对于大团队则是封闭式沟通。\n*  \
  \ ***个人安全感***：创造一个让成员能够安全表达意见、建议和需求的环境。\n*   ***专注***：团队成员需要对整体蓝图和各自的任务有共同的理解。\n\
  *   ***便捷接触专家用户***：能够按需接触专家，以解决疑问、顾虑或理解上的空白。\n*   ***具备自动化测试、配置管理和频繁集成的技术环境***：当围绕人进行组织时，开发灵活性很大，因此频繁集成每个人的工作、通过自动化测试确保各部分独立及协同工作顺畅、并使用版本控制进行备份和部分发布，这些都至关重要。\n\
  \n你可以看到，Crystal 非常灵活，因此可以根据每个团队和项目的需求进行调整。对于较短的项目，Crystal 简化的组织框架和必需的流程可能是有益的，因为它允许团队专注于如何完成所需工作。这里的主要注意事项是，如果团队较新、规模较大或为远程团队，自我组织可能会变得棘手。\n\
  \n\n\n#### 敏捷框架 - Scrum：迈向下一短期目标的迭代冲刺\n\nScrum 的名称源于橄榄球运动，其中 *scrum*（争球）是一种在犯规后重新开始比赛的方式：橄榄球队中的\
  \ 8 名前锋（在英式橄榄球联盟的 15 人制比赛中）试图（重新）获得对球的控制权，并将其向前推进至对方球门线。敏捷 Scrum 方法论的理念是，一个小团队围绕一个共同目标团结起来，通过一系列开发冲刺（sprints）逐步向该目标迈进。\n\
  \nScrum 的原始流程管理理念源于 Takeuchi 和 Nonaka 于 1986 年发表的论文《新新产品开发游戏》^(²⁷)，而“Scrum”一词的首次使用则归功于\
  \ DeGrace 和 Stahl 于 1990 年出版的著作《棘手问题，正当解决方案》^(²⁸)。\n\n与其他*敏捷*方法论一样，Scrum 强调小团队、直接沟通、迭代开发、从频繁反馈中学习以及集体所有制的有效性。Scrum\
  \ 的独特之处在于其对团队管理的关注，以及其明确的时间盒式开发周期结构，称为*冲刺*。每个*冲刺*都有预定的持续时间（通常为 1-4 周），并有一个固定不变的交付日期。需要交付的工作范围必须根据此交付日期进行选择，同时确保在每个冲刺中都能向客户交付下一个最小可行产品（MVP）。每个*冲刺*的目标是提供一个原型，展示你对客户需求的最新理解以及交付解决方案的计划。展示这个原型（无论多么简陋）可以让你开始讨论哪些理解是正确的，哪些需要调整。确保这种情况尽早发生，可以限制在进一步开发之前为进行必要调整而需要返工的工作量。因此，*冲刺*“旨在创造条件，以便更早地做出更好的决策。”^(²⁹)\n\
  \n##### Scrum 角色\n\nScrum 在开发项目中明确定义了三个角色：\n\n*产品负责人*是生成产品需求并确定其优先级的人。这些需求通常以*用户故事*的形式呈现，这些是可以概括为“作为<某类用户>，我们希望<做某事>，以便<创造某种价值>”等句子的功能特性。产品负责人将用户故事添加到产品待办列表（Product\
  \ Backlog）中并确定其优先级。产品负责人还负责确保团队理解用户故事背后的需求。\n\n*Scrum Master* 是 Scrum 专家，通过指导团队遵循\
  \ Scrum 价值观和实践（例如每日站会）来促进开发，帮助团队自我组织（例如，通过提高透明度），帮助解决内部和外部的障碍，并在冲刺期间保护团队免受外部影响。Scrum\
  \ Master 绝不是团队领导/经理，因为 Scrum 团队是平等的团队，通过共识达成决策。\n\n*开发团队*包括所有其他成员：设计师、开发人员、文档工程师等。团队审查由产品负责人生成并确定优先级的用户故事，将每个最高优先级的用户故事转化为一个或多个任务，这些任务建议了如何开发必要的功能以交付价值。团队选择一组可以在给定冲刺周期内完成的故事和任务，通过共同决定谁将负责哪些任务以及他们将采用何种开发流程来进行自我组织。无论任务分配如何，团队集体拥有所有代码和项目，共同目标是在每个冲刺结束时交付下一个可运行的\
  \ MVP。\n\n##### Scrum 工件\n\nScrum 的需求被封装在两个待办列表中：\n\n*   *产品待办列表*是项目所有需求的优先级列表。产品负责人根据期望的*产品目标*，创建由用户故事组成的产品待办列表并确定其优先级。开发团队将高优先级的用户故事分解为任务并进行估算。这个任务列表就成为了*冲刺待办列表*。\n\
  \n*   *冲刺待办列表*是当前冲刺的用户故事优先级列表。冲刺开始后，只有开发团队可以向冲刺待办列表添加任务；这些通常是测试过程中发现的缺陷。任何外部实体都不能向冲刺待办列表添加条目，只能添加到产品待办列表。冲刺待办列表的核心是*冲刺目标*：团队遵循的指路明灯；冲刺期间的任何变更都应保护此目标。\n\
  \n*   *增量*是对产品目标的贡献，意味着达到了*完成的定义*，这是由组织（或团队，如果未另行定义）决定的正式质量衡量标准。在单个冲刺期间，可能有多个待办项达到“完成”状态。\n\
  \n##### Scrum 看板\n\n在大多数 Scrum 团队中，冲刺待办列表是*可视化的*，为每个人提供关于冲刺工作进展状态的清晰共享视图。它通过使用便利贴或索引卡在看板上呈现，每张便签或卡片代表一个任务；它也可以是在线虚拟看板（例如\
  \ Trello、Jira、Notion 或 Pivotal Tracker）。这个*任务看板*，如图 2-4 所示，通常至少包含三列：*待办*、*进行中*和*已完成*，但更常见的是还包括*产品待办列表*、*冲刺待办列表*以及用于测试的列，如*质量保证/评审*。在冲刺开始时，开发团队从*产品待办列表*中选择一些最高优先级的条目，并将它们移动到*冲刺待办列表*。然后这些条目被分解为任务，成为冲刺的*待办*项。这些任务将在看板上移动，直到完全开发、测试并集成到代码库后，到达*已完成*列。\n\
  \n![](img/270563_3_En_2_Fig4_HTML.jpg)\n\n一个标题为“冲刺目标”的表格，包含产品待办列表、冲刺待办列表、待办、进行中、质量保证和已完成等列。用户故事\
  \ A 和 B 从产品待办列表移动到冲刺待办列表的过程在开始时被标示出来。任务 1 到 5 在冲刺期间移动。\n\n图 2-4\n\n一个通用的单冲刺 Scrum\
  \ 看板。深色箭头表示冲刺规划期间条目的移动；浅色箭头表示冲刺期间条目的移动\n\n##### Scrum 价值观\n\n为了促进敏捷自组织团队所需的团队合作，Scrum\
  \ 依赖于个体践行以下价值观：^(³⁰)\n\n*   对共同目标和彼此做出承诺\n\n*   专注于冲刺目标和冲刺待办列表\n\n*   对工作和挑战（包括人际方面）保持开放态度\n\
  \n*   尊重彼此作为独立的个体，以及作为能够为共同目标做出贡献的成员\n\n*   有勇气处理困难任务，进行艰难的对话，并通常“做正确的事”\n\n\n\n\
  ##### Scrum 仪式\n\nScrum 团队会举行几种会议，帮助团队进行自我组织。\n\n*Sprint 计划会议*：这是一个初始规划阶段，负责创建初始需求的产品列表，决定实现需求的架构，将用户故事按优先级分组到各个\
  \ Sprint 中，并将第一批用户故事分解为待估算和分配的任务。当估算占满 Sprint 允许的所有时间时，他们便停止规划。Sprint 中的任务不应超过一天的工作量，理想情况下应能一次性完成（以避免任务切换）。如果某个任务预计需要超过一天的工作量，则应将其连续拆分为两个或更多任务，直到每个任务的工作量都合适为止。这条规则源于一个观察：人类不擅长对大型任务进行精确估算，以周或月为单位估算任务工作量基本上只是猜测。因此，将任务分解成更小的部分，能让团队对每个任务做出更可靠的估算。\n\
  \n*每日站会*是一个短会（15-30 分钟；越短越好），整个团队在此讨论 Sprint 的进展。每日 Scrum 会议让团队能够分享信息并跟踪 Sprint\
  \ 进度。通过举行每日 Scrum 会议，任何进度延误或实施中的问题都会立即显现，并可由团队当场解决。“Scrum Master 确保每个人都在取得进展，记录会议中做出的决定并跟踪行动项，并保持\
  \ Scrum 会议简短且聚焦。”^(³¹) 在每日站会期间，每位团队成员依次回答以下三个问题：\n\n> *自上次会议以来，你推动了哪些开发进展？*\n\n\
  > *从现在到下次会议之间，你计划如何进一步推动开发？*\n\n> *有什么阻碍你前进吗？*\n\n请注意，这些问题的措辞可以稍作调整，但其核心意图必须保留。除回答这三个问题之外的讨论，将推迟到其他会议进行。每日站会对于帮助每个人跟踪朝着共同\
  \ Sprint 目标的进展、促进协作以及提高责任感和参与度至关重要。\n\n*Sprint 评审*在每个 Sprint 结束时举行，向产品负责人展示新开发的\
  \ MVP（通常以演示形式），产品负责人可对其进行验收测试。该会议“评审”了本 Sprint 中为达成 Sprint 目标而“完成”的所有事项，以及哪些事项被遗漏及其原因。\n\
  \n*Sprint 回顾会议*在 Sprint 评审之后举行，旨在“回顾”团队的合作方式：他们的流程、沟通、协作机制、会议期望等，寻找可以在下一个 Sprint\
  \ 中改进绩效的领域。回顾会议是改进的关键工具，因为它负责团队工作本身的敏捷迭代改进。回顾会议标志着当前 Sprint 的正式结束。\n\n*待办事项梳理*或*故事时间*会议在整个\
  \ Sprint 期间定期举行（例如每周一次），以梳理待办事项列表中的条目，确保它们为未来的 Sprint 规划做好准备。产品负责人通过添加和（重新）排列故事优先级来参与，开发人员则通过将高优先级的故事分解为任务来参与。\n\
  \n虽然 Sprint 通常在预定义的 Sprint 周期结束时结束，但如果 Sprint 计划的所有工作都已提前完成，也可以提前终止。虽然可以添加新工作，但通常最合适的做法是完成所有\
  \ Sprint 结束和 Sprint 规划的流程，以便恰当地评审已完成的工作，回顾工作方式，并规划下一步的开发步骤。\n\n##### Scrum 速度\n\n\
  对于大多数团队而言，随着项目进展，任务的估算会变得更好，这主要是因为团队现在掌握了之前 Sprint 中估算表现的数据。单个 Sprint 中完成的工作量度量称为*速度*。随着时间的推移，这能让团队决定每个\
  \ Sprint 应包含多少任务。通过有意义的回顾会议以及由此带来的团队流程和实践的迭代改进，随着团队在分解和分配任务、为每个任务所需工作创建准确估算以及相互协作方面变得更加熟练，速度应会随着时间的推移而提高。\n\
  \n##### Scrum 项目结束\n\n在最后一个计划好的开发 Sprint 之后，可能会执行一个最终 Sprint 来为项目收尾。此 Sprint 不实现新功能，而是为产品发布准备最终可交付成果。它修复所有剩余的错误，完成文档，并通常对代码进行产品化。产品待办事项列表中剩余的任何需求都将转移到下一个版本。在下一个\
  \ Sprint 开始之前，会举行一次 Scrum 回顾会议，以反思上一个 Sprint，并查看是否有任何流程改进可以实施。\n\n#### 敏捷框架 - 看板：有限流量的持续流动\n\
  \n看板方法是一种源自精益制造（丰田生产系统）和其他变革管理系统的实践；它的大部分原始思想来自准时制制造流程。看板更像是一种方法论而非流程；它是一个目标以及一套实现该目标的原则和实践。\n\
  \n\n\n##### 看板\n\n为了帮助组织开发工作，看板采用了以下概念：\n\n*   *在制品（WIP）* 是指团队当前正在处理的任务总数，包括任务可能处于的所有状态（进行中、已完成、测试中、审核中等）。\n\
  \n*   *流程* 是指任务在完成过程中从一个状态转移到另一个状态的过程。\n\n*   *前置时间*：团队将任务从最初的“待办”状态推进到“完成”状态所需的时间（以小时或天计）。随着时间的推移，随着团队完成越来越多的任务，可以计算出团队的平均前置时间，从而预估任何单个任务需要多长时间才能完成，这可以作为衡量生产力的一种指标。\n\
  \n看板的独特之处在于工作的持续流动。它没有限时冲刺，因此也没有包含团队接下来要关注的任务子集的较小冲刺待办列表。所有剩余的待办事项都位于一个单一的待办列表中。为了帮助团队组织工作，看板使用了*泳道*：用于对任务进行分段的水平分隔线。泳道可以表示任何有用的分类，包括任务优先级、任务类型、不同的项目/产品，甚至不同的团队。\n\
  \n当所有剩余任务都位于待办列表中时，限制在制品数量是让团队专注于流程的方式。开发人员可以使用*看板*（Scrum *任务板*的一种变体）来异步跟踪在制品和流程。图\
  \ 2-5 展示了一个通用的任务/看板。这些看板可以是占据团队公共空间一面墙的实体白板，也可以是共享的数字看板。团队会在这个看板上添加实体或数字的便利贴来标识任务，然后可以将这些任务在看板的列与列之间（即状态与状态之间）移动。\n\
  \n![](img/270563_3_En_2_Fig5_HTML.jpg)\n\n一个表格包含 4 列，分别标记为产品待办列表或待办、进行中、质量保证或审核、以及完成。产品待办列表包含从令牌\
  \ 1 到令牌 9 的 9 个令牌。这些令牌分组在泳道 1、泳道 2 和加急之下。\n\n图 2-5\n\n一个通用的任务/看板，包含 WIP 上限和泳道，箭头表示流程\n\
  \n使用这种看板，用户可以选择更改列的数量和标题，以使看板适应他们的流程。看板通过使用*拉动系统*来运作：看板不是将项目推送到其他阶段，而是告诉开发人员在有能力处理时从上一阶段拉取项目。每完成一个任务，团队就会拥有一个添加了新功能的可运行软件。\n\
  \n然后，团队可以指定允许同时处理的最大任务数量（即“进行中”和“质量保证/审核”），这被称为在制品或 WIP，用于控制工作流经团队的过程。WIP 没有硬性规定，但应考虑：1）团队人数，以及\
  \ 2）每个人应同时处理多少任务。一般建议是每人 1 到 2 个任务。例如，假设看板上的每个状态都已达到上限（开发中有 N 个任务，审核/测试中有 M 个任务），并且一名开发人员完成了一个新任务的开发。在审核中的某个任务完成之前，这个任务无法移动到“审核”状态。我们刚刚暴露了工作流程中的一个瓶颈。在看板中，该开发人员会介入帮助审核该状态下的某个任务。在下游为已完成的任务腾出空间之前，不能将任何新任务拉入“开发”状态。\n\
  \n在看板中，目标是在任何时候允许的最大任务数量的约束下，最大化在制品。它不像 Scrum 那样有时间盒限制；目标是在尽可能快地推动任务（拥有最短的*前置时间*）的同时，通过达到允许的最大任务数量来最大化生产力。\n\
  \n你可以注意到，当我们说*最大化* *WIP*时，我们并不是要给团队更多的工作。事实上，保持每个状态的任务数量尽可能少的目标是为了减少团队的工作量，让他们专注于更少的任务（我们希望避免多任务处理）。其理念是，这将减少压力和昂贵的任务切换，同时提高工作质量*和*吞吐量。你会注意到这里缺少了一些东西，特别是事情如何进入待办列表，以及“完成”意味着什么。这是因为看板实际上并不是一种项目管理技术。为了使用看板，你需要已经具备一些流程，并且需要对其进行管理。\n\
  \n## 用于多层级关注点和范围的混合软件开发方法\n\n多种软件开发理念，甚至多种实现方式，可以在同一个组织、团队或项目中有效地共存。你可能需要选择几种方法，以便在不同的时间和关注层级上帮助你组织工作。考虑到整个公司需要组织起来，一个项目需要组织起来，开发工作也需要组织起来。\n\
  \n> *“虽然所有敏捷流程都有共同点，但它们的最佳应用点针对特定的组织层级：为不同的受众提供不同的‘视图’。精益在应用于关注战略、组织和股东价值的人（高管）时表现出色。Scrum\
  \ 在应用于关注团队组织、管理和项目交付的人（项目管理）时表现出色。极限编程在应用于关注开发交付和战术的人（开发人员）时表现出色。”*^(³²)\n\n最值得注意的是，这不是*精益*与*敏捷*的对立，而是至关重要的*精益*与*敏捷*的结合，其中*精益*侧重于通过减少浪费来改进流程，而*敏捷*侧重于通过在整个项目中有效地适应新信息来改进产品。两者对于软件开发都至关重要。此外，*敏捷*并不意味着没有*计划*，因为对未来考虑不足可能导致早期决策错误；更好的视角是借鉴*精益*的延迟承诺，以确保早期决策不会消除未来可能有用的选项。以下是这些理念的实现方式可以相互配合的几种方式：\n\
  \n*   精益可以自然地与 Scrum 结合，因为敏捷允许早期反馈，减少需要返工的工作量，并且团队成员之间清晰共享的理解可以减少动作浪费、缺陷、未充分利用人才、过度生产和等待。\n\
  \n*   由于 XP 主要关注编程，开发工作可以轻松受益于 Scrum 中定义的团队管理。\n\n*   在编码单个功能时，开发人员自然会采用小型瀑布模型，制定计划并遵循计划来开发和测试每个新功能。\n\
  \n*   在首次公开发布之前的开发阶段，使用 Scrum 可能最有成效，而提供持续服务和快速变化的项目则可能通过看板更好地体现，从而允许采用持续的方法。\n\n\
  *   Scrum 非常适合那些离散增量有意义且致力于首次发布的项目，而看板则自然适用于持续运营，例如提供持续服务；Scrumban^(³³) 是一种融合方法，允许在开发新功能的同时提供持续服务。\n\
  \n从本章描述的方法论可以看出，迭代和协作是关键。构建复杂软件最有效的方式是逐步收集见解，在每一步中学习要制作什么以及如何做得更好。你必须认识到，你从一开始就从未掌握所有知识，而设计、编写、测试和交付渐进式改进的代码，是通往创建卓越软件最可靠、最有效的途径。\n\
  \n\n\n"
- "# 3. 项目管理基础\n\n> *“任何项目的第一步，都是严重低估其复杂性和难度。”*\n> \n> ——尼科尔·亨特\n\n项目一旦启动，就需要进行管理。你需要管理进度、人员、流程，而最重要的是管理好你自己（无论你在团队中扮演什么角色）。管理开发没有唯一正确的方法，但有一些方法可以做得很好，而更多的方法则会导致糟糕的结果。多年来，我们确实发现了一些成功与失败的方法，所以让我们努力让你的旅程少一些风险。外面的世界很危险，请收下这一章！\n\
  \n从事个人开发项目以外的任何工作都意味着在团队中工作；而在团队中工作则意味着被管理，无论是来自上级还是来自内部。因此，从双方角度学习项目管理是学习软件开发的重要组成部分。项目管理可以被视为管理工作和管理人员，因此我们将本章分为两个主要部分：\n\
  \n1.  *项目规划*：日常任务的管理方式在很大程度上取决于所选的软件开发模型，你在前一章已经了解过。剩下的部分是在项目开始之前需要确立的项目要素（即项目规划任务）：\n\
  \    1.  组织架构\n\n    2.  风险分析\n\n    3.  资源需求\n\n    4.  任务估算与进度安排\n\n    5.  缺陷管理\n\
  \n2.  *软技能意识开发*：在任何项目中，必须管理的最重要且最复杂的方面是人。开发人员和管理者不仅是一种宝贵的资源，更是开发生态系统的核心。维护和支持这个具有复杂动态的生态系统，不仅会影响当前项目的成功，还会影响后续所有项目。在本章的后半部分，我们将通过讨论以下内容，回顾我们为何以及如何在开发过程中努力成为“软技能意识开发者”：\n\
  \    1.  团队协作的阴暗面\n\n    2.  支持个体\n\n    3.  支持文化\n\n    4.  将冲突视为机遇\n\n    5. \
  \ 团队协作的产物\n\n## 项目规划\n\n项目计划是一个很好的工具，用于明确你认为自己正在做的事情、如何完成的概要，以及你计划如何执行该概要。项目计划的问题在于，一旦它被编写并签署，高层管理人员就会认为项目将完全按照计划中所述的方式运行。但项目的现实往往会挫败计划。\n\
  \n项目规划是永恒的；它贯穿项目的整个生命周期。“计划”从来都不是一成不变的，因为典型的软件项目通常处于不断变化之中。在使用计划驱动流程模型的项目中，项目计划是一份由项目经理编写、开发团队和高层管理人员批准并签署的实际文档。实际上，它是一份*合同*，尽管是滚动式的，规定了团队将要做什么以及如何做。它说明了项目将如何管理，在最极端的计划驱动项目中，甚至规定了文档本身如何以及何时进行修改。\n\
  \n### 项目规划：组织架构\n\n在工作开始之前，你需要决定如何组织开发。如果你与经验丰富的团队合作，可以重用之前的组织文档，但绝不应跳过这一步。项目组织的两个主要方面（通常相互交织）是开发工作和人员：\n\
  \n*   你打算如何*组织产品*？（瀑布式还是迭代式开发？版本控制工具？项目范围与进度？）\n\n*   你打算如何*组织制造产品的人员*？（团队组织/层级结构是什么？每个人何时以及如何沟通与协调？）\n\
  \n在所有利益相关者之间就进度安排和期望达成明确共识并拥有精确的共同理解至关重要。选择开发流程模型（见前一章）将为你提供许多关于如何组织项目的答案。例如，任何敏捷项目都将围绕功能展开，并需要迭代进度安排，每次迭代都以规划开始，以最小可行产品结束。敏捷团队在层级上是扁平且自组织的，由团队（而非项目经理）拥有敏捷项目计划，并要求在多种开放渠道上进行频繁沟通。敏捷团队还共同拥有所有代码，因此要求每个人都遵循共享的代码管理实践，例如用于源代码控制的\
  \ git-flow 分支策略。将流程模型从敏捷缩小到具体实现（如 XP、Scrum、Crystal、功能驱动开发等）将进一步明确组织产品和人员的细节。\n\n\
  \n\n### 项目规划：风险分析\n\n接下来我们需要思考风险分析。一个项目可能出现什么问题？当问题出现时我们又该如何应对？让我们看看一些可能的风险^(³⁴)：\n\
  \n*   **进度延误**：你预估需要三天完成的任务，结果花了三周。在计划驱动的项目中，如果你没有定期召开状态会议，这可能会成为一个问题。等了三周才告诉老板你进度落后，总比一知道要延期就立刻告知她要糟糕。不要拖延传递坏消息。在敏捷项目中，这种情况不太可能发生，因为大多数敏捷项目都有每日状态会议（或站会）。这样进度延误几乎能立即被发现，并可以迅速采取纠正措施。\n\
  \n*   **过高的缺陷率**：你的测试发现了大量错误。你该怎么办：继续添加新功能，还是停下来修复错误？同样，在那些按固定计划（比如每周一次）进行集成构建的项目中，这可能是一个真正的问题。在每天或每次添加新功能时都进行集成的项目中，你可以更容易地跟上缺陷的处理。无论哪种情况，如果你正经历高缺陷率，最好的做法是停下来，审视全局，在添加更多功能之前找到缺陷的根本原因。从项目管理的角度来看，这很难做到，但最终你会感谢自己这么做。\n\
  \n*   **需求被误解**：你所做的并非客户想要的。这个经典问题源于客户和开发者生活在两个不同的世界。客户生活在应用领域，他们从用户的角度理解自己想要产品做什么。开发者则从技术角度理解产品将如何工作。有时，这两个世界会交汇，这很好；但通常它们不会，这就是需求被误解的根源。最好的方法是尽可能让客户在场，并尽可能频繁地交付可交付的产品。\n\
  \n*   **需求变更**：新功能、功能修改、功能删除……无休止的需求变更很可能是导致交付日期延误、缺陷率高和项目失败的最大单一原因。当客户（或你自己的市场人员，或开发团队本身）在开发过程中持续更改需求时，就会发生需求变更。这会导致大量的代码返工、基线重新测试，以及一次又一次的延误。管理需求是项目经理最重要的工作。在计划驱动的流程中，变更控制委员会（CCB）会审查每个新需求，并决定是否将其添加到待实现的功能列表中。CCB\
  \ 中可能有一名开发团队成员，但这并非强制要求，因此风险在于 CCB 可能在未完全理解所有进度和工作量影响的情况下添加新功能。在敏捷流程中，开发团队控制着优先级排序的需求列表（在\
  \ Scrum 中称为产品待办列表），并且只在项目的设定时间点——在 XP 中是在迭代之后，在 Scrum 中是在每个冲刺之后——调整该列表。\n\n*   **人员流失**：你最资深的开发人员在产品交付前三周决定加入一家初创公司。减少人员流失的最佳方法是：(1)\
  \ 给开发人员有趣的工作，(2) 让他们在愉快的环境中工作，(3) 让他们掌控自己的进度安排。奇怪的是，金钱并不是软件开发人员的首要激励因素之一。这并不意味着他们不想获得高薪，但确实意味着为了让他们更努力工作或留住他们而给他们更多钱，通常并不奏效。尽管如此，即使你尽了最大努力，一些开发人员还是会离开。减轻人员流失影响的最佳方法是在开发团队的所有成员之间分散项目知识。像**集体代码所有权**这样的原则和**结对编程**这样的技术，有助于让所有团队成员都投入到项目中，并将代码知识分散到整个团队。我们将在本章的“软体开发”部分进一步讨论如何支持开发人员并维持健康的工作场所文化。\n\
  \n一旦你列出了项目的风险清单，就需要逐一处理，并讨论两件事：**规避**和**缓解**。针对每个风险，思考如何规避它。在你的进度中预留缓冲时间，进行持续的代码审查，尽早冻结需求，频繁发布，要求结对编程以分散代码知识，等等。然后你需要思考，如果最坏的情况真的发生了，你该怎么办；这就是**缓解**。从发布中移除功能，停止新功能开发并进行错误排查，将新功能协商到未来的发布中，等等。如果一个风险变成了现实，你必须采取**某些**措施；提前计划好要做什么会更好。\n\
  \n一旦你处理了规避和缓解措施，你就会有一个如何处理可识别风险的方案。这并不能让你完全免责，因为总会有你遗漏的风险，但处理你确实想到的风险的经验，将使你能够更好地处理项目中那些让你措手不及的新风险。当使用迭代过程模型时，最好在每个迭代之后重新审视你的风险，看看哪些发生了变化，识别出任何新的风险，并移除那些不再可能发生的风险。\n\
  \n### 项目规划：资源需求\n\n你的项目需要资源。项目需要多少人？他们是都需要同时开始，还是他们的项目开始日期可以随着阶段的启动而错开？你需要多少台计算机？你将使用什么软件进行开发？你需要什么样的开发环境？每个人都接受过该环境的培训吗？你需要哪些支持软件和硬件？是的，无论你使用什么过程模型，你都需要一个配置管理系统和一个独立的构建机器（通常是云服务器上的虚拟机）。拥有一台每天构建产品新版本的单一机器，可以让你控制编译和构建中的所有变量。这包括但不限于构建机器所使用的操作系统版本以及程序所使用的每个库的确切版本。这种一致的构建环境确保你每次都能获得正确版本的新产品构建。\n\
  \n你所针对的平台以及你工作的应用领域可以回答许多这些资源问题，所以这部分相对容易。关于团队规模、开始日期和项目阶段的问题，很可能在你对工作量估算和进度安排进行首次尝试之前无法回答，因此迭代方法在这里可能有用。此外，一些资源可能会带来权衡，或迫使项目范围发生变化。考虑替代方案可能需要所有直接利益相关者的参与。\n\
  \n\n\n### 项目规划：任务估算与进度安排\n\n制定项目进度的第一步，是明确你要做什么，以及每个步骤需要多长时间。这是一个经典的“先有鸡还是先有蛋”的问题：除非你将功能或用户故事相当细致地分解为具体任务，否则你无法真正进行估算。但你的经理总是希望你在开始设计之前就提供工作量估算和进度数据。要抵制这种要求，优先在初步了解需求后进行设计。选择一小批高优先级的需求，为该功能集设计解决方案，然后仅对该功能集进行工作量估算。不必担心需求可能会变化；它们肯定会变，因此过早地进行分解和估算作用非常有限。你需要将功能详细分解为可执行的任务，才能进行工作量估算，因此这需要逐步进行。永远不要相信任何告诉你“那个功能需要六个月才能完成”的人。那纯粹是瞎猜，与现实几乎毫无关系。你根本无法估算如此庞大的东西。你最多只能说：“我曾经在一个团队里，花了六个月实现过一个类似的功能。”即便如此，这也只是略有帮助。\n\
  \n估算的口诀是：*先估算规模，再估算工作量，最后制定进度*。整体工作应分解为最多一周内能完成的任务，理想情况下是一到两天。将工作分解为定义明确的小任务，会迫使你更深入地思考如何完成它。小到可以一次性完成的任务，已经能大大降低任务切换带来的认知和技术成本。\n\
  \n*规模*始终需要优先考虑，因为只有当你对工作有多大有了概念，才能弄清楚它需要多长时间。一旦你有了一个合理的任务列表，就可以开始进行规模估算。规模可以指多种事物，具体取决于你的工作分解方式和开发模型：功能模块、类数量、方法数量、功能点数量、对象点数量或故事点数量。\n\
  \n接下来是*工作量*估算。任务应以*人时*为单位进行估算。有几种技术可用于获取工作量估算：COCOMO II^(³⁵)、功能点分析法和德尔菲法只是其中三种。然而，所有这些方法都依赖于能够统计设计中的各项内容。德尔菲法是一种快速且相对高效的估算技术。这里有一种简化的运作方式：找三位你最有经验的开发人员（那些经验最丰富，因此应该能给出较好估算的人），将任务分解列表交给他们（假设他们之前没有参与初始分解——这是理想情况）。为了估算每个任务的工作量，请他们给出三个以人时为单位的数字：最短可能耗时、最长可能耗时和典型可能耗时。计算平均最短时间、平均最长时间和平均典型时间，并使用这些平均值来指定预期的工时范围（最小-最大）以及该任务的典型预期工作量。请注意，你需要开发人员来进行这些估算。经理永远不应该做开发估算。即使经理过去曾是开发人员，除非他深度参与实际的开发工作，否则也不应参与开发估算。\n\
  \n为了提高任务估算的长期准确性，你需要追踪每个任务的*速率*，这是敏捷方法论中的一个术语，^(³⁶) 定义为任务的估算工作量除以实际工作量。速率高于 1.0\
  \ 意味着任务实际耗时少于估算；速率低于 1.0 意味着任务实际耗时多于估算。任务速率有助于你了解自己悲观高估或乐观低估的倾向，最终帮助你做出更好的估算。理想情况下，随着开发人员经验的增长，他们每个任务的速率将趋近于\
  \ 1.0，稳定在 0.85-1.15 的范围内，从而使整体进度更加准确。如果某个开发人员的速率波动剧烈（一个任务 0.6，另一个 1.8，第三个 1.2），那么可能有必要进行估算技术的速成培训。\n\
  \n一旦你确定了第一个发布版本或迭代中任务的规模以及每个任务的人时工作量估算，就可以着手创建*进度表*了。在你查看那张漂亮的甘特图，以及标记发布日期的那个醒目的黑色菱形之前，有几件事需要考虑：\n\
  \n*   让开发人员明确任务之间的*依赖关系*，因为依赖关系会推迟你的交付日期。虽然有些任务可以同时开始，但有些任务必须等其它任务完成后才能开始，或者可以在其它任务完成一半时开始。\n\
  \n*   弄清楚你的*工作周期*（系统处于活动状态的时间比例）。在每个八小时工作日中，你的开发人员实际用于*开发*的时间有多少小时？请记住，阅读邮件、参加会议、进行代码审查、休息等都会消耗时间。整体企业文化对工作时间利用率的影响很大。你不能假设一个八小时的任务能在一天内完成。实际上，在每个八小时工作日中，有\
  \ 2-4 小时会被其它事情占用，因此你的开发工作周期可能低至 50%（四小时，即八小时工作日的一半）。\n\n*   在制定进度表时，要考虑周末、假期、病假、培训和缓冲时间。如果你的高级开发人员有一个任务处于项目的关键路径上，你可能需要知道她五月份要参加那个为期一周的研讨会。\n\
  \n*   你不应该安排一个开发人员同时处理两个任务。大多数项目进度规划软件默认不允许这样做，但大多数也允许你覆盖此设置。请不要这样做。你可能会为了满足经理或市场团队要求的截止日期而忍不住这样做，但请尽力抵制诱惑。最终，当你无法按时完成时，你只会不得不再次修改进度表。\n\
  \n*   最后，你必须有一些方法来跟踪项目进度，以指定任务、截止日期、优先级、估算以及负责任务的开发人员。虽然完整的项目管理工具一开始可能显得大材小用，但它们通常足够灵活，能够适应不同的项目需求，而不会带来太多额外负担。使用像\
  \ Jira、Notion 或 Trello 这样的真实项目管理应用程序，它们提供了许多功能，使得保持进度表更新变得容易得多。\n\n\n\n考虑自动化能为每个人了解项目状态带来的好处：自动提醒、日历集成、将任务分配给开发人员以及更新通知。项目管理工具还可以自动跟踪各种指标（例如任务速度），生成可视化图表以更好地理解这些指标（例如展示整个项目中平均速度的变化），并将项目信息组织成不同的便捷布局（例如按任务类型和开发人员对速度数据进行分组）。对于团队（即使是\
  \ 10 人或以上的中等规模团队），自动跟踪项目依赖关系有助于管理谁在做什么以及何时做。这种认知对于具有短时间盒迭代的敏捷开发尤为关键。在规划每个冲刺时，你需要了解产品待办事项列表中每个用户故事的优先级以及它们之间的相互关系。你必须跟踪冲刺待办事项列表中任务的进度，而了解依赖关系可能是实现冲刺目标与未能实现之间的关键区别。\n\
  \n项目管理工具也有助于工作量估算，因为按小时估算对人来说可能非常困难。一些项目管理工具会要求你使用量级来创建估算。最简单的类型让你使用*小*、*中*或*大*进行估算，而其他工具则允许你为每个任务分配一定数量的点数，例如，每个任务\
  \ 1、2、4 或 8 个点。这使得汇总团队在每个时间盒迭代中试图实施的总点数变得容易，并且随着时间的推移，可以得出团队每个迭代平均能实施的点数。\n\n###\
  \ 项目规划：缺陷管理\n\n抱最好的希望；做最坏的打算。不可避免地，你会在程序中引入缺陷。项目计划应考虑到持续测试的需求，并且进度安排中应留出处理任何已发现缺陷的空间。作为开发人员，你的目标有两个：\n\
  \n*   在你编写的代码中尽可能少地引入缺陷。\n\n*   在发布代码之前尽可能多地发现它们。\n\n然而，尽管你尽了最大努力，你发布的代码中仍会包含缺陷。这是不可避免的。对于任何规模的程序来说，程序中可能的路径太多，引入错误数据的方式也太多，以至于不可能没有缺陷。你的目标是发布时尽可能少地带有缺陷，并且使这些缺陷不会真正影响产品或性能。为了实现这一目标，大多数开发组织都有一套缺陷等级来表征缺陷的严重程度，例如致命（程序崩溃）、严重（主要功能损坏）、较重（功能损坏但有变通方法）、轻微（小问题）和功能请求（未来希望拥有的功能）。这些缺陷等级通常被内置到缺陷跟踪系统中。\n\
  \n每当你在代码中发现缺陷时，就在缺陷跟踪系统中提交一份缺陷报告，让开发人员和管理者能够看到当前缺陷的数量和严重程度。在修复缺陷时，开发人员会从最严重的开始，然后依次向下处理。\n\
  \n## 软技能开发\n\n> *“当（项目经理）启动任何项目时，他们肩负着艰巨的任务：弄清楚并管理众多不同利益相关者的期望。但是，当（项目经理）能够认识到这些期望的根源，扮演起夫妻顾问的角色，建立有意义的、个人的、信任的关系，并确保更广泛的团队专注于整体目标时，他们就能成功地管理每个人的期望，同时引导项目跨越那条令人垂涎的终点线。”*\n\
  >\n> —艾米·肖恩塔尔^(³⁷)\n\n> *“管理者的职能不是让人们工作，而是让人们有可能工作。”*\n>\n> —汤姆·德马科，蒂莫西·李斯特^(³⁸)\n\
  \n当我们说“团队项目”时，你首先想到的是什么？是压力？恼怒？担忧？还是对即将到来的轻松任务的解脱？想想我们大多数人是如何了解团队协作的：我们被要求在学校项目中合作，但通常没有被教导如何合作。由新手自我管理的临时短期小组项目通常会导致有缺陷且不可持续的长期应对策略，例如独自承担团队工作或搭便车。毕竟，我们很可能再也不用和这些人一起工作了！关于功劳和责任的归属问题也层出不穷。最终，学生们会认为团队合作是有害且不愉快的^(³⁹)。在通过多个压力重重的课堂项目反复强化这些做法和信念之后，学生们毕业并走向世界。当然，问题在于，现实世界是建立在人际关系网络之上的：与你的同事、老板、下属、客户、公众等建立并维持关系。那些相同的短期应对策略根本行不通，因为现实世界（如同北方一样）会记住一切！\n\
  \n在本章的剩余部分，我们将介绍什么是“软技能意识”（Soft-Aware），以及有缺陷的团队合作如何对开发人员和开发工作产生负面影响。然后，我们将探讨支持个人和创建安全的共享文化如何促进健康且可持续的协作。最后，我们将研究如何将这些理论付诸实践，通过一系列团队协作工件，形成一个共同学习和改进的敏捷过程。^(⁴⁰)\n\
  \n*软技能开发*是一种新的范式，它将个人、人际关系和工作场所文化视为健康、可持续的软件联合创作的核心。具备*软技能意识*包括构建软件、构建利益相关者关系，以及在此过程中培养每一位开发人员。*软技能开发*一词最早由卡扎科娃博士^(⁴¹)在向计算机科学本科生教授基于团队的软件开发时提出。其重点是培养开发人员的专业素养和人际交往能力，因为在尝试制作软件的过程中，*学习如何合作*比学习制作软件本身更为关键。随着技术的高速更迭、日益高级的编程实践以及不断演进的软件开发模型，不变的是社会情感学习的力量，它使我们能够与他人合作，创造出远超我们个人所能实现的创新。社会情感学习是指人们“*获取并运用知识、技能和态度，以培养健康的身份认同、管理情绪并实现个人和集体目标、感受并表达对他人的同理心、建立并维持支持性关系，以及做出负责任和充满关怀的决定*”。^(⁴²)\
  \ 虽然开发通常以冲刺的形式进行，但团队合作是一场马拉松：它需要承诺、训练、可持续的节奏以及克服不适。公开重视并实践社会情感学习，正是我们为团队合作马拉松进行训练、支持共同的*软技能开发*文化以及相互支持的方式。\n\
  \n\n\n研究表明，“*生产力取决于具备社交和情感能力的劳动力*”。^(⁴³) *软意识*开发的核心在于人；它始终关注每一位团队成员，以及必须精心培育和维护的、涌现出的动态团队协作。没有唯一正确的协作方式，只有理想的团队协作成果。一个团队的能力和复杂性总是大于成员之和，因为我们涌现出的互动既能成就也能破坏共同的工作。在团队中工作，不仅意味着为项目现身并适应项目，也意味着为彼此现身并相互适应。\n\
  \n这部分内容可能看起来是为“掌权者”所写，但权力有多种形式，并非仅限于职位头衔中带有“管理”二字的人。我们都拥有某种形式的权力。例如，考虑一下，更直言不讳的人如何在会议中实际上拥有更多发言权；再考虑一下，利用这种直言不讳将每个人的想法都摆上台面，又如何能极大提升决策质量。考虑一下，多年的经验如何能催生许多关键想法，但也要考虑，缺乏经验的观点如何能让我们在看似无法通行的方向上实现创新。我们所说的*权力*，是指影响变革的能力。关注自己和身边的人，将让你能够建立一个能与你共同推动变革的团队。为了实现真正的合作，我们不应将自己划分为管理者和被管理者，而应只有协作者（其中一些人的任务是促进他人的工作）。这样一来，我们每个人都能贡献自己独特的“超能力”，而非依赖等级权力，从而组建最全面的超级开发团队^(⁴⁴)。找到你的权力，找到运用这种权力的声音，并帮助你的队友与你一起运用他们自己的权力。\n\
  \n为什么我们非要让每个人都和睦相处呢？虽然我们可以期望员工或队友*埋头专注于工作*（不幸的是，我们在现实世界中屡见不鲜的态度），但这将是非常短视的。与不喜欢的团队一起工作需要付出更多的情感努力，让我们感到疲惫和不快，从而阻碍软件开发。工作中的个人能动性和幸福感能提高开发者的生产力，^(⁴⁵,⁴⁶)而情商则有助于缓解压力、建立信任。^(⁴⁷)当工人在面对裁员、任务或项目不确定性、感觉不被重视、遭受排斥或歧视等无法控制的压力情境时感到无力，都可能导致各种负面的身心影响，包括“习得性无助”——一种缺乏个人能动性的感觉，从而导致工作投入度降低。^(⁴⁸)根据盖洛普公司发布的《2023\
  \ 年全球职场状况报告》，全球 77%的员工认为自己的工作没有意义或缺乏投入，导致 59%的人“静默离职”（只做最低限度的工作或“磨洋工”），18%的人“高调离职”（积极从事破坏性行为），51%的在职员工正在考虑或寻找新工作。^(⁴⁹)盖洛普的报告还指出，70%的团队投入度归因于管理者。更健康的工作场所文化是解决员工不敬业和高离职率的良方，管理者、主管、SCRUM\
  \ 大师、团队领导以及任何拥有权力和/或资历的人都必须带头冲锋。虽然大多数开发者和管理者没有明确的社会情感学习背景，但许多公司已经认识到转变职场文化的必要性，并开始提供培训研讨会，以培养员工的人际交往或*软*技能。\n\
  \n团队协作不仅仅发生在通往可交付成果的路上；它本身就是一个持续的关键任务。请记住，大多数合作关系会延续到当前项目结束之后，因此队友不应被视为可消耗的开发资源，而应被视为开发赖以繁荣或消亡的生态系统。事实上，软件开发可以被视为“*一系列资源有限、目标导向的发明与沟通游戏*”。^(⁵⁰)我们见过优秀的开发者在一起分崩离析。我们也见过挣扎的开发者共同崛起。成为独行侠式的明星开发者并非目标。如果你表现出色，你会被要求去帮助、指导、培训或监督他人。你会被要求向管理层和客户展示你的工作成果。你会被赋予更大的项目，届时你必须学会授权。你必须与他人良好合作。团队协作是关键，而且必须有意识地为之。任何联合头脑风暴、直接协作、团队范围更新以及团队建设活动的机会，都是所有共同工作的基石部分，即使是最紧张的开发日程也应欢迎它们。尽管我们都忙得不可开交，时间宝贵，但不花时间去培养*软意识*，最终付出的代价将远超我们的承受能力。重视并支持队友和团队协作是一项明智的投资（投资于他们的未来、团队的未来以及产品的未来），绝非浪费。\n\
  \n\n\n### 软·件开发：团队协作的阴暗面\n\n并非所有共同工作都能达到真正*团队协作*的程度，即有意义地支持和提升团队的整体产出。相反，开发过程和开发者常常会遭受不良团队协作带来的负面影响。让我们来看一些常见且会引发问题的具体行为示例：\n\
  \n*   **基于社交舒适区做出工作决策**：只与同性别、同年龄段、同种族、同文化背景等的人沟通，可能会疏远他人，让他们觉得自己被排除在头脑风暴或决策之外。因为与某位队友没有私人交情就不主动与其合作，而不是努力去理解摩擦的根源，这只会让问题恶化。避免与那些不主动发言的开发者交谈，会加剧不必要的孤立。我们付出一点努力，就可能极大地提升他人感受到的舒适感、归属感和自主权。基于当前任务分工形成隐性的子团队是可以的，但重要的是要尽可能（例如在咖啡休息时间或每日站会时）将整个团队放在心上。\n\
  \n*   **让部分团队成员无法获取项目信息**（例如，在私人聊天或邮件中讨论开发问题）会使每个人都难以全面了解决策、挑战、需求等。要让工作讨论能够按需被整个团队访问，但不要强迫每个人在没时间或忙于其他事务时参与每一次讨论。例如，你可以在一个独立但可见的线程中回复在公共线程中提出的问题。同时，也要考虑使用\
  \ Slack 或 Discord 这类消息服务的优势，它们允许信息分组或置顶，可以添加回复和子线程，并且可以@团队成员，将相关讨论推送给他们。\n\n*  \
  \ **开发者直接动手开发**。即使在敏捷方法论中，这也是一个错误。花时间就设计达成一致，创建情绪板以确保每个人都共享相同的整体愿景，并清晰地划分任务和子任务（即使只是为了产品的下一个迭代，而不是最终交付物），对于避免混乱和简化开发过程中的决策至关重要。定义不清或理解有误的任务通常会导致工作重叠、合并冲突、混乱、沮丧以及团队内部的争执。\n\
  \n*   **排斥经验不足的队友**。因为不信任新开发者的技能，就不让他们承担项目中有意义且有趣的部分，这会打击学习积极性并降低创造力。将经验不足的团队成员排除在关于开发的关键讨论之外，会降低他们的自主权，并对其认同共同的项目愿景产生负面影响。\n\
  \n*   **认为完成自己的任务就足以实现协作**。如果开发“群岛”的其他部分都在挣扎，那么成为一个高效的“孤岛”是不够的。协作围绕着一个共同的目标，而关注团队就是在关注这个目标。不记录已找到的解决方案和变通方法，不利于共同学习和建立共享知识库。不花时间去理解他人的贡献，可能会导致大量冲突，包括成员认为只有自己在做有意义的贡献，或者没有注意到某人的工作未被正确合并到代码库中，从而被排除在演示之外，这对开发者来说可能非常打击士气。\n\
  \n*   **低估人际需求**。不尊重彼此的工作、时间、职责、需求和关切，就是不尊重彼此。不告知团队那些会影响你工作或可用性的个人情况，很可能会引起对某些贡献能否在截止日期前完成的担忧，从而导致重复工作、压力、加班和信任破裂。开会不准时，体现了缺乏规划、可靠性存疑以及对他人时间的不尊重。在做出可能影响队友的决策时不与他们沟通，必然会导致代码冲突和人际冲突。未能向主管和客户更新进展和困难，可能导致理解脱节、压力增加和业务损失。\n\
  \n*   **不照顾好自己**。不花时间和精力去清晰地分享你的想法或担忧，会对你产生直接的负面影响，并对团队产生间接的负面影响。不分享困难和挫折，会造成不切实际的期望，并减少团队的支持。坚持不切实际的时间表或贡献量是短视的，因为它会导致怨恨和倦怠。\n\
  \n\n\n### 软件关怀：支持个体开发者\n\n众所周知，用户故事很重要，但我们必须记住，开发者故事也同样重要，因为双方都是开发过程中的利益相关者。如果我们期望开发人员为我们工作、与我们协作，就必须将他们作为个体进行投资：支持有意义的工作，关注开发者及其需求，支持他们的自主权，重视他们的个人与职业成长，并理解创造性时间。\n\
  \n*微观管理对双方都不可持续*：管理者无法无处不在，也无法始终掌握所有信息；而开发者的手脚也不能被时刻束缚，否则任何开发都无法进行。试想一下，当有人在你背后盯着时，思考会变得多么困难；或者拿着别人的购物清单去采购，却不知道哪些替代品可以接受；又或者必须用某种你并不理解的具体方式去解决问题。Ron\
  \ Jeffries 描述了源于敏捷实践错误实施的*黑暗 Scrum*：“*但掌权者已经知道自己的职责。他的职责是掌握每个人的动向，确保他们做正确的事，并在他们偏离方向时予以纠正。每天都有一次强制会议让他可以这样做，多么方便！*^(⁵¹)\
  \ *结果呢？团队不再围绕共同使命集结并梳理出当天的最佳方法，而是由别人从他们那里榨取信息，在脑中处理，然后告诉每个人该做什么。由于事情几乎从不会像我们昨天早上预期的那样发展，这种不当行为常常伴随着大量的指责和紧张气氛。黑暗\
  \ Scrum 每天都在压迫团队。自组织无法涌现。*”^(⁵²) 开发者需要被信任去完成工作，而管理者则需要通过满足需求、消除障碍、促成自下而上的自组织来为这项工作提供便利。\n\
  \n让我们把开发想象成*驾驶一辆车*，穿越未知的地形前往某个目的地。客户、管理者或产品负责人选择目的地，但不选择路径。开发者是司机，他们选择如何最好地到达目标。Scrum\
  \ Master 或项目经理不应在后座指手画脚，但他们可以跟踪进度，让每个人专注于通往终点的总体方向。产品负责人可以呼叫车内，但他们不在车上，呼叫司机会分散其对路况的注意力，因此应谨慎为之。司机需要拥有自由，根据他们对所驾车辆的熟悉程度、行驶速度、驾驭各类地形的技能、天气、意外的车辆故障，以及他们从内部视角认为相关的任何其他因素，来决定应该走哪条路。不应强迫司机走他们不习惯的路或开他们不适应的速度；你可以向他们提供更多关于进度的信息，以帮助他们更好地评估需求，你也可以选择下次旅行不雇佣他们，但你需要让他们驾驶。即使是关键信息，也需要以不干扰的方式提供。试想一下，司机即将错过一个转弯，但可能已经来不及调整路线；有时，犯下错误并在事后纠正反而更安全，更不用说从错误中学习从长远来看更具指导意义。给开发者一些空间和计划内的时间去犯错，对他们的个人成长、编程和调试技能、解决问题的信心以及试错能力等至关重要，而这反过来又对软件开发本身至关重要。\n\
  \n*领导者必须关注*。领导者/主管/管理者只有*贴近团队*及其问题，才能真正有效。领导力必须具有亲和力、可及性和适应性。围绕人员及其需求建立关系并调整结构。工作场所文化中的价值观应在所有个体之间共享并得到支持，但结构应具有灵活性，以支持人们学习、沟通和工作的不同方式。关注情境（团队情境、个人情境和项目情境），并利用它做出更好的决策。情境也决定了一个事件是否真的是需要解决的问题，以及如何最好地解决它。但请注意，相同的客观情境对于不同的团队和不同的开发者可能会转化为不同的主观情境，因此领导者征求反馈，并让反馈感到受欢迎、被重视并在未来得到考虑，这一点至关重要。\n\
  \n一个富有成效和创造性的开发环境的关键方面是*有意义的工作*。所有团队成员（尤其是担任管理角色的成员）都需要帮助所有利益相关者找到工作的意义，因为这将激发最大的奉献精神和创造力。虽然雇佣关系或学术环境通常提供外在动机（例如薪水或分数），但这通常只能激发服从。要挖掘真正的动力，我们还应该通过将项目/公司目标与所有利益相关者的目标联系起来，来激发内在动机，^(⁵³,⁵⁴,⁵⁵)\
  \ 例如对自主权、个人成长和成就感的渴望。有意义工作的一个关键起点是传达工作的*影响*，并帮助他人认同这种影响，有时可以通过灵活调整工作以适应所有利益相关者来实现。共同的愿景有助于每个人理解目标，并像北极星或冲刺目标一样聚焦于此。共同确定优先级，理解哪些要素至关重要及其原因，协商时间表，并公开地、以团队方式解决问题，都将有助于确保每个人都认同工作计划，并允许个人在各自的任务中沿途做出正确的开发决策。理解、认同并参与计划能增强每个人的个人自主权，这对开发者至关重要。^(⁵⁶)\n\
  \n*相互奉献*促进信任和支持。如果你希望你的开发者付出额外努力，你也必须同样通过投资于他们的成长和福祉来做到这一点。^(⁵⁷) 如果你需要开发者加班来处理不可预见的情况，那么你也需要投资于他们的个人时间和需求（额外的假期、缩短工作周以补偿延长的工作日等）。如果我们希望个人尊重公司时间，那么公司也必须尊重个人时间。促进*合理的工作量*，并倡导工作与生活的平衡，而不是鼓励加班。如果我们需要每个人都愿意偶尔投入更长时间来满足临时的紧急需求，那么管理层不仅要对额外的工作时间负责，还要对员工在标准工作时间之外为此做出调整的意愿负责。试想一下，今天多工作两小时，并不能被明天少工作两小时有意义地补偿。工作时间的任何变动，尤其是临时通知，都会给个人带来不可忽视的额外负担（包括疲劳工作、睡眠不足、取消计划、不去健身房、重新安排家庭和宠物照看等）。如果这些负担没有得到有意义的考虑，员工将失去关键的恢复时间，最终导致倦怠、隐性离职、工作质量下降以及人员流动率上升。\n\
  \n\n\n### 软技能开发：一种安全与成长的文化\n\n团队协作并非凭空发生。无论我们如何精心关照每一位开发者，我们共同营造的协作环境才是软件开发的生态系统，它最终将决定我们能否共同繁荣。如果只重视产出，学习就可能变得不安全。如果所有冲突都被视为负面，多样性就可能变得不安全。一个可持续的工作场所文化需要关注学习与成长、承诺问责制，并高度重视人际交往技能以支持健康的关系。\n\
  \n#### 学习中的安全感\n\n软技能开发需要一个安全的学习环境。我们所有的工作都必须基于其发生的*情境*，而每个新情境都应以好奇心和成长为导向来对待。团队协作中没有放之四海而皆准的解决方案：与新团队、新项目或新客户合作，都需要细心、问责和重新适应。它还需要有安全犯错的空间，以及在知识创造和新技能习得期间，开发工作可能停滞的时间。\n\
  \n学习协作的方式因团队构成而异，因此需要试错。团队成员必须欢迎学习和适应的过程，这也意味着要欢迎工作中技术与非技术方面的错误，甚至将其视为成长的机遇而加以庆祝。*成长*需要学习新事物，这始于未知，且往往在首次尝试时无法成功。*成长导向*将失败视为学习常态，让开发者能够安全地表达困难、寻求帮助或承认错误。开发者可以在此采用敏捷方法：尝试、获取反馈、调整、再尝试。为成长创造安全环境需要尽量减少内疚和指责，转而专注于在通常伴随学习经历的成长阵痛中相互支持。\n\
  \n当开发者拥有完成工作所需的必要自由时，问责制便分散在整个团队中。因此，团队成员必须以建设性的方式相互*问责但无责*。^(⁵⁸) 指责关注过去，而问责则关注为未来制定更好的计划。一个让承担责任感到安全的环境，将促成关于如何调整方向、继续前进的公开坦诚的讨论。成长型思维自然有助于管理恐惧、减少指责，并在事情进展不顺时培养问责制。试想，当一个错误发生，且在到达客户之前未被任何人发现时，团队中的每个人都负有责任。任何人都可能发现这个错误，但没有人做到。为最初的错误找替罪羊并不能解决问题。问题不在于错误本身。错误总会发生。真正的问题在于，很可能存在有缺陷的流程，未能设置保护性冗余机制，以确保在共享流程中更早地发现错误。团队中的每个人是如何被动或主动地导致了这个问题？每位团队成员可以做些什么来防止未来再次发生？面对任何不尽人意的结果，团队都应思考所有可用的信息、技术、实践、人员和环境是如何共同导致了不良结果，以及他们如何共同防范未来此类结果的发生。即使在最简单的有人忘记任务的情况下，团队也可以修改其实践，通过共享任务板、自动截止日期和提醒、日历集成、结对编程等方式来改进任务跟踪。\n\
  \n项目的共同所有权支持集体问责，并促进所有任务中的相互支持。虽然适度的良性竞争是好事，但团队和公司应同甘共苦，才能真正培养出同袍情谊和共同目标感。共同所有权孕育的是支持而非竞争。共同所有权还能确保工作和理解在团队中更均匀地分布，而学习文化则重视在此过程中新技能的习得。其结果是形成一个工作负载更均衡、更能应对不可预测情况和未来需求的团队（例如，帮助测试彼此的代码、为生病的队友代班等）。为促进更具协作性的环境，主管人员应关注、重视并示范协作、资源共享，以及保持支持性和鼓励性的态度。\n\
  \n在技术方面，安全的环境支持实验。大胆、创造力和创新需要探索性的试错。它们还需要相当长的时间，在此期间开发工作可能停滞，而知识正在被创造。有些尝试不会立即改进产品，但会创造新技能、加深理解并探索新想法。不正确的生产力指标和短视的激励措施会导致有缺陷的开发与团队协作实践。如果除了产出之外什么都不被重视，团队将不可避免地陷入不可持续且自我保全的行为，例如：\n\
  \n*   开发者只接手能快速完成的小任务，以显得效率更高\n*   不信任和零和博弈行为（例如，通过指责来竞争和寻求个人安全）\n*   风险规避，导致开发者回避任何不确定如何完成的任务，避开更具创造性和挑战性的机会，并在此过程中优化以减少学习\n\
  *   跳过创造性头脑风暴，直接跳入下一个可交付成果的编码\n\n不要轻视过程、失败、学习和讨论，而只关注结果。为共同实验和学习创造空间，因为没有人会拥有所有答案（无论是主管、客户，还是最有经验的开发者），而且合适的答案会随着时间、团队和团队成员的变化而变化。此外，虽然关注问题行为作为主要处理事项是自然的，但请记住也要强调我们在团队成员身上所珍视的行为。\n\
  \n\n\n#### 清晰即安全\n\n无论公司简介中列出了哪些价值观，我们最终创造的文化，是我们在日常运营中不断倡导的文化。我们共享的文化将反映出那些被所有人，尤其是负责人，持续关注、重视和效仿的行为。\n\
  \n正如阿德娜·弗里德曼所说：“*想法的好坏，取决于你传达它们的能力。*”要让“软意识”真正渗透到组织文化中，它必须被组织各层级的人员所践行。会议是领导者展示和促进预期建设性行为与反应的绝佳机会：鼓励并示范开放理性的对话，展现并奖励好奇心，提供支持，多提问而非妄下结论。表达需求或不同意见应得到奖励，以此表明直言不讳并非徒劳，而是非常值得付出努力、勇气和坦诚。例如，如果团队成员表达了需求或偏好，应做出合理努力来满足该需求。\n\
  \n一致性和清晰性是安全的。需求和约束可能会改变，但为之做好准备的方式可以保持一致。工作和团队协作的背景可能会改变，但期望可以保持明确和一致。给予清晰的反馈短期内可能让人感觉不安全，但最终对工作场所的可持续性至关重要。根据布琳·布朗的说法，“*在领导者们指出的阻碍勇气的十种行为和文化问题中，有一个问题被领导者列为最大的担忧：回避艰难的对话，包括给予诚实、富有成效的反馈。*”^(⁵⁹)\
  \ 回避行为会削弱信任和参与度，增加问题行为，降低共同目标感，并对生产力产生负面影响。布朗将此总结为：“*清晰是友善。不清晰是不友善。*”\n\n让我们考虑一些通过清晰表达来体现友善的其他例子：\n\
  \n*   在团队中明确所有假设和计划（经常比较理解，使用可视化工具，讨论步骤）；确保每个人都理解愿景以及他们在实现该愿景中的个人角色。\n\n*   明确区分最低要求目标与锦上添花的延伸目标。基于猜测工作既危险又代价高昂，还会在团队中滋生焦虑。\n\
  \n*   清晰说明限制条件，例如紧急需求或人手不足。透明度有助于验证顾虑，并营造开放沟通、信任和共同解决问题的文化。\n\n*   不要让别人猜测自己是否做得足够，因为这只会导致焦虑。回避告诉开发者如何改进或改变什么，从长远来看是不可持续的。明确具体地说明期望，这样每个人都能通过思考要求是什么、做了什么以及为什么这样做，来进行有意义的回顾、学习和调整。\n\
  \n*   不同的人对对话的理解和消化方式不同。为确保共识，明确总结每个人的要点和后续步骤。\n\n*   对自己和团队保持开放、诚实、勇敢和坦诚。在每日站会中加入“氛围检查”，有助于提高对团队成员日常状况的共同了解。\n\
  \n*   所有批评都应指向支持和成长，而非羞辱或贬低。与其指出不良或低效的做法，不如引导彼此寻找更好的替代方案，并且始终附上关于为什么某种做法优于另一种以及如何实施的解释。\n\
  \n#### 多元即安全\n\n虽然相似性最容易带来融洽，但异质性团队展现出更强的批判性思维和创新能力。^(⁶⁰) 建立并维护一种欢迎差异的文化，需要每个人都致力于一系列个人和人际实践。“*但要‘包容地’构建任何事物，我们必须首先清晰地理解我们在哪里排除了他人。*”^(⁶¹)\n\
  \n正如你在上一章所见，Scrum 明确定义了一套价值观，供开发者践行承诺、专注、开放、尊重和勇气。如有疑问，以同理心为先。同理心使我们能够更好地理解客户需求、开发者需求以及我们新兴协作中的挑战。同理心在于将他人视为独立的个体来重视，而不仅仅是共同工作的资源。这包括关注他们的需求和困难、沟通和工作风格以及个人情况。同理心需要坦诚、真实，并愿意承认自己可能犯错。要考虑到你可能看不到某人工作的全部复杂性和范围，每个人都有不同的文化和技术背景，我们的大脑处理信息的方式也大相径庭，而所有这些多样性正是我们共同的力量。\n\
  \n让团队中的每个人都感到安全、受尊重和被重视，需要致力于*多元、公平和包容*。包容性策略师维尔纳·迈尔斯有句名言：“*多元是被邀请参加派对；包容是被邀请跳舞。*”^(⁶²)\
  \ 那么，公平至少要求确保受邀者能够到达派对现场，场地设施适合受邀者，并且所有受邀者在规划活动、音乐和茶点方面都有发言权。是的，这要复杂得多，但如果没有这些步骤，我们就无法声称每个人在派对上都是真正受欢迎的。这需要关注个人需求和偏好、历史和文化背景以及个人目标，而不仅仅是软件开发任务。\n\
  \n一个常被忽视的多元维度是团队成员的*工作类型*。保罗·格雷厄姆的《创造者日程 vs. 管理者日程》^(⁶³) 讨论了创造性工作与管理工作的根本区别。默认情况下，管理者的日程被分解成小的时间段（例如，按小时计），用于安排大量会议。创造者（例如，开发者）无法在短时间段内进行创造，他们需要更长的时间段，例如半天，因为创造性任务需要一些预热时间和较长的整块时间来进行深度专注和发明创造。会议会打乱可用的整块时间，如果安排不当，可能会毁掉创造者的一整天：“*一个会议就能毁掉整个下午，因为它把下午分成两段，每段都短到无法处理任何困难的事情。而且，你还得记得去开会。这对管理者日程上的人来说不是问题。下一个小时总有事情要发生；唯一的问题是什么事。但当创造者日程上的人要开会时，他们必须为此费心。对于创造者日程上的人来说，开会就像抛出一个异常。*”^(⁶⁴,)\
  \ ^(⁶⁵) 为了将对开发者及团队中其他创造者的生产力损害降到最低，你可以将需要创造者参加的会议安排在工作日的开始或结束时段。\n\n\n\n多样性的另一个重要维度是神经多样性，这在软件开发团队中很常见，并伴随着许多独特的优势和挑战。^(⁶⁶)\
  \ 研究表明，许多神经多样性个体在生命后期才被诊断出来，并且即使他们对有意义的调整有具体想法（例如替代性绩效评估和更安静的工作环境），也不会透露自己的诊断结果或寻求便利措施。^(⁶⁷)\
  \ 一种包容性的方法可能是提供多种选择，让团队成员根据自身需求自由选择：替代性工作空间、替代性沟通方式、替代性时间表等。\n\n请记住，某些方法或行为即使客观上没有错误，也可能在特定情境下造成不利影响。所有社交互动都依赖于丰富的语境，而其中大部分语境对各方而言都是隐含且不可见的。例如，考虑一下为上午\
  \ 9 点的会议给每个人买早餐这个看似周到的想法。是否考虑到了每个人的饮食限制？还是说有些团队成员反而因此感到比之前更不受重视？再举一个例子，人们在讨论中感到足够安全而敢于发言的阈值各不相同。仅仅询问是否有人有问题或评论，可能不足以真正打开局面，邀请每个人的意见。还要注意，意见越是反对，在群体中表达出来就越令人望而生畏。同样需要考虑的是，在某些文化中，不进行眼神接触被视为粗鲁，而在另一些文化中则被视为礼貌；以及，僵化地固守自己的社会规范和习俗会显得排外。最后，考虑一下在提建议时随口说“只要”（例如，“你为什么不直接……”）实际上预设了双方有广泛的背景相似性（例如特定的技术技能），最终非但没有提供预期的支持，反而会打击士气、造成疏远。^(⁶⁸)\
  \ 谦逊、好奇心和同理心是以可持续、健康且富有成效的方式共同工作的基础。各方都可能犯错，但对成长的共同承诺将创造一个更安全的环境，让每个人都能尝试、观察、讨论、学习，并在下次做得更好，同时也允许他人学习和进步。\n\
  \n#### 冲突中的安全\n\n安全的最大威胁是冲突，但冲突不能也不应被避免。冲突是评估不同想法、方法和人际需求的一种方式。当以建设性的方式处理时，冲突是让产品和团队变得更强大的宝贵机会。\n\
  \n冲突在任何团队中都会发生，但在那些沟通开放、开发者有自主权、代码共同拥有、并留有实验空间的、高度投入的自我组织型团队中尤其常见。意见分歧是团队多样性和创造力的标志。面对分歧时，不应忽视相互冲突的意见。任何一个人的意见，都代表了可能考虑使用你产品的用户、可能想与你签订开发合同的客户，以及可能决定开发替代方案的竞争对手中一定比例的观点。忽视冲突意见会造成紧张，危及共同愿景，并扰乱工作。尽早考虑不同观点是提升团队和产品整体质量与稳健性的机会，因此应被欢迎并谨慎处理。团队是你最早期的焦点小组；不要将他们至关重要的见解弃之不顾。\n\
  \n所有冲突都有可能产生积极或消极的结果。*建设性争议* “*存在于当一个人的想法、信息、结论、理论和观点与另一个人不相容，并且双方都试图达成一致时。*”^(⁶⁹)\
  \ 请注意这与*寻求共识*的区别，后者“*发生在群体成员强调一致、抑制讨论以避免任何分歧或争论、并避免对替代想法和行动方案进行现实评估时。*”^(⁷⁰) 我们的目标不仅仅是达成一致，而是基于积极的合作学习，共同构建新的理解。以下是已被确定为建设性争议所必需的一些条件：^(⁷¹)\n\
  \n1.  合作性目标结构，因为竞争会阻碍有效沟通\n2.  熟练地处理分歧，以有效驾驭意见差异\n3.  理性论证，以在面对证据和逻辑时生成、提出并更新观点\n\
  4.  所有参与者的积极讨论，而非回避、支配或顺从\n\n根据托马斯-基尔曼冲突模式量（TKI），人们会根据其合作性和果断性的程度（或定义为关心他人与关心自己）偏好特定的冲突解决风格。^(⁷²)\
  \ 识别冲突管理风格对于团队管理至关重要：\n\n*   *回避*风格：延迟或未能达成解决方案会滋生更多的不满、怨恨和沮丧；仅在收集信息、等待日程安排上的空档或处理完其他正在进行的情况时暂时有效。\n\
  *   *竞争*风格：对团队合作有害，因为它将某些贡献者的需求置于他人之上；解决方案很可能滋生怨恨、造成不平等，并引发未来的冲突，损害工作环境。\n*   *迁就*风格：与竞争风格相反，但总体效果往往相似，因为它可能导致因自身需求未被满足而产生的倦怠。\n\
  *   *妥协*风格（双输）：每个人都最终为某个可接受但最终并非任何人真正想要的折中方案做出牺牲。\n*   *协作*风格：真正理想的双赢；它最耗时，因为需要进行有意义的讨论，才能真正找到满足每个人需求的方法。\n\
  \n\n\n布琳·布朗建议我们都要准备好“开诚布公”：“*所谓开诚布公，是指一种讨论、对话或会议，其核心在于承诺坦然面对脆弱、保持好奇与慷慨、坚持在问题识别与解决的混乱中间地带工作、必要时暂停并折返、无畏地承担自身责任，并且，正如心理学家哈里特·勒纳所教导的，要以我们渴望被倾听的同等热情去倾听。*”^(⁷³)\n\
  \n开发团队不可避免地会遇到任务冲突和人际冲突。*任务冲突*是指理解上的差异、对采用何种方法的不同意见、对风险和成本的评估分歧等。解决任务冲突有助于通过集思广益、弥补弱点或澄清需求来改进产品。*人际冲突*则涉及沟通风格、文化背景、神经多样性、个性、边界、触发因素等方面的差异。人际冲突会极大地消耗开发者的精力。解决人际冲突能够改善团队合作、工作满意度和生产力。\n\
  \n冲突对成长而言价值连城，但绝不能让它们恶化。及时主动地解决是关键，这需要一种文化：欢迎艰难的对话，赞扬对话所需的勇气，并帮助每个人掌握必要的技能，以便沟通、倾听和协作，共同寻找新的共识。人际间的紧张关系需要被摆到台面上并及时解决，以防止关系恶化。团队可能需要外部资源、信息或公正的仲裁来化解冲突，防止怨恨像滚雪球一样扩大。那么，我们如何才能建设性地解决冲突呢？一系列*有技巧的分歧*技术已被提出^(⁷⁴)：\n\
  \n*   批评想法，而非针对个人。\n*   将自我价值与对你想法的批评区分开。\n*   专注于团队获胜，而非个人。\n*   鼓励每个人都去了解情况并参与讨论。\n\
  *   倾听所有想法，无论你个人观点如何。\n*   复述观点以确保共同理解。\n*   清晰陈述所有论点，阐明差异，然后通过共识点进行整合。\n*   尝试理解对立的观点。\n\
  *   面对证据时更新自己的观点。\n*   强调理性和数据。\n*   遵循*冲突的黄金法则*：己所不欲，勿施于人。\n\n职场中的层级关系也必然会影响冲突。以下建议旨在帮助职位较高的人士进行有效的冲突管理^(⁷⁵)：\n\
  \n*   腾出时间解决人际冲突。要认识到冲突不会自行消失，拖延只会带来危害。\n*   判断冲突是需要与个人、小组、整个团队，还是上述组合来共同解决。\n*\
  \   为避免盲目附和并鼓励讨论，不要在对话初期就强加个人观点。\n*   鼓励团队在小的担忧和摩擦演变成冲突之前就将其摆上台面。\n*   寻找机会定下基调，并示范你希望从团队身上看到的行为（例如，感谢他人勇于发言、建设性地提出异议、承认错误等）。\n\
  *   通过讨论某些方法为何在特定情境下可能行不通（而非客观错误），帮助建设性地构建和聚焦分歧。\n*   花时间解释你的决策，并尽可能让团队参与决策过程。\n\
  \n### 软技能开发：团队协作工件\n\n具备“软技能意识”能改善团队协作和团队产出。但我们如何为所有这些实践腾出时间？如何持续关注团队协作和文化？如何确保冲突在腐蚀团队内部之前得到解决？为了保持足够近的距离以便关注，同时又保持足够远的距离以给予开发一些创造空间，可以在开发流程中添加一些工件。\n\
  \n让我们看看过去我们认为对开发者团队有帮助的一些工件和实践：^(⁷⁶)\n\n*   从个人且保密的*评估*开始，以确定每个人的需求、实践和个人特质，从而帮助组建有效平衡的团队、建立有益的团队协议，并实施适当的培训课程。\n\
  *   让团队成员定期（例如，每个开发迭代一次）填写*自我和同伴评估*（个人、保密，仅用于帮助团队协作）：这是一个精简的表格，用于主观反思每个开发者自身的表现、态度和贡献，以及对同伴表现、态度和贡献的看法。为反思留出明确的空间，对于开始全面了解团队协作情况并及时干预至关重要。\n\
  *   *玩乐*是创造性思维的精髓。拥有分享表情包或非项目新闻的公共频道，有助于创造一个更人性化、更有活力的空间，而不是只有工作没有娱乐。创造大大小小的团队建设机会。即使是喝杯咖啡、聊聊天充充电的空间，也能将艰难而压力重重的一天转变为值得且充实的共同经历，从而拉近团队距离。大型活动能带来更大的兴奋感，并创造共同的回忆。\n\
  *   将错误和学习常态化，无论是在工作的技术方面还是非技术方面。不要搞突然袭击，也不要针对个人。将*例行检查*作为工作流程的一部分，以创造分享机会，并帮助每个人做好接受反馈的准备。如果情况敏感，请提前告知队友，你们需要带着同理心和勇气一起克服不适感。\n\
  *   建立*开放的多向沟通渠道*，例如简短的定期更新、面对面的团队工作会议、共享知识库，以及便捷的按需同步和异步沟通渠道。\n*   填写包含最低要求的*团队契约*，团队成员可以在此基础上进行扩展，以最好地适应他们共同的舒适度。契约应涵盖团队会议频率（例如，每日站会的时间和地点）、检查和更新异步沟通渠道的频率（例如，每天检查一次\
  \ Slack 频道，每次工作结束后更新敏捷看板）、无法联系的及时通知（例如，迟到时告知团队）、所需技术（例如，git）、协议（例如，遵循 git flow）以及可交付成果（例如，站会报告和每两周一次的最小可行产品演示）。契约有助于为团队明确设定期望和责任，并让主管了解团队的实践情况。\n\
  \n将团队协作本身视为一个敏捷开发过程是很有帮助的：团队协作立即开始，频繁检查，并根据需要进行调整。事实上，如果你已经在使用敏捷方法论，敏捷工件可以直接用于监控团队协作：\n\
  \n*   状态*评审/演示/展示*是你审查产品状态的方式。在报告状态时，要清晰说明项目当前所处的位置以及在下次状态报告之前的发展方向：\n    *   自上次评审/演示/迭代以来取得了哪些成果？\n\
  \    *   本次迭代原计划的工作中，哪些尚未完成？\n    *   下一步计划是什么？\n\n\n\n请注意，评审会和每日站会（参见前一章）都是通过讨论成就、挫折和下一步计划来审视项目状态的。评审会覆盖的时间跨度更长（通常是一个开发迭代周期），并且会邀请产品直接开发人员之外的受众（如主管、产品负责人和客户）参与，以便他们了解进展并提出反馈。你不应粉饰、找借口或掩盖问题。要诚实地面对问题以及你在进度中的位置。虽然没人喜欢报告问题，也没人喜欢听别人报告问题，但这种矛盾必须被接纳并及时处理。缓解问题的最佳方式是让其他人参与进来，共同寻找解决方案，从而维护一种信任与安全的氛围。务必了解你的受众，以便根据他们的专业水平以及与你的工作关联度（管理者、客户和最终用户希望看到项目及其状态的不同方面）来调整内容。对已完成工作进行有代表性的评审，将让你能够从利益相关者那里收集到最相关、最有帮助的反馈。\n\
  \n*   *回顾会议*是团队用来审查、评估和修改其工作流程的方式。回顾会议通常在产品发布之后或产品的每个主要迭代周期之后（例如，在每个迭代或冲刺之后）举行，因此你可以将其作为内置的机会，来观察团队如何反思自身的内部运作，并提供支持、澄清或外部视角。回顾会议的目标是确定当前的流程和实践是否服务于整个团队以及每个团队成员的需求：\n\
  \    *   我们的团队协作中哪些方面做得好？（我们是否按时完成了计划？我们是否有效沟通和协作？是否每个人都感到被支持、被尊重？）\n\n*   我们的团队协作中哪些方面出了问题？（团队成员是否偏离了预期实践？我们是否在截止日期前才合并代码？我们是否因为任务分工不明确而做了重复的功能？我们是否不得不加班？）\n\
  \n*   展望未来，我们应该如何更新我们的流程、态度或工作环境？\n\n这是软体开发中最重要的会议，开发者和主管都必须为其投入时间、关怀和尊重。想想看，我们常常被教导要抛开个人问题，专注于手头的工作。讨论手头任务之外的任何事情常常不被鼓励，甚至被认为是不专业的。但是，如果我们不能讨论个人需求、情况和情绪，我们又该如何讨论仓库中最后一刻的合并冲突，而不制造紧张和指责呢？为了有效地修改我们共同的流程，我们必须理解我们共同情境的全貌，而人正是这个情境的核心。假设我们在演示前夜很晚才合并代码。演示进行得很糟糕，由于仓促解决的合并冲突导致功能缺失，每个人都又累又沮丧，并且矛头指向了一位开发者。训斥那位开发者，并威胁说如果再发生这种情况会有严重后果，这看起来似乎合理且高效。但这不是正确的方式。这位开发者是否在挣扎，并且害怕寻求帮助？害怕显得准备不足或能力不够？或者他们一直感到孤立无援？又或者他们曾试图表达需要帮助，但没有人站出来？团队是否跳过了每日站会而错过了这个信号？或者这位开发者的功能在最终调整时出现了无法恢复的故障？我们的开发流程是否未能恰当地鼓励小步增量提交和留出足够时间来处理意外情况？有意义的解决方案需要时间和关怀，才能就产品本身以及产品创造者需要改进的领域进行富有成效的讨论。\n\
  \n*   *事后剖析*（团队层面和个人层面）是一种规模更大的*回顾会议*，它让开发者能够反思整个项目、挑战、经验教训和感悟。需要考虑的一些问题包括：\n  \
  \  *   项目的目标是什么，它们是否实现了？\n\n*   项目中哪些方面进展顺利？哪些不顺利？\n\n*   团队中哪些方面表现良好？哪些不理想？\n\n\
  *   团队在整个项目过程中学到的主要经验教训是什么？\n\n*   如果有机会重做这个项目，团队会做出哪些不同的选择？\n\n之后，团队成员应完成个人事后剖析，每个人都能借此机会进一步反思自己的挑战和经验教训：\n\
  \    *   我为自己设定的项目目标是什么，它们是否实现了？\n\n*   就项目而言，我哪些方面做得好？哪些不理想？\n\n*   就团队而言，我哪些方面做得好？哪些不理想？\n\
  \n*   我在整个项目过程中学到的主要经验教训是什么？\n\n*   如果有机会重新进行这次合作，我会做出哪些不同的选择？\n\n开发者常常将事后剖析视为敷衍了事的工作，他们渴望跳入下一个创意冒险，而不是填写“文书工作”。慢下来；这不是无谓的忙碌。在项目之间抓住机会进行反思，是开发者成长过程中最重要的实践之一。研究表明，反思是将我们的经历转化为有意义学习的关键。^(⁷⁷)\
  \ 所以，回想一下：收集所发生的事情（技术层面和人际层面），从你未来的视角审视它，并形成新的见解，了解是什么赋予了你力量，是什么阻碍了你，以及你计划如何运用这些新知识继续前进。恭喜你，现在你升级了！\n\
  \n## 结论\n\n在本章中，我们讨论了如何通过关注产品本身和产品创造者的需求来管理项目。为了预测和支持产品的需求，我们考虑了组织方案、分析风险、评估资源需求、估算进度，并规划了不可避免的缺陷管理。为了预测和支持共同创造产品的人员的需求，我们首先考虑了一些可能阻碍团队合作的实践。然后，我们讨论了如何通过支持个体开发者、创建让我们能够共同蓬勃发展的安全文化，以及将冲突视为成长的机会，来成为“软体”。最后，我们介绍了一系列实践和工件，它们可以帮助我们监控团队中复杂涌现的动态。关于良好团队合作的原因的进一步讨论和示例，请考虑阅读\
  \ Scott Tannenbaum 和 Eduardo Salas 合著的《高效团队》。^(⁷⁸)\n\n"
- "# 4. 伦理与职业实践\n\n> *伦理就是知道你有权做什么和做什么是正确的之间的区别。*\n> \n> —**波特·斯图尔特**\n\n我们将花一些时间讨论伦理和职业实践，以此继续我们对软件开发的探索。也就是说，在面临伦理困境的情况下，你作为计算专业人士应该如何行事。我们将讨论什么是伦理，它如何应用于软件行业，存在哪些能为我们提供工具的伦理理论，什么是伦理论证或讨论，以及如何评估伦理情境。最后，我们将通过一些案例研究，让你了解这些评估技术将如何发挥作用。\n\
  \n\n\n## 伦理学导论\n\n简而言之，*伦理学*研究的是如何判断某事是*对是错*。目前，我们假设每个人都明白*对*与*错*的含义，但正如我们将在某些示例中看到的，即便是这一点有时也可能存在争议。至于*计算机伦理学*，我们将其定义为计算机专业人士（在我们的语境中即软件开发人员）在职业生涯中（无论是在工作中还是从事个人项目时）将面临的伦理问题。计算机伦理学包括如何做出可能影响你及他人（你的公司、客户、用户，乃至整个社会）的关键决策，无论这些影响是个人层面还是职业层面的。\n\
  \n你在职业生涯中做出的许多决策都包含伦理成分。如果有人要求你发布一款你认为存在严重漏洞的软件，你会怎么做？如果你的公司正在制作或使用非法软件副本，你会怎么做？如果你的公司正在为他人侵犯知识产权提供便利（例如发布允许用户将受数字版权管理（DRM）保护的文件转换为未受保护文件的软件），你会怎么做？如果你认为自己正在参与的项目存在利益冲突，你会怎么做？如果有人为你提供一份开发你从道德上反感的软件的工作，你会怎么做？如果你发现你的公司正在记录每个人的网页搜索记录或按键记录，你会怎么做？从网站访问者那里收集多少数据才算合理？是否应该让访问者知晓这些数据收集行为？要求员工加班或周末工作以赶公司项目截止日期是否合乎伦理？\n\
  \n你在职业生涯中遇到的伦理情境，与你职业之外遇到的情境在类别或本质上并无显著差异（尽管它们对你及他人生活的影响可能被放大）。你仍然需要运用普遍的伦理原则和理论来审视这些情境，因此我们将从这里开始。\n\
  \n## 伦理理论\n\n伦理学是研究*做正确的事*意味着什么，以及如何在不同的情境中做正确的事。伦理学是哲学的一个庞大分支，我们在此只能涉及其中一小部分。我们将重点介绍几种不同的理论，以及这些理论为我们提供的、用以找出如何做正确之事的方法。\n\
  \n首先，“伦理理论基于一个假设：人是理性的，并且能够做出自由选择。”^(⁷⁹) 显然，这并非总是成立，但我们将假设它成立，并且大多数情况下，人们要为自己的决定和行为负责。\n\
  \n伦理规则是我们在与他人打交道时，以及在影响他人的行为或决策中所遵循的规则。大多数伦理理论都有相同的目标：“提升人的尊严、和平、幸福与福祉。”^(⁸⁰) 我们还将假设，来自某一伦理理论的规则适用于所有人，且适用于所有情境。这些规则应有助于厘清我们的决策过程，并引导我们在特定情境中做出合乎伦理的决定。虽然行为合乎伦理并非总是易事，但它通常直接符合标准的社会和法律期望。根据\
  \ Baase 的说法：\n\n> *在个人或职业领域行为合乎伦理，通常并非一种负担。大多数时候，我们诚实守信、信守承诺、不偷窃、做好本职工作。这不应令人惊讶。如果伦理规则是好的规则，它们就会为人民服务，也就是说，它们能让我们的生活更美好。行为合乎伦理往往是切实可行的。例如，诚实能使人与人之间的互动更顺畅、更可靠。如果我们经常撒谎或违背承诺，可能会失去朋友。此外，社会制度也鼓励我们做正确的事：偷窃被抓可能会被捕。工作马虎可能会失业。在职业背景下，从专业质量和能力的意义上讲，行为合乎伦理通常与做好本职工作紧密相关。从商业意义上讲，行为合乎伦理通常也与良好商业实践紧密相关，因为合乎伦理开发的产品更有可能让客户满意。然而，有时做正确的事是困难的……在职业环境中，勇气可能意味着向客户承认你的程序有缺陷，拒绝一份你无法胜任的工作，或者在你看到别人做错事时挺身而出。*^(⁸¹)\n\
  \n现在，我们将探讨来自两个不同学派的几种不同的伦理理论：义务论学派和后果论学派。\n\n\n\n### 伦理理论：义务论\n\n*义务论*一词源自希腊语 *deon*，意为责任或义务。义务论者认为，人们的行为应当受道德法则的指导，并且这些法则是普遍的（在某些情况下是绝对的）。义务论的论证聚焦于行为的*意图*，以及该行为作为道德法则的应用是否站得住脚。他们通常不关心行为的后果，而是强调责任和关于如何行事的绝对主义规则。\n\
  \n义务论伦理学派源于伊曼努尔·康德（1724–1804）的著作，他认为所有道德法则都基于理性思维和行为。康德强调对原则和责任的忠诚。他的论证聚焦于与任何对幸福或快乐的关切相分离的责任。康德的哲学并非建立在对人性的认识之上，而是建立在一个适用于所有理性存在的共同责任观念上：一个人应当以正确的精神做正确的事。^(⁸²)\n\
  \n在康德对义务论理论的诸多贡献中，三个最基本的思想是：\n\n1.  *存在必须普遍适用的伦理常量和规则。* 这被称为**绝对命令**或**普遍性原则**。简而言之，绝对命令是对一个行为正确与否的检验。如果你提出一条道德法则或规则，那么当你依据该法则行动时，你对它的构想能否普遍适用？“所讨论的行为能否通过普遍化的检验？如果不能，该行为就是不道德的，并且你有责任避免它。绝对命令是一个道德指南针，它为我们提供了一种方便且站得住脚的方式，来判断我们何时在道德地行事。”^(⁸³)\n\
  \n2.  *你的行为应当始终将你自己和他人视为目的本身，而非仅仅作为手段。* 也就是说，利用一个人是错误的，这意味着与另一个人的每一次互动都应尊重他们作为理性人的存在。“将人本身视为目的的原则，是对每个人行动自由的一种限制性条件。我们不能剥削他人，并仅仅将他们视为实现我们目的或目标的手段。”^(⁸⁴)\n\
  \n3.  *逻辑或理性决定了伦理行为的规则。* 如果行为遵循逻辑或理性，那么它们本身就具有内在的善。理性是衡量何为善的标准。\n\n义务论者认为，在评估道德决策时，重要的是行为本身，而行为的后果并不参与决定该行为在道德上是否良善。康德在道德规则的绝对主义立场上采取了极端态度。例如，以道德规则\
  \ *“撒谎永远是错误的”* 为例。如果一个杀人犯正在寻找他预定的受害者（你刚刚把他藏在地下室），并问你在哪里，根据 *“撒谎永远是错误的”* 这一道德规则，你为了保护预定受害者而撒谎在伦理上是错误的。在现实世界中，大多数人会同意，在这种情况下，由于不撒谎的后果，这条伦理规则应该被打破。^(⁸⁵)\
  \ 我们稍后会再回到康德的这个问题上。\n\n作为义务论论证及其问题的另一个例子，让我们反思一下在“我们想做什么”和“我们应该做什么”之间挣扎的体验。康德说，我们想做什么并不重要。我们应该始终关注我们应该做什么；换句话说，我们必须履行我们的责任。一个行为的道德价值取决于其背后的道德法则。^(⁸⁶)\
  \ 以尽责方式行事的人，会感到出于对某种道德法则的信仰和尊重而不得不那样做。\n\n为了确定一条道德规则是否正确或良善，我们尝试应用普遍性原则。让我们以遵守承诺为例来推演一下。假设我们身处困境。为了摆脱困境，我们必须做出一个我们后来打算违背的承诺。这里的道德规则是：我允许做出后来打算违背的承诺。遵循绝对命令，我们试图将这条规则普遍化，因此该规则的普遍版本是：对于每个身处困境的人来说，做出一个后来违背的承诺在道德上是正确的。如果这是真的，那么承诺就变得毫无价值，因为每个人都知道它们后来有可能被违背。因此，承诺这种东西将不复存在。所以，当我们试图将适用于我的道德规则普遍化时，它就变得无用了。这就是当你分析伦理困境时，如何应用普遍性原则。在这个例子中，我们发现我们最初设定的规则无法普遍适用，因此它不能成为一条道德规则。\n\
  \n那么，我们如何看待义务论伦理学呢？嗯，我们有一套假设（或公理），以及一种检验新的、潜在的道德法则是否正确（或对错）的方法——普遍性原则。这效果如何？让我们尝试列出一些优缺点。\n\
  \n义务论伦理学方法有什么优点？\n\n*   (1) *它是理性的。* 它基于这样的理念：理性的人类可以使用逻辑来解释其行为背后的原因。\n\n*   (2)\
  \ *普遍性原则产生了普遍的道德准则。* 这些准则使我们能够做出清晰的道德判断。\n\n*   (3) *所有人都被视为道德上的平等者。* 这为我们提供了一个对抗歧视的伦理框架。\n\
  \n义务论伦理学方法有什么不足之处？\n\n*   (1) *有时没有单一的规则能完全描述一个行为。* 例如：偷食物给饥饿的孩子吃。虽然有一条反对偷窃的伦理规则，但也有一条你应该保护孩子的伦理规则。在这种情况下，这两条规则是相互冲突的。\n\
  \n*   (2) *义务论论证没有提供解决两条或多条道德规则之间冲突的方法。* 康德在规则上的绝对主义立场导致了这样一种观点：义务论方法并没有告诉我们哪些规则比其他规则更重要。\n\
  \n*   (3) *义务论理论（尤其是康德的）不允许对道德规则有任何例外。* 这使得它们难以应用于现实世界，因为在现实世界中，我们常常需要变通规则以避免不良后果。（但请记住，义务论理论不关心后果；它关心的是行为以及行为所体现的规则。）^(⁸⁷)\n\
  \n\n\n### 伦理理论：后果主义（目的论理论）\n\n推理伦理情境还有另一种方式，即所谓的*目的论理论*，其名称源于希腊语单词 *telos*，意为“目的”或“目标”。目的论理论仅关注行为的后果，以判断该行为是善还是恶，^(⁸⁸)\
  \ 因此它们也被称为*后果主义*。\n\n后果主义的经典形式被称为*功利主义*，由英国哲学家杰里米·边沁（1748-1832）和约翰·斯图尔特·密尔（1806-1873）提出。功利主义基于*效用原则*，该原则认为，一个行为在多大程度上增加了受影响各方的总体幸福（或效用），它在道德上就是善的或正确的。如果该行为减少了总体幸福，则在道德上是错误的。因此，效用是行为为个人、群体或社区带来幸福（或防止不幸）的倾向。^(⁸⁹)\
  \ 一个行为可能会增加某些人的效用，同时减少其他人的效用。这正是密尔那句格言“最大多数人的最大幸福”的由来。\n\n因此，根据功利主义，我们必须有一种方法来计算幸福的增减。这意味着我们还需要某种共同的度量标准来衡量幸福，并且需要能够计算某个行为带来的总体幸福或不幸。这引出了功利主义的两种变体。\n\
  \n*行为功利主义*是一种理论，认为如果一个行为的净效果（对所有受影响的人而言）是产生的幸福多于不幸，那么这个行为就是善的。因此，行为功利主义者将效用原则应用于单个行为以及这些行为所影响的所有具有道德意义的人。\n\
  \n例如，假设当地县正在考虑将一段非常弯曲的公路改直。我们需要考虑这是否是一个好主意。为此，我们必须弄清楚谁会受到这项新工程的影响（谁是利益相关者），以及这项工程会对他们产生什么影响（成本是多少）。假设为了修建这条公路，该县必须征用公路将穿过的\
  \ 100 户住宅。因此，这些房产持有者是利益相关者，他们将获得财产补偿。另外，假设每天约有 5000 辆汽车在这条公路上行驶；这些司机也是利益相关者，因为新路可能会缩短他们的通勤时间，减少他们的金钱和时间支出。更广泛地说，新路还会产生某种环境影响，这也必须计算在内。如果我们用金钱作为效用的衡量标准，那么我们可以尝试计算修建公路的效用。假设房主获得了\
  \ 2000 万美元的补偿。另一方面，假设使用这条公路的司机每人节省约 2 美元，即每个工作日节省 1 万美元，一年有 250 个工作日，公路将使用 20 年。该县修建公路的成本为\
  \ 1200 万美元，而因栖息地丧失对动物物种造成的环境成本估计约为 100 万美元。因此，公路的总成本约为 3300 万美元，而给司机带来的收益约为 5000\
  \ 万美元。按照行为功利主义，这个行为是善的，公路应该修建。然而，我们的计算存在几个问题。我们没有考虑到房主的不幸福，因为他们中的部分或全部可能不想出售自己的房屋。新路可能分割社区，对社区造成的影响是另一项成本。该县\
  \ 20 年的维护成本是另一项成本，但直路上事故减少的价值则是一项收益。^(⁹⁰) 因此，对于行为功利主义而言，我们似乎需要考虑比直接行为所涉及的成本更多的后果。对我们必须做出的每一个道德决定都进行这种计算，既不实际，也常常不可行。行为功利主义也没有考虑到人们内在的责任感或义务感，以及这些因素在道德决策中如何被考量。它还迫使我们把所有道德决策简化为正面或负面的结果，而其中许多结果并不容易量化。最后，行为功利主义将我们引向*道德运气问题*，即当面临道德决策时，你无法完全控制决定行为道德善恶的所有因素。奎因用来解释道德运气的例子是：一位尽责的侄子给他卧病在床的姑妈送了一束花，结果却发现姑妈对花束中的某种花过敏，病情反而加重了。由于对姑妈造成的后果非常负面，这个行为在道德上是恶的，但侄子的意图是好的。^(⁹¹)\
  \ 那么答案是什么呢？也许我们需要做一些改变。\n\n行为功利主义的一种变体是*规则功利主义*，它将效用原则应用于普遍的道德规则，而不是单个行为。因此，我们是对普遍的道德规则进行功利主义计算，而不是对单个行为：“规则功利主义是一种伦理理论，认为我们应该采纳那些如果每个人都遵守，将导致幸福最大程度增加的道德规则。”^(⁹²)\
  \ 这里又出现了“最大多数人的最大幸福”这一概念。让我们来看一个例子。\n\n\n\n计算机蠕虫是一种独立的计算机程序，它利用安全漏洞（通常存在于操作系统软件中）来释放有效载荷，该载荷通常会对受感染系统造成损害，同时还会自我复制，以便传播到其他系统。2003\
  \ 年 8 月 11 日，一种名为“冲击波”的蠕虫被释放到互联网上。冲击波蠕虫利用了 Windows XP 和 Windows 2000 操作系统中远程过程调用（RPC）子系统的缓冲区溢出漏洞，从而访问系统、释放其有效载荷并进行传播。微软早在\
  \ 2003 年 7 月就修补了这个漏洞，但并非所有 Windows 用户都安装了该补丁。在大约四天的时间里，冲击波蠕虫感染了超过 42.3 万台计算机。^(⁹³)\n\
  \n2003 年 8 月 18 日，一种名为“Welchia”的新蠕虫被释放，它利用了与冲击波蠕虫相同的 RPC 漏洞。然而，当 Welchia 在目标系统上安装自身时，它并不会做任何有害的事情，而是首先查找并删除目标系统上的冲击波蠕虫（如果存在的话）。然后，它会下载微软针对\
  \ RPC 漏洞的补丁，安装该补丁，并重新启动目标系统。所有 Welchia 蠕虫的副本都在 2004 年 1 月 1 日自行删除。Welchia 蠕虫在未经目标系统所有者许可的情况下完成了所有工作。在计算机安全领域，像\
  \ Welchia 这样的蠕虫被称为反蠕虫或辅助蠕虫。我们面临的伦理问题是：释放 Welchia 蠕虫的人的行为在伦理上是好是坏？如果是不好的，他们本可以采取什么不同的做法？让我们从规则功利主义的角度来分析这个伦理问题。\n\
  \n要分析这个伦理问题，我们必须创建一个合适的伦理规则，然后判断其普遍采用是否会增加所有利益相关者的效用。我们首先需要一个规则。“如果一种有害的计算机蠕虫正在感染互联网，并且我能够编写一种有益的蠕虫，自动从受感染的计算机中移除有害蠕虫，并保护它们免受未来的攻击，那么我应该编写并释放这种有益的蠕虫。”^(⁹⁴)\
  \ 这样做的好处是什么？显然，每个尚未使用微软补丁更新其计算机的 Windows 用户都会受益，因为 Welchia 会删除冲击波蠕虫、安装补丁，并保护他们的计算机免受冲击波蠕虫的任何进一步攻击。这显然是一个胜利。\n\
  \n那么危害呢？首先，如果每个人都遵循这个规则，那么每当有一种新的恶意蠕虫被释放时，就会涌现大量辅助蠕虫。这会减慢或堵塞网络流量。其次，如果某些辅助蠕虫包含意外的错误怎么办？并非所有有用的程序都是完美的，因此某些辅助蠕虫很有可能损坏目标系统。这会降低单个计算机系统的安全性，最终损害其所有者。最后，网络或系统管理员将难以区分恶意蠕虫和辅助蠕虫。他们只会看到蠕虫试图攻击系统，导致误报，需要加班，并可能同时错过真正的威胁。\n\
  \n允许释放辅助蠕虫的伦理规则所造成的危害似乎降低了互联网上的幸福或效用。因此，不应创建此伦理规则，并且释放 Welchia 蠕虫的人的行为在伦理上是错误的。\n\
  \n规则功利主义似乎保留了行为功利主义的有用部分，但通过放大假设普遍采用规则所带来的后果，使伦理成本和收益的整体计算更加直接。此外，由于我们将这一理论应用于伦理规则，我们也不必为每个行为重新计算成本和收益。我们还可以自由选择我们将要执行的规则，这可以帮助我们摆脱伦理困境。最后，它可以消除道德运气的问题。因此，规则功利主义似乎是一种可行的方式。但有一个问题除外。\n\
  \n在两种形式的功利主义中，都存在一个问题，即*善果在不同利益相关者之间的分配可能不均*。这个问题之所以出现，是因为功利主义只关心幸福总量的增加，而不关心它在所有利益相关者之间如何分配。例如，假设一种行为方式导致每个人获得\
  \ 100 单位的幸福，但另一种行为方式导致一半的利益相关者每人获得 201 单位的幸福。根据功利主义的计算，我们应该选择第二种方案，因为这将带来更多的总幸福，尽管在第二种方案中，一半的利益相关者因一无所获而受到不公平对待。^(⁹⁵)\n\
  \n约翰·罗尔斯（1921-2002）试图通过提出两项*正义原则*来解决这个问题。这些原则指出，在做出伦理决策时，社会和经济不平等是可以接受的，只要它们满足以下两个条件：（1）社会中的每个人都应有平等的机会提升到更高的社会或经济地位；（2）“社会和经济不平等必须得到证明。证明社会或经济不平等的唯一方法是表明其总体效果是为最不利者提供最大利益。”^(⁹⁶)\
  \ 这第二个条件被称为*差异原则*，它为累进所得税等社会政策提供了理由，即收入较高的人缴纳更高的税款，而收入较低的人有权从社会获得更多福利。这两项正义原则旨在增加公平性，在做出伦理决策时提供一个总体上更公平的竞争环境。\n\
  \n## 伦理驱动因素\n\n在所有伦理体系中，都有一套约束和规则来帮助指导任何伦理讨论。讨论计算和软件开发中的伦理问题也不例外。我们将简要介绍其中两个伦理驱动因素，以及它们与软件开发中伦理问题的关系。\n\
  \n### 法律驱动因素\n\n在所有伦理讨论中，我们必须记住要考虑法律，因为法律约束我们的行为，并引导我们沿着社会已确定为可接受行为的伦理道路前进。这类法律驱动因素包括法律（联邦、州和地方）和政府法规（实际上是对法律应如何执行的解释），管辖领域包括知识产权、健康与安全问题、隐私问题以及数据保护。\n\
  \n### 职业驱动因素\n\n每个职业都有一套伦理驱动因素，描述该职业成员应如何行事。在软件开发领域，两个计算专业协会——*美国计算机协会*（ACM）和*IEEE\
  \ 计算机学会*（IEEE-CS）——各自为其成员制定并发布了行为准则。每位软件开发人员都应遵守这些行为准则。*ACM 伦理与职业行为准则*^(⁹⁷) 和 *ACM/IEEE-CS\
  \ 软件工程伦理准则*^(⁹⁸) 的链接在脚注中。我们将以 ACM/IEEE-CS 准则的序言来结束本节。我们已突出显示了特别相关的部分。\n\n\n\n####\
  \ 专业开发者：ACM/IEEE-CS 软件工程职业道德规范序言\n\n计算机在商业、工业、政府、医疗、教育、娱乐乃至整个社会中扮演着日益核心的角色。软件工程师通过直接参与或教学，为软件系统的分析、规格说明、设计、开发、认证、维护和测试做出贡献。*由于他们在开发软件系统中的作用，软件工程师拥有巨大的机会去行善或作恶，让他人行善或作恶，或影响他人行善或作恶*。*为了尽可能确保其努力被用于善途，软件工程师必须致力于使软件工程成为一项有益且受人尊敬的职业*。基于这一承诺，软件工程师应遵守以下道德规范与职业实践准则。\n\
  \n本规范包含八项原则，涉及专业软件工程师（包括从业者、教育者、管理者、监督者、政策制定者，以及该专业的学员和实习生）的行为与决策。*这些原则明确了个人、团体和组织所参与的、在道德上负责任的关系，以及在这些关系中的主要义务*。每项原则的条款是对这些关系中部分义务的说明。*这些义务植根于软件工程师的人性、对受软件工程师工作影响之人的特殊关怀，以及软件工程实践中的独特要素。本规范将这些义务规定为任何自称或立志成为软件工程师之人的责任*。\n\
  \n*本规范无意让其中的个别部分被孤立地用来为不作为或作为的错误辩护。原则和条款的列表并非详尽无遗*。条款不应被解读为在所有实际情况下区分职业行为可接受与不可接受的界限。*本规范并非一个能生成道德决策的简单道德算法*。在某些情况下，不同标准之间或与其他来源的标准之间可能存在冲突。这些情况要求软件工程师运用道德判断，根据具体情况，以最符合《道德规范与职业实践准则》精神的方式行事。\n\
  \n*道德冲突最好通过对基本原则的深思熟虑来解决，而非盲目依赖详细的规章制度*。*这些原则应促使软件工程师广泛思考谁将受到其工作的影响；审视他们自己及其同事是否以应有的尊重对待他人；考虑公众（若具备合理知情）会如何看待他们的决策；分析最弱势群体将如何受到其决策的影响；并思考其行为是否会被评判为符合理想软件工程师的专业水准。在所有这些判断中，对公众健康、安全和福祉的关切是首要的；也就是说，“公共利益”是本规范的核心*。\n\
  \n软件工程动态且要求严苛的环境，要求其规范能够适应并关联到不断出现的新情况。然而，即使在这种普遍性下，本规范也为软件工程师及其管理者提供了支持，使他们能够在特定案例中通过记录该职业的道德立场来采取积极行动。*本规范提供了一个道德基础，团队中的个人以及整个团队都可以据此提出诉求。它有助于界定那些要求软件工程师或软件工程师团队去做在道德上不当的行为*。\n\
  \n本规范不仅仅用于裁决可疑行为的性质；它还具有重要的教育功能。由于本规范表达了该职业在道德问题上的共识，它也是向公众和有志于从事该职业的人士普及所有软件工程师道德义务的一种手段。\n\
  \n上述八项原则如下：\n\n1.  公众——软件工程师的行为应始终符合公众利益。\n2.  客户与雇主——软件工程师的行为应在符合公众利益的前提下，最大限度地维护其客户与雇主的利益。\n\
  3.  产品——软件工程师应确保其产品及相关修改尽可能达到最高的专业标准。\n4.  判断——软件工程师应在其专业判断中保持正直与独立。\n5.  管理——软件工程管理者与领导者应认同并倡导以合乎道德的方式管理软件开发与维护。\n\
  6.  职业——软件工程师应提升该职业的正直与声誉，并符合公众利益。\n7.  同事——软件工程师应公平对待并支持其同事。\n8.  自我——软件工程师应参与关于其职业实践的终身学习，并倡导以合乎道德的方式从事该职业。^(⁹⁹)\n\
  \n类似地，ACM 道德规范包含一套所有计算机科学家都应遵循的通用道德原则。它们包括（采用 ACM 的编号）：\n\n*   1.1 为社会和人类福祉做出贡献，承认所有人都是计算领域的利益相关者。\n\
  *   1.2 避免伤害。即避免任何负面后果。\n*   1.3 诚实可信。\n*   1.4 公平行事，不歧视。\n*   1.5 尊重产生新思想、发明、创造性作品和计算产物所需付出的努力。\n\
  *   1.6 尊重隐私。\n*   1.7 信守保密承诺。^(¹⁰⁰)\n\n## 道德讨论与决策\n\n基于上述理论，可以通过首先识别并描述问题，然后分析问题并做出决策，来达成对某个道德问题的决定。以下是一个关于如何执行这两项任务的示例计划。\n\
  \n### 讨论 1：识别与描述问题\n\n1.  写下道德问题的陈述。这将有助于澄清你究竟在讨论什么。\n2.  列出风险、问题和可能的后果。\n3.  列出所有利益相关者。这包括你自己以及道德情境中涉及的任何其他人，以及直接或间接受决策后果影响的任何人。\n\
  4.  在每个案例中识别所有可能的道德问题。尝试确定情境中的对与错，并找出可能涉及的道德规则。\n5.  识别所有可能的法律问题。这包括知识产权问题以及健康与安全问题。\n\
  6.  如果问题比简单的“是/否”更复杂，列出可能的行动方案。\n\n\n\n### 讨论 2：分析问题\n\n1.  你对这些问题的最初印象或反应是什么？你的*道德直觉*怎么说？\n\
  \n2.  明确决策者的责任。这包括诸如：如果你是员工，需要报告道德问题；以及作为管理者，你的责任可能是什么。\n\n3.  明确所有利益相关者的权利。\n\n\
  4.  考虑不同行动方案对利益相关者产生的后果。分析每个被考虑的行动所带来的后果、风险、收益、危害和成本。\n\n5.  找出软件工程伦理准则和 ACM（美国计算机协会）准则中与问题和行动相关的章节。这将有助于你理解道德规则，并梳理情况，以便考虑其他替代方案。\n\
  \n6.  考虑针对该问题的道义论和功利主义方法。你需要将已考虑的道德规则，以及软件工程和 ACM 道德准则的相关章节放在手边。然后，回顾我们在此处给出的其他道德情境示例，并参照这些示例来分析你自己的情况。\n\
  \n7.  这些道德理论是否指向同一种行动方案？如果指向多个方案，哪一个应该优先考虑？列出不同的行动方案，然后在必要时尝试对它们进行优先级排序。这将有助于你思考不同的行动路线。\n\
  \n8.  你认为哪个潜在行动是正确的？选择它。如果你采用功利主义方法，可以考虑选择一个衡量标准，看看能否衡量该决策的影响。\n\n9.  如果有多个在道德上可接受的选项，选择一个。反思你的决定。\n\
  \n## 案例研究\n\n在本节中，我们将介绍几个简短的案例研究，这些案例说明了作为软件开发人员可能遇到的道德问题类型。这些案例研究将涵盖涉及知识产权、隐私问题、系统安全问题和利益冲突的道德情境。你的任务是分析每个案例研究，识别其中的道德问题，并提出行动方案。请注意，对于特定的道德问题，可能不存在唯一的“正确”答案。\n\
  \n### #1 复制软件\n\n简·哈德森在芝加哥一所市中心高中教授数学。像许多乡村和市中心高中一样，简所在的学校用于购买计算机和软件的资金非常有限。虽然她的学生表现优异，甚至在全州数学竞赛中获奖，但她的许多学生进入高中时，数学基础却严重不足，因此简和她的同事们花费大量时间进行补习。最近，一家当地公司提出向简的高中捐赠\
  \ 24 台 iMac。学校决定用其中 12 台电脑建立一个数学计算机实验室，专门帮助学生补习预代数、代数、几何和三角学。简想在计算机实验室使用一个名为 MathTutor\
  \ 的软件程序，但她想要的那些课程的全站点许可证需要 5000 美元，而学校根本拿不出这笔钱。这所高中已经有一份 MathTutor 的副本，并且该程序没有复制保护。简的系主任建议他们直接为新电脑复制该程序。简认为这不是个好主意，但她非常渴望用新电脑来帮助她的学生。简应该怎么做？这里涉及哪些道德问题？（参见\
  \ ACM 准则 1.5 和 2.3；软件工程准则 2.02。）\n\n### #2 这是谁的电脑？\n\n在 Massive 公司，你是一名软件开发经理。你负责的一个软件项目中的一名开发人员生病请假了。另一名开发人员要求你将生病开发人员电脑上的所有文件复制到他的电脑上，以便他能完成一些重要工作。你应该怎么做？这里涉及哪些道德问题？（参见\
  \ ACM 准则 1.7、2.8 和 3.3。）\n\n### #3 多少测试才算足够？\n\n你是一个开发团队的项目经理，该项目正处于最后阶段，旨在创建一款使用放射疗法摧毁癌性肿瘤的软件。该软件由操作员设置后，控制放射的强度、持续时间和方向。由于这是一个新产品中的新软件，出现了一系列问题和延误。程序正处于系统测试的中期阶段，到目前为止进行的常规测试一切顺利，发现的软件缺陷很少。你的项目经理希望缩短剩余的测试时间，以便赶上（更新后的）软件交付截止日期。这意味着只进行常规测试，而跳过预定的压力测试。你正在决定是否按时交付软件，然后在交付后继续测试，并为发现的任何缺陷发布补丁。这里涉及哪些道德问题？（你应该查阅\
  \ Therac-25 问题，作为类似案例的参考，网址为：[`https://en.wikipedia.org/wiki/Therac-25`](https://en.wikipedia.org/wiki/Therac-25)。）（参见\
  \ ACM 准则 1.1、1.2、2.1 和 3.4；软件工程准则 1.03、1.04、3.06 和 3.10。）\n\n### #4 你应该透露多少？\n\n\
  你是 J2MD 计算机软件咨询公司的负责人。你的一个客户，南卡罗来纳州查尔斯顿市，希望你的公司评估一系列关于新行政管理计算系统的提案，并向该市提供关于接受哪个提案的建议。新系统的合同对中标公司来说价值数百万美元。你的配偶在\
  \ LowCountry Computing（竞标公司之一）工作，她是负责向该市撰写提案的项目经理。你已经看过她提案的早期副本，并认为它非常出色。你是否应该告诉查尔斯顿市的项目经理你配偶在\
  \ LowCountry Computing 的工作情况？如果应该，何时告知，以及还应透露多少其他信息？（参见 ACM 准则 1.3 和 2.5；软件工程准则原则\
  \ 4、4.05 和 4.06。）\n\n### #5 职场虐待行为^(¹⁰¹)\n\n简是一家高科技公司生成式人工智能研究团队的新员工。简在研究生院表现优异，她的导师与她密切合作，并确保她所有的贡献都得到应有的认可。她通常工作出色，因其成为顶尖研究人员的潜力而被聘用。她新部门的技术负责人加里，是一位享有盛誉的优秀研究员。然而，他通常坚持要求团队每篇出版物的主要作者署名都是他。他还脾气暴躁，无法容忍哪怕是微小的错误，并对那些他认为在质疑他或犯错的人——全都是女性——进行报复，将她们的名字从已提交的研究文章中删除。当简将一个包含微小时序错误的代码检入共享代码库后，她很快进入了加里的视线。加里拒绝让简参与软件的现场演示。简向她的主管投诉。加里违反了哪些道德原则？简的主管应该怎么做？\n\
  \n加里的行为显然不专业且具有虐待性。这明显违反了 ACM 准则 1.1、1.2、1.4 和 1.5。简的主管需要就加里的行为与他当面对质。这符合 ACM 准则\
  \ 3.3，该准则谈到领导者要“为团队提供心理健康和人格尊严保障”，以及准则 3.4，该准则要求“领导者阐明、应用并支持反映准则原则的政策。”^(¹⁰²)\n\n\
  \n\n## 关于职业道德的最终定论\n\n每位软件开发专业人士在其职业生涯中都会遇到道德问题。你如何处理这些道德情境，将充分体现你的职业操守和道德品格。在结束本次关于职业实践的讨论之前，让我们再看一份你应该在职业生涯中始终铭记的基本道德原则清单。这份原始清单主要源自奎因，但多年来已有所修改。^(¹⁰³)\n\
  \n1.  *保持公正*。你对公司会有一定程度的忠诚，但你也必须对整个社会和对自己保持忠诚。请务必牢记这一点。\n\n2.  *披露他人理应知晓的信息*。不要向需要知道信息的人隐瞒信息。不要欺骗或故意误导。务必披露任何利益冲突。\n\
  \n3.  *尊重他人的权利*。这包括知识产权、公民权利和其他财产权利。不要窃取、滥用或歪曲他人的财产和贡献。\n\n4.  *公平对待他人*。不要歧视他人。确保他人获得公平的工资、福利以及对其所做工作的认可。\n\
  \n5.  *为自己的作为和不作为负责*。为你所做或未做的一切负责——无论好坏。\n\n6.  *为你所监督之人的行为负责*。俗话说“责任止于此”，这同样适用于身为管理者的你。这也包括确保与你的员工进行有效沟通。\n\
  \n7.  *保持正直*。履行你的承诺。对你的雇主忠诚（只要他们也以合乎道德的方式行事）。不要要求别人做你自己都不愿做的事情。\n\n8.  *持续提升自身能力*。软件开发以及整个计算机行业都处于不断变化之中。你在大学里使用的工具和语言五年后就会过时。确保自己成为一名终身学习者。\n\
  \n9.  *分享你的知识、专长和价值观*。你在职业生涯中积累的经验越多，你就越有义务与同事和下属分享你的知识和专长。你还应该通过践行这些价值观为他人树立榜样。\n\
  \n"
- '# 5. 知识产权、义务与所有权


  > *从我这里接受思想的人，自己获得了教诲，却并未减少我的思想；就像他在我的蜡烛上点燃自己的蜡烛，获得了光明，却并未使我陷入黑暗。思想应当自由地在全球传播，为了人类道德上的相互启迪，以及改善其境况，这似乎是自然独特而仁慈的设计——当她创造思想时，使其像火一样，能在所有空间扩展，而不会在任何一点上降低其密度；又像我们赖以呼吸、活动并拥有物质存在的空气一样，无法被禁锢或独占。*

  >

  > ——托马斯·杰斐逊


  在本章中，我们将讨论一系列与团队和公司相关的问题。这些问题虽然不一定直接影响软件开发，但对于你工作的最终成果——软件本身——却至关重要。^(¹⁰⁴)


  ## 谁拥有什么？


  当你为一家成熟的公司工作，或在一个团队中参与项目，或身处一家初创公司时，*谁拥有*你正在开发的*软件*这个问题会经常出现。如果你为一家成熟的公司工作，比如微软、谷歌、亚马逊，甚至通用汽车，所有权通常相当直接。在你入职的第一天，你会填写许多表格，大部分与税务有关。但其中会有一份表格，作为雇佣条件，你被要求放弃你在为公司工作期间和/或使用公司资源期间所创造的所有知识产权的权利。^(¹⁰⁵)
  从那天起，你为公司创造或修改的一切都被视为“雇佣作品”，归公司所有。^(¹⁰⁶)


  初创公司则有所不同，特别是如果你是初创公司的原始创始人之一。在这种情况下，你们所有人将共同创建并签署一份合同，描述你们作为公司将生产什么，并分配公司的一定比例或产品收益的一定比例给每位创始人。本质上，你们将共同拥有所有知识产权和所有“合作作品”，并商定如何分配。作为课程或大学项目一部分的团队项目，其运作方式与初创公司类似。在这个过程中，可能会有许多独特的、特定于团队和项目的特殊情况，以及大量关于团队中每个人实际比例的讨论。这些讨论需要尽早进行，需要以建设性的方式进行，并且需要在准确理解每个人在“合作作品”方面的权利和责任的基础上进行。未能通过适当且先发制人地解决每个人的关切来达成明确协议，可能会在项目甚至公司起步之前就摧毁你的团队、项目或公司。因此，理解什么是知识产权、谁拥有它以及如何分割它至关重要。


  ## 什么是知识产权？


  知识产权（IP）是一类财产，包括人类智力的无形创造。人类智力的产品在法律上被定性为*非竞争性公共物品*。^(¹⁰⁷) 这意味着同一产品可以同时被多人使用，而不会减少该产品供他人使用的可用性。因此，虽然一次只能有一个人驾驶你的汽车，但许多人可以同时使用
  Microsoft Excel。


  知识产权法旨在激励作者和发明者创作有益于公众的作品。公众对此类作品的使用受到监管，以确保作者和发明者因其努力而获得补偿。因此，知识产权法保护作者和发明者的作品，同时也允许他人对这些作品进行有限使用，从而使作者和发明者能够从其作品中获利。


  在美国，知识产权保护被载入美国宪法第一条第八款第八项，其中规定：“国会有权……通过保障作者和发明者对其各自著作和发现在限定时间内的专有权利，以促进科学和实用技艺的进步。”^(¹⁰⁸)
  所有其他国家也都有知识产权法，但在某些具体细节上可能与美国的法律有所不同。


  我们将探讨在编写计算机软件时可能涉及的三种不同类型的知识产权保护。它们是*公有领域*、*版权*和*专利*。


  ### 知识产权：公有领域作品


  版权、专利和商标都在一定期限内，为作品的原始创作者或发明者提供一定程度的保护，防止他人在未给予公平补偿的情况下使用其作品。创意作品或发明受保护的期限因国家而异，也因原始作品的类型而异。任何未受此类保护的创意作品都被视为属于*公有领域*。请注意，最终所有创意作品和发明都会进入公有领域，而公有领域是永久的。公有领域意味着任何人都可以复制、修改、表演该作品，从中制作实体产品等，并且他们无需向原始创作者或发明者提供补偿，也无需获得许可即可进行修改。例如，你可以表演你的现代版《哈姆雷特》，而无需给威廉·莎士比亚寄支票，因为他所有的作品都已进入公有领域。




  ### 知识产权：版权


  根据美国版权局的定义，“版权是一种知识产权，它保护作者以**有形表达形式** **固定**下来的**原创作品**。在版权法中，作品类型多种多样，包括绘画、照片、插图、音乐作品、录音制品、计算机程序、书籍、诗歌、博客文章、电影、建筑作品和戏剧。”^(¹⁰⁹)


  如前所述，版权被载入于 1788 年批准的美国宪法中。第一部版权法于 1790 年由国会通过。该法规定初始版权期限为 14 年，并允许续展 14 年。^(¹¹⁰)
  你必须向美国版权局注册版权，并且为了续展版权，需要再次注册。你还必须将你的作品标注为版权所有。


  1830 年，初始版权和续展的期限均延长至 28 年。


  1976 年的《版权法》取消了强制正式注册和续展的要求。因此，自 1976 年起，任何创造性作品一旦创作完成并以“有形”或“固定”形式（包括纸张、胶片、计算机内存等）呈现，即自动获得版权。该法案还将版权期限延长至
  75 年或作者有生之年加 50 年，并取消了标注作品为版权所有的要求。尽管如此，即使不再强制要求，通常还是建议在作品上标注版权声明。请注意，本书的标题页背面就有版权声明。


  1998 年对《版权法》的修订进一步将版权期限延长至 120 年或作者有生之年加 70 年。^(¹¹¹) 这项修订俗称“米老鼠保护法案”，因为普遍认为，如此长时间的版权保护延长，旨在保护华特迪士尼公司对米老鼠角色的版权，使其延续到
  21 世纪 20 年代。


  #### 版权赋予你哪些权利？


  在美国，一旦你的作品获得版权，你就拥有与该作品相关的六项专有权利：^(¹¹²)


  *   复制作品的权利

  *   创作衍生作品的权利（例如，将书籍改编成戏剧）

  *   分发复制品或转让作品所有权的权利

  *   公开表演作品的权利

  *   公开展示作品的权利

  *   通过数字音频或视频传输公开表演作品的权利


  除非你正式将这些权利授予他人，否则其他人不享有这些权利。


  #### 哪些东西可以申请版权？


  只有以固定形式存在的创造性知识产权才有资格获得版权。在美国，你可以为以下类型的作品申请版权：^(¹¹³)


  *   文学作品

  *   音乐作品

  *   戏剧作品

  *   哑剧和舞蹈作品

  *   绘画、图形和雕塑作品

  *   视听作品

  *   录音制品

  *   衍生作品

  *   汇编作品

  *   建筑作品

  *   计算机软件


  #### 哪些东西不能申请版权？


  以下内容不能申请版权：^(¹¹⁴)


  *   未以有形、固定形式记录下来的未固定作品（例如，你今天在淋浴时即兴创作并演唱的那首歌）

  *   已经进入公共领域的作品

  *   标题、名称、短句和标语

  *   常见的符号或设计

  *   数字和数学事实，包括公式

  *   思想和事实

  *   流程和系统（例如，杜威十进制分类法不能申请版权）

  *   语法规则（例如，“i 在 e 之前，除非在 c 之后”不能申请版权）

  *   食谱（但仅限配料清单。关于如何混合配料的说明可以申请版权。你也可以使用该食谱为家人做菜，无需获得许可。）

  *   为美国联邦政府工作所产生的任何成果都不能申请版权；所有此类作品自动进入公共领域。

  *   用户界面（但你可以为用户界面申请外观设计专利。下文将详细介绍。）


  #### 版权冲突：苹果诉微软与用户界面设计


  在 20 世纪 80 年代中期，第一台苹果麦金塔电脑及其先进的图形用户界面（GUI）发布后，苹果公司将部分图形界面授权给了微软，微软希望在其 Windows 1.0
  产品中使用这些部分。1987 年，当微软透露下一代 Windows 版本 Windows 2.0 的细节时，苹果公司起诉微软侵犯版权，声称新 Windows 的许多用户界面元素是从麦金塔窃取的。在该案中，苹果公司强调，法院应考虑整个用户界面的“外观和感觉”，而不仅仅是单个元素。他们声称麦金塔
  GUI 的“外观和感觉”受版权保护。^(¹¹⁵)


  在此案进行期间，施乐公司起诉苹果侵犯版权，声称麦金塔用户界面本身是复制自施乐 Alto 计算机，该计算机于 20 世纪 70 年代末推出。1981 年和 1982
  年，包括苹果 CEO 史蒂夫·乔布斯在内的苹果麦金塔工程师曾访问施乐的帕洛阿尔托研究中心（PARC），并参观了 Alto 及其在当时独特的图形用户界面。施乐在其诉讼中主张，麦金塔的
  GUI 直接源自 Alto 的 GUI，其实现方式超出了苹果与施乐 PARC 之间类似的技术共享协议范围。


  最终，微软和苹果在案件进入陪审团审判前达成了和解。法官写道，你可以为思想的表达申请版权，但不能为思想本身申请版权，而苹果的“外观和感觉”是一种思想。因此，只有用户界面的各个独立部分可以申请版权，而非整体。例如，你不能为可点击按钮这一思想申请版权，但你可以为特定按钮的艺术设计申请版权。因此，苹果的垃圾桶图标受版权保护，但将文件扔到特定位置这一思想则不受保护。同样，你不能为使用弹出对话框（思想）申请版权，但你可以为你创建的弹出窗口中特定的书面解释申请版权。


  你的设计越具艺术性和原创性，版权提供的保护就越多。但版权的保护是有限的，虽然版权可能保护某些独立的设计元素，但它并非保护整个用户界面的好方法。为此，应该使用*外观设计专利*（请参阅下文“专利”部分）。




  #### 合理使用：版权的“免狱金牌”


  有时，你可以在未经许可的情况下使用受版权保护作品的部分内容。这被称为“合理使用”。^(¹¹⁶) 要被视为合理使用，对受版权保护作品的使用必须满足四个标准：


  1.  *使用的目的和性质*：主张合理使用的一方如何使用受版权保护的作品。非营利性和教育性用途被认为是可接受的，而商业用途则不被认可。^(¹¹⁷) 例如，在课堂上作为课程的一部分使用受版权保护作品的部分或全部内容，通常是可以的。


  2.  *受版权保护作品的性质*：更具创造性的作品获得更多保护。例如，书面小说和诗歌被认为享有更高的版权保护。


  3.  *使用作品的数量*：相对于整个受版权保护作品的规模而言，所使用的数量。越少越好。对于小说，使用几百个单词可能没问题；对于歌曲和视频作品，通常也允许使用少于
  10%的内容。


  4.  *使用行为对受版权保护作品潜在市场或价值的影响*。如果你使用受版权保护作品的部分内容并未削弱该作品的市场或价值，那么这很可能没问题。


  关于使用受版权保护作品的底线是，诸如批评、评论、新闻报道、教学、学术研究、戏仿/讽刺以及研究等活动，通常都属于符合合理使用条件的例子。从 CD 或互联网上复制一首歌并分享或出售，则绝对不属于合理使用。例如，可参考
  Napster 案。^(¹¹⁸)


  ### 知识产权：专利


  根据美国法律，专利是授予一项工艺、机器、制造品或物质组成的发明人的权利，该发明必须：


  1.  是新颖且有用的，


  2.  是非显而易见的，


  3.  具有工业实用性，也称为*功能效用*（即，它必须能产生某种作用），


  4.  并且不能是“*现有技术*”，意味着它之前不能被授予过专利。^(¹¹⁹)


  发明人获得专利——政府给予的固定期限的保护——以换取其发明的公开披露。


  #### 什么是专利？


  专利是在有限时间内（美国通常为 20 年）*排除他人*未经专利持有人同意而从新发明或技术中获利的权利。专利持有人可以将专利许可给他人，以制造、销售、进口或出口该设备。然而，除非你获得许可，否则你不能使用该专利。专利许可可以是免费的，也可以涉及向专利持有人支付版税。专利通常也只在授予专利的国家得到承认，因此，如果你想在美国、欧盟、英国和中国销售你的新设备，你必须在所有这些司法管辖区获得专利。有些条约允许某些专利在多个司法管辖区得到承认。


  你不能续展专利。一旦其期限届满，该专利即被视为进入*公共领域*。一旦专利进入公共领域，任何人都可以基于该专利创造产品，而无需获得许可或向原始专利持有人支付任何许可费。这种不可续展性是制药公司对新药收取高额费用的众多原因之一。他们只有
  20 年的时间来收回研发投入的所有资金并为股东创造利润。一旦一种药物进入公共领域，任何其他制药公司都可以生产该药物，这些药物就变成了*仿制药*。绕过不可续展性的唯一方法是原始专利持有人为原始专利的*改进*或*修改*获得一项新专利。


  #### 你不能申请专利的内容


  你不能为以下内容申请专利：


  *   抽象概念，


  *   物理现象，


  *   数学公式，


  *   自然规律，


  *   生物，


  *   元素，


  *   思维过程，


  *   印刷品，


  *   大多数商业方法，以及


  *   计算机软件（某种程度上。我们接下来会详细讨论软件专利。）


  #### 软件专利


  你编写的任何计算机源代码都会自动受到版权保护，但这仅涵盖实际的源代码文本。版权不保护你代码中的任何新颖算法，也不保护你实现现有算法的新流程等等。为此，你需要专利。对于最终成为实体产品或创造产品的新颖工艺的机械或电气发明，描述、提交申请和获取专利是相当直接的。不幸的是，获得软件专利要复杂一些。


  首先，软件不是实体产品。其次，它需要改变形式才能发挥作用。你可以编写一个新颖的程序，但你的源代码不是可执行格式。你首先必须通过编译器，针对特定的目标机器，将你的软件从源代码形式转换为机器代码，才能使其执行。其次，即使作为可执行文件，你的软件也无法独立运行。它必须在特定的操作系统下执行，而该操作系统又必须在特定类型的计算机（硬件）上运行，才能产生其设计要创建的输出。（你的
  Mac 应用无法在 Windows 上运行，除非你为此重写并重新编译它。）此外，请记住那些不能申请专利的内容列表；我们不能为抽象概念、数学公式、思维过程和大多数商业方法申请专利。仅此一点就使得为一件软件获取有意义的保护性专利变得困难。而更有趣的是，美国专利法中任何地方都没有提及软件，也没有定义“软件专利”这个短语。^(¹²⁰)


  美国政府至少从 1972 年起就一直在纠结软件专利的问题，当时专利局为一种将二进制编码十进制（BCD）数转换为纯二进制表示的算法颁发了专利。^(¹²¹) 然而，42
  年后的 2014 年，美国最高法院在*Alice Corp 诉 CLS Bank International*案中推翻了该判例，并宣告大多数其他软件专利无效，^(¹²²)
  裁定大多数软件不可申请专利，因为它代表了*抽象概念*，因此应被视为*现有技术*。为了给软件专利申请提供一些明确性，最高法院定义了一个测试，现在被称为*Alice-Mayo*框架。根据这个由两部分组成的
  Alice-Mayo 框架，专利局要求：(1) 新发现的数学公式或算法应被视为已知（即，它是*现有技术*），并且 (2) 专利申请必须包含一个额外的“创造性概念”，将(1)的应用限制在特定且非平凡的用途上。^(¹²³)


  在 Alice Corp 判决和 Alice-Mayo 框架创建之后的几年里，法院和美国专利局一直在纠结如何对可能可专利的软件创新进行分类。他们重点关注那些“针对计算机运行方式的特定改进，体现在自引用表中”的专利权利要求。^(¹²⁴)
  这意味着，尽管算法通常被视为现有技术，但强调“计算机运行方式的特定改进”的软件专利权利要求可能是可专利的。故事还在继续……^(¹²⁵)




  #### 专利类型


  专利通常分为三种类型：


  1.  *外观设计专利*是针对制品的原创、新颖且具有装饰性的设计所授予的专利。外观设计专利保护的是产品的外观或造型。它要求发明的设计具有原创性和实用性。对于 2015
  年 5 月 13 日之后提交的申请，外观设计专利的有效期为 15 年。虽然你不能为“外观和感觉”申请版权，但你可以将其作为外观设计专利进行保护。外观设计专利可以保护图形用户界面（GUI）的“外观和感觉”。如果普通观察者会将另一个
  GUI 误认为是你的，则构成对外观设计专利的侵权。请注意，外观设计专利不保护用户界面的功能性方面。这方面需要申请实用新型专利。


  2.  *实用新型专利*，或称发明专利，为发明了新的且有用的流程、制造品或物质组合的人提供法律保护。实用新型专利通常用于保护新的物理设备，例如特定类型的电动自行车或新型吊扇。实用新型专利的有效期为
  20 年，并需要定期缴纳维护费。如果你不缴纳维护费，专利将失效。大多数人提到“专利”这个词时，想到的就是实用新型专利。


  3.  *植物专利*^(¹²⁶)（是的，就是那种生长/有生命的植物）授予那些生产、发现并发明了可繁殖的新型植物的人。例如，你培育出的玫瑰新品种就可以申请专利。此类专利自申请日起有效期为
  20 年，无需缴纳维护费。请注意，植物专利不适用于 DNA、RNA、药物、基因组等，这些需要申请实用新型专利。


  ### 知识产权：所有权与你


  在本章开头，我们讨论了在团队项目中（主要是在课堂、研究实验室和初创公司中）工作，在知识产权（尤其是计算机软件）的所有权方面有何不同。这一点对于版权尤其如此，因为《版权法》区分了*个人作品*、*衍生作品*和*合作作品*。


  *个人作品*显然是由单个人创作并拥有的作品。


  *衍生作品*是基于现有受版权保护的作品而产生的产品。^(¹²⁷) 版权持有人有权基于自己的作品创作衍生作品。如果其他人未经版权持有人许可创作了衍生作品，例如将小说改编成视频，则构成*版权侵权*，版权持有人可以起诉要求赔偿。


  这就引出了*合作作品*。^(¹²⁸) *合作作品*^(¹²⁹)是由多个创作者共同创作的产品。美国《版权法》第 101 条将合作作品定义为“由两位或两位以上作者共同创作，且意图将其贡献合并为一个统一整体中不可分割或相互依存的部分的作品”。这包括课堂团队项目所涉及的工作，或初创公司的共同产出。创作团队的所有成员（不仅仅是开发者）共同且平等地拥有最终产品的版权。这会产生若干影响。例如，由于团队所有参与者都拥有版权，其中任何一人都可以对源代码进行修改，从而创作出衍生作品。其次，他们无需咨询共同所有者，就可以将源代码许可给其他打算使用该产品或对其进行修改以创作自己衍生作品的人。不用说，大多数组织都要求参与者签署一份合同，明确规定每个人对合作作品能做什么、不能做什么，以及任何衍生作品的版权归谁所有。^(¹³⁰)


  *合作作品*的复杂性还有另一个层面。如果一个人对某个产品有了想法，并将该想法以固定形式记录下来，比如记在笔记本上，或做成软件实现的原型，那么他们就拥有该工作产品（即该想法的特定表达或实现）的版权。如果他们随后加入一个团队或创建一家初创公司，其目的是实现并扩展最初的想法，那么*合作作品*的概念就变得有些模糊了。首先，原始创作者拥有原始工作产品的版权。但是，一旦团队开始致力于创作合作作品，本质上是在创作原始作品的衍生作品，那么团队成员就平等地拥有后续合作作品的版权。团队中的任何成员都可以许可该作品或自行对其进行修改，因此在创作衍生作品之前就其所有权达成一致非常重要。然而，还存在一个问题，即原始作品由原始作者享有版权，因此，创作了新的、独立的衍生作品的团队成员需要获得原始作者的许可或取得许可，才能使用原始版权作品中的任何部分。如果处理不当、没有预先且公平地解决，这些复杂性中的任何一个都可能给团队带来重大法律和人际关系问题，阻碍合作，并最终影响产品本身。


  简而言之，对于不受预先设定的所有权协议（例如雇主的协议）约束的团队项目，请确保在开始创作工作之前，签署一份明确且详细的协议。


  '
- "# 6. 需求\n\n> *构建软件系统最困难的部分是决定要构建什么。在概念性工作中，没有其他部分像确定详细的技术需求（包括与人、机器和其他软件系统的接口）那样困难。没有其他部分如果做错了会如此严重地破坏结果。没有其他部分在事后更难以纠正。因此，软件构建者为客户执行的最重要的功能，就是反复提取和提炼产品需求。*\n\
  > \n> ——弗雷德·布鲁克斯^(¹³¹)\n\n在你开始编码之前——是的，*在*你开始编码*之前*——你需要知道你要构建什么。这就是需求：一份清单，列出了为了创建你的出色程序而必须实现的所有内容。大多数开发者讨厌需求。真的。我们只想坐下来开始编码。我们所有人都有那种超级程序员的心态；只要把问题给我们，我们就能坐下来，边设计边编码。才不是！如果你想成为一名高效的开发者，减少错误，并拿出一个良好、干净的设计，你需要需求。需求越详细越好。一套好的需求能告诉你程序应该做什么。它为你提供了框架，你可以围绕它来构建你的设计。无论如何你都需要做需求——这是标准开发生命周期中无法避免的步骤之一——但如果你不在项目中为它留出空间，你就无法创建出伟大的程序。有意识地对待需求会迫使你思考程序的细节，同时也让你倾听用户的声音，从而更好地了解他们真正想要什么。那么，让我们来谈谈需求。\n\
  \n\n\n## 我们讨论的是哪种需求？\n\n我们实际上讨论的是*功能需求*。也就是说，用户启动程序后能看到并能使用的功能列表。这些是展示程序外部行为的“黑盒”需求。对用户而言，这些是唯一重要的需求。在计划驱动型流程中，识别需求这一活动的输出是一份关于软件系统应实现功能的*功能规格说明书*。对于敏捷流程，其输出则是一组定义*产品待办列表*的*用户故事*。\n\
  \n在项目需求挖掘过程中，你通常会看到四种不同类型：用户需求、领域需求、非功能需求以及非需求。\n\n### 用户需求\n\n用户需求几乎总是用自然语言表达。它们是用户在使用程序时期望看到的具体细节。这些需求还包括对屏幕布局、对话框和菜单的描述。程序中任何交互元素都应在用户需求中加以描述。例如：\n\
  \n*登录系统*：当格洛丽亚点击主页上的“登录”按钮时，屏幕中央会出现一个登录对话框。登录对话框必须包含两个文本框，分别标注为“用户名”和“密码”。对话框中还必须有两个按钮，分别标注为“提交”和“取消”。如果格洛丽亚在任何时候按下“取消”按钮，对话框应消失，她将返回上一个屏幕。在正常使用中，她会点击“用户名”文本框并输入用户名，然后点击（或按\
  \ Tab 键切换到）“密码”文本框并输入密码。在“密码”文本框中输入的文本必须隐藏。格洛丽亚输入完用户名和密码后，必须按下“提交”按钮。如果她输入了正确的用户名/密码组合，她将进入主菜单页面。如果格洛丽亚的用户名/密码组合不正确，对话框中会显示“用户名或密码无效，请重试”的消息，文本框将被清空，她将获得再次登录的机会。\n\
  \n你可以将用户需求表达为场景和/或逐屏的详细描述。在定义用户需求时，请记住尽可能使用图片。如果你的程序是基于 Web 的，你可以在开发前创建大量快速粗糙的数字版甚至手绘版线框图向用户展示。这将有助于明确期望，并极大地促进对功能元素和风格选择的讨论。\n\
  \n### 领域需求\n\n这些是程序的应用程序领域强加给你的需求。如果你正在编写一个新版本的所得税程序，你将受到最新国税局法规的约束。总账程序必须遵守最新版的《公认会计原则》（GAAP），而智能手机则需要实现最新的全球移动通信系统（GSM）协议。你不需要写下所有这些需求，只需引用它们即可。一套详细的领域需求为开发人员提供了程序设计过程中所需的信息。领域需求通常被认为是“中间层”软件，因为它们是应用程序的核心，位于用户界面之下，操作系统、网络或数据库软件之上。许多领域需求将作为独立的类和库来实现，并拥有自己的\
  \ API。用户只关心那些影响上述用户需求的领域需求。\n\n### 非功能需求\n\n非功能需求是对程序服务和功能的约束，以及对程序性能的期望。它们可以包括目标平台规格、时间约束、性能要求、内存使用要求、文件访问权限、安全要求、响应时间、每秒最小事务处理数量等等。这些通常是用户可能看不到但确实会影响用户体验的需求。非功能需求的一个例子是，你的网页需要在\
  \ 3 秒内加载并显示。\n\n### 非需求\n\n非需求是指产品*不会*做的事情。你需要将这些传达给客户，因为在列出程序将做什么之后，需求阶段最重要的事情就是*管理期望*。在发布前的最终演示中，客户可能说出的最糟糕的话之一就是：“但我以为它会做……”。你需要告知项目中的所有利益相关者程序将要做什么，以及它*不会*做什么。特别是，你需要让他们知道所有不会实现的需求相关方面——至少在当前版本中不会实现，例如“一次只能运行一个倒计时定时器”或“不会有允许按食物类型选择解冻模式的解冻周期”。但要注意，因为你的程序不会做的事情的实际列表几乎是无限的。尽管如此，关键的非需求应该与客户明确讨论，并在你的设计文档中清晰陈述。\n\
  \n## 在计划驱动型项目中收集需求\n\n*功能规格说明书*完全从用户的角度描述程序将做什么。它不关心软件是如何实现的。它讨论程序的功能，并指定屏幕、菜单、对话框等。可以把它看作是一本写得不好的用户手册。另一种规格可以称为*技术规格说明书*。技术规格说明书描述程序的内部实现细节。也就是说，它讨论数据结构、使用的算法、数据库模型、编程语言的选择等等。我们不打算讨论技术规格，只讨论功能规格。\n\
  \n“等等，”你说。“我们在第 2 章中讨论的那些敏捷方法论呢？*它们*不写功能规格说明书。所以你看！我可不用操心了。”事实上，敏捷方法论*确实*会编写功能规格说明书。只是它们的形式不同于某些计划驱动型方法论所要求的\
  \ 300 页单倍行距的需求文档。敏捷方法论要求你与客户代表或产品负责人一起编写*用户故事*，来阐述程序将做什么。那也是一种规格。我们将在本章后面讨论敏捷方法论如何处理需求。本章的重点以及贯穿全章的理念是：*在开始编码之前，写下你的程序应该做什么*。\n\
  \n\n\n### 收集需求：但我就是不爱写文档！\n\n软件开发者常抱怨自己不会写文档。一派胡言！每个人都能学会编写功能规格说明。但写作确实是项苦差事。你必须真正投入其中，勤加练习才能写好。如果你还在上学（无论是本科还是研究生），不妨选修一门写作课——那种要求你每周撰写分析性文章、虚构故事、诗歌或科学报告的课程。你还应该学会批判性地阅读他人作品；无论好坏，阅读他人的文字都是提升写作水平的绝佳途径。\n\
  \n功能需求应当始终使用自然语言编写。为什么？这涉及萨丕尔-沃尔夫语言相对论假说，你难道不知道吗？^(¹³²)简而言之，语言不仅决定了你*会*说什么，更决定了你*能*说什么（以及思考什么）。也就是说，你所使用的语言决定了你能产生何种思维；它会约束你的思考过程，从而影响你能思考的内容以及表达方式。如果某种语言无法容纳特定类型的思维，你便很难产生这些想法。自然语言比编程语言更具表现力和多样性，因此你应该用自然语言编写需求和设计方案，而将编程语言留待后续实现。无论你是否相信萨丕尔-沃尔夫假说，用自然语言开发功能需求几乎总是明智之举——这样你就不会过早陷入编程语言的语法和语义细节中。这并不意味着在编写功能需求时不能考虑实现问题（你难免会想到，请相信我们），只需将这些想法归入规格说明的“技术备注”侧边栏或单独文档即可。^(¹³³)你还可以参考肯尼斯·艾弗森在图灵奖演讲《符号作为思维工具》中的相关论述。^(¹³⁴)\n\
  \n### 收集需求：功能规格说明大纲\n\n通常而言，功能规格说明应包含以下要素。其中许多观点源自斯波尔斯基。^(¹³⁵)请记住，每个功能规格说明都各不相同，正如每个软件开发项目都独具特色。因此，请灵活参考此大纲，仅采用适用于你项目的部分。\n\
  \n#### 概述\n\n这是你的执行摘要。用一两段文字说明程序的功能。例如：\n\n“本程序用于控制微波炉。它通过键盘和液晶显示屏实现用户输入输出功能。其功能限定于标准微波炉应有的范围，额外增加了披萨和咖啡加热专用按钮。此外还支持时钟显示和独立倒计时功能。不控制照明灯。配备安全联锁装置，当炉门打开时会阻止微波启动。”\n\
  \n#### 免责声明\n\n你应在文档开头明确声明：“本规格说明尚未完成。如发现遗漏或错误，请发送邮件告知。”这有助于让市场人员不再纠缠你，并让你能将新功能请求直接归档到邮件垃圾箱。许多人会在文档页眉或页脚添加醒目的黑色“草稿”字样。这同样有效，但人们往往视而不见。有些人会在规格说明中使用巨大的“草稿”水印，让每页文字背后都嵌入该字样。但这同样无法阻止人们对你发难。在适当时机，你的免责声明应改为：“本规格说明已涵盖本版本的全部内容。如发现遗漏或错误，请发送邮件给作者，我们将在下一版本中考虑。”\n\
  \n#### 作者姓名\n\n必须有人对功能规格说明负责。不是委员会，不是开发团队，而是*一个人*。这通常是开发经理或项目经理，具体取决于公司如何组建开发项目。不同的组织架构各有利弊。\n\
  \n如果由开发经理（即开发人员的直属上级）负责功能规格说明，那么此人通常能全面掌握项目的技术细节。这是好事。但另一方面，如果你的上司编写功能规格说明，你可能更难向她指出规格说明中的问题或表达不同设计意见。此外，开发经理可能曾是开发人员出身，因此未必具备与市场、客户、文档、测试等部门沟通所需的人际交往能力（即：魅力和社交技巧）。\n\
  \n如果你的公司让项目经理负责规格说明、设计和进度安排，但开发人员不直接向他们汇报，那么你可能会遇到技术能力不如前开发人员的人。但另一方面，这些人通常能轻松赢得其他团队的青睐，使谈判过程更加顺畅。项目经理确实需要具备一定的技术能力，并且要非常善于让所有利益相关者就功能规格说明的内容达成共识。\n\
  \n#### 典型使用场景\n\n这些才是真正的需求。让客户回应需求清单的绝佳方法，是在规格说明中呈现几个程序的典型使用场景。这些被称为*用户故事*，具有以下优势：\n\
  \n*   首先，如果你以用户故事的形式编写需求，客户更有可能阅读它们。\n*   其次，客户更有可能理解你的意图，并提出你遗漏或理解有误的想法。这总是件好事，因为你在流程早期获得的客户反馈越多，就越有可能真正创造出他们想要的产品。\n\
  \n在许多敏捷方法中（包括 Scrum），需求通常以用户故事的形式编写。由于客户通常是敏捷项目团队的一员，你可以持续获得关于用户故事和每日程序构建的反馈。在 Scrum\
  \ 中，客户并非必须成为项目团队成员，但强烈建议他们与团队保持密切联系。此外，在 Scrum 中，较短的冲刺周期让客户能更频繁地看到产品的工作版本。在统一建模语言（UML，参见[`www.uml.org`](http://www.uml.org)）中，有一套完整的符号体系用于创建用例（即场景或用户故事的另一种说法）。但如前所述，没有什么比自然语言更适合描述需求。我们将在第\
  \ 10 章中再次讨论用例。\n\n一旦编写了几个场景，你就能更清晰地了解程序的流程，以及需要哪些屏幕、对话框、菜单等。这让你能够逐一审视每个屏幕，详细规划其布局、包含的按钮、文本框、图标、图形等元素，以及它们与其他屏幕的连接关系。多用图示！自然语言固然出色，但本质上存在歧义，因此一张屏幕或对话框的图片胜过千言万语。它能让读者更清晰地了解你的规划（双关语），并促使他们思考程序流程以及他们对用户界面的需求和期望。\n\
  \n\n\n#### 未决问题\n\n当你初次编写功能规格说明书时，总会有一两个甚至二十个你不知道的问题。这很正常。只需将它们放入“未决问题”部分即可。然后，每次与客户会面时，都指向这一部分并尝试获取答案。在得到这些答案后，其中一些问题会移至需求部分，而另一些则会进入“非需求”部分。不过，到项目结束时，这一部分应该清空。如果没有，那么，你就有一些会困扰你的问题了。\n\
  \n### 收集需求：设计与新功能构想\n\n如果你和大多数开发者一样，在收集和分析需求的过程中，你会一直在脑海中尝试设计和编写程序代码。这正是开发者会做的事。开发者和项目经理通常会创建两种类型的笔记：一种是包含设计或编码思路的技术笔记，供开发者使用；另一种是包含功能想法的营销笔记，供营销人员和客户参考。因此，为了不忘记在需求阶段产生的设计和实现想法，请单独准备一个笔记本。这个笔记本只是一个独立的文档，用于记录后续的笔记。理想情况下，它是一个与整个团队共享的文档。\n\
  \n最后，随着项目进入开发阶段，新的需求和功能会不断涌现。这种情况总是会发生。但如果你想按计划推进并交付可用的产品，你*绝不能*实现所有出现的新需求。如果你希望保持需求的最新状态，你需要一个地方来存放所有后续要完成的任务。这就是*待办事项列表*的用途，它包含了你在产品下一个版本中将要考虑的所有需求。这能为你带来几个好处。它告诉客户你没有忘记这些功能，并且通过将它们移至下一个版本，你承诺会尽可能按照已公布的时间表交付当前版本。同时，它也向开发者表明你并未失控，项目有很大机会高质量、按时完成。关于待办事项列表的更多信息，请参阅第\
  \ 2 章中关于 Scrum 敏捷方法论的任何描述。^(¹³⁶)\n\n### 收集需求：还有一件事\n\n关于功能规格说明书还有一件事：不要过度纠结。你很可能会很好地挑选出需求并将其写入功能规格说明书中，但它可能不会像你希望的那样详细，也不会是完整的。别担心。功能规格说明书只有在发布版本时才算完整。不要花时间试图让每一个细节都正确无误；也不要花时间试图从客户那里挖掘出每一个需求。这根本不可能实现。设定一个时间限制，尽力而为，然后放手。你总不希望一群开发者无所事事地干坐着，等待规格说明书吧？另外，请记住，软件开发是一个棘手的问题，因此我们的需求只需令人满意且足够充分即可。我们追求的是“满意化”，因为优化软件开发是不现实的。\n\
  \n## 在敏捷项目中收集需求\n\n首先要明确一点：在敏捷开发项目中，没有正式的功能规格说明书。这是因为敏捷开发者从一开始就认识到需求会发生变化，所以他们应该拥抱变化，并尽可能推迟对需求和设计的决策。此外，由于在敏捷项目中，客户是团队不可或缺的一部分，敏捷开发者也知道他们可以立即获得关于功能实现的反馈，并能及时从客户那里获得需求的更新。这并不一定使收集需求的过程变得更容易，但它让每个人都更有信心，相信当前的需求集合是正确的集合。\n\
  \n对于大多数敏捷方法论来说，需求收集的核心概念是*用户故事*。用户故事正是如此：对客户为了完成某种工作而想要执行的某个功能或场景的描述。描述用户故事内容的经典方式是：\n\
  \n“*作为一个<角色>，我想要执行<动作>，以便<原因/收益>*。”\n\n通过这种方式表达用户故事，你就明确了需求的*谁*、*什么*和*为什么*。\n\n\
  ### 敏捷需求收集：三个 C\n\n一个用户故事有三个基本组成部分，由 Ron Jeffries 在 2001 年提出^(¹³⁷)：卡片（Card）、对话（Conversation）和确认（Confirmation）。\n\
  \n#### 卡片\n\n所有用户故事都写在*卡片*上。一张卡片可以是一张便利贴、一张索引卡、一张纸，甚至是一张数字卡片。基本上，它可以是任何物理或数字的二维矩形，能够在某个物理或数字看板上移动。虽然卡片上包含故事文本“作为一个<角色>，我想要执行<动作>，以便<收益/结果>”，但它实际上是对一次协作对话的邀请，旨在探讨故事的真实含义以及用户的真实需求。请注意，卡片通常不会非常详细；它通常只包含故事的概要。它是一个占位符，代表后续将详细讨论的真正需求。不过，利益相关者可以在卡片上书写，添加估算、问题等内容。\n\
  \n#### 对话\n\n关于用户故事的*对话*发生在项目中所有重要的利益相关者之间，包括产品负责人或用户、开发团队、测试人员、营销人员，可能还有其他人。这是一次实质性的讨论，探讨产品负责人真正想从故事中得到什么。理想情况下，对话是面对面进行的（或使用最接近的技术手段），讨论内容包括故事的更多细节，可能还有规模估算，以及故事相对优先级的评估。如果初步估算表明实现该故事的工作量可能过大（理想情况下，故事应能在一次工作会话中完成，但任何故事都不应超过单个开发冲刺的计划时长，尽管其未来的迭代可能会），对话也可能包括将原始故事拆分成两个或更多更小的故事。\n\
  \n#### 确认\n\n用户故事的最后一个组成部分是*确认*。用户或产品负责人以故事的*验收标准*形式提供此信息，通常以简短的要点列表形式写在卡片背面。这些标准将成为*验收测试*，产品负责人将使用这些测试来确认故事的实施是否被用户接受。创建验收测试的最佳方式是让产品负责人生成故事使用中的示例，然后由开发团队将这些示例自动化。这样，产品负责人就可以在交付的功能上执行验收测试，并确认实现是否有效。\n\
  \n### 敏捷需求收集：用 INVEST 原则评估故事\n\n如果我们要围绕用户故事来构建我们的开发，我们如何确保我们的用户故事是好的呢？用户故事的许多细节会在对话和确认过程中浮现出来，但这些细节并不能直接帮助我们判断故事的*质量*或其整体有用性。Bill\
  \ Wake 使用首字母缩略词 INVEST^(¹³⁸) 阐述了优秀用户故事的特征：\n\n\n\n#### 独立性\n\n这里的核心理念是，你的用户故事应该*彼此独立*，即每个故事都能独立于其他任何用户故事进行排期和实现，即使它最终需要多个敏捷迭代才能完全实现。韦克举了一个多层蛋糕的例子：如果你从蛋糕中切出一块，你可以独立于其他任何一块，单独吃掉（实现）这一块。但这并非总是可行；想想手机中的无线电软件。为了全面测试某个用户故事所体现的用户界面，你可能需要先让所有无线电软件都能正常工作。你会在后面的面向对象设计中看到同样的理念，即“松耦合”。\n\
  \n#### 可协商性\n\n一个好的故事应为所有利益相关者*协商其实现细节*留出空间。故事提供了需求的精髓，但不应具体到像一份合同。相反，它应为开发者提供一个目标，同时允许产品负责人和开发者共同创建一个可行的解读，从而实现一个既可行又令人满意的方案。\n\
  \n#### 有价值性\n\n一个好的用户故事必须*对客户有价值*。它必须描述客户想要的一个特性或一项服务。由于用户故事将在开发迭代中进行排期和实现，它们必须在每次迭代后为产品增加价值。此外，如果团队认为某个用户故事太大（见下文“小巧性”），必须拆分为多个故事，那么每个拆分后的故事都必须为客户提供价值。这一理念为开发团队如何拆分故事提供了指导——基于对客户的价值，而非技术。\n\
  \n#### 可估算性\n\n用户故事必须能够被*估算*，以便产品负责人为每个故事分配相对优先级。估算是对话中协商的一部分，也是将故事分解为可执行任务的第一步。如果开发团队难以估算一个故事，或者估算出的实现所需工作量过大，那么这个故事很可能太大，应该被分解。\n\
  \n#### 小巧性\n\n好的用户故事应该*小巧*，这有助于实现故事独立性、促进可协商性、明确价值判断、简化工作量估算并精简测试。理想情况下，一个用户故事应能在单个冲刺或迭代中实现，并立即为客户增加价值。小巧的故事也允许开发团队将其分解为若干小任务——理想情况下，每个任务的工作量不超过\
  \ 8 人时。为了减少因需求变更而重新估算的开销，你可以专注于只估算高优先级的任务，确保它们已准备好被实现。当一个故事在产品待办列表中优先级提升时，其重要性会增加，直到有必要对其进行详细的工作量估算和任务分解。如果到那时，该故事仍然大于单个迭代的容量，你应该尝试将其拆分为更小的故事。\n\
  \n#### 可测试性\n\n好的故事必须是*可测试的*。在敏捷中，这一实践通常通过测试驱动开发来实现：1）开发者将实现单元测试，以判断一个尚未实现的功能是否按预期工作（目前它还不工作）；2）然后开发该功能并反复测试，直到它通过所有单元测试。*可测试性*这一特性也允许开发团队测试任何非功能性需求（性能、响应时间、可用性等）。\n\
  \n这让人回想起计划驱动方法中的*可追溯性*理念。一旦实现，你应该能够将一个特性追溯回其实现、设计乃至原始需求。基于关于用户故事的对话中讨论的初始需求，产品负责人编写验收标准，这些标准会转化为验收测试，用于确认用户故事是否已令人满意地实现。在敏捷环境中，这通常就是“完成”的定义。如果产品负责人对于如何为某个用户故事编写验收标准感到不确定或不清晰，这可能意味着故事细节不明确，应该重新启动关于该故事的对话以澄清任何困惑。\n\
  \n### 敏捷需求收集：产品待办列表\n\n此时，由产品负责人生成并经开发团队同意的所有用户故事，都会被添加到一个列出创建产品所需完成的所有事项的列表中。这被称为*产品待办列表*。计划驱动流程的团队会有一份冗长详细的文档——功能规格说明书，而敏捷产品团队则会有一叠最终定义产品的卡片。不过，这叠卡片只是初步的。随着开发过程的推进，敏捷产品团队会不断地添加、移除和拆分用户故事卡片。产品负责人将是主要负责这项工作的人，并且由产品负责人决定产品何时完成并应该发布。产品发布时，卡片堆中可能仍有剩余卡片。这些卡片将用于下一个产品的开发工作。\n\
  \n### 敏捷需求收集：SMART 任务\n\n一旦团队就一组用户故事达成一致并将其添加到产品待办列表中，开发者就可以开始规划下一个迭代或冲刺。这个规划包括将每个用户故事分解为一组可执行的任务，这些任务易于估算，且所需工作量相对较少。简而言之，任务是为了实现用户故事而需要完成的工作。\n\
  \n将故事分解为任务是开发团队的工作，而非产品负责人的工作，并且发生在规划下一个迭代或冲刺期间。对任务的估算会累加，直到总工作量达到团队在下一个迭代中可用的时间量。在\
  \ Scrum 中，任务可以根据其感知所需工作量被分配点数：工作量越大，点数越高。团队会累加高优先级任务的工作量点数，直到点数达到团队的平均速度。然后，这些任务会提交给产品负责人，产品负责人要么批准待办工作清单，要么通过更改产品待办列表中故事的优先级来提出修改建议。最终，所有人都同意该迭代的故事和任务，工作就可以开始了。\n\
  \n为了执行这种故事分解和任务工作量估算，团队必须能够识别故事中的任务，并将其写在卡片上，以便将它们放在任务板或看板上。每个任务都必须满足某些目标，这些目标可以用首字母缩略词\
  \ SMART 来概括：具体的、可衡量的、可实现的、相关的、有时限的。\n\n#### 具体的\n\n虽然用户故事的定义方式为解释和协商留有余地，但从每个故事生成的任务必须尽可能具体，以利于实现，包括关于必要数据结构或用户界面的任何相关细节。生成具体的任务也可能会揭示故事中隐藏的需求或未预见的复杂性。这可能导致对需求的重新考虑，并引发关于当前故事的新的对话，以及创建新的用户故事，然后将其放入产品待办列表中。\n\
  \n#### 可衡量的\n\n团队需要知道每个任务何时可以被视为*完成*。每个团队对*完成*的定义可能不同，但它应该包括诸如“功能按任务所列的那样工作”、“所有单元测试通过”以及“代码已审查并集成”等内容。\n\
  \n\n\n#### 可达成性\n\n任务必须是开发者能够在迭代或冲刺的时间范围内完成的事项。开发者还必须具备完成任务所需的技能组合，这可能包括在过程中寻求帮助或学习新技能。此目标也可以与*结对编程*相结合，这将把所需的技能组合分散到两名开发者身上。\n\
  \n#### 相关性\n\n此目标与上述“有价值”的故事组成部分相关联。就任务而言，这意味着任务必须有助于推进用户故事实现的创建过程。它应该为客户为本次迭代增加价值。\n\
  \n#### 时限性\n\n此目标意味着，根据估算，任务可以在迭代或冲刺内完成。如果任务比预期的更困难，团队应将其拆分为两个或更多任务，并分别进行估算。这里隐含的另一个目标是，分配给本次迭代中所有任务的总点数，应在团队平均速度的可完成范围内。\n\
  \n### 敏捷需求收集：冲刺/迭代待办事项列表\n\n当最高优先级的用户故事被选中并分解为任务后，这些任务会被估算并添加到冲刺/迭代待办事项列表中，成为下一个冲刺/迭代中需要“完成”的事项。根据所使用的敏捷方法论，一旦冲刺/迭代开始，待办事项列表中的任务数量可能允许更改，也可能不允许。在\
  \ Scrum 中，在冲刺期间，除了开发者自己之外，不得再添加任何任务。任何新发现的工作都必须添加到产品待办事项列表中。\n\n## 需求挖掘\n\n大多数软件工程教材使用“需求启发”这个术语来谈论让用户告诉你他们想要什么的过程。亨特和托马斯在他们的著作《程序员修炼之道》中使用了更具描述性的短语“需求挖掘”，以强调一个观点：你真正在做的是挖掘那些你的客户还不知道他们想要的需求。^(¹³⁹)\
  \ 亨特和托马斯还指出：“发现用户做某件事的*根本原因*，而不仅仅是他们*当前做这件事的方式*，这一点非常重要。归根结底，你的开发必须解决他们的*业务问题*，而不仅仅是满足他们陈述的需求。记录需求背后的原因，将为你的团队在日常实现决策中提供宝贵的信息。”\n\
  \n亨特和托马斯还对需求、策略和实现做出了极好的区分，以此来阐述需求挖掘的过程。为了理解这些概念的不同之处，让我们考虑一些有缺陷的潜在需求示例：\n\n“系统必须允许用户选择贷款期限”是一个简洁明了的需求。它说明了你必须做某事。它对于实现来说还不够具体，但它告诉了开发者一些必须构建的具体内容。\n\
  \n“贷款期限必须在 6 个月到 30 年之间”并不是一个需求，尽管它看起来有点像。这个陈述是一个*业务策略*的例子。当这样的陈述作为需求呈现给开发者时，他们倾向于将其硬编码到程序中。错，错，错。像这样的策略可能会改变，所以你需要非常小心地将业务策略放入你的需求中。几乎总是如此，你需要实现一个比所陈述的业务策略更通用的版本。真正的需求可能类似于：“贷款期限是有限的，但贷款期限会根据贷款类型而变化。”这告诉你，你可能需要构建一个表驱动的子系统来处理这个功能。这样，特定类型贷款的贷款期限可以通过在数据表中进行单一更改来改变，而代码根本不需要更改。\n\
  \n“用户必须能够使用下拉列表选择贷款期限”也不是一个需求，尽管它看起来可能像一个。只有当客户绝对必须有一个下拉菜单框来选择贷款期限时，这才是一个需求。否则，这是客户希望看到的*实现*示例，它可能不是一个需求。\n\
  \n### 为什么需求挖掘很困难\n\n从客户那里挖掘需求是一项非常困难的工作，原因有几个。让我们来看几个。\n\n#### 范围方面的困难\n\n由于各种原因，你的程序实际应该做什么的边界通常是模糊的。程序可能是一个更大系统的一部分，而各部分之间的集成定义不清。客户可能没有想清楚他们到底希望程序做什么，所以他们开始抛出各种各样的想法，其中许多甚至可能不适用于手头的问题。最后，客户可能陷入了实现层面，提供了不必要的细节层次。\n\
  \n随着想法的展开，客户往往希望获得越来越复杂的功能。克服这种范围蔓延的问题需要大量的专注、纪律和耐心，同时伴随着多次说“不”和反复问“为什么这需要成为程序的一部分？”范围与需求蔓延直接相关，所以要当心。\n\
  \n#### 理解方面的困难\n\n让我们面对现实：客户和你作为开发者说的是不同的语言。你的客户是领域专家，他们说的是领域语言（应收账款、应付账款、对账、总账等等）。你说的是设计和实现语言（类、对象、方法、用例、递归、活动记录等等）。\n\
  \n通常有两种方法可以克服理解问题。第一种是让一个在两种世界都待过、能够在两者之间进行翻译的人居中协调。一些公司有*系统工程师*或*技术营销人员*来扮演这个角色。这些人做过开发，也曾在客户方工作过，所以他们能说两种语言。优秀的系统工程师的价值堪比等重的用户故事。第二种促进理解的方法是让客户成为开发团队的一部分。这是大多数敏捷方法论采用的方法。当客户成为开发团队的一部分时，你可以每天与他们交谈，向他们提问，甚至教他们一些技术元素以澄清约束和能力。而且，由于现场客户能在中间产品构建完成后立即看到，你可以获得至关重要的即时反馈。每个人都赢了。\n\
  \n#### 易变性方面的困难\n\n事情会变。这是迄今为止需求收集和分析中最困难的部分，也是导致进度延误的最大原因。你对此无能为力。习惯它吧。正如 Kent\
  \ Beck 所说，“拥抱变化。”你能做的是*管理*变化。创建一个新功能待办事项列表，当新功能出现时就添加进去。在 Scrum 方法论中，新需求总是被添加到产品待办事项列表中，而不是当前的冲刺待办事项列表；这允许当前的冲刺按计划进行，并且在规划下一个冲刺时再审查所有需求。管理变化的另一种方法是将决定权推给用户。给用户一个选择。“如果我们实现这个新功能，将会给进度表增加\
  \ 6 周时间。你还想要它吗？”或者，“如果你想保持原定进度，我们只能实现并测试 A、B、C 中的一个。你选择你最想要的那个。”这就是敏捷人士所说的*勇气*的含义之一。^(¹⁴⁰)\
  \ 有时你必须坚持立场，以保护整个项目的可行性。\n\n\n\n#### 非技术性难题\n\n从开发者的角度来看，需求中的非技术性难题是你将遇到的最糟糕的情况。理想情况下，管理者应该保护开发者，使其永远不必处理非技术性难题。非技术性难题往往带有一定的政治色彩。例如，组织内的一群客户与另一群客户对程序需求持有不同看法。或者更糟的是，一位经理与另一位经理意见相左。正在开发的程序将通过自动化某个部门曾经是唯一专业来源的功能，来削弱该部门的影响力。该程序会将数据处理分散到多个部门，而此前这些处理集中在一个部门。这样的例子不胜枚举。对于挖掘需求时遇到的非技术性难题，最好的建议是——赶紧跑。让你的副总裁去处理；他们拿高薪就是为了这个。\n\
  \n## 分析需求\n\n一旦你写下了一组需求，就需要确保这些需求对程序来说是合适的；你需要对它们进行*分析*。分析包含三个基本部分。\n\n首先，你要对需求进行*分类*，并将它们组织到相关的领域中。这将对设计人员有很大帮助。\n\
  \n其次，由你，或者更好是由客户来对需求进行*优先级排序*。这一点至关重要，因为你无法在第一个产品版本中实现所有需求（请相信我们，你做不到），因此这个优先级列表将是你为每个中间版本设定目标的依据。\n\
  \n最后，你需要将每个需求与其他所有需求进行*对照检查*，以确保它们能构成一个连贯的整体。问自己一系列问题：\n\n1.  每个需求是否与项目的总体目标*一致*？如果你的程序旨在向用户销售书籍，那它就不必同时提供书籍装订服务。\n\
  \n2.  这个需求是否*真的必要*？你是否添加了某些即使移除也不会损害程序基本功能的内容？如果你的第一个版本旨在让用户购买书籍，那么你可能不需要同时支持购买割草机。\n\
  \n3.  这个需求是否*可测试*？这可能是进行需求分析时的一个关键问题。如果你无法弄清楚如何测试一个需求，那么你就无法知道你是否正确实现了它，或者是否已经完成。所有需求*必须*是可测试的，否则它们就不是需求。在大多数敏捷方法中，规则是先编写测试，再编写代码（即测试驱动开发）。\n\
  \n4.  这个需求在你必须使用的技术环境中是否*可行*？这个问题通常适用于前面提到的非功能性需求。考虑到你在这个项目中必须使用的特定目标平台或一组硬件约束，你的需求是否可行？例如，如果你的目标平台是运行\
  \ OS X 的 Macintosh，那么要求使用 DirectX 图形库的需求就不可行，因为 DirectX 是仅适用于 Windows 的库。\n\n5.\
  \  这个需求是否*无歧义*？你的需求需要尽可能精确（请参考前面关于可测试性的问题），因为就像你现在坐在这里阅读这段文字一样肯定，总会有人误解一个有歧义的需求，而你会在产品发布后的第二天才发现这个错误。你的需求中永远不应包含“或”或“可能”这样的词。\n\
  \n## 结论\n\n一旦你完成了功能规格说明或一组用户故事，并完成了对需求的分析，需求阶段就结束了，对吗？嗯，当然不是。正如我们之前所说，需求会变化，所以放轻松；不要过分纠结于需求；尽你所能获得一份清晰、可测试的初始需求列表；然后进入设计阶段。你以后总是会再回到这里的。\n\
  \n"
- '# 第二部分 设计实践


  '
- "# 7. 软件架构\n\n> *我们所说的软件架构是什么意思？对我来说，架构这个词传达的是系统的核心元素的概念，即那些难以改变的部分。它是其余部分必须赖以建立的基础。*\n\
  > \n> ——马丁·福勒^(¹⁴¹)\n\n一旦你对你将要构建*什么*有了想法，就可以开始思考你将要*如何*构建它了。当然，你可能从第一个需求开始就一直在思考这个问题，但现在你终于可以真正有意义地深入设计阶段了。\n\
  \n软件设计实际上有两个层次。我们在编写程序时通常操作的层次称为*详细设计*。我们需要哪些操作？需要哪些数据结构？我们使用什么算法？数据库将如何组织？用户界面看起来如何？调用序列是什么？这些都是非常详细的问题，需要在真正开始编码的详细工作之前得到解答（嗯，差不多是这样——我们稍后会谈到这一点）。\n\
  \n第二个层次是*架构设计*。你的软件需要哪些主要组件？这些组件将如何交互？系统将如何与其环境交互？在这里，你是在设计整个系统的结构，暂时将每个组件的内部细节视为黑盒。正如福勒在本章开篇引言中所描述的，你需要先打好基础，才能构建结构的其余部分。*软件架构*是一套理念，它告诉你哪种基础适合你的程序。\n\
  \n软件架构的概念是为了应对程序规模和复杂性的日益增长而出现的。正如加兰和肖在他们关于软件架构的开创性文档中所说：“随着软件系统规模和复杂性的增加，设计问题超越了计算中的算法和数据结构：设计和规定整个系统结构成为了一种新的问题……这就是软件架构层面的设计。”^(¹⁴²)\
  \ 然而，是否所有具有一定规模和复杂性的程序都确实拥有一个架构呢？是的，尽管对于较大的程序，你需要更有意识地去思考架构。你必须确保在你的设计中融入了正确的架构模式集，以便为你的系统打下坚实的基础。这里的错误代价高昂，因为架构特性对程序结构如此基础，以至于一旦程序编写完成，在架构层面进行更改就会变得困难得多。\n\
  \n每当软件架构师开始思考一个程序的架构时，他们通常从画图开始。架构图能让人们比通过文本更明确地看到程序的结构和框架。软件架构通常被表示为黑盒*图*，其中图节点是*计算结构*，图边是结构之间的*通信管道*。管道可以表示数据流、对象消息传递或过程调用。这类表示法多种多样，并且有几种标准表示法，其中最流行的是统一建模语言（UML）。\n\
  \n特定的架构风格是一种可以表示一组相似结构的模式。软件架构有许多不同的风格，在任何给定的项目中，你可能会使用不止一种风格。正如你将看到的，不同领域的不同类型的程序将引导我们采用不同的架构风格或*架构模式*。让我们看看几种常见的架构模式（它们与你在下一章中会看到的*设计模式*有许多共同特征）。\n\
  \n\n\n## 架构模式：主程序-子程序\n\n最传统、最古老的架构模式是*主程序-子程序模式*。虽然它源自尼克劳斯·维尔特 1971 年的论文《通过逐步细化进行程序开发》^(¹⁴³)，但维尔特只是第一个正式定义了这种自然导向*主程序-子程序模式*的自顶向下问题分解方法论。\n\
  \n其核心思想是：从一个大型问题入手，尝试将其分解为若干个较小的、半独立的问题或原问题的片段。例如，几乎所有适合通过自顶向下分解来解决的问题，都可以立即划分为三个部分：输入处理、解决方案计算和输出处理。一旦将问题分解为多个片段，就选取其中一个片段继续分解，同时将其他所有片段暂时搁置，这类似于深度优先搜索。最终，你会得到一个解决方案显而易见的极小问题；此时便是编写代码的时机。因此，我们是从上到下分解问题，再从下到上编写解决方案代码，尽管存在许多变体。\n\
  \n图 7-1 给出了*主程序-子程序模式*如何工作的示例。我们将在第 9 章更详细地讨论自顶向下问题分解。\n\n![](img/270563_3_En_7_Fig1_HTML.jpg)\n\
  \n一个树状图描绘了主程序分支为子程序 1、子程序 2 和子程序 3。子程序 1 分支为子程序 1.1 和子程序 1.2。子程序 3 分支为子程序 1.2 和子程序\
  \ 3.1。\n\n图 7-1\n\n主程序-子程序模式示例\n\n维尔特的论文就通过逐步细化进行编程得出了以下四个结论：\n\n1.  *程序构建由一系列细化步骤组成。在每一步中，一个给定的任务被分解为若干个子任务。任务描述的每一次细化都可能伴随着数据描述的细化，数据构成了子任务之间通信的手段……*\n\
  \n2.  *以这种方式获得的模块化程度，将决定程序适应目的变更或扩展的难易程度……*\n\n3.  *在逐步细化的过程中，应尽可能长时间地使用对当前问题而言自然的表示法……每一次细化都意味着基于一组设计标准做出的一系列设计决策……*\n\
  \n4.  *即使是一个简短程序的开发，其详细阐述也会形成一个长篇故事，这表明仔细编程并非易事。*\n\n## 架构模式：管道-过滤器\n\n在管道-过滤器风格的架构中，计算组件被称为*过滤器*，它们充当转换器，接收输入，根据一个或多个算法进行转换，然后将结果输出到通信管道。输入和输出管道被称为*管道*。\n\
  \n典型的管道-过滤器架构是线性的，如图 7-2 中的示例所示。\n\n![](img/270563_3_En_7_Fig2_HTML.jpg)\n\n一个流程图描绘了管道-过滤器架构模式。它展示了一组标有“管道”的向右箭头，依次穿过三个相邻的标记为“过滤器”的方块。\n\
  \n图 7-2\n\n管道-过滤器架构模式示例\n\n过滤器必须是独立的组件。这正是管道-过滤器架构的魅力之一：以不同顺序连接独立的过滤器会产生不同的结果。管道-过滤器架构风格的经典示例是\
  \ Unix shell，其中有大量的小程序，它们通常只做一件事，并且可以通过 Unix 管道机制链接在一起。乔恩·本特利的著作《编程珠玑》^(¹⁴⁴)中的一个例子展示了管道-过滤器的工作原理：\n\
  \n*问题*：给定一个英语单词词典，找出词典中所有的变位词。即，找出所有互为字母排列的单词。例如，“pots”、“stop”和“spot”互为变位词。\n\n\
  那么，我们知道什么？所有变位词都有相同的字母，并且每个单词的字母数量相同。这为我们寻找变位词的方法提供了线索：如果我们对每个单词的字母进行排序，最终会得到一个字符串，其中包含该单词所有字母并按字母顺序排列。我们称之为创建单词的*签名*。让我们分解解决方案：\n\
  \n1.  通过对列表中的每个单词的字母进行排序，为每个单词创建一个签名；将签名和单词作为一对保存。\n\n2.  根据签名对生成的签名-单词对列表进行排序；现在所有变位词应该会聚集在一起，因为它们的签名是相同的。\n\
  \n3.  每当签名发生变化时，开始一个新的分组，将所有的变位词组（移除签名）分别输出到不同的行。\n\n这个例子具备标准管道-过滤器架构的所有特征：对其输入数据执行转换的独立计算组件，以及将数据从一个组件的输出传输到下一个组件输入的通信管道。该解决方案的管道-过滤器模式在\
  \ Unix 术语中可以更清晰地表示：\n\n**sign** <`dictionary.txt |` **sort** `|` **squash** `>anagrams.txt`\n\
  \n其中，`sign`是我们用来执行步骤 1 的过滤器，输入文件为`dictionary.txt`。然后`sign`输出一个签名及其关联单词的列表，该列表通过管道传递给\
  \ Unix 的`sort`工具（我们无需编写这个工具），它会按每行的第一个字段（默认行为）对列表进行排序，而第一个字段恰好是每个单词的签名。然后它将排序后的列表输出到下一个管道。接着，`squash`从传入的管道中获取排序后的列表，并通过将所有具有相同签名的单词放在同一行来压缩它，同时移除签名。这个最终的列表通过最后一个管道（这次是\
  \ Unix I/O 重定向）发送到名为`anagrams.txt`的输出文件。\n\n请注意，并非所有应用程序都应使用管道-过滤器架构。例如，它不太适用于交互式应用程序或响应事件或中断的应用程序。因此，让我们看看更多的架构风格。\n\
  \n\n\n## 架构模式：面向对象的模型-视图-控制器（MVC）\n\n面向对象的分析、设计与编程在 20 世纪 80 年代初兴起（实际上，其起源可追溯至 60\
  \ 年代，但当时无人关注），随之带来了许多架构与设计模式。此处我们将重点介绍一种面向对象的架构模式，其余内容留待设计模式章节讨论。\n\n*模型-视图-控制器*（MVC）架构模式是一种将应用程序（甚至仅应用程序界面的某一部分）拆分为三个部分的方法：模型、视图和控制器。MVC\
  \ 最初是为了将许多程序传统的输入、处理和输出角色映射到图形用户界面领域而开发的：\n\n输入 ➤ 处理 ➤ 输出\n\n控制器 ➤ 模型 ➤ 视图\n\n用户输入、外部世界的建模以及向用户提供的视觉反馈被分离，并由模型、视图和控制器*对象*分别处理，如图\
  \ 7-3 所示。\n\n![](img/270563_3_En_7_Fig3_HTML.jpg)\n\n一个框图展示了标记为视图、模型和控制器三个模块之间的交互。控制器与模型之间存在单向交互。\n\
  \n图 7-3\n模型-视图-控制器架构\n\n*   **控制器**解释来自用户的鼠标和键盘输入，并将这些用户操作映射为发送给模型和/或视图的命令，以实现相应的更改。控制器负责处理输入。\n\
  \n*   **模型**管理一个或多个数据元素，响应关于其状态的查询，并响应改变状态的指令。模型知道应用程序应该做什么，是架构的主要计算结构；它*建模*了你试图解决的问题。模型掌握规则。\n\
  \n*   **视图**或**视口**管理显示区域的一个矩形区域，负责通过图形和文本的组合向用户呈现数据。视图对程序实际在做什么一无所知；它所做的只是接收来自控制器的指令和来自模型的数据并进行显示。它会向模型和控制器反馈状态信息。视图负责处理输出。\n\
  \nMVC 程序的典型流程如下：\n\n*   **用户**与用户界面交互（例如，用户按下按钮），控制器处理来自用户界面的输入事件，通常通过注册的处理程序或回调函数进行。用户界面由视图显示，但由控制器控制。奇怪的是，控制器并不直接知道视图是一个对象；它只是在需要更新屏幕上的某些内容时发送消息。\n\
  \n*   **控制器**访问模型，可能以适合用户操作的方式更新模型（例如，控制器使模型更新用户的购物车）。这通常会导致模型的状态及其数据发生变化。\n\n*\
  \   **视图**利用模型生成适当的用户界面（例如，视图生成一个列出购物车内容的屏幕）。视图从模型获取自身的数据。模型不直接知道视图的存在。它只是响应任何人对数据的请求以及控制器对数据转换的请求。\n\
  \n*   **控制器**作为用户界面管理器，等待进一步的用户交互，从而开始新一轮循环。\n\n这里的主要思想是关注点分离——以及代码分离。目标是分离程序的工作方式、程序显示的内容以及程序获取输入数据的方式。这是经典的面向对象编程：你创建对象，这些对象隐藏其数据以及操作数据的方式，然后仅向外界提供一个简单的接口来与其他对象交互。你将在第\
  \ 11 章再次看到这一点。\n\n### 面向对象架构：\n\n### 一个 MVC 示例——我们来狩猎吧！\n\n一个使用 MVC 架构模式的经典程序示例是\
  \ David Matuszek 博士在 2004 年 ACM SIGCSE 技术研讨会上提出的“绝妙作业”。^(¹⁴⁵)\n\n#### 问题\n\n该程序是一个基本的模拟程序，模拟狐狸在网格环境中试图找到兔子，而兔子则试图逃脱。环境中存在兔子可以躲藏的灌木丛，并且移动有一些限制。\n\
  \n图 7-4 是该游戏运行时的典型画面。\n\n![](img/270563_3_En_7_Fig4_HTML.jpg)\n\n一张截图展示了狐狸与兔子狩猎实例的界面。它显示了一组随机分布的图案和一个靠右的圆形图形。底部提供了速度、单步、运行、重置和重播按钮。顶部文字显示步数\
  \ 43。\n\n图 7-4\n一个典型的狐狸与兔子狩猎实例\n\n狐狸是大的红点，兔子是小的棕点，灌木丛是粗的绿色十字。\n\n该编程作业的目标是让兔子变得更聪明，以便能够逃脱狐狸的追捕。然而，我们的重点完全在于程序是如何组织的。图\
  \ 7-5 使用来自 BlueJ IDE 的对象图展示了程序的组织结构。程序的关键部分是三个对象类（Bush、Fox、Rabbit），以及模型、视图和控制器组件。\n\
  \n![](img/270563_3_En_7_Fig5_HTML.jpg)\n\n一个框图展示了标记为 RabbitHunt、Grader、Controller、View、Model、Rabbit、Fox、Animal\
  \ 和 Bush 的模块之间的交互。\n\n图 7-5\n狐狸与兔子狩猎的类结构\n\n#### MVC 模型\n\n模型代表了游戏的规则。它负责所有计算，所有决定轮到谁、每回合发生什么以及是否有人获胜的工作。模型严格来说是内部的，并且与程序的其他部分几乎无关。\n\
  \n该程序的模型部分实际上由五个类组成：`Model`（“主”模型类）、`Animal`、`Rabbit`、`Fox`和`Bush`。（`Rabbit`和`Fox`是`Animal`的子类，如图\
  \ 7-5 图中的实线箭头所示）。这是程序中你需要真正理解的部分。\n\n`RabbitHunt`类仅创建模型、视图和控制器对象，并将控制权交给控制器对象。控制器对象启动模型对象，然后等待用户按下按钮。当按钮被按下时，一条消息被发送给模型对象，由模型对象决定做什么。\n\
  \n模型对象：\n\n*   将狐狸、兔子和灌木丛放置在场地中；\n*   给兔子和狐狸各一次移动机会（一个移动，然后另一个移动；它们不会同时移动）；\n* \
  \  告诉视图显示这两次移动的结果；以及\n*   确定哪只动物获胜。\n\n#### MVC 视图\n\n视图显示正在发生的事情。它在屏幕上呈现图像，以便用户看到正在发生什么。视图是完全被动的；它不会以任何方式影响狩猎过程，它只是一个新闻记者，向你提供模型内部正在发生的事情的（部分）画面。\n\
  \n\n\n#### MVC 控制器\n\n控制器是程序中负责显示控件（窗口底部的五个按钮和速度控制）的部分。它告诉模型何时启动、何时停止，但对模型内部的工作原理一无所知。\n\
  \n将程序拆分为这些独立的部分有许多好处。我们可以安全地重写控制器对象中的图形用户界面（GUI）或视图对象中的显示部分，而无需修改模型。我们可以让狐狸和/或兔子变得更聪明（或更笨！），而无需修改\
  \ GUI 或显示部分。我们可以几乎不费吹灰之力地将 GUI 复用于其他应用程序。这样的好处不胜枚举。\n\n简而言之，MVC 是你的朋友；请明智且频繁地使用它。\n\
  \n## 架构模式：客户端-服务器\n\n回到更传统的架构，我们再次追溯历史。在过去，所有程序都运行在大型主机上，整个程序都在一台机器上运行。如果你足够幸运，能使用分时操作系统，那么多人可以同时使用同一个程序——尽管通常是不同的副本。随后，个人电脑和网络出现了，有人灵机一动，将工作分摊给大型主机和你那小小的台式机。于是，*客户端-服务器架构*诞生了。\n\
  \n在客户端-服务器架构中，你的程序被拆分为两个不同的部分，通常运行在两台不同的计算机上。*服务器*承担大部分繁重的工作和计算；它通过高带宽网络为其*客户端*提供服务。另一方面，客户端主要负责处理用户输入、显示输出以及与服务器通信。简而言之，客户端程序向服务器程序发送服务请求。服务器程序随后评估请求，执行必要的计算（包括在需要时访问数据库），并响应客户端的请求，给出答案。\n\
  \n如今，客户端-服务器架构最常见的例子就是万维网。在网络模型中，你的浏览器就是客户端。它为你呈现用户界面，与网络服务器通信，并将生成的网页渲染到你的屏幕上。网络服务器则负责多项事务。它提供\
  \ HTML 格式的网页，同时也可以充当数据库服务器、文件服务器和计算服务器（想想当你访问亚马逊网站进行购物时，它所做的所有事情）。\n\n不过，客户端和服务器并不一定非要运行在不同的计算机上。使用客户端-服务器架构编写的程序，其两端可以驻留在同一台计算机上，两个例子是*打印假脱机程序*和*X\
  \ Window 图形系统*。\n\n在打印假脱机程序应用中，你正在运行的程序（例如，文字处理器、电子表格程序或网络浏览器）作为客户端运行，向作为计算机操作系统一部分实现的打印服务发出请求。这项服务通常被称为打印假脱机程序，因为它会维护一个打印作业队列，并控制哪些作业被打印以及打印顺序。因此，在你的文字处理器中，你从菜单中选择*打印*，设置某些属性，选择一台打印机，然后在某个对话框中点击*确定*。这会向系统上的打印假脱机程序发送一个打印请求。打印假脱机程序将你的文件添加到其管理的打印作业队列中，然后联系打印机驱动程序，并发出打印请求。这里的区别在于，一旦你点击了确定按钮，你的客户端程序（文字处理器）通常就不再与打印假脱机程序有任何联系，打印*服务*会无人值守地运行。\n\
  \nX Window 系统（参见 [`www.x.org/wiki/`](http://www.x.org/wiki/)）是一个图形窗口系统，可用于所有基于 Unix\
  \ 和 Linux 的系统，也可作为附加窗口系统用于 Apple Macintosh 和 Microsoft Windows 系统。X 系统采用客户端-服务器架构，其中客户端程序和服务器通常都驻留在同一台计算机上。X\
  \ 系统服务器接收来自客户端程序的请求，针对当前系统所连接的硬件进行处理，并提供输出服务，将结果数据以位图形式显示出来。客户端程序的例子包括 *xterm*（一个提供\
  \ Unix 命令行界面的窗口终端程序）、*xclock*（你猜对了——一个时钟）和 *xdm*（X Window 显示管理器）。X 系统支持分层和重叠窗口，并提供配置菜单、滚动条、打开和关闭按钮、背景和前景颜色以及图形的能力。X\
  \ 系统还可以管理鼠标和键盘。如今，X 系统的主要用途是作为构建更复杂的窗口管理器、图形环境、图形控件以及像 GNOME 和 KDE 这样的桌面管理窗口系统的跳板。\n\
  \n\n\n## 架构模式：分层方法\n\n分层架构方法建议，程序可以像地质层一样，按一系列层次进行结构化，各层之间具有定义明确的接口序列。这样做的效果是将每一层与其上下层隔离开来，使得我们能够更改任何一层的内部实现，而无需改动程序中的其他层。当然，前提是你的更改不涉及对接口的任何修改。在分层方法中，除非绝对必要，否则不应更改接口。分层方法在编程中的两个经典例子是操作系统和通信协议。\n\
  \n操作系统的架构有多个目标，其中包括集中控制有限的硬件资源，以及保护用户免受彼此干扰。操作系统的分层架构方法同时实现了这两点。请查看图 7-6 中操作系统的标准架构图。\n\
  \n![](img/270563_3_En_7_Fig6_HTML.jpg)\n\n分层架构图展示了从上到下排列的应用程序层、操作系统服务层、操作系统内核层、设备驱动层和硬件层。\n\
  \n图 7-6\n\n操作系统分层架构示例\n\n在这个分层模型中，用户应用程序通过系统调用接口请求操作系统服务。这通常是应用程序访问计算机硬件的唯一途径。大多数操作系统服务必须通过内核发出请求，而所有硬件请求都必须经过直接与硬件设备通信的设备驱动程序。这些层中的每一层都有定义明确的接口，因此，例如，开发人员可以为新磁盘驱动器添加新的设备驱动程序，而无需更改操作系统的任何其他部分。这就是信息隐藏的一个例子。\n\
  \n通信协议中也存在相同类型的接口。最著名的分层协议是国际标准化组织（ISO）的开放系统互连（OSI）七层模型，如图 7-7 所示。\n\n![](img/270563_3_En_7_Fig7_HTML.jpg)\n\
  \n该图展示了从下到上排列的物理层、数据链路层、网络层、传输层、会话层、表示层和应用层。\n\n图 7-7\n\nISO-OSI 分层架构\n\n在这个模型中，每一层都包含逻辑上相似且被组合在一起的功能或服务。每一层之间都定义了接口，并且层与层之间的通信仅允许通过接口进行。特定的实现不必包含所有七层，有时会将两个或多个层合并以形成更小的协议栈。OSI\
  \ 模型既定义了七层方法，也定义了所有接口协议。该模型可以从 [`www.itu.int/rec/T-REC-X.200/en`](http://www.itu.int/rec/T-REC-X.200/en)\
  \ 下载为 PDF 文件。（ITU，即国际电信联盟，是 ISO 的新名称。）\n\n表 7-1 展示了在各层实现的协议示例。\n\n表 7-1\n\n使用 ISO-OSI\
  \ 架构的分层协议示例\n\n| 层 | 协议 |\n| --- | --- |\n| 7. 应用层 | http, ftp, telnet |\n| 6. 表示层\
  \ | MIME, SSL |\n| 5. 会话层 | Sockets |\n| 4. 传输层 | TCP, UDP |\n| 3. 网络层 | IP, IPsec\
  \ |\n| 2. 数据链路层 | PPP, Ethernet, SLIP, 802.11 |\n| 1. 物理层 |   |\n\n## 结论\n\n软件架构是应用程序的核心。它是你构建程序其余部分的基础，并驱动着你的其余设计。软件架构有许多不同的风格，在任何给定的项目中，你可能会使用不止一种风格。程序所使用的架构风格取决于你所做的事情。这正是这些风格的美妙之处；形式服从功能可能并不总是成立，但对于软件而言，设计服从架构。这些基础性的架构模式引导你走上设计之路，塑造你的程序将如何构建和运行。\n\
  \n"
- "# 8. 设计原则\n\n> *构建软件设计有两种方式。一种是使其简单到明显没有缺陷。另一种是使其复杂到没有明显缺陷。*\n> \n> — C. A. R.\
  \ 霍尔\n\n看待软件问题的一种方式是使用一个将问题分为两个不同层次的模型：\n\n*   “棘手”问题属于上层。这些问题通常来自计算机科学之外的领域（例如，生物学、商业、气象学、社会学、政治学等）。这类问题往往是开放式的、定义不清的，并且从需要大量工作的意义上来说是庞大的。例如，几乎任何类型的网络商务应用都是一个棘手问题。Horst\
  \ W. J. Rittel 和 Melvin M. Webber 在 1973 年一篇关于社会政策的论文中^(¹⁴⁶)，给出了用于识别棘手问题的定义和一组特征，我们将在本章后面讨论这些内容。\n\
  \n*   “温顺”问题属于下层。这些问题往往跨越其他问题领域；它们通常定义更明确且规模较小。排序和搜索是温顺问题的绝佳例子。然而，小规模和定义明确并不意味着“容易”。温顺问题可能非常复杂且难以解决。只是它们被明确定义，并且你知道何时有了解决方案。这类问题为计算机科学家提供了数据结构和算法方面的基础，用于解决来自其他问题领域的棘手问题。\n\
  \n你可能会问，这与设计原则有什么关系？嗯，认识到你将遇到的大多数大型软件问题都内在地具有一定程度的“棘手性”，这会影响你思考设计问题的方式，影响你处理大型、定义不清问题的解决方案设计的方法，并让你对设计过程有一些深入的了解。在本章中，我们将进一步讨论棘手问题和温顺问题，为什么你可以问心无愧地放弃瀑布模型，优秀设计的特征是什么，以及你可以应用哪些统一的启发式方法来帮助你解决复杂的设计问题。\n\
  \n\n\n## 棘手问题\n\n根据里特尔和韦伯的定义，*棘手问题*是指那些只有在问题解决后才能完全了解其需求的问题，或者其需求和解决方案会随时间演变的问题。事实证明，这描述了软件开发中大多数“有趣”的问题。杰夫·康克林修订了里特尔和韦伯对棘手问题的描述^(¹⁴⁷)，并提供了更简洁的棘手问题特征列表^(¹⁴⁸)。转述如下：\n\
  \n1.  *在解决方案创建之前，棘手问题无法被理解。* 另一种说法是，问题的定义和解决是同时进行的。^(¹⁴⁹)\n\n2.  *棘手问题没有停止规则*；也就是说，你可以为问题创建增量解决方案，但没有任何东西能告诉你已经找到了正确且最终的解决方案。\n\
  \n3.  *棘手问题的解决方案没有对错之分*；它们只有好坏之分，或者足够好与不够好之分。\n\n4.  *每个棘手问题本质上都是新颖且独特的。* 由于问题的“棘手性”，即使下周遇到类似的问题，你基本上也必须从头开始，因为需求会有足够大的差异，解决方案仍然难以捉摸。\n\
  \n5.  *每个棘手问题的解决方案都是一次性操作。* 参见上一条。\n\n6.  *棘手问题没有现成的备选解决方案。* 也就是说，没有一个小而有限的解决方案集可供选择。\n\
  \n棘手问题无处不在。例如，创建一个文字处理程序就是一个棘手问题。你可能认为你知道文字处理器需要做什么：插入文本、剪切粘贴、处理段落、打印。但这个功能列表只是某个人的列表。一旦你“完成”了文字处理器并发布它，你就会被新的功能请求淹没：拼写检查、脚注、多栏、支持不同字体、颜色、样式，等等。文字处理程序基本上永远不会完成——至少在你发布最后一个版本并终止产品生命周期之前是这样。\n\
  \n棘手问题还包括那些你一开始并不真正知道是否能解决的问题。专家系统需要一个用户界面、一个推理引擎、一组规则和一个领域信息数据库。对于特定领域，一开始完全无法确定你是否能创建出推理引擎用来得出结论和建议的规则。因此，你必须迭代不同的规则集，发布下一个版本，然后观察其表现如何。然后你再次重复，添加和修改规则。在你完成之前，你并不真正知道解决方案是否令人满意（即使只是暂时的）。这正是一个棘手问题。\n\
  \n康克林、里特尔和韦伯指出，当面对一个庞大而复杂的问题（即棘手问题）时，传统认知研究表明，大多数人会遵循线性问题解决方法，从问题自上而下地工作到解决方案。这相当于第\
  \ 2 章中描述的传统瀑布模型。^(¹⁵⁰) 图 8-1 展示了这种线性方法。\n\n![](img/270563_3_En_8_Fig1_HTML.jpg)\n\
  \n一张图展示了从问题到解决方案的向下步骤。这些步骤被标记为需求、分析、设计和实现。\n\n图 8-1\n\n线性问题解决方法\n\n与这种线性的瀑布方法不同，真正的棘手问题解决者倾向于使用一种在需求分析和解决方案建模之间来回摆动的方法，直到问题解决方案足够好为止。康克林称此为*机会驱动*或*机会主义*方法，因为设计者正在寻找任何机会向解决方案推进。^(¹⁵¹)\
  \ 机会驱动方法看起来有点像图 8-2。\n\n![](img/270563_3_En_8_Fig2_HTML.jpg)\n\n一张图展示了从问题到解决方案的向下步骤，标记为需求、分析、设计和实现。背景中的一条线以多个波峰和波谷的形式向前推进。\n\
  \n图 8-2\n\n机会驱动式开发方法\n\n在这张图中，锯齿线表示设计者的工作从问题到解决方案原型再返回，逐步演进对需求的理解和解决方案的迭代，并收敛到一个足够好以发布的实现上。举个例子，让我们快速看一下一个网络应用程序。\n\
  \n假设一个非营利组织为你所在县保存了一份青少年活动列表。该列表定期更新，并分发给全县的图书馆。目前，该列表保存在电子表格中，并以活页夹的纸质形式分发。该非营利组织希望将其所有数据上线，并通过网络访问。它还希望能够通过同一个网站更新数据。你说，这很简单。它只是一个带有\
  \ HTML 前端的网络应用程序，以及作为后端的用于更新和查询数据库的数据库和中间件代码。没问题。\n\n啊，但这实际上是一个伪装起来的棘手问题。首先，客户完全不知道他们希望网页看起来或表现如何，所以你第一次给他们的任何东西都不会完全符合他们的要求；在你完成之前，问题不会被完全理解。其次，随着你开发原型，他们会想要更多功能——所以问题没有停止规则。最后，随着时间的推移，非营利组织会想要进行更改，所以没有“正确”的答案，只有各种“足够好”的答案。非常棘手。\n\
  \n## 温顺问题\n\n康克林还列出了“温顺”问题的特征，即那些你可以轻松可靠地找到解决方案的问题。“一个温顺问题\n\n1.  有一个定义明确且稳定的问题陈述；\n\
  \n2.  有一个明确的停止点（即达到解决方案时）；\n\n3.  有一个可以客观评估对错的解决方案；\n\n4.  属于一类可以用相同类似方式解决的所有相似问题；\n\
  \n5.  有可以轻松尝试和放弃的解决方案；并且\n\n6.  附带一组有限的备选解决方案。”^(¹⁵²)\n\n温顺问题的一个绝佳例子是对数据值列表进行排序：\n\
  \n*   问题很容易且清晰地陈述：使用此函数比较数据元素，将此列表按升序排序。\n\n*   排序有一个明确的停止点：列表已排序。\n\n*   排序的结果可以客观评估（列表要么正确排序，要么不正确）。\n\
  \n*   排序属于一类可以用相同方式解决的所有相似问题。对整数排序类似于对字符串排序，也类似于使用键对数据库记录排序，等等。\n\n*   排序有可以轻松尝试和放弃的解决方案。\n\
  \n*   最后，排序有一组有限的备选解决方案；基于比较的排序有一套已知的算法和一个理论下界。\n\n\n\n## 设计过程\n\n*设计是混乱的*。即使你完全理解了问题需求（假设是一个驯良问题），在设计软件解决方案时，通常也会有许多备选方案需要考虑。在得出可行的解决方案之前，你通常也会犯很多错误。正如你在图\
  \ 8-2 中所见，随着你对问题的理解逐渐加深，你的设计会随着时间的推移而改变。这给人一种*看似*混乱和无序的感觉，但实际上，你正在取得进展。\n\n*设计关乎权衡与优先级*。大多数软件项目都有时间限制，因此你通常无法实现客户想要的所有功能。你必须找出在可用时间内能为客户提供最多高优先级功能的子集。因此，你必须对需求进行优先级排序，并在不同的子集之间进行权衡。\n\
  \n*设计是启发式的*。设计在很大程度上是将一个较大的问题分解成更小、更易于管理的部分。^(¹⁵³) 对于绝大多数项目而言，并不存在一套一成不变的规则，规定“首先，我们使用技术\
  \ Y 设计组件 X。然后，我们使用技术 W 设计组件 Z。”软件并非如此运作。软件设计是通过一套不断变化的启发式方法（认知捷径）来完成的，每位设计师都在其职业生涯中逐渐积累这些方法。随着时间的推移，优秀的设计师会学到更多的启发式方法和模式（参见第\
  \ 13 章），这使他们能够快速完成设计中简单的部分，并触及问题的核心难点。你能做的最好的事情就是跟随一位经验丰富的设计师，学习这些启发式方法。\n\n*设计是不断演化的*。优秀的设计师认识到，对于任何问题，无论是驯良的还是棘手的，需求都会随着时间的推移而改变。这进而会引发设计的变更，导致其不断演化。这在产品发布和添加新功能时尤其如此。这里的诀窍是创建一个软件架构（第\
  \ 7 章），使其易于变更，同时对下游设计和代码的影响有限。\n\n## 理想的设计特性（你的设计应倾向于具备的特性）\n\n无论你的项目规模大小，或者你使用何种流程进行设计，每个软件设计都应具备一些理想的特性。这些是你在进行设计时应遵循的原则。你的设计不一定需要具备所有这些特性，但拥有其中大部分特性无疑会使你的软件更易于编写、理解和维护。\n\
  \n*   *目的适用性*：你的设计必须能够工作，并且工作正确，即它必须满足你被赋予的需求，同时受限于软件运行平台的约束。不要在设计过程中自行添加新需求；客户会为你做这件事。\n\
  \n*   *关注点分离*：该原则与模块化密切相关，它要求你将设计中功能性的部分清晰地分离开来，以利于维护的简便性和简洁性。模块化是好的。\n\n*   *简洁性*：让你的设计尽可能简单。这能让其他人理解你的意图。如果你发现某个地方可以简化，那就去做！如果简化设计意味着增加更多的模块或类，那也是可以的。简洁性同样适用于模块或类之间的接口。简单的接口能让其他人看清你设计中的数据流和控制流。在敏捷方法论中，这种简洁性的理念始终贯穿其中。大多数敏捷技术都有一条规则：如果你正在处理程序的某一部分，并且有机会简化它（在敏捷术语中称为*重构*），那就立即就地完成。始终保持你的设计和代码尽可能简单。\n\
  \n*   *易于维护*：一个简单、可理解的设计有利于进行代码维护所需的变更。你遇到的最不可避免的必要变更类型是修复错误。错误可能发生在开发过程的各个阶段：需求、分析、设计、编码和测试。你的设计越连贯、越简单，就越容易隔离和修复错误。\n\
  \n*   *松散耦合*：当你将设计分解为模块（或在面向对象设计中分解为类）时，模块之间相互依赖的程度称为*耦合*。*紧密耦合*的模块可能共享数据或过程，因此一个模块的变更更有可能需要另一个模块也进行变更。这会增加维护负担，并使模块更可能包含错误。相反，*松散耦合*的模块会向其他模块隐藏其执行操作的细节。它们共享的任何数据都必须通过*接口*在过程或方法之间传递。松散耦合的一个例子是标准\
  \ C 库中的 `qsort()` 函数；它接收一个提供的列表并对其进行原地排序。你无需知道具体使用了哪种排序算法，因为你只需将原始列表交给该函数，就能得到排序后的列表。松散耦合减轻了维护负担，因为只要接口不变，对一个类或函数的更改不太可能影响另一个类或函数的运行方式。这样，变更就被隔离了，错误传播的可能性也大大降低。\n\
  \n*   *高内聚性*：松散耦合的补充是高内聚性。模块内的*内聚性*是指模块在其所持有的数据以及作用于这些数据的操作方面的自包含程度。一个高内聚的模块拥有其所需的所有数据，并且允许对这些数据执行的所有操作都在模块内部定义。对于面向对象的类而言，从高内聚类模板实例化出的任何对象都非常独立，并且仅通过其公开的接口与其他对象通信。\n\
  \n*   *可扩展性*：简洁性和松散耦合带来的一个额外好处是能够轻松地向设计添加新功能。这就是可扩展性。针对棘手问题的软件解决方案的一个特点是，它们从未真正完成。因此，每次产品发布后，客户通常都会要求添加新功能。添加新功能或进行其他更改越容易，你的设计就能随着时间的推移保持越清晰。\n\
  \n*   *可移植性*：虽然不在列表前列，但考虑到你的软件可能需要移植到另一个（或两三个）平台，这是一个理想的特性。移植软件涉及许多问题，包括操作系统问题、硬件架构和用户界面问题。对于\
  \ Web 应用程序尤其如此。\n\n\n\n## 设计启发法\n\n说到启发法，这里有一份简短且久经考验的优秀启发法清单。这份清单显然并不详尽，且带有一定个人色彩，但它可以作为你所有软件设计的可靠起点。思考这些启发法，并在你下一次设计练习中尝试其中一些。我们将在后续章节中更详细地重新讨论所有这些启发法。\n\
  \n*寻找真实世界的对象进行建模*。Alan Davis^(¹⁵⁴) 和 Richard Fairley^(¹⁵⁵) 将此称为“智力距离”。它衡量的是你的设计与真实世界对象之间的距离。这里的启发法是尝试找到与你程序中想要建模的事物相近的真实世界对象。在设计程序时，将真实世界对象牢记于心，有助于使你的设计更贴近问题本身。Fairley\
  \ 的建议是尽可能缩小真实世界对象与其模型之间的智力距离。\n\n*抽象是关键*。无论你是在进行面向对象设计（创建接口和抽象类），还是进行更传统的分层设计，你都需要使用抽象。抽象让我们能够清晰思考，因为它允许我们在规划设计时，始终停留在同一个抽象层次上。你可以通过推迟或黑盒化某些决策，将它们提升到设计层次结构中的更高层（更抽象），直到你准备好决定细节为止，从而保持专注。抽象是管理大型问题复杂性的关键。通过抽象掉细节，你可以看到真正问题的核心。\n\
  \n*信息隐藏是你的朋友*。信息隐藏是指你在程序中隔离信息（包括数据和行为），以便隔离错误和隔离变更；同时，你只允许通过定义良好的接口来访问这些信息。你将类的细节隐藏起来，只允许通过公共接口进行通信和数据修改。这意味着你的实现可以更改，但只要接口保持一致且不变，程序中的其他部分就无需更改。如果你不进行面向对象设计，可以考虑使用库来隐藏行为，并使用独立的数据结构（C\
  \ 和 C++ 中的结构体）来隐藏状态。\n\n*保持设计的模块化*。将你的设计分解成半独立的部件有许多优点。它使设计在你的头脑中易于管理；你可以一次只考虑一个部分，而将其他部分视为黑盒。面向对象设计的一个基本部分是封装，即将数据及其操作组合在一起的实践，这有助于实现模块化设计。它隔离了变更，有助于扩展性和可维护性。模块化始终是最稳健的方法。\n\
  \n*识别设计中可能发生变更的部分*。如果你假设需求会发生变化，那么设计很可能也会随之变化。如果你识别出设计中可能发生变更的区域，就可以将它们模块化，从而减轻任何所需变更带来的影响。哪些东西可能发生变化？这取决于你的应用程序及其领域。业务规则可能会变（想想税法或会计实务），用户界面可能会变，硬件也可能会变，等等。这里的要点是预测最可能发生变化的元素，并划分你的设计，以便将必要的变更限制在局部并简化。\n\
  \n*使用松散耦合、接口和抽象类*。结合模块化、信息隐藏和变更，使用松散耦合将使你的设计随着时间的推移更易于理解和修改。松散耦合最小化了一个类（或模块）对另一个类的依赖，因此一个模块的变更不会引起其他模块的变更。如果一个模块的实现被隐藏，只暴露接口，那么只要保持接口不变，你就可以替换实现。因此，你可以通过在模块之间使用定义良好的接口来实现松散耦合（在面向对象设计中，通过使用抽象类和接口来连接这些类）。\n\
  \n*使用你装满常见设计模式的背包*。Robert Glass^(¹⁵⁶) 将优秀的软件设计师描述为“随身携带并应用于其设计的大量标准模式集”。这就是设计经验的全部意义所在：反复进行设计，并从经验中学习。在\
  \ Susan Lammer 的著作《工作中的程序员》^(¹⁵⁷) 中，Butler Lampson 说道：“大多数时候，一个新程序是对现有程序的改进、扩展、泛化或优化。真正从头开始做全新的事情是非常罕见的……”这就是设计模式的意义所在：它们是对你已经做过的事情的描述，你可以将其应用于新的问题。\n\
  \n*遵循“唯一正确位置”原则*。P.J. Plauger 在他的著作《有目的编程》中说：“我在这里主要关心的是‘唯一正确位置’原则——对于任何非平凡的代码片段，应该有一个唯一正确的位置去查找，并且有一个唯一正确的位置来进行可能的维护性修改。”^(¹⁵⁸)\
  \ 当你的设计遵循“唯一正确位置”原则时，调试和维护会容易得多。\n\n*使用图表作为设计语言*。我们俩都是视觉型学习者。对我们来说，一张图确实胜过千言万语。在设计和编码时，我们不断绘制图表，以便可视化程序的流程、哪些类或模块将相互通信、哪些数据依赖于哪个函数、返回值流向何处、事件序列是什么等等。这种可视化方式可以在你脑海中固化设计，帮助与客户和其他开发者共享相同的理解，并且可以指出设计中的错误或潜在问题。白板、纸张、数字工具……尽管开始画吧！即使是作为计算机科学家（或许尤其如此），绘图也是我们所知的最佳问题解决工具。\n\
  \n\n\n## 设计师与创造力\n\n不要认为设计是刻板固定的，或者可以套用一套正式的流程规则来批量产出软件设计。事实远非如此。尽管问题本身、问题领域以及目标平台会对设计施加形式上的限制和约束，但达成设计的过程本身却不必是形式化的。它本质上是一种创造性活动。比尔·柯蒂斯在\
  \ 1987 年对软件设计师进行的一项实证研究中，总结出了一个似乎是大多数设计师遵循的流程：^(¹⁵⁹)\n\n1.  理解问题。\n\n2.  将问题分解为目标和对象。\n\
  \n3.  选择并组合方案来解决问题。\n\n4.  实施方案。\n\n5.  反思设计产品与过程。\n\n坦率地说，这是一个相当通用的列表，并没有真正告诉我们进行软件设计所需的一切。然而，柯蒂斯随后深入探讨了他列表中的第\
  \ 3 点——“选择并组合方案”，并发现他的设计师们采用了以下步骤：\n\n1.  在脑海中构建一个拟议解决方案的模型。\n\n2.  在脑海中执行该模型，看它是否能解决问题。编造输入数据，并在头脑中模拟模型运行。\n\
  \n3.  如果得到的结果不正确，就修改模型以消除错误，然后返回第 2 步再次模拟。\n\n4.  当你的样本输入产生了正确的输出时，再选择一些其他的输入值，返回并重复第\
  \ 2 步和第 3 步。\n\n5.  当你重复足够多次（凭经验你会知道何时足够）后，你就得到了一个良好的模型，可以停止了。^(¹⁶⁰)\n\n这种更深层次的技术清晰地揭示了设计的认知性和迭代性。你会发现，设计从根本上说是心智的功能，是独特的，并且依赖于设计师自身那些超出流程本身的因素。\n\
  \n约翰·内斯特在给软件工程研究所的一份报告中，列出了伟大设计师的一些共同特征。伟大的设计师：\n\n*   拥有大量的标准模式；\n*   经历过失败的项目；\n\
  *   精通开发工具；\n*   有追求简洁的冲动；\n*   能够预见变化；\n*   能够从用户的角度看问题；以及\n*   能够应对复杂性。^(¹⁶¹)\n\
  \n## 结论\n\n那么，关于软件设计你学到了什么？\n\n*设计是临时的、启发式的、混乱的*。设计软件是一个试错式的启发式过程，这对于优秀的设计来说既必要又充分。\n\
  \n*设计依赖于对先前设计问题和解决方案的理解*。虽然设计师需要一些问题领域的知识（可由客户提供），但更关键的是，他们需要具备设计知识和优秀设计的模式。他们需要有一个装满这些设计模式的“背包”，以便用来处理新问题。这些解决方案是经过验证且可靠的。问题虽然是新的，但它们包含了已被解决过的问题的元素。这些模式是*可塑的模板*，可以应用于新问题中那些符合模式要求的元素。\n\
  \n*设计是迭代的*。需求会变化，你的设计也必须随之变化。即使你拥有一套稳定的需求，随着你在设计活动中不断推进，你对需求的*理解*也会发生变化，因此你会回过头来修改设计，以反映这种更深入、更完善的理解。迭代过程会在每一步都使你的设计更加清晰和简化。\n\
  \n*设计是一种认知活动*。在这个阶段你并没有在编写代码，所以不需要机器。你的大脑和一个绘图工具就是进行设计所需的全部。正如迪杰斯特拉所说：“我们绝不能忘记，我们的职责不是编写程序；而是设计能展现所需行为的计算类别。”^(¹⁶²)\n\
  \n*设计是机会主义的*。格拉斯总结他对设计的讨论时说道：“不受干扰的设计过程是机会主义的——也就是说，优秀的设计师并非按部就班地推进，而是遵循由他们心智所决定的、不规则的路径，追求机会而非有序的进程。”^(¹⁶³)\n\
  \n以上所有特征都反对僵化、计划驱动的设计过程，而支持一种创造性、灵活的设计方式。这让我们回到了本章的第一个主题：*设计就是棘手的*。\n\n最后\n\n> *设计师可能会为复杂的设计苦思冥想数月。然后突然间，那个简单、优雅、美丽的解决方案就出现在他脑海中。当这发生在你身上时，感觉就像上帝在对你说话！也许他确实在说。*\n\
  >\n> ——利奥·弗兰科夫斯基（出自《穿越时空的工程师》）\n\n"
- "# 9. 结构化设计\n\n> *投资于抽象，而非实现。抽象能够经受住来自不同实现和新技术的变革冲击。*\n>\n> ——安迪·亨特和戴夫·托马斯^(¹⁶⁴)\n\
  \n## 结构化编程\n\n结构化设计源于艾兹格·迪杰斯特拉 1968 年写给《ACM 通讯》的那封著名信件《Goto 语句有害论》。迪杰斯特拉的论文总结道：\n\
  \n> *当前的* ***goto*** *语句过于原始；它太容易诱使人们把程序搞得一团糟。我们可以将所考虑的从句（编者注：if-then-else, switch,\
  \ while-do, 和 do-while）视为对其使用的约束。我并非声称这些从句已详尽到能满足所有需求，但无论建议何种从句（例如终止从句），它们都应满足一个要求：即能够维持一个独立于程序员的坐标系，以便以一种有用且可管理的方式来描述过程。*^(¹⁶⁵)\n\
  \n自此以后创建的编程语言，虽然并未完全消除 goto 语句（除了 Java，它完全没有），但无疑都淡化了它的使用，教授编程的课程也鼓励学生避免使用它。取而代之的是，问题解决以自顶向下的结构化方式进行教学：从问题陈述开始，尝试将问题分解为一组可解决的子问题。这个过程持续进行，直到每个子问题都小到微不足道或非常容易解决。这种技术被称为*结构化编程*。在\
  \ 20 世纪 80 年代中期面向对象编程出现并被接受之前，这是解决问题和编程的标准方法。它至今仍是处理一大类问题的最佳方法之一。\n\n\n\n## 逐步精化\n\
  \n尼克劳斯·维尔特在其 1971 年的论文《通过逐步精化进行程序开发》中正式提出了结构化设计技术。^((166)) *逐步精化*主张程序设计由一系列精化步骤组成。在每一步中，给定的任务被分解为若干子任务。每次任务精化都必须伴随数据描述和接口的精化。所获得的模块化程度将决定程序适应需求或环境变化的难易程度。\n\
  \n在精化过程中，你使用问题空间自然对应的符号表示。你应尽可能长时间地避免使用编程语言进行描述。每次精化都意味着基于一组设计标准做出若干设计决策。这些标准包括时间和空间效率、清晰度以及结构的规律性（简洁性）。\n\
  \n精化可以自上而下或自下而上两种方式进行。*自上而下*精化的特点是从问题的总体描述出发，逐步深入到各个模块或例程的具体功能陈述。逐步精化背后的指导原则是人类一次只能专注于少数几件事——即米勒著名的\
  \ 7±2 个数据块规则。^((167)) 其工作流程是：\n\n*   分析问题，尝试识别解决方案的轮廓以及每种方案的利弊\n*   然后首先设计顶层结构\n\
  *   避免涉及特定语言的细节\n*   将细节向下推，直至到达底层\n*   形式化每一层\n*   验证每一层\n*   然后进入下一层，进行下一组精化。（即重复此过程。）\n\
  \n你持续精化解决方案，直到感觉直接编码比继续分解更容易为止；本章稍后你将看到一个示例。\n\n关键在于，你要一直工作到对设计的显而易见和简单程度感到不耐烦为止。这里的缺点是，你并没有一个很好的“何时停止”的度量标准。这需要实践积累。\n\
  \n如果你无法从顶层开始，那么就从底层开始，采用*自下而上*的精化方式：\n\n*   问自己：“我知道系统需要做什么？”这通常涉及底层 I/O 操作、其他对数据结构的底层操作等。\n\
  *   根据这个问题，尽可能多地识别出底层函数和组件。\n*   识别底层组件的共同点，并将它们分组。\n*   继续处理上一层，或者回到顶层再次尝试向下分解。\n\
  \n自下而上的精化通常能更早地识别出实用例程，从而带来更紧凑的设计。它还有助于促进复用，因为你复用了底层例程。缺点是，纯粹使用自下而上的评估方法很难——你几乎总会在某个时刻切换到自上而下的方法，因为有时你会发现无法从底层向上拼凑出一个更大的整体。这并非真正的逐步精化，但它可以帮助你起步。大多数实际的逐步精化都涉及自上而下和自下而上设计元素的交替使用。幸运的是，自上而下和自下而上的设计方法可以很好地互补。\n\
  \n### 逐步精化示例：八皇后问题\n\n八皇后问题要求在一个标准的 8x8 棋盘上放置八个皇后，使得任何皇后都不能被其他皇后攻击。请记住，皇后可以沿水平、垂直或对角线方向移动任意数量的格子。图\
  \ 9-1 描绘了八皇后问题的一个可能解。\n\n![](img/270563_3_En_9_Fig1_HTML.jpg)\n\n一个 8x8 棋盘的示意图展示了\
  \ 8 个不同的皇后位置。\n\n图 9-1\n\n八皇后问题的一个解\n\n事实证明，目前还没有人找到这个问题的解析解，而且很可能根本不存在。那么你会如何解决这个问题呢？在继续阅读之前，请花点时间自己思考一下。\n\
  \n想好了吗？好的。让我们看看分解这个问题的一种可能方式。\n\n#### 八皇后：方案一\n\n你首先需要做的是审视问题，梳理出需求和解决方案的轮廓。这将引导你走上回答“顶层分解应该是什么”的道路。\n\
  \n你最初可能会考虑使用暴力法来解决问题：尝试所有可能的皇后排列，然后选出可行的方案。有 8 个皇后和 64 个可能的格子，可能的棋盘配置数为：\n\n![$$\
  \ \\frac{n!}{k!\\left(n-k\\right)!}=\\frac{64!}{56!8!}\\approx {2}^{32} $$](img/270563_3_En_9_Chapter_TeX_Equa.png)\n\
  \n其中 n 是棋盘上的格子数，k 是皇后数（或从可用格子中选择的位置数），结果仅为 4,294,967,296（略超过 40 亿种配置）。如今，这个数字并不算大，因此暴力法可能是一个可行的选择。\n\
  \n如果你生成所有可能棋盘组合的集合 A，你可以创建一个名为*q(x)*的测试，如果棋盘配置 x 是一个解则返回*true*，否则返回*false*。然后你可以编写一个如下所示的程序：\n\
  \n```\n生成所有棋盘配置的集合 A；\n当 A 中还有未测试的配置时，执行\n    x = 从 A 中取下一个配置\n    如果 (q(x) == true)\
  \ 则打印解 x 并停止\n返回顶部并重复执行。\n```\n\n注意，所有工作都在两个步骤中完成：生成集合 A 和执行测试*q(x)*。集合 A 的生成只发生一次，但测试*q(x)*会对集合\
  \ A 中的每个配置执行一次，直到找到解。虽然这种方法肯定有效，但效率并不高。因此，让我们尝试减少需要考虑的组合数量以加快速度。\n\n#### 八皇后：方案二\n\
  \n在考虑初始暴力法的过程中，你已经做了一些分析，因此对必须完成的任务有了更清晰的认识。为了减少总可能配置的数量，并提出更高效的算法，你需要更创造性地思考这个问题。首先要注意的是，每列中最多只能有一个皇后（是的，每行也是如此，但为了简化，我们先关注列）。每列恰好有一个皇后将可能的组合数减少到\
  \ 2²⁴或仅 1600 万（考虑到要将一个皇后放入每一列，现在只有 8 种可能的选择：行；所以总共是 8⁸或 2²⁴种选择）。虽然这很好，但它并没有真正改变算法太多。你提出的解决方案现在如下所示：\n\
  \n```\n生成受限棋盘配置的集合 B；\n当 B 中还有未测试的配置时，执行\n    x = 从 B 中取下一个配置\n    如果 (q(x) == true)\
  \ 则打印解 x 并停止\n返回顶部并重复执行。\n```\n\n这个版本需要生成每列恰好有一个皇后的棋盘位置集合 B，并且仍然需要遍历多达 1600 万个可能的棋盘位置。生成\
  \ B 现在比生成 A 稍微复杂一些，因为你现在必须测试提议的棋盘位置是否满足每列一个皇后的限制。然而，由于你需要测试的配置更少，方案二仍然优于上面的方案一。你还可以做得更好。\n\
  \n\n\n#### 八皇后问题：方案三\n\n在生成和测试棋盘方面，我们可以更加巧妙。与其先生成一个完整的棋盘配置再进行测试，不如在生成过程中就测试部分解。一旦某个棋盘配置中出现任何皇后冲突，就可以立即拒绝该棋盘，无需等待放置完其余皇后。此外，如果能够从错误的棋盘配置回溯到上一个正确的部分配置，就能更快地探索可能的配置。\n\
  \n现在，你可以进行顶层设计，将其形式化，并进入下一个细化层级。\n\n##### 方案三：第一次细化\n\n开始生成棋盘时，你将一次放置一个皇后，如果产生冲突则尝试其他选择，如果所有选择都尝试完毕则进行回溯。现在，让我们将步骤形式化：\n\
  \n从第 0 行和第 0 列开始：\n\n1.  在下一行的下一个可用列放置一个新皇后。\n\n2.  测试新皇后是否与棋盘上已有的所有其他皇后安全共存。（这是上述\
  \ *q(x)* 测试的一个变体。）\n    1.  如果新皇后不安全：\n        1.  尝试在当前列的下一行放置她，并重复步骤 2。\n\n  \
  \      2.  如果没有剩余行可供尝试，则从棋盘上移除新皇后；返回上一列，并将上一个皇后移动到下一行；重复步骤 2。\n\n    2.  如果新皇后安全：\n\
  \        1.  将她留在此处，并进入下一列。\n\n        2.  从第一行开始，放置下一个皇后。\n\n使用这种方法，你可以确保当前列 j\
  \ 之前的部分解是正确的。然后，你尝试通过在第 j+1 列添加一个皇后来扩展到下一个部分解。由于只有在所有之前的皇后都安全时才会添加新皇后，因此解决方案只需测试这一个新皇后的安全性，从而减少了测试例程的工作量。如果安全检查失败，你就回溯到列\
  \ j 处上一个有效的部分解，并重新考虑最后一个成功放置的皇后的剩余替代位置。Wirth 将这种创建和测试部分解的技术称为*逐步构建试验解*。而回溯技术当然被称为*回溯法*。\n\
  \n以下是用于寻找单个解的更形式化的伪代码：\n\n```\ndo {\nwhile ((row = 0));\nif (we've reached column\
  \ 8) then\nwe have a solution, print it.\n```\n\n该算法是此解决方案的第一个形式化视图。请注意，上面我们使用的是伪代码而非真正的编程语言，将语言细节进一步推后到细化层级中。此外，虽然我们已经有了该方法的大致框架，但仍有许多细节需要考虑。这些细节已被推入我们正在创建的控制层级中，我们将在下一次细化迭代中处理它们。这也是逐步细化的一个特点。\n\
  \n现在你已经有了算法的描述，也可以着手验证它。最终的验证将是观察程序产生正确的解，但你目前还无法做到这一点。不过，你当然可以拿一个棋盘（或一张纸）手动模拟这个算法，以验证你能否在棋盘上生成一个符合问题要求的皇后放置方案。\n\
  \n至此，你已经有了一个更形式化的顶层描述，了解了如何进行验证，并且准备好扩展上面那些模糊的步骤了。\n\n##### 方案三：第二次细化\n\n既然你已经有了程序的初步版本，就需要检查程序中的每一步，看看它们由什么构成。让我们聚焦于那个听起来很简单的“测试新皇后是否与棋盘上已有的所有其他皇后安全共存”。它一直在你计划的解决方案中默默承担着所有繁重的工作，现在是时候弄清楚它是如何工作的了。\n\
  \n虽然逐步细化主要关注程序控制流的描述，但在某个时刻，你需要确定数据的具体形式。对于你试图解决的每个问题，这会在细化过程中的不同时间点发生。对于这个问题，你终于到了一个阶段，下一步的细化应该是编写更详细的伪代码。这几乎迫使你去思考数据结构。你需要问自己，如何用数据结构来表示包含所有皇后以及所有空位的棋盘。你需要一个数据结构，既能表示皇后，又能检查它们是否会被攻击。初步的想法可能是一个\
  \ 8x8 的二维数组，你将皇后放置在某个（行，列）位置上。由于你只需要存储皇后的存在与否，可以将其设为布尔数组以节省空间。这种数据结构也便于你轻松检查新皇后的安全性。让我们来分解一下。\n\
  \n当在某个位置（row, col）放置一个新皇后时，你需要检查以下内容：\n\n*   这一行是否仍然空闲？\n\n*   这一列是否仍然空闲？\n\n* \
  \  这条主对角线是否仍然空闲？\n\n*   这条反对角线是否仍然空闲？\n\n如果你选择系统地每列放置一个皇后，就可以跳过第一个检查，因为后续的每一列必然仍然是空闲的（注意，你也可以对行做同样的处理）。这样就剩下另外三个检查：行、主对角线和反对角线。行的检查很简单：你只需检查与新皇后同一行的所有其他格子。要检查对角线，你需要找到一种方法，计算从任意给定（row,\
  \ col）出发，沿任一对角线上的位置。\n\n仔细观察图 9-2 中的对角线位置集合，你可以在左侧图像（描绘主对角线）中看到，沿着任何一条主对角线的所有格子，其行与列值的*差*是一个常数（例如，中心主对角线为\
  \ 0，其上方对角线为 -1，下方对角线为 1）。类似地，查看图 9-2 的右侧，你可以看到，沿着任何一条反对角线的所有格子，其行与列值的*和*也是一个常数（例如，中心反对角线为\
  \ 7，其上方对角线为 6，下方对角线为 8）。因此，给定任何一个格子，你都可以判断它是否落在给定位置皇后的任一对角线上。\n\n![](img/270563_3_En_9_Fig2_HTML.jpg)\n\
  \n两个 8x8 表格分别突出显示了主对角线和反对角线。主对角线从左到右向下倾斜。反对角线从右到左向下倾斜。\n\n图 9-2\n\n主对角线（左）和反对角线（右）\n\
  \n但请注意，你仍然需要检查所有格子，并对其坐标进行加法和减法运算，以判断它是否恰好落在每个新皇后感兴趣的任一对角线上。这种方法可行但速度较慢。你可以做得更好！\n\
  \n\n\n##### 方案三：第三次优化\n\n利用你之前设计的二维数组，可以存储每个皇后的精确位置以及所有空位。但实际上，你真正需要追踪的只是某一行、某一列或某条对角线是否已被已有的皇后占据。也就是说，你不需要知道皇后的确切位置——只需要知道它们正在保护哪些列和对角线。\n\
  \n因此，与其存储 8*8=64 个位置的布尔信息（有皇后或无皇后），不如存储关于 8 行、15 条主对角线和 15 条副对角线（总共 38 个布尔值）的布尔信息（受保护或未受保护）。对于更大的棋盘，空间复杂度的降低将更为显著（例如，考虑在\
  \ 1000x1000 的棋盘上放置 1000 个皇后）。此外，你现在只需要查看三个布尔值（行和两条对角线）就能判断新皇后是否安全，这使得安全检查变为常数时间。总的来说，对于\
  \ n 个皇后，此解决方案将以 O(n) 的时间复杂度运行。\n\n要检查某一行是否仍然空闲，你只需要一个一维布尔数组：\n\n```\nboolean rows[8];\
  \ //索引 0-7 对应棋盘的行号\n```\n\n其中 `rows[r] = true` 表示第 r 行仍然未被保护。\n\n为了在类似的一维数组中存储对角线的信息，你可以利用主对角线和副对角线差值或和恒定的特性来创建另外两个数组。对于你的\
  \ 15 条主对角线，由于差值范围从 -7 到 7（包含两端），你需要计算正确的对角线索引为 `(row-col+7)`，将范围偏移到标准的有效索引 0-14。\n\
  \n```\nboolean mainDiagonals[15]; // 索引 0-14 通过 row-col+7 计算得到\nboolean antiDiagonals[15];\
  \ // 索引 0-14 通过 row+col 计算得到\n```\n\n其中 `mainDiagonals [d] = true` 表示第 d 条对角线仍然未被保护。\n\
  \n通过这种安排，^(¹⁶⁸) 测试位置 (row, col) 上皇后的安全性如下：\n\n```\n( rows[row] AND mainDiagonals[row-col+7]\
  \ AND antiDiagonals[row+col] )\n```\n\n这是一个非常棒的解决方案，但它足够好吗？嗯，这取决于具体情况。一般来说，常数时间的安全检查是无与伦比的，如果你需要放置\
  \ n 个皇后，那么 O(n) 的时间复杂度也同样难以被超越。不过，你可能还有其他约束和优先级。目前，你为每一行和每一条对角线存储一个布尔值；对于一个 n*n\
  \ 的棋盘，你存储了 n+(n+n-1)*2=5n-2 个布尔值。如果你的棋盘非常大且存储空间非常有限，你可以牺牲时间复杂度来降低空间复杂度。\n\n#####\
  \ 方案三：第四次优化\n\n还有另一种思考如何存储数据的方式。这次，我们尝试存储比每行一个布尔值和每条对角线一个布尔值更少的信息。事实证明，你只需要一个长度等于列数的一维数组就能应付：\n\
  \n```\nint board[8]; // 对于 8x8 棋盘，索引 0-7 代表行，值 0-7 代表列\n```\n\n其中，数组的每个*索引*代表一列（在八皇后问题中为\
  \ 0 到 7），而该索引处存储的每个*值*代表放置皇后的行（在八皇后问题中同样为 0 到 7）。这种编码方式为你提供了每个皇后的精确坐标。每放置一个新皇后，你可以逐一检查所有先前放置的皇后，评估它们的行、主对角线或副对角线是否与新放置的皇后匹配。如果发现任何匹配，则皇后之间存在冲突，必须移动新皇后。通过这种方式，你可以省去之前用来存储每条对角线安全性的独立数组。请注意，这种安全性测试不再是常数时间，整体解决方案会更慢，因为现在你需要依次检查\
  \ 0 个、1 个、2 个、3 个...先前放置的皇后（0+1+2+3+...+n-1），其时间复杂度为 O(n²)。\n\n现在可能是时候编写更多代码了。此时，似乎应该从伪代码过渡到一种真正的编程语言。在优化过程中的某个时刻，你必须进行这种转换。就像决定何时定义数据结构一样，具体何时引入语言特性取决于问题本身以及当前优化的详细程度。一个用于测试安全性的\
  \ Java 方法可能如下所示：\n\n```\n// int[] board 索引代表列，值代表皇后所在的行\n// row, col 是新放置的、正在评估安全性的皇后的坐标\n\
  public boolean isSafe () {\nboolean safe = true;\nfor (int c = 0; c < col; c++)\
  \ { // c 是每个先前的列\nif ((board[c] == row) || // 占据的行 == 当前行？\n((board[c] - c) == (row\
  \ - col) ) || // 主对角线匹配？\n((board[c] + c) == (row + col) ) ) // 副对角线匹配？\nsafe =\
  \ false; // 任何匹配都意味着冲突！\n}\nreturn safe;\n}\n```\n\n请记住，因为你是一次一列地添加一个皇后以构建部分解，所以你只需要测试当前放置新皇后的列*之前*的所有列。\n\
  \n##### 方案三：第五次优化\n\n既然你已经解决了安全性过程，并决定使用一个简单的数据结构来表示当前的棋盘配置，那么你可以继续进行分解中的其余过程。剩下的任务是：\n\
  \n1.  在棋盘上保留一个安全的皇后，并继续处理下一列。\n2.  尝试将一个不安全的皇后向下移动到下一行。\n3.  如果没有剩余的行可以尝试，则从棋盘上移除新皇后；回溯到前一列，并将前一个皇后移动到下一行。\n\
  \n这些任务都足够简单，无需进一步分解即可用代码解决。这是结构化编程的一个关键点：持续进行分解，直到一个过程变得显而易见，然后你可以尝试直接编写代码。上述三个任务在代码中可能如下所示：\n\
  \n```\n/** \"在棋盘上保留一个安全的皇后，并继续处理下一列\"\n*  位于 (row, col) 的皇后是安全的，因此我们有了一个部分解；\n*\
  \  前进到下一列\n*/\npublic void advance () {\nboard[col] = row;           // 将皇后放置在 (row,\
  \ col) 位置\ncol++;                      // 移动到下一列\nrow = 0;                    //\
  \ 并从该列的开头开始\n}\n```\n\n对于*尝试将一个不安全的皇后向下移动到下一行*，你甚至不需要一个方法。主程序中的安全性测试会在 `isSafe()`\
  \ 方法确定当前 (row, col) 位置不安全时，将皇后向上移动一行。实现此功能的代码如下：\n\n```\nif (isSafe())\nadvance();\n\
  else\nrow++;\n```\n\n最后，你得到以下代码：\n\n```\n/**\n*  \"如果没有剩余的行可以尝试，则从棋盘上移除新皇后；\n* \
  \ 回溯到前一列，并将前一个皇后移动到下一行\"\n*  在当前其他皇后的放置情况下，无法在当前列找到安全行，\n*  因此回溯一列，并将前一个皇后移动到下一行\n\
  */\npublic void retreat () {\ncol--;\nrow = board[col] + 1;\n}\n```\n\n完整的 Java\
  \ 程序在附录中。\n\n\n\n## 模块化分解\n\n1972 年，大卫·帕纳斯发表了一篇题为《论将系统分解为模块的标准》的论文，他在其中提出，可以使用一种称为模块化的技术来设计程序。^(¹⁶⁹)\
  \ 帕纳斯的论文也是最早描述基于*信息隐藏*进行分解的论文之一，信息隐藏是面向对象编程的关键技术之一，我们将在本节稍后讨论。在他的论文中，帕纳斯强调了基于问题解决方案的控制流进行自顶向下分解，与使用封装和信息隐藏将数据定义及其操作相互隔离的分解方式之间的区别。他的论文显然是面向对象分析与设计（OOA&D）的先驱，你将在下一章中看到这一点。\n\
  \n虽然帕纳斯的论文早于这一概念的提出，但他实际上是在讨论一个称为*关注点分离*的概念。“在计算机科学中，关注点分离是一种将计算机程序划分为不同部分的设计原则。每个部分处理一个独立的关注点：一组影响计算机程序代码的信息。一个良好体现了关注点分离的程序被称为模块化程序。模块化，以及由此带来的关注点分离，是通过将信息封装在具有明确定义接口的代码段中来实现的。封装是信息隐藏的一种手段。”^(¹⁷⁰)\
  \ 传统上，关注点分离主要关注程序功能的分离。帕纳斯则增加了分离数据的想法，使得各个模块既能控制数据，也能控制作用于数据的操作，并且数据只能通过定义良好的接口才能被访问。这一概念后来由艾兹格·迪杰斯特拉进一步扩展。^(¹⁷¹)\n\
  \n模块化有三个关键特性，对于创建模块化程序至关重要：\n\n*   封装\n*   松散耦合\n*   信息隐藏\n\n*封装*是指将一组由其数据和行为定义的服务捆绑在一起作为一个模块，并保持它们的整体性。这组服务应该是内聚的，并且显然属于同一整体。（就像函数一样，一个模块应该只做一件事。）然后，该模块向用户呈现一个*接口*，理想情况下，该接口是访问模块内服务和数据的唯一途径。封装服务和数据的一个目标是*高内聚性*：你的模块应该只做一件事，并且模块内的所有函数都应致力于实现这一件事。\n\
  \n与封装相辅相成的是*松散耦合*，它描述了两个模块之间相互连接的紧密程度。我们希望最小化任何一个模块对另一个模块的依赖，因此我们将模块分离以最小化交互，并让模块通过模块接口进行交互。目标是创建具有内部完整性（强内聚性）的模块，并且模块之间具有少量、直接、可见且灵活的连接（松散耦合）。模块之间良好的耦合应该是松散的，使得一个模块中的方法可以轻松地被另一个模块中的方法调用，同时每个模块中的数据是独立的，并且只能由定义该数据的模块内部的方法进行更改。这样，两个模块可以通信并请求更改数据，而无需担心错误地修改数据。\n\
  \n*松散耦合*分为四大类，从好到差依次为：\n\n*   *简单数据耦合*：非结构化数据通过参数列表传递。这是最好的耦合类型，因为它允许发送模块按需组织数据，并允许接收模块决定如何处理数据。\n\
  *   *结构化数据耦合*：结构化数据通过参数列表传递。这也是一种良好的耦合类型，因为发送模块保持对数据格式的控制，而接收模块可以按需处理数据。\n*   *控制耦合*：来自发送模块的数据被传递给接收模块，并且数据的内容告诉接收模块该做什么。这不是一种好的耦合类型：发送方和接收方耦合过于紧密，因为发送方正在控制接收模块中函数的执行方式。\n\
  *   *全局数据耦合*：两个模块使用相同的全局数据。这非常糟糕，因为它违反了封装的基本原则，让模块共享数据。这会引发不希望的副作用，并确保在程序执行的任何时刻，耦合的模块都无法确切知道全局共享数据中的内容。通常，全局变量被认为是不良的编程实践。\n\
  \n*信息隐藏*常常与封装混淆，但它们并不相同。封装描述的是将数据和行为包装成一个单一实体的过程——在我们的例子中，这个实体就是模块。数据在模块内部可以是公开可见的，因此并未被隐藏。另一方面，信息隐藏则指出，模块中的数据和行为应该受到控制，并且仅对模块内作用于这些数据的操作可见，因此对于其他外部模块是不可见的。这是模块（以及后来的对象）的一个重要特性，因为它将数据的控制权交给了最了解如何安全操作这些数据的模块，同时防止了其他模块介入并篡改该数据可能引发的副作用。\n\
  \n帕纳斯不仅仅是在谈论在模块中隐藏数据。他对信息隐藏的定义更侧重于在模块定义中隐藏设计决策。“我们提议……首先列出一系列困难的设计决策或可能发生变化的设计决策。然后，每个模块的设计都是为了向其他模块隐藏这样的决策。”^(¹⁷²)\
  \ 以这种方式隐藏信息，使得模块的客户端无需了解构建该模块所涉及的任何设计决策，就能成功使用该模块。它还允许开发人员更改模块的实现，而不会影响客户端使用该模块的方式。\n\
  \n\n\n### 示例：上下文关键词索引\n\n在早期，当 Unix 还年轻、世界还很新的时候，Unix 文档被分为八个不同的部分，整个手册以*排列索引*开头。Unix\
  \ 的问题不在于命令行界面，也不在于倒置的树形文件系统结构。不，Unix 的问题在于几乎每个难以阅读的 Unix 命令名称，包括 `ls`、`cat`、`cp`、`mv`、`mkdir`、`ps`、`cc`、`as`、`ld`、`m4`……我们还可以继续列举。Unix\
  \ 可能拥有地球上所有操作系统中最为晦涩难懂的命令行集。创建 Unix 命令行工具的首要规则显然是：“既然两个字符就能搞定，为什么要用三个？”\n\n因此，在\
  \ Unix 文档的八个部分中查找任何内容都可能是一项真正的考验。这时*排列索引*应运而生。每个 Unix 手册页都以一个标题行开头，其中包含命令名称和该命令功能的简短描述。例如，`cat(1)`\
  \ 的手册页开头如下：\n\n```\ncat - 连接并打印文件\n```\n\n但如果你不知道命令的名称，却知道它的功能呢？排列索引通过将命令描述中的大部分单词（忽略冠词）纳入索引本身来解决这个问题。因此，`cat`\
  \ 可以在“cat”下找到，也可以在“连接”、“打印”和“文件”下找到。这被称为*上下文关键词*（KWIC）索引。它非常有效。\n\n因此，你的任务是给定两个输入文件来创建一个\
  \ KWIC 索引：第一个文件包含要忽略的单词（有时称为“停用词”），第二个文件包含我们要索引的文本行。例如，假设你的第一个文件包含 `for`、`the`、`and`\
  \ 作为要忽略的单词，第二个文件如下所示：\n\n```\nThe Sun also Rises\nFor Whom the Bell Tolls\nThe Old\
  \ Man and the Sea\n```\n\n你生成的 KWIC 索引（排序后的单词全部大写）将是：\n\n```\nThe Sun ALSO Rises\n\
  For Whom the BELL Tolls\nThe Old MAN and the Sea\nThe OLD Man and the Sea\nThe Sun\
  \ also RISES\nThe Old Man and the SEA\nThe SUN also Rises\nFor Whom the Bell TOLLS\n\
  For WHOM the Bell Tolls\n```\n\n将每一行向左移动，直到下一个有效关键词（跳过冠词），你会得到每行 n 个关键词对应的 n 个副本。每次移动后，索引关键词（以大写字母显示）会出现在该行每个副本的开头。然后，所有行按其索引关键词的字母顺序排序。如果出现平局（两行文本具有相同的索引词），则这些行应按其在输入文件中出现的顺序排列。\n\
  \n你需要回答的问题是：1）如何创建 KWIC 索引？2）如何存储索引数据？\n\n#### KWIC：自顶向下分解\n\n你将首先使用自顶向下的分解来设计问题解决方案。正如你在本章前面看到的八皇后问题，自顶向下的分解完全关乎控制流：你需要弄清楚如何顺序地解决问题，并在每一步都取得进展。假设数据与例程分开存储，并且控制流中的每个子例程都可以访问它所需的数据。另一种方法是在调用每个子例程时将数据传递给它；这可能既繁琐又耗时，因为每次将数据传递给例程时，通常都必须复制数据。\n\
  \n该问题的初步分解可能如下所示：\n\n1.  输入要忽略的单词和文本。\n\n2.  移动每一行文本，并为最终出现在该行开头的每个单词（跳过任何冠词）存储该行的一个副本。\n\
  \n3.  根据每行的第一个单词（即每行的索引词）对所有生成的移动后的文本行进行排序。\n\n4.  格式化并输出文本。\n\n请注意，这些步骤可以很容易地成为独立的子例程，并从主程序按顺序调用。用于输入文本的数据结构可以是每行的字符数组、每行的字符串，或者整个输入文件的字符串数组。你也可以使用映射数据结构，将每个索引词作为键，将包含输入文本行的字符串作为映射元素的值。当然，还有其他可能的数据结构可供使用。排序可以通过任何稳定的排序算法完成，选择哪种算法取决于所选的数据结构以及输入文本的预期大小。你的排序必须是稳定的，因为要求相同的索引词对其各自的行进行排序时，应保持它们在输入文本文件中出现的顺序。根据你使用的编程语言和选择的数据结构，排序可能会自动为你完成。你选择的数据结构将影响循环移位的方式以及输出例程如何格式化每个输出行。\n\
  \n现在你已经对自顶向下分解如何进行有了初步了解，让我们继续考虑模块化分解。\n\n\n\n#### KWIC：模块化分解\n\nKWIC 问题的模块化分解可以基于信息隐藏原则，即隐藏数据结构与设计决策。你创建的模块不一定代表上述顺序列表中的元素，而是通过按需相互调用来协作。以下是生成\
  \ KWIC 索引时一个可能的模块列表：\n\n*   行模块（用于输入文本行）\n*   关键词-行对模块\n*   KWICIndex 模块，用于创建索引列表本身\n\
  *   移位模块\n*   格式化与打印输出模块\n*   主控制模块——主程序\n\n行模块将使用关键词-行模块创建一个映射数据结构（即键值对），其中每个键是一个关键词，其值是以该关键词开头的行列表。KWICIndex\
  \ 模块将使用行模块创建索引列表。移位模块将使用 KWICIndex 模块（进而使用行模块和关键词-行模块）并创建移位后的行集合。排序将在 KWICIndex\
  \ 模块内部处理；索引将作为排序列表创建，并且任何对列表的添加都将保持排序顺序。格式化与打印模块将格式化关键词行，使关键词以全大写形式打印。另一种视图是，行也可以取消移位，关键词在连续的输出行上彼此对齐。最后，主控制模块将读取输入，创建\
  \ KWICIndex，并使其正确打印。\n\n这些模块的关键在于，你可以在不需要了解每个模块如何实现以及数据如何存储的细节的情况下描述模块及其交互。这些细节隐藏在模块描述本身中。其他设计也是可能的。例如，将循环移位操作归入行模块内部可能更好，使其能够存储输入行及其移位。无论如何，设计的下一步是为每个模块创建接口，并协调这些接口，以便每个模块无论内部实现如何都能与其他模块通信。\n\
  \n对于此实现，让我们创建四个 Java 类：\n\n*   `Line`，为从文本文件输入的行创建数据结构。\n*   `KwicIndex`，接收要忽略的单词和输入行，并创建排序后的置换索引。行根据关键词进行移位并添加到索引中。\n\
  *   `Print`，接收`KwicIndex`对象，并按正确顺序和所需移位方式（例如，按原始句子顺序，但关键词彼此对齐）打印置换索引。\n*   `Main`，检查命令行参数是否正确，创建初始`KwicIndex`对象，并调用添加新行和进行打印的方法。\n\
  \n给这个程序一个名为`input.txt`的文件，内容如下：\n\n```\nDescent of Man\nThe Ascent of Man\nThe Old\
  \ Man and The Sea\nA Portrait of the Artist As a Young Man\nA Man is a Man but Bubblesort\
  \ is a dog\nthis is dumb\n```\n\n并忽略单词“the”、“of”和“and”（在停用词输入文件中提供），将生成以下 KWIC 输出：\n\
  \n```\nA Portrait of the Artist As a Young Man\nA Man is A Man but Bubblesort is\
  \ a dog\nA Man is a Man but Bubblesort is A dog\nA Portrait of the Artist As A Young\
  \ Man\nA Man is a Man but Bubblesort is a dog\nA Portrait of the ARTIST As a Young\
  \ Man\nA Portrait of the Artist AS a Young Man\nThe ASCENT of Man\nA Man is a Man\
  \ but BUBBLESORT is a dog\nDESCENT of Man\nsomething i do not know how to DO\nsomething\
  \ i DO not know how to do\nA Man is a Man but Bubblesort is a DOG\nthis is DUMB\n\
  something i do not know HOW to do\nsomething I do not know how to do\nA Man IS a\
  \ Man but Bubblesort is a dog\nA Man is a Man but Bubblesort IS a dog\nthis IS dumb\n\
  something i do not KNOW how to do\nA MAN is a Man but Bubblesort is a dog\nDescent\
  \ of MAN\nA Man is a MAN but Bubblesort is a dog\nThe Old MAN and The Sea\nThe Ascent\
  \ of MAN\nA Portrait of the Artist As a Young MAN\nsomething i do NOT know how to\
  \ do\nThe OLD Man and The Sea\nA PORTRAIT of the Artist As a Young Man\nThe Old\
  \ Man and The SEA\nSOMETHING i do not know how to do\nTHIS is dumb\nA Portrait of\
  \ the Artist As a YOUNG Man\n```\n\n在附录 2 中，我们展示了一个用 Java 编写的 KWIC 索引程序实现，它在一定程度上紧密遵循了上述讨论。我们将在下一章关于面向对象设计的内容中，更详细地继续讨论模块化分解。\n\
  \n## 结论\n\n结构化设计描述了一组经典的设计方法论。这些设计思想适用于一大类问题。最初的结构化设计思想——逐步求精，要求你自顶向下分解问题，专注于解决方案的控制流。它也与第\
  \ 7 章中提到的一些架构密切相关，特别是主程序子例程架构和管道-过滤器架构。模块化分解是现代面向对象方法论的前身，并引入了封装和信息隐藏的概念。这些思想是你设计工具箱的基础。\n\
  \n## 附录 1：完整的非递归八皇后程序\n\n```\n/*\n*  NQueens.java\n*  八皇后程序\n*  用于单一解的非递归版本\n*/\n\
  import java.util.*;\npublic class NQueens {\nstatic int totalcount = 0;\nstatic\
  \ int row = 0;\nstatic int col = 0;\nstatic int[] board;\n/*\n*  (row, col)处的皇后是安全的，\n\
  *  因此我们有了一个部分解。\n*  前进到下一列\n*/\npublic void advance () {\nboard[col] = row;\ncol++;\n\
  row = 0;\n}\n/*\n*  在当前列找不到安全行，\n*  因此回溯一列并将该皇后上移一行\n*/\npublic void retreat ()\
  \ {\ncol--;\nrow = board[col] + 1;\n}\n/*\n*  检查 (row, col) 处的皇后是否会被攻击\n*/\npublic\
  \ boolean isSafe () {\nboolean safe = true;\ntotalcount++;\n/*\n*  检查对角线和行是否有攻击\n\
  *  因为我们只检查部分解\n*  只需检查到当前列\n*/\nfor (int c = 0; c = 0));\n/* 如果我们已经放置了所有 N 个皇后，就得到了一个解\
  \ */\nif (col == N) {\nfor (int i = 0; i < N; i++) {\nSystem.out.print(board[i]\
  \ + \" \");\n}\n} else\nSystem.out.println(\"No solution. \");\nSystem.out.println();\n\
  System.out.println(\"after trying \" + totalcount +\n\" board positions.\");\n}\n\
  }\n```\n\n\n\n## 附录 2：KWIC 解决方案的模块化版本\n\n```\n/**\n* 类 Line\n* 负责存储三条关键信息：\n* 当前行、关键字以及关键字在该行中的索引。\n\
  *\n* 基本上类似于 C 语言中的结构体。\n*\n*/\npublic class Line implements Comparable {\npublic\
  \ String line;\npublic String keyword;\npublic int indexOf;\npublic Line(String\
  \ line, String keyword, int indexOf) {\nthis.keyword = keyword;\nthis.indexOf =\
  \ indexOf;\n// 将行中的关键字转换为大写\n// 获取该行的第一部分\nString first = line.substring(0, indexOf);\n\
  // 将整个关键字转换为大写\nString middle = keyword.toUpperCase();\n// 获取关键字之后该行的剩余部分\nString\
  \ last = line.substring(indexOf + keyword.length());\n// 将所有部分重新组合\nthis.line =\
  \ first + middle + last;\n}\n/**\n* 我们希望仅根据关键字对行进行排序。\n* 这将执行关键字的字典序比较。\n* 请记住，关键字是一个字符串。\n\
  */\n@Override\npublic int compareTo(Line other) {\nreturn this.keyword.compareToIgnoreCase(other.keyword);\n\
  }\n}\nimport java.util.Scanner;\nimport java.util.*;\n/**\n* 类 KwicIndex\n* 一个 KwicIndex\
  \ 对象包含一个 Lines 集合\n* 以及我们忽略作为关键字的单词。\n*\n* 我们使用 HashSet 来存储要忽略的单词，因为\n* 我们只希望这些单词每个只出现一次。\n\
  *\n* 我们使用 PriorityQueue 来存储行，因为\n* 我们希望它们按关键字排序，而 PQ\n* 会自动为我们完成这项工作。\n*\n*/\npublic\
  \ class KwicIndex {\npublic HashSet wordsToIgnore;\npublic PriorityQueue lines;\n\
  /**\n* 构造函数，初始化列表并\n* 读取所有要忽略的单词\n*/\npublic KwicIndex(Scanner ignore) {\nthis.wordsToIgnore\
  \ = new HashSet();\nthis.lines = new PriorityQueue();\nwhile (ignore.hasNext())\
  \ {\nthis.wordsToIgnore.add(ignore.next());\n}\n}\n/**\n* 为给定行在索引中创建一个条目。\n* @param\
  \ str；要检查的字符串\n* @return\n*/\npublic void add(String str) {\nScanner scan = new\
  \ Scanner(str);\nint offset = 0;\nint words = -1;\nwhile (scan.hasNext()) {\n//\
  \ 获取下一个单词\nString temp = scan.next();\nwords++;\n/** 如果这个单词不被忽略，则创建一个新行，\n*  该行已移位，新单词被移除，\n\
  *  然后将其添加到行列表中\n*/\nif (!wordsToIgnore.contains(temp.toLowerCase())) {\nLine version\
  \ = new Line(str, temp, offset + words);\nthis.lines.add(version);\n}\noffset +=\
  \ temp.length();\n}\n}\n/**\n* 返回索引以便我们可以打印它\n*/\npublic PriorityQueue getLines()\
  \ {\nreturn lines;\n}\n}\nimport java.util.*;\n/**\n* 类 Print\n* 打印生成的 KWIC 索引\n\
  *\n*/\npublic class Print {\npublic PriorityQueue lines;\npublic Print(PriorityQueue\
  \ lines) {\nthis.lines = lines;\n}\n/**\n* 将索引内容打印到 System.out\n* 调整行格式，使\n* 关键字位于同一列\n\
  */\npublic void printIndex() {\n// 创建一个新的 PriorityQueue\nPriorityQueue newLines\
  \ = new PriorityQueue();\n// 让我们计算最长行的长度\nint longest = 0;\nfor (Line l : lines)\
  \ {\nif (l.indexOf > longest) {\nlongest = l.indexOf;\n}\n}\n/**\n* 执行打印\n*/\nwhile\
  \ (!lines.isEmpty()) {\n/** 获取关键字最小的行 */\nLine l = lines.poll();\n/** 保存该行 */\n\
  newLines.add(l);\n/**\n* 计算空白字符\n* 这里我们根据将最长行\n* 正好放在中间，来计算关键字\n* 需要向右缩进多少\n*/\n\
  String retval = \"\";\nfor (int i = 0; i  \");\nSystem.exit(1);\n}\n/**\n* 首先我们创建一个\
  \ KwicIndex 对象，并将\n* 要忽略的单词添加到其中\n*/\nKwicIndex index = new KwicIndex(ignore);\n\
  /**\n* 现在我们将所有行添加到索引中\n* add() 方法负责执行循环移位\n* 并将移位后的行添加到优先队列中\n*/\nwhile (scan.hasNextLine())\
  \ {\nindex.add(scan.nextLine());\n}\n/**\n* 最后，我们打印刚刚创建的索引\n*/\nPrint prt = new\
  \ Print(index.getLines());\nprt.printIndex();\n}\n}\n```\n\n脚注 1   2   3   4   5\
