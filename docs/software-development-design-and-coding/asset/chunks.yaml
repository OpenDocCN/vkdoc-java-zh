    * The class that tests the BirdFeeder, Sensor, and

    * FeedingDoor classes.

    *

    * @version 0.1

    */

    public class BirdFeederTester {

    private BirdFeeder feeder;

    /*

    * Constructor for objects of class BirdFeederTest

    */

    public BirdFeederTester() {

    this.feeder = new BirdFeeder();

    }

    public static void main(String [] args) {

    BirdFeederTester bfTest = new BirdFeederTester();

    for (int i = 0; i < 10; i++) {

    System.out.println("Testing the bird feeder");

    bfTest.feeder.operate();

    try {

    Thread.currentThread().sleep(2000);

    } catch (InterruptedException e) {

    System.out.println("Sleep interrupted" + e.getMessage());

    System.exit(1);

    }

    }

    }

    }

    ```


    When Alice and Bob take delivery of the B⁴++ they are thrilled. The doors automatically
    open and close, the birds arrive and eat their fill. Birdsong fills the air. What
    else could they possibly want?


    ## Conclusion


    Object-oriented design is a methodology that works for a very wide range of problems.
    Solutions to many problems in the real world are easily characterized as groups
    of cooperating objects. This single simple idea promotes simplicity of design,
    reuse of both designs and code, and the ideas of encapsulation and information
    hiding that Parnas advocated in his paper on modular decomposition.^([^(181)](#fn181))
    It’s not the right way to solve some problems, including problems like communications
    protocol implementations, but it opens up a world of new and better solutions
    for many others and it closes the “intellectual distance” between the real-world
    description of a problem and the resulting code.'
  trans: '

    ### 第 5 步：类图


    *类图*允许你描述一个类的属性和方法。一组类图可以描述程序中的所有对象以及对象之间的关系。你可以在类图之间绘制不同类型的箭头来描述这些关系。类图为你创建的程序对象模型提供了可视化描述。你在第
    7 章的“狐狸与兔子”程序中看到过一组类图。


    类图包含三个部分：


    *   *名称*：类的名称

    *   *属性*：类实例可用的数据字段（包括名称和数据类型）

    *   *方法*：类实例可用的方法集（包括名称和可见性）


    你可以在图 10-1 中看到你的`BirdFeeder`类的类图示例。


    ![](img/270563_3_En_10_Fig1_HTML.jpg)


    一个类图展示了 Bird Feeder。三个区块包含以下文本：Bird Feeder。light Level 分号 integer。operate 左括号，右括号。


    图 10-1


    BirdFeeder 类


    该图显示`BirdFeeder`类有一个整数属性`lightLevel`和一个方法`operate()`。单独的类图本身并不十分有趣，但当你将多个类图放在一起并展示它们之间的关系时，你就可以获得关于程序的一些有趣信息。那么，在类图方面你还需要什么？在你的程序中，`BirdFeeder`类使用了`FeedingDoor`和`Sensor`类，但它们彼此并不知晓（也不关心）。事实上，虽然`BirdFeeder`知道`FeedingDoor`和`Sensor`并使用它们，但它们并不知道自己被使用了。啊，这就是面向对象编程的美妙之处。这种关系可以用图
    10-2 中所有三个类的类图来表示。


    ![](img/270563_3_En_10_Fig2_HTML.jpg)


    一个图表展示了三个类之间的关系，例如 Bird Feeder、Feeding Door 和 Sensor。


    图 10-2


    BirdFeeder 使用 FeedingDoor 和 Sensor


    在该图中，末端带有开放箭头的虚线表示一个类（在你的例子中是`BirdFeeder`）通过*使用*另一个类（在你的例子中是`FeedingDoor`或`Sensor`）而与它*关联*。


    ### 第 6 步：开始写代码？


    现在你已经有了类图，并且知道了属性、方法以及类之间的关联，是时候用一些代码来充实你的程序了。


    在`BirdFeeder`对象中，`operate()`方法需要检查光照水平，并根据`Sensor`对象报告的当前光照水平来打开或关闭喂食门。如果当前光照水平高于或低于阈值，则不做任何操作。


    在`Sensor`对象中，`getLevel()`方法仅从硬件传感器报告当前水平。


    在`FeedingDoor`对象中，`open()`方法检查门是否关闭。如果门是关闭的，则打开它们并设置一个布尔值来表示门已打开。`close()`方法则执行相反的操作。


    以下是所描述的每个类的代码。


    ```

    /**

    * class BirdFeeder

    *

    * @author Agile Programmer

    * @version 1.0

    */

    import java.util.ArrayList;

    import java.util.Iterator;

    public class BirdFeeder {

    /* 实例变量 */

    private static final int ON_THRESHOLD = 40;

    private static final int OFF_THRESHOLD = 25;

    private int lightLevel;

    private Sensor s1;

    private ArrayList doors = null;

    /*

    * BirdFeeder 类对象的默认构造函数

    */

    public BirdFeeder() {

    doors = new ArrayList();

    /* 初始化 lightLevel */

    lightLevel = 0;

    s1 = new Sensor();

    /* 默认情况下，我们有一个只有一个门的喂食器 */

    doors.add(new FeedingDoor());

    }

    /*

    * operate() 方法操作喂鸟器。

    * 它从 Sensor 获取当前 lightLevel 并

    * 检查是否应该打开或关闭门

    */

    public void operate() {

    lightLevel = s1.getLevel();

    if (lightLevel > ON_THRESHOLD) {

    Iterator door_iter = doors.iterator();

    while (door_iter.hasNext()) {

    FeedingDoor a = (FeedingDoor) door_iter.next();

    a.open();

    System.out.println("门已打开。");

    }

    } else if (lightLevel < OFF_THRESHOLD) {

    Iterator door_iter = doors.iterator();

    while (door_iter.hasNext()) {

    FeedingDoor a = (FeedingDoor) door_iter.next();

    a.close();

    System.out.println("门已关闭。");

    }

    }

    }

    }

    /**

    * class FeedingDoor

    *

    * @author Agile Programmer

    * @version 1.0

    */

    public class FeedingDoor {

    /* 实例变量 */

    private boolean doorOpen;

    /*

    * FeedingDoors 类对象的默认构造函数

    */

    public FeedingDoor() {

    /* 初始化实例变量 */

    doorOpen = false;

    }

    /*

    * 打开喂食门

    * 如果门已经打开，则不执行任何操作

    */

    public void open( ) {

    /** 如果门是关闭的，则打开它 */

    if (doorOpen == false) {

    doorOpen = true;

    }

    }

    /*

    * 关闭门

    * 如果门已经关闭，则不执行任何操作

    */

    public void close( ) {

    /* 如果门是打开的，则关闭它 */

    if (doorOpen == true) {

    doorOpen = false;

    }

    }

    /*

    * 报告门是打开还是关闭

    */

    public boolean isOpen() {

    return doorOpen;

    }

    }

    /**

    * class Sensor

    *

    * @author Agile Programmer

    * @version 1.0

    */

    public class Sensor {

    /* 实例变量 */

    private int lightLevel;

    /*

    * Sensor 类对象的默认构造函数

    */

    public Sensor() {

    /** 初始化实例变量 */

    lightLevel = 0;

    }

    /**

    * getLevel - 返回光照水平

    *

    * @return 由硬件传感器返回的光照水平值

    */

    public int getLevel( ) {

    /* 在我们获得硬件光照传感器之前，我们只是模拟它 */

    lightLevel = (int) (Math.random() * 100);

    return lightLevel;

    }

    }

    ```


    最后，你有一个`BirdFeederTester`类来操作 B⁴++。


    ```

    /**

    * 测试 BirdFeeder、Sensor 和

    * FeedingDoor 类的类。

    *

    * @version 0.1

    */

    public class BirdFeederTester {

    private BirdFeeder feeder;

    /*

    * BirdFeederTest 类对象的构造函数

    */

    public BirdFeederTester() {

    this.feeder = new BirdFeeder();

    }

    public static void main(String [] args) {

    BirdFeederTester bfTest = new BirdFeederTester();

    for (int i = 0; i < 10; i++) {

    System.out.println("测试喂鸟器");

    bfTest.feeder.operate();

    try {

    Thread.currentThread().sleep(2000);

    } catch (InterruptedException e) {

    System.out.println("睡眠中断" + e.getMessage());

    System.exit(1);

    }

    }

    }

    }

    ```


    当爱丽丝和鲍勃收到 B⁴++时，他们激动不已。门自动打开和关闭，鸟儿们飞来饱餐一顿。鸟鸣声充满了空气。他们还能奢求什么呢？


    ## 结论


    面向对象设计是一种适用于非常广泛问题的方法论。现实世界中许多问题的解决方案很容易被描述为相互协作的对象组。这个简单单一的理念促进了设计的简洁性、设计和代码的复用性，以及
    Parnas 在其关于模块分解的论文中所倡导的封装和信息隐藏思想。^(¹⁸¹) 它并非解决所有问题的正确方法，例如通信协议实现等问题，但它为许多其他问题开辟了一个全新且更优解决方案的世界，并缩短了现实世界问题描述与最终代码之间的“认知距离”。

