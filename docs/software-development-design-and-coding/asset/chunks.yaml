    Here are some specifics to notice about how the Factory Method Pattern works in
    this case:


    *   The factory method `makeTaxObject()` encapsulates the creation of the `SalesTax`
    object. Your driver just tells the factory which location to use.

    *   The `SalesTax` interface provides the interface for the subclasses to create
    the actual objects.

    *   The `SalesTaxFactory` concrete class actually creates the objects by implementing
    the `makeTaxObject()` method.

    *   This leaves the `SalesTax` classes alone and makes it easier for the `SalesTaxDriver`
    to create new objects.

    *   The `SalesTaxDriver` class only deals with `SalesTax` objects. It doesn’t
    have to know anything about particular sales tax rates. The concrete `SalesTax`
    objects implement the methods from the `SalesTax` abstract class and the `SalesTaxDriver`
    just uses them regardless of which type of `SalesTax` object you’ve created.

    *   It also means that you can change the implementation of a particular type
    of `SalesTax` object without changing either the interface or the `SalesTaxDriver`.


    There is another variation of the Factory Method Pattern. Consider that in your
    example you only ever need a single factory. In that case, you could use the Singleton
    Pattern to generate the factory. This would change your `SalesTaxFactory` and
    `SalesTaxDriver` classes. They would end up as follows:


    ```java

