- fmt: "### Non-Technical Difficulties\n\nFrom a developer’s perspective, non-technical\
    \ difficulties with requirements are the worst ones you will encounter. Ideally,\
    \ managers should shield developers from ever dealing with non-technical difficulties.\
    \ Examples of non-technical difficulties are often somewhat political. For instance,\
    \ one group of customers in an organization has a different view of the program\
    \ requirements than another group. Or worse, one manager has a different view\
    \ than another manager. The program being developed will reduce the influence\
    \ of one department by automating a function where they used to be the sole source\
    \ of expertise. The program will distribute data processing across several departments\
    \ where it was once centralized in a single department. The list goes on and on.\
    \ The best advice for non-technical difficulties with requirements digging is\
    \ to run away—quickly. Let your vice-president deal with it; that’s why they are\
    \ paid the big bucks.\n\n### Analyzing the Requirements\n\nOnce you’ve written\
    \ down a set of requirements, you need to make sure that these are the right requirements\
    \ for the program; you need to *analyze* them. Analysis has three basic parts.\n\
    \nFirst, you *categorize* the requirements and organize them into related areas.\
    \ This will help the designers a lot.\n\nSecond, you or, better yet, the customer\
    \ *prioritizes* them. This is critical because you won’t be able to implement\
    \ all the requirements in the first product release (trust us, you won’t), so\
    \ this prioritized list will be what you’ll use to set the targets for each interim\
    \ release.\n\nLastly, you need to *examine* each requirement in relation to all\
    \ the others, to make sure they fit into a coherent whole. Ask yourself a series\
    \ of questions:\n\n1.  Is each requirement *consistent* with the overall project\
    \ objective? If your program is supposed to sell your users books, it doesn’t\
    \ also have to allow book binding services.\n\n2.  Is this requirement *really\
    \ necessary*? Have you added something that can be removed without impairing the\
    \ essential functionality of the program? If your first release is supposed to\
    \ allow users to buy books, then you probably don’t need to also allow lawn mowers.\n\
    \n3.  Is this requirement *testable*? This is probably a key question when you’re\
    \ doing requirements analysis. If you cannot figure out how to test a requirement,\
    \ then you cannot know that you’ve implemented it correctly or that you are finished.\
    \ All requirements *must* be testable or else they are not requirements. In most\
    \ agile methodologies, the rule is to write the test first and then write the\
    \ code (i.e., test-driven development).\n\n4.  Is this requirement *doable* in\
    \ the technical environment you’ve got to work in? This question normally applies\
    \ to those non-functional requirements mentioned previously. Are your requirements\
    \ feasible given the particular target platform or set of hardware constraints\
    \ you must work under for this project? For example, if your target platform is\
    \ a Macintosh running OS X, a requirement that the `DirectX` graphics library\
    \ be used is not doable because `DirectX` is a Windows-only library.\n\n5.  Is\
    \ this requirement *unambiguous*? Your requirements need to be as precise as possible\
    \ (refer to the previous testable questions) because as sure as you’re sitting\
    \ here reading this, someone will misinterpret an ambiguous requirement and you’ll\
    \ discover the error the day after you ship. Your requirements should never contain\
    \ the words “or” or “may.”\n\n### Conclusion\n\nOnce you’re done with your functional\
    \ specification or set of user stories and the analysis of your requirements,\
    \ you’re done with the requirements phase, right? Well, of course not. As we’ve\
    \ said before, requirements change, so relax; don’t obsess about the requirements;\
    \ do the best you can to get an initial list of clear, testable requirements;\
    \ and then move on to design. You’ll always come back here later.\n\n# Part II:\
    \ Design Practices\n\n# 7. Software Architecture\n\n> *What do we mean by a software\
    \ architecture? To me the term architecture conveys a notion of the core elements\
    \ of the system, the pieces that are difficult to change. A foundation on which\
    \ the rest must be built.*\n> \n> —Martin Fowler^([^(141)](#fn141))\n\nOnce you\
    \ have an idea of *what* you’re going to build, then you can start thinking about\
    \ *how* you’re going to build it. Of course, you’ve likely already been thinking\
    \ about this from the very first requirement, but now you are finally ready to\
    \ meaningfully delve into design.\n\nThere are really two levels of software design.\
    \ The level we typically operate on when writing programs is called *detailed\
    \ design*. What operations do we need? What data structures? What algorithms are\
    \ we using? How is the database going to be organized? What does the user interface\
    \ look like? What are the calling sequences? These are all very detailed questions\
    \ that need to be answered before you can really get on with the detailed work\
    \ of coding (well, sort of—we’ll get to that later).\n\nThe second level is *architectural\
    \ design*. What major components does your software need? How will these components\
    \ interact? How will the system interact with its environment? Here you are designing\
    \ the structure of the entire system, black-boxing (temporarily) the internal\
    \ details of each component. As Fowler describes in this chapter’s opening quote,\
    \ you need the foundation before you can build the rest of the structure. *Software\
    \ architecture* is a set of ideas that tells you which foundation is right for\
    \ your program.\n\nThe idea of software architecture began as a response to the\
    \ increasing size and complexity of programs. As Garlan and Shaw put it in their\
    \ seminal document on software architecture, “As the size and complexity of software\
    \ systems increases, the design problem goes beyond the algorithms and data structures\
    \ of the computation: designing and specifying the overall system structure emerges\
    \ as a new kind of problem.... This is the software architecture level of design.”^([^(142)](#fn142))\
    \ However, is it really the case that *all* programs of any size and complexity\
    \ have an architecture? Yes, though for larger programs you need to be more intentional\
    \ about your thinking about the architecture. You must ensure you have the right\
    \ set of architectural patterns incorporated into your design in order to form\
    \ a solid foundation for your system. Mistakes here are costly because architectural\
    \ features are so fundamental to the structure of the program that it becomes\
    \ much harder to change things at the architectural level once the program has\
    \ been written.\n\nWhenever a software architect starts thinking about an architecture\
    \ for a program, they usually start by drawing pictures. Diagrams of the architecture\
    \ allow people to see the structure and framework of the program much more unambiguously\
    \ than via text. Software architectures are normally represented as black box\
    \ *graphs,* where graph nodes are *computational structures* and the graph edges\
    \ are *communication conduits* between the structures. The conduits can represent\
    \ data flow, object message passing, or procedure calls. Notations of this type\
    \ vary and there are several standard notations, the most popular being the Unified\
    \ Modeling Language (`UML`).\n\nA particular architectural style is a pattern\
    \ that can represent a set of similar structures. There are many different styles\
    \ of software architecture, and in any given project you’ll probably use more\
    \ than one. As you’ll see, different types of programs in different domains will\
    \ lead us to different architectural styles or *architectural patterns.* Let’s\
    \ look at several different common architectural patterns (which share many characteristics\
    \ with *design patterns* you’ll see in the next chapter)."
