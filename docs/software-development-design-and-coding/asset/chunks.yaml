  trans: '

    ## 架构模式：主程序-子程序


    最传统、最古老的架构模式是*主程序-子程序模式*。虽然它源自尼克劳斯·维尔特 1971 年的论文《通过逐步细化进行程序开发》^(¹⁴³)，但维尔特只是第一个正式定义了这种自然导向*主程序-子程序模式*的自顶向下问题分解方法论。


    其核心思想是：从一个大型问题入手，尝试将其分解为若干个较小的、半独立的问题或原问题的片段。例如，几乎所有适合通过自顶向下分解来解决的问题，都可以立即划分为三个部分：输入处理、解决方案计算和输出处理。一旦将问题分解为多个片段，就选取其中一个片段继续分解，同时将其他所有片段暂时搁置，这类似于深度优先搜索。最终，你会得到一个解决方案显而易见的极小问题；此时便是编写代码的时机。因此，我们是从上到下分解问题，再从下到上编写解决方案代码，尽管存在许多变体。


    图 7-1 给出了*主程序-子程序模式*如何工作的示例。我们将在第 9 章更详细地讨论自顶向下问题分解。


    ![](img/270563_3_En_7_Fig1_HTML.jpg)


    一个树状图描绘了主程序分支为子程序 1、子程序 2 和子程序 3。子程序 1 分支为子程序 1.1 和子程序 1.2。子程序 3 分支为子程序 1.2 和子程序
    3.1。


    图 7-1


    主程序-子程序模式示例


    维尔特的论文就通过逐步细化进行编程得出了以下四个结论：


    1.  *程序构建由一系列细化步骤组成。在每一步中，一个给定的任务被分解为若干个子任务。任务描述的每一次细化都可能伴随着数据描述的细化，数据构成了子任务之间通信的手段……*


    2.  *以这种方式获得的模块化程度，将决定程序适应目的变更或扩展的难易程度……*


    3.  *在逐步细化的过程中，应尽可能长时间地使用对当前问题而言自然的表示法……每一次细化都意味着基于一组设计标准做出的一系列设计决策……*


    4.  *即使是一个简短程序的开发，其详细阐述也会形成一个长篇故事，这表明仔细编程并非易事。*


    ## 架构模式：管道-过滤器


    在管道-过滤器风格的架构中，计算组件被称为*过滤器*，它们充当转换器，接收输入，根据一个或多个算法进行转换，然后将结果输出到通信管道。输入和输出管道被称为*管道*。


    典型的管道-过滤器架构是线性的，如图 7-2 中的示例所示。


    ![](img/270563_3_En_7_Fig2_HTML.jpg)


    一个流程图描绘了管道-过滤器架构模式。它展示了一组标有“管道”的向右箭头，依次穿过三个相邻的标记为“过滤器”的方块。


    图 7-2


    管道-过滤器架构模式示例


    过滤器必须是独立的组件。这正是管道-过滤器架构的魅力之一：以不同顺序连接独立的过滤器会产生不同的结果。管道-过滤器架构风格的经典示例是 Unix shell，其中有大量的小程序，它们通常只做一件事，并且可以通过
    Unix 管道机制链接在一起。乔恩·本特利的著作《编程珠玑》^(¹⁴⁴)中的一个例子展示了管道-过滤器的工作原理：


    *问题*：给定一个英语单词词典，找出词典中所有的变位词。即，找出所有互为字母排列的单词。例如，“pots”、“stop”和“spot”互为变位词。


    那么，我们知道什么？所有变位词都有相同的字母，并且每个单词的字母数量相同。这为我们寻找变位词的方法提供了线索：如果我们对每个单词的字母进行排序，最终会得到一个字符串，其中包含该单词所有字母并按字母顺序排列。我们称之为创建单词的*签名*。让我们分解解决方案：


    1.  通过对列表中的每个单词的字母进行排序，为每个单词创建一个签名；将签名和单词作为一对保存。


    2.  根据签名对生成的签名-单词对列表进行排序；现在所有变位词应该会聚集在一起，因为它们的签名是相同的。


    3.  每当签名发生变化时，开始一个新的分组，将所有的变位词组（移除签名）分别输出到不同的行。


    这个例子具备标准管道-过滤器架构的所有特征：对其输入数据执行转换的独立计算组件，以及将数据从一个组件的输出传输到下一个组件输入的通信管道。该解决方案的管道-过滤器模式在
    Unix 术语中可以更清晰地表示：


    **sign** <`dictionary.txt |` **sort** `|` **squash** `>anagrams.txt`


    其中，`sign`是我们用来执行步骤 1 的过滤器，输入文件为`dictionary.txt`。然后`sign`输出一个签名及其关联单词的列表，该列表通过管道传递给
    Unix 的`sort`工具（我们无需编写这个工具），它会按每行的第一个字段（默认行为）对列表进行排序，而第一个字段恰好是每个单词的签名。然后它将排序后的列表输出到下一个管道。接着，`squash`从传入的管道中获取排序后的列表，并通过将所有具有相同签名的单词放在同一行来压缩它，同时移除签名。这个最终的列表通过最后一个管道（这次是
    Unix I/O 重定向）发送到名为`anagrams.txt`的输出文件。


    请注意，并非所有应用程序都应使用管道-过滤器架构。例如，它不太适用于交互式应用程序或响应事件或中断的应用程序。因此，让我们看看更多的架构风格。

    '
- fmt: '# Architectural Pattern: Object-Oriented Model-View-Controller (MVC)


    The advent of object-oriented analysis, design, and programming in the early 1980s
    (well, it really started in the ‘60s, but no one was paying attention) brought
    with it a number of architectural and design patterns. We’ll focus on one object-oriented
    architectural pattern here and save discussion of the rest to the chapter on design
    patterns.


    The *Model-View-Controller* (MVC) architectural pattern is a way of splitting
    an application, or even just a piece of an application’s interface, into three
    parts: the model, the view, and the controller. MVC was originally developed to
    map the traditional input, processing, and output roles of many programs into
    the GUI realm:


    Input ➤ Processing ➤ Output


    Controller ➤ Model ➤ View


    The user input, the modeling of the external world, and the visual feedback to
    the user are separated and handled by model, view, and controller *objects,* as
    shown in Figure [7-3](#270563_3_En_7_Chapter.xhtml#Fig3).


    ![](images/270563_3_En_7_Chapter/270563_3_En_7_Fig3_HTML.jpg)


    A block diagram depicts the interaction between 3 blocks marked as view, model,
    and controller. There is a one-way interaction between the controller and the
    model.


    Figure 7-3


    The Model-View-Controller architecture


    - The *controller* interprets mouse and keyboard inputs from the user and maps
    these user actions into commands that are sent to the model and/or view to effect
    the appropriate change. The controller handles input.


    - The *model* manages one or more data elements, responds to queries about its
    state, and responds to instructions to change state. The model knows what the
    application is supposed to do and is the main computational structure of the architecture;
    it *models* the problem you’re trying to solve. The model knows the rules.


    - The *view* or *viewport* manages a rectangular area of the display and is responsible
    for presenting data to the user through a combination of graphics and text. The
    view doesn’t know anything about what the program is actually doing; all it does
    is take instructions from the controller and data from the model and displays
    them. It communicates back to the model and controller to report status. The view
    handles the output.


    The flow of an MVC program typically looks like this:


    - The *user* interacts with the user interface (e.g., the user presses a button)
    and the controller handles the input event from the user interface, often via
    a registered handler or callback. The user interface is displayed by the view
    but controlled by the controller. Oddly enough, the controller has no direct knowledge
    of the view as an object; it just sends messages when it needs something on the
    screen updated.


    - The *controller* accesses the model, possibly updating it in a way appropriate
    to the user’s action (e.g., the controller causes the user’s shopping cart to
    be updated by the model). This usually causes a change in the model’s state as
    well as in its data.


    - A *view* uses the model to generate an appropriate user interface (e.g., the
    view produces a screen listing the shopping cart contents). The view gets its
    own data from the model. The model has no direct knowledge of the view. It just
    responds to requests for data from whomever and to requests for transforming data
    from the controller.


    - The controller, as the user interface manager, waits for further user interactions,
    which begins the cycle anew.


    The main idea here is separation of concerns—and code. The objective is to separate
    how your program works from what it is displaying and how it gets its input data.
    This is classic object-oriented programming; you create objects that hide their
    data and hide how they manipulate that data, and then just present a simple interface
    to the world to interact with other objects. You’ll see this again in Chapter
    [11](#270563_3_En_11_Chapter.xhtml).


    ## Object-Oriented Architecture: An MVC Example—Let’s Hunt!


    A classic example of a program that uses the MVC architectural pattern is the
    Nifty Assignment presented by Dr. David Matuszek at the 2004 Association for Computing
    Machinery SIGCSE Technical Symposium.^([^(145)](#fn145))


    ### The Problem


    The program is a rudimentary simulation of a fox trying to find the rabbit in
    a grid environment, while the rabbit is trying to get away. There are bushes that
    the rabbit can hide behind and there are some restrictions on movement.


    Figure [7-4](#270563_3_En_7_Chapter.xhtml#Fig4) is a typical picture of the game
    in action.


    ![](images/270563_3_En_7_Chapter/270563_3_En_7_Fig4_HTML.jpg)


    A screenshot exhibits the interface of the fox and rabbit hunt instance. It denotes
    a set of patterns distributed randomly and a circular figure toward the right.
    The buttons for speed, step, run, reset, and replay are provided at the bottom.
    A text at the top indicates the step number 43.


    Figure 7-4


    A typical fox and rabbit hunt instance


    The fox is the large red dot, the rabbit is the small brown dot, and the bushes
    are the thick green crosses.


    The objective of the programming assignment is to make the rabbit smarter so it
    can escape from the fox. Our focus, however, is solely on how the program is organized.
    Figure [7-5](#270563_3_En_7_Chapter.xhtml#Fig5) shows the organization of the
    program using an object diagram taken from the BlueJ IDE. The key parts of the
    program are the three classes of objects (`Bush`, `Fox`, `Rabbit`), as well as
    the model, view, and controller components.


    ![](images/270563_3_En_7_Chapter/270563_3_En_7_Fig5_HTML.jpg)


    A block diagram represents the interaction between the blocks labeled rabbit hunt,
    grader, controller, view model, rabbit, fox, animal, and bush.


    Figure 7-5


    The fox and rabbit hunt class structure


    ### The MVC Model


    The model represents the rules of the game. It does all the computation, all the
    work of deciding whose turn it is, what happens during each turn, and whether
    anyone has won. The model is strictly internal and has practically nothing to
    do with the other parts of the program.


    The model portion of this program is actually composed of five classes: `Model`
    (the “main” model class), `Animal`, `Rabbit`, `Fox`, and `Bush`. (`Rabbit` and
    `Fox` are subclasses of `Animal`, as you can see from the solid arrows in the
    Figure [7-5](#270563_3_En_7_Chapter.xhtml#Fig5) diagram). This is the part of
    the program that you really need to understand.


    The `RabbitHunt` class just creates model, view, and controller objects, and turns
    control over to the controller object. The controller object starts the model
    object and then waits for the user to press a button. When a button is pressed,
    a message is sent to the model object, which decides what to do.


    The model object:


    - places the fox, rabbit, and bushes in the field;

    - gives the rabbit and the fox each a chance to move (one moves, then the other;
    they don’t both move at the same time);

    - tells the view to display the result of these two moves; and

    - determines which animal won.


    ### The MVC View


    The view displays what is going on. It puts an image on the screen so the user
    can see what is happening. The view is completely passive; it does not affect
    the hunt in any way, it’s just a news reporter that gives you a (partial) picture
    of what is happening inside the model.'
  raw: '## Architectural Pattern: Object-Oriented Model-View-Controller (MVC)


    The advent of object-oriented analysis, design, and programming in the early 1980s
    (well, it really started in the ‘60s, but no one was paying attention) brought
    with it a number of architectural and design patterns. We’ll focus on one object-oriented
    architectural pattern here and save discussion of the rest to the chapter on design
    patterns.


    The *Model-View-Controller* (MVC) architectural pattern is a way of splitting
    an application, or even just a piece of an application’s interface, into three
    parts: the model, the view, and the controller. MVC was originally developed to
    map the traditional input, processing, and output roles of many programs into
    the GUI realm:


    Input ➤ Processing ➤ Output


    Controller ➤ Model ➤ View


    The user input, the modeling of the external world, and the visual feedback to
    the user are separated and handled by model, view, and controller *objects,* as
    shown in Figure [7-3](#270563_3_En_7_Chapter.xhtml#Fig3).


    ![](images/270563_3_En_7_Chapter/270563_3_En_7_Fig3_HTML.jpg)


    A block diagram depicts the interaction between 3 blocks marked as view, model,
    and controller. There is a one-way interaction between the controller and the
    model.


    Figure 7-3


    The Model-View-Controller architecture


    *   The *controller* interprets mouse and keyboard inputs from the user and maps
    these user actions into commands that are sent to the model and/or view to effect
    the appropriate change. The controller handles input.


    *   The *model* manages one or more data elements, responds to queries about its
    state, and responds to instructions to change state. The model knows what the
    application is supposed to do and is the main computational structure of the architecture;
    it *models* the problem you’re trying to solve. The model knows the rules.


    *   The *view* or *viewport* manages a rectangular area of the display and is
    responsible for presenting data to the user through a combination of graphics
    and text. The view doesn’t know anything about what the program is actually doing;
    all it does is take instructions from the controller and data from the model and
    displays them. It communicates back to the model and controller to report status.
    The view handles the output.


    The flow of an MVC program typically looks like this:


    *   The *user* interacts with the user interface (e.g., the user presses a button)
    and the controller handles the input event from the user interface, often via
    a registered handler or callback. The user interface is displayed by the view
    but controlled by the controller. Oddly enough, the controller has no direct knowledge
    of the view as an object; it just sends messages when it needs something on the
    screen updated.


    *   The *controller* accesses the model, possibly updating it in a way appropriate
    to the user’s action (e.g., the controller causes the user’s shopping cart to
    be updated by the model). This usually causes a change in the model’s state as
    well as in its data.


    *   A *view* uses the model to generate an appropriate user interface (e.g., the
    view produces a screen listing the shopping cart contents). The view gets its
    own data from the model. The model has no direct knowledge of the view. It just
    responds to requests for data from whomever and to requests for transforming data
    from the controller.


    *   The controller, as the user interface manager, waits for further user interactions,
    which begins the cycle anew.


    The main idea here is separation of concerns—and code. The objective is to separate
    how your program works from what it is displaying and how it gets its input data.
    This is classic object-oriented programming; you create objects that hide their
    data and hide how they manipulate that data, and then just present a simple interface
    to the world to interact with other objects. You’ll see this again in Chapter
    [11](#270563_3_En_11_Chapter.xhtml).


    ### Object-Oriented Architecture:


