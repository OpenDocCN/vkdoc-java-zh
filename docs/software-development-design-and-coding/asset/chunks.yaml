    \n*   What are the next steps?"
  trans: "\n布琳·布朗建议我们都要准备好“开诚布公”：“*所谓开诚布公，是指一种讨论、对话或会议，其核心在于承诺坦然面对脆弱、保持好奇与慷慨、坚持在问题识别与解决的混乱中间地带工作、必要时暂停并折返、无畏地承担自身责任，并且，正如心理学家哈里特·勒纳所教导的，要以我们渴望被倾听的同等热情去倾听。*”^(⁷³)\n\
    \n开发团队不可避免地会遇到任务冲突和人际冲突。*任务冲突*是指理解上的差异、对采用何种方法的不同意见、对风险和成本的评估分歧等。解决任务冲突有助于通过集思广益、弥补弱点或澄清需求来改进产品。*人际冲突*则涉及沟通风格、文化背景、神经多样性、个性、边界、触发因素等方面的差异。人际冲突会极大地消耗开发者的精力。解决人际冲突能够改善团队合作、工作满意度和生产力。\n\
    \n冲突对成长而言价值连城，但绝不能让它们恶化。及时主动地解决是关键，这需要一种文化：欢迎艰难的对话，赞扬对话所需的勇气，并帮助每个人掌握必要的技能，以便沟通、倾听和协作，共同寻找新的共识。人际间的紧张关系需要被摆到台面上并及时解决，以防止关系恶化。团队可能需要外部资源、信息或公正的仲裁来化解冲突，防止怨恨像滚雪球一样扩大。那么，我们如何才能建设性地解决冲突呢？一系列*有技巧的分歧*技术已被提出^(⁷⁴)：\n\
    \n*   批评想法，而非针对个人。\n*   将自我价值与对你想法的批评区分开。\n*   专注于团队获胜，而非个人。\n*   鼓励每个人都去了解情况并参与讨论。\n\
    *   倾听所有想法，无论你个人观点如何。\n*   复述观点以确保共同理解。\n*   清晰陈述所有论点，阐明差异，然后通过共识点进行整合。\n*   尝试理解对立的观点。\n\
    *   面对证据时更新自己的观点。\n*   强调理性和数据。\n*   遵循*冲突的黄金法则*：己所不欲，勿施于人。\n\n职场中的层级关系也必然会影响冲突。以下建议旨在帮助职位较高的人士进行有效的冲突管理^(⁷⁵)：\n\
    \n*   腾出时间解决人际冲突。要认识到冲突不会自行消失，拖延只会带来危害。\n*   判断冲突是需要与个人、小组、整个团队，还是上述组合来共同解决。\n\
    *   为避免盲目附和并鼓励讨论，不要在对话初期就强加个人观点。\n*   鼓励团队在小的担忧和摩擦演变成冲突之前就将其摆上台面。\n*   寻找机会定下基调，并示范你希望从团队身上看到的行为（例如，感谢他人勇于发言、建设性地提出异议、承认错误等）。\n\
    *   通过讨论某些方法为何在特定情境下可能行不通（而非客观错误），帮助建设性地构建和聚焦分歧。\n*   花时间解释你的决策，并尽可能让团队参与决策过程。\n\
    \n### 软技能开发：团队协作工件\n\n具备“软技能意识”能改善团队协作和团队产出。但我们如何为所有这些实践腾出时间？如何持续关注团队协作和文化？如何确保冲突在腐蚀团队内部之前得到解决？为了保持足够近的距离以便关注，同时又保持足够远的距离以给予开发一些创造空间，可以在开发流程中添加一些工件。\n\
    \n让我们看看过去我们认为对开发者团队有帮助的一些工件和实践：^(⁷⁶)\n\n*   从个人且保密的*评估*开始，以确定每个人的需求、实践和个人特质，从而帮助组建有效平衡的团队、建立有益的团队协议，并实施适当的培训课程。\n\
    *   让团队成员定期（例如，每个开发迭代一次）填写*自我和同伴评估*（个人、保密，仅用于帮助团队协作）：这是一个精简的表格，用于主观反思每个开发者自身的表现、态度和贡献，以及对同伴表现、态度和贡献的看法。为反思留出明确的空间，对于开始全面了解团队协作情况并及时干预至关重要。\n\
    *   *玩乐*是创造性思维的精髓。拥有分享表情包或非项目新闻的公共频道，有助于创造一个更人性化、更有活力的空间，而不是只有工作没有娱乐。创造大大小小的团队建设机会。即使是喝杯咖啡、聊聊天充充电的空间，也能将艰难而压力重重的一天转变为值得且充实的共同经历，从而拉近团队距离。大型活动能带来更大的兴奋感，并创造共同的回忆。\n\
    *   将错误和学习常态化，无论是在工作的技术方面还是非技术方面。不要搞突然袭击，也不要针对个人。将*例行检查*作为工作流程的一部分，以创造分享机会，并帮助每个人做好接受反馈的准备。如果情况敏感，请提前告知队友，你们需要带着同理心和勇气一起克服不适感。\n\
    *   建立*开放的多向沟通渠道*，例如简短的定期更新、面对面的团队工作会议、共享知识库，以及便捷的按需同步和异步沟通渠道。\n*   填写包含最低要求的*团队契约*，团队成员可以在此基础上进行扩展，以最好地适应他们共同的舒适度。契约应涵盖团队会议频率（例如，每日站会的时间和地点）、检查和更新异步沟通渠道的频率（例如，每天检查一次\
    \ Slack 频道，每次工作结束后更新敏捷看板）、无法联系的及时通知（例如，迟到时告知团队）、所需技术（例如，git）、协议（例如，遵循 git flow）以及可交付成果（例如，站会报告和每两周一次的最小可行产品演示）。契约有助于为团队明确设定期望和责任，并让主管了解团队的实践情况。\n\
    \n将团队协作本身视为一个敏捷开发过程是很有帮助的：团队协作立即开始，频繁检查，并根据需要进行调整。事实上，如果你已经在使用敏捷方法论，敏捷工件可以直接用于监控团队协作：\n\
    \n*   状态*评审/演示/展示*是你审查产品状态的方式。在报告状态时，要清晰说明项目当前所处的位置以及在下次状态报告之前的发展方向：\n    *  \
    \ 自上次评审/演示/迭代以来取得了哪些成果？\n    *   本次迭代原计划的工作中，哪些尚未完成？\n    *   下一步计划是什么？\n"
- fmt: "注意观察评审会和每日站会（参见前一章）是如何通过讨论成就、挫折和下一步计划来审视项目状态的。评审会覆盖更长的时间跨度（通常是一个开发迭代周期），并邀请产品直接开发人员之外的受众（如主管、产品负责人和客户）参与，以提供更新并征求反馈。你不应粉饰、找借口或掩盖问题。要诚实地面对问题以及你在进度中的位置。虽然没人喜欢报告问题，也没人喜欢被报告问题，但这种矛盾必须被接纳并及时处理。缓解问题的最佳方式是让其他人参与帮助寻找解决方案，维护一种信任与安全的氛围。确保你了解你的受众，以便根据他们的专业水平以及与你工作的关联度（经理、客户和最终用户希望看到关于项目及其状态的不同内容）来调整内容。对已完成工作进行有代表性的评审，将让你从利益相关者那里收集到最相关、最有帮助的反馈。\n\
    \n*   **回顾会议**是团队审查、评估和修改工作流程的方式。回顾会议通常在产品发布之后或每个主要迭代周期之后（例如，在每个迭代或冲刺之后）举行，因此你可以将其作为内置机会，观察团队如何反思自身内部运作，并提供支持、澄清或外部视角。回顾会议的目标是确定当前的流程和实践是否服务于整个团队以及每个团队成员的需求：\n\
    \    *   我们的团队合作中哪些方面做得好？（我们是否按时完成了进度？我们是否有效沟通和协作？是否每个人都感到被支持和尊重？）\n    *   我们的团队合作中哪些方面出了问题？（团队成员是否偏离了预期实践？我们是否在截止日期前才合并代码？我们是否因为未明确划分每个人的任务而处理了相同的功能？我们是否不得不加班？）\n\
    \    *   我们应如何更新我们的流程、态度或工作环境以向前发展？\n\n这是软体开发中最关键的会议，必须得到开发者和主管双方的时间、关注和尊重。想想我们常被教导要抛开个人问题，专注于手头的工作。讨论手头任务之外的任何事情常常不被鼓励，甚至被认为不专业。但如果我们不能讨论个人需求、情况和情绪，我们又该如何讨论仓库中最后一刻的合并冲突而不制造紧张和指责呢？要有效地修改我们共享的流程，我们必须理解我们新兴共享背景的全貌，而人正是这个背景的核心。假设我们在演示前一晚深夜合并了代码。演示进行得很糟糕，由于匆忙解决的合并冲突导致功能缺失，每个人都又累又沮丧，并且矛头指向了一位开发者。斥责那位开发者，并威胁如果再次发生将面临严重后果，这看起来似乎合理且高效。但这不是正确的方式。这位开发者是否在挣扎并害怕寻求帮助？害怕显得准备不足或不够格？或者他们一直感到孤立无援？又或者他们曾试图表达需要帮助但无人响应？团队是否跳过了每日站会而错过了这个信号？或者开发者的功能在最终调整时发生了不可恢复的故障？我们的开发流程是否未能恰当地鼓励小增量提交和合并，并为处理意外情况留出足够时间？有意义的解决方案需要时间和关怀，才能就产品本身以及产品创造者需要改进的领域进行富有成效的讨论。\n\
    \n*   **事后剖析**（团队层面和个人层面）是一种更大型的*回顾会议*，允许开发者反思整个项目、挑战、经验教训和认知。需要考虑的一些问题包括：\n \
    \   *   项目的目标是什么？它们实现了吗？\n    *   项目中哪些方面进展顺利？哪些不顺利？\n    *   团队中哪些方面进展顺利？哪些不顺利？\n\
    \    *   团队在整个项目过程中学到的主要经验教训是什么？\n    *   如果有机会重做这个项目，团队会有什么不同的做法？\n\n之后，团队成员应完成个人事后剖析，每个人都能借此机会进一步反思自己的挑战和经验教训：\n\
    \    *   我个人的项目目标是什么？它们实现了吗？\n    *   就项目而言，哪些方面对我来说进展顺利？哪些不顺利？\n    *   就团队而言，哪些方面对我来说进展顺利？哪些不顺利？\n\
    \    *   我在整个项目过程中学到的主要经验教训是什么？\n    *   如果有机会重做这次合作，我会有什么不同的做法？\n\n开发者常常将事后剖析视为例行公事，他们渴望跳入下一个创意冒险，而不是填写“文书工作”。慢下来；这不是无谓的忙碌。在项目之间抓住反思的机会是开发者成长过程中最重要的实践之一。研究表明，反思是将经验转化为有意义学习的关键。^([^(77)](#fn77))\
    \ 所以回想一下：收集所发生的事情（技术层面和人际层面），从你未来的视角审视它，并形成关于什么赋予了你力量、什么阻碍了你、以及你计划如何将新知识用于未来的新见解。恭喜，你升级了！\n\
    \n## 结论\n\n在本章中，我们讨论了如何通过关注产品以及产品创造者的需求来管理项目。为了预测和支持产品的需求，我们考虑了组织选项、分析风险、评估资源需求、估算进度，并规划了不可避免的缺陷管理。为了预测和支持共同创造产品的人们的需求，我们首先考虑了一些可能阻碍团队合作的实践。然后，我们讨论了如何通过支持个体开发者、创建我们可以共同繁荣的安全文化、以及将冲突视为成长的机会来成为软体开发者。最后，我们介绍了一系列实践和工件，可以帮助我们监控团队中复杂的新兴动态。关于良好团队合作的进一步讨论和示例，请考虑阅读\
    \ Scott Tannenbaum 和 Eduardo Salas 所著的《*Teams That Work*》。^([^(78)](#fn78))\n\n\
    # 4. 伦理与专业实践\n\n> *伦理是知道你有权做的事与应该做的事之间的区别。*\n> \n> —**波特·斯图尔特**\n\n我们将继续探索软件开发，花一些时间讨论伦理与专业实践。也就是说，在面临伦理困境的情况下，你作为计算专业人士应该如何行事。我们将讨论什么是伦理以及它如何应用于软件行业，存在哪些伦理理论可以为我们提供一些工具，什么是伦理论证或讨论，以及如何评估伦理情境。最后，我们将通过一些案例研究，让你了解这些评估技术将如何运作。"
  raw: "Notice how reviews and stand-up meetings (see previous chapter) both examine\
    \ the project status by discussing accomplishments, setbacks, and next steps.\
    \ Reviews cover a larger timespan (typically a single development iteration) and\
    \ engage an audience outside of the immediate developers working on the product\
    \ (such as supervisors, product owners, and clients) to provide updates and request\
    \ feedback. You should not embellish, make excuses, nor obscure issues. Be honest\
    \ about problems and where you are in the schedule. While no one likes to report\
    \ problems, and no one likes to have problems reported to them, this conflict\
    \ must be embraced and handled in a timely manner. The best way to mitigate the\
    \ problem is to get others involved in helping to find a solution, maintaining\
    \ a culture of trust and safety. Make sure you know your audience so you can tailor\
    \ the content to their level of expertise and their involvement in your work (managers,\
    \ clients, and end users will want to be shown different things about the project\
    \ and its status). A representative review of the completed work will allow you\
    \ to gather the most relevant and helpful feedback from stakeholders.\n\n*   *Retrospectives*\
    \ are how the team can review, assess, and modify the processes involved in their\
    \ work. Retrospectives are typically held either after the product release or\
    \ after each major iteration of the product (e.g., after every iteration or sprint),\
    \ so you can use them as built-in opportunities to see how the team is reflects\
    \ on their own innerworkings, as well as provide support, clarity, or an external\
    \ perspective. The goal of a retrospective is to determine whether current processes\
    \ and practices are serving the needs of the team as a whole, as well as the needs\
    \ of the individual teammates:\n    *   What went right in our teamwork? (Did\
    \ we meet our schedule? Did we communicate and collaborate effectively? Did everyone\
    \ feel supported and respected?)\n\n*   What went wrong in our teamwork? (Did\
    \ teammates deviate from expected practices? Did we merge too close to the deadline?\
    \ Did we work on the same features due to not clearly defining everyone’s tasks?\
    \ Did we have to work overtime?)\n\n*   How should we update our processes, attitudes,\
    \ or environment moving forward?\n\nThis is the most crucial meeting for Soft-Aware\
    \ development and must be afforded time, care, and respect from both developers\
    \ and supervisors. Consider how we are often taught to put aside personal issues\
    \ to keep our head in the game. It is frequently discouraged and even regarded\
    \ as unprofessional to discuss anything but the tasks at hand. But how do we discuss\
    \ having last-minute merge conflicts in our repository without creating tension\
    \ and blame if we are not to discuss personal needs, circumstances, and emotions?\
    \ To modify our shared processes effectively, we must understand the big picture\
    \ of our emergent shared context, and humans are at the very center of this context.\
    \ Say we merged late the night before a demo. The demo went poorly, features were\
    \ missing due to hastily resolved merge conflicts, everyone was tired and upset,\
    \ and fingers are pointing at one developer. It may seem reasonable and expeditious\
    \ to tell that developer off, threatening with dire consequences should this happen\
    \ again. This is not the way. Was the developer struggling and afraid of asking\
    \ for help? Of seeming unprepared or unqualified? Or had they been feeling isolated\
    \ in general? Or perhaps they’ve tried to express needing help and no one stepped\
    \ up? Had the team skipped stand-up meetings and missed this? Or perhaps the developer’s\
    \ feature just broke unrecoverably during final tweaks? Did our development process\
    \ fail to properly encourage small incremental commits and merging with enough\
    \ time to handle the unexpected? Meaningful resolutions require time and care\
    \ for fruitful discussion on areas of improvement, both in our products and in\
    \ the product creators.\n\n*   *Postmortems* (team-wide and individual) are a\
    \ bigger *retrospective* that allows developers to reflect on the project as a\
    \ whole, challenges, lessons, and perceptions. Some questions to consider are:\n\
    \    *   What were the project goals and were they achieved?\n\n*   What went\
    \ well in the project? What didn’t?\n\n*   What went well in the team? What didn’t?\n\
    \n*   What were the main lessons learned by the team over the course of the project?\n\
    \n*   What would the team do differently if given the chance to redo this project?\n\
    \nAfterward, the teammates should complete individual postmortems where they each\
    \ get a chance to further reflect on their own challenges and lessons:\n    *\
    \   What were my own goals for this project and were they achieved?\n\n*   What\
    \ went well for me with regards to the project? What didn’t?\n\n*   What went\
    \ well for me with regards to the team? What didn’t?\n\n*   What were the main\
    \ lessons I learned over the course of the project?\n\n*   What would I do differently\
    \ if given the chance to redo this collaboration?\n\nPostmortems are often treated\
    \ as perfunctory by developers, who are eager to jump into the next creative adventure\
    \ instead of filling out “paperwork.” Slow down; this is no busy-work. Taking\
    \ an opportunity to reflect between projects is one of the most crucial practices\
    \ in growing as a developer. Research shows that reflection is key for turning\
    \ our experiences into meaningful learning.^([^(77)](#fn77)) So think back: gather\
    \ up what happened (technically and interpersonally), look at it from your future\
    \ vantage point, and develop new insights about what empowered you, what held\
    \ you back, and how you plan to use this new knowledge going forward. Congratulations,\
    \ now you’ve leveled up!\n\n## Conclusion\n\nIn this chapter, we discuss how to\
    \ manage the project by looking at the needs of both the product and the people\
    \ creating the product. To anticipate and support the needs of the product, we\
    \ consider options for organization, analyze risks, consider resource requirements,\
    \ estimate schedules, and plan for the unavoidable management of defects. To anticipate\
    \ and support the needs of the people jointly creating the product, we first consider\
    \ some practices that may hinder teamwork. Then, we discuss how to become Soft-Aware\
    \ through supporting individual developers, creating a safe culture in which we\
    \ can thrive together, and welcoming conflict as opportunity for growth. Finally,\
    \ we present a series of practices and artifacts that can help us watch over the\
    \ complex emerging dynamics of our teams. For further discussion and examples\
    \ of what leads to good teamwork, consider reading *Teams That Work* by Scott\
    \ Tannenbaum and Eduardo Salas.^([^(78)](#fn78))\n\n# 4. Ethics and Professional\
    \ Practice\n\n> *Ethics is knowing the difference between what you have a right\
    \ to do and what is right to do.*\n> \n> —**Potter Stewart**\n\nWe will continue\
    \ our exploration of software development by spending some time talking about\
    \ ethics and professional practice. That is, how you should act as a computing\
    \ professional in situations that pose an ethical dilemma. We’ll talk about what\
    \ ethics is and how it applies to the software industry, what ethical theories\
    \ exist that will give us some tools, what an ethical argument or discussion is,\
    \ and how to evaluate ethical situations. Finally, we will go through some case\
    \ studies to give you an idea of how these evaluation techniques will work."
  trans: "\n请注意，评审会和每日站会（参见前一章）都是通过讨论成就、挫折和下一步计划来审视项目状态的。评审会覆盖的时间跨度更长（通常是一个开发迭代周期），并且会邀请产品直接开发人员之外的受众（如主管、产品负责人和客户）参与，以便他们了解进展并提出反馈。你不应粉饰、找借口或掩盖问题。要诚实地面对问题以及你在进度中的位置。虽然没人喜欢报告问题，也没人喜欢听别人报告问题，但这种矛盾必须被接纳并及时处理。缓解问题的最佳方式是让其他人参与进来，共同寻找解决方案，从而维护一种信任与安全的氛围。务必了解你的受众，以便根据他们的专业水平以及与你的工作关联度（管理者、客户和最终用户希望看到项目及其状态的不同方面）来调整内容。对已完成工作进行有代表性的评审，将让你能够从利益相关者那里收集到最相关、最有帮助的反馈。\n\
    \n*   *回顾会议*是团队用来审查、评估和修改其工作流程的方式。回顾会议通常在产品发布之后或产品的每个主要迭代周期之后（例如，在每个迭代或冲刺之后）举行，因此你可以将其作为内置的机会，来观察团队如何反思自身的内部运作，并提供支持、澄清或外部视角。回顾会议的目标是确定当前的流程和实践是否服务于整个团队以及每个团队成员的需求：\n\
    \    *   我们的团队协作中哪些方面做得好？（我们是否按时完成了计划？我们是否有效沟通和协作？是否每个人都感到被支持、被尊重？）\n\n*   我们的团队协作中哪些方面出了问题？（团队成员是否偏离了预期实践？我们是否在截止日期前才合并代码？我们是否因为任务分工不明确而做了重复的功能？我们是否不得不加班？）\n\
    \n*   展望未来，我们应该如何更新我们的流程、态度或工作环境？\n\n这是软体开发中最重要的会议，开发者和主管都必须为其投入时间、关怀和尊重。想想看，我们常常被教导要抛开个人问题，专注于手头的工作。讨论手头任务之外的任何事情常常不被鼓励，甚至被认为是不专业的。但是，如果我们不能讨论个人需求、情况和情绪，我们又该如何讨论仓库中最后一刻的合并冲突，而不制造紧张和指责呢？为了有效地修改我们共同的流程，我们必须理解我们共同情境的全貌，而人正是这个情境的核心。假设我们在演示前夜很晚才合并代码。演示进行得很糟糕，由于仓促解决的合并冲突导致功能缺失，每个人都又累又沮丧，并且矛头指向了一位开发者。训斥那位开发者，并威胁说如果再发生这种情况会有严重后果，这看起来似乎合理且高效。但这不是正确的方式。这位开发者是否在挣扎，并且害怕寻求帮助？害怕显得准备不足或能力不够？或者他们一直感到孤立无援？又或者他们曾试图表达需要帮助，但没有人站出来？团队是否跳过了每日站会而错过了这个信号？或者这位开发者的功能在最终调整时出现了无法恢复的故障？我们的开发流程是否未能恰当地鼓励小步增量提交和留出足够时间来处理意外情况？有意义的解决方案需要时间和关怀，才能就产品本身以及产品创造者需要改进的领域进行富有成效的讨论。\n\
    \n*   *事后剖析*（团队层面和个人层面）是一种规模更大的*回顾会议*，它让开发者能够反思整个项目、挑战、经验教训和感悟。需要考虑的一些问题包括：\n\
    \    *   项目的目标是什么，它们是否实现了？\n\n*   项目中哪些方面进展顺利？哪些不顺利？\n\n*   团队中哪些方面表现良好？哪些不理想？\n\
    \n*   团队在整个项目过程中学到的主要经验教训是什么？\n\n*   如果有机会重做这个项目，团队会做出哪些不同的选择？\n\n之后，团队成员应完成个人事后剖析，每个人都能借此机会进一步反思自己的挑战和经验教训：\n\
    \    *   我为自己设定的项目目标是什么，它们是否实现了？\n\n*   就项目而言，我哪些方面做得好？哪些不理想？\n\n*   就团队而言，我哪些方面做得好？哪些不理想？\n\
    \n*   我在整个项目过程中学到的主要经验教训是什么？\n\n*   如果有机会重新进行这次合作，我会做出哪些不同的选择？\n\n开发者常常将事后剖析视为敷衍了事的工作，他们渴望跳入下一个创意冒险，而不是填写“文书工作”。慢下来；这不是无谓的忙碌。在项目之间抓住机会进行反思，是开发者成长过程中最重要的实践之一。研究表明，反思是将我们的经历转化为有意义学习的关键。^(⁷⁷)\
    \ 所以，回想一下：收集所发生的事情（技术层面和人际层面），从你未来的视角审视它，并形成新的见解，了解是什么赋予了你力量，是什么阻碍了你，以及你计划如何运用这些新知识继续前进。恭喜你，现在你升级了！\n\
    \n## 结论\n\n在本章中，我们讨论了如何通过关注产品本身和产品创造者的需求来管理项目。为了预测和支持产品的需求，我们考虑了组织方案、分析风险、评估资源需求、估算进度，并规划了不可避免的缺陷管理。为了预测和支持共同创造产品的人员的需求，我们首先考虑了一些可能阻碍团队合作的实践。然后，我们讨论了如何通过支持个体开发者、创建让我们能够共同蓬勃发展的安全文化，以及将冲突视为成长的机会，来成为“软体”。最后，我们介绍了一系列实践和工件，它们可以帮助我们监控团队中复杂涌现的动态。关于良好团队合作的原因的进一步讨论和示例，请考虑阅读\
    \ Scott Tannenbaum 和 Eduardo Salas 合著的《高效团队》。^(⁷⁸)\n\n# 4. 伦理与职业实践\n\n> *伦理就是知道你有权做什么和做什么是正确的之间的区别。*\n\
    > \n> —**波特·斯图尔特**\n\n我们将花一些时间讨论伦理和职业实践，以此继续我们对软件开发的探索。也就是说，在面临伦理困境的情况下，你作为计算专业人士应该如何行事。我们将讨论什么是伦理，它如何应用于软件行业，存在哪些能为我们提供工具的伦理理论，什么是伦理论证或讨论，以及如何评估伦理情境。最后，我们将通过一些案例研究，让你了解这些评估技术将如何发挥作用。\n"
- fmt: '# Introduction to Ethics


    Simply put, *ethics* is the study of how to decide if something is *right or wrong*.
    For now, we are going to assume that everyone knows what *right* and *wrong* means,
    but as we’ll see in some of the examples, even this can be dicey at times. As
    for *computer ethics*, we’ll say it is those ethical issues that a computer professional
    (in our case, software developers) will face over the course of their profession,
    whether they are on the job or working on their own projects. Computer ethics
    includes figuring out how make critical decisions that can affect you and others
    (your company, clients, users, and even society as a whole), both personally and
    professionally.


    Many decisions made in your professional life will have an ethical component.
    What if you are asked to ship software that you think has a serious bug? What
    if your company is making or using illegal copies of software? What if your company
    is making it easy for others to infringe on the intellectual property of others
    (such as by releasing software that allows users to convert files that use digital
    rights management (DRM) protection into unprotected files)? What do you do if
    you believe you have a conflict of interest regarding a project you are working
    on? What do you do if you are offered a job developing software that you find
    morally objectionable? What if you discover that your company is keeping track
    of everyone’s web searches or keystrokes? How much data is fair to collection
    from web site visitors and should visitors be made aware of this data collection?
    Is it ethical to ask employees to stay late or work weekends to meet company deadlines?


    The ethical situations you will encounter in your professional life aren’t categorically
    or substantially different from those that you will encounter outside of your
    profession (though their impact on your life and the lives of others may be amplified).
    You will still need to examine these situations using general ethical principles
    and theories, so that is where we will start.


    ## Ethical Theory


    Ethics is the study of what it means to *do the right thing* and how to do the
    right thing in different situations. Ethics is a huge branch of philosophy and
    we will not be able to cover more than a small part of it here. We will focus
    on just a couple of different theories and the tools those theories will give
    us to figure out how to do the right thing.


    Firstly, “ethical theory is based on the assumption that people are rational and
    make free choices.”^([^(79)](#fn79)) This isn’t always true, obviously, but we’ll
    assume it is and that for the most part people are responsible for their own decisions
    and actions.


    Ethical rules are rules that we follow when we deal with other people and in actions
    or decisions that affect other people. Most ethical theories have the same goal,
    “to enhance human dignity, peace, happiness, and well-being.”^([^(80)](#fn80))
    We’ll also assume that the ethical rules from an ethical theory apply to everyone
    and in all situations. These rules should help to clarify our decision making
    and help lead us to an ethical decision in a particular situation. While behaving
    ethically is not always easy, it does commonly directly conform to standard social
    and legal expectations. According to Baase,


    > *Behaving ethically, in a personal or professional sphere, is usually not a
    burden. Most of the time we are honest, we keep our promises, we do not steal,
    we do our jobs. This should not be surprising. If ethical rules are good ones,
    they work for people, that is, they make our lives better. Behaving ethically
    is often practical. Honesty makes interactions among people work more smoothly
    and reliably, for example. We might lose friends if we often lie or break promises.
    Also, social institutions encourage us to do right: We might be arrested if caught
    stealing. We might lose our jobs if we do them carelessly. In a professional context,
    doing good ethically often corresponds closely with doing a good job in the sense
    of professional quality and competence. Doing good ethically often corresponds
    closely with good business in the sense that ethically developed products are
    more likely to please customers. Sometimes, however, it is difficult to do the
    right thing….Courage in a professional setting could mean admitting to a customer
    that your program is faulty, declining a job for which you are not qualified,
    or speaking out when you see someone else doing something wrong.*^([^(81)](#fn81))


    We’ll now explore some different ethical theories from two different schools,
    the deontological school and the consequentialist school.'
