  trans: '

    ### 软技能开发：一种安全与成长的文化


    团队协作并非凭空发生。无论我们如何精心关照每一位开发者，我们共同营造的协作环境才是软件开发的生态系统，它最终将决定我们能否共同繁荣。如果只重视产出，学习就可能变得不安全。如果所有冲突都被视为负面，多样性就可能变得不安全。一个可持续的工作场所文化需要关注学习与成长、承诺问责制，并高度重视人际交往技能以支持健康的关系。


    #### 学习中的安全感


    软技能开发需要一个安全的学习环境。我们所有的工作都必须基于其发生的*情境*，而每个新情境都应以好奇心和成长为导向来对待。团队协作中没有放之四海而皆准的解决方案：与新团队、新项目或新客户合作，都需要细心、问责和重新适应。它还需要有安全犯错的空间，以及在知识创造和新技能习得期间，开发工作可能停滞的时间。


    学习协作的方式因团队构成而异，因此需要试错。团队成员必须欢迎学习和适应的过程，这也意味着要欢迎工作中技术与非技术方面的错误，甚至将其视为成长的机遇而加以庆祝。*成长*需要学习新事物，这始于未知，且往往在首次尝试时无法成功。*成长导向*将失败视为学习常态，让开发者能够安全地表达困难、寻求帮助或承认错误。开发者可以在此采用敏捷方法：尝试、获取反馈、调整、再尝试。为成长创造安全环境需要尽量减少内疚和指责，转而专注于在通常伴随学习经历的成长阵痛中相互支持。


    当开发者拥有完成工作所需的必要自由时，问责制便分散在整个团队中。因此，团队成员必须以建设性的方式相互*问责但无责*。^(⁵⁸) 指责关注过去，而问责则关注为未来制定更好的计划。一个让承担责任感到安全的环境，将促成关于如何调整方向、继续前进的公开坦诚的讨论。成长型思维自然有助于管理恐惧、减少指责，并在事情进展不顺时培养问责制。试想，当一个错误发生，且在到达客户之前未被任何人发现时，团队中的每个人都负有责任。任何人都可能发现这个错误，但没有人做到。为最初的错误找替罪羊并不能解决问题。问题不在于错误本身。错误总会发生。真正的问题在于，很可能存在有缺陷的流程，未能设置保护性冗余机制，以确保在共享流程中更早地发现错误。团队中的每个人是如何被动或主动地导致了这个问题？每位团队成员可以做些什么来防止未来再次发生？面对任何不尽人意的结果，团队都应思考所有可用的信息、技术、实践、人员和环境是如何共同导致了不良结果，以及他们如何共同防范未来此类结果的发生。即使在最简单的有人忘记任务的情况下，团队也可以修改其实践，通过共享任务板、自动截止日期和提醒、日历集成、结对编程等方式来改进任务跟踪。


    项目的共同所有权支持集体问责，并促进所有任务中的相互支持。虽然适度的良性竞争是好事，但团队和公司应同甘共苦，才能真正培养出同袍情谊和共同目标感。共同所有权孕育的是支持而非竞争。共同所有权还能确保工作和理解在团队中更均匀地分布，而学习文化则重视在此过程中新技能的习得。其结果是形成一个工作负载更均衡、更能应对不可预测情况和未来需求的团队（例如，帮助测试彼此的代码、为生病的队友代班等）。为促进更具协作性的环境，主管人员应关注、重视并示范协作、资源共享，以及保持支持性和鼓励性的态度。


    在技术方面，安全的环境支持实验。大胆、创造力和创新需要探索性的试错。它们还需要相当长的时间，在此期间开发工作可能停滞，而知识正在被创造。有些尝试不会立即改进产品，但会创造新技能、加深理解并探索新想法。不正确的生产力指标和短视的激励措施会导致有缺陷的开发与团队协作实践。如果除了产出之外什么都不被重视，团队将不可避免地陷入不可持续且自我保全的行为，例如：


    *   开发者只接手能快速完成的小任务，以显得效率更高

    *   不信任和零和博弈行为（例如，通过指责来竞争和寻求个人安全）

    *   风险规避，导致开发者回避任何不确定如何完成的任务，避开更具创造性和挑战性的机会，并在此过程中优化以减少学习

    *   跳过创造性头脑风暴，直接跳入下一个可交付成果的编码


    不要轻视过程、失败、学习和讨论，而只关注结果。为共同实验和学习创造空间，因为没有人会拥有所有答案（无论是主管、客户，还是最有经验的开发者），而且合适的答案会随着时间、团队和团队成员的变化而变化。此外，虽然关注问题行为作为主要处理事项是自然的，但请记住也要强调我们在团队成员身上所珍视的行为。

    '
- fmt: '#### Safety in Clarity


    Regardless of what values are listed in the company bio, the culture we ultimately
    create is the one we promote throughout our daily operations. Our shared culture
    will reflect what is consistently noticed, valued, and modeled by everyone, but
    especially by those in charge.


    As Adena Friedman said, “Ideas are only as good as your ability to communicate
    them.” For Soft-Awareness to truly permeate an organization’s culture, it must
    be modeled by all levels of the organizational hierarchy. Meetings are a great
    opportunity for leaders to demonstrate and facilitate the expected constructive
    behaviors and responses: encourage and model open and rational dialogue, show
    and reward curiosity, offer support, and ask questions instead of making assumptions.
    Expressing needs or dissenting opinions should be rewarded to showcase that speaking
    up is not fruitless but instead very much worth the effort, courage, and vulnerability
    it takes. For example, if a teammate expresses a need or a preference, reasonable
    effort should be made to accommodate that need.


    Consistency and clarity is safe. Requirements and constraints may change, but
    preparing for them can stay consistent. Work and teamwork context may change,
    but expectations can stay explicit and consistent. Giving clear feedback may feel
    unsafe in the short term but is ultimately crucial for workplace sustainability.
    According to Brené Brown, “Of the ten behaviors and cultural issues that leaders
    identified as barriers to courage, there was one issue that leaders ranked as
    the greatest concern: Avoiding tough conversations, including giving honest, productive
    feedback.”^([^(59)](#fn59)) Avoidant behaviors diminished trust and engagement,
    increased problematic behaviors, reduced a sense of shared purpose, and negatively
    impacted productivity. Brown summarized this as “Clear is kind. Unclear is unkind.”


    Let’s consider some other examples of being kind by being clear:


    - Be explicit in all assumptions and plans across the team (frequently compare
    understanding, use visuals, discuss steps); make sure everyone understands the
    vision and their individual roles in helping bring that vision to life.

    - Be specific about the distinction between minimum required targets vs. nice-to-have
    reach goals. Working based on guesswork is dangerous, costly, and breeds anxiety
    within the team.

    - Clearly state constraints such as urgent needs or being understaffed. Transparency
    will help validate concerns and create a culture of open communication, trust,
    and shared problem solving.

    - Don’t leave others wondering whether they did enough or not, as this only leads
    to anxiety. Avoiding telling developers how to improve or what to change is not
    sustainable in the long run. Be specific and explicit about expectations so everyone
    can meaningfully retrospect, learn, and adapt by considering what was asked for,
    what was done, and why.

    - Conversations are interpreted and digested differently by individuals. To ensure
    a shared understanding, explicitly recap takeaways and next steps for everyone.

    - Be open, honest, courageous, and vulnerable with yourself and your team. Include
    a vibe-check in daily stand-up meetings to help improve shared clarity regarding
    the teammates’ daily context.

    - Direct all critique toward support and growth, not shame or tear down. Instead
    of pointing out undesirable or unproductive practices, guide each other to find
    better alternatives, always accompanied with reasoning regarding why one practice
    is preferable to another and how to implement it.


    #### Safety in Diversity


    While getting along may come easiest through similarities, heterogeneous teams
    showcase improved critical thinking and innovation.^([^(60)](#fn60)) Building
    and maintaining a culture that welcomes our differences requires everyone’s commitment
    to a number of personal and interpersonal practices. “But to build anything ‘inclusively,’
    we must first saliently understand where we are excluding.”^([^(61)](#fn61))


    As you saw in the last chapter, Scrum explicitly defines a set of values for developers
    to practice commitment, focus, openness, respect, and courage. When in doubt,
    lead with empathy. Empathy allows us to better understand our client requirements,
    developer needs, and the challenges of our emergent collaboration. Empathy is
    about valuing others as individuals, not just as resources for joint work. This
    includes paying attention to their needs and difficulties, communication and work
    styles, and personal circumstances. Empathy requires vulnerability, authenticity,
    and a willingness to be wrong. Consider that you may not see the full complexity
    and scope of someone’s work, that everyone has a different cultural and technical
    background, that our brains all process information very differently, and that
    all this diversity is our shared strength.


    Making everyone feel safe, respected, and valued on your team requires a commitment
    to diversity, equity, and inclusion. Inclusion strategist Vernā Myers famously
    said, “Diversity is being invited to the party; inclusion is being asked to dance.”^([^(62)](#fn62))
    Equity then, at a minimum, requires ensuring that invitees can get to the party,
    the facilities are suitable for the invitees, and all invitees had a voice in
    planning the activities, music, and refreshments. Yes, that is much more involved,
    but without these steps, we cannot possibly claim that everyone is truly welcome
    at the party. It requires paying attention to personal needs and preferences,
    to historical and cultural contexts, and to personal goals, not just to software
    development tasks.


    An often overlooked dimension of diversity is the type of work expected from the
    teammates. Paul Graham’s “Maker’s Schedule vs. Manager’s Schedule”^([^(63)](#fn63))
    discusses the fundamental differences between creative work and management work.
    By default, a manager’s schedule is broken down into small (e.g., hourly) intervals
    intended to schedule lots of meetings. Makers (e.g., developers) cannot create
    in small time slots, needing larger intervals such as half a day, because creative
    tasks require some windup time and extended chunks of time for deep focus and
    inventiveness. Meetings break up the available chunks of time and, if not scheduled
    carefully, can destroy a maker’s entire day: “A single meeting can blow a whole
    afternoon, by breaking it into two pieces each too small to do anything hard in.
    Plus, you have to remember to go to the meeting. That’s no problem for someone
    on the manager’s schedule. There’s always something coming on the next hour; the
    only question is what. But when someone on the maker’s schedule has a meeting,
    they have to think about it. For someone on the maker’s schedule, having a meeting
    is like throwing an exception.”^([^(64)](#fn64),) ^([^(65)](#fn65)) To minimize
    damage to the productivity of developers and any other makers on your team, you
    can schedule meetings with maker-attendees at the beginning or end of a workday.'
