    *   这使得 `SalesTax` 类保持独立，并让 `SalesTaxDriver` 更容易创建新对象。


    *   `SalesTaxDriver` 类只处理 `SalesTax` 对象。它无需了解任何特定的销售税率。具体的 `SalesTax` 对象实现了 `SalesTax`
    抽象类中的方法，而 `SalesTaxDriver` 只是使用它们，无论你创建的是哪种类型的 `SalesTax` 对象。


