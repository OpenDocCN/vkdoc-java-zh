- fmt: '### Parallel Language Features: The OpenMP^([^(239)](#fn239)) API


    `OpenMP` stands for Open Multi-Processing. It is a very popular open source applications
    programming interface (API) that enables simple creation of parallel programs.
    There are `OpenMP` implementations for practically all hardware architectures
    and bindings for C, C++, and Fortran. `OpenMP` assumes a shared memory model where
    threads share variables so there are race condition possibilities like in Java
    above. `OpenMP` is not really a programming language; instead, it consists of
    compiler directives (`#pragma`s in C & C++), library routines (which gives you
    an API), and environment variables.


    `OpenMP` uses a *fork-join parallelism* model. In this model, there is one *master
    thread* charged with dynamically creating N parallel threads (called a “*team
    of threads*”) for a parallel region of the code. The number of threads created
    depends on `OpenMP`''s assessment of how much parallelism is needed to execute
    the parallel region. When all those threads finish, program execution goes back
    to one master thread again until another parallel region is encountered. Figure
    [14-2](#270563_3_En_14_Chapter.xhtml#Fig2) illustrates what fork-join parallelism
    looks like.


    ![](images/270563_3_En_14_Chapter/270563_3_En_14_Fig2_HTML.jpg)


    An illustration of fork-join parallelism demonstrates the parallel tasks 1, 2,
    and 3 from left to right and the main thread passing through them.


    Figure 14-2


    Fork-join parallelism


    The programmer indicates to the compiler where the parallel regions should be
    using the compiler directive `#pragma omp parallel`. This directive creates an
    SPMD (single program multiple data) program where each thread executes the same
    code. The threads are created dynamically as needed. The maximum number of threads
    can be controlled with the `OMP_NUM_THREADS` environment variable or with the
    `omp_set_num_threads(N)` OpenMP library function. `OpenMP` will add parallelism
    dynamically until the demands of the program are met (or until it reaches the
    maximum number of threads allowed).


    The programmer can determine which thread they currently are using via the `omp_get_thread_num()`
    library function, which returns the current thread number.


    The master thread will create threads with the `OpenMP` parallel compiler directive.
    This directive tells the compiler that the next code statement block is to be
    considered a *parallel region* to be executed by each processor. For example,
    `#pragma omp parallel num_threads(8)` will instruct `OpenMP` to create up to seven
    threads of the parallel region that immediately follows the `#pragma`. Seven threads
    are created instead of eight because the master thread is also used in the parallel
    computation. In C or C++ this might look like


    ```

    long list[1000];

    #pragma omp parallel num_threads(8)

    {

    int threadID = omp_get_thread_num();

    foo(list, threadID);

    }

    ```


    Note that because `OpenMP` uses a shared memory model, we need to guarantee *synchronization*
    to prevent race conditions. Recall that two common techniques for enforcing synchronization
    are *barriers* and *mutual exclusion*. `OpenMP` has a compiler directive to set
    a barrier, `#pragma omp barrier`. It can also create *critical sections* (and
    thus enforce mutual exclusion) by using another directive, `#pragma omp critical`.
    Only one thread at a time can enter a critical section. `OpenMP` also allows a
    very fine-grained form of synchronization by allowing the programmer to create
    an *atomic* operation. Using the `#pragma omp atomic` compiler directive, the
    programmer can apply mutual exclusion to a single statement that must update a
    memory location. Allowable operations in an atomic region include `x op= expression`,
    `x++`, `++x`, `x--`, and `--x`.


    If the `#pragma omp parallel` compiler directive creates an SPMD program and forces
    the program to execute the code in the parallel region, how do we get a loop to
    divide up the work into the threads (known as *worksharing*) so that we can execute
    the entire program faster? `OpenMP` ensures this with another directive, `#pragma
    omp for`. This directive has the effect of splitting up the work in the loop among
    all the threads in the team.


    To illustrate how you would use all these `OpenMP` directives and library functions,
    let’s take a look at a fairly common example in parallel computing. You might
    remember from calculus that one way to look at the integral is as the area under
    a curve. In numerical analysis, there is a technique called the *trapezoid rule*
    that allows you to approximate the definite integral of a function by measuring
    and summing up the areas of the trapezoids (or rectangles) under the curve drawn
    by your function. It turns out that the function `f(x) = 1.0 / (1.0 + x²)` using
    values of `x` from 0.0 to 1.0 approximates `π/4`. So, we can write a program that
    uses the trapezoid rule to compute `π/4` and then just multiply to get a value
    for `π`. Figure [14-3](#270563_3_En_14_Chapter.xhtml#Fig3) shows us what the function
    looks like.


    ![](images/270563_3_En_14_Chapter/270563_3_En_14_Fig3_HTML.jpg)


    A line graph of `f(x)` versus `x` represents a decreasing trend of a line. The
    line starts at (0.00015, 1) and ends at (0.96265, 0.5). An equation of `f(x)`
    is provided at the top. Values are approximated.


    Figure 14-3


    Function to compute `π/4`


    Here is a serial version of this program in C:


    ```

    /*

    *  Serial program to estimate the area under a curve f(x)

    *  It really computes pi/4 and approximates the trapezoidal rule

    *  using rectangles instead of trapezoids.

    */

    #include <stdio.h>

    #include <stdlib.h>

    /*

    * Here''s the function we''ll be computing

    */

    double f(double x) {

    return 1.0 / (1.0 + x * x);

    }

    int main (int argc, char **argv) {

    int steps = 1000000000;     /* number of rectangles – 1 billion */

    double width = 0.0;         /* width of each rectangle */

    double x, pi4, sum = 0.0;

    /* get the width of each rectangle */

    width = 1.0 / (double) steps;

    /* loop to compute the area under f(x) */

    for (int i = 0; i <= steps; i++) {

    x = i * width;

    sum = sum + f(x);

    }

    pi4 = width * sum;

    printf("Sum is %8.4f and Area: pi/4 is %8.6f\n", sum, pi4);

    printf("Approximation to pi is %8.6f\n", pi4 * 4.0);

    return 0;

    }

    ```


    Compiling and executing this program on an eight-core Intel Linux computer running
    the Fedora operating system, using the GNU C compiler, produces the following
    results:


    ```

    Sum is 785398164.1474 and Area: pi/4 is 0.785398

    Approximation to pi is 3.141593

    real 16.19

    user 16.11

    sys 0.00

    ```


    The real processor time for the execution of 1 billion loop iterations is 16.19
    seconds on a lightly loaded machine. Of course, this version of the program is
    running serially on a single core. To speed it up, we can use `OpenMP` to parallelize
    the loop.'
  raw: "### Parallel Language Features: The OpenMP^([^(239)](#fn239)) API\n\nOpenMP\
    \ stands for Open Multi-Processing. It is a very popular open source applications\
    \ programming interface (API) that enables simple creation of parallel programs.\
    \ There are OpenMP implementations for practically all hardware architectures\
    \ and bindings for C, C++, and Fortran. OpenMP assumes a shared memory model where\
    \ threads share variables so there are race condition possibilities like in Java\
    \ above. OpenMP is not really a programming language; instead, it consists of\
    \ compiler directives (`#pragma`s in C & C++), library routines (which gives you\
    \ an API), and environment variables.\n\nOpenMP uses a *fork-join parallelism*\
    \ model. In this model, there is one *master thread* charged with dynamically\
    \ creating N parallel threads (called a “*team of threads*”) for a parallel region\
    \ of the code. The number of threads created depends on OpenMPs assessment of\
    \ how much parallelism is needed to execute the parallel region. When all those\
    \ threads finish, program execution goes back to one master thread again until\
    \ another parallel region is encountered. Figure [14-2](#270563_3_En_14_Chapter.xhtml#Fig2)\
    \ illustrates what fork-join parallelism looks like.\n\n![](images/270563_3_En_14_Chapter/270563_3_En_14_Fig2_HTML.jpg)\n\
    \nAn illustration of fork-join parallelism demonstrates the parallel tasks 1,\
    \ 2, and 3 from left to right and the main thread passing through them.\n\nFigure\
    \ 14-2\n\nFork-join parallelism\n\nThe programmer indicates to the compiler where\
    \ the parallel regions should be using the compiler directive `#pragma omp parallel`.\
    \ This directive creates an SPMD (single program multiple data) program where\
    \ each thread executes the same code. The threads are created dynamically as needed.\
    \ The maximum number of threads can be controlled with the `OMP_NUM_THREADS` environment\
    \ variable or with the `omp_set_num_threads(N)` OpenMP library function. OpenMP\
    \ will add parallelism dynamically until the demands of the program are met (or\
    \ until it reaches the maximum number of threads allowed).\n\nThe programmer can\
    \ determine which thread they currently are using via the `omp_get_thread_num()`\
    \ library function, which returns the current thread number.\n\nThe master thread\
    \ will create threads with the OpenMP parallel compiler directive. This directive\
    \ tells the compiler that the next code statement block is to be considered a\
    \ *parallel region* to be executed by each processor. For example, `#pragma omp\
    \ parallel num_threads(8)` will instruct OpenMP to create up to seven threads\
    \ of the parallel region that immediately follows the `#pragma`. Seven threads\
    \ are created instead of eight because the master thread is also used in the parallel\
    \ computation. In C or C++ this might look like\n\n```\nlong list[1000];\n#pragma\
    \ omp parallel num_threads(8)\n{\nint threadID = omp_get_thread_num();\nfoo(list,\
    \ threadID);\n}\n```\n\nNote that because OpenMP uses a shared memory model, we\
    \ need to guarantee *synchronization* to prevent race conditions. Recall that\
    \ two common techniques for enforcing synchronization are *barriers* and *mutual\
    \ exclusion*. OpenMP has a compiler directive to set a barrier, `#pragma omp barrier`.\
    \ It can also create *critical sections* (and thus enforce mutual exclusion) by\
    \ using another directive, `#pragma omp critical`. Only one thread at a time can\
    \ enter a critical section. OpenMP also allows a very fine-grained form of synchronization\
    \ by allowing the programmer to create an *atomic* operation. Using the `#pragma\
    \ omp atomic compiler` directive, the programmer can apply mutual exclusion to\
    \ a single statement that must update a memory location. Allowable operations\
    \ in an atomic region include x op= expression, x++, ++x, x--, and –-x.\n\nIf\
    \ the `#pragma omp parallel compiler directive` creates an SPMD program and forces\
    \ the program to execute the code in the parallel region, how do we get a loop\
    \ to divide up the work into the threads (known as *worksharing*) so that we can\
    \ execute the entire program faster? OpenMP ensures this with another directive,\
    \ `#pragma omp for`. This directive has the effect of splitting up the work in\
    \ the loop among all the threads in the team.\n\nTo illustrate how you would use\
    \ all these OpenMP directives and library functions, let’s take a look at a fairly\
    \ common example in parallel computing. You might remember from calculus that\
    \ one way to look at the integral is as the area under a curve. In numerical analysis,\
    \ there is a technique called the *trapezoid rule* that allows you to approximate\
    \ the definite integral of a function by measuring and summing up the areas of\
    \ the trapezoids (or rectangles) under the curve drawn by your function. It turns\
    \ out that the function f(x) = 1.0 / (1.0 + x²) using values of x from 0.0 to\
    \ 1.0 approximates π/4\\. So, we can write a program that uses the trapezoid rule\
    \ to compute π/4 and then just multiply to get a value for π. Figure [14-3](#270563_3_En_14_Chapter.xhtml#Fig3)\
    \ shows us what the function looks like.\n\n![](images/270563_3_En_14_Chapter/270563_3_En_14_Fig3_HTML.jpg)\n\
    \nA line graph of f of x versus x represents a decreasing trend of a line. The\
    \ line starts at (0.00015, 1) and ends at (0.96265, 0.5). An equation of f of\
    \ x is provided at the top. Values are approximated.\n\nFigure 14-3\n\nFunction\
    \ to compute \U0001D70B/4\n\nHere is a serial version of this program in C:\n\n\
    ```\n/*\n*  Serial program to estimate the area under a curve f(x)\n*  It really\
    \ computes pi/4 and approximates the trapezoidal rule\n*  using rectangles instead\
    \ of trapezoids.\n*/\n#include \n#include \n/*\n* Here's the function we'll be\
    \ computing\n*/\ndouble f(double x) {\nreturn 1.0 / (1.0 + x * x);\n}\nint main\
    \ (int argc, char **argv) {\nint steps = 1000000000;     /* number of rectangles\
    \ – 1 billion */\ndouble width = 0.0;         /* width of each rectangle */\n\
    double x, pi4, sum = 0.0;\n/* get the width of each rectangle */\nwidth = 1.0\
    \ / (double) steps;\n/* loop to compute the area under f(x) */\nfor (int i = 0;\
    \ i <= steps; i++) {\nx = i * width;\nsum = sum + f(x);\n}\npi4 = width * sum;\n\
    printf(\"Sum is %8.4f and Area: pi/4 is %8.6f\\n\", sum, pi4);\nprintf(\"Approximation\
    \ to pi is %8.6f\\n\", pi4 * 4.0);\nreturn 0;\n}\n```\n\nCompiling and executing\
    \ this program on an eight-core Intel Linux computer running the Fedora operating\
    \ system, using the GNU C compiler, produces the following results:\n\n```\nSum\
    \ is 785398164.1474 and Area: pi/4 is 0.785398\nApproximation to pi is 3.141593\n\
    real 16.19\nuser 16.11\nsys 0.00\n```\n\nThe real processor time for the execution\
    \ of 1 billion loop iterations is 16.19 seconds on a lightly loaded machine. Of\
    \ course, this version of the program is running serially on a single core. To\
    \ speed it up, we can use OpenMP to parallelize the loop:"
  trans: "\n### 并行语言特性：OpenMP^(²³⁹) API\n\nOpenMP 代表开放式多处理（Open Multi-Processing）。它是一个非常流行的开源应用程序编程接口（API），能够简化并行程序的创建。几乎所有硬件架构都有\
    \ OpenMP 的实现，并且它支持 C、C++ 和 Fortran 语言的绑定。OpenMP 采用共享内存模型，线程之间共享变量，因此与上述 Java 类似，存在竞态条件的可能性。OpenMP\
    \ 并非真正意义上的编程语言；它由编译器指令（C 和 C++ 中的 `#pragma`）、库例程（提供 API）以及环境变量组成。\n\nOpenMP 使用一种*分叉-合并并行*模型。在该模型中，存在一个*主线程*，负责为代码的并行区域动态创建\
    \ N 个并行线程（称为“*线程组*”）。创建的线程数量取决于 OpenMP 对执行该并行区域所需并行度的评估。当所有这些线程执行完毕后，程序执行流程将重新回到单个主线程，直到遇到下一个并行区域。图\
    \ 14-2 展示了分叉-合并并行的形态。\n\n![](img/270563_3_En_14_Fig2_HTML.jpg)\n\n一幅分叉-合并并行的示意图，从左到右展示了并行任务\
    \ 1、2 和 3，以及贯穿其中的主线程。\n\n图 14-2\n\n分叉-合并并行\n\n程序员通过使用编译器指令 `#pragma omp parallel`\
    \ 向编译器指明并行区域的位置。该指令会创建一个 SPMD（单程序多数据）程序，其中每个线程执行相同的代码。线程会根据需要动态创建。线程的最大数量可以通过\
    \ `OMP_NUM_THREADS` 环境变量或 `omp_set_num_threads(N)` OpenMP 库函数来控制。OpenMP 会动态增加并行度，直到满足程序的需求（或达到允许的最大线程数）。\n\
    \n程序员可以通过 `omp_get_thread_num()` 库函数来确定当前使用的是哪个线程，该函数返回当前线程的编号。\n\n主线程会通过 OpenMP\
    \ 并行编译器指令来创建线程。该指令告诉编译器，接下来的代码语句块应被视为一个*并行区域*，由每个处理器执行。例如，`#pragma omp parallel\
    \ num_threads(8)` 将指示 OpenMP 为紧随 `#pragma` 之后的并行区域创建最多七个线程。之所以创建七个线程而不是八个，是因为主线程也会参与并行计算。在\
    \ C 或 C++ 中，这可能看起来像这样：\n\n```\nlong list[1000];\n#pragma omp parallel num_threads(8)\n\
    {\nint threadID = omp_get_thread_num();\nfoo(list, threadID);\n}\n```\n\n请注意，由于\
    \ OpenMP 使用共享内存模型，我们需要保证*同步*以防止竞态条件。回顾一下，实施同步的两种常见技术是*屏障*和*互斥*。OpenMP 有一个设置屏障的编译器指令\
    \ `#pragma omp barrier`。它还可以通过使用另一个指令 `#pragma omp critical` 来创建*临界区*（从而强制互斥）。每次只能有一个线程进入临界区。OpenMP\
    \ 还允许一种非常细粒度的同步形式，即允许程序员创建*原子*操作。通过使用 `#pragma omp atomic` 编译器指令，程序员可以对必须更新内存位置的单个语句应用互斥。原子区域内允许的操作包括\
    \ x op= 表达式、x++、++x、x-- 和 –-x。\n\n如果 `#pragma omp parallel` 编译器指令创建了一个 SPMD 程序，并强制程序执行并行区域中的代码，那么我们如何让循环将工作划分到各个线程中（称为*工作共享*），从而能够更快地执行整个程序呢？OpenMP\
    \ 通过另一个指令 `#pragma omp for` 来确保这一点。该指令的作用是将循环中的工作拆分给线程组中的所有线程。\n\n为了说明如何使用所有这些\
    \ OpenMP 指令和库函数，让我们看一个并行计算中相当常见的例子。你可能还记得微积分中，积分的一种理解方式是曲线下的面积。在数值分析中，有一种称为*梯形法则*的技术，它允许你通过测量并求和函数曲线下梯形（或矩形）的面积来近似计算函数的定积分。事实证明，函数\
    \ f(x) = 1.0 / (1.0 + x²) 在 x 从 0.0 到 1.0 的范围内近似于 π/4。因此，我们可以编写一个程序，使用梯形法则计算 π/4，然后乘以\
    \ 4 得到 π 的值。图 14-3 展示了该函数的样子。\n\n![](img/270563_3_En_14_Fig3_HTML.jpg)\n\nf(x)\
    \ 对 x 的折线图显示了一条下降趋势的线。该线从 (0.00015, 1) 开始，到 (0.96265, 0.5) 结束。顶部提供了 f(x) 的方程。数值为近似值。\n\
    \n图 14-3\n\n用于计算 \U0001D70B/4 的函数\n\n以下是该程序的 C 语言串行版本：\n\n```\n/*\n*  用于估算曲线 f(x)\
    \ 下面积的串行程序\n*  它实际上计算 pi/4，并使用矩形而非梯形来近似梯形法则\n*/\n#include \n#include \n/*\n* 这是我们要计算的函数\n\
    */\ndouble f(double x) {\nreturn 1.0 / (1.0 + x * x);\n}\nint main (int argc,\
    \ char **argv) {\nint steps = 1000000000;     /* 矩形数量 – 10 亿 */\ndouble width\
    \ = 0.0;         /* 每个矩形的宽度 */\ndouble x, pi4, sum = 0.0;\n/* 获取每个矩形的宽度 */\nwidth\
    \ = 1.0 / (double) steps;\n/* 循环计算 f(x) 下的面积 */\nfor (int i = 0; i <= steps; i++)\
    \ {\nx = i * width;\nsum = sum + f(x);\n}\npi4 = width * sum;\nprintf(\"Sum is\
    \ %8.4f and Area: pi/4 is %8.6f\\n\", sum, pi4);\nprintf(\"Approximation to pi\
    \ is %8.6f\\n\", pi4 * 4.0);\nreturn 0;\n}\n```\n\n在一台运行 Fedora 操作系统的八核 Intel\
    \ Linux 计算机上，使用 GNU C 编译器编译并执行此程序，得到以下结果：\n\n```\nSum is 785398164.1474 and Area:\
    \ pi/4 is 0.785398\nApproximation to pi is 3.141593\nreal 16.19\nuser 16.11\n\
    sys 0.00\n```\n\n在一台负载较轻的机器上，执行 10 亿次循环迭代的实际处理器时间为 16.19 秒。当然，此版本的程序是在单个内核上串行运行的。为了加速，我们可以使用\
    \ OpenMP 来并行化循环：\n"
- fmt: "# 并行程序估算曲线下面积\n\n```c\n/*\n*  Parallel program to estimate the area under\
    \ a curve f(x)\n*  it really computes pi/4 and approximates the trapezoidal rule\n\
    *  using rectangles instead of trapezoids.\n*  Uses OpenMP with the gcc 7.1.0\
    \ compiler.\n*/\n#include <stdio.h>\n#include <stdlib.h>\n#include <math.h>\n\
    /*\n* Here's the function we'll be computing\n*/\ndouble f(double x) {\n    return\
    \ 1.0 / (1.0 + x * x);\n}\n\nint main (int argc, char **argv) {\n    int steps\
    \ = 1000000000;     /* number of rectangles – 1 billion */\n    double width =\
    \ 0.0;         /* width of each rectangle */\n    double x, pi4, sum = 0.0;\n\n\
    \    /* get the width of each rectangle */\n    width = 1.0 / (double) steps;\n\
    \n    /*\n    * here we define the parallel region to be the for loop\n    * We\
    \ declare x to be private and tell OpenMP\n    * to reduce the partial sums as\
    \ each thread finishes.\n    */\n    #pragma omp parallel for private(x) reduction(+:sum)\n\
    \    /* loop to compute the area under f(x) */\n    for (int i = 0; i <= steps;\
    \ i++) {\n        x = i * width;\n        sum = sum + f(x);\n    }\n\n    pi4\
    \ = width * sum;\n    printf(\"Sum is %8.4f and Area: pi/4 is %8.6f\\n\", sum,\
    \ pi4);\n    printf(\"Approximation to pi is %8.6f\\n\", pi4 * 4.0);\n    return\
    \ 0;\n}\n```\n\n当这个版本的程序在同一系统上使用同一编译器（但包含OpenMP库）编译并运行时，我们得到以下结果：\n\n```\nSum\
    \ is 785398164.1475 and Area: pi/4 is 0.785398\nApproximation to pi is 3.141593\n\
    real 2.24\nuser 17.06\nsys 0.00\n```\n\n注意程序中的`sum`变量在`for`循环中累加。如果我们进行*工作共享*并将循环中的工作分离到多个线程中，这是如何工作的呢？每次循环时累加部分值被称为*归约*（将表达式转换为更简单的形式），这里通过另一个OpenMP编译器指令`reduction(<operator>\
    \ : <list of variables>)`实现。该运算符会导致以下几件事发生：（1）创建每个变量的本地副本并初始化；（2）线程中的更新仅作用于本地副本；（3）在循环执行结束时，本地副本被归约为单个值，并使用指定的运算符合并到原始全局变量中。可用于归约的运算符包括`+`、`-`、`*`、`max`、`min`、`&`、`|`、`^`、`&&`和`||`。\n\
    \n在这个版本中，运行时间降至2.24秒，在轻负载系统上加速比为7.2。这表明OpenMP使用了所有八个核心来完成工作，并且通过`for`和`reduction`编译器指令，编译器有效地划分了`for`循环中的工作，最终结果相同，但耗时大大缩短。\n\
    \n就像在Java中一样，OpenMP的细节远不止我们这里讨论的这些。这只是对并行编程中非常酷且有趣的内容的一次浅尝。如果你真的想进行并行编程，强烈建议你查阅本章末尾的参考资料，了解更多内容。\n\
    \n## 结论\n\n编码是软件开发的核心。代码是你产出的成果。性能是优秀代码的关键，也是解决大型且有趣问题的编程关键。随着摩尔定律开始失效以及功耗墙成为现实，并行编程将是未来每个人都要做的事情。\n\
    \n最后，一个尚未完全实现的预言：\n\n> *“处理器行业的发展方向是增加越来越多的核心，但没有人知道如何对这些东西进行编程。我的意思是，两个核心，还行；四个核心，不太行；八个核心，算了吧。”*\n\
    > \n> — 史蒂夫·乔布斯，苹果公司\n\n# 15. 并行设计模式\n\n> *软件通常比硬件更长寿，因此在程序的生命周期中，它可能会在各种各样的目标平台上运行。目标是获得一个在原始目标平台上运行良好，同时又足够灵活以适应不同硬件类别的设计。*\n\
    > \n> — Tim Mattson 等人^([^(240)](#fn240))\n\n设计模式在20世纪90年代被引入，旨在“描述面向对象软件设计中特定问题的简单而优雅的解决方案。设计模式捕捉了随着时间的推移而发展和演化的解决方案。因此，它们不是人们最初倾向于生成的设计。它们反映了开发人员为了在软件中实现更大的复用性和灵活性而进行的无数次重新设计和重新编码。设计模式以简洁且易于应用的形式捕捉这些解决方案。”^([^(241)](#fn241))\n\
    \n*设计模式*是对常见编程问题及其经过测试的高效解决方案的表示。尽管设计模式通常以面向对象编程框架的形式呈现，但其思想是完全通用的，可以应用于不同的编程模型，包括并行模型。\n\
    \n## 并行设计模式概述\n\n并行设计模式与经典的串行设计模式具有相同的目标，即描述对重复性问题的解决方案，但现在是在并行软件设计的背景下，而非面向对象软件设计。\n\
    \n在本章中，我们将概述并行模式、并行编程中典型的计算抽象，以及如何思考将串行程序转换为并行程序。我们还将介绍几个示例性的并行设计模式，包括用于高效实现递归、分治计算、阶段化计算以及将计算拆分为多个独立任务的模式。与第[13]章一样，我们不会检查所有并行设计模式，而是主要关注具有代表性的示例，大部分来自Mattson等人^([^(242)](#fn242))的研究。\n\
    \n在接下来的几节中，我们将介绍一种并行模式语言，这将使我们能够在后续讨论不同的模式。\n\n### 概述：并行设计空间\n\n并行设计模式最有趣的方面之一是将并行应用程序的设计划分为四个独立但相关的设计元素，称为*设计空间*，它们大致与创建并行程序的步骤一致：\n\
    \n*发现并发性*：这个设计空间“关注于结构化问题以暴露可开发的并发性。”^([^(243)](#fn243))程序员将处理一个问题或一个现有的串行程序，并寻找可以利用的潜在并发区域。\n\
    \n*算法结构*：在这个设计阶段，程序员试图找到并构建能够利用已暴露并发性的算法。\n\n*支持结构*：支持结构是程序员开始将算法映射到数据结构以及更详细的程序结构（如循环和递归）的阶段。\n\
    \n*实现机制*：最后，设计被映射到特定的并行编程框架中。\n\n图[15-1](#270563_3_En_15_Chapter.xhtml#Fig1)展示了设计空间的层次结构、模式组织的一般维度，以及在这些维度内部与每个空间相关的并行元模式。接下来的四节将更详细地讨论每个设计空间。\n\
    \n![](images/270563_3_En_15_Chapter/270563_3_En_15_Fig1_HTML.jpg)\n\n一个图表展示了从顶部到底部的发现并发性、算法结构、支持结构和实现机制的层次结构。每个阶段下标注了不同的活动。\n\
    \n**图15-1**\n\n并行设计空间及相关元模式"
  raw: "```\n/*\n*  Parallel program to estimate the area under a curve f(x)\n*  it\
    \ really computes pi/4 and approximates the trapezoidal rule\n*  using rectangles\
    \ instead of trapezoids.\n*  Uses OpenMP with the gcc 7.1.0 compiler.\n*/\n#include\
    \ \n#include \n#include \n/*\n* Here's the function we'll be computing\n*/\ndouble\
    \ f(double x) {\nreturn 1.0 / (1.0 + x * x);\n}\nint main (int argc, char **argv)\
    \ {\nint steps = 1000000000;     /* number of rectangles – 1 billion */\ndouble\
    \ width = 0.0;         /* width of each rectangle */\ndouble x, pi4, sum = 0.0;\n\
    /* get the width of each rectangle */\nwidth = 1.0 / (double) steps;\n/*\n* here\
    \ we define the parallel region to be the for loop\n* We declare x to be private\
    \ and tell OpenMP\n* to reduce the partial sums as each thread finishes.\n*/\n\
    #pragma omp parallel for private(x) reduction(+:sum)\n/* loop to compute the area\
    \ under f(x) */\nfor (int i = 0; i <= steps; i++) {\nx = i * width;\nsum = sum\
    \ + f(x);\n}\npi4 = width * sum;\nprintf(\"Sum is %8.4f and Area: pi/4 is %8.6f\\\
    n\", sum, pi4);\nprintf(\"Approximation to pi is %8.6f\\n\", pi4 * 4.0);\nreturn\
    \ 0;\n}\n```\n\nWhen this version of the program is compiled and run on the same\
    \ system and using the same compiler (but including the OpenMP library), we get\
    \ the following results:\n\n```\nSum is 785398164.1475 and Area: pi/4 is 0.785398\n\
    Approximation to pi is 3.141593\nreal 2.24\nuser 17.06\nsys 0.00\n```\n\nNote\
    \ that the sum variable in the program is accumulated in the for loop. How does\
    \ this work if we do *worksharing* and separate the work in the loop into multiple\
    \ threads? Accumulating partial values each time we loop is called a *reduction*\
    \ (converting an expression into a simpler form), achieved here using another\
    \ OpenMP compiler directive, `reduction(<operator> : <list of variables>)`. This\
    \ operator causes several things to happen: (1) a local copy of each variable\
    \ is made and initialized, (2) updates in the thread only happen to the local\
    \ copy, and (3) at the end of the loop execution, the local copies are reduced\
    \ into a single value and combined (both using the designated operator) into the\
    \ original global variable. Operators that can be used for reduction include +,\
    \ -, *, max, min, &, |, ^, &&, and ||.\n\nIn this version, the running time is\
    \ down to 2.24 seconds, a speedup of 7.2 on a lightly loaded system. This indicates\
    \ that OpenMP was using all eight cores to do the work and with the for and reduction\
    \ compiler directives, the compiler was dividing up the work in the for loop efficiently\
    \ and the answers ended up the same, but in a much shorter time.\n\nJust as in\
    \ Java, there is much more to the details of OpenMP that we haven’t gone into\
    \ here. This was just a taste of the very cool and interesting things you can\
    \ do with parallel programming. If you really want to do parallel programming,\
    \ you are strongly encouraged to go to the references at the end of this chapter\
    \ and learn more.\n\n## Conclusion\n\nCoding is the heart of software development.\
    \ Code is what you produce. Performance is the key to good code and to programming\
    \ the solutions to large and interesting problems. With Moore’s Law beginning\
    \ to fade and the power wall a reality, parallel programming is what everyone\
    \ will be doing in the future.\n\nAnd finally, a prediction that hasn’t quite\
    \ worked out:\n\n> *“The way the processor industry is going, is to add more and\
    \ more cores, but nobody knows how to program those things. I mean, two, yeah;\
    \ four, not really; eight, forget it.”*\n> \n> — Steve Jobs, Apple\n\n# 15. Parallel\
    \ Design Patterns\n\n> *Software typically outlives hardware, so over the course\
    \ of a program’s life it may be used on a tremendous range of target platforms.\
    \ The goal is to obtain a design that works well on the original target platform,\
    \ but at the same time is flexible enough to adapt to different classes of hardware.*\n\
    > \n> —Tim Mattson, et. al.^([^(240)](#fn240))\n\nDesign patterns were introduced\
    \ in the 1990s to “describe simple and elegant solutions to specific problems\
    \ in object-oriented software design. Design patterns capture solutions that have\
    \ developed and evolved over time. Hence, they aren’t the designs people tend\
    \ to generate initially. They reflect untold redesign and recoding as developers\
    \ have struggled for greater reuse and flexibility in their software. Design patterns\
    \ capture these solutions in a succinct and easily applied form.”^([^(241)](#fn241))\n\
    \nA *design pattern* is a representation of a common programming problem along\
    \ with a tested, efficient solution for that problem. Although design patterns\
    \ are normally presented in an object oriented programming framework, the idea\
    \ is completely general and it can be applied to different programming models,\
    \ including parallel ones.\n\n## Parallel Design Patterns Overview\n\nParallel\
    \ design patterns have the same objectives as the classical sequential design\
    \ patterns, namely to describe solutions to recurrent problems, but now in the\
    \ context of parallel software design rather than object-oriented software design.\n\
    \nIn this chapter, we’ll give an overview of parallel patterns, the computing\
    \ abstractions typical in parallel programming, and how to think about converting\
    \ serial programs into parallel programs. We’ll also go through several sample\
    \ parallel design patterns, including those for solving the problems of efficient\
    \ implementation of recursive, divide and conquer computations, of staged computations,\
    \ and of computations split into a number of independent tasks. As in Chapter\
    \ [13](#270563_3_En_13_Chapter.xhtml), we will not examine all the parallel design\
    \ patterns, but rather focus on a representative sample, mostly from Mattson et.\
    \ al.^([^(242)](#fn242))\n\nIn the next several sections, we’ll introduce a language\
    \ of parallel patterns, which will allow us to later discuss the different patterns.\n\
    \n### Overview: Parallel Design Spaces\n\nOne of the most interesting aspects\
    \ of parallel design patterns is the partitioning of the design of a parallel\
    \ application into four separate but related design elements called *design spaces*\
    \ that roughly coincide with the steps in creating a parallel program:\n\n*Finding\
    \ concurrency*: This design space is “concerned with structuring the problem to\
    \ expose exploitable concurrency.”^([^(243)](#fn243)) The programmer will take\
    \ a problem or an existing serial program and search out the areas of possible\
    \ concurrency that can be utilized.\n\n*Algorithm structure*: In this design phase,\
    \ the programmer attempts to find and structure the algorithms that can take advantage\
    \ of the exposed concurrency.\n\n*Supporting structures*: Supporting structures\
    \ is where the programmer begins to map the algorithms to data structures and\
    \ to more detailed program structures, like loops and recursion.\n\n*Implementation\
    \ mechanisms*: Finally, the design is mapped into particular parallel programming\
    \ frameworks.\n\nFigure [15-1](#270563_3_En_15_Chapter.xhtml#Fig1) shows the hierarchy\
    \ of the design spaces, the general dimensions in which the patterns are organized,\
    \ and inside those, the parallel meta-patterns associated with each space. The\
    \ following four sections discuss each of the design spaces in more detail.\n\n\
    ![](images/270563_3_En_15_Chapter/270563_3_En_15_Fig1_HTML.jpg)\n\nA diagram illustrates\
    \ the hierarchy of fining concurrency, algorithm structure, supporting structures,\
    \ and implementation mechanisms from top to bottom. Different activities are denoted\
    \ under each phase.\n\nFigure 15-1\n\nThe parallel design spaces and related meta-patterns"
  trans: "\n```\n/*\n*  并行程序，用于估算曲线 f(x) 下的面积\n*  实际上计算的是 pi/4，并使用矩形近似梯形法则\n*  而非梯形。\n\
    *  使用 gcc 7.1.0 编译器并借助 OpenMP。\n*/\n#include \n#include \n#include \n/*\n* 这是我们要计算的函数\n\
    */\ndouble f(double x) {\nreturn 1.0 / (1.0 + x * x);\n}\nint main (int argc,\
    \ char **argv) {\nint steps = 1000000000;     /* 矩形数量 – 10 亿 */\ndouble width\
    \ = 0.0;         /* 每个矩形的宽度 */\ndouble x, pi4, sum = 0.0;\n/* 获取每个矩形的宽度 */\nwidth\
    \ = 1.0 / (double) steps;\n/*\n* 这里我们将并行区域定义为 for 循环\n* 我们将 x 声明为私有变量，并告知 OpenMP\n\
    * 在每个线程完成时对部分和进行归约。\n*/\n#pragma omp parallel for private(x) reduction(+:sum)\n\
    /* 计算 f(x) 下面积的循环 */\nfor (int i = 0; i <= steps; i++) {\nx = i * width;\nsum\
    \ = sum + f(x);\n}\npi4 = width * sum;\nprintf(\"Sum is %8.4f and Area: pi/4 is\
    \ %8.6f\\n\", sum, pi4);\nprintf(\"Approximation to pi is %8.6f\\n\", pi4 * 4.0);\n\
    return 0;\n}\n```\n\n当此版本的程序在相同系统上使用相同编译器（但包含 OpenMP 库）编译并运行时，我们得到以下结果：\n\n```\n\
    Sum is 785398164.1475 and Area: pi/4 is 0.785398\nApproximation to pi is 3.141593\n\
    real 2.24\nuser 17.06\nsys 0.00\n```\n\n请注意，程序中的 `sum` 变量是在 for 循环中累加的。如果我们进行*工作共享*并将循环中的工作分离到多个线程中，这是如何工作的呢？每次循环时累加部分值被称为*归约*（将表达式转换为更简单的形式），这里通过另一个\
    \ OpenMP 编译器指令 `reduction(<operator> : <list of variables>)` 实现。该运算符会导致以下几件事发生：(1)\
    \ 创建每个变量的本地副本并进行初始化，(2) 线程中的更新仅作用于本地副本，(3) 在循环执行结束时，本地副本被归约为单个值，并（使用指定的运算符）合并到原始的全局变量中。可用于归约的运算符包括\
    \ +、-、*、max、min、&、|、^、&& 和 ||。\n\n在此版本中，运行时间降至 2.24 秒，在轻负载系统上加速比为 7.2。这表明 OpenMP\
    \ 使用了所有八个核心来执行工作，并且借助 `for` 和 `reduction` 编译器指令，编译器有效地分配了 for 循环中的工作，最终结果相同，但耗时大大缩短。\n\
    \n就像在 Java 中一样，OpenMP 的细节远不止我们在这里介绍的这些。这只是对并行编程中那些非常酷且有趣的事情的一瞥。如果你真的想进行并行编程，强烈建议你查阅本章末尾的参考资料，以了解更多内容。\n\
    \n## 结论\n\n编码是软件开发的核心。代码是你产出的成果。性能是优秀代码的关键，也是为大型且有趣的问题编程解决方案的关键。随着摩尔定律开始失效以及功耗墙成为现实，并行编程将是未来每个人都要做的事情。\n\
    \n最后，一个尚未完全实现的预言：\n\n> *“处理器行业的发展方向是增加越来越多的核心，但没有人知道如何对这些东西进行编程。我的意思是，两个核心，还行；四个核心，不太行；八个核心，算了吧。”*\n\
    > \n> — 史蒂夫·乔布斯，苹果公司\n\n# 15. 并行设计模式\n\n> *软件通常比硬件更长寿，因此在程序的生命周期中，它可能会在各种各样的目标平台上使用。目标是获得一种在原始目标平台上运行良好，同时又足够灵活以适应不同类别硬件的设计。*\n\
    > \n> —蒂姆·马特森 等人^(²⁴⁰)\n\n设计模式于 20 世纪 90 年代被引入，旨在“描述针对面向对象软件设计中特定问题的简单而优雅的解决方案。设计模式捕捉了随着时间的推移而发展和演变的解决方案。因此，它们不是人们通常最初会想到的设计。它们反映了开发人员为了在软件中实现更大的复用性和灵活性而进行的无数次重新设计和重新编码。设计模式以简洁且易于应用的形式捕捉了这些解决方案。”^(²⁴¹)\n\
    \n*设计模式*是对常见编程问题及其经过测试的有效解决方案的表示。尽管设计模式通常是在面向对象编程框架中呈现的，但这个想法是完全通用的，可以应用于不同的编程模型，包括并行模型。\n\
    \n## 并行设计模式概述\n\n并行设计模式与经典的串行设计模式具有相同的目标，即描述针对重复出现问题的解决方案，但现在是在并行软件设计而非面向对象软件设计的背景下。\n\
    \n在本章中，我们将概述并行模式、并行编程中典型的计算抽象，以及如何思考将串行程序转换为并行程序。我们还将介绍几个示例性的并行设计模式，包括用于解决递归、分治计算、分阶段计算以及将计算拆分为多个独立任务等问题的模式。与第\
    \ 13 章一样，我们不会研究所有并行设计模式，而是主要关注一组有代表性的示例，这些示例大多来自马特森等人^(²⁴²)的著作。\n\n在接下来的几节中，我们将介绍一种并行模式语言，这将使我们能够在后面讨论不同的模式。\n\
    \n### 概述：并行设计空间\n\n并行设计模式最有趣的方面之一是将并行应用程序的设计划分为四个独立但相关的设计元素，称为*设计空间*，它们大致与创建并行程序的步骤相对应：\n\
    \n*发现并发性*：此设计空间“关注于构建问题以暴露可开发的并发性。”^(²⁴³) 程序员将针对一个问题或一个现有的串行程序，寻找可以利用的潜在并发区域。\n\
    \n*算法结构*：在此设计阶段，程序员试图找到并构建能够利用已暴露的并发性的算法。\n\n*支撑结构*：支撑结构是程序员开始将算法映射到数据结构以及更详细的程序结构（如循环和递归）的阶段。\n\
    \n*实现机制*：最后，将设计映射到特定的并行编程框架中。\n\n图 15-1 展示了设计空间的层次结构、模式组织的一般维度，以及在这些维度内部，与每个空间相关的并行元模式。以下四节将更详细地讨论每个设计空间。\n\
    \n![](img/270563_3_En_15_Fig1_HTML.jpg)\n\n一个图表展示了从上到下的层次结构：发现并发性、算法结构、支撑结构和实现机制。每个阶段下标注了不同的活动。\n\
    \n图 15-1\n\n并行设计空间及相关元模式\n"
- fmt: "# Design Spaces: Finding Concurrency\n\nThe meta-patterns in the *Finding\
    \ Concurrency* design space are used to start designing a parallel application.\
    \ You will enter this design space after having considered the top-level elements\
    \ of the problem to be solved. Your objective is to tease out the parts of the\
    \ algorithm or program that are inherently sequential and those that contain elements\
    \ of concurrency. This typically has you looking at the parts of the program or\
    \ algorithm that are the most computationally intensive, as these are the areas\
    \ where they are most likely to find concurrency. Finding concurrency is divided\
    \ into three dimensions: Decomposition, Dependency Analysis, and Design Evaluation.\n\
    \nThe first two, the *Decomposition* and *Dependency Analysis* dimensions, are\
    \ related to the ways in which you will implement the parallel application. The\
    \ *Decomposition* meta-patterns are used to decompose the problem into pieces\
    \ that can execute concurrently, while the *Dependency Analysis* meta-patterns\
    \ help group the tasks to be executed and analyze the dependencies among these\
    \ tasks.\n\nThe *Decomposition* dimension includes just two meta-patterns that\
    \ are used to find and divide the problem into parts that can execute concurrently:\n\
    \n- The *Task Decomposition* pattern views a complex algorithm as a set of instructions\
    \ that can be grouped into a set of tasks to be executed concurrently.\n- The\
    \ *Data Decomposition* pattern takes the data used by the program and attempts\
    \ to divide it into chunks which can be used by each of the tasks.\n\nThe *Dependency\
    \ Analysis* dimension includes three different meta-patterns, whose job it is\
    \ to group the tasks found above and to analyze the dependencies between them:\n\
    \n- The *Group Tasks* pattern is aimed at modeling the more convenient grouping\
    \ of tasks, such that the management of dependencies is simplified.\n- The *Order\
    \ Tasks* pattern is aimed at figuring out how tasks (or groups of tasks) may be\
    \ ordered to satisfy the application constraints related to task execution.\n\
    - The *Data Sharing* pattern is aimed at modeling the accesses to a shared data\
    \ structure.\n\nThe main forces influencing the design of these meta-patterns\
    \ are flexibility, efficiency, and simplicity. Flexibility is needed to adapt\
    \ the program design to different implementation requirements. Efficiency is usually\
    \ related to scalability: how does the solution scale with the size of the target\
    \ parallel computer. Finally, simplicity is required for understandability and\
    \ maintenance.\n\nThe third dimension, *Design Evaluation*, is not really a dimension\
    \ or meta-pattern in the way we’ve used the words so far. Rather, it is used to\
    \ “guide the algorithm designer through an analysis of what has been done so far\
    \ before moving to the patterns in the *Algorithm Structure* design space.”^([^(244)](#fn244))\
    \ Design evaluation is really a process that encourages you to evaluate the design\
    \ iteratively in order to arrive at the best design possible. In this process,\
    \ you ask questions that force you to think about the current version of the design.\
    \ For example, how suitable is the design for the target platform? How many processing\
    \ elements (PEs) are available, and how many of them and how often will they be\
    \ used? How are the data structures shared among the PEs? How regular are the\
    \ tasks and their data dependencies? Are the tasks grouped in the most efficient\
    \ and scalable way?\n\nThe overall output resulting from the analysis of the *Finding\
    \ Concurrency* design space is a decomposition of the problem into different design\
    \ elements: i) a task decomposition identifying the tasks that can be executed\
    \ concurrently, ii) a data decomposition that identifies the data local to each\
    \ one of the tasks, iii) a way of grouping tasks and ordering these tasks groups\
    \ in such a way that temporal and data dependencies are satisfied, and iv) an\
    \ analysis of the dependencies among the tasks.\n\n# Design Spaces: Algorithm\
    \ Structure\n\nThe output from the *Finding Concurrency* design space is used\
    \ in the *Algorithm Structure* design space to refine the design of our concurrent\
    \ tasks and to create a parallel program structure closer to an actual parallel\
    \ program, suitable to be run on a parallel target architecture.\n\nThere are\
    \ three major dimensions used in organizing a parallel algorithm’s structure:\
    \ by task, by data decomposition, and by flow of data. Note that, while in the\
    \ *Finding Concurrency* design space, you will normally go through all the dimensions\
    \ and their patterns, in the *Algorithm Structure* design space you are required\
    \ to choose one of these three alternative dimensions and implement one of its\
    \ parallel design patterns below.\n\n- Organizing the parallel algorithm by *task*.\
    \ In this dimension, tasks themselves drive your design. That is, you consider\
    \ the tasks that can be computed in parallel, which tasks in your set are concurrent,\
    \ and then how the tasks are enumerated, linearly or recursively. The *organize\
    \ by tasks* meta-pattern group includes two patterns:\n  - The *Task Parallelism*\
    \ pattern governs the efficient execution of collections of tasks and is used\
    \ for linear decompositions. The common factor here is that “the problem can be\
    \ decomposed into a collection of tasks that execute concurrently.”^([^(245)](#fn245))\
    \ These tasks can be independent or there can be some dependencies between them.\
    \ In many cases the tasks are also associated with a loop program structure. The\
    \ proposed solution to implement the pattern works out three different points:\
    \ how tasks are defined, the dependencies among tasks, and the scheduling of the\
    \ tasks for concurrent execution, including assigning tasks to different processors\
    \ or threads.\n  - The *Divide and Conquer* pattern is used for recursive decompositions\
    \ and implements the well-known divide-and-conquer recursive solution schema where\
    \ a problem is divided up into a number of smaller, identical, sub-problems, which\
    \ are then solved, and the solutions are combined together into a single overall\
    \ solution for the original problem.\n\n- Organizing the parallel algorithm by\
    \ *data decomposition*, where data is driving the design. Consider the decomposition\
    \ of data into (possibly disjoint) subsets to be used by each task. Again, this\
    \ decomposition can be either linear or recursive: if the data can be distributed\
    \ into discrete data sets and the entire problem can be solved by operating on\
    \ each of the data sets independently, then choose the linear/geometric meta-pattern;\
    \ if the data is organized recursively (say as a binary tree), then choose the\
    \ recursive meta-pattern. The *organize by data* decomposition pattern group includes\
    \ two meta-patterns:\n  - The *Geometric Decomposition* pattern represents computations\
    \ where the algorithm is recognized as a series of computations on some core data\
    \ structure and where that data structure is inherently linear in nature, like\
    \ an array or table or matrix. With these types of data structures, the data can\
    \ be broken up into contiguous subsets and acted on independently by the program.\
    \ This means that the tasks operating on this data can execute concurrently. See\
    \ the *Distributed Array* meta-pattern below for an example of how the *Geometric\
    \ Distribution* pattern would organize its data.\n  - The *Recursive Data* pattern\
    \ works with parallel computations created to work with a recursively defined\
    \ data structure, where the data appears to be acted upon sequentially. These\
    \ tasks generally use links to move from one data element to another, as in a\
    \ linked list, a binary tree, or a graph, but the computations involve things\
    \ like following a path in the tree or partitioning the graph. Solving these problems\
    \ usually involves restructuring the computations over the linked data structure\
    \ that exposes more concurrency."
  raw: "#### Design Spaces: Finding Concurrency\n\nThe meta-patterns in the *Finding\
    \ Concurrency* design space are used to start designing a parallel application.\
    \ You will enter this design space after having considered the top-level elements\
    \ of the problem to be solved. Your objective is to tease out the parts of the\
    \ algorithm or program that are inherently sequential and those that contain elements\
    \ of concurrency. This typically has you looking at the parts of the program or\
    \ algorithm that are the most computationally intensive, as these are the areas\
    \ where they are most likely to find concurrency. Finding concurrency is divided\
    \ into three dimensions: Decomposition, Dependency Analysis, and Design Evaluation.\n\
    \nThe first two, the *Decomposition* and *Dependency Analysis* dimensions, are\
    \ related to the ways in which you will implement the parallel application. The\
    \ *Decomposition* meta-patterns are used to decompose the problem into pieces\
    \ that can execute concurrently, while the *Dependency Analysis* meta-patterns\
    \ help group the tasks to be executed and analyze the dependencies among these\
    \ tasks.\n\nThe *Decomposition* dimension includes just two meta-patterns that\
    \ are used to find and divide the problem into parts that can execute concurrently:\n\
    \n*   The *Task Decomposition* pattern views a complex algorithm as a set of instructions\
    \ that can be grouped into a set of tasks to be executed concurrently.\n\n*  \
    \ The *Data Decomposition* pattern takes the data used by the program and attempts\
    \ to divide it into chunks which can be used by each of the tasks.\n\nThe *Dependency\
    \ Analysis* dimension includes three different meta-patterns, whose job it is\
    \ to group the tasks found above and to analyze the dependencies between them:\n\
    \n*   The *Group Tasks* pattern is aimed at modeling the more convenient grouping\
    \ of tasks, such that the management of dependencies is simplified.\n\n*   The\
    \ *Order Tasks* pattern is aimed at figuring out how tasks (or groups of tasks)\
    \ may be ordered to satisfy the application constraints related to task execution.\n\
    \n*   The *Data Sharing* pattern is aimed at modeling the accesses to a shared\
    \ data structure.\n\nThe main forces influencing the design of these meta-patterns\
    \ are flexibility, efficiency, and simplicity. Flexibility is needed to adapt\
    \ the program design to different implementation requirements. Efficiency is usually\
    \ related to scalability: how does the solution scale with the size of the target\
    \ parallel computer. Finally, simplicity is required for understandability and\
    \ maintenance.\n\nThe third dimension, *Design Evaluatio*n, is not really a dimension\
    \ or meta-pattern in the way we’ve used the words so far. Rather, it is used to\
    \ “guide the algorithm designer through an analysis of what has been done so far\
    \ before moving to the patterns in the *Algorithm Structure* design space.”^([^(244)](#fn244))\
    \ Design evaluation is really a process that encourages you to evaluate the design\
    \ iteratively in order to arrive at the best design possible. In this process,\
    \ you ask questions that force you to think about the current version of the design.\
    \ For example, how suitable is the design for the target platform? How many processing\
    \ elements (PEs) are available, and how many of them and how often will they be\
    \ used? How are the data structures shared among the PEs? How regular are the\
    \ tasks and their data dependencies? Are the tasks grouped in the most efficient\
    \ and scalable way?\n\nThe overall output resulting from the analysis of the *Finding\
    \ Concurrency* design space is a decomposition of the problem into different design\
    \ elements: i) a task decomposition identifying the tasks that can be executed\
    \ concurrently, ii) a data decomposition that identifies the data local to each\
    \ one of the tasks, iii) a way of grouping tasks and ordering these tasks groups\
    \ in such a way that temporal and data dependencies are satisfied, and iv) an\
    \ analysis of the dependencies among the tasks.\n\n#### Design Spaces: Algorithm\
    \ Structure\n\nThe output from the *Finding Concurrency* design space is used\
    \ in the *Algorithm Structure* design space to refine the design of our concurrent\
    \ tasks and to create a parallel program structure closer to an actual parallel\
    \ program, suitable to be run on a parallel target architecture.\n\nThere are\
    \ three major dimensions used in organizing a parallel algorithm’s structure:\
    \ by task, by data decomposition, and by flow of data. Note that, while in the\
    \ *Finding Concurrency* design space, you will normally go through all the dimensions\
    \ and their patterns, in the *Algorithm Structure* design space you are required\
    \ to choose one of these three alternative dimensions and implement one of its\
    \ parallel design patterns below.\n\n*   Organizing the parallel algorithm by\
    \ *task*. In this dimension, tasks themselves drive your design. That is, you\
    \ consider the tasks that can be computed in parallel, which tasks in your set\
    \ are concurrent, and then how the tasks are enumerated, linearly or recursively.\
    \ The *organize by tasks* meta-pattern group includes two patterns:\n    *   The\
    \ *Task Parallelism* pattern governs the efficient execution of collections of\
    \ tasks and is used for linear decompositions. The common factor here is that\
    \ “the problem can be decomposed into a collection of tasks that execute concurrently.”^([^(245)](#fn245))\
    \ These tasks can be independent or there can be some dependencies between them.\
    \ In many cases the tasks are also associated with a loop program structure. The\
    \ proposed solution to implement the pattern works out three different points:\
    \ how tasks are defined, the dependencies among tasks, and the scheduling of the\
    \ tasks for concurrent execution, including assigning tasks to different processors\
    \ or threads.\n\n*   The *Divide and Conquer* pattern is used for recursive decompositions\
    \ and implements the well-known divide-and-conquer recursive solution schema where\
    \ a problem is divided up into a number of smaller, identical, sub-problems, which\
    \ are then solved, and the solutions are combined together into a single overall\
    \ solution for the original problem.\n\n*   Organizing the parallel algorithm\
    \ by *data decomposition*, where data is driving the design. Consider the decomposition\
    \ of data into (possibly disjoint) subsets to be used by each task. Again, this\
    \ decomposition can be either linear or recursive: if the data can be distributed\
    \ into discrete data sets and the entire problem can be solved by operating on\
    \ each of the data sets independently, then choose the linear/geometric meta-pattern;\
    \ if the data is organized recursively (say as a binary tree), then choose the\
    \ recursive meta-pattern. The *organize by data* decomposition pattern group includes\
    \ two meta-patterns:\n    *   The *Geometric Decomposition* pattern represents\
    \ computations where the algorithm is recognized as a series of computations on\
    \ some core data structure and where that data structure is inherently linear\
    \ in nature, like an array or table or matrix. With these types of data structures,\
    \ the data can be broken up into contiguous subsets and acted on independently\
    \ by the program. This means that the tasks operating on this data can execute\
    \ concurrently. See the *Distributed Array* meta-pattern below for an example\
    \ of how the *Geometric Distribution* pattern would organize its data.\n\n*  \
    \ The *Recursive Data* pattern works with parallel computations created to work\
    \ with a recursively defined data structure, where the data appears to be acted\
    \ upon sequentially. These tasks generally use links to move from one data element\
    \ to another, as in a linked list, a binary tree, or a graph, but the computations\
