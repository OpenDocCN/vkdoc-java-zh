    两个UML类图，分别标注为`SongIdentifier`（属性：`door`（喂食门），操作：`identify(song: Song): boolean`）和`Song`（属性：`songFile`，操作：`getSong():
    Song`和`equals(song: Song): boolean`）。


    图12-10


    简化`SongIdentifier`和`Song`


