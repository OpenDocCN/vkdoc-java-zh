  trans: "\n## 逐步精化\n\n尼克劳斯·维尔特在其 1971 年的论文《通过逐步精化进行程序开发》中正式提出了结构化设计技术。^((166)) *逐步精化*主张程序设计由一系列精化步骤组成。在每一步中，给定的任务被分解为若干子任务。每次任务精化都必须伴随数据描述和接口的精化。所获得的模块化程度将决定程序适应需求或环境变化的难易程度。\n\
    \n在精化过程中，你使用问题空间自然对应的符号表示。你应尽可能长时间地避免使用编程语言进行描述。每次精化都意味着基于一组设计标准做出若干设计决策。这些标准包括时间和空间效率、清晰度以及结构的规律性（简洁性）。\n\
    \n精化可以自上而下或自下而上两种方式进行。*自上而下*精化的特点是从问题的总体描述出发，逐步深入到各个模块或例程的具体功能陈述。逐步精化背后的指导原则是人类一次只能专注于少数几件事——即米勒著名的\
    \ 7±2 个数据块规则。^((167)) 其工作流程是：\n\n*   分析问题，尝试识别解决方案的轮廓以及每种方案的利弊\n*   然后首先设计顶层结构\n\
    *   避免涉及特定语言的细节\n*   将细节向下推，直至到达底层\n*   形式化每一层\n*   验证每一层\n*   然后进入下一层，进行下一组精化。（即重复此过程。）\n\
    \n你持续精化解决方案，直到感觉直接编码比继续分解更容易为止；本章稍后你将看到一个示例。\n\n关键在于，你要一直工作到对设计的显而易见和简单程度感到不耐烦为止。这里的缺点是，你并没有一个很好的“何时停止”的度量标准。这需要实践积累。\n\
    \n如果你无法从顶层开始，那么就从底层开始，采用*自下而上*的精化方式：\n\n*   问自己：“我知道系统需要做什么？”这通常涉及底层 I/O 操作、其他对数据结构的底层操作等。\n\
    *   根据这个问题，尽可能多地识别出底层函数和组件。\n*   识别底层组件的共同点，并将它们分组。\n*   继续处理上一层，或者回到顶层再次尝试向下分解。\n\
    \n自下而上的精化通常能更早地识别出实用例程，从而带来更紧凑的设计。它还有助于促进复用，因为你复用了底层例程。缺点是，纯粹使用自下而上的评估方法很难——你几乎总会在某个时刻切换到自上而下的方法，因为有时你会发现无法从底层向上拼凑出一个更大的整体。这并非真正的逐步精化，但它可以帮助你起步。大多数实际的逐步精化都涉及自上而下和自下而上设计元素的交替使用。幸运的是，自上而下和自下而上的设计方法可以很好地互补。\n\
    \n### 逐步精化示例：八皇后问题\n\n八皇后问题要求在一个标准的 8x8 棋盘上放置八个皇后，使得任何皇后都不能被其他皇后攻击。请记住，皇后可以沿水平、垂直或对角线方向移动任意数量的格子。图\
    \ 9-1 描绘了八皇后问题的一个可能解。\n\n![](img/270563_3_En_9_Fig1_HTML.jpg)\n\n一个 8x8 棋盘的示意图展示了\
    \ 8 个不同的皇后位置。\n\n图 9-1\n\n八皇后问题的一个解\n\n事实证明，目前还没有人找到这个问题的解析解，而且很可能根本不存在。那么你会如何解决这个问题呢？在继续阅读之前，请花点时间自己思考一下。\n\
    \n想好了吗？好的。让我们看看分解这个问题的一种可能方式。\n\n#### 八皇后：方案一\n\n你首先需要做的是审视问题，梳理出需求和解决方案的轮廓。这将引导你走上回答“顶层分解应该是什么”的道路。\n\
    \n你最初可能会考虑使用暴力法来解决问题：尝试所有可能的皇后排列，然后选出可行的方案。有 8 个皇后和 64 个可能的格子，可能的棋盘配置数为：\n\n![$$\
    \ \\frac{n!}{k!\\left(n-k\\right)!}=\\frac{64!}{56!8!}\\approx {2}^{32} $$](img/270563_3_En_9_Chapter_TeX_Equa.png)\n\
    \n其中 n 是棋盘上的格子数，k 是皇后数（或从可用格子中选择的位置数），结果仅为 4,294,967,296（略超过 40 亿种配置）。如今，这个数字并不算大，因此暴力法可能是一个可行的选择。\n\
    \n如果你生成所有可能棋盘组合的集合 A，你可以创建一个名为*q(x)*的测试，如果棋盘配置 x 是一个解则返回*true*，否则返回*false*。然后你可以编写一个如下所示的程序：\n\
    \n```\n生成所有棋盘配置的集合 A；\n当 A 中还有未测试的配置时，执行\n    x = 从 A 中取下一个配置\n    如果 (q(x) ==\
    \ true) 则打印解 x 并停止\n返回顶部并重复执行。\n```\n\n注意，所有工作都在两个步骤中完成：生成集合 A 和执行测试*q(x)*。集合\
    \ A 的生成只发生一次，但测试*q(x)*会对集合 A 中的每个配置执行一次，直到找到解。虽然这种方法肯定有效，但效率并不高。因此，让我们尝试减少需要考虑的组合数量以加快速度。\n\
    \n#### 八皇后：方案二\n\n在考虑初始暴力法的过程中，你已经做了一些分析，因此对必须完成的任务有了更清晰的认识。为了减少总可能配置的数量，并提出更高效的算法，你需要更创造性地思考这个问题。首先要注意的是，每列中最多只能有一个皇后（是的，每行也是如此，但为了简化，我们先关注列）。每列恰好有一个皇后将可能的组合数减少到\
    \ 2²⁴或仅 1600 万（考虑到要将一个皇后放入每一列，现在只有 8 种可能的选择：行；所以总共是 8⁸或 2²⁴种选择）。虽然这很好，但它并没有真正改变算法太多。你提出的解决方案现在如下所示：\n\
    \n```\n生成受限棋盘配置的集合 B；\n当 B 中还有未测试的配置时，执行\n    x = 从 B 中取下一个配置\n    如果 (q(x) ==\
    \ true) 则打印解 x 并停止\n返回顶部并重复执行。\n```\n\n这个版本需要生成每列恰好有一个皇后的棋盘位置集合 B，并且仍然需要遍历多达 1600\
    \ 万个可能的棋盘位置。生成 B 现在比生成 A 稍微复杂一些，因为你现在必须测试提议的棋盘位置是否满足每列一个皇后的限制。然而，由于你需要测试的配置更少，方案二仍然优于上面的方案一。你还可以做得更好。\n"
- fmt: "#### Eight Queens: Proposed Solution 3\n\nLet’s be even more clever about\
    \ generating and testing board. Instead of generating a complete board configuration\
    \ and then testing it, you can test partial solutions as they are being generated.\
    \ As soon as a board configuration has any queens in conflict, you can reject\
    \ the board without waiting to place the rest of the queens. Also, if you can\
    \ back up from a bad board configuration to the last good partial configuration,\
    \ you can explore the possible configurations more quickly.\n\nNow you’re at the\
    \ point where you can do that top-level design, formalize it, and move down to\
    \ the next refinement level.\n\n##### Solution 3: Refinement 1\n\nTo start generating\
    \ your board, you will place one queen at a time, trying alternatives if you create\
    \ a conflict and backing up if you run out of alternatives. Let’s now formalize\
    \ the steps:\n\nStarting from row 0 and column 0:\n\n1.  Put down a new queen\
    \ on the next row in the next available column.\n2.  Test to see if new queen\
    \ is safe from every other queen already on the board. (That’s a variation on\
    \ the `q(x)` test above.)\n    1.  If new queen is not safe:\n        1.  Try\
    \ placing her on the next row in the current column and repeat step 2.\n     \
    \   2.  If there are no rows left to try, remove the new queen from the board;\
    \ go back to the previous column and move the previous queen to the next row;\
    \ repeat step 2.\n    2.  If new queen is safe:\n        1.  Leave her here and\
    \ go to the next column.\n        2.  Starting from the first row, begin placing\
    \ the next queen.\n\nWith this method, you’re ensuring that the partial solution\
    \ up to your current column `j` is correct. You then attempt to expand to the\
    \ next partial solution by adding a queen in column `j+1`. As new queens are only\
    \ added when all previous queens are safe, the solution must only test the safety\
    \ of the one new queen, which reduces the amount of work in the testing routine.\
    \ If your safety check fails, you back up to your previous valid partial solution\
    \ at column `j` and reconsider remaining alternative positions for the last successfully\
    \ placed queen. Wirth calls this technique of creating and testing partial solutions\
    \ a *stepwise construction of trial solutions*. And the backing up technique is,\
    \ of course, called *backtracking*.\n\nHere’s more formal pseudo-code to find\
    \ a single solution:\n\n```\ndo {\nwhile ((row = 0));\nif (we've reached column\
    \ 8) then\nwe have a solution, print it.\n```\n\nThis algorithm is the first formal\
    \ view of the solution. Notice that above we’re using pseudo-code rather than\
    \ a real programming language, pushing language details even further down the\
    \ refinement levels. Also, while we’ve got a general outline of the method, there\
    \ are a lot of details still to be considered. These details have been pushed\
    \ down in the hierarchy of control we’re creating, and we’ll get to them in the\
    \ next refinement iteration. This is also a function of the stepwise refinement.\n\
    \nNow that you have a description of the algorithm, you can also work to verify\
    \ it. The final verification will be watching the program produce a correct solution,\
    \ but you’re not at that point yet. Nevertheless, you can surely take a chessboard\
    \ (or a piece of paper) and walk through this algorithm by hand to verify that\
    \ you can generate a placement of queens on the board that is a solution to the\
    \ problem.\n\nAt this point you’ve got a more formal top-level description, you’ve\
    \ seen how verification can be done, and you’re ready to expand those fuzzy steps\
    \ shown above.\n\n##### Solution 3: Refinement 2\n\nNow that you’ve got a first\
    \ cut at the program, you need to examine each of the steps in the program and\
    \ see what they are made of. Let’s focus on that innocent-sounding “Test to see\
    \ if new queen is safe from every other queen already on the board.” It’s secretly\
    \ been doing all the heavy lifting in your planned solution and it’s time to figure\
    \ out how.\n\nWhile stepwise refinement is mostly about describing the control\
    \ flow of the program, at some point you need to decide on exactly what the data\
    \ will look like. For each problem you try to solve, this will happen at a different\
    \ point in your refinement process. For this problem, you are finally at a place\
    \ where your next refinement should be writing more detailed pseudo-code. That\
    \ is pretty much forcing you to think about data structures. You need to ask yourself\
    \ how you are going to represent the board with all the queens as well as all\
    \ the empty positions. You need a data structure that will allow you to represent\
    \ queens and check whether they can be attacked. A first cut at this might be\
    \ an 8 x 8 two-dimensional array where you place our queens at some `(row, column)`\
    \ positions. As you are only storing the presence or absence of a queen, you can\
    \ save space by making it a boolean array. This data structure also allows you\
    \ to easily check a new queen’s safety. Let’s break that down.\n\nWhen placing\
    \ a new queen at some position `(row, col)`, you need to check the following:\n\
    \n*   Is this row still free?\n*   Is this column still free?\n*   Is this main\
    \ diagonal still free?\n*   Is this anti-diagonal still free?\n\nIf you choose\
    \ to systematically place one queen per column, you can skip the first check,\
    \ as each following column will still necessarily be free (note that you could\
    \ do the same with rows). This leaves you with the other three checks: row, main\
    \ diagonal, and anti-diagonal. The row check is easy: you can just check all the\
    \ other squares in the same row as the newly placed queen. To check the diagonals,\
    \ you need to find a way to calculate what positions are along either of the diagonals\
    \ from any given `(row, col)`.\n\nLooking at the sets of diagonal positions closely\
    \ in Figure [9-2](#270563_3_En_9_Chapter.xhtml#Fig2), you can see on the left\
    \ image, depicting the main diagonals, that the *difference* between the row and\
    \ column values of all the squares along any single main diagonal is a constant\
    \ value (e.g. zero along the center main diagonal, -1 for the diagonal above it,\
    \ and 1 for the diagonal below it). Similarly, looking at the right side of Figure\
    \ [9-2](#270563_3_En_9_Chapter.xhtml#Fig2), you can see that the *sum* of the\
    \ row and column values of all the squares on any of the anti-diagonals is also\
    \ a constant (e.g. 7 along the center anti-diagonal, 6 for the diagonal above\
    \ it, and 8 for the one below). Thus, given any cell, you can determine if it\
    \ falls on either of the diagonals for queen at a given position.\n\n![](images/270563_3_En_9_Chapter/270563_3_En_9_Fig2_HTML.jpg)\n\
    \nTwo 8 by 8 tables highlight the main diagonals and anti-diagonals. The main\
    \ diagonals are directed downward from left to right. The anti-diagonals are directed\
    \ downward from right to left.\n\nFigure 9-2\n\nMain diagonals (left) and Anti-diagonals\
    \ (right)\n\nNote, however, that you still need to check all the cells and perform\
    \ the addition and subtraction of its coordinates to check if it happens to fall\
    \ along either diagonal of interest for each new queen. That is functional but\
    \ slow. You can do even better!"
