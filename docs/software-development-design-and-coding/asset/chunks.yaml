  trans: "\n## 防御性编程\n\n所谓防御性编程，是指你的代码应能自我保护，免受不良数据的侵害。这些不良数据可能来自命令行、图形文本框或表单的用户输入，也可能来自文件。此外，不良数据还可能源于程序中其他例程通过输入参数传入的数据，如上文第一个示例所示。\n\
    \n如何保护你的程序免受不良数据的侵害？验证！尽管听起来很繁琐，但你始终应该检查从程序外部接收到的数据的有效性。这意味着你应该做到以下几点：\n\n*  \
    \ 检查命令行参数的数量和类型。\n\n*   检查文件操作。\n    *   文件是否成功打开？\n\n    *   读取操作是否返回了内容？\n\n\
    \    *   写入操作是否写入了内容？\n\n    *   是否已到达文件末尾（EOF）？\n\n*   检查函数/方法参数列表中的所有值，确保其类型和大小正确。\n\
    \n*   始终初始化变量，不要依赖系统为你完成初始化。\n\n*   检查空指针（Java 中的引用）、不正确的类型、分母为零以及超出范围的值。\n\n\
    例如，下面是一个 C 程序，它从一个文件中读取房屋价格列表，并计算列表中的平均房价。输入文件通过命令行提供给程序。\n\n```\n/*\n* 程序功能：计算一组房屋的平均售价。\n\
    * 输入：通过命令行传入的文件。\n* 输出：所有房屋的总价和平均售价，\n* 以及文件中的价格数量。\n*\n* jfdooley\n*/\n#include\
    \ \n#include \nint main(int argc, char **argv){\nFILE *fp;\ndouble totalPrice,\
    \ avgPrice;\ndouble price;\nint numPrices;\n/* 检查用户是否输入了正确数量的参数 */\nif (argc \\\
    n\", argv[0]);\nexit(1);\n}\n/* 尝试打开输入文件 */\nfp = fopen(argv[1], \"r\");\nif (fp\
    \ == NULL) {\nfprintf(stderr, \"文件未找到: %s\\n\", argv[1]);\nexit(1);\n}\ntotalPrice\
    \ = 0.0;\nnumPrices = 0;\n/* 读取文件，累加价格并统计房屋数量 */\nwhile (!feof(fp)) {\nfscanf(fp,\
    \ \"%10lf\\n\", &price);274\nif (price <= 0.0) {\nfprintf(stderr, \"错误数据 %10.5f\\\
    n\", price);\nexit(1);\n}\ntotalPrice += price;\nnumPrices++;\n}\navgPrice = totalPrice\
    \ / numPrices;\nprintf(\"房屋数量为 %d\\n\", numPrices);\nprintf(\"所有房屋的总价为 $%10.2f\\\
    n\", totalPrice);\nprintf(\"每栋房屋的平均售价为 $%10.2f\\n\", avgPrice);\nreturn 0;\n}\n\
    ```\n\n### 防御性编程：断言很有用\n\n如果你的编程语言支持断言，那么使用断言可以极大地辅助防御性编程。Java、C99、C11、C23 和 C++\
    \ 都支持断言。断言会测试你提供给它的表达式，如果表达式为假，则会抛出错误并通常中止程序。对于你认为可能发生的错误（例如，错误的用户输入），应使用错误处理代码；而对于*绝不应该*发生的错误（例如，循环中的差一错误），则应使用断言。断言非常适合测试你的程序，但由于在将程序交付给客户之前应移除它们（你肯定不希望程序在用户面前崩溃，对吧？），因此它们不适合在生产程序中用于验证输入数据。\n\
    \n### 防御性编程：异常^(²⁷⁵)\n\n防御性编程的一部分是确保你的程序能够从容地从常见的运行时问题（例如不正确的输入）中恢复，从而使程序尽可能长时间地运行（使你的程序健壮）。虽然*断言*用于处理绝不应该发生的错误，但*异常*应用于处理可恢复的错误，这些错误是正常操作中预期会发生的（例如，FileNotFound\
    \ 异常）。\n\n你应该充分利用你所使用的编程语言中内置的*异常处理*机制。你的程序如何处理异常取决于语言的能力（我们稍后会讨论 Java 中的异常处理）。异常处理机制会向你的程序提供关于刚刚发生了什么错误的信息。然后由你来决定如何处理。通常，在异常处理机制中，你的程序有两个选择：1）自行处理异常，或者\
    \ 2）将异常传递（即抛出）给调用它的代码，让那段代码来处理。\n\n### 防御性编程：错误处理\n\n与验证一样，你最有可能在输入数据中遇到错误，无论是命令行输入、文件处理，还是来自图形用户界面表单的输入。这里我们讨论的是运行时发生的错误。编译时和测试时的错误将在下一章关于调试和测试的内容中介绍。其他类型的错误可能包括：你的程序计算错误的数据、与你的程序交互的其他程序中的错误、操作系统（例如，竞态条件）以及交互错误（即你的程序在与另一个程序通信时，错误出在你的程序一方）。\n\
    \n错误处理的主要目的是让你的程序尽可能长时间地正确运行。当程序运行到无法继续的地步时，它需要尽可能好地报告问题所在，然后优雅地退出。退出是错误处理的最后手段。那么你应该怎么做呢？好吧，我们又回到了“视情况而定”这个答案。你应该怎么做取决于错误发生时程序的上下文以及它的目的。你不会以处理心脏起搏器错误的方式来处理电子游戏中的错误。在任何情况下，你的首要目标都应该是尝试恢复。\n\
    \n恢复意味着你的程序需要尝试忽略错误数据、修复它，或者用其他有效的数据来替代它。关于错误处理的进一步讨论，请参见 McConnell^(²⁷⁶)。以下是一些如何从错误中恢复的示例：\n\
    \n*   你可以*忽略错误数据并继续运行*，使用下一个有效的数据。假设你的程序是数字压力表中的嵌入式软件。你每秒采样返回压力的传感器 60 次。如果传感器有一次未能提供压力读数，你是否应该关闭压力表？可能不需要；一个合理的做法是跳过这次读数，并准备读取下一个到达的数据。但如果压力传感器连续多次跳过读数，那么传感器可能出了问题，你应该采取不同的措施（例如，发出警报或关闭程序所监控的机器）。\n\
    \n*   你可以*用最后一个有效数据来替代*缺失或错误的数据。再次以数字压力表为例，如果传感器错过了一次读数，由于每个时间间隔只有六十分之一秒，缺失的读数很可能与上一次读数非常接近。在这种情况下，你可以用最后一个有效数据来替代缺失的值。\n\
    \n*   有时你可能没有任何先前记录的有效数据。你的应用程序使用异步事件处理程序，因此你没有数据历史记录，但你的程序知道数据应该在一个特定的范围内。假设你提示用户输入一个工资金额，而返回的值是一个负数。显然没有人会得到负数的薪水，所以这个值是错误的。处理这个错误的一种方法（可能不是最好的）是*用范围内最接近的有效值来替代*，在这种情况下是零。虽然这并不理想，但至少你的程序可以继续运行，并且在该字段中拥有一个有效的数据值。\n"
- fmt: "在 C 程序中，几乎所有系统调用和大多数标准库函数都会返回一个值。你应该测试这些值！大多数函数会返回指示成功（非负整数）或失败（负整数，通常为 -1）的值。有些函数会返回一个指示其成功程度的值。例如，`printf()`\
    \ 系列函数返回打印的字符数，而 `scanf()` 系列函数返回读取的输入元素数。大多数 C 函数还会设置一个名为 `errno` 的全局变量，其中包含一个整数，表示发生的错误编号。错误编号列表位于名为\
    \ `errno.h` 的头文件中。`errno` 变量中的零表示成功。任何其他正整数都是发生的错误编号。因为系统会告诉你（1）发生了错误，以及（2）它认为的错误原因，所以你可以做很多不同的事情来处理它，包括仅*报告错误*并退出。\n\
    \n例如，如果你尝试打开一个不存在的文件，程序：\n\n```c\n#include <stdio.h>\n#include <stdlib.h>\n#include\
    \ <errno.h>\nint main(int argc, char **argv) {\n    FILE *fd;\n    char *fname\
    \ = \"NotAFile.txt\";\n    if ((fd = fopen(fname, \"r\")) == NULL) {\n       \
    \ perror(\"File not opened\");\n        exit(1);\n    }\n    printf(\"File exists\\\
    n\");\n    return 0;\n}\n```\n\n将返回错误消息：\n\n```\nFile not opened: No such file\
    \ or directory\n```\n\n函数 `perror()` 读取 `errno` 变量，并使用提供的字符串以及对应于错误编号的标准字符串，将错误消息写入控制台的标准错误输出。该程序还可以提示用户输入不同的文件名，或者替换为默认文件名。这两种方法都允许程序继续运行，而不是因错误而退出。\n\
    \n还有其他用于错误处理和恢复的技术。这些示例应该能让你了解在程序中可以做什么。这里要记住的重要思想是尽可能尝试恢复，但最重要的是，***不要静默失败！***\n\
    \n## 防御性编程：Java 中的异常\n\n一些编程语言具有内置的错误报告系统，当错误发生时，它会通知你，并让你自行决定如何处理。这些通常会导致程序惨死的错误被称为*异常*。遇到错误的代码会*抛出*异常。一旦抛出异常，通常最好让程序的某个部分*捕获*它。因此，在编写代码时，你需要了解异常的两个方面：\n\
    \n-   当有一段可能遇到错误的代码时，你*抛出*一个异常。像 Java 这样的系统会为你抛出一些异常。这些异常在 Java API 文档的 `Exception`\
    \ 类中列出（参见 [`https://docs.oracle.com/en/java/javase/20/docs/api/index.html`](https://docs.oracle.com/en/java/javase/20/docs/api/index.html)）。你也可以编写自己的代码来抛出异常。我们将在本章后面提供一个示例。\n\
    \n-   一旦抛出异常，程序的某个其他部分必须*捕获*它。如果你在程序中什么都不做，这个*未捕获的异常*将沿着调用栈向上传播到 Java 虚拟机（JVM）并在那里被捕获。JVM\
    \ 将终止你的程序，并提供一个堆栈回溯，该回溯应引导你回到代码中最初导致异常抛出的位置，并显示你是如何到达那里的。另一方面，你也可以编写代码来封装可能生成异常的调用，并使用\
    \ Java 的 `try-catch` 机制自己捕获它们。Java 要求某些异常必须被捕获。稍后你将看到一个示例。\n\nJava 有三种不同类型的异常：错误、受检异常和运行时异常。\n\
    \n*错误*，另一方面，是通常与程序外部发生的事情相关的异常，并且是你除了优雅地失败之外无能为力的事情。你可能会尝试捕获错误异常并为用户提供一些输出，但你通常仍然必须退出。\n\
    \n*受检异常*是那些你应该使用异常处理器自己捕获和处理的异常；它们是你应该在设计和编写代码时预见并处理的异常。例如，如果你的代码要求用户输入文件名，你应该预见到他们会输错，并准备好捕获由此产生的\
    \ `FileNotFoundException`。受检异常必须被捕获。\n\n第三种类型的异常是*运行时异常*。运行时异常都源于程序运行时内部出现的问题，并且几乎总是表明代码中存在错误。例如，`NullPointerException`\
    \ 几乎总是表明代码中存在错误，并以运行时异常的形式出现。^([^(277)](#fn277)) 错误和运行时异常统称为*非受检异常*（这是因为你通常不会尝试捕获它们，所以它们是非受检的）。在这个程序中，你故意引发了一个运行时异常：\n\
    \n```java\npublic class TestNull {\n    public static void main(String[] args)\
    \ {\n        String str = null;\n        int len = str.length();\n    }\n}\n```\n\
    \n这个程序可以正常编译，但当你运行它时，你会得到如下输出：\n\n```\nException in thread \"main\" java.lang.NullPointerException\n\
    \        at TestNull.main(TestNull.java:4)\n```\n\n这是一个典型的运行时异常。没有必要捕获这个异常，因为唯一能安全做的事情就是退出。如果你捕获它，程序可能看起来像这样：\n\
    \n```java\npublic class TestNullCatch {\n    public static void main(String[]\
    \ args) {\n        String str = null;\n        try {\n            int len = str.length();\n\
    \        } catch (NullPointerException e) {\n            System.out.println(\"\
    Error. Found a pointer: \" + e.getMessage());\n            System.exit(1);\n \
    \       }\n    }\n}\n```\n\n这给了我们输出：\n\n```\nError. Found a pointer: null\n```\n\
    \n请注意，`getMessage()` 方法将返回一个包含 Java 认为合适的任何错误消息的 `String`（如果有的话）。否则，它返回 `null`。这比上面的默认堆栈跟踪帮助要小一些。\n\
    \n让我们用 Java 重写上一节中的简短 C 程序，并说明如何捕获*受检异常*。\n\n```java\nimport java.io.*;\nimport\
    \ java.util.*;\npublic class FileTest {\n    public static void main(String []\
    \ args) {\n        File fd = new File(\"NotAFile.txt\");\n        System.out.println(\"\
    File exists \" + fd.exists());\n        try {\n            FileReader fr = new\
    \ FileReader(fd);\n        } catch (FileNotFoundException e) {\n            System.out.println(e.getMessage());\n\
    \        }\n    }\n}\n```\n\n当你执行 `FileTest` 时得到的输出是：\n\n```\nFile exists false\n\
    NotAFile.txt (No such file or directory)\n```\n\n顺便说一下，如果你在上面的程序中没有使用 `try-catch`\
    \ 块，它将无法编译。你会得到这个编译器错误消息：\n\n```\nFileTestWrong.java:11: unreported exception\
    \ java.io.FileNotFoundException; must be caught or declared to be thrown\n   \
    \     FileReader fr = new FileReader(fd);\n        ^\n1 error\n```\n\n请记住，在 Java\
    \ 中，受检异常**必须**被捕获。这种类型的错误不会出现在非受检异常中。这远非你应该了解的关于 Java 异常和异常处理的全部内容；开始深入研究 Java\
    \ 教程和 Java API 吧！"
  raw: "*   In C programs, nearly all system calls and most of the standard library\
    \ functions return a value. You should test these values! Most functions will\
    \ return values that indicate success (a non-negative integer) or failure (a negative\
    \ integer, usually -1). Some functions return a value that indicates how successful\
    \ they were. For example, the `printf()` family of functions returns the number\
    \ of characters printed, and the `scanf()` family returns the number of input\
    \ elements read. Most C functions also set a global variable named `errno` that\
    \ contains an integer value that is the number of the error that occurred. The\
    \ list of error numbers is in a header file called `errno.h.` A zero in the `errno`\
    \ variable indicates success. Any other positive integer value is the number of\
    \ the error that occurred. Because the system tells you (1) an error occurred\
    \ and (2) what it thinks is the cause of the error, you can do lots of different\
    \ things to handle it, including just *reporting the error* and bailing out.\n\
    \nFor example, if you try to open a file that doesn’t exist, the program\n\n```\n\
    \    #include \n    #include \n    #include \n    int main(int argc, char **argv)\
    \ {\n    FILE *fd;\n    char *fname = “NotAFile.txt\";\n    if ((fd = fopen(fname,\
    \ \"r\")) == NULL) {\n    perror(\"File not opened\");\n    exit(1);\n    }\n\
    \    printf(\"File exists\\n\");\n    return 0;\n    }\n    ```\n\nwill return\
    \ the error message\n\n```\n    File not opened: No such file or directory\n \
    \   ```\n\nThe function `perror()` reads the `errno` variable and, using the string\
    \ provided plus a standard string corresponding to the error number, writes an\
    \ error message to the console’s standard error output. This program could also\
    \ prompt the user for a different file name or it could substitute a default file\
    \ name. Either of these would allow the program to continue rather than exiting\
    \ on the error.\n\nThere are other techniques to use in error handling and recovery.\
    \ These examples should give you a flavor of what you can do within your program.\
    \ The important idea to remember here is to attempt recovery if possible, but\
    \ most of all, ***do not fail silently!***\n\n### Defensive Programming: Exceptions\
    \ in Java\n\nSome programming languages have built-in error reporting systems\
    \ that will tell you when an error occurs and leave it up to you to handle it\
    \ one way or another. These errors that would normally cause your program to die\
    \ a horrible death are called *exceptions*. The code that encounters the error\
    \ *throws* the exception. Once something is thrown, it’s usually a good idea if\
    \ some part of the program *catches* it. So there are two sides to exceptions\
    \ that you need to be aware of when you’re writing code:\n\n*   When you have\
    \ a piece of code that can encounter an error you *throw* an exception. Systems\
    \ like Java will throw some exceptions for you. These exceptions are listed in\
    \ the `Exception` class in the Java API documentation (see [`https://docs.oracle.com/en/java/javase/20/docs/api/index.html`](https://docs.oracle.com/en/java/javase/20/docs/api/index.html)`)`.\
    \ You can also write your own code to throw exceptions. We’ll have an example\
    \ later in the chapter.\n\n*   Once an exception is thrown, some other part of\
    \ the program has to *catch* it. If you don’t do anything in your program, this\
    \ *uncaught exception* will percolate up the call stack to the Java Virtual Machine\
    \ (the JVM) and be caught there. The JVM will kill your program and provide you\
    \ with a stack backtrace that should lead you back to the place in your code that\
    \ originally caused the exception to be thrown and show you how you got there.\
    \ On the other hand, you can also write code to encapsulate the calls that might\
    \ generate exceptions and catch them yourself using Java’s `try-catch` mechanism.\
    \ Java requires that some exceptions must be caught. You’ll see an example later.\n\
    \nJava has three different types of exceptions: errors, checked exceptions, and\
    \ runtime exceptions.\n\n*Errors*, on the other hand, are exceptions that usually\
    \ are related to things happening outside of your program and are things you can’t\
    \ do anything about except fail gracefully. You might try to catch the error exception\
    \ and provide some output for the user, but you will still usually have to exit.\n\
    \n*Checked exceptions* are those that you should catch and handle yourself using\
    \ an exception handler; they are exceptions that you should anticipate and handle\
    \ as you design and write your code. For example, if your code asks a user for\
    \ a file name, you should anticipate that they will type it wrong and be prepared\
    \ to catch the resulting `FileNotFoundException`. Checked exceptions must be caught.\n\
    \nThe third type of exception is the *runtime exception*. Runtime exceptions all\
    \ result from problems within your program that occur as it runs and almost always\
    \ indicate errors in your code. For example, a `NullPointerException` nearly always\
    \ indicates a bug in your code and shows up as a runtime exception.^([^(277)](#fn277))\
    \ Errors and runtime exceptions are collectively called *unchecked exceptions*\
    \ (this is because you usually don’t try to catch them, so they’re unchecked).\
    \ In this program, you deliberately cause a runtime exception:\n\n```\npublic\
    \ class TestNull {\npublic static void main(String[] args) {\nString str = null;\n\
    int len = str.length();\n}\n}\n```\n\nThis program will compile just fine, but\
    \ when you run it, you’ll get this as output:\n\n```\nException in thread \"main\"\
    \ java.lang.NullPointerException\nat TestNull.main(TestNull.java:4)\n```\n\nThis\
    \ is a classic runtime exception. There’s no need to catch this exception because\
    \ the only thing you can do safely is exit. If you do catch it, the program might\
    \ look like\n\n```\npublic class TestNullCatch {\npublic static void main(String[]\
    \ args) {\nString str = null;\ntry {\nint len = str.length();\n} catch (NullPointerException\
    \ e) {\nSystem.out.println(\"Error. Found a pointer: \" + e.getMessage());\nSystem.exit(1);\n\
    }\n}\n}\n```\n\nwhich gives us the output\n\n```\nError. Found a pointer: null\n\
    ```\n\nNote that the getMessage() method will return a String containing whatever\
    \ error message Java deems appropriate—if there is one. Otherwise, it returns\
    \ a `null`. This is somewhat less helpful than the default stack trace above.\n\
    \nLet’s rewrite the short C program from the previous section in Java and illustrate\
    \ how to catch a *checked exception*.\n\n```\nimport java.io.*;\nimport java.util.*;\n\
    public class FileTest {\npublic static void main(String [] args) {\nFile fd =\
    \ new File(\"NotAFile.txt\");\nSystem.out.println(\"File exists \" + fd.exists());\n\
    try {\nFileReader fr = new FileReader(fd);\n} catch (FileNotFoundException e)\
    \ {\nSystem.out.println(e.getMessage());\n}\n}\n}\n```\n\nand the output you get\
    \ when you execute `FileTest` is\n\n```\nFile exists false\nNotAFile.txt (No such\
    \ file or directory)\n```\n\nBy the way, if you don’t use the `try-catch` block\
    \ in the above program, it won’t compile. You get this compiler error message:\n\
    \n```\nFileTestWrong.java:11: unreported exception java.io.FileNotFoundException;\
    \ must be caught or declared to be thrown\nFileReader fr = new FileReader(fd);\n\
    ^\n1 error\n```\n\nRemember, in Java checked exceptions **must** be caught. This\
    \ type of error doesn’t show up for unchecked exceptions. This is far from everything\
    \ you should know about exceptions and exception handling in Java; start digging\
    \ through the Java tutorials and the Java API!"
  trans: "\n*   在 C 程序中，几乎所有系统调用和大多数标准库函数都会返回一个值。你应该测试这些返回值！大多数函数会返回表示成功（非负整数）或失败（负整数，通常为-1）的值。有些函数会返回一个表示其成功程度的数值。例如，`printf()`\
    \ 系列函数返回打印的字符数，而 `scanf()` 系列函数返回读取的输入元素数量。大多数 C 函数还会设置一个名为 `errno` 的全局变量，其中包含一个整数值，即发生的错误编号。错误编号列表位于名为\
    \ `errno.h` 的头文件中。`errno` 变量中的零表示成功。任何其他正整数都是发生的错误编号。由于系统会告诉你（1）发生了错误以及（2）它认为的错误原因，你可以采取多种不同的方式来处理它，包括仅仅*报告错误*并退出。\n\
    \n例如，如果你尝试打开一个不存在的文件，程序\n\n```\n    #include \n    #include \n    #include \n\
    \    int main(int argc, char **argv) {\n    FILE *fd;\n    char *fname = “NotAFile.txt\"\
    ;\n    if ((fd = fopen(fname, \"r\")) == NULL) {\n    perror(\"File not opened\"\
    );\n    exit(1);\n    }\n    printf(\"File exists\\n\");\n    return 0;\n    }\n\
    \    ```\n\n将返回错误消息\n\n```\n    File not opened: No such file or directory\n \
    \   ```\n\n函数 `perror()` 会读取 `errno` 变量，并使用提供的字符串加上与错误编号对应的标准字符串，将错误消息写入控制台的标准错误输出。这个程序也可以提示用户输入另一个文件名，或者使用一个默认文件名。这两种方式都能让程序继续运行，而不是因错误而退出。\n\
    \n错误处理和恢复还有其他技术。这些示例应该能让你了解在程序中可以做什么。这里要记住的重要思想是，尽可能尝试恢复，但最重要的是，***不要静默失败！***\n\
    \n### 防御性编程：Java 中的异常\n\n一些编程语言内置了错误报告系统，当错误发生时，它会通知你，并让你自行决定如何处理。这些通常会导致程序悲惨死亡的错误被称为*异常*。遇到错误的代码会*抛出*异常。一旦有东西被抛出，通常最好让程序的某个部分*捕获*它。因此，在编写代码时，你需要了解异常的两个方面：\n\
    \n*   当一段代码可能遇到错误时，你*抛出*一个异常。像 Java 这样的系统会为你抛出一些异常。这些异常在 Java API 文档的 `Exception`\
    \ 类中列出（参见 [`https://docs.oracle.com/en/java/javase/20/docs/api/index.html`](https://docs.oracle.com/en/java/javase/20/docs/api/index.html)`)`）。你也可以编写自己的代码来抛出异常。我们将在本章后面给出一个示例。\n\
    \n*   一旦抛出异常，程序的另一部分必须*捕获*它。如果你在程序中什么都不做，这个*未捕获的异常*会沿着调用栈向上传播到 Java 虚拟机（JVM）并在那里被捕获。JVM\
    \ 会终止你的程序，并提供一个堆栈回溯信息，该信息应能引导你回到代码中最初导致异常抛出的位置，并显示你是如何到达那里的。另一方面，你也可以编写代码来封装可能产生异常的函数调用，并使用\
    \ Java 的 `try-catch` 机制自行捕获它们。Java 要求某些异常必须被捕获。稍后你会看到一个示例。\n\nJava 有三种不同类型的异常：错误、受检异常和运行时异常。\n\
    \n*错误*，另一方面，是通常与程序外部发生的事情相关的异常，除了优雅地失败之外，你对此无能为力。你可以尝试捕获错误异常并为用户提供一些输出，但通常你仍然必须退出。\n\
    \n*受检异常*是那些你应该使用异常处理器自行捕获和处理的异常；它们是你应该在设计和编写代码时预见并处理的异常。例如，如果你的代码要求用户输入文件名，你应该预见到他们会输错，并准备好捕获由此产生的\
    \ `FileNotFoundException`。受检异常必须被捕获。\n\n第三种类型的异常是*运行时异常*。运行时异常都源于程序运行时内部出现的问题，并且几乎总是表明你的代码中存在错误。例如，`NullPointerException`\
    \ 几乎总是表明你的代码中存在一个 bug，并以运行时异常的形式出现。^(²⁷⁷) 错误和运行时异常统称为*非受检异常*（这是因为你通常不会试图捕获它们，所以它们是不受检查的）。在这个程序中，你故意引发了一个运行时异常：\n\
    \n```\npublic class TestNull {\npublic static void main(String[] args) {\nString\
    \ str = null;\nint len = str.length();\n}\n}\n```\n\n这个程序可以正常编译，但当你运行它时，你会得到如下输出：\n\
    \n```\nException in thread \"main\" java.lang.NullPointerException\nat TestNull.main(TestNull.java:4)\n\
    ```\n\n这是一个典型的运行时异常。没有必要捕获这个异常，因为唯一能安全做的事情就是退出。如果你确实捕获了它，程序可能看起来像这样：\n\n```\n\
    public class TestNullCatch {\npublic static void main(String[] args) {\nString\
    \ str = null;\ntry {\nint len = str.length();\n} catch (NullPointerException e)\
    \ {\nSystem.out.println(\"Error. Found a pointer: \" + e.getMessage());\nSystem.exit(1);\n\
    }\n}\n}\n```\n\n这给了我们输出：\n\n```\nError. Found a pointer: null\n```\n\n请注意，`getMessage()`\
    \ 方法将返回一个包含 Java 认为合适的任何错误消息的字符串（如果有的话）。否则，它返回 `null`。这比上面的默认堆栈跟踪信息量要少一些。\n\n\
    让我们用 Java 重写上一节中的简短 C 程序，并说明如何捕获一个*受检异常*。\n\n```\nimport java.io.*;\nimport java.util.*;\n\
    public class FileTest {\npublic static void main(String [] args) {\nFile fd =\
    \ new File(\"NotAFile.txt\");\nSystem.out.println(\"File exists \" + fd.exists());\n\
    try {\nFileReader fr = new FileReader(fd);\n} catch (FileNotFoundException e)\
    \ {\nSystem.out.println(e.getMessage());\n}\n}\n}\n```\n\n当你执行 `FileTest` 时得到的输出是：\n\
    \n```\nFile exists false\nNotAFile.txt (No such file or directory)\n```\n\n顺便说一下，如果你在上面的程序中没有使用\
    \ `try-catch` 块，它将无法编译。你会得到这个编译器错误消息：\n\n```\nFileTestWrong.java:11: unreported\
    \ exception java.io.FileNotFoundException; must be caught or declared to be thrown\n\
    FileReader fr = new FileReader(fd);\n^\n1 error\n```\n\n记住，在 Java 中，受检异常**必须**被捕获。这种类型的错误不会出现在非受检异常中。这远非你应该了解的关于\
    \ Java 异常和异常处理的全部内容；开始深入研究 Java 教程和 Java API 吧！\n"
- fmt: '# Conclusion


    Coding is the heart of software development. Code is what you produce. But coding
    is hard; translating even a good, detailed design into code takes a lot of thought,
    experience, and knowledge, even for small programs. Depending on the programming
    language you are using and the target system, programming can be a very time-consuming
    and difficult task. That’s why taking the time to make your code readable and
    have the code layout match the logical structure of your design is essential to
    writing code that works and is understandable by humans. Adhering to coding standards
    and conventions, keeping to a consistent style, and including good, accurate comments
    will help you immensely during debugging and testing. And it will help you six
    months from now when you come back and try to figure out what the heck you were
    thinking here.


    And finally,


    > *I am rarely happier than when spending an entire day programming my computer
    to perform automatically a task that it would otherwise take me a good ten seconds
    to do by hand.*

    >

    > —Douglas Adams, “Last Chance to See”


    # Debugging


    > *As soon as we started programming, we found to our surprise that it wasn’t
    as easy to get programs right as we had thought. Debugging had to be discovered.
    I can remember the exact instant when I realized that a large part of my life
    from then on was going to be spent in finding mistakes in my own programs.*

    >

    > —Maurice Wilkes, 1949


    > *It is a painful thing to look at your own trouble and know that you yourself
    and no one else has made it.*

    >

    > —Sophocles


    Congratulations! You’ve finished writing your code so now it’s time to get it
    working. No matter how good of a programmer you are, mistakes will happen: logical
    mistakes, typos, forgotten edge cases, off-by-one errors, your keyboard failing
    to register a keystroke, your cat making some edits while you weren’t looking...
    Mistakes are a natural part of the code’s lifecycle. After writing code for many
    years, we have gotten to the point where most of the time our programs under 50
    lines don’t have any *obvious* errors and often even compile on the first try,
    behaving approximately as expected. We think that’s a pretty solid place to aim
    for.


    Getting your program to work is a process with three parts, the order of which
    is the subject of some debate: debugging, reviewing/inspecting, and testing.


    *Debugging* is the process of finding the *root cause* of an error and fixing
    it. This doesn’t mean treating the symptoms of an error by coding around it to
    make it go away; it means finding the real reason for the error and fixing that
    piece of code so the error is removed. Debugging is normally done once you finish
    writing the code and before you do a code review or unit testing (but see *test-driven
    development* later in this chapter). Debugging and unit testing can also be done
    simultaneously.


    *Reviewing* (or inspecting) is the process of reading the code as it sits on the
    page and *looking for errors*. The errors can include errors in how you’ve implemented
    the design, other kinds of logic errors, wrong comments, and so on. Reviewing
    code is an inherently *static* process because the program isn’t running on a
    computer—you’re reading it off a screen or a piece of paper. So while reviewing
    is great for finding static errors, it can’t find dynamic or interaction errors
    in your code. That’s what testing is for. We’ll talk more about reviews and inspections
    in a future chapter.


    *Testing* is the process of *finding errors* in the code, as opposed to fixing
    them, which is what debugging is all about. Testing occurs, at a minimum, at the
    following three different levels:


    *   *Unit testing*, where you test small pieces of your code, notably at the function
    or method level.


    *   *Integration testing*, where you put together several modules or classes that
    relate to each other and test them together. Integration testing is particularly
    important when you are working on a team, testing that code you have written works
    with that written by other team members.


    *   *System testing*, where you test the entire program from the user’s perspective.
    This is also called *black-box testing* because the tester doesn’t know how the
    code was implemented; all they know is what the requirements are, so they’re testing
    to see if the code as written fulfills all the requirements.


    We’ll focus on debugging in this chapter. Unit testing involves finding the errors
    in your program, while debugging involves finding the root cause and fixing those
    errors. Debugging is about finding out why an error occurs in your program. You
    can look at errors as opportunities to learn more about the program and about
    how you work and approach problem solving. After all, debugging is a problem-solving
    activity, just as developing a program is problem solving. Look at debugging as
    an opportunity to learn about yourself and improve your skill set.'
