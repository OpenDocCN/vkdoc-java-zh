- fmt: "# 16. Code Construction\n\n> *Mostly, when you see programmers, they aren’t\
    \ doing anything. One of the attractive things about programmers is that you cannot\
    \ tell whether or not they are working simply by looking at them. Very often they’re\
    \ sitting there seemingly drinking coffee and gossiping, or just staring into\
    \ space. What the programmer is trying to do is get a handle on all the individual\
    \ and unrelated ideas that are scampering around in his head.*\n> \n> —Charles\
    \ M. Strauss^([^(257)](#fn257))\n\n> *Great software, likewise, requires a fanatical\
    \ devotion to beauty. If you look inside good software, you find that parts no\
    \ one is ever supposed to see are beautiful too. I’m not claiming I write great\
    \ software, but I know that when it comes to code I behave in a way that would\
    \ make me eligible for prescription drugs if I approached everyday life the same\
    \ way. It drives me crazy to see code that’s badly indented, or that uses ugly\
    \ variable names.*\n> \n> —Paul Graham^([^(258)](#fn258))\n\nWe are finally getting\
    \ to the real heart of software development: writing the code. The purpose of\
    \ this chapter is to provide some tips for writing *better* code, because we can\
    \ all write better code. Our assumption throughout this discussion is that you\
    \ already *do* know how to write code in at least one programming language. This\
    \ chapter presents examples in a couple of languages, each chosen to best illustrate\
    \ the points being made.\n\nFor plan-driven process developers (see Chapter [2](#270563_3_En_2_Chapter.xhtml)),\
    \ coding is the tail that wags the development-process dog. Once you finish the\
    \ detailed requirements, architecture, and detailed design, the code should just\
    \ flow out of the final design, right? Well, in 20 years of industry software\
    \ development experience, we never saw this happen. Coding is hard; translating\
    \ even a good, detailed design into code takes a lot of thought, experience, and\
    \ knowledge, even for small programs. Depending on the programming language you\
    \ are using and the target system, programming can be a very time-consuming and\
    \ difficult task. On the other hand, for very large projects that employ dozens\
    \ or even hundreds of developers, having a very detailed design is critical to\
    \ success, so don’t write off the plan-driven process just yet.\n\nFor the agile\
    \ development process, coding is it.^([^(259)](#fn259)) The Agile Manifesto ([`https://agilemanifesto.org`](https://agilemanifesto.org/))\
    \ says it at the very beginning: “Working software over comprehensive documentation.”\
    \ Agile developers favor creating code early and often; they believe in delivering\
    \ software to their customers frequently and using feedback from the customers\
    \ to make the product better. They welcome changes in requirements and see them\
    \ as an opportunity to refactor the code, make the product more usable for their\
    \ customer, and easier to maintain for the developers. This doesn’t mean that\
    \ coding gets any easier when using an agile process; it means that your focus\
    \ is different. Rather than focus on requirements and design and getting them\
    \ nailed down as early as possible, in agile processes you focus on delivering\
    \ working code to your customer as quickly and as often as possible. You change\
    \ the code often, and the entire team owns all the code and so has permission\
    \ to change anything if it’s appropriate.\n\nYour code has three audiences:\n\n\
    * The machine that’s the target of the compiled version of the code, what will\
    \ actually get executed\n* The people, including yourself, who will *read* it\
    \ in order to understand it and modify it\n* The user who will use the program\
    \ that you create to accomplish some goal\n\nTo those ends, your code needs to\
    \ fulfill the requirements, implement the design, and also be readable and easy\
    \ to understand. We’ll be focusing on the readability and understandability parts\
    \ of these ends first and then look at some issues related to performance and\
    \ process.\n\nThis chapter is not exhaustive and will not give you all the hints,\
    \ tips, and techniques for writing great code; there are entire books for that,\
    \ some of which are mentioned below and in the references at the end of this chapter.\
    \ Two of the best books on coding around are Steve McConnell’s *Code Complete\
    \ 2: A Practical Handbook of Software Construction*^([^(260)](#fn260)) and Hunt\
    \ and Thomas’ *The Pragmatic Programmer*.^([^(261)](#fn261))\n\nSteve McConnell’s\
    \ *Code Complete 2: A Practical Handbook of Software Construction* is a massive,\
    \ 960-page tome that takes you through what makes good code. McConnell discusses\
    \ everything from variable names, to function organization, to code layout, to\
    \ defensive programming, to controlling loops. It is in McConnell’s book where\
    \ the “software construction” metaphor comes from, which suggests that building\
    \ a software application is similar to constructing a building. Small buildings\
    \ (Fido’s doghouse, for example) are easier to build, require less planning, and\
    \ are easier to change (refactor) if something goes wrong. Larger buildings (your\
    \ house) require more detail, more planning, and more coordination largely because\
    \ it’s more than a one-person job. Really big buildings (skyscrapers) require\
    \ many detailed levels of both design and planning, close coordination, and many\
    \ processes to handle change and errors. Although the building construction model\
    \ isn’t perfect (it doesn’t handle incremental development well and McConnell\
    \ also talks about an accretion model, where one layer of software is added to\
    \ an existing layer much like a pearl is created in an oyster), the metaphor gives\
    \ you a clear view of the idea that software gets much more complicated and difficult\
    \ to build the larger it gets.\n\nThe second classic book is Hunt and Thomas’\
    \ *The Pragmatic Programmer*, organized as 46 short sections containing 70 tips\
    \ that provide a clear vision of how you should act as a programmer. It provides\
    \ practical advice on a range of topics from source code control, to testing,\
    \ to assertions, to the DRY (Don’t Repeat Yourself) principle, some of which we’ll\
    \ cover later in this chapter. Hunt and Thomas themselves do the best job of describing\
    \ what the book and what pragmatic programming is all about:\n\n> *\"Programming\
    \ is a craft. At its simplest, it comes down to getting a computer to do what\
    \ you want it to do (or what your user wants it to do). As a programmer, you are\
    \ part listener, part advisor, part interpreter, and part dictator. You try to\
    \ capture elusive requirements and find a way of expressing them so that a mere\
    \ machine can do them justice. You try to document your work so that others can\
    \ understand it, and you try to engineer your work so that others can build on\
    \ it. What’s more, you try to do all this against the relentless ticking of the\
    \ project clock. You work small miracles every day. It’s a difficult job.\"*"
