    job it is to evaluate and fix errors in released code. Ideally, people on this
    support team will rotate in and out from the company’s development teams, so that
    some institutional memory of the project is present on the support team.


    ## Conclusion


    A second or third set of eyes on your code is always a good thing. Code that is
    reviewed by others is improved and brings you closer to the Platonic ideal of
    defect-free software. Walkthroughs, code reviews, and formal code inspections
    each have their place in the array of tools used to improve code quality. The
    more of these tools you have in your toolbox, the better programmer you are. The
    combination of reviews, debugging, and unit testing will find the vast majority
    of defects in your code and is the best thing that a developer can do to help
    release defect-free code.'
