  trans: "\n# 16. 代码构建\n\n> *大多数时候，当你看到程序员时，他们似乎什么都没做。程序员的一个迷人之处在于，你无法仅凭观察就判断他们是否在工作。他们常常坐在那里，看似在喝咖啡闲聊，或者只是凝视着虚空。程序员真正在做的，是试图理清脑海中那些四处奔窜、互不关联的零散想法。*\n\
    > \n> ——查尔斯·M·斯特劳斯^(²⁵⁷)\n\n> *伟大的软件同样需要对美的狂热追求。如果你审视优秀软件的内部，你会发现那些本不该被任何人看到的部件也同样优美。我并非声称自己能写出伟大的软件，但我知道，在对待代码时，我的行为方式如果用在日常生活中，足以让我需要处方药来稳定情绪。看到缩进糟糕或使用丑陋变量名的代码，会让我抓狂。*\n\
    > \n> ——保罗·格雷厄姆^(²⁵⁸)\n\n我们终于触及了软件开发的真正核心：编写代码。本章旨在提供一些编写*更优质*代码的技巧，因为我们都能写出更好的代码。在整个讨论中，我们假设你已经*确实*掌握至少一门编程语言。本章将用几种语言举例，每种语言都经过精心挑选，以最好地说明所阐述的观点。\n\
    \n对于计划驱动型流程的开发者（见第 2 章）而言，编码是那条“摇动开发流程这条狗”的尾巴。一旦你完成了详细的需求、架构和详细设计，代码就应该从最终设计中自然流淌出来，对吗？然而，凭借\
    \ 20 年的行业软件开发经验，我们从未见过这种情况发生。编码是困难的；即使是一个优秀、详细的设计，将其转化为代码也需要大量的思考、经验和知识，即便是小程序也不例外。根据你使用的编程语言和目标系统，编程可能是一项非常耗时且艰巨的任务。另一方面，对于需要数十甚至数百名开发者的大型项目，拥有非常详细的设计对成功至关重要，所以先别急着否定计划驱动型流程。\n\
    \n对于敏捷开发流程而言，编码就是一切。^(²⁵⁹)《敏捷宣言》（[`https://agilemanifesto.org`](https://agilemanifesto.org/)）开篇即言：“可工作的软件胜于详尽的文档。”敏捷开发者倾向于尽早并频繁地创建代码；他们相信应频繁地向客户交付软件，并利用客户的反馈来改进产品。他们欢迎需求变更，并将其视为重构代码、使产品对客户更易用、对开发者更易维护的机会。这并不意味着使用敏捷流程编码会变得更容易；而是意味着你的关注点不同了。在敏捷流程中，你不是专注于尽早敲定需求和设计，而是专注于尽可能快速、频繁地向客户交付可工作的代码。你经常修改代码，整个团队拥有所有代码的所有权，因此只要合适，任何成员都有权修改任何内容。\n\
    \n你的代码有三个受众：\n\n*   代码编译版本的目标机器，即实际执行代码的机器\n*   包括你自己在内的、为了理解和修改而*阅读*代码的人\n* \
    \  使用你创建的程序来完成某些目标的用户\n\n为此，你的代码需要满足需求、实现设计，同时还要具备可读性和易于理解。我们将首先关注这些目标中的可读性和可理解性部分，然后探讨一些与性能和流程相关的问题。\n\
    \n本章并非面面俱到，也不会提供编写优秀代码的所有提示、技巧和技术；这方面有专门的书籍，本章后面及参考文献中会提到一些。关于编码的两本最佳著作是史蒂夫·麦康奈尔的《代码大全\
    \ 2：软件构建实践手册》^(²⁶⁰)以及亨特和托马斯的《程序员修炼之道》^(²⁶¹)。\n\n史蒂夫·麦康奈尔的《代码大全 2：软件构建实践手册》是一本厚达\
    \ 960 页的巨著，带你深入了解优秀代码的构成要素。麦康奈尔讨论了从变量命名、函数组织、代码布局、防御性编程到循环控制等方方面面。“软件构建”这个比喻正是源自麦康奈尔的书，它暗示构建软件应用程序类似于建造建筑物。小型建筑（例如菲多的狗屋）更容易建造，需要的规划更少，出问题时也更容易更改（重构）。较大的建筑（你的房子）需要更多细节、更多规划和更多协调，很大程度上因为这不再是单人工作。真正的大型建筑（摩天大楼）需要多个详细的设计和规划层级、紧密的协调以及许多处理变更和错误的流程。尽管建筑构建模型并不完美（它不能很好地处理增量开发，麦康奈尔也讨论了一种“增生模型”，即一层软件被添加到现有层之上，就像珍珠在牡蛎中形成一样），但这个比喻清晰地传达了这样一个观点：软件越大，构建起来就越复杂、越困难。\n\
    \n第二本经典著作是亨特和托马斯的《程序员修炼之道》，全书由 46 个简短章节组成，包含 70 条技巧，清晰地阐述了程序员应有的行为方式。它提供了关于源代码控制、测试、断言、DRY（不要重复自己）原则等一系列主题的实用建议，其中一些我们将在本章后面讨论。亨特和托马斯本人对这本书以及实用主义编程的精髓做了最好的描述：\n\
    \n> *“编程是一门手艺。简单来说，就是让计算机做你想让它做的事（或者你的用户想让它做的事）。作为一名程序员，你既是倾听者，也是顾问，既是翻译者，也是决策者。你试图捕捉难以捉摸的需求，并找到一种方式来表达它们，以至于一台纯粹的机器也能恰当地实现它们。你试图记录你的工作，以便他人能够理解；你试图设计你的工作，以便他人能够在此基础上进行构建。更重要的是，你必须在项目时钟无情的滴答声中努力完成这一切。你每天都在创造小小的奇迹。这是一份艰难的工作。”*\n"
- fmt: '## A coding example


    In *Code Complete 2*, Steve McConnell gives an example of bad code^([(262)](#fn262))
    that is worth examining so we can begin to see what the issues of readability,
    usability, and understandability are about. We’ve converted it here from its original
    version in C++ to Java:


    ```

    void HandleStuff(CORP_DATA inputRec, int crntQtr, EMP_DATA empRec, Double estimRevenue,

    double ytdRevenue, int screenx, int screeny, Color newColor, Color prevColor,
    StatusType

    status, int expenseType) {

    int i;

    for ( i = 0; i < 100; i++ )

    {

    inputRec.revenue[i] = 0;

    inputRec.expense[i] = corpExpense[crntQtr][i];

    }

    UpdateCorpDatabase( empRec );

    estimRevenue = ytdRevenue * 4.0 / (double) crntQtr;

    newColor = prevColor;

    status = SUCCESS;

    if ( expenseType == 1 ) {

    for ( i = 0; i < 12; i++ )

    profit[i] = revenue[i] – expense.type1[i];

    }

    else if ( expenseType == 2 ) {

    profit[i] = revenue[i] – expense.type2[i];

    }

    else if ( expenseType == 3 )

    profit[i] = revenue[i] – expense.type3[i];

    }

    ```


    So what’s wrong with this code? Well, what isn’t? Let’s make a list:


    *   Because this is Java, the `HandleStuff` method should have a *visibility modifier*.
    No, it’s not required, but you should always put one in. You are not writing for
    the compiler here; you are writing for the human who will read the code. Visibility
    modifiers make things explicit for the human reader.

    *   The method name is terrible. `HandleStuff` doesn’t tell you anything about
    what the method does.

    *   The method does too many things. It seems to compute something called `profit`
    based on an `expenseType`. But it also seems to change a color and indicate a
    success. Method behavior should be confined to handling just one thing.

    *   Where are the comments? There is no indication of what the parameters are
    or what the method is supposed to do. All methods should tell you at least that.

    *   The layout is just awful. It’s not consistent, the indentation is wrong, the
    curly braces are sometimes part of the statement and sometimes they’re separators.
    And are you sure that that last right curly brace really ends the method?

    *   The method doesn’t protect itself from bad data. If the `crntQtr` variable
    is zero, then the division in line 8 will return a divide-by-zero exception.

    *   The method uses hard-coded *magic numbers* including 100, 4.0, 12, 2, and
    3. Where do they come from? What do they mean? Magic numbers are bad.

    *   The method has way too many input parameters. If we knew what the method was
    supposed to do, maybe we could change this.

    *   There are also at least two input parameters, `screenx` and `screeny`, that
    aren’t used at all. This is an indication of poor design: this method’s interface
    may be used for more than one purpose and so it is “bloated,” meaning it has to
    accommodate all possible uses.

    *   The variables `corpExpense` and `profit` are not declared inside the method
    so they are either instance variables or class variables. This can be dangerous:
    because instance and class variables are visible inside every method in the class,
    we can also change their values inside any method, generating a side effect. Side
    effects are bad.

    *   Finally, the method doesn’t consistently adhere to the Java naming conventions.


    So this example is terrible code for a bunch of different reasons. In the rest
    of the chapter, we’ll take a look at the general coding rules that are violated
    here and give suggestions for how to make your code more readable, more maintainable,
    and less error prone.


    ## Size and Focus


    First things first: your classes, functions, and methods should all *do just one
    thing*. This is the fundamental idea behind *encapsulation*. Having your methods
    do just one thing isolates errors and makes them easier to find. It encourages
    reuse because small, single feature methods are easier to use in different classes.
    Single feature (and single layer of abstraction) classes are also easier to reuse.


    The phrase “single feature” implies small. Your methods/functions should be small;
    20 lines of executable code is a good upper bound for a function. Under no circumstances
    should you write 300-line functions. We know; we’ve both done it. It’s not pretty.
    Back in Chapter [9](#270563_3_En_9_Chapter.xhtml) we talked about *stepwise refinement*
    and *modular decomposition*. Taking an initial function definition and refactoring
    it so that it does just a single small thing will decompose your function into
    two or more smaller, easier to understand and easier to maintain functions. And
    as you’ll see in Chapter [18](#270563_3_En_18_Chapter.xhtml), smaller functions
    are easier to test because they require fewer unit tests (they have fewer paths
    to get through the code). *Small is good, smaller is better*.


    ## Formatting, Layout, and Style


    Formatting, layout, and style are all related to how your code looks on the page,
    which, as you saw above, is also related to its correctness. McConnell’s *Fundamental
    Theorem of Formatting* says, “good visual layout shows the logical structure of
    a program,”^([(263)](#fn263)) making it more readable and helping reduce the number
    of errors. So the objectives of good layout and formatting should be


    *   to accurately represent the logical structure of your program

    *   to be consistent, so there are few exceptions to whatever style of layout
    you’ve chosen

    *   to improve readability for humans

    *   to be open to modifications (because things always change)'
