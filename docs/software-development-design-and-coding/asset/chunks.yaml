    *John: For diane once again.*


    *Vera: To all my students.*


    # Preface


    What’s this book all about? Well, it’s about how to develop software from a personal
    perspective. We’ll look at what it means for you to take a problem and produce
    a program to solve it from beginning to end. That said, this book focuses a lot
    on design. How do you design software? What things do you take into account? What
    makes a good design? What methods and processes are there to help you design software?
    Is designing small programs different from designing large ones? How can you tell
    a good design from a bad one? What general patterns can you use to help make your
    design more readable and understandable?


    It’s also about code construction. How do you write programs and make them work?
    “What?” you say. “I’ve already written eight gazillion programs! Of course I know
    how to write code!” In this book, we’ll explore what you already do and investigate
    ways to improve on it. We’ll spend some time on coding standards, debugging, unit
    testing, modularity, and characteristics of good programs. We’ll also talk about
    reading code, what makes a program readable, and how to review code that others
    have written with an eye to making it better. Can good, readable code replace
    documentation? How much documentation do you really need?


    And it’s about software engineering, which is usually defined as “the application
    of engineering principles to the development of software.” What are engineering
    principles? Well, first, all engineering efforts follow a defined process, so
    we’ll talk about what phases there are to this process, as well as how to best
    support development through becoming an effective facilitator. We’ll talk a lot
    about agile methodologies, how they apply to small development teams, and how
    their project-management techniques work for small- to medium-sized projects.
    All engineering work has a basis in the application of science and mathematics
    to real-world problems. We will often ground our theoretical discussion by designing
    and implementing solutions to specific problems.


    By the way, there’s at least one other person (besides this book’s authors) who
    thinks software development is not an engineering discipline. We’re referring
    to Alistair Cockburn, and you can read his paper, “The End of Software Engineering
    and the Start of Economic-Cooperative Gaming,” at [`http://alistair.cockburn.us/The+end+of+software+engineering+and+the+start+of+economic-cooperative+gaming`](http://alistair.cockburn.us/The+end+of+software+engineering+and+the+start+of+economic-cooperative+gaming).


    Finally, this book is about professional practice, the ethics and the responsibilities
    of being a software developer, social issues, interpersonal skills, privacy, how
    to write secure and robust code, and the like. In short, those various non-technical
    things that you need in order to be a professional software developer.


    This book covers many of the topics described for the ACM/IEEE Computer Society
    Curriculum Guidelines for Undergraduate Degree Programs in Computer Science (known
    as CS2023).^([¹](#fn1)) In particular, it covers topics in a number of the knowledge
    areas of the guidelines, including software development fundamentals, software
    engineering, systems fundamentals, parallel and distributed computing, programming
    languages, and social issues and professional practice. It’s designed to be both
    a textbook for a junior-level undergraduate course in software design and development
    and a manual for the working professional. Although the chapter order generally
    follows the standard software development sequence, you can read the chapters
    independently and out of order. We’re assuming that you already know how to program
    and that you’re conversant with at least one of these languages: `Java`, `C`,
    or `C++`. We are also assuming you’re familiar with basic data structures, including
    lists, queues, stacks, maps, and trees, along with the algorithms to manipulate
    them.


    In this third edition, several chapters have been rewritten and all of the chapters
    have been updated, including new content and examples. The book discusses modern
    software development processes and techniques; notably the coverage of agile techniques
    has been updated and expanded. Much of the plan-driven process and project-management
    discussions from the second edition have been removed or shortened, and longer
    and new discussions of agile methodologies, including `Scrum`, lean software development,
    and `Kanban` have taken their place. There is a new chapter on intellectual property,
    ownership, and obligations. Finally, the chapter on project management essentials
    has been greatly expanded to include an introduction and discussion of Soft-Aware
    development, an approach to software development based on the idea that learning
    to make software is less crucial than *learning to work together while attempting
    to make software*.


    We have used this book in an upper-level course in software development and it
    has grown out of the notes we developed for that class. We developed our own notes
    because we couldn’t find a book that covered all the topics we thought were necessary
    for a course in software development, as opposed to one in software engineering
    or just programming. Software engineering books tend to focus more on process
    and project management than on design and actual development. We wanted to focus
    on the design and writing of real code rather than on how to run a large project.
    This book is our perspective on what it takes to be a software developer on a
    small- to medium-sized team and help develop great software.'
