    ![](images/270563_3_En_13_Chapter/270563_3_En_13_Fig10_HTML.jpg)


    A U M L diagram illustrates the strategy design pattern. It features a context
    class connected to an interface strategy class, which further links to three concrete
    strategy classes.


    Figure 13-10


    A typical Strategy Pattern layout^([^(226)](#fn226))


    Some examples of when you might use the Strategy Pattern are the following:


    *   Capturing video using different compression algorithms


    *   Computing taxes for different types of entities (people, corporations, non-profits)


    *   Plotting data in different formats (line graphs, pie charts, bar graphs)


    *   Compressing audio files using different formats


    In each of these examples you can think of having the application program telling
    a driver (the Context) which of the strategies to use and then asking the Context
    to perform the operation.


    For a more detailed example, let’s say you are a newly minted CPA and you’re trying
    to write your own software to compute your customers’ tax bills. (Why a CPA would
    write their own tax program, we have no idea; work with us on this.) Initially,
    you’ve divided your customers into individuals who only file personal income taxes,
    corporations who file corporate income taxes, and not-for-profit organizations
    who file hardly any taxes at all. Now, all of these groups have to compute taxes,
    so the behavior of a class to compute taxes should be the same for all; but they’ll
    compute taxes in different ways. What you need is a Strategy Pattern setup that
    will use the same interface—to encapsulate what varies in your application and
    to code the concrete classes to an interface—and allow your client class to select
    which type of tax customer to use. Figure [13-11](#270563_3_En_13_Chapter.xhtml#Fig11)
    is a diagram of what your program will look like.


    ![](images/270563_3_En_13_Chapter/270563_3_En_13_Fig11_HTML.jpg)


    A U M L class diagram illustrates the strategy design pattern. It includes classes
    like strategy client, tax payer context, and the tax strategy interface, with
    three implementing classes such as Corp tax strategy, personal tax strategy, and
    N F P tax strategy.


    Figure 13-11


    Using the Strategy pattern to select a Tax behavior


    You create a `TaxStrategy` interface that all the concrete `TaxStrategy` classes
    will implement:


    ```

    public interface TaxStrategy {

    public double computeTax(double income);

    }

    ```


    Since the only thing that varies here is how the tax is computed, your `TaxStrategy`
    interface just includes the `computeTax()` method.


    Then you create each of the concrete `TaxStrategy` classes, each of which implement
    the tax computation for that particular type of customer:


    ```

    public class PersonalTaxStrategy implements TaxStrategy {

    private final double RATE = 0.25;

    public double computeTax(double income) {

    if (income <= 25000.0) {

    return income * (0.75 * RATE);

    } else {

    return income * RATE;

    }

    }

    }

    public class CorpTaxStrategy implements TaxStrategy {

    private final double RATE = 0.45;

    public double computeTax(double income) {

    return income * RATE ;

    }

    }

    public class NFPTaxStrategy implements TaxStrategy {

    private final double RATE = 0.0;

    public double computeTax(double income) {

    return income * RATE;

    }

    }

    ```


    Next, you create the `Context` class that does the heavy lifting of creating strategy
    objects requested by the client program and executing the correct ones.


    ```

    public class TaxPayerContext {

    private TaxStrategy strategy;

    private double income;

    /** constructor for Context */

    public TaxPayerContext(TaxStrategy strategy, double income) {

    this.strategy = strategy;

    this.income = income;

    }

    public double getIncome() {

    return income;

    }

    public void setIncome(double income) {

    this.income = income;

    }

    public TaxStrategy getStrategy() {

    return strategy;

    }

    public void setStrategy(TaxStrategy strategy) {

    this.strategy = strategy;

    }

    public double computeTax() {

    return strategy.computeTax(income);

    }

    }

    ```


    Note that here you write a separate version of the `computeTax()` method (you’re
    not overriding the method because you’re not extending any of the concrete classes;
    the Strategy Pattern uses composition, not inheritance). This version calls the
    `computeTax()` method of the strategy that the client has selected.


    Finally, you implement the client that controls who gets instantiated and when:


    ```

    public class StrategyClient {

    public static void main(String [] args) {

    double income;

    TaxPayerContext tp;

    income = 35000.00;

    tp = new TaxPayerContext(new PersonalTaxStrategy(), income);

    System.out.println("Tax is " + tp.computeTax());

    tp.setStrategy(new CorpTaxStrategy());

    System.out.println("Tax is " + tp.computeTax());

    }

    }

    ```


    The client class selects which algorithm to use and then gets the context object
    to execute it. This way you’ve encapsulated the tax computation in separate classes.
    You can easily add new customer types just by adding new concrete `TaxStrategy`
    classes and making the change in the client to use that new concrete type. Piece
    of cake!


    ## Conclusion


    Design patterns are a reusable, commonly occurring core solution to a design problem.
    They are not a finished design, but rather templates you can use to solve similar
    problems in many different domains. Design patterns offer *proven solutions* for
    solving common problems, thus streamlining your design process while helping reduce
    defects in your design.


    Be careful, though. Like all design techniques, design patterns are heuristics
    and so there will be cases where they just don’t fit. Trying to squeeze a problem
    into an unsuitable pattern is asking for trouble.


    The goal of design patterns is to define a common vocabulary for design. They
    may not get us all the way there but design patterns, plus the design principles
    described in Chapter [10](#270563_3_En_10_Chapter.xhtml), get us a long way down
    that road.'
  trans: '

    #### 行为型模式三：策略模式


    有时在应用程序中，针对同一操作会有多种实现方式，或者存在多种行为，每种行为都有不同的接口。一种方法是使用 switch 语句：


    ```

    switch (selectBehavior) {

    case Behavior1:

    Algorithm1.act(foo);

    break;

    case Behavior2:

    Algorithm2.act(foo, bar);

    break;

    case Behavior3:

    Algorithm3.act(1, 2, 3);

    break;

    }

    ```


    问题在于这些行为集合是硬编码的，因此若要扩展集合以添加新行为，就需要更新这段代码（并且可能还需要更新程序中所有其他需要选择不同行为的地方）。这并不理想。


    策略设计模式可以解决这个问题。它指出，如果你有多个需要动态选择的行为（算法），你应该确保它们都遵循相同的接口——即策略接口——然后通过一个称为上下文的驱动程序动态选择它们，由客户端软件告知上下文调用哪个策略。策略模式体现了两个基本的面向对象设计原则——*封装变化的概念*和*针对接口编程，而非针对实现编程*。^(²²⁵)
    如图 13-10 所示。


    ![](img/270563_3_En_13_Fig10_HTML.jpg)


    一个 UML 图展示了策略设计模式。它包含一个上下文类，该类连接到一个接口策略类，而策略类又进一步链接到三个具体策略类。


    图 13-10

    典型的策略模式布局^(²²⁶)


    以下是一些可能使用策略模式的场景示例：


    *   使用不同的压缩算法捕获视频

    *   为不同类型的实体（个人、公司、非营利组织）计算税款

    *   以不同格式（折线图、饼图、柱状图）绘制数据

    *   使用不同格式压缩音频文件


    在每个示例中，你可以让应用程序告诉驱动程序（上下文）使用哪种策略，然后请求上下文执行该操作。


    为了更详细地说明，假设你是一名刚取得执业资格的注册会计师，正尝试编写自己的软件来计算客户的税款。（注册会计师为何要自己编写税务程序，我们不得而知；请暂且配合我们。）最初，你将客户分为三类：仅申报个人所得税的个人、申报企业所得税的公司，以及几乎无需纳税的非营利组织。现在，所有这些群体都需要计算税款，因此计算税款这一行为对于所有类来说应该是相同的；但它们的计算方式不同。你需要的是一个策略模式设置，该模式使用相同的接口——封装应用程序中变化的部分，并将具体类编码到接口——并允许你的客户端类选择要使用的客户类型。图
    13-11 展示了你的程序结构。


    ![](img/270563_3_En_13_Fig11_HTML.jpg)


    一个 UML 类图展示了策略设计模式。它包含策略客户端、纳税人上下文和税务策略接口等类，以及三个实现类：公司税务策略、个人税务策略和非营利组织税务策略。


    图 13-11

    使用策略模式选择税务行为


    你创建了一个 `TaxStrategy` 接口，所有具体的 `TaxStrategy` 类都将实现该接口：


    ```

    public interface TaxStrategy {

    public double computeTax(double income);

    }

    ```


    由于这里唯一变化的是税款的计算方式，因此你的 `TaxStrategy` 接口只包含 `computeTax()` 方法。


    然后，你创建每个具体的 `TaxStrategy` 类，每个类都针对特定客户类型实现税款计算：


    ```

    public class PersonalTaxStrategy implements TaxStrategy {

    private final double RATE = 0.25;

    public double computeTax(double income) {

    if (income <= 25000.0) {

    return income * (0.75 * RATE);

    } else {

    return income * RATE;

    }

    }

    }

    public class CorpTaxStrategy implements TaxStrategy {

    private final double RATE = 0.45;

    public double computeTax(double income) {

    return income * RATE ;

    }

    }

    public class NFPTaxStrategy implements TaxStrategy {

    private final double RATE = 0.0;

    public double computeTax(double income) {

    return income * RATE;

    }

    }

    ```


    接下来，你创建 `Context` 类，该类负责创建客户端程序请求的策略对象并执行正确的策略。


    ```

    public class TaxPayerContext {

    private TaxStrategy strategy;

    private double income;

    /** 上下文的构造函数 */

    public TaxPayerContext(TaxStrategy strategy, double income) {

    this.strategy = strategy;

    this.income = income;

    }

    public double getIncome() {

    return income;

    }

    public void setIncome(double income) {

    this.income = income;

    }

    public TaxStrategy getStrategy() {

    return strategy;

    }

    public void setStrategy(TaxStrategy strategy) {

    this.strategy = strategy;

    }

    public double computeTax() {

    return strategy.computeTax(income);

    }

    }

    ```


    请注意，这里你编写了一个独立的 `computeTax()` 方法版本（你没有重写该方法，因为你没有扩展任何具体类；策略模式使用组合而非继承）。该版本会调用客户端所选策略的
    `computeTax()` 方法。


    最后，你实现控制何时实例化哪个对象的客户端：


    ```

    public class StrategyClient {

    public static void main(String [] args) {

    double income;

    TaxPayerContext tp;

    income = 35000.00;

    tp = new TaxPayerContext(new PersonalTaxStrategy(), income);

    System.out.println("税款为 " + tp.computeTax());

    tp.setStrategy(new CorpTaxStrategy());

    System.out.println("税款为 " + tp.computeTax());

    }

    }

    ```


    客户端类选择要使用的算法，然后获取上下文对象来执行它。这样，你就将税款计算封装在了独立的类中。只需添加新的具体 `TaxStrategy` 类，并在客户端中修改以使用该新具体类型，即可轻松添加新的客户类型。小菜一碟！


    ## 结论


    设计模式是针对设计问题的可复用、常见的核心解决方案。它们并非完成的设计，而是可用于解决许多不同领域中类似问题的模板。设计模式为解决常见问题提供了*经过验证的解决方案*，从而简化了设计过程，同时有助于减少设计中的缺陷。


    不过，请务必小心。与所有设计技术一样，设计模式是启发式的，因此有时可能并不适用。试图将问题硬塞进不合适的模式中，无异于自找麻烦。


    设计模式的目标是定义一种通用的设计词汇。它们可能无法让我们完全达到目标，但设计模式加上第 10 章中描述的设计原则，已经让我们在这条路上走了很远。

