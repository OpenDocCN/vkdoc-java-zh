- fmt: '# Achievable


    The task must be something that a developer can do within the timeframe of the
    iteration or sprint. The developer must also have the skill set necessary to complete
    the task, which may include asking for help or learning new skills in the process.
    This goal can also integrate with *pair programming*, which will spread the required
    skill set across two developers.


    # Relevant


    This goal ties in with the Valuable story component above. With respect to tasks,
    this means that the task must do something that makes progress towards the creation
    of the user story implementation. It should add value to the iteration for the
    customer.


    # Time-Boxed


    This goal means that the task, as estimated, can be finished within the iteration
    or sprint. If the task turns out to be harder than expected, the team is expected
    to divide it into two or more tasks and estimate them separately. The other goal
    implied here is that the total number of points assigned to the tasks included
    in the iteration is doable within the team’s average velocity.


    ## Agile Requirements Gathering: Sprint/Iteration Backlog


    As highest priority user stories are selected and broken down into tasks, these
    tasks are estimated and added to the sprint/iteration backlog, becoming the things
    to get “done” in the next sprint/iteration. Depending on the agile methodology
    being used, once the sprint/iteration begins, the number of tasks in the backlog
    may or may not be changed. In Scrum, no more tasks may be added, except by the
    developers themselves, for the duration of the sprint. Any newly discovered work
    must be added to the product backlog instead.


    # Requirements Digging


    Most software engineering texts use the phrase “requirements elicitation” to talk
    about the process of getting your users to tell you what they want. Hunt and Thomas,
    in their book *The Pragmatic Programmer* use the much more descriptive phrase
    “requirements digging” to emphasize the point that what you’re really doing is
    digging for all those requirements that your customer doesn’t know they want yet.^([^(139)](#fn139))
    Hunt and Thomas also state that “It’s important to discover the underlying reason
    *why* users do a particular thing, rather than just *the way* they currently do
    it. At the end of the day, your development has to solve their *business problem*,
    not just meet their stated requirements. Documenting the reasons behind requirements
    will give your team invaluable information when making daily implementation decisions.”


    Hunt and Thomas also make the terrific distinction between requirements, policies,
    and implementations as a way to illustrate the requirements digging process. To
    understand how these differ, let’s consider some deficient examples of potential
    requirements:


    “The system must let the user choose a loan term” is a nice succinct requirement.
    It says that there’s something you must do. It isn’t specific enough for implementation
    yet, but it tells the developer something concrete that must be built.


    “Loan terms must be between 6 months and 30 years” is not a requirement, although
    it kind of looks like one. This statement is an example of a *business policy*.
    When statements like this are presented to developers as requirements, they have
    a tendency to hard-code the statement in the program. Wrong, wrong, wrong. Policies
    like this can change, so you need to be very careful about putting business policies
    in your requirements. It is almost always the case that you need to implement
    a more general version of the business policy than is stated. The real requirement
    is probably something like, “Loan terms are of finite length, but the length of
    the loan will vary by type of loan.” This tells you that you probably need to
    build a table-driven subsystem to handle this feature. That way, the loan term
    for a particular type of loan can be changed by making a single change in a data
    table and the code doesn’t need to change at all.


    “The user must be able to select a loan term using a drop-down list” isn’t a requirement
    either, although, again, it may look like one. This is only a requirement if the
    customer absolutely must have a drop-down menu box to choose their loan term.
    Otherwise, this is an example of the *implementation* that the customer would
    like to see, and it may not be a requirement.


    ## Why Requirements Digging Is Hard


    There are several reasons why dragging requirements out of your customer is a
    really hard exercise. Let’s look at a few.


    ### Difficulties with Scope


    The actual boundaries of what your program is supposed to do are often fuzzy,
    for a variety of reasons. The program may be part of a larger system and the integration
    of the parts is ill-defined. The customer may not have thought through exactly
    what they want the program to do, so they start throwing out all sorts of ideas,
    many of which may not even apply to the problem at hand. Finally, the customer
    may have dropped into implementation-land, providing unnecessary levels of detail.


    As ideas develop, customers often want more and more complex features. Overcoming
    such problems of scope creep can take a lot of focus, discipline, and patience,
    accompanied by many instances of saying “no” and of repeatedly asking “why does
    this need to be part of the program?” Scope is directly related to requirements
    creep, so beware.


    ### Difficulties with Understanding


    Let’s face it: the customer and you as the developer speak different languages.
    Your customer is the domain expert and they speak the domain language (accounts
    receivable, accounts payable, reconciliation, general ledger, and so on). You
    speak the design and implementation language (class, object, method, use case,
    recursion, activation record, and the like).


    There are usually two ways to overcome problems of understanding. The first is
    to have someone in the middle who has lived in both worlds and who can translate
    between the two. Some companies have *system engineers* or *technical marketers*
    who fulfill this role. These folks have done development and have also worked
    on the customer side so they can speak both languages. Good system engineers are
    worth their weight in user stories. The second way to promote understanding is
    to have the customer as part of the development team. This is the approach taken
    by most agile methodologies. When the customer is part of the development team,
    you get to talk to them every day, ask them questions, and even teach them some
    technical elements to clarify constraints and capabilities. And because the on-site
    customer sees intermediate product builds as soon as they available, you can get
    crucial immediate feedback. Everybody wins.


    ### Difficulties with Volatility


    Things change. This is by far the hardest part of requirements gathering and analysis
    and the biggest reason why schedules slip. You can’t do anything about it. Get
    used to it. As Kent Beck says, “Embrace change.” What you can do is *manage* change.
    Create a backlog of new features that get added as they arrive. In the Scrum methodology,
    new requirements are always added to the product backlog, but not to the current
    sprint backlog; this allows the current sprint to proceed as planned and the requirements
    are all reviewed when planning for the next sprint. Another way to manage change
    is to push the decision onto the user. Give the user a choice. “If we implement
    this new feature, it will add 6 weeks to the schedule. Do you still want it?”
    Alternatively, “If you want to keep to the original schedule we can only implement
    and test one of A, B, or C. You pick the one you want most.” This is one of the
    things that the agile folks mean by *courage.*^([^(140)](#fn140)) Sometimes you
    have to take a stand to protect the viability of the project as a whole.'
