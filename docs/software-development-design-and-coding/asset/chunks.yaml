    在附录 2 中，我们展示了一个用 Java 编写的 KWIC 索引程序实现，它在一定程度上紧密遵循了上述讨论。我们将在下一章关于面向对象设计的内容中，更详细地继续讨论模块化分解。


    ## 结论


    结构化设计描述了一组经典的设计方法论。这些设计思想适用于一大类问题。最初的结构化设计思想——逐步求精，要求你自顶向下分解问题，专注于解决方案的控制流。它也与第
    7 章中提到的一些架构密切相关，特别是主程序子例程架构和管道-过滤器架构。模块化分解是现代面向对象方法论的前身，并引入了封装和信息隐藏的概念。这些思想是你设计工具箱的基础。


    ## 附录 1：完整的非递归八皇后程序


    ```

    /*

    *  NQueens.java

    *  八皇后程序

    *  用于单一解的非递归版本

    */

    import java.util.*;

    public class NQueens {

    static int totalcount = 0;

    static int row = 0;

    static int col = 0;

    static int[] board;

    /*

    *  (row, col)处的皇后是安全的，

    *  因此我们有了一个部分解。

    *  前进到下一列

    */

    public void advance () {

    board[col] = row;

    col++;

    row = 0;

    }

    /*

    *  在当前列找不到安全行，

    *  因此回溯一列并将该皇后上移一行

    */

    public void retreat () {

    col--;

    row = board[col] + 1;

    }

    /*

    *  检查 (row, col) 处的皇后是否会被攻击

    */

    public boolean isSafe () {

    boolean safe = true;

    totalcount++;

    /*

    *  检查对角线和行是否有攻击

    *  因为我们只检查部分解

    *  只需检查到当前列

    */

    for (int c = 0; c = 0));

    /* 如果我们已经放置了所有 N 个皇后，就得到了一个解 */

    if (col == N) {

    for (int i = 0; i < N; i++) {

    System.out.print(board[i] + " ");

    }

    } else

    System.out.println("No solution. ");

    System.out.println();

    System.out.println("after trying " + totalcount +

    " board positions.");

    }

    }

