    off point for meaningful work is communicating the work’s *impact* and helping
    others buy into that impact, sometimes by flexibly altering the work to fit all
    stakeholders. A shared vision helps everyone understand the goal and focus on
    it like a guiding North Star or a sprint goal Prioritizing together, understanding
    which elements are crucial and why, negotiating the schedule, and addressing concerns
    openly and as a team will all help ensure that everyone buys into the work plan
    and allow individuals to make the right development decisions within their tasks
    along the way. Understanding, agreeing with, and contributing to the plan increases
    everyone’s personal agency, crucial for developers.^([^(56)](#fn56))


    *Mutual dedication* promotes trust and support. If you want your developers to
    go the extra mile, you must do the same by investing in their growth and well-being.^([^(57)](#fn57))
    If you need developers to work overtime to handle unpredictable circumstances,
    then you need to invest in their personal time and needs too (extra vacation days,
    shorter week to compensate for extended days, etc.). If we want individuals to
    respect company time, then the company must respect individual time. Facilitate
    a *reasonable workload* and celebrate a work-life balance as opposed to working
    overtime. If we need everyone to be willing to put in the occasional longer hours
    to fulfill temporary emergent needs, there must be accountability on the side
    of management, not only for the extra hours, but also for the workers’ willingness
    to accommodate for them outside of standard work time. Consider that two extra
    hours today cannot be meaningfully compensated by two fewer hours tomorrow. Any
    changes in work schedule, especially on short notice, create a non-negligeable
    amount of overhead for individuals (ranging from working while tired, missing
    sleep, cancelling plans, skipping going to the gym, rearranging family and pet
    care, etc.). If this overhead is not meaningfully accounted for, workers will
    miss out on crucial recharge time, eventually leading to burnout, quiet quitting,
    reduced quality of work, and increased turnover.'
  trans: '

    ### 软件关怀：支持个体开发者


    众所周知，用户故事很重要，但我们必须记住，开发者故事也同样重要，因为双方都是开发过程中的利益相关者。如果我们期望开发人员为我们工作、与我们协作，就必须将他们作为个体进行投资：支持有意义的工作，关注开发者及其需求，支持他们的自主权，重视他们的个人与职业成长，并理解创造性时间。


    *微观管理对双方都不可持续*：管理者无法无处不在，也无法始终掌握所有信息；而开发者的手脚也不能被时刻束缚，否则任何开发都无法进行。试想一下，当有人在你背后盯着时，思考会变得多么困难；或者拿着别人的购物清单去采购，却不知道哪些替代品可以接受；又或者必须用某种你并不理解的具体方式去解决问题。Ron
    Jeffries 描述了源于敏捷实践错误实施的*黑暗 Scrum*：“*但掌权者已经知道自己的职责。他的职责是掌握每个人的动向，确保他们做正确的事，并在他们偏离方向时予以纠正。每天都有一次强制会议让他可以这样做，多么方便！*^(⁵¹)
    *结果呢？团队不再围绕共同使命集结并梳理出当天的最佳方法，而是由别人从他们那里榨取信息，在脑中处理，然后告诉每个人该做什么。由于事情几乎从不会像我们昨天早上预期的那样发展，这种不当行为常常伴随着大量的指责和紧张气氛。黑暗
    Scrum 每天都在压迫团队。自组织无法涌现。*”^(⁵²) 开发者需要被信任去完成工作，而管理者则需要通过满足需求、消除障碍、促成自下而上的自组织来为这项工作提供便利。


    让我们把开发想象成*驾驶一辆车*，穿越未知的地形前往某个目的地。客户、管理者或产品负责人选择目的地，但不选择路径。开发者是司机，他们选择如何最好地到达目标。Scrum
    Master 或项目经理不应在后座指手画脚，但他们可以跟踪进度，让每个人专注于通往终点的总体方向。产品负责人可以呼叫车内，但他们不在车上，呼叫司机会分散其对路况的注意力，因此应谨慎为之。司机需要拥有自由，根据他们对所驾车辆的熟悉程度、行驶速度、驾驭各类地形的技能、天气、意外的车辆故障，以及他们从内部视角认为相关的任何其他因素，来决定应该走哪条路。不应强迫司机走他们不习惯的路或开他们不适应的速度；你可以向他们提供更多关于进度的信息，以帮助他们更好地评估需求，你也可以选择下次旅行不雇佣他们，但你需要让他们驾驶。即使是关键信息，也需要以不干扰的方式提供。试想一下，司机即将错过一个转弯，但可能已经来不及调整路线；有时，犯下错误并在事后纠正反而更安全，更不用说从错误中学习从长远来看更具指导意义。给开发者一些空间和计划内的时间去犯错，对他们的个人成长、编程和调试技能、解决问题的信心以及试错能力等至关重要，而这反过来又对软件开发本身至关重要。


    *领导者必须关注*。领导者/主管/管理者只有*贴近团队*及其问题，才能真正有效。领导力必须具有亲和力、可及性和适应性。围绕人员及其需求建立关系并调整结构。工作场所文化中的价值观应在所有个体之间共享并得到支持，但结构应具有灵活性，以支持人们学习、沟通和工作的不同方式。关注情境（团队情境、个人情境和项目情境），并利用它做出更好的决策。情境也决定了一个事件是否真的是需要解决的问题，以及如何最好地解决它。但请注意，相同的客观情境对于不同的团队和不同的开发者可能会转化为不同的主观情境，因此领导者征求反馈，并让反馈感到受欢迎、被重视并在未来得到考虑，这一点至关重要。


    一个富有成效和创造性的开发环境的关键方面是*有意义的工作*。所有团队成员（尤其是担任管理角色的成员）都需要帮助所有利益相关者找到工作的意义，因为这将激发最大的奉献精神和创造力。虽然雇佣关系或学术环境通常提供外在动机（例如薪水或分数），但这通常只能激发服从。要挖掘真正的动力，我们还应该通过将项目/公司目标与所有利益相关者的目标联系起来，来激发内在动机，^(⁵³,⁵⁴,⁵⁵)
    例如对自主权、个人成长和成就感的渴望。有意义工作的一个关键起点是传达工作的*影响*，并帮助他人认同这种影响，有时可以通过灵活调整工作以适应所有利益相关者来实现。共同的愿景有助于每个人理解目标，并像北极星或冲刺目标一样聚焦于此。共同确定优先级，理解哪些要素至关重要及其原因，协商时间表，并公开地、以团队方式解决问题，都将有助于确保每个人都认同工作计划，并允许个人在各自的任务中沿途做出正确的开发决策。理解、认同并参与计划能增强每个人的个人自主权，这对开发者至关重要。^(⁵⁶)


    *相互奉献*促进信任和支持。如果你希望你的开发者付出额外努力，你也必须同样通过投资于他们的成长和福祉来做到这一点。^(⁵⁷) 如果你需要开发者加班来处理不可预见的情况，那么你也需要投资于他们的个人时间和需求（额外的假期、缩短工作周以补偿延长的工作日等）。如果我们希望个人尊重公司时间，那么公司也必须尊重个人时间。促进*合理的工作量*，并倡导工作与生活的平衡，而不是鼓励加班。如果我们需要每个人都愿意偶尔投入更长时间来满足临时的紧急需求，那么管理层不仅要对额外的工作时间负责，还要对员工在标准工作时间之外为此做出调整的意愿负责。试想一下，今天多工作两小时，并不能被明天少工作两小时有意义地补偿。工作时间的任何变动，尤其是临时通知，都会给个人带来不可忽视的额外负担（包括疲劳工作、睡眠不足、取消计划、不去健身房、重新安排家庭和宠物照看等）。如果这些负担没有得到有意义的考虑，员工将失去关键的恢复时间，最终导致倦怠、隐性离职、工作质量下降以及人员流动率上升。

    '
- fmt: '### Soft-Aware Development: A Culture of Safety and Growth


    Teamwork does not happen in a vacuum. No matter how well we take care of each
    developer individually, our emergent collaborative environment is the biosphere
    of software development, which will ultimately determine whether we can thrive
    together. If only output is valued, then learning can become unsafe. If all conflict
    is perceived negatively, then diversity can become unsafe. A sustainable workplace
    culture requires a focus on learning and growth, a commitment to accountability,
    and a strong emphasis of interpersonal skills to support healthy relationships.


    #### Safety in Learning


    Soft-Aware development requires a safe environment for learning. All our work
    must be informed by the *context* in which that work takes place, and each new
    context should be approached with curiosity and a focus on growth. There are no
    one-size-fits-all solutions in teamwork: working with a new team, new project,
    or new client will require care, accountability, and readaptation. It will also
    require room to safely make mistakes and time when development may not happen,
    while knowledge is created and new skills are acquired.


    Learning teamwork differs for each team composition, so trial and error is required.
    Teammates must welcome the process of learning and adaptation, which also means
    welcoming mistakes in both technical and non-technical aspects of the work, and
    even celebrating them as opportunities for growth. *Growth* requires learning
    new things, which starts from not knowing and often not succeeding on the first
    try. A *growth focus* normalizes learning from failure, allowing developers to
    feel safe to express difficulties, ask for help, or admit a mistake. Developers
    can use an agile approach here: try, get feedback, adjust, try again. Creating
    a safe environment for growth requires minimizing guilt and blame, focusing instead
    on supporting each other through the growing pains that typically accompany learning
    experiences.


    When developers have the necessary freedom to do their work, accountability is
    spread across the team. As a result, the teammates must constructively hold each
    other *accountable but blameless*.^([^(58)](#fn58)) Blame focuses on the past,
    while accountability focuses on formulating a better plan for the future. An environment
    where taking accountability feels safe will lead to open and honest discussions
    about how to course-correct moving forward. A growth mindset naturally helps manage
    fear, minimize blame, and foster accountability when things do not work out. Consider
    that when a mistake happens and is not caught by anyone on the way to the client,
    everyone on the team is responsible. Anyone could have caught the mistake, but
    no one did. Finding someone to blame for the initial mistake will not solve the
    problem. The problem is not the mistake. Mistakes will happen. The real problem
    is that deficient protocols were likely in place, failing to setup protective
    redundancies to ensure mistakes are caught earlier in the shared process. How
    did each individual on the team passively or actively contribute to the problem?
    What can each teammate do to prevent it moving forward? Given any less-than-ideal
    outcome, the team should consider how all available information, technologies,
    practices, personnel, and circumstances contributed to the undesirable outcome,
    and how they can jointly safeguard against such outcomes in the future. Even in
    the simplest case of someone forgetting a task, the team can revise their practices
    to improve task-tracking with shared task boards, automatic deadlines and reminders,
    calendar integration, pair programming, etc.


    Joint ownership of the project supports collective accountability and promotes
    mutual support across all tasks. While some light competition can be good, the
    team and company should all win or lose together to truly develop a sense of camaraderie
    and shared purpose. Shared ownership breeds support instead of competition. Shared
    ownership also ensures that work and understanding are distributed across the
    team more evenly, while a culture of learning values the acquisition of new skills
    along the way. The result is a team that is more balanced in workload and more
    prepared for handling unpredictable situations and future needs (helping test
    each other’s code, cover for a sick teammate, etc.). To help foster a more collaborative
    environment, supervisors should notice, value, and model collaboration, sharing
    of resources, and maintaining a supportive and encouraging attitude.


    On the technical side, a safe environment supports experimentation. Boldness,
    creativity, and innovation require exploratory trial and error. They also require
    considerable time when development may not happen while knowledge is being created.
    Some attempts will not immediately improve the product, but will instead create
    new skills, improve understanding, and explore new ideas. Incorrect productivity
    metrics and short-sighted incentives can lead to deficient development and teamwork
    practices. If nothing beyond the output is valued, teams will inevitably fall
    into unsustainable and self-preserving behaviors, such as:


    *   Developers only taking smaller tasks they can complete quickly so it sounds
    more productive

    *   Mistrust and zero-sum behaviors (e.g., competing and seeking personal safety
    through blame)

    *   Risk aversion, causing developers to avoid any tasks they are unsure of how
    to complete, shunning the more creative and challenging opportunities, and optimizing
    toward less learning along the way

    *   Skipping creative brainstorming to jump straight into coding up the next deliverable


    Do not undervalue the process, the failures, the learning, and the discussions,
    in favor of looking solely at the results. Create space for experimentation and
    learning together, because no one will have all the answers (not those supervising,
    not the clients, and not the most experienced developers) and the suitable answer
    will change over time and across teams and team members. Additionally, while it
    is natural to focus on problematic behaviors as the main items to address, remember
    to also highlight the behaviors we value in our teammates.'
