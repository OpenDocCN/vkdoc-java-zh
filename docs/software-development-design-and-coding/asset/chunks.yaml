  trans: "\n## 结论\n\n编码是软件开发的核心。代码是你产出的成果。但编码并非易事；即使是一个优秀且详尽的设计，将其转化为代码也需要大量的思考、经验和知识，即便是编写小程序也不例外。根据你使用的编程语言和目标系统，编程可能是一项非常耗时且困难的任务。因此，花时间让你的代码易于阅读，并使代码布局与设计的逻辑结构相匹配，对于编写出既能正常运行又能被人理解的代码至关重要。遵循编码标准和约定，保持一致的风格，并包含良好、准确的注释，将在调试和测试过程中极大地帮助你。而且，六个月后当你回过头来试图弄清楚自己当时到底在想什么时，它也会帮到你。\n\
    \n最后，\n\n> *没有什么比花一整天时间编程，让电脑自动完成一个我手动操作需要足足十秒钟才能做完的任务，更让我快乐的了。*\n> \n> ——道格拉斯·亚当斯，《消逝世界漫游指南》\n\
    \n# 17. 调试\n\n> *从我们开始编程的那一刻起，就惊讶地发现，让程序正确运行并不像我们想象的那么容易。调试必须被“发现”。我清楚地记得那一刻，我意识到从那时起，我生命中的大部分时间都将花在寻找自己程序中的错误上。*\n\
    > \n> ——莫里斯·威尔克斯，1949 年\n\n> *审视自己的麻烦，并知道这麻烦是你自己而非他人造成的，是一件痛苦的事。*\n> \n> ——索福克勒斯\n\
    \n恭喜！你已经完成了代码编写，现在是时候让它运行起来了。无论你是一位多么优秀的程序员，错误都不可避免：逻辑错误、拼写错误、被遗忘的边界情况、差一错误、键盘未能记录按键、你的猫在你没注意时修改了代码……错误是代码生命周期中自然的一部分。经过多年的代码编写，我们已经达到了这样一个阶段：大多数时候，我们编写的少于\
    \ 50 行的程序没有任何*明显*的错误，甚至常常能一次编译通过，行为也基本符合预期。我们认为这是一个相当不错的努力目标。\n\n让你的程序运行起来是一个包含三个部分的过程，这三个部分的顺序存在一些争议：调试、审查/检查以及测试。\n\
    \n*调试*是寻找错误的*根本原因*并修复它的过程。这并不意味着通过编写代码绕过错误来治疗其症状，使其消失；而是找到错误的真正原因，并修复那段代码，从而彻底消除错误。调试通常在完成代码编写之后、进行代码审查或单元测试之前进行（但请参阅本章后面的*测试驱动开发*）。调试和单元测试也可以同时进行。\n\
    \n*审查*（或检查）是阅读静态页面上的代码并*寻找错误*的过程。错误可能包括你在实现设计时出现的错误、其他类型的逻辑错误、错误的注释等等。审查代码本质上是一个*静态*过程，因为程序并没有在计算机上运行——你是在屏幕或纸张上阅读它。因此，虽然审查非常适合发现静态错误，但它无法发现代码中的动态错误或交互错误。这正是测试的用武之地。我们将在未来的章节中详细讨论审查和检查。\n\
    \n*测试*是*在代码中查找错误*的过程，而不是修复它们，后者是调试的工作。测试至少发生在以下三个不同的层面：\n\n*   *单元测试*，在此测试代码的小片段，尤其是在函数或方法层面。\n\
    *   *集成测试*，在此将几个相互关联的模块或类组合在一起，并一起测试它们。当你在团队中工作时，集成测试尤其重要，它可以测试你编写的代码是否与其他团队成员编写的代码协同工作。\n\
    *   *系统测试*，在此从用户的角度测试整个程序。这也被称为*黑盒测试*，因为测试者不知道代码是如何实现的；他们只知道需求是什么，因此他们测试编写的代码是否满足所有需求。\n\
    \n本章我们将重点讨论调试。单元测试涉及查找程序中的错误，而调试则涉及找到根本原因并修复这些错误。调试是关于找出错误在你的程序中发生的原因。你可以将错误视为一个机会，借此更深入地了解程序，以及了解你自己是如何工作和解决问题的。毕竟，调试是一项解决问题的活动，就像开发程序是解决问题一样。将调试视为一个了解自己并提升技能的机会。\n"
- fmt: '# What’s an Error, Anyway?


    In code, errors can be of three types: syntactic, semantic, and logic.


    `Syntactic errors` are made with respect to the syntax of the programming language
    being used. Spelling a keyword wrong, failing to declare a variable before you
    use it, forgetting to put that closing curly brace in a block, forgetting the
    return type of a function, and forgetting that semicolon at the end of a statement
    are all typical examples of syntactic errors. Syntactic errors are by far the
    easiest to find because the compiler finds nearly all of them for you. Compilers
    are very rigid taskmasters when it comes to enforcing lexical and grammar rules
    of a language, so if you get through the compilation process with no errors *and
    no warnings*, then it’s very likely your program has no syntax errors left. Notice
    the “and no warnings” part of the previous sentence. You should *always* compile
    your code with the strictest syntax checking turned on, and you should *always*
    eliminate all errors and warnings before you move on to reviews or testing. Eliminating
    warnings is especially important when you’re working on a team because a warning
    in your code could end up as an error in someone else’s code, once you integrate
    them.


    If you are sure you’ve not done anything wrong syntactically, that’s just one
    less thing to worry about while you’re finding all the other errors. The good
    news is that modern integrated development environments (IDEs; like `Eclipse`,
    `NetBeans`, `XCode`, or `Visual Studio`) do this for you automatically once you’ve
    set up the compiler options. Once you set the warning and syntax checking levels,
    every time you make a change, the IDE will automatically recompile your file and
    let you know about any syntax errors!


    `Semantic errors`, on the other hand, occur when you incorrectly express what
    you intended in a programming language, usually due to some misunderstanding of
    the grammar rules of the language. Not putting curly braces around a block, accidentally
    putting a semicolon after the condition in an `if` or `while` statement in C/C++
    or Java, and forgetting to use a `break` statement at the end of a `case` statement
    inside a `switch` are all classic examples of semantic errors. Semantic errors
    are harder to find because they are normally syntactically correct pieces of code,
    so the compiler will successfully compile your code correctly into an object file.
    It’s only when you try to execute your program that semantic errors surface through
    incorrect behavior. The good news is that they’re usually so egregious that they
    show up pretty much immediately. The bad news is they can be very subtle. For
    example, in this code segment


    ```

    while (j < MAX_LEN);

    {

    // do stuff here

    j++;

    }

    ```


    the semicolon at the end of the `while` statement’s conditional expression can
    be hard to see. Your eyes might slide right over it. But its effect is to either
    put the program into an infinite loop (if the conditional test passes) or to never
    execute the loop (if the test fails), but then erroneously execute the block that
    follows, because it is no longer semantically connected to the `while` statement.
    Any basic testing should catch this.


    `Logic errors`, on the other hand, are by far the most difficult to find and eradicate.
    Logic errors are mistakes in the logic of your solutions, which can arise from
    an incorrect design or during translation of the design into code. Logic errors
    include computing a result incorrectly, off-by-one errors in loops (which can
    also be a semantic error if your off-by-one error is because you didn’t understand
    array indexing, for example), misunderstanding a network protocol, misunderstanding
    the problem, forgetting a step, returning the wrong thing from a function, and
    so on. With a logic error, either your program seems to execute normally but with
    wrong answers, or it dies suddenly because you’ve walked off the end of an array,
    tried to dereference a null pointer, or tried to go off and execute code in the
    middle of a data area. Logic errors can be devilishly hard to find.


    # What Not To Do


    While there is no single right way to debug,^([^(278)](#fn278)) here are a few
    things you avoid when debugging your code.^([^(279)](#fn279))


    `Don’t guess`. Guessing implies that (1) you don’t understand the program you’re
    trying to debug and (2) you’re not searching for the root cause of the error systematically.
    Stop, take a deep breath, and start again.


    `Don’t fix the symptom, fix the problem`. Often you can “fix” a problem by forcing
    the error to go away by adding code. For instance, say the error involves an outlier
    in a range of values or some other edge case. The temptation here is to special-case
    the outlier by adding code to handle just that case. Reconsider, as you may just
    be masking a weak spot instead of fixing it. There is almost always some other
    special case out there waiting to break free and squash your program. Study the
    program, figure out what the bigger issue is, and find a general solution to prevent
    future failures.


    `Don’t use the ostrich algorithm.` Don’t stick your head in the sand and ignore
    the problem. It may be tempting to think “it’s a fluke,” “the IDE is malfunctioning,”
    “the rest of the system must be broken,” “Ralph’s module is obviously sending
    me bad data,” or some other excuse to avoid digging. While things external to
    your code go awry, the call is most often coming from inside the house. If you
    just “changed one thing” and the program broke, then guess who probably just injected
    an error into the program and where it is? Or at the very least it uncovered an
    existing issue. Mistakes in code, whether from you or others, are to be expected.
    One of the best discussions of careful coding and how hard it is to write correct
    programs is the discussion of how to write a binary search routine in Column 5
    of Jon Bentley’s book *Programming Pearls*.^([^(280)](#fn280)) You should read
    it.


    # An Approach to Debugging


    The best mindset for debugging is to treat misbehaving code as a challenge or
    an escape-room full of interconnected puzzles. It’s a chance to be clever, to
    solve a cybercrime scene: who did it (’twas probably you...), how, and where?
    And the best part is that once you solve it, you can also undo it! Debugging is
    a battle of wits of You vs. You. We promise, this match will have you on the edge
    of your seat for years to come!


    Remember, you’re solving a problem here and the best way to do this is to have
    a systematic way of sneaking up on the problem and whacking it on the head. The
    other thing to remember about debugging is that, like a murder mystery, you’re
    working backwards from the conclusion.^([^(281)](#fn281)) The bad thing has already
    happened—your program failed. Now you need to examine the evidence and work backwards
    to a solution. Here’s the approach, in the order in which you should work:


    1.  Reproduce the problem reliably.

    2.  Find the source of the error.

    3.  Fix the error (just that one).

    4.  Test the fix (now you’ve got a regression test for later).

    5.  Optionally, look for other errors in the vicinity of the one you just fixed.'
