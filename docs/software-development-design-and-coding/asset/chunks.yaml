- fmt: '## The Open-Closed Principle (OCP)


    The Open-Closed principle says that classes should be open for extension and closed
    for modification.^([(191)](#fn191))


    What this means is to find the behavior in a class that does not vary and abstract
    that behavior up into a super/base class. That encapsulates and locks the base
    code away from modification while allowing all subclasses (those classes that
    extend the base class) to inherit the base behavior and extend it in different
    ways. The bottom line here is that in your well-designed code, you add new features
    not by modifying existing code (it’s closed for modification), but by adding new
    code (it’s open for extension).


    The `BankAccount` class that you wrote in the previous chapter is a classic example
    of the Open-Closed Principle at work. In that example, you abstracted all the
    personal information required by all implementations into the abstract `BankAccount`
    class (along with any methods to access and modify the data), closed it from modification,
    and then extended that class into the different types of bank accounts. This allows
    you to easily add new types of bank accounts just by extending the `BankAccount`
    class again. You avoid duplication of code and you preserve the integrity of the
    `BankAccount` properties. See Figure [12-6](#270563_3_En_12_Chapter.xhtml#Fig6).


    ![](images/270563_3_En_12_Chapter/270563_3_En_12_Fig6_HTML.jpg)


    A U M L class diagram represents a banking system with three classes such as checking
    Acct, savings Acct, and investment Acct. Each diagram lists attributes and methods
    for computing interest and withdraw with specified data types.


    **Figure 12-6** The classic `BankAccount` example for OCP


    For instance, in the abstract `BankAccount` class you define the `withdraw()`
    method that allows a customer to withdraw funds from an account. But the way in
    which withdrawals occur can differ in each of the extended account classes. While
    the `withdraw()` method is closed for modification in the `BankAccount` class,
    it can be overridden in the subclasses to implement the specific rules for that
    type of account and thus alter the behavior of the method to suit its account
    subtype. It’s closed for modification but open for extension.


    The Open-Closed Principle doesn’t have to be limited to inheritance. If you have
    several private methods in a class, those methods are closed for modification,
    but if you then create one or more public methods that use the private methods,
    you’ve opened up the possibility of extending those private methods by adding
    functionality in the public methods.


    ## The Don’t Repeat Yourself Principle (DRY)


    This principle says to avoid duplicate code by abstracting out things that are
    common and placing those things in a single location.^([(192)](#fn192))


    DRY is the motherhood-and-apple-pie design principle: it’s been handed down ever
    since developers started thinking about better ways to write programs. You can
    revisit Chapters [8](#270563_3_En_8_Chapter.xhtml) and [9](#270563_3_En_9_Chapter.xhtml)
    for a discussion of this. With DRY you have each piece of information and each
    behavior in a single place in the design. Ideally you have one requirement in
    one place. This means that you should create your design so that there is one
    logical place where a requirement is implemented. Then, if you have to change
    the requirement, you have only one place to make the change. You also remove duplicate
    code and replace it with method calls. If you are duplicating code, you are duplicating
    behavior.


    DRY applicability extends beyond the code. It’s always a good idea to comb your
    feature list and requirements for duplications. Rewriting requirements to avoid
    duplicating features in the code will make your code much easier to maintain.


    Consider the final version of the B⁴++ bird feeder discussed in the last chapter.
    The last thing you worked on was adding a song identifier to the feeder so that
    the feeding doors would open and close automatically. Let’s look at the two use
    cases you ended up with (see Table [12-1](#270563_3_En_12_Chapter.xhtml#Tab1)).


    **Table 12-1** The Song Identifier Use Case and Its Alternate


    | Main Path | Alternate Path |

    | --- | --- |

    | 1. Alice hears or sees birds at the bird feeder. | 1.1 The songbird identifier
    hears birdsong. |

    | 2. Alice determines that they are *not* songbirds. | 2.1 The songbird identifier
    recognizes the song as from an unwanted bird. |

    | 3. Alice presses the remote control button. | 3.1 The songbird identifier sends
    a message to the feeding doors to close. |

    | 4. The feeding doors close. |   |

    | 5. The birds give up and fly away. | 5.1 The songbird identifier hears birdsong.
    |

    |   | 5.2 The songbird identifier recognizes the song as from a songbird. |

    | 6. Alice presses the remote control button. | 6.1 The songbird identifier sends
    a message to the feeding doors to open. |

    | 7. The feeding doors open again. |   |


    Notice that you’re opening and closing the feeding doors in two different places,
    via the remote control and via the song identifier. But if you think about it,
    regardless of where you request the doors to open/close, they always open/close
    in the same way. So this is a classic opportunity to abstract out the open and
    close door behaviors and put them in a single place, say a `FeedingDoor` class.
    DRY at work!'
