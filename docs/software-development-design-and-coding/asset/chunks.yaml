- fmt: "# 10. Object-Oriented Overview\n\n> *The object has three properties, which\
    \ makes it a simple, yet powerful model building block. It has state, so it can\
    \ model memory. It has behavior, so that it can model dynamic processes. And it\
    \ is encapsulated, so that it can hide complexity.*\n> \n> —Trygve Reenskaug,\
    \ *Working With Objects*\n\nWell, yes, we’ve all learned about the object-oriented\
    \ programming paradigm before, but it never hurts to go over some basic definitions\
    \ so that we’re all on the same page for our discussion about object-oriented\
    \ analysis and design.\n\nFirst of all, objects are *things*. They have an *identity*\
    \ (i.e., a name), a *state* (i.e., a set of attributes that describes the current\
    \ data stored inside the object), and a defined set of *behaviors* that operate\
    \ on that state. A stack is an object, as is an automobile, a bank account, a\
    \ window, a button in a graphical user interface, a book, and even a stack of\
    \ books. In an object-oriented program, a set of cooperating objects pass messages\
    \ among themselves. The messages make requests of the destination objects to invoke\
    \ methods that either perform operations on their data (thus changing the state\
    \ of the object), or to report on the current state of the object. Eventually\
    \ work gets done. Objects use *encapsulation* and *information hiding* (remember,\
    \ they’re different) to isolate data and operations from other objects in the\
    \ program. Shared data areas are (usually) eliminated. Objects are members of\
    \ *classes* that define attribute types and operations.\n\nClasses are *templates*\
    \ or blueprints for objects. Classes can also be thought of as factories that\
    \ generate objects. So an `Automobile` class will define and create instances\
    \ of autos, a `Stack` class will create a new stack object, and a `Queue` class\
    \ will create a new queue. Classes may *inherit* attributes and behaviors from\
    \ other classes. Classes may be arranged in a class hierarchy where one class\
    \ (a *super class*, also called a *parent* or *base class*) is a generalization\
    \ of one or more *subclasses* (also called *child classes*). A subclass *inherits*\
    \ the attributes and operations from its super class and may add new methods or\
    \ attributes of its own. In this sense a subclass is more specific and detailed\
    \ than its super class; hence, we say that a subclass *extends* a superclass.\
    \ For example, a `BankAccount` object may include the customer’s name, address,\
    \ balance, and a unique `BankAccount` id number; it will also allow deposits and\
    \ withdrawals and the current balance can be queried. A `CheckingAccount` is a\
    \ more specific version of a `BankAccount`; it has all the attributes and operations\
    \ of a `BankAccount`, but also adds data and behaviors that are specific to `CheckingAccounts`,\
    \ like check numbers and a per check charge. In Java this feature is called *inheritance*.\n\
    \nThere are a number of advantages to inheritance. It is an *abstraction mechanism*\
    \ that may be used to classify entities. It is a *reuse mechanism* at both the\
    \ design and the programming level. An *inheritance graph* is a source of organizational\
    \ knowledge about domains and systems.\n\nAnd, of course, there are problems with\
    \ inheritance, as well. It makes object classes that are not self-contained: subclasses\
    \ cannot be understood without reference to their superclasses. Inheritance introduces\
    \ complexity, which is undesirable, especially in critical systems. Inheritance\
    \ also usually allows *overloading* ^([^(173)](#fn173)) of operators (methods\
    \ in Java), which can be good (polymorphism) or bad (screening useful methods\
    \ in the superclass).\n\n*Object-oriented programming* (OOP) has a number of advantages,\
    \ among them easier maintenance, because objects can be understood and manipulated\
    \ as stand-alone entities. Objects are also appropriate as reusable components.\
    \ But, for some problems there may be no clear or useful mapping from real-world\
    \ objects to system objects, meaning that OOP may not be appropriate for all problems.\n\
    \n## An Object-Oriented Analysis and Design Process\n\nObject-oriented analysis\
    \ (OOA), design (OOD), and programming (OOP) are related but distinct.\n\nOOA\
    \ is concerned with developing an *object model of the application domain*. So,\
    \ for example, you take the problem statement, generate a set of features and\
    \ (possibly) use cases,^([^(174)](#fn174)) tease out the objects and some of the\
    \ methods within those objects that you’ll need to satisfy the use case, and you\
    \ put together an architecture of how the solution will hang together. That’s\
    \ object-oriented analysis.\n\nOOD is concerned with developing an *object-oriented\
    \ system model* to satisfy requirements. You take the objects generated from your\
    \ OOA, figure out whether to use inheritance, aggregation, composition, abstract\
    \ classes, interfaces, and so on, in order to create a coherent and efficient\
    \ model. You draw the class diagrams, flesh out the details of what each attribute\
    \ is and what each method does, and describe the interfaces. That’s the design.\n\
    \nSome people like object-oriented analysis, design, and programming^([^(175)](#fn175))\
    \ and some people don’t.^([^(176)](#fn176))\n\nSo, object-oriented analysis allows\
    \ you to take a problem model and recast it in terms of objects and classes, and\
    \ object-oriented design allows you to take your analyzed requirements and connect\
    \ the dots between the objects you’ve proposed and to fill in the details with\
    \ respect to object attributes and methods. But how do you really do all this?\n\
    \nHere is a proposed process that starts to fill in some of the details.^([^(177)](#fn177))\
    \ We’ll figure out the rest as we go along.\n\n1. Write (or receive) the *problem\
    \ statement*. Use this to generate an initial set of features.\n\n2. Create the\
    \ *feature list*. The feature list is the set of program features that you derive\
    \ from the problem statement; it contains your initial set of requirements. The\
    \ feature list may be a set of *user stories*. To help generate the feature list,\
    \ you can put together a set of *scenarios*, where a scenario is a narrative description\
    \ of how the user will walk through using the program to accomplish a task. User\
    \ stories are very brief and high level, while scenarios are longer and provide\
    \ more detail. A user story might generate several scenarios. The scenario should\
    \ be technology agnostic and should be explicit from the user’s perspective. It’s\
    \ not how the program works; it’s about what the user wants to accomplish and\
    \ how the user gets the task done; it can also talk about what the user knows.\n\
    \n3. Write up *use cases*.^([^(178)](#fn178)) This helps to refine the features\
    \ and to dig out new requirements and to expose problems with the features you\
    \ just created. Use cases are more specific descriptions of how a user accomplishes\
    \ a task using the program; they describe in more detail how the user interacts\
    \ with the system. Use cases “…capture the goal of an action, the trigger event\
    \ that starts a process, and then describe each step of the process including\
    \ inputs, outputs, errors, and exceptions. Use cases are often written in the\
    \ form of an actor or user performing an action followed by the expected system\
    \ response and alternative outcomes.”^([^(179)](#fn179)) Each scenario or user\
    \ story might create several use cases.\n\n4. *Break the problem down* into subproblems\
    \ or subsystems or modules or whatever you want to call them as long as they’re\
    \ smaller, self-contained modules, typically related to functionality.\n\n5. *Map*\
    \ your features, subsystems, and use cases to domain objects; create abstractions.\n\
    \n6. *Identify* the program’s objects, methods, and algorithms.\n\n7. *Implement*\
    \ this iteration.\n\n8. *Test* the iteration.\n\n9. If you’ve not finished the\
    \ feature list and you still have time and/or money left, go back to step 4 and\
    \ do another iteration, otherwise…\n\n10. Do final *acceptance testing* and release."
