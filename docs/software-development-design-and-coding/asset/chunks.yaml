- fmt: '## Source Code Control


    Earlier in this chapter we mentioned integrating changes into a source code base
    or repository. Code repositories are used for *source code control*, also known
    as *software version control*, which is the practice of tracking and managing
    changes to software.


    Whenever you work on a project, whether you are the only developer or you are
    part of a team, you should keep backups of the work you’re doing. A *version control
    system* (`VCS`) will not only keep a backup of all the files you create during
    a project, but it will keep track of all the changes to these files, alongside
    dates and change authors, so that in addition to saying, “Give me the latest version
    of `PhoneContact.java`,” you can say, “I want the version of `PhoneContact.java`
    from last Thursday with changes made by Dan.”


    A `VCS` keeps a *repository* of all the files you’ve created and added to for
    your project. The repository can be a flat file or a more sophisticated database,
    usually organized hierarchically as a file system tree structure. A client program
    allows you access the repository and retrieve or revert to different versions
    of one or more of the files stored there. Normally, if you just ask the `VCS`
    for a particular file or files, you get the latest version. Whatever version of
    the file you extract from the repository, it’s called the *working copy* in `VCS`-speak.
    Extracting the file is called a *check-out*.


    If you are working on a project by yourself, then the working copy you check out
    from the `VCS` repository is the only one out there and any changes that you make
    will be reflected in the repository when you check the file back in (yes, that’s
    a *check-in*). The great thing is that if you make a change and it’s wrong, you
    can just check out a previous version that doesn’t have the change in it. It’s
    a coding time machine!


    When there is more than one developer working on a project, it’s quite likely
    that somebody else on the team may check out and modify the same file that you
    are working on. If you both attempt to check the file back into the repository,
    you will end up with a conflict where either one version is lost or the other,
    or they are carefully manually combined.


    ### Source Code Control: The Collision Problem


    Say Alice and Bob both check out `PhoneContact.java` from the repository and each
    of them makes changes to it. Bob checks his version of `PhoneContact.java` back
    into the repository and goes to lunch. A few minutes later Alice checks in her
    version of `PhoneContact.java`. Two problems occur: (1) if Alice hasn’t made any
    changes in the same lines of code that Bob did, her version is still newer than
    Bob’s and it hides Bob’s version in the repository. Bob’s changes are still there,
    but they are now in an older version than Alice’s; (2) worse, if Alice did make
    changes to some of the same code that Bob did, then her changes actually overwrite
    Bob’s and `PhoneContact.java` is a very different file. Bummer. So we don’t want
    either of these situations to occur. How do we avoid this problem? Version control
    systems use two different strategies to avoid collisions:


    *   lock-modify-unlock

    *   copy-modify-merge


    #### Collisions: Using Lock-Modify-Unlock


    The first strategy is *lock-modify-unlock*. In this strategy, Bob checks out `PhoneContact.java`
    and locks it for edit. This means that Bob now has the only working copy of `PhoneContact.java`
    that can be changed. If Alice tries to check out `PhoneContact.java`, she gets
    a message that she can only check out a read-only version and can’t check it back
    in until Bob gives up his lock. Bob makes his changes, checks `PhoneContact.java`
    back in, and then releases the lock. Alice can now check out and lock an editable
    version of `PhoneContact.java` (which now includes Bob’s changes) and make her
    own changes and check the file back in, giving up her lock.


    The biggest negative about the lock-modify-unlock strategy is that it has the
    side effect of *serializing changes* in the repository, meaning changes to the
    same file cannot happen in parallel, slowing down development. While Bob has the
    file checked out for editing, Alice can’t make her changes and has to wait.'
