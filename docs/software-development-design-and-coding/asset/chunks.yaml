  trans: "\n## 通用布局问题与技巧^(²⁶⁴)\n\n大多数布局问题都与代码块的布局有关。块布局有多种类型，有些是语言内置的，有些则需要你自行选择。最常见的三种块布局是：内置块边界、begin-end\
    \ 块边界，以及模拟内置块。\n\n某些语言为其所有控制结构提供了*内置块边界*。在这种情况下，你无需选择；因为块边界元素是语言特性，你必须使用它。具有内置块边界的语言包括\
    \ Ada、PL/1、Lisp、Scheme 和 Visual Basic。例如，Visual Basic 中的 if-then 语句如下所示：\n\n```\n\
    if income > 25000 then\nstatement1\nstatement2\nelse\nstatement3\n...\nend if\n\
    ```\n\n在 Visual Basic 中，你无法在不使用结束块元素的情况下编写控制结构，因此块更容易被找到和区分。\n\n但大多数语言没有内置的块边界词法元素，而是使用\
    \ *begin-end 块边界*：每个块是由零个或多个语句（其中语句有特定定义）组成的序列，这些语句由 *begin* 和 *end* 词法元素分隔。最常见的\
    \ begin 和 end 元素是关键字 `begin` 和 `end`，或者左右花括号 `{` 和 `}`。例如：\n\n**Pascal:**\n\n\
    ```\nif income > 25000 then\nbegin\nstatement1;\nstatement2\nend\nelse\nstatement3;\n\
    ```\n\n**C/C++/Java:**\n\n```\nif (income > 25000) {\nstatement1;\nstatement2;\n\
    } else\nstatement3;\n```\n\n注意，在两个示例中，单个语句被视为一个块，不需要块分隔元素。还要注意，在 Pascal 中，分号是语句*分隔符*符号，因此它必须出现在语句之间，但因为\
    \ `else` 和 `end` 不是语句的结尾，所以不能在 `else` 或 `end` 之前使用分号。（感到困惑？大多数人都是如此。）在 C、C++ 和\
    \ Java 中，分号是语句*终止符*符号，必须放在每条语句的末尾。这更容易记忆和编写：你几乎可以在每一行的末尾都加上分号，除了花括号之后。一致性是好的。\n\
    \n最后，在格式化块时，你可以尝试在那些没有内置块边界的语言中模拟内置块边界，方法是要求每个块都使用块分隔词法元素。让我们看一个例子：\n\n**C/C++/Java:**\n\
    \n```\nif (income > 25000) {\nstatement1;\nstatement2;\n} else {\nstatement3;\n\
    }\n```\n\n在这个例子中，你希望假装左右花括号是控制结构语法的一部分，因此无论块有多大，你都使用它们来分隔块（尽管单行块在这里不需要花括号）。为了强调块分隔符是控制结构的一部分，你将其放在控制语句起始行的同一行。然后，你可以将结束块边界元素与控制结构的起始位置对齐。这并非对内置块元素语言特性的完美模拟，但它非常接近，并且具有一个优点：你不太可能遇到像下面这样因错误缩进而导致的问题：\n\
    \n**C/C++/Java:**\n\n```\nif (income > 25000)\nstatement1;\nstatement2;\nstatement3;\n\
    ```\n\n在这个例子中，`statement2` 和 `statement3` 的错误缩进可能会让读者误以为它们是 `if` 语句的一部分。编译器可不会产生这种错觉；这段代码只有在条件表达式为真时才会执行\
    \ statement1。但它始终会执行 statement2 和 statement3。\n\n总的来说，模拟块边界的风格效果非常好，可读性强，并能清晰地展示程序的逻辑结构。同时，为每个块（包括仅包含单个语句的块）都加上块边界也是一个好主意，这样可以消除上面看到的错误缩进的可能性。因此，如果你这样写：\n\
    \n```\nif (income > 25000) {\nstatement1;\n}\n```\n\n那么，在下面的代码中：\n\n```\nif (income\
    \ > 25000) {\nstatement1;\n}\nstatement2;\nstatement3;\n```\n\n很明显，`statement2`\
    \ 和 `statement3` 不属于该块，无论它们的缩进如何（这里的缩进是故意错误的）。这也意味着你现在可以安全地向块中添加额外的语句，而无需担心它们是否在块内，因为新语句将位于花括号内，从而位于块内。\n\
    \n```\nif (income > 25000) {\nstatement1;\nstatement2;\nstatement3;\nstatement4;\n\
    statement5;\n}\n```\n\n## 空白\n\n空白是你的朋友。你不会写一本单词之间没有空格、段落之间没有换行、或者没有章节划分的书，对吧？那么，你为什么要编写没有空白的代码呢？空白允许你在逻辑上分隔程序的各个部分，并对齐块分隔符和其他词法元素。它还能让你的眼睛在程序各部分之间得到休息。让眼睛休息是件好事。以下是一些关于使用空白的建议：\n\
    \n*   使用空行分隔语句组（就像段落一样）。\n\n*   在块内，将所有语句对齐到相同的制表位（默认制表符宽度通常为四个空格）。\n\n*   使用缩进来显示每个控制结构和块的逻辑结构。\n\
    \n*   在运算符周围使用空格。\n\n*   同样，在数组引用和函数/方法参数周围使用空格。\n\n*   不要对 begin-end 块边界使用双重缩进。\n\
    \n## 块与语句风格指南\n\n如前所述，“模拟块边界”风格适用于大多数块结构语言。其他指南包括：\n\n*   *使用比你认为需要的更多的括号*。特别是在所有算术表达式周围使用括号，主要是为了确保你没有搞错优先级规则。\n\
    \n    ```\n    fx = ((a + b) * (c + d)) / e;\n    ```\n\n*   *一致地格式化单语句块*。使用“模拟块边界”技术：\n\
    \n    ```\n    if (average > MIN_AVG) {\n    avg = MIN_AVG;\n    }\n    ```\n\n\
    *   *对于复杂的条件表达式*，*将各个条件放在单独的行上*，并尽可能对齐它们以增加可读性。\n\n    ```\n    if (('0' <= inChar\
    \ && inChar <= '9') ||\n    ('a' <= inChar && inChar <= 'z') ||\n    ('A' <= inChar\
    \ && inChar <= 'Z')) {\n    mytext.addString(inChar);\n    mytext.length++;\n\
    \    }\n    ```\n\n*   *将单个语句* *在大约第 70 列处换行*。这是从 80 列穿孔卡片时代遗留下来的习惯，但它也是让你的代码更具可读性的好方法。非常长的代码行会迫使读者水平滚动，或者让他们忘记行首到底是什么！你可能需要打印代码，而换行的行看起来非常凌乱；你可能想在屏幕上并排查看两段代码；你可能想在半屏上工作，另一半用于\
    \ Stack Overflow；等等。使用较短的代码行，你会有很多选择。\n\n*   *非常谨慎地使用* *goto，无论唐纳德·克努特怎么说*。^(²⁶⁵)\
    \ 有些语言，比如 Java，甚至没有 `goto` 语句。大多数语言都不需要它们（汇编语言除外）。领会克努特论文的精神，只在确实有意义且能使程序更具可读性和可理解性的地方使用\
    \ `goto`。\n\n*   *每行只写一条语句*。（不要像参加年度国际混乱 C 代码大赛那样编写代码！^(²⁶⁶）以下写法是合法的，但看起来不好，而且很容易忽略中间的那条语句：\n\
    \n    ```\n    g.setColor(Color.blue); g.fillOval(100, 100, 200, 200);\n    mytext.addString(inChar);mytext.length++;System.out.println();\n\
    \    ```\n\n    下面这样看起来好得多：\n\n    ```\n    g.setColor(Color.blue);\n    g.fillOval(100,\
    \ 100, 200, 200);\n    mytext.addString(inChar);\n    mytext.length++;\n    System.out.println();\n\
    \    ```\n"
- fmt: "# Declaration Style Guidelines\n\nJust like in writing executable code, your\
    \ variable declarations need to be neat and readable.\n\n- **Declare variables\
    \ close to where they are used**. Most procedural and object-oriented programming\
    \ languages have a *declaration before use* rule, requiring that you declare a\
    \ variable before you can use it in any expression. In the olden days, say in\
    \ Pascal, you had to declare variables at the top of your program (or subprogram)\
    \ and you couldn’t declare variables inside blocks. This had the disadvantage\
    \ that you might declare a variable many lines of code before you’d actually use\
    \ it. (Though recall that your classes and functions/methods shouldn’t be very\
    \ long.) Python is one exception to the declaration before use rule. Because Python\
    \ is usually interpreted (instead of compiled), the interpreter will guess the\
    \ variable type the first time it is seen, making declaration before use less\
    \ useful.\n\nThese days most languages allow you to declare variables in any block\
    \ in your program. The scope of that variable is the block in which it is declared\
    \ and all the blocks inside that block (children blocks, grandchildren blocks,\
    \ etc.). It’s a good idea to declare those variables in the closest block in which\
    \ they are used. That way you can see the declaration and the use the variables\
    \ *right there*.\n\n- **Use only one declaration per line**, or at least one logical\
    \ variable type per line. For instance, while we think that\n\n```\nint max,min,top,left,right,average,bottom,mode;\n\
    ```\n\nis a bit crowded, we’d rewrite this as\n\n```\nint max, min;\nint top,\
    \ bottom;\nint left, right;\nint average, mode;\n```\n\nWhile it’s not one per\
    \ line, the variables that are logically related are grouped together. This makes\
    \ more sense to us.\n\n- **Order declarations sensibly**. Group your declarations\
    \ by types and usage (see the previous example).\n\n- **Use white space to separate\
    \ your declarations**. Once again, white space is your friend. The key idea here\
    \ is to make your declarations more visible, keeping them near the code where\
    \ they are used and making their purpose easier to understand.\n\n- **Don’t nest\
    \ header files—ever!** (This is for you C and C++ programmers.) Header files are\
    \ designed so that you only need to define constants, declare global variables,\
    \ and declare function prototypes once, and you can then reuse the header file\
    \ in some (possibly large) number of source code files. Nesting header files hides\
    \ some of those declarations inside the nested headers. This is bad—because visibility\
    \ is good. It allows you to erroneously include a header file more than once,\
    \ which can lead to redefinitions of variables and macros, causing errors.\n\n\
    The only header files you might nest in your own header files are system headers\
    \ like `stdio.h` or `stdlib.h` and we don’t even like that.\n\n- **Don’t put source\
    \ code in your header files—ever!** (Again, this is for you C and C++ programmers.)\
    \ Headers are for declarations, not for source code. Libraries are for source\
    \ code. Putting a function in a header file means that the function will be redefined\
    \ every place you include the header. This can easily lead to multiple definitions—which\
    \ the compiler may not catch until the link phase. The only source that should\
    \ be in your headers are macro definitions in `#define` preprocessor statements,\
    \ and even those should be used carefully.\n\n# Commenting Style Guidelines\n\n\
    Just like white space, comments are your friend. Every programming book in existence\
    \ tells you to put comments in your code—and none of them (including this one)\
    \ tell you exactly where to put comments and what your comments must look like.\
    \ That’s because how to write good, informative comments falls in the “it depends”\
    \ category of advice. A good, informative comment depends on the *context* in\
    \ which you are writing it, so general advice is pretty limited. Still, here are\
    \ a few main pointers:\n\n- **Comment first**. Coding following a plan is easiest,\
    \ so you are not both reasoning out the big problem and also narrowing down the\
    \ current line’s syntax. Keep your thinking at the same level as often as possible,\
    \ from big picture to details. Use comments as pseudocode for your solution, then\
    \ write your code in between the lines of comments. In the end, you’ll have both\
    \ the code and the explanations. This also helps you not forget any bits of your\
    \ solution while down in the coding trenches (e.g., closing your file input stream,\
    \ deallocating some memory, etc.).\n\n- **Briefly explain reasoning and bigger\
    \ plans.** Comments are all about quality and not quantity. Another programmer\
    \ (or you the next morning) will generally be able to understand what your code\
    \ is doing, but the why tends to be more obscure. So don’t explain syntax, or\
    \ basic language structures, but do explain the utility of your code. If you are\
    \ doing something that may not be immediately needed here but is needed by something\
    \ else later, leave a comment explaining that, so it doesn’t accidentally get\
    \ removed later as unnecessary. If you are about to write several lines of code\
    \ solving a complex problem, it’s often a good idea to write an overall planning\
    \ comment for what the next segment does.\n\n- **Keep comments short and to the\
    \ point.** Comments must be focused and brief. You don’t need full sentences,\
    \ nor articles.\n\n- **Align comment indentation with its corresponding statement**.\
    \ This is important for readability, because then the comment and the relevant\
    \ code line up.\n\n```\n    /* make sure we have the right number of arguments\
    \ */\n    if (argc < 2) {\n    fprintf(stderr, \"Usage: %s filename\\n\", argv[0]);\n\
    \    exit(1);\n    }\n```\n\nThis has a huge negative impact on readability. Either\
    \ make the comment shorter or make this a block comment above the statement instead.\n\
    \n- **Don’t let comments wrap. Use block comments instead**. This usually occurs\
    \ if you tack a long, involved comment onto the end of a line of source code,\
    \ as in\n\n```\n    if (argc < 2) { // make sure we have the right number of arguments\
    \ from the command line\n```\n\n- **Set off block comments with blank lines**,\
    \ if you start the comment right after the start marker `/*` and stick the end\
    \ of comment marker `*/` at the end of a line, as follows:\n\n```\n    /* make\
    \ sure we have the right number of arguments\n    from the command line */\n \
    \   if (argc < 2) {\n    fprintf(stderr, \"Usage: %s filename\\n\", argv[0]);\n\
    \    exit(1);\n    }\n```\n\nWe don’t really recommend this style though. Instead,\
    \ if you line up the start `/*` and end `*/` markers on lines by themselves, then\
    \ you don’t need additional blank lines, as these are already mostly blank and\
    \ create enough separation.\n\n```\n    /*\n    * make sure we have the right\
    \ number of arguments\n    * from the command line\n    */\n    if (argc < 2)\
    \ {\n    fprintf(stderr, \"Usage: %s filename\\n\", argv[0]);\n    exit(1);\n\
    \    }\n```\n\n- **All functions/methods should have a header block comment**\
    \ so that your reader knows what the method is supposed to do. The need for a\
    \ detailed header comment is somewhat mitigated if you use good identifier names\
    \ for the method name and the input parameters. Still, at a minimum, you should\
    \ tell the user what the method is going to do and what the return values are,\
    \ if any. In C++ you can say\n\n```\n#include <string>\n/*\n* getSubString() -\
    \ get a substring from the input string.\n*  The substring starts at index start\n\
    *  and goes up to but doesn't include index stop.\n*  returns the resulting substring.\n\
    */\nstring getSubString(string str, int start, int stop) { }\n```"
