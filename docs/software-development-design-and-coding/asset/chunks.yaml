  trans: '

    ## 一个编码示例


    在《代码大全 2》中，史蒂夫·麦康奈尔给出了一个值得审视的糟糕代码示例^(²⁶²)，以便我们开始理解可读性、可用性和可理解性方面的问题。我们已将其从原始的
    C++版本转换为 Java：


    ```

    void HandleStuff(CORP_DATA inputRec, int crntQtr, EMP_DATA empRec, Double estimRevenue,

    double ytdRevenue, int screenx, int screeny, Color newColor, Color prevColor,
    StatusType

    status, int expenseType) {

    int i;

    for ( i = 0; i < 100; i++ )

    {

    inputRec.revenue[i] = 0;

    inputRec.expense[i] = corpExpense[crntQtr][i];

    }

    UpdateCorpDatabase( empRec );

    estimRevenue = ytdRevenue * 4.0 / (double) crntQtr;

    newColor = prevColor;

    status = SUCCESS;

    if ( expenseType == 1 ) {

    for ( i = 0; i < 12; i++ )

    profit[i] = revenue[i] – expense.type1[i];

    }

    else if ( expenseType == 2 ) {

    profit[i] = revenue[i] – expense.type2[i];

    }

    else if ( expenseType == 3 )

    profit[i] = revenue[i] – expense.type3[i];

    }

    ```


    那么这段代码有什么问题呢？嗯，有什么没问题呢？让我们列个清单：


    *   因为这是 Java，`HandleStuff`方法应该有一个*可见性修饰符*。不，这不是必须的，但你应该始终加上一个。你不是在为编译器编写代码；你是在为将要阅读代码的人编写。可见性修饰符为人类读者明确了信息。


    *   方法名很糟糕。`HandleStuff`完全没有说明这个方法的功能。


    *   这个方法做了太多事情。它似乎根据`expenseType`计算某个名为`profit`的值。但它似乎还改变了颜色并指示了成功状态。方法的行为应局限于只处理一件事。


    *   注释在哪里？没有任何信息说明参数是什么，或者方法应该做什么。所有方法至少应该告诉你这些。


    *   布局简直糟透了。它不一致，缩进错误，花括号有时是语句的一部分，有时又是分隔符。而且你确定最后一个右花括号真的结束了这个方法吗？


    *   该方法没有保护自己免受错误数据的影响。如果`crntQtr`变量为零，那么第 8 行的除法将引发除零异常。


    *   该方法使用了硬编码的*魔法数字*，包括 100、4.0、12、2 和 3。它们从何而来？它们是什么意思？魔法数字是不好的。


    *   该方法有太多输入参数。如果我们知道这个方法应该做什么，也许我们可以改变这一点。


    *   还有至少两个输入参数`screenx`和`screeny`完全没有被使用。这表明设计不佳：这个方法的接口可能被用于多个目的，因此它“臃肿”，意味着它必须适应所有可能的用途。


    *   变量`corpExpense`和`profit`没有在方法内部声明，因此它们要么是实例变量，要么是类变量。这可能很危险：因为实例变量和类变量在类的每个方法中都是可见的，我们也可以在任何方法中更改它们的值，从而产生副作用。副作用是不好的。


    *   最后，该方法没有始终如一地遵守 Java 命名约定。


    所以这个示例因为一系列不同的原因而成为糟糕的代码。在本章的其余部分，我们将看看这里被违反的一般编码规则，并给出如何使你的代码更具可读性、更易于维护且更不容易出错的建议。


    ## 规模与聚焦


    首要之事：你的类、函数和方法都应该*只做一件事*。这是*封装*背后的基本思想。让你的方法只做一件事可以隔离错误，并使它们更容易被发现。它鼓励重用，因为小的、单一特性的方法更容易在不同的类中使用。单一特性（以及单一抽象层）的类也更容易重用。


    “单一特性”这个短语意味着小。你的方法/函数应该很小；20 行可执行代码是一个函数的上限。在任何情况下，你都不应该编写 300 行的函数。我们知道；我们都干过这种事。这并不美观。在第
    9 章中，我们讨论了*逐步细化*和*模块分解*。获取一个初始的函数定义并重构它，使其只做一件小事，这将把你的函数分解成两个或更多更小、更容易理解和维护的函数。正如你将在第
    18 章中看到的，更小的函数更容易测试，因为它们需要更少的单元测试（它们有更少的代码路径）。*小是好的，更小则更好*。


    ## 格式化、布局与风格


    格式化、布局和风格都与代码在页面上的呈现方式有关，正如你上面所见，这也与其正确性相关。麦康奈尔的*格式化基本定理*指出：“良好的视觉布局展示了程序的逻辑结构，”^(²⁶³)
    使其更具可读性，并有助于减少错误数量。因此，良好布局和格式化的目标应该是：


    *   准确表示程序的逻辑结构

    *   保持一致，这样你所选择的布局风格就很少有例外

    *   提高人类读者的可读性

    *   易于修改（因为事情总是在变化）

    '
- fmt: "# General Layout Issues and Techniques^([^(264)](#fn264))\n\nMost layout issues\
    \ have to do with laying out blocks of code. There are different types of block\
    \ layout, some of which are built into languages and some you get to choose on\
    \ your own. The three most prevalent kinds of block layouts are built-in block\
    \ boundaries, begin-end block boundaries, and emulating built-in blocks.\n\nSome\
    \ languages have *built-in block boundaries* for every control structure in the\
    \ language. In this case, you have no choice; because the block boundary element\
    \ is a language feature, you must use it. Languages that have built-in block boundaries\
    \ include Ada, PL/1, Lisp, Scheme, and Visual Basic. As an example, an `if-then`\
    \ statement in Visual Basic looks like the following:\n\n```\nif income > 25000\
    \ then\nstatement1\nstatement2\nelse\nstatement3\n...\nend if\n```\n\nYou can’t\
    \ write a control structure in Visual Basic without using the ending block element,\
    \ so blocks are easier to find and distinguish.\n\nBut most languages don’t have\
    \ built-in block boundary lexical elements, using *begin-end block boundaries*\
    \ instead: each block is a sequence of zero or more statements (where a statement\
    \ has a particular definition) that are delimited by *begin* and *end* lexical\
    \ elements. The most typical begin and end elements are the keywords `begin` and\
    \ `end` or left and right curly braces `{` and `}`. For example:\n\n**Pascal:**\n\
    \n```\nif income > 25000 then\nbegin\nstatement1;\nstatement2\nend\nelse\nstatement3;\n\
    ```\n\n**C/C++/Java:**\n\n```\nif (income > 25000) {\nstatement1;\nstatement2;\n\
    } else\nstatement3;\n```\n\nNote in both examples that a single statement is considered\
    \ a block and does not require the block delimiter elements. Note also in Pascal\
    \ that the semicolon is the statement *separator* symbol so it’s required between\
    \ statements, but because `else` and `end` are not the end of a statement, you\
    \ don’t use a semicolon right before `else` or `end`. (Confused? Most people are.)\
    \ In C, C++, and Java, the semicolon is the statement *terminator* symbol, and\
    \ must be at the end of every statement. This is easier to remember and write:\
    \ you pretty much put a semicolon at the end of every line except after curly\
    \ braces. Consistency is good.\n\nFinally, when you format a block, you can try\
    \ to emulate the built-in block boundary in languages that don’t have it, by requiring\
    \ that every block use the block delimiter lexical elements. Let’s see an example:\n\
    \n**C/C++/Java:**\n\n```\nif (income > 25000) {\nstatement1;\nstatement2;\n} else\
    \ {\nstatement3;\n}\n```\n\nIn this example, you want to pretend that the left\
    \ and right curly braces are part of the control structure syntax, so you use\
    \ them to delimit the block, no matter how large it is (although single line blocks\
    \ do not require curly braces here). To emphasize that the block delimiter is\
    \ part of the control structure, you put it on the same line as the beginning\
    \ of the control statement. You can then line up the closing block boundary element\
    \ with the beginning of the control structure. This isn’t a perfect emulation\
    \ of the built-in block element language feature, but it comes pretty close and\
    \ has the advantage that you’re less likely to run into problems with erroneous\
    \ indentation like the following:\n\n**C/C++/Java:**\n\n```\nif (income > 25000)\n\
    statement1;\nstatement2;\nstatement3;\n```\n\nIn this example, the erroneous indentation\
    \ for `statement2` and `statement3` can lead the reader to believe that they are\
    \ part of the `if` statement. The compiler is under no such illusions; this code\
    \ will execute `statement1` only if the conditional expression is true. But it\
    \ will always execute `statement2` and `statement3`.\n\nOverall, emulating a block-boundaries\
    \ style works very well, is readable, and clearly illustrates the logical structure\
    \ of your program. It’s also a great idea to put block boundaries around every\
    \ block, including just single statement blocks, to eliminate the possibility\
    \ of the erroneous indentation seen above. So if you say\n\n```\nif (income >\
    \ 25000) {\nstatement1;\n}\n```\n\nit’s then clear that in\n\n```\nif (income\
    \ > 25000) {\nstatement1;\n}\nstatement2;\nstatement3;\n```\n\nthat `statement2`\
    \ and `statement3` are not part of the block, regardless of their indentation\
    \ (which is wrong here on purpose). It also means that you can now safely add\
    \ extra statements to the block without worrying about whether they are in the\
    \ block or not, because new statements will be inside the curly braces and thus,\
    \ inside the block.\n\n```\nif (income > 25000) {\nstatement1;\nstatement2;\n\
    statement3;\nstatement4;\nstatement5;\n}\n```\n\n## White Space\n\nWhite space\
    \ is your friend. You wouldn’t write a book without any spaces between words,\
    \ or line breaks between paragraphs, or without chapter divisions, would you?\
    \ Then why would you write code with no white space? White space allows you to\
    \ logically separate parts of the program and to line up block separators and\
    \ other lexical elements. It also lets your eyes rest between parts of the program.\
    \ Resting your eyes is a good thing. The following are some suggestions on the\
    \ use of white space:\n\n* Use blank lines to separate groups of statements (just\
    \ like paragraphs).\n* Within a block, align all the statements to the same tab\
    \ stop (the default tab width is normally four spaces).\n* Use indentation to\
    \ show the logical structure of each control structure and block.\n* Use spaces\
    \ around operators.\n* Use spaces around array references and function/method\
    \ arguments as well.\n* Do not use double indentation with begin-end block boundaries.\n\
    \n## Block and Statement Style Guidelines\n\nAs mentioned, the “emulating block\
    \ boundaries” style works well for most block-structured languages. Other guidelines\
    \ include the following:\n\n* *Use more parentheses than you think you’ll need*.\
    \ Especially use parentheses around all arithmetic expressions, mostly to make\
    \ sure you haven’t screwed up the precedence rules.\n\n    ```\n    fx = ((a +\
    \ b) * (c + d)) / e;\n    ```\n\n* *Format single statement blocks consistently*.\
    \ Using the “emulating block-boundaries” technique:\n\n    ```\n    if (average\
    \ > MIN_AVG) {\n    avg = MIN_AVG;\n    }\n    ```\n\n* *For complicated conditional\
    \ expressions,* *put separate conditions on separate lines*, aligning them whenever\
    \ possible for some added readability.\n\n    ```\n    if (('0' <= inChar && inChar\
    \ <= '9') ||\n    ('a' <= inChar && inChar <= 'z') ||\n    ('A' <= inChar && inChar\
    \ <= 'Z')) {\n    mytext.addString(inChar);\n    mytext.length++;\n    }\n   \
    \ ```\n\n* *Wrap individual statements* *at column 70 or so*. This is a holdover\
    \ from the days of 80-column punch cards, but it’s also a great way to make your\
    \ code more readable. Having very long lines of code forces your readers to scroll\
    \ horizontally, or it makes them forget what the heck was at the beginning of\
    \ the line! You may need to print your code and wrapped lines look very messy;\
    \ you may want to see two chunks of code side by side on a screen; you may want\
    \ to work on half-screen and use the other half for Stack Overflow; and so on.\
    \ With shorter lines you have lots of options.\n\n* *Be very sparse in your use\
    \ of* *`goto`, no matter what Don Knuth says*.^([^(265)](#fn265)) Some languages,\
    \ like Java, don’t even have `goto` statements. Most don’t need them (assembly\
    \ languages excepted). Take the spirit of Knuth’s paper and only use `goto`s where\
    \ they make real sense and make your program more readable and understandable.\n\
    \n* *Use only one statement per line*. (Do not write code as if you were entering\
    \ the annual International Obfuscated C Code Contest!^([^(266)](#fn266))) This\
    \ is legal, but just doesn’t look good, and it’s easy to slide right over that\
    \ statement in the middle:\n\n    ```\n    g.setColor(Color.blue); g.fillOval(100,\
    \ 100, 200, 200);\n    mytext.addString(inChar);mytext.length++;System.out.println();\n\
    \    ```\n\n    This looks much, much better:\n\n    ```\n    g.setColor(Color.blue);\n\
    \    g.fillOval(100, 100, 200, 200);\n    mytext.addString(inChar);\n    mytext.length++;\n\
    \    System.out.println();\n    ```"
