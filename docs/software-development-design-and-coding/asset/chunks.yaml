- fmt: "### Types of Patents\n\nThere are three general types of patents:\n\n1.  *Design\
    \ patents* are patents issued for original, new, and ornamental designs for manufactured\
    \ products. Design patents protect the design or look of something. They require\
    \ the design of the invention to be original and useful. Design patents last for\
    \ 15 years for applications filed after May 13, 2015. While you can’t copyright\
    \ a “look and feel,” you can patent it as a design patent. Design patents can\
    \ protect the “look and feel” of a graphical user interface (GUI). A design patent\
    \ is infringed if another GUI would be confused for yours by an ordinary observer.\
    \ Note that design patents do not protect the functional aspects of a UI. For\
    \ that you need a utility patent.\n\n2.  *Utility patents*, or patents for invention,\
    \ give legal protection to people who invent a new and useful process, an article\
    \ of manufacture, or a composition of matter. Utility patents are normally used\
    \ to protect new physical devices, say a particular type of electric bicycle or\
    \ a new type of ceiling fan. Utility patents last for 20 years and require periodic\
    \ maintenance fees. If you don’t pay the maintenance fee, the patent lapses. Utility\
    \ patents are what most people think of when you use the word “patent.”\n\n3.\
    \  *Plant patents*^([^(126)](#fn126)) (yes, the growing/living kind) go to anyone\
    \ who produces, discovers, and invents a new kind of plant capable of reproduction.\
    \ So, for example, a new variety of rose that you create is patentable. These\
    \ patents are granted for 20 years from the date of filing and no maintenance\
    \ fees apply. Note that plant patents do not apply to things like DNA, RNA, drugs,\
    \ genomes, and such, which require utility patents.\n\n### Intellectual Property:\
    \ Ownership and You\n\nAt the beginning of this chapter we discussed how working\
    \ on team projects, principally in classes, research labs, and start-ups, is different\
    \ with respect to ownership of intellectual property, particularly computer software.\
    \ This is especially true for copyright, as the Copyright Act distinguishes between\
    \ *individual work*, *derivative work*, and *joint work*.\n\n*An* *individual\
    \ work* is obviously a work created—and owned—by a single person.\n\nA *derivative\
    \ work* is a product based on an existing, copyrighted work.^([^(127)](#fn127))\
    \ Copyright holders have the right to create derivative works from their own work.\
    \ If someone else creates a derivative work, say a video of a novel, without getting\
    \ permission from the copyright holder, that is *copyright infringement* and the\
    \ copyright holder can sue for damages.\n\nThis brings us to *joint work*.^([^(128)](#fn128))\
    \ A *joint work*^([^(129)](#fn129)) is a product made by more than one creator.\
    \ Section 101 of the U.S. Copyright act defines joint work as “a work prepared\
    \ by two or more authors with the intention that their contributions be merged\
    \ into inseparable or interdependent parts of a unitary whole.” This includes\
    \ the kind of work that a class team project entails or the shared output of a\
    \ start-up. All members of the creative team (not just the developers) own the\
    \ copyright to the final product jointly and equally. This has a number of ramifications.\
    \ For instance, since all the participants on the team own the copyright, any\
    \ one of them can make changes to the source code, creating a derivative work.\
    \ Second, without consulting their co-owners, they can also license the source\
    \ code to someone else who intends to use the product or make changes to it, creating\
    \ their own derivative work. Needless to say, most organizations require the participants\
    \ to sign a contract explicitly laying out what each person can and cannot do\
    \ with the joint work and who would own the copyright to any derivative works.^([^(130)](#fn130))\n\
    \nThere is one more wrinkle in the *joint work* complexity. If a single person\
    \ has an idea for a product and puts that idea into a fixed form, say in a notebook,\
    \ or as a prototype of a software implementation, then they own the copyright\
    \ to that work product (that specific expression or implementation of the idea).\
    \ If they then join a team or create a start-up whose purpose is to implement\
    \ and expand the original idea, then the idea of *joint work* gets a bit murky.\
    \ First of all, the original person owns the copyright to the original work product.\
    \ But, once the team engages in the endeavor of creating a joint work, essentially\
    \ creating a derivative work of the original, then the members of the team own\
    \ the copyright of the subsequent joint work equally. Any member of the team can\
    \ license the work or make changes to it themselves, so it is important to agree\
    \ on the ownership of the derivative work before creating it. There is, however,\
    \ also the issue that the original work is copyrighted by the original author,\
    \ and so the team member who creates a new, independent, derivative work will\
    \ need to get the original author’s permission, or obtain a license, to use any\
    \ parts that were in the original copyrighted work. If not handled properly, preemptively,\
    \ and equitably, any of these complexities could result in major problems for\
    \ the team, both legally and interpersonally, hindering collaboration, and ultimately\
    \ the product itself.\n\nIn short, for team projects not bound by preimposed ownership\
    \ agreements (such as those of an employer), make sure you have an explicit and\
    \ detailed signed agreement before you begin creating the work.\n\n# 6. Requirements\n\
    \n> *The hardest single part of building a software system is deciding* *what\
    \ to build. No other part of the conceptual work is as difficult in establishing\
    \ the detailed technical requirements, including the interfaces to people, to\
    \ machines, and to other software systems. No other part of the work so cripples\
    \ the results if done wrong. No other part is more difficult to rectify later.\
    \ Therefore, the most important function that the software builder performs for\
    \ the client is the iterative extraction and refinement of the product requirements.*\n\
    > \n> —Fred Brooks^([^(131)](#fn131))\n\nBefore you start coding—yes, *before*\
    \ you start coding—you need to know what it is you’re going to build. That’s what\
    \ requirements are: a list of stuff you have to implement in order to create your\
    \ terrific program. Most developers hate requirements. Really. All we’d like to\
    \ do is sit down and start coding. All of us have that super-programmer mentality;\
    \ just give us the problem and we can sit down and design and code it on the fly.\
    \ Not! If you want to be a productive developer and make fewer errors and come\
    \ up with a good, clean design, you need requirements. The more detailed they\
    \ are, the better. A good set of requirements tells you just what the program\
    \ is supposed to do. It gives you the scaffolding around which you’ll hang your\
    \ design. You’ll do requirements anyway—it’s one of those steps in a standard\
    \ development lifecycle that you can’t avoid—but if you don’t make room for it\
    \ in your project, you won’t create a great program. Being intentional about requirements\
    \ forces you to think about the details of the program, and it also lets you listen\
    \ to the users so you have a better idea of what they really want. So let’s talk\
    \ about requirements."
