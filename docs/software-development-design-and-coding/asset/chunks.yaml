  trans: '

    ### 项目规划：风险分析


    接下来我们需要思考风险分析。一个项目可能出现什么问题？当问题出现时我们又该如何应对？让我们看看一些可能的风险^(³⁴)：


    *   **进度延误**：你预估需要三天完成的任务，结果花了三周。在计划驱动的项目中，如果你没有定期召开状态会议，这可能会成为一个问题。等了三周才告诉老板你进度落后，总比一知道要延期就立刻告知她要糟糕。不要拖延传递坏消息。在敏捷项目中，这种情况不太可能发生，因为大多数敏捷项目都有每日状态会议（或站会）。这样进度延误几乎能立即被发现，并可以迅速采取纠正措施。


    *   **过高的缺陷率**：你的测试发现了大量错误。你该怎么办：继续添加新功能，还是停下来修复错误？同样，在那些按固定计划（比如每周一次）进行集成构建的项目中，这可能是一个真正的问题。在每天或每次添加新功能时都进行集成的项目中，你可以更容易地跟上缺陷的处理。无论哪种情况，如果你正经历高缺陷率，最好的做法是停下来，审视全局，在添加更多功能之前找到缺陷的根本原因。从项目管理的角度来看，这很难做到，但最终你会感谢自己这么做。


    *   **需求被误解**：你所做的并非客户想要的。这个经典问题源于客户和开发者生活在两个不同的世界。客户生活在应用领域，他们从用户的角度理解自己想要产品做什么。开发者则从技术角度理解产品将如何工作。有时，这两个世界会交汇，这很好；但通常它们不会，这就是需求被误解的根源。最好的方法是尽可能让客户在场，并尽可能频繁地交付可交付的产品。


    *   **需求变更**：新功能、功能修改、功能删除……无休止的需求变更很可能是导致交付日期延误、缺陷率高和项目失败的最大单一原因。当客户（或你自己的市场人员，或开发团队本身）在开发过程中持续更改需求时，就会发生需求变更。这会导致大量的代码返工、基线重新测试，以及一次又一次的延误。管理需求是项目经理最重要的工作。在计划驱动的流程中，变更控制委员会（CCB）会审查每个新需求，并决定是否将其添加到待实现的功能列表中。CCB
    中可能有一名开发团队成员，但这并非强制要求，因此风险在于 CCB 可能在未完全理解所有进度和工作量影响的情况下添加新功能。在敏捷流程中，开发团队控制着优先级排序的需求列表（在
    Scrum 中称为产品待办列表），并且只在项目的设定时间点——在 XP 中是在迭代之后，在 Scrum 中是在每个冲刺之后——调整该列表。


    *   **人员流失**：你最资深的开发人员在产品交付前三周决定加入一家初创公司。减少人员流失的最佳方法是：(1) 给开发人员有趣的工作，(2) 让他们在愉快的环境中工作，(3)
    让他们掌控自己的进度安排。奇怪的是，金钱并不是软件开发人员的首要激励因素之一。这并不意味着他们不想获得高薪，但确实意味着为了让他们更努力工作或留住他们而给他们更多钱，通常并不奏效。尽管如此，即使你尽了最大努力，一些开发人员还是会离开。减轻人员流失影响的最佳方法是在开发团队的所有成员之间分散项目知识。像**集体代码所有权**这样的原则和**结对编程**这样的技术，有助于让所有团队成员都投入到项目中，并将代码知识分散到整个团队。我们将在本章的“软体开发”部分进一步讨论如何支持开发人员并维持健康的工作场所文化。


    一旦你列出了项目的风险清单，就需要逐一处理，并讨论两件事：**规避**和**缓解**。针对每个风险，思考如何规避它。在你的进度中预留缓冲时间，进行持续的代码审查，尽早冻结需求，频繁发布，要求结对编程以分散代码知识，等等。然后你需要思考，如果最坏的情况真的发生了，你该怎么办；这就是**缓解**。从发布中移除功能，停止新功能开发并进行错误排查，将新功能协商到未来的发布中，等等。如果一个风险变成了现实，你必须采取**某些**措施；提前计划好要做什么会更好。


    一旦你处理了规避和缓解措施，你就会有一个如何处理可识别风险的方案。这并不能让你完全免责，因为总会有你遗漏的风险，但处理你确实想到的风险的经验，将使你能够更好地处理项目中那些让你措手不及的新风险。当使用迭代过程模型时，最好在每个迭代之后重新审视你的风险，看看哪些发生了变化，识别出任何新的风险，并移除那些不再可能发生的风险。


    ### 项目规划：资源需求


    你的项目需要资源。项目需要多少人？他们是都需要同时开始，还是他们的项目开始日期可以随着阶段的启动而错开？你需要多少台计算机？你将使用什么软件进行开发？你需要什么样的开发环境？每个人都接受过该环境的培训吗？你需要哪些支持软件和硬件？是的，无论你使用什么过程模型，你都需要一个配置管理系统和一个独立的构建机器（通常是云服务器上的虚拟机）。拥有一台每天构建产品新版本的单一机器，可以让你控制编译和构建中的所有变量。这包括但不限于构建机器所使用的操作系统版本以及程序所使用的每个库的确切版本。这种一致的构建环境确保你每次都能获得正确版本的新产品构建。


    你所针对的平台以及你工作的应用领域可以回答许多这些资源问题，所以这部分相对容易。关于团队规模、开始日期和项目阶段的问题，很可能在你对工作量估算和进度安排进行首次尝试之前无法回答，因此迭代方法在这里可能有用。此外，一些资源可能会带来权衡，或迫使项目范围发生变化。考虑替代方案可能需要所有直接利益相关者的参与。

    '
- fmt: '### Project Planning: Task Estimation and Schedule


    The first step toward a project schedule is seeing what you’ll be doing and how
    long each step will take. This is the classic chicken-and-egg problem: you can’t
    really do estimation until you have a fairly detailed decomposition of the features
    or user-stories into tasks. But your manager always wants effort estimates and
    schedule data before you start doing the design. Resist this by prioritizing design
    once you’ve got some idea of the requirements. Select a small set of high priority
    requirements, design a solution for that feature set, and only then estimate the
    effort for that set. Don’t worry that the requirements might change; they will,
    so there is very limited use in decomposing and estimating too far ahead. You
    need a detailed decomposition of features into implementable tasks before you
    can do effort estimation, so this will need to happen incrementally. Don’t ever
    believe anyone who tells you “That feature will take six months to do.” That is
    a wild guess and bears little to no relation to reality. You just cannot estimate
    something that big. The best you can do is to say, “I was once on a team that
    implemented a feature like that in six months.” And even that only helps a little.


    The estimation mantra is *estimate size first, then effort, finally schedule*.
    The overall work broken down into tasks that can be completed in at most a week,
    and ideally one or two days. Breaking down the work into small well-defined tasks
    forces you to think deeper about how you plan to get it done. Tasks small enough
    to be completed in one sitting already greatly reduce the cognitive and technical
    costs of task switching.


    *Size* always needs to come first because you just can’t figure out how long something
    will take until you have an idea of how big of a job it is. Once you have a sensible
    list of tasks, you can start doing size estimation. Size can be several things,
    depending on your work breakdown and your development model: functional modules,
    number of classes, number of methods, number of function points, number of object
    points, or story points.


    Next is *effort* estimation. Tasks should be estimated as *person-hours*. There
    are several techniques for getting effort estimates: `COCOMO II`^([^(35)](#fn35)),
    function point analysis, and the Delphi method are just three. All, however, depend
    on being able to count things in your design. The Delphi method is a quick and
    relatively efficient estimation technique. Here’s one simplified way it can work:
    find three of your most senior developers (folks who’ve got the most experience
    and who should therefore be able to give you a good guess) and give them the task
    breakdown (assuming they weren’t already involved in doing the initial breakdown—the
    ideal situation). To estimate effort for each task, ask them to give you three
    numbers in person-hours: the shortest amount of time it should take, the longest
    amount of time it should take, and the typical amount of time it should take.
    Calculate the average shortest time, average longest time, and average typical
    time and use these averages to specify the expected range of hours (min-max) and
    the typical expected effort for the task. Notice that you need developers to perform
    these estimates. Managers should never do development estimates. Even if a manager
    has been a developer in the past, unless one is deeply involved in the actual
    development work, they should not be involved in doing development estimates.


    To increase task estimate accuracy over time, you need to track the *velocity*
    of each task, a term from agile methodologies,^([^(36)](#fn36)) defined as the
    estimated effort of a task divided by the actual effort. Velocity above 1.0 means
    the task took less time than estimated; velocity below 1.0 means the task took
    longer than estimated. Task velocities help you understand your pessimistic overestimation
    or your optimistic underestimation tendencies, ultimately helping you estimate
    better. Ideally, as a developer gains experience, their velocity will approach
    1.0 on each task, settling closer to a 0.85-1.15 range, allowing the overall schedule
    to be more accurate. If a developer’s velocity fluctuates wildly (one task is
    0.6, another is 1.8, a third is 1.2), then a crash course in estimation techniques
    might be appropriate.


    Once you have determined the size of the tasks and the person-hours effort estimates
    for each task in your first release or iteration, you can proceed with creating
    a *schedule*. Before you can look at that spiffy Gantt chart with the nice black
    diamond that marks the release date, there are several things to take into account:


    *   Get your developers to specify *dependencies* between tasks, as dependencies
    will push out your delivery date. While some tasks can start simultaneously, some
    tasks can’t start before others finish or can start once others are half-finished.


    *   Figure out your *duty cycle* (the fraction of one period when the system is
    active). Out of each eight-hour day, how many hours do your developers actually
    *develop*? Remember that reading mail, attending meetings, doing code reviews,
    taking breaks, etc. all eat up time. Corporate culture as a whole has a big effect
    on the breakdown of work time utilization. You can’t assume that an eight-hour
    task will be done in a single day. Realistically, out of each eight-hour day,
    2-4 hours are eaten up with other stuff, so your development duty cycle can be
    as low as 50% (four hours, half of an eight-hour day).


    *   Take weekends, vacations, sick days, training, and buffer time into account
    when you’re making the schedule. If your senior developer has a task on the critical
    path of your project, you probably need to know that she’s attending that week-long
    seminar in May.


    *   You should not schedule a developer to work on two tasks at the same time.
    Most project-scheduling software will not let you do this by default, but most
    of them will also let you override this. Don’t. You will be tempted to do this
    to meet the deadlines your manager or marketing team wants, but do your best to
    resist the temptation. You’ll only end up having to change the schedule when you
    miss the date anyway.


    *   Finally, you must have some way to track the project schedule, to specify
    tasks, deadlines, priorities, estimates, and developers working on the tasks.
    While full project management tools may seem like overkill at first, they are
    typically flexible enough to suit different project needs without too much overhead.
    Using real project management applications like `Jira`, `Notion`, or `Trello`
    provide lots of features that make keeping the schedule up to date much easier.'
  raw: '### Project Planning: Task Estimation and Schedule


    The first step toward a project schedule is seeing what you’ll be doing and how
    long each step will take. This is the classic chicken-and-egg problem: you can’t
    really do estimation until you have a fairly detailed decomposition of the features
    or user-stories into tasks. But your manager always wants effort estimates and
    schedule data before you start doing the design. Resist this by prioritizing design
    once you’ve got some idea of the requirements. Select a small set of high priority
    requirements, design a solution for that feature set, and only then estimate the
    effort for that set. Don’t worry that the requirements might change; they will,
    so there is very limited use in decomposing and estimating too far ahead. You
    need a detailed decomposition of features into implementable tasks before you
    can do effort estimation, so this will need to happen incrementally. Don’t ever
    believe anyone who tells you “That feature will take six months to do.” That is
    a wild guess and bears little to no relation to reality. You just cannot estimate
    something that big. The best you can do is to say, “I was once on a team that
    implemented a feature like that in six months.” And even that only helps a little.


    The estimation mantra is *estimate size first, then effort, finally schedule*.
    The overall work broken down into tasks that can be completed in at most a week,
    and ideally one or two days. Breaking down the work into small well-defined tasks
    forces you to think deeper about how you plan to get it done. Tasks small enough
    to be completed in one sitting already greatly reduce the cognitive and technical
    costs of task switching.


    *Size* always needs to come first because you just can’t figure out how long something
    will take until you have an idea of how big of a job it is. Once you have a sensible
    list of tasks, you can start doing size estimation. Size can be several things,
    depending on your work breakdown and your development model: functional modules,
    number of classes, number of methods, number of function points, number of object
    points, or story points.


    Next is *effort* estimation. Tasks should be estimated as *person-hours*. There
    are several techniques for getting effort estimates: COCOMO II^([^(35)](#fn35)),
    function point analysis, and the Delphi method are just three. All, however, depend
    on being able to count things in your design. The Delphi method is a quick and
    relatively efficient estimation technique. Here’s one simplified way it can work:
    find three of your most senior developers (folks who’ve got the most experience
    and who should therefore be able to give you a good guess) and give them the task
    breakdown (assuming they weren’t already involved in doing the initial breakdown—the
    ideal situation). To estimate effort for each task, ask them to give you three
    numbers in person-hours: the shortest amount of time it should take, the longest
    amount of time it should take, and the typical amount of time it should take.
    Calculate the average shortest time, average longest time, and average typical
    time and use these averages to specify the expected range of hours (min-max) and
    the typical expected effort for the task. Notice that you need developers to perform
    these estimates. Managers should never do development estimates. Even if a manager
    has been a developer in the past, unless one is deeply involved in the actual
    development work, they should not be involved in doing development estimates.


    To increase task estimate accuracy over time, you need to track the *velocity*
    of each task, a term from agile methodologies,^([^(36)](#fn36)) defined as the
    estimated effort of a task divided by the actual effort. Velocity above 1.0 means
    the task took less time than estimated; velocity below 1.0 means the task took
    longer than estimated. Task velocities help you understand your pessimistic overestimation
    or your optimistic underestimation tendencies, ultimately helping you estimate
    better. Ideally, as a developer gains experience, their velocity will approach
    1.0 on each task, settling closer to a 0.85-1.15 range, allowing the overall schedule
    to be more accurate. If a developer’s velocity fluctuates wildly (one task is
    0.6, another is 1.8, a third is 1.2), then a crash course in estimation techniques
    might be appropriate.


    Once you have determined the size of the tasks and the person-hours effort estimates
    for each task in your first release or iteration, you can proceed with creating
    a *schedule*. Before you can look at that spiffy Gantt chart with the nice black
    diamond that marks the release date, there are several things to take into account:


    *   Get your developers to specify *dependencies* between tasks, as dependencies
    will push out your delivery date. While some tasks can start simultaneously, some
    tasks can’t start before others finish or can start once others are half-finished.


    *   Figure out your *duty cycle* (the fraction of one period when the system is
    active). Out of each eight-hour day, how many hours do your developers actually
    *develop*? Remember that reading mail, attending meetings, doing code reviews,
    taking breaks, etc. all eat up time. Corporate culture as a whole has a big effect
    on the breakdown of work time utilization. You can’t assume that an eight-hour
    task will be done in a single day. Realistically, out of each eight-hour day,
    2-4 hours are eaten up with other stuff, so your development duty cycle can be
    as low as 50% (four hours, half of an eight-hour day.


    *   Take weekends, vacations, sick days, training, and buffer time into account
    when you’re making the schedule. If your senior developer has a task on the critical
    path of your project, you probably need to know that she’s attending that week-long
    seminar in May.


    *   You should not schedule a developer to work on two tasks at the same time.
    Most project-scheduling software will not let you do this by default, but most
    of them will also let you override this. Don’t. You will be tempted to do this
    to meet the deadlines your manager or marketing team wants, but do your best to
    resist the temptation. You’ll only end up having to change the schedule when you
    miss the date anyway.


    *   Finally, you must have some way to track the project schedule, to specify
    tasks, deadlines, priorities, estimates, and developers working on the tasks.
    While full project management tools may seem like overkill at first, they are
    typically flexible enough to suit different project needs without too much overhead.
    Using real project management applications like Jira, Notion, or Trello provide
    lots of features that make keeping the schedule up to date much easier.'
  trans: '

    ### 项目规划：任务估算与进度安排


    制定项目进度的第一步，是明确你要做什么，以及每个步骤需要多长时间。这是一个经典的“先有鸡还是先有蛋”的问题：除非你将功能或用户故事相当细致地分解为具体任务，否则你无法真正进行估算。但你的经理总是希望你在开始设计之前就提供工作量估算和进度数据。要抵制这种要求，优先在初步了解需求后进行设计。选择一小批高优先级的需求，为该功能集设计解决方案，然后仅对该功能集进行工作量估算。不必担心需求可能会变化；它们肯定会变，因此过早地进行分解和估算作用非常有限。你需要将功能详细分解为可执行的任务，才能进行工作量估算，因此这需要逐步进行。永远不要相信任何告诉你“那个功能需要六个月才能完成”的人。那纯粹是瞎猜，与现实几乎毫无关系。你根本无法估算如此庞大的东西。你最多只能说：“我曾经在一个团队里，花了六个月实现过一个类似的功能。”即便如此，这也只是略有帮助。


    估算的口诀是：*先估算规模，再估算工作量，最后制定进度*。整体工作应分解为最多一周内能完成的任务，理想情况下是一到两天。将工作分解为定义明确的小任务，会迫使你更深入地思考如何完成它。小到可以一次性完成的任务，已经能大大降低任务切换带来的认知和技术成本。


    *规模*始终需要优先考虑，因为只有当你对工作有多大有了概念，才能弄清楚它需要多长时间。一旦你有了一个合理的任务列表，就可以开始进行规模估算。规模可以指多种事物，具体取决于你的工作分解方式和开发模型：功能模块、类数量、方法数量、功能点数量、对象点数量或故事点数量。


    接下来是*工作量*估算。任务应以*人时*为单位进行估算。有几种技术可用于获取工作量估算：COCOMO II^(³⁵)、功能点分析法和德尔菲法只是其中三种。然而，所有这些方法都依赖于能够统计设计中的各项内容。德尔菲法是一种快速且相对高效的估算技术。这里有一种简化的运作方式：找三位你最有经验的开发人员（那些经验最丰富，因此应该能给出较好估算的人），将任务分解列表交给他们（假设他们之前没有参与初始分解——这是理想情况）。为了估算每个任务的工作量，请他们给出三个以人时为单位的数字：最短可能耗时、最长可能耗时和典型可能耗时。计算平均最短时间、平均最长时间和平均典型时间，并使用这些平均值来指定预期的工时范围（最小-最大）以及该任务的典型预期工作量。请注意，你需要开发人员来进行这些估算。经理永远不应该做开发估算。即使经理过去曾是开发人员，除非他深度参与实际的开发工作，否则也不应参与开发估算。


    为了提高任务估算的长期准确性，你需要追踪每个任务的*速率*，这是敏捷方法论中的一个术语，^(³⁶) 定义为任务的估算工作量除以实际工作量。速率高于 1.0
    意味着任务实际耗时少于估算；速率低于 1.0 意味着任务实际耗时多于估算。任务速率有助于你了解自己悲观高估或乐观低估的倾向，最终帮助你做出更好的估算。理想情况下，随着开发人员经验的增长，他们每个任务的速率将趋近于
    1.0，稳定在 0.85-1.15 的范围内，从而使整体进度更加准确。如果某个开发人员的速率波动剧烈（一个任务 0.6，另一个 1.8，第三个 1.2），那么可能有必要进行估算技术的速成培训。


    一旦你确定了第一个发布版本或迭代中任务的规模以及每个任务的人时工作量估算，就可以着手创建*进度表*了。在你查看那张漂亮的甘特图，以及标记发布日期的那个醒目的黑色菱形之前，有几件事需要考虑：


    *   让开发人员明确任务之间的*依赖关系*，因为依赖关系会推迟你的交付日期。虽然有些任务可以同时开始，但有些任务必须等其它任务完成后才能开始，或者可以在其它任务完成一半时开始。


    *   弄清楚你的*工作周期*（系统处于活动状态的时间比例）。在每个八小时工作日中，你的开发人员实际用于*开发*的时间有多少小时？请记住，阅读邮件、参加会议、进行代码审查、休息等都会消耗时间。整体企业文化对工作时间利用率的影响很大。你不能假设一个八小时的任务能在一天内完成。实际上，在每个八小时工作日中，有
    2-4 小时会被其它事情占用，因此你的开发工作周期可能低至 50%（四小时，即八小时工作日的一半）。


    *   在制定进度表时，要考虑周末、假期、病假、培训和缓冲时间。如果你的高级开发人员有一个任务处于项目的关键路径上，你可能需要知道她五月份要参加那个为期一周的研讨会。


    *   你不应该安排一个开发人员同时处理两个任务。大多数项目进度规划软件默认不允许这样做，但大多数也允许你覆盖此设置。请不要这样做。你可能会为了满足经理或市场团队要求的截止日期而忍不住这样做，但请尽力抵制诱惑。最终，当你无法按时完成时，你只会不得不再次修改进度表。


    *   最后，你必须有一些方法来跟踪项目进度，以指定任务、截止日期、优先级、估算以及负责任务的开发人员。虽然完整的项目管理工具一开始可能显得大材小用，但它们通常足够灵活，能够适应不同的项目需求，而不会带来太多额外负担。使用像
    Jira、Notion 或 Trello 这样的真实项目管理应用程序，它们提供了许多功能，使得保持进度表更新变得容易得多。

    '
- fmt: '# Consider the benefits that automation can bring to everyone’s awareness
    of the project status: automatic reminders, calendar integration, assignment of
    tasks to developers, and notifications of updates. Project management tools can
    also automatically track a wide variety of metrics (such as task velocities),
    generate visualizations to better understand these metrics (such as showcasing
    the change of average velocity throughout the project), and organize project information
    into different handy layouts (such as grouping velocity data by type of task and
    by developer). With teams (even moderate teams of 10 or more developers), automated
    tracking of dependencies of your project can help manage who’s working on what
    and when. This knowledge is even more critical for agile development with short
    time-boxed iterations. When planning each sprint, you need to know the priorities
    of each user story in the product backlog and how they relate to each other. You
    must track the progress of the tasks in the sprint backlog and knowing dependencies
    can be the difference between achieving your sprint goal versus not.


    Project management tools can also help with effort estimation, as hourly estimates
    can be very hard on humans. Some project management tools have you create an estimate
    using magnitude instead. The simplest type lets you do *small*, *medium*, or *large*
    for estimates, while others let you give each task some number of points on a
    scale, say, 1, 2, 4, or 8 points for each task. This makes it easy to total the
    number of points the team is trying to implement in each time-boxed iteration
    and, over time, gives you the average numbers of points a team can implement per
    iteration.


    ## Project Planning: Defect Management


    Hope for the best; plan for the worst. Inevitably, you’ll introduce defects into
    your program. The project plan should account for continuous testing needs, and
    the schedule should have room for handling any uncovered defects. As a developer,
    your aim is twofold:


    * Introduce as few defects as possible into the code you write.

    * Find as many of them as you can before releasing the code.


    Despite your best efforts, though, you will release code with defects in it. It’s
    just inevitable. For a program of any size, there are just too many possible paths
    through the program and too many different ways to introduce bad data for there
    not to be defects. Your objective is to release with as few defects as possible
    and to make those defects ones that don’t really impact the product or its performance.
    To make this a reality, most development organizations have a set of defect levels
    to characterize defect severity, such as fatal (program crashes), severe (major
    functionality broken), serious (functionality broken but there is a workaround),
    trivial (small issue), and feature request (something that would be nice to have
    in the future). These defect levels are generally built into a defect tracking
    system.


    Whenever you find a defect in a piece of code, file a defect report in the defect
    tracking system, allowing developers and managers to see how many and how severe
    the current defects are. When fixing defects, developers will start at the most
    severe and work their way down.


    ## Soft-Aware Development


    > *“When [project managers] kick off any project, they are given the herculean
    task of figuring out and managing the expectations of many different stakeholders.
    But when the [project managers] can recognize the roots of those expectations,
    step into the role of a couple’s counselor, build meaningful, personal, trusting
    relationships, and ensure the broader team stays focused on the overall goal,
    they can successfully manage everyone’s expectations as they steer that project
    across that coveted finish line.”*

    >

    > —Amy Shoenthal^([^(37)](#fn37))


    > *“The manager’s function is not to make people work, but to make it possible
    for people to work.”*

    >

    > —Tom DeMarco, Timothy Lister^([^(38)](#fn38))


    What is the first thing that comes to mind when we say “team project”? Is it stress?
    Exasperation? Concern? Relief at an upcoming free ride? Consider how most of us
    learn about team-based work: we are asked to collaborate on school projects but
    usually not taught how. Ad-hoc short-term group projects self-managed by novices
    typically lead to deficient and long-term unsustainable coping strategies, such
    as carrying your team or freeloading. After all, we’ll likely never have to work
    with these people again! Concerns also abound about credit and blame attribution.
    In the end, students end up perceiving teamwork as detrimental and unpleasant^([^(39)](#fn39)).
    After repeatedly reinforcing these practices and beliefs through multiple stressful
    class projects, students graduate and are unleashed onto the world. The problem,
    of course, is that the real world runs on networking: making and maintaining relationships
    with your peers, bosses, underlings, clients, the public, etc. Those same short-term
    coping strategies simply won’t do because the real world (like the North) remembers!


    In the remainder of this chapter, we introduce what it means to be Soft-Aware
    (“soft skill” aware) and how deficient teamwork negatively impacts developers
    and development. We then look at how supporting individuals and creating a safe
    shared culture promotes healthy and sustainable collaboration. Finally, we look
    at how to bring these theories into practice as an agile process of learning and
    improving together through a number of teamwork artifacts.^([^(40)](#fn40))


    *Soft-Aware development* is a new paradigm that centers individuals, interpersonal
    relationships, and workplace culture as the heart of healthy and sustainable joint
    creation of software. Being *Soft-Aware* encompasses building software, building
    stakeholder relationships, and building up each developer along the way. *Soft-Aware*
    development was first coined by Dr. Kazakova^([^(41)](#fn41)) while teaching team-based
    software development to undergraduate computer science students. The focus was
    on developing the developers’ professional dispositions and interpersonal skills,
    because learning to make software is less crucial than *learning to work together*
    while attempting to make software. With high technology churn, increasingly higher-level
    programming practices, and the ever-evolving software development models, what
    remains unchanged is the power of social-emotional learning in allowing us to
    work with others toward making innovations much greater than anything we can achieve
    alone. Social-emotional learning is how people “*acquire and apply the knowledge,
    skills, and attitudes to develop healthy identities, manage emotions and achieve
    personal and collective goals, feel and show empathy for others, establish and
    maintain supportive relationships, and make responsible and caring decisions*”.^([^(42)](#fn42))
    While development often happens in sprints, teamwork is a marathon: it requires
    commitment, training, a sustainable pace, and working through discomforts. Openly
    valuing and practicing social-emotional learning is how we train for our teamwork
    marathon, support a shared *Soft-Aware* culture, and support each other.'
