    ## 源代码控制


    在本章前面，我们提到了将变更集成到源代码库或仓库中。代码仓库用于*源代码控制*，也称为*软件版本控制*，这是一种跟踪和管理软件变更的实践。


    无论何时你参与一个项目，无论你是唯一的开发者还是团队的一员，你都应该备份正在进行的工作。一个*版本控制系统*（VCS）不仅会备份你在项目中创建的所有文件，还会跟踪这些文件的所有变更，同时记录日期和变更作者。这样一来，除了可以说“给我
    PhoneContact.java 的最新版本”，你还可以说：“我要上周四 Dan 修改过的那个 PhoneContact.java 版本。”


    VCS 会维护一个*仓库*，其中包含你为项目创建并添加的所有文件。这个仓库可以是一个平面文件，也可以是一个更复杂的数据库，通常按文件系统树结构分层组织。一个客户端程序允许你访问仓库，并检索或回退到其中存储的一个或多个文件的不同版本。通常，如果你只是向
    VCS 请求某个或某些特定文件，你会得到最新版本。无论你从仓库中提取出哪个版本的文件，在 VCS 术语中它都被称为*工作副本*。提取文件的操作称为*签出*。


    如果你独自在一个项目上工作，那么你从 VCS 仓库签出的工作副本就是唯一存在的副本，当你将文件签回（是的，这就是*签入*）时，你所做的任何变更都会反映在仓库中。最棒的是，如果你做了一个变更但发现是错误的，你只需签出一个没有该变更的先前版本即可。这简直就是编码时光机！


    当有多个开发者参与一个项目时，团队中的其他人很可能会签出并修改你正在处理的同一个文件。如果你们俩都试图将文件签回仓库，最终就会产生冲突，导致其中一个版本丢失，或者需要仔细地手动合并。


    ### 源代码控制：冲突问题


    假设 Alice 和 Bob 都从仓库中签出了 PhoneContact.java，并且各自对其进行了修改。Bob 将他修改后的 PhoneContact.java
    版本签回仓库，然后去吃午饭了。几分钟后，Alice 签入了她的 PhoneContact.java 版本。这时会出现两个问题：（1）如果 Alice 没有修改
    Bob 修改过的同一行代码，她的版本仍然比 Bob 的新，并且会在仓库中覆盖 Bob 的版本。Bob 的变更仍然存在，但它们现在位于比 Alice 版本更旧的版本中；（2）更糟糕的是，如果
    Alice 确实修改了 Bob 修改过的部分代码，那么她的修改实际上会覆盖 Bob 的修改，导致 PhoneContact.java 变成一个截然不同的文件。真糟糕。所以我们不希望出现这两种情况中的任何一种。如何避免这个问题呢？版本控制系统使用两种不同的策略来避免冲突：


    *   锁定-修改-解锁


    *   复制-修改-合并


    #### 冲突：使用锁定-修改-解锁


    第一种策略是*锁定-修改-解锁*。在这种策略中，Bob 签出 PhoneContact.java 并将其锁定以进行编辑。这意味着 Bob 现在拥有唯一一个可以修改的
    PhoneContact.java 工作副本。如果 Alice 试图签出 PhoneContact.java，她会收到一条消息，提示她只能签出一个只读版本，并且在
    Bob 释放锁之前无法将其签回。Bob 完成修改，将 PhoneContact.java 签回，然后释放锁。现在 Alice 可以签出并锁定一个可编辑版本的
    PhoneContact.java（该版本现在包含了 Bob 的修改），进行她自己的修改，然后将文件签回，并释放她的锁。


    锁定-修改-解锁策略最大的缺点在于，它会产生*序列化变更*的副作用，这意味着对同一文件的修改无法并行进行，从而拖慢了开发进度。当 Bob 签出文件进行编辑时，Alice
    无法进行她的修改，只能等待。

    '
- fmt: '### Collisions: Using Copy-Modify-Merge


    The second strategy is copy-modify-merge. In this strategy, Alice and Bob are
    both free to check out editable copies of `PhoneContact.java`. Let’s say that
    Alice makes her changes first and checks her new version of the file back into
    the repository. When Bob finishes his changes, he tries to check his new version
    of `PhoneContact.java` into the repository only to have the VCS tell him his version
    of the file is “out of date;” Bob can’t check in. What happened here?


    The VCS stamps each checked out file with a timestamp and a version number. It
    also keeps track of what is checked out and who checked it out and when. It checks
    those values when you try to check in. When Bob tried to check in, his VCS realized
    that the version of the code he was trying to check in was older than the current
    version in the repository (the new one that Alice had checked in earlier), so
    it let him know that. So, what is Bob to do? That’s where the third part of copy-modify-merge
    comes in: Bob needs to tell the VCS to merge his changes with the current version
    of `PhoneContact.java` and then check in the updated version. This works just
    fine if Alice and Bob have changed different parts of the file; their changes
    do not conflict and VCS can just do the merge automatically and check in the new
    file. On the other hand, if Alice and Bob did make changes to the same lines of
    code in the file, we end up with a merge conflict. In that case, Bob must do a
    manual merge of the two files. When manual merge is needed, the VCS will normally
    put both versions of the file on the screen, side by side, highlighting the conflicting
    lines of code, and then Bob can decide which version he wants, or he can make
    changes that resolve any inconsistencies. Bob is in control. Bob has to do this
    because the VCS isn’t smart enough to choose between the conflicting changes.
    Usually, a VCS will provide some help in doing the merge, but ultimately the merge
    decision must be Bob’s. Copy-modify-merge can occasionally make for extra work
    for whomever checks in second, but it allows both developers to work on the same
    file simultaneously and it doesn’t allow any changes to be lost automatically.


    Note, however, that changes can still be lost if Bob is not very careful during
    the manual merge; he may even want to discuss some conflicting changes with Alice
    to ensure both sets of modifications are preserved and merged correctly. The merged
    code should then be fully retested before it is checked into the repository. Another
    problem with copy-modify-merge is that if your repository allows you to store
    binary files, you can’t merge them. Say you have two versions of the same `jpg`
    file. How do you decide which of the bits is correct? In this case, the VCS will
    require you to use lock-modify-unlock.


    A typical working cycle for any version control system will look like the following.
    Before anything else starts, the developer must create a local repository for
    the project. This can happen automatically using a client program, or the developer
    can manually create a directory that will house the repository. Some systems allow
    the developer to do an initial check out and will create the repository for them.
    Then


    1.  The developer checks out the code they want from the project.

    2.  The developer edits, compiles, debugs, and tests the code.

    3.  When ready to upload their changes to the main repository, the developer will
    commit the changes; this will automatically check in the changed files.

    4.  Usually, the system will attempt to do an automatic merge of the changes.
    If there is a merge conflict, the developer will be notified and will be prompted
    to do a manual merge.

    5.  Once all merge conflicts are resolved, the changed files are in the main repository
    and ready to be checked out again by other developers.


    ## Source Code Control Systems


    ### Subversion


    Copy-modify-merge is the strategy used by most version control systems these days,
    including the popular open-source distributed version control system, Subversion
    (`https://subversion.apache.org`). Subversion (SVN) was first developed in 2000
    and is a rewrite and update of an older VCS called the Concurrent Versions System
    (CVS). CVS itself is a front end to a version control system developed in 1982
    called the Revision Control System (RCS). Subversion is much more fully featured
    and sophisticated than either CVS or RCS. While it is primarily used in software
    development projects, it can be used as a version control system for any type
    of file in any type of project. Subversion comes in both command line versions
    and in GUI versions, like `RapidSVN`, `TortoiseSVN`, and `SmartSVN`. There are
    also plug-ins for various IDEs, like `subclipse` for the Eclipse IDE.


    Subversion is an example of a centralized version control system (also known as
    client-server), where there is a centralized database of all the source code and
    users access the database via a local client. This centralized database can be
    on the local machine, it can be on a remote `svnserve` server machine, or it can
    be on a remote Apache server. The user can set things up so the local `svn` client
    knows where the version control database is located. Checked-out working copies
    of files are a developer’s own private copy of the file, stored locally in a tree
    hierarchy repository. Subversion defaults to the copy-modify-merge version control
    model but can also be configured to use the lock-modify-unlock model on individual
    files. For more information and a link to the online copy of the aptly named *Subversion
    Book*, go to `https://subversion.apache.org`.'
  raw: '#### Collisions: Using Copy-Modify-Merge


    The second strategy is *copy-modify-merge*. In this strategy, Alice and Bob are
    both free to check out editable copies of PhoneContact.java. Let’s say that Alice
    makes her changes first and checks her new version of the file back into the repository.
    When Bob finishes his changes, he tries to check his new version of PhoneContact.java
    into the repository only to have the VCS tell him his version of the file is “out
    of date;” Bob can’t check in. What happened here?


    The VCS stamps each checked out file with a timestamp and a version number. It
    also keeps track of what is checked out and who checked it out and when. It checks
    those values when you try to check in. When Bob tried to check in, his VCS realized
    that the version of the code he was trying to check in was older than the current
    version in the repository (the new one that Alice had checked in earlier), so
    it let him know that. So, what is Bob to do? That’s where the third part of copy-modify-merge
    comes in: Bob needs to tell the VCS to merge his changes with the current version
    of PhoneContact.java and then check in the updated version. This works just fine
    if Alice and Bob have changed different parts of the file; their changes do not
    conflict and VCS can just do the merge automatically and check in the new file.
    On the other hand, if Alice and Bob did make changes to the same lines of code
    in the file, we end up with a *merge conflict*. In that case, Bob must do a manual
    merge of the two files. When manual merge is needed, the VCS will normally put
    both versions of the file on the screen, side by side, highlighting the conflicting
    lines of code, and then Bob can decide which version he wants, or he can make
    changes that resolve any inconsistencies. Bob is in control. Bob has to do this
    because the VCS isn’t smart enough to choose between the conflicting changes.
    Usually, a VCS will provide some help in doing the merge, but ultimately the merge
    decision must be Bob’s. Copy-modify-merge can occasionally make for extra work
    for whomever checks in second, but it allows both developers to work on the same
    file simultaneously and it doesn’t allow any changes to be lost automatically.


    Note, however, that changes can still be lost if Bob is not very careful during
    the manual merge; he may even want to discuss some conflicting changes with Alice
    to ensure both sets of modifications are preserved and merged correctly. The merged
    code should then be fully retested before it is checked into the repository. Another
    problem with copy-modify-merge is that if your repository allows you to store
    binary files, you can’t merge them. Say you have two versions of the same jpg
    file. How do you decide which of the bits is correct? In this case, the VCS will
    require you to use lock-modify-unlock.


    A typical working cycle for any version control system will look like the following.
    Before anything else starts, the developer must create a *local repository* for
    the project. This can happen automatically using a client program, or the developer
    can manually create a directory that will house the repository. Some systems allow
    the developer to do an initial check out and will create the repository for them.
    Then


    1.  The developer *checks out* the code they want from the project.


    2.  The developer edits, compiles, debugs, and tests the code.


    3.  When ready to upload their changes to the main repository, the developer will
    *commit* the changes; this will automatically check in the changed files.


    4.  Usually, the system will attempt to do an *automatic merge* of the changes.
    If there is a *merge conflict*, the developer will be notified and will be prompted
    to do a manual merge.


    5.  Once all merge conflicts are resolved, the changed files are in the main repository
    and ready to be checked out again by other developers.


    ## Source Code Control Systems


    ### Subversion


    Copy-modify-merge is the strategy used by most version control systems these days,
    including the popular open-source distributed version control system, Subversion
    ([`https://subversion.apache.org`](http://subversion.apache.org/)).^([^(285)](#fn285))
    Subversion (SVN) was first developed in 2000 and is a rewrite and update of an
    older VCS called the Concurrent Versions System (CVS). CVS itself is a front end
    to a version control system developed in 1982 called the Revision Control System
    (RCS). Subversion is much more fully featured and sophisticated than either CVS
    or RCS. While it is primarily used in software development projects, it can be
    used as a version control system for any type of file in any type of project.
    Subversion comes in both command line versions and in GUI versions, like RapidSVN,
    TortoiseSVN, and SmartSVN. There are also plug-ins for various IDEs, like subclipse^([^(286)](#fn286))
    for the Eclipse IDE.


    Subversion is an example of a *centralized version control* system (also known
    as client-server), where there is a centralized database of all the source code
    and users access the database via a local client. This centralized database can
    be on the local machine, it can be on a remote *svnserve* server machine, or it
    can be on a remote Apache server. The user can set things up so the local svn
    client knows where the version control database is located. Checked-out *working
    copies* of files are a developer’s own private copy of the file, stored locally
    in a tree hierarchy repository. Subversion defaults to the copy-modify-merge version
    control model but can also be configured to use the lock-modify-unlock model on
    individual files. For more information and a link to the online copy of the aptly
    named *Subversion Book*, go to [`https://subversion.apache.org`](https://subversion.apache.org/).'
  trans: '

    #### 冲突：使用复制-修改-合并


    第二种策略是*复制-修改-合并*。在这种策略中，爱丽丝和鲍勃都可以自由签出 `PhoneContact.java` 的可编辑副本。假设爱丽丝先做了修改，并将新版本文件签回仓库。当鲍勃完成修改后，他尝试将新版本的
    `PhoneContact.java` 签入仓库，但版本控制系统（VCS）却告知他，他的文件版本“已过期”；鲍勃无法签入。这是怎么回事？


    VCS 会为每个签出的文件打上时间戳和版本号标记。它还会跟踪哪些文件被签出、由谁签出以及何时签出。当你尝试签入时，它会检查这些值。当鲍勃尝试签入时，他的 VCS
    发现他试图签入的代码版本比仓库中的当前版本（爱丽丝之前签入的新版本）更旧，因此系统通知了他。那么，鲍勃该怎么办？这就是复制-修改-合并的第三部分发挥作用的地方：鲍勃需要告诉
    VCS 将他的修改与当前版本的 `PhoneContact.java` 合并，然后签入更新后的版本。如果爱丽丝和鲍勃修改了文件的不同部分，这完全没问题；他们的修改不会冲突，VCS
    可以自动完成合并并签入新文件。另一方面，如果爱丽丝和鲍勃确实修改了文件中的相同代码行，我们就会遇到*合并冲突*。在这种情况下，鲍勃必须手动合并这两个文件。当需要手动合并时，VCS
    通常会将文件的两个版本并排显示在屏幕上，高亮显示冲突的代码行，然后鲍勃可以决定保留哪个版本，或者进行修改以解决所有不一致之处。鲍勃掌握着控制权。鲍勃必须这样做，因为
    VCS 不够智能，无法在冲突的修改之间做出选择。通常，VCS 会在合并过程中提供一些帮助，但最终的合并决定必须由鲍勃做出。复制-修改-合并有时会给后签入的人带来额外的工作，但它允许两位开发者同时处理同一个文件，并且不会自动丢失任何修改。


    但请注意，如果鲍勃在手动合并过程中不够仔细，修改仍然可能丢失；他甚至可能需要与爱丽丝讨论一些冲突的修改，以确保两组修改都被保留并正确合并。合并后的代码在签入仓库之前应进行全面的重新测试。复制-修改-合并的另一个问题是，如果你的仓库允许存储二进制文件，则无法合并它们。假设你有同一个
    jpg 文件的两个版本。你如何判断哪些比特是正确的？在这种情况下，VCS 会要求你使用锁定-修改-解锁。


    任何版本控制系统的典型工作周期如下所示。在开始任何其他操作之前，开发者必须为项目创建一个*本地仓库*。这可以通过客户端程序自动完成，或者开发者可以手动创建一个目录来存放仓库。有些系统允许开发者进行初始签出，并自动为他们创建仓库。然后：


    1.  开发者从项目中*签出*他们需要的代码。

    2.  开发者编辑、编译、调试和测试代码。

    3.  当准备好将修改上传到主仓库时，开发者会*提交*修改；这将自动签入已修改的文件。

    4.  通常，系统会尝试对修改进行*自动合并*。如果出现*合并冲突*，开发者会收到通知，并被提示进行手动合并。

    5.  一旦所有合并冲突都得到解决，修改后的文件就位于主仓库中，可供其他开发者再次签出。


    ## 源代码控制系统


    ### Subversion


    复制-修改-合并是当今大多数版本控制系统使用的策略，包括流行的开源分布式版本控制系统 Subversion（[`https://subversion.apache.org`](http://subversion.apache.org/)）。^(²⁸⁵)
    Subversion（SVN）最初于 2000 年开发，是对旧版 VCS——并发版本系统（CVS）的重写和更新。CVS 本身是 1982 年开发的修订控制系统（RCS）的前端。Subversion
    的功能和复杂性远超 CVS 或 RCS。虽然它主要用于软件开发项目，但它可以作为任何类型项目中任何类型文件的版本控制系统。Subversion 既有命令行版本，也有图形用户界面（GUI）版本，如
    RapidSVN、TortoiseSVN 和 SmartSVN。还有针对各种集成开发环境（IDE）的插件，例如用于 Eclipse IDE 的 subclipse^(²⁸⁶)。


    Subversion 是*集中式版本控制*系统（也称为客户端-服务器模式）的一个例子，其中有一个所有源代码的集中式数据库，用户通过本地客户端访问该数据库。这个集中式数据库可以位于本地机器上，可以位于远程的
    *svnserve* 服务器上，也可以位于远程的 Apache 服务器上。用户可以设置配置，使本地 svn 客户端知道版本控制数据库的位置。签出的*工作副本*文件是开发者自己的私有文件副本，以树形层次结构存储在本地仓库中。Subversion
    默认使用复制-修改-合并版本控制模型，但也可以配置为对单个文件使用锁定-修改-解锁模型。有关更多信息以及在线版《Subversion 宝典》（书名恰如其分）的链接，请访问
    [`https://subversion.apache.org`](https://subversion.apache.org/)。

    '
- fmt: '### Git and GitHub


    `Git`（[`www.git-scm.com`](http://www.git-scm.com)）是一种最流行的开源分布式版本控制系统，它采用一种模型，为每位开发者提供源代码文件的本地副本以及项目的完整开发历史。当开发者修改文件时，这些更改会通过`git`命令同步到其他开发者的本地仓库。`Git`使用一种称为“不完全合并”的模型，并配合多种插件式合并工具来协调跨仓库的合并。`Git`还可以连接并同步网络中（包括互联网）不同计算机上的远程仓库。请注意，任意时刻两位开发者的本地仓库可能不同步，但所有开发者仓库的总和构成了项目的源代码，这使得`git`成为一种分布式版本控制系统。保持仓库同步是开发者的责任（但请参见下文中的`GitHub`和`Bitbucket`）。`Git`的主要优点是速度快，它可能是最快的分布式版本控制系统。`Linus
    Torvalds`（同样以开发`Linux`内核而闻名）最初开发了`Git`。


    `Git`通常通过命令行运行，默认只附带命令行工具（尽管许多图形界面版本也很容易获得）。与其他版本控制系统一样，`git`使用“主分支”的概念，开发者可以从主分支`pull`以获取最新的本地代码副本进行工作。开发者还可以创建独立于主分支的“分支”，这样他们的工作就不会干扰其他开发者，直到他们进行合并。`Git`使得创建仓库变得非常简单：创建一个目录，从终端窗口导航到该目录，然后通过输入`$
    git init`在该位置初始化一个新仓库。


    典型的`git`工作流程包含以下基本步骤^([^(287)](#fn287))：


    1. 从远程仓库`Pull`，查看所有人所做的所有更改。

    2. 将刚刚拉取的更改`Merge`到你的本地仓库，以更新你的个人副本。

    3. 从现有分支`Branch`出去，或者`Checkout`一个分支直接在上面工作。

    4. 根据需要`Edit`文件。

    5. `Compile`、`Debug`和`Test`。

    6. 将全部或部分更改过的文件`Add`到暂存区（`git`用来指示哪些文件准备提交回源代码仓库的抽象区域）。

    7. 将暂存区中的文件`Commit`到本地仓库。

    8. 将更改`Push`到远程仓库，因为其他开发者无法看到你的本地版本。


    `Git`的一个扩展称为`GitHub`，它是基于Web的`git`版本，允许创建和维护可通过互联网访问的远程仓库。`GitHub`提供`git`的所有常规服务，还具备访问控制、缺陷跟踪、Web托管服务、维基和项目管理服务。`GitHub`拥有超过2000万用户，托管超过5000万个仓库。请参见[`https://github.com/`](https://github.com/)。


    你可以在[`https://git-scm.com/doc`](https://git-scm.com/doc)找到所有`git`命令和教程^([^(288)](#fn288))。`git`还有许多图形界面。最流行的两个是`GitHub
    Desktop`（可在[`https://desktop.github.com/`](https://desktop.github.com/)找到）和`gitKraken`（位于[`www.gitkraken.com/`](http://www.gitkraken.com/)），后者同时支持`git`和`Mercurial`。


    ### Mercurial


    `Mercurial`是另一种流行的免费分布式版本控制系统。与`git`类似，它主要是一个命令行工具。它使用与`git`几乎相同的仓库和工作流程模型，包括拉取和推送分支、提交和合并的概念。与暂存区不同，`Mercurial`有一个“变更集”的概念，即自上次提交以来所有已修改文件的集合。它还允许你查看不同版本文件之间的差异、查看自上次提交以来仓库的当前状态，以及查看仓库中已完成工作的摘要。`Mercurial`可在[`www.mercurial-scm.org/`](http://www.mercurial-scm.org/)免费在线获取，其免费在线书籍和教程可在[`https://book.mercurial-scm.org/`](https://book.mercurial-scm.org/)找到。


    ## 关于编码与调试的最后一个想法：结对编程


    结对编程^([^(289)](#fn289))是一种提高软件质量和程序员性能的技术（更多信息请参见第[2](#270563_3_En_2_Chapter.xhtml)章）。在结对编程中，两个人共用一台电脑和一个键盘。一个人“驾驶”，即控制键盘并编写代码；另一个人“导航”，即观察代码中的错误、提出更改建议和测试用例。两人会定期交换角色。结对可以长时间在同一个项目上合作，也可以在每个编程任务中更换搭档。结对编程在敏捷开发环境中尤其流行；在`Extreme
    Programming`模型中，所有开发者都必须进行结对编程，并且任何未经两人编写的代码都不允许集成到项目中。多项研究^([^(290)](#fn290))表明，结对编程能减少代码中的错误数量并提高程序员的生产力。因此，这是我们最后的调试技巧：结对编程！


    ## 结论


    就像编写良好、高效的代码一样，调试是所有程序员都需要培养的技能。做一个细心的编码者意味着你将花更少的时间调试，但调试总是存在的。程序员都是人，我们总会犯错。随着我们技能的提高，我们处理的问题也更难，因此调试的难题永远不会结束。拥有一个装满调试技能的工具箱将帮助你更快地找到代码错误的根本原因，并帮助你避免引入更多错误。代码审查（第[19](#270563_3_En_19_Chapter.xhtml)章）、调试和单元测试（你将在下一章中看到）的结合，是开发者用来发布无缺陷代码的制胜组合。'
  raw: '### Git and GitHub


    *Git* ([`www.git-scm.com`](http://www.git-scm.com)), a candidate for most popular
    open-source *distributed version control system*, uses a model that provides each
    developer with their own local copies of the source files as well as the entire
    development history of the project. When a developer makes a change to a file,
    the changes are synced to the other developers’ local repositories via the use
    of git commands. Git uses a model called an *incomplete merge**,* along with a
    number of plug-in merge tools to coordinate merges across repositories. Git can
    also connect with and sync remote repositories on different computers across a
    network (including the Internet). Note that two developers’ local repositories
    may be out of sync at any given time, but the totality of all the developer’s
    repositories is what constitutes the project’s source code, making git a distributed
    version control system. It is up to the developers to keep their repositories
    in sync (but see GitHub and Bitbucket below). Git’s main virtue is speed. It may
    be the fastest distributed VCS around. Linus Torvalds, who also famously developed
    the Linux kernel, originally developed Git.


    Git is typically run via the command line and by default is only distributed with
    command line tools (though many GUI versions are readily available). Like other
    version control systems, git uses the idea of a *main branch* of the code that
    a developer can *pull* from to get up to date local copies of the code to work
    on. Developers can also make separate *branches* of the master so that their work
    doesn’t interfere with other developers until they merge. Git makes it trivially
    easy to create repositories: create a directory, navigate to that directory from
    a terminal window, and initialize a new repository at that location by typing
    `$ git init`.


    Typical git workflow has the following basic steps^([^(287)](#fn287)):


    1.  *Pull* from the remote version of the repository to see all changes anyone
    has made.


    2.  *Merge* the changes you just pulled into your local repository to update your
    personal copy.


    3.  *Branch* off of an existing branch or check out a branch to work directly
    on it.


    4.  *Edit* the files as needed.


    5.  *Compile, debug, and test.*


    6.  *Add* all or a subset of the changed files to the staging area (an abstract
    area git uses to indicate which files are candidates for committing back into
    the source code repository).


    7.  *Commit* the files from the staging area into the local repository.


    8.  *Push* to the remote version of the repository because other developers cannot
    see your local version.


    An extension of git called *GitHub* is a web-based version of git that allows
    the creation and maintenance of remote repositories accessible across the Internet.
    GitHub provides all the regular services of git, but also features access control,
    bug tracking, a web hosting service, wikis, and project management services. GitHub
    has more than 20 million users and hosts more than 50 million repositories. See
    [`https://github.com/`](https://github.com/).


    You can find all the git commands and tutorials at [`https://git-scm.com/doc`](https://git-scm.com/doc).^([^(288)](#fn288))
    There are also many graphical interfaces to git. The two most popular are the
    *GitHub Desktop*, which you can find at [`https://desktop.github.com/`](https://desktop.github.com/)
    and *gitKraken* at [`www.gitkraken.com/`](http://www.gitkraken.com/) which works
    with both *git* and *Mercurial*.


    ### Mercurial


    *Mercurial* is another popular free*, distributed version control system*. Like
    *git*, it is primarily a command line tool. It uses practically the same repository
    and workflow models as git, including the ideas of pulling and pushing branches,
    commits, and merges. Instead of staging, Mercurial has the idea of a *changeset*
    that is the set of all the files that have been modified since the last commit.
    It also allows you to view changes between different versions of files, look at
    the current status of the repository since the last commit, and view a summary
    of the work that has gone on in the repository. Mercurial is available free online
    at [`www.mercurial-scm.org/`](http://www.mercurial-scm.org/) and a free online
    book and tutorial is available at [`https://book.mercurial-scm.org/`](https://book.mercurial-scm.org/).


    ## One Last Thought on Coding and Debugging: Pair Programming


    Pair programming^([^(289)](#fn289)) is a technique to improve software quality
    and programmer performance (for more, see Chapter [2](#270563_3_En_2_Chapter.xhtml)).
    In pair programming, two people share one computer and one keyboard. One person
    “drives” by controlling the keyboard and writing the code, and the other “navigates”
    by watching for errors in the code, suggesting changes and test cases. Periodically
    the driver and the navigator switch places. Pairs can work together for long periods
    of time on a project, or pairs can change with each programming task. Pair programming
    is particularly popular in agile development environments; in the *Extreme Programming*
    model, all developers are required to pair program and no code that has not been
    written by two people is allowed to be integrated into the project. There have
    been several studies^([^(290)](#fn290)) that show that pair programming decreases
    the number of errors in code and improves the productivity of programmers. So
    this is our final debugging technique: pair program!


    ## Conclusion


    Just like writing good, efficient code, debugging is a skill that all programmers
    need to develop. Being a careful coder will mean you’ll spend less time debugging,
    but there will always be debugging. Programmers are all human and we’ll always
    make mistakes. As we get more skilled, we work on harder problems, so the debugging
    puzzles never end. Having a toolbelt full of debugging skills will help you find
    the root causes of errors in your code faster and it will help you from injecting
    more errors. The combination of reviews (Chapter [19](#270563_3_En_19_Chapter.xhtml)),
    debugging, and unit testing (as you’ll see in the next chapter) is the knock-out
    punch that a developer uses to release defect-free code.'
  trans: '

    ### Git 与 GitHub


    *Git* ([`www.git-scm.com`](http://www.git-scm.com)) 堪称最流行的开源*分布式版本控制系统*之一，它采用的模型为每位开发者提供了源代码文件的本地副本以及项目的完整开发历史。当开发者修改文件时，这些更改会通过
    git 命令同步到其他开发者的本地仓库。Git 使用一种称为*不完全合并*的模型，并借助多种插件式合并工具来协调跨仓库的合并。Git 还能通过网络（包括互联网）连接并同步不同计算机上的远程仓库。请注意，任意时刻两位开发者的本地仓库可能不同步，但所有开发者仓库的总和构成了项目的源代码，这使得
    git 成为一种分布式版本控制系统。保持仓库同步是开发者的责任（但请参见下文中的 GitHub 和 Bitbucket）。Git 的主要优势在于速度。它可能是目前最快的分布式版本控制系统。同样以开发
    Linux 内核而闻名的林纳斯·托瓦兹最初开发了 Git。


    Git 通常通过命令行运行，默认情况下仅附带命令行工具（不过许多图形界面版本也随时可用）。与其他版本控制系统一样，git 使用代码*主分支*的概念，开发者可以从中*拉取*代码，获取最新的本地副本进行工作。开发者还可以创建主分支的独立*分支*，这样在合并之前，他们的工作不会干扰其他开发者。Git
    使得创建仓库变得极其简单：创建一个目录，从终端窗口导航到该目录，然后通过输入 `$ git init` 在该位置初始化一个新仓库。


    典型的 git 工作流程包含以下基本步骤^(²⁸⁷)：


    1.  从远程仓库*拉取*，查看所有人所做的所有更改。

    2.  将刚拉取的更改*合并*到本地仓库，以更新个人副本。

    3.  从现有分支*创建新分支*，或检出某个分支直接在上面工作。

    4.  根据需要*编辑*文件。

    5.  *编译、调试和测试。*

    6.  将全部或部分更改过的文件*添加*到暂存区（git 使用的一个抽象区域，用于指示哪些文件适合提交回源代码仓库）。

    7.  将暂存区中的文件*提交*到本地仓库。

    8.  *推送*到远程仓库，因为其他开发者无法看到你的本地版本。


    Git 的一个扩展称为 *GitHub*，它是基于 Web 的 git 版本，允许创建和维护可通过互联网访问的远程仓库。GitHub 提供 git 的所有常规服务，同时还具备访问控制、缺陷跟踪、网页托管服务、维基和项目管理服务。GitHub
    拥有超过 2000 万用户，托管着超过 5000 万个仓库。请参见 [`https://github.com/`](https://github.com/)。


    你可以在 [`https://git-scm.com/doc`](https://git-scm.com/doc) 找到所有 git 命令和教程。^(²⁸⁸)
    此外还有许多 git 的图形界面。最流行的两个是 *GitHub Desktop*（可在 [`https://desktop.github.com/`](https://desktop.github.com/)
    找到）和 *gitKraken*（位于 [`www.gitkraken.com/`](http://www.gitkraken.com/)），后者同时支持
    *git* 和 *Mercurial*。


    ### Mercurial


    *Mercurial* 是另一个流行的免费*分布式版本控制系统*。与 *git* 一样，它主要是一个命令行工具。它使用的仓库和工作流程模型与 git 几乎相同，包括拉取和推送分支、提交和合并的概念。与暂存区不同，Mercurial
    引入了*变更集*的概念，即自上次提交以来所有被修改文件的集合。它还允许你查看不同版本文件之间的差异、查看自上次提交以来仓库的当前状态，以及查看仓库中已完成工作的摘要。Mercurial
    可在 [`www.mercurial-scm.org/`](http://www.mercurial-scm.org/) 免费在线获取，同时可在 [`https://book.mercurial-scm.org/`](https://book.mercurial-scm.org/)
    找到免费的在线书籍和教程。


    ## 关于编码与调试的最后一思：结对编程


    结对编程^(²⁸⁹) 是一种提高软件质量和程序员绩效的技术（更多信息请参见第 2 章）。在结对编程中，两人共用一台电脑和一个键盘。一人通过控制键盘编写代码来“驾驶”，另一人则通过观察代码中的错误、提出修改建议和测试用例来“导航”。两人会定期交换角色。结对可以长期合作完成一个项目，也可以根据每个编程任务更换搭档。结对编程在敏捷开发环境中尤为流行；在*极限编程*模型中，所有开发者都必须进行结对编程，并且任何未经两人共同编写的代码都不允许集成到项目中。多项研究^(²⁹⁰)
    表明，结对编程能减少代码中的错误数量，并提高程序员的生产力。因此，这是我们最后的调试技巧：结对编程！


    ## 结论


    就像编写良好、高效的代码一样，调试是所有程序员都需要培养的技能。成为一名细心的编码者意味着你将花更少的时间调试，但调试始终存在。程序员都是凡人，我们总会犯错。随着技能提升，我们处理的问题也愈发困难，因此调试的难题永无止境。掌握一整套调试技能将帮助你更快地找到代码错误的根本原因，并防止你引入更多错误。将评审（第
    19 章）、调试和单元测试（你将在下一章看到）相结合，是开发者用来发布无缺陷代码的制胜组合拳。

    '
- fmt: '# 18. Unit Testing


    > *More than the act of testing, the act of designing tests is one of the best
    bug preventers known. The thinking that must be done to create a useful test can
    discover and eliminate bugs before they are coded—indeed, test-design thinking
    can discover and eliminate bugs at every stage in the creation of software, from
    conception to specification, to design, coding and the rest.*

    >

    > —Boris Beizer


    > *You can see a lot by just looking.*

    >

    > —Yogi Berra


    As was emphasized in the last chapter, nobody is perfect, including software developers.
    In Chapter [17](#270563_3_En_17_Chapter.xhtml), we talked about different things
    to look for when you *know* there are errors in your code. Now we’re going to
    talk about how to determine whether there are errors. Of the three types of errors
    in your code, the compiler will find the syntax errors and the occasional semantic
    error. In some language environments, the runtime system will find others (to
    your users’ chagrin). The rest of the errors are found either through testing
    or through code reviews and inspections. In this chapter, we’ll discuss testing:
    what it is, when to do it, how to do it, what your tests should cover, and the
    limitations of testing. The next chapter will cover code reviews and inspections.


    There are three levels of testing in a typical software development project: unit
    testing, integration testing, and system testing.


    *Unit testing* is typically done by you, the developer, through testing individual
    methods and classes. Unit testing typically excludes larger configurations of
    the program, interfaces, or library interactions—except those that your method
    might actually be using. Because you are unit testing your own code, you know
    how all the methods are written, what the data is supposed to look like, what
    the method signatures are, and what the return values and types should be. This
    is known as *white-box testing*, *transparent-box testing*, *clear-box testing*,
    or *glass-box testing*, all alluding to the direct visibility of the details of
    the code being tested.


    *Integration testing* is typically done by a separate testing organization and
    consists of testing the interaction and interfaces of the collection of classes
    or modules that interact with each other. Testers write their tests with knowledge
    of the interfaces but not with information about the internal implementation of
    each module. Because of this, integration testing is sometimes called *gray-box
    testing*, alluding the fact that testers have only partial, interface-level visibility
    of the internal structure. Integration testing is done after unit tested code
    is integrated into the source code base. To find any errors in how the new module
    interacts with the existing code, a partial or complete version of the product
    is built and tested. Integration testing is also performed when errors discovered
    in a module are fixed and the module is reintegrated into the code base.


    As a developer, you will do some integration testing yourself: each time you work
    on a separate code branch, you will integrate your new or updated code into that
    branch and then test the entire application to make sure you’ve not broken anything
    anywhere outside the immediate purview of your unit testing. You will also usually
    do your own unit and integration testing when you are fixing an error that has
    been discovered in an already released product. In this case, you’ll receive a
    report from either the customer or from your company’s customer support organization
    that some part of the program is not working correctly. It is then your job to
    reproduce the error, isolate it, fix it, test it in isolation, integrate the fix,
    and then test it again in the newly built product to make sure it’s actually fixed
    and you have not introduced a new error. This “bug fixing” role is something that
    many new developers do when they first start at a company and is an excellent
    way to get familiar with the company’s products, tools, and procedures.


    *System testing* is also typically done by a separate testing organization, testing
    of the entire software product (the system) on both internal baselines and on
    the final baseline proposed for release to customers. System testing is like integration
    testing on steroids. All of the recent changes by all developers are used to build
    a new version of the product, which is then tested as a whole. The separate testing
    organization uses the requirements and writes their own tests, usually without
    knowing anything about the details of how the program is designed or written.
    This is known as *black-box testing*, because the program is opaque to the tester
    except for the inputs it takes and the outputs it produces. The job of the testers
    at this level is to make sure that the program implements all the requirements.
    Black box testing can also include stress testing, usability testing, and acceptance
    testing. End users may be involved in this type of testing.


    ## The Problem with Testing


    Despite testing to determine whether and when your program doesn’t work as expected,
    there is no guarantee it will lead you to uncover all of the issues in the code.
    There are a number of reasons why testing isn’t perfect.


    For one, when testing your own code using your own tests, you can easily miss
    something. If you didn’t think of an edge case while coding, you could just as
    easily miss a test case that would catch the problem. If you made a mistake when
    you wrote the code, why should you assume you won’t make the same mistake when
    you read it or try to test it? If you misunderstood the problem in some way, it’s
    unlikely you will catch that misunderstanding right away. This happens for even
    small programs, but it’s particularly true for larger programs. If you have a
    50,000-line program, that’s a lot to read and understand and you’re bound to miss
    something. Also, static reading of programs won’t help you find those dynamic
    interactions between modules and interfaces. So you need to test more intelligently
    and combine both static (code reading) and dynamic (testing) techniques to find
    and fix errors in programs.


    Another reason errors escape from one testing phase to another and ultimately
    to the user is that software, more than any other product that humans manufacture,
    is very dynamic: even small programs have many pathways through the code and many
    different types of data errors that can occur. This large number of pathways through
    a program leads to a *combinatorial explosion* of possibilities. Every time you
    add an `if` statement to your program, you double the number of possible paths
    through the program: you have one path through the code if some conditional expression
    is `true`, and a different path if it’s `false`. Every time you add a new input
    value, you increase system complexity and increase the number of possible errors.
    As a result, for large programs, you can’t possibly test every possible path through
    the program with every possible input value, as there are an exponential number
    of code-path and data-value combinations.


    So, what to do? If brute force is *intractable*, then you need a better plan.
    A tangible option is to identify the most probable use cases and test those. You
    need to identify and test the likely input data values, the boundary conditions
    for data, and the likely code paths. This, it turns out, will get you most of
    the errors. Steve McConnell says in *Code Complete* that a combination of good
    testing and code reviews can uncover more than 95% of errors in a good-sized program.^([^(291)](#fn291))
    That’s a solid goal to shoot for with real-world problems.'
