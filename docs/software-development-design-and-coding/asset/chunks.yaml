- fmt: '# The Kanban Board


    To help organize development, Kanban employs the following notions:


    - `Work in progress (WIP)` is the total number of tasks the team is currently
    working on, including all the states in which a task may find itself (in-progress,
    done, testing, review, etc.).

    - `Flow` is the passage of tasks from one state to another on the way to completion.

    - `Lead time`: The amount of time (in hours or days) it takes for the team to
    get a task from the initial `ToDo` state to the `Done` state. Over time, as the
    team finishes more and more tasks, the average lead time can be computed for the
    team, allowing for an estimation of how long it will take any one task to get
    `Done`, which serves as a measure of productivity.


    What distinguishes Kanban is the continuous flow of the work. There are no timeboxed
    sprints and, consequently, no smaller sprint backlogs containing a subset of tasks
    for the team to focus on next. All remaining `ToDos` are in a single backlog and
    to help the team get organized, Kanban uses `swimlanes`: horizontal dividers to
    segment the tasks. Swimlanes can represent any useful separation, including task
    priority, task type, different projects/products, and even different teams.


    With all remaining tasks sitting in the backlog, limited work-in-progress is how
    you allow the team to stay focused on the flow. Work-in-progress and flow can
    be asynchronously tracked by developers using the `Kanban board`, a variant on
    the Scrum `task board`. Figure [2-5](#270563_3_En_2_Chapter.xhtml#Fig5) shows
    a generic task/Kanban board. These boards can be physical white boards that occupy
    one wall of a common space for the team or shared digital boards. On this board
    the team will add physical or digital post-it notes to identify tasks, which can
    then be moved from column to column (i.e., state-to-state) on the board.


    ![](images/270563_3_En_2_Chapter/270563_3_En_2_Fig5_HTML.jpg)


    A table comprises 4 columns labeled product backlog or To-do, doing, quality assurance
    or review, and done. The product backlog comprises 9 tokens from token 1 to token
    9. The tokens are grouped under Swimlane 1, Swimlane 2, and expedite.


    **Figure 2-5** A generic task/Kanban board, with WIP maxima and swimlanes, with
    arrows depicting flow


    With this type of board, users have the option of changing the number and headings
    of the columns in order to make the board fit their process. Kanban works by using
    a `pull system`: instead of pushing items out to other stages, Kanban tells developers
    to pull items from a previous stage as they have the capacity to handle them.
    At the end of every task completion, the team will have working software with
    a new feature added.


    The team can then specify the maximum number of tasks that are allowed to be worked
    on simultaneously (i.e., “Doing” and “Quality Assurance/Review”) referred to as
    the work-in-progress or `WIP`, used to control the flow of work through the team.
    There is not hard rule for the `WIP`, but it should account for: 1) the number
    of people on the team and 2) how many tasks should each person be juggling concurrently.
    The general recommendation is somewhere between 1 to 2 tasks per person. For example,
    let’s say that every state on the Kanban board is maxed-out (there are `N` tasks
    in development, `M` in review/testing) and a developer finishes developing a new
    task. This task cannot move to the `Review` state until one of the tasks currently
    under review is finished. We’ve just exposed a bottleneck in the flow of work.
    In Kanban, the developer would jump in to help review one of the tasks in that
    state. No new tasks can be pulled into the `Develop` state until there is room
    for the finished task downstream.


    In Kanban, the objective is to maximize `WIP` within the constraint of the maximum
    number of tasks allowable at any time. There is no time-boxing as in Scrum; the
    goal is to move tasks through as quickly as possible (have the shortest `lead
    time`) while maximizing productivity by working up to the maximum number of tasks
    allowable.


    You can note that when we say `maximizing WIP`, we don’t mean giving the team
    more work. In fact, the goal in keeping the maximum number of tasks in each state
    low is to reduce the team’s workload and allow them to focus on a smaller number
    of tasks (we want to avoid multitasking). The idea is that this will reduce stress
    and expensive task-witching, while increasing work quality *and* throughput. You’ll
    notice that there are some things missing here, notably, how things get on the
    `ToDo` list, and what `Done` means. That’s because Kanban isn’t really a project
    management technique. In order to use Kanban, you need to have some process in
    place already and you need to manage it.


    ## Hybrid Software Development Approaches for Multi-Level Focus and Scope


    Multiple software development philosophies and even multiple implementations can
    coexist effectively within the same organization, team, or project. You may need
    to choose several approaches to help you get organized at different times and
    focus levels. Consider that the overall company needs to get organized, a project
    needs to get organized, and development needs to get organized.


    > *“While all of the Agile processes have commonality, their sweet spots are attuned
    to specific organizational levels: different “views” for different audiences.
    Lean shines when applied to those with a strategic, organization and shareholder
    value focus: the Executive. Scrum shines when applied to those with a team organization,
    management, and project delivery focus: the Project Management. Extreme Programming
    shines when applied to those with a development delivery and tactical focus: the
    Development.”*^([^(32)](#fn32))


    Most notably, it is not `lean` versus `agile`, but rather crucially `lean` AND
    `agile`, where `lean` focuses on improving the process by reducing wastes, while
    `agile` focuses on improving the product by effectively adapting to new information
    throughout the project. Both are crucial to developing software. Additionally,
    `agile` does not mean no `planning`, as not thinking far enough ahead can lead
    to incorrect early decisions; a better perspective is to borrow `lean`’s deferring
    of commitment to ensure that early decisions to do not eliminate potentially useful
    future options. Here are a few ways that the implementations of these ideas can
    play off of each other:


    - Lean can be naturally combined with Scrum, as agile allows early feedback, reducing
    how much needs to be reworked, and clear shared understanding among teammates
    can reduce motion, defects, non-utilizing talent, overproduction, and waiting.

    - Since XP is mainly focused on programming, development can easily benefit from
    team management defined in Scrum.

    - While coding individual features, developers naturally employ mini Waterfalls,
    creating a plan and following it to develop and test each new feature.

    - While developing prior to an initial release to the public may be most fruitful
    with Scrum, providing continuous services and fast changing projects may be better
    represented through Kanban, allowing for a continuous approach.

    - Scrum is well suited to projects where discrete increments are meaningful and
    for working toward an initial release, while Kanban lends itself naturally to
    ongoing operation such as providing a continuous service; Scrumban^([^(33)](#fn33))
    is a fused approach that allows for the development of new features while also
    providing ongoing services.


    As can be seen from the methodologies described in this chapter, iteration and
    collaboration are the key. The most effective way to build complex software is
    to incrementally gather insights, leaning what to make and how to make it better
    at each following step. You must recognize that you never have all the knowledge
    at the start, and that designing, writing, testing, and delivering incrementally
    better code is the most reliable and effective path toward creating great software.'
