- fmt: "# 20. Wrapping It All Up\n\n> *All programmers are optimists. Perhaps this\
    \ modern sorcery especially attracts those who believe in happy endings and fairy\
    \ godmothers. Perhaps the hundreds of nitty frustrations drive away all but those\
    \ who habitually focus on the end goal. Perhaps it is merely that computers are\
    \ young, programmers are younger, and the young are always optimists.*\n> \n>\
    \ —Frederick Brooks, Jr.^([^(308)](#fn308))\n\n> *It’s the only job I can think\
    \ of where I get to be both an engineer and an artist. There’s an incredible,\
    \ rigorous, technical element to it, which I like because you have to do very\
    \ precise thinking. On the other hand, it has a wildly creative side where the\
    \ boundaries of imagination are the only real limitation.*\n> \n> —Andy Hertzfeld\n\
    \nReading Alex E. Bell’s^([^(309)](#fn309)) and Mark Guzdial’s^([^(310)](#fn310))\
    \ “Viewpoint” columns in the August 2008 issue of *Communications of the ACM*,\
    \ we were struck by the synergy of the two articles. One is a cautionary tale\
    \ about the tools to use in professional software development, and the other is,\
    \ at least in part, a cautionary tale about language and syntax use in teaching\
    \ programming. This got us thinking about all the silver bullets we’ve tried in\
    \ both development and education, and why most of them don’t matter to real software\
    \ development. This seems like an appropriate way to wrap up this extended discussion\
    \ on software development.\n\n## What Have You Learned?\n\nAs we’ve maintained\
    \ throughout this book, software development is hard. It takes a lot of dedication\
    \ and practice to do it and even more to do it well. This, of course, is the attraction.\
    \ Easy problems are boring, without mystery, without the thrill of the chase,\
    \ and without the reward of accomplishment. The challenge is to work on something\
    \ you’ve never done before, something you might not even know if you can solve.\
    \ That’s what has you coming back to the puzzles of software creation again and\
    \ again.\n\nSoftware development is one of the most creative and powerful things\
    \ a human can do. Out of nothing, one takes a problem, wrestles with it, explores\
    \ it, pokes at it, rips it apart, puts it back together in a different form, comes\
    \ up with that bit of problem-solving inspiration, and then converts it all into\
    \ an artifact that others can use effortlessly. Addressing real-world needs with\
    \ your software is just the coolest thing.\n\nWriting software is also a humbling\
    \ experience. It is so hard to get software right and so easy to get it wrong.\
    \ In writing software, you’ve learned to embrace failure. Failure is an exciting\
    \ and frustrating part of the process. Failure teaches you about the problems,\
    \ but also about yourself: you learn how you approach problems, the types of mistakes\
    \ you’re prone to make, and how to work around them. Failure teaches you perseverance\
    \ because you are unlikely to get everything right on the first try, so you just\
    \ have to keep working until the program does.\n\nSmall teams build most software,\
    \ and they build the best software. Small, highly motivated and empowered teams\
    \ are the most productive. Small teams also tend to use a slimmed down development\
    \ process. Unless you work for a large company that’s desperate to be at SEI Capability\
    \ Maturity Model Level 5,^([^(311)](#fn311)) your processes can be very sparse.\
    \ Detailed problem descriptions (most recently in the form of user stories), brainstorming\
    \ design sessions, simple configuration management, peer code reviews, and a separate\
    \ testing team take care of everything necessary to create almost defect-free\
    \ code. Process flexibility, effective communication, and common product ownership\
    \ are the keys to project success.\n\nA lot of really good software gets written,\
    \ tested, and shipped every year; much more than the alleged “failure” numbers\
    \ would have one believe.^([^(312)](#fn312),[^(313)](#fn313),[^(314)](#fn314))\
    \ The main drivers of plan-driven development and agile development are the recognition\
    \ of the constant changes in requirements, and the idea that the end goal is always\
    \ working software. The best thing about agile development is that it recognizes\
    \ these facts and builds refactoring into its simple process.\n\nSimple tools\
    \ are the most effective. Simple tools allow you to get to the core of the puzzle\
    \ and examine it closely with nothing in your way. They allow you to take it out,\
    \ hold it in your hands, turn it over, and poke at it quickly and easily. Simple\
    \ tools also allow you to combine them together to do more complicated things.\
    \ We refer you to Stephen Jenkins’ article on “Old School” programming,^([^(315)](#fn315))\
    \ where he said it much better than we could.\n\nCoding, debugging, and unit testing\
    \ are at least as important as design. Experience gives a good programmer a deep\
    \ sense of design and a wealth of patterns to draw on; experience gives a great\
    \ programmer a deep, intimate knowledge of the programming language that is their\
    \ tool. It’s this deep, intimate knowledge that produces beautiful code.\n\nThe\
    \ process of debugging a long, complex program is an immensely rewarding endeavor.\
    \ Isolating a problem, uncovering mistakes, building debugging scaffolding, hypothesizing\
    \ a solution, reworking a design, finally identifying the error, and then creating\
    \ a correct fix gives one such a rush of elation and satisfaction that it’s at\
    \ times nearly overwhelming."
