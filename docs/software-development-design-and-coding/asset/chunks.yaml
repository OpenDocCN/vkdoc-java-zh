    \ Solving these problems usually involves restructuring the computations over\
    \ the linked data structure that exposes more concurrency."
  trans: "\n#### 设计空间：发现并发性\n\n*发现并发性*设计空间中的元模式用于开始设计并行应用程序。在考虑了待解决问题的高层要素之后，你将进入这个设计空间。你的目标是梳理出算法或程序中本质上是串行的部分，以及那些包含并发元素的部分。这通常需要你关注程序或算法中计算最密集的部分，因为这些区域最有可能发现并发性。发现并发性分为三个维度：分解、依赖分析和设计评估。\n\
    \n前两个维度，即*分解*和*依赖分析*维度，与你实现并行应用程序的方式相关。*分解*元模式用于将问题分解为可以并发执行的片段，而*依赖分析*元模式则有助于对要执行的任务进行分组，并分析这些任务之间的依赖关系。\n\
    \n*分解*维度仅包含两个元模式，用于发现并将问题划分为可以并发执行的部分：\n\n*   *任务分解*模式将复杂算法视为一组指令，这些指令可以组合成一组要并发执行的任务。\n\
    *   *数据分解*模式获取程序使用的数据，并尝试将其划分为可供每个任务使用的数据块。\n\n*依赖分析*维度包含三种不同的元模式，其职责是对上述找到的任务进行分组，并分析它们之间的依赖关系：\n\
    \n*   *分组任务*模式旨在对更方便的任务分组进行建模，从而简化依赖关系的管理。\n*   *排序任务*模式旨在找出如何对任务（或任务组）进行排序，以满足与任务执行相关的应用程序约束。\n\
    *   *数据共享*模式旨在对共享数据结构的访问进行建模。\n\n影响这些元模式设计的主要因素是灵活性、效率和简单性。需要灵活性来使程序设计适应不同的实现需求。效率通常与可扩展性相关：解决方案如何随目标并行计算机的规模进行扩展。最后，简单性是实现可理解性和可维护性的必要条件。\n\
    \n第三个维度，*设计评估*，并不是我们迄今为止使用该词意义上的维度或元模式。相反，它用于“指导算法设计者在进入*算法结构*设计空间中的模式之前，对已完成的工作进行分析。”^(²⁴⁴)\
    \ 设计评估实际上是一个过程，鼓励你迭代地评估设计，以尽可能达到最佳设计。在此过程中，你会提出一些问题，迫使你思考当前版本的设计。例如，该设计对目标平台的适用性如何？有多少个处理单元（PE）可用，其中有多少会被使用，以及使用频率如何？数据结构如何在\
    \ PE 之间共享？任务及其数据依赖关系的规律性如何？任务是否以最高效和最具可扩展性的方式分组？\n\n对*发现并发性*设计空间进行分析后，总体输出是将问题分解为不同的设计元素：i)\
    \ 识别出可以并发执行的任务的任务分解，ii) 识别出每个任务本地数据的数据分解，iii) 一种对任务进行分组并对这些任务组进行排序以满足时间和数据依赖关系的方式，以及\
    \ iv) 对任务间依赖关系的分析。\n\n#### 设计空间：算法结构\n\n*发现并发性*设计空间的输出被用于*算法结构*设计空间，以优化我们并发任务的设计，并创建更接近实际并行程序的并行程序结构，使其适合在并行目标架构上运行。\n\
    \n组织并行算法结构有三个主要维度：按任务组织、按数据分解组织和按数据流组织。请注意，在*发现并发性*设计空间中，你通常会遍历所有维度及其模式，而在*算法结构*设计空间中，你需要从这三个备选维度中选择一个，并实现其下面的一个并行设计模式。\n\
    \n*   按*任务*组织并行算法。在此维度中，任务本身驱动你的设计。也就是说，你考虑可以并行计算的任务，你的任务集中哪些任务是并发的，然后考虑如何枚举这些任务（线性或递归）。*按任务组织*元模式组包含两种模式：\n\
    \    *   *任务并行*模式管理任务集合的高效执行，用于线性分解。这里的共同点是“问题可以分解为可并发执行的任务集合。”^(²⁴⁵) 这些任务可以是独立的，也可以彼此之间存在一些依赖关系。在许多情况下，任务还与循环程序结构相关联。实现该模式的建议解决方案涉及三个不同点：如何定义任务、任务间的依赖关系，以及为并发执行而进行的任务调度，包括将任务分配给不同的处理器或线程。\n\
    \    *   *分而治之*模式用于递归分解，并实现了著名的分治递归解决方案模式，其中问题被分解为多个更小的、相同的子问题，然后求解这些子问题，最后将解合并为原始问题的单一整体解。\n\
    \n*   按*数据分解*组织并行算法，其中数据驱动设计。考虑将数据分解为（可能不相交的）子集，供每个任务使用。同样，这种分解可以是线性的或递归的：如果数据可以分布到离散的数据集中，并且整个问题可以通过独立操作每个数据集来解决，那么选择线性/几何元模式；如果数据是递归组织的（例如二叉树），则选择递归元模式。*按数据分解组织*模式组包含两种元模式：\n\
    \    *   *几何分解*模式代表这样一类计算：算法被识别为对某个核心数据结构的一系列计算，并且该数据结构本质上是线性的，例如数组、表格或矩阵。对于这些类型的数据结构，数据可以被分解为连续的子集，并由程序独立操作。这意味着操作这些数据的任务可以并发执行。有关*几何分布*模式如何组织其数据的示例，请参见下面的*分布式数组*元模式。\n\
    \    *   *递归数据*模式用于处理为操作递归定义的数据结构而创建的并行计算，其中数据看起来是顺序处理的。这些任务通常使用链接从一个数据元素移动到另一个数据元素，例如在链表、二叉树或图中，但计算涉及诸如在树中追踪路径或对图进行分区等操作。解决这些问题通常涉及对链接数据结构上的计算进行重构，以暴露更多的并发性。\n"
- fmt: '# Organizing Parallel Algorithms by Flow of Data


    When the organizing principle is how the flow of data imposes an ordering on the
    tasks that make up the algorithm, the *Organize by Flow of Data* pattern group
    also includes two meta-patterns:


    - The *Pipeline* pattern is where the flow of data is traversing a consistent
    linear chain of stages, each representing a function computed on the input data
    coming from the previous stage, and whose result is delivered to the next stage.
    In this pattern, the data flow is assumed to be one way. (This should look and
    sound just like the idea of a multi-stage CPU architecture, or a pipe-and-filter
    execution sequence, as seen in Chapter [7](#270563_3_En_7_Chapter.xhtml).)


    - The *Event-Based Coordination* pattern is where a number of semi-independent
    concurrent activities interact in a dynamic or unpredictable way, and interactions
    are determined by the flow of data between the concurrent activities. The flow
    of data implies a set of ordering dependencies between the tasks. In this pattern,
    the data flow is not assumed to be one way nor linear. There are many examples
    of problems that fit this pattern, including many discrete event simulation problems.
    Hence, many of the solutions that use this pattern use events as basic building
    blocks: there is usually at least one task that generates events and then some
    number of them that process the events. (Think of a multi-stall car wash where
    cars arrive at random and are assigned to a stall, or a bank with either a single
    queue or multiple queues and several tellers to serve customers as they reach
    the front of the queue. The Bird Feeder example in Chapter [11](#270563_3_En_11_Chapter.xhtml)
    is an example of this type of design.)


    ## Design Spaces: Supporting Structures


    After having explored different possibilities to find concurrency in *Finding
    Concurrency* design space and to express parallel algorithms in the *Algorithm
    Structure* design space, implementation arrives at the *Supporting Structures*
    design space, which begins to investigate the structures/patterns suitable to
    support the implementation of the algorithms planned in the preceding design spaces.
    Two groups of meta-patterns are included in the *Supporting Structures* design
    space: the *Program Structures* meta-pattern group discusses how to structure
    the program in order to maximize parallelism and the *Data Structures* meta-pattern
    group discusses commonly used shared data structures.


    The *Program Structures* group includes four meta-patterns:


    - The Single Program, Multiple Data (*SPMD*) meta-pattern, where all of the processing
    elements (PEs) run the same program in parallel, but each PE has its own subset
    of the data. Unlike in an SIMD architecture, the PEs are not required to stay
    in lock step and so different parallel tasks may follow different paths through
    the code. Because each of the PEs runs its own copy of the program, an important
    feature of the SPMD is that the extra overhead associated with starting and stopping
    the loops are implemented at the beginning and end of the program, rather than
    inside the loop itself. Each data set will typically be split, so that a loop
    in the program runs just a fraction of the total number of iterations. Also, the
    PEs only communicate infrequently with their neighbors, increasing efficiency.


    - The *Manager/Worker* meta-pattern, where a single Manager task will set up a
    number of concurrent Worker threads or processes, and a single bag of tasks. Each
    Worker will take a task out of the bag and execute it in parallel; as they finish,
    Workers will continue to take tasks out of the bag and execute them until the
    bag is empty, or some other ending condition has occurred. The bag of tasks is
    typically implemented as a shared queue. The *Manager/Worker* pattern is particularly
    useful for *embarrassingly parallel* programs (see below), where a large number
    of worker tasks have no dependencies.


    - The *Loop Parallelism* meta-pattern solves the problem of how to execute an
    algorithm with one or more compute-intensive loops. The pattern describes how
    to create a parallel program where the distinct iterations of the loop are executed
    in parallel. The program to compute the value of π using OpenMP^([^(246)](#fn246))
    in Chapter [14](#270563_3_En_14_Chapter.xhtml) is an example of the *Loop Parallelism*
    pattern at work.


    - The *Fork/Join* meta-pattern (see the example in Chapter [14](#270563_3_En_14_Chapter.xhtml))
    is an example of the concurrent execution of different portions of the overall
    computation that proceed unrelated, until the (possibly coordinated) collective
    termination. Typically, a single thread or process will fork off some number of
    sub-processes that will all execute in parallel. The originating process will
    typically wait until the child processes all join before resuming its own execution.
    Each time the original thread forks off subprocesses, there may be a different
    number of them. This meta-pattern, like many of the patterns you’ve seen so far,
    assumes a shared memory model where all the tasks are sharing values and creating
    results that are available to the Manager at the end. The *Fork/Join* pattern
    is the standard programming model in OpenMP.'
