- fmt: "# 14. Parallel Programming\n\n> *Concurrency is a property of the algorithm.\
    \ Parallelism is a property of the machine.*\n> \n> —Douglas Eadline\n\nSince\
    \ the advent of microprocessors, *Moore’s Law* has said that the number of transistors\
    \ on an integrated circuit would double about every eighteen months to two years,\
    \ while the size of the circuit would stay about the same or get smaller, and\
    \ the price of that integrated circuit would stay about the same or get cheaper.\
    \ This meant that we’d have more powerful processors for about the same amount\
    \ of money on a regular basis. This prediction worked really well until the beginning\
    \ of the 2000s, when some things changed. First, Moore’s Law implies that to get\
    \ twice as many transistors on a similarly sized chip, the size of the transistors\
    \ would shrink and the distance between the transistors would also shrink. Clearly,\
    \ physics being what it is, this couldn’t continue indefinitely and by the early\
    \ 2000s we were beginning to see some problems with making the transistors a lot\
    \ smaller. The second problem is heat. If you pack twice as many transistors on\
    \ a chip and expect to run the chip at the same or a higher clock speed, you’ll\
    \ need more electricity going through the circuit. More electricity means more\
    \ heat. This is known as the “power wall.”\n\nCirca 2001, it was becoming clear\
    \ that the current generation of microprocessors couldn’t be pushed much past\
    \ about 3 or 4 billion cycles per second (3-4GHz); if we wanted to go faster,\
    \ we needed a different idea. Enter the multi-core microprocessor. The basic idea\
    \ here is to put two or more CPUs on a single, slightly larger integrated circuit,\
    \ run them on the same (slower) clock, and have the processors share some cache\
    \ memory and use a shared main memory. This allows the processors to use less\
    \ electricity, generate less heat, and be able to run two or more programs simultaneously\
    \ to make up for the slower clock speed. All the major chip manufacturers got\
    \ on board with this idea. IBM was first, introducing the POWER4 PowerPC dual-core\
    \ processor in late 2001, followed by AMD with its Athlon dual-core processor\
    \ in 2005, and then Intel with its Core Duo in 2006. Since then, nearly all new\
    \ processors and processor architectures have been multi-core, while programmers\
    \ and language developers have been working hard to create new software that would\
    \ take advantage of the new parallel architectures.\n\nIn this chapter, we’ll\
    \ first take a brief look at how parallel computers are organized. Then, we’ll\
    \ describe some of the difficulties with writing programs that can take advantage\
    \ of a parallel computer architecture. Next, we’ll talk about how to write parallel\
    \ programs and how to take a serial program and convert it into a parallel program.\
    \ Finally, we’ll look at writing parallel programs using different computer languages\
    \ and libraries.\n\n## Concurrency vs. Parallelism\n\nTraditionally, software\
    \ has been written for *serial* or *sequential* computation. A problem solution\
    \ is broken into a discrete series of instructions that are executed sequentially\
    \ one after another on a single processor. These (single-core) computers only\
    \ allow one instruction to execute at any moment in time. A classic example is\
    \ a loop to sum all the elements of a list: we iterate over all the elements in\
    \ the list and add each of them to the sum, one at a time, like so:\n\n```\nint\
    \ sum = 0;\nfor (int i = 0; i < n; i++) {\nsum += list[i];\n}\nSytem.out.print(sum);\n\
    ```\n\nThis will normally be executed serially, with results of\n\n`sum = 0`\n\
    \n`sum = sum + list[0]`\n\n`sum = sum + list[1]`\n\n`sum = sum + list[2]`\n\n\
    …\n\nThis is clearly an O(n) operation, requiring n additions and taking about\
    \ T(n) time proportional to n. We can improve on this by recognizing that we add\
    \ pairs of numbers together in any order and then add partial sums to get the\
    \ total. The code might change as follows:\n\n```\nsum = 0;\nfor (int i = 0; i\
    \ < n-1; i+=2) {\nsum += (list[i] + list[i+1]);\n}\nSystem.out.print(sum);\n```\n\
    \nNote that because of commutativity of addition, the order in which we execute\
    \ the two additions inside the loop doesn’t matter. While this version goes through\
    \ the loop half the number of times, it will still require the same overall number\
    \ of additions and the same amount of time. So with just one processor we don’t\
    \ really gain anything. But this new approach serves as the genesis of an idea:\
    \ if we had n/2 processors instead of just 1, we could do many of the computations\
    \ *simultaneously*, using the same number of operations, O(n), but reducing the\
    \ time T(n) required from proportional to n to proportional to log n (by assuming\
    \ a binary tree hierarchy of processors), a substantial drop in time, particularly\
    \ as n gets large. This brings us to the difference between concurrency and parallelism.\n\
    \n*Concurrency* is the recognition that we can divide up a computation (an algorithm)\
    \ into separate pieces, where the *order of execution* of the pieces does not\
    \ matter. Concurrency is a property of an algorithm you use to solve a problem.\
    \ Note that a concurrent program run on a single processor will still execute\
    \ serially.\n\n*Parallelism* is the mechanism used to execute a program on a particular\
    \ machine (or machine architecture) to improve performance. Parallelism allows\
    \ a concurrent program to execute on multiple processors simultaneously, potentially\
    \ improving overall performance of the program.\n\nThe left side of Figure [14-1](#270563_3_En_14_Chapter.xhtml#Fig1)\
    \ illustrates a concurrent program broken up into two threads of execution being\
    \ run on a single processor (the vertical center line of the image), while the\
    \ right side of the image illustrates running that same program on two processors\
    \ to execute a program that’s divided up into two threads of execution.\n\n![](images/270563_3_En_14_Chapter/270563_3_En_14_Fig1_HTML.jpg)\n\
    \nTwo illustrations represent the patterns of concurrent and parallel programs\
    \ between Thread 1 and Thread 2.\n\nFigure 14-1\n\nConcurrency vs. parallelism\n\
    \nHere is an alternative explanation of the difference between concurrency and\
    \ parallelism, which appeared on the website Stack Overflow^([^(227)](#fn227)):\n\
    \nAssume that your local chess club organizes a demonstration tournament where\
    \ 10 local players, all with approximately the same skill level, will be pitted\
    \ against a chess Grandmaster. So the club organizers have to arrange 10 chess\
    \ games and want to make them time efficient so everyone can go out and celebrate.\
    \ There are several ways to organize the match."
