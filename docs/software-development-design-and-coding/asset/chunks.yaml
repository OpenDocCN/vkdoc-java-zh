    module and the content of the data tells the receiving module what to do. This
    is not a good type of coupling: the sender and receiver are too closely coupled
    because the sender is controlling how functions in the receiving module will execute.


    *   *Global-data coupling*: Where the two modules make use of the same global
    data. This is just awful as it violates a basic tenet of encapsulation by having
    the modules share data. This invites unwanted side effects and ensures that at
    any given moment during the execution of the program neither of the coupled modules
    will know precisely what is in the globally shared data. In general, global variables
    are considered bad programming practice.


    *Information hiding* is often confused with encapsulation, but they are not the
    same. Encapsulation describes a process of wrapping both data and behaviors into
    a single entity—in our case, a module. Data can be publicly visible from within
    a module and thus not hidden. Information hiding, on the other hand, says that
    the data and behaviors in a module should be controlled and visible only to the
    operations that act on the data within the module, so it’s invisible to other,
    external, modules. This is an important feature of modules (and later of objects
    as well) because it leaves control of the data to the module that understands
    best how to safely manipulate this data, while safeguarding against the side effects
    that can arise from other modules reaching in and tweaking said data.


    Parnas was not just talking about hiding data in modules. His definition of information
    hiding was even more concerned with hiding design decisions in the module definition.
    “We propose … that one begins with a list of difficult design decisions or design
    decisions which are likely to change. Each module is then designed to hide such
    a decision from the others.”^([^(172)](#fn172)) Hiding information in this manner
    allows clients of a module to use the module successfully without needing to know
    any of the design decisions that went into constructing the module. It also allows
    developers to change the implementation of the module without affecting how the
    client uses the module.'
  trans: '

    ## 模块化分解


    1972 年，大卫·帕纳斯发表了一篇题为《论将系统分解为模块的标准》的论文，他在其中提出，可以使用一种称为模块化的技术来设计程序。^(¹⁶⁹) 帕纳斯的论文也是最早描述基于*信息隐藏*进行分解的论文之一，信息隐藏是面向对象编程的关键技术之一，我们将在本节稍后讨论。在他的论文中，帕纳斯强调了基于问题解决方案的控制流进行自顶向下分解，与使用封装和信息隐藏将数据定义及其操作相互隔离的分解方式之间的区别。他的论文显然是面向对象分析与设计（OOA&D）的先驱，你将在下一章中看到这一点。


    虽然帕纳斯的论文早于这一概念的提出，但他实际上是在讨论一个称为*关注点分离*的概念。“在计算机科学中，关注点分离是一种将计算机程序划分为不同部分的设计原则。每个部分处理一个独立的关注点：一组影响计算机程序代码的信息。一个良好体现了关注点分离的程序被称为模块化程序。模块化，以及由此带来的关注点分离，是通过将信息封装在具有明确定义接口的代码段中来实现的。封装是信息隐藏的一种手段。”^(¹⁷⁰)
    传统上，关注点分离主要关注程序功能的分离。帕纳斯则增加了分离数据的想法，使得各个模块既能控制数据，也能控制作用于数据的操作，并且数据只能通过定义良好的接口才能被访问。这一概念后来由艾兹格·迪杰斯特拉进一步扩展。^(¹⁷¹)


    模块化有三个关键特性，对于创建模块化程序至关重要：


    *   封装

    *   松散耦合

    *   信息隐藏


    *封装*是指将一组由其数据和行为定义的服务捆绑在一起作为一个模块，并保持它们的整体性。这组服务应该是内聚的，并且显然属于同一整体。（就像函数一样，一个模块应该只做一件事。）然后，该模块向用户呈现一个*接口*，理想情况下，该接口是访问模块内服务和数据的唯一途径。封装服务和数据的一个目标是*高内聚性*：你的模块应该只做一件事，并且模块内的所有函数都应致力于实现这一件事。


    与封装相辅相成的是*松散耦合*，它描述了两个模块之间相互连接的紧密程度。我们希望最小化任何一个模块对另一个模块的依赖，因此我们将模块分离以最小化交互，并让模块通过模块接口进行交互。目标是创建具有内部完整性（强内聚性）的模块，并且模块之间具有少量、直接、可见且灵活的连接（松散耦合）。模块之间良好的耦合应该是松散的，使得一个模块中的方法可以轻松地被另一个模块中的方法调用，同时每个模块中的数据是独立的，并且只能由定义该数据的模块内部的方法进行更改。这样，两个模块可以通信并请求更改数据，而无需担心错误地修改数据。


    *松散耦合*分为四大类，从好到差依次为：


    *   *简单数据耦合*：非结构化数据通过参数列表传递。这是最好的耦合类型，因为它允许发送模块按需组织数据，并允许接收模块决定如何处理数据。

    *   *结构化数据耦合*：结构化数据通过参数列表传递。这也是一种良好的耦合类型，因为发送模块保持对数据格式的控制，而接收模块可以按需处理数据。

    *   *控制耦合*：来自发送模块的数据被传递给接收模块，并且数据的内容告诉接收模块该做什么。这不是一种好的耦合类型：发送方和接收方耦合过于紧密，因为发送方正在控制接收模块中函数的执行方式。

    *   *全局数据耦合*：两个模块使用相同的全局数据。这非常糟糕，因为它违反了封装的基本原则，让模块共享数据。这会引发不希望的副作用，并确保在程序执行的任何时刻，耦合的模块都无法确切知道全局共享数据中的内容。通常，全局变量被认为是不良的编程实践。


    *信息隐藏*常常与封装混淆，但它们并不相同。封装描述的是将数据和行为包装成一个单一实体的过程——在我们的例子中，这个实体就是模块。数据在模块内部可以是公开可见的，因此并未被隐藏。另一方面，信息隐藏则指出，模块中的数据和行为应该受到控制，并且仅对模块内作用于这些数据的操作可见，因此对于其他外部模块是不可见的。这是模块（以及后来的对象）的一个重要特性，因为它将数据的控制权交给了最了解如何安全操作这些数据的模块，同时防止了其他模块介入并篡改该数据可能引发的副作用。


    帕纳斯不仅仅是在谈论在模块中隐藏数据。他对信息隐藏的定义更侧重于在模块定义中隐藏设计决策。“我们提议……首先列出一系列困难的设计决策或可能发生变化的设计决策。然后，每个模块的设计都是为了向其他模块隐藏这样的决策。”^(¹⁷²)
    以这种方式隐藏信息，使得模块的客户端无需了解构建该模块所涉及的任何设计决策，就能成功使用该模块。它还允许开发人员更改模块的实现，而不会影响客户端使用该模块的方式。

    '
- fmt: '### Example: Keyword in Context


    Back in the day, when Unix was young and the world was new, the Unix documentation
    was divided into eight different sections and the entire manual started with a
    *permuted index*. The problem with Unix is not the command line interface nor
    the inverted tree file system structure. No, the problem with Unix is in practically
    every nearly unreadable Unix command name, including- `ls`, `cat`, `cp`, `mv`,
    `mkdir`, `ps`, `cc`, `as`, `ld`, `m4`... we could go on. Unix probably has the
    most cryptic command line set of any operating system on the planet. The cardinal
    rule for creating Unix command line tools was apparently, “why use three characters
    when two will do?”


    So, finding anything in any of the eight sections of Unix documentation could
    have been a real trial. Enter the *permuted index*. Every Unix man page starts
    with a header line that contains the name of the command and a short description
    of what the command does. For example, the `cat(1)` man page begins as follows:


    ```

    cat - concatenate and print files

    ```


    But what if you don’t know the name of a command but you do know what it does?
    The permuted index solves this problem by incorporating most of the words of the
    command description (the articles were ignored) into the index itself. So that
    *cat* could be found under “cat” and also “concatenate,” “print,” and “files.”
    This is known as a *Keyword in Context* (KWIC) index. It works just dandy.


    So your problem is to create a KWIC index given two input files: the first file
    containing words to ignore (sometimes called “stop words”) and the second file
    containing lines of text we want to index. For example, say your first file contains
    *for, the, and*, as the words to ignore and the second file looks like


    ```

    The Sun also Rises

    For Whom the Bell Tolls

    The Old Man and the Sea

    ```


    Your resulting KWIC index, with the sorted words in all caps, would be


    ```

    The Sun ALSO Rises

    For Whom the BELL Tolls

    The Old MAN and the Sea

    The OLD Man and the Sea

    The Sun also RISES

    The Old Man and the SEA

    The SUN also Rises

    For Whom the Bell TOLLS

    For WHOM the Bell Tolls

    ```


    Shifting each line left until the next valid keyword (skipping articles), you
    obtain n copies of each line with n keywords. After each shift, the index keyword
    (shown in all caps) ends up at the front of each copy of the line. All lines are
    then sorted in alphabetical order by their index keyword. In the case of a tie
    (two lines of text have the same index word), the lines should appear in the same
    order as in the input file.


    The questions you need to answer are 1) how do you create the KWIC index? and
    2) how do you store the index data?


    #### KWIC: Top-Down Decomposition


    You’ll start by designing the problem solution using a top-down decomposition.
    Top-down decompositions, as you saw with the eight queens problem earlier in this
    chapter, are all about control flow: you want to figure out how to sequentially
    solve the problem, making progress with each step you take. It is assumed that
    the data are stored separately from the routines and that each subroutine in the
    control flow can access the data it needs. The alternative is to pass the data
    along to each subroutine as you call it; this can be cumbersome and time consuming
    because the data usually has to be copied each time you pass it to a routine.


    A first decomposition of this problem might look like the following:


    1.  Input the words to ignore and the text.

    2.  Shift each line of text and store a copy of the line for each word that ends
    up at the front of the line (skipping any articles).

    3.  Sort all of the resulting shifted lines of text by their first word (i.e.
    by each line’s index word).

    4.  Format and output the text.


    Note that these steps can easily become separate subroutines that are all called
    in sequence from a main program. The data structure used for the input text could
    be an array of characters for each line, a `String` for each line, or an array
    of `String`s for the entire input file. You could also use a map data structure
    that uses each index word as the key and a `String` containing the input text
    line as the value of the map element. There are certainly other possible data
    structures to be used. Sorting can be done by any of the stable sorting algorithms
    and which algorithm to use would depend on the data structure chosen and on the
    expected size of the input text. Your sort must be stable because of the requirement
    that identical index words sort their respective lines in the same order that
    they appear in the input text file. Depending on the programming language you
    use and the data structure you choose, sorting might be done automatically for
    you. The data structure you choose will affect how the circular shifts are done
    and how the output routine does the work of formatting each output line.


    Now that you’ve got a feel for how a top-down decomposition might proceed, let’s
    move on and consider a modular decomposition.'
