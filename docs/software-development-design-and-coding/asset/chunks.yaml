- fmt: "# Shaping the Design\n\n> *Your goal is to invent and arrange objects in a\
    \ pleasing fashion. Your application will be divided into neighborhoods where\
    \ clusters of objects work toward a common goal. Your design will be shaped by\
    \ the number and quality of abstractions and by how well they complement one another.\
    \ Composition, form, and focus are everything.*\n> \n> —Rebecca Wirfs-Brock and\
    \ Alan McKean^([^(190)](#fn190))\n\nIdentifying objects (or object classes) is\
    \ a difficult part of object-oriented design. There is no “magic formula” for\
    \ object identification. It relies on the skill, experience and domain knowledge\
    \ of system designers (that would be you). Object identification is an iterative\
    \ process; you are not likely to get it right the first time.\n\nYou begin finding\
    \ objects by looking for real-world analogues in your requirements. That gets\
    \ you started, but it’s only the first step. Other objects hide in the abstraction\
    \ layers of your domain. Where do you find these hidden objects? You can look\
    \ to your own knowledge of the application domain. You can also look for operations\
    \ that crop up in your requirements and in your architectural concepts of the\
    \ system. You can even look to your own past experience designing or using other\
    \ systems.\n\nHere are some steps to finding candidate objects in your system:\n\
    \n1. *Write a set of use cases* describing how the application will work for a\
    \ number of different scenarios. Remember that each use case must have a goal.\
    \ Alternate paths through a use case may indicate new requirements that require\
    \ a new use case.\n\n2. *Identify the actors* in each use case, the operations\
    \ they need to perform, and the other things they need to use in performing their\
    \ actions.\n\n3. *Name and describe each candidate object*. Base the identification\
    \ on tangible things in the application domain (like nouns). Use a behavioral\
    \ approach and identify objects based on what participates in what behavior (use\
    \ verbs).\n\n4. *Objects can manifest themselves* in a number of ways. They can\
    \ be:\n   * External entities that produce or consume information\n   * Things\
    \ that are part of the information domain (reports, displays, etc.)\n   * Occurrences\
    \ or events that occur within the system\n   * Internal producers (objects that\
    \ make something)\n   * Internal consumers (objects that consume what producers\
    \ make)\n   * Places (remote systems, databases, and so on)\n   * Structures (windows,\
    \ frames)\n   * People or characteristics of people (`Person`, `Student`, `Teacher`,\
    \ etc.)\n   * Things that are owned or used by other objects (bank accounts or\
    \ automobile parts)\n   * Things that are lists of other objects (parts lists,\
    \ any kind of collection, etc.)\n\n5. *Organize the candidate objects into groups.*\
    \ Each group represents a cluster of objects that work together to solve a common\
    \ problem in your application. Each object will have several characteristics:\n\
    \   * *Required information*: The object has information that must be remembered\
    \ so the system can function.\n   * *Needed services*: The object must provide\
    \ services relating to the system goals.\n   * *Common attributes*: The attributes\
    \ defined for the object must be common to all instances of the object.\n   *\
    \ *Common operations*: The operations defined for the object must be common to\
    \ all instances of the object.\n\n6. Look at the groups you’ve created and *see\
    \ if they represent good abstractions for objects* and that work in the application.\
    \ Good abstractions will help make your application easier to rework when you\
    \ inevitably need to change some feature or relationship in the application.\n\
    \n## Abstraction\n\nLet’s change tack here and talk about a different example.\
    \ Alice and Bob have just moved to a new city and they need to transfer their\
    \ old Second City Bank and Trust bank accounts to First Galactic Bank. Alice and\
    \ Bob are middle class and have several bank accounts they need to transfer: a\
    \ checking account, a passbook savings account, and an investment account.\n\n\
    Nobody actually opens a generic “bank account.” Instead they open different types\
    \ of accounts and each type has different characteristics. You can write checks\
    \ from a checking account, but you can’t write checks from a savings account.\
    \ You can earn interest on a savings account, but you normally don’t earn interest\
    \ on a checking account; instead, you pay a monthly service fee. Still, all different\
    \ types of bank accounts have some things in common: all of them use your personal\
    \ information (name, social security number, address, city, state, ZIP code) and\
    \ all of them allow you to deposit money and withdraw money.\n\nWhen putting together\
    \ a program that handles bank accounts, you may notice that there will be common\
    \ attributes and behaviors among several classes. Since you know that checking\
    \ accounts, savings accounts, and investment accounts are all different, let’s\
    \ first create three different classes that contain all the information they would\
    \ each need and see what you end up with (see Figure [11-3](#270563_3_En_11_Chapter.xhtml#Fig3)).\n\
    \n![](images/270563_3_En_11_Chapter/270563_3_En_11_Fig3_HTML.jpg)\n\nThree blocks\
    \ contain the following classes: `CheckingAcct`, `SavingsAcct`, `InvestmentAcct`.\n\
    \nFigure 11-3 — Bank accounts with a lot in common\n\nNotice that all three classes\
    \ have a lot in common. One of the things we always try to do, no matter what\
    \ design or coding techniques we’re using, is to avoid duplication of design and\
    \ code. Not only is this redundant and wasteful, but you will inevitably forget\
    \ to update one or more of the duplicates when making a change. Avoiding duplication\
    \ is what abstraction is all about! If you abstract out all the common elements\
    \ of these three classes, you can create a new (super) class called `BankAccount`\
    \ that incorporates all of them. The `CheckingAcct`, `SavingsAcct`, and `InvestmentAcct`\
    \ classes can then inherit it all from `BankAccount`, which will greatly simplify\
    \ the children classes and clean up your design and your code.\n\nSo here’s `BankAccount`,\
    \ in Figure [11-4](#270563_3_En_11_Chapter.xhtml#Fig4).\n\n![](images/270563_3_En_11_Chapter/270563_3_En_11_Fig4_HTML.jpg)\n\
    \nA vertical rectangle contains the data of `BankAccount` class.\n\nFigure 11-4\
    \ — A cleaner `BankAccount` class\n\nBut wait! Is the `BankAccount` class one\
    \ that you would want to instantiate? Each of your original classes was much more\
    \ specific than this new `BankAccount` class, so there isn’t enough information\
    \ in the `BankAccount` class for you to use it for standalone objects. This means\
    \ you’ll always be inheriting from it but never instantiating it. It’s a perfect\
    \ *abstract class*. (Note that in the diagram below class diagrams of abstract\
    \ classes put the class name in *italics*.) See Figure [11-5](#270563_3_En_11_Chapter.xhtml#Fig5).\n\
    \n![](images/270563_3_En_11_Chapter/270563_3_En_11_Fig5_HTML.jpg)\n\nA vertical\
    \ rectangle contains the data of `BankAccount` abstract class.\n\nFigure 11-5\
    \ — The `BankAccount` as an abstract class\n\nAbstract classes are templates for\
    \ actual *concrete classes*. They encapsulate shared behavior and define the protocol\
    \ for all subclasses. The abstract class defines behavior and sets a common state,\
    \ and then concrete subclasses inherit and implement that behavior. You can’t\
    \ instantiate an abstract class; a new concrete class must be created that extends\
    \ the abstract class. As a guideline, whenever you find common behavior in two\
    \ or more places, you should look to abstract that behavior into a class and then\
    \ reuse that behavior in the common concrete classes."
