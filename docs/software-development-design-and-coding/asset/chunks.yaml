    Java 中的 Threads 接口让你能够以非常底层的方式控制线程的创建和管理。这实际上使得在 Java 中进行多线程编程比原本可能的方式更加困难。如果你编写一个创建多个线程的程序，那么这些线程的调度以及共享变量的管理会显著增加程序的开销。它还可能导致以*竞态条件*和*丢失更新*形式出现的运行时错误。


    在竞态条件中，两个或多个线程共享一个变量，并且它们都想对该变量进行读写操作。每个线程的执行顺序，以及线程可能因 `sleep()` 或操作系统因其耗尽当前允许的时间配额而被迫暂停执行的事实，都可能导致下一个线程读取共享变量时，该变量的值不正确。


    让我们考虑一个例子。假设 Fred 和 Gladys 共享一个银行账户。再假设从银行账户取款的算法如下：


    1.  你检查账户余额，确保账户里有足够的钱。

    2.  你从账户中取出你想要的金额。


    请注意，虽然这两个操作中的每一个都是原子性的（一旦开始就不能被中断），但该算法可能在步骤 1 和步骤 2 之间被中断。现在让我们再加入一个步骤，允许 Fred
    或 Gladys 在考虑取款时小睡一会儿。这可能导致以下情况：


    1.  Fred 想从银行账户中取 100 美元。

    2.  他检查账户余额，是 150 美元。

    3.  Fred 小睡了一会儿。

    4.  Gladys 检查账户余额，是 150 美元。

    5.  Gladys 取了 100 美元。

    6.  Fred 醒来并试图取 100 美元。

    7.  哎呀。账户现在透支了。


    这就是一个竞态条件。下面是一些可以说明这个问题的源代码：你创建两个线程，让每个用户从账户中取 10 美元，连续取 10 次。


    ```

    /*

    * 竞态条件示例

    * 使用 Java 线程

    *  这里我们将创建两个线程，让

    *  每个线程从账户中取 10 美元

    *  连续取 10 次。

    */

    public class FredAndGladys implements Runnable  {

    private BankAccount account = new BankAccount();

    /** run() 方法执行线程的实际工作 */

    public void run()  {

    for (int x = 0; x < 10; x++) {

    makeWithdrawal(10);

    if (account.getBalance() < 0) {

    System.out.println("账户已透支！");

    }

    }

    }

    /** 注意：此方法存在竞态条件问题 */

    private void makeWithdrawal(int amount) {

    if (account.getBalance() >= amount) {

    System.out.println(Thread.currentThread().getName() + " 即将取款 " + amount);

    try {

    System.out.println(Thread.currentThread().getName() + " 即将入睡");

    Thread.sleep(500);

    } catch (InterruptedException ex) {

    ex.printStackTrace();

    }

    System.out.println(Thread.currentThread().getName() + " 醒了");

    account.withdraw(amount);

    System.out.printf("%s 完成取款\n", Thread.currentThread().getName());

    System.out.printf("新余额为 $%d\n", account.getBalance());

    } else {

    System.out.println("抱歉，余额不足，"

    + Thread.currentThread().getName());

    }

    }

    }

    /**

    *  内部类，表示一个简单的银行账户

    */

    class BankAccount {

    private int balance = 100;

    public int getBalance () {

    return balance;

    }

    public void withdraw(int amount) {

    balance = balance - amount;

    }

    }

    /**

    * 运行实验的驱动类

    */

    class FGMain {

    public static void main(String[] args) {

    FredAndGladys theJob = new FredAndGladys();

    Thread one = new Thread(theJob);

    Thread two = new Thread(theJob);

    one.setName("Fred");

    two.setName("Gladys");

    one.start();

    two.start();

    }

    }

    ```


    当你编译并执行这个程序时，你得到的第一部分输出如下：


    ```

    Gladys 即将取款 10

    Gladys 即将入睡

    Fred 即将取款 10

    Fred 即将入睡

    Fred 醒了

    Fred 完成取款

    Gladys 醒了

    Gladys 完成取款

    新余额为 $80

    Gladys 即将取款 10

    Gladys 即将入睡

    新余额为 $90

    Fred 即将取款 10

    Fred 即将入睡

    Fred 醒了

    Fred 完成取款

    新余额为 $70

    Fred 即将取款 10

    Fred 即将入睡

    Gladys 醒了

    Gladys 完成取款

    新余额为 $60

    ```


    在一切正常的情况下，Fred 和 Gladys 可以交替取款，但这里存在一个竞态条件。请注意，余额首先报告为 80 美元，然后报告为 90 美元，因为两个线程在将余额变量写回内存之前，都在各自的缓存中持有该变量的副本。Gladys
    先写入（在 Fred 取款之后），你看到 80 美元。然后 Fred 写入，你看到 90 美元。接着 Gladys 再次在 Fred 之前执行，金额又正确了。


    这一切的发生是因为是 JVM（或操作系统）控制着线程何时能再次使用 CPU。幸运的是，Java 有一种方法可以解决这个问题。有一个关键字 `synchronized`，你可以在方法签名中使用它来创建一个临界区，这样一次只允许一个线程在该方法中执行。任何其他试图进入该同步方法的线程都会被阻塞。如果你同步了
    `makeWithdrawal(int amount)` 方法，那么所有线程都将同步^(²³⁷)：


    ```

    Fred 即将取款 10

    Fred 即将入睡

    Fred 醒了

    Fred 完成取款

    新余额为 $90

    Gladys 即将取款 10

    Gladys 即将入睡

    Gladys 醒了

    Gladys 完成取款

    新余额为 $80

    Fred 即将取款 10

    Fred 即将入睡

    Fred 醒了

    Fred 完成取款

    新余额为 $70

    Fred 即将取款 10

    Fred 即将入睡

    Fred 醒了

    Fred 完成取款

    新余额为 $60

    ```


    另一种尝试避免竞态条件的方法（自 Java 5 起可用）是在 `BankAccount` 类中对变量 `balance` 使用 `volatile` 关键字。volatile
    变量不会保留缓存副本，因此在大多数情况下，值会被正确更新。由于 volatile 变量始终存储在主内存中（而不是缓存中），并且始终写回主内存，因此多个线程可以同时写入一个共享的
    volatile 变量，并且主内存中仍能存储正确的值。但是，如果一个线程需要先读取共享 volatile 变量的值，然后用新值更新该值，那么使用 volatile
    变量就不足以保证该变量的值保持同步了。因为从主内存读取当前值到写入新值之间存在时间间隔，仍然可能存在竞态条件，即 Fred 和 Gladys 可能都读取了
    balance 的当前值，生成（相同的）新值并写入。此时 volatile 变量就不同步了。除了在程序中小心使用共享 volatile 变量的时机和方式之外，没有其他方法可以解决这个问题。


    还应该谨慎使用 `synchronized` 关键字，因为它会增加更多开销，从而影响性能。并且，虽然同步方法提供了互斥和线程安全的代码，但它们并不能防止一种称为*死锁*的情况。当两个进程或线程争用相同的资源时，资源可能会被锁定，并且两个进程都拒绝放弃它们，就会发生死锁。例如，以下事件序列会导致死锁：


    *   线程 *a* 进入 *synchronized* 方法 `foo`（并获取了锁，阻止了任何其他线程）。

    *   线程 *a* 进入睡眠。

    *   线程 *b* 进入 *synchronized* 方法 `bar`（并获取了锁，阻止了任何其他线程）。

    *   线程 *b* 试图进入 `foo`，无法获取锁，于是等待。

    *   线程 *a* 醒来，试图进入 `bar`，无法获取锁，于是等待。

    *   *除非它们获得对方的锁，否则两者都无法继续。*


    这（源自 Dijkstra）被称为*死锁*。那么，如何解决死锁呢？嗯，你不应该依赖 Java 来解决它，因为 Java 无法检测死锁。最好的方法涉及预防：仔细工作以确保这种情况不会发生。


