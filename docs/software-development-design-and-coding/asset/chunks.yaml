  trans: "\n## 声明风格指南\n\n就像编写可执行代码一样，你的变量声明需要整洁且可读。\n\n*   **在变量使用处附近声明**。大多数过程式和面向对象编程语言都有“先声明后使用”的规则，要求你在任何表达式中使用变量之前必须先声明它。在过去，比如在\
    \ Pascal 中，你必须在程序（或子程序）的顶部声明变量，并且不能在块内部声明变量。这有一个缺点，即你可能在真正使用变量之前的许多行代码处就声明了它。（尽管请记住，你的类和函数/方法不应该太长。）Python\
    \ 是“先声明后使用”规则的一个例外。由于 Python 通常是解释执行（而非编译），解释器会在首次看到变量时猜测其类型，这使得先声明后使用变得不那么必要。\n\
    \n    如今，大多数语言允许你在程序的任何块中声明变量。该变量的作用域就是它被声明的那个块，以及该块内部的所有块（子块、孙块等）。一个好的做法是，在变量被使用的最内层块中声明它们。这样，你就可以*就在那里*看到变量的声明和使用。\n\
    \n*   **每行只声明一个变量**，或者至少每行只声明一种逻辑类型的变量。例如，虽然我们认为\n\n    ```\n    int max,min,top,left,right,average,bottom,mode;\n\
    \    ```\n\n    有点拥挤，但我们会将其重写为\n\n    ```\n    int max, min;\n    int top, bottom;\n\
    \    int left, right;\n    int average, mode;\n    ```\n\n    虽然这不是每行一个，但逻辑上相关的变量被分组在一起。这对我们来说更有意义。\n\
    \n*   **合理地排列声明顺序**。按类型和用途对声明进行分组（参见前面的示例）。\n\n*   **使用空白行分隔声明**。再次强调，空白行是你的朋友。这里的关键思想是让你的声明更显眼，将它们放在使用它们的代码附近，并使其用途更易于理解。\n\
    \n*   **不要嵌套头文件——永远不要！**（这是针对 C 和 C++ 程序员的。）头文件的设计初衷是让你只需定义一次常量、声明全局变量和函数原型，然后就可以在（可能大量的）源代码文件中重用该头文件。嵌套头文件会将其中一些声明隐藏在嵌套的头文件内部。这很糟糕——因为可见性是好的。它可能导致你错误地多次包含同一个头文件，从而引发变量和宏的重定义，导致错误。\n\
    \n    你可能在自己的头文件中嵌套的唯一头文件是系统头文件，例如 `stdio.h` 或 `stdlib.h`，即便如此我们也不喜欢这样做。\n\n*\
    \   **不要把源代码放在头文件中——永远不要！**（再次强调，这是针对 C 和 C++ 程序员的。）头文件用于声明，而不是用于源代码。库才用于源代码。将函数放在头文件中意味着该函数会在你包含该头文件的每个地方被重新定义。这很容易导致多重定义——编译器可能直到链接阶段才会发现。唯一应该放在头文件中的源代码是\
    \ `#define` 预处理语句中的宏定义，即使这些也应该谨慎使用。\n\n## 注释风格指南\n\n就像空白行一样，注释是你的朋友。现有的每一本编程书都告诉你要在代码中添加注释——但没有一本（包括本指南）确切地告诉你应该在哪里添加注释以及注释应该是什么样子。这是因为如何编写好的、信息丰富的注释属于“视情况而定”的建议类别。一个好的、信息丰富的注释取决于你编写它的*上下文*，因此通用建议非常有限。尽管如此，这里还是有一些主要要点：\n\
    \n*   **先写注释**。按照计划编码是最简单的，这样你就不必一边推理大问题，一边还要细化当前行的语法。尽可能让你的思维保持在同一个层次，从宏观图景到细节。将注释作为你解决方案的伪代码，然后在注释行之间编写代码。最终，你将同时拥有代码和解释。这也有助于你在深入编码时不会忘记解决方案的任何部分（例如，关闭文件输入流、释放某些内存等）。\n\
    \n*   **简要解释推理过程和更大的计划**。注释重在质量而非数量。另一位程序员（或者第二天早上的你）通常能够理解你的代码在做什么，但*为什么*这样做往往更难以理解。因此，不要解释语法或基本的语言结构，但要解释你代码的效用。如果你正在做一些可能不是当前立即需要，但后续会被其他部分用到的事情，请留下注释解释这一点，以免以后被当作不必要的内容意外删除。如果你即将编写几行代码来解决一个复杂问题，通常最好为下一段代码的功能写一个总体规划注释。\n\
    \n*   **保持注释简短且切中要点**。注释必须集中且简洁。你不需要完整的句子，也不需要冠词。\n\n*   **使注释的缩进与其对应的语句对齐**。这对可读性很重要，因为这样注释和相关代码就能对齐。\n\
    \n```\n    /* 确保我们有正确数量的参数 */\n    if (argc < 2) {\n    fprintf(stderr, \"用法:\
    \ %s 文件名\\n\", argv[0]);\n    exit(1);\n    }\n    ```\n\n这会对可读性产生巨大的负面影响。要么让注释更短，要么将其改为语句上方的块注释。\n\
    \n*   **不要让注释换行。改用块注释**。如果你将冗长复杂的注释附加到源代码行的末尾，通常会发生这种情况，例如\n\n```\n    if (argc\
    \ < 2) { // 确保我们从命令行获得了正确数量的参数\n    ```\n\n*   **用空行分隔块注释**，如果你在起始标记 `/*` 之后立即开始注释，并将结束标记\
    \ `*/` 放在一行的末尾，如下所示：\n\n```\n    /* 确保我们从命令行获得了正确数量的参数 */\n    if (argc < 2) {\n\
    \    fprintf(stderr, \"用法: %s 文件名\\n\", argv[0]);\n    exit(1);\n    }\n    ```\n\
    \n不过我们并不真正推荐这种风格。相反，如果你将起始 `/*` 和结束 `*/` 标记单独放在一行并对齐，那么你就不需要额外的空行了，因为这些行本身几乎就是空白的，已经创造了足够的间隔。\n\
    \n```\n    /*\n    * 确保我们从命令行获得了正确数量的参数\n    */\n    if (argc < 2) {\n    fprintf(stderr,\
    \ \"用法: %s 文件名\\n\", argv[0]);\n    exit(1);\n    }\n    ```\n\n*   **所有函数/方法都应该有一个头部块注释**，以便读者知道该方法是做什么的。如果你为方法名和输入参数使用了良好的标识符名称，那么对详细头部注释的需求会有所减轻。尽管如此，至少你应该告诉用户该方法将要做什么以及返回值是什么（如果有的话）。在\
    \ C++ 中，你可以这样写：\n\n```\n    #include <string>\n    /*\n    * getSubString() -\
    \ 从输入字符串中获取一个子串。\n    *  子串从索引 start 开始，\n    *  一直到但不包括索引 stop。\n    *  返回结果子串。\n\
    \    */\n    string getSubString(string str, int start, int stop) { }\n    ```\n"
- fmt: "# 使用 JavaDoc 注释\n\n在 Java 中，为所有方法使用 *JavaDoc 注释*。JavaDoc 内置于 Java 环境中，所有 Java\
    \ SDK 都附带用于生成 JavaDoc 网页的程序，因此你最好使用它！JavaDoc 可以以极低的成本提供类功能的良好概览。只需确保保持这些注释是最新的即可！\n\
    \n```\n/**\n* getSubString() - get a substring from the input string.\n*     \
    \ The substring starts at index start\n*      and goes up to but doesn't include\
    \ index stop.\n*  @param str the input string\n*  @param start the integer starting\
    \ index\n*  @param stop the integer stopping index\n*  @return the resulting substring.\n\
    */\npublic String getSubString(String str, int start, int stop) { }\n```\n\n*“自文档化代码”*\
    \ 是一种理想，是那些懒得向读者解释代码的懒惰程序员们的圣杯。自文档化代码是一种柏拉图式的编码理想，它假设每个阅读你代码的人都能读懂你的心思。如果你的算法有任何复杂性，或者输入有任何晦涩之处，你都需要进行解释。不要依赖读者去理解你代码中的每一个细微之处。解释它。只管去做。话虽如此，某些编程语言和工具集允许你在代码注释中嵌入文档标签。`JavaDocs`\
    \ 就是这里的典型例子。这种特性属于半自文档化。\n\n关于编写注释的主要建议是——去做。哦，既然你会修改代码——那就再写一次。这是关于注释的第二难的事情——保持它们是最新的。当你完成某个特定函数的单元测试后，通过更新已有的注释来为该函数编写最终的注释集。这样，你就能在发布的代码中拥有一套相当新的注释。\n\
    \n## 标识符命名约定\n\n正如 Rob Pike 在他关于编程风格的精彩白皮书中精辟指出的那样：“长度不是名称的优点；清晰的表达才是。”^([^(267)](#fn267))\
    \ 遵循金发姑娘原则，你需要标识符名称既不能太长以至于笨拙烦人，也不能太短以至于信息不足或令人困惑，而是要恰到好处。与注释一样，这对不同的人在不同的上下文中意味着不同的东西。常识和可读性应占主导地位。\n\
    \n- **所有标识符都应是描述性的**。你可能今天理解你的代码做了什么以及如何做的，但最终你可能会忘记自己就是编写它的人。甚至第二天它对你来说可能都毫无意义。它通常还需要对其他人有意义，因为我们往往不是软件整个生命周期中的唯一开发者。描述性标识符能让你更容易阅读代码并弄清楚你在凌晨\
    \ 3:00 试图做什么。名为 `interestRate` 的变量比 `ir` 更容易理解。当然，`ir` 更短，输入更快，但请相信我们，在你发布程序大约\
    \ 10 分钟后，你就会忘记它代表什么。合理描述性的标识符可以在编码、调试和维护软件时节省大量时间和精力。\n\n- **过长的变量名难以阅读（和输入）**。另一方面，不要让你的标识符太长。首先，它们难以阅读；其次，它们实际上不会为你的程序上下文增加任何内容；第三，它们占用页面太多空间；最后，输入它们非常耗时。\n\
    \n- **不包含单词分隔符时更难阅读**。好吧，那太痛苦了……如果你需要多词标识符，请始终使用驼峰命名法来提高可读性：从第二个单词开始，将多词标识符中每个新单词的首字母大写。例如，`maxPhysAddr`\
    \ 比 `maxphysaddr` 更容易阅读。额外的好处是，文本转语音软件能够正确读出这些标识符，所以请在所有社交媒体标签中也使用它。\n\n- **单字母变量名晦涩难懂，但有时有用**。对诸如抵押贷款支付、窗口名称或图形对象之类的东西使用单字母变量名并不是可读性的好例子。`M`、`w`\
    \ 和 `g` 即使在代码上下文中也毫无意义。`mortPmnt`、`gfxWindow` 和 `gfxObj` 更有意义。主要的例外是用作索引值的变量——循环控制变量和数组索引变量。在这里，`i`、`j`、`k`、`l`、`m`\
    \ 等很容易理解，尽管我们不会反对你使用 `index` 或 `indx`。\n\n```\nfor (int i = 0; i < myArray.length;\
    \ i++) {\n    myArray[i] = 0;\n}\n```\n\n看起来更简洁，并且与以下代码一样易于理解：\n\n```\nfor (int\
    \ arrayIndex = 0; arrayIndex < myArray.length; arrayIndex++) {\n    myArray[arrayIndex]\
    \ = 0;\n}\n```\n\n尽管如此，我们建议你在处理嵌套循环、多维数组等情况时，深入挖掘并追求更有意义的字母。例如，我们经常看到 `i` 用于行，`j`\
    \ 用于列，但使用 `r` 和 `c` 要清晰得多！这样，你在执行例如图像旋转等操作时，犯错误的可能性要小得多。\n\n- **遵守编程语言的命名约定（如果存在的话）**。\n\
    \n某个时候，你会遇到一份名为《风格指南》或类似名称的文档。如果你在一个有多个开发者的团队中工作，风格指南是个好主意。它们使你的所有代码具有统一的外观和感觉，并使一个开发者更容易修改其他人编写的代码。几乎所有具有一定规模的软件开发组织都有这样的指南。有时你可以违反指南，但最常见的是，在代码审查期间，你会因不遵守指南而被扣分，并被要求重写代码。\n\
    \n风格指南中常见的一组指南是关于命名约定的，它规定了不同类型标识符的名称应该是什么样子。\n\nJava 有一套常见的命名约定：\n\n- **对于类和接口**：标识符名称应为名词，使用大写和小写字母数字字符，名称的首字符大写。\n\
    \n```\npublic class Automobile {}\npublic interface Shape {}\n```\n\n- **对于方法**：标识符名称应为动词，使用大写和小写字母数字字符，名称的首字符小写。\n\
    \n```\nprivate double computeAverage(int [] list)\n```\n\n- **对于变量**：标识符名称可以使用大写和小写字母数字字符，名称的首字符小写。变量名可以包含但不能以\
    \ `$` 或 `_`（下划线）开头。\n\n```\ndouble average;\nString firstSentence;\n```\n\n- **对于所有标识符（常量除外）**：应使用驼峰命名法，以便内部单词首字母大写。\n\
    \n```\nlong myLongArray;\n```\n\n- **对于常量**：所有字母应大写，组成单词之间用下划线分隔。\n\n```\nstatic\
    \ final int MAX_WIDTH = 80;\n```\n\n## 重构\n\n代码构建的一个重要部分是在编码时牢记设计，尤其是尽可能保持设计的简单性。当你修复\
    \ bug 或向现有代码添加新功能时，设计简单性尤为重要。你应该思考你正在处理的代码是否尽可能简单，或者它是否变得过时、陈旧和复杂。如果是这样，请考虑*重构*，即更改代码以更新、简化和清理它。\n\
    \nMartin Fowler 将重构定义为“对软件内部结构进行的更改，目的是使其更易于理解，并在不改变其可观察行为的情况下降低修改成本。”^([^(268)](#fn268))\
    \ 重构是所有敏捷方法论的关键，这些方法论强烈鼓励你在每次更改代码时进行重构。"
  raw: "*In Java, use* *JavaDoc comments* *for all your methods*. JavaDoc is built\
    \ into the Java environment and all Java SDKs come with the program to generate\
    \ JavaDoc web pages, so you might as well use it! JavaDoc can provide a nice overview\
    \ of what your class is up to at very little cost. Just make sure and keep those\
    \ comments up to date!\n\n```\n    /**\n    * getSubString() - get a substring\
    \ from the input string.\n    *      The substring starts at index start\n   \
    \ *      and goes up to but doesn't include index stop.\n    *  @param str the\
    \ input string\n    *  @param start the integer starting index\n    *  @param\
    \ stop the integer stopping index\n    *  @return the resulting substring.\n \
    \   */\n    public String getSubString(String str, int start, int stop) { }\n\
    \    ```\n\n*   *“**Self-documenting code**” is an ideal*, the Holy Grail of those\
    \ lazy programmers who don’t want to take the time to explain their code to readers.\
    \ Self-documenting code is the Platonic ideal of coding that assumes that everyone\
    \ who reads your code can also read your mind. If you have an algorithm that is\
    \ at all complicated, or input that is at all obscure, you need to explain it.\
    \ Don’t depend on the reader to understand every subtlety of your code. Explain\
    \ it. Just do it. All that said, some programming languages and tool sets allow\
    \ you to embed documenting tags in comments in your code. JavaDocs is the canonical\
    \ example here. That type of feature is semi-self-documenting.\n\nThe main advice\
    \ about writing comments is—do it. Oh, and since you’ll change your code—do it\
    \ again. That’s the second hardest thing about comments—keeping them up to date.\
    \ When you finish your unit testing of a particular function, write a final set\
    \ of comments for that function by updating the ones that are already there. That\
    \ way, you’ll come pretty close to having an up-to-date set of comments in the\
    \ released code.\n\n## Identifier Naming Conventions\n\nAs Rob Pike puts it so\
    \ well in his terrific white paper on programming style, “Length is not a virtue\
    \ in a name; clarity of expression *is*.”^([^(267)](#fn267)) Following a Goldilocks\
    \ approach, you need identifier names that are not so long that they are unwieldy\
    \ and annoying, not so short that they are uninformative or confusing, but just\
    \ right. As with comments, this means different things to different people and\
    \ in different contexts. Common sense and readability should rule.\n\n*   *All*\
    \ *identifiers* *should be descriptive*. You might understand what your code does\
    \ and how it does it today, but eventually you could forget you were even the\
    \ one who wrote it. It might not even make sense to you the very next day. It\
    \ often also needs to make sense to others, as we are often not the sole developers\
    \ over the entire lifetime of the software. Descriptive identifiers make it much,\
    \ much easier to read your code and figure out what you were trying to do at 3:00\
    \ AM. A variable called *interestRate* is much easier to understand than *ir*.\
    \ Sure, *ir* is shorter and faster to type, but believe us, you’ll forget what\
    \ it stood for about 10 minutes after you ship that program. Reasonably descriptive\
    \ identifiers can save you a lot of time and effort while coding, debugging, and\
    \ maintaining software.\n\n*   *OverlyLongVariableNamesAreHardToRead* *(and type)*.\
    \ On the other hand, don’t make your identifiers too long. For one thing they\
    \ are hard to read, for another they don’t really add anything to the context\
    \ of your program, they use up too much space on the page, and finally, they are\
    \ time-consuming to type out.\n\n*   *Andtheyareevenharderwhenyoudontincludeworddivisions*.\
    \ Well that was painful... If you need multiword identifiers, improve readability\
    \ by always using camel case: capitalize the first letter of each new word in\
    \ your multiword identifiers, starting from the second word. For example, `maxPhysAddr`\
    \ is easier to read than `maxphysaddr`. As a bonus, text-to-voice software will\
    \ be able to read those identifiers correctly, so #pleaseUseItWithAllYourSocialMediaHashtagsAlso.\n\
    \n*   *Single-letter variable names are cryptic, but sometimes useful*. Using\
    \ single letter variable names for things like mortgage payments, window names,\
    \ or graphics objects is not a good example of readability. `M`, `w`, and `g`\
    \ don’t mean anything even in the context of your code. `mortPmnt`, `gfxWindow`,\
    \ and `gfxObj` have more meaning. The big exception here is variables intended\
    \ as index values—loop control variables and array index variables. Here, `i`,\
    \ `j`, `k`, `l`, `m`, etc. are easily understandable, although we wouldn’t argue\
    \ with you about using `index` or `indx` instead.\n\n```\n    for (int i = 0;\
    \ i < myArray.length; i++) {\n    myArray[i] = 0;\n    }\n    ```\n\nlooks much\
    \ cleaner and is just as understandable as\n\n```\n    for (int arrayIndex = 0;\
    \ arrayIndex < myArray.length; arrayIndex++) {\n    myArray[arrayIndex] = 0;\n\
    \    }\n    ```\n\nStill, we recommend you dig a bit deeper and aim for more meaningful\
    \ letters when dealing with nested loops, multi-dimensional arrays, and such.\
    \ For example, we often see `i` used for rows and `j` used for columns, but using\
    \ `r` and `c` is just so much clearer! This way you way less likely to make mistake\
    \ when performing, for example, an image rotation.\n\n*   *Adhere to the programming\
    \ language naming conventions* *when they exist*.\n\nSomewhere, sometime, you’ll\
    \ run into a document called Style Guide or something like that. If you work in\
    \ a group with more than one developer, style guidelines are a good idea. They\
    \ give all your code a common look and feel and they make it easier for one developer\
    \ to make changes to code written by somebody else. Nearly every software development\
    \ organization of any size has one. Sometimes you’re allowed to violate the guidelines,\
    \ but most commonly, during a code review, you’ll get dinged for not following\
    \ the guidelines and be required to rewrite your code.\n\nA common set of guidelines\
    \ in a style guide is about naming conventions, which specify what your identifier\
    \ names should look like for different types of identifiers.\n\nJava has a common\
    \ set of naming conventions:\n\n*For classes and interfaces*: The identifier names\
    \ should be nouns, using both upper and lowercase alphanumerics, with the first\
    \ character of the name in upper case.\n\n```\npublic class Automobile {}\npublic\
    \ interface Shape {}\n```\n\n*For methods*: The identifier names should be verbs,\
    \ using both upper and lowercase alphanumerics, with the first character of the\
    \ name in lower case.\n\n```\nprivate double computeAverage(int [] list)\n```\n\
    \n*For variables*: The identifier names can use both upper and lowercase alphanumerics,\
    \ with the first character of the name in lower case. Variable names may contain\
    \ but should not start with $ or _ (underscore).\n\n```\ndouble average;\nString\
    \ firstSentence;\n```\n\n*For all identifiers (except constants*): Camel case\
    \ should be used, so that internal words are capitalized.\n\n```\nlong myLongArray;\n\
    ```\n\n*For constants*: All letters should be uppercase and composing words should\
    \ be separated by underscores.\n\n```\nstatic final int MAX_WIDTH = 80;\n```\n\
    \n## Refactoring\n\nAn important part of code construction is keeping the design\
    \ in mind as you code and especially keeping the design as simple as possible.\
    \ Design simplicity is particularly important when you are fixing a bug or adding\
    \ something new to existing code. You should think about whether the code you’re\
    \ working on is as simple as it can be, or whether it is getting outdated, crusty,\
    \ and complicated. If so, consider *refactoring*, meaning changing the code to\
    \ update, simplify, and clean it up.\n\nMartin Fowler defines refactoring as “a\
    \ change made to the internal structure of the software to make it easier to understand\
    \ and cheaper to modify without changing its observable behavior.”^([^(268)](#fn268))\
    \ Refactoring is key to all agile methodologies, which strongly encourage it every\
    \ time you change code."
