    value focus: the Executive. Scrum shines when applied to those with a team organization,
    management, and project delivery focus: the Project Management. Extreme Programming
    shines when applied to those with a development delivery and tactical focus: the
    Development.”*^([^(32)](#fn32))


    Most notably, it is not *lean* versus *agile*, but rather crucially *lean* AND
    *agile*, where *lean* focuses on improving the process by reducing wastes, while
    *agile* focuses on improving the product by effectively adapting to new information
    throughout the project. Both are crucial to developing software. Additionally,
    *agile* does not mean no *planning*, as not thinking far enough ahead can lead
    to incorrect early decisions; a better perspective is to borrow l*ean*’s deferring
    of commitment to ensure that early decisions to do not eliminate potentially useful
    future options. Here are a few ways that the implementations of these ideas can
    play off of each other:


    *   Lean can be naturally combined with Scrum, as agile allows early feedback,
    reducing how much needs to be reworked, and clear shared understanding among teammates
    can reduce motion, defects, non-utilizing talent, overproduction, and waiting.


    *   Since XP is mainly focused on programming, development can easily benefit
    from team management defined in Scrum.


    *   While coding individual features, developers naturally employ mini Waterfalls,
    creating a plan and following it to develop and test each new feature.


    *   While developing prior to an initial release to the public may be most fruitful
    with Scrum, providing continuous services and fast changing projects may be better
    represented through Kanban, allowing for a continuous approach.


    *   Scrum is well suited to projects where discrete increments are meaningful
    and for working toward an initial release, while Kanban lends itself naturally
    to ongoing operation such as providing a continuous service; Scrumban^([^(33)](#fn33))
    is a fused approach that allows for the development of new features while also
    providing ongoing services.


    As can be seen from the methodologies described in this chapter, iteration and
    collaboration are the key. The most effective way to build complex software is
    to incrementally gather insights, leaning what to make and how to make it better
    at each following step. You must recognize that you never have all the knowledge
    at the start, and that designing, writing, testing, and delivering incrementally
    better code is the most reliable and effective path toward creating great software.'
  trans: '

    ##### 看板


    为了帮助组织开发工作，看板采用了以下概念：


    *   *在制品（WIP）* 是指团队当前正在处理的任务总数，包括任务可能处于的所有状态（进行中、已完成、测试中、审核中等）。


    *   *流程* 是指任务在完成过程中从一个状态转移到另一个状态的过程。


    *   *前置时间*：团队将任务从最初的“待办”状态推进到“完成”状态所需的时间（以小时或天计）。随着时间的推移，随着团队完成越来越多的任务，可以计算出团队的平均前置时间，从而预估任何单个任务需要多长时间才能完成，这可以作为衡量生产力的一种指标。


    看板的独特之处在于工作的持续流动。它没有限时冲刺，因此也没有包含团队接下来要关注的任务子集的较小冲刺待办列表。所有剩余的待办事项都位于一个单一的待办列表中。为了帮助团队组织工作，看板使用了*泳道*：用于对任务进行分段的水平分隔线。泳道可以表示任何有用的分类，包括任务优先级、任务类型、不同的项目/产品，甚至不同的团队。


    当所有剩余任务都位于待办列表中时，限制在制品数量是让团队专注于流程的方式。开发人员可以使用*看板*（Scrum *任务板*的一种变体）来异步跟踪在制品和流程。图
    2-5 展示了一个通用的任务/看板。这些看板可以是占据团队公共空间一面墙的实体白板，也可以是共享的数字看板。团队会在这个看板上添加实体或数字的便利贴来标识任务，然后可以将这些任务在看板的列与列之间（即状态与状态之间）移动。


    ![](img/270563_3_En_2_Fig5_HTML.jpg)


    一个表格包含 4 列，分别标记为产品待办列表或待办、进行中、质量保证或审核、以及完成。产品待办列表包含从令牌 1 到令牌 9 的 9 个令牌。这些令牌分组在泳道
    1、泳道 2 和加急之下。


    图 2-5


    一个通用的任务/看板，包含 WIP 上限和泳道，箭头表示流程


    使用这种看板，用户可以选择更改列的数量和标题，以使看板适应他们的流程。看板通过使用*拉动系统*来运作：看板不是将项目推送到其他阶段，而是告诉开发人员在有能力处理时从上一阶段拉取项目。每完成一个任务，团队就会拥有一个添加了新功能的可运行软件。


    然后，团队可以指定允许同时处理的最大任务数量（即“进行中”和“质量保证/审核”），这被称为在制品或 WIP，用于控制工作流经团队的过程。WIP 没有硬性规定，但应考虑：1）团队人数，以及
    2）每个人应同时处理多少任务。一般建议是每人 1 到 2 个任务。例如，假设看板上的每个状态都已达到上限（开发中有 N 个任务，审核/测试中有 M 个任务），并且一名开发人员完成了一个新任务的开发。在审核中的某个任务完成之前，这个任务无法移动到“审核”状态。我们刚刚暴露了工作流程中的一个瓶颈。在看板中，该开发人员会介入帮助审核该状态下的某个任务。在下游为已完成的任务腾出空间之前，不能将任何新任务拉入“开发”状态。


    在看板中，目标是在任何时候允许的最大任务数量的约束下，最大化在制品。它不像 Scrum 那样有时间盒限制；目标是在尽可能快地推动任务（拥有最短的*前置时间*）的同时，通过达到允许的最大任务数量来最大化生产力。


    你可以注意到，当我们说*最大化* *WIP*时，我们并不是要给团队更多的工作。事实上，保持每个状态的任务数量尽可能少的目标是为了减少团队的工作量，让他们专注于更少的任务（我们希望避免多任务处理）。其理念是，这将减少压力和昂贵的任务切换，同时提高工作质量*和*吞吐量。你会注意到这里缺少了一些东西，特别是事情如何进入待办列表，以及“完成”意味着什么。这是因为看板实际上并不是一种项目管理技术。为了使用看板，你需要已经具备一些流程，并且需要对其进行管理。


    ## 用于多层级关注点和范围的混合软件开发方法


    多种软件开发理念，甚至多种实现方式，可以在同一个组织、团队或项目中有效地共存。你可能需要选择几种方法，以便在不同的时间和关注层级上帮助你组织工作。考虑到整个公司需要组织起来，一个项目需要组织起来，开发工作也需要组织起来。


    > *“虽然所有敏捷流程都有共同点，但它们的最佳应用点针对特定的组织层级：为不同的受众提供不同的‘视图’。精益在应用于关注战略、组织和股东价值的人（高管）时表现出色。Scrum
    在应用于关注团队组织、管理和项目交付的人（项目管理）时表现出色。极限编程在应用于关注开发交付和战术的人（开发人员）时表现出色。”*^(³²)


    最值得注意的是，这不是*精益*与*敏捷*的对立，而是至关重要的*精益*与*敏捷*的结合，其中*精益*侧重于通过减少浪费来改进流程，而*敏捷*侧重于通过在整个项目中有效地适应新信息来改进产品。两者对于软件开发都至关重要。此外，*敏捷*并不意味着没有*计划*，因为对未来考虑不足可能导致早期决策错误；更好的视角是借鉴*精益*的延迟承诺，以确保早期决策不会消除未来可能有用的选项。以下是这些理念的实现方式可以相互配合的几种方式：


    *   精益可以自然地与 Scrum 结合，因为敏捷允许早期反馈，减少需要返工的工作量，并且团队成员之间清晰共享的理解可以减少动作浪费、缺陷、未充分利用人才、过度生产和等待。


    *   由于 XP 主要关注编程，开发工作可以轻松受益于 Scrum 中定义的团队管理。


    *   在编码单个功能时，开发人员自然会采用小型瀑布模型，制定计划并遵循计划来开发和测试每个新功能。


    *   在首次公开发布之前的开发阶段，使用 Scrum 可能最有成效，而提供持续服务和快速变化的项目则可能通过看板更好地体现，从而允许采用持续的方法。


    *   Scrum 非常适合那些离散增量有意义且致力于首次发布的项目，而看板则自然适用于持续运营，例如提供持续服务；Scrumban^(³³) 是一种融合方法，允许在开发新功能的同时提供持续服务。


    从本章描述的方法论可以看出，迭代和协作是关键。构建复杂软件最有效的方式是逐步收集见解，在每一步中学习要制作什么以及如何做得更好。你必须认识到，你从一开始就从未掌握所有知识，而设计、编写、测试和交付渐进式改进的代码，是通往创建卓越软件最可靠、最有效的途径。

