  trans: '

    ### 审查角色


    以下是代码审查中使用的角色：


    *   **主持人**：主持人从作者处获取所有材料，决定审查的其他参与者，并负责发送所有审查材料以及安排和协调会议。主持人必须具备技术能力；他们需要理解审查材料并确保会议按计划进行。主持人安排审查会议并发送常见错误清单供审查者仔细阅读。他们还会跟进作者处理审查中发现的任何错误，因此必须理解这些错误及其修正方法。主持人需要参加额外的审查培训课程，以帮助他们为这一角色做好准备。


    *   **作者**将审查材料分发给主持人。作者负责因审查会议而产生的所有返工。在审查期间，作者回答审查者关于代码的问题，但不做其他事情。有时，如果许多审查者不熟悉项目，则需要进行初步的概述会议；由作者主持并向审查者解释整体设计。在代码审查中不鼓励举行概述会议，因为它们可能会在审查会议之前注入作者对代码和设计的看法，从而“污染证据”。


    *   **朗读者**用自己的话复述代码。这意味着朗读者对项目、其设计以及所讨论的代码有很好的理解。朗读者不解释代码，只是复述它。作者应回答关于代码的任何问题。也就是说，如果作者必须解释太多代码，这通常被视为需要修复的缺陷；此类代码应进行重构以使其更简单。


    *   **审查者**在审查中承担主要工作。审查者可以是任何对代码感兴趣且不是作者的人；通常审查者是来自同一项目的其他开发人员。与代码审查一样，通常最好让一位不在该项目中的资深人员也担任审查者。审查会议通常有两到四名审查者。审查者必须预先阅读审查材料，并应带着他们发现的错误列表来参加会议。此列表交给记录员。


    *   **记录员**是负责做笔记的审查者之一（每次审查会议都需要）。记录员合并审查者的缺陷列表，对会议期间发现的错误进行分类和记录。会议结束后，记录员准备审查报告并将其分发给会议参与者。此外，如果项目使用缺陷管理系统，则记录员负责将会议中所有主要缺陷的缺陷报告录入系统。


    *   **管理人员不被邀请参加代码审查**（与代码审查相同）。


    ### 审查缺陷类型


    需要报告的缺陷可以按类型和严重程度进行分类。Fagan 审查仅指定两种缺陷类型：1）**次要缺陷**，例如排版错误、文档错误、小的用户界面错误以及其他不会导致软件失败的各种问题；2）**主要缺陷**，即所有确实会导致软件失败的错误。我们认为这有点极端，因为两个级别通常不足以确定修复的优先级。大多数开发组织至少会有一个五级缺陷结构：


    1.  **致命错误：** 程序失败，通常会导致核心转储和/或生成回溯信息。致命错误通常表明程序的某部分存在根本性问题。


    2.  **严重错误：** 主要功能失败，用户没有变通方法。假设在一款第一人称射击游戏中，软件不允许你重新装填武器，也不允许你在战斗中切换武器。这很糟糕。


    3.  **重要错误：** 错误很严重，但用户有变通方法。例如，软件不允许你重新装填武器，但如果你切换武器然后再切换回来，就可以重新装填了。


    4.  **轻微错误：** 小错误，例如不正确的文档或轻微的用户界面问题。例如，表单中的文本框距离其提示标签远了 10 个像素。


    5.  **功能请求：** 期望程序拥有一个全新的功能。这不是一个错误；而是用户（或市场部门）对软件新功能的需求。在游戏中，这可能是新武器、新角色类型、新地图或新环境等等。这是一个应在下一个软件版本中考虑的需求。


    理想情况下，当然不应该有任何错误交付给用户，但让我们现实一点。在大多数组织中，不允许发布已知存在严重级别 1 和 2 错误的软件。尽管如此，严重级别 3 的错误确实会让用户感到不满，因此软件实际上绝不应该在已知存在任何严重级别
    1 到 3 错误的情况下发布。


    根据 Fagan 分类，上述严重级别 1 到 3 的缺陷都被归类为主要缺陷，并且需要修复。通常由记录员负责正确地将代码中发现的缺陷归类为主要缺陷（此分类以后可以更改）。


    ### 审查阶段与流程


    Fagan 审查有七个阶段，每次审查都必须遵循：^(³⁰⁴)


    1.  规划


    2.  概述会议


    3.  准备


    4.  审查会议


    5.  审查报告


    6.  返工


    7.  跟进


    #### 阶段 1：规划


    在规划阶段，主持人组织并安排会议，并挑选参与者。主持人和作者一起讨论审查材料的范围（对于代码审查，通常审查 200 到 500 行非注释代码）。然后作者将要审查的代码分发给参与者。


    #### 阶段 2：概述会议


    概述会议是作者对项目架构和设计的介绍，如果若干参与者不熟悉项目或其设计，并且需要快速了解情况才能有效阅读代码，则有必要举行此会议。与审查会议本身一样，概述会议不应超过两个小时。如果需要举行概述会议，作者将召集并主持会议。如前所述，不鼓励举行概述会议，因为它们往往会污染证据。


    #### 阶段 3：准备


    在准备阶段（Fagan 审查中必需），每位审查者阅读待审查的工作成果。如果审查者没有完成准备，审查会议可以取消。准备时间不应超过 2-3 小时。待审查的工作量应为
    200-500 行非注释代码，或 30-80 页文本。研究表明，审查者通常每小时可以审查大约 125-200 行代码。每位审查者花费在准备上的时间是在审查会议上收集的指标之一。

    '
- fmt: '#### Phase 4: The Inspection Meeting


    The moderator is in charge of the inspection meeting, keeping it on track and
    focused. The inspection meeting should last no more than two hours. If there is
    any material that has not been inspected at the end of that time, a new meeting
    is scheduled. At the beginning of the meeting, the reviewers turn in their list
    of previously discovered errors to the recorder.


    During the meeting, the reader paraphrases the code and the reviewers follow along.
    The author is there only to clarify any details and answer any questions about
    the code, doing nothing else so as not to taint the process. The recorder writes
    down all the defects reported, their level, and their classification. Resolving
    defects is strongly discouraged; participants are encouraged to have a separate
    meeting to discuss solutions.


    #### Phase 5: Inspection Report


    Within a day of the meeting, the recorder distributes the inspection report to
    all participants. The central part of the report are the defects that were found
    in the code during the meeting.


    The report also includes metrics data, such as:


    - The number of defects found

    - The number of each type of defect by severity and type

    - The time spent in preparation (total time in person-hours and time per participant)

    - The time spent in the meeting (clock time and total person-hours)

    - The number of uncommented lines of code or pages of text reviewed


    #### Phase 6: Rework and Follow Up


    The author fixes all the major (severity 1-3) defects found during the meeting.
    If excessive defects were found, or if extensive refactoring or code changes had
    to occur, then another inspection is scheduled. While definitions of what is excessive/extensive
    vary, we have typically used 10% of the code inspected (e.g., changing over 20
    lines of code when inspecting 200 lines). If it’s less than 10% of the code was
    reworked, the author and the moderator can do a walkthrough instead. Regardless
    of how much code is changed, the moderator must check all the changes as part
    of the *follow up*. As part of the rework, another metric should be reported:
    the amount of time required by the author to fix each of the defects reported.
    The easiest way to track this accurately is for developers to use a defect tracking
    system. This metric, plus the number of defects found during the project, are
    critical to doing accurate planning and scheduling for the next project.


    ## Reviews in Agile Projects


    Let’s face it: the sections on walkthroughs, code reviews, and inspections above
    don’t really seem to mesh well with agile and lean methodologies. Instead, these
    seem like heavyweight processes that fit well in very large projects, but can
    they benefit XP or Scrum or lean development? The last thing we need during a
    Scrum sprint is a meeting every time we finish a task and want to integrate the
    code. Well, it turns out that doing reviews in agile projects is a pretty good
    idea and can work well with some changes to the process.


    Let’s remember what the Agile Manifesto says agile developers value:


    - individuals and interactions over processes and tools,

    - working software over comprehensive documentation,

    - customer collaboration over contract negotiation, and

    - responding to change over following a plan.^([^(305)](#fn305))


    Over the last 40 years or so, there has been quite a bit of research that shows
    that code reviews produce software with fewer defects, which aligns nicely with
    the agile emphasis on working software. What could be more interactive than software
    developers collaborating about the code and making real-time improvements? Code
    reviews also fully support agile tenets by promoting the development of working
    software, collaboration and interaction among teams, continuous attention to technical
    excellence and the ability to respond to change—all while maintaining a high level
    of quality. The only question is, how do you do code reviews in an agile project?


    Firstly, let’s change the name; instead of talking about walkthroughs or code
    reviews, let’s instead talk about *peer code reviews*. This emphasizes the fact
    that in our agile project, *peers* do the reviewing of code. Remember that a typical
    agile team has members with a wide variety of skills; there are developers, designers,
    testers, writers, architects, and, usually, the customer. Also remember that one
    of the hallmarks of agile teams is that they are *self-organizing*. In this case,
    what we want is for anyone on the team to be able to be in a peer code review.
    This spreads around the knowledge of the code, just as with pair programming,
    and gives everyone on the team more skills and knowledge; remember that *collective
    code ownership* is also a trait of agile methodologies.


    Secondly, we don’t really need a meeting to review the code. You’ll hold the *peer
    code review* after the code has been written (or fixed) and after all the unit
    tests have been run. Whoever is to participate in the peer code review will need
    to read the code before the code review. In addition, if your project is using
    pair programming, there have already been two sets of eyes on the code and the
    design and the requirements. It turns out that, in the context of these practices,
    the probability of finding more major defects in a dedicated code review meeting
    is pretty low. According to a research study by Votta,^([^(306)](#fn306)) code
    inspection meetings add only about 4% more defects to the list than those already
    brought to the meeting by the participants. In other words, the dedicated code
    review meetings are not likely to add much in the agile development context. Also,
    remember the ultimate purpose of a peer code review: producing working software.
    In agile, anything that detracts from producing working software is to be shunned,
    and meetings take time away from producing working software.


    The case for having a peer code review is the research that says that code reviews
    *do* find new defects in code and one of the reasons for agile processes (described
    in Kent Beck’s *Extreme Programming Explained* book^([^(307)](#fn307))) is that
    the earlier you find defects, the cheaper they are to fix. The trick is to *peer
    review code* without slowing down the flow of an iteration/sprint. To achieve
    this, the team should allocate part of everyone’s time to doing peer code reviews
    when they are doing the task estimations at the beginning of an iteration. Making
    peer code reviews part of the culture and the work effort will make it easier
    for developers to fit it into their day.


    ### Performing an Agile Peer Code Review


    There are several ways that you can do a peer code review without having a long
    drawn-out meeting and without requiring lots of heavyweight documentation and
    reporting. Here are a few suggestions.


    *Over the shoulder* is like the walkthrough you visited at the beginning of this
    chapter. Whether pair-programming or not, add one more person at the end: go over
    the code with that person one more time before you integrate the changes. That’s
    all. You can give the new person a heads-up and have them read the code beforehand,
    or (if their personal working process allows) drag them over to your code and
    do it immediately.


    *Email review*: You email one or more of your colleagues a link to the code and
    ask them to read it and provide comments. Assuming your team has built-in code
    review time into task estimation, this should be something that everyone on the
    team is on board with. The only downside to an email review is that if the reviewer
    has any questions about the code, they must reach back out to the author, potentially
    with much back and forth. In asynchronous communications such as emails, this
    can cause unnecessary delays and task switching costs, which argues for just having
    a quick meeting instead.'
