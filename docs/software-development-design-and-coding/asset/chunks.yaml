  trans: '

    #### 结构型模式一：适配器模式


    问题场景是这样的：你有一个类 `Foo`（客户端），它想要访问另一个类、库或包 `Bar`（目标）。问题在于，`Foo` 期望的是一个特定的接口，而这个接口与
    `Bar` 对外公开的接口不同。你该怎么办？


    你可以重写 `Foo`，将其期望的接口改为与 `Bar` 提供的接口一致。但如果 `Foo` 很复杂，或者它正被其他类使用，这可能不是一个可行的方案。或者，你也可以重写
    `Bar`，使其提供 `Foo` 期望的接口。但如果 `Bar` 是一个商业包，你没有源代码呢？


    这时，适配器设计模式就派上用场了。^(²¹⁷) 你使用适配器模式创建一个中间类，将目标 `Bar` 的接口包装在一组方法中，这些方法呈现的是客户端 `Foo`
    所寻找的接口。适配器模式一端与客户端 `Foo` 交互，另一端与目标 `Bar` 交互，因此 `Bar` 的接口无需改变，而 `Foo` 的用户也能获得他们期望的接口。皆大欢喜！由于这种包装功能，适配器模式也被称为包装器模式。^(²¹⁸)
    见图 13-2。


    ![](img/270563_3_En_13_Fig2_HTML.jpg)


    一个包含三个带标签形状的流程图，顶部是一个标有“foo”的矩形，中间是一个标有“adapter”的倒三角形，底部是一个标有“bar”的圆形。


    图 13-2

    适配器让 Foo 能够使用 Bar


    实现适配器有两种方式：1）*类适配器*继承自目标类；2）*对象适配器*使用委托来创建适配器。注意区别：*类适配器*是现有客户端类的子类，并实现目标的接口；*对象适配器*是目标类的子类，并委托给一个现有类。图
    13-3 是通用类适配器的图示。


    ![](img/270563_3_En_13_Fig3_HTML.jpg)


    适配器设计模式的 UML 图，展示了客户端、目标接口、适配器和被适配者之间的交互。


    图 13-3

    类适配器示例


    注意，`Adapter` 类继承自 `Adaptee` 类，并实现了 `Client` 类所使用的同一个 `Target` 接口。以下是此示例的代码：


    ```

    public class Client {

    public static void main(String [] args) {

    Target myTarget = new Adapter();

    System.out.println(myTarget.sampleMethod(12));

    }

    }

    public interface Target {

    int sampleMethod(int y);

    }

    public class Adapter extends Adaptee implements Target {

    public int sampleMethod(int y) {

    return myMethod(y);

    }

    }

    public class Adaptee {

    public Adaptee() {

    }

    public int myMethod(int y) {

    return y * y;

    }

    }

    ```


    另一方面，对象适配器仍然实现 `Target` 接口，但使用与 `Adaptee` 类的组合来完成包装；它看起来像这样：


    ```

    public class Adapter implements Target {

    Adaptee myAdaptee = new Adaptee();

    public int sampleMethod(int y) {

    return myAdaptee.myMethod(y);

    }

    }

    ```


    在这两种情况下，客户端都不需要改变！这就是适配器的美妙之处。你可以通过更改适配器而不是客户端，来改变所使用的 `Adaptee`。


    #### 结构型模式二：外观模式


    作为结构型模式的第二个例子，让我们尝试简化接口。假设你有一组构成子系统的类。它们可以是构成更复杂系统的单个类，也可以是大型类库的一部分。再假设该子系统中的每个类都有不同的接口。最后，假设你想编写一个客户端程序，使用这些类中的一部分或全部。通常这意味着，要编写客户端程序，你需要学习子系统中所有相关类的所有接口，才能与子系统通信并完成工作。图
    13-4 展示了一个可视化示例。


    ![](img/270563_3_En_13_Fig4_HTML.jpg)


    一个块流程图展示了层次结构。顶部是一个客户端类，箭头指向多个子系统类。


    图 13-4

    客户端使用多个接口


    显然，这会使你的客户端程序变得复杂且难以维护。这个问题可以通过外观模式^(²¹⁹) 来解决。外观模式提供了一个单一、简单、统一的接口，使你的客户端更容易与子系统类交互。使用外观模式时，你只需学习一个接口，并用它与所有子系统类交互。图
    13-5 展示了一个可视化示例。


    ![](img/270563_3_En_13_Fig5_HTML.jpg)


    一个块流程图展示了外观设计模式。它表示一个客户端连接到一个外观框，该框又连接到排列成两层的多个子系统类。


    图 13-5

    客户端使用外观接口


    除了提供单一接口供使用外，外观模式还向客户端隐藏了任何接口的更改或添加。这是第 12 章中*最少知识原则*的经典例子。


    外观模式可能看起来与上面的适配器模式相似，但它们的目的不同。适配器模式包装目标接口，允许客户端使用它期望的接口。外观模式则简化一个或多个接口，并提供简化后的接口供客户端使用。


    关于外观模式的一个例子：假设要创建一个在线商店，并编写一个简单的程序来计算客户为订购商品所需支付的总金额。在这个程序中，你需要查找商品、计算付款、计算销售税、计算运费、汇总所有费用，然后发送给用户。这将产生
    `SalesTax`、`Delivery`、`Payment` 和 `Inventory` 这几个类。如果你想使用外观模式简化接口，可以创建一个新类 `Order`，它将隐藏多个接口，并为客户端程序生成一个更简单的接口。在
    UML 中，这看起来如图 13-6 所示。


    ![](img/270563_3_En_13_Fig6_HTML.jpg)


    一个 UML 图展示了包含客户端、订单、配送和库存等类的业务流程。类之间由箭头连接，核心概念包括销售税和付款。


    图 13-6

    外观模式示例


    这个简单示例的代码可能如下所示：

    '
