  trans: "\n## 接下来该做什么？\n\n既然你已经阅读了关于软件开发的所有内容，或许还尝试了一些示例，那么接下来该做什么？如何继续成为一名更优秀的软件开发者？以下是一些建议。\n\
    \n*编写代码，大量编写代码。* 经验大有裨益。编程是一门需要练习和不断强化的技艺。你几乎每天都需要学习新东西，而且很可能每隔几年就需要学习一整套全新的工具和编程语言。编写大量代码会让这项任务变得更容易、更有趣。这就像升级打怪：需要付出努力，但能让你为下一场对抗更有趣问题的重大战役做好准备。\n\
    \n*学习简单的工具。* 简单的工具能给你灵活性。它们还能帮助你掌握基础技能，之后你可以将这些技能应用到更复杂的集成开发环境（IDE）中。当这些 IDE 被取代时（它们迟早会被取代），你可以退回到简单的工具，直到学会新的\
    \ IDE。\n\n*阅读关于问题解决和设计的书籍。* 人类解决问题和设计解决方案已有数千年历史。不要忽视计算机科学文献中的经典著作，比如迪杰斯特拉的《结构化编程》一书^(³¹⁶)、布鲁克斯的经典之作《人月神话》^(³¹⁷)、本特利的《编程珠玑》^(³¹⁸)、麦康奈尔的《快速软件开发》^(³¹⁹)以及贝克的《解析极限编程》^(³²⁰)。其他领域的研究和发展也能提供通用的解决问题的策略，这些策略同样适用于软件开发。例如，波利亚的《怎样解题》一书是为解决数学问题而写的，但它非常、非常适用于软件领域^(³²¹)。\n\
    \n*阅读关于编程的书籍，也阅读关于程序员的书籍。* 关于编程的文献浩如烟海。前几章已经提到了不少书籍，但有两本值得再次强调：亨特和托马斯的《程序员修炼之道》^(³²²)以及麦康奈尔的《代码大全\
    \ 2》^(³²³)。阅读关于伟大程序员如何思考、工作以及编写优秀代码的书籍也是一个绝佳的主意。两本值得注意的书是拉默的《编程大师访谈录》^(³²⁴)以及奥拉姆和威尔逊的《代码之美》^(³²⁵)。\n\
    \n*与其他程序员交流。* 书籍和文章是获取信息的好方法，但不要低估与同行交流的价值。结对编程的一个附带好处是，你能看到别人是如何工作的，他们如何解决问题，如何编码、调试和编写测试。代码评审会议也是了解他人工作方式的好途径。此外，代码评审强化了杰拉尔德·温伯格提出的*无我编程*理念^(³²⁶)。一旦你克服了“拥有”软件产品中代码的想法（你的雇主拥有它；读读你入职第一天必须签署的那些文件，并查看关于知识产权的第\
    \ 5 章），你就能更客观地审视自己以及同事的代码，从而从代码的优点和缺点中学习。\n\n*加入 ACM 和 IEEE-CS：* 美国计算机协会（ACM；[`www.acm.org`](https://www.acm.org/)）和\
    \ IEEE 计算机学会（IEEE-CS；[`www.computer.org`](https://www.computer.org/)）是计算机科学家的两大主要专业组织。它们的期刊包含大量与计算机和计算相关的信息，其会议值得参加，并且它们为会员提供免费的在线书籍和课程。加入其中一个或两个组织，你不会后悔。\n\
    \n*保持谦逊：* 迪杰斯特拉的以下引述道出了一切。\n\n> *称职的程序员完全清楚自己头脑的容量极其有限；因此他以完全的谦逊态度来对待编程任务……*\n\
    > \n> ——艾兹格·迪杰斯特拉^(³²⁷)\n\n软件开发是困难的。任何规模的程序都可能极其难以完全理解。计算机软件不仅是人类做过的最具创造性的事情之一，也是最复杂的事情之一。保持谦逊。努力工作。享受乐趣！最后，我们忍不住引用一句同时包含“魔法”和“计算机”这两个词的引述……\n\
    \n> *神话和传说中的魔法在我们这个时代变成了现实。人们在键盘上敲出正确的咒语，显示屏便活了起来，展现出从未有过、也不可能存在的事物。编程之所以有趣，是因为它满足了深植于我们内心的创造渴望，并愉悦了我们与所有[人]共有的感受。……在这方面，计算机也与传说中的魔法相似。如果咒语中有一个字符、一个停顿没有严格遵循正确的形式，魔法就不会奏效。人类不习惯完美，也很少有人类活动要求完美。我认为，适应对完美的要求，是学习编程中最困难的部分。*\n\
    > \n> ——弗雷德里克·布鲁克斯^(³²⁸)\n"
