- fmt: "# Designers and Creativity\n\nDon’t think that design is cut and dried, or\
    \ that formal processes rules can be imposed to crank out software designs. It’s\
    \ not like that at all. While there are formal restrictions and constraints on\
    \ your design that are imposed by the problem, the problem domain, and the target\
    \ platform, the process of reaching the design itself need not be formal. It is\
    \ at bottom a creative activity. Bill Curtis, in a 1987 empirical study of software\
    \ designers came up with a process that seems to be what most of the designers\
    \ followed:^([^(159)](#fn159))\n\n1. Understand the problem.\n2. Decompose the\
    \ problem into goals and objects.\n3. Select and compose plans to solve the problem.\n\
    4. Implement the plans.\n5. Reflect on the design product and process.\n\nFrankly,\
    \ this is a pretty general list and doesn’t really tell us everything we’d really\
    \ need for software design. Curtis, however, then went deeper in #3 on his list,\
    \ “select and compose plans,” and found that his designers used the following\
    \ steps:\n\n1. Build a mental model of a proposed solution.\n2. Mentally execute\
    \ the model to see if it solves the problem. Make up input and simulate the model\
    \ in your head.\n3. If what you get is not correct, change the model to remove\
    \ the errors and go back to step 2 to simulate again.\n4. When your sample input\
    \ produces the correct output, select some more input values and go back and do\
    \ steps 2 and 3 again.\n5. When you’ve done this enough times (you’ll know because\
    \ you’re experienced) then you’ve got a good model and you can stop.^([^(160)](#fn160))\n\
    \nThis deeper technique makes the cognitive and the iterative aspects of design\
    \ clear and evident. You see that design is fundamentally a function of the mind,\
    \ is idiosyncratic, and depends on things about the designer that are outside\
    \ the process itself.\n\nJohn Nestor, in a report to the Software Engineering\
    \ Institute, came up with a list of what are some common characteristics of great\
    \ designers. Great designers\n\n* have a large set of standard patterns;\n* have\
    \ experienced failing projects;\n* have mastery of development tools;\n* have\
    \ an impulse towards simplicity;\n* can anticipate change;\n* can view things\
    \ from the user’s perspective; and\n* can deal with complexity.^([^(161)](#fn161))\n\
    \n## Conclusion\n\nSo what have you learned about software design?\n\n*Design\
    \ is ad hoc, heuristic, and messy*. Designing software is a trial-and-error heuristic\
    \ process, which is both necessary and sufficient for good designs.\n\n*Design\
    \ depends on understanding of prior design problems and solutions*. While designers\
    \ need some knowledge of the problem domain (which can be supplied by a client),\
    \ more crucially, they need knowledge of design and patterns of good designs.\
    \ They need to have a knapsack of these design patterns that they can use to approach\
    \ new problems. The solutions are tried and true. The problems are new but they\
    \ contain elements of problems that have already been solved. The patterns are\
    \ *malleable templates* that can be applied to those elements of the new problem\
    \ that match the pattern’s requirements.\n\n*Design is iterative*. Requirements\
    \ change and so must your design. Even if you have a stable set of requirements,\
    \ your *understanding* of the requirements changes as you progress through the\
    \ design activity and so you’ll go back and change the design to reflect this\
    \ deeper, better understanding. The iterative process clarifies and simplifies\
    \ your design at each step.\n\n*Design is a cognitive activity*. You’re not writing\
    \ code at this point, so you don’t need a machine. Your head and a drawing tool\
    \ are all you need to do design. As Dijkstra says, “We must not forget that it\
    \ is not our business to make programs; it is our business to design classes of\
    \ computations that will display a desired behavior.”^([^(162)](#fn162))\n\n*Design\
    \ is opportunistic*. Glass sums up his discussion of design with “The unperturbed\
    \ design process is opportunistic—that is, rather than proceed in an orderly process,\
    \ good designers follow an erratic pattern dictated by their minds, pursuing opportunities\
    \ rather than an orderly progression.”^([^(163)](#fn163))\n\nAll the characteristics\
    \ above argue against a rigid, plan-driven design process and for a creative,\
    \ flexible way of doing design. This brings us back to the first topic in this\
    \ chapter: *design is just wicked*.\n\nAnd finally\n\n> *A designer can mull over\
    \ complicated designs for months. Then suddenly the simple, elegant, beautiful\
    \ solution occurs to him. When it happens to you, it feels as if God is talking!\
    \ And maybe He is.*\n> \n> —Leo Frankowski (in *The Cross-Time Engineer*)\n\n\
    # 9. Structured Design\n\n> *Invest in the abstraction, not the implementation.\
    \ Abstractions can survive the barrage of changes from different implementations\
    \ and new technologies.*\n> \n> —Andy Hunt and Dave Thomas^([^(164)](#fn164))\n\
    \n## Structured Programming\n\nStructured design has its genesis in Edsger Dijkstra’s\
    \ famous 1968 letter to the *Communications of the ACM*, “Go To Statement Considered\
    \ Harmful.” Dijkstra’s paper concludes with\n\n> *The* ***go to*** *statement\
    \ as it stands is just too primitive; it is too much an invitation to make a mess\
    \ of one’s program. One can regard and appreciate the clauses considered (ed.\
    \ if-then-else, switch, while-do, and do-while) as bridling its use. I do not\
    \ claim that the clauses mentioned are exhaustive in the sense that they will\
    \ satisfy all needs, but whatever clauses are suggested (e.g. abortion clauses)\
    \ they should satisfy the requirement that a programmer independent coordinate\
    \ system can be maintained to describe the process in a helpful and manageable\
    \ way.*^([^(165)](#fn165))\n\nProgramming languages created from this point onward,\
    \ while not eliminating the `goto` statement (except for Java, which has none),\
    \ certainly downplayed its use, and courses that taught programming encouraged\
    \ students to avoid it. Instead, problem solving was taught in a top-down structured\
    \ manner, where one begins with the problem statement and attempts to break the\
    \ problem down into a set of solvable subproblems. The process continues until\
    \ each subproblem is small enough to be either trivial or very easy to solve.\
    \ This technique is called *structured programming*. Before the advent and acceptance\
    \ of object-oriented programming in the mid-1980s, this was the standard approach\
    \ to problem solving and programming. It is still one of the best ways to approach\
    \ a large class of problems."
