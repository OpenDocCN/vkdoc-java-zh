  trans: '

    ## 架构模式：面向对象的模型-视图-控制器（MVC）


    面向对象的分析、设计与编程在 20 世纪 80 年代初兴起（实际上，其起源可追溯至 60 年代，但当时无人关注），随之带来了许多架构与设计模式。此处我们将重点介绍一种面向对象的架构模式，其余内容留待设计模式章节讨论。


    *模型-视图-控制器*（MVC）架构模式是一种将应用程序（甚至仅应用程序界面的某一部分）拆分为三个部分的方法：模型、视图和控制器。MVC 最初是为了将许多程序传统的输入、处理和输出角色映射到图形用户界面领域而开发的：


    输入 ➤ 处理 ➤ 输出


    控制器 ➤ 模型 ➤ 视图


    用户输入、外部世界的建模以及向用户提供的视觉反馈被分离，并由模型、视图和控制器*对象*分别处理，如图 7-3 所示。


    ![](img/270563_3_En_7_Fig3_HTML.jpg)


    一个框图展示了标记为视图、模型和控制器三个模块之间的交互。控制器与模型之间存在单向交互。


    图 7-3

    模型-视图-控制器架构


    *   **控制器**解释来自用户的鼠标和键盘输入，并将这些用户操作映射为发送给模型和/或视图的命令，以实现相应的更改。控制器负责处理输入。


    *   **模型**管理一个或多个数据元素，响应关于其状态的查询，并响应改变状态的指令。模型知道应用程序应该做什么，是架构的主要计算结构；它*建模*了你试图解决的问题。模型掌握规则。


    *   **视图**或**视口**管理显示区域的一个矩形区域，负责通过图形和文本的组合向用户呈现数据。视图对程序实际在做什么一无所知；它所做的只是接收来自控制器的指令和来自模型的数据并进行显示。它会向模型和控制器反馈状态信息。视图负责处理输出。


    MVC 程序的典型流程如下：


    *   **用户**与用户界面交互（例如，用户按下按钮），控制器处理来自用户界面的输入事件，通常通过注册的处理程序或回调函数进行。用户界面由视图显示，但由控制器控制。奇怪的是，控制器并不直接知道视图是一个对象；它只是在需要更新屏幕上的某些内容时发送消息。


    *   **控制器**访问模型，可能以适合用户操作的方式更新模型（例如，控制器使模型更新用户的购物车）。这通常会导致模型的状态及其数据发生变化。


    *   **视图**利用模型生成适当的用户界面（例如，视图生成一个列出购物车内容的屏幕）。视图从模型获取自身的数据。模型不直接知道视图的存在。它只是响应任何人对数据的请求以及控制器对数据转换的请求。


    *   **控制器**作为用户界面管理器，等待进一步的用户交互，从而开始新一轮循环。


    这里的主要思想是关注点分离——以及代码分离。目标是分离程序的工作方式、程序显示的内容以及程序获取输入数据的方式。这是经典的面向对象编程：你创建对象，这些对象隐藏其数据以及操作数据的方式，然后仅向外界提供一个简单的接口来与其他对象交互。你将在第
    11 章再次看到这一点。


    ### 面向对象架构：


    ### 一个 MVC 示例——我们来狩猎吧！


    一个使用 MVC 架构模式的经典程序示例是 David Matuszek 博士在 2004 年 ACM SIGCSE 技术研讨会上提出的“绝妙作业”。^(¹⁴⁵)


    #### 问题


    该程序是一个基本的模拟程序，模拟狐狸在网格环境中试图找到兔子，而兔子则试图逃脱。环境中存在兔子可以躲藏的灌木丛，并且移动有一些限制。


    图 7-4 是该游戏运行时的典型画面。


    ![](img/270563_3_En_7_Fig4_HTML.jpg)


    一张截图展示了狐狸与兔子狩猎实例的界面。它显示了一组随机分布的图案和一个靠右的圆形图形。底部提供了速度、单步、运行、重置和重播按钮。顶部文字显示步数 43。


    图 7-4

    一个典型的狐狸与兔子狩猎实例


    狐狸是大的红点，兔子是小的棕点，灌木丛是粗的绿色十字。


    该编程作业的目标是让兔子变得更聪明，以便能够逃脱狐狸的追捕。然而，我们的重点完全在于程序是如何组织的。图 7-5 使用来自 BlueJ IDE 的对象图展示了程序的组织结构。程序的关键部分是三个对象类（Bush、Fox、Rabbit），以及模型、视图和控制器组件。


    ![](img/270563_3_En_7_Fig5_HTML.jpg)


    一个框图展示了标记为 RabbitHunt、Grader、Controller、View、Model、Rabbit、Fox、Animal 和 Bush 的模块之间的交互。


    图 7-5

    狐狸与兔子狩猎的类结构


    #### MVC 模型


    模型代表了游戏的规则。它负责所有计算，所有决定轮到谁、每回合发生什么以及是否有人获胜的工作。模型严格来说是内部的，并且与程序的其他部分几乎无关。


    该程序的模型部分实际上由五个类组成：`Model`（“主”模型类）、`Animal`、`Rabbit`、`Fox`和`Bush`。（`Rabbit`和`Fox`是`Animal`的子类，如图
    7-5 图中的实线箭头所示）。这是程序中你需要真正理解的部分。


    `RabbitHunt`类仅创建模型、视图和控制器对象，并将控制权交给控制器对象。控制器对象启动模型对象，然后等待用户按下按钮。当按钮被按下时，一条消息被发送给模型对象，由模型对象决定做什么。


    模型对象：


    *   将狐狸、兔子和灌木丛放置在场地中；

    *   给兔子和狐狸各一次移动机会（一个移动，然后另一个移动；它们不会同时移动）；

    *   告诉视图显示这两次移动的结果；以及

    *   确定哪只动物获胜。


    #### MVC 视图


    视图显示正在发生的事情。它在屏幕上呈现图像，以便用户看到正在发生什么。视图是完全被动的；它不会以任何方式影响狩猎过程，它只是一个新闻记者，向你提供模型内部正在发生的事情的（部分）画面。

    '
- fmt: '#### The MVC Controller


    The controller is the part of the program that displays the controls (the five
    buttons and the speed controls at the bottom of the window). It tells the model
    when to go and when to stop, without knowing anything about how the model works
    on the inside.


    There are many advantages of splitting the program up into these separate parts.
    We can safely rewrite the GUI in the controller object or the display in the view
    object without changing the model. We can make the fox and/or the rabbit smarter
    (or dumber!) without changing the GUI or the display. We can reuse the GUI for
    a different application with very little effort. The list just goes on.


    In short, MVC is your friend; use it wisely and often.


    ## Architectural Pattern: The Client-Server


    Moving back to a more traditional architecture, we once again go back in time.
    Back in the day, all programs ran on big iron and your entire program ran on a
    single machine. If you were lucky enough to be using a time-shared operating system,
    several people could be using the same program—albeit usually different copies—simultaneously.
    Then came personal computers and networks and someone had the bright idea of dividing
    up the work between that big iron and your tiny desktop machine. Thus was born
    the *client-server architecture*.


    In a client-server architecture, your program is split up into two different pieces
    that typically run on two separate computers. A *server* does most of the heavy
    lifting and computation; it provides services to its *clients* across a high-bandwidth
    network. Clients, on the other hand, mostly just handle user input, display output,
    and provide communication to the server. In short, the client program sends requests
    for services to the server program. The server program then evaluates the request,
    does whatever computation is necessary (including accessing a database, if needed),
    and responds to the client’s request with an answer.


    The most common example of a client-server architecture today is the World Wide
    Web. In the web model, your browser is the client. It presents a user interface
    to you, communicates with a web server, and renders the resulting web pages to
    your screen. The web server does a number of things. It serves web pages in HTML,
    but it also can serve as a database server, a file server, and a computational
    server (consider everything Amazon.com does when you access it to make a purchase).


    Clients and servers don’t have to be on different computers, though. Two examples
    of programs written using a client-server architecture where both sides can reside
    on the same computer are *print spoolers* and the *X Windows graphical system*.


    In a print spooler application, the program you are running (e.g., a word processor,
    a spreadsheet program, or your web browser) runs as a client that makes request
    to a printing service that is implemented as a part of the computer’s operating
    system. This service is typically known as a print spooler because it keeps a
    spool of print jobs and controls which jobs get printed as well as the printing
    order. So, from your word processor, you select *Print* from a menu, set certain
    attributes, pick a printer, and then click *OK* on some dialog box. This sends
    a print request to the print spooler on your system. The print spooler adds your
    file to a queue of print jobs that it manages, then contacts the printer driver,
    and makes requests for printing to occur. The difference here is that once you’ve
    clicked the OK button, your client program (the word processor) typically does
    not have any more contact with the print spooler, and the print *service* runs
    unattended.


    The X Window System (see [`www.x.org/wiki/`](http://www.x.org/wiki/)) is a graphical
    windowing system available on all Unix- and Linux-based systems and also for Apple
    Macintosh and Microsoft Windows systems as an add-on windowing system. The X system
    uses a client-server architecture where the client programs and the server typically
    both reside on the same computer. The X system server receives requests from client
    programs, processes them for the hardware that is attached to the current system,
    and provides an output service that displays the resulting data in bitmapped displays.
    Client program examples include `xterm` (a windowed terminal program that provides
    a command line interface to Unix), `xclock` (you guessed it – a clock), and `xdm`
    (the X Window display manager). The X system allows hierarchical and overlapping
    windows, and provides the ability to configure menus, scroll bars, open and close
    buttons, background and foreground colors, and graphics. X can also manage a mouse
    and keyboards. These days, the main use of the X system is as a springboard to
    build more sophisticated window managers, graphical environments, graphical widgets,
    and desktop management windowing systems like GNOME and KDE.'
