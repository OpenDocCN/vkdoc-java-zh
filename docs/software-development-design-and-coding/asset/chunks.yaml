    \ acceptable to use a walkthrough for a larger piece of code, although for a complete\
    \ task or for each user story that is implemented you should do a code review\
    \ or an inspection, which we will talk about next."
  trans: "\n# 19. 代码评审与审查\n\n> *我们进行审查的目标是，通过更早、更低成本地发现并移除缺陷，来降低质量成本。虽然某些测试始终是必要的，但我们可以通过减少传播到测试阶段的缺陷数量来降低测试成本。*\n\
    > \n> ——罗恩·拉迪斯（2002 年）\n\n> *当你尽早捕获错误时，复合错误也会更少。复合错误是两个独立的错误相互作用的结果：就像你下楼时绊了一下，伸手去抓扶手，结果扶手却脱落了。*\n\
    > \n> ——保罗·格雷厄姆（2001 年）\n\n这里有个令人震惊的事实：你在软件开发中的主要质量目标，是向用户交付一个满足所有需求且没有缺陷的可运行程序。没错：你的代码应该是完美的，交付时没有任何错误，并满足用户的所有需求。不可能？做不到？好吧，*软件质量保证*\
    \ 的全部意义就在于，在时间和预算的限制内，尽可能接近完美。\n\n软件质量通常从两个不同的角度来讨论：用户的角度和开发者的角度。从*用户的角度*来看，质量需要具备一系列特征才能被接受，包括以下方面：^(²⁹⁸)\n\
    \n*   *正确性*：软件必须能工作，就这么简单。\n\n*   *可用性*：它必须易于学习和使用。\n\n*   *可靠性*：它必须保持稳定运行，并在你需要时可用。\n\
    \n*   *安全性*：软件必须保护你的数据，并防止未经授权的访问。\n\n*   *适应性*：应该易于添加新功能。\n\n从*开发者的角度*来看，软件质量则取决于另一组不同的特征：\n\
    \n*   *可维护性*：必须易于对软件进行修改。\n\n*   *可移植性*：必须易于将软件迁移到不同的平台。\n\n*   *可读性*：你和任何后续接手的人都需要能够读懂代码。这通常意味着代码必须具有一致的风格和流程。\n\
    \n*   *可理解性*：代码设计应该能被原作者以外的开发者理解。\n\n*   *可测试性*：应该能够直接地对代码进行完整测试。以模块化方式创建、由只做一件事的短函数构成的代码，比所有代码都塞在一个巨大的\
    \ main() 函数中的代码更容易理解和测试。\n\n*软件质量保证（SQA）* 是一系列确保软件被正确实现的活动。SQA 包含三个主要组成部分：\n\n\
    *   *测试（或* *动态分析* *）*：发现执行过程中暴露的错误。\n\n*   *调试*：从代码中清除所有（通过测试发现的）明显错误。\n\n*  \
    \ *评审（或* *静态分析* *）*：发现代码中固有的错误。\n\n许多开发者——以及管理者——认为可以通过测试来达到质量目标。但这是行不通的。正如你在上一章所见，测试是有限的。你通常无法探索每一条代码路径，无法测试每一种可能的数据组合，而且测试本身也常常存在缺陷。测试只能帮你走到这一步。正如艾兹格·迪杰斯特拉的名言：“……程序测试可以非常有效地证明错误的存在，但对于证明错误不存在，则完全无能为力。”^(²⁹⁹)\
    \ 仅靠测试并不是发现代码错误特别有效的方法。在许多情况下，单元测试、集成测试和系统测试的组合只能发现程序中大约 50% 左右的错误。^(³⁰⁰) 但是，如果你在测试方案中加入某种类型的代码评审（通过阅读代码来发现错误），就可以将这一比例提高到代码中所有错误的\
    \ 93% 到 99%。这正是一个值得追求的目标，因此在本章中，我们将重点讨论如何评审你的代码。\n\n## 走查、评审与审查\n\n*评审你的代码*——阅读代码并在纸面上寻找错误——提供了另一种机制，以确保你正确实现了用户的需求和由此产生的设计。事实上，大多数采用计划驱动方法的开发组织不仅会评审代码，还会评审软件开发组织产生的所有*工作产品*：需求文档、架构、设计规格说明、测试计划、测试用例本身以及用户文档。采用敏捷开发方法的组织不一定拥有上述所有文档，但他们确实有需求、用户故事、用户文档，尤其是需要评审的代码。\n\
    \n评审代码主要有三种方法：走查、代码评审和审查。这三种方法从非常非正式的技术逐步过渡到非常正式的方法。代码通常在编译通过之后、单元测试之前，或者单元测试完成之后立即进行评审。最好在单元测试之后立即进行评审，因为那时你已经完成了修改，编译通过，并且完成了第一轮测试。这是让其他人检查你代码的好时机。\n\
    \n## 走查\n\n*走查*（也称为*桌面检查*或*代码阅读*）是最不正式的评审类型，通常用于确认对代码所做的小改动，比如刚刚修复一个错误而修改的一两行代码。如果你刚刚向一个类添加了一个新方法，或者修改了超过\
    \ 25 到 30 行代码，就不要进行走查了；而应该进行代码评审。\n\n走查涉及两个人，最多三个人：代码的作者和评审者。在走查中，作者的工作是向评审者解释这个改动应该做什么，并指出改动在哪里。评审者的工作是理解这个改动，阅读代码，并做出两种判断之一：要么同意改动是正确的，要么不同意。如果不同意，作者必须回去，再次修复代码，然后进行另一次走查。如果评审者认为改动是正确的，那么作者就可以将修改后的代码合并回代码库，继续进行集成测试。\n\
    \n如果你在进行结对编程，那么代码走查会在你实现一个任务的同时进行。驾驶员在编写代码，导航员则在旁边看着，检查错误并提前思考；这可以被视为与编码并行进行的持续走查。在这种情况下，对于较大块的代码使用走查也是可以接受的，不过对于一个完整的任务或每个已实现的用户故事，你应该进行代码评审或审查，我们接下来将讨论这些。\n"
- fmt: '## Code Reviews


    *Code reviews* are somewhat more formal than walkthroughs and are what most software
    developers do. You should always do a code review if you’ve changed a substantial
    amount of code, if you’ve written brand new code, or if you’ve added more than
    just a few lines of new code to an existing program. Agile programmers may do
    code reviews when they finish a user story.


    Code reviews are real meetings with three to five attendees, each bringing a different
    perspective:


    - The *moderator* of the code review is usually the *author*. It’s the moderator’s
    job to call the meeting, send out the work to be reviewed well before the meeting
    time, and to run the code review meeting. The moderator may also take notes at
    the meeting.

    - There should be one or more *developers* at the meeting who are working on the
    same project as the author, contributing the perspective of detailed knowledge
    of the project.

    - There should be a *tester* at the code review, bringing the testing perspective
    of not only reading the code being reviewed but also thinking about ways the code
    should be tested.

    - Finally, there should be an experienced developer present who is not on the
    same project as the author. This person is the *disinterested third-party* who
    represents the quality perspective, providing a more strategic vision about the
    code and how it fits into the project. Their job at the code review is to understand
    the code and get the author to explain the changes clearly.

    - *No managers are allowed at code reviews*. The presence of a manager changes
    the dynamics of the meeting and makes the code review less effective. People who
    might be willing to honestly critique a piece of code among peers will clam up
    in the presence of a manager; this doesn’t help find errors. No managers, please.


    The objective of a code review is to find errors in the code, not to fix them.
    Code reviews are informal enough that some discussion of fixes may occur, but
    that should be kept to a minimum. Before the code review meeting, all participants
    should go over the materials sent out by the moderator and prepare a list of errors
    they find. This step is critical to making the review meeting efficient and successful.
    Do your homework!


    This list should be given to the moderator at the beginning of the meeting. The
    author (who may also be the moderator) goes through the code changes, explaining
    them and how they either fix the error they were intended to fix or add the new
    feature that was required. If an error or a discussion leads the review meeting
    into code that was not in the scope of the original review, stop! Be very careful
    about moving off into territory that hasn’t been preread. You should treat any
    code not in the scope of the review as a black box. Schedule another meeting instead.
    Remember, the focus of the code review is on a single piece of code and finding
    errors in that piece of code. Don’t get distracted.


    A computer and view-sharing (projected or screen-shared) are essential at the
    code review so that everyone can see what’s going on all the time. A second computer
    should be used so that someone (usually the author) can take notes about errors
    found in the code. A code review should not last more than about two hours, nor
    review more than about 200–500 lines of code, because everyone’s focus and productivity
    will begin to faulter after that amount of time or reading. If you run out of
    time, schedule another review.


    After the code review, the notes are distributed to all the participants and the
    author is charged with fixing all the errors that were found during the review.
    While metrics aren’t required for code reviews, the moderator should at least
    keep track of how many errors were found, how many lines of code were reviewed,
    and if appropriate, the severity of each of the errors. These metrics are very
    useful to gauge productivity and should be used in planning the next project.


    ## Code Inspections


    Code inspections are the most formal type of review meeting, with the sole purpose
    of finding defects in any work product the development team produces.^([^(301)](#fn301))
    Inspections can be used to review planning documents, requirements, designs, and
    code. Code inspections have specific rules regarding how many lines of code to
    review at once, how long the review meeting must be, and how much preparation
    each member of the review team should do, among other things. Inspections are
    typically used by larger organizations because they take more training, time,
    and effort than walkthroughs or code reviews. They are also used for mission and
    safety-critical software, where defects can cause harm to users. In 1979, Michael
    Fagan invented the most widely known and influential inspection methodology, which
    became the first formal software inspection process. ^([^(302)](#fn302)) Most
    organizations that use inspections use a variation of the original Fagan software
    code inspection process.^([^(303)](#fn303))


    Code inspections have several very important criteria, including the following:


    - The focus of the inspection meeting is solely on finding errors; no solutions
    are permitted.

    - Inspections use checklists of common error types to focus the inspectors.

    - Reviewers are required to prepare beforehand; the inspection meeting will be
    canceled if everyone isn’t ready.

    - Each participant in the inspection has a distinct role.

    - All participants have had inspection training.

    - The moderator is not the author and has had special training in addition to
    the regular inspection training.

    - The author is always required to follow up on errors reported in the meeting
    with the moderator.

    - Metrics data is always collected at an inspection meeting.'
