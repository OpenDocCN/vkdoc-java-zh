  trans: "\n#### 非技术性难题\n\n从开发者的角度来看，需求中的非技术性难题是你将遇到的最糟糕的情况。理想情况下，管理者应该保护开发者，使其永远不必处理非技术性难题。非技术性难题往往带有一定的政治色彩。例如，组织内的一群客户与另一群客户对程序需求持有不同看法。或者更糟的是，一位经理与另一位经理意见相左。正在开发的程序将通过自动化某个部门曾经是唯一专业来源的功能，来削弱该部门的影响力。该程序会将数据处理分散到多个部门，而此前这些处理集中在一个部门。这样的例子不胜枚举。对于挖掘需求时遇到的非技术性难题，最好的建议是——赶紧跑。让你的副总裁去处理；他们拿高薪就是为了这个。\n\
    \n## 分析需求\n\n一旦你写下了一组需求，就需要确保这些需求对程序来说是合适的；你需要对它们进行*分析*。分析包含三个基本部分。\n\n首先，你要对需求进行*分类*，并将它们组织到相关的领域中。这将对设计人员有很大帮助。\n\
    \n其次，由你，或者更好是由客户来对需求进行*优先级排序*。这一点至关重要，因为你无法在第一个产品版本中实现所有需求（请相信我们，你做不到），因此这个优先级列表将是你为每个中间版本设定目标的依据。\n\
    \n最后，你需要将每个需求与其他所有需求进行*对照检查*，以确保它们能构成一个连贯的整体。问自己一系列问题：\n\n1.  每个需求是否与项目的总体目标*一致*？如果你的程序旨在向用户销售书籍，那它就不必同时提供书籍装订服务。\n\
    \n2.  这个需求是否*真的必要*？你是否添加了某些即使移除也不会损害程序基本功能的内容？如果你的第一个版本旨在让用户购买书籍，那么你可能不需要同时支持购买割草机。\n\
    \n3.  这个需求是否*可测试*？这可能是进行需求分析时的一个关键问题。如果你无法弄清楚如何测试一个需求，那么你就无法知道你是否正确实现了它，或者是否已经完成。所有需求*必须*是可测试的，否则它们就不是需求。在大多数敏捷方法中，规则是先编写测试，再编写代码（即测试驱动开发）。\n\
    \n4.  这个需求在你必须使用的技术环境中是否*可行*？这个问题通常适用于前面提到的非功能性需求。考虑到你在这个项目中必须使用的特定目标平台或一组硬件约束，你的需求是否可行？例如，如果你的目标平台是运行\
    \ OS X 的 Macintosh，那么要求使用 DirectX 图形库的需求就不可行，因为 DirectX 是仅适用于 Windows 的库。\n\n\
    5.  这个需求是否*无歧义*？你的需求需要尽可能精确（请参考前面关于可测试性的问题），因为就像你现在坐在这里阅读这段文字一样肯定，总会有人误解一个有歧义的需求，而你会在产品发布后的第二天才发现这个错误。你的需求中永远不应包含“或”或“可能”这样的词。\n\
    \n## 结论\n\n一旦你完成了功能规格说明或一组用户故事，并完成了对需求的分析，需求阶段就结束了，对吗？嗯，当然不是。正如我们之前所说，需求会变化，所以放轻松；不要过分纠结于需求；尽你所能获得一份清晰、可测试的初始需求列表；然后进入设计阶段。你以后总是会再回到这里的。\n\
    \n# 第二部分 设计实践\n\n# 7. 软件架构\n\n> *我们所说的软件架构是什么意思？对我来说，架构这个词传达的是系统的核心元素的概念，即那些难以改变的部分。它是其余部分必须赖以建立的基础。*\n\
    > \n> ——马丁·福勒^(¹⁴¹)\n\n一旦你对你将要构建*什么*有了想法，就可以开始思考你将要*如何*构建它了。当然，你可能从第一个需求开始就一直在思考这个问题，但现在你终于可以真正有意义地深入设计阶段了。\n\
    \n软件设计实际上有两个层次。我们在编写程序时通常操作的层次称为*详细设计*。我们需要哪些操作？需要哪些数据结构？我们使用什么算法？数据库将如何组织？用户界面看起来如何？调用序列是什么？这些都是非常详细的问题，需要在真正开始编码的详细工作之前得到解答（嗯，差不多是这样——我们稍后会谈到这一点）。\n\
    \n第二个层次是*架构设计*。你的软件需要哪些主要组件？这些组件将如何交互？系统将如何与其环境交互？在这里，你是在设计整个系统的结构，暂时将每个组件的内部细节视为黑盒。正如福勒在本章开篇引言中所描述的，你需要先打好基础，才能构建结构的其余部分。*软件架构*是一套理念，它告诉你哪种基础适合你的程序。\n\
    \n软件架构的概念是为了应对程序规模和复杂性的日益增长而出现的。正如加兰和肖在他们关于软件架构的开创性文档中所说：“随着软件系统规模和复杂性的增加，设计问题超越了计算中的算法和数据结构：设计和规定整个系统结构成为了一种新的问题……这就是软件架构层面的设计。”^(¹⁴²)\
    \ 然而，是否所有具有一定规模和复杂性的程序都确实拥有一个架构呢？是的，尽管对于较大的程序，你需要更有意识地去思考架构。你必须确保在你的设计中融入了正确的架构模式集，以便为你的系统打下坚实的基础。这里的错误代价高昂，因为架构特性对程序结构如此基础，以至于一旦程序编写完成，在架构层面进行更改就会变得困难得多。\n\
    \n每当软件架构师开始思考一个程序的架构时，他们通常从画图开始。架构图能让人们比通过文本更明确地看到程序的结构和框架。软件架构通常被表示为黑盒*图*，其中图节点是*计算结构*，图边是结构之间的*通信管道*。管道可以表示数据流、对象消息传递或过程调用。这类表示法多种多样，并且有几种标准表示法，其中最流行的是统一建模语言（UML）。\n\
    \n特定的架构风格是一种可以表示一组相似结构的模式。软件架构有许多不同的风格，在任何给定的项目中，你可能会使用不止一种风格。正如你将看到的，不同领域的不同类型的程序将引导我们采用不同的架构风格或*架构模式*。让我们看看几种常见的架构模式（它们与你在下一章中会看到的*设计模式*有许多共同特征）。\n"
- fmt: '# Architectural Pattern: The Main Program - Subroutine


    The most traditional and oldest architectural pattern is the *main program – subroutine
    pattern*. While it descends from Niklaus Wirth’s 1971 paper “Program Development
    by Stepwise Refinement,”^([^(143)](#fn143)) Wirth was just the first to formally
    define the top-down problem decomposition methodology that naturally leads to
    the *main program – subroutine pattern*.


    The idea is to start with some big problem and then try to decompose this problem
    into several smaller semi-independent problems or pieces of the original problem.
    For example, nearly every problem that is amenable to a solution by top-down decomposition
    can be divided into three parts immediately: input processing, computation of
    the solution, and output processing. Once you have a problem divided into several
    pieces, you pick a single piece and continue dividing, setting aside all the other
    pieces as you go, akin to a depth-first search. Eventually, you’ll have a very
    small problem where the solution is obvious; that is the time to write code. Thus,
    we are breaking down the problem from the top down, and writing solution code
    from the bottom up, although many variations exist.


    Figure [7-1](#270563_3_En_7_Chapter.xhtml#Fig1) gives an example of how the *main
    program - subroutine pattern* works. We’ll discuss top-down decomposition of problems
    much more in Chapter [9](#270563_3_En_9_Chapter.xhtml).


    ![](images/270563_3_En_7_Chapter/270563_3_En_7_Fig1_HTML.jpg)


    A tree diagram depicts the main program branching into subroutine 1, subroutine
    2, and subroutine 3. Subroutine 1 branches to subroutine 1.1 and subroutine 1.2.
    Subroutine 3 branches to subroutine 1.2 and subroutine 3.1.


    **Figure 7-1** An example of the main program – subroutine pattern


    Wirth’s paper makes the following four conclusions about programming by stepwise
    refinement:


    1. *Program construction consists of a sequence of refinement steps. In each step
    a given task is broken up into a number of subtasks. Each refinement in the description
    of a task may be accompanied by a refinement of the description of the data, which
    constitute the means of communication between the subtasks...*


    2. *The degree of modularity obtained in this way will determine the ease or difficulty
    with which a program can be adapted to changes or extensions of the purpose...*


    3. *During the process of stepwise refinement, a notation which is natural to
    the problem in hand should be used as long as possible... Each refinement implies
    a number of design decisions based upon a set of design criteria...*


    4. *The detailed elaborations on the development of even a short program form
    a long story, indicating that careful programming is not a trivial subject.*


    # Architectural Pattern: Pipe-and-Filter


    In a pipe-and-filter style architecture, the computational components are called
    *filters* and they act as transducers that take input, transform it according
    to one or more algorithms, and then output the result to a communications conduit.
    The input and output conduits are called *pipes*.


    A typical pipe-and-filter architecture is linear, as the example in Figure [7-2](#270563_3_En_7_Chapter.xhtml#Fig2).


    ![](images/270563_3_En_7_Chapter/270563_3_En_7_Fig2_HTML.jpg)


    A flow diagram depicts the pipe-and-filter architecture pattern. It exhibits a
    set of rightward arrows labeled pipe proceeding through 3 adjacent blocks marked
    as the filter.


    **Figure 7-2** An example of the pipe-and-filter architecture pattern


    The filters must be independent components. That is one of the beauties of a pipe-and-filter
    architecture: joining independent filters in different orders leads to different
    results. The classic example of a pipe-and-filter architectural style is the Unix
    shell, where there are a large number of small programs, which typically do a
    single thing and can be chained together using the Unix pipe mechanism. An example
    from Jon Bentley’s book *Programming Pearls*^([^(144)](#fn144)) showcases how
    a pipe-and-filter works:


    *The Problem*: Given a dictionary of words in English, find all the anagrams in
    the dictionary. That is, find all the words that are permutations of each other.
    For example, “pots,” “stop,” and “spot” are anagrams of each other.


    So, what do we know? All the anagrams have the same letters and the same number
    of letters in each word. That gives us a clue to the method we’ll use to find
    the anagrams: if we sort the letters of each word, we’ll end up with a string
    of characters that has all the word’s letters in alphabetical order. We call this
    creating a *sign* for the word. Let’s break down the solution:


    1. Create a sign for each word in the list by sorting the letters in each word;
    keep the sign and the word together as a pair.


    2. Sort the resulting list of sign-word pairs by their signs; all the anagrams
    should now be together as their signs are identical.


    3. Output all anagram groups of words (removing the signs) on separate lines,
    by starting a new group each time the sign changes.


    This example has all the features of a standard pipe-and-filter architecture:
    independent computational components that perform a transformation on their input
    data and communication conduits that transmit the data from the output of one
    component to the input of the next. The pipe-and-filter pattern of this solution
    may be more clearly shown in Unix-speak:


    `sign <dictionary.txt | sort | squash >anagrams.txt`


    where `sign` is the filter we use to do step 1, with input file `dictionary.txt`.
    Then `sign` outputs a list of signs and their associated words which is piped
    to the Unix `sort` utility (we didn’t need to write that one), which sorts the
    list by the first field on each line (its default behavior), which happens to
    be the sign of each word. It then outputs the sorted list to the next pipe. Then
    `squash` takes the sorted list from the incoming pipe and compresses it by putting
    all the words with the same sign on the same line, eliminating the signs as it
    does so. This final list is sent via one last pipe (this time a Unix I/O redirection)
    to the output file called `anagrams.txt`.


    Note that not all applications should use the pipe-and-filter architecture. For
    example, it won’t work so well for interactive applications or applications that
    respond to events or interrupts. So let’s look at more architectural styles.'
