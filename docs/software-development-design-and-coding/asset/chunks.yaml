- fmt: '# Design Heuristics


    Speaking of heuristics, here’s a short list of good, time-tested heuristics. The
    list is clearly not exhaustive and it’s somewhat idiosyncratic, but it’s a reliable
    starting point for all your software designs. Think about these heuristics and
    try some of them during your next design exercise. We will come back to all of
    these heuristics in much more detail in later chapters.


    **Find real world objects to model**. Alan Davis^([(154)](#fn154)) and Richard
    Fairley^([(155)](#fn155)) call this “intellectual distance.” It’s how far your
    design is from a real-world object. The heuristic here is to try to find real
    world objects that are close to things you want to model in your program. Keeping
    the real-world object in mind as you are designing your program helps keep your
    design closer to the problem. Fairley’s advice is to minimize the intellectual
    distance between the real-world object and your model of it.


    **Abstraction is key**. Whether you’re doing object-oriented design (creating
    interfaces and abstract classes) or doing a more traditional layered design, you
    want to use abstraction. Abstraction lets us think clearly, by allowing us to
    remain on one level of specificity as we plan out our design. You can remain focused
    by putting off or black-boxing some of the decisions, pushing them higher in the
    design hierarchy (more abstraction) until you are ready to decide on the details.
    Abstraction is key for managing the complexity of a large problem. By abstracting
    away the details you can see the kernel of the real problem.


    **Information hiding is your friend**. Information hiding is the concept that
    you isolate information—both data and behavior—in your program so that you can
    isolate errors and isolate changes; you also only allow access to the information
    via a well-defined interface. You hide the details of a class away and only allow
    communication and modification of data via a public interface. This means that
    your implementation can change, but as long as the interface is consistent and
    constant, nothing else in your program need change. If you’re not doing object-oriented
    design, think about using libraries for hiding behavior and using separate data
    structures (`struct` in C and C++) for hiding state.


    **Keep your design modular**. Breaking your design up into semi-independent pieces
    has many advantages. It keeps the design manageable in your head; you can just
    think about one part at a time and leave the others as black boxes. A fundamental
    part of object-oriented design is encapsulation, which is the practice of grouping
    data and its operations together, facilitating a modular design. It isolates changes,
    helping with extensibility and maintainability. Modularity is always the most
    robust approach.


    **Identify the parts of your design that are likely to change**. If you make the
    assumption that there will be changes in your requirements, then there will likely
    be changes in your design as well. If you identify the areas of your design that
    are likely to change, you can modularize them, thus mitigating the impact of any
    changes you need to make. What things are likely to change? Well, it depends on
    your application and its domain. Business rules can change (think tax rules or
    accounting practices), user interfaces can change, hardware can change, and so
    on. The point here is to anticipate the elements most likely to change and to
    divide up your design so that the necessary changes are contained and simplified.


    **Use loose coupling, interfaces, and abstract classes**. Along with modularity,
    information hiding, and change, using loose coupling will make your design easier
    to understand and to change as time goes along. Loose coupling minimizes dependencies
    of one class (or module) on another, so that a change in one module won’t cause
    changes in other modules. If the implementation of a module is hidden and only
    the interface exposed, you can swap out implementations as long as you keep the
    interface constant. So you implement loose coupling by using well-defined interfaces
    between modules (in object-oriented design, by using abstract classes and interfaces
    to connect these classes).


    **Use your knapsack full of common design patterns**. Robert Glass^([(156)](#fn156))
    describes great software designers as having “...a large set of standard patterns”
    that they carry around with them and apply to their designs. This is what design
    experience is all about: doing design over and over again and learning from the
    experience. In Susan Lammer’s book *Programmers at Work*,^([(157)](#fn157)) Butler
    Lampson says, “Most of the time, a new program is a refinement, extension, generalization,
    or improvement of an existing program. It’s really unusual to do something that’s
    completely new....” That’s what design patterns are: they’re descriptions of things
    you’ve already done that you can apply to a new problem.


    **Adhere to the Principle of One Right Place**. In his book *Programming on Purpose*,
    P.J. Plauger says, “My major concern here is the Principle of One Right Place—there
    should be One Right Place to look for any nontrivial piece of code, and One Right
    Place to make a likely maintenance change.”^([(158)](#fn158)) When your design
    adheres to the Principle of One Right Place, debugging and maintenance are much
    easier.


    **Use diagrams as a design language**. The two of us are visual learners. For
    us, a picture really is worth more than a thousand or so words. As we design and
    code, we are constantly drawing diagrams so we can visualize how our programs
    will flow, which classes or modules will be talking to each other, what data is
    dependent on what function, where do the return values go, what is the sequence
    of events, and so on. This type of visualization can settle the design in your
    head, help the same understanding to be shared with clients and other developers,
    and it can point out errors or possible complications in the design. Whiteboards,
    paper, digital tools...just get drawing! Even as computer scientists (or maybe
    especially so), drawing is the best problem-solving tool we know.'
