  raw: 'These will both work and you’ll get the right answers and preserve the invariants
    of the `Square` object, but if you have to override a bunch of methods you’ve
    inherited, then what’s the point of using inheritance to begin with? That’s what
    the LSP is all about: getting the *behavior* of derived classes right and thus
    getting inheritance right. If you think of the base class as being a contract
    that you adhere to (remember the Open-Closed Principle?), then the LSP is saying
    that you must adhere to the contract even for derived classes. Oh, by the way,
    this works in Java because Java public methods are all *virtual methods* and are
    thus able to be overridden. If you had defined `setWidth()` and `setHeight()`
    in `Rectangle` with a `final` keyword or if they had been `private`, then you
    couldn’t have overridden them. In fact, `private` versions of those methods would
    not have been inherited to begin with.


    In this example, while a square is mathematically a specialized type of rectangle
    and one where the invariants related to rectangles still hold, that mathematical
    definition just doesn’t work in Java. In this case, you don’t want to have `Square`
    be a subclass of `Rectangle`; inheritance doesn’t work for you in this case because
    you think about rectangles having two different kinds of sides (length and width)
    and squares having only one kind of side. So if a `Square` class inherits from
    a `Rectangle` class, the image of what a square is versus what a rectangle is
    gets in the way of the code. Neither of these two classes can meaningfully extend
    each other. (If you wanted to group both `Square` and `Rectangle` under a shared
    parent class umbrella, you could instead add a `Parallelogram` class that encapsulates
    two pairs of parallel and equal length sides.)


    Method overriding in derived classes is the biggest cause of LSP violations.^([^(197)](#fn197))
    Indications that you’re violating LSP include the following:


    *   A subclass doesn’t keep all the external observable behavior of its superclass.


    *   A subclass modifies, rather than extends, the external observable behavior
    of its superclass.


    *   A subclass throws exceptions in an effort to hide certain behavior defined
    in its superclass.


    *   A subclass that overrides a virtual method defined in its superclass using
    an empty implementation in order to hide certain behavior defined in its superclass.


    ## Alternatives to Inheritance: Delegation, Composition, and Aggregation


    Sometimes inheritance isn’t the right way to share the behavior and attributes
    of other classes. Luckily, you’ve got options. The three most common are *delegation*,
    *composition*, and *aggregation*.


    *Delegation*: It’s what every manager should do: give away parts of the work for
    someone else to handle. Delegation says to give responsibility for handling the
    behavior to another class. This creates an association between the classes, meaning
    that the classes are related to each other, usually through an attribute or a
    set of related methods. Delegation has a great side benefit: it shields your objects
    from any implementation changes in other objects in your program; you’re not using
    inheritance, so encapsulation protects you.^([^(198)](#fn198)) Let’s see how delegation
    works with an example.


    When last we left Alice and Bob and their B⁴++, Alice was tired of using the remote
    to open and close the feeding doors to keep away the non-songbirds. So they’d
    requested yet another new feature: an automatic song identifier. With the song
    identifier the B⁴++ itself would recognize songbird songs and open the doors,
    but keep them closed for all other birds. We can think of this in a couple of
    ways.


    The `BirdFeeder` class, because of the Single Responsibility Principle, shouldn’t
    do the identification of bird songs but it should know what songs are allowed.
    You need a new class, `SongIdentifier`, that will do the actual song identification.
    You also need a `Song` object that contains a birdsong. Figure [12-9](#270563_3_En_12_Chapter.xhtml#Fig9)
    shows what you’ve got so far.


    ![](images/270563_3_En_12_Chapter/270563_3_En_12_Fig9_HTML.jpg)


    A U M L class diagram with three classes such as bird feeder, song identifier,
    and song. Each class contains attributes and methods such as get songs, add songs,
    and identify boolean.


    Figure 12-9


    A first cut at the song identifier feature


    The `BirdFeeder` knows about birdsong and keeps a list of the allowed songs for
    the feeder. The `SongIdentifier` has the single job of identifying a given song.
    There are two ways that this can happen. The first is that the `SongIdentifier`
    class can do the work itself in the `identify()` method. That would mean that
    `SongIdentifier` requires an `equals()` method in order to do the comparison between
    two songs (any one allowed song from the list of known allowed songs and the song
    that the new B⁴++ hardware just detected and sent to you). The second way of identifying
    songs is for the `Song` class to do it itself, using its own `equals()` method.
    Which should you choose?


    Well, if you do all the identification in the `SongIdentifier` class, any time
    anything changes in a `Song`, you’ll have to change both the `Song` class *and*
    the `SongIdentifier` class. This doesn’t sound optimal. But if you delegate the
    song comparison work to the `Song` class, then the `SongIdentifier`’s `identify()`
    method could just take a `Song` as an input parameter and call that method, isolating
    any song changes to just the `Song` class. Figure [12-10](#270563_3_En_12_Chapter.xhtml#Fig10)
    shows the revised class diagrams.


    ![](images/270563_3_En_12_Chapter/270563_3_En_12_Fig10_HTML.jpg)


    Two U M L class diagrams labeled song identifier with attributes door feeding
    door and operations identify song boolean and song with attribute song song file
    and operations get song song and equals song boolean.


    Figure 12-10


    Simplifying SongIdentifier and Song


