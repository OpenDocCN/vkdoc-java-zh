- fmt: '# Summary of Review Methodologies


    Table [19-1](#270563_3_En_19_Chapter.xhtml#Tab1) summarizes the characteristics
    of the three review methodologies we’ve examined. Each has its place and you should
    know how each of them works. The important thing to remember is that reviews and
    testing go hand in hand; both should be used to get your high-quality code out
    the door.


    **Table 19-1** Comparison of Review Methodologies


    | Properties | Walkthrough | Code Review | Code Inspection |

    | --- | --- | --- | --- |

    | **Formal moderator training** | No | No | Yes |

    | **Distinct participant roles** | No | Yes | Yes |

    | **Who drives the meeting** | Author | Author/moderator | Moderator |

    | **Common error checklists** | No | Maybe | Yes |

    | **Focused review effort** | No | Yes | Yes |

    | **Formal follow up** | No | Maybe | Yes |

    | **Detailed defect feedback** | Incidental | Yes | Yes |

    | **Metric data collected and used** | No | Maybe | Yes |

    | **Process improvements** | No | No | Yes |


    # Defect Tracking Systems


    Most software development organizations and many open-source development projects
    will use an automated *defect tracking system* to keep track of defects found
    in their software and to record requests for new features in the program. Popular
    free and open source defect tracking systems include Bugzilla (`www.bugzilla.org`),
    YouTrack (`www.jetbrains.com/youtrack/`), Jira (`www.atlassian.com/software/jira`),
    Mantis (`www.mantisbt.org/`), and Trac (`https://trac.edgewall.org/`).


    Defect tracking systems keep track of a large amount of information about each
    defect found and entered. A typical defect tracking system will keep track of
    at least the following:


    - The *number* of the defect (a unique ID for this project assigned by the tracking
    system itself)

    - The current *state* of the defect in the system (Open, Assigned, Resolved, Integrated,
    Closed)

    - The *fix* that was made to correct the error

    - The *files* that were changed to make the fix

    - Which *baseline* the fix was integrated into

    - What *tests* were written and where they are stored (ideally, tests are stored
    with the fix)

    - The *result* of the code review or inspection


    Defect tracking systems assume that at any given time a defect report is in some
    state that reflects where it is in the process of being fixed. Figure [19-1](#270563_3_En_19_Chapter.xhtml#Fig1)
    shows the states of a typical defect tracking system and the flow of a defect
    report through the system. In brief, all defects start out as New. They are then
    assigned to a developer for Analysis. The developer decides whether the reported
    defect is


    ![](images/270563_3_En_19_Chapter/270563_3_En_19_Fig1_HTML.jpg)


    A workflow diagram of the defect-tracking system illustrates a new defect is assigned
    to the developer and proceeds through the stages of analysis, postponing, rejection,
    duplicate, working, resolution, approval, and integration, before the defect is
    closed.


    **Figure 19-1** Defect tracking system workflow


    - A *duplicate* of one already in the system

    - *Not a defect* and so should be rejected

    - A real *defect* that should be worked on by someone

    - A real *defect* whose resolution can be postponed to a later date


    Defects that are worked on are eventually fixed and moved to the *Resolved* state.
    The fix must then be subjected to a code review: if the code review is successful,
    the defect fix is then *Approved*. From Approved, the fix is scheduled for integration
    into the next baseline of the product. If the integration tests of that baseline
    are successful, the defect is *Closed*.


    # Defect Tracking in Agile Projects


    Once again, a lot of what we’ve said about defect tracking is pretty heavyweight
    and so you may ask, how does this apply to agile projects?


    Well, first of all, you can ask yourself when these defects occur and which defects
    you want to track. When defects occur can be divided up into before and after
    an iteration and before and after the product release. Which defects occur can
    be those that affect the customer and that they care about, and those that the
    customer doesn’t care about. Let’s discuss each of these.


    *Defects that are found before the end of an iteration or sprint* are ones you
    can easily fix. These will normally be found either via unit test failures, during
    peer code reviews, or by the customer when they are testing an intermediate product
    build. These defects are typically fixed immediately or, if they uncover some
    other problem (like in the requirements), they can be made into new tasks that
    are added to the product or sprint backlog.


    *Defects that are found after the end of an iteration or sprint*, but before the
    final product release, should probably be made into new tasks that must be added
    to the backlog for the next iteration. These defects can also lead to refactoring
    or new tasks that reflect changing requirements.


    *Defects that are found after product release* are all errors that customers find
    and report. Here, the decision of whether to fix them depends on whether the customer
    cares about the error or not. If the customer does care, then the error should
    be tagged and tracked, added to the product backlog and fixed in a subsequent
    release of the product. If the customer doesn’t care, then just ignore it.


    This leads us to the problem of who fixes defects found in the product code.


    *If the defect is found during development* (during an iteration or a sprint and
    before product release), then the development team in consultation with the customer
    should decide whether the error should be fixed. If yes, then the development
    team should fix it by making it a task and adding it to the backlog for the next
    iteration or sprint. If no, then everyone just moves on.


    *If the defect is found after the product release*, then it is likely that the
    development team has moved on to another project and may even have dispersed into
    several projects. This calls for the creation of a separate support team whose
    job it is to evaluate and fix errors in released code. Ideally, people on this
    support team will rotate in and out from the company’s development teams, so that
    some institutional memory of the project is present on the support team.


    # Conclusion


    A second or third set of eyes on your code is always a good thing. Code that is
    reviewed by others is improved and brings you closer to the Platonic ideal of
    defect-free software. Walkthroughs, code reviews, and formal code inspections
    each have their place in the array of tools used to improve code quality. The
    more of these tools you have in your toolbox, the better programmer you are. The
    combination of reviews, debugging, and unit testing will find the vast majority
    of defects in your code and is the best thing that a developer can do to help
    release defect-free code.'
