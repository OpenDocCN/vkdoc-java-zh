- fmt: "# 最终输出映射\n\n最后，我们得到一个最终的输出映射，其中包含每个唯一单词的条目及其在目录中所有文件中的总频率。因此，我们看到`MapReduce`模式是一组有用的操作，允许并行程序实现对“拆分-计算-合并”问题的解决方案。\n\
    \n`MapReduce`非常常见，并且其解决方案非常流行，以至于已经创建了一个名为`Hadoop`的标准框架，该框架以`MapReduce`作为其基本操作基础。`Hadoop`现在是Apache项目的一部分。“Apache\
    \ Hadoop是一个用于在由商用硬件构建的大型集群上运行应用程序的框架。Hadoop框架透明地为应用程序提供可靠性和数据移动。Hadoop实现了一种名为`MapReduce`的计算范式，其中应用程序被划分为许多小的工作片段，每个片段可以在集群中的任何节点上执行或重新执行。此外，它还提供了一个分布式文件系统，即Hadoop分布式文件系统（`HDFS`），它将数据存储在计算节点上，从而在集群中提供非常高的聚合带宽。`MapReduce`和Hadoop分布式文件系统的设计都使得节点故障能够由框架自动处理。”^([(253)](#fn253))\n\
    \n## 模式5：分而治之\n\n在众多具有递归解决方案的问题中，许多问题都适用于“分而治之”策略。在这种策略中，数据通常规模较大且连续，并且问题具有以下特征：较小版本的问题被独立解决，而较大的解决方案依赖于这些较小的解决方案。问题的这一特性使其易于并行化：原始的大问题可以被分解为较小的子问题（以及数据的离散子集），每个子问题可以依次独立解决，然后部分解被合并回大问题的解决方案。图[15-5](#270563_3_En_15_Chapter.xhtml#Fig5)展示了分而治之的工作原理。\n\
    \n![](images/270563_3_En_15_Chapter/270563_3_En_15_Fig5_HTML.jpg)\n\n一个图表展示了一个问题被拆分为多个子问题，这些子问题经历计算和合并子问题的阶段，最终获得解决方案。\n\
    \n**图15-5**\n\n分而治之策略的示意图\n\n请注意，在图[15-5](#270563_3_En_15_Chapter.xhtml#Fig5)的示例中，在使用“分而治之”策略的程序中，并发量会在程序执行过程中发生变化。在程序的开始和结束时，并发量很小，但随着程序将数据划分到更多层级，并发量会增长，在某个点达到最大值，之后随着合并操作的发生，并发量会减少。此外，在递归的某个层级，得出解决方案所需的工作量会小于并行开销，此时程序应退化为顺序算法或基本情况。还存在数据划分不均匀的可能性（一个很好的例子是快速排序中的枢轴元素未能将当前列表对半划分），这也可能需要更多的工作。\n\
    \n“分而治之”策略适用于一整类递归问题，包括所有`O(n log n)`排序算法、快速傅里叶变换以及线性代数中的问题。这种通用策略通常通过“分支/合并”模式（其中管理线程或实例会生成一定数量的子线程，然后等待它们完成并将部分答案合并为最终答案）或“管理者/工作者”模式来实现。接下来你将研究“分支/合并”并行模式。\n\
    \n## 模式6：分支/合并\n\n在某些问题中，并行线程的数量会随着程序的执行而变化，这使得使用简单的控制结构来调用并行性变得更加困难。解决这个问题的一种方法是在程序执行的不同时间点分支（fork）出不同数量的线程，然后等待它们完成后再继续。通常，单个线程或进程会分支出一定数量的子进程，这些子进程将全部并行执行。发起进程通常会等待所有子进程完成并合并（join），然后才恢复自身的执行。每次原始线程分支出子进程时，子进程的数量可能不同。这种模式还可能存在“嵌套并行执行区域”，这会使程序的性能复杂化。\n\
    \n此策略的伪代码保留了顺序分治算法的递归性质；它看起来类似于以下内容：\n\n```\nResultType solve(Problem problem)\
    \ {\n    if (problem.size is small enough)\n        return solveSequentially(problem);\n\
    \    else {\n        ResultType left, right;\n        Divide problem into K subproblems;\n\
    \        Fork the K subproblems;\n        join; // 等待所有子问题完成\n        return combine(left,\
    \ right);\n    }\n}\n```\n\n这段代码也说明了这种模式的一个问题。`combine()`函数看起来本质上是串行的，并且每次执行`solve()`时都会执行它。这可能会减慢问题的并行实现。为了说明这一点，让我们检查一个归并排序算法的版本；并行版本的伪代码如下所示：\n\
    \n```\nmergesort(list, start, end) {\n    if (start < end) then\n        mid =\
    \ floor(start + (end – start)) / 2)\n        fork mergesort(list, start, mid)\n\
    \        mergesort(list, mid+1, end)\n        join\n        merge(list, start,\
    \ mid, end)\n}\n```\n\n我们用C语言并使用OpenMP并行包来实现这个程序。在C语言中，在`main()`函数中，我们首先告诉OpenMP允许嵌套并行区域，这是由于归并排序中的递归所必需的。然后，在`mergeSort()`函数中，我们在对`mergeSort()`的两个递归调用周围创建一个并行区域。我们告诉OpenMP将此区域中创建的线程数限制为2，以便每个递归调用恰好获得一个线程，从而创建整体上适当数量的执行线程。\n\
    \n```c\n/*\n * parallel version of mergesort in C using openMP\n */\n#include\
    \ <stdio.h>\n#include <stdlib.h>\n#include <omp.h>\n\n/* Here's the merge; it's\
    \ sequential and the normal one you'd write */\nvoid merge(int* array, int start,\
    \ int end) {\n    int middle = (start + end) / 2;\n    int temp_index = 0;\n \
    \   /* create a temporary array */\n    int* temp = malloc(sizeof(int) * (end\
    \ - start + 1));\n    /* merge in sorted data from the 2 halves */\n    int left\
    \ = start;\n    int right = middle + 1;\n    /* while both halves have data */\n\
    \    while((left <= middle) && (right <= end)) {\n        if(array[left] < array[right])\
    \ {\n            temp[temp_index] = array[left];\n            temp_index++;\n\
    \            left++;\n        } else {\n            temp[temp_index] = array[right];\n\
    \            temp_index++;\n            right++;\n        }\n    }\n    /* if\
    \ the left half still has data */\n    while(left <= middle) {\n        temp[temp_index]\
    \ = array[left];\n        temp_index++;\n        left++;\n    }\n    /* if the\
    \ right half still has data */\n    while(right <= end) {\n        temp[temp_index]\
    \ = array[right];\n        temp_index++;\n        right++;\n    }\n    /* copy\
    \ temp array back into the original array */\n    for(temp_index = start; temp_index\
    \ <= end; temp_index++) {\n        array[temp_index] = temp[temp_index - start];\n\
    \    }\n    /* free the temporary array */\n    free(temp);\n}\n\n/* the parallel\
    \ mergesort */\nvoid mergeSort(int* array, int start, int end) {\n    if(start\
    \ < end) {\n        int middle = (start + end) / 2;\n        /* create a parallel\
    \ region with 2 threads */\n        #pragma omp parallel sections num_threads(2)\n\
    \        {\n            #pragma omp section\n            {\n                mergeSort(array,\
    \ start, middle);\n            }\n            #pragma omp section\n          \
    \  {\n                mergeSort(array, middle + 1, end);\n            }\n    \
    \    }\n        merge(array, start, end);\n    }\n}\n\nint main(int argc, char*\
    \ argv[]) {\n    int i;\n    if(argc < 2) {\n        fprintf(stderr, \"Usage:\
    \ %s <array size>\\n\", argv[0]);\n        exit(1);\n    }\n    int SIZE = atoi(argv[1]);\n\
    \    int* nums = malloc(sizeof(int) * SIZE);\n    /* enable recursive parallel\
    \ blocks */\n    omp_set_nested(1);\n    /* put in random numbers */\n    for(i\
    \ = 0; i < SIZE; i++) {\n        nums[i] = rand() % 1000;\n    }\n    /* sort\
    \ them */\n    mergeSort(nums, 0, SIZE - 1);\n    return 0;\n}\n```"
  raw: "At the end, we have a final output map that contains entries for each unique\
    \ word and its total frequency in all the files in the catalog. So, we see that\
    \ the *MapReduce* pattern is a useful set of operations that allow a parallel\
    \ program to implement a solution to the split-compute-combine problem.\n\n*MapReduce*\
    \ is so common, and the solution is so popular, that a standard framework called\
    \ Hadoop has been created that has *MapReduce* as its fundamental basis of operation.\
    \ Hadoop is now part of the Apache project. “Apache Hadoop is a framework for\
    \ running applications on large clusters built of commodity hardware. The Hadoop\
    \ framework transparently provides applications both reliability and data motion.\
    \ Hadoop implements a computational paradigm named MapReduce where the application\
    \ is divided into many small fragments of work, each of which may be executed\
    \ or re-executed on any node in the cluster. In addition, it provides a distributed\
    \ file system, the Hadoop Distributed Files System (HDFS), which stores data on\
    \ the compute nodes, providing very high aggregate bandwidth across the cluster.\
    \ Both MapReduce and the Hadoop Distributed File System are designed so that node\
    \ failures are automatically handled by the framework.”^([^(253)](#fn253))\n\n\
    ### Pattern 5: Divide and Conquer\n\nAmong the many problems with recursive solutions,\
    \ many are amenable to a *Divide and Conquer* strategy. In this strategy, the\
    \ data is typically large and contiguous, and the problem has the characteristic\
    \ that smaller versions of the problem are solved independently and the larger\
    \ solution depends on the smaller solutions. This characteristic of these problems\
    \ makes them easily amenable to parallelization: the original large problem can\
    \ be broken down into smaller sub-problems (along with a discretized subset of\
    \ the data) and each sub-problem can be in turn solved independently and the partial\
    \ solutions subsequently combined back into a solution for the larger problem.\
    \ Figure [15-5](#270563_3_En_15_Chapter.xhtml#Fig5) shows how divide and conquer\
    \ works.\n\n![](images/270563_3_En_15_Chapter/270563_3_En_15_Fig5_HTML.jpg)\n\n\
    A diagram illustrates a problem split into multiple sub-problems, which proceed\
    \ through the phases of computing and merging the sub-problems before obtaining\
    \ the solution at the end.\n\nFigure 15-5\n\nAn illustration of the Divide and\
    \ Conquer strategy\n\nNote in the example in Figure [15-5](#270563_3_En_15_Chapter.xhtml#Fig5)\
    \ that in a program that uses the *Divide and Conquer* strategy, the amount of\
    \ concurrency will vary over the course of the execution of the program. At the\
    \ beginning and end of the program there is little in the way of concurrency,\
    \ but as the program divides the data into more levels, the amount of concurrency\
    \ grows, at some point reaching a maximum after which as the merging operations\
    \ occur the amount of concurrency shrinks. Also, at some level in the recursion,\
    \ the amount of work involved in coming up with a solution is less than the parallel\
    \ overhead, and the program should drop out into a sequential algorithm or a base\
    \ case. There is also the possibility that the division of data will not be regular\
    \ (a good example here is where the pivot element in Quicksort doesn’t divide\
    \ the current list in half), which also may require more work.\n\nThe *Divide\
    \ and Conquer* strategy is useful for an entire class of recursive problems, including\
    \ all the O(n log n) sorting algorithms, the Fast Fourier Transform, and problems\
    \ in linear algebra. This general strategy is typically implemented using either\
    \ a *Fork/Join* pattern (where a Manager thread or instance will spawn some number\
    \ of child threads, then wait for their completion and combine the partial answers\
    \ into a final answer) or a *Manager/Worker* pattern. You’ll examine the *Fork/Join*\
    \ parallel pattern next.\n\n### Pattern 6: Fork/Join\n\nIn some problems, the\
    \ number of parallel threads will vary as the program executes, making it more\
    \ difficult to use simple control structures to invoke the parallelism. One way\
    \ around this is to fork off a different number of threads at different times\
    \ during the program execution and then wait for them to finish before proceeding.\
    \ Typically, a single thread or process will fork off some number of sub-processes\
    \ that will all execute in parallel. The originating process will typically wait\
    \ until the child processes all complete and join before resuming its own execution.\
    \ Each time the original thread forks off sub-processes, there may be a different\
    \ number of them. This pattern also has the possibility of having *nested parallel\
    \ execution regions* that can complicate the performance of the program.\n\nPseudo-code\
    \ for this strategy retains the recursive nature of sequential divide and conquer\
    \ algorithms; it looks something like the following:\n\n```\nResultType solve(Problem\
    \ problem) {\nif (problem.size is small enough)\nreturn solveSequentially(problem);\n\
    else {\nResultType left, right;\nDivide problem into K subproblems;\nFork the\
    \ K subproblems;\njoin; // wait for all the subproblems to finish\nreturn combine(left,\
    \ right);\n}\n}\n```\n\nThis code also illustrates a problem with this type of\
    \ pattern. The `combine()` function looks to be inherently serial and will be\
    \ executed every time `solve()` is executed. This might slow down the parallel\
    \ implementation of the problem. To illustrate this, let’s examine a version of\
    \ the mergesort algorithm; the pseudo-code for the parallel version looks as follows:\n\
    \n```\nmergesort(list, start, end) {\nif (start < end) then\nmid = floor(start\
    \ + (end – start)) / 2)\nfork mergesort(list, start, mid)\nmergesort(list, mid+1,\
    \ end)\njoin\nmerge(list, start, mid, end)\n}\n```\n\nWe implement this program\
    \ in C and using the OpenMP parallel package. In C, in the `main()` function we\
