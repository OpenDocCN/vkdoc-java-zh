    \ `i` 表示行，用 `j` 表示列，但使用 `r` 和 `c` 要清晰得多！这样，你在执行例如图像旋转等操作时，犯错误的可能性就会小得多。\n\n* \
    \  *遵守编程语言的命名约定* *（如果存在的话）*。\n\n在某个地方，某个时候，你会遇到一份名为“风格指南”或类似名称的文档。如果你在一个有多个开发者的团队中工作，风格指南是个好主意。它们使你的所有代码具有统一的外观和感觉，并使一个开发者更容易修改由其他人编写的代码。几乎所有具有一定规模的软件开发组织都有这样的指南。有时你可以违反指南，但最常见的是，在代码审查期间，你会因不遵循指南而受到批评，并被要求重写你的代码。\n\
    \n风格指南中常见的一套指南是关于命名约定的，它规定了不同类型标识符的名称应该是什么样子。\n\nJava 有一套常见的命名约定：\n\n*对于类和接口*：标识符名称应为名词，使用大写和小写字母数字字符，名称的首字符大写。\n\
    \n```\npublic class Automobile {}\npublic interface Shape {}\n```\n\n*对于方法*：标识符名称应为动词，使用大写和小写字母数字字符，名称的首字符小写。\n\
    \n```\nprivate double computeAverage(int [] list)\n```\n\n*对于变量*：标识符名称可以使用大写和小写字母数字字符，名称的首字符小写。变量名可以包含但不能以\
    \ $ 或 _（下划线）开头。\n\n```\ndouble average;\nString firstSentence;\n```\n\n*对于所有标识符（常量除外）*：应使用驼峰命名法，以便内部单词的首字母大写。\n\
    \n```\nlong myLongArray;\n```\n\n*对于常量*：所有字母应大写，组成单词之间用下划线分隔。\n\n```\nstatic final\
    \ int MAX_WIDTH = 80;\n```\n\n## 重构\n\n代码构建的一个重要部分是在编码时牢记设计，尤其是尽可能保持设计的简单性。当你修复错误或向现有代码添加新功能时，设计的简单性尤为重要。你应该思考你正在处理的代码是否尽可能简单，或者它是否变得过时、陈旧和复杂。如果是这样，请考虑*重构*，即更改代码以更新、简化和清理它。\n\
    \nMartin Fowler 将重构定义为“对软件内部结构进行的更改，旨在使其更易于理解，并在不改变其可观察行为的情况下降低修改成本。”^(²⁶⁸) 重构是所有敏捷方法论的关键，这些方法论强烈鼓励你在每次更改代码时都进行重构。\n"
- fmt: '### When to Refactor


    There are a number of times, reasons, and techniques for refactoring code. In
    *Code Complete 2*, Steve McConnell gives a number of them.^([^(269)](#fn269))
    Martin Fowler gives a longer list at his website.^([^(270)](#fn270)) Let’s look
    at some reasons for refactoring code:


    * *If you have duplicate code*, remember the DRY (Don’t Repeat Yourself) principle;
    create a new method that encapsulates the code and then call it as many times
    as needed.

    * *If a function or method is too long*, it’s probably doing too many things.
    A function or method should only ever do one thing, allowing it to stay short.
    Typically, a method should not be more than one screen height long; that’s somewhere
    between 24 and 50 lines long.

    * *If a class has poor (not tight enough) cohesion*, it’s likely doing more than
    one thing (has more than a single responsibility); you should break it up into
    two or more classes.

    * *If a class interface does not project a consistent level of abstraction*. Over
    time, as you’ve made changes to a class, its interface may become complicated
    and difficult to understand. This is the time to simplify the interface by moving
    methods to other classes or combining methods.

    * *A formal parameter list has too many input parameters*, meaning that the method
    is just being used to transfer data to another method or it is doing too many
    things. In either case, the parameter list should be simplified.

    * *If changes to code require parallel changes to multiple classes or modules*,
    then you need to think about rearranging data and/or methods to simplify the structure.

    * *If related pieces of data that are used together are in different places* (e.g.,
    two or more pieces of data are always used to compute a third, but the input data
    is in two different places), then they should be moved together to the same class.

    * *If a method uses more features of some other class than of its own class*,
    maybe it should be moved to the other class.

    * *If a chain of method calls is used to pass data via parameters* (input parameters
    to a method that are not used but just passed onto other methods), you should
    take a look at your flow of control to see if changes need to be made.

    * *If a middleman class doesn’t do anything itself* (i.e., a class whose main
    work is just to call methods in another class), then maybe you can eliminate the
    middleman and call the methods directly.

    * *If instance variables are public*, you are breaking one of the fundamental
    ideas behind object-oriented programming: *information hiding*. All instance variables
    in an object should be private, accessed via public getter and setter methods.^([^(271)](#fn271))

    * *If a subclass uses only a few of its superclass’s inherited methods*, you may
    want to rethink your current hierarchy. As McConnell puts it, “typically this
    indicates that that subclass has been created because a parent class happened
    to contain the routines it needed, not because the subclass is logically a descendant
    of the superclass. Consider achieving better encapsulation by switching the subclass’s
    relationship to its superclass from an is-a relationship to a has-a relationship;
    convert the superclass to member data of the former subclass, and expose only
    the routines in the former subclass that are really needed.”^([^(272)](#fn272))

    * *If comments are used to document overly convoluted code*. As the saying goes,
    “Don’t document bad code—rewrite it.”^([^(273)](#fn273)) Additionally, always
    reconsider your comments when you refactor code.

    * *If the code uses global variables*. Avoid using global variables (or at least
    use them very carefully). If you find global variables in code you are refactoring,
    consider them carefully and see if you can eliminate them by passing data to methods
    via parameters. Global variables are dangerous because they can lead to side effects
    where two or more objects attempt to change the value of the global variable,
    possibly causing a race condition.

    * *If a method uses setup or takedown code with another method call*, reconsider
    your class’s interface. Say you are going to add an item to an inventory of `CarParts`
    and your code looks like


    ```

    AddInventory transaction = new AddInventory();

    transaction.setPartID(partID);

    transaction.setPartName(partName);

    transaction.setPartCost(partCost);

    transaction.setDate(transactionDate);

    ```


    And then you do the actual add:


    ```

    processAdd(transaction);

    ```


    You might consider whether the method call that requires this type of setup is
    using the right level of abstraction. In order to eliminate the setup code and
    make the code simpler, you might change the formal parameter list for the `processAdd()`
    method to something like the following:


    ```

    processAdd(partID, partName, partCost, transactionDate);

    ```'
