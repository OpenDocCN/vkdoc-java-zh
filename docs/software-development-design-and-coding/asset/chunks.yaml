    ## 敏捷价值观、原则与活动


    2001 年初，一群经验丰富且富有创新精神的开发者在美国犹他州斯诺伯德会面，共同探讨软件开发流程的现状。他们均对传统的计划驱动模型感到不满，并一直在尝试新的轻量级开发技术。这次会议催生了《敏捷宣言》。^(¹⁶)
    该小组最初提出的描述包含两部分：价值观（宣言本身）和原则。


    四项*敏捷价值观*表明，虽然作者们承认右侧条目的价值，但他们认为左侧条目对于成功的软件开发至关重要：


    *   **个体与互动**高于流程与工具

    *   **可工作的软件**高于详尽的文档

    *   **客户合作**高于合同谈判

    *   **响应变化**高于遵循计划


    作者们定义了以下 12 条*敏捷原则*，以聚焦和指导开发工作：


    *   我们的最高优先级是通过尽早并持续地交付有价值的软件来满足客户。

    *   欢迎需求变更，即使是在开发后期。敏捷过程利用变更为客户创造竞争优势。

    *   频繁地交付可工作的软件，交付的间隔可以从几周到几个月，倾向于更短的时间尺度。

    *   业务人员和开发人员必须在项目期间每天一起工作。

    *   围绕有动力的个体构建项目。给予他们所需的环境和支持，并信任他们能够完成工作。

    *   向开发团队传递信息或在团队内部传递信息，最有效率且最有效果的方法是面对面的交谈。

    *   可工作的软件是衡量进度的首要标准。

    *   敏捷过程倡导可持续开发。赞助人、开发者和用户应该能够无限期地保持恒定的节奏。

    *   持续关注技术卓越和良好设计能增强敏捷性。

    *   简单性——最大化未完成工作的艺术——是至关重要的。

    *   最好的架构、需求和设计出自自组织团队。

    *   团队定期反思如何能变得更有效，然后相应地调整其行为。


    以下四项主要的*敏捷活动*（尽管最初是作为敏捷变体“极限编程”的一部分定义的）适用于所有敏捷方法论：


    **边编码边设计。** 在现实世界领域中，所有需求通常无法预先完全知晓或正确理解。在架构设计、详细设计和编码过程中，难免会出现错误和疏忽。此外，在产品开发过程中，需求和约束可能会发生变化，因为没有任何项目存在于真空中，能够脱离现实世界事件，例如开发团队人员更替、因市场变化导致的客户需求更新、新技术的发展等等。敏捷软件开发模型一次构建产品的一个部分，每个产品增量都使得几个关键事件能够更早、更频繁地发生：向客户交付价值、收集反馈以及适应变化。边编码边设计让开发者拥有更多自由来选择如何完成任务，在增强开发者自主权的同时，也增加了他们自我管理的责任。


    **直接沟通最佳，** 尽管“直接”的含义近年来已发生巨大变化。我们认为“直接沟通”是实时发生的，能够直接接触到言语和非言语线索，这包括面对面讨论、视频会议，甚至先进的虚拟环境。在任何给定的软件开发项目中，存在两种知识：1)
    客户拥有领域知识，并理解系统应该做什么；2) 开发者拥有关于目标平台、编程语言以及可能出现的实现问题的技术知识。客户不了解技术方面，开发者不具备领域知识，因此，双方的有效沟通是开发产品的关键活动。频繁的沟通意味着每个人都在从彼此的过程中学习，从而更快地建立起更全面的共同理解。


    **代码是主要的可交付成果。** 计划驱动模型与敏捷模型之间的根本区别在于对代码的强调，因为代码是系统知识的所在。在计划驱动模型中，重点在于产出一套工作产品，这些产品共同代表项目的全部工作，而代码只是工作产品之一。在敏捷方法论中，重点明确地放在代码作为可交付成果上；此外，通过恰当地组织代码结构并保持注释更新，代码本身就成了项目的文档。


    **测试驱动开发。** 所需功能的测试用例在开发之前编写，并且最初都应失败。一旦某个功能的所有测试都通过，该功能的实现即告完成。测试驱动开发对于管理变更至关重要，因为持续测试会告诉你，新功能何时完成并集成到系统中，且不会破坏任何已有的功能。


    ### 精益软件开发


    精益软件开发源于准时制生产流程（也称为丰田生产系统等），该流程于 20 世纪 70 年代在日本引入，随后在 20 世纪 80 年代和 90 年代传播到世界各地，这得益于
    1990 年出版的《改变世界的机器》^(¹⁷)（沃麦克等人著）的推动。准时制生产首先演变为精益制造，进而在整个 20 世纪 90 年代演变为精益产品管理系统。2003
    年，波彭代克夫妇所著的《精益软件开发：敏捷工具包》^(¹⁸) 的出版，标志着“精益”思想进入了“敏捷”开发社区。


    *精益*软件开发是一套旨在消除*浪费*以提高生产力、质量和客户满意度的原则。*浪费*是指任何不能为产品增加价值的东西。因此，*精益*强调团队应只关注那些能立即为产品增加价值的活动。


    波彭代克夫妇¹⁴ 将始于丰田的*精益*原则转化为软件开发的七项关键原则：


    *   消除浪费

    *   内建质量

    *   创造知识

    *   延迟决策

    *   快速交付

    *   尊重他人

    *   整体优化


    我们将简要介绍每项原则，以说明它们如何应用于软件开发。

    '
- fmt: '# Lean Principle 1: Eliminate Waste


    The main goal of *lean* software development is to eliminate *waste*, defined
    as anything that does not add value to the product or increases its cost or time.
    In software development, the main sources of *waste* are the following:


    - *Partially done work*, as it adds no immediate value and may become obsolete
    before it is finished

    - *Extra processing*, such as excessive documentation/paperwork or unnecessary
    meetings

    - *Extra features* that are rarely, if ever, used, while taking up resources and
    cluttering code

    - *Task/context switching*, which reduces efficiency by introducing delays and
    increasing cognitive load for the developers

    - *Waiting* for approvals and dependencies causes wasteful bottlenecks

    - *Motion* of artifacts and of information can be wasteful without the necessary
    regulation to ensure artifact/data organization and labeling is usably clear and
    consistent

    - *Defects*, which become increasingly expensive to fix as detection time moves
    further from the defect’s inception


    A general approach to reducing all forms of waste in a project is to continually
    reconsider how the team’s development process is working and what can be improved
    (i.e., “What was wasteful and how can we change it to be less wasteful next time?”).
    Small iterative adjustments to the workflow will lead to an overall reduction
    of development *wastes*.


    ## Lean Principle 2: Build Quality In


    Quality issues lead to a variety of software development waste. Finding and logging
    defects, fixing defects, and re-testing all result in waste we’d like to eliminate.
    “Building quality in” refers to focusing on and incorporating quality directly
    into the software development processes.


    There are many techniques to increase the quality of your development processes.
    Two popular techniques that improve code quality at the source are *pair programming*
    (two programmers coding together, following a set of predefined practices) and
    *Test-Driven Development* (TDD) (writing software with the goal of passing all
    previously defined test-cases). Both allow developers to write, test, and fix
    code quickly and before the code is integrated into the product code base where
    defects become harder to find and fix. Integrating new features as soon as they
    are done gives the testing team a new version of the product to test as quickly
    as possible and shortens the amount of time between code creation and testing.
    Another relatively painless, but somewhat controversial way to improve quality
    of your code: instead of logging discovered defects in a defect tracking system,
    fix it *NOW*. As soon as you find it. That builds quality in and eliminates waste
    simultaneously.^([^(19)](#fn19)) Another technique to improve software quality
    is *constant feedback*. One way to facilitate this feedback is to make the customer
    part of the development team, allowing for direct repeated evaluation of new iterations
    of the product and providing developers with crucial timely feedback on what is
    suitable and what needs to be changed.


    ## Lean Principle 3: Create Knowledge


    While working through requirements, creating the design, and implementing the
    code, the team is necessarily learning new things. You learn by working to understand
    requirements. You learn by beginning with an initial design and realizing how
    the design must change as the requirements become better understood. You learn
    more about the domain, the customer, the tools, the dependencies, and so on. Thus,
    you are jointly creating knowledge that is embodied in the code you produce and
    ship.


    To ensure all this knowledge is truly “created” (meaning that it survives longer-term
    and allows the team to really “learn” by keeping this knowledge), some shorter-term
    practices are necessary. For example, if one teammate learns something crucial
    about the project’s requirements or dependencies, they must ensure this information
    is made available to the rest of the team. This can be achieved through consistent
    code documentation, well organized wiki pages, dependency management tools, targeted
    trainings, etc. Overall, these practices can reduce the motion of artifacts and
    information, extra processing, and even defects. The focal point is to ensure
    that any new information doesn’t just solve short-term problems for whoever encountered
    them, but truly turns into knowledge that helps the whole team level up their
    understanding, their skills, and their products.


    ## Lean Principle 4: Defer Commitment


    This lean principle really dates back to the early 1970s and the advent of top-down
    structured design. Deferring commitment means putting off decisions (particularly
    irreversible or highly consequential ones) for as long as possible and only making
    them when absolutely necessary.


    One way to defer commitment is to follow a flexible, hierarchical, and modular
    design. In top-down design, you can begin with a general formulation of the problem
    solution, increasing future flexibility, and pushing implementation decisions
    further down to whenever the design and the code need to become more detailed.
    Creating libraries and APIs can allow us to implement flexible functionality without
    committing to how it must be invoked, leaving those decisions to the individual
    developers of each feature. In this way, by the time you reach the level where
    these details are required, more information is typically available, allowing
    the code to be developed more naturally and with greater ease.


    ## Lean Principle 5: Deliver Fast


    The faster we can deliver value to the customers, the sooner we can obtain crucial
    customer feedback to guide future development. Additionally, minimizing the time
    between when requirements are generated and when product meeting those requirements
    is delivered, there is less time for the requirements—and the market—to change.


    So how do you deliver fast? *Lean* into the principles (pun intended). Keep requirements
    clear and simple. Don’t add too many features and don’t spend time pre-planning
    future features. Don’t over-engineer the solution. Find a reasonable approach,
    a reasonable set of data structures, and reasonable algorithms to implement your
    solution. Remember that the perfect is the enemy of the good—and the fast. Satisfice
    instead of optimizing: if it’s a suitable solution for the immediate need, move
    on. Finally, a crucial path to deliver fast is to have an experienced, well-integrated,
    cooperative, self-organizing, respectful-of-each-other team with the right skill
    set for your product. The team quite literally makes or breaks the product.


    ## Lean Principle 6: Respect People


    Respecting people is the key to building cohesive, productive teams. The focal
    idea is that the people doing the work should make the decisions. Process and
    product creation decisions should not be imposed from above, but rather generated
    from the trenches. From the manager’s perspective, respecting your team means
    empowering the team to make their own decisions, including about task time estimates
    and decomposition, processes, tools, and design. This empowerment means that the
    manager must learn to listen to their team and take their ideas and concerns into
    consideration. It also means that the manager must act as a facilitator and a
    shield for their team, allowing them to get the job done. Together, everyone must
    endeavor to create an environment where everyone is able to speak their mind and
    disagreements are resolved with respect for each other. This creates a team with
    open communication and decision-making transparency. More on this in the next
    chapter.'
