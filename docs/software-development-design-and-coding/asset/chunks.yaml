    public class SongIdentifier {

    private BirdFeeder feeder;

    private FeedingDoor door;

    public SongIdentifier(BirdFeeder feeder) {

    this.door = feeder.getDoor();

    }

    public void identify(Song song) {

    List songs = feeder.getSongs();

    Iterator song_iter = songs.iterator();

    while (song_iter.hasNext()) {

    Song nxtSong = song_iter.next();

    if (nxtSong.equals(song)) {

    door.open();

    return;

    }

    }

    door.close();

    }

    }

    public class Song {

    private File song;

    public Song(File song) {

    this.song = song;

    }

    public File getSong() {

    return this.song;

    }

    public boolean equals(Object newSong) {

    if (newSong instanceof Song) {

    Song newSong2 = (Song) newSong;

    if (this.song.equals(newSong2.song)) {

    return true;

    }

    }

    return false;

    }

    }

    ```


    在这个实现中，如果你对歌曲相关的任何内容进行修改，那么你只需要修改 `Song` 类，而 `SongIdentifier` 则与这些修改隔离开来。`Song`
    类的*行为*不会改变，尽管它*实现*该行为的方式可能会变。只要行为始终一致，`SongIdentifier` 并不关心行为是如何实现的。`BirdFeeder`
    将处理鸟鸣的工作委托给了 `SongIdentifier` 类，而 `SongIdentifier` 又将比较歌曲的工作委托给了 `Song` 类，整个过程都没有使用继承。


    委托允许你将某个行为的责任交给另一个类，从而无需担心在自己的类中修改该行为。你可以信赖被委托类中的行为不会改变。但有时你需要同时使用一整套行为，而委托无法满足这种需求。这时，你需要使用*组合*来从其他类中组装行为。


    假设你正在开发一款太空题材的角色扮演游戏（RPG）——《太空游侠》。你需要在游戏中建模的对象之一就是飞船本身。飞船会有许多不同的特性。例如，有不同类型的飞船：穿梭机、贸易船、战斗机、货船、主力舰等等。每艘飞船还会有不同的特性：武器、护盾、货舱容量、船员数量等等。


    如果你想创建一个通用的 `Ship` 类，那么很难将所有这些东西都集中到一个单一的 `Ship` 超类中，以便为 `Shuttle`、`Fighter`、`Freighter`
    等创建子类。这些飞船类型差异很大，但它们之间有什么共同点吗？你应该在这里使用继承吗？


    可以说，《太空游侠》中所有飞船只有两个共同点：每艘飞船都有一个飞船类型，以及一组与该飞船类型相关的属性。这就引出了你的第一个类图，如图 12-11 所示。


    ![](img/270563_3_En_12_Fig11_HTML.jpg)


    一个太空飞船类的 UML 类图，包含属性 shipType（字符串）和 properties（映射），以及方法 getType（字符串）、setType（字符串）、getProperty（字符串，对象）和
    setProperty（字符串，对象）。


    图 12-11


    所有飞船有什么共同点？


    这允许你存储飞船类型以及飞船实例的各种属性映射。这意味着你可以独立于飞船来开发属性，然后不同的飞船可以共享相似的属性。例如，所有飞船都可以有武器，但它们可以拥有不同特性的武器。这促使你开发一个
    `Weapon` 接口，然后你可以用该接口来实现具体的类。你通过使用*组合*来在 `SpaceShip` 中使用这些武器。请记住，组合允许你使用一整套保证不会改变的行为。参见图
    12-12。


    ![](img/270563_3_En_12_Fig12_HTML.jpg)


    一个 UML 类图，展示了一个具有属性和方法的 SpaceShip 类，连接到一个由三个类（Cannon、Torpedoes 和 Blaster）实现的 Weapon
    接口，每个类都有一个 attack 方法。


    图 12-12


    使用组合让 SpaceShip 能够使用武器


    回想一下，UML 图中的空心三角形表示继承（对于接口而言，则表示实现）。UML 中的实心菱形表示组合。因此，在这个设计中，你可以将多种武器添加到你的属性映射中，每种武器都将拥有
    `Weapon` 接口定义的所有能力，但每种武器都会以自己的方式实现这些能力。通过*组合*，你可以在飞船中使用这些武器：飞船上所有单独武器的能力都成为飞船能力的一部分。不同的飞船由于由不同的武器及其属性映射中的其他元素组合而成，因此行为也会不同。


    请注意，在组合中，组件对象（`Weapons`）成为更大对象（`SpaceShip`）的一部分，当更大对象消失时（你被击毁），组件也会随之消失。由其他行为组合而成的对象拥有这些行为。当该对象被销毁时，其所有组成部分及其行为也会被销毁。组合中的行为在组合本身之外是不存在的。当你的飞船被击毁时，你所有的武器也会被摧毁。


    当然，有时你希望以这样一种方式组合一组对象和行为：当其中一个被移除时，其他对象仍然存在。*聚合*是指一个类被用作另一个类的一部分，但也可以独立于该类存在。例如，考虑一个图书馆：虽然我们经常将许多书聚合在一个图书馆中，但每本书也可以独立存在。如果被组合的对象可以合理地独立存在（即，在组合对象之外），则使用聚合；否则使用组合。这种区别的关键在于，要展示一个组件在组合之外存在是有意义的实例，从而表明它应该具有独立的存在性。


    在《太空游侠》中，除了 `SpaceShip` 对象之外，你还可以有 `Pilot` 对象。飞行员也可以携带武器。当然，是不同的武器；飞行员可能不会随身携带加农炮！假设一个飞行员携带了一把手持爆能枪，那么用面向对象的语言来说，他们正在使用手持爆能枪的行为。如果一个疯狂的太空牛仔意外压扁了飞行员，武器会随着飞行员一起被摧毁吗？很可能不会，因此需要一种机制，让手持爆能枪可以被飞行员使用，但又能在
    `Pilot` 类之外独立存在。铛铛！这就是聚合！


    至此，你已经看到了三种不同的机制，它们允许对象使用其他对象的行为，而且都不需要继承。正如《面向对象分析与设计》中所说：“如果你优先使用委托、组合和聚合而非继承，你的软件通常会更加灵活，更易于维护、扩展和重用。”^(¹⁹⁹)

