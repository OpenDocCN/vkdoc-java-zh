    \ a different number of them. This meta-pattern, like many of the patterns you’ve\
    \ seen so far, assumes a shared memory model where all the tasks are sharing values\
    \ and creating results that are available to the Manager at the end. The *Fork/Join*\
    \ pattern is the standard programming model in OpenMP."
  trans: "\n*   当组织原则是数据流如何对构成算法的任务施加排序时，通过*数据流*来组织并行算法。*按数据流组织*模式组还包含两个元模式：\n   \
    \ *   *管道*模式是指数据流遍历一个由多个阶段组成的、一致的线性链，每个阶段代表对来自上一阶段的输入数据执行一个函数计算，并将其结果传递给下一阶段。在此模式中，数据流被假定为单向的。（这听起来应该很像多级\
    \ CPU 架构或管道-过滤器执行序列的概念，如第 7 章所述。）\n\n    *   *基于事件的协调*模式是指多个半独立的并发活动以动态或不可预测的方式交互，且交互由这些并发活动之间的数据流决定。数据流意味着任务之间存在一组排序依赖关系。在此模式中，数据流不被假定为单向或线性的。有许多符合此模式的问题实例，包括许多离散事件模拟问题。因此，许多使用此模式的解决方案都将事件作为基本构建块：通常至少有一个任务生成事件，然后有若干任务处理这些事件。（想象一个多工位洗车场，汽车随机到达并被分配到一个工位；或者一家银行，设有单个队列或多个队列，并有若干柜员为到达队首的客户服务。第\
    \ 11 章中的“喂鸟器”示例就是此类设计的一个实例。）\n\n#### 设计空间：支撑结构\n\n在探索了*发现并发*设计空间中寻找并发的不同可能性，以及在*算法结构*设计空间中表达并行算法的不同可能性之后，实现进入了*支撑结构*设计空间。该设计空间开始研究适合支持在前述设计空间中规划的算法实现的结构/模式。*支撑结构*设计空间包含两组元模式：*程序结构*元模式组讨论如何组织程序以最大化并行性，而*数据结构*元模式组讨论常用的共享数据结构。\n\
    \n*程序结构*组包含四个元模式：\n\n*   *单程序多数据（SPMD）*元模式，其中所有处理单元（PE）并行运行相同的程序，但每个 PE 拥有自己的数据子集。与\
    \ SIMD 架构不同，PE 不需要保持锁步执行，因此不同的并行任务可能沿着代码中的不同路径执行。由于每个 PE 都运行自己的一份程序副本，SPMD 的一个重要特点是，与启动和停止循环相关的额外开销是在程序的开始和结束处实现的，而不是在循环内部。每个数据集通常会被分割，使得程序中的循环只运行总迭代次数的一小部分。此外，PE\
    \ 之间仅偶尔与相邻单元通信，从而提高了效率。\n\n*   *管理者/工作者*元模式，其中单个管理者任务会设置多个并发的 Worker 线程或进程，以及一个单一的任务包。每个\
    \ Worker 会从任务包中取出一个任务并并行执行；当任务完成时，Worker 会继续从任务包中取出任务并执行，直到任务包为空或出现其他结束条件。任务包通常实现为一个共享队列。*管理者/工作者*模式对于*易并行*程序（见下文）特别有用，因为这类程序中有大量工作者任务彼此没有依赖关系。\n\
    \n*   *循环并行*元模式解决了如何执行包含一个或多个计算密集型循环的算法的问题。该模式描述了如何创建一个并行程序，使得循环的不同迭代能够并行执行。第\
    \ 14 章中使用 OpenMP^(²⁴⁶)计算π值的程序就是*循环并行*模式的一个应用实例。\n\n*   *分治/合并*元模式（参见第 14 章的示例）是整体计算中不同部分并发执行的示例，这些部分彼此独立地进行，直到（可能协调的）集体终止。通常，单个线程或进程会分叉出若干个子进程，这些子进程将全部并行执行。发起进程通常会等待所有子进程合并后才恢复自身执行。每次原始线程分叉出子进程时，子进程的数量可能不同。与您目前看到的许多模式一样，此元模式假设一个共享内存模型，其中所有任务共享值并创建结果，这些结果在最后可供管理者使用。*分治/合并*模式是\
    \ OpenMP 中的标准编程模型。\n"
- fmt: '这些元模式在并行计算社区中广为人知。*SPMD*模式是MPI使用的计算模型，也是与*Manager/Worker*并列的最流行的并行计算结构模式之一。*Loop
    Parallelism*已在向量架构中得到利用，并且目前是OpenMP和GPU中并行性的主要来源之一。最后但同样重要的是，*Fork/Join*模式完美地建模了POSIX线程的`pthread_create`/`pthread_join`模型^([^(247)](#fn247))，并且也被用作OpenMP的基础。


    *Data Structures*组包含三个元模式：


    *   *Shared Data*元模式实现了与在多个不同并发活动之间管理共享数据相关的特性。正确且高效地管理共享数据通常是整个并行程序开发/设计过程中最耗时耗力的活动。此模式要求执行简单性、对数据操作方式的仔细抽象、意识到显式管理共享数据会带来一些并行开销，并且必须保证任何计算（特别是读写操作）的正确性，无论任务顺序如何。^([^(248)](#fn248))
    这需要考虑锁定、内存同步和任务调度。此元模式的一个使用示例是在*Task Parallelism*元模式中管理共享数据，其中任务首先被复制，然后部分结果被归约。


    *   *Shared Queue*元模式创建了实现为允许对队列进行并发访问的队列数据类型。共享队列用于支持不同上下文（从线程到进程，以及在CPU协处理器上运行的并发活动）中并发活动的交互。此元模式的一个典型应用示例是在*Manager/Worker*元模式中，用于创建为Worker进程分发任务的并发队列。


    *   *Distributed Array*元模式建模了与管理和分布在多个并发活动之间的数组相关的所有方面。分布式数组通常用于实现逻辑上在并发活动之间共享的数据结构，但可能以这样一种方式划分：其中一个并发活动拥有并管理分布式数组的单个部分。“挑战在于组织数组，使得每个UE所需的元素在计算过程中的正确时间点位于附近。换句话说，数组必须分布在计算机上，使得数组分布与计算流程相匹配。”^([^(249)](#fn249))
    此元模式对于使用*Geometric Decomposition*元模式来辅助算法构建的程序，以及在使用*SPMD*元模式时组织程序结构特别有用。


    Mattson等人根据这些设计中的不同元模式对*Algorithm Structure*设计空间中不同模式的实现支持程度进行了分类。例如，*Task Parallelism*得到了*Program
    Structures*组中四个元模式的良好支持，而*Recursive Data*模式仅（部分地）得到*SPMD*和*Manager/Worker*模式的支持。


    #### 设计空间：实现机制


    与并行应用程序实现相关的第四个也是最后一个设计空间是*Implementation Mechanisms*设计空间，它包含代表支持典型并行计算抽象（并发活动、同步和通信）的基本机制的元模式。对应于上述这些抽象的三种元模式如下：


    *   *UE (Units of Execution) Management*元模式处理执行单元（用于执行并行应用程序的进程和线程）的管理，处理与并行应用程序中并发活动相关的所有方面，包括它们的创建、销毁和管理。尽管在Mattson等人的工作中只考虑了线程和进程，但UE
    Management元模式可以适应处理放置在CPU协处理器（例如，GPU内核）上的并发活动。


    *   *Synchronization*元模式处理与UE中事件/计算排序相关的所有方面，包括并发活动和内存的同步。此模式涵盖了诸如锁/栅栏机制、更高级别的互斥构造（例如，监视器）以及集体同步（例如，屏障）等方面。


    *   *Communication*元模式管理与实现并行应用程序的不同UE之间通信相关的所有方面，包括并发活动之间的数据交换。此模式涵盖了不同类型的点对点消息传递（例如，发送、接收、同步和异步）以及多点或集体通信（例如，广播、散播、收集、归约），其中多个UE参与单个通信事件。


    ## 并行模式列表


    在本节中，我们将更详细地研究上面讨论的一些元模式。我们还将包括一些其他常见的并行模式，并将这些模式与上述元模式进行匹配。^([^(250)](#fn250))


    ### 模式1：令人尴尬的并行


    这并非一个真正的模式，而是一类问题，其中将工作划分为独立任务的过程非常明显和简单，因此这类问题被称为*令人尴尬的并行*或*令人愉悦的并行*。


    令人尴尬的并行问题的示例包括：使用梯形法则计算π（第[14](#270563_3_En_14_Chapter.xhtml)章），我们可以并行计算任意数量梯形的面积；任何使用循环通过乘法或加法累积值的解决方案；密码破解；计算机图形图像的渲染；计算曼德勃罗集点；面部识别系统；以及许多计算机模拟，例如气候模型。


    其他示例可能取决于输入数据的类型和大小。例如，如果你有数百万个（比如M个）TIFF文件想要转换为GIF文件，使用P个处理元素（PE），你可以将M/P个TIFF文件分发给每个PE并在那里进行转换（参见下面的Map模式）。或者，如果你有一个完整的文本文档目录，并且想要计算整个目录中的词频，你可以再次将文档划分到你拥有的所有处理元素上，对每个子集进行计数，然后合并所有子集（参见下面的MapReduce模式）。事实证明，存在许多这类令人愉悦的并行问题，其中你拥有大量独立分布在大量数据上的计算，这些计算符合这种“拆分-计算-合并”模式。你将在下文的章节中看到更多与其他并行模式结合使用的示例。'
  raw: 'These meta-patterns are well known in the parallel computing community. The
    *SPMD* pattern is the computational model used by MPI and one of the most popular
    patterns used to structure parallel computations along with the *Manager/Worker*.
    *Loop Parallelism* has been exploited in vector architectures, and it is currently
    one of the main sources of parallelism in both OpenMP and GPUs. Last but not least,
    the *Fork/Join* pattern perfectly models the pthread_create/pthread_join model
    of POSIX threads^([^(247)](#fn247)) and is also used as the basis for OpenMP.


    The *Data Structures* group includes three meta-patterns:


    *   The *Shared Data* meta-pattern implements the features related to the management
    of data shared among a number of different concurrent activities. Correct and
    efficient management of the shared data is usually the most time and effort consuming
    activity in the entire parallel program development/design process. This pattern
    requires simplicity of execution, a careful abstraction of how the data will be
    manipulated, an awareness that explicitly managing the shared data will incur
    some parallel overhead, and it must guarantee the correctness of any computation
    regardless of the order of the tasks (reading and writing, in particular).^([^(248)](#fn248))
    This requires the consideration of locking, memory synchronization, and task scheduling.
    An example of the use of this meta-pattern is managing shared data in the *Task
    Parallelism* meta-pattern, where tasks are first duplicated and then partial answers
    reduced.


    *   The *Shared Queue* meta-pattern creates queue data types implemented to allow
    concurrent access to the queues. Shared queues are used to support the interaction
    of concurrent activities in different contexts, from threads to processes, and
    concurrent activities running on CPU co-processors. A good example of where this
    meta-pattern is used is in the *Manager/Worker* meta-pattern to create the concurrent
    queue that dispenses tasks for the Worker processes.


    *   The *Distributed Array* meta-pattern models all the aspects related to the
    management of arrays partitioned and distributed among different concurrent activities.
    Distributed arrays are often used to implement data structures that are logically
    shared among concurrent activities, but may be partitioned in such a way that
    one of the concurrent activities owns and manages a single portion of the distributed
    array. “The challenge is to organize the arrays so that the elements needed by
    each UE are nearby at the right time in the computation. In other words, the arrays
    must be distributed about the computer so that the array distribution matches
    the flow of the computation.”^([^(249)](#fn249)) This meta-pattern is particularly
    useful for programs using the *Geometric Decomposition* meta-pattern to help with
    the algorithm construction and to organize the program structure when using the
    *SPMD* meta-pattern.


    Mattson et. al. classify the different meta-patterns in this design with respect
    to their suitability to support the implementation of the different patterns in
    the *Algorithm Structure* design space. As an example, *Task Parallelism* is well
    supported by the four meta-patterns in the *Program Structures* group, whereas
    the *Recursive Data* pattern is only (partially) supported by the *SPMD* and *Manager/Worker*
    pattern.


    #### Design Spaces: Implementation Mechanisms


    The fourth and final design space related to implementation of parallel applications
    is the *Implementation Mechanisms* design space, which includes meta-patterns
    representing the basic mechanisms to support the typical parallel computing abstractions:
    concurrent activities, synchronization, and communication. The three meta-patterns
    corresponding to these abstractions above are the following:


    *   The *UE (Units of Execution) Management* meta-pattern deals with managing
    the units of execution (processes and threads used to execute the parallel application),
    handling all aspects related to the concurrent activities in a parallel application,
    including their creation, destruction, and management. Although in Mattson et.
    al. only threads and processes are taken into account, the UE Management meta-pattern
    may be adapted to handle the concurrent activities placed on CPU co-processors
    (e.g., the GPU kernels).


    *   The *Synchronization* meta-pattern handles all aspects related to ordering
    of events/computations in the UE, including synchronization of concurrent activities
    and memory. This pattern covers aspects such as lock/fence mechanisms, higher
    level mutual exclusion constructs (e.g., monitors), and collective synchronizations
    (e.g., barriers).


    *   The *Communication* meta-pattern manages all the aspects related to communications
    between the different UEs implementing the parallel application, including data
    exchange among concurrent activities. This pattern covers different kinds of point-to-point
    message passing (e.g., send, receive, synchronous and asynchronous) and multi-point
    or collective communications (e.g., broadcast, scatter, gather, reduce) where
    multiple UEs are involved in a single communication event.


    ## A List of Parallel Patterns


    In this section we examine in more detail some of the meta-patterns discussed
    above. We also include some other common parallel patterns and match these patterns
    with the meta-patterns above.^([^(250)](#fn250))


    ### Pattern 1: Embarrassingly Parallel


    Not really a pattern, but rather a class of problems where the division of the
    work into independent tasks is so obvious and simple, that the problem is known
    as *embarrassingly parallel* or *pleasingly parallel*.


    Examples of embarrassingly parallel problems include using the trapezoid rule
    to compute π (Chapter [14](#270563_3_En_14_Chapter.xhtml)) where we could compute
    the areas of any number of trapezoids in parallel, any problem solution that uses
    a loop to accumulate values using multiplication or addition, password cracking,
    rendering of computer graphics images, computing the points for the Mandelbrot
    set, facial recognition systems, and many computer simulations, like climate models.


    Other examples can depend on the type and size of the input data. For example,
    if you have several million (say M) TIFF files that you want to convert to GIF
    files, using P processing elements (PE), you can distribute M/P TIFF files to
    each PE and do the conversions there (see the Map pattern below). Or if you have
    an entire catalog of text documents and you want to compute word frequencies across
    the entire catalog, you can again divide the documents across all the processing
    elements you have, do the counts on each subset, and then combine all the subsets
    (see the MapReduce pattern below). It turns out that there are many these types
    of pleasingly parallel problems where you have a large number of independently
    distributed computations across a large set of data that fit this split-compute-combine
    pattern. You’ll see more examples of this in combination with other parallel patterns
    in the sections below.'
  trans: '

    这些元模式在并行计算领域广为人知。*SPMD*模式是 MPI 使用的计算模型，也是与*管理者/工作者*模式并列、用于构建并行计算的最流行模式之一。*循环并行性*已在向量架构中得到利用，目前是
    OpenMP 和 GPU 中并行性的主要来源之一。最后但同样重要的是，*分治/合并*模式完美地建模了 POSIX 线程的 pthread_create/pthread_join
    模型^(²⁴⁷)，并且也被用作 OpenMP 的基础。


    *数据结构*组包含三种元模式：


    *   *共享数据*元模式实现了与在多个不同并发活动之间管理数据相关的特性。对共享数据进行正确且高效的管理，通常是整个并行程序开发/设计过程中最耗费时间和精力的活动。该模式要求执行简单性、对数据操作方式进行仔细抽象、意识到显式管理共享数据会带来一些并行开销，并且必须保证无论任务顺序如何（特别是读写操作），任何计算结果的正确性。^(²⁴⁸)
    这需要考虑锁定、内存同步和任务调度。使用此元模式的一个例子是在*任务并行*元模式中管理共享数据，其中任务首先被复制，然后部分结果被归约。


    *   *共享队列*元模式创建了实现为允许并发访问队列的队列数据类型。共享队列用于支持不同上下文中的并发活动（从线程到进程，以及在 CPU 协处理器上运行的并发活动）之间的交互。使用此元模式的一个很好的例子是在*管理者/工作者*元模式中，用于创建向工作者进程分发任务的并发队列。


    *   *分布式数组*元模式建模了与在不同并发活动之间进行分区和分布的数组管理相关的所有方面。分布式数组通常用于实现在并发活动之间逻辑共享的数据结构，但可能以这样一种方式进行分区：其中一个并发活动拥有并管理分布式数组的单个部分。“挑战在于组织数组，使得每个
    UE 所需的元素在计算过程中的正确时间点位于附近。换句话说，数组必须在计算机上分布，使得数组分布与计算流程相匹配。”^(²⁴⁹) 此元模式对于使用*几何分解*元模式来辅助算法构建的程序，以及在使用*SPMD*元模式时组织程序结构特别有用。


    Mattson 等人根据这些元模式对*算法结构*设计空间中不同模式实现的支持程度，对它们进行了分类。例如，*任务并行*得到了*程序结构*组中四种元模式的良好支持，而*递归数据*模式仅（部分地）得到*SPMD*和*管理者/工作者*模式的支持。


    #### 设计空间：实现机制


    与并行应用程序实现相关的第四个也是最后一个设计空间是*实现机制*设计空间，它包含代表支持典型并行计算抽象（并发活动、同步和通信）的基本机制的元模式。对应于上述这些抽象的三种元模式如下：


    *   *UE（执行单元）管理*元模式处理执行单元（用于执行并行应用程序的进程和线程）的管理，处理与并行应用程序中并发活动相关的所有方面，包括它们的创建、销毁和管理。尽管在
    Mattson 等人的工作中只考虑了线程和进程，但 UE 管理元模式可以进行调整以处理放置在 CPU 协处理器上的并发活动（例如，GPU 内核）。


    *   *同步*元模式处理与 UE 中事件/计算排序相关的所有方面，包括并发活动和内存的同步。该模式涵盖了诸如锁/栅栏机制、更高级别的互斥构造（例如，监视器）以及集体同步（例如，屏障）等方面。


    *   *通信*元模式管理与实现并行应用程序的不同 UE 之间通信相关的所有方面，包括并发活动之间的数据交换。该模式涵盖了不同类型的点对点消息传递（例如，发送、接收、同步和异步）以及多点或集体通信（例如，广播、散播、收集、归约），其中多个
    UE 参与单个通信事件。


    ## 并行模式列表


    在本节中，我们将更详细地审视上面讨论的一些元模式。我们还将包含一些其他常见的并行模式，并将这些模式与上述元模式进行匹配。^(²⁵⁰)


    ### 模式 1：易并行


    这并非真正意义上的模式，而是一类问题，其中将工作划分为独立任务的过程非常明显和简单，以至于该问题被称为*易并行*或*令人愉悦的并行*。


    易并行问题的例子包括：使用梯形法则计算π（第 14 章），我们可以并行计算任意数量梯形的面积；任何使用循环通过乘法或加法累积值的解决方案；密码破解；计算机图形图像的渲染；计算曼德勃罗特集的点；人脸识别系统；以及许多计算机模拟，例如气候模型。


    其他例子可能取决于输入数据的类型和大小。例如，如果你有数百万个（比如 M 个）TIFF 文件想要转换为 GIF 文件，使用 P 个处理单元（PE），你可以将
    M/P 个 TIFF 文件分发给每个 PE 并在那里进行转换（参见下面的 Map 模式）。或者，如果你有一个完整的文本文档目录，并且想要计算整个目录中的词频，你可以再次将文档划分到所有可用的处理单元上，对每个子集进行计数，然后合并所有子集（参见下面的
    MapReduce 模式）。事实证明，存在许多这类令人愉悦的并行问题，其中你有大量独立分布的计算任务作用于大量数据，并且符合这种“拆分-计算-合并”的模式。在下面的章节中，你将看到更多结合其他并行模式的例子。

    '
- fmt: "### Pattern 2: Manager/Worker\n\nIn this pattern, a single `Manager` task\
    \ will set up a number of concurrent `Worker` threads or processes, alongside\
    \ a single bag of tasks. Each `Worker` will take a task out of the bag and execute\
    \ it in parallel; as they finish, `Worker`s will continue to take tasks out of\
    \ the bag and execute them until the bag is empty, or some other ending condition\
    \ has occurred. The bag of tasks is typically implemented as a shared queue. The\
    \ *Manager/Worker* pattern is particularly useful for *embarrassingly parallel*\
    \ programs (see Figure [15-2](#270563_3_En_15_Chapter.xhtml#Fig2)), where a large\
    \ number of worker tasks have no dependencies.\n\n![](images/270563_3_En_15_Chapter/270563_3_En_15_Fig2_HTML.jpg)\n\
    \nA diagram illustrates a circle labeled Manager comprising the blocks from A\
    \ to E. The blocks are pointed individually at the bottom by the manager. The\
    \ blocks are marked as workers.\n\nFigure 15-2  \nManager/Worker pattern implementing\
    \ an embarrassingly parallel problem\n\n### Pattern 3: Map and Reduce\n\nLike\
    \ *Manager/Worker*, the *Map and Reduce* patterns are very well suited for pleasingly\
    \ parallel problems. The *Map and Reduce* patterns can be used separately and\
    \ they often are.\n\nThe *Map pattern* is likely the simplest pattern you’ll run\
    \ into. `Map` applies part of the program, let’s call it a function, to every\
    \ element of the data in parallel. The functions must have no side effects, be\
    \ identical, and independent. Because of this independence, `Map` can take advantage\
    \ of as many units of execution as are available.\n\nUsed with the *Map pattern*,\
    \ the *Reduce pattern* combines all the elements of the collection of partial\
    \ solutions pairwise and creates a summary value as the overall solution. While\
    \ commutativity is not required for the combination of the partial solutions,\
    \ most applications of `Reduce` assume both commutativity and associativity. Figure\
    \ [15-3](#270563_3_En_15_Chapter.xhtml#Fig3) shows an example of how combining\
    \ `Map` and `Reduce` works.\n\n![](images/270563_3_En_15_Chapter/270563_3_En_15_Fig3_HTML.jpg)\n\
    \nA flow diagram starts from the program and splits into 4 data. Each data proceeds\
    \ through a function and obtains another data. Two adjacent data proceed through\
    \ the reduction, and a solution is obtained after the final reduction.\n\nFigure\
    \ 15-3  \nIllustration of an implementation of `Map`, followed by `Reduce`\n\n\
    In OpenMP, the `#pragma omp parallel for` compiler directive will initiate a `Map`\
    \ operation for a for-loop that is in a program that is pleasingly parallel. Adding\
    \ a `reduction(+: <var-list>)` to the compiler directive will add the `Reduce`\
    \ component. For the trapezoid rule program in Chapter [14](#270563_3_En_14_Chapter.xhtml)\
    \ the main for loop looked like\n\n```\n#pragma omp parallel for private(x) reduction(+:sum)\n\
    /* loop to compute the area under f(x) */\nfor (int i = 0; i <= steps; i++) {\n\
    x = i * width;\nsum = sum + f(x);\n}\n```\n\n### Pattern 4: MapReduce\n\nA variation\
    \ of using the *Map and Reduce* patterns that combines the two to accomplish a\
    \ common task is the *MapReduce* pattern that was first published in 2004.^([^(251)](#fn251))\
    \ The *MapReduce* pattern is intended solve problems where the main goal is to\
    \ input, process, and generate large data sets and where the implementation is\
    \ scalable across many processors. The implementation of *MapReduce* performs\
    \ three essential functions:\n\n- *Mapping*, in which the program divides up a\
    \ large data set (or a large set of files) into N discrete and independent subsets,\
    \ each of which will be processed on a single processor. The output is typically\
    \ a map data structure of some kind containing lists of not necessarily unique\
    \ (key, value) pairs.\n- *Shuffle*, in which the program extracts similar (key,\
    \ value) pairs and assigns them to a new processor where the `Reduce` operation\
    \ will happen.\n- *Reduce*, where the elements in an input dataset are combined\
    \ into a single result that is output. The list of the results from each processor\
    \ constitutes the generated output dataset.\n\nAs an example of a use of `MapReduce`\
    \ to solve a large problem, let’s say that we have a large catalog of text documents.\
    \ Our objective is to create a single list of [word, frequency] pairs that tells\
    \ us all the unique words in all the documents and how many times each of those\
    \ words occur. A solution to this type of problem would be useful in problems\
    \ in cryptography or in the statistical analysis of texts, say for author attribution\
    \ studies. Figure [15-4](#270563_3_En_15_Chapter.xhtml#Fig4) shows us how such\
    \ a system might look.\n\n![](images/270563_3_En_15_Chapter/270563_3_En_15_Fig4_HTML.jpg)\n\
    \nA flow diagram starts from a program and splits into 4 text files. Each text\
    \ file creates a word list and proceeds through the shuffling and reduction phases\
    \ before obtaining the solution at the end.\n\nFigure 15-4  \nA use of `MapReduce`\
    \ to find word frequencies across a large set of text files\n\nIn this solution,\
    \ we start with a catalog of text files, which we divide into subsets, and assign\
    \ each subset to an instance of the program on a processor. The program then creates\
    \ a list of words and their frequencies for each of the words across all the documents\
    \ in its subset. The shuffle operation then takes each unique word in each of\
    \ the words lists and assigns it to a reduce process. So, for example, all the\
    \ (“cat”, value) pairs from all the word lists end up as inputs to the same reduce\
    \ process. Each reduce process then accumulates all the values of all the unique\
    \ words to create the overall solution.\n\nPseudo-code for the map and reduce\
    \ portions of this program might look as follows:^([^(252)](#fn252))\n\n```\n\
    map(DocumentID docID_key, String input_value) {\n/* docID_key is the name of the\
    \ document */\n/* input_value is the contents of the document */\nCreate a Map\
    \ called myMap;\nfor each word in input_value do {\nif (myMap.contains(word))\
    \ then\nmyMap.put(word, myMap.get(word) + 1);\nelse\nmyMap.put(word, 1);\n}\n\
    return myMap;\n}\n/* The shuffle operation goes here */\n```\n\nThe input to the\
    \ shuffle is the set of all the `myMap` map output files that contain (word, frequency)\
    \ pairs for all the words in the text file subsets. The output of the shuffle\
    \ function is an intermediate key (the word) and the list of all the word frequency\
    \ counts for that word across all the files in the catalog. Each of these goes\
    \ to a reduce function and this operation continues until all the `myMap` output\
    \ files are exhausted. The shuffle operation can take a long time (longer than\
    \ the map or reduce) because it will end up doing a lot of I/O between processing\
    \ elements as it moves data from the map output files to the reduce inputs.\n\n\
    ```\nreduce(String intermediate_key, Iterator value_list) {\n/* intermediate_key\
    \ is a word from the documents */\n/* value_list is the list of counts of that\
    \ word */\nint result = 0;\nfor each value in value_list do {\nresult += value;\n\
    }\nreturn result;\n}\n```"
  raw: '### Pattern 2: Manager/Worker


    In this pattern, a single Manager task will set up a number of concurrent Worker
    threads or processes, alongside a single bag of tasks. Each Worker will take a
    task out of the bag and execute it in parallel; as they finish, Workers will continue
    to take tasks out of the bag and execute them until the bag is empty, or some
    other ending condition has occurred. The bag of tasks is typically implemented
    as a shared queue. The *Manager/Worker* pattern is particularly useful for *embarrassingly
    parallel* programs (see Figure [15-2](#270563_3_En_15_Chapter.xhtml#Fig2)), where
    a large number of worker tasks have no dependencies.


    ![](images/270563_3_En_15_Chapter/270563_3_En_15_Fig2_HTML.jpg)


    A diagram illustrates a circle labeled Manager comprising the blocks from A to
    E. The blocks are pointed individually at the bottom by the manager. The blocks
    are marked as workers.


    Figure 15-2


    Manager/Worker pattern implementing an embarrassingly parallel problem


    ### Pattern 3: Map and Reduce


    Like *Manager/Worker*, the *Map and Reduce* patterns are very well suited for
    pleasingly parallel problems. The *Map and Reduce* patterns can be used separately
    and they often are.


    The *Map pattern* is likely the simplest pattern you’ll run into. Map applies
    part of the program, let’s call it a function, to every element of the data in
    parallel. The functions must have no side effects, be identical, and independent.
    Because of this independence, Map can take advantage of as many units of execution
    as are available.


    Used with the *Map pattern*, the *Reduce pattern* combines all the elements of
    the collection of partial solutions pairwise and creates a summary value as the
    overall solution. While commutativity is not required for the combination of the
    partial solutions, most applications of Reduce assume both commutativity and associativity.
    Figure [15-3](#270563_3_En_15_Chapter.xhtml#Fig3) shows an example of how combining
    Map and Reduce works.


    ![](images/270563_3_En_15_Chapter/270563_3_En_15_Fig3_HTML.jpg)


    A flow diagram starts from the program and splits into 4 data. Each data proceeds
    through a function and obtains another data. Two adjacent data proceed through
    the reduction, and a solution is obtained after the final reduction.


    Figure 15-3


    Illustration of an implementation of Map, followed by Reduce


    In OpenMP, the `#pragma omp parallel for` compiler directive will initiate a Map
    operation for a for-loop that is in a program that is pleasingly parallel. Adding
    a *reduction(+: <var-list>)* to the compiler directive will add the Reduce component.
    For the trapezoid rule program in Chapter [14](#270563_3_En_14_Chapter.xhtml)
    the main for loop looked like


    ```

    #pragma omp parallel for private(x) reduction(+:sum)

    /* loop to compute the area under f(x) */

    for (int i = 0; i <= steps; i++) {

    x = i * width;

    sum = sum + f(x);

    }

    ```


    ### Pattern 4: MapReduce


    A variation of using the *Map and Reduce* patterns that combines the two to accomplish
    a common task is the *MapReduce* pattern that was first published in 2004.^([^(251)](#fn251))
    The *MapReduce* pattern is intended solve problems where the main goal is to input,
    process, and generate large data sets and where the implementation is scalable
    across many processors. The implementation of *MapReduce* performs three essential
    functions:


    *   *Mapping*, in which the program divides up a large data set (or a large set
    of files) into N discrete and independent subsets, each of which will be processed
    on a single processor. The output is typically a map data structure of some kind
    containing lists of not necessarily unique (key, value) pairs.


    *   *Shuffle*, in which the program extracts similar (key, value) pairs and assigns
    them to a new processor where the Reduce operation will happen.


    *   *Reduce*, where the elements in an input dataset are combined into a single
    result that is output. The list of the results from each processor constitutes
    the generated output dataset.


    As an example of a use of MapReduce to solve a large problem, let’s say that we
    have a large catalog of text documents. Our objective is to create a single list
    of [word, frequency] pairs that tells us all the unique words in all the documents
    and how many times each of those words occur. A solution to this type of problem
    would be useful in problems in cryptography or in the statistical analysis of
    texts, say for author attribution studies. Figure [15-4](#270563_3_En_15_Chapter.xhtml#Fig4)
    shows us how such a system might look.


    ![](images/270563_3_En_15_Chapter/270563_3_En_15_Fig4_HTML.jpg)


    A flow diagram starts from a program and splits into 4 text files. Each text file
    creates a word list and proceeds through the shuffling and reduction phases before
    obtaining the solution at the end.


    Figure 15-4


    A use of MapReduce to find word frequencies across a large set of text files


    In this solution, we start with a catalog of text files, which we divide into
    subsets, and assign each subset to an instance of the program on a processor.
    The program then creates a list of words and their frequencies for each of the
    words across all the documents in its subset. The shuffle operation then takes
    each unique word in each of the words lists and assigns it to a reduce process.
    So, for example, all the (“cat”, value) pairs from all the word lists end up as
    inputs to the same reduce process. Each reduce process then accumulates all the
    values of all the unique words to create the overall solution.


    Pseudo-code for the map and reduce portions of this program might look as follows:^([^(252)](#fn252))


    ```

    map(DocumentID docID_key, String input_value) {

    /* docID_key is the name of the document */

    /* input_value is the contents of the document */

    Create a Map called myMap;

    for each word in input_value do {

    if (myMap.contains(word)) then

    myMap.put(word, myMap.get(word) + 1);

    else

    myMap.put(word, 1);

    }

    return myMap;

    }

    /* The shuffle operation goes here */

    ```


    The input to the shuffle is the set of all the `myMap` map output files that contain
    (word, frequency) pairs for all the words in the text file subsets. The output
    of the shuffle function is an intermediate key (the word) and the list of all
    the word frequency counts for that word across all the files in the catalog. Each
    of these goes to a reduce function and this operation continues until all the
    `myMap` output files are exhausted. The shuffle operation can take a long time
    (longer than the map or reduce) because it will end up doing a lot of I/O between
    processing elements as it moves data from the map output files to the reduce inputs.


    ```

    reduce(String intermediate_key, Iterator value_list) {

    /* intermediate_key is a word from the documents */

    /* value_list is the list of counts of that word */

    int result = 0;

    for each value in value_list do {

    result += value;

    }

    return result;

    }

    ```'
  trans: '

    ### 模式 2：管理者/工作者


    在此模式中，一个单一的管理者任务将设置多个并发的**工作者**线程或进程，以及一个单一的任务包。每个工作者将从包中取出一个任务并并行执行；当任务完成后，工作者将继续从包中取出任务并执行，直到包为空或满足其他结束条件。任务包通常实现为共享队列。*管理者/工作者*模式特别适用于*易并行*程序（见图
    15-2），其中大量工作者任务之间没有依赖关系。


    ![](img/270563_3_En_15_Fig2_HTML.jpg)


    图示为一个标有“管理者”的圆圈，包含从 A 到 E 的模块。这些模块由管理者分别指向底部。这些模块被标记为工作者。


    图 15-2


    实现易并行问题的管理者/工作者模式


    ### 模式 3：映射与归约


    与*管理者/工作者*类似，*映射与归约*模式也非常适合易并行问题。*映射*和*归约*模式可以单独使用，而且通常如此。


    *映射模式*可能是你遇到的最简单的模式。映射将程序的一部分（我们称之为函数）并行应用于数据的每个元素。这些函数必须没有副作用，完全相同且相互独立。由于这种独立性，映射可以利用尽可能多的执行单元。


    与*映射模式*结合使用时，*归约模式*将部分解集合中的所有元素两两组合，并创建一个汇总值作为整体解。虽然归约不要求组合操作满足交换律，但大多数归约应用都假设同时满足交换律和结合律。图
    15-3 展示了映射与归约如何协同工作的示例。


    ![](img/270563_3_En_15_Fig3_HTML.jpg)


    流程图从程序开始，分成 4 个数据。每个数据经过一个函数处理后得到另一个数据。相邻的两个数据经过归约，最终归约后得到解。


    图 15-3


    映射后接归约的实现示意图


    在 OpenMP 中，`#pragma omp parallel for` 编译器指令将为易并行程序中的 for 循环启动映射操作。在编译器指令中添加 `reduction(+:
    <var-list>)` 将添加归约组件。对于第 14 章的梯形法则程序，主 for 循环如下所示：


    ```

    #pragma omp parallel for private(x) reduction(+:sum)

    /* 计算 f(x) 下面积的循环 */

    for (int i = 0; i <= steps; i++) {

    x = i * width;

    sum = sum + f(x);

    }

    ```


    ### 模式 4：MapReduce


    *MapReduce* 模式是*映射与归约*模式的一种变体，它将两者结合以完成常见任务，该模式于 2004 年首次发表。^(²⁵¹) *MapReduce*
    模式旨在解决主要目标是输入、处理并生成大型数据集的问题，并且其实现可在多个处理器上扩展。*MapReduce* 的实现执行三个基本功能：


    *   *映射*：程序将大型数据集（或大型文件集）划分为 N 个离散且独立的子集，每个子集将在单个处理器上处理。输出通常是某种映射数据结构，包含不一定唯一的（键，值）对列表。


    *   *混洗*：程序提取相似的（键，值）对，并将它们分配给一个新的处理器，在该处理器上执行归约操作。


    *   *归约*：将输入数据集中的元素合并为单个结果并输出。每个处理器产生的结果列表构成生成的输出数据集。


    以使用 MapReduce 解决大型问题为例，假设我们有一个大型的文本文档目录。我们的目标是创建一个 [单词，频率] 对列表，该列表告诉我们所有文档中所有唯一的单词以及每个单词出现的次数。此类问题的解决方案在密码学或文本统计分析（例如作者归属研究）中会很有用。图
    15-4 展示了这样一个系统可能的样子。


    ![](img/270563_3_En_15_Fig4_HTML.jpg)


    流程图从程序开始，分成 4 个文本文件。每个文本文件创建一个单词列表，经过混洗和归约阶段后，最终得到解。


    图 15-4


    使用 MapReduce 在大型文本文件集中查找单词频率


    在此解决方案中，我们从文本文件目录开始，将其划分为子集，并将每个子集分配给处理器上的一个程序实例。然后，程序为其子集中的所有文档创建一个单词及其频率的列表。接着，混洗操作获取每个单词列表中的每个唯一单词，并将其分配给一个归约进程。因此，例如，所有单词列表中的所有（“cat”，值）对最终都作为输入进入同一个归约进程。然后，每个归约进程累加所有唯一单词的所有值，以创建整体解。


    该程序的映射和归约部分的伪代码可能如下所示：^(²⁵²)


    ```

    map(DocumentID docID_key, String input_value) {

    /* docID_key 是文档的名称 */

    /* input_value 是文档的内容 */

    创建一个名为 myMap 的映射；

    对于 input_value 中的每个单词 do {

    如果 (myMap.contains(单词)) 则

    myMap.put(单词, myMap.get(单词) + 1);

    否则

    myMap.put(单词, 1);

    }

    返回 myMap;

    }

    /* 混洗操作在此处进行 */

    ```


    混洗的输入是所有 `myMap` 映射输出文件的集合，这些文件包含文本文件子集中所有单词的（单词，频率）对。混洗函数的输出是一个中间键（单词）以及该单词在目录中所有文件中所有词频计数的列表。每个这样的输出都进入一个归约函数，此操作持续进行，直到所有
    `myMap` 输出文件处理完毕。混洗操作可能需要很长时间（比映射或归约更长），因为它在将数据从映射输出文件移动到归约输入时，会在处理元素之间进行大量 I/O
    操作。


    ```

    reduce(String intermediate_key, Iterator value_list) {

    /* intermediate_key 是文档中的一个单词 */

    /* value_list 是该单词的计数列表 */

    int result = 0;

    对于 value_list 中的每个值 do {

    result += value;

    }

    返回 result;

    }

    ```

