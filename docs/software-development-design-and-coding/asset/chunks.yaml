    ## 单一职责原则（SRP）


    该原则指出，一个类应该只有一个，且仅有一个，需要变更的理由。^(¹⁹³)


    以下是上述设计原则之间重叠的一个例子：SRP、关于封装的第一条原则以及 DRY 原则都表达了相似但略有不同的含义。封装是关于抽象行为，并将设计中可能变化的部分放在同一位置。DRY
    是关于通过将相同的行为放在同一位置来避免重复代码。SRP 则是关于设计你的类，使得每个类只做一件事。


    每个对象都应该有单一的职责，并且该对象的所有服务都旨在履行这一职责。*每个类应该只有一个需要变更的理由*。简单来说，这意味着要警惕你的类试图做太多事情。


    举个例子，假设你正在为一部手机编写嵌入式代码。经过与市场部门数月（真的）的讨论后，你对`MobilePhone`类的初稿如图 12-7 所示。


    ![](img/270563_3_En_12_Fig7_HTML.jpg)


    一个手机的 UML 类图，列出了属性和操作。属性包括电话号码（long 类型）。操作包括诸如获取电话号码（long）、拨打电话（long）和连接到网络（long）等方法。


    图 12-7


    一个非常繁忙的 MobilePhone 类


    这个类似乎囊括了你希望手机做的很多事情，但它以多种方式违反了 SRP。该类没有*单一的职责*；它有很多职责。它不是在尝试做一件事，而是试图做太多事情：拨打和接听电话；创建、发送和接收短信；创建、发送和接收图片；以及浏览互联网。但你不想让一个单一的类受到所有这些完全不同的需求的影响。你不想每次图片格式改变、每次你想添加新的图片编辑功能、或者每次浏览器更新时都去修改`MobilePhone`类。相反，你应该将这些功能分离到不同的类中，以便它们可以彼此独立地进行变更。那么，如何识别哪些东西应该移出这个类，哪些东西应该保留呢？请看图
    12-8。


    ![](img/270563_3_En_12_Fig8_HTML.jpg)


    一个 UML 图，包含标记为 Mobile、PhoneCall、Picture 和 TextMsg 的类，每个类都包含与手机操作相关的方法，例如拨打电话、拍摄和发送图片、以及创建和发送短信。


    图 12-8


    每个都具有单一职责的手机类


    在这个例子中，你问的问题是“手机（对自己）做了什么？”，而不是“手机提供了哪些服务？”。通过提出这样的问题，你可以开始分离设计中对象的职责。在这种情况下，你可以看到手机本身可以获取自己的电话号码、初始化自身、并连接到移动电话网络。另一方面，所提供的服务实际上与手机本身是独立的，因此可以分离到`PhoneCall`、`TextMsg`和`Picture`类中。于是你将最初的一个类拆分成四个独立的类，每个类都有单一的职责。这样，你可以更改这四个类中的任何一个，而不会影响其他类。然后你添加一个`Controller`类来运行手机本身并与现有服务交互，这也允许你在未来添加新的服务/类。你简化了设计（尽管类变多了），并使其更易于扩展和修改。这难道不是一个伟大的原则吗？


    ## 里氏替换原则（LSP）


    里氏替换原则以图灵奖得主、麻省理工学院的芭芭拉·利斯科夫博士命名，它告诉我们所有子类必须能够替换其基类。^(¹⁹⁴) 该原则要求继承^(¹⁹⁵) 必须设计良好且行为规范。任何实例化为子类的对象都应该能够无缝地使用基类的所有功能。


    违反里氏替换原则最经典、最典型的例子之一就是矩形/正方形示例。这个例子在互联网上随处可见；罗伯特·马丁在他的书《敏捷软件开发：原则、模式与实践》^(¹⁹⁶)
    中给出了这个例子的一个精彩变体，我们将遵循他的版本。以下是 Java 代码。


    假设你有一个名为`Rectangle`的类，它代表几何形状矩形：


    ```

    /**

    * class Rectangle

    */

    public class Rectangle {

    private double width;

    private double height;

    /**

    * Constructor for objects of class Rectangle

    */

    public Rectangle(double width, double height) {

    this.width = width;

    this.height = height;

    }

    public void setWidth(double width) {

    this.width = width;

    }

    public void setHeight(double height) {

    this.height = height;

    }

    public double getHeight() {

    return this.height;

    }

    public double getWidth() {

    return this.width;

    }

    }

    ```


    当然，你的一个用户希望能够同时操作正方形和矩形。你已经知道正方形只是矩形的一种特殊情况。换句话说，正方形*是一种*矩形。因此，这个问题似乎需要使用继承。于是你创建了一个继承自`Rectangle`的`Square`类：


    ```

    /**

    * class Square

    */

    public class Square extends Rectangle {

    /**

    * Constructor for objects of class Square

    */

    public Square(double side) {

    super(side, side);

    }

    public void setSide(double side) {

    super.setWidth(side);

    super.setHeight(side);

    }

    public double getSide() {

    return super.getWidth();

    }

    }

    ```


    注意，因为`Square`的宽度和高度相同，你不能冒险单独改变它们，所以`setSide()`使用`setWidth()`和`setHeight()`来同时设置`Square`的边长。没什么大不了的，对吧？


    好吧，如果你有一个像这样的函数：


    ```

    void myFunc(Rectangle r, double newWidth) {

    r.setWidth(newWidth);

    }

    ```


    并且你向`myFunc()`传递一个`Rectangle`对象，它工作得很好，改变了矩形的宽度。但是如果你向`myFunc()`传递一个`Square`对象呢？嗯，事实证明在
    Java 中会发生和之前相同的事情，但这是*错误的*。它只改变了`Square`对象的宽度而没有同时改变其高度，从而违反了`Square`对象的完整性。因此，你在这里违反了
    LSP，并且在不改变`Square`行为的情况下，`Square`无法替代`Rectangle`。LSP 指出子类（`Square`）应该能够替代超类（`Rectangle`），但在这个例子中它做不到。


    为了解决这个问题，你可以在`Square`中覆盖`Rectangle`类的`setWidth()`和`setHeight()`方法，如下所示：


    ```

    public void setWidth(double w) {

    super.setWidth(w);

    super.setHeight(w);

    }

    public void setHeight(double h) {

    super.setWidth(h);

    super.setHeight(h);

    }

    ```

