- fmt: "# The Right Tools and the Right Practices for This Project\n\nOne of the best\
    \ things about software development is that every project is different. Even if\
    \ you’re doing version 8.0 of an existing product, things change. One implication\
    \ of this is that, for every project, you need to examine and pick the right set\
    \ of development tools. Picking tools that are inappropriate is like trying to\
    \ hammer nails with a screwdriver; you might be able to do it eventually, but\
    \ it sure isn’t easy or pretty or fun, and you can drive a lot more nails in a\
    \ shorter period of time with a hammer than with a screwdriver. Even if you have\
    \ to first obtain a hammer and then learn how to use it for the very first time,\
    \ you are leveling up your toolkit and your skills in the process, investing in\
    \ your ability to work more efficiently going forward.\n\nThe three most important\
    \ factors in choosing tools are the application type you are writing, the target\
    \ platform, and the development platform. You usually can’t do anything about\
    \ any of these three things, so once you know what they are, you can pick tools\
    \ that improve your productivity. A fourth and nearly as important factor in tool\
    \ choice is the composition and experience of the development team. If your team\
    \ are all experienced developers with facility on multiple platforms, tool choice\
    \ is much easier. If, on the other hand, you have a bunch of fresh-outs and your\
    \ target platform is new to all of you, you’ll need to be careful about tool choice\
    \ and fold in time for training and practice with the new tools.\n\n## Conclusion\n\
    \nSoftware development is the heart of every software project, and it is the heart\
    \ of software engineering. Its objective is to deliver excellent, defect-free\
    \ code to users on time and within budget—all in the face of constantly changing\
    \ requirements. This makes development a particularly hard job to do. But finding\
    \ a solution to a difficult problem and getting your code to work correctly is\
    \ just about the coolest feeling in the world.\n\n> *“[Programming is] the only\
    \ job I can think of where I get to be both an engineer and an artist. There’s\
    \ an incredible, rigorous, technical element to it, which I like because you have\
    \ to do very precise thinking. On the other hand, it has a wildly creative side\
    \ where the boundaries of imagination are the only real limitation. The marriage\
    \ of those two elements is what makes programming unique. You get to be both an\
    \ artist and a scientist. I like that. I love creating the magic trick at the\
    \ center that is the real foundation for writing the program. Seeing that magic\
    \ trick, that essence of your program, working correctly for the first time, is\
    \ the most thrilling part of writing a program.”*\n> \n> —Andy Hertzfeld (designer\
    \ of the first Mac OS)^([⁴](#fn4))\n\n# Part I: Models and Team Practices\n\n\
    # 2. Software Process Models\n\n> *If you don’t know where you’re going, any road\
    \ will do.*\n> \n> *If you don’t know where you are, a map won’t help.*\n> \n\
    > —Watts Humphrey\n\nThe process of developing software is commonly described\
    \ as the Software Development Lifecycle (SDLC). Every program, no matter how small,\
    \ has a life cycle, broadly composed of the following steps:\n\n1.  Conception\n\
    2.  Requirements gathering/exploration/modeling\n3.  Design\n4.  Coding and debugging\n\
    5.  Testing\n6.  Release\n7.  Maintenance/software evolution\n8.  Retirement\n\
    \nYour development process may combine multiple steps or iterate over a subset\
    \ of steps repeatedly between releases, but, in one form or another, all development\
    \ should encompass all of the above life cycle steps in order to create high-quality\
    \ software. The two most common variations are *plan-based models*^([⁵](#fn5))\
    \ and the newer *agile development* models.^([⁶](#fn6))\n\nWith plan-based development,\
    \ the project team will generally do a complete life cycle (at least steps 2 through\
    \ 7) before going back in the SDLC to start working on the next version of the\
    \ product. In plan-driven models, the methodology tends to be stricter in terms\
    \ of process steps and when releases happen. Plan-driven models have more clearly\
    \ defined phases and more requirements for sign-off on completion of a phase before\
    \ moving on to the next phase. Plan-driven models require more documentation at\
    \ each phase and verification of completion of each work product. They tend to\
    \ work well for large contracts for new software with well-defined deliverables.\n\
    \nIn agile development, which is more prevalent now, the project team will usually\
    \ iterate over a partial life cycle (usually steps 3 through 5) several times\
    \ before proceeding to the release step. The agile models are inherently incremental\
    \ and operate under the assumption that small, frequent releases produce a more\
    \ robust product than larger, less frequent ones. Phases in agile models tend\
    \ to blur together more than in plan-driven models, and there tends to be less\
    \ documentation of work products required, the basic idea being that code is what\
    \ is being produced and so developer efforts should focus there. See the Agile\
    \ Manifesto web page at [`https://agilemanifesto.org`](https://agilemanifesto.org/)\
    \ to get a good feel for the agile development model and goals.\n\nThere is no\
    \ one best process for developing software. Each project must decide on the model\
    \ that works best for its particular application and base that decision on the\
    \ project domain, the scope of the project, the experience of the team, and the\
    \ timeline of the project. In this chapter, we begin by reviewing the shared variables\
    \ of software development projects, followed by a discussion of the different\
    \ broadly defined approaches, and finally we take a look at several prominent\
    \ specific software model implementations as well as how they can be hybridized\
    \ together."
