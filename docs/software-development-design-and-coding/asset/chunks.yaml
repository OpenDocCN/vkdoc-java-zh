  trans: "\n# 3. 项目管理基础\n\n> *“任何项目的第一步，都是严重低估其复杂性和难度。”*\n> \n> ——尼科尔·亨特\n\n项目一旦启动，就需要进行管理。你需要管理进度、人员、流程，而最重要的是管理好你自己（无论你在团队中扮演什么角色）。管理开发没有唯一正确的方法，但有一些方法可以做得很好，而更多的方法则会导致糟糕的结果。多年来，我们确实发现了一些成功与失败的方法，所以让我们努力让你的旅程少一些风险。外面的世界很危险，请收下这一章！\n\
    \n从事个人开发项目以外的任何工作都意味着在团队中工作；而在团队中工作则意味着被管理，无论是来自上级还是来自内部。因此，从双方角度学习项目管理是学习软件开发的重要组成部分。项目管理可以被视为管理工作和管理人员，因此我们将本章分为两个主要部分：\n\
    \n1.  *项目规划*：日常任务的管理方式在很大程度上取决于所选的软件开发模型，你在前一章已经了解过。剩下的部分是在项目开始之前需要确立的项目要素（即项目规划任务）：\n\
    \    1.  组织架构\n\n    2.  风险分析\n\n    3.  资源需求\n\n    4.  任务估算与进度安排\n\n    5. \
    \ 缺陷管理\n\n2.  *软技能意识开发*：在任何项目中，必须管理的最重要且最复杂的方面是人。开发人员和管理者不仅是一种宝贵的资源，更是开发生态系统的核心。维护和支持这个具有复杂动态的生态系统，不仅会影响当前项目的成功，还会影响后续所有项目。在本章的后半部分，我们将通过讨论以下内容，回顾我们为何以及如何在开发过程中努力成为“软技能意识开发者”：\n\
    \    1.  团队协作的阴暗面\n\n    2.  支持个体\n\n    3.  支持文化\n\n    4.  将冲突视为机遇\n\n    5.\
    \  团队协作的产物\n\n## 项目规划\n\n项目计划是一个很好的工具，用于明确你认为自己正在做的事情、如何完成的概要，以及你计划如何执行该概要。项目计划的问题在于，一旦它被编写并签署，高层管理人员就会认为项目将完全按照计划中所述的方式运行。但项目的现实往往会挫败计划。\n\
    \n项目规划是永恒的；它贯穿项目的整个生命周期。“计划”从来都不是一成不变的，因为典型的软件项目通常处于不断变化之中。在使用计划驱动流程模型的项目中，项目计划是一份由项目经理编写、开发团队和高层管理人员批准并签署的实际文档。实际上，它是一份*合同*，尽管是滚动式的，规定了团队将要做什么以及如何做。它说明了项目将如何管理，在最极端的计划驱动项目中，甚至规定了文档本身如何以及何时进行修改。\n\
    \n### 项目规划：组织架构\n\n在工作开始之前，你需要决定如何组织开发。如果你与经验丰富的团队合作，可以重用之前的组织文档，但绝不应跳过这一步。项目组织的两个主要方面（通常相互交织）是开发工作和人员：\n\
    \n*   你打算如何*组织产品*？（瀑布式还是迭代式开发？版本控制工具？项目范围与进度？）\n\n*   你打算如何*组织制造产品的人员*？（团队组织/层级结构是什么？每个人何时以及如何沟通与协调？）\n\
    \n在所有利益相关者之间就进度安排和期望达成明确共识并拥有精确的共同理解至关重要。选择开发流程模型（见前一章）将为你提供许多关于如何组织项目的答案。例如，任何敏捷项目都将围绕功能展开，并需要迭代进度安排，每次迭代都以规划开始，以最小可行产品结束。敏捷团队在层级上是扁平且自组织的，由团队（而非项目经理）拥有敏捷项目计划，并要求在多种开放渠道上进行频繁沟通。敏捷团队还共同拥有所有代码，因此要求每个人都遵循共享的代码管理实践，例如用于源代码控制的\
    \ git-flow 分支策略。将流程模型从敏捷缩小到具体实现（如 XP、Scrum、Crystal、功能驱动开发等）将进一步明确组织产品和人员的细节。\n"
- fmt: '### Project Planning: Risk Analysis


    Next we need to think about risk analysis. What can possibly go wrong with a project
    and what will we do when it does? Let’s look at some possible risks^([^(34)](#fn34)):


    - **Schedule slips**: That task that you estimated would take three days has just
    taken three weeks. In a plan-driven project, this can be an issue if you don’t
    have regular status meetings. Waiting three weeks to tell your boss that you’re
    late is always worse than telling her that you’ll be late as soon as you know
    it. Don’t put off delivering bad news. In an agile project, this is unlikely because
    most agile projects have a daily status meeting (or stand-up). This way schedule
    slips are noticed almost immediately, and corrective action can take place quickly.


    - **Excessive defect rate**: Your testing is finding lots of bugs. What do you
    do: continue to add new features or stop to fix the bugs? Again, this can be a
    real issue in a project where integration builds happen according to a fixed schedule,
    say once a week. In a project where integrations happen every day, or every time
    a new feature is added, you can keep up with defects more easily. In either case,
    if you are experiencing a high defect rate, the best thing to do is to stop, take
    a look around, and find the root cause of the defects before adding more functionality.
    This can be very hard to do from a project management standpoint, but you’ll thank
    yourself in the end.


    - **Misunderstood requirements**: What you’re doing isn’t what the customer wanted.
    This classic problem is the result of the fact that customers and developers live
    in two different worlds. The customer lives in the application domain where they
    understand from a user’s perspective what they want the product to do. The developer
    understands from a technical perspective how the product will work. Occasionally,
    these worlds intersect and that’s good, but often they don’t and that is where
    you get a misunderstanding of requirements. The best approach is to have the customer
    on site as often as possible and to produce deliverable products as often as possible.


    - **Requirements churn**: New features, altered features, deleted features… Never-ending
    requirements churn is probably the largest single reason for missed delivery dates,
    high defect rates, and project failure. Churn happens when the customer (or your
    own marketing folks, or the development team itself) continues to change requirements
    while development is underway. It leads to massive amounts of rework in the code,
    retesting of baselines, and delay after delay. Managing requirements is the single
    most important job of the project manager. In a plan-driven process, a change
    control board (CCB) examines each new requirement and decides whether to add it
    to the list of features to be implemented. There may be a member of the development
    team on the CCB, but that’s not required, so the danger here is that the CCB adds
    new features without understanding all the scheduling and effort ramifications.
    In agile processes, the development team keeps control of the prioritized requirements
    list (called the product backlog in Scrum), and only adjusts the list at set points
    in the project—after iterations in XP and after each sprint in Scrum.


    - **Turnover**: Your most experienced developer decides to join a start-up three
    weeks before product delivery. The best way to reduce turnover is to (1) give
    your developers interesting work, (2) have them work in a pleasant environment,
    and (3) give them control over their own schedules. Oddly enough, money is not
    one of the top motivators for software developers. This doesn’t mean they don’t
    want to get paid well, but it does mean that throwing more money at them in order
    to get them to work harder or to keep them from leaving doesn’t generally work.
    Still, despite your best efforts, some developers will leave. The best way to
    mitigate the effect of turnover is to spread the knowledge of the project around
    all the members of the development team. Principles like *common code ownership*
    and techniques like *pair programming* work to invest all the team members in
    the project and spread the knowledge of the code across the entire team. We will
    talk more about how to support developers and maintain a healthy workplace culture
    in the “Soft-Aware Development” section of this chapter.


    Once you’ve got a list of the risks to your project, you need to address each
    one and talk about two things: *avoidance* and *mitigation*. For each risk, think
    about how you can avoid it. Build slack into your schedule, do constant code reviews,
    freeze requirements early, do frequent releases, require pair programming so you
    spread around the knowledge of the code, and the like. Then you need to think
    about what you’ll do if the worst-case scenario does happen; this is *mitigation*.
    Remove features from a release, stop work on new features and do a bug hunt, negotiate
    new features into a future release, and so on. If a risk becomes a reality, you’ll
    have to do *something* about it; it’s better to have planned what you’ll do beforehand.


    Once you address avoidance and mitigation, you’ll have a plan on how to handle
    your identifiable risks. This doesn’t completely let you off the hook because
    there are bound to be risks you miss, but the experience of addressing the risks
    you do come up with will enable you to better handle new ones that surprise you
    during the project. When using an iterative process model, it’s a good idea to
    revisit your risks after each iteration and see which ones have changed, identify
    any new ones, and remove any that can no longer happen.


    ### Project Planning: Resource Requirements


    Your project needs resources. How many people do you need for the project? Do
    they all need to start at once, or can their starting dates on the project be
    staggered as phases are initiated? How many computers do you need? What software
    will you be using for development? What development environment do you need? Is
    everyone trained in that environment? What support software and hardware do you
    need? Yes, you do need a configuration management system and a stand-alone build
    machine (typically a virtual machine on a cloud server), no matter what process
    model you’re using. Having a single machine where you build a new version of the
    product every day allows you to control all the variables in a compilation and
    build. This includes, but isn’t limited to, the version of the operating system
    the build machine is using and the exact version of each library that your program
    is using. This consistent build environment makes sure that you get the correct
    version of the new product build every time.


    The platform you’re targeting and the application domain in which you are working
    answer many of these resource questions, so that’s the easy part. Questions about
    team size, start dates, and phases of the project will likely not be able to be
    answered until you do a first cut at effort estimation and scheduling, so an iterative
    approach may be of use here. Additionally, some resources can present tradeoffs
    or force changes to the project’s scope. Considering alternatives may require
    the participation of all immediate stakeholders.'
