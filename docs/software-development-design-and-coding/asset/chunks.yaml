  trans: '

    ### 并行语言特性


    几乎所有并行编程语言、API 和库都包含某些特性，能够帮助你轻松地将串行解决方案转化为可扩展的并行解决方案。以下是一份部分并行语言特性列表，供你入门参考：


    *线程*：大多数并行语言都包含执行线程的概念。这些语言通常会提供一组特性，允许你创建和销毁线程、管理线程、让线程等待，以及重新合并到主程序线程。这些语言还可能允许线程共享数据。


    *同步*：所有并行语言都包含允许你同步不同处理器的工作，并将部分解的结果合并起来的特性。这在运行于共享内存机器（如多核处理器）上的细粒度程序中尤为重要。一种常见的同步技术是*屏障*。*屏障*是一段代码，它会强制所有线程停止执行，直到所有其他线程都到达其计算中的同一点。例如，在
    OpenMP 中，循环结构会创建一个屏障，该屏障不允许任何线程在循环结束后继续执行，直到所有线程都完成循环的执行。


    *互斥与锁定*：在并发编程中，两个或多个执行线程通常必须共享资源。发生这种情况时，必须小心避免*竞态条件*。例如，如果一个线程更改了共享变量的值，而另一个线程正试图读取或写入该相同值，就会发生竞态条件。*互斥*通过要求每个线程包含一段*临界区*代码来解决此问题，在该临界区中，线程拥有对资源的唯一控制权，因此没有其他线程可以访问该资源（即，禁止其他线程同时进入其自身的临界区）。这种互斥通常通过使用一个单独的变量（称为*互斥锁*）来实现，线程会设置该变量以获取对资源的控制权，并锁定所有其他线程，直到资源被释放。互斥的原始概念源自
    Dijkstra。^(²³⁶) 所有并行编程语言都包含实现互斥的特性。作为互斥锁工作原理的示例，请考虑面向对象语言中的以下类：


    ```

    class Mutex {

    public void lock() { // 定义在此处 }

    public void unlock() { // 定义在此处 }

    private boolean locked;

    }

    ```


    互斥锁对象可用于标记线程何时进入和退出其临界区：


    ```

    Mutex m = new Mutex(); // 创建 Mutex 类的单个实例

    ...

    m.lock();

    // 临界区

    ...

    m.unlock();

    ```


    任何其他调用 `lock()` 方法的线程都必须等待，直到第一个线程解锁互斥锁。通过这种方式，对共享变量的更改被保留在临界区内，并保持同步。


    *访问共享内存*：大多数并行编程语言都假定你使用的是共享内存模型的某种变体，因此包含允许线程访问共享内存变量并控制对其访问的特性（请参见上面的互斥）。


    *归约*：当你的程序生成多个线程，每个线程都将计算问题的一部分解时，你必须有一种方法来收集部分解，并将它们*归约*为整个问题的单一解。许多并行语言都提供了一种特性，让你可以告诉程序如何进行归约。稍后当我们讨论
    OpenMP 时，你将看到它是如何工作的。


    ### 并行语言特性：Java 线程


    Java 有多个用于创建并行程序的库。可用的最基本库是 `java.lang` 包中的 `Thread` 类。`Thread` 类提供了创建和管理执行线程的基本功能。你还可以通过创建一个实现
    `Runnable` 接口的类，或使用 `java.util.concurrent` 包中提供的工具来创建新的线程。当 Java 程序执行时，始终至少有一个执行线程在运行，即主线程。


    以下可能是创建和使用 Java 新线程的最简单示例：


    ```

    /**

    * 启动和运行 Java 线程的最简单示例

    * 这个新线程将只打印 "MyThread is running" 然后退出。

    */

    public class MakeAThread {

    /** 创建一个内部类作为新线程 */

    public static class MyThread extends Thread {

    /** 线程必须有一个 run 方法 */

    @Override

    public void run(){

    System.out.println("MyThread is running");

    }

    }

    public static void main(String [] args) {

    MyThread myThread = new MyThread();

    /** 始终使用 start() 方法启动新线程 */

    myThread.start();

    }

    }

    ```


    在这个程序中，你创建了一个内部类，它是 `Thread` 类的子类，其实例执行新线程的工作。在你的 `main()` 方法中，你创建了新线程并启动它。在调用
    `start()` 方法之前，你实际上并没有一个线程，此时你就有两个线程在执行了。`start()` 方法会自动调用新线程的 `run()` 方法，当它退出时，`Thread`
    对象也会退出。你还可以通过实现 `Runnable` 接口，然后创建新的 `Thread` 对象来创建新的执行线程。以下是相同的示例，但这次使用了 `Runnable`
    接口：


    ```

    /**

    * 第二种方式

    * 创建一个启动和运行 Java 线程的简单示例

    */

    public class MakeARunnableThread {

    /** 创建一个内部类作为新线程 */

    public static class MyRunnable implements Runnable {

    /** Runnable 必须有一个 run 方法 */

    @Override

    public void run(){

    System.out.println("MyRunnableThread is running");

    }

    }

    public static void main(String [] args) {

    /* 我们创建一个新线程，并将 Runnable 对象传递给它执行 */

    Thread myThread = new Thread(new MyRunnable());

    /** 始终使用 start() 方法启动新线程 */

    myThread.start();

    }

    }

    ```


    请注意，在此示例中，你仍然必须创建一个新的 `Thread` 实例，但你可以将新的 `Runnable` 对象的实例传递给 `Thread` 构造函数。其他所有内容都与上面相同。


    当你使用 Java 线程时，每个新线程都会被赋予一个*优先级*，并且 Java 虚拟机 (JVM) 包含一个线程调度器，负责对线程执行进行排序。调度器会根据可用的处理器数量和每个线程的优先级来改变执行顺序。有几种方法可以控制线程的调度。


    第一种是使用 `Thread.sleep()` 方法强制线程进入休眠状态。该线程将被阻塞，另一个线程将被选中执行。当休眠的线程醒来时，它将被放入执行队列中。另一种改变线程调度的方法是更改其优先级。所有线程在创建时都有一个整数值作为其优先级；值的范围从
    1 到 10，数字越大表示优先级越高。`Thread` 类的 `getPriority()` 和 `setPriority()` 方法允许你操作线程的优先级，从而影响其何时被调度运行。

    '
- fmt: 'Java 的 `Threads` 接口提供了对线程创建和管理的非常底层的控制。这实际上使得在 Java 中进行多线程编程比原本可能的方式更加困难。如果你编写一个创建多个线程的程序，那么这些线程的调度以及共享变量的管理会显著增加程序的开销。它还可能导致运行时错误，例如*竞态条件*和*丢失更新*。


    在竞态条件中，两个或多个线程共享一个变量，并且它们都想对该变量进行读写操作。每个线程执行的顺序，以及线程可能因 `sleep()` 或操作系统（因其已用尽当前允许的时间片）而被强制挂起的事实，可能导致下一个线程读取共享变量时，该变量的值不正确。


    让我们考虑一个例子。假设 Fred 和 Gladys 共享一个银行账户。再假设从银行账户取钱的算法如下：


    1.  你检查账户余额，确保账户中有足够的钱。

    2.  你从账户中取出你想要的钱。


    请注意，虽然这两个操作中的每一个都是原子性的（一旦开始就不能被中断），但该算法可能在步骤 1 和步骤 2 之间被中断。现在让我们再加入一个步骤，允许 Fred
    或 Gladys 在考虑取钱时小睡一会儿。这可能导致以下情况：


    1.  Fred 想从银行账户中取 100 美元。

    2.  他检查账户余额，是 150 美元。

    3.  Fred 小睡了一会儿。

    4.  Gladys 检查账户余额，是 150 美元。

    5.  Gladys 取了 100 美元。

    6.  Fred 醒来并试图取 100 美元。

    7.  哎呀。账户现在透支了。


    这就是竞态条件。以下是一些可以说明此问题的源代码：你创建两个线程，让每个用户连续 10 次从账户中取 10 美元。


    ```java

    /*

    * example of a race condition

    * with Java Threads

    *  Here we are going to create two threads and have

    *  each of them withdraw $10 from the account

    *  10 times in a row.

    */

    public class FredAndGladys implements Runnable  {

    private BankAccount account = new BankAccount();

    /** The run() method does the actual work of the thread */

    public void run()  {

    for (int x = 0; x < 10; x++) {

    makeWithdrawal(10);

    if (account.getBalance() < 0) {

    System.out.println("account is overdrawn!");

    }

    }

    }

    private void makeWithdrawal(int amount) {

    String name = Thread.currentThread().getName();

    if (account.getBalance() >= amount) {

    System.out.println(name + " is about to withdraw " + amount);

    try {

    System.out.println(name + " is going to sleep");

    Thread.sleep(500);

    } catch (InterruptedException ex) {

    ex.printStackTrace();

    }

    System.out.println(name + " woke up");

    account.withdraw(amount);

    System.out.printf("%s completes the withdrawal\n", name);

    System.out.printf("New balance is $%d\n", account.getBalance());

    } else {

    System.out.println("Sorry, not enough for "

    + Thread.currentThread().getName());

    }

    }

    }

    /**

    *  inner class to represent a simple bank account

    */

    class BankAccount {

    private int balance = 100;

    public int getBalance () {

    return balance;

    }

    public void withdraw(int amount) {

    balance = balance - amount;

    }

    }

    /**

    * the driver to run the experiment

    */

    class FGMain {

    public static void main(String[] args) {

    FredAndGladys theJob = new FredAndGladys();

    Thread one = new Thread(theJob);

    Thread two = new Thread(theJob);

    one.setName("Fred");

    two.setName("Gladys");

    one.start();

    two.start();

    }

    }

    ```


    当你编译并执行此程序时，你得到的第一部分输出如下：


    ```

    Gladys is about to withdraw 10

    Gladys is going to sleep

    Fred is about to withdraw 10

    Fred is going to sleep

    Fred woke up

    Fred completes the withdrawal

    Gladys woke up

    Gladys completes the withdrawal

    New balance is $80

    Gladys is about to withdraw 10

    Gladys is going to sleep

    New balance is $90

    Fred is about to withdraw 10

    Fred is going to sleep

    Fred woke up

    Fred completes the withdrawal

    New balance is $70

    Fred is about to withdraw 10

    Fred is going to sleep

    Gladys woke up

    Gladys completes the withdrawal

    New balance is $60

    ```


    在一切正常的情况下，Fred 和 Gladys 可以交替取款，但这里存在竞态条件。请注意，余额首先报告为 80 美元，然后报告为 90 美元，因为两个线程在将
    `balance` 变量写回内存之前，都在其缓存中持有该变量的副本。Gladys 先写入（在 Fred 取款之后），你看到 80 美元。然后 Fred 写入，你看到
    90 美元。然后 Gladys 再次在 Fred 之前执行，金额就正确了。


    这一切的发生是因为是 JVM（或操作系统）控制线程何时能再次使用 CPU。幸运的是，Java 有一种方法可以解决这个问题。有一个关键字 `synchronized`，你可以在方法签名中使用它来创建一个临界区，这样一次只允许一个线程在该方法中执行。任何其他试图进入该
    `synchronized` 方法的线程都会被阻塞。如果你同步 `makeWithdrawal(int amount)` 方法，你将使所有人同步：


    ```

    Fred is about to withdraw 10

    Fred is going to sleep

    Fred woke up

    Fred completes the withdrawal

    New balance is $90

    Gladys is about to withdraw 10

    Gladys is going to sleep

    Gladys woke up

    Gladys completes the withdrawal

    New balance is $80

    Fred is about to withdraw 10

    Fred is going to sleep

    Fred woke up

    Fred completes the withdrawal

    New balance is $70

    Fred is about to withdraw 10

    Fred is going to sleep

    Fred woke up

    Fred completes the withdrawal

    New balance is $60

    ```


    另一种尝试避免竞态条件的方法（自 Java 5 起可用）是在 `BankAccount` 类中对变量 `balance` 使用 `volatile` 关键字。`volatile`
    变量不会保留缓存副本，因此大多数情况下值都能正确更新。因为 `volatile` 变量始终存储在主内存中（而不是缓存中），并且始终写回主内存，所以多个线程可以写入一个共享的
    `volatile` 变量，并且主内存中仍能保持正确的值。但是，如果一个线程需要先读取共享 `volatile` 变量的值，然后用新值更新该值，那么使用 `volatile`
    变量就不足以保证该变量的值保持同步了。因为从主内存读取变量的当前值和写入新值之间存在时间差，仍然存在竞态条件，Fred 和 Gladys 可能都读取了 `balance`
    的当前值，生成（相同的）新值并写入。`volatile` 变量现在不同步了。除了在程序中小心使用共享 `volatile` 变量的时机和方式之外，没有其他方法可以解决这个问题。


    还应注意 `synchronized` 关键字的使用，因为它会增加更多开销，从而影响性能。并且，虽然 `synchronized` 方法提供了互斥和线程安全的代码，但它们不能防止一种称为*死锁*的情况。当两个进程或线程争用相同的资源时，就会发生死锁，这些资源可能被锁定，而两个进程都拒绝放弃它们。例如，以下事件序列会导致死锁：


    *   线程 *a* 进入 `synchronized` 方法 `foo`（并获取了锁，锁定了任何其他线程）。

    *   线程 *a* 进入睡眠。

    *   线程 *b* 进入 `synchronized` 方法 `bar`（并获取了锁，锁定了任何其他线程）。

    *   线程 *b* 试图进入 `foo`，无法获取锁，并等待。

    *   线程 *a* 醒来，试图进入 `bar`，无法获取锁，并等待。

    *   *除非它们获取对方的锁，否则两者都无法继续。*


    这（来自 Dijkstra）被称为*死锁*。那么，如何解决死锁呢？嗯，你不应该依赖 Java 来解决它，因为 Java 无法检测死锁。最好的方法涉及预防：仔细工作以确保这种情况不会发生。


    有关 Java 中并发和并行编程的更多信息，请参阅在线 Java 教程。'
  raw: 'The Threads interface in Java gives you very low-level control over the creation
    and management of threads. This actually makes programming threads in Java more
    difficult than it might be otherwise. If you write a program that creates several
    threads, then the scheduling of these threads and the management of shared variables
    adds significantly to the overhead of the program. It also can lead to possible
    runtime errors in the form of *race conditions* and *lost updates*.


    In a race condition, two or more threads share a variable and they all want to
    read and write the variable. The order in which each thread executes and the fact
    that a thread can be forced to suspend execution either by a `sleep()` or by the
    operating system because it has exhausted its current quantum of allowed time
    can cause the shared variable to have the wrong value when the next thread reads
    it.


    Let’s consider an example. Say that Fred and Gladys both share a bank account.
    Let’s also say that the algorithm for withdrawing money from the bank account
    is as follows:


    1.  You check the account balance to make sure there’s enough money in the account.


    2.  You withdraw the money you want from the account.


    Note that, while each of these two operations are atomic (they can’t be interrupted
    once started), the algorithm could be interrupted between steps 1 and 2\. And
    now let’s throw in another step and allow Fred or Gladys to take a nap at some
    time while they are thinking about withdrawing money. This can lead to the following
    situation:


    1.  Fred wants to withdraw $100 from the bank account.


    2.  He checks the account balance and it is $150.


    3.  Fred takes a nap.


    4.  Gladys checks the account balance and it is $150.


    5.  Gladys withdraws $100.


    6.  Fred wakes up and tries to withdraw $100.


    7.  Oops. The account is now overdrawn.


    That is a race condition. Here’s some source code that can illustrate this problem:
    you create two threads and have each user withdraw $10 from the account,10 times
    in a row.


    ```

    /*

    * example of a race condition

    * with Java Threads

    *  Here we are going to create two threads and have

    *  each of them withdraw $10 from the account

    *  10 times in a row.

    */

    public class FredAndGladys implements Runnable  {

    private BankAccount account = new BankAccount();

    /** The run() method does the actual work of the thread */

    public void run()  {

    for (int x = 0; x = amount) {

    System.out.println(name + " is about to withdraw " + amount);

    try {

    System.out.println(name + " is going to sleep");

    Thread.sleep(500);

    } catch (InterruptedException ex) {

    ex.printStackTrace();

    }

    System.out.println(name + " woke up");

    account.withdraw(amount);

    System.out.printf("%s completes the withdrawal\n", name);

    System.out.printf("New balance is $%d\n", account.getBalance());

    } else {

    System.out.println("Sorry, not enough for "

    + Thread.currentThread().getName());

    }

    }

    }

    /**

    *  inner class to represent a simple bank account

    */

    class BankAccount {

    private int balance = 100;

    public int getBalance () {

    return balance;

    }

    public void withdraw(int amount) {

    balance = balance - amount;

    }

    }

    /**

    * the driver to run the experiment

    */

    class FGMain {

    public static void main(String[] args) {

    FredAndGladys theJob = new FredAndGladys();

    Thread one = new Thread(theJob);

    Thread two = new Thread(theJob);

    one.setName("Fred");

    two.setName("Gladys");

    one.start();

    two.start();

    }

    }

    ```


    When you compile and execute this program, the first part of what you get is below:


    ```

    Gladys is about to withdraw 10

    Gladys is going to sleep

    Fred is about to withdraw 10

    Fred is going to sleep

    Fred woke up

    Fred completes the withdrawal

    Gladys woke up

    Gladys completes the withdrawal

    New balance is $80

    Gladys is about to withdraw 10

    Gladys is going to sleep

    New balance is $90

    Fred is about to withdraw 10

    Fred is going to sleep

    Fred woke up

    Fred completes the withdrawal

    New balance is $70

    Fred is about to withdraw 10

    Fred is going to sleep

    Gladys woke up

    Gladys completes the withdrawal

    New balance is $60

    ```


    All things being equal, Fred and Gladys can alternate making withdrawals, but
    there’s a race condition. Note that the balance is first reported as $80 and then
    as $90 because both threads are holding copies of the balance variable in their
    caches before they write it back to memory. Gladys writes first (after Fred has
    withdrawn) and you see $80\. Then Fred writes and you see $90\. Gladys then gets
    in before Fred again and the amount is correct.


    This all happens because it’s the JVM (or the operating system) that controls
    when threads get to use the CPU again. Luckily, Java has a way to fix this. There’s
    a keyword, `synchronized`, that you can use in a method signature to create a
    critical section so that only one thread at a time is allowed to execute in that
    method. Any other thread that attempts to enter the synchronized method is blocked.
    If you synchronize the `makeWithdrawal(int amount)` method, you’ll have everyone
    in sync^([^(237)](#fn237)):


    ```

    Fred is about to withdraw 10

    Fred is going to sleep

    Fred woke up

    Fred completes the withdrawal

    New balance is $90

    Gladys is about to withdraw 10

    Gladys is going to sleep

    Gladys woke up

    Gladys completes the withdrawal

    New balance is $80

    Fred is about to withdraw 10

    Fred is going to sleep

    Fred woke up

    Fred completes the withdrawal

    New balance is $70

    Fred is about to withdraw 10

    Fred is going to sleep

    Fred woke up

    Fred completes the withdrawal

    New balance is $60

    ```


    Another way to try avoiding race conditions (available since Java 5) is to use
    the `volatile` keyword on the variable `balance` in the `BankAccount` class. No
    cached copies of volatile variables are kept so the values are updated correctly,
    most of the time. Because the volatile variable is always stored in main memory
    (and not in the cache) and is always written back to main memory, then multiple
    threads could be writing to a shared volatile variable and still have the correct
    value stored in main memory. But, if a thread needs to first read the value of
    a shared volatile variable and then update that value with a new one, then using
    a volatile variable is no longer good enough to guarantee that the variable’s
    value remains synchronized. Because there is a gap in time between reading the
    current value of the variable from main memory and then writing the new value,
    there is still a race condition where Fred and Gladys might both read the current
    value of balance and generate (the same) new value and write it. The volatile
    variable is now out of sync. There is no way to fix this other than being careful
    about when and how a shared volatile variable is used in your program.


    One should also be careful about the use of the `synchronized` keyword because
    it adds more overhead and thus impacts performance. And while synchronized methods
    provide mutual exclusion and thread-safe code, they do not protect against a condition
    called *deadlock*. Deadlock occurs when two processes or threads are contending
    for the same resources, the resources can get locked, with both processes refuse
    to give them up. As an example, the following sequence of events leads to deadlock:


    *   Thread *a* enters *synchronized* method `foo` (and gets the key, locking out
    any other thread).


    *   Thread *a* goes to sleep.


    *   Thread *b* enters *synchronized* method `bar` (and gets the key, locking out
    any other thread).


    *   Thread *b* tries to enter `foo`, can’t get the key, and waits.


    *   Thread *a* wakes up, tries to enter `bar`, can’t get the key, and waits.


    *   *Neither can proceed until they acquire the other key.*


    This is known (from Dijkstra) as a *deadly embrace*. So, how to fix a deadlock?
    Well, you shouldn’t depend on Java to do it because Java can’t detect a deadlock.
    The best methods involve prevention: work carefully to make sure that this situation
    doesn’t happen.


    For more on concurrency and parallel programming in Java, see the online Java
    Tutorials.^([^(238)](#fn238))'
