  trans: "\n## 类设计指南\n\n最后，我们列出从 Davis^(²⁰⁶) 和 McConnell^(²⁰⁷) 著作中摘取的 23 条类设计指南。这些指南比我们上文描述的通用设计指南更为具体，但非常实用：\n\
    \n1.  在类接口中呈现*一致的抽象层次*。\n\n2.  确保你理解该类所实现的抽象。\n\n3.  将不相关的信息移至另一个类（接口隔离原则）。\n\n\
    4.  在进行修改时，警惕类接口的侵蚀（接口隔离原则）。\n\n5.  不要添加与接口抽象不一致的公有成员。\n\n6.  最小化类及其成员的可访问性（开闭原则）。\n\
    \n7.  不要在公有接口中暴露成员数据。\n\n8.  避免将私有实现细节放入类的接口中。\n\n9.  避免将方法放入公有接口。\n\n10. 注意过紧的耦合（最少知识原则）。\n\
    \n11. 尝试通过类内的包含关系来实现“has a”关系（单一职责原则）。\n\n12. 通过继承来实现“is a”关系（里氏替换原则）。\n\n13.\
    \ 仅当派生类是基类的一个更具体版本时才进行继承。\n\n14. 确保只继承你想要继承的内容（里氏替换原则）。\n\n15. 将公共的接口、数据和操作尽可能上移至继承层次的高层（不要重复自己原则）。\n\
    \n16. 对只有一个实例的类保持警惕。\n\n17. 对只有一个派生类的基类保持警惕。\n\n18. 避免过深的继承树（里氏替换原则）。\n\n19. 保持类中方法的数量尽可能少。\n\
    \n20. 最小化对其他类的间接方法调用（最少知识原则）。\n\n21. 如果可能，在所有构造函数中初始化所有成员数据。\n\n22. 消除纯数据类。类应包含数据以及定义在这些数据上的操作，因此纯数据类将数据与操作分离，违背了这一理念。\n\
    \n23. 消除纯操作类。与上述原则类似，只有操作的类必须从某处获取数据。这会使方法接口复杂化，并需要为不同的数据类型提供新的实现。\n\n## 结论\n\n\
    在本章中，你探讨了过去几十年间演化出的若干面向对象设计原则。这些设计原则可作为你遵循的指南，以确保最终的设计是优秀的，即易于实现、易于维护，并且恰好满足客户的需求。重要的是，当你在从功能特性向设计思考的过程中，这些设计原则提供了指导。它们提供了检验和实现继承、封装、多态和抽象等关键面向对象原则的方法。同时，它们也强化了内聚与耦合等基本设计原则。\n\
    \n# 13. 设计模式\n\n> *每个模式描述了一个在我们环境中反复出现的问题，然后描述了该问题解决方案的核心，这样你就可以无数次地使用这个解决方案，而无需以完全相同的方式重复。*\n\
    > \n> ——克里斯托弗·亚历山大^(²⁰⁸)\n\n你是否每次写代码时都在重新发明轮子？你是否每次编写程序时都要重新学习如何遍历数组？你是否每次写 `if`\
    \ 语句时都要重新解决悬空 `else` 的问题？你是否每次需要使用插入排序或二分查找时都要重新学习？当然不是！\n\n在你编写程序的过程中，你已经学会了一套在编写代码时使用的*惯用法*。例如，如果你需要遍历并打印数组的所有元素，在\
    \ Java 中你可能会这样做：\n\n```\nfor (int i = 0; i < myArray.length; i++) {\nSystem.out.printf(\"\
    \ %d \", myArray[i]);\n}\n```\n\n或者\n\n```\nfor (int nextElement: myArray) {\n\
    System.out.printf(\" %d \", nextElement);\n}\n```\n\n无需过多思考，代码就会从你的指尖流出。这些*代码模式*是你随着编写程序经验的积累而积累起来的一套代码规则和模板。\n\
    \n*设计模式*是同样的概念，但应用于你的设计。^(²⁰⁹) 如果你花时间学习一组核心的设计模式，它将使你的代码更加统一和可读，并随着时间的推移提高其整体质量。它还可能减少你花在设计编码项目上的时间。著名建筑师克里斯托弗·亚历山大在他的著作《模式语言》中定义了建筑设计的模式。^(²¹⁰)\
    \ 同样的思想也延续到了软件设计中。如果你阅读本章开头亚历山大的引文，可以看到他对设计模式的定义中包含以下三个关键要素：\n\n*   *重复出现*：引发设计模式的问题必须是常见问题。\n\
    \n*   *核心解决方案*：模式为解决方案提供了模板；提炼出解决方案的本质。\n\n*   *复用*：当相同的核心问题再次出现时，即使上下文或领域发生变化，该模式也必须易于复用。\n\
    \n事实上，你在本书中已经至少见过一个设计模式：我们在第 7 章讨论的*模型-视图-控制器*模式（MVC）是最早发表的软件设计模式示例之一。^(²¹¹) MVC\
    \ 设计模式用于使用图形用户界面的程序。它将程序分为三个部分：包含程序处理规则的*模型*、向用户呈现数据和界面的*视图*，以及协调*模型*和*视图*之间通信的*控制器*。在典型的面向对象实现中，这些抽象各自成为一个独立的对象。\n\
    \n*四人组*（Erich Gamma、Richard Helm、Ralph Johnson 和 John Vlissides）在他们关于设计模式的开创性著作《设计模式：可复用面向对象软件的基础》^(²¹²)\
    \ 中，将设计模式定义为“命名、抽象并识别常见设计结构的关键方面，使其有助于创建可复用的面向对象设计”。换句话说，设计模式是从*具体示例*中提炼出的*命名抽象*，它代表了针对*特定但常见问题*的*重复出现的解决方案*——重复出现、核心解决方案、复用。\n\
    \n但为什么我们首先需要设计模式？为什么我们不能仅仅依靠我们在第 12 章学习的面向对象设计原则以及我们的老朋友——抽象、继承、多态和封装？^(²¹³)\n\
    \n嗯，事实证明，设计是困难的，这就是原因。为复用而设计则更加困难。设计也更像是一门艺术，而非科学或工程学科。经验丰富的软件设计师很少从第一性原理出发；他们会在当前问题中寻找与过去解决过的问题的相似之处。并且他们会将多年来学到的设计惯用法带到设计工作中。设计模式提供了一种*共享词汇*，使这些专家知识能够为所有人所用。\n"
- fmt: '# Design Patterns and the Gang of Four


    In their book, the Gang of Four describe design patterns as having four essential
    features:


    - *The Pattern Name* as *“… a handle we can use to describe a design problem,
    its solution, and consequences in a word or two. Naming a pattern immediately
    increases our design vocabulary.”*

    - *The Problem* describes when to use the pattern. “*It explains the problem and
    its context.”*

    - *The Solution “… describes the elements that make up the design, their relationships,
    responsibilities, and collaborations…the pattern provides an abstract description
    of a design problem and how a general arrangement of elements solves it.”*

    - *The Consequences,* the results and trade-offs of applying the pattern to a
    problem. These include time and space trade-offs, but also flexibility, extensibility,
    and portability, among others.^([^(214)](#fn214))


    Design patterns are classified using two criteria: *scope* and *purpose*. *Scope*
    deals with the relationships between classes and objects. Static relationships
    between classes are fixed at compile-time, whereas dynamic relationships are between
    objects and can change at runtime. *Purpose* deals with what the pattern does
    with respect to classes and objects. Patterns can deal with object creation, composition
    of classes or objects, or the ways in which objects interact and distribute responsibilities
    in the program.


    The Gang of Four describe 23 different design patterns in their book, dividing
    them into three different classes of patterns: *creational*, *structural*, and
    *behavioral*.


    - *Creational design patterns* deal with when and how objects are created. These
    patterns typically create objects for you, relieving you of the need to instantiate
    those objects directly.

    - *Structural design patterns* describe how objects are combined into larger groups.

    - *Behavioral design patterns* generally talk about how responsibilities are distributed
    and how communication happens between objects.


    The list is not meant to be complete, and over the years since the publication
    of the Gang of Four’s *Design Patterns* book, many more patterns have been added
    to this original list by developers everywhere. A recent Google search for the
    phrase “software design patterns” yielded more than 1.8485 million hits, with
    90 thousand from the past 24 hours, so it is definitely an active subject of discussion.


    ## The Classic Design Patterns


    The 23 (classic) design patterns described by the Gang of Four are listed below.
    (In the remainder of this chapter we’ll go over the design patterns in italics
    because they are among the most commonly used.)


    ### Creational Patterns


    1. Abstract Factory

    2. Builder

    3. *Factory Method*

    4. Prototype

    5. *Singleton*


    ### Structural Patterns


    1. *Adapter*

    2. Bridge

    3. Composite

    4. Decorator

    5. *Façade*

    6. Flyweight

    7. Proxy


    ### Behavioral Patterns


    1. Chain of Responsibility

    2. Command

    3. Interpreter

    4. *Iterator*

    5. Mediator

    6. Memento

    7. *Observer*

    8. State

    9. *Strategy*

    10. Template Method

    11. Visitor


    ## Patterns We Can Use


    The patterns in this section are a representative sample of the classic design
    patterns and are those that you’ll find the most useful right away.


    ### Creational Patterns


    Creational patterns all have to do with creating objects. If we think about class
    definitions as templates for producing objects, then these patterns are all about
    how to create those templates. The two patterns we’ll look at next, Singleton
    and Factory Method show two different ways of thinking about creating objects.


    #### Creational 1: The Singleton Pattern


    Singleton^([^(215)](#fn215)) is almost certainly the easiest of the design patterns
    to understand and to code. The idea is simple: you are writing a program and you
    have a need for one—*and only one*—instance of a class (and you need to enforce
    that “and only one” requirement). Examples of programs that use a Singleton pattern
    are things like print spoolers, window managers, device drivers, and the like.


    So what are the implications of the “one, and only one” requirement? First, it
    means your program can only say `new Singleton()` once, right? But what’s to stop
    other objects in your program (or objects in the program that you didn’t write)
    from issuing another `new Singleton()`? The answer is—nothing! As long as your
    class can be instantiated once, it can be instantiated again and again.


    So what you need to do is to create a class that can be instantiated, once and
    only once and which *doesn’t use* `new` to do the instantiation. You heard us
    right: you need a class that can be instantiated without using `new`. Time to
    get sneaky!


    Here’s what you’ll do. The method that gets called when an object is instantiated
    is the constructor. In Java, you can say `new Singleton()` because the `Singleton()`
    constructor is public—it’s visible from outside the class definition. If you want
    to keep the constructor so you can make instances of Singleton objects, but you
    don’t want anyone to be able to use `new` to do that, you must make the constructor
    private. “But wait!” you might think, “If the constructor is private then I can’t
    instantiate the object at all!” However, there is a way around this problem: if
    the constructor is private, then it can only be accessed from inside the class
    definition, so it’s still entirely possible to instantiate the object from within
    the class definition itself!


    But this then recurses to the problem of how do you get to the constructor from
    *outside* the class definition? Well, in Java is there a way to access a method
    inside a class without having to have an instantiation of the class? (Think how
    you can call `Math.abs()` without instantiating the `Math` class.)


    Aha! Static class methods! A public static method will be visible outside of the
    class definition without having the object actually instantiated. So, if you create
    a class with a private constructor and then use a static method that can conditionally
    call the private constructor, you can control how many instances of the class
    you create. Here’s the code:


    ```

    public class Singleton {

    // this is the reference to the instance that will hang around

    private static Singleton uniqueInstance;

    // the private constructor – can''t be accessed from outside

    private Singleton() {

    // do stuff here to initialize the instance

    }

    // here''s the static method we''ll use to create the instance

    public static Singleton getInstance() {

    if (uniqueInstance == null) {

    uniqueInstance = new Singleton();

    }

    // if uniqueInstance is not null, then it already exists

    return uniqueInstance;

    }

    // Other methods – after all Singleton is a real class

    }

    ```


    In order to use the `Singleton` class you’d do something like


    ```

    public class SingletonTest {

    public static void main(String [] args) {

    Singleton mySingle;

    mySingle = Singleton.getInstance();

    // and we do other stuff here

    }

    }

    ```


    When you instantiate the `Singleton` instance by calling the `getInstance()` method,
    it will test to see if you’ve done this before. If not, it creates the instance
    using the private constructor in the `Singleton` class. If the instance already
    exists (the `uniqueInstance` variable is not `null`) then you just return the
    reference to the object.'
  raw: '## Design Patterns and the Gang of Four


    In their book, the Gang of Four describe design patterns as having four essential
    features:


    *   *The Pattern Name* as *“… a handle we can use to describe a design problem,
    its solution, and consequences in a word or two. Naming a pattern immediately
    increases our design vocabulary.”*


    *   *The Problem* describes when to use the pattern. “*It explains the problem
    and its context.”*


    *   *The Solution “… describes the elements that make up the design, their relationships,
    responsibilities, and collaborations…the pattern provides an abstract description
    of a design problem and how a general arrangement of elements solves it.”*


    *   *The Consequences,* the results and trade-offs of applying the pattern to
    a problem. These include time and space trade-offs, but also flexibility, extensibility,
    and portability, among others.^([^(214)](#fn214))


    Design patterns are classified using two criteria: *scope* and *purpose*. *Scope*
    deals with the relationships between classes and objects. Static relationships
    between classes are fixed at compile-time, whereas dynamic relationships are between
    objects and can change at runtime. *Purpose* deals with what the pattern does
    with respect to classes and objects. Patterns can deal with object creation, composition
    of classes or objects, or the ways in which objects interact and distribute responsibilities
    in the program.


    The Gang of Four describe 23 different design patterns in their book, dividing
    them into three different classes of patterns: *creational*, *structural*, and
    *behavioral*.


    *   *Creational design patterns* deal with when and how objects are created. These
    patterns typically create objects for you, relieving you of the need to instantiate
    those objects directly.


    *   *Structural design patterns* describe how objects are combined into larger
    groups.


    *   *Behavioral design patterns* generally talk about how responsibilities are
    distributed and how communication happens between objects.


    The list is not meant to be complete, and over the years since the publication
    of the Gang of Four’s *Design Patterns* book, many more patterns have been added
    to this original list by developers everywhere. A recent Google search for the
    phrase “software design patterns” yielded more than 1.8485 million hits, with
