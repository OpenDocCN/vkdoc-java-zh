    \ item */\npublic class Inventory {\n    public String checkInventory(String itemID)\
    \ {\n        /* code in here to check the database */\n        return \"Inventory\
    \ checked\";\n    }\n}\n\n/** compute the payment for an item */\npublic class\
    \ Payment {\n    public String computePayment(String itemID, String currency)\
    \ {\n        return \"Payment computed successfully\";\n    }\n}\n\n/** compute\
    \ the sales tax for an item */\npublic class SalesTax {\n    public String computeTax(String\
    \ itemID, double rate) {\n        return \"Tax computed\";\n    }\n}\n\n/** compute\
    \ the delivery charge for an item */\npublic class Delivery {\n    public String\
    \ computeDelivery(String itemID, String location) {\n        return \"Delivery\
    \ amount computed\";\n    }\n}\n\n/**\n * Here's the Facade\n */\npublic class\
    \ Order {\n    private Payment pymt = new Payment();\n    private Inventory inventory\
    \ = new Inventory();\n    private SalesTax salestax = new SalesTax();\n    private\
    \ Delivery deliver = new Delivery();\n\n    /**\n     * This is the new interface\
    \ for buying an item\n     * it incorporates all the different steps into a single\n\
    \     * method call\n     */\n    public void placeOrder(String itemID, String\
    \ currency, String location, double rate) {\n        String step1 = inventory.checkInventory(itemID);\n\
    \        String step2 = pymt.computePayment(itemID, currency);\n        String\
    \ step3 = salestax.computeTax(itemID, rate);\n        String step4 = deliver.computeDelivery(itemID,\
    \ location);\n        System.out.printf(\"%s\\n\", step1);\n        System.out.printf(\"\
    %s\\n\", step2);\n        System.out.printf(\"%s\\n\", step3);\n        System.out.printf(\"\
    %s\\n\", step4);\n    }\n\n    /** add more methods here for performing other\
    \ actions */\n}\n\n/**\n * Here's the client code.\n * Note how the Facade makes\
    \ ordering something simple\n * by using it's interface\n */\npublic class Client\
    \ {\n    public static void main(String args[]) {\n        Order order = new Order();\n\
    \        order.placeOrder(\"OR123456\", \"USD\", \"Chicago\", 0.075);\n      \
    \  System.out.println(\"Order processing completed\");\n    }\n}\n```\n\n## Behavioral\
    \ Patterns\n\nWhile creational patterns are all about how to create new objects,\
    \ and structural patterns are all about getting objects to communicate and cooperate,\
    \ behavioral patterns are all about getting objects to do things. They examine\
    \ how responsibilities are distributed in the design and how communication happens\
    \ between objects. The three patterns we’ll look at here all describe how to assign\
