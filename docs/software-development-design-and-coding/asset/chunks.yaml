    ## Structural Patterns


    Structural patterns help you put objects together so you can use them more easily.
    They are about grouping objects together and providing ways for objects to coordinate
    to get work done more easily. Recall that composition, aggregation, delegation,
    and inheritance are all about structure and coordination. The first Structural
    pattern we’ll look at here, the Adapter, is all about getting classes to work
    together.'
