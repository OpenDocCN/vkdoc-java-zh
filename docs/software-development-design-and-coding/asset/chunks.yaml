  trans: '

    ## 封装设计中可能变化的部分


    这一首要原则意味着，通过将类中在整个程序运行期间相对稳定的特性与方法同那些会变化的特性分离开来，从而保护你的类免受不必要的变更。通过分离这两类特性，你将可能变化的部分隔离到一个（或多个）独立的类中，这些类是你预期会进行修改的，这样我们就提升了灵活性并简化了修改过程。同时，你保留设计中稳定的部分不变，这样你只需实现它们一次并测试一次。这保护了设计的稳定部分免受任何不必要的变更。


    让我们创建一个非常简单的类 `Violinist`。图 12-1 是 `Violinist` 类的类图。


    ![](img/270563_3_En_12_Fig1_HTML.jpg)


    一个标注为 `Violinist` 的类图，包含三个函数，例如 `setUpMusic`、`tuneInstrument` 和 `play`。


    图 12-1

    一个 `Violinist` 类


    考虑一下，`setUpMusic()` 和 `tuneInstrument()` 方法很可能相当稳定。但 `play()` 方法呢？事实证明，小提琴有多种不同的演奏风格：古典、蓝草和凯尔特，仅举三例。这意味着
    `play()` 方法会根据演奏风格而变化。既然你有一个可能变化的行为，也许你应该将该行为抽象出来，并将其封装到另一个类中？如果你这样做，就会得到类似图 12-2
    的结果。


    ![](img/270563_3_En_12_Fig2_HTML.jpg)


    一个 UML 类图，包含三个主要类，例如 `Violinist`、`ViolinStyle` 和 `ClassicalStyle`，后者进一步细分为 `BluegrassStyle`
    和 `CelticStyle`。图中用箭头描绘了方法和关系。


    图 12-2

    `Violinist` 与演奏风格


    你已经将会变化的 `play()` 方法抽象并封装到一个单独的类中，这样你就可以将想要对演奏风格进行的任何修改，与 `Violinist` 中其他稳定的行为隔离开来。注意，你在
    `Violinist` 类和抽象类 `ViolinStyle` 之间使用了关联关系，这使得 `Violinist` 能够使用具体的风格类，这些类继承自抽象类
    `ViolinStyle` 并重写了其抽象方法 `play()`。


    ## 针对接口编程，而非针对实现


    这一原则意味着，你的代码应围绕那些不太可能变化的结构来设计。与本章中的许多原则一样，这涉及到继承以及你在程序中如何使用它。假设你有一个程序，用于模拟二维空间中不同类型的几何形状。你将有一个
    `Point` 类，用于表示二维空间中的一个点；你还会有一个名为 `Shape` 的接口，它将所有形状共有的特性——面积和周长——抽象出来。（圆形和椭圆将周长称为
    circumference，但这里我们使用 perimeter。）那么，你得到的结果如下（见图 12-3）。


    ![](img/270563_3_En_12_Fig3_HTML.jpg)


    一个 UML 类图，包含两个实体：`Point`，其属性 `x` 和 `y` 的类型为 `double`，方法有 `getX`、`getY`、`setX(double)`
    和 `setY(double)`；以及接口 `Shape`，其方法有 `computeArea()`（返回 `double`）和 `computePerimeter()`（返回
    `double`）。


    图 12-3

    一个简单的 `Point` 类和通用的 `Shape` 接口


    如果你想创建一些不同形状的具体类，你需要*实现* `Shape` 接口。这意味着具体类必须实现 `Shape` 接口中的每一个抽象方法。见图 12-4。


    ![](img/270563_3_En_12_Fig4_HTML.jpg)


    一组三个 UML 类图，分别表示几何形状，如 `Rectangle`、`Circle` 和 `Triangle`。每个图都列出了属性和用于计算面积和周长的方法，并指定了数据类型。


    图 12-4

    `Rectangle`、`Circle` 和 `Triangle` 都实现了 `Shape`


    现在你已经有了一些表示不同几何形状的类。如何使用它们呢？假设你正在编写一个应用程序，用于操作一个几何形状。你可以通过两种不同的方式来实现。首先，你可以为每个几何形状编写一个独立的应用程序。见图
    12-5。


    ![](img/270563_3_En_12_Fig5_HTML.jpg)


    一个 UML 类图，包含三个类：`RectangleApp`、`CircleApp` 和 `TriangleApp`。每个类都包含一个 `main` 方法以及一个关联的形状类
    `Rectangle`、`Circle` 和 `Triangle`，这些形状类带有用于计算面积和周长的方法和属性。


    图 12-5

    使用几何对象


    这些应用程序有什么问题呢？嗯，你有三个不同的应用程序在做同样的事情。如果你想添加另一个形状，比如菱形，你就必须编写两个新类：`Rhombus` 类（实现 `Shape`
    接口）和一个新的 `RhombusApp` 类。哎呀！这效率太低了。你是在针对几何形状的不同实现进行编程，而不是针对接口本身进行编程。


    那么如何解决这个问题呢？需要认识到的是，接口是所有实现该接口的类的类层次结构的顶层。因此，它是一种类类型，你可以利用它来在程序中实现*多态*（即一个事物可以具有多种形态的概念）。在这种情况下，由于你有多个实现
    `Shape` 接口的几何形状，你可以创建一个 `Shape` 数组，用不同类型的形状填充它，然后进行迭代。在 Java 中，你将使用 *List* 集合类型来存储你的形状：


    ```

    import java.util.*;

    /**

    * ShapeTest - 测试 Shape 接口的实现。

    *

    * @author 程序员 1

    * @version 1.0

    */

    public class ShapeTest {

    public static void main(String [] args) {

    List figures = new ArrayList();

    figures.add(new Rectangle(10, 20));

    figures.add(new Circle(10));

    Point p1 = new Point(0.0, 0.0);

    Point p2 = new Point(5.0, 1.0);

    Point p3 = new Point(2.0, 8.0);

    figures.add(new Triangle(p1, p2, p3));

    Iterator iter = figures.iterator();

    while (iter.hasNext()) {

    Shape nxt =  iter.next();

    System.out.printf("area = %8.4f perimeter = %8.4f\n",

    nxt.computeArea(), nxt.computePerimeter());

    }

    }

    }

    ```


    因此，当你针对接口编程时，你的程序将更易于扩展和修改，并且能够与接口的所有子类无缝协作。


    顺便提一下，上述原则让你明白，你应该持续审视你的设计。骄傲会毁掉好的设计；不要害怕重新审视你的设计决策。你的设计是迭代的。由于需要*重构*，改变你的设计也必然会迫使你的代码发生改变。

