- fmt: '### Intellectual Property: Copyright


    According to the U.S. Copyright Office, “Copyright is a type of intellectual property
    that protects **original works of authorship** as soon as an author **fixes**
    the work in a **tangible form of expression**. In copyright law, there are a lot
    of different types of works, including paintings, photographs, illustrations,
    musical compositions, sound recordings, computer programs, books, poems, blog
    posts, movies, architectural works, [and] plays.”^([^(109)](#fn109))


    As mentioned, copyright is enshrined in the U.S. Constitution, which was ratified
    in 1788. The first copyright law was passed by Congress in 1790. This law provided
    for a term of 14 years for the initial copyright, with an allowance for a renewal
    of the copyright for 14 more years.^([^(110)](#fn110)) You were required to register
    the copyright with the U.S. Copyright Office and to register it again in order
    to renew the copyright. You were also required to label your work as copyrighted.


    In 1830, the terms for initial copyright and renewal were extended to 28 years
    each.


    The Copyright Act of 1976 eliminated the requirement for mandatory formal registration
    and the requirement for renewal. So since 1976 any creative work is automatically
    copyrighted as soon as it is created and put it into a “tangible” or “fixed” form,
    including paper, film, computer memory, and so on. The act also extended the term
    of copyright to either 75 years or the life of the author plus 50 years, as well
    as removed the requirement to label your work as copyrighted. Notwithstanding,
    it is usually good practice to label your work with a copyright notice, even though
    it is no longer required. Note that this book has a copyright notice on the back
    side of the title page.


    An update to the Copyright Act in 1998 further extended the term of copyright
    to either 120 years or the life of the author plus 70 years.^([^(111)](#fn111))
    This update is colloquially known as the “Mickey Mouse Protection Act” because
    it was widely thought that the very long extension of copyright protection was
    designed to protect the Walt Disney Company’s copyright of the Mickey Mouse character
    well into the 2020s.


    #### What Rights Do You Have Under Copyright?


    In the United States, once your work is copyrighted, you are entitled to six exclusive
    rights with regard to the work:^([^(112)](#fn112))


    * The right to reproduce the work

    * The right to create derivative works (for example, adapting a book into a play)

    * The right to distribute copies, or transfer ownership of the work

    * The right to perform the work publicly

    * The right to display the work publicly

    * The right to perform the work publicly via digital audio or video transmission


    Nobody else has these rights unless you formally assign them to someone else.


    #### What Can You Copyright?


    Only creative intellectual property in a fixed form is eligible for copyright.
    In the United States, you can copyright the following types of works:^([^(113)](#fn113))


    * Literary works

    * Musical works

    * Dramatic works

    * Pantomimes and choreographic works

    * Pictorial, graphic, and sculptural works

    * Audio-visual works

    * Sound recordings

    * Derivative works

    * Compilations

    * Architectural works

    * Computer software


    #### What You Cannot Copyright


    You are not allowed to copyright the following:^([^(114)](#fn114))


    * Unfixed works that have not been recorded in a tangible, fixed form (for example,
    that song that you made up and sang in the shower today)

    * Work that is already in the public domain

    * Titles, names, short phrases, and slogans

    * Familiar symbols or designs

    * Numbers and facts about math, including formulas

    * Ideas and facts

    * Processes and systems (for example, the Dewey Decimal System can’t be copyrighted)

    * Grammatical tropes (for example, “I before E except after C” can’t be copyrighted)

    * Recipes (but just the list of ingredients. The instructions on how to combine
    the ingredients can be copyrighted. You can also use the recipe to make a dish
    for your family without getting permission.)

    * Anything produced as a result of working for the U.S. Federal Government cannot
    be copyrighted; all such work is automatically in the public domain.

    * User interfaces (but you can get a design patent for user interfaces. More on
    this below.)


    #### Copyright Conflicts: Apple vs. Microsoft and User Interface Design


    In the mid-1980s, after the release of the first Apple Macintosh computer and
    its advanced graphical user interface (GUI), Apple licensed parts of the graphical
    interface to Microsoft, who wanted to use the parts in its Windows 1.0 product.
    In 1987, when Microsoft revealed details of the next Windows iteration, Windows
    2.0, Apple sued Microsoft for copyright infringement, claiming that many of the
    user interface elements of the new Windows were stolen from the Macintosh. In
    their case, Apple emphasized that the court should consider the “look and feel”
    of the entire user interface, rather than just individual elements. They claimed
    that the “look and feel” of the Macintosh GUI was covered by copyright.^([^(115)](#fn115))


    In the midst of this case, Xerox Corporation sued Apple for copyright infringement
    claiming that the Macintosh user interface itself was copied from the Xerox Alto
    computer, which had been introduced in the late 1970s. In 1981 and 1982, Apple
    Macintosh engineers, including Apple CEO Steve Jobs, had visited Xerox’s Palo
    Alto Research Center (PARC) and had been shown the Alto and its unique (at the
    time) graphical user interface. Xerox contended in their suit that the Mac’s GUI
    was directly derived from the Alto’s, and its implementation went beyond a similar
    technology sharing agreement between Apple and Xerox PARC.


    At the end of the day, the Microsoft and Apple settled prior to a jury trial of
    the case. The judge wrote that you could copyright the expression of an idea,
    but not the idea itself, and that Apple’s “look and feel” was an idea. So it was
    the individual pieces of the user interface that were copyrightable, and not the
    entire thing. For example, you cannot copyright the idea of a clickable button,
    but you can copyright the artistic design of a specific button. Hence Apple’s
    Trashcan icon is protected by copyright, but the idea of throwing files away in
    a particular location is not. Similarly, you cannot copyright the use of a pop-up
    dialog box (the idea), but you can copyright your specific written explanation
    in a pop-up that you create.


    The more artistic and original your design is, the more protection copyright offers.
    But protection by copyright is limited and, while copyright may protect some individual
    design elements, copyright is not a good way to protect an entire user interface.
    For that, one should use a *design patent* (see the “Patents” section below).'
