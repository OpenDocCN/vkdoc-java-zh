  trans: '

    ## 代码创造者 vs. 代码破坏者心态


    测试其实还有另一个问题：那就是你，开发者。开发者和测试者在代码构建中扮演着两种不同、甚至可以说是对立角色。开发者的职责是获取需求，设计出反映需求的方案，并编写实现该设计的代码。作为开发者，你的工作是*让代码跑起来*。如果你按照自己的解决方案计划实现了代码，那么很自然地会认为你的代码方案是可行的。


    另一方面，测试者的工作则是基于同样的需求，但假设代码无法正常工作，他们的任务是揭示代码在何处失效。测试者应该对你的代码进行难以言喻的、可怕的操作，目的是*让代码崩溃*，让其中的错误在用户或客户端系统接触到之前暴露出来。搞破坏正是测试工作如此有趣的原因。而你，作为开发者，则负责修复代码。


    你可以看出这为何会是一种对立关系。你也能明白为什么开发者可能成为相当糟糕的测试者。如果你的工作是让代码工作，你就不会专注于破坏它。因此，你的测试用例可能不会像那些以破坏你代码为工作的人所想出的那样狡猾、刻意，甚至刻薄。简而言之，因为他们试图构建美好的东西，*开发者是糟糕的测试者*。开发者倾向于使用典型、干净的数据编写测试。他们往往对自己编写的测试能覆盖多少代码抱有过分乐观的看法。他们倾向于在假设代码能工作的情况下编写测试；毕竟，这是他们自己精心设计、巧妙实现的智慧结晶。


    这就是为什么大多数软件开发组织都有一个*独立的测试团队*来负责集成测试和系统测试。这些测试者编写自己的测试代码，创建自己的框架，对所有新基线版本和最终发布代码进行测试，并将所有错误报告给开发者，然后由开发者修复。测试者通常*不*做的一件事是单元测试。单元测试是开发者的责任，所以你并不能完全置身事外。你确实需要考虑测试，学习如何编写测试、如何运行测试以及如何分析结果。你需要学会对你的代码“刻薄”一点。并且你仍然需要修复错误。


    ## 何时测试？


    在我们开始讨论如何进行单元测试以及测试哪些内容之前，先来谈谈*何时*测试。这里主要有两种选择：1）先编码后测试，或者 2）先测试后编码。


    你可能会觉得最自然的方式是先编写代码，让它编译通过（意味着你消除了语法错误），然后，*在*你感觉某个函数或模块的代码完成后，再编写测试并进行单元测试。这样做的好处是，你已经理解了需求并编写了代码，这让你有机会在编写代码的同时思考测试用例。这可以简化编写清晰测试用例的过程。在这种策略下，调试和测试是同时进行的：你发现一个错误，修复它，然后立即重新运行失败的测试。


    另一种方法是先编写单元测试，*在*编写任何代码*之前*，然后开发代码直到所有测试通过。这被称为*测试驱动开发*（TDD），这是一种根植于敏捷方法论（尤其是源自极限编程）的方法。显然，如果你先编写单元测试，它们都会失败，因为最多你只能在测试中调用一个方法存根。TDD
    从编写成功的基准测试开始。如果你编写了一堆测试，然后只编写刚好能让所有单元测试通过的代码，你就确切地知道何时完成了！你可以编写一些新代码并进行测试；如果失败，就再写一些代码；如果通过，就停止。这样做的好处是帮助你保持代码精简，使其更简单、更易于调试。它还能让你从一开始就拥有一套测试，每当你对代码进行更改时都可以重新运行。如果所有测试仍然通过，那么你的更改就没有破坏任何东西。


    那么哪种方式更好呢？嗯，答案又是那种“看情况”的事情。通常，先编写测试能让你更早进入测试思维模式，并为实现代码设定明确的目标。另一方面，除非你大量实践直到它成为第二天性，否则先写测试可能会很困难，因为你必须想象你要测试什么。这也会迫使你尽早去理解需求以及模块或类的设计。这意味着设计/编码/测试几乎同时发生。这可能会使整个代码构建过程更加困难。因为你同时进行设计/编码/测试，创建第一个可运行的程序也会花费更长时间。然而，一旦你有了第一个可运行的模块，你的开发速度就可以加快。TDD
    在中小型项目中效果很好（敏捷技术通常也是如此），但对于非常大的程序可能会更困难。当你在进行*结对编程*时，TDD 也相当有效。提醒一下，在结对编程中，两名开发者同时处理同一个任务。他们共用一台电脑，其中一人（*驾驶员*）在键盘前编写代码，而另一名开发者（*导航员*）坐在驾驶员旁边，观察错误、思考设计问题和测试，并发表评论。大约每半小时左右，驾驶员和导航员交换位置。之后，驾驶员编写一个*测试*，而导航员则思考更多要编写的测试，并提前考虑代码。这个过程往往使编写测试变得更容易，然后自然地过渡到编写代码。在编码前后都尝试一下测试，然后你可以决定哪种方式最适合你和你的项目。

    '
- fmt: '# Testing in an Agile Development Environment


    While many of the ideas and methods are the same no matter what development process
    you are using, agile processes have a different viewpoint on testing. Most agile
    methodologies strongly encourage (and XP requires) the use of TDD so that unit
    tests are written before the production code is written.


    TDD makes a lot of sense on an agile team due to *continuous integration*. In
    most agile methodologies, every time a developer finishes writing a task or a
    feature, they are expected to integrate their new code into the code base and
    test it using an automated test suite. On a team of 10 – 20 developers, this can
    happen many times a day. One of the rules of *continuous integration* is that
    if you write a new piece of code that passes the unit tests, but after integration
    it breaks the product, *you have to fix it right away*. No bug reports, no passing
    the problem off to a separate bug fixing and integration team; the developer who
    wrote the code is supposed to fix the problem immediately. This, combined with
    the fact that most new features or tasks implemented in an agile project are small
    (remember, tasks are supposed to be 8 hours of effort or less, total) makes integration
    testing an extension of unit testing. Having the tests ready to go for continuous
    integration retesting just makes sense.


    Another reason for TDD in agile is that many agile approaches recommend (while
    XP requires) *pair programming*, with two developers taking turns writing code
    and refining their tests and the code. They test often (say every time they have
    a new function written) and integrate often, and all of their new tests are added
    to the automated test suite for the project. It’s a win, win, win.


    Finally, in an agile project, *the customer is a crucial part of the development
    team and does system testing*. In many cases, the customer is on site so the system/acceptance
    tests established by the customer can be run after each integration of code changes.


    Consequently, in agile projects, the entire suite of tests (unit tests, integration
    tests, and system tests) is part of the normal agile development process.


    ## What to Test?


    Now that we’ve talked about different phases of testing and when you should do
    your unit testing, it’s time to discuss just *what* to test. What you’re testing
    falls into two general categories: *code coverage* and *data coverage*.


    - *Code coverage* has the goal of executing every line of code in your program
    at least once with representative data so you can be sure that all the code functions
    correctly. Sounds easy? Well, remember that combinatorial explosion problem for
    that 50,000-line program.

    - *Data coverage* has the goal of testing representative samples of good and bad
    data (both input data and data generated by your program), with the objective
    of making sure the program handles data and particularly data errors correctly.


    Of course there is overlap between code coverage and data coverage. For instance,
    sometimes in order to get a particular part of your program to execute you have
    to feed it bad data. We’ll separate these as best we can and come together when
    we talk about writing actual tests.


    ### Code Coverage: Test Every Statement


    Your objective in code coverage is to test every statement across all the different
    types of code that compose your program. Let’s look at these different code types.


    *Straight-line code* illuminates a single path through your function or method.
    Normally this will require one test per different data type.


    *Branch coverage* tests everywhere your program can change directions. That means
    you need to look at control structures here: every `if` and `switch` statement,
    and every *complex conditional expression* (those that contain AND and OR operators).
    For every `if` statement, you’ll need two tests: one for when the condition is
    `true` and one for when it’s `false`. For every `switch` statement, you’ll need
    a separate test for each `case` clause in the switch, including the `default`
    clause (all your `switch` statements should have a `default` clause). The logical
    AND (`&&`) and OR (`||`) operators add complexity to your conditional expressions,
    so you’ll need extra test cases for those. Ideally, you’ll need four test cases
    for each (F-F, F-T, T-F, T-T), but if the language you are using uses *short-cut
    evaluation* for logical operators (as do C/C++ and Java), then you can reduce
    the number of test cases.^([^(292)](#fn292)) For the OR operator, you’ll still
    need two cases if the first subexpression evaluates to `false`, but you can just
    use a single test case if the first subexpression evaluates to `true` (as the
    entire expression will then evaluate to true). For the AND operator, you’ll only
    need a single test if the first subexpression evaluates to `false` (the result
    will always be false), but you need both tests if the first subexpression evaluates
    to `true`.


    *Loop coverage* is similar to branch coverage above, as loops contain conditionals.
    The difference is that in `for`, `while`, or `do`-`while` loops you have the highest
    likelihood of introducing an *off-by-one error* and you need to test for that
    explicitly. First, you’ll need a test for a *normal* run through the loop. Then
    there is the possibility with pretest loops that you never enter the loop body
    (if the loop conditional expression fails the very first time). Then you’ll need
    to test for an *infinite loop* if the conditional expression never becomes `false`.
    This is most likely if the loop control variable was not updated in the loop body,
    or if it was updated incorrectly, or if the loop conditional expression was wrong
    from the beginning. For loops that read files, you normally need to test for the
    *end-of-file* marker (EOF). This is another place where errors could occur either
    because of a premature end-of-file or because (in the case of using standard input)
    end-of-file is never indicated.


    *Return values* should always be checked, even when they are not the main functional
    component of the tested code. In many languages, standard library functions and
    operating system calls all return values. For example, in C, the `fprintf` and
    `fscanf` families of functions return the number of characters printed to an output
    stream and the number of input elements assigned from an input stream, respectively.
    But hardly anyone ever checks these return values.^([^(293)](#fn293)) You should,
    as they may reveal the more subtle and sneaky issues with the code! Note that
    Java is a bit different than C or C++. In Java, many of the similarly offending
    routines will have return values declared `void` rather than `int` as in C or
    C++. So the above problem occurs much less frequently in Java than in other languages.
    It’s not completely gone however: while the `System.out.print()` and `System.out.println()`
    methods in Java are both declared to return `void`, the `System.out.printf()`
    method returns a `PrintStream` object that is almost universally ignored. In addition,
    it’s perfectly legal in Java to call a `Scanner`’s `next()` or `nextInt()` methods
    or any of the methods that read data and not save the return value in a variable.
    Be careful out there.'
  raw: '## Testing in an Agile Development Environment


    While many of the ideas and methods are the same no matter what development process
    you are using, agile processes have a different viewpoint on testing. Most agile
    methodologies strongly encourage (and XP requires) the use of TDD so that unit
    tests are written before the production code is written.


    TDD makes a lot of sense on an agile team due to *continuous integration*. In
    most agile methodologies, every time a developer finishes writing a task or a
    feature, they are expected to integrate their new code into the code base and
    test it using an automated test suite. On a team of 10 – 20 developers, this can
    happen many times a day. One of the rules of *continuous integration* is that
    if you write a new piece of code that passes the unit tests, but after integration
    it breaks the product, *you have to fix it right away*. No bug reports, no passing
    the problem off to a separate bug fixing and integration team; the developer who
    wrote the code is supposed to fix the problem immediately. This, combined with
    the fact that most new features or tasks implemented in an agile project are small
    (remember, tasks are supposed to be 8 hours of effort or less, total) makes integration
    testing an extension of unit testing. Having the tests ready to go for continuous
    integration retesting just makes sense.


    Another reason for TDD in agile is that many agile approaches recommend (while
    XP requires) *pair programming*, with two developers taking turns writing code
    and refining their tests and the code. They test often (say every time they have
    a new function written) and integrate often, and all of their new tests are added
    to the automated test suite for the project. It’s a win, win, win.


    Finally, in an agile project, *the customer is a crucial part of the development
    team and does system testing*. In many cases, the customer is on site so the system/acceptance
    tests established by the customer can be run after each integration of code changes.


    Consequently, in agile projects, the entire suite of tests (unit tests, integration
    tests, and system tests) is part of the normal agile development process.


    ## What to Test?


    Now that we’ve talked about different phases of testing and when you should do
    your unit testing, it’s time to discuss just *what* to test. What you’re testing
    falls into two general categories: *code coverage* and *data coverage*.


