    \ openMP\n*/\n#include \n#include \n#include \n/* Here's the merge; it's sequential\
    \ and the normal one you'd write */\nvoid merge(int* array, int start, int end)\
    \ {\nint middle = (start + end) / 2;\nint temp_index = 0;\n/* create a temporary\
    \ array */\nint* temp = malloc(sizeof(int) * (end - start + 1));\n/* merge in\
    \ sorted data from the 2 halves */\nint left = start;\nint right = middle + 1;\n\
    /* while both halves have data */\nwhile((left \\n\", argv[0]);\nexit(1);\n}\n\
    int SIZE = atoi(argv[1]);\nint* nums = malloc(sizeof(int) * SIZE);\n/* enable\
    \ recursive parallel blocks */\nomp_set_nested(1);\n/* put in random numbers */\n\
    for(i = 0; i < SIZE; i++) {\nnums[i] = rand( ) % 1000;\n}\n/* sort them */\nmergeSort(nums,\
    \ 0, SIZE - 1);\nreturn 0;\n}\n```"
  trans: "\n最后，我们得到一张最终输出映射表，其中包含目录中所有文件中每个独特单词及其总频次的条目。因此，我们看到*MapReduce*模式是一组有用的操作，它允许并行程序实现针对“拆分-计算-合并”问题的解决方案。\n\
    \n*MapReduce*非常普遍，其解决方案也广受欢迎，以至于诞生了一个名为 Hadoop 的标准框架，该框架以*MapReduce*作为其基本操作基础。Hadoop\
    \ 现在是 Apache 项目的一部分。“Apache Hadoop 是一个在由商用硬件构建的大型集群上运行应用程序的框架。Hadoop 框架透明地为应用程序提供可靠性和数据移动。Hadoop\
    \ 实现了一种名为 MapReduce 的计算范式，其中应用程序被划分为许多小的工作片段，每个片段都可以在集群中的任何节点上执行或重新执行。此外，它还提供了一个分布式文件系统，即\
    \ Hadoop 分布式文件系统（HDFS），该系统将数据存储在计算节点上，从而在集群中提供非常高的总带宽。MapReduce 和 Hadoop 分布式文件系统的设计都使得节点故障能够由框架自动处理。”^(²⁵³)\n\
    \n### 模式 5：分而治之\n\n在众多具有递归解决方案的问题中，许多都适用于*分而治之*策略。在这种策略中，数据通常规模较大且连续，问题的特点是：较小版本的问题被独立解决，而较大问题的解决方案依赖于这些较小问题的解。这些问题的这一特性使其易于并行化：原始的大问题可以被分解为较小的子问题（同时处理数据的离散子集），每个子问题可以依次独立求解，然后将部分解合并回原问题的解。图\
    \ 15-5 展示了分而治之的工作原理。\n\n![](img/270563_3_En_15_Fig5_HTML.jpg)\n\n该图展示了一个问题被拆分为多个子问题，这些子问题经历计算和合并阶段，最终获得解决方案。\n\
    \n图 15-5\n\n分而治之策略示意图\n\n请注意，在图 15-5 的示例中，在使用*分而治之*策略的程序中，并发量会随着程序的执行过程而变化。在程序的开始和结束时，并发量很小，但随着程序将数据划分成更多层级，并发量会增长，在某个点达到最大值，之后随着合并操作的发生，并发量又会减少。此外，在递归的某个层级，求解所涉及的工作量会小于并行开销，此时程序应退化为顺序算法或基本情况。还存在数据划分不均匀的可能性（一个很好的例子是快速排序中的基准元素未能将当前列表平分），这也可能需要更多的工作。\n\
    \n*分而治之*策略适用于一整类递归问题，包括所有 O(n log n)排序算法、快速傅里叶变换以及线性代数中的问题。这种通用策略通常通过*Fork/Join*模式（其中一个管理者线程或实例会生成一定数量的子线程，然后等待它们完成，并将部分答案合并为最终答案）或*管理者/工作者*模式来实现。接下来你将研究*Fork/Join*并行模式。\n\
    \n### 模式 6：Fork/Join\n\n在某些问题中，并行线程的数量会随着程序的执行而变化，这使得使用简单的控制结构来调用并行性变得更加困难。解决这个问题的一种方法是在程序执行的不同时间点分叉出不同数量的线程，然后等待它们完成后再继续。通常，单个线程或进程会分叉出一定数量的子进程，这些子进程将并行执行。发起进程通常会等待所有子进程完成并汇合后，再恢复自身的执行。每次原始线程分叉出子进程时，子进程的数量可能不同。这种模式还可能存在*嵌套并行执行区域*，这会使程序的性能复杂化。\n\
    \n这种策略的伪代码保留了顺序分治算法的递归特性；它看起来类似于以下内容：\n\n```\nResultType solve(Problem problem)\
    \ {\nif (problem.size is small enough)\nreturn solveSequentially(problem);\nelse\
    \ {\nResultType left, right;\nDivide problem into K subproblems;\nFork the K subproblems;\n\
    join; // 等待所有子问题完成\nreturn combine(left, right);\n}\n}\n```\n\n这段代码也说明了此类模式的一个问题。`combine()`函数看起来本质上是串行的，并且每次执行`solve()`时都会执行。这可能会减慢问题的并行实现速度。为了说明这一点，让我们检查一个归并排序算法的版本；并行版本的伪代码如下所示：\n\
    \n```\nmergesort(list, start, end) {\nif (start < end) then\nmid = floor(start\
    \ + (end – start)) / 2)\nfork mergesort(list, start, mid)\nmergesort(list, mid+1,\
    \ end)\njoin\nmerge(list, start, mid, end)\n}\n```\n\n我们用 C 语言并使用 OpenMP 并行包来实现这个程序。在\
    \ C 语言中，在`main()`函数中，我们首先告诉 OpenMP 允许嵌套并行区域，这是由于归并排序中的递归所必需的。然后，在`mergeSort()`函数中，我们在对`mergeSort()`的两次递归调用周围创建一个并行区域。我们告诉\
    \ OpenMP 将该区域中创建的线程数限制为 2，这样每次递归调用将恰好获得一个线程，从而创建总体适当数量的执行线程。\n\n```\n/*\n* 使用\
    \ openMP 的 C 语言并行归并排序版本\n*/\n#include \n#include \n#include \n/* 这里是归并函数；它是顺序的，也是你通常会编写的标准函数\
    \ */\nvoid merge(int* array, int start, int end) {\nint middle = (start + end)\
    \ / 2;\nint temp_index = 0;\n/* 创建一个临时数组 */\nint* temp = malloc(sizeof(int) *\
    \ (end - start + 1));\n/* 从两个半区合并排序后的数据 */\nint left = start;\nint right = middle\
    \ + 1;\n/* 当两个半区都有数据时 */\nwhile((left <= middle) && (right <= end)) {\nif(array[left]\
    \ <= array[right]) {\ntemp[temp_index] = array[left];\ntemp_index++;\nleft++;\n\
    } else {\ntemp[temp_index] = array[right];\ntemp_index++;\nright++;\n}\n}\n/*\
    \ 将左半区剩余数据复制到临时数组 */\nwhile(left <= middle) {\ntemp[temp_index] = array[left];\n\
    temp_index++;\nleft++;\n}\n/* 将右半区剩余数据复制到临时数组 */\nwhile(right <= end) {\ntemp[temp_index]\
    \ = array[right];\ntemp_index++;\nright++;\n}\n/* 将排序后的数据复制回原数组 */\nfor(temp_index\
    \ = 0; temp_index <= (end - start); temp_index++) {\narray[start + temp_index]\
    \ = temp[temp_index];\n}\nfree(temp);\n}\n/* 这是并行归并排序函数 */\nvoid mergeSort(int*\
    \ array, int start, int end) {\nint middle = (start + end) / 2;\n/* 基本情况：如果数组大小为\
    \ 0 或 1，则已排序 */\nif((end - start) == 0) {\nreturn;\n}\nif((end - start) >= 1)\
    \ {\n/* 设置线程数 */\nomp_set_num_threads(2);\n/* 创建并行区域 */\n#pragma omp parallel\n\
    {\n#pragma omp single\n{\n/* 分叉出两个线程 */\n#pragma omp task\nmergeSort(array, start,\
    \ middle);\n#pragma omp task\nmergeSort(array, middle + 1, end);\n}\n}\n/* 等待两个线程完成\
    \ */\n/* 合并两个已排序的半区 */\nmerge(array, start, end);\n}\n}\n/* 主函数 */\nint main(int\
    \ argc, char* argv[]) {\nint i;\nif(argc != 2) {\nfprintf(stderr, \"用法: %s \\\
    n\", argv[0]);\nexit(1);\n}\nint SIZE = atoi(argv[1]);\nint* nums = malloc(sizeof(int)\
    \ * SIZE);\n/* 启用递归并行块 */\nomp_set_nested(1);\n/* 填入随机数 */\nfor(i = 0; i < SIZE;\
    \ i++) {\nnums[i] = rand( ) % 1000;\n}\n/* 进行排序 */\nmergeSort(nums, 0, SIZE -\
    \ 1);\nreturn 0;\n}\n```\n"
- fmt: '注意我们在该程序中使用 OpenMP 的 `sections` 指令。该指令保证 `parallel` 编译指示内的每个 `section` 将由线程组中的一个线程执行一次。不同的
    `section` 允许由不同的线程执行。在 `parallel` 块的末尾还有一个隐式屏障，因此直到两个 `mergeSort()` 线程完成后，`merge()`
    函数才会被调用。因此，通过 *Fork/Join* 模式，我们可以分割已分区的数组，执行独立的 `mergeSort()`，然后在每对排序完成时进行合并。通过这种设置，除了最后一次调用外，每次调用
    `mergeSort()` 都会将当前子列表一分为二，然后创建两个新的执行线程，这两个线程将执行至完成，当两者都完成时，`merge()` 函数将执行，线程将结束。被排序的数组将在所有线程之间共享。活跃线程的数量将增加，直到达到最大值（经过
    `log[2] n` 步之后），此时线程将开始结束，并发生连接。请注意，每次创建和销毁新线程时都会产生开销，因此在考虑使用 OpenMP 时需要考虑到这一点。


    该程序的顺序版本在单个线程中执行所有操作，但使用系统栈来跟踪对 `mergeSort()` 的递归调用。每次调用 `mergeSort()` 时，都会在系统栈上创建一个新的活动记录^([^(254)](#fn254))，当每个
    `mergeSort()` 调用结束时，该活动记录被移除。通过这种方式，系统栈在执行过程中增长和收缩。同样，数组由 `mergeSort()` 函数的所有活动实例共享。在
    `merge()` 函数中创建的临时数组是该函数的局部变量，并在 `merge()` 退出时消失。顺序版本的主要开销是系统栈上活动记录的创建和销毁。如上所述，在实现程序的顺序版本时，您需要考虑此开销。


    虽然这个并行版本可以工作，并且我们能够利用测试系统中的多核，但事实证明阿姆达尔定律^([^(255)](#fn255))将成为我们的障碍。`merge()`
    函数本质上是顺序执行的，因此会拖慢整个程序，所以我们潜在的速度提升非常小。在运行 Linux 的双核共享内存系统上，归并排序程序的并行版本最终比顺序版本慢。对于更大尺寸的数组，我们还必须小心同时创建的线程数量（这就是我们在
    `parallel` 编译指示中限制线程数量的原因）；大多数操作系统对单个用户可以同时创建的活跃线程或进程数量有限制。


    我们如何解决并行版本的这个问题？可以做出两个更改。首先，在 `mergeSort()` 函数中，对基本情况的测试 `if (start < end)` 可以改为阈值测试。我们可以跟踪递归调用的次数或当前子列表的长度，如果它低于某个阈值，我们就停止递归，并切换到不同的排序算法，例如插入排序，对于小数组，其时间复杂度接近线性。不过，这个修复并没有改变
    `merge()` 函数的顺序执行本质。我们可以通过创建一个并行合并函数来使程序更快。`merge` 函数已经是一个 O(n) 算法，所以我们不想让它变得更慢。它也不是一个明显的并行化候选。目标应该是得到一个
    O(n) 或更快的并行算法（可能通过减少复杂度估计中的系数大小）。*分治*算法可能正是我们寻找的。该算法的开发超出了本书的范围，但在著名的 CLRS *算法导论*
    的当前版本中有一个很好的并行合并算法，我们向感兴趣的读者推荐。^([^(256)](#fn256))


    ## 结论


    正如您可能已经注意到的，并行设计模式可能彼此非常相似。这是因为它们通常遵循从相应的串行算法/程序创建并行算法/程序的过程。该过程是：(1) 识别并发性，(2)
    将程序拆分为并发部分，(3) 如果更新后的算法需要，则拆分数据，(4) 并行执行并发部分，以及 (5) 将所有答案组合起来得到最终答案。也就是说，并行设计模式为我们提供了一组有用的抽象，用于思考并行编程。


    # Part IIICoding Practices'
  raw: 'Notice that we use the OpenMP sections directive in this program. This directive
    guarantees that each section inside the parallel pragma will be executed once
    by a thread from the team. Different sections are allowed to be executed by different
    threads. There is also an implicit barrier at the end of the parallel block so
    that the `merge()` function won’t be called until the two `mergeSort()` threads
    are completed. So, with the *Fork/Join* pattern, we can separate the partitioned
    array, do the independent `mergeSort()`s, and then merge when each pair is complete.
    With this setup, each call to `mergeSort()`, except for the last ones, will divide
    the current sub-list in half, then create two new threads of execution which will
    execute to completion and, when both finish, the `merge()` function will execute
    and the thread will end. The array being sorted will be shared among all the threads.
    The number of threads active will increase until we get to a maximum (after log[2]
    n steps), at which time the threads will begin to end, and the joins will happen.
    Note that there is overhead incurred every time a new thread is created and destroyed,
    so this needs to be taken into account when you consider using OpenMP.


    The sequential version of this program executes everything in a single thread,
    but uses the system stack to keep track of the recursive calls to `mergeSort()`.
    Every time `mergeSort()` is called, a new activation record^([^(254)](#fn254))
    is created on the system stack, and when each `mergeSort()` call ends, that activation
    record is removed. In this way, the system stack grows and shrinks during execution.
    Again, the array is shared by all the active instances of the `mergeSort()` function.
    The temporary array created in the `merge()` function is local to that function
    and disappears when `merge()` exits. The major overhead in the sequential version
    is the creation and destruction of the activation records on the system stack.
    As above, you need to consider this overhead when implementing the sequential
    version of the program.


    While this parallel version works and we are able to take advantage of the multiple
    cores in our test system, it turns out Amdahl’s Law^([^(255)](#fn255)) will be
    our undoing here. The `merge()` function as written is inherently sequential and
    thus slows down the entire program, so our potential speedup is very small. The
    parallel version of the mergesort program ends up being slower than the sequential
    version on a two-core, shared memory system running Linux. With larger sizes of
    the array, we also have to be careful of how many threads we will create simultaneously
    (that is why we limited the number of threads in the parallel pragma); most operating
    systems have limits on the number of simultaneously active threads or processes
    that a single user can create.


    How might we fix this problem with the parallel version? There are two changes
    that might be made. First, in the `mergeSort()` function, the test for the base
    case, `if (start < end)`, can be changed to be a threshold test instead. We can
    keep track of either the number of recursive calls or the length of the current
    sub-list and if it drops below a certain threshold, we stop recursing and switch
    to a different sorting algorithm, say insertion sort, which approaches linear
    time complexity for small arrays. This fix doesn’t change the sequential nature
    of the `merge()` function though. We can make the program faster by creating a
    parallel merge function. The `merge` function is already a O(n) algorithm, so
    we don’t want to make it any slower. It is also not an obvious candidate for parallelization.
    The goal should be a parallel algorithm that is O(n) or faster (possibly by reducing
    the coefficient size in the complexity estimate). A *Divide and Conquer* algorithm
    might be what we are looking for. The development of this algorithm is somewhat
    beyond the scope of this book, but there is a nice parallel merge algorithm in
    the current edition of the famous CLRS *Introduction to Algorithms* book, which
    we commend to the interested reader.^([^(256)](#fn256))


    ## Conclusion


    As you have likely noticed by now, parallel design patterns can be very similar
    to each other. This is because they typically follow the process of creating a
    parallel algorithm/program from a corresponding serial algorithm/program. The
    process is (1) identify concurrency, (2) split the program into the concurrent
    pieces, (3) split the data if the updated algorithm calls for it, (4) execute
    the concurrent pieces in parallel, and (5) put all the answers back together to
    make a final answer. That said, parallel design patterns provide us with a useful
    set of abstractions for thinking about parallel programming.


