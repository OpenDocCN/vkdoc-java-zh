    ## 那么，如何开发软件？


    嗯，你首先要做的就是阅读这本书。它当然不会告诉你所有事情，但会为你提供一个很好的入门介绍，让你了解软件开发究竟是怎么回事，以及你需要做什么才能编写出优秀的代码。它有其独特的视角，但这个视角是基于我们合计约
    40 年的专业编码经验，以及另外 24 年试图弄清楚如何教会他人进行开发的经历。


    尽管软件开发只是软件工程的一部分，但它是每个软件项目的核心。毕竟，*归根结底，你交付给用户的是能正常运行的代码*。一个协同工作的开发团队通常负责创建这些代码。因此，首先，我们或许应该从外部审视一个软件项目，并问一问：这个团队需要做什么才能让项目成功？


    为了成功进行软件开发，你需要具备以下几点：


    *   **要意识到在项目开始时，你并非无所不知**。软件开发项目并非如此运作。你总会发现新的需求；有些需求会被发现并不像客户想象的那么重要；还有一些原本计划在下一个版本中实现的需求，突然之间变成了头号需求。这被称为*需求变更*。在项目过程中管理需求变更，是软件开发人员可以拥有的最重要技能之一。如果你正在使用新的开发工具（比如一个新的
    Web 开发框架），你会发现一些你未曾意识到的局限性，以及一些副作用，这些副作用会迫使你去学习，例如，另外三个工具才能理解它们（例如，你想用的那个 Web
    开发工具是基于 Ruby 的，需要特定的关系型数据库系统才能运行，并且需要 Apache 的特定配置才能正常工作）。


    *   **一个规模小、整合良好的团队**。小团队比大团队拥有更少的沟通线路。更容易了解团队成员的优点和缺点，理解他们的个性和偏好，并确定谁是特定问题或工具的专家。整合良好的团队通常一起合作过多个项目。让一个团队在多个项目中保持稳定，是团队经理和团队成员个人的一项重要工作。整合良好的团队效率更高，更善于遵守时间表，并且在发布时更有可能产生缺陷更少的代码。保持团队稳定的关键在于，给他们有趣的工作，给他们决定如何工作的自由，并通过消除障碍和帮助解决冲突来促进工作流程。


    *   **团队成员之间良好的沟通**。团队成员之间持续、直接的沟通对于日常进展和成功完成项目至关重要。同地办公的团队通常比地理上分散（即使只是分布在建筑物的不同楼层或侧翼）或远程工作的团队沟通得更好，沟通也更频繁。^(³)
    这对于那些软件开发站点遍布全球的大型公司来说是一个主要问题。


    *   **团队与客户之间良好的沟通**。与客户的沟通对于在项目过程中控制需求和需求变更至关重要。现场或附近的客户允许与开发团队进行持续互动。客户可以对新版本提供即时反馈，并可以参与为产品创建系统测试和验收测试。敏捷开发方法论强烈鼓励客户成为开发团队的一部分，甚至更好的是，每天都能在现场。关于一些敏捷方法的快速介绍，请参见第
    2 章。


    *   **一个每个人都认同的流程**。每个项目，无论大小，都遵循一个流程。较大的项目需要更多的协调，以及对沟通和配置管理更严格的控制。因此，较大的团队往往更倾向于计划驱动，并遵循需要更多规则和文档的流程。如今，较小的项目和较小的团队往往倾向于遵循更敏捷的开发流程，具有更大的灵活性，并且需要的文档更少。这当然并不意味着敏捷项目*没有*流程；它只是意味着你只做对项目当前阶段有意义的事情，以便你能正确地发现并满足所有需求，按时完成计划，并交付高质量的产品。关于流程和软件生命周期的更多细节，请参见第
    2 章。


    *   **对该流程保持灵活的能力**。没有哪个项目会完全按照你第一天设想的那样进行。需求会变化，人员会流动，工具会失效或更新，等等。这一点完全关乎如何处理项目中的风险。如果你能识别风险，计划如何减轻风险，然后制定应急计划来处理风险实际发生的情况，你的处境就会好得多。第
    4 章讨论了需求和风险。


    *   **一个每个人都认同的计划**。你不会在没有算法的情况下就开始编写排序程序，所以你也不应该在没有计划的情况下启动一个软件开发项目。项目计划概括了你将如何实施你的项目。它涉及流程、风险、资源、工具、需求管理、估算、时间表、配置管理和交付。它不必很长，不需要包含项目日常生活的所有细微细节，甚至不需要写下来，但团队中的每个人都需要对其有投入，需要理解它，并且需要同意它。除非每个人都认同这个计划，否则你注定会失败。关于项目规划的更多细节，请参见第
    3 章。


    *   **要时刻了解项目所处的位置**。这又回到了沟通的问题上。大多数项目都有定期的状态会议，以便开发人员能够“同步”他们当前的状态，了解整个项目的状态，并在团队内部建立一种同志情谊。这对于较小的团队（比如，最多约
    20 名开发人员）非常有效，其中许多团队每天都会举行“站立会议”来在每天开始时同步状态。不同的流程模型处理这种“站立会议”的方式不同。例如，计划驱动的模型不要求这些会议，而是依赖团队经理之间相互沟通。敏捷流程通常要求全员每日会议，以促进在高度动态的项目环境中进行持续的团队沟通。


    *   **要勇敢地说：“嘿，我们落后了！”** 几乎所有的软件项目在开始时，时间表都过于乐观。这是客户想听到的，是公司想提供的，也是经理和开发人员想承诺的。“当然，我一周内就能搞定！”“我今天下班前给你。”“明天？没问题。”不，不，不，不，不。面对现实吧。在某个时候你会落后。对此最好的做法就是立即告诉你的经理。当然，他们可能会生气。但如果你最终落后了一个月而他们却毫不知情，他们会更生气。弗雷德·布鲁克斯对软件项目是如何变得如此落后的著名回答是“一天一天地落后”。不过，好消息是，你越早发现自己落后了，你拥有的选择就越多。这些选择包括延长工期（不太可能，但确实会发生），将一些需求移到未来的版本中，获得额外的帮助，等等。重要的是让你的经理随时了解情况。

