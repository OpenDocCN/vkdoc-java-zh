  trans: "\n## 架构模式：分层方法\n\n分层架构方法建议，程序可以像地质层一样，按一系列层次进行结构化，各层之间具有定义明确的接口序列。这样做的效果是将每一层与其上下层隔离开来，使得我们能够更改任何一层的内部实现，而无需改动程序中的其他层。当然，前提是你的更改不涉及对接口的任何修改。在分层方法中，除非绝对必要，否则不应更改接口。分层方法在编程中的两个经典例子是操作系统和通信协议。\n\
    \n操作系统的架构有多个目标，其中包括集中控制有限的硬件资源，以及保护用户免受彼此干扰。操作系统的分层架构方法同时实现了这两点。请查看图 7-6 中操作系统的标准架构图。\n\
    \n![](img/270563_3_En_7_Fig6_HTML.jpg)\n\n分层架构图展示了从上到下排列的应用程序层、操作系统服务层、操作系统内核层、设备驱动层和硬件层。\n\
    \n图 7-6\n\n操作系统分层架构示例\n\n在这个分层模型中，用户应用程序通过系统调用接口请求操作系统服务。这通常是应用程序访问计算机硬件的唯一途径。大多数操作系统服务必须通过内核发出请求，而所有硬件请求都必须经过直接与硬件设备通信的设备驱动程序。这些层中的每一层都有定义明确的接口，因此，例如，开发人员可以为新磁盘驱动器添加新的设备驱动程序，而无需更改操作系统的任何其他部分。这就是信息隐藏的一个例子。\n\
    \n通信协议中也存在相同类型的接口。最著名的分层协议是国际标准化组织（ISO）的开放系统互连（OSI）七层模型，如图 7-7 所示。\n\n![](img/270563_3_En_7_Fig7_HTML.jpg)\n\
    \n该图展示了从下到上排列的物理层、数据链路层、网络层、传输层、会话层、表示层和应用层。\n\n图 7-7\n\nISO-OSI 分层架构\n\n在这个模型中，每一层都包含逻辑上相似且被组合在一起的功能或服务。每一层之间都定义了接口，并且层与层之间的通信仅允许通过接口进行。特定的实现不必包含所有七层，有时会将两个或多个层合并以形成更小的协议栈。OSI\
    \ 模型既定义了七层方法，也定义了所有接口协议。该模型可以从 [`www.itu.int/rec/T-REC-X.200/en`](http://www.itu.int/rec/T-REC-X.200/en)\
    \ 下载为 PDF 文件。（ITU，即国际电信联盟，是 ISO 的新名称。）\n\n表 7-1 展示了在各层实现的协议示例。\n\n表 7-1\n\n使用\
    \ ISO-OSI 架构的分层协议示例\n\n| 层 | 协议 |\n| --- | --- |\n| 7. 应用层 | http, ftp, telnet\
    \ |\n| 6. 表示层 | MIME, SSL |\n| 5. 会话层 | Sockets |\n| 4. 传输层 | TCP, UDP |\n| 3.\
    \ 网络层 | IP, IPsec |\n| 2. 数据链路层 | PPP, Ethernet, SLIP, 802.11 |\n| 1. 物理层 |  \
    \ |\n\n## 结论\n\n软件架构是应用程序的核心。它是你构建程序其余部分的基础，并驱动着你的其余设计。软件架构有许多不同的风格，在任何给定的项目中，你可能会使用不止一种风格。程序所使用的架构风格取决于你所做的事情。这正是这些风格的美妙之处；形式服从功能可能并不总是成立，但对于软件而言，设计服从架构。这些基础性的架构模式引导你走上设计之路，塑造你的程序将如何构建和运行。\n\
    \n# 8. 设计原则\n\n> *构建软件设计有两种方式。一种是使其简单到明显没有缺陷。另一种是使其复杂到没有明显缺陷。*\n> \n> — C. A.\
    \ R. 霍尔\n\n看待软件问题的一种方式是使用一个将问题分为两个不同层次的模型：\n\n*   “棘手”问题属于上层。这些问题通常来自计算机科学之外的领域（例如，生物学、商业、气象学、社会学、政治学等）。这类问题往往是开放式的、定义不清的，并且从需要大量工作的意义上来说是庞大的。例如，几乎任何类型的网络商务应用都是一个棘手问题。Horst\
    \ W. J. Rittel 和 Melvin M. Webber 在 1973 年一篇关于社会政策的论文中^(¹⁴⁶)，给出了用于识别棘手问题的定义和一组特征，我们将在本章后面讨论这些内容。\n\
    \n*   “温顺”问题属于下层。这些问题往往跨越其他问题领域；它们通常定义更明确且规模较小。排序和搜索是温顺问题的绝佳例子。然而，小规模和定义明确并不意味着“容易”。温顺问题可能非常复杂且难以解决。只是它们被明确定义，并且你知道何时有了解决方案。这类问题为计算机科学家提供了数据结构和算法方面的基础，用于解决来自其他问题领域的棘手问题。\n\
    \n你可能会问，这与设计原则有什么关系？嗯，认识到你将遇到的大多数大型软件问题都内在地具有一定程度的“棘手性”，这会影响你思考设计问题的方式，影响你处理大型、定义不清问题的解决方案设计的方法，并让你对设计过程有一些深入的了解。在本章中，我们将进一步讨论棘手问题和温顺问题，为什么你可以问心无愧地放弃瀑布模型，优秀设计的特征是什么，以及你可以应用哪些统一的启发式方法来帮助你解决复杂的设计问题。\n"
- fmt: '# Wicked Problems


    According to Rittel and Webber, a *wicked problem* is one for which the requirements
    are completely known only after the problem is solved, or for which the requirements
    and solution evolve over time. It turns out this describes most of the “interesting”
    problems in software development. Jeff Conklin has revised Rittel and Webber’s
    description of a wicked problem^([^(147)](#fn147)) and provided a more succinct
    list of the characteristics of wicked problems.^([^(148)](#fn148)) To paraphrase:


    1. *A wicked problem is not understood until after the creation of a solution.*
    Another way of saying this is that the problem is defined and solved at the same
    time.^([^(149)](#fn149))


    2. *Wicked problems have no stopping rule*; that is, you can create incremental
    solutions to the problem, but there’s nothing that tells you that you’ve found
    the correct and final solution.


    3. *Solutions to wicked problems are not right or wrong*; they are better or worse,
    or good enough or not good enough.


    4. *Every wicked problem is essentially novel and unique.* Because of the “wickedness”
    of the problem, even if you have a similar problem next week, you basically have
    to start over again because the requirements will be different enough and the
    solution will still be elusive.


    5. *Every solution to a wicked problem is a “one shot operation.”* See the bullet
    point above.


    6. *Wicked problems have no given alternative solutions.* That is, there is no
    small finite set of solutions from which to choose.


    Wicked problems crop up all over the place. For example, creating a word processing
    program is a wicked problem. You may think that you know what a word processor
    needs to do: insert text, cut and paste, handle paragraphs, print. But this list
    of features is only one person’s list. As soon as you “finish” your word processor
    and release it, you’ll be inundated with new feature requests: spell checking,
    footnotes, multiple columns, support for different fonts, colors, styles, and
    the list goes on. The word processing program is essentially never done—at least
    not until you release the last version and end-of-life the product.


    Wicked problems include instances where you don’t really know if you can solve
    the problem at the start. Expert systems require a user interface, an inference
    engine, a set of rules, and a database of domain information. For a particular
    domain, it’s not at all certain at the beginning that you can create the rules
    that the inference engine will use to reach conclusions and recommendations. So
    you have to iterate through different rule sets, send out the next version, and
    see how well it performs. Then you do it again, adding and modifying rules. You
    don’t really know if the solution is satisfactory (even just for the time being)
    until you’re done. Now that’s a wicked problem.


    Conklin and Rittel and Webber say that when faced with a large, complicated problem
    (a wicked one), traditional cognitive studies indicate most people will follow
    a linear problem-solving approach, working top-down from the problem to the solution.
    This is equivalent to the traditional waterfall model described in Chapter [2](#270563_3_En_2_Chapter.xhtml).^([^(150)](#fn150))
    Figure [8-1](#270563_3_En_8_Chapter.xhtml#Fig1) shows this linear approach.


    ![](images/270563_3_En_8_Chapter/270563_3_En_8_Fig1_HTML.jpg)


    A diagram exhibits the downward steps from problem to solution. The steps are
    marked as requirements, analysis, design, and implementation.


    **Figure 8-1** Linear problem-solving approach


    Instead of this linear, waterfall approach, real wicked problem solvers tend to
    use an approach that swings from requirements analysis to solution modeling and
    back until the problem solution is good enough. Conklin calls this an *opportunity-driven*
    or *opportunistic* approach because the designers are looking for any opportunity
    to make progress toward the solution.^([^(151)](#fn151)) The opportunity-driven
    approach looks something like Figure [8-2](#270563_3_En_8_Chapter.xhtml#Fig2).


    ![](images/270563_3_En_8_Chapter/270563_3_En_8_Fig2_HTML.jpg)


    A diagram exhibits the downward steps from problem to solution, marked as requirements,
    analysis, design, and implementation. A line in the background progresses with
    multiple peaks and troughs.


    **Figure 8-2** The opportunity-driven development approach


    In this figure, the jagged line indicates the designer’s work moving from the
    problem to a solution prototype and back again, slowly evolving both the requirements
    understanding and the solution iteration and converging on an implementation that
    is good enough to release. As an example, let’s take a quick look at a web application.


    Say that a not-for-profit organization keeps a list of activities for youth in
    your home county. The list is updated regularly and is distributed to libraries
    around the county. Currently, the list is kept on a spreadsheet and is distributed
    in hard copy in a three-ring binder. The not-for-profit wants to put all its data
    online and make it accessible over the web. It also wants to be able to update
    the data via the same web site. Simple, you say. It’s just a web application with
    an `HTML` front end and a database and middleware code to update and query the
    database as the back end. Not a problem.


    Ah, but this is really a wicked problem in disguise. Firstly, the customer has
    no idea how they want the web page(s) to look or behave, so whatever you give
    them the first time will not be precisely what they want; the problem won’t be
    understood completely until you are done. Secondly, as you develop prototypes,
    they will want more features—so the problem has no stopping rule. And finally,
    as time goes on, the not-for-profit will want changes, so there is no “right”
    answer, there are only a variety of “good enough” answers. Very wicked.


    # Tame Problems


    Conklin also provides a list of characteristics of “tame” problems, ones for which
    you can easily and reliably find a solution. “A tame problem


    1. has a well-defined and stable problem statement;


    2. has a definite stopping point (i.e., when the solution is reached);


    3. has a solution that can be objectively evaluated as right or wrong;


    4. belongs to a class of similar problems that are all solved in the same similar
    way;


    5. has solutions that can be easily tried and abandoned; and


    6. comes with a limited set of alternative solutions.”^([^(152)](#fn152))


    A terrific example of a tame problem is sorting a list of data values:


    - The problem is easily and clearly stated: sort this list into ascending order
    using this function to compare data elements.


    - Sorting has a definite stopping point: the list is sorted.


    - The result of a sort can be objectively evaluated (the list is either sorted
    correctly or it isn’t.)


    - Sorting belongs to a class of similar problems that are all solved in the same
    way. Sorting integers is similar to sorting strings is similar to sorting database
    records using a key and so on.


    - Sorting has solutions that can easily be tried and abandoned.


    - Finally, sorting has a limited set of alternative solutions; sorting by comparison
    has a set of known algorithms and a theoretical lower bound.'
