    A modular decomposition of the KWIC problem can be based on information hiding
    in the sense that you will hide both data structures and design decisions. The
    modules you create will not necessarily represent elements of the sequential list
    you have above but will instead cooperate by calling each other as needed. One
    possible list of modules for generating a KWIC index is the following:


    *   Line module (for lines of input text)


    *   Keyword-Line pair module


    *   KWICIndex module to create the indexed list itself


    *   Shift module


    *   Module to format and print the output


    *   Master control module – the main program


    The Line module will use the Keyword-Line module to create a map data structure
    (i.e., key-value pairs) where each key is a keyword and its value is the list
    of lines that begin with that keyword. The KWICIndex module will use the Line
    module to create the indexed list. The Shift module will use the KWICIndex module
    (and, consequently, the Line and Keyword-Line modules) and create the shifted
    set of lines. Sorting will be handled internally in the KWICIndex module; the
    index will be created as a sorted list and any additions to the list will maintain
    the sorted order. The format and print module will format the keyword lines so
    that the keywords are printed in all caps. For an alternative view, the lines
    could also be unshifted and keywords would be lined up under each other on consecutive
    output lines. Finally, the master control module will read the input, create the
    KWICIndex, and cause it to print correctly.


    The key of these modules is that you can describe the modules and their interactions
    without needing the details of how each module is implemented and how the data
    is stored. That is hidden in the module description itself. Other designs are
    also possible. For example, it might be better to subsume the circular shift operations
    inside the Line module, allowing it to store the input lines and their shifts.
    Regardless, the next step in the design is to create the interface for each module
    and to coordinate the interfaces so that each module can communicate with every
    other module regardless of the internal implementation.


