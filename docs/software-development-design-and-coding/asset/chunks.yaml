  raw: '## Design


    Now what about design? Assuming you’ve got a conceptual model from your analysis
    in the form of a few use cases and possibly a few class diagrams, your more detailed
    design should follow from this. In object-oriented design, the next steps are
    to solidify the class designs: decide on the methods your classes will contain,
    determine the relationships between the classes, and figure out how each of the
    methods will do what it’s supposed to do.


    In your current example, you’ve decided on four classes: `BirdFeeder, FeedingDoor,
    Sensor`, and `RemoteControl`. The first three classes you already developed, so
    the question here is whether you need to change any of these classes in order
    to integrate the `RemoteControl` class into the program. Figure [11-2](#270563_3_En_11_Chapter.xhtml#Fig2)
    shows what you’ve got right now.


    ![](images/270563_3_En_11_Chapter/270563_3_En_11_Fig2_HTML.jpg)


    A diagram illustrates the Remote Control class. The following classes are depicted.
    Bird Feeder. Feeding Door. Sensor. Remote Control.


    Figure 11-2


    How to integrate the RemoteControl class


    Thinking about it, it seems that nothing in `FeedingDoor` or `Sensor` should have
    to change. Why?


    Well, it’s because the `BirdFeeder` class uses these two classes, which in turn
    don’t need to use anything from any other class; they are pretty self-sufficient.
    If you recall, it’s the `operate()` method in the `BirdFeeder` class that does
    all the hard work. It has to check the light level from the `Sensor` and if appropriate,
    send a signal to the doors to open or close. So, it seems that maybe the `RemoteControl`
    class will work the same way. The question for your design is: does the `BirdFeeder`
    class also use the `RemoteControl` class, or does the `RemoteControl` class stand
    alone and just wait for an “event” to happen?


    Let’s take a look at the code for the `operate()` method again:


    ```

    public void operate() {

    lightLevel = s1.getLevel();

    if (lightLevel > ON_THRESHOLD) {

    Iterator door_iter = doors.iterator();

    while (door_iter.hasNext()) {

    FeedingDoor a = (FeedingDoor) door_iter.next();

    a.open();

    }

    } else if (lightLevel < OFF_THRESHOLD) {

    Iterator door_iter = doors.iterator();

    while (door_iter.hasNext()) {

    FeedingDoor a = (FeedingDoor) door_iter.next();

    a.close();

    }

    }

    }

    ```


    In this method, you check the light level from the `Sensor` object and if it’s
    above a certain level (the sun has risen), you ask the doors to open. It’s the
    doors themselves that check to see if they are already open or not. Regardless,
    when the `open()` method returns, each door is open. The same thing happens with
    the `close()` method. Regardless of how they start out, when each invocation of
    `close()` returns, its door is closed. This is precisely the behavior you want
    from the `RemoteControl` object, except that instead of a light threshold, it
    responds to a button press. So the pseudo-code for `pressButton()` will look like:


    ```

    pressButton()

    while (there are still doors left to process) do

    if (the door is open) then

    door.close()

    else

    door.open()

    end-if

    end-while

    end-method.

    ```


    And from here you can now write the actual code.


    ## Change in the Right Direction


    A key element of the last two sections is that object-oriented analysis and design
    are *all about change*. Analysis is about understanding behavior and *anticipation
    of change*, while design is about implementing the model and *managing change*.
    In a typical process methodology, analysis and design are iterative. As you begin
    to create a new program, you uncover new requirements; as the user begins to use
    your prototypes, they come up with new ideas, things that don’t work for them
    or don’t spark joy, and new features they hadn’t mentioned previously. All of
    these things require you to go back and rethink what you already know about the
    problem and what you have designed. In order to avoid what’s known as “analysis
    paralysis,” you need to manage this never-ending flow of new ideas and requirements.


    ### Recognizing Change


    One way to deal with change is to look for what might change in your design. Let’s
    look at the B⁴++ again. Right now, the B⁴++ will open and close the bird feeder’s
    doors at sunrise and sunset in response to the light levels returned by the sensor.
    It will also open and close the feeding doors in response to a button push from
    the remote control. What might change here?


    Well, the hardware might change. If the sensor physically changes, that might
    affect how the `Sensor` class should work. Getting new hardware can result in
    the appearance of new use cases or changes to existing use cases, just like the
    remote control addition we made above. And just like the remote control example,
    new hardware can result in the appearance of new use cases or changes to existing
    use cases. These changes can consequently ripple down through your class hierarchy.


    The requirements might change and, very likely, new requirements might crop up.
    A requirement change can lead to alternate paths through use cases, leading to
    design changes. Design change can happen because requirements change.


    By thinking about what things can change in your program and design, you can begin
    to anticipate change. *Anticipating change* will lead you to be more careful about
    encapsulation, inheritance, dependencies of one class on another, and so on. Careful
    is good, but don’t let the infeasibility of anticipating everything block you
    from making progress. You are satisficing here.^([^(188)](#fn188))


    ### Songbirds Forever


    While we’re talking about change, let’s look at B⁴++ again. It’s several weeks
    now since Alice and Bob received delivery of their new and improved B⁴++ with
    remote control. Alice loves it. She can watch the birds outside the kitchen window
    and when the grackles swoop in, she just hits the remote control button and the
    doors shut. The grackles leave disappointed, she hits the button again, and the
    doors open. The new version works like a charm and does everything they had asked
    for.


    There’s just one little thing....


    Alice has discovered that sometimes she has to run errands, or go to the bathroom,
    or watch her favorite nature show on The Discovery Channel. When she does this,
    she can’t close the door with the remote and the grackles can come and feed to
    their hearts’ content, chasing away all the songbirds. So Alice would like yet
    another teensy change to the B⁴++; hardly worth mentioning, really. She wants
    the B⁴++ to detect the pesky birds and close the doors automagically. How do you
    make this happen?'
  trans: '

    ## 设计


    那么设计方面呢？假设你已经通过分析得到了一个概念模型，形式是几个用例和可能的几个类图，那么更详细的设计应以此为基础展开。在面向对象设计中，接下来的步骤是巩固类的设计：确定类将包含的方法，明确类之间的关系，并弄清楚每个方法将如何实现其预定功能。


    在你当前的示例中，你已经确定了四个类：`BirdFeeder`、`FeedingDoor`、`Sensor` 和 `RemoteControl`。前三个类你已经开发完成，因此这里的问题是：为了将
    `RemoteControl` 类集成到程序中，是否需要修改这些类中的任何一个？图 11-2 展示了当前的情况。


    ![](img/270563_3_En_11_Fig2_HTML.jpg)


    一张图展示了 Remote Control 类。图中描绘了以下类：Bird Feeder、Feeding Door、Sensor、Remote Control。


    图 11-2


    如何集成 RemoteControl 类


    仔细想想，似乎 `FeedingDoor` 或 `Sensor` 中没有任何内容需要修改。为什么呢？


    嗯，这是因为 `BirdFeeder` 类使用了这两个类，而这两个类本身不需要使用任何其他类的内容；它们相当自给自足。如果你还记得，`BirdFeeder`
    类中的 `operate()` 方法完成了所有繁重的工作。它必须检查来自 `Sensor` 的光照水平，并在适当时向门发送打开或关闭的信号。因此，似乎 `RemoteControl`
    类也可能以同样的方式工作。你的设计问题是：`BirdFeeder` 类是否也使用 `RemoteControl` 类，还是 `RemoteControl`
    类独立存在，只等待某个“事件”发生？


    让我们再次查看 `operate()` 方法的代码：


    ```

    public void operate() {

    lightLevel = s1.getLevel();

    if (lightLevel > ON_THRESHOLD) {

    Iterator door_iter = doors.iterator();

    while (door_iter.hasNext()) {

    FeedingDoor a = (FeedingDoor) door_iter.next();

    a.open();

    }

    } else if (lightLevel < OFF_THRESHOLD) {

    Iterator door_iter = doors.iterator();

    while (door_iter.hasNext()) {

    FeedingDoor a = (FeedingDoor) door_iter.next();

    a.close();

    }

    }

    }

    ```


    在这个方法中，你检查来自 `Sensor` 对象的光照水平，如果高于某个阈值（太阳升起了），你就要求门打开。门本身会检查它们是否已经打开。无论如何，当 `open()`
    方法返回时，每扇门都是打开的。`close()` 方法也是如此。无论初始状态如何，每次调用 `close()` 返回时，其对应的门都是关闭的。这正是你希望
    `RemoteControl` 对象具有的行为，只不过它不是响应光照阈值，而是响应按钮按下。因此，`pressButton()` 的伪代码将如下所示：


    ```

    pressButton()

    while (还有门需要处理) do

    if (门是打开的) then

    door.close()

    else

    door.open()

    end-if

    end-while

    end-method.

    ```


    从这里开始，你现在可以编写实际的代码了。


    ## 朝着正确的方向改变


    最后两节的一个关键要素是，面向对象的分析和设计*完全关乎变化*。分析是关于理解行为和*预见变化*，而设计则是关于实现模型和*管理变化*。在典型的流程方法论中，分析和设计是迭代的。当你开始创建一个新程序时，你会发现新的需求；当用户开始使用你的原型时，他们会提出新想法、发现对他们不起作用或无法激发喜悦的东西，以及他们之前未提及的新功能。所有这些都要求你回过头去重新思考你已经了解的问题以及你已经设计的内容。为了避免所谓的“分析瘫痪”，你需要管理这种永无止境的新想法和需求流。


    ### 识别变化


    处理变化的一种方法是寻找设计中可能发生变化的地方。让我们再次看看 B⁴++。目前，B⁴++ 会根据传感器返回的光照水平，在日出和日落时打开和关闭喂鸟器的门。它还会响应遥控器的按钮按下，打开和关闭喂食门。这里可能会发生什么变化呢？


    嗯，硬件可能会变化。如果传感器物理上发生了变化，这可能会影响 `Sensor` 类的工作方式。获得新硬件可能会导致新用例的出现或现有用例的变化，就像我们上面添加遥控器一样。并且就像遥控器的例子一样，新硬件可能会导致新用例的出现或现有用例的变化。这些变化可能会因此波及你的类层次结构。


    需求可能会变化，而且很可能新需求会突然出现。需求变化可能导致用例的替代路径，从而引发设计变化。设计变化可能因为需求变化而发生。


    通过思考程序中哪些内容可能发生变化以及你的设计，你可以开始预见变化。*预见变化*会让你在封装、继承、类之间的依赖关系等方面更加谨慎。谨慎是好的，但不要因为无法预见所有事情而阻碍你取得进展。你在这里追求的是“满意即可”。^(¹⁸⁸)


    ### 鸣禽永在


    既然我们在谈论变化，让我们再看看 B⁴++。自从爱丽丝和鲍勃收到他们带有遥控器的新改进版 B⁴++ 以来，已经过去几周了。爱丽丝很喜欢它。她可以看着厨房窗外的鸟儿，当鹩哥俯冲下来时，她只需按下遥控器按钮，门就会关上。鹩哥失望地离开，她再次按下按钮，门又打开了。新版本运行完美，实现了他们要求的所有功能。


    只是有一件小事……


    爱丽丝发现，有时她需要外出办事、去洗手间，或者观看探索频道她最喜欢的自然节目。当她这样做时，她无法用遥控器关门，鹩哥就可以随心所欲地进食，把所有鸣禽都赶走。所以爱丽丝希望
    B⁴++ 再做一个微小的改动；真的不值一提。她希望 B⁴++ 能够检测到讨厌的鸟并自动关闭门。你如何实现这一点？

    '
- fmt: '### A New Requirement


    So the new requirement is that “The B⁴++ must be able to detect the unwanted birds
    and close the doors automatically.” Is this a complete requirement? It doesn’t
    seem so because it begs the obvious question of when do the doors open again?
    So it seems you have at least a couple of things to decide.


    1. How does the bird feeder detect bird types?

    2. How do you distinguish between the unwanted birds and the songbirds?

    3. When does the bird feeder open the doors again after they’ve been closed?


    Luckily for you, your sensor supplier, SensorsRUs, has just come out with a programmable
    audio sensor that will let you identify birdsong. So if you integrate their hardware
    into the B⁴++, that takes care of item #1 above. It also turns out that the pesky
    birds have way different songs from the songbirds you want to attract, so that
    the audio sensor can be programmed via firmware to distinguish between the different
    bird species, so that takes care of issue #2. So what about issue #3, getting
    the closed doors open again?


    It seems as if there are two ways you can get the B⁴++ to open the doors again:
    timer or sensor. You can have a timer that keeps the doors shut for a specific
    amount of time and then opens them again. This has the advantage of simplicity
    of both design and implementation. Simple in the sense that the timer program
    just implements a countdown timer with no information about the *context* in which
    it operates. It could easily open the door while there are still a bunch of unwanted
    birds around. Another way you could implement the bird identifier is to have it
    only open the door when it hears one of the songbirds. As songbirds leave when
    there are non-songbirds birds around, then the only time you’d hear songbirds
    singing is if there are no pesky non-songbirds around, in which case it’s safe
    to reopen the feeding doors.


    Let’s make a use case. Because opening and closing the feeding doors with the
    song identifier is a lot like using the remote control, let’s start with the `RemoteControl`
    use case as the *main path* and then create the alternate new use case directly
    from it as the *alternate path* in the use case. Table [11-1](#270563_3_En_11_Chapter.xhtml#Tab1)
    shows the main and alternate paths side by side. One or the other path should
    be taken at any given time.


    **Table 11-1** The Song Identifier Use Case and Its Alternate


    | Main Path | Alternate Path |

    | --- | --- |

    | 1. Alice hears or sees birds at the bird feeder. | 1.1 The songbird identifier
    hears birdsong. |

    | 2. Alice determines that they are *not* songbirds. | 2.1 The songbird identifier
    recognizes the song as from an unwanted bird. |

    | 3. Alice presses the remote control button. | 3.1 The songbird identifier sends
    a message to the feeding doors to close. |

    | 4. The feeding doors close. | |

    | 5. The birds give up and fly away. | 5.1 The songbird identifier hears birdsong.
    |

    | | 5.2 The songbird identifier recognizes the song as from a songbird. |

    | 6. Alice presses the remote control button. | 6.1 The songbird identifier sends
    a message to the feeding doors to open. |

    | 7. The feeding doors open again. | |


    These two paths aren’t exactly the same. For instance, in the main path, Alice
    sees the birds give up and fly away before she presses the remote control button
    to reopen the doors. In the alternate path, the bird song identifier must wait
    until it hears birdsong before it can open the feeding doors again. So you could
    easily make these two different use cases rather than two alternative paths for
    a simple use case. It is up to *you*. Use cases are there to illustrate different
    scenarios in the use of the program, so you can represent them in any way you
    want. If you want to break this use case up into two different ones, feel free.
    Just be consistent. You’re still managing change.


    ## Separating Analysis and Design


    As we’ve said before, it is difficult to separate analysis and design. The temptation
    for every programmer, particularly beginning programmers, is to start writing
    code *now*. That temptation leads to thinking about and doing analysis, design,
    and coding all at once. This is usually a *bad idea* unless your program is only
    about 10 lines long. It’s nearly always better to abstract out requirements and
    architectural ideas from your low-level design and coding. Chapters [5](#270563_3_En_5_Chapter.xhtml)
    and [6](#270563_3_En_6_Chapter.xhtml) talked about this separation more.


    Separating object-oriented analysis and design is a particularly difficult task.
    In analysis we are trying to understand the problem and the problem domain from
    an object-oriented point of view. That means we start thinking about objects and
    their interactions with each other *very* early in the process. Even our scenarios
    and use cases are littered with loaded object words. Analysis and design are nearly
    inseparable: when you are “doing analysis” you can’t help but “think about design”
    as well. So what should you do when you actually want to start thinking about
    design?


    Your design must produce, at minimum, the classes in your system, their public
    interfaces, and their relationships to other classes, especially base or super
    classes. If your design methodology produces more than that, ask yourself if all
    the pieces produced by that design have value over the lifetime of the program.
    If they do not, maintaining them will cost you. Members of development teams tend
    not to maintain anything that does not contribute to their productivity; this
    is a fact of life that many design methods don’t account for.


    All software design problems can be simplified by introducing an extra level of
    conceptual indirection. This idea is the basis of abstraction, the primary feature
    of object-oriented programming. The idea is to identify common features in two
    or more classes and abstract those features out into a higher level, more general
    class that the lower level classes then inherit from.


    When designing, make your classes as atomic as possible; that is, give each class
    a single, clear purpose. This is the *Single Responsibility Principle*^([^(189)](#fn189))
    that we’ll talk more about in the chapter on design principles. If your classes
    or your system design grows too complicated, break complex classes into simpler
    ones. The most obvious indicator of this is sheer size: if a class is big, chances
    are it’s doing too much and should be broken up.


    You also need to look for and separate things that change from things that stay
    the same. That is, search for the elements in a program that you might want to
    change without forcing a redesign, then encapsulate those elements in classes.


    All of these guidelines are key to managing the changes in your design. In the
    end, you want a clean, understandable design that is easy to maintain.'
