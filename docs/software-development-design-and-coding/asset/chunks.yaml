  trans: '

    ## 我们讨论的是哪种需求？


    我们实际上讨论的是*功能需求*。也就是说，用户启动程序后能看到并能使用的功能列表。这些是展示程序外部行为的“黑盒”需求。对用户而言，这些是唯一重要的需求。在计划驱动型流程中，识别需求这一活动的输出是一份关于软件系统应实现功能的*功能规格说明书*。对于敏捷流程，其输出则是一组定义*产品待办列表*的*用户故事*。


    在项目需求挖掘过程中，你通常会看到四种不同类型：用户需求、领域需求、非功能需求以及非需求。


    ### 用户需求


    用户需求几乎总是用自然语言表达。它们是用户在使用程序时期望看到的具体细节。这些需求还包括对屏幕布局、对话框和菜单的描述。程序中任何交互元素都应在用户需求中加以描述。例如：


    *登录系统*：当格洛丽亚点击主页上的“登录”按钮时，屏幕中央会出现一个登录对话框。登录对话框必须包含两个文本框，分别标注为“用户名”和“密码”。对话框中还必须有两个按钮，分别标注为“提交”和“取消”。如果格洛丽亚在任何时候按下“取消”按钮，对话框应消失，她将返回上一个屏幕。在正常使用中，她会点击“用户名”文本框并输入用户名，然后点击（或按
    Tab 键切换到）“密码”文本框并输入密码。在“密码”文本框中输入的文本必须隐藏。格洛丽亚输入完用户名和密码后，必须按下“提交”按钮。如果她输入了正确的用户名/密码组合，她将进入主菜单页面。如果格洛丽亚的用户名/密码组合不正确，对话框中会显示“用户名或密码无效，请重试”的消息，文本框将被清空，她将获得再次登录的机会。


    你可以将用户需求表达为场景和/或逐屏的详细描述。在定义用户需求时，请记住尽可能使用图片。如果你的程序是基于 Web 的，你可以在开发前创建大量快速粗糙的数字版甚至手绘版线框图向用户展示。这将有助于明确期望，并极大地促进对功能元素和风格选择的讨论。


    ### 领域需求


    这些是程序的应用程序领域强加给你的需求。如果你正在编写一个新版本的所得税程序，你将受到最新国税局法规的约束。总账程序必须遵守最新版的《公认会计原则》（GAAP），而智能手机则需要实现最新的全球移动通信系统（GSM）协议。你不需要写下所有这些需求，只需引用它们即可。一套详细的领域需求为开发人员提供了程序设计过程中所需的信息。领域需求通常被认为是“中间层”软件，因为它们是应用程序的核心，位于用户界面之下，操作系统、网络或数据库软件之上。许多领域需求将作为独立的类和库来实现，并拥有自己的
    API。用户只关心那些影响上述用户需求的领域需求。


    ### 非功能需求


    非功能需求是对程序服务和功能的约束，以及对程序性能的期望。它们可以包括目标平台规格、时间约束、性能要求、内存使用要求、文件访问权限、安全要求、响应时间、每秒最小事务处理数量等等。这些通常是用户可能看不到但确实会影响用户体验的需求。非功能需求的一个例子是，你的网页需要在
    3 秒内加载并显示。


    ### 非需求


    非需求是指产品*不会*做的事情。你需要将这些传达给客户，因为在列出程序将做什么之后，需求阶段最重要的事情就是*管理期望*。在发布前的最终演示中，客户可能说出的最糟糕的话之一就是：“但我以为它会做……”。你需要告知项目中的所有利益相关者程序将要做什么，以及它*不会*做什么。特别是，你需要让他们知道所有不会实现的需求相关方面——至少在当前版本中不会实现，例如“一次只能运行一个倒计时定时器”或“不会有允许按食物类型选择解冻模式的解冻周期”。但要注意，因为你的程序不会做的事情的实际列表几乎是无限的。尽管如此，关键的非需求应该与客户明确讨论，并在你的设计文档中清晰陈述。


    ## 在计划驱动型项目中收集需求


    *功能规格说明书*完全从用户的角度描述程序将做什么。它不关心软件是如何实现的。它讨论程序的功能，并指定屏幕、菜单、对话框等。可以把它看作是一本写得不好的用户手册。另一种规格可以称为*技术规格说明书*。技术规格说明书描述程序的内部实现细节。也就是说，它讨论数据结构、使用的算法、数据库模型、编程语言的选择等等。我们不打算讨论技术规格，只讨论功能规格。


    “等等，”你说。“我们在第 2 章中讨论的那些敏捷方法论呢？*它们*不写功能规格说明书。所以你看！我可不用操心了。”事实上，敏捷方法论*确实*会编写功能规格说明书。只是它们的形式不同于某些计划驱动型方法论所要求的
    300 页单倍行距的需求文档。敏捷方法论要求你与客户代表或产品负责人一起编写*用户故事*，来阐述程序将做什么。那也是一种规格。我们将在本章后面讨论敏捷方法论如何处理需求。本章的重点以及贯穿全章的理念是：*在开始编码之前，写下你的程序应该做什么*。

    '
- fmt: '### Gathering Requirements: But I Don’t Like Writing!


    A standard argument made by software developers is that they can’t write. Nonsense!
    Everyone can learn to write functional specs. But writing is work. You have to
    get in there and practice writing before you’ll be any good at it. If you’re still
    in school (be it undergrad or graduate school), take a course in writing, one
    where you’ve got to write analytical essays or fictional stories or poetry or
    scientific reports every single week. You should also have to read other works
    critically; reading other people’s writing, whether good or bad, is a great way
    to learn how to write better.


    Functional requirements should always be written in a natural language. Why? Well,
    it’s the Sapir-Whorf linguistic relativity hypothesis, don’t you know?^([^(132)](#fn132))
    In a nutshell, language not only determines what you *do* say, it determines what
    you *can* say (and think). That is, the language you use determines what kinds
    of thoughts you are able to have; it tends to constrain your thinking processes,
    and thus what you can think about and how you express your thoughts. If the language
    doesn’t have room for certain kinds of thoughts, you are much less likely to think
    them. Natural languages are much more expressive and varied than programming languages,
    so you want to write requirements and do your designs in natural languages and
    save the programming languages for implementation later. Whether you believe the
    Sapir-Whorf hypothesis or not, it’s nearly always a good idea to develop your
    functional requirements in a natural language so you don’t get bogged down in
    the syntactic and semantic details of a programming language before you need to.
    This doesn’t mean that you can’t think about implementation while you’re doing
    the functional requirements (you inevitably will, trust us), but just shunt those
    thoughts over into a “technical note” sidebar of your specification or a completely
    separate document.^([^(133)](#fn133)) You might also look at Kenneth Iverson’s
    Turing Award lecture, “Notation as a Tool of Thought,” for a similar discussion.^([^(134)](#fn134))


    ### Gathering Requirements: Outline of a Functional Specification


    In general, functional specification should have the elements we will discuss
    below. Lots of the ideas here are from Spolsky.^([^(135)](#fn135)) Keep in mind
    that every functional specification is different, just as every software development
    project is different. So take this outline with a grain of salt and just use the
    parts that apply to your project.


    #### Overview


    This is your executive summary. It’s a paragraph or two of what the program is
    supposed to do. For example:


    “This program runs your microwave oven. It interfaces to a keypad and an LCD display
    that provides user input and output functionality. Its functions are limited to
    those that a standard microwave would have, with the addition of single buttons
    for pizza and coffee reheating. It also will run a time of day clock and a standalone
    countdown timer. It doesn’t control the light. It has a safety interlock that
    will prevent the microwave from starting if the door is open.”


    #### Disclaimer


    You should always put in a statement right at the start stating that “This specification
    isn’t done yet. If you think something is missing or wrong, send me an email.”
    That helps keep all the marketing guys off your back and lets you file new feature
    requests in your mail trash bin. Lots of people will put a big, black `DRAFT`
    in the header or footer of the document. That can work as well, but folks tend
    to ignore it. Some people will use a big `DRAFT` watermark on their specs, so
    that every page has the word embedded behind the text. This doesn’t stop people
    from yelling at you either. At some point, your disclaimer should change to something
    like “This specification is as complete as it will be for this release. If you
    think something is missing or wrong, send an email to the author and we’ll consider
    it for the next release.”


    #### Author’s Name


    Somebody needs to be responsible for the functional specification. Not a committee,
    not the development team, *one person*. This is usually either the development
    manager or the project manager, depending on how your company sets up development
    projects. There are pros and cons to all the different organizational arrangements.


    If the development manager (the person to whom the developers report) is in charge
    of the functional spec, then that person is usually up to speed on all the technical
    aspects of the project. That’s good. On the other hand, if your boss writes the
    functional spec, it might be harder to tell her that there’s something wrong with
    the specification or that you don’t agree with the design. Also, development managers
    were probably developers at one time and so they may not have the people skills
    (read: charm and schmoozing skills) necessary to talk to marketing, the customer,
    documentation, testing, and so on.


    If your company puts project managers in charge of specifications, design, and
    schedule, but don’t have developers directly reporting to them, then you run the
    risk of getting someone that isn’t as technically savvy as a former developer.
    On the other hand, these folks can usually charm the socks off the other teams
    so negotiations are a lot smoother. Project managers do need to have some technical
    skills and to be very good at getting all the stakeholders to reach consensus
    on the contents of the functional specification.


    #### Scenarios of Typical Usage


    These are the actual requirements. A great way to get customers to respond to
    your requirements list is to present several scenarios of typical usage of the
    program as part of the specification. These are known as *user stories* and they
    have a couple of advantages:


    *   First, if you write the requirements as if they’re user stories, the customer
    is more likely to read them.


    *   Second, customers are more likely to understand what you’re doing and come
    up with ideas for things you’ve missed or gotten wrong. This is always a good
    thing, because the more customer input you get early in the process, the more
    likely you’ll actually create something they want.


    In many agile methodologies, including Scrum, requirements are often written as
    user stories. As the customer is usually part of the agile project team, you can
    get constant feedback on user stories and daily program builds. In Scrum, the
    customer isn’t required to be part of the project team, but they are strongly
    encouraged to keep in close contact with the team. Also, in Scrum, shorter sprint
    lengths allow the customer to see working versions of the product more often.
    In the Unified Modeling Language (UML, see [`www.uml.org`](http://www.uml.org)),
    there is an entire notation used to create use cases (another word for scenarios
    or user stories). But, as discussed, nothing beats natural language for describing
    requirements. We’ll come back to use cases in Chapter [10](#270563_3_En_10_Chapter.xhtml).


    Once you’ve written a couple of scenarios, you will have a much better idea of
    how your program will flow, as well as what screens, dialog boxes, menus, and
    so on you’ll need. This lets you go through each one of those screens and flesh
    out the details of how they’re laid out, what buttons, text boxes, icons, graphics,
    and so on they’ll have, and what other screens they connect to. Use pictures!
    Natural language is great, but it is also inherently ambiguous, so a picture of
    a screen or a dialog box is worth way more than a thousand words. It gives the
    reader a clearer picture (pun intended) of what you are planning and gets them
    thinking about program flow and their user interface needs and wants.'
  raw: '### Gathering Requirements: But I Don’t Like Writing!


    A standard argument made by software developers is that they can’t write. Nonsense!
    Everyone can learn to write functional specs. But writing is work. You have to
    get in there and practice writing before you’ll be any good at it. If you’re still
    in school (be it undergrad or graduate school), take a course in writing, one
    where you’ve got to write analytical essays or fictional stories or poetry or
    scientific reports every single week. You should also have to read other works
    critically; reading other people’s writing, whether good or bad, is a great way
    to learn how to write better.


    Functional requirements should always be written in a natural language. Why? Well,
    it’s the Sapir-Whorf linguistic relativity hypothesis, don’t you know?^([^(132)](#fn132))
    In a nutshell, language not only determines what you *do* say, it determines what
    you *can* say (and think). That is, the language you use determines what kinds
    of thoughts you are able to have; it tends to constrain your thinking processes,
    and thus what you can think about and how you express your thoughts. If the language
    doesn’t have room for certain kinds of thoughts, you are much less likely to think
    them. Natural languages are much more expressive and varied than programming languages,
    so you want to write requirements and do your designs in natural languages and
    save the programming languages for implementation later. Whether you believe the
    Sapir-Whorf hypothesis or not, it’s nearly always a good idea to develop your
    functional requirements in a natural language so you don’t get bogged down in
    the syntactic and semantic details of a programming language before you need to.
    This doesn’t mean that you can’t think about implementation while you’re doing
    the functional requirements (you inevitably will, trust us), but just shunt those
    thoughts over into a “technical note” sidebar of your specification or a completely
    separate document.^([^(133)](#fn133)) You might also look at Kenneth Iverson’s
    Turing Award lecture, “Notation as a Tool of Thought,” for a similar discussion.^([^(134)](#fn134))


    ### Gathering Requirements: Outline of a Functional Specification


    In general, functional specification should have the elements we will discuss
    below. Lots of the ideas here are from Spolsky.^([^(135)](#fn135)) Keep in mind
    that every functional specification is different, just as every software development
    project is different. So take this outline with a grain of salt and just use the
    parts that apply to your project.


    #### Overview


    This is your executive summary. It’s a paragraph or two of what the program is
    supposed to do. For example:


    “This program runs your microwave oven. It interfaces to a keypad and an LCD display
    that provides user input and output functionality. Its functions are limited to
    those that a standard microwave would have, with the addition of single buttons
    for pizza and coffee reheating. It also will run a time of day clock and a standalone
    countdown timer. It doesn’t control the light. It has a safety interlock that
    will prevent the microwave from starting if the door is open.”


    #### Disclaimer


    You should always put in a statement right at the start stating that “This specification
    isn’t done yet. If you think something is missing or wrong, send me an email.”
    That helps keep all the marketing guys off your back and lets you file new feature
    requests in your mail trash bin. Lots of people will put a big, black DRAFT in
    the header or footer of the document. That can work as well, but folks tend to
    ignore it. Some people will use a big DRAFT watermark on their specs, so that
    every page has the word embedded behind the text. This doesn’t stop people from
    yelling at you either. At some point, your disclaimer should change to something
    like “This specification is as complete as it will be for this release. If you
    think something is missing or wrong, send an email to the author and we’ll consider
    it for the next release.”


    #### Author’s Name


    Somebody needs to be responsible for the functional specification. Not a committee,
    not the development team, *one person*. This is usually either the development
    manager or the project manager, depending on how your company sets up development
    projects. There are pros and cons to all the different organizational arrangements.


    If the development manager (the person to whom the developers report) is in charge
    of the functional spec, then that person is usually up to speed on all the technical
    aspects of the project. That’s good. On the other hand, if your boss writes the
    functional spec, it might be harder to tell her that there’s something wrong with
    the specification or that you don’t agree with the design. Also, development managers
    were probably developers at one time and so they may not have the people skills
    (read: charm and schmoozing skills) necessary to talk to marketing, the customer,
    documentation, testing, and so on.


    If your company puts project managers in charge of specifications, design, and
    schedule, but don’t have developers directly reporting to them, then you run the
    risk of getting someone that isn’t as technically savvy as a former developer.
    On the other hand, these folks can usually charm the socks off the other teams
    so negotiations are a lot smoother. Project managers do need to have some technical
    skills and to be very good at getting all the stakeholders to reach consensus
    on the contents of the functional specification.


    #### Scenarios of Typical Usage


    These are the actual requirements. A great way to get customers to respond to
    your requirements list is to present several scenarios of typical usage of the
    program as part of the specification. These are known as *user stories* and they
    have a couple of advantages:


    *   First, if you write the requirements as if they’re user stories, the customer
    is more likely to read them.


    *   Second, customers are more likely to understand what you’re doing and come
    up with ideas for things you’ve missed or gotten wrong. This is always a good
    thing, because the more customer input you get early in the process, the more
    likely you’ll actually create something they want.


    In many agile methodologies, including Scrum, requirements are often written as
    user stories. As the customer is usually part of the agile project team, you can
    get constant feedback on user stories and daily program builds. In Scrum, the
    customer isn’t required to be part of the project team, but they are strongly
    encouraged to keep in close contact with the team. Also, in Scrum, shorter sprint
    lengths allow the customer to see working versions of the product more often.
    In the Unified Modeling Language (UML, see [`www.uml.org`](http://www.uml.org)),
    there is an entire notation used to create use cases (another word for scenarios
    or user stories). But, as discussed, nothing beats natural language for describing
    requirements. We’ll come back to use cases in Chapter [10](#270563_3_En_10_Chapter.xhtml).


    Once you’ve written a couple of scenarios, you will have a much better idea of
    how your program will flow, as well as what screens, dialog boxes, menus, and
    so on you’ll need. This lets you go through each one of those screens and flesh
    out the details of how they’re laid out, what buttons, text boxes, icons, graphics,
    and so on they’ll have, and what other screens they connect to. Use pictures!
    Natural language is great, but it is also inherently ambiguous, so a picture of
    a screen or a dialog box is worth way more than a thousand words. It gives the
    reader a clearer picture (pun intended) of what you are planning and gets them
    thinking about program flow and their user interface needs and wants.'
  trans: '

    ### 收集需求：但我就是不爱写文档！


    软件开发者常抱怨自己不会写文档。一派胡言！每个人都能学会编写功能规格说明。但写作确实是项苦差事。你必须真正投入其中，勤加练习才能写好。如果你还在上学（无论是本科还是研究生），不妨选修一门写作课——那种要求你每周撰写分析性文章、虚构故事、诗歌或科学报告的课程。你还应该学会批判性地阅读他人作品；无论好坏，阅读他人的文字都是提升写作水平的绝佳途径。


    功能需求应当始终使用自然语言编写。为什么？这涉及萨丕尔-沃尔夫语言相对论假说，你难道不知道吗？^(¹³²)简而言之，语言不仅决定了你*会*说什么，更决定了你*能*说什么（以及思考什么）。也就是说，你所使用的语言决定了你能产生何种思维；它会约束你的思考过程，从而影响你能思考的内容以及表达方式。如果某种语言无法容纳特定类型的思维，你便很难产生这些想法。自然语言比编程语言更具表现力和多样性，因此你应该用自然语言编写需求和设计方案，而将编程语言留待后续实现。无论你是否相信萨丕尔-沃尔夫假说，用自然语言开发功能需求几乎总是明智之举——这样你就不会过早陷入编程语言的语法和语义细节中。这并不意味着在编写功能需求时不能考虑实现问题（你难免会想到，请相信我们），只需将这些想法归入规格说明的“技术备注”侧边栏或单独文档即可。^(¹³³)你还可以参考肯尼斯·艾弗森在图灵奖演讲《符号作为思维工具》中的相关论述。^(¹³⁴)


    ### 收集需求：功能规格说明大纲


    通常而言，功能规格说明应包含以下要素。其中许多观点源自斯波尔斯基。^(¹³⁵)请记住，每个功能规格说明都各不相同，正如每个软件开发项目都独具特色。因此，请灵活参考此大纲，仅采用适用于你项目的部分。


    #### 概述


    这是你的执行摘要。用一两段文字说明程序的功能。例如：


    “本程序用于控制微波炉。它通过键盘和液晶显示屏实现用户输入输出功能。其功能限定于标准微波炉应有的范围，额外增加了披萨和咖啡加热专用按钮。此外还支持时钟显示和独立倒计时功能。不控制照明灯。配备安全联锁装置，当炉门打开时会阻止微波启动。”


    #### 免责声明


    你应在文档开头明确声明：“本规格说明尚未完成。如发现遗漏或错误，请发送邮件告知。”这有助于让市场人员不再纠缠你，并让你能将新功能请求直接归档到邮件垃圾箱。许多人会在文档页眉或页脚添加醒目的黑色“草稿”字样。这同样有效，但人们往往视而不见。有些人会在规格说明中使用巨大的“草稿”水印，让每页文字背后都嵌入该字样。但这同样无法阻止人们对你发难。在适当时机，你的免责声明应改为：“本规格说明已涵盖本版本的全部内容。如发现遗漏或错误，请发送邮件给作者，我们将在下一版本中考虑。”


    #### 作者姓名


    必须有人对功能规格说明负责。不是委员会，不是开发团队，而是*一个人*。这通常是开发经理或项目经理，具体取决于公司如何组建开发项目。不同的组织架构各有利弊。


    如果由开发经理（即开发人员的直属上级）负责功能规格说明，那么此人通常能全面掌握项目的技术细节。这是好事。但另一方面，如果你的上司编写功能规格说明，你可能更难向她指出规格说明中的问题或表达不同设计意见。此外，开发经理可能曾是开发人员出身，因此未必具备与市场、客户、文档、测试等部门沟通所需的人际交往能力（即：魅力和社交技巧）。


    如果你的公司让项目经理负责规格说明、设计和进度安排，但开发人员不直接向他们汇报，那么你可能会遇到技术能力不如前开发人员的人。但另一方面，这些人通常能轻松赢得其他团队的青睐，使谈判过程更加顺畅。项目经理确实需要具备一定的技术能力，并且要非常善于让所有利益相关者就功能规格说明的内容达成共识。


    #### 典型使用场景


    这些才是真正的需求。让客户回应需求清单的绝佳方法，是在规格说明中呈现几个程序的典型使用场景。这些被称为*用户故事*，具有以下优势：


    *   首先，如果你以用户故事的形式编写需求，客户更有可能阅读它们。

    *   其次，客户更有可能理解你的意图，并提出你遗漏或理解有误的想法。这总是件好事，因为你在流程早期获得的客户反馈越多，就越有可能真正创造出他们想要的产品。


    在许多敏捷方法中（包括 Scrum），需求通常以用户故事的形式编写。由于客户通常是敏捷项目团队的一员，你可以持续获得关于用户故事和每日程序构建的反馈。在 Scrum
    中，客户并非必须成为项目团队成员，但强烈建议他们与团队保持密切联系。此外，在 Scrum 中，较短的冲刺周期让客户能更频繁地看到产品的工作版本。在统一建模语言（UML，参见[`www.uml.org`](http://www.uml.org)）中，有一套完整的符号体系用于创建用例（即场景或用户故事的另一种说法）。但如前所述，没有什么比自然语言更适合描述需求。我们将在第
    10 章中再次讨论用例。


    一旦编写了几个场景，你就能更清晰地了解程序的流程，以及需要哪些屏幕、对话框、菜单等。这让你能够逐一审视每个屏幕，详细规划其布局、包含的按钮、文本框、图标、图形等元素，以及它们与其他屏幕的连接关系。多用图示！自然语言固然出色，但本质上存在歧义，因此一张屏幕或对话框的图片胜过千言万语。它能让读者更清晰地了解你的规划（双关语），并促使他们思考程序流程以及他们对用户界面的需求和期望。

