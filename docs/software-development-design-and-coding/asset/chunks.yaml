- fmt: "# Architectural Pattern: The Layered Approach\n\nThe layered architectural\
    \ approach suggests that programs can be structured as a series of layers, much\
    \ like geologic strata, with a sequence of well-defined interfaces between the\
    \ layers. This has the effect of isolating each layer from the ones above and\
    \ below it so that we can change the internals of any layer without having to\
    \ change any of the other layers in the program. That is, of course, as long as\
    \ your changes don’t involve any changes to the interface. In a layered approach,\
    \ interfaces should not be altered unless absolutely necessary. Two classic examples\
    \ of a layered approach to programming are operating systems (OSs) and communications\
    \ protocols.\n\nAn operating system’s architecture has several objectives, among\
    \ them to centralize control of the limited hardware resources and to protect\
    \ users from each other. A layered approach to the operating system architecture\
    \ does both of these things. Take a look at a standard picture of an OS architecture\
    \ in Figure [7-6](#270563_3_En_7_Chapter.xhtml#Fig6).\n\n![](images/270563_3_En_7_Chapter/270563_3_En_7_Fig6_HTML.jpg)\n\
    \nA diagram of the layered architecture exhibits the layers of applications, operating\
    \ system services, operating system kernel, device drivers, and hardware arranged\
    \ from top to bottom.\n\n**Figure 7-6** An example of layered architecture for\
    \ an operating system\n\nIn this layered model, user applications request operating\
    \ system services via a system call interface. This is normally the only way for\
    \ applications to access the computer’s hardware. Most operating system services\
    \ must make requests through the kernel and all hardware requests must go through\
    \ device drivers that talk directly to the hardware devices. Each of these layers\
    \ has a well-defined interface, so that, for example, a developer may add a new\
    \ device driver for a new disk drive without changing any other part of the OS.\
    \ This is an example of information hiding.\n\nThe same type of interface happens\
    \ in a communications protocol. The most famous of these layered protocols is\
    \ the International Standards Organization (ISO) Open Systems Interconnection\
    \ (OSI) seven-layer model, depicted in Figure [7-7](#270563_3_En_7_Chapter.xhtml#Fig7).\n\
    \n![](images/270563_3_En_7_Chapter/270563_3_En_7_Fig7_HTML.jpg)\n\nA diagram represents\
    \ the arrangement of physical, data link, network, transport, session, presentation,\
    \ and application layers from bottom to top.\n\n**Figure 7-7** The ISO-OSI layered\
    \ architecture\n\nIn this model, each layer contains functions or services that\
    \ are logically similar and are grouped together. An interface is defined between\
    \ each layer and communication between layers is only allowed via the interfaces.\
    \ A particular implementation need not contain all seven layers, and sometimes\
    \ two or more layers are combined to make a smaller protocol stack. The OSI model\
    \ defines both the seven-layer approach and all the interface protocols. The model\
    \ can be downloaded as a PDF file from [`www.itu.int/rec/T-REC-X.200/en`](http://www.itu.int/rec/T-REC-X.200/en).\
    \ (The ITU or International Telecommunications Union is the new name for the ISO.)\n\
    \nExamples of protocols that are implemented at each layer are shown in Table\
    \ [7-1](#270563_3_En_7_Chapter.xhtml#Tab1).\n\n**Table 7-1** Example Layered Protocols\
    \ Using the ISO-OSI Architecture\n\n| Layer | Protocol |\n| --- | --- |\n| 7.\
    \ Application | `http`, `ftp`, `telnet` |\n| 6. Presentation | `MIME`, `SSL` |\n\
    | 5. Session | `Sockets` |\n| 4. Transport | `TCP`, `UDP` |\n| 3. Network | `IP`,\
    \ `IPsec` |\n| 2. Data Link | `PPP`, `Ethernet`, `SLIP`, `802.11` |\n| 1. Physical\
    \ | |\n\n## Conclusion\n\nThe software architecture is the core of your application.\
    \ It is the foundation on which you build the rest of the program and which drives\
    \ the rest of your design. There are many different styles of software architecture\
    \ and in any given project you’ll probably use more than one. The architectural\
    \ style used for a program depends on what it is you’re doing. That’s the beauty\
    \ of these styles; it may not always be true that form follows function but for\
    \ software, design follows architecture. These foundational architectural patterns\
    \ lead you down the path of design, shaping how your program will be constructed\
    \ and lived in.\n\n# Design Principles\n\n> *There are two ways of constructing\
    \ a software design. One way is to make it so simple that there are obviously\
    \ no deficiencies. And the other way is to make it so complicated that there are\
    \ no obvious deficiencies.*\n> \n> —C. A. R. Hoare\n\nOne way to look at software\
    \ problems is with a model that divides the problems into two different layers:\n\
    \n* “Wicked” problems fall in the upper layer. These are problems that typically\
    \ come from domains outside of computer science (e.g. biology, business, meteorology,\
    \ sociology, political science, etc.). These types of problems tend to be open-ended,\
    \ ill-defined, and large in the sense that they require much work. For example,\
    \ pretty much any kind of a web commerce application is a wicked problem. Horst\
    \ W. J. Rittel and Melvin M. Webber, in a 1973 paper on social policy,^([^(146)](#fn146))\
    \ gave a definition for and a set of characteristics used to recognize a wicked\
    \ problem that we’ll look at later in this chapter.\n\n* “Tame” problems fall\
    \ in the lower layer. These problems tend to cut across other problem domains;\
    \ they tend to be better defined and small. Sorting and searching are great examples\
    \ of tame problems. Small and well-defined don’t mean “easy,” however. Tame problems\
    \ can be very complicated and difficult to solve. It’s just that they are clearly\
    \ defined and you know when you have a solution. These are the kinds of problems\
    \ that provide computer scientists with foundations in terms of data structures\
    \ and algorithms for the wicked problems we solve from other problem domains.\n\
    \nWhat does this have to do with design principles, you ask? Well, realizing that\
    \ most of the larger software problems you’ll encounter have a certain amount\
    \ of “wickedness” built into them influences how you think about design issues,\
    \ how you approach the design of a solution to a large, ill-formed problem, and\
    \ gives you some insight into the design process. In this chapter, we will talk\
    \ more about wicked and tame problems, why you can abandon the waterfall model\
    \ with a clear conscience, what are the characteristics of good designs, and which\
    \ unifying heuristics you can apply to help you solve complex design problems."
