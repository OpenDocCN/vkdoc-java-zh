- fmt: '### Some Parallel Programming Definitions


    A `thread`, also called a thread of execution, is a unit of parallelism. A thread
    is a piece of code that contains everything it needs to execute a sequence of
    instructions, a private list of instructions, a call or system stack, a program
    counter, and a small amount of thread-specific data (usually on its call stack).
    A thread shares access to memory with other threads. This allows multiple threads
    to cooperate and communicate via shared variables.


    A `process` is a thread that also has its own private address space. Instead of
    using shared memory, processes communicate with each other using messages so they
    share an interface for sending and receiving messages. A process is dynamic, while
    programs are static. In other words, a process is a program in execution. Processes
    have more state associated with them than do threads, so it costs more to create
    and destroy processes. It also means that processes are intended to stay around
    longer.


    `Latency` is the amount of time it takes to complete a given unit of work, whether
    that is a process, a thread, or a smaller unit of the program. Latency can be
    a problem in program execution. If one part of a program or process takes much
    longer to execute than others, then nothing else can get done while we are waiting
    on that one part. A way around this has been used in operating systems since the
    early 1970s: context switching. Say you are executing a program and the program
    attempts to open a file on a hard disk. Disk operations are orders of magnitude
    slower than other memory operations, and having to wait on the disk operation
    to complete will slow down your program considerably, while also preventing any
    other program from executing. In cases like this, the operating system swaps out
    your program and allows other programs to execute until the disk operation completes.
    (The system must be able to let the disk perform operations independently for
    this to work.) It can then switch your program back into memory to continue executing.
    This context switching does not make the latency any shorter, but it hides the
    latency from the rest of the system and allows other programs to make progress
    towards completion. This improves the overall performance of the machine, if not
    the individual programs. This technique is like the `concurrent` technique in
    the chess example above.


    `Throughput` is the amount of work that can be computed in a unit of time. Our
    objective is to use parallelism to increase throughput. For example, a pipelined
    processor can exhibits a form of parallelism. The pipeline may be made up of different
    stages, for example, (1) fetch instruction, (2) decode instruction, (3) fetch
    data, (4) execute instruction, and (5) write data. Here we can have five different
    instructions all being executed simultaneously as each of them is in a different
    stage at any given time. This architecture improves the throughput of the machine
    by allowing it to retire more instructions per unit time than a processor that
    only has a single instruction active at a time.


    `Speedup` is the execution time of the sequential version of a program divided
    by the execution time of a parallel version of the same program. `Speedup = T[s]/T[p]`.
    (See also `Amdahl’s Law` below.) Related to speedup, efficiency is a measure that
    shows how efficiently each processor is being used. `Efficiency = Speedup/P`,
    where `P` is the number of processors in the parallel machine.


    ### Performance and Scalability


    The two main goals of parallel programming are improved performance and scalability
    to a large number of processors. In this section, we’ll look at these two goals
    briefly. For a more detailed look, see Lin & Snyder.^([^(230)](#fn230))


    `Scalability` is the idea that as the amount of input data grows, we want our
    program to be able to use more processors to efficiently accommodate this input
    growth. As the amount of data increases, we could spawn more copies of our program
    and set them loose to act on the data. But there are a number of issues that complicate
    scalability. Are we using a shared memory or a distributed memory? Does each processor
    have its own copy of the data? Are we running in lock step or independently and
    does this matter for this program? What is the topology of the network system
    that connects the processors and how does that affect communication latency (the
    time it takes to pass data from one processing element to another when it needs
    it)? Well-written parallel programs must explore and compensate for all these
    issues.'
