  trans: '

    ## 究竟什么是错误？


    在代码中，错误可分为三种类型：语法错误、语义错误和逻辑错误。


    *语法错误*是指在使用编程语言时，违反其语法规则而产生的错误。拼错关键字、使用变量前未声明、忘记在代码块中加上右花括号、忘记函数的返回类型、以及忘记在语句末尾加上分号，这些都是语法错误的典型例子。语法错误是目前最容易发现的，因为编译器几乎能为你找出所有这类错误。编译器在强制执行语言的词法和语法规则方面非常严格，因此，如果你的代码在编译过程中没有错误*且没有警告*，那么你的程序很可能就不存在语法错误了。请注意上一句中“且没有警告”这部分。你应该*始终*在开启最严格语法检查的情况下编译代码，并且在进入审查或测试阶段之前，*始终*消除所有错误和警告。在团队协作时，消除警告尤其重要，因为一旦代码集成，你代码中的一个警告可能会变成别人代码中的一个错误。


    如果你确信自己在语法上没有犯任何错误，那在查找其他错误时，你就少了一件需要担心的事。好消息是，现代集成开发环境（IDE，如 Eclipse、NetBeans、XCode
    或 Visual Studio）一旦你设置好编译器选项，就会自动为你完成这项工作。一旦你设定了警告和语法检查级别，每次你做出更改，IDE 都会自动重新编译你的文件，并告知你任何语法错误！


    *语义错误*则不同，它发生在你用编程语言错误地表达意图时，通常是由于对语言语法规则的误解。在 C/C++ 或 Java 中，没有为代码块加上花括号、在 *if*
    或 *while* 语句的条件后意外加上分号、以及在 switch 语句的 case 分支末尾忘记使用 break 语句，这些都是语义错误的经典例子。语义错误更难发现，因为它们通常是语法正确的代码片段，因此编译器能成功地将你的代码编译成目标文件。只有当你尝试运行程序时，语义错误才会通过不正确的行为表现出来。好消息是，它们通常非常明显，几乎会立即暴露出来。坏消息是，它们也可能非常隐蔽。例如，在这段代码中：


    ```

    while (j < MAX_LEN);

    {

    // 在这里执行操作

    j++;

    }

    ```


    *while* 语句条件表达式末尾的那个分号可能很难被注意到。你的眼睛可能会直接滑过它。但它的效果是，要么让程序陷入无限循环（如果条件测试通过），要么永远不执行循环（如果测试失败），但却错误地执行了后面的代码块，因为该代码块在语义上已不再与
    *while* 语句关联。任何基本的测试都应该能发现这个问题。


    *逻辑错误*则是目前最难发现和消除的。逻辑错误是你解决方案逻辑中的错误，可能源于不正确的设计，或在将设计转化为代码的过程中产生。逻辑错误包括：计算结果不正确、循环中的差一错误（如果差一错误是因为你不理解数组索引，那它也可能是一个语义错误）、误解网络协议、误解问题、遗漏步骤、从函数返回了错误的内容等等。出现逻辑错误时，你的程序要么看似正常执行但结果错误，要么突然崩溃，因为你访问了数组的越界位置、试图解引用空指针、或者试图在数据区中间执行代码。逻辑错误可能极其难以发现。


    ## 不该做什么


    虽然调试没有唯一正确的方法，^(²⁷⁸) 但这里有一些你在调试代码时应避免的做法。^(²⁷⁹)


    *不要猜测*。猜测意味着：(1) 你不理解你正在调试的程序；(2) 你没有系统地寻找错误的根本原因。停下来，深呼吸，然后重新开始。


    *不要只修复症状，要解决问题*。通常，你可以通过添加代码来强制错误消失，从而“修复”一个问题。例如，假设错误涉及某个值范围内的异常值或其他边界情况。此时很容易诱使你针对这个异常值添加代码进行特殊处理。请三思，因为你可能只是在掩盖一个薄弱环节，而不是修复它。几乎总会有其他一些特殊情况潜伏着，伺机破坏你的程序。研究程序，弄清楚更大的问题是什么，并找到一个通用的解决方案来防止未来的故障。


    *不要使用鸵鸟算法*。不要把头埋进沙子里，忽视问题。你可能会想“这只是个偶然事件”、“IDE 出故障了”、“系统的其他部分肯定坏了”、“拉尔夫的模块显然给我发了错误的数据”，或者找其他借口来逃避深入调查。虽然你代码之外的事情可能会出错，但问题往往来自内部。如果你只是“改了一个地方”，程序就崩溃了，那么猜猜看，是谁很可能刚刚在程序中引入了一个错误，以及这个错误在哪里？或者，至少它暴露了一个已有的问题。代码中的错误，无论是来自你还是他人，都是意料之中的事。关于谨慎编码以及编写正确程序有多难，最好的讨论之一来自
    Jon Bentley 的《编程珠玑》一书第 5 栏中关于如何编写二分查找例程的讨论。^(²⁸⁰) 你应该读一读。


    ## 调试方法


    调试的最佳心态是将行为异常的代码视为一个挑战，或一个充满相互关联谜题的密室逃脱。这是一个展现聪明才智的机会，一个解决网络犯罪现场的机会：是谁干的（很可能就是你……），怎么干的，在哪里干的？最棒的是，一旦你解决了问题，你还能撤销它！调试是一场你与自己的智力较量。我们保证，这场较量会让你在未来多年里都保持高度紧张！


    记住，你是在解决一个问题，而最好的方法就是系统地接近问题，然后一举击溃它。关于调试，另一件要记住的事情是，就像谋杀悬疑案一样，你是从结论开始逆向推理的。^(²⁸¹)
    坏事已经发生了——你的程序失败了。现在你需要检查证据，并逆向推导出解决方案。以下是应按顺序执行的方法：


    1.  可靠地重现问题。


    2.  找到错误的根源。


    3.  修复错误（仅修复这一个）。


    4.  测试修复（这样你以后就有了一个回归测试）。


    5.  可选地，在你刚修复的错误附近查找其他错误。

    '
- fmt: '### Debugging Step 1: Reproduce the Problem Reliably


    If your error only shows up sporadically, it will be much, much harder to find.
    The classic example is the “but it works fine on my computer” problem. This is
    the one sentence you never want to hear. This is why people in tech support retire
    early. The key first step is reproducing the problem—in different ways, if possible—allowing
    you to see what’s happening and where. Luckily, most errors aren’t hiding too
    hard: either you get the wrong answer in some `print` statement and work backwards
    from there, or your program dies a horrible death and the system generates a backtrace
    for you. (The Java Virtual Machine does this automatically. With other languages,
    you may need to use a debugger to get the backtrace.)


    Remember, errors are not random events. If the error is showing up sporadically,
    the culprit is usually one of the following (although this list is not exhaustive):


    - An initialization problem, possibly due to depending on initialization to happen
    as a side effect of the variable definition and which is not working as you expect.

    - A timing error, where something is happening earlier or later than you expect.

    - A dangling pointer problem, where the pointer was expected to point to an object
    but the object no longer exists.

    - A buffer overflow or walking off the end of an array, which happen when code
    traverses beyond the boundaries of some intended space (such as looping beyond
    the edge of a collection) and stomping on either another piece of code, another
    variable, or the system stack.

    - A concurrency issue (a race condition), when you’ve not synchronized your code
    in a multi-threaded application or in an application that uses shared memory and
    a variable you need is overwritten by someone else before you get to it.


    Reproducing the problem is not enough, however. Instead, you need to reduce the
    problem to the simplest test case that triggers an error, by eliminating all extraneous
    conditions. One way to do this is to try to reproduce the problem with binary
    search: using half the data (or even half the code) you had before. Pick one half
    or the other. If the error still occurs, try it again. If the error doesn’t happen,
    try the other half of the data. If there’s still no error, then try with three-quarters
    of the data. You get the idea. You’ll know when you’ve found the simplest case
    because with anything smaller the behavior of the program will change: either
    the error will disappear, or you’ll get a slightly different error.


    ### Debugging Step 2: Find the Source of the Error


    Once you can reliably reproduce the problem, you can find where the error is occurring.
    Once again, you need to do this systematically. There are several straightforward
    techniques you can use:


    - Read the code. The first thing you should do once you’ve run your test case
    is examine the output, make an educated guess where the error might be (look at
    the last thing that got printed and find that `print` statement in the program),
    and then sit back, grab a cup of coffee, and read the code. Understanding what
    the code is trying to do in the area where the error occurs is key to figuring
    out both the source of the problem and the fix. Nine times out of ten, if you
    sit back and read the code for five minutes or so, you’ll find the problem.


    - Explain the code to a rubber ducky. When reading our own code, we often develop
    code blindness, missing the obvious problem every time we read it, even though
    we probably would have caught it immediately had it been someone else’s code.
    A solution to this blindness is to explain our code. This can be to ourselves,
    to a pet, to a plant, to a rubber ducky... you can choose your own adventure sidekick
    here. Note that we are not expecting any contributions from the sidekick, only
    passive listening skills. The adventure will usually unfold as follows: “So here
    I’m doing [A], then [B], then... Oh...”, by which point you’ll typically finally
    see the problem.


    - Gather data. If the problem is still hiding, since you’ve now got a test case
    that will reproduce the error, gather data from running the test case. The data
    can include what kinds of input cause the error, how long it takes to appear,
    what steps happen leading up to the error, and the state of the program at the
    time of the error. Once you have this data, you can form an hypothesis on where
    the error is in the code. For most types of errors, you’ll have some output that
    is correct, followed by incorrect output or by the program crashing.


    - Insert `print` statements. Once you narrow down the incorrect output, the simplest
    thing to do is to start adding `print` statements near the code interacting with
    that output, working backwards from the point where you think the error makes
    itself known. Remember that many times where an error *exhibits* its behavior
    may be many lines of code after where the error actually *occurs*. Some informative
    spots for `print` statements can be the entrance and exit to functions (where
    you could print “Entering sort routine,” “Exiting partition routine,” and so on),
    the top and bottom of loops, at the beginning of the *then* and *else* blocks
    of *if* statements, in the default case of a `switch` statement, and so on. Unless
    something very spooky is going on, you should be able to isolate where the error
    is occurring pretty quickly.


    In some languages, you can encase your `print` statements inside debugging blocks
    that you can turn on and off using compile options. In C/C++, you can insert:


    ```c

    #ifdef DEBUG

    printf("Debug statement in sort routine\n");

    #endif

    ```


    around debugging statements that you wish to execute optionally. Before compiling
    the program, you can either add the following to the header or at the top of the
    code:


    ```c

    #define DEBUG

    ```


    or you can compile the code using:


    ```

    gcc -DDEBUG foo.c

    ```


    Leaving out the `#define` or the `-DDEBUG` will simply skip executing all `#ifdef
    DEBUG ... #endif` blocks. Beware, though, because this technique makes your program
    harder to read due to all the `DEBUG` blocks scattered around the code. You should
    remove `DEBUG` blocks before your program is released. (Unfortunately, Java doesn’t
    have this facility because it doesn’t have a preprocessor.)


    In Java, you can get the same effect as the `#ifdef DEBUG` by using a named boolean
    constant. Here’s an example of code:'
  raw: "### Debugging Step 1: Reproduce the Problem Reliably\n\nIf your error only\
    \ shows up sporadically, it will be much, much harder to find. The classic example\
    \ is the “but it works fine on my computer” problem. This is the one sentence\
    \ you never want to hear. This is why people in tech support retire early. The\
    \ key first step is reproducing the problem—in different ways, if possible—allowing\
    \ you to see what’s happening and where. Luckily, most errors aren’t hiding too\
    \ hard: either you get the wrong answer in some print statement and work backwards\
    \ from there, or your program dies a horrible death and the system generates a\
    \ backtrace for you. (The Java Virtual Machine does this automatically. With other\
    \ languages, you may need to use a debugger to get the backtrace.)\n\nRemember,\
    \ errors are not random events. If the error is showing up sporadically, the culprit\
    \ is usually one of the following (although this list is not exhaustive):\n\n\
    *   *An initialization problem*, possibly due to depending on initialization to\
    \ happen as a side effect of the variable definition and which is not working\
    \ as you expect.\n\n*   *A* *timing error*, where something is happening earlier\
    \ or later than you expect.\n\n*   *A* *dangling pointer problem*, where the pointer\
    \ was expected to point to an object but the object no longer exists.\n\n*   *A\
    \ buffer overflow or walking off the end of an array*, which happen when code\
    \ traverses beyond the boundaries of some intended space (such as looping beyond\
    \ the edge of a collection) and stomping on either another piece of code, another\
    \ variable, or the system stack.\n\n*   *A concurrency issue (a race condition)*,\
    \ when you’ve not synchronized your code in a multi-threaded application or in\
    \ an application that uses shared memory and a variable you need is overwritten\
    \ by someone else before you get to it.\n\nReproducing the problem is not enough,\
    \ however. Instead, you need to reduce the problem to the simplest test case that\
    \ triggers an error, by eliminating all extraneous conditions. One way to do this\
    \ is to try to reproduce the problem with binary search: using half the data (or\
    \ even half the code) you had before. Pick one half or the other. If the error\
    \ still occurs, try it again. If the error doesn’t happen, try the other half\
    \ of the data. If there’s still no error, then try with three-quarters of the\
    \ data. You get the idea. You’ll know when you’ve found the simplest case because\
    \ with anything smaller the behavior of the program will change: either the error\
    \ will disappear, or you’ll get a slightly different error.\n\n### Debugging Step\
    \ 2: Find the Source of the Error\n\nOnce you can reliably reproduce the problem,\
    \ you can find where the error is occurring. Once again, you need to do this systematically.\
    \ There are several straightforward techniques you can use:\n\n*   *Read the code*.\
    \ The first thing you should do once you’ve run your test case is examine the\
    \ output, make an educated guess where the error might be (look at the last thing\
    \ that got printed and find that print statement in the program), and then sit\
    \ back, grab a cup of coffee, and read the code. Understanding what the code is\
    \ trying to do in the area where the error occurs is key to figuring out both\
    \ the source of the problem and the fix. Nine times out of ten, if you sit back\
    \ and read the code for five minutes or so, you’ll find the problem.\n\n*   *Explain\
    \ the code to a* *rubber ducky**.* When reading our own code, we often develop\
    \ code blindness, missing the obvious problem every time we read it, even though\
    \ we probably would have caught it immediately had it been someone else’s code.\
    \ A solution to this blindness is to explain our code. This can be to ourselves,\
    \ to a pet, to a plant, to a rubber ducky... you can choose your own adventure\
    \ sidekick here. Note that we are not expecting any contributions from the sidekick,\
    \ only passive listening skills. The adventure will usually unfold as follows:\
    \ “So here I’m doing [A], then [B], then... Oh...”, by which point you’ll typically\
    \ finally see the problem.\n\n*   *Gather data*. If the problem is still hiding,\
    \ since you’ve now got a test case that will reproduce the error, gather data\
    \ from running the test case. The data can include what kinds of input cause the\
    \ error, how long it takes to appear, what steps happen leading up to the error,\
    \ and the state of the program at the time of the error. Once you have this data,\
    \ you can form an hypothesis on where the error is in the code. For most types\
    \ of errors, you’ll have some output that is correct, followed by incorrect output\
    \ or by the program crashing.\n\n*   *Insert print statements*. Once you narrow\
    \ down the incorrect output, the simplest thing to do is to start adding print\
    \ statements near the code interacting with that output, working backwards from\
    \ the point where you think the error makes itself known. Remember that many times\
    \ where an error *exhibits* its behavior may be many lines of code after where\
    \ the error actually *occurs*. Some informative spots for print statements can\
    \ be the entrance and exit to functions (where you could print “Entering sort\
    \ routine,” “Exiting partition routine,” and so on), the top and bottom of loops,\
    \ at the beginning of the *then* and *else* blocks of *if* statements, in the\
    \ default case of a switch statement, and so on. Unless something very spooky\
    \ is going on, you should be able to isolate where the error is occurring pretty\
    \ quickly.\n\nIn some languages, you can encase your print statements inside debugging\
    \ blocks that you can turn on and off using compile options. In C/C++, you can\
    \ insert\n\n```\n    #ifdef DEBUG\n    printf(\"Debug statement in sort routine\\\
    n\");\n    #endif\n    ```\n\naround debugging statements that you wish to execute\
    \ optionally. Before compiling the program, you can either add the following to\
    \ the header or at the top of the code:\n\n```\n#define DEBUG\n```\n\nor you can\
    \ compile the code using\n\n```\ngcc -DDEBUG foo.c\n```\n\nLeaving out the `#define`\
    \ or the `-DDEBUG` will simply skip executing all #`ifdef DEBUG ... #endif` blocks.\
    \ Beware, though, because this technique makes your program harder to read due\
    \ to all the DEBUG blocks scattered around the code. You should remove DEBUG blocks\
    \ before your program is released. (Unfortunately, Java doesn’t have this facility\
    \ because it doesn’t have a preprocessor.)\n\nIn Java, you can get the same effect\
    \ as the #`ifdef DEBUG` by using a named boolean constant. Here’s an example of\
    \ code:"
  trans: "\n### 调试步骤一：可靠地重现问题\n\n如果错误只是偶尔出现，那么排查起来会困难得多。经典的例子就是“但在我的电脑上运行正常”这个问题。这是你最不想听到的一句话，也是技术支持人员早早退休的原因。关键的第一步是重现问题——如果可能的话，用不同的方式重现——这样你才能看清发生了什么以及发生在哪里。幸运的是，大多数错误并不难隐藏：要么你在某个打印语句中得到了错误结果，然后从那里反向排查；要么你的程序彻底崩溃，系统为你生成了一个回溯跟踪。（Java\
    \ 虚拟机自动执行此操作。对于其他语言，你可能需要使用调试器来获取回溯跟踪。）\n\n请记住，错误并非随机事件。如果错误是间歇性出现的，罪魁祸首通常是以下几种情况之一（尽管此列表并非详尽无遗）：\n\
    \n*   **初始化问题**，可能是由于依赖变量定义产生的副作用来进行初始化，但实际效果与预期不符。\n*   **时序错误**，某些事情发生的时间比你预期的更早或更晚。\n\
    *   **悬空指针问题**，指针本应指向某个对象，但该对象已不复存在。\n*   **缓冲区溢出或数组越界**，当代码遍历超出了预期空间的边界（例如循环超出了集合的边界）并覆盖了另一段代码、另一个变量或系统堆栈时发生。\n\
    *   **并发问题（竞态条件）**，当你未能在多线程应用程序或使用共享内存的应用程序中同步代码，并且你需要的变量在被你使用之前被其他线程覆盖时发生。\n\n\
    然而，仅仅重现问题是不够的。相反，你需要通过消除所有无关条件，将问题简化为能触发错误的最简测试用例。一种方法是使用二分法来尝试重现问题：使用之前一半的数据（甚至一半的代码）。选择其中一半。如果错误仍然出现，就再试一次。如果错误没有出现，就尝试另一半数据。如果仍然没有错误，则尝试四分之三的数据。你明白这个思路。当你找到最简用例时，你就会知道，因为任何更小的改动都会改变程序的行为：要么错误消失，要么你会遇到一个略有不同的错误。\n\
    \n### 调试步骤二：找到错误根源\n\n一旦你能可靠地重现问题，就可以找到错误发生的位置了。同样，你需要系统地进行。有几种直接的方法可供使用：\n\n\
    *   **阅读代码**。运行测试用例后，你应该做的第一件事是检查输出，做出有根据的猜测，判断错误可能在哪里（查看最后打印的内容，并在程序中找到该打印语句），然后坐下来，喝杯咖啡，阅读代码。理解代码在错误发生区域试图做什么，是找出问题根源和修复方法的关键。十有八九，如果你坐下来阅读代码五分钟左右，就能找到问题所在。\n\
    \n*   **向橡皮鸭解释代码**。在阅读我们自己的代码时，我们常常会产生“代码盲点”，每次阅读都会忽略显而易见的问题，即使如果这是别人的代码，我们可能立刻就能发现。解决这种盲点的方法就是解释我们的代码。可以向自己、宠物、植物、橡皮鸭解释……你可以在这里选择你自己的冒险伙伴。请注意，我们不期望伙伴有任何贡献，只需要被动倾听的能力。冒险通常这样展开：“所以这里我做了[A]，然后[B]，然后……哦……”，这时你通常最终会发现问题所在。\n\
    \n*   **收集数据**。如果问题仍然隐藏，既然你现在有了一个能重现错误的测试用例，那就通过运行测试用例来收集数据。数据可以包括：什么样的输入会导致错误、错误出现需要多长时间、导致错误发生前经历了哪些步骤，以及错误发生时程序的状态。一旦你有了这些数据，你就可以对代码中错误的位置形成一个假设。对于大多数类型的错误，你会先得到一些正确的输出，随后是错误输出或程序崩溃。\n\
    \n*   **插入打印语句**。一旦你缩小了错误输出的范围，最简单的做法就是开始在与该输出交互的代码附近添加打印语句，从你认为错误显现的点开始反向排查。请记住，错误*表现*其行为的地方，可能距离错误实际*发生*的地方有很多行代码。一些适合放置打印语句的位置包括：函数的入口和出口（你可以打印“进入排序例程”、“退出分区例程”等）、循环的顶部和底部、`if`\
    \ 语句的 `then` 和 `else` 分支的开头、`switch` 语句的 `default` 分支等等。除非发生了什么非常诡异的事情，否则你应该能够很快地隔离出错误发生的位置。\n\
    \n在某些语言中，你可以将打印语句包裹在调试块中，并使用编译选项来开启或关闭它们。在 C/C++ 中，你可以插入：\n\n```\n    #ifdef DEBUG\n\
    \    printf(\"排序例程中的调试语句\\n\");\n    #endif\n    ```\n\n来包裹你希望有条件执行的调试语句。在编译程序之前，你可以将以下内容添加到头文件或代码顶部：\n\
    \n```\n#define DEBUG\n```\n\n或者你可以使用以下命令编译代码：\n\n```\ngcc -DDEBUG foo.c\n```\n\
    \n省略 `#define` 或 `-DDEBUG` 将简单地跳过执行所有 `#ifdef DEBUG ... #endif` 块。但请注意，这种技术会使你的程序更难阅读，因为代码中散布着许多\
    \ DEBUG 块。你应该在程序发布之前移除 DEBUG 块。（不幸的是，Java 没有这个功能，因为它没有预处理器。）\n\n在 Java 中，你可以通过使用一个命名的布尔常量来获得与\
    \ `#ifdef DEBUG` 相同的效果。以下是一个代码示例：\n"
- fmt: "```java\npublic class IfDef {\n    final static boolean DEBUG = true;\n  \
    \  public static void main(String [] args) {\n        System.out.printf(\"Hello,\
    \ World \\n\");\n        if (DEBUG) {\n            System.out.printf(\"max(5,\
    \ 8) is %d\\n\", Math.max(5, 8));\n            System.out.printf(\"If this prints,\
    \ the code was included\\n\");\n        }\n    }\n}\n```\n\n在这个例子中，当你想要启用`DEBUG`块时，将布尔常量`DEBUG`设置为`true`；当你想要关闭它们时，将其设置为`false`。这种方法并不完美，因为每次想要开启或关闭调试时都需要重新编译，但上面的C/C++示例也是如此。\n\
    \n- **使用内置调试功能**：在IDE中编码时通常可用的内置调试功能。这些功能允许你设置断点、监视变量、单步进入和跳出函数、单步执行指令、动态修改代码、检查寄存器和其他内存位置等，从而尽可能多地了解代码中发生的情况——而且无需添加之后需要删除的打印语句。你遇到的大多数IDE，无论是开源还是专有，都内置了调试器，包括`Eclipse`、`XCode`、`Visual\
    \ Studio`、`VSCode`、`BlueJ`、`PyCharm`等。如果你不使用IDE，可以使用像`gdb`这样的独立调试器。如果快速浏览代码并添加一些打印语句仍无法让你更接近错误，那么请使用调试器。有关调试器的更多信息，请参阅下一节。\n\
    \n- **使用日志记录**：许多IDE和脚本语言（如`JavaScript`）都有内置的日志记录例程，你可以用它们来代替自己添加打印语句。通常，你可以确定哪些变量有助于记录日志以进行调试。日志记录例程通常会创建一个日志文件，你可以在运行程序后检查该文件。如果你正在进行交互式调试，则可以在程序执行期间检查日志文件。\n\
    \n- **寻找代码中的模式**，特别是那些你以前见过或自己犯过的错误。模式之所以存在，是因为开发人员会反复犯同样的错误（毕竟，我们是习惯的动物）。随着你获得更多的编程经验并更好地理解自己编写程序的方式，找到你所犯错误类型将变得更容易。\n\
    \n上面`while`循环头末尾多余的分号可能是一种模式。另一种模式可能是用经典的**差一错误**搞乱循环边界：\n\n```java\nfor (int\
    \ j = 0; j <= myArray.length; j++) {\n    // some code here\n}\n```\n\n因为你测试的是`<=`而不是`<`，所以会超出数组末尾。\n\
    \nC/C++中的一个经典错误是在条件表达式中使用一个`=`而本意是使用两个`==`，结果变成了赋值。假设你正在检查一个字符数组中的特定字符：\n\n```java\n\
    for (int j = 0; j < length; j++) {\n    if (c = myArray[j]) {\n        pos = j;\n\
    \        break;\n    }\n}\n```\n\n单等号会导致`if`语句每次都提前停止；`pos`将始终为零。Java不会允许你这样做，因为它要求条件表达式的计算结果为`boolean`类型；Java编译器会报错，指出赋值表达式的类型不是`boolean`。\n\
    \n```\nTstEql.java:10: incompatible types\nfound   : char\nrequired: boolean\n\
    if (c = myArray[j]) {\n^\n1 error\n```\n\n这是因为在Java中（就像在C和C++中一样），赋值运算符会返回一个结果，并且每个结果都有一个类型。在这种情况下，结果类型是`char`，但`if`语句期望那里有一个`boolean`表达式。Java编译器会检查这一点，因为它比C和C++类型更严格，后者的编译器不会执行此检查。\n\
    \n在`switch`语句中忘记在`case`后添加`break`语句是另一种可能的模式。\n\n```java\nswitch(selectOne) {\n\
    \    case 'p':   operation = \"print\";\n                break;\n    case 'd':\
    \   operation = \"display\";\n    default:    operation = \"blank\";\n       \
    \         break;\n}\n```\n\n每当`selectOne`的变量为`'d'`时，上述代码会将`operation`重置为`blank`，因为该`case`后面没有`break`语句，导致执行落入下一个`case`。\n\
    \n- **其他问题**。我们只是浅尝辄止地介绍了你可能犯的错误以及如何在代码中找到它们。由于你可以用任何给定的编程语言编写无限数量的程序，因此有无限种方式将错误引入其中。内存泄漏、输入错误、全局变量的副作用、未能关闭文件、未在`switch`语句中放置默认`case`、意外覆盖方法定义、错误的返回类型、用局部变量隐藏全局或实例变量……天网（Skynet）是极限。\n\
    \n不过，不要气馁。你犯的大多数错误其实都很简单。大多数错误会在代码审查和单元测试中被发现。那些逃过系统测试或（天哪）发布代码的错误才是真正有趣且微妙的。调试就像解谜，可能需要你找出差异、解决一些数学问题、理清一些逻辑，以及更多乐趣。享受其中吧；我们确实如此！\n\
    \n### 调试步骤3：修复错误（仅此一个！）\n\n一旦你找到了错误所在，就需要提出修复方案。大多数情况下，修复方案是显而易见且简单的，因为错误本身很简单。这是好消息。但有时，虽然你能找到错误，但修复方案并不明显，或者修复方案需要重写大量代码。在这种情况下，要小心！花必要的时间理解代码，然后正确地重写并修复错误。调试中最大的问题是急躁。\n\
    \n在修复错误时，请记住两件事：\n\n- 修复实际的错误；不要修复症状。\n- 一次只修复一个错误。\n\n第二点尤其重要。我们都遇到过这样的情况：在修复一个错误时，在同一段代码中发现了另一个错误。诱惑是立即同时修复它们。要抵制住！修复你本来要修复的那个错误。测试它并确保修复是正确的。将新代码集成回源代码库。然后你可以回到步骤1并修复第二个错误。\n\
    \n但是，既然可以立即修复，为什么还要做这些额外的工作呢？当你到达调试过程的这一步时，你已经为第一个错误进行了测试，你已经了解了错误发生的代码，并且你已经准备好进行那一次修复。不要通过修复其他无关问题来把事情搞混。你没有针对第二个错误的测试，因此你无法测试那个修复。此外，单独的集成、集成测试、共享仓库提交和专用的提交消息是跟踪做了什么、何时做以及为什么做的最清晰的方式。相信我们。虽然多做一点工作，但一次只做一个修复会为你省去很多后续的麻烦（比如当某个修复最终需要进一步修复时）。"
  raw: "```\npublic class IfDef {\nfinal static boolean DEBUG = true;\npublic static\
    \ void main(String [] args) {\nSystem.out.printf(\"Hello, World \\n\");\nif (DEBUG)\
    \ {\nSystem.out.printf(\"max(5, 8) is %d\\n\", Math.max(5, 8));\nSystem.out.printf(\"\
    If this prints, the code was included\\n\");\n}\n}\n}\n```\n\nIn this example,\
    \ you set the boolean constant DEBUG to true when you want to turn the DEBUG blocks\
    \ on, and you then turn it to false when you want to turn them off. This isn’t\
    \ perfect because you have to recompile every time you want to turn debugging\
    \ on and off, but you have to do that with the C/C++ example above as well.\n\n\
    *   *Use built-in debugging* *features* commonly available when coding in an IDE.\
    \ Such features allow you to set breakpoints, watch variables, step into and out\
    \ of functions, single step instructions, change code on the fly, examine registers\
    \ and other memory locations, and so on so that you can learn as much as possible\
    \ about what is going on in your code—and all without adding print statements\
    \ you would later need to remove. Pretty much all the IDEs you’ll run into, whether\
    \ open source or proprietary, all have built-in debuggers. This includes Eclipse,\
    \ XCode, Visual Studio, VSCode, BlueJ, PyCharm, and many others. If you are not\
    \ using an IDE, you can use a stand-alone debugger like *gdb*. If a quick-and-dirty\
    \ look through the code and a sprinkling of print statements doesn’t get you any\
    \ closer to finding the error, then use the debugger. See the next section for\
    \ more on debuggers.\n\n*   *Use logging*: Many IDEs and scripting languages (like\
    \ JavaScript) have built-in logging routines that you can use in place of putting\
    \ in your own print statements. Typically, you can identify which variables would\
    \ be helpful to log for debugging. The logging routines will usually create a\
    \ log file that you can then examine after running the program. If you’re doing\
    \ interactive debugging, you may be able to examine the log file during program\
    \ execution.\n\n*   *Look for patterns* in the code, in particular for errors\
    \ that you’ve seen or have caught yourself making before. Patterns are there because\
    \ developers make the same mistakes over and over again (we’re creatures of habit,\
    \ after all). As you gain more programming experience and get a better understanding\
    \ of how you write programs, finding the types of mistakes you make will become\
    \ easier.\n\nThe extra semicolon at the end of the while loop header above can\
    \ be a pattern. Another could be messing up loop boundaries with a classic *off-by-one*\
    \ error:\n\n```\n    for (int j = 0; j <= myArray.length; j++) {\n    // some\
    \ code here\n    }\n    ```\n\nwhere you step off the end of the array because\
    \ you’re testing for <= rather than <.\n\nA classic in C/C++ is using one = where\
    \ you meant to use two == for a conditional expression, ending up with an assignment\
    \ instead. Say you’re checking an array of characters for a particular character:\n\
    \n```\n    for (int j = 0; j < length; j++) {\n    if (c = myArray[j]) {\n   \
    \ pos = j;\n    break;\n    }\n    }\n    ```\n\nThe single equals sign will cause\
    \ the *if* statement to stop early every time; `pos` will always be zero. Java\
    \ wouldn’t let you get away with this because it requires that a conditional expression\
    \ evaluate to a `boolean` type; the Java compiler would error out stating that\
    \ the type of the assignment expression is not a `boolean`.\n\n```\n    TstEql.java:10:\
    \ incompatible types\n    found   : char\n    required: boolean\n    if (c = myArray[j])\
    \ {\n    ^\n    1 error\n    ```\n\nThis is because in Java (just like in C and\
    \ C++) an assignment operator returns a result and every result has a type. In\
    \ this case, the result type is **char** but the if-statement is expecting a **boolean**\
    \ expression there. The Java compiler checks for this because it’s more strongly\
    \ typed than C and C++, whose compilers don’t perform this check.\n\nForgetting\
    \ a `break` statement after a case in a `switch` is another possible pattern.\n\
    \n```\n    switch(selectOne) {\n    case ’p’:   operation = \"print\";\n    break;\n\
    \    case ’d’:   operation = \"display\";\n    default:    operation = \"blank\"\
    ;\n    break;\n    }\n    ```\n\nThe above will reset `operation` to `blank` whenever\
    \ `selectOne`’s variable is `’d’` because there is no *break* statement after\
    \ that case, causing fall-through to the following case.\n\n*   *Other problems*.\
    \ We’ve only scratched the surface of the possible errors you can make and ways\
    \ to find them in your code. Because there are an infinite number of programs\
    \ you can write in any given programming language, there are an infinite number\
    \ of ways to insert errors into them. Memory leaks, typing mistakes, side effects\
    \ from global variables, failure to close files, not putting a default case in\
    \ a switch statement, accidentally overriding a method definition, bad return\
    \ types, hiding a global or instance variable with a local variable... the Skynet\
    \ is the limit.\n\nDon’t be discouraged, though. Most errors you’ll make really\
    \ are simple. Most you’ll catch during code reviews and unit tests. The ones that\
    \ escape into system test or (heaven forbid) released code are the really interesting\
    \ and subtle ones. Debugging is like solving a puzzle that might require you to\
    \ spot the differences, solve some math, untangle some logic, and a bunch more\
    \ fun all in one. Revel in it; we sure do!\n\n### Debugging Step 3: Fix the Error\
    \ (Just That One)!\n\nOnce you’ve found where the error is, you need to come up\
    \ with a fix for it. Most of the time the fix is obvious and simple because the\
    \ error is simple. That’s the good news. But sometimes, while you can find the\
    \ error, the fix isn’t obvious, or the fix will entail rewriting a large section\
    \ of code. In such cases, be careful! Take the time necessary to understand the\
    \ code, and then rewrite it and fix the error correctly. The biggest problem in\
    \ debugging is haste.\n\nWhen you are fixing errors, remember two things:\n\n\
    *   Fix the actual error; don’t fix the symptom.\n\n*   Only fix one error at\
    \ a time.\n\nThis second item is particularly important. We’ve all been in situations\
    \ where we’re fixing an error and we find another one in the same piece of code.\
    \ The temptation is to fix them both right then and there. Resist! Fix the error\
    \ you came to fix. Test it and make sure the fix is correct. Integrate the new\
    \ code back into the source code base. Then you can go back to step 1 and fix\
    \ the second error.\n\nBut why do all this extra work when you can just make the\
    \ fix right now? By the time you get to this step in the debugging process you\
    \ already have a test for the first error, you’ve educated yourself about the\
    \ code where the error occurs, and you’re ready to make that one fix. Don’t confuse\
    \ things by fixing other extraneous issues. You don’t have a test for the second\
    \ error, so you cannot test that fix. Plus, separate integrations, integration\
    \ testing, shared repository commits, and dedicated commit messages are the cleanest\
    \ way to keep track of what was done, when, and for what reason. Trust us. It’s\
    \ a little more work but doing the fixes one at a time will save you lots of headaches\
    \ down the road (such as when some fix ends up needing further fixing)."
