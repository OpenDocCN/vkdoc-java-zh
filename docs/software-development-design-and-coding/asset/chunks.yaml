  trans: "\n# 18. 单元测试\n\n> *测试行为本身固然重要，但设计测试的行为却是已知最有效的缺陷预防手段之一。为了创建有用测试而必须进行的思考，能够在代码编写之前就发现并消除缺陷——事实上，测试设计的思考能够在软件创建的每个阶段发现并消除缺陷，从概念构思、规格说明、设计、编码到后续环节。*\n\
    > \n> ——鲍里斯·贝泽\n\n> *只要用心观察，你就能发现很多问题。*\n> \n> ——尤吉·贝拉\n\n正如上一章所强调的，没有人是完美的，软件开发人员也不例外。在第\
    \ 17 章中，我们讨论了当你*知道*代码中存在错误时，应该查找哪些不同的内容。现在，我们将讨论如何确定是否存在错误。在代码的三种错误类型中，编译器会找出语法错误和偶尔的语义错误。在某些语言环境中，运行时系统会找出其他错误（这会让你的用户感到懊恼）。其余的错误则通过测试或代码审查与走查来发现。在本章中，我们将讨论测试：什么是测试、何时进行测试、如何进行测试、测试应覆盖哪些内容，以及测试的局限性。下一章将介绍代码审查与走查。\n\
    \n在典型的软件开发项目中，测试分为三个级别：单元测试、集成测试和系统测试。\n\n*单元测试*通常由你（即开发人员）通过测试单个方法和类来完成。单元测试通常不包括程序的大型配置、接口或库交互——除非你的方法实际使用了这些内容。因为你是在对自己的代码进行单元测试，所以你知道所有方法是如何编写的、数据应该是什么样子、方法签名是什么，以及返回值和类型应该是什么。这被称为*白盒测试*、*透明盒测试*、*清晰盒测试*或*玻璃盒测试*，所有这些术语都暗示了被测试代码细节的直接可见性。\n\
    \n*集成测试*通常由独立的测试组织完成，包括测试相互交互的类或模块集合之间的交互和接口。测试人员编写测试时，了解接口信息，但不了解每个模块的内部实现细节。因此，集成测试有时被称为*灰盒测试*，暗示测试人员仅具有对内部结构的部分可见性（即接口级别）。集成测试在单元测试后的代码被集成到源代码库之后进行。为了发现新模块与现有代码交互时可能出现的任何错误，会构建并测试产品的部分或完整版本。当模块中发现的错误被修复，并且该模块被重新集成到代码库中时，也会执行集成测试。\n\
    \n作为开发人员，你也会自己进行一些集成测试：每次你在一个独立的代码分支上工作时，你都会将新的或更新的代码集成到该分支中，然后测试整个应用程序，以确保你没有在单元测试的直接范围之外破坏任何东西。当你修复已发布产品中发现的错误时，你通常也会进行自己的单元测试和集成测试。在这种情况下，你会从客户或公司的客户支持组织收到一份报告，指出程序的某个部分无法正常工作。那么，你的工作就是重现该错误、隔离它、修复它、在隔离环境中测试它、集成修复，然后在新构建的产品中再次测试，以确保错误确实被修复，并且你没有引入新的错误。这种“修复错误”的角色是许多新开发人员刚加入公司时经常做的事情，也是熟悉公司产品、工具和流程的绝佳方式。\n\
    \n*系统测试*通常也由独立的测试组织完成，即在内部基线以及最终建议发布给客户的基线上，对整个软件产品（系统）进行测试。系统测试就像是增强版的集成测试。所有开发人员最近的所有更改都被用来构建产品的新版本，然后作为一个整体进行测试。独立的测试组织根据需求编写自己的测试，通常不了解程序设计和编写的任何细节。这被称为*黑盒测试*，因为除了程序接收的输入和产生的输出之外，程序对测试人员来说是不透明的。在这个级别上，测试人员的工作是确保程序实现了所有需求。黑盒测试还可以包括压力测试、可用性测试和验收测试。最终用户可能会参与这类测试。\n\
    \n## 测试的问题\n\n尽管测试旨在确定你的程序是否以及何时无法按预期工作，但并不能保证它能让你发现代码中的所有问题。测试并非完美无缺，原因有很多。\n\
    \n首先，当你使用自己的测试来测试自己的代码时，很容易遗漏某些东西。如果你在编码时没有想到某个边界情况，那么你同样可能遗漏一个能够捕获该问题的测试用例。如果你在编写代码时犯了错误，为什么你会认为自己在阅读或测试代码时不会犯同样的错误呢？如果你在某种程度上误解了问题，你不太可能立即发现这个误解。即使对于小型程序也是如此，但对于大型程序尤其如此。如果你有一个\
    \ 50,000 行的程序，需要阅读和理解的内容非常多，你肯定会遗漏一些东西。此外，静态阅读程序无法帮助你发现模块和接口之间的动态交互。因此，你需要更智能地进行测试，并结合静态（代码阅读）和动态（测试）技术来发现并修复程序中的错误。\n\
    \n错误从一个测试阶段逃逸到另一个阶段，并最终到达用户手中的另一个原因是，软件比人类制造的任何其他产品都更具动态性：即使是小型程序，其代码路径也很多，并且可能发生多种不同类型的数据错误。程序中大量的路径导致了可能性的*组合爆炸*。每次你在程序中添加一个\
    \ `if` 语句，程序的可能路径数量就会翻倍：如果某个条件表达式为 `true`，则有一条代码路径；如果为 `false`，则有另一条路径。每次你添加一个新的输入值，都会增加系统的复杂性，并增加可能出现的错误数量。因此，对于大型程序，你不可能用所有可能的输入值来测试程序中所有可能的路径，因为代码路径和数据值的组合数量是指数级的。\n\
    \n那么，该怎么办呢？如果蛮力方法*不可行*，那么你需要一个更好的计划。一个切实可行的选择是识别最可能的用例并对其进行测试。你需要识别并测试可能的输入数据值、数据的边界条件以及可能的代码路径。事实证明，这样做可以帮你发现大部分错误。史蒂夫·麦康奈尔在《代码大全》中指出，良好的测试与代码审查相结合，可以揭示一个规模适中的程序中超过\
    \ 95% 的错误。^(²⁹¹) 这是在处理实际问题时一个值得努力追求的坚实目标。\n"
- fmt: '## Code Creator vs. Code Breaker Mindset


    There’s actually another problem with testing: you, the developer. Developers
    and testers have two different, one might say adversarial, roles to play in code
    construction. Developers are there to take a set of requirements and produce a
    design that reflects the requirements and write the code that implements the design.
    Your job as a developer is to *get code to work*. If you implement it according
    to your solution plan, then it’s very natural to assume your code solution will
    work.


    A tester’s job, on the other hand, is to take those same requirements, but instead
    to assume the code does not work and their job is to uncover how it fails. Testers
    are supposed to do unspeakable, horrible things to your code in an effort to *get
    the code to break*, to get the errors in it to expose themselves to the light
    of day before the users or client systems get to it. Breaking stuff is why being
    a tester can be a very fun job. You, the developer, then get to fix the code.


    You can see where this might be an adversarial relationship. You can also see
    where developers might make pretty bad testers. If your job is to make the code
    work, you’re not focused on breaking it. So your test cases may not be the sneaky,
    contrived, and even mean test cases that someone whose job it is to break your
    code may come up with. In short, because they’re trying to build something beautiful,
    *developers make lousy testers*. Developers tend to write tests using typical,
    clean data. They tend to have an overly optimistic view of how much of their code
    a test will exercise. They tend to write tests assuming that the code will work;
    after all, it’s their own carefully designed and cleverly implemented brainchild.


    This is why most software development organizations have a *separate testing team*
    for integration and system testing. These testers write their own test code, create
    their own frameworks, do the testing of all new baselines and the final release
    code, and report all the errors back to the developers who then must fix them.
    The one thing testers normally *do not* do is unit testing. Unit testing is the
    developer’s responsibility, so you’re not completely off the hook here. You do
    need to think about testing, learn how to write tests, how to run them, and how
    to analyze the results. You need to learn to be mean to your code. And you still
    need to fix the errors.


    ## When to Test?


    Before we get around to discussing just how to do unit testing and what things
    to test, let’s talk about *when* to test. There are two major options here: 1)
    you code then test or 2) you test and then code.


    You may find it most natural to first write your code, get it to compile (meaning
    you’ve eliminated the syntax errors), and then, *after* you feel the code for
    a function or a module is finished, you write your tests and do your unit testing.
    This has the advantage that you’ve understood the requirements and written the
    code, which gave you the opportunity to think about test cases while writing the
    code. This can streamline writing clear test cases. In this strategy, debugging
    and testing happen concurrently: you find an error, fix it, and then rerun the
    failed test right away.


    An alternative approach is to write your unit tests first, *before* you write
    any code, and then develop your code until all tests pass. This is known as *test-driven
    development* (TDD), an approach rooted in agile methodologies (especially out
    of eXtreme Programming). Clearly if you write your unit tests first, they will
    all fail, since at most you’ll have the stub of a method to call in your test.
    TDD begins with coding up your benchmark for success. If you’ve written a bunch
    of tests, and then write just enough code to make all the unit tests pass, you
    know exactly when you’re done! You can write some new code and test it; if it
    fails, write some more code; if it passes, stop. This has the advantage of helping
    you keep your code lean, making it simpler and easier to debug. It also gives
    you, right up front, a set of tests you can rerun whenever you make a change to
    your code. If the tests all still pass, then you haven’t broken anything by making
    the changes.


    So which way is better? Well, the answer is another of those “it depends” things.
    Generally, writing your tests first gets you in the testing mindset earlier and
    gives you definite goals for implementing the code. On the other hand, until you
    do it a lot and it becomes second nature, writing tests first can be hard because
    you have to visualize what you’re testing. It forces you to come to terms with
    the requirements and the module or class design early as well. That means that
    design/coding/testing all pretty much happen at once. This can make the whole
    code construction process more difficult. Because you are doing design/coding/testing
    all at the same time, it will also take longer to create that first functional
    program. However, once you have that first functional piece, your development
    time can speed up. TDD works well for small- to medium-sized projects (as do agile
    techniques in general), but it may be more difficult for very large programs.
    TDD also works quite well when you are *pair programming*. To refresh your memory,
    in pair programming two developers work on the same task at the same time. They
    share a single computer with one of them (the *driver*) at the keyboard and writing
    code, while the second developer (the *navigator*) sits next to the driver and
    watches for errors, thinks about design issues and testing, and comments. About
    every half hour or so, the driver and navigator switch places. Later, the driver
    writes a *test*, while the navigator thinks of more tests to write and thinks
    ahead of the code. This process tends to make writing the tests easier and then
    flows naturally into writing the code. Give testing a shot both before and after,
    and then you can decide which is best for you and your project.'
