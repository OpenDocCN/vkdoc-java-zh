  trans: "\n#### 专利类型\n\n专利通常分为三种类型：\n\n1.  *外观设计专利*是针对制品的原创、新颖且具有装饰性的设计所授予的专利。外观设计专利保护的是产品的外观或造型。它要求发明的设计具有原创性和实用性。对于\
    \ 2015 年 5 月 13 日之后提交的申请，外观设计专利的有效期为 15 年。虽然你不能为“外观和感觉”申请版权，但你可以将其作为外观设计专利进行保护。外观设计专利可以保护图形用户界面（GUI）的“外观和感觉”。如果普通观察者会将另一个\
    \ GUI 误认为是你的，则构成对外观设计专利的侵权。请注意，外观设计专利不保护用户界面的功能性方面。这方面需要申请实用新型专利。\n\n2.  *实用新型专利*，或称发明专利，为发明了新的且有用的流程、制造品或物质组合的人提供法律保护。实用新型专利通常用于保护新的物理设备，例如特定类型的电动自行车或新型吊扇。实用新型专利的有效期为\
    \ 20 年，并需要定期缴纳维护费。如果你不缴纳维护费，专利将失效。大多数人提到“专利”这个词时，想到的就是实用新型专利。\n\n3.  *植物专利*^(¹²⁶)（是的，就是那种生长/有生命的植物）授予那些生产、发现并发明了可繁殖的新型植物的人。例如，你培育出的玫瑰新品种就可以申请专利。此类专利自申请日起有效期为\
    \ 20 年，无需缴纳维护费。请注意，植物专利不适用于 DNA、RNA、药物、基因组等，这些需要申请实用新型专利。\n\n### 知识产权：所有权与你\n\n\
    在本章开头，我们讨论了在团队项目中（主要是在课堂、研究实验室和初创公司中）工作，在知识产权（尤其是计算机软件）的所有权方面有何不同。这一点对于版权尤其如此，因为《版权法》区分了*个人作品*、*衍生作品*和*合作作品*。\n\
    \n*个人作品*显然是由单个人创作并拥有的作品。\n\n*衍生作品*是基于现有受版权保护的作品而产生的产品。^(¹²⁷) 版权持有人有权基于自己的作品创作衍生作品。如果其他人未经版权持有人许可创作了衍生作品，例如将小说改编成视频，则构成*版权侵权*，版权持有人可以起诉要求赔偿。\n\
    \n这就引出了*合作作品*。^(¹²⁸) *合作作品*^(¹²⁹)是由多个创作者共同创作的产品。美国《版权法》第 101 条将合作作品定义为“由两位或两位以上作者共同创作，且意图将其贡献合并为一个统一整体中不可分割或相互依存的部分的作品”。这包括课堂团队项目所涉及的工作，或初创公司的共同产出。创作团队的所有成员（不仅仅是开发者）共同且平等地拥有最终产品的版权。这会产生若干影响。例如，由于团队所有参与者都拥有版权，其中任何一人都可以对源代码进行修改，从而创作出衍生作品。其次，他们无需咨询共同所有者，就可以将源代码许可给其他打算使用该产品或对其进行修改以创作自己衍生作品的人。不用说，大多数组织都要求参与者签署一份合同，明确规定每个人对合作作品能做什么、不能做什么，以及任何衍生作品的版权归谁所有。^(¹³⁰)\n\
    \n*合作作品*的复杂性还有另一个层面。如果一个人对某个产品有了想法，并将该想法以固定形式记录下来，比如记在笔记本上，或做成软件实现的原型，那么他们就拥有该工作产品（即该想法的特定表达或实现）的版权。如果他们随后加入一个团队或创建一家初创公司，其目的是实现并扩展最初的想法，那么*合作作品*的概念就变得有些模糊了。首先，原始创作者拥有原始工作产品的版权。但是，一旦团队开始致力于创作合作作品，本质上是在创作原始作品的衍生作品，那么团队成员就平等地拥有后续合作作品的版权。团队中的任何成员都可以许可该作品或自行对其进行修改，因此在创作衍生作品之前就其所有权达成一致非常重要。然而，还存在一个问题，即原始作品由原始作者享有版权，因此，创作了新的、独立的衍生作品的团队成员需要获得原始作者的许可或取得许可，才能使用原始版权作品中的任何部分。如果处理不当、没有预先且公平地解决，这些复杂性中的任何一个都可能给团队带来重大法律和人际关系问题，阻碍合作，并最终影响产品本身。\n\
    \n简而言之，对于不受预先设定的所有权协议（例如雇主的协议）约束的团队项目，请确保在开始创作工作之前，签署一份明确且详细的协议。\n\n# 6. 需求\n\n\
    > *构建软件系统最困难的部分是决定要构建什么。在概念性工作中，没有其他部分像确定详细的技术需求（包括与人、机器和其他软件系统的接口）那样困难。没有其他部分如果做错了会如此严重地破坏结果。没有其他部分在事后更难以纠正。因此，软件构建者为客户执行的最重要的功能，就是反复提取和提炼产品需求。*\n\
    > \n> ——弗雷德·布鲁克斯^(¹³¹)\n\n在你开始编码之前——是的，*在*你开始编码*之前*——你需要知道你要构建什么。这就是需求：一份清单，列出了为了创建你的出色程序而必须实现的所有内容。大多数开发者讨厌需求。真的。我们只想坐下来开始编码。我们所有人都有那种超级程序员的心态；只要把问题给我们，我们就能坐下来，边设计边编码。才不是！如果你想成为一名高效的开发者，减少错误，并拿出一个良好、干净的设计，你需要需求。需求越详细越好。一套好的需求能告诉你程序应该做什么。它为你提供了框架，你可以围绕它来构建你的设计。无论如何你都需要做需求——这是标准开发生命周期中无法避免的步骤之一——但如果你不在项目中为它留出空间，你就无法创建出伟大的程序。有意识地对待需求会迫使你思考程序的细节，同时也让你倾听用户的声音，从而更好地了解他们真正想要什么。那么，让我们来谈谈需求。\n"
- fmt: '# What Types of Requirements Are We Talking About?


    We’re really talking about *functional requirements*. That is, the list of features
    the user will see and be able to use when they fire up your program. These are
    the “black box” requirements that show the external behavior of your program.
    As far as the user is concerned, these are the only requirements that matter.
    In a plan-driven process, the output of this activity of identifying requirements
    is a *functional specification* of what the software system is supposed to do.
    For an agile process, the output is a set of *user stories* that define the *product
    backlog*.


    During the course of uncovering requirements for your project, you will usually
    see four different types: user requirements, domain requirements, non-functional
    requirements, and non-requirements.


    ## User Requirements


    User requirements are nearly always expressed in natural language. They are the
    details of what the user expects to see as they use the program. They also include
    descriptions of screen layouts, dialog boxes, and menus. Any interaction element
    in the program should be described in the user requirements. For example:


    *Logging into the system*: When Gloria clicks on the `Login` button on the main
    page, a login dialog box appears in the middle of the screen. The login dialog
    must contain two text boxes, labeled `Username` and `Password`. There must also
    be two buttons in the dialog box, labeled `Submit` and `Cancel`. If at any time
    Gloria presses the `Cancel` button, the dialog box shall disappear and she will
    be taken back to the previous screen. In normal usage, she will click in the `Username`
    text box and type in her username, and then click in (or tab to) the `Password`
    text box and type in her password. The text typed in the `Password` text box must
    be hidden. Once Gloria is finished typing in her username and password she must
    press the `Submit` button. If she has entered a correct username/password combination,
    she will then be taken to the main menu page. If Gloria’s username/password combination
    is incorrect, an `Invalid username or password, please try again` message will
    appear in the dialog box, the text boxes will be cleared, and she will be given
    the opportunity to login again.


    You can express user requirements as scenarios and/or as detailed screen-by-screen
    descriptions. Remember to use pictures as much as you can when defining user requirements.
    If your program is web-based, you can create lots of quick and dirty digital or
    even hand-drawn mockups to show the user before development takes place. This
    will help clarify expectations and greatly aid in the discussion of both functional
    elements and stylistic choices.


    ## Domain Requirements


    These are the requirements imposed on you by the application domain of the program.
    If you’re writing a new version of an income tax program, you will be constrained
    by the latest IRS regulations. A general ledger program will have to abide by
    the latest edition of the Generally Accepted Accounting Principles (GAAP), and
    a smartphone will need to implement the latest Global System for Mobile communication
    (GSM) protocols. You don’t need to write down all these requirements, just refer
    to them. A set of detailed domain requirements gives the developers information
    they will need during the design of the program. Domain requirements are usually
    considered “middle layer” software because they are the heart of the application,
    below the user interface and above the operating system, networking, or database
    software. A lot of domain requirements will get implemented as separate classes
    and libraries with their own APIs. Users are concerned with domain requirements
    only insofar as they affect the user requirements above.


    ## Non-Functional Requirements


    Non-functional requirements are constraints on the services and functions of the
    program and also expectations about its performance. They can include target platform
    specifications, timing constraints, performance requirements, memory usage requirements,
    file access privileges, security requirements, response times, minimum number
    of transactions per second, and so on. These are usually requirements that may
    not be visible to the user but which do affect the user experience. An example
    of a non-functional requirement is the need for your web page to load and display
    within 3 seconds.


    ## Non-Requirements


    Non-requirements are things the product is not going to do. You will need to communicate
    these to the customer, because after laying out what the program will do, the
    most important thing to do in the requirements phase is *manage expectations*.
    One of the worst phrases a customer can utter at that final demo before you release
    is, “But I thought it was going to do....” You need to tell all the stakeholders
    in a project what the program is going to do and also what it’s not going to do.
    In particular, you need to let them know all requirement-related aspects that
    won’t be implemented—at least not in the current release, such as “only one countdown
    timer may run at a time” or “there will not be a defrost cycle that allows defrost
    modes to be selected by food type.” Be careful, however, because the actual list
    of things that your program will not do is nearly infinite. Nevertheless, crucial
    non-requirements should be discussed explicitly with the client and stated clearly
    in your design documentation.


    # Gathering Requirements in a Plan-Driven Project


    A *functional specification* describes what the program will do entirely from
    the user’s perspective. It doesn’t care how the software is implemented. It talks
    about the features of the program and specifies screens, menus, dialogs, and the
    like. Think of it as a badly written user manual. A second kind of spec can be
    called a *technical specification*. The technical specification describes the
    internal implementation details of the program. That is, it talks about data structures,
    algorithms used, database models, choice of programming language, and so on. We’re
    not going to talk about technical specs, just functional specs.


    “Wait,” you say. “What about all those agile methodologies we talked about in
    Chapter [2](#270563_3_En_2_Chapter.xhtml)? *They* don’t write functional specs.
    So there! I’m off the hook.” Well, in fact, agile methodologies *do* write functional
    specifications. They’re just in a different format from the 300-page single-spaced
    requirements document that some plan-driven methodologies require. Agile methodologies
    require that, together with the customer representative or product owner, you
    write *user stories* that lay out what the program will do. That’s a spec. We
    will discuss how agile methodologies do requirements later in this chapter. The
    important part and the idea behind this entire chapter is to *write down what
    your program is supposed to do before you start coding*.'
