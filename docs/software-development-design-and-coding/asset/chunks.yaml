- fmt: "### Writing Tests: The Tests\n\nFollowing TDD, let’s work on tests first.\
    \ While you want to test one bit of functionality at a time, some elements cannot\
    \ be tested separately. In this example above, you need to combine the first two\
    \ tasks into a single test. Once you’ve created a phone contact class, you must\
    \ test its constructors to make sure you can correctly instantiate an object.\
    \ So, let’s create a test.\n\nIn your first test, you’ll create an instance of\
    \ your phone contact object and print out the instance variables to prove it was\
    \ created correctly. You must do a little design work first: you must figure out\
    \ what the phone contact class will be called and what instance variables it will\
    \ have.\n\nA reasonable name for the class is `PhoneContact`, and as long as it’s\
    \ alright with your customer, the instance variables will be `firstName`, `lastName`,\
    \ `phoneNumber`, and `emailAddr`. Oh, and they can all be string variables. It’s\
    \ a simple contact list. For this class you can have two constructors: a default\
    \ constructor that just initializes the contacts to null and a constructor that\
    \ takes all four values as input arguments and assigns them. That’s probably all\
    \ you need at the moment. Here’s what the test may look like:\n\n```\npublic class\
    \ TestPhoneContact {\n    /**\n     * Default constructor for test class TestPhoneContact\n\
    \     */\n    public TestPhoneContact() {\n    }\n\n    public void testPhoneContactCreation()\
    \ {\n        String fname = \"Fred\";\n        String lname = \"Flintstone\";\n\
    \        String phone = \"800-555-1212\";\n        String email = \"fred@knox.edu\"\
    ;\n        PhoneContact t1 = new PhoneContact();\n        System.out.printf(\"\
    Phone Contact reference is %X\\n\", t1);   // reference var address\n        PhoneContact\
    \ t2 = new PhoneContact(fname, lname, phone, email);\n        System.out.printf(\"\
    Contact:\\n Name = %s\\n Phone = %s\\n Email = %s\\n\",\n                t2.getName(),\
    \ t2.getPhoneNum(), t2.getEmailAddr());\n    }\n}\n```\n\nNow, this test will\
    \ fail to begin with because you have not created the `PhoneContact` class yet.\
    \ Let’s do that now. The `PhoneContact` class will be simple: just the instance\
    \ variables, the two constructors, and getter and setter methods for the variables.\
    \ The resulting code is below:\n\n```\npublic class PhoneContact {\n    /**\n\
    \     * instance variables\n     */\n    private String lastName;\n    private\
    \ String firstName;\n    private String phoneNumber;\n    private String emailAddr;\n\
    \n    /**\n     * Constructors for objects of class PhoneContact\n     */\n  \
    \  public PhoneContact() {\n        lastName = \"\";\n        firstName = \"\"\
    ;\n        phoneNumber = \"\";\n        emailAddr = \"\";\n    }\n\n    public\
    \ PhoneContact(String firstName, String lastName,\n                        String\
    \ phoneNumber, String emailAddr) {\n        this.lastName = lastName;\n      \
    \  this.firstName = firstName;\n        this.phoneNumber = phoneNumber;\n    \
    \    this.emailAddr = emailAddr;\n    }\n\n    /**\n     * Getter and Setter methods\
    \ for each of the instance variables\n     */\n    public String getName() {\n\
    \        return this.lastName + \", \" + this.firstName;\n    }\n\n    public\
    \ String getLastName() {\n        return this.lastName;\n    }\n\n    public String\
    \ getFirstName() {\n        return this.firstName;\n    }\n\n    public String\
    \ getPhoneNum() {\n        return this.phoneNumber;\n    }\n\n    public String\
    \ getEmailAddr() {\n        return this.emailAddr;\n    }\n\n    public void setLastName(String\
    \ lastName) {\n        this.lastName = lastName;\n    }\n\n    public void setFirstName(String\
    \ firstName) {\n        this.firstName = firstName;\n    }\n\n    public void\
    \ setPhoneNum(String phoneNumber) {\n        this.phoneNumber = phoneNumber;\n\
    \    }\n\n    public void setEmailAddr(String emailAddr) {\n        this.emailAddr\
    \ = emailAddr;\n    }\n}\n```\n\nThe last thing you need is a driver for the test\
    \ you’ve just created, essentially somewhere you can call the above code. When\
    \ you only need a preliminary quick-and-dirty test for a single class, you could\
    \ test it from a `main` method within the class, but for more thorough, repeatable,\
    \ and expandable testing, it’s always best to create a separate tester class.\
    \ For instance, consider that a class’s own `main` method can see non-public class\
    \ elements directly, while outside of the class the use of public getters and\
    \ setters would be required. Thus, testing from within a class can obscure access\
    \ issues.\n\nHere you will create a separate tester class so it’s always available\
    \ for you to call or expand, while cleanly and clearly remaining off the side,\
    \ not mixed up with the rest of our code. This will complete the *scaffolding*\
    \ for this test environment.\n\n```\npublic class TestDriver {\n    public static\
    \ void main(String [] args) {\n        TestPhoneContact t1 = new TestPhoneContact();\n\
    \        t1.testPhoneContactCreation();\n    }\n}\n```\n\nNow, once you compile\
    \ and execute the `TestDriver`, the output console will display something like\
    \ the following:\n\n```\nPhone Contact reference is 3D7DC1CB\nPhone Contact:\n\
    Name = Flintstone, Fred\nPhone = 800-555-1212\nEmail = fred@knox.edu\n```\n\n\
    The next task is to read a data file and create a phone contact list. Before you\
    \ figure out the test or the code, you need to go back to design and decide on\
    \ some data structures.\n\nSince the story says “flat file of phone contacts”\
    \ you can just assume you’re dealing with a text file where each line contains\
    \ phone contact information. Say the format mirrors the `PhoneContact` class and\
    \ each line contains the following for a single contact: `first_name last_name\
    \ phone_number email_addr`.\n\nNext, you need a list of phone contacts that you\
    \ can sort and print out. Because you want to keep the list alphabetically by\
    \ last name, you can use a `TreeMap` Java Collections type to store all the phone\
    \ contacts. In that case, you don’t even need to sort the list because the `TreeMap`\
    \ class keeps the list sorted for you. It also looks like you’ll need another\
    \ class to bring the `PhoneContact` objects and the list operations together.\n\
    \nSo what does the test look like? Well, in the interest of keeping your tests\
    \ small and adhering to the “a test does just one thing” maxim, it seems like\
    \ you could use two tests after all, one to confirm that the file is there and\
    \ can be opened, and one to confirm that you can create the `PhoneContact` list\
    \ data structure. For the file opening test, you’ll need a new class that represents\
    \ the phone contact list. You will just stub that class out for now, creating\
    \ a simple constructor and a stub of the one method that you’ll need to test.\
    \ This way you can write the test (which will fail because you don’t have a real\
    \ method yet). The file opening test looks as follows:\n\n```\npublic void testFileOpen()\
    \ {\n    String fileName = \"phoneList.txt\";\n    PhoneContactList pc = new PhoneContactList();\n\
    \    boolean fileOK = pc.fileOpen(fileName);\n    if (fileOK == false) {\n   \
    \     System.out.println(\"Open Failed\");\n        System.exit(1);\n    }\n}\n\
    ```\n\nwhich you add to the testing class you created before. In the `TestDriver`\
    \ class above, you just add the following line to the `main()` method:\n\n```\n\
    t1.testFileOpen();\n```\n\nOnce this test fails (as expected), you can then implement\
    \ the new class and fill in the stubs that we created above. The new `PhoneContactList`\
    \ class now looks something like the following:\n\n```\nimport java.util.*;\n\
    import java.io.*;\n\npublic class PhoneContactList {\n    private TreeMap phoneList;\n\
    \    private Scanner phoneFile;\n\n    /**\n     * Constructors for objects of\
    \ class PhoneContactList\n     */\n    public PhoneContactList() {\n    }\n\n\
    \    public PhoneContactList(PhoneContact pc) {\n        phoneList = new TreeMap();\n\
    \        phoneList.put(pc.getLastName(), pc);\n    }\n\n    public boolean fileOpen(String\
    \ name) {\n        try {\n            phoneFile = new Scanner(new File(name));\n\
    \            return true;\n        } catch (FileNotFoundException e) {\n     \
    \       System.out.println(e.getMessage());\n            return false;\n     \
    \   }\n    }\n}\n```\n\nThis is how your *test-design-develop* process will work.\
    \ Try creating the rest of the tests listed above and finish implementing the\
    \ `PhoneContactList` class code. You’ve got this."
  raw: '### Writing Tests: The Tests


    Following TDD, let’s work on tests firsts. While you want to test one bit of functionality
    at a time, some elements cannot be tested separately. In this example above, you
    need to combine the first two tasks into a single test. Once you’ve created a
    phone contact class, you must test its constructors to make sure you can correctly
    instantiate an object. So, let’s create a test.


    In your first test, you’ll create an instance of your phone contact object and
    print out the instance variables to prove it was created correctly. You must do
    a little design work first: you must figure out what the phone contact class will
    be called and what instance variables it will have.


    A reasonable name for the class is `PhoneContact`, and as long as it’s alright
    with your customer, the instance variables will be `firstName`, `lastName`, `phoneNumber`,
    and `emailAddr`. Oh, and they can all be string variables. It’s a simple contact
    list. For this class you can have two constructors: a default constructor that
    just initializes the contacts to null and a constructor that takes all four values
    as input arguments and assigns them. That’s probably all you need at the moment.
    Here’s what the test may look like:


    ```

    public class TestPhoneContact {

    /**

    * Default constructor for test class TestPhoneContact

    */

    public TestPhoneContact() {

    }

    public void testPhoneContactCreation() {

    String fname = "Fred";

    String lname = "Flintstone";

    String phone = "800-555-1212";

    String email = "fred@knox.edu";

    PhoneContact t1 = new PhoneContact();

    System.out.printf("Phone Contact reference is %X\n", t1);   // reference var address

    PhoneContact t2 = new PhoneContact(fname, lname, phone, email);

    System.out.printf("Contact:\n Name = %s\n Phone = %s\n Email = %s\n",

    t2.getName(), t2.getPhoneNum(), t2.getEmailAddr());

    }

    }

    ```


    Now, this test will fail to begin with because you have not created the `PhoneContact`
    class yet. Let’s do that now. The `PhoneContact` class will be simple: just the
    instance variables, the two constructors, and getter and setter methods for the
    variables. The resulting code is below:


    ```

    public class PhoneContact {

    /**

    * instance variables

    */

    private String lastName;

    private String firstName;

    private String phoneNumber;

    private String emailAddr;

    /**

    * Constructors for objects of class PhoneContact

    */

    public PhoneContact() {

    lastName = "";

    firstName = "";

    phoneNumber = "";

    emailAddr = "";

    }

    public PhoneContact(String firstName, String lastName,

    String phoneNumber, String emailAddr) {

    this.lastName = lastName;

    this.firstName = firstName;

    this.phoneNumber = phoneNumber;

    this.emailAddr = emailAddr;

    }

    /**

    * Getter and Setter methods for each of the instance variables

    */

    public String getName() {

    return this.lastName + ", " + this.firstName;

    }

    public String getLastName() {

    return this.lastName;

    }

    public String getFirstName() {

    return this.firstName;

    }

    public String getPhoneNum() {

    return this.phoneNumber;

    }

    public String getEmailAddr() {

    return this.emailAddr;

    }

    public void setLastName(String lastName) {

    this.lastName = lastName;

    }

    public void setFirstName(String firstName) {

    this.firstName = firstName;

    }

    public void setPhoneNum(String phoneNumber) {

    this.phoneNumber = phoneNumber;

    }

    public void setEmailAddr(String emailAddr) {

    this.emailAddr = emailAddr;

    }

    }

    ```


    The last thing you need is a driver for the test you’ve just created, essentially
    somewhere you can call the above code. When you only need a preliminary quick-and-dirty
    test for a single class, you could test it from a main method within the class,
    but for more thorough, repeatable, and expandable testing, it’s always best to
    create a separate tester class. For instance, consider that a class’s own main
    method can see non-public class elements directly, while outside of the class
    the use of public getters and setters would be required. Thus, testing from within
    a class can obscure access issues.


    Here you will create a separate tester class so it’s always available for you
    to call or expand, while cleanly and clearly remaining off the side, not mixed
    up with the rest of our code. This will complete the *scaffolding* for this test
    environment.


    ```

    public class TestDriver {

    public static void main(String [] args) {

    TestPhoneContact t1 = new TestPhoneContact();

    t1.testPhoneContactCreation();

    }

    }

    ```


    Now, once you compile and execute the `TestDriver,` the output console will display
    something like the following:


    ```

    Phone Contact reference is 3D7DC1CB

    Phone Contact:

    Name = Flintstone, Fred

    Phone = 800-555-1212

    Email = fred@knox.edu

    ```


    The next task is to read a data file and create a phone contact list. Before you
    figure out the test or the code, you need to go back to design and decide on some
    data structures.


    Since the story says “flat file of phone contacts” you can just assume you’re
    dealing with a text file where each line contains phone contact information. Say
    the format mirrors the `PhoneContact` class and each line contains the following
    for a single contact: `first_name last_name phone_number email_addr`.


    Next, you need a list of phone contacts that you can sort and print out. Because
    you want to keep the list alphabetically by last name, you can use a `TreeMap`
    Java Collections type to store all the phone contacts. In that case, you don’t
    even need to sort the list because the `TreeMap` class keeps the list sorted for
    you. It also looks like you’ll need another class to bring the `PhoneContact`
    objects and the list operations together.


    So what does the test look like? Well, in the interest of keeping your tests small
    and adhering to the “a test does just one thing” maxim, it seems like you could
    use two tests after all, one to confirm that the file is there and can be opened,
    and one to confirm that you can create the `PhoneContact` list data structure.
    For the file opening test, you’ll need a new class that represents the phone contact
    list. You will just stub that class out for now, creating a simple constructor
    and a stub of the one method that you’ll need to test. This way you can write
    the test (which will fail because you don’t have a real method yet). The file
    opening test looks as follows:


    ```

    public void testFileOpen() {

    String fileName = "phoneList.txt";

    PhoneContactList pc = new PhoneContactList();

    boolean fileOK = pc.fileOpen(fileName);

    if (fileOK == false) {

    System.out.println("Open Failed");

    System.exit(1);

    }

    }

    ```


    which you add to the testing class you created before. In the `TestDriver` class
    above, you just add the following line to the `main()` method:


    ```

    t1.testFileOpen();

    ```


    Once this test fails (as expected), you can then implement the new class and fill
    in the stubs that we created above. The new `PhoneContactList` class now looks
    something like the following:


    ```

    import java.util.*;

    import java.io.*;

    public class PhoneContactList {

    private TreeMap phoneList;

    private Scanner phoneFile;

    /**

    * Constructors for objects of class PhoneContactList

    */

    public PhoneContactList() {

    }

    public PhoneContactList(PhoneContact pc) {

    phoneList = new TreeMap();

    phoneList.put(pc.getLastName(), pc);

    }

    public boolean fileOpen(String name) {

    try {

    phoneFile = new Scanner(new File(name));

    return true;

    } catch (FileNotFoundException e) {

    System.out.println(e.getMessage());

    return false;

    }

    }

    }

    ```


    This is how your *test-design-develop* process will work. Try creating the rest
    of the tests listed above and finish implementing the `PhoneContactList` class
    code. You’ve got this.'
