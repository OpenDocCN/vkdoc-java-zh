- fmt: '这两种方法都能正常工作，你会得到正确的结果，并保持`Square`对象的不变性。但如果你必须重写大量继承来的方法，那么一开始使用继承的意义何在？这正是LSP（里氏替换原则）所要解决的问题：让派生类的*行为*正确，从而让继承正确。如果你将基类视为必须遵守的契约（还记得开闭原则吗？），那么LSP就是在说，即使是派生类，你也必须遵守该契约。哦，顺便提一下，这在Java中有效，因为Java的公有方法都是*虚方法*，因此可以被重写。如果你在`Rectangle`中定义`setWidth()`和`setHeight()`时使用了`final`关键字，或者将它们设为`private`，那么你就无法重写它们。事实上，这些方法的`private`版本一开始就不会被继承。


    在这个例子中，虽然从数学上讲，正方形是矩形的一种特化类型，且与矩形相关的不变性仍然成立，但这种数学定义在Java中行不通。在这种情况下，你不应该让`Square`成为`Rectangle`的子类；继承在这里对你不起作用，因为我们认为矩形有两种不同的边（长和宽），而正方形只有一种边。因此，如果`Square`类继承自`Rectangle`类，那么正方形与矩形在概念上的差异就会妨碍代码的实现。这两个类无法有意义地相互扩展。（如果你想将`Square`和`Rectangle`归入一个共同的父类，可以添加一个`Parallelogram`类，它封装了两对平行且等长的边。）


    派生类中的方法重写是导致LSP违规的最大原因。^([^(197)](#fn197)) 表明你违反LSP的迹象包括：


    *   子类未能保持其超类的所有外部可观察行为。

    *   子类修改（而非扩展）了其超类的外部可观察行为。

    *   子类抛出异常，试图隐藏其超类中定义的某些行为。

    *   子类通过使用空实现重写超类中定义的虚方法，以隐藏超类中定义的某些行为。


    ## 继承的替代方案：委托、组合和聚合


    有时，继承并不是共享其他类行为和属性的正确方式。幸运的是，你还有其他选择。最常见的三种是*委托*、*组合*和*聚合*。


    *委托*：这是每个管理者都应该做的事：将部分工作交给别人处理。委托意味着将处理行为的责任交给另一个类。这会在类之间建立关联，意味着这些类彼此相关，通常通过一个属性或一组相关方法来实现。委托有一个很大的附带好处：它使你的对象免受程序中其他对象实现变更的影响；你没有使用继承，因此封装保护了你。^([^(198)](#fn198))
    让我们通过一个例子来看看委托是如何工作的。


    上次我们讲到Alice和Bob以及他们的B⁴++时，Alice厌倦了用遥控器打开和关闭喂食门来驱赶非鸣鸟。所以他们又要求了一个新功能：自动鸣声识别器。有了鸣声识别器，B⁴++本身就能识别鸣鸟的歌声并打开门，但对于其他鸟类则保持门关闭。我们可以从几个方面来思考这个问题。


    根据单一职责原则，`BirdFeeder`类不应该负责识别鸟鸣，但它应该知道哪些歌声是允许的。你需要一个新的类`SongIdentifier`来实际进行鸣声识别。你还需要一个包含鸟鸣的`Song`对象。图[12-9](#270563_3_En_12_Chapter.xhtml#Fig9)展示了目前的情况。


    ![](images/270563_3_En_12_Chapter/270563_3_En_12_Fig9_HTML.jpg)


    一个UML类图，包含三个类：鸟食器、鸣声识别器和歌曲。每个类包含属性和方法，如`getSongs`、`addSongs`和`identify`（布尔类型）。


    图12-9


    鸣声识别器功能的初步设计


    `BirdFeeder`知道鸟鸣，并保存了喂食器允许的歌声列表。`SongIdentifier`的唯一工作是识别给定的歌声。有两种实现方式。第一种是`SongIdentifier`类可以在`identify()`方法中自行完成工作。这意味着`SongIdentifier`需要一个`equals()`方法来比较两段歌声（来自已知允许歌声列表中的任何一首歌，以及新的B⁴++硬件刚刚检测到并发送给你的歌声）。第二种识别歌声的方式是让`Song`类自己使用其`equals()`方法来完成。你应该选择哪一种？


    嗯，如果你在`SongIdentifier`类中完成所有识别工作，那么每当`Song`中的任何内容发生变化时，你都必须同时修改`Song`类*和*`SongIdentifier`类。这听起来并不理想。但如果你将歌声比较的工作委托给`Song`类，那么`SongIdentifier`的`identify()`方法就可以只接受一个`Song`作为输入参数并调用该方法，从而将对歌曲的任何更改隔离到`Song`类中。图[12-10](#270563_3_En_12_Chapter.xhtml#Fig10)展示了修改后的类图。


