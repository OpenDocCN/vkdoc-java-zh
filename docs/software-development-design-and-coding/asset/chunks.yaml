    WatchOS devices. XCode lets you program in several different programming languages
    including C, C++, Swift, and Objective-C. Just like Eclipse, XCode has a built-in
    debugger that allows you to set breakpoints, watch variables, step-through code,
    and make changes on the fly.^([^(284)](#fn284))


    XCode’s debugger can be enabled to automatically start when you build and execute
    your program; just insert a breakpoint. You can insert breakpoints by double-clicking
    the line number to the left of the source line of code where you want to stop
    execution. Once you’ve stopped at a breakpoint, XCode also allows you to watch
    variables and then step through the code execution one line at a time. Figure
    [17-2](#270563_3_En_17_Chapter.xhtml#Fig2) gives you a view of what a stopped
    program looks like in XCode. Note the left pane of the window that provides options
    and information about the currently running program. The blue flag in the editing
    pane indicates the breakpoint where the program is currently stopped (just before
    it prints “Hello World”).


    ![](images/270563_3_En_17_Chapter/270563_3_En_17_Fig2_HTML.jpg)


    A screenshot exhibits a C code to print Hello World. The left pane comprises the
    options for C P U, memory, energy impact, disk, network, and thread. The details
    of identity and type, target membership, text settings, and other options are
    provided on the right pane.


    Figure 17-2


    A program stopped in the XCode debugger'
  trans: '

    ### 调试步骤 4：测试修复


    测试修复看起来显而易见，对吧？但你会惊讶地发现，有多少修复根本没有经过测试。或者即使测试了，也只是用通用样本数据进行简单测试，而没有检查你的修复是否破坏了其他功能。


    首先，重新运行最初发现错误的那次测试。不仅仅是你在步骤 1 中想出的最小化测试，而是导致错误出现的原始测试。如果错误没有复现，这是一个好迹象，表明你至少修复了错误的直接原因。现在，运行回归测试套件中的所有其他测试（关于回归测试的更多讨论，请参见下一章），以确保你没有破坏已经修复的内容，或者向代码中引入新的错误。最后，将你的代码集成到源代码库中，检出新版本，并对整个系统进行测试。如果一切仍然正常，那么你的状态就很好了。是时候犒劳一下自己，或者小睡一会儿，或者两者都来。


    ### 调试步骤 5：寻找更多错误


    嗯，如果某个特定的函数或方法中存在一个错误，那么很可能还有另一个，对吧？编程中有一个公认的真理：80% 的错误发生在 20% 的代码中，这被称为帕累托原则。^(²⁸²)
    在你刚刚修复错误的地方附近，很可能还存在另一个错误。所以，既然你已经在这里了，不妨检查一下你刚修复的错误附近的代码，看看是否有类似的问题再次发生。这是寻找模式的另一个例子。


    同时，检查整个模块或类，看看是否有其他可以改进的地方，这也没什么坏处。在敏捷开发中，这被称为*重构*。这意味着重写代码以使其更简单。让你的代码更简单，会使其更清晰、更易读，并且更容易找到下一个错误。所以，拿起你提神的饮料，读读代码吧。


    ## 调试器工具


    到目前为止，我们已经讨论了使用编译器消除语法错误和警告、在代码中插入打印语句以获取数据，以及可以编译进或编译出的内联调试语句。一个更强大的工具是*调试器*，它可以用来查找错误的根源：它是一个特殊的程序，可以执行经过检测的代码，并允许你在程序运行时窥视其内部，以检查正在发生的事情。调试器允许你停止正在运行的代码（断点）、检查代码执行时的变量值（监视点）、一次执行一条指令、单步进入和跳出函数，甚至在程序运行时修改代码和数据。


    虽然调试器非常强大和方便，但你应该谨慎使用它们。调试器在查看代码时，本质上具有隧道视野。它们非常擅长向你展示当前函数的所有代码，但不会让你感受到整个程序的组织结构。它们也不会让你感受到复杂的数据结构。此外，使用调试器调试多线程和多进程程序也很困难。多线程程序尤其成问题，因为执行时序对于不同的线程至关重要，而在调试器中运行多线程程序会改变时序。


    ### Gdb


    对于 C 和 C++ 开发者来说，几乎所有 Unix 和 Linux 系统都附带的 *gdb* 命令行调试器通常是首选调试器，因为它是获取回溯信息的最简单方法。对于
    Java，gdb 也集成在像 Eclipse ([`www.eclipse.org/`](http://www.eclipse.org/)) 这样的交互式开发环境中，并且
    DDD 调试器 ([`www.gnu.org/software/ddd/`](http://www.gnu.org/software/ddd/)) 为其提供了图形用户界面。NetBeans
    IDE ([`www.netbeans.org`](http://www.netbeans.org/)) 自带其图形化调试器。Eclipse 和 NetBeans
    中的 Java 调试器允许你在单行代码上设置断点，通过监视点观察变量值的变化，并允许你一次一行或一次一个方法地单步执行代码。


    ### Eclipse


    Eclipse IDE 有一个内置的调试器，它为你提供了许多集成在一起的工具。我们将重点介绍 Eclipse 内置的 Java 调试器。启动调试会话最简单的方法是首先在
    Eclipse 中切换到 Java 透视图，然后打开你的项目，打开你感兴趣的文件，使它们出现在编辑器窗格中，然后转到屏幕的右上角，打开调试透视图。将会打开几个新的窗格，你的屏幕看起来会像图
    17-1 所示。


    ![](img/270563_3_En_17_Fig1_HTML.jpg)


    一张截图包含多个窗格，包括调试、断点、Mastermind.java、大纲和控制台。Java 代码中的第 53 行被高亮显示。


    图 17-1


    Eclipse 中的调试透视图


    使用这个新的透视图，你将看到几个窗格，包括调试、变量、断点、大纲、多核可视化工具、控制台和编辑器窗格。你应该做的第一件事是设置断点。你可以在编辑器窗格中通过双击希望执行停止的源代码文件的行号来实现。现在，你可以通过按下窗口左上角的
    bug 图标来运行你的程序。你的程序将执行，然后在第一个断点处停止。环顾四周，检查程序的当前状态。调试器还允许你在变量上设置监视点、单步执行指令、跳过方法调用（方法会执行，但调试器不会进入该方法）、更改变量的当前值，以及动态修改程序中的代码。Eclipse
    网站上有关于 Eclipse 调试器的详尽文档。^(²⁸³)


    ### XCode


    苹果的 XCode IDE 允许你为 Mac OS、iOS、iPadOS 和 WatchOS 设备创建应用程序。XCode 允许你使用多种不同的编程语言进行编程，包括
    C、C++、Swift 和 Objective-C。与 Eclipse 一样，XCode 也有一个内置的调试器，允许你设置断点、监视变量、单步执行代码以及进行动态修改。^(²⁸⁴)


    XCode 的调试器可以设置为在构建和执行程序时自动启动；只需插入一个断点即可。你可以通过双击希望停止执行的源代码行左侧的行号来插入断点。一旦在断点处停止，XCode
    还允许你监视变量，然后一次一行地单步执行代码。图 17-2 展示了在 XCode 中程序停止时的视图。请注意窗口左侧的窗格，它提供了关于当前正在运行程序的选项和信息。编辑窗格中的蓝色标志指示了程序当前停止的断点（就在它打印“Hello
    World”之前）。


    ![](img/270563_3_En_17_Fig2_HTML.jpg)


    一张截图展示了一段用于打印 Hello World 的 C 代码。左侧窗格包含 CPU、内存、能耗影响、磁盘、网络和线程的选项。右侧窗格提供了身份和类型、目标成员资格、文本设置和其他选项的详细信息。


    图 17-2


    在 XCode 调试器中停止的程序

