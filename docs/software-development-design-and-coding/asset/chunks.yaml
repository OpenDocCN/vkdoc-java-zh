  trans: '

    #### 专业开发者：ACM/IEEE-CS 软件工程职业道德规范序言


    计算机在商业、工业、政府、医疗、教育、娱乐乃至整个社会中扮演着日益核心的角色。软件工程师通过直接参与或教学，为软件系统的分析、规格说明、设计、开发、认证、维护和测试做出贡献。*由于他们在开发软件系统中的作用，软件工程师拥有巨大的机会去行善或作恶，让他人行善或作恶，或影响他人行善或作恶*。*为了尽可能确保其努力被用于善途，软件工程师必须致力于使软件工程成为一项有益且受人尊敬的职业*。基于这一承诺，软件工程师应遵守以下道德规范与职业实践准则。


    本规范包含八项原则，涉及专业软件工程师（包括从业者、教育者、管理者、监督者、政策制定者，以及该专业的学员和实习生）的行为与决策。*这些原则明确了个人、团体和组织所参与的、在道德上负责任的关系，以及在这些关系中的主要义务*。每项原则的条款是对这些关系中部分义务的说明。*这些义务植根于软件工程师的人性、对受软件工程师工作影响之人的特殊关怀，以及软件工程实践中的独特要素。本规范将这些义务规定为任何自称或立志成为软件工程师之人的责任*。


    *本规范无意让其中的个别部分被孤立地用来为不作为或作为的错误辩护。原则和条款的列表并非详尽无遗*。条款不应被解读为在所有实际情况下区分职业行为可接受与不可接受的界限。*本规范并非一个能生成道德决策的简单道德算法*。在某些情况下，不同标准之间或与其他来源的标准之间可能存在冲突。这些情况要求软件工程师运用道德判断，根据具体情况，以最符合《道德规范与职业实践准则》精神的方式行事。


    *道德冲突最好通过对基本原则的深思熟虑来解决，而非盲目依赖详细的规章制度*。*这些原则应促使软件工程师广泛思考谁将受到其工作的影响；审视他们自己及其同事是否以应有的尊重对待他人；考虑公众（若具备合理知情）会如何看待他们的决策；分析最弱势群体将如何受到其决策的影响；并思考其行为是否会被评判为符合理想软件工程师的专业水准。在所有这些判断中，对公众健康、安全和福祉的关切是首要的；也就是说，“公共利益”是本规范的核心*。


    软件工程动态且要求严苛的环境，要求其规范能够适应并关联到不断出现的新情况。然而，即使在这种普遍性下，本规范也为软件工程师及其管理者提供了支持，使他们能够在特定案例中通过记录该职业的道德立场来采取积极行动。*本规范提供了一个道德基础，团队中的个人以及整个团队都可以据此提出诉求。它有助于界定那些要求软件工程师或软件工程师团队去做在道德上不当的行为*。


    本规范不仅仅用于裁决可疑行为的性质；它还具有重要的教育功能。由于本规范表达了该职业在道德问题上的共识，它也是向公众和有志于从事该职业的人士普及所有软件工程师道德义务的一种手段。


    上述八项原则如下：


    1.  公众——软件工程师的行为应始终符合公众利益。

    2.  客户与雇主——软件工程师的行为应在符合公众利益的前提下，最大限度地维护其客户与雇主的利益。

    3.  产品——软件工程师应确保其产品及相关修改尽可能达到最高的专业标准。

    4.  判断——软件工程师应在其专业判断中保持正直与独立。

    5.  管理——软件工程管理者与领导者应认同并倡导以合乎道德的方式管理软件开发与维护。

    6.  职业——软件工程师应提升该职业的正直与声誉，并符合公众利益。

    7.  同事——软件工程师应公平对待并支持其同事。

    8.  自我——软件工程师应参与关于其职业实践的终身学习，并倡导以合乎道德的方式从事该职业。^(⁹⁹)


    类似地，ACM 道德规范包含一套所有计算机科学家都应遵循的通用道德原则。它们包括（采用 ACM 的编号）：


    *   1.1 为社会和人类福祉做出贡献，承认所有人都是计算领域的利益相关者。

    *   1.2 避免伤害。即避免任何负面后果。

    *   1.3 诚实可信。

    *   1.4 公平行事，不歧视。

    *   1.5 尊重产生新思想、发明、创造性作品和计算产物所需付出的努力。

    *   1.6 尊重隐私。

    *   1.7 信守保密承诺。^(¹⁰⁰)


    ## 道德讨论与决策


    基于上述理论，可以通过首先识别并描述问题，然后分析问题并做出决策，来达成对某个道德问题的决定。以下是一个关于如何执行这两项任务的示例计划。


    ### 讨论 1：识别与描述问题


    1.  写下道德问题的陈述。这将有助于澄清你究竟在讨论什么。

    2.  列出风险、问题和可能的后果。

    3.  列出所有利益相关者。这包括你自己以及道德情境中涉及的任何其他人，以及直接或间接受决策后果影响的任何人。

    4.  在每个案例中识别所有可能的道德问题。尝试确定情境中的对与错，并找出可能涉及的道德规则。

    5.  识别所有可能的法律问题。这包括知识产权问题以及健康与安全问题。

    6.  如果问题比简单的“是/否”更复杂，列出可能的行动方案。

    '
- fmt: '### Discussion 2: Analyzing the Problem


    1. What are your first impressions or reactions to these issues? What does your
    *moral intuition* say?

    2. Identify the responsibilities of the decision maker. This involves things like
    reporting ethical problems if you’re an employee and what your responsibilities
    might be as a manager.

    3. Identify the rights of all stakeholders.

    4. Consider the consequences of the action options on the stakeholders. Analyze
    the consequences, risks, benefits, harms, and costs for each action considered.

    5. Find the sections of the SE Code and the ACM code that pertain to the problem
    and the actions. This will help you with the ethical rules and in laying out the
    situation so you can consider alternatives.

    6. Consider the deontological and utilitarian approaches to the problem. You’ll
    need to have the ethical rules you’ve considered in front of you, as well as the
    sections of the SE and ACM codes of ethics. Then run through our examples here
    of other ethical situations and follow those examples for your own situation.

    7. Do the ethical theories point to one course of action? If more than one, which
    one should take precedence? List the different courses of action and then, if
    necessary, try to prioritize them. This will help you think about different courses
    of action.

    8. Which of the potential actions do you think is the right one? Pick it. If you’re
    using a utilitarian approach, you might consider picking a metric and seeing if
    you can measure the effects of the decision.

    9. If there are several ethically acceptable options, pick one. Reflect on your
    decision.


    ## Case Studies


    In this section, we’ll present several short case studies that illustrate the
    types of ethical problems you might encounter as a software developer. These case
    studies will cover ethical situations involving intellectual property, privacy
    issues, system safety issues, and conflicts of interest. Your job is to analyze
    each case study, identify the ethical issues, and propose a course of action.
    Be aware that there may not be one “right” answer to the particular ethical problem.


    ### #1 Copying Software


    Jane Hudson teaches mathematics at an inner city high school in Chicago. Like
    many rural and inner city high schools, Jane’s school has very little money to
    spend on computers and software. While her students do very well and have even
    placed in a statewide math competition, many of her students come to high school
    woefully underprepared for high school mathematics, so Jane and her colleagues
    spend a lot of time on remedial work. Recently, a local company has offered to
    donate 24 iMacs to Jane’s high school. It has been decided that a dozen of these
    computers will be used to create a mathematics computer lab specifically to help
    students with remedial work in pre-algebra, algebra, geometry, and trigonometry.
    Jane wants to use a software program called `MathTutor` for the computer lab,
    but a site-wide license for the titles she wants is $5,000, money that her school
    just does not have. The high school already has one copy of `MathTutor` and there
    is no copy protection on the program. Jane’s department chair has suggested that
    they just make copies of the program for the new computers. Jane does not think
    that this is a good idea, but she is desperate to use the new computers to help
    her students. What should Jane do? What are the ethical issues here? (See ACM
    Code 1.5 and 2.3; SE Code 2.02.)


    ### #2 Whose Computer Is It?


    At Massive Corporation, you are a software development manager. A developer on
    one of your software projects is out sick. Another developer asks that you copy
    all the files from the sick developer’s computer to his, so that he can do some
    important work. What should you do? What are the ethical issues here? (See ACM
    Code 1.7, 2.8, and 3.3.)


    ### #3 How Much Testing Is Enough?


    You are the project manager for a development team that is in the final stages
    of a project to create software that uses radiation therapy to destroy cancerous
    tumors. Once set up by an operator, the software controls the intensity, duration,
    and direction of the radiation. Since this is a new piece of software in a new
    product, there have been a series of problems and delays. The program is in the
    middle stages of system testing and the routine testing that has been done so
    far has all gone well, with very few software defects found. Your project manager
    wants to cut the rest of the testing short in order to meet the (updated) software
    delivery deadline. This will mean just doing the routine testing and skipping
    the scheduled stress testing. You are trying to decide whether to ship the software
    on time and then continue the testing afterwards, shipping patches for any defects
    found. What are the ethical issues here? (You should look up the Therac-25 problem
    as a similar instance of a case like this at [`https://en.wikipedia.org/wiki/Therac-25`](https://en.wikipedia.org/wiki/Therac-25).)
    (See ACM Code 1.1, 1.2, 2.1, and 3.4; SE Code 1.03, 1.04, 3.06, and 3.10.)


    ### #4 How Much Should You Tell?


    You are a principal in the `J2MD` computer software consulting company. One of
    your clients, the City of Charleston, SC, wants your company to evaluate a set
    of proposals for a new administrative computing system and provide a recommendation
    to the city on which proposal to accept. The contract for the new system would
    be worth several million dollars to the winning company. Your spouse works for
    `LowCountry Computing` (one of the bidding companies) and she is the project manager
    in charge of writing their proposal to the city. You have seen early copies of
    her proposal and judge it to be excellent. Should you tell the project manager
    in the City of Charleston about your spouse’s employment at `LowCountry Computing`?
    If so, when, and how much else should you reveal? (See ACM Code 1.3 and 2.5; SE
    Code Principle 4, 4.05, and 4.06.)


    ### #5 Abusive Workplace Behavior^([^(101)](#fn101))


    Jane is a new hire in a high-tech company’s generative AI research team. Jane
    did well in graduate school and her advisor worked closely with her and made sure
    she received appropriate credit for all her contributions. She generally does
    excellent work and was hired for her potential as a top-notch researcher. The
    technical lead of her new department, Gary, has a reputation as an excellent researcher.
    However, he usually insists on claiming primary authorship on every publication
    the team produces. He also has a very short temper, doesn’t tolerate even minor
    errors, and retaliates against those who he thinks are questioning him or making
    mistakes—all of them women—by removing their names from submitted research articles.
    Jane soon comes under Gary’s gaze when she checks in some code containing a minor
    timing error into the shared repository. Gary refuses to let Jane participate
    in a live demo of the software. Jane goes to her supervisor to complain. What
    ethical principles is Gary violating and what should Jane’s supervisor do?


    Gary’s behavior certainly seems unprofessional and abusive. It clearly violates
    ACM guidelines 1.1, 1.2, 1.4, and 1.5. Jane’s supervisor needs to confront Gary
    about his behavior. This comes under ACM guideline 3.3 which talks about leaders
    “providing for the psychological well-being and human dignity of the team,” and
    guideline 3.4 which “has leaders articulate, apply, and support policies that
    reflect the principles of the Code.”^([^(102)](#fn102))'
  raw: '### Discussion 2: Analyzing the Problem


    1.  What are your first impressions or reactions to these issues? What does your
    *moral intuition* say?


    2.  Identify the responsibilities of the decision maker. This involves things
    like reporting ethical problems if you’re an employee and what your responsibilities
    might be as a manager.


    3.  Identify the rights of all stakeholders.


    4.  Consider the consequences of the action options on the stakeholders. Analyze
    the consequences, risks, benefits, harms, and costs for each action considered.


    5.  Find the sections of the SE Code and the ACM code that pertain to the problem
    and the actions. This will help you with the ethical rules and in laying out the
    situation so you can consider alternatives.


    6.  Consider the deontological and utilitarian approaches to the problem. You’ll
    need to have the ethical rules you’ve considered in front of you, as well as the
    sections of the SE and ACM codes of ethics. Then run through our examples here
    of other ethical situations and follow those examples for your own situation.


    7.  Do the ethical theories point to one course of action? If more than one, which
    one should take precedence? List the different courses of action and then, if
    necessary, try to prioritize them. This will help you think about different courses
    of action.


    8.  Which of the potential actions do you think is the right one? Pick it. If
    you’re using a utilitarian approach, you might consider picking a metric and seeing
    if you can measure the effects of the decision.


    9.  If there are several ethically acceptable options, pick one. Reflect on your
    decision.


    ## Case Studies


    In this section, we’ll present several short case studies that illustrate the
    types of ethical problems you might encounter as a software developer. These case
    studies will cover ethical situations involving intellectual property, privacy
    issues, system safety issues, and conflicts of interest. Your job is to analyze
    each case study, identify the ethical issues, and propose a course of action.
    Be aware that there may not be one “right” answer to the particular ethical problem.


    ### #1 Copying Software


    Jane Hudson teaches mathematics at an inner city high school in Chicago. Like
    many rural and inner city high schools, Jane’s school has very little money to
    spend on computers and software. While her students do very well and have even
    placed in a statewide math competition, many of her students come to high school
    woefully underprepared for high school mathematics, so Jane and her colleagues
    spend a lot of time on remedial work. Recently, a local company has offered to
    donate 24 iMacs to Jane’s high school. It has been decided that a dozen of these
    computers will be used to create a mathematics computer lab specifically to help
    students with remedial work in pre-algebra, algebra, geometry, and trigonometry.
    Jane wants to use a software program called MathTutor for the computer lab, but
    a site-wide license for the titles she wants is $5,000, money that her school
    just does not have. The high school already has one copy of MathTutor and there
    is no copy protection on the program. Jane’s department chair has suggested that
    they just make copies of the program for the new computers. Jane does not think
    that this is a good idea, but she is desperate to use the new computers to help
    her students. What should Jane do? What are the ethical issues here? (See ACM
    Code 1.5 and 2.3; SE Code 2.02.)


    ### #2 Whose Computer Is It?


    At Massive Corporation, you are a software development manager. A developer on
    one of your software projects is out sick. Another developer asks that you copy
    all the files from the sick developer’s computer to his, so that he can do some
    important work. What should you do? What are the ethical issues here? (See ACM
    Code 1.7, 2.8, and 3.3.)


    ### #3 How Much Testing Is Enough?


    You are the project manager for a development team that is in the final stages
    of a project to create software that uses radiation therapy to destroy cancerous
    tumors. Once set up by an operator, the software controls the intensity, duration,
    and direction of the radiation. Since this is a new piece of software in a new
    product, there have been a series of problems and delays. The program is in the
    middle stages of system testing and the routine testing that has been done so
    far has all gone well, with very few software defects found. Your project manager
    wants to cut the rest of the testing short in order to meet the (updated) software
    delivery deadline. This will mean just doing the routine testing and skipping
    the scheduled stress testing. You are trying to decide whether to ship the software
    on time and then continue the testing afterwards, shipping patches for any defects
    found. What are the ethical issues here? (You should look up the Therac-25 problem
    as a similar instance of a case like this at [`https://en.wikipedia.org/wiki/Therac-25`](https://en.wikipedia.org/wiki/Therac-25).)
    (See ACM Code 1.1, 1.2, 2.1, and 3.4; SE Code 1.03, 1.04, 3.06, and 3.10.)


    ### #4 How Much Should You Tell?


    You are a principal in the J2MD computer software consulting company. One of your
    clients, the City of Charleston, SC, wants your company to evaluate a set of proposals
    for a new administrative computing system and provide a recommendation to the
    city on which proposal to accept. The contract for the new system would be worth
    several million dollars to the winning company. Your spouse works for LowCountry
    Computing (one of the bidding companies) and she is the project manager in charge
    of writing their proposal to the city. You have seen early copies of her proposal
    and judge it to be excellent. Should you tell the project manager in the City
    of Charleston about your spouse’s employment at LowCountry Computing? If so, when,
    and how much else should you reveal? (See ACM Code 1.3 and 2.5; SE Code Principle
    4, 4.05, and 4.06.)


    ### #5 Abusive Workplace Behavior^([^(101)](#fn101))


    Jane is a new hire in a high-tech company’s generative AI research team. Jane
    did well in graduate school and her advisor worked closely with her and made sure
    she received appropriate credit for all her contributions. She generally does
    excellent work and was hired for her potential as a top-notch researcher. The
    technical lead of her new department, Gary, has a reputation as an excellent researcher.
    However, he usually insists on claiming primary authorship on every publication
    the team produces. He also has a very short temper, doesn’t tolerate even minor
    errors, and retaliates against those who he thinks are questioning him or making
    mistakes—all of them women—by removing their names from submitted research articles.
    Jane soon comes under Gary’s gaze when she checks in some code containing a minor
    timing error into the shared repository. Gary refuses to let Jane participate
    in a live demo of the software. Jane goes to her supervisor to complain. What
    ethical principles is Gary violating and what should Jane’s supervisor do?


    Gary’s behavior certainly seems unprofessional and abusive. It clearly violates
    ACM guidelines 1.1, 1.2, 1.4, and 1.5\. Jane’s supervisor needs to confront Gary
    about his behavior. This comes under ACM guideline 3.3 which talks about leaders
    “providing for the psychological well-being and human dignity of the team,” and
    guideline 3.4 which “has leaders articulate, apply, and support policies that
    reflect the principles of the Code.”^([^(102)](#fn102))'
  trans: '

    ### 讨论 2：分析问题


    1.  你对这些问题的最初印象或反应是什么？你的*道德直觉*怎么说？


    2.  明确决策者的责任。这包括诸如：如果你是员工，需要报告道德问题；以及作为管理者，你的责任可能是什么。


    3.  明确所有利益相关者的权利。


    4.  考虑不同行动方案对利益相关者产生的后果。分析每个被考虑的行动所带来的后果、风险、收益、危害和成本。


    5.  找出软件工程伦理准则和 ACM（美国计算机协会）准则中与问题和行动相关的章节。这将有助于你理解道德规则，并梳理情况，以便考虑其他替代方案。


    6.  考虑针对该问题的道义论和功利主义方法。你需要将已考虑的道德规则，以及软件工程和 ACM 道德准则的相关章节放在手边。然后，回顾我们在此处给出的其他道德情境示例，并参照这些示例来分析你自己的情况。


    7.  这些道德理论是否指向同一种行动方案？如果指向多个方案，哪一个应该优先考虑？列出不同的行动方案，然后在必要时尝试对它们进行优先级排序。这将有助于你思考不同的行动路线。


    8.  你认为哪个潜在行动是正确的？选择它。如果你采用功利主义方法，可以考虑选择一个衡量标准，看看能否衡量该决策的影响。


    9.  如果有多个在道德上可接受的选项，选择一个。反思你的决定。


    ## 案例研究


    在本节中，我们将介绍几个简短的案例研究，这些案例说明了作为软件开发人员可能遇到的道德问题类型。这些案例研究将涵盖涉及知识产权、隐私问题、系统安全问题和利益冲突的道德情境。你的任务是分析每个案例研究，识别其中的道德问题，并提出行动方案。请注意，对于特定的道德问题，可能不存在唯一的“正确”答案。


    ### #1 复制软件


    简·哈德森在芝加哥一所市中心高中教授数学。像许多乡村和市中心高中一样，简所在的学校用于购买计算机和软件的资金非常有限。虽然她的学生表现优异，甚至在全州数学竞赛中获奖，但她的许多学生进入高中时，数学基础却严重不足，因此简和她的同事们花费大量时间进行补习。最近，一家当地公司提出向简的高中捐赠
    24 台 iMac。学校决定用其中 12 台电脑建立一个数学计算机实验室，专门帮助学生补习预代数、代数、几何和三角学。简想在计算机实验室使用一个名为 MathTutor
    的软件程序，但她想要的那些课程的全站点许可证需要 5000 美元，而学校根本拿不出这笔钱。这所高中已经有一份 MathTutor 的副本，并且该程序没有复制保护。简的系主任建议他们直接为新电脑复制该程序。简认为这不是个好主意，但她非常渴望用新电脑来帮助她的学生。简应该怎么做？这里涉及哪些道德问题？（参见
    ACM 准则 1.5 和 2.3；软件工程准则 2.02。）


    ### #2 这是谁的电脑？


    在 Massive 公司，你是一名软件开发经理。你负责的一个软件项目中的一名开发人员生病请假了。另一名开发人员要求你将生病开发人员电脑上的所有文件复制到他的电脑上，以便他能完成一些重要工作。你应该怎么做？这里涉及哪些道德问题？（参见
    ACM 准则 1.7、2.8 和 3.3。）


    ### #3 多少测试才算足够？


    你是一个开发团队的项目经理，该项目正处于最后阶段，旨在创建一款使用放射疗法摧毁癌性肿瘤的软件。该软件由操作员设置后，控制放射的强度、持续时间和方向。由于这是一个新产品中的新软件，出现了一系列问题和延误。程序正处于系统测试的中期阶段，到目前为止进行的常规测试一切顺利，发现的软件缺陷很少。你的项目经理希望缩短剩余的测试时间，以便赶上（更新后的）软件交付截止日期。这意味着只进行常规测试，而跳过预定的压力测试。你正在决定是否按时交付软件，然后在交付后继续测试，并为发现的任何缺陷发布补丁。这里涉及哪些道德问题？（你应该查阅
    Therac-25 问题，作为类似案例的参考，网址为：[`https://en.wikipedia.org/wiki/Therac-25`](https://en.wikipedia.org/wiki/Therac-25)。）（参见
    ACM 准则 1.1、1.2、2.1 和 3.4；软件工程准则 1.03、1.04、3.06 和 3.10。）


    ### #4 你应该透露多少？


    你是 J2MD 计算机软件咨询公司的负责人。你的一个客户，南卡罗来纳州查尔斯顿市，希望你的公司评估一系列关于新行政管理计算系统的提案，并向该市提供关于接受哪个提案的建议。新系统的合同对中标公司来说价值数百万美元。你的配偶在
    LowCountry Computing（竞标公司之一）工作，她是负责向该市撰写提案的项目经理。你已经看过她提案的早期副本，并认为它非常出色。你是否应该告诉查尔斯顿市的项目经理你配偶在
    LowCountry Computing 的工作情况？如果应该，何时告知，以及还应透露多少其他信息？（参见 ACM 准则 1.3 和 2.5；软件工程准则原则
    4、4.05 和 4.06。）


    ### #5 职场虐待行为^(¹⁰¹)


    简是一家高科技公司生成式人工智能研究团队的新员工。简在研究生院表现优异，她的导师与她密切合作，并确保她所有的贡献都得到应有的认可。她通常工作出色，因其成为顶尖研究人员的潜力而被聘用。她新部门的技术负责人加里，是一位享有盛誉的优秀研究员。然而，他通常坚持要求团队每篇出版物的主要作者署名都是他。他还脾气暴躁，无法容忍哪怕是微小的错误，并对那些他认为在质疑他或犯错的人——全都是女性——进行报复，将她们的名字从已提交的研究文章中删除。当简将一个包含微小时序错误的代码检入共享代码库后，她很快进入了加里的视线。加里拒绝让简参与软件的现场演示。简向她的主管投诉。加里违反了哪些道德原则？简的主管应该怎么做？


    加里的行为显然不专业且具有虐待性。这明显违反了 ACM 准则 1.1、1.2、1.4 和 1.5。简的主管需要就加里的行为与他当面对质。这符合 ACM 准则
    3.3，该准则谈到领导者要“为团队提供心理健康和人格尊严保障”，以及准则 3.4，该准则要求“领导者阐明、应用并支持反映准则原则的政策。”^(¹⁰²)

