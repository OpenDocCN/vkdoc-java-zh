    \ static void main(String [] args) {\nSystem.out.printf(\"Hello, World \\n\");\n\
    if (DEBUG) {\nSystem.out.printf(\"max(5, 8) is %d\\n\", Math.max(5, 8));\nSystem.out.printf(\"\
    If this prints, the code was included\\n\");\n}\n}\n}\n```\n\n在这个例子中，当你想要启用 DEBUG\
    \ 代码块时，将布尔常量 DEBUG 设置为 true；想要关闭时，则将其设置为 false。这种方法并不完美，因为每次开关调试功能都需要重新编译，但上述\
    \ C/C++ 示例也同样需要如此操作。\n\n*   *使用内置调试功能*：在 IDE 中编码时通常可用的功能。此类功能允许你设置断点、监视变量、单步进入和跳出函数、单步执行指令、动态修改代码、检查寄存器和其他内存位置等，从而尽可能多地了解代码的运行情况——而且无需添加之后需要删除的打印语句。你遇到的大多数\
    \ IDE，无论是开源还是专有，都内置了调试器。这包括 Eclipse、XCode、Visual Studio、VSCode、BlueJ、PyCharm 等。如果你没有使用\
    \ IDE，可以使用像 *gdb* 这样的独立调试器。如果快速浏览代码并添加少量打印语句仍无法让你更接近错误根源，那就使用调试器吧。更多关于调试器的内容请参见下一节。\n\
    \n*   *使用日志记录*：许多 IDE 和脚本语言（如 JavaScript）都有内置的日志记录例程，你可以用它们来代替自己添加的打印语句。通常，你可以确定哪些变量有助于记录日志以进行调试。日志记录例程通常会创建一个日志文件，你可以在程序运行后检查该文件。如果你正在进行交互式调试，也可以在程序执行期间检查日志文件。\n\
    \n*   *寻找代码中的模式*，特别是那些你以前见过或自己犯过的错误模式。模式之所以存在，是因为开发人员会反复犯同样的错误（毕竟，我们是习惯的动物）。随着你获得更多的编程经验，并更好地理解自己编写程序的方式，发现你所犯错误类型会变得更容易。\n\
    \n上面 while 循环头部末尾多余的分号可能是一种模式。另一种模式可能是因经典的*差一错误*而搞乱循环边界：\n\n```\n    for (int\
    \ j = 0; j <= myArray.length; j++) {\n    // 此处为一些代码\n    }\n    ```\n\n因为你测试的是\
    \ `<=` 而不是 `<`，导致数组越界。\n\nC/C++ 中的一个经典错误是在条件表达式中本应使用 `==` 却用了单个 `=`，结果变成了赋值。假设你正在检查一个字符数组中的特定字符：\n\
    \n```\n    for (int j = 0; j < length; j++) {\n    if (c = myArray[j]) {\n   \
    \ pos = j;\n    break;\n    }\n    }\n    ```\n\n单个等号会导致 *if* 语句每次都提前停止；`pos`\
    \ 将始终为零。Java 不会允许你这样做，因为它要求条件表达式的计算结果为 `boolean` 类型；Java 编译器会报错，指出赋值表达式的类型不是 `boolean`。\n\
    \n```\n    TstEql.java:10: 不兼容的类型\n    找到   : char\n    需要: boolean\n    if (c\
    \ = myArray[j]) {\n    ^\n    1 个错误\n    ```\n\n这是因为在 Java 中（就像在 C 和 C++ 中一样），赋值运算符会返回一个结果，并且每个结果都有类型。在这种情况下，结果类型是\
    \ **char**，但 if 语句期望的是 **boolean** 表达式。Java 编译器会检查这一点，因为它比 C 和 C++ 类型更严格，后者的编译器不会执行此检查。\n\
    \n在 `switch` 语句中忘记在 `case` 后添加 `break` 语句是另一种可能的模式。\n\n```\n    switch(selectOne)\
    \ {\n    case ’p’:   operation = \"print\";\n    break;\n    case ’d’:   operation\
    \ = \"display\";\n    default:    operation = \"blank\";\n    break;\n    }\n\
    \    ```\n\n当 `selectOne` 的变量为 `’d’` 时，上述代码会将 `operation` 重置为 `blank`，因为该 case\
    \ 后面没有 *break* 语句，导致执行流程落入下一个 case。\n\n*   *其他问题*。我们只是浅尝辄止地介绍了你可能犯的错误以及如何在代码中找到它们。由于你可以用任何给定的编程语言编写无限多的程序，因此也有无限多的方式将错误引入其中。内存泄漏、输入错误、全局变量的副作用、未能关闭文件、未在\
    \ switch 语句中设置默认 case、意外覆盖方法定义、错误的返回类型、用局部变量隐藏全局或实例变量……天网（Skynet）才是极限。\n\n不过，不要气馁。你犯的大多数错误其实都很简单。大多数错误会在代码审查和单元测试中被发现。那些逃过系统测试或（天哪）进入发布代码的错误才是真正有趣且微妙的。调试就像解谜，可能需要你找出差异、解决一些数学问题、理清一些逻辑，以及更多乐趣集于一身。尽情享受吧，我们就是这样做的！\n\
    \n### 调试步骤 3：修复错误（仅此一个）！\n\n一旦你找到了错误的位置，就需要提出修复方案。大多数情况下，修复方案是显而易见且简单的，因为错误本身很简单。这是个好消息。但有时，虽然你能找到错误，修复方案却不明显，或者修复方案需要重写大量代码。在这种情况下，要小心！花必要的时间理解代码，然后重写并正确修复错误。调试中最大的问题是草率。\n\
    \n修复错误时，请记住两件事：\n\n*   修复实际错误；不要只修复症状。\n\n*   一次只修复一个错误。\n\n第二点尤其重要。我们都遇到过这样的情况：在修复一个错误时，在同一段代码中又发现了另一个错误。诱惑在于当场就把它们都修复了。要抵制这种诱惑！修复你本来要修复的那个错误。测试它，确保修复正确。将新代码集成回源代码库。然后你可以回到步骤\
    \ 1 修复第二个错误。\n\n但是，既然可以现在就修复，为什么还要做这些额外的工作呢？当你到达调试过程的这一步时，你已经为第一个错误准备了测试，你已经了解了错误发生的代码，并且你已经准备好进行那一次修复。不要通过修复其他无关问题来把事情搞乱。你没有为第二个错误准备测试，所以无法测试那个修复。此外，独立的集成、集成测试、共享仓库提交以及专门的提交消息是跟踪做了什么、何时做以及为何做的最清晰方式。相信我们。这虽然多了一点工作，但一次只修复一个错误会为你省去日后很多麻烦（比如当某个修复最终需要进一步修复时）。"
- fmt: '### Debugging Step 4: Test the Fix


    Testing the fix seems obvious, doesn’t it? But you’d be surprised how many fixes
    don’t get tested. Or if they’re tested, it’s a simple test with generic sample
    data and no attempt to see if your fix broke anything else.


    First of all, rerun the original test that uncovered the error. Not just the minimal
    test that you came up with in step 1, but the original test that caused the error
    to appear. If the error does not occur, that’s a good sign you’ve at least fixed
    the proximate cause of the error. Now run every other test in your regression
    suite (see the next chapter for more discussion on regression tests), so you can
    make sure you’ve not rebroken something that was already fixed or added a new
    error into the code. Finally, integrate your code into the source code base repository,
    check out the new version, and test the entire thing. If all that still works,
    you’re in good shape. Time for a treat, or a nap, or both.


    ### Debugging Step 5: Look for More Errors


    Well, if there was one error in a particular function or method, then there might
    be another, right? One of the truisms of programming is that 80% of the errors
    occur in 20% of the code, known as the Pareto Principle.^([^(282)](#fn282)) It
    is likely there is another error close to where you’ve just fixed one. So while
    you’re here, you might as well take a look at the code in the general vicinity
    of the error you just fixed and see if anything like it happens again. This is
    another example of looking for patterns.


    It also won’t hurt to take a look at the whole module or class and see if there
    are other opportunities for change. In the agile world, this is called *refactoring*.
    This means rewriting the code to make it simpler. Making your code simpler will
    make it clearer, easier to read, and it will make finding that next error easier.
    So grab your refreshing beverage of choice and read some code.


    ## Debugger Tools


    So far, we have talked about debugging using compilers to remove syntax errors
    and warnings, print statements you can insert in your code to give you data on
    what is happening where, and inline debugging statements that you can compile
    in or out. A more powerful tool you can use to search for the source of an error
    is a *debugger*: it’s a special program that executes instrumented code and allows
    you to peek inside your program as it’s running to examine what’s going on. A
    debugger allows you to stop your running code (breakpoints), examine variable
    values as the code executes (watchpoints), execute a single instruction at a time,
    step into and out of functions, and even make changes to the code and the data
    while the program is running.


    While debuggers are very powerful and convenient, you should use them with caution.
    Debuggers, by their nature, have tunnel vision when it comes to looking at code.
    They are great at showing you all the code for the current function, but they
    don’t give you a feel for the organization of the program as a whole. They also
    don’t give you a feel for complicated data structures. Additionally, it’s hard
    to debug multithreaded and multiprocess programs using a debugger. Multithreaded
    programs are particularly problematic, since execution timing is crucial for the
    different threads, and running a multithreaded program in a debugger changes the
    timing.


    ### Gdb


    For C and C++ developers, the `gdb` command line debugger that comes with nearly
    all Unix and Linux systems is usually the debugger of choice, as it is the easiest
    way to get a backtrace. For Java, `gdb` is also integrated in some interactive
    development environments like Eclipse (`www.eclipse.org/`) and comes with a graphical
    user interface in the DDD debugger (`www.gnu.org/software/ddd/`). The NetBeans
    IDE (`www.netbeans.org`) comes with its own graphical debugger. The Java debuggers
    in Eclipse and NetBeans allow you to set breakpoints at individual lines of code,
    they let you watch variables values change via watchpoints, and they allow you
    to step through the code one line or one method at a time.


    ### Eclipse


    The Eclipse IDE has a built-in debugger that gives you many tools all in one.
    We’ll focus on the Java debugger that’s built into Eclipse. The easiest way to
    get a debugging session started is first to change to the Java perspective in
    Eclipse, then open your project, open the files that you’re interested in so they
    appear in the editor pane, then go to the upper right of the screen, and open
    the Debug perspective. Several new panes will open and your screen will look something
    like Figure [17-1](#270563_3_En_17_Chapter.xhtml#Fig1).


    ![](images/270563_3_En_17_Chapter/270563_3_En_17_Fig1_HTML.jpg)


    A screenshot comprises multiple panes, which include debug, breakpoints, mastermind
    dot java, outline, and console. Line 53 is highlighted in the Java code.


    **Figure 17-1** The Debug perspective in Eclipse


    With this new perspective you’ll see several panes, including Debug, Variables,
    Breakpoints, Outline, Mulitcore Visualizer, Console, and the Editor pane. The
    first thing you should do is to set breakpoints. You can do that in the Editor
    pane just by double-clicking the line number of a source code file where you want
    execution to stop. You can now run your program by pressing the bug icon in the
    upper left of the window. Your program will execute and then stop at the first
    breakpoint. Look around and examine the current state of your program. The debugger
    also allows you to set watchpoints on variables, single step-through instructions,
    skip-over method calls (the method executes, the debugger just doesn’t go into
    the method), change the current value of a variable, and change the code in your
    program on the fly. The Eclipse website has extensive documentation on the Eclipse
    debugger.^([^(283)](#fn283))


    ### XCode


    Apple’s XCode IDE allows you to create applications for Mac OS, iOS, iPadOS, and
    WatchOS devices. XCode lets you program in several different programming languages
    including C, C++, Swift, and Objective-C. Just like Eclipse, XCode has a built-in
    debugger that allows you to set breakpoints, watch variables, step-through code,
    and make changes on the fly.^([^(284)](#fn284))


    XCode’s debugger can be enabled to automatically start when you build and execute
    your program; just insert a breakpoint. You can insert breakpoints by double-clicking
    the line number to the left of the source line of code where you want to stop
    execution. Once you’ve stopped at a breakpoint, XCode also allows you to watch
    variables and then step through the code execution one line at a time. Figure
    [17-2](#270563_3_En_17_Chapter.xhtml#Fig2) gives you a view of what a stopped
    program looks like in XCode. Note the left pane of the window that provides options
    and information about the currently running program. The blue flag in the editing
    pane indicates the breakpoint where the program is currently stopped (just before
    it prints “Hello World”).


    ![](images/270563_3_En_17_Chapter/270563_3_En_17_Fig2_HTML.jpg)


    A screenshot exhibits a C code to print Hello World. The left pane comprises the
    options for C P U, memory, energy impact, disk, network, and thread. The details
    of identity and type, target membership, text settings, and other options are
    provided on the right pane.


    **Figure 17-2** A program stopped in the XCode debugger'
