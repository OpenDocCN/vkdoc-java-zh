  trans: "\n# 20. 总结\n\n> *所有程序员都是乐观主义者。或许正是这种现代魔法，特别吸引那些相信美好结局和仙女教母的人。或许正是那数百个令人沮丧的琐碎问题，驱走了所有不习惯专注于最终目标的人。或许仅仅是因为计算机还年轻，程序员更年轻，而年轻人总是乐观的。*\n\
    > \n> ——小弗雷德里克·布鲁克斯^(³⁰⁸)\n\n> *这是我能想到的唯一一份让我同时成为工程师和艺术家的职业。它有着令人难以置信的、严谨的技术元素，我喜欢这一点，因为你必须进行非常精确的思考。另一方面，它又有着狂野的创造性，在那里，想象力的边界是唯一的真正限制。*\n\
    > \n> ——安迪·赫兹菲尔德\n\n阅读亚历克斯·E·贝尔^(³⁰⁹)和马克·古兹迪尔^(³¹⁰)在 2008 年 8 月《ACM 通讯》上发表的“观点”专栏时，我们被这两篇文章的协同效应所震撼。一篇是关于专业软件开发中应使用工具的警示故事，另一篇则至少部分是关于编程教学中语言和语法使用的警示故事。这让我们思考了在开发和教育中尝试过的所有“银弹”，以及为什么它们中的大多数对真正的软件开发无关紧要。这似乎是总结这场关于软件开发的深入讨论的恰当方式。\n\
    \n## 你学到了什么？\n\n正如我们在本书中一直坚持的那样，软件开发是困难的。它需要大量的奉献和实践才能完成，而要做得更好则需要更多。当然，这正是它的吸引力所在。简单的问题很无聊，没有神秘感，没有追逐的刺激，也没有成就的回报。挑战在于处理你从未做过的事情，甚至是你不知道能否解决的问题。这正是让你一次又一次地回到软件创作谜题中的原因。\n\
    \n软件开发是人类能做的最具创造力和最强大的事情之一。从无到有，你接受一个问题，与之搏斗，探索它，戳弄它，将其拆解，以不同的形式重新组合，迸发出解决问题的灵感，然后将其全部转化为他人可以轻松使用的成品。用你的软件满足现实世界的需求，这简直是最酷的事情。\n\
    \n编写软件也是一种令人谦卑的经历。把软件做对是如此困难，而做错却如此容易。在编写软件的过程中，你学会了拥抱失败。失败是过程中令人兴奋又沮丧的一部分。失败教会你关于问题的知识，也教会你关于你自己：你学会了如何解决问题，你容易犯哪种类型的错误，以及如何规避它们。失败教会你坚持不懈，因为你不太可能第一次就做对所有事情，所以你只能不断努力，直到程序能正常工作。\n\
    \n大多数软件是由小团队构建的，而他们构建的也是最好的软件。规模小、积极性高且被充分授权的团队效率最高。小团队也倾向于使用精简的开发流程。除非你为一家迫切希望达到\
    \ SEI 能力成熟度模型 5 级^(³¹¹)的大公司工作，否则你的流程可以非常精简。详细的问题描述（最近以用户故事的形式出现）、头脑风暴设计会议、简单的配置管理、同行代码审查以及独立的测试团队，就能处理创建几乎无缺陷代码所需的一切。流程的灵活性、有效的沟通和共同的产品所有权是项目成功的关键。\n\
    \n每年都有大量真正优秀的软件被编写、测试并发布；其数量远超所谓的“失败”数字所让人相信的程度。^(³¹²,³¹³,³¹⁴) 计划驱动开发和敏捷开发的主要驱动力，是认识到需求的持续变化，以及最终目标始终是可工作的软件这一理念。敏捷开发最棒的一点是，它承认了这些事实，并将重构融入其简单的流程中。\n\
    \n简单的工具是最有效的。简单的工具能让你直达问题的核心，毫无阻碍地仔细审视它。它们让你能够把它拿出来，捧在手里，翻来覆去，快速轻松地戳弄它。简单的工具还能让你将它们组合起来，完成更复杂的事情。我们推荐你阅读斯蒂芬·詹金斯关于“老派”编程的文章，^(³¹⁵)\
    \ 他在其中说得比我们好得多。\n\n编码、调试和单元测试至少与设计同等重要。经验能让优秀的程序员对设计有深刻的理解，并拥有丰富的模式可供借鉴；经验能让卓越的程序员对其所使用的编程语言有深入而透彻的了解。正是这种深入而透彻的知识，才能产生优美的代码。\n\
    \n调试一个冗长复杂的程序的过程，是一项回报极其丰厚的努力。隔离问题、发现错误、搭建调试脚手架、假设解决方案、重新设计、最终确定错误，然后创建正确的修复方案，这一切会带来一种近乎令人难以承受的狂喜和满足感。\n"
- fmt: "# What to Do Next?\n\nSo now that you’ve read all about software development\
    \ and maybe tried some of the examples, what do you do next? How do you continue\
    \ becoming a better software developer? Well, here are some suggestions.\n\n**Write\
    \ code, lots of code.** Experience helps a lot. Programming is a craft that requires\
    \ practice and constant reinforcement. You will inevitably need to learn new things\
    \ almost every day, and it’s very likely that you’ll need to learn a whole new\
    \ set of tools and programming languages every few years. Having written lots\
    \ of code will make that task easier and more fun. It’s like leveling up: takes\
    \ work but gets you ready for the next big battle against even more interesting\
    \ problems.\n\n**Learn simple tools.** Simple tools give you flexibility. They\
    \ also help you learn the fundamental skills that you can then take to more complicated\
    \ IDEs. And when those IDEs get replaced (as they will) you can fall back on the\
    \ simple tools till you learn the new IDE.\n\n**Read about problem solving and\
    \ design.** People have been solving problems for thousands of years and designing\
    \ solutions for just as long. Don’t ignore the classics in the computer science\
    \ literature, like Dijkstra’s *Structured Programming* book,^([^(316)](#fn316))\
    \ Brooks’ classic *The Mythical Man-Month*,^([^(317)](#fn317)) Bentley’s *Programming\
    \ Pearls*,^([^(318)](#fn318)) McConnell’s *Rapid Development*,^([^(319)](#fn319))\
    \ and Beck’s *Extreme Programming Explained*.^([^(320)](#fn320)) Research and\
    \ developments in other areas can also communicate common problem solving strategies\
    \ that can also work for software development. For instance, Polya’s *How to Solve\
    \ It* book was written to solve math problems, but it translates very, very well\
    \ to software.^([^(321)](#fn321))\n\n**Read about programming and read about programmers.**\
    \ There is a plethora of literature on programming. A number of books have been\
    \ mentioned in the previous chapters, but two that bear repeating are Hunt and\
    \ Thomas’ *The Pragmatic Programmer*^([^(322)](#fn322)) and McConnell’s *Code\
    \ Complete 2*.^([^(323)](#fn323)) It’s also a great idea to read about how great\
    \ programmers think, work, and generally write great code. Two notable books are\
    \ Lammer’s *Programmers At Work*^([^(324)](#fn324)) and Oram and Wilson’s *Beautiful\
    \ Code*.^([^(325)](#fn325))\n\n**Talk to other programmers.** Books and articles\
    \ are a good way to gather information, but don’t discount talking to your peers.\
    \ A side effect of pair programming is that you get to see how someone else works,\
    \ how they approach problems, how they code, debug, and write tests. Code review\
    \ meetings are also a great way to learn how others work. Additionally, code reviews\
    \ reinforce Gerald Weinberg’s idea of *egoless programming*.^([^(326)](#fn326))\
    \ Once you get over the idea that you “own” the code in a software product (your\
    \ employer owns it; read some of those documents you had to sign on the first\
    \ day of work and see Chapter [5](#270563_3_En_5_Chapter.xhtml) on intellectual\
    \ property rights), you gain the ability to look at your code and the code of\
    \ your coworkers more objectively, allowing yourself to learn from its strengths\
    \ and shortcomings.\n\n**Join the ACM and the IEEE-CS:** The Association for Computing\
    \ Machinery (ACM; [`www.acm.org`](https://www.acm.org/)) and the IEEE Computer\
    \ Society (IEEE-CS; [`www.computer.org`](https://www.computer.org/)) are the two\
    \ main professional organizations for computer scientists. Their journals contain\
    \ a wealth of information about all things related to computers and computing,\
    \ their conferences are worth attending, and they have free online books and courses\
    \ for members. You will not regret joining one or both of them.\n\n**Be humble:**\
    \ The following quote from Dijkstra says it all.\n\n> *The competent programmer\
    \ is fully aware of the strictly limited size of his own skull; therefore he approaches\
    \ the programming task in full humility...*\n> \n> —Edsger Dijkstra^([^(327)](#fn327))\n\
    \nSoftware development is hard. Programs of any size can be extremely hard to\
    \ understand completely. Besides being one of the most creative things that humans\
    \ have ever done, computer software is one of the most complex. Be humble. Work\
    \ hard. Have fun! And lastly, we couldn’t resist a quote that had both the words\
    \ *magic* and *computer* in it...\n\n> *The magic of myth and legend has come\
    \ true in our time. One types the correct incantation on a keyboard, and a display\
    \ screen comes to life, showing things that never were nor could be. Programming\
    \ then is fun because it gratifies creative longings built deep within us and\
    \ delights sensibilities we have in common with all [people]. ... The computer\
    \ resembles the magic of legend in this respect, too. If one character, one pause,\
    \ of the incantation is not strictly in proper form, the magic doesn’t work. Human\
    \ beings are not accustomed to being perfect, and few areas of human activity\
    \ demand it. Adjusting to the requirement for perfection is, I think, the most\
    \ difficult part of learning to program.*\n> \n> —Frederick Brooks^([^(328)](#fn328))"
