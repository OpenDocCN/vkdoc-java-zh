- fmt: '# Modular Decomposition


    In 1972, David Parnas published a paper titled “On the Criteria to Be Used in
    Decomposing Systems into Modules” where he proposed that one could design programs
    using a technique called modularity.^([^(169)](#fn169)) Parnas’ paper was also
    one of the first papers to describe a decomposition based on *information hiding*,
    one of the key techniques in object-oriented programming and which we will discuss
    later in this section. In his paper, Parnas highlighted the differences between
    a top-down decomposition of a problem based on the flow of control of a problem
    solution versus a decomposition of the problem that used encapsulation and information
    hiding to isolate data definitions and their operations from each other. His paper
    is a clear precursor to object-oriented analysis and design (OOA&D), which you’ll
    see in the next chapter.


    While Parnas’ paper predates the idea, he was really talking about a concept called
    *separation of concerns*. “In computer science, separation of concerns is a design
    principle for separating a computer program into distinct sections. Each section
    addresses a separate concern: a set of information that affects the code of a
    computer program. A program that embodies separation of concerns well is called
    a modular program. Modularity, and hence separation of concerns, is achieved by
    encapsulating information inside a section of code that has a well-defined interface.
    Encapsulation is a means of information hiding.”^([^(170)](#fn170)) Traditionally,
    separation of concerns was all about separating functionality of the program.
    Parnas added the idea of separating the data as well, so that individual modules
    would control data as well as the operations that acted on the data, and the data
    would be visible only through well-defined interfaces. This concept was later
    expanded upon by Edsger Dijkstra.^([^(171)](#fn171))


    There are three characteristics of modularity that are key to creating modular
    programs:


    *   Encapsulation

    *   Loose coupling

    *   Information hiding


    *Encapsulation* means to bundle a group of services defined by their data and
    behaviors together as a module and keep them together. This group of services
    should be coherent and clearly belong together. (Like a function, a module should
    do just one thing.) The module then presents an *interface* to the user and that
    interface is ideally the only way to access the services and data in the module.
    An objective of encapsulating services and data is *high cohesion*: your module
    should do one thing and all the functions inside the module should work towards
    making that one thing happen.


    The complement of encapsulation is *loose coupling*, which describes how strongly
    two modules are connected to each other. We want to minimize the dependence any
    one module has on another, so we separate modules to minimize interactions and
    make modules interact through the module interface. The goal is to create modules
    with internal integrity (strong cohesion) and small, few, direct, visible, and
    flexible connections to other modules (loose coupling). Good coupling between
    modules is loose enough that methods in one module can easily be called by methods
    in another module, while the data in each module is independent and can only be
    changed by methods within the module where it is defined. This way, two modules
    can communicate and request changes to data without the fear of erroneously changing
    the data.


    *Loose coupling* falls into four broad categories, ranging from good to awful:


    *   *Simple data coupling*: Where unstructured data is passed via parameter lists.
    This is the best kind of coupling because it lets the sending module structure
    the data as it sees fit and it allows the receiving module to decide what to do
    with the data.

    *   *Structured data coupling*: Where structured data is passed via parameter
    lists. This is also a good kind of coupling because the sending module keeps control
    of the data formats and the receiving module gets to do what it wants to with
    the data.

    *   *Control coupling*: Where data from the sending module is passed to a receiving
    module and the content of the data tells the receiving module what to do. This
    is not a good type of coupling: the sender and receiver are too closely coupled
    because the sender is controlling how functions in the receiving module will execute.

    *   *Global-data coupling*: Where the two modules make use of the same global
    data. This is just awful as it violates a basic tenet of encapsulation by having
    the modules share data. This invites unwanted side effects and ensures that at
    any given moment during the execution of the program neither of the coupled modules
    will know precisely what is in the globally shared data. In general, global variables
    are considered bad programming practice.


    *Information hiding* is often confused with encapsulation, but they are not the
    same. Encapsulation describes a process of wrapping both data and behaviors into
    a single entity—in our case, a module. Data can be publicly visible from within
    a module and thus not hidden. Information hiding, on the other hand, says that
    the data and behaviors in a module should be controlled and visible only to the
    operations that act on the data within the module, so it’s invisible to other,
    external, modules. This is an important feature of modules (and later of objects
    as well) because it leaves control of the data to the module that understands
    best how to safely manipulate this data, while safeguarding against the side effects
    that can arise from other modules reaching in and tweaking said data.


    Parnas was not just talking about hiding data in modules. His definition of information
    hiding was even more concerned with hiding design decisions in the module definition.
    “We propose … that one begins with a list of difficult design decisions or design
    decisions which are likely to change. Each module is then designed to hide such
    a decision from the others.”^([^(172)](#fn172)) Hiding information in this manner
    allows clients of a module to use the module successfully without needing to know
    any of the design decisions that went into constructing the module. It also allows
    developers to change the implementation of the module without affecting how the
    client uses the module.'
