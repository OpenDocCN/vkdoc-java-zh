    ## 关于职业道德的最终定论


    每位软件开发专业人士在其职业生涯中都会遇到道德问题。你如何处理这些道德情境，将充分体现你的职业操守和道德品格。在结束本次关于职业实践的讨论之前，让我们再看一份你应该在职业生涯中始终铭记的基本道德原则清单。这份原始清单主要源自奎因，但多年来已有所修改。^(¹⁰³)


    1.  *保持公正*。你对公司会有一定程度的忠诚，但你也必须对整个社会和对自己保持忠诚。请务必牢记这一点。


    2.  *披露他人理应知晓的信息*。不要向需要知道信息的人隐瞒信息。不要欺骗或故意误导。务必披露任何利益冲突。


    3.  *尊重他人的权利*。这包括知识产权、公民权利和其他财产权利。不要窃取、滥用或歪曲他人的财产和贡献。


    4.  *公平对待他人*。不要歧视他人。确保他人获得公平的工资、福利以及对其所做工作的认可。


    5.  *为自己的作为和不作为负责*。为你所做或未做的一切负责——无论好坏。


    6.  *为你所监督之人的行为负责*。俗话说“责任止于此”，这同样适用于身为管理者的你。这也包括确保与你的员工进行有效沟通。


    7.  *保持正直*。履行你的承诺。对你的雇主忠诚（只要他们也以合乎道德的方式行事）。不要要求别人做你自己都不愿做的事情。


    8.  *持续提升自身能力*。软件开发以及整个计算机行业都处于不断变化之中。你在大学里使用的工具和语言五年后就会过时。确保自己成为一名终身学习者。


    9.  *分享你的知识、专长和价值观*。你在职业生涯中积累的经验越多，你就越有义务与同事和下属分享你的知识和专长。你还应该通过践行这些价值观为他人树立榜样。


    # 5. 知识产权、义务与所有权


    > *从我这里接受思想的人，自己获得了教诲，却并未减少我的思想；就像他在我的蜡烛上点燃自己的蜡烛，获得了光明，却并未使我陷入黑暗。思想应当自由地在全球传播，为了人类道德上的相互启迪，以及改善其境况，这似乎是自然独特而仁慈的设计——当她创造思想时，使其像火一样，能在所有空间扩展，而不会在任何一点上降低其密度；又像我们赖以呼吸、活动并拥有物质存在的空气一样，无法被禁锢或独占。*

    >

    > ——托马斯·杰斐逊


    在本章中，我们将讨论一系列与团队和公司相关的问题。这些问题虽然不一定直接影响软件开发，但对于你工作的最终成果——软件本身——却至关重要。^(¹⁰⁴)


    ## 谁拥有什么？


    当你为一家成熟的公司工作，或在一个团队中参与项目，或身处一家初创公司时，*谁拥有*你正在开发的*软件*这个问题会经常出现。如果你为一家成熟的公司工作，比如微软、谷歌、亚马逊，甚至通用汽车，所有权通常相当直接。在你入职的第一天，你会填写许多表格，大部分与税务有关。但其中会有一份表格，作为雇佣条件，你被要求放弃你在为公司工作期间和/或使用公司资源期间所创造的所有知识产权的权利。^(¹⁰⁵)
    从那天起，你为公司创造或修改的一切都被视为“雇佣作品”，归公司所有。^(¹⁰⁶)


    初创公司则有所不同，特别是如果你是初创公司的原始创始人之一。在这种情况下，你们所有人将共同创建并签署一份合同，描述你们作为公司将生产什么，并分配公司的一定比例或产品收益的一定比例给每位创始人。本质上，你们将共同拥有所有知识产权和所有“合作作品”，并商定如何分配。作为课程或大学项目一部分的团队项目，其运作方式与初创公司类似。在这个过程中，可能会有许多独特的、特定于团队和项目的特殊情况，以及大量关于团队中每个人实际比例的讨论。这些讨论需要尽早进行，需要以建设性的方式进行，并且需要在准确理解每个人在“合作作品”方面的权利和责任的基础上进行。未能通过适当且先发制人地解决每个人的关切来达成明确协议，可能会在项目甚至公司起步之前就摧毁你的团队、项目或公司。因此，理解什么是知识产权、谁拥有它以及如何分割它至关重要。


    ## 什么是知识产权？


    知识产权（IP）是一类财产，包括人类智力的无形创造。人类智力的产品在法律上被定性为*非竞争性公共物品*。^(¹⁰⁷) 这意味着同一产品可以同时被多人使用，而不会减少该产品供他人使用的可用性。因此，虽然一次只能有一个人驾驶你的汽车，但许多人可以同时使用
    Microsoft Excel。


    知识产权法旨在激励作者和发明者创作有益于公众的作品。公众对此类作品的使用受到监管，以确保作者和发明者因其努力而获得补偿。因此，知识产权法保护作者和发明者的作品，同时也允许他人对这些作品进行有限使用，从而使作者和发明者能够从其作品中获利。


    在美国，知识产权保护被载入美国宪法第一条第八款第八项，其中规定：“国会有权……通过保障作者和发明者对其各自著作和发现在限定时间内的专有权利，以促进科学和实用技艺的进步。”^(¹⁰⁸)
    所有其他国家也都有知识产权法，但在某些具体细节上可能与美国的法律有所不同。


    我们将探讨在编写计算机软件时可能涉及的三种不同类型的知识产权保护。它们是*公有领域*、*版权*和*专利*。


    ### 知识产权：公有领域作品


    版权、专利和商标都在一定期限内，为作品的原始创作者或发明者提供一定程度的保护，防止他人在未给予公平补偿的情况下使用其作品。创意作品或发明受保护的期限因国家而异，也因原始作品的类型而异。任何未受此类保护的创意作品都被视为属于*公有领域*。请注意，最终所有创意作品和发明都会进入公有领域，而公有领域是永久的。公有领域意味着任何人都可以复制、修改、表演该作品，从中制作实体产品等，并且他们无需向原始创作者或发明者提供补偿，也无需获得许可即可进行修改。例如，你可以表演你的现代版《哈姆雷特》，而无需给威廉·莎士比亚寄支票，因为他所有的作品都已进入公有领域。

