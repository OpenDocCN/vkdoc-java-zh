- fmt: '# Agile Values, Principles, and Activities


    In early 2001, a group of experienced and innovative developers met in Snowbird,
    Utah, to talk about the state of the software development process. All of them
    were dissatisfied with traditional plan-driven models and had been experimenting
    with new lightweight development techniques. Out of this meeting came the Agile
    Manifesto.^([^(16)](#fn16)) The original description proposed by the group included
    two parts: values (the manifesto itself) and principles.


    The four *Agile Values* showcase that while the authors recognize the value of
    the items on the right, they view the items on the left as the most crucial to
    successful software development:


    *   Individuals and interactions over processes and tools

    *   Working software over comprehensive documentation

    *   Customer collaboration over contract negotiation

    *   Responding to change over following a plan


    The following 12 *Agile Principles* were defined by the authors to focus and guide
    development:


    *   Our highest priority is to satisfy the customer through early and continuous
    delivery of valuable software.

    *   Welcome changing requirements, even late in development. Agile processes harness
    change for the customer’s competitive advantage.

    *   Deliver working software frequently, from a couple of weeks to a couple of
    months, with a preference to the shorter timescale.

    *   Business people and developers must work together daily throughout the project.

    *   Build projects around motivated individuals. Give them the environment and
    support they need, and trust them to get the job done.

    *   The most efficient and effective method of conveying information to and within
    a development team is face-to-face conversation.

    *   Working software is the primary way to measure progress.

    *   Agile processes promote sustainable development. The sponsors, developers,
    and users should be able to maintain a constant pace indefinitely.

    *   Continuous attention to technical excellence and good design enhances agility.

    *   Simplicity—the art of maximizing the amount of work not done—is essential.

    *   The best architectures, requirements, and designs emerge from self-organizing
    teams.

    *   At regular intervals, the team reflects on how to become more effective, then
    tunes and adjusts its behavior accordingly.


    The following four main *Agile Activities* (although originally defined as part
    of the Agile variant called eXtreme Programming) are applicable for all Agile
    methodologies:


    *Design while you code.* In real world domains, all the requirements aren’t typically
    known or correctly understood in advance. Mistakes and oversights will be made
    in architectural design, detailed design, and coding. Additionally, during product
    development, requirements and constraints may change, as no project exists in
    a vacuum, away from real world events such as turnover in the development team,
    updates to customer needs due to market changes, the development of new technologies,
    and so on. Agile software development models build products a piece at a time,
    with each product increment allowing for several crucial events to happen earlier
    and more frequently: delivery of value to the customer, feedback gathering, and
    adaptation to changes. Designing while coding allows more developer freedom to
    choose how to deliver on the tasks, promoting developer agency while increasing
    their responsibility to self-manage.


    *Direct communication is best,* although what "direct" means has shifted greatly
    in recent years. We see "direct communication" as happening in real time, with
    direct exposure to both verbal and non-verbal cues, which would encompass in-person
    discussions, video conferencing, and even advanced virtual environments. In any
    given software development project, there are two types of knowledge: 1) the customer
    has domain knowledge and what understanding of what the system is supposed to
    do and 2) the developers have technical knowledge about the target platform, programming
    language(s), and possible implementation issues. The customer doesn’t know the
    technical side and the developers don’t have the domain knowledge, so effective
    communication—on both sides—is a key activity in developing the product. Frequent
    communication means everyone is learning from everyone’s process, creating a more
    well-rounded shared understanding faster.


    *Code is the main deliverable.* The fundamental difference between plan-driven
    models and agile models is this emphasis on the code, as code is where system
    knowledge resides. In a plan-driven model, the emphasis is on producing a set
    of work products that together represent the entire work of the project with code
    being just one of the work products. In agile methodologies, the emphasis is placed
    squarely with code as the deliverable; in addition, by structuring the code properly
    and keeping comments up to date, the code itself becomes documentation for the
    project.


    *Test-driven development*. Test cases for the required features are written before
    development takes place and should all initially fail. Once all tests for a feature
    pass, the feature implementation is completed. Test-driven development is instrumental
    for managing change, as continuous testing tells you when a new feature is completed
    and integrated into the system without breaking any of the pre-existing functionality.


    ## Lean Software Development


    Lean software development comes from the just-in-time manufacturing processes
    (also known as the Toyota Production System, among other names), which were introduced
    in Japan in the 1970s and then made their way around the world in the 1980s and
    1990s, encouraged by the publication in 1990 of *The Machine That Changed The
    World*^([^(17)](#fn17)) (Womack et. al.). Just-in-time manufacturing evolved first
    into lean manufacturing and then into lean product management systems throughout
    the 1990s. The publication of Poppendieck & Poppendieck’s *Lean Software Development:
    An Agile Toolkit*^([^(18)](#fn18)) in 2003 marked the movement of *lean* into
    the *agile* development community.


    *Lean* software development is a set of principles designed to eliminate *waste*
    in order to improve productivity, quality, and customer satisfaction. *Waste*
    is anything that does not add value to the product. Thus, *lean* emphasizes that
    the team should only be focusing on activities that add immediate value to the
    product.


    The Poppendiecks^(14) transformed the *lean* principles that started at Toyota
    into seven key principles for software development:


    *   Eliminate waste

    *   Build quality in

    *   Create knowledge

    *   Defer commitment

    *   Deliver fast

    *   Respect people

    *   Optimize the whole


    We will go through each of these principles briefly to illustrate how they apply
    to software development.'
