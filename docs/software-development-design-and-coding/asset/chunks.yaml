  trans: '

    ## 伦理学导论


    简而言之，*伦理学*研究的是如何判断某事是*对是错*。目前，我们假设每个人都明白*对*与*错*的含义，但正如我们将在某些示例中看到的，即便是这一点有时也可能存在争议。至于*计算机伦理学*，我们将其定义为计算机专业人士（在我们的语境中即软件开发人员）在职业生涯中（无论是在工作中还是从事个人项目时）将面临的伦理问题。计算机伦理学包括如何做出可能影响你及他人（你的公司、客户、用户，乃至整个社会）的关键决策，无论这些影响是个人层面还是职业层面的。


    你在职业生涯中做出的许多决策都包含伦理成分。如果有人要求你发布一款你认为存在严重漏洞的软件，你会怎么做？如果你的公司正在制作或使用非法软件副本，你会怎么做？如果你的公司正在为他人侵犯知识产权提供便利（例如发布允许用户将受数字版权管理（DRM）保护的文件转换为未受保护文件的软件），你会怎么做？如果你认为自己正在参与的项目存在利益冲突，你会怎么做？如果有人为你提供一份开发你从道德上反感的软件的工作，你会怎么做？如果你发现你的公司正在记录每个人的网页搜索记录或按键记录，你会怎么做？从网站访问者那里收集多少数据才算合理？是否应该让访问者知晓这些数据收集行为？要求员工加班或周末工作以赶公司项目截止日期是否合乎伦理？


    你在职业生涯中遇到的伦理情境，与你职业之外遇到的情境在类别或本质上并无显著差异（尽管它们对你及他人生活的影响可能被放大）。你仍然需要运用普遍的伦理原则和理论来审视这些情境，因此我们将从这里开始。


    ## 伦理理论


    伦理学是研究*做正确的事*意味着什么，以及如何在不同的情境中做正确的事。伦理学是哲学的一个庞大分支，我们在此只能涉及其中一小部分。我们将重点介绍几种不同的理论，以及这些理论为我们提供的、用以找出如何做正确之事的方法。


    首先，“伦理理论基于一个假设：人是理性的，并且能够做出自由选择。”^(⁷⁹) 显然，这并非总是成立，但我们将假设它成立，并且大多数情况下，人们要为自己的决定和行为负责。


    伦理规则是我们在与他人打交道时，以及在影响他人的行为或决策中所遵循的规则。大多数伦理理论都有相同的目标：“提升人的尊严、和平、幸福与福祉。”^(⁸⁰) 我们还将假设，来自某一伦理理论的规则适用于所有人，且适用于所有情境。这些规则应有助于厘清我们的决策过程，并引导我们在特定情境中做出合乎伦理的决定。虽然行为合乎伦理并非总是易事，但它通常直接符合标准的社会和法律期望。根据
    Baase 的说法：


    > *在个人或职业领域行为合乎伦理，通常并非一种负担。大多数时候，我们诚实守信、信守承诺、不偷窃、做好本职工作。这不应令人惊讶。如果伦理规则是好的规则，它们就会为人民服务，也就是说，它们能让我们的生活更美好。行为合乎伦理往往是切实可行的。例如，诚实能使人与人之间的互动更顺畅、更可靠。如果我们经常撒谎或违背承诺，可能会失去朋友。此外，社会制度也鼓励我们做正确的事：偷窃被抓可能会被捕。工作马虎可能会失业。在职业背景下，从专业质量和能力的意义上讲，行为合乎伦理通常与做好本职工作紧密相关。从商业意义上讲，行为合乎伦理通常也与良好商业实践紧密相关，因为合乎伦理开发的产品更有可能让客户满意。然而，有时做正确的事是困难的……在职业环境中，勇气可能意味着向客户承认你的程序有缺陷，拒绝一份你无法胜任的工作，或者在你看到别人做错事时挺身而出。*^(⁸¹)


    现在，我们将探讨来自两个不同学派的几种不同的伦理理论：义务论学派和后果论学派。

    '
- fmt: '### Ethical Theory: Deontological Theories


    The word *deontology* is derived from the Greek word *deon* and means duty or
    obligation. Deontologists believe that people’s actions ought to be guided by
    moral laws and that these laws are universal (and in some cases, absolute). Deontological
    arguments focus on the *intent* of an act, and how that act is or is not defensible
    as an application of a moral law. They usually do not concern themselves with
    the consequences of an act, instead emphasizing duty and absolutist rules for
    how to act.


    Deontological school of ethical theory comes out of the work of Immanuel Kant
    (1724–1804), who believed that all moral laws were based on rational thought and
    behavior. Kant stresses fidelity to principles and duty. His arguments focus on
    duty divorced from any concerns about happiness or pleasure. Kant’s philosophy
    is not grounded in knowledge of human nature, but in a common idea of duty that
    applies to all rational beings: one should do the right thing in the right spirit.^([^(82)](#fn82))


    Among Kant’s many contributions to deontological theory, the three of the most
    fundamental ideas are:


    1. *There are ethical constants and rules that must apply universally.* This is
    known as the *Categorical Imperative* or the *Principle of Universality.* In the
    simplest terms, the categorical imperative is a test of whether an action is right
    or wrong. If you propose a moral law or rule, can your conception of that law
    when acted upon apply universally? “Can the action in question pass the test of
    universalization? If not, the action is immoral and one has a duty to avoid it.
    The categorical imperative is a moral compass that gives us a convenient and tenable
    way of knowing when we are acting morally.”^([^(83)](#fn83))


    2. *You should always act so as to treat yourself and others as ends in themselves
    and not means to an end.* That is, it is wrong to use a person, meaning every
    interaction with another person should respect them as a rational human being.
    “The principle of humanity as an end in itself serves as a limiting condition
    of every person’s freedom of action. We cannot exploit other human beings and
    treat them exclusively as a means to our ends or purposes.”^([^(84)](#fn84))


    3. *Logic or reason determine the rules of ethical behavior.* Actions are intrinsically
    good if they follow from logic or reason. Rationality is the standard for what
    is good.


    Deontologists believe that it is the act that is important in evaluating a moral
    decision and that the consequences of the act do not enter into determining if
    the act is morally good or not. Kant takes an extreme position on the absolutism
    of moral rules. For example, take the moral rule: *It is always wrong to lie*.
    If a murderer is looking for his intended victim (whom you just hid in your basement)
    and asks where they are, according to the *It is always wrong to lie* moral rule,
    it is ethically wrong for you to lie to protect the intended victim. In the real
    world, most people would agree that this is a circumstance where the ethical rule
    should be broken because of the consequences if you do not.^([^(85)](#fn85)) We’ll
    come back to this problem with Kant a little later.


    As another example of a deontological argument and its problems, let’s reflect
    on the experience of being torn between what we want to do and what we ought to
    do. Kant says that what we want to do is of no importance. We should always focus
    on what we ought to do; in other words, we must do our duty. The moral value of
    an action depends on the underlying moral law.^([^(86)](#fn86)) People who act
    in a dutiful way feel compelled to act that way out of belief and respect for
    some moral law.


    In order to determine if a moral rule is correct or good, we try to apply the
    principle of universality. Let’s work through the example of keeping promises.
    Say we are in a difficult situation. In order to get out of that situation, we
    must make a promise that we later intend to break. The moral rule here would be:
    I am allowed to make promises with the intention of breaking them later. Following
    the categorical imperative we attempt to universalize this rule, so the universal
    version of the rule is: it is morally correct for everyone in a difficult situation
    to make a promise they later break. If this is true, then promises become worthless
    because everyone would know that there was the possibility they’d be broken later.
    So there’d be no such thing as a promise anymore. Hence, the moral rule that applies
    to me becomes useless when we try to universalize it. So this is how, when you
    are analyzing an ethical dilemma, you apply the principle of universality. In
    this case, we discover that the rule we started with cannot be extended universally,
    and so it cannot be a moral rule.


    So where are we with respect to deontological ethics? Well, we have a set of assumptions
    (or axioms) and a means of testing whether new, potential moral laws are correct
    or not (or right or wrong)—the principle of universality. How well does this work?
    Let’s try to formulate some pros and cons.


    **What’s good about the deontological approach to ethics?**


    * (1) *It is rational*. It’s based on the idea that rational humans can use logic
    to explain the why behind their actions.

    * (2) *The principle of universality produces universal moral guidelines*. These
    guidelines allow us to make clear moral judgments.

    * (3) *All people are treated as moral equals*. So this gives us an ethical framework
    to combat discrimination.


    **What’s not so good about the deontological approach to ethics?**


    * (1) *Sometimes no single rule can fully characterize an action*. Example: Stealing
    food to feed starving children. While there is an ethical rule against stealing,
    there is also an ethical rule that you should protect children. In this case,
    these two rules are in conflict.

    * (2) *Deontological arguments don''t provide a way to resolve conflicts between
    two or more moral rules*. Kant’s absolutist position on rules results in the idea
    that the deontological approach doesn’t tell us which rules are more important
    than others.

    * (3) *Deontological theories (particularly Kant''s) don''t allow any exceptions
    to the moral rules*. This makes them difficult to apply in the real world, where
    we often need to bend the rules to avoid bad consequences. (But remember, deontological
    theory doesn’t care about consequences; it cares about the act and the rule that
    the act embodies.)^([^(87)](#fn87))'
  raw: '### Ethical Theory: Deontological Theories


    The word *deontology* is derived from the Greek word *deon* and means duty or
    obligation. Deontologists believe that people’s actions ought to be guided by
    moral laws and that these laws are universal (and in some cases, absolute). Deontological
    arguments focus on the *intent* of an act, and how that act is or is not defensible
    as an application of a moral law. They usually do not concern themselves with
    the consequences of an act, instead emphasizing duty and absolutist rules for
    how to act.


    Deontological school of ethical theory comes out of the work of Immanuel Kant
    (1724–1804), who believed that all moral laws were based on rational thought and
    behavior. Kant stresses fidelity to principles and duty. His arguments focus on
    duty divorced from any concerns about happiness or pleasure. Kant’s philosophy
    is not grounded in knowledge of human nature, but in a common idea of duty that
    applies to all rational beings: one should do the right thing in the right spirit.^([^(82)](#fn82))


    Among Kant’s many contributions to deontological theory, the three of the most
    fundamental ideas are:


    1.  *There are ethical constants and rules that must apply universally.* This
    is known as the *Categorical Imperative* or the *Principle of Universality.* In
    the simplest terms, the categorical imperative is a test of whether an action
    is right or wrong. If you propose a moral law or rule, can your conception of
    that law when acted upon apply universally? “Can the action in question pass the
    test of universalization? If not, the action is immoral and one has a duty to
    avoid it. The categorical imperative is a moral compass that gives us a convenient
    and tenable way of knowing when we are acting morally.”^([^(83)](#fn83))


    2.  *You should always act so as to treat yourself and others as ends in themselves
    and not means to an end.* That is, it is wrong to use a person, meaning every
    interaction with another person should respect them as a rational human being.
    “The principle of humanity as an end in itself serves as a limiting condition
    of every person’s freedom of action. We cannot exploit other human beings and
    treat them exclusively as a means to our ends or purposes.”^([^(84)](#fn84))


    3.  *Logic or reason determine the rules of ethical behavior.* Actions are intrinsically
    good if they follow from logic or reason. Rationality is the standard for what
    is good.


    Deontologists believe that it is the act that is important in evaluating a moral
    decision and that the consequences of the act do not enter into determining if
    the act is morally good or not. Kant takes an extreme position on the absolutism
    of moral rules. For example, take the moral rule: *It is always wrong to lie*.
    If a murderer is looking for his intended victim (whom you just hid in your basement)
    and asks where they are, according to the *It is always wrong to lie* moral rule,
    it is ethically wrong for you to lie to protect the intended victim. In the real
    world, most people would agree that this is a circumstance where the ethical rule
    should be broken because of the consequences if you do not.^([^(85)](#fn85)) We’ll
    come back to this problem with Kant a little later.


    As another example of a deontological argument and its problems, let’s reflect
    on the experience of being torn between what we want to do and what we ought to
    do. Kant says that what we want to do is of no importance. We should always focus
    on what we ought to do; in other words, we must do our duty. The moral value of
    an action depends on the underlying moral law.^([^(86)](#fn86)) People who act
    in a dutiful way feel compelled to act that way out of belief and respect for
    some moral law.


    In order to determine if a moral rule is correct or good, we try to apply the
    principle of universality. Let’s work through the example of keeping promises.
    Say we are in a difficult situation. In order to get out of that situation, we
    must make a promise that we later intend to break. The moral rule here would be:
    I am allowed to make promises with the intention of breaking them later. Following
    the categorical imperative we attempt to universalize this rule, so the universal
    version of the rule is: it is morally correct for everyone in a difficult situation
    to make a promise they later break. If this is true, then promises become worthless
    because everyone would know that there was the possibility they’d be broken later.
    So there’d be no such thing as a promise anymore. Hence, the moral rule that applies
    to me becomes useless when we try to universalize it. So this is how, when you
    are analyzing an ethical dilemma, you apply the principle of universality. In
    this case, we discover that the rule we started with cannot be extended universally,
    and so it cannot be a moral rule.


    So where are we with respect to deontological ethics? Well, we have a set of assumptions
    (or axioms) and a means of testing whether new, potential moral laws are correct
    or not (or right or wrong)—the principle of universality. How well does this work?
    Let’s try to formulate some pros and cons.


    What’s good about the deontological approach to ethics?


    *   (1) *It is rational*. It’s based on the idea that rational humans can use
    logic to explain the why behind their actions.


    *   (2) *The principle of universality produces universal moral guidelines*. These
    guidelines allow us to make clear moral judgments.


    *   (3) *All people are treated as moral equals*. So this gives us an ethical
    framework to combat discrimination.


    What’s not so good about the deontological approach to ethics?


    *   (1) *Sometimes no single rule can fully characterize an action*. Example:
    Stealing food to feed starving children. While there is an ethical rule against
    stealing, there is also an ethical rule that you should protect children. In this
    case, these two rules are in conflict.


    *   (2) *Deontological arguments don''t provide a way to resolve conflicts between
    two or more moral rules*. Kant’s absolutist position on rules results in the idea
    that the deontological approach doesn’t tell us which rules are more important
    than others.


    *   (3) *Deontological theories (particularly Kant''s) don''t allow any exceptions
    to the moral rules*. This makes them difficult to apply in the real world, where
    we often need to bend the rules to avoid bad consequences. (But remember, deontological
    theory doesn’t care about consequences; it cares about the act and the rule that
    the act embodies.)^([^(87)](#fn87))'
