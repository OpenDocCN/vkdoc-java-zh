    ### 并行编程相关定义


    *线程*，也称为*执行线程*，是并行性的基本单位。线程是一段代码，包含执行指令序列所需的一切：私有指令列表、调用栈或系统栈、程序计数器，以及少量线程专属数据（通常位于其调用栈中）。线程与其他线程共享内存访问权限，这使得多个线程能够通过共享变量进行协作与通信。


    *进程*是一种拥有独立地址空间的线程。进程之间不使用共享内存，而是通过消息进行通信，因此它们共享发送和接收消息的接口。进程是动态的，而程序是静态的。换言之，进程是正在执行的程序。进程比线程拥有更多关联状态，因此创建和销毁进程的成本更高，这也意味着进程的设计寿命通常更长。


    *延迟*是指完成给定工作单元（无论是进程、线程还是程序中更小的单元）所需的时间。延迟可能成为程序执行中的问题。如果程序或进程的某一部分执行时间远长于其他部分，那么在等待该部分完成期间，其他任务都无法进行。自
    20 世纪 70 年代初以来，操作系统便采用了一种应对方法：上下文切换。假设你正在执行一个程序，该程序尝试打开硬盘上的文件。磁盘操作的速度比其他内存操作慢数个数量级，等待磁盘操作完成会显著拖慢程序速度，同时还会阻止其他程序执行。在这种情况下，操作系统会换出你的程序，允许其他程序执行，直到磁盘操作完成（系统必须能让磁盘独立执行操作才能实现这一点）。随后，操作系统可将你的程序换回内存继续执行。这种上下文切换并不能缩短延迟，但能对系统其余部分隐藏延迟，并允许其他程序取得进展。即使不改善单个程序，也能提升机器的整体性能。这种技术类似于上述国际象棋示例中的*并发*技术。


    *吞吐量*是指单位时间内可完成的工作量。我们的目标是利用并行性来提高吞吐量。例如，流水线处理器就体现了一种并行形式。流水线可能由不同阶段组成，例如：(1)
    取指令，(2) 译指令，(3) 取数据，(4) 执行指令，(5) 写数据。在此架构中，五个不同的指令可以同时执行，因为每个指令在任意时刻都处于不同的阶段。这种架构允许机器在单位时间内完成更多指令，从而提升吞吐量，优于每次仅激活一条指令的处理器。


    *加速比*是同一程序的串行版本执行时间除以并行版本执行时间的结果。*加速比 = T*[*s*]*/T*[*p*]（另请参见下方的*阿姆达尔定律*）。与加速比相关的是效率，它衡量每个处理器的使用效率。*效率
    = 加速比/P*，其中 P 是并行机器中的处理器数量。


    ### 性能与可扩展性


    并行编程的两个主要目标是*提升性能*和面向大量处理器的*可扩展性*。本节将简要探讨这两个目标。如需更详细的内容，请参阅 Lin & Snyder 的著作。^(²³⁰)


    *可扩展性*是指：随着输入数据量的增长，我们希望程序能够使用更多处理器来高效适应这种增长。当数据量增加时，我们可以生成更多程序副本，让它们并行处理数据。但有许多问题会使可扩展性变得复杂：我们使用的是共享内存还是分布式内存？每个处理器是否拥有自己的数据副本？我们是同步运行还是独立运行？这对当前程序是否重要？连接处理器的网络系统拓扑结构如何？这又如何影响通信延迟（即数据从一个处理单元传递到另一个所需单元的时间）？编写良好的并行程序必须探索并解决所有这些问题。

    '
- fmt: '# Obstacles to Performance Improvement via Parallelism


    One might think that improving performance by using more processors would also
    be easy. One would be wrong. Ideally, if a program takes time `T` to execute to
    completion on a single processor, we would like it to take `T/P` time on a machine
    with `P` processors. It turns out this is hardly ever the case. There are a variety
    of potential roadblocks to improving scalability and performance in your parallel
    programs. Here are a few.


    **Overhead**: When converting a serial program into a parallel one, you may need
    to add code to manage the parallel portions, such as control sections that the
    program will use to fork off the concurrent pieces of your program. All this code
    is considered overhead and will impact your performance. There is overhead in
    creating and destroying your threads of execution; this code is usually in a library
    or in the operating system and is invisible to you, but nonetheless will slow
    down your parallel program. Communication between threads and other processes
    is another source of overhead. If you have one thread that must wait on another
    thread for an event or a computation to complete, that’s synchronization overhead.


    **Non-parallelizable code**: You must be able to divide your program into `P`
    different concurrent sections to take advantage of all `P` processors. However,
    even a highly parallelizable serial program is bound to contain code that is inherently
    serial and thus cannot be parallelized. Loop overhead, input/output, and network
    communications are all examples of code that normally can’t be parallelized. This
    will impede your efforts to make concurrent sections of your program and it will
    limit the benefits you can get from parallelizing the program. Non-parallelizable
    code leads us to the next obstacle.


    **Amdahl’s Law**: Even for well-designed parallel programs, scaling your program
    for larger values of `P` can create overhead that may drown out any advantage
    you gain from having more processors. In 1967, Gene Amdahl wrote a paper that
    tried to express the theoretical speedup of a parallel program over a serial version
    of the same program. This expression is now known as Amdahl’s Law. If the fraction
    of time for the parallel part of your program to execute on a single processor
    is `P`, and the fraction of time for the inherently serial fraction of your program
    is `1-P`, then Amdahl’s Law says that the speedup you’ll get from using `N` processors
    is


    ```

    S(N) = 1 / ((1-P) + P/N)

    ```


    Note that `S(1) = 1`. It is also true that as `N` goes to infinity, that `S(N)
    = 1 / (1-P)`. This gives us a limit on the amount of parallelism we can expect
    for individual programs. It means there is likely an upper bound on the number
    of processors that we will be able to use to improve the performance of any given
    program. There are arguments about this conclusion.


    **Contention**: In any computer system, the processors are only one resource that
    your program will use. There are also various I/O devices, various levels of storage,
    the connectivity network, and so on. If one of these resources is scarce, or if
    your program is overly dependent on a single resource, then there may be contention
    for that resource among your parallel code parts. This will cause some of them
    to have to wait, slowing down your overall performance.


    **Idle time**: Ideally, we’d like all the available processors to be working all
    the time, but this may not be the case. There may be instances like load imbalances
    (your concurrent program puts more work on certain parts than others) and delays
    waiting for memory operations or other resources, which will cause some processors
    to have to wait. This idling and waiting will hurt your performance gains.


    # How to Write a Parallel Program


    In order to write a parallel program, we will often start with a serial version
    of the program, or with serial algorithms that implement the solution to a problem
    we’d like to parallelize. To convert a serial solution into a parallel one, we
    need to identify the portions of the solution that are inherently serial and those
    that may be parallelized. We also need a series of abstractions that we can use
    to think about parallel problems. Finally, we need a set of language features
    to allow us to talk about the parallel program.


    ## Parallel Programming Models


    We can divide parallel computations into several different types:


    - Data parallel

    - Task parallel

    - Shared memory

    - Threaded

    - Message passing (a.k.a. distributed memory)

    - Single program multiple data (SPMD)


    In a problem that exhibits **data parallel computations**, we can apply parallelism
    by performing the same set of computations to different parts of the data all
    in parallel and hence on different processors. Because we’re running the same
    code on all the processors, but on different data, this type of computation is
    scalable: we can maintain efficiency by just adding more processors as the size
    of the data increases. One of the most popular current programming languages that
    work with the data parallel model is Chapel.


    On the other hand, if we can divide a program into a set of independent tasks,
    each contributing to the overall solution, then we have **task parallel computation**.
    Because there are a finite number of tasks in any given problem solution, and
    because there are bound to be some number of dependencies in the computation (some
    tasks need to execute before others), task parallel types of computations are
    usually not scalable beyond the number of tasks.


    In the **shared memory** model, all the tasks, whether serial or parallel, share
    the same address space. They read and write to this shared address space asynchronously.
    This typically requires the use of locks or semaphores to control access to the
    memory and prevent contention and deadlocks. This is one of the simplest models
    and is an example of the PRAM (Parallel Random Access Machine) model, which implements
    a shared memory abstract machine.


    In the **threads** model, a single process starts up and acquires a set of resources.
    It then spawns some number of threads that will execute in parallel. All the threads
    have some local data (usually on their call stack) but all of them also share
    the memory and resources of the parent process. This means that the Threads model
    is a form of Shared Memory model. POSIX Threads, Java Threads, OpenMP, and CUDA
    threads are all examples of this model.


    The **message passing** (distributed memory) model has all the processes on different
    processors with their own set of memory resources. The processes communicate not
    by sharing memory but by passing messages over the interconnection network. These
    messages usually take the form of library subroutine calls. The messages can include
    control and data messages. All the processes must be programmed to cooperate with
    the other processes. Messages are usually sent synchronously (e.g. for every `send()`
    function call there must be a `receive()` function call). The standard for this
    model is the *Message Passing Interface* (MPI) Standard created by the MPI Forum.


    The **single program multiple data** (SPMD) model is a meta-model that can be
    built on top of any of the models mentioned above. In this model, all the spawned
    tasks are identical and execute simultaneously, but on different slices of the
    data stream. Because they act on different parts of the data, each task may, in
    fact, execute different instructions as they move forward.'
