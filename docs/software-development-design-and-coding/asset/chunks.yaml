  trans: '

    ## 设计师与创造力


    不要认为设计是刻板固定的，或者可以套用一套正式的流程规则来批量产出软件设计。事实远非如此。尽管问题本身、问题领域以及目标平台会对设计施加形式上的限制和约束，但达成设计的过程本身却不必是形式化的。它本质上是一种创造性活动。比尔·柯蒂斯在
    1987 年对软件设计师进行的一项实证研究中，总结出了一个似乎是大多数设计师遵循的流程：^(¹⁵⁹)


    1.  理解问题。


    2.  将问题分解为目标和对象。


    3.  选择并组合方案来解决问题。


    4.  实施方案。


    5.  反思设计产品与过程。


    坦率地说，这是一个相当通用的列表，并没有真正告诉我们进行软件设计所需的一切。然而，柯蒂斯随后深入探讨了他列表中的第 3 点——“选择并组合方案”，并发现他的设计师们采用了以下步骤：


    1.  在脑海中构建一个拟议解决方案的模型。


    2.  在脑海中执行该模型，看它是否能解决问题。编造输入数据，并在头脑中模拟模型运行。


    3.  如果得到的结果不正确，就修改模型以消除错误，然后返回第 2 步再次模拟。


    4.  当你的样本输入产生了正确的输出时，再选择一些其他的输入值，返回并重复第 2 步和第 3 步。


    5.  当你重复足够多次（凭经验你会知道何时足够）后，你就得到了一个良好的模型，可以停止了。^(¹⁶⁰)


    这种更深层次的技术清晰地揭示了设计的认知性和迭代性。你会发现，设计从根本上说是心智的功能，是独特的，并且依赖于设计师自身那些超出流程本身的因素。


    约翰·内斯特在给软件工程研究所的一份报告中，列出了伟大设计师的一些共同特征。伟大的设计师：


    *   拥有大量的标准模式；

    *   经历过失败的项目；

    *   精通开发工具；

    *   有追求简洁的冲动；

    *   能够预见变化；

    *   能够从用户的角度看问题；以及

    *   能够应对复杂性。^(¹⁶¹)


    ## 结论


    那么，关于软件设计你学到了什么？


    *设计是临时的、启发式的、混乱的*。设计软件是一个试错式的启发式过程，这对于优秀的设计来说既必要又充分。


    *设计依赖于对先前设计问题和解决方案的理解*。虽然设计师需要一些问题领域的知识（可由客户提供），但更关键的是，他们需要具备设计知识和优秀设计的模式。他们需要有一个装满这些设计模式的“背包”，以便用来处理新问题。这些解决方案是经过验证且可靠的。问题虽然是新的，但它们包含了已被解决过的问题的元素。这些模式是*可塑的模板*，可以应用于新问题中那些符合模式要求的元素。


    *设计是迭代的*。需求会变化，你的设计也必须随之变化。即使你拥有一套稳定的需求，随着你在设计活动中不断推进，你对需求的*理解*也会发生变化，因此你会回过头来修改设计，以反映这种更深入、更完善的理解。迭代过程会在每一步都使你的设计更加清晰和简化。


    *设计是一种认知活动*。在这个阶段你并没有在编写代码，所以不需要机器。你的大脑和一个绘图工具就是进行设计所需的全部。正如迪杰斯特拉所说：“我们绝不能忘记，我们的职责不是编写程序；而是设计能展现所需行为的计算类别。”^(¹⁶²)


    *设计是机会主义的*。格拉斯总结他对设计的讨论时说道：“不受干扰的设计过程是机会主义的——也就是说，优秀的设计师并非按部就班地推进，而是遵循由他们心智所决定的、不规则的路径，追求机会而非有序的进程。”^(¹⁶³)


    以上所有特征都反对僵化、计划驱动的设计过程，而支持一种创造性、灵活的设计方式。这让我们回到了本章的第一个主题：*设计就是棘手的*。


    最后


    > *设计师可能会为复杂的设计苦思冥想数月。然后突然间，那个简单、优雅、美丽的解决方案就出现在他脑海中。当这发生在你身上时，感觉就像上帝在对你说话！也许他确实在说。*

    >

    > ——利奥·弗兰科夫斯基（出自《穿越时空的工程师》）


    # 9. 结构化设计


    > *投资于抽象，而非实现。抽象能够经受住来自不同实现和新技术的变革冲击。*

    >

    > ——安迪·亨特和戴夫·托马斯^(¹⁶⁴)


    ## 结构化编程


    结构化设计源于艾兹格·迪杰斯特拉 1968 年写给《ACM 通讯》的那封著名信件《Goto 语句有害论》。迪杰斯特拉的论文总结道：


    > *当前的* ***goto*** *语句过于原始；它太容易诱使人们把程序搞得一团糟。我们可以将所考虑的从句（编者注：if-then-else, switch,
    while-do, 和 do-while）视为对其使用的约束。我并非声称这些从句已详尽到能满足所有需求，但无论建议何种从句（例如终止从句），它们都应满足一个要求：即能够维持一个独立于程序员的坐标系，以便以一种有用且可管理的方式来描述过程。*^(¹⁶⁵)


    自此以后创建的编程语言，虽然并未完全消除 goto 语句（除了 Java，它完全没有），但无疑都淡化了它的使用，教授编程的课程也鼓励学生避免使用它。取而代之的是，问题解决以自顶向下的结构化方式进行教学：从问题陈述开始，尝试将问题分解为一组可解决的子问题。这个过程持续进行，直到每个子问题都小到微不足道或非常容易解决。这种技术被称为*结构化编程*。在
    20 世纪 80 年代中期面向对象编程出现并被接受之前，这是解决问题和编程的标准方法。它至今仍是处理一大类问题的最佳方法之一。

    '
- fmt: '# Stepwise Refinement


    Niklaus Wirth formalized the structured design technique in his 1971 paper, “Program
    Development by Stepwise Refinement.”^([^(166)](#fn166)) *Stepwise refinement*
    contends that designing programs consists of a set of refinement steps. In each
    step, a given task is broken up into a number of subtasks. Each refinement of
    a task must be accompanied by a refinement of the data description and the interface.
    The degree of modularity obtained will determine the ease or difficulty with which
    a program can be adapted to changes in requirements or environment.


    During refinement, you use a notation that is natural to the problem space. You
    avoid using a programming language for description as long as possible. Each refinement
    implies a number of design decisions based on a set of design criteria. These
    criteria include efficiency of time and space, clarity, and regularity of structure
    (simplicity).


    Refinement can proceed in two ways, top-down or bottom-up. *Top-down* refinement
    is characterized by moving from a general description of the problem to detailed
    statements of what individual modules or routines do. The guiding principle behind
    stepwise refinement is that humans can concentrate on only a few things at a time—Miller’s
    famous 7 +/- 2 chunks of data rule.^([^(167)](#fn167)) One works by:


    - Analyzing the problem and trying to identify the outlines of a solution and
    the pros and cons of each possibility

    - Then designing the top levels first

    - Steering clear of language-specific details

    - Pushing down the details until you get to the lower levels

    - Formalizing each level

    - Verifying each level

    - Then moving to the next lower level to make the next set of refinements (that
    is, repeat)


    One continues to refine the solution until it seems as if it would be easier to
    code than to decompose; you’ll see an example of this process later in this chapter.


    The point is that you work until you become impatient at how obvious and easy
    the design becomes. The downside here is that you really have no good metric on
    “when to stop.” It just takes practice.


    If you can’t get started at the top, then start at the bottom using *bottom-up*
    refinement:


    - Ask yourself, “What do I know that the system needs to do?” This usually involves
    lower level I/O operations, other low-level operations on data structures, and
    so on.

    - Identify as many low-level functions and components as you can from that question.

    - Identify common aspects of the low-level components and group them together.

    - Continue with the next level up or go back to the top and try again to work
    down.


    Bottom-up refinement usually results in early identification of utility routines,
    which can lead to a more compact design. It also helps promote reuse because you
    are reusing the lower level routines. On the downside, bottom-up assessment is
    hard to use exclusively—you nearly always end up switching to a top-down approach
    at some point because sometimes you find you just can’t put a larger piece together
    from the bottom-up. This isn’t really stepwise refinement but it can help get
    you started. Most real stepwise refinements involve alternating between top-down
    and bottom-up design elements. Fortunately, top-down and bottom-up design methodologies
    can be very complementary.


    ## Example of Stepwise Refinement: The Eight Queens Problem


    The eight queens problem requires finding a placement of eight queens on a standard
    8 x 8 chessboard in such a way that no queen can be attacked by any other. Remember
    that queens can move any number of spaces horizontally, vertically, or diagonally.
    One possible solution to the eight-queens problem is depicted in Figure [9-1](#270563_3_En_9_Chapter.xhtml#Fig1).


    ![](images/270563_3_En_9_Chapter/270563_3_En_9_Fig1_HTML.jpg)


    An illustration of an 8 by 8 chessboard demonstrates 8 different positions for
    the queen.


    **Figure 9-1** One solution to the eight queens problem


    It turns out that no one has yet found an analytical solution to this problem,
    and it’s likely one does not exist. So how would you approach this problem? Take
    a moment to think about it on your own before continuing.


    Done? Okay. Let’s look at one possible way to decompose this problem.


    ### Eight Queens: Proposed Solution 1


    The first thing you need to do is to look at the problem and tease out the requirements
    and the outline of a solution. This will start you down the road of answering
    the question of what the top-level decomposition should be.


    You might initially consider solving the problem using brute force: just try all
    the possible arrangements of queens and pick the ones that work. With 8 queens
    and 64 possible squares there are


    ![$$ \frac{n!}{k!\left(n-k\right)!}=\frac{64!}{56!8!}\approx {2}^{32} $$](images/270563_3_En_9_Chapter/270563_3_En_9_Chapter_TeX_Equa.png)


    possible board configurations, where `n` is the number of squares on the board
    and `k` is the number of queens (or square positions to be chosen from the available),
    which is only 4,294,967,296 (a bit over 4 billion configurations). These days,
    that’s not very many, so brute force could be a viable option.


    If you generate a set `A` of all the possible board combinations, you can create
    a test called `q(x)` that returns `true` if the board configuration `x` is a solution
    or `false` if `x` is not a solution. Then you can create a program that looks
    like the following:


    ```

    Generate the set A of all board configurations;

    while there are still untested configurations in A do

    x = the next configuration from A

    if (q(x) == true) then print the solution x and stop

    go back to the top and do it again.

    ```


    Notice that all the work is getting done in two steps: generating the set `A`
    and performing the test `q(x)`. The generation of the set `A` only happens once
    but performing the test `q(x)` happens once for every configuration in your set
    `A`, until you find a solution. While this approach will surely work, it’s not
    at all efficient. So let’s try to reduce the number of combinations to consider
    to speed things up.


    ### Eight Queens: Proposed Solution 2


    In the process of considering your initial brute-force approach, you’ve done some
    analysis so you have a clearer idea of what has to happen. In order to reduce
    the number of total possible configurations and then come up with a more efficient
    algorithm, you need to think about the problem more creatively. The first thing
    to notice is that you can never have more than one queen in a column (yes, also
    per row, but let’s keep things simpler for now). Having exactly one queen per
    column reduces the number of possible combinations to 2^(24) or just 16 million
    (consider that to place a queen into each column will now have only 8 possible
    choices: the rows; so 8⁸ or 2^(24) choices total). Although this is good, it doesn’t
    really change the algorithm very much. Your proposed solution now looks like the
    following:


    ```

    Generate the set B of restricted board configurations;

    while there are still untested configurations in B do

    x = the next configuration from B

    if (q(x) == true) then print the solution x and stop

    go back to the top and do it again.

    ```


    This version requires generating the set `B` of board positions with one queen
    in each column and still requires visiting up to 16 million possible board positions.
    Generating `B` is now slightly more complicated than generating `A` because you
    now have to test to see if a proposed board position meets the one queen per column
    restriction. However, because you’ll have fewer configurations to test, Solution
    2 is still better than Solution 1 above. You can do better.'
