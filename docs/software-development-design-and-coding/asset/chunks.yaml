    ### Behavioral Patterns


    While creational patterns are all about how to create new objects, and structural
    patterns are all about getting objects to communicate and cooperate, behavioral
    patterns are all about getting objects to do things. They examine how responsibilities
    are distributed in the design and how communication happens between objects. The
    three patterns we’ll look at here all describe how to assign behavioral responsibilities
    to classes: the *Iterator* Pattern lets us traverse a collection of objects, the
    *Observer* Pattern lets us manage push and pull state changes, and the *Strategy*
    Pattern lets us select different behaviors behind a single interface.


    #### Behavioral 1: The Iterator Pattern


    If you have a *collection of elements*, you can organize them in many different
    ways. They can be arrays, linked lists, queues, hash tables, sets, and so on.
    Each of these collections will have its own unique set of operations, but there’s
    usually one operation that you want to perform on all of them: *traverse the entire
    collection from beginning to end, one element at a time*, without needing *to
    know the internal structure of the collection*. You may also want to be able to
    traverse the collection backwards and you may want to have several traversals
    going on at the same time. The Iterator pattern^([^(220)](#fn220)) creates an
    object that allows you to traverse a collection one element at a time.


    Because of the requirement that you shouldn’t need to know about the internal
    structure of the collection, an Iterator object doesn’t care about sorting order;
    it just returns each object as it’s stored in the collection, one at a time, from
    first to last. The simplest iterator needs just two methods:


    *   `hasNext()``:` Which returns a true if there is an element to be retrieved
    (i.e. we’ve not reached the end of the collection yet; and false if there are
    no elements left)


    *   `getNextElement()``:` Which returns the next element in the collection


    In the Iterator Pattern, you have an `Iterator` interface that is implemented
    to make a concrete `Iterator` object that is used by a concrete `Collections`
    object. A client class then creates the `Collection` object and gets the `Iterator`
    from there. Figure [13-7](#270563_3_En_13_Chapter.xhtml#Fig7) is the UML version
    of this from Gamma et. al.


    ![](images/270563_3_En_13_Chapter/270563_3_En_13_Fig7_HTML.jpg)


    A U M L diagram illustrates the relationship between a collection interface, client,
    iterator interface, concrete collection, and concrete iterator.


    Figure 13-7


    An example of using the Iterator pattern^([^(221)](#fn221))


    You can see that the client class uses the `Collection` and the `Iterator` interfaces,
    and the `Concrete_Iterator` is part of and uses the `Concrete_Collection`. Note
    that the `Collection_Interface` will contain an abstract method to create an iterator
    for the Collection. This method is implemented in the `Concrete_Collection` class
    and when the client calls the method, a `Concrete_Iterator` is created and passed
    to the client to use.


    Starting in version 1.2, Java contained the Java Collections Framework (JCF) that
    included a number of new classes and interfaces to allow you to create collections
    of objects, including an Iterator interface. All of these new types contained
    iterators. Java even included (just for collections of type List) an expanded
    `Iterator` called a `ListIterator` which allows going backwards through the list.


    Below is an example of typical Iterator code in Java, using both the `Iterator`
    and the `ListIterator` implementations:


    ```

    /**

    * Iterate through elements Java ArrayList using an Iterator

    * We then use ListIterator to go backwards through the same

    * ArrayList

    */

    import java.util.ArrayList;

    import java.util.Iterator;

    import java.util.ListIterator;

    public class ArrayListIterator {

    public static void main(String[] args) {

    //create an ArrayList object

    ArrayList arrayList = new ArrayList();

    //Add elements to Arraylist

    arrayList.add(1);

    arrayList.add(3);

    arrayList.add(5);

    arrayList.add(7);

    arrayList.add(11);

    arrayList.add(13);

    arrayList.add(17);

    //get an Iterator object for ArrayList

    Iterator iter = arrayList.iterator();

    System.out.println("Iterating through ArrayList elements");

    while(iter.hasNext()) {

    System.out.println(iter.next());

    }

    // Now create a ListIterator for the ArrayList

    ListIterator list_iter = arrayList.listIterator(arrayList.size());

    System.out.println("Iterating through ArrayList backwards");

    while(list_iter.hasPrevious()) {

    System.out.println(list_iter.previous());

    }

    }

    }

