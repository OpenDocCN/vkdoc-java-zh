  trans: '

    #### 清晰即安全


    无论公司简介中列出了哪些价值观，我们最终创造的文化，是我们在日常运营中不断倡导的文化。我们共享的文化将反映出那些被所有人，尤其是负责人，持续关注、重视和效仿的行为。


    正如阿德娜·弗里德曼所说：“*想法的好坏，取决于你传达它们的能力。*”要让“软意识”真正渗透到组织文化中，它必须被组织各层级的人员所践行。会议是领导者展示和促进预期建设性行为与反应的绝佳机会：鼓励并示范开放理性的对话，展现并奖励好奇心，提供支持，多提问而非妄下结论。表达需求或不同意见应得到奖励，以此表明直言不讳并非徒劳，而是非常值得付出努力、勇气和坦诚。例如，如果团队成员表达了需求或偏好，应做出合理努力来满足该需求。


    一致性和清晰性是安全的。需求和约束可能会改变，但为之做好准备的方式可以保持一致。工作和团队协作的背景可能会改变，但期望可以保持明确和一致。给予清晰的反馈短期内可能让人感觉不安全，但最终对工作场所的可持续性至关重要。根据布琳·布朗的说法，“*在领导者们指出的阻碍勇气的十种行为和文化问题中，有一个问题被领导者列为最大的担忧：回避艰难的对话，包括给予诚实、富有成效的反馈。*”^(⁵⁹)
    回避行为会削弱信任和参与度，增加问题行为，降低共同目标感，并对生产力产生负面影响。布朗将此总结为：“*清晰是友善。不清晰是不友善。*”


    让我们考虑一些通过清晰表达来体现友善的其他例子：


    *   在团队中明确所有假设和计划（经常比较理解，使用可视化工具，讨论步骤）；确保每个人都理解愿景以及他们在实现该愿景中的个人角色。


    *   明确区分最低要求目标与锦上添花的延伸目标。基于猜测工作既危险又代价高昂，还会在团队中滋生焦虑。


    *   清晰说明限制条件，例如紧急需求或人手不足。透明度有助于验证顾虑，并营造开放沟通、信任和共同解决问题的文化。


    *   不要让别人猜测自己是否做得足够，因为这只会导致焦虑。回避告诉开发者如何改进或改变什么，从长远来看是不可持续的。明确具体地说明期望，这样每个人都能通过思考要求是什么、做了什么以及为什么这样做，来进行有意义的回顾、学习和调整。


    *   不同的人对对话的理解和消化方式不同。为确保共识，明确总结每个人的要点和后续步骤。


    *   对自己和团队保持开放、诚实、勇敢和坦诚。在每日站会中加入“氛围检查”，有助于提高对团队成员日常状况的共同了解。


    *   所有批评都应指向支持和成长，而非羞辱或贬低。与其指出不良或低效的做法，不如引导彼此寻找更好的替代方案，并且始终附上关于为什么某种做法优于另一种以及如何实施的解释。


    #### 多元即安全


    虽然相似性最容易带来融洽，但异质性团队展现出更强的批判性思维和创新能力。^(⁶⁰) 建立并维护一种欢迎差异的文化，需要每个人都致力于一系列个人和人际实践。“*但要‘包容地’构建任何事物，我们必须首先清晰地理解我们在哪里排除了他人。*”^(⁶¹)


    正如你在上一章所见，Scrum 明确定义了一套价值观，供开发者践行承诺、专注、开放、尊重和勇气。如有疑问，以同理心为先。同理心使我们能够更好地理解客户需求、开发者需求以及我们新兴协作中的挑战。同理心在于将他人视为独立的个体来重视，而不仅仅是共同工作的资源。这包括关注他们的需求和困难、沟通和工作风格以及个人情况。同理心需要坦诚、真实，并愿意承认自己可能犯错。要考虑到你可能看不到某人工作的全部复杂性和范围，每个人都有不同的文化和技术背景，我们的大脑处理信息的方式也大相径庭，而所有这些多样性正是我们共同的力量。


    让团队中的每个人都感到安全、受尊重和被重视，需要致力于*多元、公平和包容*。包容性策略师维尔纳·迈尔斯有句名言：“*多元是被邀请参加派对；包容是被邀请跳舞。*”^(⁶²)
    那么，公平至少要求确保受邀者能够到达派对现场，场地设施适合受邀者，并且所有受邀者在规划活动、音乐和茶点方面都有发言权。是的，这要复杂得多，但如果没有这些步骤，我们就无法声称每个人在派对上都是真正受欢迎的。这需要关注个人需求和偏好、历史和文化背景以及个人目标，而不仅仅是软件开发任务。


    一个常被忽视的多元维度是团队成员的*工作类型*。保罗·格雷厄姆的《创造者日程 vs. 管理者日程》^(⁶³) 讨论了创造性工作与管理工作的根本区别。默认情况下，管理者的日程被分解成小的时间段（例如，按小时计），用于安排大量会议。创造者（例如，开发者）无法在短时间段内进行创造，他们需要更长的时间段，例如半天，因为创造性任务需要一些预热时间和较长的整块时间来进行深度专注和发明创造。会议会打乱可用的整块时间，如果安排不当，可能会毁掉创造者的一整天：“*一个会议就能毁掉整个下午，因为它把下午分成两段，每段都短到无法处理任何困难的事情。而且，你还得记得去开会。这对管理者日程上的人来说不是问题。下一个小时总有事情要发生；唯一的问题是什么事。但当创造者日程上的人要开会时，他们必须为此费心。对于创造者日程上的人来说，开会就像抛出一个异常。*”^(⁶⁴,)
    ^(⁶⁵) 为了将对开发者及团队中其他创造者的生产力损害降到最低，你可以将需要创造者参加的会议安排在工作日的开始或结束时段。

    '
- fmt: '# 排版后的内容


    Another important dimension of diversity is neurodivergence, which is common on
    software development teams and accompanied by many unique strengths and challenges.^([^(66)](#fn66))
    Research shows that many neurodivergent individuals are diagnosed later in life
    and do not disclose their diagnosis nor ask for accommodations, even while having
    specific ideas for meaningful accommodations, such as alternative performance
    evaluations and quieter working environments.^([^(67)](#fn67)) One inclusive approach
    may be to offer alternatives to be freely chosen by the individuals on the team
    based on their needs: alternative work spaces, alternative means of communication,
    alternative schedule, etc.


    Keep in mind that some approaches and behaviors do not have to be objectively
    wrong in order to be contextually detrimental. All social interactions are contextually
    dense, with much of the context remaining implicit and invisible to all sides.
    Consider, for instance, the theoretically thoughtful idea of getting everyone
    breakfast for the 9 a.m. meeting. Were everyone’s dietary restrictions accounted
    for or did some teammates end up feeling less valued than before the gesture?
    As another example, consider that people have different thresholds for feeling
    safe enough to speak up during a discussion. Simply asking whether anyone has
    questions or comments may not sufficiently open up the floor to invite everyone’s
    opinions. Note also that the more dissenting the opinion, the more daunting it
    can be to voice it in a group setting. Consider also how not making eye contact
    is considered rude in some cultures and polite in others, and how rigidly adhering
    to one’s social norms and customs can come across as exclusionary. Finally, consider
    how off-handedly saying “just” (e.g., “why don’t you just...”) in giving advice
    actually presumes extensive background similarities (such as specific technological
    skills), ultimately demoralizing and alienating instead of providing the intended
    support.^([^(68)](#fn68)) Humility, curiosity, and empathy are fundamental to
    working together in a sustainable, healthy, and productive way. Missteps will
    happen on all sides, but a shared commitment to growth will create a safer environment
    where everyone can try, observe, discuss, learn, and do better next time, while
    allowing others to learn and do better also.


    ## Safety in Conflict


    The biggest threat to safety is conflict, but conflict cannot and should not be
    avoided. Conflicts are a way to assess different ideas, approaches, and interpersonal
    needs. When handled constructively, conflicts are an invaluable opportunity to
    make the product and the team stronger.


    Conflicts happen in any team, but can be especially prevalent in engaged self-organizing
    teams with open communication, developer agency, joint code ownership, and room
    for experimentation. Differences of opinion are a sign of a diverse and creative
    team. When faced with disagreement, conflicting opinions should not be disregarded.
    The opinion of any one person represents some percentage of the opinions of users
    who might consider using your product, of clients who may want to contract your
    development services, and of competitors who might decide to develop an alternative
    solution. Disregarding conflicting opinions will create tension, jeopardize the
    shared vision, and disrupt the work. Accounting for different views early is an
    opportunity to improve overall quality and robustness of both the team and the
    product, and thus should be welcomed and handled with care. The team is your earliest
    focus group; do not leave their crucial insights on the table.


    All conflict has the potential for positive or negative outcomes. *Constructive
    controversy* “*exists when one person’s ideas, information, conclusions, theories,
    and opinions are incompatible with those of another, and the two seek to reach
    an agreement.*”^([^(69)](#fn69)) Note how this differs from *consensus seeking*,
    which “*occurs when members of a group emphasize agreement, inhibit discussion
    to avoid any disagreement or arguments, and avoid realistic appraisal of alternative
    ideas and courses of action*.”^([^(70)](#fn70)) Our goal is not to merely reach
    agreement but rather to jointly construct new understanding based on active cooperative
    learning. The following are some conditions that have been identified as necessary
    for constructive controversy:^([^(71)](#fn71))


    1.  Cooperative goal structure, as competition hinders effective communication

    2.  Skilled disagreement to effectively navigate differences of opinion

    3.  Rational argument to generate, present, and update opinions in the face of
    evidence and logic

    4.  Active discussion by all participants, in place of avoidance, dominance, or
    submission


    According to the Thomas-Kilmann Conflict Mode Instrument (TKI), people favor a
    particular conflict resolution style depending on their level of cooperativeness
    and assertiveness, alternatively defined as concern for others vs. concern for
    oneself.^([^(72)](#fn72)) Recognizing the conflict management style is important
    for teamwork management:


    *   *Avoiding* style: delays or failures to reach resolution can breed further
    discontent, resentment, and frustration; only works temporarily while gathering
    information, waiting for an opening in the schedule, or after some other ongoing
    situation is addressed.

    *   *Competing* style: detrimental to teamwork, as it values some contributors’
    needs over others; resolution is likely to breed resentment, disparity, and beget
    future conflict and hurt the work environment.

    *   *Accommodating* style: does the opposite of the competing style, but often
    with a similar overall effect, as it can lead to burnout due to not having one’s
    needs met.

    *   *Compromising* style (lose-lose): everyone ends up making sacrifices toward
    some middle ground that is acceptable but ultimately not what anyone wanted.

    *   *Collaborating* style: the true ideal win-win; it’s the most time consuming
    as it requires meaningful discussions to truly find ways to accommodate everyone’s
    needs.'
  raw: 'Another important dimension of diversity is neurodivergence, which is common
    on software development teams and accompanied by many unique strengths and challenges.^([^(66)](#fn66))
    Research shows that many neurodivergent individuals are diagnosed later in life
    and do not disclose their diagnosis nor ask for accommodations, even while having
    specific ideas for meaningful accommodations, such as alternative performance
    evaluations and quieter working environments.^([^(67)](#fn67)) One inclusive approach
    may be to offer alternatives to be freely chosen by the individuals on the team
    based on their needs: alternative work spaces, alternative means of communication,
    alternative schedule, etc.


    Keep in mind that some approaches and behaviors do not have to be objectively
    wrong in order to be contextually detrimental. All social interactions are contextually
    dense, with much of the context remaining implicit and invisible to all sides.
    Consider, for instance, the theoretically thoughtful idea of getting everyone
    breakfast for the 9 a.m. meeting. Were everyone’s dietary restrictions accounted
    for or did some teammates end up feeling less valued than before the gesture?
    As another example, consider that people have different thresholds for feeling
    safe enough to speak up during a discussion. Simply asking whether anyone has
    questions or comments may not sufficiently open up the floor to invite everyone’s
    opinions. Note also that the more dissenting the opinion, the more daunting it
    can be to voice it in a group setting. Consider also how not making eye contact
    is considered rude in some cultures and polite in others, and how rigidly adhering
    to one’s social norms and customs can come across as exclusionary. Finally, consider
    how off-handedly saying “just” (e.g., “why don’t you just...”) in giving advice
    actually presumes extensive background similarities (such as specific technological
    skills), ultimately demoralizing and alienating instead of providing the intended
    support.^([^(68)](#fn68)) Humility, curiosity, and empathy are fundamental to
    working together in a sustainable, healthy, and productive way. Missteps will
    happen on all sides, but a shared commitment to growth will create a safer environment
    where everyone can try, observe, discuss, learn, and do better next time, while
    allowing others to learn and do better also.


    #### Safety in Conflict


    The biggest threat to safety is conflict, but conflict cannot and should not be
    avoided. Conflicts are a way to assess different ideas, approaches, and interpersonal
    needs. When handled constructively, conflicts are an invaluable opportunity to
    make the product and the team stronger.


    Conflicts happen in any team, but can be especially prevalent in engaged self-organizing
    teams with open communication, developer agency, joint code ownership, and room
    for experimentation. Differences of opinion are a sign of a diverse and creative
    team. When faced with disagreement, conflicting opinions should not be disregarded.
    The opinion of any one person represents some percentage of the opinions of users
    who might consider using your product, of clients who may want to contract your
    development services, and of competitors who might decide to develop an alternative
    solution. Disregarding conflicting opinions will create tension, jeopardize the
    shared vision, and disrupt the work. Accounting for different views early is an
    opportunity to improve overall quality and robustness of both the team and the
    product, and thus should be welcomed and handled with care. The team is your earliest
    focus group; do not leave their crucial insights on the table.


    All conflict has the potential for positive or negative outcomes. *Constructive
    controversy* “*exists when one person’s ideas, information, conclusions, theories,
    and opinions are incompatible with those of another, and the two seek to reach
    an agreement.*”^([^(69)](#fn69)) Note how this differs from *consensus seeking*,
    which “*occurs when members of a group emphasize agreement, inhibit discussion
    to avoid any disagreement or arguments, and avoid realistic appraisal of alternative
    ideas and courses of action*.”^([^(70)](#fn70)) Our goal is not to merely reach
    agreement but rather to jointly construct new understanding based on active cooperative
    learning. The following are some conditions that have been identified as necessary
    for constructive controversy:^([^(71)](#fn71))


    1.  Cooperative goal structure, as competition hinders effective communication


    2.  Skilled disagreement to effectively navigate differences of opinion


    3.  Rational argument to generate, present, and update opinions in the face of
    evidence and logic


    4.  Active discussion by all participants, in place of avoidance, dominance, or
    submission


    According to the Thomas-Kilmann Conflict Mode Instrument (TKI), people favor a
    particular conflict resolution style depending on their level of cooperativeness
    and assertiveness, alternatively defined as concern for others vs. concern for
    oneself.^([^(72)](#fn72)) Recognizing the conflict management style is important
    for teamwork management:


    *   *Avoiding* style: delays or failures to reach resolution can breed further
    discontent, resentment, and frustration; only works temporarily while gathering
    information, waiting for an opening in the schedule, or after some other ongoing
    situation is addressed.


    *   *Competing* style: detrimental to teamwork, as it values some contributors’
    needs over others; resolution is likely to breed resentment, disparity, and beget
    future conflict and hurt the work environment.


    *   *Accommodating* style: does the opposite of the competing style, but often
    with a similar overall effect, as it can lead to burnout due to not having one’s
    needs met.


    *   *Compromising* style (lose-lose): everyone ends up making sacrifices toward
    some middle ground that is acceptable but ultimately not what anyone wanted.


    *   *Collaborating* style: the true ideal win-win; it’s the most time consuming
    as it requires meaningful discussions to truly find ways to accommodate everyone’s
    needs.'
  trans: '

    多样性的另一个重要维度是神经多样性，这在软件开发团队中很常见，并伴随着许多独特的优势和挑战。^(⁶⁶) 研究表明，许多神经多样性个体在生命后期才被诊断出来，并且即使他们对有意义的调整有具体想法（例如替代性绩效评估和更安静的工作环境），也不会透露自己的诊断结果或寻求便利措施。^(⁶⁷)
    一种包容性的方法可能是提供多种选择，让团队成员根据自身需求自由选择：替代性工作空间、替代性沟通方式、替代性时间表等。


    请记住，某些方法或行为即使客观上没有错误，也可能在特定情境下造成不利影响。所有社交互动都依赖于丰富的语境，而其中大部分语境对各方而言都是隐含且不可见的。例如，考虑一下为上午
    9 点的会议给每个人买早餐这个看似周到的想法。是否考虑到了每个人的饮食限制？还是说有些团队成员反而因此感到比之前更不受重视？再举一个例子，人们在讨论中感到足够安全而敢于发言的阈值各不相同。仅仅询问是否有人有问题或评论，可能不足以真正打开局面，邀请每个人的意见。还要注意，意见越是反对，在群体中表达出来就越令人望而生畏。同样需要考虑的是，在某些文化中，不进行眼神接触被视为粗鲁，而在另一些文化中则被视为礼貌；以及，僵化地固守自己的社会规范和习俗会显得排外。最后，考虑一下在提建议时随口说“只要”（例如，“你为什么不直接……”）实际上预设了双方有广泛的背景相似性（例如特定的技术技能），最终非但没有提供预期的支持，反而会打击士气、造成疏远。^(⁶⁸)
    谦逊、好奇心和同理心是以可持续、健康且富有成效的方式共同工作的基础。各方都可能犯错，但对成长的共同承诺将创造一个更安全的环境，让每个人都能尝试、观察、讨论、学习，并在下次做得更好，同时也允许他人学习和进步。


    #### 冲突中的安全


    安全的最大威胁是冲突，但冲突不能也不应被避免。冲突是评估不同想法、方法和人际需求的一种方式。当以建设性的方式处理时，冲突是让产品和团队变得更强大的宝贵机会。


    冲突在任何团队中都会发生，但在那些沟通开放、开发者有自主权、代码共同拥有、并留有实验空间的、高度投入的自我组织型团队中尤其常见。意见分歧是团队多样性和创造力的标志。面对分歧时，不应忽视相互冲突的意见。任何一个人的意见，都代表了可能考虑使用你产品的用户、可能想与你签订开发合同的客户，以及可能决定开发替代方案的竞争对手中一定比例的观点。忽视冲突意见会造成紧张，危及共同愿景，并扰乱工作。尽早考虑不同观点是提升团队和产品整体质量与稳健性的机会，因此应被欢迎并谨慎处理。团队是你最早期的焦点小组；不要将他们至关重要的见解弃之不顾。


    所有冲突都有可能产生积极或消极的结果。*建设性争议* “*存在于当一个人的想法、信息、结论、理论和观点与另一个人不相容，并且双方都试图达成一致时。*”^(⁶⁹)
    请注意这与*寻求共识*的区别，后者“*发生在群体成员强调一致、抑制讨论以避免任何分歧或争论、并避免对替代想法和行动方案进行现实评估时。*”^(⁷⁰) 我们的目标不仅仅是达成一致，而是基于积极的合作学习，共同构建新的理解。以下是已被确定为建设性争议所必需的一些条件：^(⁷¹)


    1.  合作性目标结构，因为竞争会阻碍有效沟通

    2.  熟练地处理分歧，以有效驾驭意见差异

    3.  理性论证，以在面对证据和逻辑时生成、提出并更新观点

    4.  所有参与者的积极讨论，而非回避、支配或顺从


    根据托马斯-基尔曼冲突模式量（TKI），人们会根据其合作性和果断性的程度（或定义为关心他人与关心自己）偏好特定的冲突解决风格。^(⁷²) 识别冲突管理风格对于团队管理至关重要：


    *   *回避*风格：延迟或未能达成解决方案会滋生更多的不满、怨恨和沮丧；仅在收集信息、等待日程安排上的空档或处理完其他正在进行的情况时暂时有效。

    *   *竞争*风格：对团队合作有害，因为它将某些贡献者的需求置于他人之上；解决方案很可能滋生怨恨、造成不平等，并引发未来的冲突，损害工作环境。

    *   *迁就*风格：与竞争风格相反，但总体效果往往相似，因为它可能导致因自身需求未被满足而产生的倦怠。

    *   *妥协*风格（双输）：每个人都最终为某个可接受但最终并非任何人真正想要的折中方案做出牺牲。

    *   *协作*风格：真正理想的双赢；它最耗时，因为需要进行有意义的讨论，才能真正找到满足每个人需求的方法。

