  trans: '

    *   ***简单设计***：每天尽可能保持设计简洁。经常重新设计以维持简洁。根据贝克的理念，一个简单的设计应当：(1) 通过所有单元测试，(2) 没有重复代码，(3)
    在代码中清晰表达每个用户故事的含义，(4) 使用最少数量的类和方法的合理组合来实现当前用户故事。^(²⁵)


    *   ***测试***：程序员持续编写单元测试。所有测试必须在集成前通过。贝克坚持一条硬性规定：“任何没有自动化测试的程序功能，本质上都不存在。”²¹ 虽然这条原则适用于大多数验收测试，并且理应适用于所有单元测试，但在某些情况下，例如测试图形用户界面（GUI）时，这种类比会失效。不过，如果你的测试框架能够处理
    GUI 交互所产生的事件，那么即使是这种情况也可以实现自动化测试。除此之外，拥有一套完善的书面操作说明通常也能满足需求。


    *   ***结对编程***：在极限编程（XP）项目中，所有生产代码必须由两名程序员在同一台机器上编写。任何单独编写的代码都将被丢弃。这种做法通过将整个系统的知识传播给整个团队，从而强化了集体所有权。它避免了“啤酒车问题”——即当掌握所有关键信息的成员遭遇意外（比如被啤酒车撞到）时，会导致项目进度倒退数月。


    *   ***集体所有权***：团队拥有整个项目及其所有代码，共同承担设计、编写、修改和测试所有功能的责任。这支持了“无我编程”，促进了高效的团队协作。


    *   ***持续集成***：每完成一个任务就进行集成和构建，可能一天进行多次（只要所有测试都能通过）。这有助于通过将问题范围缩小到最新代码及其与现有代码库的交互，从而快速检测和隔离缺陷与错误。


    *   ***重构***：在不改变代码外部行为的前提下，对代码的非功能性方面进行小幅改进，以使代码更清晰、更少冗余、更易读、更高效且更易于维护。*简单设计*原则要求你在发现需要时承担起进行重构的责任，而*集体所有权*则允许你重构他人编写的代码。


    *   ***每周 40 小时工作制***：保持规律的每周 40 小时工作。绝不要连续两周加班。极限编程的理念与汤姆·德马科在《人件》中的许多论点高度一致。加班会导致人们工作效率降低，不得不在工作日处理私人事务，因疲劳而犯更多错误，对队友感到压力和烦躁等。拥有放松和恢复精力的时间，能让开发者在工作日内专注于工作，从而提高团队的整体生产力。


    *   ***现场客户***：客户是团队的一部分，在现场工作，编写并执行功能测试，并帮助澄清需求。客户能够对系统变更提供即时反馈，这也增强了团队每天构建正确系统的信心。


    *   ***编码规范***：由于代码集体所有权和持续重构，团队必须遵循合理的编码规范，以改善代码库内外的沟通。这些规范应使代码更易于阅读和维护，但不应限制创造力。


    #### 敏捷框架 - Crystal：根据团队/项目需求灵活定制


    Crystal 是一种敏捷方法，最初由 Alistair Cockburn 在 20 世纪 90 年代初于 IBM 工作期间提出。^(²⁶) 他注意到项目之间的差异很大，没有一套固定的项目步骤能适用于所有项目。因此，Crystal
    围绕“人”而非流程或工具来组织。这意味着它关注人际互动，以及个人技能、才能和需求——这些因素在不同团队之间，以及同一团队内部随时间推移都会发生变化。


    由于我们不专注于特定的流程，Crystal 没有正式的结构。相反，Crystal 开发信奉以下理念：


    *   ***所有项目都是独特的***。需要为每个项目确定工具和流程，并在发生变化时进行调整。

    *   ***团队可以自我优化***。工具和流程需要既适合项目，也适合团队，因此团队本身应共同确定最适合他们的工作流程，并在开发过程中根据需要进行调整。


    为了支持这些特性，Crystal 开发围绕以下 7 项原则组织：


    *   ***频繁交付***：频繁（该词是相对概念，取决于项目整体范围）进行测试和发布新版本。

    *   ***反思性改进***：团队定期反思并改进实践和工具。

    *   ***渗透式沟通***：对于小团队是渗透式沟通，对于大团队则是封闭式沟通。

    *   ***个人安全感***：创造一个让成员能够安全表达意见、建议和需求的环境。

    *   ***专注***：团队成员需要对整体蓝图和各自的任务有共同的理解。

    *   ***便捷接触专家用户***：能够按需接触专家，以解决疑问、顾虑或理解上的空白。

    *   ***具备自动化测试、配置管理和频繁集成的技术环境***：当围绕人进行组织时，开发灵活性很大，因此频繁集成每个人的工作、通过自动化测试确保各部分独立及协同工作顺畅、并使用版本控制进行备份和部分发布，这些都至关重要。


    你可以看到，Crystal 非常灵活，因此可以根据每个团队和项目的需求进行调整。对于较短的项目，Crystal 简化的组织框架和必需的流程可能是有益的，因为它允许团队专注于如何完成所需工作。这里的主要注意事项是，如果团队较新、规模较大或为远程团队，自我组织可能会变得棘手。

    '
- fmt: '### Agile Framework - Scrum: Iterative Sprints Toward the Next Short-Term
    Goal


    `Scrum` derives its name from rugby, where a *scrum* is a means of restarting
    play after a rule infraction: the 8 forwards on a rugby team (out of 15 players
    in the rugby union form of the game) attempt to (re)gain control of the ball and
    move it forward towards the opposing goal line. The idea in the agile `Scrum`
    methodology is that a small team is unified around a single goal and gets together
    for sprints of development that move them towards that goal.


    The original process management idea for `Scrum` comes from Takeuchi and Nonaka’s
    1986 paper, “The New New Product Development Game”^([^(27)](#fn27)), while the
    first use of the term “`Scrum`” is attributed to DeGrace and Stahl’s 1990 book
    *Wicked Problems, Righteous Solutions*.^([^(28)](#fn28))


    Like other *agile* methodologies, `Scrum` emphasizes the efficacy of small teams,
    direct communication, iterative development, learning from frequent feedback,
    and collective ownership. What distinguishes `Scrum` is its focus on team management
    and its structure of explicit time-boxed periods of development called *sprints*.
    Each *sprint* has a predetermined duration (commonly 1-4 weeks), with a fixed
    delivery date that does not move out. The scope of work to be delivered needs
    to be chosen so as to accommodate this delivery date, while still delivering the
    next Minimum Viable Product (`MVP`) to the client each sprint. The goal of each
    *sprint* is to provide a prototype that showcases your most current understanding
    of the client needs and your plan for delivering a solution. Showing this prototype
    (no matter how rudimentary) allows you to begin a conversation about what was
    understood correctly and what needs adjustment. Ensuring this happens early limits
    the work that needs to be redone to make the necessary adjustments before developing
    further. Thus, *sprints* are “about creating conditions that enable better decision
    making, sooner.”^([^(29)](#fn29))


    #### Scrum Roles


    `Scrum` explicitly defines three roles in a development project:


    *The* *product owner* is the person who generates and prioritizes the requirements
    for the product. These requirements commonly take the form of *user stories*,
    which are features that can be summarized into sentences like “As a <type of user>,
    we want to <do something>, so that <some value is created>.” The product owner
    adds the user stories to the product backlog and prioritizes them. The product
    owner is also charged with making sure that the team understands the requirements
    behind the user stories.


    *The* *Scrum master* is an expert in `Scrum` who facilitates development by coaching
    the team through `Scrum` values and practices (such as the daily `Scrum` meetings),
    helping the team self-organize (e.g., by increasing transparency), helping resolve
    internal and external blockers, and protecting the team from outside influences
    during the sprint. The scrum master is emphatically not team lead/manager because,
    as `Scrum` teams are teams of equals and arrive at decisions by consensus.


    *The* *development team* is everyone else: designers, developers, writers, and
    so on. The team reviews the user stories generated and prioritized by the product
    owner, turning each highest priority story into one or more tasks that suggest
    how the necessary feature will be developed in order to deliver value. Selecting
    a subset of stories and tasks that can be accomplished within the given sprint
    duration, the team self-organizers by jointly deciding who will work tasks and
    what development processes they will employ. Regardless of task allocation, the
    team collectively owns all code and the project, sharing the goal of delivering
    the next functional `MVP` at the end of every sprint.


    #### Scrum Artifacts


    `Scrum` requirements are encapsulated in two backlogs:


    *   The *Product Backlog* is the prioritized list of all the requirements for
    the project. The product owner creates and prioritizes the product backlog composed
    of user stories, based on a desired *Product Goal.* The development team breaks
    the high-priority user stories into tasks and estimates them. This list of tasks
    becomes the *Sprint Backlog*.


    *   The *Sprint Backlog* is the prioritized list of user stories for the current
    sprint. Once the sprint starts, only the development team may add tasks to the
    sprint backlog; these are usually bugs found during testing. No outside entity
    may add items to the sprint backlog, only to the product backlog. The focus of
    the sprint backlog is the *Sprint Goal:* a guiding star for the team to follow;
    any changes during the sprint should protect this goal.


    *   The *Increment* is a contribution to the Product Goal that means the *definition
    of Done*, which is a formal quality measure decided upon by the organization (or
    by the team, if not otherwise defined). Multiple backlog items may reach Done
    state during a single Sprint.


    #### Scrum Board


    In most `Scrum` teams, the sprint backlog is *visual*, providing everyone with
    a clear shared view of the progress status of the sprint work. It is represented
    on a board using either Post-It notes or index cards, with one note or card per
    task; it may also be an online virtual board (e.g., `Trello`, `Jira`, `Notion`,
    or `Pivotal Tracker`). This *task board*, shown in Figure [2-4](#270563_3_En_2_Chapter.xhtml#Fig4),
    always has at least three columns: *ToDo*, *Doing*, and *Done,* though more commonly
    it also includes a *Product Backlog*, a *Sprint Backlog*, and a column for testing
    such as *Quality Assurance/Review*. At the start of a sprint, the Development
    team selects some of the top priority items from the *Product Backlog* and moves
    them to the *Sprint Backlog*. These items are then broken down into tasks, which
    become the *ToDo* items for the sprint. These tasks will move across the board
    until reaching the *Done* column once fully developed, tested, and integrated
    into the code base.


    ![](images/270563_3_En_2_Chapter/270563_3_En_2_Fig4_HTML.jpg)


    A table titled Sprint Goal comprises the columns of product backlog, sprint backlog,
    to-do, doing, quality assurance, and done. Movement of User stories A and B from
    the product backlog to the sprint backlog are denoted in the beginning. Tasks
    1 to 5 move during the sprint.


    Figure 2-4


    A generic single-sprint Scrum board. Dark arrows indicate the movement of items
    during sprint planning; light arrows indicate the movement of items during the
    sprint


    #### Scrum Values


    In order to facilitate the teamwork necessary for an agile self-organizing team,
    `SCRUM` relies on individuals practicing the following:^([^(30)](#fn30))


    *   Commitment to the shared goals and each other


    *   Focus on the Sprint Goal and Sprint Backlog


    *   Openness about the work and challenges (including interpersonal)


    *   Respect for each other as individuals and as capable contributors to the shared
    goals


    *   Courage to tackle difficult tasks, to bring up difficult conversations, and
    to generally “do the right thing”'
