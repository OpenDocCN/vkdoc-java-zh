    \nAbout the Authors About the Technical Reviewer Footnotes [1](#270563_3_En_BookFrontmatter_OnlinePDF.xhtml#Fn1_source)\n\
    \n# 1. Introduction to Software Development\n\n> *“Not only are there no silver\
    \ bullets now in view, the very nature of software makes it unlikely that there\
    \ will be any—no inventions that will do for software productivity, reliability,\
    \ and simplicity what electronics, transistors, and large-scale integration did\
    \ for computer hardware. We cannot expect ever to see twofold gains every two\
    \ years.”*\n> \n> —Frederick J. Brooks, Jr.^([²](#fn2))\n\nSo, you might be asking\
    \ yourself, why is this book called *Software Development, Design, and Coding*?\
    \ Why isn’t it called *All About Programmin*g or *Software Engineering*? After\
    \ all, isn’t that what software development is? Well, no. Programming is a part\
    \ of software development, but it’s certainly not all of it. Likewise, software\
    \ development is a part of software engineering, but it’s not all of it.\n\nHere’s\
    \ the definition of software development that we’ll use in this book: software\
    \ development is the process of taking a set of requirements from a user (a problem\
    \ statement), analyzing them, designing a solution to the problem, and then implementing\
    \ that solution on a computer.\n\nBut isn’t that programming? Well, no. Programming\
    \ is really just the implementation part, or possibly the design and implementation\
    \ part, of software development. Programming is central to software development,\
    \ but it’s not the whole thing.\n\nWell, then, isn’t it software engineering?\
    \ Again, no. Software engineering also involves a process and includes software\
    \ development, but it also includes the entire management side of creating a computer\
    \ program that people will use. Software engineering includes project management,\
    \ configuration management, scheduling and estimation, baseline building and scheduling,\
    \ managing people, and several other things. Software development is the fun part\
    \ of software engineering.\n\nSo software development is a narrowing of the focus\
    \ of software engineering to just that part concerned with the creation of the\
    \ actual software. And it’s a broadening of the focus of programming to include\
    \ analysis, design, and release issues.\n\n## What We’re Doing\n\nIt turns out\
    \ that, after 80 or so years of using computers, we’ve discovered that developing\
    \ software is hard. Learning how to develop software effectively, efficiently,\
    \ and sustainably is also hard. You’re not born knowing how to do it and many\
    \ people, even those who take programming courses and work in the industry for\
    \ years, don’t do it particularly well. It’s a skill you need to pick up and practice—a\
    \ lot. You don’t learn programming and development by reading books—not even this\
    \ one. You learn it by developing software. That, of course, is the attraction:\
    \ to work on interesting and difficult problems. The challenge is to work on something\
    \ you’ve never done before, something you might not even know if you can solve.\
    \ That’s what has you coming back to create new programs again and again.\n\n\
    There are probably several ways to learn software development. But we think that\
    \ all of them involve reading excellent designs, reading a lot of code, writing\
    \ a lot of code, and thinking deeply about how to approach a problem and design\
    \ a solution for it. Reading a lot of code, especially really beautiful and efficient\
    \ code, gives you lots of good examples about how to think about problems and\
    \ approach their solution in a particular style. Writing a lot of code lets you\
    \ experiment with the styles and examples you’ve seen in your reading. Thinking\
    \ deeply about problem solving lets you examine how you work and how you do design,\
    \ and lets you extract from your labors those patterns that work for you; it makes\
    \ your programming more intentional."
  trans: "\n我们相信，在读完本书后，你将更清楚地理解优秀程序的设计是什么样的，什么造就了高效且富有成效的开发者，以及如何开发更大规模的软件。你将更深入地了解设计问题。你会思考如何在团队中协作，按照书面计划交付产品。你将开始理解项目管理，了解一些度量指标，知道如何评审工作产品，并理解配置管理。我们不会涵盖软件开发的所有内容——远非如此——而且我们只会对软件工程的管理方面进行粗略的探讨，但无论你是独立工作还是身处团队之中，你都将更有能力去构想、设计、实现和测试各种规模的软件。\n\
    \n致谢\n\n我们要感谢 Apress 出版社的 Melissa Duffy 和 Shonmirin P. A. 促成了这一新版本的出版。我们的技术审校以及\
    \ Apress 出版社的所有员工都给予了极大的帮助和慷慨的支持。本书因他们的审阅、评论和编辑而变得更加出色。\n\n同时，也要感谢多年来 CS 292 课程的所有学生，他们使用了本材料的多个连续版本，最初是作为课程笔记，后来成为成书；还要感谢我们诺克斯学院计算机科学系的同事\
    \ David Bunde 和 Jaime Spacco，他们一直倾听我们的想法。最后，感谢诺克斯学院给予我们时间和资源来完成本书的所有版本。\n\n关于作者\
    \ 关于技术审校 脚注 1\n\n# 1. 软件开发导论\n\n> *“不仅目前看不到银弹，而且软件的本质决定了未来也不太可能出现——没有任何发明能像电子学、晶体管和大规模集成电路对计算机硬件那样，对软件的生产力、可靠性和简洁性产生同样的影响。我们无法指望每两年就能看到两倍的提升。”*\n\
    > \n> ——小弗雷德里克·J·布鲁克斯^(²)\n\n那么，你可能会问自己，为什么这本书叫《软件开发、设计与编码》？为什么不叫《关于编程的一切》或《软件工程》？毕竟，软件开发不就是这些吗？嗯，并非如此。编程是软件开发的一部分，但肯定不是全部。同样，软件开发是软件工程的一部分，但也不是全部。\n\
    \n以下是本书中我们将使用的软件工程定义：软件开发是一个过程，它从用户那里获取一组需求（问题陈述），对其进行分析，设计问题的解决方案，然后在计算机上实现该解决方案。\n\
    \n但这不就是编程吗？嗯，不是。编程实际上只是软件开发的实现部分，或者可能包括设计和实现部分。编程是软件开发的核心，但它并非全部。\n\n那么，它是不是软件工程呢？同样，也不是。软件工程也涉及一个过程，并包含软件开发，但它还包括创建供人们使用的计算机程序的整个管理方面。软件工程包括项目管理、配置管理、进度安排与估算、基线建立与调度、人员管理以及其他若干事项。软件开发是软件工程中有趣的部分。\n\
    \n因此，软件开发是将软件工程的焦点缩小到仅与创建实际软件相关的部分。同时，它也是将编程的焦点拓宽，以包含分析、设计和发布问题。\n\n## 我们在做什么\n\
    \n事实证明，在使用了计算机大约 80 年之后，我们发现开发软件是困难的。学习如何有效、高效且可持续地开发软件同样困难。你并非生来就知道如何做，而且许多人，即使是那些参加过编程课程并在行业工作多年的人，也做得并不特别好。这是一项你需要大量学习和练习的技能。你无法通过阅读书籍——即使是这本——来学会编程和开发。你需要通过开发软件来学习它。当然，这正是其吸引力所在：致力于解决有趣且困难的问题。挑战在于处理你从未做过的事情，甚至是你不知道能否解决的问题。这正是让你一次又一次地回来创建新程序的原因。\n\
    \n学习软件开发可能有几种方法。但我们认为，所有这些方法都涉及阅读优秀的设计、阅读大量代码、编写大量代码，以及深入思考如何解决问题并为其设计解决方案。阅读大量代码，尤其是那些非常优美且高效的代码，能为你提供许多关于如何思考问题以及以特定风格解决它们的好例子。编写大量代码则让你能够尝试在阅读中看到的风格和例子。深入思考问题解决过程，让你能够审视自己如何工作、如何进行设计，并让你从自己的劳动中提炼出那些对你有用的模式；这会让你的编程更具目的性。\n"
- fmt: '# So, How to Develop Software?


    Well, the first thing you should do is read this book. It certainly won’t tell
    you everything, but it will give you a good introduction into what software development
    is all about and what you need to do to write great code. It has its own perspective,
    but it’s a perspective based on our combined 40 years or so of writing code professionally
    and another 24 years trying to figure out how to teach others to do it.


    Despite the fact that software development is only part of software engineering,
    software development is the heart of every software project. After all, *at the
    end of the day what you deliver to the user is working code*. A team of developers
    working in concert usually creates that code. So to start, maybe we should look
    at a software project from the outside and ask, what does that team need to do
    to make that project a success?


    In order to succeed at software development, you need the following:


    - *To realize that you don’t know everything you need to know at the beginning
    of the project*. Software development projects just don’t work this way. You’ll
    always uncover new requirements; other requirements will be discovered to be not
    nearly as important as the customer thought; still others that were targeted for
    the next release are all of a sudden requirement number one. This is known as
    *churn*. Managing requirements churn during a project is one of the single most
    important skills a software developer can have. If you are using new development
    tools (say a new web development framework), you’ll uncover limitations you weren’t
    aware of and side effects that cause you to have to learn, for example, three
    other tools to understand them (e.g., that web development tool you want to use
    is Ruby-based, requires a specific relational database system to run, and needs
    a particular configuration of Apache to work correctly.)


    - *A small, well integrated team*. Small teams have fewer lines of communication
    than larger ones. It’s easier to get to know your teammates’ strengths and weaknesses,
    understand their personalities and preferences, and establish who is the go-to
    person for particular problems or tools. Well-integrated teams have usually worked
    on several projects together. Keeping a team together across several projects
    is a major job of the team’s manager and of the individual teammates themselves.
    Well-integrated teams are more productive, better at holding to a schedule, and
    more likely to produce code with fewer defects at release. The key to keeping
    a team together is to give them interesting work, give them the freedom to decide
    how to do the work, and facilitate the process by removing barriers and helping
    with conflict resolution.


    - *Good communication among team members*. Continuous direct communication among
    team members is critical to day-to-day progress and successful project completion.
    Teams that are co-located are generally better at communicating and communicate
    more than teams that are distributed geographically (even if they’re just on different
    floors or wings of a building) or that are working virtually.^([³](#fn3)) This
    is a major issue with larger companies that have software development sites scattered
    across the globe.


    - *Good communication between the team and the customer.* Communication with the
    customer is essential to controlling requirements and requirements churn during
    a project. On-site or close-by customers allow for constant interaction with the
    development team. Customers can give immediate feedback on new releases and can
    be involved in creating system and acceptance tests for the product. Agile development
    methodologies strongly encourage customers to be part of the development team
    and, even better, to be on site daily. See Chapter [2](#270563_3_En_2_Chapter.xhtml)
    for a quick introduction to some agile methodologies.


    - *A process that everyone buys into*. Every project, no matter how big or small,
    follows a process. Larger projects require more coordination and tighter controls
    on communication and configuration management. As a result, larger teams tend
    to be more plan-driven and follow processes with more rules and documentation
    required. Smaller projects and smaller teams will, these days, tend to follow
    more agile development processes, with more flexibility and less documentation
    required. This certainly doesn’t mean there is *no* process in an agile project;
    it just means you do what makes sense for the current stage of your project, so
    that you can correctly uncover and satisfy all the requirements, meet the schedule,
    and produce a quality product. See Chapter [2](#270563_3_En_2_Chapter.xhtml) for
    more details on process and software life cycles.


    - *The ability to be flexible about that process*. No project ever proceeds as
    you think it will on the first day. Requirements change, people come and go, tools
    don’t work out or get updated, and so on. This point is all about handling risk
    in your project. If you identify risks, plan to mitigate them, and then have a
    contingency plan to address the event where the risk actually occurs, you’ll be
    in much better shape. Chapter [4](#270563_3_En_4_Chapter.xhtml) talks about requirements
    and risk.


    - *A plan that everyone buys into*. You wouldn’t write a sorting program without
    an algorithm to start with, so you shouldn’t launch a software development project
    without a plan. The project plan encapsulates what you’re going to do to implement
    your project. It talks about process, risks, resources, tools, requirements management,
    estimates, schedules, configuration management, and delivery. It doesn’t have
    to be long, it doesn’t need to contain all the minute details of the everyday
    life of the project, and it doesn’t even need to be written down, but everyone
    on the team needs to have input into it, they need to understand it, and they
    need to agree with it. Unless everyone buys into the plan, you’re doomed. See
    Chapter [3](#270563_3_En_3_Chapter.xhtml) for more details on project planning.


    - *To know where you are at all times*. It’s that communication thing again. Most
    projects have regular status meetings so that the developers can “sync up” on
    their current status, get a feel for the status of the entire project, and to
    create a sense of camaraderie within the team. This works very well for smaller
    teams (say, up to about 20 developers, many of which will have daily “stand-up”
    meetings to sync up at the beginning of each day. Different process models handle
    this “stand-up” meeting differently. For instance, plan-driven models don’t require
    these meetings, depending on the team managers to communicate with each other.
    Agile processes often require all-hands daily meetings to facilitate constant
    team communication in a highly dynamic project environment.


    - *To be brave enough to say, “hey, we’re behind!”* Nearly all software projects
    have schedules that are too optimistic at the start. It’s what clients want to
    hear, what companies want to offer, and what managers and developers want to supply.
    “Sure, I can get that done in a week!” “I’ll have it to you by the end of the
    day.” “Tomorrow? Not a problem.” No, no, no, no, no. Just face it. At some point
    you’ll be behind. And the best thing to do about it is to tell your manager right
    away. Sure, they might be angry. But they’ll be angrier when you end up a month
    behind and they didn’t know it. Fred Brooks’ famous answer to the question of
    how software projects get so far behind is “one day at a time.” The good news,
    though, is that the earlier you figure out you’re behind, the more options you
    have. These include lengthening the schedule (unlikely, but it does happen), moving
    some requirements to a future release, getting additional help, and so on. The
    important part is to keep your manager informed.'
