    \ and likely to be repeated elsewhere in the program, put it into a method that\
    \ evaluates the expression and returns a boolean result.\n\n*   *Use break or\
    \ return instead of a boolean loop control variable*. Many times you’ll see a\
    \ while loop that looks something like\n\n```\n    boolean done = false;\n   \
    \ while (!done) {\n    // do stuff here\n    if (some-expression)\n    done =\
    \ true;\n    }\n    ```\n\nThis creates a bit of unnecessary work and the suggestion\
    \ here is to replace the `done = true;` with a return or a break statement.\n\n\
    *   *Return from a method as soon as you know the answer*. This also means don’t\
    \ use a boolean or other variable to tell yourself you’ve found the return value\
    \ from a method. As soon as you know the answer, just return it.\n\n*   *Move\
    \ the code from simple routines to where it is used*. If you have a method that\
    \ contains code that is only used in one place, just put the code inline where\
    \ it is used instead of having it in a method.\n\n*   *Separate queries from calculations*.\
    \ Normally, a query operation will just return a value. If you have a method that\
    \ does both calculation and returns a value for a query (say something like `getAverage()`\
    \ or `getTotal()`), consider separating it into two methods, one to do the calculation\
    \ and one to do the query. This allows you to adhere to the “methods should just\
    \ do one thing” principle.\n\n*   *Combine methods that are similar*. You may\
    \ have two different methods that differ only by a constant used in a calculation.\
    \ Consider consolidating those methods and making the constant an input parameter\
    \ instead.\n\n*   *Move specialized code into its own class or subclass*. If you\
    \ have code that is only used by a subset of the instances of a superclass, then\
    \ move that code into its own class or subclass.\n\n*   *Move similar code from\
    \ classes into a superclass*. On the other hand, if you have code in several classes\
    \ that is similar, then create a new superclass and move the code up into it.\n\
    \n*   *Divide a class with multiple responsibilities into multiple classes*, adhering\
    \ to the Single Responsibility Principle.\n\n*   *Delete a class*. If you have\
    \ a class that ends up not doing much (e.g., it only has a single method, or it\
    \ only contains data members), then consider moving that work into another class.\n\
    \n*   *Encapsulate public instance variables*. If you have an instance variable\
    \ declared as public, convert it to private and create a getter method to access\
    \ it, obeying the information hiding principle.\n\n*   *Only use* `get()` *and*\
    \ `set()` *methods when necessary*. By default, all instance variables should\
    \ be private and accessed via public setter and getter methods. Only create `get()`\
    \ methods for instance variables that need to be used outside the object and only\
    \ create `set()` methods when need to be able to change the value of an instance\
    \ variable. For example, if you have an instance variable for a part number, you\
    \ probably don’t need a `set()` method, because part numbers don’t usually change.\n\
    \n*   *Hide public methods*. Only expose methods if they need to be in the class’s\
    \ interface. Just like with instance variables, all methods should be private\
    \ unless there’s a good reason to make them public.\n\n*   *Combine similar superclasses\
    \ and subclasses* that are nearly identical by consolidating them into a single\
    \ class."
  trans: "\n### 重构的类型\n\n让我们回顾一些可以改进代码的变更类型：\n\n*   *用命名常量替换魔法数字*。魔法数字之所以不好，有几个原因。首先，如果你多次使用某个魔法数字，并且需要修改它，那么你必须在每一行使用它的代码中修改这个数字。其次，如果后来有人接手你的代码，他们可能不知道这个数字的含义。命名常量允许你只在一个地方修改数字的值，并且能提示这个数字的含义。\n\
    \n*   *用更具信息量的名称重命名变量*。始终力求简洁但有意义（偶尔的基础循环迭代器，如 `i`、`j`、`k` 等除外）。\n\n*   *用表达式替换变量*。检查那些你可能创建了不必要的中间变量，而这些变量仅用于得出最终答案的情况。看看是否可以跳过创建这些变量，而是直接在最终答案的表达式中使用它们的公式或表达式。\n\
    \n*   *用方法替换表达式*。如果某个表达式可能在代码的两个或多个部分重复出现，请将该表达式替换为单个方法，然后直接调用该方法。再次强调：不要重复自己（DRY）。\n\
    \n*   *将一个用于不同用途的变量转换为多个各自用于单一用途的变量*。重复使用单个变量用于两个或多个不同的目的会令人困惑。将所有重复的变量替换为具有恰当名称的新变量，以使代码更易于理解。\n\
    \n*   *创建局部变量，而不是过度使用输入参数*。在方法中重新利用输入参数同样令人困惑。请创建一个专用的局部变量来代替；这只是在系统栈上多增加一个条目而已。\n\
    \n*   *创建类，而不是使用数据基本类型*。如果你使用数据基本类型创建了一个变量（例如使用 *double* 创建了一个名为 money 的变量），并且该变量可能需要额外的行为，那么请用类声明替换这个基本类型。\n\
    \n*   *将一组命名常量（类型码）转换为类或枚举*。之前我们说过使用魔法数字不好，应该使用命名常量。然而，如果你有一组彼此相关的命名常量，应该考虑将它们放在一个单独的类或枚举类型中。这将使你的代码更易于维护和阅读。\n\
    \n*   *将布尔表达式分解为变量*。如果你有一个复杂的布尔表达式，可以考虑将各个子句分离到中间变量中，然后在最后组合结果。\n\n*   *将复杂的布尔表达式移入一个返回布尔值的方法中*。如果你的布尔表达式很复杂，并且可能在程序的其他地方重复出现，请将其放入一个评估该表达式并返回布尔结果的方法中。\n\
    \n*   *使用 `break` 或 `return` 代替布尔循环控制变量*。很多时候你会看到类似这样的 `while` 循环：\n\n```\n  \
    \  boolean done = false;\n    while (!done) {\n    // 在这里做一些操作\n    if (some-expression)\n\
    \    done = true;\n    }\n    ```\n\n这会产生一些不必要的工作，这里的建议是用 `return` 或 `break` 语句替换\
    \ `done = true;`。\n\n*   *一旦知道答案，就立即从方法中返回*。这也意味着不要使用布尔变量或其他变量来告诉自己已经找到了方法的返回值。一旦知道答案，就直接返回它。\n\
    \n*   *将简单例程中的代码移到其使用的地方*。如果你有一个方法，其包含的代码只在一个地方使用，那么直接将代码内联到使用它的地方，而不是放在一个方法里。\n\
    \n*   *将查询与计算分离*。通常，查询操作只会返回一个值。如果你有一个方法既进行计算又为查询返回值（例如像 `getAverage()` 或 `getTotal()`\
    \ 这样的方法），考虑将其拆分为两个方法，一个用于计算，一个用于查询。这能让你遵循“方法应该只做一件事”的原则。\n\n*   *合并相似的方法*。你可能有两个不同的方法，它们仅在计算中使用的常量上有所不同。考虑合并这些方法，并将该常量作为输入参数。\n\
    \n*   *将专用代码移入其自己的类或子类*。如果你有代码只被超类的某个子集实例使用，那么请将该代码移入其自己的类或子类中。\n\n*   *将类中的相似代码移入超类*。另一方面，如果你在几个类中有相似的代码，那么创建一个新的超类，并将这些代码向上移入其中。\n\
    \n*   *将具有多重职责的类拆分为多个类*，遵循单一职责原则。\n\n*   *删除一个类*。如果你有一个类最终没做太多事情（例如，它只有一个方法，或者只包含数据成员），那么考虑将该工作移入另一个类。\n\
    \n*   *封装公有实例变量*。如果你有一个声明为公有的实例变量，请将其转换为私有，并创建一个 getter 方法来访问它，遵循信息隐藏原则。\n\n*\
    \   *仅在必要时使用* `get()` *和* `set()` *方法*。默认情况下，所有实例变量都应该是私有的，并通过公有的 setter 和 getter\
    \ 方法访问。仅为那些需要在对象外部使用的实例变量创建 `get()` 方法，并且仅在需要能够更改实例变量值时创建 `set()` 方法。例如，如果你有一个用于零件编号的实例变量，你可能不需要\
    \ `set()` 方法，因为零件编号通常不会改变。\n\n*   *隐藏公有方法*。仅当方法需要成为类接口的一部分时才公开它们。与实例变量一样，所有方法都应该是私有的，除非有充分的理由将其设为公有。\n\
    \n*   *合并相似的超类和子类*，如果它们几乎相同，则将其整合到一个单独的类中。\n"
- fmt: "# Defensive Programming\n\nBy defensive programming we mean that your code\
    \ should protect itself from bad data. The bad data can come from user input via\
    \ the command line, a graphical text box or form, or a file. Bad data can also\
    \ come from other routines in your program via input parameters, like in the first\
    \ example above.\n\nHow do you protect your program from bad data? Validate! As\
    \ tedious as it sounds, you should always check the validity of data that you\
    \ receive from outside your routine. This means you should do the following:\n\
    \n- Check the number and type of command line arguments.\n- Check file operations.\n\
    \    - Did the file open?\n    - Did the read operation return anything?\n   \
    \ - Did the write operation write anything?\n    - Did you reach EOF yet?\n- Check\
    \ that all values in function/method parameter lists are of the correct type and\
    \ size.\n- Always initialize variables and do not depend on the system to do the\
    \ initialization for you.\n- Check for null pointers (references in Java), incorrect\
    \ types, zeros in denominators, and out of range values.\n\nAs an example, here’s\
    \ a C program that takes in a list of house prices from a file and computes the\
    \ average house price from the list. The input file is provided to the program\
    \ from the command line.\n\n```\n/*\n* Program to compute the average selling\
    \ price of a set of homes.\n* Input comes from a file that is passed via the command\
    \ line.\n* Output is the Total and Average sale prices for\n* all the homes and\
    \ the number of prices in the file.\n*\n* jfdooley\n*/\n#include <stdio.h>\n#include\
    \ <stdlib.h>\n\nint main(int argc, char **argv) {\n    FILE *fp;\n    double totalPrice,\
    \ avgPrice;\n    double price;\n    int numPrices;\n\n    /* check that the user\
    \ entered the correct number of args */\n    if (argc != 2) {\n        fprintf(stderr,\
    \ \"Usage: %s <filename>\\n\", argv[0]);\n        exit(1);\n    }\n\n    /* try\
    \ to open the input file */\n    fp = fopen(argv[1], \"r\");\n    if (fp == NULL)\
    \ {\n        fprintf(stderr, \"File Not Found: %s\\n\", argv[1]);\n        exit(1);\n\
    \    }\n\n    totalPrice = 0.0;\n    numPrices = 0;\n\n    /* read the file, total\
    \ the prices and count the number of houses */\n    while (!feof(fp)) {\n    \
    \    fscanf(fp, \"%10lf\\n\", &price);\n        if (price <= 0.0) {\n        \
    \    fprintf(stderr, \"Bad Data %10.5f\\n\", price);\n            exit(1);\n \
    \       }\n        totalPrice += price;\n        numPrices++;\n    }\n\n    avgPrice\
    \ = totalPrice / numPrices;\n    printf(\"Number of houses is %d\\n\", numPrices);\n\
    \    printf(\"Total Price of all houses is $%10.2f\\n\", totalPrice);\n    printf(\"\
    Average Price per house is $%10.2f\\n\", avgPrice);\n\n    return 0;\n}\n```\n\
    \n## Defensive Programming: Assertions Are Helpful\n\nDefensive programming can\
    \ be greatly aided by the use of assertions, if your language supports them. Java,\
    \ C99, C11, C23, and C++ all support assertions. Assertions will test an expression\
    \ that you give them and if the expression is false, it will throw an error and\
    \ normally abort the program. You should use error handling code for errors you\
    \ think might happen (e.g., bad user input) and use assertions for errors that\
    \ should *never* happen (e.g., off-by-one errors in loops). Assertions are great\
    \ for testing your program, but because you should remove them before giving programs\
    \ to customers (you don’t want the program to abort on the user, right?), they\
    \ aren’t good to use to validate input data in a production program.\n\n## Defensive\
    \ Programming: Exceptions\n\nPart of defensive programming is making sure your\
    \ program can gracefully recover from common runtime problems, such as incorrect\
    \ input, so that the program stays running for as long as possible (making your\
    \ program robust). While *assertions* are used for errors that should never happen,\
    \ *exceptions* should be used for handling recoverable errors which are to be\
    \ expected as part of normal operations (e.g. `FileNotFound` exception).\n\nYou\
    \ should take advantage of built-in *exception handling* in whatever programming\
    \ language you’re using. What your program does and how it handles the exception\
    \ depends on the language capabilities (we’ll talk about exception handling in\
    \ Java later). The exception handling mechanism will give your program information\
    \ about what bad thing has just happened. It’s then up to you to decide what to\
    \ do. Normally in an exception handling mechanism your program will have two choices:\
    \ 1) handle the exception itself or 2) pass it along (a.k.a. throw) to whoever\
    \ called it and let that code handle it.\n\n## Defensive Programming: Error Handling\n\
    \nJust like with validation, you’re most likely to encounter errors in input data,\
    \ whether it’s command line input, file handling, or input from a graphical user\
    \ interface form. Here we’re talking about errors that occur at runtime. Compile\
    \ time and testing errors are covered in the next chapter on debugging and testing.\
    \ Other types of errors can be data that your program computes incorrectly, errors\
    \ in other programs that interact with your program, the operating system (for\
    \ instance, race conditions), and interaction errors where your program is communicating\
    \ with another and your program is at fault.\n\nThe main purpose of error handling\
    \ is to have your program run correctly for as long as possible. When it gets\
    \ to a point where your program cannot continue, it needs to report what is wrong\
    \ as best as it can and then exit gracefully. Exiting is the last resort for error\
    \ handling. So what should you do? Well, once again we come to the “it depends”\
    \ answer. What you should do depends on what your program’s context is when the\
    \ error occurs and what its purpose is. You won’t handle an error in a video game\
    \ the same way you handle one in a cardiac pacemaker. In every case, your first\
    \ goal should be to try to recover.\n\nRecovery means that your program needs\
    \ to try to either ignore the bad data, fix it, or substitute something else that\
    \ is valid for the bad data. See McConnell for a further discussion of error handling.\
    \ Here are a few examples of how to recover from errors:\n\n- You might just *ignore\
    \ the bad data and keep going*, using the next valid piece of data. Say your program\
    \ is a piece of embedded software in a digital pressure gauge. You sample the\
    \ sensor that returns the pressure 60 times a second. If the sensor fails to deliver\
    \ a pressure reading once, should you shut down the gauge? Probably not; a reasonable\
    \ thing to do is just skip that reading and set up to read the next piece of data\
    \ when it arrives. Now if the pressure sensor skips several readings in a row,\
    \ then something might be wrong with the sensor and you should do something different\
    \ (like yell for help or shut down the machine the program is monitoring).\n\n\
    - You might *substitute the last valid piece of data* for a missing or wrong piece.\
    \ Taking the digital pressure gauge again, if the sensor misses a reading, since\
    \ each time interval is only a sixtieth of a second, it’s likely that the missing\
    \ reading is very close to the previous reading. In that case you can substitute\
    \ the last valid piece of data for the missing value.\n\n- There may be instances\
    \ where you don’t have any previously recorded valid data. Your application uses\
    \ an asynchronous event handler, so you don’t have any history of data, but your\
    \ program knows that the data should be in a particular range. Say you’ve prompted\
    \ the user for a salary amount and the value that you get back is a negative number.\
    \ Clearly no one gets paid a salary of negative dollars, so the value is wrong.\
    \ One way (probably not the best) to handle this error is to *substitute the closest\
    \ valid value in the range*, in this case a zero. Although it’s not ideal, at\
    \ least your program can continue running with a valid data value in that field."
