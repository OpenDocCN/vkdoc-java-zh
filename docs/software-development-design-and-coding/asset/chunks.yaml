  trans: '

    ## 开闭原则 (OCP)


    开闭原则指出，类应该对扩展开放，对修改关闭。^(¹⁹¹)


    这意味着要找出类中不变的行为，并将该行为抽象到父类/基类中。这样既能封装并锁定基类代码，使其免于修改，同时允许所有子类（即那些扩展基类的类）继承基类行为，并以不同方式对其进行扩展。其核心要义在于，在精心设计的代码中，你添加新功能的方式不是修改现有代码（它对修改是关闭的），而是添加新代码（它对扩展是开放的）。


    你在前一章编写的 `BankAccount` 类就是开闭原则应用的经典范例。在该示例中，你将所有实现所需的个人信息（以及访问和修改数据的方法）都抽象到了抽象的
    `BankAccount` 类中，使其对修改关闭，然后将该类扩展为不同类型的银行账户。这让你只需再次扩展 `BankAccount` 类，就能轻松添加新的银行账户类型。你避免了代码重复，并维护了
    `BankAccount` 属性的完整性。请参见图 12-6。


    ![](img/270563_3_En_12_Fig6_HTML.jpg)


    一个 UML 类图表示一个银行系统，包含三个类：支票账户、储蓄账户和投资账户。每个类图都列出了属性和用于计算利息及取款的方法，并指定了数据类型。


    图 12-6


    开闭原则的经典 BankAccount 示例


    例如，在抽象的 `BankAccount` 类中，你定义了 `withdraw()` 方法，允许客户从账户中取款。但取款的具体方式在每个扩展的账户类中可能有所不同。虽然
    `BankAccount` 类中的 `withdraw()` 方法对修改是关闭的，但它可以在子类中被重写，以实现该特定账户类型的规则，从而改变方法的行为以适应其账户子类型。它是对修改关闭的，但对扩展是开放的。


    开闭原则不必局限于继承。如果你在一个类中有几个私有方法，这些方法对修改是关闭的，但如果你随后创建了一个或多个使用这些私有方法的公有方法，你就通过在这些公有方法中添加功能，为扩展这些私有方法打开了可能性。


    ## 不要重复自己原则 (DRY)


    该原则指出，应通过抽象出公共部分并将其放置在单一位置来避免重复代码。^(¹⁹²)


    DRY 是基础性的设计原则：自从开发者开始思考编写程序的更好方法以来，它就一直被传承下来。你可以重新查阅第 8 章和第 9 章以了解相关讨论。遵循 DRY
    原则，你应将每条信息和每个行为都放在设计中的单一位置。理想情况下，一个需求只在一个地方出现。这意味着你应该这样设计：每个需求都有一个逻辑上的实现位置。这样，如果你需要更改需求，就只有一个地方需要修改。同时，你应移除重复代码，并用方法调用来替代。如果你在复制代码，你就是在复制行为。


    DRY 的适用性超越了代码本身。仔细梳理你的功能列表和需求以查找重复项总是一个好主意。重写需求以避免在代码中重复功能，将使你的代码更易于维护。


    考虑上一章讨论的 B⁴++ 鸟类喂食器的最终版本。你最后做的工作是向喂食器添加一个歌曲识别器，以便喂食门可以自动打开和关闭。让我们看看你最终得到的两个用例（见表
    12-1）。


    表 12-1


    歌曲识别器用例及其备选


    | 主路径 | 备选路径 |

    | --- | --- |

    | 1. 爱丽丝在喂食器处看到或听到鸟。 | 1.1 鸣鸟识别器听到鸟鸣声。 |

    | 2. 爱丽丝确定它们*不是*鸣鸟。 | 2.1 鸣鸟识别器识别出该鸣叫声来自不受欢迎的鸟。 |

    | 3. 爱丽丝按下遥控器按钮。 | 3.1 鸣鸟识别器向喂食门发送关闭消息。 |

    | 4. 喂食门关闭。 |   |

    | 5. 鸟儿放弃并飞走。 | 5.1 鸣鸟识别器听到鸟鸣声。 |

    |   | 5.2 鸣鸟识别器识别出该鸣叫声来自鸣鸟。 |

    | 6. 爱丽丝按下遥控器按钮。 | 6.1 鸣鸟识别器向喂食门发送打开消息。 |

    | 7. 喂食门再次打开。 |   |


    请注意，你在两个不同的地方（通过遥控器和通过歌曲识别器）打开和关闭喂食门。但仔细想想，无论你在哪里请求开门/关门，它们总是以相同的方式打开/关闭。因此，这是一个经典的将开门和关门行为抽象出来并放在单一位置（例如一个
    `FeedingDoor` 类）的机会。这就是 DRY 原则在发挥作用！

    '
- fmt: '# The Single Responsibility Principle (SRP)


    This principle says that a class should have one, and only one, reason to change.^([^(193)](#fn193))


    Here’s an example of the overlap between these design principles that was mentioned
    above: SRP, the first principle about encapsulation, and DRY all say similar,
    but slightly different things. Encapsulation is about abstracting behavior and
    putting things in your design that are likely to change in the same place. DRY
    is about avoiding duplicating code by putting identical behaviors in the same
    place. SRP is about designing your classes so that each does just one thing.


    Every object should have a single responsibility and all the object’s services
    are targeted towards carrying out that responsibility. *Each class should have
    only one reason to change*. Put simply, this means to beware of having your class
    try to do too many things.


    As an example, say you’re writing the embedded code for a mobile phone. After
    months (really) of discussions with the marketing folks, your first cut at a `MobilePhone`
    class looks like Figure [12-7](#270563_3_En_12_Chapter.xhtml#Fig7).


    ![](images/270563_3_En_12_Chapter/270563_3_En_12_Fig7_HTML.jpg)


    A U M L class diagram for a mobile phone with attributes and operations listed.
    Attributes include phone number long. Operations include methods like get phone
    number long, make call long, and connect to network long among others.


    Figure 12-7


    A very busy `MobilePhone` class


    This class seems to incorporate a lot of what you would want a mobile phone to
    do but it violates the SRP in several ways. The class doesn’t have a *single responsibility*;
    it has many. Instead of trying to do a single thing, it is trying to do way too
    many things: make and receive phone calls; create, send, and receive text messages;
    create, send and receive pictures; and browse the Internet. But you don’t want
    a single class to be impacted by all these completely different requirements.
    You don’t want to modify the `MobilePhone` class every time the picture format
    is changed or every time you want to add a new picture-editing feature, or every
    time the browser changes. Rather, you want to separate these functions out into
    different classes so that they can change independently of each other. So how
    do you recognize the things that should move out of this class, and how do you
    recognize the things that should stay? Have a look at Figure [12-8](#270563_3_En_12_Chapter.xhtml#Fig8).


    ![](images/270563_3_En_12_Chapter/270563_3_En_12_Fig8_HTML.jpg)


    A U M L diagram consists of classes labeled mobile, phone call, picture, and text
    message, each containing methods related to mobile phone operations such as making
    calls, taking and sending pictures, and creating and sending text messages.


    Figure 12-8


    Mobile phone classes each with a single responsibility


    In this example, you ask the question “What does the mobile phone do (to itself)?”
    as opposed to “What services are offered by the mobile phone?” By asking questions
    like this, you can start to separate out the responsibilities of the objects in
    the design. In this case, you can see that the phone itself can get its own phone
    number, initialize itself, and connect itself to the mobile phone network. The
    services offered, on the other hand, are really independent of the actual mobile
    phone and so can be separated out into `PhoneCall`, `TextMsg`, and `Picture` classes.
    So you divide up the initial one class into four separate classes, each with a
    single responsibility. This way you can change any of the four classes without
    affecting the others. You then add a `Controller` class that runs the phone itself
    and interfaces with the existing services, which also allows you to add new services/classes
    in the future. You’ve simplified the design (although you’ve got more classes)
    and made it easier to extend and modify. Is that a great principle or what?


    # The Liskov Substitution Principle (LSP)


    The Liskov Substitution Principle, named after Turing Award winner Dr. Barbara
    Liskov of MIT, tells us that all subclasses must be substitutable for their base
    class.^([^(194)](#fn194)) This principle requires that inheritance^([^(195)](#fn195))
    should be well designed and well behaved. Any object instantiated as a subclass
    should be able to use all the base class functionality seamlessly.


    One of the best and canonical examples of violating the Liskov Substitution Principle
    is the Rectangle/Square example. The example itself is all over the Internet;
    Robert Martin gives a great variation on this example in his book *Agile Software
    Development, Principles, Patterns, and Practices*,^([^(196)](#fn196)) and we’ll
    follow his version of the example. Here it is in Java.


    Say you have a class called `Rectangle` that represents the geometric shape of
    a rectangle:


    ```

    /**

    * class Rectangle

    */

    public class Rectangle {

    private double width;

    private double height;

    /**

    * Constructor for objects of class Rectangle

    */

    public Rectangle(double width, double height) {

    this.width = width;

    this.height = height;

    }

    public void setWidth(double width) {

    this.width = width;

    }

    public void setHeight(double height) {

    this.height = height;

    }

    public double getHeight() {

    return this.height;

    }

    public double getWidth() {

    return this.width;

    }

    }

    ```


    And, of course, one of your users wants to have the ability to manipulate squares
    as well as rectangles. You already know that squares are just a special case of
    rectangles. In other words, a square *IS-A* rectangle. Therefore, this problem
    seems to require using inheritance. So you create a `Square` class that inherits
    from `Rectangle`:


    ```

    /**

    * class Square

    */

    public class Square extends Rectangle {

    /**

    * Constructor for objects of class Square

    */

    public Square(double side) {

    super(side, side);

    }

    public void setSide(double side) {

    super.setWidth(side);

    super.setHeight(side);

    }

    public double getSide() {

    return super.getWidth();

    }

    }

    ```


    Notice that because the width and height of a `Square` are the same, you couldn’t
    run the risk of changing them individually, so `setSide()` uses `setWidth()` and
    `setHeight()` to set both for the sides of a `Square`. No big deal, right?


    Well, if you have a function like


    ```

    void myFunc(Rectangle r, double newWidth) {

    r.setWidth(newWidth);

    }

    ```


    and you pass `myFunc()` a `Rectangle` object, it works just fine, changing the
    width of the rectangle. But what if you pass `myFunc()` a `Square` object? Well,
    it turns out that in Java the same thing happens as before, but that’s *wrong*.
    It violates the integrity of the `Square` object by just changing its width without
    changing its height as well. So you’ve violated the LSP here and the `Square`
    cannot substitute for a `Rectangle` without changing the behavior of the `Square`.
    The LSP says that the subclass (`Square`) should be able to substitute for the
    superclass (`Rectangle`), but it doesn’t in this case.


    To get around this, you can override the `Rectangle` class’s `setWidth()` and
    `setHeight()` methods in `Square` like this:


    ```

    public void setWidth(double w) {

    super.setWidth(w);

    super.setHeight(w);

    }

    public void setHeight(double h) {

    super.setWidth(h);

    super.setHeight(h);

    }

    ```'
