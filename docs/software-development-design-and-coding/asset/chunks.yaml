- fmt: '注意，当你创建`ListIterator`对象时，需要将`ArrayList`中的元素数量传递给它。这会设置`ListIterator`对象使用的游标，使其指向`ArrayList`中最后一个元素之后的位置，从而能够通过`hasPrevious()`方法向后查找。在Java的`Iterator`和`ListIterator`实现中，*游标*始终指向两个元素之间，这样`hasNext()`和`hasPrevious()`方法调用才有意义；例如，当你调用`iter.hasNext()`时，你是在询问迭代器集合中是否还有下一个元素。图[13-8](#270563_3_En_13_Chapter.xhtml#Fig8)是游标外观的抽象表示。


    ![图13-8：迭代器抽象中的游标](images/270563_3_En_13_Chapter/270563_3_En_13_Fig8_HTML.jpg)


    图13-8：迭代器抽象中的游标


    最后，某些迭代器允许在迭代器运行时向集合中插入和删除元素。这些被称为*健壮迭代器*。Java的`ListIterator`接口（而非`Iterator`）在有限制的情况下，允许在迭代器中进行插入（通过`add()`方法）和删除（通过`remove()`方法）。`add()`方法仅将元素添加到紧邻`next()`将检索的下一个元素之前的位置，或紧邻`previous()`方法调用将返回的下一个元素之后的位置。`remove()`方法只能在连续的`next()`或`previous()`方法调用之间调用，不能连续调用两次，且绝不能紧跟在`add()`方法调用之后。^([^(222)](#fn222))


    ### 行为型模式2：观察者模式


    我们的一位同事非常喜欢NPR的《科学星期五》广播节目（[`http://sciencefriday.com`](http://sciencefriday.com)），但他们几乎无法在节目播出时收听，因为该节目在美国东部时间周五下午2:00至4:00播出。他们订阅了《科学星期五》播客，因此每周六早上修剪草坪时，都能在iPhone上收听最新一集。如果他们厌倦了《科学星期五》，只需取消订阅，就不会再收到新播客。亲爱的读者，这就是*观察者模式*。


    根据四人帮的定义，*观察者模式*“……定义了对象之间的一对多依赖关系，这样当一个对象改变状态时，其所有依赖者都会收到通知并自动更新。”^([^(223)](#fn223))
    在这个《科学星期五》的例子中，NPR是播客的“发布者”，而所有“订阅”（或注册）播客的人都是观察者。你等待《科学星期五》状态发生变化（新播客创建），然后发布者自动更新你。更新方式因两种不同类型的观察者而异：推送和拉取。在*推送观察者*中，发布者（在面向对象术语中也称为主题）改变状态，然后将新状态*推送*给所有观察者。在*拉取观察者*中，主题改变状态，但直到观察者请求时才提供完整更新；观察者从主题*拉取*更新。在*拉取*模型的一种变体中，主题可能向所有观察者提供最小更新，通知它们状态已更改，但观察者仍需请求新状态的详细信息。


    使用观察者模式时，你需要一个`Subject`接口，以便主题、观察者和客户端都能识别它们使用的状态接口。你还需要一个`Observer`接口，该接口仅说明如何更新观察者。发布者将实现`Subject`接口，而不同的“监听器”将实现`Observer`接口。图[13-9](#270563_3_En_13_Chapter.xhtml#Fig9)描述了这些关系。


    ![图13-9：经典观察者模式](images/270563_3_En_13_Chapter/270563_3_En_13_Fig9_HTML.jpg)


    图13-9：经典观察者模式^([^(224)](#fn224))


    客户端类未在图中显示，但它将同时使用`ConcreteSubject`和`ConcreteObserver`类。以下是所有这些类的*推送模型*版本的简单实现。请记住，这是*推送模型*，因为`ConcreteSubject`对象会通知所有*观察者*，无论它们是否请求。


    首先，创建`Subject`接口，该接口说明如何注册、移除和通知观察者：


    ```

    public interface Subject {

    public void addObserver(Observer obs);

    public void removeObserver(Observer obs);

    public void notifyAllObservers();

    }

    ```


    接下来，编写`Subject`接口的实现。这个类是真正的发布者，因此它还需要构成主题状态的属性。在这个简单版本中，你使用`ArrayList`来保存所有观察者。


    ```

    import java.util.ArrayList;

    public class ConcreteSubject implements Subject {

    private ArrayList observerList;

    // 这两个变量是我们的状态

    private int subj_id;

    private String msg;

    public ConcreteSubject() {

    observerList = new ArrayList();

    this.subj_id = 0;

    this.msg = "Hello";

    }

    public void addObserver(Observer obs) {

    observerList.add(obs);

    }

    public void removeObserver(Observer obs) {

    observerList.remove(obs);

    }

    public void notifyAllObservers() {

    for (Observer obs: observerList) {

    obs.update(this.subj_id, this.msg);

    }

    }

    public void setState(int foo, String bar) {

    this.subj_id = subj_id;

    this.msg = msg;

    notifyAllObservers();

    }

    }

    ```


    接下来，编写`Observer`接口，该接口说明如何更新你的`Observers`：


    ```

    public interface Observer {

    public void update(int obs_id, String msg);

    }

    ```


    然后编写`Observer`接口的实现：


    ```

    public class ConcreteObserver implements Observer {

    private int obs_id;

    private String msg;

    Subject subj;

    /**

    * ConcreteObserver类的构造函数

    */

    public ConcreteObserver(Subject subj) {

    this.subj = subj;

    subj.addObserver(this);

    }

    public void update(int obs_id, String msg) {

    this.obs_id = obs_id;

    this.msg = msg;

    show();

    }

    private void show() {

    System.out.printf("Id = %d Msg = %s\n", this.obs_id, this.msg);

    }

    }

    ```


    最后，编写驱动程序，创建发布者和每个观察者，并将它们组合在一起：


    ```

    public class ObserverDriver {

    public static void main(String [] args) {

    ConcreteSubject subj = new ConcreteSubject();

    ConcreteObserver obj = new ConcreteObserver(subj);

    subj.setState(12, "Monday");

    subj.setState(17, "Tuesday");

    }

    }

    ```


    执行驱动程序的输出（全部来自`ConcreteObserver`对象中的`show()`方法）将如下所示：


    ```

    Id = 12 Msg = Monday

    Id = 17 Msg = Tuesday

    ```


    在许多方面，观察者模式的工作方式类似于Java事件接口。在Java中，你创建一个类，该类注册为特定事件类型的“监听器”（观察者）。你还创建一个方法，该方法作为实际的观察者，并在事件发生时做出响应。当该类型的事件发生时，Java事件对象（主题）通过调用你编写的方法来通知你的观察者，并将事件数据传递给观察者方法；Java事件使用观察者模式的*推送模型*。


    例如，如果你在Java程序中创建一个`Button`对象，则使用`Button`对象的`addActionListener()`方法来注册以观察`ActionEvents`。当`ActionEvent`发生时，所有`ActionListeners`都会通过调用名为`actionPerformed()`的方法得到通知。这意味着你的`Button`对象必须实现`actionPerformed()`方法来处理该事件。'
  raw: 'Note that when you create the `ListIterator` object, you pass it the number
    of elements in the `ArrayList`. This sets the cursor that the `ListIterator` object
    uses to point past the last element in the `ArrayList`, so it can look backwards
    using the `hasPrevious()` method. In both the `Iterator` and `ListIterator` implementations
    in Java, the *cursor* always points between two elements so that the `hasNext()`
    and `hasPrevious()` method calls make sense; for example, when you say `iter.hasNext()`,
    you’re asking the iterator if there is a next element in the collection. Figure
    [13-8](#270563_3_En_13_Chapter.xhtml#Fig8) is the abstraction of what the cursors
    look like.


    ![](images/270563_3_En_13_Chapter/270563_3_En_13_Fig8_HTML.jpg)


    An illustration represents a series of boxes labeled from e l 1 to e l N, representing
    elements in a sequence. Arrows point upwards between each box.


    Figure 13-8


    Cursors in the Iterator abstraction


    Finally, some iterators will allow you to insert and delete elements in the collection
    while the iterator is running. These are called *robust iterators*. The Java `ListIterator`
    interface (not the `Iterator`) allows both insertion (via the `add()` method)
    and deletion (via the `remove()` method) in an iterator with restrictions. The
    `add()` method only adds to the position immediately before the one that would
    be the next element retrieved by a `next()` or immediately after the next element
    that would be returned by a `previous()` method call. The `remove()` method can
    only be called between successive `next()` or `previous()` method calls, cannot
    be called twice in a row, and never immediately after an `add()` method call.^([^(222)](#fn222))


    #### Behavioral 2: The Observer Pattern


    A colleague of ours loves NPR’s *Talk of the Nation: Science Friday*, or *SciFri,*
    radio show ([`http://sciencefriday.com`](http://sciencefriday.com)), but they
    hardly get to listen to it when it is broadcast, because it’s on from 2:00–4:00
    PM EST on Fridays so they can’t listen to it then. They do subscribe to the SciFri
    podcast and so every Saturday morning when they get a new podcast episode they
    can listen to it on their iPhone while they mow the lawn. If they ever get tired
    of *SciFri*, they can just unsubscribe and they won’t get any new podcasts. That,
    dear reader, is the *Observer Pattern*.


    According to the Gang of Four, the *Observer Pattern* “...defines a one-to-many
    dependency between objects so that when one object changes state, all of its dependents
    are notified and updated automatically.”^([^(223)](#fn223)) In this SciFri example,
    NPR is the “publisher” of the SciFri podcast, and all of us who “subscribe” (or
    register) to the podcast are the observers. You wait for the SciFri state to change
    (a new podcast gets created) and then the publisher updates you automatically.
    How the updates happen will differ between two different types of Observer: push
    and pull. In a *push Observer*, the Publisher (also known as the Subject in object-oriented
    parlance) changes state and then *pushes* the new state out to all the Observers.
    In a *pull Observer*, the Subject changes state but doesn’t provide a full update
    until the Observers ask for it; they *pull* the update from the Subject. In a
    variation of the *pull* model, the Subject may provide a minimal update to all
    the Observers notifying them that the state has changed, but the Observers still
    need to ask for the details of the new state.


    With the Observer Pattern, you need a Subject interface so that the Subject, the
    Observer, and the Client can all tell the state interface they’re using. You also
    need an Observer interface that just tells you how to update an Observer. The
    publisher will then implement the Subject interface and the different “listeners”
    will implement the Observer interface. Figure [13-9](#270563_3_En_13_Chapter.xhtml#Fig9)
    depicts these relationships.


    ![](images/270563_3_En_13_Chapter/270563_3_En_13_Fig9_HTML.jpg)


    A U M L diagram illustrates a set of connected classes in a cycle. The classes
    are subject, observer, concrete observer, and concrete subject.


    Figure 13-9


    The canonical Observer Pattern^([^(224)](#fn224))


    The client class is missing but it will use both the `ConcreteSubject` and `ConcreteObserver`
    classes. Below is a simple implementation of a *push model* version of all of
    these. Remember, it’s a *push model* because the `ConcreteSubject` object notifies
    all the *Observers* whether they request it or not.


    First, create the Subject interface that tells you how to register, remove, and
    notify the Observers:


    ```

    public interface Subject {

    public void addObserver(Observer obs);

    public void removeObserver(Observer obs);

    public void notifyAllObservers();

    }

    ```


    Next, write the implementation of the Subject interface. This class is the real
    publisher, so it also needs the attributes that form the state of the Subject.
    In this simple version, you use an `ArrayList` to hold all the Observers.


    ```

    import java.util.ArrayList;

    public class ConcreteSubject implements Subject {

    private ArrayList observerList;

    // these two variables are our state

    private int subj_id;

    private String msg;

    public ConcreteSubject() {

    observerList = new ArrayList();

    this.subj_id = 0;

    this.msg = "Hello";

    }

    public void addObserver(Observer obs) {

    observerList.add(obs);

    }

    public void removeObserver(Observer obs) {

    observerList.remove(obs);

    }

    public void notifyAllObservers() {

    for (Observer obs: observerList) {

    obs.update(this.subj_id, this.msg);

    }

    }

    public void setState(int foo, String bar) {

    this.subj_id = subj_id;

    this.msg = msg;

    notifyAllObservers();

    }

    }

    ```


    Next, you write the Observer interface that tells you how to update your `Observers`:


    ```

    public interface Observer {

    public void update(int obs_id, String msg);

    }

    ```


    And then you write the implementation of the `Observer` interface:


    ```

    public class ConcreteObserver implements Observer {

    private int obs_id;

    private String msg;

    Subject subj;

    /**

    * Constructor for objects of class ConcreteObserver

    */

    public ConcreteObserver(Subject subj) {

    this.subj = subj;

    subj.addObserver(this);

    }

    public void update(int obs_id, String msg) {

    this.obs_id = obs_id;

    this.msg = msg;

    show();

    }

    private void show() {

    System.out.printf("Id = %d Msg = %s\n", this.obs_id, this.msg);

    }

    }

    ```


    Finally, you write the driver program that creates the publisher and each of the
    observers and puts them all together:


    ```

    public class ObserverDriver {

    public static void main(String [] args) {

    ConcreteSubject subj = new ConcreteSubject();

    ConcreteObserver obj = new ConcreteObserver(subj);

    subj.setState(12, "Monday");

    subj.setState(17, "Tuesday");

    }

    }

    ```


    And the output of executing the driver (which all comes from the `show()` method
    in the `ConcreteObserver` object) will look like:


    ```

    Id = 12 Msg = Monday

    Id = 17 Msg = Tuesday

    ```


    In many ways, the Observer Pattern works like the Java events interface. In Java,
    you create a class that registers as a “listener” (the Observer) for a particular
    event type. You also create a method that is the actual observer and which will
    respond when the event occurs. When an event of that type occurs, the Java events
    object (the Subject) notifies your observer by making a call to the method you
    wrote, passing the data from the event to the observer method; Java events use
    the *push model* of the Observer Pattern.


    For example, if you create a `Button` object in a Java program, you use the `addActionListener()`
    method of the `Button` object to register to observe `ActionEvents`. When an `ActionEvent`
    occurs all the `ActionListeners` are notified by having a method named `actionPerformed()`
    called. This means that your `Button` object must implement the `actionPerformed()`
    method to handle the event.'
