  trans: "\n# 10. 面向对象概述\n\n> *对象具有三个特性，这使其成为简单而强大的模型构建模块。它拥有状态，因此可以模拟记忆；它拥有行为，因此可以模拟动态过程；并且它是封装的，因此可以隐藏复杂性。*\n\
    > \n> ——特吕格韦·雷恩斯考，*《与对象共事》*\n\n嗯，是的，我们之前都学过面向对象编程范式，但回顾一些基本定义绝无坏处，这样我们在讨论面向对象分析与设计时才能达成共识。\n\
    \n首先，对象是*事物*。它们拥有*标识*（即名称）、*状态*（即描述对象内部当前存储数据的一组属性），以及一组定义好的、作用于该状态的*行为*。栈是一个对象，汽车、银行账户、窗口、图形用户界面中的按钮、一本书，甚至一摞书也都是对象。在面向对象程序中，一组相互协作的对象之间传递消息。这些消息向目标对象发出请求，以调用那些要么对其数据执行操作（从而改变对象状态），要么报告对象当前状态的方法。最终，工作得以完成。对象使用*封装*和*信息隐藏*（记住，它们是不同的）来将数据和操作与程序中的其他对象隔离开来。共享数据区域（通常）被消除。对象是*类*的成员，类定义了属性类型和操作。\n\
    \n类是对象的*模板*或蓝图。类也可以被视为生成对象的工厂。因此，一个`Automobile`类将定义并创建汽车实例，一个`Stack`类将创建一个新的栈对象，而一个`Queue`类将创建一个新的队列。类可以从其他类*继承*属性和行为。类可以排列成一个类层次结构，其中一个类（*超类*，也称为*父类*或*基类*）是一个或多个*子类*（也称为*子类*）的泛化。子类从其超类*继承*属性和操作，并可以添加自己的新方法或属性。从这个意义上说，子类比其超类更具体、更详细；因此，我们说子类*扩展*了超类。例如，一个`BankAccount`对象可能包含客户姓名、地址、余额和一个唯一的银行账户\
    \ ID 号；它还将允许存款和取款，并且可以查询当前余额。`CheckingAccount`是`BankAccount`的一个更具体的版本；它拥有`BankAccount`的所有属性和操作，但也添加了`CheckingAccount`特有的数据和行为，比如支票号码和每张支票的手续费。在\
    \ Java 中，此特性被称为*继承*。\n\n继承有许多优点。它是一种可用于对实体进行分类的*抽象机制*。它在设计和编程层面都是一种*复用机制*。*继承图*是关于领域和系统的组织性知识的来源。\n\
    \n当然，继承也存在问题。它使得对象类不是自包含的：如果不引用其超类，就无法理解子类。继承引入了复杂性，这是不受欢迎的，尤其是在关键系统中。继承通常还允许运算符（Java\
    \ 中的方法）的*重载*^(¹⁷³)，这可能是好事（多态性），也可能是坏事（屏蔽了超类中有用的方法）。\n\n*面向对象编程*（OOP）有许多优点，其中包括更易于维护，因为对象可以作为独立的实体来理解和操作。对象也适合作为可复用的组件。但是，对于某些问题，可能不存在从现实世界对象到系统对象的清晰或有用的映射，这意味着\
    \ OOP 可能并不适用于所有问题。\n\n## 面向对象分析与设计过程\n\n面向对象分析（OOA）、设计（OOD）和编程（OOP）是相关但不同的概念。\n\
    \nOOA 关注的是开发*应用领域的对象模型*。因此，举例来说，你拿到问题陈述，生成一组特性和（可能的）用例，^(¹⁷⁴)梳理出对象以及这些对象中满足用例所需的一些方法，然后整合出一个解决方案如何协同工作的架构。这就是面向对象分析。\n\
    \nOOD 关注的是开发一个*面向对象的系统模型*以满足需求。你获取从 OOA 中生成的对象，确定是否使用继承、聚合、组合、抽象类、接口等，以创建一个连贯且高效的模型。你绘制类图，充实每个属性是什么以及每个方法做什么的细节，并描述接口。这就是设计。\n\
    \n有些人喜欢面向对象分析、设计和编程，^(¹⁷⁵)有些人不喜欢。^(¹⁷⁶)\n\n因此，面向对象分析允许你获取一个问题模型，并将其以对象和类的形式重新表述；而面向对象设计允许你获取分析后的需求，在你提出的对象之间建立联系，并填充对象属性和方法方面的细节。但你真的该如何做到这一切呢？\n\
    \n以下是一个建议的过程，它开始填充一些细节。^(¹⁷⁷)我们将在后续过程中弄清楚其余部分。\n\n1.  编写（或接收）*问题陈述*。利用它生成一组初始特性。\n\
    \n2.  创建*特性列表*。特性列表是你从问题陈述中推导出的程序特性集合；它包含你的初始需求集。特性列表可以是一组*用户故事*。为了帮助生成特性列表，你可以整理一组*场景*，其中场景是对用户将如何使用程序完成任务的过程的叙述性描述。用户故事非常简短且是高层级的，而场景则更长，提供更多细节。一个用户故事可能生成多个场景。场景应该与技术无关，并且应该从用户的角度明确表述。它不是关于程序如何工作；而是关于用户想要完成什么以及用户如何完成任务；它也可以谈论用户知道什么。\n\
    \n3.  编写*用例*。^(¹⁷⁸)这有助于细化特性，挖掘新需求，并揭示你刚刚创建的特性中存在的问题。用例是对用户如何使用程序完成任务更具体的描述；它们更详细地描述了用户如何与系统交互。用例“……捕捉行动的目标、启动过程的触发事件，然后描述过程的每一步，包括输入、输出、错误和异常。用例通常以参与者或用户执行操作的形式编写，随后是预期的系统响应和替代结果。”^(¹⁷⁹)每个场景或用户故事可能创建多个用例。\n\
    \n4.  将问题*分解*为子问题、子系统或模块，无论你怎么称呼它们，只要它们是更小、自包含的模块，通常与功能相关即可。\n\n5.  将你的特性、子系统和用例*映射*到领域对象；创建抽象。\n\
    \n6.  *识别*程序的对象、方法和算法。\n\n7.  *实现*本次迭代。\n\n8.  *测试*本次迭代。\n\n9.  如果你尚未完成特性列表，并且仍有时间和/或资金剩余，则返回步骤\
    \ 4 进行下一次迭代，否则……\n\n10. 进行最终的*验收测试*并发布。\n"
- fmt: "请注意，此过程省略了许多细节，例如迭代的长度。一个迭代中最终包含多少功能？我们如何以及何时向功能列表中添加新功能？我们究竟如何识别对象和操作？我们如何将对象抽象为类？在测试中发现的错误在哪里修复？我们是否对代码和其他项目工作产品进行审查？此处省略一些细节是可以的；我们主要关注流程中的分析和设计元素。我们将在下文讨论流程其余部分的想法；部分答案也位于关于项目管理的第[3](#270563_3_En_3_Chapter.xhtml)章中。\n\
    \n### OOA&D 流程的细节\n\n上述流程步骤如何融入软件开发生命周期？很高兴你问到这个问题。回顾一下，基本的开发生命周期包含四个步骤：\n\n1.\
    \  需求收集与分析\n2.  设计\n3.  实现与测试\n4.  发布、维护与演进\n\n我们可以轻松地将之前的十个步骤归入这四个类别，如下所示：\n\n\
    1.  需求收集与分析：\n    1.  问题陈述\n    2.  创建功能列表\n    3.  生成用例\n2.  设计：\n    1.  分解问题\n\
    \    2.  将功能和用例映射到领域对象\n    3.  识别对象、方法和算法\n3.  实现与测试：\n    1.  实现本次迭代\n    2.\
    \  测试本次迭代\n    3.  如果尚未完成功能列表或时间已到，则返回步骤 2.1，否则进入步骤 4\n4.  发布、维护与演进：\n    1. \
    \ 进行最终验收测试并发布\n\n同样，我们现在可以忽略每个步骤的细节。这些细节实际上取决于你为开发项目选择的流程方法论。上述流程描述采用迭代方法论，可以轻松地融入敏捷流程或更传统的分阶段发布流程。\n\
    \n请注意，每当你进入步骤 4 时，都需要重新审视需求，因为你很可能在每次迭代中发现或产生了新的需求。此外，每当你的客户看到一个新的迭代时，他们都会要求更多功能（是的，他们会；请相信我们）。这意味着你需要在每次新迭代开始时更新功能列表（并重新确定优先级）。\n\
    \n## 执行流程\n\n让我们继续，通过一个扩展的示例来了解问题陈述会引导你走向何方，以及你如何梳理出需求并开始进行面向对象分析。\n\n### 步骤 1：问题陈述\n\
    \n伯特，`Birds by Burt` 的骄傲所有者，创造了终极的鸟类喂食器。伯特的 `Bird Buffet and Bath`（`B⁴`）是一款集鸟类喂食器和鸟浴盆于一体的产品。它有\
    \ 12 种不同的颜色（包括迷彩色），并提供 1 磅、3 磅和 5 磅的容量。其附带的鸟浴盆最多可容纳一加仑水，它有一个内置挂钩，可以挂在树枝或杆子上，`B⁴`\
    \ 正在热销。爱丽丝和鲍勃非常渴望拥有一台 `B⁴`，但他们希望做一些改动。爱丽丝是一位技术迷和狂热的鸣禽观察者。她知道她最喜欢的鸣禽只在白天觅食，因此她想要一个定制的\
    \ `B⁴`，使得喂食门能够在日出时自动打开，并在日落时自动关闭。伯特，这位永远随和的老板，同意了，`Birds by Burt` 的硬件部门正在努力为爱丽丝设计\
    \ `B⁴++`。你的工作是编写软件来使硬件工作。\n\n### 步骤 2：功能列表\n\n你需要做的第一件事是弄清楚 `B⁴++` 实际上会*做*什么。这个版本看起来足够简单。你几乎可以立即写下三个需求：\n\
    \n*   喂食门必须同时打开和关闭。\n*   喂食门应在日出时自动打开。\n*   喂食门应在日落时自动关闭。\n\n所以这看起来并不难。简化的需求很直接，并且不需要用户交互。接下来，你将考虑用例，以便了解鸟类喂食器真正要做的事情。\n\
    \n### 步骤 3：用例\n\n*用例*是对程序在特定情况下所执行操作的描述。它是当用户请求某事时程序执行的一系列详细步骤。用例总是有一个*参与者*（某个启动流程的外部代理）和一个*目标*（用例在结束时应该完成的事情）。用例从用户的角度描述了从某个初始状态到达目标所需的过程。以下是\
    \ `B⁴++` 的一个简单用例示例：\n\n1.  传感器检测到 40% 亮度水平的阳光。\n2.  喂食门打开。\n3.  鸟儿到达、进食、饮水并离开。\n\
    4.  传感器检测到阳光减弱至 25% 亮度水平。\n5.  喂食门关闭。\n\n鉴于 `B⁴++` 的简单性，这差不多就是你能从一个用例中期望得到的内容。实际上，步骤\
    \ 3 在技术上不属于用例，因为它不是程序的一部分，但保留它有助于你更全面地了解 `B⁴++` 是如何运行的。用例在需求分析中非常有用，因为它们用自然语言让你了解程序在特定情况下需要做什么，并且它们通常能帮助你发现新的需求。请注意，在用例中，你不讨论程序*如何*做某事；你只关注程序为了达成目标*必须*做什么。这也可以包括输入、输出和发生的错误。它还可以包括针对不同情况的备选步骤列表（例如，如果用户出错，创建两个备选用例，一个用于处理错误，另一个用于用户未出错的情况）。大多数情况下，你编写的每个程序都会有多个用例。这里你只有一个，因为这个版本的\
    \ `B⁴++` 非常简单。\n\n### 步骤 4：分解问题\n\n现在你已经有了用例，你可以分解问题并识别程序中的对象了。\n\n如果你查看上面的用例并找出名词（包括复合名词），你可以识别出几个对象。每个对象都有某些特征，并有助于实现让鸟儿获得食物的目标。虽然“鸟儿”在用例中是一个名词，但它们是这出小剧中的参与者，因此为了描述对象，你可以忽略它们；它们实际上不是程序的一部分。在没有鸟的日子里，你的\
    \ `B⁴++` 应该继续照常运行。其他名词是*传感器*、*门*和*阳光亮度水平*。这些是 `B⁴++` 的关键部分，因为用例表明它们是实现日出和日落时打开和关闭喂食门这一目标的元素和触发器。由于*阳光亮度水平*的任何变化都将由环境完全处理并由传感器检测到，因此你剩下*传感器*和*门*作为要纳入设计的对象。以下是\
    \ `B⁴++` 第一个版本的对象及其简短描述：\n\n`BirdFeeder`：顶层对象。鸟类喂食器有一个或多个供鸟儿进入的喂食门，以及一个用于检测光线亮度变化的传感器。`BirdFeeder`\
    \ 类需要控制对光传感器的查询以及喂食门的打开和关闭。\n\n`Sensor`：一个连接到硬件光传感器的对象，用于检测不同的光照水平。你需要查询它当前的亮度水平。\n\
    \n`FeedingDoor`：鸟类喂食器上会有几个喂食门。当收到某个触发信号时，它们必须打开和关闭。\n\n目前，类大概就这些了。现在它们都做什么？为了描述类及其组件，你可以使用另一种图表功能——*类图*。"
  raw: "Note that this process leaves out a lot of details, such as the length of\
    \ an iteration. How many features end up in an iteration? How and when do we add\
    \ new features to the feature list? How exactly do we identify objects and operations?\
    \ How do we abstract objects into classes? Where do we fix bugs that are found\
    \ in testing? Do we do reviews of code and other project work products? Leaving\
    \ out some details here is okay; we’re mostly concerned with the analysis and\
    \ design elements of the process. We’ll discuss ideas on the rest of the process\
    \ below; some of the answers are also in Chapter [3](#270563_3_En_3_Chapter.xhtml)\
    \ on project management.\n\n### Details of the OOA&D Process\n\nHow do the process\
    \ steps above fit into the software development life cycle? Well, we’re glad you\
    \ asked. Recall that the basic development life cycle has four steps:\n\n1.  Requirements\
    \ gathering and analysis\n\n2.  Design\n\n3.  Implementation and testing\n\n4.\
    \  Release, maintenance, and evolution\n\nWe can easily assign the previous ten\
    \ steps into these four buckets, as follows:\n\n1.  Requirements gathering and\
    \ analysis:\n    1.  Problem statement\n\n    2.  Feature list creation\n\n  \
    \  3.  Use case generation\n\n2.  Design:\n    1.  Break up the problem.\n\n \
    \   2.  Map features and use cases to domain objects.\n\n    3.  Identify objects,\
    \ methods, and algorithms.\n\n3.  Implementation and testing:\n    1.  Implement\
    \ this iteration.\n\n    2.  Test the iteration.\n\n    3.  If you’ve not finished\
    \ with the feature list or are out of time, go back to step 2.1, otherwise go\
    \ to step 4.\n\n4.  Release, maintenance, and evolution:\n    1.  Do final acceptance\
    \ testing and release.\n\nOnce again we can ignore the details of each step for\
    \ now. These details really depend on the process methodology you choose for your\
    \ development project. The description of the process above uses an iterative\
    \ methodology and can easily be fitted into an agile process, or a more traditional\
    \ staged release process.\n\nNote that you’ll need to revisit the requirements\
    \ whenever you get to step 4 because you’re likely to have uncovered or generated\
    \ new requirements during each iteration. Also, whenever your customer sees a\
    \ new iteration, they’ll ask for more stuff (yes, they will; trust us). This means\
    \ you’ll be updating the feature list (and reprioritizing) at the beginning of\
    \ each new iteration.\n\n## Executing the Process\n\nLet’s continue by working\
    \ through an extended example, seeing where the problem statement leads you, and\
    \ how you can tease out requirements and begin your object oriented analysis.\n\
    \n### Step 1: The Problem Statement\n\nBurt, the proud owner of Birds by Burt,\
    \ has created the ultimate in bird feeders. Burt’s Bird Buffet and Bath (B⁴),\
    \ is an integrated bird feeder and birdbath. It comes in 12 different colors (including\
    \ camo) and 1, 3, and 5 lb. capacities. It will hold up to one gallon of water\
    \ in the attached bird bath, it has a built-in hanger so you can hang it from\
    \ a tree branch or from a pole, and the B⁴ is just flying off the shelves. Alice\
    \ and Bob are desperate for a B⁴, but they’d like a few changes. Alice is a techno-nerd\
    \ and a fanatic songbird watcher. She knows that her favorite songbirds only feed\
    \ during the day, so she wants a custom B⁴ that allows the feeding doors to open\
    \ automatically at sunrise and close automatically at sunset. Burt, ever the accommodating\
    \ owner, has agreed and the hardware division of Birds by Burt is hard at work\
    \ designing the B⁴++ for Alice. Your job is to write the software to make the\
    \ hardware work.\n\n### Step 2: The Feature List\n\nThe first thing you need to\
    \ do is figure out what the B⁴++ will actually *do*. This version seems simple\
    \ enough. You can almost immediately write down three requirements:\n\n*   The\
    \ feeding doors must all open and close simultaneously.\n\n*   The feeding doors\
    \ should open automatically at sunrise.\n\n*   The feeding doors should close\
    \ automatically at sunset.\n\nSo this doesn’t seem so bad. The simplified requirements\
    \ are straightforward and there is no user interaction required. Next you’ll consider\
    \ the use cases so you can see just what the bird feeder is really going to do.\n\
    \n### Step 3: Use Cases\n\nA *use case* is a description of what a program does\
    \ in a particular situation. It’s the detailed set of steps that the program executes\
    \ when a user asks for something. Use cases always have an *actor* (some outside\
    \ agent that gets the ball rolling) and a *goal* (what the use case is supposed\
    \ to have done by the end). The use case describes what it takes to get from some\
    \ initial state to the goal, from the user’s perspective.^([^(180)](#fn180)) Here’s\
    \ a quick example of a use case for the B⁴++:\n\n1.  The sensor detects sunlight\
    \ at a 40% brightness level.\n\n2.  The feeding doors open.\n\n3.  Birds arrive,\
    \ eat, drink, and leave.\n\n4.  The sensor detects a decrease in sunlight to a\
    \ 25% brightness level.\n\n5.  The feeding doors close.\n\nGiven the simplicity\
    \ of the B4++, that’s about all you can expect out of a use case. In fact, step\
    \ 3 technically isn’t part of the use case because it isn’t part of the program,\
    \ but it’s good to have so that you can get a more complete picture of how the\
    \ B⁴++ is operating. Use cases are very useful in requirements analysis because\
    \ they give you an idea—in natural language—of what the program needs to do in\
    \ a particular situation and because they often help you uncover new requirements.\
    \ Note that in the use case you don’t talk about *how* a program does something;\
    \ you only concentrate on *what* the program has to do to reach the goal. This\
    \ can also include the inputs, outputs, and errors that occur. It can also include\
    \ alternative lists of steps for different situations (e.g., if the user makes\
    \ an error, create two alternative use cases, one for how to treat the error and\
    \ one for when the user doesn’t make the error). Most times there will be several\
    \ use cases for every program you write. Here you’ve only got one because this\
    \ version of the B⁴++ is so simple.\n\n### Step 4: Decompose the Problem\n\nSo\
    \ now that you’ve got your use case you can probably just decompose the problem\
    \ and identify the objects in the program.\n\nIf you look at the use case above\
    \ and pick out the nouns (including compound nouns), you can identify several\
    \ objects. Each of these objects has certain characteristics and contributes to\
    \ reaching the goal of making food available to the birds. While “birds” is a\
    \ noun in the use case, but they are the actors in this little play so for the\
    \ purposes of describing the objects you ignore them; they’re not really part\
    \ of the program. On a birdless day, your B⁴++ should continue to operate its\
    \ business as usual. The other nouns are *sensor, doors*, and *sunlight brightness\
    \ level*. These are the critical pieces of the B⁴++ because the use case indicates\
    \ that they are the elements and triggers that accomplish the goal of opening\
    \ and closing the feeding doors at sunrise and sunset. As any changes in *sunlight\
    \ brightness level* will be fully handled by the environment and detected by the\
    \ sensor, you are left with *sensor* and *doors* as the objects to incorporate\
    \ into your design. Here are the objects for this first version of the B⁴++ and\
    \ a short description:\n\n`BirdFeeder`: The top-level object. The bird feeder\
    \ has one or more feeding doors through which the birds can enter and a sensor\
    \ to detect changes in light brightness. The `BirdFeeder` class needs to control\
    \ the querying of the light sensor and the opening and closing of the feeding\
    \ doors.\n\n*Sensor*: An object connected to a hardware light sensor that detects\
    \ different light levels. You’ll need to query it about current light levels.\n\
    \n`FeedingDoor`: There will be several feeding doors on the bird feeder. They\
    \ have to open and close when given some trigger.\n\nThat’s probably about it\
    \ for classes at this point. Now what do they all do? To describe classes and\
    \ their components you can use another diagramming feature, a *class diagram*."
  trans: "\n请注意，这个过程省略了许多细节，例如一次迭代的时长。一次迭代最终会包含多少功能？我们如何以及何时向功能列表中添加新功能？我们究竟如何识别对象和操作？我们如何将对象抽象成类？在测试中发现的错误应该在哪里修复？我们是否会对代码和其他项目工作产品进行评审？这里省略一些细节是可以接受的；我们主要关注的是流程中的分析和设计元素。我们将在下文讨论流程其余部分的想法；部分答案也出现在关于项目管理的第\
    \ 3 章中。\n\n### OOA&D 流程的细节\n\n上述流程步骤如何融入软件开发生命周期？嗯，很高兴你问到这个问题。回顾一下，基本的开发生命周期包含四个步骤：\n\
    \n1.  需求收集与分析\n2.  设计\n3.  实现与测试\n4.  发布、维护与演进\n\n我们可以轻松地将前面的十个步骤归入这四个类别，如下所示：\n\
    \n1.  需求收集与分析：\n    1.  问题陈述\n    2.  创建功能列表\n    3.  生成用例\n2.  设计：\n    1.  分解问题。\n\
    \    2.  将功能和用例映射到领域对象。\n    3.  识别对象、方法和算法。\n3.  实现与测试：\n    1.  实现本次迭代。\n  \
    \  2.  测试本次迭代。\n    3.  如果功能列表尚未完成或时间已到，则返回步骤 2.1，否则进入步骤 4。\n4.  发布、维护与演进：\n \
    \   1.  进行最终验收测试并发布。\n\n同样，我们现在可以暂时忽略每个步骤的细节。这些细节实际上取决于你为开发项目选择的流程方法论。上述流程的描述采用迭代方法论，并且可以轻松地融入敏捷流程，或更传统的分阶段发布流程。\n\
    \n请注意，每当你进入步骤 4 时，都需要重新审视需求，因为你在每次迭代过程中很可能发现或产生了新的需求。此外，每当你的客户看到一次新的迭代时，他们都会要求增加更多功能（是的，他们会的；请相信我们）。这意味着你需要在每次新迭代开始时更新功能列表（并重新确定优先级）。\n\
    \n## 执行流程\n\n接下来，让我们通过一个详细的示例来继续，看看问题陈述会将你引向何方，以及你如何梳理出需求并开始进行面向对象分析。\n\n### 步骤\
    \ 1：问题陈述\n\n伯特，Birds by Burt 公司的自豪所有者，创造了一款终极的鸟类喂食器。伯特的“鸟之盛宴与沐浴”（B⁴）是一款集鸟类喂食器和鸟浴盆于一体的产品。它有\
    \ 12 种不同的颜色（包括迷彩色），并提供 1 磅、3 磅和 5 磅的容量规格。其附带的鸟浴盆最多可容纳一加仑水，它内置了一个挂钩，可以挂在树枝或柱子上，B⁴\
    \ 产品正在热销。爱丽丝和鲍勃非常渴望拥有一台 B⁴，但他们希望做一些改动。爱丽丝是一位技术极客，也是一位狂热的鸣禽观察者。她知道她最喜欢的鸣禽只在白天进食，所以她想要一款定制的\
    \ B⁴，能够使喂食门在日出时自动打开，并在日落时自动关闭。伯特，这位一贯体贴的老板，同意了这一要求，Birds by Burt 公司的硬件部门正在努力为爱丽丝设计\
    \ B⁴++。你的工作是编写软件，让硬件能够正常工作。\n\n### 步骤 2：功能列表\n\n你需要做的第一件事是弄清楚 B⁴++ 实际上会*做*什么。这个版本看起来足够简单。你几乎可以立刻写下三个需求：\n\
    \n*   所有喂食门必须同时打开和关闭。\n*   喂食门应在日出时自动打开。\n*   喂食门应在日落时自动关闭。\n\n所以这看起来并不难。简化的需求很直接，并且不需要用户交互。接下来，你将考虑用例，以便了解这个鸟类喂食器真正要做的事情。\n\
    \n### 步骤 3：用例\n\n*用例*是对程序在特定情况下所执行操作的描述。它是当用户请求某事时，程序执行的一系列详细步骤。用例总是有一个*参与者*（某个启动流程的外部代理）和一个*目标*（用例在结束时应该完成的事情）。用例从用户的角度描述了从某个初始状态到达目标所需经历的过程。^(¹⁸⁰)\
    \ 以下是 B⁴++ 的一个简单用例示例：\n\n1.  传感器检测到亮度为 40% 的阳光。\n2.  喂食门打开。\n3.  鸟儿到达、进食、饮水并离开。\n\
    4.  传感器检测到阳光亮度降至 25%。\n5.  喂食门关闭。\n\n鉴于 B⁴++ 的简单性，这差不多就是你能从一个用例中期望得到的所有内容。事实上，步骤\
    \ 3 严格来说并不是用例的一部分，因为它不属于程序，但保留它是有好处的，这样你可以更全面地了解 B⁴++ 是如何运作的。用例在需求分析中非常有用，因为它们能让你用自然语言了解程序在特定情况下需要做什么，并且它们通常能帮助你发现新的需求。请注意，在用例中，你不讨论程序*如何*做某事；你只关注程序*必须做什么*才能达到目标。这也可以包括输入、输出以及发生的错误。它还可以包括针对不同情况的备选步骤列表（例如，如果用户出错，则创建两个备选用例，一个用于处理错误，另一个用于用户未出错的情况）。大多数情况下，你编写的每个程序都会有多个用例。这里你只有一个，因为这个版本的\
    \ B⁴++ 非常简单。\n\n### 步骤 4：分解问题\n\n现在你已经有了用例，你可以分解问题并识别程序中的对象了。\n\n如果你查看上面的用例并找出其中的名词（包括复合名词），你可以识别出几个对象。每个对象都有特定的特征，并有助于实现为鸟类提供食物的目标。虽然“鸟儿”在用例中是一个名词，但它们是这场小戏中的参与者，因此为了描述对象，你可以忽略它们；它们实际上并不是程序的一部分。在没有鸟的日子里，你的\
    \ B⁴++ 应该继续照常运行。其他名词是*传感器*、*门*和*阳光亮度级别*。这些是 B⁴++ 的关键部分，因为用例表明它们是实现日出时打开喂食门、日落时关闭喂食门这一目标的元素和触发器。由于*阳光亮度级别*的任何变化都将完全由环境处理并由传感器检测到，因此你剩下*传感器*和*门*作为要纳入设计的对象。以下是\
    \ B⁴++ 第一个版本的对象及其简短描述：\n\n`BirdFeeder`：顶层对象。鸟类喂食器有一个或多个供鸟类进入的喂食门，以及一个用于检测光线亮度变化的传感器。`BirdFeeder`\
    \ 类需要控制对光传感器的查询以及喂食门的打开和关闭。\n\n*Sensor*：一个连接到硬件光传感器的对象，用于检测不同的光照水平。你需要查询它当前的亮度级别。\n\
    \n`FeedingDoor`：鸟类喂食器上会有几个喂食门。当收到某个触发信号时，它们必须打开和关闭。\n\n目前，类大概就这些了。现在它们都做什么呢？为了描述类及其组件，你可以使用另一种图表功能——*类图*。\n"
- fmt: '### Step 5: Class Diagrams


    A *class diagram* allows you to describe the attributes and the methods of a class.
    A set of class diagrams describe all the objects in a program and the relationships
    between the objects. You draw arrows of different types between class diagrams
    to describe the relationships. Class diagrams give you a visual description of
    the object model that you’ve created for your program. You saw a set of class
    diagrams for the Fox and Rabbit program in Chapter [7](#270563_3_En_7_Chapter.xhtml).


    Class diagrams have three sections:


    - **Name**: The name of the class

    - **Attributes**: The data fields (including names and datatypes) available to
    class instances

    - **Methods**: The set of methods (including name and visibility) available to
    class instances


    You can see an example of a class diagram for your `BirdFeeder` class in Figure
    [10-1](#270563_3_En_10_Chapter.xhtml#Fig1).


    ![](images/270563_3_En_10_Chapter/270563_3_En_10_Fig1_HTML.jpg)


    A class diagram illustrates Bird Feeder. Three blocks has the following texts.
    Bird Feeder. light Level semicolon integer. operate open bracket, close bracket.


    **Figure 10-1** The `BirdFeeder` class


    The diagram shows that the `BirdFeeder` class has a single integer attribute,
    `lightLevel`, and a single method, `operate()`. By themselves class diagrams aren’t
    terribly interesting, but when you put several of them together and show the relationships
    between them, then you can get some interesting information about your program.
    So what else do you need in the way of class diagrams? In your program, the `BirdFeeder`
    class uses the `FeedingDoor` and `Sensor` classes, but they don’t know (or care)
    about each other. In fact, while `BirdFeeder` knows about `FeedingDoor` and `Sensor`
    and uses them, they don’t know they are being used. Ah, the beauty of object-oriented
    programming. This relationship can be expressed in the class diagram of all three
    classes shown in Figure [10-2](#270563_3_En_10_Chapter.xhtml#Fig2).


    ![](images/270563_3_En_10_Chapter/270563_3_En_10_Fig2_HTML.jpg)


    A diagram illustrates the relationship between three classes, such as Bird Feeder,
    Feeding Door, and sensor.


    **Figure 10-2** `BirdFeeder` uses `FeedingDoor` and `Sensor`


    In this figure, the dotted line with the open arrow at the end indicates that
    one class (in your case, `BirdFeeder`) is *associated* with another class (in
    your case, either `FeedingDoor` or `Sensor`) by *using* it.


    ### Step 6: Code Anyone?


    Now that you’ve got the class diagrams and know the attributes, the methods, and
    the association between the classes, it’s time to flesh out your program with
    some code.


    In the `BirdFeeder` object, the `operate()` method needs to check the light levels
    and open or close the feeding doors depending on the current light level reported
    by the `Sensor` object. It does nothing if the current light level is above or
    below the threshold values.


    In the `Sensor` object, the `getLevel()` method just reports back the current
    level from the hardware sensor.


    In the `FeedingDoor` object, the `open()` method checks to see if the doors are
    closed. If they are, it opens them and sets a boolean to indicate that they’re
    open. The `close()` method does the reverse.


    Here’s the code for each of the classes described.


    ```

    /**

    * class BirdFeeder

    *

    * @author Agile Programmer

    * @version 1.0

    */

    import java.util.ArrayList;

    import java.util.Iterator;

    public class BirdFeeder {

    /* instance variables */

    private static final int ON_THRESHOLD = 40;

    private static final int OFF_THRESHOLD = 25;

    private int lightLevel;

    private Sensor s1;

    private ArrayList doors = null;

    /*

    * Default Constructor for objects of class BirdFeeder

    */

    public BirdFeeder() {

    doors = new ArrayList();

    /* initialize lightLevel */

    lightLevel = 0;

    s1 = new Sensor();

    /* by default we have a feeder with just one door */

    doors.add(new FeedingDoor());

    }

    /*

    * The operate() method operates the birdfeeder.

    * It gets the current lightLevel from the Sensor and

    * checks to see if we should open or close the doors

    */

    public void operate() {

    lightLevel = s1.getLevel();

    if (lightLevel > ON_THRESHOLD) {

    Iterator door_iter = doors.iterator();

    while (door_iter.hasNext()) {

    FeedingDoor a = (FeedingDoor) door_iter.next();

    a.open();

    System.out.println("The door has opened.");

    }

    } else if (lightLevel < OFF_THRESHOLD) {

    Iterator door_iter = doors.iterator();

    while (door_iter.hasNext()) {

    FeedingDoor a = (FeedingDoor) door_iter.next();

    a.close();

    System.out.println("The door has closed.");

    }

    }

    }

    }

    /**

    * class FeedingDoor

    *

    * @author Agile Programmer

    * @version 1.0

    */

    public class FeedingDoor {

    /* instance variables */

    private boolean doorOpen;

    /*

    * Default constructor for objects of class FeedingDoors

    */

    public FeedingDoor() {

    /* initialize instance variables */

    doorOpen = false;

    }

    /*

    * open the feeding doors

    * if they are already open, do nothing

    */

    public void open( ) {

    /** if the door is closed, open it */

    if (doorOpen == false) {

    doorOpen = true;

    }

    }

    /*

    * close the doors

    * if they are already closed, do nothing

    */

    public void close( ) {

    /* if the door is open, close it */

    if (doorOpen == true) {

    doorOpen = false;

    }

    }

    /*

    * report whether the doors are open or not

    */

    public boolean isOpen() {

    return doorOpen;

    }

    }

    /**

    * class Sensor

    *

    * @author Agile Programmer

    * @version 1.0

    */

    public class Sensor {

    /* instance variables */

    private int lightLevel;

    /*

    * Default constructor for objects of class Sensor

    */

    public Sensor() {

    /** initialize instance variable */

    lightLevel = 0;

    }

    /**

    * getLevel - return a light level

    *

    * @return the value of the light level

    * that is returned by the hardware sensor

    */

    public int getLevel( ) {

    /* till we get a hardware light sensor, we just fake it */

    lightLevel = (int) (Math.random() * 100);

    return lightLevel;

    }

    }

    ```


    Finally, you have a `BirdFeederTester` class that operates the B⁴++.


    ```

    /**

    * The class that tests the BirdFeeder, Sensor, and

    * FeedingDoor classes.

    *

    * @version 0.1

    */

    public class BirdFeederTester {

    private BirdFeeder feeder;

    /*

    * Constructor for objects of class BirdFeederTest

    */

    public BirdFeederTester() {

    this.feeder = new BirdFeeder();

    }

    public static void main(String [] args) {

    BirdFeederTester bfTest = new BirdFeederTester();

    for (int i = 0; i < 10; i++) {

    System.out.println("Testing the bird feeder");

    bfTest.feeder.operate();

    try {

    Thread.currentThread().sleep(2000);

    } catch (InterruptedException e) {

    System.out.println("Sleep interrupted" + e.getMessage());

    System.exit(1);

    }

    }

    }

    }

    ```


    When Alice and Bob take delivery of the B⁴++ they are thrilled. The doors automatically
    open and close, the birds arrive and eat their fill. Birdsong fills the air. What
    else could they possibly want?


    ## Conclusion


    Object-oriented design is a methodology that works for a very wide range of problems.
    Solutions to many problems in the real world are easily characterized as groups
    of cooperating objects. This single simple idea promotes simplicity of design,
    reuse of both designs and code, and the ideas of encapsulation and information
    hiding that Parnas advocated in his paper on modular decomposition.^([^(181)](#fn181))
    It’s not the right way to solve some problems, including problems like communications
    protocol implementations, but it opens up a world of new and better solutions
    for many others and it closes the “intellectual distance” between the real-world
    description of a problem and the resulting code.'
