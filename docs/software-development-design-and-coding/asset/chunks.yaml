  trans: '

    #### 敏捷框架 - Scrum：迈向下一短期目标的迭代冲刺


    Scrum 的名称源于橄榄球运动，其中 *scrum*（争球）是一种在犯规后重新开始比赛的方式：橄榄球队中的 8 名前锋（在英式橄榄球联盟的 15 人制比赛中）试图（重新）获得对球的控制权，并将其向前推进至对方球门线。敏捷
    Scrum 方法论的理念是，一个小团队围绕一个共同目标团结起来，通过一系列开发冲刺（sprints）逐步向该目标迈进。


    Scrum 的原始流程管理理念源于 Takeuchi 和 Nonaka 于 1986 年发表的论文《新新产品开发游戏》^(²⁷)，而“Scrum”一词的首次使用则归功于
    DeGrace 和 Stahl 于 1990 年出版的著作《棘手问题，正当解决方案》^(²⁸)。


    与其他*敏捷*方法论一样，Scrum 强调小团队、直接沟通、迭代开发、从频繁反馈中学习以及集体所有制的有效性。Scrum 的独特之处在于其对团队管理的关注，以及其明确的时间盒式开发周期结构，称为*冲刺*。每个*冲刺*都有预定的持续时间（通常为
    1-4 周），并有一个固定不变的交付日期。需要交付的工作范围必须根据此交付日期进行选择，同时确保在每个冲刺中都能向客户交付下一个最小可行产品（MVP）。每个*冲刺*的目标是提供一个原型，展示你对客户需求的最新理解以及交付解决方案的计划。展示这个原型（无论多么简陋）可以让你开始讨论哪些理解是正确的，哪些需要调整。确保这种情况尽早发生，可以限制在进一步开发之前为进行必要调整而需要返工的工作量。因此，*冲刺*“旨在创造条件，以便更早地做出更好的决策。”^(²⁹)


    ##### Scrum 角色


    Scrum 在开发项目中明确定义了三个角色：


    *产品负责人*是生成产品需求并确定其优先级的人。这些需求通常以*用户故事*的形式呈现，这些是可以概括为“作为<某类用户>，我们希望<做某事>，以便<创造某种价值>”等句子的功能特性。产品负责人将用户故事添加到产品待办列表（Product
    Backlog）中并确定其优先级。产品负责人还负责确保团队理解用户故事背后的需求。


    *Scrum Master* 是 Scrum 专家，通过指导团队遵循 Scrum 价值观和实践（例如每日站会）来促进开发，帮助团队自我组织（例如，通过提高透明度），帮助解决内部和外部的障碍，并在冲刺期间保护团队免受外部影响。Scrum
    Master 绝不是团队领导/经理，因为 Scrum 团队是平等的团队，通过共识达成决策。


    *开发团队*包括所有其他成员：设计师、开发人员、文档工程师等。团队审查由产品负责人生成并确定优先级的用户故事，将每个最高优先级的用户故事转化为一个或多个任务，这些任务建议了如何开发必要的功能以交付价值。团队选择一组可以在给定冲刺周期内完成的故事和任务，通过共同决定谁将负责哪些任务以及他们将采用何种开发流程来进行自我组织。无论任务分配如何，团队集体拥有所有代码和项目，共同目标是在每个冲刺结束时交付下一个可运行的
    MVP。


    ##### Scrum 工件


    Scrum 的需求被封装在两个待办列表中：


    *   *产品待办列表*是项目所有需求的优先级列表。产品负责人根据期望的*产品目标*，创建由用户故事组成的产品待办列表并确定其优先级。开发团队将高优先级的用户故事分解为任务并进行估算。这个任务列表就成为了*冲刺待办列表*。


    *   *冲刺待办列表*是当前冲刺的用户故事优先级列表。冲刺开始后，只有开发团队可以向冲刺待办列表添加任务；这些通常是测试过程中发现的缺陷。任何外部实体都不能向冲刺待办列表添加条目，只能添加到产品待办列表。冲刺待办列表的核心是*冲刺目标*：团队遵循的指路明灯；冲刺期间的任何变更都应保护此目标。


    *   *增量*是对产品目标的贡献，意味着达到了*完成的定义*，这是由组织（或团队，如果未另行定义）决定的正式质量衡量标准。在单个冲刺期间，可能有多个待办项达到“完成”状态。


    ##### Scrum 看板


    在大多数 Scrum 团队中，冲刺待办列表是*可视化的*，为每个人提供关于冲刺工作进展状态的清晰共享视图。它通过使用便利贴或索引卡在看板上呈现，每张便签或卡片代表一个任务；它也可以是在线虚拟看板（例如
    Trello、Jira、Notion 或 Pivotal Tracker）。这个*任务看板*，如图 2-4 所示，通常至少包含三列：*待办*、*进行中*和*已完成*，但更常见的是还包括*产品待办列表*、*冲刺待办列表*以及用于测试的列，如*质量保证/评审*。在冲刺开始时，开发团队从*产品待办列表*中选择一些最高优先级的条目，并将它们移动到*冲刺待办列表*。然后这些条目被分解为任务，成为冲刺的*待办*项。这些任务将在看板上移动，直到完全开发、测试并集成到代码库后，到达*已完成*列。


    ![](img/270563_3_En_2_Fig4_HTML.jpg)


    一个标题为“冲刺目标”的表格，包含产品待办列表、冲刺待办列表、待办、进行中、质量保证和已完成等列。用户故事 A 和 B 从产品待办列表移动到冲刺待办列表的过程在开始时被标示出来。任务
    1 到 5 在冲刺期间移动。


    图 2-4


    一个通用的单冲刺 Scrum 看板。深色箭头表示冲刺规划期间条目的移动；浅色箭头表示冲刺期间条目的移动


    ##### Scrum 价值观


    为了促进敏捷自组织团队所需的团队合作，Scrum 依赖于个体践行以下价值观：^(³⁰)


    *   对共同目标和彼此做出承诺


    *   专注于冲刺目标和冲刺待办列表


    *   对工作和挑战（包括人际方面）保持开放态度


    *   尊重彼此作为独立的个体，以及作为能够为共同目标做出贡献的成员


    *   有勇气处理困难任务，进行艰难的对话，并通常“做正确的事”

    '
- fmt: '### Scrum Ceremonies


    Scrum teams have several types of meetings that help the team self-organize.


    **Sprint planning**: An initial planning phase that creates the product list of
    the initial requirements, decides on an architecture for implementing the requirements,
    divides the user stories into prioritized groups for the sprints, and breaks the
    first set of user stories into tasks to be estimated and assigned. They stop when
    their estimates occupy all the time allowed for the sprint. Tasks in a sprint
    should not be longer than one day of effort and ideally can be accomplished in
    one sitting (to avoid task switching). If a task is estimated to take more than
    one day of effort, it is successively divided into two or more tasks until each
    task’s effort is the appropriate length. This rule comes from the observation
    that humans are terrible at doing exact estimations of large tasks and that estimating
    task efforts in weeks or months is basically just a guess. So breaking tasks down
    into smaller pieces gives the team a more reliable estimate for each.


    **The daily stand-up** is a short meeting (15–30 minutes; the shorter the better)
    where the entire team discusses sprint progress. The daily scrum meeting allows
    the team to share information and track sprint progress. By having daily scrum
    meetings, any slip in the schedule or any problems in implementation are immediately
    obvious and can then be addressed by the team at once. “The Scrum Master ensures
    that everyone makes progress, records the decisions made at the meeting and tracks
    action items, and keeps the scrum meetings short and focused.”^([^(31)](#fn31))
    During the daily stand-up, each team member answers the following three questions
    in turn:


    > *How have you furthered development since the last meeting?*

    > *How will you further development between now and the next meeting?*

    > *Is anything standing in your way?*


    Note that the wording of these questions may be tweaked slightly, but the sentiment
    must remain. Discussions other than responses to these three questions are deferred
    to other meetings. Daily stand-ups are crucial to help everyone track progress
    towards the shared Spring Goal, facilitate collaboration, and improve accountability
    and engagement.


    **The sprint review** happens at the end of each sprint, presenting the newly
    developed MVP to the product owner (commonly as a demo), who may perform acceptance
    testing on it. The meeting “reviews” everything that has been “Done” this sprint
    as part of fulfilling the Spring Goal, as well what was left out and why.


    **The sprint retrospective** is held after the sprint review to “retrospect” on
    how the team worked together: their processes, communication, collaboration mechanics,
    meeting expectations, etc., searching for areas in which they can improve performance
    for the next sprint. Retrospectives are a crucial tool for improvement, as they
    are responsible for the agile iterative improvement of the teamwork itself. The
    retrospective marks the official end of the current sprint.


    **Backlog refinement** or **story time** meetings are held periodically throughout
    the sprint (such as once a week) in order to refine backlog items, ensuring they
    are ready for future sprint planning. Product owner participates by adding and
    (re)prioritizing stories, and developers participate by breaking down high priority
    stories into tasks.


    Although sprints usually end at the end of the predefined sprint period, a sprint
    can be terminated early if all work planned for the sprint has been completed.
    While new work could be added, it is generally most suitable to go through all
    the end-of-sprint and sprint-planning procedures in order to properly review what
    was done, retrospect on how it was done, and plan next development steps.


    ### Scrum Velocity


    With most teams, estimates of tasks become better as the project progresses, primarily
    because the team now has data on how they have done when estimating on previous
    sprints. The measure of the amount of work completed in a single sprint is called
    **velocity**. Over time, this allows the team decide how many tasks to include
    in each sprint. With meaningful retrospectives and the resulting iterative improvements
    to the team’s processes and practices, velocity should increase over time as the
    team becomes better at breaking down and assigning tasks, creating accurate estimates
    of the work needed for each task, as well as at collaborating with each other.


    ### Scrum End of Project


    After the last scheduled development sprint, a final sprint may be done to bring
    closure to the project. This sprint implements no new functionality, but prepares
    the final deliverable for product release. It fixes any remaining bugs, finishes
    documentation, and generally productizes the code. Any requirements left in the
    product backlog are transferred to the next release. A Scrum retrospective is
    held before the next sprint begins to ponder the previous sprint and see if there
    are any process improvements that can be made.


    ## Agile Framework - Kanban: Continuous Flow with Limited Current


    The Kanban Method is a practice derived from Lean manufacturing (the Toyota Production
    System) and other change management systems; it draws most of its original ideas
    from the just-in-time manufacturing processes. Kanban is more methodology than
    process; it is an objective and a set of principles and practices to meet that
    objective.'
