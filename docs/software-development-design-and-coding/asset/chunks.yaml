    One more thing about the functional specification: don’t obsess. Chances are that
    you’ll do a good job of picking out requirements and writing them down in the
    functional spec, but that it won’t be as detailed as you like and it won’t be
    complete. Don’t worry. The only time a functional specification is complete is
    when you ship the release. Don’t spend time trying to get every single detail
    correct; don’t spend time trying to tease every requirement out of your customer.
    It just won’t happen. Set a time limit, do your best, and let it go. You don’t
    want to have a bunch of developers sitting around twiddling their thumbs with
    nothing to do, waiting for the spec, do you? Also, keep in mind that software
    development is a wicked problem, so our requirements need only to be satisfactory
    and sufficient. We are satisficing, as optimizing software development is not
    realistic.


    ## Gathering Requirements in an Agile Project


    First things first: in an agile development project, there is no formal functional
    specification. That is because agile developers recognize from the beginning that
    the requirements will change, so they should embrace change and defer making decisions
    about requirements and design as long as possible. Also, because in an agile project
    the customer is an integral part of the team, the agile developers also know that
    they can get immediate feedback on feature implementations and they can get timely
    updates on requirements from the customer. This doesn’t necessarily make the process
    of gathering requirements any easier, but it gives everyone more confidence that
    the current set of requirements is the right set.


    For most agile methodologies, the key idea in requirements gathering is the *user
    story*. The user story is just that: a description of some feature or scenario
    that the customer wants to execute in order to get some type of work done. The
    classic way to describe the contents of a user story is to say


    “*As a <role>, I want to do <action>, so that <reason/benefit>*.”


    By expressing a user story this way, you get to the *who*, *what*, and *why* of
    the requirement.


    ### Agile Requirements Gathering: The Three Cs


    A user story has three fundamental components, expressed by Ron Jeffries in 2001^([^(137)](#fn137)):
    the card, the conversation, and the confirmation.


    #### Card


    All user stories are written on *cards*. A card can be a Post-It note, an index
    card, a piece of paper, or even a digital card. Basically, it can be any physical
    or digital 2D rectangle that can be moved across some physical or digital board.
    While the card contains the text of the story “As a <role> I want to <action>
    so that <benefit/result>,” it is really an invitation to a collaborative conversation
    about what the story really means and what the user really wants. Note that the
    card is not generally very detailed; it typically only contains an outline of
    the story. It’s a placeholder for the real requirement that will be subsequently
    hashed out. Stakeholders can, however, write on the card, adding estimates, questions,
    etc.


    #### Conversation


    The *conversation* about a user story takes place between all the important stakeholders
    in the project, the product owner or user, the development team, the testers,
    marketing folks, and maybe others. This is a substantive discussion about what
    the product owner really wants from the story. The conversation is ideally held
    in person (or the closest available technological approximation) and the discussion
    includes more details about the story, possibly estimates of size, and an estimate
    of the relative priority of the story. The conversation may also include breaking
    the original story into two or more smaller stories, if the initial estimates
    indicate the effort to implement the story may be too large (stories that can
    be finished in one working session are ideal, but no story should exceed the planned
    length of an individual development Sprint, although its future iterations might).


    #### Confirmation


    The last component of a user story is *confirmation*. The user or product owner
    provides this information in the form of *acceptance criteria* for the story,
    usually written on the back of the card as a short bullet list. These criteria
    become the *acceptance tests* that the product owner will use to confirm that
    the implementation of the story is acceptable to the user. The best way to create
    acceptance tests is for the product owner to generate examples of the story in
    use and then for the development team to automate the examples. This way, the
    product owner can execute the acceptance tests on the delivered feature and confirm
    whether the implementation works or not.


    ### Agile Requirements Gathering: INVEST in Stories


    If we are to structure our development around user stories, how do we make sure
    that our user stories are good? A lot of the details of a user story come out
    during the conversation and the confirmation, but those details do not directly
    help us judge the *quality* of the story nor its overall usefulness. Bill Wake
    laid out the characteristics of a good user story using the acronym INVEST^([^(138)](#fn138)):'
  trans: '

    #### 未决问题


    当你初次编写功能规格说明书时，总会有一两个甚至二十个你不知道的问题。这很正常。只需将它们放入“未决问题”部分即可。然后，每次与客户会面时，都指向这一部分并尝试获取答案。在得到这些答案后，其中一些问题会移至需求部分，而另一些则会进入“非需求”部分。不过，到项目结束时，这一部分应该清空。如果没有，那么，你就有一些会困扰你的问题了。


    ### 收集需求：设计与新功能构想


    如果你和大多数开发者一样，在收集和分析需求的过程中，你会一直在脑海中尝试设计和编写程序代码。这正是开发者会做的事。开发者和项目经理通常会创建两种类型的笔记：一种是包含设计或编码思路的技术笔记，供开发者使用；另一种是包含功能想法的营销笔记，供营销人员和客户参考。因此，为了不忘记在需求阶段产生的设计和实现想法，请单独准备一个笔记本。这个笔记本只是一个独立的文档，用于记录后续的笔记。理想情况下，它是一个与整个团队共享的文档。


    最后，随着项目进入开发阶段，新的需求和功能会不断涌现。这种情况总是会发生。但如果你想按计划推进并交付可用的产品，你*绝不能*实现所有出现的新需求。如果你希望保持需求的最新状态，你需要一个地方来存放所有后续要完成的任务。这就是*待办事项列表*的用途，它包含了你在产品下一个版本中将要考虑的所有需求。这能为你带来几个好处。它告诉客户你没有忘记这些功能，并且通过将它们移至下一个版本，你承诺会尽可能按照已公布的时间表交付当前版本。同时，它也向开发者表明你并未失控，项目有很大机会高质量、按时完成。关于待办事项列表的更多信息，请参阅第
    2 章中关于 Scrum 敏捷方法论的任何描述。^(¹³⁶)


    ### 收集需求：还有一件事


    关于功能规格说明书还有一件事：不要过度纠结。你很可能会很好地挑选出需求并将其写入功能规格说明书中，但它可能不会像你希望的那样详细，也不会是完整的。别担心。功能规格说明书只有在发布版本时才算完整。不要花时间试图让每一个细节都正确无误；也不要花时间试图从客户那里挖掘出每一个需求。这根本不可能实现。设定一个时间限制，尽力而为，然后放手。你总不希望一群开发者无所事事地干坐着，等待规格说明书吧？另外，请记住，软件开发是一个棘手的问题，因此我们的需求只需令人满意且足够充分即可。我们追求的是“满意化”，因为优化软件开发是不现实的。


    ## 在敏捷项目中收集需求


    首先要明确一点：在敏捷开发项目中，没有正式的功能规格说明书。这是因为敏捷开发者从一开始就认识到需求会发生变化，所以他们应该拥抱变化，并尽可能推迟对需求和设计的决策。此外，由于在敏捷项目中，客户是团队不可或缺的一部分，敏捷开发者也知道他们可以立即获得关于功能实现的反馈，并能及时从客户那里获得需求的更新。这并不一定使收集需求的过程变得更容易，但它让每个人都更有信心，相信当前的需求集合是正确的集合。


    对于大多数敏捷方法论来说，需求收集的核心概念是*用户故事*。用户故事正是如此：对客户为了完成某种工作而想要执行的某个功能或场景的描述。描述用户故事内容的经典方式是：


    “*作为一个<角色>，我想要执行<动作>，以便<原因/收益>*。”


    通过这种方式表达用户故事，你就明确了需求的*谁*、*什么*和*为什么*。


    ### 敏捷需求收集：三个 C


    一个用户故事有三个基本组成部分，由 Ron Jeffries 在 2001 年提出^(¹³⁷)：卡片（Card）、对话（Conversation）和确认（Confirmation）。


    #### 卡片


    所有用户故事都写在*卡片*上。一张卡片可以是一张便利贴、一张索引卡、一张纸，甚至是一张数字卡片。基本上，它可以是任何物理或数字的二维矩形，能够在某个物理或数字看板上移动。虽然卡片上包含故事文本“作为一个<角色>，我想要执行<动作>，以便<收益/结果>”，但它实际上是对一次协作对话的邀请，旨在探讨故事的真实含义以及用户的真实需求。请注意，卡片通常不会非常详细；它通常只包含故事的概要。它是一个占位符，代表后续将详细讨论的真正需求。不过，利益相关者可以在卡片上书写，添加估算、问题等内容。


    #### 对话


    关于用户故事的*对话*发生在项目中所有重要的利益相关者之间，包括产品负责人或用户、开发团队、测试人员、营销人员，可能还有其他人。这是一次实质性的讨论，探讨产品负责人真正想从故事中得到什么。理想情况下，对话是面对面进行的（或使用最接近的技术手段），讨论内容包括故事的更多细节，可能还有规模估算，以及故事相对优先级的评估。如果初步估算表明实现该故事的工作量可能过大（理想情况下，故事应能在一次工作会话中完成，但任何故事都不应超过单个开发冲刺的计划时长，尽管其未来的迭代可能会），对话也可能包括将原始故事拆分成两个或更多更小的故事。


    #### 确认


    用户故事的最后一个组成部分是*确认*。用户或产品负责人以故事的*验收标准*形式提供此信息，通常以简短的要点列表形式写在卡片背面。这些标准将成为*验收测试*，产品负责人将使用这些测试来确认故事的实施是否被用户接受。创建验收测试的最佳方式是让产品负责人生成故事使用中的示例，然后由开发团队将这些示例自动化。这样，产品负责人就可以在交付的功能上执行验收测试，并确认实现是否有效。


    ### 敏捷需求收集：用 INVEST 原则评估故事


    如果我们要围绕用户故事来构建我们的开发，我们如何确保我们的用户故事是好的呢？用户故事的许多细节会在对话和确认过程中浮现出来，但这些细节并不能直接帮助我们判断故事的*质量*或其整体有用性。Bill
    Wake 使用首字母缩略词 INVEST^(¹³⁸) 阐述了优秀用户故事的特征：

    '
- fmt: '### Independent


    The idea here is that your user stories should be *independent* *of each other*,
    (i.e. each able to be scheduled and implemented separately from any other user
    story, even if it ended up taking several agile iterations to fully implement).
    Wake gives the example of a multi-layered cake: if you take a slice out of the
    cake, you can eat (implement) just that one slice, independently of any other.
    This may not always be possible; think of things like the radio software in a
    mobile phone. In order to fully test the user interface embodied in a user story,
    you may have to have all of the radio software working first. You’ll see this
    same idea later on as loose coupling in object-oriented design.


    ### Negotiable


    A good story leaves room for all stakeholders to *negotiate* *the details* of
    its implementation. The story provides the essence of the requirement but is not
    so specific that it reads like a contract. Rather, it provides the developer with
    a goal, while allowing the owner and the developer to jointly create a workable
    interpretation that will allow for a feasible and satisfactory implementation.


    ### Valuable


    A good user story must be *valuable* *to the customer*. It must describe a feature
    or a service that the customer wants. Since user stories will be scheduled and
    implemented in a development iteration, they must add value to the product after
    each iteration. In addition, if the team decides a user story is too large (see
    “Small” below) and must be split into multiple stories, each of them must provide
    value to the customer. This idea gives the development team guidance on how to
    split stories—based on value to the customer, not on technology.


    ### Estimable


    User stories must be able to be *estimated*, allowing the product owner to assign
    a relative priority to each story. Estimation is part of the negotiation in the
    conversation and is also the first step in decomposing the story into implementable
    tasks. If the development team struggles to estimate a story or if the estimated
    effort required for its implementation is too large, then the story is likely
    too large and should be broken down.


    ### Small


    Good user stories should be *small*, allowing for story independence, facilitating
    negotiability, clarifying value determination, simplifying effort estimation,
    and streamlining testing. Ideally, a user story should be implementable in a single
    sprint or iteration, immediately adding value to the customer. Small stories also
    allow the development team to decompose them into a number of small tasks—ideally
    of 8 person-hours or less of effort. To reduce overhead of re-estimation as requirements
    change, you can focus on estimating only the high priority stories, ensuring they
    are ready for implementation. As a story moves up in the product backlog, its
    importance will increase until a detailed estimate of its effort and task breakdown
    is warranted. If at that time the story is larger than a single iteration, you
    should attempt splitting it into smaller stories.


    ### Testable


    Good stories must be *testable*. In agile, this practice is usually implemented
    using Test-Driven Development: 1) the developers will implement unit tests to
    determine whether a yet-to-be-implemented feature functions as expected (it doesn’t,
    yet) and 2) the feature is then developed and tested repeatedly until it passes
    all unit tests. The *testable* characteristic also allows the development team
    to test any non-functional requirements (performance, response time, usability,
    etc.).


    This harkens back to the plan-driven idea of *traceability*. Once implemented,
    you should be able to trace a feature back through the implementation and design
    and into the original requirements. Based on the initial requirements discussed
    in the conversation about the user story, the product owner writes the acceptance
    criteria, which translate into acceptance tests used to confirm that the user
    story is implemented satisfactorily. This is typically the definition of “done”
    in an agile environment. If the product owner is unsure or unclear about how to
    write the acceptance criteria for a given user story, this may mean that the story
    details are unclear and the story conversation should be restarted to clear up
    any confusion.


    ## Agile Requirements Gathering: The Product Backlog


    At this point, the total number of user stories generated by the product owner
    and agreed upon by the development team is added to a list of the total number
    of things that need to be done to create the product. This is known as the *product
    backlog*. Where a plan-driven process team will have a long, detailed document—the
    functional specification—an agile product team will have a stack of cards that
    ends up defining the product. This stack of cards is only preliminary, though.
    As the development process moves along, an agile product team will be adding,
    removing, and dividing user story cards constantly. The product owner will be
    the primary person doing this job and it’s the product owner’s job to decide when
    the product is done and should be released. There may still be cards left in the
    stack when a product is released. Those cards are destined for the next product
    effort.


    ## Agile Requirements Gathering: SMART Tasks


    Once the team agrees on a set of user stories and adds them to the product backlog,
    the developers can begin planning for the next iteration or sprint. This planning
    includes taking each user story and breaking it down into a set of implementable
    tasks that are easy to estimate and whose effort requires a relatively short amount
    of developer time. In short, tasks are the work to be done in order to implement
    user stories.


    Decomposing stories into tasks is the work of the development team, not the product
    owner, and it takes place during planning out the next iteration or sprint. The
    estimates for the tasks are added up until the amount of effort reaches the amount
    of time available to the team in the next iteration. In Scrum, tasks can be assigned
    point values based on their perceived required effort: the more effort, the higher
    the point value. The team will add up the effort points for the high priority
    tasks until the point value reaches the team’s average velocity. These tasks are
    then presented to the product owner, who either approves the list of work to be
    done or suggests changes by changing the priorities of stories in the product
    backlog. Eventually everyone agrees on the stories and tasks for the iteration
    and work can begin.


    In order to perform this story decomposition and task effort estimation, the team
    must be able to identify tasks within stories and write them out on cards so they
    can be put on a task or Kanban board. Each task must meet certain goals, characterized
    by the acronym SMART: specific, measurable, achievable, relevant, and time-boxed.


    ### Specific


    While user stories are defined in a way that leaves room for interpretation and
    negotiation, the tasks generated from each story must be maximally specific to
    facilitate implementation, including any relevant details about the necessary
    data structures or user interfaces. Generating specific tasks is also likely to
    uncover hidden requirements or unforeseen complexities in the stories. This can
    lead to a reconsideration of the requirements and a renewed conversation about
    the current story, as well as to the creation of a new user story that will then
    get put in the product backlog.


    ### Measurable


    The team needs to know when each task can be considered *done*. Each team will
    have a different definition of *done*, but it should include things like “the
    feature works as listed on the task,” “all the unit tests pass,” and “the code
    has been reviewed and integrated.”'
