- fmt: "# The Dependency Inversion Principle (DIP)\n\nRobert C. Martin introduced\
    \ the Dependency Inversion Principle in his C++ Report and later in his classic\
    \ book *Agile Software Development*,^([^(200)](#fn200)) where he defined DIP as:\n\
    \n1. High-level modules should not depend on low-level modules. Both should depend\
    \ on abstraction.\n2. Abstractions should not depend on details. Details should\
    \ depend on abstractions.\n\nThe simple version of this is: don’t depend on concrete\
    \ classes—depend on abstractions. Martin’s contention is that object-oriented\
    \ design is the inverse of traditional structured design. In structured design,\
    \ as you saw in Chapter [9](#270563_3_En_9_Chapter.xhtml), one either works from\
    \ the top down, pushing details and design decisions as low in the hierarchy of\
    \ software layers as possible, or one works from the bottom up, designing low-level\
    \ details first and later putting together a set of low-level functions into a\
    \ single higher-level abstraction. In both of these cases, the higher-level software\
    \ depends on decisions that are made at the lower levels, including interface\
    \ and behavioral decisions.\n\nMartin contends that for object-oriented design\
    \ this is backward. The Dependency Inversion Principle implies that higher-level\
    \ (more abstract) design levels should create an interface that lower (more concrete)\
    \ levels should code to. This will mean that as long as the lower level (concrete)\
    \ classes *code to the interface* of the upper level abstraction, the upper level\
    \ classes are safe. As Martin puts it, “The modules that contain the high-level\
    \ business rules should take precedence over, and be independent of, the modules\
    \ that contain the implementation details. High-level modules simply should not\
    \ depend on low-level modules in any way.”^([^(201)](#fn201))\n\nHere’s a simple\
    \ example. Traditionally, in structured design you write many programs with the\
    \ general format of the following:\n\n1. Get input data from somewhere.\n2. Process\
    \ the data.\n3. Write output data to somewhere else.\n\nIn this example, the `Processor`\
    \ uses the `Collector` to get data, it then packages the data and uses the `Writer`\
    \ to write the data to, say, a database. If we draw this out, we get something\
    \ that looks like Figure [12-13](#270563_3_En_12_Chapter.xhtml#Fig13).\n\n![](images/270563_3_En_12_Chapter/270563_3_En_12_Fig13_HTML.jpg)\n\
    \nA UML diagram consists of 3 classes representing a `Processor`, `Collector`,\
    \ and `Writer`, connected by dashed lines, indicating a relationship between the\
    \ classes.\n\n**Figure 12-13** – A traditional input-process-output model\n\n\
    One problem with this implementation is that the `Processor` must create and use\
    \ the `Writer`, whose interface and parameter types the `Processor` must know\
    \ in order to write correctly. This means that the `Processor` must be written\
    \ to a concrete implementation of a `Writer` and so must be rewritten if we want\
    \ to change what kind of `Writer` we want. Say the first implementation writes\
    \ to a `File`; if we then want to write to a printer or a database, we need to\
    \ change `Processor` every time. This is not very reusable. The Dependency Inversion\
    \ Principle says that the `Processor` should be coded to an interface (an abstract\
    \ `Writer`) and then the interface is implemented in separate concrete classes\
    \ for each type of `Writer` destination. The resulting design looks like Figure\
    \ [12-14](#270563_3_En_12_Chapter.xhtml#Fig14).\n\n![](images/270563_3_En_12_Chapter/270563_3_En_12_Fig14_HTML.jpg)\n\
    \nA UML class diagram represents a `Processor` with dashed lines to a `Collector`\
    \ and an interface named `Writer`, which is connected to two classes, `FileWriter`\
    \ and `PrintWriter`.\n\n**Figure 12-14** – Using an interface to allow different\
    \ writer implementations\n\nIn this way, different writers can be added and as\
    \ long as they adhere to the interface, `Processor` never needs to change. Note\
    \ that we can do the same thing with the `Collector`. Note also that the DIP is\
    \ closely related to Principle #2: Code to an Interface.\n\n# The Interface Segregation\
    \ Principle (ISP)\n\nThis principle tells us that clients shouldn’t have to depend\
    \ on interfaces they don’t use. In particular, they shouldn’t have to depend on\
    \ *methods* they don’t use.^([^(202)](#fn202))\n\nWe’ve talked a lot about interfaces\
    \ in this chapter—coding to interfaces, using interfaces to abstract out common\
    \ details, and so on. We use interfaces to make our code more flexible and maintainable.\
    \ So overall, interfaces are a great thing, when used judiciously.\n\nOne of the\
    \ greatest temptations with respect to interfaces is to make them bigger. Expanding\
    \ an interface can allow it to be implemented by more classes. However, when you\
    \ start adding new methods to your interface because one of the subclasses that\
    \ implement the interface needs it, while others do not, you make your interfaces\
    \ less cohesive, and begin to violate the Interface Segregation Principle. By\
    \ “generalizing” an interface too much, you are moving away from that single lightning\
    \ bolt of a set of methods that are all closely related to each other to a jumble\
    \ of methods which are only tangentially related. Remember *cohesion is good*:\
    \ your applications should be cohesive and the classes and interfaces they depend\
    \ on should also be cohesive.\n\nSo what’s the answer here? How do we keep our\
    \ interfaces cohesive and still make them useful for a range of classes? The answer\
    \ is to make more interfaces. The Interface Segregation Principle implies that\
    \ instead of adding new methods that are only appropriate to one or a few implementation\
    \ classes, that you *make a new interface*. For any interface that has gotten\
    \ out of hand, you can divide the bloated interface into two or more smaller,\
    \ *more cohesive* interfaces. That way, new classes can just implement the interfaces\
    \ that contain only directly relevant functionality.\n\n# The Principle of Least\
    \ Knowledge (PLK)\n\nThe PLK is also known as the *Law of Demeter*. It says: talk\
    \ only to your immediate friends.^([^(203)](#fn203))\n\nThe complement to strong\
    \ cohesion in an application is *loose coupling*. That’s what the Principle of\
    \ Least Knowledge (PLK) is all about: stating that classes should collaborate\
    \ *indirectly* with as few other classes as possible.^([^(204)](#fn204))\n\nLet’s\
    \ consider an example derived from one found in Hunt and Thomas.^([^(205)](#fn205))\n\
    \nYou’ve got a computer system in your car (we all do these days). Say you’re\
    \ writing an application that graphs temperature data in the car. There are a\
    \ number of sensors that provide temperature data and that are part of a family\
    \ of sensors in the car’s engine. Your program should select a sensor and gather\
    \ and plot its temperature data. Part of your program might look like the following:\n\
    \n```\npublic void plotTemperature(Sensor theSensor) {\n    double temp = theSensor.getSensorData().getOilData().getTemp();\n\
    \    ...\n}\n```\n\nThis will likely work, at first... But now you’ve coupled\
    \ your temperature plotting method to the `Sensor`, `SensorData`, and `OilSensor`\
    \ classes. Which means that a change to *any one of them* could affect your `plotTemperature()`\
    \ method and cause you to have to refactor your code. Not good.\n\nThis is what\
    \ the PLK urges you to avoid. Instead of linking your method to a hierarchy and\
    \ having to traverse the hierarchy to get the service you’re looking for, just\
    \ ask for the data directly:\n\n```\npublic void plotTemperature(double theData)\
    \ {\n    ...\n}\n...\nplotTemperature(aSensor.getTemp());\n```\n\nYes, you had\
    \ to add a method to the `Sensor` class to get the temperature but that’s a small\
    \ price to pay for cleaning up the mess (and the possible errors) above. Now your\
    \ class is collaborating directly with just *one* class and letting that class\
    \ take care of the others. Your `Sensor` class will do the same thing with `SensorData`\
    \ and so on.\n\nThis leads us to a corollary to the PLK—*keep dependencies to\
    \ a minimum*. This is the crux of loose coupling. By interacting with only a few\
    \ other classes, you make your class more flexible and less likely to contain\
    \ errors."
  raw: '## The Dependency Inversion Principle (DIP)


    Robert C. Martin introduced the Dependency Inversion Principle in his C++ Report
    and later in his classic book *Agile Software Development*,^([^(200)](#fn200))
    where he defined DIP as


    1.  High-level modules should not depend on low-level modules. Both should depend
    on abstraction.


    2.  Abstractions should not depend on details. Details should depend on abstractions.


    The simple version of this is, don’t depend on concrete classes—depend on abstractions.
    Martin’s contention is that object-oriented design is the inverse of traditional
    structured design. In structured design, as you saw in Chapter [9](#270563_3_En_9_Chapter.xhtml),
    one either works from the top down, pushing details and design decisions as low
    in the hierarchy of software layers as possible, or one works from the bottom
    up, designing low-level details first and later putting together a set of low-level
    functions into a single higher-level abstraction. In both of these cases, the
    higher-level software depends on decisions that are made at the lower levels,
    including interface and behavioral decisions.


    Martin contends that for object-oriented design this is backward. The Dependency
    Inversion Principle implies that higher-level (more abstract) design levels should
    create an interface that lower (more concrete) levels should code to. This will
    mean that as long as the lower level (concrete) classes *code to the interface*
    of the upper level abstraction, that the upper level classes are safe. As Martin
    puts it, “The modules that contain the high-level business rules should take precedence
    over, and be independent of, the modules that contain the implementation details.
    High-level modules simply should not depend on low-level modules in any way.”^([^(201)](#fn201))


    Here’s a simple example. Traditionally, in structured design you write many programs
    with the general format of the following:


    1.  Get input data from somewhere.


    2.  Process the data.


    3.  Write output data to somewhere else.


    In this example, the Processor uses the Collector to get data, it then packages
    the data and uses the Writer to write the data to, say, a database. If we draw
    this out, we get something that looks like Figure [12-13](#270563_3_En_12_Chapter.xhtml#Fig13).


    ![](images/270563_3_En_12_Chapter/270563_3_En_12_Fig13_HTML.jpg)


    A U M L diagram consists of 3 classes represents a processor, collector, and writer,
    connected by dashed lines, indicating a relationship between the classes.


    Figure 12-13


    A traditional input-process-output model


    One problem with this implementation is that the Processor must create and use
    the Writer, whose interface and parameter types the Processor must know in order
    to write correctly. This means that the Processor must be written to a concrete
    implementation of a Writer and so must be rewritten if we want to change what
    kind of Writer we want. Say the first implementation writes to a File; if we then
    want to write to a printer or a database, we need to change Processor every time.
    This is not very reusable. The Dependency Inversion Principle says that the Processor
    should be coded to an interface (an abstract Writer) and then the interface is
    implemented in separate concrete classes for each type of Writer destination.
    The resulting design looks like Figure [12-14](#270563_3_En_12_Chapter.xhtml#Fig14).


    ![](images/270563_3_En_12_Chapter/270563_3_En_12_Fig14_HTML.jpg)


    A U M L class diagram represents a processor with dashed lines to a collector
    and an interface named writer, which is connected to two classes, file writer
    and print writer.


    Figure 12-14


    Using an interface to allow different writer implementations


    In this way, different writers can be added and as long as they adhere to the
    interface, Processor never needs to change. Note that we can do the same thing
    with the Collector. Note also that the DIP is closely related to Principle #2:
    Code to an Interface.


    ## The Interface Segregation Principle (ISP)


    This principle tells us that clients shouldn’t have to depend on interfaces they
    don’t use. In particular, they shouldn’t have to depend on *methods* they don’t
    use.^([^(202)](#fn202))


    We’ve talked a lot about interfaces in this chapter—coding to interfaces, using
    interfaces to abstract out common details, and so on. We use interfaces to make
    our code more flexible and maintainable. So overall, interfaces are a great thing,
    when used judiciously.


    One of the greatest temptations with respect to interfaces is to make them bigger.
    Expanding an interface can allow it to be implemented by more classes. However,
    when you start adding new methods to your interface because one of the subclasses
    that implement the interface needs it, while others do not, you make your interfaces
    less cohesive, and begin to violate the Interface Segregation Principle. By “generalizing”
    an interface too much, you are moving away from that single lightning bolt of
    a set of methods that are all closely related to each other to a jumble of methods
    which are only tangentially related. Remember *cohesion is good*: your applications
    should be cohesive and the classes and interfaces they depend on should also be
    cohesive.


    So what’s the answer here? How do we keep our interfaces cohesive and still make
    them useful for a range of classes? The answer is to make more interfaces. The
    Interface Segregation Principle implies that instead of adding new methods that
    are only appropriate to one or a few implementation classes, that you *make a
    new interface*. For any interface that has gotten out of hand, you can divide
    the bloated interface into two or more smaller, *more cohesive* interfaces. That
    way, new classes can just implement the interfaces that contain only directly
    relevant functionality.


    ## The Principle of Least Knowledge (PLK)


    The PLK is also known as the *Law of Demeter*. It says, talk only to your immediate
    friends.^([^(203)](#fn203))


    The complement to strong cohesion in an application is *loose coupling*. That’s
    what the Principle of Least Knowledge (PLK) is all about: stating that classes
    should collaborate *indirectly* with as few other classes as possible.^([^(204)](#fn204))


    Let’s consider an example derived from one found in Hunt and Thomas.^([^(205)](#fn205))


    You’ve got a computer system in your car (we all do these days). Say you’re writing
    an application that graphs temperature data in the car. There are a number of
    sensors that provide temperature data and that are part of a family of sensors
    in the car’s engine. Your program should select a sensor and gather and plot its
    temperature data. Part of your program might look like the following:


    ```

    public void plotTemperature(Sensor theSensor) {

    double temp = theSensor.getSensorData().getOilData().getTemp();

    ...

    }

    ```


    This will likely work, at first... But now you’ve coupled your temperature plotting
    method to the `Sensor`, `SensorData`, and `OilSensor` classes. Which means that
    a change to *any one of them* could affect your `plotTemperature()` method and
    cause you to have to refactor your code. Not good.


    This is what the PLK urges you to avoid. Instead of linking your method to a hierarchy
    and having to traverse the hierarchy to get the service you’re looking for, just
    ask for the data directly:


    ```

    public void plotTemperature(double theData) {

    ...

    }

    ...

    plotTemperature(aSensor.getTemp());

    ```


    Yes, you had to add a method to the Sensor class to get the temperature but that’s
    a small price to pay for cleaning up the mess (and the possible errors) above.
    Now your class is collaborating directly with just *one* class and letting that
    class take care of the others. Your `Sensor` class will do the same thing with
    `SensorData` and so on.


    This leads us to a corollary to the PLK—*keep dependencies to a minimum*. This
    is the crux of loose coupling. By interacting with only a few other classes, you
    make your class more flexible and less likely to contain errors.'
  trans: '

    ## 依赖倒置原则（DIP）


    罗伯特·C·马丁在其 C++ 报告中首次提出了依赖倒置原则，随后在其经典著作《敏捷软件开发》^(²⁰⁰)中对该原则进行了详细阐述。他将 DIP 定义为：


    1.  高层模块不应依赖低层模块。两者都应依赖抽象。

    2.  抽象不应依赖细节。细节应依赖抽象。


    简而言之，就是不要依赖具体类，而要依赖抽象。马丁认为，面向对象设计是传统结构化设计的逆向思维。在结构化设计中，如你在第 9 章所见，要么采用自顶向下的方式，将细节和设计决策尽可能推至软件层次结构的底层；要么采用自底向上的方式，先设计底层细节，再将一组底层函数组合成单个高层抽象。在这两种情况下，高层软件都依赖于底层所做的决策，包括接口和行为决策。


    马丁认为，对于面向对象设计而言，这种做法是本末倒置的。依赖倒置原则意味着，高层（更抽象）的设计层面应创建一个接口，而低层（更具体）的层面应针对该接口进行编码。这意味着，只要低层（具体）类*针对高层抽象的接口进行编码*，高层类就是安全的。正如马丁所言：“包含高层业务规则的模块应优先于包含实现细节的模块，并独立于后者。高层模块绝不应以任何方式依赖低层模块。”^(²⁰¹)


    下面是一个简单的例子。传统上，在结构化设计中，你编写的许多程序都遵循以下通用格式：


    1.  从某处获取输入数据。

    2.  处理数据。

    3.  将输出数据写入其他地方。


    在这个例子中，处理器使用收集器获取数据，然后打包数据，并使用写入器将数据写入（例如）数据库。如果我们将此过程绘制出来，会得到类似图 12-13 所示的结构。


    ![](img/270563_3_En_12_Fig13_HTML.jpg)


    一个 UML 类图，包含三个类：处理器、收集器和写入器，它们之间用虚线连接，表示类之间的关系。


    图 12-13

    传统的输入-处理-输出模型


    这种实现的一个问题是，处理器必须创建并使用写入器，并且处理器必须了解写入器的接口和参数类型才能正确写入。这意味着处理器必须针对写入器的具体实现来编写，因此如果我们想更改写入器的类型，就必须重写处理器。假设第一个实现是写入文件；如果我们之后想写入打印机或数据库，每次都需要更改处理器。这非常不利于复用。依赖倒置原则指出，处理器应针对接口（一个抽象的写入器）进行编码，然后针对每种写入器目标类型，在单独的具体类中实现该接口。由此产生的设计如图
    12-14 所示。


    ![](img/270563_3_En_12_Fig14_HTML.jpg)


    一个 UML 类图，表示一个处理器通过虚线连接到收集器和一个名为写入器的接口，该接口又连接到两个类：文件写入器和打印写入器。


    图 12-14

    使用接口以允许不同的写入器实现


    通过这种方式，可以添加不同的写入器，只要它们遵循该接口，处理器就无需更改。请注意，我们可以对收集器进行同样的处理。同时也要注意，DIP 与原则 #2（针对接口编程）密切相关。


    ## 接口隔离原则（ISP）


    该原则告诉我们，客户端不应依赖它们不使用的接口。特别是，它们不应依赖它们不使用的*方法*。^(²⁰²)


    本章我们已经讨论了很多关于接口的内容——针对接口编程、使用接口抽象出公共细节等等。我们使用接口使代码更灵活、更易于维护。因此，总的来说，只要审慎使用，接口就是好东西。


    关于接口，最大的诱惑之一就是让它们变得更大。扩展接口可以让更多的类实现它。然而，当你因为某个实现该接口的子类需要某个新方法，而其他子类不需要，就开始向接口中添加新方法时，你就降低了接口的内聚性，并开始违反接口隔离原则。过度“泛化”一个接口，会使你从一组紧密相关的、如闪电般聚焦的方法，转向一堆仅存在松散关联的方法。请记住，*内聚性是好的*：你的应用程序应该具有内聚性，它们所依赖的类和接口也应该具有内聚性。


    那么答案是什么呢？我们如何保持接口的内聚性，同时又能让它们对一系列类有用？答案是创建更多的接口。接口隔离原则意味着，与其添加仅适用于一个或少数几个实现类的新方法，不如*创建一个新接口*。对于任何变得臃肿的接口，你可以将其拆分为两个或更多更小、*内聚性更强*的接口。这样，新类就可以只实现那些包含直接相关功能的接口。


    ## 最少知识原则（PLK）


    PLK 也被称为*迪米特法则*。它说的是：只与你的直接朋友交谈。^(²⁰³)


    应用程序中强内聚性的补充是*松散耦合*。这正是最少知识原则（PLK）的核心要义：规定类应尽可能*间接地*与尽可能少的其他类协作。^(²⁰⁴)


    让我们考虑一个源自亨特和托马斯的例子。^(²⁰⁵)


    你的汽车里有一个计算机系统（如今我们都有）。假设你正在编写一个绘制车内温度数据的应用程序。有一系列传感器提供温度数据，它们是汽车发动机传感器家族的一部分。你的程序应选择一个传感器，收集并绘制其温度数据。你的程序部分可能如下所示：


    ```

    public void plotTemperature(Sensor theSensor) {

    double temp = theSensor.getSensorData().getOilData().getTemp();

    ...

    }

    ```


    这最初可能有效……但现在你已经将你的温度绘制方法与 `Sensor`、`SensorData` 和 `OilSensor` 类耦合在一起了。这意味着*其中任何一个*类的更改都可能影响你的
    `plotTemperature()` 方法，并导致你必须重构代码。这很糟糕。


    这正是 PLK 敦促你避免的情况。与其将你的方法链接到一个层次结构中，并遍历该层次结构来获取你需要的服务，不如直接请求数据：


    ```

    public void plotTemperature(double theData) {

    ...

    }

    ...

    plotTemperature(aSensor.getTemp());

    ```


    是的，你不得不在 Sensor 类中添加一个方法来获取温度，但为了清理上述混乱（以及可能的错误），这只是一个小小的代价。现在，你的类只直接与*一个*类协作，并让该类处理其他类。你的
    `Sensor` 类将对 `SensorData` 执行相同的操作，依此类推。


    这引出了 PLK 的一个推论——*将依赖关系降至最低*。这是松散耦合的关键。通过仅与少数其他类交互，你使你的类更加灵活，并且更不容易包含错误。

