- fmt: "# 19. Code Reviews and Inspections\n\n> *Our objective with Inspections is\
    \ to reduce the Cost of Quality by finding and removing defects earlier and at\
    \ a lower cost. While some testing will always be necessary, we can reduce the\
    \ costs of test by reducing the volume of defects propagated to test.*\n> \n>\
    \ —Ron Radice (2002)\n\n> *When you catch bugs early, you also get fewer compound\
    \ bugs. Compound bugs are two separate bugs that interact: you trip going downstairs,\
    \ and when you reach for the handrail it comes off in your hand.*\n> \n> —Paul\
    \ Graham (2001)\n\nHere’s a shocker: your main quality objective in software development\
    \ is to get a working program to your user that meets all their requirements and\
    \ has no defects. That’s right: your code should be perfect, having no errors\
    \ and meeting all user’s requirements when you deliver it. Impossible? Can’t be\
    \ done? Well, *software quality assurance* is all about trying to get as close\
    \ to perfection as you can—albeit within time and budget.\n\nSoftware quality\
    \ is usually discussed from two different perspectives: the user’s and the developer’s.\
    \ From the *user’s perspective*, quality has a number of characteristics in order\
    \ to be accepted, including the following:^([^(298)](#fn298))\n\n*   *Correctness*:\
    \ The software has to work, period.\n*   *Usability*: It has to be easy to learn\
    \ and easy to use.\n*   *Reliability*: It has to stay up and be available when\
    \ you need it.\n*   *Security*: The software has to protect your data and prevent\
    \ unauthorized access.\n*   *Adaptability*: It should be easy to add new features.\n\
    \nFrom the *developer’s perspective*, software quality hinges on a different set\
    \ of characteristics:\n\n*   *Maintainability*: It has to be easy to make changes\
    \ to the software.\n*   *Portability*: It has to be easy to move the software\
    \ to a different platform.\n*   *Readability*: You and anyone who comes after\
    \ you needs to be able to read the code. This usually means that the code must\
    \ have a consistent style and flow.\n*   *Understandability*: The code design\
    \ should be understandable by developers other than the original author.\n*  \
    \ *Testability*: It should be straightforward to fully test the code. Code that\
    \ is created in a modular fashion, with short functions that do only one thing,\
    \ is much easier to understand and test than code that is all just one big `main()`\
    \ function.\n\n*Software quality assurance (SQA)* is a set of activities that\
    \ ensure software is implemented correctly. SQA has three major components:\n\n\
    *   *Testing (or* *dynamic analysis**)*: Finding errors that surface during execution\n\
    *   *Debugging*: Getting all the obvious errors (found by testing) out of your\
    \ code\n*   *Reviews (or* *static analysis**)*: Finding inherent errors in your\
    \ code as it sits there\n\nMany developers—and managers—think that you can test\
    \ your way to quality. You can’t. As you saw in the last chapter, tests are limited.\
    \ You often can’t explore every code path, you can’t test every possible data\
    \ combination, and often your tests themselves are flawed. Tests can only get\
    \ you so far. As Edsger Dijkstra famously said: “...program testing can be a very\
    \ effective way to show the presence of bugs, but it is hopelessly inadequate\
    \ for showing their absence.”^([^(299)](#fn299)) Testing alone is not a particularly\
    \ effective way of finding errors in your code. In many cases, the combination\
    \ of unit testing, integration testing, and system testing will only find about\
    \ 50% or so of the errors in your program.^([^(300)](#fn300)) But, if you add\
    \ some type of code review (reading the code to find errors) to your testing regimen,\
    \ you can bring that percentage up to between 93% and 99% of all the errors in\
    \ your code. Now that’s an objective to shoot for, so in this chapter we’ll focus\
    \ on reviewing your code.\n\n## Walkthroughs, Reviews, and Inspections\n\n*Reviewing\
    \ your code*—reading it and looking for errors on the page—provides another mechanism\
    \ for making sure that you’ve implemented the user’s requirements and the resulting\
    \ design correctly. In fact, most development organizations that use a plan-driven\
    \ methodology will not only review code, but also review all the *work products*\
    \ produced by the software development organization: the requirements document,\
    \ the architecture, the design specification, the test plan, the tests themselves,\
    \ and the user documentation. Organizations that use an agile development methodology\
    \ don’t necessarily have all the documents mentioned above, but they do have requirements,\
    \ user stories, user documentation, and especially code to review.\n\nThere are\
    \ three major approaches to reviewing code: walkthroughs, code reviews, and inspections.\
    \ These three work their way up from very informal techniques to very formal methodologies.\
    \ Code is typically reviewed either right after you’ve got a clean compile of\
    \ your code and before you unit test, or right after you finish your unit testing.\
    \ It’s better to do the reviews right after unit testing, because then you’ve\
    \ got your changes made, you’ve got a clean compile, and you’ve done the first\
    \ round of testing. This is a great time to have someone else take a look at your\
    \ code.\n\n## Walkthroughs\n\n*Walkthroughs* (also known as *desk checks* or *code\
    \ reads*) are the least formal type of review, typically used to confirm small\
    \ changes to code, say a line or two, that you have just made to fix an error.\
    \ If you’ve just added a new method to a class, or you’ve changed more than about\
    \ 25 or 30 lines of code, do not do a walkthrough; do a code review instead.\n\
    \nWalkthroughs involve two or at most three people: the author of the code and\
    \ the reviewer. The author’s job in a walkthrough is to explain to the reviewer\
    \ what the change is supposed to do and to point out where the change was made.\
    \ The reviewer’s job is to understand the change, read the code, and make one\
    \ of two judgments: either they agree that the change is correct, or they do not.\
    \ If not, the author has to go back, fix the code again, and then do another walkthrough.\
    \ If the reviewer thinks the change is correct, then the author can integrate\
    \ the changed code back into the code base to proceed with integration testing.\n\
    \nIf you’re pair programming, a code walkthrough happens concurrently as you are\
    \ implementing a task. The driver is writing the code and the navigator is looking\
    \ over their shoulder, checking for errors, and thinking ahead; this can be considered\
    \ as an ongoing walkthrough happening in parallel with coding. In this case, it’s\
    \ acceptable to use a walkthrough for a larger piece of code, although for a complete\
    \ task or for each user story that is implemented you should do a code review\
    \ or an inspection, which we will talk about next."
