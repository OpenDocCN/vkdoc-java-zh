- fmt: '# Fair Use: The Copyright “Get out of Jail Free” Card


    Occasionally, you can use parts of a copyrighted work without having to get permission.
    This is known as “fair use.”^([^(116)](#fn116)) A use of a copyrighted work must
    meet four criteria in order to be considered as fair use:


    1. *Purpose and character of the use*: How the party claiming fair use is using
    the copyrighted work. Not-for-profit and educational uses are considered acceptable,
    while commercial uses are not.^([^(117)](#fn117)) For example, the use of some
    or all of a copyrighted work in a classroom as part of a course is usually okay.


    2. *Nature of the copyrighted work*: More creative works get more protection.
    For example, written fiction and poetry are presumed to have higher copyright
    protection.


    3. *Amount of the work used*: The amount used in relation to the size of the whole
    copyrighted work. Smaller is better. For novels, a few hundred words is likely
    okay, for songs and video productions, less than 10% of the work is also typically
    allowed.


    4. *Effect of the use on the potential market for or value of the copyrighted
    work*: If your use of part of a copyrighted work does not diminish the market
    or value of the work, it’s probably okay.


    The bottom line with respect to use of copyrighted works is that things like criticism,
    comment, news reporting, teaching, scholarship, parody/satire, and research are
    all examples of activities that generally qualify as fair use. Copying a song
    from a CD or the Internet and sharing or selling it would definitely not qualify
    as fair use. For an example, see the Napster case.^([^(118)](#fn118))


    ## Intellectual Property: Patents


    Under United States law, a patent is a right granted to the inventor of a process,
    machine, article of manufacture, or composition of matter that


    1. is new and useful,

    2. is non-obvious,

    3. has industrial applicability, also known as *functional utility* (that is,
    it has to do something),

    4. and it cannot be “*prior art,*” meaning it can’t have been patented before.^([^(119)](#fn119))


    The inventor gets a patent—protection from the government for a fixed amount of
    time—in exchange for the public disclosure of their invention.


    ### What Is a Patent?


    A patent is the *right to exclude others* for a limited time (usually 20 years
    in the U.S.) from profiting off a new invention or technology without the consent
    of the patent holder. The patent holder can license the patent to someone else
    in order to manufacture, sell, import or export the device. However, unless you
    have a license, you cannot use the patent. Patent licenses can be free, or they
    can involve a royalty payment to the patent holder. Patents are also only usually
    recognized in the country where the patent is issued, so if you want to market
    your new device in the United States, the European Union, the United Kingdom,
    and China, you must obtain patents in all those jurisdictions. There are treaties
    that allow some patents to be recognized in several jurisdictions.


    You cannot renew a patent. Once its term has expired it is considered to be in
    the *public domain*. Once the patent is in the public domain, anyone can create
    products from the patent without needing to obtain a license or paying any licensing
    fees to the original patent holder. This non-renewal is one reason of many why
    pharmaceutical companies charge so much for new drugs. They only have 20 years
    to make back all the money invested in creating it and to make a profit for their
    shareholders. Once a drug has entered the public domain, any other drug company
    can make that drug, which become the *generic* versions. The only way around the
    non-renewal is for the original patent holder to get a new patent for an *improvement*
    or *modification* of the original patent.


    ### What You Can''t Patent


    You are not allowed to patent


    * an abstract idea,

    * physical phenomena,

    * mathematical equations,

    * laws of nature,

    * living things,

    * the elements,

    * mental processes,

    * printed matter,

    * most business methods, and

    * computer software (sort of. We’ll talk about patenting software in some detail
    next.)


    ### Software Patents


    Any computer source code that you write is automatically protected by copyright,
    but this only covers the actual source code text. Copyright doesn’t protect any
    of the new or novel algorithms in your code, nor your new process for implementing
    an existing algorithm, and so on. For that you would need a patent. For mechanical
    or electrical inventions that end up as physical products or novel processes to
    create a product, describing, submitting an application for, and acquiring a patent
    is pretty straightforward. Securing software patents is, unfortunately, a bit
    more complex.


    Firstly, software is not a physical product. For another, it changes form in order
    to be useful. You can write a novel program, but your source code is not an executable
    format. You first have to change the form of your software from source code into
    machine code, for a particular target machine, via a compiler, in order to get
    it to execute. Secondly, even as an executable, your software cannot work on its
    own. It must execute under a particular operating system, which in turn must operate
    on a particular type of computer (a piece of hardware) to produce the output it
    is designed to create. (Your Mac app won’t run on Windows unless you rewrite and
    recompile it to do so.) Also, remember that list of things that cannot be patented;
    we cannot patent abstract ideas, mathematical equations, mental processes, and
    most business methods. This issue alone would make acquiring a meaningfully protective
    patent on a piece of software difficult. And just to make matters even more interesting,
    software is not mentioned anywhere in U.S. patent law, nor is the phrase “software
    patent” defined.^([^(120)](#fn120))


    The U.S. government has been wrestling with the idea of software patents since
    at least 1972 when the Patent Office issued a patent for an algorithm to convert
    binary-coded decimal (BCD) numbers into purely binary representations.^([^(121)](#fn121))
    However, 42 years later, in 2014, the U.S. Supreme Court upended that case and
    invalidated most other software patents in a case called *Alice Corp vs. CLS Bank
    International*^([^(122)](#fn122)) by deciding that most software was not patentable
    because it represented *abstract ideas* and should therefore be considered *prior
    art*. In an effort to provide some clarity for software patent applications, the
    Supreme Court defined a test which is now known as the *Alice-Mayo* framework.
    Under the two-part Alice-Mayo framework, the Patent Office requires that (1) the
    newly discovered mathematical formula or algorithm be assumed as known (i.e. it
    is *prior art*), and (2) the patent application must contain an additional “inventive
    concept” that limits the application of (1) to a specific and non-trivial use.^([^(123)](#fn123))


    In the years subsequent to the Alice Corp decision and the creation of the Alice-Mayo
    framework, the courts and the U.S. Patent Office have continued to wrestle with
    how to categorize software innovations that may be patentable. They have focused
    on patent claims that were “directed to a specific improvement to the way computers
    operate, embodied in the self-referential table.”^([^(124)](#fn124)) This implies
    that even though algorithms are typically considered prior art, software patent
    claims that emphasize “a specific improvement to the way computers operate” can
    be patentable. The story continues...^([^(125)](#fn125))'
