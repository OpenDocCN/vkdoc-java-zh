- fmt: "# Brené Brown suggests that we all get ready to rumble: “A rumble is a discussion,\
    \ conversation, or meeting defined by a commitment to lean into vulnerability,\
    \ to stay curious and generous, to stick with the messy middle of problem identification\
    \ and solving, to take a break and circle back when necessary, to be fearless\
    \ in owning our parts, and, as psychologist Harriet Lerner teaches, to listen\
    \ with the same passion with which we want to be heard.”^([(73)](#fn73))\n\nDevelopment\
    \ teams will inevitably encounter both task conflicts and personal conflicts.\
    \ *Task conflicts* are differences in understanding, conflicting opinions on which\
    \ approach to take, assessments of risks and costs, etc. Resolving task conflicts\
    \ improves the product by helping brainstorm alternatives, address weak points,\
    \ or clarify requirements. *Personal conflicts* are differences in communication\
    \ styles, cultural background, neurodivergence, personality, boundaries, triggers,\
    \ etc. Personal conflicts can be a huge drain on the developers. Resolving interpersonal\
    \ conflicts improves the teamwork, job satisfaction, and productivity.\n\nConflicts\
    \ are invaluable to growth but they must not be allowed to fester. Timely proactive\
    \ resolution is key, which requires a culture that welcomes difficult conversations,\
    \ praises the courage they take, and helps everyone learn the skills necessary\
    \ to both communicate, listen, and collaborate on finding a new common ground.\
    \ Interpersonal tensions need to be brought to the surface and resolved in a timely\
    \ manner in order to prevent deterioration of the relationship. Teams may need\
    \ external contribution of resources, information, or impartial arbitration to\
    \ resolve conflicts and prevent resentments from snowballing. So how can we constructively\
    \ resolve a conflict? A series of *skilled disagreement* techniques have been\
    \ proposed^([(74)](#fn74)):\n\n* Criticize ideas, not people.\n* Separate self-worth\
    \ from criticism of your ideas.\n* Focus on winning as a team, not individually.\n\
    * Encourage everyone to get informed and participate in the discussion.\n* Listen\
    \ to all ideas, regardless of your personal views.\n* Restate ideas to ensure\
    \ shared understanding.\n* Clearly state all arguments, clarify differences, and\
    \ then integrate through points of agreement.\n* Try to understand opposing perspectives.\n\
    * Update your own perspective in the face of evidence.\n* Emphasize rationality\
    \ and data.\n* Follow the *golden rule of conflict*: treat others as you want\
    \ to be treated.\n\nWorkplace hierarchy will inevitably also affect conflicts.\
    \ The following tips have been proposed to help higher positioned individuals\
    \ through effective conflict management^([(75)](#fn75)):\n\n* Make time to resolve\
    \ interpersonal conflicts. Recognize that conflicts do not just go away and waiting\
    \ them out is detrimental.\n* Determine whether a conflict needs to be addressed\
    \ with individuals, subgroups, the whole team, or some combination of the above.\n\
    * To avoid blind agreement and to encourage discussion instead, refrain from imposing\
    \ a personal point of view early in the conversation.\n* Encourage the team to\
    \ surface small concerns and irritants before they turn into conflicts.\n* Look\
    \ for opportunities to set the tone and model the behaviors you want to see from\
    \ the team (e.g., thank others for speaking up, disagree constructively, acknowledge\
    \ mistakes, etc.)\n* Help frame and focus disagreements constructively by discussing\
    \ why some approaches may not work contextually without being objectively wrong.\n\
    * Take the time to explain your decisions and, wherever possible, involve the\
    \ team in decision-making.\n\n## Soft-Aware Development: Teamwork Artifacts\n\n\
    Being Soft-Aware improves teamwork and the team’s output. But how do we make time\
    \ for all these practices? How do we keep an eye on the teamwork and the culture?\
    \ How do we make sure conflicts are resolved before they can corrode our team\
    \ from the inside? In order to stay close enough to pay attention, but far enough\
    \ to give development some creative room, some artifacts can be added to the development\
    \ process.\n\nLet’s look at some artifacts and practices we found helpful for\
    \ developer teams in the past:^([(76)](#fn76))\n\n* Begin with an individual and\
    \ confidential *assessments* to determine everyone’s needs, practices, and personal\
    \ traits to help put together effective balanced teams, establish helpful team\
    \ protocols, and implement appropriate training sessions.\n* Have teammates fill\
    \ out regular (e.g., once per development iteration) *self and peer evaluations*\
    \ (individual, confidential, and to be used solely for helping with teamwork):\
    \ a streamlined form for subjective reflection on each developer’s own performance,\
    \ attitude, and contributions, as well as perceptions of the teammates’ performances,\
    \ attitudes, and contributions. Making explicit room to reflect is crucial to\
    \ begin gathering the full picture of the teamwork and allow for timely interventions.\n\
    * *Play* is the essence of creative thinking. Having shared channels for memes\
    \ or non-project news can help create a more personable and vibrant space that\
    \ is not all work and no play. Create large and small team-building opportunities.\
    \ Even spaces for coffee and some recharging conversation can turn a hard and\
    \ stressful day into a worthwhile and fulfilling shared experience that can bring\
    \ a team closer. Larger events can bring greater excitement and create shared\
    \ memories.\n* Normalize mistakes and learning, both in technical and non-technical\
    \ aspects of the work. Don’t ambush and don’t single out. Schedule *routine check-ins*\
    \ as part of the workflow to create opportunities for sharing and to help everyone\
    \ prepare to be receptive. If a situation is sensitive, warn teammates that you\
    \ will all need to work through the discomfort with empathy and courage.\n* Have\
    \ *open multi-directional communication channels*, such as short scheduled updates,\
    \ in-person team working sessions, shared knowledge repositories, and convenient\
    \ channels for on demand synchronous and asynchronous communication.\n* Fill out\
    \ *team contracts* with minimum requirements, which can be expanded by the teammates\
    \ to best suit their collective comfort levels. The contract should cover team\
    \ meeting frequency (e.g., time and location of daily stand-ups), frequency of\
    \ checking and updating asynchronous communication channels (e.g., checking the\
    \ Slack channel once a day and updating the Agile board after each work session),\
    \ timeliness of unavailability notices (e.g., informing your team when you are\
    \ running late), required technologies (e.g., `git`), protocols (e.g., adhering\
    \ to `git flow`), and deliverables (e.g., standup reports and Minimum Viable Product\
    \ demos every two weeks). The contract allows for a clear setting of expectations\
    \ and responsibilities for the team and gives supervisors a view into the team’s\
    \ practices.\n\nIt is helpful to approach teamwork as an agile development process\
    \ of its own: teamwork starts right away, is checked on frequently, and is course-corrected\
    \ as needed. In fact, if you are already using agile methodologies, agile artifacts\
    \ can directly allow to watch over the teamwork:\n\n* Status *reviews/demos/presentations*\
    \ are how you review the status of the product. When reporting the status, clearly\
    \ state where the project is and where it’s heading before the next status report:\n\
    \  * What has been achieved since the last review/demo/iteration?\n  * What has\
    \ not been achieved from the work originally planned for this iteration?\n  *\
    \ What are the next steps?"
