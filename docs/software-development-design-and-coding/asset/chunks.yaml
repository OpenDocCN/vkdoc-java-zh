  trans: "\n# 14. 并行编程\n\n> *并发是算法的一种属性，并行是机器的一种属性。*\n> \n> ——道格拉斯·伊德林\n\n自微处理器问世以来，**摩尔定律**指出，集成电路上的晶体管数量大约每\
    \ 18 个月到两年就会翻一番，而电路尺寸基本保持不变或变得更小，集成电路的价格也基本保持不变或更低。这意味着，我们能够定期以大致相同的价格获得更强大的处理器。这一预测在\
    \ 21 世纪初之前一直非常准确，但随后情况发生了变化。首先，摩尔定律意味着，要在尺寸相似的芯片上集成两倍的晶体管，晶体管的尺寸以及晶体管之间的距离都必须缩小。显然，受物理规律限制，这不可能无限持续下去。到\
    \ 21 世纪初，我们开始遇到晶体管进一步小型化带来的问题。第二个问题是热量。如果在芯片上集成两倍的晶体管，并期望以相同或更高的时钟速度运行，就需要更多电流通过电路。更多电流意味着更多热量。这就是所谓的“功耗墙”。\n\
    \n大约在 2001 年，人们逐渐认识到，当时这一代微处理器的速度很难再突破每秒 30 亿到 40 亿个周期（3-4GHz）；如果想要更快，就需要另辟蹊径。于是，多核微处理器应运而生。其基本思想是，将两个或更多\
    \ CPU 集成在一个稍大的单一集成电路上，让它们以相同（较慢）的时钟运行，共享部分缓存，并使用共享主内存。这使得处理器能够消耗更少的电力，产生更少的热量，并能同时运行两个或更多程序，以弥补时钟速度较慢的不足。所有主要芯片制造商都采纳了这一想法。IBM\
    \ 率先行动，于 2001 年底推出了 POWER4 PowerPC 双核处理器；随后，AMD 于 2005 年推出了 Athlon 双核处理器；英特尔则于\
    \ 2006 年推出了 Core Duo 处理器。自那时起，几乎所有新处理器和处理器架构都采用了多核设计，而程序员和语言开发者们也在努力创建能够利用新型并行架构的新软件。\n\
    \n在本章中，我们首先简要介绍并行计算机的组织方式。然后，我们将描述编写能够利用并行计算机架构的程序所面临的一些困难。接着，我们将讨论如何编写并行程序，以及如何将串行程序转换为并行程序。最后，我们将探讨如何使用不同的计算机语言和库来编写并行程序。\n\
    \n## 并发与并行\n\n传统上，软件是为*串行*或*顺序*计算而编写的。一个问题的解决方案被分解成一系列离散的指令，这些指令在单个处理器上一个接一个地顺序执行。这些（单核）计算机在任何时刻只允许执行一条指令。一个经典的例子是循环求和列表中所有元素：我们遍历列表中的所有元素，并将每个元素逐一累加到总和中，如下所示：\n\
    \n```\nint sum = 0;\nfor (int i = 0; i < n; i++) {\nsum += list[i];\n}\nSystem.out.print(sum);\n\
    ```\n\n这通常会串行执行，结果如下：\n\nsum = 0\n\nsum = sum + list[0]\n\nsum = sum + list[1]\n\
    \nsum = sum + list[2]\n\n…\n\n这显然是一个 O(n) 操作，需要 n 次加法，所需时间 T(n) 与 n 成正比。我们可以通过认识到加法可以按任意顺序成对相加，然后将部分和相加得到总和来改进这一点。代码可能修改如下：\n\
    \n```\nsum = 0;\nfor (int i = 0; i < n-1; i+=2) {\nsum += (list[i] + list[i+1]);\n\
    }\nSystem.out.print(sum);\n```\n\n注意，由于加法的交换律，循环内执行两次加法的顺序无关紧要。虽然这个版本循环次数减少了一半，但它仍然需要相同总数的加法和相同的时间。因此，仅用一个处理器我们并没有真正获得任何好处。但这种新方法催生了一个想法：如果我们有\
    \ n/2 个处理器而不是仅仅一个，我们就可以*同时*进行许多计算，使用相同数量的操作 O(n)，但将所需时间 T(n) 从与 n 成正比减少到与 log\
    \ n 成正比（通过假设一个二叉树的处理器层级结构），这是一个显著的时间减少，特别是当 n 变大时。这就引出了并发与并行的区别。\n\n*并发*是指认识到我们可以将一个计算（算法）分解成独立的片段，这些片段的*执行顺序*无关紧要。并发是用于解决问题的算法的一种属性。注意，在单处理器上运行的并发程序仍然会串行执行。\n\
    \n*并行*是在特定机器（或机器架构）上用于执行程序以提高性能的机制。并行允许并发程序在多个处理器上同时执行，从而可能提高程序的整体性能。\n\n图 14-1\
    \ 的左侧展示了一个并发程序被分解成两个执行线程，在单个处理器上运行（图像中的垂直中心线），而图像的右侧展示了在双处理器上运行同一个程序，该程序被分成两个执行线程。\n\
    \n![](img/270563_3_En_14_Fig1_HTML.jpg)\n\n两幅插图分别展示了线程 1 和线程 2 之间并发与并行程序的模式。\n\
    \n图 14-1\n\n并发与并行\n\n以下是对并发与并行之间区别的另一种解释，该解释出现在 Stack Overflow 网站上^(²²⁷)：\n\n\
    假设你所在的国际象棋俱乐部组织了一场表演赛，10 名技术水平相近的本地棋手将与一位国际象棋特级大师对弈。俱乐部组织者需要安排 10 场对局，并希望高效利用时间，以便大家都能出去庆祝。有几种组织比赛的方式。\n"
- fmt: '*Serial*: The boards are all lined up in a room and the chess master sits
    down at the first table to play. The game is played to completion and the chess
    master then moves to the next table to play the next game. If each game lasts
    10 minutes, then that’s a total of 100 minutes. If it takes the chess master about
    6 seconds to move from one table to the next after each game, then that’s about
    another minute (well, it’s 54 seconds, but we’ll fudge it a bit) for a total of
    101 minutes. Not bad.


    *Concurrent*: The boards and players are all lined up the same way, but for this
    version the chess master only plays one turn at each table. The chess master sits
    down at the first table to play, makes the first move in 6 seconds, and then immediately
    moves to the next player to make the next first move. It still takes the chess
    master 6 seconds to move between tables. This continues until after one minute
    (6*10 seconds) the chess master is back at the first table for the second move.
    If we assume that each game still takes 10 total minutes, the same as the serial
    games took, then we need to know how many rounds through all the tables the chess
    master will have to make. If each of the local players takes about 50 seconds
    for their move, then we have each complete move taking 50 + 6 = 56 seconds (the
    50 seconds for the player move, plus the 6 seconds for the chess master move).
    Each game takes 10 minutes or 600 seconds, so we have 600 seconds/56 seconds per
    complete move = about 11 rounds for the chess master to complete all 10 games.
    The total number of seconds is the sum of all the local player and chess master
    moves plus the sum of all the times for the chess master to move between boards.
    This will give us a total of 11*56 + 11*6*10 = 616+660 seconds = 1,276 seconds
    = 21.27 minutes to complete the match. Much better.


    *Parallel*: Let’s say the chess club wants to add a bit more competition to the
    event and hires a second chess master. With two chess masters, the club organizers
    can have each master play just 5 games. If they use the serial method from above,
    then each chess master will sit down, play a complete game and then move to the
    next table. But this time, since two games are being played simultaneously, the
    tournament is finished in half the time, 101/2 = 50.5 minutes. Better, but not
    as good as the concurrent approach.


    *Concurrent* *AND* *parallel*: Let’s now have our two chess masters play their
    5 games at the same time. Each chess master makes a move in 6 seconds and moves
    to the next table, also in 6 seconds. If the games still take 10 minutes each,
    and if each player still takes 50 seconds for each move, then we still end up
    with 11 rounds, but the total time to move between games only takes 30 seconds
    now (because there are only 5 games going on for each chess master). That gives
    us 11*56 + 11*30 = 616 + 330 = 946 seconds = 15.77 minutes for the entire match.
    This is the fastest time from the four different ways of playing the match, so
    creating a concurrent program and running it on a parallel machine is better than
    the alternatives.


    Remember, concurrency is a property of the algorithm, while parallelism is a property
    of the machine.^([^(228)](#fn228))


    ## Parallel Architectures: Flynn’s Taxonomy


    Computer scientists have recognized that parallelism can be used to improve performance
    and to scale large problems for more than 50 years. In this section, we’ll look
    at some different forms of parallel machines that will allow us to improve the
    performance of concurrent programs.


    In 1966, Michael Flynn proposed a taxonomy for different types of computer architectures.^([^(229)](#fn229))
    This taxonomy persists to this day with a couple of extensions we will also mention
    below.


    The taxonomy originally contained four model architectures:


    *   *SISD – single instruction stream, single data stream*: This is the classic
    von Neumann computer architecture for uniprocessor computers. A single program
    runs on the machine at a time, handling a single stream of data.


    *   *MISD – multiple instruction stream, single data stream*: This architecture
    assumes that a number of different programs will all execute on the same data
    stream, producing possibly different results. The programs all run in lock step.
    Machines that use this architecture are very rare. One possible application is
    a machine that tries to break a cryptogram, using several different algorithms
    all running on different processing units.


    *   *SIMD – single instruction stream, multiple data stream*: This is one of the
    most common architectures. In it a single program is run on different processors,
    each using a different data stream. These data streams can be a partitioned set
    of data where each subset must have the same computation run on it. For example,
    weather models can use this architecture to predict hurricane paths. One characteristic
    of the SIMD model is that all the machines in the system are running the same
    program in lock step. Because all the machines are running the same program at
    the same time, SIMD machines are not suitable to improve the performance of concurrent
    programs.


    *   *MIMD – multiple instruction stream, multiple data stream*: The most general
    architecture where multiple programs run simultaneously on different machines,
    each using a different data stream. These programs are not required to run in
    lock step, so they can execute concurrent programs and improve their performance.
    In the early 21^(st) century, this is the most common model for supercomputers.
    Your multi-core laptop or desktop system is also an MIMD machine.


    There are two other variations on these models that evolved in early 2000s or
    so.


    *SIMT – single instruction stream, multi-threading*: This execution model uses
    SIMD as its base but allows each instruction stream to execute multiple threads
    at a time. This model was proposed in the mid-2000s and is generally used in multi-core
    graphics processors. It is very useful for applications where there is a lot of
    redundancy in the data stream, for example, processing graphical or video data.


    *SPMD – single program, multiple data stream*: This is a common parallel programming
    execution model today. It allows each processor to execute a program independently,
    and so not in step with other processors, all on different (possibly partitioned)
    data streams. Because the programs run independently, they can take advantage
    of concurrent sections of the program in order to improve performance. Despite
    its name, SPMD is a sub-category of the MIMD model above.


