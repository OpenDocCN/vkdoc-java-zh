  trans: "\n*   *为该项目选择正确的工具和正确的实践*。软件开发最棒的一点在于每个项目都各不相同。即使你正在开发某个现有产品的 8.0 版本，情况也会发生变化。这意味着，对于每个项目，你都需要审视并选择一套合适的开发工具。选择不合适的工具就像试图用螺丝刀钉钉子；你最终或许能完成，但这肯定不轻松、不美观、也不有趣，而且用锤子能在更短时间内钉入更多钉子。即使你必须先获得一把锤子，然后第一次学习如何使用它，你也在过程中升级了你的工具包和技能，为未来更高效工作的能力进行了投资。选择工具时最重要的三个因素是：你正在编写的应用程序类型、目标平台以及开发平台。通常你对这三件事中的任何一件都无能为力，所以一旦你了解了它们，就可以选择能提高生产力的工具。工具选择的第四个且几乎同等重要的因素是开发团队的构成和经验。如果你的团队都是经验丰富、熟悉多种平台的开发者，那么工具选择就容易得多。另一方面，如果你有一群刚毕业的新人，并且目标平台对所有人来说都是全新的，那么你就需要谨慎选择工具，并预留时间进行新工具的培训和实践。\n\
    \n## 结论\n\n软件开发是每个软件项目的核心，也是软件工程的核心。其目标是在不断变化的需求面前，按时、在预算内为用户交付卓越、无缺陷的代码。这使得开发工作变得尤为艰巨。但是，为难题找到解决方案并让你的代码正确运行，这几乎是世界上最酷的感觉。\n\
    \n> *“[编程是]我能想到的唯一一份能让我同时成为工程师和艺术家的职业。它有着令人难以置信的、严谨的技术元素，我喜欢这一点，因为你必须进行非常精确的思考。另一方面，它又有着极其创造性的一面，唯一的真正限制是想象力的边界。这两者的结合正是编程的独特之处。你可以同时成为艺术家和科学家。我喜欢这一点。我喜欢创造位于核心的、真正构成编写程序基础的魔法技巧。第一次看到那个魔法技巧，也就是你程序的精髓，能够正确运行，是编写程序过程中最激动人心的部分。”*\n\
    > \n> ——安迪·赫兹菲尔德（第一代 Mac OS 的设计者）^(⁴)\n\n# 第一部分 模型与团队实践\n\n# 2. 软件过程模型\n\n> *如果你不知道要去哪里，那么任何路都可以。*\n\
    \n> *如果你不知道自己在哪里，那么地图也没用。*\n> \n> ——瓦茨·汉弗莱\n\n软件开发的过程通常被描述为软件开发生命周期（SDLC）。每个程序，无论多小，都有一个生命周期，大致由以下步骤组成：\n\
    \n1.  构思\n2.  需求收集/探索/建模\n3.  设计\n4.  编码与调试\n5.  测试\n6.  发布\n7.  维护/软件演进\n8. \
    \ 退役\n\n你的开发过程可能会合并多个步骤，或者在发布之间反复迭代部分步骤，但无论以何种形式，所有开发都应包含上述生命周期中的所有步骤，以创建高质量的软件。两种最常见的变体是*基于计划的模型*^(⁵)和较新的*敏捷开发*模型。^(⁶)\n\
    \n采用基于计划的开发时，项目团队通常会在回到 SDLC 开始下一个产品版本的工作之前，完成一个完整的生命周期（至少是步骤 2 到 7）。在计划驱动模型中，方法论在流程步骤和发布时间方面往往更为严格。计划驱动模型有更清晰定义的阶段，并且在进入下一阶段之前，对阶段完成的签核有更多要求。计划驱动模型在每个阶段需要更多的文档，并需要验证每个工作产品的完成情况。它们通常适用于具有明确定义交付成果的新软件的大型合同。\n\
    \n在目前更为普遍的敏捷开发中，项目团队通常会在进入发布步骤之前，多次迭代部分生命周期（通常是步骤 3 到 5）。敏捷模型本质上是增量式的，其运作假设是：小而频繁的发布比大而不频繁的发布能产生更健壮的产品。与计划驱动模型相比，敏捷模型中的阶段往往更加模糊，并且对工作产品文档的要求通常更少，其基本思想是：代码才是最终产出，因此开发者的精力应集中于此。请访问敏捷宣言网页\
    \ [`https://agilemanifesto.org`](https://agilemanifesto.org/)，以深入了解敏捷开发模型及其目标。\n\
    \n没有一种开发软件的最佳过程。每个项目都必须根据其特定应用来决定最有效的模型，并基于项目领域、项目范围、团队经验以及项目时间表来做出决定。在本章中，我们首先回顾软件开发项目的共享变量，然后讨论几种广泛定义的不同方法，最后我们将审视几个著名的具体软件模型实现，以及它们如何能够混合使用。\n"
- fmt: '# The 3(+3) Variables of Software Development


    According to the Project Management Institute,^([⁷](#fn7)) the three main variables
    of software development are cost, time, and scope.


    - `Cost` (a.k.a. resources) is usually the most constrained; as a developer, you
    have very limited control over cost and you cannot spend your way to quality or
    to being on schedule. Cost can influence the size of the team or the types of
    tools available during development. For small companies and startups, cost also
    influences the environment where the developers will work.


    - `Time` is your delivery schedule and is typically imposed on you from the outside.
    For example, most consumer products (be they hardware or software) will have a
    delivery date somewhere between August and October in order to hit the holiday
    buying season. You can’t move Christmas. If you are late, the only way to fix
    your problem is to drop features or lessen quality, neither of which is pretty.
    Time is also where Brooks’ Law gets invoked (adding programmers to a late project
    just makes it later).


    - `Scope` (a.k.a. features) is what the product actually does. This is what developers
    should always focus on. It’s the most important of the variables from the customer’s
    perspective and it is also the one you as a developer have the most control over.
    Controlling scope allows you to provide managers and customers control over quality,
    time, and cost. If the developers don’t have control over the feature set for
    each release, then they are likely to blow the schedule. This is why developers
    should do the estimates for software work products.


    Together, cost, time, and scope form the *Iron Triangle* of software development,
    in which specifying two of the variables defines the third. In the real world,
    a customer will often specify timeframe and budget for the task, which will then
    be your constraints to estimate a realistic scope within the broader task.


    Occasionally, a fourth variable is added (usually as the center of the triangle).


    - `Quality` is the number/severity of defects, simplifications, or functionality
    reductions you are willing to release with. Thus, quality may be used to describe
    non-binary characteristics of features in your scope (e.g. the time to respond
    to a user query should be no more than n milliseconds, but the lower the better).
    This is not, strictly speaking, an input variable like cost, time, and scope,
    but rather a metric for the quality of your output. You can make short-term gains
    in delivery schedules by sacrificing quality, but the cost is enormous. It will
    take more time to fix the next release and your credibility will be pretty well
    shot. More commonly, there is an expected minimum expected quality for the product,
    fixing this “variable”.


    In some definitions, the scope of the task/product is considered to be fixed or,
    otherwise, intertwined with quality, leading instead to an Iron Triangle consisting
    of cost, time, and quality.^([⁸](#fn8))


    More recently, two more variables have been defined as part of the new six-variable
    set of constraints:^([⁹](#fn9))


    - `Benefit` is the value delivered to the product provider and to the client.
    With new information about the market, client needs, or target audience, benefit
    may change, requiring changes to scope or to other variables.


    - `Risk` is the likelihood of not meeting expected values for the other criteria
    (such as failing to implement features, increasing development time, or exceeding
    the expected budget). Managing one type of risk may increase another type of risk
    (e.g., increasing time makes scope less risky, but is likely to increase cost).
    To minimize risk, developers need to control as many of the variables as possible,
    always keeping in mind that the only constant of software development is change.
    If you pay attention and effectively cope with change as it occurs, you can keep
    the risk and cost of change manageable.


    As shown in Figure [2-1](#270563_3_En_2_Chapter.xhtml#Fig1), all constraints need
    to be balanced. Altering one will require adjusting others to compensate.


    ![](images/270563_3_En_2_Chapter/270563_3_En_2_Fig1_HTML.jpg)


    A diagram illustrates multiple intersecting circles arranged in a circular pattern.
    The circles are labeled scope, risk, cost, benefit, time, and quality.


    **Figure 2-1** The six variables of software development


    A number of other expansions to the variables that define a software development
    project have been suggested over the years. For example, The Square Route combines
    the Iron Triangle with additional considerations of project evaluation at the
    delivery stage and post-delivery stage.^([^(10)](#fn10)) Additional constrains
    external to the organization and the client may also play an important role in
    the creation of software products, including social, economic, legislative, environmental,
    and other factors.^([^(11)](#fn11))


    ## Software Development Approaches


    When it comes to developing software, there are several general approaches, which
    can be employed separately or together within an organization or even within a
    single project. Below we discuss planning, reducing waste with lean methodologies,
    and adapting by remaining agile.


    ### Plan-Based Software Development


    The main characteristic of plan-based software development is to make a plan and
    then follow through with it. It seems simple enough...except that to make a reliable
    plan you need to have all of the information AND that information must not change.
    As we are neither omniscient nor clairvoyant, this poses a bit of a problem. We
    are at the mercy of imprecise language describing poorly understood requirements
    that are devised to solve problems for changing real-world scenarios by teams
    of predictably unpredictable humans.


    Still, plans are comforting. It allows the illusion that we know what is going
    to happen. If we follow a plan and get a result, we hope that following the same
    plan in the future will yield the same result. Of course, controlling for all
    variables (both internal and external to the project) is impossible. Plans also
    allow for subplans and estimations for the entire hierarchy of plans. Granted,
    the further away the step, the less accurate our estimation. Plans also allow
    us to assess dependencies and schedule tasks accordingly. Of course, any change
    can tumble the carefully scheduled house of cards which we painstakingly designed,
    estimated, sorted, scheduled, and partially developed.


    Let’s say we do have a plan: we have devised steps and we will complete them one
    by one, in order. For a small project with a single developer, who is also the
    client, this may very well work out. In a more realistic scenario, the client
    is not us, the project is complex, and we have to coordinate with other stakeholders.
    Let’s say our basic plan has a design phase, an implementation phase, a testing
    phase, and delivery. We take several months to come up with a beautiful design
    and show our client, but the client wants changes. We take a few weeks to make
    changes to the design; the client approves. We make a development plan and attempt
    to implement our design over the next several months. In that time, some of the
    libraries we were relying on have been deprecated, some developers leave, new
    ones join the team, the market changes, causing the client to request changes
    to the design, and ultimately our development plan and our design are both obsolete.
    Do-over time... To make matters worse, so far we have delivered no value to the
    client and they are starting to lose confidence that we ever will. To recap, making
    reliable short plans for small projects is doable; anything else is wishful thinking.'
  raw: '## The 3(+3) Variables of Software Development


    According to the Project Management Institute,^([⁷](#fn7)) the three main *variables*
    *of software development* are cost, time, and scope.


    *   *Cost* (a.k.a. resources) is usually the most constrained; as a developer,
    you have very limited control over cost and you cannot spend your way to quality
    or to being on schedule. Cost can influence the size of the team or the types
    of tools available during development. For small companies and startups, cost
    also influences the environment where the developers will work.


    *   *Time* is your delivery schedule and is typically imposed on you from the
    outside. For example, most consumer products (be they hardware or software) will
    have a delivery date somewhere between August and October in order to hit the
    holiday buying season. You can’t move Christmas. If you are late, the only way
    to fix your problem is to drop features or lessen quality, neither of which is
    pretty. Time is also where Brooks’ Law gets invoked (adding programmers to a late
    project just makes it later).


    *   *Scope* (a.k.a. features) is what the product actually does. This is what
    developers should always focus on. It’s the most important of the variables from
    the customer’s perspective and it is also the one you as a developer have the
    most control over. Controlling scope allows you to provide managers and customers
    control over quality, time, and cost. If the developers don’t have control over
