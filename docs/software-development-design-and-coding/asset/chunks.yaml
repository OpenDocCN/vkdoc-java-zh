  trans: "\n\n![](img/979-8-8688-0285-0_CoverFigure.jpg)\n\nISBN 979-8-8688-0284-3\
    \  \n电子书 ISBN 979-8-8688-0285-0 [`doi.org/10.1007/979-8-8688-0285-0`](https://doi.org/10.1007/979-8-8688-0285-0)\
    \  \n© John F. Dooley 与 Vera A. Kazakova 2011, 2017, 2024  \n本作品受版权保护。所有权利均由出版商独家许可，涉及材料的全部或部分内容，具体包括翻译、重印、插图复用、朗诵、广播、微缩胶片或其他任何物理形式的复制、传输或信息存储与检索、电子改编、计算机软件，以及目前已知或未来开发的类似或不同方法。本出版物中使用通用描述性名称、注册商标、商标、服务标志等，即使未作明确声明，也不意味着这些名称不受相关保护性法律和法规的约束，因此可自由使用。出版商、作者和编辑假定，本书中的建议和信息在出版之日是真实准确的。出版商、作者或编辑均不对本书所含材料或可能存在的任何错误或遗漏提供明示或暗示的担保。出版商对已出版地图和机构归属中的管辖权主张保持中立。\n\
    \n本 Apress 印记由注册公司 APress Media, LLC（斯普林格自然集团成员）出版。\n\n注册公司地址为：1 New York Plaza,\
    \ New York, NY 10004, U.S.A.\n\n*约翰：再次献给黛安。*\n\n*维拉：献给我所有的学生。*\n\n前言\n\n这本书到底讲什么？简单来说，它从个人视角探讨如何开发软件。我们将审视从接手一个问题到最终编写出解决方案程序的完整过程。正因如此，本书重点聚焦于设计。你如何设计软件？需要考虑哪些因素？什么才是好的设计？有哪些方法和流程能帮助你设计软件？设计小型程序与设计大型程序有何不同？如何区分设计的好坏？有哪些通用模式能让你的设计更具可读性和可理解性？\n\
    \n本书也涉及代码构建。你如何编写程序并使其正常运行？“什么？”你可能会说，“我已经写过无数程序了！我当然知道怎么写代码！”在本书中，我们将探索你已有的实践，并研究改进方法。我们会花时间讨论编码标准、调试、单元测试、模块化以及优秀程序的特征。我们还会探讨阅读代码、程序可读性的构成要素，以及如何以改进为目的审查他人编写的代码。优秀、可读的代码能否替代文档？你究竟需要多少文档？\n\
    \n本书还涉及软件工程，它通常被定义为“将工程原理应用于软件开发”。什么是工程原理？首先，所有工程工作都遵循一个明确的流程，因此我们将讨论该流程包含哪些阶段，以及如何通过成为有效的促进者来最好地支持开发。我们会大量讨论敏捷方法论、它们如何适用于小型开发团队，以及它们的项目管理技术如何应用于中小型项目。所有工程工作都基于将科学和数学应用于现实问题。我们通常会通过设计和实现特定问题的解决方案来为理论讨论提供实践基础。\n\
    \n顺便提一句，至少还有一个人（除了本书作者之外）认为软件开发并非一门工程学科。我们指的是 Alistair Cockburn，你可以在[`http://alistair.cockburn.us/The+end+of+software+engineering+and+the+start+of+economic-cooperative+gaming`](http://alistair.cockburn.us/The+end+of+software+engineering+and+the+start+of+economic-cooperative+gaming)阅读他的论文《软件工程的终结与经济合作博弈的开始》。\n\
    \n最后，本书还涉及专业实践、作为软件开发者的道德与责任、社会问题、人际交往技能、隐私、如何编写安全稳健的代码等内容。简而言之，就是成为一名专业软件开发者所需的各种非技术性要素。\n\
    \n本书涵盖了 ACM/IEEE 计算机学会计算机科学本科学位课程指南（即 CS2023）¹中描述的许多主题。具体而言，它涵盖了指南中多个知识领域的主题，包括软件开发基础、软件工程、系统基础、并行与分布式计算、编程语言，以及社会问题与专业实践。本书既可作为大学三年级本科生软件设计与开发课程的教材，也可作为在职专业人士的手册。虽然章节顺序大致遵循标准的软件开发流程，但你可以独立且不按顺序阅读各章。我们假设你已经具备编程能力，并且至少熟悉\
    \ Java、C 或 C++中的一种语言。我们还假设你熟悉基本的数据结构，包括列表、队列、栈、映射和树，以及操作它们的算法。\n\n在第三版中，若干章节已被重写，所有章节都进行了更新，包括新增内容和示例。本书讨论了现代软件开发流程与技术；值得注意的是，关于敏捷技术的论述已得到更新和扩展。第二版中许多关于计划驱动流程和项目管理的讨论已被删除或精简，取而代之的是关于敏捷方法论（包括\
    \ Scrum、精益软件开发和看板）的更详尽和全新的论述。新增了一章关于知识产权、所有权和义务的内容。最后，关于项目管理基础的章节得到了大幅扩展，新增了对“软意识开发”（Soft-Aware\
    \ development）的介绍和讨论，这是一种基于以下理念的软件开发方法：学习制作软件不如*在尝试制作软件的过程中学习协作*更为关键。\n\n我们曾在一门高级软件开发课程中使用本书，它源于我们为该课程编写的讲义。我们之所以编写自己的讲义，是因为我们找不到一本涵盖我们认为软件开发课程所必需的所有主题的书籍——不同于软件工程或仅仅编程的课程。软件工程书籍往往更侧重于流程和项目管理，而非设计和实际开发。我们希望聚焦于真实代码的设计与编写，而不是如何管理大型项目。本书代表了我们的观点：在中小型团队中成为一名软件开发者，并协助开发出卓越的软件需要具备哪些素质。"
- fmt: "# 1. Introduction to Software Development\n\n> *“Not only are there no silver\
    \ bullets now in view, the very nature of software makes it unlikely that there\
    \ will be any—no inventions that will do for software productivity, reliability,\
    \ and simplicity what electronics, transistors, and large-scale integration did\
    \ for computer hardware. We cannot expect ever to see twofold gains every two\
    \ years.”*\n> \n> —Frederick J. Brooks, Jr.^([²](#fn2))\n\nSo, you might be asking\
    \ yourself, why is this book called *Software Development, Design, and Coding*?\
    \ Why isn’t it called *All About Programming* or *Software Engineering*? After\
    \ all, isn’t that what software development is? Well, no. Programming is a part\
    \ of software development, but it’s certainly not all of it. Likewise, software\
    \ development is a part of software engineering, but it’s not all of it.\n\nHere’s\
    \ the definition of software development that we’ll use in this book: software\
    \ development is the process of taking a set of requirements from a user (a problem\
    \ statement), analyzing them, designing a solution to the problem, and then implementing\
    \ that solution on a computer.\n\nBut isn’t that programming? Well, no. Programming\
    \ is really just the implementation part, or possibly the design and implementation\
    \ part, of software development. Programming is central to software development,\
    \ but it’s not the whole thing.\n\nWell, then, isn’t it software engineering?\
    \ Again, no. Software engineering also involves a process and includes software\
    \ development, but it also includes the entire management side of creating a computer\
    \ program that people will use. Software engineering includes project management,\
    \ configuration management, scheduling and estimation, baseline building and scheduling,\
    \ managing people, and several other things. Software development is the fun part\
    \ of software engineering.\n\nSo software development is a narrowing of the focus\
    \ of software engineering to just that part concerned with the creation of the\
    \ actual software. And it’s a broadening of the focus of programming to include\
    \ analysis, design, and release issues.\n\n## What We’re Doing\n\nIt turns out\
    \ that, after 80 or so years of using computers, we’ve discovered that developing\
    \ software is hard. Learning how to develop software effectively, efficiently,\
    \ and sustainably is also hard. You’re not born knowing how to do it and many\
    \ people, even those who take programming courses and work in the industry for\
    \ years, don’t do it particularly well. It’s a skill you need to pick up and practice—a\
    \ lot. You don’t learn programming and development by reading books—not even this\
    \ one. You learn it by developing software. That, of course, is the attraction:\
    \ to work on interesting and difficult problems. The challenge is to work on something\
    \ you’ve never done before, something you might not even know if you can solve.\
    \ That’s what has you coming back to create new programs again and again.\n\n\
    There are probably several ways to learn software development. But we think that\
    \ all of them involve reading excellent designs, reading a lot of code, writing\
    \ a lot of code, and thinking deeply about how to approach a problem and design\
    \ a solution for it. Reading a lot of code, especially really beautiful and efficient\
    \ code, gives you lots of good examples about how to think about problems and\
    \ approach their solution in a particular style. Writing a lot of code lets you\
    \ experiment with the styles and examples you’ve seen in your reading. Thinking\
    \ deeply about problem solving lets you examine how you work and how you do design,\
    \ and lets you extract from your labors those patterns that work for you; it makes\
    \ your programming more intentional.\n\nWe believe that by the end of the book\
    \ you’ll have a much better idea of what the design of good programs is like,\
    \ what makes an effective and productive developer, and how to develop larger\
    \ pieces of software. You’ll know a lot more about design issues. You’ll have\
    \ thought about working in a team to deliver a product to a written schedule.\
    \ You’ll begin to understand project management, know some metrics and how to\
    \ review work products, and understand configuration management. We will not cover\
    \ everything in software development—not by a long stretch—and we’ll only be giving\
    \ a cursory look at the management side of software engineering, but you’ll be\
    \ in a much better position to visualize, design, implement, and test software\
    \ of many sizes, either by yourself or in a team.\n\n## Acknowledgments\n\nWe’d\
    \ like to thank Melissa Duffy and Shonmirin P. A. of Apress for making this new\
    \ edition possible. Our Technical Reviewer and all the staff at Apress have been\
    \ very helpful and gracious. The book is much better for their reviews, comments,\
    \ and edits.\n\nThanks also to all of the students in CS 292 over the years who\
    \ have used successive versions of this material, first as course notes and then\
    \ as the finished book, and to our Knox College Computer Science colleagues David\
    \ Bunde and Jaime Spacco who’ve listened to us. Finally, thanks to Knox College\
    \ for giving us the time and resources to finish all the editions of this book.\n\
    \n## About the Authors\n\n## About the Technical Reviewer\n\n## Footnotes\n\n\
