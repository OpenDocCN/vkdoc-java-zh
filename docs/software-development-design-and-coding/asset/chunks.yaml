  trans: '

    ## 棘手问题


    根据里特尔和韦伯的定义，*棘手问题*是指那些只有在问题解决后才能完全了解其需求的问题，或者其需求和解决方案会随时间演变的问题。事实证明，这描述了软件开发中大多数“有趣”的问题。杰夫·康克林修订了里特尔和韦伯对棘手问题的描述^(¹⁴⁷)，并提供了更简洁的棘手问题特征列表^(¹⁴⁸)。转述如下：


    1.  *在解决方案创建之前，棘手问题无法被理解。* 另一种说法是，问题的定义和解决是同时进行的。^(¹⁴⁹)


    2.  *棘手问题没有停止规则*；也就是说，你可以为问题创建增量解决方案，但没有任何东西能告诉你已经找到了正确且最终的解决方案。


    3.  *棘手问题的解决方案没有对错之分*；它们只有好坏之分，或者足够好与不够好之分。


    4.  *每个棘手问题本质上都是新颖且独特的。* 由于问题的“棘手性”，即使下周遇到类似的问题，你基本上也必须从头开始，因为需求会有足够大的差异，解决方案仍然难以捉摸。


    5.  *每个棘手问题的解决方案都是一次性操作。* 参见上一条。


    6.  *棘手问题没有现成的备选解决方案。* 也就是说，没有一个小而有限的解决方案集可供选择。


    棘手问题无处不在。例如，创建一个文字处理程序就是一个棘手问题。你可能认为你知道文字处理器需要做什么：插入文本、剪切粘贴、处理段落、打印。但这个功能列表只是某个人的列表。一旦你“完成”了文字处理器并发布它，你就会被新的功能请求淹没：拼写检查、脚注、多栏、支持不同字体、颜色、样式，等等。文字处理程序基本上永远不会完成——至少在你发布最后一个版本并终止产品生命周期之前是这样。


    棘手问题还包括那些你一开始并不真正知道是否能解决的问题。专家系统需要一个用户界面、一个推理引擎、一组规则和一个领域信息数据库。对于特定领域，一开始完全无法确定你是否能创建出推理引擎用来得出结论和建议的规则。因此，你必须迭代不同的规则集，发布下一个版本，然后观察其表现如何。然后你再次重复，添加和修改规则。在你完成之前，你并不真正知道解决方案是否令人满意（即使只是暂时的）。这正是一个棘手问题。


    康克林、里特尔和韦伯指出，当面对一个庞大而复杂的问题（即棘手问题）时，传统认知研究表明，大多数人会遵循线性问题解决方法，从问题自上而下地工作到解决方案。这相当于第
    2 章中描述的传统瀑布模型。^(¹⁵⁰) 图 8-1 展示了这种线性方法。


    ![](img/270563_3_En_8_Fig1_HTML.jpg)


    一张图展示了从问题到解决方案的向下步骤。这些步骤被标记为需求、分析、设计和实现。


    图 8-1


    线性问题解决方法


    与这种线性的瀑布方法不同，真正的棘手问题解决者倾向于使用一种在需求分析和解决方案建模之间来回摆动的方法，直到问题解决方案足够好为止。康克林称此为*机会驱动*或*机会主义*方法，因为设计者正在寻找任何机会向解决方案推进。^(¹⁵¹)
    机会驱动方法看起来有点像图 8-2。


    ![](img/270563_3_En_8_Fig2_HTML.jpg)


    一张图展示了从问题到解决方案的向下步骤，标记为需求、分析、设计和实现。背景中的一条线以多个波峰和波谷的形式向前推进。


    图 8-2


    机会驱动式开发方法


    在这张图中，锯齿线表示设计者的工作从问题到解决方案原型再返回，逐步演进对需求的理解和解决方案的迭代，并收敛到一个足够好以发布的实现上。举个例子，让我们快速看一下一个网络应用程序。


    假设一个非营利组织为你所在县保存了一份青少年活动列表。该列表定期更新，并分发给全县的图书馆。目前，该列表保存在电子表格中，并以活页夹的纸质形式分发。该非营利组织希望将其所有数据上线，并通过网络访问。它还希望能够通过同一个网站更新数据。你说，这很简单。它只是一个带有
    HTML 前端的网络应用程序，以及作为后端的用于更新和查询数据库的数据库和中间件代码。没问题。


    啊，但这实际上是一个伪装起来的棘手问题。首先，客户完全不知道他们希望网页看起来或表现如何，所以你第一次给他们的任何东西都不会完全符合他们的要求；在你完成之前，问题不会被完全理解。其次，随着你开发原型，他们会想要更多功能——所以问题没有停止规则。最后，随着时间的推移，非营利组织会想要进行更改，所以没有“正确”的答案，只有各种“足够好”的答案。非常棘手。


    ## 温顺问题


    康克林还列出了“温顺”问题的特征，即那些你可以轻松可靠地找到解决方案的问题。“一个温顺问题


    1.  有一个定义明确且稳定的问题陈述；


    2.  有一个明确的停止点（即达到解决方案时）；


    3.  有一个可以客观评估对错的解决方案；


    4.  属于一类可以用相同类似方式解决的所有相似问题；


    5.  有可以轻松尝试和放弃的解决方案；并且


    6.  附带一组有限的备选解决方案。”^(¹⁵²)


    温顺问题的一个绝佳例子是对数据值列表进行排序：


    *   问题很容易且清晰地陈述：使用此函数比较数据元素，将此列表按升序排序。


    *   排序有一个明确的停止点：列表已排序。


    *   排序的结果可以客观评估（列表要么正确排序，要么不正确）。


    *   排序属于一类可以用相同方式解决的所有相似问题。对整数排序类似于对字符串排序，也类似于使用键对数据库记录排序，等等。


    *   排序有可以轻松尝试和放弃的解决方案。


    *   最后，排序有一组有限的备选解决方案；基于比较的排序有一套已知的算法和一个理论下界。

    '
- fmt: '# The Design Process


    *Design is messy*. Even if you completely understand the problem requirements
    (given a tame problem), you typically have many alternatives to consider when
    you’re designing a software solution. You’ll also usually make lots of mistakes
    before you come up with a solution that works. As you saw in Figure [8-2](#270563_3_En_8_Chapter.xhtml#Fig2),
    your design will change as you understand the problem better over time. This gives
    the *appearance* of messiness and disorganization, but really, you’re making progress.


    *Design is about tradeoffs and priorities*. Most software projects are time-limited,
    so you usually won’t be able to implement all the features that the customer wants.
    You have to figure out the subset that will give the customer the largest number
    of high priority features in the time you have available. So you have to prioritize
    the requirements and trade off one subset for another.


    *Design is heuristic*. Design is largely about decomposing a larger problem into
    smaller, more manageable pieces.^([^(153)](#fn153)) For the overwhelming majority
    of projects there is no set of cut and dried rules that says, “First we design
    component X using technique Y. Then we design component Z using technique W.”
    Software just doesn’t work that way. Software design is done using a set of ever-changing
    heuristics (cognitive shortcuts) that each designer acquires over the course of
    a career. Over time good designers learn more heuristics and patterns (see Chapter
    [13](#270563_3_En_13_Chapter.xhtml)), which allow them to quickly get through
    the easy bits of a design and to reach the heart of the wickedness of the problem.
    The best thing you can do is to shadow an experienced designer and learn the heuristics.


    *Designs evolve*. Good designers recognize that for any problem, tame or wicked,
    the requirements will change over time. This will then cascade into changes in
    your design, causing it to evolve over time. This is particularly true across
    product releases and new feature additions. The trick here is to create a software
    architecture (Chapter [7](#270563_3_En_7_Chapter.xhtml)) that is amenable to change
    with limited effect on the downstream design and code.


    ## Desirable Design Characteristics (Things Your Design Should Favor)


    Regardless of the size of your project or what process you use to do your design,
    there are a number of desirable characteristics that every software design should
    have. These are the principles you should adhere to as you develop your design.
    Your design doesn’t necessarily need to exhibit all of these characteristics,
    but having a majority of them will certainly make your software easier to write,
    understand, and use.


    * *Fitness of purpose*: Your design must work and work correctly in the sense
    that it must satisfy the requirements you’ve been given, within the constraints
    of the platform on which your software will be running. Don’t add new requirements
    as you go; the customer will do that for you.


    * *Separation of concerns*: Related closely to modularity, this principle says
    you should separate out functional pieces of your design cleanly in order to facilitate
    ease of maintenance and simplicity. Modularity is good.


    * *Simplicity*: Keep your design as simple as possible. This will let others understand
    what you’re up to. If you find a place that can be simplified, do it! If simplifying
    your design means adding more modules or classes to your design, that’s okay.
    Simplicity also applies to interfaces between modules or classes. Simple interfaces
    allow others to see the data and control flow in your design. In agile methodologies,
    this idea of simplicity is kept in front of you all the time. Most agile techniques
    have a rule that says if you’re working on part of a program and you have an opportunity
    to simplify it (called *refactoring* in agile-speak), do it right then and there.
    Keep your design and your code as simple as possible at all times.


    * *Ease of maintenance*: A simple, understandable design is amenable to changes
    needed for code maintenance. The most inevitable kind of necessary change you’ll
    encounter is fixing errors. Errors occur at all phases of the development process,
    requirements, analysis, design, coding, and testing. The more coherent and simple
    your design is, the easier it will be to isolate and fix errors.


    * *Loose coupling*: When you are separating your design into modules (or in object-oriented
    design, into classes), the degree to which the modules depend on each other is
    called *coupling*. *Tightly coupled* modules may share data or procedures, so
    a change in one module is much more likely to require a change in the other module.
    This increases the maintenance burden and makes the modules more likely to contain
    errors. *Loosely coupled* modules, on the other hand, hide the details of how
    they perform operations from other modules. Any data they share must be passed
    between procedures or methods via an *interface*. An example of loose coupling
    is the `qsort()` function in the Standard C library; it takes a provided list
    and sorts it in place. You don’t need to know which particular sorting algorithm
    is used because you just give the function the original list and you get back
    the sorted one. Loose coupling lightens the maintenance burden because a change
    to one class or function will not likely affect how another class or function
    operates, as long as the interface is invariant. In this way changes are isolated
    and errors are much less likely to propagate.


    * *High cohesion*: The complement of loose coupling is high cohesion. *Cohesion*
    within a module is the degree to which the module is self-contained with regards
    both to the data it holds and the operations that act on the data. A module with
    high cohesion has all the data it needs and all the operations allowed on the
    data are defined within the module itself. In the cases of object-oriented classes,
    any object instantiated from highly cohesive class template is very independent
    and only communicates with other objects via its published interface.


    * *Extensibility*: An added benefit of simplicity and loose coupling is the ability
    to easily add new features to the design. This is extensibility. One of the features
    of software solutions to wicked problems is that they’re never really finished.
    So after every product release, the customer typically asks for new features.
    The easier it is to add new features or make any other changes, the cleaner your
    design will remain over time.


    * *Portability*: While not high on the list, keeping in mind that your software
    may need to be ported to another platform (or two or three) is a desirable characteristic.
    There are many issues involved with porting software, including operating system
    issues, hardware architecture, and user interface issues. This is particularly
    true for web applications.'
  raw: '## The Design Process


    *Design is messy*. Even if you completely understand the problem requirements
    (given a tame problem), you typically have many alternatives to consider when
    you’re designing a software solution. You’ll also usually make lots of mistakes
    before you come up with a solution that works. As you saw in Figure [8-2](#270563_3_En_8_Chapter.xhtml#Fig2),
    your design will change as you understand the problem better over time. This gives
    the *appearance* of messiness and disorganization, but really, you’re making progress.


    *Design is about tradeoffs and priorities*. Most software projects are time-limited,
    so you usually won’t be able to implement all the features that the customer wants.
    You have to figure out the subset that will give the customer the largest number
    of high priority features in the time you have available. So you have to prioritize
    the requirements and trade off one subset for another.


    *Design is heuristic*. Design is largely about decomposing a larger problem into
    smaller, more manageable pieces.^([^(153)](#fn153)) For the overwhelming majority
    of projects there is no set of cut and dried rules that says, “First we design
    component X using technique Y. Then we design component Z using technique W.”
    Software just doesn’t work that way. Software design is done using a set of ever-changing
    heuristics (cognitive shortcuts) that each designer acquires over the course of
    a career. Over time good designers learn more heuristics and patterns (see Chapter
    [13](#270563_3_En_13_Chapter.xhtml)), which allow them to quickly get through
    the easy bits of a design and to reach the heart of the wickedness of the problem.
    The best thing you can do is to shadow an experienced designer and learn the heuristics.


    *Designs evolve*. Good designers recognize that for any problem, tame or wicked,
    the requirements will change over time. This will then cascade into changes in
    your design, causing it to evolve over time. This is particularly true across
    product releases and new feature additions. The trick here is to create a software
    architecture (Chapter [7](#270563_3_En_7_Chapter.xhtml)) that is amenable to change
    with limited effect on the downstream design and code.


    ## Desirable Design Characteristics (Things Your Design Should Favor)


    Regardless of the size of your project or what process you use to do your design,
    there are a number of desirable characteristics that every software design should
    have. These are the principles you should adhere to as you develop your design.
    Your design doesn’t necessarily need to exhibit all of these characteristics,
    but having a majority of them will certainly make your software easier to write,
    understand, and use.


    *   *Fitness of purpose*: Your design must work and work correctly in the sense
    that it must satisfy the requirements you’ve been given, within the constraints
    of the platform on which your software will be running. Don’t add new requirements
    as you go; the customer will do that for you.


    *   *Separation of concerns*: Related closely to modularity, this principle says
    you should separate out functional pieces of your design cleanly in order to facilitate
    ease of maintenance and simplicity. Modularity is good.


    *   *Simplicity*: Keep your design as simple as possible. This will let others
    understand what you’re up to. If you find a place that can be simplified, do it!
    If simplifying your design means adding more modules or classes to your design,
    that’s okay. Simplicity also applies to interfaces between modules or classes.
    Simple interfaces allow others to see the data and control flow in your design.
    In agile methodologies, this idea of simplicity is kept in front of you all the
    time. Most agile techniques have a rule that says if you’re working on part of
    a program and you have an opportunity to simplify it (called *refactoring* in
    agile-speak), do it right then and there. Keep your design and your code as simple
    as possible at all times.


    *   *Ease of* *maintenance*: A simple, understandable design is amenable to changes
    needed for code maintenance. The most inevitable kind of necessary change you’ll
    encounter is fixing errors. Errors occur at all phases of the development process,
    requirements, analysis, design, coding, and testing. The more coherent and simple
    your design is, the easier it will be to isolate and fix errors.


    *   *Loose coupling*: When you are separating your design into modules (or in
    object-oriented design, into classes), the degree to which the modules depend
    on each other is called *coupling*. *Tightly coupled* modules may share data or
    procedures, so a change in one module is much more likely to require a change
    in the other module. This increases the maintenance burden and makes the modules
    more likely to contain errors. *Loosely coupled* modules, on the other hand, hide
    the details of how they perform operations from other modules. Any data they share
    must be passed between procedures or methods via an *interface*. An example of
    loose coupling is the `qsort()` function in the Standard C library; it takes a
    provided list and sorts it in place. You don’t need to know which particular sorting
    algorithm is used because you just give the function the original list and you
    get back the sorted one. Loose coupling lightens the maintenance burden because
    a change to one class or function will not likely affect how another class or
    function operates, as long as the interface is invariant. In this way changes
    are isolated and errors are much less likely to propagate.


    *   *High cohesion*: The complement of loose coupling is high cohesion. *Cohesion*
    within a module is the degree to which the module is self-contained with regards
    both to the data it holds and the operations that act on the data. A module with
    high cohesion has all the data it needs and all the operations allowed on the
    data are defined within the module itself. In the cases of object-oriented classes,
    any object instantiated from highly cohesive class template is very independent
    and only communicates with other objects via its published interface.


    *   *Extensibility*: An added benefit of simplicity and loose coupling is the
    ability to easily add new features to the design. This is extensibility. One of
    the features of software solutions to wicked problems is that they’re never really
    finished. So after every product release, the customer typically asks for new
    features. The easier it is to add new features or make any other changes, the
    cleaner your design will remain over time.


    *   *Portability*: While not high on the list, keeping in mind that your software
    may need to be ported to another platform (or two or three) is a desirable characteristic.
    There are many issues involved with porting software, including operating system
    issues, hardware architecture, and user interface issues. This is particularly
    true for web applications.'
  trans: '

    ## 设计过程


    *设计是混乱的*。即使你完全理解了问题需求（假设是一个驯良问题），在设计软件解决方案时，通常也会有许多备选方案需要考虑。在得出可行的解决方案之前，你通常也会犯很多错误。正如你在图
    8-2 中所见，随着你对问题的理解逐渐加深，你的设计会随着时间的推移而改变。这给人一种*看似*混乱和无序的感觉，但实际上，你正在取得进展。


    *设计关乎权衡与优先级*。大多数软件项目都有时间限制，因此你通常无法实现客户想要的所有功能。你必须找出在可用时间内能为客户提供最多高优先级功能的子集。因此，你必须对需求进行优先级排序，并在不同的子集之间进行权衡。


    *设计是启发式的*。设计在很大程度上是将一个较大的问题分解成更小、更易于管理的部分。^(¹⁵³) 对于绝大多数项目而言，并不存在一套一成不变的规则，规定“首先，我们使用技术
    Y 设计组件 X。然后，我们使用技术 W 设计组件 Z。”软件并非如此运作。软件设计是通过一套不断变化的启发式方法（认知捷径）来完成的，每位设计师都在其职业生涯中逐渐积累这些方法。随着时间的推移，优秀的设计师会学到更多的启发式方法和模式（参见第
    13 章），这使他们能够快速完成设计中简单的部分，并触及问题的核心难点。你能做的最好的事情就是跟随一位经验丰富的设计师，学习这些启发式方法。


    *设计是不断演化的*。优秀的设计师认识到，对于任何问题，无论是驯良的还是棘手的，需求都会随着时间的推移而改变。这进而会引发设计的变更，导致其不断演化。这在产品发布和添加新功能时尤其如此。这里的诀窍是创建一个软件架构（第
    7 章），使其易于变更，同时对下游设计和代码的影响有限。


    ## 理想的设计特性（你的设计应倾向于具备的特性）


    无论你的项目规模大小，或者你使用何种流程进行设计，每个软件设计都应具备一些理想的特性。这些是你在进行设计时应遵循的原则。你的设计不一定需要具备所有这些特性，但拥有其中大部分特性无疑会使你的软件更易于编写、理解和维护。


    *   *目的适用性*：你的设计必须能够工作，并且工作正确，即它必须满足你被赋予的需求，同时受限于软件运行平台的约束。不要在设计过程中自行添加新需求；客户会为你做这件事。


    *   *关注点分离*：该原则与模块化密切相关，它要求你将设计中功能性的部分清晰地分离开来，以利于维护的简便性和简洁性。模块化是好的。


    *   *简洁性*：让你的设计尽可能简单。这能让其他人理解你的意图。如果你发现某个地方可以简化，那就去做！如果简化设计意味着增加更多的模块或类，那也是可以的。简洁性同样适用于模块或类之间的接口。简单的接口能让其他人看清你设计中的数据流和控制流。在敏捷方法论中，这种简洁性的理念始终贯穿其中。大多数敏捷技术都有一条规则：如果你正在处理程序的某一部分，并且有机会简化它（在敏捷术语中称为*重构*），那就立即就地完成。始终保持你的设计和代码尽可能简单。


    *   *易于维护*：一个简单、可理解的设计有利于进行代码维护所需的变更。你遇到的最不可避免的必要变更类型是修复错误。错误可能发生在开发过程的各个阶段：需求、分析、设计、编码和测试。你的设计越连贯、越简单，就越容易隔离和修复错误。


    *   *松散耦合*：当你将设计分解为模块（或在面向对象设计中分解为类）时，模块之间相互依赖的程度称为*耦合*。*紧密耦合*的模块可能共享数据或过程，因此一个模块的变更更有可能需要另一个模块也进行变更。这会增加维护负担，并使模块更可能包含错误。相反，*松散耦合*的模块会向其他模块隐藏其执行操作的细节。它们共享的任何数据都必须通过*接口*在过程或方法之间传递。松散耦合的一个例子是标准
    C 库中的 `qsort()` 函数；它接收一个提供的列表并对其进行原地排序。你无需知道具体使用了哪种排序算法，因为你只需将原始列表交给该函数，就能得到排序后的列表。松散耦合减轻了维护负担，因为只要接口不变，对一个类或函数的更改不太可能影响另一个类或函数的运行方式。这样，变更就被隔离了，错误传播的可能性也大大降低。


    *   *高内聚性*：松散耦合的补充是高内聚性。模块内的*内聚性*是指模块在其所持有的数据以及作用于这些数据的操作方面的自包含程度。一个高内聚的模块拥有其所需的所有数据，并且允许对这些数据执行的所有操作都在模块内部定义。对于面向对象的类而言，从高内聚类模板实例化出的任何对象都非常独立，并且仅通过其公开的接口与其他对象通信。


    *   *可扩展性*：简洁性和松散耦合带来的一个额外好处是能够轻松地向设计添加新功能。这就是可扩展性。针对棘手问题的软件解决方案的一个特点是，它们从未真正完成。因此，每次产品发布后，客户通常都会要求添加新功能。添加新功能或进行其他更改越容易，你的设计就能随着时间的推移保持越清晰。


    *   *可移植性*：虽然不在列表前列，但考虑到你的软件可能需要移植到另一个（或两三个）平台，这是一个理想的特性。移植软件涉及许多问题，包括操作系统问题、硬件架构和用户界面问题。对于
    Web 应用程序尤其如此。

