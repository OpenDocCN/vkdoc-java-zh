- fmt: "# The Last Word on Ethics\n\nEvery software development professional will\
    \ encounter ethical problems during the course of their career. How you handle\
    \ those ethical situations will say a lot about your professional behavior and\
    \ moral character. To wrap up this discussion of professional practice, let’s\
    \ look at one more list of fundamental ethical principles that you should carry\
    \ with you throughout your career. The original list comes largely from Quinn,\
    \ though it has been modified over the years.^([^(103)](#fn103))\n\n1. *Be impartial*.\
    \ You will have some amount of loyalty to your company, but you also must have\
    \ loyalty to society as a whole and to yourself. Make sure you remember that.\n\
    \n2. *Disclose information that others ought to have*. Don’t hide information\
    \ from people who need to know it. Don’t be deceptive or deliberately misleading.\
    \ Make sure you disclose any conflicts of interest.\n\n3. *Respect the rights\
    \ of others*. This includes intellectual property rights, civil rights, and other\
    \ property rights. Don’t steal, misuse, or misrepresent the property and contributions\
    \ of others.\n\n4. *Treat others fairly*. Don’t discriminate against others. Make\
    \ sure that others receive fair wages and benefits and credit for work done.\n\
    \n5. *Take responsibility for your own actions and inactions*. Take responsibility\
    \ for everything you do—or don’t do—whether good or bad.\n\n6. *Take responsibility\
    \ for the actions of those you supervise*. The old saying “The buck stops here”\
    \ applies to you as a manager as well. This also includes making sure you communicate\
    \ effectively with your employees.\n\n7. *Maintain your integrity*. Deliver on\
    \ your commitments. Be loyal to your employer (as long as they also operate in\
    \ an ethical manner). Do not ask someone to do anything you would not do yourself.\n\
    \n8. *Continually improve your abilities*. Software development and the computer\
    \ industry as a whole are in a constant state of flux. Tools and languages you\
    \ used in college will be obsolete five years later. Make sure you are a lifelong\
    \ learner.\n\n9. *Share your knowledge, expertise, and values*. The more experience\
    \ you acquire in your profession, the more you are obligated to share your knowledge\
    \ and expertise with your coworkers and subordinates. You should also set an example\
    \ for others by living these values.\n\n# 5. Intellectual Property, Obligations,\
    \ and Ownership\n\n> *He who receives an idea from me, receives instruction himself\
    \ without lessening mine; as he who lights his taper at mine, receives light without\
    \ darkening me. That ideas should freely spread from one to another over the globe,\
    \ for the moral and mutual instruction of man, and improvement of his condition,\
    \ seems to have been peculiarly and benevolently designed by nature, when she\
    \ made them, like fire, expansible over all space, without lessening their density\
    \ in any point, and like the air in which we breathe, move, and have our physical\
    \ being, incapable of confinement or exclusive appropriation.*\n> \n> —Thomas\
    \ Jefferson\n\nIn this chapter, we will talk about a number of issues concerning\
    \ teams and companies that, while not necessarily affecting software development,\
    \ are central to the ultimate end of your work, the software itself.^([^(104)](#fn104))\n\
    \n## Who Owns What?\n\nWhen you are working for an established company, or working\
    \ on a team on a project, or in a start-up, the question of *who owns the software*\
    \ you are producing comes up regularly. If you work for an established company,\
    \ say Microsoft, Google, Amazon, or even General Motors, ownership is usually\
    \ pretty straightforward. On your first day of work you’ll fill out a number of\
    \ forms, mostly for taxes. But there will be one form in which you are required,\
    \ as a condition of employment, to give away the rights to all the intellectual\
    \ property you create while you are working for the company and/or using the company’s\
    \ resources.^([^(105)](#fn105)) From that day on everything you create or modify\
    \ for the company is known as a “work for hire” and belongs to the company.^([^(106)](#fn106))\n\
    \nStart-ups are somewhat different, particularly if you are one of the original\
    \ creators of the start-up company. In that case, all of you will create and sign\
    \ a contract that describes what you’ll be producing as a company and allocates\
    \ a certain percentage of the company or a percentage of the product proceeds\
    \ to each of the creators. You will essentially all own the intellectual property\
    \ and all “joint work” together and will agree how things are divided up. Team\
    \ projects as part of a class or college project work similarly to start-ups.\
    \ There may be many unique team-specific and project-specific quirks in this process\
    \ and lots of discussion about actual percentages for each person on the team.\
    \ These discussions need to happen early, they need to happen constructively,\
    \ and they need to happen with accurate understanding of everyone’s rights and\
    \ responsibilities with respect to the “joint work.” Neglecting to reach an explicit\
    \ agreement by properly and preemptively addressing everyone’s concerns can destroy\
    \ your teamwork, project, or even company before it gets off the ground, so it\
    \ is important to understand what intellectual property is, who owns it, and how\
    \ it can be divided.\n\n## What Is Intellectual Property?\n\nIntellectual property\
    \ (IP) is a category of property that includes intangible creations of the human\
    \ intellect. The products of human intellect are characterized in the law as *non-rivalrous\
    \ public goods*.^([^(107)](#fn107)) This means that the same product may be used\
    \ simultaneously by more than one person without diminishing the availability\
    \ of that product for use by others. So while only one person can drive your car\
    \ at a time, many people can use Microsoft Excel at once.\n\nThe law of intellectual\
    \ property is designed to provide an incentive to authors and inventors to produce\
    \ works for the benefit of the public. The public’s use of such works is regulated\
    \ to ensure that authors and inventors are compensated for their efforts. So intellectual\
    \ property law protects the work of authors and inventors and also allows limited\
    \ use of those works by others, allowing the authors and inventors to profit from\
    \ their work.\n\nIn the United States, intellectual property protections are enshrined\
    \ in the U.S. Constitution, Article I, Section 8, Clause 8, which says “The Congress\
    \ shall have power ... To promote the progress of science and useful arts, by\
    \ securing for limited times to authors and inventors the exclusive right to their\
    \ respective writings and discoveries.”^([^(108)](#fn108)) All other countries\
    \ also have intellectual property laws, but they may differ in certain particulars\
    \ from those of the United States.\n\nWe’ll look at three different types of intellectual\
    \ property protection that will likely come into play when one is writing computer\
    \ software. They are *public domain*, *copyright*, and *patents*.\n\n### Intellectual\
    \ Property: Public Domain Works\n\nCopyright, patents, and trademarks all provide\
    \ a degree of protection to the original creator or inventor of a work from others\
    \ using their work without fair compensation, for a fixed period of time. The\
    \ length of time that a creative work or invention is protected varies from country\
    \ to country and by the type of the original work. Any creative work that is not\
    \ so protected is considered to be in the *public domain*. Note that eventually,\
    \ all creative works and inventions end up in the public domain, and public domain\
    \ is forever. Public domain means that anyone can reproduce the work, change it,\
    \ perform it, create physical products from it, and so on, and they do not have\
    \ to provide compensation to the original creator or inventor, nor do they have\
    \ to get permission to make their changes. For example, you can perform your modern\
    \ version of Hamlet and not have to send William Shakespeare a check because all\
    \ of his works are in the public domain."
