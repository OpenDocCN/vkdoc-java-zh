  trans: "\n# 11. 面向对象分析与设计\n\n> *进行分析时，你试图理解问题。在我看来，这不仅仅是列出用例中的需求。……分析还涉及深入表面需求，构建出问题背后运作的心理模型。……某种概念模型是软件开发中必不可少的部分，即使是最不受约束的黑客也会这样做。*\n\
    > \n> ——马丁·福勒^(¹⁸²)\n\n> *面向对象设计，就其最简单的形式而言，基于一个看似基础的想法。计算系统对某些对象执行某些操作；为了获得灵活且可重用的系统，最好将软件的结构建立在对象之上，而非操作之上。*\n\
    \n> *一旦你这样说，你实际上并未给出定义，而是提出了一系列问题：对象究竟是什么？如何发现并描述对象？程序应如何操作对象？对象之间可能存在哪些关系？如何探索不同类型对象之间可能存在的共性？这些想法如何与经典的软件工程关注点（如正确性、易用性、效率）相关联？*\n\
    \n> *对这些问题的解答依赖于一系列令人印象深刻的技术，用于高效地生产可重用、可扩展且可靠的软件：继承（包括其线性（单继承）和多重形式）；动态绑定与多态；类型与类型检查的新视角；泛型；信息隐藏；断言的使用；契约式设计；安全的异常处理。*\n\
    > \n> ——伯特兰·迈耶^(¹⁸³)\n\n在定义面向对象分析与设计时，最好牢记你的目标。在分析和设计这两个过程阶段中，你都在生成一个*工作产品*，它更接近作为最终目标的代码。\n\
    \n在*分析*阶段，你正在细化已创建的功能列表，并生成一个客户需求的模型。你的最终目标是得到一份关于程序应做什么的描述——即其*本质特征*。这个最终产品以问题域及其解决方案的*概念模型*形式呈现。该模型可由多种元素组成，包括用例、用户故事、场景、初步类图、用户界面故事板，以及可能的某些类接口描述。\n\
    \n在*设计*阶段，你正在利用分析阶段产生的模型，创建最终将成为代码的类。你的最终目标是得到一份关于程序将如何实现概念模型并满足客户需求的描述。这个最终产品以解决方案的*对象模型*形式呈现。该模型由一组相关的类图、它们的关联关系以及它们之间如何交互的描述组成。这包括每个类的编程接口。由此，你应该能够相当快速地进入编码阶段。\n\
    \n## 分析\n\n那么，什么是面向对象分析呢？嗯，这取决于你和谁讨论。就我们的目的而言，我们将*面向对象分析*定义为一种*研究问题本质、确定其本质特征及其相互关系的方法*。^(¹⁸⁴)\
    \ 你的目标是最终得到一个问题解决方案的概念模型，然后你可以用它来创建对象模型——即你的设计。这个模型不考虑任何实现细节或目标系统的约束。它着眼于问题所在的领域，并试图创建一组特征、对象和关系，以描述该领域内的解决方案。什么使一个特征成为本质特征？通常，如果一个特征是客户明确表示必须拥有的，或者是一个程序运行所必需的非功能性需求，又或者是程序其他部分所依赖的核心程序元素，那么它就是本质特征。\n\
    \n概念模型描述了解决方案*将做什么*，通常包括用例、^(¹⁸⁵) 用户故事、^(¹⁸⁶) 用户场景和对象时序图。^(¹⁸⁷) 它还可以包括用户界面的描述和一组初步的类图（但这当然就逐渐偏向设计了）。\n\
    \n那么，如何创建这个概念模型呢？就像我们讨论过的所有其他方法论一样，正确答案是：视情况而定。这取决于对问题域的理解，取决于对已提出的功能列表的理解，还取决于对客户在每次程序迭代中反应的理解。正如你将看到的，变化是常态。\n\
    \n面向对象分析的关键部分是创建*用例*。通过用例，你可以从用户的角度创建场景的详细演练，这种演练能让你从外部理解程序应该做什么。任何规模的程序通常都会关联多个用例。事实上，单个用例可能包含场景中的替代路径。当使用敏捷方法论时，你通常会从产品负责人创建的*用户故事*开始，然后是一组充实用户故事的*场景*。这些场景随后被用来生成用例。稍后会详细介绍这一点。\n\
    \n一旦你创建了几个用例，如何得到类图呢？有几种建议的方法，但我们先只介绍一种，其余的留待以后讨论。我们要看的第一种方法是*文本分析*，即你利用用例，检查文本以寻找程序中类的线索。请记住，面向对象范式完全是关于对象以及这些对象的行为，因此这两点正是你需要从用例中提取出来的。\n\
    \n在文本分析中，你通过挑选用例中的*名词*来从文本中提取潜在的对象。因为名词是事物，而对象（通常）也是事物，所以名词很有可能是你程序中的对象。就行为而言，你需要查看用例中的*动词*。动词为你提供了描述状态变化或报告状态的动作词。这通常不是终点，但它为你提供了方法名和方法参数列表的初步候选。"
- fmt: '### Analysis: An Example


    Let’s go back to Burt’s Bird Buffet and Bath, the `B⁴++`. When last we left the
    `B⁴++` it automatically opened the feeding doors at sunrise and closed them at
    sunset. The `B⁴++` was a hit and Alice and Bob were thrilled with its performance.
    Once again the `B⁴` models were flying off the shelves.


    Then one day Burt gets a call from Alice. It seems she has an issue. While the
    `B⁴++` works just fine, Alice has noticed that she’s getting unwanted birds at
    her bird feeder. Recall that Alice is a songbird fanatic and she’s thrilled when
    cardinals, painted buntings, scarlet tanagers, American goldfinches, and tufted
    titmice show up at the feeder. But she’s not so thrilled when grackles, blue jays,
    and starlings drive away the songbirds and have their own feast. So Alice wants
    to be able to close the `B⁴++` feeding doors herself when the unwelcome birds
    show up and open them again when the songbirds come back. And you’re just the
    developer to do it.


    The first obvious question you ask Alice is, “How do you want to open and close
    the feeding doors?” “Well,” she says, “how about a remote control? That way I
    can stay inside the house and just open and close the doors when the birds arrive.”
    And so the game begins again.


    Let’s assume that you’re an agile team and you’ll do your updated design using
    agile techniques. The first thing you’ll need is a new user story. Recall that
    a user story usually takes the form: “As a <role>, I want to <action>, in order
    to <benefit>.” In this case you might say “As Alice, the owner, I want to open
    and close the bird feeder doors with a remote control, in order to keep the predator
    birds away from the feeder.”


    From this user story you can generate a scenario that fleshes out what Alice wants
    to do. A scenario might look like: “Alice is sitting at her kitchen table having
    her morning coffee. The `B⁴++` doors opened when the sun came out this morning
    and the feeder has attracted several songbirds. As Alice is watching the songbirds,
    a couple of blue jays arrive, chase the songbirds off, and begin feasting on the
    birdseed. Alice reaches for the remote control and presses the button. The bird
    feeder doors close smoothly and the blue jays fly off. Alice presses the remote
    control button again and the doors open. After a while the songbirds return and
    Alice can happily finish her coffee.”


    Just like last time, you can take this now fleshed-out problem statement and put
    together a use case. Your previous use case looked like this:


    1.  The sensor detects sunlight at a 40% brightness level.

    2.  The feeding doors open.

    3.  The birds arrive, eat, drink, and leave.

    4.  The sensor detects a decrease in sunlight to a 25% brightness level.

    5.  The feeding doors close.


    So the first thing you need to decide is whether your new problem is an alternate
    path in this use case or whether you need an entirely new use case.


    Let’s try a new use case. Why? Well, using the remote control doesn’t really fit
    into the sensor use case, does it? The remote can be activated at any time and
    it requires a user interaction, neither of which fits with the sensor. So let’s
    come up with a remote control use case:


    1.  Alice hears or sees birds at the bird feeder.

    2.  Alice determines that they are *not* songbirds.

    3.  Alice presses the remote control button.

    4.  The feeding doors close.

    5.  The birds give up and fly away.

    6.  Alice presses the remote control button.

    7.  The feeding doors open again.


    Does this cover all the situations? Are there any you’ve missed? There are two
    things to think of.


    First, in step #1 you have “Alice hears or sees birds.” The question is should
    the “or” matter? In this case, the answer is no because Alice is the one deciding
    and she’s the actor in this use case. You can’t control the actor; you can only
    respond to something the actor wants to do and make available options for the
    actor to exercise. In your case, your program will need to wait for the signal
    from the remote control and then do the right thing. (Not to get ahead of yourself,
    but your program is an event-driven system that has to wait (a.k.a. listen) for
    an event before it does something.)


    Secondly, what are the steps in the use case that will help you identify new objects?
    This is where your textual analysis comes in. In your previous version of this
    application, you’ve already got `BirdFeeder`, `Sensor`, and `FeedingDoor` objects.
    These are identified in the use case easily. So what is new now? The only new
    object here is the remote control. So what does the remote control do? How many
    buttons does it have? What does the program do when a remote control button is
    pressed?


    In your example, the remote control seems relatively simple. Opening and closing
    the feeding doors is a toggle operation: the doors open if they are closed, and
    close if they are open. Those are the only options, so the remote really just
    needs a single button to implement the toggle function.


    So at the end of your analysis of this new version of the program, you’ve got
    a new use case and a new class for the `B⁴++` program (see Figure [11-1](#270563_3_En_11_Chapter.xhtml#Fig1)).


    ![](images/270563_3_En_11_Chapter/270563_3_En_11_Fig1_HTML.jpg)


    A diagram illustrates the `RemoteControl` class. Three blocks has the following
    texts. `RemoteControl`. `doors` semicolon `FeedingDoor`. `pressButton` open bracket,
    close bracket.


    **Figure 11-1** The new `RemoteControl` class


    This exercise provides a couple of guidelines you can use for analysis.


    *   First, make *simple classes that work together* by sending and responding
    to messages. In your example, the simple classes `FeedingDoor` and `Sensor` encapsulate
    knowledge about the current state of the `BirdFeeder` and allow you to control
    the bird feeder with simple messages. This simplicity allows you to later easily
    add a new way of controlling the bird feeder with the `RemoteControl` class.


    *   Second, we say that *classes should have one responsibility.* Not only are
    the `FeedingDoor` and `Sensor` simple and easy to control, but they each only
    do one thing. This makes them easier to change later and easier to reuse.'
