  trans: '

    ## 软件开发的 3(+3) 个变量


    根据项目管理协会的说法，^(⁷) 软件开发的三个主要*变量*是成本、时间和范围。


    *   *成本*（即资源）通常是最受约束的；作为开发者，你对成本的控制非常有限，无法通过花钱来获得质量或按时交付。成本会影响团队规模或开发过程中可用的工具类型。对于小型公司和初创企业，成本还会影响开发人员的工作环境。


    *   *时间*是你的交付日程，通常由外部强加给你。例如，大多数消费产品（无论是硬件还是软件）的交付日期会在八月到十月之间，以便赶上假日购物季。你无法改变圣诞节。如果你延迟了，解决问题的唯一办法就是削减功能或降低质量，这两者都不理想。时间也是布鲁克斯法则（向一个延迟的项目增加程序员只会让它更延迟）适用的领域。


    *   *范围*（即功能）是产品实际能做的事情。这应该是开发者始终关注的重点。从客户的角度来看，它是最重要的变量，也是作为开发者的你控制权最大的变量。控制范围能让你为管理者和客户提供对质量、时间和成本的控制。如果开发者无法控制每个版本的功能集，那么他们很可能会超出计划。这就是为什么开发者应该对软件工作产品进行估算。


    成本、时间和范围共同构成了软件开发的*铁三角*，其中指定两个变量就定义了第三个变量。在现实世界中，客户通常会指定任务的时间框架和预算，这将成为你的约束条件，以便在更广泛的任务范围内估算出实际的范围。


    有时，会加入第四个变量（通常作为三角形的中心）。


    *   *质量*是指你愿意随产品一起发布的缺陷、简化或功能缩减的数量/严重程度。因此，质量可以用来描述范围内功能的非二元特性（例如，对用户查询的响应时间不应超过
    n 毫秒，但越低越好）。严格来说，这不像成本、时间和范围那样是一个输入变量，而是衡量你输出质量的指标。你可以通过牺牲质量来在交付计划上获得短期收益，但代价是巨大的。修复下一个版本将花费更多时间，你的信誉也会大打折扣。更常见的情况是，产品有一个预期的最低质量标准，从而固定了这个“变量”。


    在某些定义中，任务/产品的范围被认为是固定的，或者与质量相互交织，从而形成了一个由成本、时间和质量组成的铁三角。^(⁸)


    最近，又定义了两个变量，作为新的六变量约束集的一部分：^(⁹)


    *   *收益*是指交付给产品提供者和客户的价值。随着关于市场、客户需求或目标受众的新信息出现，收益可能会发生变化，从而需要对范围或其他变量进行调整。


    *   *风险*是指无法满足其他标准预期值的可能性（例如，未能实现功能、增加开发时间或超出预期预算）。管理一种类型的风险可能会增加另一种类型的风险（例如，增加时间会降低范围的风险，但可能会增加成本）。为了最小化风险，开发者需要尽可能多地控制变量，始终牢记软件开发中唯一不变的就是变化。如果你密切关注并在变化发生时有效应对，就能将变化的风险和成本控制在可管理的范围内。


    如图 2-1 所示，所有约束都需要平衡。改变其中一个将需要调整其他约束来补偿。


    ![](img/270563_3_En_2_Fig1_HTML.jpg)


    一张图表展示了多个相交的圆圈，呈圆形排列。这些圆圈分别标记为范围、风险、成本、收益、时间和质量。


    图 2-1


    软件开发的六个变量


    多年来，人们还提出了许多其他对定义软件开发项目的变量的扩展。例如，“方形路线”将铁三角与交付阶段和交付后阶段的项目评估考量相结合。^(¹⁰) 组织和客户之外的其他约束也可能在软件产品的创建中发挥重要作用，包括社会、经济、立法、环境等因素。^(¹¹)


    ## 软件开发方法


    在软件开发方面，有几种通用方法，可以在一个组织内甚至单个项目中单独或结合使用。下面我们讨论计划、通过精益方法论减少浪费，以及通过保持敏捷来适应变化。


    ### 基于计划的软件开发


    基于计划的软件开发的主要特点是制定计划，然后贯彻执行。这看起来很简单……除非要制定一个可靠的计划，你需要掌握所有信息，并且这些信息不能改变。由于我们既非全知也非能预知未来，这就带来了一些问题。我们受制于不精确的语言，这些语言描述的是理解不充分的需求，而这些需求是为了解决不断变化的现实场景中的问题，由一群可预测地不可预测的人类组成的团队所设计的。


    尽管如此，计划还是令人安心的。它让我们产生一种错觉，以为我们知道将要发生什么。如果我们遵循一个计划并得到了一个结果，我们希望将来遵循同样的计划能得到同样的结果。当然，控制所有变量（无论是项目内部还是外部的）是不可能的。计划还允许为整个计划层级制定子计划和估算。诚然，步骤越远，我们的估算就越不准确。计划还允许我们评估依赖关系并相应地安排任务。当然，任何变化都可能推倒我们精心设计、估算、排序、安排并部分开发的这座纸牌屋。


    假设我们确实有一个计划：我们设计了步骤，并将按顺序逐一完成。对于一个由单一开发者（同时也是客户）负责的小项目来说，这很可能行得通。在更现实的场景中，客户不是我们自己，项目很复杂，我们必须与其他利益相关者协调。假设我们的基本计划包括设计阶段、实施阶段、测试阶段和交付。我们花了几个月时间拿出一个漂亮的设计展示给客户，但客户想要修改。我们又花了几周时间修改设计；客户批准了。我们制定了一个开发计划，并试图在接下来的几个月里实施我们的设计。在这段时间里，我们依赖的一些库被弃用了，一些开发者离开了，新成员加入了团队，市场发生了变化，导致客户要求修改设计，最终我们的开发计划和设计都过时了。一切重来……更糟糕的是，到目前为止，我们还没有为客户交付任何价值，他们开始对我们能否交付失去信心。总结一下，为小项目制定可靠的短期计划是可行的；其他情况都只是美好的愿望。'
- fmt: '### Agile Software Development


    Starting in the mid-1990s, a group of process mavens began advocating a new model
    for software development. Targeting medium-sized software projects and smaller
    teams of developers, the new approach was intended to allow teams to quickly adjust
    to changing requirements and customer demands, while also releasing functional
    software much more quickly and frequently than under plan-driven models. The new
    model was, in a word, *agile*.^([^(12)](#fn12))


    In most *agile* process models, we start with the “known” requirements (a snapshot
    of the requirements at some time early in the process) and prioritize them, typically
    based on the customer’s ranking of what features are most important to deliver
    first. Keep in mind that what we think we know or understand about these requirements
    is commonly only somewhat accurate: natural language is imprecise; the understood
    meanings differ based on communicator background, positionality, and other context;
    and clients often do not necessarily understand what they want or need to solve
    their problem. Thus, one of our most important challenges in software development
    is to *iteratively approach an accurate shared understanding of the problem and
    the prospective solution*. According to Tom DeMarco, iterative software development
    follows one basic rule:


    > *Your project, the whole project, has a binary deliverable. On the scheduled
    completion day, the project has either delivered a system that is accepted by
    the user, or it hasn’t. Everyone knows the result on that day.*

    >

    > *The object of building a project model is to divide the project into component
    pieces, each of which has this same characteristic: each activity must be defined
    by a deliverable with* *objective completion criteria. The deliverables are demonstrably
    done or not done.*^([^(13)](#fn13))


    Rather loosely, we can devise a series of iterations, where each iteration is
    a complete Minimum Viable Product (MVP), working and robust, albeit with fewer
    features than the final goal product. For each iteration, we will select a set
    of the next highest priority requirements (including some you or the customer
    may have discovered during the previous iteration), develop, test, and demo the
    MVP, and gather feedback. This feedback may drastically alter our initial plan,
    which is why our initial plan is only a loose sketch of future development iterations.


    So what happens if you estimate wrong? What if you decide to include too many
    new features in an iteration? What if there are unexpected delays? Well, if it
    looks as if you won’t make your iteration deadline there are only two realistic
    alternatives: move the deadline or remove features. We’ll come back to this problem
    later when we talk about estimation and scheduling. The key to iterative development
    is “live a balanced life—learn some and think some and draw and paint and sing
    and dance and play and work every day some,”^([^(14)](#fn14)) or in the software
    development world, *analyze* some and *design* some and *code* some and *test*
    some every day. We’ll revisit this idea when we talk about the agile development
    models later in this chapter.


    Overall, agile is composed of ongoing short-term experiments, iteratively reviewed
    to evaluate product and practices, and to find processes that work for the team
    and the client. In other words, some good old-fashioned trial and error. While
    some failure is inevitable, it is more informative and less costly to fail on
    small increments, to fail early, and to learn from it quickly. Thus, we reduce
    the pressure of needing our intermediates to be right, requiring only that these
    decision are useful in helping us learn more about what was actually needed.


    Agile development works from the proposition that the goal of any software development
    project is working code. Consequently, the development team should spend most
    of their time writing code, not documentation. As opposed to the heavyweight plan-driven
    models mentioned above and espoused by groups like the Software Engineering Institute
    (SEI) at Carnegie Mellon University,^([^(15)](#fn15)) this new process model was
    *lightweight*, requiring less documentation and fewer process controls. Lightweight
    methodologies tend to emphasize writing tests before code, frequent product releases,
    significant customer involvement in development, common code ownership, and refactoring
    (rewriting code to make it simpler and easier to maintain). Lightweight methodologies
    do, unfortunately, suffer from several myths, the two most pernicious being that
    lightweight processes are only good for very small projects and that lightweight
    projects lack process discipline. Both of these are incorrect. The truth is that
    lightweight methodologies have been successfully used in many small and medium-sized
    projects (say up to about 500K lines of code), as well as in very large projects.
    Larger projects can nearly always be organized as a set of smaller projects, which
    together provide services to the single larger product. Lightweight methodologies
    also require process discipline, especially in the beginning of a project, when
    initial requirements and an iteration cycle are created, and in the test-driven-development
    used as the heart of the coding process.


    In the remainder of the chapter, we will review the agile values, principles,
    and activities that have been defined over the years. Note, however, that *agility
    necessarily extends to how these concepts and practices are ultimately incorporated
    into development* (i.e., to iteratively determine what works and what does not
    for each particular product/organization/team/etc.).'
