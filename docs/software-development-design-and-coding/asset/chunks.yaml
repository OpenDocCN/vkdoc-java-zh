    `ArrayList` 中最后一个元素之后的位置，从而能够通过 `hasPrevious()` 方法向后查找。在 Java 的 `Iterator` 和 `ListIterator`
    实现中，*游标*始终指向两个元素之间，这样 `hasNext()` 和 `hasPrevious()` 方法的调用才有意义；例如，当你调用 `iter.hasNext()`
    时，你是在询问迭代器集合中是否还有下一个元素。图 13-8 是对游标样式的抽象表示。


    ![](img/270563_3_En_13_Fig8_HTML.jpg)


    一幅插图展示了一系列标记为 e l 1 到 e l N 的方框，代表序列中的元素。每个方框之间有一个向上的箭头。


    图 13-8


    迭代器抽象中的游标


    最后，某些迭代器允许你在迭代器运行期间向集合中插入和删除元素。这些迭代器被称为*健壮迭代器*。Java 的 `ListIterator` 接口（而非 `Iterator`）允许在有限制的情况下，通过迭代器进行插入（通过
    `add()` 方法）和删除（通过 `remove()` 方法）。`add()` 方法仅将元素添加到紧邻 `next()` 方法将检索的下一个元素之前的位置，或紧邻
    `previous()` 方法调用将返回的下一个元素之后的位置。`remove()` 方法只能在连续的 `next()` 或 `previous()` 方法调用之间调用，不能连续调用两次，并且绝不能紧跟在
