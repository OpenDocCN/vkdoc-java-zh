    \ the children classes and clean up your design and your code.\n\nSo here’s BankAccount,\
    \ in Figure [11-4](#270563_3_En_11_Chapter.xhtml#Fig4).\n\n![](images/270563_3_En_11_Chapter/270563_3_En_11_Fig4_HTML.jpg)\n\
    \nA vertical rectangle contains the data of Bank Account class.\n\nFigure 11-4\n\
    \nA cleaner BankAccount class\n\nBut wait! Is the `BankAccount` class one that\
    \ you would want to instantiate? Each of your original classes was much more specific\
    \ than this new `BankAccount` class, so there isn’t enough information in the\
    \ `BankAccount` class for you to use it for standalone objects. This means you’ll\
    \ always be inheriting from it but never instantiating it. It’s a perfect *abstract\
    \ class**.* (Note that in the diagram below class diagrams of abstract classes\
    \ put the class name in *italics*.) See Figure [11-5](#270563_3_En_11_Chapter.xhtml#Fig5).\n\
    \n![](images/270563_3_En_11_Chapter/270563_3_En_11_Fig5_HTML.jpg)\n\nA vertical\
    \ rectangle contains the data of Bank Account abstract class.\n\nFigure 11-5\n\
    \nThe BankAccount as an abstract class\n\nAbstract classes are templates for actual\
    \ *concrete classes*. They encapsulate shared behavior and define the protocol\
    \ for all subclasses. The abstract class defines behavior and sets a common state,\
    \ and then concrete subclasses inherit and implement that behavior. You can’t\
    \ instantiate an abstract class; a new concrete class must be created that extends\
    \ the abstract class. As a guideline, whenever you find common behavior in two\
    \ or more places, you should look to abstract that behavior into a class and then\
    \ reuse that behavior in the common concrete classes."
  trans: "\n## 塑造设计\n\n> *你的目标是以令人愉悦的方式创造和安排对象。你的应用程序将被划分为多个“社区”，每个社区中的对象集群协同工作以实现共同目标。你的设计将由抽象的数量和质量，以及它们之间相互补充的程度所塑造。组合、形式和焦点至关重要。*\n\
    > \n> ——丽贝卡·沃夫斯-布洛克 与 艾伦·麦基恩^(¹⁹⁰)\n\n识别对象（或对象类）是面向对象设计中困难的部分。对象识别没有“魔法公式”。它依赖于系统设计者（也就是你）的技能、经验和领域知识。对象识别是一个迭代过程；你不太可能第一次就做对。\n\
    \n你首先通过在你的需求中寻找现实世界的类比来发现对象。这能让你起步，但这只是第一步。其他对象隐藏在你领域的抽象层中。你在哪里能找到这些隐藏的对象？你可以依靠自己对应用领域的知识。你也可以寻找在你的需求和系统架构概念中出现的操作。你甚至可以从自己过去设计或使用其他系统的经验中寻找。\n\
    \n以下是在你的系统中寻找候选对象的一些步骤：\n\n1.  *编写一组用例*，描述应用程序在多种不同场景下如何工作。记住每个用例必须有一个目标。用例中的替代路径可能表明需要新用例的新需求。\n\
    \n2.  *识别每个用例中的参与者*、他们需要执行的操作，以及他们在执行操作时需要使用的其他事物。\n\n3.  *命名并描述每个候选对象*。基于应用领域中的有形事物（如名词）进行识别。采用行为方法，根据哪些对象参与哪些行为（使用动词）来识别对象。\n\
    \n4.  *对象可以通过多种方式体现自身*。它们可以是：\n    *   产生或消费信息的外部实体\n    *   信息领域的一部分（报告、显示等）\n\
    \    *   系统内发生的事件或事件\n    *   内部生产者（制造东西的对象）\n    *   内部消费者（消费生产者所制造东西的对象）\n \
    \   *   场所（远程系统、数据库等）\n    *   结构（窗口、框架）\n    *   人或人的特征（人、学生、教师等）\n    *   被其他对象拥有或使用的对象（银行账户或汽车零件）\n\
    \    *   其他对象的列表（零件清单、任何类型的集合等）\n\n5.  *将候选对象组织成组*。每个组代表一个对象集群，它们协同工作以解决应用程序中的共同问题。每个对象将具有几个特征：\n\
    \    *   *所需信息*：对象拥有必须被记住的信息，以便系统能够运行。\n    *   *所需服务*：对象必须提供与系统目标相关的服务。\n   \
    \ *   *公共属性*：为对象定义的属性必须对该对象的所有实例都是通用的。\n    *   *公共操作*：为对象定义的操作必须对该对象的所有实例都是通用的。\n\
    \n6.  查看你创建的组，*判断它们是否代表了良好的对象抽象*，并且能在应用程序中工作。良好的抽象将有助于在你不可避免地需要更改应用程序中的某些功能或关系时，使你的应用程序更易于重新设计。\n\
    \n## 抽象\n\n让我们在这里换个话题，讨论一个不同的例子。爱丽丝和鲍勃刚搬到一个新城市，他们需要将他们在第二城市银行与信托公司的银行账户转移到第一银河银行。爱丽丝和鲍勃是中产阶级，他们有几个需要转移的银行账户：一个支票账户、一个存折储蓄账户和一个投资账户。\n\
    \n实际上没有人会开一个通用的“银行账户”。相反，他们开设不同类型的账户，每种类型都有不同的特征。你可以从支票账户开支票，但不能从储蓄账户开支票。你可以在储蓄账户上赚取利息，但通常不能在支票账户上赚取利息；相反，你需要支付月度服务费。尽管如此，所有不同类型的银行账户都有一些共同点：它们都使用你的个人信息（姓名、社会安全号码、地址、城市、州、邮政编码），并且都允许你存钱和取钱。\n\
    \n在编写处理银行账户的程序时，你可能会注意到多个类之间会有共同的属性和行为。既然你知道支票账户、储蓄账户和投资账户都是不同的，让我们首先创建三个不同的类，它们包含各自所需的所有信息，看看最终会得到什么（见图\
    \ 11-3）。\n\n![](img/270563_3_En_11_Fig3_HTML.jpg)\n\n三个方块包含以下类：支票账户、储蓄账户、投资账户。\n\
    \n图 11-3\n\n具有许多共同点的银行账户\n\n注意，这三个类有很多共同点。无论我们使用什么设计或编码技术，我们总是试图做的一件事就是避免设计和代码的重复。这不仅冗余且浪费，而且在做出更改时，你不可避免地会忘记更新一个或多个重复项。避免重复正是抽象的全部意义所在！如果你抽象出这三个类的所有共同元素，你可以创建一个名为\
    \ `BankAccount` 的新（超）类，它包含了所有这些元素。然后，`CheckingAcct`、`SavingsAcct` 和 `InvestmentAcct`\
    \ 类可以从 `BankAccount` 继承所有这些内容，这将大大简化子类，并清理你的设计和代码。\n\n所以，这就是 `BankAccount`，如图\
    \ 11-4 所示。\n\n![](img/270563_3_En_11_Fig4_HTML.jpg)\n\n一个垂直矩形包含银行账户类的数据。\n\n图\
    \ 11-4\n\n一个更简洁的 `BankAccount` 类\n\n但是等等！你会想要实例化 `BankAccount` 类吗？你的每个原始类都比这个新的\
    \ `BankAccount` 类具体得多，因此 `BankAccount` 类中没有足够的信息供你将其用于独立对象。这意味着你将始终继承它，但永远不会实例化它。它是一个完美的*抽象类*。（注意，在下图中，抽象类的类图将类名以*斜体*显示。）见图\
    \ 11-5。\n\n![](img/270563_3_En_11_Fig5_HTML.jpg)\n\n一个垂直矩形包含银行账户抽象类的数据。\n\n图 11-5\n\
    \n作为抽象类的 `BankAccount`\n\n抽象类是实际的*具体类*的模板。它们封装了共享行为，并为所有子类定义了协议。抽象类定义了行为并设置了公共状态，然后具体的子类继承并实现该行为。你不能实例化一个抽象类；必须创建一个扩展该抽象类的新的具体类。作为指导原则，无论何时你在两个或多个地方发现共同行为，你都应该考虑将该行为抽象到一个类中，然后在共同的具体类中重用该行为。\n"
- fmt: "Figure [11-6](#270563_3_En_11_Chapter.xhtml#Fig6) shows what you end up with\
    \ after abstracting out all the personal data and common behavior into the `BankAccount`\
    \ abstract class. Note that class diagrams of abstract classes put the class name\
    \ in *italics*. Notice also the new arrow types: the open arrow ends indicate\
    \ *inheritance*. So, the `CheckingAcct` class inherits attributes and methods\
    \ from the `BankAccount` abstract class. This is also called *generalization*\
    \ because the super class generalizes the subclasses. That’s why the arrows point\
    \ up to the super class.\n\n![](images/270563_3_En_11_Chapter/270563_3_En_11_Fig6_HTML.jpg)\n\
    \nA vertical rectangle contains the data of `BankAccount` class which is sub-divided\
    \ into `CheckingAcct`, `SavingsAcct`, and `InvestmentAcct`.\n\nFigure 11-6\n\n\
    The concrete account classes inherit from the abstract `BankAccount` class\n\n\
    ## Conclusion\n\nIn object-oriented analysis and design it’s best to keep in mind\
    \ your objectives.\n\nIn analysis, you’re refining the feature list you’ve created\
    \ and producing a model of what the customer wants. You want to end up with a\
    \ description of what the program is supposed to do—its essential features. This\
    \ creates a conceptual model of the problem domain and its solution. The model\
    \ is made up of a number of things, including user stories, scenarios, use cases,\
    \ preliminary class diagrams, user interface storyboards, and possibly some class\
    \ interface descriptions.\n\nIn design, you’re taking that conceptual model and\
    \ creating the classes that will end up being code. You want to end up with a\
    \ description of how the program will implement the conceptual model and do what\
    \ the customer wants. This is an object model of the solution. This model is made\
    \ up of groups of related class diagrams, their associations, and the descriptions\
    \ of how they interact with each other, including the programming interface for\
    \ each class. This design is an abstraction of the class details and code you’ll\
    \ create later. From here you should be able to get to code pretty quickly.\n\n\
    # 12. Object-Oriented Design Principles\n\n> *Devotion to the facts will always\
    \ give the pleasures of recognition; adherence to the rules of design, the pleasures\
    \ of order and certainty.*\n> \n> —Kenneth Clark\n\n> *How can I qualify my faith\
    \ in the inviolability of the design principles? Their virtue is demonstrated.\
    \ They work.*\n> \n> —Edgar Whitney\n\nNow that we’ve spent some time looking\
    \ at object-oriented analysis and design, let’s recapitulate some of what you’ve\
    \ already seen and talk about some *common design characteristics*.\n\nFirst,\
    \ designs have a purpose. They describe how something will work in a context,\
    \ using the requirements (lists of features, user stories, and use cases) to define\
    \ the context.\n\nSecond, designs must have enough information in them so that\
    \ someone can implement them. You need enough details in the design so that someone\
    \ can come after you and implement the program correctly.\n\nNext, there are different\
    \ styles of design, just like there are different types of house architectures.\
    \ The type of design you want depends on what it is you’re being required to build.\
    \ It depends on the context; if you’re an architect, you’ll design a different\
    \ kind of house at the seashore than you will in the mountains.\n\nFinally, designs\
    \ can be expressed at different levels of detail. When building a house, the framing\
    \ carpenter needs one level of detail, the electrician and plumber another, and\
    \ the finish carpenter yet another.\n\nThere are a number of rules of thumb about\
    \ object-oriented design that have evolved over the last few decades. These *design\
    \ principles* act as guidelines for you, the designer, to abide by so that your\
    \ design ends up being a good one, easy to implement, easy to maintain, and one\
    \ that does just what your customer wants. We’ve looked at several of them already\
    \ in previous chapters, and here we’ve pulled out nine fundamental design principles\
    \ of object-oriented design that are likely to be the most useful to you as you\
    \ become that designer extraordinaire. We’ll list and explain them here and then\
    \ give examples in the rest of the chapter.\n\n## List of Fundamental Object-Oriented\
    \ Design Principles\n\nHere are the nine fundamental principles:\n\n1.  *Encapsulate*\
    \ things in your design that are *likely to change*.\n\n2.  *Code to an interface*\
    \ rather than to an implementation.\n\n3.  The *Open-Closed Principle* (OCP):\
    \ Classes should be open for extension and closed for modification.\n\n4.  The\
    \ *Don’t Repeat Yourself Principle* (DRY): Avoid duplicate code. Whenever you\
    \ find common behavior in two or more places, look to abstract that behavior into\
    \ a class and then reuse that behavior in the common concrete classes. Satisfy\
    \ one requirement in one place in your code.\n\n5.  The *Single Responsibility\
    \ Principle* (SRP): Every object in your system should have a single responsibility,\
    \ and all the object’s services should be focused on carrying out that responsibility.\
    \ Another way of saying this is that a cohesive class does one thing well and\
    \ doesn’t try to do anything else, which also means that each class should have\
    \ only one reason to change. This says *higher cohesion is better*.\n\n6.  The\
    \ *Liskov Substitution Principle* (LSP): Subtypes must be substitutable for their\
    \ base types. (In other words, *inheritance* should be well designed and well\
    \ behaved.)\n\n7.  The *Dependency Inversion Principle* (DIP): Don’t depend on\
    \ concrete classes; depend on abstractions.\n\n8.  The *Interface Segregation\
    \ Principle* (ISP): Clients shouldn’t have to depend on interfaces they don’t\
    \ use.\n\n9.  The *Principle of Least Knowledge* (PLK) (also known as the *Law\
    \ of Demeter*): Talk only to your immediate friends. This also relates to the\
    \ idea of *loose coupling*. Objects that interact should be loosely coupled with\
    \ well-defined interfaces.\n\nAs you have probably noticed, there’s some overlap\
    \ here and one or more of the design principles may depend on others. That’s okay.\
    \ It’s the fundamentals that count. Let’s go through these one at a time."
