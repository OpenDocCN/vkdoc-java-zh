    \ is the power of social-emotional learning in allowing us to work with others\
    \ toward making innovations much greater than anything we can achieve alone. Social-emotional\
    \ learning is how people “*acquire and apply the knowledge, skills, and attitudes\
    \ to develop healthy identities, manage emotions and achieve personal and collective\
    \ goals, feel and show empathy for others, establish and maintain supportive relationships,\
    \ and make responsible and caring decisions*”.^([^(42)](#fn42)) While development\
    \ often happens in sprints, teamwork is a marathon: it requires commitment, training,\
    \ a sustainable pace, and working through discomforts. Openly valuing and practicing\
    \ social-emotional learning is how we train for our teamwork marathon, support\
    \ a shared *Soft-Aware* culture, and support each other."
  trans: '

    考虑自动化能为每个人了解项目状态带来的好处：自动提醒、日历集成、将任务分配给开发人员以及更新通知。项目管理工具还可以自动跟踪各种指标（例如任务速度），生成可视化图表以更好地理解这些指标（例如展示整个项目中平均速度的变化），并将项目信息组织成不同的便捷布局（例如按任务类型和开发人员对速度数据进行分组）。对于团队（即使是
    10 人或以上的中等规模团队），自动跟踪项目依赖关系有助于管理谁在做什么以及何时做。这种认知对于具有短时间盒迭代的敏捷开发尤为关键。在规划每个冲刺时，你需要了解产品待办事项列表中每个用户故事的优先级以及它们之间的相互关系。你必须跟踪冲刺待办事项列表中任务的进度，而了解依赖关系可能是实现冲刺目标与未能实现之间的关键区别。


    项目管理工具也有助于工作量估算，因为按小时估算对人来说可能非常困难。一些项目管理工具会要求你使用量级来创建估算。最简单的类型让你使用*小*、*中*或*大*进行估算，而其他工具则允许你为每个任务分配一定数量的点数，例如，每个任务
    1、2、4 或 8 个点。这使得汇总团队在每个时间盒迭代中试图实施的总点数变得容易，并且随着时间的推移，可以得出团队每个迭代平均能实施的点数。


    ### 项目规划：缺陷管理


    抱最好的希望；做最坏的打算。不可避免地，你会在程序中引入缺陷。项目计划应考虑到持续测试的需求，并且进度安排中应留出处理任何已发现缺陷的空间。作为开发人员，你的目标有两个：


    *   在你编写的代码中尽可能少地引入缺陷。


    *   在发布代码之前尽可能多地发现它们。


    然而，尽管你尽了最大努力，你发布的代码中仍会包含缺陷。这是不可避免的。对于任何规模的程序来说，程序中可能的路径太多，引入错误数据的方式也太多，以至于不可能没有缺陷。你的目标是发布时尽可能少地带有缺陷，并且使这些缺陷不会真正影响产品或性能。为了实现这一目标，大多数开发组织都有一套缺陷等级来表征缺陷的严重程度，例如致命（程序崩溃）、严重（主要功能损坏）、较重（功能损坏但有变通方法）、轻微（小问题）和功能请求（未来希望拥有的功能）。这些缺陷等级通常被内置到缺陷跟踪系统中。


    每当你在代码中发现缺陷时，就在缺陷跟踪系统中提交一份缺陷报告，让开发人员和管理者能够看到当前缺陷的数量和严重程度。在修复缺陷时，开发人员会从最严重的开始，然后依次向下处理。


    ## 软技能开发


    > *“当（项目经理）启动任何项目时，他们肩负着艰巨的任务：弄清楚并管理众多不同利益相关者的期望。但是，当（项目经理）能够认识到这些期望的根源，扮演起夫妻顾问的角色，建立有意义的、个人的、信任的关系，并确保更广泛的团队专注于整体目标时，他们就能成功地管理每个人的期望，同时引导项目跨越那条令人垂涎的终点线。”*

    >

    > —艾米·肖恩塔尔^(³⁷)


    > *“管理者的职能不是让人们工作，而是让人们有可能工作。”*

    >

    > —汤姆·德马科，蒂莫西·李斯特^(³⁸)


    当我们说“团队项目”时，你首先想到的是什么？是压力？恼怒？担忧？还是对即将到来的轻松任务的解脱？想想我们大多数人是如何了解团队协作的：我们被要求在学校项目中合作，但通常没有被教导如何合作。由新手自我管理的临时短期小组项目通常会导致有缺陷且不可持续的长期应对策略，例如独自承担团队工作或搭便车。毕竟，我们很可能再也不用和这些人一起工作了！关于功劳和责任的归属问题也层出不穷。最终，学生们会认为团队合作是有害且不愉快的^(³⁹)。在通过多个压力重重的课堂项目反复强化这些做法和信念之后，学生们毕业并走向世界。当然，问题在于，现实世界是建立在人际关系网络之上的：与你的同事、老板、下属、客户、公众等建立并维持关系。那些相同的短期应对策略根本行不通，因为现实世界（如同北方一样）会记住一切！


    在本章的剩余部分，我们将介绍什么是“软技能意识”（Soft-Aware），以及有缺陷的团队合作如何对开发人员和开发工作产生负面影响。然后，我们将探讨支持个人和创建安全的共享文化如何促进健康且可持续的协作。最后，我们将研究如何将这些理论付诸实践，通过一系列团队协作工件，形成一个共同学习和改进的敏捷过程。^(⁴⁰)


    *软技能开发*是一种新的范式，它将个人、人际关系和工作场所文化视为健康、可持续的软件联合创作的核心。具备*软技能意识*包括构建软件、构建利益相关者关系，以及在此过程中培养每一位开发人员。*软技能开发*一词最早由卡扎科娃博士^(⁴¹)在向计算机科学本科生教授基于团队的软件开发时提出。其重点是培养开发人员的专业素养和人际交往能力，因为在尝试制作软件的过程中，*学习如何合作*比学习制作软件本身更为关键。随着技术的高速更迭、日益高级的编程实践以及不断演进的软件开发模型，不变的是社会情感学习的力量，它使我们能够与他人合作，创造出远超我们个人所能实现的创新。社会情感学习是指人们“*获取并运用知识、技能和态度，以培养健康的身份认同、管理情绪并实现个人和集体目标、感受并表达对他人的同理心、建立并维持支持性关系，以及做出负责任和充满关怀的决定*”。^(⁴²)
    虽然开发通常以冲刺的形式进行，但团队合作是一场马拉松：它需要承诺、训练、可持续的节奏以及克服不适。公开重视并实践社会情感学习，正是我们为团队合作马拉松进行训练、支持共同的*软技能开发*文化以及相互支持的方式。

    '
- fmt: '研究显示，“*生产力取决于一支在社交和情感上具备能力的劳动力队伍*”。^([^(43)](#fn43)) *Soft-Aware* 开发的核心是人；它始终关注每一位团队成员，以及必须精心培育和维护的、涌现的动态团队协作。没有唯一正确的协作方式，只有理想的团队协作成果。一个团队的能力和复杂性总是大于成员之和，因为我们涌现的互动可以成就或破坏共同的工作。在团队中工作，不仅意味着为项目现身并适应项目，也意味着为彼此现身并相互适应。


    这部分内容可能看起来是为“掌权者”所写，但权力有多种形式，并非仅限于职位头衔中带有“管理”二字的人。我们都拥有某种形式的权力。例如，考虑一下，更直言不讳可能会让某人在会议中拥有更多发言权；再考虑一下，利用这种直言不讳将每个人的想法都摆到桌面上，可能会极大地提高决策质量。考虑一下，多年的经验可能会催生许多关键想法，但也要考虑到，缺乏经验的观点可能让我们朝着以前看似无法通行的方向进行创新。我们所说的*权力*，是指影响变革的能力。关注自己和周围的人，将让你能够建立一个与你一同推动变革的团队。为了实现真正的合作，我们不应将自己划分为管理者和被管理者，而应只有协作者（其中一些人的任务是促进他人的工作）。这样一来，我们每个人都可以贡献自己独特的“超能力”，而不是依赖等级权力，从而组建最全面的超级开发团队^([^(44)](#fn44))。找到你的权力，找到运用这种权力的声音，并帮助你的队友与你一起运用他们自己的权力。


    为什么我们需要每个人都和睦相处？虽然我们可以期望员工或队友*埋头专注于工作*（不幸的是，我们在现实世界中屡见不鲜的态度），但这将是非常短视的。与不喜欢的团队一起工作需要付出更多的情感努力，会让我们感到疲惫和不快，从而阻碍软件开发。工作中的个人能动性和幸福感能提高开发者的生产力，^([^(45)](#fn45),[^(46)](#fn46))而情商则有助于缓解压力并建立信任。^([^(47)](#fn47))
    当工人在面对裁员、任务或项目不确定性、感到不被重视、遭受排斥或歧视等无法控制的压力情境时，会感到无能为力，这可能导致各种负面的生理和心理影响，包括“习得性无助”——一种缺乏个人能动性的感觉，从而导致工作投入度降低。^([^(48)](#fn48))
    根据盖洛普公司发布的《2023年全球职场状况报告》，全球77%的劳动力认为自己的工作没有意义或缺乏投入，导致59%的人“静默离职”（只做最低限度的工作或“磨洋工”）和18%的人“喧闹离职”（积极参与破坏性行为），其中51%的在职员工正在考虑或寻找新的工作。^([^(49)](#fn49))
    盖洛普的报告还指出，70%的团队投入度归因于管理者。更健康的工作场所文化是解决员工不投入和高流动率的良方，而管理者、主管、SCRUM大师、团队负责人以及任何拥有权力和/或资历的人都必须带头冲锋。虽然大多数开发者和管理者没有社会情感学习的明确背景，但许多公司已经认识到转变职场文化的必要性，并开始提供培训研讨会，以培养员工的人际交往或*软*技能。


    团队协作不仅仅是在交付成果过程中发生的事情；它本身就是一个持续的关键任务。请记住，大多数合作关系会持续到当前项目结束之后，因此队友不应被视为可消耗的开发资源，而应被视为开发赖以繁荣或消亡的生态系统。事实上，软件开发可以被视为“*一系列资源有限、目标导向的发明与沟通游戏*”。^([^(50)](#fn50))
    我们见过优秀的开发者在一起分崩离析。我们也见过挣扎的开发者共同崛起。成为独行侠式的明星开发者并非目标。如果你表现出色，你将被要求帮助、指导、培训或监督他人。你将被要求向管理层和客户展示你的工作成果。你将接手更大的项目，并必须学会授权。你必须与他人良好合作。团队协作是关键，并且必须有意识地为之。任何联合头脑风暴、直接协作、团队范围更新以及团队建设活动的机会，都是所有共同工作中不可或缺的锚点，即使是最紧张的开发日程也应欢迎它们。尽管我们都忙得不可开交，时间也很宝贵，但不花时间做到
    *Soft-Aware* 总是会让我们付出难以承受的代价。重视并支持队友和团队协作是一项明智的投资（投资于他们的未来、团队的未来以及产品的未来），绝非浪费。'
  raw: 'Research shows that “*productivity depends on a work force that is socially
    and emotionally competent*”.^([^(43)](#fn43)) *Soft-Aware* development is all
    about the people; it places consistent focus on each individual teammate and on
    the emergent and dynamic teamwork that must be carefully nurtured and maintained.
    There is no single correct way to work together but rather only desirable teamwork
    outcomes. A team is always more capable and more complex than the sum of the teammates,
    as our emergent interactions can make or break our shared work. Working on a team
    is not only showing up for and adapting to a project, but also showing up for
    and adapting to each other.


    It may seem that this section is written for the “power holders” but power comes
    in many forms, not just those with “management” in their job title. We all hold
    some type of power. Consider, for example, how being more outspoken may literally
    offer someone more say in meetings; consider also how using that outspokenness
    to bring everyone’s ideas to the table may vastly improve the quality of the decisions
    being made. Consider how years of experience may inform many crucial ideas, but
    consider also that inexperienced points of view may allow us to innovate in directions
    that seemed impassable before. By *power* we mean the ability to effect change.
    Being mindful of yourself and of those around you will allow you to build a team
    who can effect that change with you. For truly cooperative work, rather than dividing
    ourselves into managers and those being managed, there should only be collaborators
    (some of whom have the task of facilitating the work of others). In this way,
    instead of a hierarchical power, we can each contribute our own individual super-powers
    to form the most well-rounded super dev^([^(44)](#fn44)) team. Find your power,
    find your voice to use that power, and help your teammates use their own powers
    along with you.


    Why do we need everyone to get along anyway? While we could expect our employees
    or teammates to *just put their heads down and focus on the work* (an attitude
    we’ve unfortunately witnessed way too often in the real world), that would be
    very nearsighted. Working with a team we don’t like takes a lot more emotional
    effort and makes us tired and unhappy, hindering software development. The sense
    of personal agency and happiness at work improve developer productivity,^([^(45)](#fn45),[^(46)](#fn46))
    while emotional intelligence helps mitigate stress and build trust.^([^(47)](#fn47))
    Workers feeling powerless in the face of uncontrollable stressful situations such
    as layoffs, task or project uncertainties, feeling unvalued, experiencing exclusion
    or discrimination, etc. can all lead to a variety of negative physical and psychological
    effects, including “learned helplessness,” which is a sense of lacking personal
    agency, leading to reduced engagement in the workplace.^([^(48)](#fn48)) According
    to the *State of the Global Workplace 2023 Report* release by Gallup, Inc., 77%
    of the global workforce does not find their work meaningful or engaging, leading
    to 59% “quiet quitting” (doing the bare minimum or seat-warming) and 18% “loud
    quitting” (actively engaging in disruptive behavior), with 51% of employed workers
    considering or seeking new employment.^([^(49)](#fn49)) Gallup’s report also indicates
    that 70% of team engagement is attributable to the manager. Healthier workplace
    culture is the antidote to employee disengagement and high turnover, and managers,
    supervisors, SCRUM masters, team leads, and anyone with authority and/or seniority
    must lead the charge. While most developers and managers have no explicit background
    in social-emotional learning, many companies are recognizing the need for a workplace
    culture shift and beginning to offer training seminars to develop their employees’
    interpersonal or *soft* skills.


    Teamwork is not just what happens on the way to the deliverable; it is an ongoing
    crucial task in itself. Remember that most collaborations continue beyond the
    duration of a current project, so teammates are not to be treated as expendable
    development resources, but rather as the very biosphere in which development will
    thrive or perish. In fact, software development can be seen as “*a series of resource-limited,
    goal-directed games of invention and communication*.”^([^(50)](#fn50)) We have
    seen great developers fall apart together. We have also seen struggling developers
    rise together. Being the lone rockstar developer is not the goal. If you are doing
    great, you will be asked to help, guide, train, or supervise others. You will
    be asked to showcase your work to management and clients. You will be given larger
    projects where you will have to learn to delegate. You will have to work well
    with others. Teamwork is the key and it must be intentional. Any opportunities
    for joint brainstorming, direct collaboration, teamwide updates, and team-building
    activities are an anchoring part of all shared work and should be welcomed into
    even the tightest development schedules. Although we are all endlessly busy and
    time is expensive, not taking the time to be *Soft-Aware* is always going to cost
    us more that we can afford. Valuing and supporting teammates and teamwork is a
    smart investment (in their future, in the future of the team, and in the future
    of the product), never a waste.'
  trans: '

    研究表明，“*生产力取决于具备社交和情感能力的劳动力*”。^(⁴³) *软意识*开发的核心在于人；它始终关注每一位团队成员，以及必须精心培育和维护的、涌现出的动态团队协作。没有唯一正确的协作方式，只有理想的团队协作成果。一个团队的能力和复杂性总是大于成员之和，因为我们涌现出的互动既能成就也能破坏共同的工作。在团队中工作，不仅意味着为项目现身并适应项目，也意味着为彼此现身并相互适应。


    这部分内容可能看起来是为“掌权者”所写，但权力有多种形式，并非仅限于职位头衔中带有“管理”二字的人。我们都拥有某种形式的权力。例如，考虑一下，更直言不讳的人如何在会议中实际上拥有更多发言权；再考虑一下，利用这种直言不讳将每个人的想法都摆上台面，又如何能极大提升决策质量。考虑一下，多年的经验如何能催生许多关键想法，但也要考虑，缺乏经验的观点如何能让我们在看似无法通行的方向上实现创新。我们所说的*权力*，是指影响变革的能力。关注自己和身边的人，将让你能够建立一个能与你共同推动变革的团队。为了实现真正的合作，我们不应将自己划分为管理者和被管理者，而应只有协作者（其中一些人的任务是促进他人的工作）。这样一来，我们每个人都能贡献自己独特的“超能力”，而非依赖等级权力，从而组建最全面的超级开发团队^(⁴⁴)。找到你的权力，找到运用这种权力的声音，并帮助你的队友与你一起运用他们自己的权力。


    为什么我们非要让每个人都和睦相处呢？虽然我们可以期望员工或队友*埋头专注于工作*（不幸的是，我们在现实世界中屡见不鲜的态度），但这将是非常短视的。与不喜欢的团队一起工作需要付出更多的情感努力，让我们感到疲惫和不快，从而阻碍软件开发。工作中的个人能动性和幸福感能提高开发者的生产力，^(⁴⁵,⁴⁶)而情商则有助于缓解压力、建立信任。^(⁴⁷)当工人在面对裁员、任务或项目不确定性、感觉不被重视、遭受排斥或歧视等无法控制的压力情境时感到无力，都可能导致各种负面的身心影响，包括“习得性无助”——一种缺乏个人能动性的感觉，从而导致工作投入度降低。^(⁴⁸)根据盖洛普公司发布的《2023
    年全球职场状况报告》，全球 77%的员工认为自己的工作没有意义或缺乏投入，导致 59%的人“静默离职”（只做最低限度的工作或“磨洋工”），18%的人“高调离职”（积极从事破坏性行为），51%的在职员工正在考虑或寻找新工作。^(⁴⁹)盖洛普的报告还指出，70%的团队投入度归因于管理者。更健康的工作场所文化是解决员工不敬业和高离职率的良方，管理者、主管、SCRUM
    大师、团队领导以及任何拥有权力和/或资历的人都必须带头冲锋。虽然大多数开发者和管理者没有明确的社会情感学习背景，但许多公司已经认识到转变职场文化的必要性，并开始提供培训研讨会，以培养员工的人际交往或*软*技能。


    团队协作不仅仅发生在通往可交付成果的路上；它本身就是一个持续的关键任务。请记住，大多数合作关系会延续到当前项目结束之后，因此队友不应被视为可消耗的开发资源，而应被视为开发赖以繁荣或消亡的生态系统。事实上，软件开发可以被视为“*一系列资源有限、目标导向的发明与沟通游戏*”。^(⁵⁰)我们见过优秀的开发者在一起分崩离析。我们也见过挣扎的开发者共同崛起。成为独行侠式的明星开发者并非目标。如果你表现出色，你会被要求去帮助、指导、培训或监督他人。你会被要求向管理层和客户展示你的工作成果。你会被赋予更大的项目，届时你必须学会授权。你必须与他人良好合作。团队协作是关键，而且必须有意识地为之。任何联合头脑风暴、直接协作、团队范围更新以及团队建设活动的机会，都是所有共同工作的基石部分，即使是最紧张的开发日程也应欢迎它们。尽管我们都忙得不可开交，时间宝贵，但不花时间去培养*软意识*，最终付出的代价将远超我们的承受能力。重视并支持队友和团队协作是一项明智的投资（投资于他们的未来、团队的未来以及产品的未来），绝非浪费。

    '
- fmt: '### Soft-Aware Development: The Dark Side of Teamwork


    Not all joint work rises to the level of actual *teamwork*, meaningfully supporting
    and augmenting the team’s joint output. Instead, development and developers often
    suffer from the darker side effects of poor teamwork. Let’s consider some specific
    examples of common behaviors that lead to trouble:


    - **Making work decisions based on social comfort zones**: Only reaching out to
    others of your own gender, age group, race, cultural background, etc. can alienate
    others, making them feel excluded from brainstorming or decision making. Not actively
    working with a teammate because you don’t connect with them personally, instead
    of making an effort to understand the source of the friction, can only exacerbate
    the issue. Avoiding talking to developers who don’t speak up themselves perpetuates
    unnecessary isolation. A small effort on our part may lead to substantial increase
    in the comfort, belonging, and agency others feel. The formation of implicit subteams
    can be okay based on current ongoing task division, but it is important to keep
    the whole team in mind whenever possible, such as during coffee breaks or daily
    standup meetings.


    - **Keeping project information inaccessible to parts of the team** (e.g., discussing
    development issues in private threads or emails) can make it hard for everyone
    to stay on top of decisions, challenges, needs, etc. Make work discussions accessible
    on demand to the whole team, but without forcing everyone to be part of every
    discussion as it happens if they do not have the bandwidth or are otherwise engaged.
    For instance, you can respond to an issue brought up in a general thread by responding
    in a separate but visible thread. Consider also the benefits of messaging services
    such as `Slack` or `Discord`, which allow information to be grouped or pinned,
    reactions and threads can be added, and teammates to be tagged to bring relevant
    discussions to their attention.


    - **Developers jumping right into making things**. Even within Agile methodologies,
    this is a mistake. Taking time to agree on the design, creating mood-boards to
    ensure that everyone shares the same overall vision, and clearly delineating tasks
    and subtasks (even if only for the next small iteration of the product instead
    of for the final deliverable) is crucial to avoid confusion and streamline decision-making
    during development. Poorly defined or poorly understood tasks commonly lead to
    overlap in work, merge conflicts, confusion, frustration, and strife on the team.


    - **Shutting out the less experienced teammates**. Not allowing newer developers
    to take on meaningful and interesting parts of the project because you don’t have
    confidence in their skills discourages learning and reduces creativity. Excluding
    less experienced team members from crucial discussions regarding development reduces
    agency and negatively impacts buy-in into the shared project vision.


    - **Assuming that completing your tasks is sufficient for collaboration.** Being
    a productive island will not suffice if the rest of the development archipelago
    struggles. Collaboration revolves around a shared goal and checking on the team
    is checking on that goal. Not documenting found solutions and workarounds is detrimental
    to shared learning and to growing a shared knowledgebase. Not taking the time
    to understand the contributions of others can lead to a lot of strife, including
    members believing they are the only ones making meaningful contributions, or not
    noticing when someone’s work was not correctly merged into the repository and
    thus excluded from a demo, which can be very discouraging for a developer.


    - **Undervaluing interpersonal needs.** Not respecting each other’s work, time,
    responsibilities, needs, and concerns is not respecting each other. Not informing
    the team of personal circumstances that will affect your work or your availability
    is likely to cause concern about whether some contribution will be available by
    the deadline, resulting in redundant work, stress, overtime, and breaching of
    trust. Not showing up on time to meetings showcases a lack of planning, a questionable
    reliability, and a lack of respect for others’ time. Not checking with teammates
    when making decisions that may impact them is bound to create both code and interpersonal
    conflicts. Failing to update supervisors and clients on progress and difficulties
    can lead to disconnect in understanding, increased stress, and loss of business.


    - **Not taking care of yourself**. Not taking the time and care to share your
    ideas of concerns clearly will have a direct negative impact on you and an indirect
    negative impact on the team. Not sharing difficulties and setbacks creates inaccurate
    expectations and reduces team support. Sticking to an unrealistic schedule or
    contributions is nearsighted, as it leads to resentment and burnout.'
