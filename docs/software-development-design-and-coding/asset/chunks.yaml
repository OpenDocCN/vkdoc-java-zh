  trans: "\n图 11-6 展示了将所有个人数据和公共行为抽象到 `BankAccount` 抽象类后的结果。请注意，抽象类的类图会将类名以*斜体*显示。同时也要注意新的箭头类型：空心箭头表示*继承*。因此，`CheckingAcct`\
    \ 类继承了 `BankAccount` 抽象类的属性和方法。这也被称为*泛化*，因为超类是对子类的概括。这就是箭头指向超类的原因。\n\n![](img/270563_3_En_11_Fig6_HTML.jpg)\n\
    \n一个垂直矩形包含 Bank Account 类的数据，该矩形被细分为支票账户、储蓄账户和投资账户。\n\n图 11-6\n\n具体的账户类继承自抽象的\
    \ BankAccount 类\n\n## 结论\n\n在面向对象的分析与设计中，最好始终牢记你的目标。\n\n在分析阶段，你正在细化已创建的功能列表，并生成一个描述客户需求的模型。你最终需要得到一份关于程序应做什么的说明——即其核心功能。这会创建问题域及其解决方案的概念模型。该模型由多种元素组成，包括用户故事、场景、用例、初步类图、用户界面故事板，以及可能的类接口描述。\n\
    \n在设计阶段，你正在利用该概念模型来创建最终将转化为代码的类。你最终需要得到一份关于程序将如何实现概念模型并满足客户需求的说明。这是解决方案的对象模型。该模型由一组相关的类图、它们的关联关系，以及它们之间如何交互的描述（包括每个类的编程接口）组成。这个设计是你稍后将创建的类细节和代码的抽象。从这里开始，你应该能够很快进入编码阶段。\n\
    \n# 12. 面向对象设计原则\n\n> *忠于事实总能带来认知的愉悦；遵循设计规则，则能带来秩序与确定的乐趣。*\n> \n> ——肯尼斯·克拉克\n\n\
    > *我如何证明我对设计原则不可侵犯性的信念？它们的价值已被证实。它们行之有效。*\n> \n> ——埃德加·惠特尼\n\n既然我们已经花了一些时间研究面向对象的分析与设计，现在让我们回顾一下你已经看到的一些内容，并讨论一些*常见的设计特征*。\n\
    \n首先，设计是有目的的。它们描述了某物在特定情境下如何工作，并使用需求（功能列表、用户故事和用例）来定义该情境。\n\n其次，设计必须包含足够的信息，以便他人能够实现它。你需要在设计中提供足够的细节，以便后来者能够正确地实现程序。\n\
    \n接下来，存在不同的设计风格，就像有不同类型的房屋建筑风格一样。你想要的设计类型取决于你需要构建的内容。这取决于具体情境；如果你是一名建筑师，你在海边设计的房子会与在山中设计的房子不同。\n\
    \n最后，设计可以在不同的细节层次上表达。建造房屋时，框架木工需要一个层次的细节，电工和水管工需要另一个层次，而精装木工又需要另一个层次。\n\n关于面向对象设计，在过去几十年中演变出了许多经验法则。这些*设计原则*作为指导方针，供你（作为设计师）遵守，从而使你的设计最终成为一个优秀的设计——易于实现、易于维护，并且恰好满足客户的需求。在前几章中我们已经看到了其中几个原则，这里我们提炼出面向对象设计的九项基本设计原则，它们很可能在你成为杰出设计师的过程中对你最有帮助。我们将在此列出并解释它们，然后在本章剩余部分给出示例。\n\
    \n## 基本面向对象设计原则列表\n\n以下是九项基本原则：\n\n1.  *封装*设计中*可能变化*的部分。\n\n2.  *面向接口编程*，而非面向实现编程。\n\
    \n3.  *开闭原则*（OCP）：类应对扩展开放，对修改关闭。\n\n4.  *不要重复自己原则*（DRY）：避免重复代码。每当你在两个或多个地方发现公共行为时，应考虑将该行为抽象到一个类中，然后在具体的公共类中重用该行为。在代码中的一个地方满足一个需求。\n\
    \n5.  *单一职责原则*（SRP）：系统中的每个对象都应具有单一职责，并且该对象的所有服务都应专注于履行该职责。另一种说法是，一个内聚的类只做好一件事，并且不试图做其他任何事，这也意味着每个类应该只有一个引起变化的原因。这表示*高内聚更好*。\n\
    \n6.  *里氏替换原则*（LSP）：子类型必须能够替换其基类型。（换句话说，*继承*应该设计良好且行为规范。）\n\n7.  *依赖倒置原则*（DIP）：不要依赖具体类；要依赖抽象。\n\
    \n8.  *接口隔离原则*（ISP）：客户端不应依赖它们不使用的接口。\n\n9.  *最少知识原则*（PLK）（也称为*迪米特法则*）：只与你最直接的朋友交谈。这也与*松耦合*的概念相关。相互交互的对象应通过定义良好的接口保持松耦合。\n\
    \n正如你可能已经注意到的，这里存在一些重叠，并且一个或多个设计原则可能依赖于其他原则。这没关系。重要的是基本原则。让我们逐一进行讲解。"
- fmt: '# Encapsulate Things in Your Design That Are Likely to Change


    This first principle means to protect your classes from unnecessary change by
    separating the features and methods of a class that remain relatively constant
    throughout the program from those that will change. By separating the two types
    of features, you isolate the parts that will likely change into a separate class
    (or classes) that you can depend on changing, and we increase our flexibility
    and ease of change. You also leave the stable parts of your design alone so that
    you just need to implement them once and test them once. This protects the stable
    parts of the design from any unnecessary changes.


    Let’s create a very simple class `Violinist`. Figure [12-1](#270563_3_En_12_Chapter.xhtml#Fig1)
    is a class diagram for the `Violinist` class.


    ![](images/270563_3_En_12_Chapter/270563_3_En_12_Fig1_HTML.jpg)


    A class diagram labeled violinist with three functions, such as set up music,
    tune instrument, and play.


    Figure 12-1


    A `Violinist`


    Consider that the `setUpMusic()` and `tuneInstrument()` methods are likely pretty
    stable. But what about the `play()` method? It turns out that there are several
    different types of playing styles for violins: classical, bluegrass, and Celtic,
    just to name three. That means that the `play()` method will vary depending on
    the playing style. Since you have a behavior that will likely change, maybe you
    should abstract that behavior out and encapsulate it in another class? If you
    do so, you get something like Figure [12-2](#270563_3_En_12_Chapter.xhtml#Fig2).


    ![](images/270563_3_En_12_Chapter/270563_3_En_12_Fig2_HTML.jpg)


    A U M L class diagram with three main classes, such as violinist, violin style,
    and classical style, which is further subclassed into bluegrass style and celtic
    style. Methods and relationships are depicted with arrows.


    Figure 12-2


    `Violinist` and playing styles


    You’ve abstracted out and encapsulated the `play()` method—which will vary—in
    a separate class so that you can isolate any changes you want to make to the playing
    style from the other stable behaviors in `Violinist`. Notice that you’re using
    association between the `Violinist` class and the `ViolinStyle` abstract class,
    allowing the `Violinist` to use the concrete style classes that inherit and override
    the abstract method `play()` from the abstract `ViolinStyle` class.


    ## Code to an Interface Rather Than to an Implementation


    This principle means to design your code around structures that are less likely
    to change. Like many of the principles in this chapter, this has to do with inheritance
    and how you use it in your program. Say you have a program that will model different
    types of geometric shapes in two dimensions. You’ll have a class `Point` that
    will represent a single point in 2D space, and you’ll have an interface named
    `Shape` that will abstract out the things that all shapes have in common—areas
    and perimeters. (Circles and ellipses call perimeter, circumference instead, but
    you will use perimeter here.) So here’s what you’ve got (see Figure [12-3](#270563_3_En_12_Chapter.xhtml#Fig3)).


    ![](images/270563_3_En_12_Chapter/270563_3_En_12_Fig3_HTML.jpg)


    A U M L class diagram with two entities point with attributes x and y of type
    double, methods get X, get Y, set X double, and set Y double and the interface
    shape with methods compute area double and compute perimeter double.


    Figure 12-3


    A simple `Point` class and the common `Shape` Interface


    If you want to create concrete classes of some different shapes, you *implement*
    the `Shape` interface. This means that the concrete classes must implement each
    of the abstract methods in the `Shape` interface. See Figure [12-4](#270563_3_En_12_Chapter.xhtml#Fig4).


    ![](images/270563_3_En_12_Chapter/270563_3_En_12_Fig4_HTML.jpg)


    A set of three U M L class diagrams represents geometric shapes such as a rectangle,
    a circle, and a triangle. Each diagram lists attributes and methods for computing
    area and perimeter with specified data types.


    Figure 12-4


    `Rectangle`, `Circle`, and `Triangle` all implement `Shape`


    So now you’ve got a number of classes that represent different geometric shapes.
    How do you use them? Say you’re writing an application that will manipulate a
    geometric shape. You can do this in two different ways. First, you can write a
    separate application for each geometric shape. See Figure [12-5](#270563_3_En_12_Chapter.xhtml#Fig5).


    ![](images/270563_3_En_12_Chapter/270563_3_En_12_Fig5_HTML.jpg)


    A U M L class diagram with three classes, rectangle app, circle app, and triangle
    app. Each class contains a main method and an associated shape class rectangle,
    circle, and triangle with attributes and methods for computing area and perimeter.


    Figure 12-5


    Using the geometric objects


    What’s wrong with these apps? Well, you’ve got three different applications doing
    the same thing. If you want to add another shape, say a rhombus, you’d have to
    write two new classes, the `Rhombus` class (which implements the `Shape` interface)
    and a new `RhombusApp` class. Yuk! This is inefficient. You’ve coded to the different
    implementations of the geometric shape rather than coding to the interface itself.


    So how do you fix this? The thing to realize is that the interface is the top
    of a class hierarchy of all the classes that implement the interface. As such,
    it’s a class type and you can use it to help implement *polymorphism* (the idea
    that a single thing can have many forms) in your program. In this case, since
    you have some number of geometric shapes that implement the `Shape` interface,
    you can create an array of `Shape`s that you can fill up with different types
    of shapes and then iterate through. In Java, you’ll use the *List* collection
    type to hold your shapes:


    ```

    import java.util.*;

    /**

    * ShapeTest - test the Shape interface implementations.

    *

    * @author Programmer 1

    * @version 1.0

    */

    public class ShapeTest {

    public static void main(String [] args) {

    List figures = new ArrayList();

    figures.add(new Rectangle(10, 20));

    figures.add(new Circle(10));

    Point p1 = new Point(0.0, 0.0);

    Point p2 = new Point(5.0, 1.0);

    Point p3 = new Point(2.0, 8.0);

    figures.add(new Triangle(p1, p2, p3));

    Iterator iter = figures.iterator();

    while (iter.hasNext()) {

    Shape nxt =  iter.next();

    System.out.printf("area = %8.4f perimeter = %8.4f\n",

    nxt.computeArea(), nxt.computePerimeter());

    }

    }

    }

    ```


    So, when you code to the interface, your program becomes easier to extend and
    modify, working with all the interface’s subclasses seamlessly.


    As an aside, the principles above let you know that you should be constantly reviewing
    your design. Pride kills good design; don’t be afraid to revisit your design decisions.
    Your design is iterative. Changing your design will also force your code to change,
    because of the need to *refactor*.'
