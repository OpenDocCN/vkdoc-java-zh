  trans: '

    ## 敏捷开发环境中的测试


    无论你使用何种开发流程，许多理念和方法都是相同的，但敏捷流程对测试持有不同的观点。大多数敏捷方法论强烈鼓励（而极限编程则要求）使用测试驱动开发，以便在生产代码编写之前就编写好单元测试。


    由于*持续集成*，测试驱动开发在敏捷团队中非常有意义。在大多数敏捷方法论中，每当开发人员完成一个任务或功能的编写，他们都需要将新代码集成到代码库中，并使用自动化测试套件进行测试。在一个由
    10 到 20 名开发人员组成的团队中，这种情况每天可能发生多次。*持续集成*的规则之一是：如果你编写了一段通过单元测试的新代码，但在集成后它破坏了产品，*你必须立即修复它*。没有错误报告，也没有将问题转交给单独的缺陷修复和集成团队；编写该代码的开发人员应立即解决问题。这一点，再加上敏捷项目中实现的大多数新功能或任务都很小（记住，任务的总工作量通常应在
    8 小时或更少），使得集成测试成为单元测试的延伸。准备好测试以便随时进行持续集成的重新测试，这完全是合情合理的。


    敏捷中采用测试驱动开发的另一个原因是，许多敏捷方法推荐（而极限编程则要求）*结对编程*，即两名开发人员轮流编写代码并完善他们的测试和代码。他们频繁测试（例如每编写完一个新函数就测试一次），频繁集成，并且所有的新测试都会被添加到项目的自动化测试套件中。这是一个三赢的局面。


    最后，在敏捷项目中，*客户是开发团队的关键组成部分，并负责系统测试*。在许多情况下，客户就在现场，因此由客户建立的系统/验收测试可以在每次代码变更集成后运行。


    因此，在敏捷项目中，整个测试套件（单元测试、集成测试和系统测试）都是正常敏捷开发流程的一部分。


    ## 测试什么？


    既然我们已经讨论了测试的不同阶段以及何时进行单元测试，现在是时候讨论到底*要测试什么*了。你要测试的内容分为两大类：*代码覆盖率*和*数据覆盖率*。


    *   *代码覆盖率*的目标是使用代表性数据执行程序中的每一行代码至少一次，以便确保所有代码都能正确运行。听起来很简单？好吧，请记住那个 5 万行程序的组合爆炸问题。


    *   *数据覆盖率*的目标是测试好数据和坏数据的代表性样本（包括输入数据和程序生成的数据），目的是确保程序能正确处理数据，尤其是数据错误。


    当然，代码覆盖率和数据覆盖率之间存在重叠。例如，有时为了执行程序的特定部分，你必须向其输入错误数据。我们会尽可能地将它们分开讨论，并在谈到编写实际测试时再结合起来。


    ### 代码覆盖率：测试每条语句


    代码覆盖率的目标是测试构成程序的所有不同类型代码中的每条语句。让我们来看看这些不同的代码类型。


    *直线代码*照亮了函数或方法中的单一路径。通常，这需要为每种不同的数据类型进行一次测试。


    *分支覆盖率*测试程序中所有可能改变方向的地方。这意味着你需要关注控制结构：每个`if`和`switch`语句，以及每个*复杂条件表达式*（包含 AND 和
    OR 运算符的表达式）。对于每个`if`语句，你需要两个测试：一个用于条件为`true`的情况，另一个用于条件为`false`的情况。对于每个`switch`语句，你需要为`switch`中的每个`case`子句（包括`default`子句）进行单独的测试（你所有的`switch`语句都应该有一个`default`子句）。逻辑
    AND（`&&`）和 OR（`||`）运算符增加了条件表达式的复杂性，因此你需要额外的测试用例。理想情况下，每个运算符需要四个测试用例（F-F, F-T,
    T-F, T-T），但如果你使用的语言对逻辑运算符采用*短路求值*（如 C/C++和 Java），那么你可以减少测试用例的数量。^(²⁹²) 对于 OR 运算符，如果第一个子表达式求值为`false`，你仍然需要两个测试用例；但如果第一个子表达式求值为`true`，则只需一个测试用例（因为整个表达式将求值为
    true）。对于 AND 运算符，如果第一个子表达式求值为`false`，则只需一个测试用例（结果将始终为 false）；但如果第一个子表达式求值为`true`，则需要两个测试用例。


    *循环覆盖率*与上述分支覆盖率类似，因为循环包含条件判断。不同之处在于，在`for`、`while`或`do`-`while`循环中，你极有可能引入*差一错误*，并且需要明确地对此进行测试。首先，你需要对循环的*正常*运行进行一次测试。然后，对于前置测试循环，有可能永远无法进入循环体（如果循环条件表达式在第一次求值时即为假）。接着，如果条件表达式永远不会变为*false*，你需要测试*无限循环*。这种情况最可能发生在循环控制变量未在循环体内更新、更新错误，或者循环条件表达式从一开始就写错的情况下。对于读取文件的循环，通常需要测试*文件结束*标记（EOF）。这是另一个可能出错的地方，原因可能是文件过早结束，或者（在使用标准输入的情况下）从未指示文件结束。


    *返回值*应始终进行检查，即使它们不是被测试代码的主要功能组件。在许多语言中，标准库函数和操作系统调用都会返回值。例如，在 C 语言中，`fprintf`和`fscanf`函数族分别返回打印到输出流的字符数和从输入流中分配到的输入元素数。但几乎没有人会检查这些返回值。^(²⁹³)
    你应该检查它们，因为它们可能揭示代码中更微妙、更隐蔽的问题！请注意，Java 与 C 或 C++略有不同。在 Java 中，许多类似的例程会将返回值声明为`void`，而不是像
    C 或 C++那样声明为`int`。因此，上述问题在 Java 中出现的频率远低于其他语言。不过，这并不意味着问题完全消失了：虽然 Java 中的`System.out.print()`和`System.out.println()`方法都被声明为返回`void`，但`System.out.printf()`方法返回一个`PrintStream`对象，而这个对象几乎普遍被忽略。此外，在
    Java 中，调用`Scanner`的`next()`或`nextInt()`方法，或任何读取数据的方法，而不将返回值保存在变量中，是完全合法的。请务必小心。

    '
- fmt: '### Data Coverage: Bad Data Is Your Friend?


    Remember when we talked about *defensive programming* (in the chapter on code
    construction), we discussed that the key to defending your program is watching
    out for, detecting, and handling bad data, so that your program can recover or
    at least fail gracefully. Well, now is where we see if your defenses hold up.
    Data coverage should examine two types of data: good data and bad data.


    *Good data* is the typical data your method is supposed to handle, data of the
    correct type and within the correct ranges. Testing good data is a baseline to
    verify your program can handle the basics of normal operation normally. Here’s
    the short list of the basic tests to be performed on good data:


    - *Test typical data values*: Valid data fields that you might normally expect
    to get. For example, if your program is computing average grades for a course,
    the range of values is likely between 0 and 100, inclusive. You might check 35,
    50, 67, 75, 88, 93, and so on. If they don’t work, it’s too soon to test anything
    else; recheck your solution.


    - *Test boundary conditions (or edge cases)*: Data near the edges of the range
    of your valid data. Off-by-one errors often hide at the edges. For the grading
    example above, you should test valid grades near both boundaries: 0, 1, 99, and
    100. You should also test invalid values close to the range: -1 and 101. If you
    are assigning letter grades, you also need to check the upper and lower boundaries
    of each letter grade value. So if an F is any grade below a 60, you should check
    59, 60, and 61.


    - *Test preconditions and postconditions*: Whenever you enter a control structure
    (a loop or a selection statement) or make a function call, you’re making certain
    assumptions about data values and the state of your computations. These are *preconditions*.
    When you exit that control structure, you’re making assumptions about what those
    values are now. These are *postconditions*. You should write tests that make sure
    that your assumptions are correct by testing the preconditions and postconditions.
    In languages that have *assertions* (including C, C++, and Java), this is a great
    place to use them.


    *Bad data* is any data that your method is not designed to process, but which
    it could nevertheless receive through user error, code defects, hardware malfunctions,
    and such. It is your job to find out how your code behaves given all kinds of
    bad data and to make a conscious choice about how to address it during development.
    If you are not investigating interactions with bad data proactively, you are letting
    unexpected bad things happen to your code out in the real world, as well as letting
    your code become the unexpected bad thing that happens to others. To responsibly
    test interactions with bad data, you can start by looking at the following:


    - *Illegal data values*: You should test data that is blatantly illegal to make
    sure that your data validation code is working. We already mentioned testing illegal
    data near the boundaries of your legal data ranges but do test data blatantly
    out of the range.


    - *No data*: This is where you are expecting data and you get nothing. For instance,
    when you’ve prompted a user for input and instead of typing a value and then press
    the return key, they just press return. Or when you can’t open an input file or
    the file you’ve just opened is empty. Or when you’re expecting command line arguments
    and you get none. You’ve got to test all of these cases and more. Get creative!


    - *Too little or too much data*: You have to test the cases where you ask for
    three pieces of data and only get two, or you ask for three pieces and get ten.
    You have to be careful with the “too much data” case. Many programming languages
    (C and C++ among them) use a *data input stream* model for data: each time the
    program needs data, it only reads as much data from the input stream as it needs.
    If there is more data in the stream, it just sits there waiting for the next read
    operation. This may not be what you want, particularly if the input is coming
    from a user typing at a keyboard.


    - *Uninitialized variables*: Most language systems will provide default initialization
    values for any variable that you declare. But you should still test to make sure
    that these variables are initialized correctly. (Really, you should not depend
    on the system to initialize your data anyway; you should always initialize it
    yourself.)


    ## Characteristics of Tests


    Robert Martin, in his book *Clean Code*, describes a set of characteristics that
    all unit tests should have via the acronym F.I.R.S.T.:^([^(294)](#fn294))


    - *Fast*: Tests should be fast. If your tests take a long time to run, you’re
    liable to run them less frequently. So make your tests small, simple, and fast.


    - *Independent*: Tests should not depend on each other. In particular, one test
    shouldn’t set up data or create objects that another test depends on. For example,
    the JUnit testing framework for Java has separate setup and teardown methods that
    make the tests independent. We’ll examine JUnit in more detail later on.


    - *Repeatable*: You should be able to run your tests any time you want, in any
    order you want, including after you’ve added more code to the module.


    - *Self-validating*: The tests should either just pass or fail; in other words,
    their output should just be Boolean. You shouldn’t have to read pages and pages
    of a log file to see if the test passed or not.


    - *Timely*: Your tests should be available when you want to run them. For agile
    methodologies that use TDD, this means you write the unit tests first, just before
    you write the code that they will test.


    Finally, it is important that just like your functions, your tests should only
    test one thing; there should be a single concept for each test. This is very important
    for your debugging work because if each test only tests a single concept in your
    code, a test failure will point you like a laser at the place in your code where
    your error is likely to be.


    ## How to Write a Test


    Let’s now dive into exactly how one writes a unit test. In this section, we will
    focus on manual testing, but in the next section we’ll examine how to make use
    of a testing framework such as JUnit.


    To write a test, imagine that you are writing a part of an application in the
    form of a user story, as might be done in an agile development environment.^([^(295)](#fn295))
    In agile methodologies, the developers and the customer conduct an *exploration*:
    they get together to talk about what the customer wants. The customer writes a
    series of *stories* that describe features that they want in the program. These
    stories are taken by the developers, broken up into *implementation tasks*, and
    estimated. Tasks should be small, no more than 8 hours of effort. Programmers
    (individually or in pairs) take individual tasks and implement them using TDD.
    We’ll present a story, break it up into tasks, and implement some tests for the
    tasks to get an idea of the unit testing process.


    ### Writing Tests: The Story


    User Story: “Given a flat file of phone contacts, we want to sort the contacts
    alphabetically, and produce an output table that can be printed.”


    Really, that’s all. Stories in agile projects are typically very short. The suggestion
    is that they be written on 3x5 index cards or digital post-it notes.


    ### Writing Tests: The Tasks


    Now you can break this story up into a set of small tasks. This will look suspiciously
    like a design exercise. It is.


    - Create a class that represents a phone contact.

    - Create a phone contact.

    - Read a data file and create a list of phone contacts. (This may look like two
    things, but it’s really just one thing: converting a file into a list of phone
    contacts.)

    - Sort the phone contacts alphabetically by last name.

    - Create the printable sorted list.'
  raw: '### Data Coverage: Bad Data Is Your Friend?


    Remember when we talked about *defensive programming* (in the chapter on code
    construction), we discussed that the key to defending your program is watching
    out for, detecting, and handling bad data, so that your program can recover or
    at least fail gracefully. Well, now is where we see if your defenses hold up.
    Data coverage should examine two types of data: good data and bad data.


    *Good data* is the typical data your method is supposed to handle, data of the
    correct type and within the correct ranges. Testing good data is a baseline to
    verify your program can handle the basics of normal operation normally. Here’s
    the short list of the basic tests to be performed on good data:


    *   *Test typical data values*: Valid data fields that you might normally expect
    to get. For example, if your program is computing average grades for a course,
    the range of values is likely between 0 and 100, inclusive. You might check 35,
    50, 67, 75, 88, 93, and so on. If they don’t work, it’s too soon to test anything
    else; recheck your solution.


    *   *Test boundary conditions (or edge cases)*: Data near the edges of the range
    of your valid data. Off-by-one errors often hide at the edges. For the grading
    example above, you should test valid grades near both boundaries: 0, 1, 99, and
    100\. You should also test invalid values close to the range: -1 and 101\. If
    you are assigning letter grades, you also need to check the upper and lower boundaries
    of each letter grade value. So if an F is any grade below a 60, you should check
    59, 60, and 61.


    *   *Test preconditions and postconditions*. Whenever you enter a control structure
    (a loop or a selection statement) or make a function call, you’re making certain
    assumptions about data values and the state of your computations. These are *preconditions*.
    When you exit that control structure, you’re making assumptions about what those
    values are now. These are *postconditions*. You should write tests that make sure
    that your assumptions are correct by testing the preconditions and postconditions.
    In languages that have *assertions* (including C, C++, and Java), this is a great
    place to use them.


    *Bad data* is any data that your method is not designed to process, but which
    it could nevertheless receive through user error, code defects, hardware malfunctions,
    and such. It is your job to find out how your code behaves given all kinds of
    bad data and to make a conscious choice about how to address it during development.
    If you are not investigating interactions with bad data proactively, you are letting
    unexpected bad things happen to your code out in the real world, as well as letting
    your code become the unexpected bad thing that happens to others. To responsibly
    test interactions with bad data, you can start by looking at the following:


    *   *Illegal data values*: You should test data that is blatantly illegal to make
    sure that your data validation code is working. We already mentioned testing illegal
    data near the boundaries of your legal data ranges but do test data blatantly
    out of the range.


    *   *No data*: This is where you are expecting data and you get nothing. For instance,
    when you’ve prompted a user for input and instead of typing a value and then press
    the return key, they just press return. Or when you can’t open an input file or
    the file you’ve just opened is empty. Or when you’re expecting command line arguments
    and you get none. You’ve got to test all of these cases and more. Get creative!


    *   *Too little or too much data*: You have to test the cases where you ask for
    three pieces of data and only get two, or you ask for three pieces and get ten.
    You have to be careful with the “too much data” case. Many programming languages
    (C and C++ among them) use a *data input stream* model for data: each time the
    program needs data, it only reads as much data from the input stream as it needs.
    If there is more data in the stream, it just sits there waiting for the next read
    operation. This may not be what you want, particularly if the input is coming
    from a user typing at a keyboard.


    *   *Uninitialized variables*. Most language systems will provide default initialization
    values for any variable that you declare. But you should still test to make sure
    that these variables are initialized correctly. (Really, you should not depend
    on the system to initialize your data anyway; you should always initialize it
    yourself.)


    ## Characteristics of Tests


    Robert Martin, in his book *Clean Code,* describes a set of characteristics that
    all unit tests should have via the acronym F.I.R.S.T.:^([^(294)](#fn294))


    *   *Fast:* Tests should be fast. If your tests take a long time to run, you’re
    liable to run them less frequently. So make your tests small, simple, and fast.


    *   *Independent:* Tests should not depend on each other. In particular, one test
    shouldn’t set up data or create objects that another test depends on. For example,
    the JUnit testing framework for Java has separate setup and teardown methods that
    make the tests independent. We’ll examine JUnit in more detail later on.


    *   *Repeatable:* You should be able to run your tests any time you want, in any
    order you want, including after you’ve added more code to the module.


    *   *Self-validating:* The tests should either just pass or fail; in other words,
    their output should just be Boolean. You shouldn’t have to read pages and pages
    of a log file to see if the test passed or not.


    *   *Timely:* Your tests should be available when you want to run them. For agile
    methodologies that use TDD, this means you write the unit tests first, just before
    you write the code that they will test.


    Finally, it is important that just like your functions, your tests should only
    test one thing; there should be a single concept for each test. This is very important
    for your debugging work because if each test only tests a single concept in your
    code, a test failure will point you like a laser at the place in your code where
    your error is likely to be.


    ## How to Write a Test


    Let’s now dive into exactly how one writes a unit test. In this section, we will
    focus on manual testing, but in the next section we’ll examine how to make use
    of a testing framework such as JUnit.


    To write a test, imagine that you are writing a part of an application in the
    form of a user story, as might be done in an agile development environment.^([^(295)](#fn295))
    In agile methodologies, the developers and the customer conduct an *exploration*:
    they get together to talk about what the customer wants. The customer writes a
    series of *stories* that describe features that they want in the program. These
    stories are taken by the developers, broken up into *implementation tasks*, and
    estimated. Tasks should be small, no more than 8 hours of effort. Programmers
    (individually or in pairs) take individual tasks and implement them using TDD.
    We’ll present a story, break it up into tasks, and implement some tests for the
    tasks to get an idea of the unit testing process.


    ### Writing Tests: The Story


    User Story: “Given a flat file of phone contacts, we want to sort the contacts
    alphabetically, and produce an output table that can be printed.”


    Really, that’s all. Stories in agile projects are typically very short. The suggestion
    is that they be written on 3x5 index cards or digital post-it notes.


    ### Writing Tests: The Tasks


    Now you can break this story up into a set of small tasks. This will look suspiciously
    like a design exercise. It is.


    *   Create a class that represents a phone contact.


    *   Create a phone contact.


    *   Read a data file and create a list of phone contacts. (This may look like
    two things, but it’s really just one thing: converting a file into a list of phone
    contacts.)


    *   Sort the phone contacts alphabetically by last name.


    *   Create the printable sorted list.'
  trans: '

    ### 数据覆盖：坏数据是你的朋友？


    还记得我们讨论过*防御性编程*（在代码构建章节中）吗？我们提到，保护程序的关键在于警惕、检测并处理坏数据，以便程序能够恢复或至少优雅地失败。现在，就是检验你的防御是否牢固的时候了。数据覆盖应检查两类数据：好数据和坏数据。


    *好数据*是你的方法预期要处理的典型数据，即类型正确且在合理范围内的数据。测试好数据是验证程序能否正常处理基本操作的基线。以下是针对好数据应执行的基本测试清单：


    *   *测试典型数据值*：你通常可能期望收到的有效数据字段。例如，如果你的程序正在计算课程的平均成绩，数值范围可能在 0 到 100 之间（含两端）。你可以检查
    35、50、67、75、88、93 等值。如果这些值不通过，那么测试其他任何内容都为时过早；请重新检查你的解决方案。


    *   *测试边界条件（或边缘情况）*：接近有效数据范围边缘的数据。差一错误（Off-by-one errors）常常隐藏在边界处。对于上述成绩示例，你应该测试接近两个边界的有效成绩：0、1、99
    和 100。你还应该测试接近该范围的无效值：-1 和 101。如果你正在分配字母等级，还需要检查每个字母等级值的上下边界。因此，如果 F 是低于 60 的任何等级，你应该检查
    59、60 和 61。


    *   *测试前置条件和后置条件*。每当你进入一个控制结构（循环或选择语句）或进行函数调用时，你都在对数据值和计算状态做出某些假设。这些就是*前置条件*。当你退出该控制结构时，你又在假设这些值现在是什么。这些就是*后置条件*。你应该通过测试前置条件和后置条件来编写测试，确保你的假设是正确的。在支持*断言*的语言（包括
    C、C++和 Java）中，这是使用它们的好地方。


    *坏数据*是你的方法未设计处理，但可能因用户错误、代码缺陷、硬件故障等原因而接收到的任何数据。你的工作是找出代码在面对各种坏数据时的行为，并在开发过程中有意识地决定如何处理它。如果你不主动调查与坏数据的交互，就等于让你的代码在现实世界中遭遇意外的坏事，同时也让你的代码成为发生在他人身上的意外坏事。为了负责任地测试与坏数据的交互，你可以从以下几个方面入手：


    *   *非法数据值*：你应该测试明显非法的数据，以确保你的数据验证代码正常工作。我们之前提到过要测试接近合法数据范围边界的非法数据，但也要测试明显超出范围的数据。


    *   *无数据*：这是指你期望收到数据，却什么也没得到的情况。例如，当你提示用户输入时，用户没有输入任何值，只是按下了回车键。或者当你无法打开输入文件，或者刚打开的文件是空的。又或者当你期望命令行参数时，却一个也没得到。你必须测试所有这些情况，甚至更多。发挥你的创造力！


    *   *数据过少或过多*：你必须测试这样的情况：你请求三个数据，却只得到两个；或者你请求三个数据，却得到十个。对于“数据过多”的情况，你必须小心。许多编程语言（包括
    C 和 C++）使用*数据输入流*模型来处理数据：每次程序需要数据时，它只从输入流中读取所需数量的数据。如果流中还有更多数据，它会留在那里等待下一次读取操作。这可能不是你想要的，特别是当输入来自用户在键盘上打字时。


    *   *未初始化的变量*。大多数语言系统会为你声明的任何变量提供默认初始化值。但你仍然应该测试以确保这些变量被正确初始化。（实际上，无论如何你都不应该依赖系统来初始化你的数据；你应该始终自己初始化它们。）


    ## 测试的特性


    罗伯特·马丁在他的著作《代码整洁之道》中，通过首字母缩略词 F.I.R.S.T. 描述了所有单元测试应具备的一组特性：^(²⁹⁴)


    *   *快速（Fast）*：测试应该快速。如果你的测试运行时间很长，你就不太可能频繁地运行它们。所以，让你的测试小巧、简单且快速。


    *   *独立（Independent）*：测试不应相互依赖。特别是，一个测试不应设置另一个测试所依赖的数据或创建对象。例如，Java 的 JUnit 测试框架有独立的设置（setup）和拆卸（teardown）方法，使测试相互独立。我们稍后会更详细地研究
    JUnit。


    *   *可重复（Repeatable）*：你应该能够随时以任何顺序运行你的测试，包括在向模块添加更多代码之后。


    *   *自验证（Self-validating）*：测试应该要么通过，要么失败；换句话说，它们的输出应该是布尔值。你不应该阅读一页又一页的日志文件来判断测试是否通过。


    *   *及时（Timely）*：当你想要运行测试时，测试应该可用。对于使用 TDD 的敏捷方法论来说，这意味着你应该先编写单元测试，就在编写它们将要测试的代码之前。


    最后，重要的是，就像你的函数一样，你的测试应该只测试一件事；每个测试应该只有一个概念。这对你的调试工作非常重要，因为如果每个测试只测试代码中的一个概念，那么测试失败就会像激光一样，精准地指向代码中可能存在错误的位置。


    ## 如何编写测试


    现在让我们深入探讨如何编写一个单元测试。在本节中，我们将专注于手动测试，但在下一节中，我们将研究如何利用像 JUnit 这样的测试框架。


    要编写测试，想象你正在以用户故事的形式编写应用程序的一部分，就像在敏捷开发环境中可能做的那样。^(²⁹⁵) 在敏捷方法论中，开发人员和客户进行*探索*：他们聚在一起讨论客户想要什么。客户编写一系列*故事*来描述他们希望在程序中拥有的功能。开发人员接手这些故事，将其分解为*实现任务*，并进行估算。任务应该很小，工作量不超过
    8 小时。程序员（单独或结对）领取单个任务，并使用 TDD 来实现它们。我们将呈现一个故事，将其分解为任务，并为这些任务实现一些测试，以了解单元测试的过程。


    ### 编写测试：故事


    用户故事：“给定一个包含电话联系人的平面文件，我们希望按字母顺序对联系人进行排序，并生成一个可打印的输出表格。”


    实际上，就是这样。敏捷项目中的故事通常非常简短。建议将它们写在 3x5 的索引卡或数字便利贴上。


    ### 编写测试：任务


    现在你可以将这个故事分解为一组小任务。这看起来很像一个设计练习。确实如此。


    *   创建一个表示电话联系人的类。


    *   创建一个电话联系人。


    *   读取数据文件并创建一个电话联系人列表。（这看起来像是两件事，但实际上只是一件事：将文件转换为电话联系人列表。）


    *   按姓氏的字母顺序对电话联系人进行排序。


    *   创建可打印的排序列表。

