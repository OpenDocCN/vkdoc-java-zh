    create a new Unit Test class and use it to test your `PhoneContact` and `PhoneContactList`
    classes. See Figure [18-1](#270563_3_En_18_Chapter.xhtml#Fig1).


    ![](images/270563_3_En_18_Chapter/270563_3_En_18_Fig1_HTML.jpg)


    A block diagram depicts the interaction between the different blocks marked as
    test phone contact, phone contact list, phone contact, test phone contact, and
    test driver.


    Figure 18-1


    The PhoneContact Test UML diagrams


    Your test class `TestPhoneContact` now looks as follows:


    ```

    public class TestPhoneContact extends junit.framework.TestCase {

    /**

    * Default constructor for test class TestPhoneContact

    */

    public TestPhoneContact(String name) {

    super(name);

    }

    /**

    * Sets up the test fixture.

    * Called before every test case method.

    */

    protected void setUp() {

    }

    /**

    * Tears down the test fixture.

    * Called after every test case method.

    */

    protected void tearDown() {

    }

    public void testPhoneContactCreation() {

    String fname = "Fred";

    String lname = "Flintstone";

    String phone = "800-555-1212";

    String email = "fred@knox.edu";

    PhoneContact pc = new PhoneContact(fname, lname, phone, email);

    assertEquals(lname, pc.getLastName());

    assertEquals(fname, pc.getFirstName());

    assertEquals(phone, pc.getPhoneNum());

    assertEquals(email, pc.getEmailAddr());

    }

    public void testFileOpen() {

    String fileName = "phoneList.txt";

    PhoneContactList pc = new PhoneContactList();

    boolean fileOK = pc.fileOpen(fileName);

    assertTrue(fileOK);

    if (fileOK == false) {

    System.out.println("Open Failed, File Not Found");

    System.exit(1);

    }

    }

    }

    ```


    To run this set of tests in BlueJ, select Test All from the drop-down menu shown
    in Figure [18-2](#270563_3_En_18_Chapter.xhtml#Fig2).


    ![](images/270563_3_En_18_Chapter/270563_3_En_18_Fig2_HTML.jpg)


    A screenshot of a dropdown menu comprises a list of options. The options include
    test all, test phone contact creation, test file open, create test method, object
    bench to test fixture, test fixture to object bench, open editor, compile, inspect,
    and remove.


    Figure 18-2


    The JUnit Menu - Select Test All to run the tests


    Because you don’t have a `phoneList.txt` file created yet, you get the output
    shown in Figure [18-3](#270563_3_En_18_Chapter.xhtml#Fig3).


    ![](images/270563_3_En_18_Chapter/270563_3_En_18_Fig3_HTML.jpg)


    A screenshot exhibits the Blue J test results. There are 2 tests for test phone
    contact creation and test file open. The status at the bottom indicates the error
    for 1 test.


    Figure 18-3


    JUnit Testing output


    Here, note that the `testFileOpen()` test has failed.


    Every time you make any changes to your program, you can add another test to the
    `TestPhoneContact` class and rerun all the tests with a single menu selection.
    The testing framework makes it much easier to create individual tests and whole
    suites of tests that can be run every time you make a change to the program. This
    lets you know every time you make a change if you’ve broken something or not.
    Very cool.


    ## Testing Is Critical


    At the end of the day, unit testing is a critical part of your development process
    and of your peace of mind. Done carefully and correctly, it can help you remove
    the vast majority of your errors even before you integrate your code into the
    larger program. TDD, where you write tests first and then write the code that
    makes the tests succeed, is an effective way to catch errors in both low-level
    design and coding, while allowing you to easily and quickly create a regression
    test suite that you can use for every integration and every baseline of your program.


    ## Conclusion


    From your point of view as the developer, unit testing is the most important class
    of testing your program will undergo. It’s the most fundamental type of testing,
    making sure your code meets the requirements of the design at the lowest level.
    Even though developers are more concerned with making sure their program works
    than with breaking it, developing a good unit testing mindset is critical to your
    development as a mature, effective programmer. Testing frameworks make this job
    much easier and cleaner, so learning how your local testing framework operates
    and learning to write good tests are crucial skills you must develop. Better that
    you find your own bugs than have the customer find them for you.'
