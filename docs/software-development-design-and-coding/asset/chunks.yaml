  trans: '

    ## 设计模式与四人帮


    在《设计模式》一书中，四人帮将设计模式描述为具有四个基本特征：


    *   *模式名称*作为*“……一个我们可以用来描述设计问题、解决方案及其后果的句柄，通常用一两个词概括。为模式命名能立即丰富我们的设计词汇。”*


    *   *问题*描述何时使用该模式。“*它解释了问题及其上下文。”*


    *   *解决方案*“……描述了构成设计的元素、它们之间的关系、职责和协作……该模式提供了对设计问题的抽象描述，以及元素的一般排列如何解决该问题。”*


    *   *后果*，即将模式应用于问题所产生的结果和权衡。这些包括时间和空间的权衡，也包括灵活性、可扩展性和可移植性等。^(²¹⁴)


    设计模式根据两个标准进行分类：*范围*和*目的*。*范围*处理类与对象之间的关系。类之间的静态关系在编译时确定，而对象之间的动态关系可以在运行时改变。*目的*处理模式对类和对象的作用。模式可以处理对象的创建、类或对象的组合，或者对象在程序中交互和分配职责的方式。


    四人帮在他们的书中描述了 23 种不同的设计模式，将它们分为三类：*创建型*、*结构型*和*行为型*。


    *   *创建型设计模式*处理对象何时以及如何被创建。这些模式通常会为你创建对象，使你无需直接实例化这些对象。


    *   *结构型设计模式*描述如何将对象组合成更大的组。


    *   *行为型设计模式*通常讨论职责如何分配以及对象之间如何进行通信。


    这个列表并非完整无缺，自四人帮的《设计模式》一书出版以来，世界各地的开发者已经在这个原始列表中添加了许多模式。最近在谷歌上搜索“软件设计模式”一词，得到了超过
    184.85 万条结果，其中过去 24 小时内有 9 万条，因此这绝对是一个活跃的讨论主题。


    ## 经典设计模式


    下面列出了四人帮描述的 23 种（经典）设计模式。（在本章的剩余部分，我们将重点介绍斜体表示的设计模式，因为它们是最常用的。）


    ### 创建型模式


    1.  抽象工厂


    2.  建造者


    3.  *工厂方法*


    4.  原型


    5.  *单例*


    ### 结构型模式


    1.  *适配器*


    2.  桥接


    3.  组合


    4.  装饰器


    5.  *外观*


    6.  享元


    7.  代理


    ### 行为型模式


    1.  责任链


    2.  命令


    3.  解释器


    4.  *迭代器*


    5.  中介者


    6.  备忘录


    7.  *观察者*


    8.  状态


    9.  *策略*


    10.  模板方法


    11.  访问者


    ## 我们可以使用的模式


    本节中的模式是经典设计模式的代表性样本，也是你马上会发现最有用的那些。


    ### 创建型模式


    创建型模式都与创建对象有关。如果我们将类定义视为生成对象的模板，那么这些模式就关乎如何创建这些模板。接下来我们将要讨论的两种模式——单例和工厂方法——展示了两种不同的对象创建思路。


    #### 创建型模式 1：单例模式


    单例^(²¹⁵)几乎肯定是设计模式中最容易理解和编码的。其思想很简单：你在编写一个程序，并且需要一个类的一个——*且仅有一个*——实例（并且你需要强制执行“且仅有一个”的要求）。使用单例模式的程序示例包括打印假脱机程序、窗口管理器、设备驱动程序等。


    那么，“一个且仅一个”的要求意味着什么呢？首先，这意味着你的程序只能调用一次 `new Singleton()`，对吧？但是，什么能阻止程序中的其他对象（或者不是你编写的程序中的对象）再次调用
    `new Singleton()` 呢？答案是——什么也阻止不了！只要你的类可以被实例化一次，它就可以被一次又一次地实例化。


    因此，你需要做的是创建一个可以被实例化一次且仅一次的类，并且它*不使用* `new` 来进行实例化。你没听错：你需要一个可以在不使用 `new` 的情况下被实例化的类。是时候耍点小聪明了！


    以下是你要做的。对象被实例化时调用的方法是构造函数。在 Java 中，你可以调用 `new Singleton()`，因为 `Singleton()` 构造函数是公有的——它在类定义外部可见。如果你想保留构造函数以便能够创建
    Singleton 对象的实例，但又不想让任何人能够使用 `new` 来做到这一点，你必须将构造函数设为私有。“但是等等！”你可能会想，“如果构造函数是私有的，那么我根本无法实例化这个对象！”然而，有一种方法可以解决这个问题：如果构造函数是私有的，那么它只能从类定义内部访问，因此从类定义本身内部实例化对象仍然是完全可能的！


    但这又回到了一个问题：如何从*类定义外部*访问构造函数？嗯，在 Java 中，有没有一种方法可以在不实例化类的情况下访问类内部的方法？（想想你如何在不实例化
    `Math` 类的情况下调用 `Math.abs()`。）


    啊哈！静态类方法！一个公有的静态方法在类定义外部是可见的，而无需实际实例化对象。因此，如果你创建一个具有私有构造函数的类，然后使用一个可以有条件地调用该私有构造函数的静态方法，你就可以控制创建该类的实例数量。代码如下：


    ```

    public class Singleton {

    // 这是将一直存在的实例引用

    private static Singleton uniqueInstance;

    // 私有构造函数 – 无法从外部访问

    private Singleton() {

    // 在此处执行初始化实例的操作

    }

    // 这是我们将用于创建实例的静态方法

    public static Singleton getInstance() {

    if (uniqueInstance == null) {

    uniqueInstance = new Singleton();

    }

    // 如果 uniqueInstance 不为 null，则说明它已存在

    return uniqueInstance;

    }

    // 其他方法 – 毕竟 Singleton 是一个真正的类

    }

    ```


    要使用 `Singleton` 类，你可以这样做：


    ```

    public class SingletonTest {

    public static void main(String [] args) {

    Singleton mySingle;

    mySingle = Singleton.getInstance();

    // 我们在这里做其他事情

    }

    }

    ```


    当你通过调用 `getInstance()` 方法来实例化 `Singleton` 实例时，它会测试你是否之前已经这样做过。如果没有，它会使用 `Singleton`
    类中的私有构造函数创建该实例。如果实例已经存在（`uniqueInstance` 变量不为 `null`），那么你只需返回对该对象的引用。

    '
- fmt: '# Singleton Pattern 的线程安全问题


    这一版本的单例模式并非没有问题。首先，如果你正在编写多线程的 Java 程序，它可能会失败，因为上述解决方案不是“线程安全的”。在检查`Singleton`实例是否存在与实际创建实例之间，你的程序可能会被切换出去，而另一个线程正在执行。当它切换回来时，可能会错误地创建另一个`Singleton`实例。对此有相对简单的解决方案。


    使单例模式线程安全的最简单方法是将`getInstance()`方法设为`synchronized`方法。这样它将完整执行而不会被切换出去。


    以下是线程安全的`getInstance()`方法版本：


    ```

    public synchronized static Singleton getInstance() {

    if (uniqueInstance == null) {

    uniqueInstance = new Singleton();

    }

    return uniqueInstance;

    }

    ```


    注意唯一的区别是在方法签名中包含了`synchronized`关键字。下面我们将给出如何使用单例模式的示例。


    ## 创建型模式 2：工厂方法模式


    工厂方法模式允许你定义一个用于创建一族对象的接口，并允许子类决定实例化该族中的哪些成员。它将实例化延迟到子类中。


    假设你有一家小公司，正在向多个州的多个城市扩张。你有一个程序来模拟你的运营并计算每笔销售的销售税。每个州和城市都有不同的销售税率，因此你需要跟踪各个地点，并在任何特定地点只使用正确的税率。当你在新地点增加新门店时，你不想为了计算每个新地点的销售税而重写代码。这就是工厂方法模式的用武之地。


    工厂方法模式^([^(216)](#fn216))为你创建对象。你只需定义一个用于创建对象的接口（或抽象类），但让实现该接口的类（或扩展该类的子类）决定实例化哪个类。换句话说，子类负责创建类的实例。当你需要创建几种通常彼此相关的对象时——它们通常具有相同的抽象父类，因此属于同一类层次结构——但所有对象都不同时，你可以使用工厂方法模式。


    在工厂方法模式中，你创建对象而不向客户端暴露创建逻辑，并使用公共接口引用新创建的对象。工厂方法模式允许子类选择要创建的对象类型，并且它们在运行时执行此操作。你要求工厂创建类型为`X`的对象，它就会创建一个；你要求它创建类型为`Y`的对象，它就会创建一个。这将具体类的创建强制委托给知道如何创建具体类的接口的子类，并使你的其他类对修改关闭。所有这些都不需要更改`X`或`Y`或商店。


    工厂方法模式通过消除将应用程序特定的类绑定到客户端代码中的需要，促进了松散耦合。这意味着客户端代码仅与生成的接口或抽象类交互，因此它将与实现该接口或扩展该抽象类的任何类一起工作。


    ### 何时使用工厂模式？


    *   当你事先不知道需要什么类对象时。

    *   当所有潜在的类都在同一个子类层次结构中时。

    *   为了集中类选择代码。

    *   当你不想让用户必须知道每个子类时。

    *   为了封装对象创建。


    在此示例中，你可以使用`SalesTaxFactory`类创建销售税计算对象，以生成将为不同地点计算销售税的对象。你将拥有以下几个类：


    *   `SalesTax`：定义销售税对象的接口

    *   `BostonTax`：继承自`Tax`的具体类

    *   `ChicagoTax`：继承自`Tax`的具体类

    *   `StLouisTax`：继承自`Tax`的具体类

    *   `SalesTaxFactory`：你的具体实现，用于创建不同的`Tax`对象

    *   `SalesTaxDriver`：一个驱动程序类，允许你销售商品并计算销售税


    工厂方法模式依赖于为你所需的对象定义一个接口，然后允许实现该接口的子类实际实现这些对象。你可以使用 Java 接口或抽象类来定义你的`SalesTax`接口。让我们使用抽象类。你的`SalesTax`抽象类将如下所示：


    ```

    abstract class SalesTax {

    protected double rate;

    abstract void getRate();

    public void calculateTax(double amount) {

    System.out.printf("$%6.2f\n", amount * (1.0 + rate));

    }

    }

    ```


    你的`SalesTax`子类最终成为具体类，它们重写来自`SalesTax`抽象类的一个或多个方法：'
  raw: 'This version of the Singleton Pattern isn’t without its problems. For one
    thing, it can fail if you are writing a multi-threaded Java program, as the solution
    above is not “thread safe.” It’s possible that in between the test for the existing
    of a `Singleton` instance and the actual creation of an instance that your program
    could be swapped out while another thread executes. When it swaps back in, it
    could erroneously create another instance of the `Singleton`. There are relatively
    easy solutions to this.


    The simplest way to make your Singleton Pattern thread-safe is to make the `getInstance()`
    method a synchronized method. That way it will execute to completion and not be
    swapped out.


    Here’s a version of the `getInstance()` method that is thread safe:


    ```

    public synchronized static Singleton getInstance() {

    if (uniqueInstance == null) {

    uniqueInstance = new Singleton();

    }

    return uniqueInstance;

    }

    ```


    Notice that the only difference is the inclusion of the synchronized keyword in
    the method signature. We’ll give an example of how to use the Singleton Pattern
    below.


    #### Creational 2: The Factory Method Pattern


    The Factory Method Pattern allows you to define an interface for creating a family
    of objects, and it allows subclasses to decide which members of the family to
    instantiate. It defers instantiation down into the subclasses.


    Say you’ve got a small company that is expanding across multiple cities in several
    states. You have a program to model your operations and compute the sales tax
    on each sale. Every state and city has a different sales tax rate, so you need
    to keep track of the locations and only use the correct rate in any specific location.
    As you add new stores in new locations, you don’t want to have to rewrite your
    code in order to compute the sales tax in each new location. That’s where the
    Factory Method Pattern comes in.


    The Factory Method Pattern^([^(216)](#fn216)) creates objects for you. You just
    define an interface (or an abstract class) for creating an object but let the
    classes implementing that interface (or the subclasses extending that class) decide
    which class to instantiate. In other words, subclasses are responsible for creating
    the instance of the class. You use the Factory Method Pattern when you need to
    create several types of objects that are usually related to each other—they usually
    have the same abstract parent class so they are in the same class hierarchy—but
    all are different.


    In the Factory Method Pattern, you create an object without exposing the creation
    logic to the client and refer to the newly created object using a common interface.
    The Factory Method Pattern allows the subclasses to choose the type of objects
    to create and they do that at runtime. You ask the factory to create an object
    of type X and it creates one; you ask it to create an object of type Y and it
    creates one. This forces the creation of concrete classes to be relegated to subclasses
    of an interface that knows how to create concrete classes and keeps your other
    classes closed for modification. All without changing X or Y or the store.


    The Factory Method Pattern promotes loose coupling by eliminating the need to
    bind application-specific classes into the client code. That means the client
    code interacts solely with the resultant interface or abstract class so that it
    will work with any classes that implement that interface or that extends that
    abstract class.


    When do you use the Factory Pattern?


    *   When you don’t know ahead of time what class object you will need.


    *   When all of the potential classes are in the same subclass hierarchy.


    *   To centralize class selection code.


    *   When you don’t want the user to have to know every subclass.


    *   To encapsulate object creation.


    In this example, you can create sales tax calculation objects using a `SalesTaxFactory`
    class to generate the objects that will compute sales tax for different locations.
    You’ll have several classes:


    `SalesTax`: An interface that defines your sales tax objects


    `BostonTax`: A concrete class that inherits from `Tax`


    `ChicagoTax`: A concrete class that inherits from `Tax`


    `StLouisTax`: A concrete class that inherits from `Tax`


    `SalesTaxFactory`: Your concrete implementation that makes different `Tax` objects


    `SalesTaxDriver`: A driver class that lets you sell items and compute sales tax


    The Factory Method Pattern depends on defining an interface for the objects you
    need and then allowing subclasses that implement that interface to actually implement
    the objects. You can either use a Java interface or an abstract class to define
    your `SalesTax` interface. Let’s use an abstract class. Your `SalesTax` abstract
    class will look like the following:


    ```

    abstract class SalesTax {

    protected double rate;

    abstract void getRate();

    public void calculateTax(double amount) {

    System.out.printf("$%6.2f\n", amount * (1.0 + rate));

    }

    }

    ```


    Your `SalesTax` subclasses end up as concrete classes that override one or more
    of the methods from the `SalesTax` abstract class:'
