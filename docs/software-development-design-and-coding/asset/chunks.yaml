  trans: '

    ## 代码评审


    *代码评审*比走查更为正式，也是大多数软件开发人员所采用的方式。如果你修改了大量代码、编写了全新的代码，或者向现有程序添加了超过几行新代码，你都应该进行代码评审。敏捷开发人员可能会在完成一个用户故事后进行代码评审。


    代码评审是真正的会议，通常有三到五名参与者，每个人带来不同的视角：


    *   代码评审的*主持人*通常是*作者*。主持人的职责是召集会议、在会议前提前分发待评审的工作成果，并主持代码评审会议。主持人也可能在会议中做记录。


    *   会议中应有一名或多名*开发人员*，他们与作者参与同一个项目，贡献对项目细节的深入理解。


    *   代码评审中应有一位*测试人员*，带来测试视角，不仅要阅读被评审的代码，还要思考代码应如何被测试。


    *   最后，应有一位经验丰富的开发人员在场，且该开发人员与作者不在同一个项目组。这位*无利益关系的第三方*代表质量视角，对代码及其如何融入项目提供更具战略性的见解。他们在代码评审中的任务是理解代码，并让作者清晰地解释所做的更改。


    *   *代码评审不允许有管理人员参加*。管理人员的出现会改变会议的动态，降低代码评审的效果。那些在同事间愿意诚实评价代码的人，在管理人员在场时会闭口不言；这无助于发现错误。所以，请不要让管理人员参加。


    代码评审的目标是发现代码中的错误，而不是修复它们。代码评审足够非正式，可能会讨论一些修复方案，但应将其控制在最低限度。在代码评审会议之前，所有参与者都应仔细审阅主持人分发的材料，并准备一份他们发现的错误清单。这一步对于使评审会议高效且成功至关重要。请做好你的功课！


    这份清单应在会议开始时交给主持人。作者（也可能是主持人）会逐项讲解代码变更，解释这些变更如何修复了原本要修复的错误，或添加了所需的新功能。如果某个错误或讨论将评审会议引向了原始评审范围之外的代码，请立即停止！要非常小心地避免进入尚未预先阅读的领域。你应该将任何不在评审范围内的代码视为黑盒。改为安排另一次会议。请记住，代码评审的重点是单一代码片段，并找出该代码片段中的错误。不要分心。


    在代码评审中，一台电脑和视图共享（投影或屏幕共享）是必不可少的，这样每个人都能随时看到正在发生的事情。应使用第二台电脑，以便有人（通常是作者）记录在代码中发现的错误。一次代码评审不应超过大约两个小时，也不应评审超过大约
    200-500 行代码，因为在那段时间或阅读量之后，每个人的注意力和效率都会开始下降。如果时间不够，请安排另一次评审。


    代码评审结束后，记录会分发给所有参与者，作者负责修复评审中发现的所有错误。虽然代码评审不强制要求度量指标，但主持人至少应记录发现了多少错误、评审了多少行代码，以及（如果合适的话）每个错误的严重程度。这些度量指标对于衡量生产力非常有用，并应用于规划下一个项目。


    ## 代码审查


    代码审查是最正式的评审会议类型，其唯一目的是发现开发团队产生的任何工作产品中的缺陷。^(³⁰¹) 审查可用于评审计划文档、需求、设计和代码。代码审查有具体规则，涉及一次评审多少行代码、评审会议必须持续多长时间、评审团队的每个成员应做多少准备等。审查通常由较大的组织使用，因为它们比走查或代码评审需要更多的培训、时间和精力。它们也用于任务关键型和安全关键型软件，因为其中的缺陷可能对用户造成伤害。1979
    年，迈克尔·费根发明了最广为人知且最具影响力的审查方法论，这成为了第一个正式的软件审查流程。^(³⁰²) 大多数使用审查的组织都采用原始费根软件代码审查流程的变体。^(³⁰³)


    代码审查有几个非常重要的标准，包括以下内容：


    *   审查会议的重点完全在于发现错误；不允许提出解决方案。


    *   审查使用常见错误类型清单来引导审查人员。


    *   要求评审人员提前准备；如果并非所有人都准备就绪，审查会议将被取消。


    *   审查中的每位参与者都有明确的角色。


    *   所有参与者都接受过审查培训。


    *   主持人不是作者，并且除了常规审查培训外，还接受过特殊培训。


    *   始终要求作者与主持人一起跟进会议中报告的错误。


    *   审查会议中始终会收集度量数据。

    '
- fmt: '### Inspection Roles


    The following are the roles used in code inspections:


    - **Moderator**: The moderator gets all the materials from the author, decides
    who the other participants in the inspection should be, and is responsible for
    sending out all the inspection materials as well as scheduling and coordinating
    the meeting. Moderators must be technically competent; they need to understand
    the inspection materials and keep the meeting on track. The moderator schedules
    the inspection meeting and sends out the checklist of common errors for the reviewers
    to peruse. They also follow up with the author on any errors found in the inspection,
    so they must understand the errors and the corrections. Moderators attend an additional
    inspection-training course to help them prepare for their role.


    - **Author**: The author distributes the inspection materials to the moderator.
    The author is responsible for all rework that is created as a result of the inspection
    meeting. During the inspection, the author answers questions about the code from
    the reviewers but does nothing else. Sometimes, if many of the reviewers are not
    familiar with the project, an initial overview meeting is necessary; the author
    chairs it and explains the overall design to the reviewers. Overview meetings
    are discouraged in code inspections because they can “taint the evidence” by injecting
    the author’s opinions about the code and the design before the inspection meeting.


    - **Reader**: The reader paraphrases the code. This implies that the reader has
    a good understanding of the project, its design, and the code in question. The
    reader does not explain the code; they just paraphrase it. The author should answer
    any questions about the code. That said, if the author has to explain too much
    of the code, that is usually considered a defect to be fixed; such code should
    be refactored to make it simpler.


    - **Reviewers**: The reviewers do the heavy lifting in the inspection. A reviewer
    can be anyone with an interest in the code who is not the author; typically reviewers
    are other developers from the same project. As in code reviews, it’s usually a
    good idea to have a senior person who is not on the project also be a reviewer.
    There are usually between two and four reviewers in an inspection meeting. Reviewers
    must do their prereading of the inspection materials and are expected to come
    to the meeting with a list of errors that they have found. This list is given
    to the recorder.


    - **Recorder**: The recorder is one of the reviewers who is charged with taking
    notes (required at each inspection meeting). The recorder merges the defect lists
    of the reviewers, classifying and recording errors found during the meeting. After
    the meeting, the recorder prepares the inspection report and distributes it to
    the meeting participants. Additionally, if the project is using a defect management
    system, then it is up to the recorder to enter defect reports for all major defects
    from the meeting into the system.


    - **Managers are not invited to code inspections** (just as with code reviews).


    ### Inspection Defect Types


    Defects to be reported can be classified by types and severity. Fagan inspections
    specify only two types of defects: 1) *minor defects*, such as typographic errors,
    errors in documentation, small user interface errors, and other miscellany that
    don’t cause the software to fail and 2) *major defects*, which are all the errors
    that do cause the software to fail. We think that this is a bit extreme, as two
    levels are usually not sufficient for prioritizing the fixes. Most development
    organizations will have at least a five-level defect structure:


    1. **Fatal**: The program fails, usually resulting in a core dump and/or a backtrace
    being produced. Fatal errors usually indicate that there is something fundamentally
    wrong with part of the program.


    2. **Severe**: A major piece of functionality fails and there is no workaround
    for the user. Say that in a first-person shooter game, the software doesn’t allow
    reloading your weapon and doesn’t let you switch weapons in the middle of a fight.
    That’s bad.


    3. **Serious**: The error is severe, but with a workaround for the user. For example,
    the software doesn’t let you reload your weapon, but if you switch weapons and
    then switch back, you can reload.


    4. **Trivial**: A small error, something like incorrect documentation or a minor
    user interface problem. For example, a text box is 10 pixels too far from its
    prompt in a form.


    5. **Feature request**: A brand new feature for the program is desired. This isn’t
    an error; it’s a request from the user (or marketing) for new functionality in
    the software. In a game, this could be new weapons, new character types, new maps
    or surroundings, and so on. This is a request that should be considered for the
    next software version.


    Ideally, of course, no errors ship to a user, but let’s be realistic. In most
    organizations, software is not allowed to ship with known severity 1 and 2 errors
    still in it. Still, severity 3 errors really make users unhappy, so software should
    really never ship with any known errors of severity 1 through 3.


    Under Fagan classification, the above severity 1 through 3 defects are all classified
    as major and are required to be fixed. It is usually up to the recorder to correctly
    classify defects found in the code as major (this classification can be changed
    later).


    ### Inspection Phases and Procedures


    Fagan inspections have seven phases that must be followed for each inspection:^([^(304)](#fn304))


    1. Planning

    2. The overview meeting

    3. Preparation

    4. The inspection meeting

    5. The inspection report

    6. Rework

    7. Follow up


    #### Phase 1: Planning


    In the planning phase, the moderator organizes and schedules the meeting and picks
    the participants. The moderator and the author get together to discuss the scope
    of the inspection materials (for code inspections, typically between 200 and 500
    non-commented lines of code will be reviewed). The author then distributes the
    code to be inspected to the participants.


    #### Phase 2: The Overview Meeting


    An overview meeting is a presentation by the author of the project architecture
    and design and is necessary if several participants are unfamiliar with the project
    or its design and need to be brought up to speed before they can effectively read
    the code. Like the inspection meeting itself, overview meetings should last no
    longer than two hours. If an overview meeting is necessary, the author will call
    and run the meeting. As mentioned, overview meetings are discouraged, because
    they tend to taint the evidence.


    #### Phase 3: Preparation


    In the preparation phase (required in Fagan inspections), each reviewer reads
    the work to be inspected. The inspection meeting can be canceled if the reviewers
    have not done their preparation. Preparation should take no more than 2–3 hours.
    The amount of work to be inspected should be 200-500 non-comment lines of code,
    or 30-80 pages of text. Studies have shown that reviewers can typically review
    about 125–200 lines of code per hour. The amount of time each reviewer spent in
    preparation is one of the metrics that is gathered at the inspection meeting.'
