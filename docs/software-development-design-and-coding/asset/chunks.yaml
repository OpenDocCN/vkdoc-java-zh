- fmt: "# 3. Project Management Essentials\n\n> *“The first step of any project is\
    \ to grossly underestimate its complexity and difficulty.”*\n> \n> —Nicoll Hunt\n\
    \nOnce your project begins, it needs to be managed. You need to manage the schedule,\
    \ the people, the process, and above all, yourself (wherever you fit on the team).\
    \ There is no one correct way to manage development, but there are some ways to\
    \ do this well and even more ways to do it poorly. We have certainly uncovered\
    \ some of both over the years, so let us try to make your journey less perilous.\
    \ It’s dangerous out there; take this chapter!\n\nWorking on anything other than\
    \ personal development projects means working on a team; and working on a team\
    \ means being managed, either from above or from within. Thus, learning about\
    \ project management from both sides is an essential part of learning software\
    \ development. Project management can be seen as managing the work and managing\
    \ the people, so we divided this chapter into two major sections:\n\n1. *Project\
    \ planning*: Much of how daily tasks are managed depends on the chosen software\
    \ development model, which you saw in the previous chapter. What’s left are the\
    \ parts of the project that need to be established before the project begins (i.e.,\
    \ project planning tasks):\n   1. Organization\n   2. Risk analysis\n   3. Resource\
    \ requirements\n   4. Task estimation and schedule\n   5. Defect management\n\n\
    2. *Soft-Aware development*: The most important and complex aspect that must be\
    \ managed in any project are the people. Developers and managers are not just\
    \ a valuable resource, but rather the very biosphere of development. Maintaining\
    \ and supporting this biosphere with all of its complex dynamics will not only\
    \ impact the success of the current project but also all the projects to follow.\
    \ In the second half of this chapter, we review how and why we must strive to\
    \ be Soft-Aware (“soft-skill” aware) throughout development, by discussing\n \
    \  1. The dark side of teamwork\n   2. Supporting individuals\n   3. Supporting\
    \ the culture\n   4. Conflict as opportunity\n   5. Teamwork artifacts\n\n## Project\
    \ Planning\n\nProject plans are a great tool for setting down what you think you’re\
    \ doing, an outline of how it will be done, and how you plan on executing the\
    \ outline. The problem with a project plan is that, once it’s written and signed\
    \ off on, upper management thinks the project will run exactly as stated in the\
    \ plan. But the reality of the project often thwarts the plan.\n\nProject planning\
    \ is forever; it continues throughout the entire duration of the project. “The\
    \ Plan” is never really set in stone because typical software projects are usually\
    \ in constant flux. In those projects that are using a plan-driven process model,\
    \ a project plan is an actual document that is written by the project manager\
    \ and that is approved and signed off on by the development team and by upper\
    \ management. It is, in effect, a *contract*, albeit a rolling one, of what the\
    \ team is going to do and how they are going to do it. It says how the project\
    \ will be managed, and in the most extreme plan-driven projects, even states how\
    \ and when the document itself will be modified.\n\n### Project Planning: Organization\n\
    \nBefore work can begin, you need to decide how you are going to organize development.\
    \ If you’re working with an experienced team, you can reuse your previous organizational\
    \ documentation, but you should never skip this. The two main but often intertwined\
    \ sides of project organization are the development and the people:\n\n* How are\
    \ you going to *organize the product*? (Waterfall or iterative development? Version\
    \ control tools? Project scope and schedule?)\n* How are you going to *organize\
    \ the people* making this product? (What is the team organization/hierarchy? How\
    \ and when will everyone communicate and coordinate?)\n\nIt is crucial to have\
    \ explicit agreement and precise shared understanding of scheduling and expectations\
    \ across all stakeholders. Choosing a development process model (see previous\
    \ chapter) will provide many of the answers about how to organize your project.\
    \ For instance, any agile project will be focused around features and require\
    \ a schedule of iterations, each beginning with planning and culminating in a\
    \ minimum viable product. Agile teams are hierarchically flat and self-organizing,\
    \ with the team owning the agile project plan (not the project manager) and requiring\
    \ frequent communication on a variety of open channels. Agile teams also co-own\
    \ all code, thus requiring everyone to follow shared code-management practices,\
    \ such as `git-flow` branching for source control. Narrowing down the process\
    \ model from agile to a specific implementation (such as XP, Scrum, Crystal, feature-driven,\
    \ etc.) will further specify details of organizing both the product and the people."
