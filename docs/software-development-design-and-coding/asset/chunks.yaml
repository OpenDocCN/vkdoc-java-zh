  trans: '

    ## 精益原则一：消除浪费


    *精益*软件开发的主要目标是消除*浪费*，即任何不能为产品增值，或会增加其成本或时间的事物。在软件开发中，*浪费*的主要来源如下：


    *   *未完成的工作*，因为它无法立即创造价值，并且可能在完成之前就已过时

    *   *额外处理*，例如过多的文档/文书工作或不必要的会议

    *   *多余的功能*，这些功能很少（甚至从未）被使用，却占用资源并使代码变得混乱

    *   *任务/上下文切换*，这会因引入延迟并增加开发人员的认知负荷而降低效率

    *   *等待*审批和依赖项会造成浪费性的瓶颈

    *   *工件和信息*的*移动*，如果没有必要的规范来确保工件/数据的组织和标签清晰一致且可用，就会造成浪费

    *   *缺陷*，随着检测时间距离缺陷产生的时间越远，修复成本会越来越高


    在项目中减少各种浪费的一个通用方法是，持续反思团队的开发流程如何运作以及哪些方面可以改进（例如，“哪些是浪费的，我们如何改变它，以便下次减少浪费？”）。对工作流程进行小的迭代调整将导致整体开发*浪费*的减少。


    ## 精益原则二：内建质量


    质量问题会导致各种软件开发浪费。发现和记录缺陷、修复缺陷以及重新测试都会导致我们想要消除的浪费。“内建质量”指的是将质量直接关注并融入到软件开发流程中。


    有许多技术可以提高开发流程的质量。两种从源头提升代码质量的流行技术是*结对编程*（两名程序员遵循一组预定义的实践一起编码）和*测试驱动开发*（TDD）（以通过所有先前定义的测试用例为目标来编写软件）。两者都允许开发人员在代码集成到产品代码库之前快速编写、测试和修复代码，因为一旦集成，缺陷将更难发现和修复。一旦新功能完成就立即集成，可以让测试团队尽快获得产品的新版本进行测试，并缩短代码创建与测试之间的时间。另一种相对无痛但有些争议的提高代码质量的方法是：不要将发现的缺陷记录在缺陷跟踪系统中，而是*立即*修复它。一旦发现就修复。这既内建了质量，又同时消除了浪费。^(¹⁹)
    另一种提高软件质量的技术是*持续反馈*。促进这种反馈的一种方法是让客户成为开发团队的一部分，允许对新迭代的产品进行直接重复评估，并为开发人员提供关于哪些是合适的、哪些需要更改的关键及时反馈。


    ## 精益原则三：创造知识


    在处理需求、创建设计和实施代码的过程中，团队必然在学习新事物。你通过努力理解需求来学习。你通过从一个初始设计开始，并意识到随着需求被更好地理解，设计必须如何改变来学习。你会学到更多关于领域、客户、工具、依赖项等方面的知识。因此，你们正在共同创造体现在你们所编写和交付的代码中的知识。


    为了确保所有这些知识真正被“创造”（意味着它能长期留存，并允许团队通过保留这些知识真正地“学习”），一些短期实践是必要的。例如，如果一位团队成员学到了关于项目需求或依赖项的关键信息，他们必须确保这些信息可供团队其他成员使用。这可以通过一致的代码文档、组织良好的维基页面、依赖管理工具、有针对性的培训等来实现。总的来说，这些实践可以减少工件和信息的移动、额外处理，甚至缺陷。重点在于确保任何新信息不仅仅解决遇到它的人眼前的短期问题，而是真正转化为帮助整个团队提升其理解、技能和产品的知识。


    ## 精益原则四：延迟承诺


    这一精益原则实际上可以追溯到 20 世纪 70 年代初期以及自顶向下结构化设计的出现。延迟承诺意味着尽可能推迟决策（特别是不可逆转或影响重大的决策），并且只在绝对必要时才做出决策。


    延迟承诺的一种方法是遵循灵活、分层和模块化的设计。在自顶向下的设计中，你可以从问题解决方案的通用表述开始，增加未来的灵活性，并将实现决策推迟到设计和代码需要变得更详细的时候。创建库和
    API 可以让我们实现灵活的功能，而无需承诺其必须如何被调用，将这些决策留给每个功能的独立开发人员。这样，当你到达需要这些细节的层级时，通常可以获得更多信息，从而使代码能够更自然、更轻松地开发。


    ## 精益原则五：快速交付


    我们越快向客户交付价值，就能越早获得关键的客户反馈来指导未来的开发。此外，最小化从需求产生到交付满足这些需求的产品之间的时间，需求以及市场发生变化的时间也就越少。


    那么如何快速交付呢？*精益*地运用这些原则（双关语）。保持需求清晰简单。不要添加太多功能，也不要花时间预先规划未来的功能。不要过度设计解决方案。找到合理的方法、合理的数据结构集以及合理的算法来实现你的解决方案。记住，完美是优秀和快速的敌人。追求“满意”而非“优化”：如果它对当前需求是一个合适的解决方案，就继续前进。最后，快速交付的一个关键途径是拥有一个经验丰富、高度整合、善于合作、自我组织、相互尊重且具备适合你产品技能的团队。团队真的可以成就或毁灭一个产品。


    ## 精益原则六：尊重人


    尊重人是建立有凝聚力、高效团队的关键。核心理念是，做工作的人应该做决策。流程和产品创建的决策不应自上而下强加，而应来自一线。从管理者的角度来看，尊重你的团队意味着授权团队做出自己的决策，包括关于任务时间估算与分解、流程、工具和设计的决策。这种授权意味着管理者必须学会倾听他们的团队，并考虑他们的想法和关切。这也意味着管理者必须充当团队的促进者和保护者，让他们能够完成工作。大家必须共同努力，创造一个每个人都能畅所欲言、分歧能以相互尊重的方式解决的环境。这将创建一个具有开放沟通和决策透明度的团队。更多内容将在下一章讨论。

    '
- fmt: '## Lean Principle 7: Optimize the Whole


    > *“A lean organization optimizes the whole value stream, from the time it receives
    an order to address a customer need until software is deployed and the need is
    addressed. If an organization focuses on optimizing something less than the entire
    value stream, we can just about guarantee that the overall value stream will suffer.”*^([^(20)](#fn20))


    The main idea behind optimizing the whole is to keep the entire product picture
    in sight as you develop. One way to prevent myopic views is to have diverse, multi-disciplinary,
    well-communicating teams, which contain all the skills and product creation functions
    needed to deliver a product that truly meets the customer’s needs.


    ## Implementations of Software Development Models


    > *“When I read them, I want to shout, Draw me a map! Show me the way! But all
    the authors do is describe their footprints and talk about their shoes, which
    are always the best, the only true shoes.”*^([^(21)](#fn21))


    When it comes to implementing any software development model, there are endless
    accounts of general approaches, countless possible tweaks, and a cornucopia of
    books and other resources that aim to guide you through the process. Consequently,
    we do not aim to provide exhaustive nor prescriptive step-by-step implementation
    details. Instead, in this section, we review the most prominent implementations
    of the ideas presented earlier in this chapter. Our goal is to delineate the unique
    focal points of each approach, which we hope will not only help you distinguish
    them, but also hybridize them in order to better suit your team, project, organization,
    and client needs.


    ### The Waterfall Model: An Assembly-Line Approach


    The first and most traditional of the plan-driven process models is the waterfall
    model. Shown in Figure [2-2](#270563_3_En_2_Chapter.xhtml#Fig2), it was created
    in 1970 by Winston Royce^([^(22)](#fn22)) and addresses all the standard life
    cycle phases. It progresses nicely through requirements gathering and analysis,
    to architectural design, detailed design, coding, debugging, integration and system
    testing, release, and maintenance. It requires detailed documentation at each
    stage, along with reviews, archiving of the documents, sign-offs at each process
    phase, configuration management, and close management of the entire project.


    ![](images/270563_3_En_2_Chapter/270563_3_En_2_Fig2_HTML.jpg)


    A process flow diagram moves through conceptual development, requirement analysis,
    architectural design, detailed design, coding and debugging, system testing, and
    release and maintenance.


    Figure 2-2


    The Waterfall process model


    It also doesn’t work (at least not for anything beyond tiny projects). There are
    two fundamental and related problems with the *Waterfall* model that hamper its
    acceptance and make it very difficult to implement.


    **Problem 1:** *Waterfall* requires that you finish phase N before you move on
    to phase N+1.


    **Problem 2:** *Waterfall* has no provision for backing up to earlier stages for
    adjustments.


    *Waterfall* is fundamentally modelled like an assembly-line for developing software.
    The initially comforting straightforward progression through the waterfall stages
    requires that all steps be completed in order and, since there is no way to go
    back and rework earlier development phases, each phase must be completed perfectly.
    In the simplest example, this means that you must precisely nail down *all* your
    requirements before you start your architectural design, finish your coding and
    debugging before you start unit testing, and so on. Additionally, each phase must
    be thoroughly documented along the way. In theory, this would be great. In practice,
    however, this never happens. No doubt having the complete set of perfectly understood
    requirements would be ideal before diving into designing the system. Alas, we
    have never seen a project where all requirements were known from the start, or
    where these requirements were correctly understood by all stakeholders, or where
    big things didn’t change at some point during development of real-world projects
    with dynamic real-world needs and constraints.


    Consequently, finishing one phase before the next begins is problematic, not to
    mention ensuring that nothing was missed or otherwise requires updating in any
    of the preceding phases. You never know everything you need to know at exactly
    the time you need to know it. This is why software is a *wicked problem*.


    Nevertheless, the *Waterfall* is a terrific theoretical model. It isolates the
    different phases of the life cycle and forces you to think about what you really
    do need to know before you move on. It’s also a way to start thinking about very
    large projects, breaking them down into smaller phases, and giving managers a
    warm fuzzy mirage of a plan. It’s also a reasonable model for inexperienced teams
    working on a well-defined small project, because it leads them through the life
    cycle and clearly labels what’s happening at each stage. Most organizations that
    implement the *waterfall* model modify it to have the ability to back up one or
    more phases so that missed requirements or unsuitable design decisions can be
    fixed. This helps and generally makes the waterfall model usable, but the requirement
    to update all the involved documentation when you do back up makes even this version
    problematic.


    ### The Code and Fix “Model”: A Proto-Agile Approach


    Coding and fixing as you go is not a formal model, but it is what most of us do
    when we’re working on small projects by ourselves or maybe with a single partner.
    This code and fix “model”, depicted in Figure [2-3](#270563_3_En_2_Chapter.xhtml#Fig3),
    is often used in lieu of actual project management. In this approach there are
    no formal requirements, no required documentation, no quality assurance or formal
    testing, and release is haphazard at best. Don’t even think about effort estimates
    or schedules when using this model. And yet it is attractive enough and useful
    enough when we don’t need to coordinate with others.


    ![](images/270563_3_En_2_Chapter/270563_3_En_2_Fig3_HTML.jpg)


    A process flow diagram depicts the flow from conceptual development through coding
    and fixing and releasing the product. There is a loop in coding and fixing.


    Figure 2-3


    The code and fix process model


    “*Code and fix*” requires a minimal amount of time to understand the problem (usually
    because we made up the problem/requirements ourselves) and jump straight into
    coding. Compile your code and try it out. If it doesn’t work, fix the first problem
    you see and try it again. Continue this cycle of type-compile-run-fix until the
    program does what you want with no fatal errors and then ship it. We’ve all used
    it way more than once.


    Software created using this model will be small, short on user interface niceties,
    and idiosyncratic. With no real mention of configuration management, little in
    the way of testing, no architectural planning, and probably little more than a
    desk check of the program for a code review, this approach can be very dangerous
    for most software development. It is, however, good for one thing: quick, disposable,
    maintenance-free projects developed by tiny 1-2 person teams. In other words,
    for quick and dirty proofs-of-concept, such as to validate architectural decisions,
    show a quick version of a user interface design, or to understand some larger
    problem you’re working on. If this reminds you of a mini version of agile, you
    are not wrong. This approach is wildly flexible and allows us to iteratively gain
    insights from our progress toward the goal. For this reason, we consider *code
    and fix* to be the proto-agile model.'
  raw: '## Lean Principle 7: Optimize the Whole


    > *“A lean organization optimizes* *the whole value stream, from the time it receives
    an order to address a customer need until software is deployed and the need is
    addressed. If an organization focuses on optimizing something less than the entire
    value stream, we can just about guarantee that the overall value stream will suffer.”*^([^(20)](#fn20))


    The main idea behind optimizing the whole is to keep the entire product picture
    in sight as you develop. One way to prevent myopic views is to have diverse, multi-disciplinary,
    well-communicating teams, which contain all the skills and product creation functions
    needed to deliver a product that truly meets the customer’s needs.


    ## Implementations of Software Development Models


    > *“When I read them, I want to shout, Draw me a map! Show me the way! But all
    the authors do is describe their footprints and talk about their shoes, which
    are always the best, the only true shoes.”*^([^(21)](#fn21))


    When it comes to implementing any software development model, there are endless
    accounts of general approaches, countless possible tweaks, and a cornucopia of
    books and other resources that aim to guide you through the process. Consequently,
    we do not aim to provide exhaustive nor prescriptive step-by-step implementation
    details. Instead, in this section, we review the most prominent implementations
    of the ideas presented earlier in this chapter. Our goal is to delineate the unique
