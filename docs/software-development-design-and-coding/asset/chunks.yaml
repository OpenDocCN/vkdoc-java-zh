  trans: '

    ## 精益原则七：优化整体


    > *“精益组织会优化整个价值流，从收到满足客户需求的订单开始，直至软件部署并满足需求为止。如果一个组织只专注于优化价值流中的某个环节，那么几乎可以肯定，整个价值流都会受损。”*^(²⁰)


    优化整体的核心理念是，在开发过程中始终着眼于整个产品图景。避免短视的方法之一是组建多元化、跨学科、沟通顺畅的团队，该团队应具备交付真正满足客户需求的产品所需的所有技能和产品创建职能。


    ## 软件开发模型的实现


    > *“当我阅读这些内容时，我想大喊：给我画张地图！给我指条路！但所有作者所做的只是描述他们的足迹，谈论他们的鞋子，而这些鞋子总是最好的，是唯一真正的鞋子。”*^(²¹)


    在实现任何软件开发模型时，关于通用方法的描述数不胜数，可能的调整方式不计其数，还有大量书籍和其他资源旨在指导你完成整个过程。因此，我们的目标并非提供详尽无遗或规定性的逐步实现细节。相反，在本节中，我们将回顾本章前面所提出理念的最著名实现。我们的目标是勾勒出每种方法的独特关注点，希望这不仅能帮助你区分它们，还能让你将它们混合使用，以更好地适应你的团队、项目、组织和客户需求。


    ### 瀑布模型：一种流水线方法


    计划驱动流程模型中最传统、最早出现的是瀑布模型。如图 2-2 所示，该模型由温斯顿·罗伊斯于 1970 年创建^(²²)，涵盖了所有标准生命周期阶段。它依次经过需求收集与分析、架构设计、详细设计、编码、调试、集成与系统测试、发布和维护。它要求每个阶段都有详细的文档，以及评审、文档归档、每个流程阶段的签核、配置管理和整个项目的严密管理。


    ![](img/270563_3_En_2_Fig2_HTML.jpg)


    一个流程流程图，展示了从概念开发、需求分析、架构设计、详细设计、编码与调试、系统测试，到发布和维护的流程。


    图 2-2


    瀑布流程模型


    它同样行不通（至少对于小型项目以外的项目来说是这样）。*瀑布*模型存在两个根本性的相关问题，阻碍了它的接受度，并使其难以实施。


    **问题 1：** *瀑布*模型要求你在完成阶段 N 之后才能进入阶段 N+1。


    **问题 2：** *瀑布*模型没有提供回溯到早期阶段进行调整的机制。


    *瀑布*模型从根本上来说，就像一条用于开发软件的流水线。最初令人安心的瀑布阶段顺序推进要求所有步骤按顺序完成，并且由于无法返回并返工早期的开发阶段，每个阶段都必须完美完成。举个最简单的例子，这意味着你必须在开始架构设计之前精确确定*所有*需求，在开始单元测试之前完成编码和调试，以此类推。此外，每个阶段都必须有详尽的文档记录。理论上，这很棒。然而在实践中，这从未实现过。毫无疑问，在开始设计系统之前，拥有完整且被完美理解的需求集是理想的。可惜的是，我们从未见过一个项目从一开始就明确了所有需求，或者所有利益相关者都正确理解了这些需求，或者在具有动态现实需求和约束的实际项目开发过程中，重大事项没有发生改变。


    因此，在一个阶段开始之前完成上一个阶段是有问题的，更不用说确保在前面的任何阶段中没有遗漏任何内容或需要更新了。你永远无法在你需要知道的时候，确切地知道你需要知道的一切。这就是为什么软件是一个*棘手的问题*。


    尽管如此，*瀑布*模型仍然是一个出色的理论模型。它将生命周期的不同阶段隔离开来，迫使你在继续前进之前思考你真正需要知道什么。它也是一种开始思考大型项目的方法，将其分解为更小的阶段，并为管理者提供一个令人感到温暖而模糊的计划幻象。对于在定义明确的小型项目上工作的经验不足的团队来说，它也是一个合理的模型，因为它引导他们经历生命周期，并清晰地标明每个阶段发生了什么。大多数实施*瀑布*模型的组织都会对其进行修改，使其能够回溯一个或多个阶段，以便修复遗漏的需求或不合适的设计决策。这有所帮助，通常使瀑布模型变得可用，但回溯时更新所有相关文档的要求，即使这种版本也存在问题。


    ### 编码与修复“模型”：一种原型敏捷方法


    边编码边修复并不是一个正式的模型，但这是我们在独自或与一个伙伴进行小型项目时大多数人所采用的方式。这种编码与修复“模型”，如图 2-3 所示，常常被用来替代实际的项目管理。在这种方法中，没有正式的需求，没有必需的文档，没有质量保证或正式测试，发布充其量也只是随意的。使用此模型时，甚至不要考虑工作量估算或进度安排。然而，当我们不需要与他人协调时，它又足够有吸引力且有用。


    ![](img/270563_3_En_2_Fig3_HTML.jpg)


    一个流程流程图，展示了从概念开发，到编码、修复和发布产品的流程。在编码和修复之间存在一个循环。


    图 2-3


    编码与修复流程模型


    “*编码与修复*”只需要最少的时间来理解问题（通常是因为我们自己编造了问题/需求），然后直接跳入编码。编译你的代码并尝试运行。如果它不工作，修复你看到的第一个问题，然后再次尝试。继续这个“输入-编译-运行-修复”的循环，直到程序按照你的意愿运行且没有致命错误，然后发布它。我们都用过这种方法不止一次。


    使用此模型创建的软件规模小，用户界面不够友好，且具有特殊性。由于没有真正提及配置管理，测试方面也做得很少，没有架构规划，可能对程序进行的代码审查也仅限于桌面检查，这种方法对于大多数软件开发来说可能非常危险。然而，它有一件事做得很好：由
    1-2 人小团队开发的快速、一次性、无需维护的项目。换句话说，适用于快速而粗糙的概念验证，例如验证架构决策、快速展示用户界面设计版本，或理解你正在处理的某个更大的问题。如果这让你想起了敏捷的迷你版本，那你的想法没错。这种方法极其灵活，允许我们迭代地从向目标迈进的过程中获得洞察。因此，我们认为*编码与修复*是原型敏捷模型。

    '
- fmt: '### Agile Development Implementations


    > *The best practice is to iterate and deliver incrementally, treating each iteration
    as a closed-end “mini-project,” including complete requirements, design, coding,
    integration, testing, and internal delivery. On the iteration deadline, deliver
    the (fully-tested, fully-integrated) system thus far to internal stakeholders.
    Solicit their feedback on that work, and fold that feedback into the plan for
    the next iteration.*

    >

    > *(From “How Agile Projects Succeed”*^([^(23)](#fn23))*)*


    *Agile* development is all about adaptability, which can take on many different
    forms depending on the project scope and timeline, the development team, and so
    on. **Applying** ***agile*** **development prescriptively will break the very
    agility of** ***agile*****.** Thus, although a number of specific *agile* approaches
    have been devised over the years, it is important to remain flexible in their
    understanding and implementation. Below, we discuss a number of these implementations,
    highlighting their core values and the accompanying nomenclature intended to help
    developers lean into these values.


    Agile processes all aim to provide agility during software development, but how
    that agility is achieved can differ widely. As you read about each agile implementation,
    keep the following key differences in mind and consider the remaining specifications
    to be descriptive but non-prescriptive guidelines for how one might approach operationalizing
    each approach:


    * eXtreme Programming delivers agility by prioritizing specific software engineering
    practices (in particular, pair programming and constant integration).

    * Crystal delivers agility by prioritizing people and their interactions, allowing
    each team to self-organize as they see fit.

    * Scrum delivers agility through explicit short iterations (“sprints”) that deliver
    product increments, although what is “short” depends on the scope of the project.

    * Kanban delivers agility through a continuous flow of tasks from being needed
    to done, where the remaining tasks can be altered and reprioritized at any time.


    ### Agile Methodology - eXtreme Programming (XP)


    Kent Beck and Ward Cunningham created eXtreme Programming (XP) around 1995, describing
    it as a “lightweight, efficient, low-risk, flexible, predictable, scientific,
    and fun way to develop software.”^([^(24)](#fn24)) XP focuses on productive technical
    development, particularly pair programming and constant integration.


    XP relies on the following fundamental ideas:


    * *Heavy customer involvement*: XP requires that a customer representative be
    on site at all times to define the content of each iteration of the product, as
    well as to create all the acceptance tests for each interim release.

    * *Short iteration cycles and frequent releases*: XP typically uses release cycles
    in the range of a few weeks or months and each release is composed of several
    iterations of 3-5 weeks each.

    * *Pair programming:* XP requires that all code be jointly written by pairs of
    developers, alternating as the driver and the navigator periodically (approximately
    every 30 minutes). The driver codes while the navigator watches, making suggestions,
    thinking about design and testing, and so on. While less code can be written in
    this way, the resulting code contains fewer defects, improving productivity.

    * *Continuous unit testing* (also known as Test-Driven Development or TDD): XP
    calls for developers to first write the unit tests for any new features and then
    develop these features in a way that passes the predefined tests.


    While all Agile approaches favor direct communication, XP extends this notion
    to direct coding communication (both with a coding partner and with the rest of
    the code) and to direct client communication. Frequent releases require constant
    integration and building of the product. Whenever a programming pair finishes
    a feature or task and it passes all their unit tests, they immediately integrate
    and build the entire product. They then use all the unit tests as a regression
    test suite to make sure the new feature hasn’t broken anything already checked
    in. If it does break something, they fix it immediately. So in an XP project,
    integrations and builds can happen several times a day. This process gives the
    team a good feel for where they are in the release cycle every day and gives the
    customer a completed build on which to run the acceptance tests. Having an on-site
    customer representative allows the XP team to get immediate feedback on new features
    and to uncover design and requirements issues early.


    Implementing XP may vary depending on the team and the project, but should involve
    some form of the following practices:


    * *The planning game*: Develop the scope of the next release by combining business
    priorities and technical estimates. The customer and the development team need
    to decide on the stories/features that will be included in the next release, the
    priority of each story, and timing of the release. The developers are responsible
    for breaking these stories into tasks and estimating the duration of each task.
    The sum of the durations will determine which tasks can get done by delivery date.
    If necessary, some stories are moved out of a release if the numbers don’t add
    up.

    * *Small releases*: Put a simple system into production quickly, and then release
    new versions on a very short cycle (1-2 months, with duration and size depending
    on what makes sense from a business perspective). The larger the release scope
    and duration, the harder it is to estimate.

    * *Metaphor*: “A simple shared story of how the whole system works,” which replaces
    your architecture. The metaphor must be a coherent explanation of the system,
    decomposable into smaller bits called *stories*. *Stories* should always be expressed
    in the vocabulary of the metaphor, and the language of the metaphor should be
    common to both the customer and the developers.'
  raw: "### Agile Development Implementations\n\n> *The best practice is to iterate\
    \ and deliver incrementally, treating each iteration as a closed-end “mini-project,”\
    \ including complete requirements, design, coding, integration, testing, and internal\
    \ delivery. On the iteration deadline, deliver the (fully-tested, fully-integrated)\
    \ system thus far to internal stakeholders. Solicit their feedback on that work,\
    \ and fold that feedback into the plan for the next iteration.*\n> \n> *(From\
    \ “How Agile Projects Succeed”*^([^(23)](#fn23))*)*\n\n*Agile* development is\
    \ all about adaptability, which can take on many different forms depending on\
    \ the project scope and timeline, the development team, and so on. **Applying**\
    \ ***agile*** **development prescriptively will break the very agility of** ***agile*****.**\
    \ Thus, although a number of specific *agile* approaches have been devised over\
    \ the years, it is important to remain flexible in their understanding and implementation.\
    \ Below, we discuss a number of these implementations, highlighting their core\
    \ values and the accompanying nomenclature intended to help developers lean into\
    \ these values.\n\nAgile processes all aim to provide agility during software\
    \ development, but how that agility is achieved can differ widely. As you read\
    \ about each agile implementation, keep the following key differences in mind\
    \ and consider the remaining specifications to be descriptive but non-prescriptive\
    \ guidelines for how one might approach operationalizing each approach:\n\n* \
    \  eXtreme Programming delivers agility by prioritizing specific software engineering\
    \ practices (in particular, pair programming and constant integration).\n\n* \
    \  Crystal delivers agility by prioritizing people and their interactions, allowing\
    \ each team to self-organize as they see fit.\n\n*   Scrum delivers agility through\
    \ explicit short iterations (“sprints”) that deliver product increments, although\
    \ what is “short” depends on the scope of the project.\n\n*   Kanban delivers\
    \ agility through a continuous flow of tasks from being needed to done, where\
    \ the remaining tasks can be altered and reprioritized at any time.\n\n#### Agile\
    \ Methodology - eXtreme Programming (XP)\n\nKent Beck and Ward Cunningham created\
    \ eXtreme Programming (XP) around 1995, describing it as a “lightweight, efficient,\
    \ low-risk, flexible, predictable, scientific, and fun way to develop software.”^([^(24)](#fn24))\
    \ XP focuses on productive technical development, particularly pair programming\
    \ and constant integration.\n\nXP relies on the following fundamental ideas:\n\
    \n*   *Heavy customer involvement*: XP requires that a customer representative\
    \ be on site at all times to define the content of each iteration of the product,\
    \ as well as to create all the acceptance tests for each interim release.\n\n\
    *   *Short iteration cycles and frequent releases*: XP typically uses release\
    \ cycles in the range of a few weeks or months and each release is composed of\
    \ several iterations of 3-5 weeks each.\n\n*   *Pair programming:* XP requires\
    \ that all code be jointly written by pairs of developers, alternating as the\
    \ driver and the navigator periodically (approximately every 30 minutes). The\
    \ driver codes while the navigator watches, making suggestions, thinking about\
    \ design and testing, and so on. While less code can be written in this way, the\
    \ resulting code contains fewer defects, improving productivity.\n\n*   *Continuous\
    \ unit testing* (also known as Test-Driven Development or TDD): XP calls for developers\
    \ to first write the unit tests for any new features and then develop these features\
    \ in a way that passes the predefined tests.\n\nWhile all Agile approaches favor\
    \ direct communication, XP extends this notion to direct coding communication\
    \ (both with a coding partner and with the rest of the code) and to direct client\
    \ communication. Frequent releases require constant integration and building of\
    \ the product. Whenever a programming pair finishes a feature or task and it passes\
    \ all their unit tests, they immediately integrate and build the entire product.\
    \ They then use all the unit tests as a regression test suite to make sure the\
    \ new feature hasn’t broken anything already checked in. If it does break something,\
    \ they fix it immediately. So in an XP project, integrations and builds can happen\
    \ several times a day. This process gives the team a good feel for where they\
    \ are in the release cycle every day and gives the customer a completed build\
    \ on which to run the acceptance tests. Having an on-site customer representative\
    \ allows the XP team to get immediate feedback on new features and to uncover\
    \ design and requirements issues early.\n\nImplementing XP may vary depending\
    \ on the team and the project, but should involve some form of the following practices:\n\
    \n*   *The planning game*: Develop the scope of the next release by combining\
    \ business priorities and technical estimates. The customer and the development\
    \ team need to decide on the stories/features that will be included in the next\
    \ release, the priority of each story, and timing of the release. The developers\
    \ are responsible for breaking these stories into tasks and estimating the duration\
    \ of each task. The sum of the durations will determine which tasks can get done\
    \ by delivery date. If necessary, some stories are moved out of a release if the\
    \ numbers don’t add up.\n\n*   *Small releases*: Put a simple system into production\
    \ quickly, and then release new versions on a very short cycle (1-2 months, with\
    \ duration and size depending on what makes sense from a business perspective).\
    \ The larger the release scope and duration, the harder it is to estimate.\n\n\
    *   *Metaphor*: “A simple shared story of how the whole system works,” which replaces\
    \ your architecture. The metaphor must be a coherent explanation of the system,\
    \ decomposable into smaller bits called *stories*. *Stories* should always be\
    \ expressed in the vocabulary of the metaphor, and the language of the metaphor\
    \ should be common to both the customer and the developers."
  trans: '

    ### 敏捷开发实践


    > *最佳实践是迭代式增量交付，将每次迭代视为一个封闭的“迷你项目”，包含完整的需求、设计、编码、集成、测试和内部交付。在迭代截止日期，向内部利益相关者交付迄今为止（经过全面测试、全面集成）的系统。征求他们对这项工作的反馈，并将该反馈纳入下一次迭代的计划中。*

    >

    > *（摘自《敏捷项目如何成功》*^(²³)*）*


    *敏捷*开发的核心在于适应性，根据项目范围、时间线、开发团队等因素的不同，其表现形式也多种多样。**教条式地应用** ***敏捷*** **开发会破坏**
    ***敏捷*** **本身的灵活性。** 因此，尽管多年来已经设计出许多具体的*敏捷*方法，但在理解和实施过程中保持灵活性至关重要。下文将讨论其中几种实践，重点介绍它们的核心价值以及旨在帮助开发者践行这些价值的配套术语。


    所有敏捷流程都旨在为软件开发过程提供敏捷性，但实现敏捷性的方式可能大相径庭。在阅读每种敏捷实践时，请牢记以下关键区别，并将其余规范视为描述性而非规定性的指南，用以说明如何将每种方法付诸实践：


    *   **极限编程** 通过优先采用特定的软件工程实践（特别是结对编程和持续集成）来提供敏捷性。

    *   **水晶方法** 通过优先考虑人员及其互动来提供敏捷性，允许每个团队自行组织他们认为合适的方式。

    *   **Scrum** 通过明确的短周期迭代（“冲刺”）来交付产品增量，从而提供敏捷性，但“短”的定义取决于项目范围。

    *   **看板方法** 通过任务从“待办”到“完成”的持续流动来提供敏捷性，其中剩余任务可以随时更改和重新排序优先级。


    #### 敏捷方法论 - 极限编程 (XP)


    肯特·贝克和沃德·坎宁安大约在 1995 年创建了极限编程（XP），将其描述为一种“轻量级、高效、低风险、灵活、可预测、科学且有趣的软件开发方式”。^(²⁴)
    XP 侧重于高效的技术开发，特别是结对编程和持续集成。


    XP 依赖于以下基本理念：


    *   **重度客户参与**：XP 要求始终有一名客户代表在场，以定义产品每次迭代的内容，并为每个中间版本创建所有验收测试。

    *   **短迭代周期与频繁发布**：XP 通常使用几周或几个月的发布周期，每个发布由若干次迭代组成，每次迭代持续 3-5 周。

    *   **结对编程**：XP 要求所有代码由两名开发者共同编写，定期（大约每 30 分钟）交替担任“驾驶员”和“领航员”角色。“驾驶员”负责编码，而“领航员”则在一旁观察，提出建议，思考设计和测试等。虽然这种方式编写的代码量可能较少，但生成的代码缺陷更少，从而提高了生产力。

    *   **持续单元测试**（也称为测试驱动开发或 TDD）：XP 要求开发者首先为任何新功能编写单元测试，然后以通过预定义测试的方式开发这些功能。


    虽然所有敏捷方法都推崇直接沟通，但 XP 将这一理念扩展到了直接的编码沟通（既包括与结对伙伴的沟通，也包括与其余代码的沟通）以及直接的客户沟通。频繁发布需要持续集成和构建产品。每当一个编程结对完成一个功能或任务，并且该功能或任务通过了所有单元测试，他们就会立即集成并构建整个产品。然后，他们使用所有单元测试作为回归测试套件，以确保新功能没有破坏任何已检入的代码。如果确实破坏了某些东西，他们会立即修复。因此，在
    XP 项目中，集成和构建一天可能发生多次。这个过程让团队每天都能很好地了解自己在发布周期中的位置，并为客户提供一个可以运行验收测试的已完成构建。拥有现场客户代表使得
    XP 团队能够立即获得对新功能的反馈，并及早发现设计和需求问题。


    实施 XP 可能因团队和项目而异，但应涉及以下某些形式的实践：


    *   **计划游戏**：结合业务优先级和技术评估来确定下一个发布的范围。客户和开发团队需要决定下一个发布中将包含哪些故事/功能、每个故事的优先级以及发布时间。开发者负责将这些故事分解为任务，并估算每个任务的持续时间。持续时间的总和将决定哪些任务能在交付日期前完成。如果数字对不上，必要时会将一些故事移出发布。

    *   **小型发布**：快速将一个简单的系统投入生产，然后在非常短的周期内发布新版本（1-2 个月，持续时间和规模取决于从业务角度看是否合理）。发布的范围和持续时间越大，估算就越困难。

    *   **隐喻**：“一个关于整个系统如何运作的简单共享故事”，它取代了你的架构。隐喻必须是对系统的一致解释，并可分解为称为*故事*的更小片段。*故事*应始终使用隐喻的词汇来表达，并且隐喻的语言应为客户和开发者所共同理解。

    '
- fmt: '*   *Simple design*: Keep the design as simple as you can each day. Redesign
    often to keep it simple. According to Beck, a simple design (1) runs all the unit
    tests, (2) has no duplicated code, (3) expresses what each story means in the
    code, and (4) has the fewest number of classes and methods that make sense to
    implement the stories so far.^([^(25)](#fn25))


    *   *Testing*: Programmers constantly write unit tests. Tests must all pass before
    integration. Beck takes the hard line that “Any program feature without an automated
    test simply doesn’t exist.”^(21) Although this works for most acceptance tests
    and should certainly work for all unit tests, this analogy breaks down in some
    instances, notably in testing the user interface in a GUI. Even this can be made
    to work automatically if your test framework can handle the events generated by
    a GUI interaction. Beyond this, having a good set of written instructions will
    normally fill the bill.


    *   *Pair programming*: Two programmers at one machine must write all production
    code in an XP project. Any code written alone is thrown away. This has the effect
    of reinforcing collective ownership by spreading the knowledge of the entire system
    around the entire team. It avoids the “beer truck problem,” where the person who
    knows everything gets hit by a beer truck and thus sets the project schedule back
    months.


    *   *Collective ownership*: The team owns the entire project and all of its code,
    sharing the reasonability for designing, writing, altering, and testing all features.
    This supports “ego-less programming,” promoting effective teamwork.


    *   *Continuous integration*: Integrate and build every time a task is finished,
    possibly several times a day (as long as the tests all pass). This helps to quickly
    detect and isolate bugs and defects by narrowing issues to the latest code and
    its interactions with the existing code base.


    *   *Refactoring*: Make small improvements of non-functional aspects of the code
    without changing its external behavior in order to make the code cleaner, less
    redundant, more readable, more efficient, and more maintainable. The principle
    of *simple design* imposes on you the responsibility to make refactoring changes
    when you see they are needed, while *collective ownership* allows you to refactor
    code written by others.


    *   *40-hour week*: Work a regular 40-hour week. Never work a second week in a
    row with overtime. The XP philosophy has a lot in common with many of Tom DeMarco’s
    *Peopleware* arguments. People are less productive working overtime, having to
    handle personal affairs during the workday, being tired and making more mistakes,
    being stressed and irritable with their teammates, and so on. Having time to relax
    and recharge allows developers to focus on their work during the work day, making
    the team more productive.


    *   *On-site customer*: A customer is part of the team, is on-site, writes and
    executes functional tests, and helps clarify requirements. The customer’s ability
    to give immediate feedback to changes in the system also increases team confidence
    that they are building the right system every day.


    *   *Coding standards*: Because of collective code ownership and ongoing refactoring,
    the team must follow sensible coding standards to improve communication in and
    out of the code base. These standards should make your code easier to read and
    maintain but should not constrict creativity.


    ### Agile Framework - Crystal: Flexible Customization to Team/Project Needs


    Crystal is an agile method originally devised by Alistair Cockburn^([^(26)](#fn26))
    while he was working at IBM in the early 1990s. He noticed that projects vary
    too much for any one set of project steps to suit them all. Instead, Crystal is
    thus organized around the people rather than around processes or tools. This means
    human interactions, as well as individual skills, talents, and needs, all of which
    are variable across teams, as well as within teams over time.


    As we are not focusing on specific processes, Crystal has no formal structure.
    Instead, Crystal development believes the following:


    *   *All projects are unique*. Tools and processes need to be determined for each
    project, as well as adapted if/when changes occur.


    *   *Teams can self-optimize*. Tools and processes need to work for the project
    but also for the team, thus teams themselves should jointly determine the workflow
    that will work best for them, as well as adjust it as needed during development.


    To support these characteristics, Crystal development is organized around the
    following 7 principles:


    *   *Frequent delivery*: Frequent (a relative term depending on project overall
    scope) testing and new releases.


    *   *Reflective improvement*: The team will periodically reflect on and make improvements
    to practices and tools.


    *   *Osmotic communication*: Osmotic for small teams, closed loop for larger teams.


    *   *Personal safety*: Create an environment where members feel safe to express
    their opinions, suggestions, and needs.


    *   *Focus*: Team members need a shared understanding of the big picture and of
    the individual tasks.


    *   *Easy access to expert users*: On-demand access to experts to resolve questions,
    concerns, or gaps in understanding.


    *   *Technical environment with automated tests, configuration management, and
    frequent integration*: When organizing around people, there is a lot of development
    flexibility, so frequently integrating everyone’s work, automatically testing
    to ensure everything works individually and together smoothly, and using version
    control for backup and partial releases is paramount.


    You can see that Crystal is very flexible and thus can be adapted to the needs
    of each team and project. For shorter projects, Crystal’s reduced organizational
    scaffolding and required processes can be beneficial, as it allows focus on how
    the specific team can accomplish the required work. The main caveat here is that
    if the team is newer, larger, or remote, self-organization can get tricky.'
