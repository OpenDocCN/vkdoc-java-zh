    #### 行为模式 2：观察者模式


    我们的一位同事非常喜欢 NPR 的广播节目《全民话题：科学星期五》（简称 *SciFri*）（[`http://sciencefriday.com`](http://sciencefriday.com)），但节目播出时他几乎没时间收听，因为播出时间是每周五美国东部时间下午
    2:00 到 4:00。他订阅了 SciFri 的播客，因此每周六早上，当他收到新的播客剧集时，就可以在修剪草坪时用 iPhone 收听。如果他对 *SciFri*
    感到厌倦了，只需取消订阅，就不会再收到新的播客了。亲爱的读者，这就是*观察者模式*。


    根据“四人帮”的定义，*观察者模式*“……定义了对象之间的一对多依赖关系，这样当一个对象改变状态时，其所有依赖者都会收到通知并自动更新。”^(²²³) 在这个
    SciFri 的例子中，NPR 是 SciFri 播客的“发布者”，而我们所有“订阅”（或注册）该播客的人都是观察者。你等待 SciFri 的状态发生变化（创建新的播客剧集），然后发布者会自动更新你。更新的方式因两种不同类型的观察者而异：推模型和拉模型。在*推模型观察者*中，发布者（在面向对象术语中也称为主题）改变状态，然后将新状态*推送*给所有观察者。在*拉模型观察者*中，主题改变状态，但直到观察者请求时才提供完整更新；观察者从主题*拉取*更新。在*拉模型*的一种变体中，主题可能会向所有观察者提供最小更新，通知它们状态已改变，但观察者仍需请求新状态的详细信息。


    使用观察者模式时，你需要一个主题接口，以便主题、观察者和客户端都能识别它们所使用的状态接口。你还需要一个观察者接口，该接口仅说明如何更新观察者。然后，发布者将实现主题接口，而不同的“监听器”将实现观察者接口。图
    13-9 描绘了这些关系。


    ![](img/270563_3_En_13_Fig9_HTML.jpg)


    一个 UML 图展示了一组以循环方式连接的类。这些类分别是主题、观察者、具体观察者和具体主题。


    图 13-9


    经典的观察者模式^(²²⁴)


    客户端类未在图中显示，但它将同时使用 `ConcreteSubject` 和 `ConcreteObserver` 类。以下是所有这些类的*推模型*版本的简单实现。请记住，这是*推模型*，因为
    `ConcreteSubject` 对象会通知所有*观察者*，无论它们是否请求通知。


    首先，创建主题接口，该接口说明如何注册、移除和通知观察者：


    ```

    public interface Subject {

    public void addObserver(Observer obs);

    public void removeObserver(Observer obs);

    public void notifyAllObservers();

    }

    ```


    接下来，编写主题接口的实现。这个类是真正的发布者，因此它还需要构成主题状态的属性。在这个简单版本中，你使用一个 `ArrayList` 来保存所有观察者。


    ```

    import java.util.ArrayList;

    public class ConcreteSubject implements Subject {

    private ArrayList observerList;

    // 这两个变量是我们的状态

    private int subj_id;

    private String msg;

    public ConcreteSubject() {

    observerList = new ArrayList();

    this.subj_id = 0;

    this.msg = "Hello";

    }

    public void addObserver(Observer obs) {

    observerList.add(obs);

    }

    public void removeObserver(Observer obs) {

    observerList.remove(obs);

    }

    public void notifyAllObservers() {

    for (Observer obs: observerList) {

    obs.update(this.subj_id, this.msg);

    }

    }

    public void setState(int foo, String bar) {

    this.subj_id = subj_id;

    this.msg = msg;

    notifyAllObservers();

    }

    }

    ```


    接下来，编写观察者接口，该接口说明如何更新你的 `Observers`：


    ```

    public interface Observer {

    public void update(int obs_id, String msg);

    }

    ```


    然后，编写 `Observer` 接口的实现：


    ```

    public class ConcreteObserver implements Observer {

    private int obs_id;

    private String msg;

    Subject subj;

    /**

    * ConcreteObserver 类的构造函数

    */

    public ConcreteObserver(Subject subj) {

    this.subj = subj;

    subj.addObserver(this);

    }

    public void update(int obs_id, String msg) {

    this.obs_id = obs_id;

    this.msg = msg;

    show();

    }

    private void show() {

    System.out.printf("Id = %d Msg = %s\n", this.obs_id, this.msg);

    }

    }

    ```


    最后，编写驱动程序，创建发布者和每个观察者，并将它们组合在一起：


    ```

    public class ObserverDriver {

    public static void main(String [] args) {

    ConcreteSubject subj = new ConcreteSubject();

    ConcreteObserver obj = new ConcreteObserver(subj);

    subj.setState(12, "Monday");

    subj.setState(17, "Tuesday");

    }

    }

    ```


    执行驱动程序的输出（全部来自 `ConcreteObserver` 对象中的 `show()` 方法）将如下所示：


    ```

    Id = 12 Msg = Monday

    Id = 17 Msg = Tuesday

    ```


    在许多方面，观察者模式的工作方式类似于 Java 事件接口。在 Java 中，你创建一个类，将其注册为特定事件类型的“监听器”（观察者）。你还需要创建一个方法，该方法作为实际的观察者，并在事件发生时做出响应。当该类型的事件发生时，Java
    事件对象（主题）会通过调用你编写的方法来通知你的观察者，并将事件中的数据传递给观察者方法；Java 事件使用观察者模式的*推模型*。


    例如，如果你在 Java 程序中创建一个 `Button` 对象，你可以使用 `Button` 对象的 `addActionListener()` 方法来注册以观察
    `ActionEvents`。当 `ActionEvent` 发生时，所有 `ActionListeners` 都会通过调用名为 `actionPerformed()`
    的方法得到通知。这意味着你的 `Button` 对象必须实现 `actionPerformed()` 方法来处理该事件。

