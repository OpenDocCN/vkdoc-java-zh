  trans: '

    *串行*：所有棋盘在房间里一字排开，国际象棋大师坐在第一张桌子前开始对弈。一局棋下完后，大师再移动到下一张桌子进行下一局。如果每局棋耗时 10 分钟，那么总共需要
    100 分钟。如果每局结束后大师从一个桌子移动到下一个桌子需要大约 6 秒，那么总共还需要大约 1 分钟（准确说是 54 秒，我们稍微取整），合计 101
    分钟。还不错。


    *并发*：棋盘和棋手同样一字排开，但在这个版本中，大师每张桌子只走一步棋。大师坐在第一张桌子前，用 6 秒走出第一步，然后立即移动到下一位棋手处走出下一步的第一步。大师在桌子间移动仍然需要
    6 秒。如此持续，直到一分钟后（6*10 秒），大师回到第一张桌子走第二步。假设每局棋仍然需要总共 10 分钟，与串行对弈相同，那么我们需要知道大师需要绕所有桌子走多少轮。如果每位本地棋手走一步需要大约
    50 秒，那么每完成一步棋需要 50 + 6 = 56 秒（棋手走棋 50 秒，加上大师走棋 6 秒）。每局棋需要 10 分钟即 600 秒，因此 600
    秒/每步 56 秒 ≈ 11 轮，大师即可完成全部 10 局棋。总时间等于所有本地棋手和大师走棋时间之和，加上大师在棋盘间移动的所有时间。这样计算得出总时间为
    11*56 + 11*6*10 = 616+660 秒 = 1,276 秒 = 21.27 分钟完成比赛。好多了。


    *并行*：假设象棋俱乐部想为活动增加一点竞争性，于是聘请了第二位国际象棋大师。有了两位大师，俱乐部组织者可以让每位大师只下 5 局棋。如果采用上述串行方法，那么每位大师会坐下，下完一整局，然后移动到下一张桌子。但这次，由于两局棋同时进行，比赛在原来一半的时间内完成，即
    101/2 = 50.5 分钟。更好，但不如并发方法。


    *并发*且*并行*：现在让两位大师同时进行各自的 5 局棋。每位大师用 6 秒走一步棋，再用 6 秒移动到下一张桌子。如果每局棋仍然需要 10 分钟，每位棋手仍然需要
    50 秒走一步，那么最终仍然需要 11 轮，但游戏间移动的总时间现在只需 30 秒（因为每位大师只负责 5 局棋）。这样计算得出 11*56 + 11*30
    = 616 + 330 = 946 秒 = 15.77 分钟完成整个比赛。这是四种不同比赛方式中最快的，因此创建并发程序并在并行机器上运行优于其他方案。


    请记住，**并发**是算法的一种属性，而**并行**是机器的一种属性。^(²²⁸)


    ## 并行架构：弗林分类法


    计算机科学家们认识到，50 多年来，并行性可用于提升性能并扩展大型问题的规模。在本节中，我们将探讨一些不同形式的并行机器，它们将帮助我们提升并发程序的性能。


    1966 年，迈克尔·弗林提出了一种针对不同类型计算机架构的分类法。^(²²⁹) 该分类法沿用至今，我们下面还将提及它的几个扩展。


    该分类法最初包含四种模型架构：


    *   *SISD – 单指令流，单数据流*：这是经典的单处理器冯·诺依曼计算机架构。机器一次运行一个程序，处理单一数据流。


    *   *MISD – 多指令流，单数据流*：该架构假设多个不同的程序将在同一数据流上执行，可能产生不同的结果。所有程序以锁步方式运行。采用此架构的机器非常罕见。一个可能的应用是尝试破解密码的机器，它在不同处理单元上同时运行多种不同的算法。


    *   *SIMD – 单指令流，多数据流*：这是最常见的架构之一。在该架构中，一个单一程序在不同处理器上运行，每个处理器使用不同的数据流。这些数据流可以是一个被分区的数据集，每个子集都需要执行相同的计算。例如，气象模型可以使用此架构来预测飓风路径。SIMD
    模型的一个特点是系统中所有机器以锁步方式运行相同的程序。由于所有机器同时运行相同的程序，SIMD 机器不适合提升并发程序的性能。


    *   *MIMD – 多指令流，多数据流*：这是最通用的架构，多个程序在不同机器上同时运行，每个程序使用不同的数据流。这些程序不需要以锁步方式运行，因此它们可以执行并发程序并提升性能。在
    21 世纪初，这是超级计算机最常见的模型。你的多核笔记本电脑或台式机系统也是 MIMD 机器。


    大约在 21 世纪初，这些模型又演变出另外两种变体。


    *SIMT – 单指令流，多线程*：这种执行模型以 SIMD 为基础，但允许每个指令流同时执行多个线程。该模型于 21 世纪中期提出，通常用于多核图形处理器。它对于数据流中存在大量冗余的应用非常有用，例如处理图形或视频数据。


    *SPMD – 单程序，多数据流*：这是当今一种常见的并行编程执行模型。它允许每个处理器独立执行程序，因此不与其它处理器同步，所有处理器处理不同的（可能是分区的）数据流。由于程序独立运行，它们可以利用程序中的并发部分来提升性能。尽管名称如此，SPMD
    是上述 MIMD 模型的一个子类别。


    ## 并行编程

