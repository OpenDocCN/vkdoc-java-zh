- fmt: '### Ethical Theory: Consequentialism (Teleological Theories)


    There is another way to reason about ethical situations, known as a *teleological
    theory*, which derives its name from the Greek word *telos*, meaning end or goal.
    Teleological theories focus only on the consequences of an act to determine if
    the act is good or bad,^([^(88)](#fn88)) for which they are also known as *consequentialism*.


    The classic form of consequentialism is called *utilitarianism*, developed by
    British philosophers Jeremy Bentham (1748-1832) and John Stuart Mill (1806-1873).
    Utilitarianism is based on the *Principle of Utility*, which says that an action
    is morally good or right to the extent that it increases the total happiness (or
    utility) of the affected parties. The action is morally wrong if it decreases
    the total happiness. Thus, utility is the tendency of an action to produce happiness
    (or prevent unhappiness) for an individual or a group of individuals or a community.^([^(89)](#fn89))
    An action might increase utility for some people and decrease it for others. This
    is the source of Mill’s aphorism “the greatest good for the greatest number.”


    Consequently, according to utilitarianism we must have a way to calculate the
    increase or decrease of happiness. This means we also need some common metric
    for how to measure happiness and we need to be able to calculate the total happiness
    or unhappiness of an action. This leads us to two variations on utilitarianism.


    *Act utilitarianism* is the theory that an act is good if its net effect (over
    all the affected people) is to produce more happiness than unhappiness. So act
    utilitarians apply the principle of utility to individual acts and all the morally
    significant people that they affect.


    For example, say the local county is considering replacing a stretch of very curvy
    highway with a straight stretch. We need to consider whether this is a good idea
    or not. In order to do this, we must figure out who is affected by this new construction
    (who are the stakeholders) and what effect will the construction have on them
    (what is the cost). Say that in order to construct the highway, the county must
    take possession of 100 homes that the highway will cut through. Thus, these property
    holders are stakeholders who will be compensated for their property. Also, say
    about 5,000 cars drive on the highway every day; these drivers are also stakeholders
    because the new road may make their commutes shorter, reducing their monetary
    and time expenditures. More broadly, there will be some kind of an environmental
    impact because of the new road, which must be calculated as well. If we use money
    as the measure of utility, then we can attempt to calculate the utility of building
    the road. Say that the homeowners are compensated with $20 million. On the other
    hand, say that the car drivers incur a savings of about $2 each or $10,000 per
    workday for using the road, there are 250 workdays a year and the road will last
    for 20 years. It costs the county $12 million to build the road and the environmental
    cost to animal species of lost habitat is calculated to be about $1 million. So
    the total costs for the highway are about $33 million and the benefit to the drivers
    is about $50 million. Following act utilitarianism, the action is good and the
    road should be built. Nevertheless, there are several problems with our calculations.
    We’ve not taken into account the unhappiness of the homeowners because some or
    all of them might not want to sell their homes. The impact on neighborhoods that
    may be divided by the new road is another cost. The cost of maintenance over 20
    years to the county is another, but the value of having fewer accidents on a straight
    road is a benefit.^([^(90)](#fn90)) So, it seems for act utilitarianism we need
    to take into account more consequences than just the costs involved in the proximate
    action. It is not practical and often not even feasible to perform this type of
    calculation on every ethical decision we have to make. Act utilitarianism also
    doesn’t take into account people’s innate sense of duty or obligation and how
    these are accounted for during ethical decisions. It also forces us to reduce
    all ethical decisions to a positive or negative outcome, many of which are not
    easily quantifiable. Finally, act utilitarianism leads us to the *problem of moral
    luck*, where, when faced with an ethical decision, you do not have complete control
    over all the factors that determine the ethical goodness or badness of an action.
    The example Quinn uses for moral luck is of a dutiful nephew who sends his bedridden
    aunt a bouquet of flowers, only to discover that she is allergic to one of the
    flower species in the bouquet and ends up even sicker. Since the consequences
    for the aunt were very negative, the action is morally bad, but the nephew’s intentions
    were good.^([^(91)](#fn91)) So what’s the answer? Maybe we need to make some changes.


    A variation of act utilitarianism is *rule utilitarianism*, which applies the
    principle of utility to general ethical rules instead of to individual actions.
    So we make the utilitarian calculation for a general ethical rule rather than
    for individual actions: “rule utilitarianism is the ethical theory that holds
    we ought to adopt those moral rules which, if followed by everyone, will lead
    to the greatest increase in happiness.”^([^(92)](#fn92)) There is that “greatest
    good for the greatest number” thing again. Let’s look at an example.'
