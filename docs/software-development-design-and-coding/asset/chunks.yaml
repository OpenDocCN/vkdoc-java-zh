  trans: "\n### 何时重构\n\n重构代码的时机、原因和技巧有很多。在《代码大全 2》中，史蒂夫·麦康奈尔列举了一些。^(²⁶⁹) 马丁·福勒在他的网站上给出了更长的列表。^(²⁷⁰)\
    \ 让我们看看重构代码的一些原因：\n\n*   *如果存在重复代码*，请记住 DRY（不要重复自己）原则；创建一个封装该代码的新方法，然后根据需要多次调用它。\n\
    \n*   *如果函数或方法过长*，它可能做了太多事情。一个函数或方法应该只做一件事，这样才能保持简短。通常，一个方法不应超过一个屏幕的高度；这大约在 24\
    \ 到 50 行之间。\n\n*   *如果类的内聚性差（不够紧密）*，它很可能做了不止一件事（有多个职责）；你应该将其拆分为两个或更多类。\n\n*  \
    \ *如果类接口没有呈现一致的抽象层次*。随着时间的推移，当你对类进行修改后，其接口可能会变得复杂且难以理解。这时就应该通过将方法移到其他类或合并方法来简化接口。\n\
    \n*   *形式参数列表有太多输入参数*，这意味着该方法仅用于将数据传输到另一个方法，或者它做了太多事情。无论哪种情况，都应该简化参数列表。\n\n* \
    \  *如果代码的修改需要并行修改多个类或模块*，那么你需要考虑重新组织数据和/或方法以简化结构。\n\n*   *如果一起使用的相关数据位于不同位置*（例如，总是用两个或多个数据来计算第三个数据，但输入数据却位于两个不同的地方），那么它们应该被移到同一个类中。\n\
    \n*   *如果一个方法使用其他类的特性多于使用自身类的特性*，也许它应该被移到那个其他类中。\n\n*   *如果使用方法调用链通过参数传递数据*（输入到某个方法的参数未被使用，只是传递给其他方法），你应该审视一下控制流，看看是否需要做出修改。\n\
    \n*   *如果中间人类本身不做任何事情*（即，一个主要工作只是调用另一个类中的方法的类），那么也许你可以消除这个中间人，直接调用那些方法。\n\n* \
    \  *如果实例变量是公开的*，你就打破了面向对象编程的基本理念之一：*信息隐藏*。对象中的所有实例变量都应该是私有的，通过公开的 getter 和 setter\
    \ 方法进行访问。^(²⁷¹)\n\n*   *如果子类只使用了其父类继承方法中的一小部分*，你可能需要重新思考当前的层次结构。正如麦康奈尔所说，“这通常表明创建该子类是因为父类恰好包含了它所需的例程，而不是因为该子类在逻辑上是父类的后代。考虑通过将子类与其父类的关系从‘是一个’（is-a）关系转变为‘有一个’（has-a）关系，以实现更好的封装；将父类转换为原子类的成员数据，并且只暴露原子类中真正需要的例程。”^(²⁷²)\n\
    \n*   *如果使用注释来解释过于混乱的代码*。俗话说，“不要为糟糕的代码写文档——重写它。”^(²⁷³) 此外，在重构代码时，始终要重新审视你的注释。\n\
    \n*   *如果代码使用了全局变量*。避免使用全局变量（或者至少非常谨慎地使用它们）。如果你在重构的代码中发现了全局变量，请仔细考虑它们，并看看是否可以通过参数将数据传递给方法来消除它们。全局变量很危险，因为它们可能导致副作用，即两个或多个对象试图更改全局变量的值，从而可能引发竞态条件。\n\
    \n*   *如果一个方法在调用另一个方法时需要进行设置或收尾代码*，请重新考虑你的类接口。假设你要向一个`CarParts`库存中添加一个条目，你的代码如下所示：\n\
    \n```\n    AddInventory transaction = new AddInventory();\n    transaction.setPartID(partID);\n\
    \    transaction.setPartName(partName);\n    transaction.setPartCost(partCost);\n\
    \    transaction.setDate(transactionDate);\n    ```\n\n然后你执行实际的添加操作：\n\n```\n\
    \    processAdd(transaction);\n    ```\n\n你可能会考虑，需要这种类型设置的方法调用是否使用了正确的抽象层次。为了消除设置代码并使代码更简单，你可以将`processAdd()`方法的形式参数列表改为如下形式：\n\
    \n```\n    processAdd(partID, partName, partCost, transactionDate);\n    ```\n"
- fmt: "### Types of Refactoring\n\nLet’s review some of the types of changes you\
    \ can make to improve your code:\n\n- **Replace a magic number with a named constant**.\
    \ Magic numbers are bad for a couple of reasons. First, if you use some magic\
    \ number more than once, and if you need to change it, then you have to change\
    \ the number in every line of code you’ve used it. Second, if someone comes along\
    \ after you, they may not know what the number means. Named constants allow you\
    \ to change the value of the number in only one place, and they give a hint as\
    \ to what the number means.\n\n- **Rename a variable with a name that is more\
    \ informative**. Always try to keep things brief but meaningful (with the exceptional\
    \ of occasional basic loop iterators such as `i`, `j`, `k`, etc.).\n\n- **Replace\
    \ variables with expressions**. Examine cases where you may be creating unnecessary\
    \ intermediate variables that are only used to arrive at the overall answer. Check\
    \ if you can skip creating these variables, instead using their formula or expression\
    \ directly in expression for the overall answer.\n\n- **Replace expressions with\
    \ methods**. If you have an expression that might be duplicated in two or more\
    \ parts of the code, replace that expression with a single method and just call\
    \ the method. Again: DRY.\n\n- **Convert a variable that’s used for different\
    \ things into several variables each used for one thing**. Reusing a single variable\
    \ for two or more different purposes is confusing. Replace all the duplicates\
    \ with new variables with appropriate names to make the code more understandable.\n\
    \n- **Create a local variable instead of overusing an input parameter**. Repurposing\
    \ an input parameter in a method is also confusing. Create a dedicated local variable\
    \ instead; it’s just one more entry on the system stack.\n\n- **Create a class\
    \ instead of using a data primitive**. If you create a variable using a data primitive\
    \ type (say using `double` to create a variable called `money`) and if that variable\
    \ may need extra behaviors, then replace the primitive type with a class declaration.\n\
    \n- **Convert a set of named constants (type codes) into a class or an enumeration**.\
    \ Earlier we said that using magic numbers was bad and you should use named constants\
    \ instead. However, if you have a set of named constants that are related to each\
    \ other, you should consider putting them in a separate class or in an enumeration\
    \ type instead. It will make your code more maintainable and more readable.\n\n\
    - **Decompose a boolean expression into variables**. If you have a complex boolean\
    \ expression, you might consider separating the clauses into intermediate variables\
    \ and then combining the results at the end.\n\n- **Move a complex boolean expression\
    \ into a method that returns a boolean**. If your boolean expression is complex\
    \ and likely to be repeated elsewhere in the program, put it into a method that\
    \ evaluates the expression and returns a boolean result.\n\n- **Use `break` or\
    \ `return` instead of a boolean loop control variable**. Many times you’ll see\
    \ a `while` loop that looks something like:\n\n```\nboolean done = false;\nwhile\
    \ (!done) {\n    // do stuff here\n    if (some-expression)\n        done = true;\n\
    }\n```\n\nThis creates a bit of unnecessary work and the suggestion here is to\
    \ replace the `done = true;` with a `return` or a `break` statement.\n\n- **Return\
    \ from a method as soon as you know the answer**. This also means don’t use a\
    \ boolean or other variable to tell yourself you’ve found the return value from\
    \ a method. As soon as you know the answer, just return it.\n\n- **Move the code\
    \ from simple routines to where it is used**. If you have a method that contains\
    \ code that is only used in one place, just put the code inline where it is used\
    \ instead of having it in a method.\n\n- **Separate queries from calculations**.\
    \ Normally, a query operation will just return a value. If you have a method that\
    \ does both calculation and returns a value for a query (say something like `getAverage()`\
    \ or `getTotal()`), consider separating it into two methods, one to do the calculation\
    \ and one to do the query. This allows you to adhere to the “methods should just\
    \ do one thing” principle.\n\n- **Combine methods that are similar**. You may\
    \ have two different methods that differ only by a constant used in a calculation.\
    \ Consider consolidating those methods and making the constant an input parameter\
    \ instead.\n\n- **Move specialized code into its own class or subclass**. If you\
    \ have code that is only used by a subset of the instances of a superclass, then\
    \ move that code into its own class or subclass.\n\n- **Move similar code from\
    \ classes into a superclass**. On the other hand, if you have code in several\
    \ classes that is similar, then create a new superclass and move the code up into\
    \ it.\n\n- **Divide a class with multiple responsibilities into multiple classes**,\
    \ adhering to the Single Responsibility Principle.\n\n- **Delete a class**. If\
    \ you have a class that ends up not doing much (e.g., it only has a single method,\
    \ or it only contains data members), then consider moving that work into another\
    \ class.\n\n- **Encapsulate public instance variables**. If you have an instance\
    \ variable declared as `public`, convert it to `private` and create a getter method\
    \ to access it, obeying the information hiding principle.\n\n- **Only use `get()`\
    \ and `set()` methods when necessary**. By default, all instance variables should\
    \ be `private` and accessed via public setter and getter methods. Only create\
    \ `get()` methods for instance variables that need to be used outside the object\
    \ and only create `set()` methods when need to be able to change the value of\
    \ an instance variable. For example, if you have an instance variable for a part\
    \ number, you probably don’t need a `set()` method, because part numbers don’t\
    \ usually change.\n\n- **Hide public methods**. Only expose methods if they need\
    \ to be in the class’s interface. Just like with instance variables, all methods\
    \ should be `private` unless there’s a good reason to make them `public`.\n\n\
    - **Combine similar superclasses and subclasses** that are nearly identical by\
    \ consolidating them into a single class."
