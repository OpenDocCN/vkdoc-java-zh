    工厂方法模式还有另一种变体。考虑一下，在你的示例中，你只需要一个工厂。在这种情况下，你可以使用单例模式来生成工厂。这将改变你的 `SalesTaxFactory`
    和 `SalesTaxDriver` 类。它们最终会变成如下形式：


    ```

    public class SingletonTaxFactory  {

    /**

    * 我们将使用单例模式只创建一个 SalesTaxFactory

    * 为此，我们需要将构造函数设为私有，并创建一个

    * 变量来持有对 SalesTaxFactory 对象的引用。

    */

    // 这是将长期存在的实例

    private static SingletonTaxFactory uniqueInstance;

    // 私有构造函数——无法从外部访问

    private SingletonTaxFactory() {

    // 在此处执行初始化实例的操作

    }

    // 这是我们将用于创建实例的静态方法

    public static SingletonTaxFactory getInstance() {

    if (uniqueInstance == null) {

    uniqueInstance = new SingletonTaxFactory();

    }

    return uniqueInstance;

    }

    /**

    * 使用 getTax 方法获取 Tax 类型的对象

    */

    public SalesTax getTax(String location) {

    if(location == null) {

    return null;

    }

    if(location.equalsIgnoreCase("boston")) {

    return new BostonTax();

    } else if(location.equalsIgnoreCase("chicago")) {

    return new ChicagoTax();

    } else if(location.equalsIgnoreCase("stlouis"))  {

    return new StLouisTax();

    }

    return null;

    }

    }

    ```


    客户端代码变为以下形式：


    ```

    import java.io.*;

    import java.util.Scanner;

    public class SingletonTaxDriver {

    public static void main(String args[])throws IOException {

    Scanner stdin = new Scanner(System.in);

    /* 获取我们需要的唯一 SalesTaxFactory */

    SingletonTaxFactory salesTaxFactory = SingletonTaxFactory.getInstance();

    System.out.print("输入地点 (boston/chicago/stlouis): ");

    String location = stdin.nextLine();

    System.out.print("输入美元金额: ");

    double amount = stdin.nextDouble();

    SalesTax cityTax = salesTaxFactory.getTax(location);

    System.out.printf("地点 %s 的账单金额为 $%6.2f: ", location, amount);

    cityTax.getRate();

    cityTax.calculateTax(amount);

    }

    }

    ```


    ### 结构型模式


    结构型模式帮助你组合对象，以便更轻松地使用它们。它们关注的是将对象分组，并提供对象之间协调工作的方式，从而更轻松地完成任务。回想一下，组合、聚合、委托和继承都与结构和协调有关。我们在这里要介绍的第一个结构型模式是适配器模式，它完全是为了让类能够协同工作。'
- fmt: '#### Structural 1: The Adapter Pattern


    So here’s the problem: you’ve got a class `Foo` (the client) that wants to access
    another class or library or package, `Bar` (the target). The problem is that `Foo`
    is expecting a particular interface and that interface is different from the public
    interface that `Bar` presents to the world. What are you to do?


    You could rewrite `Foo` to change the interface it expects to conform to the interface
    that `Bar` is presenting. But if `Foo` is complex, or if it’s being used by other
    classes, that may not be a viable possibility. Alternatively, you could rewrite
    `Bar` to present the interface that `Foo` is expecting. But what if `Bar` is a
    commercial package and you don’t have the source code?


    That’s where the Adapter Design Pattern comes in.^([^(217)](#fn217)) You use the
    Adapter Pattern to create an intermediate class that wraps the target `Bar` interface
    inside a set of methods presenting the interface that client `Foo` is looking
    for. The Adapter Pattern will interface with client `Foo` on one side and with
    target `Bar` on the other, so the interface to `Bar` doesn’t have to change, and
    `Foo` users gets the interface they expects. Everyone is happy! Due to this wrapping
    functionality, the Adapter Pattern is also called the Wrapper pattern.^([^(218)](#fn218))
    See Figure [13-2](#270563_3_En_13_Chapter.xhtml#Fig2).


    ![](images/270563_3_En_13_Chapter/270563_3_En_13_Fig2_HTML.jpg)


    A flow diagram with three labeled shapes, such as a rectangle labeled foo at the
    top, an inverted triangle labeled adapter in the middle, and a circle labeled
    bar at the bottom.


    **Figure 13-2** The Adapter lets `Foo` use `Bar`


    There are two ways to implement adapters: 1) *class adapters* inherit from the
    target class and 2) *object adapters* use delegation to create the adapter. Note
    the difference: a *class adapter* is a subclass of an existing client class and
    implements the target’s interface; an *object adapter* is a subclass of a target
    class and delegate to an existing class. Figure [13-3](#270563_3_En_13_Chapter.xhtml#Fig3)
    is the graphic for a generic class adapter.


    ![](images/270563_3_En_13_Chapter/270563_3_En_13_Fig3_HTML.jpg)


    A UML diagram of the adapter design pattern illustrates the interaction between
    a client, a target interface, an adapter, and an adaptee.


    **Figure 13-3** A class adapter example


    Note that the `Adapter` class inherits from the `Adaptee` class and implements
    the same `Target` interface that the `Client` class uses. Here’s the code for
    this example:


    ```

    public class Client {

    public static void main(String [] args) {

    Target myTarget = new Adapter();

    System.out.println(myTarget.sampleMethod(12));

    }

    }

    public interface Target {

    int sampleMethod(int y);

    }

    public class Adapter extends Adaptee implements Target {

    public int sampleMethod(int y) {

    return myMethod(y);

    }

    }

    public class Adaptee {

    public Adaptee() {

    }

    public int myMethod(int y) {

    return y * y;

    }

    }

    ```


    The object adapter, on the other hand still implements the `Target` interface,
    but uses composition with the `Adaptee` class in order to accomplish the wrapping;
    it will look like this:


    ```

    public class Adapter implements Target {

    Adaptee myAdaptee = new Adaptee();

    public int sampleMethod(int y) {

    return myAdaptee.myMethod(y);

    }

    }

    ```


    In both cases, the `Client` doesn’t have to change! That’s the beauty of Adapter.
    You can change which `Adaptee` you’re using, by changing the `Adapter` and not
    the `Client`.


    #### Structural 2: The Façade Pattern


    As a second example of structural patterns, let’s try to simplify interfaces.
    Say you have a set of classes that constitute a subsystem. They could be individual
    classes that make up a more complex system or part of a large class library. Let’s
    also say that each of those classes in the subsystem has a different interface.
    Finally, let’s say that you want to write a client program that uses some or all
    of those classes. This would normally mean that to write the client program you’d
    need to learn all the interfaces of all the relevant classes in the subsystem
    in order to communicate with the subsystem and get your work done. A visual example
    is shown in Figure [13-4](#270563_3_En_13_Chapter.xhtml#Fig4).


    ![](images/270563_3_En_13_Chapter/270563_3_En_13_Fig4_HTML.jpg)


    A block flow diagram illustrates a hierarchical structure. It represents a client
    class at the top, with arrows pointing to multiple subsystem classes.


    **Figure 13-4** A client using several interfaces


    Clearly, this will make your client program complicated and very hard to maintain.
    This problem can be addressed using the Façade Pattern^([^(219)](#fn219)) Façade
    provides a single, simple, unified interface that makes it easier for your client
    to interact with the subsystem classes. When you use Façade, you learn a single
    interface and use it to interact with all the subsystem classes. A sample visual
    example of this is shown in Figure [13-5](#270563_3_En_13_Chapter.xhtml#Fig5).


    ![](images/270563_3_En_13_Chapter/270563_3_En_13_Fig5_HTML.jpg)


    A block flow diagram illustrates the facade design pattern. It represents a client
    connected to a facade box, which in turn is connected to multiple subsystem classes
    arranged in two levels.


    **Figure 13-5** A client using a Façade interface


    In addition to providing a single interface to use, the Façade Pattern also hides
    any interface changes or additions from the client. It’s a classic example of
    the *Principle of Least Knowledge* from Chapter [12](#270563_3_En_12_Chapter.xhtml).


    The Façade Pattern may look similar to the Adapter Pattern above, but they serve
    different purposes. The Adapter Pattern wraps a target interface and allows a
    client to use the interface it expects. The Façade simplifies one or more interfaces
    and presents that simplified interface for the client to use.


    For an example of the Façade Pattern, consider creating an online store and putting
    together a simple program to compute the total amount a customer would have to
    pay for an item they want to order. In this program, you would need to look up
    the item, compute the payment, compute the sales tax, compute the delivery charge,
    total all that up, and send it to the user. That will leave you with classes for
    `SalesTax`, `Delivery`, `Payment`, and `Inventory`. If you want to simplify the
    interface using Façade, you can create a new class, `Order`, that will hide the
    multiple interfaces and produce a simpler interface for a `Client` program to
    use. In UML, this would look like Figure [13-6](#270563_3_En_13_Chapter.xhtml#Fig6).


    ![](images/270563_3_En_13_Chapter/270563_3_En_13_Fig6_HTML.jpg)


    A UML diagram illustrates a business process with classes such as, client, order,
    delivery, and inventory. The classes are connected by arrows, and central concepts
    include sales tax and payment.


    **Figure 13-6** Façade example


    The code for this simple example might look as follows:'
