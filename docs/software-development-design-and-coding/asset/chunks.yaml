  trans: '

    ### 软·件开发：团队协作的阴暗面


    并非所有共同工作都能达到真正*团队协作*的程度，即有意义地支持和提升团队的整体产出。相反，开发过程和开发者常常会遭受不良团队协作带来的负面影响。让我们来看一些常见且会引发问题的具体行为示例：


    *   **基于社交舒适区做出工作决策**：只与同性别、同年龄段、同种族、同文化背景等的人沟通，可能会疏远他人，让他们觉得自己被排除在头脑风暴或决策之外。因为与某位队友没有私人交情就不主动与其合作，而不是努力去理解摩擦的根源，这只会让问题恶化。避免与那些不主动发言的开发者交谈，会加剧不必要的孤立。我们付出一点努力，就可能极大地提升他人感受到的舒适感、归属感和自主权。基于当前任务分工形成隐性的子团队是可以的，但重要的是要尽可能（例如在咖啡休息时间或每日站会时）将整个团队放在心上。


    *   **让部分团队成员无法获取项目信息**（例如，在私人聊天或邮件中讨论开发问题）会使每个人都难以全面了解决策、挑战、需求等。要让工作讨论能够按需被整个团队访问，但不要强迫每个人在没时间或忙于其他事务时参与每一次讨论。例如，你可以在一个独立但可见的线程中回复在公共线程中提出的问题。同时，也要考虑使用
    Slack 或 Discord 这类消息服务的优势，它们允许信息分组或置顶，可以添加回复和子线程，并且可以@团队成员，将相关讨论推送给他们。


    *   **开发者直接动手开发**。即使在敏捷方法论中，这也是一个错误。花时间就设计达成一致，创建情绪板以确保每个人都共享相同的整体愿景，并清晰地划分任务和子任务（即使只是为了产品的下一个迭代，而不是最终交付物），对于避免混乱和简化开发过程中的决策至关重要。定义不清或理解有误的任务通常会导致工作重叠、合并冲突、混乱、沮丧以及团队内部的争执。


    *   **排斥经验不足的队友**。因为不信任新开发者的技能，就不让他们承担项目中有意义且有趣的部分，这会打击学习积极性并降低创造力。将经验不足的团队成员排除在关于开发的关键讨论之外，会降低他们的自主权，并对其认同共同的项目愿景产生负面影响。


    *   **认为完成自己的任务就足以实现协作**。如果开发“群岛”的其他部分都在挣扎，那么成为一个高效的“孤岛”是不够的。协作围绕着一个共同的目标，而关注团队就是在关注这个目标。不记录已找到的解决方案和变通方法，不利于共同学习和建立共享知识库。不花时间去理解他人的贡献，可能会导致大量冲突，包括成员认为只有自己在做有意义的贡献，或者没有注意到某人的工作未被正确合并到代码库中，从而被排除在演示之外，这对开发者来说可能非常打击士气。


    *   **低估人际需求**。不尊重彼此的工作、时间、职责、需求和关切，就是不尊重彼此。不告知团队那些会影响你工作或可用性的个人情况，很可能会引起对某些贡献能否在截止日期前完成的担忧，从而导致重复工作、压力、加班和信任破裂。开会不准时，体现了缺乏规划、可靠性存疑以及对他人时间的不尊重。在做出可能影响队友的决策时不与他们沟通，必然会导致代码冲突和人际冲突。未能向主管和客户更新进展和困难，可能导致理解脱节、压力增加和业务损失。


    *   **不照顾好自己**。不花时间和精力去清晰地分享你的想法或担忧，会对你产生直接的负面影响，并对团队产生间接的负面影响。不分享困难和挫折，会造成不切实际的期望，并减少团队的支持。坚持不切实际的时间表或贡献量是短视的，因为它会导致怨恨和倦怠。

    '
- fmt: '### Soft-Aware Development: Supporting the Individuals


    Everyone knows that user-stories matter, but we must remember that developer-stories
    do too, because both sides are stakeholders of the development process. If we
    expect developers to work for us and with us, we must invest in them as individuals
    by supporting meaningful work, paying attention to developers and their needs,
    supporting their agency, valuing their personal and professional growth, and understanding
    creative time.


    `Micromanagement is not sustainable` for either side: managers cannot be everywhere
    nor have all the information at all times, while developers cannot have their
    hands tied at all times or else no development can take place. Consider how it
    is harder to think when someone is looking over your shoulder, or to get groceries
    from someone else’s list without knowing which substitutions are acceptable, or
    to solve a problem in some specific way that you don’t understand. Ron Jeffries
    describes `Dark Scrum`, which stems from incorrect implementation of agile practices:
    “`But the power holder already knows his job. His job is to stay on top of what
    everyone is doing, make sure they’re doing the right things, and redirect them
    if they’re not. How convenient that there’s a mandatory meeting where he can do
    that, every single day!`^([^(51)](#fn51)) `The result: instead of the team rallying
    around their joint mission and sorting out a good approach for the day, someone
    else drags information out of them, processes it in their head, and then tells
    everyone what to do. Since nothing ever goes quite as we expected yesterday morning,
    this improper activity often comes with a lot of blame-casting and tension. Dark
    Scrum oppresses the team every day. Self-organization cannot emerge.`”^([^(52)](#fn52))
    Developers need to be trusted to do the work and managers need to facilitate this
    work by addressing needs, removing barriers, and enabling bottom-up self-organization.


    Let’s think of development `like driving a vehicle` through an unknown terrain
    to some destination. Clients, managers, or product owners choose the destination
    but not the path. Developers are the drivers who choose how to best reach the
    goal. The scrum master or project manager should not back-seat drive, but they
    can keep track of progress and keep everyone focused on the general direction
    to the finish line. Product owner can call the cabin, but they are not in the
    car, and calling the driver distracts them from the road and should be done judiciously.
    The drivers need to have the freedom to decide which path they should take, based
    on their comfort level with the car they are driving, the speed they are going,
    their skills in navigating each type of terrain, the weather, unexpected car breakdowns,
    and anything else they deem relevant from their insider vantage point. The drivers
    should not be pushed to take paths or speeds they are not comfortable with; you
    can give them more information on their progress to help them better assess the
    needs, and you can choose to not hire them for the next trip, but you need to
    let them drive. Even crucial information needs to be provided non-disruptively.
    Consider that a driver is about to miss a turn but it may be too late to adjust
    course; sometimes it is safer to make the mistake and correct it after, not to
    mention that learning from mistakes can be more instructional in the long run.
    Giving developers some space and some planned-in time to make mistakes is important
    for their personal development, programming and debugging skills, confidence in
    their problem solving and trial and error, etc., which in turn makes it important
    for software development.


    `Leaders must pay attention`. Leaders/supervisors/managers can only be truly effective
    by being `close to the team` and to its problems. Leadership has to be personable,
    accessible, and adaptable. Create relationships and adapt structures around the
    people and their needs. Values in the workplace culture should be shared and supported
    across all individuals, but structures should be flexible to support the different
    ways in which people learn, communicate, and work. Pay attention to context (team
    context, personal context, and project context) and use it to make better decisions.
    Context also dictates whether an incident is actually an issue to be addressed
    and how to best address it. Note, however, that the same objective context may
    translate to different subjective contexts for different teams and for individual
    developers, so it is crucial for leaders to ask for feedback and make that feedback
    feel welcome, valued, and accounted for moving forward.


    A key aspect of a productive and creative development environment is `meaningful
    work`. All teammates (especially those in managerial roles) need to help all stakeholders
    find meaning in the work, as it will drive the most dedication and creativity.
    While employment or academics typically provides extrinsic motivation (e.g., paycheck
    or grades), this can generally only engage compliance. To tap into true motivation,
    we should also engage intrinsic motivation by helping connect the project/company
    goals with all stakeholder goals,^([^(53)](#fn53),[^(54)](#fn54),[^(55)](#fn55))
    such as desire for agency, personal growth, and fulfilment. A crucial starting
    off point for meaningful work is communicating the work’s `impact` and helping
    others buy into that impact, sometimes by flexibly altering the work to fit all
    stakeholders. A shared vision helps everyone understand the goal and focus on
    it like a guiding North Star or a sprint goal Prioritizing together, understanding
    which elements are crucial and why, negotiating the schedule, and addressing concerns
    openly and as a team will all help ensure that everyone buys into the work plan
    and allow individuals to make the right development decisions within their tasks
    along the way. Understanding, agreeing with, and contributing to the plan increases
    everyone’s personal agency, crucial for developers.^([^(56)](#fn56))


    `Mutual dedication` promotes trust and support. If you want your developers to
    go the extra mile, you must do the same by investing in their growth and well-being.^([^(57)](#fn57))
    If you need developers to work overtime to handle unpredictable circumstances,
    then you need to invest in their personal time and needs too (extra vacation days,
    shorter week to compensate for extended days, etc.). If we want individuals to
    respect company time, then the company must respect individual time. Facilitate
    a `reasonable workload` and celebrate a work-life balance as opposed to working
    overtime. If we need everyone to be willing to put in the occasional longer hours
    to fulfill temporary emergent needs, there must be accountability on the side
    of management, not only for the extra hours, but also for the workers’ willingness
    to accommodate for them outside of standard work time. Consider that two extra
    hours today cannot be meaningfully compensated by two fewer hours tomorrow. Any
    changes in work schedule, especially on short notice, create a non-negligeable
    amount of overhead for individuals (ranging from working while tired, missing
    sleep, cancelling plans, skipping going to the gym, rearranging family and pet
    care, etc.). If this overhead is not meaningfully accounted for, workers will
    miss out on crucial recharge time, eventually leading to burnout, quiet quitting,
    reduced quality of work, and increased turnover.'
