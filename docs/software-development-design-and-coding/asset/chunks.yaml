- fmt: "# Class Design Guidelines\n\nFinally, we present a list of 23 class design\
    \ guidelines taken from Davis^([(206)](#fn206)) and McConnell.^([(207)](#fn207))\
    \ These guidelines are somewhat more specific than the general design guidelines\
    \ that we have described above, but they are handy to have around:\n\n1. Present\
    \ a *consistent level of abstraction* in the class interface.\n2. Be sure you\
    \ understand what abstraction the class is implementing.\n3. Move unrelated information\
    \ to a different class (ISP).\n4. Beware of erosion of the class’s interface when\
    \ you are making changes (ISP).\n5. Don’t add public members that are inconsistent\
    \ with the interface abstraction.\n6. Minimize accessibility of classes and members\
    \ (OCP).\n7. Don’t expose member data in public.\n8. Avoid putting private implementation\
    \ details into the class’s interface.\n9. Avoid putting methods into the public\
    \ interface.\n10. Watch for coupling that’s too tight (PLK).\n11. Try to implement\
    \ “has a” relations through containment within a class (SRP).\n12. Implement “is\
    \ a” relations through inheritance (LSP).\n13. Only inherit if the derived class\
    \ is a more specific version of the base class.\n14. Be sure to inherit only what\
    \ you want to inherit (LSP).\n15. Move common interfaces, data, and operations\
    \ as high in the inheritance hierarchy as possible (DRY).\n16. Be suspicious of\
    \ classes of which there is only one instance.\n17. Be suspicious of base classes\
    \ that only have a single derived class.\n18. Avoid deep inheritance trees (LSP).\n\
    19. Keep the number of methods in a class as small as possible.\n20. Minimize\
    \ indirect method calls to other classes (PLK).\n21. Initialize all member data\
    \ in all constructors, if possible.\n22. Eliminate data-only classes. Classes\
    \ are supposed to include data and the operations defined on the data, so having\
    \ data-only classes violates this idea by separating data from operators.\n23.\
    \ Eliminate operation-only classes. Similarly to the principle above, classes\
    \ that only have operations must get their data from somewhere. This will complicate\
    \ the method interfaces and require new implementations for different data types.\n\
    \n## Conclusion\n\nIn this chapter, you explored a number of principles for object-oriented\
    \ design that have evolved over the last few decades. These design principles\
    \ act as guidelines for you to follow so that your design ends up being a good\
    \ one, meaning that it’s easy to implement, easy to maintain, and one that does\
    \ just what your customer wants. Importantly, these design principles give guidance\
    \ while you’re pondering your way from features to design. They offer ways to\
    \ examine and implement the crucial object-oriented principles of inheritance,\
    \ encapsulation, polymorphism, and abstraction. They also reinforce basic design\
    \ principles like cohesion and coupling.\n\n# 13. Design Patterns\n\n> *Each pattern\
    \ describes a problem which occurs over and over again in our environment, and\
    \ then describes the core of the solution to that problem, in such a way that\
    \ you can use this solution a million times over, without ever doing it the same\
    \ way twice.*\n> \n> —Christopher Alexander^([(208)](#fn208))\n\nDo you reinvent\
    \ the wheel each time you write code? Do you have to relearn how to iterate through\
    \ an array every time you write a program? Do you have to reinvent how to fix\
    \ a dangling `else` in every `if` statement you write? Do you need to relearn\
    \ insertion sort or binary search every time you want to use them? Of course not!\n\
    \nOver the time you’ve spent writing programs, you’ve learned a *set of idioms*\
    \ to employ when writing code. For example, if you need to iterate through and\
    \ print all the elements of an array, in Java you’re likely to do the following:\n\
    \n```\nfor (int i = 0; i < myArray.length; i++) {\nSystem.out.printf(\" %d \"\
    , myArray[i]);\n}\n```\n\nor\n\n```\nfor (int nextElement: myArray) {\nSystem.out.printf(\"\
    \ %d \", nextElement);\n}\n```\n\nWithout much deliberation, the code just flows\
    \ out of your fingertips as you type. These *code patterns* are sets of rules\
    \ and templates for code that you accumulate as you gain more experience writing\
    \ programs.\n\n*Design patterns* are the same thing, but for your design.^([(209)](#fn209))\
    \ If you take the time to learn a core group of design patterns, it will make\
    \ your code more uniform and readable and improve its overall quality over time.\
    \ It will also likely reduce the amount of time you spend designing your coding\
    \ projects. The famous architect Christopher Alexander, in his book *A Pattern\
    \ Language*, defined patterns for design in architecture.^([(210)](#fn210)) The\
    \ same ideas carry over into software design. If you read Alexander’s quote at\
    \ the top of this chapter, you can see the following three key elements in his\
    \ definition of a design pattern:\n\n* *Recurring*: The problem that evokes the\
    \ design pattern must be a common one.\n* *Core solution*: The pattern provides\
    \ a template for the solution; pulling out the essence of the solution.\n* *Reuse*:\
    \ The pattern must be easily reusable when the same core problem appears again,\
    \ even if the context or domain changes.\n\nIn fact, you’ve already seen at least\
    \ one design pattern so far in this book: the *Model-View-Controller* pattern\
    \ (MVC) that we discussed in Chapter [7](#270563_3_En_7_Chapter.xhtml) is one\
    \ of the earliest published examples of a software design pattern.^([(211)](#fn211))\
    \ The MVC design pattern is used with programs that use graphical user interfaces.\
    \ It divides the program into three parts: the *model* that contains the processing\
    \ rules for the program, the *view* that presents the data and the interface to\
    \ the user, and the *controller* that mediates communication between the *model*\
    \ and the *view*. In a typical object-oriented implementation, each of these abstractions\
    \ becomes a separate object.\n\nThe *Gang of Four* (Erich Gamma, Richard Helm,\
    \ Ralph Johnson, and John Vlissides), in their seminal book on design patterns,\
    \ *Design Patterns: Elements of Reusable Object-Oriented Software*,^([(212)](#fn212))\
    \ define a design pattern as something that “names, abstracts, and identifies\
    \ the key aspects of a common design structure that makes it useful for creating\
    \ a reusable object-oriented design.” In other words, a design pattern is a *named\
    \ abstraction* from a *concrete example* that represents a *recurring solution*\
    \ to a *particular, but common, problem*—recurring, core solution, reuse.\n\n\
    But why do we need design patterns in the first place? Why can’t we just get along\
    \ with the object-oriented design principles we studied in Chapter [12](#270563_3_En_12_Chapter.xhtml)\
    \ and with our old friends—abstraction, inheritance, polymorphism, and encapsulation?^([(213)](#fn213))\n\
    \nWell, it turns out that design is hard, that’s why. Design for reuse is even\
    \ harder. Design is also much more of an art than a science or an engineering\
    \ discipline. Experienced software designers rarely start from first principles;\
    \ they look for similarities in the current problem to problems they’ve solved\
    \ in the past. And they bring to the design table the set of design idioms that\
    \ they’ve learned over time. Design patterns provide a *shared vocabulary* that\
    \ makes this expert knowledge available to everyone."
