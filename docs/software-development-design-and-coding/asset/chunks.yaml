  trans: '

    ### 分析：一个示例


    让我们回到伯特的小鸟自助餐与浴场（B⁴++）。上次我们讲到 B⁴++时，它已经能在日出时自动打开喂食门，并在日落时关闭。B⁴++大获成功，爱丽丝和鲍勃对其性能感到非常兴奋。B⁴系列产品再次被抢购一空。


    然而有一天，伯特接到了爱丽丝的电话。她似乎遇到了一个问题。虽然 B⁴++运行良好，但爱丽丝注意到她的喂鸟器吸引了一些不速之客。要知道，爱丽丝是一位鸣鸟爱好者，当主红雀、彩绘鹀、猩红比蓝雀、美洲金翅雀和冠山雀出现在喂食器旁时，她会非常兴奋。但当黑鹂、蓝松鸦和椋鸟赶走鸣鸟并大快朵颐时，她可就不那么高兴了。因此，爱丽丝希望能在不受欢迎的鸟儿出现时自己关闭
    B⁴++的喂食门，并在鸣鸟回来时再次打开。而你正是负责实现这一功能的开发者。


    你向爱丽丝提出的第一个显而易见的问题是：“你希望如何打开和关闭喂食门？”她回答说：“嗯，用遥控器怎么样？这样我就可以待在屋里，等鸟儿来了直接开门关门。”于是，新一轮的开发又开始了。


    假设你是一个敏捷开发团队，你将使用敏捷技术进行更新设计。首先需要的是一个新用户故事。回忆一下，用户故事通常采用这种形式：“作为<角色>，我想要<行动>，以便<收益>。”在这个案例中，你可以这样说：“作为喂鸟器的主人爱丽丝，我想要用遥控器打开和关闭喂食门，以便阻止掠食鸟类靠近喂食器。”


    从这个用户故事中，你可以生成一个场景，详细描述爱丽丝想要做什么。场景可能是这样的：“爱丽丝正坐在厨房餐桌旁喝早咖啡。今早太阳出来后，B⁴++的门自动打开，喂食器吸引了几只鸣鸟。正当爱丽丝观赏鸣鸟时，几只蓝松鸦飞来，赶走了鸣鸟，开始大快朵颐鸟食。爱丽丝伸手拿起遥控器，按下按钮。喂食门平稳关闭，蓝松鸦飞走了。爱丽丝再次按下遥控器按钮，门又打开了。过了一会儿，鸣鸟们回来了，爱丽丝可以愉快地喝完她的咖啡了。”


    和上次一样，你可以将这个已详细阐述的问题陈述整理成一个用例。你之前的用例是这样的：


    1.  传感器检测到 40%亮度的阳光。

    2.  喂食门打开。

    3.  鸟儿们到来、进食、饮水、离开。

    4.  传感器检测到阳光亮度降至 25%。

    5.  喂食门关闭。


    因此，你需要首先决定：这个新问题是该用例的一个备选路径，还是需要一个全新的用例？


    让我们尝试创建一个新用例。为什么？因为使用遥控器并不真正符合传感器用例的逻辑，不是吗？遥控器可以随时激活，并且需要用户交互，这两点都与传感器不符。所以，我们来构思一个遥控器用例：


    1.  爱丽丝听到或看到喂食器旁有鸟。

    2.  爱丽丝判断它们*不是*鸣鸟。

    3.  爱丽丝按下遥控器按钮。

    4.  喂食门关闭。

    5.  鸟儿们放弃并飞走。

    6.  爱丽丝按下遥控器按钮。

    7.  喂食门再次打开。


    这个用例涵盖了所有情况吗？有没有遗漏什么？有两件事需要考虑。


    首先，在步骤#1 中，你写的是“爱丽丝听到或看到鸟儿”。问题是，“或”字是否重要？在这种情况下，答案是否定的，因为爱丽丝是决策者，也是这个用例中的参与者。你无法控制参与者；你只能响应参与者想要做的事情，并提供可供参与者选择的选项。在你的程序中，你需要等待来自遥控器的信号，然后执行正确的操作。（先别超前，你的程序是一个事件驱动系统，它必须等待（即监听）某个事件发生，然后才能执行操作。）


    其次，用例中的哪些步骤能帮助你识别新对象？这就是文本分析发挥作用的地方。在你之前版本的应用程序中，你已经有了`BirdFeeder`、`Sensor`和`FeedingDoor`这些对象。这些对象在用例中很容易被识别出来。那么现在有什么新东西呢？这里唯一的新对象就是遥控器。那么遥控器做什么？它有几个按钮？当按下遥控器按钮时，程序应该做什么？


    在你的示例中，遥控器看起来相对简单。打开和关闭喂食门是一个切换操作：如果门是关着的就打开，如果是开着的就关闭。只有这两种选项，所以遥控器实际上只需要一个按钮来实现切换功能。


    因此，在对这个新版本程序进行分析之后，你为 B⁴++程序得到了一个新的用例和一个新的类（见图 11-1）。


    ![](img/270563_3_En_11_Fig1_HTML.jpg)


    一个图示说明了遥控器类。三个方框包含以下文本：遥控器。门：喂食门。按下按钮()


    图 11-1


    新的 RemoteControl 类


    这个练习提供了一些可用于分析的指导原则。


    *   首先，创建*能够通过发送和响应消息来协同工作的简单类*。在你的示例中，简单的`FeedingDoor`和`Sensor`类封装了关于`BirdFeeder`当前状态的知识，并允许你通过简单的消息来控制喂鸟器。这种简单性使你之后能够轻松地通过`RemoteControl`类添加一种控制喂鸟器的新方式。


    *   其次，我们说*类应该只有一个职责*。`FeedingDoor`和`Sensor`不仅简单且易于控制，而且它们各自只做一件事。这使得它们以后更容易修改，也更容易复用。

    '
- fmt: "# Design\n\nNow what about design? Assuming you’ve got a conceptual model\
    \ from your analysis in the form of a few use cases and possibly a few class diagrams,\
    \ your more detailed design should follow from this. In object-oriented design,\
    \ the next steps are to solidify the class designs: decide on the methods your\
    \ classes will contain, determine the relationships between the classes, and figure\
    \ out how each of the methods will do what it’s supposed to do.\n\nIn your current\
    \ example, you’ve decided on four classes: `BirdFeeder`, `FeedingDoor`, `Sensor`,\
    \ and `RemoteControl`. The first three classes you already developed, so the question\
    \ here is whether you need to change any of these classes in order to integrate\
    \ the `RemoteControl` class into the program. Figure [11-2](#270563_3_En_11_Chapter.xhtml#Fig2)\
    \ shows what you’ve got right now.\n\n![](images/270563_3_En_11_Chapter/270563_3_En_11_Fig2_HTML.jpg)\n\
    \nA diagram illustrates the Remote Control class. The following classes are depicted.\
    \ Bird Feeder. Feeding Door. Sensor. Remote Control.\n\nFigure 11-2\n\nHow to\
    \ integrate the `RemoteControl` class\n\nThinking about it, it seems that nothing\
    \ in `FeedingDoor` or `Sensor` should have to change. Why?\n\nWell, it’s because\
    \ the `BirdFeeder` class uses these two classes, which in turn don’t need to use\
    \ anything from any other class; they are pretty self-sufficient. If you recall,\
    \ it’s the `operate()` method in the `BirdFeeder` class that does all the hard\
    \ work. It has to check the light level from the `Sensor` and if appropriate,\
