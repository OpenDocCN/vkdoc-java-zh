  trans: '

    计算机蠕虫是一种独立的计算机程序，它利用安全漏洞（通常存在于操作系统软件中）来释放有效载荷，该载荷通常会对受感染系统造成损害，同时还会自我复制，以便传播到其他系统。2003
    年 8 月 11 日，一种名为“冲击波”的蠕虫被释放到互联网上。冲击波蠕虫利用了 Windows XP 和 Windows 2000 操作系统中远程过程调用（RPC）子系统的缓冲区溢出漏洞，从而访问系统、释放其有效载荷并进行传播。微软早在
    2003 年 7 月就修补了这个漏洞，但并非所有 Windows 用户都安装了该补丁。在大约四天的时间里，冲击波蠕虫感染了超过 42.3 万台计算机。^(⁹³)


    2003 年 8 月 18 日，一种名为“Welchia”的新蠕虫被释放，它利用了与冲击波蠕虫相同的 RPC 漏洞。然而，当 Welchia 在目标系统上安装自身时，它并不会做任何有害的事情，而是首先查找并删除目标系统上的冲击波蠕虫（如果存在的话）。然后，它会下载微软针对
    RPC 漏洞的补丁，安装该补丁，并重新启动目标系统。所有 Welchia 蠕虫的副本都在 2004 年 1 月 1 日自行删除。Welchia 蠕虫在未经目标系统所有者许可的情况下完成了所有工作。在计算机安全领域，像
    Welchia 这样的蠕虫被称为反蠕虫或辅助蠕虫。我们面临的伦理问题是：释放 Welchia 蠕虫的人的行为在伦理上是好是坏？如果是不好的，他们本可以采取什么不同的做法？让我们从规则功利主义的角度来分析这个伦理问题。


    要分析这个伦理问题，我们必须创建一个合适的伦理规则，然后判断其普遍采用是否会增加所有利益相关者的效用。我们首先需要一个规则。“如果一种有害的计算机蠕虫正在感染互联网，并且我能够编写一种有益的蠕虫，自动从受感染的计算机中移除有害蠕虫，并保护它们免受未来的攻击，那么我应该编写并释放这种有益的蠕虫。”^(⁹⁴)
    这样做的好处是什么？显然，每个尚未使用微软补丁更新其计算机的 Windows 用户都会受益，因为 Welchia 会删除冲击波蠕虫、安装补丁，并保护他们的计算机免受冲击波蠕虫的任何进一步攻击。这显然是一个胜利。


    那么危害呢？首先，如果每个人都遵循这个规则，那么每当有一种新的恶意蠕虫被释放时，就会涌现大量辅助蠕虫。这会减慢或堵塞网络流量。其次，如果某些辅助蠕虫包含意外的错误怎么办？并非所有有用的程序都是完美的，因此某些辅助蠕虫很有可能损坏目标系统。这会降低单个计算机系统的安全性，最终损害其所有者。最后，网络或系统管理员将难以区分恶意蠕虫和辅助蠕虫。他们只会看到蠕虫试图攻击系统，导致误报，需要加班，并可能同时错过真正的威胁。


    允许释放辅助蠕虫的伦理规则所造成的危害似乎降低了互联网上的幸福或效用。因此，不应创建此伦理规则，并且释放 Welchia 蠕虫的人的行为在伦理上是错误的。


    规则功利主义似乎保留了行为功利主义的有用部分，但通过放大假设普遍采用规则所带来的后果，使伦理成本和收益的整体计算更加直接。此外，由于我们将这一理论应用于伦理规则，我们也不必为每个行为重新计算成本和收益。我们还可以自由选择我们将要执行的规则，这可以帮助我们摆脱伦理困境。最后，它可以消除道德运气的问题。因此，规则功利主义似乎是一种可行的方式。但有一个问题除外。


    在两种形式的功利主义中，都存在一个问题，即*善果在不同利益相关者之间的分配可能不均*。这个问题之所以出现，是因为功利主义只关心幸福总量的增加，而不关心它在所有利益相关者之间如何分配。例如，假设一种行为方式导致每个人获得
    100 单位的幸福，但另一种行为方式导致一半的利益相关者每人获得 201 单位的幸福。根据功利主义的计算，我们应该选择第二种方案，因为这将带来更多的总幸福，尽管在第二种方案中，一半的利益相关者因一无所获而受到不公平对待。^(⁹⁵)


    约翰·罗尔斯（1921-2002）试图通过提出两项*正义原则*来解决这个问题。这些原则指出，在做出伦理决策时，社会和经济不平等是可以接受的，只要它们满足以下两个条件：（1）社会中的每个人都应有平等的机会提升到更高的社会或经济地位；（2）“社会和经济不平等必须得到证明。证明社会或经济不平等的唯一方法是表明其总体效果是为最不利者提供最大利益。”^(⁹⁶)
    这第二个条件被称为*差异原则*，它为累进所得税等社会政策提供了理由，即收入较高的人缴纳更高的税款，而收入较低的人有权从社会获得更多福利。这两项正义原则旨在增加公平性，在做出伦理决策时提供一个总体上更公平的竞争环境。


    ## 伦理驱动因素


    在所有伦理体系中，都有一套约束和规则来帮助指导任何伦理讨论。讨论计算和软件开发中的伦理问题也不例外。我们将简要介绍其中两个伦理驱动因素，以及它们与软件开发中伦理问题的关系。


    ### 法律驱动因素


    在所有伦理讨论中，我们必须记住要考虑法律，因为法律约束我们的行为，并引导我们沿着社会已确定为可接受行为的伦理道路前进。这类法律驱动因素包括法律（联邦、州和地方）和政府法规（实际上是对法律应如何执行的解释），管辖领域包括知识产权、健康与安全问题、隐私问题以及数据保护。


    ### 职业驱动因素


    每个职业都有一套伦理驱动因素，描述该职业成员应如何行事。在软件开发领域，两个计算专业协会——*美国计算机协会*（ACM）和*IEEE 计算机学会*（IEEE-CS）——各自为其成员制定并发布了行为准则。每位软件开发人员都应遵守这些行为准则。*ACM
    伦理与职业行为准则*^(⁹⁷) 和 *ACM/IEEE-CS 软件工程伦理准则*^(⁹⁸) 的链接在脚注中。我们将以 ACM/IEEE-CS 准则的序言来结束本节。我们已突出显示了特别相关的部分。

    '
- fmt: '# Professional Drivers: Preamble to the ACM/IEEE-CS Software Engineering Code
    of Ethics


    Computers have a central and growing role in commerce, industry, government, medicine,
    education, entertainment, and society at large. Software engineers are those who
    contribute by direct participation or by teaching to the analysis, specification,
    design, development, certification, maintenance and testing of software systems.
    Because of their roles in developing software systems, software engineers have
    significant opportunities to do good or cause harm, to enable others to do good
    or cause harm, or to influence others to do good or cause harm. To ensure, as
    much as possible, that their efforts will be used for good, software engineers
    must commit themselves to making software engineering a beneficial and respected
    profession. In accordance with that commitment, software engineers shall adhere
    to the following Code of Ethics and Professional Practice.


    The Code contains eight Principles related to the behavior of and decisions made
    by professional software engineers, including practitioners, educators, managers,
    supervisors and policy makers, as well as trainees and students of the profession.
    The Principles identify the ethically responsible relationships in which individuals,
    groups, and organizations participate and the primary obligations within these
    relationships. The Clauses of each Principle are illustrations of some of the
    obligations included in these relationships. These obligations are founded in
    the software engineer''s humanity, in special care owed to people affected by
    the work of software engineers, and in the unique elements of the practice of
    software engineering. The Code prescribes these as obligations of anyone claiming
    to be or aspiring to be a software engineer.


    It is not intended that the individual parts of the Code be used in isolation
    to justify errors of omission or commission. The list of Principles and Clauses
    is not exhaustive. The Clauses should not be read as separating the acceptable
    from the unacceptable in professional conduct in all practical situations. The
    Code is not a simple ethical algorithm that generates ethical decisions. In some
    situations, standards may be in tension with each other or with standards from
    other sources. These situations require the software engineer to use ethical judgment
    to act in a manner that is most consistent with the spirit of the Code of Ethics
    and Professional Practice, given the circumstances.


    Ethical tensions can best be addressed by thoughtful consideration of fundamental
    principles, rather than blind reliance on detailed regulations. These Principles
    should influence software engineers to consider broadly who is affected by their
    work; to examine if they and their colleagues are treating other human beings
    with due respect; to consider how the public, if reasonably well informed, would
    view their decisions; to analyze how the least empowered will be affected by their
    decisions; and to consider whether their acts would be judged worthy of the ideal
    professional working as a software engineer. In all these judgments concern for
    the health, safety and welfare of the public is primary; that is, the “Public
    Interest” is central to this Code.


    The dynamic and demanding context of software engineering requires a code that
    is adaptable and relevant to new situations as they occur. However, even in this
    generality, the Code provides support for software engineers and managers of software
    engineers who need to take positive action in a specific case by documenting the
    ethical stance of the profession. The Code provides an ethical foundation to which
    individuals within teams and the team as a whole can appeal. The Code helps to
    define those actions that are ethically improper to request of a software engineer
    or teams of software engineers.


    The Code is not simply for adjudicating the nature of questionable acts; it also
    has an important educational function. As this Code expresses the consensus of
    the profession on ethical issues, it is a means to educate both the public and
    aspiring professionals about the ethical obligations of all software engineers.


    The eight principles mentioned above are:


    1.  PUBLIC – Software engineers shall act consistently with the public interest.

    2.  CLIENT AND EMPLOYER – Software engineers shall act in a manner that is in
    the best interests of their client and employer consistent with the public interest.

    3.  PRODUCT – Software engineers shall ensure that their products and related
    modifications meet the highest professional standards possible.

    4.  JUDGMENT – Software engineers shall maintain integrity and independence in
    their professional judgment.

    5.  MANAGEMENT – Software engineering managers and leaders shall subscribe to
    and promote an ethical approach to the management of software development and
    maintenance.

    6.  PROFESSION – Software engineers shall advance the integrity and reputation
    of the profession consistent with the public interest.

    7.  COLLEAGUES – Software engineers shall be fair to and supportive of their colleagues.

    8.  SELF – Software engineers shall participate in lifelong learning regarding
    the practice of their profession and shall promote an ethical approach to the
    practice of the profession.^([^(99)](#fn99))


    Similarly, the ACM Code of Ethics contains a set of general ethical principles
    that all computer scientists should follow. They include (using the ACM’s numbering):


    - 1.1 Contribute to society and to human well-being, acknowledging that all people
    are stakeholders in computing.

    - 1.2 Avoid harm. That is, any negative consequences.

    - 1.3 Be honest and trustworthy.

    - 1.4 Be fair and take action not to discriminate.

    - 1.5 Respect the work required to produce new ideas, inventions, creative works,
    and computing artifacts.

    - 1.6 Respect privacy.

    - 1.7 Honor confidentiality.^([^(100)](#fn100))


    ## Ethical Discussion and Decision Making


    Given the above theories, a decision to an ethical problem can be reached by first
    identifying and describing the problem, and then by analyzing the problem and
    coming to a decision. A sample plan for how to carry out these two tasks is presented
    below.


    ### Discussion 1: Identifying and Describing the Problem


    1.  Write down the statement of the ethical problem. This will help to clarify
    what exactly you’re talking about.

    2.  List the risks, problems, and possible consequences.

    3.  List all the stakeholders. This will include you and anyone else involved
    in the ethical situation, as well as anyone affected by the consequences of the
    decision, both directly and indirectly.

    4.  Identify all the possible ethical issues in each case. Try to establish the
    rights and wrongs of the situation and figure out what ethical rules might be
    involved.

    5.  Identify all the possible legal issues. This includes intellectual property
    issues and health and safety issues.

    6.  List possible actions if the problem is more complex than a simple yes/no.'
