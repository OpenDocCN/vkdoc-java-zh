  trans: '

    ##### Scrum 仪式


    Scrum 团队会举行几种会议，帮助团队进行自我组织。


    *Sprint 计划会议*：这是一个初始规划阶段，负责创建初始需求的产品列表，决定实现需求的架构，将用户故事按优先级分组到各个 Sprint 中，并将第一批用户故事分解为待估算和分配的任务。当估算占满
    Sprint 允许的所有时间时，他们便停止规划。Sprint 中的任务不应超过一天的工作量，理想情况下应能一次性完成（以避免任务切换）。如果某个任务预计需要超过一天的工作量，则应将其连续拆分为两个或更多任务，直到每个任务的工作量都合适为止。这条规则源于一个观察：人类不擅长对大型任务进行精确估算，以周或月为单位估算任务工作量基本上只是猜测。因此，将任务分解成更小的部分，能让团队对每个任务做出更可靠的估算。


    *每日站会*是一个短会（15-30 分钟；越短越好），整个团队在此讨论 Sprint 的进展。每日 Scrum 会议让团队能够分享信息并跟踪 Sprint
    进度。通过举行每日 Scrum 会议，任何进度延误或实施中的问题都会立即显现，并可由团队当场解决。“Scrum Master 确保每个人都在取得进展，记录会议中做出的决定并跟踪行动项，并保持
    Scrum 会议简短且聚焦。”^(³¹) 在每日站会期间，每位团队成员依次回答以下三个问题：


    > *自上次会议以来，你推动了哪些开发进展？*


    > *从现在到下次会议之间，你计划如何进一步推动开发？*


    > *有什么阻碍你前进吗？*


    请注意，这些问题的措辞可以稍作调整，但其核心意图必须保留。除回答这三个问题之外的讨论，将推迟到其他会议进行。每日站会对于帮助每个人跟踪朝着共同 Sprint
    目标的进展、促进协作以及提高责任感和参与度至关重要。


    *Sprint 评审*在每个 Sprint 结束时举行，向产品负责人展示新开发的 MVP（通常以演示形式），产品负责人可对其进行验收测试。该会议“评审”了本
    Sprint 中为达成 Sprint 目标而“完成”的所有事项，以及哪些事项被遗漏及其原因。


    *Sprint 回顾会议*在 Sprint 评审之后举行，旨在“回顾”团队的合作方式：他们的流程、沟通、协作机制、会议期望等，寻找可以在下一个 Sprint
    中改进绩效的领域。回顾会议是改进的关键工具，因为它负责团队工作本身的敏捷迭代改进。回顾会议标志着当前 Sprint 的正式结束。


    *待办事项梳理*或*故事时间*会议在整个 Sprint 期间定期举行（例如每周一次），以梳理待办事项列表中的条目，确保它们为未来的 Sprint 规划做好准备。产品负责人通过添加和（重新）排列故事优先级来参与，开发人员则通过将高优先级的故事分解为任务来参与。


    虽然 Sprint 通常在预定义的 Sprint 周期结束时结束，但如果 Sprint 计划的所有工作都已提前完成，也可以提前终止。虽然可以添加新工作，但通常最合适的做法是完成所有
    Sprint 结束和 Sprint 规划的流程，以便恰当地评审已完成的工作，回顾工作方式，并规划下一步的开发步骤。


    ##### Scrum 速度


    对于大多数团队而言，随着项目进展，任务的估算会变得更好，这主要是因为团队现在掌握了之前 Sprint 中估算表现的数据。单个 Sprint 中完成的工作量度量称为*速度*。随着时间的推移，这能让团队决定每个
    Sprint 应包含多少任务。通过有意义的回顾会议以及由此带来的团队流程和实践的迭代改进，随着团队在分解和分配任务、为每个任务所需工作创建准确估算以及相互协作方面变得更加熟练，速度应会随着时间的推移而提高。


    ##### Scrum 项目结束


    在最后一个计划好的开发 Sprint 之后，可能会执行一个最终 Sprint 来为项目收尾。此 Sprint 不实现新功能，而是为产品发布准备最终可交付成果。它修复所有剩余的错误，完成文档，并通常对代码进行产品化。产品待办事项列表中剩余的任何需求都将转移到下一个版本。在下一个
    Sprint 开始之前，会举行一次 Scrum 回顾会议，以反思上一个 Sprint，并查看是否有任何流程改进可以实施。


    #### 敏捷框架 - 看板：有限流量的持续流动


    看板方法是一种源自精益制造（丰田生产系统）和其他变革管理系统的实践；它的大部分原始思想来自准时制制造流程。看板更像是一种方法论而非流程；它是一个目标以及一套实现该目标的原则和实践。

