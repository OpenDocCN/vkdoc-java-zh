    ### 伦理理论：后果主义（目的论理论）


    推理伦理情境还有另一种方式，即所谓的*目的论理论*，其名称源于希腊语单词 *telos*，意为“目的”或“目标”。目的论理论仅关注行为的后果，以判断该行为是善还是恶，^(⁸⁸)
    因此它们也被称为*后果主义*。


    后果主义的经典形式被称为*功利主义*，由英国哲学家杰里米·边沁（1748-1832）和约翰·斯图尔特·密尔（1806-1873）提出。功利主义基于*效用原则*，该原则认为，一个行为在多大程度上增加了受影响各方的总体幸福（或效用），它在道德上就是善的或正确的。如果该行为减少了总体幸福，则在道德上是错误的。因此，效用是行为为个人、群体或社区带来幸福（或防止不幸）的倾向。^(⁸⁹)
    一个行为可能会增加某些人的效用，同时减少其他人的效用。这正是密尔那句格言“最大多数人的最大幸福”的由来。


    因此，根据功利主义，我们必须有一种方法来计算幸福的增减。这意味着我们还需要某种共同的度量标准来衡量幸福，并且需要能够计算某个行为带来的总体幸福或不幸。这引出了功利主义的两种变体。


    *行为功利主义*是一种理论，认为如果一个行为的净效果（对所有受影响的人而言）是产生的幸福多于不幸，那么这个行为就是善的。因此，行为功利主义者将效用原则应用于单个行为以及这些行为所影响的所有具有道德意义的人。


    例如，假设当地县正在考虑将一段非常弯曲的公路改直。我们需要考虑这是否是一个好主意。为此，我们必须弄清楚谁会受到这项新工程的影响（谁是利益相关者），以及这项工程会对他们产生什么影响（成本是多少）。假设为了修建这条公路，该县必须征用公路将穿过的
    100 户住宅。因此，这些房产持有者是利益相关者，他们将获得财产补偿。另外，假设每天约有 5000 辆汽车在这条公路上行驶；这些司机也是利益相关者，因为新路可能会缩短他们的通勤时间，减少他们的金钱和时间支出。更广泛地说，新路还会产生某种环境影响，这也必须计算在内。如果我们用金钱作为效用的衡量标准，那么我们可以尝试计算修建公路的效用。假设房主获得了
    2000 万美元的补偿。另一方面，假设使用这条公路的司机每人节省约 2 美元，即每个工作日节省 1 万美元，一年有 250 个工作日，公路将使用 20 年。该县修建公路的成本为
    1200 万美元，而因栖息地丧失对动物物种造成的环境成本估计约为 100 万美元。因此，公路的总成本约为 3300 万美元，而给司机带来的收益约为 5000
    万美元。按照行为功利主义，这个行为是善的，公路应该修建。然而，我们的计算存在几个问题。我们没有考虑到房主的不幸福，因为他们中的部分或全部可能不想出售自己的房屋。新路可能分割社区，对社区造成的影响是另一项成本。该县
    20 年的维护成本是另一项成本，但直路上事故减少的价值则是一项收益。^(⁹⁰) 因此，对于行为功利主义而言，我们似乎需要考虑比直接行为所涉及的成本更多的后果。对我们必须做出的每一个道德决定都进行这种计算，既不实际，也常常不可行。行为功利主义也没有考虑到人们内在的责任感或义务感，以及这些因素在道德决策中如何被考量。它还迫使我们把所有道德决策简化为正面或负面的结果，而其中许多结果并不容易量化。最后，行为功利主义将我们引向*道德运气问题*，即当面临道德决策时，你无法完全控制决定行为道德善恶的所有因素。奎因用来解释道德运气的例子是：一位尽责的侄子给他卧病在床的姑妈送了一束花，结果却发现姑妈对花束中的某种花过敏，病情反而加重了。由于对姑妈造成的后果非常负面，这个行为在道德上是恶的，但侄子的意图是好的。^(⁹¹)
    那么答案是什么呢？也许我们需要做一些改变。


    行为功利主义的一种变体是*规则功利主义*，它将效用原则应用于普遍的道德规则，而不是单个行为。因此，我们是对普遍的道德规则进行功利主义计算，而不是对单个行为：“规则功利主义是一种伦理理论，认为我们应该采纳那些如果每个人都遵守，将导致幸福最大程度增加的道德规则。”^(⁹²)
    这里又出现了“最大多数人的最大幸福”这一概念。让我们来看一个例子。

    '
- fmt: '# A Computer Worm Case Study


    A computer worm is a self-contained computer program that exploits a security
    vulnerability, usually in operating system software, to release a payload that
    will normally do harm to an infected system and also to reproduce itself so it
    can propagate to other systems. On August 11, 2003, a worm called `Blaster` was
    released into the Internet. `Blaster` exploited a buffer overflow vulnerability
    in the remote procedure call (`RPC`) subsystem in the `Windows XP` and `Windows
    2000` operating systems in order to access the system, release its payload and
    propagate. Microsoft had patched this vulnerability back in July 2003, but not
    all Windows users applied the patch. In roughly four days `Blaster` infected over
    423,000 computers.^([^(93)](#fn93))


    On August 18, 2003 a new worm called `Welchia` was released and it exploited the
    same `RPC` vulnerability as the `Blaster` worm. However, when `Welchia` installed
    itself on a target system instead of doing anything harmful it first looked for
    and deleted the `Blaster` worm if it was on the target system. It then downloaded
    the Microsoft patch for the `RPC` vulnerability, installed it, and rebooted the
    target system. All copies of `Welchia` deleted themselves on January 1, 2004.
    The `Welchia` worm did all its work without the permission of the target system
    owner. In the computer security community, a worm like `Welchia` is known as an
    anti-worm or a helper worm. The ethical question we have is: was the action of
    the person who released the `Welchia` worm ethically good or bad? And, if bad,
    what might they have done instead? Let’s analyze this ethical problem from a rule
    utilitarian perspective.


    To analyze this ethical problem, we must create an appropriate ethical rule and
    then decide if its universal adoption would increase the utility of all the stakeholders.
    We first need a rule. “If a harmful computer worm is infecting the Internet, and
    I can write a helpful worm that automatically removes the harmful worm from infected
    computers and shields them from future attacks, then I should write and release
    the helpful worm.”^([^(94)](#fn94)) What would be the benefits? Well, clearly,
    every Windows user who had not already updated their computer with the Microsoft
    patch would benefit because `Welchia` deletes `Blaster`, installs the patch, and
    shields their computer from any further attacks by `Blaster`. A clear win.


    What about harm? Firstly, if everyone followed this rule, then every time there
    was a new malicious worm released, there would be a flood of helper worms released.
    This would slow down or clog network traffic. Secondly, what if some of the helper
    worms contained accidental bugs? Not all helpful programs are perfect, so there
    is a high probability that some of the helper worms would damage the target systems.
    This would decrease the safety of the individual computer systems, ultimately
    harming their owners. Finally, network or system administrators would have a hard
    time differentiating between malicious worms and helper worms. All they would
    see is a worm attempting to attack systems, causing false alarms, requiring overtime,
    and potentially causing missing real threats in the meantime.


    The harm caused by the ethical rule that allows the release of the helper worms
    seems to decrease the happiness or utility on the Internet. Consequently, this
    ethical rule should not be created and the actions of the person who released
    the `Welchia` worm are ethically wrong.


    It appears that rule utilitarianism keeps the useful parts of act utilitarianism
    but makes the overall calculation of ethical costs and benefits more straightforward
    by amplifying the consequences due to the hypothesized universal rule adoption.
    Additionally, since we use this theory on ethical rules, we also don’t have to
    recalculate the costs and benefits for every act. We’re also free to choose which
    rule we will enforce, which can get us out of ethical dilemmas. Finally, it can
    eliminate the problem of moral luck. So rule utilitarianism seems like it could
    be the way to go. Except for one problem.


    In both forms of utilitarianism there is the problem that there can be an *unequal
    distribution of good consequences* across all of the stakeholders. This problem
    arises because utilitarianism only cares about the total amount of increase in
    happiness, not how it is distributed across all the stakeholders. For example,
    suppose acting one way results in everyone getting 100 units of happiness, but
    acting a different way results in half of stakeholders getting 201 units of happiness
    each. According to the utilitarian calculation, we should choose the second option
    because that will result in more total happiness, regardless of the fact that
    in the second option half the stakeholders are treated unfairly by getting nothing.^([^(95)](#fn95))


    John Rawls (1921-2002) tried to fix this problem by proposing two *Principles
    of Justice*. These principles say that when making ethical decisions that social
    and economic inequalities are acceptable if they meet the following two conditions:
    (1) every person in society should have an equal chance to rise to a higher level
    of social or economic standing and (2) that “social and economic inequalities
    must be justified. The only way to justify a social or economic inequality is
    to show that its overall effect is to provide the most benefit to the least advantaged.”^([^(96)](#fn96))
    This second condition is known as the *difference principle*, which provides justification
    for social policies such as graduated income tax, where those with more income
    pay higher taxes, while those with less income are entitled to more benefits from
    society. The two principles of justice are meant to increase equity, providing
    an overall more level playing field when making ethical decisions.


    ## Ethical Drivers


    In all ethical systems there are a set of constraints and rules that help guide
    any ethical discussion. Discussing ethical issues in computing and software development
    is no different. We will look briefly at two of these ethical drivers and how
    they relate to ethical problems in software development.


    ### Legal Drivers


    In all ethical discussions we must remember to consider the law because laws constrain
    our actions and also guide us down ethical paths that society has decided are
    acceptable behavior. These kind of legal drivers include laws (federal, state,
    and local) and government regulations (which are really interpretations of how
    the laws should be enforced), governing areas like intellectual property, health
    and safety issues, privacy issues, and data protection.


    ### Professional Drivers


    Every profession has a set of ethical drivers that describe how members of the
    profession are expected to behave. In the case of software development, two professional
    societies of computing, the *Association for Computing Machinery* (`ACM`) and
    the *IEEE Computer Society* (`IEEE-CS`), have each developed and published codes
    of conduct for their members. Every software developer should adhere to these
    codes of conduct. Links to the *ACM Code of Ethics and Professional Conduct*,^([^(97)](#fn97))
    and the *ACM/IEEE-CS Software Engineering Code of Ethics*^([^(98)](#fn98)) are
    in the footnotes. We will let the `ACM/IEEE-CS` code’s preamble finish off this
    section. We have highlighted particularly relevant sections.'
