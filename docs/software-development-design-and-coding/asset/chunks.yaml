  trans: "\n#### 八皇后问题：方案三\n\n在生成和测试棋盘方面，我们可以更加巧妙。与其先生成一个完整的棋盘配置再进行测试，不如在生成过程中就测试部分解。一旦某个棋盘配置中出现任何皇后冲突，就可以立即拒绝该棋盘，无需等待放置完其余皇后。此外，如果能够从错误的棋盘配置回溯到上一个正确的部分配置，就能更快地探索可能的配置。\n\
    \n现在，你可以进行顶层设计，将其形式化，并进入下一个细化层级。\n\n##### 方案三：第一次细化\n\n开始生成棋盘时，你将一次放置一个皇后，如果产生冲突则尝试其他选择，如果所有选择都尝试完毕则进行回溯。现在，让我们将步骤形式化：\n\
    \n从第 0 行和第 0 列开始：\n\n1.  在下一行的下一个可用列放置一个新皇后。\n\n2.  测试新皇后是否与棋盘上已有的所有其他皇后安全共存。（这是上述\
    \ *q(x)* 测试的一个变体。）\n    1.  如果新皇后不安全：\n        1.  尝试在当前列的下一行放置她，并重复步骤 2。\n\n\
    \        2.  如果没有剩余行可供尝试，则从棋盘上移除新皇后；返回上一列，并将上一个皇后移动到下一行；重复步骤 2。\n\n    2.  如果新皇后安全：\n\
    \        1.  将她留在此处，并进入下一列。\n\n        2.  从第一行开始，放置下一个皇后。\n\n使用这种方法，你可以确保当前列\
    \ j 之前的部分解是正确的。然后，你尝试通过在第 j+1 列添加一个皇后来扩展到下一个部分解。由于只有在所有之前的皇后都安全时才会添加新皇后，因此解决方案只需测试这一个新皇后的安全性，从而减少了测试例程的工作量。如果安全检查失败，你就回溯到列\
    \ j 处上一个有效的部分解，并重新考虑最后一个成功放置的皇后的剩余替代位置。Wirth 将这种创建和测试部分解的技术称为*逐步构建试验解*。而回溯技术当然被称为*回溯法*。\n\
    \n以下是用于寻找单个解的更形式化的伪代码：\n\n```\ndo {\nwhile ((row = 0));\nif (we've reached column\
    \ 8) then\nwe have a solution, print it.\n```\n\n该算法是此解决方案的第一个形式化视图。请注意，上面我们使用的是伪代码而非真正的编程语言，将语言细节进一步推后到细化层级中。此外，虽然我们已经有了该方法的大致框架，但仍有许多细节需要考虑。这些细节已被推入我们正在创建的控制层级中，我们将在下一次细化迭代中处理它们。这也是逐步细化的一个特点。\n\
    \n现在你已经有了算法的描述，也可以着手验证它。最终的验证将是观察程序产生正确的解，但你目前还无法做到这一点。不过，你当然可以拿一个棋盘（或一张纸）手动模拟这个算法，以验证你能否在棋盘上生成一个符合问题要求的皇后放置方案。\n\
    \n至此，你已经有了一个更形式化的顶层描述，了解了如何进行验证，并且准备好扩展上面那些模糊的步骤了。\n\n##### 方案三：第二次细化\n\n既然你已经有了程序的初步版本，就需要检查程序中的每一步，看看它们由什么构成。让我们聚焦于那个听起来很简单的“测试新皇后是否与棋盘上已有的所有其他皇后安全共存”。它一直在你计划的解决方案中默默承担着所有繁重的工作，现在是时候弄清楚它是如何工作的了。\n\
    \n虽然逐步细化主要关注程序控制流的描述，但在某个时刻，你需要确定数据的具体形式。对于你试图解决的每个问题，这会在细化过程中的不同时间点发生。对于这个问题，你终于到了一个阶段，下一步的细化应该是编写更详细的伪代码。这几乎迫使你去思考数据结构。你需要问自己，如何用数据结构来表示包含所有皇后以及所有空位的棋盘。你需要一个数据结构，既能表示皇后，又能检查它们是否会被攻击。初步的想法可能是一个\
    \ 8x8 的二维数组，你将皇后放置在某个（行，列）位置上。由于你只需要存储皇后的存在与否，可以将其设为布尔数组以节省空间。这种数据结构也便于你轻松检查新皇后的安全性。让我们来分解一下。\n\
    \n当在某个位置（row, col）放置一个新皇后时，你需要检查以下内容：\n\n*   这一行是否仍然空闲？\n\n*   这一列是否仍然空闲？\n\n\
    *   这条主对角线是否仍然空闲？\n\n*   这条反对角线是否仍然空闲？\n\n如果你选择系统地每列放置一个皇后，就可以跳过第一个检查，因为后续的每一列必然仍然是空闲的（注意，你也可以对行做同样的处理）。这样就剩下另外三个检查：行、主对角线和反对角线。行的检查很简单：你只需检查与新皇后同一行的所有其他格子。要检查对角线，你需要找到一种方法，计算从任意给定（row,\
    \ col）出发，沿任一对角线上的位置。\n\n仔细观察图 9-2 中的对角线位置集合，你可以在左侧图像（描绘主对角线）中看到，沿着任何一条主对角线的所有格子，其行与列值的*差*是一个常数（例如，中心主对角线为\
    \ 0，其上方对角线为 -1，下方对角线为 1）。类似地，查看图 9-2 的右侧，你可以看到，沿着任何一条反对角线的所有格子，其行与列值的*和*也是一个常数（例如，中心反对角线为\
    \ 7，其上方对角线为 6，下方对角线为 8）。因此，给定任何一个格子，你都可以判断它是否落在给定位置皇后的任一对角线上。\n\n![](img/270563_3_En_9_Fig2_HTML.jpg)\n\
    \n两个 8x8 表格分别突出显示了主对角线和反对角线。主对角线从左到右向下倾斜。反对角线从右到左向下倾斜。\n\n图 9-2\n\n主对角线（左）和反对角线（右）\n\
    \n但请注意，你仍然需要检查所有格子，并对其坐标进行加法和减法运算，以判断它是否恰好落在每个新皇后感兴趣的任一对角线上。这种方法可行但速度较慢。你可以做得更好！\n"
- fmt: '# Solution 3: Refinement 3


    Using your previously devised two-dimensional array, you can store the exact position
    of every queen as well as all the empty positions. However, all you really need
    to track is whether a given row, column, or diagonal is already protected by an
    existing queen. Meaning you do not need to know exactly where the queens are—only
    the columns and diagonals that they are protecting.


    Thus, instead of storing boolean information (queen or no queen) about your 8*8=64
    positions, you can store boolean information (protected or not protected) about
    your 8 rows, 15 main diagonals, and 15 anti-diagonals (38 booleans total). For
    larger boards, the reduction in space complexity would be much more substantial
    (e.g. consider placing 1000 queens on a 1000x1000 chess board). Additionally,
    you will now only need to look at three booleans (the row and both diagonals)
    to determine if a new queen is safe, which makes your safety check constant time.
    Overall, this solution will run in `O(n)` for `n` queens.


    To check whether a given row is still free, you only need a one-dimensional boolean
    array:


    ```

    boolean rows[8]; //indices 0-7 are the chessboard row numbers

    ```


    where `rows[r] = true` means that the `r`-th row is still unprotected.


    To store information about your diagonals in similar one-dimensional arrays, you
    can use the property about the constant difference or sum of up and down diagonals
    to create two other arrays. For your 15 main diagonals, as the difference values
    range from -7 to 7, inclusively, you will calculate the correct diagonal index
    as `(row-col+7)`, shifting the range into standard valid indices 0-14.


    ```

    boolean mainDiagonals[15]; // indices 0-14 are obtained as row-col+7

    boolean antiDiagonals[15]; //indices 0-14 are obtained as row+col

    ```


    where `mainDiagonals[d] = true` means that the `d`-th diagonal is still unprotected.


    With this arrangement, the test for the safety of a queen at position `(row, col)`:


    ```

    ( rows[row] AND mainDiagonals[row-col+7] AND antiDiagonals[row+col] )

    ```


    This is a pretty great solution, but is it good enough? Well, that depends. In
    general, constant-time safety checks can’t be beat, and if you need to place `n`
    queens, then `O(n)` can’t really be beat either. Still, you may have other constraints
    and priorities. Currently, you are storing one boolean per row and one per diagonal;
    for a board of size `n*n`, you are storing `n+(n+n-1)*2=5n-2` booleans. If you
    had a very large board and your storage space was very limited, you could reduce
    your space complexity at the expense of your time complexity.


    # Solution 3: Refinement 4


    There’s yet another way to think about how to store the data. This time let’s
    try to store even less than one boolean per row and one per diagonal. Turns out,
    you can get by with just one one-dimensional array of the length equal to our
    columns:


    ```

    int board[8]; // for an 8x8 board, indices 0-7 represent rows, values 0-7 represent
    columns

    ```


    where each *index* into the array represents a column (0 through 7 in the eight-queens
    case) and each *value* stored at that index represents the row on which a queen
    was placed (also 0 through 7 in the eight-queens case). This encoding provides
    you with the exact coordinates of each queen. As each new queen is placed, you
    can check all previously placed queens, one at a time, and assess whether their
    rows, their main diagonals, or their anti-diagonals match with those of the newly
    placed queen. If any matches are found, then the queens are in conflict and the
    new queen must be moved. In this way, you can eliminate the separate arrays for
    had previously used to store the safety of each diagonal. Note that this test
    for safety is no longer constant time, and the overall solution is slower since
    now you have to check for safety from 0 previous queens, then 1, then 2, then
    3... `(0+1+2+3+...+n-1)`, which is `O(n²)`.


    This might be the time for some more code. At this point, it seems appropriate
    to move from pseudo-code to a real language. You’ll have to make this move at
    some point in the refinement process. Just like deciding when to define your data
    structures, exactly when to insert language-specific features depends on the problem
    and how detailed the refinement is at this point. A Java method to test for safety
    might look like


    ```

    // int[] board indices represent columns, values represent queen''s row

    // row, col are the coordinates of the newly placed queen whose safety is being
    assessed

    public boolean isSafe () {

    boolean safe = true;

    for (int c = 0; c < col; c++) { // c is each previous column

    if ((board[c] == row) || // occupied row == this row?

    ((board[c] - c) == (row - col) ) || // main diagonals match?

    ((board[c] + c) == (row + col) ) ) // antidiagonals match?

    safe = false; //any matches mean conflict!

    }

    return safe;

    }

    ```


    Remember that, because you’re creating partial solutions by adding one queen to
    a column at a time, you only need to test all the columns *before* current `col`
    where the new queen is being placed.


    # Solution 3: Refinement 5


    Now that you have the safety procedure out of the way and you’ve decided on a
    simple data structure to represent the current board configuration, you can proceed
    to the remaining procedures in the decomposition. The remaining tasks are


    1. Keep a safe queen on the board and move on to the next column.

    2. Try moving an unsafe queen down to the next row.

    3. If there are no rows left to try, remove the new queen from the board; go back
    to the previous column and move the previous queen to the next row.


    These are all simple enough to solve in code without further decomposition. This
    is a key point of structured programming: keep doing the decompositions until
    a procedure becomes obvious and then you can try coding it up directly. The three
    tasks above might look like the following when written in code:


    ```

    /** "keep a safe queen on the board and move on to the next column"

    *  the queen at (row, col) is safe, so we have a partial solution;

    *  advance to the next column

    */

    public void advance () {

    board[col] = row;           // put the queen at (row, col) on the board

    col++;                      // move to the next column

    row = 0;                    // and start at the beginning of the column

    }

    ```


    For *try moving an unsafe queen down to the next row* you don’t even need a method.
    The test in the main program for safety moves the queen up a row if the `isSafe()`
    method determines that the current `(row, col)` position is unsafe. The code for
    this is


    ```

    if (isSafe())

    advance();

    else

    row++;

    ```


    Finally, you have the following:


    ```

    /**

    *  "if there are no rows left to try, remove the new queen from the board;

    *  go back to the previous column and move the previous queen to the next row"

    *  could not find a safe row in current col given current placements of other

    *  queens so back up one col and move the previous queen to next row down

    */

    public void retreat () {

    col--;

    row = board[col] + 1;

    }

    ```


    The complete Java program is in the Appendix.'
  raw: '##### Solution 3: Refinement 3


    Using your previously devised two-dimensional array, you can store the exact position
    of every queen as well as all the empty positions. However, all you really need
    to track is whether a given row, column, or diagonal is already protected by an
    existing queen. Meaning you do not need to know exactly where the queens are—only
    the columns and diagonals that they are protecting.


    Thus, instead of storing boolean information (queen or no queen) about your 8*8=64
    positions, you can store boolean information (protected or not protected) about
    your 8 rows, 15 main diagonals, and 15 anti-diagonals (38 booleans total). For
    larger boards, the reduction in space complexity would be much more substantial
    (e.g. consider placing 1000 queens on a 1000x1000 chess board). Additionally,
    you will now only need to look at three booleans (the row and both diagonals)
    to determine if a new queen is safe, which makes your safety check constant time.
    Overall, this solution will run in O(n) for n queens.


    To check whether a given row is still free, you only need a one-dimensional boolean
    array:


    ```

    boolean rows[8]; //indices 0-7 are the chessboard row numbers

    ```


    where `rows[r] = true` means that the r^(th) row is still unprotected.


    To store information about your diagonals in similar one-dimensional arrays, you
    can use the property about the constant difference or sum of up and down diagonals
    to create two other arrays. For your 15 main diagonals, as the difference values
    range from -7 to 7, inclusively, you will calculate the correct diagonal index
    as (row-col+7), shifting the range into standard valid indices 0-14.


    ```

    boolean mainDiagonals[15]; // indices 0-14 are obtained as row-col+7

    boolean antiDiagonals[15]; //indices 0-14 are obtained as row+col

    ```


    where `mainDiagonals [d] = true` means that the d^(th) diagonal is still unprotected.


    With this arrangement,^([^(168)](#fn168)) the test for the safety of a queen at
    position (row, col):


    ```

    ( rows[row] AND mainDiagonals[row-col+7] AND antiDiagonals[row+col] )

    ```


    This is a pretty great solution, but is it good enough? Well, that depends. In
    general, constant-time safety checks can’t be beat, and if you need to place n
    queens, then O(n) can’t really be beat either. Still, you may have other constraints
    and priorities. Currently, you are storing one boolean per row and one per diagonal;
    for a board of size n*n, you are storing n+(n+n-1)*2=5n-2 booleans. If you had
    a very large board and your storage space was very limited, you could reduce your
    space complexity at the expense of your time complexity.


    ##### Solution 3: Refinement 4


    There’s yet another way to think about how to store the data. This time let’s
    try to store even less than one boolean per row and one per diagonal. Turns out,
    you can get by with just one one-dimensional array of the length equal to our
    columns:


    ```

    int board[8]; // for an 8x8 board, indices 0-7 represent rows, values 0-7 represent
    columns

    ```


    where each *index* into the array represents a column (0 through 7 in the eight-queens
    case) and each *value* stored at that index represents the row on which a queen
    was placed (also 0 through 7 in the eight-queens case). This encoding provides
    you with the exact coordinates of each queen. As each new queen is placed, you
    can check all previously placed queens, one at a time, and assess whether their
    rows, their main diagonals, or their anti-diagonals match with those of the newly
    placed queen. If any matches are found, then the queens are in conflict and the
    new queen must be moved. In this way, you can eliminate the separate arrays for
    had previously used to store the safety of each diagonal. Note that this test
    for safety is no longer constant time, and the overall solution is slower since
    now you have to check for safety from 0 previous queens, then 1, then 2, then
    3... (0+1+2+3+...+n-1), which is O(n²).


    This might be the time for some more code. At this point, it seems appropriate
    to move from pseudo-code to a real language. You’ll have to make this move at
    some point in the refinement process. Just like deciding when to define your data
    structures, exactly when to insert language-specific features depends on the problem
    and how detailed the refinement is at this point. A Java method to test for safety
    might look like


    ```

    // int[] board indices represent columns, values represent queen''s row

    // row, col are the coordinates of the newly placed queen whose safety is being
    assessed

    public boolean isSafe () {

    boolean safe = true;

    for (int c = 0; c < col; c++) { // c is each previous column

    if ((board[c] == row) || // occupied row == this row?

    ((board[c] - c) == (row - col) ) || // main diagonals match?

    ((board[c] + c) == (row + col) ) ) // antidiagonals match?

    safe = false; //any matches mean conflict!

    }

    return safe;

    }

    ```


    Remember that, because you’re creating partial solutions by adding one queen to
    a column at a time, you only need to test all the columns *before* current col
    where the new queen is being placed.


    ##### Solution 3: Refinement 5


    Now that you have the safety procedure out of the way and you’ve decided on a
    simple data structure to represent the current board configuration, you can proceed
    to the remaining procedures in the decomposition. The remaining tasks are


    1.  Keep a safe queen on the board and move on to the next column.


    2.  Try moving an unsafe queen down to the next row.


    3.  If there are no rows left to try, remove the new queen from the board; go
    back to the previous column and move the previous queen to the next row.


    These are all simple enough to solve in code without further decomposition. This
    is a key point of structured programming: keep doing the decompositions until
    a procedure becomes obvious and then you can try coding it up directly. The three
    tasks above might look like the following when written in code:


    ```

    /** "keep a safe queen on the board and move on to the next column"

    *  the queen at (row, col) is safe, so we have a partial solution;

    *  advance to the next column

    */

    public void advance () {

    board[col] = row;           // put the queen at (row, col) on the board

    col++;                      // move to the next column

    row = 0;                    // and start at the beginning of the column

    }

    ```


    For *try moving an unsafe queen down to the next row* you don’t even need a method.
    The test in the main program for safety moves the queen up a row if the `isSafe()`
    method determines that the current (row, col) position is unsafe. The code for
    this is


    ```

    if (isSafe())

    advance();

    else

    row++;

    ```


    Finally, you have the following:


    ```

    /**

    *  "if there are no rows left to try, remove the new queen from the board;

    *  go back to the previous column and move the previous queen to the next row"

    *  could not find a safe row in current col given current placements of other

    *  queens so back up one col and move the previous queen to next row down

    */

