    section 允许由不同的线程执行。并行块末尾还有一个隐式屏障，因此只有在两个 `mergeSort()` 线程都完成后，才会调用 `merge()` 函数。因此，通过
    *Fork/Join* 模式，我们可以分割已分区的数组，独立执行 `mergeSort()`，然后在每对排序完成后进行合并。通过这种设置，除了最后一次调用外，每次调用
    `mergeSort()` 都会将当前子列表一分为二，然后创建两个新的执行线程，这两个线程将执行至完成，当两者都完成时，`merge()` 函数将执行，线程将结束。被排序的数组将在所有线程之间共享。活跃线程的数量将增加，直到达到最大值（经过
    log[2] n 步后），此时线程将开始结束，并发生合并。请注意，每次创建和销毁新线程都会产生开销，因此在考虑使用 OpenMP 时需要考虑到这一点。


    该程序的串行版本在单个线程中执行所有操作，但使用系统栈来跟踪对 `mergeSort()` 的递归调用。每次调用 `mergeSort()` 时，都会在系统栈上创建一个新的活动记录^(²⁵⁴)，当每个
    `mergeSort()` 调用结束时，该活动记录被移除。通过这种方式，系统栈在执行过程中会增长和收缩。同样，数组由 `mergeSort()` 函数的所有活动实例共享。在
    `merge()` 函数中创建的临时数组是该函数的局部变量，当 `merge()` 退出时消失。串行版本的主要开销是系统栈上活动记录的创建和销毁。如上所述，在实现程序的串行版本时，您需要考虑此开销。


    虽然这个并行版本可以工作，并且我们能够利用测试系统中的多核优势，但事实证明，阿姆达尔定律^(²⁵⁵)将成为我们的绊脚石。`merge()` 函数本质上是串行的，因此会拖慢整个程序，所以我们潜在的加速非常小。在运行
    Linux 的双核共享内存系统上，归并排序程序的并行版本最终比串行版本更慢。对于更大的数组，我们还必须小心同时创建的线程数量（这就是我们在并行 pragma
    中限制线程数量的原因）；大多数操作系统对单个用户可以同时创建的活跃线程或进程数量都有限制。


    我们如何解决并行版本的这个问题？可能需要进行两项更改。首先，在 `mergeSort()` 函数中，对基本情况的测试 `if (start < end)`
    可以改为阈值测试。我们可以跟踪递归调用的次数或当前子列表的长度，如果它低于某个阈值，我们就停止递归，转而使用另一种排序算法，比如插入排序，对于小数组，其时间复杂度接近线性。不过，这个修复并没有改变
    `merge()` 函数的串行本质。我们可以通过创建一个并行合并函数来使程序更快。`merge` 函数已经是一个 O(n) 算法，所以我们不希望让它变得更慢。它也不是一个明显的并行化候选。目标应该是得到一个
    O(n) 或更快的并行算法（可能通过减小复杂度估计中的系数大小）。*分治*算法可能正是我们寻找的。该算法的开发在一定程度上超出了本书的范围，但在著名的 CLRS
    *算法导论* 的当前版本中有一个很好的并行合并算法，我们向感兴趣的读者推荐。^(²⁵⁶)


    ## 结论


    正如您可能已经注意到的，并行设计模式可能彼此非常相似。这是因为它们通常遵循从相应的串行算法/程序创建并行算法/程序的过程。该过程是：(1) 识别并发性，(2)
    将程序拆分为并发部分，(3) 如果更新后的算法需要，则拆分数据，(4) 并行执行并发部分，以及 (5) 将所有答案组合起来得到最终答案。也就是说，并行设计模式为我们提供了一组有用的抽象，用于思考并行编程。


