  \n第 3 章\n\n![image](img/frontdot.jpg)\n\nJava 类设计\n\n![9781430247647_unFig03-01.jpg](img/9781430247647_unFig03-01.jpg)\n\
  \nJava 是一种*面向对象编程*（OOP）语言。面向对象有助于开发者构建一个*模块化*、*可扩展*、*可维护*且*可复用*的系统。要编写出高质量的程序，程序员必须牢固掌握\
  \ OOP 概念。\n\n面向对象编程围绕*对象*这一概念展开，对象*封装*了数据以及作用于数据上的行为。对象通过定义良好的*接口*提供服务。该接口规定了对象“提供什么”，*抽象*了“如何提供”（即实际实现）。面向对象支持在更高的抽象层次上对解决方案进行建模，涉及*类*、相关类的层次结构（*继承*）、类之间的关联以及动态绑定（*动态多态*）。\n\
  \n对于任何 OCPJP 考试，您都需要了解基本的 OOP 概念。本章的第一部分涵盖了 OOP 的基础：抽象、封装、继承和多态。第二部分涵盖了与类相关的概念，其中我们将详细讨论*构造器*和*访问修饰符*。第三部分回顾了*方法重载*和*构造器重载*。第四部分是关于继承的，涵盖了*is-a\
  \ 关系*、*方法重写*和*类型转换*。本章的最后一部分涉及 Java 的*包*和*导入语句*。\n\nOOP 基础\n\n为了感受面向对象编程的世界，让我们在脑海中漫步于本地消费电子产品零售商的电视部门。电视是一种抽象，通过适当的接口（电视遥控器）提供特定功能。作为观众，您无需了解电视的工作原理；电视向观众抽象了其所有更精细的操作细节（*抽象*）。电视对象封装了电视的属性（如亮度、频道号和音量）以及控制这些属性的相关行为，形成一个单一实体（*封装*）。换句话说，对这些属性的访问被限制在相关的操作中。电视有不同的类型，例如\
  \ CRT 电视、LED 电视和 LCD 电视；它们属于同一个家族，形成了一个*继承层次结构*。尽管所有类型的电视都支持“显示”功能，但实现内容显示的内部技术可能有所不同（*多态*）。\n\
  \n牢记这个电视类比，并借助下一节中介绍的编程示例，让我们回顾一下基本的 OOP 概念。\n\nFunPaint 应用程序：一个示例\n\n假设您正在为儿童实现一个名为\
  \ FunPaint 的简单绘图程序（图 3-1）。用户可以拖放圆形和方形等基本形状，为它们着色，并使用这些形状创作图画。\n\n![9781430247647_Fig03-01.jpg](img/9781430247647_Fig03-01.jpg)\n\
  \n图 3-1.  一个使用 OOP 概念实现的儿童绘图应用程序\n\n我们将在本章中一直使用这个示例，来说明如何有效地将 OOP 概念应用于实际编程和问题解决。现在，假设\
  \ Circle 和 Square 等形状是作为类实现的。用户可以点击圆形图标，然后在绘图窗格中绘制一个圆形。对于圆形，您需要记住相关的信息，例如圆心、半径等。为了让用户能够给圆形着色，您需要计算其面积。接下来，您将看到如何使用\
  \ OOP 概念来实现 FunPaint 的功能。\n\nOOP 基础\n\n面向对象建立在封装、抽象、继承和多态的基础之上。以下各部分将帮助您重新理解这四个概念。\n\
  \n抽象\n\n*抽象*的拉丁词根意为“抽离”——您抽离出除您希望关注的特定方面之外的所有内容。换句话说，抽象意味着隐藏较低层次的细节，只向用户暴露必要且相关的细节。\n\
  \n例如，为了驾驶汽车，驾驶员具备一套基本的技能就足够了，这些技能使她能够与汽车的转向、换挡、仪表盘、制动和加速系统进行交互。对于驾驶员来说，了解内部实现细节（例如燃油如何注入燃烧室，或者电池如何通过发动机间接充电）是多余的。驾驶员只关心如何使用汽车，而不关心汽车如何工作以及如何向驾驶员提供功能。换句话说，汽车*抽象*了内部细节，只向驾驶员暴露那些与驾驶员和汽车交互相关的细节。\n\
  \n在 FunPaint 示例中，您定义了诸如 `draw()` 和 `fillColor()` 之类的操作。`Circle` 类的用户不需要知道该类是如何绘制圆形或使用特定颜色填充圆形的。换句话说，您通过隐藏实现细节来抽象类的细节。\n\
  \n封装\n\n结构化编程将程序的功能*分解*为各种过程（*函数*），而不太关心每个过程可以操作哪些数据。函数可以自由地操作和修改（通常是全局且未受保护的）数据。\n\
  \n\n\n在面向对象编程中，数据和操作这些数据的函数被组合成一个单一单元，称为*类*。术语*封装*指的是将数据及相关函数组合成一个单一单元。例如，在`Circle`类中，`radius`和`center`被定义为*私有字段*。现在你可以将方法`draw()`和`fillColor()`与字段`radius`和`center`一起引用，因为这些字段和方法彼此紧密相关。类中方法所需的所有数据（字段）都在类内部可用。换句话说，类将其字段和方法*封装*在一起。\n\
  \n| ![image](img/Note.jpg) | 封装将数据（字段）与逻辑相关的操作（方法）结合在一起。抽象则隐藏了内部实现层面的细节，只向用户暴露类的相关细节。抽象是*通过*封装实现的。\
  \ |\n\n继承\n\n*继承*是面向对象编程中的一种复用机制，它利用各种对象的共同属性来建立彼此之间的关系。抽象和共同的属性在*超类*中提供，可供更专门的*子类*使用。例如，彩色打印机和黑白打印机是打印机的一种（*单继承*）；多功能一体机是打印机、扫描仪和复印机的结合（*多继承*）。需要注意的是，Java\
  \ *不*支持多继承，但支持*多接口继承*（详见第 4 章和第 5 章）。\n\n当我们说类`B`继承自另一个类`A`时，类`B`被称为*派生类*（或*子类*），类`A`被称为*基类*（或*超类*）。通过继承，派生类接收基类的行为，使得基类中所有可见的成员方法和变量在派生类中可用。除了继承的行为外，派生类通过添加或覆盖基类行为来特化其自身行为。\n\
  \n在 FunPaint 中，用户可以绘制不同的形状。尽管形状不同，但所有形状都支持类似的功能——例如，填充颜色和计算形状的面积。由于这些方法对所有形状类都是通用的，你可以创建一个名为`Shape`的*基类*，并在该类中声明这些方法。其他类如`Circle`和`Triangle`继承自`Shape`并实现其特化行为。\n\
  \n多态\n\n术语*多态*的希腊词根指的是一个实体的“多种形式”。在现实世界中，你传达的每条消息都有上下文。根据上下文，消息的含义可能会改变，对消息的响应也可能会改变。类似地，在面向对象编程中，一条消息可以根据对象以多种方式解释（多态）。\n\
  \n例如，在*函数重载*（Java 中的多态构造之一）中，你可以提供名称相同但参数数量或参数类型不同的方法。这个概念很简单，但它为程序员提供了强大的能力和灵活性。在\
  \ FunPaint 中，你可以用不同的颜色填充形状。像`fillColor()`这样的方法可以接受颜色参数为 RGB（红、绿、蓝）值或 HSB（色相、饱和度、亮度）值。对同一个方法`fillColor()`的调用，根据提供的参数表现不同；这是*编译时多态*的一个例子。\n\
  \n假设你在`Shape`基类中有一个名为`area()`的方法。`area()`方法返回所绘制形状的面积。因此，`area()`在`Shape`的所有派生类中都被实现（*覆盖*）。一个`Shape`引用可以指向任何派生类对象。当你从`Shape`引用调用`area()`方法时，它会调用实际对象类型（即对象的动态类型）的`area()`方法。这种动态行为被称为*运行时多态*。\n\
  \n我们用一个简单的例子打包了很多概念和术语。如果你不能一下子全部消化，不用担心。你将在本书中进一步学习它们。\n\n类基础\n\n*类*是面向对象编程中的基本抽象实体和构建块。一个类封装了一个实体的*状态*（数据）和*行为*（操作）。例如，`Circle`类为单个圆形对象定义了蓝图。这个`Circle`类可能包含状态信息，如`radius`，以及操作，如`area()`和`fillColor()`。`Circle`类将圆的状态和操作封装在一个单一实体中，并提供了一种新的抽象。从面向对象编程的角度来看，理解类定义了一个新类型，该类型可以被程序中的其他类使用，这一点很重要。\n\
  \n让我们看一个类的例子并分析其各个部分（图 3-2）。这个例子声明了类`Circle`，它包含类型为`Integer`的成员变量`x, y`和`radius`，以及两个成员方法`area()`和`fillColor()`。\n\
  \n![9781430247647_Fig03-02.jpg](img/9781430247647_Fig03-02.jpg)\n\n图 3-2.  一个示例类\
  \ Circle 及其各个部分\n\n| ![image](img/Note.jpg) | 类是一个模板（或蓝图），而对象是类的一个实例。 |\n\n对象创建\n\
  \n你创建类是为了在程序中使用它们。你可以创建一个*实例*（一个使用类服务的对象）。从高层次来看，在程序中使用对象有三个步骤。\n\n*   **声明：** 你需要提供一个变量声明，其中包含*类型名称*（你想要使用的类）和*对象名称*。例如，以下语句声明了一个类型为`Circle`的变量`circleObj`：\n\
  \n```\n    Circle circleObj;\n    ```\n\n*   **实例化：** 你使用关键字`new`来创建一个实例；该关键字为对象分配所需的内存。在这个例子中，你通过以下语句*实例化*圆形对象：\n\
  \n```\n    Circle circleObj = new Circle ();\n    ```\n\n*   **初始化：** 一个特殊的方法，称为*构造函数*，会被自动调用。构造函数通过设置对象的初始状态来初始化新创建的对象，并且你可以获取一些资源（如文件句柄）。构造函数的主要规则是它们必须与类同名。一个类可以有多个构造函数。\n\
  \n| ![image](img/Note.jpg) | 每个类都有一个构造函数。如果你没有为类显式编写构造函数，Java 编译器会为该类提供一个默认构造函数（不带任何参数）。\
  \ |\n\n假设你在 FunPaint 应用程序中实现`Circle`类。一个`Circle`应该记住其圆心和半径，因此你有三个字段：`xPos`、`yPos`和`radius`。\n\
  \n```\nclass Circle {\n        int xPos, yPos, radius;\n}\n```\n\n当你创建一个新的`Circle`对象时会发生什么？由于`xPos`、`yPos`和`radius`是`Integer`类型，它们的值默认会被初始化为\
  \ 0。然而，这对于创建正确的`Circle`对象来说并不理想。让我们在*默认构造函数*中为变量`xPos`、`yPos`和`radius`定义默认值：\n\n\
  \n```public Circle() {\n        xPos = 20; // 假设 xPos 和 yPos 的默认值\n        yPos\
  \ = 20;\n        radius = 10; // 默认半径\n}\n```\n\n如你所见，构造方法与类同名，且没有任何返回类型。默认构造方法没有任何参数。当你创建新对象且不传递任何参数时，默认构造方法会被调用。\n\
  \n让我们检查一下，当你尝试实例化 `Circle` 对象时，这个默认构造方法是否会被调用。为此，你需要实现 `toString()` 方法来打印 `Circle`\
  \ 成员的值（清单 3-1）。（注意：你无需像本代码中那样显式调用 `toString()` 方法——它会被自动调用。你将在本章的“运行时多态”部分了解更多相关内容）。\n\
  \n清单 3-1.  Circle.java\n\n```\n// 一个二维 Circle 类，包含 xPos 和 yPos 字段用于存储中心点坐标，\n//\
  \ 以及 radius 字段用于存储圆的半径值\nclass Circle {\n        private int xPos, yPos, radius;\n\
  \        // 默认构造方法，初始化所有三个字段\n        public Circle() {\n                xPos =\
  \ 20; // 假设 xPos 和 yPos 的默认值\n                yPos = 20;\n                radius\
  \ = 10; // 默认半径\n        }\n        // 重写的 toString 方法，以字符串形式打印 Circle 对象的信息\n \
  \       public String toString() {\n                return \"center = (\" + xPos\
  \ + \",\" + yPos + \") and radius = \" + radius;\n        }\n        public static\
  \ void main(String[]s) {\n                // 将对象传递给 println 会自动调用 toString 方法\n\
  \                System.out.println(new Circle());\n        }\n}\n```\n\n它打印出\n\n\
  ```\ncenter = (20,20) and radius = 10\n```\n\n是的，你的默认构造方法生效了。明白了吗？\n\n现在，你能看出这个构造方法有什么问题吗？\n\
  \n```\npublic void Circle() {\n        xPos = 20; // 假设 xPos 和 yPos 的默认值\n     \
  \   yPos = 20;\n        radius = 10; // 默认半径\n}\n```\n\n构造方法没有返回类型，而这里你指定了 `void`\
  \ 返回类型。这不是一个构造方法，而是该类中一个名为 `Circle` 的方法！注意：Java 允许你声明与类名相同的方法，但使用这一特性并非良好实践（因为它会混淆阅读你代码的程序员）。\n\
  \n| ![image](img/banana.jpg) | 构造方法没有返回类型。如果你定义了返回类型，那它就不是构造方法，而是一个方法！请注意并避免犯这个常见错误。\
  \ |\n\n访问修饰符\n\nOCPJP 考试既包含直接关于访问修饰符的问题，也包含需要底层访问修饰符知识的间接问题。因此，理解 Java 支持的各种访问修饰符非常重要。\n\
  \n访问修饰符决定了 Java 实体（类、方法或字段）的可见性（进而决定访问权限）级别。访问修饰符使你能够实施有效的封装。如果类的所有成员变量都可以从任何地方访问，那么将这些变量放在类中就没有意义，将数据和方法封装在类中也失去了目的。\n\
  \nJava 支持四种类型的访问修饰符：\n\n*   公有（Public）\n*   私有（Private）\n*   受保护（Protected）\n* \
  \  默认（Default，未指定访问修饰符）\n\n为了说明这四种访问修饰符，假设你在 FunPaint 应用程序中还有一个类：`Canvas`。`Shape`、`Circle`\
  \ 和 `Circles` 类位于同一个包（`graphicshape`）中，而 `Canvas` 类位于另一个包（`appcanvas`）中。\n\n```\n\
  // Shape.java\npackage graphicshape;\n\nclass Shape {\n        // 类定义\n}\n\n// Circle.java\n\
  package graphicshape;\n\npublic class Circle extends Shape {\n        // 类定义\n}\n\
  \n//Circles.java\npackage graphicshape;\n\nclass Circles {\n        //类定义\n}\n\n\
  // Canvas.java\npackage appcanvas;\nimport graphicshape.Circle;\n\nclass Canvas\
  \ {\n        //类定义\n}\n```\n\n暂时先跳过 `package graphicshape`、`...extends Shape` 和\
  \ `import graphicshape.Circle` 这些语句，我们将在后续章节中详细讨论它们。\n\n公有访问修饰符\n\n公有访问修饰符是最宽松的。如果一个类或其成员被声明为\
  \ *public*，则它们可以被任何其他类访问，不受包边界限制。这类似于现实世界中的公共场所，例如公司食堂，所有员工无论部门都可以使用。\n\n在 FunPaint\
  \ 示例中，假设 `Circle` 类有一个公有方法 `area()`。该方法可以从任何地方访问，甚至从另一个包中访问，如清单 3-2 片段所示。\n\n清单\
  \ 3-2.  Circle.java\n\n```\n// Shape.java\npackage graphicshape;\n\nclass Shape\
  \ {\n        // 类定义已省略\n}\n\n// Circle.java\npackage graphicshape;\n\npublic class\
  \ Circle extends Shape {\n        public void area() {       //公有方法\n          \
  \      // area 方法的代码已省略\n        }\n}\n\n// Circles.java\npackage graphicshape;\n\
  \nclass Circles {\n        void getArea() {\n                Circle circle = new\
  \ Circle();\n                circle.area();       // 在包内调用公有方法 area()\n        }\n\
  }\n\n// Canvas.java\npackage appcanvas;\nimport graphicshape.Circle;\n\nclass Canvas\
  \ {\n        void getArea() {\n                Circle  circle = new Circle();\n\
  \                circle.area(); // 在包外调用公有方法 area()\n        }\n}\n\n如清单 3-2 所示，公有方法\
  \ area() 在同一个包内（Circles 类中）以及包外（Canvas 类中）均可访问。\n```\n\n| ![image](img/banana.jpg)\
  \ | 类中的 *公有方法* 仅当该类被声明为 public 时，才能被外部世界访问。如果该类未指定任何访问修饰符，则公有方法仅能在其所在包内访问。 |\n\n\
  私有访问修饰符\n\n私有访问修饰符是最严格的访问修饰符。*私有*类成员无法从类外部访问；只有同一个类的成员才能访问这些私有成员。这类似于银行的保险箱室，只有经过授权的人员和保险箱所有者才能进入。\n\
  \n让我们将属性 `radius` 作为私有成员添加到 `Circle` 类中。在这种情况下，该属性只能由 `Circle` 类的成员访问，如清单 3-3 所示。\n\
  \n清单 3-3.  Circle.java\n\n```\n// Shape.java\npackage graphicshape;\n\nclass Shape\
  \ {\n        //类定义\n}\n\n//Circle.java\npackage graphicshape;\n\npublic class Circle\
  \ extends Shape {\n        private int radius;       //私有字段\n        public void\
  \ area() {       //公有方法\n                // 在类内部访问私有字段 radius\n                System.out.println(\"\
  area:\"+3.14*radius*radius);\n        }\n}\n\n// Circles.java\npackage graphicshape;\n\
  \nclass Circles {\n        void getArea() {\n                Circle  circle = new\
  \ Circle();\n                circle.area();  // 在包内调用公有方法 area()\n        }\n}\n\
  \n// Canvas.java\npackage appcanvas;\nimport graphicshape.Circle;\n\nclass Canvas\
  \ {\n        void getArea() {\n                Circle  circle = new Circle();\n\
  \                circle.area(); // 在包外调用公有方法 area()\n        }\n}\n```\n\n在此示例中，`radius`\
  \ 仅在 `Circle` 类内部可访问，在任何其他类中均不可访问，无论其所在包如何。\n\n受保护与默认访问修饰符\n\n\n*受保护*和*默认访问修饰符*非常相似。如果一个成员方法或字段被声明为\
  \ protected 或 default，那么该方法或字段可以在同一个包内被访问。请注意，没有显式的关键字来表示默认访问——实际上，当未指定任何访问修饰符时，该成员就具有默认访问权限。另外，请注意，默认访问也称为*包内受保护*访问。受保护和默认访问类似于办公室里的情况：会议室只对一个部门开放。\n\
  \n受保护和默认访问有什么区别？当子类与其父类不在同一个包中时，这两个访问修饰符之间会出现一个显著的区别。在这种情况下，受保护的成员可以在子类中访问，而默认成员则不能。\n\
  \n假设类 `Shape` 有一个受保护的成员变量 `color`，而类 `Circle` 有另一个使用默认访问修饰符声明的方法 `fillColor()`，如\
  \ 清单 3-4 中的代码片段所示。\n\n清单 3-4.  Circle.java\n\n```\n// Shape.java\npackage graphicshape;\n\
  \nclass Shape {\n        protected int color;\n}\n\n// Circle.java\npackage graphicshape;\n\
  \npublic class Circle extends Shape {\n        private int radius;     // private\
  \ 字段\n        public void area() {    // public 方法\n                // 在类内部访问 private\
  \ 字段 radius\n                System.out.println(\"area:\"+3.14*radius*radius);\n\
  \        }\n        void fillColor() {\n                System.out.println(\"color:\"\
  \ + color); // 在子类中访问 protected 字段\n        }\n}\n\n// Circles.java\npackage graphicshape;\n\
  \nclass Circles {\n        void getArea() {\n                Circle  circle = new\
  \ Circle();\n                circle.area();  // 在包内调用 public 方法 area()\n       \
  \         circle.fillColor();     // 在包内调用具有默认访问修饰符的方法\n        }\n}\n\n// Canvas.java\n\
  package appcanvas;\nimport graphicshape.Circle;\n\nclass Canvas {\n        void\
  \ getArea() {\n                Circle  circle = new Circle();\n                circle.area();\
  \ // 在包外调用 public 方法 area()\n        }\n}\n```\n\n如示例所示，受保护的字段 `color` 在类 `Circle`\
  \ 中被访问，而默认方法 `fillColor()` 从类 `Circles` 中被调用。\n\n各种访问修饰符提供的可见性总结在 表 3-1 中。\n\n表\
  \ 3-1. 访问修饰符及其可见性\n\n![image](img/Table03-01.jpg)\n\n| ![image](img/banana.jpg)\
  \ | 需要注意的是，类（或接口）不能被声明为 private 或 protected。此外，接口的成员方法或字段也不能被声明为 private 或 protected。\
  \ |\n\n重载\n\n现在让我们详细阐述一下上面“多态”部分中介绍的多态概念。\n\n多态可以有两种形式：*静态*和*动态*。当单个实体的不同形式在编译时被解析（*早期绑定*）时，这种多态称为*静态多态*。当单个实体的不同形式在运行时被解析（*晚期绑定*）时，这种多态称为*动态多态*。*重载*是静态多态的一个例子。\n\
  \n方法重载\n\n在一个类中，你可以定义多少个同名的方法？很多个！在 Java 中，你可以定义多个同名的方法，只要它们的参数列表互不相同。换句话说，如果你提供不同类型的参数、不同数量的参数，或者两者都不同，那么你就可以定义多个同名的方法。这个特性被称为*方法重载*。编译器会根据实际传递参数的数量和/或类型来解析对正确方法的调用。\n\
  \n在 FunPaint 应用程序中，你可以绘制和着色一个形状。假设你想给一个圆着色。你会如何定义一个可以实现此功能的方法？（请注意，任何颜色都可以通过以下两种方法之一来指定。）\n\
  \n1.  通过组合红、绿、蓝三种基本颜色。这种方法称为 RGB 方案。按照惯例，每个颜色值通常以 0 到 255 的范围给出。\n2.  通过给出色相、饱和度和亮度值。这种方法称为\
  \ HSB 方案。按照惯例，每个值通常以 0.0 到 1.0 的范围给出。\n\n让我们在 `Circle` 类中实现一个名为 `fillColor()` 的方法，该方法接受\
  \ RGB 或 HSB 值。由于 RGB 值是整数值，而 HSB 值是浮点数值，那么支持这两种方案来调用 `fillColor()` 方法怎么样？请参见 清单\
  \ 3-5。\n\n清单 3-5.  Circle.java\n\n```\nclass Circle {\n        // 其他成员\n       \
  \ public void fillColor (int red, int green, int blue) {\n                /* 使用\
  \ RGB 颜色值为圆着色 – 实际代码已省略 */\n        }\n\npublic void fillColor (float hue, float\
  \ saturation, float brightness) {\n                /* 使用 HSB 值为圆着色 – 实际代码已省略 */\n\
  \        }\n}\n```\n\n如你所见，两个 `fillColor()` 方法名称完全相同，并且都接受三个参数；然而，参数类型不同。基于在 `Circle`\
  \ 上调用 `fillColor()` 方法时使用的参数类型，编译器将决定具体调用哪个方法。例如，考虑以下方法调用：\n\n```\nCircle c1 = new\
  \ Circle(10, 20, 10);\nc1.fillColor(0, 255, 255);\n\nCircle c2 = new Circle(50,\
  \ 100, 5);\nc2.fillColor(0.5f, 0.5f, 1.0f);\n```\n\n在这段代码中，对于 `c1` 对象，对 `fillColor()`\
  \ 的调用具有整数参数 0、255 和 255。因此，编译器将此调用解析为方法 `fillColor (int red, int green, int blue)`。对于\
  \ `c2` 对象，对 `fillColor()` 的调用具有参数 0.5f、0.5f 和 1.0f；因此，它将此调用解析为 `fillColor (float\
  \ hue, float saturation, float brightness)`。\n\n在上面的例子中，方法 `fillColor()` 是一个重载方法。该方法具有相同的名称和相同数量的参数，但参数类型不同。也可以使用不同数量的参数来重载方法。\n\
  \n这种重载方法有助于避免在不同函数中重复相同的代码。让我们看看 清单 3-6 中的一个简单示例。\n\n清单 3-6.  HappyBirthday.java\n\
  \n```\nclass HappyBirthday {\n        // 重载的 wish 方法，以 String 作为参数\n        public\
  \ static void wish(String name) {\n                System.out.println(\"Happy birthday\
  \ \" + name + \"!\");\n        }\n\n// 重载的 wish 方法，无参数；此方法转而调用 wish(String) 方法\n\
  \        public static void wish() {\n                wish(\"to you\");\n      \
  \  }\n\npublic static void main(String []args) {\n                wish();\n    \
  \            wish(\"dear James Gosling\");\n        }\n}\n```\n\n它打印出：\n\n```\n\
  Happy birthday to you!\nHappy birthday dear James Gosling!\n```\n\n这里，方法 `wish(String\
  \ name)` 用于在知道人名时祝福“生日快乐”。默认方法 `wish()` 用于向任何人祝福“生日快乐”。如你所见，你不必在 `wish()` 方法中再次编写\
  \ `System.out.println`；你可以通过将默认值“to you”作为参数传递给 `wish()` 来重用 `wish(String)` 方法定义。这种重用对于大型且相关的方法定义非常有效，因为它节省了编写和测试相同代码的时间。\n\
  \n构造函数重载\n\n\n\n默认构造函数适用于创建具有默认初始化值的对象。当需要在不同实例化中使用不同值初始化对象时，可以将这些值作为参数传递给构造函数。没错，一个类中可以包含多个构造函数——这就是*构造函数重载*。在类中，默认构造函数可以用默认初始值初始化对象，而另一个构造函数则可以接收用于对象实例化的参数。\n\
  \n在 FunPaint 应用中，用户只需将 `Circle` 模板拖放到屏幕上即可创建 `Circle` 对象。在这种情况下，必须为拖放位置设置 `xPos`\
  \ 和 `yPos` 值，并为 `radius` 假定一个默认值（清单 3-7）。\n\n清单 3-7.  Circle.java\n\n```\n// 可以通过拖放圆形模板来创建\
  \ Circle 对象\n// 此时需要设置 x 和 y 位置，但可以假定一个默认的 radius 值\npublic Circle(int x, int y)\
  \ {\n        xPos = x;\n        yPos = y;\n        radius = 10; // 默认半径\n}\n```\n\
  \n让我们保留上一节关于默认构造函数中定义的 `toString()` 方法：\n\n```\npublic String toString() {\n   \
  \     return \"center = (\" + xPos + \",\" + yPos + \") and radius = \" + radius;\n\
  }\n```\n\n创建对象时，可以像下面这条语句一样传递参数：\n\n```\nSystem.out.println(new Circle(50, 100).toString());\n\
  ```\n\n上述语句会输出：\n\n```\ncenter = (50,100) and radius = 10\n```\n\n现在，你能看出以下构造函数实现有什么问题吗？\n\
  \n```\npublic Circle(int xPos, int yPos) {\n        xPos = xPos;\n        yPos =\
  \ yPos;\n        radius = 10; // 默认半径\n}\n\nSystem.out.println(new Circle(50, 100));\n\
  ```\n\n它会输出：\n\ncenter = (0, 0) and radius = 10\n\n发生了什么？你只是改变了上一个示例中构造函数的参数名称，它就不工作了！\n\
  \n语句 `xPos = xPos;` 就是罪魁祸首。你本意是想将成员变量 `xPos` 赋值为传入的参数值 `xPos`。然而，这条语句*重新赋值*了传入的参数值\
  \ `xPos`！传入的参数会被视为局部变量（作用域仅限于局部范围的变量）。如果局部变量与字段同名，局部变量会*隐藏*字段。\n\n| ![image](img/banana.jpg)\
  \ | 为了避免细微的错误，请避免在不同作用域中重复使用相同的变量名。 |\n\n如何解决这个问题？你可以重命名参数，而不是使用 `xPos`，比如用 `x`。或者你可以使用\
  \ `this` 来限定 `xPos` 的使用，如下所示：\n\n```\npublic Circle(int xPos, int yPos) {\n    \
  \    this.xPos = xPos;\n        this.yPos = yPos;\n        radius = 10; // 默认半径\n\
  }\n```\n\n在语句 `this.xPos = xPos;` 中，你显式地用 `this` 限定了变量 `xPos`，因此该语句的左侧（LHS）指向字段，右侧（RHS）指向参数名称。\n\
  \n| ![image](img/bulp.jpg) | 在实例方法或构造函数中访问字段时，请使用显式的 `this` 限定符，以避免变量名称引用产生歧义。 |\n\
  \n通过传递更多参数来创建 `Circle` 的另一个构造函数。你还需要传递 `radius` 值。\n\n```\npublic Circle(int x,\
  \ int y, int r) {\n        xPos = x;\n        yPos = y;\n        radius = r;\n}\
  \ \n```\n\n现在你将编写 `main()` 方法，并在其中创建一些 `Circle` 对象。你将实现 `toString()` 方法来打印圆心位置和半径（参见清单\
  \ 3-8）。\n\n清单 3-8.  Circle.java\n\n```\npublic class Circle {\n        private int\
  \ xPos;\n        private int yPos;\n        private int radius;\n\n// Circle 的三个重载构造函数\n\
  \        public Circle(int x, int y, int r) {\n                xPos = x;\n     \
  \           yPos = y;\n                radius = r;\n        }\n\npublic Circle(int\
  \ x, int y) {\n                xPos = x;\n                yPos = y;\n          \
  \      radius = 10; // 默认半径\n        }\n\npublic Circle() {\n                xPos\
  \ = 20; // 为 xPos 和 yPos 假定一些默认值\n                yPos = 20;\n                radius\
  \ = 10; // 默认半径\n        }\n\npublic String toString() {\n                return\
  \ \"center = (\" + xPos + \",\" + yPos + \") and radius = \" + radius;\n       \
  \ }\n\npublic static void main(String[]s) {\n                System.out.println(new\
  \ Circle());\n                System.out.println(new Circle(50, 100));\n       \
  \         System.out.println(new Circle(25, 50, 5));\n        }\n}\n```\n\n该程序会输出：\n\
  \n```\ncenter = (20,20) and radius = 10\ncenter = (50,100) and radius = 10\ncenter\
  \ = (25,50) and radius = 5\n```\n\n如你所见，编译器根据参数的数量解析了构造函数调用。你是否注意到你在三个构造函数中重复了相同的代码？为了避免代码重复——并减少你的输入工作量——你可以从一个构造函数中调用另一个构造函数。在这三个构造函数中，接受\
  \ x 位置、y 位置和半径的构造函数是最通用的构造函数。其他两个构造函数可以重写为调用三个参数的构造函数，如下所示：\n\n```\npublic Circle(int\
  \ x, int y, int r) {\n        xPos = x;\n        yPos = y;\n        radius = r;\n\
  }\n\npublic Circle(int x, int y) {\n        this(x, y, 10); // 传递默认半径 10\n}\n\n\
  public Circle() {\n        this(20, 20, 10);\n        // 为 xPos、yPos 和 radius 假定一些默认值\n\
  }\n```\n\n输出结果与上一个程序完全相同，但这个程序更简短；你使用了 `this` 关键字从同一个类的另一个构造函数中调用一个构造函数。\n\n重载解析\n\
  \n当你定义重载方法时，编译器如何知道调用哪个方法？你能猜出清单 3-9 中代码的输出吗？\n\n清单 3-9.  Overloaded.java\n\n```\n\
  class Overloaded {\n        public static void aMethod (int val)            { System.out.println\
  \ (\"int\");    }\n        public static void aMethod (short val)          { System.out.println\
  \ (\"short\");  }\n        public static void aMethod (Object val)         { System.out.println\
  \ (\"object\"); }\n        public static void aMethod (String val )        { System.out.println\
  \ (\"String\"); }\n\npublic static void main(String[] args) {\n                byte\
  \ b = 9;\n                aMethod(b);     // 第一次调用\n                aMethod(9);\
  \     // 第二次调用\n                Integer i = 9;\n                aMethod(i);    \
  \ // 第三次调用\n                aMethod(\"9\");   // 第四次调用\n        }\n}\n```\n\n它会输出：\n\
  \n```\nshort\nint\nobject\nString\n```\n\n以下是编译器解析这些调用的方式：\n\n*   在第一次方法调用中，语句是\
  \ `aMethod(b)`，其中变量 `b` 的类型是 `byte`。没有接受 `byte` 作为参数的 `aMethod` 定义。最接近的类型（按大小）是\
  \ `short` 类型，而不是 `int`，因此编译器将调用 `aMethod(b)` 解析为 `aMethod(short val)` 定义。\n*   在第二次方法调用中，语句是\
  \ `aMethod(9)`。常量值 9 的类型是 `int`。最匹配的是 `aMethod(int)`，因此编译器将调用 `aMethod(9)` 解析为 `aMethod(int\
  \ val)` 定义。\n*   第三次方法调用是 `aMethod(i)`，其中变量 `i` 的类型是 `Integer`。没有接受 `Integer` 作为参数的\
  \ `aMethod` 定义。最匹配的是 `aMethod(Object val)`，因此会调用它。为什么不是 `aMethod(int val)`？为了找到最匹配项，编译器允许隐式向上转型，而不是向下转型，因此不考虑\
  \ `aMethod(int val)`。\n*   最后一次方法调用是 `aMethod(\"9\")`。参数是 `String` 类型。由于存在精确匹配，因此会调用\
  \ `aMethod(String val)`。\n\n\n\n编译器尝试从给定的重载方法定义中*解析*方法调用的过程称为*重载解析*。在解析方法调用时，它首先寻找*精确*匹配——即参数数量和参数类型完全相同的方法定义。如果找不到精确匹配，它会通过向上转型来寻找*最接近的匹配*。如果编译器找不到任何匹配，就会产生编译错误，如清单\
  \ 3-10 所示。\n\n清单 3-10.  More Overloaded.java\n\n```\nclass Overloaded {\n      \
  \  public static void aMethod (byte val )  { System.out.println (\"byte\");  }\n\
  \        public static void aMethod (short val ) { System.out.println (\"short\"\
  ); }\n\npublic static void main(String[] args) {\n                aMethod(9);\n\
  \        }\n}\n```\n\n以下是编译器报错信息：\n\n```\nOverloaded.java:6: cannot find symbol\n\
  symbol  : method aMethod(int)\nlocation: class Overloaded\n                aMethod(9);\n\
  \                ^\n1 error\n```\n\n常量 9 的类型是 `int`，因此对于调用 `aMethod(9)` 来说，没有匹配的\
  \ `aMethod` 定义。正如你之前看到的关于重载解析的内容，编译器可以进行向上转型（例如，`byte` 转 `int`）来寻找最接近的匹配，但它不考虑向下转型（例如，本例中的\
  \ `int` 转 `byte` 或 `int` 转 `short`）。因此，编译器找不到任何匹配，并抛出一个错误。\n\n如果编译器找到了两个匹配项呢？这也会导致错误！清单\
  \ 3-11 展示了一个例子。\n\n清单 3-11.  Two Matches in Overloaded.java\n\n```\nclass Overloaded\
  \ {\n        public static void aMethod (long val1, int val2) {\n              \
  \  System.out.println (\"long, int\");\n        }\n\npublic static void aMethod\
  \ (int val1, long val2) {\n                System.out.println (\"int, long\");\n\
  \        }\n\npublic static void main(String[] args) {\n                aMethod(9,\
  \ 10);\n        }\n}\n```\n\n以下是编译器报错信息：\n\n```\nOverloaded.java:6: reference to\
  \ aMethod is ambiguous, both method aMethod(long,java.lang.Integer) in Overloaded\
  \ and method aMethod(java.lang.Integer,long) in Overloaded match\n             \
  \   aMethod(9, 10);\n                ^\n1 error\n```\n\n为什么这个调用变成了“模棱两可”的调用？常量 9\
  \ 和 10 是 `int` 类型。有两个 `aMethod` 定义：一个是 `aMethod(long, int)`，另一个是 `aMethod(int, long)`。因此，对于调用\
  \ `aMethod(int, int)` 来说，没有精确匹配。一个整数可以隐式向上转型为 `long` 和 `Integer`。编译器会选择哪一个呢？由于有两个匹配项，编译器会报错，指出该调用是模棱两可的。\n\
  \n| ![image](img/banana.jpg) | 如果没有匹配项或存在模棱两可的匹配，重载解析就会失败（并产生编译错误）。 |\n\n要点记忆\n\n\
  以下是关于方法重载的一些有趣规则，这些规则将帮助你准备 OCPJP 考试：\n\n*   重载解析完全发生在编译时。在下一节中，你将学习*运行时多态*，其中方法调用在运行时解析。\n\
  *   你不能仅凭返回类型不同来重载方法。\n*   你不能仅凭异常规范不同来重载方法。\n*   要使重载解析成功，你需要定义方法，使得编译器找到一个精确匹配。如果编译器对你的调用找不到任何匹配，或者匹配是模棱两可的，则重载解析失败，编译器会发出错误。\n\
  \n| ![image](img/bulp.jpg) | 方法的*签名*由方法名、参数数量和参数类型组成。你可以用相同的方法名但不同的签名来重载方法。由于返回类型和异常规范不是签名的一部分，因此你不能仅凭返回类型或异常规范来重载方法。\
  \ |\n\n继承\n\n面向对象编程支持的一个重要特性是使用继承进行知识的层次化分类。层次化模型易于理解。例如，你可以将车辆逻辑分类为两轮车、三轮车、四轮车等。在四轮车类别中，有轿车、面包车、公交车、卡车等。在轿车类别中，有掀背车、轿车、SUV\
  \ 等。当你进行层次化分类时，就更容易理解、建模和编写程序。在 OOP 中，你可以使用继承轻松创建这样的层次结构。\n\n考虑前面章节中使用的一个简单例子：类\
  \ `Shape` 是基类，而 `Circle` 和 `Square` 是派生类。换句话说，`Circle` 是一种 `Shape`；同样地，`Square`\
  \ 也是一种 `Shape`。因此，继承关系可以被称为*is-a 关系*。\n\n在 Java 库中，你可以看到继承的广泛使用。图 3-3 展示了 `java.lang`\
  \ 库中的部分继承层次结构。`Number` 类抽象了各种数值（引用）类型，例如 `Byte`、`Integer`、`Float`、`Double`、`Short`\
  \ 和 `BigDecimal`。\n\n![9781430247647_Fig03-03.jpg](img/9781430247647_Fig03-03.jpg)\n\
  \n图 3-3.  java.lang 包中的部分继承层次结构\n\n`Number` 类有许多派生类继承的通用方法。派生类不必实现 `Number` 类已实现的通用方法。此外，你可以在需要基类型的地方提供派生类型。例如，`Byte`\
  \ 是一种 `Number`，这意味着你可以在需要 `Number` 对象的地方提供一个 `Byte` 对象。当你为基类型编写方法时，你可以编写通用目的的方法（或算法）。清单\
  \ 3-12 展示了一个简单的例子。\n\n清单 3-12.  TestNumber.java\n\n```\npublic class TestNumber\
  \ {\n        // take an array of numbers and sum them up\n        public static\
  \ double sum(Number []nums) {\n                double sum = 0.0;\n             \
  \   for(Number num : nums) {\n                       sum += num.doubleValue();\n\
  \                }\n                return sum;\n        }\n\npublic static void\
  \ main(String []s) {\n                // Create a Number array\n               \
  \ Number []nums = new Number[4];\n                // assign derived class objects\n\
  \                nums[0] = new Byte((byte)10);\n                nums[1] = new Integer(10);\n\
  \                nums[2] = new Float(10.0f);\n                nums[3] = new Double(10.0f);\n\
  \                // pass the Number array to sum and print the result\n        \
  \        System.out.println(\"The sum of numbers is: \" + sum(nums));\n        }\n\
  }\n```\n\n该程序输出\n\n```\nThe sum of numbers is: 40.0\n```\n\n在 `main()` 方法中，你将 `nums`\
  \ 声明为 `Number[]`。一个 `Number` 引用可以持有其任何派生类型的对象。你正在创建类型为 `Byte`、`Integer`、`Float`\
  \ 和 `Double` 的对象，初始值为 10；`nums` 数组持有这些元素。（注意，你需要使用 `new Byte( (byte) 10)` 进行显式转换，而不是简单的\
  \ `Byte(10)`，因为 `Byte` 接受一个 `byte` 参数，而 10 是一个 `int`。）\n\n`sum` 方法接受一个 `Number[]`\
  \ 并返回 `Number` 元素的总和。`double` 类型可以容纳最大范围的值，因此你使用 `double` 作为 `sum` 方法的返回类型。`Number`\
  \ 有一个 `doubleValue` 方法，该方法将 `Number` 持有的值作为 `double` 值返回。`for` 循环遍历数组，累加 `double`\
  \ 值，然后在完成后返回 `sum`。\n\n如你所见，`sum()` 方法是一个通用方法，可以处理任何 `Number[]`。Java 标准库中也有一个类似的例子，其中\
  \ `java.lang.Arrays` 类有一个静态方法 `binarySearch()`：\n\n```\nstatic int binarySearch(Object[]\
  \ a, Object key, Comparator c)\n```\n\n\n\n该方法在给定的 `Objects` 数组中搜索指定的键（`Object`\
  \ 类型）。`Comparator` 是一个声明了 `equals` 和 `compare` 方法的接口。你可以对任何实现了该 `Comparator` 接口的类类型的对象使用\
  \ `binarySearch`。如你所见，继承是编写通用方法时一个强大且有用的特性。\n\n在 FunPaint 示例中，基类型 `Shape` 与其派生类型（如\
  \ `Circle` 和 `Square`）之间存在继承关系。通过继承将这些类关联起来有什么好处？\n\n假设 FunPaint 用户可以从菜单中选择刷新（即重绘）选项来刷新图形。如果\
  \ `Shape` 基类声明了一个 `refresh()` 方法，那么所有派生类都可以实现 `refresh()` 方法。一旦所有派生类都实现了 `refresh()`\
  \ 方法，刷新所有图形就变得容易了。\n\n```\nvoid refreshAll(Shapes[]shapes) {\n        for(Shape\
  \ shape: shapes)        // 遍历所有图形\n                shape.refresh();        // 调用刷新方法\n\
  }\n```\n\n现在，如果你调用 `refreshAll()` 方法并传入包含屏幕上所有已绘制 `Shapes` 的数组，整个绘图将被刷新。之所以能编写出这样的通用方法，完全是因为“is-a”关系。\n\
  \n运行时多态\n\n你刚刚了解到，基类引用可以指向派生类对象。你可以通过基类引用调用方法；然而，实际的方法调用取决于基类引用所指向对象的动态类型。基类引用的类型被称为对象的*静态类型*，而引用在运行时实际指向的对象被称为对象的*动态类型*。\n\
  \n当编译器看到通过基类引用调用方法时，如果该方法是一个可重写的方法（非静态且非 final 的方法），编译器会将确定具体调用哪个方法的决定推迟到运行时（后期绑定）。在运行时，根据对象的实际动态类型，会调用相应的方法。这种机制被称为*动态方法解析*或*动态方法调用*。\n\
  \n一个示例\n\n假设你在 `Shape` 类中有一个 `area()` 方法。根据派生类（例如 `Circle` 或 `Square`），`area()`\
  \ 方法会有不同的实现，如清单 3-13 所示。\n\n清单 3-13.  TestShape.java\n\n```\n// Shape.java\nclass\
  \ Shape {\n        public double area() { return 0; } // 默认实现\n        // 其他成员\n\
  }\n\n// Circle.java\nclass Circle extends Shape {\n        private int radius;\n\
  \        public Circle(int r) { radius = r; }\n        // 其他构造器\n        public\
  \ double area() { return Math.PI * radius * radius; }\n        // 其他声明\n}\n\n//\
  \ Square.java\nclass Square extends Shape {\n        private int side;\n       \
  \ public Square(int a) { side = a; }\n        public double area() { return side\
  \ * side; }\n        // 其他声明\n}\n\n// TestShape.java\nclass TestShape {\n      \
  \  public static void main(String []args) {\n                Shape shape1 = new\
  \ Circle(10);\n                System.out.println(shape1.area());\n            \
  \    Shape shape2 = new Square(10);\n                System.out.println(shape2.area());\n\
  \        }\n}\n```\n\n该程序输出\n\n```\n314.1592653589793\n100.0\n```\n\n这个程序说明了 `area()`\
  \ 方法是如何根据 `Shape` 的动态类型被调用的。在这段代码中，语句 `shape1.area();` 调用了 `Circle` 的 `area()` 方法，而语句\
  \ `shape2.area();` 调用了 `Square` 的 `area()` 方法，因此得到了上述结果。\n\n现在，让我们提出一个更根本的问题：为什么需要重写方法？在面向对象编程中，继承的基本思想是在基类中提供默认或通用的功能；派生类则期望提供更具体的功能。在这个\
  \ `Shape` 基类以及 `Circle` 和 `Square` 派生类中，`Shape` 提供了 `area()` 方法的默认实现。`Circle` 和\
  \ `Square` 派生类定义了它们自己版本的 `area()` 方法，覆盖了基类的 `area()` 方法。因此，根据你创建的派生对象类型，通过基类引用对\
  \ `area()` 方法的调用将被解析为正确的方法。重写（即运行时多态）是扩展功能的一个简单而强大的思想。\n\n让我们再看一个在 `Point` 类中重写\
  \ `Object` 的 `toString()` 方法的例子。但在这样做之前，让我们先探讨一下如果你*不*重写 `toString()` 方法会发生什么，如清单\
  \ 3-14 所示。\n\n清单 3-14.  Point.java\n\n```\nclass Point {\n        private int xPos,\
  \ yPos;\n\npublic Point(int x, int y) {\n                xPos = x;\n           \
  \     yPos = y;\n        }\n\npublic static void main(String []args) {\n       \
  \         // 将 Point 对象传递给 println 会自动调用 toString 方法\n                System.out.println(new\
  \ Point(10, 20));\n        }\n}\n```\n\n它输出\n\n```\nPoint@19821f\n```\n\n`toString()`\
  \ 方法定义在 `Object` 类中，Java 中的所有类都继承自该类。以下是 `Object` 类中定义的 `toString()` 方法的概述：\n\n\
  ```\npublic String toString()\n```\n\n`toString()` 方法不接受任何参数，并返回对象的 `String` 表示形式。该方法的默认实现返回\
  \ `ClassName@hex` 形式的对象哈希码。这就是为什么你会得到这种难以阅读的输出。请注意，这个十六进制值对于每个实例都是不同的，所以如果你尝试运行这个程序，你会得到不同的十六进制值作为输出。例如，当我们再次运行这个程序时，我们得到了这个输出：`Point@affc70`。\n\
  \n当你创建新类时，你应该重写此方法以返回你期望的类的文本表示形式。清单 3-15 展示了 `Point` 类的一个改进版本，其中重写了 `toString()`\
  \ 方法。\n\n清单 3-15.  改进的 Point.java\n\n```\n// Point 类的改进版本，重写了 toString 方法\nclass\
  \ Point {\n        private int xPos, yPos;\n\npublic Point(int x, int y) {\n   \
  \             xPos = x;\n                yPos = y;\n        }\n\n// 这个 toString\
  \ 方法覆盖了 Object 基类中提供的默认 toString 方法实现\n        public String toString() {\n    \
  \            return \"x = \" + xPos + \", y = \" + yPos;\n        }\n\npublic static\
  \ void main(String []args) {\n                System.out.println(new Point(10, 20));\n\
  \        }\n}\n```\n\n这个程序现在输出\n\n```\nx = 10, y = 20\n```\n\n这正如你所期望的那样，清晰多了。为了更清楚，这里是这个\
  \ `Point` 类实现中 `main()` 方法的一个略有不同的版本：\n\n```\n public static void main(String []args)\
  \ {\n        Object obj = new Point(10, 20);\n        System.out.println(obj);\n\
  }\n```\n\n它输出\n\n```\nx = 10, y = 20\n```\n\n这里，`obj` 变量的静态类型是 `Object` 类，而对象的动态类型是\
  \ `Point`。`println` 语句调用了 `obj` 变量的 `toString()` 方法。在这里，由于运行时多态，调用了派生类（即 `Point`\
  \ 的 `toString()` 方法）的 `toString()` 方法。\n\n重写问题\n\n在重写时，你需要注意访问级别、方法名称及其签名。以下是刚刚讨论的\
  \ `Point` 类中的 `toString()` 方法：\n\n\n\n```\npublic String toString() {\n        return\
  \ \"x = \" + xPos + \", y = \" + yPos;\n}\n```\n\n在这个方法定义中，将访问修饰符从 `public` 改为 `protected`\
  \ 会怎样？能正常工作吗？\n\n```\nprotected String toString() {\n        return \"x = \" + xPos\
  \ + \", y = \" + yPos;\n}\n```\n\n不行，这样不行。进行此修改后，编译器会报错：\n\n```\nPoint.java:8: toString()\
  \ in Point cannot override toString() in java.lang.Object; attempting to assign\
  \ weaker access privileges; was public\n```\n\n在重写方法时，你可以提供更强的访问权限，但不能提供更弱的访问权限；否则会导致编译错误。\n\
  \n下面是 `toString()` 方法的另一个略微修改的版本。它能正常工作吗？\n\n```\npublic Object toString() {\n \
  \       return \"x = \" + xPos + \", y = \" + yPos;\n}\n```\n\n你会得到以下编译器错误：\n\n\
  ```\nPoint.java:8: toString() in Point cannot override toString() in java.lang.Object;\
  \ attempting to use incompatible return type. Found: java.lang.Object. Required:\
  \ java.lang.String.\n```\n\n在这种情况下，由于返回类型不匹配，你遇到了编译错误，因为重写方法中的返回类型必须与基类方法完全相同。\n\
  \n下面是另一个例子：\n\n```\npublic String ToString() {\n        return \"x = \" + xPos +\
  \ \", y = \" + yPos;\n}\n```\n\n现在编译器不再报错。但这是一个名为 `ToString` 的新方法，它与 `Object` 类中的\
  \ `toString` 方法无关。因此，这个 `ToString` 方法*并没有*重写 `toString` 方法。\n\n请牢记以下几点，以确保正确重写。重写方法：\n\
  \n*   应具有与基类版本*相同的参数列表类型（或兼容类型）*。\n*   应具有*相同的返回类型*。\n\n*   但从 Java 5 开始，返回类型可以是子类——即协变返回类型（你很快就会学到）。\n\
  *   不应使用比基类版本*更严格的访问修饰符*。\n\n*   但可以使用限制更少的访问修饰符。\n\n*   不应抛出新的或更宽泛的受检异常。\n\n* \
  \  但可以抛出更少或更窄的受检异常，或任何非受检异常。\n\n*   还有，哦对了，方法名必须完全匹配！\n\n请记住，如果你没有继承某个方法，就不能重写它。私有方法不能被重写，因为它们不会被继承。\n\
  \n| ![image](img/Note.jpg) | 基类方法和重写方法的签名必须兼容，重写才能发生。 |\n\n| ![image](img/pencil.jpg)\
  \ | 不正确的重写是 Java 程序中常见的错误来源。在回答与重写相关的问题时，要留意重写中的错误或问题。 |\n\n协变返回类型\n\n你知道，在重写方法时，方法的返回类型必须完全匹配。然而，借助\
  \ Java 5 引入的协变返回类型特性，你可以在重写方法中提供返回类型的派生类。嗯，这很棒，但为什么需要这个特性呢？来看看这些具有相同返回类型的重写方法：\n\
  \n```\nabstract class Shape {\n     // 其他方法...\n     public abstract Shape copy();\n\
  }\n\nclass Circle extends Shape {\n     // 其他方法...\n     public Circle(int x, int\
  \ y, int radius) { /* 在此处初始化字段 */ }\n     public Shape copy() { /* 返回此对象的副本 */ }\n\
  }\n\nclass Test {\n     public static void main(String []args) {\n             Circle\
  \ c1 = new Circle(10, 20, 30);\n             Circle c2 = c1.copy();\n     }\n}\n\
  ```\n\n这段代码会引发编译错误：`\"Type mismatch: cannot convert from Shape to Circle\"`。这是因为在赋值语句\
  \ `\"Circle c2 = c1.copy();\"` 中缺少从 `Shape` 到 `Circle` 的显式向下转型。\n\n由于你清楚地知道要将 `Circle`\
  \ 的 `copy` 方法返回的 `Circle` 对象赋值给变量，你可以通过显式强制转换来修复编译错误：\n\n```\nCircle c2 = (Circle)\
  \ c1.copy();\n```\n\n由于提供这种（或多或少毫无意义的）向下转型很繁琐，Java 提供了协变返回类型，允许你在重写方法中给出返回类型的派生类。换句话说，你可以像这样修改\
  \ `copy` 方法的定义：\n\n```\npublic Circle copy() { /* 返回此对象的副本 */ }\n```\n\n现在，`main`\
  \ 方法中的赋值语句 `Circle c2 = c1.copy();` 是有效的，并且不需要显式向下转型（这很好）。\n\n重写：深入探讨\n\n深入理解方法重写很重要，所以让我们更详细地探讨一下。让我们在\
  \ `Point` 类中使用重写的 `equals` 方法。在此之前，先看一下 `Object` 类中 `equals()` 方法的签名：\n\n```\npublic\
  \ boolean equals(Object obj)\n```\n\n`Object` 类中的 `equals()` 方法是一个可重写的方法，它接受 `Object`\
  \ 类型作为参数。它检查当前对象的内容与传入的 `obj` 参数是否相等。如果相等，`equals()` 返回 true；否则返回 false。\n\n现在，让我们看看\
  \ 清单 3-16 中的 `Point` 类是否正确重写了 `equals()` 方法。\n\n清单 3-16.  Point.java\n\n```\npublic\
  \ class Point {\n        private int xPos, yPos;\n\npublic Point(int x, int y) {\n\
  \                xPos = x;\n                yPos = y;\n        }\n\n// 重写 equals\
  \ 方法以执行\n        // 两个 Point 对象的“深度”比较\n        public boolean equals(Point other){\n\
  \                if(other == null)\n                        return false;\n    \
  \            // 两个点相等仅当它们的 x 和 y 位置相等\n                if( (xPos == other.xPos)\
  \ && (yPos == other.yPos) )\n                        return true;\n            \
  \    else\n                        return false;\n        }\n\npublic static void\
  \ main(String []args) {\n                Point p1 = new Point(10, 20);\n       \
  \         Point p2 = new Point(50, 100);\n                Point p3 = new Point(10,\
  \ 20);\n                System.out.println(\"p1 equals p2 is \" + p1.equals(p2));\n\
  \                System.out.println(\"p1 equals p3 is \" + p1.equals(p3));\n   \
  \     }\n}\n```\n\n这会输出：\n\n```\np1 equals p2 is false\np1 equals p3 is true\n```\n\
  \n输出符合预期，那么这个 `equals()` 实现正确吗？不！让我们对 `main()` 方法做如下轻微修改：\n\n```\npublic static\
  \ void main(String []args) {\n        Object p1 = new Point(10, 20);\n        Object\
  \ p2 = new Point(50, 100);\n        Object p3 = new Point(10, 20);\n        System.out.println(\"\
  p1 equals p2 is \" + p1.equals(p2));\n        System.out.println(\"p1 equals p3\
  \ is \" + p1.equals(p3));\n}\n```\n\n现在它输出：\n\n```\np1 equals p2 is false\np1 equals\
  \ p3 is false\n```\n\n为什么？两个 `main()` 方法是等价的。然而，这个新的 `main()` 方法使用 `Object` 类型来声明\
  \ `p1`、`p2` 和 `p3`。这三个变量的动态类型是 `Point`，所以它应该调用重写后的 `equals()` 方法。但是，重写是错误的，因此 `main()`\
  \ 方法调用了基类版本，即 `Object` 类中 `Point` 的默认实现！\n\n| ![image](img/banana.jpg) | 如果基类方法和重写方法的名称或签名不匹配，会导致微妙的错误。因此，请确保它们完全相同。\
  \ |\n\n`equals()` 方法应该使用 `Object` 作为参数，而不是 `Point` 参数！`Point` 类中 `equals()` 方法的当前实现*隐藏*了（*而不是*重写）`Object`\
  \ 类的 `equals()` 方法。\n\n\n\n为了克服重载中的细微问题，你可以使用 Java 5 引入的 `@Override` 注解。该注解向 Java\
  \ 编译器明确表达了程序员使用方法重写的意图。如果编译器对你的重写方法不满意，它会发出警告，这对你来说是一个有用的提醒。此外，该注解使程序更易于理解，因为方法定义前的\
  \ `@Override` 注解有助于你理解自己正在重写一个方法。\n\n以下是 `equals` 方法带有 `@Override` 注解的代码：\n\n```\n\
  @Override\npublic boolean equals(Point other) {\n        if(other == null)\n   \
  \                     return false;\n        // 两个点相等仅当它们的 x 和 y 位置相等\n        if(\
  \ (xPos == other.xPos) && (yPos == other.yPos) )\n                        return\
  \ true;\n        else\n                return false;\n}\n```\n\n现在这段代码会得到一个编译器错误：“类型为\
  \ Point 的方法 `equals(Point)` 必须重写或实现超类型方法”。如何修复它？你需要将 `Object` 类型传递给 `equals` 方法的参数。清单\
  \ 3-17 展示了修复后的 `equals` 方法的程序。\n\n清单 3-17.  修复后的 Point.java\n\n```\npublic class\
  \ Point {\n        private int xPos, yPos;\n\npublic Point(int x, int y) {\n   \
  \             xPos = x;\n                yPos = y;\n        }\n\n// 重写 equals 方法以对两个\
  \ Point 对象进行“深度”比较\n        @Override\n        public boolean equals(Object other)\
  \ {\n                if(other == null)\n                        return false;\n\n\
  // 检查 'other' 的动态类型是否为 Point\n                // 如果 'other' 是除 'Point' 之外的任何其他类型，则两个对象不可能相等\n\
  \                // 如果 'other' 是 Point 类型（或其派生类之一），则\n                // 将对象向下转型为\
  \ Point 类型，然后比较成员是否相等\n                if(other instanceof Point) {\n          \
  \                Point anotherPoint = (Point) other;\n                         \
  \ // 两个点相等仅当它们的 x 和 y 位置相等\n                          if( (xPos == anotherPoint.xPos)\
  \ && (yPos == anotherPoint.yPos) )\n                          return true;\n   \
  \             }\n                return false;\n        }\n\npublic static void\
  \ main(String []args) {\n                Object p1 = new Point(10, 20);\n      \
  \          Object p2 = new Point(50, 100);\n                Object p3 = new Point(10,\
  \ 20);\n                System.out.println(\"p1 equals p2 is \" + p1.equals(p2));\n\
  \                System.out.println(\"p1 equals p3 is \" + p1.equals(p3));\n   \
  \     }\n}\n```\n\n现在这个程序输出：\n\n```\np1 equals p2 is false\np1 equals p3 is true\n\
  ```\n\n这是预期的输出，并且 `equals` 方法的实现是正确的。\n\n调用超类方法\n\n在重写的方法中调用基类方法通常很有用。为此，你可以使用 `super`\
  \ 关键字。在派生类构造函数中，你可以使用 `super` 关键字调用基类构造函数。如果使用，这样的调用应该是构造函数中的*第一条语句*。你也可以使用 `super`\
  \ 关键字来引用基类成员。在这些情况下，它不必是方法体中的第一条语句。让我们看一个例子。\n\n你实现了一个 `Point` 类，它是一个二维点：它有 x 和\
  \ y 位置。你也可以实现一个具有 x、y 和 z 位置的三维点类。为此，你不需要从头开始实现：你可以扩展二维点并在三维点类中添加 z 位置。首先，你将 `Point`\
  \ 类的简单实现重命名为 `Point2D`。然后，你将通过扩展这个 `Point2D` 来创建 `Point3D` 类（参见清单 3-18）。\n\n清单 3-18.\
  \  Point3D.java\n\n```\n// Point2D.java\nclass Point2D {\n        private int xPos,\
  \ yPos;\n        public Point2D(int x, int y) {\n                xPos = x;\n   \
  \             yPos = y;\n        }\n\npublic String toString() {\n             \
  \   return \"x = \" + xPos + \", y = \" + yPos;\n        }\n\npublic static void\
  \ main(String []args) {\n                System.out.println(new Point2D(10, 20));\n\
  \        }\n}\n\n//Point3D.java\n\n// 以下是我们如何通过扩展 Point2D 类来创建 Point3D 类\npublic\
  \ class Point3D extends Point2D {\n        private int zPos;\n\n// 提供一个接受三个参数（x、y\
  \ 和 z 值）的公共构造函数\n        public Point3D(int x, int y, int z) {\n               \
  \ // 调用带有两个参数的超类构造函数\n                // 即，从 Point2D(int, int, int) 构造函数调用 Point2D(int,\
  \ int)\n                super(10, 20); // 注意 super 是方法中的第一条语句\n                zPos\
  \ = z;\n        }\n\n// 也重写 toString 方法\n        public String toString() {\n  \
  \              return super.toString() + \", z = \" + zPos;\n        }\n\n// 测试我们是否正确扩展了，调用\
  \ Point3D 对象的 toString 方法\n        public static void main(String []args) {\n  \
  \              System.out.println(new Point3D(10, 20, 30));\n        }\n}\n```\n\
  \n在类 `Point2D` 中，类成员 `xPos` 和 `yPos` 是私有的，因此你不能直接访问它们来在 `Point3D` 构造函数中初始化它们。但是，你可以使用\
  \ `super` 关键字调用超类构造函数并传递参数。这里，`super(10, 20);` 调用了基类构造函数 `Point2D(int, int)`。这个对超类构造函数的调用应该是第一条语句；如果你在\
  \ `zPos = z;` 之后调用它，你会得到一个编译器错误：\n\n```\npublic Point3D(int x, int y, int z) {\n\
  \        zPos = z;\n        super(10, 20);\n}\n\nPoint3D.java:19: 对 super 的调用必须是构造函数中的第一条语句\n\
  \                super(10, 20);\n```\n\n类似地，你可以在派生类 `Point3D` 的 `toString()` 实现中使用\
  \ `super` 关键字调用基类 `Point2D` 的 `toString()` 方法。\n\n类型转换\n\nJava 是一种*强类型*语言：它执行严格的类型检查，以确保你只进行有效的转换。如果你执行一些明显无效的强制转换，编译器会给出编译器错误。如果编译器没有捕获到无效的强制转换，则会导致运行时问题或异常。因此，在执行类型转换时需要小心。\n\
  \n向上转型和向下转型\n\n你可以将派生对象赋值给基类型引用，而无需执行任何显式强制转换：这就是*向上转型*。相反，如果你需要将其放回派生类型，则需要显式强制转换：这就是*向下转型*。让我们通过简单的例子详细检查这两种类型的强制转换。\n\
  \n在 Java 中，每个类都派生自 `Object` 基类。因此，你可以将任何对象放入 `Object` 引用中，并且它永远不会失败。\n\n```\nString\
  \ str1 = \"Hello world\";\nObject obj = str1; // 不需要显式强制转换——此类转换永远不会失败\n```\n\n\
  但是，如果你从 `Object` 引用转换为某个派生类型（例如 `String`），则可能会失败。为什么？因为，通常，`Object` 引用可以保存任何类型的对象，并且它可能不是你向下转型的目标类型。\n\
  \n```\nString str2 = obj;\n```\n\n对于此语句，你会得到以下错误：\n\n```\n编译器错误 - 不兼容的类型\n找到   :\
  \ java.lang.Object\n需要: java.lang.String\n```\n\n要修复此问题，你需要使用显式的向下转型为 `String`，如下所示：\n\
  \n```\nString str2 = (String) obj;\n```\n\n当你执行此类显式类型转换（向下转型）时，你有责任确保向下转型是有效的。否则，你会得到一个运行时异常。考虑清单\
  \ 3-19 中的程序。你能说出它的输出吗？\n\n清单 3-19.  Downcast.java\n\n\n\n```\n// 理解向下转型为何会失败的代码\n\
  class Downcast {\n        public static void main(String []args) {\n           \
  \     Integer i = new Integer(10);\n                // 向上转型 - 没问题，且总会成功\n      \
  \          Object obj = i;\n                // 向下转型 - 会成功吗？失败时会发生什么？\n         \
  \       String str = (String) obj;\n        }\n}\n```\n\n该程序会因运行时异常而崩溃：\n\n```\n\
  Exception in thread \"main\" java.lang.ClassCastException: java.lang.Integer cannot\
  \ be cast to java.lang.String\n        at Downcast.main(Downcast.java:6)\n```\n\n\
  在这个程序中，你首先让 `Integer` 类型的变量 `i` 指向一个 `Object` 类型的变量 `obj`。这种类型转换是向上转型，因此没有问题，因为这种转换总会成功。现在，当你尝试将\
  \ `Object` 类型的变量转换为 `String` 类型时，这就是向下转型。编译器并不知道 `obj` 变量所指向对象的动态类型（而你知道 `obj` 指向的变量的动态类型是\
  \ `Integer` 类型）。通过显式类型转换，你强制编译器进行从 `Object` 类型到 `String` 类型的转换。由于 `Integer` 类型无法转换为\
  \ `String` 类型，向下转型失败，并抛出 `ClassCastException`。\n\n| ![image](img/banana.jpg) | 向上转型总会成功，因此你无需担心。然而，向下转型可能会因运行时异常而失败，所以在进行向下转型时需要小心。\
  \ |\n\n与向下转型不同，无效的转换可以被编译器本身检测到。我们接下来将讨论这个主题。\n\n不可转换类型之间的转换\n\n`String` 和 `StringBuffer`\
  \ 都继承自 `Object` 类。但你无法直接将 `String` 转换为 `StringBuffer`，反之亦然。例如，有人可能会错误地写出如下代码：\n\n\
  ```\nObject obj = new StringBuffer(\"Hello\");\nString str2 = (String) obj;\n```\n\
  \n编译会成功，但此转换会在运行时失败：\n\n```\n'Exception in thread \"main\" java.lang.ClassCastException:\
  \ java.lang.StringBuffer cannot be cast to java.lang.String'.\n```\n\n在这个例子中，你首先将一个\
  \ `StringBuffer` 对象放入 `Object` 类型中，然后尝试将其转换回 `String`。那么，直接从 `StringBuffer` 转换为\
  \ `String` 呢？这会导致编译器错误/警告，还是运行时异常？\n\n```\n String str = (String) new StringBuffer(\"\
  Hello\");\n```\n\n你会得到一个编译器错误，因为无法从 `StringBuffer` 转换为 `String`：\n\n```\nCast.java:4:\
  \ inconvertible types found : java.lang.StringBuffer required: java.lang.String\n\
  ```\n\n那么，对于目标类型是 `StringBuffer` 但中间转换是 `String` 的这条语句呢？\n\n```\nStringBuffer str\
  \ = (String) new StringBuffer(\"Hello\"); \n```\n\n你仍然会得到相同的编译器错误，因为无法从 `StringBuffer`\
  \ 转换为 `String`。这引出了一个重要问题：如何判断一个无效转换会导致编译器错误还是运行时异常？\n\n如果编译器仅能利用源类型和目标类型的静态类型信息，并推断出这是一个无效转换，那么它就会成为编译器错误。如果转换的成功与否取决于对象的动态类型，编译器就无法预测转换结果。在这些情况下，它就会成为运行时异常。\n\
  \n使用“instanceof”进行安全的向下转型\n\n如果在程序执行过程中抛出了 `ClassCastException`，并且没有相应的异常处理器，程序就会终止。那么，像这样提供一个异常处理器如何？\n\
  \n```\ntry {\n        StringBuffer str = new StringBuffer(\"Hello\");\n        Object\
  \ obj = str;\n        String strBuf = (String) obj;\n}\ncatch(ClassCastException\
  \ e) {\n        // 忽略异常——我们不希望程序因此崩溃！！！\n}\n```\n\n是的，这样可行，程序不会崩溃。但这确实是一个*非常*糟糕的主意！这段代码存在两个主要问题。\n\
  \n1.  像这样为 `RuntimeExceptions` 提供异常处理器，会制造一种程序运行完全正常的假象，而实际上并非如此！\n2.  像 `ClassCastException`\
  \ 这样的运行时异常表明存在编程错误，不应使用异常处理器来捕获。\n\n那么，现在该怎么办呢？在向下转型之前，先检查对象的动态类型，然后再进行向下转型。\n\n\
  ```\nStringBuffer str = new StringBuffer(\"Hello\");\nObject obj = str;\nif(obj\
  \ instanceof String) {\n        String strBuf = (String) obj;\n}\n```\n\n这是一种实现向下转型的有效且恰当的方式。使用\
  \ `instanceof` 运算符可以检查 `obj` 的动态类型，这有助于你决定是否将其向下转型为 `String` 对象。\n\n回到 FunPaint\
  \ 的例子，你有抽象基类 `Shape` 和许多派生对象，如 `Square`、`Circle` 等。你可能需要执行类型转换，以便在基类型和派生类型之间进行转换。示例如下：\n\
  \n```\nShape shape = canvas.getHighlightedShape();\nCircle circle = (Circle) shape;\n\
  circle.redraw();\n```\n\n这里，假设有一个名为 `getHighlightedShape()` 的方法，它返回画布上当前高亮的 `Shape`。在语句\
  \ `Circle circle = (Circle) shape;` 中，你正在从 `Shape` 类型向下转型为 `Circle` 类型。然而，这是危险的，因为如果\
  \ `Shape` 持有的是 `Square` 对象，那么这次向下转型就会失败。为了避免这种情况，你需要在向下转型之前使用 *instanceof* 运算符，如下所示：\n\
  \n```\nShape shape = drawingWindow.getHighlightedShape();\nif(shape instanceof Circle)\
  \ {\n        Circle circle = (Circle) shape;\n        circle.redraw();\n}\n```\n\
  \n| ![image](img/Note.jpg) | 处理像 `ClassCastExceptions` 这样的运行时异常是一种糟糕的做法。相反，最好引入防御性编程检查，以避免在运行时出现此类异常。\
  \ |\n\nJava 包\n\n当应用程序规模增长时，你需要一种有效的机制来管理所有源文件。Java 支持*包*的概念，这是一种用于组织类并提供命名空间管理的作用域结构。所有紧密相关的类可以放在一个单一的实体中：一个包。包不仅能降低大型应用程序的复杂性，还能提供访问保护。\n\
  \n本质上，使用包有以下优点：\n\n*   包通过促进相似类的分类来降低复杂性。\n*   包提供命名空间管理。例如，两个开发者可以通过将相同类型名称放在不同的包中，从而避免名称冲突。\n\
  *   包提供访问保护（回顾关于默认访问修饰符的讨论）。\n\nJava SDK 被分类到各种包中。例如，`java.lang` 提供基本的语言功能和基础类型，`java.io`\
  \ 可用于执行与文件相关的操作。\n\n如何创建自己的包，并在其他包中使用（或导入）其中的类？我们接下来将讨论这个问题。\n\n使用包\n\n当你想要将一个类包含在某个包中时，只需在类中使用\
  \ `package` 语句进行声明即可。在 FunPaint 应用程序中，你有 `Circle` 类。如果你想将这个类包含在 `package graphicshape`\
  \ 中，那么以下声明即可生效：\n\n```\n// Circle.java\npackage graphicshape;\n\npublic class Circle\
  \ {\n        //类定义\n}\n```\n\n现在，假设你想在你的 `Canvas` 类（位于不同的包中）中使用这个 `Circle` 类；请参见清单\
  \ 3-20。\n\n清单 3-20.  Canvas.java\n\n```\n// Canvas.java\npackage appcanvas;\n\n\
  public class Canvas {\n        public static void main(String[] args) {\n      \
  \          Circle circle = new Circle();\n                circle.area();\n     \
  \   }\n}\n```\n\n\n\n这段代码会导致编译器报出以下错误信息：`\"Circle cannot be resolved to a type\"\
  `。不过，你可以通过提供完整的限定类名来消除这个错误，如下所示：\n\n```\n// Canvas.java\npackage appcanvas;\n\n\
  public class Canvas {\n        public static void main(String[] args) {\n      \
  \          graphicshape.Circle circle = new graphicshape.Circle();\n           \
  \     circle.area();\n        }\n}\n```\n\n另一种更便捷的解决方法是使用 `import` 语句。`import` 语句会指示编译器去哪里查找所用类型的定义。在这个例子中，你将从\
  \ `graphicshape` 包中导入：\n\n```\n// Canvas.java\npackage appcanvas;\nimport graphicshape.Circle;\n\
  \npublic class Canvas {\n        public static void main(String[] args) {\n    \
  \            Circle circle = new Circle();\n                circle.area();\n   \
  \     }\n}\n```\n\n你需要记住，`package` 语句必须出现在最前面，后面跟着 `import` 语句。显然，在一个 Java 源文件中只能有一条\
  \ `package` 语句。\n\n假设你想在 `Canvas` 的实现中使用各种形状，比如 `Circle`、`Square`、`Triangle` 等（它们都属于\
  \ `graphicshape` 包）。你可以为每个 `graphicshape` 类使用一条 `import` 语句（例如 `import graphicshape.Circle;`\
  \ 和 `import graphicshape.Square;`）。在这种情况下，更便捷的方式是使用带有通配符“*”的 `import` 语句，它表示“包含该包中的所有类”，如下所示：\n\
  \n```\nimport graphicshape.*;\n```\n\n请注意，物理层次结构（文件系统中的直接目录结构）应与包层次结构保持一致。\n\n|\
  \ ![image](img/Note.jpg) | 你不需要导入 `java.lang` 包就能使用语言的基本功能。这是唯一一个被隐式导入的包，该包中的类在所有程序中都可以直接使用。\
  \ |\n\n静态导入\n\n回顾一下清单 3-13 中 `area()` 方法的实现，这里重新展示如下：\n\n```\npublic double area()\
  \ {\n        return Math.PI * radius * radius;\n}\n```\n\n该实现使用了 `Math` 包中的静态成员\
  \ `PI`；这就是为什么我们在 `PI` 前面加上了包引用。Java 5 引入了一个新特性——*静态导入*——它可以用来导入所导入包或类中的静态成员。你可以像在当前类中定义了这些静态成员一样使用它们。要使用这个特性，你必须在\
  \ `import` 声明中使用“static”关键字。让我们用静态导入重新实现 `area()` 方法：\n\n```\nimport static java.lang.Math.PI;\n\
  \n// 类声明和其他成员\npublic double area() {\n        return PI * radius * radius;\n}\n\
  ```\n\n你也可以使用通配符“*”来导入指定包或类中的所有静态成员。\n\n| ![image](img/Note.jpg) | 请始终记住，静态导入只会导入指定包或类中的静态成员。\
  \ |\n\n需要提醒一点：虽然使用静态导入非常方便，但它可能会给后续阅读代码的开发者带来困惑，尤其是当当前类也定义了类似的成员时。这可能会让人难以区分某个定义是静态导入的还是本地定义的。\n\
  \nJAVA 包的命名规范\n\nOracle 推荐以下 Java 包命名规范：\n\n*   通常使用层次结构来定义包和子包。\n*   所有 Java 包通常使用小写字母。\n\
  *   产品可以使用组织结构来定义包层次结构。例如，某公司（假设名为 COMP）有多个产品，其中一个产品是 PROD；该产品中的一个功能是 FTUR；该功能中的一个包是\
  \ PCKG。在这种情况下，包层次结构将是 `comp.prod.ftur.pckg`。\n*   反转的互联网域名也可以用作包层次结构，例如 `com.company.feature`。\n\
  *   如果产品名称或公司名称中包含连字符或其他特殊字符，请使用下划线代替连字符和其他特殊字符。\n\n问答时间！\n\n在 FunPaint 应用程序中，你可以为对象着色。你需要\
  \ `Color` 类来实现这个功能。该类应使用 RGB（红、绿、蓝）颜色方案。这三个颜色分量值应作为 `int` 值存储在三个字段中。该类应实现一个默认构造函数（将颜色值设置为零）和另一个接受这三个分量值作为参数的构造函数。\n\
  \n1.  这个程序的输出是什么？\n\n```\n    class Color {\n         int red, green, blue;\n\n\
  void Color() {\n                 red = 10;\n                 green = 10;\n     \
  \            blue = 10;\n         }\n\nvoid printColor() {\n                 System.out.println(\"\
  red: \" + red + \" green: \" + green + \" blue: \" + blue);\n         }\n\npublic\
  \ static void main(String [] args) {\n                 Color color = new Color();\n\
  \                 color.printColor();\n         }\n    }\n    ```\n\n*   A.  编译器错误：没有为类提供构造函数。\n\
  \    *   B.  编译无错误，运行时打印以下内容：red: 0 green: 0 blue: 0。\n    *   C.  编译无错误，运行时打印以下内容：red:\
  \ 10 green: 10 blue: 10。\n    *   D.  编译无错误，运行时抛出 `NullPointerException` 导致崩溃。\n\
  \n**答案**：B。编译无错误，运行时打印以下内容：red: 0 green: 0 blue: 0。\n\n（请记住，构造函数没有返回类型；如果提供了返回类型，它会被视为该类中的一个方法。在这个例子中，由于\
  \ `Color` 有 `void` 返回类型，它变成了 `Color` 类中一个名为 `Color()` 的方法，而编译器提供了默认的 `Color` 构造函数。默认情况下，数据值被初始化为零，因此输出如上。）\n\
  \n2.  查看以下代码并预测输出：\n\n```\n    class Color {\n         int red, green, blue;\n\n\
  Color() {\n                 Color(10, 10, 10);\n         }\n\nColor(int r, int g,\
  \ int b) {\n                 red = r;\n                 green = g;\n           \
  \      blue = b;\n         }\n\nvoid printColor() {\n                 System.out.println(\"\
  red: \" + red + \" green: \" + green + \" blue: \" + blue);\n         }\n\npublic\
  \ static void main(String [] args) {\n                 Color color = new Color();\n\
  \                 color.printColor();\n         }\n    }\n    ```\n\n*   A.  编译器错误：找不到符号。\n\
  \    *   B.  编译无错误，运行时打印以下内容：red: 0 green: 0 blue: 0。\n    *   C.  编译无错误，运行时打印以下内容：red:\
  \ 10 green: 10 blue: 10。\n    *   D.  编译无错误，运行时抛出 `NullPointerException` 导致崩溃。\n\
  \n**答案**：A。编译器错误：找不到符号。\n\n（当编译器执行到 `Color(10, 10, 10);` 这条语句时，它会查找名为 `Color()`\
  \ 的方法。调用另一个构造函数的正确方式是使用 `this` 关键字，如下所示：`this(10, 10, 10);`。）\n\n3.  在 FunPaint\
  \ 应用程序中，你需要编写类来绘制矩形。矩形可以有平边或圆角。你还需要为（平边或圆角的）矩形着色。你将如何定义类来创建这些平边、着色和圆角的矩形？你可以根据需要运用\
  \ is-a 关系。\n\n查看以下实现所需功能的选项：\n\n\n\n```\n    class Rectangle { /* */ }\n    class\
  \ ColoredRectangle extends Rectangle { /* */ }\n    class RoundedRectangle extends\
  \ Rectangle { /* */ }\n    class ColoredRoundedRectangle extends ColoredRectangle,\
  \ RoundedRectangle { /* */ }\n    ```\n\n选择正确的选项：\n\n*   A.  编译器错误：应为“{”，无法继承两个类。\n\
  \    *   B.  编译无错误，运行时抛出异常 `MultipleClassInheritanceException`。\n    *   C.  编译无错误，运行时抛出异常\
  \ `NullPointerException`。\n    *   D.  编译无错误，运行时抛出异常 `MultipleInheritanceError`。\n\
  \n**答案**：A. 编译器错误：应为“{”，无法继承两个类。\n\n（该程序会导致编译错误，因为 Java 不支持多重继承。）\n\n4.  在 FunPaint\
  \ 应用程序中，你可以为各种形状对象填充颜色。要实现此功能，你需要实现一个 `Color` 类。`Color` 类有三个成员：`m_red`、`m_green`\
  \ 和 `m_blue`。重点关注 `toString()` 方法并检查其是否正常工作。\n\n根据以下程序选择最佳选项：\n\n```\n    class\
  \ Color {\n         int red, green, blue;\n\nColor() {\n                 this(10,\
  \ 10, 10);\n         }\n\nColor(int r, int g, int b) {\n                red = r;\n\
  \                green = g;\n                blue = b;\n         }\n         public\
  \ String toString() {\n              return \"The color is: \" + red + green + blue;\n\
  \         }\n\npublic static void main(String [] args) {\n                 // 隐式调用\
  \ toString 方法\n                 System.out.println(new Color());\n         }\n \
  \   }\n    ```\n\n*   A.  编译器错误：类型不兼容。\n    *   B.  编译无错误，运行时打印以下内容：The color is:\
  \ 30。\n    *   C.  编译无错误，运行时打印以下内容：The color is: 101010。\n    *   D.  编译无错误，运行时打印以下内容：The\
  \ color is: red green blue。\n\n**答案**：C. 编译无错误，运行时打印以下内容：The color is: 101010。\n\
  \n（`toString()` 实现中的表达式为 “The color is: “ + red + blue + green。由于第一个操作数是字符串，`+`\
  \ 操作变为字符串连接运算符，结果为字符串 “The color is: 10”。随后，再次出现连接运算符 `+`，依此类推，最终打印出 “The color\
  \ is: 101010”。）\n\n5.  根据以下程序选择最佳选项：\n\n```\n    class Color {\n         int red,\
  \ green, blue;\n\nColor() {\n                 this(10, 10, 10);\n         }\n\n\
  Color(int r, int g, int b) {\n                 red = r;\n                 green\
  \ = g;\n                 blue = b;\n         }\n\nString toString() {\n        \
  \         return \"The color is: \" + \" red = \" + red + \" green = \" + green\
  \ + \" blue = \" + blue;\n         }\n\npublic static void main(String [] args)\
  \ {\n                 // 隐式调用 toString 方法\n                 System.out.println(new\
  \ Color());\n         }\n    }\n    ```\n\n*   A.  编译器错误：试图分配更弱的访问权限；`toString`\
  \ 在 `Object` 中是 public 的。\n    *   B.  编译无错误，运行时打印以下内容：The color is: red = 10 green\
  \ = 10 blue = 10。\n    *   C.  编译无错误，运行时打印以下内容：The color is: red = 0 green = 0 blue\
  \ = 0。\n    *   D.  编译无错误，运行时抛出 `ClassCastException`。\n\n**答案**：A. 编译器错误：试图分配更弱的访问权限；`toString`\
  \ 在 `Object` 中是 public 的。\n\n（`toString()` 方法未指定访问修饰符。`Object` 的 `toString()` 方法具有\
  \ public 访问修饰符；你不能降低方法的可见性。因此，这将导致编译错误。）\n\n总结\n\n面向对象编程基础\n\n*   *封装*：将数据及其操作函数组合成一个单一单元。\n\
  *   *抽象*：隐藏底层细节，仅向用户暴露必要且相关的细节。\n*   *继承*：在相关类之间创建层次关系。\n*   *多态*：根据上下文对同一消息（即方法调用）进行不同含义的解释。\n\
  \n**类基础**\n\n*   *“类”* 是一个模板（或蓝图），而 *“对象”* 是类的一个实例。\n*   *构造器*没有返回类型。\n*   你无法在派生类中访问基类的\
  \ *private* 方法。\n*   你可以从同一包中的类（如同包私有或默认访问权限）以及派生类中访问 *protected* 方法。\n*   如果方法在同一包中，你也可以访问具有\
  \ *默认访问修饰符* 的方法。\n*   你可以从任何其他类访问类的 *public* 方法。\n\n**重载**\n\n*   *方法重载*：创建名称相同但参数类型和/或数量不同的方法。\n\
  *   你可以拥有 *重载的构造器*。你可以使用 `this` 关键字在另一个构造器中调用同一类的构造器。\n*   *重载解析* 是当方法存在重载定义时，编译器查找并解析调用的过程。\n\
  \n继承\n\n*   *继承* 也被称为 *“is-a”关系*。\n*   基于对象的动态类型来解析方法调用被称为 *运行时多态*。\n*   在 *重写*\
  \ 中，方法名、参数数量、参数类型和返回类型必须完全匹配。\n*   在 *协变返回类型* 中，你可以在重写方法中提供返回类型的派生类。\n*   你使用 `super`\
  \ 关键字来调用基类方法。\n*   重载是 *静态多态*（*早期绑定*）的一个例子，而重写是 *动态多态*（*晚期绑定*）的一个例子。\n*   执行 *向上转型*\
  \ 时，你不需要进行显式转换。向上转型总是成功的。\n*   执行 *向下转型* 时，你需要进行显式转换。向下转型可能会失败。因此，你可以使用 `instanceof`\
  \ 运算符来检查向下转型是否有效。\n\nJava 包\n\n*   *包* 是一种作用域构造，用于对类进行分类并提供命名空间管理。\n\n第 4 章\n\n\
  ![image](img/frontdot.jpg)\n\n高级类设计\n\n![9781430247647_unFig04-01.jpg](img/9781430247647_unFig04-01.jpg)\n\
  \n在上一章中，你学习了面向对象编程的基本概念，并使用它们构建了 Java 程序。在本章中，你将学习面向对象编程的高级概念、Java 语言的支持以及这些概念的细节。\n\
  \n在开篇部分，你将学习抽象类及其在实际场景中的用途。第二和第三部分涵盖了 `final` 和 `static` 这两个有用且常用的关键字。第四部分探讨了嵌套类的各种变体：静态嵌套类、内部类、局部内部类和匿名内部类。最后一部分讨论了枚举数据类型，该类型是在\
  \ Java 5 中引入的。\n\n本章中的一些概念，尤其是嵌套类及其变体，在初读时并不容易理解。尽管我们努力以易于理解的方式呈现诸如匿名类和嵌套接口等较难的概念，但掌握它们的最佳方式还是使用它们编写程序。\n\
  \n对于 OCPJP 7 考试，你需要彻底了解所有这些概念。本章旨在加深你对 Java 语言的理解，并直接为你准备 OCPJP 7 考试。\n\n抽象类\n\n\
  \n\n在许多编程场景中，你希望在不涉及实现细节的情况下定义抽象。此时，可以使用 Java 平台支持的*抽象类*或*接口*。当你希望定义带有某些通用功能的抽象时，通常会使用抽象类。我们将在下一章详细讨论接口，本节仅聚焦于抽象类。\n\
  \n你无法创建抽象类的实例。那么你可能会问，为什么要使用抽象类呢？抽象类在面向对象编程中非常有用，强烈推荐使用的原因如下：\n\n*   抽象类定义了抽象概念，并将具体实现细节留给子类。一个抽象类型可能有多种变体，因此需要不同的实现；抽象类为子类实现这些变体提供了合适的平台。如果抽象类型及其子类（具体实现）定义得当，那么这些类的使用者就可以利用运行时多态。运行时多态是可取的，因为它能在对象之间引入松耦合。\n\
  *   另一个推荐使用抽象类的原因是它们能够提供默认实现。抽象类的子类可以根据需要特化默认实现。\n*   抽象类是存放抽象类几乎所有子类所需的通用功能的完美占位符。\n\
  \n回想一下你在上一章开发的 FunPaint 应用。`Shape` 类为你在 FunPaint 应用中可绘制的不同形状提供了抽象。你可以创建 `Square`\
  \ 和 `Circle` 等 `Shape` 类的对象，但直接创建 `Shape` 类本身的对象有意义吗？没有，现实世界中并不存在名为 `Shape` 的对象。实际上，`Shape`\
  \ 是一个通用抽象，它可以被任何具体的形状（如 `Circle`）所替代。\n\n`Shape` 类可以重写为抽象类：\n\n```\nabstract class\
  \ Shape {\n        public double area() { return 0; } // 默认实现\n        // 其他成员\n\
  }\n```\n\n在类定义前加上 `abstract` 关键字，即可将类声明为抽象类。让我们尝试创建一个 `Shape` 对象：\n\n```\nShape\
  \ shape = new Shape();\n```\n\n对于这条语句，编译器会报错：`\"Shape is abstract; cannot be instantiated\"\
  `。在 `Shape` 类定义中，有一个名为 `area()` 的方法，用于返回特定形状的面积。该方法适用于所有形状，因此它位于基类 `Shape` 中。然而，`Shape`\
  \ 类中 `area()` 方法的实现应该是什么？你无法提供默认实现；将这个方法实现为 `return 0;` 是一个糟糕的解决方案，尽管编译器会欣然接受。更好的解决方案是将其声明为抽象方法，如下所示：\n\
  \n```\npublic abstract double area(); // 注意：没有实现（即没有方法体定义）\n```\n\n与声明抽象类类似，通过在方法前加上\
  \ `abstract` 关键字，你可以将 `area()` 方法声明为抽象方法。普通方法与抽象方法的主要区别在于，你不为抽象方法提供方法体。如果你提供了方法体，就会出错，如下所示：\n\
  \n```\npublic abstract double area() { return 0; } // 编译器错误！\n```\n\n对于这个定义，你会得到编译器错误：`\"\
  abstract methods cannot have a body\"`。好吧，没问题！你不能为抽象方法提供方法体，但抽象方法的意义何在？抽象类通过抽象方法向其所有客户端（该抽象的使用者）承诺某些功能。抽象方法声明强制所有子类提供该抽象方法的实现。如果派生类没有实现基类中定义的所有抽象方法，那么该派生类应被声明为抽象类，如下例所示：\n\
  \n\n\n```\nabstract class Shape {\n        public abstract double area(); // 无实现\n\
  \        // 其他成员\n}\n\nclass Rectangle extends Shape { }\n```\n\n这段代码会导致编译器报错：`\"\
  Rectangle is not abstract and does not override abstract method area() in Shape\"\
  `。要修复此问题，你需要将派生类声明为 `abstract`，或者在派生类中提供 `area()` 方法的定义。将 `Rectangle` 声明为抽象类并不合理；因此你可以像这样定义\
  \ `area()` 方法：\n\n```\nclass Rectangle extends Shape {\n        private int length,\
  \ height;\n        public double area() { return length * height; }\n        //\
  \ 其他成员 ...\n}\n```\n\n现在我们来讨论另一种场景：所有形状对象都需要支持一项通用功能。例如，每个对象都可以被绘制在另一个形状对象内部，这意味着每个形状对象都有一个父级（即容器）对象。如前所述，抽象类是将通用功能集中放置的最佳位置。\n\
  \n```\npublic abstract class Shape {\n        abstract double area();\n        private\
  \ Shape parentShape;\n        public void setParentShape(Shape shape){\n       \
  \         parentShape = shape;\n        }\n        public Shape getParentShape(){\n\
  \                return parentShape;\n        }\n}\n```\n\n这个抽象类定义了一个属性和两个方法，这些属性和方法将对其所有子类可用。很实用，不是吗？\n\
  \n**要点记忆**\n\n请掌握以下关于抽象类和抽象方法的要点，因为它们很可能出现在 OCPJP 7 考试中：\n\n*   `abstract` 关键字可以应用于类或方法，但不能应用于字段。\n\
  *   抽象类不能被实例化。不过，你可以创建抽象类类型的引用变量。实际上，你可以创建从抽象类派生的类的对象，并使抽象类引用指向所创建的派生类对象。\n*   抽象类可以继承另一个抽象类，也可以实现一个接口。\n\
  *   抽象类可以从具体类派生！尽管语言允许这样做，但这不是一个好主意。\n*   抽象类不必声明抽象方法，这意味着抽象类不一定非要拥有声明为 `abstract`\
  \ 的方法。然而，如果一个类包含抽象方法，则它必须被声明为抽象类。\n*   抽象类的子类需要提供所有抽象方法的实现；否则，你需要将该子类声明为抽象类。\n*\
  \   抽象类可以拥有声明为 `static` 的方法或字段。\n\n**使用“final”关键字**\n\n对于 OCPJP 7 考试，你需要了解 `final`\
  \ 关键字的用途。在本节中，你将学习如何将 `final` 关键字用于类、方法和变量。\n\n**最终类**\n\n最终类是一种*不可继承的类*——也就是说，如果你将一个类声明为\
  \ final，就不能再创建它的子类。通常，面向对象编程建议类应对扩展开放，对修改关闭（开闭原则）。然而，在某些情况下，你不希望允许某个类被继承。两个重要的原因是：\n\
  \n1.  *防止通过继承改变行为*。在某些情况下，你可能认为类的实现已经完整，不应再更改。如果允许重写，则方法的行为可能会被改变。你知道，在需要基类对象的地方可以使用派生类对象，但在某些情况下你可能不希望这样。通过将类声明为\
  \ final，类的使用者可以确保行为不变。\n2.  *提升性能*。最终类的所有方法调用都可以在编译时解析。由于没有重写方法的可能性，因此无需在运行时为最终类解析实际调用，这可以转化为性能提升。出于同样的原因，最终类鼓励方法内联。如果调用需要在运行时解析，则无法进行内联。\n\
  \n\n\n在 Java 库中，许多类都被声明为 `final`；例如，`String` `(java.lang.String)` 和 `System (java.lang.System)`\
  \ 类。这些类几乎在所有 Java 程序中都被广泛使用。例如，如果你使用 `System.out.println()` 语句，你同时使用了 `System` 类（其中包含输出流和\
  \ `println` 方法）和 `String` 类，因为 `println` 方法接受 `String` 作为参数。如果这两个类没有被声明为 `final`，那么就有可能有人通过子类化来改变这些类的行为，从而导致整个程序的行为发生变化。为了避免此类问题，像这样广泛使用的类以及诸如\
  \ `Integer` 之类的包装类在 Java 库中都被声明为 `final`。\n\n| ![image](img/pencil.jpg) | 将类声明为\
  \ final 所带来的性能提升是有限的；重点应该放在适当的地方使用 `final`。OCPJP 7 考试主要考察你是否了解 `final` 关键字的正确用法。\
  \ |\n\n在 FunPaint 示例中，你有一个画布，用于拖放形状来创建图片。假设你有一个 `Canvas` 类来实现该功能。此外，你希望确保通过继承 `Canvas`\
  \ 不会改变其行为。换句话说，你想让 `Canvas` 成为一个 final 类。\n\n```\nfinal class Canvas { /* 成员 */\
  \ }\n\nclass ExtendedCanvas extends Canvas { /* 成员 */ }\n```\n\n如果你尝试扩展一个 final\
  \ 类，就像你刚才尝试做的那样，你会得到编译器错误 `\"cannot inherit from final Canvas\"`。\n\nFinal 方法和变量\n\
  \n在一个类中，你可以将方法声明为 final。final 方法不能被重写。因此，如果你在一个非 final 类中将一个方法声明为 final，那么你可以扩展该类，但不能重写这个\
  \ final 方法。然而，基类中其他非 final 的方法可以在派生类的实现中被重写。\n\n例如，在 FunPaint 应用程序中，一个方法是 final\
  \ 的（`setParentShape()`），另一个方法是非 final 的（`getParentShape()`），如清单 4-1 所示。\n\n清单 4-1.  Shape.java\n\
  \n```\npublic abstract class Shape {\n        //类成员...\n        final public void\
  \ setParentShape(Shape shape){\n                //方法体\n        }\n        public\
  \ Shape getParentShape(){\n                //方法体\n        }\n}\n```\n\n在这种情况下，`Circle`\
  \ 类（`Shape` 的子类）只能重写 `getParentShape()`；如果你尝试重写这个 final 方法，你会得到以下错误：`\"Cannot override\
  \ the final method from Shape\"`。\n\n最后，我们提一下 *final 变量*。final 变量就像 CD-ROM：一旦你写入了内容，就不能再写入。在编程中，像\
  \ PI 这样的通用常量可以被声明为 final，因为你不想让任何人修改这些常量的值。final 变量只能被赋值一次。如果你在初始化后尝试更改一个 final\
  \ 变量，Java 编译器会报错。\n\n要点记忆\n\n掌握以下要点，因为它们很可能出现在 OCPJP 7 考试中：\n\n*   final 修饰符可以应用于类、方法或变量。final\
  \ 类的所有方法都隐式地是 final 的（因此不可重写）。\n*   final 变量只能被赋值一次。如果变量声明将变量定义为 final 但未初始化，则称为\
  \ *空白 final*。你需要在类中定义的所有构造函数中初始化这个空白 final；否则编译器会报错。\n*   关键字 `final` 甚至可以应用于参数。final\
  \ 参数的值一旦赋值就不能更改。这里需要注意的是，对于基本类型，“值”是隐式理解的。然而，对于对象，“值”指的是对象引用，而不是其状态。因此，你可以更改传递进来的\
  \ final 对象的内部状态，但不能更改引用本身。\n\n使用 “static” 关键字\n\n假设你想编写一个简单的类，用于统计到目前为止已创建的该类类型的对象数量。清单\
  \ 4-2 中的程序能工作吗？\n\n清单 4-2.  Counter.java\n\n```\n// Counter 类应该统计从该类创建的实例数量\npublic\
  \ class Counter {\n        private int count; // 用于存储创建的对象数量的变量\n        // 对于每个创建的\
  \ Counter 对象，默认构造函数都会被调用；\n        // 因此，在默认构造函数中更新计数器值\n        public Counter()\
  \ {\n                count++;\n        }\n        public void printCount() { //\
  \ 用于打印当前计数器值的方法\n                System.out.println(\"到目前为止创建的实例数量是: \" + count);\n\
  \        }\n        public static void main(String []args) {\n                Counter\
  \ anInstance = new Counter();\n                anInstance.printCount();\n      \
  \          Counter anotherInstance = new Counter();\n                anotherInstance.printCount();\n\
  \        }\n}\n```\n\n程序的输出是\n\n```\n到目前为止创建的实例数量是: 1\n到目前为止创建的实例数量是: 1\n```\n\n\
  哎呀！从输出可以看出，该类并没有跟踪创建的对象数量。发生了什么？\n\n你使用了一个 *实例变量* `count` 来跟踪从该类创建的对象数量。由于该类的每个实例都有自己的\
  \ count 值，所以它总是打印 `1`！你需要的是一个可以在所有实例之间共享的变量。这可以通过将变量声明为 `static` 来实现。静态变量与其类相关联，而不是与其对象相关联；因此它们被称为\
  \ *类变量*。静态变量在程序开始执行时只被初始化一次。静态变量将其状态与该类的所有实例共享。你可以使用类名（而不是实例）来访问静态变量。清单 4-3 展示了\
  \ `Counter` 类的正确实现，其中 `count` 变量和 `printCount` 方法都被声明为 static。\n\n清单 4-3.  Counter.java\n\
  \n```\n// Counter 类应该统计从该类创建的实例数量\npublic class Counter {\n        private static\
  \ int count; // 用于存储创建的对象数量的变量\n        // 对于每个创建的 Counter 对象，默认构造函数都会被调用；\n   \
  \     // 因此，在默认构造函数中更新计数器值\n        public Counter() {\n                count++;\n\
  \        }\n        public static void printCount() { // 用于打印当前计数器值的方法\n       \
  \         System.out.println(\"到目前为止创建的实例数量是: \" + count);\n        }\n        public\
  \ static void main(String []args) {\n                Counter anInstance = new Counter();\n\
  \                // 注意我们如何使用类名而不是实例变量名来调用 printCount\n                Counter.printCount();\n\
  \                Counter anotherInstance = new Counter();\n                Counter.printCount();\n\
  \        }\n}\n```\n\n这个程序打印\n\n```\n到目前为止创建的实例数量是: 1\n到目前为止创建的实例数量是: 2\n```\n\n\
  这里，静态变量 `count` 在程序开始执行时被初始化。在创建第一个对象时，count 增加到 1。类似地，当创建第二个对象时，`count` 的值变为 2。正如程序输出所示，两个对象都更新了同一个\
  \ `count` 变量的副本。\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\n\n\
  请注意，我们将对 `printCount()` 的调用改为了使用类名 `Counter`，即 `Counter.printCount()`。编译器会接受之前的\
  \ `anInstance.printCount()` 和 `anotherInstance.printCount()` 这两种调用，因为使用类名或实例变量名调用静态方法在语义上没有区别。但是，不推荐使用实例变量来调用静态方法。惯例是使用实例变量调用实例方法，使用类名调用静态方法。\n\
  \n静态方法只能访问静态变量，并且只能调用静态方法。相比之下，实例方法（非静态）可以调用静态方法或访问静态变量。\n\n静态块\n\n除了静态变量和方法，你还可以在类定义中定义一个*静态块*。当\
  \ JVM 将类加载到内存时，会执行这个静态块。例如，在前面的例子中，你可以定义一个静态块，将 `count` 变量初始化为默认值 1，而不是默认值 0，如清单\
  \ 4-4 所示。\n\n清单 4-4.  Counter.java\n\n```\npublic class Counter {\n        private\
  \ static int count;\n        static {\n                // 此静态块中的代码将在 JVM 将类加载到内存时执行\n\
  \                count = 1;\n        }\n        public Counter() {\n           \
  \     count++;\n        }\n        public static void printCount() {\n         \
  \       System.out.println(\"到目前为止创建的实例数量为: \" + count);\n        }\n        public\
  \ static void main(String []args) {\n                Counter anInstance = new Counter();\n\
  \                Counter.printCount();\n                Counter anotherInstance\
  \ = new Counter();\n                Counter.printCount();\n        }\n}\n```\n\n\
  该程序输出\n\n```\n到目前为止创建的实例数量为: 2\n到目前为止创建的实例数量为: 3\n```\n\n不要将静态块与构造函数混淆。构造函数在创建类的实例时被调用，而静态块在程序初始化时被调用。\n\
  \n要点提示\n\n*   `main()` 方法是程序主要执行的起点，它总是被声明为静态的。为什么？如果它是一个实例方法，将无法调用它。你必须先启动程序才能创建实例，然后才能调用该方法，对吧？\n\
  *   你不能覆盖基类中提供的静态方法。为什么？方法调用是根据实例类型通过运行时多态性来解析的。由于静态方法与类（而非实例）相关联，因此你不能覆盖静态方法，并且静态方法无法实现运行时多态性。\n\
  *   静态方法不能在其方法体中使用 `this` 关键字。为什么？请记住，静态方法与类相关联，而不是与实例相关联。只有实例方法才有关联的隐式引用；因此，类方法没有关联的\
  \ `this` 引用。\n*   静态方法不能在其方法体中使用 `super` 关键字。为什么？你使用 `super` 关键字从派生类的覆盖方法中调用基类方法。由于你不能覆盖静态方法，因此不能在其方法体中使用\
  \ `super` 关键字。\n*   由于静态方法无法访问实例变量（非静态变量），因此它们最适合用于工具函数。例如，`java.util.math` 库中的所有方法都是静态的。\n\
  *   与调用实例方法相比，调用静态方法被认为效率稍高。这是因为编译器在调用静态方法时无需传递隐式的 `this` 对象引用，而调用实例方法时则需要。\n\n\
  嵌套类的种类\n\n定义在另一个类（或接口）主体内部的类被称为*嵌套类*。通常，你定义的类是直接属于某个包的顶层类。相比之下，嵌套类是包含在另一个类或接口内部的类。\n\
  \n在另一个类或接口内部创建类有什么好处？有几个好处。首先，你可以将相关的类作为一个逻辑组放在一起。其次，嵌套类可以访问其外部类的所有类成员，这在某些情况下可能很有用。第三，嵌套类有时用于特定目的。例如，匿名内部类对于使用\
  \ AWT/Swing 编写更简单的事件处理代码很有用（这与 OCPJP 7 考试无关，因此本书不涉及）。目前，你可以相信我们的话，嵌套类在某些情况下很有用，因此值得学习。\n\
  \n在 Java 中，有四种类型或*种类*的嵌套类：\n\n*   静态嵌套类\n*   内部类\n*   局部内部类\n*   匿名内部类\n\n这四种种类之间的区别乍一看并不明显，而且经常使用替代术语来指代它们，这无助于澄清问题。为了帮助澄清混淆，我们在图\
  \ 4-1 中示意性地表示了这四种嵌套类。\n\n![9781430247647_Fig04-01.jpg](img/9781430247647_Fig04-01.jpg)\n\
  \n图 4-1.  嵌套类的类型及示例\n\n研究此图。*局部类*定义在代码块（无论是方法、构造函数还是初始化块）内部，而*非局部类*定义在类内部。*静态类*使用\
  \ `static` 关键字限定，而*非静态类*在类定义中不使用 `static` 关键字。在*匿名类*中，你不提供类的名称；你只需定义其主体！\n\n正如你在图\
  \ 4-1 中所见，*静态嵌套类*是静态且非局部的，而*内部类*是非静态且非局部的。非静态且局部的嵌套类是*局部内部类*，而局部且匿名的嵌套类是*匿名内部类*。回顾此图将有助于你刷新对四种嵌套类之间本质区别的记忆。\n\
  \n现在，让我们更详细地讨论这四种种类中的每一种。\n\n静态嵌套类（或接口）\n\n你可以将一个类（或接口）定义为另一个类（或接口）内部的静态成员。由于外部类型可以是类或接口，内部类型也可以是类或接口，因此有四种组合。以下是这四种类型的示例，以便你了解它们的语法：\n\
  \n```\nclass Outer {           // 外部类有一个静态嵌套类\n        static class Inner {}\n}\n\
  \ninterface Outer {       // 外部接口有一个静态嵌套类\n        static class Inner {}\n}\n\n\
  class Outer {           // 外部类有一个静态嵌套接口\n        static interface Inner {}\n}\n\n\
  interface Outer {       // 外部接口有一个静态嵌套接口\n        static interface Inner {}\n}\n\
  ```\n\n你不必显式地对嵌套接口使用 `static` 关键字，因为它隐式地是静态的。现在，让我们看一个创建并使用静态嵌套类的示例。\n\n回顾第 3 章中的\
  \ FunPaint 示例，该示例实现了一个包含 `m_red`、`m_green` 和 `m_blue` 字段的 `Color` 类。由于所有形状都可以着色，你可以在\
  \ `Shape` 类中定义 `Color` 类，如清单 4-5 所示。\n\n清单 4-5.  TestColor.java\n\n\n\n```\nabstract\
  \ class Shape {\n        public static class Color {\n                int m_red,\
  \ m_green, m_blue;\n                public Color() {\n                        //\
  \ 通过传递默认值调用另一个重载的 Color 构造函数\n                        this(0, 0, 0);\n         \
  \       }\n                public Color(int red, int green, int blue) {\n      \
  \                  m_red = red; m_green = green; m_blue = blue;\n              \
  \  }\n                public String toString() {\n                        return\
  \ \" red = \" + m_red + \" green = \" + m_green + \" blue = \" + m_blue;\n     \
  \           }\n                // 其他颜色成员已省略\n        }\n        // 其他 Shape 成员已省略\n\
  }\n\npublic class TestColor {\n        public static void main(String []args) {\n\
  \                // 由于 Color 是一个静态嵌套类，\n                // 我们使用外部类的名称来访问它，例如 Shape.Color\n\
  \                // 注意，我们不需要（也无法）实例化 Shape 类来使用 Color 类\n                Shape.Color\
  \ white = new Shape.Color(255, 255, 255);\n                System.out.println(\"\
  White color has values:\" + white);\n        }\n}\n```\n\n输出结果为\n\n```\n White color\
  \ has:  red = 255 green = 255 blue = 255\n```\n\n你从这段代码中观察到了什么？`Shape` 类被声明为 `abstract`。你可以看到\
  \ `Color` 类被定义为 `Shape` 类内部的 `public static` 类。`TestColor` 类使用 `Shape.Color` 语法来引用这个类。除了这个细微差别之外，`Color`\
  \ 类看起来与在 `Shape` 类外部定义 `Color` 类并无不同。是的，这是一个很好的观察。那么，让我们重复一遍以明确：静态嵌套类与定义为外部类的类几乎相同，只有一个区别——它在物理上定义在另一个类的内部！\n\
  \n**要点记忆**\n\n以下是关于静态嵌套类（和接口）的一些值得注意的方面，这些将有助于你应对 OCPJP 7 考试：\n\n*   静态嵌套类的可访问性（`public`、`protected`\
  \ 等）由外部类定义。\n*   静态嵌套类的名称使用 `OuterClassName.NestedClassName` 语法表示。\n*   当你在接口内部定义内部嵌套类（或接口）时，该嵌套类被隐式声明为\
  \ `public` 和 `static`。这一点很容易记住：接口中的任何字段都被隐式声明为 `public` 和 `static`，而静态嵌套类也具有相同的行为。\n\
  *   静态嵌套类可以被声明为 `abstract` 或 `final`。\n*   静态嵌套类可以继承另一个类，也可以用作基类。\n*   静态嵌套类可以拥有静态成员。（正如你稍后将看到的，此声明不适用于其他类型的嵌套类。）\n\
  *   静态嵌套类可以访问外部类的成员（显然，仅限静态成员）。\n*   外部类也可以通过嵌套类的对象访问嵌套类的成员（甚至是私有成员）。如果你没有声明嵌套类的实例，外部类就不能直接访问嵌套类的元素。\n\
  \n**内部类**\n\n你可以在另一个类内部将一个类（或接口）定义为非静态成员。那么，在接口内部声明一个类或接口呢？正如你刚才在关于静态内部类的第三点中看到的，当你在接口内部定义一个类或接口时，它被隐式地声明为\
  \ `static`。因此，不可能声明一个非静态的内部接口！这就留下了两种可能性：\n\n```\nclass Outer {           // 外部类包含一个内部类\n\
  \        class Inner {}\n}\n\nclass Outer {           // 外部类包含一个内部接口\n        interface\
  \ Inner {}\n}\n```\n\n让我们创建一个 `Point` 类来实现 `Circle` 的中心。由于你想将每个 `Circle` 与一个中心 `Point`\
  \ 关联起来，因此将 `Point` 作为 `Circle` 的内部类是一个好主意，如代码清单 4-6 所示。\n\n代码清单 4-6.  Circle.java\n\
  \n```\npublic class Circle {\n        // 将 Point 定义为 Circle 类内部的内部类\n        class\
  \ Point {\n                private int xPos;\n                private int yPos;\n\
  \                // 你可以像这样为内部类提供构造函数\n                public Point(int x, int y)\
  \ {\n                        xPos = x;\n                        yPos = y;\n    \
  \            }\n                // 内部类与任何其他类一样——你可以在此处重写方法\n                public\
  \ String toString() {\n                        return \"(\" + xPos + \",\" + yPos\
  \ + \")\";\n                }\n        }\n\n// 利用内部类来声明字段\n        private Point\
  \ center;\n        private int radius;\n        public Circle(int x, int y, int\
  \ r) {\n                // 注意如何利用内部类来实例化它\n                center = this.new Point(x,\
  \ y);\n                radius = r;\n        }\n\npublic String toString() {\n  \
  \              return \"mid point = \" + center + \" and radius = \" + radius;\n\
  \        }\n\npublic static void main(String []s) {\n                System.out.println(new\
  \ Circle(10, 10, 20));\n        }\n        // 其他方法如 area 已省略\n}\n```\n\n这个 `Circle`\
  \ 和 `Point` 的实现与你之前看到的非常相似，唯一的重大区别在于这里你将 `Point` 定义为 `Circle` 的私有成员。你像这样实例化内部类：\n\
  \n```\ncenter = this.new Point(x, y);\n```\n\n你可能想知道为什么不能使用通常的 `new` 语句：\n\n```\n\
  center = new Point(x, y);\n```\n\n你需要使用外部类的对象引用作为前缀来创建内部类的实例。在这种情况下，它是一个 `this`\
  \ 引用，所以你在 `new` 运算符之前用 `this` 作为前缀。\n\n| ![image](img/Note.jpg) | 每个内部类都与外部类的一个实例相关联。换句话说，内部类总是与一个封闭对象相关联。\
  \ |\n\n外部类和内部类共享一种特殊的关系，就像朋友或同一家庭的成员。无论访问说明符（如 `private`）如何，成员访问都是有效的。然而，存在细微差别。你可以在不创建实例的情况下访问内部类中的外部类成员；但外部类的情况并非如此。你需要创建内部类的实例才能访问内部类的成员（*任何*成员，包括私有成员）。\n\
  \n内部类的一个限制是，你不能在内部类中声明静态成员，如下所示：\n\n```\nclass Outer {\n        class Inner {\n\
  \                static int i = 10;\n        }\n}\n```\n\n如果你尝试这样做，将会遇到以下编译器错误：\n\
  \n```\nOuter.java:3: inner classes cannot have static declarations\n           \
  \     static int i = 10;\n```\n\n**要点记忆**\n\n以下是关于内部类和接口的一些重要规则，这些规则可能在 OCPJP 7\
  \ 考试中很有用：\n\n*   内部类的可访问性（`public`、`protected` 等）由外部类定义。\n*   就像顶级类一样，内部类可以继承一个类或实现接口。类似地，内部类可以被其他类继承，内部接口可以被其他类或接口实现或继承。\n\
  *   内部类可以被声明为 `final` 或 `abstract`。\n*   内部类可以拥有内部类，但阅读或理解这种复杂的类嵌套会很困难。（意思是：避免这样做！）\n\
  \n**局部内部类**\n\n*局部内部类*定义在代码块中（例如，在方法、构造函数或初始化块中）。与静态嵌套类和内部类不同，局部内部类不是外部类的成员；它们只是定义它们的方法或代码的局部变量。\n\
  \n以下是局部类通用语法的一个示例：\n\n\n\n```\nclass SomeClass {\n        void someFunction() {\n\
  \                class Local { }\n        }\n}\n```\n\n如这段代码所示，`Local` 是在 `someFunction`\
  \ 内部定义的类。它在 `someFunction` 外部不可访问，甚至对 `SomeClass` 的成员也不可见。由于不能将局部变量声明为 `static`，因此也不能将局部类声明为\
  \ `static`。\n\n由于接口中不能定义方法，因此接口内部不能包含局部类或局部接口。也不能创建局部接口。换句话说，不能在方法、构造器和初始化块中定义接口。\n\
  \n现在你已经理解了语法，让我们进入一个实际示例。在 FunPaint 应用程序中，你将 `Color` 类实现为静态嵌套类。以下是你在该讨论中看到的代码：\n\
  \n```\nabstract class Shape {\n        public static class Color {\n           \
  \     int m_red, m_green, m_blue;\n                public Color() {\n          \
  \              this(0, 0, 0);\n                }\n                public Color(int\
  \ red, int green, int blue) {\n                        m_red = red; m_green = green;\
  \ m_blue = blue;\n                }\n                public String toString() {\n\
  \                        return \" red = \" + m_red + \" green = \" + m_green +\
  \ \" blue = \" + m_blue;\n                }\n                // 其他颜色成员已省略\n    \
  \    }\n        // 其他 Shape 成员已省略\n}\n```\n\n现在，这个 `toString()` 方法显示了 `Color` 的字符串表示形式。假设你需要在\
  \ FunPaint 应用程序的屏幕底部显示帮助消息。为此，你需要描述性消息。以这种晦涩格式显示消息对读者帮助不大。因此，你希望以以下格式显示 `Color`\
  \ 字符串：`\"You selected a color with RGB values red = 0 green = 0 blue = 0\"`。为此，你必须在\
  \ `StatusReporter` 类中定义一个名为 `getDescriptiveColor()` 的方法。在 `getDescriptiveColor()`\
  \ 中，你必须创建一个 `Shape.Color` 的派生类，其中 `toString` 方法返回此描述性消息。清单 4-7 是使用局部类的实现。\n\n清单\
  \ 4-7.  StatusReporter.java\n\n```\nclass StatusReporter {\n        // 注意：参数 \"\
  color\" 被声明为 final 非常重要\n        // 否则，局部内部类 DescriptiveColor 将无法使用它！！\n       \
  \ static Shape.Color getDesciptiveColor(final Shape.Color color) {\n           \
  \     // 局部类 DescriptiveColor，它扩展了 Shape.Color 类\n                class DescriptiveColor\
  \ extends Shape.Color {\n                        public String toString() {\n  \
  \                              return \"You selected a color with RGB values \"\
  \ + color;\n                        }\n                }\n                return\
  \ new DescriptiveColor();\n        }\n\npublic static void main(String []args) {\n\
  \                Shape.Color descriptiveColor =\n                        StatusReporter.getDesciptiveColor(new\
  \ Shape.Color(0, 0, 0));\n                System.out.println(descriptiveColor);\n\
  \        }\n}\n```\n\n`main` 方法检查 `StatusReporter` 是否正常工作。该程序打印：\n\n```\n You selected\
  \ a color with RGB values  red = 0 green = 0 blue = 0 \n```\n\n让我们看看局部类是如何定义的。`getDescriptiveColor()`\
  \ 方法接受普通的 `Shape.Color` 类对象，并返回一个 `Shape.Color` 对象。在 `getDescriptiveColor()` 方法内部，你定义了\
  \ `DescriptiveColor` 类，该类是该方法的局部类。这个 `DescriptiveColor` 是 `Shape.Color` 的派生类。在 `DescriptiveColor`\
  \ 类内部，唯一定义的方法是 `toString()` 方法，它覆盖了基类 `Shape.Color` 的 `toString()` 方法。在 `DescriptiveColor`\
  \ 类定义之后，`getDescriptiveColor` 方法创建了一个 `DescriptiveColor` 类的对象并返回它。\n\n在 `Test` 类中，你可以看到一个\
  \ `main()` 方法，它只是调用了 `StatusReporter.getDescriptiveColor()` 方法，并将结果存储在一个 `Shape.Color`\
  \ 引用中。你会注意到 `getDescritiveColor()` 方法返回一个 `DescriptiveColor` 对象，该对象派生自 `Shape.Color`，因此\
  \ `descriptiveColor` 变量的初始化工作正常。在 `println` 中，`descriptiveColor` 的动态类型是 `DescriptiveColor`\
  \ 对象，因此打印出了颜色对象的详细描述。\n\n你是否注意到 `getDescriptiveColor()` 方法中的另一个特性？它的参数被声明为 `final`。如果移除\
  \ `final` 限定符，如下面的代码所示，会发生什么？\n\n```\nstatic Shape.Color getDesciptiveColor(Shape.Color\
  \ color)\n```\n\n嗯，你会得到以下编译器错误：\n\n```\nStatusReporter.java:24: 局部变量 color 从内部类中访问；需要被声明为\
  \ final\n        return \"You selected a color with RGB values \" + color;\n   \
  \                                                         ^\n1 error\n```\n\n为什么？关于局部类，你需要记住的一点是，只能将\
  \ `final` 变量传递给局部类。\n\n| ![image](img/banana.jpg) | 只能将 **final** 变量传递给局部内部类。 |\n\
  \n要点记忆\n\n关于局部类的以下几点很可能在 OCPJP 7 考试中出现：\n\n你可以在代码体内部创建非静态局部类。接口不能有局部类，也不能创建局部接口。\n\
  \n*   局部类只能从定义该类的代码体内部访问。局部类在定义该类的代码体外部完全不可访问。\n*   在定义局部类时，可以扩展一个类或实现接口。\n*   局部类可以访问定义它的代码体中所有可用的变量。只能将\
  \ final 变量传递给局部内部类。\n\n匿名内部类\n\n顾名思义，*匿名内部类*没有名称。类的声明自动从实例创建表达式中派生。它们也简称为*匿名类*。\n\
  \n在几乎所有可以使用局部内部类的情况下，匿名类都很有用。局部内部类有名称，而匿名内部类没有——这是主要区别！另一个区别是匿名内部类不能有任何显式构造器。构造器以类名命名，由于匿名类没有名称，因此无法定义构造器！\n\
  \n（在继续之前，请注意：不存在所谓的“匿名接口”。）\n\n以下是一个仅用于说明局部类语法的示例：\n\n```\nclass SomeClass {\n \
  \       void someFunction() {\n                new Object() { };\n        }\n}\n\
  ```\n\n这段代码看起来晦涩难懂，不是吗？这里发生了什么？在语句 `new Object() { };` 中，你直接使用 `new` 关键字声明了一个 `Object`\
  \ 的派生类。它没有定义任何代码，并返回该派生对象的一个实例。创建的对象没有在任何地方使用，因此被忽略。这里的 `new` 表达式调用了默认构造器；你也可以通过在\
  \ `new` 表达式中传递参数来选择调用基类的多参数构造器。定义匿名类时，它会隐式扩展基类（此处是 `Object` 基类）。\n\n如果你没有理解这个示例，请不要担心。现在你将看到一个更实际的示例，匿名类的用法会变得更清晰。\n\
  \n之前你在 `StatusReporter` 类的 `getDescriptiveColor` 方法中看到了 `DescriptiveColor` 类（清单\
  \ 4-7）。你可以通过将局部类转换为匿名类来简化代码，如清单 4-8 所示。\n\n清单 4-8.  StatusReporter.java\n\n\n\n\
  ```\nclass StatusReporter {\n        static Shape.Color getDesciptiveColor(final\
  \ Shape.Color color) {\n                // 注意这里使用了匿名内部类——具体来说，该类没有名称，\n        \
  \        // 我们在 return 语句中“即时”构造并使用该类！\n                return new Shape.Color()\
  \ {\n                        public String toString() {\n                      \
  \          return \"You selected a color with RGB values \" + color;\n         \
  \               }\n                };\n        }\n        public static void main(String\
  \ []args) {\n                Shape.Color descriptiveColor =\n                  \
  \      StatusReporter.getDesciptiveColor(new Shape.Color(0, 0, 0));\n          \
  \      System.out.println(descriptiveColor);\n        }\n}\n```\n\n输出结果为\n\n```\n\
  \ You selected a color with RGB values  red = 0 green = 0 blue = 0\n```\n\n这很不错。程序的其余部分，包括\
  \ `main()` 方法，保持不变，而 `getDescriptiveColor()` 方法变得更简单了！你没有显式创建一个有名称的类（即之前的 `DescriptiveColor`），而是在\
  \ return 语句中“即时”创建了一个 `Shape.Color` 的派生类。注意，关键字 `class` 也不再需要了。\n\n**要点记忆**\n\n\
  以下关于匿名类的要点涉及 OPCJP 7 考试中可能提出的问题：\n\n*   匿名类是在 `new` 表达式本身中定义的，因此你无法创建匿名类的多个对象。\n\
  *   在定义匿名类时，不能显式地继承某个类或显式地实现接口。\n\n**枚举数据类型**\n\n在很多情况下，你需要限制用户只能从预定义的列表中选择输入。例如，你可能希望用户从一组定义了几种打印机类型的常量中进行选择：\n\
  \n```\npublic static final int DOTMATRIX = 1;\npublic static final int INKJET =\
  \ 2;\npublic static final int LASER = 3;\n```\n\n这种方案是可行的。然而，在这种情况下，你可以传入任何其他整数（例如\
  \ 10），编译器也会欣然接受。因此，这种方案并不是一个*类型安全的方案*。\n\n为了避免这种情况，你可以定义自己的类（例如 `PrinterType`），并只允许合法的值。但是，你需要手动定义该类及其属性。这就是以前你可以采用\
  \ Joshua Bloch 的*类型安全枚举模式*的地方。不过别担心——你不再需要学习那些模式了。Java 5 引入了数据类型 *enum* 来帮助你应对这种情况。\n\
  \n清单 4-9 为上述示例定义了一个枚举类（是的，枚举是特殊的类）。\n\n清单 4-9.  EnumTest.java\n\n```\n// 定义一个用于分类打印机类型的枚举\n\
  enum PrinterType {\n        DOTMATRIX, INKJET, LASER\n}\n\n// 现在测试这个枚举\npublic class\
  \ EnumTest {\n        PrinterType printerType;\n\npublic EnumTest(PrinterType pType)\
  \ {\n                printerType = pType;\n        }\n\npublic void feature() {\n\
  \                // 根据构造函数中传入的打印机类型进行 switch 判断\n                switch(printerType){\n\
  \                case DOTMATRIX:\n                        System.out.println(\"\
  Dot-matrix printers are economical and almost obsolete\");\n                   \
  \     break;\n                case INKJET:\n                        System.out.println(\"\
  Inkjet printers provide decent quality prints\");\n                        break;\n\
  \                case LASER:\n                        System.out.println(\"Laser\
  \ printers provide best quality prints\");\n                        break;\n   \
  \             }\n        }\n\npublic static void main(String[] args) {\n       \
  \         EnumTest enumTest = new EnumTest(PrinterType.LASER);\n               \
  \ enumTest.feature();\n        }\n}\n```\n\n输出结果为\n\n```\nLaser printers provide\
  \ best quality prints\n```\n\n让我们更详细地探究一下清单 4-9 的示例。\n\n*   在 switch-case 语句中，你不需要为枚举元素提供完全限定名称。这是因为\
  \ switch 接收的是枚举类型的一个实例，因此 switch-case 能够理解你指定枚举元素时的上下文（类型）。\n*   在创建 `enumTest`\
  \ 实例时，除了枚举定义中指定的值之外，你不能提供任何其他输入。这使得枚举是类型安全的。\n\n请注意，你可以像声明任何其他普通 Java 类一样，将枚举（本例中的\
  \ `PrinterType`）声明在一个单独的文件中。\n\n现在你已经理解了枚举数据类型的基本概念，让我们看一个更详细的示例，其中你在枚举数据类型中定义了成员属性和方法。是的，你可以在枚举定义中定义方法或字段，如清单\
  \ 4-10 所示。\n\n清单 4-10.  PrinterType.java\n\n```\npublic enum PrinterType {\n   \
  \     DOTMATRIX(5), INKJET(10), LASER(50);\n\nprivate int pagePrintCapacity;\n\n\
  private PrinterType(int pagePrintCapacity) {\n                this.pagePrintCapacity\
  \ = pagePrintCapacity;\n        }\n\npublic int getPrintPageCapacity() {\n     \
  \           return pagePrintCapacity;\n        }\n}\n// EnumTest.java\npublic class\
  \ EnumTest {\n        PrinterType printerType;\n\npublic EnumTest(PrinterType pType)\
  \ {\n                printerType = pType;\n        }\n\npublic void feature() {\n\
  \                switch (printerType) {\n                case DOTMATRIX:\n     \
  \                   System.out.println(\"Dot-matrix printers are economical\");\n\
  \                        break;\n                case INKJET:\n                \
  \        System.out.println(\"Inkjet printers provide decent quality prints\");\n\
  \                        break;\n                case LASER:\n                 \
  \       System.out.println(\"Laser printers provide the best quality prints\");\n\
  \                        break;\n                }\n                System.out.println(\"\
  Print page capacity per minute: \" +\n                        printerType.getPrintPageCapacity());\n\
  \        }\n\npublic static void main(String[] args) {\n                EnumTest\
  \ enumTest1 = new EnumTest(PrinterType.LASER);\n                enumTest1.feature();\n\
  \                EnumTest enumTest2 = new EnumTest(PrinterType.INKJET);\n      \
  \          enumTest2.feature();\n        }\n}\n```\n\n上述程序的输出如下：\n\n```\nLaser printers\
  \ provide the best quality prints\nPrint page capacity per minute: 50\nInkjet printers\
  \ provide decent quality prints\nPrint page capacity per minute: 10\n```\n\n那么，在这个新版本的枚举示例程序中，你观察到了什么？你为枚举类定义了一个新属性、一个新构造函数和一个新方法。属性\
  \ `pagePrintCapacity` 由枚举元素（例如 `LASER(50)`）指定的初始值设置，这会调用枚举类的构造函数。然而，枚举类不能有公共构造函数，否则编译器会报出以下信息：`\"\
  Illegal modifier for the enum constructor; only private is permitted.\"`\n\n| ![image](img/banana.jpg)\
  \ | 枚举类中的构造函数只能指定为 private。 |\n\n**要点记忆**\n\n\n\n*   枚举被隐式声明为 public、static 和 final，这意味着你无法扩展它们。\n\
  *   定义枚举时，它会隐式继承自 `java.lang.Enum`。在内部，枚举会被转换为类。此外，枚举常量是枚举类的实例，该常量被声明为该类的成员。\n*\
  \   你可以对枚举元素应用 `valueOf()` 和 `name()` 方法，以返回枚举元素的名称。\n*   如果在类内部声明枚举，则默认情况下它是 static\
  \ 的。\n*   你不能对枚举数据类型使用 new 运算符，即使在枚举类内部也不行。\n*   你可以使用 == 运算符比较两个枚举是否相等。当调用枚举常量的\
  \ `toString()` 方法时，它会打印该枚举常量的名称。\n*   `Enum` 类中的静态 `values()` 方法在枚举类型上调用时，会返回一个包含所有枚举常量的数组。\n\
  *   枚举常量不能被克隆。尝试克隆会抛出 `CloneNotSupportedException` 异常。\n*   如果枚举常量来自两个不同的枚举，`equals()`\
  \ 方法不会返回 true。\n\n| ![image](img/bulp.jpg) | 枚举避免了魔法数字，这提高了源代码的可读性和可理解性。此外，枚举是类型安全的构造。因此，你应该在适用的情况下使用枚举。\
