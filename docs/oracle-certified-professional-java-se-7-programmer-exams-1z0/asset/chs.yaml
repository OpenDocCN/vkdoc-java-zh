  \ C：模拟测试 – 2\n\n答题卡\n\n答案与解析\n\n索引\n\n关于作者\n\n**S G Ganesh** 是西门子企业研究与技术中心（班加罗尔）代码质量管理领域的实践者。他曾任职于惠普的\
  \ C++编译器团队，并曾是 C++标准化委员会的成员。他的兴趣领域包括面向对象设计、设计模式和编程语言。他是软件工程认证讲师（IEEE 认证），并持有 OCPJP\
  \ 7 认证。\n\n**Tushar Sharma** 是西门子企业研究与技术中心（印度）的研究员和实践者。他获得了印度理工学院马德拉斯分校（IIT–Madras）的硕士学位。他的兴趣包括面向对象软件设计、面向对象编程、重构和设计模式。他持有\
  \ OCPJP 7 认证。\n\n关于技术审校\n\n**B V Kumar 博士** 目前是 Altius Inc 的总监，负责为企业客户提供基于技术的服务。Kumar\
  \ 博士拥有印度理工学院坎普尔分校的技术硕士学位和印度理工学院克勒格布尔分校的博士学位。他在信息技术领域拥有超过 22 年的各级别经验，曾任职于 Computer\
  \ Vision Corporation（新加坡）、Parametric Technologies（韩国首尔）、Sun Microsystems（印度）和 Infosys\
  \ Technologies Ltd 等公司。\n\n在创办 Altius Inc 之前，Kumar 博士曾担任 Cognizant Technology Solutions（印度）全球技术办公室的总监和首席架构师。他在企业技术解决方案领域工作了超过\
  \ 12 年，专注于 Java、JEE、Web 服务、面向服务架构和开源技术。他还通过 Joomla 和 Drupal 等应用以及 Android 和 iPhone\
  \ 等移动平台从事内容管理系统方面的工作。\n\n作为 Altius Inc 的总监，Kumar 博士目前专注于技术咨询、技术培训与推广、社区发展以及为企业客户提供项目支持。Kumar\
  \ 博士在 IT 领域拥有两项专利，并在国内外期刊和会议上发表过多篇技术论文。他还合著了以下信息技术书籍：《J2EE 架构》（2007 年）、《Web 服务第二版：导论》（2011\
  \ 年）、《使用 Java EE 实现 SOA》（2009 年）以及《安全 Java：Web 应用开发》（2010 年）。Kumar 博士目前正在撰写 Java\
  \ EE 7 架构的第二版。\n\n致谢\n\n我们首先要衷心感谢我们的策划编辑 Saswata Mishra，他从本书的概念构思到出版阶段都发挥了关键作用。Saswata，感谢您的出色支持——您让撰写本书成为一次愉快的体验！\n\
  \n我们特别感谢本书的文字编辑 Robert Hutchinson。Robert 在提升本书呈现质量方面发挥了重要作用。他对细节的关注令人惊叹。Robert，感谢您将我们粗糙的初稿打磨成可出版的稿件。\n\
  \n我们还要特别感谢我们的技术审校 B V Kumar 博士。他细致而严谨的审阅在提升本书的技术质量方面发挥了关键作用。\n\n我们谨向整个 Apress 团队致以诚挚的谢意，特别是\
  \ Jeffrey Pepper、Jill Balzano 女士、Mary Behr 女士和 Anna Ishchenko 女士，感谢他们在本书出版过程中做出的卓越贡献。\n\
  \n我们两人都花费了无数个小时，在深夜、周末和节假日撰写章节。当各自家中的孩子们吵闹着要关注时，正是我们配偶的支持才使本书的撰写成为可能。\n\n——S G Ganesh\
  \ 和 Tushar Sharma\n\n引言\n\n本书是一本为准备 OCPJP 7 考试而编写的全面指南。本书涵盖了 OCPJP 两项考试（*Java SE\
  \ 7 Programmer II*（1Z0-804 考试）和*Upgrade to Java SE 7 Programmer*（1Z0-805 考试））的考试目标。本书的主要目标是帮助读者准备并轻松通过\
  \ OCPJP 7 考试。\n\n本书涵盖了*Java SE 7 Programmer II*（1Z0-804 考试）的所有考试主题。本书的章节和章节内容与考试目标及子主题一一对应。这种章节与考试目标之间的一一对应关系确保我们只涵盖所需广度和深度的主题——不多也不少。如果您正在准备*Upgrade\
  \ to Java SE 7 Programmer*（1Z0-805 考试），请参阅附录 A 了解考试主题如何映射到本书各章节的说明。\n\n读者将会发现大量的样题，包括一份预测试、每章中的众多样题以及两份完整的模拟测试。这些样题不仅帮助读者为参加考试做准备，还能让读者对考试中会遇到的内容有切合实际的预期。\n\
  \n本书有许多特点，旨在以流畅的、以示例驱动的形式呈现内容，以提升您的阅读和学习体验。例如，各章节提供了大量的编程和现实世界示例，帮助您内化所介绍的每一个概念。此外，在每一章中，我们使用视觉提示（如警告标志和考试提示）来引导您注意那些与\
  \ OCPJP 7 考试特别相关的重要且有趣的概念方面。\n\n先决条件\n\n由于 OCAJP 7（即*Java SE 7 Programmer* I/1Z0-803）考试是更全面的\
  \ OCPJP 7 考试（1Z0-804）的先决条件，我们假设读者已经熟悉该语言的基础知识。我们仅关注 OCPJP 7 的考试目标，前提是读者具备 Java 的实用知识。\n\
  \n目标读者\n\n如果您符合以下任一情况，本书适合您：\n\n*   如果您是学生或 Java 程序员，渴望攻克 OCPJP 7 考试。\n*   如果您已经通过了\
  \ OCPJP 7 的任何旧版本考试（例如 SCJP 5 考试）。本书将为您准备*Upgrade to OCPJP 7*考试（1Z0-805）。\n*   如果您是\
  \ OCPJP 7 考试的培训师。您可以将本书用作 OCPJP 7 考试准备的培训材料。\n*   如果您只是想复习 Java 编程知识或更好地理解各种 Java\
  \ API。\n\n但请注意，本书既不是学习 Java 的教程，也不是全面的 Java 参考书。\n\n本书阅读路线图\n\n为了充分利用本书，我们建议您遵循以下步骤：\n\
  \n**第 0 步：** 确保您的机器上已安装 JDK 7，并且能够编译和运行 Java 程序。\n\n**第 1 步：** 首先阅读第 1 章中的常见问题解答，熟悉考试内容（您可以跳过不相关的问题或您已经知道答案的问题）。\n\
  \n\n\n**步骤 2：** 查看考试主题（附录 A），并标记你不熟悉或没有把握的主题。阅读你为备考而标记的主题所对应的章节或小节。\n\n**步骤 3：**\
  \ 完成第 2 章的预测试。如果你正确回答了某个考试章节的所有问题，你可以考虑跳过阅读该章节。对于你得分不高的考试主题，请标记这些章节并优先阅读。在阅读章节时，尽可能多地尝试示例程序。\n\
  \n**步骤 4：** 一旦你觉得自己已经准备好参加考试，就进行第一次模拟测试（附录 B）。如果你没有通过，请回到你薄弱的章节，重新阅读，并尝试更多与这些主题相关的代码。当你信心十足时，尝试第二次模拟测试（附录\
  \ C）。如果你准备充分，应该能够通过。\n\n**步骤 5：** 根据你在模拟测试中的表现，注册并参加考试。考试前一天，请阅读第 15 章“OCPJP 7 快速复习”。\n\
  \n关于本书中的代码示例\n\n本书中的所有程序都是独立的程序（包含必要的 import 语句）。你可以从 `www.apress.com/9781430247647`\
  \ 下载这些程序的源代码。\n\n我们已在两个编译器中测试了本书中的代码示例：Oracle 的 Java 编译器 JDK 7（javac）和 Eclipse Java\
  \ 编译器（ecj）。对于错误消息，我们提供了 javac 的错误消息。使用支持 Java 7 的 Java 编译器和 JVM 非常重要。\n\nJava 是一种平台无关的语言，但某些特性在特定平台上解释得更好。由于\
  \ Windows 是当今使用最广泛的操作系统，一些编程示例（特别是 NIO.2 章节中的某些程序）是针对 Windows 操作系统编写的。你可能需要对程序进行少量修改，才能让它们在其它操作系统（Linux、Mac\
  \ OS 等）上运行。\n\n联系我们\n\n如有任何疑问、建议或更正，请随时通过 `sgganesh@gmail.com` 或 `tusharsharma@ieee.org`\
  \ 联系我们。\n\n第 1 章\n\n![image](img/frontdot.jpg)\n\nOCPJP 7 考试：常见问题解答\n\nOCPJP 7 考试这个单一缩写代表两个独立但内容一致的考试：\n\
  \n*   Java SE 7 Programmer II 考试（考试编号 1Z0-804）\n*   升级至 Java SE 7 Programmer 考试（考试编号\
  \ 1Z0-805）\n\n这两门考试是获得同一认证的替代途径。通过 1Z0-804 和 1Z0-805 考试的考生均有资格获得相同的证书：Oracle 认证专家，Java\
  \ SE 7 程序员（OCPJP 7）。本书旨在帮助你准备 OCPJP 7 考试。\n\n1Z0-804 考试大纲（完整内容见附录 A）包含十二个主题，对应本书第\
  \ 3 章至第 14 章的标题和内容。本书同样适用于准备 1Z0-805 考试，其六个主题对应本书第 5 章至第 6 章以及第 9 章至第 14 章（参见附录\
  \ A）。\n\n在本章中，我们将解答你在准备 OCPJP 7 考试时可能会想到的常见问题。同样，“OCPJP 7 考试”一词应理解为包含该考试的两种变体，即\
  \ 1Z0-804 和 1Z0-805。本书提供的学习课程、模拟试题和练习测试将帮助你同样出色地准备其中任何一种考试。你选择参加 OCPJP 7 考试的哪种变体，将取决于你现有的资质，如下所述。\n\
  \n我们在本章中提供的常见问题解答涉及诸如 OCPJP 7 认证在 Oracle Java 认证体系中的位置、OCPJP 7 考试的难度和先决条件、OCPJP\
  \ 7 考试大纲涵盖的主题范围、备考深度，以及注册和参加考试的细节等问题。广义上讲，本章包含三个部分：\n\n*   *Oracle Java 认证* *：概述*\
  \ **：** 常见问题 1–6 概述了 Oracle 的各种 Java 考试及其对应的 Java 认证。它特别关注 OCAJP 7 考试，因为 Oracle\
  \ 认证助理，Java SE 7 程序员（OCAJP 7）证书是通过 1Z0-804 考试获得 OCPJP 7 认证的先决条件。\n*   *OCPJP 7 考试*：常见问题\
  \ 7–15 涉及 OCPJP 7 考试的目标、考试题型以及备考细节。\n*   *参加 OCPJP 7 考试*：常见问题 16、17 和 18 涵盖了注册考试的具体细节、考试当天需要做的各种事情以及实际参加考试的过程。\n\
