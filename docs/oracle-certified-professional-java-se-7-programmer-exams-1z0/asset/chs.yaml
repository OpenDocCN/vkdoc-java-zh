  User name is: root@localhost\nMaximum no. of rows you can insert is: 2147483639\n\
  ```\n\n要点记忆\n\n以下是一些可能对你的 OCPJP 考试有帮助的要点：\n\n*   `ResultSet` 中的 `boolean absolute(int)`\
  \ 方法将光标移动到该 `ResultSet` 对象中指定的行号位置。如果行号为正，则从 `ResultSet` 对象的开头移动到该位置；如果行号为负，则从 `ResultSet`\
  \ 对象的末尾移动到该位置。假设 `ResultSet` 对象中有 10 条记录。调用 `absolute(3)` 会将光标移动到第三行。调用 `absolute(−3)`\
  \ 会将光标移动到第 10–3 行，即第七行。如果给出超出范围的值，光标将移动到开头或末尾。\n*   在 `ResultSet` 对象中，调用 `absolute(1)`\
  \ 等同于调用 `first()`，调用 `absolute(−1)` 等同于调用 `last()`。\n\n执行事务\n\n*事务*是一组 SQL 操作，这些操作要么全部成功执行，要么全部不执行。即使一个操作失败，也会导致数据库不一致和错误。\n\
  \n数据库必须满足 ACID 属性（原子性、一致性、隔离性和持久性），以保证数据库事务的成功。\n\n\n\n*   **原子性：** 每个事务都应完整执行；如果事务的某一部分失败，则整个事务失败。\n\
  *   **一致性：** 数据库在执行事务前后都应处于有效状态。\n*   **隔离性：** 每个事务应在完全隔离的状态下执行，无需知晓其他事务的存在。\n*\
  \   **持久性：** 一旦事务完成，事务所做的更改就是永久的（即使在发生电源故障等异常事件时也是如此）。\n\n事务的一个经典示例是通过银行账户进行资金转账。如果要将一定金额\
  \ x 转账到另一个账户，则必须从第一个账户中扣除金额 x，并将其添加到另一个账户中。本质上，完成资金转账（可称之为一个事务）需要两个操作。任何一个操作失败都是不可接受的：如果从第一个账户扣除了资金，但未添加到另一个账户，则第一个账户持有人会无故损失\
  \ x 金额；如果第二个账户获得了 x 金额，但未从第一个账户扣除，则银行肯定会出问题。因此，要么两个操作都成功，要么两个操作都失败。\n\n| ![image](img/Note.jpg)\
  \ | 事务的所有操作必须要么全部成功，要么完全不执行。 |\n\n通常，在 JDBC 环境中，每条语句都是一个事务。这意味着什么？当你调用诸如 `updateRow()`\
  \ 之类的方法时，JDBC 会立即更新底层数据库。JDBC 的这种行为可以通过 `setAutoCommit()` 方法控制；默认情况下它为 true，因此每个更新语句都会立即更改数据库。但是，如果你将此属性设置为\
  \ false，则你有责任在 `Connection` 对象上调用 `commit()` 方法。`commit()` 方法实际上会将所有更改提交到数据库。\n\n\
  在查看使用 `Connection` 接口进行事务的示例程序之前，你首先会看到此类中支持的事务相关方法（表 10-3）。（请注意，此表中给出的所有方法都可能抛出\
  \ `SQLException`，因此我们在此表中不会为每个方法明确提及这一点。）\n\n表 10-3. Connection 接口中的事务相关方法\n\n|\
  \ 方法 | 描述 |\n| --- | --- |\n| `void setAutoCommit(boolean autoCommit)` | 将自动提交模式设置为\
  \ true 或 false。默认情况下，`Connection` 对象的自动提交设置为 true，你可以通过调用此方法并将 false 作为参数值来将其设置为\
  \ false。 |\n| `boolean getAutoCommit()` | 返回自动提交模式值（true 值表示自动提交模式，false 值表示手动提交模式）。\
  \ |\n| `Savepoint setSavepoint()` | 在当前事务中创建一个 `Savepoint` 对象并返回该对象。 |\n| `Savepoint\
  \ setSavepoint(String name)` | 与上一个方法相同，只是 `Savepoint` 对象关联了一个名称。 |\n| `void releaseSavepoint(Savepoint\
  \ savepoint)` | 从当前事务中移除给定的 `Savepoint` 对象及其后续的 `Savepoint` 对象。 |\n| `void rollback(Savepoint\
  \ savepoint)` | 回滚到给定的 `Savepoint` 状态。换句话说，在创建 `Savepoint` 之后所做的所有更改都将丢失或移除（即撤消到该\
  \ `Savepoint` 的操作）。如果无法执行回滚（例如，传递了无效的 `Savepoint` 对象），将抛出 `SQLException`。 |\n| `void\
  \ rollback()` | 回滚（撤消）当前事务中所做的所有更改。如果回滚失败（例如，在设置了自动提交模式时调用了 `rollback()`），将抛出 `SQLException`。\
  \ |\n| `void commit()` | 将事务中到目前为止所做的所有更改提交到数据库。 |\n\n让我们通过一个示例来理解事务。回想一下，你有一个名为\
  \ `addressBook` 的 MySQL 数据库，其中有一个名为 `contact` 的表。现在，你想要拥有不同的联系人组；例如，其中一个组是 `familyGroup`；你为家庭成员维护了另一个名为\
  \ `familyGroup` 的表。现在假设你想在 `familyGroup` 表中添加一条新记录（你只存储家庭成员的昵称），同时在 `contact` 表中添加完整的联系详情。设想一种情况：你在\
  \ `familyGroup` 中添加了家庭成员的昵称，但无法添加联系人的完整联系详情！这种情况会导致数据库不一致。这是一个事务的示例，因为你希望两个操作都成功执行（或者根本不做任何更改，以便可以再次尝试）。清单\
  \ 10-11 包含一个实现此功能的小程序。\n\n清单 10-11.  DbTransaction.java\n\n```\nimport java.sql.*;\n\
  \n// 说明如何执行提交或回滚\nclass DbTransaction {\n        public static void main(String[]\
  \ args) throws SQLException {\n                Connection connection = DbConnector.connectToDb();\n\
  \                ResultSet resultSet1 = null, resultSet2 = null;\n             \
  \   // 在此代码中我们使用显式的 finally 块\n                // 而不是 try-with-resources 语句\n  \
  \              try {\n                        // 为了提交/回滚，我们首先需要将自动提交设置为 false\n\
  \                        connection.setAutoCommit(false);\n                    \
  \    Statement statement = connection.createStatement\n                        \
  \        (ResultSet.TYPE_SCROLL_SENSITIVE, ResultSet.CONCUR_UPDATABLE);\n      \
  \                  resultSet1 = statement.executeQuery(\"SELECT * FROM familyGroup\"\
  );\n                        resultSet1.moveToInsertRow();\n                    \
  \    resultSet1.updateString(\"nickName\", \"Sam Uncle\");\n                   \
  \     // 在此更新...但如果发生回滚，此更改将丢失\n                        resultSet1.insertRow();\n\
  \                        System.out.println(\"第一个表已更新...\");\n\nresultSet2 = statement.executeQuery(\"\
  SELECT * FROM contact\");\n                        resultSet2.moveToInsertRow();\n\
  \                        resultSet2.updateString(\"firstName\", \"Samuel\");\n \
  \                       // resultSet2.updateString(\"firstName\",\n            \
  \                    \"来自华盛顿特区的亿万富翁山姆大叔\");\n                        resultSet2.updateString(\"\
  lastName\", \"Uncle\");\n                        resultSet2.updateString(\"email\"\
  , \"sam@abc.com\");\n                        resultSet2.updateString(\"phoneNo\"\
  , \"+119955331100\");\n                        // 在此更新...但如果发生回滚，此更改将丢失\n      \
  \                  resultSet2.insertRow();\n                        System.out.println(\"\
  两个表都已更新，现在提交。\");\n                        // 我们现在才提交两个表的更改\n                  \
  \      connection.commit();\n                } catch (SQLException e) {\n      \
  \                  System.out.println(\n                                \"出现问题，无法在家庭组中添加联系人\"\
  );\n                        // 由于出现问题，回滚事务中的所有更改\n                        connection.rollback();\n\
  \                        e.printStackTrace();\n                }\n             \
  \   finally {\n                        if(connection != null) connection.close();\n\
  \                        if(resultSet1 != null) resultSet1.close();\n          \
  \              if(resultSet2 != null) resultSet2.close();\n                }\n \
  \       }\n}\n```\n\n\n\n让我们先理解这个程序。事务中基本上有两个操作：第一个是在名为 `familyGroup` 的表中为联系人“Sam\
  \ Uncle”添加新行；第二个是在名为 `contact` 的表中添加“Sam Uncle”的完整联系人详情。现在，看看关键区别：你调用了 `setAutoCommit()`\
  \ 方法，参数为 `false`；因此，自动提交不会发生。另一个区别是，你通过连接对象调用了 `commit()` 方法。因此，当两个操作都成功时，你将通过调用\
  \ `commit()` 方法（按计划更新）来更新数据库。\n\n现在，让我们执行这个程序，看看它会输出什么。\n\n```\nSomething gone wrong,\
  \ couldn't add a contact in family group\ncom.mysql.jdbc.exceptions.jdbc4.MySQLSyntaxErrorException:\
  \ Table 'addressbook.familygroup' doesn't exist\n        at sun.reflect.NativeConstructorAccessorImpl.newInstance0(Native\
  \ Method)\n        [. . . 此处省略部分堆栈跟踪以节省空间 . . .]\n        at DbTransaction.main(DbTransaction.java:18)\n\
  ```\n\n发生了什么？你还没有创建 `familyGroup` 表。在 MySQL 命令行中创建它。\n\n```\nmysql> create table\
  \ familyGroup (id int not null auto_increment, nickName varchar(30) Not null, primary\
  \ key (id));\nQuery OK, 0 rows affected (0.11 sec)\n```\n\n现在尝试再次运行程序。\n\n```\n\
  First table updated. . .\nSomething gone wrong, couldn't add a contact in family\
  \ group\ncom.mysql.jdbc.MysqlDataTruncation: Data truncation: Data too long for\
  \ column 'firstName' at row 1\n        at com.mysql.jdbc.MysqlIO.checkErrorPacket(MysqlIO.java:4072)\n\
  \        [. . . 此处省略部分堆栈跟踪以节省空间 . . .]\n        at DbTransaction.main(DbTransaction.java:43)\n\
  ```\n\n嗯，你遇到了一个 `SQLException`，因为为 Uncle Sam 的名字提供的字符串太长。你可以观察到第一个表已更新，而异常发生在执行第二个操作时。但是，你已经将自动提交模式设置为\
  \ false；因此，第一个表在数据库中并未更改。实际上，只有当你执行 `commit()` 方法时，两个表才会被更改。换句话说，如果在手动提交模式下 `commit()`\
  \ 方法没有执行，那么数据库将不会有任何更改。在上面的例子中，由于异常发生在 `commit()` 方法能够执行之前，两个表都没有被更改。\n\n让我们在 `updateString()`\
  \ 方法（在上面的程序中）中更改 Sam uncle 的名字，然后重新运行示例。将之前的语句替换为这个新语句：\n\n```\nresultSet2.updateString(\"\
  firstName\", \"Samuel\");\n```\n\n让我们看看这次程序的输出。\n\n```\nFirst table updated. . .\n\
  Both tables updated, committing now.\n```\n\n完美！这次两个操作都成功了，所以事务完成了。\n\n回滚数据库操作\n\
  \n在最后一个示例（清单 10-11）中，你使用了一个名为 `rollback()` 的方法，该方法通过 `Connection` 对象调用。此方法用于回滚事务中所有未提交的操作。\n\
  \n如果你从最后一个示例中移除 rollback 语句，会发生什么？如果你的答案是：在成功条件下它能正常工作，但在发生异常时程序将无法工作（因为缺少 `rollback()`\
  \ 方法调用），那你就错了。程序在两种情况下都能工作。是的，两种情况下都能！那么，为什么还要使用 `rollback()` 呢？答案如下三点所述：\n\n* \
  \  上面的示例说明了一个相当简单的两操作事务。在这种情况下，显式的 `rollback()` 不会改变任何东西。然而，在可以定义各种里程碑（以 `savepoints`\
  \ 的形式，我们稍后会讨论）的多阶段事务中，回滚起着至关重要的作用。未完成或不完整的子事务状态可能会导致不一致。\n*   如果你的连接对象是一个池化连接对象，那么调用\
  \ `rollback()` 是有意义的。对于池化连接对象，该连接对象稍后会被重用，而此时未完成的操作可能会导致不一致。\n*   一般来说，在失败的情况下使用\
  \ `rollback()` 方法总是被推荐的。\n\n对于大型事务，你可以将事务划分为多个子事务。换句话说，你可以定义多个里程碑来完成事务。这些里程碑被称为\
  \ `savepoints`，Java 中对此概念的抽象是 `java.sql.Savepoint` 接口。一旦事务完成了某个里程碑，该点可以保存为一个 `Savepoint`，并且到该点为止执行的操作可以被提交。如果稍后在执行其他数据库操作时发生故障，你可以将数据库回滚到你最后定义并保存的\
  \ `savepoint`。这样，你就不必从头开始整个冗长的事务；你可以从最后一个保存的 `savepoint` 开始。清单 10-12 演示了如何使用 `savepoints`。\n\
  \n清单 10-12.  DbSavepoint.java\n\n```\nimport java.sql.*;\n\n// 演示如何将保存点与提交和回滚一起使用\n\
  class DbSavepoint {\n        public static void main(String[] args) throws SQLException\
  \ {\n                Connection connection = DbConnector.connectToDb();\n      \
  \          ResultSet resultSet = null;\n                // 在此代码中我们使用显式的 finally\
