  \ x 的正则表达式匹配：\n\n*   `x*` 表示匹配 `x` 零次或多次。\n*   `x+` 表示匹配 `x` 一次或多次。\n*   `x{n}`\
  \ 表示精确匹配 `x` 恰好 `n` 次。\n\n模式 `a*b+c{3}` 表示匹配 `a` 零次或多次，后跟 `b` 一次或多次，再后跟 `c` 恰好三次。\n\
  \n因此，以下是 `strings` 数组中元素的匹配情况：\n\n*   对于 `\"abc\"`，匹配失败，结果为 `false`。\n*   对于 `\"\
  abbccc\"`，匹配成功，结果为 `true`。\n*   对于 `\"aabbcc\"`，匹配失败，结果为 `false`。\n*   对于 `\"aaabbbccc\"\
