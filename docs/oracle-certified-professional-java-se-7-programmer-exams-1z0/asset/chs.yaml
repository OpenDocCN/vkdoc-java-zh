  \n*   **产品层级结构：** `Shape` 是基础接口，由 `DisplayFriendlyShape` 和 `PrinterFriendlyShape`\
  \ 扩展。为 `Circle` 和 `Rectangle` 类分别定义了两种风格：显示友好型和打印友好型。\n*   **抽象工厂实现：** 由作为基础接口的\
  \ `ShapeFactory`，以及作为具体工厂的 `PrinterFriendlyFactory` 和 `DisplayFriendlyFactory` 组成。`PrinterFriendlyFactory`\
  \ 只创建 `PrinterFriendlyCircle` 和 `PrinterFriendlyRectangle`；类似地，`DisplayFriendlyFactory`\
  \ 创建 `DisplayFriendlyCircle` 和 `DisplayFriendlyRectangle`。\n\n代码的其余部分与清单 5-12 中程序的工厂版本非常相似。\n\
  \nJava SDK 在许多地方都采用了抽象工厂模式。例如，你最好查看并理解以下内容：\n\n\n\n*   `javax.xml.transform.TransformerFactory`\n\
  *   `javax.xml.xpath.XPathFactory`\n\n| ![image](img/Note.jpg) | **括号注释：** 对于 OCPJP\
  \ 7 考试，你需要理解工厂设计模式，即工厂根据提供的输入创建产品层次结构的新实例。另一种实现工厂的方式是*反射*，这不在 OCPJP 7 考试范围内，但值得一提。使用反射实现工厂的主要优势在于，你可以在不修改工厂实现或损害工厂创建新增类的能力的情况下，扩展产品层次结构。\
  \ |\n\n数据访问对象（DAO）设计模式\n\n假设你和家人参加一个多元文化博览会，决定乘坐旋转木马。你看到一个带有许多按钮的大面板，用于操作旋转木马。你让操作员启动旋转木马、调整速度并停止它。操作员知道如何使用面板，他遵循你的指示。他为你提供了一个抽象，让你无需了解复杂的控制面板。事实上，如果你去博览会另一端的另一个旋转木马，你可以用同样的方式指示它的操作员，而该操作员也会以同样的方式遵循你的指示，即使他的面板与第一个旋转木马不同。本质上，你的家人可以乘坐任何旋转木马，而无需了解其操作面板，因为操作机器的知识已被操作员抽象化了。*数据访问对象（DAO）*设计模式以类似的方式为你提供抽象。\n\
  \n在实际项目中，你会遇到需要持久化数据的情况。你可能会使用平面文件（即本地操作系统上的数据文件）、XML 文件、OODBMS、RDBMS 等。在这种情况下，你可以使用\
  \ DAO 设计模式。该设计模式抽象了底层持久化机制的细节，并为你提供了一个易于使用的接口，用于在应用程序中实现持久化功能。DAO 模式向其客户端隐藏了数据源的实现细节，从而在你的核心业务逻辑和持久化机制之间引入了松散耦合。这种松散耦合使你能够从一种持久化机制迁移到另一种，而无需进行大规模的更改。\n\
  \n| ![image](img/Note.jpg) | DAO 设计模式本质上将你的核心业务逻辑与持久化逻辑分离开来。 |\n\n让我们检查一下该模式的结构，如图\
  \ 5-4 所示。`DataSource` 代表具体的持久化实现，例如 RDBMS、XML 数据库，甚至是另一个系统/存储库。`DAO` 为 `DataSource`\
  \ 提供抽象，隐藏了具体的实现细节，并为所有不同类型的数据源提供单一接口。`Client` 是 DAO 模式的使用者，它通过 `DAO` 使用 `DataSource`，而\
  \ `TransferObject` 是用于传输核心对象的数据传输对象。\n\n![9781430247647_Fig05-04.jpg](img/9781430247647_Fig05-04.jpg)\n\
  \n图 5-4.  DAO 设计模式的 UML 类图\n\n除了上述参与者（`Client`、`DAO`、`TransferObject` 和 `DataSource`）之外，该模式可能还有一个参与者——`DAOFactory`。你可能拥有多个\
  \ DAO 对象，对应于你想要存储的所有不同类型的对象。你可以定义一个工厂（使用工厂设计模式，就像你在上一节中所做的那样），该工厂可以为每个 DAO 对象提供一个方法。别担心……你将在下一个示例中实现一个工厂。\n\
  \n假设你想在 FunPaint 应用程序中实现 DAO 设计模式。这里，你有一个 `Circle` 类，你想将其存储在持久化数据存储中。清单 5-15 展示了该模式的实现。\n\
  \n清单 5-15.  Test.java\n\n```\n// Circle.java\npublic class Circle {\n        private\
  \ int xPos, yPos;\n        private int radius;\n        public Circle(int x, int\
  \ y, int r) {\n                xPos = x;\n                yPos = y;\n          \
  \      radius = r;\n        }\n        public String toString() {\n            \
  \    return \"center = (\" + xPos + \",\" + yPos + \") and radius = \" + radius;\n\
  \        }\n        public CircleTransfer getCircleTransferObject() {\n        \
  \        CircleTransfer circleTransfer = new CircleTransfer();\n               \
  \ circleTransfer.setRadius(radius);\n                circleTransfer.setxPos(xPos);\n\
  \                circleTransfer.setyPos(yPos);\n                return circleTransfer;\n\
  \        }\n        // other members\n}\n\n// CircleDAO.java\npublic interface CircleDAO\
  \ {\n        public void insertCircle(CircleTransfer circle);\n        public CircleTransfer\
  \ findCircle(int id);\n        public void deleteCircle(int id);\n}\n\n// RDBMSDAO.java\n\
  public class RDBMSDAO implements CircleDAO {\n        @Override\n        public\
  \ void insertCircle(CircleTransfer circle) {\n                // insertCircle implementation\n\
  \                System.out.println(\"insertCircle implementation\");\n        }\n\
  \        @Override\n        public CircleTransfer findCircle(int id) {\n       \
  \         // findCircle implementation\n                return null;\n        }\n\
  \        @Override\n        public void deleteCircle(int id) {\n               \
  \ // deleteCircle implementation\n        }\n}\n\n// DAOFactory.java\npublic class\
  \ DAOFactory {\n         public static CircleDAO getCircleDAO(String sourceType)\
  \ {\n                // This is a simple example, so we have listed only \"RDBMS\"\
  \ as the only source type\n                // In a real-world application, you can\
  \ provide more source types\n                switch(sourceType){\n             \
  \   case \"RDBMS\":\n                        return new RDBMSDAO();\n          \
  \      }\n                return null;\n        }\n}\n\n// CircleTransfer.java\n\
  import java.io.Serializable;\n\npublic class CircleTransfer implements Serializable\
  \ {\n        private int xPos;\n        private int yPos;\n        private int radius;\n\
  \        public int getxPos() {\n                return xPos;\n        }\n     \
  \   public void setxPos(int xPos) {\n                this.xPos = xPos;\n       \
  \ }\n        public int getyPos() {\n                return yPos;\n        }\n \
  \       public void setyPos(int yPos) {\n                this.yPos = yPos;\n   \
  \     }\n        public int getRadius() {\n                return radius;\n    \
  \    }\n        public void setRadius(int radius) {\n                this.radius\
  \ = radius;\n        }\n}\n\n// Test.java\npublic class Test {\n        public static\
  \ void main(String[] args) {\n                Circle circle = new Circle(10, 10,\
  \ 20);\n                System.out.println(circle);\n                CircleTransfer\
  \ circleTransfer = circle.getCircleTransferObject();\n                CircleDAO\
  \ circleDAO = DAOFactory.getCircleDAO(\"RDBMS\");\n                circleDAO.insertCircle(circleTransfer);\n\
  \        }\n}\n```\n\n嗯，这是一个相当大的程序。让我们逐步分析一下。`Circle` 类属于你的核心业务逻辑；除了其他常规成员外，`Circle`\
  \ 类包含一个方法——`getCircleTransferObject()`——它返回包含所需数据的 `CircleTransfer` 对象。你定义了 `CircleDAO`\
  \ 接口，其中包含三个常用于数据源的方法。`RDBMSDAO` 实现了 `CircleDAO`，并提供了访问 RDBMS 数据源的具体实现。`CircleTransfer`\
  \ 对象在 `main()` 方法（充当 `Client`）和 `DAO` 实现（即 `RDBMSDAO` 类）之间扮演数据载体的角色。\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\
  \n\n在清单 5-15 的实现中，另一个值得注意的特性是使用了工厂设计模式。在一个应用程序中，可能会有许多 DAO 对象。例如，在 FunPaint 应用程序中，你可能会有\
  \ `CircleDAO`、`RectangleDAO`、`SquareDAO` 等。你可以在一个 DAO 工厂中定义 *getter 方法* 来获取相应的 DAO\
  \ 对象。在每个方法中，你可以根据提供的类型返回一个合适的 DAO 对象，就像本例中根据 RDBMS 类型所做的那样。\n\n以下是 DAO 设计模式的好处：\n\
  \n*   该模式引入了一种抽象：DAO 对核心业务逻辑隐藏了实际数据源的实现细节。业务逻辑无需了解数据源的细枝末节，从而使代码更易于理解、更简单。\n*  \
  \ 该模式将持久化机制与应用程序的其余代码分离，并将其集中到一个特定于某个数据源的类中。这种集中化使得维护和错误追踪更加容易。\n*   使用此模式扩展对其他数据源的支持非常容易。例如，如果你想在\
  \ FunPaint 应用程序中提供对基于 XML 的存储库的支持，可以通过定义一个新类（例如 `XMLDAO`）来实现。这个新类将实现你的 `CircleDAO`\
  \ 接口，这样你就不需要更改访问数据源的方式。唯一需要更改的是你传递给 `DAOFactory` 以创建 DAO 的参数。很简单，不是吗？\n\n要点记忆\n\n\
  以下是 OCPJP 7 考试需要记住的要点：\n\n*   你在 DAO 设计模式中看到了工厂设计模式的实现。如果你有多个 DAO 对象和多个持久化机制，你也可以采用抽象工厂设计模式。\n\
  *   请注意，你将 `TransferObject`（例如 `CircleTransfer`）声明为 *可序列化的*。知道为什么这样做吗？嗯，如果你在两个 JVM\
  \ 之间使用传输对象，那么该传输对象必须是可序列化的。\n*   在 OOP 中，一个有用且重要的设计原则是“关注点分离”。该原则指出，*关注点*（或特性）应该被*分离*（以实现最小重叠），以克服软件设计中固有的复杂性。DAO\
  \ 设计模式帮助你遵守这一设计原则。如果你不使用 DAO，那么你的业务逻辑将暴露于持久化机制的具体实现细节——这是一种不可取的状态。使用 DAO 设计模式可以确保你将核心逻辑与持久化机制分离开来。\n\
  \n问答时间！\n\n1.  以下哪个陈述是正确的？\n\n*   A.  一个类可以继承多个基类。\n    *   B.  由于 Java 不支持多重继承，你只能实现一个接口。\n\
  \    *   C.  你可以实现多个接口。\n    *   D.  你一次只能继承一个类或实现一个接口（但不能同时进行）。\n\n**答案：** C\n\n\
  2.  考虑以下接口声明：\n\n```\n    public interface Rotatable {\n         void rotate(float\
  \ degree);\n         // 插入代码\n    }\n    ```\n\n现在，考虑以下可以替换“// 插入代码”的选项：\n\n*  \
  \ `I.  public final float degree = 0;`\n    *   `II.  public static final float\
  \ degree = 0;`\n    *   `III.  public final static float degree = 0;`\n    *   `IV.\
  \  public final float degree;`\n    *   `V.  public float degree;`\n    *   `VI.\
  \  float degree = 0;`\n\n选择正确的选项：\n\n*   A.  选项 I、II、III 和 VI 可以无错误编译。\n    *  \
  \ B.  选项 I、II 和 III 可以无错误编译。\n    *   C.  选项 I 可以无错误编译。\n    *   D.  选项 IV 和 V 可以无错误编译。\n\
  \    *   E.  所有选项都可以无错误编译。\n\n**答案：** A\n\n3.  考虑以下示例：\n\n```\n    public interface\
  \ xyz {\n         void abc() throws IOException;\n    }\n    public interface pqr\
  \ {\n         void abc() throws FileNotFoundException;\n    }\n    public class\
  \ Implementation implements xyz, pqr {\n         // 插入代码\n         { /*实现*/ }\n\
  \    }\n    ```\n\n以下哪个语句可以插入到“// 插入代码”注释的位置？\n\n*   A.  public void abc() throws\
  \ IOException\n    *   B.  public void abc() throws FileNotFoundException\n    *\
  \   C.  public void abc() throws FileNotFoundException, IOException\n    *   D.\
  \  public void abc() throws IOException, FileNotFoundException\n\n**答案：** B\n\n\
  （因为 `FileNotFoundException` 是 `IOException` 的子类型，所以它满足两个方法的要求）。\n\n4.  考虑以下三个类：`University`、`Department`\
  \ 和 `CSE_Department`（CSE 代表计算机科学与工程）。`University` 和 `Department` 类通过关系 R1 关联，`Department`\
  \ 和 `CSE_Department` 类通过关系 R2 关联。这些关系的哪种组合是合适的？\n\n*   A.  R1：继承，R2：继承\n    *  \
  \ B.  R1：组合，R2：继承\n    *   C.  R1：继承，R2：组合\n    *   D.  R1：组合，R2：组合\n\n**答案：** B\n\
  \n（一所大学有多个系，因此它们之间是 has-a 关系，即组合关系。CSE_Department 是一个系，因此这两者之间是 is-a 关系，即继承关系。）\n\
  \n5.  你需要对一个文件系统进行建模，其中文件夹内可以包含子文件夹和文件。在这种情况下，表示 `Folder` 和 `File` 类之间关系的最合适的设计选择是什么？\n\
  \n*   A.  使用组合来建模“一个 `Folder` 对象由 `File` 对象组成”的关系。\n    *   B.  使用组合来建模“一个 `Folder`\
  \ 对象由 `File` 对象或 `Folder` 对象组成”的关系。\n    *   C.  使用继承定义一个超类（例如 `FolderItem`），并使\
  \ `Folder` 和 `File` 类成为该类的子类。使用组合来建模“一个 `Folder` 对象由 `FolderItem` 对象组成”的关系。\n  \
  \  *   D.  在 `Folder` 和 `File` 类之间使用继承来建模“一个 `Folder` 是 `File` 的一种类型”的关系。\n\n**答案：**\
  \ C\n\n（实际上，这种安排被称为组合设计模式）\n\n总结\n\n**接口**\n\n*   接口是一组定义协议的抽象方法。\n*   接口不能被实例化；但是，一个接口可以扩展另一个接口。\n\
  *   接口中声明的所有方法都被隐式地视为抽象方法。\n*   抽象类和接口是非常相似的概念。但是，你应该根据上下文谨慎地使用合适的构造。\n\n**对象组合**\n\
  \n*   继承意味着 is-a 关系，接口意味着 is-like-a 关系，组合意味着 has-a 关系。\n*   在可行的情况下，优先使用组合而非继承。\n\
  *   针对接口编程，而不是针对实现编程。\n\n**设计模式**\n\n*   设计模式是经常重复出现的设计问题的可重用解决方案。\n*   观察者设计模式改善了主题和观察者之间的松散耦合。\n\
  *   单例设计模式确保只创建该类的一个实例。\n*   确保预期的单例实现确实是单例是一项非常重要的任务，尤其是在多线程环境中。\n*   工厂设计模式按需“制造”所需类型的产品。\n\
  *   当你有一系列对象需要创建时，应该考虑使用抽象工厂设计模式。\n*   DAO 设计模式本质上将你的核心业务逻辑与持久化逻辑分离开来。\n\n第 6 章\n\
  \n![image](img/frontdot.jpg)\n\n泛型和集合\n\n![9781430247647_unFig06-01.jpg](img/9781430247647_unFig06-01.jpg)\n\
  \n\n\n每个非平凡的 Java 应用程序都会使用数据结构和算法。Java 集合框架提供了大量现成的通用数据结构和算法。这些数据结构和算法可以以类型安全的方式与任何合适的数据类型一起使用；这是通过使用一种称为泛型的语言特性来实现的。\n\
  \n由于数据结构和算法是使用泛型实现的，因此在 1Z0-804 考试大纲中，这两个互补的主题被合并为一个主题。在本章中，我们首先介绍泛型，它对于定义可重用的数据结构和算法非常有用。我们将讨论泛型如何比\
  \ `Object` 类型容器提供更高的类型安全性。我们还将探讨泛型的其他方面，例如泛型中的通配符参数和泛型中的子类型化。\n\n在本章的集合部分，你将学习如何使用\
  \ Java 库中提供的现成数据结构（使用泛型实现）。我们将讨论集合框架中一些从 OPCJP 7 考试角度来看很重要的接口和具体类。\n\n泛型\n\n*泛型*\
  \ 是 Java 1.5 版本引入的一种语言特性。泛型帮助你为一种类型（例如 `T`）编写适用于所有类型的代码，而不是为每种类型编写单独的类。在 Java 引入泛型之前，`Object`\
  \ 基类被用作泛型的替代方案。然而，使用 `Object` 类在容器中存储元素会导致类型安全问题——也就是说，使用这样的容器会允许 Java 编译器无法识别的类型错误，从而导致运行时异常。如果你不理解这段关于类型安全的描述，不用担心，因为我们接下来会用几个例子详细解释类型安全问题。理解类型安全很重要。事实上，在语言中添加泛型的主要动机是因为遗留的容器类不是类型安全的。\n\
  \n使用 Object 类型与类型安全\n\n在 Java 引入泛型之前，数据结构是通过使用 `Object` 基类存储和处理元素来实现的。我们将讨论一个例子来理解为什么这些容器不是类型安全的。考虑\
  \ 清单 6-1 中的程序，它使用了 `Vector` 类（你可以将 `Vector` 视为一个“动态增长的数组”，你可以像数组一样在其中添加或删除元素）。你能预测这个程序的输出吗？\n\
  \n清单 6-1.  OldContainerTest.java\n\n```\nimport java.util.Vector;\n\n// 此程序演示了容器（基于\
  \ Object 类型）缺乏类型安全性的问题。\nclass OldContainerTest {\n        public static void main(String\
  \ []args) {\n                Vector floatValues = new Vector();\n              \
  \  floatValues.add(10.0f);\n                floatValues.add(100.0);\n          \
  \      for(int i = 0; i < floatValues.size(); i++) {\n                        System.out.println(floatValues.get(i));\n\
  \                }\n        }\n}\n```\n\n它打印如下内容：\n\n```\n10.0\n100.0\n```\n\n现在让我们对这个程序只做一个改动：不直接打印从\
  \ `Vector` 的 `get` 方法返回的值，而是先将其存储在一个 `Float` 类型的临时变量中，然后使用 `println` 打印该临时值：\n\n\
  ```\nFloat temp = (Float) floatValues.get(i);\nSystem.out.println(temp);\n```\n\n\
  现在输出如下：\n\n```\n10.0\nException in thread \"main\" java.lang.ClassCastException:\
  \ java.lang.Double cannot be cast to\njava.lang.Float at OldContainerTest.main(OldContainerTest.java:9)\n\
  ```\n\n为什么？发生了什么？`Vector` 容器能够持有任何对象（即，它持有 `Object` 类型的值）。然而，当你尝试放入一个原始类型时，它会被自动“装箱”，并且包装器对象被放入容器中（使用\
  \ Java 中的自动装箱特性）。对于 `10.0`，对应的原始类型是 `float`（注意后缀“f”！），因此会创建一个 `Float` 类型的包装器对象，并将该对象放入\
  \ `Vector`。对于 `100.0`，原始类型是 `Double`（实数，如果没有显式给出后缀，默认假定为 `Double` 类型）。因此，会创建一个 `Double`\
  \ 类型的包装器对象，并将该对象放入 `Vector`。\n\n到目前为止，一切顺利。在原始程序中，没有强制类型转换，因此浮点数值直接使用 `println`\
  \ 中的 `toString()` 方法打印。然而，当你尝试使用 `Float` 类型进行强制转换时，就会遇到麻烦。你不能将 `Double` 值 100.0\
  \ 转换为 `Float` 类型。（`Float` 类型可以转换为 `Double` 类型——但 `Float` 类型不能转换为 `Double` 类型！）因此你在运行时得到了一个\
  \ `ClassCastException`。\n\n换句话说，`Vector` 是基于 `Object` 类型实现的。因此，你可以将任何类型的对象放入一个 `Vector`\
  \ 对象中。你无法*在编译时*强制规定只有特定类型的元素才能被插入到容器中。事实上，在编译程序时，编译器确实会警告你使用了*原始类型* `Vector`（参见\
  \ 图 6-1）。我们将在本章的“原始类型和泛型类型的互操作性”部分进一步讨论这些原始类型（即非泛型类型）。\n\n![9781430247647_Fig06-01.jpg](img/9781430247647_Fig06-01.jpg)\n\
  \n图 6-1.  编译器关于使用原始类型 Vector 的警告\n\n使用 `Object` 基类存储元素的 `Vector` 容器允许你添加任何类型的元素，而你的应用程序逻辑可能要求只应添加字符串。使用泛型，你可以向编译器指定只有特定类型的元素才能被添加到容器中。泛型将确保任何尝试添加指定类型之外的其他类型元素的行为都会在编译时被捕获。换句话说，使用泛型实现的数据结构会在编译时检查类型安全性，因此这些数据结构是类型安全的。\n\
  \n使用 Object 类与泛型对比\n\n在上一节中，我们重点讨论了在使用基于 `Object` 基类实现的现有数据结构时存在的类型安全问题。在本节中，我们将把焦点转向*定义你自己的数据结构*。通过一个使用\
  \ `Object` 基类定义容器类的例子，你将理解为什么这样的容器不是类型安全的。之后，我们将介绍泛型的概念，并向你展示使用泛型如何帮助定义类型安全的容器。\n\
  \n使用 Object 类的容器实现\n\n假设你想在方括号内打印对象的值。例如，要打印一个值为 10 的 `Integer` 对象，你不想在控制台打印“10”，而是想在一个“盒子”里打印该值，像这样：“[10]”。默认的\
  \ `toString()` 方法只给出对象值的 `String` 表示；你想要一个增强的 `toString()` 方法，它会在值的前后打印“[”和“]”。你该怎么做？你可以编写一个\
  \ `BoxPrinter` 类来重写 `toString()` 方法。你将使用 `Object` 来存储该值，因为它是所有类型的公共基类（参见 清单 6-2）。\n\
  \n清单 6-2.  BoxPrinterTest1.java\n\n\n\n```\n// 该程序演示了基于\"Object\"的实现及其缺乏类型安全性的问题\n\
  class BoxPrinter {\n        private Object val;\n        public BoxPrinter(Object\
  \ arg) {\n                val = arg;\n        }\n        public String toString()\
  \ {\n                return \"[\" + val + \"]\";\n        }\n}\n\nclass BoxPrinterTest1\
  \ {\n        public static void main(String []args) {\n                BoxPrinter\
  \ value1 = new BoxPrinter(new Integer(10));\n                        System.out.println(value1);\n\
  \                BoxPrinter value2 = new BoxPrinter(\"Hello world\");\n        \
  \        System.out.println(value2);\n        }\n}\n```\n\n程序运行正常，输出如下：\n\n```\n\
  [10]\n[Hello world]\n```\n\n你可以传入任意类型的对象，这段代码都能正确地在\"[\"和\"]\"之间打印其内容。这与旧版容器（如`Vector`）的实现机制相同。那么问题出在哪里呢？请看以下场景：假设你想添加一个名为`getValue()`的方法，用于获取`BoxPrinter`中存储的值。在创建`BoxPrinter`对象时，你如何取回当初放入的原始类型？问题由此开始。清单\
  \ 6-3 包含了一个示例。\n\n清单 6-3.  BoxPrinterTest2.java\n\n```\n// 该程序演示了基于\"Object\"的实现及其缺乏类型安全性的问题\n\
  class BoxPrinter {\n        private Object val;\n        public BoxPrinter(Object\
  \ arg) {\n                val = arg;\n        }\n        public String toString()\
  \ {\n                return \"[\" + val + \"]\";\n        }\n        public Object\
  \ getValue() {\n                return val;\n        }\n}\n\nclass BoxPrinterTest2\
  \ {\n        public static void main(String []args) {\n                BoxPrinter\
  \ value1 = new BoxPrinter(new Integer(10));\n                System.out.println(value1);\n\
  \                Integer intValue1 = (Integer) value1.getValue();\n\nBoxPrinter\
  \ value2 = new BoxPrinter(\"Hello world\");\n                System.out.println(value2);\n\
  \                        // 哎呀！不小心用了 (Integer) 强制转换，而不是 (String)\n             \
  \           Integer intValue2 = (Integer) value2.getValue();\n        }\n}\n```\n\
  \n输出结果如下：\n\n```\n[10]\n[Hello world]\nException in thread \"main\" java.lang.ClassCastException:\
  \ java.lang.String cannot be cast to\njava.lang.Integer at BoxPrinterTest2.main(Main.java:22)\n\
  ```\n\n在以下代码行中：\n\n```\nInteger intValue2 = (Integer) value2.getValue();\n```\n\n\
  你不小心执行了从`Object`到`Integer`的下转型，而不是从`Object`到`String`。编译器无法检测到你试图将`String`类型的值转换为`Integer`的错误。你记忆中的值实际上是`Object`类型，而在执行下转型之前检查正确类型的唯一方法是使用`instanceof`运算符。在这种情况下，你可以对`String`进行`instanceof`检查，以确保转型正确。然而，通常情况下，当你不知道`BoxPrinter`中存储的对象类型时，你根本无法在代码中执行`instanceof`检查来进行下转型！这就是旧版\
  \ Java 容器类（使用`Object`类存储元素）缺乏类型安全性的原因。\n\n使用泛型的容器实现\n\n清单 6-4 包含了上一节中`BoxPrinter`类的泛型版本。\n\
  \n清单 6-4.  BoxPrinterTest3.java\n\n```\n// 该程序演示了使用泛型的容器实现\nclass BoxPrinter<T>\
  \ {\n        private T val;\n        public BoxPrinter(T arg) {\n              \
  \  val = arg;\n        }\n        public String toString() {\n                return\
  \ \"[\" + val + \"]\";\n        }\n}\n\nclass BoxPrinterTest3 {\n        public\
  \ static void main(String []args) {\n                BoxPrinter<Integer> value1\
  \ = new BoxPrinter<Integer>(new Integer(10));\n                System.out.println(value1);\n\
  \nBoxPrinter<String> value2 = new BoxPrinter<String>(\"Hello world\");\n       \
  \         System.out.println(value2);\n        }\n}\n```\n\n输出结果如下：\n\n```\n[10]\n\
  [Hello world]\n```\n\n这里有许多需要注意的地方。\n\n1.  查看`BoxPrinter`的声明：\n\n```\n    class\
  \ BoxPrinter<T>\n    ```\n\n你为`BoxPrinter`类提供了一个*类型占位符*`<T>`——即类名后尖括号\"<\"和\">\"\
  中的类型名称`T`。你可以在类内部使用这个类型名称，表示它是后续实际类型的占位符。（注意，这里使用了异常简短的标识符`T`来表示类型名称：这是有意为之，稍后你将看到泛型类型的命名约定。）\n\
  \n2.  在类内部，你首先在字段声明中使用了`T`：\n\n```\n    private T val;\n    ```\n\n你声明了一个*泛型类型*的`val`——实际类型将在你使用`BoxPrinter`时指定。在`main()`方法中，你像这样声明了一个`Integer`类型的变量：\n\
  \n```\n    BoxPrinter<Integer> value1\n    ```\n\n这里，你指定`T`为`Integer`类型——标识符`T`（占位符）被替换为类型`Integer`。因此，`BoxPrinter`内部的`val`变成了`Integer`类型，因为`T`被替换成了`Integer`。\n\
  \n3.  现在，这是另一个使用`T`的地方：\n\n```\n    public BoxPrinter(T arg) {\n            val\
  \ = arg;\n    }\n    ```\n\n与使用类型`T`声明`val`类似，这里表示`BoxPrinter`构造函数的参数也是`T`类型。稍后在`main()`方法中，当使用`new`调用构造函数时，你指定`T`为`Integer`类型：\n\
  \n```\nnew BoxPrinter<Integer>(new Integer(10));\n```\n\n现在，在`BoxPrinter`构造函数内部，`arg`和`val`*应该是相同类型*，因为它们都是`T`类型。例如，如果你将构造函数改为如下形式：\n\
  \n```\nnew BoxPrinter<String>(new Integer(10));\n```\n\n那么`BoxPrinter`是`String`类型，而传入的参数是`Integer`类型，因此在使用泛型时会出现类型不匹配的编译器错误（这很好，因为你能更早地发现问题）。\n\
  \n现在，让我们添加`getValue()`方法，用于返回`BoxPrinter`类中包含的值。清单 6-5 包含了增强后的版本。\n\n清单 6-5.  BoxPrinterTest4.java\n\
  \n```\n// 该程序演示了泛型的类型安全特性\nclass BoxPrinter<T> {\n        private T val;\n     \
  \   public BoxPrinter(T arg) {\n                val = arg;\n        }\n        public\
  \ String toString() {\n                return \"[\" + val + \"]\";\n        }\n\
  \        public T getValue() {\n                return val;\n        }\n}\n\nclass\
  \ BoxPrinterTest4 {\n        public static void main(String []args) {\n        \
  \        BoxPrinter<Integer> value1 = new BoxPrinter<Integer>(new Integer(10));\n\
  \                System.out.println(value1);\n                Integer intValue1\
  \ = value1.getValue();\n\nBoxPrinter<String> value2 = new BoxPrinter<String>(\"\
  Hello world\");\n                System.out.println(value2);\n                //\
  \ 哎呀！不小心把 String 放进了 Integer 中\n                Integer intValue2 = value2.getValue();\n\
  \        }\n}\n```\n\n这是你犯错并试图将`String`放入`Integer`的那行代码：\n\n```\nInteger intValue2\
  \ = value2.getValue();\n```\n\n你会得到以下编译器错误：\n\n```\nBoxPrinterTest.java:23: 不兼容的类型\n\
  找到   : java.lang.String\n需要: java.lang.Integer\n                Integer intValue2\
  \ = value2.getValue();\n```\n\n这很好，不是吗？与在`BoxPrinter`中使用`Object`类时出现`ClassCastException`不同，这里你得到了一个编译器错误（不兼容的类型）。现在，你可以修复这个错误，程序就能正确运行了。\n\
  \n| ![image](img/Note.jpg) | 泛型在提供类型安全性的同时实现了泛型化实现。 |\n\n基于这个简单的介绍，让我们通过几个示例来进一步了解泛型。\n\
  \n创建泛型类\n\n\n\n让我们创建一个可以容纳两种不同类型对象 `T1` 和 `T2` 的 `Pair` 泛型类（参见清单 6-6）。不必过于纠结它在解决实际问题时有多大用处，只需尝试理解如何编写自己的泛型即可。\n\
  \n清单 6-6.  PairTest.java\n\n```\n// 它演示了在定义类时泛型的使用方法\nclass Pair<T1, T2> {\n   \
  \     T1 object1;\n        T2 object2;\n        Pair(T1 one, T2 two) {\n       \
  \         object1 = one;\n                object2 = two;\n        }\n        public\
  \ T1 getFirst() {\n                return object1;\n        }\n        public T2\
  \ getSecond() {\n                return object2;\n        }\n}\n\nclass PairTest\
  \ {\n        public static void main(String []args) {\n                Pair<Integer,\
  \ String> worldCup = new Pair<Integer, String>(2010, \"South Africa\");\n      \
  \          System.out.println(\"World cup \" +  worldCup.getFirst() +\n        \
  \                \" in \" + worldCup.getSecond());\n        }\n}\n```\n\n该程序将输出以下内容：\n\
  \n```\nWorld cup 2010 in South Africa\n```\n\n这里的 `T1` 和 `T2` 是类型占位符。你将这些类型占位符放在尖括号内：`<T1,\
  \ T2>`。当使用 `Pair` 类时，你必须指定要用哪些具体类型来替代 `T1` 和 `T2`。例如，在 `main()` 方法中，你为 `Pair` 使用了\
  \ `Integer` 和 `String`，即 `Pair<Integer, String>`。现在，你可以将 `Pair` 类想象成具有以下主体：\n\n\
  ```\n// Pair<Integer, String> 在内部可以被视为这样\nclass Pair {\n        Integer object1;\n\
  \        String object2;\n        Pair(Integer one, String two) {\n            \
  \    object1 = one;\n                object2 = two;\n        }\n        public Integer\
  \ getFirst() {\n                return object1;\n        }\n        public String\
  \ getSecond() {\n                return object2;\n        }\n```\n\n}\n\n换句话说，尝试手动对类型占位符执行查找替换操作，将其替换为代码中的实际类型。这将帮助你理解泛型实际的工作原理。通过这种方式，你就能理解\
  \ `getFirst()` 和 `getSecond()` 方法如何在 `main()` 方法中返回 `Integer` 和 `String` 值。\n\n\
  在以下语句中\n\n```\nPair<Integer, String> worldCup = new Pair<Integer, String>(2010,\
  \ \"South Africa\");\n```\n\n请注意类型完全匹配。如果你尝试\n\n```\nPair<Integer, String> worldCup\
  \ = new Pair<String, String>(2010, \"South Africa\");\n```\n\n你将得到以下编译器错误：\n\n```\n\
  TestPair.java:20: 找不到符号\n符号: 构造函数 Pair(int,java.lang.String)\n位置: 类 Pair<java.lang.String,java.lang.String>\n\
  ```\n\n那么，试试下面这条语句会怎样？\n\n```\nPair<Integer, String> worldCup = new Pair<Number,\
  \ String>(2010, \"South Africa\");\n```\n\n由于 `worldCup` 的声明类型与初始化表达式中给出的类型不匹配，你将得到另一个编译器错误：\n\
  \n```\nTestPair.java:20: 类型不兼容\n找到: Pair<java.lang.Number,java.lang.String>\n需要:\
  \ Pair<java.lang.Integer,java.lang.String>\n```\n\n现在修改泛型 `Pair` 类。`Pair<T1, T2>`\
  \ 存储了类型为 `T1` 和 `T2` 的对象。那么，一个接受类型 `T` 并存储两个该类型 `T` 对象的泛型对偶类又如何呢？显然，一种方法是使用相同类型实例化\
  \ `Pair<T1, T2>`，例如 `Pair<String, String>`，但这并非一个好的解决方案。为什么？因为无法确保你使用相同类型实例化 `Pair`！清单\
  \ 6-7 是 `Pair` 的一个修改版本——我们称之为 `PairOfT`——它只接受一个类型占位符 `T`。\n\n清单 6-7.  PairOfT.java\n\
  \n```\n// 该程序展示了如何在你的程序中使用泛型\n\nclass PairOfT<T> {\n        T object1;\n       \
  \ T object2;\n        PairOfT(T one, T two) {\n                object1 = one;\n\
  \                object2 = two;\n        }\n        public T getFirst() {\n    \
  \            return object1;\n        }\n        public T getSecond() {\n      \
  \          return object2;\n        }\n}\n```\n\n现在，下面这条语句能工作吗？\n\n```\nPairOfT<Integer,\
  \ String> worldCup = new PairOfT<Integer, String>(2010, \"South Africa\");\n```\n\
  \n不能，因为 `PairOfT` 只接受一个类型参数，而你在这里给出了两个类型参数。因此，你会得到一个编译器错误。那么，下面这条语句呢？\n\n```\nPairOfT<String>\
  \ worldCup = new PairOfT<String>(2010, \"South Africa\");\n```\n\n不行，你仍然会得到一个编译器错误：\n\
  \n```\nTestPair.java:20: 找不到符号\n符号: 构造函数 PairOfT(int,java.lang.String)\n位置: 类 PairOfT<java.lang.String>\n\
  \           PairOfT<String> worldCup = new PairOfT<String>(2010, \"South Africa\"\
  );\n```\n\n原因是 2010——在装箱后——是一个 `Integer`，而你应该提供一个 `String` 作为参数。下面这条语句呢？\n\n```\n\
  PairOfT<String> worldCup = new PairOfT<String>(\"2010\", \"South Africa\");\n```\n\
  \n是的，它能编译并正常运行。\n\n菱形语法\n\n在上一节中，我们讨论了如何创建泛型类型实例，如下面的语句所示：\n\n```\nPair<Integer,\
  \ String> worldCup = new Pair<Integer, String>(2010, \"South Africa\");\n```\n\n\
  我们还讨论了如果这些类型不匹配会导致编译器错误，例如下面的语句将无法编译：\n\n```\nPair<Integer, String> worldCup = new\
  \ Pair<String, String>(2010, \"South Africa\");\n```\n\n看到了吗？确保在声明类型（本例中为 `Pair<Integer,\
  \ String>`）和创建新对象的表达式（本例中为 `new Pair<String, String>()`）中提供相同的类型参数是多么繁琐？\n\n为了简化你的工作，Java\
  \ 7 引入了*菱形*语法，其中类型参数可以省略：你可以让编译器从类型声明中推断类型。因此，声明可以简化为\n\n```\nPair<Integer, String>\
  \ worldCup = new Pair<>(2010, \"South Africa\");\n```\n\n为了更清楚，清单 6-8 包含了使用这种菱形语法的完整程序。\n\
  \n清单 6-8.  Pair.java\n\n```\n// 该程序展示了在使用泛型时菱形语法的用法\nclass Pair<T1, T2> {\n    \
  \    T1 object1;\n        T2 object2;\n        Pair(T1 one, T2 two) {\n        \
  \        object1 = one;\n                object2 = two;\n        }\n        public\
  \ T1 getFirst() {\n                return object1;\n        }\n        public T2\
  \ getSecond() {\n                return object2;\n        }\n}\n\nclass TestPair\
  \ {\n        public static void main(String []args) {\n                Pair<Integer,\
  \ String> worldCup = new Pair<>(2010, \"South Africa\");\n                System.out.println(\"\
  World cup \" +  worldCup.getFirst() +\n                        \" in \" + worldCup.getSecond());\n\
  \        }\n}\n```\n\n该程序将顺利编译并输出以下语句：\n\n```\nWorld cup 2010 in South Africa\n\
  ```\n\n请注意，在初始化表达式中忘记菱形运算符 `<>` 是一个常见错误，例如：\n\n```\nPair<Integer, String> worldCup\
  \ = new Pair (2010, \"South Africa\");\n```\n\n图 6-2 显示了当你忘记使用菱形语法时编译器给出的警告。由于 `Pair`\
  \ 是一个泛型类型，而你忘记使用 `<>` 或显式提供类型参数，编译器会将其视为原始类型，其中 `Pair` 接受两个 `Object` 类型参数。尽管这种行为在这个特定代码段中没有引起任何问题，但它是危险的，并且可能导致错误，如下一节所示。\n\
  \n![9781430247647_Fig06-02.jpg](img/9781430247647_Fig06-02.jpg)\n\n图 6-2.  当你忘记使用菱形语法时编译器给出的警告\n\
  \n原始类型与泛型类型的互操作性\n\n\n\n泛型类型可以在不指定其关联类型的情况下使用；在这种情况下，该类型被称为*原始类型*。例如，`List<T>` 应与其关联类型（即\
  \ `List<String>`）一起使用；然而，它也可以在不指定伴随类型（即 `List`）的情况下使用。在后一种情况下，`List` 被称为原始类型。\n\n\
  当你使用原始类型时，就会失去泛型所提供的类型安全性优势。例如，清单 6-1 中的类型 `Vector` 就是一个原始类型。在编译时，编译器会生成一个警告，如图\
  \ 6-1 所示。原始类型绕过了编译时的类型检查；然而，它们可能会抛出运行时异常（例如 `ClassCastException`）。因此，不建议在新代码中使用原始类型。\n\
  \n好了，现在你明白了不应该使用原始类型。但是，你可能会问，为什么编译器本身会允许这样的类型声明呢？答案是*向后兼容性*。Java 泛型是在 Java SDK\
  \ 5 中引入的。Java 支持原始类型是为了使基于泛型的代码与遗留代码兼容。然而，强烈建议你今后不要使用原始类型。\n\n为什么？如果你将原始类型与泛型一起使用会发生什么？让我们在清单\
  \ 6-9 中同时使用这两种类型，并检查其效果。\n\n清单 6-9.  RawTest.java\n\n```\n//此程序演示了原始类型与泛型一起使用的情况\n\
  class RawTest{\n        public static void main(String []args) {\n             \
  \   List list = new LinkedList();\n                list.add(\"First\");\n      \
  \          list.add(\"Second\");\n                List<String> strList = list; \
  \ //#1\n                for(Iterator<String> itemItr = strList.iterator(); itemItr.hasNext();)\n\
  \                        System.out.println(\"Item : \" + itemItr.next());\n\nList<String>\
  \ strList2 = new LinkedList<>();\n                strList2.add(\"First\");\n   \
  \             strList2.add(\"Second\");\n                List list2 = strList2;\
  \  //#2\n                for(Iterator<String> itemItr = list2.iterator(); itemItr.hasNext();)\n\
  \                        System.out.println(\"Item : \" + itemItr.next());\n   \
  \     }\n}\n```\n\n你期望上述程序输出什么？你认为它能正常编译/执行吗？嗯，是的——它能编译（带有警告）并毫无问题地执行。它会打印以下内容：\n\
  \n```\nItem : First\nItem : Second\nItem : First\nItem : Second\n```\n\n清单 6-10\
  \ 引入了一些更改；观察输出结果。\n\n清单 6-10.  RawTest2.java\n\n```\n// 此程序演示了原始类型与泛型一起使用的情况\nclass\
  \ RawTest{\n        public static void main(String []args) {\n                List\
  \ list = new LinkedList();\n                list.add(\"First\");\n             \
  \   list.add(\"Second\");\n                List<String> strList = list;\n      \
  \          strList.add(10);        //#1: 生成编译器错误\n                for(Iterator<String>\
  \ itemItr = strList.iterator(); itemItr.hasNext();)\n                System.out.println(\"\
  Item : \" + itemItr.next());\n\nList<String> strList2 = new LinkedList<>();\n  \
  \              strList2.add(\"First\");\n                strList2.add(\"Second\"\
  );\n                List list2 = strList2;\n                list2.add(10);  //#2:\
  \ 编译通过，导致运行时异常\n                for(Iterator<String> itemItr = list2.iterator();\
  \ itemItr.hasNext();)\n                System.out.println(\"Item : \" + itemItr.next());\n\
  \        }\n}\n```\n\n在上面的例子中，你添加了两个语句。第一个语句如下：\n\n```\nstrList.add(10);       \
  \ //#1: 生成编译器错误\n```\n\n你试图向一个 `List<String>` 类型的列表中添加一个整数项，因此会得到一个编译时错误。正如之前讨论的，这种编译器级别的类型检查是好的，因为如果没有它，稍后可能会导致运行时异常。这是你添加的第二个语句：\n\
  \n```\nlist2.add(10);          //#2: 编译通过，导致运行时异常\n```\n\n这里，`list2` 链表（原始类型）被初始化为一个泛型类型\
  \ `List<String>`。初始化之后，你向这个原始类型列表中添加了一个整数。这是允许的，因为 `list2` 是一个原始类型。然而，这会导致一个 `ClassCastException`。\n\
  \n从这两个例子中你能学到什么？教训是避免在程序中混用原始类型和泛型类型，因为这可能会导致运行时出现错误行为。如果你需要在程序中同时使用两者，请确保在容器中只添加单一类型的元素，并使用相同的类型进行检索。\n\
  \n| ![image](img/banana.jpg) | 避免将原始类型与泛型类型混用。 |\n\n泛型方法\n\n与泛型类类似，你可以创建泛型方法——即接受泛型参数类型的方法。泛型方法对于编写适用于多种类型但功能保持不变的方法非常有用。例如，`java.util.Collections`\
  \ 类中有许多泛型方法。\n\n让我们实现一个名为 `fill()` 的简单方法。给定一个容器，`fill()` 方法会用值 `val` 填充容器的所有元素。清单\
  \ 6-11 包含了 `Utilities` 类中 `fill()` 方法的实现。\n\n清单 6-11.  Utilities.java\n\n```\n//\
  \ 此程序演示了泛型方法\nclass Utilities {\n        public static <T> void fill(List<T> list,\
  \ T val) {\n                for(int i = 0; i < list.size(); i++)\n             \
  \           list.set(i, val);\n        }\n}\n\nclass UtilitiesTest {\n        public\
  \ static void main(String []args) {\n                List<Integer> intList = new\
  \ ArrayList<Integer>();\n                intList.add(10);\n                intList.add(20);\n\
  \                System.out.println(\"原始列表是: \" + intList);\n                Utilities.fill(intList,\
  \ 100);\n                System.out.println(\"调用 Utilities.fill() 后的列表是: \" + intList);\n\
  \        }\n}\n```\n\n它会打印以下内容：\n\n```\n原始列表是: [10, 20]\n调用 Utilities.fill() 后的列表是:\
  \ [100, 100]\n```\n\n让我们逐步分析这段代码：\n\n1.  你在 `Utilities` 类中创建了一个名为 `fill()` 的方法，其声明如下：\n\
  \n```\n    public static <T> void fill(List<T> list, T val)\n    ```\n\n你在此方法中声明了泛型类型参数\
  \ `T`。在限定符 public 和 static 之后，你放置了 `<T>`，然后紧跟返回类型、方法名及其参数。这个声明与泛型类不同——在泛型类中，你将泛型类型参数放在类名之后。\n\
  \n2.  在方法体中，你像编写普通方法一样编写代码。\n\n```\n    for(int i = 0; i < list.size(); i++)\n \
  \           list.set(i, val);\n    ```\n\n你从 0 开始遍历列表直到其大小，并在每次迭代中将每个元素设置为值 `val`。你使用了\
  \ `List` 中的 `set()` 方法，该方法将容器中的索引位置作为第一个参数，将要设置的实际值作为第二个参数。\n\n3.  在 `UtilitiesTest`\
  \ 类的 `main()` 方法中，你像这样调用 `fill()` 方法：\n\n```\n    Utilities.fill(intList, 100);\n\
  \    ```\n\n请注意，你没有显式给出泛型类型参数的值。由于 `intList` 是 `Integer` 类型，并且 100 被装箱为 `Integer`\
  \ 类型，编译器推断出 `fill()` 方法中的类型 `T` 是 `Integer` 类型。\n\n\n\n| ![image](img/banana.jpg)\
  \ | 一个常见的错误是从 `java.awt` 而非 `java.util` 导入 `List`。如果使用了错误的导入，程序可能无法编译（或产生警告）。请记住，`java.util`\
  \ 中的 `List` 是泛型类型，而 `java.awt` 中的 `List` 则不是。 |\n\n我们已经讨论了静态泛型方法。那么非静态泛型方法呢？嗯，实际上，对于非静态方法来说，几乎没有什么区别。显然，你需要创建定义该非静态方法的类的实例，才能使用该非静态方法。\n\
  \n泛型与子类型\n\n这里有一个小测验。\n\n**问题：** 以下赋值语句中，只有*一个*是正确的且能无错误编译。是哪一句？\n\n（注意：`List` 是一个抽象类，`ArrayList`\
  \ 继承自 `List`；类似地，`Number` 是一个抽象类，`Integer` 继承自 `Number`）。\n\n*   `1\\. List<Integer>\
  \ intList = new List<Integer>();`\n*   `2\\. List<Integer> intList = new ArrayList<Integer>();`\n\
  *   `3\\. List<Number> intList = new ArrayList<Integer>();`\n*   `4\\. List<Integer>\
  \ intList = new ArrayList<Number>();`\n\n**答案：** 只有第二个赋值语句能无错误编译。\n\n为什么？让我们逐一分析每个选项。\n\
  \n1.  你试图将 `List<Integer>` 类型的 `intList` 赋值给一个 `List<Integer>` 类型的对象。但 `List` 是一个抽象类。你不能实例化抽象类，因此会得到编译器错误。\n\
  2.  你试图将 `List<Integer>` 类型的 `intList` 赋值给一个 `ArrayList<Integer>` 类型的对象。由于 `ArrayList`\
  \ 继承自 `List`，这是有效的赋值，不会出现编译器错误。\n3.  你试图将 `List<Number>` 类型的 `intList` 赋值给一个 `ArrayList<Integer>`\
  \ 类型的对象。`ArrayList` 继承自 `List`——这没问题——但声明和初始化中的泛型参数类型应该相同。因此，你会得到编译器错误（类型不匹配）。\n\
  4.  原因与选项 3 相同。\n\n你可以将派生类型的对象赋值给其基类型的引用；这就是*子类型*的含义。然而，对于泛型，类型参数必须完全匹配——否则你会得到编译器错误。换句话说，*子类型不适用于泛型参数*。是的，这是一个难以记住的规则，所以让我们更详细地讨论为什么子类型不适用于泛型类型参数。\n\
  \n| ![image](img/Note.jpg) | 对于类类型，子类型是有效的。你可以将派生类型的对象赋值给其基类型的引用。然而，对于泛型类型参数，子类型并不适用。你不能将派生泛型类型参数赋值给基类型参数。\
  \ |\n\n为什么子类型不适用于泛型类型参数？让我们看看如果你假设可以对泛型类型参数使用子类型，可能会出现什么问题。\n\n```\n// 非法代码——假设允许以下初始化\n\
  List<Number> intList = new ArrayList<Integer>();\nintList.add(new Integer(10));\
  \ // 没问题\nintList.add(new Float(10.0f)); // 哎呀！\n```\n\n`List<Number>` 类型的 `intList`\
  \ 本应持有一个 `ArrayList<Number>` 对象。然而，你存储的是一个 `ArrayList<Integer>`。这看起来合理，因为 `List`\
  \ 继承自 `ArrayList`，且 `Integer` 继承自 `Number`。但是，你最终可能会向 `intList` 中插入一个 `Float` 值！回想一下，`intList`\
  \ 的动态类型是 `ArrayList<Integer>` 类型——因此你在这里违反了类型安全（从而会得到不兼容类型的编译器错误）。由于泛型旨在避免此类类型安全错误，因此你不能将派生泛型类型参数赋值给基类型参数。\n\
  \n如你所见，泛型参数类型的子类型是不允许的，因为它不安全——但这仍然是一个不便的限制。幸运的是，Java 支持*通配符参数类型*，你可以使用它来实现子类型。我们现在就来探讨这个功能。\n\
  \n| ![image](img/Note.jpg) | 泛型的类型参数有一个限制：赋值时泛型类型参数必须完全匹配。为了克服这个子类型问题，你可以使用通配符类型。\
  \ |\n\n通配符参数\n\n你在上一节中看到，子类型不适用于泛型类型参数。因此，\n\n```\nList<Number> intList = new ArrayList<Integer>();\n\
  ```\n\n会产生如下编译器错误：\n\n```\nWildCardUse.java:6: 不兼容的类型\n找到   : java.util.ArrayList<java.lang.Integer>\n\
  需要: java.util.List<java.lang.Number>\n                List<Number> numList = new\
  \ ArrayList<Integer>();\n```\n\n如果你稍微修改语句，使用通配符参数，它就能编译通过：\n\n```\nList<?> wildCardList\
  \ = new ArrayList<Integer>();\n```\n\n*通配符*是什么意思？就像你在纸牌游戏中用来替代任何一张牌的通配符一样（啊，玩纸牌游戏真有趣！），你可以使用通配符来表示它可以匹配任何类型。使用\
  \ `List<?>`，意味着它是一个任意类型的 `List`——换句话说，你可以说它是一个“未知类型的列表！”\n\n但是等等……当你想要一个表示“任意类型”的类型时，你会使用\
  \ `Object` 类，不是吗？那么，使用 `Object` 类型参数的相同语句会怎样呢？\n\n```\nList<Object> numList = new\
  \ ArrayList<Integer>();\n```\n\n不行——你会得到与上面使用 `List<Number>` 时相同的错误！\n\n```\nWildCardUse.java:6:\
  \ 不兼容的类型\n找到   : java.util.ArrayList<java.lang.Integer>\n需要: java.util.List<java.lang.Object>\n\
  \                List<Object> numList = new ArrayList<Integer>();\n```\n\n换句话说，你仍然在尝试对泛型参数使用子类型——但它仍然不起作用。如你所见，`List<Object>`\
  \ 与 `List<?>` 并不相同。实际上，`List<?>` 是任何 List 类型的超类型，这意味着在期望 `List<?>` 的地方，你可以传递 `List<Integer>`、`List<String>`，甚至\
  \ `List<Object>`。\n\n让我们在一个示例中使用通配符，看看它是否有效（参见清单 6-12）。\n\n清单 6-12.  WildCardUse.java\n\
  \n```\n// 此程序演示了通配符参数的使用\nclass WildCardUse {\n        static void printList(List<?>\
  \ list){\n                for(Object l:list)\n                        System.out.println(\"\
  [\" + l + \"]\");\n        }\n\npublic static void main(String []args) {\n     \
  \           List<Integer> list = new ArrayList<>();\n                list.add(10);\n\
  \                list.add(100);\n                printList(list);\n            \
  \    List<String> strList = new ArrayList<>();\n                strList.add(\"10\"\
  );\n                strList.add(\"100\");\n                printList(strList);\n\
  \        }\n}\n```\n\n此程序输出以下内容：\n\n```\n [10]\n[100]\n[10]\n[100]\n```\n\n嗯，它起作用了，使用通配符的列表可以传递整数列表和字符串列表。这是因为\
  \ `printList()` 方法的参数类型是 `List<?>`。太棒了！\n\n通配符的限制\n\n让我们考虑以下代码片段，它尝试添加一个元素并打印列表：\n\
  \n```\nList<?> wildCardList = new ArrayList<Integer>();\nwildCardList.add(new Integer(10));\n\
  System.out.println(wildCardList);\n```\n\n你会得到以下编译器错误：\n\n```\nWildCardUse.java:7:\
  \ 找不到符号\n符号  : 方法 add(java.lang.Integer)\n位置: 接口 java.util.List<capture#145 of ?\
  \ extends java.lang.Number>\n                wildCardList.add(new Integer(10));\n\
  ```\n\n为什么？你非常确定 `add()` 方法存在于 `List` 接口中。那么为什么编译器找不到该方法呢？\n\n\n\n这个问题需要详细解释。当你使用通配符类型\
  \ `<?>` 时，你是在告诉编译器你*忽略*了类型信息，因此 `<?>` 代表未知类型。每次你尝试向泛型类型传递参数时，Java 编译器都会尝试推断所传递参数的类型以及泛型的类型，并验证类型安全性。现在，你正尝试使用\
  \ `add()` 方法向列表中插入一个元素。由于 `wildCardList` 不知道它持有哪种类型的对象，因此向其中添加元素是有风险的。你最终可能会添加一个字符串（例如\
  \ \"hello\"）而不是整数值。为了避免这个问题（请记住，泛型被引入语言就是为了确保类型安全！），编译器不允许你调用修改对象的方法。由于 `add` 方法会修改对象，因此你会得到一个错误！错误信息看起来也很令人困惑，例如\
  \ `<capture#145 of ? extends java.lang.Number>`。\n\n| ![图片](img/banana.jpg) | 通常，当你使用通配符参数时，不能调用修改对象的方法。如果你尝试修改，编译器会给出令人困惑的错误信息。但是，你可以调用访问对象的方法。\
  \ |\n\n有界通配符\n\n以下是关于通配符的快速回顾，以帮助你理解为什么需要*有界通配符*。当你尝试使用参数类型不同的泛型类型时，会遇到编译器错误，例如：\n\
  \n```\n// 编译器错误：\nList<Number> numList = new ArrayList<Integer>();\n```\n\n你可以使用通配符类型来避免这个编译器错误：\n\
  \n```\n// 现在可以工作了：\nList<?> numList = new ArrayList<Integer>();\n```\n\n假设你希望 `numList`\
  \ 只能存储数字列表。然而，使用通配符，你最终可能会存储任何类型的列表，例如：\n\n```\nList<?> numList = new ArrayList<Integer>();\n\
  numList = new ArrayList<String>();\n```\n\n是的，这可以编译通过，没有任何错误。你如何限制 `numList` 只能引用\
  \ `Number` 及其派生类（如 `Integer`、`Double` 等）呢？你可以通过使用有界通配符来实现，如下所示：\n\n```\nList<? extends\
  \ Number> numList = new ArrayList<Integer>();\nnumList = new ArrayList<String>();\n\
  ```\n\n你会得到以下编译器错误：\n\n```\nBoundedWildCardUse.java:7: 不兼容的类型\n找到   : java.util.ArrayList<java.lang.String>\n\
  需要: java.util.List<? extends java.lang.Number>\n                numList = new ArrayList<String>();\n\
  ```\n\n这段代码呢？\n\n```\nList<? extends Number> numList = new ArrayList<Integer>();\n\
  numList = new ArrayList<Double>(); \n```\n\n是的，这可以顺利编译！这是怎么回事？在 `List<? extends\
  \ Number>` 中，通配符 (?) 被 `extends Number` 所限定。这意味着你用来替换通配符 (?) 的任何类型都必须满足 `extends\
  \ Number` 的条件。例如，在 `? extends Number` 中，如果你用类型 `Integer` 替换 `?`，你会得到 `Integer extends\
  \ Number`——这在逻辑上是成立的。因此，对于这种替换，编译会成功。但是，在 `? extends Number` 中，如果你用类型 `String` 替换\
  \ `?`，你会得到 `String extends Number`，这在逻辑上是错误的（请记住，`String` *不是* `Number`）。因此，你会得到一个编译器错误。换句话说，你限制或约束了通配符，使得替换的类型必须是\
  \ `extend Number` 类。\n\n你可以在方法参数、返回类型等处使用有界通配符。下面是一个使用有界通配符的简单方法：\n\n```\npublic\
  \ static Double sum(List<? extends Number> numList) {\n        Double result = 0.0;\n\
  \        for(Number num : numList) {\n                result += num.doubleValue();\n\
  \        }\n        return result;\n}\n```\n\n以下是此方法的分步说明：\n\n1.  `sum()` 方法旨在接收一个\
  \ `Number` 列表，并返回该列表中元素的总和。\n2.  由于 `List` 需要被 `Number` 限制（有界），你将 `List` 声明为 `List<?\
  \ Extends Number>`。\n3.  由于你不知道列表元素的确切类型（Integer、Double 等），你希望使用 `double` 作为 `sum`\
  \ 的返回类型。由于像 `int` 和 `double` 这样的原始类型在与集合一起使用时会被隐式地装箱/拆箱，因此你将返回类型声明为 `Double`，这比使用原始类型\
  \ `double` 更方便。\n4.  来到方法体，由于元素的总和将是一个 `Double` 值，你声明结果变量 `Double` 并将其初始化为零。\n5.\
  \  在 for-each 循环中，你使用 `Number` 作为循环类型。由于通配符被 `Number` 限定，你知道（无论实际作为参数传递的是哪个 `List`\
  \ 对象）元素类型都将是 `Number`。\n6.  你使用 `doubleValue` 方法从 `Number` 类型获取 double 值。\n7.  完成后，你返回元素的总和。\n\
  \n清单 6-13 包含了用于测试 `sum()` 方法的 `main()` 方法。\n\n清单 6-13.  BoundedWildCardUse.java\n\
  \n```\n// 此程序演示了有界通配符的用法\n\nimport java.util.*;\n\nclass BoundedWildCardUse {\n\
  \        public static Double sum(List<? extends Number> numList) {\n          \
  \      Double result = 0.0;\n                for(Number num : numList) {\n     \
  \                   result += num.doubleValue();\n                }\n          \
  \      return result;\n        }\n\npublic static void main(String []args) {\n \
  \               List<Integer> intList = new ArrayList<Integer>();\n            \
  \    List<Double> doubleList = new ArrayList<Double>();\n\nfor(int i = 0; i < 5;\
  \ i++) {\n                        intList.add(i);\n                        doubleList.add((double)\
  \ (i * i));\n                }\n                System.out.println(\"intList 是:\
  \ \" + intList);\n                System.out.println(\"intList 中元素的总和是: \" + sum(intList));\n\
  \nSystem.out.println(\"doubleList 是: \" + doubleList);\n                System.out.println(\"\
  doubleList 中元素的总和是: \" + sum(doubleList));\n        }\n}\n```\n\n它会打印以下内容：\n\n```\n\
  intList 是: [0, 1, 2, 3, 4]\nintList 中元素的总和是: 10.0\ndoubleList 是: [0.0, 1.0, 4.0,\
  \ 9.0, 16.0]\ndoubleList 中元素的总和是: 30.0\n```\n\n让我们逐步分析代码：\n\n1.  你创建了两个 `ArrayList`，一个类型为\
  \ `Integer`，另一个类型为 `Double`。\n2.  在一个 `for` 循环中，你向每个列表插入了五个元素。对于 `intList`，你插入了值\
  \ 0 到 4。对于 `doubleList`，你插入了值 0 到 4 的平方（0 到 16）。由于 `doubleList` 期望值是 double 类型，为了明确起见，你使用了显式转换——`((double)\
  \ (i * i));` 如果你愿意，可以移除这个显式转换。\n3.  你打印了 `intList` 和 `doubleList` 的内容，并通过调用你编写的\
  \ `sum()` 方法打印了元素的总和；从输出中你可以看到 `sum()` 方法对 `Integer` 和 `Double` 两种类型都正确工作。\n\n类似于在通配符中使用\
  \ `extends` 关键字（如 `<? extends Number>`），你也可以使用 `super` 关键字，如 `<? super Integer>`。表达式\
  \ `<? super X>` 意味着你可以使用任何超类型（类或接口），包括类型 `X` 本身。例如，以下代码片段可以顺利编译。你可能会注意到 `<? super\
  \ Integer>` 不仅仅意味着 `Integer` 的超类型；这个表达式也允许 `Integer` 本身。\n\n```\nList<? super Integer>\
  \ intList = new ArrayList<Integer>();\nSystem.out.println(\"intList 是: \" + intList);\n\
  ```\n\n\n\n| ![image](img/Note.jpg) | 在受限通配符 `<? extends X>` 中，`X` 可以是类或接口（注意，即使是接口，也使用\
  \ `extends` 关键字）。`?` 的有效替换不仅限于其任何派生类或接口；你甚至可以用 `X` 本身来替换 `?`！这一点同样适用于 `<? super\
  \ X>` 表达式。 |\n\nCollections 类中的通配符\n\n集合框架广泛使用了通配符。为了更深入地理解受限通配符的一些特性以及通配符在实际中的用法，以下是来自\
  \ `Collections` 类的一些示例。\n\n第一个示例是 `nCopies` 方法：\n\n```\nstatic <T> List<T> nCopies(int\
  \ num, T obj)\n```\n\n`nCopies` 方法返回一个只读的 `List`，包含 `num` 个值为 `obj` 的元素。示例如下：\n\n\
  ```\nSystem.out.println(\"包含 5 个值为 10 的元素的列表: \" + Collections.nCopies(5, 10));\n\
  ```\n\n它将输出以下内容：\n\n```\n包含 5 个值为 10 的元素的列表: [10, 10, 10, 10, 10]\n```\n\n下一个示例是\
  \ `reverse` 方法：\n\n```\nstatic void reverse(List<?> list);\n```\n\n`reverse()` 方法会反转传入列表中元素的顺序。你可以传入任何类型的元素；`Collections`\
  \ 类对 `List` 类型仅使用通配符 `<?>`。\n\n这是另一个示例：\n\n```\nstatic <T> void fill(List<? super\
  \ T> list, T obj)\n```\n\n此方法用值 `obj` 填充整个列表。这里使用了 `<? super T>`。为什么呢？示例如下：\n\n\
  ```\nList<Object> objList = new ArrayList<Object>();\nobjList.add(new Object());\n\
  objList.add(new Object());\n\nCollections.fill(objList, \"hello\");\nSystem.out.println(\"\
  objList 的内容是: \" + objList);\n```\n\n它将输出以下内容：\n\n```\nobjList 的内容是: [hello, hello]\n\
  ```\n\n这里，你创建了一个指向 `ArrayList<Object>` 的 `List<Object>`。你创建了两个虚拟的 `Object` 并插入到\
  \ `objList` 中。然后你用字符串 `\"hello\"` 填充 `objList`，并且成功了。如你所见，对于 `fill()` 方法，你可以将基础类型\
  \ `List` 作为第一个参数传入。\n\n最后是（相当棘手的）示例：`copy()` 方法。其声明如下：\n\n```\nstatic <T> void copy(List<?\
  \ super T> dest, List<? extends T> src);\n```\n\n`copy()` 方法会将所有元素从 `src List` 复制到\
  \ `dest List`。以下示例有助于理解为什么 `dest` 是 `<? super T>` 而 `src` 是 `<? extends T>`：\n\n\
  ```\nList<? extends Number> intList = Collections.nCopies(5, new Integer(10));\n\
  List<Object> objList = new ArrayList<Object>();\nfor(int i = 0; i < 5; i++) {\n\
  \        objList.add(new Object());\n}\n\nCollections.copy(objList, intList);\n\
  System.out.println(\"objList 的内容是: \" + objList);\n```\n\n它将输出以下内容：\n\n```\nobjList\
  \ 的内容是: [10, 10, 10, 10, 10]\n```\n\n以下是这段代码中发生情况的逐步说明：\n\n1.  首先，你创建了一个类型为 `List<?\
  \ extends Number>` 的列表 `intList`。你用一个包含五个值为 10 的 `Integer` 对象实例（即 `new Integer(10);`）的\
  \ `List` 来初始化它。这是你将用于 `Collections.copy` 方法的源 `List` 类型。\n2.  你创建了另一个类型为 `List<Object>`\
  \ 的列表 `objList`，并用 `ArrayList<Object>` 初始化它。你用五个虚拟的 `Object` 实例初始化 `objList`。你将把这个\
  \ `List` 用作 `Collections.copy` 的目标。为什么不像处理 `intList` 那样使用 `nCopies` 方法呢？因为 `nCopies`\
  \ 返回的 `List` 是只读列表，如果你将该 `List` 用作 `copy()` 方法的目标，将会抛出 `UnsupportedOperationException`。\n\
  3.  你将 `objList` 用作目标，`intList` 用作 `Collections.copy` 方法的源。现在，推断出的类型 `T` 是 `Number`。如你所见，`src`\
  \ 的类型是 `<? extends T>`（即对于 `intList`）；当你将 `Integer` 代入为 `<Integer extends Number>`\
  \ 时，编译成功。类似地，`dest` 的类型是 `<? super T>`（即对于 `objList`）；当你将 `Object` 代入为 `<Object\
  \ super Number>` 时，编译成功。\n4.  你打印出 `objList` 中复制的整数值。\n\n| ![image](img/bulp.jpg)\
  \ | 当你对特定类型使用（或想要使用）`<T>`、`<?>`、`<? extends T>` 或 `<? super T>` 时，将 `T` 替换为实际类型，并想象替换后的类型会是什么样子。这是理解集合类中泛型与通配符正确用法的最简单方法。\
  \ |\n\n要点记忆\n\n以下是一些可能在你的 OCPJP 7 考试中很有价值的要点：\n\n*   即使类或接口本身不是泛型的，也可以在接口或类中定义或声明泛型方法。\n\
  *   未使用类型参数使用的泛型类被称为*原始类型*。当然，原始类型不是类型安全的。Java 支持原始类型，以便可以在 Java 5 之前的代码中使用泛型类型（注意，泛型是在\
  \ Java 5 中引入的）。当你在代码中使用原始类型时，编译器会生成警告。你可以使用 `@SuppressWarnings({ \"unchecked\" })`\
  \ 来抑制与原始类型相关的警告。\n*   `List<?>` 是任何 `List` 类型的超类型，这意味着在期望 `List<?>` 的地方，你可以传入 `List<Integer>`、`List<String>`，甚至\
  \ `List<Object>`。\n*   泛型的实现本质上是静态的，这意味着 Java 编译器会解释源代码中指定的泛型，并将泛型代码替换为具体类型。这被称为*类型擦除*。编译后，代码看起来类似于开发人员使用具体类型编写的代码。本质上，使用泛型有两个优点：首先，它引入了一种抽象，使你能够编写泛型实现；其次，它允许你编写具有类型安全性的泛型实现。\n\
  *   由于类型擦除，泛型类型有许多限制。以下几个重要的限制如下：\n\n*   你不能使用 `new` 运算符实例化泛型类型。例如，假设 `mem` 是一个字段，以下语句将导致编译器错误：\n\
  \n```\n    T mem = new T();          // 错误用法 - 编译器错误\n    ```\n\n*   你不能实例化泛型类型的数组。例如，假设\
  \ `mem` 是一个字段，以下语句将导致编译器错误：\n\n```\n    T[] amem = new T[100];    // 错误用法 - 编译器错误\n\
  \    ```\n\n*   你可以声明类型 `T` 的非静态字段，但不能声明类型 `T` 的静态字段。例如，\n\n```\n    class X<T>\
  \ {\n        T instanceMem;          // 正确\n        static T statMem;       // 错误用法\
  \ - 编译器错误\n    }\n    ```\n\n*   不可能有泛型异常类；因此，以下代码将无法编译：\n\n```\n    class GenericException<T>\
  \ extends Throwable { } // 错误用法 - 编译器错误\n    ```\n\n\n\n*   你不能使用基本类型实例化泛型类型——换句话说，`List<int>`\
  \ 无法被实例化。不过，你可以使用装箱后的基本类型。\n*   “extends”和“super”在泛型上下文中的含义会发生变化。例如，当你声明 `<? extends\
  \ X>` 时，你指的是所有扩展了 `X` 的类型以及 `X` 类型本身。\n\n集合框架\n\n在本章的第一部分，我们详细讨论了泛型。泛型的主要用途是能够编写可复用（且类型安全）的数据结构和算法。Java\
  \ 库有一个集合框架，它广泛使用了泛型，并提供了一组容器和算法。\n\n在本节中，我们将重点介绍如何使用集合框架。要正确使用集合，你必须理解某些相关主题。要使用像\
  \ `HashSet` 这样的集合，你必须正确地重写 `hashCode()` 和 `equals()` 方法。为了比较对象并将其存储在集合中，你必须学习如何使用\
  \ `Comparator`、`Comparable` 等。由于集合框架广泛使用了泛型，你将在集合框架的上下文中重新审视一些与泛型相关的主题，以便更好地理解泛型。\n\
  \n为什么需要可复用的类？\n\n假设你想编写一个简单的程序来获取公司同事的分机号码。为此，你必须维护一个包含同事姓名及其分机号码的列表。在这个简单的目录中，你很少会添加或删除条目，但会频繁地查找条目——因此查找速度必须非常快。\n\
  \n要实现这个简单的目录，你必须实现一个*映射*姓名（字符串）和分机号码（整数或字符串）的类。你必须实现添加和删除条目、根据姓名查找分机号码等方法。此外，你还可以实现获取所有同事姓名、所有分机号码等方法。实现一个具备所有这些功能的类——并正确实现和测试这些功能——需要花费大量时间。\n\
  \n幸运的是，Java 在 `java.util` 包中已经实现了这样的数据结构。你可以直接（复）用 `java.util.HashMap` 来实现你的简单目录。稍后你将看到此类实现的示例，但重要的是要知道，你可以直接使用\
  \ Java 库中现成的数据结构，而无需自己实现。\n\n集合框架的基本组件\n\nJava 集合框架包含三个主要组件：\n\n*   **抽象类和接口：**\
  \ 集合框架包含许多提供通用功能的抽象类和接口。通过学习它们，你将了解其以公共方法形式提供的功能。\n*   **具体类：** 这些是你在程序中实际使用的容器实例。\n\
  *   **算法：** `java.util.Collections` 实现了排序、搜索等常用功能。这些方法是*泛型*的：你可以在不同的容器上使用这些方法。\n\
  \n| ![image](img/Note.jpg) | 请注意，*collection(s)* 是一个通用术语，而 `Collection` 和 `Collections`\
  \ 是 `java.util` 包中的特定 API。`Collections`——如 `java.util.Collections` 中所示——是一个仅包含静态方法的工具类。通用术语\
  \ *collection(s)* 指的是像 map、stack、queue 这样的容器。为避免混淆，本章在提及这些 *collection(s)* 时将使用术语\
  \ *container(s)*。 |\n\n抽象类和接口\n\n`java.util` 库中的类型层次结构包含许多提供通用功能的抽象类和接口。表 6-1 和\
  \ 图 6-3 列出并展示了该层次结构中的一些重要类型。我们将在本章后续部分更详细地介绍其中一些类型。\n\n表 6-1. 集合框架中的重要抽象类和接口\n\n\
  | 抽象类/接口 | 简要描述 |\n| --- | --- |\n| `Iterable` | 实现此接口的类可用于通过 `for each` 语句进行迭代。\
  \ |\n| `Collection` | 集合层次结构中类的公共基接口。当你想要编写非常通用的方法时，可以传递 `Collection` 接口。例如，`java.util.Collections`\
  \ 中的 `max()` 方法接受一个 `Collection` 并返回一个对象。 |\n| `List` | 存储元素序列的容器的基接口。你可以使用索引访问元素，并在之后检索到相同的元素（因此它保持了插入顺序）。你可以在\
  \ `List` 中存储重复元素。 |\n| `Set`, `SortedSet`, `NavigableSetQueue`, `Deque` | 不允许重复元素的容器的接口。`SortedSet`\
  \ 以排序顺序维护集合元素。`NavigableSet` 允许在集合中搜索最接近的匹配项。`Queue` 是保存待处理元素序列的容器的基接口。例如，实现 `Queue`\
  \ 的类可以是 LIFO（后进先出——如栈数据结构）或 FIFO（先进先出——如队列数据结构）。在 `Deque` 中，你可以从*两端*插入或移除元素。 |\n\
  | `Map`, `SortedMap`, `NavigableMap` | 将键映射到值的容器的基类。在 `SortedMap` 中，键按排序顺序排列。`NavigableMap`\
  \ 允许你搜索并返回与给定搜索条件最接近的匹配项。请注意，`Map` 层次结构*不*扩展 `Collection` 接口。 |\n| `Iterator`, `ListIterator`\
  \ | 如果一个类实现了 `Iterator` 接口，你可以向前遍历容器。如果一个类实现了 `ListIterator` 接口，你可以向前和向后两个方向遍历。\
  \ |\n\n![9781430247647_Fig06-03.jpg](img/9781430247647_Fig06-03.jpg)\n\n图 6-3. \
  \ 重要的高级 java.util 接口及其继承关系\n\n这些基础类型相当多，但不要被它们吓到。你将看到具体的类并使用其中一些基础类型。我们将只介绍 `Collection`\
  \ 接口，然后通过介绍集合层次结构中的每个部分来继续介绍具体类。\n\nCollection 接口\n\n`Collection` 接口提供了诸如 `add()`\
  \ 和 `remove()` 等所有容器通用的方法。表 6-2 列出了该接口中最重要的方法。在使用它们之前，请先查看一下。\n\n表 6-2. Collection\
  \ 接口中的重要方法\n\n| 方法 | 简要描述 |\n| --- | --- |\n| `boolean add(Element elem)` | 将 `elem`\
  \ 添加到底层容器中。 |\n| `void clear()` | 移除容器中的所有元素。 |\n| `boolean isEmpty()` | 检查容器是否包含任何元素。\
  \ |\n| `Iterator<Element> iterator()` | 返回一个用于迭代容器的 `Iterator<Element>` 对象。 |\n\
  | `boolean remove(Object obj)` | 如果 `obj` 存在于容器中，则移除该元素。 |\n| `int size()` | 返回容器中的元素数量。\
  \ |\n| `Object[] toArray()` | 返回一个包含容器中所有元素的数组。 |\n\n诸如 `add()` 和 `remove()` 之类的方法可能会因底层容器而异而失败。例如，如果容器是只读的，你将无法添加或移除元素。除了这些方法之外，`Collection`\
  \ 接口中还有许多适用于容器中多个元素的方法（表 6-3）。\n\n表 6-3. Collection 接口中适用于多个元素的方法\n\n\n\n| 方法 |\
  \ 简要描述 |\n| --- | --- |\n| `boolean addAll(Collection<? extends Element> coll)`\
  \ | 将 `coll` 中的所有元素添加到底层容器中。 |\n| `boolean containsAll(Collection<?> coll)` | 检查\
  \ `coll` 中给出的所有元素是否都存在于底层容器中。 |\n| `boolean removeAll(Collection<?> coll)` | 从底层容器中移除所有也存在于\
  \ `coll` 中的元素。 |\n| `boolean retainAll(Collection<?> coll)` | 仅保留底层容器中也存在于 `coll`\
  \ 中的元素；移除所有其他元素。 |\n\n具体类\n\n`Collection` 层次结构中的众多接口和抽象类提供了特定具体类实现/扩展的通用方法。具体类提供了实际功能，你只需学习其中少数几个，就能为\
  \ OCPJP 7 考试做好充分准备。表 6-4 总结了你需要了解的这些类的特性。\n\n表 6-4. 集合框架中的重要具体类\n\n| 具体类 | 简要描述\
  \ |\n| --- | --- |\n| `ArrayList` | 内部实现为可调整大小的数组。这是最广泛使用的具体类之一。搜索速度快，但插入或删除速度慢。允许重复元素。\
  \ |\n| `LinkedList` | 内部实现为双向链表数据结构。插入或删除元素速度快，但搜索元素速度慢。此外，当你需要栈（LIFO）或队列（FIFO）数据结构时，可以使用\
  \ `LinkedList`。允许重复元素。 |\n| `HashSet` | 内部实现为哈希表数据结构。用于存储一组元素——不允许存储重复元素。搜索和检索元素速度快。它*不*维护存储元素的任何顺序。\
  \ |\n| `TreeSet` | 内部实现为红黑树数据结构。与 `HashSet` 类似，`TreeSet` 不允许存储重复元素。然而，与 `HashSet`\
  \ 不同，它按排序顺序存储元素。它使用树数据结构来决定存储或搜索元素的位置，该位置由排序顺序决定。 |\n| `HashMap` | 内部实现为哈希表数据结构。存储键值对。使用哈希来查找搜索或存储对的位置。搜索或插入速度非常快。它*不*按任何顺序存储元素。\
  \ |\n| `TreeMap` | 内部使用红黑树数据结构实现。与 `HashMap` 不同，`TreeMap` 按排序顺序存储元素。它使用树数据结构来决定存储或搜索键的位置，该位置由排序顺序决定。\
  \ |\n| `PriorityQueue` | 内部使用堆数据结构实现。`PriorityQueue` 用于基于优先级检索元素。无论你插入的顺序如何，当你移除元素时，优先级最高的元素将首先被检索到。\
  \ |\n\n| ![image](img/Note.jpg) | 有许多旧的 `java.util` 类（现在称为遗留集合类型）已被新的集合类取代。其中一些是（括号内为较新的类型）：`Enumeration`（`Iterator`）、`Vector`（`ArrayList`）、`Dictionary`（`Map`）和\
  \ `Hashtable`（`HashMap`）。此外，`Stack` 和 `Properties` 是没有直接替代品的遗留类。 |\n\n迭代器接口\n\n\
  我们先讨论 `Iterator`，因为我们将使用 `Iterator` 来说明其他具体类。`Iterator` 接口是一个简单的接口，只有三个方法：`hasNext()`、`next()`\
  \ 和 `remove()`（参见表 6-5）。\n\n表 6-5. 迭代器接口中的方法\n\n| 方法 | 简要描述 |\n| --- | --- |\n|\
  \ `boolean hasNext()` | 检查迭代器是否还有更多元素可以遍历。 |\n| `E next()` | 将迭代器移动到下一个元素并返回该（下一个）元素。\
  \ |\n| `void remove()` | 从底层容器中移除最后访问的元素。在调用 `remove()` 之前应先调用 `next()`；否则会抛出 `IllegalStateException`。\
  \ |\n\n列表类\n\n`List` 用于存储元素序列。你可以使用索引将元素插入容器的特定位置，并在之后检索相同的元素（即，它维护插入顺序）。你可以在列表中存储重复元素。你需要了解两个具体类：`ArrayList`\
  \ 和 `LinkedList`。\n\nArrayList 类\n\n`ArrayList` 实现了一个可调整大小的数组。当你创建一个原生数组（例如，`new\
  \ String[10];`）时，数组的大小在创建时是已知的（固定的）。然而，`ArrayList` 是一个*动态数组*：它可以根据需要增长大小。在内部，`ArrayList`\
  \ 分配一块内存，并根据需要增长。因此，在 `ArrayList` 中访问数组元素非常快。但是，当你添加或移除元素时，内部会复制其余元素；因此添加/删除元素是一项开销很大的操作。\n\
  \n以下是一个访问 `ArrayList` 中元素的简单示例。你创建一个 `ArrayList` 并使用 `for-each` 结构来遍历集合：\n\n```\n\
  ArrayList<String> languageList = new ArrayList<>();\nlanguageList.add(\"C\");\n\
  languageList.add(\"C++\");\nlanguageList.add(\"Java\");\nfor(String language : languageList)\
  \ {\n    System.out.println(language);\n}\n```\n\n它会打印以下内容：\n\n```\nC\nC++\nJava\n\
  ```\n\n这个 `for-each` 等同于以下显式使用 `Iterator` 的代码：\n\n```\nfor(Iterator<String> languageIter\
  \ = languageList.iterator(); languageIter.hasNext();) {\n        String language\
  \ = languageIter.next();\n        System.out.println(language);\n}\n```\n\n这段代码段也会打印与之前\
  \ `for-each` 循环代码相同的输出。以下是此 `for` 循环工作方式的分步说明：\n\n1.  你使用 `iterator()` 方法获取该容器的迭代器。由于\
  \ `languageList` 是 `<String>` 类型的 `ArrayList`，你应该使用 `String` 创建 `Iterator`。将其命名为\
  \ `languageIter`。\n2.  在进入循环之前，你检查是否有任何元素需要访问。你调用 `hasNext()` 方法来检查。如果返回 true，则还有更多元素需要访问；如果返回\
  \ false，则迭代结束，你退出循环。\n3.  一旦进入循环体，你要做的第一件事就是调用 `next()` 并移动迭代器。`next()` 方法返回迭代的值。你将返回值捕获到\
  \ `language` 变量中。\n4.  你打印 `language` 值，然后循环继续。\n\n这种*迭代惯用法*——即你调用 `iterator()`、`hasNext()`\
  \ 和 `next()` 方法的方式——很重要，需要学习；在我们的示例中，我们将广泛使用 for-each 循环或此惯用法。\n\n请注意，你创建的是 `ArrayList<String>`\
  \ 和 `Iterator<String>`，而不是仅仅使用 `ArrayList` 或 `Iterator`（即，你为这些类提供了类型信息）。`Collection`\
  \ 类是泛型类；因此你需要指定类型参数才能使用它们。这里你正在存储/迭代一个字符串列表，所以你使用 `<String>`。\n\n你可以使用迭代器在遍历容器时移除元素。让我们创建一个包含十个元素的\
  \ `ArrayList<Integer>` 类型对象。你将遍历这些元素并移除所有元素（而不是使用 `ArrayList` 中的 `removeAll()` 方法）。清单\
  \ 6-14 显示了代码。它能工作吗？\n\n清单 6-14.  TestIterator.java\n\n```\n// 此程序演示了 Iterator 的用法\n\
  \nimport java.util.*;\n\n\n\nclass TestIterator {\n    public static void main(String\
  \ []args) {\n         ArrayList<Integer> nums = new ArrayList<Integer>();\n    \
  \     for(int i = 1; i < 10; i++)\n              nums.add(i);\n         System.out.println(\"\
  Original list \" + nums);\n         Iterator<Integer> numsIter = nums.iterator();\n\
  \         while(numsIter.hasNext()) {\n                     numsIter.remove();\n\
  \         }\n         System.out.println(\"List after removing all elements\" +\
  \ nums);\n    }\n}\n```\n\n它会输出以下内容：\n\n```\nOriginal list [1, 2, 3, 4, 5, 6, 7,\
  \ 8, 9]\nException in thread \"main\" java.lang.IllegalStateException\n        at\
  \ java.util.AbstractList$Itr.remove(AbstractList.java:356)\n        at TestIterator.main(Main.java:12)\n\
  ```\n\n哎呀！发生了什么？问题在于你在调用 `remove()` 之前没有调用 `next()`。在 `while` 循环条件中检查 `hasNext()`，使用\
  \ `next()` 移动到元素，再调用 `remove()`，这才是移除元素的正确用法。如果你没有正确遵循这一步骤，就会遇到麻烦（即你会得到 `IllegalStateException`）。类似地，如果你连续两次调用\
  \ `remove()`，而中间没有插入 `next()`，也会抛出此异常。\n\n让我们通过先调用 `next()` 再调用 `remove()` 来修复这个程序。以下是代码的相关部分：\n\
  \n```\nIterator<Integer> numsIter = nums.iterator();\nwhile(numsIter.hasNext())\
  \ {\n        numsIter.next();\n                numsIter.remove();\n}\nSystem.out.println(\"\
  List after removing all elements \" + nums);\n```\n\n它会按预期输出一个空列表：\n\n```\nList\
  \ after removing all elements []\n```\n\n| ![image](img/banana.jpg) | 请记住，在 `Iterator`\
  \ 中，调用 `remove()` 之前必须先调用 `next()`；否则，你会得到一个 `IllegalStateException`。同样，如果在后续语句中连续调用\
  \ `remove()`，而中间没有调用 `next()`，也会导致此异常。基本上，当迭代器遍历容器时，对底层容器进行的任何修改都会导致此异常。 |\n\nListIterator\
  \ 接口\n\n在了解 `LinkedList` 之前，你应该先理解 `ListIterator`。`ListIterator` 接口扩展了 `Iterator`\
  \ 接口，因此它继承了 `hasNext()`、`next()` 和 `remove()` 方法。此外，`ListIterator` 还有许多其他方法（参见表\
  \ 6-6）。使用这些方法，你可以反向遍历、获取前一个或后一个索引位置，以及设置或向底层容器添加新元素。\n\n表 6-6. ListIterator 接口中的方法（除\
  \ Iterator 方法外）\n\n| 方法 | 简要描述 |\n| --- | --- |\n| `boolean hasPrevious()` | 检查迭代器是否还有更多元素可以反向遍历。\
  \ |\n| `Element previous()` | 将迭代器移动到下一个元素，并返回反向遍历中的这个（下一个）元素。 |\n| `int nextIndex()`\
  \ | 返回正向遍历中下一个元素的索引。 |\n| `int previousIndex()` | 返回反向遍历中下一个元素的索引。 |\n| `void set(Element)`\
  \ | 设置最后访问的元素（使用 next 或 previous）；它会替换现有元素。 |\n| `void add(Element)` | 在当前迭代位置将元素添加到列表中。\
  \ |\n\nLinkedList 类\n\n`LinkedList` 类内部使用双向链表。因此，在 `LinkedList` 中插入和删除非常快。然而，访问元素需要逐个遍历节点，所以速度较慢。当你需要频繁地在元素列表中添加或删除元素时，最好使用\
  \ `LinkedList`。你将会看到一个结合 `ListIterator` 接口使用 `LinkedList` 的示例。\n\n*回文*（palindrome）是指正向和反向读起来都一样的单词或短语。*回文字符串*\
  \ “abcba” 在两个方向上读起来都一样。给定一个字符串，如何判断它是否是回文？\n\n嗯，你可以通过将输入字符串存储在一个 `String` 中，并在 `for`\
  \ 循环中使用 `charAt()` 方法来比较字符（一个从开头，另一个从结尾），从而判断输入字符串是否为回文。为了向你展示如何使用 `ListIterator`\
  \ 和 `LinkedList`，请参见清单 6-15，其中提供了一个实现相同功能的示例解决方案。\n\n清单 6-15.  ListIterator.java\n\
  \n```\n// 此程序演示了 ListIterator 的用法\n\nimport java.util.*;\n\nclass ListIteratorTest\
  \ {\n        public static void main(String []args) {\n                String palStr\
  \ = \"abcba\";\n                List<Character> palindrome = new LinkedList<Character>();\n\
  \nfor(char ch : palStr.toCharArray())\n                        palindrome.add(ch);\n\
  \nSystem.out.println(\"Input string is: \" + palStr);\n                ListIterator<Character>\
  \ iterator = palindrome.listIterator();\n                ListIterator<Character>\
  \ revIterator = palindrome.listIterator (palindrome.size());\n\nboolean result =\
  \ true;\n                while(revIterator.hasPrevious() && iterator.hasNext())\
  \ {\n                        if(iterator.next() != revIterator.previous()){\n  \
  \                              result = false;\n                               \
  \ break;\n                        }\n                }\n                if (result)\n\
  \                        System.out.print(\"Input string is a palindrome\");\n \
  \               else\n                        System.out.print(\"Input string is\
  \ not a palindrome\");\n                }\n        }\n```\n\n它会输出以下内容：\n\n```\n\
  Input string is: abcba\nInput string is a palindrome\n```\n\n在这个程序中，你使用一个 `Character`\
  \ 类型的 `LinkedList` 来存储输入字符串中的每个字符。为什么用 `LinkedList<Character>` 而不是 `LinkedList<char>`？容器类存储的是对象的引用，因此你不能在任何集合类中使用基本类型。由于我们有包装类和自动装箱，这不成问题——这就是为什么这里使用\
  \ `Character` 而不是 `char`。\n\n另外，请注意如何将 `LinkedList<Character>` 赋值给 `List<Character>`。由于\
  \ `LinkedList` 类实现了 `List` 接口，你可以进行此赋值。使用 `Collection` 接口而不是具体的类类型来持有引用是一种良好的编程实践，因为——如果你将来想将\
  \ `LinkedList` 改为 `ArrayList`，使用 `List` 接口作为引用会使更改非常容易。现在回到程序。\n\n`String` 中的 `toCharArray()`\
  \ 方法返回一个 `char[]`，你使用 `for each` 循环遍历该数组中的每个字符。随着循环的执行，你将字符放入链表中。那么，如何双向遍历这个链表呢？\n\
  \n你可以使用 `hasNext()` 和 `next()` 方法进行正向遍历，使用 `ListIterator` 中的 `hasPrevious()` 和 `previous()`\
  \ 方法进行反向移动。如何从 `LinkedList` 获取 `ListIterator`？在 `List` 接口中有 `listIterator()` 和 `listIterator(index)`\
  \ 方法。由于你想要双向遍历 `LinkedList`，你同时使用了 `listIterator()` 和 `listIterator(index)` 方法。在第一种情况下，你获得指向容器开头的迭代器；在另一种情况下，你将字符串的长度作为参数传递给\
  \ `listIterator` 方法，以获得反向迭代器。一旦你获得了这两个迭代器，就可以直接对第一个迭代器使用 `hasNext()` 和 `next()`，对第二个迭代器使用\
  \ `hasPrevious()` 和 `previous()` 方法。\n\nSet 接口\n\n`Set`，正如我们在高中数学课上学到的，不包含重复元素。与\
  \ `List` 不同，`Set` 不记录元素的插入位置（即它不记住插入顺序）。\n\n\n\n`Set`有两个重要的具体类：`HashSet`和`TreeSet`。`HashSet`用于快速插入和检索元素；它*不*维护其所持有元素的任何排序顺序。`TreeSet`按排序顺序存储元素（并且它实现了`SortedSet`接口）。\n\
  \nHashSet 类\n\n给定一个句子，如何去除该句子中重复的单词？`Set`不允许重复，而`HashSet`可用于快速插入和搜索。因此，你可以使用`HashSet`来解决这个问题（参见清单\
  \ 6-16）。\n\n清单 6-16.  RemoveDuplicates.java\n\n```\n// This program demonstrates\
  \ the usage of HashSet class\n\nimport java.util.*;\n\nclass RemoveDuplicates {\n\
  \        public static void main(String []args) {\n                String tongueTwister\
  \ = \"I feel, a feel, a funny feel, a funny feel I feel,\n                 if you\
  \ feel the feel  I feel, I feel the feel you feel\";\n                Set<String>\
  \ words = new HashSet<>();\n\n// split the sentence into words and try putting them\
  \ in the set\n                for(String word : tongueTwister.split(\"\\\\W+\"))\n\
  \                        words.add(word);\n\nSystem.out.println(\"The tongue twister\
  \ is: \" + tongueTwister);\n                System.out.print(\"The words used were:\
  \ \");\n                System.out.println(words);\n        }\n}\n```\n\n它会输出以下内容：\n\
  \n```\nThe tongue twister is: I feel, a feel, a funny feel, a funny feel I feel,\
  \ if you\nfeel the feel I feel, I feel the feel you feel\nThe words used were: [feel,\
  \ if, a, funny, you, the, I]\n```\n\n在这个例子中，绕口令句子只有两个单词分隔符——逗号和空格。你通过使用`split()`方法，利用这些分隔符来拆分字符串。`split()`方法接受一个正则表达式作为参数（正则表达式在第\
  \ 7 章中介绍）。正则表达式`\\\\W+`表示它用于在单词边界处进行拆分。因此，字符串被分割成单词，并忽略逗号等标点符号。\n\n你尝试将每个单词插入到集合中。如果单词已存在，`add()`方法会失败并返回\
  \ false（你没有存储这个返回值）。一旦你将所有元素插入到`HashSet`中，你逐个打印它们，发现这个包含 25 个单词的绕口令只用了 7 个单词！\n\n\
  TreeSet 类\n\n给定一个句子，如何将该句子中使用的字母按字母顺序排序？`TreeSet`将值按排序顺序放置，因此你可以使用`TreeSet`容器来解决这个问题（参见清单\
  \ 6-17）。\n\n清单 6-17.  TreeSetTest.java\n\n```\n// This program demonstrates the\
  \ usage of TreeSet class\n\nimport java.util.*;\n\nclass TreeSetTest {\n       \
  \ public static void main(String []args) {\n                String pangram = \"\
  the quick brown fox jumps over the lazy dog\";\n                Set<Character> aToZee\
  \ = new TreeSet<Character>();\n                for(char gram : pangram.toCharArray())\n\
  \                        aToZee.add(gram);\n                System.out.println(\"\
  The pangram is: \" + pangram);\n                System.out.print(\"Sorted pangram\
  \ characters are: \" + aToZee);\n        }\n}\n```\n\n它会输出以下内容：\n\n```\nThe pangram\
  \ is: the quick brown fox jumps over the lazy dog\nSorted pangram characters are:\
  \ [ , a, b, c, d, e, f, g, h, i, j, k, l, m, n, o, p, q, r, s, t, u, v,\nw, x, y,\
  \ z]\n```\n\n*全字母句*是一个使用了字母表中所有字母至少一次的句子。你想要将全字母句的字符存储在集合中。由于容器需要使用引用类型，你创建了一个`Character`类型的`TreeSet`。\n\
  \n那么，如何从`String`中获取字符呢？记住，数组索引不适用于`String`。例如，要获取第一个字符`\"t\"`，如果你在程序中使用`pangram[0]`，你会得到一个编译器错误。幸运的是，`String`有一个名为`toCharArray()`的方法，它返回一个`char[]`。因此，你使用这个方法遍历字符串并获取所有字符。当你将字符添加到`TreeSet`中时，字符会按排序顺序存储。因此，当你打印集合时，你会得到所有的小写字母。\n\
  \n注意输出中有一个前导逗号。为什么？全字母句字符串包含许多空白字符。一个空白字符也被存储到了集合中，所以它也被打印出来了！\n\nMap 接口\n\n`Map`存储键值对。`Map`接口*不*扩展`Collection`接口。但是，`Map`接口中有一些方法，你可以使用它们来获取`Collection`中的类以解决这个问题。此外，`Map`中的方法名与`Collection`中的方法非常相似，因此理解和`使用\
  \ Map`很容易。我们将介绍`Map`的两个重要具体类：`HashMap`和`TreeMap`。\n\n`HashMap`在内部使用哈希表数据结构。在`HashMap`中，搜索（或查找元素）是一个快速的操作。然而，`HashMap`既不记住你插入元素的顺序，也不以任何排序顺序维护元素。\n\
  \n`TreeMap`在内部使用红黑树数据结构。与`HashMap`不同，`TreeMap`按排序顺序维护元素（即，按键排序）。因此，搜索或插入比`HashMap`稍慢一些。\n\
  \nHashMap 类\n\n假设你正在实现一个简单的拼写检查器。给定一个输入字符串，拼写检查器会查找通常拼写错误的单词；如果找到匹配项，它会打印出正确的拼写。因此，拼写检查器应该维护一个常用拼写错误单词及其正确拼写的列表。你如何实现这个功能？\n\
  \n给定一个键，你可以使用`Map`查找一个值。那么，使用哪个映射呢，`HashMap`还是`TreeMap`？*不需要*（尽管你可以）将拼写错误的单词按排序顺序维护，并且对拼写错误单词的查找应该非常快。因此，`HashMap`适合解决这个问题。\n\
  \n清单 6-18 是一个展示如何实现拼写检查器的简单程序。\n\n清单 6-18.  SpellChecker.java\n\n```\n// This program\
  \ shows the usage of HashMap class\npublic class SpellChecker {\n      public static\
  \ void main(String []args) {\n            Map<String, String> misspeltWords = new\
  \ HashMap<String, String>();\n            misspeltWords.put(\"calender\", \"calendar\"\
  );\n            misspeltWords.put(\"tomatos\", \"tomatoes\");\n            misspeltWords.put(\"\
  existance\", \"existence\");\n            misspeltWords.put(\"aquaintance\", \"\
  acquaintance\");\n            String sentence = \"Buy a calender for the year 2013\"\
  ;\n            System.out.println(\"The given sentence is: \" + sentence);\n   \
  \         for(String word : sentence.split(\"\\\\W+\")) {\n                  if(misspeltWords.containsKey(word))\
  \ {\n                        System.out.println(\"The correct spelling for \" +\
  \ word\n                                    + \" is: \" + misspeltWords.get(word));\n\
  \                  }\n            }\n      }\n}\n```\n\n它会输出以下内容：\n\n```\nThe given\
  \ sentence is: Buy a calender for the year 2013\nThe correct spelling for calender\
  \ is: calendar\n```\n\n首先，你需要创建一个拼写错误单词及其正确拼写的表格。由于键和值都是`String`，你创建了一个`HashMap<String,\
  \ String>`对象。你在`HashMap`中插入了四个拼写错误的单词及其正确拼写。拼写错误的单词是键，正确的拼写是值。你使用`put()`方法（而不是你在`Container`中使用的`add()`方法）将一个键值对插入到`Map`中。\n\
  \n\n\n你采用了一种简单的方法来拆分句子中的单词——使用 `String` 的 `split()` 方法。对于每个单词，你检查它是否与拼写错误的单词完全匹配；如果是，则打印与该键对应的值。你使用\
  \ `containsKey()` 方法来检查该键是否存在于映射中；它会返回一个布尔值。你使用 `get()` 方法，以键作为参数，从映射中返回对应的值。由于给定的句子中有一个单词拼写错误（“calender”），你会打印该单词的正确拼写。\n\
  \n现在，让我们看看 `misspeltWords HashMap` 中的键。你可以使用 `keySet()` 方法获取 `HashMap` 中的所有键。由于你使用的是\
  \ `HashMap<String, String>`，返回的集合类型是 `Set<String>`。\n\n```\nSet<String> keys = misspeltWords.keySet();\n\
  System.out.print(\"拼写检查器中的拼写错误单词为：\");\nSystem.out.println(keys); \n```\n\n它会打印以下内容：\n\
  \n```\n拼写检查器中的拼写错误单词为：[calender, existance, aquaintance, tomatos]\n```\n\n类似地，你可以使用\
  \ `valueSet()` 方法来获取映射中可用的值。\n\n重写 hashCode() 方法\n\n正确重写 `equals` 和 `hashCode` 方法对于在容器（特别是\
  \ `HashMap` 和 `HashSet`）中使用这些类非常重要。清单 6-19 是一个简单的 `Circle` 类示例，以便你理解可能出现的问题。\n\n\
  清单 6-19.  TestCircle.java\n\n```\n// 此程序展示了 equals() 和 hashCode() 方法的重要性\n\nimport\
  \ java.util.*;\n\nclass Circle {\n        private int xPos, yPos, radius;\n    \
  \    public Circle(int x, int y, int r) {\n                xPos = x;\n         \
  \       yPos = y;\n                radius = r;\n        }\n\npublic boolean equals(Object\
  \ arg) {\n                if(arg == null) return false;\n                if(this\
  \ == arg) return true;\n                if(arg instanceof Circle) {\n          \
  \              Circle that = (Circle) arg;\n                        if( (this.xPos\
  \ == that.xPos) && (this.yPos == that.yPos)\n                                &&\
  \ (this.radius == that.radius )) {\n                                return true;\n\
  \                        }\n                }\n                return false;\n \
  \       }\n}\n\nclass TestCircle {\n        public static void main(String []args)\
  \ {\n                Set<Circle> circleList = new HashSet<Circle>();\n         \
  \       circleList.add(new Circle(10, 20, 5));\n                System.out.println(circleList.contains(new\
  \ Circle(10, 20, 5)));\n        }\n}\n```\n\n它打印的是 `false`（而不是 `true`）！为什么？`Circle`\
  \ 类重写了 `equals()` 方法，但没有重写 `hashCode()` 方法。当你在标准容器中使用 `Circle` 对象时，这就成了一个问题。为了快速查找，容器会比较对象的哈希码。如果\
  \ `hashCode()` 方法没有被重写，那么即使传入一个内容相同的对象，容器也找不到该对象！因此，你需要重写 `hashCode()` 方法。\n\n那么，如何重写\
  \ `hashCode()` 方法呢？在理想情况下，`hashCode()` 方法应该为不同的对象返回唯一的哈希码。\n\n如果 `equals()` 方法返回\
  \ true，那么 `hashCode()` 方法*应该*返回相同的哈希值。如果对象不同（因此 `equals()` 方法返回 false）呢？如果对象不同，`hashCode()`\
  \ 最好（尽管不是必须）返回不同的值。原因是，要编写一个能为每个不同对象都返回唯一值的 `hashCode()` 方法是很困难的。\n\n| ![image](img/banana.jpg)\
  \ | 对于一个类来说，`hashCode()` 和 `equals()` 方法需要保持一致。在实际应用中，请确保遵循这一条规则：如果两个对象的 `equals()`\
  \ 方法返回 true，那么 `hashCode()` 方法应该为它们返回相同的哈希值。 |\n\n在实现 `hashCode()` 方法时，你可以使用类的实例成员的值来创建哈希值。以下是\
  \ `Circle` 类 `hashCode()` 方法的一个简单实现：\n\n```\npublic int hashCode() {\n        //\
  \ 使用位运算符（如 ^）来生成接近唯一的哈希码\n        // 这里我们使用了魔法数字 7、11 和 53，但你可以使用任何数字，最好是质数\n  \
  \      return (7 * xPos) ^ (11 * yPos) ^ (53 * yPos);\n}\n```\n\n现在，如果你运行 `main()`\
  \ 方法，它会打印 “true”。在这个 `hashCode()` 方法的实现中，你将值乘以一个质数，并进行了位运算。如果你想要更好的哈希函数，可以为 `hashCode()`\
  \ 编写更复杂的代码，但这个实现对于实际应用来说已经足够了。\n\n你可以对 `int` 值使用位运算符。那么其他类型呢，比如浮点值或引用类型？举个例子，下面是\
  \ `java.awt.Point2D` 的 `hashCode()` 实现，它包含浮点值 `x` 和 `y`。`getX()` 和 `getY()` 方法分别返回\
  \ `x` 和 `y` 的值：\n\n```\npublic int hashCode() {\n        long bits = java.lang.Double.doubleToLongBits(getX());\n\
  \        bits ^= java.lang.Double.doubleToLongBits(getY()) * 31;\n        return\
  \ (((int) bits) ^ ((int) (bits >> 32)));\n}\n```\n\n这个方法使用了 `doubleToLongBits()`\
  \ 方法，它接受一个 `double` 值并返回一个 `long` 值。对于浮点值 `x` 和 `y`（由 `getX` 和 `getY` 方法返回），你得到位形式的\
  \ `long` 值，然后使用位操作来获取 `hashCode()`。\n\n现在，如果类有引用类型的成员，你该如何实现 `hashCode` 方法呢？例如，考虑使用\
  \ `Point` 类的实例作为成员，而不是原始类型字段 `xPos` 和 `yPos`：\n\n```\nclass Circle {\n        private\
  \ int radius;\n        private Point center;\n        // 其他成员...\n}\n```\n\n在这种情况下，你可以调用\
  \ `Point` 的 `hashCode()` 方法来实现 `Circle` 的 `hashCode` 方法：\n\n```\npublic int hashCode()\
  \ {\n        return center.hashCode() ^ radius;\n}\n```\n\n| ![image](img/banana.jpg)\
  \ | 如果你在 `HashSet` 或 `HashMap` 等容器中使用对象，请确保正确重写 `hashCode()` 和 `equals()` 方法。否则，在使用这些容器时，你会遇到令人头疼的意外（bug）！\
  \ |\n\nNavigableMap 接口\n\n`NavigableMap` 接口扩展了 `SortedMap` 接口。在 `Collection` 层次结构中，`TreeMap`\
  \ 类是广泛使用的实现 `NavigableMap` 的类。顾名思义，使用 `NavigableMap`，你可以轻松地导航 `Map`。它有许多使 `Map`\
  \ 导航变得容易的方法。你可以获取与给定键最接近的值、所有小于给定键的值、所有大于给定键的值等。让我们看一个例子：Lennon、McCartney、Harrison\
  \ 和 Starr 参加了一次在线考试。在那次考试中，最高分是 100 分，及格分是 40 分。如果你想查找谁通过了考试等详细信息，并按升序或降序对考试成绩进行排序，`NavigableMap`\
  \ 非常方便（参见清单 6-20）。\n\n清单 6-20.  NavigableMapTest.java\n\n```\n// 此程序演示了可导航树接口和 TreeMap\
  \ 类的用法\n\nimport java.util.*;\n\npublic class NavigableMapTest {\n        public\
  \ static void main(String []args) {\n                NavigableMap<Integer, String>\
  \ examScores = new TreeMap<Integer, String>();\n\nexamScores.put(90, \"Sophia\"\
  );\n                examScores.put(20, \"Isabella\");\n                examScores.put(10,\
  \ \"Emma\");\n                examScores.put(50, \"Olivea\");\n\n\n\nSystem.out.println(\"\
  The data in the map is: \" + examScores);\n                System.out.println(\"\
  The data descending order is: \" + examScores.descendingMap());\n              \
  \  System.out.println(\"Details of those who passed the exam: \" +\n         examScores.tailMap(40));\n\
  \                System.out.println(\"The lowest mark is: \" + examScores.firstEntry());\n\
  \        }\n}\n```\n\n输出结果如下：\n\n```\nThe data in the map is: {10=Emma, 20=Isabella,\
  \ 50=Olivea, 90=Sophia}\nThe data descending order is: {90=Sophia, 50=Olivea, 20=Isabella,\
  \ 10=Emma}\nDetails of those who passed the exam: {50=Olivea, 90=Sophia}\nThe lowest\
  \ mark is: 10=Emma\n```\n\n在这个程序中，你有一个 `NavigableMap<Integer, String>`，它将考试成绩和人员姓名进行映射。你创建了一个\
  \ `TreeMap<String, String>` 来实际存储考试成绩。默认情况下，`TreeMap` 按升序存储数据。如果你希望数据按降序排列，也很简单：只需使用\
  \ `descendingMap()` 方法（如果你只关心键，则使用 `descendingKeySet()` 方法）。\n\n假设及格分数是 40，你可能希望获取包含未通过考试人员数据的映射。为此，你可以使用\
  \ `headMap()` 方法，并传入键值 40（由于数据是升序排列，你需要从指定位置获取映射的“头部”部分）。类似地，要获取通过考试人员的数据，你可以使用\
  \ `tailMap()` 方法。\n\n如果你想要刚好高于和低于及格分数的相邻数据，可以分别使用 `higherEntry()` 和 `lowerEntry()`\
  \ 方法。`firstEntry()` 和 `lastEntry()` 方法分别返回键值最小和最大的条目。因此，当你在 `examScores` 上使用 `firstEntry()`\
  \ 方法时，你会得到得分为 10 的 Emma。如果你使用 `lastEntry()`，则会得到得分为 90 的 Sophia。\n\nQueue 接口\n\n\
  `Queue` 遵循 FIFO 机制：最先插入的元素将最先被移除。为了获得队列行为，你可以创建一个 `LinkedList` 对象，并通过 `Queue` 引用来引用它。当你从\
  \ `Queue` 引用调用方法时，该对象的行为就像一个 `Queue`。清单 6-21 展示了一个示例，这将使概念变得清晰。Lennon、McCartney、Harrison\
  \ 和 Starr 正在参加一场在线考试。让我们看看如何记住他们登录参加考试的顺序（参见清单 6-21）。\n\n清单 6-21.  QueueTest.java\n\
  \n```\n// This program shows the key characteristics of Queue interface\n\nimport\
  \ java.util.*;\n\nclass QueueTest {\n        public static void main(String []args)\
  \ {\n                Queue<String> loginSequence = new LinkedList<String>();\n\n\
  loginSequence.add(\"Harrison\");\n                loginSequence.add(\"McCartney\"\
  );\n                loginSequence.add(\"Starr\");\n                loginSequence.add(\"\
  Lennon\");\n                System.out.println(\"The login sequence is: \" + loginSequence);\n\
  \                while(!loginSequence.isEmpty())\n                        System.out.println(\"\
  Removing \" + loginSequence.remove());\n        }\n}\n```\n\n输出结果如下：\n\n```\nThe\
  \ login sequence is: [Harrison, McCartney, Starr, Lennon]\nRemoving Harrison\nRemoving\
  \ McCartney\nRemoving Starr\nRemoving Lennon\n```\n\n在这个例子中，你创建了一个 `Queue<String>`\
  \ 来指向一个 `LinkedList<String>` 对象。然后你向队列中添加了四个元素（按他们登录顺序排列的名字）。插入元素后，你通过（隐式地）在 `loginSequence`\
  \ 上调用 `toString()` 方法来打印队列。你调用 `remove()` 方法来移除队列中的一个元素。`remove()` 方法从队列头部移除一个元素并返回被移除的元素。你得到的输出顺序与你插入队列的顺序相同。\n\
  \nDeque 接口\n\n`Deque`（双端队列）是一种允许你在两端插入和移除元素的数据结构。`Deque` 接口是在 Java 6 中引入的，位于 `java.util.collection`\
  \ 包中。`Deque` 接口扩展了刚刚讨论过的 `Queue` 接口。因此，`Queue` 提供的所有方法在 `Deque` 接口中同样可用。让我们来考察一下\
  \ `Deque` 接口中常用的方法，这些方法总结在表 6-7 中。\n\n表 6-7. Deque 接口中常用的方法\n\n| 方法 | 简要描述 |\n|\
  \ --- | --- |\n| `void addFirst(Element)` | 将 `Element` 添加到 Deque 的前端。 |\n| `void\
  \ addLast(Element)` | 将 `Element` 添加到 Deque 的末端。 |\n| `Element removeFirst()` |\
  \ 从 Deque 前端移除一个元素并返回它。 |\n| `Element removeLast()` | 从 Deque 末端移除一个元素并返回它。 |\n\
  | `Element getFirst()` | 返回 Deque 中的第一个元素，但不移除。 |\n| `Element getLast()` | 返回 Deque\
  \ 中的最后一个元素，但不移除。 |\n\n表 6-7 中列出的所有方法在失败时都会引发相应的异常。还有另一组方法，列在表 6-8 中，它们实现了相同的功能。然而，它们在失败时不会引发异常；而是返回一个特殊值。例如，`getFirst()`\
  \ 方法返回 Deque 中的第一个元素但不移除它。如果 Deque 为空，它会引发 `NoSuchElementException` 异常。同时，`peekFirst()`\
  \ 方法也执行相同的功能。但是，如果 Deque 为空，它会返回 null。当 Deque 以预定义容量创建时，表 6-8 中列出的方法比表 6-7 中列出的方法更受推荐。\n\
  \n表 6-8. Deque 接口中常用的方法（返回特殊值）\n\n| 方法 | 简要描述 |\n| --- | --- |\n| `boolean offerFirst(Element)`\
  \ | 如果不违反容量限制，则将 `Element` 添加到 Deque 的前端。 |\n| `boolean offerLast(Element)` | 如果不违反容量限制，则将\
  \ `Element` 添加到 Deque 的末端。 |\n| `Element pollFirst()` | 从 Deque 前端移除一个元素并返回它；如果\
  \ Deque 为空，则返回 `null`。 |\n| `Element pollLast()` | 从 Deque 末端移除一个元素并返回它；如果 Deque\
  \ 为空，则返回 `null`。 |\n| `Element peekFirst()` | 返回 Deque 中的第一个元素但不移除它；如果 Deque 为空，则返回\
  \ `null`。 |\n| `Element peekLast()` | 返回 Deque 中的最后一个元素但不移除它；如果 Deque 为空，则返回 `null`。\
  \ |\n\n| ![image](img/Note.jpg) | 你刚刚观察到，表 6-8 中的方法在失败时会返回 `null`。如果你将 `null` 作为元素存储会怎样？嗯，不建议你将\
  \ `null` 作为参数存储，因为 `Deque` 接口中有方法会返回 `null`，这将使你难以区分方法调用是成功还是失败。 |\n\n`Deque` 接口有三个具体的实现：`LinkedList`、`ArrayDeque`\
  \ 和 `LinkedBlockingDeque`。让我们使用 `ArrayDeque` 来理解 `Deque` 接口的特性。\n\n\n\n从`Deque`支持的方法列表可以明显看出，它可以实现队列、栈和双端队列的标准行为。让我们实现一个特殊队列（例如，用于支付水电费），顾客只能添加到队列末尾，并且可以从队列前端移除（当顾客支付账单后），也可以从队列末尾移除（当顾客因排队过长而失去耐心自行离开时）。清单\
  \ 6-22 展示了如何实现。\n\n清单 6-22.  SplQueueTest.java\n\n```\n// This program shows the\
  \ usage of Deque interface\n\nimport java.util.*;\n\nclass SplQueue {\n        private\
  \ Deque<String> splQ = new ArrayDeque<>();\n        void addInQueue(String customer){\n\
  \                splQ.addLast(customer);\n        }\n        void removeFront(){\n\
  \                splQ.removeFirst();\n        }\n        void removeBack(){\n  \
  \              splQ.removeLast();\n        }\n        void printQueue(){\n     \
  \           System.out.println(\"Special queue contains: \" + splQ);\n        }\n\
  }\n\nclass SplQueueTest {\n        public static void main(String []args) {\n  \
  \              SplQueue splQ = new SplQueue();\n                splQ.addInQueue(\"\
  Harrison\");\n                splQ.addInQueue(\"McCartney\");\n                splQ.addInQueue(\"\
  Starr\");\n                splQ.addInQueue(\"Lennon\");\n\nsplQ.printQueue();\n\
  \                splQ.removeFront();\n                splQ.removeBack();\n     \
  \           splQ.printQueue();\n        }\n}\n```\n\n它输出以下内容：\n\n```\nSpecial queue\
  \ contains: [Harrison, McCartney, Starr, Lennon]\n  Special queue contains: [McCartney,\
  \ Starr]\n```\n\n首先定义一个类——`SplQueue`——它定义了一个类型为`ArrayDeque`的容器`splQ`，并包含四个基本操作。方法`addInQueue()`在队列末尾添加一位顾客，方法`removeBack()`从队列末尾移除一位顾客，方法`removeFront()`从队列前端移除一位顾客，方法`printQueue()`则简单地打印队列中的所有元素。你只需使用`Deque`接口中的`addLast()`、`removeFront()`和`removeLast()`方法来实现`SplQueue`类的方法。在`main()`方法中，你实例化了`SplQueue`并调用了`SplQueue`类的`addInQueue()`方法。之后，你从前端和末尾各移除一位顾客，并打印移除前后队列的内容。嗯，它按预期工作了。\n\
  \n.\n\nComparable 和 Comparator 接口\n\n顾名思义，`Comparable`和`Comparator`接口用于比较相似的对象（例如，在执行搜索或排序时）。假设你有一个包含`Person`对象列表的容器。现在，如何比较两个`Person`对象？有任意数量的可比较属性，例如`SSN`、`name`、`driving-license\
  \ number`等等。两个对象可以根据`SSN`进行比较，也可以根据个人的`name`进行比较；这取决于上下文。因此，比较`Person`对象的标准不能预先定义；开发人员必须定义这个标准。Java\
  \ 定义了`Comparable`和`Comparator`接口来实现这一点。\n\n`Comparable`类只有一个方法`compareTo()`，其声明如下：\n\
  \n```\nint compareTo(Element that)\n```\n\n由于你在类中实现了`compareTo()`方法，因此可以访问`this`引用。你可以将`当前元素`与传入的`Element`进行比较，并返回一个`int`值。这个`int`值应该是什么？以下是返回整数值的规则：\n\
  \n```\n如果当前对象 > 传入对象，返回 1\n如果当前对象 == 传入对象，返回 0\n如果当前对象 < 传入对象，返回 -1\n```\n\n现在，一个重要的问题：对于`Element`来说，>、<\
  \ 或 == 意味着什么？嗯，如何比较两个对象由你决定！但比较的含义应该是自然的；换句话说，比较应该意味着*自然排序*。例如，你看到了`Integer`是如何基于*数字顺序*相互比较的，这是`Integer`类型的自然顺序。类似地，你使用*字典序比较*来比较`String`，这是`String`的自然顺序。对于用户定义的类，你需要找到可以比较对象的自然顺序。例如，对于`Student`类，`StudentId`可能是比较`Student`对象的自然顺序。清单\
  \ 6-23 现在实现了一个简单的`Student`类。\n\n清单 6-23.  ComparatorTest.java\n\n```\n// This program\
  \ shows the usage of Comparable interface\n\nimport java.util.*;\n\nclass Student\
  \ implements Comparable<Student> {\n        String id;\n        String name;\n \
  \       Double cgpa;\n        public Student(String studentId, String studentName,\
  \ double studentCGPA) {\n                id = studentId;\n                name =\
  \ studentName;\n                cgpa = studentCGPA;\n        }\n        public String\
  \ toString() {\n                return \" \\n \" + id + \"  \\t  \" + name + \"\
  \  \\t  \" + cgpa;\n        }\n        public int compareTo(Student that) {\n  \
  \              return this.id.compareTo(that.id);\n        }\n}\n\nclass ComparatorTest\
  \ {\n        public static void main(String []args) {\n                Student []students\
  \ = {  new Student(\"cs011\", \"Lennon  \", 3.1),\n                        new Student(\"\
  cs021\", \"McCartney\", 3.4),\n                        new Student(\"cs012\", \"\
  Harrison \", 2.7),\n                        new Student(\"cs022\", \"Starr \", 3.7)\
  \ };\n\nSystem.out.println(\"Before sorting by student ID\");\n                System.out.println(\"\
  Student-ID \\t  Name \\t  CGPA (for 4.0) \");\n                System.out.println(Arrays.toString(students));\n\
  \nArrays.sort(students);\n\nSystem.out.println(\"After sorting by student ID\");\n\
  \                System.out.println(\"Student-ID \\t  Name \\t  CGPA (for 4.0) \"\
  );\n                System.out.println(Arrays.toString(students));\n        }\n\
  }\n```\n\n它输出以下内容：\n\n```\nBefore sorting by student ID\nStudent-ID        Name\
  \    CGPA (for 4.0)\n[\n cs011            Lennon          3.1,\n cs021         \
  \   McCartney       3.4,\n cs012            Harrison        2.7,\n cs022       \
  \     Starr           3.7]\nAfter sorting by student ID\nStudent-ID        Name\
  \    CGPA (for 4.0)\n[\n cs011            Lennon          3.1,\n cs012         \
  \   Harrison        2.7,\n cs021            McCartney       3.4,\n cs022       \
  \     Starr           3.7]\n```\n\n你已经实现了`Comparable<Student>`接口。当你调用`sort()`方法时，它会调用`compareTo()`方法，通过学生的`ID`来比较`Student`对象。由于`Student\
  \ ID`是唯一的，这是一种运行良好的自然比较顺序。\n\n现在，你可能需要根据学生获得的累积平均绩点（CGPA）来排列他们。你甚至可能需要根据学生的`name`来比较`Student`。如果你需要实现两种或更多种替代方式来比较两个相似对象，那么你可以实现`Comparator`类。清单\
  \ 6-24 是一个实现（`Student`类没有变化，因此这里不再重复列出）。\n\n清单 6-24.  ComparatorTest2.java\n\n```\n\
  // This program shows the implementation of Comparator interface\n\nimport java.util.*;\n\
  \nclass CGPAComparator implements Comparator<Student> {\n        public int compare(Student\
  \ s1, Student s2) {\n                return (s1.cgpa.compareTo(s2.cgpa));\n    \
  \    }\n}\n\n\n\nclass ComparatorTest {\n        public static void main(String\
  \ []args) {\n                Student []students = {  new Student(\"cs011\", \"Lennon\
  \  \", 3.1),\n                        new Student(\"cs021\", \"McCartney\", 3.4),\n\
  \                        new Student(\"cs012\", \"Harrison \", 2.7),\n         \
  \               new Student(\"cs022\", \"Starr \", 3.7) };\n\nSystem.out.println(\"\
  按 CGPA 排序前 \");\n                System.out.println(\"学生 ID \\t  姓名 \\t  CGPA（满分\
  \ 4.0） \");\n                System.out.println(Arrays.toString(students));\n\n\
  Arrays.sort(students, new CGPAComparator());\n\nSystem.out.println(\"按 CGPA 排序后\"\
  );\n                System.out.println(\"学生 ID \\t  姓名 \\t  CGPA（满分 4.0） \");\n\
  \                System.out.println(Arrays.toString(students));\n        }\n}\n\
  ```\n\n输出结果如下：\n\n```\n按 CGPA 排序前\n学生 ID        姓名    CGPA（满分 4.0）\n[\n cs011  \
  \          Lennon          3.1,\n cs021            McCartney       3.4,\n cs012\
  \            Harrison        2.7,\n cs022            Starr           3.7]\n按 CGPA\
  \ 排序后\n学生 ID        姓名    CGPA（满分 4.0）\n[\n cs012            Harrison        2.7,\n\
  \ cs011            Lennon          3.1,\n cs021            McCartney       3.4,\n\
  \ cs022            Starr           3.7]\n```\n\n是的，程序输出了按 CGPA 排序后的`Student`数据。你没有修改`Student`类；该类仍然实现了`Comparable<String>`接口并定义了`compareTo()`方法，但在程序中并未使用`compareTo()`方法。你创建了一个名为`CGPAComparator`的独立类，并实现了`Comparator<Student>`接口。你定义了`compare()`方法，该方法接收两个`Student`对象作为参数。你通过（重复）使用`Double`类的`compareTo()`方法来比较参数`s1`和`s2`的\
  \ CGPA。除了调用`sort()`方法的方式外，你没有对`main()`方法做任何修改。你创建了一个新的`CGPAComparator()`对象，并将其作为第二个参数传递给`sort()`方法。默认情况下，`sort()`使用`compareTo()`方法；由于你显式传递了一个`Comparator`对象，它现在会使用`CGPAComparator`中定义的`compare()`方法。因此，`Student`对象现在会根据其\
  \ CGPA 进行比较和排序。\n\n关于`Comparable`和`Comparator`接口之间的区别，你已经学到了很多，总结在表 6-9 中。\n\n表\
  \ 6-9. 实现 Comparable 接口与 Comparator 接口的区别\n\n| Comparable 接口 | Comparator 接口 |\n\
  | --- | --- |\n| 当需要按对象的*自然顺序*进行比较时使用。 | 当需要按自定义的用户定义顺序（*非*自然顺序）进行比较时使用。 |\n| 无需为了实现`Comparable`接口而单独创建一个类。\
  \ | 需要为了实现`Comparator`接口而单独创建一个类。 |\n| 对于给定的类类型，只有该类（且仅限该类）实现`Comparable`接口。 | 可以有多个独立的类实现`Comparator`接口，每个类定义不同的对象比较方式。\
  \ |\n| `Comparable`接口中的方法声明为`int compareTo(ClassType type);`。 | `Comparator`接口中的方法声明为`int\
  \ compare(ClassType type1, ClassType type2);`。 |\n\n| ![image](img/pencil.jpg) |\
  \ 大多数类都有比较对象的自然顺序，因此在这些情况下请为你的类实现`Comparable`接口。如果你想按非自然顺序比较对象，或者你的类类型没有自然顺序，那么请创建实现`Comparator`接口的独立类。\
  \ |\n\n算法（Collections 类）\n\n你已经了解了集合框架的两个重要组成部分：抽象类/接口和具体类实现。集合框架还有一个名为`Collections`的工具类（注意类名中的后缀“s”）。它提供了对集合框架中的数据结构进行操作的实用算法。在本节中，你将看到一些重要的方法，如`sort()`、`binarySearch()`、`reverse()`、`shuffle()`等（请查看表\
  \ 6-10）。\n\n表 6-10. 重要算法（Collections 类中的静态方法）\n\n| 方法 | 简要描述 |\n| --- | --- |\n\
  | `int binarySearch(List<? extends Comparable<? super T>> list, T key)` | 在`List`中查找`key`。如果找到，返回一个>=0\
  \ 的值；否则返回一个负值。它有一个重载版本，也接受一个`Comparator`对象用于比较元素。 |\n| `void copy(List<? super T>\
  \ dest, List<? extends T> src)` | 将`src List`中的所有元素复制到`dest List`。 |\n| `void fill(List<?\
  \ super T> list, T obj)` | 用值`obj`填充整个`list`。 |\n| `T max(Collection<? extends T>\
  \ coll)` | 返回列表中的`max`元素。它有一个重载版本，也接受一个`Comparator`对象用于比较元素。 |\n| `T min(Collection<?\
  \ extends T> coll)` | 返回列表中的`min`元素。它有一个重载版本，也接受一个`Comparator`对象用于比较元素。 |\n| `boolean\
  \ replaceAll(List<T> list, T oldVal, T newVal)` | 将`list`中所有出现的`oldVal`替换为`newVal`。\
