  \n答案与解析\n\n1.    c)\n\ns1 和 s2 不相等\n\ns1 和 s3 相等\n\n\n\nJVM 设置了一个常量池，用于存储类型中使用的所有字符串常量。如果两个引用使用同一个常量声明，那么它们都指向同一个常量对象。`==`\
  \ 运算符检查的是对象本身的相似性（而非其中的值）。这里，第一次比较的是两个不同的对象，因此我们得到 `s1 and s2 not equal`。另一方面，由于\
  \ `s1` 和 `s3` 的引用指向同一个对象，我们得到 `s1 and s3 equal`。\n\n2.    c) [0, 0]\n\n构造函数内部的赋值语句\
  \ `x = x;` 重新赋值了传入的参数；它*并未*赋值 `Point2D` 中的成员变量 `x`。正确的赋值方式是 `this.x = x;`。字段 `y`\
  \ 未被赋值，因此其值保持为 0。\n\n3.    d) 执行时，该程序会打印\n\nk == j is true\n\nk.equals(j) is true\n\
  \n`Integer` 对象是不可变对象。如果某个值对应的 `Integer` 对象已经存在，则不会再次创建新对象。换句话说，Java 会共享不可变的 `Integer`\
  \ 对象，因此两个 `Integer` 对象在值相等时即相等（无论你是使用 `==` 运算符比较引用，还是使用 `equals()` 方法比较内容）。\n\n\
  4.    a) arr1 == arr2 is false\n\narr1.equals(arr2) is false\n\nArrays.equals(arr1,\
  \ arr2) is true\n\n两个数组对象之间的第一次比较使用了 `==` 运算符，它比较的是对象的相似性，因此返回 false。`equals()`\
  \ 方法比较的是当前数组对象与传入的数组对象，由于它继承自 `Object` 类，因此不会比较数组的值。所以我们再次得到 false。另一方面，`Arrays`\
  \ 类实现了多种 `equals()` 方法来比较不同类型的两个数组对象；因此最后一次调用返回 true。\n\n5.    d) 执行时，该程序会打印以下内容：str\
  \ is not Object。\n\n变量 `str` 已被声明但未实例化；因此 `instanceof` 运算符返回 false。\n\n6.     b)\
  \ Side Object Tail Side\n\n重载基于对象的静态类型（而重写和运行时解析则解析为对象的动态类型）。以下是对 `overload()` 方法调用的解析过程：\n\
  \n*   `overload(firstAttempt);` --> `firstAttempt` 的类型是 `Side`，因此解析为 `overload(Side)`。\n\
  *   `overload((Object)firstAttempt);` -> `firstAttempt` 被转换为 `Object` 类型，因此解析为 `overload(Object)`。\n\
  *   `overload(secondAttempt);` ->  `secondAttempt` 的类型是 `Tail`，因此解析为 `overload(Tail)`。\n\
  *   `overload((Side)secondAttempt);` -> `secondAttempt` 被转换为 `Side` 类型，因此解析为 `overload(Side)`。\n\
  \n7.    c) `foo(long)`\n\n对于整数字面量，JVM 按以下顺序进行匹配：`int`、`long`、`Integer`、`int...`。换句话说，它首先查找\
  \ `int` 类型的参数；如果未提供，则查找 `long` 类型；依此类推。这里，由于没有任何重载方法指定 `int` 类型参数，因此匹配到 `foo(long)`。\n\
  \n8.    b)\n\n`In Base.foo()`\n`In Derived.bar()`\n\n静态方法是静态解析的。在静态方法内部，调用了虚方法，该方法会动态解析。\n\
