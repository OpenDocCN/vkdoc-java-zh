  \n总结\n\n抽象类\n\n*   一种抽象，指定了支持的功能，但不披露更细粒度的细节。\n*   不能创建抽象类的实例。\n*   抽象类支持运行时多态，而运行时多态又支持松散耦合。\n\
  \n使用“final”关键字\n\n*   final 类是不可继承的类（即，不能从 final 类派生子类）。\n*   final 方法是不可重写的方法（即，子类不能重写\
  \ final 方法）。\n*   final 类的所有方法都隐式是 final 的（即，不可重写）。\n*   final 变量只能被赋值一次。\n\n使用“static”关键字\n\
  \n*   成员变量有两种类型：类变量和实例变量。所有需要类的实例（对象）才能访问的变量称为*实例变量*。所有在所有实例之间共享、与类关联而非与对象关联的变量称为*类变量*（使用\
  \ `static` 关键字声明）。\n*   所有静态成员不需要实例即可调用/访问。可以直接使用类名来调用/访问它们。\n*   静态成员只能调用/访问静态成员。\n\
  \n嵌套类的类型\n\n*   Java 支持四种类型的嵌套类：静态嵌套类、内部类、局部内部类和匿名内部类。\n*   静态嵌套类可以有静态成员，而其他类型的嵌套类则不能。\n\
  *   静态嵌套类和内部类可以访问外部类的成员（甚至是私有成员）。但是，静态嵌套类只能访问外部类的静态成员。\n*   局部类（包括局部内部类和匿名内部类）可以访问外部作用域（无论是方法、构造函数还是语句块）中声明的所有变量。\n\
  \n枚举\n\n*   枚举是实现用户受限输入的一种类型安全的方式。\n*   不能对枚举使用 new 关键字，即使在枚举定义内部也不行。\n*   枚举类默认是\
  \ final 类。\n*   所有枚举类都隐式派生自 `java.lang.Enum`。\n\n第 5 章\n\n![image](img/frontdot.jpg)\n\
  \n面向对象设计原则\n\n![9781430247647_unFig05-01.jpg](img/9781430247647_unFig05-01.jpg)\n\
  \n我们在第 3 章中介绍了面向对象编程基础，并在第 4 章中介绍了更高级的 OOP 主题。在本章中，我们将更深入地探讨 OOP 概念。\n\n本章首先深入探讨*接口*。我们将讨论接口与抽象类的区别，以及在特定情况下应使用哪种结构。在第二部分，我们将向您介绍*对象组合*原则，即“优先使用组合而非继承”。第三和第四部分将介绍\
  \ OOP 中最受欢迎的主题之一：*设计模式*。您将学习设计模式背后的基本概念，以及它们如何与 OOP 相关联。我们将重点介绍*单例*、*工厂*、*抽象工厂*和*数据访问对象*（DAO）设计模式。\n\
  \n接口\n\n通常，*接口*指的是两个实体（可以是人、系统、概念、机器等）之间的公共边界或互连。例如，计算机系统中的键盘提供了人与计算机之间的接口。像英语这样的自然语言是两个人之间的接口，允许他们交换观点。\n\
  \n在 Java 中，接口是一组定义协议（即行为契约）的抽象方法。实现接口的类必须实现接口中指定的方法。接口定义了一个协议，而实现该接口的类则遵守该协议。换句话说，接口通过定义一个抽象来向其客户端承诺特定的功能。所有实现该接口的类都为承诺的功能提供自己的实现。\n\
  \n让我们通过一个例子来阐明 Java 接口。考虑 `java.lang.Comparable` 接口，它指定了以下协议：\n\n```\npublic interface\
  \ Comparable{\n        public int compareTo(Object o);\n        // 意图是将此对象与指定对象进行比较\n\
  \        // 返回类型是整数。当此对象小于、等于或大于指定对象时，\n        // 分别返回负数、零或正数\n}\n```\n\n不相关的类可以在实现\
  \ `Comparable` 时提供自己的实现。这些不相关的类有一个共同点：它们都遵循 `Comparable` 给出的规范，并且由这些单独的类来实现 `compareTo()`\
  \ 方法。`java.util` 包中支持的数据结构实现了此接口。如果您想使用库中提供的通用算法，则必须实现此接口。例如，考虑 `java.util.Collections`\
  \ 中 `max()` 方法的示例实现。它用于查找集合中的最大元素。它使用了 `Comparable` 接口，并且集合中的元素必须为 `compareTo()`\
  \ 方法提供实现。\n\n算法（即接口的客户端）完全不知道 `compareTo()` 方法是如何实现的。但是客户端知道确保 `compareTo()` 方法可用的契约，因此客户端可以使用它。这带来了一个非常重要的优势：当一个方法将接口作为参数时，您可以传递任何实现该接口的对象（由于运行时多态）。\n\
  \n从概念上讲，类和接口是两种不同的结构，用于两种不同的目的。类结合了真实对象的状态和行为，而接口则指定了抽象实体的行为。\n\n声明和使用接口\n\n现在是时候为形状对象实现您自己的接口了。一些圆形对象（例如\
  \ `Circle` 和 `Ellipse`）可以*滚动*到给定的角度。您可以创建一个 `Rollable` 接口并声明一个名为 `roll()` 的方法，如下所示：\n\
  \n```\ninterface Rollable {\n        void roll(float degree);\n}\n```\n\n如您所见，您使用\
  \ `interface` 关键字定义了一个接口。您可以在该接口中声明方法；这里声明的是 `roll()` 方法。该方法接受一个参数：滚动的 `degree`（角度）。现在让我们为\
  \ `Circle` 实现 `Rollable` 接口。\n\n\n```\nclass Circle implements Rollable {\n    \
  \    public void roll(float degree) {\n        /* 在此实现滚动功能 */\n        }\n}\n```\n\
  \n你使用 `implements` 关键字来实现一个接口。请注意，类定义中的方法名、参数和返回类型必须与接口中给出的完全一致；如果不匹配，该类就不会被视为实现了该接口。\n\
  \n如果你在抽象类中实现接口，抽象类不需要定义该方法。\n\n```\ninterface Rollable {\n        void roll(float\
  \ degree);\n}\n\nabstract class CircularShape implements Rollable extends Shape\
  \ { }\n```\n\n在这个例子中，`CircularShape` 实现了 `Rollable` 接口并继承了 `Shape` 抽象类（正如你在第 3 章和第\
  \ 4 章中看到的）。现在，像 `Circle` 和 `Ellipse` 这样的具体类可以继承这个抽象类并定义 `roll()` 方法。\n\n你看到的 `Rollable`\
  \ 示例只有一个方法——`roll()`。然而，接口通常有多个方法。例如，`java.util` 将 `Iterable` 接口定义如下：\n\n```\npublic\
  \ interface Iterator<E> {\n        boolean hasNext();\n        E next();\n     \
  \   void remove();\n}\n```\n\n这个接口用于遍历集合。（不必担心 `Iterator<E>` 中的“`<E>`”。它指的是元素类型，属于*泛型*，我们将在下一章详细讨论）。它声明了三个方法：`hasNext()`、`next()`\
  \ 和 `remove()`。\n\n事实上，一个类可以同时实现多个接口——既可以直接实现，也可以通过其基类间接实现。例如，`Circle` 类还可以实现标准的\
  \ `Cloneable` 接口（用于创建 `Circle` 对象的副本）和 `Serializable` 接口（用于将对象存储在文件中以便稍后重新创建对象等），如下所示：\n\
  \n```\nclass Circle extends CircularShape implements Cloneable, Serializable {\n\
  \        /* 在此定义诸如 clone 等方法 */\n}\n```\n\n要点记忆\n\n以下是一些关于接口的关键规则，将有助于你通过 OCPJP\
  \ 7 考试：\n\n*   接口不能被实例化。\n*   接口可以继承另一个接口。使用 `extends`（而不是 `implements`）关键字来实现。\n\
  *   接口不能包含实例变量。如果你在接口中声明了一个数据成员，它必须被初始化，并且所有这些数据成员都被隐式视为“`public static final`”成员。\n\
  *   接口不能声明静态方法。它只能声明实例方法。\n*   你不能将成员声明为 `protected` *或* `private`。接口的成员只允许 `public`\
  \ 访问权限。\n*   接口中声明的所有方法都被隐式视为抽象的。如果你愿意，可以显式地为方法使用 `abstract` 限定符。\n*   你只能在接口中声明方法（而不能定义方法）。\n\
  *   接口可以声明为空体（即没有任何成员的接口。这样的接口被称为*标记接口*（或*标志接口*）。这类接口对于定义公共父类很有用，以便可以使用运行时多态性。例如，`java.util`\
  \ 定义了没有体的接口 `EventListner`。\n*   接口可以在另一个接口或类中声明；这样的接口被称为*嵌套接口*。\n*   与只能具有 public\
  \ 或 default 访问权限的顶级接口不同，嵌套接口可以声明为 public、protected 或 private。\n\n抽象类与接口\n\n抽象类和接口有很多共同点。例如，两者都可以声明所有派生类都应定义的方法。它们还有一个相似之处：你既不能创建抽象类的实例，也不能创建接口的实例。\n\
  \n那么，抽象类和接口之间有什么区别呢？表 5-1 列出了一些语法上的区别，表 5-2 列出了一些语义和用法上的区别。\n\n表 5-1 抽象类与接口：语法区别\n\
  \n|  | 抽象类 | 接口 |\n| --- | --- | --- |\n| 使用的关键字 | 使用 `abstract` 和 `class` 关键字来定义类。\
  \ | 使用 `interface` 关键字来定义接口。 |\n| 实现类使用的关键字 | 使用 `extends` 关键字继承抽象类。 | 使用 `implements`\
  \ 关键字实现接口。 |\n| 默认实现 | 抽象类可以提供方法的默认实现。 | 你不能在接口中定义方法；只能声明它们。 |\n| 字段 | 抽象类可以有静态和非静态字段。\
  \ | 接口中不能有任何字段（实例变量）。 |\n| 常量 | 抽象类可以有静态和非静态常量。 | 接口只能有静态常量。如果你声明了一个字段，它必须被初始化。所有字段都被隐式视为声明为\
  \ `public static` 和 `final`。 |\n| 构造方法 | 你可以在抽象类中定义构造方法（例如，这对于初始化字段很有用）。 | 你不能在接口中声明/定义构造方法。\
  \ |\n| 访问修饰符 | 你可以在抽象类中拥有 private 和 protected 成员。 | 你不能在接口中拥有任何 private 或 protected\
  \ 成员；所有成员默认都是 public 的。 |\n| 单继承与多继承 | 一个类只能继承一个类（可以是抽象类或具体类）。 | 一个类可以实现任意数量的接口。\
  \ |\n\n表 5-2 抽象类与接口：语义和用法区别\n\n|  | 抽象类 | 接口 |\n| --- | --- | --- |\n| is-a 关系与遵循协议\
  \ | 抽象基类提供了一个协议；此外，它在 is-a 关系中充当基类。 | 接口仅提供一个协议。它指定了实现它的类必须实现的功能。 |\n| 方法的默认实现 |\
  \ 抽象类可以提供方法的默认实现。因此，派生类可以直接使用该定义，无需再定义该方法。 | 接口只能声明方法。所有实现该接口的类都必须定义该方法。 |\n| 修改的难易程度\
  \ | 可以修改抽象类的实现。例如，你可以添加一个带有默认实现的方法，而现有的派生类不会出错。 | 如果已经有很多类实现了某个接口，你很难轻易更改该接口。例如，如果你声明了一个新方法，所有实现该接口的类将停止编译，因为它们没有定义该方法。\
  \ |\n\n在抽象类和接口之间做出选择\n\n现在让我们比较一下抽象类和接口。嗯，有趣……它们看起来非常相似，不是吗？你如何在它们之间做出选择？什么时候应该选择抽象类，什么时候应该选择接口？\n\
  \n*   如果你正在确定一个基类，该基类从一组相关类中抽象出通用功能，你应该使用抽象类。如果你要提供可以被甚至不相关的类实现的通用方法或协议，那么最好使用接口来实现。\n\
  *   如果你想捕捉类之间的相似性（即使是不相关的类），而不强制建立类关系，你应该使用接口。另一方面，如果类与新实体之间存在 is-a 关系，你应该将新实体声明为抽象类。\n\
  \n\n\n让我们来看一个在 FunPaint 应用中选择抽象类与接口的示例。你可以将 `Shape` 作为所有形状（如 `Circle`、`Square` 等）的抽象基类；这是一个“is-a”关系的例子。此外，通用的实现，例如父形状（如第\
  \ 4 章所述），可以放在 `Shape` 中。因此，在这种情况下，将 `Shape` 作为抽象类是最佳选择。\n\n在 FunPaint 中，用户可以对形状对象执行各种操作。例如，有些形状可以旋转，有些可以滚动。像\
  \ `Square` 这样的形状可以旋转，而像 `Circle` 这样的形状可以滚动。因此，在 `Shape` 抽象类中包含 `rotate()` 或 `roll()`\
  \ 方法是没有意义的。`rotate()` 或 `roll()` 的实现因具体形状而异，因此无法提供默认实现。在这种情况下，最好使用接口而不是抽象类。你可以创建\
  \ `Rotatable` 和 `Rollable` 接口，分别指定 `rotate()` 和 `roll()` 的协议，如代码清单 5-1 所示。\n\n代码清单\
  \ 5-1.  Shape.java\n\n```\n// Shape.java\n// Shape 是所有形状对象的基类；与父形状对象关联的形状对象\n//\
  \ 保存在 parentShape 字段中\npublic abstract class Shape {\n        abstract double area();\n\
  \        private Shape parentShape;\n        public void setParentShape(Shape shape)\
  \ {\n                parentShape = shape;\n        }\n        public Shape getParentShape()\
  \ {\n                return parentShape;\n        }\n}\n\n// Rollable.java\n// Rollable\
  \ 接口可由圆形形状（如 Circle 和 Ellipse）实现\npublic interface Rollable {\n        void roll(float\
  \ degree);\n}\n\n// Rotatable.java\n// Rotable 接口可由形状（如 Square、Rectangle 和 Rhombus）实现\n\
  public interface Rotatable {\n        void rotate(float degree);\n}\n\n// Circle.java\n\
  // Circle 是一个具体类，是 Shape 的子类型；它可以滚动，因此实现了 Rollable\npublic class Circle extends\
  \ Shape implements Rollable {\n        private int xPos, yPos, radius;\n       \
  \ public Circle(int x, int y, int r) {\n                xPos = x;\n            \
  \    yPos = y;\n                radius = r;\n        }\n        public double area()\
  \ { return Math. PI * radius * radius; }\n        @Override\n        public void\
  \ roll(float degree) {\n                // 在此实现滚动功能\n        }\n        public static\
  \ void main(String[] s) {\n                Circle circle = new Circle(10,10,20);\n\
  \                circle.roll(45);\n        }\n}\n\n// Rectangle.java\n// Rectangle\
  \ 是一个具体类，是 Shape 的子类型；它可以旋转，因此实现了 Rotatable\npublic class Rectangle extends Shape\
  \ implements Rotatable {\n        private int length, height;\n        public Rectangle(int\
  \ l, int h) {\n                length = l;\n                height = h;\n      \
  \  }\n        public double area() { return length * height; }\n        @Override\n\
  \        public void rotate(float degree) {\n                // 在此实现旋转功能\n     \
  \   }\n}\n```\n\n对象组合\n\n你已经学习了如何以具体类、抽象类和接口的形式定义抽象。单个抽象提供某些功能，这些功能需要与其他对象组合以表示更大的抽象：一个由其他更小对象组成的复合对象。你需要创建这样的复合对象来解决实际的编程问题。在这种情况下，复合对象与包含的对象共享“has-a”关系，其底层概念被称为*对象组合*。\n\
  \n打个比方，计算机是一个复合对象，包含 CPU、内存和硬盘等其他对象。换句话说，计算机对象与其他对象共享“has-a”关系。\n\n让我们回顾一下 FunPaint\
  \ 应用中定义 `Circle` 类的部分。类定义如下：\n\n```\npublic class Circle {\n        private int\
  \ xPos;\n                private int yPos;\n                private int radius;\n\
  \npublic Circle(int x, int y, int r) {\n                xPos = x;\n            \
  \            yPos = y;\n                        radius = r;\n                }\n\
  \                // 其他构造函数已省略 ...\n\npublic String toString() {\n              \
  \  return \"mid point = (\" + xPos + \",\" + yPos + \") and radius = \" + radius;\n\
  \        }\n        // 其他成员（如 area 方法）已省略\n}\n```\n\n在这个简单的实现中，你使用 `xPos` 和 `yPos`\
  \ 来定义 `Circle` 的中心。与其将这些变量定义为 `Circle` 类的成员，不如定义一个 `Point` 类，用于定义 `Circle` 的中心。请查看代码清单\
  \ 5-2 中 `Point class` 的定义。\n\n代码清单 5-2.  Circle.java\n\n```\n// Point 是一个独立的类，这里我们将其与\
  \ Circle 类一起使用\nclass Point {\n        private int xPos;\n        private int yPos;\n\
  \        public Point(int x, int y) {\n                xPos = x;\n             \
  \   yPos = y;\n        }\n        public String toString() {\n                return\
  \ \"(\" + xPos + \",\" + yPos + \")\";\n        }\n}\n\n// Circle.java\npublic class\
  \ Circle {\n        private Point center;   // Circle \"包含\" 一个 Point 对象\n     \
  \   private int radius;\n        public Circle(int x, int y, int r) {\n        \
  \        center = new Point(x, y);\n                radius = r;\n              \
  \  }\n        public String toString() {\n                return \"center = \" +\
  \ center + \" and radius = \" + radius;\n        }\n\npublic static void main(String\
  \ []s) {\n                System.out.println(new Circle(10, 10, 20));\n        }\n\
  \        // 其他成员（构造函数、area 方法等）已省略 ...\n}\n```\n\n这比拥有独立的整型成员 `xPos` 和 `yPos` 是更好的解决方案。为什么？因为你可以重用\
  \ `Point` 类提供的功能。注意 `Circle` 类中 `toString()` 方法的重写，它被简化了：\n\n```\npublic String\
  \ toString() {\n        return \"center = \" + center + \" and radius = \" + radius;\n\
  }\n```\n\n这里，变量 `center` 的使用会展开为 `center.toString()`。在这个例子中，`Circle` 拥有一个 `Point`\
  \ 对象。换句话说，`Circle` 和 `Point` 共享“has-a”关系；也就是说，`Circle` 是一个包含 `Point` 对象的复合对象。\n\n\
  组合 vs. 继承\n\n现在你已经掌握了组合以及继承（我们在第 4 章中详细讨论过）的知识。在某些情况下，很难在两者之间做出选择。重要的是要记住，没有银弹——你不能用一种结构解决所有问题。你需要仔细分析每种情况，并决定哪种结构最适合它。\n\
  \n一条经验法则是：对于组合使用“has-a”短语，对于继承使用“is-a”短语。例如：\n\n*   计算机 has-a CPU。\n*   圆形 is-a\
  \ 形状。\n*   圆形 has-a 点。\n*   笔记本电脑 is-a 计算机。\n*   向量 is-a 列表。\n\n这条规则有助于识别错误的关系。例如，“汽车\
  \ is-a 轮胎”的关系是完全错误的，这意味着你不能在 `Car` 类和 `Tire` 类之间建立继承关系。然而，“汽车 has-a 轮胎”（意味着汽车有一个或多个轮胎）的关系是正确的——你可以组合一个包含\
  \ `Tire` 对象的 `Car` 对象。\n\n| ![image](img/bulp.jpg) | 类继承意味着 is-a 关系，接口继承意味着 is-like-a\
  \ 关系，而组合意味着 has-a 关系。 |\n\n\n\n在实际场景中，关系的区分可能并不简单。你已经了解到可以创建一个基类，并将多个类的通用功能放入其中。然而，许多人忽略了悬停在此做法上的一个重大警示——始终检查派生类与基类之间是否存在“is-a”关系。如果“is-a”关系不成立，那么最好使用组合而非继承。\n\
  \n例如，考虑一组类——比如`DynamicDataSet`和`SnapShotDataSet`——它们需要一项通用功能——比如排序。现在，我们可以让这些数据集类从一个排序实现派生，如清单\
  \ 5-3 所示。\n\n清单 5-3.  Sorting.java\n\n```\nimport java.awt.List;\n\npublic class\
  \ Sorting {\n        public List sort(List list) {\n                // 排序实现\n  \
  \              return list;\n        }\n}\n\nclass DynamicDataSet extends Sorting\
  \ {\n        // DynamicDataSet 实现\n}\n\nclass SnapshotDataSet extends Sorting {\n\
  \        // SnapshotDataSet 实现\n}\n```\n\n你认为这是一个好的解决方案吗？不，这不是一个好的解决方案，原因如下：\n\n\
  *   经验法则在此不适用。`DynamicDataSet`并不是一种`Sorting`类型。如果在类设计中犯下此类错误，代价可能非常高昂——而且如果大量代码已经积累并错误地使用了继承关系，你可能无法在后期修复。例如，Java\
  \ 库中的`Stack`继承了`Vector`。然而，栈显然不是向量，这不仅会造成理解问题，还可能导致错误。当你创建 Java 库提供的`Stack`类对象时，你可以从容器中的任何位置添加或删除元素，因为基类是`Vector`，它允许你从向量中的任何位置进行删除。\n\
  *   如果这两种数据集类有一个真正的基类`DataSet`呢？在这种情况下，要么让`Sorting`成为`DataSet`的基类，要么将`Sorting`类放在`DataSet`和两种数据集类之间。这两种解决方案都是错误的。\n\
  *   还有另一个具有挑战性的问题：如果一个`DataSet`类想使用一种排序算法（比如归并排序），而另一个数据集类想使用不同的排序算法（比如快速排序），该怎么办？你会继承实现两种不同排序算法的两个类吗？首先，你不能直接继承多个类，因为\
  \ Java 不支持多重类继承。其次，即使你能够以某种方式继承两个不同的排序类（`MergeSort`继承`QuickSort`，`QuickSort`继承`DataSet`），那也将是更糟糕的设计。\n\
  \n在这种情况下，最好使用组合——换句话说，使用“has-a”关系而不是“is-a”关系。最终的代码如清单 5-4 所示。\n\n清单 5-4.  Sorting.java\n\
  \n```\nimport java.awt.List;\n\ninterface Sorting {\n        List sort(List list);\n\
  }\n\nclass MergeSort implements Sorting {\n        public List sort(List list) {\n\
  \                // 排序实现\n                return list;\n        }\n}\n\nclass QuickSort\
  \ implements Sorting {\n        public List sort(List list) {\n                //\
  \ 排序实现\n                return list;\n        }\n}\n\nclass DynamicDataSet {\n \
  \       Sorting sorting;\n        public DynamicDataSet() {\n                sorting\
  \ = new MergeSort();\n        }\n        // DynamicDataSet 实现\n}\n\nclass SnapshotDataSet\
  \ {\n        Sorting sorting;\n        public SnapshotDataSet() {\n            \
  \    sorting = new QuickSort();\n        }\n        // SnapshotDataSet 实现\n} \n\
  ```\n\n| ![image](img/banana.jpg) | 当子类特化基类时使用继承，以便利用动态多态性。在其他情况下，使用组合来获得易于更改且松散耦合的代码。总之，**优先使用组合而非继承。**\
  \ |\n\n要点记忆\n\n以下是你在参加 OCPJP 7 考试时应掌握的一些设计原则和术语细微差别：\n\n*   遵循“优先使用组合而非继承”的面向对象设计原则。组合鼓励你遵循另一个有用的面向对象设计原则：“针对接口编程，而非针对实现编程。”这第二条原则意味着，一个类的功能应仅依赖于另一个抽象的接口，而不依赖于该抽象的具体实现细节。换句话说，一个类的实现不应依赖于另一个类的内部实现细节。在合适的情况下，组合是首选技术。\n\
  *   在面向对象编程中，有许多与组合相关的术语，例如关联和聚合。*关联*是两个对象之间关系的最一般形式，而*组合*和*聚合*是关联的特殊形式。通常，术语*聚合*和*组合*可以互换使用。尽管这两个术语非常相似，但它们确实存在细微差别。在组合中，被包含对象和容器对象的生命周期相同，而在聚合中则并非如此。例如，计算机对象和\
  \ CPU 对象是组合关系，而图书馆对象和书籍对象是聚合关系。\n\n设计模式\n\n在面向对象的世界中，设计模式背后的概念已经非常成熟。作为一名面向对象编程语言的开发者以及\
  \ OCPJP 7 考试的考生，你必须了解设计模式及相关概念。\n\n编程中*设计模式*的字面含义是一种可重复的解决方案，适用于解决通用的设计问题。经验丰富的程序员和设计师从他们的经验中学习，并制定出针对频繁出现的设计问题的解决方案。设计模式捕捉并复用了经验丰富的软件设计师的经验。\n\
  \n| ![image](img/Note.jpg) | “设计模式是对通信对象和类的描述，这些对象和类经过定制，以在特定上下文中解决通用的设计问题。” ——《设计模式：可复用面向对象软件的基础》[旁注：这本\
  \ 1994 年的经典著作普及了设计模式。四位作者（Erich Gamma、Richard Helm、Ralph Johnson 和 John Vlissides）撰写了这本书，因此它被称为“四人组”（GoF）书籍。本章涵盖的模式大多是\
  \ GoF 模式。] |\n\n在深入探讨各种设计模式之前，需要澄清一点：设计模式是*设计解决方案*。它们不像库中的代码那样是现成的解决方案，可以随时取用并在编程时按需使用。相反，设计模式提供了模板解决方案，需要根据给定的上下文进行微调。\n\
  \n让我们考虑一个设计模式的例子，以初步了解设计模式的重要性和可用性。在 FunPaint 应用程序中，假设一个类（比如`ShapeArchiver`）负责归档所有已绘制形状的信息。同样，另一个类（比如`Canvas`）负责显示所有已绘制的形状。每当形状发生任何变化时，你需要将变化的信息通知这两个类。那么，你希望如何实现这种通知呢？清单\
  \ 5-5 展示了一种可能的实现。\n\n清单 5-5.  Test.java\n\n\n\n```\n// Circle.java\n// 每当 Circle\
  \ 类发生“变化”时，它会通过调用 Canvas 和 ShapeArchiver 这两个类的 update 方法，“通知”它们。\npublic class Circle\
  \ {\n        private Point center;\n        public void setCenter(Point center)\
  \ {\n                this.center = center;\n                canvas.update(this);\n\
  \                shapeArchiver.update(this);\n        }\n        public void setRadius(int\
  \ radius) {\n                this.radius = radius;\n                canvas.update(this);\n\
  \                shapeArchiver.update(this);\n        }\n        private ShapeArchiver\
  \ shapeArchiver;\n        public void setShapeArchiver(ShapeArchiver shapeArchiver)\
  \ {\n                this.ShapeArchiver = shapeArchiver;\n        }\n        protected\
  \ Canvas canvas;\n        public void setCanvas(Canvas canvas) {\n             \
  \   this.canvas = canvas;\n        }\n        private int radius;\n        public\
  \ Circle(int x, int y, int r) {\n                center = new Point(x, y);\n   \
  \             radius = r;\n        }\n        public String toString() {\n     \
  \           return \"center = \" + center + \" and radius = \" + radius;\n     \
  \   }\n}\n\n// Point.java\nclass Point {\n        private int xPos;\n        private\
  \ int yPos;\n        public Point(int x, int y) {\n                xPos = x;\n \
  \               yPos = y;\n        }\n        public String toString() {\n     \
  \           return \"(\" + xPos + \",\" + yPos + \")\";\n        }\n}\n\n// ShapeArchiver.java\n\
  public class ShapeArchiver {\n        public void update(Circle circle) {\n    \
  \            System.out.println(\"ShapeArchiver::update\");\n                //\
  \ 更新实现\n        }\n}\n\n// Canvas.java\npublic class Canvas {\n        public void\
  \ update(Circle circle) {\n                System.out.println(\"Canvas::update\"\
  );\n                // 更新实现\n        }\n}\n\n// Test.java\npublic class Test {\n\
  \        public static void main(String []s) {\n                Circle circle =\
  \ new Circle(10, 10, 20);\n                System.out.println(circle);\n       \
  \         circle.setCanvas(new Canvas());\n                circle.setShapeArchiver(new\
  \ ShapeArchiver());\n                circle.setRadius(50);\n                System.out.println(circle);\n\
  \        }\n}\n```\n\n该程序输出如下：\n\n```\ncenter = (10,10) and radius = 20\nCanvas::update\n\
  ShapeArchiver::update\ncenter = (10,10) and radius = 50\n```\n\n嗯，这个实现确实按预期工作了——但有一个问题。主题（`Circle`\
  \ 类）与两个观察者（`ShapeArchiver` 和 `Canvas`）之间存在紧密耦合。以下是紧耦合设计带来的后果：\n\n*   主题类（`Circle`）知道具体的观察者类。因此，如果你更改了观察者类，你也需要更改主题类。（嗯，这不太好。）\n\
  *   如果你想添加或移除一个观察者，你无法在不修改主题的情况下做到这一点。\n*   你无法独立地复用主题类或观察者类。\n\n好吧，之前的实现存在一些问题。有没有办法消除这些问题呢？请查看清单\
  \ 5-6 中的新实现。\n\n清单 5-6.  Test.java\n\n```\n// Circle.java\nimport java.util.Observable;\n\
  \npublic class Circle extends Observable {\n        private Point center;\n    \
  \    public void setCenter(Point center) {\n                this.center = center;\n\
  \                setChanged();\n                notifyObservers();\n        }\n\
  \        public void setRadius(int radius) {\n                this.radius = radius;\n\
  \                setChanged();\n                notifyObservers();\n        }\n\
  \        private int radius;\n        public Circle(int x, int y, int r) {\n   \
  \             center = new Point(x, y);\n                radius = r;\n        }\n\
  \        public String toString() {\n                return \"center = \" + center\
  \ + \" and radius = \" + radius;\n        }\n}\n\n// Point.java\nclass Point {\n\
  \        private int xPos;\n        private int yPos;\n        public Point(int\
  \ x, int y) {\n                xPos = x;\n                yPos = y;\n        }\n\
  \        public String toString() {\n                return \"(\" + xPos + \",\"\
  \ + yPos + \")\";\n        }\n}\n\n// Canvas.java\nimport java.util.Observable;\n\
  import java.util.Observer;\n\npublic class Canvas implements Observer {\n      \
  \  @Override\n        public void update(Observable arg0, Object arg1) {\n     \
  \           System.out.println(\"Canvas::update\");\n                // 实际的更新代码已省略……\n\
  \        }\n}\n\n// ShapeArchiver.java\nimport java.util.Observable;\nimport java.util.Observer;\n\
  \npublic class ShapeArchiver implements Observer{\n        @Override\n        public\
  \ void update(Observable arg0, Object arg1) {\n                System.out.println(\"\
  ShapeArchiver::update\");\n                // 实际的更新代码已省略……\n        }\n}\n\n// Test.java\n\
  public class Test {\n        public static void main(String []s) {\n           \
  \     Circle circle = new Circle(10, 10, 20);\n                System. out .println(circle);\n\
  \                circle.addObserver(new Canvas());\n                circle.addObserver(new\
  \ ShapeArchiver());\n                circle.setRadius(50);\n                System.\
  \ out .println(circle);\n        }\n}\n```\n\n该程序输出如下：\n\n```\ncenter = (10,10)\
  \ and radius = 20\nShapeArchiver::update\nCanvas::update\ncenter = (10,10) and radius\
  \ = 50\n```\n\n嗯，输出结果与之前的版本相同。你取得了什么更好的成果吗？是的，你做到了。这个新实现是一个*松耦合*的实现。主题——`Circle`\
  \ 类——不知道具体的观察者类，而观察者也不知道具体的主题。因此，主题和观察者现在都可以独立使用和独立更改。此外，你可以在不修改主题类的情况下，向主题添加或从中移除观察者。\n\
  \n这个例子是 `Observer` 设计模式的一个实现。当你有一个主题需要被多个观察者监控时，这种设计模式非常有用。每当主题发生变化时，这些观察者都需要得到通知。`Observer`\
  \ 设计模式在主题和观察者之间创建了松耦合。\n\nJava 支持一个名为 `Observable` 的抽象类和一个名为 `Observer` 的接口（两者都在\
  \ `java.util` 包中提供），用于实现 `Observer` 设计模式。`Circle` 类继承自 `Observable`，这标志着 `Circle`\
  \ 类是一个主题。`Canvas` 和 `ShapeArchiver` 类实现了 `Observer` 接口，因此也实现了 `update()` 方法。每当主题的状态发生变化时，你调用\
  \ `setChanged()` 方法，然后调用 `notifyObservers()` **，** 后者是在 `Observable` 类中实现的。`notifyObservers()`\
  \ 方法会调用之前为该主题注册的所有观察者。\n\n我们希望这个例子能让你对设计模式有一个很好的理解。在本章的其余部分，我们将详细探讨更多重要的设计模式。\n\n\
  设计模式的类型\n\n广义上讲，GoF 设计模式可以分为以下三类：\n\n*   **创建型模式** 提供了灵活性，可以决定谁负责创建对象、如何创建对象、创建哪个对象以及何时进行创建。本质上，创建型模式为对象实例化提供了一种抽象。\n\
  \n示例：单例模式、工厂模式、抽象工厂模式和原型模式。\n\n*   **结构型模式** 侧重于如何将相关的类（和对象）组合在一起，以形成更大的结构。\n\n\
  示例：组合模式、装饰器模式、代理模式和外观模式。\n\n*   **行为型模式** 定义了对象之间的通信，并控制参与对象之间的流程。\n\n示例：中介者模式、责任链模式、观察者模式、状态模式和策略模式。\n\
  \n单例设计模式\n\n\n\n在许多情况下，你需要确保某个特定类只有一个实例存在。例如，假设你定义了一个修改注册表的类，或者实现了一个管理打印机后台处理的类，又或者实现了一个线程池管理器类。在所有这些情况下，你可能都希望通过仅实例化此类的一个对象来避免难以发现的错误。在这些情况下，你可以采用*单例设计模式*。\n\
  \n单例设计模式旨在确保只创建该类的一个实例。该模式的实现提供了对该类的单一访问点。这是一种*创建型设计模式*，意味着它控制对象的实例化。在 Java SDK\
  \ 中，该模式被用于许多地方，例如 `java.lang.Runtime`。\n\n图 5-1 展示了单例模式的类图。它包含一个单一的类，即你想要设为单例的那个类。它有一个私有构造函数和一个用于获取单例对象的静态方法。\n\
  \n![9781430247647_Fig05-01.jpg](img/9781430247647_Fig05-01.jpg)\n\n图 5-1.  单例设计模式的\
  \ UML 类图\n\n| ![image](img/bulp.jpg) | 单例设计模式提供两样东西：该类唯一的一个实例，以及一个全局的单一访问点来访问该对象。\
  \ |\n\n假设 FunPaint 应用程序需要一个日志记录器，你希望将其实现为单例。代码清单 5-7 展示了一种可能的实现。\n\n代码清单 5-7.  Logger.java\n\
  \n```\n// Logger 类必须在应用程序中只实例化一次；这是为了确保\n// 整个应用程序都使用同一个 Logger 实例\npublic class\
  \ Logger {\n        // 将构造函数声明为私有，以防止客户端\n        // 直接实例化此类的对象\n        private\
  \ Logger() {      }\n        public static Logger myInstance;        // 默认情况下，此字段初始化为\
  \ null\n        // 供客户端用于获取 Logger 类实例的静态方法\n        public static Logger getInstance()\
  \ {\n                if(myInstance == null) {\n                        // 这是第一次调用此方法，因此\
  \ myInstance 为 null\n                        myInstance = new Logger();\n      \
  \          }\n                // 每次调用 getInstance 时都返回同一个对象引用\n                return\
  \ myInstance;\n        }\n        public void log(String s) {\n                //\
  \ log 的简单实现，将待记录的字符串输出到控制台\n                System.err.println(s);\n        }\n\
  }\n```\n\n看看 `Logger` 类的单例实现。该类的构造函数被声明为私有，因此你不能简单地使用 `new` 运算符创建 `Logger` 类的新实例。获取此类实例的唯一方法是通过\
  \ `getInstance()` 方法调用该类的静态成员方法。此方法检查 `Logger` 对象是否已存在。如果不存在，则创建一个 `Logger` 实例并将其赋值给静态成员变量。这样，无论何时调用\
  \ `getInstance()` 方法，它都将始终返回 `Logger` 类的同一个对象。\n\n| ![image](img/Note.jpg) | 代码清单\
  \ 5-7 使用了延迟初始化。如果你的单例构造函数计算开销不大，你可以采用提前初始化。 |\n\n确保你的单例确实是单例\n\n你可能在想我们在说什么，但确保你的单例模式实现只允许该类的一个实例，这确实非常重要（也非常困难）。\n\
  \n例如，代码清单 5-7 中提供的实现仅在应用程序是单线程的情况下有效。在多线程的情况下，尝试获取单例对象可能会导致创建多个对象，这当然违背了实现单例的目的。\n\
  \n代码清单 5-8 展示了在多线程环境中实现单例设计模式的 `Logger` 类版本。\n\n代码清单 5-8.  Logger.java\n\n```\n\
  public class Logger {\n        private Logger() {\n                // 私有构造函数以防止直接实例化\n\
  \        }\n        public static Logger myInstance;\n        public static synchronized\
  \ Logger getInstance() {\n                if(myInstance == null)\n             \
  \           myInstance = new Logger();\n                return myInstance;\n   \
  \     }\n        public void log(String s){\n                // log 实现\n       \
  \         System.err.println(s);\n        }\n}\n```\n\n注意此实现中关键字 `synchronized`\
  \ 的使用。这个关键字是一种 Java 并发机制，用于一次只允许一个线程进入同步作用域。你将在第 13 章中了解更多关于此关键字的内容。\n\n因此，你将整个方法设为同步，以便一次只能有一个线程访问它。这使其成为一个正确的解决方案，但存在一个问题：性能不佳。你只想在第一次调用该方法时使其同步，但由于你将整个方法声明为同步，所有后续对该方法的调用都使其成为性能瓶颈。\n\
  \n好吧，那如果只同步 `new` 语句呢？参见代码清单 5-9。\n\n代码清单 5-9.  Logger.java\n\n```\npublic class\
  \ Logger {\n        private Logger() {\n                // 私有构造函数\n        }\n \
  \       public static Logger myInstance;\n        public static Logger getInstance()\
  \ {\n                if(myInstance == null) {\n                        synchronized\
  \ (Logger.class) {\n                                myInstance = new Logger();\n\
  \                        }\n                }\n                return myInstance;\n\
  \        }\n        public void log(String s) {\n                // log 实现\n   \
  \             System.err.println(s);\n        }\n}\n```\n\n尝试得不错，但这个解决方案也行不通。同步并不能防止意外创建两个单例对象。现在，实现著名的*双重检查锁定*（参见代码清单\
  \ 5-10）。\n\n代码清单 5-10.  Logger.java\n\n```\npublic class Logger {\n        private\
  \ Logger() {\n                // 私有构造函数\n        }\n        public static Logger\
  \ myInstance;\n        public static Logger getInstance() {\n                if(myInstance\
  \ == null) {\n                        synchronized (Logger.class) {\n          \
  \                      if(myInstance == null) {\n                              \
  \          myInstance = new Logger();\n                                }\n     \
  \                   }\n                }\n                return myInstance;\n \
  \       }\n        public void log(String s) {\n                // log 实现\n    \
  \            System.err.println(s);\n        }\n}\n```\n\n嗯，这个实现对于多线程应用程序来说也不是一个万无一失的解决方案。由于\
  \ Java 内存模型允许错误的乱序写入，它会产生一个问题。尽管据报道该内存模型问题在 Java 5 中已修复，但我们不鼓励你使用此解决方案。\n\n\n\n\
  清单 5-11 展示了基于“初始化需求占位符”惯用法的 `Logger` 类的另一种实现。该惯用法使用了内部类，且未使用任何同步结构（回顾第 4 章中关于内部类的讨论）。它利用了内部类在被引用之前不会被加载这一特性。\n\
  \n清单 5-11.  Logger.java\n\n```\npublic class Logger {\n        private Logger()\
  \ {\n                // private constructor\n        }\n        public static Logger\
  \ myInstance;\n        public static class LoggerHolder {\n                public\
  \ static Logger logger = new Logger();\n        }\n        public static Logger\
  \ getInstance() {\n                return LoggerHolder.logger;\n        }\n    \
  \    public void log(String s) {\n                // log implementation\n      \
  \          System.err.println(s);\n        }\n}\n```\n\n嗯……你终于找到了一个高效可行的解决方案。然而，在结束单例设计模式的讨论之前，有两点临别忠告。第一，在适当的地方使用单例模式，但不要过度使用。第二，确保你的单例实现保证了只创建一个实例，即使你的代码是多线程的。\n\
  \n工厂设计模式\n\n在现实生活中，工厂是生产同一产品的多个实例（或产品的不同变体）的制造单元。例如，汽车工厂生产特定类型和型号的汽车。工厂的主要职责是持续生产所需类型和型号的汽车。这里需要注意的一点是，同一款汽车可能有不同的变体，汽车工厂应该能够按需生产同一款汽车所需的不同变体。\n\
  \n类似地，在面向对象编程中，你可以实现一个工厂，按需返回所需类型的对象。在这种情况下，工厂决定实例化哪个（些）类来创建所需的对象，以及具体如何创建它们。\n\n\
  图 5-2 展示了工厂模式的 UML 类图。`Client` 调用 `ProductFactory` 从产品层次结构中获取合适的对象。`ProductFactory`\
  \ 根据提供的信息，从 `Product` 层次结构中创建其中一个 `Products`。`Client` 使用产品对象，而无需知道它实际使用的是哪个产品，也无需知道\
  \ `ProductFactory` 是如何创建这个产品对象的。\n\n![9781430247647_Fig05-02.jpg](img/9781430247647_Fig05-02.jpg)\n\
  \n图 5-2.  工厂设计模式的 UML 类图\n\n让我们考虑一个例子。在 FunPaint 应用程序中，有不同类型的形状，例如 `Circle` 和 `Rectangle`。现在，`Canvas`\
  \ 对象可能不想知道具体创建的是哪个具体形状。假设 `Canvas` 对象从前端接收一个形状标识符，需要根据该标识符创建相应的形状对象。这里，你可以有一个 `ShapeFactory`，它可以创建所需的形状对象并将其返回给\
  \ `Canvas` 对象。清单 5-12 展示了此模式的实现。\n\n清单 5-12.  Test.java\n\n```\n// Shape.java\n\
  public interface Shape {\n        public void draw();\n        public void fillColor();\n\
  }\n\n// Circle.java\npublic class Circle implements Shape {\n        private int\
  \ xPos, yPos;\n        private int radius;\n        public Circle(int x, int y,\
  \ int r) {\n                xPos = x;\n                yPos = y;\n             \
  \           radius = r;\n                        System.out.println(\"Circle constructor\"\
  );\n        }\n        @Override\n        public void draw() {\n               \
  \ System.out.println(\"Circle draw()\");\n                // draw() implementation\n\
  \        }\n        @Override\n        public void fillColor() {\n             \
  \   // fillColor() implementation\n        }\n}\n\n// Rectangle.java\npublic class\
  \ Rectangle implements Shape {\n        public Rectangle(int length, int height)\
  \ {\n                this.length = length;\n                this.height = height;\n\
  \                System.out.println(\"Rectangle constructor\");\n        }\n   \
  \     private int length, height;\n        @Override\n        public void draw()\
  \ {\n                System.out.println(\"Rectangle draw()\");\n               \
  \ // draw() implementation\n        }\n        @Override\n        public void fillColor()\
  \ {\n                // fillColor() implementation\n        }\n}\n\n// ShapeFactory.java\n\
  public class ShapeFactory {\n         public static Shape getShape(String sourceType)\
  \ {\n                switch(sourceType) {\n                case \"Circle\":\n  \
  \                      return new Circle(10, 10, 20);\n                case \"Rectangle\"\
  :\n                        return new Rectangle(10, 20);\n                }\n  \
  \              return null;\n        }\n}\n\n// Canvas.java\nimport java.util.ArrayList;\n\
  import java.util.Iterator;\n\npublic class Canvas {\n        private ArrayList<Shape>\
  \ shapeList = new ArrayList<Shape>();\n        public void addNewShape(String shapeType)\
  \ {\n                Shape shape = ShapeFactory.getShape(shapeType);\n         \
  \       shapeList.add(shape);\n        }\n        public void redraw() {\n     \
  \           Iterator<Shape> itr = shapeList.iterator();\n                while(itr.hasNext())\
  \ {\n                        Shape shape = itr.next();\n                       \
  \ shape.draw();\n                }\n        }\n}\n\n// Test.java\npublic class Test\
  \ {\n        public static void main(String[] args) {\n                Canvas canvas\
  \ = new Canvas();\n                canvas.addNewShape(\"Circle\");\n           \
  \     canvas.addNewShape(\"Rectangle\");\n                canvas.redraw();\n   \
  \     }\n}\n```\n\n它会打印以下内容：\n\n```\nCircle constructor\nRectangle constructor\n\
  Circle draw()\nRectangle draw()\n```\n\n让我们分析一下这个实现。你定义了一个 `Shape` 接口，它定义了两个公共方法：`draw()`\
  \ 和 `fillColor()`。`Circle` 和 `Rectangle` 类实现了这个接口，并提供了接口方法的实现。`Canvas` 类维护了一个画布上绘制的形状列表，并提供了一个\
  \ `addNewShape()` 方法，允许应用程序的前端创建所请求形状的新实例。在 `main()` 方法中，你调用了 `Canvas` 类的 `addnewShape()`\
  \ 方法。该方法进而调用 `ShapeFactory` 类的 `getShape()` 方法。`getShape()` 方法检查请求的形状类型，根据请求的类型创建一个新实例，并将其返回给\
  \ `Canvas`。\n\n从上述示例中可以得出以下见解：\n\n*   `Canvas` 类不需要知道如何创建具体的形状对象。当具体对象的创建代价高昂且复杂时，这种透明性变得非常有用。\n\
  *   `Canvas` 类不需要知道确切的具体形状类型。你可以从 `Canvas` 的实现中观察到，`Canvas` 只知道 `Shape` 接口。因此，如果你添加另一个具体形状（例如\
  \ `Square`），则无需更改 `Canvas` 的实现。\n\nJava SDK 定义了许多这样的工厂。例如，`java.util.Calendar` 就是工厂设计模式的一个实现。清单\
  \ 5-13 使用了 `Calendar` 类。\n\n清单 5-13.  mainClass.java\n\n```\nimport java.util.Calendar;\n\
  \npublic class MainClass {\n        public static void main(String[] args) {\n \
  \               Calendar calendar = Calendar.getInstance();\n                System.out.println(calendar);\n\
  \        }\n}\n```\n\n该程序会打印以下内容：\n\n```\njava.util.GregorianCalendar [...]\n```\n\
  \n清单 5-13 的输出包含了日历对象的所有字段（此处用 […] 表示以节省空间）。Java SDK 中还有许多其他使用工厂模式的例子，包括以下这些：\n\n\
  \n\n*   `java.sql.Connection` 接口的 `createStatement()` 方法，用于创建一个新的 `Statement` 对象与数据库通信。\n\
  *   `java.rmi.server.RmiClientSocketFactory` 接口的 `createSocket()` 方法，用于返回一个新的客户端\
  \ `Socket`。\n\n工厂模式与抽象工厂模式的区别\n\n*工厂设计模式*和*抽象工厂设计模式*都属于*创建型设计模式*范畴。如前文所述，工厂设计模式按需创建（或制造）所请求类型的对象。相比之下，抽象工厂本质上是工厂的工厂。换句话说，抽象工厂设计模式引入了另一层间接性来创建指定对象。抽象工厂设计模式的客户端首先从抽象工厂对象请求一个合适的工厂，然后从该工厂对象请求一个合适的对象。\n\
  \n这两种模式的另一个重要区别在于它们的适用性：当只需要创建一种类型的对象时，可以使用工厂设计模式；当需要创建一系列（家族）对象时，可以使用抽象工厂设计模式。\n\
  \n让我们通过其类图（图 5-3）来探索抽象工厂模式。假设有两个产品层级结构，`ProductA` 和 `ProductB`，以及它们的具体产品类。你想要创建\
  \ `ConcreteProductA1` 和 `ConcreteProductB1`（作为一组），或者 `ConcreteProductA2` 和 `ConcreteProductB2`。在这种情况下，你定义一个抽象的\
  \ `ProductFactory`，它有两个子类：`ProductFactory1` 和 `ProductFactory2`。`ProductFactory1`\
  \ 创建 `ConcreteProductA1` 和 `ConcreteProductB1`，而 `ProductFactory2` 创建 `ConcreteProductA2`\
  \ 和 `ConcreteProductB2`。因此，根据需求，你创建一个所需的工厂对象；选定的工厂对象会提供你所需的具体产品对象。\n\n![9781430247647_Fig05-03.jpg](img/9781430247647_Fig05-03.jpg)\n\
  \n图 5-3. 抽象工厂设计模式的 UML 类图\n\n现在我们来做一个示例。在清单 5-12 中，你已经实现了工厂设计模式。现在，假设形状可以分为两种类型：`DisplayFriendly`（显示友好型）和\
  \ `PrinterFriendly`（打印友好型）。因此，现在你的 `Circle` 类（以及 `Rectangle` 类，*作相应修改后*）有两种风格可用：`DisplayFriendlyCircle`\
  \ 和 `PrinterFriendlyCircle`。显然，你现在只想创建一种类型的对象：要么是显示友好型，要么是打印友好型。好了，你已经确定，当需要创建一系列对象时，应该使用抽象工厂设计模式。清单\
  \ 5-14 展示了实现代码。\n\n清单 5-14. Test.java\n\n```\n// Shape.java\npublic interface Shape\
  \ {\n        public void draw();\n}\n\n// PrinterFriendlyShape.java\npublic interface\
  \ PrinterFriendlyShape extends Shape {\n}\n\n// DisplayFriendlyShape.java\npublic\
  \ interface DisplayFriendlyShape extends Shape {\n}\n\n// DisplayFriendlyCircle.java\n\
  public class DisplayFriendlyCircle implements DisplayFriendlyShape {\nprivate int\
  \ xPos, yPos;\n        private int radius;\n        public DisplayFriendlyCircle(int\
  \ x, int y, int r) {\n                xPos = x;\n                yPos = y;\n   \
  \             radius = r;\n                System.out.println(\"DisplayFriendlyCircle\
  \ constructor\");\n        }\n        @Override\n        public void draw() {\n\
  \                System.out.println(\"DisplayFriendlyCircle draw()\");\n       \
  \         // draw() implementation\n        }\n}\n\n// DisplayFriendlyRectangle.java\n\
  public class DisplayFriendlyRectangle implements DisplayFriendlyShape {\n      \
