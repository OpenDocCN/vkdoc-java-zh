  \nc) 当一个对象被序列化时，声明为 `transient` 的类成员将不会被序列化（因此它们在反序列化后会丢失其值）。\n\nd) `Externalizable`\
  \ 接口是一个标记接口；换句话说，它是一个不声明任何方法的空接口。\n\ne) 如果你尝试序列化或持久化一个未实现 `Externalizable` 接口的对象，你将得到一个\
  \ `NotExternalizableException`。\n\n30.  **考虑以下程序：**\n\n```\n    import java.util.*;\n\
