  \nArrays 类\n\n与 `Collections` 类似，`Arrays` 也是一个工具类（即该类只有静态方法）。`Collections` 中的方法也与\
  \ `Arrays` 中的方法非常相似。`Collections` 类用于容器类；`Arrays` 类用于原生数组（即使用 [] 语法的数组）。\n\nArrays\
  \ 类中的方法\n\n清单 6-26 是一个简单的示例，用于说明为什么 `Arrays` 类在处理原生数组时非常有用。你能说出这个程序打印了什么吗？\n\n清单\
  \ 6-26.  PrintArray.java\n\n```\n// 这段代码实现了一个简单的整数数组\n\nclass PrintArray {\n   \
  \     public static void main(String []args) {\n                int [] intArray\
  \ = {1, 2, 3, 4, 5};\n                System.out.println(\"数组内容是：     \" + intArray);\n\
  \        }\n}\n```\n\n它输出以下内容：\n\n```\n数组内容是：     [I@3e25a5\n```\n\n哪里出了问题？`println()`\
  \ 隐式调用了原生 `int[]` 数组的 `toString()` 方法。原生数组不是类，尽管它们继承了 `Object` 类，因此无法重写像 `toString()`\
  \ 这样的方法。（请记住，重写只能在类中进行。）换句话说，调用了 `intArray.toString()`，其中 `toString()` 方法是从 `Object`\
  \ 继承的。那么，如何打印原生数组的内容呢？\n\n幸运的是，你有 `Arrays` 工具类，它包含像 `toString()` 这样的方法。清单 6-27 是打印原生数组内容的正确程序。\n\
  \n清单 6-27.  PrintArray2.java\n\n```\n// 这个程序演示了 Arrays 类的用法\n\nimport java.util.*;\n\
  \nclass PrintArray {\n        public static void main(String []args) {\n       \
  \         int [] intArray = {1, 2, 3, 4, 5};\n                System.out.println(\"\
  数组内容是：  \" + Arrays.toString(intArray));\n        }\n}\n```\n\n现在输出符合预期：\n\n```\n\
  数组内容是：  [1, 2, 3, 4, 5]\n```\n\n使用 `Arrays.toString()` 方法打印数组的内容，而不是使用 Object 的\
  \ toString() 方法！如你所见，`Arrays` 类中的方法非常方便。现在，你将了解像 `sort()`、`binarySearch()` 等方法。表\
  \ 6-11 列出了 `Arrays` 类中的重要方法。\n\n表 6-11. Arrays 类中的重要（静态）方法\n\n| 方法 | 描述 |\n| ---\
  \ | --- |\n| List<T> asList(T . . . a) | 从给定数组创建一个固定大小的 `List`。 |\n| int binarySearch(Object[]\
  \ objArray, Object key) | 在 `objArray` 中搜索 `key`。如果找到，返回一个 >= 0 的 int 值（`key` 的索引）；否则返回一个负值。提供针对原始类型（如\
  \ `int[]`、`byte[]` 等）的重载。还提供接受 `Comparator` 对象的重载。 |\n| boolean equals(Object[]\
  \ objArray1, Object[] objArray2) | 检查 `objArray1` 和 `objArray2` 的内容是否相等。提供针对原始类型数组（如\
  \ `int[]`、`byte[]` 等）的重载。 |\n| void fill(Object[] objArray, Object val) | 用值 `val`\
  \ 填充 `objArray`。提供针对原始类型数组（如 `int[]`、`byte[]` 等）的重载。 |\n| void sort(Object[] objArray)\
  \ | 基于自然顺序（即使用 `compareTo()` 方法）对 `objArray` 进行排序。提供针对原始类型数组（如 `int[]`、`byte[]`\
  \ 等）的重载。还提供接受 `Comparator` 对象的重载。 |\n| String toString(Object[] a) | 返回给定 `objArray`\
  \ 的 `String` 表示形式。提供针对原始类型数组（如 `int[]`、`byte[]` 等）的重载。 |\n\n`Arrays.sort(Object\
  \ [])` 调用 `compareTo()` 方法来比较元素。因此，传递给 sort 的数组元素必须实现 `Comparable` 接口。`sort` 方法针对原始类型（如\
  \ `byte[]`、`int[]` 等）进行了重载。对于元素，排序按数值升序进行。清单 6-28 对 `String` 数组和 `int` 数组调用了 `sort()`\
  \ 方法。\n\n清单 6-28.  CollectionsTest.java\n\n```\n// 它演示了数组的排序\nclass CollectionsTest\
  \ {\n        public static void  main(String []args) {\n                String []\
  \ strArr = { \"21\", \"1\", \"111\", \"12\", \"123\" };\n                Arrays.sort(strArr);\n\
  \                System.out.println(Arrays.toString(strArr));\n\nint [] intArr =\
  \ { 21, 1, 111, 12, 123 };\n                Arrays.sort(intArr);\n             \
  \   System.out.println(Arrays.toString(intArr));\n        }\n}\n```\n\n它输出以下内容：\n\
  \n```\n[1, 111, 12, 123, 21]\n[1, 12, 21, 111, 123]\n```\n\n数组的内容看起来相似，但输出却不同。为什么？这显示了字符串和原始类型排序的差异。`String`\
  \ 的 `compareTo()` 方法执行*字典序比较*——字符串内容逐字符进行比较。例如，如果你有像“john”、“johannes”、“johann”、“johnny”这样的字符串，这是有意义的。然而，对于数字，你需要比较数值。因此，对于字符串，在“1”之后是“111”，然后是“12”，依此类推；而对于整数，则是\
  \ 1、12、21，依此类推。\n\n\n\n| ![image](img/Note.jpg) | 请注意使用 `sort()` 方法时值的比较方式。例如，整数采用数值比较，而字符串采用字典序比较。\
  \ |\n\n你已经尝试过排序了。现在你将尝试在数组中搜索值。清单 6-29 中的程序会输出什么？\n\n清单 6-29.  BinarySearchTest.java\n\
  \n```\n// This program shows the usage of binary search\n\nimport java.util.*;\n\
  \nclass BinarySearchTest {\n        public static void  main(String []args) {\n\
  \                String [] strArr = { \"21\", \"22\", \"11\", \"12\", \"13\" };\n\
  \                System.out.println(\"The given strArr is: \" + Arrays.toString(strArr));\n\
  \                int index = Arrays.binarySearch(strArr, \"22\");\n            \
  \    System.out.println(\"The index value is: \" + index);\n        }\n}\n```\n\n\
  它输出以下内容：\n\n```\nThe index value is: -6\n```\n\n哪里出错了？`binarySearch` 方法接受两个参数：第一个是要搜索的数组，第二个是要搜索的键值。如果成功，它会返回键元素在数组中的索引。如果未找到键值，则返回一个负值。现在，`binarySearch()`\
  \ 方法期望在已排序的数组上调用。这里，你忘记在执行 `binary search` 之前调用 `sort()`，所以方法执行失败了。清单 6-30 展示了改进后的代码。\n\
  \n清单 6-30.  BinarySearchTest2.java\n\n```\n// This program shows the usage of binary\
  \ search\n\nimport java.util.*;\n\nclass BinarySearchTest {\n        public static\
  \ void  main(String []args) {\n                String [] strArr = { \"21\", \"22\"\
  , \"11\", \"12\", \"13\" };\n                System.out.println(\"The given strArr\
  \ is: \" + Arrays.toString(strArr));\n                Arrays.sort(strArr);\n   \
  \             System.out.println(\"strArr after sorting is: \" + Arrays.toString(strArr));\n\
