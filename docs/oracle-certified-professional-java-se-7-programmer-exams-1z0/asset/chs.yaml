  \n花几分钟对照程序查看输出，确保你理解它。好了，让我们看看发生了什么。\n\n1.  你创建了一个包含四首 MJ 歌曲的 `LinkedList<String>`。\n\
  2.  你打印了列表的内容；它按照你插入的顺序打印了歌曲。\n3.  `Collections.reverse()` 方法会反转给定 `List` 的内容。因此，你得到了逆序的歌曲。\n\
