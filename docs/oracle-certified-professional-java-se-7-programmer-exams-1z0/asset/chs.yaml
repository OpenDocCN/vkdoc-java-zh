  \ Big bank post office, Big bank city 56000, ph: 9876501234, Email: maggi07@myuniverse.com.\"\
  \n                Pattern pattern = Pattern.compile(\"\\\\w+@\\\\w+\\\\.com\");\n\
  \                Matcher matcher = pattern.matcher(str);\n                while(matcher.find())\
