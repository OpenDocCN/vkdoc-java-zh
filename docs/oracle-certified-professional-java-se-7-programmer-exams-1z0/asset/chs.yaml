  \ 10。\n\n现在，让我们尝试做一些稍微困难的事情：搜索电子邮件地址。在电子邮件地址中，第一部分是一个单词（可以用 `\"\\w+\"` 指定），后面跟着一个\
  \ `\"@\"`，然后是另一个单词，并以 `\".com\"` 结尾（为简单起见，我们忽略其他后缀，如 “`.edu`”）。因此，在示例字符串中搜索电子邮件地址的正则表达式是\
  \ `\"\\w+@\\w+\\.com\"`。这个正则表达式字符串能行吗？试试清单 7-11 中的代码。\n\n*清单 7-11.*  Regex5.java\n\
  \n```\nimport java.util.regex.Matcher;\nimport java.util.regex.Pattern;\n\n// This\
  \ program demonstrates how we can search email addresses\npublic class Regex5 {\n\
