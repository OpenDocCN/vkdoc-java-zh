  \ 插入行\n已为 Harry 插入行\n表更新完成……\n回滚到已插入 Tom 和 Dick 的状态\n提交后打印表内容\n1 Tom\n2 Dick\n```\n\
  \n现在让我们理解这个程序。\n\n1.  首先获取 `connection`，创建 `statement`，获取 `ResultSet`，并打印表内容（此时为空）。\n\
  2.  你依次插入三行。每插入一行后，你就在该事务中创建一个 `Savepoint` 对象。第一个 `savepoint` 是在插入“Tom”之后的一个未命名\
  \ `Savepoint`，第二个和第三个是命名保存点，分别在插入“Dick”和“Harry”之后创建。\n3.  在语句 `connection.rollback(secondSavepoint);`\
  \ 中，你指示 JDBC 将事务回滚到第二个 `savepoint`。请记住，你创建第二个保存点是为了记住插入“Tom”和“Dick”之后但插入“Harry”之前的状态。因此回滚到已插入包含“Tom”和“Dick”行的状态。\n\
  4.  `commit()` 方法提交事务的当前状态。由于已经调用了回滚，事务的当前状态是已插入两行，分别包含昵称“Tom”和“Dick”。打印表内容确认了这一点。\n\
  \nRowSet 接口\n\n`javax.sql.RowSet` 接口扩展了 `ResultSet 接口`，以提供对 JavaBean 组件模型的支持。`RowSet`\
  \ 接口为不同数据类型定义了 getter 和 setter 方法。\n\n`RowSet` 还支持添加和移除事件监听器的方法（因为它是一个 JavaBean\
  \ 组件）。其他 Java 对象可以使用 `RowSet` 支持的事件通知机制。`RowSet` 接口实现了观察者设计模式（作为主题）。想要从 `RowSet`\
  \ 接收事件通知的 Java 对象必须实现 `RowSetListner` 接口，并且必须向 `RowSet` 对象注册。`RowSet` 会在发生以下事件之一时通知所有已注册的对象：游标位置变化、行变化以及整个\
  \ `RowSet` 对象的变化。\n\nJava 提供了五种不同风格的 `RowSet` 接口（参见图 10-3）。这些风格的接口可以在 `javax.sql.rowset`\
  \ 包中找到。这五个接口分别是 `JdbcRowSet`、`JoinRowSet`、`CachedRowSet`、`WebRowSet` 和 `FilteredRowSet`。Java\
  \ 还提供了这些接口的默认参考实现，可以在 `com.sun.rowset` 包中找到。这些实现分别是 `JdbcRowSetImpl`、`JoinRowSetImpl`、`CachedRowSetImpl`、`WebRowSetImpl`\
  \ 和 `FilteredRowSetImpl`。\n\n![9781430247647_Fig10-03.jpg](img/9781430247647_Fig10-03.jpg)\n\
  \n图 10-3.  RowSet 层次结构\n\n`JdbcRowSet` 是一个已连接的 `RowSet`，这意味着 `JdbcRowSet` 实现始终与相应的数据库保持连接。其他四个接口是断开的\
  \ `RowSet`，这意味着这四个 `RowSet` 实现（除 `JdbcRowSet` 外）中的任何一个对象仅在需要读取或写入时才连接到数据库；其他所有时间它们都与数据库断开连接。这四个接口实现的这一特性，加上可序列化的能力，使它们适合通过网络发送。\n\
  \n图 10-3 展示了各种 `RowSet` 接口之间的层次关系。如你所知，`RowSet` 是 `ResultSet` 接口的子接口。`JdbcRowSet`\
  \ 是 `RowSet` 的子接口；`JdbcRowSet` 拥有 `ResultSet` 支持的所有功能，外加 JavaBean 能力。`CachedRowSet`\
  \ 也是 `RowSet` 接口的子接口；它拥有 `JdbcRowSet` 支持的所有功能，外加断开式 `ResultSet` 的能力。`WebRowSet`\
  \ 在 `CachedRowSet` 功能的基础上增加了 XML 能力。类似地，`JoinRowSet` 在 `WebRowSet` 基础上增加了 SQL 连接能力，而\
  \ `FilteredRowSet` 在 `WebRowSet` 基础上增加了结果过滤能力。\n\n现在让我们讨论 Java 7 中引入的 `RowSetProvider`\
  \ 类和 `RowSetFactory` 接口。`RowSetProvider` 提供了获取 `RowSetFactory` 实现的 API，该实现可用于实例化适当的\
  \ `RowSet` 实现。它提供了以下两个方法：\n\n*   **RowSetFactory newFactory():** 此 API 创建一个新的 `RowSetFactory`\
  \ 实现实例。那么这个方法会实例化哪个工厂实现呢？这是个好问题；答案是此 API 会根据环境设置推断要实例化的工厂实现类型。它首先在系统属性 `javax.sql.rowset.RowSetFactory`\
  \ 中查找。如果 API 无法推断出工厂实现，则使用 `ServiceLoader` API 来确定要实例化的工厂实现类型，最后它会查找 `RowSetFactory`\
  \ 实例的平台默认实现。如果 API 无法推断出工厂实现类型，则会抛出 `SQLException`。\n*   **RowSetFactory newFactory(String\
  \ factoryClassName, ClassLoader classloader):** 如果由于作用域中存在多个驱动程序，导致调用普通的 `newFactory()`\
  \ 方法时不清楚将加载哪个驱动程序，你可以使用重载方法 `newFactory()`，该方法接受工厂的类名和类加载器，并实例化适当的工厂。\n\n\n\n`RowSetFactory`\
  \ 定义了五个方法；每个方法都会创建一种类型的 `RowSet` 实现。那么，既然可以使用传统的普通方式创建 `RowSet` 实现，为什么还需要 `RowSetFactory`\
  \ 和 `RowSetProvider` 呢？答案是*灵活性*；你可以在创建 `RowSet` 对象时无需指定传统方式下需要提供的细节；然后在对象创建后再设置其他细节。不如编写一个程序来看看如何使用\
  \ `RowSetFactory` 和 `RowSetProvider`？请参见清单 10-13。\n\n清单 10-13.  DbQuery5.java\n\n\
  ```\nimport javax.sql.rowset.*;\nimport java.sql.*;\n\n// 演示如何使用 RowSet、RowSetProvider\
  \ 和 RowSetFactory\nclass DbQuery5 {\n        public static void main(String[] args)\
  \ {\n                String url = \"jdbc:mysql://localhost:3306/addressBook\";\n\
  \                String userName = \"root\";\n                String password =\
  \ \"mysql123\";\n                try {\n                        // 首先，为 rowset 创建一个工厂对象\n\
  \                        RowSetFactory rowSetFactory = RowSetProvider.newFactory();\n\
  \                        // 从工厂创建一个 JDBC rowset\n                        JdbcRowSet\
  \ rowSet = rowSetFactory.createJdbcRowSet();\n                        rowSet.setUrl(url);\n\
  \                        rowSet.setUsername(userName);\n                       \
  \ rowSet.setPassword(password);\n                        rowSet.setCommand(\"SELECT\
  \ * FROM contact\");\n                        rowSet.execute();\n              \
  \          System.out.println(\"id \\tfName \\tlName \\temail \\t\\tphoneNo\");\n\
  \                        while (rowSet.next()){\n                              \
  \  System.out.println(rowSet.getInt(\"id\") + \"\\t\"\n                        \
  \                        + rowSet.getString(\"firstName\") + \"\\t\"\n         \
  \                                       + rowSet.getString(\"lastName\") + \"\\\
  t\"\n                                                + rowSet.getString(\"email\"\
  ) + \"\\t\"\n                                                + rowSet.getString(\"\
  phoneNo\"));\n                        }\n                } catch (SQLException sqle)\
  \ {\n                        sqle.printStackTrace();\n                }\n      \
  \  }\n}\n```\n\n程序输出如下：\n\n```\nId      fName   lName   email           phoneNo\n\
  1       Michael Taylor  michael@abc.com +919976543210\n2       William Becker  \
  \ william@abc.com +449876543210\n3       Samuel Uncle   sam@abc.com     +119955331100\n\
  ```\n\n程序的输出符合预期。不过，你使用了 `RowSetProvider` 和 `RowSetFactory`。你首先获取了合适的 `RowSetFactory`，然后使用该工厂创建了\
  \ `JdbcRowSet`。程序的其余部分与你之前在清单 10-3 中看到的一致。\n\n要点记忆\n\n以下是一些可能对 OCPJP 考试有帮助的要点：\n\
  \n*   你可以在 `ResultSet` 方法中使用列名或列索引。你使用的索引是 `ResultSet` 对象的索引，而不是数据库表中的列号。\n*   如果发生以下情况，`Statement`\
  \ 对象会关闭当前的 `ResultSet` 对象：a) `Statement` 对象被关闭，b) 被重新执行，或 c) 被用于检索下一组结果。这意味着不必显式调用\
  \ `ResultSet` 对象的 `close()` 方法；不过，在对象使用完毕后调用 `close()` 是一个好习惯。\n*   你可以使用 `ResultSet`\
  \ 对象的列名，而无需担心大小写：`getXXX()` 方法接受不区分大小写的列名来检索关联的值。\n*   考虑一种情况：`ResultSet` 对象中有两个同名的列。如何使用列名检索关联的值？如果使用列名检索值，它将始终指向与给定名称匹配的第一列。因此，在这种情况下，你必须使用列索引来检索与这两列关联的值。\n\
  *   你可能还记得 `PreparedStatement` 接口继承自 `Statement`。然而，`PreparedStatement` 重写了所有 `execute()`\
  \ 方法的变体。例如，`executeUpdate()` 的行为可能与其基类方法不同。\n*   发出正确的 SQL 命令是你的责任；JDBC `Statement`\
  \ 不会检查其正确性。例如，如果 SQL 命令字符串中存在语法错误，你不会收到编译错误。相反，你会在运行时收到 `MySQLSyntaxErrorException`。\n\
  *   使用 `insertRow()` 方法插入一行后，你可以立即调用相应的 `get()` 方法。但是，该行的值是未定义的。\n*   你可以使用 `cancelRowUpdates()`\
  \ 方法取消所做的任何更新。但是，你必须在调用 `updateRow()` 方法之前调用此方法。在所有其他情况下，它对行没有影响。\n*   连接数据库时，你需要指定正确的用户名和密码。如果提供的用户名或密码不正确，你将收到\
  \ `SQLException`。\n*   JDBC 4.1 引入了使用 try-with-resources 语句自动关闭资源（`Connection`、`ResultSet`\
  \ 和 `Statement`）的功能。\n\n问答时间！\n\n1.  考虑以下代码片段。假设连接对象有效，并且 `statement.executeQuery()`\
  \ 方法成功返回了一个包含几行数据的 `ResultSet` 对象。\n\n```\n    Statement statement = connection.createStatement();\n\
  \    ResultSet resultSet = statement.executeQuery(\"SELECT * FROM contact\")){\n\
  \    System.out.println(\"ID \\tfName \\tlName \\temail \\t\\tphoneNo\");\n    //\
  \ 从 resultSet 元数据中，找出有多少列，然后读取列条目\n    int numOfColumns = resultSet.getMetaData().getColumnCount();\n\
  \    while (resultSet.next()) {\n    // 按索引值遍历列\n         for(int i = 0; i < numOfColumns;\
  \ i++) {\n            // 由于我们不知道列的数据类型，因此使用 getObject()\n            System.out.print(resultSet.getObject(i)\
  \ + \"\\t\");\n    ```\n\n```\n     }\n       System.out.println(\"\");\n    }\n\
  \    ```\n\n关于此代码片段，以下哪项陈述是正确的？\n\n*   A.  该代码片段将成功打印 `ResultSet` 对象中行的内容。\n   \
  \ *   B.  循环头是错误的。要遍历所有列，应该是\n\n```\n         for(int i = 0; i <= numOfColumns;\
  \ i++) {\n        ```\n\n*   C.  循环头是错误的。要遍历所有列，应该是\n\n```\n         for(int i =\
  \ 1; i <= numOfColumns; i++) {\n        ```\n\n*   D.  循环头是错误的。要遍历所有列，应该是\n\n```\n\
  \         for(int i = 1; i < numOfColumns; i++) {\n        ```\n\n**答案：** C。循环头是错误的。要遍历所有列，应该是\n\
  \n```\n    for(int i = 1; i <= numOfColumns; i++) {\n    ```\n\n\n\n（假设表中有 N 列，有效的列索引范围是\
  \ 1 到 N，而不是 0 到 N-1。）\n\n2.  假设你刚刚在 MySQL 中使用以下命令创建了这张表：\n\n```\n    create table\
  \ familyGroup (id int not null auto_increment, nickName varchar(30) Not null, primary\
  \ key (id));\n    ```\n\n你编写了以下使用这张表的程序：\n\n```\n    import java.sql.Connection;\n\
  \    import java.sql.ResultSet;\n    import java.sql.SQLException;\n    import java.sql.Statement;\n\
  \nclass DbTransactionTest {\n         public static void main(String[] args) throws\
  \ SQLException {\n                 try (Connection connection = DbConnector.connectToDb();\n\
  \                         Statement statement =\n                          connection.createStatement(\n\
  \                                 ResultSet.TYPE_SCROLL_SENSITIVE, ResultSet.CONCUR_UPDATABLE);\n\
  \                         ResultSet resultSet =\n                              \
  \   statement.executeQuery(\"SELECT * FROM familyGroup\")) {\n                 \
  \        resultSet.moveToInsertRow();\n                         resultSet.updateString(\"\
  nickName\", \"Sam\");\n                         resultSet.insertRow();  // 插入行\n\
  \                         System.out.println(\"表已更新一行...\");\n                 \
  \        connection.commit();    // 提交语句\n                 }\n         }\n    }\n\
  \    ```\n\n假设建立连接成功，执行此程序的结果是什么？\n\n*   A.  程序将成功插入一行，其 id = 1，nickName = “Sam”。\n\
  \    *   B.  在标记为“插入行”的代码行将抛出 `SQLException`，因为你无法在只读的 `ResultSet` 对象上插入行。\n   \
  \ *   C.  在标记为“提交语句”的代码行将抛出 `SQLException`，因为启用了自动提交；因此提交将失败。\n    *   D.  程序不会向\
  \ `familyGroup` 表中插入任何内容。\n\n**答案：** C. 在标记为“提交语句”的代码行将抛出 `SQLException`，因为启用了自动提交；因此提交将失败。\n\
  \n（如果未禁用自动提交，任何尝试使用 `commit`、`rollback`、`setSavepoint` 等方法的行为都将导致抛出 `SQLException`。）\n\
  \n3.  考虑事务中的以下操作序列：\n\n```\n    // 假设此程序中的所有操作均成功执行，未抛出任何异常；同时假设连接已成功建立\n    connection.setAutoCommit(false);\n\
  \n// 在此处向表中插入一行\n    // 在此事务中创建一个保存点\n\n// 在此处向表中插入另一行\n    // 在此事务中创建一个命名保存点\n\n\
  // 在此处向表中插入第三行\n\nconnection.rollback();\n    connection.commit();\n    ```\n\n\
  在执行 `connection.commit()` 语句后，此操作序列的效果是什么？\n\n*   A.  三行将被插入到表中。\n    *   B.  表中不会插入任何行。\n\
  \    *   C.  一行将被插入到表中。\n    *   D.  两行将被插入到表中。\n    *   E.  所有三行都将被插入到表中。\n\n**答案：**\
  \ B. 表中不会插入任何行。\n\n（由于在 `connection.commit()` 之前调用了 `connection.rollback()`，所有操作都将被撤销，因此表中不会插入任何行。）\n\
  \n4.  在 JDBC 3.0 中，以下哪个语句是必需的？\n\n*   A.  `Connection connection = DriverManager.getConnection(\"\
  jdbc:mysql://localhost:3306/addressBook\", \"root\", \"password\"))`\n    *   B.  `Connection\
  \ connection = DriverManager.createConnection(\"jdbc:mysql://localhost:3306/addressBook\"\
  , \"root\", \"password\"))`\n    *   C.  `Class.forName(\"com.mysql.jdbc.Driver\"\
  ).newInstance();`\n    *   D.  `Class.forName(\"com.mysql.jdbc.Driver\").getInstance();`\n\
  \n**答案：** C. `Class.forName(\"com.mysql.jdbc.Driver\").newInstance();`\n\n（在 JDBC\
  \ 3.0 中，你需要使用 `Class.forName()` 语句显式加载 JDBC 驱动程序。从 4.0 开始，不再需要此语句，你可以直接获取连接。请注意，选项\
  \ A) 展示了如何获取 MySQL 的连接，并且此 URL 将取决于所使用的具体数据库。）\n\n5.  考虑以下程序并选择最能描述其行为的选项（假设连接有效）：\n\
  \n```\n    try (Statement statement = connection.createStatement();\n    ResultSet\
  \ resultSet = statement.executeQuery(\"SELECT * FROM contact\")){\n      System.out.println(resultSet.getInt(\"\
  id\") + \"\\t\"\n       + resultSet.getString(\"firstName\") + \"\\t\"\n       +\
  \ resultSet.getString(\"lastName\") + \"\\t\"\n       + resultSet.getString(\"email\"\
  ) + \"\\t\"\n       + resultSet.getString(\"phoneNo\"));\n    }\n    catch (SQLException\
  \ sqle) {\n    System.out.println(\"SQLException\");\n    }\n    ```\n\n*   A.  此程序将打印：`SQLException`。\n\
  \    *   B.  此程序将打印 contact 表中的第一行。\n    *   C.  此程序将打印 contact 表中的所有行。\n    * \
  \  D.  此程序将报告编译错误。\n\n**答案：** A. 此程序将打印：`SQLException`。\n\n（缺少 `while (resultSet.next())`\
  \ 语句。）\n\n6.  关于 JDBC 中的 RowSet，以下哪两个陈述是正确的？\n\n*   A.  可以将 `JdbcRowSet` 用作 JavaBeans\
  \ 组件。\n    *   B.  `WebRowSet` 以 JSON 格式提供结果集。\n    *   C.  `FilteredRowSet` 对象中的过滤器在其创建时设置；一旦\
  \ `FilteredRowSet` 对象创建，就无法再设置过滤器。\n    *   D.  `CachedRowSet` 对象在其内存中缓存数据，这使得可以在不始终连接到其数据源的情况下使用\
  \ `CachedRowSet` 对象。\n\n**答案：**\n\nA.     可以将 `JdbcRowSet` 用作 JavaBeans 组件。\n\n\
  D.     `CachedRowSet` 对象在其内存中缓存数据，这使得可以在不始终连接到其数据源的情况下使用 `CachedRowSet` 对象。\n\n\
  （注意：B) `WebRowSet` 以 XML 格式（而非 JSON 格式，JSON 是 XML 的替代方案之一）提供结果集；C) `FilteredRowSet`\
  \ 对象中的过滤器可以随时使用 `setFilter()` 方法设置。）\n\n7.  以下哪个接口**不**扩展 `RowSet` 接口？\n\n*   A.  `JdbcRowSet`\n\
  \    *   B.  `CachedRowSet`\n    *   C.  `WebRowSet`\n    *   D.  `TraversalRowSet`\n\
  \    *   E.  `JoinRowSet`\n\n**答案：** D) `TraversalRowSet`\n\n（从 `JdbcRowSet` 派生的接口有\
  \ `CachedRowSet`、`WebRowSet`、`JoinRowSet` 和 `FilteredRowSet`。）\n\n总结\n\n定义 JDBC\
  \ API 的布局\n\n*   Java 提供的 JDBC（Java 数据库连接）API 旨在以编程方式访问数据库管理系统（DBMS）。\n*   JDBC\
  \ 隐藏了所有 DBMS 的异构性，并提供了一套统一的 API 来与所有类型的数据库进行交互。\n*   异构交互的复杂性被委托给 JDBC 驱动程序管理器和\
  \ JDBC 驱动程序；因此，所有细节和复杂性都被 JDBC API 对应用程序开发者隐藏了。\n*   共有四种类型的驱动程序：\n\n*   **类型 1（JDBC-ODBC\
  \ 桥接驱动程序）：** JDBC 驱动程序使用 Java 本地接口（JNI）调用 ODBC（开放数据库连接）本地调用。\n*   **类型 2（本地 API\
  \ 驱动程序）：** 这些驱动程序使用特定数据库的客户端库，并将 JDBC 调用转换为本地数据库调用。\n*   **类型 3（网络协议驱动程序）：** 这些驱动程序调用数据库中间件，中间件再将\
  \ JDBC 调用转换为特定于数据库的本地调用。\n*   **类型 4（本地协议驱动程序）：** 驱动程序直接通过网络进行特定于数据库的调用，无需任何额外的客户端库支持。\n\
  \n使用 JDBC 驱动程序连接到数据库\n\n\n\n*   `java.sql.Connection` 接口提供了一个通道，应用程序和数据库通过该通道进行通信。\n\
  *   `DriverManager` 类中的 `getConnection()` 方法接受三个参数：URL 字符串、用户名字符串和密码字符串。\n*   URL（需要指定以获取\
  \ `Connection` 对象）的语法是 `<protocol>:<subprotocol>://<server>:<port>/`。URL 字符串的一个示例是\
  \ `jdbc:mysql://localhost:3306/`。对于所有 DBMS，`<protocol> jdbc` 都是相同的；`<subprotocol>`\
  \ 会因 DBMS 而异，`<server>` 取决于你托管数据库的位置，每个 DBMS 都使用特定的 `<port>` 编号。\n*   如果 JDBC API\
  \ 无法定位 JDBC 驱动程序，它将抛出 `SQLException`。如果有可用的驱动程序 jar 包，则需要将它们包含在类路径中，以使 JDBC API\
  \ 能够定位驱动程序。\n*   在 JDBC 4.0 之前，你必须使用 `Class.forName()` 语句显式加载 JDBC 驱动程序；在 JDBC 4.0\
  \ 及更高版本中，则不需要此语句，JDBC API 将从 URL 字符串中给出的详细信息加载驱动程序。\n\n更新和查询数据库\n\n*   JDBC 支持两个用于查询和更新的接口：`Statement`\
  \ 和 `Resultset`。\n*   `Statement` 是一个 SQL 语句，可用于将 SQL 语句发送到已连接的数据库并从数据库接收结果。有三种类型的\
  \ `Statements`：\n\n*   `Statement`：当你需要向数据库发送不带任何参数的 SQL 语句时，需要使用 `Statement`。\n\
  *   `PreparedStatement`：表示一个预编译的 SQL 语句，可以使用 IN 参数进行自定义。\n*   `CallableStatement`：用于执行存储过程；可以处理\
  \ IN 以及 OUT 和 INOUT 参数。\n\n*   `ResultSet` 是一个包含查询请求的列标题和相关值的表格。\n*   `ResultSet`\
  \ 对象维护一个指向当前行的游标。最初，游标位于第一行之前；调用 `next()` 方法会将游标位置向前移动一行。\n*   `ResultSet` 对象中的列索引从\
  \ 1 开始（*而不是*从 0 开始）。\n*   在修改 `ResultSet` 中的行内容后，你需要调用 `updateRow()`；否则，对 `ResultSet`\
  \ 对象所做的更改将丢失。\n*   通过调用 `Connection` 接口中的 `getMetaData()` 方法，你可以检查底层数据库的能力。\n\n\
  自定义 JDBC 的事务行为并提交事务\n\n*   事务是一组 SQL 操作，这些操作要么全部成功执行，要么全部不执行。\n*   `Connection`\
  \ 接口支持与事务相关的方法。\n*   默认情况下，自动提交模式设置为 true，因此你通过连接所做的所有更改都会自动提交到数据库。\n*   你可以使用 `setAutoCommit(false);`\
  \ 来启用手动提交。在未启用自动提交的情况下，你需要显式地提交或回滚事务。\n*   如果在手动提交模式下未执行 `commit()` 方法，则数据库中将不会发生任何更改。\n\
  *   你可以将一个大事务划分为多个里程碑。这些里程碑被称为 `savepoints`。这样，一旦达到某个里程碑，你就可以将对数据库的更改保存到该里程碑。\n\n\
  使用 JDBC 4.1 RowSetProvider、RowSetFactory 和 RowSet 接口\n\n*   `RowSet` 是一个特殊的 `ResultSet`，它支持\
  \ JavaBean 组件模型。\n*   `JdbcRowSet` 是一个已连接的 `RowSet`，而 `RowSet` 的其他子接口（即 `JoinRowSet,\
  \ CachedRowSet, WebRowSet` 和 `FilteredRowSet`）是断开的 `RowSets`。\n*   `RowSetProvider`\
  \ 提供了获取 `RowSetFactory` 实现的 API，该实现又可用于实例化相关的 `RowSet` 实现。\n\n第 11 章\n\n![image](img/frontdot.jpg)\n\
  \n异常和断言\n\n![9781430247647_unFig11-01.jpg](img/9781430247647_unFig11-01.jpg)\n\n\
  在本章中，你将详细了解 Java 对异常处理的支持。你将首先学习异常处理背后的基本概念，然后学习如何抛出、捕获和重新抛出异常。你还将学习最近添加的语言特性，例如\
  \ try-with-resources 和多 catch 语句。接下来，你将学习如何定义自己的异常类（自定义异常）。最后，我们将讨论相关的断言主题，并教你如何在程序中使用它们。本章中的大多数编程示例都使用了\
  \ I/O 函数（第 8 章和第 9 章）来说明异常处理的概念。\n\n异常处理简介\n\n作为程序员，我们很乐观——我们只是编写代码来解决手头的问题，并期望它能毫无问题地运行。然而，事情确实会出错（而且往往比我们希望的更频繁！），所以我们应该始终预料到错误和异常，并编写代码来处理这些异常情况。\n\
  \nJava 内置了对异常的支持。Java 语言以 `throw, throws, try`, `catch` 和 `finally` 关键字的形式支持异常处理。请参阅图\
  \ 11-1 以了解这些关键字的基本语法。\n\n![9781430247647_Fig11-01.jpg](img/9781430247647_Fig11-01.jpg)\n\
  \n图 11-1.  异常处理相关关键字的基本语法\n\n抛出异常\n\n清单 11-1 是一个非常简单的编程示例，其中你希望将作为命令行参数输入的文本回显给用户。假设用户必须键入一些文本作为要回显的命令行参数，否则你需要通知用户“错误情况”。\n\
  \n清单 11-1.  Echo.java\n\n```\n// 一个没有异常处理代码的简单程序\nclass Echo {\n               \
  \ public static void main(String []args) {\n                                if(args.length\
  \ == 0) {\n\n// 没有传递参数 – 向用户显示错误\n                                             \
  \   System.out.println(\"Error: No input passed to echo command... \");\n      \
  \                                          System.exit(-1);\n                  \
  \              }\n                                else {\n                     \
  \                           for(String str : args) {\n// 命令行参数被分隔并作为数组传递\n     \
  \                                           // 通过在数组元素之间添加空格来打印它们\n            \
  \                                    System.out.print(str + \" \");\n          \
  \                                      }\n                                }\n  \
  \              }\n}\n```\n\n在这种情况下，你使用 `println()` 语句在控制台中打印错误。这是一个简单的程序，错误发生在 `main()`\
  \ 方法中，因此错误处理很容易。在这种情况下，你可以在将错误消息打印到控制台后终止程序。但是，如果你在复杂应用程序的函数调用深处，则需要一种更好的方式来指示发生了“异常情况”，然后将该情况通知给调用者。此外，你通常需要从错误情况中恢复，而不是终止程序。因此，你需要能够“处理”异常，或者将该异常“重新抛出”到调用堆栈的更上层，以便调用者可以处理该异常。（我们将在本章后面重新讨论重新抛出异常这个主题。）现在，你将修改清单\
  \ 11-1 中的程序，使其抛出异常而不是打印错误消息（在单独的程序 `Echo1.java` 中），如下所示：\n\n```\nif(args.length\
  \ == 0) {\n        // 没有传递参数 - 抛出异常\n        throw new IllegalArgumentException(\"\
  No input passed to echo command\");\n}\n```\n\n\n\n在 `args.length == 0` 的 `if` 条件内部的这个代码块，是该程序中唯一需要修改的部分。请注意抛出异常的语法：`throw`\
  \ 关键字后跟异常对象。这里你使用了 Java 库中已定义的 `IllegalArgumentException`。在本章后面，你将学习如何定义自己的异常。\n\
  \n现在，如果你在命令行中不传递任何参数运行此程序，程序将抛出一个 `IllegalArgumentException`。\n\n```\nD:\\> java\
  \ Echo1\nException in thread \"main\" java.lang.IllegalArgumentException: No input\
  \ passed to echo command\n        at Echo1.main(Echo1.java:5)\n```\n\n由于没有为此异常设置处理器，这个未捕获的异常终止了程序。在这个例子中，你显式地抛出了一个异常。当你编写某些代码或调用\
  \ Java API 时，也可能会抛出异常。现在来看一个例子。\n\n未处理的异常\n\n考虑清单 11-2 中的程序，它尝试读取用户在控制台输入的整数值，并将读取到的整数打印回控制台。为了从控制台读取整数，你使用了\
  \ `java.util.Scanner` 类中提供的 `readInt()` 方法。要实例化 `Scanner` 类，你需要传入 `System.in`，它是对*系统输入流*的引用。\n\
  \n清单 11-2.  ScanInt1.java\n\n```\n// 一个简单的程序，用于从用户处接收整数\n\nimport java.util.*;\n\
  \nclass ScanInt {\n                public static void main(String [] args) {\n \
  \                               System.out.println(\"请在控制台输入一个整数：\");\n        \
  \                        Scanner consoleScanner = new Scanner(System.in);\n    \
  \            System.out.println(\"你输入的整数值是：\" + consoleScanner.nextInt());\n   \
  \             }\n}\n```\n\n当你运行此程序并在控制台输入一个整数（例如 10）时，程序会正确运行并成功将整数打印出来。\n\n```\n\
  D:\\> java ScanInt1\n请在控制台输入一个整数：\n\n你输入的整数值是：10\n```\n\n然而，如果你（或程序的用户）错误地输入了字符串\
  \ \"ten\" 而不是整数值 \"10\"，会发生什么？程序将在抛出如下异常后终止：\n\n```\nD:\\> java ScanInt1\n请在控制台输入一个整数：\n\
  ten\nException in thread \"main\" java.util.InputMismatchException\n        at java.util.Scanner.throwFor(Scanner.java:909)\n\
  \        at java.util.Scanner.next(Scanner.java:1530)\n        at java.util.Scanner.nextInt(Scanner.java:2160)\n\
  \        at java.util.Scanner.nextInt(Scanner.java:2119)\n        at ScanInt.main(ScanInt1.java:7)\n\
  ```\n\n如果你阅读 `nextInt()` 的文档，你会发现该方法可能会抛出 `InputMismatchException`，“如果下一个标记与 `Integer`\
  \ 正则表达式不匹配，或者超出范围”。在这个简单的程序中，你假设你（或用户）总会按预期输入一个整数值，而当这个假设不成立时，就会抛出异常。如果程序抛出了异常且未被处理，程序将在输出类似上面所示的堆栈跟踪后异常终止。\n\
  \n*堆栈跟踪*显示了在控制流到达抛出异常的语句之前所调用的方法列表（包含行号）。作为程序员，你会发现它对于跟踪控制流以调试程序并修复导致此异常的问题非常有用。\n\
  \n那么，如何处理这种情况呢？你需要将这些代码放在 `try` 和 `catch` 块中，然后处理异常。\n\nTry 和 Catch 语句\n\nJava 提供了\
  \ `try` 和 `catch` 关键字来处理你编写的代码中可能抛出的任何异常。清单 11-3 是清单 11-2 中程序的改进版本。\n\n清单 11-3.  ScanInt2.java\n\
  \n\n```java\n// 一个简单的程序，用于在正常情况下从用户处接收整数，\n// 否则打印错误信息\n\nimport java.util.*;\n\n\
  class ScanInt2 {\n                public static void main(String [] args) {\n  \
  \                              System.out.println(\"请在控制台中输入一个整数：\");\n        \
  \                        Scanner consoleScanner = new Scanner(System.in);\n    \
  \                            try {\n                                System.out.println(\"\
  您输入的整数值为：\" + consoleScanner.nextInt());\n                        } catch(InputMismatchException\
  \ ime) {\n                                                // 如果控制台输入的不是整数，nextInt()\
  \ 会抛出 InputMismatchException\n                                                //\
  \ 因此在此处处理该异常\n                        System.out.println(\"错误：您输入的内容不是有效的整数值...\"\
  );\n                                }\n                }\n}\n```\n\n如果输入的不是有效的整数，该程序会向用户打印一条可读的错误信息。\n\
  \n```\nD:\\> java ScanInt2\n请在控制台中输入一个整数：\nten\n错误：您输入的内容不是有效的整数值...\n```\n\n现在我们来分析这段代码。`try`\
  \ 关键字后面的代码块限定了您预期可能抛出某些异常的代码段。如果 `try` 块中抛出了任何异常，Java 运行时将搜索一个*匹配的处理程序*（稍后我们将更详细地讨论）。在本例中，存在一个针对\
  \ `InputMismatchException` 的异常处理程序，其类型与抛出的异常完全相同。这个*完全匹配*的 catch 处理程序位于 try 块之外，形式为关键字\
  \ `catch` 后跟一个代码块，并且这个 catch 块会被执行。在 catch 块中，您捕获了异常，因此您在此处处理该异常。您提供的是人类可读的错误字符串，而不是抛出原始的堆栈跟踪（就像您在清单\
  \ 11-2 的早期程序中所做的那样），因此您为程序提供了优雅的退出方式。\n\n以编程方式访问堆栈跟踪\n\n您已经看到堆栈跟踪对于调试很有用，那么如何在 catch\
  \ 块中获取它呢？您可以使用 `printStackTrace()` 方法，该方法会将堆栈跟踪打印到控制台。让我们将以下语句添加到 catch 块中：\n\n\
  ```\nime.printStackTrace();\n```\n\n现在这条语句将打印堆栈跟踪：\n\n```\njava.util.InputMismatchException\n\
  \                at java.util.Scanner.throwFor(Scanner.java:909)\n             \
  \   at java.util.Scanner.next(Scanner.java:1530)\n                at java.util.Scanner.nextInt(Scanner.java:2160)\n\
  \                at java.util.Scanner.nextInt(Scanner.java:2119)\n             \
  \   at ScanInt2.main(ScanInt2.java:9)\n```\n\n您还可以访问堆栈跟踪中的每个条目。所有异常都有一个名为 `getStackTrace()`\
  \ 的方法，该方法返回一个 `StackTraceElements` 数组。因此，假设您在 catch 块中编写了以下语句：\n\n```\nSystem.out.println(\"\
  堆栈跟踪中的调用为：\");\n// 访问\"调用堆栈\"中的每个元素并单独打印\nfor(StackTraceElement methodCall : ime.getStackTrace())\n\
  \        System.out.println(methodCall);\n```\n\n当您执行这段代码时，它将打印以下内容：\n\n```\n堆栈跟踪中的调用为：\n\
  java.util.Scanner.throwFor(Scanner.java:909)\njava.util.Scanner.next(Scanner.java:1530)\n\
  java.util.Scanner.nextInt(Scanner.java:2160)\njava.util.Scanner.nextInt(Scanner.java:2119)\n\
  ScanInt2.main(ScanInt2.java:9)\n```\n\n多个 Catch 块\n\n在清单 11-2 中，您使用了一个 `Scanner`\
  \ 对象从控制台读取整数。请注意，您也可以使用 `Scanner` 对象从字符串中读取（参见清单 11-4）。\n\n清单 11-4.  ScanInt3.java\n\
  \n```\n// 一个从给定字符串中扫描整数的程序\n\nimport java.util.*;\n\nclass ScanInt3 {\n        public\
  \ static void main(String [] args) {\n                                String integerStr\
  \ = \"100\";\n                                System.out.println(\"要从中扫描整数的字符串是：\"\
  \ + integerStr);\n                                Scanner consoleScanner = new Scanner(integerStr);\n\
  \                                try {\n                                       \
  \         System.out.println(\"从字符串中扫描到的整数值是：\" +\n                            \
  \    consoleScanner.nextInt());\n                                } catch(InputMismatchException\
  \ ime) {\n                                                // 如果字符串中提供的不是整数，nextInt()\
  \ 会抛出 InputMismatchException\n                                                System.out.println(\"\
  错误：无法从给定的字符串中扫描整数\");\n                                }\n        }\n}\n```\n\n\
  该程序打印以下内容：\n\n```\n要从中扫描整数的字符串是：100\n从字符串中扫描到的整数值是：100\n```\n\n如果您修改清单 11-4 中的程序，使字符串包含一个非整数值，例如：\n\
  \n```\nString integerStr = \"hundred\";\n```\n\n那么 try 块将抛出一个 `InputMismatchException`，该异常将在\
  \ catch 块中被处理，您将得到以下输出：\n\n要从中扫描整数的字符串是：hundred\n\n错误：无法从给定的字符串中扫描整数\n\n现在，如果您修改清单\
  \ 11-4 中的程序，使字符串包含一个空字符串，例如：\n\n```\nString integerStr = \"\";\n```\n\n对于这种情况，`nextInt()`\
  \ 将抛出一个 `NoSuchElementException`，该异常在此程序中未被处理，因此此程序会崩溃。\n\n```\n要从中扫描整数的字符串是：\n\
  Exception in thread \"main\" java.util.NoSuchElementException\n        at java.util.Scanner.throwFor(Scanner.java:907)\n\
  \        at java.util.Scanner.next(Scanner.java:1530)\n        at java.util.Scanner.nextInt(Scanner.java:2160)\n\
  \        at java.util.Scanner.nextInt(Scanner.java:2119)\n        at ScanInt3.main(ScanInt.java:11)\n\
  ```\n\n此外，如果您查看 `Scanner.nextInt()` 方法的 JavaDoc，您会发现它还可能抛出 `IllegalStateException`（如果在一个已关闭的\
  \ `Scanner` 对象上调用 `nextInt()` 方法，则会抛出此异常）。因此，让我们为 `InputMismatchException`、`NoSuchElementException`\
  \ 和 `IllegalStateException` 提供 catch 处理程序（参见清单 11-5）。\n\n清单 11-5.  ScanInt4.java\n\
  \n```\n// 一个从给定字符串中扫描整数的程序\n\nimport java.util.*;\n\nclass ScanInt4 {\n        \
  \        public static void main(String [] args) {\n                           \
  \     String integerStr = \"\";\n                                System.out.println(\"\
  要从中扫描整数的字符串是：\" + integerStr);\n                                Scanner consoleScanner\
  \ = new Scanner(integerStr);\n                                try {\n\nSystem.out.println(\"\
  从字符串中扫描到的整数值是：\" +\n                                   consoleScanner.nextInt());\n\
  \                                } catch(InputMismatchException ime) {\n       \
  \                                         System.out.println(\"错误：无法从给定的字符串中扫描整数\"\
  );\n                                } catch(NoSuchElementException nsee) {\n   \
  \                                             System.out.println(\"错误：无法从给定的字符串中扫描整数\"\
  );\n                                } catch(IllegalStateException ise) {\n     \
  \                                           System.out.println(\"错误：在已关闭的 Scanner\
  \ 对象上调用了 nextInt()\");\n                                }\n                }\n}\n\
  ```\n\n以下是运行此程序时的输出：\n\n\n```\nThe string to scan integer from it is:\nError: Cannot\
  \ scan an integer from the given string\n```\n\n从输出可以看出，由于字符串为空，抛出了 `NoSuchElementException`。该异常被对应的\
  \ catch 处理器捕获，并执行了 catch 块内的代码，从而实现了优雅退出。\n\n请注意，通过堆叠多个 catch 处理器，你提供了多个处理程序：先提供特定（即派生类型）的异常处理器，再提供更通用（即基类型）的异常处理器。如果在基类型异常处理器之后提供派生类型异常处理器，则会导致编译器错误。你可能还不知道，`NoSuchElementException`\
  \ 实际上是 `InputMismatchException` 的基类！尝试颠倒 `InputMismatchException` 和 `NoSuchElementException`\
  \ 的 catch 处理器顺序，看看会发生什么。\n\n```\ntry {\n        System.out.println(\"The integer\
  \ value scanned from string is: \"\n                      + consoleScanner.nextInt());\n\
  } catch(NoSuchElementException nsee) {\n        System.out.println(\"Error: Cannot\
  \ scan an integer from the given string\");\n} catch(InputMismatchException ime)\
  \ {\n        System.out.println(\"Error: Cannot scan an integer from the given string\"\
  );\n}\n```\n\n这段代码将导致以下编译器错误：\n\n```\nScanInt4.java:14: error: exception InputMismatchException\
  \ has already been caught\n\n} catch(InputMismatchException ime) {\n           \
  \       ^\n1 error\n```\n\n| ![image](img/Note.jpg) | 当提供多个 catch 处理器时，应先处理特定异常，再处理通用异常。如果在基类异常处理器*之后*提供派生类异常\
  \ catch 处理器，代码将无法编译。 |\n\n多重捕获块\n\n你刚刚看到，不能颠倒 `InputMismatchException` 和 `NoSuchElementException`\
  \ 的 catch 处理器顺序。但是，是否可以将这两个 catch 处理器合并在一起呢？Java 7 提供了一个名为*多重捕获块*的特性，你可以使用它将多个 catch\
  \ 处理器合并在一起（参见清单 11-6）。\n\n清单 11-6.  ScanInt5.java\n\n```\n// A program that illustrates\
  \ multi-catch blocks\n\nimport java.util.*;\n\nclass ScanInt5 {\n              \
  \  public static void main(String [] args) {\n                                String\
  \ integerStr = \"\";\n                                System.out.println(\"The string\
  \ to scan integer from it is: \" + integerStr);\n                              \
  \  Scanner consoleScanner = new Scanner(integerStr);\n                         \
  \       try {\n                        System.out.println(\"The integer value scanned\
  \ from string is: \" +\n                                      consoleScanner.nextInt());\n\
  \                                } catch(NoSuchElementException | IllegalStateException\
  \ multie) {\n                                                System.out.println(\"\
  Error: An error occured while attempting to scan the integer\");\n             \
  \                   }\n                }\n}\n```\n\n请注意，这里使用 `| (OR)` 运算符（与对整数值执行按位\
  \ `OR` 运算时使用的运算符相同）将 `NoSuchElementException` 和 `IllegalStateException` 的 catch\
  \ 子句合并在一起。\n\n与 `NoSuchElementException` 和 `IllegalStateException` 的合并 catch 子句不同，你不能合并\
  \ `NoSuchElementException` 和 `InputMismatchException` 的 catch 子句。正如我们已经讨论过的，`NoSuchElementException`\
  \ 是 `InputMismatchException` 的基类，因此不能在多重捕获块中同时捕获它们。如果尝试编译这样的多重捕获子句，将得到以下编译器错误：\n\
  \n```\nScanInt5.java:11: error: Alternatives in a multi-catch statement cannot be\
  \ related by subclassing\n        } catch(InputMismatchException | NoSuchElementException\
  \ exception) {\n                                                               \
  \            ^\n```\n\n那么替代方案是什么？当需要为那些一个异常是另一个异常基类的异常提供 catch 处理器时，仅提供基类的 catch\
  \ 处理器就足够了（因为该基类 catch 处理器会处理可能发生的派生类异常）。\n\n| ![image](img/banana.jpg) | 在多重捕获块中，不能合并具有基类和派生类关系的两个异常的\
  \ catch 处理器。只能合并那些彼此之间没有父子关系的异常的 catch 处理器。 |\n\n如何判断是合并异常处理块更好，还是堆叠它们更好？这是一个设计选择，需要考虑以下方面：a)\
  \ 这些异常是由于相似原因还是不同原因抛出的？(b) 处理代码是相似还是不同？如果对这两个问题的回答都是“相似”，那么合并它们更好；如果对其中任何一个问题的回答是“不同”，那么分开它们更好。\n\
  \n清单 11-6 中的具体情况如何？对于 `InputMismatchException` 和 `IllegalStateException` 异常，是合并处理器更好还是分开更好？可以看到，两个\
  \ catch 块的异常处理是相同的。但这两个异常的原因却大相径庭。`InputMismatchException` 是在你（或用户）在控制台输入无效输入时抛出的。而\
  \ `IllegalStateException` 则是在调用 `Scanner` 的 `close()` 方法后，又调用 `nextInt()` 方法时，因编程错误而抛出的。因此，在这种情况下，将这两个异常的处理器分开是更好的设计选择。\n\
  \n通用捕获处理器\n\n你是否注意到，在使用与 I/O 操作相关的 API 时，可能会抛出许多异常？我们刚刚讨论过，仅仅调用 `Scanner` 类的一个方法\
  \ `nextInt()`，就需要处理三个异常：`InputMismatchException`、`NoSuchElementException` 和 `IllegalStateException`。如果一直像这样处理那些在程序运行时实际上可能不会导致异常情况的特定异常，那么你的大部分代码都将由\
  \ try-catch 代码块组成！有没有更好的方法来表示“处理所有其他异常”？有的，你可以提供一个*通用异常处理器*。\n\n以下代码片段展示了来自清单 11-4\
  \ 的 `ScanInt3` 类中仅包含 try-catch 块的代码，并增加了一个通用异常处理器：\n\n```\ntry {\n        System.out.println(\"\
  You typed the integer value: \" + consoleScanner.nextInt());\n} catch(InputMismatchException\
  \ ime) {\n        // if something other than integer is typed, we'll get this exception,\
  \ so handle it\n                System.out.println(\"Error: You typed some text\
  \ that is not an integer value...\");\n} catch(Exception e) {\n        // catch\
  \ IllegalStateException here which is unlikely to occur...\n                System.out.println(\"\
  Error: Encountered an exception and could not read an integer from the console...\
  \ \");\n}\n```\n\n这段代码为 `Exception` 类型的基类异常提供了一个 catch 处理器。因此，如果 try 块抛出了 `InputMismatchException`\
  \ 之外的任何异常，并且该异常是 `Exception` 类的派生类，这个通用 catch 处理器就会处理它。建议的做法是先捕获特定异常，然后提供一个通用异常处理器，以确保所有其他异常也能得到处理。\n\
  \n异常链\n\n当你想捕获一个异常并抛出另一个异常时，可以将第一个异常“链接”到抛出的异常上。换句话说，在抛出异常时，你可以关联另一个导致该异常发生的异常。\n\
  \n\n\n创建异常对象时，你可以使用一个以另一个异常为参数的构造函数；这个传入的参数就是链接到当前异常对象的异常。此外，还有一个重载的构造函数，可以额外接收一个描述消息作为参数。例如，以下是\
  \ `Exception` 类的两个重载构造函数：\n\n```\nException(Throwable cause)\nException(string detailMsg,\
  \ throwable cause)\n```\n\n其他类如 `Throwable`、`Error` 和 `RuntimeException` 也提供了类似的构造函数。下面的程序演示了链式异常：\n\
  \n```\nclass ChainedException {\n                public static void foo() {\n  \
  \                              try {\n                                         \
  \       String [] str =  { \"foo\" };\n                                        \
  \        System.out.println(\"About to throw ArrayIndexOutOfBoundsException\");\n\
  \                                                // 以下语句存在越界访问\n               \
  \                                 String functionName = str[10];\n             \
  \                   } catch(ArrayIndexOutOfBoundsException oob) {\n            \
  \                                    System.out.println(\"Wrapping ArrayIndexOutOfBoundsException\
  \ into a RuntimeException\");\n                                                throw\
  \ new RuntimeException(oob);\n                }\n}\n                public static\
  \ void main(String []args) {\n                                try {\n          \
  \                                      foo();\n                                }\
  \ catch(Exception re) {\n                                                System.out.println(\"\
  The caught exception in main is: \" + re.getClass());\n                        \
  \                        System.out.println(\"The cause of the exception is: \"\
  \ + re.getCause());\n                }\n           }\n}\n```\n\n执行该程序时，会输出以下内容：\n\
  \n```\nAbout to throw ArrayIndexOutOfBoundsException\nWrapping ArrayIndexOutOfBoundsException\
  \ into a RuntimeException\nThe caught exception in main is: class java.lang.RuntimeException\n\
  The cause of the exception is: java.lang.ArrayIndexOutOfBoundsException: 10\n```\n\
  \n与链式异常相关的方法是在 `Throwable` 类中定义的 `getCause()` 和 `initCause()` 方法。\n\n`getCause()`\
  \ 方法返回一个 `Throwable` 对象。它返回链接到调用该方法的异常对象上的异常。这个链式异常是导致当前异常的原始异常。如果没有异常链接到当前异常，则此方法返回\
  \ `null`。\n\n`initCause(Throwable causeException)` 方法为调用该方法的异常对象设置链式异常。如果在创建异常对象时已经设置了链式异常，调用此方法将导致抛出\
  \ `IllegalStateException`。此方法只能调用一次；任何多次调用的尝试都会导致抛出 `IllegalStateException`。\n\n\
  请注意，异常可以链接到任意深度。\n\n**Finally 块**\n\n`Scanner` 类提供了一个 `close()` 方法，你需要调用它来关闭资源。在\
  \ `ScanInt1`、`ScanInt2` 和 `ScanInt3` 类（分别对应列表 11-2、11-3 和 11-4）中，请注意你创建了一个 `Scanner`\
  \ 对象但没有关闭它。因此，这些程序存在*资源泄漏*！“资源”一词指的是任何从底层操作系统获取系统资源的类，例如网络、文件、数据库以及其他句柄。但如何知道哪些类需要关闭呢？问得好。答案是：如果一个类实现了\
  \ `java.io.Closeable`，那么你必须调用该类的 `close()` 方法；否则，就会导致资源泄漏。\n\n| ![image](img/banana.jpg)\
  \ | 垃圾回收器（GC）只负责释放内存资源。如果你使用了任何获取系统资源的类，你有责任通过调用该对象的 `close()` 方法来释放它们。 |\n\n`ScanInt6`（列表\
  \ 11-7）在其 `main()` 方法中调用了 `Scanner` 对象的 `close()` 方法；为了简化代码，你将使用一个通用的异常处理器来处理 try\
  \ 块中可能抛出的所有异常。\n\n列表 11-7.  ScanInt6.java\n\n```\nimport java.util.*;\n\nclass ScanInt6\
  \ {\n                public static void main(String [] args) {\n               \
  \                 System.out.println(\"Type an integer in the console: \");\n  \
  \                              Scanner consoleScanner = new Scanner(System.in);\n\
  \                                try {\n                                       \
  \         System.out.println(\"You typed the integer value: \" +\n             \
  \                                                                   consoleScanner.nextInt());\n\
  \                                                System.out.println(\"Done reading\
  \ the text... closing the Scanner\");\n                                        \
  \                       consoleScanner.close();\n                              \
  \  } catch(Exception e) {\n                                                // 在此处理所有其他异常...\n\
  \                         System.out.println(\"Error: Encountered an exception and\
  \ could not read an integer from the console... \");\n\nSystem.out.println(\"Exiting\
  \ the program - restart and try the program again!\");\n                       \
  \         }\n                }\n}\n```\n\n让我们看看这个程序是否正常工作。\n\n```\nD:\\> java ScanInt6\n\
  Type an integer in the console:\n\nYou typed the integer value: 10\nDone reading\
  \ the text... closing the Scanner\n```\n\n因为程序打印了 `\"Done reading the text... closing\
  \ the Scanner\"`，并正常完成执行，所以可以认为 `consoleScanner.close();` 语句已成功执行。如果抛出异常会发生什么？\n\
  \n```\nD:\\> java ScanInt6\nType an integer in the console:\nten\nError: Encountered\
  \ an exception and could not read an integer from the console...\nExiting the program\
  \ - restart and try the program again!\n```\n\n从输出可以看出，程序没有打印 `\"Done reading the\
  \ text... closing the Scanner\"`，因此 `consoleScanner.close();` 语句没有执行。如何修复这个问题？一种方法是在\
  \ catch 块中也调用 `consoleScanner.close()`，如下所示：\n\n```\ntry {\n        System.out.println(\"\
  You typed the integer value: \" + consoleScanner.nextInt());\n        System.out.println(\"\
  Done reading the text... closing the Scanner\");\n                consoleScanner.close();\n\
  } catch(Exception e) {\n        // 在此处理所有其他异常...\n                consoleScanner.close();\n\
  \                System.out.println(\"Error: Encountered an exception and could\
  \ not read an integer from the console... \");\n                System.out.println(\"\
  Exiting the program - restart and try the program again!\");\n}\n```\n\n这个解决方案可行，但不够优雅。你知道可以有多个\
  \ catch 块，并且必须在所有 catch 块中提供对 `consoleScanner.close();` 的调用！有没有更好的方法来释放资源？有的，你可以在\
  \ `finally` 块中释放资源（参见列表 11-8）。\n\n列表 11-8.  ScanInt7.java\n\n```\nimport java.util.*;\n\
  ```\n\n\nclass ScanInt7 {\n                public static void main(String [] args)\
  \ {\n                                System.out.println(\"Type an integer in the\
  \ console: \");\n                                Scanner consoleScanner = new Scanner(System.in);\n\
  \                                try {\n                                       \
  \         System.out.println(\"You typed the integer value: \" +\n             \
  \                                                                   consoleScanner.nextInt());\n\
  \                                } catch(Exception e) {\n                      \
  \                          // call all other exceptions here ...\n\nSystem.out.println(\"\
  Error: Encountered an exception and could not read an integer from the console...\
  \ \");\n                        System.out.println(\"Exiting the program - restart\
  \ and try the program again!\");\n                                } finally {\n\n\
  System.out.println(\"Done reading the integer... closing the Scanner\");\n     \
  \                                           consoleScanner.close();\n          \
  \                      }\n                }\n}\n```\n\n在这个例子中，`catch` 块之后提供了一个 `finally`\
  \ 块。无论是否发生异常，这个 `finally` 块都会被执行。因此，`finally` 块是调用 `Scanner` 对象的 `close()` 方法以确保该资源始终被释放的好地方。\n\
  \n| ![image](img/banana.jpg) | 如果你在方法内部调用 `System.exit()`，程序会异常终止。因此，如果调用方法有 `finally`\
  \ 块，它将不会被调用，可能导致资源泄漏。出于这个原因，调用 `System.exit()` 来终止程序是一种不良的编程实践。 |\n\n现在，让我们看看在程序正常完成（即未抛出异常）和程序抛出异常后终止这两种情况下，扫描器是否都被关闭了。\n\
  \n```\nD:\\> java ScanInt7\nType an integer in the console:\n\nYou typed the integer\
  \ value: 10\nDone reading the integer... closing the Scanner\n\nD:\\> java ScanInt7\n\
  Type an integer in the console:\nten\nError: Encountered an exception and could\
  \ not read an integer from the console...\nExiting the program - restart and try\
  \ the program again!\nDone reading the integer... closing the Scanner\n```\n\n是的，无论是否抛出异常，语句“`Done\
  \ reading the integer... closing the Scanner`”都会被调用。请注意，你也可以在 `try` 块之后直接跟一个 `finally`\
  \ 块，而不需要 `catch` 块；这个特性虽然很少使用，但仍然是一个有用的特性。\n\n要点记忆\n\n以下是一些与在 `finally` 块中抛出/处理异常和释放资源相关的有趣要点：\n\
  \n*   你可以捕获异常，将它们包装成更通用的异常，并在调用栈中向上抛出。当你捕获一个异常并创建一个更通用的异常时，你可以保留对原始异常的引用；这被称为*异常链*。\n\
  \n```\n    catch(LowLevelException lle) {\n            // 将低级异常包装为高级异常；\n      \
  \  // 同时，将原始异常链接到新抛出的异常\n            throw new HighLevelException(lle);\n    }\n\
  \    ```\n\n异常链对于调试非常有用。当你得到一个通用异常时，你可以检查是否存在链接的低级异常，并尝试理解该低级异常发生的原因。\n\n*   无论\
  \ `try` 块中的代码是否抛出异常，`finally` 语句总是会被执行。考虑以下方法。它会向调用者返回 `true` 还是 `false`？\n\n```\n\
  \    static boolean returnTest() {\n                    try {\n                \
  \                    return true;\n                    }\n                    finally\
  \ {\n                                    return false;\n                    }\n\
  \    }\n    ```\n\n这个方法总是返回 `false`，因为 `finally` 总是会被调用。事实上，如果你使用 `–Xlint` 选项，你会得到这个编译器警告：“finally\
  \ clause cannot complete normally.”（请注意，`try` 块后面可以跟 `catch` 块或 `finally` 块，或者两者都跟。）\n\
  \n精确重抛\n\n考虑以下程序：\n\n```\nclass PreciseRethrow {\n          public static void main(String\
  \ []str) {\n                                try {\n                            \
  \                    foo();\n                                }\n               \
  \                 catch(NumberFormatException ife) {\n                         \
  \                       System.out.println(ife);\n                             \
  \   }\n          }\n                static private void foo() throws NumberFormatException\
  \ {\n                                try {\n                                   \
  \             int i = Integer.parseInt(\"ten\");\n                             \
  \   }\n                                catch(Exception e) {\n                  \
  \                              throw e;\n                                }\n   \
  \       }}\n```\n\n如果你在 Java 1.7 之前的 Java 版本中尝试这个程序，你会得到以下错误：\n\n```\nC:\\> javac\
  \ -source 1.6 PreciseRethrow.java\nPreciseRethrow.java:16: error: unreported exception\
  \ Exception; must be caught or\ndeclared to be thrown\n                        throw\
  \ e;\n                        ^\n1 error\n```\n\n在这个程序中，`Integer.parseInt()` 方法可能会抛出一个\
  \ `NumberFormatException`。然而，`catch` 块声明捕获的是通用异常类型 `Exception`。在 `catch` 块内部，异常被重新抛出。现在，方法\
  \ `foo()` 的 `throws` 子句表明它可以抛出 `NumberFormatException`，这是正确的，因为这是 `Integer.parseInt()`\
  \ 方法唯一能抛出的异常。然而，由于被重抛异常的静态类型是 `Exception`，编译器会抱怨 `foo()` 方法的 `throws` 子句应该声明为 `Exception`。\n\
  \nJava 7 允许你在重抛异常时更加精确。如果你从 `catch` 块重抛一个异常，你可以抛出一个 `try` 块可以抛出但之前没有 `catch` 块处理过的类型。此外，重抛的异常类型不必与\
  \ `catch` 类型参数相同；它可以是 `catch` 参数的一个子类型。因此，上面给出的 `PreciseRethrow` 类在编译时不会出现警告或错误。（当然，程序在抛出\
  \ `NumberFormatException` 后会崩溃，因为字符串 “ten” 不是一个整数！）\n\nTry-with-Resources\n\nJava\
  \ 程序员忘记释放资源是一个相当常见的错误，即使在 `finally` 块中也是如此。此外，如果你处理多个资源，记住在 `finally` 块中调用 `close()`\
  \ 方法是很繁琐的。Java 7 引入了一个名为 try-with-resources 的特性，旨在让你的生活更轻松。清单 11-9 使用了这个特性；它是清单\
  \ 11-8 的改进版本。\n\n清单 11-9.  TryWithResources1.java\n\n```\nimport java.util.*;\n\n\
  class TryWithResources1 {\n                public static void main(String [] args)\
  \ {\n                                System.out.println(\"Type an integer in the\
  \ console: \");\n                                try(Scanner consoleScanner = new\
  \ Scanner(System.in)) {\n\nSystem.out.println(\"You typed the integer value: \"\
  \ + consoleScanner.nextInt());\n                                } catch(Exception\
  \ e) {\n                                                // catch all other exceptions\
  \ here ...\n\nSystem.out.println(\"Error: Encountered an exception and could not\
  \ read an integer from the console... \");\n                        System.out.println(\"\
  Exiting the program - restart and try the program again!\");\n                 \
  \               }\n                }\n}\n```\n\n\n\n该行为与清单 11-7 中的程序类似，因此我们不再运行程序并重复展示示例输出。\n\
  \n请务必仔细查看 try-with-resources 块的语法。\n\n```\ntry(Scanner consoleScanner = new Scanner(System.in))\
  \ {\n```\n\n在此语句中，你已在 `try` 关键字之后、`try` 块之前的括号内获取了资源。此外，在示例中，你没有提供 finally 块。Java\
  \ 编译器会在内部将此 try-with-resources 块转换为 try-finally 块（当然，编译器会保留你提供的 catch 块）。你可以在 try-with-resources\
  \ 块中获取多个资源；这些资源获取语句应以分号分隔。\n\n你能提供不带任何显式 catch 或 finally 块的 try-with-resources 语句吗？可以！请记住，try\
  \ 块可以与 catch 块、finally 块或两者关联。try-with-resources 语句块会在内部扩展为 try-finally 块。因此，你可以提供不带显式\
  \ catch 或 finally 块的 try-with-resources 语句。清单 11-10 使用了不带任何显式 catch 或 finally 块的\
  \ try-with-resources 语句。\n\n清单 11-10.  TryWithResources2.java\n\n```\nimport java.util.*;\n\
  \nclass TryWithResources2 {\n                public static void main(String [] args)\
  \ {\n                                System.out.println(\"Type an integer in the\
  \ console: \");\n                                try(Scanner consoleScanner = new\
  \ Scanner(System.in)) {\n\nSystem.out.println(\"You typed the integer value: \"\
  \ + consoleScanner.nextInt());\n                                }\n            \
  \    }\n}\n```\n\n虽然可以创建不带任何显式 catch 或 finally 块的 try-with-resources 语句，但这并不意味着你应该这样做！例如，由于此代码没有\
  \ catch 块，如果你输入了无效输入，程序将会崩溃。\n\n```\nD:\\> java TryWithResources1\nType an integer\
  \ in the console:\nten\nException in thread \"main\" java.util.InputMismatchException\n\
  \        at java.util.Scanner.throwFor(Scanner.java:909)\n        at java.util.Scanner.next(Scanner.java:1530)\n\
  \        at java.util.Scanner.nextInt(Scanner.java:2160)\n        at java.util.Scanner.nextInt(Scanner.java:2119)\n\
  \        at TryWithResources1.main(TryWithResources1.java:7)\n```\n\n因此，try-with-resources\
  \ 语句的好处在于它简化了你的工作，无需显式提供 finally 块。然而，你仍然需要提供必要的 catch 块。\n\n请注意，要使资源能够与 try-with-resources\
  \ 语句一起使用，该资源的类必须实现 `java.lang.AutoCloseable` 接口。此接口声明了一个名为 `close()` 的单一方法。你已经知道\
  \ try-with-resources 特性是在 Java 7 中添加的。这个 `AutoCloseable` 接口也是在 Java 7 中引入的，并且该接口是\
  \ `Closeable` 接口的基接口。这是为了确保现有的资源类能够与 try-with-resources 语句无缝协作。换句话说，你可以将所有的旧流类与\
  \ try-with-resources 一起使用，因为它们实现了 `AutoCloseable` 接口。\n\n关闭多个资源\n\n你可以在 try-with-resources\
  \ 语句中使用多个资源。以下是一个代码片段，用于从给定的文本文件创建 zip 文件，其中使用了 try-with-resources 语句：\n\n```\n\
  // buffer 是用于将数据从一个流复制到另一个流的临时字节缓冲区\nbyte [] buffer = new byte[1024];\n\n// 这些流构造函数可能抛出\
  \ FileNotFoundException\ntry (ZipOutputStream zipFile = new ZipOutputStream(new\
  \ FileOutputStream(zipFileName));\n        FileInputStream fileIn = new FileInputStream(fileName))\
  \ {\n        zipFile.putNextEntry(new ZipEntry(fileName));                 // putNextEntry\
  \ 可能抛出\n                                                              // IOException\n\
  \                int lenRead = 0; // 用于跟踪成功读取字节数的变量\n                // 将输入文件的内容复制到\
  \ zip 文件中\n                while((lenRead = fileIn.read(buffer)) > 0) {        \
  \          // read 可能抛出 IOException\n                                zipFile.write(buffer,\
  \ 0, lenRead);                    // write 可能抛出 IOException\n        }\n       \
  \ // 流将自动关闭，因为它们位于 try-with-\n        // resources 语句内\n}\n```\n\n在这段代码中，`buffer`\
  \ 是一个字节数组。这个数组是临时存储，用于将原始数据从一个流复制到另一个流。在 try-with-resources 语句中，你打开了两个流：用于写入 zip\
  \ 文件的 `ZipOutputStream` 和用于读取文本文件的 `FileInputStream`。（注意：`java.util.zip` 库提供了对 zip（和\
  \ jar）文件的 API 支持。）你想要读取输入的文本文件，将其压缩，并将该条目放入 zip 文件中。为了将文件/目录条目放入 zip 文件，`ZipOutputStream`\
  \ 类提供了一个名为 `putNextEntry()` 的方法，该方法接受一个 `ZipEntry` 对象作为参数。语句 `zipFile.putNextEntry(new\
  \ ZipEntry(fileName));` 将一个名为 `fileName` 的文件条目放入 `zipFile` 中。\n\n为了读取文本文件的内容，你使用了\
  \ `FileInputStream` 类中的 `read()` 方法。`read()` 方法接受 `buffer` 数组作为参数。每次迭代读取的数据量（即要读取的“数据块大小”）由传递的数组大小决定；在此代码中为\
  \ 1024 字节。`read()` 方法返回它读取的字节数，如果没有更多数据可读，则返回 –1。`while` 循环在将数据写入 zip 文件之前检查读取是否成功（使用\
  \ > 0 条件）。\n\n为了将数据写入 zip 文件，你使用了 `ZipOutputStream` 类中的 `write()` 方法。`write()` 方法接受三个参数：第一个参数是数据缓冲区；第二个参数是数据缓冲区中的起始偏移量（为\
  \ 0，因为你总是从缓冲区的起始位置开始读取）；第三个参数是要写入的字节数。\n\n现在我们回到主要讨论。请注意你如何在 try 块中打开两个资源，并且这两个资源获取语句由分号分隔。你没有显式的\
  \ finally 块来释放资源，因为编译器会在 finally 块中自动插入对这两个流的 `close` 方法的调用。\n\n清单 11-11 是完整的程序，它利用此代码段来说明使用\
  \ try-with-resources 语句自动关闭多个流。\n\n清单 11-11.  ZipTextFile.java\n\n```\nimport java.util.*;\n\
  import java.util.zip.*;\nimport java.io.*;\n\n// 类 ZipTextFile 将文本文件的名称作为输入，并在压缩该文本文件后创建一个\
  \ zip 文件。\n\nclass ZipTextFile {\n                public static final int CHUNK\
  \ = 1024; // 用于帮助复制 1KB 的块\n                public static void main(String []args)\
  \ {\n                                if(args.length == 0) {\n\nSystem.out.println(\"\
  Pass the name of the file in the current directory to be zipped as an argument\"\
  );\n                                                System.exit(-1);\n         \
  \                       }\n                                String fileName = args[0];\n\
  \                                // zip 文件的名称是输入文件名加上后缀 \".zip\"\n             \
  \                   String zipFileName = fileName + \".zip\";\n\n\n\n```java\nbyte\
  \ [] buffer = new byte[CHUNK];\n                                // 这些构造方法可能抛出 FileNotFoundException\n\
  \                try (ZipOutputStream zipFile = new ZipOutputStream(new FileOutputStream(zipFileName));\
  \ FileInputStream fileIn = new FileInputStream(fileName)) {\n                  \
  \                              // putNextEntry 可能抛出 IOException\n\nzipFile.putNextEntry(new\
  \ ZipEntry(fileName));\n                                                int lenRead\
  \ = 0; // 用于记录成功读取的字节数的变量\n                                         // 成功读取\n  \
  \                                              // 将输入文件的内容复制到 zip 文件中\n        \
  \                                        while((lenRead = fileIn.read(buffer)) >\
  \ 0) {\n                                                                // read\
  \ 和 write 方法都可能抛出 IOException\n                                zipFile.write (buffer,\
  \ 0, lenRead);\n                                }\n                            \
  \                    // 流会自动关闭，因为它们位于\n\n// try-with-resources 语句内\n           \
  \                     }\n                                // 这可能导致 try 块抛出多个异常；\n\
  \                // 使用“被抑制的异常”来获取被抑制的异常！\n                                catch(Exception\
  \ e) {\n                                                System.out.println(\"捕获到的异常是：\"\
  \ + e);\n                                                System.out.print(\"被抑制的异常是：\"\
  );\n                                                for(Throwable suppressed : e.getSuppressed())\
  \ {\n                                                                System.out.println(suppressed);\n\
  \                                                }\n                           \
  \     }\n                }\n}\n```\n\n我们已经讨论过 try-with-resources 块的部分。我们尚未讨论的是*被抑制的异常*。在\
  \ try-with-resources 语句中，可能会抛出多个异常；例如，一个在 try 块中，一个在 catch 块中，另一个在 finally 块中。然而，只能捕获一个异常，因此其他异常将被列为被抑制的异常。从给定的异常对象中，你可以使用\
  \ `getSuppressed()` 方法获取被抑制异常的列表。\n\n## 要点记忆\n\n以下是一些关于 try-with-resources 语句的有趣要点，将有助于你应对\
  \ OCPJP 7 考试：\n\n*   你不能在 try-with-resources 语句体内对 try-with-resources 中声明的资源变量进行赋值。这是为了确保在\
  \ try-with-resources 头部获取的相同资源能够在 finally 块中被释放。\n*   一个常见的错误是在 try-with-resources\
  \ 语句内显式关闭资源。请记住，try-with-resources 会扩展为在 finally 块中调用 `close()` 方法，因此扩展后的代码将导致 `close()`\
  \ 方法被调用两次。考虑以下代码：\n\n```java\n    try(Scanner consoleScanner = new Scanner(System.in))\
  \ {\n          System.out.println(\"你输入的整数值是：\" + consoleScanner.nextInt());\n \
  \         consoleScanner.close();\n          // 显式调用 close() 方法——请记住，try-with-resources\n\
  \          // 语句也会扩展为在 finally 方法中调用 close()；\n          // 因此这将导致 Scanner 的 close()\
  \ 方法被调用两次！\n    }\n```\n\n`Scanner` 类的 `close()` 方法文档指出，如果 scanner 对象已经关闭，再次调用该方法将不会产生任何效果。因此，在这种情况下你是安全的。然而，一般来说，你不能期望所有资源都实现了可以安全调用两次的\
  \ `close()` 方法。因此，在 try-with-resources 语句内显式调用 `close()` 方法是一种不良实践。\n\n## 异常类型\n\
  \n到目前为止，我们重点解释了与异常相关的语言结构：try、catch、multi-catch、finally 和 try-with-resources 块。有些概念对你来说可能还不清楚。例如，你学习了\
  \ `throws` 子句，用于声明某个方法可能抛出某些异常。你发现对于某些类型的异常，你不需要在 throws 子句中声明它们，但对于其他某些类型的异常，你可以在\
  \ `throws` 子句中声明它们。这是为什么？这些不同类型的异常是什么？为了回答这些问题并更好地理解 Java 库中的异常处理支持，我们将在本节讨论异常的类型。\n\
  \n在 Java 中，你不能将任何基本类型作为异常对象抛出。这并不意味着你可以将任何引用类型对象作为异常抛出。抛出的对象必须是 `Throwable` 类或其某个子类的实例：`Throwable`\
  \ 是 Java 异常层次结构中的顶级类。诸如 `throw` 语句、`throws` 子句和 `catch` 子句等异常处理结构仅处理 `Throwable`\
  \ 及其子类。你需要详细了解 `Throwable` 的三个重要子类：`Error`、`Exception` 和 `RuntimeException` 类。图\
  \ 11-2 提供了这些类的高级概述。\n\n![9781430247647_Fig11-02.jpg](img/9781430247647_Fig11-02.jpg)\n\
  \n图 11-2. Java 的异常层次结构\n\n## Exception 类\n\n类型为 `Exception` 的异常被称为*受检异常*。如果代码可能抛出\
  \ `Exception`，你必须使用 catch 块处理它，或者声明该方法抛出该异常，从而强制该方法的调用者处理该异常。请参考清单 11-12。\n\n清单\
  \ 11-12. CheckedExceptionExample1.java\n\n```java\nimport java.io.*;\n\nclass CheckedExceptionExample1\
  \ {\n                public static void main(String []args) {\n                \
  \                FileInputStream fis = new FileInputStream(args[0]);\n         \
  \       }\n}\n```\n\n此程序会导致编译器错误。\n\n```\nCheckedExceptionExample1.java:5: 错误: 未报告的异常\
  \ FileNotFoundException；必须被捕获或声明抛出\n                FileInputStream fis = new FileInputStream(args[0]);\n\
  \                                                          ^\n1 个错误\n```\n\n`FileInputStream`\
  \ 的构造方法声明它会抛出 `FileNotFoundException` 异常。这个 `FileNotFoundException` 派生自 `Exception`\
  \ 类，因此是一个受检异常。对于受检异常，Java 强制你考虑失败条件以及如何处理它们。现在，思考清单 11-13 中的代码：你正在尝试打开由字符串 `args[0]`\
  \ 指定的文件，该文件可能不存在。如果你不想捕获并处理 `FileNotFoundException`，你可以声明 `main()` 方法抛出此异常。\n\n\
  清单 11-13. CheckedExceptionExample2.java\n\n```java\nimport java.io.*;\n\nclass CheckedExceptionExample2\
  \ {\n                public static void main(String []args) throws FileNotFoundException\
  \ {\n                                FileInputStream fis = new FileInputStream(args[0]);\n\
  \                }\n}\n```\n\n\n\n该程序可以顺利编译，不会出现任何错误。然而，这段代码仍然不尽如人意：如果你在命令行中传入一个搜索路径中不存在的文件名，程序将在抛出以下异常后崩溃：\n\
  \n```\nD:\\ > java CheckedExceptionExample2 somefile.txt\nException in thread \"\
  main\" java.io.FileNotFoundException: somefile.txt (The system cannot find the file\
  \ specified)\n        at java.io.FileInputStream.open(Native Method)\n        at\
  \ java.io.FileInputStream.<init>(FileInputStream.java:138)\n        at java.io.FileInputStream.<init>(FileInputStream.java:97)\n\
  \        at CheckedExceptionExample2.main(CheckedExceptionExample2.java:5)\n```\n\
  \n更好的处理方式是向用户抛出一条错误消息，告知她必须将文件名作为程序的第一个参数传入，如清单 11-14 所示。\n\n清单 11-14.  CheckedExceptionExample3.java\n\
  \n```\nimport java.io.*;\n\nclass CheckedExceptionExample3 {\n                public\
  \ static void main(String []args) {\n                                try {\n   \
  \                                             FileInputStream fis = new FileInputStream(args[0]);\n\
  \                                } catch(FileNotFoundException fnfe) {\n\nSystem.out.println(\"\
  Error: There is no file that exists with name \" + args[0]);\n\nSystem.out.println(\"\
  Pass a valid file name as commandline argument!\");\n                          \
  \      }\n                }\n}\n```\n\n现在，当传入一个不存在的文件名时，程序将终止并向用户显示这条有用的错误消息：\n\n\
  ```\nD:\\ > java CheckedExceptionExample3 somefile.txt\nError: There is no file\
  \ that exists with name somefile.txt\nPass a valid file name as commandline argument!\n\
  ```\n\n| ![image](img/Note.jpg) | 如果你的某个方法中的代码可能抛出受检异常，你可以在两种方案之间进行选择。你可以通过提供一个\
  \ `catch` 块来处理该异常，或者声明该方法会抛出该异常。如果你既不捕获异常，也不声明方法会抛出该异常，你的代码将无法编译。 |\n\n表 11-1 总结了\
  \ `Exception` 类的重要子类。\n\n表 11-1. Exception 类的重要子类\n\n| 类 | 简短描述 |\n| --- | --- |\n\
  | `CloneNotSupportedException` | 当在类未实现 `Cloneable` 接口的对象上调用 `clone()` 方法时抛出。 |\n\
  | `IOException` | 当输入/输出操作失败时抛出（例如，由于调用中断）。 |\n| `EOFException` | 当意外到达文件末尾时抛出；`IOException`\
  \ 的子类。 |\n| `FileNotFoundException` | 当运行时无法定位或打开给定文件时抛出；`IOException` 的派生类。 |\n\
  | `ReflectiveOperationException` | 当反射操作失败时抛出；与反射相关的异常（如 `NoSuchMethodException`\
  \ 和 `InvocationTargetException`）的超类。 |\n| `RuntimeException` | 非受检异常的超类（将在本章下一节讨论）。\
  \ |\n| `SQLException` | 当数据库访问或相关操作失败时抛出；与数据库相关的异常（如 `SerialException`）的超类。 |\n\
  | `ParseException` | 当解析失败时抛出（例如，在处理 `Format` 类中与区域设置相关的信息（如日期和时间）时）。 |\n\nRuntimeException\
  \ 类\n\n`RuntimeException` 是 `Exception` 类的派生类。从该类派生的异常被称为*非受检异常*。我们先讨论一个 `RuntimeException`\
  \ 的例子。回想一下清单 11-14 中关于 `FileNotFoundException` 的上下文（我们在清单 11-15 中重命名了该类）。\n\n清单\
  \ 11-15.  UnCheckedExceptionExample1.java\n\n```\nimport java.io.*;\n\nclass UnCheckedExceptionExample1\
  \ {\n                public static void main(String []args) throws FileNotFoundException\
  \ {\n                                FileInputStream fis = new FileInputStream(args[0]);\n\
  \                }\n}\n```\n\n如果你在运行该程序时没有向其传递任何参数，会发生什么？它将在抛出 `ArrayIndexOutOfBoundsException`\
  \ 后崩溃。\n\n```\nException in thread \"main\" java.lang.ArrayIndexOutOfBoundsException:\
  \ 0\n                at UnCheckedExceptionExample1.main(UnCheckedExceptionExample1.java:5)\n\
  ```\n\n在这个程序中，你没有检查 `args` 的长度（以查看它是否包含任何值），就尝试在表达式 `args[0]` 中对 `args` 进行索引。换句话说，你假设用户总是会提供要打开的文件名作为命令行参数，而当没有提供参数时，就变成了一个异常情况。因此，这是一个编程错误。请注意，尽管表达式\
  \ `args[0]` 可能抛出 `ArrayIndexOutOfBoundsException`，但你并没有捕获这个异常，也没有在 `main()` 方法的\
  \ `throws` 子句中声明它。这是因为 `ArrayIndexOutOfBoundsException` 是一个 `RuntimeException`，所以它是一个非受检异常。\n\
  \n| ![image](img/Note.jpg) | 处理非受检异常是可选的。如果你在方法中编写的代码段可能抛出非受检异常，则并非必须捕获该异常或在该方法的\
  \ `throws` 子句中声明该异常。 |\n\n如何修复清单 11-15 中的问题？对程序进行如下修改以处理 `ArrayIndexOutOfBoundsException`（如清单\
  \ 11-16 所示）怎么样？\n\n清单 11-16.  UnCheckedExceptionExample2.java\n\n```\nimport java.io.*;\n\
  \nclass UnCheckedExceptionExample2 {\n                public static void main(String\
  \ []args) throws FileNotFoundException {\n                                try {\n\
  \                                                FileInputStream fis = new FileInputStream(args[0]);\n\
  \                                } catch (ArrayIndexOutOfBoundsException aioobe)\
  \ {\n\nSystem.out.println(\"Error: No arguments passed in the commandline!\");\n\
  \nSystem.out.println(\"Pass the name of the file to open as commandline argument\"\
  );\n                                }\n                }\n}\n```\n\n运行时，该程序会打印以下内容：\n\
  \n```\nD:\\> java UnCheckedExceptionExample2\nError: No arguments passed in the\
  \ commandline!\nPass the name of the file to open as commandline argument\n```\n\
  \n是的，显示错误消息并告知用户正确的做法是好的。然而，这种捕获运行时异常（如 `ArrayIndexOutOfBoundsException`）的方法是一种*不良实践*！为什么？像\
  \ `ArrayIndexOutOfBoundsException` 这样的运行时异常表明可能存在*编程错误*，你应该修复代码，而不是捕获并处理这些异常。那么，你该如何修复这里的程序呢？你可以在尝试访问数组成员之前检查\
  \ `args` 的长度（参见清单 11-17）。\n\n清单 11-17.  UnCheckedExceptionExample3.java\n\n```\n\
  import java.io.*;\n\nclass UnCheckedExceptionExample3 {\n                public\
  \ static void main(String []args) throws FileNotFoundException {\n             \
  \                   // if any argument is passed, it would be greater than or equal\
  \ to one\n                                if(args.length >= 1) {\n             \
  \                                   FileInputStream fis = new FileInputStream(args[0]);\n\
  \                                } else {\n                        System.out.println(\"\
  Error: No arguments passed in the commandline!\");\n                        System.out.println(\"\
  Pass the name of the file to open as commandline argument\");\n                \
  \                }\n                }\n}\n```\n\n\n\n如果程序未传入任何参数，输出结果相同，但代码更优：它在实际索引数组之前会检查是否可以进行数组索引，因此采用了防御性编程。\n\
  \n| ![image](img/Note.jpg) | 执行防御性检查并避免引发不必要的运行时异常是一种良好的实践。 |\n\n表 11-2 总结了 `RuntimeException`\
  \ 类的重要子类。\n\n表 11-2. RuntimeException 类的重要子类\n\n| 类 | 简要描述 |\n| --- | --- |\n| `ArithmeticException`\
  \ | 当算术错误发生时抛出，例如尝试除以零。 |\n| `BufferOverflowException, BufferUnderflowException`\
  \ | 当尝试写入超出缓冲区限制时抛出。 |\n| `ClassCastException` | 当尝试在不兼容的类型之间进行转换时抛出（例如 String 转\
  \ Integer 类型或反之）。 |\n| `NegativeArraySizeException` | 当尝试创建负大小的数组时抛出。 |\n| `NoSuchElementException`\
  \ | 当尝试在 `Enumeration` 上使用 `nextElement()` 方法但已无更多值可访问时抛出。 |\n| `NullPointerException`\
  \ | 当尝试通过空引用进行解引用时抛出。 |\n| `UnsupportedOperationException` | 当尝试应用不支持或不存在的操作时抛出（例如，尝试写入只读文件系统将导致抛出\
  \ `ReadOnlyFileSystemException`，它是此异常的一个派生类）。 |\n| `IllegalArgumentException` |\
  \ 当向方法传递了不正确或不合适的参数时抛出。 |\n| `IndexOutOfBoundsException` | 当尝试使用不在允许范围内的索引值访问数据结构时抛出；是\
  \ `ArrayIndexOutOfBoundsException` 和 `StringIndexOutOfBoundsException` 的基类。 |\n\n\
  Error 类\n\n当 JVM 检测到程序中存在严重的异常状况时，它会抛出一个 `Error` 类型的异常。当你遇到 `Error` 或其子类型的异常时，该异常并非设计让你处理。最佳做法是让程序崩溃！为什么？让我们通过一个简单的例子来理解这一点。\n\
  \n假设你尝试运行一个不存在的程序！例如，考虑你在清单 11-16 中看到的 `UnCheckedExceptionExample3` 类；如果你在类名的大小写上出错并尝试调用它，你将得到\
  \ `NoClassDefFoundError`。\n\n```\nD:\\ > java UncheckedExceptionExample3\nException\
  \ in thread \"main\" java.lang.NoClassDefFoundError: UncheckedExceptionExample3\
  \ (wrong name: UnCheckedExceptionExample3)\n        at java.lang.ClassLoader.defineClass1(Native\
  \ Method)\n        at java.lang.ClassLoader.defineClass(ClassLoader.java:791)\n\
  \        at java.security.SecureClassLoader.defineClass(SecureClassLoader.java:142)\n\
  \        at java.net.URLClassLoader.defineClass(URLClassLoader.java:449)\n     \
  \   at java.net.URLClassLoader.access$100(URLClassLoader.java:71)\n        at java.net.URLClassLoader$1.run(URLClassLoader.java:361)\n\
  \        at java.net.URLClassLoader$1.run(URLClassLoader.java:355)\n        at java.security.AccessController.doPrivileged(Native\
  \ Method)\n        at java.net.URLClassLoader.findClass(URLClassLoader.java:354)\n\
  \        at java.lang.ClassLoader.loadClass(ClassLoader.java:423)\n        at sun.misc.Launcher$AppClassLoader.loadClass(Launcher.java:308)\n\
  \        at java.lang.ClassLoader.loadClass(ClassLoader.java:356)\n        at sun.launcher.LauncherHelper.checkAndLoadMain(LauncherHelper.java:480)\n\
  ```\n\n正如堆栈跟踪中有帮助的部分所示（“`wrong name: UnCheckedExceptionExample3`”），你提供了一个要加载的类，但该名称的类并不存在（注意\
  \ Java 中的名称是区分大小写的）。因此，JVM 以 `NoClassDefFoundError` 作为响应。\n\n让我们考虑一个编程示例来理解 `error`\
  \ 是如何发生的。假设你正在编写一个递归方法来计算一个数的阶乘，但忘记放入正确的终止条件（参见清单 11-18）。\n\n清单 11-18.  NonTerminatingRecursion.java\n\
  \n```\nclass NonTerminatingRecursion {\n                // factorial 是一个递归调用\n \
  \               static int factorial(int n) {\n                                int\
  \ result = 0;\n                                // 假设以下终止条件语句缺失 ...\n           \
  \                     // if(n == 0) return 1;\n                                result\
  \ = factorial(n - 1) * n;\n                                return result;\n    \
  \            }\n                public static void main(String ... args) {\n   \
  \                             System.out.println(\"factorial of 4 is: \" + factorial(4));\n\
  \                }\n}\n```\n\n运行时，该程序在抛出此异常后崩溃：\n\n```\nException in thread \"main\"\
  \ java.lang.StackOverflowError\n                at NonTerminatingRecursion.factorial(NonTerminatingResursion.java:7)\n\
  \                at NonTerminatingRecursion.factorial(NonTerminatingResursion.java:7)\n\
  \                [... 此处的 \"NonTerminatingRecursion.factorial(NonTerminatingResursion.java:7)\"\
  \ 重复了大量次数...]\n```\n\n对于每个方法调用，JVM 会在其栈区创建一个名为*栈帧*的运行时结构。由于递归调用，JVM 不断创建这样的栈帧，一段时间后，它会耗尽栈区。此时，JVM\
  \ 无法继续执行，因此抛出 `StackOverflowError`。当你遇到 `StackOverflowError` 时，几乎可以确定是编程错误导致了此异常。你需要修复程序以避免引发此异常。\n\
  \n| ![image](img/Note.jpg) | `Error` 类型的异常表示程序中的异常状况。捕获此异常并试图继续执行、假装什么都没发生是没有意义的。这样做是一种*非常*糟糕的实践！\
  \ |\n\n表 11-3 提供了 `Error` 类的重要子类列表**。**\n\n表 11-3. Error 类的重要子类\n\n| 类 | 简要描述 |\n\
  | --- | --- |\n| `AssertionError` | 当断言失败时抛出（本章稍后讨论）。 |\n| `IOError` | 当发生严重的 I/O\
  \ 错误时抛出。 |\n| `VirtualMachineError` | 当 JVM 本身进入错误状态（由于 bug）或 JVM 资源耗尽（例如内存）时抛出。\
  \ |\n| `OutOfMemoryError` | 当 JVM 无法再分配内存时抛出；是 `VirtualMachineError` 的派生类。 |\n|\
  \ `LinkageError` | 当 JVM 执行的链接失败时抛出（例如，由于循环类层次结构，在这种情况下将抛出 `ClassCircularityError`，它是\
  \ `LinkageError` 的派生类）。 |\n| `NoClassDefFoundError` | 当类加载器无法找到某个类而尝试加载其定义时抛出。 |\n\
  | `StackOverflowError` | 当应用程序有无终止的递归调用，或应用程序进行了过多 JVM 无法处理的函数调用时抛出；是 `VirtualMachineError`\
  \ 的派生类。 |\n\nThrows 子句\n\n一个方法可以抛出受检异常；`throws` 子句在方法签名中指定这些受检异常。你在本章开头已经简要了解了 `throws`\
  \ 关键字。在 `throws` 子句中，你列出方法可能抛出的*受检异常*，因此理解受检异常是理解 throws 子句的前提。由于我们已经在上一节关于异常类型的部分中介绍了受检异常，现在我们将介绍\
  \ throws 子句。\n\n\n\n让我们尝试读取当前目录下名为 `integer.txt` 的文件中存储的一个整数。`Scanner` 类有一个重载的构造函数，它接受一个\
  \ `File` 对象作为输入，因此我们尝试使用它。清单 11-19 展示了该程序。它能正常工作吗？\n\n清单 11-19.  ThrowsClause1.java\n\
  \n```\nimport java.io.*;\nimport java.util.*;\nclass ThrowsClause1 {\n         \
  \       public static void main(String []args) {\n                             \
  \   System.out.println(\"正在从文件 'integer.txt' 中读取一个整数：\");\n                    \
  \            Scanner consoleScanner = new Scanner(new File(\"integer.txt\"));\n\
  \                System.out.println(\"你输入的整数值是：\" + consoleScanner.nextInt());\n\
  \                }\n}\n```\n\n这段代码会导致编译器错误：“`unreported exception FileNotFoundException;\
  \ must be caught or declared to be thrown.`” 如果你查看这个 `Scanner` 方法的声明，你会看到一个 throws\
  \ 子句：\n\n```\npublic Scanner(File source) throws FileNotFoundException {\n```\n\n\
  因此，任何调用此构造函数的方法要么应该处理此异常，要么添加一个 throws 子句来声明该方法可能抛出此异常。给 `main()` 方法添加一个 throws\
  \ 子句；参见清单 11-20。\n\n清单 11-20.  ThrowsClause2.java\n\n```\nimport java.io.*;\nimport\
  \ java.util.*;\n\nclass ThrowsClause2 {\n                public static void main(String\
  \ []args) throws FileNotFoundException {\n                                System.out.println(\"\
  正在从文件 'integer.txt' 中读取一个整数：\");\n                                Scanner consoleScanner\
  \ = new Scanner(new File(\"integer.txt\"));\n                System.out.println(\"\
  你输入的整数值是：\" + consoleScanner.nextInt());\n                }\n} \n```\n\n如果你运行此程序，并且不存在名为\
  \ `integer.txt` 的文件，程序将在抛出此异常后崩溃：\n\n```\n正在从文件 'integer.txt' 中读取一个整数：\nException\
  \ in thread \"main\" java.io.FileNotFoundException: integer.txt (系统找不到指定的文件)\n \
  \               at java.io.FileInputStream.open(Native Method)\n               \
  \ at java.io.FileInputStream.<init>(FileInputStream.java:138)\n                at\
  \ java.util.Scanner.<init>(Scanner.java:656)\n                at ThrowsClause2.main(ThrowsClause2.java:7)\n\
  ```\n\n现在，让我们将 `main()` 方法中的代码提取到一个名为 `readIntFromFile()` 的新方法中。你将其定义为一个实例方法，因此你还需要创建一个\
  \ `ThrowsClause3` 类的对象，以便从 `main()` 方法中调用此方法。由于 `readIntFromFile()` 中的代码可能抛出 `FileNotFoundException`，它要么需要引入一个\
  \ catch 处理程序来处理此异常，要么在其 throws 子句中声明此异常（参见清单 11-21）。\n\n清单 11-21.  ThrowsClause3.java\n\
  \n```\nimport java.io.*;\nimport java.util.*;\n\nclass ThrowsClause3 {\n       \
  \         // 由于此方法不处理 FileNotFoundException，\n                // 该方法必须在 throws 子句中声明此异常\n\
  \                public int readIntFromFile() throws FileNotFoundException {\n \
  \                               Scanner consoleScanner = new Scanner(new File(\"\
  integer.txt\"));\n                                return consoleScanner.nextInt();\n\
  \                }\n\n// 由于 readIntFromFile() 抛出 FileNotFoundException 而 main()\
  \ 不处理它，\n                // 因此 main() 方法在其 throws 子句中声明此异常\n                public\
  \ static void main(String []args) throws FileNotFoundException {\n             \
  \                   System.out.println(\"正在从文件 'integer.txt' 中读取一个整数：\");\n    \
  \            System.out.println(\"你输入的整数值是：\" +                 new ThrowsClause3().readIntFromFile());\n\
  \                }\n}\n```\n\n\n\n程序在清单 11-20 和清单 11-21 中的行为保持一致。然而，清单 11-21 展示了\
  \ `main()` 方法在其 throws 子句中仍然必须声明抛出 `FileNotFoundException`（否则程序将无法编译）。\n\n方法重写与\
  \ throws 子句\n\n当一个可重写的方法包含 throws 子句时，重写该方法需要考虑诸多因素。以清单 11-22 中的程序为例，它实现了一个名为 `IntReader`\
  \ 的接口。该接口声明了一个名为 `readIntFromFile()` 的方法，其 throws 子句中列出了 `FileNotFoundException`。\n\
  \n清单 11-22.  ThrowsClause4.java\n\n```\nimport java.io.*;\nimport java.util.*;\n\
  \n// 此接口旨在供从文件中读取整数的类实现\ninterface IntReader {\n                int readIntFromFile()\
  \ throws IOException;\n}\n\nclass ThrowsClause4 implements IntReader {\n       \
  \         // 使用相同的 throws 子句或更具体的 throws 子句实现 readIntFromFile\n                public\
  \ int readIntFromFile() throws FileNotFoundException {\n                       \
  \         Scanner consoleScanner = new Scanner(new File(\"integer.txt\"));\n   \
  \                             return consoleScanner.nextInt();\n               \
  \ }\n                // 此代码中省略了 main 方法，因为此处重点在于理解涉及 throws 子句时的重写问题\n}\n```\n\n\
  在这段代码中，你可以观察到几个重要事实。首先，你可以在接口中声明的方法上使用 throws 子句；实际上，你也可以为抽象类中声明的抽象方法提供 throws 子句。其次，`IntReader`\
  \ 接口中声明的方法声明抛出 `IOException`，这是一个比 `FileNotFoundException` 更通用的异常（图 11-3）。在实现方法时，既可以提供与基方法相同异常类型的\
  \ throws 子句，也可以提供比基方法更具体的异常类型。在此例中，`readIntFromFile()` 方法在其 throws 子句中列出了更具体的异常（`FileNotFoundException`），而\
  \ `IntReader` 接口中声明的基方法在其 throws 子句中列出的是更通用的异常 `IOException`。\n\n![9781430247647_Fig11-03.jpg](img/9781430247647_Fig11-03.jpg)\n\
  \n图 11-3.  FileNotFoundException 的类层次结构\n\n如果尝试更改 throws 子句会怎样？有多种方式可以更改重写方法中的 throws\
  \ 子句，包括以下几种：\n\n1.  不提供任何 throws 子句。\n2.  列出更通用的受检异常进行抛出。\n3.  在基方法给定的受检异常基础上，额外列出更多的受检异常。\n\
  \n如果你尝试上述任何一种情况，都会遇到编译器错误。例如，尝试在实现 `IntReader` 接口的类中，不为 `readIntFromFile()` 方法提供\
  \ throws 子句。\n\n```\npublic int readIntFromFile() {\n        Scanner consoleScanner\
  \ = new Scanner(new File(\"integer.txt\"));\n                return consoleScanner.nextInt();\n\
  }\n```\n\n你会得到如下编译器错误：“`unreported exception FileNotFoundException; must be caught\
  \ or declared to be thrown.`”\n\n总而言之，基类方法的 throws 子句是其向该方法调用者提供的一份契约：它表明调用者应处理列出的异常，或在其自身的\
  \ throws 子句中声明这些异常。当重写基方法时，派生方法也应遵守该契约。基方法的调用者只准备处理基方法中列出的异常，因此重写方法不能抛出比列出的受检异常更通用或其他的异常。\n\
  \n然而，请注意，关于派生类方法的 throws 子句应遵循基方法 throws 子句契约的讨论，仅限于受检异常。与基类方法的 throws 子句相比，非受检异常仍然可以添加或移除。例如，考虑以下情况：\n\
  \n```\npublic int readIntFromFile() throws IOException, NoSuchElementException {\n\
  \        Scanner consoleScanner = new Scanner(new File(\"integer.txt\"));\n    \
  \            return consoleScanner.nextInt();\n}\n```\n\n这是一个可接受的 throws 子句，因为 `readIntFromFile()`\
  \ 方法可能会抛出 `NoSuchElementException`。该异常是一个非受检异常，当 `nextInt()` 方法无法从文件中读取整数时会被抛出。这是一种常见情况，例如，如果你有一个名为\
  \ `integer.txt` 的空文件，尝试从中读取整数将导致此异常。\n\n要点记忆\n\n以下是一些关于 throws 语句的值得注意的要点，可帮助您应对\
  \ OCPJP 7 考试：\n\n*   如果方法没有 throws 子句，这*并不*意味着它不能抛出任何异常；只是意味着它不能抛出任何*受检*异常。\n* \
  \  良好的实践是使用 `@throws` JavaDoc 标签来记录方法可能抛出异常（包括受检和非受检异常）的特定情况或场景。\n*   在 throws 子句中列出方法可能抛出的非受检异常是一种不良实践。为什么？因为编译器无法强制调用者处理非受检异常，所以将它们列在\
  \ throws 子句中并无意义。相反，如果方法可能抛出非受检异常，最好使用 `@throws` 标签来记录这种可能性。\n*   静态初始化块不能抛出任何受检异常。为什么？请记住，静态初始化块在类加载时被调用，因此调用者无法处理抛出的异常。此外，也无法在\
  \ throws 子句中声明受检异常。\n*   非静态初始化块可以抛出受检异常；但是，所有构造函数都应在其 throws 子句中声明这些异常。为什么？编译器在代码生成阶段会将非静态初始化块和构造函数的代码合并，因此可以使用构造函数的\
  \ throws 子句来声明非静态初始化块可能抛出的受检异常。\n*   重写方法不能在 throws 子句中声明比基方法 throws 子句中声明的异常列表更多的异常。为什么？基方法的调用者只能看到该方法\
  \ throws 子句中给出的异常列表，并会在其代码中声明或处理这些受检异常（而不会处理更多）。\n*   重写方法可以声明比基方法 throws 子句中列出的异常更具体的异常；换句话说，你可以在重写方法的\
  \ throws 子句中声明派生异常。\n*   如果一个方法在两个或多个接口中声明，并且该方法在这些接口的 throws 子句中声明抛出不同的异常，则实现应列出所有这些异常。\n\
  \n自定义异常\n\n在大多数情况下，使用 Java 库中已提供的异常就足够了。例如，如果你正在检查传递给公共函数的参数的有效性，并发现它们为 null 或超出预期范围，你可以抛出\
  \ `IllegalArgumentException`。然而，对于大多数非平凡的应用，你需要开发自己的异常类（自定义异常）来指示异常情况。\n\n\n\n如何定义自定义异常？有两种选择：你可以根据需求扩展\
  \ `Exception` 或 `RuntimeException` 类。如果你希望强制自定义异常的使用者处理该异常，则可以从 `Exception` 类扩展你的异常类，这将使你的自定义异常成为受检异常。如果你希望给自定义异常的使用者提供灵活性，由他们自行决定是否处理异常，则可以从\
  \ `RuntimeException` 类派生你的异常。因此，选择自定义异常的基类是一个设计决策。那么，扩展 `Throwable` 或 `Error` 类来创建自定义异常呢？`Throwable`\
  \ 类过于通用，不适合作为异常的基类，因此不推荐这样做。`Error` 类则保留用于 JVM 可能抛出的致命异常（例如 `StackOverflowError`），因此也不建议将其作为异常的基类。\n\
  \n| ![image](img/Note.jpg) | 自定义异常应扩展 `Exception` 或 `RuntimeException` 类。通过扩展 `Throwable`\
  \ 或 `Error` 类来创建自定义异常是一种不良实践。 |\n\n要扩展基类，你需要了解基类提供了哪些方法。在本例中，你希望通过扩展 `Exception`\
  \ 或 `RuntimeException` 类来创建自定义异常。由于 `Exception` 类是 `RuntimeException` 类的基类，因此了解\
  \ `Exception` 类的成员就足够了。表 11-4 列出了 `Exception` 类的重要方法（包括构造方法）。\n\n表 11-4. Exception\
  \ 类的重要方法和构造方法\n\n| 成员 | 简要描述 |\n| --- | --- |\n| `Exception()` | `Exception` 类的默认构造方法，不包含异常的额外（或详细）信息。\
  \ |\n| `Exception(String)` | 构造方法，接受一个包含异常详细信息的字符串作为参数。 |\n| `Exception(String,\
  \ Throwable)` | 除了接受一个详细信息的字符串作为参数外，此异常构造方法还接受异常的原因（即另一个异常）作为参数。 |\n| `Exception(Throwable)`\
  \ | 构造方法，接受异常的原因作为参数。 |\n| `String getMessage()` | 返回详细消息（创建异常时作为字符串传入）。 |\n| `Throwable\
  \ getCause()` | 返回异常的原因（如果有，否则返回 null）。 |\n| `Throwable[] getSuppressed()` | 以数组形式返回被抑制的异常列表（通常在使用\
  \ try-with-resources 语句时产生）。 |\n| `void printStackTrace()` | 将堆栈跟踪（即方法调用列表及相关的行号）打印到控制台（标准错误流）。如果异常中包含了原因（即另一个异常对象），则该信息也会被打印。此外，如果有任何被抑制的异常，它们也会被打印。\
  \ |\n\n为了说明如何创建自己的异常类，假设你想创建一个名为 `InvalidInputException` 的自定义异常。当你尝试读取输入（本例中为读取整数）时，如果失败，你想抛出这个\
  \ `InvalidInputException`。清单 11-23 通过扩展 `RuntimeException` 类定义了该异常类。\n\n清单 11-23.  InvalidInputException.java\n\
  \n```\n// 一个自定义的“非受检异常”，旨在当用户提供的输入无效时抛出\nclass InvalidInputException extends RuntimeException\
  \ {\n                // 默认构造方法\n                public InvalidInputException() {\n\
  \                                super();\n                }\n\n// 构造方法，接受我们在抛出异常时传递的字符串详细信息\n\
  \                public InvalidInputException(String str) {\n                  \
  \              super(str);\n                }\n\n// 构造方法，记录异常的原因并抛出新的异常\n      \
  \          public InvalidInputException(Throwable originalException) {\n       \
  \                         super(originalException);\n                }\n\n// 第一个参数接受抛出异常时创建的详细信息字符串\n\
  \                // 第二个参数用于记录异常的原因\n                public InvalidInputException(String\
  \ str, Throwable originalException) {\n                                super(str,\
  \ originalException);\n                }\n}\n```\n\n在这个 `InvalidInputException`\
  \ 类中，你没有引入任何新字段，但如果有必要，你可以添加任何字段。这也是一个简单的自定义异常，其构造方法只是调用了基类中相同类型的构造方法。类 `CustomExceptionTest`（参见清单\
  \ 11-24）展示了如何使用这个自定义异常。\n\n清单 11-24.  InvalidInputException.java\n\n```\nimport\
  \ java.util.*;\n\n// 用于测试自定义异常 InvalidInputException 的类\nclass CustomExceptionTest\
  \ {\n                public static int readIntFromConsole() {\n                \
  \                Scanner consoleScanner = new Scanner(System.in);\n            \
  \                    int typedInt = 0;\n                                try {\n\
  \                                                typedInt = consoleScanner.nextInt();\n\
  \                                } catch(NoSuchElementException nsee) {\n      \
  \                                          System.out.println(\"正在包装异常并抛出...\");\n\
  \nthrow new InvalidInputException(\"在控制台中输入了无效的整数\", nsee);\n                  \
  \              } catch(Exception e) {\n                                        \
  \        // 在此处处理所有其他异常...\n\nSystem.out.println(\"错误：遇到异常，无法从控制台读取整数... \");\n\
  \                                }\n                                return typedInt;\n\
  \                }\n                public static void main(String [] args) {\n\
  \                                System.out.println(\"请在控制台中输入一个整数：\");\n      \
  \                          try {\n\nSystem.out.println(\"你输入的整数值是：\" + readIntFromConsole());\n\
  \                                } catch(InvalidInputException iie) {\n        \
  \                                        System.out.println(\"错误：控制台输入无效... \");\n\
  \                        System.out.println(\"当前捕获的异常类型是：\" + iie);\n          \
  \              System.out.println(\"最初捕获的异常类型是：\" + iie.getCause());\n         \
  \                       }\n                }\n}\n```\n\n在阅读代码讨论之前，请先编译并运行此程序。\n\n\
  ```\nD:\\> java CustomExceptionTest\n请在控制台中输入一个整数：\none\n正在包装异常并抛出...\n错误：控制台输入无效...\n\
  当前捕获的异常类型是：InvalidInputException: 在控制台中输入了无效的整数\n最初捕获的异常类型是：java.util.InputMismatchException\n\
  ```\n\n在这段代码中，你使用 `InvalidInputException` 的方式与 Java 库中已定义的任何其他异常相同。你在 `main()` 方法中捕获了从\
  \ `readIntFromConsole()` 方法抛出的 `InvalidInputException`。以下语句调用了 `InvalidInputException`\
  \ 的 `toString()` 方法：\n\n```\nSystem.out.println(\"当前捕获的异常类型是：\" + iie);\n```\n\n\
  \n\n你没有重写 `toString()` 方法，因此 `InvalidInputException` 类从基类 `RuntimeException` 继承了\
  \ `toString()` 方法的默认实现。这个默认的 `toString()` 方法会打印所抛出异常的名称（`InvalidInputException`），并且还会包含你在创建异常对象时传入的详细信息字符串（“`Invalid\
  \ integer input typed in console`”）。`main()` 方法中的最后一条语句用于获取异常的原因。\n\n```\nSystem.out.println(\"\
  The originally caught exception is of type: \" + iie.getCause());\n```\n\n由于 `InvalidInputException`\
  \ 的原因是 `InputMismatchException`，因此该异常名称会以其完全限定名 `java.util.InputMismatchException`\
  \ 的形式打印在控制台中。你可以认为 `InputMismatchException` *导致*了 `InvalidInputException`；这两个异常被称为*链式异常*。\n\
  \n断言\n\n在创建应用程序时，你会做出许多假设。然而，经常会发生假设不成立的情况，从而导致错误状态。`assert` 语句用于检查或测试你对程序所做的假设。\n\
  \n关键字 `assert` 为 Java 中的断言提供了支持。每个断言语句都包含一个布尔表达式。如果布尔表达式的结果为 true，则表示假设成立，程序正常运行。但是，如果布尔结果为\
  \ false，则说明你对程序所做的假设不再成立，并且会抛出一个 `AssertionError`。请记住，`Error` 类及其派生类表示严重的运行时错误，并且不应该被处理。同样，如果抛出了\
  \ `AssertionError`，最佳做法是不要捕获该异常，而是让程序终止。之后，你需要检查假设为何不成立，然后修复程序。\n\n有很多理由说明你应该在程序中添加断言。一个原因是它有助于及早发现问题；当你在程序中检查假设时，如果其中任何一个假设失败，你就能立即知道问题出在哪里以及需要修复什么。此外，当其他程序员阅读你带有断言的代码时，他们能够更好地理解代码，因为你通过断言明确地表达了你的假设。\n\
  \n断言语句\n\nJava 中的断言语句有两种形式：\n\n```\n assert booleanExpression;\n\nassert booleanExpression\
  \ : \"Detailed error message string\";\n```\n\n如果在 assert 语句中使用了非布尔表达式，则会导致编译错误。清单\
  \ 11-25 包含了第一个关于断言的示例。\n\n清单 11-25.  AssertionExample1.java\n\n```\nclass AssertionExample1\
  \ {\n                public static void main(String []args) {\n                \
  \                int i = -10;\n                                if(i < 0) {\n   \
  \                                             // 如果为负值，则转换为正值\n                \
  \                                i = -i;\n                                }\n  \
  \                              System.out.println(\"the value of i is: \" + i);\n\
  \                                // 此时，假设 i 不能为负；\n                            \
  \    // 由于这是一个始终成立的假设，因此断言此条件\n                                assert (i >= 0) :\
  \ \"impossible: i is negative!\";\n                }\n}\n```\n\n在这个程序中，你检查了 i 的值是否小于\
  \ 0；你使用表达式 –i 将其转换为正值。一旦条件检查 `if (i < 0)` 完成，i 的值就不能为负，或者这是你的假设。这样的假设可以用 assert\
  \ 语句来断言。以下是 assert 语句：\n\n```\nassert (i >= 0) : \"impossible: i is negative!\"\
  ;\n```\n\n如果布尔表达式 `(i >= 0)` 求值为 true，程序将正常运行。但是，如果它求值为 false，程序将通过抛出 `AssertionError`\
  \ 而崩溃。让我们来检查这种行为（你需要使用 `–ea` 标志在运行时启用断言；我们稍后将详细讨论这个标志）。\n\n```\nD:\\>java -ea AssertionExample1\n\
  the value of i is: 10\n```\n\n是的，这个程序成功执行，没有抛出任何异常。\n\n是否存在某个 i 的值会导致条件失败？是的，存在！如果\
  \ i 的值是整数的最小可能值，那么它无法被转换为正值。为什么？请记住，整数的范围是 -2³¹ 到 2³¹ – 1，因此 i 的整数值范围为 –2147483648\
  \ 到 2147483647。换句话说，正值 2147483648 不在整数的范围内。所以，如果 `i` 的值是 –2147483648，那么表达式 `-i`\
  \ 将会*溢出*，结果再次得到值 –2147483648。因此，你的假设不成立。\n\n在清单 11-25 中，将 i 的值改为整数的最小值，如下所示：\n\n\
  ```\nint i = Integer.MIN_VALUE;\n```\n\n现在，尝试运行这个程序。\n\n```\nD:\\> java -ea AssertionExample1\n\
  the value of i is: -2147483648\nException in thread \"main\" java.lang.AssertionError:\
  \ impossible: i is negative!\n        at AssertionExample1.main(AssertionExample1.java:12)\n\
  ```\n\n在此输出中，请注意断言是如何失败的。应用程序崩溃是因为程序抛出了 `AssertionError`，并且没有处理器，因此程序终止。\n\n你看到断言在运行时是禁用的；要在运行时启用断言，请使用\
  \ `-ea` 开关（或其更长的形式 `-enableasserts`）。要在运行时禁用断言，请使用 `-da` 开关。如果断言在运行时默认是禁用的，那么 `-da`\
  \ 开关有什么用呢？有很多用途。例如，如果你想为给定包中的所有类启用断言，但又想禁用该包中特定类的断言，那么 `-da` 开关就很有用。表 11-5 列出了重要的命令行参数及其含义。请注意，你无需重新编译程序即可启用或禁用断言；只需在调用\
  \ JVM 时使用命令行参数来启用或禁用它们即可。\n\n表 11-5. 用于启用/禁用断言的重要命令行参数\n\n| 命令行参数 | 简短描述 |\n| ---\
  \ | --- |\n| `-ea` | 默认启用断言（系统类除外）。 |\n| `-ea:<类名>` | 为指定的类名启用断言。 |\n| `-ea:<包名>...`\
  \ | 为指定包 `<包名>` 中的所有成员启用断言。 |\n| `-ea:...` | 为指定的未命名包启用断言。 |\n| `-esa` | 是 `-enablesystemsassertions`\
  \ 的缩写；在系统类中启用断言。此选项很少使用。 |\n| `-da` | 默认禁用断言（系统类除外）。 |\n| `-da:<类名>` | 为指定的类名禁用断言。\
  \ |\n| `-ea:<包名>...` | 禁用指定包 `<包名>` 中所有成员的断言。 |\n| `-da:...` | 为指定的未命名包禁用断言。 |\n\
  | `-dsa` | 是 `-disablesystemsassertions` 的缩写；在系统类中禁用断言。此选项很少使用。 |\n\n如何不使用断言\n\n\
  理解断言的关键在于，它们对于调试和测试应用程序非常有用，并且断言在应用程序部署给最终用户时应该被禁用。\n\n\n\n*   不要使用断言来验证输入值或公共方法的参数。对于此类运行时故障，应使用异常来指示。\n\
  *   不要使用断言来检查应用程序正常运行所需的条件。由于断言在运行时默认是禁用的，当代码中不存在断言的条件时，应用程序将无法正常运行。\n*   `assert`语句中给出的布尔表达式不应有副作用——例如修改变量值、将值打印到控制台等。换句话说，无论断言是启用还是禁用，应用程序的功能都应保持不变。\n\
  \n**提问时间！**\n\n1.  考虑来自 `java.nio.file` 包的以下类层次结构并回答问题。\n\n![9781430247647_unFig11-04.jpg](img/9781430247647_unFig11-04.jpg)\n\
  \n在以下类定义中，基类 `Base` 有一个方法 `foo()`，该方法抛出 `FileSystemException`；派生类 `Deri` 继承自 `Base`\
  \ 并重写了 `foo()` 的定义。\n\n```\n    class Base {\n                    public void foo()\
  \ throws FileSystemException {\n                                    throw new FileSystemException(\"\
  \");\n                    }\n    }\n\nclass Deri extends Base {\n              \
  \      /* 在此处提供 foo 定义 */\n    }\n    ```\n\n以下 `Deri` 类中 `foo()` 方法的哪些重写定义与基类 `foo()`\
  \ 方法定义兼容？选择所有在替换注释 `/* 在此处提供 foo 定义 */` 后能够无编译错误通过的 `foo()` 方法定义。\n\n*   A.\n\n\
  ```\n        public void foo() throws IOException {           super.foo();\n   \
  \       }\n        ```\n\n*   B.\n\n```\n        public void foo() throws AccessDeniedException\
  \ {\n                              throw new AccessDeniedException(\"\");\n    \
  \      }\n        ```\n\n*   C.\n\n```\n        public void foo() throws FileSystemException,\
  \ RuntimeException {\n                              throw new NullPointerException();\n\
  \          }\n        ```\n\n*   D.\n\n```\n        public void foo() throws Exception\
  \ {\n                              throw new NullPointerException();\n         \
  \ }\n        ```\n\n**答案：** B 和 C。\n\n（在选项 A 和 D 中，`throws` 子句分别声明抛出 `IOException`\
  \ 和 `Exception`，它们比 `FileSystemException` 更通用，因此与基类方法定义不兼容。在选项 B 中，`foo()` 方法声明抛出\
  \ `AccessDeniedException`，它比 `FileSystemException` 更具体，因此与基类 `foo()` 方法的定义兼容。在选项\
  \ C 中，`throws` 子句声明抛出 `FileSystemException`，这与基类 `foo()` 方法的定义相同。此外，它还声明抛出 `RuntimeException`，这不是一个受检异常，因此\
  \ `foo()` 方法的定义与基类 `foo()` 方法的定义兼容）。\n\n2.  考虑以下程序：\n\n```\n    class ChainedException\
  \ {\n                    public static void foo() {\n                          \
  \          try {\n                                                    throw new\
  \ ArrayIndexOutOfBoundsException();\n                                    } catch(ArrayIndexOutOfBoundsException\
  \ oob) {\n                                                    RuntimeException re\
  \ = new RuntimeException(oob);\n                                               \
  \     re.initCause(oob);\n                                                    throw\
  \ re;\n                                    }\n                    }\n          \
  \          public static void main(String []args) {\n                          \
  \          try {\n                                                    foo();\n \
  \                                   } catch(Exception re) {\n                  \
  \                                  System.out.println(re.getClass());\n        \
  \                            }\n                    }\n    }\n    ```\n\n执行时，该程序会打印以下哪个选项？\n\
  \n*   A.  class java.lang.RuntimeException\n    *   B.  class java.lang.IllegalStateException\n\
  \    *   C.  class java.lang.Exception\n    *   D.  class java.lang.ArrayIndexOutOfBoundsException\n\
  \n**答案：** B. class java.lang.IllegalStateException\n\n（在表达式 `new RuntimeException(oob);`\
  \ 中，异常对象 `oob` 已经链接到了 `RuntimeException` 对象。不能在构造函数调用期间已经链接了异常对象的异常对象上调用 `initCause()`\
  \ 方法。因此，调用 `re.initCause(oob);` 会导致 `initCause()` 抛出一个 `IllegalStateException`。）\n\
  \n3.  考虑以下程序：\n\n```\n    class ExceptionTest {\n                    public static\
  \ void foo() {\n                                    try {\n                    \
  \                                throw new ArrayIndexOutOfBoundsException();\n \
  \                                   } catch(ArrayIndexOutOfBoundsException oob)\
  \ {\n                                                    throw new Exception(oob);\n\
  \                                    }\n                    }\n                \
  \    public static void main(String []args) {\n                                \
  \    try {\n                                                    foo();\n       \
  \                             } catch(Exception re) {\n                        \
  \                            System.out.println(re.getCause());\n              \
  \                      }\n                    }\n    }\n    ```\n\n以下哪个选项正确描述了此程序的行为？\n\
  \n*   A.  java.lang.Exception\n    *   B.  java.lang.ArrayIndexOutOfBoundsException\n\
  \    *   C.  class java.lang.IllegalStateException\n    *   D.  此程序因编译器错误而失败\n\n\
  **答案：** D. 此程序因编译器错误而失败\n\n（`foo()` 方法捕获了 `ArrayIndexOutOfBoundsException` 并将其链接到一个\
  \ `Exception` 对象。然而，由于 `Exception` 是一个受检异常，它必须在 `foo()` 的 `throws` 子句中声明。因此，此程序会导致以下编译器错误：\n\
  \n```\n    ExceptionTest.java:6: error: unreported exception Exception; must be\
  \ caught or declared to be thrown\n                            throw new Exception(oob);\n\
  \                            ^\n\n1 error)\n    ```\n\n4.  考虑以下程序：\n\n```\n    import\
  \ java.io.*;\n      import java.sql.*;\n\nclass MultiCatch {\n                 \
  \   public static void fooThrower() throws FileNotFoundException {\n           \
  \                         throw new FileNotFoundException();\n                 \
  \   }\n                    public static void barThrower() throws SQLException {\n\
  \                                    throw new SQLException();\n               \
  \     }\n                    public static void main(String []args) {\n        \
  \                            try {\n                                           \
  \         fooThrower();\n                                                    barThrower();\n\
  \                    } catch(FileNotFoundException || SQLException multie) {\n \
  \                                                   System.out.println(multie);\n\
  \                                    }\n                    }\n    }\n    ```\n\n\
  以下哪个选项正确描述了此程序的行为？\n\n*   A.  此程序打印以下内容：java.io.FileNotFoundException。\n    *  \
  \ B.  此程序打印以下内容：java.sql.SQLException。\n    *   C.  此程序打印以下内容：java.io.FileNotFoundException\
  \ || java.sql.SQLException。\n    *   D.  此程序因编译器错误而失败。\n\n**答案：** D. 此程序因编译器错误而失败。\n\
  \n（对于多捕获块，需要使用单竖线（`|`）符号，而不是双竖线（`||`），正如该程序中所提供的那样。因此，此程序将因编译器错误而失败。）\n\n5.  考虑来自\
  \ `javax.security.auth.login` 包的以下类层次结构并回答问题。\n\n\n\n![9781430247647_unFig11-05.jpg](img/9781430247647_unFig11-05.jpg)\n\
  \n*   5.1  下列哪个使用了多捕获异常处理特性的处理程序可以无错误地编译？\n    *   A.  `catch (AccountException\
  \ | LoginException exception)`\n    *   B.  `catch (AccountException | AccountExpiredException\
  \ exception)`\n    *   C.  `catch (AccountExpiredException | AccountNotFoundException\
  \ exception)`\n    *   D.  `catch (AccountExpiredException exception1 | AccountNotFoundException\
  \ exception2)`\n\n**答案：** C. `catch (AccountExpiredException | AccountNotFoundException\
  \ exception)`\n\n（对于 A 和 B，基类型处理程序与派生类型处理程序一同提供，因此多捕获不正确。对于 D，异常名称 exception1 是多余的，会导致语法错误。C\
  \ 是正确选项，可以无错误地编译。）\n\n6.  考虑以下代码片段，它使用了此异常层次结构：\n\n```\n    try {\n         LoginException\
  \ le = new AccountNotFoundException();\n              throw (Exception) le;\n  \
  \     }\n       catch (AccountNotFoundException anfe) {\n            System.out.println(\"\
  在 AccountNotFoundException 的处理程序中\");\n       }\n       catch (AccountException\
  \ ae) {\n            System.out.println(\"在 AccountException 的处理程序中\");\n      \
  \ }\n       catch (LoginException le) {\n            System.out.println(\"在 LoginException\
  \ 的处理程序中\");\n       }\n       catch (Exception e) {\n            System.out.println(\"\
  在 Exception 的处理程序中\");\n       }\n    ```\n\n执行时，此代码片段将打印以下哪个语句？\n\n*   A.  在 AccountNotFoundException\
  \ 的处理程序中\n    *   B.  在 AccountException 的处理程序中\n    *   C.  在 LoginException 的处理程序中\n\
  \    *   D.  在 Exception 的处理程序中\n\n**答案：** A. 在 AccountNotFoundException 的处理程序中\n\
  \n（在此代码中，异常的创建类型是 `AccountNotFoundException`。虽然异常对象存储在 `LoginException` 类型的变量中，然后被类型转换为\
  \ `Exception`，但异常的动态类型保持不变，仍然是 `AccountNotFoundException`。在查找 catch 处理程序时，Java 运行时根据对象的动态类型查找精确的处理程序。由于它立即作为第一个处理程序可用，因此这个完全匹配的\
  \ catch 处理程序被执行。）\n\n总结\n\n异常处理简介\n\n*   当 try 块中抛出异常时，JVM 会在方法调用链的 catch 处理程序列表中查找匹配的\
  \ catch 处理程序。如果未找到匹配的处理程序，则该未处理的异常将导致应用程序崩溃。\n*   在提供多个异常处理程序（堆叠的 catch 处理程序）时，应在通用异常处理程序之前提供特定的异常处理程序。在派生处理程序之前提供基异常处理程序将导致编译器错误。\n\
  *   你可以使用诸如 `printStackTrace()` 和 `getStackTrace()` 之类的方法以编程方式访问堆栈跟踪，这些方法可以在任何异常对象上调用。\n\
  *   一个 try 块可以有多个 catch 处理程序。如果两个或多个异常的原因相似，并且处理代码也相似，你可以考虑合并这些处理程序，使其成为一个多捕获块。\n\
  *   无论 try 块是成功执行还是导致异常，finally 块中的代码都将被执行。这使得 finally 块成为释放资源（如文件句柄、数据库句柄、网络流等）最合适的地方。\n\
  \nTry-with-Resources\n\n*   忘记通过显式调用 `close()` 方法来释放资源是一个常见错误。你可以使用 try-with-resources\
  \ 语句来简化代码并自动关闭资源。要使资源在 try-with-resources 语句中可用，该资源的类必须实现 `java.lang.AutoCloseable`\
  \ 接口并定义 `close()` 方法。\n*   你可以在一个 try-with-resources 语句中自动关闭多个资源。这些资源需要在 try-with-resources\
  \ 语句头部用分号分隔。\n*   由于你可以在一个 try-with-resources 语句中使用多个资源，因此 try 块和 finally 块中抛出多个异常的可能性很高。如果\
  \ try 块抛出一个异常，并且 finally 块也抛出了异常，那么 finally 块中抛出的异常将被添加为抑制异常，附加到从 try 块抛出给调用者的异常上。\n\
  \n异常类型\n\n*   `Throwable` 类是异常层次结构的根类。只有 `Throwable` 及其派生类可以与 Java 异常处理关键字（如 try、catch\
  \ 和 throws）一起使用。\n*   `Exception` 类（除了其 `RuntimeException` 类的子层次结构）及其派生类被称为*受检异常*。这些异常表示程序执行时*可以合理预期*会发生的异常情况，因此必须处理它们。包含可能抛出受检异常的代码段的方法必须提供\
  \ catch 处理程序来处理它，或者在其 throws 子句中声明该异常。\n*   `RuntimeException` 和 `Error` 类及其派生类被称为*非受检异常*。它们可以在程序中的任何位置抛出（无需声明该代码段可能抛出这些异常）。\n\
  *   `RuntimeException` 类及其派生类表示编程错误（逻辑错误），并且*通常*不期望在程序中被捕获和处理。然而，在某些情况下，在 catch\
  \ 块中处理这些异常是有意义的。\n*   `Error` 类及其派生类表示由于 JVM 错误而引发的异常；要么是 JVM 检测到严重的异常情况，要么是资源耗尽。当发生\
  \ `Error` 时，*典型*的最佳做法是终止程序。\n*   catch 块应该处理异常或重新抛出它。通过捕获异常而不做任何操作来*隐藏*或*吞没*异常实际上是一种不良实践。\n\
  \nThrows 子句\n\n*   方法的 throws 子句用于列出方法体可能抛出的*受检异常*。\n*   静态初始化块不能抛出任何受检异常。非静态初始化块可以抛出受检异常；但是，所有构造函数都应在其\
  \ throws 子句中声明该异常。\n*   方法的 throws 子句是其派生类中重写方法应遵守的契约的一部分。重写方法可以提供与基方法 throws 子句相同的\
  \ throws 子句，或者比基方法 throws 子句更具体的 throws 子句。与基方法的 throws 子句相比，重写方法不能提供更通用的 throws\
  \ 子句，也不能声明抛出额外的受检异常。\n\n自定义异常\n\n*   你可以在程序中定义自己的异常类（称为自定义异常）。\n*   建议你从 `Exception`\
  \ 或 `RuntimeException` 类派生自定义异常。不建议通过扩展 `Throwable` 类（过于通用）或 `Error` 类（此类型的异常保留给\
  \ JVM 和 Java API 抛出）来创建自定义异常。\n*   你可以包装一个异常并将其作为另一个异常抛出。这两个异常成为*链式异常*。从抛出的异常中，你可以获取异常的原因。\n\
  \n断言\n\n\n\n*   断言是程序中的条件检查，用于显式验证你在编写程序时所做的假设。\n*   `assert` 语句有两种形式：一种接受布尔参数，另一种接受一个额外的字符串参数。\n\
  *   如果断言参数中给定的布尔条件失败（即计算结果为 false），程序将在抛出 `AssertionError` 后终止。当程序抛出 `AssertionError`\
  \ 时，不建议捕获并恢复程序。\n*   默认情况下，断言在运行时是禁用的。你可以在调用 JVM 时使用命令行参数 `–ea`（用于启用断言）和 `–da`（用于禁用断言）及其变体。\n\
  \n第 12 章\n\n![image](img/frontdot.jpg)\n\n本地化\n\n![9781430247647_unFig12-01.jpg](img/9781430247647_unFig12-01.jpg)\n\
  \n如今，计算机和软件已经非常普及，在世界各地的人类活动中无处不在。任何软件要想对用户有用且相关，都需要进行本地化。我们将软件适应当地语言和习俗的过程称为*本地化*。一个*区域设置*代表一个国家独特的语言、文化、数字、货币等集合。\n\
  \nJava 为软件应用程序的本地化提供了良好的支持；我们将在本章详细讨论相关主题。尽管 Java 支持 Unicode，并且大多数计算机都具备显示多种语言文本所需的字体，但主动将软件适配到不同区域设置是我们的职责。例如，本地化不仅仅意味着为某个区域设置显示文本——它还可能意味着为该区域设置使用音频或视频片段。此外，还需要考虑与显示日期、时间或使用当地货币相关的方面。\n\
  \n在本章中，你将学习如何本地化你的软件。本地化主要涉及为不同的区域设置创建*资源包*，以及通过使软件适应不同区域的使用来使其具有文化感知能力。我们将在前三节中向你展示如何创建和使用这些资源包。在最后一节中，我们将教你如何处理不同区域设置的时间和日期、数字以及货币。\n\
  \n引言\n\n本地化就是让软件对不同文化的用户具有相关性和可用性——换句话说，就是为来自不同国家或语言的人们定制软件。如何本地化一个软件应用程序？在本地化软件应用程序时，应遵循两个重要准则：\n\
  \n*   不要硬编码文本（例如给用户的消息、GUI 中的文本元素等），而是将它们分离到外部文件或专用类中。完成此操作后，通常只需最少的努力即可在你的软件中增加对新区域设置的支持。\n\
  *   处理特定于文化的方面，如日期、时间、货币和数字格式，并始终考虑本地化。不要假设默认区域设置，而应设计成能够获取并定制当前区域设置的方式。\n\n| ![image](img/Note.jpg)\
  \ | 文本可能不是应用程序中唯一需要本地化的内容。例如，如果你的应用程序使用音频声音来提供指令，那么为了本地化，这些声音也需要更改。类似地，如果软件为特定区域设置显示某些字形或图片，它们也需要进行转换。\
  \ |\n\n区域设置\n\n区域设置是“代表一个国家、语言或文化的地方”。以加拿大-法语区域设置为例。加拿大许多地方都讲法语，这可以作为一个区域设置。换句话说，如果你想销售为讲法语的加拿大人定制的软件，那么你需要为这个区域设置提供支持。在\
  \ Java 中，这个区域设置由代码 fr_CA 表示，其中 fr 是法语的缩写，CA 是加拿大的缩写；我们将在本节后面更详细地讨论区域设置的命名方案。\n\n\
  Locale 类\n\n在 Java 中，`Locale` 类为区域设置提供了编程支持。表 12-1 列出了该类中的重要方法。\n\n表 12-1. Locale\
  \ 类中的重要方法\n\n| 方法 | 简短描述 |\n| --- | --- |\n| `static Locale[] getAvailableLocales()`\
  \ | 返回 JVM 支持的可用区域设置（即已安装的区域设置）列表。 |\n| `static Locale getDefault()` | 返回 JVM 的默认区域设置。\
  \ |\n| `static void setDefault(Locale newLocale)` | 设置 JVM 的默认区域设置。 |\n| `String\
  \ getCountry()` | 返回区域设置对象的国家*代码*。 |\n| `String getDisplayCountry()` | 返回区域设置对象的国家*名称*。\
  \ |\n| `String getLanguage()` | 返回区域设置对象的语言*代码*。 |\n| `String getDisplayLanguage()`\
  \ | 返回区域设置对象的语言*名称*。 |\n| `String getVariant()` | 返回区域设置对象的变体*代码*。 |\n| `String\
  \ getDisplayVariant()` | 返回区域设置对象变体代码的*名称*。 |\n| `String toString()` | 返回一个由区域设置的语言、国家、变体等代码组成的\
  \ `String`。 |\n\n清单 12-1 中的代码检测默认区域设置并检查 JVM 中的可用区域设置。\n\n清单 12-1.  AvailableLocales.java\n\
  \n```\nimport java.util.Locale;\n\nclass AvailableLocales {\n        public static\
  \ void main(String []args) {\n                System.out.println(\"The default locale\
  \ is: \" + Locale.getDefault());\n                Locale [] locales = Locale.getAvailableLocales();\n\
  \                System.out.printf(\"No. of other available locales is: %d, and\
  \ they are: %n\",\n                locales.length);\n                for(Locale\
  \ locale : locales) {\n                        System.out.printf(\"Locale code:\
  \ %s and it stands for %s %n\",     \n                        locale, locale.getDisplayName());\n\
  \       }\n        }\n} \n```\n\n它打印出以下内容：\n\n```\nThe default locale is: en_US\n\
  No. of other available locales is: 156, and they are:\nLocale code: ms_MY and it\
  \ stands for Malay (Malaysia)\nLocale code: ar_QA and it stands for Arabic (Qatar)\n\
  Locale code: is_IS and it stands for Icelandic (Iceland)\nLocale code: sr_RS_#Latn\
  \ and it stands for Serbian (Latin,Serbia)\nLocale code: no_NO_NY and it stands\
  \ for Norwegian (Norway,Nynorsk)\nLocale code: th_TH_TH_#u-nu-thai and it stands\
  \ for Thai (Thailand,TH)\nLocale code: fr_FR and it stands for French (France)\n\
  Locale code: tr and it stands for Turkish\nLocale code: es_CO and it stands for\
  \ Spanish (Colombia)\nLocale code: en_PH and it stands for English (Philippines)\n\
  Locale code: et_EE and it stands for Estonian (Estonia)\nLocale code: el_CY and\
  \ it stands for Greek (Cyprus)\nLocale code: hu and it stands for Hungarian\n [...rest\
  \ of the output elided...]\n```\n\n在分析输出之前，我们先看看程序中的方法。你使用 `Locale` 中的 `getDefault()`\
  \ 方法来获取默认区域设置的代码。之后，你使用 `Locale` 类中的 `getAvailableLocales()` 来获取 JVM 中可用区域设置的列表。现在，对于每个区域设置，你通过隐式调用\
  \ `locale` 的 `toString()` 方法来打印区域设置的代码，并使用 `Locale` 的 `getDisplayName()` 方法来打印描述性名称。\n\
  \n该程序将此 JVM 的默认区域设置打印为 en_US，这意味着默认区域设置是美国使用的英语。然后它打印出一个非常长的可用区域设置列表；为了节省空间，我们只展示了输出的一小部分。从这个程序中，你可以知道有许多可用的、受支持的区域设置，并且每个\
  \ JVM 都有一个与之关联的默认区域设置。\n\n此输出中有四种不同类型的区域设置代码：\n\n\n\n*   只有一个代码，如上所示最后一个条目：hu 代表匈牙利语。\n\
  *   由下划线分隔的两个代码，如第一个区域设置所示，ms_MY，其中 ms 代表马来西亚，MY 代表马来语。\n*   由下划线分隔的三个代码，如 no_NO_NY，其中\
  \ no 代表挪威，NO 代表挪威语，NY 代表尼诺斯克语。\n*   由下划线分隔的两个或三个初始代码，最后一个代码由 # 或 _# 分隔，如 th_TH_TH_#u-nu-thai，我们接下来将讨论这个。这些区域设置名称的编码方式如下：\n\
  \n```\nlanguage + \"_\" + country + \"_\" + (variant + \"_#\" | \"#\") + script\
  \ + \"-\" + extensions\n```\n\n对于区域设置代码 th_TH_TH_#u-nu-thai，\n\n*   语言代码是 th（泰语），并且始终小写。\n\
  *   国家/地区代码是 TH（泰国），并且始终大写。\n*   变体名称是 TH；这里它重复了国家/地区代码，但它可以是任何字符串。\n*   脚本名称在这里是一个空字符串；如果给出，它将是一个四字母字符串，首字母大写，其余字母小写（例如，Latn）。\n\
  *   扩展名跟在 # 或 _# 字符之后；在此示例中是 u-nu-thai。\n\n这种编码方案允许即使在同一种语言内也存在编程变体。例如，许多国家都说英语，并且根据说英语的国家，语言也存在差异。我们都知道美式英语与英式英语不同，但还有许多其他版本。让我们更改清单\
  \ 12-1 中的循环，仅列出与英语相关的区域设置，如下所示：\n\n```\nfor(Locale locale : locales) {\n       \
  \ // 过滤并仅显示英语区域设置\n        if(locale.getLanguage().equals(\"en\")) {\n         \
  \       System.out.printf(\"区域设置代码: %s 代表 %s %n\",\n                locale, locale.getDisplayName());\n\
  \        }\n}\n```\n\n它会打印以下内容：\n\n```\n区域设置代码: en_MT 代表 英语 (马耳他)\n区域设置代码: en_GB\
  \ 代表 英语 (英国)\n区域设置代码: en_CA 代表 英语 (加拿大)\n区域设置代码: en_US 代表 英语 (美国)\n区域设置代码: en_ZA\
  \ 代表 英语 (南非)\n区域设置代码: en 代表 英语\n区域设置代码: en_SG 代表 英语 (新加坡)\n区域设置代码: en_IE 代表 英语 (爱尔兰)\n\
  区域设置代码: en_IN 代表 英语 (印度)\n区域设置代码: en_AU 代表 英语 (澳大利亚)\n区域设置代码: en_NZ 代表 英语 (新西兰)\n\
  区域设置代码: en_PH 代表 英语 (菲律宾)\n```\n\n输出指的是英语中的不同区域设置。你使用 `Locale` 中的 `getLanguage()`\
  \ 方法，该方法返回区域设置代码。还有哪些其他类似的方法？你现在将探索 `Locale` 类中可用的方法。\n\n获取区域设置详细信息\n\n`Locale`\
  \ 类中的 getter 方法，例如 `getLanguage()`、`getCountry()` 和 `getVariant()`，返回*代码*，而类似的方法\
  \ `getDisplayCountry()`、`getDisplayLanguage()` 和 `getDisplayVariant()` 返回*名称*。清单\
  \ 12-2 说明了如何对区域设置 `Locale.CANADA_FRENCH` 使用这些方法。\n\n清单 12-2.  LocaleDetails.java\n\
  \n```\nimport java.util.Locale;\n\npublic class LocaleDetails {\n        public\
  \ static void main(String args[]) {\n                Locale.setDefault(Locale.CANADA_FRENCH);\n\
  \                Locale defaultLocale = Locale.getDefault();\n                System.out.printf(\"\
  默认区域设置为 %s %n\", defaultLocale);\n                System.out.printf(\"默认语言代码为 %s，名称为\
  \ %s %n\",\n                defaultLocale.getLanguage(), defaultLocale.getDisplayLanguage());\n\
  \                System.out.printf(\"默认国家/地区代码为 %s，名称为 %s %n\",\n              \
  \  defaultLocale.getCountry(), defaultLocale.getDisplayCountry());\n           \
  \     System.out.printf(\"默认变体代码为 %s，名称为 %s %n\",\n                defaultLocale.getVariant(),\
  \ defaultLocale.getDisplayVariant());\n        }\n}\n```\n\n它会打印以下内容：\n\n```\n默认区域设置为\
  \ fr_CA\n默认语言代码为 fr，名称为 français\n默认国家/地区代码为 CA，名称为 Canada\n默认变体代码为 ，名称为 Canada\n\
  ```\n\n让我们理解这个程序。`setDefault()` 方法接受一个 `Locale` 对象作为参数。在这个程序中，你使用以下语句将默认区域设置设置为\
  \ `Locale.CANADA_FRENCH`：\n\n```\nLocale.setDefault(Locale.CANADA_FRENCH);\n```\n\
  \n`Locale` 类有许多表示常见区域设置的静态 `Locale` 对象，这样你就不必实例化它们并直接在程序中使用它们。在这种情况下，`Locale.CANADA_FRENCH`\
  \ 是一个静态的 `Locale` 对象。除了使用这个静态的 `Locale` 对象，你也可以选择实例化一个 `Locale` 对象。以下是创建新的加拿大（法语）区域设置对象来设置默认区域设置的另一种方法：\n\
  \n```\nLocale newLocale = new Locale(\"fr\", \"CA\", \"\");\nLocale.setDefault(newLocale);\n\
  ```\n\n`Locale` 中的 `getDefault()` 方法返回在 JVM 中设置的默认区域设置对象。下一条语句使用方法来获取与国家/地区相关的信息。`getCountry()`\
  \ 和 `getDisplayCountry()` 方法之间的区别在于，前者返回国家/地区代码（对我们来说不太易读），而后者返回国家/地区名称，这是人类可读的。国家/地区代码是一个由两个或三个字母组成的代码（此代码来自国际标准：ISO\
  \ 3166）。\n\n`getLanguage()` 和 `getDisplayLanguage()` 的行为与获取国家/地区详细信息类似。语言代码由两个或三个字母组成，此代码来自另一个国际标准（ISO\
  \ 639）。\n\n此区域设置中没有变体，因此当你使用 `getVariant()` 和 `getDisplayVariant()` 方法时，没有打印任何内容。但是，对于其他一些区域设置，可能存在变体值，并且这些值将针对该区域设置打印出来。变体可以是任何额外的详细信息，例如操作系统环境（如\
  \ MAC 代表 Macintosh 机器）或公司名称（如 Sun 或 Oracle）。\n\n除此之外，你还有一些使用较少的方法，例如 `getScript()`，它返回区域设置的脚本代码。\n\
  \n资源包\n\n在上一节中，我们讨论了 `Locale` 类以及获取默认区域设置和可用区域设置列表详细信息的方法。你如何*使用*此区域设置信息来自定义程序的行为？让我们举一个简单的问候示例：在英语中，你说“Hello”，但如果区域设置不同，你如何更改此问候语，例如，如果区域设置是意大利（和意大利语），则说“Ciao”？\n\
  \n一个显而易见的解决方案是获取默认区域设置，检查区域设置是否为意大利，然后打印“Ciao”。这可行，但这种方法既不灵活也不可扩展。如何自定义到其他区域设置，例如沙特阿拉伯（阿拉伯语）或印度（印地语）？你必须查找并替换所有特定于区域设置的字符串，以便为每个区域设置进行自定义；如果你的应用程序包含数千个此类字符串，分布在数百万行代码中，那么这项任务将是一场噩梦。\n\
  \n\n\n在 Java 中，资源包提供了一种解决方案，用于根据特定区域设置的需求定制应用程序。那么，什么是资源包？资源包是一组类或属性文件，用于定义一组键，并将这些键映射到特定区域设置的值。\n\
  \n抽象类 `ResourceBundle` 提供了 Java 中资源包的抽象。它有两个派生类：`PropertyResourceBundle` 和 `ListResourceBundle`（参见图\
  \ 12-1）。这两个派生类通过两种不同的机制为资源包提供支持：\n\n![9781430247647_Fig12-01.jpg](img/9781430247647_Fig12-01.jpg)\n\
  \n图 12-1.  ResourceBundle 及其两个派生类\n\n*   **`PropertyResourceBundle` 类：** 这个具体类以属性文件的形式为多种区域设置提供支持。对于每个区域设置，你可以在该区域设置的属性文件中指定键和值。对于给定的区域设置，如果你使用\
  \ `ResourceBundle.getBundle()` 方法，相关的属性文件将被自动加载。当然，这并非魔法；你必须遵循特定的命名约定来创建属性文件，我们将在专门讨论属性文件的章节中对此进行说明。使用属性文件时，你只能使用\
  \ `Strings` 作为键和值。\n*   **`ListResourceBundle` 类：** 要为某个区域设置添加支持，你可以扩展这个抽象类。在你的派生类中，你必须重写\
  \ `getContents()` 方法，该方法返回一个 `Object [][]`。这个数组必须包含键和值的列表。键必须是 `Strings`。通常值也是 `Strings`，但值可以是任何东西：声音片段、视频片段、URL\
  \ 或图片。\n\n让我们快速浏览一下 `ResourceBundle` 抽象类支持的方法。表 12-2 总结了该类的重要方法。我们现在将讨论使用 `ResourceBundle`\
  \ 的这两个派生类来实现本地化支持。\n\n表 12-2. ResourceBundle 抽象类中的重要方法\n\n| 方法 | 简短描述 |\n| --- |\
  \ --- |\n| `Object getObject(String key)` | 返回映射到给定键的值。如果未找到给定键的对象，则抛出 `MissingResourceException`。\
  \ |\n| `static ResourceBundle getBundle(String baseName)`, `static final ResourceBundle\
  \ getBundle(String baseName, Locale locale)` `final ResourceBundle getBundle(String\
  \ baseName, Locale targetLocale, Control control)` | 返回给定 `baseName`、`locale` 和\
  \ `control` 的 `ResourceBundle`；如果未找到匹配的资源包，则抛出 `MissingResourceException`。`Control`\
  \ 实例用于控制或获取有关资源包加载过程的信息。 |\n| `string getString(String key)` | 返回映射到给定键的值；等同于将 `getObject()`\
  \ 的返回值强制转换为 `String`。如果未找到给定键的对象，则抛出 `MissingResourceException`。如果返回的对象不是 `String`，则抛出\
  \ `ClassCastException`。 |\n\n使用 PropertyResourceBundle\n\n如果你在设计应用程序时考虑使用属性文件进行本地化，那么你可以为应用程序添加对新区域设置的支持，*而无需更改任何代码*！\n\
  \n我们现在来看一个使用资源文件的示例，这样你就会明白了。让我们从一个非常简单的程序开始，该程序向用户打印“Hello”。这个程序有三个属性文件资源包：\n\n\
  1.  默认资源包，假设为英语（美国）区域设置。\n2.  阿拉伯语区域设置的资源包。\n3.  意大利语区域设置的资源包。\n\n如上所述，属性文件在文件中将字符串定义为键值对。以下是一个可以映射到你机器上实际路径的类路径示例：`classpath\
  \ = C:\\Program Files\\Java\\jre7`。属性文件通常包含许多这样的键值对，每对各占一行，如下所示：\n\n```\nclasspath\
  \ = C:\\Program Files\\Java\\jre7\ntemp = C:\\Windows\\Temp\nwindir = C:\\Windows\n\
  ```\n\n在本地化的情况下，你使用属性文件将相同的键字符串映射到不同的值字符串。在程序中，你将引用键字符串，并通过加载与区域设置匹配的属性文件，从属性文件中获取键对应的值，以供程序使用。\n\
  \n这些属性文件的命名很重要（你很快就会明白为什么），以下是这些资源包的内容。为了保持示例简单，这些属性文件中只有一个键值对；在实际程序中，每个属性文件中可能有几百甚至几千个键值对。\n\
  \n```\nD:\\ > type ResourceBundle.properties\nGreeting = Hello\n\nD:\\ > type ResourceBundle_ar.properties\n\
  Greeting = As-Salamu Alaykum\n\nD:\\ > type ResourceBundle_it.properties\nGreeting\
  \ = Ciao\n```\n\n如你所见，默认包名为 ResourceBundle.properties。阿拉伯语的资源包名为 ResourceBundle_ar.properties。注意后缀\
  \ _ar，表示阿拉伯语为本地语言。类似地，意大利语的资源包名为 ResourceBundle_it.properties，它使用后缀 _it 来表示意大利语是与该属性文件关联的语言。清单\
  \ 12-3 使用了这些资源包。\n\n清单 12-3.  LocalizedHello.java\n\n```\nimport java.util.*;\n\n\
  public class LocalizedHello {\n        public static void main(String args[]) {\n\
  \                Locale currentLocale = Locale.getDefault();\n                ResourceBundle\
  \ resBundle =\n                        ResourceBundle.getBundle(\"ResourceBundle\"\
  , currentLocale);\n                System.out.printf(resBundle.getString(\"Greeting\"\
  ));\n        }\n}\n```\n\n有两种方法可以按预期方式运行此程序：\n\n*   **选项 I：** 通过调用 `setDefault()`\
  \ 方法更改程序中的默认区域设置：\n\n```\nLocale.setDefault(Locale.ITALY);\n```\n\n不推荐此选项，因为它需要更改程序来设置区域设置。\n\
  \n*   **选项 II：** 在从命令行调用 JVM 时更改默认区域设置（如果你从 IDE 调用 JVM，请在 IDE 设置中为 JVM 提供命令行参数）：\n\
  \n```\nD:\\ > java -Duser.language = it -Duser.region = IT LocalizedHello\n```\n\
  \n让我们尝试使用选项 II（在调用 JVM 时向命令行传递参数）来设置区域设置并运行程序。\n\n```\nD:\\ > java LocalizedHello\n\
  Hello\nD:\\ > java -Duser.language=it LocalizedHello\nCiao\nD:\\ > java -Duser.language=ar\
  \ LocalizedHello\nAs-Salamu Alaykum\n```\n\n如你所见，根据你显式设置的区域设置（本例中为意大利语或阿拉伯语）或默认区域设置（本例中为美国英语），会加载相应的属性文件并解析消息字符串。\n\
  \n| ![image](img/banana.jpg) | 如果你忘记创建属性文件，或者它们不在路径中，你将收到 `MissingResourceException`。\
  \ |\n\n在程序中，你首先在语句中获取当前区域设置。\n\n```\nLocale currentLocale = Locale.getDefault();\n\
  ```\n\n之后，你加载以名称 ResourceBundle 开头的资源包，并传递区域设置以加载该资源包。\n\n```\nResourceBundle resBundle\
  \ = ResourceBundle.getBundle(\"ResourceBundle\", currentLocale);\n```\n\n最后，从资源包中，你查找键“Greeting”，并根据加载的资源包使用该键的值。\n\
  \n```\nSystem.out.printf(resBundle.getString(\"Greeting\"));\n```\n\n使用 ListResourceBundle\n\
  \n\n\n可以通过扩展 `ListResourceBundle` 来添加对新语言环境的支持。在扩展 `ListResourceBundle` 时，你需要重写抽象方法\
  \ *getContents()*；该方法的签名如下：\n\n```\nprotected Object[][] getContents();\n```\n\n\
  请注意，键是 `Strings`，但值可以是任何类型，因此数组类型是 `Object`；此外，该方法返回一个键值对列表。因此，`getContents()` 方法返回一个二维的\
  \ `Objects` 数组。\n\n清单 12-4 展示了一个扩展 `ListResourceBundle` 的示例，该示例旨在返回特定语言环境下票房最高的电影。它定义了一个名为\
  \ `ResBundle` 的资源包。由于类名没有任何后缀（例如 _it 或 _en_US），因此它是该资源包的默认实现。当为任何语言环境查找匹配的 `ResBundle`\
  \ 时，如果未找到匹配项，将使用此默认实现。\n\n清单 12-4.  ResBundle.java\n\n```\nimport java.util.*;\n\
  \n// 默认的美国英语版本\npublic class ResBundle extends ListResourceBundle {\n        public\
  \ Object[][] getContents() {\n                        return contents;\n       \
  \ }\n        static final Object[][] contents = {\n                { \"MovieName\"\
  , \"Avatar\" },\n                { \"GrossRevenue\", (Long) 2782275172L }, // 以美元计\n\
  \                { \"Year\", (Integer)2009 }\n        };\n}\n```\n\n现在，让我们为意大利语环境定义一个\
  \ `ResBundle`。给该类添加后缀 _it_IT。语言代码 it 代表意大利语，国家代码 IT 代表意大利。参见清单 12-5。\n\n清单 12-5.\
  \  ResBundle_it_IT.java\n\n```\nimport java.util.*;\n\n// 意大利语版本\npublic class ResBundle_it_IT\
  \ extends ListResourceBundle {\n        public Object[][] getContents() {\n    \
  \                    return contents;\n        }\n        static final Object[][]\
  \ contents = {\n                { \"MovieName\", \"Che Bella Giornata\" },\n   \
  \             { \"GrossRevenue\", (Long) 43000000L }, // 以欧元计\n                {\
  \ \"Year\", (Integer)2011 }\n        };\n}\n```\n\n如你所见，`ResBundle` 和 `ResBundle_it_IT`\
  \ 的实现除了映射到键的值不同之外，其他都是相似的。现在，你如何知道你的资源包是否正常工作呢？清单 12-6 为默认语言环境和意大利语环境加载了 `ResBundle`。\n\
  \n清单 12-6.  LocalizedHello2.java\n\n```\nimport java.util.*;\n\npublic class LocalizedHello2\
  \ {\n        public static void printMovieDetails(ResourceBundle resBundle) {\n\
  \                String movieName = resBundle.getString(\"MovieName\");\n      \
  \          Long revenue = (Long)(resBundle.getObject(\"GrossRevenue\"));\n     \
  \           Integer year = (Integer) resBundle.getObject(\"Year\");\n\nSystem.out.println(\"\
  Movie \" + movieName + \"(\" + year \")\" + \" grossed \"\n                + revenue\
  \ );\n        }\n        public static void main(String args[]) {\n            \
  \    // 打印默认（美国）语言环境下票房最高的电影\n                Locale locale = Locale.getDefault();\n\
  \                printMovieDetails(ResourceBundle.getBundle(\"ResBundle\", locale));\n\
  \n// 打印意大利语环境下票房最高的电影\n                locale = new Locale(\"it\", \"IT\", \"\"\
  );\n                printMovieDetails(ResourceBundle.getBundle(\"ResBundle\", locale));\n\
  \        }\n}\n```\n\n它会打印以下内容：\n\n```\nMovie Avatar (2009) grossed 2782275172\n\
  Movie Che Bella Giornata (2011) grossed 43000000\n```\n\n它成功加载了默认和意大利语的资源包。然而，这个输出存在一些问题。值\
  \ 2782275172 是美元值，而值 43000000 是欧元。此外，这些数字打印时没有逗号，因此很难理解这些数字的含义。这些值也需要进行本地化，我们将在本章的最后一节重新讨论这个主题。\n\
  \n现在，考虑这个程序中的以下语句：\n\n```\nLong revenue = (Long)(resBundle.getObject(\"GrossRevenue\"\
  ));\n```\n\n这条语句返回资源包中映射到键名为 GrossRevenue 的值。你在 `ResBundle` 和 `ResBundle_it_IT`\
  \ 类中将其定义为整数对象——所以它起作用了。如果你错误地转换了类型，将会得到一个 `ClassCastException`。\n\n此外，请注意*键名是区分大小写的，并且键名必须完全匹配*——否则你会得到一个\
  \ `MissingResourceException`。例如，在这条语句中，如果你将键名 GrossRevenue 误拼为 GrossRevenu，程序将因以下异常而崩溃：\n\
  \n```\nThe Exception in the thread \"main\" java.util.MissingResourceException:\
  \ Can't find resources for bundle ResBundle, key GrossRevenu \n```\n\n| ![image](img/Note.jpg)\
  \ | 通过扩展 `ListResourceBundle` 类来创建资源包，而使用 `PropertyResourceBundle` 时，则将资源包创建为属性文件。此外，扩展\
  \ `ListResourceBundle` 时，你可以使用任何类型的对象作为值，而属性文件中的值只能是字符串。 |\n\n加载资源包\n\n在你编写的程序中，你已经使用\
  \ `ResourceBundle` 或其两个派生类加载过资源包。你需要彻底理解这个加载过程，我们将在本节中更详细地介绍它。\n\n查找匹配资源包的过程，对于从\
  \ `ListResourceBundles` 扩展的类，与为 `PropertyResourceBundles` 定义的属性文件是相同的。\n\n| ![image](img/banana.jpg)\
  \ | 对于实现为从 `ListResourceBundles` 扩展的类的资源包，Java 使用反射机制来查找和加载该类。你需要确保该类是公共的，以便反射机制能够找到它。\
  \ |\n\n资源包的命名约定\n\nJava 强制要求遵循预定义的命名约定来创建资源包。Java 库仅通过属性包的名称来加载相关的语言环境。因此，在为本地化\
  \ Java 应用程序创建属性包时，理解并遵循此命名约定非常重要。\n\n你已经看到了语言环境名称是如何编码的。理解这种语言环境名称编码对于命名资源包很重要，因为它使用了相同的编码方案。一个完全限定的资源包具有以下形式：\n\
  \n```\npackagequalifier.bundlename + \"_\" + language + \"_\" + country + \"_\"\
  \ + (variant + \"_#\" | \"#\") + script + \"-\" + extensions\n```\n\n以下是此完全限定名称中各元素的描述：\n\
  \n*   **packagequalifier**：提供资源包的包（或子包）的名称。\n*   **bundlename**：你将在程序中引用和加载的资源包的名称。\n\
  *   **language**：通常以小写形式给出的语言环境语言的两个字母缩写（在极少数情况下，也可能是三个字母）。\n*   **country**：通常以大写形式给出的语言环境国家的两个字母缩写（在极少数情况下，也可能是三个字母）。\n\
  *   **variant**：当需要为某个语言和国家组合提供多个语言环境时，用于区分语言环境的任意变体列表（小写或大写）。\n\n我们省略了对 script\
  \ 和 extension 的描述，因为它们很少使用。\n\n例如，考虑这个完全限定的名称：\n\n```\nlocalization.examples.AppBundle_en_US_Oracle_exam\n\
  ```\n\n\n\n在此例中，`localization.examples` 是包名，`AppBundle` 是资源包名称，`en` 是语言代码（代表英语），`US`\
  \ 是国家代码，`Oracle_exam` 是变体。\n\n语言和国家的两个字母（有时是三个字母）缩写是基于国际标准预定义的。我们不会提供详细列表，你也不需要记住所有缩写。你可以查阅\
  \ `Locale` 类的文档来了解这一点。\n\n| ![image](img/pencil.jpg) | 在 OCPJP 7 考试中，你不需要记住用于命名资源包的语言代码或国家代码。但是，你需要*记住命名约定*，并能够识别完全限定资源包名称的组成部分。\
  \ |\n\n考虑到一个包名可能对应多个资源包，那么确定加载哪个资源包的搜索顺序是怎样的？为了清晰说明，我们将搜索过程分解为一系列步骤。搜索从第 1 步开始。如果在某一步找到了匹配项，则加载该资源包。否则，继续执行下一步。\n\
  \n*   **第 1 步：** 搜索首先尝试查找与完整名称完全匹配的资源包。\n*   **第 2 步：** 移除最后一个组件（由下划线分隔的部分），然后使用缩短后的名称重复搜索。*重复此过程，直到只剩下最后一个区域设置修饰符*。\n\
  *   **第 3 步：** 使用默认区域设置的完整包名重新开始搜索。\n*   **第 4 步：** 仅使用包名搜索资源包。\n*   **第 5 步：**\
  \ 搜索失败，抛出 `MissingBundleException`。\n\n搜索从给定的区域设置详细信息开始，如果未找到，则继续检查默认区域设置，如下所示：\n\
  \nBundleName + \"_\" + language + \"_\" + country + \"_\" + variant\n\nBundleName\
  \ + \"_\" + language + \"_\" + country\n\nBundleName + \"_\" + language\n\nBundleName\
  \ + \"_\" + defaultLanguage + \"_\" + defaultCountry\n\nBundleName + \"_\" + defaultLanguage\n\
  \n考虑一个例子来了解如何找到匹配的资源包，这样你就会明白了。假设你的搜索路径中有以下五个条目，并且你的默认区域设置是美式英语。\n\n```\nResourceBundle.properties\
  \             -- 全局资源包\nResourceBundle_ar.properties          -- 阿拉伯语资源包\nResourceBundle_en.properties\
  \          -- 英语资源包（假设 en_US 是默认区域设置）\nResourceBundle_it.properties          --\
  \ 意大利语资源包\nResourceBundle_it_IT_Rome.properties  -- 意大利语（意大利，罗马，梵蒂冈）资源包\n```\n\n\
  | ![image](img/Note.jpg) | `getBundle()` 方法接受一个 `ResourceBundle.Control` 对象作为额外参数。通过扩展\
  \ `ResourceBundle.Control` 类并将该扩展类的实例传递给 `getBundle()` 方法，你可以更改默认的资源包搜索过程，或从非标准资源包格式（如\
  \ XML 文件）中读取数据。 |\n\n因此，你将扩展 `ResourceBundle.Control` 类并重写 `getCandidateLocales()`\
  \ 方法。这是为了以编程方式列出候选区域设置，并最终显示匹配的区域设置。程序如清单 12-7 所示。\n\n清单 12-7.  *CandidateLocales*.java\n\
  \n```\nimport java.util.*;\n\n// 扩展 ResourceBundle.Control 并重写 getCandidateLocales\
  \ 方法\n// 以获取 Java 搜索的候选区域设置列表\nclass TalkativeResourceBundleControl extends ResourceBundle.Control\
  \ {\n        // 重写默认的 getCandidateLocales 方法，首先打印\n        // 候选区域设置\n        public\
  \ List < Locale > getCandidateLocales(String baseName, Locale locale) {\n      \
  \          List < Locale > candidateLocales = super.getCandidateLocales(baseName,\
  \ locale);\n                System.out.printf(\"基础包名 %s 和区域设置 %s 的候选区域设置 %n\",\n\
  \          baseName, locale.getDisplayName());\n                for(Locale candidateLocale\
  \ : candidateLocales) {\n                    System.out.println(candidateLocale);\n\
  \                }\n                return candidateLocales;\n        }\n}\n\n//\
  \ 使用辅助方法 loadResourceBundle 根据包名和区域设置加载资源包\nclass CandidateLocales {\n        public\
  \ static void loadResourceBundle(String resourceBundleName, Locale locale) {\n \
  \               // 传递 TalkativeResourceBundleControl 的实例\n                // 以打印候选区域设置\n\
  \                ResourceBundle resourceBundle = ResourceBundle.getBundle(resourceBundleName,\
  \ locale,\n            new TalkativeResourceBundleControl());\n                String\
  \ rbLocaleName = resourceBundle.getLocale().toString();\n                // 如果资源包区域设置名称为空，\n\
  \                // 则表示默认属性文件\n                if(rbLocaleName.equals(\"\")) {\n\
  \                        System.out.println(\"已加载默认属性文件，名称为: \" +              \
  \          \n                resourceBundleName);\n                } else {\n  \
  \                      System.out.println(\"已加载区域设置的资源包: \" +                \n\
  \                    resourceBundleName + \".\" + rbLocaleName);\n             \
  \   }\n        }\n\npublic static void main(String[] args) {\n                //\
  \ 追踪 ResourceBundle_it_IT_Rome.properties 是如何被解析的\n                loadResourceBundle(\"\
  ResourceBundle\", new Locale(\"it\", \"IT\", \"Rome\"));\n        }\n}\n```\n\n\
  它打印以下内容：\n\n```\n基础包名 ResourceBundle 和区域设置 Italian (Italy, Rome) 的候选区域设置\nit_IT_Rome\n\
  it_IT\nit\n\n已加载区域设置的资源包: ResourceBundle.it_IT_Rome\n```\n\n现在，在尝试其他区域设置之前，先考虑一下程序是如何工作的。为了追踪\
  \ Java 如何解析最终要加载的资源包，你需要获取候选区域设置列表。使用 `ResourceBundle.getBundle()` 方法时，你可以传递一个额外的参数，即\
  \ `ResourceBundle.Control` 类的实例。因此，你定义了 `TalkativeResourceBundleControl` 类。\n\n\
  `TalkativeResourceBundleControl` 类扩展了 `ResourceBundle.Control` 类并重写了 `getCandidateLocales()`\
  \ 方法。这个 `getCandidateLocales()` 方法返回一个 `List < Locale >` 实例，其中包含给定区域设置的候选区域设置列表。你调用\
  \ `super.getCandidateLocales()` 并遍历生成的 `List < Locale >` 对象来打印候选区域设置，以便稍后检查输出。从这个重写的\
  \ `getCandidateLocales()` 方法中，你只需返回这个 `List < Locale >` 对象。因此，`TalkativeResourceBundleControl`\
  \ 的行为与 `ResourceBundle.Control` 相同，只是 `TalkativeResourceBundleControl` 中重写的 `getCandidateLocales()`\
  \ 会打印候选区域设置。\n\n\n好的，作为高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例格式，将给定的英文文本翻译成中文。\n\n\n`CandidateLocales`\
  \ 类使用了 `TalkativeResourceBundleControl`。它有一个名为 `loadResourceBundle()` 的辅助方法，该方法将资源包名称和区域设置名称作为参数。此方法只是将这些参数值传递给\
  \ `ResourceBundle.getBundle()` 方法；此外，它还实例化了 `TalkativeResourceBundleControl`，并将该对象作为第三个参数传递给此方法。`getBundle()`\
  \ 方法返回一个 `ResourceBundle` 对象。如果 `ResourceBundle.getLocale()` 名称的区域设置为空，则表示 Java\
  \ 已加载全局资源包。（请记住，该包名称的全局资源包没有任何关联的区域设置详细信息。）如果区域设置的名称不为空，则表示 Java 已解析到该特定区域设置。\n\n\
  现在，考虑 `main()` 方法中的代码。它为区域设置 `it_IT_Rome` 调用了 `loadResourceBundle()`。有三个候选区域设置，它正确地加载了与区域设置\
  \ `it_IT_Rome` 匹配的属性文件。因此，您知道它正确地加载了属性文件 `ResourceBundle_it_IT_Rome.properties`。\n\
  \n为了继续这个实验，让我们将 清单 12-7 中 `main()` 方法内的代码更改为以下代码：\n\n```\nloadResourceBundle(\"\
  ResourceBundle\", new Locale(\"fr\", \"CA\", \"\"));\n```\n\n现在程序打印如下内容：\n\n```\n\
  Candidate locales for base bundle name ResourceBundle and locale French (Canada)\n\
  fr_CA\nfr\nCandidate locales for base bundle name ResourceBundle and locale English\
  \ (United States)\nen_US\nen\nLoaded the resource bundle for the locale: ResourceBundle.en\n\
  ```\n\n为什么程序会打印上述输出？请注意，在属性文件列表中，没有与 `fr_CA` 区域设置对应的属性文件。因此，搜索会继续检查默认区域设置的属性文件。在这种情况下，默认区域设置是\
  \ `en_US`，并且存在一个用于 `en`（英语）区域设置的属性文件。因此，从候选区域设置中，Java 正确地解析并加载了属性文件 `ResourceBundle_en.properties`。\n\
  \n这是最后一个示例。将 `main()` 方法中的代码替换为以下语句：\n\n```\nloadResourceBundle(\"ResBundl\", Locale.getDefault());\n\
  ```\n\n程序打印如下内容：\n\n```\nCandidate locales for base bundle name ResBundl and locale\
  \ English (United States)\nen_US\nen\n\nThe exception in thread \"main\" java.util.MissingResourceException:\
  \ Can't find bundle for base name ResBundl, locale en_US\n        [... thrown stack\
  \ trace elided ...]\n```\n\n您没有任何名为 `ResBundl` 的资源包，并且您提供了默认区域设置（本例中为 `en_US`）。Java\
  \ 会搜索此区域设置的包，而您知道您没有提供任何名为 `ResBundl` 的包。因此，程序在抛出 `MissingResourceException` 后崩溃。\n\
  \n**针对本地文化的格式化**\n\n文本显然是本地化的主要方面。但是，还有许多方面会根据区域设置进行不同的处理：日期和时间、数字以及货币。我们现在将详细讨论这些主题。\n\
  \n对于文本本地化，您需要遵循的主要方法是不对字符串进行硬编码。对于日期、时间、货币和数字，要记住的关键思想是使用文化感知的格式化来本地化它们。图 12-2 展示了我们将在本节中讨论的两个重要类——`NumberFormat`\
  \ 和 `DateFormat`——如何都继承自 `Format` 基类；这些类是 `java.text` 包的一部分，对于创建区域设置感知的软件非常有用。\n\
  \n![9781430247647_Fig12-02.jpg](img/9781430247647_Fig12-02.jpg)\n\n图 12-2.  Format\
  \ 类及其重要的派生类\n\n**NumberFormat 类**\n\n`NumberFormat` 类提供了以区域设置敏感的方式处理数字的支持。例如，根据区域设置的不同，千位分隔符、用于分隔它们的标点字符、将金额打印为货币值等都会有所不同，而\
  \ `NumberFormat` 类提供了此功能。\n\n`NumberFormat` 类提供了格式化或解析数字的方法。这里的“格式化”是指以文化敏感的方式将数值转换为字符串值；类似地，“解析”是指将数字转换回数字形式。例如，如果您想在德语区域设置中将长整型常量值\
  \ `10_000_000L` 打印为一千万，您可以通过将其传递给 `NumberFormat` 类中的 `format()` 方法来格式化此值，此方法将返回字符串\
  \ `“10.000.000”`（注意使用点作为千位分隔符）。现在，如果您在德语区域设置中读取输入值一千万，以将其转换为长整型值以便在程序中使用，您可以将该字符串传递给\
  \ `parse()` 方法。清单 12-8 展示了执行这些转换的步骤。\n\n清单 12-8.  *FormatNumber*.java\n\n```\nimport\
  \ java.util.*;\nimport java.text.*;\n\n// 演示如何为特定区域设置格式化或解析数字的类\nclass FormatNumber\
  \ {\n        public static void main(String []args) {\n                long tenMillion\
  \ = 10_000_000L;\n                // 首先在德语区域设置中打印一千万\n                NumberFormat\
  \ germanFormat = NumberFormat.getInstance(Locale.GERMANY);\n                String\
  \ localizedTenMillion = germanFormat.format(tenMillion);\n                System.out.println(\"\
  Ten million in German locale is \" + localizedTenMillion);\n\n// 现在，扫描以德语区域设置给出的一千万值\n\
  \                try {\n                        Number parsedAmount = germanFormat.parse(localizedTenMillion);\n\
  \                        if(tenMillion == parsedAmount.longValue()) {\n        \
  \                        System.out.println(\"Successfully parsed the number for\
  \ the locale\");\n                        }\n                }\n               \
  \ catch (ParseException pe) {\n                        System.err.println(\"Error:\
  \ Cannot parse the number for the locale\");\n                }\n        }\n}\n\
  ```\n\n它打印如下内容：\n\n```\nTen million in German locale is 10.000.000\nSuccessfully\
  \ parsed the number value back to Number value based on the locale\n```\n\n如您所见，在德语区域设置中，一千万的值以这种格式打印：10.000.000。要解析给定区域设置中的此类数字，您可以使用\
  \ `NumberFormat` 的 `parse()` 方法，如果解析成功，该方法会返回一个 `Number`，否则该方法会抛出一个受检异常 `ParseException`。\n\
  \n请注意，`parse()` 方法与 `format()` 方法不同。`parse()` 方法用于读取以 `String` 形式提供的数字，并尝试将其转换为\
  \ `Number`。`format()` 方法用于根据 `NumberFormat` 对象中设置的值来打印值。清单 12-9 说明了这两者之间的区别。\n\n\
  清单 12-9.  *FractionDigits*.java\n\n```\nimport java.util.*;\nimport java.text.*;\n\
  \n\n\npublic class FractionDigits {\n        public static void main(String[] args)\
  \ throws ParseException {\n                String[] numbers = {\"1.222\", \"0.12345F\"\
  };\n                double[] doubles = {1.222, 0.12345F};\n                NumberFormat\
  \ numberFormat = NumberFormat.getInstance();\n                numberFormat.setMaximumFractionDigits(2);\n\
  \                System.out.println(\"Using format method: \");\n              \
  \  for(double val : doubles) {\n                        System.out.println(numberFormat.format(val));\n\
  \                }\n                System.out.println(\"Using parse method: \"\
  );\n                for(String number : numbers) {\n                        System.out.println(numberFormat.parse(number));\n\
  \                }\n        }\n}\n```\n\n它会打印以下内容：\n\n```\n Using format method:\n\
  1.22\n0.12\nUsing parse method:\n1.222\n0.12345 \n```\n\n`parse()` 方法会读取这些值，如果成功则将其转换为\
  \ `Number`。因此，它不会使用通过 `setMaximumFractionDigits()` 设置的最大小数位数；然而，如果使用旨在打印数字的 `format()`\
  \ 方法，它就会使用这个设置的最大小数位数限制，这就解释了输出结果之间的差异。\n\n`NumberFormat` 类中的重要方法列于表 12-3 中。那些以“get”开头并以“Instance”结尾的静态方法——例如\
  \ `getCurrencyInstance()`——是该类支持的工厂方法。\n\n表 12-3. NumberFormat 类中的重要方法\n\n| 方法 |\
  \ 简要描述 |\n| --- | --- |\n| `String format(double number)` `String format(long number)`\
  \ | 根据 `NumberFormat` 的语言环境格式化数字。前两个重载方法使用隐式的 `StringBuffer`，而后两个使用显式的 `StringBuffer`\
  \ 来构建字符串。 |\n| `Number parse(String source)` | 从给定的 `String` 中解析出数字。根据 `source`\
  \ 中给定数字的值，它返回一个 `Long` 或 `Double` 实例。如果解析失败，则抛出 `ParseException`。 |\n| `static Locale[]\
  \ getAvailableLocales()` | 返回 Java 运行时支持用于数字格式化的语言环境列表。 |\n| `static NumberFormat\
  \ getInstance()` | 工厂方法，返回默认语言环境的 `NumberFormat` 对象。 |\n| `Currency getCurrency()`\
  \ | 返回此 `NumberFormat` 对象使用的货币实例。 |\n| `static NumberFormat getCurrencyInstance()`\
  \ | 返回适用于货币格式化的 `NumberFormat` 实例；此方法的一个重载版本接受一个 `Locale` 作为参数。 |\n| `static NumberFormat\
  \ getIntegerInstance()` | 返回适用于格式化整数的 `NumberFormat` 实例；此方法的一个重载版本接受一个 `Locale`\
  \ 作为参数。 |\n| `static NumberFormat getPercentInstance()` | 返回适用于格式化百分比的 `NumberFormat`\
  \ 实例；此方法的一个重载版本接受一个 `Locale` 作为参数。 |\n\n`NumberFormat` 类支持打印货币值。你可以使用它的 `getCurrencyInstance()`\
  \ 方法，该方法返回一个 `Currency` 对象。清单 12-10 演示了如何使用此方法在四种不同的语言环境中打印 1000 万这个值（不进行汇率转换）。\n\
  \n清单 12-10.  *LocalizedCurrency*.java\n\n```\nimport java.util.*;\nimport java.text.*;\n\
  \n// 演示如何使用 NumberFormat 类获取 Currency 实例\nclass LocalizedCurrency {\n        public\
  \ static void main(String []args) {\n                long tenMillion = 10000000L;\
  \ // 这是一千万\n                Locale [] locales =\n                        { Locale.CANADA,\
  \ Locale.FRANCE, Locale.GERMANY, Locale.TAIWAN };\n                // 对于这四个语言环境中的每一个，\n\
  \                // 打印该语言环境下的货币金额\n                for(Locale locale : locales)\
  \ {\n                        System.out.println(\"Ten million in \" + locale.getDisplayName()\
  \ + \" is \" + NumberFormat.getCurrencyInstance(locale).format(tenMillion));\n \
  \               }\n        }\n}\n```\n\n它会打印：\n\n```\nTen million in English (Canada)\
  \ is $10,000,000.00\nTen million in French (France) is 10 000 000,00 €\nTen million\
  \ in German (Germany) is 10.000.000,00 €\nTen million in Chinese (Taiwan) is NT$10,000,000.00\n\
  ```\n\n如你所见，通过使用从 `getCurrencyInstance(Locale)` 返回的 `NumberFormat` 对象，你可以格式化数字，使其作为特定语言环境的货币值打印出来。你也可以独立于\
  \ `NumberFormat` 类使用 `Currency` 类，我们接下来将讨论这一点。\n\nCurrency 类\n\n表 12-4 列出了 `Currency`\
  \ 类的重要方法。\n\n表 12-4. Currency 类中的重要方法\n\n| 方法 | 简要描述 |\n| --- | --- |\n| `int getNumericCode()`\
  \ | 返回货币的 ISO 4217 数字代码。 |\n| `int getDefaultFractionDigits()` | 返回该货币使用的默认小数位数，例如日元为\
  \ 0，美元为 2。 |\n| `String getDisplayName()`   | 返回基础语言环境的 `Currency` 的可读描述，例如，美元。\
  \ |\n| `String getDisplayName(Locale)`   | 返回给定语言环境的 `Currency` 的可读描述。 |\n| `static\
  \ Currency getInstance(String currencyCode)` | 返回与给定货币代码相对应的 `Currency` 对象。 |\n\
  | `static Currency getInstance(Locale locale)` | 返回与给定 `Locale` 对象相对应的 `Currency`\
  \ 对象。 |\n| `static Set < Currency > getAvailableCurrencies()` | 获取 JDK 中可用的 `Currency`\
  \ 实例列表。 |\n| `String getSymbol()` | 返回货币符号（如果有）；否则返回货币代码。 |\n| `String getSymbol(Locale)`\
  \ | 返回给定 `Locale` 对象的货币符号。 |\n| `String getCurrencyCode()` | 返回 `Currency` 实例的语言环境的货币代码（ISO\
  \ 4217）。 |\n\n清单 12-11 演示了如何使用表 12-4 中列出的部分方法。\n\n清单 12-11.  *CurrencyDetails*.java\n\
  \n```\nimport java.util.*;\n\n// 获取默认语言环境（en_US 语言环境）的货币详细信息\nclass CurrencyDetails\
  \ {\n        public static void main(String []args) {\n                Locale locale\
  \ = Locale.getDefault();\n                Currency currencyInstance = Currency.getInstance(locale);\n\
  \                System.out.println(\" The currency code for locale \" + locale\n\
  \                        + \" is: \" + currencyInstance.getCurrencyCode()\n    \
  \                    + \" \\n The currency symbol is \" + currencyInstance.getSymbol()\n\
  \                        + \" \\n The currency name is \" + currencyInstance.getDisplayName());\n\
  \        }\n}\n```\n\n它会打印以下内容：\n\n```\nThe currency code for locale en_US is: USD\n\
  The currency symbol is $\nThe currency name is US Dollar\n```\n\n输出结果不言自明。请注意，对于许多没有相关符号的语言环境，`getSymbol()`\
  \ 将只返回货币代码。\n\nDateFormat 类\n\n\n\n`DateFormat` 类提供了以区域敏感方式处理日期和时间的功能（虽然名称中只提到了\
  \ `DateFormat`，但它同时支持日期和时间）。表 12-5 列出了 `DateFormat` 类中的一些重要方法。\n\n表 12-5. DateFormat\
  \ 类中的重要方法\n\n| 方法 | 简要描述 |\n| --- | --- |\n| `String format(Date date)` | 根据默认区域设置格式化给定日期，并返回文本表示形式。其重载版本接受\
  \ `StringBuffer` 和位置作为参数，并返回一个 `StringBuffer` 对象；当需要格式化现有 `StringBuffer` 以表示日期时非常有用。\
  \ |\n| `Date parse(String source)` | 根据默认区域设置约定读取给定的字符串，返回一个 `Date` 对象；如果解析失败则抛出\
  \ `ParseException`。它有一个重载版本，额外接受 `ParsePosition`（解析字符串的起始位置）作为参数。 |\n| `String format(Date\
  \ date)` | 根据默认区域设置格式化给定日期，并返回文本表示形式。 |\n| `static Locale[] getAvailableLocales()`\
  \ | 返回 Java 运行时环境支持的、用于日期/时间格式化的 `Locale` 数组。 |\n| `static DateFormat getInstance()`\
  \ | 返回同时支持*日期和时间*的默认 `DateFormat` 实例；它对日期和时间均使用 `DateFormat.SHORT` 样式。 |\n| `static\
  \ DateFormat getDateInstance()` | 返回适用于处理默认区域设置日期的 `DateFormat` 实例；其两个重载版本额外接受 `style`\
  \ 和 `Locale` 作为参数。 |\n| `static DateFormat getTimeInstance()` | 返回适用于处理默认区域设置时间的\
  \ `DateFormat` 实例；其两个重载版本额外接受 `style` 和 `Locale` 作为参数。 |\n| `static DateFormat getDateTimeInstance()`\
  \ | 返回适用于同时处理默认区域设置日期和时间的 `DateFormat` 实例；其两个重载版本额外接受 `style` 和 `Locale` 作为参数。 |\n\
  \n根据区域设置的不同，显示的日期或时间可能会有显著差异，如清单 12-12 中程序针对四个区域设置的输出所示。\n\n清单 12-12.  *DatePrint*.java\n\
  \n```\nimport java.util.*;\nimport java.text.*;\n\n// 演示如何使用 DateFormat 类格式化日期并打印的类\n\
  class DatePrint {\n        public static void main(String[] args) {\n          \
  \      // Date 的默认构造函数\n                // 将日期/时间设置为当前日期/时间\n                Date\
  \ today = new Date();\n                Locale [] locales = { Locale.CANADA, Locale.FRANCE,\
  \ Locale.GERMANY, Locale.ITALY };\n                for(Locale locale : locales)\
  \ {\n                        // DateFormat.FULL 表示日期的完整详细信息\n                  \
  \      DateFormat dateFormat = DateFormat.getDateInstance(DateFormat.FULL, locale);\n\
  \                        System.out.println(\"区域设置 \" + locale + \" 中的日期为: \" +\
  \ dateFormat.                        \n                        format(today));\n\
  \                }\n        }\n}\n```\n\n当此程序于 2012 年 9 月 4 日运行时，它打印了以下内容：\n\n```\n\
  Date in locale en_CA is: Tuesday, September 4, 2012\nDate in locale fr_FR is: mardi\
  \ 4 septembre 2012\nDate in locale de_DE is: Dienstag, 4\\. September 2012\nDate\
  \ in locale it_IT is: martedì 4 settembre 2012\n```\n\n该程序使用 `getDateInstance()`\
  \ 方法的一个重载版本来获取 `DateFormat` 类的实例。此方法将*显示格式样式*作为第一个参数，将用于格式化日期的区域设置作为第二个参数。这些显示格式样式是什么？清单\
  \ 12-13 展示了四种样式以及这些样式下日期的不同显示效果。\n\n清单 12-13.  *DateStyleFormats*.java\n\n```\n\
  import java.util.*;\nimport java.text.*;\n\n// 演示 DateFormat 中决定显示样式的常量的使用\nclass\
  \ DateStyleFormats {\n        public static void main(String []args) {\n       \
  \         Date now = new Date();\n                int [] dateStyleFormats = { DateFormat.SHORT,\
  \ DateFormat.MEDIUM, DateFormat.LONG,                \n                 DateFormat.FULL,\
  \ DateFormat.DEFAULT};\n                System.out.println(\"不同样式下的今天日期为: \");\n\
  \n// 以所有四种格式以及默认区域设置中的默认格式打印今天的日期\n                for(int dateStyleFormat : dateStyleFormats)\
  \ {\n                        DateFormat dateFormat = DateFormat.getDateInstance(dateStyleFormat);\n\
  \                        System.out.println(dateFormat.format(now));\n         \
  \       }\n        }\n}\n```\n\n当于 2012 年 9 月 5 日运行时，它打印了以下内容：\n\n```\nToday's date\
  \ in different styles are:\n9/5/12\nSep 5, 2012\nSeptember 5, 2012\nWednesday, September\
  \ 5, 2012\nSep 5, 2012\n```\n\n如您所见，您可以根据需要获取首选样式的 `DateFormat` 实例。默认样式是 `DateFormat.MEDIUM`。\n\
  \n`DateFormat` 有三个重载的工厂方法——`getDateInstance()`、`getTimeInstance()` 和 `getDateTimeInstance()`——它们分别返回用于处理日期、时间以及日期和时间的\
  \ `DateFormat` 实例。清单 12-14 展示了如何使用它们。\n\n清单 12-14.  *DateTimePrint*.java\n\n```\n\
  import java.util.*;\nimport java.text.*;\n\n// 演示如何使用 DateFormat 类获取日期、时间或带时间的日期的类\n\
  class DateTimePrint {\n        public static void main(String []args) {\n      \
  \          // Date 的默认构造函数获取当前时间和日期\n                Date today = new Date();\n\
  \                Locale [] locales =\n                        { Locale.CANADA, Locale.FRANCE,\
  \ Locale.GERMANY, Locale.ITALY };\n\n// 首先打印表头\n                System.out.printf(\"\
  %5s \\t %10s \\t %10s \\t %10s %n\",\n                        \"区域设置\", \"日期\",\
  \ \"时间\", \"带时间的日期\");\n\n// 为每个区域设置打印日期、时间以及日期和时间\n                for(Locale locale\
  \ : locales) {\n                        // DateFormat.SHORT 用于以紧凑格式提供日期或时间详细信息\n\
  \                        DateFormat dateFormat = DateFormat.getDateInstance(DateFormat.SHORT,\
  \ locale);\n                        DateFormat timeFormat = DateFormat.getTimeInstance(DateFormat.SHORT,\
  \ locale);\n\n// 现在，对于日期和时间，将样式更改为 MEDIUM 和 FULL\n                        DateFormat\
  \ dateTimeFormat = DateFormat.getDateTimeInstance(DateFormat.MEDIUM, DateFormat.FULL,\
  \ locale);\n                        System.out.printf(\"%5s \\t %10s \\t %10s \\\
  t %20s %n\", locale,\n                        dateFormat.format(today), timeFormat.format(today),\n\
  \                          dateTimeFormat.format(today));\n                }\n \
  \       }\n}\n```\n\n当于 2012 年 9 月 5 日下午运行时，它打印了以下内容：\n\n```\nLocale        Date\
  \         Time      Date with Time\nen_CA     05/09/12      2:32 PM      5-Sep-2012\
  \ 2:32:56 o'clock PM GMT + 05:30\nfr_FR     05/09/12        14:32      5 sept. 2012\
  \ 14 h 32 GMT + 05:30\nde_DE     05.09.12        14:32      05.09.2012 14:32 Uhr\
  \ GMT + 05:30\nit_IT     05/09/12        14.32      5-set-2012 14.32.56 GMT + 05:30\n\
  ```\n\n此程序展示了如何获取用于处理日期、时间或日期和时间的 `DateFormat` 实例。您还可以看到对不同区域设置使用不同样式的效果。\n\n到目前为止，您只使用了\
  \ `DateFormat` 来处理不同区域设置的预定义日期和时间。如果您想创建自己的格式或模式来处理日期或时间，可以做到吗？可以，`SimpleDateFormat`\
  \ 类提供了此功能。\n\nSimpleDateFormat 类\n\n\n\n`SimpleDateFormat` 扩展了 `DateFormat` 类。`SimpleDateFormat`\
  \ 使用模式字符串的概念来格式化日期和时间。在深入探讨如何创建模式字符串之前，先看一个简单的示例，学习如何创建用于打印日期和时间的自定义格式（清单 12-15）。\n\
  \n清单 12-15.  *PatternStringExample*.java\n\n```\nimport java.util.*;\nimport java.text.*;\n\
  \n// 使用 SimpleDateFormat 通过模式字符串创建自定义的日期和时间格式\nclass PatternStringExample {\n  \
  \      public static void main(String []args) {\n                String pattern\
  \ = \"dd-MM-yy\"; /* d 代表日，M 代表月，y 代表年 */\n                SimpleDateFormat formatter\
  \ = new SimpleDateFormat(pattern);\n                // 默认的 Date 构造器会初始化为当前日期/时间\n\
  \                System.out.println(formatter.format(new Date()));\n        }\n\
  }\n```\n\n它会按以下格式打印日期：\n\n```\n05-09-12\n```\n\n你可以使用字母来编码日期或时间的格式，从而形成日期或时间模式字符串。通常这些字母会在模式中重复出现。请注意，大写和小写字母可能具有相似或不同的含义，因此在尝试使用这些字母时，请仔细阅读文档。例如，在\
  \ `dd-MM-yy` 中，`MM` 指的是月份；然而，在 `dd-mm-yy` 中，`mm` 指的是分钟！\n\n在这个程序中，你看到了一个创建自定义日期格式的简单示例。类似的字母也可用于创建自定义的日期和时间模式字符串。以下是用于创建日期模式的重要字母及其含义列表：\n\
  \n`G`     纪元（公元前/公元）\n\n`y`     年份\n\n`Y`     周年份\n\n`M`     月份（一年中的）\n\n`w`    \
  \ 周数（一年中的）\n\n`W`     周数（一个月中的）\n\n`D`     天数（一年中的）\n\n`d`     天数（一个月中的）\n\n`F`    \
  \ 一个月中的星期几\n\n`E`     星期几的名称\n\n`u`     星期几的数字（取值范围 1-7）\n\n清单 12-16 是一个程序，它使用了从简单到复杂的模式字符串来创建自定义的日期格式。\n\
  \n清单 12-16.  *CustomDatePatterns*.java\n\n```\nimport java.util.*;\nimport java.text.*;\n\
  \n// 通过示例说明如何使用“模式字符串”来打印日期\nclass CustomDatePatterns {\n        public static void\
  \ main(String []args) {\n                // 从简单到复杂的模式\n                String []\
  \ dateFormats = {\n                        \"dd-MM-yyyy\", /* d 是日（一个月中的），M 是月，y\
  \ 是年 */\n                        \"d '('E')' MMM, YYYY\", /*E 是星期几的名称，Y 是年份*/\n\
  \                        \"w'th week of' YYYY\", /* w 是一年中的第几周 */\n            \
  \            \"EEEE, dd'th' MMMM, YYYY\" /*E 是星期几的名称 */\n                };\n  \
  \              Date today = new Date();\n                System.out.println(\"日期的默认格式是\
  \ \" + DateFormat.getDateInstance().format(today));\n                for(String\
  \ dateFormat : dateFormats) {\n                        System.out.printf(\"模式为 \\\
  \"%s\\\" 的日期是 %s %n\", dateFormat, new SimpleDateFormat(dateFormat).format(today));\n\
  \                }\n        }\n}\n```\n\n在一次示例运行中，它打印了以下内容：\n\n```\n日期的默认格式是 Sep\
  \ 5, 2012\n模式为 \"dd-MM-yyyy\" 的日期是 05-09-2012\n模式为 \"d '('E')' MMM, YYYY\" 的日期是\
  \ 5 (Wed) Sep, 2012\n模式为 \"w'th week of' YYYY\" 的日期是 36th week of 2012\n模式为 \"EEEE,\
  \ dd'th' MMMM, YYYY\" 的日期是 Wednesday, 05th September, 2012\n```\n\n如你所见，重复字母会导致条目的输出形式更长。例如，当你使用\
  \ `E`（代表星期几的名称）时，它会打印 `Wed`；而当你使用 `EEEE` 时，它会打印星期几的完整形式，即 `Wednesday`。\n\n另一个需要注意的重要事项是如何在给定的模式字符串中打印文本。为此，你需要使用单引号将文本分隔开，就像\
  \ `'within single quotes'` 这样，`SimpleDateFormat` 会原样打印这些文本。例如，`'('E')'` 会打印 `(Wed)`。如果你给出了错误的模式，或者忘记使用单引号将文本与模式字符串中的模式字母分隔开，那么你会因为传递了“非法模式”而得到一个\
  \ `IllegalArgumentException` 异常。\n\n现在，来看一个类似的创建自定义时间模式字符串的示例。以下是用于定义自定义时间模式的重要字母列表：\n\
  \n`a`     上午/下午标记的文本标记\n\n`H`     小时（取值范围 0-23）\n\n`k`     小时（取值范围 1-24）\n\n`K`    \
  \ 上午/下午制的小时（取值范围 0-11）\n\n`h`     上午/下午制的小时（取值范围 1-12）\n\n`m`     分钟\n\n`s`    \
  \ 秒\n\n`S`     毫秒\n\n`z`     时区（通用时区格式）\n\n更多字母及其描述，请参阅 `SimpleDateFormat` 类的 JavaDoc。清单\
  \ 12-17 是一个程序，它使用了从简单到复杂的模式字符串来创建自定义的时间格式。\n\n清单 12-17.  *CustomTimePatterns*.java\n\
  \n```\nimport java.util.*;\nimport java.text.*;\n\n// 通过示例说明如何使用“模式字符串”来构建自定义的时间格式\n\
  class TimePattern {\n        public static void main(String []args) {\n        \
  \        // 从简单到复杂的模式\n                String [] timeFormats = {\n             \
  \           \"h:mm\", /* h 是上午/下午制的小时 (1-12)，m 是分钟 */\n                        \"\
  hh 'o''clock'\",  /* '' 是打印单引号的转义序列 */\n                        \"H:mm a\", /* H\
  \ 是一天中的小时 (0-23)，a 是上午/下午*/\n                        \"hh:mm:ss:SS\", /* s 是秒，S\
  \ 是毫秒 */\n                        \"K:mm:ss a, zzzz\" /*K 是上午/下午制的小时(0-11)，z 是时区\
  \ */\n                };\n                Date today = new Date();\n           \
  \     System.out.println(\"时间的默认格式是 \" + DateFormat.getTimeInstance().format(today));\n\
  \                for(String timeFormat : timeFormats) {\n                      \
  \  System.out.printf(\"模式为 \\\"%s\\\" 的时间是 %s %n\", timeFormat, new SimpleDateFormat(timeFormat).format(today));\n\
  \                }\n        }\n}\n```\n\n它打印了以下内容：\n\n```\n时间的默认格式是 3:10:05 PM\n\
  模式为 \"hh 'o''clock'\" 的时间是 03 o'clock\n模式为 \"h:mm\" 的时间是 3:10\n模式为 \"H:mm a\" 的时间是\
  \ 15:10 PM\n模式为 \"hh:mm:ss:SS\" 的时间是 03:10:05:355\n模式为 \"K:mm:ss a, zzzz\" 的时间是\
  \ 3:10:05 PM, GMT + 05:30\n```\n\n请注意，输出结果会根据你在该程序中所使用的模式字符串而有所不同。\n\n要点记忆\n\n以下是一些可能在考试中对你有用的要点：\n\
  \n*   获取或创建 `Locale` 对象有多种方法。这里我们列出四种选项，用于创建对应意大利语语言代码的意大利语环境实例。\n\n**选项 1：** 使用\
  \ `Locale` 类的构造器：`Locale(String language, String country, String variant):`\n\n\
  ```\nLocale locale1 = new Locale(\"it\", \"\", \"\");\n```\n\n**选项 2：** 使用 `Locale`\
  \ 类中的 `forLanguageTag(String languageTag)` 方法：\n\n```\nLocale locale2 = Locale.forLanguageTag(\"\
  it\");\n```\n\n**选项 3：** 通过实例化 `Locale.Builder` 来构建一个 `Locale` 对象，然后从该对象调用 `setLanguageTag()`：\n\
  \n```\nLocale locale3 = new Locale.Builder().setLanguageTag(\"it\").build();\n```\n\
  \n**选项 4：** 使用 `Locale` 类中预定义的静态 final 常量：\n\n```\nLocale locale4 = Locale.ITALIAN;\n\
  ```\n\n你可以根据需求选择创建 `Locale` 对象的方式。例如，`Locale` 类只有少数几个预定义的区域设置常量。如果你想要一个来自预定义常量之一的\
  \ `Locale` 对象，可以直接使用它；否则，你需要检查应该使用哪种其他选项。\n\n\n\n*   你可以不调用不带参数的 `Locale` 的 `getDisplayCountry()`\
  \ 方法，而是选择其重载版本 `getDisplayCountry(Locale)`，该方法接受一个 `Locale` 对象作为参数。这将打印出*与传入的语言环境一致*的国家名称。例如，调用\
  \ `Locale.GERMANY.getDisplayCountry()` 会输出“Deutschland”（这是德国人对自己国家的称呼）；然而，调用 `Locale.GERMANY.getDisplayCountry(Locale.ENGLISH)`\
  \ 则会输出“Germany”（这是英国人对德国这个国家名称的称呼）。\n\n提问时间！\n\n考虑以下程序：\n\n```\nimport java.text.NumberFormat;\n\
  import java.text.ParseException;\npublic class FractionDigits {\npublic static void\
  \ main(String[] args) {\nString[] numbers = {\"1.222\", \"0.456789F\"};\nNumberFormat\
  \ numberFormat = NumberFormat.getInstance();\nnumberFormat.setMaximumFractionDigits(2);\n\
  for(String number : numbers) {\nSystem.out.println(numberFormat.parse(number));\n\
  catch(ParseException pe) {\nSystem.out.println(\"Failed parsing \" + number);\n\
  \                     }\n             }\n     }\n}\n```\n\n1.  该程序会打印以下哪个选项？\n\n\
  *   A.  1.22\n        0.45\n    *   B.  1.22\n        0.46\n    *   C.  1.222\n\
  \        0.456789\n    *   D.  1.222\n        Failed parsing 0.456789\n    *   E.  Failed\
  \ parsing 1.222\n        0.456789\n    *   F.  Failed parsing 1.222\n        Failed\
  \ parsing 0.456789\n\n**答案**：C. 1.222\n    0.456789\n\n`（parse()` 方法会读取这些值，如果成功则将其转换为\
  \ `Number`。因此，它不会使用通过 `setMaximumFractionDigits` 设置的最大小数位数；但是，如果使用用于打印数字的 `format()`\
  \ 方法，则会应用这个最大小数位数限制。）\n\n2.  考虑以下程序：\n\n```\n    import java.text.SimpleDateFormat;\n\
  \    import java.util.Date;\n    import java.util.Locale;\n    // 使用 SimpleDateFormat\
  \ 以“模式字符串”的形式创建自定义日期和时间格式\n    class PatternStringExample {\n    public static void\
  \ main(String []args) {\n    String pattern = \"EEEE\";\n    SimpleDateFormat formatter\
  \ = new SimpleDateFormat(pattern, Locale.US);\n    Date today = new Date();\n  \
  \  System.out.println(formatter.format(today));\n         }\n    }\n    ```\n\n\
  以下哪个是最可能的输出（即与此代码段中给定的字符串模式 EEEE 匹配的输出）？\n\n*   A)  F\n    *   B)  Friday\n    *\
  \   C)  Sept\n    *   D)  September\n\n**答案**：B)  Friday\n\n（E 是星期中的某一天名称；模式 EEEE\
  \ 会以完整格式打印星期几的名称。Fri 是简写形式，由模式 E 打印，但 EEEE 会以完整形式打印星期几，即 Friday。由于语言环境是 Locale.US，因此会以英文打印。Sept\
  \ 或 September 是不可能的，因为 E 指的是星期中的名称，而不是月份中的名称。）\n\n以下哪个语句使用了工厂方法？\n\n*   A)  `Locale\
  \ locale1` = `new Locale(\"it\", \"\", \"\");`\n    *   B)  `NumberFormat.getInstance(Locale.GERMANY);`\n\
  \    *   C)  `Locale locale3` = `new Locale.Builder().setLanguageTag(\"it\").build();`\n\
  \    *   D)  `Date today` = `new Date();`\n    *   E)  `Locale locale4` = `Locale.ITALIAN;`\n\
  \n**答案**：B)  `NumberFormat.getInstance(Locale.GERMANY);`\n\n（工厂方法会创建实例并返回。直接使用构造函数创建对象与工厂方法无关，因此\
  \ A) 和 D) 不正确。C) 构建了一个 Locale，可能是建造者模式的一个例子。E) 只是访问了预定义的 `Locale` 对象，所以它不是一个方法。）\n\
  \n3.  以下哪个是扩展 `ListResourceBundle` 类的正确重写？\n\n*   A)\n\n```\n        public HashMap\
  \ < String, String >  getContents() {\n                    Map < String, String\
  \ > contents = new HashMap<>();\n                    contents.add(\"MovieName\"\
  , \"Avatar\");\n                    return contents;\n            }\n        ```\n\
  \n*   B)\n\n```\n        public Object[] getContents() {\n                    return\
  \ new Object[] { { \"MovieName\" } , { \"Avatar\" } };\n            }\n        ```\n\
  \n*   C)\n\n```\n         public Object[][] getContents() {\n                  \
  \  return new Object[][] { { \"MovieName\", \"Avatar\" } };\n            }\n   \
  \     ```\n\n*   D)\n\n```\n        public String[] getKeysAndValues() {\n     \
  \               return new String[] { { \"MovieName\" } , { \"Avatar\" } };\n  \
  \          }\n        ```\n\n*   E)\n\n```\n        public String[] getProperties()\
  \ {\n                    return new String[] { { \"MovieName\" }, { \"Avatar\" }\
  \ };\n            }\n        ```\n\n**答案：** C)\n\n```\n        public Object[][]\
  \ getContents() {\n            return new Object[][] { { \"MovieName\", \"Avatar\"\
  \ } };\n        }\n        ```\n\n（`getContents()` 方法的返回类型是 `Object[][]`。此外，该方法应返回一个类型为\
  \ `Object [][]` 的新对象。所以 C) 是正确答案。）\n\n总结\n\n使用 Locale 对象读取和设置语言环境\n\n*   *语言环境*代表一种语言、文化或国家；Java\
  \ 中的 `Locale` 类为此概念提供了抽象。\n*   每个语言环境可以有三个条目：语言、国家和变体。你可以使用可用的语言和国家标准代码来形成语言环境标签。变体没有标准标签；你可以根据需要提供变体字符串。\n\
  *   `Locale` 类中的 getter 方法——例如 `getLanguage()`、`getCountry()` 和 `getVariant()`——返回*代码*；而类似的\
  \ `getDisplayCountry()`、`getDisplayLanguage()` 和 `getDisplayVariant()` 方法则返回*名称*。\n\
  *   `Locale` 中的 `getDefault()` 方法返回 JVM 中设置的默认语言环境。你可以使用 `setDefault()` 方法将此默认语言环境更改为另一个语言环境。\n\
  *   有多种方法可以创建或获取对应于某个语言环境的 `Locale` 对象：\n\n*   使用 `Locale` 类的构造函数。\n*   使用 `Locale`\
  \ 类中的 `forLanguageTag(String languageTag)` 方法。\n*   通过实例化 `Locale.Builder` 来构建一个\
  \ `Locale` 对象，然后从该对象调用 `setLanguageTag()`。\n*   使用 `Locale` 类中预定义的静态 final 常量。\n\
  \n**为每个语言环境构建资源包**\n\n*   资源包是一组类或属性文件，有助于定义一组键并将这些键映射到特定于语言环境的值。\n*   `ResourceBundle`\
  \ 类有两个派生类：`PropertyResourceBundle` 和 `ListResourceBundle`。你可以使用 `ResourceBundle.getBundle()`\
  \ 为给定的语言环境自动加载包。\n*   `PropertyResourceBundle` 类以属性文件的形式提供对多种语言环境的支持。对于每个语言环境，你可以在该语言环境的属性文件中指定键和值。你只能使用字符串作为键和值。\n\
  *   要添加对新语言环境的支持，你可以扩展 `ListResourceBundle` 类。在这个派生类中，你必须重写 `Object [][] getContents()`\
  \ 方法。返回的数组必须包含键和值的列表。键必须是字符串，值可以是任何对象。\n*   当将键字符串传递给 `getObject()` 方法以获取资源包中的匹配值时，请确保传递的键与资源包中的键完全匹配（键名区分大小写）。如果不匹配，你将收到\
  \ `MissingResourceException`。\n*   完全限定的资源包名称的命名约定是 `包限定符.包名` + `\"_\"` + `语言` +\
  \ `\"_\"` + `国家` + `\"_\"` + `(变体` + `\"_#\" | \"#\")` + `脚本` + `\"-\"` + `扩展名`。\n\
  \n**在应用程序中加载资源包**\n\n\n\n*   对于继承自 `ListResourceBundles` 的类，查找匹配资源包的过程与为 `PropertyResourceBundles`\
  \ 定义的属性文件相同。\n*   以下是查找匹配资源包的搜索顺序。搜索从第 1 步开始。如果在任何步骤找到匹配项，则加载该资源包。否则，搜索将继续进行到下一步。\n\
  \n*   **第 1 步：** 搜索首先尝试使用完整名称查找资源包的精确匹配项。\n*   **第 2 步：** 丢弃最后一个组件（由下划线 `_` 分隔的部分），并使用生成的较短名称重复搜索。*此过程会重复进行，直到只剩下最后一个语言环境修饰符*。\n\
  *   **第 3 步：** 使用默认语言环境的资源包完整名称重新开始搜索。\n*   **第 4 步：** 仅使用资源包的名称进行搜索。\n*   **第 5\
  \ 步：** 搜索失败，抛出 `MissingBundleException` 异常。\n\n*   `getBundle()` 方法接受一个 `ResourceBundle.Control`\
  \ 对象作为附加参数。通过扩展 `ResourceBundle.Control` 类并传递该对象，您可以控制或自定义资源包的搜索和加载过程。\n\n**使用 NumberFormat\
  \ 和 DateFormat 格式化文本以实现本地化**\n\n*   要以文化敏感的方式处理日期、时间、数字和货币，您可以使用 `java.text.Format`\
  \ 类及其两个主要的派生类 `NumberFormat` 和 `DateFormat`。\n*   `NumberFormat` 类提供了对数字进行本地化敏感处理的支持，涉及千位分隔符的处理、将数字视为货币值等。\n\
  *   `NumberFormat` 类提供了格式化或解析数字的方法。“格式化”是指将数值转换为适合向用户显示的文本形式；“解析”是指将数字转换回程序使用的数值形式。`parse()`\
  \ 方法在成功时返回一个 `Number` 对象，否则会抛出 `ParseException`（一个受检异常）。\n*   `NumberFormat` 有许多工厂方法：`getInstance()`、`getCurrencyInstance()`、`getIntegerInstance()`\
  \ 和 `getPercentInstance()`。\n*   `Currency` 类提供了以本地化敏感方式处理货币值的支持。\n*   `DateFormat`\
  \ 类提供了以本地化敏感方式处理日期和时间的支持。\n*   `DateFormat` 有三个重载的工厂方法——`getDateInstance()`、`getTimeInstance()`\
  \ 和 `getDateTimeInstance()`——它们分别返回用于处理日期、时间以及日期和时间的 `DateFormat` 实例。\n*   `SimpleDateFormat`（派生自\
  \ `DateFormat`）使用模式字符串的概念来支持日期和时间的自定义格式。\n*   您可以使用区分大小写的字母对日期或时间的格式进行编码，以形成日期或时间模式字符串。\n\
  \n第 13 章\n\n![image](img/frontdot.jpg)\n\n线程\n\n![9781430247647_unFig13-01.jpg](img/9781430247647_unFig13-01.jpg)\n\
  \n如今，当您购买电脑（无论是笔记本电脑还是台式机）时，您会看到诸如*双核*、*四核*等标签来描述系统内部的处理器类型。现在的处理器拥有多个核心，即同一处理器中的多个执行单元。为了充分利用这些多核处理器，我们需要并行运行任务或线程。换句话说，我们需要使我们的程序成为多线程（或并发）程序。本质上，随着这些技术的日益普及，并发的重要性与日俱增。幸运的是，Java\
  \ 内置了对并发的支持。在本章中，您将学习多线程编程的基础知识以及如何编写并发程序和应用程序。关于并发的更高级主题将在下一章中介绍。\n\n*并发*一词的拉丁词根意为“一起运行”。在编程中，您可以让多个线程在程序中并行运行，同时执行不同的任务。因此，这是一个强大且有用的特性。\n\
  \n多个线程可以在同一进程的上下文中运行，从而共享相同的资源。您可以出于多种原因使用多线程。在 GUI 应用程序或小程序中，多线程提高了应用程序对用户的响应能力。对于大型计算密集型应用程序，如果应用程序运行在多处理器或多核机器上，将任务并行化可以提高应用程序的性能。\n\
  \n并发编程简介\n\n在像文字处理器这样的典型应用程序中，需要同时执行许多任务——例如，响应用户、检查拼写、执行格式化和某些相关的后台任务等。像文字处理器这样的交互式应用程序需要同时执行多个任务。顺序执行这些任务是可能的；然而，用户体验可能会有所不同。例如，许多文字处理器具有自动保存功能。如果每\
  \ 60 秒调用一次自动保存，并且在此期间应用程序不响应用户的操作，用户会感觉应用程序似乎挂起了。与其顺序执行这些任务，不如让自动保存任务在后台自动执行，而不中断响应用户的主要活动，这样用户体验会好得多。类似的场景是，当用户输入单词时，在后台字典中运行拼写检查，然后为拼写错误的单词建议替代拼写。并行执行此类活动可以增强应用程序的响应能力，从而改善用户体验。这些并行活动可以实现为线程：同时并行运行多个线程称为*多线程*或*并发*。\n\
  \n多线程对于互联网应用程序也非常有用。例如，一个显示股票市场更新信息的小程序可能希望检索最新信息并显示图形和文本更新。您可以编写一个简单的无限循环，该循环将一直等待更新，然后刷新图形和文本。这种方法浪费处理器周期；而且，当更新发生时，用户会感觉小程序挂起了。更好的方法是让一个线程等待更新发生，并在任何更新发生时通知主线程。然后，单独的线程可以刷新小程序的图形和文本。\n\
  \n`Object` 和 `Thread` 类以及 `Runnable` 接口为 Java 中的并发提供了必要的支持。`Object` 类具有诸如 `wait()`、`notify()`/`notifyAll()`\
  \ 等方法，这些方法对多线程很有用。由于 Java 中的每个类都派生自 `Object` 类，因此所有对象都具有一些基本的多线程能力。例如，您可以获取对 Java\
  \ 中*任何*对象的锁（如果您还不明白“获取锁”的含义，请不要担心——我们将在本章后面讨论）。然而，要*创建*一个线程，`Object` 提供的这种基本支持是不够的。为此，一个类应该扩展\
  \ `Thread` 类或实现 `Runnable` 接口。`Thread` 和 `Runnable` 都在 `java.lang` 库中，因此您无需显式导入这些类即可编写多线程程序。\n\
  \n重要的线程相关方法\n\n表 13-1 列出了 `Thread` 类中一些重要的方法，您将在本章中使用这些方法。\n\n表 13-1 . Thread 类中的重要方法\n\
  \n\n\n| 方法 | 方法类型 | 简要描述 |\n| --- | --- | --- |\n| `Thread currentThread()` | 静态方法\
  \ | 返回当前线程的引用。 |\n| `String getName()` | 实例方法 | 返回当前线程的名称。 |\n| `int getPriority()`\
  \ | 实例方法 | 返回当前线程的优先级值。 |\n| `void join(),` `void join(long),` `void join(long,\
  \ int)` | 重载的实例方法 | 调用 join 的当前线程会等待另一个线程终止。你可以选择以毫秒为单位（以 `long` 类型给出）指定超时时间，或以毫秒和纳秒为单位（以\
  \ `long` 和 `int` 类型给出）指定超时时间。 |\n| `void run()` | 实例方法 | 一旦你启动一个线程（使用 `start()`\
  \ 方法），当线程准备好执行时，`run()` 方法就会被调用。 |\n| `void setName(String)` | 实例方法 | 将线程的名称更改为参数中给定的名称。\
  \ |\n| `void setPriority(int)` | 实例方法 | 将线程的优先级设置为给定的参数值。 |\n| `void sleep(long)`\
  \ `void sleep(long, int)` | 重载的静态方法 | 使当前线程休眠给定的毫秒数（以 long 类型给出），或给定的毫秒数和纳秒数（以 `long`\
  \ 和 `int` 类型给出）。 |\n| `void start()` | 实例方法 | 启动线程；JVM 会调用线程的 `run()` 方法。 |\n| `String\
  \ toString()` | 实例方法 | 返回线程的字符串表示形式；该字符串包含线程的名称、优先级及其所属线程组。 |\n\n在本章中，你还会用到 `Object`\
  \ 类中一些与线程相关的方法，如表 13-2 所示。\n\n表 13-2 .  Object 类中重要的线程相关方法\n\n| 方法 | 方法类型 | 简要描述\
  \ |\n| --- | --- | --- |\n| `void wait(),` `void wait(long),` `void wait(long, int)`\
  \ | 重载的实例方法 | 当前线程在调用任何 wait 方法之前，必须先获取该对象的锁。如果调用了 `wait()`，线程将无限期等待，直到其他线程通知（通过调用\
  \ `notify()`/`notifyAll()` 方法）该锁。`wait(long)` 方法以毫秒为参数。线程会一直等待，直到被通知或超时。`wait(long,\
  \ int)` 方法与 `wait(long)` 类似，但额外以纳秒为参数。 |\n| `void notify()` | 实例方法 | 当前线程在调用 `notify()`\
  \ 之前，必须先获取该对象的锁。JVM 会选择*一个*正在等待该锁的线程并将其唤醒。 |\n| `void notifyAll()` | 实例方法 | 当前线程在调用\
  \ `notifyAll()` 之前，必须先获取该锁。JVM 会唤醒*所有*正在等待该锁的线程。 |\n\n创建线程\n\nJava 线程可以通过两种方式创建：继承\
  \ `Thread` 类或实现 `Runnable` 接口。两者都有一个名为 `run()` 的方法。当线程开始执行时，JVM 会调用此方法。你可以将 `run()`\
  \ 方法视为线程执行的起点，就像 `main()` 方法是程序执行的起点一样。在学习它们之间的区别之前，你将先看到两个创建线程的示例——继承 `Thread`\
  \ 和实现 `Runnable`。\n\n继承 Thread 类\n\n你首先来了解如何继承 `Thread` 类。当你想要继承 `Thread` 类时，需要重写\
  \ `run()` 方法。如果你不重写 `run()` 方法，则会调用 `Thread` 类中默认的 `run()` 方法，该方法什么也不做。\n\n要重写 `run()`\
  \ 方法，你需要将其声明为 `public`；它不接受任何参数，并且返回类型为 `void`——换句话说，它应该声明为 `public void run()`。\n\
  \n可以通过在 `Thread` 类（或其派生类）的对象上调用 `start()` 方法来创建线程。当 JVM 调度该线程时，它会将线程移至*可运行*状态，然后执行\
  \ `run()` 方法。（我们将在本章后面讨论线程状态）。当 `run()` 方法执行完毕并返回时，线程将终止。清单 13-1 是多线程的第一个示例。\n\n\
  清单 13-1.  MyThread1.java\n\n```\nclass MyThread1 extends Thread {\n        public\
  \ void run() {\n                try {\n                       sleep(1000);\n   \
  \             }\n                catch (InterruptedException ex) {\n           \
  \             ex.printStackTrace();\n                        // 忽略 InterruptedException\
  \ - 这可能是 Java 中少数几个可以忽略的异常之一\n                }\n                System.out.println(\"\
  在 run 方法中；线程名称是：\" + getName());\n        }\n        public static void main(String\
  \ args[])  {\n                Thread myThread = new MyThread1();\n             \
  \   myThread.start();\n                System.out.println(\"在 main 方法中；线程名称是：\"\
  \ +\n                        Thread.currentThread().getName());\n        }\n}\n\
  ```\n\n该程序输出以下内容：\n\n```\n在 main 方法中；线程名称是：main\n在 run 方法中；线程名称是：Thread-0\n```\n\
  \n在这个示例中，`MyThread1` 类继承了 `Thread` 类。你在这个类中重写了 `run()` 方法。当线程运行时，会调用这个 `run()` 方法。在\
  \ `main()` 函数中，你创建了一个新线程并使用 `start()` 方法启动它。一个重要的注意事项：你不要直接调用 `run()` 方法。相反，你使用\
  \ `start()` 方法启动线程；`run()` 方法由 JVM 自动调用。我们稍后会再次讨论这个话题。\n\n要打印线程的名称，你可以使用实例方法 `getName()`，它返回一个\
  \ `String`。由于 `main()` 是一个静态方法，你无法访问 `this` 引用。因此，你使用 `Thread` 类中的静态方法 `currentThread()`（该方法返回一个\
  \ `Thread` 对象）来获取当前线程的名称。现在你可以在返回的对象上调用 `getName`。正如你稍后将看到的，`main()` 方法也是作为一个线程执行的！然而，在\
  \ `run()` 方法内部，你可以直接调用 `getName()` 方法：`MyThread1` 继承了 `Thread`，因此所有基类成员在 `MyThread1`\
  \ 中也是可用的。\n\n该程序从 `main` 线程和你（在 `main` 中）创建的 `myThread` 中打印消息。打印出的线程名称是 *Thread-0*。稍后你将看到线程的默认命名约定。\n\
  \n图 13-1 展示了该程序如何执行并打印输出。请注意，`main` 线程和 `myThread1` 线程同时执行（即并发执行），如图所示。如果你多次运行此程序，你可能会得到上面显示的输出，或者这两个语句的顺序可能会颠倒（取决于哪个线程被优先调度来执行此语句）。你将在本章稍后部分研究这种非确定性行为。\n\
  \n![9781430247647_Fig13-01.jpg](img/9781430247647_Fig13-01.jpg)\n\n图 13-1.  从 main\
  \ 方法中生成一个新线程\n\n实现 Runnable 接口\n\n`Thread` 类本身实现了 `Runnable` 接口。除了继承 `Thread` 类，你也可以实现\
  \ `Runnable` 接口。`Runnable` 接口声明了一个唯一的方法 `run()`。\n\n```\n// 在 java.lang 包中\npublic\
  \ interface Runnable {\n        public void run();\n}\n```\n\n\n\n当你实现 `Runnable`\
  \ 接口时，需要定义 `run()` 方法。请记住，`Runnable` 并未声明 `start()` 方法。那么，如果你实现了 `Runnable` 接口，该如何创建线程呢？`Thread`\
  \ 有一个重载的构造函数，它接受一个 `Runnable` 对象作为参数。\n\n```\nThread(Runnable target)\n```\n\n你可以使用这个重载的构造函数，从一个实现了\
  \ `Runnable` 接口的类来创建线程。\n\n首先，让我们通过实现 `Runnable` 接口来修改之前的程序。如果你将 “`class MyThread1\
  \ extends Thread`” 改为 “`class MyThread1 implements Runnable`” 并编译代码，你会遇到两个编译错误：\n\
  \n```\nMyThread1.java:3: 找不到符号\n符号  : 方法 getName()\n位置: 类 MyThread1\n          \
  \      System.out.println(\"In run method; thread name is: \" + this.getName());\n\
  \nMyThread1.java:7: 类型不兼容\n找到   : MyThread1\n需要: java.lang.Thread\n            \
  \    Thread myThread = new MyThread1();\n```\n\n`getName()` 方法位于 `Thread` 类中，但 `MyThread1`\
  \ 类不再继承 `Thread`，因此会导致编译错误。同样，`start()` 方法也位于 `Thread` 类中，由于你直接实现了 `Runnable`，你也不再拥有该方法。\n\
  \n清单 13-2 包含了修复这两个编译错误后，实现 `Runnable` 接口的改进版程序。\n\n清单 13-2.  MyThread2.java\n\n\
  ```\nclass MyThread2 implements Runnable {\n        public void run() {\n      \
  \          System.out.println(\"In run method; thread name is: \" + Thread.currentThread().getName());\n\
  \        }\n\npublic static void main(String args[]) throws Exception {\n      \
  \          Thread myThread = new Thread(new MyThread2());\n                myThread.start();\n\
  \                System.out.println(\"In main method; thread name is: \" + Thread.currentThread().getName());\n\
  \        }\n}\n```\n\n它输出的结果与之前的程序相同：\n\n```\nIn main method; thread name is: main\n\
  In run method; thread name is: Thread-0\n```\n\n你像之前的程序一样实现了 `run()` 方法。然而，为了获取线程名称，你必须采用一种迂回的方式，通过\
  \ `Thread.currentThread().getName()` 来获取线程名，就像你在 `main()` 方法中获取线程名那样。同样，在 `main()`\
  \ 方法中，为了创建线程，你必须将类的对象传递给 `Thread` 构造函数。而在继承 `Thread` 类时，只需创建 `MyThread1` 对象并直接调用其\
  \ `start()` 方法，既简单又方便。\n\n应该继承 Thread 还是实现 Runnable？\n\n你可以通过继承 `Thread` 类或实现 `Runnable`\
  \ 接口来创建线程。那么，你应该选择哪一种呢？\n\n`Thread` 类对 `run()` 方法有默认实现，因此如果你在继承 `Thread` 类时没有提供\
  \ `run()` 方法的定义，编译器不会报错。然而，`Thread` 类中的默认实现*什么也不做*，所以如果你希望你的线程执行一些有意义的工作，你仍然需要定义它。`Runnable`\
  \ 接口声明了 `run()` 方法，因此如果你实现了 `Runnable` 接口，你*必须*在你的类中定义 `run()` 方法。所以，实现 `Runnable`\
  \ 还是继承 `Thread` 并不重要。出于所有实际目的，你都必须定义 `run()` 方法。总之，这并不是继承 `Thread` 和实现 `Runnable`\
  \ 之间的主要区别。那么继承关系呢？\n\n由于 Java 只支持单继承，如果你继承了 `Thread`，你就无法再继承任何其他类。由于继承是一种“is-a”关系，你很少需要让一个类与\
  \ `Thread` 类建立“is-a”关系。因此，面向对象纯粹主义者认为你不应该继承 `Thread` 类。另一方面，如果你实现了 `Runnable` 接口，你仍然可以继承其他类。因此，许多\
  \ Java 专家建议，除非有强有力的理由需要继承 `Thread` 类，否则最好实现 `Runnable` 接口。\n\n然而，在许多情况下，继承 `Thread`\
  \ 类更为方便。在你看到的获取线程名称的例子中，当实现 `Runnable` 接口时，你必须使用 `Thread.currentThread().getName()`，而由于\
  \ `MyThread1 extends Thread`，在继承 `Thread` 时你只需直接使用 `getName()` 方法。因此，在这种情况下，继承 `Thread`\
  \ 稍微方便一些。\n\n这两种技术都很有用，并且在解决问题时基本等效。所以，请从实用角度出发：根据你试图解决的具体问题，选择使用其中任何一种。对于 OCPJP\
  \ 7 考试，你需要知道如何通过继承 `Thread` 类或实现 `Runnable` 接口来创建用于多线程的类，以及这两种方法之间的区别。\n\nStart(\
  \ ) 和 Run( ) 方法\n\n你重写了 `run()` 方法，但调用的是 `start()` 方法。为什么不能直接调用 `run()` 方法呢？如果你将之前的程序中的\
  \ `myThread.start()` 改为 `myThread.run()`，会发生什么？清单 13-3 展示了这个修改后的程序（并将类名改为 `MyThread3`）。\n\
  \n清单 13-3.  MyThread3.java\n\n```\nclass MyThread3 implements Runnable {\n     \
  \   public void run() {\n                System.out.println(\"In run method; thread\
  \ name is: \" + Thread.currentThread().getName());\n        }\n\npublic static void\
  \ main(String args[]) throws Exception {\n                Thread myThread = new\
  \ Thread(new MyThread3());\n                myThread.run(); // 注意这里用的是 run() 而不是\
  \ start()\n                System.out.println(\"In main method; thread name is :\
  \ \" + Thread.currentThread().getName());\n        }\n}\n```\n\n这会输出以下内容：\n\n```\n\
  In run method; thread name is: main\nIn main method; thread name is: main\n```\n\
  \n现在输出不同了！如果你直接调用 `run()` 方法，它只是*作为调用线程的一部分来执行*。它不会作为一个线程来执行：它不会被调度，也不会被 JVM 调用。这就是为什么\
  \ `run()` 方法中的 `getName()` 方法返回的是 “main” 而不是 “Thread-0”。当你调用 `start()` 方法时，线程会被调度，当执行该线程的时机到来时，JVM\
  \ 会调用 `run()` 方法。\n\n| ![image](img/banana.jpg) | 永远不要直接调用 `run()` 方法来启动线程。请使用 `start()`\
  \ 方法，并让 JVM 隐式地调用 `run()` 方法。直接调用 `run()` 方法而不是 `start()` 是一个错误，也是一个相当常见的 bug。 |\n\
  \n线程名称、优先级和组\n\n你需要了解与每个 Java 线程相关的三个主要方面：它的*名称*、*优先级*以及它所属的*线程组*。\n\n每个线程都有一个名称，你可以用它来标识线程。如果你没有显式地指定名称，线程会获得一个默认名称。优先级范围从\
  \ 1（最低）到 10（最高）。普通线程的优先级默认为 5，你可以通过显式提供优先级值来更改这个默认优先级。每个线程都是某个*线程组*的一部分。这是一个很少使用的特性，因此本书不会介绍它。`Thread`\
  \ 的 `toString()` 方法会打印这三个详细信息，请参阅清单 13-4 中获取这些详细信息的简单程序。\n\n\n\n清单 13-4.  SimpleThread.java\n\
  \n```\nclass SimpleThread {\n        public static void main(String []s) {\n   \
  \             Thread t = new Thread();\n                System.out.println(t);\n\
  \        }\n}\n```\n\n该程序输出如下内容：\n\n```\nThread[Thread-0,5,main]\n```\n\n`Thread`\
  \ 是类的名称。在“[”和“]”之间的是线程的名称、优先级和线程组。你没有给线程指定任何名称，因此使用了默认名称 `Thread-0`（随着你创建更多线程，线程将被命名为\
  \ `Thread-1`、`Thread-2` 等）。默认优先级为 5。你在 `main()` 中创建了该线程，因此默认线程组是“main”。\n\n现在，让我们尝试使用\
  \ `setName()` 和 `setPriority()` 方法来更改线程的名称和优先级：\n\n```\nThread t = new Thread();\n\
  t.setName(\"SimpleThread\");\nt.setPriority(9);\nSystem.out.println(t);\n```\n\n\
  这段代码输出如下内容：\n\n```\nThread[SimpleThread,9,main]\n```\n\n线程现在拥有了你赋予的名称和优先级。你可以随意更改线程的名称，这不会改变程序的行为。但是，在更改线程优先级时需要小心，因为它会影响线程的调度。你可以通过静态成员\
  \ `MIN_PRIORITY`、`NORM_PRIORITY` 和 `MAX_PRIORITY` 以编程方式访问线程的最小、正常和最大优先级，如清单 13-5\
  \ 所示。\n\n清单 13-5.  ThreadPriorities.java\n\n```\nclass ThreadPriorities {\n    \
  \    public static void main(String []s) {\n                System.out.println(\"\
  Minimum priority of a thread: \" + Thread.MIN_PRIORITY);\n                System.out.println(\"\
  Normal priority of a thread: \" + Thread.NORM_PRIORITY);\n                System.out.println(\"\
  Maximum priority of a thread: \" + Thread.MAX_PRIORITY);\n        }\n}\n```\n\n\
  该程序输出如下内容：\n\n```\nMinimum priority of a thread: 1\nNormal priority of a thread:\
  \ 5\nMaximum priority of a thread: 10\n```\n\n使用 Thread.sleep() 方法\n\n假设你想为一个定时炸弹实现一个倒计时器，从九数到零，每次计数暂停\
  \ 1 秒。到达零后，它应该打印“Boom!!!”。你可以通过创建一个线程来执行倒计时来实现此功能。为了每秒暂停一次，你可以调用 `Thread.sleep`\
  \ 方法。请参见清单 13-6。\n\n清单 13-6.  TimeBomb.java\n\n```\nclass TimeBomb extends Thread\
  \ {\n        String [] timeStr = { \"Zero\", \"One\", \"Two\", \"Three\", \"Four\"\
  , \"Five\", \"Six\", \"Seven\", \"Eight\", \"Nine\" };\n\npublic void run() {\n\
  \                for(int i = 9; i > = 0; i--) {\n                        try {\n\
  \                                System.out.println(timeStr[i]);\n             \
  \                   Thread.sleep(1000);\n                        }\n           \
  \             catch(InterruptedException ie) {\n                               \
  \ ie.printStackTrace();\n                        }\n                }\n        }\n\
  \npublic static void main(String []s) {\n                TimeBomb timer = new TimeBomb();\n\
  \                System.out.println(\"Starting 10 second count down. . . \");\n\
  \                timer.start();\n                System.out.println(\"Boom!!!\"\
  );\n        }\n}\n```\n\n它输出如下内容，从 Nine 打印到 Zero 之间间隔 1 秒：\n\n```\nStarting 10 second\
  \ count down. . .\nBoom!!!\nNine\nEight\nSeven\nSix\nFive\nFour\nThree\nTwo\nOne\n\
  Zero\n```\n\n程序并没有完全按预期工作。消息“Boom!!!”甚至在倒计时开始之前就被打印出来了！在讨论这种奇怪行为的原因之前，让我们先了解一下 `sleep()`\
  \ 方法的基础知识。\n\n你可以使用 `Thread` 类中提供的静态方法 `sleep()` 来让当前线程休眠（或暂停）一段时间。`Thread` 类中有两个重载的静态\
  \ `sleep()` 方法：\n\n```\nvoid sleep(long)\nvoid sleep(long, int)\n```\n\n`sleep()`\
  \ 方法的第一个版本以毫秒为参数。第二个版本除了毫秒之外，还以纳秒作为第二个参数。\n\n`sleep()` 方法会抛出 `InterruptedException`。由于\
  \ `InterruptedException` 是一个受检异常（它继承自 `Exception` 类），你需要在 `sleep()` 周围提供一个 try-catch\
  \ 块，或者声明 `run()` 方法 `throws` 异常 `InterruptedException`。但是，如果你声明 `void run() throws\
  \ InterruptedException`，你将不会重写 `run()` 方法，因为异常规范不同（`run()` 方法不会抛出任何受检异常）。因此，你必须在\
  \ `run()` 方法内提供一个 try-catch 块来处理此异常。那么，你应该如何处理 `InterruptedException` 呢？\n\n首先，你需要理解\
  \ `InterruptedException` 的含义以及它何时被抛出。一个线程可以“中断”另一个线程，例如，请求它停止工作。在这种情况下，接收中断的线程——如果它处于\
  \ `sleep()` 或 `wait()`（我们稍后会再次讨论）状态——会导致抛出 `InterruptedException`。接收中断的线程可以忽略中断并继续执行（这不是一个好主意，但可以这样做），或者它可以停止执行。在本书涵盖的多线程程序中，你不会中断其他线程。因此，我们假设你的线程不会收到任何中断，你将忽略该异常并让线程继续工作。换句话说，你将有意忽略\
  \ `InterruptedException`（在调用异常的 `printStackTrace()` 方法之后）；然而，在实际程序中，如果你使用线程中断功能，你可能需要处理此异常。\n\
  \n回到程序的输出，消息“Boom!!!”在打印完“Starting 10 second count down. . . ”之后立即被打印出来，而不是在倒计时到零之后。为什么会这样？\n\
  \n`main` 线程通过调用 `timer.start()` 开始执行计时器线程。`main` 线程的执行独立于 `timer` 线程的执行，因此它执行下一条语句，即向控制台打印“Boom!!!”。\n\
  \n但请记住，你希望 `main()` 方法等待，直到 `timer` 线程完成。如何做到这一点？为此，你必须学习如何使用 `Thread` 类中提供的 `join()`\
  \ 方法。\n\n使用 Thread 的 Join 方法\n\n`Thread` 类有一个实例方法 `join()`，用于等待一个线程“死亡”。在 `TimeBomb`\
  \ 程序中，你希望 `main()` 线程等待计时器线程完成其执行。你可以使用 `Thread` 类中的实例方法 `join()` 来实现这一点。以下是 `TimeBomb`\
  \ 程序的改进版本，仅对 `main()` 方法进行了更改：\n\n```\npublic static void main(String []s) {\n \
  \       TimeBomb timer = new TimeBomb();\n        System.out.println(\"Starting\
  \ 10 second count down. . . \");\n        timer.start();\n        try {\n      \
  \          timer.join();\n        }\n        catch(InterruptedException ie) {\n\
  \                ie.printStackTrace();\n        }\n        System.out.println(\"\
  Boom!!!\");\n}\n```\n\n现在程序按预期输出结果：\n\n```\nStarting 10 second count down. . .\n\
  Nine\nEight\nSeven\nSix\nFive\nFour\nThree\nTwo\nOne\nZero\nBoom!!!\n```\n\n`Thread`\
  \ 类有三个重载版本的 `join()` 方法：\n\n```\nvoid join();\nvoid join(long);\nvoid join(long,\
  \ int);\n```\n\n\n\n如果当前线程在另一个线程的实例上调用 `join()`（即此处列出的第一个重载版本），那么当前线程将无限期地等待该线程终止。接下来的两个重载方法接受一个“超时”时间作为参数；当前线程只会等待另一个线程终止，直到超时时间到期。如果另一个线程在超时时间之前没有完成，当前线程将继续执行。第二个方法以毫秒（`long`\
  \ 类型值）为单位接受超时时间，第三个重载版本则同时接受毫秒和纳秒（`long` 和 `int` 类型值）。\n\n`join()` 方法还会抛出 `InterruptedException`；你将忽略此异常，原因与本章前面讨论\
  \ `sleep()` 方法时相同。\n\n异步执行\n\n在前面的程序中，你看到主线程和你创建的线程是独立执行的。换句话说，线程是*异步*运行的。线程不会顺序执行（像函数调用那样），因此线程的执行顺序是不可预测的——也就是说，线程的行为本质上是*非确定性的*。为了理解这一点，请参考清单\
  \ 13-7。\n\n清单 13-7.  AsyncThread.java\n\n```\nclass AsyncThread extends Thread {\n\
  \        public void run() {\n                System.out.println(\"启动线程 \" + getName());\n\
  \                for(int i = 0; i < 3; i++) {\n                        System.out.println(\"\
  在线程 \" + getName() + \" 中；迭代 \" + i);\n                        try {\n         \
  \                       // 在下一次迭代前休眠一小段时间\n                                Thread.sleep(10);\n\
  \                        }\n                        catch(InterruptedException ie)\
  \ {\n                                // 我们没有中断任何线程\n                           \
  \     // – 因此可以安全地忽略此异常\n                                ie.printStackTrace();\n\
  \                        }\n                }\n        }\n\npublic static void main(String\
  \ args[]) {\n                AsyncThread asyncThread1 = new AsyncThread();\n   \
  \             AsyncThread asyncThread2 = new AsyncThread();\n                //\
  \ 同时启动两个线程\n                asyncThread1.start();\n                asyncThread2.start();\n\
  \        }\n}\n```\n\n在清单 13-7 中，`run()` 方法包含一个迭代三次的 `for` 循环。在 `for` 循环中，你打印了线程名称和迭代次数。打印这些信息后，你强制当前线程\
  \ `sleep` 10 毫秒。\n\n在一次示例运行中，输出如下：\n\n```\n启动线程 Thread-0\n启动线程 Thread-1\n在线程 Thread-1\
  \ 中；迭代 0\n在线程 Thread-0 中；迭代 0\n在线程 Thread-1 中；迭代 1\n在线程 Thread-0 中；迭代 1\n在线程 Thread-0\
  \ 中；迭代 2\n在线程 Thread-1 中；迭代 2\n```\n\n在另一次示例运行中，输出如下：\n\n```\n启动线程 Thread-0\n启动线程\
  \ Thread-1\n在线程 Thread-1 中；迭代 0\n在线程 Thread-0 中；迭代 0\n在线程 Thread-1 中；迭代 1\n在线程 Thread-0\
  \ 中；迭代 1\n在线程 Thread-1 中；迭代 2\n在线程 Thread-0 中；迭代 2\n```\n\n如你所见，这两次运行的输出略有不同（参见输出中的斜体部分）！为什么？\n\
  \n线程 `Thread-0` 和 `Thread-1` 是独立执行的。输出不是固定的，线程中迭代的执行顺序也是不可预测的。程序员无法确定线程的执行顺序。底层平台可能使用多个处理器中的任何一个，或者对单个处理器进行时间片分配，来为线程分配\
  \ CPU 时间。这既不受 JVM 控制，也不受程序员控制。这是多线程编程中需要理解的基本且最重要的概念之一。\n\n| ![image](img/Note.jpg)\
  \ | 你既无法预测也无法控制线程的执行顺序！ |\n\n| ![image](img/banana.jpg) | 由于多线程程序的行为是非确定性的，因此在编写多线程程序时必须小心谨慎。你不能期望基于线程执行顺序的预定输出。\
  \ |\n\n线程的状态\n\n线程在其生命周期中有多种状态。理解线程的不同状态，并基于这种理解编写健壮的代码非常重要。你将看到三种线程状态——*新建*、*可运行*和*终止*——这些状态几乎适用于你将在本节中创建的所有线程。我们稍后会讨论更多线程状态。\n\
  \n程序可以使用 `Thread.State` 枚举来访问线程的状态。`Thread` 类有一个 `getState()` 实例方法，它返回线程的当前状态；请参考清单\
  \ 13-8 中的示例。\n\n清单 13-8.  BasicThreadStates.java\n\n```\nclass BasicThreadStates\
  \ extends Thread {\n        public static void main(String []s) throws Exception\
  \ {\n                Thread t = new Thread(new BasicThreadStates());\n         \
  \       System.out.println(\"刚创建线程后；\\n\" +\n                                \"\
  \       线程状态为：\" + t.getState());\n                t.start();\n                System.out.println(\"\
  刚调用 t.start() 后；\\n\" +\n                                \"       线程状态为：\" + t.getState());\n\
  \                t.join();\n                System.out.println(\"主线程刚调用 t.join()\
  \ 后；\\n\" +\n                                \"       线程状态为：\" + t.getState());\n\
  \        }\n}\n```\n\n该程序打印如下内容：\n\n```\n刚创建线程后；\n        线程状态为：NEW\n刚调用 t.start()\
  \ 后；\n        线程状态为：RUNNABLE\n主线程刚调用 t.join() 后；\n        线程状态为：TERMINATED\n```\n\
  \n刚创建线程之后、调用该线程的 `start()` 方法之前，线程处于*新建*状态。调用 `start()` 方法后，线程已准备好运行或正在运行（你无法确定），因此它处于*可运行*状态。从\
  \ `main()` 方法中，你调用了 `t.join()`。`main()` 方法等待线程 `t` 终止。因此，一旦 `main()` 线程成功执行了 `t.join()`\
  \ 语句，就意味着线程 `t` 已经终止或结束。所以，线程现在处于*终止*状态。\n\n一个建议：使用 `getState()` 方法访问线程状态时要小心。为什么？因为当你获取线程状态信息并打印它时，状态可能已经改变了！我们知道最后这句话令人困惑。为了理解使用\
  \ `getState()` 方法获取线程状态信息的问题，请考虑前面的示例。在同一个程序的一次示例运行中，它打印了以下内容：\n\n```\n刚创建线程后；\n\
  \        线程状态为：NEW\n刚调用 t.start() 后；\n        线程状态为：TERMINATED\n主线程刚调用 t.join()\
  \ 后；\n        线程状态为：TERMINATED\n```\n\n注意输出中的斜体部分，即打印“`刚调用 t.start() 后；`”之后的语句。在最初的输出中，你得到的线程状态（如预期）是\
  \ `RUNNABLE` 状态。然而，在同一个程序未做任何修改的另一次执行中，它打印的状态是 `TERMINATED`。为什么？在这种情况下，线程在你有机会检查并打印其状态之前就已经结束了！（注意，你在\
  \ `BasicThreadStates` 类中没有实现 `run()` 方法，因此 `run()` 方法的默认实现什么也不做，并迅速终止。）\n\n\n\n\
  每个 Java 线程都会经历以下三种状态，如图 图 13-2 所示。其中，*可运行*状态实际上在操作系统层面包含两个独立的状态，我们现在就来讨论这一点。\n\n\
  ![9781430247647_Fig13-02.jpg](img/9781430247647_Fig13-02.jpg)\n\n图 13-2.  线程生命周期中的基本状态\n\
  \n“可运行”状态中的两个子状态\n\n一旦线程从*新建*状态转换到*可运行*状态，你可以认为该线程在操作系统层面具有两个状态：*就绪*状态和*运行*状态。当线程等待操作系统将其调度到处理器上运行时，它处于*就绪*状态。当操作系统实际将其在处理器上运行时，它处于*运行*状态。可能有很多线程在等待处理器时间。当前线程可能会占用大量时间，最终自愿放弃\
  \ CPU。在这种情况下，该线程会再次回到*就绪*状态。这两个状态如图 图 13-3 所示。\n\n![9781430247647_Fig13-03.jpg](img/9781430247647_Fig13-03.jpg)\n\
  \n图 13-3.  可运行状态在操作系统层面实现为两个状态\n\n并发访问问题\n\n线程中的并发编程充满了陷阱和问题。在本节中，我们将讨论两个主要的并发访问问题——*数据竞争*和*死锁*。\n\
  \n数据竞争\n\n线程共享内存，并且可以并发地修改数据。由于修改可以在没有保护措施的情况下同时进行，这可能导致非直观的结果。\n\n当两个或更多线程试图访问一个变量，并且其中一个线程想要修改它时，就会出现一个称为*数据竞争*的问题（也称为*竞态条件*或*竞争冒险*）。代码清单\
  \ 13-9 展示了一个数据竞争的例子。\n\n代码清单 13-9.  DataRace.java\n\n```\n// This class exposes\
  \ a publicly accessible counter\n// to help demonstrate data race problem\nclass\
  \ Counter {\n        public static long count = 0;\n}\n\n// This class implements\
  \ Runnable interface\n// Its run method increments the counter three times\nclass\
  \ UseCounter implements Runnable {\n        public void increment() {\n        \
  \        // increments the counter and prints the value\n                // of the\
  \ counter shared between threads\n                Counter.count++;\n           \
  \     System.out.print(Counter.count + \"  \");\n        }\n        public void\
  \ run() {\n                increment();\n                increment();\n        \
  \        increment();\n        }\n}\n\n// This class creates three threads\npublic\
  \ class DataRace {\n        public static void main(String args[]) {\n         \
  \       UseCounter c = new UseCounter();\n                Thread t1 = new Thread(c);\n\
  \                Thread t2 = new Thread(c);\n                Thread t3 = new Thread(c);\n\
  \                t1.start();\n                t2.start();\n                t3.start();\n\
  \        }\n}\n```\n\n在这个程序中，有一个 `Counter` 类，它有一个静态变量 `count`。在 `UseCounter` 类的\
  \ `run()` 方法中，你通过调用 `increment()` 方法将 `count` 递增三次。你在 `DataRace` 类的 `main()` 函数中创建了三个线程并启动它们。你期望程序在线程运行并递增计数器时，按顺序打印出\
  \ 1 到 9。然而，当你运行这个程序时，它确实打印了九个整数值，但输出看起来像是乱码！在一次示例运行中，我们得到了这些值：\n\n```\n3  3  5 \
  \ 6  3  7  8  4  9\n```\n\n请注意，每次运行此程序时，这些值通常都会不同；当我们又运行了两次时，得到了以下输出：\n\n```\n3\
  \  3  5  6  3  4  7  8  9\n\n3  3  3  6  7  5  8  4  9\n```\n\n那么，问题出在哪里呢？\n\n表达式\
  \ `Counter.count++` 是一个写操作，而接下来的 `System.out.print` 语句是对 `Counter.count` 的读操作。当三个线程执行时，每个线程都有\
  \ `Counter.count` 值的一个本地副本，当它们通过 `Counter.count++` 更新 `counter` 时，它们不需要立即将该值反映到主内存中（参见\
  \ 图 13-4）。在接下来的 `Counter.count` 读操作中，打印的是 `Counter.count` 的本地值。\n\n![9781430247647_Fig13-04.jpg](img/9781430247647_Fig13-04.jpg)\n\
  \n图 13-4.  线程 t1、t2 和 t3 试图更改 Counter.count，导致数据竞争\n\n因此，这个程序存在数据竞争问题。为了避免这个问题，你需要确保单个线程能够*原子地*一起执行写和读操作。被多个线程共同访问和修改的代码段称为*临界区*。为了避免数据竞争问题，你需要确保临界区一次只能由一个线程执行。\n\
  \n如何做到这一点呢？通过获取对象上的锁。一次只有一个线程可以获取对象上的锁，并且只有该线程可以执行由该锁保护的代码块（即临界区）。在此之前，其他线程必须等待。在内部，这是通过监视器实现的，这个过程称为*加锁*和*解锁*（即*线程同步*）。让我们更详细地讨论这一点。\n\
  \n线程同步\n\nJava 有一个关键字 `synchronized`，它有助于线程同步。你可以以两种形式使用它——同步块和同步方法。\n\n同步块\n\n\
  在同步块中，你为引用变量使用 `synchronized` 关键字，后面跟着一个代码块。线程必须获取同步变量上的锁才能进入该块；当块执行完成时，线程释放该锁。例如，如果代码块位于非静态方法内，你可以获取\
  \ `this` 引用上的锁：\n\n```\nsynchronized(this) {\n        // 由互斥锁保护的代码段\n}\n```\n\n\
  如果在同步块内抛出异常怎么办？锁会被释放吗？是的，无论块是完全执行还是抛出异常，JVM 都会自动释放锁。\n\n使用同步块，你只能获取引用变量上的锁。如果你使用基本类型，将会出现编译器错误。\n\
  \n```\nint i = 10;\nsynchronized(i) { /* 这里的代码块 */}\n```\n\n对于这段代码，你将收到以下编译器错误：\n\
  \n```\nLock.java:5: int is not a valid type's argument for the synchronized statement\n\
  found   : int\nrequired: reference\n                synchronized(i) { /* 这里的代码块\
  \ */}\n```\n\n以下是上一节讨论的程序的改进版本，它对 `Counter.count` 执行同步访问，并在临界区中对该变量执行读写操作。为此，你只需要更改\
  \ `increment` 方法，如下所示：\n\n```\n public void increment() {\n        // 这两个语句对一个被多个线程共同访问的变量执行读写操作。\n\
  \        // 因此，在处理这个“临界区”之前获取一个锁。\n        synchronized(this) {\n              \
  \  Counter.count++;\n                System.out.print(Counter.count + \"  \");\n\
  \        }\n}\n```\n\n现在程序正确地打印了预期的输出：\n\n```\n1  2  3  4  5  6  7  8  9\n```\n\n\
  \n\n在 `increment()` 方法中，你在读写 `Counter.count` 之前获取了 `this` 引用的锁。因此，不可能有多个线程同时执行这些语句。由于只有一个线程能获取锁并执行“临界区”代码块，所以在任意给定时刻，计数器只会被一个线程递增；结果，程序正确打印出\
  \ 1 到 9 的值（没有数据竞争问题）。\n\n同步方法\n\n整个方法可以声明为 `synchronized`。在这种情况下，当调用声明为 `synchronized`\
  \ 的方法时，会在调用该方法的对象上获取一个锁，并在方法返回给调用者时释放该锁。示例如下：\n\n```\npublic synchronized void assign(int\
  \ i) {\n        val = i;\n}\n```\n\n现在 `assign()` 方法是一个同步方法。如果你调用 `assign()` 方法，它会隐式获取\
  \ `this` 引用的锁，然后执行语句 `val = i;`。如果其他线程已经获取了锁，会发生什么？就像同步块一样，如果线程无法获取锁，它将被*阻塞*，并等待直到锁可用。\n\
  \n如果你将整个方法体包裹在一个 `synchronized(this)` 块中，那么同步方法就等同于一个同步块。因此，使用同步块的等效 `assign()`\
  \ 方法是：\n\n```\npublic void assign() {\n        synchronized(this) {\n          \
  \      val = i;\n        }\n}\n```\n\n你可以将静态方法声明为 `synchronized`。然而，锁是在哪个引用变量上获取的呢？记住，静态方法没有隐式的\
  \ `this` 引用。静态同步方法在 `class` 对象上获取锁。每个类都与一个 `Class` 类型的对象相关联，你可以使用 `ClassName.class`\
  \ 语法来访问它。例如：\n\n```\nclass SomeClass {\n        private static int val;\n      \
  \  public static synchronized void assign(int i) {\n                val = i;\n \
  \       }\n        // 更多成员 . . .\n}\n```\n\n在这种情况下，`assign` 方法在被调用时会获取 `SomeClass.class`\
  \ 对象上的锁。现在，使用同步块的等效 `assign()` 方法可以写成：\n\n```\nclass SomeClass {\n        private\
  \ static int val;\n        public static void assign(int i) {\n                synchronized(SomeClass.class)\
  \ {\n                        val = i;\n                }\n        }\n        //\
  \ 更多成员 . . .\n}\n```\n\n你不能将构造函数声明为 `synchronized`；这会导致编译器错误。例如，对于：\n\n```\nclass\
  \ Synchronize {\n        public synchronized Synchronize() { /* 构造函数体 */}\n    \
  \    // 更多方法\n}\n```\n\n你会得到这个错误：\n\n```\nSynchronize.java:2: modifier synchronized\
  \ not allowed here\n        public synchronized Synchronize() { /* 构造函数体 */}\n```\n\
  \n为什么不能将构造函数声明为 `synchronized`？JVM 确保在任意给定时间点，只有一个线程能调用构造函数（针对特定的构造函数）。因此，没有必要将构造函数声明为\
  \ `synchronized`。不过，如果你愿意，可以在构造函数内部使用同步块。\n\n让我们回到 `Counter` 示例。`increment()` 方法也可以重写为同步方法：\n\
  \n```\n// 将 increment 声明为同步方法，而不是在方法内部\n// 使用同步语句包裹一段代码块\npublic synchronized void\
  \ increment() {\n        Counter.count++;\n        System.out.print(Counter.count\
  \ + \"  \");\n}\n```\n\n现在程序正确打印出预期的输出：\n\n```\n1  2  3  4  5  6  7  8  9\n```\n\
  \n在这个例子中，`increment()` 是一个实例方法。静态方法呢？首先，让我们看看当 `increment()` 方法是静态方法时的数据竞争问题；参见清单\
  \ 13-10。\n\n清单 13-10.  DataRace.java\n\n```\nclass Counter {\n        public static\
  \ long count = 0;\n}\n\nclass UseCounter implements Runnable {\n        public static\
  \ void increment() {\n                Counter.count++;\n                System.out.print(Counter.count\
  \ + \"  \");\n        }\n        public void run() {\n                increment();\n\
  \                increment();\n                increment();\n        }\n}\n\npublic\
  \ class DataRace {\n        public static void main(String args[]) {\n         \
  \       UseCounter c = new UseCounter();\n                Thread t1 = new Thread(c);\n\
  \                Thread t2 = new Thread(c);\n                Thread t3 = new Thread(c);\n\
  \                t1.start();\n                t2.start();\n                t3.start();\n\
  \        }\n}\n```\n\n是的，这个程序存在数据竞争问题。要修复它，你可以将静态的 `increment` 方法声明为 `synchronized`，如下所示：\n\
  \n```\npublic static synchronized void increment() {\n        Counter.count++;\n\
  \        System.out.print(Counter.count + \"  \");\n}\n```\n\n做了这个改动后，程序就没有数据竞争问题了。\n\
  \n| ![image](img/banana.jpg) | 初学者常误解同步块是为一段代码块获取锁。实际上，锁是为一个对象获取的，而不是为一段代码。获取的锁会一直持有，直到该块中的所有语句执行完毕。\
  \ |\n\n同步块 vs. 同步方法\n\n从之前关于同步块和同步方法的讨论可以看出，你可以使用其中任何一种来解决数据竞争问题。那么应该选择哪一种呢？与其他语言特性一样，你需要根据特定情况的需求在同步方法和同步块之间做出选择。以下是一些考虑因素。\n\
  \n如果你只想为一段小的代码块（而不是整个方法）获取对象上的锁，那么同步块就足够了；在这种情况下使用同步方法有些大材小用。通常，最好为小段代码获取锁，而不是不必要地锁定整个方法，因此同步块在这方面很有用。在同步块中，你可以显式提供要获取锁的引用对象。然而，对于同步方法，你不需要提供任何显式引用来获取锁。同步方法隐式地在\
  \ `this` 引用（对于实例方法）和类对象（对于静态方法）上获取锁。\n\n另一方面，如果你想为一个小方法的整个方法体获取锁，那么使用 `synchronized`\
  \ 作为方法属性比使用同步块更优雅、更方便。在同步方法中，阅读方法声明本身时，就能清楚地知道该方法是同步的；而对于同步块，你需要阅读文档或查看代码内部才能理解执行了某些同步操作。\n\
  \n死锁\n\n获取和使用锁很棘手，可能导致很多问题。其中一个困难（且常见）的问题被称为*死锁*。还有其他问题，如*活锁*和*锁饥饿*，我们将在下一节简要讨论。\n\
  \n当锁定线程导致它们无法继续执行，从而无限等待其他线程终止时，就会发生死锁。假设一个线程获取了资源 r1 上的锁，并等待获取另一个资源 r2 上的锁。同时，假设有另一个线程已经获取了\
  \ r2，并正在等待获取 r1 上的锁。除非另一个线程释放锁，否则这两个线程都无法继续执行，而这种情况永远不会发生——因此它们陷入了死锁。\n\n清单 13-11\
  \ 展示了这种情况是如何发生的（使用板球比赛的例子）。\n\n清单 13-11.  DeadLock.java\n\n```\n// Balls 类有一个全局可访问的数据成员，用于保存到目前为止投出的球数\n\
  class Balls {\n        public static long balls = 0;\n}\n\n\n\n// Runs 类有一个全局可访问的数据成员，用于保存到目前为止的得分次数\n\
  class Runs {\n        public static long runs = 0;\n}\n\n// Counter 是一个线程类，包含两个方法——IncrementBallAfterRun\
  \ 和\n// IncrementRunAfterBall。\n// 为了演示死锁，我们在 run 方法中调用这两个方法，\n// 以便在这两个方法中以相反的顺序请求锁\n\
  class Counter implements Runnable {\n        // 此方法先增加 runs 变量，然后增加 balls 变量\n \
  \       // 由于这些变量可被其他线程访问，\n        // 我们需要在处理它们之前获取锁\n        public void IncrementBallAfterRun()\
  \ {\n                // 由于我们先更新 runs 变量，因此先锁定 Runs.class 引用\n                synchronized(Runs.class)\
  \ {\n                        // 现在在更新 balls 变量之前，获取 Balls.class 变量上的锁\n        \
  \                synchronized(Balls.class) {\n                                Runs.runs++;\n\
  \                                Balls.balls++;\n                        }\n   \
  \             }\n        }\n\npublic void IncrementRunAfterBall() {\n          \
  \      // 由于我们先更新 balls 变量，因此先锁定 Balls.class 引用\n                synchronized(Balls.class)\
  \ {\n                        // 现在在更新 runs 变量之前，获取 Runs.class 变量上的锁\n          \
  \              synchronized(Runs.class) {\n                                Balls.balls++;\n\
  \                                Runs.runs++;\n                        }\n     \
  \           }\n        }\n\npublic void run() {\n                // 调用这两个以不同顺序获取锁的方法\n\
  \                // 根据线程调度和锁获取的顺序，\n                // 可能会也可能不会发生死锁\n          \
  \      IncrementBallAfterRun();\n                IncrementRunAfterBall();\n    \
  \    }\n}\n\npublic class DeadLock {\n        public static void main(String args[])\
  \ throws InterruptedException {\n                Counter c = new Counter();\n  \
  \              // 创建两个线程并同时启动它们\n                Thread t1 = new Thread(c);\n  \
  \              Thread t2 = new Thread(c);\n                t1.start();\n       \
  \         t2.start();\n                System.out.println(\"等待线程完成执行...\");\n  \
  \              t2.join();\n                t2.join();\n                System.out.println(\"\
  完成。\");\n        }\n}\n```\n\n如果你执行这个程序，它可能正常运行，也可能发生死锁而永不终止（该程序中死锁的发生取决于线程的调度方式）。\n\
  \n```\nD:\\ > java DeadLock\n等待线程完成执行...\n完成。\n\nD:\\ > java DeadLock\n等待线程完成执行...\n\
  完成。\n\nD:\\ > java DeadLock\n等待线程完成执行...\n[死锁 – 用户按下了 ctrl + c 终止程序]\n\nD:\\ > java\
  \ DeadLock\n等待线程完成执行...\n完成。\n```\n\n在这个例子中，有两个类，`Balls` 和 `Runs`，它们分别包含名为 `balls`\
  \ 和 `runs` 的静态成员。`Counter` 类有两个方法：`IncrementBallAfterRun()` 和 `IncrementRunAfterBall()`。它们以相反的顺序获取\
  \ `Balls.class` 和 `Runs.class` 上的锁。`run()` 方法连续调用这两个方法。`Dead` 类中的 `main()` 方法创建并启动了两个线程。\n\
  \n当线程 `t1` 和 `t2` 执行时，它们会调用 `IncrementBallAfterRun` 和 `IncrementRunAfterBall` 方法。在这些方法中，锁以相反的顺序获取。可能会发生这样的情况：`t1`\
  \ 获取了 `Runs.class` 上的锁，然后等待获取 `Balls.class` 上的锁。与此同时，`t2` 可能已经获取了 `Balls.class`，现在正在等待获取\
  \ `Runs.class` 上的锁。因此，这个程序可能导致死锁（图 13-5）。\n\n![9781430247647_Fig13-05.jpg](img/9781430247647_Fig13-05.jpg)\n\
  \n\n\n图 13-5. 线程 t1 与 t2 之间的死锁\n\n无法保证每次执行该程序都会导致死锁。为什么？因为你永远无法预知线程的执行顺序以及锁的获取与释放顺序。因此，这类问题被称为**非确定性**问题，且无法稳定复现。\n\
  \n针对死锁有不同的处理策略，例如死锁预防、死锁避免或死锁检测。就考试而言，你需要了解关于死锁的以下内容：\n\n*   死锁可能发生在多个锁的上下文中。\n\
  *   如果多个锁以相同的顺序获取，则不会发生死锁；但如果以不同的顺序获取，则可能发生死锁。\n*   死锁（如同其他多线程问题）是非确定性的；你无法稳定地复现死锁。\n\
  \n| ![image](img/Note.jpg) | 避免获取多个锁。如果你需要获取多个锁，请确保在所有地方都以相同的顺序获取它们，以避免死锁。 |\n\n\
  其他线程问题\n\n到目前为止，我们通过示例讨论了数据竞争和死锁。现在我们将简要讨论另外两个线程问题：活锁和锁饥饿。\n\n活锁\n\n为了帮助理解活锁，我们打个比方。假设有两辆自动驾驶的机器人汽车在道路上行驶。出现了一种情况：两辆机器人汽车同时到达一座窄桥的两端。桥非常窄，一次只能通过一辆车。机器人汽车被编程为等待另一辆车先通过。当两辆车同时试图进入桥时，可能会发生以下情况：每辆车开始进入桥，注意到另一辆车也在试图做同样的事，然后倒车！请注意，汽车不断前进和后退，看起来好像做了很多工作，但两辆车都没有取得任何进展。这种情况被称为*活锁*。\n\
  \n考虑两个线程 t1 和 t2。假设线程 t1 进行了一项更改，而线程 t2 撤销了该更改。当线程 t1 和 t2 同时工作时，看起来好像完成了大量工作，但实际上没有取得任何进展。这种情况在线程中被称为活锁。\n\
  \n活锁和死锁的相似之处在于进程“挂起”，程序永远不会终止。然而，在死锁中，线程卡在相同的状态，等待其他线程释放共享资源；而在活锁中，线程持续执行任务，进程状态不断变化，但整个应用程序并未取得进展。\n\
  \n锁饥饿\n\n考虑这样一种情况：大量线程被分配了不同的优先级（范围从最低优先级 1 到最高优先级 10，这是 Java 中线程允许的优先级范围）。当一个互斥锁可用时，线程调度器会优先考虑高优先级线程而非低优先级线程。如果有许多高优先级线程想要获取锁并且长时间持有锁，那么低优先级线程何时才有机会获取锁呢？换句话说，低优先级线程长时间“饥饿”地试图获取锁的情况被称为*锁饥饿*。\n\
  \n有许多技术可用于检测或避免诸如活锁和饥饿之类的线程问题，但这些不在 OCPJP7 考试范围内。从考试的角度来看，你需要了解本章已经介绍过的不同类型的线程问题。\n\
  \n等待/通知机制\n\n在多线程程序中，通常需要一个线程与另一个线程进行通信。当线程必须相互通信以提供某项功能时，等待/通知机制非常有用。\n\n以咖啡店为例。服务员使用咖啡机煮咖啡，并将咖啡送给顾客。这家咖啡店的咖啡机是一台古董机：一次只能煮一杯咖啡，煮一杯需要五到十分钟。服务员在等待咖啡机完成煮咖啡的过程中不必闲着；他可以在此期间去给顾客送之前煮好的咖啡。不过这个例子有点牵强：假设咖啡机不停地煮咖啡，服务员不停地送咖啡。\n\
  \n`wait()`方法允许调用线程等待等待对象（即调用`wait()`的对象）。换句话说，如果你想让一个线程等待另一个线程，你可以使用`wait()`方法让它等待该等待对象。一个线程会保持在*等待*状态，直到另一个线程在该等待对象上调用`notify()`或`notifyAll()`方法。为了理解等待/通知机制，你将在程序中模拟这个咖啡店场景。你可以将咖啡机实现为一个线程，将服务员实现为另一个线程，分别放在两个不同的类中。咖啡机可以通知服务员取咖啡，然后等待直到服务员从托盘上取走咖啡。同样，服务员可以在咖啡准备好时取走咖啡，并通知咖啡机再煮一杯。\n\
  \n用示例解释等待/通知机制涉及相当多的代码。但这是一个说明此概念的有趣示例，请继续阅读。清单 13-12 包含了`CoffeeMachine`类。\n\n清单\
  \ 13-12. CoffeeMachine.java\n\n```\n// CoffeeMachine 类作为一个独立的线程运行。\n// 一旦机器煮好咖啡，它会通知服务员来取。\n\
  // 当服务员要求咖啡机再次煮咖啡时，\n// 整个过程重新开始，并且这个过程持续进行……\nclass CoffeeMachine extends Thread\
  \ {\n        static String coffeeMade = null;\n        static final Object lock\
  \ = new Object();\n        private static int coffeeNumber = 1;\n        void makeCoffee()\
  \ {\n                synchronized(CoffeeMachine.lock) {\n                      \
  \  if(coffeeMade ! = null) {\n                                try {\n          \
  \                              System.out.println(\"咖啡机：等待服务员通知取咖啡\");\n       \
  \                                 CoffeeMachine.lock.wait();\n                 \
  \               }\n                                catch(InterruptedException ie)\
  \ {\n                                        ie.printStackTrace();\n           \
  \                     }\n                        }\n                        coffeeMade\
  \ = \"咖啡编号 \" + coffeeNumber ++;\n                        System.out.println(\"\
  咖啡机说：已制作 \" + coffeeMade);\n                        // 咖啡准备好后，通知服务员来取\n        \
  \                CoffeeMachine.lock.notifyAll();\n                        System.out.println(\"\
  咖啡机：通知服务员取咖啡 \");\n                }\n        }\n\npublic void run() {\n       \
  \         while(true) {\n                        makeCoffee();\n               \
  \         try {\n                                System.out.println(\"咖啡机：现在正在制作另一杯咖啡\"\
  );\n                                // 通过调用 sleep 方法模拟煮咖啡所需的时间\n               \
  \                 Thread.sleep(10000);\n                        }\n            \
  \            catch(InterruptedException ie) {\n                                //\
  \ 忽略此异常是可以的\n                                // 因为我们没有使用线程中断机制\n               \
  \                 ie.printStackTrace();\n                        }\n           \
  \     }\n        }\n}\n```\n\n\n\n`CoffeeMachine` 对象将作为线程运行，因此它继承了 `Thread` 类并实现了\
  \ `run()` 方法。`run()` 方法会无限循环，持续调用 `makeCoffee()` 方法。每次迭代中，它都会调用 `sleep()` 方法休眠十秒，以模拟咖啡机制作咖啡所需的时间。\n\
  \n`CoffeeMachine` 有三个静态成员。`coffeeMade` 成员存储了已制作咖啡的字符串描述。`lock` 成员用于 `CoffeeMachine`\
  \ 和 `Waiter` 线程之间的同步。`numOfCoffees` 在 `makeCoffee()` 方法内部使用，用于获取已制作咖啡的描述。\n\n`makeCoffee()`\
  \ 方法完成了大部分工作。它首先使用 `synchronized` 关键字获取锁 `CoffeeMachine.lock`。在同步块内部，它会检查 `coffeeMade`\
  \ 是否为 `null`。当 `CoffeeMachine` 线程首次调用 `makeCoffee()` 方法时，`coffeeMade` 将为 `null`。在其他情况下，是由\
  \ `Waiter` 线程将 `coffeeMade` 置为 `null`，并（使用 `notifyAll()` 方法）通知 `CoffeeMachine` 线程。如果\
  \ `Waiter` 线程尚未清除它，则该线程会进入 `wait()` 状态，并打印消息“等待服务员通知以提供咖啡”。\n\n一旦 `Waiter` 通知了 `CoffeeMachine`\
  \ 线程，咖啡机就会将下一杯咖啡交给服务员；它会打印消息通知服务员取咖啡。现在，让我们看看 `Waiter` 类（参见清单 13-13）。\n\n清单 13-13.  Waiter.java\n\
  \n```\n// Waiter 作为一个独立的线程运行\n// 它与 CoffeeMachine 交互，等待咖啡制作完成\n// 并在准备好后提供咖啡，然后请求咖啡机\n\
  // 制作下一杯，此活动将无限循环……\nclass Waiter extends Thread {\n        public void getCoffee()\
  \ {\n                synchronized(CoffeeMachine.lock) {\n                      \
  \  if(CoffeeMachine.coffeeMade == null) {\n                                try {\n\
  \                                        // 等待直到 CoffeeMachine 通知咖啡已准备好\n      \
  \                                  System.out.println(\"Waiter: Will get orders\
  \ till\n                                                        coffee machine notifies\
  \ me \");\n                                        CoffeeMachine.lock.wait();\n\
  \                                }\n                                catch(InterruptedException\
  \ ie) {\n                                        // 忽略此异常是可以的\n                \
  \                        // 因为我们没有使用线程中断机制\n                                   \
  \     ie.printStackTrace();\n                                }\n               \
  \         }\n                        System.out.println(\"Waiter: Delivering \"\
  \ + CoffeeMachine.coffeeMade);\n                        CoffeeMachine.coffeeMade\
  \ = null;\n                        // 请求（通知）咖啡机制作下一杯咖啡\n                       \
  \ CoffeeMachine.lock.notifyAll();\n                        System.out.println(\"\
  Waiter: Notifying coffee machine to make another one\");\n                }\n  \
  \      }\n\npublic void run() {\n                // 持续运行，直到用户按下 Ctrl-C 终止程序\n  \
  \              while(true) {\n                        getCoffee();\n           \
  \     }\n        }\n}\n```\n\n`Waiter` 类也 `extends` 了 `Thread`，因为 `Waiter` 对象也将作为线程\
  \ `运行`。它有一个 `run()` 方法，做的事情非常简单：它无限循环地调用 `getCoffee()` 方法。\n\n`Waiter` 类中的 `getCoffee()`\
  \ 方法完成了大部分工作。该方法首先尝试获取 `CoffeeMachine.lock` 上的锁。一旦获得锁，它会检查 `coffeeMade` 是否为 `null`。如果该变量为\
  \ `null`，则表示 `CoffeeMachine` 线程仍在准备咖啡。在这种情况下，`Waiter` 线程会调用 `wait()`，然后打印消息“在咖啡机通知我之前，我会一直接单”。当\
  \ `CoffeeMachine` 线程制作好咖啡后，它会设置变量 `coffeeMade`，此时该变量将不为 `null`；该线程还会使用 `notifyAll()`\
  \ 通知 `Waiter` 线程。\n\n一旦 `Waiter` 线程收到通知，它就可以将咖啡提供给顾客；它会打印消息“正在提供咖啡”。之后，它会将 `coffeeMade`\
  \ 变量清除为 `null`，并通知 `CoffeeMachine` 制作下一杯咖啡（“通知咖啡机制作下一杯”）。清单 13-14 展示了 `CoffeeShop`\
  \ 类。\n\n清单 13-14.  CoffeeShop.java\n\n```\n// 此类实例化两个线程 - CoffeeMachine 和 Waiter\
  \ 线程\n// 这两个线程通过 wait/notify 相互交互\n// 直到你通过按 Ctrl-C 显式终止应用程序\nclass CoffeeShop {\n\
  \        public static void main(String []s) {\n                CoffeeMachine coffeeMachine\
  \ = new CoffeeMachine();\n                Waiter waiter = new Waiter();\n      \
  \          coffeeMachine.start();\n                waiter.start();\n        }\n\
  }\n```\n\n`CoffeeShop` 类中的 `main()` 方法所做的工作很简单：它创建 `CoffeeMachine` 和 `Waiter` 线程并启动它们。现在，这两个线程相互通信并无限循环运行。程序输出如下所示：\n\
  \n```\nCoffee machine says: Made Coffee No. 1\nCoffee machine: Notifying waiter\
  \ to pick the coffee\nCoffee machine: Making another coffee now\nWaiter: Delivering\
  \ Coffee No. 1\nWaiter: Notifying coffee machine to make another one\nCoffee machine\
  \ says: Made Coffee No. 2\nCoffee machine: Notifying waiter to pick the coffee\n\
  Coffee machine: Making another coffee now\nWaiter: Will get orders till coffee machine\
  \ notifies me\nWaiter: Delivering Coffee No. 2\nWaiter: Notifying coffee machine\
  \ to make another one\nCoffee machine says: Made Coffee No. 3\nCoffee machine: Notifying\
  \ waiter to pick the coffee\nCoffee machine: Making another coffee now\nWaiter:\
  \ Will get orders till coffee machine notifies me\nWaiter: Delivering Coffee No.\
  \ 3\nWaiter: Notifying coffee machine to make another one\n```\n\n// 无限循环，直到你按下\
  \ Ctrl-C 终止应用程序……\n\n应该使用 NOTIFY() 还是 NOTIFYALL()？\n\n你有两种方法——`notify()` 和 `notifyAll()`——用于通知（即唤醒\
  \ `Thread` 类中等待的线程）。但你应该使用哪一个呢？\n\n让我们来探讨一下这两个调用之间的细微差别。`notify()` 方法会唤醒*一个*等待该锁的线程（第一个在该锁上调用\
  \ `wait()` 的线程）。`notifyAll()` 方法会唤醒*所有*等待该锁的线程；JVM 会从等待该锁的线程列表中选择一个线程并将其唤醒。\n\n\
  在只有一个线程等待锁的情况下，`notify()` 和 `notifyAll()` 之间没有显著区别。然而，当有多个线程等待锁时，无论是使用 `notify()`\
  \ 还是 `notifyAll()`，具体唤醒哪个线程都由 JVM 控制，你无法通过编程方式控制唤醒特定线程。\n\n\n\n乍一看，仅调用 `notify()`\
  \ 来唤醒一个线程似乎是个好主意；唤醒所有线程似乎并无必要。然而，`notify()` 的问题在于，被唤醒的线程可能并非适合被唤醒的那个（该线程可能正在等待其他条件，或者该条件对该线程而言仍未满足等）。在这种情况下，`notify()`\
  \ 发出的通知可能会丢失，且没有其他线程会被唤醒，这可能导致一种死锁（通知丢失，所有其他线程都在等待通知——永远等待！）。\n\n为避免此问题，当有多个线程在等待一个锁（或等待多个条件）时，最好始终调用\
  \ `notifyAll()`。`notifyAll()` 方法会唤醒所有线程，因此效率不高。然而，在实际应用中，这种性能损失可以忽略不计。\n\n| ![image](img/bulp.jpg)\
  \ | 优先使用 `notifyAll()` 而非 `notify()`。 |\n\n| ![image](img/banana.jpg) | 使用 `notify()`/`notifyAll()`\
  \ 只会唤醒在调用该方法的锁上等待的线程；它不会唤醒任何其他线程。如果你错误地在某个锁上使用 `wait()`，而在另一个锁上使用 `notify()`/`notifyAll()`，那么等待的线程将永远不会收到通知，程序将挂起（导致一种死锁情况！）。\
  \ |\n\n让我们解决一个问题\n\n由于 wait/notify 机制很重要，让我们再举一个例子，并更深入地理解它。\n\n**问题描述：** *假设你需要实现一个掷骰子游戏。这是一个双人游戏（假设玩家是“Joe”和“Jane”），玩家轮流掷骰子。当一个玩家掷骰子时，另一个玩家等待。一旦该玩家完成掷骰子，他/她通知另一个玩家开始；之后，他/她开始等待另一个玩家掷骰子。你需要将这两个玩家实现为协同工作的两个线程。游戏在每个玩家掷骰子\
  \ 6 次后结束（因此游戏中总共会有 12 次掷骰子）。*\n\n由于问题描述中提到“将这两个玩家实现为协同工作的两个线程”，你的解决方案是一个多线程程序，每个玩家作为一个线程实现。问题还指出，当一个玩家掷骰子时，另一个等待。因此，你可能应该使用\
  \ wait/notify 机制。掷骰子应产生一个随机值，因此你可以使用 `Random` 类来生成 1 到 6 的随机数。\n\n以下是一个解决方案。首先通读整个程序（清单\
  \ 13-15），然后你将看到其工作原理的解释。\n\n清单 13-15.  DiceGame.java\n\n```\nimport java.util.Random;\n\
  \n// Gamers 类仅保存掷骰子的玩家名称\nclass Gamers {\n        // 通过将构造函数设为私有来防止实例化此工具类\n   \
  \     private Gamers() {}\n        public static final String JOE = \"Joe\";\n \
  \       public static final String JANE = \"Jane\";\n}\n\n// Dice 类抽象了骰子如何掷出以及谁在玩\n\
  class Dice {\n        // 记住轮到谁掷骰子\n        private static String turn = null;\n\
  \        synchronized public static String getTurn() { return turn ; }\n       \
  \ synchronized public static void setTurn(String player) { turn = player; }\n\n\
  // 哪个玩家开始游戏\n        public static void setWhoStarts(String name) { turn = name;\
  \ }\n\n// 通过将构造函数设为私有来防止实例化此类（我们只有静态成员）\n        private Dice() { }\n\n// 当我们掷骰子时，它应给出一个随机结果\n\
  \        private static Random random = new Random();\n        // random.nextInt(6)\
  \ 给出 0 到 5 的值，因此在 roll() 中加 1\n        public static int roll() { return random\
  \ .nextInt(6) + 1; }\n}\n\n// Player 类抽象了玩骰子游戏的玩家\n// 每个玩家作为一个单独的线程运行，因此 Player\
  \ 继承 Thread 类\nclass Player extends Thread {\n        private String currentPlayer\
  \ = null;\n        private String otherPlayer = null;\n\npublic Player(String thisPlayer)\
  \ {\n                currentPlayer = thisPlayer;\n                // 我们只有两个玩家；我们将它们保存在\
  \ currentPlayer 和 otherPlayer 中\n                otherPlayer = thisPlayer.equals(Gamers.\
  \ JOE ) ? Gamers. JANE : Gamers. JOE ;\n        }\n\npublic void run() {\n     \
  \           // 每个玩家在游戏中掷骰子 6 次\n                for(int i = 0; i < 6; i++) {\n \
  \                       // 在继续之前获取锁\n                        synchronized(Dice.class)\
  \ {\n                                // 如果当前不是 currentPlayer 的回合，则\n           \
  \                     // 等待 otherPlayer 的通知\n                                while(!Dice.\
  \ getTurn ().equals(currentPlayer)) {\n                                        try\
  \ {\n                                                Dice.class.wait(1000);\n  \
  \                                              System. out .println(currentPlayer\
  \ +\n                                                        \" 正在等待 \" + otherPlayer);\n\
  \                                        }\n                                   \
  \     catch(InterruptedException ie) {\n                                       \
  \         ie.printStackTrace();\n                                        }\n   \
  \                             }\n                                // 现在是 currentPlayer\
  \ 的回合；掷骰子\n                                System. out .println(Dice. getTurn ()\
  \ + \" 掷出了 \" + Dice. roll ());\n                                // 将回合设置为 otherPlayer，并通知\
  \ otherPlayer\n                                Dice. setTurn (otherPlayer);\n  \
  \                              Dice.class.notifyAll();\n                       \
  \ }\n                }\n        }\n}\n\n// DiceGame 类通过启动玩家线程来开始游戏\nclass DiceGame\
  \ {\n        public static void main(String []s) {\n                Player player1\
  \ = new Player(Gamers. JANE );\n                Player player2 = new Player(Gamers.\
  \ JOE );\n                // 不要忘记设置谁开始游戏\n                Dice. setWhoStarts (Gamers.\
  \ JOE );\n                player1.start();\n                player2.start();\n \
  \       }\n}\n```\n\n当你运行该程序时，示例输出将如下所示：\n\n```\nJoe 掷出了 2\nJane 正在等待 Joe\nJane\
  \ 掷出了 5\nJoe 掷出了 6\nJane 正在等待 Joe\nJane 掷出了 1\nJoe 掷出了 2\nJane 正在等待 Joe\nJane 掷出了\
  \ 6\nJoe 掷出了 6\nJane 正在等待 Joe\nJane 掷出了 5\nJoe 正在等待 Jane\nJoe 掷出了 5\nJane 正在等待 Joe\n\
  Jane 掷出了 4\nJoe 正在等待 Jane\nJoe 掷出了 4\nJane 正在等待 Joe\nJane 掷出了 5\n```\n\n现在，让我们更详细地查看代码以理解其工作原理。\n\
  \n```\n// Gamers 类仅保存掷骰子的玩家名称\nclass Gamers {\n        // 通过将构造函数设为私有来防止实例化此工具类\n\
  \        private Gamers() {}\n        public static final String JOE = \"Joe\";\n\
  \        public static final String JANE = \"Jane\";\n}\n```\n\n`Gamers` 类只是一个工具类，保存玩家名称（`Joe`\
  \ 和 `Jane`）。由于无需实例化该类，你将构造函数声明为 `private`。\n\n`Dice` 类抽象了骰子如何掷出；它还记录了玩家轮流的情况。\n\n\
  ```\nclass Dice {\n        // 记住轮到谁掷骰子\n        private static String turn = null;\n\
  \        synchronized public static String getTurn() { return turn; }\n        synchronized\
  \ public static void setTurn(String player) { turn = player; }\n\n// 哪个玩家开始游戏\n\
  \        public static void setWhoStarts(String name) { turn = name; }\n\n// 通过将构造函数设为私有来防止实例化此类（我们只有静态成员）\n\
  \        private Dice() { }\n\n\n\n// 当我们掷骰子时，它应该产生一个随机结果\n        private static\
  \ Random random = new Random();\n        // random.nextInt(6) 返回 0 到 5 之间的值，因此在\
  \ roll() 方法中加 1\n        public static int roll() { return random.nextInt(6) + 1;\
  \ }\n}\n```\n\n你有一个名为 `turn` 的 `String` 类型成员变量。该变量保存当前轮到掷骰子的玩家名称。`getTurn()` 和 `setTurn()`\
  \ 方法是该成员的 getter 和 setter 方法。游戏开始时，你需要指定谁先开始游戏（你需要将 `turn` 设置为一个合适的初始值）；通过调用 `setWhoStarts`\
  \ 来实现。类中的所有成员都是静态的，因此无需实例化该类；通过将构造函数设为私有来强制执行这一点。\n\n掷骰子应产生一个 1 到 6 之间的随机值。你可以使用\
  \ `java.util` 包中的 `Random` 类来获取随机数。`Random` 类有一个实例方法 `nextInt()`，可用于获取你想要的数值范围。如果你向\
  \ `nextInt` 传递整数值 6，它会返回 0 到 5 之间的值，因此加 1 即可得到 1 到 6 之间的值。\n\n`Player` 类是你完成大部分工作的地方。`Player`\
  \ 类抽象了玩 `Dice` 游戏的玩家。每个玩家作为一个独立的线程运行，因此 `Player` 继承了 `Thread` 类。或者，你也可以通过实现 `Runnable`\
  \ 接口来实现 `Player`。这两种方法等效且都是可接受的解决方案。\n\n```\nclass Player extends Thread {\n   \
  \     private String currentPlayer = null;\n        private String otherPlayer =\
  \ null;\n\npublic Player(String thisPlayer) {\n                currentPlayer = thisPlayer;\n\
  \                // 我们只有两名玩家；我们将他们记录在 currentPlayer 和 otherPlayer 中\n          \
  \      otherPlayer = thisPlayer.equals(Gamers.JOE) ? Gamers.JANE: Gamers.JOE;\n\
  \        }\n        // 其他成员\n} \n```\n\n你为每个玩家创建两个 `Player` 线程。因此，你将值保存在 `currentPlayer`\
  \ 和 `otherPlayer` 中；在 `Player` 构造函数中设置这些值。\n\n以下是 `Player` 的 `run()` 方法：\n\n```\n\
  public void run() {\n        // 游戏中每个玩家掷骰子 6 次\n        for(int i = 0; i < 6; i++)\
  \ {\n                // 在继续之前获取锁\n                synchronized(Dice.class) {\n \
  \                       // 如果当前不是 currentPlayer 的回合，则\n                        //\
  \ 等待 otherPlayer 的通知\n                        while(!Dice.getTurn().equals(currentPlayer))\
  \ {\n                                try {\n                                   \
  \     System.out.println(currentPlayer +\n                                     \
  \           \" 正在等待 \" + otherPlayer);\n                                       \
  \ Dice.class.wait(1000);                                 }\n                   \
  \             catch(InterruptedException ie) {\n                               \
  \         ie.printStackTrace();\n                                }\n           \
  \             }\n                        // 现在是 currentPlayer 的回合；掷骰子\n        \
  \                System.out.println(Dice.getTurn() +\n                        \"\
  \ 掷出了 \" + Dice.roll());\n                        // 将回合设置为 otherPlayer，并通知 otherPlayer\n\
  \                        Dice.setTurn(otherPlayer);\n                        Dice.class.notifyAll();\n\
  \                }\n        }\n}\n```\n\n每个 `Player` 线程都会调用 `run()` 方法。每个玩家掷骰子六次，因此你有一个包含六次迭代的\
  \ `for` 循环。在每次循环迭代中，你检查是否轮到 `currentPlayer` 掷骰子。如果不是，则让该玩家线程等待，直到 `otherPlayer`\
  \ 通知 `currentPlayer` 轮到其回合。在检查 `turn` 之前，你需要获取一个锁。任何公共锁都可以，这里你使用 `Dice.class` 作为锁。一旦\
  \ `currentPlayer` 收到通知，他/她就会调用 `Dice.roll()` 方法。他/她的回合结束，因此他/她将 `turn` 设置为另一个玩家，并调用\
  \ `notifyAll()` 来唤醒 `otherPlayer` 线程。你也可以使用 `notify()` 方法，但使用 `notifyAll()` 方法同样可以接受，而且后者更好。\n\
  \n`DiceGame` 类做的事情非常简单。它包含 `main()` 方法，你可以在其中创建 `Jane` 和 `Joe` 玩家对象。你设置其中一个开始游戏。你调用这两个玩家线程的\
  \ `start()` 方法来开始游戏。\n\n| ![image](img/Note.jpg) | 如果你需要一种机制来等待特定事件发生，wait/notify\
  \ 机制是最佳选择。有时程序员通过使用 sleep 调用来解决这个问题，并反复检查条件以查看事件是否已发生。这是一种低效的解决方案。此外，调用 sleep 不会释放锁（与\
  \ wait 不同），因此使用 sleep 的解决方案容易导致死锁。当 wait/notify 机制是合适的解决方案时，不要使用 sleep 方法。 |\n\n\
  更多线程状态\n\n在本章前面，我们讨论了三种基本的线程状态：*新建*、*可运行*和*终止*状态。除了这些状态之外，线程还可能处于*阻塞*、*等待*、*定时等待*状态，我们现在就来讨论这些状态。图\
  \ 13-6 展示了这六种状态通常如何以及何时发生状态转换。\n\n![9781430247647_Fig13-06.jpg](img/9781430247647_Fig13-06.jpg)\n\
  \n图 13-6.  线程生命周期中可能的状态\n\n定时等待和阻塞状态\n\n清单 13-16 包含一个简单的示例，用于理解*定时等待*和*阻塞*状态。\n\n\
  清单 13-16.  MoreThreadStates.java\n\n```\n// 这个 Thread 类在获取其类对象的锁后，仅调用 sleep 方法\n\
  class SleepyThread extends Thread {\n        public void run() {\n             \
  \   synchronized(SleepyThread.class) {\n                        try {\n        \
  \                        Thread.sleep(1000);\n                        }\n      \
  \                  catch(InterruptedException ie) {\n                          \
  \      // 忽略此异常是可以的，因为我们在此代码中不中断异常\n                                ie.printStackTrace();\n\
  \                        }\n                }\n        }\n}\n\n// 该类创建两个线程，以展示这些线程如何进入\n\
  // TIMED_WAITING 和 BLOCKED 状态\nclass MoreThreadStates {\n        public static void\
  \ main(String []s) {\n                Thread t1 = new SleepyThread();\n        \
  \        Thread t2 = new SleepyThread();\n                t1.start();\n        \
  \        t2.start();\n                System.out.println(t1.getName() + \": 我处于状态\
  \ \" + t1.getState());\n                System.out.println(t2.getName() + \": 我处于状态\
  \ \" + t2.getState());\n        }\n}\n```\n\n它会打印以下内容：\n\n```\nThread-0: 我处于状态 TIMED_WAITING\n\
  Thread-1: 我处于状态 BLOCKED\n```\n\n你有一个 `SleepyThread` 类，其 `run()` 方法仅获取一个锁然后进入睡眠。你在\
  \ `main()` 方法中创建了两个线程 `t1` 和 `t2`。\n\n\n\n当 `t1` 运行时，它会获取锁（`SleepyThread.class`）并进入休眠。请记住，当线程休眠时，它不会释放锁：它只是持有锁。因此，`sleep()`\
  \ 被调用 1 秒（1000 毫秒；`sleep()` 的参数以毫秒为单位），所以线程 `t1` 处于 `TIMED_WAITING` 状态。\n\n与此同时，`main`\
  \ 线程启动了 `t2` 线程。当它的 `run()` 方法被调用时，它发现必须获取锁（`SleepyThread.class`）。然而，你知道锁已经被线程 `t1`\
  \ 获取，并且该线程仍在休眠（并且处于 *timed_waiting* 状态）。因此，线程 `t2` 等待获取锁，从而处于 *blocking* 状态。`main()`\
  \ 方法在启动线程后，通过调用 `getState()` 方法打印这两个线程的状态。\n\n等待状态\n\n*等待*状态通常发生在线程通过调用 `wait()`\
  \ 方法等待特定条件发生时。清单 13-17 是一个简单的示例，用于说明*等待*状态。\n\n清单 13-17.  WaitingThreadState.java\n\
  \n```\n// 此类包含的 run 方法会永远等待，因为没有其他线程来通知它\nclass InfiniteWaitThread extends Thread\
  \ {\n        static boolean okayToRun = false;\n        synchronized public void\
  \ run() {\n                while(!okayToRun) {\n                        try {\n\
  \                                // 注意调用 wait 时没有设置任何超时值\n                     \
  \           // 因此它会永远等待某个线程来通知它\n                                wait();\n     \
  \                   }\n                        catch(InterruptedException ie) {\n\
  \                                // 忽略此异常是可以的，因为我们在此代码中\n                      \
  \          // 不会中断异常\n                                ie.printStackTrace();\n  \
  \                      }\n                }\n        }\n}\n\nclass WaitingThreadState\
  \ {\n        public static void main(String []s) {\n                Thread t = new\
  \ InfiniteWaitThread();\n                t.start();\n                System.out.println(t.getName()\
  \ + \": I'm in state \" + t.getState());\n        }\n}\n```\n\n该程序会打印以下内容：\n\n```\n\
  Thread-0: I'm in state WAITING\n```\n\n你必须按 Ctrl + C 来终止该线程，因为线程会无限等待条件发生（即 `okayToRun`\
  \ 变为 `true`）。在实际的程序中，你也会编写代码来使条件发生；换句话说，你会编写代码将 `okayToRun` 设置为 `true`，然后调用 `notify()/notifyAll()`。然而，由于这只是一个用于说明*等待*状态的虚拟程序，我们省略了那部分。\n\
  \n如果你将 `run` 语句中的 `wait` 语句改为 `wait(1000)` 会怎样？现在程序将打印 `TIMED_WAITING`。*timed_waiting*\
  \ 状态不仅发生在你之前看到的带有超时的 `sleep` 中；它也适用于带有超时值的 `wait()` 方法调用。\n\n使用 Thread.State 枚举\n\
  \n`Thread` 类定义了 `Thread.State` 枚举，其中包含一系列可能的线程状态。清单 13-18 是一个简单的程序，用于打印此枚举中状态的值。\n\
  \n清单 13-18.  ThreadStatesEnumeration.java\n\n```\nclass ThreadStatesEnumeration\
  \ {\n        public static void main(String []s) {\n                for(Thread.State\
  \ state : Thread.State.values()){\n                        System.out.println(state);\n\
  \                }\n        }\n}\n```\n\n它会打印以下内容：\n\n```\nNEW\nRUNNABLE\nBLOCKED\n\
  WAITING\nTIMED_WAITING\nTERMINATED\n```\n\n理解 IllegalThreadStateException\n\n在编写线程代码时，你应该始终保持谨慎，时刻牢记线程的状态。如果你不注意底层状态，会发生什么？让我们先看看清单\
  \ 13-19 中的简单示例。\n\n清单 13-19.  ThreadStateProblem.java\n\n```\nclass ThreadStateProblem\
  \ {\n        public static void main(String []s) {\n                Thread thread\
  \ = new Thread();\n                thread.start();\n                thread.start();\n\
  \        }\n}\n```\n\n程序失败并显示以下堆栈跟踪：\n\n```\nException in thread \"main\" java.lang.IllegalThreadStateException\n\
  \        at java.lang.Thread.start(Unknown Source)\n        at ThreadStateProblem.main(ThreadStateProblem.java:6)\n\
  ```\n\n在这里，你试图启动一个已经启动过的线程。当你调用 `start()` 时，线程会进入*新建*状态。如果再次调用 `start()`，则没有从*新建*状态进行正确的状态转换，因此\
  \ JVM 会抛出 `IllegalThreadStateException`。\n\n| ![image](img/banana.jpg) | 永远不要对同一个线程调用两次\
  \ `start()` 方法。 |\n\n你能通过在第二次调用 `start()` 周围添加 try-catch 块来解决这个问题吗？那是一个糟糕的解决方案！`IllegalThreadStateException`\
  \ 是一个 `RuntimeException`，意味着它指示了一个编程错误。因此，你需要在程序中修复问题，而不是处理它。即使你提供了一个 try-catch\
  \ 块，在 catch 块中你能做什么？什么也做不了；你可以让它为空，或者仅仅记录异常。这种空的 catch 块是糟糕代码的标志。因此，在这种情况下，正确的解决方案是确保不会对同一个线程再次调用\
  \ `start()`。\n\n| ![image](img/Note.jpg) | 永远不要编写 catch 块来处理 `IllegalThreadStateException`。如果你遇到此异常，代码中肯定存在\
  \ bug。修复那个 bug。 |\n\n清单 13-20 包含另一个示例。\n\n清单 13-20.  ThreadStateProblem.java\n\n\
  ```\nclass ThreadStateProblem extends Thread {\n        public void run() {\n  \
  \              try {\n                        wait(1000);\n                }\n \
  \               catch(InterruptedException ie) {\n                        // 忽略此异常是可以的，因为我们在此代码中\n\
  \                        // 不会中断异常\n                        ie.printStackTrace();\n\
  \                }\n        }\n\npublic static void main(String []s) {\n       \
  \         new ThreadStateProblem().start();\n        }\n}\n```\n\n该程序也会因 `IllegalMonitorStateException`\
  \ 而崩溃，如下所示：\n\n```\nException in thread \"Thread-0\" java.lang.IllegalMonitorStateException\n\
  \        at java.lang.Object.wait(Native Method)\n        at ThreadStateProblem.run(ThreadStateProblem.java:4)\n\
  ```\n\n`wait(int)` 方法（无论是否带有超时值）只能在获取锁之后调用：`wait()` 调用会将线程添加到已获取锁的等待队列中。如果你不这样做，就无法从*运行*状态正确转换到\
  \ *timed_waiting*（或*等待*状态，如果未提供超时值）。因此，程序会通过抛出 `IllegalMonitorStateException` 异常而崩溃。\n\
  \n正确的修复方法是在调用 `wait()` 之前获取锁。在这种情况下，你可以将 `run()` 方法声明为 `synchronized`：\n\n```\n\
  synchronized public void run() {\n        try {\n                wait(1000);\n \
  \       }\n        catch(InterruptedException ie) {\n                // 忽略此异常是可以的，因为我们在此代码中\n\
  \                // 不会中断异常\n                ie.printStackTrace();\n        }\n}\n\
  ```\n\n由于 `run()` 方法是 `synchronized` 的，`wait()` 会将自己添加到 `this` 对象引用锁上。由于没有其他线程调用\
  \ `notify()`/`notifyAll()` 方法，在 1 秒（1000 毫秒）的超时结束后，它将从 `run()` 方法返回。因此，`wait(1000);`\
  \ 语句的行为几乎与 `sleep(1000)` 语句相同；区别在于，调用 `wait()` 在等待时会释放此对象上的锁，而 `sleep()` 调用在休眠时不会释放锁。\n\
  \n\n\n| ![图片](img/banana.jpg) | 仅在获取相关锁之后，才能调用 `wait` 和 `notify`/`notifyAll` *方法*。\
  \ |\n\n提问时间！\n\n1.  以下是一个名为 `PingPong` 的类，它继承了 `Thread` 类。下列哪个 `PingPong` 类的实现能够正确地让工作线程打印“ping”，然后让主线程打印“pong”？\n\
  \n*   A.\n\n```\n        class PingPong extends Thread {\n                     public\
  \ void run() {\n                             System.out.println(\"ping \");\n  \
  \                   }\n                     public static void main(String []args)\
  \  {\n                             Thread pingPong = new PingPong();\n         \
  \                    System.out.print(\"pong\");\n                     }\n     \
  \         }\n        ```\n\n*   B.\n\n```\n        class PingPong extends Thread\
  \ {\n                     public void run() {\n                             System.out.println(\"\
  ping \");\n                     }\n                     public static void main(String\
  \ []args)  {\n                             Thread pingPong = new PingPong();\n \
  \                            pingPong.run();\n                             System.out.print(\"\
  pong\");\n                     }\n              }\n        ```\n\n*   C.\n\n```\n\
  \        class PingPong extends Thread {\n                     public void run()\
  \ {\n                             System.out.println(\"ping\");\n              \
  \       }\n                     public static void main(String []args)  {\n    \
  \                         Thread pingPong = new PingPong();\n                  \
  \           pingPong.start();\n                             System.out.println(\"\
  pong\");\n                     }\n              }\n        ```\n\n*   D.\n\n```\n\
  \        class PingPong extends Thread {\n                     public void run()\
  \ {\n                             System.out.println(\"ping\");\n              \
  \       }\n                     public static void main(String []args) throws InterruptedException{\n\
  \                             Thread pingPong = new PingPong();\n              \
  \               pingPong.start();\n                             pingPong.join();\n\
  \                             System.out.println(\"pong\");\n                  \
  \   }\n              }\n        ```\n\n**答案：** D.\n\n（`main` 线程创建工作线程并等待其完成（打印“ping”）。之后，它打印“pong”。因此，此实现正确地打印了“ping\
  \ pong”。为什么其他选项是错误的？\n\n`main()` 方法创建了工作线程，但没有启动它。因此，该程序只打印“pong”。该程序总是打印“ping pong”，但这具有误导性。该程序直接调用了\
  \ `run()` 方法，而不是 `start()` 方法。因此，这是一个单线程程序。`main` 线程和 `worker` 线程独立执行，没有任何协调。因此，根据哪个线程先被调度，你可能会得到“ping\
  \ pong”或“pong ping”的输出。）\n\n2.  考虑以下程序，并选择正确描述其行为的选项。\n\n```\n    class ThreadTest\
  \ {\n         public static void main(String []args) throws InterruptedException\
  \ {\n                 Thread t1 = new Thread() {\n                         public\
  \ void run() { System.out.print(\"t1 \"); }\n                 };\n             \
  \    Thread t2 = new Thread() {\n                         public void run() { System.out.print(\"\
  t2 \"); }\n                 };\n                 t1.start();\n                 t1.sleep(5000);\n\
  \                 t2.start();\n                 t2.sleep(5000);\n              \
  \   System.out.println(\"main \");\n         }\n    }\n    ```\n\n*   A.  t1 t2\
  \ main\n    *   B.  t1 main t2\n    *   C.  main t2 t1\n    *   D.  此程序会导致编译错误。\n\
  \    *   E.  此程序会抛出运行时错误。\n\n**答案：** A. t1 t2 main\n\n（当创建一个新线程时，它处于*新建*状态。然后，它进入*可运行*状态。线程只有在*可运行*状态下，调用\
  \ `sleep()` 后才能进入*定时等待*状态。因此，在执行 `sleep()` 之前，该线程的 `run()` 方法会被调用。所以，程序会打印“t1 t2\
  \ main”。）\n\n3.  你编写了一个用于处理任务的应用程序。在这个应用程序中，你将关键或紧急任务与非关键或非紧急任务分离开来。你为关键或紧急任务分配了高优先级。\n\
  \n在这个应用程序中，你发现非关键或非紧急的任务会异常长时间地等待。由于关键或紧急任务优先级高，它们大部分时间都在运行。以下哪个多线程问题正确地描述了这种情况？\n\
  \n*   A.  死锁\n    *   B.  饥饿\n    *   C.  活锁\n    *   D.  竞态条件\n\n**答案：** B. 饥饿\n\
  \n（低优先级线程长时间等待以获取锁并执行临界区代码的情况被称为饥饿。）\n\n4.  考虑以下程序：\n\n```\n    class ExtendThread\
  \ extends Thread {\n             public void run() { System.out.print(Thread.currentThread().getName());\
  \ }\n    }\n\nclass ThreadTest{\n             public static void main(String []args)\
  \ throws InterruptedException {\n                     Thread thread1 = new Thread(new\
  \ ExtendThread(), \"thread1 \");\n                     Thread thread2 = new Thread(thread1,\
  \ \"thread2 \");\n                     thread1.start();\n                     thread2.start();\n\
  \                     thread1.start();       // 开始\n             }\n    }\n    ```\n\
  \n以下哪项正确描述了此程序的行为？\n\n*   A.  程序打印如下内容：thread1 thread2 thread1。\n    *   B.  程序打印如下内容：thread1\
  \ thread1 thread1。\n    *   C.  程序打印如下内容：thread1 thread2。\n    *   D.  程序在带有注释 `START`\
  \ 的语句处导致编译错误。\n    *   E.  程序在执行带有注释 `START` 的语句时抛出 `IllegalMonitorStateException`。\n\
  \n**答案：** E. 程序在执行带有注释 `START` 的语句时抛出 `IllegalMonitorStateException`。\n\n（对一个线程多次调用\
  \ `start()` 方法是非法的；在这种情况下，线程会抛出 `IllegalMonitorStateException`。）\n\n5.  以下 `Sync`\
  \ 的两个定义（分别在单独文件中编译）中，哪一个可以无错误地编译？\n\n*   A.\n\n```\n        class Sync {\n     \
  \                public synchronized void foo() {}\n             }\n        ```\n\
  \n*   B.\n\n```\n        abstract class Sync {\n                     public synchronized\
  \ void foo() {}\n             }\n        ```\n\n*   C.\n\n```\n        abstract\
  \ class Sync {\n                     public abstract synchronized void foo();\n\
  \             }\n        ```\n\n*   D.\n\n```\n        interface Sync {\n      \
  \                public synchronized void foo();\n             }\n        ```\n\n\
  **答案：** A. 和 B.\n\n（抽象方法（在抽象类或接口中）不能声明为 `synchronized`，因此选项 C 和 D 是错误的。）\n\n总结\n\
  \n**并发编程入门**\n\n\n\n*   通过实现 `Runnable` 接口或继承 `Thread` 类，你可以创建能够支持多线程的类。\n*   始终实现\
  \ `run()` 方法。`Thread` 类中的默认 `run()` 方法不执行任何操作。\n*   在代码中调用 `start()` 方法，而不是直接调用\
  \ `run()` 方法。（将调用 `run()` 方法的任务交给 JVM。）\n*   每个线程都关联着一个线程名称、优先级和线程组；`Thread` 类中默认的\
  \ `toString()` 方法实现会打印这些信息。\n*   如果调用线程的 `sleep()` 方法，该线程不会释放锁，而是会继续持有锁。\n*   你可以使用\
  \ `join()` 方法来等待另一个线程终止。\n*   通常，如果你没有在线程中使用“中断”功能，可以安全地忽略 `InterruptedException`；不过，如果发生该异常，最好还是记录或打印堆栈跟踪信息。\n\
  *   线程是异步执行的；你无法预测线程的运行顺序。\n*   线程也是非确定性的：在很多情况下，你无法每次都重现诸如死锁或数据竞争之类的问题。\n\n**线程状态**\n\
  \n*   线程有三种基本状态：*新建*、*可运行*和*终止*。当线程刚被创建时，它处于*新建*状态；当它准备运行或正在运行时，它处于*可运行*状态。当线程死亡时，它处于*终止*状态。\n\
  *   *可运行*状态在内部（操作系统层面）包含两种状态：*就绪*和*运行*状态。\n*   当线程等待获取锁时，它将处于*阻塞*状态。当对 `wait` 等调用设置了超时时间时，线程将处于*定时等待*状态。例如，当调用\
  \ `wait()`（没有超时值）时，线程将处于*等待*状态。\n*   如果你的操作导致了无效的线程状态转换，你将收到一个 `IllegalThreadStateException`\
  \ 异常。\n\n**并发访问问题**\n\n*   对资源的并发读写可能导致*数据竞争*问题。\n*   你必须使用线程同步（即锁）来访问共享值并避免数据竞争。Java\
  \ 提供了线程同步特性来提供对共享资源的受保护访问——即同步块和同步方法。\n*   使用锁可能会引入死锁等问题。当发生死锁时，进程将*挂起*并且永远不会终止。\n\
  *   死锁通常发生在两个线程以相反的顺序获取锁时。当一个线程获取了一个锁并等待另一个锁时，另一个线程获取了那个另一个锁并等待第一个锁被释放。因此，无法取得任何进展，程序陷入死锁。\n\
  *   为了避免死锁，最好避免获取多个锁。当你必须获取多个这样的锁时，请确保在程序的所有地方都以相同的顺序获取它们。\n\n等待/通知机制\n\n*   当一个线程必须等待另一个线程满足特定条件或事件时，你可以使用等待/通知机制作为线程间的通信机制。\n\
  *   当一个线程需要等待特定条件/事件时，你可以调用 `wait()`，可以指定超时值，也可以不指定。\n*   为了避免通知丢失，最好始终使用 `notifyAll()`\
  \ 而不是 `notify()`。\n\n第 14 章\n\n![image](img/frontdot.jpg)\n\n并发\n\n![9781430247647_unFig14-01.jpg](img/9781430247647_unFig14-01.jpg)\n\
  \n从一开始，Java 就以底层线程管理、锁、同步和并发 API 的形式支持并发。我们在前一章讨论 `Thread` 类、`Runnable` 接口和 `synchronized`\
  \ 关键字时已经涵盖了这些内容。\n\n自 5.0 版本起，Java 还在其 `java.util.concurrent` 包中支持高级并发 API。在本章中，我们将重点讨论这些用于并发编程的\
  \ API。这些高级 API 利用了当今的多核硬件（即单个处理器拥有多个核心）。这些 API 对于利用支持多处理器的机器上的并发性也很有用。\n\n大多数 Java\
  \ 并发工具都在 `java.util.concurrent` 包中提供。用于无需使用锁即可高效更新共享变量的类在 `java.util.concurrent.atomic`\
  \ 子包中提供。`Lock` 接口及其派生类在 `java.util.concurrent.locks` 子包中提供。\n\n使用 java.util.concurrent\
  \ 集合\n\n`java.util.concurrent` 包中有许多类提供了用于并发编程的高级 API。在本节中，我们将主要讨论该包中提供的同步器类。之后，我们将简要介绍\
  \ `java.util.concurrent` 包中提供的重要并发集合类。\n\n从上一章你已经了解了底层的并发结构（例如使用 `synchronized`\
  \ 关键字、`Runnable` 接口和 `Thread` 类来创建线程）。对于需要被多个线程访问的共享资源，需要保护对该共享资源的访问和修改。当你使用 `synchronized`\
  \ 关键字时，你使用互斥锁在线程之间进行同步，以实现安全的共享访问。线程也经常需要协调它们的执行以完成一个更大的高级任务。上一章讨论的等待/通知模式是协调多个线程执行的一种方式。\n\
  \n使用 API 来获取和释放锁（使用互斥锁）或在锁上调用等待/通知方法是底层任务。可以为线程同步构建更高级别的抽象。这些用于同步两个或多个线程活动的高级抽象被称为*同步器*。同步器在内部使用现有的底层\
  \ API 进行线程协调。\n\n`java.util.concurrent` 库中提供的同步器及其用途如下所列：\n\n*   `Semaphore` 控制对一个或多个共享资源的访问。\n\
  *   `Phaser` 用于支持同步屏障。\n*   `CountDownLatch` 允许线程等待倒计时完成。\n*   `Exchanger` 支持在两个线程之间交换数据。\n\
  *   `CyclicBarrier` 使线程能够在预定义的执行点等待。\n\n现在，我们将借助示例依次讨论每个同步器。\n\n信号量\n\n信号量控制对共享资源的访问。信号量维护一个计数器来指定它所控制的资源数量。如果计数器大于零，则允许访问资源，而计数器为零表示当前没有可用资源，因此拒绝访问。\n\
  \n方法 `acquire()` 和 `release()` 用于从信号量获取和释放资源。如果一个线程调用 `acquire()` 且计数器为零（即资源不可用），则该线程会等待，直到计数器非零，然后获取资源以供使用。一旦线程使用完资源，它会调用\
  \ `release()` 来增加资源可用性计数器。\n\n请注意，如果资源数量为 1，那么在给定时间只有一个线程可以访问该资源；在这种情况下，使用信号量类似于使用锁。表\
  \ 14-1 列出了 `Semaphore` 类中的重要方法。\n\n表 14-1. Semaphore 类中的重要方法\n\n\n\n| 方法 | 描述 |\n\
  | --- | --- |\n| `Semaphore(int permits)` | 构造函数，用于创建具有指定数量*许可*（即一次可访问资源的线程数）的 `Semaphore`\
  \ 对象。如果许可值为负数，则必须先调用指定次数的 `release`() 方法，然后 `acquire`() 调用才能成功。 |\n| `Semaphore(int\
  \ permits,           boolean fair)` | 与上一个构造函数相同，但额外的 `fair` 选项表示应按照先到先得的原则分配许可。\
  \ |\n| `void acquire()void acquire(int permits)` | 如果许可可用则获取一个许可；否则，它将阻塞直到有许可可用。如果在等待获取许可时被其他线程中断，可能会抛出\
  \ `InterruptedException`。重载版本接受一个许可数量作为参数。 |\n| `void acquireUninterruptibly()`\
  \ | 与 `acquire`() 方法相同，但此线程在等待获取许可时不能被中断。 |\n| `boolean tryAcquire()` `boolean tryAcquire(long\
  \ timeout,                   TimeUnit unit)` | 如果在调用时信号量有可用许可，则获取一个许可并返回 `true`；如果不可用，则立即返回\
  \ `false`（不阻塞）。重载的 `tryAcquire`() 方法额外接受一个超时参数——线程会阻塞以从信号量获取许可，直到给定的超时期限。 |\n| `void\
  \ release()void release(int permits)` | 从信号量释放一个许可。重载版本指定要释放的许可数量。 |\n\n假设一个 ATM\
  \ 机房里有两台 ATM 机。因此，房间里一次只允许两个人进入。有五个人在外面等着使用 ATM 机。这种情况可以通过代码清单 14-1 中的代码来模拟，其中每台\
  \ ATM 机都被视为由信号量控制的资源。\n\n代码清单 14-1.  ATMRoom.java\n\n```\nimport java.util.concurrent.Semaphore;\n\
  \n// This class simulates a situation where an ATM room has only two ATM machines\n\
  // and five people are waiting to access the machine. Since only one person can\
  \ access\n// an ATM machine at a given time, others wait for their turn\nclass ATMRoom\
  \ {\n        public static void main(String []args) {\n                // assume\
  \ that only two ATM machines are available in the ATM room\n                Semaphore\
  \ machines = new Semaphore(2);\n\n// list of people waiting to access the machine\n\
  \                new Person(machines, \"Mickey\");\n                new Person(machines,\
  \ \"Donald\");\n                new Person(machines, \"Tom\");\n               \
  \ new Person(machines, \"Jerry\");\n                new Person(machines, \"Casper\"\
  );\n        }\n}\n\n// Each Person is an independent thread; but their access to\
  \ the common resource\n// (two ATM machines in the ATM machine room in this case)\
  \ needs to be synchronized.\nclass Person extends Thread {\n        private Semaphore\
  \ machines;\n        public Person(Semaphore machines, String name) {\n        \
  \        this.machines = machines;\n                this.setName(name);\n      \
  \          this.start();\n        }\n        public void run() {\n             \
  \   try {\n                        System.out.println(getName() + \" waiting to\
  \ access an ATM machine\");\n                        machines.acquire();\n     \
  \                   System.out.println(getName() + \" is accessing an ATM machine\"\
  );\n                        Thread.sleep(1000); // simulate the time required for\
  \ withdrawing amount\n                        System.out.println(getName() + \"\
  \ is done using the ATM machine\");\n                        machines.release();\n\
  \                } catch(InterruptedException ie) {\n                        System.err.println(ie);\n\
  \                }\n        }\n}\n```\n\n以下是该程序某次运行示例的输出：\n\n```\nMickey waiting\
  \ to access an ATM machine\nTom waiting to access an ATM machine\nJerry waiting\
  \ to access an ATM machine\nDonald waiting to access an ATM machine\nCasper waiting\
  \ to access an ATM machine\nTom is accessing an ATM machine\nMickey is accessing\
  \ an ATM machine\nTom is done using the ATM machine\nMickey is done using the ATM\
  \ machine\nJerry is accessing an ATM machine\nDonald is accessing an ATM machine\n\
  Donald is done using the ATM machine\nJerry is done using the ATM machine\nCasper\
  \ is accessing an ATM machine\nCasper is done using the ATM machine\n```\n\n现在我们来分析这个程序是如何工作的。通过创建一个继承\
  \ `Thread` 的 `Person` 类来模拟等待使用 ATM 机的人。`Thread` 类中的 `run()` 方法获取一个信号量，模拟从 ATM 机取款，然后释放信号量。\n\
  \n`main()` 方法通过创建一个具有两个*许可*的 `Semaphore` 对象来模拟一个有两台 ATM 机的 ATM 机房。排队等待使用 ATM 机的人通过将他们添加到\
  \ `Semaphore` 对象来实现。\n\n从程序输出可以看出，信号量一次只允许两个线程，其他线程则持续等待。当一个线程释放信号量时，另一个线程会获取它。很酷，不是吗？\n\
  \nCountDownLatch\n\n这个同步器允许一个或多个线程等待倒计时完成。这个倒计时可以是为了等待一组事件发生，或者等待在其他线程中执行的一组操作完成。表\
  \ 14-2 列出了该类中的重要方法。\n\n表 14-2. CountDownLatch 类中的重要方法\n\n| 方法 | 描述 |\n| --- | ---\
  \ |\n| `CountDownLatch(int count)` | 创建一个 `CountDownLatch` 实例，指定在使用 `await()` 等待的线程可以继续执行之前，必须调用\
  \ `countDown`() 方法的次数。 |\n| `void await()` | 如果 `CountDownLatch` 对象中的当前计数为零，则立即返回；否则，线程将阻塞，直到倒计数达到零。可能会抛出\
  \ `InterruptedException`。 |\n| `boolean await(long timeout,              TimeUnit\
  \ unit)` | 与上一个方法 `await`() 相同，但额外接受一个超时参数。如果线程在计数达到零后成功返回，此方法返回 `true`；如果线程因超时而返回，则返回\
  \ `false`。 |\n| `void countDown()` | 将此 `CountDownLatch` 对象中的计数减一。如果计数达到零，则所有（等）待线程都会被释放。如果当前计数已经为零，则什么也不会发生。\
  \ |\n| `long getCount()` | 返回此 `CountDownLatch` 对象中待处理的计数。 |\n\n当你创建一个 `CountDownLatch`\
  \ 时，你会用一个整数（代表计数值）来初始化它。线程会等待（通过调用 `await()` 方法）这个计数达到零。一旦达到零，所有线程都会被释放；由于计数已经为零，任何对\
  \ `await()` 的后续调用都会立即返回。可以通过调用 `countDown()` 方法将计数器值减一。你可以使用 `getCount()` 方法获取计数器的当前值。参见代码清单\
  \ 14-2。\n\n代码清单 14-2.  RunningRaceStarter.java\n\n```\nimport java.util.concurrent.*;\n\
  \n// this class simulates the start of a running race by counting down from 5\\\
  . It holds\n// three runner threads to be ready to start in the start line of the\
  \ race and once the count down\n// reaches zero, all the three runners start running...\n\
  \nclass RunningRaceStarter {\n        public static void main(String []args) throws\
  \ InterruptedException {\n                CountDownLatch counter = new CountDownLatch(5);\n\
  \                // count from 5 to 0 and then start the race\n```\n\n\n// 实例化三个跑步者线程\n\
  \                new Runner(counter, \"卡尔\");\n                new Runner(counter,\
  \ \"乔\");\n                new Runner(counter, \"杰克\");\n\nSystem.out.println(\"\
  开始倒计时 \");\n                long countVal = counter.getCount();\n              \
  \  while(countVal > 0) {\n                        Thread.sleep(1000); // 1000 毫秒\
  \ = 1 秒\n                        System.out.println(countVal);\n               \
  \         if(countVal == 1) {\n                                // 一旦下一语句中调用了 counter.countDown();\n\
  \                                // 倒计时将归零；因此喊出“开始”\n                          \
  \      System.out.println(\"开始\");\n                        }\n                \
  \        counter.countDown(); // 每秒减 1\n                        countVal = counter.getCount();\n\
  \                }\n        }\n}\n\n// 这个 Runner 类模拟 100 米短跑比赛中的赛道运动员。运动员等待\n//\
  \ 倒计时器归零，然后开始跑步\nclass Runner extends Thread {\n        private CountDownLatch timer;\n\
  \        public Runner(CountDownLatch cdl, String name) {\n                timer\
  \ = cdl;\n                this.setName(name);\n                System.out.println(this.getName()\
  \ + \" 已就绪，等待倒计时开始\");\n                start();\n        }\n\npublic void run()\
  \ {\n                try {\n                        // 等待计时器倒计时归零\n            \
  \            timer.await();\n                } catch (InterruptedException ie) {\n\
  \                        System.err.println(\"中断——无法开始赛跑\");\n                }\n\
  \                System.out.println(this.getName() + \" 开始跑步\");\n        }\n}\n\
  ```\n\n该程序输出如下：\n\n```\n卡尔 已就绪，等待倒计时开始\n乔 已就绪，等待倒计时开始\n杰克 已就绪，等待倒计时开始\n开始倒计时\n\n\
  开始\n乔 开始跑步\n卡尔 开始跑步\n杰克 开始跑步\n```\n\n让我们思考一下程序的工作原理。`Runner` 类模拟了赛跑比赛中等待起跑的运动员。它通过调用构造函数传入的\
  \ `CountDownLatch` 对象上的 `await()` 方法来等待比赛开始。\n\n`RunningRaceStarter` 类创建了一个 `CountDownLatch`\
  \ 对象。该计数器对象初始化为计数值 5，这意味着倒计时从 5 到 0。在 `main()` 方法中，你创建了 `Runner` 对象；这三个线程在 `counter`\
  \ 对象上等待。每秒调用一次 `countDown()` 方法，该方法将计数减 1。一旦计数归零，所有三个等待线程都会被释放，并自动继续执行。\n\n**注意：**\
  \ 在此程序中，乔、卡尔或杰克的打印顺序无法预测，因为这取决于线程调度。因此，如果你运行此程序，这三个名字可能会以其他顺序打印出来。\n\nExchanger\n\
  \n`Exchanger` 类用于在两个线程之间交换数据。`Exchanger` 的作用非常简单：它等待直到两个线程都调用了 `exchange()` 方法。当两个线程都调用了\
  \ `exchange()` 方法时，`Exchanger` 对象实际上会将线程之间共享的数据相互交换。当两个线程需要彼此同步并持续交换数据时，此类非常有用。\n\
  \n这是一个很小的类，只有一个方法：`exchange()`。请注意，`exchange()` 方法有一个重载形式，它接受一个超时时间作为参数。\n\n清单 14-3\
  \ 展示了一个模拟 Java 吉祥物 Duke 与咖啡店之间傻气对话的示例。`DukeThread` 和 `CoffeeShop` 这两个线程独立运行。然而，要进行对话，它们需要在对方说话时倾听。一个\
  \ `Exchange` 对象为它们提供了一种相互交谈的方式。\n\n清单 14-3.  KnockKnock.java\n\n```\nimport java.util.concurrent.Exchanger;\n\
  \n// DukeThread 类作为一个独立线程运行。它与同样独立运行的 CoffeeShopThread 对话。\n// 对话是通过一个共同的 Exchanger<String>\
  \ 对象交换消息来实现的，\n// 该对象同步它们之间的对话。\n// 注意，打印的消息是从 CoffeeShopThread 接收到的“回复”\nclass\
  \ DukeThread extends Thread {\n        private Exchanger<String> sillyTalk;\n\n\
  public DukeThread(Exchanger<String> args) {\n                sillyTalk = args;\n\
  \        }\n        public void run() {\n                String reply = null;\n\
  \                try {\n                        // 开始与 CoffeeShopThread 的对话\n  \
  \                      reply = sillyTalk.exchange(\"咚咚咚！\");\n                 \
  \       // 现在，打印从 CoffeeShopThread 收到的回复\n                        System.out.println(\"\
  咖啡店: \" + reply);\n\n// 交换另一组消息\n                        reply = sillyTalk.exchange(\"\
  Duke\");\n                        // 现在，打印从 CoffeeShopThread 收到的回复\n           \
  \             System.out.println(\"咖啡店: \" + reply);\n\n// 只有当发送和接收同时发生时，交换才能发生\n\
  \                        // 由于这是要说的最后一句话，我们通过忽略“虚拟”回复来结束对话\n                   \
  \     reply = sillyTalk.exchange(\"那个在这家咖啡店出生的人！\");\n                        //\
  \ 对话结束，忽略回复！\n                } catch(InterruptedException ie) {\n             \
  \           System.err.println(\"在傻气对话中被打断\");\n                }\n        }\n}\n\
  \nclass CoffeeShopThread extends Thread {\n        private Exchanger<String> sillyTalk;\n\
  \npublic CoffeeShopThread(Exchanger<String> args) {\n                sillyTalk =\
  \ args;\n        }\n        public void run() {\n                String reply =\
  \ null;\n                try {\n                        // 交换第一条消息\n           \
  \             reply = sillyTalk.exchange(\"谁在那里？\");\n                        //\
  \ 打印 Duke 说的话\n                        System.out.println(\"Duke: \" + reply);\n\
  \n// 交换第二条消息\n                        reply = sillyTalk.exchange(\"哪个 Duke？\");\n\
  \                        // 打印 Duke 说的话\n                        System.out.println(\"\
  Duke: \" + reply);\n\n// 没有消息要发送，但为了从 Duke 线程获取消息，\n                        // 两端都需要发送消息；因此发送一个“虚拟”字符串\n\
  \                        reply = sillyTalk.exchange(\"\");\n                   \
  \     System.out.println(\"Duke: \" + reply);\n                } catch(InterruptedException\
  \ ie) {\n                        System.err.println(\"在傻气对话中被打断\");\n          \
  \      }\n        }\n}\n\n// 通过实例化 Exchanger 对象以及 CoffeeShop 和 Duke 线程来协调 Duke 和\
  \ CoffeeShop 之间的傻气对话\nclass KnockKnock {\n                public static void main(String\
  \ []args) {\n                        Exchanger<String> sillyTalk = new Exchanger<String>();\n\
  \                        new CoffeeShopThread(sillyTalk).start();\n            \
  \            new DukeThread(sillyTalk).start();\n                }\n}\n```\n\n该程序输出如下：\n\
  \n```\nDuke: 咚咚咚！\n咖啡店: 谁在那里？\nDuke: Duke\n咖啡店: 哪个 Duke？\nDuke: 那个在这家咖啡店出生的人！\n\
  ```\n\n程序中的注释解释了其工作原理。理解此示例的主要概念是，`Exchanger` 有助于协调（即同步）两个线程之间的消息交换。两个线程相互等待，并使用\
  \ `exchange()` 方法来交换消息。\n\nCyclicBarrier\n\n\n\n在并发编程中，线程常常需要在预定义的执行点等待，直到所有其他线程都到达该点。`CyclicBarrier`\
  \ 有助于提供这样一个同步点；该类中的重要方法请参见表 14-3。\n\n表 14-3. CyclicBarrier 类中的重要方法\n\n| 方法 | 描述\
  \ |\n| --- | --- |\n| `CyclicBarrier(int numThreads)` | 创建一个 `CyclicBarrier` 对象，并指定在其上等待的线程数量。如果\
  \ `numThreads` 为负数或零，则抛出 `IllegalArgumentException`。 |\n| `CyclicBarrier(int parties,Runnable\
  \ barrierAction)` | 与上一个构造方法相同；此构造方法额外接受一个参数，即当屏障被触发时要调用的线程。 |\n| `int await ()int\
  \ await(long timeout, TimeUnit unit)` | 阻塞直到指定数量的线程在此屏障上调用了 `await()`。该方法返回此线程的到达索引。如果线程在等待其他线程时被中断，此方法可能抛出\
  \ `InterruptedException`；如果屏障因某种原因被破坏（例如，另一个线程超时或被中断），则抛出 `BrokenBarrierException`。重载的方法额外接受一个超时时间作为选项；如果所有其他线程未在超时时间内到达，此重载版本会抛出\
  \ `TimeoutException`。 |\n| `boolean isBroken()` | 如果屏障被破坏，则返回 true。如果屏障中至少有一个线程被中断或超时，或者屏障操作失败并抛出异常，则屏障被视为被破坏。\
  \ |\n| `void reset()` | 将屏障重置为初始状态。如果有任何线程正在该屏障上等待，它们将抛出 `BrokenBarrier` 异常。 |\n\
  \n清单 14-4 是一个使用 `CyclicBarrier` 类的示例。\n\n清单 14-4.  CyclicBarrierTest.java\n\n```\n\
  import java.util.concurrent.*;\n\n// 此线程中的 run() 方法应仅在四名玩家准备好开始游戏时调用\nclass MixedDoubleTennisGame\
  \ extends Thread {\n        public void run() {\n                System.out.println(\"\
  所有四名玩家已就绪，游戏开始 \\n 零比零...\");\n        }\n}\n\n// 此线程模拟玩家的到达。\n// 一旦玩家到达，他/她应等待其他玩家到达\n\
  class Player extends Thread {\n        CyclicBarrier waitPoint;\n        public\
  \ Player(CyclicBarrier barrier, String name) {\n                this.setName(name);\n\
  \                waitPoint = barrier;\n                this.start();\n         \
  \       }\n        public void run() {\n                System.out.println(\"玩家\
  \ \" + getName() + \" 已就绪 \");\n                try {\n                       waitPoint.await();\
  \ // 等待所有四名玩家到达\n                } catch(BrokenBarrierException | InterruptedException\
  \ exception) {\n                        System.out.println(\"等待时发生异常... \" + exception);\n\
  \                }\n        }\n}\n\n// 通过传递线程数量和当所有线程到达屏障时要运行的线程来创建 CyclicBarrier\
  \ 对象\nclass CyclicBarrierTest {\n        public static void main(String []args)\
  \ {\n                // 混合双打网球比赛需要四名玩家；因此等待四名玩家\n                // （即四个线程）加入以开始游戏\n\
  \                System.out.println(\"预订网球场 \\n 一旦四名玩家到达，游戏将开始\");\n           \
  \     CyclicBarrier barrier = new CyclicBarrier(4, new MixedDoubleTennisGame());\n\
  \                new Player(barrier, \"G I Joe\");\n                new Player(barrier,\
  \ \"Dora\");\n                new Player(barrier, \"Tintin\");\n               \
  \ new Player(barrier, \"Barbie\");\n        }\n}\n\n程序输出如下：\n\nReserving tennis\
  \ court\nAs soon as four players arrive, game will start\nPlayer G I Joe is ready\n\
  Player Dora is ready\nPlayer Tintin is ready\nPlayer Barbie is ready\nAll four players\
  \ ready, game starts\n Love all...\n```\n\n现在让我们看看这个程序是如何工作的。在 `main()` 方法中，你创建了一个\
  \ `CyclicBarrier` 对象。构造方法接受两个参数：要等待的线程数量，以及当所有线程到达屏障时要调用的线程。在这个例子中，你需要等待四名玩家，因此创建了四个线程，每个线程代表一名玩家。`CyclicBarrier`\
  \ 构造方法的第二个参数是 `MixedDoubleTennisGame` 对象，因为此线程代表游戏，一旦所有四名玩家就绪，游戏就会开始。\n\n在每个 `Player`\
  \ 线程的 `run()` 方法内部，你在 `CyclicBarrier` 对象上调用了 `await()` 方法。一旦 `CyclicBarrier` 对象的等待线程数量达到四个，就会调用\
  \ `MixedDoubleTennisGame` 中的 `run()` 方法。\n\nPhaser\n\n当少数独立线程需要分阶段协作完成一项任务时，`Phaser`\
  \ 是一个有用的特性。因此，需要一个同步点，让线程先完成任务的一部分，等待其他线程完成另一部分，并在进入下一部分任务之前进行同步。表 14-4 列出了该类中的重要方法。\n\
  \n表 14-4. Phaser 类中的重要方法\n\n| 方法 | 描述 |\n| --- | --- |\n| `Phaser()` | 创建一个 `Phaser`\
  \ 对象，没有注册的参与方，也没有父级。初始阶段设置为 0。 |\n| `Phaser(int numThreads)` | 创建一个 `Phaser` 对象，指定需要到达以进入下一阶段的线程（参与方）数量；初始阶段设置为\
  \ 0。 |\n| `int register()` | 向此 `Phaser` 对象添加一个新线程（参与方）。返回当前阶段编号。如果已注册的参与方达到最大支持数量，则抛出\
  \ `IllegalStateException`。 |\n| `int bulkRegister(int numThreads)` | 向此 `Phaser`\
  \ 对象添加 `numThreads` 个未到达的参与方。返回当前阶段编号。如果已注册的参与方达到最大支持数量，则抛出 `IllegalStateException`。\
  \ |\n| `int arrive()` | 到达此阶段，无需等待其他线程到达。返回到达的阶段编号。可能抛出 `IllegalStateException`。\
  \ |\n| `int arriveAndDeregister()` | 与上一个方法相同，但还会从 `Phaser` 对象中注销。 |\n| `int arriveAndAwaitAdvance()`\
  \ | 到达此阶段并等待（即阻塞）直到其他线程到达。 |\n| `int awaitAdvance(int phase)` | 等待（即阻塞）直到此 `Phaser`\
  \ 对象前进到给定的阶段值。 |\n| `int getRegisteredParties()` | 返回在此 `Phaser` 对象上注册的线程（参与方）数量。\
  \ |\n| `int getArrivedParties()` | 返回在此 `Phaser` 对象的当前阶段已到达的线程（参与方）数量。 |\n| `int\
  \ getUnarrivedParties()` | 返回在此 `Phaser` 对象的当前阶段，与已注册的参与方相比尚未到达的线程（参与方）数量。 |\n\n\
  考虑一个小咖啡店处理外卖订单的例子。假设只有三名员工：一名厨师、一名帮工和一名服务员。为简化程序逻辑，假设每个外卖订单包含三份食物。完成一个外卖订单需要依次准备这三份食物。要完成一份食物的准备，所有三名员工——厨师、帮工和服务员——都需要完成各自的工作部分。清单\
  \ 14-5 展示了如何使用 `Phaser` 类实现这种情况。\n\n清单 14-5.  ProcessOrder.java\n\n```\nimport java.util.concurrent.*;\n\
  \n\n\n// `ProcessOrder` 线程是主线程，负责监督确保 `Cook`、`Helper` 和 `Attendant` 完成各自的工作，以完成食品准备和订单配送。\n\
  // 为简化逻辑，我们假设每个配送订单恰好包含三个食品项目。\nclass ProcessOrder {\n        public static void\
  \ main(String []args) throws InterruptedException {\n                // `Phaser`\
  \ 是一个同步器，用于逐个处理食品项目，\n                // 并在进入下一个项目前完成配送。\n                Phaser\
  \ deliveryOrder = new Phaser(1);\n\nSystem.out.println(\"开始处理配送订单\");\n\nnew Worker(deliveryOrder,\
  \ \"Cook\");\n                new Worker(deliveryOrder, \"Helper\");\n         \
  \       new Worker(deliveryOrder, \"Attendant\");\n\nfor(int i = 1; i <= 3; i++)\
  \ {\n                        // 准备、混合并配送此食品项目\n                        deliveryOrder.arriveAndAwaitAdvance();\n\
  \                        System.out.println(\"配送食品项目编号 \" + i);\n              \
  \  }\n                // 此配送订单的工作已完成，因此取消注册\n                deliveryOrder.arriveAndDeregister();\n\
  \                System.out.println(\"配送订单完成... 交给顾客\");\n        }\n}\n\n// 工作角色可以是\
  \ `Cook`、`Helper` 或 `Attendant`。虽然三者独立工作，但\n// 他们需要同步各自的工作，以完成各自的部分并共同准备一个食品项目。\n\
  class Worker extends Thread {\n        Phaser deliveryOrder;\n        Worker(Phaser\
  \ order, String name) {\n                deliveryOrder = order;\n              \
  \  this.setName(name);\n                deliveryOrder.register();\n            \
  \    start();\n        }\n        public void run() {\n                for(int i\
  \ = 1; i <= 3; i++) {\n                        System.out.println(\"\\t\" + getName()\
  \ + \" 正在为订单编号 \" + i + \" 执行工作\");\n                        if(i == 3) {\n    \
  \                            // 此配送订单的工作已完成，因此取消注册\n                           \
  \     deliveryOrder.arriveAndDeregister();\n                        } else {\n \
  \                               deliveryOrder.arriveAndAwaitAdvance();\n       \
  \                 }\n                        try {\n                           \
  \     Thread.sleep(3000); // 模拟准备食品项目所需的时间\n                        } catch(InterruptedException\
  \ ie) {\n                                /* 忽略异常 */\n                          \
  \      ie.printStackTrace();\n                        }\n                }\n   \
  \     }\n} \n\n程序输出如下：\n\n```\nStarting to process the delivery order\n        Cook\
  \ doing his work for order no. 1\n        Attendant doing his work for order no.\
  \ 1\n        Helper doing his work for order no. 1\nDeliver food item no. 1\n  \
  \      Helper doing his work for order no. 2\n        Attendant doing his work for\
  \ order no. 2\n        Cook doing his work for order no. 2\nDeliver food item no.\
  \ 2\n        Helper doing his work for order no. 3\n        Cook doing his work\
  \ for order no. 3\n        Attendant doing his work for order no. 3\nDeliver food\
  \ item no. 3\nDelivery order completed . . . give it to the customer\n```\n\n在这个程序中，你创建了一个\
  \ `Phaser` 对象来支持三个 `Worker` 线程对象的同步。你通过调用 `Phaser` 对象的默认构造函数来创建 `Phaser` 对象。当 `Worker`\
  \ 线程对象被创建时，它们会向 `Phaser` 对象注册自己。或者，你也可以调用\n\n```\nPhaser deliveryOrder = new Phaser(3);\
  \ // 用于三方（即线程）\n```\n\n在这种情况下，你就不需要在 `Worker` 线程构造函数中调用 `Phaser` 对象的 `register`()\
  \ 方法。\n\n在这个例子中，你假设一个配送订单包含处理三个食品项目，因此 `for` 循环运行三次。每次迭代，你调用 `deliveryOrder.arriveAndAwaitAdvance()`。要使此语句继续执行，所有三方（`Cook`、`Helper`\
  \ 和 `Attendant`）都必须完成各自准备食品项目的工作。你通过在这些 `Worker` 线程的 `run` 方法中调用 `sleep`() 方法来模拟“准备食品”。这些\
  \ `worker` 线程为准备每个食品项目调用 `deliveryOrder.arriveAndAwaitAdvance()`。随着每个食品项目准备完成（即每个阶段完成），工作进入下一阶段。一旦三个阶段完成，配送订单处理即告完成，程序返回。\n\
  \n并发集合\n\n`java.util.concurrent` 包提供了许多类，它们是 `java.util` 包中集合框架类（参见表 14-5）的线程安全等价物。例如，`java.util.concurrent.ConcurrentHashMap`\
  \ 是 `java.util.HashMap` 的并发等价物。这两个容器的主要区别在于，使用 `HashMap` 时需要显式同步插入和删除操作，而这种同步已内置于\
  \ `ConcurrentHashMap` 中。如果你知道如何使用 `HashMap`，你也就隐式地知道如何使用 `ConcurrentHashMap`。从 OCPJP\
  \ 7 考试的角度来看，你只需要对表 14-5 中的类有一个总体了解，因此我们不会深入探讨如何使用这些类的细节。\n\n表 14-5. java.util.concurrent\
  \ 包中的一些并发集合类\n\n| 类/接口 | 简要描述 |\n| --- | --- |\n| `BlockingQueue` | 此接口扩展了 `Queue`\
  \ 接口。在 `BlockingQueue` 中，如果队列为空，它会等待（即阻塞）直到有元素被插入；如果队列已满，它会等待直到有元素被移除。 |\n| `ArrayBlockingQueue`\
  \ | 此类提供了基于固定大小数组的 `BlockingQueue` 接口实现。 |\n| `LinkedBlockingQueue` | 此类提供了基于链表的\
  \ `BlockingQueue` 接口实现。 |\n| `DelayQueue` | 此类实现了 `BlockingQueue`，包含类型为 `Delayed`\
  \ 的元素。只有在其延迟期过后，才能从此队列中检索元素。 |\n| `PriorityBlockingQueue` | 等同于 `java.util.PriorityQueue`，但实现了\
  \ `BlockingQueue` 接口。 |\n| `SynchronousQueue` | 此类实现了 `BlockingQueue`。在此容器中，一个线程的每次\
  \ `insert`() 操作都会等待（阻塞）另一个线程的相应 `remove`() 操作，反之亦然。 |\n| `LinkedBlockingDeque` |\
  \ 此类实现了 `BlockingDeque`，其中插入和移除操作可能会阻塞；使用链表实现。 |\n| `ConcurrentHashMap` | 类似于 `Hashtable`，但提供安全的并发访问和更新。\
  \ |\n| `ConcurrentSkipListMap` | 类似于 `TreeMap`，但提供安全的并发访问和更新。 |\n| `ConcurrentSkipListSet`\
  \ | 类似于 `TreeSet`，但提供安全的并发访问和更新。 |\n| `CopyOnWriteArrayList` | 类似于 `ArrayList`，但提供安全的并发访问。当\
  \ `ArrayList` 被更新时，它会创建底层数组的一个全新副本。 |\n| `CopyOnWriteArraySet` | 一个 `Set` 实现，但提供安全的并发访问，并使用\
  \ `CopyOnWriteArrayList` 实现。当容器被更新时，它会创建底层数组的一个全新副本。 |\n\n\n\n代码清单 14-6 和 14-7 展示了并发版本与非并发版本的区别。假设你有一个由两个线程共享的`PriorityQueue`对象。再假设一个线程向优先队列插入元素，另一个线程移除元素。如果线程调度使得插入元素发生在移除元素之前，则没有问题。然而，如果第一个线程在第二个线程插入元素之前尝试移除元素，就会遇到麻烦。\n\
  \n代码清单 14-6.  PriorityQueueExample.java\n\n```\nimport java.util.*;\n\n// 简单的 PriorityQueue\
  \ 示例。这里我们创建两个线程，一个线程插入元素，\n// 另一个线程从优先队列中移除元素。\nclass PriorityQueueExample {\n \
  \       public static void main(String []args) {\n                final PriorityQueue<Integer>\
  \ priorityQueue = new PriorityQueue<>();\n                // 生成一个从优先队列中移除元素的线程\n\
  \                new Thread() {\n                        public void run() {\n \
  \                               // 使用 PriorityQueue 的 remove() 方法移除元素（如果可用）\n  \
  \                              System.out.println(\"被移除的元素是: \" + priorityQueue.remove());\n\
  \                        }\n                }.start();\n                // 生成一个向优先队列插入元素的线程\n\
  \                new Thread() {\n                        public void run() {\n \
  \                               // 将整数值 10 作为条目插入优先队列\n                        \
  \        priorityQueue.add(10);\n                                System.out.println(\"\
  成功向队列添加了一个元素 \");\n                        }\n                }.start();\n     \
  \   }\n}\n```\n\n如果运行此程序，会抛出如下异常：\n\n```\nException in thread \"Thread-0\" java.util.NoSuchElementException\n\
  at java.util.AbstractQueue.remove(AbstractQueue.java:117)\nat PriorityQueueExample$1.run(QueueExample.java:10)\n\
  Successfully added an element to the queue \n```\n\n该输出表明第一个线程试图从空优先队列中移除元素，因此导致了`NoSuchElementException`。\n\
  \n然而，考虑对该程序稍作修改（代码清单 14-7），使用`PriorityBlockingQueue`代替`PriorityQueue`。\n\n代码清单 14-7.  PriorityBlockingQueueExample.java\n\
  \n```\n// 演示 PriorityBlockingQueue 的用法。在这种情况下，如果优先队列中没有可用元素，\n// 调用 take() 方法的线程将阻塞（即等待），直到另一个线程插入元素。\n\
  \nimport java.util.concurrent.*;\n\nclass PriorityBlockingQueueExample {\n     \
  \   public static void main(String []args) {\n                final PriorityBlockingQueue<Integer>\
  \ priorityBlockingQueue\n                        = new PriorityBlockingQueue<>();\n\
  \                new Thread() {\n                        public void run() {\n \
  \                               try {\n                                       //\
  \ 使用 take() 代替 remove()\n                                       // 注意 take() 会阻塞，而\
  \ remove() 不会阻塞\n                                       System.out.println(\"被移除的元素是:\
  \ \"\n                                               + priorityBlockingQueue.take());\n\
  \                                } catch(InterruptedException ie) {\n          \
  \                              // 忽略此异常是安全的\n                                  \
  \      ie.printStackTrace();\n                                }\n              \
  \          }\n                }.start();\n                new Thread() {\n     \
  \                   public void run() {\n                                // 向优先队列添加值为\
  \ 10 的元素\n                                priorityBlockingQueue.add(10);\n     \
  \                           System.out.println(\"成功向队列添加了一个元素 \");\n           \
  \             }\n                }.start();\n        }\n}\n```\n\n该程序会打印以下内容：\n\n\
  ```\nSuccessfully added an element to the queue\nThe removed element is: 10\n```\n\
  \n此程序不会像前一个案例（代码清单 14-6）那样导致崩溃。这是因为`take()`方法会阻塞，直到另一个线程插入元素；一旦插入，`take()`方法就会返回该值。换句话说，如果你使用`PriorityQueue`对象，你需要同步线程，使得元素的插入总是发生在移除之前。然而，在`PriorityBlockingQueue`中，顺序无关紧要，无论先调用哪个操作（插入或移除元素），程序都能正确运行。通过这种方式，并发集合为在多线程环境下安全使用集合提供了支持，无需你执行显式的同步操作。\n\
  \n应用原子变量和锁\n\n`java.util.concurrent`包有两个子包：`java.util.concurrent.atomic`和`java.util.concurrent.locks`。本节我们将讨论这两个子包。与本章其余部分讨论的高级并发抽象不同，原子变量和锁都是底层\
  \ API。然而，在编写多线程代码时，它们提供了更细粒度的控制。\n\n原子变量\n\n你是否见过为执行诸如变量自增、变量自减等原始/简单操作而获取和释放锁的代码？为这类原始操作获取和释放锁效率并不高。在这种情况下，Java\
  \ 以原子变量的形式提供了一种高效的替代方案。\n\n以下是该包中部分类及其简要说明的列表：\n\n*   `AtomicBoolean`: 可原子更新的`Boolean`值。\n\
  *   `AtomicInteger`: 可原子更新的`int`值；继承自`Number`类。\n*   `AtomicIntegerArray`: 一个`int`数组，其中的元素可以原子更新。\n\
  *   `AtomicLong`: 可原子更新的`long`值；继承自`Number`类。\n*   `AtomicLongArray`: 一个`long`数组，其中的元素可以原子更新。\n\
  *   `AtomicReference<V>`: 类型为 V 的可原子更新的对象引用。\n*   `AtomicReferenceArray<E>`: 一个可原子更新的数组，可以持有类型为`E`的对象引用（`E`指元素的基类型）。\n\
  \n| ![图片](img/Note.jpg) | 只有`AtomicInteger`和`AtomicLong`继承自`Number`类，而`AtomicBoolean`没有。`java`.`util`.`concurrent`.`atomic`子包中的所有其他类都直接继承自`Object`类。\
  \ |\n\n\n\n在 `java.util.concurrency.atomic` 子包的类中，`AtomicInteger` 和 `AtomicLong`\
  \ 最为重要。表 14-6 列出了 `AtomicInteger` 类中的重要方法。（`AtomicLong` 中的方法与之类似。）\n\n表 14-6. AtomicInteger\
  \ 类中的重要方法\n\n| 方法 | 描述 |\n| --- | --- |\n| `AtomicInteger()` | 创建一个初始值为 0 的 `AtomicInteger`\
  \ 实例。 |\n| `AtomicInteger(int initVal)` | 创建一个初始值为 `initVal` 的 `AtomicInteger` 实例。\
  \ |\n| `int get()` | 返回此对象中保存的整数值。 |\n| `void set(int newVal)` | 将此对象中保存的整数值重置为\
  \ `newVal`。 |\n| `int getAndSet(int newValue)` | 返回此对象中保存的当前 `int` 值，并将此对象中保存的值设置为\
  \ `newVal`。 |\n| `boolean compareAndSet (int expect, int update)` | 将此对象的 `int`\
  \ 值与 `expect` 值进行比较，如果相等，则将此对象的 `int` 值设置为 `update` 值。 |\n| `int getAndIncrement()`\
  \ | 返回此对象中整数的当前值，并将此对象中的整数值加 1。类似于 `i` 为 `int` 类型时 `i++` 的行为。 |\n| `int getAndDecrement()`\
  \ | 返回此对象中整数的当前值，并将此对象中的整数值减 1。类似于 `i` 为 `int` 类型时 `i--` 的行为。 |\n| `int getAndAdd(int\
  \ delta)` | 返回此对象中保存的整数值，并将给定的增量值加到该整数值上。 |\n| `int incrementAndGet()` | 将此对象中的整数值加\
  \ 1 并返回该值。类似于 `i` 为 `int` 类型时 `++i` 的行为。 |\n| `int decrementAndGet()` | 将此对象中的整数值减\
  \ 1 并返回该值。类似于 `i` 为 `int` 类型时 `--i` 的行为。 |\n| `int addAndGet(int delta)` | 将 `delta`\
  \ 值加到当前整数值上并返回该值。 |\n| `int intValue()long longValue()float floatValue()doubleValue()`\
  \ | 转换对象的当前 `int` 值，并以 `int`、`long`、`float` 或 `double` 值的形式返回。 |\n\n让我们通过一个示例来了解如何使用\
  \ `AtomicInteger` 或 `AtomicLong`。假设你有一个公共的计数器值，所有线程都可以访问它。如何安全地更新或访问这个公共计数器值，而不会引入数据竞争问题（上一章讨论过）？显然，你可以使用\
  \ `synchronized` 关键字来确保临界区（修改计数器值的代码）在任意时刻只能被一个线程访问。临界区会非常小，如下所示：\n\n```\n public\
  \ void run() {\n        synchronized(SharedCounter.class) {\n                SharedCounter.count++;\n\
  \        }\n}\n```\n\n然而，这段代码效率低下，因为每次仅仅为了递增 `count` 的值，它都要获取并释放锁。或者，如果你将 `count`\
  \ 声明为 `AtomicInteger` 或 `AtomicLong`（视情况而定），则无需使用 `synchronized` 关键字加锁。清单 14-8 给出了完整的程序，展示了如何在实际中使用\
  \ `AtomicLong`。\n\n清单 14-8.  *AtomicVariableTest.java*\n\n```\nimport java.util.concurrent.atomic.*;\n\
  \n// 演示递增“普通”（即非线程安全）整数和递增“原子”（即线程安全）整数有何不同的类：\n// 在没有锁的情况下递增共享的 Integer 对象可能导致数据竞争；\n\
  // 然而，递增共享的 AtomicInteger 不会导致数据竞争。\n\nclass AtomicVariableTest {\n        // 创建两个整数对象——一个普通，一个原子——初始值相同\n\
  \        private static Integer integer = new Integer(0);\n        private static\
  \ AtomicInteger atomicInteger = new AtomicInteger(0);\n\nstatic class IntegerIncrementer\
  \ extends Thread {\n                public void run() {\n                      \
  \  System.out.println(\"递增后的整数值为: \" + ++integer);\n                }\n        }\n\
  \        static class AtomicIntegerIncrementer extends Thread {\n              \
  \  public void run() {\n                        System.out.println(\"递增后的原子整数值为:\
  \ \"\n                                        + atomicInteger.incrementAndGet());\n\
  \                }\n        }\n        public static void main(String []args) {\n\
  \                // 分别为递增原子整数和“普通”整数创建三个线程\n                for(int i = 0; i < 5;\
  \ i++) {\n                        new IntegerIncrementer().start();\n          \
  \              new AtomicIntegerIncrementer().start();\n                }\n    \
  \    }\n} \n```\n\n实际输出取决于线程调度。在一次运行中，它打印了以下内容：\n\n```\n递增后的原子整数值为: 1\n递增后的整数值为:\
  \ 1\n递增后的整数值为: 1\n递增后的原子整数值为: 2\n递增后的整数值为: 2\n递增后的原子整数值为: 3\n递增后的整数值为: 3\n递增后的整数值为:\
  \ 4\n递增后的原子整数值为: 4\n递增后的原子整数值为: 5\n```\n\n在此输出中，请注意递增 `Integer` 对象导致了数据竞争：`Integer`\
  \ 在递增 5 次后（从初始值 0 开始）的最终值为 4。然而，对于 `AtomicInteger`，其值为 5——这是正确的。\n\n让我们分析一下这个程序。`AtomicVariableTest`\
  \ 有两个数据成员——一个类型为 `Integer`，另一个类型为 `AtomicInteger`——初始值相同。\n\n有两个 `Thread` 类。一个类在其\
  \ `run()` 方法中递增 `Integer` 值，另一个类在其 `run()` 方法中递增 `AtomicInteger` 值。在 `main()` 方法中，你生成了这两种\
  \ `Thread` 的五个线程。输出显示，在没有锁的情况下递增 `Integer` 值容易发生数据竞争，而在没有任何锁的情况下递增 `AtomicInteger`\
  \ 值是安全的。\n\n锁\n\n在上一章中，我们讨论了 `synchronized` 关键字以及它如何强制一次只有一个线程在临界区中执行。`java.util.concurrent.locks`\
  \ 包提供了更复杂的工具。在本节中，我们将讨论 `Lock` 接口。\n\n使用 `Lock` 对象类似于使用 `synchronized` 关键字获取隐式锁。这两种构造的目的相同：确保一次只有一个线程访问共享资源。然而，与\
  \ `synchronized` 关键字不同，`Lock` 还支持等待/通知机制，并支持 `Condition` 对象。\n\n| ![image](img/Note.jpg)\
  \ | 你可以认为使用 `synchronized` 是隐式加锁，而使用 `Lock` 对象是显式加锁。 |\n\n使用 `synchronized` 关键字（隐式加锁）的好处是，你不必记得在\
  \ `finally` 块中释放锁，因为在 `synchronized` 块（或方法）结束时，会生成代码自动释放锁。尽管这是一个有用的特性，但在某些情况下，你可能需要手动控制锁的释放（例如，在块结束之外的其他地方释放它），而\
  \ `Lock` 对象提供了这种灵活性。但是，在使用 `Lock` 对象时，你有责任确保在 `finally` 块中释放锁。以下代码片段描述了 `Lock` 的使用惯用法：\n\
  \n```\nLock lock = /* 获取 Lock 类型实例 */;\nlock.lock();\ntry {\n       // 临界区\n}\n\
  finally {\n       lock.unlock();\n}\n```\n\n\n\n隐式锁与显式 `Lock` 对象的另一个区别在于，你可以使用 `Locks`\
  \ 进行“非阻塞尝试”来获取锁。那么，“非阻塞尝试”在这里是什么意思呢？如果锁可用，你就获取该锁；或者你可以通过 `Lock` 对象上的 `tryLock()`\
  \ 方法放弃请求锁。这很有趣，不是吗？如果你成功获取了锁，就可以执行临界区中的任务；否则，你将执行替代操作。值得注意的是，`tryLock()` 方法的一个重载版本将超时值作为参数，这样你就可以在指定时间内等待获取锁。\n\
  \n`tryLock(long time, TimeUnit unit)`.\n\n使用 `tryLock()` 时，使用 `Lock` 对象的惯用写法是：\n\
  \n```\nLock lock = /* 获取 Lock 类型实例 */;\nif(tryLock()) {\n        try {\n       \
  \         // 临界区\n        }\n        finally {\n                lock.unlock();\n\
  \        }\n}\nelse {\n\n}\n```\n\n使用 `tryLock()` 有助于避免上一章讨论的一些线程同步相关问题，例如死锁和活锁。表\
  \ 14-7 列出了 `Lock` 类中的重要方法。\n\n表 14-7. Lock 类中的重要方法\n\n| 方法 | 描述 |\n| --- | --- |\n\
  | `void lock()` | 获取锁。 |\n| `boolean tryLock()` | 获取锁，如果锁可用则返回 `true`；如果锁不可用，则不获取锁并返回\
  \ `false`。 |\n| `boolean tryLock(long time,                 TimeUnit unit)` | 与之前的\
  \ `tryLock()` 方法相同，但在获取锁失败并返回 `false` 之前，会等待给定的等待时间。 |\n| `void lockInterruptibly()`\
  \ | 获取锁；在获取锁的过程中，如果另一个线程中断它，此方法会抛出 `InterruptedException` |\n| `Condition newCondition()`\
  \ | 返回与此 `Lock` 对象关联的 `Condition` 对象。 |\n| `void unlock()` | 释放锁。 |\n\n让我们看一个 `Lock`\
  \ 对象的示例。在此示例中，你使用一个 `Lock` 对象并将其传递给线程，以便在此 `Lock` 对象上同步它们。此程序是清单 14-1 中使用 `Semaphores`\
  \ 的程序的简单变体。在清单 14-9 中，你模拟访问 ATM 机，这是一个共享资源。当然，一次只能有一个人使用 ATM 机，因此访问机器的代码是一个临界区。\n\
  \n清单 14-9.  ATMRoom.java\n\n```\nimport java.util.concurrent.locks.*;\n\n// 此类模拟只有一台\
  \ ATM 机可用，且五个人正在等待使用该机器的情况。\n// 由于一次只能有一个人使用 ATM 机，其他人需要等待轮到自己\nclass ATMMachine\
  \ {\n        public static void main(String []args) {\n                // 一个人可以重复使用机器，因此使用“可重入锁”\n\
  \                Lock machine = new ReentrantLock();\n\n// 等待使用机器的人员列表\n       \
  \         new Person(machine, \"Mickey\");\n                new Person(machine,\
  \ \"Donald\");\n                new Person(machine, \"Tom\");\n                new\
  \ Person(machine, \"Jerry\");\n                new Person(machine, \"Casper\");\n\
  \        }\n}\n\n// 每个 Person 都是一个独立的线程；它们对公共资源（此处为 ATM 机）的访问需要使用锁进行同步\nclass Person\
  \ extends Thread {\n        private Lock machine;\n        public Person(Lock machine,\
  \ String name) {\n                this.machine = machine;\n                this.setName(name);\n\
  \                this.start();\n        }\n        public void run() {\n       \
  \         try {\n                        System.out.println(getName() + \" 正在等待使用\
  \ ATM 机\");\n                        machine.lock();\n                        System.out.println(getName()\
  \ + \" 正在使用 ATM 机\");\n                        Thread.sleep(1000); // 模拟取款所需时间\n\
  \                } catch(InterruptedException ie) {\n                        System.err.println(ie);\n\
  \                }\n                finally {\n                        System.out.println(getName()\
  \ + \" 已使用完 ATM 机\");\n                        machine.unlock();\n             \
  \   }\n        }\n} \n```\n\n以下是此程序的输出：\n\n```\nDonald 正在等待使用 ATM 机\nJerry 正在等待使用\
  \ ATM 机\nTom 正在等待使用 ATM 机\nMickey 正在等待使用 ATM 机\nDonald 正在使用 ATM 机\nCasper 正在等待使用\
  \ ATM 机\nDonald 已使用完 ATM 机\nJerry 正在使用 ATM 机\nJerry 已使用完 ATM 机\nTom 正在使用 ATM 机\n\
  Tom 已使用完 ATM 机\nMickey 正在使用 ATM 机\nMickey 已使用完 ATM 机\nCasper 正在使用 ATM 机\nCasper\
  \ 已使用完 ATM 机\n```\n\n从输出中可以看出，尽管可能还有其他人在等待使用机器，但一次只有一个人在使用机器。在此程序中，`ATMMachine`\
  \ 类创建了一个代表 ATM 机的 `Lock` 对象。有五个人在等待使用机器，通过创建五个 `Person` 类的实例来模拟。`Person` 类继承自 `Thread`，并记住了需要获取和释放锁的\
  \ `Lock` 对象。\n\n`run()` 方法简单地获取锁，访问共享资源，并在 `finally` 块中释放锁。`Lock` 对象（此处的 machine\
  \ 变量）确保在任意时刻只有一个线程访问它。当一个线程正在访问锁时，其他线程会被阻塞。\n\n请注意，如果你尝试运行此程序，可能会得到不同的人员使用机器的顺序。这是因为访问顺序取决于\
  \ JVM 中的调度器如何调度线程运行。\n\n| ![image](img/Note.jpg) | `ReadWriteLock` 接口（继承自 `Lock`\
  \ 接口）定义了一个锁，该锁为只读访问和写访问提供了单独的锁。你可以分别使用 `readLock()` 和 `writeLock()` 方法获取读锁和写锁的实例。`ReentrantReadWriteLock`\
  \ 类实现了 `ReadWriteLock` 接口。   |\n\n条件\n\n`Condition` 支持线程通知机制。当某个条件不满足时，一个线程可以等待另一个线程满足该条件；一旦条件满足，另一个线程可以发出通知。`condition`\
  \ 与 `lock` 绑定。`Condition` 对象提供了三种方法来支持等待/通知模式：`await()`、`signal()` 和 `signalAll()`。这三种方法类似于\
  \ `Object` 类支持的 `wait()`、`notify()` 和 `notifyAll()` 方法。\n\n线程可以使用 `await()` 方法等待某个条件变为真，这是一个可中断的阻塞调用。如果你想要不可中断的等待，可以调用\
  \ `awaitUninterruptibly()`。你还可以使用以下重载方法之一指定等待的时间长度：\n\n*   `long awaitNanos(long\
  \ nanosTimeout)`\n*   `boolean await(long time, TimeUnit unit)`\n*   `boolean awaitUntil(Date\
  \ deadline)`\n\n\n\n现在让我们看一个使用 `Condition` 对象的示例。假设你正在等待一位名叫 Joe 的人乘坐从马德里开往巴黎的 IC1122\
  \ 次列车。当 Joe 的列车到达车站时，他会通知你；你接上他然后回家。\n\n假设多趟列车可以到达同一个火车站，你需要等待特定的列车到达。一旦你关注的那趟列车到达，你就会收到来自该列车的“通知”或“信号”。这个场景非常适合使用等待/通知模式。实现该模式有两种方式。第一种是使用隐式锁，并利用\
  \ `Object` 类中的 `wait()` 和 `notifyAll()` 方法。第二种方式——如清单 14-10 所示——是使用显式的 `Lock` 和\
  \ `Condition` 对象，并利用 `Condition` 对象中的 `await()` 和 `signalAll()` 方法。\n\n清单 14-10.\
  \  RailwayStation.java\n\n```\nimport java.util.concurrent.locks.*;\n\n// This class\
  \ simulates arrival of trains in a railway station.\nclass RailwayStation {\n  \
  \      // A common lock for synchronization\n        private static Lock station\
  \ = new ReentrantLock();\n        // Condition to wait or notify the arrival of\
  \ Joe in the station\n        private static Condition joeArrival = station.newCondition();\n\
  \n// Train class simulates arrival of trains independently\n        static class\
  \ Train extends Thread {\n                public Train(String name) {\n        \
  \            this.setName(name);\n                }\n                public void\
  \ run() {\n                        station.lock();\n                        try\
  \ {\n                                System.out.println(getName() + \": I've arrived\
  \ in station \");\n                                if(getName().startsWith(\"IC1122\"\
  )) {\n                                        // Joe is coming in train IC1122 -\
  \ he announces it to us\n                                        joeArrival.signalAll();\n\
  \                                }\n                        }\n                \
  \        finally {\n                                station.unlock();\n        \
  \                }\n                }\n        }\n\n// Our wait in the railway station\
  \ for Joe is simulated by this thread. Once we get notification from Joe\n     \
  \   // that he has arrived, we pick-him up and go home\n        static class WaitForJoe\
  \ extends Thread {\n                public void run() {\n                      \
  \  System.out.println(\"Waiting in the station for IC1122 in which Joe is coming\"\
  );\n                        station.lock();\n                        try {\n   \
  \                             // await Joe's train arrival\n                   \
  \             joeArrival.await();\n                                // if this statement\
  \ executes, it means we got a train arrival signal\n                           \
  \     System.out.println(\"Pick up Joe and go home\");\n                       \
  \ } catch(InterruptedException ie) {\n                                ie.printStackTrace();\n\
  \                        }\n                        finally {\n                \
  \                station.unlock();\n                        }\n                }\n\
  \        }\n\n// first create a thread that waits for Joe to arrive and then create\
  \ new Train threads\n        public static void main(String []args) throws InterruptedException\
  \ {\n                // we are waiting before the trains start coming\n        \
  \        new WaitForJoe().start();\n                // Trains are separate threads\
  \ - they can arrive in any order\n                new Train(\"IC1234 - Paris to\
  \ Munich\").start();\n                new Train(\"IC2211 - Paris to Madrid\").start();\n\
  \                new Train(\"IC1122 - Madrid to Paris\").start();\n            \
  \    new Train(\"IC4321 - Munich to Paris\").start();\n        }\n}\n```\n\n以下是该程序的输出：\n\
  \n```\nWaiting in the station for IC1122 in which Joe is coming\nIC1234 - Paris\
  \ to Munich: I've arrived in station\nIC1122 - Madrid to Paris: I've arrived in\
  \ station\nIC2211 - Paris to Madrid: I've arrived in station\nPick up Joe and go\
  \ home\nIC4321 - Munich to Paris: I've arrived in station\n```\n\n让我们分析一下这个程序是如何工作的。在\
  \ `RailwayStation` 类中，你有一个名为 `station` 的公共 `Lock` 对象。从该 `station` 对象中，你获得了一个名为 `joeArrival`\
  \ 的 `Condition` 对象（记住，条件总是与锁相关联）。你使用了 `newCondition()` 方法，因此生成的 `Condition` 对象是一个可中断的条件；你没有指定任何超时时间，所以等待的线程将永远等待，直到收到信号。\n\
  \n`Train` 类是一个模拟列车到达火车站的 `Thread`。`Train` 中的 `run()` 方法首先获取锁，然后宣布列车已到达，并在方法退出前释放锁。请注意，如果在未获取锁的情况下对\
  \ `Condition` 对象调用 `await()`，你将收到一个 `IllegalMonitorStateException`。在 `run()` 方法中，如果\
  \ `Train` 的名称是 `IC1122`，它将通过调用 `joeArrival.signalAll();` 通知我们 Joe 已经到达。\n\n你在火车站等待\
  \ `Joe` 的过程由这个 `WaitForJoe` 线程模拟。在 `run()` 方法中，你获取锁并等待 `joeArrival` 条件被发出信号。一旦你收到通知（即信号）说他已到达，你就接上他然后回家。\n\
  \n| ![image](img/Note.jpg) | 在多线程编程中，一个常见的需求是等待一个线程满足某个条件后，另一个线程才能继续执行。使用轮询（即使用\
  \ `while` 循环反复检查条件）是一种糟糕的解决方案，因为这会浪费 CPU 周期；此外，它还容易引发数据竞争。请改用基于等待/通知或等待/信号的保护块。\
  \ |\n\n一个锁上的多个条件\n\n从 OCPJP 7 考试的角度来看，理解锁和条件非常重要。因此，我们将讨论另一个更详细的示例，该示例使用了锁和条件。在这个程序中，我们将展示如何在一个\
  \ `Lock` 对象上获取多个 `Condition` 对象。\n\n假设你需要实现一个固定大小的队列，队列的大小在线程创建时确定。在典型的队列中，如果队列中没有元素并且调用了\
  \ `remove()` 方法，它将抛出一个 `NoSuchElementException`（如你在清单 14-6 中所见）。然而，在这种情况下，你希望线程阻塞，直到其他线程插入一个元素。类似地，如果你尝试向一个已满的队列中插入元素，线程不应该抛出\
  \ `IllegalStateException` 来指示无法再插入更多元素，而应该阻塞，直到有元素被移除。换句话说，你需要实现一个简单的阻塞队列（参见清单 14-11）。\n\
  \n清单 14-11.  BlockerQueue.java\n\n```\nimport java.util.concurrent.locks.*;\n\n\
  // this implements a fixed size queue with size determined at the time of creation.\
  \ I/ if remove() is called\n// when there are no elements, then the queue blocks\
  \ (i.e., waits) until an element is inserted.\n// If insert() is called when the\
  \ queue is full, then the queue blocks until an element is removed\n\nclass BlockerQueue\
  \ {\n        // remember the max size of the queue\n        private int size = 0;\n\
  \n// array to store the elements in the queue\n        private Object elements[];\n\
  \n// pointer that points to the current element in the queue\n        private int\
  \ currPointer = 0;\n\n// internal lock used for synchronized access to the BlockerQueue\n\
  \        private Lock internalLock = new ReentrantLock();\n\n// condition to wait\
  \ for when queue is empty that makes use of the common lock\n        private Condition\
  \ empty = internalLock.newCondition();\n\n\n\n// 利用公共锁实现队列满时的等待条件\n        private\
  \ Condition full =  internalLock.newCondition();\n\npublic BlockerQueue(int size)\
  \ {\n                this.size = size;\n                elements = new Object[size];\n\
  \        }\n\n// 移除一个元素（如果存在）；如果队列中没有元素，\n        // 则等待元素插入。一旦有元素被插入，通知所有因队列满而等待插入的线程\n\
  \        public Object remove() {\n                Object element = null;\n    \
  \            internalLock.lock();\n                try {\n                     \
  \   if(currPointer == 0) {\n                                System.out.println(\"\
  In remove(): 没有元素可移除，等待插入\");\n                                // 无法移除——队列中没有元素；\n\
  \                                // 因此阻塞，直到有元素被插入\n                            \
  \    empty.await();\n                                // 如果执行到这里，说明某个线程已完成\n    \
  \                            // 对 insert() 的调用，因此继续移除该元素\n                     \
  \           System.out.println(\"In remove(): 收到通知，已有元素被插入\");\n               \
  \         }\n                        // 先递减 currPointer，再获取元素\n                \
  \        element = elements[--currPointer];\n                        System.out.println(\"\
  In remove(): 已移除元素 \" + element);\n\n// 元素已被移除，因此有空间可供插入\n                     \
  \   // 通知所有等待插入的线程\n                        full.signalAll();\n                \
  \        System.out.println(\"In remove(): 已发出信号，表示有空间可供插入\");\n               \
  \ } catch(InterruptedException ie) {\n                        ie.printStackTrace();\n\
  \                } finally {\n                        internalLock.unlock();\n \
  \               }\n                return element;\n        }\n\n// 如果有空间则插入元素。如果队列已满，\n\
  \        // 则等待 remove() 被调用并收到信号后继续插入。\n        // 插入完成后，通知所有因队列为空而等待的线程。\n   \
  \     public void insert(Object element) {\n                internalLock.lock();\n\
  \                try {\n                        if(currPointer == size) {\n    \
  \                            System.out.println(\"In insert(): 队列已满，等待移除\");\n \
  \                               // 无法插入——队列已满；\n                               \
  \ // 因此阻塞，直到有元素被移除\n                                full.await();\n            \
  \                    // 如果执行到这里，说明某个线程已完成\n                                // 对\
  \ remove() 的调用，因此继续插入该元素\n                                System.out.println(\"\
  In insert(): 收到通知，remove 已被调用，继续插入元素\");\n                        }\n          \
  \              // 获取元素，然后递增 currPointer\n                        elements[currPointer++]\
  \ = element;\n                        System.out.println(\"In insert(): 已插入元素 \"\
  \ + element);\n                        // 元素已插入，因此其他线程可以移除它...\n               \
  \         // 通知所有等待移除的线程\n                        empty.signalAll();\n         \
  \               System.out.println(\"In insert(): 已通知队列非空\");\n                }\
  \ catch(InterruptedException ie) {\n                        ie.printStackTrace();\n\
  \                } finally {\n                        internalLock.unlock();\n \
  \               }\n        }\n}\n\n以下是该类的测试代码：\n\n```\nclass BlockerQueueTest1 {\n\
  \        public static void main(String []args) {\n                final BlockerQueue\
  \ blockerQueue = new BlockerQueue(2);\n                new Thread() {\n        \
  \                public void run() {\n                                System.out.println(\"\
  Thread1: 尝试从队列中移除一个元素\");\n                                Object o = blockerQueue.remove();\n\
  \                        }\n                }.start();\n\nnew Thread() {\n     \
  \                   public void run() {\n                                System.out.println(\"\
  Thread2: 尝试向队列中插入一个元素\");\n                                blockerQueue.insert(\"\
  one\");\n                        }\n                }.start();\n       }\n}\n```\n\
  \n该测试代码输出如下：\n\n```\nThread1: 尝试从队列中移除一个元素\nIn remove(): 没有元素可移除，等待插入\nThread2:\
  \ 尝试向队列中插入一个元素\nIn insert(): 已插入元素 one\nIn insert(): 已通知队列非空\nIn remove(): 收到通知，已有元素被插入\n\
  In remove(): 已移除元素 one\nIn remove(): 已发出信号，表示有空间可供插入\n```\n\n从输出可以看出，`remove()`\
  \ 方法先被调用，它等待 `insert()` 被调用。一旦 `insert()` 完成，`remove()` 方法便成功从队列中移除了元素。现在，让我们尝试另一个测试用例，测试\
  \ `insert()` 方法中的阻塞功能是否正常：\n\n```\nclass BlockerQueueTest2 {\n        public static\
  \ void main(String []args) {\n                final BlockerQueue blockerQueue =\
  \ new BlockerQueue(3);\n                blockerQueue.insert(\"one\");\n        \
  \        blockerQueue.insert(\"two\");\n                blockerQueue.insert(\"three\"\
  );\n                new Thread() {\n                        public void run() {\n\
  \                                System.out.println(\"Thread2: 尝试向队列中插入一个元素\");\n\
  \                                blockerQueue.insert(\"four\");\n              \
  \          }\n                }.start();\n\nnew Thread() {\n                   \
  \     public void run() {\n                                System.out.println(\"\
  Thread1: 尝试从队列中移除一个元素\");\n                                Object o = blockerQueue.remove();\n\
  \                        }\n                }.start();\n        }\n}\n```\n\n该测试代码输出如下：\n\
  \n```\nIn insert(): 已插入元素 one\nIn insert(): 已通知队列非空\nIn insert(): 已插入元素 two\nIn\
  \ insert(): 已通知队列非空\nIn insert(): 已插入元素 three\nIn insert(): 已通知队列非空\nThread2: 尝试向队列中插入一个元素\n\
  In insert(): 队列已满，等待移除\nThread1: 尝试从队列中移除一个元素\nIn remove(): 已移除元素 three\nIn remove():\
  \ 已发出信号，表示有空间可供插入\nIn insert(): 收到通知，remove 已被调用，继续插入元素\nIn insert(): 已插入元素 four\n\
  In insert(): 已通知队列非空\n```\n\n从输出可以看出，当一个线程在已满的队列上调用 `insert` 时（本例中你指定的容量为 3 个元素），该线程会阻塞。一旦另一个线程从队列中移除了一个元素，被阻塞的线程就会恢复并成功插入元素。\n\
  \n使用 Executors 和 ThreadPools\n\n你可以通过创建 `Thread` 对象在应用程序中直接创建和管理线程。但是，如果你想屏蔽多线程编程的底层细节，可以使用\
  \ `Executor` 接口。\n\n图 14-1 展示了 `Executor` 层次结构中的重要类和接口。在本节中，你将重点学习如何使用 `Executor`\
  \ 接口、`ExecutorService` 和 `ThreadPools`。我们将在下一节“使用并行 Fork/Join 框架”中介绍 `ForkJoinPool`。\n\
  \n\n\n![9781430247647_Fig14-01.jpg](img/9781430247647_unFig14-01.jpg)\n\n图 14-1.\
  \ Executor 层级结构中的重要类/接口\n\nExecutor\n\n`Executor` 是一个仅声明了一个方法的接口：`void execute(Runnable)`。这个接口本身看起来可能并不庞大，但其派生类（或接口），例如\
  \ `ExecutorService`、`ThreadPoolExecutor` 和 `ForkJoinPool`，支持着非常有用的功能。我们将在本节剩余部分更详细地讨论\
  \ `Executor` 的派生类。现在，先看一下代码清单 14-12 中关于 `Executor` 接口的简单示例，了解如何实现该接口并在实践中使用它。\n\n\
  代码清单 14-12. ExecutorTest.java\n\n```\nimport java.util.concurrent.*;\n\n// 这个 Task\
  \ 类实现了 Runnable，因此它是一个线程对象\nclass Task implements Runnable {\n        public void\
  \ run() {\n                System.out.println(\"Calling Task.run() \");\n      \
  \  }\n}\n\n// 这个类实现了 Executor 接口，并且应该重写 execute(Runnable) 方法。\n// 我们提供了一个带有额外参数\
  \ 'times' 的重载 execute 方法，用于创建并\n// 运行指定次数的线程\nclass RepeatedExecutor implements\
  \ Executor {\n        public void execute(Runnable runnable) {\n               \
  \ new Thread(runnable).start();\n        }\n        public void execute(Runnable\
  \ runnable, int times) {\n                System.out.printf(\"Calling Task.run()\
  \ thro' Executor.execute() for %d times %n\", times);\n                for(int i\
  \ = 0; i < times; i++) {\n                        execute(runnable);\n         \
  \       }\n        }\n}\n\n// 这个类生成一个 Task 线程并显式调用 start() 方法。\n// 它还展示了如何使用 Executor\
  \ 执行一个线程\nclass ExecutorTest {\n        public static void main(String []args) {\n\
  \                Runnable runnable = new Task();\n                System.out.println(\"\
  Calling Task.run() by directly creating a Thread object\");\n                Thread\
  \ thread = new Thread(runnable);\n                thread.start();\n            \
  \    RepeatedExecutor executor = new RepeatedExecutor();\n                executor.execute(runnable,\
  \ 3);\n        }\n}\n```\n\n以下是该程序的输出：\n\n```\nCalling Task.run() by directly creating\
  \ a Thread object\nCalling Task.run()\nCalling Task.run() thro' Executor.execute()\
  \ for 3 times\nCalling Task.run()\nCalling Task.run()\nCalling Task.run()\n```\n\
  \n在这个程序中，你有一个 `Task` 类，它通过提供 `run()` 方法的定义来实现 `Runnable`。`RepeatedExecutor` 类通过提供\
  \ `execute(Runnable)` 方法的定义来实现 `Executor` 接口。\n\n`Runnable` 和 `Executor` 在某种意义上很相似，它们都提供了一个待实现的方法。在这个定义中，你可能已经注意到\
  \ `Executor` 本身并不是一个线程，你必须创建一个 `Thread` 对象来执行传入 `execute()` 方法的 `Runnable` 对象。然而，`Runnable`\
  \ 和 `Executor` 的主要区别在于，`Executor` 旨在抽象化线程的执行方式。例如，根据 `Executor` 的实现不同，`Executor`\
  \ 可以安排线程在特定时间运行，或者在延迟一段时间后执行线程。\n\n在这个程序中，你重载了 `execute()` 方法，增加了一个额外的参数，用于创建并执行指定次数的线程。在\
  \ `main()` 方法中，你首先创建一个 `Thread` 对象并安排其运行。之后，你实例化 `RepeatedExectutor` 来执行该线程三次。\n\
  \nCallable、Executors、ExecutorService、ThreadPool 和 Future\n\n`Callable` 是一个仅声明了一个方法的接口：`call()`。它的完整签名是\
  \ `V call() throws Exception`。它代表一个需要由线程完成的任务。任务完成后，它会返回一个值。如果由于某些原因，`call()` 方法无法执行或执行失败，它会抛出一个\
  \ `Exception`。\n\n要使用 `Callable` 对象执行任务，你首先需要创建一个线程池。线程池是一个能够执行任务的线程集合。你可以使用 `Executors`\
  \ 工具类来创建线程池。这个类提供了获取线程池实例、线程工厂等的方法。\n\n`ExecutorService` 接口实现了 `Executor` 接口，并提供了诸如终止线程和生成\
  \ `Future` 对象等服务。某些任务可能需要相当长的执行时间才能完成。因此，当你向执行器服务提交一个任务时，你会得到一个 `Future` 对象。\n\n\
  `Future` 代表那些包含一个将来由线程返回的值的对象（即，它在“将来”线程终止时返回值）。你可以使用 `Future` 类中的 `isDone()` 方法来检查任务是否完成，然后使用\
  \ `get()` 方法来获取任务结果。如果你在任务未完成时直接调用 `get()` 方法，该方法会阻塞，直到任务完成并返回可用的值。\n\n话不多说——尝试一个简单的示例，看看这些类如何协同工作（代码清单\
  \ 14-13）。\n\n代码清单 14-13. CallableTest.java\n\n```\n// Factorial 实现了 Callable，以便可以将其传递给\
  \ ExecutorService\n// 并作为任务执行。\nclass Factorial implements Callable<Long> {\n  \
  \      long n;\n        public Factorial(long n) {\n                this.n = n;\n\
  \        }\n        public Long call() throws Exception {\n                if(n\
  \ <= 0) {\n                        throw new Exception(\"for finding factorial,\
  \ N should be > 0\");\n                }\n                long fact = 1;\n     \
  \           for(long longVal = 1; longVal <= n; longVal++) {\n                 \
  \       fact *= longVal;\n                }\n                return fact;\n    \
  \    }\n}\n\n// 说明了 Callable、Executors、ExecutorService 和 Future 之间的关系；\n// 也展示了它们如何协同工作来执行一个任务\n\
  class CallableTest {\n        public static void main(String []args) throws Exception\
  \ {\n                // 我们要为其计算阶乘的值\n                long N = 20;\n            \
  \    // 获取一个可提交给执行器服务的 callable 任务\n                Callable<Long> task = new Factorial(N);\n\
  \                // 创建一个具有固定线程池（包含一个线程）的 ExecutorService\n                ExecutorService\
  \ es = Executors.newSingleThreadExecutor();\n                // 将任务提交给执行器服务并存储 Future\
  \ 对象\n                Future<Long> future = es.submit(task);\n                //\
  \ 等待 get() 方法，该方法会阻塞直到计算完成。\n                System.out.printf(\"factorial of %d\
  \ is %d\", N, future.get());\n                // 完成。关闭执行器服务，因为我们不再需要它了\n       \
  \         es.shutdown();\n        }\n}\n```\n\n程序输出如下：\n\n```\nfactorial of 20 is\
  \ 2432902008176640000\n```\n\n在这个程序中，你有一个实现了 `Callable` 的 `Factorial` 类。由于任务是计算数字\
  \ `N` 的阶乘，该任务需要返回一个结果。你为阶乘值使用了 `Long` 类型，因此你实现了 `Callable<Long>`。在 `Factorial` 类内部，你定义了\
  \ `call()` 方法，该方法实际执行任务（这里的任务是计算给定数字的阶乘）。如果给定的值 `N` 是负数或零，你不执行任务，而是向调用者抛出一个异常。否则，你从\
  \ 1 循环到 `N` 并计算阶乘值。\n\n\n\n在 `CallableTest` 类中，你首先创建了一个 `Factorial` 类的实例。然后你需要执行这个任务。为简单起见，你通过调用\
  \ `Executors` 类中的 `newSingleThreadExecutor()` 方法来获取一个单线程执行器。请注意，你也可以根据所需的并行度，使用其他方法（如\
  \ `newFixedThreadPool(nThreads)`）来创建包含多个线程的线程池。\n\n一旦你获得了 `ExecutorService`，就可以提交任务进行执行。`ExecutorService`\
  \ 抽象了任务何时执行、任务如何分配给线程等细节。当你调用 `submit(task)` 方法时，会获得一个 `Future<Long>` 的引用。通过这个 future\
  \ 引用，你可以在任务完成后调用 `get()` 方法来获取结果。如果在调用 `future.get()` 时任务仍在执行，这个 `get()` 方法将会阻塞，直到任务执行完成。执行完成后，你需要通过调用\
  \ `shutdown()` 方法来手动释放 `ExecutorService`。\n\n现在你已经熟悉了执行任务的基本机制，接下来看一个复杂的示例。假设你的任务是求从\
  \ 1 到 N 的数字之和，其中 N 是一个很大的数（在我们的例子中是一百万）。当然，你可以使用公式 `[(N * (N + 1)) / 2]` 来计算总和。是的，你将利用这个公式来检查从\
  \ 1 到 N 的求和是否正确。不过，仅为了演示，你将把 1 到 100 万的范围划分为 N 个子范围，并通过生成 N 个线程来对每个子范围内的数字求和；请参见清单\
  \ 14-14。\n\n清单 14-14.  SumOfN.java\n\n```\nimport java.util.*;\nimport java.util.concurrent.*;\n\
  \n// 我们创建一个 SumOfN 类，用于对 1..N 范围内的值求和，其中 N 是一个很大的数。\n// 我们将求和任务\n// 分配给 10 个线程（这只是一个用于演示的任意限制）。\n\
  // 计算完成后，我们将所有线程的结果相加，\n// 并使用公式 (N * (N + 1))/2 来检查计算结果是否正确。\nclass SumOfN {\n\
  \        private static long N = 1_000_000L;    // 一百万\n        private static long\
  \ calculatedSum = 0; // 用于保存 1..N 范围内值之和的变量\n        private static final int NUM_THREADS\
  \ = 10;  // 为分配工作而创建的线程数\n\n// 这个 Callable 对象对 from..to 范围内的数字求和\n        static\
  \ class SumCalc implements Callable<Long> {\n                long from, to, localSum\
  \ = 0;\n\npublic SumCalc(long from, long to) {\n                        this.from\
  \ = from;\n                        this.to = to;\n                }\n          \
  \      public Long call() {\n                        // 对 'from' 到 'to'（包含 'to'）范围内的值求和\n\
  \                        for(long i = from; i <= to; i++) {\n                  \
  \              localSum += i;\n                        }\n                     \
  \   return localSum;\n                }\n        }\n\n// 在 main 方法中，我们实现将求和任务分配给\n\
  \        // 给定数量的线程的逻辑，并最终检查计算出的总和是否正确\n        public static void main(String []args)\
  \ {\n                // 将任务分配给固定数量的可用线程\n                ExecutorService executorService\
  \ = Executors.newFixedThreadPool(NUM_THREADS);\n                // 将 Future 对象的引用存储在一个\
  \ List 中，以便后续一起求和\n                List<Future<Long>> summationTasks = new ArrayList<>();\n\
  \                long nByTen = N/10;       // 将 N 除以 10，以便作为 10 个任务提交\n        \
  \        for(int i = 0; i < NUM_THREADS; i++) {\n                        // 创建一个求和任务\n\
  \                        // 范围从 (10 * 0) + 1 .. (N/10 * 1) 到 (10 * 9) + 1 .. (N/10\
  \ * 10)\n                        long fromInInnerRange = (nByTen * i) + 1;\n   \
  \                     long toInInnerRange = nByTen * (i+1);\n                  \
  \      System.out.printf(\"生成线程，对范围 %d 到 %d 求和 %n\",fromInInnerRange, toInInnerRange);\n\
  \                        // 为给定的求和范围创建一个 callable 对象\n                        Callable<Long>\
  \ summationTask =\n                               new SumCalc(fromInInnerRange,\
  \ toInInnerRange);\n                        // 将该任务提交给 executor 服务\n           \
  \             Future<Long> futureSum = executorService.submit(summationTask);\n\
  \                        // 任务需要时间完成，因此将其添加到列表中，稍后再处理\n                        summationTasks.add(futureSum);\n\
  \                }\n\n// 现在，计算每个任务的总和\n                for(Future<Long> partialSum\
  \ : summationTasks) {\n                        try {\n                         \
  \       // get() 方法会阻塞（即等待），直到计算完成\n                                calculatedSum\
  \ += partialSum.get();\n                        } catch(CancellationException |\
  \ ExecutionException\n                                | InterruptedException exception)\
  \ {\n                                // 不太可能出现异常 - 如果出现问题则退出\n                 \
  \               exception.printStackTrace();\n                                System.exit(-1);\n\
  \                        }\n                }\n\n// 现在使用公式 (N * (N + 1))/2 计算总和，无需进行繁重的工作\n\
  \                long formulaSum = (N * (N + 1))/2;\n                // 打印使用公式计算的总和以及逐个计算的总和\n\
  \                // 它们必须相等！\n                System.out.printf(\"线程求和 = %d, 使用公式求和\
  \ = %d\",\n                        calculatedSum, formulaSum);\n        }\n}\n```\n\
  \n以下是该程序的输出：\n\n```\n生成线程，对范围 1 到 100000 求和\n生成线程，对范围 100001 到 200000 求和\n生成线程，对范围\
  \ 200001 到 300000 求和\n生成线程，对范围 300001 到 400000 求和\n生成线程，对范围 400001 到 500000 求和\n\
  生成线程，对范围 500001 到 600000 求和\n生成线程，对范围 600001 到 700000 求和\n生成线程，对范围 700001 到 800000\
  \ 求和\n生成线程，对范围 800001 到 900000 求和\n生成线程，对范围 900001 到 1000000 求和\n线程求和 = 500000500000,\
  \ 使用公式求和 = 500000500000 \n```\n\n现在我们来分析这个程序是如何工作的。在这个程序中，你需要求 1..N 的总和，其中 N 是一百万（一个很大的数）。`SumCalc`\
  \ 类实现了 `Callable<Long>`，用于对 `from` 到 `to` 范围内的值求和。`call()` 方法通过从 `from` 循环到 `to`\
  \ 来执行实际的计算，并将中间和值作为 `Long` 值返回。\n\n\n\n在这个程序中，你将求和任务分配给多个线程。你可以根据处理器内核数量决定线程数；不过，为了简化程序，这里使用十个线程。\n\
  \n在 `main()` 方法中，你创建一个包含十个线程的 `ThreadPool`。你将创建十个求和任务，因此需要一个容器来保存这些任务的引用。使用 `ArrayList`\
  \ 来保存 `Future<Long>` 引用。\n\n在 `main()` 的第一个 `for` 循环中，你创建十个任务并提交给 `ExecutorService`。提交任务时，你会获得一个\
  \ `Future<Long>` 引用，并将其添加到 `ArrayList` 中。\n\n创建完十个任务后，你在下一个 `for` 循环中遍历数组列表以获取任务结果。你将各个任务的部分结果相加，计算出最终总和。\n\
  \n得到从 1 到 100 万的计算总和后，你使用简单公式 `N * (N + 1)/2` 求出公式总和。从输出结果可以看出，计算总和与公式总和相等，因此可以确定你划分任务并合并任务结果的逻辑是正确的。\n\
  \n现在，在继续讨论 fork/join 框架之前，我们先快速介绍几个对并发编程有用的类。\n\nThreadFactory\n\n`ThreadFactory`\
  \ 是一个用于创建线程的接口，而不是通过调用 `new Thread()` 显式创建线程。例如，假设你经常创建高优先级线程。你可以创建一个 `MaxPriorityThreadFactory`，将该工厂创建的线程的默认优先级设置为最高优先级（参见清单\
  \ 14-15）。\n\n清单 14-15.  TestThreadFactory.java\n\n```\nimport java.util.concurrent.*;\n\
  \n// 一个 ThreadFactory 实现，将其创建的所有线程的优先级设置为最高\nclass MaxPriorityThreadFactory implements\
  \ ThreadFactory {\n        private static long count = 0;\n        public Thread\
  \ newThread(Runnable r) {\n             Thread temp = new Thread(r);\n         \
  \    temp.setName(\"prioritythread\" + count++);\n             temp.setPriority(Thread.MAX_PRIORITY);\n\
  \             return temp;\n        }\n}\n\nclass ARunnable implements Runnable\
  \ {\n        public void run() {\n                System.out.println(\"Running the\
  \ created thread \");\n        }\n}\n\nclass TestThreadFactory {\n        public\
  \ static void main(String []args) {\n                ThreadFactory threadFactory\
  \ = new MaxPriorityThreadFactory();\n                Thread t1 = threadFactory.newThread(new\
  \ ARunnable());\n                System.out.println(\"The name of the thread is\
  \ \" + t1.getName());\n                System.out.println(\"The priority of the\
  \ thread is \" + t1.getPriority());\n                t1.start();\n        }\n}\n\
  ```\n\n它会输出以下内容：\n\n```\nThe name of the thread is prioritythread0\nThe priority\
  \ of the thread is 10\nRunning the created thread\n```\n\n通过使用 `ThreadFactory`，你可以减少设置线程优先级、名称、线程池等的样板代码。\n\
  \nThreadLocalRandom 类\n\n在进行并发编程时，你会发现经常需要生成随机数。使用 `Math.random()` 对于并发编程来说效率不高。因此，`java.util.concurrent`\
  \ 包引入了 `ThreadLocalRandom` 类，它适用于并发程序。你可以使用 `ThreadLocalRandom.current()`，然后调用 `nextInt()`\
  \ 和 `nextFloat()` 等方法生成随机数。\n\nTimeUnit 枚举\n\n你在本章前面已经看到一些方法将 `TimeUnit` 作为参数。`TimeUnit`\
  \ 是一个枚举，用于指定时间精度。`TimeUnit` 中的时间单位可以是 `DAYS`、`HOURS`、`MINUTES`、`SECONDS`、`MICROSECONDS`、`MILLISECONDS`\
  \ 或 `NANOSECONDS` 之一。该枚举还包含在这些时间单位之间进行转换的有用方法。例如，\n\n\n\n```\nSystem.out.printf(\"\
  One day has %d hours, %d minutes, %d seconds\",\n        TimeUnit.DAYS.toHours(1),\
  \ TimeUnit.DAYS.toMinutes(1), TimeUnit.DAYS.toSeconds(1));\n```\n\n输出结果为\n\n```\n\
  One day has 24 hours, 1440 minutes, 86400 seconds\n```\n\nJava API 中的某些方法使用特定的时间单位。例如，`sleep()`\
  \ 方法以毫秒为单位接收休眠时间。那么，如果你想用其他时间单位（比如秒或天）来指定线程休眠的时间，该怎么办呢？`TimeUnit` 让这项任务变得简单。请参见清单\
  \ 14-16 中的示例。\n\n清单 14-16.  TimeUnitExample.java\n\n```\nimport java.util.concurrent.TimeUnit;\n\
  \n// 一个展示如何使用 TimeUnit 枚举的简单示例\nclass TimeUnitExample {\n        public static void\
  \ main(String []args) throws InterruptedException {\n                System.out.println(\"\
  在主线程上调用 sleep() 方法，休眠 2 秒\");\n                // Thread.sleep 以毫秒为参数。通过使用 TimeUnit\
  \ 枚举，\n                // 你可以用其他时间单位（如小时、分钟、秒等）来指定休眠时间。\n                Thread.sleep(TimeUnit.SECONDS.toMillis(2));\n\
  \                System.out.println(\"主线程从休眠中醒来\");\n        }\n}\n```\n\n使用并行 Fork/Join\
  \ 框架\n\n`java.util.concurrent` 包中的 Fork/Join 框架有助于简化并行化代码的编写。该框架是 `ExecutorService`\
  \ 接口的一个实现，并提供了一个易于使用的并发平台，以便利用多处理器。这个框架对于建模分治问题非常有用。这种方法适用于可以递归划分并在较小规模上计算的任务；计算出的结果随后被合并。将任务划分为更小的任务称为*分叉（forking）*，而合并来自较小任务的结果称为*连接（joining）*。\n\
  \nFork/Join 框架使用了工作窃取算法：当一个 `worker` 线程完成其工作并空闲时，它会从其他仍在忙碌的线程那里获取（或“窃取”）工作。起初，你可能会觉得使用\
  \ Fork/Join 是一项复杂的任务。然而，一旦你熟悉了它，你就会意识到它在概念上很简单，并且能显著简化你的工作。关键在于递归地将任务细分为可以由独立线程处理的更小片段。\n\
  \n简而言之，Fork/Join 算法的设计如下：\n\n```\nforkJoinAlgorithm() {\n        拆分任务；\n       \
  \ 分叉任务；\n        连接任务；\n        组合结果；\n}\n```\n\n以下是这些步骤如何工作的伪代码：\n\n```\ndoRecursiveTask(input)\
  \ {\n        if (任务小到可以由一个线程处理) {\n                计算小任务；\n                如果有结果需要返回，则返回\n\
  \        }\n        else {\n                将任务分成两部分（即分叉）\n                对第一个任务调用\
  \ compute()，对第二个任务调用 join()，合并两个结果并返回\n        }\n}\n```\n\n图 14-2 直观地展示了任务如何被递归地细分为更小的任务，以及部分结果如何被合并。如图所示，一个任务被拆分为两个子任务，然后每个子任务再次被拆分为两个子任务，依此类推，直到每个拆分后的子任务都可以由每个线程计算。一旦线程完成计算，它就会返回结果，以便与其他结果合并；通过这种方式，所有计算出的结果都被合并回来。\n\
  \n![9781430247647_Fig14-02.jpg](img/9781430247647_Fig14-02.jpg)\n\n图 14-2.  Fork/Join\
  \ 框架如何使用分治法完成任务\n\nFork/Join 框架的有用类\n\n以下类在 Fork/Join 框架中扮演关键角色：`ForkJoinPool`、`ForkJoinTask`、`RecursiveTask`\
  \ 和 `RecursiveAction`。让我们更详细地了解这些类。\n\n*   `ForkJoinPool` 是 Fork/Join 框架中最重要的类。它是一个用于运行\
  \ fork/join 任务的线程池——它执行 `ForkJoinTask` 的实例。它执行任务并管理其生命周期。表 14-8 列出了这个抽象类的重要方法。\n\
  \n表 14-8. ForkJoinPool 类中的重要方法\n\n| 方法 | 描述 |\n| --- | --- |\n| `void execute(ForkJoinTask<?>\
  \ task)` | 异步执行给定的任务。 |\n| `<T> T invoke(ForkJoinTask<T> task)` | 执行给定的任务并返回计算出的结果。\
  \ |\n| `<T> List<Future<T>> invokeAll(Collection<? extends           Callable<T>>\
  \ tasks)` | 执行所有给定的任务，并在所有任务完成后返回一个 future 对象列表。 |\n| `boolean isTerminated()` |\
  \ 如果所有任务都已完成，则返回 `true`。 |\n| `int getParallelism()` `int getPoolSize()` `long getStealCount()`\
  \ | 状态检查方法。 |\n| `int getActiveThreadCount()<T> ForkJoinTask<T> submit(Callable<T>\
  \ task)` `<T> ForkJoinTask<T> submit(ForkJoinTask<T> task)` `ForkJoinTask<?> submit(Runnable\
  \ task)` `<T> ForkJoinTask<T> submit(Runnable task, T result)` | 执行提交的任务。重载版本接受不同类型的任务；返回一个\
  \ Task 对象或 Future 对象。 |\n\n*   `ForkJoinTask<V>` 是一个轻量级的类线程实体，代表一个定义了 `fork()` 和\
  \ `join()` 等方法的任务。表 14-9 列出了这个类的重要方法。\n\n表 14-9. ForkJoinTask 类中的重要方法\n\n| 方法 |\
  \ 描述 |\n| --- | --- |\n| `boolean cancel(boolean mayInterruptIfRunning)` | 尝试取消任务的执行。\
  \ |\n| `ForkJoinTask<V> fork()` | 异步执行任务。 |\n| `V join()` | 当计算完成时返回计算结果。 |\n| `V\
  \ get()` | 返回计算结果；如果计算未完成则等待。 |\n| `V invoke()` `static <T extends ForkJoinTask<?>>\
  \ Collection<T> invokeAll(Collection<T> tasks)` | 开始执行提交的任务；等待直到计算完成，并返回结果。 |\n\
  | `boolean isCancelled()` | 如果任务被取消，则返回 `true`。 |\n| `boolean isDone()` | 如果任务已完成，则返回\
  \ `true`。 |\n\n*   `RecursiveTask<V>` 是一个可以在 `ForkJoinPool` 中运行的任务；其 `compute()`\
  \ 方法返回一个 V 类型的值。它继承自 `ForkJoinTask`。\n*   `RecursiveAction` 是一个可以在 `ForkJoinPool`\
  \ 中运行的任务；其 `compute()` 方法执行任务中的实际计算步骤。它与 `RecursiveTask` 类似，但不返回值。\n\n使用 Fork/Join\
  \ 框架\n\n让我们来确定如何在问题解决中使用 Fork/Join 框架。以下是使用该框架的步骤：\n\n*   首先，检查问题是否适合使用 Fork/Join\
  \ 框架。请记住：Fork/Join 框架并非适用于所有类型的任务。如果你的问题符合以下描述，则该框架是合适的：\n\n*   问题可以设计为一个递归任务，其中任务可以细分为更小的单元，并且结果可以合并在一起。\n\
  *   细分后的任务是独立的，可以单独计算，在计算过程中无需任务之间进行通信。（当然，计算结束后，你需要将它们连接起来。）\n\n\n\n*   如果你要解决的问题可以通过递归建模，那么定义一个继承自\
  \ `RecursiveTask` 或 `RecursiveAction` 的任务类。如果任务需要返回结果，则继承 `RecursiveTask`；否则继承 `RecursiveAction`。\n\
  *   在新定义的任务类中重写 `compute()` 方法。如果任务足够小可以直接执行，`compute()` 方法就实际执行该任务；否则将任务拆分为子任务并调用它们。子任务可以通过\
  \ `invokeAll()` 或 `fork()` 方法调用（当子任务需要返回值时使用 `fork()`）。使用 `join()` 方法获取计算结果（如果你之前使用了\
  \ `fork()` 方法）。\n*   如果子任务有计算结果，则合并这些结果。\n*   然后实例化 `ForkJoinPool`，创建 `task` 类的实例，并通过\
  \ `ForkJoinPool` 实例上的 `invoke()` 方法启动任务的执行。\n*   就这样——完成了。\n\n现在让我们尝试解决如何计算 1 到\
  \ N（N 是一个大数）的和的问题。在清单 14-16 中，你将求和计算任务迭代地细分为十个子范围；然后计算每个子范围的和，再计算这些部分和的总和。或者，你可以使用\
  \ Fork/Join 框架递归地解决这个问题（清单 14-17）。\n\n清单 14-17.  SumOfNUsingForkJoin.java\n\n```\n\
  import java.util.concurrent.*;\n\n// 这个类演示了如何使用 fork/join 框架计算 1 到 N 的和。\n// 数字范围被不断对半分割，直到该范围可以由一个线程处理。\n\
  // 一旦范围求和完成，结果会被汇总起来。\n\nclass SumOfNUsingForkJoin {\n        private static long\
  \ N = 1000_000; // 一百万 - 我们想要计算从 1 到一百万的\n                                     \
  \     // 和\n        private static final int NUM_THREADS = 10; // 用于分配任务的线程数\n\n\
  // 这是算法的递归实现；继承自 RecursiveTask\n        // 而不是 RecursiveAction，因为我们要返回值。\n     \
  \   static class RecursiveSumOfN extends RecursiveTask<Long> {\n               \
  \ long from, to;\n                // from 和 to 是要求和的范围\n                public RecursiveSumOfN(long\
  \ from, long to) {\n                        this.from = from;\n                \
  \        this.to = to;\n                }\n                // 该方法执行 fork 和 join\
  \ 来计算总和。\n                // 如果值的范围可以由一个线程求和\n                // （记住我们希望将求和任务平均分配给\
  \ NUM_THREADS 个线程）\n                // 那么，使用一个简单的 for 循环对 from..to 范围内的数字求和\n  \
  \              // 否则，fork 该范围并 join 结果\n                public Long compute() {\n\
  \                        if( (to - from) <= N/NUM_THREADS) {\n                 \
  \               // 这个范围可以由一个线程处理，所以执行求和\n                                long localSum\
  \ = 0;\n                                // 对范围 'from' 到 'to'（包含 'to'）内的值进行累加\n \
  \                               for(long i = from; i <= to; i++) {\n           \
  \                             localSum += i;\n                                }\n\
  \                                System.out.printf(\"\\t 对值范围 %d 到 %d 求和的结果是 %d\
  \ %n\",from,to, localSum);\n                                return localSum;\n \
  \                       }\n                        else { // 不，这个范围对一个线程来说太大了，所以\
  \ fork 计算\n                              // 我们找到范围 from..to 的中点值\n             \
  \                 long mid = (from + to)/2;\n                              System.out.printf(\"\
  将计算任务 fork 为两个范围：\" +\n                                      \"%d 到 %d 和 %d 到 %d\
  \ %n\", from, mid, mid, to);\n                              // 确定前半部分范围 from..mid\
  \ 的计算\n                              RecursiveSumOfN firstHalf = new RecursiveSumOfN(from,\
  \ mid);\n                              // 现在，fork 该任务\n                        \
  \      firstHalf.fork();\n                              // 确定后半部分范围 mid+1..to 的计算\n\
  \                              RecursiveSumOfN secondHalf = new RecursiveSumOfN(mid\
  \ + 1, to);\n                              long resultSecond = secondHalf.compute();\n\
  \                              // 现在，等待前半部分求和计算完成，\n                           \
  \   // 完成后，将其结果与剩余部分相加\n                              return firstHalf.join() +\
  \ resultSecond;\n                        }\n                }\n        }\n\npublic\
  \ static void main(String []args) {\n                // 创建一个包含 NUM_THREADS 个线程的\
  \ fork-join 池\n                ForkJoinPool pool = new ForkJoinPool(NUM_THREADS);\n\
  \                // 将计算任务提交给 fork-join 池\n                long computedSum = pool.invoke(new\
  \ RecursiveSumOfN(0, N));\n                // 这是范围 1..N 的求和公式\n                long\
  \ formulaSum = (N * (N + 1)) / 2;\n                // 比较计算出的和与公式计算的和\n         \
  \       System.out.printf(\"范围 1..%d 的和；计算和 = %d，公式和 = %d %n\", N, computedSum,\
  \ formulaSum);\n        }\n}\n```\n\n程序输出如下：\n\n\n\n```\n将计算拆分为两个范围：0 到 500000 和\
  \ 500000 到 1000000\n将计算拆分为两个范围：0 到 250000 和 250000 到 500000\n将计算拆分为两个范围：0 到 125000\
  \ 和 125000 到 250000\n将计算拆分为两个范围：0 到 62500 和 62500 到 125000\n         值范围 0 到 62500\
  \ 的总和为 1953156250\n         值范围 62501 到 125000 的总和为 5859406250\n将计算拆分为两个范围：125001\
  \ 到 187500 和 187500 到 250000\n         值范围 125001 到 187500 的总和为 9765656250\n   \
  \      值范围 187501 到 250000 的总和为 13671906250\n将计算拆分为两个范围：250001 到 375000 和 375000\
  \ 到 500000\n将计算拆分为两个范围：250001 到 312500 和 312500 到 375000\n         值范围 250001 到\
  \ 312500 的总和为 17578156250\n         值范围 312501 到 375000 的总和为 21484406250\n将计算拆分为两个范围：375001\
  \ 到 437500 和 437500 到 500000\n         值范围 375001 到 437500 的总和为 25390656250\n  \
  \       值范围 437501 到 500000 的总和为 29296906250\n将计算拆分为两个范围：500001 到 750000 和 750000\
  \ 到 1000000\n将计算拆分为两个范围：500001 到 625000 和 625000 到 750000\n将计算拆分为两个范围：500001 到 562500\
  \ 和 562500 到 625000\n         值范围 500001 到 562500 的总和为 33203156250\n         值范围\
  \ 562501 到 625000 的总和为 37109406250\n将计算拆分为两个范围：625001 到 687500 和 687500 到 750000\n\
  \         值范围 625001 到 687500 的总和为 41015656250\n         值范围 687501 到 750000 的总和为\
  \ 44921906250\n将计算拆分为两个范围：750001 到 875000 和 875000 到 1000000\n将计算拆分为两个范围：750001\
  \ 到 812500 和 812500 到 875000\n         值范围 750001 到 812500 的总和为 48828156250\n  \
  \       值范围 812501 到 875000 的总和为 52734406250\n将计算拆分为两个范围：875001 到 937500 和 937500\
  \ 到 1000000\n         值范围 875001 到 937500 的总和为 56640656250\n         值范围 937501\
  \ 到 1000000 的总和为 60546906250\n范围 1..1000000 的总和；计算总和 = 500000500000，公式总和 = 500000500000\n\
  ```\n\n让我们分析一下这个程序是如何工作的。在这个程序中，你想要计算范围 1..1,000,000 内数值的总和。为简单起见，你决定使用十个线程来执行任务。类\
  \ `RecursiveSumOfN` 继承自 `RecursiveTask<Long>`。在 `RecursiveTask<Long>` 中，你使用 `<Long>`\
  \ 是因为每个子范围内数字的总和是一个 `Long` 值。此外，你选择 `RecursiveTask<Long>` 而不是普通的 `RecursiveAction`，是因为每个子任务都会返回一个值。如果子任务不返回值，你可以改用\
  \ `RecursiveAction`。\n\n在 `compute()` 方法中，你决定是直接计算该范围的总和，还是使用以下条件进一步细分任务：\n\n```\n\
  \ (to - from) <= N/NUM_THREADS)\n```\n\n你在此计算中使用这个“阈值”值。换句话说，如果值的范围在某个任务可以处理的阈值之内，那么你就执行计算；否则，你将任务递归地分成两部分。你使用一个简单的\
  \ `for` 循环来查找该范围内值的总和。在另一种情况下，你划分范围的方式类似于二分查找算法中划分范围的方式：对于范围 `from .. to`，你找到中点，并创建两个子范围\
  \ `from .. mid` 和 `mid + 1 .. to`。一旦你调用了 `fork()`，你就等待第一个任务完成总和的计算，并为计算的第二部分生成另一个任务。\n\
  \n在 `main()` 方法中，你创建一个 `ForkJoinPool`，其线程数由 `NUM_THREADS` 指定。你将任务提交给 fork/join 池，并获得\
  \ 1..1,000,000 的计算总和。现在，你还使用连续 N 个数的求和公式来计算总和。\n\n从程序的输出中，你可以观察到任务是如何被细分为子任务的。你还可以从输出中验证，计算出的总和与公式计算出的总和是相同的，这表明你对子范围求和的任务划分是正确的。\n\
  \n在这个程序中，你任意假设要使用的线程数为十个。这是为了简化此程序的逻辑。确定阈值的一个更好的方法是将数据大小除以可用处理器的数量。换句话说，\n\n```\n\
  阈值 = (数据长度大小) / (可用处理器数量);\n```\n\n如何以编程方式获取可用处理器的数量？为此，你可以使用 `Runtime.getRuntime().availableProcessors())`\
  \ 方法。\n\n在清单 14-17 中，你使用了 `RecursiveTask`；然而，如果任务不返回值，那么你应该使用 `RecursiveAction`。让我们使用\
  \ `RecursiveAction` 实现一个搜索程序。假设你有一个大数组（比如 10,000 个元素），并且你想要搜索一个关键字。你可以使用 Fork/Join\
  \ 框架将任务拆分为多个子任务并并行执行它们。清单 14-18 包含了实现该解决方案的程序。\n\n清单 14-18.  SearchUsingForkJoin.java\n\
  \n```\nimport java.util.concurrent.*;\n\n//此类说明了如何使用 fork/join 框架（使用 RecursiveAction）在\
  \ N 个数字中搜索关键字。\n//数字范围被分成两半，直到该范围可以由一个线程处理。\nclass SearchUsingForkJoin {\n     \
  \   private static int N = 10000;\n        private static final int NUM_THREADS\
  \ = 10; // 用于分配工作的线程数\n        private static int searchKey= 100;\n        private\
  \ static int[] arrayToSearch;\n\n// 这是该算法的递归实现；\n        // 继承自 RecursiveAction\n\
  \        static class SearchTask extends RecursiveAction {\n                private\
  \ static final long serialVersionUID = 1L;\n                int from, to;\n    \
  \            // from 和 to 是要搜索的值范围\n                public SearchTask(int from,\
  \ int to) {\n                         this.from = from;\n                      \
  \   this.to = to;\n                }\n\npublic void compute() {\n              \
  \          //如果范围足够小，可以由一个线程处理，\n                        //我们就在该范围内搜索\n        \
  \                if( (to - from) <= N/NUM_THREADS) {\n                         \
  \      // 在范围 'from' .. 'to' 内（包含 'to' 值）进行添加\n                               for(int\
  \ i = from; i <= to; i++) {\n                                       if(arrayToSearch[i]\
  \ == searchKey)\n                                               System.out.println(\"\
  搜索关键字在索引处找到:\" +i);\n                               }\n                        }\n\
  \                        else {\n                               // 不，该范围对于一个线程来说太大了，\n\
  \                               // 因此拆分计算\n                               // 我们找到范围\
  \ from..to 中的中点值\n                               int mid = (from + to)/2;\n    \
  \                           System.out.printf(\"将计算拆分为两个范围：\" +\n\"%d 到 %d 和 %d\
  \ 到 %d %n\", from, mid, mid, to);\n                               //调用所有子任务\n  \
  \                             invokeAll(new SearchTask(from, mid),new SearchTask(mid\
  \ + 1, to));\n                        }\n                }\n        }\n```\n\n\n\
  public static void main(String []args) {\n                //实例化待搜索的数组\n        \
  \        arrayToSearch = new int[N];\n                //用随机数填充数组\n             \
  \   for(int i=0; i<N; i++){\n                        arrayToSearch[i] = ThreadLocalRandom.current().nextInt(0,1000);\n\
  \                }\n                // 创建一个包含 NUM_THREADS 个线程的 fork-join 池\n   \
  \             ForkJoinPool pool = new ForkJoinPool(NUM_THREADS);\n             \
  \   // 将计算任务提交给 fork-join 池\n                pool.invoke(new SearchTask(0, N-1));\n\
  \        }\n}\n```\n\n程序会输出以下内容（每次运行结果可能不同）：\n\n```\nForking computation into two\
  \ ranges: 0 to 4999 and 4999 to 9999\nForking computation into two ranges: 0 to\
  \ 2499 and 2499 to 4999\nForking computation into two ranges: 5000 to 7499 and 7499\
  \ to 9999\nForking computation into two ranges: 2500 to 3749 and 3749 to 4999\n\
  Forking computation into two ranges: 0 to 1249 and 1249 to 2499\nForking computation\
  \ into two ranges: 2500 to 3124 and 3124 to 3749\nForking computation into two ranges:\
  \ 7500 to 8749 and 8749 to 9999\nForking computation into two ranges: 5000 to 6249\
  \ and 6249 to 7499\nForking computation into two ranges: 8750 to 9374 and 9374 to\
  \ 9999\nForking computation into two ranges: 5000 to 5624 and 5624 to 6249\nForking\
  \ computation into two ranges: 7500 to 8124 and 8124 to 8749\nForking computation\
  \ into two ranges: 3750 to 4374 and 4374 to 4999\nSearch key found at index:4736\n\
  Search key found at index:2591\nForking computation into two ranges: 1250 to 1874\
  \ and 1874 to 2499\nSearch key found at index:1315\nForking computation into two\
  \ ranges: 0 to 624 and 624 to 1249\nSearch key found at index:445\nSearch key found\
  \ at index:9402\nSearch key found at index:9146\nForking computation into two ranges:\
  \ 6250 to 6874 and 6874 to 7499\nSearch key found at index:6797\nSearch key found\
  \ at index:7049\nSearch key found at index:862\n```\n\n清单 14-14 与清单 14-15 的关键区别在于，后者使用了\
  \ `RecursiveAction` 而非 `RecursiveTask`。为了将任务类改为继承自 `RecursiveAction`，你需要做几处修改。第一处修改是\
  \ `compute()` 方法不再返回任何值。另一处修改是使用 `invokeAll()` 方法来提交子任务执行。还有一个明显的改动是，你在 `compute()`\
  \ 方法中执行的是搜索操作，而非之前案例中的求和操作。除了这些改动之外，清单 14-17 中的程序与清单 14-18 中的程序运行方式非常相似。\n\n**要点记忆**\n\
  \n请记住以下考试要点：\n\n*   使用基本的并发结构（如 `start()` 和 `join()`）也能实现 Fork/Join 框架所提供的功能。然而，Fork/Join\
  \ 框架抽象了许多底层细节，因此更易于使用。此外，使用 Fork/Join 框架比在底层直接处理线程要高效得多。而且，使用 `ForkJoinPool` 能高效地管理线程，其性能远优于传统的线程池。基于这些原因，建议你使用\
  \ Fork/Join 框架。\n*   Fork/Join 框架中的每个 `worker` 线程都有一个工作队列，该队列使用 `Deque` 实现。每当创建一个新任务（或子任务）时，它会被推送到其自身队列的头部。当一个任务完成一个任务，并需要与另一个尚未完成的任务执行\
  \ join 操作时，它会采取智能策略。该线程会从其队列头部弹出一个新任务并开始执行，而不是休眠（以等待另一个任务完成）。实际上，如果某个线程的队列为空，该线程会从另一个线程队列的尾部弹出一个任务。这本质上就是一种工作窃取算法。\n\
  *   对于两个子任务（如果你将任务拆分为两个子任务），分别调用 `fork()` 和两次 `join()` 看起来是理所当然的。这样做是正确的，但效率低下。为什么呢？原因在于，你创建了超出实际需要的并行任务。在这种情况下，原始线程会等待另外两个任务完成，考虑到任务创建的开销，这种做法效率很低。这就是为什么你只调用一次\
  \ `fork()`，而对第二个任务调用 `compute()` 的原因。\n*   `fork()` 和 `join()` 调用的位置非常重要。例如，假设你按以下顺序进行调用：\n\
  \n```\n    first.fork();\n    resultFirst = first.join();\n    resultSecond = second.compute();\n\
  \    ```\n\n这种用法会导致两个任务串行执行，因为第二个任务只有在第一个任务完成后才会开始执行。因此，其效率甚至低于串行版本，因为该版本还包含了任务创建的开销。结论是：请注意\
  \ `fork()`/`join()` 调用的位置。\n\n*   使用 Fork/Join 框架并不能保证总能获得性能提升。我们之前提到的一个原因就是 `fork()`/`join()`\
  \ 调用的位置问题。\n\n**提问时间！**\n\n1.  考虑以下程序：\n\n```\n    import java.util.concurrent.atomic.*;\n\
  \    class AtomicIntegerTest {\n         static AtomicInteger ai = new AtomicInteger(10);\n\
  \         public static void check() {\n                 assert (ai.intValue() %\
  \ 2) == 0;\n         }\n         public static void increment() {\n            \
  \     ai.incrementAndGet();\n         }\n         public static void decrement()\
  \ {\n                 ai.getAndDecrement();\n         }\n         public static\
  \ void compare() {\n                 ai.compareAndSet(10, 11);\n         }\n   \
  \      public static void main(String []args) {\n                 increment();\n\
  \                 decrement();\n                 compare();\n                 check();\n\
  \                 System.out.println(ai);\n         }\n     }\n    ```\n\n该程序通过以下命令调用：\n\
  \n```\n    java -ea AtomicIntegerTest\n    ```\n\n该程序的预期输出是什么？\n\n*   A.  输出 11。\n\
  \    *   B.  输出 10。\n    *   C.  输出 9。\n    *   D.  程序崩溃并抛出 `AssertionError`\n\n\
  **答案：**D. 程序崩溃并抛出 `AssertionError`\n\n（`AtomicInteger` 的初始值为 10。调用 `incrementAndGet()`\
  \ 后，其值增加 1。之后，调用 `getAndDecrement()` 后，其值减少 1。方法 `compareAndSet`(10, 11) 会检查当前值是否为\
  \ 10，如果是，则将原子整型变量设置为 11。由于 assert 语句检查原子整型值 `% 2` 是否为零（即检查是否为偶数），断言失败，程序因此抛出 `AssertionError`。）\n\
  \n\n\n2.  下列哪个选项正确使用了 `Callable` 且编译时不会出现任何错误？\n\n*   A.\n\n```\n        import\
  \ java.util.concurrent.Callable;\n            class CallableTask implements Callable\
  \ {\n                    public int call() {\n                            System.out.println(\"\
  In Callable.call()\");\n                            return 0;\n                \
  \    }\n            }\n        ```\n\n*   B.\n\n```\n        import java.util.concurrent.Callable;\n\
  \            class CallableTask extends Callable {\n                    public Integer\
  \ call() {\n                            System.out.println(\"In Callable.call()\"\
  );\n                            return 0;\n                    }\n            }\n\
  \        ```\n\n*   C.\n\n```\n        import java.util.concurrent.Callable;\n\n\
  class CallableTask implements Callable<Integer> {\n                    public Integer\
  \ call() {\n                            System.out.println(\"In Callable.call()\"\
  );\n                            return 0;\n                    }\n            }\n\
  \        ```\n\n*   D.\n\n```\n        import java.util.concurrent.Callable;\n\n\
  class CallableTask implements Callable<Integer> {\n                    public void\
  \ call(Integer i) {\n                            System.out.println(\"In Callable.call(i)\"\
  );\n                    }\n            }\n        ```\n\n*   **答案：** `C.`\n\n```\n\
  \        import java.util.concurrent.Callable;\n\nclass CallableTask implements\
  \ Callable<Integer> {\n                    public Integer call() {\n           \
  \                 System.out.println(\"In Callable.call()\");\n                \
  \            return 0;\n                    }\n            }\n        ```\n\n（`Callable`\
  \ 接口定义如下：\n\n```\n        public interface Callable<V> {\n            V call() throws\
  \ Exception;\n         }\n        ```\n\n在选项 A 中，`call()` 方法的返回类型是 `int`，这与重写 `call`\
  \ 方法所期望的返回类型不兼容，因此无法编译。\n\n在选项 B 中，使用了 `extends` 关键字，这会导致编译错误（因为 `Callable` 是一个接口，应该使用\
  \ `implements` 关键字）。\n\n选项 C 正确定义了 `Callable` 接口，并提供了类型参数 `<Integer>`。`call()` 方法（无参数）的返回类型也使用了相同的类型参数\
  \ `Integer`，因此编译时不会出错。\n\n在选项 D 中，`call()` 的返回类型是 `void`，并且 `call()` 方法还接受一个 `Integer`\
  \ 类型的参数。因此，接口中声明的 `Integer call()` 方法在 `CallableTask` 类中未被实现，程序将无法编译。）\n\n3.  下列哪个方法返回一个\
  \ `Future` 对象？\n\n*   A.  `ConcurrentMap` 接口中声明的重载 `replace()` 方法\n    *   B.  `ThreadFactory`\
  \ 接口中声明的 `newThread()` 方法\n    *   C.  `ExecutorService` 接口中声明的重载 `submit()` 方法\n\
  \    *   D.  `Callable` 接口中声明的 `call()` 方法\n\n**答案：** C. `ExecutorService` 接口中声明的重载\
  \ `submit()` 方法\n\n选项 A) `ConcurrentMap` 接口中声明的重载 `replace()` 方法用于从映射中移除一个元素，并返回操作的成功状态（布尔值）或被移除的值。\n\
  \n选项 B) `newThread()` 是 `ThreadFactory` 接口中声明的唯一方法，它返回一个 `Thread` 对象作为返回值。\n\n选项\
  \ C) `ExecutorService` 接口具有重载的 `submit()` 方法，该方法接受一个任务进行执行，并返回一个代表任务待处理结果的 `Future`。\n\
  \n选项 D) `Callable` 接口中声明的 `call()` 方法返回其执行任务的结果。\n\n4.  你正在编写一个生成 0 到 100 范围内随机数的应用程序。你希望在多线程以及\
  \ `ForkJoinTasks` 中使用这些随机数。为了减少争用（即高效的解决方案），你会选择以下哪个选项？\n\n*   A.  `int randomInt\
  \ = ThreadSafeRandom.current().nextInt(0, 100);`\n    *   B.  `int randomInt = ThreadLocalRandom.current().nextInt(0,\
  \ 101);`\n    *   C.  `int randomInt = new Random(seedInt).nextInt(101);`\n    *\
  \   D.  `int randomInt = new Random().nextInt() % 100;`\n\n答案：\n\nB. `int randomInt\
  \ = ThreadLocalRandom.current().nextInt(0, 101);`\n\n（`ThreadLocalRandom` 是一个特定于线程的随机数生成器。根据该类的\
  \ API 文档：“在并发程序中使用 `ThreadLocalRandom` 而不是共享的 `Random` 对象，通常会显著减少开销和争用。”\n\n`ThreadLocalRandom`\
  \ 类中的 `int nextInt(int least, int bound)` 方法返回一个伪随机数，该数在给定的最小值（包含）和边界值（不包含）之间均匀分布。因此，调用\
  \ `nextInt(0, 101)` 会返回 0 到 100 范围内的伪随机整数。）\n\n5.  在你的应用程序中，有一个生产者组件不断向一个固定大小的队列添加新项；消费者组件则从该队列中获取项。如果队列已满，生产者必须等待项被取出；如果队列为空，消费者必须等待项被添加。\n\
  \n以下哪个工具适合用于同步这个供生产者和消费者并发使用的公共队列？\n\n*   A.  `RecursiveAction`\n    *   B.  `ForkJoinPool`\n\
  \    *   C.  `Future`\n    *   D.  `Semaphore`\n    *   E.  `TimeUnit`\n\n**答案：**\
  \ D. `Semaphore`\n\n（这个问题是经典的生产者-消费者问题，可以通过使用信号量来解决。同步器类 `java.util.concurrent.Semaphore`\
  \ 的对象可用于保护公共队列，以便生产者和消费者可以同步它们对队列的访问。在给定的选项中，信号量是唯一的*同步器*；其他选项与提供对队列的同步访问无关。\n\n\
  选项 A) `RecursiveAction` 支持递归的 `ForkJoinTask`，选项 B) `ForkJoinPool` 有助于在 Fork/Join\
  \ 框架的上下文中运行 `ForkJoinTask`。选项 C) `Future` 表示异步计算的结果，该结果“将在计算完成后在未来某个时刻可用”。选项 E)\
  \ `TimeUnit` 是一个枚举，提供对不同时间单位（如毫秒、秒和天）的支持。）\n\n总结\n\n使用 java.util.concurrent 集合\n\
  \n*   信号量控制对共享资源的访问。信号量维护一个计数器来指定其控制的资源数量。\n*   `CountDownLatch` 允许一个或多个线程等待倒计时完成。\n\
  *   `Exchanger` 类用于在两个线程之间交换数据。当两个线程需要相互同步并持续交换数据时，此类非常有用。\n*   `CyclicBarrier`\
  \ 有助于提供一个同步点，线程可能需要在预定义的执行点等待，直到所有其他线程都到达该点。\n*   `Phaser` 是一个有用的特性，适用于少数独立线程需要分阶段工作以完成一个任务的情况。\n\
  \n应用原子变量和锁\n\n*   Java 以原子变量的形式提供了一种高效的替代方案，用于需要对变量执行基本操作而获取和释放锁的场景。\n*   锁确保一次只有一个线程访问共享资源。\n\
  *   `Condition` 支持线程通知机制。当某个条件不满足时，一个线程可以等待另一个线程满足该条件；一旦条件满足，另一个线程可以发出通知。\n\n使用执行器和线程池\n\
  \n\n\n*   `Executors` 层次结构抽象了多线程编程的底层细节，并提供了高级的、用户友好的并发构造。\n*   `Callable` 接口表示一个需要由线程完成的任务。任务完成后，`Callable`\
  \ 实现的 `call`() 方法会返回一个值。\n*   线程池是一个可以执行任务的线程集合。\n*   `Future` 表示包含线程将来返回的值的对象。\n\
  *   `ThreadFactory` 是一个用于创建线程的接口，而不是通过调用 `new Thread`() 来显式创建线程。\n\n使用并行 Fork/Join\
  \ 框架\n\n*   Fork/Join 框架是一种以良好并行性执行程序的可移植方式。\n*   该框架是 `ExecutorService` 接口的一个实现，并提供了一个易于使用的并发平台，以便利用多处理器。\n\
  *   该框架对于建模分治问题非常有用。\n*   Fork/Join 框架使用了工作窃取算法：当一个工作线程完成其工作并空闲时，它会从其他仍在忙碌执行某些工作的线程那里获取（或“窃取”）工作。\n\
  *   工作窃取技术以最小的同步成本实现了良好的负载均衡线程管理。\n*   `ForkJoinPool` 是 Fork/Join 框架中最重要的类。它是一个用于运行\
  \ fork/join 任务的线程池——它执行 `ForkJoinTask` 的实例。它执行任务并管理其生命周期。\n*   `ForkJoinTask` <v>是一个轻量级的、类似线程的实体，代表一个定义了诸如</v>\
  \ `fork`() 和 `join`() 等方法的任务。\n\n第 15 章\n\n![image](img/frontdot.jpg)\n\nOCPJP 7\
  \ 快速复习\n\n本章从 OCPJP 7 考试的角度，对需要记住的重要知识点进行了快速总结。还整理了一份考试技巧摘要列表，以帮助你备考。请在考试前一天阅读本章。祝你好运！\n\
  \n考试技巧\n\n*   OCPJP 7 考试中的大多数问题都是关于预测程序行为的。根据我们的考试经验，我们发现如果先阅读问题然后立即开始查看答案，答案在很多情况下会让我们感到困惑（导致我们选错答案！）。为了避免这种混淆，我们建议采用另一种方法：首先理解问题并得出答案，*然后*检查选项，看是否有匹配的答案。这对于与模式匹配（正则表达式、glob\
  \ 等）相关的问题尤其重要；如果你先看答案，它们常常会误导你选择错误的答案！\n*   OCPJP 7 考试中的问题会明确说明对于给定问题你应该选择的正确选项数量。如果你在一个需要选择多个答案的问题中只选择一个选项，反之亦然，考试软件*不会*警告你。因此，请注意这个陷阱，并确保你只为每个问题选择明确要求的准确数量的答案。\n\
  *   在参加 OCPJP 7 考试时，如果你不确定答案，可以标记该问题以便稍后重新查看。考试软件在屏幕右上角提供了一个复选框。\n*   考试中有很多问题篇幅较长或耗时较多。如果你阅读或回答某个特定问题花费了太长时间，请标记它以便稍后重新查看。\n\
  *   许多问题要求你预测程序的行为，并且大多数选项会提供可能的输出，其中有一个选项会提到程序将导致编译器错误（但不给出具体的编译器错误）。一个常见的错误是过于“乐观”，认为程序会无错误地编译！例如，你知道如果尝试实例化一个抽象类，你会得到一个编译器错误；然而，在一个向你展示\
  \ 20-25 行程序的问题中，如果你直接查看答案列表，很容易忽略实例化抽象类的尝试。为了避免这个陷阱，我们建议你在检查与程序输出相关的其他选项之前，首先在程序中寻找可能的编译器错误。\n\
  *   在查看答案之前，要注意程序可能抛出的潜在异常。例如，检查程序是否可能导致与线程状态转换相关的 `IllegalThreadStateException`。类似地，在不先检查类型的情况下执行向下转型的程序可能会导致\
  \ `ClassCastException`。是的，这很明显，但根据我们的考试经验，我们发现回答问题时很容易忽略这些常见的运行时异常。\n*   有许多 API\
  \ 会传递参数来指定范围。例如，`Path` 接口中的 `subpath(int beginIndex, int endIndex)` 方法将 `beginIndex`\
  \ 和 `endIndex` 作为参数。在这种情况下，请注意 `beginIndex` 是第一个名称元素的索引，*包含*自身，而 `endIndex` 是最后一个名称元素的索引，*不包含*自身。换句话说，在*大多数*指定范围的\
  \ Java API 方法中（例如 `Random` 中的 `nextInt()` 方法），第一个参数是包含的，第二个参数是不包含的。在回答答案取决于范围的问题时，如果你不知道参数是否包含，一个合理的猜测是将第一个参数视为包含的，第二个参数视为不包含的！\n\
  *   在涉及断言的问题中，问题会通过提及命令行中是否传递了 `–ea` 或 `–da` 选项来说明断言是启用还是禁用的（如果没有明确提及，请记住断言在程序中默认是*禁用*的）。回答关于程序行为的问题时，要牢记断言是启用还是禁用的。\n\
  \n*   对于涉及向 API 传递 null 的问题，不要总是假设 API 会抛出 `NullPointerException`。例如，`ArrayList`\
  \ 中的 `add()` 方法接受 null 参数，并且不会抛出 `NullPointerException`。一般来说，在审查 Java 库中方法的行为时，要特别关注边界情况以及方法可能抛出的异常。\n\
  *   在审查 API 时，要理解看起来相似的类或方法之间的差异（例如，`Comparable` 和 `Comparator` 接口之间的异同）。\n*   在预测与线程和并发相关的程序输出时，要特别注意线程调度和线程交错如何影响输出。\n\
  *   参加考试时，你可能会得到一个可擦写的草稿板。你可能会发现它在回答某些类型的问题时很方便。例如，我们建议你在草稿板上快速画出类之间的关系，以便为与类关系（例如\
  \ is-a 和 has-a 关系）相关的问题选择正确的选项。\n\n\n\n第 3 章：Java 类设计\n\n*   你无法在派生类中访问基类的 *private*\
  \ 方法。\n*   你可以从同一包中的类（如同包私有或默认访问权限）以及派生类（即使属于另一个包）访问 *protected* 方法。\n*   你可以拥有*重载的构造函数*。你可以使用\
  \ `this` 关键字在另一个构造函数中调用同一个类的构造函数。\n*   *继承*也被称为*“是一个”关系*。\n*   在*重写*中，方法名、参数数量、参数类型和返回类型必须完全匹配（然而，在*协变返回类型*中，你可以在重写方法中提供返回类型的派生类）。\n\
  *   你不能仅凭返回类型不同来重载方法。同样，你也不能仅凭异常规范不同来重载方法。\n*   要使重载解析成功，你需要定义方法，以便编译器找到一个精确匹配。如果编译器对你的调用找不到匹配项或找到多个匹配项，则重载解析失败，编译器会报错。\n\
  *   重载是*静态多态*（*早期绑定*）的一个例子，而重写是*动态多态*（*后期绑定*）的一个例子。\n*   执行*向上转型*时，你不需要进行显式转换。向上转型总是会成功。\n\
  *   执行*向下转型*时，你需要进行显式转换。向下转型可能会失败。你可以使用 `instanceof` 运算符来检查向下转型是否有效。\n*   静态导入仅导入指定包或类的静态成员。\n\
  \n第 4 章：高级类设计\n\n*   `abstract` 关键字可以应用于类或方法，但不能应用于字段。\n*   抽象类不能被实例化。但是，你可以创建抽象类类型的引用变量。\n\
  *   抽象类可以继承另一个抽象类，也可以实现一个接口。此外，抽象类可以从具体类派生（尽管这不是一个好习惯）！\n*   抽象类不必声明抽象方法，这意味着抽象类不一定需要有声明为抽象的方法。但是，如果一个类有抽象方法，它应该被声明为抽象类。\n\
  *   抽象类的具体子类需要提供它继承的所有抽象方法的实现；否则，你需要将该子类声明为抽象类。\n*   抽象类可以有声明为 static 的方法或字段。final\
  \ 类是一个不可继承的类（即，你不能从 final 类继承）。\n*   final 方法是一个不可重写的方法（即，子类不能重写 final 方法）。\n* \
  \  final 类的所有方法都隐式地是 final 的（即，不可重写）。\n*   final 变量必须被初始化。如果在声明时未初始化，则必须在所有构造函数中初始化它。此外，final\
  \ 变量只能被赋值一次。\n*   关键字 `final` 可用于参数。一旦赋值，`final` 参数的值就不能再更改。这里需要注意的是，对于基本类型，该值是隐式理解的。然而，对于对象，该值指的是对象引用，而不是其状态。因此，你可以更改传递的\
  \ final 对象的内部状态，但不能更改引用本身。\n*   所有静态成员都不需要其类的实例来调用/访问它们。你可以直接使用类名来调用/访问它们。\n*  \
  \ 静态成员只能调用/访问其自身类的静态成员。\n*   静态方法不能在其方法体中使用 `this` 或 `super` 关键字。\n*   Java 支持四种类型的嵌套类：静态嵌套类、内部类、局部内部类和匿名内部类。\n\
  *   静态嵌套类可以有静态成员，而其他类型的嵌套类则不能。\n*   静态嵌套类和内部类可以访问外部类的成员（甚至是私有成员）。但是，静态嵌套类只能访问外部类的静态成员。\n\
  *   局部类（包括局部内部类和匿名内部类）可以访问外部作用域中声明的所有变量（无论是方法、构造函数还是语句块）。\n*   你不能对 `enums` 使用 `new`，即使在\
  \ `enum` 定义内部也不行。\n*   `Enums` 被隐式声明为 public、static 和 final，这意味着你不能扩展它们。\n*   当你定义一个枚举时，它隐式地继承自\
  \ `java.lang.Enum`。在内部，枚举被转换为类。此外，枚举常量是枚举类的实例，这些枚举常量被声明为该类的成员。\n*   如果你在类中声明一个 `enum`，那么它默认是\
  \ static 的。\n*   你可以使用 `==` 运算符比较两个枚举是否相等。当调用枚举常量的 `toString()` 方法时，它会打印该枚举常量的名称。\n\
  \n第 5 章：面向对象设计原则\n\n*   接口可以扩展另一个接口。为此，请使用 `extends`（而不是 `implements`）关键字。\n*  \
  \ 接口中声明的所有方法都被隐式视为抽象的。\n*   接口不能包含实例变量。如果你在接口中声明一个数据成员，它必须被初始化，并且所有这些数据成员都被隐式视为\
  \ `public static final` 成员。\n*   接口不能声明静态方法。它只能声明实例方法。\n*   你不能在接口中将成员声明为 `protected`\
  \ 或 `private`。接口的成员只允许 `public` 访问权限。\n*   接口中声明的所有方法都被隐式视为抽象的。但是，你可以显式地为方法使用 `abstract`\
  \ 限定符。\n*   接口可以声明为空体（即，没有任何成员的接口；这些接口被称为*标记接口*或*标志接口*）。此类接口对于定义公共父类很有用，以便可以使用运行时多态。例如，`java.util`\
  \ 定义了没有方法体的 `EventListener` 接口。\n*   接口可以在另一个接口或类中声明。此类接口称为嵌套接口。\n*   与只能具有 public\
  \ 或 default 访问权限的顶级接口不同，嵌套接口可以声明为 public、protected 或 private。\n*   继承意味着“是一个”，接口意味着“像是一个”，而组合意味着“有一个”关系。\n\
  *   在可行的情况下，优先使用组合而非继承。\n*   `Singleton` 设计模式确保只创建该类的一个实例。\n*   确保预期的单例实现确实是单例是一项重要的任务，尤其是在多线程环境中。\n\
  *   工厂设计模式按需“制造”所需类型的产品。\n*   当你有一系列需要创建的对象时，你应该考虑使用抽象工厂设计模式。\n*   `DAO` 设计模式本质上将你的核心业务逻辑与持久化逻辑分离开来。\n\
  *   在 `DAO` 模式中，如果你有多个 `DAO` 对象和多种持久化机制，你也可以采用抽象工厂设计模式。\n\n第 6 章：泛型与集合\n\n\n\n*\
  \   泛型将确保任何尝试混合指定类型以外的元素类型的操作都会在编译时被捕获。因此，与使用 `Object` 类型相比，泛型提供了类型安全性。\n*   Java\
  \ 7 引入了“菱形”语法，其中类型参数（在 new 运算符和类名之后给出）可以省略。编译器会从类型声明中推断出类型。\n*   泛型不是协变的。也就是说，子类型化不适用于泛型。你不能将派生泛型类型参数赋值给基类型参数。\n\
  *   `<?>` 在泛型中指定了一个未知类型，被称为通配符。例如，`List<?>` 指的是一个未知类型值的列表。\n*   通配符可以是有界的。例如，`<?\
  \ extends Runnable>` 指定 `?` 可以匹配任何类型，只要它是 `Runnable` 或其任何派生类型。请注意，此上下文中的 `extends`\
  \ 和 `super` 都是包含性子句，因此你可以替换 `<? extends X>` 和 `<? super X>` 中的 `X`。\n*   在泛型中指定有界类型时，对类类型和接口都使用\
  \ `extends` 关键字。要指定多个基类型，请使用 `&` 符号。例如，在 `List<? extends X & Y>` 中，`?` 将匹配同时扩展了类型\
  \ `X` *和* `Y` 的类型。\n*   通常，当你使用通配符参数时，不能调用修改对象的方法。如果你尝试修改，编译器会给出错误消息。但是，你可以调用访问对象的方法。\n\
  *   术语 Collection、Collections 和 collection 是不同的。Collection——`java.util.Collection<E>`——是集合层次结构中的根接口。`Collections`——`java.util.Collections`——是一个只包含静态方法的工具类。通用术语\
  \ collection(s) 指的是像 map、stack、queue 等容器。\n*   即使类或接口不是泛型的，也可以在接口或类中定义或声明泛型方法。\n\
  *   没有使用其类型参数的泛型类被称为*原始类型*。当然，原始类型不是类型安全的。Java 支持原始类型，以便可以在 Java 5 之前的代码中使用泛型类型（请注意，泛型是在\
  \ Java 5 中引入的）。当你在代码中使用原始类型时，编译器会生成警告。你可以使用 `@SuppressWarnings({ \"unchecked\" })`\
  \ 来抑制与原始类型相关的警告。\n*   `List<?>` 是任何 `List` 类型的超类型，这意味着在期望 `List<?>` 的地方，你可以传递 `List<Integer>`、`List<String>`\
  \ 甚至 `List<Object>`。\n*   泛型的实现本质上是静态的，这意味着 Java 编译器会解释源代码中指定的泛型，并将泛型代码替换为具体类型。这被称为*类型擦除*。编译后，代码看起来类似于开发人员使用具体类型编写的代码。本质上，使用泛型提供了两个优点：首先，它引入了一种抽象，使你能够编写泛型实现；其次，它允许你编写具有类型安全性的泛型实现。\n\
  *   由于类型擦除，泛型类型有许多限制。以下几个是重要的：\n\n*   你不能使用 `new` 运算符实例化泛型类型。例如，假设 `mem` 是一个字段，以下语句将导致编译器错误：\n\
  \n```\n    T mem = new T();       // 错误用法 - 编译器错误\n    ```\n\n*   你不能实例化泛型类型的数组。例如，假设\
  \ `mem` 是一个字段，以下语句将导致编译器错误：\n\n```\n    T[] amem = new T[100]; // 错误用法 - 编译器错误\n\
  \    ```\n\n*   你可以声明类型 `T` 的非静态字段，但不能声明类型 `T` 的静态字段。例如，\n\n```\n    class X<T>\
  \ {\n      T instanceMem;  // 可以\n      static T statMem;        // 错误用法 - 编译器错误\n\
  \    }\n    ```\n\n*   不可能有泛型异常类。例如，以下代码将无法编译：\n\n```\n    class GenericException<T>\
  \ extends Throwable { } // 错误用法 - 编译器错误\n    ```\n\n*   你不能使用原始类型实例化泛型类型。例如，`List<int>`\
  \ 会引发编译器错误。但是，你可以使用装箱的原始类型。\n*   对于一个类，`hashCode()` 和 `equals()` 方法需要保持一致。出于实际目的，请确保遵循此规则：如果\
  \ `equals()` 方法对两个对象返回 true，则 `hashCode()` 方法应为它们返回相同的哈希值。\n*   如果你在像 `HashSet`\
  \ 或 `HashMap` 这样的容器中使用对象，请确保正确重写 `hashCode()` 和 `equals()` 方法。\n*   在容器中，不建议将 null\
  \ 作为参数存储，因为可能难以理解返回 null 的方法的行为。例如，`Deque` 接口中有一些方法返回 null，你很难区分该方法是成功返回了元素值 null，还是方法失败并返回了\
  \ null。\n*   图 15-1 展示了属于 `java.util` 包的重要接口。\n\n![9781430247647_Fig15-01.jpg](img/9781430247647_Fig15-01.jpg)\n\
  \n图 15-1.  重要的高级 java.util 接口及其继承关系\n\n*   当存在自然顺序时，为你的类实现 `Comparable` 接口。如果你想以自然顺序之外的方式比较对象，或者你的类类型没有自然顺序，那么创建实现\
  \ `Comparator` 接口的单独类。此外，如果你有多种备选方式来决定顺序，那么请使用 `Comparator` 接口。\n\n第 7 章：字符串处理\n\
  \n*   正则表达式定义了一种搜索模式，可用于执行字符串搜索和字符串操作等操作。表 15-1 总结了指定正则表达式的常用符号，表 15-2 列出了指定正则表达式的常用元符号，表\
  \ 15-3 展示了正则表达式中常用的量词。\n\n表 15-1. 指定正则表达式的常用符号\n\n| 符号 | 描述 |\n    | --- | --- |\n\
  \    | ^expr | 匹配行首的 `expr`。 |\n    | expr$ | 匹配行尾的 `expr`。 |\n    | . | 匹配任何单个字符（换行符除外）。\
  \ |\n    | [xyz] | 匹配 x、y 或 z。 |\n    | [p-z] | 指定一个范围。匹配从 p 到 z 的任何字符。 |\n    |\
  \ [p-z1-9] | 匹配从 p 到 z 的任何字符或从 1 到 9 的任何数字（记住，它不会匹配 p1）。 |\n    | [^p-z] | 方括号内的\
  \ '`^`' 作为第一个字符时否定该模式；它匹配除 p 到 z 之外的任何字符。 |\n    | Xy | 匹配 x 后跟 y。 |\n    | x &#124;\
  \ y | 匹配 x 或 y。 |\n\n表 15-2. 指定正则表达式的常用元符号\n\n| 符号 | 描述 |\n    | --- | --- |\n \
  \   | \\d | 匹配数字（相当于 [0–9]）。 |\n    | \\D | 匹配非数字。 |\n    | \\w | 匹配单词字符。 |\n  \
  \  | \\W | 匹配非单词字符。 |\n    | \\s | 匹配空白字符（相当于 [\\t\\r\\f\\n]）。 |\n    | \\S | 匹配非空白字符。\
  \ |\n    | \\b | 在方括号外时匹配单词边界。在方括号内时匹配反斜杠。 |\n    | \\B | 匹配非单词边界。 |\n    | \\A\
  \ | 匹配字符串开头。 |\n    | \\Z | 匹配字符串结尾。 |\n\n表 15-3. 常用量词符号\n\n\n\n| 符号 | 描述 |\n  \
  \  | --- | --- |\n    | expr? | 匹配 0 次或 1 次 expr（等同于 `expr{0,1}`）。 |\n    | expr*\
  \ | 匹配 0 次或多次 expr（等同于 `expr{0,}`）。 |\n    | expr+ | 匹配 1 次或多次 expr（等同于 `expr{1,}`）。\
  \ |\n    | expr{x} | 匹配 x 次 expr。 |\n    | expr{x, y} | 匹配 x 到 y 次 expr。 |\n   \
  \ | expr{x,} | 匹配 x 次或更多次 expr。 |\n\n*   `split()` 方法的参数是一个分隔符字符串，它是一个正则表达式。如果你传入的正则表达式语法无效，将会抛出\
  \ `PatternSyntaxException` 异常。\n*   当你在字符串上频繁执行搜索或替换操作时，请使用 `Pattern` 和 `Matcher`\
  \ 类；它们在 Java 中执行搜索/替换的效率比任何其他方式都更高、更快。\n*   你可以在正则表达式中形成组。这些组可用于对整个正则表达式的所需子集指定量词。这些组也可用于指定反向引用。\n\
  *   `printf()` 方法（以及 `String` 类中的 `format()` 方法）使用字符串格式化标志来格式化字符串。\n*   每个格式说明符都以\
  \ `%` 符号开头；后跟标志、宽度和精度信息；并以数据类型说明符结尾。在此字符串中，标志、宽度和精度信息是可选的，而 `%` 符号和数据类型说明符是必需的。表\
  \ 15-4 显示了常用的数据类型说明符符号。\n\n表 15-4. 常用数据类型说明符\n\n| 符号 | 描述 |\n    | --- | --- |\n\
  \    | %b | 布尔值 |\n    | %c | 字符 |\n    | %d | 十进制整数（有符号） |\n    | %e | 科学计数法格式的浮点数\
  \ |\n    | %f | 十进制格式的浮点数 |\n    | %g | 十进制或科学计数法格式的浮点数（取决于传入的参数值） |\n    | %h |\
  \ 传入参数的哈希码 |\n    | %n | 行分隔符（换行符） |\n    | %o | 格式化为八进制值的整数 |\n    | %s | 字符串 |\n\
  \    | %t | 日期/时间 |\n    | %x | 格式化为十六进制值的整数 |\n\n*   如果你未指定任何字符串格式化说明符，`printf()`\
  \ 方法将不会根据给定的参数打印任何内容！\n*   诸如 `'-'`、`'^'` 或 `'0'` 之类的标志仅在你使用格式说明符字符串指定宽度时才有意义。\n\
  *   你也可以在格式字符串中打印 `%` 字符；但是，你需要为其使用转义序列。在格式说明符字符串中，`%` 是一个转义字符，这意味着你需要使用 `%%` 来打印单个\
  \ `%`。\n*   如果你未提供格式字符串所期望的输入数据类型，你可能会收到 `IllegalFormatConversionException` 异常。\n\
  *   如果你想构建一个字符串并在以后使用它，而不是仅仅使用 `printf()` 方法打印它，你可以使用 `String` 类中的静态方法 `format()`。\n\
  \n第 8 章：Java I/O 基础\n\n*   你可以使用 `System.console()` 方法获取对控制台的引用；如果 JVM 未与任何控制台关联，此方法将失败并返回\
  \ null。\n*   `Console` 提供了许多支持格式化 I/O 的方法。你可以使用 `Console` 类中的 `printf()` 和 `format()`\
  \ 方法来打印格式化文本；重载的 `readLine()` 和 `readPassword()` 方法将格式字符串作为参数。\n*   你可以使用字符流进行基于文本的\
  \ I/O，使用字节流进行基于数据的 I/O。\n*   用于读取和写入的字符流分别称为*读取器*和*写入器*（由抽象类 `Reader` 和 `Writer`\
  \ 表示）。用于读取和写入的字节流分别称为*输入流*和*输出流*（由抽象类 `InputStream` 和 `OutputStream` 表示）。\n*   你可以组合流对象。你可以创建一个\
  \ `BufferedInputStream` 对象，该对象接收一个 `FileInputStream` 对象。这样，一个流的输出就链接到了过滤流。这是一种根据你的需求自定义流的重要、有用且优雅的方式。\n\
  *   对于处理具有基本数据类型和 `String` 的数据，你可以使用数据流。\n*   *序列化*是将内存中的对象转换为字节序列的过程。如果你希望使类的对象可序列化，则需要在类中实现\
  \ `Serializable` 接口。\n*   `Serializable` 接口是一个标记接口。这意味着 `Serializable` 接口内部没有声明任何方法。\n\
  *   如果你想自定义序列化过程，可以实现 `readObject()` 和 `writeObject()` 方法。请注意，这两个方法都是私有方法，这意味着你并非在重写或重载这些方法。JVM\
  \ 会检查这些方法的实现，并调用它们而不是通常的方法。这听起来很奇怪，但这就是 JVM 中实现序列化过程自定义的方式。\n*   序列化后的对象可以通过网络进行通信，并在另一台机器上反序列化。但是，该对象的类文件必须位于目标机器的路径中，否则只会恢复对象的状态，而不会恢复整个对象（即，你无法在恢复的对象上调用方法）。\n\
  *   你可以创建自己的序列化协议。为此，你需要实现 `Externalizable` 接口而不是 `Serializable` 接口。\n*   当你在可序列化的类中未指定\
  \ `serialVersionUID` 时，JVM 会为你计算它。但是，每个 JVM 实现都有不同的计算机制；因此，当你未显式指定 `serialVersionUID`\
  \ 时，无法保证你的可序列化类能在两个不同的 JVM 上正常工作。因此，强烈建议你在实现 `Serializable` 接口的类中提供 `serialVersionUID`。\n\
  \n第 9 章：Java 文件 I/O (NIO.2)\n\n\n\n*   `Path` 对象是一种编程抽象，用于表示文件/目录的路径。\n*   不要混淆\
  \ `File` 与 `Files`、`Path` 与 `Paths`、以及 `FileSystem` 与 `FileSystems`；它们是不同的。*File*\
  \ 是一个旧类（Java 4），用于表示文件/目录路径名，而 *Files* 是在 Java 7 中引入的，作为一个实用工具类，全面支持 I/O API。*Path*\
  \ 接口表示文件/目录路径，并定义了一组有用的方法。然而，*Paths* 类是一个实用工具类，仅提供两个方法（都用于获取 `the Path` 对象）。*FileSystems*\
  \ 为 `FileSystem` 类提供了一系列工厂方法，而 *FileSystem* 则提供了一组有用的方法来获取文件系统的信息。\n*   由 `Path`\
  \ 对象表示的文件或目录可能不存在。\n*   `Path` 提供了两个用于比较 `Path` 对象的方法：`equals()` 和 `compareTo()`。即使两个\
  \ `Path` 对象指向同一个文件/目录，也不能保证 `equals()` 方法会返回 true。你需要确保两个路径都是绝对路径且已规范化，路径的相等性比较才能成功。\n\
  *   你可以使用 `Files` 类的 `exists()` 方法来检查文件是否存在。\n*   你可以使用 `getAttributes()` 方法检索文件的属性。你可以使用\
  \ `Files` 类的 `readAttributes()` 方法来批量读取文件的属性。\n*   在复制时，指定路径中的所有目录（如果你正在复制一个目录，则除最后一个目录外）都必须存在，以避免出现\
  \ `NoSuchFileException`。\n*   如果你使用 `copy()` 方法复制一个目录，它不会复制源目录中包含的文件/子目录；你需要显式地将它们复制到目标文件夹。\n\
  *   并非只能在两个文件/目录之间执行复制操作。你可以从 `InputStream` 获取输入并写入文件；同样，你也可以从文件获取输入并复制到 `OutputStream`。你可以使用\
  \ `copy(InputStream, Path, CopyOptions...)` 和 `copy(Path, OutputStream, CopyOptions...)`\
  \ 方法。\n*   使用 `delete()` 方法删除文件；使用 `deleteIfExists()` 方法仅在文件存在时删除它。\n*   如果你不想实现\
  \ `the FileVisitor` 接口中的所有四个方法，你可以简单地从 `SimpleFileVisitor` 类扩展你的实现。\n*   当你想要查找满足特定模式的文件时，`PathMatcher`\
  \ 接口非常有用。你可以使用 `glob` 或 `regex` 来指定模式。表 15-5 总结了 Glob 语法支持的模式。\n\n表 15-5. Glob 语法支持的模式\n\
  \n| 模式 | 描述 |\n    | --- | --- |\n    | `*` | 匹配任意长度的任意字符串，甚至零长度。 |\n    | `**`\
  \ | 类似于“*”，但可以跨越目录边界。 |\n    | `?` | 匹配任意单个字符。 |\n    | `[xyz]` | 匹配 x、y 或 z 中的任意一个。\
  \ |\n    | `[0-5]` | 匹配 0 到 5 范围内的任意字符。 |\n    | `[a-z]` | 匹配任意小写字母。 |\n    | `{xyz,\
  \ abc}` | 匹配 xyz 或 abc 中的任意一个。 |\n\n*   Java 7 提供了一个目录监视服务，当您正在处理的文件被其他程序更改时，它可以通知您。您可以使用监视服务以及特定的事件类型来注册一个\
  \ `Path` 对象。每当指定目录中的任何文件发生更改时，就会向注册的程序发送一个事件。\n*   在遍历文件树时执行操作必须小心。例如，如果您正在执行递归删除，那么您应该先删除所有包含的文件，然后再删除包含这些文件的目录。\n\
  *   `Visitor` 设计模式用于实现对文件树的遍历。\n*   在监视服务的上下文中，一个状态与一个监视键相关联。监视键可能处于 `ready` 状态（准备接受事件）、`signed`\
  \ 状态（当一个或多个事件排队时）或 `invalid` 状态（当监视键无效时）。如果键处于 `signed` 状态，则需要调用 `reset()` 方法；否则键的状态不会变为\
  \ `ready` 状态，您将不会收到任何进一步的事件通知。\n*   如果您使用 Java 7 提供的监视服务监视一个目录，则只会监视该目录中包含的文件，而不会监视该目录子目录中包含的文件。如果您打算监视文件系统的整个子树，则需要递归地注册子树中的每个目录。\n\
  \n第 10 章：使用 JDBC 构建数据库应用程序\n\n*   Java 提供的 JDBC（Java 数据库连接）API 旨在以编程方式访问数据库管理系统（DBMS）。\n\
  *   JDBC 隐藏了所有 DBMS 的异构性，并提供了一组统一的 API 来与所有类型的数据库进行交互。异构交互的复杂性被委托给 JDBC 驱动程序管理器和\
  \ JDBC 驱动程序；因此，所有细节和复杂性都被 JDBC API 对应用程序开发者隐藏了。\n*   有四种类型的驱动程序：\n\n*   **类型 1（JDBC-ODBC\
  \ 桥接驱动程序）：** JDBC 驱动程序使用 Java 本地接口（JNI）调用 ODBC（开放数据库连接）本地调用。\n*   **类型 2（本地 API\
  \ 驱动程序）：** 这些驱动程序使用特定数据库的客户端库，并将 JDBC 调用转换为本地数据库调用。\n*   **类型 3（网络协议驱动程序）：** 这些驱动程序调用数据库中间件，中间件再将\
  \ JDBC 调用转换为特定于数据库的本地调用。\n*   **类型 4（本地协议驱动程序）：** 驱动程序直接通过网络进行特定于数据库的调用，无需任何额外的客户端库支持。\n\
  \n*   `java.sql.Connection` 接口提供了应用程序和数据库通信的通道。`DriverManager` 类中的 `getConnection()`\
  \ 方法接受三个参数：URL 字符串、用户名字符串和密码字符串。\n*   URL（需要指定以获取 `Connection` 对象）的语法是 `<protocol>:<subprotocol>://<server>:<port>/`。URL\
  \ 字符串的一个示例是 `jdbc:mysql://localhost:3306/`。<protocol>jdbc 对所有 DBMS 都是相同的；<subprotocol>对于每个\
  \ DBMS 会有所不同，<server>取决于您托管数据库的位置，并且每个 DBMS 使用特定的 <port> 端口号。</port></server></subprotocol></protocol>\n\
  *   如果 JDBC API 无法定位 JDBC 驱动程序，它将抛出 `SQLException`。如果有可用的驱动程序 jar 包，则需要将它们包含在类路径中，以使\
  \ JDBC API 能够定位驱动程序。\n*   在 JDBC 4.0 之前，您必须使用 `Class.forName()` 语句显式加载 JDBC 驱动程序；在\
  \ JDBC 4.0 及更高版本中，不需要此语句，JDBC API 将从 URL 字符串中给出的详细信息加载驱动程序。\n*   JDBC 支持两个用于查询和更新的类：`Statement`\
  \ 和 `Resultset`。\n*   `Statement` 是一个 SQL 语句，可用于将 SQL 语句发送到连接的数据库并从数据库接收结果。有三种类型的\
  \ Statements：\n\n*   `Statement`：当您需要向数据库发送不带任何参数的 SQL 语句时，使用 `Statement`。\n*  \
  \ `PreparedStatement`：表示一个预编译的 SQL 语句，可以使用 IN 参数进行自定义。\n*   `CallableStatement`：用于执行存储过程；可以处理\
  \ IN 以及 OUT 和 INOUT 参数。\n\n\n\n*   根据 SQL 语句的类型选择合适的执行方法。请记住，每种执行方法返回的输出不同。`executeQuery()`\
  \ 方法返回一个结果集；`executeUpdate()` 返回更新计数；而 `execute()` 方法可能返回多个结果集、多个更新计数，或两者的组合。\n\
  *   如果 a) `Statement` 对象被关闭，b) 被重新执行，或 c) 被用于检索下一组结果，则 `Statement` 对象会关闭当前的 `ResultSet`\
  \ 对象。这意味着不必显式调用 `ResultSet` 对象的 `close()` 方法；不过，在完成对象使用后调用 `close()` 仍是一种良好的实践。\n\
  *   发出正确的 SQL 命令是您的责任；JDBC `Statement` 不会检查其正确性。例如，如果 SQL 命令字符串中存在语法错误，您不会收到编译错误，而是在运行时收到\
  \ `SQLSyntaxErrorException` 异常。\n*   `ResultSet` 对象维护一个指向当前行的游标。初始时，游标位于第一行之前；调用\
  \ `next()` 方法会将游标位置向前移动一行。\n*   您可以在 `ResultSet` 方法中使用列名或列索引。您使用的索引是 `ResultSet`\
  \ 对象的索引，而不是数据库表中的列号。\n*   `ResultSet` 对象中的列索引从 1 开始（*而非*从 0 开始）。\n*   您可以使用 `ResultSet`\
  \ 对象的列名，而无需担心大小写：`getXXX()` 方法接受不区分大小写的列名来检索关联值。\n*   考虑一种情况：`ResultSet` 对象中有两列同名。如何使用列名检索关联值？如果使用列名检索值，它将始终指向第一个匹配给定名称的列。因此，在这种情况下，您必须使用列索引来检索与这两列关联的值。\n\
  *   在修改 `ResultSet` 中的行内容后，需要调用 `updateRow()`；否则，对 `ResultSet` 对象所做的更改将丢失。\n*  \
  \ 您可以使用 `cancelRowUpdates()` 方法取消所做的任何更新。但是，必须在调用 `updateRow()` 方法之前调用此方法。在其他所有情况下，它对行没有影响。\n\
  *   通过调用 `Connection` 接口中的 `getMetaData()` 方法，您可以检查底层数据库的能力。\n*   事务是一组 SQL 操作，这些操作要么全部成功执行，要么全部不执行。\n\
  *   默认情况下，自动提交模式设置为 true，因此您通过连接所做的所有更改都会自动提交到数据库。您可以使用 `setAutoCommit(false)` 来启用手动提交。在未启用自动提交的情况下，您需要显式提交或回滚事务。\n\
  *   如果在手动提交模式下未执行 `commit()` 方法，则数据库中将不会发生任何更改。\n*   您可以将一个大事务划分为多个里程碑。这些里程碑被称为\
  \ `Savepoints`。这样，一旦达到某个里程碑，您就可以将数据库的更改保存到该里程碑。\n*   `RowSet` 是一种特殊的 `ResultSet`，它支持\
  \ JavaBean 组件模型。图 15-2 总结了 `RowSet` 的层次结构及相关关键功能。\n\n![9781430247647_Fig15-02.jpg](img/9781430247647_Fig15-02.jpg)\n\
  \n图 15-2.  RowSet 层次结构\n\n*   `JdbcRowSet` 是一个保持连接的 `RowSet`，而 `RowSet` 的其他子接口（即\
  \ `JoinRowSet`、`CachedRowSet`、`WebRowSet` 和 `FilteredRowSet`）是断开的 `RowSet`。\n* \
  \  `RowSetProvider` 提供了获取 `RowSetFactory` 实现的 API，该实现可用于实例化相关的 `RowSet` 实现。\n* \
  \  JDBC 4.1 引入了使用 try-with-resources 语句自动关闭资源（`Connection`、`ResultSet` 和 `Statement`）的功能。\n\
  \n第 11 章：异常与断言\n\n\n\n*   在提供多个异常处理器（“堆叠”的 catch 处理器）时，应将具体的异常处理器放在通用的异常处理器之前。在派生类处理器之前提供基类处理器会导致编译器错误。\n\
  *   一个 `try` 块可以有多个 catch 处理器。如果两个或多个异常的原因相似，且处理代码也相似，可以考虑合并这些处理器，形成一个 multi-catch\
  \ 块。\n*   `finally` 块中的代码无论 `try` 块是成功执行还是抛出异常，都会被执行。这使得 `finally` 块成为释放资源（如文件句柄、数据库句柄、网络流等）最合适的地方。\n\
  *   在 multi-catch 块中，不能合并具有基类和派生类关系的两个异常的 catch 处理器。你只能合并那些彼此之间没有父子继承关系的异常的 catch\
  \ 处理器。\n*   忘记通过显式调用 `close()` 方法来释放资源是一个常见错误。你可以使用 try-with-resources 语句来简化代码并自动关闭资源。要使资源能在\
  \ try-with-resources 语句中使用，该资源的类必须实现 `java.lang.AutoCloseable` 接口并定义 `close()` 方法。\n\
  *   你可以在一个 try-with-resources 语句中自动关闭多个资源。这些资源需要在 try-with-resources 语句头中用分号分隔。\n\
  *   由于可以在 try-with-resources 语句中使用多个资源，`try` 块和 `finally` 块都可能抛出多个异常的可能性很高。如果 `try`\
  \ 块抛出一个异常，并且 `finally` 块也抛出了异常，那么 `finally` 块中抛出的异常将被添加为*被抑制的异常*，附加到从 `try` 块抛出给调用者的异常上。\n\
  *   你不能在 try-with-resources 语句体内为 try-with-resources 中声明的资源变量赋值。这是为了确保在 try-with-resources\
  \ 头中获取的相同资源能在 `finally` 块中被释放。\n*   在 try-with-resources 语句内显式关闭资源是一个常见错误。请记住，try-with-resources\
  \ 会扩展为在 `finally` 块中调用 `close()` 方法，因此如果你在 `finally` 块中显式调用了 `close()` 方法，扩展后的 `finally`\
  \ 块实际上会双重调用 `close()` 方法。\n*   `Throwable` 类是异常层次结构的根类。只有 `Throwable` 及其派生类可以与 Java\
  \ 异常处理关键字（如 `try`、`catch` 和 `throws`）一起使用。\n*   `Exception` 类（除了其 `RuntimeException`\
  \ 子层次结构）及其派生类被称为*受检异常*。这些异常代表了程序执行时“可以合理预期”会发生的异常情况，因此必须进行处理。包含可能抛出受检异常的代码段的方法，要么必须提供一个\
  \ catch 处理器来处理它，要么在其 throws 子句中声明该异常。\n*   `RuntimeException` 和 `Error` 类及其派生类被称为*非受检异常*。它们可以在程序中的任何地方抛出（无需声明该代码段可能抛出这些异常）。\n\
  *   `RuntimeException` 类及其派生类代表编程错误（逻辑错误），通常*不*期望在程序中被捕获和处理。然而，在某些情况下，在 catch 块中处理这些异常是有意义的。\n\
  *   `Error` 类及其派生类代表因 JVM 错误而引发的异常——要么是 JVM 检测到严重的异常状况，要么是资源耗尽。\n\n当发生 `Error` 时，*典型*的最佳做法是终止程序。\n\
  *   catch 块应该要么处理异常，要么重新抛出它。通过捕获异常但不做任何处理来*隐藏*或*吞没*异常是一种非常糟糕的做法。\n*   方法的 throws\
  \ 子句用于列出方法体可能抛出的*受检异常*。\n*   静态初始化块不能抛出任何受检异常。非静态初始化块可以抛出受检异常；但是，所有构造函数都应该在其 throws\
  \ 子句中声明该异常。\n*   方法的 throws 子句是其派生类中重写方法应遵守的契约的一部分。重写方法可以提供与基方法 throws 子句相同的 throws\
  \ 子句，或者比基方法 throws 子句更具体的 throws 子句。与基方法的 throws 子句相比，重写方法不能提供更通用的 throws 子句，也不能声明抛出额外的受检异常。\n\
  *   如果方法没有 throws 子句，这并*不*意味着它不能抛出任何异常——只是意味着它不能抛出任何*受检*异常。\n*   使用 throws 子句列出方法可能抛出的非受检异常是一种糟糕的做法。为什么？因为编译器无法强制调用者处理非受检异常，所以将它们列在\
  \ throws 子句中是没有意义的。相反，如果方法可能抛出非受检异常，最好使用 `@throws` 子句来记录这种可能性。\n*   非静态初始化块可以抛出受检异常；但是，所有构造函数都应该在其\
  \ throws 子句中声明这些异常。为什么？编译器在代码生成阶段会合并非静态初始化块和构造函数的代码，因此构造函数的 throws 子句可用于声明非静态初始化块可能抛出的受检异常。\n\
  *   重写方法不能在 throws 子句中声明比基方法 throws 子句中声明的异常列表更多的异常。为什么？基方法的调用者只能看到该方法 throws 子句中给出的异常列表，并会在其代码中声明或处理这些受检异常（而不会处理更多）。\n\
  *   重写方法可以声明比基方法 throws 子句中列出的异常更具体的异常；换句话说，你可以在重写方法的 throws 子句中声明派生异常。\n*   如果一个方法在两个或多个接口中声明，并且该方法在\
  \ throws 子句中声明抛出不同的异常，那么实现类应该在其 throws 子句中列出所有这些异常。\n*   你可以在程序中定义自己的异常类（称为自定义异常）。\n\
  *   建议你从 `Exception` 或 `RuntimeException` 类派生自定义异常。不建议通过扩展 `Throwable` 类（过于通用）或\
  \ `Error` 类（此类型的异常保留给 JVM 和 Java API 抛出）来创建自定义异常。\n*   你可以包装一个异常并将其作为另一个异常抛出。这两个异常成为链式异常。从抛出的异常中，你可以获取该异常的原因。\n\
  *   断言是程序中的条件检查，旨在用于显式检查你在编写程序时所做的假设。\n*   `assert` 语句有两种形式：一种接受布尔参数，另一种接受一个额外的字符串参数。\n\
  *   如果 `assert` 参数中给出的布尔条件失败（即计算结果为 false），程序将在抛出 `AssertionError` 后终止。不建议在程序抛出\
  \ `AssertionError` 时捕获并恢复。\n*   默认情况下，断言在运行时是禁用的。\n\n\n\n你可以在调用 JVM 时使用命令行参数 `–ea`（用于启用断言）和\
  \ `–da`（用于禁用断言）及其变体。\n\n第 12 章：本地化\n\n*   *区域设置*代表一种语言、文化或国家；Java 中的 `Locale` 类为此概念提供了抽象。\n\
  *   每个区域设置可以包含三个条目：语言、国家和变体。你可以使用语言和国家的标准代码来形成区域设置标签。变体没有标准标签；你可以根据需要提供变体字符串。\n\
  *   有多种方法可以创建或获取与区域设置对应的 `Locale` 对象：\n\n*   使用 `Locale` 类的构造函数。\n*   使用 `Locale`\
  \ 类中的 `forLanguageTag`(String languageTag) 方法。\n*   通过实例化 `Locale.Builder`，然后调用该对象的\
  \ `setLanguageTag`() 方法来构建 `Locale` 对象。\n*   使用 `Locale` 类中预定义的静态 final 常量来表示区域设置。\n\
  \n*   资源包是一组类或属性文件，有助于定义一组键，并将这些键映射到特定于区域设置的值。\n*   `ResourceBundle` 类有两个派生类：`PropertyResourceBundle`\
  \ 和 `ListResourceBundle`。你可以使用 `ResourceBundle.getBundle()` 为给定的区域设置自动加载包。\n*  \
  \ `PropertyResourceBundle` 类以属性文件的形式提供对多个区域设置的支持。对于每个区域设置，你可以在该区域设置的属性文件中指定键和值。你只能使用字符串作为键和值。\n\
  *   完全限定的资源包名称的命名约定是 `packagequalifier.bundlename + \"_\" + language + \"_\" + country\
  \ + \"_\" + (variant + \"_#\" | \"#\") + script + \"-\" + extensions`。\n*   此处介绍了查找匹配资源包的搜索顺序。搜索从步骤\
  \ 1 开始。如果在任何步骤中找到匹配项，则加载该资源包。否则，搜索将继续进行到下一步。\n\n*   **步骤 1：** 搜索首先尝试查找与完整名称完全匹配的资源包。\n\
  *   **步骤 2：** 删除最后一个组件（由 _ 分隔的部分），并使用生成的较短名称重复搜索。*此过程重复进行，直到只剩下最后一个区域设置修饰符*。\n*\
  \   **步骤 3：** 使用默认区域设置的包的完整名称重新开始搜索。\n*   **步骤 4：** 仅使用包的名称搜索资源包。\n*   **步骤 5：**\
  \ 搜索失败，抛出 `MissingBundleException`。\n\n*   对于实现为从 `ListResourceBundles` 派生的类的资源包，Java\
  \ 使用反射机制来查找和加载该类。你需要确保该类是公共的，以便反射机制能够找到它。\n*   要以文化敏感的方式处理日期和时间、数字以及货币，你可以使用 `java.text.Format`\
  \ 类及其两个主要的派生类 `NumberFormat` 和 `DateFormat`。图 15-3 展示了 `Format` 及其重要的派生类。\n\n![9781430247647_Fig15-03.jpg](img/9781430247647_Fig15-03.jpg)\n\
  \n图 15-3.  Format 类及其重要的派生类\n\n*   `NumberFormat` 类提供了格式化或解析数字的方法。“格式化”是指将数值转换为适合向用户显示的文本形式；“解析”是指将数字转换回程序使用的数值形式。`parse()`\
  \ 方法如果成功则返回一个 `Number`；否则抛出 `ParseException`（一个受检异常）。\n*   `NumberFormat` 有许多工厂方法：`getInstance()`、`getCurrencyInstance()`、`getIntegerInstance()`\
  \ 和 `getPercentInstance()`。\n*   `Currency` 类以区域设置敏感的方式处理货币值提供了良好的支持。\n*   `DateFormat`\
  \ 类以区域设置敏感的方式处理日期和时间提供了支持。\n*   `DateFormat` 有三个重载的工厂方法——`getDateInstance()`、`getTimeInstance()`\
  \ 和 `getDateTimeInstance()`——它们分别返回用于处理日期、时间以及日期和时间的 `DateFormat` 实例。\n*   `SimpleDateFormat`（派生自\
  \ `DateFormat`）使用*模式字符串*的概念来支持日期和时间的自定义格式。以下是创建日期模式的重要字母及其含义列表：\n\n*   `G`        \
  \ 纪元（公元前/公元）\n*   `y`         年\n*   `Y`         周年份\n*   `M`         月（一年中的月份）\n\
  *   `w`         周（一年中的周数）\n*   `W`         周（一月中的周数）\n*   `D`         日（一年中的天数）\n\
  *   `d`         日（一月中的天数）\n*   `F`         月中的星期几\n*   `E`         星期中的天数名称\n* \
  \  `u`         星期中的天数编号（值范围 1–7）\n\n*   类似地，以下是用于定义自定义时间模式的重要字母：\n\n```\n    a \
  \        上午/下午标记\n    H         小时（值范围 0–23）\n    k         小时（值范围 1–24）\n    K\
  \         上午/下午的小时（值范围 0–11）\n    h         上午/下午的小时（值范围 1–12）\n    m         分钟\n\
  \    s         秒\n    S         毫秒\n    z         时区（通用时区格式）\n    ```\n\n第 13 章：线程\n\
  \n\n\n*   你可以通过实现 `Runnable` 接口或继承 `Thread` 类来创建能够进行多线程处理的类。\n*   始终实现 `run()` 方法。`Thread`\
  \ 类中的默认 `run()` 方法不执行任何操作。\n*   在代码中调用 `start()` 方法，而不是直接调用 `run()` 方法。（将调用 `run()`\
  \ 方法的任务留给 JVM。）\n*   每个线程都有与之关联的线程名称、优先级和线程组；`Thread` 类中默认的 `toString()` 方法实现会打印这些信息。\n\
  *   如果你调用线程的 `sleep()` 方法，该线程不会释放锁，并且会继续持有该锁。\n*   你可以使用 `join()` 方法来等待另一个线程终止。\n\
  *   通常，如果你没有在线程中使用“中断”功能，可以安全地忽略 `InterruptedException`；然而，如果发生该异常，最好还是记录或打印堆栈跟踪信息。\n\
  *   线程是非确定性的：在许多情况下，你无法通过重新运行程序来重现死锁或数据竞争等问题。\n*   线程有三种基本状态：*新建*、*可运行*和*终止*。当线程刚被创建时，它处于*新建*状态；当它准备好运行或正在运行时，它处于*可运行*状态。当线程死亡时，它处于*终止*状态。\n\
  *   可运行状态在内部（在操作系统层面）包含两种状态：*就绪*和*运行*状态。\n*   当线程等待获取锁时，它将处于*阻塞*状态。当为诸如 `wait` 之类的调用指定了超时时间时，线程将处于*定时等待*状态。例如，当调用\
  \ `wait()`（不带超时值）时，线程将处于*等待*状态。\n*   如果你的操作导致无效的线程状态转换，你将收到一个 `IllegalThreadStateException`\
  \ 异常。\n*   对多个线程共享的公共资源同时进行读写可能会导致“数据竞争”（也称为“竞态条件”和“竞争风险”）问题。\n*   你必须使用线程同步（即锁）来访问共享值并避免数据竞争。Java\
  \ 提供了线程同步特性来提供对共享资源的受保护访问——即同步块和同步方法。\n*   使用锁可能会引入死锁等问题。当发生死锁时，进程将挂起并且永远不会终止。\n\
  *   当两个（或多个）线程以相反的顺序获取锁时，通常会发生死锁。当一个线程已获取一个锁并等待另一个锁时，另一个线程已获取了那个另一个锁并等待第一个锁被释放。因此，无法取得任何进展，程序陷入死锁。\n\
  *   为了避免死锁，最好避免获取多个锁。当你必须获取多个这样的锁时，请确保在程序的所有地方都以相同的顺序获取它们。\n*   当一个线程必须等待另一个线程满足特定条件或事件时，你可以使用等待/通知机制作为线程间的通信机制。\n\
  *   当一个线程需要等待特定条件/事件时，你可以调用带有或不带有指定超时值的 `wait()` 方法。\n*   为了避免通知丢失，最好始终使用 `notifyAll()`\
  \ 而不是 `notify()`。\n\n第 14 章：并发\n\n*   `semaphore`（信号量）控制对共享资源的访问。信号量维护一个计数器来指定其控制的资源数量。\n\
  *   `CountDownLatch`（倒计时门闩）允许一个或多个线程等待倒计时完成。\n*   `Exchanger`（交换器）类用于在两个线程之间交换数据。当两个线程需要彼此同步并持续交换数据时，此类非常有用。\n\
  *   `CyclicBarrier`（循环屏障）有助于提供一个同步点，线程可能需要在预定义的执行点等待，直到所有其他线程都到达该点。\n*   当一些独立的线程必须分阶段工作以完成一项任务时，`Phaser`（相位器）是一个有用的特性。\n\
  *   为了对原始类型变量执行操作而获取和释放锁，Java 提供了原子变量这种高效的替代方案。\n*   `AtomicInteger` 和 `AtomicLong`\
  \ 类继承自 `Number` 类。`java.util.concurrent.atomic` 子包中的所有其他类都直接继承自 `Object` 类，而不继承\
  \ `Number` 类。\n*   `Conditions`（条件）支持线程通知机制。当某个条件不满足时，一个线程可以等待另一个线程满足该条件；一旦条件满足，另一个线程可以发出通知。\n\
  *   `Executors`（执行器）层次结构抽象了多线程编程的底层细节，并提供了高级的、用户友好的并发构造。\n*   `Callable`（可调用）接口表示一个需要由线程完成的任务。任务完成后，`Callable`\
  \ 实现的 `call()` 方法会返回一个值。\n*   `Future`（未来）表示包含线程将来返回的值的对象。\n*   `ThreadFactory`（线程工厂）是一个用于创建线程的接口，而不是通过调用\
  \ `new Thread()` 显式创建线程。\n*   Fork/Join 框架允许针对某些类型的任务利用并行性（以多核的形式提供）。可以建模为分治问题的任务适合与\
  \ Fork/Join 框架一起使用。\n*   Fork/Join 框架是 `ExecutorService` 接口的一个实现。\n*   Fork/Join\
  \ 框架使用工作窃取算法——换句话说，当一个 `worker`（工作）线程完成其工作并空闲时，它会从其他仍在忙碌的线程那里获取（或“窃取”）工作。\n*   工作窃取技术能够以最小的同步成本实现良好的负载均衡线程管理。\n\
  *   在 Fork/Join 中，对两个子任务（如果你将任务拆分为两个子任务）都调用 `fork()` 并调用两次 `join()` 看起来是可以接受的。这是正确的——但效率低下。为什么？在这种情况下，原始线程将等待其他两个任务完成，考虑到任务创建成本，这是低效的。这就是为什么你调用一次\
  \ `fork()` 并为第二个任务调用 `compute()` 的原因。\n*   `ForkJoinPool` 是 Fork/Join 框架中最重要的类。它是一个用于运行\
  \ fork/join 任务的线程池——换句话说，它执行 `ForkJoinTask` 的实例。它执行任务并管理它们的生命周期。\n*   `ForkJoinTask<V>`\
  \ 是一个轻量级的类线程实体，代表一个定义了诸如 `fork()` 和 `join()` 等方法的任务。\n\n附录 A\n\n![image](img/frontdot.jpg)\n\
