  \ 300 美元，英国 202 英镑，印度 8,500 卢比等。\n\n**注 2**：考试主题行仅列出了顶层主题。请注意，1Z0-804 和 1Z0-805\
  \ 考试共享某些高级主题名称——例如“Java 文件 I/O (NIO.2)”、“并发”和“本地化”——但两个考试的子主题并不完全相同。1Z0-804 和 1Z0-805\
  \ 考试的子主题列在附录 A 中。\n\n常见问题 3. 通过 1Z0-804 考试获得 OCPJP 7 认证，OCAJP 7 认证是先决条件。这是否意味着我必须先参加\
  \ OCAJP 7 考试，然后才能参加 OCPJP 7 考试？\n\n不，认证要求可以按任何顺序满足。你可以先参加 OCPJP 7 考试，再参加 OCAJP 7\
  \ 考试，但只有在你通过了 1Z0-803 和 1Z0-804 两门考试后，才能获得 OCPJP 7 认证——除非你有资格参加并通过 1Z0-805 考试，该考试不要求\
  \ OCAJP 7 认证作为先决条件。\n\n常见问题 4. OCPJP 7 是其他 Oracle 认证考试的先决条件吗？\n\n是的，OCPJP 7 是许多其他考试的先决条件，例如：\n\
  \n*   Java 企业版 5 Web 组件开发人员认证专家考试（1Z0-858）\n*   Oracle 认证大师，Java SE 6 开发人员考试（1Z0-855\
  \ 和 1Z0-856）\n\n常见问题 5. 我应该参加 OCPJP 7 还是 OCPJP 6 考试？\n\n虽然你仍然可以参加旧版认证考试，例如 OCPJP\
  \ 6，但 OCPJP 7 是值得拥有的最佳专业证书。\n\n常见问题 6. Oracle OCPJP 7 考试与 OCPJP 6 和 OCPJP 5 考试（以及之前的\
  \ Sun 版本 SCJP 6 和 SCJP 5）有何不同？\n\n\n\n*简短回答*：OCPJP 7 考试难度更大，涵盖的主题也更多。\n\n*详细回答*：以下是\
  \ OCPJP 7 考试（1Z0-804）与 OCPJP 6 和 OCPJP 5 考试（分别为 1Z0-851 和 1Z0-853）以及 SCJP 5 和 SCJP\
  \ 6 考试（前者是 Sun Microsystems 版本的 OCPJP 6 和 OCPJP 5 考试，可获得 Sun 认证 Java 程序员 6 和 5 认证）之间差异的简要列表：\n\
  \n*   与之前的 SCJP 6/SCJP 5 考试一样，OCPJP 6 和 5 考试涵盖语言基础知识以及一些涉及字符串、数组等的常见 API。在 Java\
  \ SE 7 级别，这些主题中的大部分已移至 OCAJP 7 考试，该考试是通过 1Z0-804 考试路径获得 OCPJP 7 认证的先决条件。请注意，OCAJP\
  \ 7 中的某些问题与 OCPJP 7 问题的难度级别相同。\n*   OCPJP 7 考试涵盖的主题比 OCPJP 6 和 5 考试及其 Sun 前身更多，包括\
  \ JDBC、本地化、NIO.2 和并发 API。\n*   OCPJP 7 还涵盖了 Java SE 7 的新特性，包括 try-with-resources\
  \ 语句、JDBC 中的新 API、基于字符串的 switch 和二进制字面量。\n*   OCPJP 7 考试中的问题比 OCPJP 6 和 5 考试及其 Sun\
  \ 前身中的问题更难。\n*   OCPJP 7 考试只有选择题，而已停考的 SCJP 考试还有交互式问题（拖放、匹配选项等）。\n\nOCPJP 6 和 OCPJP\
  \ 7 考试之间的差异总结在表 1-3 中。\n\n表 1-3。通往 OCPJP 6 和 OCPJP 7 认证的 Oracle 考试对比\n\n![Table01-03.jpg](img/Table01-03.jpg)\n\
  \nOCPJP 7 考试\n\n常见问题 7. OCPJP 7 考试有多少道题？\n\n在 OCPJP 7 考试的 1Z0-804 和 1Z0-805 两个版本中，都有\
  \ 90 道题。\n\n常见问题 8. OCPJP 7 考试的时长是多少？\n\nOCPJP 7 考试的 1Z0-804 和 1Z0-805 版本分别持续 150\
  \ 分钟和 180 分钟（2 小时 30 分钟和 3 小时）。\n\n常见问题 9. OCPJP 7 考试的费用是多少？\n\nOCPJP 7 考试的 1Z0-804\
  \ 和 1Z0-805 版本费用相同，但该费用因您参加考试所在国家的货币而异：目前在美国为 300 美元，在英国为 202 英镑，在印度为 8,500 卢比，在欧元区国家为\
  \ 238 欧元，等等。（考试费用在 Oracle 网站上以查看者的当地货币显示。）\n\n常见问题 10. OCPJP 7 考试的及格分数是多少？\n\nOCPJP\
  \ 7 考试的 1Z0-804 和 1Z0-805 版本的及格分数分别为 65% 和 60%。（答错不扣分。）\n\n常见问题 11. OCPJP 7 考试中会问哪些类型的问题？\n\
  \nOCPJP 7 考试中的一些问题会测试您的概念性知识，而不涉及特定的程序或代码段。但大多数问题是以下类型的编程问题：\n\n*   给定一个程序或代码段，输出或预期行为是什么？\n\
  *   哪个（些）选项可以无错误编译或给出所需输出？\n*   哪个（些）选项构成了给定 API（尤其是新引入的 API，例如与 JDBC 新类相关的 API）的正确用法？\n\
  \n所有问题都是选择题。大多数问题提供四到五个选项，但有些问题有六到七个选项。许多问题被设计为具有一组多个正确答案。此类问题会明确标记（通常在考试屏幕的左上角）您需要选择的选项数量。\n\
  \n考试问题并不局限于仅来自考试大纲中的主题。例如，您可能会遇到关于 Java 基础知识（OCAJP 大纲中的一个主题）的问题，涉及异常处理的基础知识和包装类型的使用。您也可能会遇到与考试大纲主题相关但未在其中明确说明的问题。例如，序列化和\
  \ `transient` 关键字的使用在 OCPJP 考试大纲中没有明确提及，但它们可能会出现在实际考试中，因为它们与读写流有关——而其中一个是 `ObjectStreams`，它与序列化有关！\n\
  \n给定的问题不限于只测试一个主题。有些问题被设计为用一个问题测试多个主题。例如，您可能会发现一个测试线程和内部类概念及其相互关联的问题。\n\n常见问题 12.\
  \ OCPJP 7 考试测试什么？\n\nOCPJP 7 考试测试您对开发实际程序所必需的 Java 语言特性和 API 的理解。考试侧重于以下领域：\n\n\
  *   *对解决问题有用的语言概念*：考试不仅测试您对语言特性如何工作的了解，还涵盖您对语言特性的细节和边界情况的理解。例如，您不仅需要理解 Java 中的泛型特性，还需要理解与类型擦除、将遗留容器与泛型容器混合等相关的问题。\n\
  *   *Java API*：考试测试您对使用 Java 类库的熟悉程度，以及一些不常见的方面或边界情况，例如：\n\n*   `Deque` 的 `remove()`\
  \ 方法是做什么的？（答案：它从底层 deque 实例中移除第一个元素。）\n*   如果 `sleep()` 方法被中断会发生什么？（答案：您将收到一个 `InterruptedException`。）\n\
  \n*   *底层概念*：例如，考试可能会测试您对序列化如何工作、重载和重写之间的区别、自动装箱和拆箱如何与泛型相关、JDBC 中不同类型的驱动程序、多线程编程如何依赖于平台、线程的不同类型的活性问题等的理解。\n\
  \n尽管考试不测试记忆能力，但有些问题假定您对关键元素有死记硬背的知识，例如：\n\n*   用于与 `SimpleDateFormat` 类一起创建自定义日期和时间格式（“字符串模式”）的字母。\n\
  *   用于在正则表达式中形成模式字符串的字符。\n*   用于 `String` 的 `format()` 方法和 `printf()` 中的格式说明符及其含义。\n\
  \n常见问题 13. 我已经做了五年的 Java 程序员。我需要准备 OCPJP 7 考试吗？\n\n*简短回答：* 您有工作经验是好事，但您仍然需要准备 OCPJP\
  \ 7 考试。\n\n*详细回答：* 无论您拥有多少实际编程经验，有两个原因说明您应该为这次考试做准备以提高通过的机会：\n\n\n\n*   *你可能对考试中的某些主题并不熟悉*。Java\
  \ 博大精深，你可能没有机会接触到考试涵盖的每一个主题。例如，如果你从未处理过所参与应用程序的本地化方面，你可能对本地化并不熟悉。或者你的工作可能不需要你使用\
  \ JDBC。又或者你一直从事单线程程序开发，那么多线程编程对你来说可能是个新领域。此外，OCPJP 7 考试强调 Java 7，你可能尚未接触过诸如 NIO.2、新的并发\
  \ API 以及 try-with-resource 语句等增强功能这类 Java 7 主题。\n*   *你可能不记得那些不常见的方面或边界情况。*无论你经验多么丰富，编程时总会遇到意想不到的情况。OCPJP\
  \ 7 考试不仅测试你对常规特性的知识和技能，还考察你对不常见方面或边界情况的理解，例如多线程代码的行为，以及同时涉及重载和重写时泛型的使用。因此，你必须刻苦钻研那些在工作中很少遇到的病态情况。\n\
  \n在你能自信地通过 OCPJP 7 考试之前，衡量你在各个主题上需要多少准备工作的一个好方法是，先做一下第 2 章中的预测试，以及附录 B 和 C 中的两套完整样题。\n\
  \n常见问题 14. 我该如何准备 OCPJP 7 考试？\n\n学习这本书。此外，\n\n*   *编码，编码，再编码！*编写大量的小程序，进行实验，并从错误中学习。\n\
  *   *阅读，阅读，再阅读！*阅读本书，尤其要阅读 Oracle 网站上的教程和参考资料。\n\n*   *Oracle 的免费在线 Java 教程*：访问\
  \ `http://docs.oracle.com/javase/tutorial/` 上的 Java 教程，以及 `http://docs.oracle.com/javase/tutorial/extra/certification/javase-7-programmer2.html`\
  \ 上的 OCPJP 7 教程。\n*   *Java 文档*：Java API 文档是一个信息宝库。该文档可在线获取（参见 `http://docs.oracle.com/javase/7/docs/api/`），并作为\
  \ Java SDK 的一部分提供。如果你无法立即访问互联网，你可能会发现 javac 的 `-Xprint` 选项很方便。要打印 `String` 类的文本表示形式，请键入完全限定名称，如下所示：\n\
  \n```\n    javac -Xprint java.lang.String\n    ```\n\n这将在控制台中打印 `String` 类中的成员列表。\n\
  \n*   *阅读，编码，阅读，编码！*在阅读和编码之间循环往复，使你的书本知识与实际应用相互促进。这样，你不仅会知道一个概念，而且会*理解*它。\n*   *把大部分精力集中在你最不擅长的主题上。*按照从\
  \ 1 到 10 的升序，对 OCPJP 7 考试中的每个主题给自己打分。对所有你自评分数为 8 分或以下的主题进行补救性准备。\n\n常见问题 15. 我如何知道我已经准备好参加\
  \ OCPJP 7 考试了？\n\n在模拟真实考试的条件下，完成附录 B 中给出的两套完整的 OCPJP 7 样题：严格遵守 2.5 小时的时间限制；不要休息；不要参考任何书籍或网站。如果你的得分在\
  \ 75% 或以上（1Z0-804 和 1Z0-805 的实际考试通过分数分别为 65% 和 60%），你很可能通过实际考试。\n\n参加 OCPJP 7 考试\n\
  \n常见问题 16. 我有哪些注册考试的选择？\n\n对于 OCPJP 7 考试，你有三种注册选择：\n\n*   在 Pearson VUE 网站上注册并付款。\n\
  *   从 Oracle 购买考试券，然后在 Pearson VUE 网站上自行注册。\n*   在 Oracle 考试中心 (OTC) 注册并付款（如果你所在地区有\
  \ OTC 的话）。\n\n常见问题 17. 我如何注册考试、安排考试日期和时间，以及参加考试？\n\n**选项 1：在 Pearson VUE 网站上注册并付款**\
  \ **，步骤如下：**\n\n*   **第 1 步。** 访问 `www.pearsonvue.com/oracle/`（如果你从 Oracle 认证页面点击第一个选项，你将被重定向到此页面）。在“安排考试”部分点击“在线安排”。\n\
  *   **第 2 步。** 选择“登录”。在“您计划参加哪种类型的考试”部分点击“监考”。选择此考试为 `\"信息技术 (IT)\"` ![image](img/arrow.jpg)\
  \ `\"Oracle\"` ![image](img/arrow.jpg) `\"监考\"`。然后系统会要求您登录。\n*   **第 3 步。** 登录您在\
  \ Pearson 网站上的网络帐户。如果您没有帐户，请创建一个；您将通过提供的电子邮件获得用户名和密码。首次登录时，您需要更改密码并设置安全问题及其答案。完成此操作后，您就可以安排考试了。\n\
  *   **第 4 步。** 登录后，您将看到可供选择的 Oracle 考试列表。选择以下之一：\n\n*   1Z0-803，Java SE 7 Programmer\
  \ I（即 OCAJP 7 考试）\n*   1Z0-804，Java SE 7 Programmer II（即 OCPJP 7 考试）\n*   1Z0-805，升级到\
  \ Java SE 7 Programmer（即 OCPJP 7 考试）\n\n这些考试是英文的。（如果您愿意并且列表中有其他语言，您可以选择其他语言）。此页面还将显示考试费用。从列表中选择相关考试，例如“1Z0-804\
  \ (Java SE 7 Programmer II)”，然后单击“下一步”。\n\n*   **第 5 步。** 现在您需要选择您的考试地点。选择 `国家`\
  \ ![image](img/arrow.jpg) `城市` ![image](img/arrow.jpg) `州/省`，系统将显示您附近的考试地点。每个中心都会有一个信息图标：点击它可获取地址和路线。选择最多四个靠近您所在地的考试中心，然后单击“下一步”。\n\
  *   **第 6 步。** 选择一个考试中心，并选择预约的日期和时间。页面将显示可用的日期和时间段；选择最适合您的一个。如果您有考试券、Oracle 大学优惠券或\
  \ Oracle 促销代码，请在此处输入。\n*   **第 7 步。** 从可用的付款方式中选择（通常的方式是使用信用卡付款）并支付考试费用。在支付费用之前，请确保您已选择了正确的考试、合适的考试中心和日期/时间。\n\
  *   **第 8 步。** 完成！您将通过电子邮件收到预约确认和付款收据。\n\n**选项 2：从 Oracle 购买考试券** **并在 Pearson VUE\
  \ 网站上注册。**\n\n您可以从 Oracle 购买通用考试券，然后在 Pearson 网站上使用。如果您居住在美国，费用为 300 美元；如果您居住在其他地方，则以当地货币计价。要从\
  \ Oracle 购买考试券，请选择“OU Java、Solaris 和其他 Sun 技术考试电子券”。如果您没有 Oracle 帐户，系统会要求您创建一个。创建帐户后，确认客户类型、客户联系信息并付款。一旦您支付了费用，您就可以在\
  \ Pearson VUE 网站上使用电子券。\n\n**选项 3：在线注册并付款** **，亲自前往 Oracle 考试中心 (OTC) 参加考试。**\n\n\
  如果您附近安排了现场考试场次，您可以选择此选项。费用为 300 美元或等值当地货币。\n\n常见问题 18. 在考试前和考试当天，我需要记住哪些关键事项？\n\n\
  考试前：\n\n*   您将收到 Pearson 发送的电子邮件，确认您的预约和付款。查看有关前往考试中心时应携带物品的详细信息。请注意，您至少需要两份带照片的身份证件。\n\
  *   考试前，您预订预约的 Pearson 考试中心会给您打电话（不过，这取决于考试中心）。\n\n考试当天：\n\n\n\n*   请在考试开始前至少 30\
  \ 分钟到达考场。考场会提供储物柜用于存放个人物品。\n*   出示你的考试安排信息和身份证件，然后完成考试手续，例如签署文件。\n*   你将被带到考场内的一台电脑前，并登录考试软件。\n\
  \n考试期间：\n\n*   你将在考试软件屏幕上看到以下内容：\n\n*   角落里的计时器会显示剩余时间\n*   你正在作答的当前题目编号\n*   一个复选框，用于选择是否稍后回顾该题目\n\
  *   一个按钮（标有“回顾”），用于进入回顾界面，你可以在完成考试前重新查看题目。\n\n*   一旦开始，题目会逐一显示。你可以通过勾选复选框来选择答案。如果对某个答案不确定，请选择“回顾”按钮，以便在考试期间的任何时间点重新查看该题。\n\
  *   考试期间，你不得咨询任何人，也不得查阅任何印刷或电子材料或程序。\n\n考试结束后：\n\n*   完成考试后，大约半小时左右，你会收到一封电子邮件，其中包含查看成绩的详细信息。\n\
  *   无论考试通过与否，你答错的题目所涉及的主题都会随成绩一起提供。但是，不会向你展示答错题目的正确答案。\n*   如果你通过了 OCPJP 7 考试，*并且*也满足了适用的认证先决条件（例如，通过\
  \ 1Z0-804 考试获得 OCPJP 7 认证的先决条件是 OCAJP 认证），则可以从 Oracle 的 CertView 网站（`https://education.oracle.com/certview.html`）下载可打印的证书。\n\
  *   如果你考试未通过，可以在 14 天的等待期后重新注册并再次缴费参加考试。\n\n第 2 章\n\n![image](img/frontdot.jpg)\n\
  \n预测试\n\n参加 OCPJP 7 考试的前景在考生心中引发了许多疑问。\n\n*   “考试中会问哪些类型的问题？”\n*   “考试涵盖哪些主题？”\n\
  *   “问题有多难？”\n*   “我怎么知道自己是否准备好参加考试？”\n*   “为了通过考试，我需要重点准备哪些主题？”\n\n本章提供了一个*预测试*，旨在具体且可衡量地回答你所有的初步问题。将此预测试作为心理上的“量油尺”，来衡量如果你今天参加考试，通过\
  \ OCPJP 7 考试的可能性有多大。此预测试中的问题与你将在 OCPJP 7 考试中遇到的实际问题非常相似。它们分布在 1Z0-804 考试大纲的 12 个主题中。本章末尾的预测试答案与评估工具将帮助你精确识别那些需要重点准备的主题，以确保你在实际考试中取得成功。\n\
  \n以下预测试与 OCPJP 7 考试的唯一显著区别在于题目数量和考试时长。此预测试的配置与 OCPJP 7 考试完全相同，只是时长减半：你需要在 1 小时 15\
  \ 分钟内回答 45 道题（而不是 2 小时 30 分钟内回答 90 道题）。\n\n那么，让我们开始吧。模拟真实的考试条件。找一个安静的地方，以便你可以在不受打扰或分心的情况下进行此预测试。记录你的开始和结束时间。遵守闭卷规则：在此预测试之前或期间，请勿查阅答案或任何其他印刷、人工或网络资源。\n\
