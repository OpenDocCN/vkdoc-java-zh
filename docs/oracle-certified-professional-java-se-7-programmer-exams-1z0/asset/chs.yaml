  它输出以下内容：\n\n```\nThe given strArr is: [21, 22, 11, 12, 13]\nstrArr after sorting\
  \ is: [11, 12, 13, 21, 22]\nThe index value is: 4\n```\n\n注意数组索引从零开始，所以 22 的索引位置是\
  \ 4（即 strArr[4] == “22”）。\n\n| ![image](img/banana.jpg) | 确保始终在已排序的数组/容器上调用 `binarySearch()`。否则，你将得到不可预测的结果。\
  \ |\n\n数组作为列表\n\n假设你记录了你所在地区一周的温度。如何编写一个简单的程序来打印记录的最高和最低温度？\n\n为了存储温度，你可以使用数组。然而，`Arrays`\
  \ 类没有 `max()` 或 `min()` 方法。避免编写自己方法的一种方式是使用 `asList` 方法将数组转换为 `List`，然后使用 `Collections`\
  \ 类中的 `max()` 和 `min()` 方法（参见清单 6-31）。请记住，数组必须是引用类型（你不能对原始类型数组使用 `asList` 方法）。\n\
  \n清单 6-31.  ArrayAsList.java\n\n```\n// This program demonstrates the usage of arrays\
  \ as list\n\nimport java.util.*;\n\npublic class ArrayAsList {\n        public static\
  \ void main(String []args) {\n                Double [] weeklyTemperature = {31.1,\
  \ 30.0, 32.5, 34.9, 33.7, 27.8};\n                List<Double> temperatures = Arrays.asList(weeklyTemperature);\n\
  \                System.out.println(\"Maximum temperature recorded was: \" +\nCollections.max(temperatures));\n\
  \                System.out.println(\"Minimum recorded was: \" + Collections.min(temperatures));\n\
  \        }\n}\n```\n\n这会输出以下内容：\n\n```\nMaximum temperature recorded was: 34.9\n\
  Minimum recorded was: 27.8\n```\n\n是的，它起作用了。但你犯了一个简单的逻辑错误。在这个程序中，你只给出了六天的温度，而不是七天。你可以在数组中再添加一个值，但你是否应该尝试直接将其添加到你得到的\
  \ `List<Double>` 中？以下是尝试在 `List` 中 `add` 一个元素的代码片段：\n\n```\nList<Double> temperatures\
  \ = Arrays.asList(weeklyTemperature);\ntemperatures.add(32.3);\n```\n\n现在你得到以下内容：\n\
  \n```\nException in thread \"main\" java.lang.UnsupportedOperationException\n  \
  \     at java.util.AbstractList.add(AbstractList.java:131)\n       at java.util.AbstractList.add(AbstractList.java:91)\n\
  \       at ArrayAsList.main(ArrayAsList.java:13)\n```\n\n你不能向 `asList()` 方法返回的列表添加元素。一种解决方案是自行创建一个新的\
  \ `List` 类型对象（例如，一个 `ArrayList` 对象），并将元素添加到该 `List` 中，如清单 6-32 所示。\n\n清单 6-32.  ArrayAsList2.java\n\
  \n```\n// This program demonstrates the usage of arrays as list\n\nimport java.util.*;\n\
  \nclass ArrayAsList{\n        public static void main(String []args) {\n       \
  \         Double [] temperatureArray = {31.1, 30.0, 32.5, 34.9, 33.7, 27.8};\n \
  \               System.out.println(\"The original array is:     \" + Arrays.toString(temperatureArray));\n\
  \                List<Double> temperatureList = new ArrayList<Double>(Arrays.asList(temperatureArray));\n\
  \                temperatureList.add(32.3);\n                System.out.println(\"\
  The new List with an added element is: \" + temperatureList);\n        }\n}\n```\n\
  \n它输出以下内容：\n\n```\nThe original array is:     [31.1, 30.0, 32.5, 34.9, 33.7, 27.8]\n\
  The new List with an added element is: [31.1, 30.0, 32.5, 34.9, 33.7, 27.8, 32.3]\n\
  ```\n\n是的，现在它起作用了。\n\n要点记忆\n\n以下是一些有趣的事实，可能对你的 OCPJP 考试有所帮助：\n\n*   `ArrayList`\
  \ 和 `ArrayDeque` 之间的区别在于，你可以使用索引在数组列表的任何位置添加元素；然而，你只能在数组双端队列的前端或末端添加元素。这使得在数组双端队列中插入比在数组列表中高效得多；然而，在数组双端队列中导航比在数组列表中成本更高。\n\
  *   关于使用 `Arrays.asList()` 方法返回的 `List`，还有一点你需要记住。虽然你不能向 `asList()` 方法返回的 `List`\
  \ 添加元素，但你可以修改这个 `List`！此外，你通过 `List` 所做的修改会反映到原始数组中。例如，如果你在 `List` 中将第一天的温度从 31.1\
  \ 修改为 35.2，原始数组也会被修改，如清单 6-33 所示。\n\n清单 6-33.  ArrayAsList3.java\n\n```\nimport\
  \ java.util.*;\n\nclass ArrayAsList3 {\n  public static void main(String []args)\
  \ {\n          Double [] temperatureArray = {31.1, 30.0, 32.5, 34.9, 33.7, 27.8};\n\
  \          System.out.println(\"The original array is: \" + Arrays.toString(temperatureArray));\n\
  \                  List<Double> temperatureList = Arrays.asList(temperatureArray);\n\
  \                  temperatureList.set(0, 35.2);\n          System.out.println(\"\
  The modified array is: \" + Arrays.toString(temperatureArray));\n          }\n}\n\
  ```\n\n它输出以下内容：\n\n```\nThe original array is: [31.1, 30.0, 32.5, 34.9, 33.7, 27.8]\n\
  The modified array is: [35.2, 30.0, 32.5, 34.9, 33.7, 27.8]\n```\n\n`Arrays` 类只提供了有限的功能，你通常会希望使用\
  \ `Collections` 类中的方法。为了实现这一点，调用 `Arrays.asList()` 方法是一个有用的技巧。\n\n| ![image](img/Note.jpg)\
  \ | 请记住，你不能向 `Arrays.asList()` 方法返回的 `List` 添加元素。但是，你可以修改返回的 `List` 中的元素，并且对该 `List`\
  \ 所做的更改会反映回数组中。 |\n\n提问时间！\n\n1.  预测此程序的输出：\n\n```\n    import java.util.*;\n\n\n\
  \n```java\nclass UtilitiesTest {\n         public static void main(String []args)\
  \ {\n                 List<int> intList = new ArrayList<>();\n                 intList.add(10);\n\
  \                 intList.add(20);\n                 System.out.println(\"The list\
  \ is: \" + intList);\n         }\n    }\n    ```\n\n*   A.  输出结果为：The list is: [10,\
  \ 20].\n    *   B.  输出结果为：The list is: [20, 10].\n    *   C.  导致编译错误。\n    *   D.\
  \  导致运行时异常。\n\n**答案**：C. 导致编译错误。\n\n（不能将原始类型与泛型一起使用，因此 `List<int>` 需要改为 `List<Integer>`。）\n\
  \n2.  预测以下程序的输出：\n\n```java\n    import java.util.*;\n\nclass UtilitiesTest {\n\
  \         public static void main(String []args) {\n                 List<Integer>\
  \ intList = new LinkedList<>();\n                 List<Double> dblList = new LinkedList<>();\n\
  \                 System.out.println(\"First type: \" + intList.getClass());\n \
  \                System.out.println(\"Second type:\" + dblList.getClass());\n  \
  \       }\n    }\n    ```\n\n*   A.  输出结果为：\n             First type: class java.util.LinkedList\n\
  \             Second type:class java.util.LinkedList\n\n*   B.  输出结果为：\n       \
  \       First type: class java.util.LinkedList<Integer>\n              Second type:class\
  \ java.util.LinkedList<Double>\n\n*   C.  导致编译错误。\n\n*   D.  导致运行时异常。\n\n**答案：**\
  \ A. 输出结果为：\n\nFirst type: class java.util.LinkedList\n\nSecond type:class java.util.LinkedList\n\
  \n（由于类型擦除，编译后两种类型都被视为相同的 `LinkedList` 类型）。\n\n3.  关于 `List<?>` 和 `List<Object>`，哪个说法是正确的？\n\
  \n*   A.  两者相同，只是表达同一事物的两种不同方式。\n    *   B.  `List<?>` 是元素类型相同但未知的同构列表，`List<Object>`\
  \ 是元素类型不同的异构列表。\n    *   C.  `List<?>` 是元素类型不同的异构列表，`List<Object>` 是元素类型相同但未知的同构列表。\n\
  \n**答案**：B. `List<?>` 是元素类型相同但未知的同构列表，`List<Object>` 是元素类型不同的异构列表。\n\n4.  预测以下程序的输出：\n\
  \n```java\n    import java.io.*;\n\nclass LastError<T> {\n         private T lastError;\n\
  \         void setError(T t){\n                 lastError = t;\n               \
  \  System.out.println(\"LastError: setError\");\n         }\n    }\n    class StrLastError<S\
  \ extends CharSequence> extends LastError<String>{\n         public StrLastError(S\
  \ s) {\n         }\n         void setError(S s){\n                 System.out.println(\"\
  StrLastError: setError\");\n         }\n    }\n\nclass Test {\n         public static\
  \ void main(String []args) {\n                 StrLastError<String> err = new StrLastError<String>(\"\
  Error\");\n                 err.setError(\"Last error\");\n         }\n    }\n \
  \   ```\n\n*   A.  输出结果为：StrLastError: setError.\n    *   B.  输出结果为：LastError: setError.\n\
  \    *   C.  导致编译错误。\n    *   D.  导致运行时异常。\n\n**答案**：C. 导致编译错误。\n\n（看起来 `StrLastError`\
  \ 中的 `setError()` 方法覆盖了 `LastError` 类中的 `setError()` 方法。但事实并非如此。在编译时，类型 `S` 的信息不可用。因此，编译器将这两个方法的签名记录为超类中的\
  \ `setError(String)` 和子类中的 `setError(S_extends_CharSequence)`——将它们视为重载方法（而非重写）。在这种情况下，当找到对\
  \ `setError()` 的调用时，编译器发现两个重载方法都匹配，导致方法调用不明确的错误。错误信息如下：\n\n```\n    Test.java:22:\
  \ error: reference to setError is ambiguous, both method setError(T) in LastError\n\
  \    and method setError(S) in StrLastError match\n                    err.setError(\"\
  Last error\");\n                       ^\n    ```\n\n其中 T 和 S 是类型变量：\n\nT 继承自 `Object`，在类\
  \ `LastError` 中声明。\n\nS 继承自 `CharSequence`，在类 `StrLastError` 中声明）。\n\n总结\n\n泛型\n\
  \n*   泛型将确保任何尝试添加非指定类型元素的行为都会在编译时被捕获。因此，泛型提供了具有类型安全性的通用实现。\n*   Java 7 引入了*菱形*语法，其中类型参数（在\
  \ new 运算符和类名之后）可以省略。编译器将从类型声明中推断类型。\n*   泛型不是协变的。也就是说，子类型化不适用于泛型；你不能将派生泛型类型参数赋值给基类型参数。\n\
  *   `<?>` 在泛型中指定未知类型，被称为通配符。例如，`List<?>` 指的是未知类型的列表。\n*   通配符可以是有界的。例如，`<? extends\
  \ Runnable>` 指定 `?` 可以匹配任何类型，只要它是 `Runnable` 或其任何派生类型。注意 `extends` 是包含性的，因此你可以替换\
  \ `? extends X` 中的 `X`。然而，在 `<? super Runnable>` 中，`?` 将只匹配 `Runnable` 的超类型，而 `Runnable`\
  \ 本身不匹配（即它是一个排他性子句）。\n*   在泛型中指定有界类型时，对于类类型和接口，你都使用 `extends` 关键字。要指定多个基类型，你使用 `&`\
  \ 符号。例如，在 `List<? extends X & Y>` 中，`?` 将匹配同时扩展了类型 `X` 和 `Y` 的类型。\n\n集合框架\n\n* \
  \  避免将原始类型与泛型类型混合使用。在其他情况下，请手动确保类型安全。\n*   术语 Collection、Collections 和 collection\
  \ 是不同的。`Collection`——`java.util.Collection<E>`——是集合层次结构中的根接口。`Collections`——`java.util.Collections`——是一个仅包含静态方法的工具类。通用术语\
  \ *collection(s)* 指的是像 map、stack、queue 等容器。\n*   容器类存储对象的引用，因此你不能在任何集合类中使用原始类型。\n\
  *   对于一个类，`hashCode()` 和 `equals()` 方法需要保持一致。出于实际目的，请确保遵循这一条规则：如果 `equals()` 方法对两个对象返回\
  \ true，那么 `hashCode()` 方法应该为它们返回相同的哈希值。\n*   如果你在像 `HashSet` 或 `HashMap` 这样的容器中使用对象，请确保正确重写\
  \ `hashCode()` 和 `equals()` 方法。\n*   `Map` 接口不扩展 `Collection` 接口。\n*   不建议将 null\
  \ 作为参数存储，因为 `Deque` 接口中有一些方法会返回 null，你将难以区分方法调用是成功还是失败。\n*   为你的类实现 `Comparable`\
  \ 接口，前提是存在自然顺序。如果你想以非自然顺序比较对象，或者你的类类型没有自然顺序，那么创建实现 `Comparator` 接口的单独类。此外，如果你有多种替代方式来决定顺序，那么请使用\
  \ `Comparator` 接口。\n\n第 7 章\n\n![image](img/frontdot.jpg)\n\n字符串处理\n\n![9781430247647_unFig07-01.jpg](img/9781430247647_unFig07-01.jpg)\n\
  \n`String 对象` 在编写 Java 应用程序中被广泛使用。Java 程序不仅在业务逻辑中使用`字符串`，还用于实现诸如日志记录之类的实用功能。因此，理解`字符串`及相关概念非常有用且重要。\n\
  \n\n\n除了常见操作外，搜索和解析是对`string`执行的两种有用操作。Java 提供了广泛的支持来高效且轻松地实现这些操作。从版本 4 开始，Java\
  \ 支持正则表达式，并提供了两个有用的类来利用正则表达式的强大功能。从版本 5 开始，Java 还支持类似 C 语言的 `printf()` 风格来格式化字符串。\n\
  \nOCAJP7 考试包含三个与字符串相关的主题：“创建和操作字符串”；“使用 StringBuilder 类及其方法操作数据”；以及“使用 == 和 equals()\
  \ 测试字符串与其他对象之间的相等性”。假设您已具备 OCPJP 7 认证的先决条件，并且已经熟练使用 `string`，我们将直接进入 OCPJP7 考试涵盖的主题。\n\
  \n作为 OCPJP7 考生，您需要熟悉字符串的搜索、解析和构建；正则表达式及其用法；以及字符串格式化和格式说明符。在本章中，我们将详细涵盖所有这些主题。\n\n\
  处理字符串\n\n在本节中，您将学习如何处理存储在 `String` 对象中的字符数据。\n\n字符串搜索\n\n在处理 `string` 时，您经常需要在给定的\
  \ `string` 中进行搜索。`String` 类提供了多个重载版本的 `indexOf()` 方法用于向前搜索字符串，`lastIndexOf()` 方法用于向后搜索字符串，以及\
  \ `regionMatches()` 方法用于比较字符串中的文本“区域”。我们将依次讨论这些方法。\n\nIndexOf() 方法\n\n如何搜索字符串中的特定字符，如果存在，它位于哪个位置？例如，字符\
  \ J 在字符串“OCPJP”中占据哪个索引位置？代码清单 7-1 包含了使用 `indexOf()` 方法回答这个问题的代码。\n\n*代码清单 7-1.*  SearchString1.java\n\
  \n```\n// Demonstrates searching a character in a string\npublic class SearchString1\
  \ {\n        public static void main(String[] s) {\n                String str =\
  \ \"OCPJP\";\n                System.out.println(\"Character J occurs at index:\
  \ \" + str.indexOf('J'));\n        }\n}\n```\n\n它会打印以下内容：\n\n```\nCharacter \nJ\n\
  \ occurs at index 3\n```\n\n很简单，对吧？`indexOf()` 方法搜索指定的字符——这里是字符 J——并返回该字符的第一次出现位置（注意索引从\
  \ 0 开始，而不是 1！）。现在，让我们在给定的字符串中搜索一个子字符串。`indexOf()` 方法被重载了，其中一个方法定义接受一个 `string` 作为搜索参数。代码清单\
  \ 7-2 展示了一个示例。\n\n*代码清单 7-2.*  SearchString2.java\n\n```\n// Demonstrates searching\
  \ a substring within a string using indexOf() method\npublic class SearchString2\
  \ {\n        public static void main(String[] s){\n                String str =\
  \ \"I am preparing for OCPJP\";\n                System.out.println(\"Substring\
  \ \\\"for\\\" occurs at index: \" + str.indexOf(\"for\"));\n        }\n}\n```\n\n\
  该程序会打印以下内容：\n\n```\nSubstring \"for\" occurs at index: 15\n```\n\n（请注意，我们使用了转义字符\
  \ \\ 来在双引号内打印“for”。）\n\n如果搜索的字符串在目标字符串中不存在，会发生什么？例如，如果您在上面的示例中搜索“fort”而不是“for”，您将得到以下结果：\n\
  \n```\nSubstring \"for\" occurs at index: -1\n```\n\n嗯，失败的 `indexOf` 搜索会返回值 −1，表示“未找到”。\n\
  \n这两个是简单的问题；现在让我们尝试一个稍微难一点的。给定一个长字符串，如何找出给定字符串（例如“am”）在该字符串中出现了多少次？别担心——在这种情况下，有另一个版本的\
  \ `indexOf()` 方法。在这个方法中，您可以指定一个索引，搜索将从该索引开始。代码清单 7-3 展示了实现。\n\n*代码清单 7-3.*  SearchString3.java\n\
  \n```\n// This example demonstrates how to search multiple occurences of a search\
  \ string\npublic class SearchString3 {\n        public static void main(String[]\
  \ s) {\n                String str = \"I am a student. I am preparing for OCPJP\"\
  ;\n                int fromIndex = 0;\n                while(str.indexOf(\"am\"\
  , fromIndex) > −1) {\n                        fromIndex = str.indexOf(\"am\", fromIndex);\n\
  \                        System.out.println(\"Substring \\\"am\\\" occurs at index:\
  \ \" + fromIndex);\n                        fromIndex++;\n                }\n  \
  \      }\n}\n```\n\n该示例会打印以下内容：\n\n```\nSubstring \"am\" occurs at index: 2\nSubstring\
  \ \"am\" occurs at index: 18\n```\n\n它使用一个 `while` 循环来检查输入字符串中是否还有更多搜索字符串的出现。它还维护了一个索引（`fromIndex`），用于向前搜索。每次找到搜索字符串后，它会递增\
  \ `fromIndex` 变量，以便找到下一个搜索字符串的出现位置。\n\n如果您想搜索搜索字符串的最后一次出现，可以使用 `String` 类中定义的 `lastIndexOf()`\
  \ 方法的重载版本。`String` 类还提供了一些简单的方法来检查字符串的开头或结尾，这些方法在表 7-1 中给出。\n\n表 7-1. 检查字符串中匹配前缀或后缀的方法\n\
  \n| 方法 | 描述 |\n| --- | --- |\n| `boolean startsWith(String prefixString, int offset)`\
  \ | 从 `offset` 开始，检查此字符串是否以 `prefixString` 开头。 |\n| `boolean startsWith(String prefixString)`\
  \ | 检查此 `string` 是否以 `prefixString` 开头；等同于 `startsWith(prefixString, 0)`； |\n| `boolean\
  \ endsWith(String suffixString)` | 检查此 `string` 是否以 `suffixString` 结尾。 |\n\nregionMatches()\
  \ 方法\n\n考虑字符串“Tarzan: Hi Jane, wanna ride an elephant? \\n Jane: No thanks! I’m\
  \ preparing for OCPJP now!”。如何检查字符串“ Jane: No thanks!”是否作为 Jane 回复的第一部分出现？（注意：Jane\
  \ 的回复是换行符“\\n”之后的文本区域。）\n\n解决这个问题有很多方法，这里我们将使用 `regionMatches()` 方法来学习如何使用它。表 7-2\
  \ 列出了 `regionMatches()` 方法的两个重载版本。为了解决给定字符串中的问题，您可以首先查找字符“\\n”，然后从该索引位置开始，搜索字符串“\
  \ Jane: No thanks! ”，如代码清单 7-4 所示。\n\n表 7-2. regionMatches() 方法及描述\n\n| 方法 | 描述\
  \ |\n| --- | --- |\n| `boolean regionMatches(int start, String matchingStr, int\
  \ matchStartOffset, int matchLen)` | 从该 `String` 对象中的 `start` 开始，检查由 `matchingStr`\
  \ 给出的文本区域是否匹配。在 `matchStr` 中，检查从 `matchStartOffset` 开始的 `matchLen` 个字符。 |\n| `boolean\
  \ regionMatches(boolean ignoreCase, int start, String matchingStr, int matchStartOffset,\
  \ int matchLen)` | 与上一个方法相同，但增加了第一个参数，用于忽略大小写差异。 |\n\n*代码清单 7-4.*  MatchRegionInString.java\n\
  \n\n\n```\n// 此示例演示如何在字符串中搜索文本的“区域”\npublic class MatchRegionInString {\n      \
  \  public static void main(String[] s) {\n                String chat = \"Tarzan:\
  \ Hi Jane, wanna ride an Elephant? \\n Jane: No thanks! I'm preparing for OCPJP\
  \ now!\";\n                String matchString = \" Jane: No thanks!\";\n       \
  \         // 首先获取搜索区域起始位置的索引\n                int startIndex = chat.indexOf('\\\
  n');\n                System.out.println(\"Jane 的回复起始索引为: \" + startIndex);\n  \
  \              // 如果找到 '\\n'，则尝试从该位置匹配字符串 \" Jane: No thanks!\"\n              \
  \  if(startIndex > −1) {\n                        // 记住索引从 0 开始而非 1，因此需要给 startIndex\
  \ 加 1\n                        boolean doesMatch = chat.regionMatches(startIndex\
  \ + 1, matchString, 0, matchString.length());\n                        if(doesMatch)\n\
  \                                System.out.println(\"Jane 的回复与字符串\" + matchString\
  \ + \"匹配\");\n                }\n        }\n} \n```\n\n该程序会输出如下你期望的结果：\n\n```\n\
  Jane 的回复起始索引为: 41\nJane 的回复与字符串 Jane: No thanks! 匹配\n```\n\n字符串解析\n\n解析是对字符串进行的一项有趣且有用的操作。（*解析*一词意为“根据假定的结构进行分析，将其分解为组成部分”。）在本节中，我们将向你介绍基本的解析操作；在本章后面讨论正则表达式时，我们将进一步探讨高级解析主题。\n\
  \n字符串转换\n\n在程序中，你经常会发现需要将字符串与基本类型（如浮点数、整数和布尔值）进行相互转换。要将基本类型值转换为字符串类型，可以使用 `String`\
  \ 类中重载的 `valueOf()` 方法。\n\n让我们从将整数值 10 转换为 `String` 开始。具体操作如下：\n\n```\nString str1\
  \ = String.valueOf(10);        // 将整数转换为字符串的正确方法\n```\n\n请注意，直接赋值或强制类型转换会导致编译错误，例如以下两条语句：\n\
  \n```\n String str1 = 10;                // 编译错误——无法从 int 转换为 String\nString str1\
  \ = (String) 10;       // 编译错误——无法从 int 转换为 String\n```\n\n那么反过来呢：如果一个 `string`\
  \ 包含某种基本类型的值（比如整数值），该如何进行转换？显然，以下两条尝试直接赋值或通过显式强制类型转换来改变类型的语句会导致编译错误：\n\n```\nint\
  \ i = \"10\";            // 编译错误——无法从 String 转换为 int\nint i = (int) \"10\";    \
  \  // 编译错误——无法从 String 转换为 int\n```\n\n要进行这种类型转换，你需要使用 `Integer` 类中提供的 `parseInt()`\
  \ 静态方法，如下所示：\n\n```\nint i = Integer.parseInt(\"10\"); // 将字符串转换为整数的正确方法 \n```\n\
  \n这个 `parseInt()` 方法是一个重载方法。还有另一个 `parseInt()` 方法，它接受一个额外的参数：整数值的基数（如八进制和十六进制）。包装类\
  \ `Byte`、`Short`、`Long`、`Float` 和 `Double` 都有等效的解析方法，用于将字符串转换为相应的基本类型值。如果你向这些解析方法传递无效参数会怎样？例如，\n\
  \n```\nfloat f = Float.parseFloat(\"no such value\");\n```\n\n对于这段代码，你会得到一个运行时异常\
  \ `java.lang.NumberFormatException`，因为字符串“no such value”无法转换为 `float` 类型值。\n\nSplit()\
  \ 方法\n\n清单 7-5 展示了一个示例，演示如何使用 `String` 类的 `split()` 方法拆分句子并打印字符串中的所有单词。\n\n*清单 7-5.*  ParseString1.java\n\
  \n```\n// 此示例演示了 split() 方法的用法\npublic class ParseString1 {\n        public static\
  \ void main(String[] s) {\n                String quote = \"Never lend books-nobody\
  \ ever returns them!\";\n                String [] words = quote.split(\" \"); //\
  \ 基于分隔符 \" \"（空格）拆分字符串\n                for (String word : words) {\n          \
  \              System.out.println(word);\n                }\n        }\n}\n```\n\
  \n它会输出以下内容：\n\n```\nNever\nlend\nbooks-nobody\never\nreturns\nthem!\n```\n\n`split()`\
  \ 方法接受一个分隔符作为正则表达式（你将在本章后面学习正则表达式）。在此示例中，你提供了一个空格作为分隔符，因此能够提取句子中的所有单词。请注意，字符“-”和“!”是字符串“books-nobody”和“them!”的一部分，因为你没有指定任何标点字符作为分隔符。稍后在学习正则表达式时，你将再次探讨这个问题。\n\
  \n| ![image](img/banana.jpg) | `split()` 方法的参数是一个分隔符字符串，它是一个正则表达式。如果你传入的正则表达式语法无效，将会得到一个\
  \ `PatternSyntaxException` 异常。 |\n\n现在，假设你有一个包含文件夹路径的字符串，并且想要解析该字符串并打印出各个文件夹名称。清单\
  \ 7-6 展示了实现方法。\n\n*清单 7-6.*  ParseString2.java\n\n```\npublic class ParseString2\
  \ {\n        public static void main(String[] args) {\n                String str\
  \ = \"c:\\\\work\\\\programs\\\\parser\";\n                String [] dirList = str.split(\"\
  \\\\\\\\\");\n                for (int i=0; i<dirList.length; i++) {\n         \
  \               System.out.println(dirList[i]);\n                }\n        }\n\
  }\n```\n\n它会输出以下内容：\n\n```\nc:\nwork\nprograms\nparser\n```\n\n在这个示例中，有两件事可能会让你感到惊讶。\n\
  \n*   首先，使用“\\\\”而不是“\\”很有意思。为了在字符串中显示特殊字符，你需要对这些特殊字符使用转义序列。例如，如果你想插入一个换行符，必须使用“\\\
  n”；同样，对于制表符，必须使用“\\t”。这里，你想使用一个反斜杠，在字符串中可以表示为“\\\\”。\n*   第二件事是与 `split()` 方法一起使用的分隔符。实际上，这里使用了一个正则表达式，以“\\\
  ”作为分隔符来解析路径。我们将在讨论正则表达式时，很快解释为什么使用四个连续的反斜杠而不是一个。\n\n正则表达式\n\n*正则表达式*定义了一种搜索模式，可用于执行字符串搜索和字符串操作等操作。正则表达式不过是一系列按照预定义语法指定的预定义符号，帮助你搜索或操作字符串。正则表达式被指定为一个字符串，并从左到右应用于另一个字符串。\n\
  \n你可能会想，既然可以直接使用字符串函数进行搜索（例如上一节中使用 `indexOf()` 那样），为什么还需要*正则表达式*（regex，REGular EXpression\
  \ 的缩写）呢？答案很简单。当你确切知道要搜索的字符串时，可以使用 `indexOf()` 方法（或任何其他类似方法）。但是，当你只知道字符串的模式而不知道具体字符串时，就需要使用正则表达式。在搜索和操作字符串方面，正则表达式比简单的搜索方法强大得多。例如，假设你想在给定的字符串中搜索所有电子邮件地址。你无法使用\
  \ `indexOf()` 方法实现这一点，因为你不知道确切的电子邮件地址；但是，你可以使用正则表达式指定一个模式，从而找到字符串中的所有电子邮件地址。\n\n\
  理解正则表达式符号\n\n\n\n现在我们将重点理解用于指定正则表达式的符号的语法和语义。表 7-3 展示了用于指定正则表达式的常用符号。\n\n表 7-3.\
  \ 用于指定正则表达式的常用符号\n\n| 符号 | 描述 |\n| --- | --- |\n| ^expr | 匹配行首的 expr。 |\n| expr$\
  \ | 匹配行尾的 expr。 |\n| . | 匹配任意单个字符（换行符除外）。 |\n| [xyz] | 匹配 x、y 或 z 中的任意一个。 |\n| [p-z]\
  \ | 指定一个范围。匹配从 p 到 z 的任意字符。 |\n| [p-z1-9] | 匹配从 p 到 z 的任意字符或从 1 到 9 的任意数字（注意，它不会匹配\
  \ p1）。 |\n| [^p-z] | 方括号内作为第一个字符的 '^' 表示否定该模式；它匹配除 p 到 z 之外的任意字符。 |\n| Xy | 匹配 x\
  \ 后跟 y。 |\n| x &#124; y | 匹配 x 或 y。 |\n\n你可以使用表 7-3 中给出的符号来指定正则表达式。例如，你可以编写 `\"\
  [0–9]\"` 来匹配所有数字字符，或者编写 `\"[\\t\\r\\f\\n]\"` 来匹配所有空白字符。此外，你还可以使用某些预定义的*元符号*来简化正则表达式的指定。例如，你可以指定\
  \ `\"\\d\"` 代替 `\"[0–9]\"` 来匹配数字，或者指定 `\"\\s\"` 代替 `\"[\\t\\r\\f\\n]\"` 来匹配所有空白字符。表\
  \ 7-4 总结了常用的元符号列表。\n\n表 7-4. 用于指定正则表达式的常用元符号\n\n| 符号 | 描述 |\n| --- | --- |\n| \\\
  d | 匹配数字（等价于 [0–9]）。 |\n| \\D | 匹配非数字。 |\n| \\w | 匹配单词字符。 |\n| \\W | 匹配非单词字符。 |\n\
  | \\s | 匹配空白字符（等价于 [\\t\\r\\f\\n]）。 |\n| \\S | 匹配非空白字符。 |\n| \\b | 在方括号外时匹配单词边界。在方括号内时匹配反斜杠。\
  \ |\n| \\B | 匹配非单词边界。 |\n| \\A | 匹配字符串开头。 |\n| \\Z | 匹配字符串结尾。 |\n\n好了，到目前为止还不错。但是，如果你想指定一个匹配涉及字符出现次数的正则表达式，该怎么办呢？对于这种情况，你可以使用表\
  \ 7-5 中提供的*量词符号*。\n\n表 7-5. 常用的量词符号\n\n| 符号 | 描述 |\n| --- | --- |\n| expr? | 匹配\
  \ 0 次或 1 次 expr（等价于 expr{0,1}）。 |\n| expr* | 匹配 0 次或多次 expr（等价于 expr{0,}）。 |\n|\
  \ expr+ | 匹配 1 次或多次 expr（等价于 expr{1,}）。 |\n| expr{x} | 匹配 x 次 expr。 |\n| expr{x,\
  \ y} | 匹配 x 到 y 次 expr。 |\n| expr{x,} | 匹配 x 次或更多次 expr。 |\n\nJava 中的正则表达式支持\n\n\
  Java 1.4 SDK 在 Java 中引入了正则表达式支持。`java.util.regex` 包支持正则表达式。它包含两个重要的类：`Pattern` 和\
  \ `Matcher`。`Pattern` 以编译后的表示形式表示一个正则表达式，而 `Matcher` 则解释一个正则表达式并在给定字符串中匹配相应的子串。\n\
  \n此时，你可能会问，既然 `String` 类中的 `split()` 等方法已经支持正则表达式，为什么还要用 `Matcher` 和 `Pattern` 这样的专用类来支持正则表达式呢？这个问题的答案只有一个词：性能。`Pattern`\
  \ 和 `Matcher` 类针对性能进行了优化，而 `String` 中的 `split()` 等方法则没有。\n\n| ![image](img/Note.jpg)\
  \ | 当你需要频繁地对字符串执行搜索或替换操作时，请使用 `Pattern` 和 `Matcher` 类；它们比 `String` 中的 `split()`\
  \ 或其他方法更高效。 |\n\n现在，让我们看看如何使用 `Pattern` 和 `Matcher` 类。首先，你需要调用 `Pattern` 类中的静态方法\
  \ `compile()` 来获取一个模式实例。该方法的第一个参数是一个正则表达式。然后，你需要从 `Pattern` 类中调用另一个名为 `matcher()`\
  \ 的静态方法来获取 `Matcher` 类的一个实例。`matcher()` 方法返回一个 `Matcher` 对象。然后使用该对象对输入字符串执行所需操作。\n\
  \n让我们看看如何使用 `Pattern` 和 `Matcher` 类。假设你有一个包含一组人个人详细信息（如姓名、地址、电话号码）的字符串。你将使用以下字符串作为本节剩余部分示例的输入：\n\
  \n```\nString str = \"Danny Doo, Flat no 502, Big Apartment, Wide Road, Near Huge\
  \ Milestone, Hugo-city \n56010, Ph: 9876543210, Email: danny@myworld.com. Maggi\
  \ Myer, Post bag no 52, Big bank post office, \nBig bank city 56000, ph: 9876501234,\
  \ Email: maggi07@myuniverse.com.\"\n```\n\n| ![image](img/banana.jpg) | 你需要使用反斜杠\
  \ (\\) 来指定正则表达式；不要使用正斜杠 (/)。如果你使用正斜杠，编译器不会报错；但是，你将无法得到期望的输出。 |\n\n使用正则表达式进行搜索和解析\n\
  \n让我们从一个简单的例子开始。你需要编写代码来打印字符串 `str` 中的所有单词。该怎么做呢？还记得元字符 `\"\\w\"` 吗？它匹配构成单词的所有符号。你将使用\
  \ `\"\\w\"` 以及量词 `\"+\"` 来构成 `\"\\w+\"`，这意味着你想要搜索所有长度为一个或多个字符的单词；请参见清单 7-7。\n\n\
  *清单 7-7.*  Regex1.java\n\n```\nimport java.util.regex.Matcher;\nimport java.util.regex.Pattern;\n\
  \npublic class Regex1 {\n        public static void main(String[] args) {\n    \
  \            String str = \"Danny Doo, Flat no 502, Big Apartment, Wide Road, Near\
  \ Huge Milestone, \nHugo-city 56010, Ph: 9876543210, Email: danny@myworld.com. Maggi\
  \ Myer, Post \nbag no 52, Big bank post office, Big bank city 56000, ph: 9876501234,\
  \ Email: maggi07@myuniverse.com.\"\n                Pattern pattern = Pattern.compile(\"\
  \\\\w+\");\n                Matcher matcher = pattern.matcher(str);\n          \
  \      while(matcher.find()) {\n                        System.out.println(matcher.group());\n\
  \                }\n        }\n}\n```\n\n它会打印以下内容：\n\n```\nDanny\nDoo\nFlat\nno\n\
  \n...\nmaggi07\nmyuniverse\ncom\n```\n\n（请注意，我们为了节省空间用 . . . 截断了结果。）但是，你可以看到正则表达式搜索了所有至少包含一个字符的单词。这里发生的是，你调用了\
  \ `compile()` 方法，并传入 `Pattern` 类的一个正则表达式来获取 `Pattern` 实例。之后，你通过调用模式实例上的 `matcher()`\
  \ 方法获取了 `Matcher` 类的一个实例。最后，你使用 `Matcher` 类的 `group()` 和 `find()` 方法得到了结果。如果存在任何搜索结果，`find()`\
  \ 方法返回 true。`group()` 方法将搜索结果作为一个字符串返回。\n\n| ![image](img/Note.jpg) | 请注意，我们在清单\
  \ 7-7 中指定的正则表达式里使用了两个反斜杠（“\\\\w+”），因为反斜杠是正则表达式中的转义字符。然而，反斜杠也是 Java 字符串中的转义字符，这意味着字面量“\\\
  \\”会被解释为一个单独的反斜杠。这导致了一个有趣的结果：我们在正则表达式中写“\\\\”表示一个单独的反斜杠，而在 Java 程序中，如果我们想指定一个单独的反斜杠，则需要写成“\\\
  \\\\\\”。 |\n\n同样地，你可以使用 `\"\\d+\"` 正则表达式搜索所有数字。现在，假设你想搜索并打印字符串中出现的所有邮政编码。假设邮政编码的长度始终为\
  \ 5。你能用正则表达式实现吗？清单 7-8 中的程序能工作吗？\n\n\n\n*清单 7-8.*  Regex2.java\n\n```\nimport java.util.regex.Matcher;\n\
  import java.util.regex.Pattern;\n\n// This program demonstrates how we can search\
  \ numbers of a specified length\npublic class Regex2 {\n        public static void\
  \ main(String[] args) {\n                String str = \"Danny Doo, Flat no 502,\
  \ Big Apartment, Wide Road, Near Huge Milestone, \nHugo-city 56010, Ph: 9876543210,\
  \ Email: danny@myworld.com. Maggi Myer, Post \nbag no 52, Big bank post office,\
  \ Big bank city 56000, ph: 9876501234, Email: maggi07@myuniverse.com.\"\n      \
  \          Pattern pattern = Pattern.compile(\"\\\\d{5}\");\n                Matcher\
  \ matcher = pattern.matcher(str);\n                while(matcher.find()) {\n   \
  \                     System.out.println(matcher.group());\n                }\n\
  \        }\n}\n```\n\n你使用了 `\"\\d{5}\"` 作为正则表达式字符串。让我们看看这个程序会输出什么：\n\n```\n\n```\n\
  \n哎呀！它打印出了两个邮政编码，但也意外地打印出了三个电话号码的部分数字。嗯，要只获取邮政编码，你必须更准确地指定正则表达式。试试清单 7-9 中的代码。\n\
  \n*清单 7-9.*  Regex3.java\n\n```\nimport java.util.regex.Matcher;\nimport java.util.regex.Pattern;\n\
  \n// This program demonstrates how we can search numbers of a specified length\n\
  public class Regex3 {\n        public static void main(String[] args) {\n      \
  \          String str = \"Danny Doo, Flat no 502, Big Apartment, Wide Road, Near\
  \ Huge Milestone, \nHugo-city 56010, Ph: 9876543210, Email: danny@myworld.com. Maggi\
  \ Myer, \nPost bag no 52, Big bank post office, Big bank city 56000, ph: 9876501234,\
  \ Email: maggi07@myuniverse.com.\"\n                Pattern pattern = Pattern.compile(\"\
  \\\\D\\\\d{5}\\\\D\");\n                Matcher matcher = pattern.matcher(str);\n\
  \                while(matcher.find()) {\n                        System.out.println(matcher.group());\n\
  \                }\n        }\n}\n```\n\n它打印出以下内容：\n\n```\n56010,\n 56000,\n```\n\
  \n这次你使用了 `\"\\D\\d{5}\\D\"`，效果很好。你本质上做的是指定一个非数字字符前后各有一个六位数字。很简单，对吧！嗯，这个解决方案有一个问题。程序在六位数字之前打印了一个空格，在六位数字之后打印了一个逗号（这两个字符都由\
  \ `\"\\D\"` 匹配）。你能去掉这些不需要的字符吗？是的，有一个优雅的解决方案：你可以在这里使用 `\"\\b\"`（用于检测单词边界）。试试清单 7-10\
