  \                        connection.commit();\n                        System.out.println(\"\
  提交后打印表内容\");\n                        resultSet = statement.executeQuery(\"SELECT\
  \ * FROM familyGroup\");\n                        while(resultSet.next()) {\n  \
  \                              System.out.println(resultSet.getInt(\"id\") + \"\
  \ \"\n                                        + resultSet.getString(\"nickName\"\
  ));\n                        }\n                } catch (SQLException e) {\n   \
  \                     System.out.println(\"出现错误，无法在家庭组中添加联系人\");\n             \
  \           // 由于出现错误，回滚事务中的所有更改\n                        connection.rollback();\n\
  \                        e.printStackTrace();\n                }\n             \
