    ## Securing a Microservice with Self-Contained Access Tokens (JWT)


    In Chapter [11](#461146_1_En_11_Chapter.xhtml), we discussed JWT and its usage
    in detail. In this section, we are going to use a JWT issued from our OAuth 2.0
    authorization server to access a secured microservice.


    ### Setting Up an Authorization Server to Issue JWT


    In this section, we see how to extend the authorization server we used in the
    previous section (`ch12/sample01/`) to support self-contained access tokens or
    JWTs. The first step is to create a new key pair along with a key store. This
    key is used to sign the JWTs issued from the authorization server. The following
    `keytool` command will create a new key store with a key pair.


    ```

    \> keytool -genkey -alias jwtkey -keyalg RSA -keysize 2048 -dname "CN=localhost"
    -keypass springboot -keystore jwt.jks -storepass springboot

    ```


    This command creates a key store with the name `jwt.jks`, protected with the password
    `springboot`. We need to copy this key store to `sample01/src/main/resources/`.
    To generate self-contained access tokens, we need to set the value of the following
    properties in the `sample01/src/main/resources/application.properties` file.


    ```

    spring.security.oauth.jwt: true

    spring.security.oauth.jwt.keystore.password: springboot

    spring.security.oauth.jwt.keystore.alias: jwtkey

    spring.security.oauth.jwt.keystore.name: jwt.jks

    ```


    The value of `spring.security.oauth.jwt` is set to `false` by default, and it
    has to be changed to `true` to issue JWTs. The other three properties are self-explanatory
    and you need to set them appropriately based on the values you used when creating
    the key store.


    Let’s go through the notable changes in the source code to support JWTs. First,
    in the `pom.xml` file, we need to add the following dependency, which takes care
    of building JWTs.


    ```

    org.springframework.security

    spring-security-jwt


    ```


    In the `sample01/src/main/java/com/apress/ch12/sample01/config/AuthorizationServerConfig.java`
    class, we added the following method, which takes care of injecting the details
    about how to retrieve the private key from the key store. This private key is
    used to sign the JWT.


    ```

    @Bean

    protected JwtAccessTokenConverter jwtConeverter() {

    String pwd = environment.getProperty(

    "spring.security.oauth.jwt.keystore.password");

    String alias = environment.getProperty(

    "spring.security.oauth.jwt.keystore.alias");

    String keystore = environment.getProperty(

    "spring.security.oauth.jwt.keystore.name");

    KeyStoreKeyFactory keyStoreKeyFactory = new KeyStoreKeyFactory(

    new ClassPathResource(keystore),

    pwd.toCharArray());

    JwtAccessTokenConverter converter = new JwtAccessTokenConverter();

    converter.setKeyPair(keyStoreKeyFactory.getKeyPair(alias));

    return converter;

    }

    ```


    In the same class file, we also set `JwtTokenStore` as the token store. The following
    function does it in a way, such that we set the `JwtTokenStore` as the token store
    only if the `spring.security.oauth.jwt` property is set to `true` in the `application.properties`
    file.


    ```

    @Bean

    public TokenStore tokenStore() {

    String useJwt = environment.getProperty("spring.security.oauth.jwt");

    if (useJwt != null && "true".equalsIgnoreCase(useJwt.trim())) {

    return new JwtTokenStore(jwtConeverter());

    } else {

    return new InMemoryTokenStore();

    }

    }

    ```


    Finally, we need to set the token store to `AuthorizationServerEndpointsConfigurer`,
    which is done in the following function, and once again, only if we want to use
    JWTs.


    ```

    @Autowired

    private AuthenticationManager authenticationManager;

    @Override

    public void configure(AuthorizationServerEndpointsConfigurer endpoints) throws
    Exception {

    String useJwt = environment.getProperty("spring.security.oauth.jwt");

    if (useJwt != null && "true".equalsIgnoreCase(useJwt.trim())) {

    endpoints.tokenStore(tokenStore()).tokenEnhancer(jwtConeverter())

    .authenticationManager(authenticationManager);

    } else {

    endpoints.authenticationManager(authenticationManager);

    }

    }

    ```


    To start the authorization server, use the following command from the `ch12/sample01/`
    directory to spin up the `TokenService` microservice, which now issues self-contained
    access tokens (JWTs).


    ```

    \> mvn spring-boot:run

    ```


    To get an access token using the client credentials OAuth 2.0 grant type, use
    the following command. Be sure to replace the values of `$CLIENTID` and `$CLIENTSECRET`
    appropriately.


    ```

    \> curl -v -X POST --basic -u $CLIENTID:$CLIENTSECRET -H "Content-Type: application/x-www-form-urlencoded;charset=UTF-8"
    -k -d "grant_type=client_credentials&scope=foo" https://localhost:8443/oauth/token

    ```


    This command will return a base64-url-encoded JWT, and the following shows the
    decoded version.


    ```

    { "alg": "RS256", "typ": "JWT" }

    { "scope": [ "foo" ], "exp": 1524793284, "jti": "6e55840e-886c-46b2-bef7-1a14b813dd0a",
    "client_id": "10101010" }

    ```


    Only the decoded header and the payload are shown here; we are skipping the signature
    (which is the third part of the JWT). Since we used the `client_credentials` grant
    type, the JWT does not include a subject or username. It also includes the scope
    values associated with the token.'
