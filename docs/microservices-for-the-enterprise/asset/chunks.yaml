    授权服务器的职责是向其客户端颁发令牌，并响应来自下游微服务的验证请求。它还扮演着安全令牌服务（STS）的角色，如图 12-1 所示。目前有许多开源的 OAuth
    2.0 授权服务器可供选择：WSO2 Identity Server、Keycloak、Gluu 等等。在生产环境中，你可以使用其中任意一种，但在此示例中，我们将使用
    Spring Boot 搭建一个简单的 OAuth 2.0 授权服务器。它本身也是一个微服务，在开发者测试中非常实用。授权服务器对应的代码位于 `ch12/sample01`
    目录下。


    首先，我们来看一下 `ch12/sample01/pom.xml` 中值得关注的 Maven 依赖。这些依赖引入了一组新的注解（`@EnableAuthorizationServer`
    注解和 `@EnableResourceServer` 注解），用于将 Spring Boot 应用转变为 OAuth 2.0 授权服务器。


    ```

    org.springframework.boot

    spring-boot-starter-security


    org.springframework.security.oauth

    spring-security-oauth2


    ```


