  trans: '

    #### 超时


    如今我们构建的几乎所有应用都会通过网络进行远程调用。这可能是对 Web 服务端点的 HTTP 请求、通过 JDBC 的数据库调用，或是对 LDAP 服务器的身份验证请求。任何网络通信都不可靠；因此，我们不应无限期地等待远程端点的响应。例如，在数据库连接中，如果我们决定无限期等待直到收到响应，那么在该等待期间，就会有一个连接从数据库连接池中被占用。如果再有几个类似的连接，应用程序的整体性能就会开始下降。


    超时决定了我们愿意等待响应的时间。对于我们微服务发出的每一次远程调用，都必须设置超时。超时时间过长或过短都无济于事。找出最佳值将是一个学习过程。请确保每次连接超时时都记录一条日志。这有助于将来调整超时值。


    让我们看看这在实践中是如何发生的。从我们的客户门户网站，为了根据登录用户之前的订单模式为其加载建议，我们需要调用`客户建议`微服务。该服务必须与内部数据库通信以加载建议。如果与数据库的连接超时，我们应该返回什么？如果我们以面向恢复的开发思维来构建微服务，就不应该仅仅返回一个错误，而应该返回一组默认建议，这不会破坏客户门户网站的任何功能。从业务角度来看，这可能效率不高，但从最终用户的体验角度来看，这是一个值得遵循的良好模式。


    #### 断路器


    断路器通过控制电流来保护电器（见图 2-14）。如果电流高于某个阈值，断路器就会切断电流，保护其后的电器免受损坏。断路器模式将这一概念引入了软件世界。如果我们的微服务对某个端点持续超时，那么至少在一段时间内，继续尝试是没有意义的。断路器模式建议将此类操作封装在一个组件中，当系统不健康时，该组件可以规避调用。该组件会维护一个故障阈值，一旦达到阈值，就会断开电路；不再对封装的操作进行任何调用。它还可能等待一段配置好的时间间隔，然后闭合电路，以检查操作是否还会返回错误；如果不再返回错误，则会为后续所有操作保持电路闭合。


    ![../images/461146_1_En_2_Chapter/461146_1_En_2_Fig14_HTML.jpg](img/461146_1_En_2_Fig14_HTML.jpg)


    图 2-14


    MCB（微型断路器），主要用于家庭


    #### 隔板


    隔板主要用于船舶，以建造水密隔舱，这样如果一个隔舱进水，人们可以转移到另一个隔舱以确保安全。一个隔舱的损坏不会导致整艘船沉没，因为各隔舱是相互隔离的。


    隔板模式借鉴了同样的概念。该模式强调了如何分配资源，例如线程池，即用于出站连接的连接池。如果我们为所有出站端点使用一个单一的线程池，那么如果某个端点响应缓慢，将相应线程释放回池中就需要更多时间。如果这种情况持续发生，也会影响发往其他端点的请求，因为越来越多的线程正在等待那个慢速端点。遵循隔板模式，我们可以为每个端点（或者以某种逻辑方式将它们分组）设置一个线程池。这可以防止一个不良端点的问题蔓延到其他健康的端点。隔板模式通过划分容量，在发生故障时保留部分功能。


    #### 稳态


    稳态模式强调了遵循一种设计理念的必要性，该设计能让系统长时间稳定运行，而无需频繁干预。每次运维团队接触系统时，无论他们经验多么丰富，都会增加引入新错误的可能性。2017
    年 3 月，AWS（亚马逊云服务）发生了一次大规模宕机。这次 AWS S3 系统长达四小时的宕机导致美国各地出现中断、速度减慢和加载失败错误。亚马逊后来发布^(⁴)了问题的原因，这是一个微不足道的人为错误。一名获得授权的
    S3 团队成员使用既定的操作手册执行了一条命令，该命令本意是移除 S3 计费流程所使用的某个 S3 子系统中的少量服务器。不幸的是，命令的某个输入参数被错误地输入，导致移除的服务器数量远超预期。


    系统的设计必须尽可能减少人为干预。从开发到部署的一切都必须自动化。这包括清理生产服务器上积累的资源。最好的例子就是日志。不断积累的日志文件很容易填满文件系统。本章稍后我们将讨论一种在微服务部署中有效管理日志的方法。


    我们还习惯将临时状态和有时效的令牌存储在数据库中，这会导致数据库随着时间的推移而急剧增长。即使这些令牌和临时状态已不再有效，它们仍然留在数据库中，占用空间并拖慢系统速度。系统设计应该有一种通过自动化进程定期清理此类数据的方法。


    内存缓存是另一个需要关注的领域。在运行系统中，内存是一种有限且宝贵的资源。让内存缓存无限增长会导致系统性能下降，最终系统将耗尽内存。始终建议为缓存设置一个上限（以缓存中的元素数量计），并采用
    LRU（最近最少使用）策略进行清理。使用最近最少使用策略，当缓存达到上限时，最近最少使用的元素将被淘汰，为新元素腾出空间。定期刷新是另一种清理缓存的策略。


    稳态模式指出，对于每个积累资源的机制，必须有另一个机制来回收该资源。


    #### 快速失败


    快速失败模式强调了在请求执行流程的早期就判断其是否会失败或被拒绝的必要性。例如，如果负载均衡器已经知道某个节点宕机，那么反复向其发送请求以检查其是否恢复是没有意义的。相反，在收到该节点有效的心跳信号之前，可以将其标记为故障节点。断路器模式也可以用来实现快速失败策略。通过断路器模式，我们可以隔离故障端点，任何发往此类端点的请求都可以在不重试的情况下被拒绝，直到断路器决定是时候重新检查为止。

    '
- fmt: '### Let It Crash


    There are many cases where doctors decide to cut off the leg of a person after
    a serious accident to save that person’s life. This helps to prevent propagating
    serious damage from the leg to the other parts of the body. In the Erlang^([⁵](#fn5))
    world, this is called the “let it crash” philosophy. It may be useful at sometimes
    to abandon a subsystem to preserve the stability of the overall system. The let
    it crash approach suggests getting back to a clean startup as rapidly as possible,
    in case the recovery is difficult and unreliable due to a failure. This is a very
    common strategy in microservice deployments. A given microservice addresses a
    limited scope of the overall system, and taking it down and booting up again will
    have a minimal impact on the system. This is being well supported by the one microservice
    per host strategy with containers. Having a rapid server startup time, probably
    a few milliseconds, is also a key aspect in making this strategy successful.


    ### Handshaking


    Handshaking is mostly used to share requirements between two parties to establish
    a communication channel. This happens prior to establishing a TCP (transmission
    control protocol) connection, which is commonly known as the TCP three-way handshake.
    Also, we see a handshake before establishing a TLS (transport layer security)
    connection. These are the two most popular handshaking protocols in computer science.
    The handshaking pattern suggests the use of a handshake by the server to protect
    it by throttling its own workload. When a microservice is behind a load balancer,
    it can use this handshaking technique to inform the load balancer whether it is
    ready to accept more requests or not. Each server hosting the microservice can
    provide a lightweight health check endpoint. The load balancer can periodically
    ping this endpoint and see whether the corresponding microservice is ready to
    accept requests.


    ### Test Harness


    All the failures in a distributed system are hard to catch, either in development
    testing or in QA (quality assurance) testing. Integration testing possibly looks
    like a better option, but it has its own limitations. Most of the time we build
    integration tests as per a specification provided by the corresponding service
    endpoint. Mostly it covers success scenarios, and even in failure cases it defines
    what exactly to expect, for example the error codes. Not all the systems all the
    time work as per the specifications. The test harness pattern suggests an approach
    for integration testing that would allow us to test most of the failure modes,
    even outside the service specifications.


    The test harness is another remote endpoint that represents each of the remote
    endpoints you need to connect from your microservice. The difference between the
    test harness and the service endpoint is that the test harness is just for testing
    failures and it does not worry about the application logic. Test harness has to
    be written so that it is capable of generating all sorts of errors covering all
    seven layers of the OSI (open systems interconnection) model. For example, the
    test harness may send connection refused responses, invalid TCP packets, slow
    responses, responses with incorrect content types (XML instead of JSON), and many
    other errors, that we would never expect from the service endpoint under normal
    circumstances.


    ### Shed Load


    If we look at the way TCP (transmission control protocol) works, it provides a
    listen queue per port. When the connections are flooded against a given port,
    then all of them will be queued. Each pool has a maximum limit and when the limit
    is reached, no more connections will be accepted. When the queue is full, any
    new attempt to establish a connection will be rejected with an ICMP RST (reset)
    packet. This is how TCP sheds load at the TCP layer. The applications running
    on top of the TCP layer will pull requests from the TCP connection pool. In practice,
    most of the applications are exhausted with connections before the TCP connection
    pool reaches its maximum. The shed load pattern suggests that the applications
    or the services also should be modeled after TCP.


    The application should shed load when it finds out that it is running behind a
    given SLA (service level agreement). Usually when the applications are exhausted
    and the running threads are blocked on certain resources, the response time starts
    to degrade. Such indicators help show whether a given service is running behind
    an SLA. If so, this pattern advocates shedding load or notifying the load balancer
    that the service is not ready to accept more requests. This can be combined with
    the handshaking pattern to build a better solution.


    ## Observability


    Collecting data is cheap, but not having it when you need it can be expensive.
    In March 2016, Amazon was down for 20 minutes and the estimated revenue loss was
    $3.75 million. In January 2017, there was a system outage at Delta Airlines that
    caused cancellation of more than 170 flights and resulted in an estimated loss
    of $8.5 million. In both these cases, if they had the right level of data collected,
    they could have predicted such behavior or recovered from it as soon as it happened
    by identifying the root cause. The more information we have, the better decisions
    we can make.


    Observability is a measure of how well internal states of a system can be inferred
    from knowledge of their external outputs^([⁶](#fn6)). A company I know used to
    monitor its employees effective time at work, by calculating the time difference
    between ins and outs when they swipe the ID card at the front door. This strategy
    is effective only if all the employees support it or make themselves observable.
    At the end of each week the Human Resource (HR) department used to send the effective
    work time by date to each employee. In most of the cases, figures were completely
    incorrect. The reason is that most people would go out in groups for lunch and
    tea, and when they would go out and come in, only one person would swipe the card
    to open the door. Even though we have monitoring in place, it didn’t produce the
    expected results, as the employees were not cooperating or observable.


    There is another company I know that used to track its employees’ in and out times,
    the places they worked from within the company, by the time they connected to
    the company’s wireless network, and the location of the wireless endpoint. Even
    with this approach, we are not tracking employees, but their laptops. We can keep
    our laptops on our desks and spend the day at the ping-pong table—or go shopping
    and come back to take the laptop home. Both of these examples highlight one important
    fact—monitoring is only effective if we have an observable system in place.


    Observability is one of the most important aspects that needs to be baked into
    any microservices design. We may need to track throughput of each microservice,
    the number of success/failed requests, utilization of CPU, memory and other network
    resources, and some business related metrics. Chapter [13](#461146_1_En_13_Chapter.xhtml),
    “Observability”, includes a detailed discussion on the observability of microservices.'
