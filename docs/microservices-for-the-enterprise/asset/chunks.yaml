  trans: '

    ### API


    将业务功能作为托管服务或 API 公开已成为现代企业架构的关键需求。然而，由于 Web 服务相关技术（如 SOAP（服务间通信的消息格式）、WS-Security（保障服务间消息安全）、WSDL（定义服务契约）等）的复杂性，以及缺乏围绕
    API 构建生态系统（如自助服务等）的特性，Web 服务/SOA 并非满足此类需求的理想方案。


    因此，大多数组织会在现有 SOA 实现之上增加一个新的 API 管理/API 网关层。这一层被称为*API 外观层*，它为特定业务功能提供简单的 API，并隐藏
    ESB/Web 服务层的所有内部复杂性。API 层还用于安全、限流、缓存和货币化。


    例如，图 1-3 在 ESB 层之上引入了一个 API 网关。我们的在线零售应用提供的所有业务能力现在都以托管 API 的形式公开。API 管理层不仅将功能作为托管
    API 公开，还能构建一个包含业务能力及其消费者的完整生态系统。


    ![../images/461146_1_En_1_Chapter/461146_1_En_1_Fig3_HTML.jpg](img/461146_1_En_1_Fig3_HTML.jpg)


    图 1-3

    通过 API 网关层将业务功能作为托管 API 公开


    随着对复杂业务能力需求的增长，单体架构已无法满足现代企业软件应用开发的需求。单体应用的集中式特性导致应用无法独立扩展、应用间依赖阻碍独立开发与部署、集中式架构带来的可靠性问题，以及应用开发技术选型的局限性。为了克服这些限制并满足现代、复杂且去中心化的应用需求，必须构思一种新的架构范式。


    微服务架构作为一种更优的架构范式应运而生，旨在克服 ESB/SOA 架构以及传统单体应用架构的缺陷。


    ## 什么是微服务？


    微服务架构的基础在于将单个应用开发为一组小型独立服务的集合，这些服务运行在各自的进程中，并可独立开发和部署。


    如图 1-4 所示，通过将单体应用层拆分为独立且面向业务功能的服务，在线零售软件应用可以转变为微服务架构。同时，我们通过将中央 ESB 的功能分解到各个服务中，从而摆脱了中央
    ESB，使服务自行处理服务间通信和组合逻辑。


    ![../images/461146_1_En_1_Chapter/461146_1_En_1_Fig4_HTML.jpg](img/461146_1_En_1_Fig4_HTML.jpg)


    图 1-4

    使用微服务架构构建的在线零售应用


    因此，微服务层中的每个微服务都提供定义明确的业务能力（最好范围较小），这些服务可独立设计、开发、部署和管理。


    尽管其通信的 ESB 和服务层发生了变化，但 API 管理层基本保持不变。API 网关和管理层将业务功能作为托管 API 公开；我们还可以选择将网关细分为基于每个
    API 的独立运行时。


    既然您已对微服务架构有了基本了解，我们可以深入探讨微服务的主要特性。


    ### 面向业务能力


    微服务架构的关键概念之一是，服务必须基于业务能力进行设计，以便特定服务服务于特定业务目的，并具有明确定义的职责集合。特定服务应专注于只做一件事，并把它做好。


    理解粗粒度服务（例如在 SOA 上下文中开发的 Web 服务）或细粒度服务（未映射到业务能力）并不适合微服务架构，这一点至关重要。相反，服务的规模应完全基于范围和业务功能来确定。同时请记住，将服务划分得过于细小（即面向映射到业务能力的细粒度特性）被视为一种反模式。


    在示例场景中，我们在 SOA/Web 服务实现中拥有粗粒度服务，如`Product`、`Order`等（见图 1-3）。当转向微服务时，我们识别出一组更细粒度但仍面向业务能力的服务，例如`Product
    Details`、`Order Processing`、`Product Search`、`Shopping Cart`等。


    服务的规模绝不取决于代码行数或参与该服务开发的人数。单一职责原则（SRP）、康威定律、十二要素应用、领域驱动设计（DDD）等概念，对于识别和设计微服务的范围与功能非常有用。我们将在第
    2 章“设计微服务”中讨论围绕业务能力设计微服务的这些关键概念和基础。

    '
- fmt: '### Autonomous : Develop, Deploy, and Scale Independently


    Having autonomous services could well be the most important driving force behind
    the realization of the microservices architecture. Microservices are developed,
    deployed, and scaled as independent entities. Unlike web services or a monolithic
    application architecture, services don’t share the same execution runtime. Rather
    they are deployed as isolated runtimes by leveraging technologies such as containers.
    The successful and increasing adaptation of containers and container management
    technologies such as `Docker`, `Kubernetes`, and `Mesos` are vital for the realization
    of service autonomy and contribute to the success of the microservices architecture
    as a whole. We dig deep into the deployment aspect of microservices in Chapter
    [8](#461146_1_En_8_Chapter.xhtml), “Deploying and Running Microservices”.


    The autonomous services ensure the resiliency of the entire system as we have
    isolated the failures along with service isolation. These services are loosely
    coupled through messaging via inter-service communication over the network. The
    inter-service communication can be built on top of various interaction styles
    and message formats (we cover these things in detail in Chapter [3](#461146_1_En_3_Chapter.xhtml),
    “Inter-Service Communication”). They expose their APIs via technology-agnostic
    service contracts and consumers can use those contracts to collaborate with that
    service. Such services may also be exposed as managed APIs via an API gateway.


    The independent deployment of services provides the innate ability to scale services
    independently. As the consumption of business functionalities varies, we can scale
    the microservices that get more traffic without scaling other services.


    We can observe these microservices’ characteristics in our e-commerce application
    use case, which is illustrated in Figure [1-3](#461146_1_En_1_Chapter.xhtml#Fig3).
    The coarse-grained services, such as `Product`, `Order`, etc., share the same
    application server runtime as in the SOA/Web Services approach. So, a failure
    (such as out of memory or CPU spinning) in one of those services could blow off
    the entire application server runtime. Also, in many cases the functionalities
    such as product search may be very frequently used compared to other functionalities.
    With the monolithic approach, you can’t scale the product searching functionalities
    because it shares the same application server runtime with other services (you
    have to share the entire application server runtime instead). As illustrated in
    Figure [1-4](#461146_1_En_1_Chapter.xhtml#Fig4), the segregation of these coarse-grained
    services into microservices makes them independently deployable, isolates failures
    into each service level, and allows you to independently scale a given microservice
    depending how it is consumed.


    ### No Central ESB: Smart Endpoints and Dumb Pipes


    The microservices architecture fosters the elimination of the Enterprise Service
    Bus (ESB). The ESB used to be the where most of the smarts lived in the SOA/Web
    Services based architecture. The microservices architecture introduces a new style
    of service integration called *smart endpoints and dumb pipes* instead of using
    an ESB. As discussed earlier in this chapter, most of the business functionalities
    are implemented at the ESB level through the integration or plumbing of the underlying
    services and systems. With *smart endpoints and dumb pipes*, all the business
    logic (which includes the inter-service communication logic) resides at each microservice
    level (they are the *smart-endpoints*) and all such services are connected to
    a primitive messaging system (a *dumb pipe*), which doesn’t have any business
    logic.


    Most naive microservices adopters think that by just transforming the system into
    a microservices architecture, they can simply get rid of all the complexities
    of the centralized ESB architecture. However, the reality is that with microservices
    architecture, the centralized capabilities of the ESB are dispersed into all the
    microservices. The capabilities that the ESB has offered now have to be implemented
    at the microservices level.


    So, the key point here is that the complexity of the ESB won’t go away. Rather
    it gets distributed among all the microservices that you develop. The microservices
    compositions (using synchronous or asynchronous styles), inter-services communication
    via different communication protocols, application of resiliency patterns such
    as circuit breakers, integrating with other applications, SaaS (e.g., `Salesforce`),
    APIs, data and proprietary systems, and observability of integrated services need
    to be implemented as part of the microservices that you develop. In fact, the
    complexity of creating compositions and inter-services communication can be more
    challenging due to the number of services that you have to deal with in a microservices
    architecture (services are more prone to errors due to the inter-service communications
    over the network).


    Most of the early microservices adopters such as Netflix just implemented most
    of these capabilities from scratch. However, if we are to fully replace ESB with
    a microservices architecture, we have to select specific technologies to build
    those ESB’s capabilities at our microservices level rather re-implementing them
    from scratch.


    We will take a detailed look at all these requirements and discuss some of the
    available technologies to realize them in Chapter [3](#461146_1_En_3_Chapter.xhtml),
    “Inter-service Communication” and Chapter [7](#461146_1_En_7_Chapter.xhtml), “Integrating
    Microservices”.'
  raw: '### Autonomous : Develop, Deploy, and Scale Independently


    Having autonomous services could well be the most important driving force behind
    the realization of the microservices architecture. Microservices are developed,
    deployed, and scaled as independent entities. Unlike web services or a monolithic
    application architecture, services don’t share the same execution runtime. Rather
    they are deployed as isolated runtimes by leveraging technologies such as containers.
    The successful and increasing adaptation of containers and container management
    technologies such as Docker, Kubernetes, and Mesos are vital for the realization
    of service autonomy and contribute to the success of the microservices architecture
    as a whole. We dig deep into the deployment aspect of microservices in Chapter
    [8](#461146_1_En_8_Chapter.xhtml), “Deploying and Running Microservices”.


    The autonomous services ensure the resiliency of the entire system as we have
    isolated the failures along with service isolation. These services are loosely
    coupled through messaging via inter-service communication over the network. The
    inter-service communication can be built on top of various interaction styles
    and message formats (we cover these things in detail in Chapter [3](#461146_1_En_3_Chapter.xhtml),
    “Inter-Service Communication”). They expose their APIs via technology-agnostic
    service contracts and consumers can use those contracts to collaborate with that
    service. Such services may also be exposed as managed APIs via an API gateway.


