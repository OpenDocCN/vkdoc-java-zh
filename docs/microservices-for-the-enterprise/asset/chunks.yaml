- fmt: '### Configuration Server


    在[第2章](#461146_1_En_2_Chapter.xhtml)中，关于12-Factor应用，我们讨论了*配置*因素强调了将环境特定设置与代码解耦到配置中的必要性。例如，LDAP或数据库服务器的连接URL是环境特定的参数和证书。Spring
    Boot提供了一种通过配置服务器在微服务之间共享配置的方式。多个微服务实例可以连接到该服务器，并通过HTTP加载配置。配置服务器可以在其本地文件系统中维护配置，也可以从Git加载。从Git加载是理想的方法。配置服务器本身是另一个Spring
    Boot应用。你可以在`ch04/sample02`中找到配置服务器的代码。


    让我们看看添加到`ch04/sample02/pom.xml`中的一些额外值得注意的Maven依赖。`spring-cloud-config-server`依赖引入了将所有组件转化为配置服务器所需的Spring
    Boot应用。


    ```

    org.springframework.cloud

    spring-cloud-config-server

    ```


    要将Spring Boot应用转化为配置服务器，你只需要在`src/main/java/com/apress/cho4/sample02/ConfigServerApp.java`中添加一个类级别的注解，如下代码片段所示。`@EnableConfigServer`注解将完成Spring模块之间的所有内部连接，以将Spring
    Boot应用暴露为配置服务器。这是我们唯一需要的代码。


    ```

    @SpringBootApplication

    @EnableConfigServer

    public class ConfigServerApp {

    public static void main(String[] args) {

    SpringApplication.run(ConfigServerApp.class, args);

    }

    }

    ```


    在此示例中，配置服务器从本地文件系统加载配置。你会发现以下两个属性被添加到`src/main/resources/application.properties`文件中，以将服务器端口更改为9000，并为配置服务器使用`native`配置文件。当使用`native`配置文件时，配置从本地文件系统加载，而不是从Git加载。


    ```

    server.port=9000

    spring.profiles.active=native

    ```


    现在，我们可以在`src/main/resources`目录中为每个微服务创建属性文件。你将在`src/main/resources/sample01.properties`文件中找到以下内容，该文件可用于定义给定微服务所需的所有配置参数。


    ```

    database.connection = jdbc:mysql://localhost:3306/sample01

    ```


    现在，让我们使用以下命令启动配置服务器。首先构建项目，然后通过Maven插件启动服务器。


    ```

    \> cd sample02

    \> mvn clean install

    \> mvn spring-boot:run

    ```


    使用以下cURL命令加载与`sample01`微服务相关的所有配置。


    ```

    \> curl http://localhost:9000/sample01/default

    {

    "name":"sample01",

    "profiles":[

    "default"

    ],

    "label":null,

    "version":null,

    "state":null,

    "propertySources":[

    {

    "name":"classpath:/sample01.properties",

    "source":{

    "database.connection":"jdbc:mysql://localhost:3306/sample01"

    }

    }

    ]

    }

    ```


    ### 消费配置


    在本节中，我们将了解如何在另一个微服务中消费从外部配置加载的属性。你可以在`ch04/sample03`中找到此微服务的代码。它实际上是`sample01`的一个略微修改版本。让我们从查看`ch04/sample03/pom.xml`中额外值得注意的Maven依赖开始。`spring-cloud-starter-config`依赖引入了将所有从远程配置服务器读取的属性值绑定到本地变量所需的组件。


    ```

    org.springframework.cloud

    spring-cloud-starter-config

    ```


    以下代码片段显示了修改后的`sample03/src/main/java/com/apress/ch04/sample03/service/OrderProcessing.java`类，其中`dbUrl`变量被绑定到`database.connection`属性（通过`@Value`注解），并从配置服务器读取。属性在启动时从配置服务器加载，因此我们需要确保在启动此微服务之前配置服务器已启动并运行。


    ```

    @RestController

    @RequestMapping(value = "/order")

    public class OrderProcessing {

    @Value("${database.connection}")

    String dbUrl;

    @RequestMapping(value = "/{id}", method = RequestMethod.GET)

    public ResponseEntity checkOrderStatus

    (@PathVariable("id") String orderId) {

    // print the value of the dbUrl

    // loaded from configuration server

    System.out.println("DB Url: " + dbUrl);

    return ResponseEntity.ok("{''status'' : ''shipped''}");

    }

    }

    ```


    要为配置服务器URL设置值，我们需要将以下属性添加到`src/main/resources/bootstrap.properties`中。


    ```

    spring.cloud.config.uri=http://localhost:9000

    ```


    我们还需要将`spring.application.name`属性添加到`src/main/resources/application.properties`中，其值对应于配置服务器中的属性文件名。


    ```

    spring.application.name=sample03

    ```


    现在，让我们使用以下命令启动配置客户端。首先构建项目，然后通过Maven插件启动服务器。此外，我们需要确保我们已经运行了上一节中讨论的配置服务。


    ```

    \> cd sample03

    \> mvn clean install

    \> mvn spring-boot:run

    ```


    使用以下cURL命令加载与`sample03`微服务相关的所有配置。


    ```

    \> curl http://localhost:8080/order/11

    ```


    如果一切正常，你将在运行Spring Boot服务（`sample03`）的命令控制台中找到以下输出。


    ```

    DB Url: jdbc:mysql://localhost:3306/sample03

    ```'
  raw: '### Configuration Server


    In Chapter [2](#461146_1_En_2_Chapter.xhtml), under the 12-factor app, we discussed
    that the *configuration* factor emphasizes the need to decouple environment-specific
    settings from the code to configuration. For example, the connection URL of the
    LDAP or the database server are environment-specific parameters and certificates.
    Spring Boot provides a way to share the configuration between microservices via
    a configuration server. Multiple instances of microservices can connect to this
    server and, over HTTP, load the configuration. The configuration server can either
    maintain the configuration in its own local filesystem or load from Git. Loading
    from Git would be the ideal approach. The configuration server itself is another
    Spring Boot application. You can find the code for the configuration server inside
    `ch04/sample02`.


    Let’s look at some of the additional notable Maven dependencies added to `ch04/sample02/pom.xml`.
    The `spring-cloud-config-server` dependency brings all the components to turn
    a Spring Boot application into a configuration server.


    ```

    org.springframework.cloud

    spring-cloud-config-server


    ```


    To turn a Spring Boot application into a configuration server, you only need to
    add one class-level annotation to `src/main/java/com/apress/cho4/sample02/ConfigServerApp.java`,
    as shown in the following code snippet. The `@EnableConfigServer` annotation will
    do all the internal wiring between the Spring modules to expose the Spring Boot
    application as a configuration server. This is the only code we need.


    ```

    @SpringBootApplication

    @EnableConfigServer

    public class ConfigServerApp {

    public static void main(String[] args) {

    SpringApplication.run(ConfigServerApp.class, args);

    }

    }

    ```


    In this example, the configuration server loads the configuration from the local
    filesystem. You will find that the following two properties are added to the `src/main/resources/application.properties`
    file to change server port to 9000 and to use the `native` profile for the configuration
    server. When the `native` profile is used, the configurations are loaded from
    the local filesystem, not from Git.


    ```

    server.port=9000

    spring.profiles.active=native

    ```


    Now we can create property files inside the `src/main/resources` directory for
    each microservice. You will find the following content in the `src/main/resources/sample01.properties`
    file, which can be used to define all the configuration parameters required for
    a given microservice.


    ```

    database.connection = jdbc:mysql://localhost:3306/sample01

    ```


    Now, let’s start our configuration server with the following commands. First we
    build the project, and then launch the server via the Maven plugin.


    ```

    \> cd sample02

    \> mvn clean install

    \> mvn spring-boot:run

    ```


    Use the following cURL command to load all the configurations related to the `sample01`
    microservice.


    ```

    \> curl http://localhost:9000/sample01/default

    {

    "name":"sample01",

    "profiles":[

    "default"

    ],

    "label":null,

    "version":null,

    "state":null,

    "propertySources":[

    {

    "name":"classpath:/sample01.properties",

    "source":{

    "database.connection":"jdbc:mysql://localhost:3306/sample01"

    }

    }

    ]

    }

    ```


    ### Consuming Configurations


    In this section, we see how to consume a property loaded from an external configuration
    within another microservice. You can find the code for this microservice inside
    `ch04/sample03`. It is in fact a slightly modified version of `sample01`. Let’s
    start by looking at `ch04/sample03/pom.xml` for the additional notable Maven dependencies.
    The `spring-cloud-starter-config` dependency brings all the components required
    to bind the property values read from the remote configuration server to local
    variables.


    ```

    org.springframework.cloud

    spring-cloud-starter-config


    ```


    The following code snippet shows the modified `sample03/src/main/java/com/apress/ch04/sample03/service/OrderProcessing.java`
    class, where the `dbUrl` variable is bound to the `database.connection` property
    (via `@Value` annotation) and is read from the configuration server. The properties
    are loaded from the configuration server at the startup, so we need to make sure
    the configuration server is up and running before we start this microservice.


    ```

    @RestController

    @RequestMapping(value = "/order")

    public class OrderProcessing {

    @Value("${database.connection}")

    String dbUrl;

    @RequestMapping(value = "/{id}", method = RequestMethod.GET)

    public ResponseEntity checkOrderStatus

    (@PathVariable("id") String orderId) {

    // print the value of the dbUrl

    // loaded from configuration server

    System.out.println("DB Url: " + dbUrl);

    return ResponseEntity.ok("{''status'' : ''shipped''}");

    }

    }

    ```


    To set a value for the configuration server URL, we need to add the following
    property to `src/main/resources/bootstrap.properties`.


    ```

    spring.cloud.config.uri=http://localhost:9000

    ```


    We also need to add the `spring.application.name` property to `src/main/resources/application.properties`
    with a value corresponding to a property filename in the configuration server.


    ```

    spring.application.name=sample03

    ```


    Now, let’s start our configuration client with the following commands. First we
    build the project, and then we launch the server via the Maven plugin. Also, we
    need to make sure that we already have the configuration service running, which
    we discussed in the previous section.


    ```

    \> cd sample03

    \> mvn clean install

    \> mvn spring-boot:run

    ```


    Use the following cURL command to load all the configurations related to the `sample03`
    microservice.


    ```

    \> curl http://localhost:8080/order/11

    ```


    If it all works fine, you will find the following output in the command console,
    which runs the Spring Boot service (`sample03`).


    ```

    DB Url: jdbc:mysql://localhost:3306/sample03

    ```'
