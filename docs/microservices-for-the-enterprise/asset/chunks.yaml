- fmt: '# Spring Boot and Docker Integration


    Spring Boot is meant to be deployed and run on containers. It offers plugins that
    allow you to create docker images from the Spring Boot service that you develop.
    You can create the Docker image by creating the required `Dockerfile` and adding
    the `docker-file` Maven plugin to the project build phase. For example, the `Dockerfile`
    will look as follows:


    ```

    FROM openjdk:8-jdk-alpine

    VOLUME /tmp

    ARG JAR_FILE

    COPY ${JAR_FILE} app.jar

    ENTRYPOINT ["java","-Djava.security.egd=file:/dev/./urandom","-jar","/app.jar"]

    ```


    You can add the `docker-file` plugin^([^(116)](#fn116)) to your `pom` file of
    your project. The complete code example is in the `ch08/sample07` directory.


    When it comes to Spring Boot runtime, it uses an embedded web server such as Tomcat
    to deploy and boot up your services. So you can easily start a microservice with
    its embedded Tomcat runtime. Although the startup time and memory footprint are
    relatively high (several seconds), still we can consider Spring Boot a container
    native technology.


    # Ballerina: Docker and Kubernetes Integration


    We introduced Ballerina in Chapter [7](#461146_1_En_7_Chapter.xhtml), “Integrating
    Microservices,” and it also offers some container-native capabilities as part
    of the language extensions. The developers can generate the deployment artifacts
    for the Ballerina code just by annotating code with suitable annotations of a
    deployment method of their choice. For example, in the following code snippet,
    we annotate code with Kubernetes annotations to generate deployment artifacts.


    ```

    import ballerina/http;

    import ballerinax/kubernetes;

    @kubernetes:Deployment {

    enableLiveness: true,

    singleYAML: true

    }

    @kubernetes:Ingress {

    hostname: "abc.com"

    }

    @kubernetes:Service {name: "hello"}

    endpoint http:Listener helloEP {

    port: 9090

    };

    @http:ServiceConfig {

    basePath: "/helloWorld"

    }

    service helloWorld bind helloEP {

    sayHello(endpoint outboundEP, http:Request request) {

    http:Response response = new;

    response.setTextPayload("Hello, World from service helloWorld ! \n");

    _ = outboundEP->respond(response);

    }

    }

    ```


    During the Ballerina build phase, it will generate Docker images and respective
    Kubernetes deployment artifacts. The complete code example is in the `ch08/sample08`
    directory. Ballerina deployment choices are so diverse so that you can deploy
    it in a conventional virtual machine (VM) or bare metal servers, Docker, Kubernetes
    and on a service mesh, if you are using a Service Mesh such as Istio.


    # Continuous Integration, Delivery, and Deployment


    One of the key rationales behind microservice architecture is less time to production
    and shorter feedback cycles. One cannot meet such goals without automation. A
    good microservices architecture will only look good on paper (or on a whiteboard),
    if not for the timely advancements in DevOps and tooling around automation. Microservices
    came as a good idea, as they have all the tooling support at the time they started
    to become mainstream, in the form of Docker, Ansible, Puppet, Chef, and many more.
    Tooling around automation can be divided into two broader categories—continuous
    integration tools and continuous deployment tools.


    ## Note


    This article is a great source of information, and it includes ideas from different
    personalities on continuous integration, continuous deployment, and continuous
    delivery: [`https://bit.ly/2wyBLNW`](https://bit.ly/2wyBLNW) .


    ## Continuous Integration


    Continuous integration enables software development teams to work collaboratively,
    without stepping on each other''s toes, by automating builds and source code integration
    to maintain source code integrity. It also integrates with DevOps tools to create
    an automated code delivery pipeline. Continuous integration helps development
    teams avoid *integration hell* where the software works on individual developers’
    machines, but it fails when all developers integrate their code. Forrester, one
    of the top analyst firms, in its latest report^([^(117)](#fn117)) on continuous
    integration tools, identified the top ten tools in the domain: Atlassian Bamboo,
    AWS CodeBuild, CircleCI, CloudBees Jenkins, Codeship, GitLab CI, IBM UrbanCode
    Build, JetBrains TeamCity, Microsoft VSTS, and Travis CI.


    ## Continuous Delivery


    The continuous delivery tools bundle applications, infrastructure, middleware,
    and their supporting installation processes and dependencies into release packages
    that transition across the lifecycle. The objective of this is to keep the code
    in a deployable state all the time. The latest Forrester report on continuous
    delivery and release automation highlighted 15 most significant vendors in the
    domain: Atlassian, CA Technologies, Chef Software, Clarive, CloudBees, Electric
    Cloud, Flexagon, Hewlett Packard Enterprise (HPE), IBM, Micro Focus, Microsoft,
    Puppet, Red Hat, VMware, and XebiaLabs.


    However, if we look at the continuous delivery tools that are primarily supporting
    Kubernetes, the tools such as Weave Cloud^([^(118)](#fn118)), Spinnaker^([^(119)](#fn119))
    (by Netflix), Codefresh^([^(120)](#fn120)), Harness^([^(121)](#fn121)), and GoCD^([^(122)](#fn122))
    are quite popular.


    ## Continuous Deployment


    Continuous deployment is a process that takes the artifacts produced by the continuous
    delivery process and deploys into a production setup, ideally every time a developer
    updates the code! Organizations that follow continuous deployment practices deploy
    code into production more than one hundred times a day. Blue-green, A/B testing,
    and canary releases are the three main approaches or practices people follow in
    continuous deployment.


    ### Blue-Green Deployment


    Blue-green deployment is a proven strategy for introducing changes into a running
    system. It’s been around for almost a decade now, and it’s successfully used by
    many large enterprises. Under the blue-green strategy we maintain two close-to-identical
    deployments; one is called blue and the other one is green. At a given time either
    blue or green takes the live traffic—let’s say blue. Now, we have the green environment
    to deploy our changes and test. If all works fine, we redirect the live traffic
    from blue to green at the load balancer. Then green becomes the environment that
    takes live traffic, while blue becomes available to deploy new changes. If there
    is an issue, we can quite easily switch the environments, and therefore can automatically
    roll back the new changes.


    ### Canary Releases


    The concept behind the canary comes from a tactic used by coal miners. They used
    to bring canaries into the mines with them to monitor the level of carbon monoxide
    in the air. If a canary dies, that means the level of carbon monoxide in the air
    is high, so they leave the coalmine. With the canary releases, a build is first
    made available to a selected set of the audience (maybe 5% to 10% of the entire
    live traffic), and if it works well (or doesn’t die), then it’s made available
    to everyone. This minimizes the risk of introducing new changes, as the production
    roll out happens slowly, in smaller chunks.


    ### A/B Testing


    A/B testing is about evaluating the impact of a new change against the old system
    or evaluating the impact of two different changes simultaneously. This is mostly
    used to track user behavior due to some changes introduced to a website. For example,
    you may have one version of your website having enabled social login as an option
    for signup, and another without social login. Another example would be having
    different colors or placements for important messages on a website and seeing
    which one is clicked more. A/B testing is used to measure different competing
    functionalities of an application with live traffic. After some time only the
    winner stays and the other competing features will be rolled back.'
