  trans: '

    ### Dropwizard


    Dropwizard 是一个广泛用于 Java 微服务开发的框架。它以少量固执己见的胶水代码而闻名，这些代码将一组库整合在一起。Dropwizard 包含
    Jetty 用于处理 HTTP 请求。Jetty^(⁵⁴) 提供了一个 Web 服务器和 `javax.servlet` 容器，并支持 HTTP/2、WebSockets、OSGi、JMX、JNDI、JAAS^(⁵⁵)
    以及许多其他集成。Dropwizard 中对 REST 和 JAX-RS（JSR 311 和 JSR 339）的支持是通过 Jersey 实现的。Jersey^(⁵⁶)
    是 JAX-RS 的参考实现。它还集成了 Jackson^(⁵⁷) 用于 JSON 解析和构建，以及 Logback^(⁵⁸) 用于日志记录。Logback
    是流行的 log4j 项目的后继者。


    对指标的支持是任何微服务框架的关键特性，Dropwizard 嵌入了 Metrics^(⁵⁹) Java 库，用于收集与运行中应用程序相关的遥测数据。Dropwizard
    还嵌入了 Liquibase^(⁶⁰)，这是一个开源的、与数据库无关的库，用于跟踪、管理和应用数据库模式变更。它使得跟踪数据库变更更加容易，尤其是在敏捷软件开发环境中。Dropwizard
    的数据库集成是通过 Jdbi 和 Hibernate 完成的。Jdbi^(⁶¹) 构建在 JDBC 之上，旨在改进 JDBC 粗糙的接口，提供一个更自然的
    Java 数据库接口，易于绑定到你的领域数据类型。与 ORM（对象关系映射）不同，它并不旨在提供一个完整的对象关系映射框架——它没有隐藏复杂性，而是提供了构建块，让你可以根据应用程序的需要构建关系与对象之间的映射。Hibernate^(⁶²)
    是 Java 开发者使用的最流行的 ORM 框架。


    Dropwizard 的历史比 Spring Boot 更悠久。事实上，Spring Boot 的诞生正是受到了 Dropwizard 成功的启发。它由 Coda
    Hale^(⁶³) 于 2011 年底在 Yammer 工作时首次发布。然而，凭借更好的开发者体验、强大的社区支持以及 Pivotal 公司的支持，Spring
    Boot 现在已成为比 Dropwizard 更优的选择。


    ### Vert.x


    Vert.x^(⁶⁴) 是一个用于在 JVM（Java 虚拟机）上构建响应式^(⁶⁵) 应用程序的工具包，支持多种语言，包括 Java、JavaScript、Groovy、Ruby、Ceylon、Scala
    和 Kotlin。它由 Tim Fox 于 2012 年在 Eclipse 基金会下作为开源项目启动。即使在微服务成为主流之前，Vert.x 就已经拥有构建微服务的强大技术栈。与
    Dropwizard 不同，Vert.x 是一个非固执己见的工具包。换句话说，它不是一个限制性的框架或容器，不会向开发者宣扬编写应用程序的特定方式。相反，Vert.x
    提供了许多有用的积木，让开发者能够按照自己想要的方式创建自己的应用程序。


    与 Dropwizard 类似，Vert.x 也支持集成 Metrics，用于收集与运行中应用程序相关的遥测数据。此外，它还支持与 Hawkular^(⁶⁶)
    集成，这是一组旨在为常见监控问题提供通用解决方案的开源项目。对于服务发现，Vert.x 集成了 HashiCorp Consul^(⁶⁷)。Consul 使服务能够轻松地注册自身，并通过
    DNS 或 HTTP 接口发现其他服务。Vert.x 支持与多个消息代理集成——例如 Apache Kafka 和 RabbitMQ——以及多种消息协议——例如
    AMQP、MQTT、JMS 和 STOMP。


    总的来说，Vert.x 拥有一个强大的生态系统来构建微服务，但 Spring Boot 凭借 Spring 社区的强力支持，仍然略胜一筹。


    ### Lagom


    Lagom^(⁶⁸) 是一个开源的、固执己见的框架，用于基于响应式原则^(⁶⁹) 使用 Java 或 Scala 构建微服务系统。Lagom 是一个瑞典语单词，意为“恰到好处”或“足够”。它构建在
    Akka^(⁷⁰) 和 Play^(⁷¹) 框架之上。Akka 是一个用于构建高度并发、分布式、有弹性的消息驱动型应用程序的工具包，适用于 Java 和 Scala。Play
    是一个高生产力的 Java 和 Scala Web 应用程序框架，集成了现代 Web 应用程序开发所需的组件和 API。在 Lagom 中，微服务基于以下内容：


    *   *Akka Actors*——通过基于 *Actor 模型* 的共享无状态架构提供隔离性

    *   *Akka Cluster*——为构成微服务的各组独立隔离的服务实例提供弹性、分片、复制、可伸缩性和负载均衡

    *   *ConductR*——提供从底层硬件到微服务实例运行时的隔离和管理^(⁷²)。


    Lagom 基于三个设计原则：消息驱动和异步通信、分布式持久化以及开发者生产力。它将异步通信设为默认方式，默认的持久化模型使用事件溯源和 CQRS（在第 10
    章“API、事件和流”中讨论）——使用 Akka Persistence 和 Cassandra，这种方式非常易于扩展、复制，并能实现完全的弹性。


    Lagom 是一个有前途但相对较新的微服务框架。


    ## Spring Boot 入门


    在本节中，我们将了解如何从头开始使用 Spring Boot 开发微服务。我们还将看到如何在此过程中实现一些我们已学过的设计概念。要运行示例，你需要 Java
    8^(⁷³) 或更高版本、Maven 3.2^(⁷⁴) 或更高版本，以及一个 Git 客户端。成功安装它们后，在命令行中运行以下两个命令以确保一切正常。如果你在设置
    Java 或 Maven 时需要帮助，网上有大量资源可供参考。


    ```

    \>java -version

    java version "1.8.0_121" Java(TM) SE Runtime Environment (build 1.8.0_121-b13)

    Java HotSpot(TM) 64-Bit Server VM (build 25.121-b13, mixed mode)

    \>mvn -version

    Apache Maven 3.5.0 (ff8f5e7444045639af65f6095c62210b5713f426; 2017-04-03T12:39:06-07:00)

    Maven home: /usr/local/Cellar/maven/3.5.0/libexec

    Java version: 1.8.0_121, vendor: Oracle Corporation

    Java home: /Library/Java/JavaVirtualMachines/jdk1.8.0_121.jdk/Contents/Home/jre
    Default locale: en_US, platform encoding: UTF-8 OS name: "mac os x", version:
    "10.12.6", arch: "x86_64", family: "mac

    ```


    本书中使用的所有示例均可在 [`https://github.com/microservices-for-enterprise/samples.git`](https://github.com/microservices-for-enterprise/samples.git)
    Git 仓库中找到。使用以下 `git` 命令进行克隆。所有与本章相关的示例都位于 `ch04` 目录中。


    ```

    \> git clone https://github.com/microservices-for-enterprise/samples.git

    \> cd samples/ch04

    ```


    对于喜欢 Maven 的人来说，开始一个 Spring Boot 项目的最佳方式可能是使用 Maven 原型。不幸的是，这种方式已不再被支持。我们有一个选择是通过
    [`https://start.spring.io/`](https://start.spring.io/) 创建一个模板项目，这被称为 *Spring Initializer*。在那里，你可以选择要创建的项目类型、选择项目依赖项、为其命名，然后下载一个
    ZIP 格式的 Maven 项目。另一个选择是使用 Spring Tool Suite (STS)^(⁷⁵)。它是一个基于 Eclipse 平台构建的 IDE（集成开发环境），带有许多用于创建
    Spring 项目的有用插件。然而，在本书中，我们将为你提供 Git^(⁷⁶) 仓库中所有完整编码的示例。

