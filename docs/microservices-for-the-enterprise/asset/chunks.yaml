    在本节中，我们将了解如何在另一个微服务中消费从外部配置加载的属性。你可以在`ch04/sample03`中找到此微服务的代码。它实际上是`sample01`的一个略微修改的版本。让我们先看看`ch04/sample03/pom.xml`中其他值得注意的
    Maven 依赖。`spring-cloud-starter-config`依赖引入了将所有组件，用于将从远程配置服务器读取的属性值绑定到本地变量。


    ```

    org.springframework.cloud

    spring-cloud-starter-config


    ```


    以下代码片段显示了修改后的`sample03/src/main/java/com/apress/ch04/sample03/service/OrderProcessing.java`类，其中`dbUrl`变量被绑定到`database.connection`属性（通过`@Value`注解），并从配置服务器读取。这些属性在启动时从配置服务器加载，因此我们需要确保在启动此微服务之前配置服务器已启动并正在运行。


    ```

    @RestController

    @RequestMapping(value = "/order")

    public class OrderProcessing {

    @Value("${database.connection}")

    String dbUrl;

    @RequestMapping(value = "/{id}", method = RequestMethod.GET)

