- fmt: '### Database Log Mining


    When a service performs various database operations on top of the data owned by
    that service, all the transaction details are recorded in the database transactions
    or the commit log. Therefore, we can consider the database the single source-of-truth
    and extract data changes from its transaction or commit log. For example, as shown
    in Figure [5-11](#461146_1_En_5_Chapter.xhtml#Fig11), the `Order Processing` service
    performs various database operations and they are recorded in the database transaction
    log. The `DBTransactionLogProc` application can mine the database transactions
    log of the `Order` database and create events that match each transaction. These
    events are then published into an event bus or a message broker.


    ![../images/461146_1_En_5_Chapter/461146_1_En_5_Fig11_HTML.jpg](images/461146_1_En_5_Chapter/461146_1_En_5_Fig11_HTML.jpg)


    Figure 5-11


    Achieving atomicity by using a database transaction log and publishing events


    Other applications can consume these events and we can maintain eventual consistency
    between all services.


    Data-management solutions such as *Change Data Capture* (CDC) leverage database
    transaction log processing techniques. For example, solutions such as [Debezium](http://debezium.io/)
    or [LinkedIn Databus](https://github.com/linkedin/databus) use this technique
    to build CDC pipelines.


    The transaction log mining technique is quite effective as we use the database
    as the single source of truth. Every successful database operation is recorded
    in the database transaction log. However, when it comes to the implementation
    and processing, the database transaction log drastically changes from one database
    to the other, because there is no standard format for transaction logs and each
    database has its own proprietary way to recording the transactions. Therefore,
    most of the data-management solutions based on database transaction log mining
    must have implementation for each and every database type.


    ### Event Sourcing


    By using the techniques that we discussed earlier (such as publishing events using
    local transactions), we can persist each state-changing event of an entity as
    a sequence of events. All such events are stored in an event bus and subscribers
    can derive the state of that entity by processing the sequence of the event that
    has taken place on that entity. For example, as shown in Figure [5-12](#461146_1_En_5_Chapter.xhtml#Fig12),
    the `Order Processing` service publishes the changes taking place on the entity
    `Order` as events (rather than updating the database table with the order status).
    The state-changing events—such as order created, updated, paid, shipped, etc.—are
    published into the event bus.


    ![../images/461146_1_En_5_Chapter/461146_1_En_5_Fig12_HTML.jpg](images/461146_1_En_5_Chapter/461146_1_En_5_Fig12_HTML.jpg)


    Figure 5-12


    Event sourcing


    The subscriber applications and services can recreate the status of an order by
    simply replaying the events that are taking place on an order. For example, it
    can retrieve all the events related to `order11234` and derive the current state
    of that order.


    ### Saga


    So far, we have discussed several asynchronous event-driven architecture-based
    solutions that we can leverage to avoid distributed transactions with two-phase
    commit. For fully synchronous messaging scenarios, we can build transaction behavior
    across multiple services using *Sagas*.


    Before we jump into the theoretical aspects of Saga, let’s look at a real-world
    example of using Saga. (There^([^(83)](#fn83)) is also good conference talk by
    Caitie McCaffrey on how the Saga pattern is designed for real-world scenarios.)
    Consider a travel agent service (see Figure [5-13](#461146_1_En_5_Chapter.xhtml#Fig13)),
    which allows you to plan a vacation. The travel agent service takes the duration,
    location, and other details through the travel agent app and books flight, hotel,
    and car rental services. The booking of flight, hotel, and car rental service
    information has to be done in a transactional manner (book all three of them together
    or if a booking of one of those fails then cancel the rest). As we discussed earlier,
    if the travel agent service is built on top of a centralized database, the implementation
    of this scenario with transactions will be quite trivial.


    ![../images/461146_1_En_5_Chapter/461146_1_En_5_Fig13_HTML.jpg](images/461146_1_En_5_Chapter/461146_1_En_5_Fig13_HTML.jpg)


    Figure 5-13


    Transactions on a centralized database


    With microservices, building this scenario requires us to have transactional safety
    across multiple service invocations. As you have seen in the previous sections,
    using distributed transactions with two-phase commit has inherent limitations
    and won’t be a suitable approach to solve this problem.


    Saga aims to solve the distributed transactions problem by grouping a given transaction
    into a sequence of sub-transactions and corresponding compensating transactions.
    All transactions in a Saga either complete successfully or, in the event of a
    failure, the compensating transactions are ran to roll back everything, which
    is done as part of the Saga.


    #### Note


    A *Saga* is a long-lived transaction that can be written as a sequence of transactions
    that can be interleaved. All transactions in a sequence complete successfully
    or the compensating transactions are executed to amend a partial execution. The
    Saga^([^(84)](#fn84)) pattern was introduced in a [paper](http://www.amundsen.com/downloads/sagas.pdf)
    published in 1987 by Hector Garcia-Molina and Kenneth Salem.


    Now, let’s try to use the Saga pattern in our travel booking scenario. We can
    model (see Figure [5-14](#461146_1_En_5_Chapter.xhtml#Fig14)) this use case as
    a collection of sub-transactions—booking airline, booking hotel, and booking scar
    rental. Each of these sub-transactions operates on a single transaction boundary
    and each sub-transaction has an associated compensating transaction that can semantically
    undo the sub-transaction. For example, for each service, we can list the transaction
    and the compensating transactions as follows.


    - `T1`: Book flight, `C1`: Cancel flight

    - `T2`: Book hotel, `C2`: Cancel hotel

    - `T3`: Book car rental, `C3`: Cancel car rental


    For each service, there’s a dedicated transaction boundary and it will operate
    on top of a dedicated database (having a database for each service is not mandatory
    though).


    A Saga can be represented as a directed acyclic graph that consists of all the
    sub-transactions and compensating transactions. The travel-booking Saga contains
    the set of sub-transactions and compensating transactions. The travel agent service
    contains a component called Saga Execution Coordinator (SEC), which executes the
    book flight, book hotel, and book car rental transactions. If any of these operations
    fails at a given step, then SEC rolls back the entire transaction by executing
    the corresponding compensating transactions.


    ![../images/461146_1_En_5_Chapter/461146_1_En_5_Fig14_HTML.jpg](images/461146_1_En_5_Chapter/461146_1_En_5_Fig14_HTML.jpg)


    Figure 5-14


    Using Sagas


    Sagas at the conceptual level are quite trivial and most of the centralized workflow
    solutions, such as Business Process Model and Notation (BPMN) solutions, are in
    fact based on the same terminology. However, building a Saga pattern for a microservices-based
    system in a decentralized fashion is quite challenging. Therefore, let’s take
    a closer look at how a Saga can be implemented in the microservices context.


    The implementation of Saga requires a Saga log, which is a distributed log that
    the Saga Execution Coordinator interacts with.'
