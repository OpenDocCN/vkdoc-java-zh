  trans: '

    #### 使用 Istio 运行你的服务


    使用 Istio 运行微服务非常简单。如果你在 Kubernetes 上运行服务，第一步需要为你的服务创建 Docker 镜像。有了 Docker 镜像后，你需要创建
    Kubernetes 工件来部署该服务。


    例如，假设你想开发一个简单的 `hello` 服务，并且已经创建了 Docker 镜像和 Kubernetes 工件来部署该服务。这里展示的是该服务的通用
    Kubernetes 部署工件。


    例如，在下面的 Kubernetes 描述符中，你可以找到 Kubernetes 服务和部署组件的配置。此外，你还需要包含两个 Istio 特定的配置，即
    `VirtualService` 和 `Gateway`。


    `VirtualService` 定义了控制服务请求如何在 Istio 服务网格中路由的规则。`Gateway` 为 HTTP/TCP 流量配置负载均衡器，通常运行在网格的边缘，以启用应用程序的入站流量。


    图 9-8 展示了一个简单通信场景中服务与 Sidecar 之间的请求流程。假设你使用外部客户端向 `microservice-A` 发送请求，那么你需要暴露一个
    Istio 入站网关，它充当服务的外部接口。当你为 `microservice-A` 创建虚拟服务时，基于你在该虚拟服务中指定的规则，消息路由就会发生。类似地，当
    `microservice-A` 调用 `microservice-B` 时，基于 `microservice-B` 的虚拟服务配置，消息路由规则将被应用（在
    `microservice-A` 的 Sidecar 中）。


    ![../images/461146_1_En_9_Chapter/461146_1_En_9_Fig8_HTML.jpg](img/461146_1_En_9_Fig8_HTML.jpg)


    图 9-8


    请求流程


    在这个例子中，我们定义了一个网关，它在边缘暴露我们的服务，以便外部客户端可以通过负载均衡器进行调用。为我们的 `HelloWorld` 服务创建的虚拟服务简单地检查路径
    `/hello` 并将其路由到该服务。


    ```

    # Helloworld.yaml

    apiVersion: v1

    kind: Service

    metadata:

    name: helloworld

    labels:

    app: helloworld

    spec:

    type: NodePort

    ports:

    - port: 5000

    name: http

    selector:

    app: helloworld


    apiVersion: extensions/v1beta1

    kind: Deployment

    metadata:

    name: helloworld-v1

    spec:

    replicas: 1

    template:

    metadata:

    labels:

    app: helloworld

    version: v1

    spec:

    containers:

    - name: helloworld

    image: kasunindrasiri/examples-helloworld-v1

    resources:

    requests:

    cpu: "100m"

    imagePullPolicy: IfNotPresent #Always

    ports:

    - containerPort: 5000


    apiVersion: networking.istio.io/v1alpha3

    kind: Gateway

    metadata:

    name: helloworld-gateway

    spec:

    selector:

    istio: ingressgateway # use istio default controller

    servers:

    - port:

    number: 80

    name: http

    protocol: HTTP

    hosts:

    - "*"


    apiVersion: networking.istio.io/v1alpha3

    kind: VirtualService

    metadata:

    name: helloworld

    spec:

    hosts:

    - "*"

    gateways:

    - helloworld-gateway

    http:

    - match:

    - uri:

    exact: /hello

    route:

    - destination:

    host: helloworld

    port:

    number: 5000

    ```


    现在你想在 Istio 上部署这个服务。为此，你需要将 Istio Sidecar 注入到你的部署中。这可以作为 Istio 安装的自动功能完成，也可以作为手动过程完成。为了正确理解其行为，我们使用手动
    Sidecar 注入。


    你可以使用以下命令将 Sidecar 注入到你的服务部署描述符中：


    ```

    istioctl kube-inject -f helloworld.yaml -o helloworld-istio.yaml

    ```


    它会修改部署描述符，并将 Istio 代理添加到你将创建的同一个 Pod 中。因此，在这种情况下，Istio 代理充当 Sidecar。Sidecar 注入完成后，你可以简单地部署修改后的部署描述符，如下所示：


    ```

    kubectl create -f helloworld-istio.yaml

    ```


    这就是你需要做的全部工作。现在，你可以通过 Node 端口或入站网关（如果有）访问你的服务，并且流量会流经 Istio 服务网格。（如果需要，你可以通过在
    Istio 级别启用追踪来验证这一点。我们将在接下来的几节中讨论如何做到这一点。）


    大多数 Istio 示例都基于 Istio 提供的官方用例^(¹³³)，以展示其功能。因此，我们将沿用相同的示例。我们在图 9-9 中展示的是部署在 Istio
    上的 `BookInfo` 示例。


    ![../images/461146_1_En_9_Chapter/461146_1_En_9_Fig9_HTML.jpg](img/461146_1_En_9_Fig9_HTML.jpg)


    图 9-9


    Istio 上的 BookInfo 用例


    `BookInfo` 用例由四个多语言服务组成——`Product Page`、`Reviews`、`Details` 和 `Ratings`。现在让我们继续讨论这个用例的一些需求，在这些需求中我们可以利用
    Istio。


    ### 注意


    你可以按照 Istio 文档^(¹³⁴)中给出的指南尝试以下大多数 Istio 示例。


    #### 使用 Istio 进行流量管理


    当一个服务调用另一个服务，或者一个给定的服务暴露给外部客户端时，你可以应用 Istio 的流量管理功能，基于不同的机制来路由流量。它将流量流程与基础设施扩展解耦，让你通过
    Pilot 指定流量应遵循的规则，而不是指定哪些特定的 Pod/VM 应接收流量。流量管理功能还包括用于 A/B 测试的动态请求路由、逐步发布、金丝雀发布、使用超时和重试的故障恢复、熔断器以及故障注入。


    Istio 定义了四种流量管理配置资源：


    *   *VirtualService* 定义了一组在访问主机时应用的流量路由规则。每个路由规则定义了特定协议流量的匹配条件。如果流量匹配，它将被发送到注册表中定义的一个命名目标服务（或其子集/版本）。流量的来源也可以在路由规则中进行匹配。这允许为特定的客户端上下文定制路由。


    *   *DestinationRule* 配置了在 VirtualService 路由发生后应用于请求的一组策略。这些规则指定了负载均衡、来自 Sidecar
    的连接池大小以及异常检测设置的配置，用于检测并从负载均衡池中驱逐不健康的主机。


    *   *ServiceEntry* 通常用于启用对 Istio 服务网格外部服务的请求。


    *   *Gateway* 为 HTTP/TCP 流量配置负载均衡器，通常运行在网格的边缘，以启用应用程序的入站流量。

    '
- fmt: '# Request Routing


    Let’s try to build a simple request routing scenario using the Istio’s `BookInfo`
    example. The Istio’s `BookInfo` example consists of four separate microservices,
    each with multiple versions. Suppose that we need to apply a routing rule that
    routes all traffic to v1 (version 1) of the `Ratings` service.


    You can implement this example by applying a virtual service and routing rules
    to each virtual service to route the traffic to v1 of the service. In the following
    code snippet, we have illustrated the rules for the `Ratings` and `Reviews` services.
    Similarly, you need to do this across all services that you have in the `BookInfo`
    example.


    ```

    apiVersion: networking.istio.io/v1alpha3

    kind: VirtualService

    metadata:

    name: ratings

    ...

    spec:

    hosts:

    - ratings

    http:

    - route:

    - destination:

    host: ratings

    subset: v1


    apiVersion: networking.istio.io/v1alpha3

    kind: VirtualService

    metadata:

    name: reviews

    ...

    spec:

    hosts:

    - reviews

    http:

    - route:

    - destination:

    host: reviews

    subset: v1

    ```


    There can be certain scenarios that you need to do content-based routing on, based
    on the request. For example, the following virtual service configuration of the
    `Reviews` service illustrates an HTTP header-based routing scenario, in which
    it specifically looks for an HTTP header and routes the traffic to the v2 of the
    service.


    ```

    apiVersion: networking.istio.io/v1alpha3

    kind: VirtualService

    metadata:

    name: reviews

    ...

    spec:

    hosts:

    - reviews

    http:

    - match:

    - headers:

    end-user:

    exact: jason

    route:

    - destination:

    host: reviews

    subset: v2

    - route:

    - destination:

    host: reviews

    subset: v1

    ```


    # Resiliency


    As part of resilient inter-service communication techniques, you can use *timeouts*
    when calling another service via the Istio sidecar proxy. For example, suppose
    that you want to apply a timeout when you call the `Reviews` service of the Istio
    `Bookinfo` example. Then you can include the timeout configuration as part of
    your virtual service created for the `Reviews` service.


    The following configuration sets a timeout of 0.5 seconds when calling the `Reviews`
    service and calls are routed to version v2 of the service.


    ```

    apiVersion: networking.istio.io/v1alpha3

    kind: VirtualService

    metadata:

    name: reviews

    spec:

    hosts:

    - reviews

    http:

    - route:

    - destination:

    host: reviews

    subset: v2

    timeout: 0.5s

    ```


    *Circuit breaker* configuration for invoking a specific service can be applied
    as a `DestinationRule` (which will be applied after the virtual service routing).
    For example, suppose that we need to apply a circuit breaker configuration when
    invoking the `Httpbin` service. Then we can apply the following `DestinationRule`,
    which includes rules to open the circuit if we exceed more than one connection
    and request concurrently.


    ```

    apiVersion: networking.istio.io/v1alpha3

    kind: DestinationRule

    metadata:

    name: httpbin

    spec:

    host: httpbin

    trafficPolicy:

    connectionPool:

    tcp:

    maxConnections: 1

    http:

    http1MaxPendingRequests: 1

    maxRequestsPerConnection: 1

    outlierDetection:

    consecutiveErrors: 1

    interval: 1s

    baseEjectionTime: 3m

    maxEjectionPercent: 100

    ```


    Similarly, there are a number of other service resiliency related capabilities
    that you can apply when you invoke your services via Istio.


    # Fault Injection


    A route rule can specify one or more faults to inject while forwarding HTTP requests
    to the rule’s corresponding request destination. The faults can be either delays
    or aborts. In the following example, we inject an HTTP 400 response for all the
    requests that go to the v1 of the `Ratings` service.


    ```

    apiVersion: networking.istio.io/v1alpha3

    kind: VirtualService

    metadata:

    name: ratings

    spec:

    hosts:

    - ratings

    http:

    - fault:

    abort:

    percent: 10

    httpStatus: 400

    route:

    - destination:

    host: ratings

    subset: v1

    ```


    # Policy Enforcement


    We introduced Istio Mixer earlier in this chapter as one of the main components
    of Istio, which is responsible for policy enforcement and telemetric collection.
    Let’s look at how we can leverage policy enforcement with respect to rate limiting.


    For example, suppose that you need to configure Istio to rate-limit traffic to
    the `Product Page` service based on the IP address of the originating client.
    You will use the `X-Forwarded-For` request header as the client IP address.


    From the Istio side, you need to configure the memory quota (`memquota`) adapter
    to enable rate limiting (or use the Redis quota for production use cases). You
    can apply the `memquota` handler configuration, as shown here.


    ```

    apiVersion: config.istio.io/v1alpha2

    kind: memquota

    metadata:

    name: handler

    namespace: istio-system

    spec:

    quotas:

    - name: requestcount.quota.istio-system

    maxAmount: 500

    validDuration: 1s

    - dimensions:

    destination: reviews

    maxAmount: 1

    validDuration: 5s

    - dimensions:

    destination: productpage

    maxAmount: 2

    validDuration: 5s

    ```


    This `memquota` handler defines three different rate-limit schemes. The default,
    if no overrides match, is 500 requests per one second (1s). The first is 1 request
    (`maxAmount`) every 5s (`validDuration`), if the destination is `reviews`.


    The second is 2 requests every 5s, if the destination is the `Product Page` service.


    ```

    apiVersion: config.istio.io/v1alpha2

    kind: quota

    metadata:

    name: requestcount

    namespace: istio-system

    spec:

    dimensions:

    source: request.headers["x-forwarded-for"] | "unknown"

    destination: destination.labels["app"] | destination.service.host | "unknown"

    destinationVersion: destination.labels["version"] | "unknown"

    ```


    The quota template defines three dimensions that are used by `memquota` or `redisquota`
    to set overrides on requests that match certain attributes. The destination will
    be set to the first non-empty value in `destination.labels["app"]`, `destination.service.host`,
    or `unknown`.


    ```

    apiVersion: config.istio.io/v1alpha2

    kind: rule

    metadata:

    name: quota

    namespace: istio-system

    spec:

    actions:

    - handler: handler.memquota

    instances:

    - requestcount.quota

    ```


    This rule tells Mixer to invoke the `handler.memquota` handler and pass it the
    object constructed using the instance `requestcount.quota`. This maps the dimensions
    from the quota template to the `memquota` or `redisquota` handler.


    ```

    apiVersion: config.istio.io/v1alpha2

    kind: QuotaSpec

    metadata:

    name: request-count

    namespace: istio-system

    spec:

    rules:

    - quotas:

    - charge: "1"

    quota: requestcount

    ```


    This `QuotaSpec` defines the `requestcount` quota you created with a charge of
    1.


    ```

    kind: QuotaSpecBinding

    metadata:

    name: request-count

    namespace: istio-system

    spec:

    quotaSpecs:

    - name: request-count

    namespace: istio-system

    services:

    - name: productpage

    namespace: default

    ```


    This `QuotaSpecBinding` binds the `QuotaSpec` you created to the services you
    want to apply it to. The `Product Page` service is explicitly bound to `request-count`.
    Note that you must define the namespace since it differs from the namespace of
    the `QuotaSpecBinding`.'
