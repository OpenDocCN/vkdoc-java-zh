  trans: '

    #### 让它崩溃


    在许多情况下，医生会在严重事故后决定截去病人的一条腿以挽救其生命。这有助于防止严重损伤从腿部扩散到身体其他部位。在 Erlang^(⁵) 世界中，这被称为“让它崩溃”哲学。有时，放弃一个子系统以维护整个系统的稳定性可能是有用的。这种“让它崩溃”的方法建议，在因故障导致恢复困难且不可靠时，应尽快恢复到干净的启动状态。这是微服务部署中非常常见的一种策略。一个给定的微服务只处理整个系统中的一个有限范围，将其关闭并重新启动对系统的影响很小。这种策略通过每个主机运行一个微服务并使用容器的策略得到了很好的支持。快速的服务器启动时间（可能只需几毫秒）也是使该策略成功的关键因素。


    #### 握手


    握手主要用于双方之间交换需求以建立通信信道。这发生在建立 TCP（传输控制协议）连接之前，通常被称为 TCP 三次握手。同样，我们在建立 TLS（传输层安全协议）连接之前也会看到一次握手。这是计算机科学中最流行的两种握手协议。握手模式建议服务器使用握手来通过限制自身工作负载来保护自己。当一个微服务位于负载均衡器后面时，它可以使用这种握手技术来告知负载均衡器它是否准备好接受更多请求。每个托管微服务的服务器都可以提供一个轻量级的健康检查端点。负载均衡器可以定期
    ping 这个端点，以查看相应的微服务是否准备好接受请求。


    #### 测试工具


    分布式系统中的所有故障都很难捕获，无论是在开发测试还是 QA（质量保证）测试中。集成测试看起来可能是一个更好的选择，但它有其自身的局限性。大多数时候，我们根据相应服务端点提供的规范来构建集成测试。这通常涵盖了成功场景，即使在失败情况下，它也定义了确切期望的内容，例如错误码。并非所有系统在所有时候都按照规范运行。测试工具模式提出了一种集成测试方法，允许我们测试大多数故障模式，甚至超出服务规范的范围。


    测试工具是另一个远程端点，它代表你的微服务需要连接的每一个远程端点。测试工具和服务端点之间的区别在于，测试工具仅用于测试故障，而不关心应用程序逻辑。测试工具必须被编写成能够生成涵盖
    OSI（开放系统互连）模型所有七层的各种错误。例如，测试工具可能会发送连接被拒绝的响应、无效的 TCP 数据包、缓慢的响应、内容类型不正确（XML 而非 JSON）的响应，以及许多其他在正常情况下我们永远不会从服务端点期望的错误。


    #### 卸载负载


    如果我们观察 TCP（传输控制协议）的工作方式，它会为每个端口提供一个监听队列。当连接涌入某个特定端口时，所有这些连接都会被排队。每个池都有一个最大限制，当达到限制时，将不再接受新的连接。当队列满时，任何建立连接的新尝试都将被拒绝，并返回一个
    ICMP RST（重置）数据包。这就是 TCP 在 TCP 层卸载负载的方式。运行在 TCP 层之上的应用程序将从 TCP 连接池中拉取请求。在实践中，大多数应用程序在
    TCP 连接池达到其最大值之前就已经因连接而耗尽。卸载负载模式建议应用程序或服务也应该模仿 TCP 的模式。


    当应用程序发现其运行落后于给定的 SLA（服务等级协议）时，它应该卸载负载。通常，当应用程序耗尽且运行线程被某些资源阻塞时，响应时间开始恶化。这些指标有助于显示给定的服务是否落后于
    SLA。如果是这样，该模式主张卸载负载，或通知负载均衡器该服务尚未准备好接受更多请求。这可以与握手模式结合使用，以构建更好的解决方案。


    ### 可观测性


    收集数据成本低廉，但在需要时没有数据则代价高昂。2016 年 3 月，亚马逊宕机 20 分钟，估计收入损失达 375 万美元。2017 年 1 月，达美航空发生系统故障，导致超过
    170 个航班取消，估计损失达 850 万美元。在这两个案例中，如果他们收集了适当级别的数据，本可以预测到此类行为，或在事件发生时通过识别根本原因迅速恢复。我们拥有的信息越多，就能做出更好的决策。


    可观测性是一种衡量标准，用于评估系统的内部状态在多大程度上可以通过其外部输出的知识来推断^(⁶)。我认识的一家公司曾经通过计算员工在前门刷卡进出时间差来监控他们的有效工作时间。只有当所有员工都支持这种监控或使自己变得可观测时，这种策略才有效。每周结束时，人力资源部（HR）会按日期向每位员工发送有效工作时间。在大多数情况下，数据是完全不正确的。原因是大多数人会成群结队地出去吃午饭或喝茶，当他们进出时，通常只有一个人会刷卡开门。尽管我们实施了监控，但由于员工不配合或不可观测，并没有产生预期的结果。


    我认识的另一家公司曾经追踪员工的进出时间、他们在公司内部的工作地点（通过他们连接公司无线网络的时间以及无线接入点的位置来判断）。即使采用这种方法，我们追踪的也不是员工，而是他们的笔记本电脑。我们可以把笔记本电脑放在办公桌上，然后整天在乒乓球桌旁度过——或者去购物，然后回来把笔记本电脑带回家。这两个例子都突出了一个重要事实——只有当我们拥有一个可观测的系统时，监控才有效。


    可观测性是任何微服务设计中都必须融入的最重要的方面之一。我们可能需要追踪每个微服务的吞吐量、成功/失败请求的数量、CPU、内存和其他网络资源的利用率，以及一些与业务相关的指标。第
    13 章“可观测性”将详细讨论微服务的可观测性。

    '
- fmt: '# Automation


    One of the key rationales behind a microservice architecture is less time to production
    and shorter feedback cycles. We cannot meet such goals with no automation. A good
    microservices architecture will only look good on paper (or a whiteboard), if
    not for the timely advancements in DevOps and tooling around automation. No idea
    is a good idea if it doesn’t appear at the right time. Microservices came as a
    good idea, as it had all the tooling support at the time it started to become
    mainstream, in the form of `Docker`, `Ansible`, `Puppet`, `Chef`, and many more.


    Tooling around automation can be divided into two broad categories—continuous
    integration tools and continuous deployment tools. Continuous integration enables
    software development teams to work collaboratively, without stepping on each other''s
    toes. They can automate builds and source code integration to maintain source
    code integrity. They also integrate with DevOps tools to create an automated code
    delivery pipeline. Forrester, one of the top analyst firms, in its latest report^([⁷](#fn7))
    on continuous integration tools, identifies the top ten tools in the domain: `Atlassian
    Bamboo`, `AWS CodeBuild`, `CircleCI`, `CloudBees Jenkins`, `Codeship`, `GitLab
    CI`, `IBM UrbanCode Build`, `JetBrains TeamCity`, `Microsoft VSTS`, and `Travis
    CI`.


    The continuous delivery tools bundle applications, infrastructure, middleware,
    and the supporting installation processes and dependencies into release packages
    that transition across the lifecycle. The latest Forrester report^([⁸](#fn8))
    on continuous delivery and release automation highlights 15 most significant vendors
    in the domain: `Atlassian`, `CA Technologies`, `Chef Software`, `Clarive`, `CloudBees`,
    `Electric Cloud`, `Flexagon`, `Hewlett Packard Enterprise (HPE)`, `IBM`, `Micro
    Focus`, `Microsoft`, `Puppet`, `Red Hat`, `VMware`, and `XebiaLabs`.


    ## 12-Factor App


    A microservices architecture is not just built around design principles. Some
    call it a *culture*. It’s a result of many other collaborative efforts. Yes, the
    design is a key element, but we also need to worry about collaboration between
    developers and domain experts, the communication between teams and team members,
    continuous integration and delivery, and many other issues. The 12 Factor App
    is a manifesto^([⁹](#fn9)) published by Heroku in 2012. This manifesto is a collection
    of best practices and guidelines to build and maintain scalable, maintainable,
    and portable applications. Even though these best practices are initially derived
    from the applications deployed on the Heroku cloud platform, today it has become
    a mantra for any successful microservices deployment. These 12 factors discussed
    next are quite common and natural, so chances are very high that you are adhering
    to them, knowingly or unknowingly.


    ### Codebase


    The codebase factor highlights the importance of maintaining all your source code
    in a version control system, and having one code repository per application. Here
    the application could be our microservice. Having one repository per microservice
    helps release it independently from other microservices. The microservice must
    be deployed to multiple environments (test, staging, and production) from the
    same repository. Having per service repositories also helps the governance aspects
    of the development process.


    ### Dependencies


    The dependencies factor says, in your application you should explicitly declare
    and isolate your dependencies and should never rely on implicit system-wide dependencies.
    In practice, if you are building a Java based microservice, you must declare all
    your dependencies either with Maven in a `pom.xml` file or with Gradle in a `build.gradle`
    file. Maven and Gradle are two very popular build automation tools, but with recent
    developments, Gradle seems to have the edge over Maven and is used by Google,
    Netflix, LinkedIn and many other top companies. Netflix, in their microservices
    development process, uses Gradle with their own build automation tool called `Nebula`^([^(10)](#fn10)).
    In fact, `Nebula` is a set of Gradle plugins developed by Netflix.


    Managing dependencies for microservices has gone beyond just having them declared
    under build automation tools. Most of the microservices deployments today rely
    on containers, for example Docker. If you are new to Docker and containers, do
    not worry about it now; we discuss those in Chapter [8](#461146_1_En_8_Chapter.xhtml),
    when we talk about microservices deployment patterns in detail. With Docker, you
    can declare not just the core dependencies your microservice needs to run, but
    also other external dependencies with specific versions, such as the MySQL version,
    Java version, and so on.


    ### Configuration


    The configuration factor emphasizes the need to decouple environment specific
    settings from the code to configuration. For example, the connection URL of the
    LDAP or the database server involves environment specific parameters and certificates.
    These settings should not be baked into the code. Also, even with the configuration
    files, never commit any kind of credentials into source repositories. This is
    a common mistake some developers do; they think that since they are using private
    GitHub repositories, only they have access, which is not true. When you commit
    your credentials to a private GitHub repository, even though it’s private, those
    credentials are stored in outside servers in cleartext.


    ### Backing Services


    A backing service is any kind of service our application consumes during its normal
    operations. It can be a database, a caching implementation, LDAP server, message
    broker, external service endpoint, or any kind of an external service (see Figure
    [2-15](#461146_1_En_2_Chapter.xhtml#Fig15)). The backing services factor says
    that these backing services should be treated as attachable resources. In other
    words, they should be pluggable into our microservices implementation. We should
    be able to change the database, LDAP server, or any external end point, just by
    editing a configuration file or setting up an environment variable. This factor
    is very much related to the previous one.


    ![../images/461146_1_En_2_Chapter/461146_1_En_2_Fig15_HTML.png](images/461146_1_En_2_Chapter/461146_1_En_2_Fig15_HTML.png)


    Figure 2-15


    Backing services


    ### Build, Release, Run


    This is the fifth factor and it highlights the importance of having a clear separation
    among the build, release, and run phases of an application. Let’s look at how
    Netflix builds its microservices^([^(11)](#fn11)). They have a clear separation
    between these phases (see Figure [2-16](#461146_1_En_2_Chapter.xhtml#Fig16)).
    It starts with the developer who builds and locally tests using `Nebula`. `Nebula`
    is a build automation tool developed by Netflix; in fact it is a set of Gradle
    plugins. Then the changes are committed to the corresponding Git repository. Then
    a Jenkins job executes `Nebula`, which builds, tests, and packages the application
    for deployment. For those who are new to Jenkins, it is a leading open source
    automation server that facilitates continuous integration and deployment. Once
    the build is ready, it is baked into an Amazon Machine Image (AMI).


    ![../images/461146_1_En_2_Chapter/461146_1_En_2_Fig16_HTML.png](images/461146_1_En_2_Chapter/461146_1_En_2_Fig16_HTML.png)


    Figure 2-16


    Netflix build process


    `Spinnaker` is another tool used in Netflix’s release process. It’s in fact a
    continuous delivery platform for releasing software changes with high velocity
    and confidence, developed by Netflix, and later made open source. Once the AMI
    is ready to deploy, `Spinnaker` makes it available for deployment to tens, hundreds,
    or thousands of instances, and deploys it in the test environment. From there,
    the development teams will typically exercise the deployment using a set of automated
    integration tests.'
  raw: '### Automation


    One of the key rationales behind a microservice architecture is less time to production
    and shorter feedback cycles. We cannot meet such goals with no automation. A good
    microservices architecture will only look good on paper (or a whiteboard), if
    not for the timely advancements in DevOps and tooling around automation. No idea
    is a good idea if it doesn’t appear at the right time. Microservices came as a
    good idea, as it had all the tooling support at the time it started to become
    mainstream, in the form of Docker, Ansible, Puppet, Chef, and many more.


    Tooling around automation can be divided into two broad categories—continuous
    integration tools and continuous deployment tools. Continuous integration enables
    software development teams to work collaboratively, without stepping on each other''s
    toes. They can automate builds and source code integration to maintain source
    code integrity. They also integrate with DevOps tools to create an automated code
    delivery pipeline. Forrester, one of the top analyst firms, in its latest report^([⁷](#fn7))
    on continuous integration tools, identifies the top ten tools in the domain: Atlassian
    Bamboo, AWS CodeBuild, CircleCI, CloudBees Jenkins, Codeship, GitLab CI, IBM UrbanCode
    Build, JetBrains TeamCity, Microsoft VSTS, and Travis CI.


    The continuous delivery tools bundle applications, infrastructure, middleware,
    and the supporting installation processes and dependencies into release packages
    that transition across the lifecycle. The latest Forrester report^([⁸](#fn8))
    on continuous delivery and release automation highlights 15 most significant vendors
    in the domain: Atlassian, CA Technologies, Chef Software, Clarive, CloudBees,
    Electric Cloud, Flexagon, Hewlett Packard Enterprise (HPE), IBM, Micro Focus,
    Microsoft, Puppet, Red Hat, VMware, and XebiaLabs.


    ## 12-Factor App


    A microservices architecture is not just built around design principles. Some
    call it a *culture* . It’s a result of many other collaborative efforts. Yes,
    the design is a key element, but we also need to worry about collaboration between
    developers and domain experts, the communication between teams and team members,
    continuous integration and delivery, and many other issues. The 12 Factor App
    is a manifesto^([⁹](#fn9)) published by Heroku in 2012\. This manifesto is a collection
    of best practices and guidelines to build and maintain scalable, maintainable,
    and portable applications. Even though these best practices are initially derived
    from the applications deployed on the Heroku cloud platform, today it has become
    a mantra for any successful microservices deployment. These 12 factors discussed
    next are quite common and natural, so chances are very high that you are adhering
    to them, knowingly or unknowingly.


    ### Codebase


    The codebase factor highlights the importance of maintaining all your source code
    in a version control system, and having one code repository per application. Here
    the application could be our microservice. Having one repository per microservice
    helps release it independently from other microservices. The microservice must
    be deployed to multiple environments (test, staging, and production) from the
    same repository. Having per service repositories also helps the governance aspects
    of the development process.


    ### Dependencies


    The *dependencies* factor says, in your application you should explicitly declare
    and isolate your dependencies and should never rely on implicit system-wide dependencies.
    In practice, if you are building a Java based microservice, you must declare all
    your dependencies either with Maven in a `pom.xml` file or with Gradle in a `build.gradle`
    file. Maven and Gradle are two very popular build automation tools, but with recent
    developments, Gradle seems to have the edge over Maven and is used by Google,
    Netflix, LinkedIn and many other top companies. Netflix, in their microservices
    development process, uses Gradle with their own build automation tool called Nebula^([^(10)](#fn10)).
    In fact, Nebula is a set of Gradle plugins developed by Netflix.


    Managing dependencies for microservices has gone beyond just having them declared
    under build automation tools. Most of the microservices deployments today rely
    on containers, for example Docker. If you are new to Docker and containers, do
    not worry about it now; we discuss those in Chapter [8](#461146_1_En_8_Chapter.xhtml),
    when we talk about microservices deployment patterns in detail. With Docker, you
    can declare not just the core dependencies your microservice needs to run, but
    also other external dependencies with specific versions, such as the MySQL version,
    Java version, and so on.


    ### Configuration


    The configuration factor emphasizes the need to decouple environment specific
    settings from the code to configuration. For example, the connection URL of the
    LDAP or the database server involves environment specific parameters and certificates.
    These settings should not be baked into the code. Also, even with the configuration
    files, never commit any kind of credentials into source repositories. This is
    a common mistake some developers do; they think that since they are using private
    GitHub repositories, only they have access, which is not true. When you commit
    your credentials to a private GitHub repository, even though it’s private, those
    credentials are stored in outside servers in cleartext.


    ### Backing Services


    A backing service is any kind of service our application consumes during its normal
    operations. It can be a database, a caching implementation, LDAP server, message
    broker, external service endpoint, or any kind of an external service (see Figure
    [2-15](#461146_1_En_2_Chapter.xhtml#Fig15)). The *backing services* factor says
    that these backing services should be treated as attachable resources. In other
    words, they should be pluggable into our microservices implementation. We should
    be able to change the database, LDAP server, or any external end point, just by
    editing a configuration file or setting up an environment variable. This factor
    is very much related to the previous one.


    ![../images/461146_1_En_2_Chapter/461146_1_En_2_Fig15_HTML.png](images/461146_1_En_2_Chapter/461146_1_En_2_Fig15_HTML.png)


    Figure 2-15


    Backing services


    ### Build, Release, Run


    This is the fifth factor and it highlights the importance of having a clear separation
    among the build, release, and run phases of an application. Let’s look at how
    Netflix builds its microservices^([^(11)](#fn11)). They have a clear separation
    between these phases (see Figure [2-16](#461146_1_En_2_Chapter.xhtml#Fig16)).
    It starts with the developer who builds and locally tests using Nebula. Nebula
    is a build automation tool developed by Netflix; in fact it is a set of Gradle
    plugins. Then the changes are committed to the corresponding Git repository. Then
    a Jenkins job executes Nebula, which builds, tests, and packages the application
    for deployment. For those who are new to Jenkins, it is a leading open source
    automation server that facilitates continuous integration and deployment. Once
    the build is ready, it is baked into an Amazon Machine Image (AMI).


    ![../images/461146_1_En_2_Chapter/461146_1_En_2_Fig16_HTML.png](images/461146_1_En_2_Chapter/461146_1_En_2_Fig16_HTML.png)


    Figure 2-16


    Netflix build process


    Spinnaker is another tool used in Netflix’s release process. It’s in fact a continuous
    delivery platform for releasing software changes with high velocity and confidence,
    developed by Netflix, and later made open source. Once the AMI is ready to deploy,
    Spinnaker makes it available for deployment to tens, hundreds, or thousands of
    instances, and deploys it in the test environment. From there, the development
    teams will typically exercise the deployment using a set of automated integration
    tests.'
  trans: '

    ### 自动化


    微服务架构背后的关键理念之一是缩短产品上线时间并加快反馈周期。没有自动化，我们无法实现这些目标。如果没有 DevOps 和相关自动化工具的及时进步，一个良好的微服务架构也只会是纸上谈兵（或白板上的空想）。任何想法如果出现的时机不对，都不能算是好主意。微服务之所以成为一个好主意，是因为它在开始成为主流时，已经拥有了
    Docker、Ansible、Puppet、Chef 等众多工具的支持。


    围绕自动化的工具大致可分为两类：持续集成工具和持续部署工具。持续集成使软件开发团队能够协同工作，而不会互相干扰。他们可以自动化构建和源代码集成，以维护源代码的完整性。他们还可以与
    DevOps 工具集成，创建自动化的代码交付管道。顶级分析公司 Forrester 在其关于持续集成工具的最新报告^(⁷)中，列出了该领域的十大工具：Atlassian
    Bamboo、AWS CodeBuild、CircleCI、CloudBees Jenkins、Codeship、GitLab CI、IBM UrbanCode
    Build、JetBrains TeamCity、Microsoft VSTS 和 Travis CI。


    持续交付工具将应用程序、基础设施、中间件以及支持性的安装流程和依赖项打包成发布包，这些发布包会在整个生命周期中进行流转。Forrester 关于持续交付和发布自动化的最新报告^(⁸)
    重点介绍了该领域最重要的 15 家供应商：Atlassian、CA Technologies、Chef Software、Clarive、CloudBees、Electric
    Cloud、Flexagon、Hewlett Packard Enterprise (HPE)、IBM、Micro Focus、Microsoft、Puppet、Red
    Hat、VMware 和 XebiaLabs。


    ## 12-Factor 应用


    微服务架构不仅仅围绕设计原则构建。有些人称之为一种*文化*。它是许多其他协作努力的成果。是的，设计是关键要素，但我们还需要关注开发人员与领域专家之间的协作、团队与团队成员之间的沟通、持续集成与交付以及许多其他问题。12-Factor
    App 是 Heroku 于 2012 年发布的一份宣言^(⁹)。这份宣言汇集了构建和维护可扩展、可维护且可移植应用程序的最佳实践和指南。尽管这些最佳实践最初源自部署在
    Heroku 云平台上的应用程序，但如今它已成为任何成功微服务部署的准则。接下来讨论的这 12 个因素非常普遍且自然，因此你很可能在有意或无意中遵循着它们。


    ### 基准代码


    基准代码因素强调了将所有源代码维护在版本控制系统中，并且每个应用程序拥有一个代码仓库的重要性。这里的应用程序可以是我们所说的微服务。每个微服务拥有一个仓库有助于其独立于其他微服务进行发布。该微服务必须从同一个仓库部署到多个环境（测试、预发布和生产）。每个服务拥有独立的仓库也有助于开发过程的治理方面。


    ### 依赖


    *依赖*因素指出，在你的应用程序中，你应该显式声明并隔离你的依赖项，绝不应依赖隐式的系统级依赖项。在实践中，如果你正在构建一个基于 Java 的微服务，你必须使用
    Maven 在 `pom.xml` 文件中或使用 Gradle 在 `build.gradle` 文件中声明所有依赖项。Maven 和 Gradle 是两个非常流行的构建自动化工具，但随着近期的发展，Gradle
    似乎比 Maven 更具优势，并被 Google、Netflix、LinkedIn 和许多其他顶级公司使用。Netflix 在其微服务开发过程中，使用 Gradle
    以及他们自己的构建自动化工具 Nebula^(¹⁰)。事实上，Nebula 是 Netflix 开发的一组 Gradle 插件。


    微服务的依赖管理已经超越了仅仅在构建自动化工具中声明它们的范畴。如今大多数微服务部署都依赖于容器，例如 Docker。如果你不熟悉 Docker 和容器，现在不必担心；我们将在第
    8 章详细讨论微服务部署模式时再介绍它们。使用 Docker，你不仅可以声明微服务运行所需的核心依赖项，还可以声明其他具有特定版本的外部依赖项，例如 MySQL
    版本、Java 版本等。


    ### 配置


    配置因素强调了将环境特定设置从代码解耦到配置中的必要性。例如，LDAP 或数据库服务器的连接 URL 涉及环境特定的参数和证书。这些设置不应硬编码到代码中。此外，即使使用配置文件，也绝不要将任何类型的凭证提交到源代码仓库中。这是一些开发人员常犯的错误；他们认为既然使用的是私有
    GitHub 仓库，就只有他们自己能访问，但事实并非如此。当你将凭证提交到私有 GitHub 仓库时，即使它是私有的，这些凭证也会以明文形式存储在外部服务器上。


    ### 后端服务


    后端服务是应用程序在正常运行期间所消费的任何类型的服务。它可以是数据库、缓存实现、LDAP 服务器、消息代理、外部服务端点或任何类型的外部服务（见图 2-15）。*后端服务*因素指出，这些后端服务应被视为可附加的资源。换句话说，它们应该是可插入到我们的微服务实现中的。我们应该能够通过编辑配置文件或设置环境变量来更改数据库、LDAP
    服务器或任何外部端点。这个因素与前一个因素密切相关。


    ![../images/461146_1_En_2_Chapter/461146_1_En_2_Fig15_HTML.png](img/461146_1_En_2_Fig15_HTML.png)


    图 2-15


    后端服务


    ### 构建、发布、运行


    这是第五个因素，它强调了在应用程序的构建、发布和运行阶段之间进行清晰分离的重要性。让我们看看 Netflix 是如何构建其微服务的^(¹¹)。他们在这些阶段之间有清晰的分离（见图
    2-16）。流程始于开发人员使用 Nebula 进行构建和本地测试。Nebula 是 Netflix 开发的一个构建自动化工具；实际上它是一组 Gradle
    插件。然后，更改被提交到相应的 Git 仓库。接着，一个 Jenkins 任务执行 Nebula，后者会构建、测试并打包应用程序以供部署。对于不熟悉 Jenkins
    的人来说，它是一个领先的开源自动化服务器，有助于实现持续集成和部署。构建准备就绪后，它会被封装到一个 Amazon 机器镜像 (AMI) 中。


    ![../images/461146_1_En_2_Chapter/461146_1_En_2_Fig16_HTML.png](img/461146_1_En_2_Fig16_HTML.png)


    图 2-16


    Netflix 构建流程


    Spinnaker 是 Netflix 发布流程中使用的另一个工具。它实际上是一个持续交付平台，用于以高速度和信心发布软件变更，由 Netflix 开发，后来开源。一旦
    AMI 准备好部署，Spinnaker 就使其可用于部署到数十、数百或数千个实例，并将其部署到测试环境中。从那里开始，开发团队通常会使用一组自动化集成测试来执行部署。

    '
- fmt: '### Processes


    The sixth factor states that the processes should be stateless and should avoid
    using sticky sessions. Stateless means that an application should not assume any
    data to be in the memory before and after it executes an operation. Any microservices
    deployment compliant with the sixth factor should be designed in a way to be stateless.
    In a typical enterprise grade microservices deployment, you will find that multiple
    instances of a given microservice spin up and down based on the load it gets.
    If we are to maintain some kind of a state in memory in those microservices, it
    will be a cumbersome process to replicate the state across all the microservice
    instances and would add lot of complexity. Stateless microservices can be replicated
    on demand and no coordination is required between each during the bootstrap or
    even in the runtime, which leads us to the shared nothing architecture.


    #### Shared Nothing Architecture


    The shared nothing architecture is a well-established principle in distributed
    computing. It states that a given node in a system should not share either the
    disk or the memory with other nodes, which is well more than being just stateless.
    This helps build highly scalable systems. A scalable system should be able to
    produce increased throughput against increased load, when more nodes or resources
    are introduced to the system. If we have shared resources in a system between
    nodes, then introducing more nodes will introduce more load on to those shared
    resources, hence the impact on the total throughput will be less.


    In a typical web application, the disk is shared between nodes for two main purposes.
    One is to share some common configuration files between the nodes and, in most
    of the cases, mounting a shared disk drive to each node does this. If use of a
    shared drive is not possible, we can build some kind of a replication mechanism
    between those nodes, possibly using a shared repository. One node may commit its
    changes to a shared Git or subversion repository, and the other nodes will periodically
    pull updates. There is another approach, which is quite common these days with
    the new advancements in DevOps engineering. We can use configuration management
    tools like `Puppet`^([^(12)](#fn12)) or `Chef`^([^(13)](#fn13)) to manage configurations
    centrally and automate the distribution between all the nodes in the system. In
    today’s microservices deployment, we use a similar kind of approach with slight
    variations. No configuration changes are done on running servers; instead, a new
    container will be created with the new configuration using `Puppet` or `Chef`
    and will be deployed into the corresponding servers. This is the same approach
    Netflix follows.


    The second purpose of having a shared disk is for the database. In a traditional
    web application as well as in a microservices deployment, we cannot totally eliminate
    the need for having a shared database. But to avoid the issues in scalability,
    we can have a separate database server, which can scale independently. Then again,
    even though we share the same database between different nodes of the same microservice,
    it is not encouraged to share the same database between different microservices.
    In Chapter [5](#461146_1_En_5_Chapter.xhtml), “Data Management”, we talk about
    different data sharing strategies related to microservices.


    ### Port Binding


    The port binding factor highlights the need of having completely self-contained
    applications. If you take a traditional web application, let’s say a Java EE application,
    it is deployed in some kind of Java EE container, for example a `Tomcat`, `WebLogic`,
    or `WebSphere` server, as a `WAR` (Web Application aRchive) file. The web application
    does not worry about how people (or systems) access it, under which transport
    (`HTTP` or `HTTPS`) or which port. Those decisions are made at the web container
    level (`Tomcat`, `WebLogic`, or `WebSphere` server configuration). A `WAR` file
    cannot exist on its own; it relies on the underneath container to do the transport/port
    bindings. They are not self-contained.


    This seventh factor says your application itself has to do the port binding and
    expose it as a service, without relying on a third-party container. This is very
    common in microservice deployments. For example, `Spring Boot`^([^(14)](#fn14)),
    a popular Java-based microservices framework, lets you build microservices as
    self contained, self-executable `JAR` files. There are many other microservice
    frameworks (`Dropwizard`^([^(15)](#fn15)) and `MSF4J`^([^(16)](#fn16))) out there
    that do the same. Chapter [4](#461146_1_En_4_Chapter.xhtml), “Developing Services”
    covers how to develop and deploy microservices with `Spring Boot`.


    ### Concurrency


    There are two ways an application can scale, either vertically or horizontally.
    To scale an application vertically, you add more resources to each node. For example,
    you add more CPU power or more memory. This method is becoming less popular these
    days, as people looking toward running software on commodity hardware. To scale
    an application horizontally, you need not to worry about the resources each node
    has, rather you increase the number of nodes in the system. The 7th factor, *concurrency*,
    says that an application should be able to horizontally scale or scale out.


    The ability to dynamically scale (horizontally) is another important aspect of
    today’s microservice deployments. The system, which controls the deployment, will
    spin up and spin down server instances as the load goes up and down to increase/decrease
    the throughput of the entire system. Unless each microservice instance can scale
    horizontally, dynamic scalability is not possible here.


    ### Disposability


    The 9th factor talks about the ability of an application to spin up fast and shut
    down gracefully when required. If we cannot spin up an application fast enough,
    then it’s really hard to achieve dynamic scalability. Most of today’s microservice
    deployments rely on containers and expect the startup time to be milliseconds.
    When you architect a microservice, you need to make sure that it adds less overhead
    to the server startup time. This is further encouraged by following one microservice
    per host (container) model, which we discuss in detail later in the book in Chapter
    [8](#461146_1_En_8_Chapter.xhtml). This is opposed to having multiple monolithic
    applications per server model, where each application contributes to the server
    startup time, which is usually in minutes (not even in seconds).


    Everything at Google runs on containers. In 2014, Google spun up two billion containers
    per week. That means for every second Google was firing up on average some 3,300
    containers^([^(17)](#fn17)).'
