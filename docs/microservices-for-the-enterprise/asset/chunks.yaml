    ### 使用 TLS 双向认证保护服务间通信


    在本节中，我们将了解如何在 `Order Processing` 微服务和 `Inventory` 微服务之间启用 TLS 双向认证。在大多数情况下，TLS
    双向认证用于实现服务器之间的身份验证，而 JWT 则用于在微服务之间传递用户上下文。


    启用双向认证的一个主要要求是每个服务都应拥有自己的密钥库（`keystore.jks`）和信任库（`trust-store.jks`）。尽管两者都是密钥库，但我们特意使用“密钥库”一词来强调存储服务器私钥/公钥对的密钥库，而信任库则存储受信任服务器和客户端的公钥证书。例如，当
    `Order Processing` 微服务与受 TLS 双向认证保护的 `Inventory` 微服务通信时，签署 `Order Processing`
    微服务公钥的证书颁发机构的公钥证书必须存在于 `Inventory` 微服务的信任库（`sample03/trust-store.jks`）中。


    由于我们在此处使用自签名证书，因此没有证书颁发机构，故直接包含公钥证书本身。作为 TLS 双向认证客户端的 `Order Processing` 微服务，在
    TLS 握手期间使用其密钥库（`sample02/keystore.jks`）中的密钥进行身份验证。它还必须将签署 `Inventory` 微服务公钥的证书颁发机构的公钥证书存储在其信任库（`sample02/trust-store.jks`）中。同样，由于我们没有证书颁发机构，因此直接存储公钥证书本身。图
    12-3 说明了我们在此讨论的内容。


    ![../images/461146_1_En_12_Chapter/461146_1_En_12_Fig3_HTML.jpg](img/461146_1_En_12_Fig3_HTML.jpg)


    图 12-3


    为促进 TLS 双向认证而分发的证书


    让我们重新审视在 `Order Processing` 微服务中设置密钥库所涉及的步骤。首先，确保我们在 `sample02/keystore.jks` 处有密钥库，在
    `sample02/trust-store.jks` 处有信任库。以下与这两个密钥库相关的属性已在 `sample02/src/main/java/com/apress/ch12/sample02/OrderProcessingApp.java`
    文件中正确设置。此外，我们已将 `Inventory` 微服务的公钥证书添加到 `sample02/trust-store.jks` 文件中。


    ```

    System.setProperty("javax.net.ssl.trustStore", path + File.separator + "trust-store.jks");

    System.setProperty("javax.net.ssl.trustStorePassword", "springboot")

    System.setProperty("javax.net.ssl.keyStore",  path + File.separator + "keystore.jks");

    System.setProperty("javax.net.ssl.keyStorePassword", "springboot");

    ```


    一旦设置了 `javax.net.ssl.keyStore` 和 `javax.net.ssl.keyStorePassword` 系统属性，客户端会在 TLS
    握手期间自动选择相应的密钥对，以响应服务器请求客户端证书的质询。


    现在，让我们看看服务器端的配置。`Inventory` 微服务应将其密钥库放在 `/sample03/keystore.jks` 下，信任库放在 `sample03/trust-store.jks`
    下。以下与信任库相关的属性已在 `sample03/src/main/java/com/apress/ch12/sample03/InventoryApp.java`
    文件中正确设置。这里我们只设置了信任库属性。除非它充当 TLS 客户端，否则无需设置与密钥库相关的属性。


    ```

    System.setProperty("javax.net.ssl.trustStore", path + File.separator + "trust-store.jks");

    System.setProperty("javax.net.ssl.trustStorePassword", "springboot");

    ```


    要为 `Inventory` 微服务启用 TLS 双向认证，请在 `sample03/src/main/resources/application.properties`
    文件中设置以下属性。


    ```

    server.ssl.client-auth:need

    ```


    现在，我们可以通过使用有效的访问令牌调用 `Order Processing` 微服务来测试端到端流程。为了处理请求，`Order Processing`
    微服务会与受 TLS 双向认证保护的 `Inventory` 微服务通信。


    ```

    curl -v  -k -H "Authorization: Bearer $TOKEN" -H "Content-Type: application/json"
    -d ''{"customer_id":"101021","payment_method":{"card_type":"VISA","expiration":"01/22","name":"John
    Doe","billing_address":"201, 1st Street, San Jose, CA"},"items":[{"code":"101","qty":1},{"code":"103","qty":5}],"shipping_address":"201,
    1st Street, San Jose, CA"}'' https://localhost:9443/order

    ```


    ## 保护 Actuator 端点


    Spring Boot 通过 Actuator 提供了开箱即用的监控能力。对于任何 Spring Boot 微服务，您可以添加以下依赖项来激活 Actuator
    端点。


    ```

    org.springframework.boot

    spring-boot-starter-actuator


    ```


    一个包含此依赖项的示例微服务项目位于 `ch12/sample04`。让我们使用以下命令从 `sample04` 目录启动 `Order Processing`
    微服务。该服务将在 HTTPS 端口 8443 上启动。


    ```

    \> mvn spring-boot:run

    ```


    由于此时我们尚未启用任何安全措施，如果运行以下 cURL 命令，它将成功返回响应。


    ```

    \> curl -k https://localhost:8443/health

    {"status":"UP"}>

    ```


    要启用安全性，我们需要将以下依赖项添加到 `sample04/pom.xml` 文件中。


    ```

    org.springframework.boot

    spring-boot-starter-security


    ```


    现在，取消注释 `sample04/src/main/java/com/apress/ch12/sample04/config/SecurityConfig.java`
    文件中的 `@Configuration` 类级别注解。默认情况下它保持注释状态，这样 Spring Boot 就不会加载该类中覆盖的配置，我们可以尝试非安全场景。在同一个类中，以下代码片段向系统引入了一个名为
    `admin` 且具有 `ACTUATOR` 角色的用户。当 Actuator 端点受到保护时，只有 `ACTUATOR` 角色中的用户才能调用这些端点。


    ```

    @Override

    public void configure(AuthenticationManagerBuilder auth) throws Exception {

    auth.inMemoryAuthentication().withUser("admin")

    .password("admin").roles("ACTUATOR");

    }

    ```


    现在重启服务，并使用 `admin/admin` 凭据尝试相同的 cURL 命令。


    ```

    \> curl –k --basic -u admin:admin  https://localhost:8443/health

    {"status":"UP"}

    ```


    ## 总结


    在第 11 章中，我们讨论了与保护微服务相关的常见模式和基础知识。本章重点介绍了如何使用 Spring Boot 开发的微服务来构建这些模式。在下一章中，我们将讨论可观测性在微服务部署中的作用。

