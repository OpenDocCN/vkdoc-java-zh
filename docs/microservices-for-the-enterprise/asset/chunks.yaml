    such API monetization, are built on top of the API analytic data.


    ### API QoS


    API Quality of Service (QoS) has multiple perspectives such as security, caching,
    throttling, and other SLAs (Service Level Agreements). We have two dedicated chapters
    (Chapter [11](#461146_1_En_11_Chapter.xhtml), “Microservices Security Fundamentals”
    and Chapter [12](#461146_1_En_12_Chapter.xhtml), “Securing Microservices”) covering
    microservices security fundamentals and we cover API security as part of them.
    Other QoS aspects, such as caching, throttling, etc. are pretty straightforward
    to implement with any API management solutions (and they have no special notion
    in the context of a microservice). Most of the QoS-related enforcements are done
    at the API gateway level and offload the actual decision making (e.g., security
    token validation) to an external entity.


    ### API Monetization


    APIs are all about your business capabilities and you can generate revenue by
    exposing them to your customers/partners. API management solutions provide such
    capabilities out-of-the-box to build a monetary ecosystem around your API management
    solution.'
  trans: '

    ### API 发布者/API 生命周期管理器


    在开发微服务时，您需要围绕业务能力来设计它们。您可能还需要集成多个微服务并形成组合来构建它们。如果需要将此能力作为受管能力暴露给消费者，您就必须为此创建一个
    API。


    API 提供者或创建者负责设计、开发、发布、部署、版本管理、治理、监控可用性以及衡量性能。API 管理解决方案中的 API 发布者/生命周期管理器组件正是负责此项工作的。


    API 发布者或 API 生命周期管理器允许您开发、记录、扩展和管理 API 版本。它还提供与 API 生命周期管理相关的任务，例如发布 API、货币化、分析统计数据和推广。


    我们可以确定与 API 生命周期管理器的每个生命周期状态相关的一些关键步骤：


    *   *开发阶段*：识别并开发应作为受管 API 暴露的业务能力。此任务可能涉及组合多个微服务并创建复合功能，以及将现有微服务作为 API 暴露。


    *   *发布阶段*：一旦我们实现了 API 的功能，就需要发布该 API，以便它在 API 开发者门户/商店中可见。我们还将 SLA（服务等级协议）和其他与
    QoS（服务质量）相关的功能（安全性、限流）关联到我们发布的 API。


    *   *管理阶段*：管理 API 生命周期状态的 API 版本管理策略。


    *   *可观测性阶段*：当消费者使用 API 时，所有与指标、链路追踪和日志相关的数据都会被 API 网关组件捕获。API 提供者应使用这些数据来增强、更改或实现其
    API 消费的货币化。


    ### API 网关


    当您从 API 发布者发布 API 时，API 定义会被推送到 API 网关组件中。API 网关负责保护、管理、扩展 API 调用。API 消费者发送的所有请求都会被
    API 网关拦截。它使用处理器应用诸如限流和安全性等策略，发布用于 API 可观测性及其他 API 治理任务的数据。此外，在某些情况下，我们可能会在 API
    网关层面实现多个业务功能的组合。但是，您需要谨慎对待在 API 网关层面进行的组合类型，并且必须避免第 7 章“集成微服务”中讨论的单体网关反模式。


    ### 注意


    我们在第 7 章中讨论了单体 API 网关反模式，即在单体网关层面开发某些微服务组合。（请参阅第 7 章中“用于集成微服务的单体 API 网关”一节。）


    避免这种情况的最佳方法是在您想要集成的微服务之上创建一个复合服务，然后在 API 网关处暴露该服务。如果您想在 API 网关进行组合，您的 API 网关需要具备作为微网关运行的能力，这样您部署在
    API 网关的每个 API 都将拥有独立的运行时。


    大多数 API 管理解决方案供应商通常将其整个解决方案称为 API 网关。您应该记住，其他组件的所有功能可能都被整合到一个单一的解决方案中。


    #### API 微网关


    大多数 API 网关最初都是作为单体运行时构建的。然而，随着微服务架构的出现，大多数 API 管理解决方案现在也提供微网关功能。微网关背后的关键思想是，我们开发
    API 并将其独立部署在容器原生网关运行时上，该运行时由集中的 API 发布者/生命周期管理器进行管理/治理。


    ### 注意


    当我们讨论包含 API、流和事件的微服务参考架构时，我们将进一步分析如何围绕 API 微网关概念来塑造您的整个微服务架构。


    ### API 商店/开发者门户


    当 API 提供者通过 API 发布者发布 API 时，这些 API 会被推送到相应的 API 商店或开发者门户。API 开发者通过 API 商店自助服务、发现、评估、订阅并使用受保护、经过身份验证的
    API。让我们看看与 API 商店相关的一些生命周期活动。


    *   *发现阶段*：找出与 API 开发者业务能力相匹配的 API。


    *   *探索阶段*：查看 API 的评分和评论，阅读文档，并试用部分功能。


    *   *订阅阶段*：注册应用程序并订阅 API，获取所需的安全令牌等，以调用 API 并订阅 API 生命周期变更的通知。


    *   *评估阶段*：一旦我们开始使用 API，就可以对其进行评分、评论和提供反馈。


    ### API 分析/可观测性


    从技术和业务角度来看，API 分析或可观测性都是一个关键因素。因此，API 管理解决方案提供了各种开箱即用的 API 分析功能。这包括 API 调用指标、API
    订阅者、热门 API、热门开发者、慢速/快速 API、API 调用错误、趋势 API 等。此外，追踪 API 流量的能力对于故障排除和识别瓶颈至关重要。还需要具备传统的运行时监控和日志记录能力。其他一些解决方案，如
    API 货币化，则建立在 API 分析数据之上。


    ### API 服务质量


    API 服务质量 (QoS) 包含多个方面，例如安全性、缓存、限流和其他 SLA（服务等级协议）。我们有两个专门的章节（第 11 章“微服务安全基础”和第
    12 章“保护微服务安全”）涵盖了微服务安全基础，API 安全是其中的一部分。其他 QoS 方面，如缓存、限流等，使用任何 API 管理解决方案实现起来都相当直接（并且在微服务上下文中没有特殊概念）。大多数与
    QoS 相关的执行都在 API 网关层面完成，并将实际的决策（例如，安全令牌验证）卸载到外部实体。


    ### API 货币化


    API 关乎您的业务能力，您可以通过向客户/合作伙伴暴露这些能力来创收。API 管理解决方案提供开箱即用的此类能力，以便围绕您的 API 管理解决方案构建一个货币生态系统。

    '
- fmt: '### API Definition with OpenAPI


    The key idea of designing an API for a microservice is to hide the implementation
    details and only expose the interface that addresses a specific business functionality.
    The OpenAPI specification (`OAS`), which is formerly known as Swagger, defines
    a standard programming language-agnostic interface description for REST APIs.
    It allows both humans and computers to discover and understand the capabilities
    of a service without requiring access to source code, additional documentation,
    or inspection of network traffic.


    OpenAPI documents describe an API’s services and are represented in either YAML
    or JSON formats. These documents may be produced and served statically or be generated
    dynamically from an application.


    You can either start by designing the API first (contract first) and then implement
    the API (may be using code-generation plugins) or you can first implement the
    API and derive the OpenAPI definition for your service. However, it’s important
    to keep in mind that OpenAPI is not intended to cover all possible styles of RESTful
    service design. You can learn about building an OpenAPI-based API definition by
    referring to OpenAPI samples^([^(139)](#fn139)).


    ### A Query Language for Your APIs: GraphQL


    As discussed in Chapter [3](#461146_1_En_3_Chapter.xhtml), “Inter-Service Communication,”
    GraphQL provides a query language for APIs, which are not necessarily based on
    the REST architecture. We can still implement API management on top of GraphQL-based
    services and expose them as managed APIs. An API based on GraphQL can be more
    powerful than a conventional RESTful API, as it provides a complete and understandable
    description of the data in your API, gives clients the power to ask for exactly
    what they need and nothing more, makes it easier to evolve APIs over time, and
    enables powerful developer tools.


    ### API Management and Service Mesh


    API gateways/management solutions and service mesh have similar characteristics,
    which confuses some in the community. In order to differentiate an API gateway
    from a service mesh, let’s take a closer look at the key characteristics of both.
    It’s important to understand the users who interact with the management of API
    gateways and service mesh.


    - **API management**: The users who interact with the API management are creating
    and managing business functionalities that they want to expose as APIs.

    - **Service Mesh management**: The users interact with the service mesh are primarily
    responsible for managing the non-business logic aspects of the communication between
    microservices. More or less, they manage the inter-service communication infrastructure
    of the services.


    With this distinction, Figure [10-2](#461146_1_En_10_Chapter.xhtml#Fig2) shows
    how you can use API management along with a service mesh.


    ![../images/461146_1_En_10_Chapter/461146_1_En_10_Fig2_HTML.jpg](images/461146_1_En_10_Chapter/461146_1_En_10_Fig2_HTML.jpg)


    Figure 10-2


    Service-to-service communication with service mesh and the API gateway


    The API/edge services that we develop at the API gateway layer serve a specific
    business functionality. They call the downstream microservices and may contain
    some business logic that creates compositions/mashups of multiple services. API
    services also need to call the downstream services in a resilient manner and apply
    various stability patterns, such as circuit breakers, timeouts, and load balancing/failover.
    They can offload such functionalities to the service mesh. Therefore, there will
    be a service mesh sidecar proxy running alongside each API service. (Although
    most of the API gateway solutions out there have these features built in, they
    can still offload such functionalities to the service mesh.) Since the service
    mesh is the network communication infrastructure, and it allows you to decouple
    and offload most of the application network functions from your service code,
    you will have a separate control plane to manage such capabilities. There can
    be certain overlapping features such as observability of a given API service,
    which is available from both service mesh and API management observability capabilities.
    We can still keep them as two different things, as the API management layer is
    designed for business capabilities, while the service mesh layer is designed for
    non-business logic inter-service communication requirements. Another important
    difference is that the API management layer only manages your API services, while
    the service mesh control plane manages all your service instances.


    ### Note


    There are some overlapping features of API management and service mesh, but it’s
    important to understand that these two concepts serve fundamentally different
    requirements.


    There are some API management solutions that support both API management and service
    mesh management from the same layer/component. For example, Apigee and Istio support
    a similar architecture pattern. With Apigee support for Istio integration, the
    user can expose one or more services from an Istio mesh as APIs by adding API
    management capabilities via Istio’s native configuration mechanism. Apigee APIM
    publishes the API policies etc. via the Istio mixer and application of such policies
    are done at each sidecar. With this approach, we no longer use the API micro gateways
    but everything is offloaded to sidecar proxies. API token validation, throttling
    can be managed via APIM UI. This pattern is relatively new and yet to be battle-tested
    with real-world production use cases.


    ### Implementing API Management


    Implementation of comprehensive API management for your microservices requires
    catering all the API management aspects that we discussed earlier. There are quite
    a few solutions, which have drastically cut down the API management features and
    promote them as an API gateway for microservices. You need to be cautious when
    selecting an API management solution and make sure you can facilitate all your
    API management requirements. Also, if you have fully embraced a container-native
    architecture, the components such as API gateway must be container-native too
    (i.e., they must support a micro-gateway architecture).


    There are quite a few API management solutions out there, such as Apigee, WSO2
    API Manager, Kong, MuleSoft, etc. We don’t focus on comparing and contrasting
    them or recommending a specific solution. We want to give full freedom to the
    readers to evaluate them and select the most suitable technology. You can find
    couple of API Management use cases built with such API Management solutions in
    the samples of chapter 10.


    ## Events


    Event-driven architecture (`EDA`) is a widely used architectural paradigm in software
    applications in which a given application executes some form of code/logic in
    response to a one or more event notifications. `EDA` makes applications/services
    more autonomous than the client-server architecture, where the party that sends
    the notification waits or depends on the consumer who consumes the event.


    In the context of microservices, we already discussed multiple forms of `EDA`
    under the asynchronous communication style (Chapter [2](#461146_1_En_2_Chapter.xhtml),
    “Designing Microservices”) and reactive compositions/choreography (Chapter [7](#461146_1_En_7_Chapter.xhtml)).
    Basically, we can design microservices so that they operate in a full event-driven
    model and asynchronous message passing allows them to be more autonomous. In this
    chapter, we explore some of the commonly used event-driven patterns in a microservices
    architecture.'
