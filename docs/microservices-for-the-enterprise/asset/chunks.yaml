- fmt: '### Sidecar Pattern


    A sidecar is a software component that is co-located with the primary application
    but runs on its own process or container, providing a network interface to connect
    to it, which makes it language-agnostic. All the core application functionalities
    are implemented as part of the main application logic, while other commodity crosscutting
    features, which are not related to the business logic, are facilitated from the
    sidecar. Usually all the inbound and outbound communication of the application
    take place via the sidecar proxy.


    `Service Mesh` provides the built-in support for some network functions such as
    resiliency, service discovery, etc. Therefore, service developers can focus more
    on the business logic while most of the work related to the network communication
    is offloaded to the `Service Mesh`. For instance, you don’t need to worry about
    circuit breaking anymore when your microservice calls another service. That comes
    as part of the `Service Mesh`.


    `Service Mesh` is language-agnostic. The microservice to `Service Mesh` proxy
    communication always happens over standard protocols such as HTTP1.x/2.x, gRPC,
    etc. You can write your microservices from any technology and they will still
    work with the `Service Mesh`.


    With the introduction of the `Service Mesh`, the way the services interact changes,
    as shown in Figure [9-3](#461146_1_En_9_Chapter.xhtml#Fig3). For instance, `microservice-P`
    does not directly communicate with `microservice-Q` anymore. Rather, all inbound
    (ingress) and outbound (egress) traffic of a given service goes through the `Service
    Mesh` sidecar.


    ![../images/461146_1_En_9_Chapter/461146_1_En_9_Fig3_HTML.jpg](images/461146_1_En_9_Chapter/461146_1_En_9_Fig3_HTML.jpg)


    Figure 9-3


    Service-to-service communication with Service Mesh


    The service directly communicates with the sidecar proxy and it should therefore
    be capable of doing primitive network functions (such as calling an HTTP service),
    but should not need to take care of application-level network functions (circuit
    breakers, etc.).


    Let’s look further into the service interactions and responsibilities shown in
    Figure [9-4](#461146_1_En_9_Chapter.xhtml#Fig4).


    ![../images/461146_1_En_9_Chapter/461146_1_En_9_Fig4_HTML.jpg](images/461146_1_En_9_Chapter/461146_1_En_9_Fig4_HTML.jpg)


    Figure 9-4


    Responsibilities of a Service Mesh sidecar and a microservice that is running
    alongside


    It’s important to identify the boundaries and responsibilities between a service
    and a sidecar proxy. As we discussed in Chapter [7](#461146_1_En_7_Chapter.xhtml),
    some of the capabilities provided in the `Service Mesh` are also provided by the
    microservices development languages. We need to be cautious when implementing
    a given capability at each layer. Let’s look next at each of these layers and
    their responsibilities in detail.


    ### Business Logic


    The service implementation should contain the realization of the business functionalities
    of a given service. This includes logic related to its business functions, computations,
    integration with other services/systems (including legacy, proprietary, and SaaS)
    or service compositions, complex routing logics, type mapping logic between different
    business entities, etc.


    ### Primitive Network Functions


    Although we offload most of the network functions to the `Service Mesh`, a given
    service must contain the basic high-level network interactions to connect with
    the `Service Mesh` sidecar proxy. Hence, a given service implementation will have
    to use some kind of a network library (unlike the ESB world, where you just have
    to use a very simple abstraction) to initiate network calls (to the `Service Mesh`
    proxy only). In most cases, microservices development frameworks embed the required
    network libraries to be used for these functions (e.g. basic HTTP transport).


    ### Application Network Functions


    There are application functionalities that are tightly coupled to the network,
    such as circuit breaking, timeouts, service discovery, etc. Those are explicitly
    separated from the service code/business logic, and `Service Mesh` facilitates
    those functionalities out-of-the-box.


    Most of the initial microservices implementations simply ignored the gravity of
    the network functions offered from a centralized ESB layer, and they implemented
    all such functionalities from scratch at each microservice level. Now they have
    started realizing the importance of having a similar shared functionality as a
    distributed mesh.


    ### Control Plane


    All `Service Mesh` proxies are centrally managed by a control plane. This is quite
    useful when supporting `Service Mesh` capabilities such as access control, observability,
    service discovery, etc. All the changes you make at the control plane are pushed
    into sidecar proxies.


    ## Functionalities of a Service Mesh


    As we saw earlier, the `Service Mesh` offers a set of application network functions
    while the primitive network functions (such as calling the sidecar over the localhost
    network) are still implemented at the microservices level. There is no hard and
    fast rule on what functionalities should be offered from a `Service Mesh`. However,
    some of the commonly offered features by a `Service Mesh` are mentioned in the
    following sections.


    ### Resiliency for Inter-Service Communications


    The network communication capabilities, such as circuit-breaking, retries and
    timeouts, fault injection, fault handling, load balancing, and failover are supported
    as part of the `Service Mesh`. With microservices, we used to have such capabilities
    implemented as part of the service logic. With the `Service Mesh` in place, you
    will not have to build such network functions as part of your service code.


    ### Service Discovery


    The services that you run with the `Service Mesh` needed to be discovered via
    a logical naming scheme (no hardcoded hosts or ports). Therefore, `Service Mesh`
    works with a given service discovery tool to support service registration and
    discovery. Most `Service Mesh` implementations come with out-of-the-box capabilities
    to support service discovery. For example, `Istio` comes with built-in support
    for service discovery using the underlying Kubernetes and etcd^([^(125)](#fn125)).
    If you already have a service discovery solution such as `Consul`^([^(126)](#fn126)),
    it can also be integrated with the `Service Mesh`.


    ### Routing


    Some of the primitive routing capabilities, such as routing based on, certain
    headers, versions etc., are supported by `Service Mesh`. We have to be really
    careful about what we implement at the `Service Mesh` routing layer to not to
    have any business logic as part of the `Service Mesh` routing logic.


    ### Observability


    When you use `Service Mesh`, all your services are automatically becoming observable
    without any changes to your code. Metrics, monitoring, distributed logging, distributed
    tracing, and service visualizations are available out-of-the-box. Since all the
    traffic data is captured at the sidecar proxy level, sidecar proxy can publish
    those data to the relevant control plane components that are responsible to analyze
    are published to corresponding observability tools.


    ### Security


    `Service Mesh` supports transport level security (TLS) between service-to-service
    communication and Role-Based-Access Control (RBAC). Also, some of the existing
    `Service Mesh` implementations are constantly adding more security-related capabilities
    to the `Service Mesh` implementations.


    ### Deployment


    Almost all the `Service Mesh` implementations are closely integrated to container
    and container management systems. Docker and Kubernetes are the de-facto standards
    for deployment options with `Service Meshes`. However, running inside VMs is also
    possible.'
  raw: '### Sidecar Pattern


    A sidecar is a software component that is co-located with the primary application
    but runs on its own process or container, providing a network interface to connect
    to it, which makes it language-agnostic. All the core application functionalities
    are implemented as part of the main application logic, while other commodity crosscutting
    features, which are not related to the business logic, are facilitated from the
    sidecar. Usually all the inbound and outbound communication of the application
    take place via the sidecar proxy.


    Service Mesh provides the built-in support for some network functions such as
    resiliency, service discovery, etc. Therefore, service developers can focus more
    on the business logic while most of the work related to the network communication
    is offloaded to the Service Mesh. For instance, you don’t need to worry about
    circuit breaking anymore when your microservice calls another service. That comes
    as part of the Service Mesh.


    Service Mesh is language-agnostic. The microservice to Service Mesh proxy communication
    always happens over standard protocols such as HTTP1.x/2.x, gRPC, etc. You can
    write your microservices from any technology and they will still work with the
    Service Mesh.


    With the introduction of the Service Mesh, the way the services interact changes,
    as shown in Figure [9-3](#461146_1_En_9_Chapter.xhtml#Fig3) . For instance, `microservice-P`
    does not directly communicate with `microservice-Q` anymore. Rather, all inbound
    (ingress) and outbound (egress) traffic of a given service goes through the Service
    Mesh sidecar.


    ![../images/461146_1_En_9_Chapter/461146_1_En_9_Fig3_HTML.jpg](images/461146_1_En_9_Chapter/461146_1_En_9_Fig3_HTML.jpg)


    Figure 9-3


    Service-to-service communication with Service Mesh


    The service directly communicates with the sidecar proxy and it should therefore
    be capable of doing primitive network functions (such as calling an HTTP service),
    but should not need to take care of application-level network functions (circuit
    breakers, etc.).


    Let’s look further into the service interactions and responsibilities shown in
    Figure [9-4](#461146_1_En_9_Chapter.xhtml#Fig4).


    ![../images/461146_1_En_9_Chapter/461146_1_En_9_Fig4_HTML.jpg](images/461146_1_En_9_Chapter/461146_1_En_9_Fig4_HTML.jpg)


    Figure 9-4


    Responsibilities of a Service Mesh sidecar and a microservice that is running
    alongside


    It’s important to identify the boundaries and responsibilities between a service
    and a sidecar proxy. As we discussed in Chapter [7](#461146_1_En_7_Chapter.xhtml),
    some of the capabilities provided in the Service Mesh are also provided by the
    microservices development languages. We need to be cautious when implementing
    a given capability at each layer. Let’s look next at each of these layers and
    their responsibilities in detail.


    ### Business Logic


    The service implementation should contain the realization of the business functionalities
    of a given service. This includes logic related to its business functions, computations,
    integration with other services/systems (including legacy, proprietary, and SaaS)
    or service compositions, complex routing logics, type mapping logic between different
    business entities, etc.


    ### Primitive Network Functions


    Although we offload most of the network functions to the Service Mesh, a given
    service must contain the basic high-level network interactions to connect with
    the Service Mesh sidecar proxy. Hence, a given service implementation will have
    to use some kind of a network library (unlike the ESB world, where you just have
    to use a very simple abstraction) to initiate network calls (to the Service Mesh
    proxy only). In most cases, microservices development frameworks embed the required
    network libraries to be used for these functions (e.g. basic HTTP transport).


    ### Application Network Functions


    There are application functionalities that are tightly coupled to the network,
    such as circuit breaking, timeouts, service discovery, etc. Those are explicitly
    separated from the service code/business logic, and Service Mesh facilitates those
    functionalities out-of-the-box.


    Most of the initial microservices implementations simply ignored the gravity of
    the network functions offered from a centralized ESB layer, and they implemented
    all such functionalities from scratch at each microservice level. Now they have
    started realizing the importance of having a similar shared functionality as a
    distributed mesh.


    ### Control Plane


    All Service Mesh proxies are centrally managed by a control plane. This is quite
    useful when supporting Service Mesh capabilities such as access control, observability,
    service discovery, etc. All the changes you make at the control plane are pushed
    into sidecar proxies.


    ## Functionalities of a Service Mesh


    As we saw earlier, the Service Mesh offers a set of application network functions
    while the primitive network functions (such as calling the sidecar over the localhost
    network) are still implemented at the microservices level. There is no hard and
    fast rule on what functionalities should be offered from a Service Mesh. However,
    some of the commonly offered features by a Service Mesh are mentioned in the following
    sections.


    ### Resiliency for Inter-Service Communications


    The network communication capabilities, such as circuit-breaking, retries and
    timeouts, fault injection, fault handling, load balancing, and failover are supported
    as part of the Service Mesh. With microservices, we used to have such capabilities
    implemented as part of the service logic. With the Service Mesh in place, you
    will not have to build such network functions as part of your service code.


    ### Service Discovery


    The services that you run with the Service Mesh needed to be discovered via a
    logical naming scheme (no hardcoded hosts or ports). Therefore, Service Mesh works
    with a given service discovery tool to support service registration and discovery.
    Most Service Mesh implementations come with out-of-the-box capabilities to support
    service discovery. For example, Istio comes with built-in support for service
    discovery using the underlying Kubernetes and etcd^([^(125)](#fn125)). If you
    already have a service discovery solution such as Consul^([^(126)](#fn126)), it
    can also be integrated with the Service Mesh.


    ### Routing


    Some of the primitive routing capabilities, such as routing based on, certain
    headers, versions etc., are supported by Service Mesh. We have to be really careful
    about what we implement at the Service Mesh routing layer to not to have any business
    logic as part of the Service Mesh routing logic.


    ### Observability


    When you use Service Mesh, all your services are automatically becoming observable
    without any changes to your code. Metrics, monitoring, distributed logging, distributed
    tracing, and service visualizations are available out-of-the-box. Since all the
    traffic data is captured at the sidecar proxy level, sidecar proxy can publish
    those data to the relevant control plane components that are responsible to analyze
    are published to corresponding observability tools.


    ### Security


    Service Mesh supports transport level security (TLS) between service-to-service
    communication and Role-Based-Access Control (RBAC). Also, some of the existing
    Service Mesh implementations are constantly adding more security-related capabilities
    to the Service Mesh implementations.


    ### Deployment


    Almost all the Service Mesh implementations are closely integrated to container
    and container management systems. Docker and Kubernetes are the de-facto standards
    for deployment options with Service Meshes. However, running inside VMs is also
    possible.'
  trans: '

    ### Sidecar 模式


    Sidecar 是一种与主应用程序位于同一位置，但在其自身进程或容器中运行的软件组件，它提供一个网络接口来连接主应用，因此与编程语言无关。所有核心应用功能都作为主应用逻辑的一部分来实现，而其他与业务逻辑无关的通用横切功能则由
    Sidecar 提供便利。通常，应用程序的所有入站和出站通信都通过 Sidecar 代理进行。


    服务网格为一些网络功能（如弹性、服务发现等）提供了内置支持。因此，服务开发者可以更专注于业务逻辑，而大部分与网络通信相关的工作则被卸载到服务网格。例如，当你的微服务调用另一个服务时，你不再需要担心熔断问题。这已成为服务网格的一部分。


    服务网格与编程语言无关。微服务到服务网格代理的通信始终通过标准协议（如 HTTP1.x/2.x、gRPC 等）进行。你可以使用任何技术编写微服务，它们仍然可以与服务网格协同工作。


    随着服务网格的引入，服务交互的方式发生了变化，如图 9-3 所示。例如，`microservice-P` 不再直接与 `microservice-Q` 通信。相反，给定服务的所有入站（入口）和出站（出口）流量都通过服务网格
    Sidecar。


    ![../images/461146_1_En_9_Chapter/461146_1_En_9_Fig3_HTML.jpg](img/461146_1_En_9_Fig3_HTML.jpg)


    图 9-3


    使用服务网格的服务间通信


    服务直接与 Sidecar 代理通信，因此它应该能够执行基本的网络功能（例如调用 HTTP 服务），但不需要处理应用级别的网络功能（如熔断器等）。


    让我们进一步了解图 9-4 中所示的服务交互和职责。


    ![../images/461146_1_En_9_Chapter/461146_1_En_9_Fig4_HTML.jpg](img/461146_1_En_9_Fig4_HTML.jpg)


    图 9-4


    服务网格 Sidecar 和与其并行的微服务的职责


    明确服务与 Sidecar 代理之间的边界和职责非常重要。正如我们在第 7 章中讨论的，服务网格提供的某些能力也由微服务开发语言提供。在每一层实现特定能力时，我们需要谨慎。接下来，让我们详细看看每一层及其职责。


    ### 业务逻辑


    服务实现应包含给定服务的业务功能实现。这包括与其业务功能、计算、与其他服务/系统（包括遗留系统、专有系统和 SaaS）的集成或服务组合、复杂路由逻辑、不同业务实体之间的类型映射逻辑等相关的逻辑。


    ### 基本网络功能


    尽管我们将大部分网络功能卸载到服务网格，但给定服务必须包含与服务网格 Sidecar 代理连接所需的基本高级网络交互。因此，给定服务的实现将需要使用某种网络库（不同于
    ESB 世界，你只需使用非常简单的抽象）来发起网络调用（仅向服务网格代理）。在大多数情况下，微服务开发框架嵌入了这些功能所需的网络库（例如基本的 HTTP
    传输）。


    ### 应用网络功能


    存在一些与网络紧密耦合的应用功能，例如熔断、超时、服务发现等。这些功能被明确地从服务代码/业务逻辑中分离出来，服务网格开箱即用地提供了这些功能。


    大多数早期的微服务实现简单地忽略了集中式 ESB 层提供的网络功能的重要性，并在每个微服务级别从头开始实现所有这些功能。现在，他们开始意识到拥有一个类似的、作为分布式网格的共享功能的重要性。


    ### 控制平面


    所有服务网格代理都由一个控制平面集中管理。这在支持服务网格能力（如访问控制、可观测性、服务发现等）时非常有用。你在控制平面所做的所有更改都会被推送到 Sidecar
    代理。


    ## 服务网格的功能


    正如我们之前所见，服务网格提供了一组应用网络功能，而基本网络功能（例如通过 localhost 网络调用 Sidecar）仍在微服务级别实现。对于服务网格应提供哪些功能，并没有硬性规定。然而，以下部分提到了服务网格通常提供的一些功能。


    ### 服务间通信的弹性


    网络通信能力，如熔断、重试和超时、故障注入、故障处理、负载均衡和故障转移，都是服务网格的一部分。在使用微服务时，我们通常将这些能力作为服务逻辑的一部分来实现。有了服务网格，你将不必在服务代码中构建这些网络功能。


    ### 服务发现


    你使用服务网格运行的服务需要通过逻辑命名方案（无硬编码的主机或端口）来发现。因此，服务网格与给定的服务发现工具协同工作，以支持服务注册和发现。大多数服务网格实现都带有开箱即用的服务发现支持能力。例如，Istio
    通过底层 Kubernetes 和 etcd^(¹²⁵) 内置支持服务发现。如果你已经有像 Consul^(¹²⁶) 这样的服务发现解决方案，它也可以与服务网格集成。


    ### 路由


    服务网格支持一些基本的路由能力，例如基于特定标头、版本等的路由。我们必须非常小心地在服务网格路由层实现什么，以确保服务网格路由逻辑中不包含任何业务逻辑。


    ### 可观测性


    当你使用服务网格时，你的所有服务都会自动变得可观测，而无需更改任何代码。指标、监控、分布式日志记录、分布式追踪和服务可视化都是开箱即用的。由于所有流量数据都在
    Sidecar 代理级别捕获，Sidecar 代理可以将这些数据发布给负责分析的相关控制平面组件，这些组件再发布到相应的可观测性工具。


    ### 安全性


    服务网格支持服务间通信的传输层安全（TLS）和基于角色的访问控制（RBAC）。此外，一些现有的服务网格实现正在不断为服务网格实现添加更多与安全相关的能力。


    ### 部署


    几乎所有服务网格实现都与容器和容器管理系统紧密集成。Docker 和 Kubernetes 是服务网格部署选项的事实标准。然而，在虚拟机内运行也是可行的。

