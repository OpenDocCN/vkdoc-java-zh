    alternative technologies out there.)


    As a solution to some of the limitations of the monolithic application architecture,
    Service Oriented Architecture (SOA) and Enterprise Service Bus (ESB) emerged.


    ### SOA and ESB


    SOA tries to combat the challenges of large monolithic applications by segregating
    the functionalities of monolithic applications into reusable, loosely coupled
    entities called *services*. These services are accessible via calls over the network.


    *   A service is a self-contained implementation of a well-defined business functionality
    that is accessible over the network. Applications in SOA are built based on services.


    *   Services are software components with well-defined interfaces that are implementation-independent.
    An important aspect of SOA is the separation of the service interface (the what)
    from its implementation (the how).


    *   The consumers are only concerned about the service interface and do not care
    about its implementation.


    *   Services are self-contained (perform predetermined tasks) and loosely coupled
    (for independence).


    *   Services can be dynamically discovered. The consumers often don’t need to
    know the exact location and other details of a service. They can discover the
    service’s metadata via a service metadata repository or a service registry. When
    there’s a change to the service metadata, the service can update its metadata
    in the service registry.


    *   Composite services can be built from aggregates of other services.


    With the SOA paradigm, each business functionality is built as a (coarse-grained)
    service (often implemented as Web Services) with several sub-functionalities.
    These services are deployed inside an application server. When it comes to the
    consumption of business functionalities, we often need to integrate/plumb multiple
    such services (and create composite services) and other systems. Enterprise Service
    Bus (ESB) is used to integrate those services, data, and systems. Consumers use
    the composite services exposed from the ESB layer. Hence, ESB is used as the centralized
    bus (see Figure [1-2](#461146_1_En_1_Chapter.xhtml#Fig2)) that connects all these
    services and systems.


    ![../images/461146_1_En_1_Chapter/461146_1_En_1_Fig2_HTML.jpg](images/461146_1_En_1_Chapter/461146_1_En_1_Fig2_HTML.jpg)


    Figure 1-2


    SOA/ESB style based online retail system


    For example, let’s go back to our online retail application use case. Figure [1-2](#461146_1_En_1_Chapter.xhtml#Fig2)
    illustrates the implementation of the online retail application using SOA/web
    services. Here we have defined multiple web services that cater to various business
    capabilities such as products, customers, shopping, orders, payments, etc. At
    the ESB layer, we may integrate such business capabilities and create composite
    business capabilities, which are exposed to the consumers. Or the ESB layer may
    just be used to expose the functionalities as it is, with additional cross-cutting
    features such as security. So, obviously the ESB layer also contains a significant
    portion of the business logic of the entire application. Other cross-cutting concerns
    such as security, monitoring, and analytics may also be applied at the ESB layer.
    The ESB layer is a monolithic entity where all developers share the same runtime
    to develop/deploy their service integrations.'
  trans: '

    ### 单体应用


    企业级软件应用旨在满足众多业务需求。在单体架构风格中，所有业务功能都被打包进一个单一的单体应用中，并作为一个整体单元进行构建。


    我们来看一个现实世界的例子，以便进一步理解单体应用。图 1-1 展示了一个采用单体架构风格构建的在线零售应用。


    ![../images/461146_1_En_1_Chapter/461146_1_En_1_Fig1_HTML.png](img/461146_1_En_1_Fig1_HTML.png)


    图 1-1


    采用单体架构开发的在线零售应用


    整个零售应用由多个组件组成，例如订单管理、支付、产品管理等。每个组件都提供广泛的业务功能。由于其单体特性，为某个组件添加或修改功能的成本极其高昂。此外，为了满足整体业务需求，这些组件之间必须相互通信。这些组件间的通信通常建立在专有协议和标准之上，并采用点对点的通信方式。因此，修改或替换某个特定组件也相当复杂。例如，如果零售企业希望在保留其他组件的同时切换到新的订单管理系统，那么这样做也需要对现有的其他组件进行大量修改。


    我们可以将单体应用的常见特征概括如下：


    *   作为一个单一单元进行设计、开发和部署。

    *   对于大多数现实世界的业务用例来说，极其复杂，这导致在维护、升级和添加新功能方面如同噩梦。

    *   难以实践敏捷开发和交付方法论。由于应用必须作为一个单一单元构建，它所提供的大部分业务能力无法拥有自己的生命周期。

    *   要更新应用的任何部分，都必须重新部署整个应用。

    *   随着单体应用的增长，其启动时间可能会越来越长，从而增加了总体成本。

    *   它必须作为一个单一应用进行扩展，并且很难在资源需求冲突的情况下进行扩展。（例如，由于单体应用提供多种业务能力，一种能力可能需要更多 CPU，而另一种则需要更多内存。很难满足这些能力的个性化需求。）

    *   一个不稳定的服务可能导致整个应用宕机。

    *   很难采用新技术和框架，因为所有功能都必须基于同质化的技术/框架构建。（例如，如果你正在使用 Java，那么所有新项目都必须基于 Java，即使存在更好的替代技术。）


    作为对单体应用架构某些局限性的解决方案，面向服务架构（SOA）和企业服务总线（ESB）应运而生。


    ### SOA 与 ESB


    SOA 试图通过将单体应用的功能分离成可重用、松耦合的实体（称为*服务*）来应对大型单体应用的挑战。这些服务通过网络调用进行访问。


    *   服务是对一个定义明确的业务功能的独立实现，可通过网络访问。SOA 中的应用是基于服务构建的。

    *   服务是具有定义明确的接口的软件组件，这些接口与实现无关。SOA 的一个重要方面是将服务接口（做什么）与其实现（怎么做）分离开来。

    *   消费者只关心服务接口，而不关心其实现。

    *   服务是自包含的（执行预定义的任务）且松耦合的（以实现独立性）。

    *   服务可以被动态发现。消费者通常不需要知道服务的具体位置和其他细节。他们可以通过服务元数据仓库或服务注册中心来发现服务的元数据。当服务元数据发生变化时，服务可以在服务注册中心更新其元数据。

    *   复合服务可以由其他服务的聚合体构建而成。


    在 SOA 范式中，每个业务功能都被构建为一个（粗粒度的）服务（通常实现为 Web 服务），其中包含若干子功能。这些服务部署在应用服务器内部。在消费业务功能时，我们通常需要集成/连接多个这样的服务（并创建复合服务）以及其他系统。企业服务总线（ESB）用于集成这些服务、数据和系统。消费者使用从
    ESB 层暴露出来的复合服务。因此，ESB 被用作连接所有这些服务和系统的集中式总线（见图 1-2）。


    ![../images/461146_1_En_1_Chapter/461146_1_En_1_Fig2_HTML.jpg](img/461146_1_En_1_Fig2_HTML.jpg)


    图 1-2


    基于 SOA/ESB 风格的在线零售系统


    例如，让我们回到在线零售应用的用例。图 1-2 展示了使用 SOA/Web 服务实现在线零售应用的情况。这里我们定义了多个 Web 服务，以满足各种业务能力，如产品、客户、购物、订单、支付等。在
    ESB 层，我们可能会集成这些业务能力并创建复合业务能力，然后暴露给消费者。或者，ESB 层可能只是原样暴露这些功能，并附加一些横切特性，例如安全性。因此，显然
    ESB 层也包含了整个应用相当一部分的业务逻辑。其他横切关注点，如安全、监控和分析，也可能在 ESB 层实施。ESB 层是一个单体实体，所有开发人员共享同一个运行时来开发/部署他们的服务集成。

    '
- fmt: '### APIs


    Exposing business functionalities as managed services or APIs has become a key
    requirement of the modern enterprise architecture. However, web services/SOA is
    not really the ideal solution to cater to such requirements, due to the complexity
    of the Web Service-related technologies such as `SOAP` (used as the message format
    for inter-service communication), `WS-Security` (to secure messaging between services),
    `WSDLs` (to define the service contract), etc., and the lack of features to build
    an ecosystem around APIs (self-servicing, etc.)


    Therefore, most organizations put a new API Management/API Gateway layer on top
    of the existing SOA implementations. This layer is known as the *API façade*,
    and it exposes a simple API for a given business functionality and hides all the
    internal complexities of the ESB/Web Services layer. The API layer is also used
    for security, throttling, caching, and monetization.


    For example, Figure [1-3](#461146_1_En_1_Chapter.xhtml#Fig3) introduces an API
    gateway on top of the ESB layer. All the business capabilities offered from our
    online retail application are now being exposed as managed APIs. The API management
    layer is not just to expose functionalities as managed APIs, but you will be able
    to build a whole ecosystem of business capabilities and their consumers.


    ![../images/461146_1_En_1_Chapter/461146_1_En_1_Fig3_HTML.jpg](images/461146_1_En_1_Chapter/461146_1_En_1_Fig3_HTML.jpg)


    Figure 1-3


    Exposing business functionalities as managed APIs through an API Gateway layer


    With the increasing demand for complex business capabilities, the monolithic architecture
    can no longer cater to the modern enterprise software application development.
    The centralized nature of monolithic applications results in the lack of being
    able to scale applications independently, inter-application dependencies that
    hinder independent application development and deployment, reliability issues
    due to the centralized nature and the constraints on using diverse technologies
    for application development. To overcome most of these limitations and to cater
    to the modern, complex, and decentralized application needs, a new architecture
    paradigm must be conceived.


    The microservices architecture has emerged as a better architecture paradigm to
    overcome the drawbacks of the ESB/SOA architecture as well as the conventional
    monolithic application architecture.


    ## What Is a Microservice?


    The foundation of the microservices architecture is about developing a single
    application as a suite of small and independent services that are running in their
    own processes, developed and deployed independently.


    As illustrated in Figure [1-4](#461146_1_En_1_Chapter.xhtml#Fig4), the online
    retail software application can be transformed into a microservices architecture
    by breaking the monolithic application layer into independent and business functionality
    oriented services. Also, we got rid of the central ESB by breaking its functionalities
    into each service, so that the services take care of the inter-service communication
    and composition logic.


    ![../images/461146_1_En_1_Chapter/461146_1_En_1_Fig4_HTML.jpg](images/461146_1_En_1_Chapter/461146_1_En_1_Fig4_HTML.jpg)


    Figure 1-4


    An online retail application built using a microservices architecture


    Therefore, each microservice at the microservices layer offers a well-defined
    business capability (preferably with a small scope), which are designed, developed,
    deployed, and administrated independently.


    The API management layer pretty much stays the same, despite the changes to the
    ESB and services layers that it communicates with. The API gateway and management
    layer exposes the business functionalities as managed APIs; we have the option
    of segregating the gateway into independent per-API based runtimes.


    Since now you have a basic understanding of the microservices architecture, we
    can dive deep into the main characteristics of microservices.


    ### Business Capability Oriented


    One of the key concepts of the microservices architecture is that your service
    has to be designed based on the business capabilities, so that a given service
    will serve a specific business purpose and has a well-defined set of responsibilities.
    A given service should focus on doing only one thing and doing it well.


    It’s important to understand that a coarse-grained service (such as a web service
    developed in the SOA context) or a fine-grained service (which doesn’t map to
    a business capability) is not a suitable fit into the microservices architecture.
    Rather, the service should be sized purely based on the scope and the business
    functionality. Also, keep in mind that making services too small (i.e., oriented
    on fine grained features that map to business capabilities) is considered an anti-pattern.


    In the example scenario, we had coarse-grained services such as `Product`, `Order`,
    etc. in SOA/Web Services implementation (see Figure [1-3](#461146_1_En_1_Chapter.xhtml#Fig3))
    and when we move into microservices, we identified a set of more fine-grained,
    yet business capability-oriented services, such as `Product Details`, `Order Processing`,
    `Product Search`, `Shopping Cart`, etc.


    The size of the service is never determined based on the number of lines of code
    or the number of people working on that service. The concepts such as Single Responsibility
    Principle (SRP), Conway''s law, Twelve Factor App, Domain Driven Design (DDD),
    and so on, are useful in identifying and designing the scope and functionalities
    of a microservice. We will discuss such key concepts and fundamentals of designing
    microservices around business capabilities in Chapter [2](#461146_1_En_2_Chapter.xhtml),
    “Designing Microservices”.'
