  trans: '

    ### 集成服务


    核心微服务通常过于细粒度，无法直接映射到业务功能。任何实际的业务能力都需要多个微服务之间的交互或组合。这种交互或组合以*集成服务*或复合服务的形式实现。这些服务通常需要在服务层面自身支持企业服务总线（ESB）的相当一部分功能，例如路由、转换、编排、弹性和稳定性模式等。


    集成服务提供复合业务功能，彼此独立，并包含业务逻辑（路由、调用哪些服务、如何进行数据类型映射等）和网络通信逻辑（通过多种协议进行服务间通信，以及断路器之类的弹性行为）。此外，它们可能有也可能没有与服务业务功能相关的私有数据库。这些服务可以桥接其他遗留和专有系统（例如，ERP
    系统）、外部 Web API（例如，Salesforce）、共享数据库等（通常被称为防腐层）。


    为构建集成微服务选择恰当的服务开发技术至关重要。由于网络通信是集成服务的关键部分，您应选择最合适的技术来实现这些服务。在本章后半部分，我们将讨论适合构建这些服务的技术和框架。


    ### API 服务


    您将使用 API 服务或边缘服务，将选定的部分复合服务甚至一些核心服务作为托管 API 暴露出来。这些服务是一种特殊类型的集成服务，应用了基本的路由能力、API
    版本管理、API 安全、限流、货币化、API 组合等。


    在大多数微服务实现中，API 服务是作为单体 API 网关运行时的一部分实现的，这违反了核心微服务架构概念。然而，现在大多数 API 网关解决方案正朝着微网关能力发展，您可以在独立且轻量级的运行时上部署
    API 服务，同时进行集中管理。在实现方面，其需求与集成服务非常相似，并且我们需要一些额外的特性。我们将在第 10 章“API、事件和流”中更广泛地讨论 API
    服务和 API 管理。


    既然我们已经很好地理解了不同类型的微服务，接下来让我们讨论一些常用的微服务集成模式。


    ## 微服务集成模式


    我们已经在不同的微服务类别中找到了接缝，现在是时候看看它们如何在实际应用中被使用了。在集成微服务时，我们可以识别出几种集成模式。让我们详细讨论它们，并分析其优缺点以及何时使用这些模式。


    ### 主动组合或编排


    微服务集成可以通过这样一种方式实现：一个给定的（集成）微服务主动调用其他几个服务（可以是核心服务或复合服务）。业务逻辑和网络通信作为集成服务的一部分构建。集成微服务应通过其执行的组合来形成业务功能。例如，如图
    7-5 所示，`microservice-1`同步调用`microservice-4`和`microservice-5`。`microservice-1`提供的业务能力是`microservice-4`和`microservice-5`能力的组合。此外，我们开发的集成服务可以通过
    API 网关层作为 API 暴露出来。


    ![../images/461146_1_En_7_Chapter/461146_1_En_7_Fig5_HTML.jpg](img/461146_1_En_7_Fig5_HTML.jpg)


    图 7-5


    微服务的主动组合：一个给定的集成微服务调用多个微服务并形成一种业务能力


    这里的关键概念是，通过主动组合，我们创建了一个依赖于其他一组微服务的集成服务。如果你考虑我们在前几章讨论的理论方面，这似乎违反了微服务原则。但是，如果不依赖其他服务和系统，几乎不可能构建任何有用的东西。这里真正重要的是理解这些服务之间的边界，并清晰地定义其能力。


    当我们需要在集中式服务中控制服务集成，并且依赖服务之间的通信是同步时，通常会使用主动组合。一旦你为集成服务清晰地定义了业务能力，其业务逻辑就驻留在单个服务中。这使得管理和维护变得相当容易。


    ### 注意


    同步通信并不意味着实现基于阻塞通信模型。我们可以在完全非阻塞实现的基础上构建同步通信，在这种实现中，线程不会在给定的请求-响应交互上被阻塞。我们可以利用非阻塞编程模型来实现这种同步通信模式。


    如果你有异步或事件驱动的用例，这种方法可能不是最佳选择。服务之间的依赖关系可能对某些业务用例造成问题。即使你使用非阻塞技术来实现同步通信，请求也会受限于所有依赖服务的延迟。例如，如果调用了一个给定的集成服务，它将受限于所有依赖服务产生的延迟总和。


    ### 响应式组合或编排


    采用响应式通信风格，我们没有同步调用其他服务的服务。相反，服务之间的所有交互都使用异步事件驱动的通信风格实现。例如，如图 7-6 所示，微服务与消费者应用程序之间的通信是通过事件驱动的异步消息传递完成的。因此，我们需要使用事件总线作为消息传递骨干。事件总线是一个哑消息传递基础设施，所有逻辑都驻留在服务层面。


    ![../images/461146_1_En_7_Chapter/461146_1_En_7_Fig6_HTML.jpg](img/461146_1_En_7_Fig6_HTML.jpg)


    图 7-6


    采用异步事件驱动通信的响应式组合


    如第 3 章“服务间通信”所述，通信可以是基于队列的（单个消费者）或发布-订阅（多个消费者）。根据你的需求，你可以使用 Kafka、RabbitMQ 或 ActiveMQ
    等作为事件总线。


    响应式组合使微服务天生具有自治性。由于我们没有包含集中式组合逻辑的服务，这些微服务彼此不依赖。它们仅在给定事件发生时被激活，然后处理消息，并在结果发布到事件总线后完成工作。

    '
- fmt: '### Note


    事件流处理或复杂事件处理可以被视为处理事件流的更强大方式。此处我们仅讨论了基于事件的消息传递。我们将在第[10](#461146_1_En_10_Chapter.xhtml)章中详细讨论事件流处理。


    这种方法的主要权衡（例如通信的复杂性以及业务逻辑不在集中式服务中）使得系统难以理解。由于我们使用事件总线/消息总线，我们编写的所有服务都应具备发布和订阅事件总线的能力。此外，如果没有跨所有服务的全面可观测性，就很难理解响应式组合所实现的交互和业务逻辑。


    ### 主动与响应式组合的混合


    主动和响应式组合风格各有优缺点。根据大多数务实微服务实现的经验，某些场景下主动组合是最佳选择，而另一些场景下响应式组合则至关重要。我们的建议是根据微服务集成用例，采用这两种方法的混合方式。例如，图[7-7](#461146_1_En_7_Chapter.xhtml#Fig7)展示了这两种风格的混合。


    ![../images/461146_1_En_7_Chapter/461146_1_En_7_Fig7_HTML.jpg](images/461146_1_En_7_Chapter/461146_1_En_7_Fig7_HTML.jpg)


    **图 7-7** 主动与响应式微服务集成的混合


    通常，有些服务会作为完全同步的API暴露给消费者。此类API调用将导致多次其他微服务调用，其中某些调用可以/应该使用响应式方法进行。如第[3](#461146_1_En_3_Chapter.xhtml)章所述，在零售业务用例中，订单下达和处理等场景在采用响应式风格实现时更为优雅。因此，您需要根据业务用例选择要使用的风格。


    对于大多数企业级微服务集成而言，混合组合通常更为务实。


    ### 防腐层


    您可以在企业中引入微服务架构，同时其部分子系统仍基于单体架构。我们可以在微服务和单体子系统之间构建一个外观或适配层。在第[2](#461146_1_En_2_Chapter.xhtml)章“设计微服务”中，我们讨论了防腐层，它允许您独立开发微服务组件或现有单体应用。构建在这两种不同架构风格之上的应用可以通过防腐层相互交互。用于单体部分和微服务部分的技术和标准可能截然不同。这就是在构建微服务集成时通常需要构建防腐层的原因。


    例如，在我们图[7-7](#461146_1_En_7_Chapter.xhtml#Fig7)讨论的混合组合用例中，`microservice-3`将微服务子系统与专有、遗留和外部Web
    API（均属于单体子系统的一部分）集成在一起。该服务是防腐层的一部分。通常，用于构建集成微服务的技术也可用于构建防腐层的服务。


    ### 绞杀者外观


    在企业微服务的背景下，您经常需要处理现有的非微服务子系统。通过引入微服务架构，您将逐步替换大部分现有子系统。然而，这并非一蹴而就之事。*绞杀者模式*提出了一种方法，帮助您通过逐步用新的微服务替换特定功能模块，来增量迁移非微服务子系统。如果您正在向企业引入微服务，您将构建一个绞杀者外观，有选择地在现代系统和遗留系统之间路由流量。随着时间的推移，您将用新的微服务完全替换遗留系统，并移除绞杀者层。


    ## 集成服务的关键需求


    至此，您已充分理解集成微服务和微服务集成模式的重要性。让我们深入探讨可用于实现这些模式的技术。然而，在此之前，明确构建集成微服务的具体需求将大有裨益。


    ### 网络通信抽象


    正如我们在第[3](#461146_1_En_3_Chapter.xhtml)章中详细讨论的，微服务间通信对于构建基于微服务的应用至关重要。服务是自治的，它们交互并形成业务功能的唯一方式是通过服务间通信。因此，对于集成服务，我们必须支持不同的通信模式，如同步和异步通信以及相关的网络协议。


    在实践中，对于同步通信，RESTful服务被广泛使用，对RESTful服务和HTTP 1.1的原生支持至关重要。此外，许多服务实现框架现在利用HTTP2作为默认通信协议，以受益于HTTP2引入的所有新功能。


    在同步通信的背景下，gRPC服务正在普及，大多数微服务实现将其用作内部微服务通信的事实标准。鉴于gRPC和协议缓冲区^([^(97)](#fn97))适用于多语言微服务实现，它们天然满足使用不同语言构建的微服务的大部分服务间通信需求。


    异步服务集成主要围绕基于队列的通信（单接收者）构建，诸如AMQP之类的技术在实践中相当常用。对于发布-订阅（事件驱动的多接收者通信），Kafka已成为服务间通信的事实标准。


    我们目前讨论的内容涵盖了微服务间通信常用的标准和最新技术。我们如何与企业微服务生态系统中的遗留或专有系统通信？事实上，微服务实现技术也必须满足这些遗留和专有集成用例。例如，如果您在企业中使用ERP系统，不与之交互就无法构建有用的应用。因此，如果需要，微服务必须能够与此类遗留或专有系统通信。这引导我们思考，微服务实现技术应能处理ESB支持的任何网络通信协议。


    > *您在集中式ESB上开发的内容现在必须在您的集成微服务中实现。微服务实现技术应满足ESB提供的所有能力。*


    除了基本的网络通信协议，微服务通常还需要与Web API（如Twitter、Salesforce、Google Docs、PayPal、Twilio等）集成。虽然有提供网络可访问API的SaaS应用，但大多数集成产品（如ESB）都提供了高级抽象，允许您以最少的工作量集成这些系统。最终，集成微服务实现技术需要具备一组特定的抽象来集成此类Web
    API。（例如，用于访问Web API（如Twitter API、PayPal API等）的库或连接器。）'
  raw: '### Note


    Event stream processing or complex event processing can be considered a more powerful
    way to process a stream of events. Here we only discussed the event-based messaging.
    We discuss event stream processing in detail in Chapter [10](#461146_1_En_10_Chapter.xhtml).


    The main tradeoffs of this approach, such as the complexity in communication and
    not having the business logic at a centralized service, make the system really
    hard to understand. Since we are using an event bus/message bus, all the services
    that we write should have the capability to publish and subscribe to the event
    bus. Also, without having comprehensive observability , across all the services,
    it’s difficult to understand the interactions and business logic that the reactive
    compositions implement.


    ### Hybrid of Active and Reactive Composition


    Both active and reactive composition styles have their own pros and cons. What
    we have seen with most pragmatic microservices implementation is that there are
    certain scenarios in which active composition is the best fit, while there are
    some other scenarios in which reactive composition is essential. Our recommendation
    is to use a hybrid of these approaches by looking at your microservices integration
    use cases. For instance, Figure [7-7](#461146_1_En_7_Chapter.xhtml#Fig7) illustrates
    a hybrid of these two styles.


    ![../images/461146_1_En_7_Chapter/461146_1_En_7_Fig7_HTML.jpg](images/461146_1_En_7_Chapter/461146_1_En_7_Fig7_HTML.jpg)


    Figure 7-7


    Hybrid of an active and reactive microservices integration


    Often there are services that you would expose to the consumers as APIs that are
    fully synchronous. Such API calls will result in several other microservices calls
    where some invocations can be/should be done using a reactive approach. As discussed
    in Chapter [3](#461146_1_En_3_Chapter.xhtml), scenarios such as order placing
    and processing in a retail business use case are much more elegant when implemented
    with a reactive style. Hence, you have to pick and choose the style that you want
    to use, depending on your business use cases.


    A hybrid composition is usually more pragmatic for most enterprise microservice
    integrations.


    ### Anti-Corruption Layer


    You can introduce a microservices architecture into an enterprise while some of
    its subsystems are still based on a monolithic architecture. We can build a façade
    or an adapter layer between the microservices and monolithic subsystems. In Chapter
    [2](#461146_1_En_2_Chapter.xhtml), “Designing Microservices,” we discussed the
    anti-corruption layer, which allows you to independently develop either the microservices
    components or existing monolithic applications The applications built on top of
    these two different architectural styles can interact with each other via the
    anti-corruption layer. The technologies and standards that are used for the monolithic
    portion and the microservices portion may be drastically different. That’s why
    building anti-corruption layer is often required when it comes to building microservices
    integrations.


    For instance, in our hybrid composition use case that we discussed in Figure [7-7](#461146_1_En_7_Chapter.xhtml#Fig7),
    `microservice-3` integrates the microservices subsystem with proprietary, legacy,
    and external web APIs, which are all part of the monolithic subsystem. That service
    is part of the anti-corruption layer. Typically, the technologies that you would
    use for building integration microservices can also be used for building services
    at the anti-corruption layer.


    ### Strangler Façade


    In the context of microservices in enterprises, you will often have to deal with
    the existing non-microservice subsystems. By introducing a microservices architecture,
    you will be gradually replacing most of the existing subsystems. However, this
    is not something that will happen overnight. The *strangler pattern* proposes
    an approach that helps you incrementally migrate a non-microservice subsystem
    by gradually replacing specific pieces of functionality with new microservices.
    If you are introducing microservices to an enterprise, you will build a strangler
    façade that will selectively route the traffic between the modern and legacy systems.
    Over time, you will entirely replace the legacy system with the new microservices
    and will get rid of the strangler layer.


    ## Key Requirements of Integration Services


    By now you have a good understanding of the importance of integration microservices
    and microservice integration patterns. Let’s delve deep into the technologies
    that we can leverage to implement those patterns. However, before we do that,
    it will be beneficial to have a clear understanding of the specific requirements
    for building integration microservices.


    ### Network Communication Abstractions


    As we discussed in detail in Chapter [3](#461146_1_En_3_Chapter.xhtml), inter-microservice
    communication is absolutely essential to building a microservices-based application.
    Services are autonomous and the only way they interact and formulate business
    functionality is through inter-service communication. Therefore, for integration
    services, we must support different communication patterns such as synchronous
    and asynchronous communication and the associated network protocols.


    In practice, for synchronous communication, RESTful services are heavily in use
    and native support for RESTful services and HTTP 1.1 is crucial. Also, many service
    implementation frameworks now leverage HTTP2 as the default communication protocol
    to benefit from all the new capabilities introduced in HTTP2.


    Under the context of synchronous communication, gRPC services are proliferating
    and most of the microservice implementations use it as the de-facto standard for
    internal microservices communication. Given that gRPC and protocol buffers^([^(97)](#fn97))
    cater to polyglot microservices implementations, they inherently cater to most
    of the inter-service communication requirements of microservices built with different
    languages.


    Asynchronous service integrations are primarily built around queue-based communication
    (single receiver) and technologies such as AMQP are quite commonly used in practice.
    For pub-sub (event-driven multiple receiver communication), Kafka has become the
    de-facto standard for inter-service communication.


    What we have discussed so far covers the standards and the latest technologies
    that are commonly used for inter-microservice communication. How do we communicate
    with legacy or proprietary systems in our enterprise microservices ecosystem?
    In fact, microservices implementation technologies must cater to those legacy
    and proprietary integration use cases too. For instance, if you are using an ERP
    system in your enterprise, you can’t build a useful application without interacting
    with it. Hence, if required, the microservice must be able to communicate with
    such legacy or proprietary systems. This leads us to think that microservices
    implementation technologies should be able to handle any of the network communication
    protocols that an ESB supports.


    > *The things that you developed at the centralized ESB now must be implemented
    in your integration microservices. Microservices implementation technologies should
    cater to all of the capabilities that an ESB offers.*


    In addition to the primitive network communication protocols, microservices often
    need to integrate with web APIs such as Twitter, Salesforce, Google Docs, PayPal,
    Twilio, etc. While there are SaaS applications that offer network accessible APIs,
    most of the integration products such as ESBs have high-level abstractions that
    allow you to integrate with these systems with minimal effort. Ultimately, the
    integration microservices implementation technologies need to have a certain set
    of abstractions to integrate with such web APIs. (For example, libararies or connectors
    to access web APIs such as Twitter API, PayPal API etc.)'
