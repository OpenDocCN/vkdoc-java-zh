- fmt: '### Inter-Service Communication Protocols


    Service Meshes support different communication protocols, such as `HTTP1.x`, `HTTP2`,
    and `gRPC`. The service has to communicate with the sidecar with the same protocol
    of the service that it would like to proxy to. Service Mesh takes care of most
    of the low-level communication details while your service code uses primitive
    network capabilities to invoke the sidecar. Now let’s look at some of the popular
    Service Mesh implementations out there.


    ## Istio


    `Istio`^([^(127)](#fn127)) is an open platform to connect, manage, and secure
    microservices. It provides a communication infrastructure for inter-microservices
    communication, with resiliency, routing, load balancing, service-to-service authentication,
    observability, and more, without requiring any changes in your service code.


    You can simply add your service to the `Istio` Service Mesh, by deploying the
    `Istio` sidecar proxy alongside your service. As we discussed earlier, the `Istio`
    sidecar proxy is responsible for all network communication between microservices,
    configured and managed using `Istio` control plane. `Istio` deployment is deeply
    married to `Kubernetes`, but deploying it on some of the other systems is also
    possible.


    ### Istio Architecture


    Figure [9-5](#461146_1_En_9_Chapter.xhtml#Fig5) illustrates the high-level architecture
    of the `Istio` Service Mesh. `Istio` comprises two logical components, namely
    the data plane and control plane.


    ![../images/461146_1_En_9_Chapter/461146_1_En_9_Fig5_HTML.jpg](images/461146_1_En_9_Chapter/461146_1_En_9_Fig5_HTML.jpg)


    Figure 9-5


    `Istio` architecture^([^(128)](#fn128))


    - **Data plane**: The data plane is composed of a set of sidecar proxies that
    route and control all network communication between microservices. `Istio`’s data
    plane is mainly composed of the `Envoy` proxy (which is developed by `Lyft`).

    - **Control plane**: The control plane is responsible for managing and configuring
    sidecar proxies to change their network communication behaviors. Control plane
    is composed of `Pilot`, `Mixer`, and `Citadel` components.


    #### Istio Proxy


    In its data plane, `Istio` uses an enhanced version of the `Envoy`^([^(129)](#fn129))
    proxy, which is a high-performance proxy developed in `C++`, to mediate all inbound
    and outbound traffic for all the services in the Service Mesh. `Istio` leverages
    `Envoy`’s many built-in features such as dynamic service discovery, load balancing,
    `TLS` termination, `HTTP/2` and `gRPC` proxying, circuit breakers, health checks,
    staged rollouts with percentage-based traffic split, fault injection, and rich
    metrics.


    `Envoy` is deployed as a sidecar alongside your microservice and it takes care
    of all the ingress and egress network communication of your microservice.


    #### Mixer


    `Mixer` is responsible for enforcing access control and usage policies across
    the Service Mesh and collecting telemetry data from the `Istio` proxy and other
    services. The `Istio` proxy extracts request-level attributes, which are sent
    to `Mixer` for evaluation. Figure [9-6](#461146_1_En_9_Chapter.xhtml#Fig6) shows
    how `Mixer` interacts with other `Istio` components.


    ![../images/461146_1_En_9_Chapter/461146_1_En_9_Fig6_HTML.jpg](images/461146_1_En_9_Chapter/461146_1_En_9_Fig6_HTML.jpg)


    Figure 9-6


    `Istio` `Mixer`


    `Mixer` allows you to fully decouple your service/application code from policy
    decision-making, so that you can move policy decisions out of the application
    layer into the configuration instead, which is under operator control. The application
    code instead does a fairly simple integration with `Mixer`, and `Mixer` takes
    responsibility for interfacing with the backend systems.


    `Mixer` provides three main capabilities in the `Istio` ecosystem. The `Istio`
    proxy sidecar logically calls `Mixer` before each request to perform precondition
    checks and after each request to report telemetry. The sidecar has local caching
    such that a large percentage of precondition checks can be performed with the
    cache. Additionally, the sidecar buffers outgoing telemetry so that it only calls
    `Mixer` infrequently.


    #### Pilot


    The core component used for traffic management in `Istio` is `Pilot` (see Figure
    [9-7](#461146_1_En_9_Chapter.xhtml#Fig7)), which manages and configures all the
    `Istio` proxy instances deployed in a particular `Istio` Service Mesh. `Pilot`
    lets you specify which rules you want to use to route traffic between `Istio`
    proxies and configure failure recovery features such as timeouts, retries, and
    circuit breakers. It also maintains a canonical model of all the services in the
    mesh and uses this model to let `Istio` proxy instances know about the other `Istio`
    proxy instances in the mesh via its discovery service.


    ![../images/461146_1_En_9_Chapter/461146_1_En_9_Fig7_HTML.jpg](images/461146_1_En_9_Chapter/461146_1_En_9_Fig7_HTML.jpg)


    Figure 9-7


    `Istio` `Pilot`^([^(130)](#fn130))


    `Pilot` maintains a canonical representation of services in the mesh that is independent
    of the underlying platform. `Pilot` abstracts platform-specific service discovery
    mechanisms and synthesizes them into a standard format consumable by any sidecar
    that conforms to the `Envoy` data plane APIs.


    #### Citadel


    `Citadel` provides strong service-to-service and end-user authentication using
    mutual `TLS`, with built-in identity and credential management. It can be used
    to upgrade unencrypted traffic in the Service Mesh and provide operators with
    the ability to enforce policies based on service identity rather than on network
    controls.


    ### Note


    The scope of this book is to give an introduction to `Istio` as a Service Mesh
    implementation. For any low-level details and further information on `Istio`,
    we recommend you follow the `Istio` documentation^([^(131)](#fn131)) and recommend
    the book entitled *Introducing Istio Service Mesh for Microservices*^([^(132)](#fn132))
    by Christian Posta and Burr Sutter.


    ### Using Istio


    In this section, we take a closer look at some of the capabilities of `Istio`
    with some use cases. We will only cover a selected set of commonly used microservices
    scenarios; for other scenarios, it is highly recommended that you refer to the
    `Istio` official documentation.


    ### Note


    `Istio` examples are heavily dependent on `Docker` and `Kubernetes`. Therefore,
    it is recommended that you read Chapter [8](#461146_1_En_8_Chapter.xhtml) if you
    are not familiar with `Docker` or `Kubernetes`.'
