    *   When implemented as a sidecar, the security functionality can be reused by
    other microservices, without worrying about individual implementation details.


    *   The ownership of the security sidecar can be taken care by a different team
    that has expertise on the security domain, other than the microservices developers,
    who worry about domain-specific business functionalities.


    Let’s see how the security sidecar fits into the microservices architecture. As
    shown in Figure [11-17](#461146_1_En_11_Chapter.xhtml#Fig17), there can be four
    main functionalities of a security sidecar: token validation (`introspection`),
    get user info (`userinfo`), token issuance (`token`), and authorize access requests
    (`pdp`). Each microservice should have its own interceptor that intercepts all
    the requests and talk to the token validation endpoint to check whether the provided
    token is good enough to access the corresponding microservice. To make the sidecar
    interoperable, it is recommended to expose the OAuth 2.0 introspection endpoint^([^(154)](#fn154))
    to validate the tokens. This endpoint will accept a token in the request and will
    reply with a JSON payload, which includes information related to the provided
    token.


    ![../images/461146_1_En_11_Chapter/461146_1_En_11_Fig17_HTML.jpg](images/461146_1_En_11_Chapter/461146_1_En_11_Fig17_HTML.jpg)


    Figure 11-17


    Security sidecar


    The following text shows a request to the introspection endpoint and a response
    from it.


    ```

    POST /introspect HTTP/1.1

    Host: sidecar.local

    Accept: application/json

    Content-Type: application/x-www-form-urlencoded

    token=2YotnFZFEjr1zCsicMWpAA

    HTTP/1.1 200 OK

    Content-Type: application/json

    {

    "active": true,

    "client_id": "l238j323ds-23ij4",

    "username": "jdoe",

    "scope": "read write dolphin",

    "sub": "jdoe",

    "aud": "https://foo.com",

    "iss": "https://issuer.example.com/",

    "exp": 1419356238,

    "iat": 1419350238

    }

    ```


    Once the token is validated, if the microservice wants to find more information
    about the end user who invoked the microservice, it can talk to the `userinfo`
    endpoint exposed by the security sidecar. This is another standard endpoint defined
    in the OpenID Connect specification^([^(155)](#fn155)). This endpoint accepts
    a request with a valid token and returns the associated user’s information in
    a JSON message. The following text shows a request to the `userinfo` endpoint
    and a response from it.


    ```

    GET /userinfo HTTP/1.1

    Host: sidecar.local

    Authorization: Bearer SlAV32hkKG

    HTTP/1.1 200 OK

    Content-Type: application/json

    {

    "sub": "jdoe",

    "name": "Jane Doe",

    "given_name": "Jane",

    "family_name": "Doe",

    "preferred_username": "j.doe",

    "email": "janedoe@example.com",

    }

    ```'
  trans: '

    ### 嵌入式 PDP


    远程或集中式 PDP 模型存在一些缺陷，这些缺陷很容易违反微服务的基本原则：


    *   *性能开销*：每次需要进行访问控制检查时，对应的微服务都必须通过网络与 PDP 通信。通过在客户端进行决策缓存，可以降低传输成本和策略评估成本。但使用缓存会导致我们基于过时数据做出安全决策。


    *   *策略信息点（PIP）的所有权*：每个微服务都应拥有其 PIP 的所有权，这些 PIP 知道从何处获取执行访问控制所需的数据。采用这种方法，我们构建的是一个集中式
    PDP，它拥有对应所有微服务的所有 PIP。


    *   *单体式 PDP*：集中式 PDP 变成了另一个单体应用。所有与所有微服务相关的策略都集中存储在这个单体 PDP 中。引入变更很困难，因为对一个策略的修改可能会影响所有策略，因为所有策略都在同一个策略引擎下进行评估。


    如图 11-15 所示，嵌入式 PDP 将与每个微服务一起运行。它采用事件模型进行策略分发，每个微服务将订阅其感兴趣的主题，从 PAP 获取相应的访问控制策略，然后更新嵌入式
    PDP。你可以由微服务团队各自拥有 PAP，也可以在多租户模式下使用一个全局 PAP。当有新策略可用或策略有更新时，PAP 会向相应主题发布一个事件。嵌入式
    PDP 模型为微服务架构引入了一个消息代理。


    ![../images/461146_1_En_11_Chapter/461146_1_En_11_Fig15_HTML.jpg](img/461146_1_En_11_Fig15_HTML.jpg)


    图 11-15

    嵌入式 XACML PDP


    这种方法并未违反微服务中的不可变服务器概念。*不可变服务器*意味着，你直接从持续交付流程结束时从仓库加载的配置来构建服务器或容器，并且你应该能够使用相同的配置反复构建相同的容器。因此，我们不希望任何人登录服务器并在那里进行任何配置更改。采用嵌入式
    PDP 模型——即使服务器在运行时加载相应的策略——如果我们启动一个新容器，它也会从相应的 PAP 获取相同的策略集。


    还有一个重要问题尚未解答。在授权上下文中，API 网关扮演什么角色？我们可以有两个级别的策略执行。一个是全局性的，针对所有通过 API 网关的请求（API
    网关将充当策略执行点或 PEP），另一个是在服务级别。服务级别的策略必须通过容器或服务级别的某种拦截器来执行。


    ## 安全边车


    我们在第 2 章“设计微服务”中介绍了边车的概念。让我们快速回顾一下。如图 11-16 所示，边车模式源于摩托车上的边车。如果你愿意，可以为同一辆摩托车挂接不同的边车（不同颜色或设计），前提是两者之间的接口保持不变。这同样适用于微服务世界，我们的微服务类似于摩托车，而安全处理层则类似于边车。微服务和边车之间的通信通过远程通道（不是本地进程内调用）进行，但微服务和边车都将部署在同一台物理/虚拟机上，因此不会通过网络路由。另外，请记住，边车本身也是一个微服务。


    ![../images/461146_1_En_11_Chapter/461146_1_En_11_Fig16_HTML.png](img/461146_1_En_11_Fig16_HTML.png)


    图 11-16

    边车


    ### 注意


    如第 9 章所述，Istio^(¹⁵³)引入了一个边车代理，用于支持强身份、强大策略、透明 TLS 加密以及认证、授权和审计（AAA）工具，以保护你的服务和数据。Istio
    Citadel 基于边车和控制平面架构，通过内置的身份和凭据管理，提供强大的服务间和最终用户认证。


    在微服务架构中将安全功能实现为边车有许多好处。以下列表解释了其中一些。


    *   微服务实现无需担心安全实现的内部细节，并且这些实现不必使用同一种编程语言。

    *   当实现为边车时，安全功能可以被其他微服务重用，而无需担心各自的实现细节。

    *   安全边车的所有权可以由一个在安全领域具有专业知识的独立团队负责，而不是由关注特定领域业务功能的微服务开发者负责。


    让我们看看安全边车如何融入微服务架构。如图 11-17 所示，安全边车可以有四个主要功能：令牌验证（`introspection`）、获取用户信息（`userinfo`）、令牌颁发（`token`）和授权访问请求（`pdp`）。每个微服务都应该有自己的拦截器，用于拦截所有请求并与令牌验证端点通信，以检查所提供的令牌是否足以访问相应的微服务。为了使边车具有互操作性，建议暴露
    OAuth 2.0 内省端点^(¹⁵⁴)来验证令牌。该端点将接受请求中的令牌，并返回一个 JSON 负载，其中包含与所提供令牌相关的信息。


    ![../images/461146_1_En_11_Chapter/461146_1_En_11_Fig17_HTML.jpg](img/461146_1_En_11_Fig17_HTML.jpg)


    图 11-17

    安全边车


    以下文本显示了对内省端点的请求及其响应。


    ```

    POST /introspect HTTP/1.1

    Host: sidecar.local

    Accept: application/json

    Content-Type: application/x-www-form-urlencoded

    token=2YotnFZFEjr1zCsicMWpAA

    HTTP/1.1 200 OK

    Content-Type: application/json

    {

    "active": true,

    "client_id": "l238j323ds-23ij4",

    "username": "jdoe",

    "scope": "read write dolphin",

    "sub": "jdoe",

    "aud": "https://foo.com",

    "iss": "https://issuer.example.com/",

    "exp": 1419356238,

    "iat": 1419350238

    }

    ```


    令牌验证通过后，如果微服务想要查找有关调用该微服务的最终用户的更多信息，它可以与安全边车暴露的`userinfo`端点通信。这是 OpenID Connect
    规范^(¹⁵⁵)中定义的另一个标准端点。该端点接受一个带有有效令牌的请求，并以 JSON 消息的形式返回关联的用户信息。以下文本显示了对`userinfo`端点的请求及其响应。


    ```

    GET /userinfo HTTP/1.1

    Host: sidecar.local

    Authorization: Bearer SlAV32hkKG

    HTTP/1.1 200 OK

    Content-Type: application/json

    {

    "sub": "jdoe",

    "name": "Jane Doe",

    "given_name": "Jane",

    "family_name": "Doe",

    "preferred_username": "j.doe",

    "email": "janedoe@example.com",

    }

    ```

