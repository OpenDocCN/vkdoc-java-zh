- fmt: '# Using Eureka with Spring Boot


    Spring Boot offers native support for using `Eureka` as a service registry. Let’s
    take a close look at how you can use `Eureka` in your Spring Boot applications
    and use service registry and discovery capabilities in practice.


    With some annotations you can quickly enable and configure the service registry
    and discovery patterns inside your application with `Eureka`. `Eureka` instances
    can be registered, and clients can discover the instances using Spring-managed
    beans. An embedded `Eureka` server can be created with a declarative Java configuration.


    First off, you need to have a `Eureka` server running. As shown in the sample
    code of `ch06/sample02`, you can spin up a `Eureka` service registry as an Spring
    application using the Spring Cloud’s `@EnableEurekaServer` annotation. So, your
    application code looks as follows.


    ```

    @EnableEurekaServer

    @SpringBootApplication

    public class EurekaServiceApplication {

    public static void main(String[] args) {

    SpringApplication.run(EurekaServiceApplication.class, args);

    }

    }

    ```


    This application will boot up a `Eureka` service registry instance and you can
    change various behaviors via the `application.properties` file.


    Now let’s try to register a service with the service registry from a different
    Spring Boot application. The application name is fetched from `bootstrap.properties`
    of your Spring Boot application.


    ```

    @EnableDiscoveryClient

    @SpringBootApplication

    public class EurekaClientApplication {

    public static void main(String[] args) {

    SpringApplication.run(EurekaClientApplication.class, args);

    }

    }

    ```


    Now you can discover services using another Spring Boot application, which leverages
    the discovery client to discover the service.


    ```

    @RestController

    class ServiceInstanceRestController {

    @Autowired

    private DiscoveryClient discoveryClient;

    @RequestMapping("/service-instances/{applicationName}")

    public List serviceInstancesByApplicationName(

    @PathVariable String applicationName) {

    return this.discoveryClient.getInstances(applicationName);

    }

    }

    ```


    This service retrieves the application name from the `Eureka` service registry
    and returns as part of the response.


    ## Etcd


    `Etcd` is a general-purpose, distributed key-value store designed to reliably
    and quickly, preserve and provide access to critical data. It enables reliable
    distributed coordination through distributed locking, leader elections, and write-barriers.
    An `etcd` cluster is intended for high availability and permanent data storage
    and retrieval. Therefore, `etcd` is also being used as a service registry implementation.
    However, it offers a wide range of capabilities, which are beyond the service
    registration and discovery. `etcd` offers a CLI tool called `etdcctl` and a gRPC
    API to interact with it.


    `etcd` v3 uses gRPC for its messaging protocol. The `etcd` project includes a
    gRPC-based Go client and a command-line utility, `etcdctl`, for communicating
    with an `etcd` cluster through gRPC. For languages with no gRPC support, `etcd`
    provides a JSON `grpc-gateway`. This gateway serves a RESTful proxy that translates
    HTTP/JSON requests into gRPC messages.


    `etcd` is being widely used as part of most of the existing registry and deployment
    orchestrator solutions, such as Kubernetes.


    ## Service Discovery with Kubernetes


    In the Kubernetes environment, when you call one service from another, you don’t
    need to worry about the actual location of your service. Kubernetes by default
    uses DNS names to discover the pods. Therefore, if you want to call the `bar`
    service from the `foo` service, in the `foo` service’s code, you can just refer
    to `http://bar:<port>` as the service endpoint. Kubernetes will resolve and map
    the name to the actual endpoint. Kubernetes internally uses `etcd` as its distributed
    key-value store.


    It’s important to keep in mind that, although Kubernetes offers out-of-the-box
    capabilities to seamless discovery of a service, it is not meant to be used as
    the repository and interface for service developers or consumers to interact with.
    That’s where you may want to manage such service definitions in an external service
    registry.


    We discuss Kubernetes in detail in Chapter 8, “Deploying and Running Microservices,”
    and will dive into a real-world example that uses service discovery inside Kubernetes.


    ## Summary


    In this chapter, we discussed microservices governance in a broad perspective.
    Rather than just abstracting it as a decentralized process, we took a detailed
    look at various aspects of microservices governance, such as service definitions,
    lifecycle management, registry and discovery, quality of service, and observability.
    While service design, development, and deployment can be done as a fully decentralized
    process, there are several concepts that you need to centrally apply to your microservices
    governance. In that context, we introduced key aspects of the implementation of
    microservices governance—service registry and discovery, development lifecycle
    management, API management, and observability. We set the foundation for most
    of these concepts in the context of microservice governance and we deferred a
    detailed discussion to the upcoming chapters that are dedicated to each of those
    topics.


    We had a detailed discussion of service registry and discovery aspects of microservices
    governance in this chapter. We discussed the importance of service registry and
    discovery, and covered a couple of commonly used patterns. Then we discussed some
    of the most popular service registry solutions, such as Consul and Eureka, with
    real-world examples.


    Footnotes [1](#461146_1_En_6_Chapter.xhtml#Fn1_source) [2](#461146_1_En_6_Chapter.xhtml#Fn2_source)
    [3](#461146_1_En_6_Chapter.xhtml#Fn3_source) [4](#461146_1_En_6_Chapter.xhtml#Fn4_source)
    [5](#461146_1_En_6_Chapter.xhtml#Fn5_source) [6](#461146_1_En_6_Chapter.xhtml#Fn6_source)
    [7](#461146_1_En_6_Chapter.xhtml#Fn7_source)


    # 7. Integrating Microservices


    The microservices architecture fosters building a software application as a suite
    of independent services. When we have to realize a given business use case, we
    often need to have the communication and coordination between multiple microservices.
    Therefore, integrating microservices and building inter-service communication
    has become the one of the most challenging tasks needed to realize the microservices
    architecture.


    In most of the existing books and other resources, the concepts of microservice
    integration is barely discussed or is explained in a very abstract manner. Therefore,
    in this chapter, we delve deep into the key challenges of integrating microservices,
    patterns for integrating microservices, and frameworks and languages that we can
    leverage.'
