    some use cases. We will only cover a selected set of commonly used microservices
    scenarios; for other scenarios, it is highly recommended that you refer to the
    Istio official documentation.


    ### Note


    Istio examples are heavily dependent on Docker and Kubernetes. Therefore, it is
    recommended that you read Chapter [8](#461146_1_En_8_Chapter.xhtml) if you are
    not familiar with Docker or Kubernetes.'
  trans: '

    ### 服务间通信协议


    服务网格支持多种通信协议，例如 HTTP1.x、HTTP2 和 gRPC。服务必须使用与其要代理的目标服务相同的协议与 Sidecar 通信。服务网格负责处理大部分底层通信细节，而您的服务代码则使用原始网络能力来调用
    Sidecar。现在，让我们看看一些流行的服务网格实现。


    ## Istio


    Istio^(¹²⁷) 是一个用于连接、管理和保护微服务的开放平台。它为微服务间的通信提供了一种通信基础设施，具备弹性、路由、负载均衡、服务间认证、可观测性等功能，且无需更改您的服务代码。


    您只需将 Istio Sidecar 代理与您的服务一同部署，即可将服务添加到 Istio 服务网格中。正如我们之前所讨论的，Istio Sidecar 代理负责微服务之间的所有网络通信，并通过
    Istio 控制平面进行配置和管理。Istio 的部署与 Kubernetes 紧密相关，但也可以部署在其他一些系统上。


    ### Istio 架构


    图 9-5 展示了 Istio 服务网格的高层架构。Istio 包含两个逻辑组件，即数据平面和控制平面。


    ![../images/461146_1_En_9_Chapter/461146_1_En_9_Fig5_HTML.jpg](img/461146_1_En_9_Fig5_HTML.jpg)


    图 9-5


    Istio 架构^(¹²⁸)


    *   *数据平面*：数据平面由一组 Sidecar 代理组成，这些代理负责路由和控制微服务之间的所有网络通信。Istio 的数据平面主要由 Envoy 代理（由
    Lyft 开发）构成。


    *   *控制平面*：控制平面负责管理和配置 Sidecar 代理，以改变其网络通信行为。控制平面由 Pilot、Mixer 和 Citadel 组件组成。


    #### Istio 代理


    在其数据平面中，Istio 使用 Envoy^(¹²⁹) 代理的增强版来中介服务网格中所有服务的入站和出站流量。Envoy 是一个用 C++ 开发的高性能代理。Istio
    利用了 Envoy 的许多内置功能，例如动态服务发现、负载均衡、TLS 终止、HTTP/2 和 gRPC 代理、熔断器、健康检查、基于百分比流量分割的分阶段发布、故障注入以及丰富的指标。


    Envoy 作为 Sidecar 与您的微服务一起部署，并负责处理您微服务的所有入口和出口网络通信。


    #### Mixer


    Mixer 负责在整个服务网格中执行访问控制和使用策略，并从 Istio 代理和其他服务收集遥测数据。Istio 代理提取请求级属性，并将其发送给 Mixer
    进行评估。图 9-6 展示了 Mixer 如何与其他 Istio 组件交互。


    ![../images/461146_1_En_9_Chapter/461146_1_En_9_Fig6_HTML.jpg](img/461146_1_En_9_Fig6_HTML.jpg)


    图 9-6


    Istio Mixer


    Mixer 允许您将服务/应用程序代码与策略决策完全解耦，从而可以将策略决策从应用层转移到配置中，由运维人员控制。应用程序代码只需与 Mixer 进行相当简单的集成，而
    Mixer 则负责与后端系统进行接口交互。


    Mixer 在 Istio 生态系统中提供了三个主要能力。Istio 代理 Sidecar 在逻辑上会在每个请求之前调用 Mixer 以执行前置条件检查，并在每个请求之后调用
    Mixer 以报告遥测数据。Sidecar 具有本地缓存，因此大部分前置条件检查都可以通过缓存执行。此外，Sidecar 会缓冲外发的遥测数据，从而仅在不频繁的情况下才调用
    Mixer。


    #### Pilot


    Istio 中用于流量管理的核心组件是 Pilot（见图 9-7），它负责管理和配置部署在特定 Istio 服务网格中的所有 Istio 代理实例。Pilot
    允许您指定用于在 Istio 代理之间路由流量的规则，并配置故障恢复功能，例如超时、重试和熔断器。它还维护网格中所有服务的规范模型，并使用此模型通过其发现服务让
    Istio 代理实例了解网格中的其他 Istio 代理实例。


    ![../images/461146_1_En_9_Chapter/461146_1_En_9_Fig7_HTML.jpg](img/461146_1_En_9_Fig7_HTML.jpg)


    图 9-7


    Istio Pilot^(¹³⁰)


    Pilot 维护网格中服务的规范表示，该表示独立于底层平台。Pilot 抽象了特定于平台的服务发现机制，并将其合成为符合 Envoy 数据平面 API 的任何
    Sidecar 都可以使用的标准格式。


    #### Citadel


    Citadel 使用双向 TLS 提供强大的服务间和最终用户身份验证，并内置身份和凭据管理。它可用于升级服务网格中未加密的流量，并使运维人员能够基于服务身份而非网络控制来实施策略。


    ### 注意


    本书的范围是介绍 Istio 作为一种服务网格实现。有关 Istio 的任何底层细节和更多信息，我们建议您查阅 Istio 文档^(¹³¹)，并推荐 Christian
    Posta 和 Burr Sutter 所著的《*为微服务引入 Istio 服务网格*》^(¹³²)一书。


    ### 使用 Istio


    在本节中，我们将通过一些用例更深入地了解 Istio 的部分能力。我们仅涵盖一组选定的常用微服务场景；对于其他场景，强烈建议您参考 Istio 官方文档。


    ### 注意


    Istio 示例严重依赖于 Docker 和 Kubernetes。因此，如果您不熟悉 Docker 或 Kubernetes，建议您阅读第 8 章。

    '
- fmt: '#### Running Your Services with Istio


    Running your microservice with Istio is trivially easy. If you are running your
    service on Kubernetes, then as the first step you need to create the Docker image
    for your service. Once you have the Docker image, then you need to create the
    Kubernetes artifacts to deploy the service.


    For example, suppose that you want to develop a simple `hello` service and you
    have created the Docker image and Kubernetes artifacts to deploy the service.
    What we have shown here is the generic Kubernetes deployment artifact for that
    service.


    For example, in the following Kubernetes descriptor, you can find the configuration
    for Kubernetes service and deployment components. In addition, you need to include
    two Istio specific configurations, namely `VirtualService` and `Gateway`.


    A `VirtualService` defines the rules that control how requests for a service are
    routed in an Istio Service Mesh. A `Gateway` configures a load balancer for HTTP/TCP
    traffic, most commonly operating at the edge of the mesh to enable ingress traffic
    for an application.


    Figure [9-8](#461146_1_En_9_Chapter.xhtml#Fig8) shows the request flow between
    the services and sidecars that you have in a simple communication scenario. Suppose
    that you are sending a request to `microservice-A` using an external client, and
    then you need to expose an Istio ingress gateway, which acts as the external interface
    to your service. When you create a virtual service for `microservice-A`, based
    on the rules that you specified in that virtual service, the message routing takes
    place. Similarly, when `microservice-A` calls `microservice-B`, then based on
    the virtual service configuration of `microservice-B`, the message routing rules
    will get applied (at the sidecar of the `microservice-A`).


    ![../images/461146_1_En_9_Chapter/461146_1_En_9_Fig8_HTML.jpg](images/461146_1_En_9_Chapter/461146_1_En_9_Fig8_HTML.jpg)


    Figure 9-8


    Request flow


    In this example, we define a gateway that is exposing our service at the edge
    so that external clients can invoke via the load balancer. The virtual service
    created for our `HelloWorld` service simply checks for the path `/hello` and routes
    it to the service.


    ```

    # Helloworld.yaml

    apiVersion: v1

    kind: Service

    metadata:

    name: helloworld

    labels:

    app: helloworld

    spec:

    type: NodePort

    ports:

    - port: 5000

    name: http

    selector:

    app: helloworld


    apiVersion: extensions/v1beta1

    kind: Deployment

    metadata:

    name: helloworld-v1

    spec:

    replicas: 1

    template:

    metadata:

    labels:

    app: helloworld

    version: v1

    spec:

    containers:

    - name: helloworld

    image: kasunindrasiri/examples-helloworld-v1

    resources:

    requests:

    cpu: "100m"

    imagePullPolicy: IfNotPresent #Always

    ports:

    - containerPort: 5000


    apiVersion: networking.istio.io/v1alpha3

    kind: Gateway

    metadata:

    name: helloworld-gateway

    spec:

    selector:

    istio: ingressgateway # use istio default controller

    servers:

    - port:

    number: 80

    name: http

    protocol: HTTP

    hosts:

    - "*"


    apiVersion: networking.istio.io/v1alpha3

    kind: VirtualService

    metadata:

    name: helloworld

    spec:

    hosts:

    - "*"

    gateways:

    - helloworld-gateway

    http:

    - match:

    - uri:

    exact: /hello

    route:

    - destination:

    host: helloworld

    port:

    number: 5000

    ```


    Now you want to deploy this service on Istio. To do that, you need to inject the
    Istio sidecar into your deployment. This can either be done as an automatic capability
    of Istio installation or as a manual process. To understand the behavior properly,
    let’s use the manual sidecar injection.


    You can inject the sidecar to your service deployment descriptors with the following:


    ```

    istioctl kube-inject -f helloworld.yaml -o helloworld-istio.yaml

    ```


    It modifies the deployment descriptor and adds the Istio proxy to the same pod
    that you are going to create. Therefore, the Istio proxy acts as a sidecar in
    this scenario. Once the sidecar injection is completed, you can simply deploy
    the modified deployment descriptor as follows:


    ```

    kubectl create -f helloworld-istio.yaml

    ```


    That’s all you have to do. Now you can access your service via the Node port or
    an ingress (if any) and the traffic flows through the Istio Service Mesh. (If
    needed, you can verify this by enabling tracing at the Istio level. We discuss
    how to do that in the next couple of sections.)


    Most of the Istio examples are based on the official use case^([^(133)](#fn133))
    that Istio provided to showcase its capabilities. Hence, we will stick to the
    same example. What we have shown in Figure [9-9](#461146_1_En_9_Chapter.xhtml#Fig9)
    is the `BookInfo` example deployed on Istio.


    ![../images/461146_1_En_9_Chapter/461146_1_En_9_Fig9_HTML.jpg](images/461146_1_En_9_Chapter/461146_1_En_9_Fig9_HTML.jpg)


    Figure 9-9


    BookInfo use case on Istio


    The `BookInfo` use case is comprised of four polyglot services—`Product Page`,
    `Reviews`, `Details`, and `Ratings`. Now let’s move on to some of the requirements
    of this use case in which we can leverage Istio.


    ### Note


    You can try most of the following Istio examples by following the guidelines given
    in the Istio documentation^([^(134)](#fn134)).


    #### Traffic Management with Istio


    When one service calls the other service or when a given service is exposed to
    external clients, you can apply Istio’s traffic-management capabilities to route
    the traffic based on different mechanisms. It decouples the traffic flow and infrastructure
    scaling, letting you specify via Pilot what rules they want the traffic to follow
    rather than which specific pods/VMs should receive traffic. The traffic-management
    feature also includes dynamic request routing for A/B testing, gradual rollouts,
    canary releases, failure recovery using timeouts, retries, circuit breakers, and
    fault injection.


    Istio defines four traffic-management configuration resources:


    - A `VirtualService` defines a set of traffic routing rules to apply when a host
    is addressed. Each routing rule defines matching criteria for traffic of a specific
    protocol. If the traffic is matched, it is sent to a named destination service
    (or subset/version of it) defined in the registry. The source of traffic can also
    be matched in a routing rule. This allows routing to be customized for specific
    client contexts.


    - A `DestinationRule` configures the set of policies to be applied to a request
    after `VirtualService` routing has occurred. These rules specify configuration
    for load balancing, connection pool size from the sidecar, and outlier detection
    settings to detect and evict unhealthy hosts from the load balancing pool.


    - A `ServiceEntry` is commonly used to enable requests to services outside of
    an Istio Service Mesh.


    - A `Gateway` configures a load balancer for HTTP/TCP traffic, most commonly operating
    at the edge of the mesh to enable ingress traffic for an application.'
