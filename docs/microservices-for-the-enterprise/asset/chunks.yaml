    # 5. Data Management


    In most business use cases, the service logic is built on top of an underlying
    persistent layer. Often a database is used as the persistent layer and it is acting
    as the system of record for a given service. As we’ve discussed, microservices
    are built as autonomous entities and should have control over the data layer that
    they operate on. This essentially means that microservices cannot depend on a
    data layer that is owned by or shared by another entity. So, in the process of
    building autonomous services, it is also required to have an isolated persistent
    layer for each microservice. In this chapter, we discuss the commonly used patterns
    and best practices for transforming centralized or shared database-based enterprise
    applications to microservices that are based on decentralized databases.


    ## Monolithic Applications and Shared Databases


    In the context of enterprise architecture, which is based on monolithic applications
    and services, often a single centralized database (or a few) is shared among multiple
    applications and services. For example, as depicted in Figure [5-1](#461146_1_En_5_Chapter.xhtml#Fig1),
    all services of the retail system share a centralized database (`Retail DB`).
    So, all the information related to products, customers, orders, payments, and
    so on, are centrally managed through the `Retail` database.


    ![../images/461146_1_En_5_Chapter/461146_1_En_5_Fig1_HTML.jpg](images/461146_1_En_5_Chapter/461146_1_En_5_Fig1_HTML.jpg)


    Figure 5-1


    The microservices of online retail application share a single database


    In fact, a centralized shared database makes it easier for the application to
    combine data from multiple tables and formulate different business representations.
    The powerful query languages like `SQL` innately support all the features required
    for sharing the data and building different data compositions. For example, using
    `SQL` we can join multiple tables on various complex conditions and create a composite
    view of different entities.


    When working with shared business entities, implementing business interactions
    among them in transactional manner becomes quite important. A transaction is an
    atomic unit of work that either fails or succeeds. The key characteristics of
    transactions are known as `ACID`, which is an acronym for *atomicity* (all changes
    to the data are performed as if they are a single operation), *consistency* (data
    is in a consistent state when a transaction starts and when it ends), *isolation*
    (the intermediate state of a transaction is invisible to other transactions),
    and *durability* (after a transaction successfully completes, changes to data
    persist and are not undone, even in the event of a system failure).


    A centralized database makes `ACID` transactions across multiple entities trivially
    easy. In a relational database, every `SQL` statement must execute in the scope
    of a transaction. Hence it’s quite trivial to model a complex transactional scenario
    that involves multiple tables. Most Relational Database Management Systems (`RDBMS`)
    support such capabilities out of the box.


    Despite the advantages of the centralized shared database architecture, it has
    drawbacks too. It is the single point of failure, creates a potential performance
    bottleneck due to heavy application traffic directed into a single database, and
    has tight dependencies between applications, as they share same database tables.
    So, you cannot build autonomous and independent microservices if you are using
    a shared persistent layer or database. Hence, with microservices you need to decentralize
    data management and each microservice has to fully own the data that it operates
    on.


    ## A Database per Microservice


    The microservices architecture encourages microservices to own the data that they
    operate on and databases shouldn’t be shared with any other service. Therefore
    a given microservice will have an isolated datastore or use an isolated persistent
    service (e.g., from a cloud provider).


    Having a database per microservice gives us a lot of freedom when it comes to
    microservices autonomy. For instance, microservices owners can modify the database
    schema as per the business requirements, without worrying about the external consumers
    of the database. There’s nobody from the external applications who can access
    the database directly. This also gives the microservices developer the freedom
    to select the technology to be used as the persistent layer of microservices.
    Different microservices can use different persistent store technologies, such
    as `RDBMS`, `NoSQL` or other cloud services.


    However, having a database per service introduces a new set of challenges. When
    it comes to the realization of any business scenario, sharing data between microservices
    and implementing transactions within and across service boundaries becomes quite
    challenging.'
