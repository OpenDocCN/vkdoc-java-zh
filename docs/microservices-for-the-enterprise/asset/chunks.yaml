  trans: '

    正如我们之前讨论的，微服务之间的通信可以通过事件进行。在领域驱动设计下，这些事件被称为*领域事件*。领域事件是由限界上下文中的状态变化触发的。随后，其他限界上下文可以以松散耦合的方式响应这些事件。触发事件的限界上下文无需关心这些事件所引发的行为，而处理这些事件的限界上下文也无需关心事件来自何处。领域事件可以在一个领域内的限界上下文之间使用，也可以在不同领域之间使用。


    ### 上下文映射图


    限界上下文有助于将业务逻辑封装在服务边界内，并帮助定义服务接口。当企业中的限界上下文数量增多时，要弄清楚它们之间的连接方式很容易变成一场噩梦。上下文映射图有助于可视化限界上下文之间的关系。我们之前讨论过的康威定律是构建上下文映射图的另一个原因。根据康威定律，任何设计系统的组织都会产生一种设计，其结构是该组织沟通结构的复制。换句话说，不同的团队将负责不同的限界上下文。这可能导致团队内部沟通良好，但团队之间沟通不畅。当团队之间缺乏沟通时，在相应限界上下文上做出的设计决策就无法恰当地传递给其他相关方。拥有上下文映射图有助于每个团队跟踪他们所依赖的限界上下文发生的变化。


    沃恩·弗农在他的著作《实现领域驱动设计》中提出了多种表达上下文映射图的方法。更简单的方法是绘制一个图表，展示两个或多个现有限界上下文之间的映射关系，如图 2-5
    所示。同时，请记住，图 2-5 中的每个限界上下文都对应一个微服务。我们在两个限界上下文之间使用一条线，并在两端各标有标识符 U 或 D，以显示相应限界上下文之间的关系。U
    代表上游，D 代表下游。


    ![../images/461146_1_En_2_Chapter/461146_1_En_2_Fig5_HTML.jpg](img/461146_1_En_2_Fig5_HTML.jpg)


    图 2-5


    上下文映射图


    在`订单处理`限界上下文和`计费`限界上下文的关系中，`订单处理`限界上下文是上游上下文，而`计费`是下游上下文。上游上下文对下游上下文拥有更多控制权。换句话说，上游上下文定义了在两个上下文之间传递的领域模型。下游上下文应充分了解上游上下文发生的任何变化。图
    2-4 显示了这两个限界上下文之间传递的具体消息。它们之间没有直接耦合。`订单处理`限界上下文和`计费`限界上下文之间的通信通过事件机制进行。上游限界上下文（即`订单处理`限界上下文）定义了事件的结构，任何对该事件感兴趣的下游限界上下文都必须遵守该结构。


    `计费`限界上下文和`供应商管理`限界上下文之间的关系与`订单处理`限界上下文和`计费`限界上下文之间的关系相同。在这里，`计费`是上游上下文，而`供应商管理`是下游上下文。这两个限界上下文之间的通信通过事件机制进行，如图
    2-4 所示。`订单处理`限界上下文和`库存`限界上下文之间的通信是同步的。`库存`是上游上下文，而`订单处理`是下游上下文。换句话说，`订单处理`限界上下文和`库存`限界上下文之间通信的契约是由`库存`限界上下文定义的。图
    2-5 中显示的所有关系并非都需要解释，因为它们不言自明。


    让我们退一步，更深入地探讨一下`订单处理`和`库存`限界上下文。一个限界上下文拥有自己的领域模型，该模型是领域专家和开发人员经过长期实践后定义的。你可能还记得，同一个领域对象可能存在于不同的限界上下文中，并具有不同的定义。例如，`订单处理`限界上下文中的`订单`实体具有`订单
    ID`、`客户 ID`、`订单项`、`送货地址`和`支付方式`等属性，而`库存`限界上下文中的`订单`实体则具有`订单 ID`和`订单项`等属性。尽管`订单处理`接口需要客户、送货地址和支付方式的引用，以维护针对该客户的所有订单历史，但`库存`并不需要这些信息。每个限界上下文都应知道如何管理此类情况，以避免其领域模型中的任何冲突。在下一节中，我们将讨论一些模式，以维护多个限界上下文之间的关系。


    ### 关系模式


    领域驱动设计衍生出了多种促进多个限界上下文之间通信的模式。这些模式同样适用于设计与限界上下文良好对齐的微服务。这些针对限界上下文的关系模式最初由埃里克·埃文斯在其著作《领域驱动设计：软件核心复杂性应对之道》中提出。

    '
- fmt: '### Anti-Corruption Layer


    Let’s revisit the scenario we discussed in the previous section, where the `order`
    entity has two different definitions under the `Order Processing` and `Inventory`
    bounded contexts. For the communication between these two bounded contexts, the
    contract is defined by the `Inventory` bounded context (see Figure [2-5](#461146_1_En_2_Chapter.xhtml#Fig5)).
    When `Order Processing` updates the `Inventory`, it has to translate its own `order`
    entity to the `order` entity, which is understood by the `Inventory` bounded context.
    We use the anti-corruption layer (ACL) pattern to address this concern. The anti-corruption
    layer pattern provides a translation layer (see Figure [2-6](#461146_1_En_2_Chapter.xhtml#Fig6)).


    ![../images/461146_1_En_2_Chapter/461146_1_En_2_Fig6_HTML.png](images/461146_1_En_2_Chapter/461146_1_En_2_Fig6_HTML.png)


    Figure 2-6


    Anti-corruption layer pattern


    Let’s see how this pattern is applicable in an enterprise grade microservices
    deployment. Imagine a scenario where your microservice has to invoke a service
    exposed by a monolithic application. The design of the monolithic application
    does not worry about domain-driven design. The best way to facilitate the communication
    between our microservice and the monolithic application is via an anti-corruption
    layer. This helps to keep the microservice design much cleaner (or less corrupted).


    There are multiple ways to implement the anti-corruption layer. One approach is
    to build the translation into the microservice itself. You will be using whatever
    the language you used to implement the microservice to implement the anti-corruption
    layer as well. This approach has multiple drawbacks. The microservice development
    team has to own the implementation of the anti-corruption layer; hence they need
    to worry about any changes happening at the monolithic application side. If we
    implement this translation layer as another microservice, then we can delegate
    its implementation and the ownership to a different team. That team only needs
    to understand the translation and nothing else. This approach is commonly known
    as the *sidecar* pattern.


    As shown in Figure [2-7](#461146_1_En_2_Chapter.xhtml#Fig7), the sidecar pattern
    is derived from the vehicle where a sidecar is attached to a motorcycle. If you’d
    like, you can attach different sidecars (of different colors or designs) to the
    same motorcycle, provided that the interface between those two is unchanged. The
    same applies in the microservices world, where our microservice resembles the
    motorcycle, while the translation layer resembles the sidecar. If any change happens
    to the monolithic application, we only need to change the sidecar implementation
    to be compliant with it—and no changes to the microservice.


    ![../images/461146_1_En_2_Chapter/461146_1_En_2_Fig7_HTML.jpg](images/461146_1_En_2_Chapter/461146_1_En_2_Fig7_HTML.jpg)


    Figure 2-7


    Sidecar


    The communication between the microservice and the sidecar happens over the network
    (not a local, in-process call), but both the microservice and sidecar are co-located
    in the same host—so it will not be routed over the network. We discuss multiple
    microservices deployment patterns later in the book, in Chapter [8](#461146_1_En_8_Chapter.xhtml),
    “Deploying and Running Microservices”. Also, keep in mind the sidecar itself is
    another microservice. Figure [2-8](#461146_1_En_2_Chapter.xhtml#Fig8) shows how
    to use a sidecar as an anti-corruption layer.


    ![../images/461146_1_En_2_Chapter/461146_1_En_2_Fig8_HTML.jpg](images/461146_1_En_2_Chapter/461146_1_En_2_Fig8_HTML.jpg)


    Figure 2-8


    Sidecar acting as the anti-corruption layer


    An anti-corruption layer is one possible way to use a sidecar pattern. It is also
    used in several other use cases such as a Service Mesh. We discuss what a Service
    Mesh is and how the sidecar pattern is used in Service Meshes in detail in Chapter
    [9](#461146_1_En_9_Chapter.xhtml), “Service Mesh”.


    ### Shared Kernel


    Even though we discussed how it’s important to have clear boundaries between bounded
    contexts, there are cases in which we need to share domain models. This can happen
    in a case where we have two or more bounded contexts with certain things in common,
    and it adds lot of overhead to maintain separate object models under different
    bounded contexts. For example, each bounded context (or the microservice) has
    to authorize the user who invokes its operations. Different domains could be using
    their own authorization policies, but in many cases they share the same domain
    model as the authorization service (the authorization service itself is a microservice
    or a separate bounded context). In such cases, the domain model of the authorization
    service acts as the shared kernel. Since there is a shared code dependency (probably
    wrapped into a library), to make the shared kernel pattern work in practice, all
    the teams who use the shared kernel have to collaborate well with each other (see
    Figure [2-9](#461146_1_En_2_Chapter.xhtml#Fig9)).


    ![../images/461146_1_En_2_Chapter/461146_1_En_2_Fig9_HTML.png](images/461146_1_En_2_Chapter/461146_1_En_2_Fig9_HTML.png)


    Figure 2-9


    Shared kernel


    ### Conformist


    We already discussed in this chapter the responsibilities of an upstream bounded
    context and a downstream bounded context. Let’s quickly recall. The upstream context
    has more control over the downstream context. The upstream context defines the
    domain model passed between the two contexts. The downstream context should be
    well aware of any changes happening to the upstream context. The conformist pattern
    states that the downstream context (the conformist) has to conform to the contract
    defined by the upstream context.


    The conformist pattern looks similar to the shared kernel, where both patterns
    have a shared domain model. The difference is in the decision-making and the development
    process. The shared kernel is a result of the collaboration between two teams
    that coordinate tightly, while the conformist pattern deals with integration with
    a team that is not interested in collaboration—possibly a third-party service,
    where you have no control. For example, you may use the `PayPal` API to process
    payments. `PayPal` is never going to change its API to fit you, rather your bounded
    context has to comply with it. In case this integration makes your domain model
    look ugly, you can possibly introduce an anti-corruption layer to isolate the
    integration in just one place.'
