    to this requirement. This mechanism is known as *client-side service discovery*.


    ![../images/461146_1_En_6_Chapter/461146_1_En_6_Fig2_HTML.jpg](images/461146_1_En_6_Chapter/461146_1_En_6_Fig2_HTML.jpg)


    Figure 6-2


    Client-side service discovery


    The other pattern of service discovery (see Figure [6-3](#461146_1_En_6_Chapter.xhtml#Fig3))
    is to offload the service discovery task to an intermediate component such as
    a load balancer. In this case, the client invokes the service with a predefined
    URL and the load balancer uses that as a key to resolve the actual URL of the
    service. In this pattern, the client is unaware of the existence of a service
    registry. This pattern is known as *server-side service discovery.*


    ![../images/461146_1_En_6_Chapter/461146_1_En_6_Fig3_HTML.jpg](images/461146_1_En_6_Chapter/461146_1_En_6_Fig3_HTML.jpg)


    Figure 6-3


    Server-side service discovery


    Client-side discovery is commonly used when the client is fully aware of the existence
    of the service registry and client code contains the service discovery logic.
    Server-side discovery is often used with container management systems such as
    Kubernetes and Docker Swarm, where service discovery is transparent to the client
    side.


    Service registry implementations are not dependent on any of the service discovery
    mechanisms. In fact, in both cases, either the client or an intermediate application
    (load balancer) uses the same service registry APIs.


    The service registry is often used as the centralized component for service discovery
    and therefore it can be the single point of failure. Therefore, It’s important
    to ensure high availability of the service registry as part of the deployment.


    In the next couple of sections, we’ll take a closer look at the commonly used
    service registry solutions.'
  trans: '

    ### 可观测性


    可观测性是一种普遍适用于所有微服务的特性。每个微服务都可以使用推荐的可观测性代理，将数据推送到任意可观测性工具中。可观测性工具提供了微服务所有交互的集中视图，它们作为被动实体运行，不会干预业务消息的原始流程。API
    管理解决方案或 API 网关也与可观测性工具紧密协作。我们在前几节讨论的大多数可观测性方面，通常也适用于 API。


    针对可观测性的不同方面，有专门的可观测性工具，例如指标、链路追踪、日志记录、服务可视化、告警等。我们将在第 13 章深入探讨微服务可观测性。


    ## 服务注册与发现


    当您运行成百上千个微服务时，拥有一个获取服务详情的中心位置至关重要。这就是服务注册与发现发挥作用的地方。在许多描述微服务上下文中服务注册与发现的资料中，它被解释为一种在运行时获取微服务位置的机制。然而，服务注册具有更广泛的含义，并且可以更有效地使用。


    由于需要处理的服务数量众多，拥有一个可以获取所有服务信息的中心位置非常重要。正如我们在前几节讨论的，服务注册就是存储所有服务定义的地方（不仅仅是服务 URL，这与一些微服务文章的解释不同）。消费者可以通过访问服务注册中心来获取所有服务定义。而服务发现则定义了访问服务注册中心的方式。服务所有者应在服务注册中心注册服务，以便消费者能够发现它们。同时，所有者负责更新和维护服务信息。在微服务架构中，服务注册与发现最常见的用例是为服务提供可寻址的名称，使其独立于所运行的基础设施。例如，当进行服务调用时，我们使用一个带有服务逻辑引用的名称，服务发现会将该名称解析为服务的实际端点地址。因此，当实际端点地址发生变化时，外部服务或消费者无需更改其代码。


    总的来说，我们可以将服务注册中心视为发布和检索微服务架构中所有服务规范定义的存储库。我们用来检索服务定义的机制称为服务发现。


    接下来，让我们讨论一些常用的服务注册与发现模式。如图 6-2 所示，假设有一个场景：客户端想要调用一个服务，但服务地址未知或动态变化。在这种情况下，我们可以使用服务注册中心来存储服务定义。客户端必须通过调用服务注册中心的
    API 来发现服务信息，然后使用从注册中心检索到的信息进行实际的服务调用。通常，大多数服务注册中心都提供 RESTful 接口（或 gRPC）以及专用的客户端库来满足这一需求。这种机制称为*客户端服务发现*。


    ![../images/461146_1_En_6_Chapter/461146_1_En_6_Fig2_HTML.jpg](img/461146_1_En_6_Fig2_HTML.jpg)


    图 6-2


    客户端服务发现


    另一种服务发现模式（见图 6-3）是将服务发现任务卸载到中间组件（如负载均衡器）上。在这种情况下，客户端使用预定义的 URL 调用服务，负载均衡器将其作为键来解析服务的实际
    URL。在这种模式中，客户端并不知道服务注册中心的存在。这种模式称为*服务端服务发现*。


    ![../images/461146_1_En_6_Chapter/461146_1_En_6_Fig3_HTML.jpg](img/461146_1_En_6_Fig3_HTML.jpg)


    图 6-3


    服务端服务发现


    当客户端完全知晓服务注册中心的存在，并且客户端代码包含服务发现逻辑时，通常使用客户端发现。服务端发现通常与容器管理系统（如 Kubernetes 和 Docker
    Swarm）一起使用，在这些系统中，服务发现对客户端是透明的。


    服务注册中心的实现不依赖于任何服务发现机制。事实上，在这两种情况下，无论是客户端还是中间应用程序（负载均衡器），都使用相同的服务注册中心 API。


    服务注册中心通常用作服务发现的集中式组件，因此它可能成为单点故障。因此，在部署过程中确保服务注册中心的高可用性非常重要。


    在接下来的几节中，我们将更详细地介绍常用的服务注册中心解决方案。

    '
- fmt: '### Consul


    `Consul`^([^(90)](#fn90)) is a distributed, highly available system that is designed
    for discovering and configuring services. It offers most of the service registry
    capabilities, so that services can publish service definitions, and clients can
    use `Consul` to discover a given service. Using either `DNS` or `HTTP`, applications
    can find the services they depend upon. In addition to the service registry and
    discovery capabilities, `Consul` also supports service health checking, a key-value
    store that can be used for dynamic configuration, feature flagging, coordination,
    leader election, and more.


    Figure [6-4](#461146_1_En_6_Chapter.xhtml#Fig4) illustrates the key components
    of the `Consul` architecture and how they communicate with each other. Let’s next
    look at the key steps involved in services registry and discovery capabilities
    of `Consul` and the responsibility of each `Consul` components.


    ![../images/461146_1_En_6_Chapter/461146_1_En_6_Fig4_HTML.jpg](images/461146_1_En_6_Chapter/461146_1_En_6_Fig4_HTML.jpg)


    **Figure 6-4** Consul architecture


    These are the key steps to using `Consul` as the service discovery solution:


    *   Every node that provides services to `Consul` should run a `Consul agent`.

    *   An `agent` is the long-running daemon on every member of the `Consul` cluster.
    It is started by running the `Consul agent`. The `agent` can run in client or
    server mode. However, an `agent` is not required for a client that discovers services.

    *   The `agent` is responsible for running health checks and keeping services
    in sync. The agents talk to one or more `Consul servers`.

    *   A `Consul client` is an `agent` that forwards all `RPCs` to a server. The
    client is relatively stateless and the only background activity a client performs
    is taking part in the `LAN` gossip pool. (The gossip protocol involves random
    node-to-node communication over `UDP`.)

    *   A `Consul server` is where data is stored and replicated. The servers elect
    a leader. Servers are responsible for maintaining the cluster state, responding
    to `RPC` queries, exchanging `WAN` gossip with other datacenters, and forwarding
    queries to leaders or remote datacenters.

    *   `Consul` defines a canonical service definition, which is used for registering
    and discovering services.

    *   A service can be registered either by providing a service definition as a
    configuration (inside the `consul.d` directory) or by making the appropriate calls
    to the `HTTP API`.

    *   Similarly, services can be discovered using the service discovery `REST API`.


    Let’s suppose you have installed^([^(91)](#fn91)) `Consul`. Let’s go through the
    steps involved in service registration and discovery. (You can try `ch06/sample01`,
    which is available in the `samples` repository.)


    #### Registering a Service


    You can register a `Consul` service by using a configuration file created inside
    the `consul.d` directory and service definition can be placed in a new `JSON`
    file in the same directory. Suppose that we created `consul/my_consul_config/consul.d`
    and placed the `order_service` definition in the `order_service.json` file with
    the following service definition.


    ```

    {"service": {"name": "order_service", "tags": ["order-mgt"], "port": 80}}

    ```


    You can start `Consul` by pointing to the same configuration file using:


    ```

    /consul agent -dev -config-dir= /my_home/my_consul_config/consul.d.

    ```


    Alternatively, you can register the service via the catalog `REST API`^([^(92)](#fn92)).


    #### Discovering a Service


    `Consul REST API` provides a convenient way to retrieve the service definitions.


    For example, from the client applications, you can get the service definition
    with a `GET` request sent to the specified service in the service catalog of `Consul`.


    ```

    curl http://localhost:8500/v1/catalog/service/order_service

    [

    {

    "ID": "b6de0d18-89ab-0d53-223f-1b8ac033265e",

    "Node": "Kasuns-MacBook-Pro.local",

    "Address": "127.0.0.1",

    "Datacenter": "dc1",

    "TaggedAddresses": {

    "lan": "127.0.0.1",

    "wan": "127.0.0.1"

    },

    "NodeMeta": {

    "consul-network-segment": ""

    },

    "ServiceID": "order_service",

    "ServiceName": "order_service",

    "ServiceTags": [

    "order-mgt"

    ],

    "ServiceAddress": "",

    "ServiceMeta": {},

    "ServicePort": 80,

    "ServiceEnableTagOverride": false,

    "CreateIndex": 6,

    "ModifyIndex": 6

    }

    ]

    ```


    All these operations are also exposed via `DNS` interfaces. There is a wide range
    of other capabilities offered from `Consul`, which are not directly related to
    service registry, and which are not in the scope of this book. But just keep in
    mind that if you need some sort of key-value pair-based repository with coordination
    and high-availability support, `Consul` is a very good solution to incorporate
    into your microservice architecture.


    ### Eureka


    `Eureka`^([^(93)](#fn93)) is another service registry and discovery service, developed
    by Netflix. At Netflix, it was used in the `AWS` cloud for locating services for
    the purpose of load balancing and failover of middle-tier servers (a separate
    load balancer wraps `Eureka` to provide weighted load balancing based on several
    factors). Therefore, the `Eureka` server primarily functions as a service registry
    with an interface to discover the services. `Eureka` provides a `REST API`^([^(94)](#fn94))
    and a `Java` client library, which can be used to register or discover the services.
    Figure [6-5](#461146_1_En_6_Chapter.xhtml#Fig5) shows a high-level overview of
    the `Eureka` architecture.


    ![../images/461146_1_En_6_Chapter/461146_1_En_6_Fig5_HTML.jpg](images/461146_1_En_6_Chapter/461146_1_En_6_Fig5_HTML.jpg)


    **Figure 6-5** Eureka architecture


    `Eureka` server is a web application that you can deploy into `Tomcat`. You can
    then connect to it via a `Eureka client` or the `REST API`. A `Eureka client`
    is a `Java` client that can be used to register heartbeats. As shown in Figure
    [6-5](#461146_1_En_6_Chapter.xhtml#Fig5), you can embed the `Eureka client` as
    part of service code or client code. Application Services can use the `Eureka
    client` to register services, and application client can use it for discovering
    services. Services register with `Eureka` and then send heartbeats to renew their
    leases every 30 seconds. If the client cannot renew the lease, it is taken out
    of the server registry after about 90 seconds. The registration information and
    the renewals are replicated across all the `Eureka` nodes in the cluster.


    There is one `Eureka` cluster per region (geographic locations such as `us-east`,
    `us-west`, etc.), which knows only about the instances in its region. There is
    at the least one `Eureka` server per zone (one region can have multiple zones,
    which can be considered isolated datacenters) to handle zone failures. The clients
    from any zone can look up the registry information (which happens every 30 seconds)
    to locate their services (which could be in any zone) and make remote calls.'
