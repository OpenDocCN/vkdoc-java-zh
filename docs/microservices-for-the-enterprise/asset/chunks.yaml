- fmt: 'As we discussed, communication between microservices can happen via events.
    Under domain-driven design, these events are known as *domain events*. Domain
    events are triggered as a result of state changes in bounded contexts. Then the
    other bounded contexts can respond to these events in a loosely coupled manner.
    The bounded contexts firing events need not to worry about the behaviors that
    should take place as a result of those events and at the same time bounded contexts,
    which handle such events, need not to worry about where the events came from.
    Domain events can be used between bounded contexts within a domain or between
    domains.


    ## Context Map


    The bounded context helps encapsulating business logic within a service boundary
    and helps define the service interface. When the number of bounded contexts in
    an enterprise grows, it could easily become a nightmare to figure out how they
    are connected. The context maps help visualize the relationships between bounded
    contexts. Conway’s Law we discussed earlier is another reason why we should build
    a context map. As per Conway’s Law, any organization that designs a system will
    produce a design whose structure is a copy of the organization’s communication
    structure. In other words, we will have different teams working on different bounded
    contexts. They may result in very good communication within a team, but not between
    teams. When the communication between teams lack, the design decisions made on
    corresponding bounded contexts do not get propagated to other parties properly.
    Having a context map helps each team track changes happening on the bounded contexts
    they rely on.


    Vaughn Vernon, in his book *Implementing Domain-Driven Design,* presents multiple
    approaches to express a context map. The easier way is to come up with a diagram
    to show the mapping between two or more existing bounded contexts, as in Figure
    [2-5](#461146_1_En_2_Chapter.xhtml#Fig5). Also, keep in mind here that each bounded
    context in Figure [2-5](#461146_1_En_2_Chapter.xhtml#Fig5) has a corresponding
    microservice. We used a line between two bounded contexts with two identifiers
    at each end, either `U` or `D`, to show the relationship between corresponding
    bounded contexts. `U` is for upstream, while `D` is for downstream.


    ![../images/461146_1_En_2_Chapter/461146_1_En_2_Fig5_HTML.jpg](images/461146_1_En_2_Chapter/461146_1_En_2_Fig5_HTML.jpg)


    Figure 2-5


    Context map


    In the relationship between the `Order Processing` bounded context and the `Billing`
    bounded context, the `Order Processing` bounded context is the upstream context,
    while `Billing` is the downstream context. The upstream context has more control
    over the downstream context. In other words, the upstream context defines the
    domain model passed between the two contexts. The downstream context should be
    well aware of any changes happening to the upstream context. Figure [2-4](#461146_1_En_2_Chapter.xhtml#Fig4)
    shows what exact messages being passed between these two bounded contexts. There
    is no direct coupling. The communication between the `Order Processing` bounded
    context and the `Billing` bounded context happens via eventing. The upstream bounded
    context or the `Order Processing` bounded context defines the structure of the
    event, and any downstream bounded context interested in that event must be compliant.


    The relationship between the `Billing` bounded context and the `Supplier Management`
    bounded context is also the same as what is between the `Order Processing` bounded
    context and the `Billing` bounded context. There the `Billing` is the upstream
    context while `Supplier Management` is the downstream context. The communication
    between these two bounded contexts happens via eventing, as shown in Figure [2-4](#461146_1_En_2_Chapter.xhtml#Fig4).
    The communication between the `Order Processing` bounded context and the `Inventory`
    bounded context is synchronous. The `Inventory` is the upstream context while
    `Order Processing` is the downstream context. In other words, the contract for
    the communication between the `Order Processing` bounded context and the `Inventory`
    bounded context is defined by the `Inventory` bounded context. Not all the relationships,
    which are shown in Figure [2-5](#461146_1_En_2_Chapter.xhtml#Fig5), need an explanation,
    as they are self-explanatory.


    Let’s step back and delve little deeper into the `Order Processing` and `Inventory`
    bounded contexts. A bounded context has its own domain model, which is defined
    as a result of a long exercise carried out by domain experts and developers. You
    may recall that the same domain object may reside in different bounded contexts
    with different definitions. For example, the `order` entity in the `Order Processing`
    bounded context has properties such as `order id`, `customer id`, `line items`,
    `delivery address`, and `payment option,` while the `order` entity in the `Inventory`
    bounded context has properties such as `order id` and `line items`. Even though
    a reference to the customer, the deliver address, and the payment option are required
    by the `Order Processing` interface to maintain the history of all the orders
    against the customer, none of them are needed by the `Inventory`. Each bounded
    context should know how to manage such situations, to avoid any conflicts in their
    domain models. In the following section we discuss some patterns to follow in
    order to maintain relationships between multiple bounded contexts.


    ## Relational Patterns


    Domain-driven design has lead to multiple patterns that facilitate communication
    between multiple bounded contexts. The same patterns are applicable while designing
    microservices, which are well aligned with bounded contexts. These relational
    patterns for bounded contexts were first introduced by Eric Evans in his book
    *Domain-Driven Design: Tackling Complexity in the Heart of Software*.'
