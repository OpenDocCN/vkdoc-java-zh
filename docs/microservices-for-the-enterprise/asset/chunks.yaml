  trans: '

    #### Spring Boot 与 Docker 集成


    Spring Boot 旨在部署并运行于容器中。它提供了插件，允许你从所开发的 Spring Boot 服务创建 Docker 镜像。你可以通过创建所需的
    Dockerfile 并将 `docker-file` Maven 插件添加到项目构建阶段来创建 Docker 镜像。例如，Dockerfile 内容如下：


    ```

    FROM openjdk:8-jdk-alpine

    VOLUME /tmp

    ARG JAR_FILE

    COPY ${JAR_FILE} app.jar

    ENTRYPOINT ["java","-Djava.security.egd=file:/dev/./urandom","-jar","/app.jar"]

    ```


    你可以将 `docker-file` 插件^(¹¹⁶) 添加到项目的 `pom` 文件中。完整的代码示例位于 `ch08/sample07` 目录。


    在 Spring Boot 运行时，它使用嵌入式 Web 服务器（如 Tomcat）来部署和启动你的服务。因此，你可以轻松地通过其嵌入式 Tomcat 运行时启动微服务。尽管启动时间和内存占用相对较高（几秒钟），我们仍可将
    Spring Boot 视为一种容器原生技术。


    #### Ballerina：Docker 与 Kubernetes 集成


    我们在第 7 章“集成微服务”中介绍了 Ballerina，它也作为语言扩展的一部分提供了一些容器原生能力。开发者只需使用所选部署方法的适当注解对代码进行标注，即可为
    Ballerina 代码生成部署工件。例如，在以下代码片段中，我们使用 Kubernetes 注解来标注代码，以生成部署工件。


    ```

    import ballerina/http;

    import ballerinax/kubernetes;

    @kubernetes:Deployment {

    enableLiveness: true,

    singleYAML: true

    }

    @kubernetes:Ingress {

    hostname: "abc.com"

    }

    @kubernetes:Service {name: "hello"}

    endpoint http:Listener helloEP {

    port: 9090

    };

    @http:ServiceConfig {

    basePath: "/helloWorld"

    }

    service helloWorld bind helloEP {

    sayHello(endpoint outboundEP, http:Request request) {

    http:Response response = new;

    response.setTextPayload("Hello, World from service helloWorld ! \n");

    _ = outboundEP->respond(response);

    }

    }

    ```


    在 Ballerina 构建阶段，它将生成 Docker 镜像和相应的 Kubernetes 部署工件。完整的代码示例位于 `ch08/sample08`
    目录。Ballerina 的部署选择非常多样化，你可以将其部署在传统的虚拟机（VM）或裸金属服务器、Docker、Kubernetes 上，如果你使用诸如
    Istio 之类的服务网格，还可以部署在服务网格上。


    ## 持续集成、交付与部署


    微服务架构背后的关键理由之一是缩短产品上线时间和反馈周期。没有自动化，就无法实现这些目标。如果没有 DevOps 和自动化工具方面的及时进步，一个良好的微服务架构也只会停留在纸面上（或白板上）。微服务之所以成为一个好主意，是因为它们在开始成为主流时，就拥有了
    Docker、Ansible、Puppet、Chef 等众多工具的支持。围绕自动化的工具可以分为两大类——持续集成工具和持续部署工具。


    ### 注意


    本文是一份极佳的信息来源，包含了不同人士关于持续集成、持续部署和持续交付的观点：[`https://bit.ly/2wyBLNW`](https://bit.ly/2wyBLNW)
    。


    ### 持续集成


    持续集成通过自动化构建和源代码集成来维护源代码的完整性，使软件开发团队能够协同工作，而不会相互掣肘。它还与 DevOps 工具集成，以创建自动化的代码交付管道。持续集成帮助开发团队避免*集成地狱*——即软件在单个开发者的机器上可以工作，但当所有开发者集成代码时却失败。顶级分析公司
    Forrester 在其关于持续集成工具的最新报告^(¹¹⁷) 中，确定了该领域的十大工具：Atlassian Bamboo、AWS CodeBuild、CircleCI、CloudBees
    Jenkins、Codeship、GitLab CI、IBM UrbanCode Build、JetBrains TeamCity、Microsoft VSTS
    和 Travis CI。


    ### 持续交付


    持续交付工具将应用程序、基础设施、中间件及其支持的安装流程和依赖项打包成发布包，这些发布包在整个生命周期中进行流转。其目标是使代码始终保持可部署状态。Forrester
    关于持续交付和发布自动化的最新报告重点介绍了该领域 15 家最重要的供应商：Atlassian、CA Technologies、Chef Software、Clarive、CloudBees、Electric
    Cloud、Flexagon、Hewlett Packard Enterprise (HPE)、IBM、Micro Focus、Microsoft、Puppet、Red
    Hat、VMware 和 XebiaLabs。


    然而，如果我们关注主要支持 Kubernetes 的持续交付工具，那么诸如 Weave Cloud^(¹¹⁸)、Spinnaker^(¹¹⁹)（由 Netflix
    开发）、Codefresh^(¹²⁰)、Harness^(¹²¹) 和 GoCD^(¹²²) 等工具相当流行。


    ### 持续部署


    持续部署是一个过程，它将持续交付过程产生的工件部署到生产环境中，理想情况下，每次开发者更新代码时都会执行此操作！遵循持续部署实践的组织每天将代码部署到生产环境超过一百次。蓝绿部署、A/B
    测试和金丝雀发布是人们在持续部署中遵循的三种主要方法或实践。


    #### 蓝绿部署


    蓝绿部署是一种经过验证的、将变更引入运行系统的策略。它已经存在了近十年，并被许多大型企业成功使用。在蓝绿策略下，我们维护两个几乎相同的部署；一个称为蓝色，另一个称为绿色。在给定时间，蓝色或绿色中的一个处理实时流量——假设是蓝色。现在，我们有绿色环境来部署我们的变更并进行测试。如果一切正常，我们在负载均衡器处将实时流量从蓝色重定向到绿色。然后绿色成为处理实时流量的环境，而蓝色则可用于部署新的变更。如果出现问题，我们可以很容易地切换环境，从而自动回滚新的变更。


    #### 金丝雀发布


    金丝雀发布的概念源于煤矿工人使用的一种策略。他们过去常常带着金丝雀进入矿井，以监测空气中一氧化碳的含量。如果金丝雀死亡，意味着空气中一氧化碳含量很高，于是他们就离开煤矿。通过金丝雀发布，一个构建版本首先提供给选定的受众群体（可能占整个实时流量的
    5% 到 10%），如果运行良好（或者说没有“死亡”），那么再向所有人开放。这最大限度地降低了引入新变更的风险，因为生产发布是缓慢地、以小批量方式进行的。


    #### A/B 测试


    A/B 测试是关于评估新变更相对于旧系统的影响，或同时评估两个不同变更的影响。这主要用于跟踪因网站引入某些变更而导致的用户行为变化。例如，你的网站可能有一个版本启用了社交登录作为注册选项，而另一个版本则没有。另一个例子是，在网站上为重要消息设置不同的颜色或位置，并查看哪个被点击得更多。A/B
    测试用于衡量应用程序中不同竞争功能在实时流量下的表现。一段时间后，只有胜出的功能保留，其他竞争功能将被回滚。

    '
- fmt: '### Note


    For readers who are interested in more details about continuous deployment, we
    recommend going through the “Canary Release” article^([^(123)](#fn123)) by Danilo
    Sato and “Blue Green Deployment” article^([^(124)](#fn124)) by Marin Fowler.


    ### Summary


    In this chapter, we discussed how to run microservices in a production deployment
    with containers. Containers and microservices are a match made in heaven and if
    not for containers, microservices wouldn’t be mainstream. We discussed deploying
    microservices with `Docker` and later discussed how the container orchestration
    works with `Kubernetes`. We also looked at `Metaparticle`, one of the prominent
    cloud native microservices frameworks, which helps us incorporate container-native
    capabilities into the applications or microservices code that we develop as annotations.
    Finally we discussed continuous integration/delivery and deployment.


    In the next chapter, we discuss one of the trending topics in microservices architecture
    and also a key ingredient in any microservices deployment: the Service Mesh.


