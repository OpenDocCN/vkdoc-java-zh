  trans: '

    ### Consul


    Consul^(⁹⁰) 是一个分布式、高可用的系统，专为服务发现和配置而设计。它提供了大部分服务注册功能，使得服务可以发布服务定义，而客户端则可以使用 Consul
    来发现特定服务。通过 DNS 或 HTTP，应用程序可以找到它们所依赖的服务。除了服务注册与发现功能外，Consul 还支持服务健康检查、一个可用于动态配置、功能标记、协调、领导者选举等的键值存储。


    图 6-4 展示了 Consul 架构的关键组件以及它们之间的通信方式。接下来，我们来看看 Consul 服务注册与发现功能所涉及的关键步骤，以及每个 Consul
    组件的职责。


    ![../images/461146_1_En_6_Chapter/461146_1_En_6_Fig4_HTML.jpg](img/461146_1_En_6_Fig4_HTML.jpg)


    图 6-4


    Consul 架构


    以下是使用 Consul 作为服务发现解决方案的关键步骤：


    *   每个向 Consul 提供服务的节点都应运行一个 Consul 代理。


    *   代理是 Consul 集群中每个成员上长期运行的守护进程。它通过运行 Consul 代理来启动。代理可以在客户端或服务器模式下运行。但是，发现服务的客户端不需要代理。


    *   代理负责运行健康检查并保持服务同步。代理与一个或多个 Consul 服务器通信。


    *   Consul 客户端是一种代理，它将所有 RPC 转发给服务器。客户端相对无状态，其执行的唯一后台活动是参与局域网八卦池。（八卦协议涉及通过 UDP
    进行的随机节点间通信。）


    *   Consul 服务器是数据存储和复制的地方。服务器选举出一个领导者。服务器负责维护集群状态、响应 RPC 查询、与其他数据中心交换广域网八卦信息，并将查询转发给领导者或远程数据中心。


    *   Consul 定义了一个规范的服务定义，用于注册和发现服务。


    *   可以通过提供服务定义作为配置（在 `consul.d` 目录内）或通过向 HTTP API 发出适当的调用来注册服务。


    *   类似地，可以使用服务发现 REST API 来发现服务。


    假设你已经安装了^(⁹¹) Consul。让我们逐步了解服务注册和发现所涉及的步骤。（你可以尝试 `ch06/sample01`，该示例位于 `samples`
    仓库中。）


    #### 注册服务


    你可以通过在 `consul.d` 目录内创建配置文件来注册 Consul 服务，并且服务定义可以放在同一目录下的新 JSON 文件中。假设我们创建了 `consul/my_consul_config/consul.d`
    目录，并将 `order_service` 定义放在 `order_service.json` 文件中，服务定义如下。


    ```

    {"service": {"name": "order_service", "tags": ["order-mgt"], "port": 80}}

    ```


    你可以通过指向同一个配置文件来启动 Consul，使用以下命令：


    ```

    /consul agent -dev -config-dir= /my_home/my_consul_config/consul.d.

    ```


    或者，你也可以通过目录 REST API^(⁹²) 来注册服务。


    #### 发现服务


    Consul REST API 提供了一种便捷的方式来检索服务定义。


    例如，从客户端应用程序中，你可以通过向 Consul 服务目录中的指定服务发送 `GET` 请求来获取服务定义。


    ```

    curl http://localhost:8500/v1/catalog/service/order_service

    [

    {

    "ID": "b6de0d18-89ab-0d53-223f-1b8ac033265e",

    "Node": "Kasuns-MacBook-Pro.local",

    "Address": "127.0.0.1",

    "Datacenter": "dc1",

    "TaggedAddresses": {

    "lan": "127.0.0.1",

    "wan": "127.0.0.1"

    },

    "NodeMeta": {

    "consul-network-segment": ""

    },

    "ServiceID": "order_service",

    "ServiceName": "order_service",

    "ServiceTags": [

    "order-mgt"

    ],

    "ServiceAddress": "",

    "ServiceMeta": {},

    "ServicePort": 80,

    "ServiceEnableTagOverride": false,

    "CreateIndex": 6,

    "ModifyIndex": 6

    }

    ]

    ```


    所有这些操作也通过 DNS 接口暴露。Consul 还提供了许多其他功能，这些功能与服务注册没有直接关系，也不在本书的讨论范围内。但请记住，如果你需要一个支持协调和高可用性的键值对存储库，Consul
    是一个非常适合集成到微服务架构中的解决方案。


    ### Eureka


    Eureka^(⁹³) 是另一个服务注册与发现服务，由 Netflix 开发。在 Netflix，它被用于 AWS 云中，以定位服务，实现中间层服务器的负载均衡和故障转移（一个独立的负载均衡器封装了
    Eureka，以根据多种因素提供加权负载均衡）。因此，Eureka 服务器主要充当服务注册中心，并提供发现服务的接口。Eureka 提供了一个 REST API^(⁹⁴)
    和一个 Java 客户端库，可用于注册或发现服务。图 6-5 展示了 Eureka 架构的高级概览。


    ![../images/461146_1_En_6_Chapter/461146_1_En_6_Fig5_HTML.jpg](img/461146_1_En_6_Fig5_HTML.jpg)


    图 6-5


    Eureka 架构


    Eureka 服务器是一个可以部署到 Tomcat 中的 Web 应用程序。然后，你可以通过 Eureka 客户端或 REST API 连接到它。Eureka
    客户端是一个 Java 客户端，可用于注册心跳。如图 6-5 所示，你可以将 Eureka 客户端嵌入到服务代码或客户端代码中。应用程序服务可以使用 Eureka
    客户端注册服务，而应用程序客户端则可以使用它来发现服务。服务向 Eureka 注册，然后每 30 秒发送一次心跳以续租。如果客户端无法续租，则大约 90 秒后，该服务将从服务器注册表中移除。注册信息和续租操作会在集群中的所有
    Eureka 节点之间复制。


    每个区域（地理位置，如 us-east、us-west 等）有一个 Eureka 集群，该集群只知道其区域内的实例。每个可用区（一个区域可以有多个可用区，可视为隔离的数据中心）至少有一个
    Eureka 服务器来处理可用区故障。来自任何可用区的客户端都可以查找注册信息（每 30 秒进行一次），以定位其服务（可能位于任何可用区）并进行远程调用。

