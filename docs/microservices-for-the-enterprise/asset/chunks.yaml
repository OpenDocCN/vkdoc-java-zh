- fmt: '### Note


    If you find any issues in building or running the samples given in this book,
    please refer to the `README` file under the corresponding chapter in the Git repository:
    [`https://github.com/microservices-for-enterprise/samples.git`](https://github.com/microservices-for-enterprise/samples.git).
    We will update the samples and the corresponding `README` files in the Git repository
    to reflect any changes or updates related to the tools, libraries, and frameworks
    used in this book.


    ### Hello World!


    This is the simplest microservice ever. You can find the code inside the `ch04/sample01`
    directory. To build the project with Maven, use the following command:


    ```

    \> cd sample01

    \> mvn clean install

    ```


    Before we delve deep into the code, let’s look at some of the notable Maven dependencies
    and plugins added to `ch04/sample01/pom.xml`.


    Spring Boot comes with different `starter` dependencies to integrate with different
    Spring modules. The `spring-boot-starter-web` dependency brings in Tomcat and
    Spring MVC and does all the wiring between the components, keeping the developer’s
    work to a minimum. The `spring-boot-starter-actuator` dependency brings in production-ready
    features to help you monitor and manage your application.


    ```

    org.springframework.boot

    spring-boot-starter-web


    org.springframework.boot

    spring-boot-starter-actuator

    ```


    In the `pom.xml` file, we also have the `spring-boot-maven-plugin` plugin, which
    lets you start the Spring Boot service from Maven.


    ```

    org.springframework.boot

    spring-boot-maven-plugin

    ```


    Now let’s look at the `checkOrderStatus` method in the class file `src/main/java/com/apress/ch04/sample01/service/OrderProcessing.java`.
    This method accepts an order ID and returns the status of the order. There are
    three notable annotations used in the following code. The `@RestController` is
    a class-level annotation that marks the corresponding class as a REST endpoint,
    which accepts and produces JSON payloads. The `@RequestMapping` annotation can
    be defined both at the class level and the method level. The `value` attribute
    at the class-level annotation defines the path under which the corresponding endpoint
    is registered. The same at the method level appends to the class-level path. Anything
    defined in curly braces is a placeholder for any variable value in the path. For
    example, a `GET` request on `/order/101` and `/order/102` (where 101 and 102 are
    the order IDs) hits the method `checkOrderStatus`. In fact, the value of the `value`
    attribute is a URI template^([^(77)](#fn77)). The annotation `@PathVariable` extracts
    the provided variable from the URI template defined under the `value` attribute
    of the `@RequestMapping` annotation and binds it to the variable defined in the
    method signature.


    ```

    @RestController

    @RequestMapping(value = "/order")

    public class OrderProcessing {

    @RequestMapping(value = "/{id}", method = RequestMethod.GET)

    public String checkOrderStatus

    (@PathVariable("id") String orderId)

    {

    return ResponseEntity.ok("{''status'' : ''shipped''}");

    }

    }

    ```


    There is another important class file at `src/main/java/com/apress/ch04/sample01/OrderProcessingApp.java`
    worth looking at. This is the class that spins up our microservice in its own
    application server, in this case the embedded Tomcat. By default, it starts on
    port 8080, and you can change the port by adding, say for example, `server.port
    = 9000` to the `src/main/resources/application.properties` file. This will set
    the server port to 9000. The following shows the code snippet from that `OrderProcessingApp`
    class, which spins up our microservice. The `@SpringBootApplication` annotation,
    which is defined at the class level, is being used as a shortcut for four other
    annotations defined in Spring: `@Configuration`, `@EnableAutoConfiguration`, `@EnableWebMvc`,
    and `@ComponentScan`.


    ```

    @SpringBootApplication

    public class OrderProcessingApp {

    public static void main(String[] args) {

    SpringApplication.run(OrderProcessingApp.class, args);

    }

    }

    ```


    Now, let’s see how to run our microservice and talk to it with a cURL client.
    The following command executed from the `ch04/sample01` directory shows how to
    start our Spring Boot application with Maven.


    ```

    \> mvn spring-boot:run

    ```


    To test the microservice with a cURL client, use the following command from a
    different command console. It will print the output as shown here, after the initial
    command.


    ```

    \> curl http://localhost:8080/order/11

    {"customer_id":"101021","order_id":"11","payment_method":{"card_type":"VISA","expiration":"01/22","name":"John
    Doe","billing_address":"201, 1st Street, San Jose, CA"},"items": [{"code":"101","qty":1},{"code":"103","qty":5}],"shipping_address":"201,
    1st Street, San Jose, CA"}

    ```


    ### Spring Boot Actuator


    Gathering telemetric data about a running microservice is extremely important.
    This is discussed in detail in Chapter [13](#461146_1_En_13_Chapter.xhtml). In
    this section, we explore some of the monitoring capabilities provided in Spring
    Boot out-of-the-box via the `actuator` endpoint^([^(78)](#fn78)). There are multiple
    services running behind the `actuator` endpoint, and most of them are enabled
    by default. As discussed in the previous section, we only need to add a dependency
    to `spring-boot-starter-actuator` to enable it. Let’s keep the Spring Boot application
    from the previous example up and running and execute a set of cURL commands.


    The following cURL command, which does a `GET` to the `actuator/health` endpoint,
    returns the server status.


    ```

    \> curl http://localhost:8080/actuator/health

    {"status":"UP"}

    ```


    Spring Boot exposes telemetric data over HTTP and JMX. Due to security reasons,
    not all of them are exposed via HTTP, only the `health` and `info` services. At
    our own risk, let’s see how to enable the `httptrace` endpoint over HTTP. You
    need to add the following to the `src/main/resources/application.properties` file
    and reboot the Spring Boot application.


    ```

    management.endpoints.web.exposure.include = health,info,httptrace

    ```


    Now let’s hit our microservice a few times.


    ```

    \> curl http://localhost:8080/order/11

    \> curl http://localhost:8080/order/11

    \> curl http://localhost:8080/order/11

    ```


    The following cURL command will invoke the `httptrace` endpoint, which will return
    the HTTP trace information.


    ```

    \> curl http://localhost:8080/actuator/httptrace

    {

    "traces":[

    {

    "timestamp":"2018-03-29T16:42:46.235Z",

    "principal":null,

    "session":null,

    "request":{

    "method":"GET",

    "uri":"http://localhost:8080/order/11",

    "headers":{

    "host":[

    "localhost:8080"

    ],

    "user-agent":[

    "curl/7.54.0"

    ],

    "accept":[

    "*/*"

    ]

    },

    "remoteAddress":null

    },

    "response":{

    "status":200,

    "headers":{

    "Content-Type":[

    "text/plain;charset=UTF-8"

    ],

    "Content-Length":[

    "7"

    ],

    "Date":[

    "Thu, 29 Mar 2018 16:42:46 GMT"

    ]

    }

    },

    "timeTaken":14

    }

    ]

    }

    ```'
