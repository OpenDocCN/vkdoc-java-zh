- fmt: '### Exposing Metrics from the Spring Boot Microservice


    First, let’s see how to instrument our Spring Boot microservice to expose metrics
    in a format understood by Prometheus. The source code related to this example
    is available in the `ch13/sample05` directory. Let’s look at some of the notable
    Maven dependencies added to the `ch13/sample05/pom.xml` file. The `simpleclient_spring_boot`
    and `simpleclient_hotspot` dependencies bring all the dependencies required to
    expose metrics to Prometheus. The `simpleclient_spring_boot` dependency introduces
    the two class-level annotations, `@EnablePrometheusEndpoint` and `@EnableSpringBootMetricsCollector`,
    which are added to the `ch13/sample05/OrderProcessingApp.java` class file.


    ```

    io.prometheus

    artifactId>simpleclient_spring_boot

    0.1.0


    io.prometheus

    simpleclient_hotspot

    0.1.0

    ```


    To expose the metrics from the Spring Boot application with no security (we can
    probably use network level security), add the following property to the `ch13/sample05/src/main/resources/application.properties`
    file.


    ```

    management.security.enabled=false

    ```


    Now we’re all set. Let’s spin up our `Order Processing` microservice with the
    following command (from the `sample05` directory).


    ```

    \> mvn clean install

    \> mvn spring-boot:run

    ```


    Once the service is up, the metrics published by the service is accessible via
    `http://localhost:9000/prometheus`. Here, 9000 is the port where your microservice
    is running. The following text lists the truncated output from the previous endpoint.


    ```

    # HELP httpsessions_max httpsessions_max

    # TYPE httpsessions_max gauge

    httpsessions_max -1.0

    # HELP httpsessions_active httpsessions_active

    # TYPE httpsessions_active gauge

    httpsessions_active 0.0

    # HELP mem mem

    # TYPE mem gauge

    mem 549365.0

    # HELP mem_free mem_free

    # TYPE mem_free gauge

    mem_free 211808.0

    # HELP processors processors

    # TYPE processors gauge

    processors 8.0

    # HELP instance_uptime instance_uptime

    # TYPE instance_uptime gauge

    instance_uptime 313310.0

    # HELP uptime uptime

    # TYPE uptime gauge

    uptime 317439.0

    # HELP systemload_average systemload_average

    # TYPE systemload_average gauge

    systemload_average 2.13720703125

    # HELP heap_committed heap_committed

    # TYPE heap_committed gauge

    heap_committed 481280.0

    # HELP heap_init heap_init

    # TYPE heap_init gauge

    heap_init 262144.0

    # HELP heap_used heap_used

    # TYPE heap_used gauge

    heap_used 269471.0

    # HELP heap heap

    # TYPE heap gauge

    heap 3728384.0

    # HELP nonheap_committed nonheap_committed

    # TYPE nonheap_committed gauge

    nonheap_committed 71696.0

    ```


    ### Setting Up Prometheus


    Setting up Prometheus is quite straightforward with Docker. First we need to create
    a `prometheus.yml` file, which includes all the services Prometheus will monitor.
    The following example shows a sample file, which includes our `Order Processing`
    microservice (`sample05`) and the Prometheus instance itself. A given `prometheus.yml`
    file can have multiple jobs. Here the `prometheus` job takes care of monitoring
    itself (which runs on port 9090), while the `orderprocessing` job is set up to
    poll `10.0.0.93:9000` endpoint every 10 seconds. Keep in mind that here we need
    to use the IP address of the node, which runs the `Order Processing` microservice,
    and it has to be accessible from the Docker instance, which runs Prometheus.


    ```

    scrape_configs:

    - job_name: ''prometheus''

    scrape_interval: 10s

    static_configs:

    - targets: [''localhost:9090'']

    - job_name: ''orderprocessing''

    scrape_interval: 10s

    metrics_path: ''/prometheus''

    static_configs:

    - targets: [''10.0.0.93:9000'']

    ```


    Now let’s spin up the Prometheus Docker instance, with the `prometheus.yml` file.


    ```

    :\> docker run -p 9090:9090 -v /path/to/prometheus.yml:/etc/prometheus/prometheus.yml
    prom/prometheus

    ```


    Once the Prometheus node is up, go to the URL `http://localhost:9090/targets`,
    and it will show all the services, Prometheus monitors, and the status of individual
    endpoints (see Figure [13-11](#461146_1_En_13_Chapter.xhtml#Fig11)).


    ![../images/461146_1_En_13_Chapter/461146_1_En_13_Fig11_HTML.jpg](images/461146_1_En_13_Chapter/461146_1_En_13_Fig11_HTML.jpg)


    Figure 13-11


    Prometheus targets and the status of individual endpoints


    ### Building Graphs with Prometheus


    Now we’ve have all the metrics from our Spring Boot microservice, published to
    Prometheus. Let’s see how to build graphs to monitor those published stats.


    First, go to `http://localhost:9090/graph` and pick the metric that you want to
    monitor. For example, we picked `heap_used`. Then when you click on the Graph
    tab, we should be able to see the used heap graph against time (see Figure [13-12](#461146_1_En_13_Chapter.xhtml#Fig12)).
    That way, you can add any number of graphs.


    ### Note


    Prometheus was born as an open source project released under Apache 2.0 license
    at SoundCloud in 2012. It’s mostly written in Go and the community around Prometheus
    grew up in last few years. In 2016 it was the second project to get the membership
    of Cloud Native Computing Foundation (CNCF).


    ![../images/461146_1_En_13_Chapter/461146_1_En_13_Fig12_HTML.jpg](images/461146_1_En_13_Chapter/461146_1_En_13_Fig12_HTML.jpg)


    Figure 13-12


    Using Prometheus to monitor the used heap of a Spring Boot microservice


    ## Analytics and Monitoring with Grafana


    Grafana is an open source product for analytics and monitoring, and it is more
    powerful than Prometheus to build dashboards. In fact, it is recommended to use
    Grafana to build dashboards with Prometheus. Prometheus had its own dashboarding
    tool called Promdash, but with the advancements in Grafana, Prometheus developers
    let it go and started promoting Grafana.


    ### Note


    A comprehensive introduction to Grafana is out of the scope of this book, and
    we recommend readers looking for details to refer to the Grafana documentation
    available at [`http://docs.grafana.org/`](http://docs.grafana.org/).


    ### Building a Dashboard with Grafana


    Setting up Grafana is quite straightforward with Docker. Use the following command
    to spin up a Grafana Docker instance, which runs on HTTP port 3000.


    ```

    :\> docker run -d -p 3000:3000 grafana/grafana

    ```


    Once the server is started, you can log in to the Grafana management console via
    `http://localhost:3000` with the credentials admin/admin. The first thing we need
    to do is introduce a new data source. Grafana uses data sources to build graphs.
    Click on Add Data Source and pick Prometheus as the data source type. Give it
    a name, let’s say `prometheus_ds`. The rest we can keep as it is, except for the
    HTTP URL property. This URL should point to the Prometheus server, which must
    be accessible from the node that runs Grafana. The data source configuration looks
    like Figure [13-13](#461146_1_En_13_Chapter.xhtml#Fig13).


    ![../images/461146_1_En_13_Chapter/461146_1_En_13_Fig13_HTML.jpg](images/461146_1_En_13_Chapter/461146_1_En_13_Fig13_HTML.jpg)


    Figure 13-13


    Grafana data source properties'
