    #### Spinnaker


    Spinnaker^(⁴³) 是一个多云持续交付平台，用于以高速度和信心发布软件变更。它结合了强大且灵活的管道管理系统，并与主流云提供商集成，包括 AWS
    EC2、Kubernetes、Google Compute Engine、Google Kubernetes Engine、Google App Engine、Microsoft
    Azure 和 OpenStack。


    #### Eureka


    Eureka^(⁴⁴) 是一个 RESTful 服务，主要用于 AWS 云中定位服务，以实现中间层服务器的负载均衡和故障转移。在微服务部署中，Eureka
    可用作服务注册中心来发现端点。


    #### Archaius


    Archaius^(⁴⁵) 包含 Netflix 使用的一组配置管理 API。它允许配置在运行时动态更改，从而使生产系统无需重启即可获取配置变更。为了提供快速且线程安全的属性访问，Archaius
    在配置之上添加了一个包含所需属性的缓存层。它还创建了一个配置层次结构，并以简单、快速且线程安全的方式确定最终的属性值。


    ![../images/461146_1_En_4_Chapter/461146_1_En_4_Fig1_HTML.jpg](img/461146_1_En_4_Fig1_HTML.jpg)


    图 4-1


    Netflix OSS 部署


    #### Ribbon


    Ribbon^(⁴⁶) 是一个进程间通信（远程过程调用）库，内置软件负载均衡器（主要用于客户端负载均衡）。它主要用于支持多种序列化方案的 REST 调用。


    #### Hystrix


    Hystrix^(⁴⁷) 是一个延迟和容错库，旨在隔离对远程系统、服务和第三方库的访问点，阻止级联故障，并在故障不可避免的复杂分布式系统中实现弹性。Hystrix
    实现了第 2 章讨论的许多弹性模式。它使用*舱壁*模式来隔离依赖项之间的相互影响，并限制对任一依赖项的并发访问；同时使用*断路器*模式主动避免与故障端点通信。Hystrix
    将成功、失败、拒绝和超时报告给断路器，断路器维护一组滚动计数器来计算统计数据。它利用这些统计数据来决定何时应“跳闸”，此时它会短路所有后续请求，直到恢复期过去，之后在完成某些健康检查后再次闭合电路^(⁴⁸)。


    #### Zuul


    Zuul^(⁴⁹) 是一个网关服务，提供动态路由、监控、弹性、安全等功能。它充当 Netflix 服务器基础设施的前门，处理来自全球所有 Netflix 用户的流量。它还路由请求、支持开发者测试和调试、提供对
    Netflix 整体服务健康状况的深入洞察、保护其免受攻击，并在 AWS 区域出现问题时将流量引导至其他云区域。


    ### Spring Boot


    Spring Boot^(⁵⁰) 是 Java 开发者最流行的微服务开发框架。准确地说，Spring Boot 为 Spring 提供了一个有主见^(⁵¹)的运行时，消除了许多复杂性。尽管
    Spring Boot 有主见，但它也允许开发者覆盖其许多默认选择。由于许多 Java 开发者熟悉 Spring，并且开发便捷性是微服务世界成功的关键因素，因此许多人采用了
    Spring Boot。即使对于不使用 Spring 的 Java 开发者来说，它也是一个家喻户晓的名字。如果你使用过 Spring，肯定曾为处理庞大臃肿的
    XML 配置文件而烦恼。与 Spring 不同，Spring Boot 完全信奉约定优于配置——不再有 XML 地狱！


    ### 注意


    *约定优于配置*（也称为按约定编码）是一种软件框架使用的软件设计范式，旨在减少使用该框架的开发者需要做出的决策数量，同时又不一定丧失灵活性。^(⁵²)


    Spring Cloud^(⁵³) 于 2015 年 3 月在 Spring Boot 之后推出。它为开发者提供了快速构建分布式系统中一些常见模式的工具。Spring
    Cloud 与 Spring Boot 一起，为微服务开发者提供了出色的开发环境。Spring Cloud 的另一个特点是，它通过自动配置以及与 Spring
    环境和其他 Spring 编程模型惯用法的绑定，为 Spring Boot 应用提供 Netflix OSS 集成。只需几个简单的注解，你就可以在应用中启用和配置常见模式，并使用
    Netflix OSS 组件构建大型分布式系统。提供的模式包括使用 Eureka 进行服务发现、使用 Hystrix 实现断路器、使用 Zuul 实现智能路由，以及使用
    Ribbon 实现客户端负载均衡。我们将在本章后面的代码示例中使用 Spring Boot 和 Spring Cloud。


    ### 注意


    约定优于配置最初由 David Heinemeier Hansson 引入，用于描述 Ruby on Rails Web 框架的哲学。流行的构建自动化工具
    Apache Maven 遵循相同的哲学。


    ### Istio


    Istio 是一个开放平台，提供统一的方式来连接、管理和保护微服务。它支持管理微服务之间的流量、执行访问策略以及聚合遥测数据，所有这些都无需更改微服务代码。在
    Google、IBM、Lyft 等众多公司的强力支持下，Istio 是微服务领域领先的*服务网格*产品之一。我们将在第 9 章“服务网格”中详细讨论服务网格。目前，服务网格是微服务架构中的一个组件，它促进服务间的通信以及路由规则，遵循我们在第
    2 章中讨论的弹性模式，例如重试、超时、断路器和舱壁。它还执行性能监控和追踪。在大多数情况下，服务网格充当边车（第 2 章），它将负责处理核心微服务实现中的横切特性。关于
    Istio 的更多细节将在第 9 章中介绍。

    '
- fmt: '# Dropwizard


    `Dropwizard` is a widely used framework for developing microservices in Java.
    It’s well known as a little bit of opinionated glue code, which bangs together
    a set of libraries. `Dropwizard` includes `Jetty` to serve HTTP requests. `Jetty`
    provides a web server and `javax.servlet` container, plus support for HTTP/2,
    WebSockets, OSGi, JMX, JNDI, JAAS, and many other integrations. Support for REST
    and JAX-RS (JSR 311 and JSR 339) in `Dropwizard` is brought in with `Jersey`.
    `Jersey` is the JAX-RS reference implementation. It also integrates `Jackson`
    for JSON parsing and building, and `Logback` for logging. `Logback` is a successor
    to the popular `log4j` project.


    Support for metrics is a key feature in any microservice framework, and `Dropwizard`
    embeds `Metrics` Java library to gather telemetric data related to a running application.
    `Dropwizard` also embeds `Liquibase`, which is an open source database-independent
    library for tracking, managing, and applying database schema changes. It allows
    easier tracking of database changes, especially in an Agile software development
    environment. The database integration with `Dropwizard` is done with `Jdbi` and
    `Hibernate`. `Jdbi` is built on top of JDBC to improve JDBC’s rough interface,
    providing a more natural Java database interface that is easy to bind to your
    domain data types. Unlike an ORM (Object Relational Mapping), it does not aim
    to provide a complete object relational mapping framework—instead of that hidden
    complexity, it provides building blocks to construct the mapping between relations
    and objects as appropriate for your application. `Hibernate` is the most popular
    ORM framework used by Java developers.


    `Dropwizard` has a longer history than `Spring Boot`. In fact, `Spring Boot` was
    motivated by the success of `Dropwizard`. It was first released by `Coda Hale`
    in late 2011 while he was at `Yammer`. However, with better developer experience,
    strong community support, and the backing from `Pivotal`, `Spring Boot` is now
    a better option than `Dropwizard`.


    # Vert.x


    `Vert.x` is toolkit for building reactive applications on the JVM (Java Virtual
    Machine), which supports multiple languages, including Java, JavaScript, Groovy,
    Ruby, Ceylon, Scala, and Kotlin. It started as an open source project under the
    Eclipse Foundation in 2012 by `Tim Fox`. Even before microservices became mainstream,
    `Vert.x` had a powerful stack to build microservices. Unlike `Dropwizard`, `Vert.x`
    is an unopinionated toolkit. In other words, it is not a restrictive framework
    or container, which preaches developers a specific way to write applications.
    Instead, `Vert.x` provides a lot of useful bricks and lets developers create their
    own apps the way they want to.


    Like in `Dropwizard`, `Vert.x` also supports integrating `Metrics`, to gather
    telemetric data related to a running application. Further, it also supports integrating
    with `Hawkular`, which is a set of open source projects designed to be a generic
    solution for common monitoring problems. For service discovery, `Vert.x` integrates
    `HashiCorp Consul`. `Consul` makes it simple for services to register themselves
    and to discover other services via a DNS or HTTP interface. `Vert.x` supports
    integrating with multiple message brokers—for example with `Apache Kafka` and
    `RabbitMQ`—and multiple messaging protocols—for example AMQP, MQTT, JMS, and STOMP.


    Overall `Vert.x` has a powerful ecosystem to build microservices, but yet `Spring
    Boot`, with the strong support from the Spring community, has the edge.


    # Lagom


    `Lagom` is an open source opinionated framework for building microservice systems
    in Java or Scala based on reactive principles. `Lagom` is a Swedish word, which
    means just right or sufficient. It is built on top of the `Akka` and `Play` framework.
    `Akka` is a toolkit for building highly concurrent, distributed, and resilient
    message-driven applications for Java and Scala. `Play` is a high-productivity
    Java and Scala web application framework that integrates the components and APIs
    one needs for modern web application development. In `Lagom`, microservices are
    based on the following:


    *   `Akka Actors`—providing isolation through a shared nothing architecture based
    on the Actor Model

    *   `Akka Cluster`—providing resilience, sharding, replication, scalability, and
    load-balancing of the groups of individual isolated service instances making up
    a microservice

    *   `ConductR`—providing isolation down to the metal and runtime management of
    the microservice instances.


    `Lagom` is based on three design principles: message driven and asynchronous communication,
    distributed persistence, and developer productivity. It makes asynchronous communication
    the default, and the default persistence model is using event sourcing and CQRS
    (discussed in Chapter 10, “APIs, Events, and Streams”)—using `Akka Persistence`
    and `Cassandra`, which is very scalable and easy to replicate and to make fully
    resilient.


    `Lagom` is a promising, but relatively new, framework for microservices.


    # Getting Started with Spring Boot


    In this section, we see how we can develop microservices using `Spring Boot` from
    scratch. We also see how to implement some of the design concepts we learned so
    far, as we go on. To run the examples, you will need Java 8 or latest, Maven 3.2
    or latest, and a Git client. Once you have successfully installed them, run the
    following two commands in the command line to make sure everything is working
    fine. If you’d like some help in setting up Java or Maven, there are plenty of
    online resources out there.


    ```

    >java -version

    java version "1.8.0_121" Java(TM) SE Runtime Environment (build 1.8.0_121-b13)

    Java HotSpot(TM) 64-Bit Server VM (build 25.121-b13, mixed mode)

    >mvn -version

    Apache Maven 3.5.0 (ff8f5e7444045639af65f6095c62210b5713f426; 2017-04-03T12:39:06-07:00)

    Maven home: /usr/local/Cellar/maven/3.5.0/libexec

    Java version: 1.8.0_121, vendor: Oracle Corporation

    Java home: /Library/Java/JavaVirtualMachines/jdk1.8.0_121.jdk/Contents/Home/jre
    Default locale: en_US, platform encoding: UTF-8 OS name: "mac os x", version:
    "10.12.6", arch: "x86_64", family: "mac

    ```


    All the samples used in this book are available at the `https://github.com/microservices-for-enterprise/samples.git`
    Git repository. Use the following `git` command to clone it. All the samples related
    to this chapter are inside the `ch04` directory.


    ```

    > git clone https://github.com/microservices-for-enterprise/samples.git

    > cd samples/ch04

    ```


    For anyone who loves Maven, the best way to get started with a `Spring Boot` project
    would be with a Maven archetype. Unfortunately, it is no longer supported. One
    option we have is to create a template project via `https://start.spring.io/`,
    which is known as the Spring Initializer. There you can pick which type of project
    you want to create, choose project dependencies, give it a name, and download
    a Maven project as a ZIP file. The other option is to use the Spring Tool Suite
    (STS). It’s an IDE (integrated development environment) built on top of the Eclipse
    platform, with many useful plugins to create Spring projects. However, in this
    book, we are going to provide you with all the fully coded samples in the Git
    repository.'
