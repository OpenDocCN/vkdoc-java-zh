    ## 总结


    在本章中，你学习了如何将微服务作为托管 API 进行暴露。API 管理层是微服务消费者的主要入口点，你在此处将业务功能作为 API 暴露。我们讨论了 API
    管理解决方案的关键组件——API 网关、API 商店/开发者门户、API 发布者/生命周期管理器、API 分析/可观测性以及 API 安全解决方案。我们明确了
    API 网关与服务网格代理之间的区别，并讨论了 API 管理与服务网格如何共存。


    事件驱动架构对于实现服务自治非常有用。我们讨论了事件驱动架构的常用模式——事件通知、事件状态传输、事件溯源和 CQRS。大多数事件驱动通信模式都是通过消息队列和发布者-订阅者消息传递基础设施中使用的技术来实现的。


    流是事件驱动架构的一种特殊情况，其中一系列事件随时间被处理。流处理通常使用一种称为流式 SQL 的专用查询语言来完成，而某些解决方案则基于纯编码方法来处理流。


    API、事件和流充当着企业微服务实现的前门。你可以通过将外部系统与内部微服务连接起来，用 API、事件和流来扩展微服务参考架构。


    脚注 1   2   3   4


    # 11. 微服务安全基础


    微服务架构通过多个微服务之间的远程通信扩大了攻击面。我们不再需要担心一两个入口点，而是需要担心成百上千个入口点。安全领域的一个常见原则是，一个系统的强度取决于其最薄弱环节的强度。我们拥有的入口点越多，攻击面就越广，遭受攻击的风险也就越高。与单体应用不同，我们在保护微服务时需要担心的深度和广度要大得多。保护微服务安全涉及多个方面：安全开发生命周期与测试自动化、DevOps
    中的安全性以及应用层安全。


    ### 注意


    2010 年，人们发现自 2006 年以来，一伙配备强力吸尘器的劫匪从法国的 Monoprix 连锁超市偷走了超过 60 万欧元。最有趣的是他们的作案方式。他们找到了系统中最薄弱的环节并对其发起攻击。为了将钱直接转入商店的现金金库，收银员会将装满钱的管子通过气动吸管滑入。劫匪意识到，只需在靠近钱箱的管子上钻一个洞，然后连接一个吸尘器来截取钱款即可。他们无需处理金库的防护盾。


    微服务架构背后的关键驱动力是投产速度（或上市时间）。我们应该能够对某个服务进行更改、测试，并立即将其部署到生产环境中。需要制定适当的、安全的开发生命周期和测试自动化策略，以确保我们不会在代码层面引入安全漏洞。我们需要为静态代码分析和动态测试制定一个合适的计划——最重要的是，这些测试应该成为持续交付（CD）流程的一部分。任何漏洞都应在开发生命周期的早期被发现，并且反馈周期应尽可能短。


    有多种微服务部署模式——但最常用的是每主机单服务模型。这里的“主机”不一定指物理机器——很可能是一个容器（Docker）。DevOps 安全需要关注容器级别的安全。我们如何将一个容器与其他容器隔离？容器与主机操作系统之间又具有何种隔离级别？除了容器之外，Kubernetes
    作为容器编排平台，以 *Pod* 的形式引入了另一层隔离。现在，我们不仅需要保护容器之间的通信安全，还需要保护 Pod 之间的通信安全。在第 8 章“部署和运行微服务”中，我们详细讨论了容器和安全问题。关于微服务部署的另一个重要模式是*服务网格*，我们在第
    9 章“服务网格”中对此进行了详细讨论。在 Kubernetes 中典型的容器化部署中，Pod 之间的通信总是通过服务网格进行的，准确地说，是通过服务网格代理。服务网格代理现在负责在两个微服务之间应用和实施安全策略。


    我们如何对微服务用户进行身份验证和访问控制？如何保护微服务之间的通信信道安全？所有这些都属于应用层安全的范畴。本章涵盖了安全基础知识，并提供了一组模式来解决我们在应用层保护微服务时面临的挑战。保护微服务安全意味着什么？保护微服务安全与保护其他任何服务安全有何不同？微服务有何特殊之处？所有这些问题都将在本章中得到解答。开发阶段以及部署过程（使用
    Docker 和 Kubernetes）中的安全性不在本书的讨论范围之内。我们鼓励那些热衷于了解微服务安全所有方面的读者，去参考一本专门聚焦于微服务安全的书籍。

    '
- fmt: '# Monolith versus Microservices


    In a monolithic application, where all the services are deployed in the same application
    server, the application server itself provides session management features. The
    interactions between services happen over local calls and all the services can
    share the user’s login status. Each service (or the component) needs not to authenticate
    the user independently. Authentication will be done centrally at an interceptor,
    which intercepts all the service calls. Once the authentication is completed,
    it passes the login context of the user between the services (or components) and
    that process varies from one platform to another. Figure [11-1](#461146_1_En_11_Chapter.xhtml#Fig1)
    shows the interactions between multiple components in a monolithic application.
    The monolithic application is deployed in a single application container, probably
    on a bare metal host machine or on a virtual machine.


    ![../images/461146_1_En_11_Chapter/461146_1_En_11_Fig1_HTML.jpg](images/461146_1_En_11_Chapter/461146_1_En_11_Fig1_HTML.jpg)


    Figure 11-1


    Sharing a user session in a monolithic application


    In a Java EE environment, the interceptor can be a servlet filter. This servlet
    filter will intercept all the requests coming to its registered contexts and will
    enforce authentication. The service invoker should either carry valid credentials
    or a session token that can be mapped to a user. Once the servlet filter finds
    the user, it can create a login context and pass it to the downstream components.
    Each downstream component can identify the user from the login context to do any
    authorization.


    Security becomes challenging in a microservices environment. In the microservices
    world, the services are scoped and deployed in multiple containers in a distributed
    setup. The service interactions are no more local, but remote, mostly over HTTP.
    Figure [11-2](#461146_1_En_11_Chapter.xhtml#Fig2) shows the interactions between
    multiple microservices.


    ![../images/461146_1_En_11_Chapter/461146_1_En_11_Fig2_HTML.jpg](images/461146_1_En_11_Chapter/461146_1_En_11_Fig2_HTML.jpg)


    Figure 11-2


    Interactions between multiple microservices


    The challenge here is how we authenticate the user and then pass the login context
    between microservices in a symmetric manner, and then how does each microservice
    authenticate to each other and authorize the user. The following section explains
    the different techniques to secure service-to-service communication in the microservices
    architecture, both for authentication and authorization, and also to propagate
    user context across different microservices.


    # Securing Service-to-Service Communication


    Service-to-service communication can happen synchronously via HTTP or asynchronously
    via event-driven messaging. In Chapter [3](#461146_1_En_3_Chapter.xhtml), “Inter-Service
    Communication,” we discussed both synchronous and asynchronous messaging between
    microservices. There are two common approaches to secure service-to-service communication.
    One is based on JSON Web Token (JWT) and the other is based on Transport Layer
    Security (TLS) mutual authentication. In the following section, we look at the
    role of JWT in securing service-to-service communication in the microservices
    architecture.


    ## JSON Web Token (JWT)


    JWT (JSON Web Token) defines a container to transport data between interested
    parties (see Figure [11-3](#461146_1_En_11_Chapter.xhtml#Fig3)). It became an
    IETF standard in May 2015 with the RFC 7519^([^(143)](#fn143)). A JWT can be used
    to:


    ![../images/461146_1_En_11_Chapter/461146_1_En_11_Fig3_HTML.jpg](images/461146_1_En_11_Chapter/461146_1_En_11_Fig3_HTML.jpg)


    Figure 11-3


    Transporting data between interested parties via a JWT


    * Propagate one’s identity information between interested parties. For example,
    user attributes such as first name, last name, email address, phone number, etc.

    * Propagate one’s entitlements between interested parties. The entitlements define
    what the user is capable of doing at a target system.

    * Transfer data securely between interested parties over an unsecured channel.
    A JWT can be used to transfer signed and/or encrypted messages.

    * Assert one’s identity, given that the recipient of the JWT trusts the asserting
    party (the token issuer). For example, the issuer of a JWT can sign the payload
    with its private key, which makes it protected for integrity, so that no one in
    the middle can alter the message. The recipient can validate the signature of
    the JWT, by verifying it with the corresponding public key of the issuer. If the
    recipient trusts the public key known to it, it also trusts the issuer of the
    JWT.


    A JWT can be signed or encrypted or both. A signed JWT is known as a JWS^([^(144)](#fn144))
    (JSON Web Signature) and an encrypted JWT is known as a JWE^([^(145)](#fn145))
    (JSON Web Encryption). In fact a JWT does not exist itself — either it has to
    be a JWS or a JWE. It’s like an abstract class — the JWS and JWE are the concrete
    implementations. Let me be little precise here. JWS and JWE have a broader meaning
    beyond JWT. JWS defines how to serialize (or represent) any signed message payload;
    it can be JSON, XML, or can be in any format. In the same way, JWE defines how
    to serialize an encrypted payload. Both JWS and JWE support two types of serializations:
    *compact serialization* and *JSON serialization*. We call a JWS or JWE, a JWT
    only if it follows the compact serialization. Any JWT must follow compact serialization.
    In other words a JWS or JWE token, which follows JSON serialization, cannot be
    called a JWT.'
