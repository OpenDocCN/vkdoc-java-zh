    event-based communication.'
  trans: '

    ### 提示


    我们能否在 Kafka 中实现精确一次投递？有一篇有趣的文章^(³³)介绍了如何利用 Kafka 实现精确一次投递。其核心概念大多源于本章讨论的关键 Kafka
    原理，你可以轻松地在微服务中构建同等水平的投递保障。


    我们仅讨论了 Kafka 在构建多接收者异步消息场景中实用的部分功能，还有大量技术细节不在本书的讨论范围内。


    还有其他一些消息代理，例如 ActiveMQ 和 RabbitMQ，它们也能为简单到中等规模的异步消息场景提供相同的发布-订阅消息能力。然而，如果你需要一个完全分布式且可扩展的异步消息基础设施，那么
    Kafka 是一个不错的选择。有许多基于 Kafka 构建的异步消息和事件流处理解决方案，例如 Confluent 开源平台，它们可能为你的微服务实现提供一些额外的功能。


    #### 其他异步通信协议


    还有不少我们未讨论的异步消息协议。MQTT^(³⁴)、STOMP^(³⁵) 和 CoAP^(³⁶) 也相当流行。如果你认为具备相关专业知识，并且其中某个协议是微服务消息传递的最佳技术选择，那么尽管使用它。我们不会详细讨论这些协议，因为它们不具备在微服务上下文中重要的显式特性。


    ## 同步通信与异步通信


    至此，你应该对同步和异步消息传递技术有了扎实的理解。了解在微服务架构实现中何时使用这些通信风格至关重要。


    同步通信与异步通信的主要区别在于，有些场景下无法在客户端和服务器之间保持连接。在这些场景中，持久的单向通信更为实用。同步通信更适合需要构建提供请求-响应式交互的服务场景。如果消息是事件驱动的，并且客户端不期望立即得到响应，那么异步通信更为合适。


    然而，在许多书籍和文章中，都强调同步通信是邪恶的，我们应该只为微服务使用异步通信，因为它能实现服务自治。在很多情况下，同步与异步通信的比较被解读为：在同步通信中，给定线程会被阻塞，直到等待到响应。这完全是错误的，因为大多数同步消息实现都基于完全非阻塞的消息架构。（也就是说，客户端发送方发送请求并注册一个回调，然后线程被释放。当收到响应时，将其与原始请求关联并处理响应。）


    所以，回到这些通信风格的务实使用上，我们需要根据具体用例来选择通信风格。


    在需要客户端和服务以请求-响应方式进行短时交互的场景中，同步通信是必需的。例如，在我们的在线零售用例中，产品搜索服务采用同步通信方式，因为你希望提交搜索查询并立即看到搜索结果。而订单提交或处理等场景本质上是异步的。因此，异步消息风格最适合此类场景。


    ### 提示


    在微服务之间只采用同步（例如 REST）或只采用异步消息传递，完全是一种误解。当将微服务应用于企业场景时，你可能需要混合或结合使用这两种通信风格。


    ## 消息格式/类型


    我们已经讨论了微服务架构中常用的几种通信风格和协议。微服务之间的信息交换基于消息的传递。确定在这些场景中使用哪种消息格式非常重要。


    ### JSON 和 XML


    在大多数基于 REST 的微服务实现中，JSON 是事实上的消息交换格式，这得益于其简洁性、可读性和性能。然而，也有一些基于 XML（而非 SOAP）的服务。但是，它们缺乏一些重要特性，例如健壮的类型处理和模式版本之间的兼容性。在大多数将服务暴露给外部消费者的场景中，我们大量使用
    JSON 作为消息类型，而 XML 的使用则局限于特定的用例。作为服务开发的一部分，服务必须处理传入的 JSON 或 XML 消息，并将其映射到服务代码中使用的类型。


    ### Protocol Buffers


    对于 gRPC 这样的通信风格，消息格式是明确定义的，并使用专用的数据交换格式，例如 protocol buffers。服务开发者无需担心以特定消息格式处理消息。在编组和解组过程中，所有必要的类型映射都会完成，用户只需处理定义明确的类型。由于数据序列化和反序列化机制灵活、高效且自动化，protocol
    buffers 非常适合内部服务之间的高吞吐量同步消息传递。目前，protocol buffers 在微服务通信中的应用主要通过基于 gRPC 的服务来实现。


    ### Avro


    Apache Avro^(³⁷) 解决了大多数传统数据交换格式（如 JSON 和 XML）的关键局限性。Avro 是一个数据序列化系统，它为数据表示提供了丰富的数据结构、紧凑的格式、对多种编程语言的优秀绑定、与
    JSON 的直接映射，以及用纯 JSON 定义的可扩展模式语言。


    因此，Avro 在微服务实现中的大多数异步消息场景中得到了广泛应用。例如，大多数基于 Kafka 的消息系统都利用 Avro 来定义生产和消费消息的模式。


    ## 服务定义与契约


    当你将业务能力实现为服务时，需要定义并发布服务契约。在传统的单体应用中，我们很少有这种定义应用业务能力的特性。在 SOA/Web 服务领域，WSDL 用于定义服务契约，但众所周知，WSDL
    并非定义微服务契约的理想解决方案，因为它极其复杂且与 SOAP 紧密耦合。


    由于我们在 REST 架构风格之上构建微服务，我们可以使用相同的 REST API 定义技术来定义微服务的契约。因此，微服务使用标准的 REST API 定义语言（例如
    OpenAPIs^(³⁸)）来定义服务契约。对于不适合基于资源架构的服务，我们可以利用 GraphQL 模式。


    正如你在 gRPC 部分所见，服务的 protocol buffer 定义就是基于 gRPC 的服务定义和契约（这同样适用于其他 RPC 风格，如 Thrift）。服务定义适用于同步通信；目前还没有标准的方法来为基于异步事件的服务定义契约。

    '
- fmt: '# Summary


    In this chapter, we discussed the inter-service communication patterns and protocols
    that are used to implement those patterns in a microservices context. We took
    a closer look at the fundamentals of `REST` and `gRPC`, which are most commonly
    used in synchronous messaging between microservices. As asynchronous messaging
    styles, we learned about the `AMQP` protocol, which is a common choice for single
    consumer/point-to-point asynchronous messaging with reliability. For publisher-subscriber/multiple
    receiver type communication, `Kafka` is commonly used as the messaging infrastructure.


    However, we haven’t discussed the details of how we can implement service interactions,
    compositions, orchestration, or choreography. Chapter [7](#461146_1_En_7_Chapter.xhtml)
    is dedicated to those topics and further discusses the commodity features of service
    interactions, such as resilient communication with circuit breakers, timeouts,
    etc. In addition, we have dedicated chapters on service governance (Chapter [6](#461146_1_En_6_Chapter.xhtml))
    and service definitions and APIs (Chapter [10](#461146_1_En_10_Chapter.xhtml),
    “APIs, Events, and Streams”).


    Footnotes [1](#461146_1_En_3_Chapter.xhtml#Fn1_source) [2](#461146_1_En_3_Chapter.xhtml#Fn2_source)
