    # 6. 微服务治理


    微服务架构本质上需要处理数十、数百甚至数千个服务。当你在这种规模下运行时，需要建立一些治理流程。然而，使用严格的集中式治理流程会阻碍微服务架构的自主性。因此，我们需要重新思考微服务治理的策略。


    在本章中，我们将梳理微服务治理的需求，并深入探讨其中的几个关键方面，例如*服务注册*和*治理*。其余治理主题将在后续章节中介绍。


    ## 为什么需要微服务治理？


    面向服务架构（SOA）治理曾是 SOA 成功运营的关键驱动力之一，它促进了组织中不同实体（开发团队、服务消费者等）之间的协作与协调。尽管它作为 SOA 治理的一部分定义了一套全面的理论概念，但实践中只有少数概念被积极使用。


    当我们转向微服务架构时，大多数有用的治理概念也被摒弃了。微服务中的治理概念仅被解释^(⁸⁹)为一个去中心化的流程，它赋予每个团队/实体按照自己偏好的方式治理自身领域的自由。去中心化治理适用于服务开发、部署和执行流程，但其内涵远不止于此。让我们更仔细地审视微服务治理的各个方面，看看如何在实践中实现它们。


    ## 微服务治理的各个方面


    微服务治理包含多种协同实践，以实现真实世界的场景。这些概念大多并非新事物，而是我们在 SOA 治理中成功使用过的。它们在微服务架构下同样适用。


    ### 服务定义


    我们开发的任何微服务都必须包含足够的信息，以唯一标识自身、其功能以及消费者应如何消费它。因此，必须有一种机制来指定服务定义，并且该定义应随时可供服务消费者使用。


    有几种技术（在第 3 章“服务间通信”中讨论过）——例如 OpenAPI (Swagger)、GrahQL 模式、gRPC 和协议缓冲区——可以定义服务接口。这些技术允许你定义服务标识符、服务接口（即可用的服务功能）和服务消息模型（服务请求和响应的模式或消息格式）。其他服务元数据，例如服务所有权和服务级别协议（SLA），也可以成为服务定义的一部分。


    服务定义通常存储在中央存储库中，消费者可以访问，服务所有者可以发布。


    ### 服务注册与发现


    服务注册中心是存储服务定义的地方，服务提供者可以在此处使其服务可用并为消费者所知。服务消费者使用服务注册中心来定位他们想要调用的服务。服务元数据（属于服务定义的一部分，例如服务
    URL、消息模型、支持的功能等）可以通过服务注册中心检索。


    服务注册中心定义了一个用于发布和访问服务定义的 API。当创建或更新服务时，服务所有者应将服务定义发布到服务注册中心，消费者可以在运行时使用服务发现机制来发现服务。在本章后面，我们将更深入地了解微服务架构中最常用的服务注册中心和发现机制。

    '
- fmt: '### Service Lifecycle Management


    Microservices have different lifecycle stages, which include `planning`, `designing`,
    `implementing`, `deploying`, `maintaining`, and `decommissioning`. Given the decentralized
    nature of microservices, often these tasks are owned by the team who owns each
    microservice. In most practical scenarios, it is common to have uniform lifecycle
    stages for your microservices irrespective of the business scope and the technologies
    that you use to develop them. The service lifecycle management techniques are
    centrally applied to your microservices architecture. This includes the deployment
    lifecycle management, how to version your services, etc. Most of these capabilities
    are implemented as part of API management or control planes in the service mesh.
    We discuss them in detail in Chapter [9](#461146_1_En_9_Chapter.xhtml), “Service
    Mesh,” and Chapter [10](#461146_1_En_10_Chapter.xhtml), “APIs, Events, and Streams”.


    ### Quality of Service (QoS)


    There are several Quality of Services (QoS) aspects that you need to consider
    prior to exposing a service to your consumers. The service may be exposed as a
    secured service, which leverages various security protocols and standards (starting
    from transport layer security, access tokens, etc.). Also you may control access
    to the service using rate-limiting and throttling. Caching and incorporating various
    hooks into monitoring and monetization are some other prominent QoS features.
    Most of these requirements are directly related to the governance of your microservices
    and often centrally controlled.


    We cover the microservices security fundamentals and use cases in detail in Chapter
    [11](#461146_1_En_11_Chapter.xhtml), “Microservice Security Fundamentals,” and
    Chapter [12](#461146_1_En_12_Chapter.xhtml), “Securing Microservices”.


    ### Service Observability


    When your application interacts with multiple microservices, it is vital to have
    metrics, tracing, logging, visualization, and alerting capabilities for all your
    services, so that you will have a clear picture of their interactions and be able
    to troubleshoot when something goes wrong. All these requirements are consolidated
    under one concept, called `observability`.


    With a microservices architecture, it is likely to have hundreds or thousands
    of services communicating with each other. The ability to get service metrics,
    trace messages and service interactions, get service logs, understanding runtime
    dependencies of services, troubleshoot in the event of a failure, and set alerting
    for anomalies can all be considered under the umbrella of `observability`.


    Most of the observability tools operate as a centralized entity in which all services
    can push the required data, which are useful for metrics, tracing, logging, visualization,
    etc. It’s up to the observability tools to analyze the data and process them so
    that they can derive the required observability related information. We discuss
    all the technologies and tools that are used for microservices observability in
    Chapter [13](#461146_1_En_13_Chapter.xhtml), “Observability”.


    With that, we have discussed most of the key aspects of microservices governance.
    Now it’s time to take a look at how those concepts can be implemented in practice.


    ## Implementing Microservice Governance


    Microservice governance aspects, which we discussed in the previous sections,
    are implemented under four key categories (see Figure [6-1](#461146_1_En_6_Chapter.xhtml#Fig1)).
    While the design, development, and deployment of microservices are not centrally
    governed, these aspects are implemented as centralized and scalable entities.


    ![../images/461146_1_En_6_Chapter/461146_1_En_6_Fig1_HTML.jpg](images/461146_1_En_6_Chapter/461146_1_En_6_Fig1_HTML.jpg)


    Figure 6-1


    Key components for the realization of microservices governance


    Let’s revisit the governance aspects that we discussed in the previous sections
    and see how and where they are implemented with respect to these components.


    ### Service Registry and Discovery


    If we consider service definitions, the definition of service identifiers, message
    models, interfaces, etc., are the things that you can do without centralized governance.
    However, these service definitions must be published into a centralized service
    registry. The service registry is a centralized component, which will also define
    a canonical model to describe a service. All the service owners should publish
    their service definitions in that canonical form to the service registry. Even
    the services are implemented with drastically different technologies (e.g., `OpenAPI`
    vs `gRPC`), you can still find a common metadata for such services and add them
    to the service registry.


    The service registry also comes with a service discovery protocol (or API), which
    can be used to retrieve service information during runtime. (We will discuss service
    registry and discovery in detail in the next section.)


    ### Development Lifecycle Management


    Service lifecycle management is often implemented at the service deployment level.
    For example, when a given service has to be deployed across multiple environments,
    the deployment process will address those requirements of replicating or moving
    the same service code across those environments. This also includes various DevOps-related
    deployment methodologies (blue-green, canary, AB testing, etc.) and describes
    how to manage different environments such as development (dev), test, quality
    assurance (QA), staging, production (prod), and so on.


    ### API Management/API Gateway


    API management plays a key role in the realization of several microservices governance
    aspects. As discussed in Chapter [1](#461146_1_En_1_Chapter.xhtml), “The Case
    for Microservices,” the API management layer or API gateway is used to expose
    your microservices to your consumers as `managed` APIs. This includes all the
    quality of service aspects that we discussed in the previous sections as well
    as several other API management specific details, such as monetization. As part
    of API management, we can apply security, service versioning, throttling, caching,
    monetization, etc. for services during the runtime. It’s important to understand
    that most of these capabilities have to be applied centrally for service invocations.
    Therefore, API gateways are centrally governed or managed and application of those
    capabilities can be either centralized or decentralized. Also, API gateways can
    be used for external or internal consumers. These capabilities can be equally
    applicable when microservices talk to each other via an internal API gateway.


    API management solutions often work hand-in-hand with service registries to discover
    services as well as to use them as the API repository (i.e., the information related
    to APIs can be also published and discovered via a service registry). This is
    also quite useful when we use existing services and create new APIs out of them.


    One other important aspect is that API management solutions provide a rich capability
    to discover and consume APIs. So, it is possible to leverage API management to
    manage all your microservices (rather than selecting the service that you want
    to expose externally).


    We’ll defer the detailed discussion on these topics to Chapter [10](#461146_1_En_10_Chapter.xhtml),
    “APIs, Events, and Streams”.'
