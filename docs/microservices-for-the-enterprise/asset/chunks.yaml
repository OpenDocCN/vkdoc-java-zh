- fmt: '### Akka


    `Akka`是一组开源库，用于设计跨处理器核心和网络的可扩展、弹性系统。`Akka`完全基于Actor模型，这是一种并发计算的数学模型，将`actors`视为并发计算的通用原语。在接收到消息时，actor可以做出本地决策、创建更多actor、发送更多消息，并决定如何响应下一条接收到的消息。Actor可以修改自己的私有状态，但只能通过消息相互影响；这避免了对任何锁的需求。


    `Akka`旨在为您的微服务提供多线程行为，而无需使用像原子操作或锁这样的低级并发结构——使您无需考虑内存可见性问题，提供系统及其组件之间的透明远程通信，以及一个集群化、高可用性的架构，该架构具有弹性，可按需伸缩。


    您可以利用`Akka HTTP`模块来实现基于HTTP的服务，它在`Akka-actor`和`Akka-stream`之上提供了一个完整的服务器端和客户端HTTP栈。它不是一个Web框架，而是一个更通用的工具包，用于提供和使用基于HTTP的服务。


    在`Akka HTTP`之上，`Akka`提供了一个DSL来描述HTTP`routes`以及它们应如何处理。每个路由由一个或多个级别的指令组成，这些指令将范围缩小到处理一种特定类型的请求。


    例如，一个路由可能首先匹配请求的路径，仅当找到与`/order`的匹配时，然后将其范围缩小到仅处理HTTP`GET`请求，最后用一个字符串字面量完成这些请求，该字符串将作为HTTP`OK`响应，并以字符串作为响应体发送回去。使用Route
    DSL创建的`route`随后绑定到一个端口以开始服务HTTP请求。通过使用`Jackson`，可以在`Akka-http`中实现JSON支持。


    在以下用例中，我们有两个独立的`Akka`路由。第一个路由查询一个异步数据库，并将`CompletionStage<Optional<Item>>`结果编组为JSON响应。第二个路由从传入请求中解组一个`Order`，将其保存到数据库，并在完成时回复一个`OK`。（您可以从我们的示例`ch07/sample13`中尝试此示例。）


    ```

    public class JacksonExampleTest extends AllDirectives {

    public static void main(String[] args) throws Exception {

    ActorSystem system = ActorSystem.create("routes");

    final Http http = Http.get(system);

    final ActorMaterializer materializer = ActorMaterializer.create(system);

    JacksonExampleTest app = new JacksonExampleTest();

    final Flow routeFlow = app.createRoute().flow(system, materializer);

    final CompletionStage binding = http.bindAndHandle(routeFlow,

    ConnectHttp.toHost("localhost", 8080), materializer);

    binding

    .thenCompose(ServerBinding::unbind) // trigger unbinding from the port

    .thenAccept(unbound -> system.terminate()); // and shutdown when done

    }

    private CompletionStage> fetchItem(long itemId) {

    return CompletableFuture.completedFuture(Optional.of(new Item("foo", itemId)));

    }

    private CompletionStage saveOrder(final Order order) {

    return CompletableFuture.completedFuture(Done.getInstance());

    }

    private Route createRoute() {

    return route(

    get(() ->

    pathPrefix("item", () ->

    path(longSegment(), (Long id) -> {

    final CompletionStage> futureMaybeItem = fetchItem(id);

    return onSuccess(futureMaybeItem, maybeItem ->

    maybeItem.map(item -> completeOK(item, Jackson.marshaller()))

    .orElseGet(() -> complete(StatusCodes.NOT_FOUND, "Not Found"))

    );

    }))),

    post(() ->

    path("create-order", () ->

    entity(Jackson.unmarshaller(Order.class), order -> {

    CompletionStage futureSaved = saveOrder(order);

    return onSuccess(futureSaved, done ->

    complete("order created")

    );

    })))

    );

    }

    }

    ```


    `Akka`通过`Alpakka`计划满足微服务和其他集成类型的特定集成需求。`Alpakka`支持基于`Akka`的各种`Akka Streams`连接器、集成模式和数据转换的集成用例。`Alpakka`提供了众多连接器，例如`HTTP`、`Kafka`、`File`、`AMQP`、`JMS`、`CSV`、Web
    API（`AWS S3`、`GCP pub-sub`和`Slack`）、`MongoDB`等。


    在以下示例中，您可以找到一个使用`Alpakka`编写的AMQP生产者和消费者示例。（您可以从我们的示例`ch07/sample14`中尝试此示例。）


    ```

    // AMQP Producer

    final Sink> amqpSink = AmqpSink.createSimple(

    AmqpSinkSettings.create(connectionProvider)

    .withRoutingKey(queueName)

    .withDeclarations(queueDeclaration)

    );

    // AMQP Consumer

    final Integer bufferSize = 10;

    final Source amqpSource = AmqpSource.atMostOnceSource(

    NamedQueueSourceSettings.create(

    connectionProvider,

    queueName

    ).withDeclarations(queueDeclaration),

    bufferSize

    );

    ```


    这里，`AmqpSink`是一个工厂方法的集合，这些方法有助于创建sink和source，允许您从AMQP获取消息。


    ### Node、Go、Rust 和 Python


    `Node.js`是一个开源、跨平台的JavaScript运行时环境，用于在服务器端执行JavaScript代码。`Node.js`开箱即用地支持构建RESTful服务，您可以基于完全非阻塞的I/O模型构建服务，该模型利用了事件循环。（当`Node.js`启动时，它会初始化事件循环，处理提供的输入脚本——该脚本可能会进行异步API调用、调度定时器或调用`process.nextTick()`——然后开始处理事件循环。）


    以下代码展示了一个使用`Node.js`构建的简单`Echo`服务。（您可以从我们的示例`ch07/sample15`中尝试此示例。）


    ```

    const http = require(''http'');

    http.createServer((request, response) => {

    if (request.method === ''POST'' && request.url === ''/echo'') {

    let body = [];

    request.on(''data'', (chunk) => {

    body.push(chunk);

    }).on(''end'', () => {

    body = Buffer.concat(body).toString();

    response.end(body);

    });

    } else {

    response.statusCode = 404;

    response.end();

    }

    }).listen(8080);

    ```


    除了标准功能集之外，`Node.js`拥有多样化的生态系统，允许您将基于`Node.js`的微服务与几乎所有其他网络协议、数据库、Web API和其他系统集成。


    `Node.js`之上构建了多个框架，例如`Restify`，这是一个为构建语义正确的RESTful Web服务而优化的Web服务框架，可大规模投入生产使用。同样，`NPM`（`NPM`是`Node.js`包的包管理器）上有大量可用于`Node.js`的库和包。例如，您可以找到用于Kafka集成的NPM包（`kafka-node`）、AMQP（`node-amqp`）、断路器以及大多数流行可观测性工具的检测库。


    `Go`^([(99)](#fn99))也常用于微服务开发，并提供了丰富的网络通信包。


    类似地，其他编程语言，如`Rust`和`Python`，提供了相当多的开箱即用功能来构建微服务和集成微服务。对于`Rust`，我们有`Rocket`，这是一个Web框架，可以轻松编写快速的Web应用程序，而不会牺牲灵活性或类型安全性。`Rust`生态系统组件解决了`Rust`应用程序与其他网络协议、数据、Web
    API和其他系统的大部分集成问题。然而，一些开发者声称`Rust`对于微服务开发来说过于底层。因此，我们建议您在完全采用它之前，先用一些用例尝试一下。


    同样，`Python`拥有广泛的社区和可用于生产的框架，例如`Flask`，用于微服务开发和集成。'
  raw: '### Akka


    Akka is a set of open source libraries for designing scalable, resilient systems
    that span processor cores and networks. Akka is fully based on the actor model,
    which is a mathematical model of concurrent computation that treats *actors* as
    the universal primitives of concurrent computation. In response to a message that
    it receives, an actor can make local decisions, create more actors, send more
    messages, and determine how to respond to the next message received. Actors may
    modify their own private state but can only affect each other through messages;
    it avoids the need for any locks.


    Akka aims to provide your microservices a multi-threaded behavior without the
    use of low-level concurrency constructs like atomics or locks—relieving you from
    even thinking about memory visibility issues, a transparent remote communication
    between systems and their components, and a clustered, high-availability architecture
    that is elastic and scales in or out on demand.


    You can leverage the Akka HTTP modules to implement HTTP-based services, and it
    provides a full server and client-side HTTP stack on top of Akka-actor and Akka-stream.
    It’s not a web-framework but rather a more general toolkit for providing and consuming
    HTTP-based services.


    On top of the Akka HTTP, Akka provides a DSL to describe HTTP *routes* and how
    they should be handled. Each route is composed of one or more levels of directives
    that narrow down to handling one specific type of request.


    For example, one route might start by matching the path of the request only if
    it finds a match to `/order`, then narrowing it down only to handle HTTP `GET`
    requests and then complete those with a string literal, which will be sent back
    as an HTTP `OK` with a string as the response body. The *route* created using
    the Route DSL is then bound to a port to start serving HTTP requests. JSON support
    is possible in Akka-http by using Jackson.


    In the following use case, we have two separate Akka routes. The first route queries
    an asynchronous database and marshals the `CompletionStage<Optional<Item>>` result
    into a JSON response. The second unmarshalls an `Order` from the incoming request,
    saves it to the database, and replies with an `OK` when done. (You can try this
    example from our examples in `ch07/sample13`.)


    ```

    public class JacksonExampleTest extends AllDirectives {

    public static void main(String[] args) throws Exception {

    ActorSystem system = ActorSystem.create("routes");

    final Http http = Http.get(system);

    final ActorMaterializer materializer = ActorMaterializer.create(system);

    JacksonExampleTest app = new JacksonExampleTest();

    final Flow routeFlow = app.createRoute().flow(system, materializer);

    final CompletionStage binding = http.bindAndHandle(routeFlow,

    ConnectHttp.toHost("localhost", 8080), materializer);

    binding

    .thenCompose(ServerBinding::unbind) // trigger unbinding from the port

    .thenAccept(unbound -> system.terminate()); // and shutdown when done

    }

    private CompletionStage> fetchItem(long itemId) {

    return CompletableFuture.completedFuture(Optional.of(new Item("foo", itemId)));

    }

    private CompletionStage saveOrder(final Order order) {

    return CompletableFuture.completedFuture(Done.getInstance());

    }

    private Route createRoute() {

    return route(

    get(() ->

    pathPrefix("item", () ->

    path(longSegment(), (Long id) -> {

    final CompletionStage> futureMaybeItem = fetchItem(id);

    return onSuccess(futureMaybeItem, maybeItem ->

    maybeItem.map(item -> completeOK(item, Jackson.marshaller()))

    .orElseGet(() -> complete(StatusCodes.NOT_FOUND, "Not Found"))

    );

    }))),

    post(() ->

    path("create-order", () ->

    entity(Jackson.unmarshaller(Order.class), order -> {

    CompletionStage futureSaved = saveOrder(order);

    return onSuccess(futureSaved, done ->

    complete("order created")

    );

    })))

    );

    }

    }

    ```


    Akka caters to the specific integration requirements of microservices and other
    types of integrations via Alpakka initiative. Alpakka enables Akka-based integration
    of various Akka Streams connectors, integration patterns, and data transformations
    for integration use cases. Alpakka provides numerous connectors, such as HTTP,
    Kafka, File, AMQP, JMS, CSV, web APIs (AWS S3, GCP pub-sub, and Slack), MongoDB,
    etc.


    In the following example, you can find a sample AMQP producer and consumer written
    using Alpakka . (You can try this example from our examples in `ch07/sample14`.)


    ```

    // AMQP Producer

    final Sink> amqpSink = AmqpSink.createSimple(

    AmqpSinkSettings.create(connectionProvider)

    .withRoutingKey(queueName)

    .withDeclarations(queueDeclaration)

    );

    // AMQP Consumer

    final Integer bufferSize = 10;

    final Source amqpSource = AmqpSource.atMostOnceSource(

    NamedQueueSourceSettings.create(

    connectionProvider,

    queueName

    ).withDeclarations(queueDeclaration),

    bufferSize

    );

    ```


    Here, AmqpSink is a collection of factory methods that facilitates creation of
    sinks and sources allowing you to fetch messages from AMQP.


    ### Node, Go, Rust, and Python


    Node.js is an open source, cross-platform JavaScript runtime environment that
    executes JavaScript code server-side. Node.js supports building RESTful services
    out-of-the-box and you can build your service on a full non-blocking I/O model,
    which leverages the event loop. (When Node.js starts, it initializes the event
    loop, processes the provided input script—which may make async API calls, schedules
    timers, or calls `process.nextTick()`—and then begins processing the event loop.)


    The following code shows a simple `Echo` service built with Node.js. (You can
    try this example from our examples in `ch07/sample15`.)


    ```

    const http = require(''http'');

    http.createServer((request, response) => {

    if (request.method === ''POST'' && request.url === ''/echo'') {

    let body = [];

    request.on(''data'', (chunk) => {

    body.push(chunk);

    }).on(''end'', () => {

    body = Buffer.concat(body).toString();

    response.end(body);

    });

    } else {

    response.statusCode = 404;

    response.end();

    }

    }).listen(8080);

    ```


    In addition to the standard set of features, Node.js has a diverse ecosystem that
    allows you to integrate a microservice based on Node.js with almost any of the
    other network protocols, databases, web APIs, and other systems.


    There are multiple frameworks built on top of Node.js, such as Restify, which
    is a web services framework optimized for building semantically correct RESTful
    web services ready for production use at scale. Similarly, there are numerous
    libraries and packages available for Node.js on NPM (NPM is a package manager
    for Node.js packages.). For example, you can find NPM packages for Kafka integration
    (kafka-node), AMQP (node-amqp), circuit breaker, and instrumentation libraries
    for most of the popular observability tools.


    Go^([^(99)](#fn99)) is also quite commonly used for microservices development
    and offers a rich set of packages for network communication.


    Similarly, other programing languages, such as Rust and Python, offer quite a
    few out-of-the-box capabilities to build microservices and integrate microservices.
    For Rust, we have Rocket, a web framework that makes it simple to write fast web
    applications without sacrificing flexibility or type safety. The Rust ecosystem
    components address most of the integration of Rust applications with other network
    protocols, data, web APIs, and other systems. However, some developers claim that
    Rust is too low level to be a microservices development lanauge. So, we recommend
    you to give it a try with some use cases prior to fully adopting it.


    Similarly, Python has a broad community of production ready frameworks, such as
    Flask, for microservice development and integration.'
  trans: '

    ### Akka


    Akka 是一组用于设计跨处理器核心和网络的可扩展、弹性系统的开源库。Akka 完全基于 Actor 模型，这是一种并发计算的数学模型，将*Actor*视为并发计算的通用原语。Actor
    在接收到消息后，可以做出本地决策、创建更多 Actor、发送更多消息，并决定如何响应下一条接收到的消息。Actor 可以修改自身的私有状态，但只能通过消息相互影响；这避免了对任何锁的需求。


    Akka 旨在为你的微服务提供多线程行为，而无需使用诸如原子操作或锁之类的底层并发结构——让你无需考虑内存可见性问题，实现系统及其组件之间的透明远程通信，以及一个集群化、高可用性的架构，该架构具有弹性，可按需伸缩。


    你可以利用 Akka HTTP 模块来实现基于 HTTP 的服务，它在 Akka-actor 和 Akka-stream 之上提供了一个完整的服务器端和客户端
    HTTP 栈。它不是一个 Web 框架，而是一个更通用的工具包，用于提供和使用基于 HTTP 的服务。


    在 Akka HTTP 之上，Akka 提供了一种 DSL 来描述 HTTP *路由*及其处理方式。每条路由由一个或多个级别的指令组成，这些指令将范围缩小到处理一种特定类型的请求。


    例如，一条路由可能首先匹配请求的路径，仅当找到与 `/order` 的匹配时，然后将其范围缩小到仅处理 HTTP `GET` 请求，最后用一个字符串字面量完成这些请求，该字符串将作为
    HTTP `OK` 响应，并以字符串作为响应体发送回去。使用 Route DSL 创建的*路由*随后绑定到一个端口以开始服务 HTTP 请求。通过使用 Jackson，Akka-http
    可以支持 JSON。


    在以下用例中，我们有两条独立的 Akka 路由。第一条路由查询一个异步数据库，并将 `CompletionStage<Optional<Item>>` 结果编组为
    JSON 响应。第二条路由将传入请求中的 `Order` 解组，将其保存到数据库，并在完成后回复 `OK`。（你可以从我们的示例 `ch07/sample13`
    中尝试此示例。）


    ```

    public class JacksonExampleTest extends AllDirectives {

    public static void main(String[] args) throws Exception {

    ActorSystem system = ActorSystem.create("routes");

    final Http http = Http.get(system);

    final ActorMaterializer materializer = ActorMaterializer.create(system);

    JacksonExampleTest app = new JacksonExampleTest();

    final Flow routeFlow = app.createRoute().flow(system, materializer);

    final CompletionStage binding = http.bindAndHandle(routeFlow,

    ConnectHttp.toHost("localhost", 8080), materializer);

    binding

    .thenCompose(ServerBinding::unbind) // 触发从端口解绑

    .thenAccept(unbound -> system.terminate()); // 然后关闭系统

    }

    private CompletionStage> fetchItem(long itemId) {

    return CompletableFuture.completedFuture(Optional.of(new Item("foo", itemId)));

    }

    private CompletionStage saveOrder(final Order order) {

    return CompletableFuture.completedFuture(Done.getInstance());

    }

    private Route createRoute() {

    return route(

    get(() ->

    pathPrefix("item", () ->

    path(longSegment(), (Long id) -> {

    final CompletionStage> futureMaybeItem = fetchItem(id);

    return onSuccess(futureMaybeItem, maybeItem ->

    maybeItem.map(item -> completeOK(item, Jackson.marshaller()))

    .orElseGet(() -> complete(StatusCodes.NOT_FOUND, "Not Found"))

    );

    }))),

    post(() ->

    path("create-order", () ->

    entity(Jackson.unmarshaller(Order.class), order -> {

    CompletionStage futureSaved = saveOrder(order);

    return onSuccess(futureSaved, done ->

    complete("order created")

    );

    })))

    );

    }

    }

    ```


    Akka 通过 Alpakka 计划满足微服务和其他类型集成的特定需求。Alpakka 实现了基于 Akka 的各种 Akka Streams 连接器、集成模式和数据转换的集成，用于集成用例。Alpakka
    提供了众多连接器，例如 HTTP、Kafka、File、AMQP、JMS、CSV、Web API（AWS S3、GCP pub-sub 和 Slack）、MongoDB
    等。


    在以下示例中，你可以找到一个使用 Alpakka 编写的 AMQP 生产者和消费者示例。（你可以从我们的示例 `ch07/sample14` 中尝试此示例。）


    ```

    // AMQP 生产者

    final Sink> amqpSink = AmqpSink.createSimple(

    AmqpSinkSettings.create(connectionProvider)

    .withRoutingKey(queueName)

    .withDeclarations(queueDeclaration)

    );

    // AMQP 消费者

    final Integer bufferSize = 10;

    final Source amqpSource = AmqpSource.atMostOnceSource(

    NamedQueueSourceSettings.create(

    connectionProvider,

    queueName

    ).withDeclarations(queueDeclaration),

    bufferSize

    );

    ```


    这里，AmqpSink 是一个工厂方法的集合，有助于创建 Sink 和 Source，使你能够从 AMQP 获取消息。


    ### Node、Go、Rust 和 Python


    Node.js 是一个开源、跨平台的 JavaScript 运行时环境，用于在服务器端执行 JavaScript 代码。Node.js 开箱即用地支持构建
    RESTful 服务，你可以基于完全非阻塞的 I/O 模型构建服务，该模型利用了事件循环。（当 Node.js 启动时，它会初始化事件循环，处理提供的输入脚本——该脚本可能会进行异步
    API 调用、调度定时器或调用 `process.nextTick()`——然后开始处理事件循环。）


    以下代码展示了一个使用 Node.js 构建的简单 `Echo` 服务。（你可以从我们的示例 `ch07/sample15` 中尝试此示例。）


    ```

    const http = require(''http'');

    http.createServer((request, response) => {

    if (request.method === ''POST'' && request.url === ''/echo'') {

    let body = [];

    request.on(''data'', (chunk) => {

    body.push(chunk);

    }).on(''end'', () => {

    body = Buffer.concat(body).toString();

    response.end(body);

    });

    } else {

    response.statusCode = 404;

    response.end();

    }

    }).listen(8080);

    ```


    除了标准功能集之外，Node.js 还拥有多样化的生态系统，允许你将基于 Node.js 的微服务与几乎所有其他网络协议、数据库、Web API 和其他系统集成。


    Node.js 之上构建了多个框架，例如 Restify，这是一个 Web 服务框架，专为构建语义正确的 RESTful Web 服务而优化，可用于大规模生产环境。同样，NPM（NPM
    是 Node.js 包的包管理器）上有大量可用于 Node.js 的库和包。例如，你可以找到用于 Kafka 集成（kafka-node）、AMQP（node-amqp）、断路器以及大多数流行可观测性工具的检测库的
    NPM 包。


    Go^(⁹⁹) 也常用于微服务开发，并提供了丰富的网络通信包。


    类似地，其他编程语言，如 Rust 和 Python，也提供了不少开箱即用的能力来构建微服务和集成微服务。对于 Rust，我们有 Rocket，这是一个 Web
    框架，可以轻松编写快速的 Web 应用程序，而无需牺牲灵活性或类型安全性。Rust 生态系统组件解决了 Rust 应用程序与大多数其他网络协议、数据、Web
    API 和其他系统的集成问题。然而，一些开发者声称 Rust 过于底层，不适合作为微服务开发语言。因此，我们建议你在完全采用之前，先用一些用例尝试一下。


    同样，Python 拥有广泛的社区和可用于生产环境的框架，例如 Flask，用于微服务开发和集成。

    '
- fmt: '### Ballerina


    `Ballerina`^([(100)](#fn100)) is an emerging integration technology which is built
    as a programming language, and it aims to fill the gap between integration products
    and general-purpose programming languages by making it easy to write programs
    that integrate and orchestrate across distributed microservices and endpoints
    in a type-safe and resilient manner.


    At the time this book was written, `Ballerina` is in 0.981 version. Most of the
    programming constructs are final but some are subjected to change and the language
    is yet to be widely adopted across the microservices communities.


    ### Disclaimer


    The authors of this book have contributed to the design and development of `Ballerina`.
    As we thrive to keep the contents of this book technology and vendor neutral,
    we will not compare and contrast `Ballerina` with other similar technologies.
    We highly encourage the readers to select the most appropriate technology after
    doing a thorough evaluation of their use cases and the potential technologies
    to realize those use cases.


    Both the code and the graphical syntax in `Ballerina` are inspired from how the
    independent parties communicate via interactions in a sequence diagram.


    In the graphical syntax, `Ballerina` represents clients, workers, and remote systems
    as different actors in the sequence diagram. For example, as shown in Figure [7-11](#461146_1_En_7_Chapter.xhtml#Fig11),
    the interaction between the client/caller, service, worker, and another external
    endpoints can be represented using a sequence diagram. Each endpoint is represented
    as an actor in the sequence diagram and actions are represented as interactions
    between those actors.


    ![../images/461146_1_En_7_Chapter/461146_1_En_7_Fig11_HTML.jpg](images/461146_1_En_7_Chapter/461146_1_En_7_Fig11_HTML.jpg)


    Figure 7-11


    `Ballerina` graphical syntax and source syntax is based on a sequence diagram
    metaphor


    In the code, the remote endpoints are interfaced via endpoints that offer type-safe
    actions and worker’s logic is written as sequential code inside a resource or
    a function. You can define a service and bind it to a server endpoint (for example,
    an HTTP server endpoint can listen on a given HTTP port). Each service contains
    one or more resources that we write to the sequential code related to a worker
    and run by a dedicated worker thread.


    The following code snippet shows a simple HTTP service that accepts an HTTP `GET`
    request, and then invokes another external service to retrieve some information
    and send it back to the client. (You can try this from our examples in `ch07/sample16`.)


    ```

    import ballerina/http;

    import ballerina/io;

    endpoint http:Listener listener {

    port:9090

    };

    @http:ServiceConfig {

    basePath:"/time"

    }

    service timeInfo bind listener {

    @http:ResourceConfig {

    methods:["GET"],

    path:"/"

    }

    getTime (endpoint caller, http:Request req) {

    endpoint http:Client timeServiceEP {

    url:"http://localhost:9095"

    };

    http:Response response = check

    timeServiceEP -> get("/localtime");

    json time = check response.getJsonPayload();

    json payload = {

    source: "Ballerina",

    time: time

    };

    response.setJsonPayload(untaint payload);

    _ = caller -> respond(response);

    }

    }

    ```


    #### Network-Aware Abstractions


    `Ballerina` is designed for integration of disparate services, systems, and data.
    Hence, `Ballerina` provides native network-aware constructs that provide abstraction
    for interaction with endpoints via disparate network protocols. `Ballerina` offers
    out-of-the-box support for most of the standard network communication protocols.


    ```

    endpoint http:Client timeServiceEP {

    url:"http://localhost:9095"

    };

    ...

    http:Response response = check

    timeServiceEP -> get("/localtime");

    endpoint mysql:Client testDB {

    host: "localhost",

    port: 3306,

    name: "testdb",

    username: "root",

    password: "root",

    poolOptions: { maximumPoolSize: 5 },

    dbOptions: { useSSL: false }

    };

    ...

    var selectRet = testDB->select("SELECT * FROM student", ());

    // Kafka producer endpoint

    endpoint kafka:SimpleProducer kafkaProducer {

    bootstrapServers: "localhost:9092",

    clientID:"basic-producer",

    acks:"all",

    noRetries:3

    };

    ...

    // Produce the message and publish it to the Kafka topic

    kafkaProducer->send(serializedMsg, "product-price", partition = 0);

    ```


    As in the previous case, you can leverage server connectors to receive messages
    via those protocols and bind them to the service that intends to consume those
    messages. Most of the implementation details of consuming messages via a given
    protocol are transparent to the developer.


    ```

    // Server endpoint configuration.

    endpoint grpc:Listener ep {

    host:"localhost",

    port:9090

    };

    // The gRPC service that binds to the server endpoint.

    service SamplegRPCService bind ep {

    // A resource that accepts a string message.

    receiveMessage (endpoint caller, string name) {

    // Print the received message.        foreach record in records {

    blob serializedMsg = record.value;

    // Convert the serialized message to string message

    string msg = serializedMsg.toString("UTF-8");

    log:printInfo("New message received from the product admin");

    ...

    endpoint jms:SimpleQueueReceiver consumer {

    initialContextFactory:"bmbInitialContextFactory",

    providerUrl:"amqp://admin:admin@carbon/carbon"

    + "?brokerlist=''tcp://localhost:5672''",

    acknowledgementMode:"AUTO_ACKNOWLEDGE",

    queueName:"MyQueue"

    };

    service jmsListener bind consumer {

    onMessage(endpoint consumer, jms:Message message) {

    match (message.getTextMessageContent()) {

    string messageText => log:printInfo("Message : " + messageText);

    ```


    #### Resilient and Safe Integration


    The integration microservices you write using `Ballerina` are inherently resilient.
    You can make invocations of an external endpoint in a resilient and type-safe
    manner.


    For example, when you invoke an external endpoint that may be unreliable, you
    can circumvent such interactions with a circuit breaker for the specific protocol
    that you are using. This is as trivial as passing a few additional parameters
    to your client endpoint code.


    ```

    // circuit breaker example

    endpoint http:Client backendClientEP {

    circuitBreaker: {

    rollingWindow: { // failure calculation window

    timeWindowMillis:10000,

    bucketSizeMillis:2000

    },

    failureThreshold:0.2, // failure percentage threshold to open the circuit

    resetTimeMillis:10000, // time it takes to bring the circuit from open to half-close
    state

    statusCodes:[400, 404, 500] // HTTP status codes that are considered as failures

    }

    url: "http://localhost:8080",

    timeoutMillis:2000,

    };

    ```


    By design, `Ballerina` code you write will not require specific tools for checking
    for vulnerabilities or best practices. For example, a common issue in building
    distributed systems is that data coming over the wire cannot be trusted not to
    include injection attacks. `Ballerina` assumes that all data coming over the wire
    is tainted. And compilation-time checks prevent code that requires untainted data
    from accessing tainted data. `Ballerina` offers such capabilities as the built-in
    construct of the language, so that the programmer is enforced to write secure
    code.'
