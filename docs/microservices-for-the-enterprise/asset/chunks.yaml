    在第二章 2 中，关于 12 要素应用，我们讨论了*配置*要素强调了将环境特定设置从代码解耦到配置中的必要性。例如，LDAP 或数据库服务器的连接 URL
    就是环境特定的参数和证书。Spring Boot 提供了一种通过配置服务器在微服务之间共享配置的方式。多个微服务实例可以连接到该服务器，并通过 HTTP 加载配置。配置服务器既可以在本地文件系统中维护配置，也可以从
    Git 加载。从 Git 加载是理想的方式。配置服务器本身是另一个 Spring Boot 应用。你可以在`ch04/sample02`中找到配置服务器的代码。


    让我们看看添加到`ch04/sample02/pom.xml`中的一些其他值得注意的 Maven 依赖。`spring-cloud-config-server`依赖引入了将所有组件，将
    Spring Boot 应用转变为配置服务器。


    ```

    org.springframework.cloud

    spring-cloud-config-server


    ```


