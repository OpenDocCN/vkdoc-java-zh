- fmt: '# 8. Deploying and Running Microservices


    The two main objectives of a microservices architecture is the speed to production
    and the capability of the application to evolve. Unlike a monolithic application,
    a microservices deployment includes many individual (and independent) deployments.
    Instead of one single deployment, now we have hundreds of deployments. Unless
    we have an automated build system, managing such a deployment is a nightmare.
    An automated build system will help to streamline the deployment process, but
    will not solve all the issues in a large-scale deployment. We also need to worry
    about making a microservice portable, along with all its dependencies, so that
    the environment the developer tests will not be different from the test and production
    environments. This helps identify any issues very early in the development cycle
    and the chances are quite minimal that there will be issues in production. In
    this chapter we talk about different microservices deployment patterns, containers,
    container orchestration, container native microservices frameworks, and finally
    continuous delivery.


    ## Containers and Microservices


    The primary goal of a container is to provide a containerized environment for
    the applications it runs. A containerized environment is an isolated environment.
    One or more containers can run on the same physical host machine. But one container
    does not know about the processes running in other containers. For example, if
    you run your microservice in a container, it has its own view of the filesystem,
    network interfaces, processes, and hostname. Let’s say a `foo` microservice, which
    is running in the `foo` container, can refer to any other service running in the
    same container with the hostname `localhost`, while a `bar` microservice, which
    is running in the `bar` container, can refer to any other service running in the
    same container with the hostname `localhost`, while both `foo` and `bar` containers
    running on the same host machine^([^(104)](#fn104)).


    The concept of containers was made popular a few years back with Docker. But it
    has a long history. In 1979, with `chroot` system call in UNIX V7, users were
    able to change the root directory of a running process, so it will not be able
    to access any part of the filesystem, beyond the root. This was added to BSD in
    1982, and even today, `chroot` is considered a best practice among sys-admins,
    when you run any process that’s not in a containerized environment. A couple of
    decades later in 2000, FreeBSD introduced a new concept called FreeBSD Jails.
    With Jails, the same host environment can be partitioned into multiple isolated
    environments, where each environment can have its own IP address. In 2001, Linux
    VServer introduced a similar concept like FreeBSD Jails. With Linux VServer, the
    host environment can be partitioned by the filesystem, network, and the memory.
    Solaris came up with the Solaris Containers in 2004, which introduced another
    variation of process isolation. Google launched Process Containers in 2006, which
    was designed to build isolation over CPU, disk I/O, memory and the network. A
    year later this was renamed to control groups and merged into the Linux kernel
    2.6.24.


    Linux `cgroups` and `namespaces` are the foundation of the containers we see today.
    LXC (Linux Containers) in 2008 implemented the Linux Container Manager using `cgroups`
    and `namespaces`. CloudFoundry, in 2011, came up with a container implementation
    based on LXC, called Warden, but later changed it to its own implementation. Docker
    was born in 2013, and just like Warden, it too was built on top of LXC. Docker
    made container technologies much more usable and in the next sections, we’ll talk
    about Docker in detail.


    ### Introduction to Docker


    As we discussed, the containerization provided by Docker is built on top of Linux
    control groups and namespaces. The Linux namespaces build isolation in a way that
    each process sees its own view of the system: file, process, network interfaces,
    hostname, and many more. Control groups, also known as `cgroups`, limit the number
    of resources each process can consume. The combination of these two can build
    an isolated environment on the same host machine, sharing the same CPU, memory,
    network and the filesystem, with no impact on others.


    The level of isolation that Docker introduces is quite different from what we
    see in virtual machines. Before Docker became popular, virtual machines were used
    to replicate similar operating environments, with all the dependencies. If you
    have really done it, you probably know the pain in doing it! A virtual machine
    image is quite bulky. It packs everything you need, from the operating system
    to application-level binary dependencies. Portability is a major concern. Figure
    [8-1](#461146_1_En_8_Chapter.xhtml#Fig1) shows how a virtual machine creates isolation.


    ![../images/461146_1_En_8_Chapter/461146_1_En_8_Fig1_HTML.jpg](images/461146_1_En_8_Chapter/461146_1_En_8_Fig1_HTML.jpg)


    Figure 8-1


    High-level virtual machine architecture with a type-2 hypervisor


    A virtual machine runs on a hypervisor. There are two types of hypervisors. The
    type-1 hypervisor does not need a host operating system, while the type-2 hypervisor
    runs on a host operating system. Each virtual machine carries its own operating
    system. To run multiple virtual machines on the same host operating system, you
    need to have a good, powerful computer. To use one virtual machine per microservice
    to build an isolated environment is an overkill and a waste of resources. If you
    are familiar with virtual machines, you can think of a container as a lightweight
    virtual machine. Each container provides an isolated environment, yet they share
    the same operating system kernel with the host machine. Figure [8-2](#461146_1_En_8_Chapter.xhtml#Fig2)
    shows how a container creates isolation.


    ![../images/461146_1_En_8_Chapter/461146_1_En_8_Fig2_HTML.jpg](images/461146_1_En_8_Chapter/461146_1_En_8_Fig2_HTML.jpg)


    Figure 8-2


    Multiple containers running on the same host operating system


    Unlike a virtual machine, all the containers deployed in the same host machine
    share the same operating system kernel. It’s in fact an isolated process. To boot
    up a container, there is no overhead in booting up an operating system; it’s just
    the application running in the container. Also, since containers do not pack the
    operating system, you can run many containers in the same host machine. These
    are the key driving forces behind picking containers as the most popular way of
    deploying and distributing microservices.


    Docker builds the process isolation on top of control groups and namespaces come
    with the Linux kernel. Even without Docker, we could still do the same with the
    Linux kernel. So, why has Docker become the most popular container technology?
    Docker adds several new features, apart from process isolation to make it more
    attractive to the developer community. Making containers portable, building an
    ecosystem around Docker Hub, exposing an API for container management and building
    tooling around that, and making container images reusable are some of these features.
    We discuss each of them in detail in this chapter.'
