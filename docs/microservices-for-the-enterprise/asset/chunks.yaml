- fmt: '# Why We Have to Integrate Microservices


    Microservices are designed to address specific fine-grained business functionality.
    Therefore, when you are building a software application using microservices, you
    have to build a communication structure between these services. As discussed in
    Chapter [1](#461146_1_En_1_Chapter.xhtml), “The Case for Microservices,” when
    you are using SOA, you build a set of services (web services) and integrate them
    using a central bus known as an Enterprise Service Bus (ESB).


    As shown in Figure [7-1](#461146_1_En_7_Chapter.xhtml#Fig1), with the ESB-based
    approach, you build business logic as part of this centralized bus as well as
    various network communication functions such as resilient communication (circuit
    breaker and timeouts) and quality of service aspects (we discuss these capabilities
    in detail in the latter part of the chapter).


    ![../images/461146_1_En_7_Chapter/461146_1_En_7_Fig1_HTML.jpg](images/461146_1_En_7_Chapter/461146_1_En_7_Fig1_HTML.jpg)


    Figure 7-1


    Integrating services with ESB in SOA


    When you do service integration using an ESB, you will have a set of virtual services
    that are tightly coupled into the centralized ESB runtime. As the ESB layer grows
    with business and network communication logic, it becomes one gigantic monolithic
    application in most enterprises. This means it has all the limitations of a monolithic
    application that we discussed in Chapter [1](#461146_1_En_1_Chapter.xhtml).


    When you move into microservices architecture, you will still need to integrate
    your microservices to build any meaningful business use cases. There are several
    important requirements in a microservices architecture that makes the microservice
    integration quite critical.


    - *Microservice composition*: Creating a composite service out of the existing
    microservices and exposing that as a business functionality to the consumers is
    one of the most common use cases in microservices architecture. The composition
    can be built using synchronous communication (active) or using asynchronous (reactive)
    communication patterns.


    - *Building resilient inter-service communication*: All microservice calls take
    place on the network and are prone to failures. Therefore, we need to implement
    the stability and resiliency patterns when we make inter-service calls.


    - *Granular services and APIs*: Most microservices are too fine-grained to be
    published as a business functionality/API for the consumers.


    - *Microservices in brownfield enterprises*: Microservices in enterprise applications
    need integration between existing legacy systems, proprietary systems (e.g., ERP
    systems), databases, and web APIs (e.g., Salesforce).


    A microservices architecture favors an alternative approach to using a centralized
    ESB, which is known as *smart endpoints and dumb pipes*. All the requirements
    that we discussed above needs to be implement for microservices too. Let’s have
    a closer look at the concept of smart endpoints and dumb pipes.


    ## Smart Endpoints and Dumb Pipes


    With the *smart endpoints and dumb pipes* approach, when we have to integrate
    microservices, we shouldn’t be using a centralized monolithic ESB architecture
    but a fully decentralized approach of services communicating via a dumb messaging
    infrastructure. All the smarts live in the endpoints (services and consumers)
    and intermediate-messaging channels have no business or network communication
    logic. Therefore, as shown in Figure [7-2](#461146_1_En_7_Chapter.xhtml#Fig2),
    integration of microservices is taken care by some other set of microservices.
    They are responsible for the integration logic as well as the network communication
    to invoke those services. These services may be built using different technologies
    and, unlike ESB, each integration service is autonomous.


    ![../images/461146_1_En_7_Chapter/461146_1_En_7_Fig2_HTML.jpg](images/461146_1_En_7_Chapter/461146_1_En_7_Fig2_HTML.jpg)


    Figure 7-2


    Smart endpoints and dumb pipes : All smarts live in the endpoint (service) level
    while they communicate via a dumb messaging infrastructure


    Although this approach looks far more elegant than the conventional centralized
    ESB, there are several complexities that the developers have to deal with. First
    and foremost, we should clearly understand that this approach doesn’t remove any
    of the complexities in business or network communication in the ESB approach.
    Which means that you need to implement all the capabilities that your service
    integration logic requires, as part of your service. For instance, `microservice-1`
    should contain the composition of multiple data types from the `Order Processing`
    and `Shopping Cart` microservices and resilient communication to invoke those
    services (such as circuit breakers, failovers, etc.). It must also include any
    other cross-cutting capabilities that you will require (such as security and observability).
    Also, if you are using polyglot microservices technologies, it’s more likely that
    you have to repeat the same implementation for commodity features such as resilient
    communication using multiple technologies.


    It’s crucial to take these requirements of microservice integration into consideration
    when picking technologies for implementation. We’ll dive into the specifics of
    the requirements and the technologies that fit those requirements in the latter
    half of this chapter. But before that, it’s important to discuss some of the common
    anti-patterns related to microservices integration that you should avoid.


    ## Anti-Patterns of Microservice Integration


    There are several anti-patterns in integrating microservices that we should be
    aware of. Most of these patterns have emerged because of the complexity of integrating
    microservices and trying to replicate the same set of features that a centralized
    ESB offers with the microservices architecture.'
  raw: '## Why We Have to Integrate Microservices


    Microservices are designed to address specific fine-grained business functionality.
    Therefore, when you are building a software application using microservices, you
    have to build a communication structure between these services. As discussed in
    Chapter [1](#461146_1_En_1_Chapter.xhtml), “The Case for Microservices,” when
    you are using SOA, you build a set of services (web services) and integrate them
    using a central bus known as an Enterprise Service Bus (ESB).


    As shown in Figure [7-1](#461146_1_En_7_Chapter.xhtml#Fig1), with the ESB-based
    approach, you build business logic as part of this centralized bus as well as
    various network communication functions such as resilient communication (circuit
    breaker and timeouts) and quality of service aspects (we discuss these capabilities
    in detail in the latter part of the chapter).


    ![../images/461146_1_En_7_Chapter/461146_1_En_7_Fig1_HTML.jpg](images/461146_1_En_7_Chapter/461146_1_En_7_Fig1_HTML.jpg)


    Figure 7-1


    Integrating services with ESB in SOA


    When you do service integration using an ESB, you will have a set of virtual services
    that are tightly coupled into the centralized ESB runtime. As the ESB layer grows
    with business and network communication logic, it becomes one gigantic monolithic
    application in most enterprises. This means it has all the limitations of a monolithic
    application that we discussed in Chapter [1](#461146_1_En_1_Chapter.xhtml).


    When you move into microservices architecture, you will still need to integrate
    your microservices to build any meaningful business use cases. There are several
    important requirements in a microservices architecture that makes the microservice
    integration quite critical.


    *   *Microservice composition*: Creating a composite service out of the existing
    microservices and exposing that as a business functionality to the consumers is
    one of the most common use cases in microservices architecture. The composition
    can be built using synchronous communication (active) or using asynchronous (reactive)
    communication patterns.


    *   *Building resilient inter-service communication*: All microservice calls take
    place on the network and are prone to failures. Therefore, we need to implement
    the stability and resiliency patterns when we make inter-service calls.


    *   *Granular services and APIs*: Most microservices are too fine-grained to be
    published as a business functionality/API for the consumers.


    *   *Microservices in brownfield enterprises*: Microservices in enterprise applications
    need integration between existing legacy systems, proprietary systems (e.g., ERP
    systems), databases, and web APIs (e.g., Salesforce).


    A microservices architecture favors an alternative approach to using a centralized
    ESB, which is known as *smart endpoints and dumb pipes*. All the requirements
    that we discussed above needs to be implement for microservices too. Let’s have
    a closer look at the concept of smart endpoints and dumb pipes.


    ## Smart Endpoints and Dumb Pipes


    With the *smart endpoints and dumb pipes* approach, when we have to integrate
    microservices, we shouldn’t be using a centralized monolithic ESB architecture
    but a fully decentralized approach of services communicating via a dumb messaging
    infrastructure. All the smarts live in the endpoints (services and consumers)
    and intermediate-messaging channels have no business or network communication
    logic. Therefore, as shown in Figure [7-2](#461146_1_En_7_Chapter.xhtml#Fig2),
    integration of microservices is taken care by some other set of microservices.
    They are responsible for the integration logic as well as the network communication
    to invoke those services. These services may be built using different technologies
    and, unlike ESB, each integration service is autonomous.


    ![../images/461146_1_En_7_Chapter/461146_1_En_7_Fig2_HTML.jpg](images/461146_1_En_7_Chapter/461146_1_En_7_Fig2_HTML.jpg)


    Figure 7-2


    Smart endpoints and dumb pipes : All smarts live in the endpoint (service) level
    while they communicate via a dumb messaging infrastructure


    Although this approach looks far more elegant than the conventional centralized
    ESB, there are several complexities that the developers have to deal with. First
    and foremost, we should clearly understand that this approach doesn’t remove any
    of the complexities in business or network communication in the ESB approach.
    Which means that you need to implement all the capabilities that your service
    integration logic requires, as part of your service. For instance, microservice-1
    should contain the composition of multiple data types from the `Order Processing`
    and `Shopping Cart` microservices and resilient communication to invoke those
    services (such as circuit breakers, failovers, etc.). It must also include any
    other cross-cutting capabilities that you will require (such as security and observability).
    Also, if you are using polyglot microservices technologies, it’s more likely that
    you have to repeat the same implementation for commodity features such as resilient
    communication using multiple technologies.


    It’s crucial to take these requirements of microservice integration into consideration
    when picking technologies for implementation. We’ll dive into the specifics of
    the requirements and the technologies that fit those requirements in the latter
    half of this chapter. But before that, it’s important to discuss some of the common
    anti-patterns related to microservices integration that you should avoid.


    ## Anti-Patterns of Microservice Integration


    There are several anti-patterns in integrating microservices that we should be
    aware of. Most of these patterns have emerged because of the complexity of integrating
    microservices and trying to replicate the same set of features that a centralized
    ESB offers with the microservices architecture.'
