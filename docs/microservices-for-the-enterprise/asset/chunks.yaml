  raw: '### Building the gRPC Client


    Now let’s see how to build a gRPC client application. In fact, in our case, the
    gRPC client we are building is another microservice. Just like in the gRPC service,
    first we need to create an IDL (Interface Definition Language). This is the same
    IDL we used for the gRPC service. You can find it under `sample06/src/main/proto/InventoryService.proto`.
    Later we will use a Maven plugin to build the Java classes from this IDL file,
    and it will by default look for the location `sample06/src/main/proto/`.


    The only two additions to the client-side `pom.xml` are the `os-maven-plugin`
    extension and the `protobuf-maven-plugin` plugin. The `protobuf-maven-plugin`
    plugin is used to generate the Java classes from the IDL. Also, note that we do
    not need to add a dependency to `grpc-spring-boot-starter`. The following Maven
    command can be used to create the Java classes from the IDL. By default, they
    are created under the `target/generated-sources/protobuf/grpc-java` and `target/generated-sources/protobuf/java`
    directories.


    ```

    \> cd sample06

    \> mvn package

    ```


    Now let’s look at our client code. The `Order Processing` (`sample06/src/main/java/com/apress/ch04/sample06/service/OrderProcessing.java`)
    microservice calls the `Inventory` microservice, via the `InventoryClient` (`com/apress/ch04/sample06/InventoryClient.java`)
    class. The following shows the source code of the `InventoryClient`. It uses the
    `InventoryServiceBlockingStub`, which is a class generated from the IDL, to talk
    to the gRPC service.


    ```

    public class InventoryClient {

    ManagedChannel managedChannel;

    InventoryServiceBlockingStub stub;

    public void updateItems

    (com.apress.ch04.sample06.model.Item[] items) {

    ItemList itemList = null;

    for (int i = 0; i  0) {

    itemList = ItemList.newBuilder(itemList)

    .addItem(i, item).build();

    } else {

    itemList = ItemList.newBuilder()

    .addItem(0, item).build();

    }

    }

    managedChannel = ManagedChannelBuilder

    .forAddress("localhost", 7000)

    .usePlaintext(true).build();

    stub = InventoryServiceGrpc

    .newBlockingStub(managedChannel);

    stub.updateItems(itemList);

    }

    }

    ```


