- fmt: '#### Observability


    When you are using `Istio`, making your services observable is trivially easy.
    For example, suppose that you want to enable distributed tracing for your microservices
    application. Then you need to install the corresponding add-on (such as `Zipkin`
    or `Jaeger`) into your `Istio` installation. Now when you send requests to your
    microservices, they will go through the sidecar proxies. Sidecar proxies are capable
    of sending tracing spans automatically to either `Zipkin` or `Jaeger`.


    `Istio` proxies can also automatically send spans. They need some hints to tie
    together the entire trace. Applications need to propagate the appropriate HTTP
    headers so that when the proxies send span information to `Zipkin` or `Jaeger`,
    the spans can be correlated correctly into a single trace.


    Similarly, other aspects of observability can also be supported with no or minimal
    changes to your code. Refer to the `Istio` documentation for more details on how
    you can make your services observable with `Istio`. We discuss observability in
    detail, with respect to microservices, in Chapter 13, “Observability”.


    #### Security


    `Istio`’s security capabilities are still evolving at a rapid rate. At the time
    this book was written, `Istio` offered the following security features:


    - Mutual TLS (`mTLS`) authentication between services

    - Whitelisting and blacklisting of services

    - Access control with denials

    - Role-Based Access Control (`RBAC`)


    For further details on these security use cases, refer to the `Istio` documentation.


    Since you had a closer look at `Istio`, let’s look at another popular Service
    Mesh implementation, `Linkerd`.


    ## Linkerd


    `Linkerd` is an open source network proxy designed to be deployed as a Service
    Mesh: a dedicated layer for managing, controlling, and monitoring service-to-service
    communication within an application.


    `Linkerd` takes care of the difficult, error-prone parts of cross-service communication—including
    latency-aware load balancing, connection pooling, `TLS`, instrumentation, and
    request-level routing. `Linkerd` is built on top of `Netty` and `Finagle`.


    Figure 9-10 shows how `Linkerd` is used as a Service Mesh to connect multiple
    microservices. You can find that it uses the standard Service Mesh pattern in
    a way pretty similar to `Istio`.


    ![../images/461146_1_En_9_Chapter/461146_1_En_9_Fig10_HTML.jpg](images/461146_1_En_9_Chapter/461146_1_En_9_Fig10_HTML.jpg)


    Figure 9-10 Linkerd Service Mesh


    To get started with `Linkerd`, you can run it in your local machine and run your
    service in the same machine (both runtimes on the same host). When you are running
    `Linkerd`, you can use the following `Yaml` configuration file to start your Service
    Mesh. Suppose that your microservice is running on port `9999` on HTTP. The following
    configuration starts `Linkerd` on HTTP port `4140`.


    ```

    #linkerd.yaml

    routers:

    - protocol: http

    dtab: |

    /svc => /#/io.l5d.fs

    servers:

    - ip: 0.0.0.0

    port: 4140

    ```


    `Linkerd` uses a file-based service discovery mechanism by default. With the configuration
    that ships with `Linkerd`, the first place it looks when it needs to resolve a
    service endpoint is the `disco/` directory. With this configuration, `Linkerd`
    looks for files with names corresponding to the concrete name of a destination,
    and it expects these files to contain a newline-delimited list of addresses in
    host port form.


    ```

    head disco/*

    ==> disco/thrift-buffered  disco/thrift-framed  disco/web <==

    127.0.0.1 9999

    ```


    When you send a request to `Linkerd` (on port `4140`) with the following URL,
    the destination is discovered by looking at the Host HTTP header, which is `web`.


    ```

    $ curl -H "Host: web" http://localhost:4140/

    ```


    From the previous file-based service discovery configuration, `Linkerd` can resolve
    the host and port (`9999`) for the service `web`.


    We can extend the same configuration to have resilient calls to the backend microservice
    by using `Linkerd`’s `failureAccrual` configuration.


    ```

    - protocol: http

    label: io.l5d.consecutiveFailures

    dtab: /svc => /#/io.l5d.fs/service2;

    client:

    failureAccrual:

    kind: io.l5d.consecutiveFailures

    failures: 5

    backoff:

    kind: constant

    ms: 10000

    servers:

    - port: 4142

    ip: 0.0.0.0

    service:

    responseClassifier:

    kind: io.l5d.http.nonRetryable5XX

    ```


    `failureAccrual` is configured in `Linkerd`’s configuration under the client section,
    so any failure related to the backend reside on that route and are subjected to
    the client, which is resilient.


    ## Should We Use Service Mesh?


    At the time this book was written, there was a lot of traction toward using Service
    Mesh. However, production usage of Service Mesh was rare at this time. Therefore,
    we don’t have sufficient understanding of the real pros and cons yet. Let’s look
    at some of the key areas that we need to be mindful about when using Service Mesh.


    ### Pros


    Service Mesh certainly has the capability to revolutionize the way we develop
    container-native services and applications. Given that the complexity that microservices
    architecture brings in, in the context of inter-service communication, Service
    Mesh provides some promising advantages:


    - **Developers can focus more on business functionality than on inter-service
    communication**: Most of the commodity features are implemented outside microservice
    code and are reusable.

    - **Observability out of the box**: Services are innately observable via the sidecar.
    Hence, distributed tracing, logging, metrics, etc. require no additional effort
    from the service developer.

    - **Polyglot-services friendly**: More freedom when it comes to selecting a microservices
    implementation language. You don’t need to worry about whether a given language
    supports or has libraries to build network application functions.

    - **Centrally managed decentralized system**: Most of the capabilities can be
    managed centrally via the control plane and pushed into decentralized sidecar
    runtimes.


    If you are already running `Kubernetes` in your enterprise, adopting Service Mesh
    into your architecture is quite straightforward.


    ### Cons


    - **Complexity**: Having a Service Mesh drastically increases the number of runtime
    instances that you have in a given microservices implementation.

    - **Adding extra hops**: Each service call has to go through an extra hop (through
    the Service Mesh sidecar proxy).

    - **Service Meshes address a subset of problems**: Service Mesh only addresses
    a subset of inter-service communication problems, and there are a lot of complex
    problems it doesn’t address, such as complex routing, transformation/type mapping,
    and integrating with other services and systems. These must be solved by your
    microservice’s business logic.

    - **Immature**: Service Mesh technologies are relatively new to be declared as
    full production ready for the large-scale deployments.'
