- fmt: '# 13. Observability


    Collecting data is cheap, but not having it when you need it can be expensive.
    In March 2016, Amazon was down for 20 minutes and the estimated revenue loss was
    $3.75 million. Also in January 2017, there was a system outage at Delta Airlines,
    which caused cancellation of more than 170 flights and resulted in an estimated
    loss of $8.5 million. In both cases if we had the right level of data collected,
    we could have predicted such behavior or could have recovered from it as soon
    as it has happened by identifying the root cause. The more information we have,
    the better decisions we can make.


    Observability is the measure of how well internal states of a system can be inferred
    from knowledge of its external outputs^([^(159)](#fn159)). It is one of the most
    important aspects, which needs to be baked into any microservices design. We need
    to track the throughput of each microservice, the number of success/failed requests,
    utilization of CPU, memory and other network resources, and some business-related
    metrics. In this chapter, we discuss the need for observability, the role logging,
    metrics, and tracing play in observability, how to build a distributed tracing
    system with Spring Cloud Sleuth, Zipkin, and Jaeger, and how visualization, monitoring,
    and alerting work with Prometheus and Grafana.


    ## Three Pillars of Observability


    Observability can be achieved in three ways: *logging*, *metrics*, and *tracing*,
    which are also known as the three pillars of observability. Logging is about recording
    events. It can be anything. Each transaction that goes through a microservice
    can be logged with other related metadata, including the timestamp, the status
    (success/failure), initiator, etc. Combining data from measuring events derives
    metrics. For example, the number of transactions processed in a unit time and
    the transaction success/failure rate are metrics about your microservice. Metrics
    are an indication of how well (or how poorly) your service is doing. Another example
    would be the latency. The logs capture the timestamp of every request that hits
    a microservice and the corresponding responses. The difference between those two
    timestamps is the latency of a given request. The average latency of a given service
    is derived by taken into consideration all such time differences over the time,
    which is a metric. Here, latency as a metric helps us decide whether our microservice
    is slow or fast. Also, when we want to set alerts, we always pick metrics. If
    we want to be alerted when the system starts to perform slower than the expectation,
    we probably could set up an alert on latency. When the average latency falls behind
    a preset threshold, the system will trigger an alert. In summary, metrics help
    us identify trends.


    Tracing is also derived from logs. It’s a different view on how a system behaves,
    which takes into consideration the ordering of each event and the impact of one
    on another. Say for example that tracing helps you find the root cause of why
    a request that comes to the `Billing` microservice fails, by tracing it back to
    the `Order Processing` microservice. It doesn’t need to be across different systems
    all the time; it can be just within one system. For example, if it takes 90 milliseconds
    to place an order, the tracing should show us where exactly the delay is and how
    different components contribute to it.


    ## Distributed Tracing with Spring Cloud Sleuth


    Distributed tracing helps in tracking a given request, which spans across multiple
    microservices. Due to the nature of microservices, in most cases, to cater a single
    request from a client, more than one microservices are consumed. Figure [13-1](#461146_1_En_13_Chapter.xhtml#Fig1)
    shows all the interactions between microservices that could happen during a single
    request to place an order. Some requests are direct service-to-service invocations,
    while others are asynchronous based on a messaging system. Irrespective of how
    service-to-service communication takes place, distributed tracing provides a way
    to track a request, which spans across all the microservices required in building
    the response to the client.


    Distributed tracing adds value not just for microservices, but also for any distributed
    system. Whenever a request passes through different components (say an API gateway,
    Enterprise Service Bus) in a network, you need to have the ability to track it
    across all the systems. That helps you to identify and isolate issues related
    to latency, message loses, throughput, and many more.


    ![../images/461146_1_En_13_Chapter/461146_1_En_13_Fig1_HTML.jpg](images/461146_1_En_13_Chapter/461146_1_En_13_Fig1_HTML.jpg)


    Figure 13-1


    Communication between microservices


    ### Spring Cloud Sleuth


    Spring Cloud Sleuth implements a distributed tracing solution for Spring microservices^([^(160)](#fn160)).
    Sleuth borrows many concepts and terminology from Dapper^([^(161)](#fn161)), which
    is Google’s production distributed systems tracing infrastructure. The basic unit
    of work in Sleuth is called a *span*. A span represents the work carried out between
    two points in a communication network. For example, the `Order Processing` microservice
    (see Figure [13-1](#461146_1_En_13_Chapter.xhtml#Fig1)) receives an order from
    a client and processes the order. Then it synchronously talks to the `Inventory`
    microservice and, once it receives the response, publishes the `ORDER_PROCESSING_COMPLETED`
    event to the messaging system. Figure [13-2](#461146_1_En_13_Chapter.xhtml#Fig2)
    shows how spans are identified between different points in the complete communication
    network. The span gets its initial value once the corresponding request hits the
    `Order Processing` microservice. In fact, the value of span is a 64-bit identifier
    (even though we use alphabetical letters to denote a span in Figure [13-2](#461146_1_En_13_Chapter.xhtml#Fig2)).
    Any message logged inside the `Order Processing` microservice will carry the span
    ID A. The request sent from `Order Processing` microservice and received by the
    `Inventory` microservice will carry the span ID B, while the request is inside
    the `Inventory` microservice, so it will hold the span ID C.


    ![../images/461146_1_En_13_Chapter/461146_1_En_13_Fig2_HTML.jpg](images/461146_1_En_13_Chapter/461146_1_En_13_Fig2_HTML.jpg)


    Figure 13-2


    Distributed tracing


    Each span has a parent span. For example, the parent span for span B is span A,
    while the parent span of span A is null. Similarly, span A is also a parent of
    span E. Figure [13-3](#461146_1_En_13_Chapter.xhtml#Fig3) arranges spans by the
    parent-child relationship. A set of spans forming a tree-like structure is known
    as a *trace*. The value of the trace remains the same through out all the spans
    for a given request. As per Figure [13-2](#461146_1_En_13_Chapter.xhtml#Fig2),
    the value of the trace is A, and it carries the same value across all the spans.
    The trace ID helps correlate messages between microservices. Once all the logs
    from different microservices are published into a centralized tracing system,
    given the trace ID, we can trace the message across different systems.


    ![../images/461146_1_En_13_Chapter/461146_1_En_13_Fig3_HTML.jpg](images/461146_1_En_13_Chapter/461146_1_En_13_Fig3_HTML.jpg)


    Figure 13-3


    A set of spans forming a tree-like structure


    Let’s get our hands wet! Let’s see how to use Spring Cloud Sleuth to do distributed
    tracing with a set of example Spring microservices.


    ### Note


    To run the examples in this chapter, you need Java 8 or latest, Maven 3.2 or latest,
    and a Git client. Once you have successfully installed those tools, you need to
    clone the Git repo: [`https://github.com/microservices-for-enterprise/samples.git`](https://github.com/microservices-for-enterprise/samples.git)
    . The chapter’s examples are in the `ch13` directory.


    ```

    :\> git clone https://github.com/microservices-for-enterprise/samples.git

    ```'
