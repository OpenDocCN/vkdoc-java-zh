    ### Note


    A *Saga* is a long-lived transaction that can be written as a sequence of transactions
    that can be interleaved. All transactions in a sequence complete successfully
    or the compensating transactions are executed to amend a partial execution. The
    Saga^([^(84)](#fn84)) pattern was introduced in a [paper](http://www.amundsen.com/downloads/sagas.pdf)
    published in 1987 by Hector Garcia-Molina and Kenneth Salem.


    Now, let’s try to use the Saga pattern in our travel booking scenario. We can
    model (see Figure [5-14](#461146_1_En_5_Chapter.xhtml#Fig14)) this use case as
    a collection of sub-transactions—booking airline, booking hotel, and booking scar
    rental. Each of these sub-transactions operates on a single transaction boundary
    and each sub-transaction has an associated compensating transaction that can semantically
    undo the sub-transaction. For example, for each service, we can list the transaction
    and the compensating transactions as follows.


    *   T1: Book flight, C1: Cancel flight


    *   T2: Book hotel, C2: Cancel hotel


    *   T3: Book car rental, C3: Cancel car rental


    For each service, there’s a dedicated transaction boundary and it will operate
    on top of a dedicated database (having a database for each service is not mandatory
    though).


    A Saga can be represented as a directed acyclic graph that consists of all the
    sub-transactions and compensating transactions. The travel-booking Saga contains
    the set of sub-transactions and compensating transactions. The travel agent service
    contains a component called Saga Execution Coordinator (SEC) , which executes
    the book flight, book hotel, and book car rental transactions. If any of these
    operations fails at a given step, then SEC rolls back the entire transaction by
    executing the corresponding compensating transactions.


    ![../images/461146_1_En_5_Chapter/461146_1_En_5_Fig14_HTML.jpg](images/461146_1_En_5_Chapter/461146_1_En_5_Fig14_HTML.jpg)


    Figure 5-14


    Using Sagas


    Sagas at the conceptual level are quite trivial and most of the centralized workflow
    solutions, such as Business Process Model and Notation (BPMN) solutions , are
    in fact based on the same terminology. However, building a Saga pattern for a
    microservices-based system in a decentralized fashion is quite challenging. Therefore,
    let’s take a closer look at how a Saga can be implemented in the microservices
    context.


    The implementation of Saga requires a Saga log, which is a distributed log that
    the Saga Execution Coordinator interacts with.'
  trans: '

    ### 数据库日志挖掘


    当服务在其所拥有的数据之上执行各种数据库操作时，所有事务细节都会被记录在数据库事务或提交日志中。因此，我们可以将数据库视为单一事实来源，并从事务或提交日志中提取数据变更。例如，如图
    5-11 所示，`订单处理`服务执行各种数据库操作，这些操作被记录在数据库事务日志中。`DBTransactionLogProc`应用程序可以挖掘`订单`数据库的事务日志，并创建与每个事务相匹配的事件。这些事件随后被发布到事件总线或消息代理中。


    ![../images/461146_1_En_5_Chapter/461146_1_En_5_Fig11_HTML.jpg](img/461146_1_En_5_Fig11_HTML.jpg)


    图 5-11


    通过使用数据库事务日志和发布事件来实现原子性


    其他应用程序可以消费这些事件，我们可以在所有服务之间维护最终一致性。


    诸如*变更数据捕获*（CDC）之类的数据管理解决方案利用了数据库事务日志处理技术。例如，[Debezium](http://debezium.io/) 或
    [LinkedIn Databus](https://github.com/linkedin/databus) 等解决方案就使用此技术来构建 CDC 管道。


    由于我们将数据库用作单一事实来源，事务日志挖掘技术非常有效。每个成功的数据库操作都会被记录在数据库事务日志中。然而，在实现和处理方面，不同数据库的事务日志差异巨大，因为事务日志没有标准格式，每个数据库都有自己专有的事务记录方式。因此，大多数基于数据库事务日志挖掘的数据管理解决方案必须为每种数据库类型提供相应的实现。


    ### 事件溯源


    通过使用我们之前讨论的技术（例如使用本地事务发布事件），我们可以将实体的每个状态变更事件持久化为一个事件序列。所有这些事件都存储在事件总线中，订阅者可以通过处理该实体上发生的事件序列来推导出该实体的状态。例如，如图
    5-12 所示，`订单处理`服务将实体`订单`上发生的变更作为事件发布（而不是用订单状态更新数据库表）。诸如订单已创建、已更新、已支付、已发货等状态变更事件会被发布到事件总线中。


    ![../images/461146_1_En_5_Chapter/461146_1_En_5_Fig12_HTML.jpg](img/461146_1_En_5_Fig12_HTML.jpg)


    图 5-12


    事件溯源


    订阅者应用程序和服务可以通过简单地重放订单上发生的事件来重新创建订单的状态。例如，它可以检索与`order11234`相关的所有事件，并推导出该订单的当前状态。


    ### Saga


    到目前为止，我们已经讨论了几种基于异步事件驱动架构的解决方案，我们可以利用它们来避免使用两阶段提交的分布式事务。对于完全同步的消息传递场景，我们可以使用*Saga*跨多个服务构建事务行为。


    在深入探讨 Saga 的理论方面之前，让我们先看一个使用 Saga 的真实世界示例。（Caitie McCaffrey 也有一个关于 Saga 模式如何为真实场景设计的精彩会议演讲^(⁸³)。）考虑一个旅行社服务（见图
    5-13），它允许您规划假期。旅行社服务通过旅行社应用程序获取持续时间、地点和其他详细信息，并预订航班、酒店和租车服务。航班、酒店和租车服务的预订必须以事务方式完成（要么一起预订所有三项服务，要么如果其中一项预订失败，则取消其余预订）。正如我们之前讨论的，如果旅行社服务构建在集中式数据库之上，那么使用事务来实现此场景将非常简单。


    ![../images/461146_1_En_5_Chapter/461146_1_En_5_Fig13_HTML.jpg](img/461146_1_En_5_Fig13_HTML.jpg)


    图 5-13


    集中式数据库上的事务


    使用微服务，构建此场景要求我们在多次服务调用之间具有事务安全性。正如您在之前章节中所看到的，使用两阶段提交的分布式事务具有固有的局限性，并且不是解决此问题的合适方法。


    Saga 旨在通过将给定事务分组为一系列子事务和相应的补偿事务来解决分布式事务问题。Saga 中的所有事务要么全部成功完成，要么在发生故障时，运行补偿事务来回滚所有操作，这是作为
    Saga 的一部分完成的。


    ### 注意


    *Saga*是一个长生命周期的事务，可以编写为一系列可以交错执行的事务。序列中的所有事务要么全部成功完成，要么执行补偿事务来修正部分执行。Saga^(⁸⁴)模式是在
    Hector Garcia-Molina 和 Kenneth Salem 于 1987 年发表的一篇[论文](http://www.amundsen.com/downloads/sagas.pdf)中提出的。


    现在，让我们尝试在我们的旅行预订场景中使用 Saga 模式。我们可以将此用例建模（见图 5-14）为一系列子事务——预订航班、预订酒店和预订租车。这些子事务中的每一个都在单个事务边界内运行，并且每个子事务都有一个关联的补偿事务，该补偿事务可以在语义上撤销该子事务。例如，对于每个服务，我们可以列出事务和补偿事务，如下所示。


    *   T1：预订航班，C1：取消航班


    *   T2：预订酒店，C2：取消酒店


    *   T3：预订租车，C3：取消租车


    每个服务都有一个专用的事务边界，并且它将在专用数据库之上运行（尽管并非强制要求每个服务都有一个数据库）。


    一个 Saga 可以表示为一个有向无环图，其中包含所有子事务和补偿事务。旅行预订 Saga 包含一组子事务和补偿事务。旅行社服务包含一个名为 Saga 执行协调器（SEC）的组件，它负责执行预订航班、预订酒店和预订租车事务。如果这些操作中的任何一个在给定步骤失败，则
    SEC 通过执行相应的补偿事务来回滚整个事务。


    ![../images/461146_1_En_5_Chapter/461146_1_En_5_Fig14_HTML.jpg](img/461146_1_En_5_Fig14_HTML.jpg)


    图 5-14


    使用 Saga


    Saga 在概念层面上非常简单，大多数集中式工作流解决方案，例如业务流程模型和表示法（BPMN）解决方案，实际上都基于相同的术语。然而，为基于微服务的系统以去中心化的方式构建
    Saga 模式是相当具有挑战性的。因此，让我们更仔细地研究一下如何在微服务上下文中实现 Saga。


    Saga 的实现需要一个 Saga 日志，这是一个 Saga 执行协调器与之交互的分布式日志。

