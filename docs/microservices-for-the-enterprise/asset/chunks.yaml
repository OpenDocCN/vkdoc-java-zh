    Alp Tunc served as the technical reviewer. Thanks, Alp, for your quality reviews.


    Dr. Sanjiva Weerawarana, the Founder and Chief Architect at WSO2, is our constant
    mentor. We are truly grateful to Dr. Sanjiva for his guidance, mentorship, and
    support. We also express our gratitude to Tyler Jewel, the CEO at WSO2, and Paul
    Fremantle, the CTO at WSO2, for their direction, which helped us explore the microservices
    domain. Finally, we’d like to thank our families and parents; without them nothing
    is possible!


    ### About the Authors and About the Technical Reviewer


    ### About the Authors


    ### About the Technical Reviewer


    # 1. The Case for Microservices


    Enterprise software architecture always evolves with new architectural styles
    owing to the paradigm shifts in the technology landscape and the desire to find
    better ways to build applications in a fast but reliable way.


    The microservices architecture has been widely adopted as an architectural style
    that allows you to build software applications with speed and safety. The microservices
    architecture fosters building a software system as a collection of independent
    autonomous services (developed, deployed, and scaled independently) that are loosely
    coupled. These services form a single software application by integrating all
    such services and other systems.


    In this chapter, we explore what microservices are, the characteristics of microservices
    with real-world examples, and the pros and cons of microservices in the context
    of enterprise software architecture.


    To better understand what microservices are, we need to look at some of the architectural
    styles used prior to microservices, and how the enterprise architecture has evolved
    to embrace the microservices architecture.


    ## From a Monolith to a Microservices Architecture


    Exploring the evolution of enterprise architecture from monolithic applications
    to microservices is a great way to understand the key motivations and characteristics
    of microservices. Let’s begin our discussion with monolithic applications.'
