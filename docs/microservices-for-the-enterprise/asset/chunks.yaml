    ## Introduction


    The microservices architecture has become one of the most popular architectural
    styles in the enterprise software architecture landscape. Owing to the benefits
    that it brings, most enterprises are transforming their existing monolithic applications
    to microservices architecture-based applications. Hence, for any software architect
    or software engineer, it’s really important to understand the key architectural
    concepts of the microservices architecture and how you can use those architectural
    principles in practice to solve real-world business use cases.


    In this book, we provide the readers a comprehensive understanding of microservices
    architectural principles and discuss how to use those concepts in real-world scenarios.
    Also, without locking into a particular technology or framework, we cover a wide
    range of technologies and frameworks, which are most suitable for given aspects
    of the microservices architecture.


    One other key difference of this book is that it addresses some of the fundamental
    challenges in building microservices in the enterprise architecture landscape,
    such as inter-service communication, service integration with no centralized Enterprise
    Service Bus (ESB), exposing microservices as APIs avoiding a centralized API gateway,
    determining the scope and size of a microservice, and leveraging microservices
    security patterns. All the concepts explained in this book are supported with
    real-world use cases and incorporated with samples that the reader can try out.
    Most of these use cases are inspired by existing microservices implementations
    such as Netflix and Google, as well as the authors’ exposure to various meetups
    and conferences in the San Francisco Bay area.


    This book covers some of the widely used and bleeding edge technologies and patterns
    in realizing microservices architecture, such as technologies for container-native
    deployment (Docker, Kubernetes, Helm), messaging standards and protocols (gRPC,
    HTTP2, Kafka, AMQP, OpenAPI, GraphQL, etc.), reactive and active microservices
    integration, service mesh (Istio and Linkerd), miroservice resiliency patterns
    (circuit breaker, timeouts, bulk-heads, etc.), security standards (OAuth 2, JWT,
    and certificates), using APIs, events, and streams with microservices, and building
    observable microservices using logging, metrics, and tracing.


