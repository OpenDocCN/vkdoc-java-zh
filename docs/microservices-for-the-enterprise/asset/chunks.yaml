- fmt: '### Spinnaker


    `Spinnaker`^([^(43)](#fn43)) is a multi-cloud continuous delivery platform for
    releasing software changes with high velocity and confidence. It combines a powerful
    and flexible pipeline management system with integration with the major cloud
    providers, which include `AWS EC2`, `Kubernetes`, `Google Compute Engine`, `Google
    Kubernetes Engine`, `Google App Engine`, `Microsoft Azure`, and `OpenStack`.


    ### Eureka


    `Eureka`^([^(44)](#fn44)) is a `RESTful` service that is primarily used in the
    `AWS` cloud for locating services for the purpose of load balancing and failover
    of middle-tier servers. In a microservices deployment, `Eureka` can be used as
    a service registry to discover endpoints.


    ### Archaius


    `Archaius`^([^(45)](#fn45)) includes a set of configuration management APIs used
    by `Netflix`. It allows configurations to change dynamically at runtime, which
    enables production systems to get configuration changes without having to restart.
    To provide fast and thread-safe access to the properties, `Archaius` adds a cache
    layer that contains desired properties on top of the configuration. It also creates
    a hierarchy of configurations and determines the final property value in a simple,
    fast, and thread-safe manner.


    ![../images/461146_1_En_4_Chapter/461146_1_En_4_Fig1_HTML.jpg](images/461146_1_En_4_Chapter/461146_1_En_4_Fig1_HTML.jpg)


    **Figure 4-1** Netflix OSS deployment


    ### Ribbon


    `Ribbon`^([^(46)](#fn46)) is an Inter-Process Communication (remote procedure
    calls) library with a built-in software load balancer (which is mostly used for
    client-side load balancing). Primarily it is used for `REST` calls with various
    serialization scheme support.


    ### Hystrix


    `Hystrix`^([^(47)](#fn47)) is a latency and fault-tolerance library designed to
    isolate points of access to remote systems, services, and third-party libraries,
    stop cascading failure, and enable resilience in complex distributed systems where
    failure is inevitable. `Hystrix` implements many resiliency patterns discussed
    in Chapter [2](#461146_1_En_2_Chapter.xhtml). It uses the `bulkhead` pattern to
    isolate dependencies from each other and to limit concurrent access to any one
    of them, and the `circuit breaker` pattern to proactively avoid talking to faulty
    endpoints. `Hystrix` reports successes, failures, rejections, and timeouts to
    the circuit breaker, which maintains a rolling set of counters that calculate
    statistics. It uses these stats to determine when the circuit should “trip,” at
    which point it short-circuits any subsequent requests until a recovery period
    elapses, upon which it closes the circuit again after doing certain health checks^([^(48)](#fn48)).


    ### Zuul


    `Zuul`^([^(49)](#fn49)) is a gateway service that provides dynamic routing, monitoring,
    resiliency, security, and more. It acts as the front door to `Netflix`’s server
    infrastructure, handling traffic from all `Netflix` users around the world. It
    also routes requests, supports developer testing and debugging, provides deep
    insight into `Netflix`’s overall service health, protects it from attacks, and
    channels traffic to other cloud regions when an `AWS` region is in trouble.


    ## Spring Boot


    `Spring Boot`^([^(50)](#fn50)) is the most popular microservices development framework
    for Java developers. To be precise, `Spring Boot` offers an opinionated^([^(51)](#fn51))
    runtime for `Spring`, which takes out a lot of the complexities. Even though `Spring
    Boot` is opinionated, it also allows developers to override many of its defaults
    picks. Due to the fact that many Java developers are familiar with `Spring`, and
    the ease of development is a key success factor in the microservices world, and
    many adopted `Spring Boot`. Even for Java developers who are not using `Spring`,
    it is a household name. If you have worked on `Spring`, surely would have worried
    about how painful it was to deal with large, chunky `XML` configuration files.
    Unlike `Spring`, `Spring Boot` thoroughly believes in convention over configuration—no
    more `XML` hell!


    ### Note


    *Convention over configuration* (also known as coding by convention) is a software
    design paradigm used by software frameworks that attempts to decrease the number
    of decisions that a developer using the framework is required to make without
    necessarily losing flexibility.^([^(52)](#fn52))


    `Spring Cloud`^([^(53)](#fn53)) came after `Spring Boot` in March 2015. It provides
    tools for developers to quickly build some of the common patterns in distributed
    systems. `Spring Cloud`, along with `Spring Boot`, provides a great development
    environment for microservices developers. Another feature of `Spring Cloud` is
    that it provides `Netflix OSS` integrations for `Spring Boot` apps through auto-configuration
    and binding to the `Spring` environment and other `Spring` programming model idioms.
    With a few simple annotations, you can enable and configure the common patterns
    inside your application and build large distributed systems with `Netflix OSS`
    components. The patterns provided include service discovery with `Eureka`, circuit
    breaker with `Hystrix`, intelligent routing with `Zuul`, and client-side load
    balancing with `Ribbon`. We’ll use `Spring Boot` and `Spring Cloud` for the code
    examples we discuss later in this chapter.


    ### Note


    Convention over configuration was first introduced by David Heinemeier Hansson
    to describe the philosophy of the Ruby on Rails web framework. Apache Maven, the
    popular build automation tool, follows the same philosophy.


    ## Istio


    `Istio` is an open platform that provides a uniform way to connect, manage, and
    secure microservices. It supports managing traffic flows between microservices,
    enforcing access policies, and aggregating telemetry data, all without requiring
    changes to the microservice code. With a strong backing from Google, IBM, Lyft,
    and many others, `Istio` is one of the leading *service mesh* products in the
    microservices domain. We’ll be discussing service mesh in detail in Chapter [9](#461146_1_En_9_Chapter.xhtml),
    “Service Mesh”. For the time being, service mesh is a component in microservice
    architecture, which facilitates service-to-service communication along with routing
    rules, adhering to the resiliency patterns we discussed in Chapter [2](#461146_1_En_2_Chapter.xhtml),
    such as retries, timeouts, circuit breaker, and bulkheads. It also does performance
    monitoring and tracing. In most cases, the service mesh acts as a sidecar (Chapter
    [2](#461146_1_En_2_Chapter.xhtml)), which will take the responsibility of handling
    the crosscutting features from the core microservice implementation. More details
    about `Istio` are covered in Chapter [9](#461146_1_En_9_Chapter.xhtml).'
