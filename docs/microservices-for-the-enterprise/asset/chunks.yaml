    ## Building GraphQL Services


    In Chapter [3](#461146_1_En_3_Chapter.xhtml), we discussed how GraphQL is used
    in some synchronous messaging scenarios in which the RESTful service architecture
    won’t fit. Let’s try to build a GraphQL-based service using Spring Boot. You can
    find the complete code for this available under `ch04/sample09`.


    By adding the `graphql-spring-boot-starter`^([^(81)](#fn81)) dependency to the
    project, you can get a GraphQL server running. Along with the GraphQL Java Tools
    library, you only need to write the code necessary for your service. First, we
    need to make sure that we have the following dependencies in our project.


    ```

    com.graphql-java

    graphql-spring-boot-starter

    3.6.0


    com.graphql-java

    graphql-java-tools

    3.2.0

    ```


    Spring Boot will pick up the corresponding dependencies and set up the appropriate
    handlers to work automatically. This will expose the GraphQL service at the `/graphql`
    endpoint by default (configured in the `/src/main/resources/application.properties`
    file under `sample09`) and will accept `POST` requests containing GraphQL payloads.
    The GraphQL Tools library works by processing GraphQL schema files to build the
    correct structure and then wires special beans to this structure. The Spring Boot
    GraphQL Starter (`graphql-spring-boot-starter`) automatically finds these schema
    files. Those files need to be saved with the extension `.graphqls` and can be
    present anywhere in the classpath.


    One mandatory requirement here is that there must be exactly one root query, and
    up to one root mutation. The root query needs to have special beans defined in
    the Spring context to handle various fields in it. The main requirements are that
    the beans implement the `GraphQLQueryResolver` interface and that every field
    in the root query from the schema have a method in one of those classes with the
    same name.


    ```

    public class Query implements GraphQLQueryResolver {

    private BookDao bookDao;

    public List getRecentBooks(int count, int offset) {

    return bookDao.getRecentBooks(count, offset);

    }

    }

    ```


    The method signature must have arguments corresponding to each parameter in the
    GraphQL schema. It should also return the correct return type for the type in
    the GraphQL schema. Any simple types—`String`, `Int`, `List`, etc.—can be used
    with the equivalent Java types, and the system just maps them automatically.


    The `getRecentBooks` method in the previous code snippet handles any GraphQL queries
    for the `recentBooks` field in the schema defined earlier.


    ```

    public class Book {

    private String id;

    private String title;

    private String category;

    private String authorId;

    }

    ```


    A Java bean represents every complex type in the GraphQL server. GraphQL also
    has a companion tool called *GraphiQL*^([^(82)](#fn82)). This is a user interface
    (UI) that can communicate with any GraphQL server and execute queries and mutations
    against it. Fields inside the Java bean will directly map to the fields in the
    GraphQL response based on the name of the field. The instructions on how to run
    `sample09` is available in the README file under `ch04/sample09` directory, in
    the samples Git repository.'
