  trans: '

    ## 缓存


    作为微服务数据管理技术的一部分，缓存发挥着关键作用，因为它能提升特定微服务的可用性、可扩展性和性能。在每个微服务层面，我们都可以缓存该服务所操作的业务实体。通常，这类业务实体（或对象）不会频繁变更（例如，产品信息服务会将产品名称和详情缓存起来，这些信息在商品搜索中会被频繁使用）。这类数据通常可以按需缓存（当我们首次从底层数据存储中访问产品信息时）。此外，你还可以在服务启动时缓存任何服务级别的元数据（配置或静态数据）。


    缓存最重要的一个方面是，不要使用在微服务之间共享的中央缓存层。然而，特定微服务的所有实例都具有相同的数据需求，因此在这些实例之间共享一个缓存层是合理的。


    市面上有不少缓存解决方案，但 Redis^(⁸⁵)、Ehcache^(⁸⁶)、Hazelcast^(⁸⁷) 和 Coherence^(⁸⁸) 是其中较为流行的缓存实现。特别是
    Redis，已在开源和容器原生微服务缓存场景中得到广泛应用。Redis 是一个开源的内存数据结构存储系统，可用作数据库、缓存和消息代理。它支持多种数据结构，如字符串、哈希、列表、集合、带范围查询的有序集合、位图、HyperLogLog
    以及带半径查询的地理空间索引。虽然 Redis 在微服务上下文中主要用于缓存，但它也可以用作数据库或消息代理（发布-订阅消息）。


    ## 总结


    在本章中，我们讨论了在微服务架构中可以使用的去中心化数据管理技术。每个微服务拥有独立数据库的模式带来了一系列优势，也带来了若干挑战。当每个微服务只能操作一个独立的私有数据库时，传统的跨多个表使用
    SQL 进行数据共享、表之间的外键约束等依赖关系将不再适用。


    我们讨论了几种可用于在微服务之间共享数据的技术，例如通过访问服务接口进行运行时查找、使用本地缓存进行基于异步事件的数据共享，以及通过事件驱动通信维护物化视图。


    事务是微服务分布式数据管理中的主要挑战之一。由于每个服务都有专用的数据库，且服务不允许直接访问外部数据库，你无法再定义跨多个业务服务（多个表）的事务边界。由于可扩展性方面的固有限制，使用两阶段提交的分布式事务并非可行选项。Saga
    为两阶段提交的分布式事务提供了一种替代方案。通过使用与相应补偿事务关联的子事务，我们可以构建跨多个微服务的事务安全业务场景。


