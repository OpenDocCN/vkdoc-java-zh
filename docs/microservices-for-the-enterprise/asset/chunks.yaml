    # 4. Developing Services


    Netflix has taken three steps to build an anti-fragile organization^([^(39)](#fn39))
    . The first step is to treat every developer as an operator of the corresponding
    service. The second is to treat each failure as an opportunity to learn and the
    third is to foster a blameless culture. These three little steps have helped Netflix
    become the top-leading organization in the microservices world. Many look to Netflix
    to learn how things are being done and for best practices. Netflix in fact optimized
    everything for the speed of delivery. As we already discussed in the book, at
    its core of any microservices design, time to production, scalability, complexity
    localization, and resiliency are key elements. Developer experience is one of
    the most important factors to reach these goals. The experience of a developer
    in a microservices environment is quite different from engineering a monolithic
    application. As rightly identified by Netflix, the developer’s task does not end
    after pushing the code into a source repository and expecting a DevOps engineer
    to build and push the changes to production, or a support engineer to take on
    any issues that happen in the production environment. A microservices development
    environment demands a broader skillset from the developer.


    ### Note


    All Netflix developers are given SSH keys to access their production servers,
    where in most of the traditional application deployments, developers have no access
    from staging onward.


    Over the past few years there have been many tools and frameworks developed to
    assist and speed up microservices development. Most of the popular tools and frameworks
    are open source. In this chapter, we discuss different options available for a
    microservices developer and see how to build a microservice from the ground up.


    ## Developer Tooling and Frameworks


    There are multiple tools and frameworks available for microservice developers
    under different categories. There are a few key elements we believe one should
    take into consideration before picking the right microservices framework. One
    of the very basic requirements is to have good support for RESTful services. In
    the Java world, most developers look for the level of support for JAX-RS^([^(40)](#fn40)).
    Most of the Java-based frameworks do support JAX-RS based annotations, but to
    extend that functionality, they have introduced their own.


    The seventh factor of the 12-factor app (which we discussed in Chapter [2](#461146_1_En_2_Chapter.xhtml),
    “Designing Microservices”) says that your application has to do the port binding
    and expose itself as a service, without relying upon a third-party application
    server. This is another common requirement for any microservices framework. Without
    relying on any heavyweight application servers, which eat resources and take seconds
    (or minutes) to boot up, one should be able to spin up a microservice in a self-contained
    manner in just a few milliseconds.


    Most of the microservice deployments follow the service per host model. In other
    words, only one microservice is deployed in one host, wherein most cases, the
    host is a container. It’s a key aspect that everyone looks for in a microservice
    framework to be container friendly. What container friendly (or container native)
    means is discussed in detail in Chapter [8](#461146_1_En_8_Chapter.xhtml), “Deploying
    and Running Microservices”. The level of security support that the language provides
    is another key differentiator in picking a microservice framework. There are multiple
    ways to secure a microservice and provide the service-to-service communication
    between microservices. We discuss microservices security in Chapter [11](#461146_1_En_11_Chapter.xhtml),
    “Microservices Security Fundamentals”.


    The first class language support for telemetry and observability is another important
    aspect in a microservice framework. It’s extremely useful to track the health
    of the production servers and to identify any issues. We discuss observability
    in Chapter [13](#461146_1_En_13_Chapter.xhtml), “Observability”. Another two important
    aspects of a microservice framework is its support for transactions and asynchronous
    messaging. Asynchronous messaging was discussed in Chapter [3](#461146_1_En_3_Chapter.xhtml),
    “Inter-Service Communication,” and in Chapter [5](#461146_1_En_5_Chapter.xhtml),
    “Data Management,” we discuss how transactions are handled in a microservices
    environment.


    The following sections explain the most popular microservice frameworks and tools.
    Later in the chapter, we go through a set of examples developed with Spring Boot,
    which is the most popular microservice development framework for Java developers.


    ### Netflix OSS


    As we already discussed in this chapter, Netflix is playing a leading role in
    the microservices domain, and its influence on making microservices mainstream
    and widely adopted is significant. The beauty of Netflix is its commitment toward
    open source. The Netflix Open Source Software^([^(41)](#fn41)) (OSS) initiative
    has around 40 open source projects under different categories (see Figure [4-1](#461146_1_En_4_Chapter.xhtml#Fig1)).
    The following sections explain some of the common tools under Netflix OSS that
    are related to microservices development.


    #### Nebula


    Nebula^([^(42)](#fn42)) is a collection of Gradle plugins built for Netflix engineers
    to eliminate boilerplate build logic and provide sane conventions. The goal of
    Nebula is to simplify common build, release, testing, and packaging tasks needed
    for projects at Netflix. They picked Gradle over Maven as the build tool, as they
    believe it’s the best out there for Java applications.'
