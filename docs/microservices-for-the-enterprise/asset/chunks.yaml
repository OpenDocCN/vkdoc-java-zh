    event executes payment processing and then triggers the `PAYMENT_PROCESSING_COMPLETED`
    event. The `Supplier Management` microservice listening to the `PAYMENT_PROCESSING_COMPLETED`
    event checks whether the number of items in the stocks is above the minimal threshold
    and if not notifies the suppliers. The `Delivery` microservice listening to the
    same event executes its operations to look up the items (probably sending instructions
    to warehouse bots) and then groups the items together to build the order and make
    it ready for delivery. Once that’s done, the `Delivery` microservice will trigger
    the `ORDER_DISPATCHED` event, which notifies the `Order Processing` microservice,
    and will update the order status.


    ![../images/461146_1_En_2_Chapter/461146_1_En_2_Fig4_HTML.jpg](images/461146_1_En_2_Chapter/461146_1_En_2_Fig4_HTML.jpg)


    Figure 2-4


    Communication between bounded contexts


    A good design will scope out one microservice to a single bounded context. Any
    microservice expanding across multiple bounded contexts deviates from the original
    goals. When we have one microservice, encapsulating the business logic behind
    a well defined interface and representing one bounded context, bringing in new
    changes will have no or minimal impact on the complete system.'
  trans: '

    ### 限界上下文


    正如我们之前讨论的，微服务设计中最具挑战性的部分之一就是界定微服务的范围。这正是 SOA 及其实现中范围定义不明确的地方。在 SOA 中，进行设计时，我们会考虑整个企业。它不会关注单个业务领域，而是将企业视为一个整体。它不会将库存与订单管理、计费与财务、配送与客户管理视为独立的领域，而是将整个系统视为一个企业级电子商务应用。


    图 2-3 展示了一位 SOA 架构师设计的电子商务应用的分层架构。对于有 SOA 背景的人来说，这应该非常熟悉。这里我们看到的实际上是一个单体应用。尽管服务层将某些功能作为服务暴露出来，但它们之间并没有解耦。服务的范围界定并非基于它们所属的业务领域。例如，`订单处理`服务可能同时处理计费和配送。在第一章
    1，“微服务的理由”中，我们讨论了这种单体架构的缺陷。


    ![../images/461146_1_En_2_Chapter/461146_1_En_2_Fig3_HTML.jpg](img/461146_1_En_2_Fig3_HTML.jpg)


    图 2-3

    电子商务应用的分层架构


    正如我们在上一节中讨论的，领域驱动设计有助于界定微服务的范围。微服务的范围是围绕一个*限界上下文*来界定的。限界上下文是微服务设计的核心。埃里克·埃文斯在其著作《领域驱动设计：软件核心复杂性应对之道》中首次将限界上下文作为一种设计模式引入。其理念是，任何给定的领域都由多个限界上下文组成，每个限界上下文将相关功能封装到领域模型中，并定义与其他限界上下文的集成点。换句话说，每个限界上下文都有一个明确的接口，用于定义哪些模型可以与其他上下文共享。通过明确定义应共享哪些模型，并且不共享内部表示，我们可以避免可能导致紧耦合的潜在陷阱。这些模块化的边界是微服务的绝佳候选。通常，微服务应该清晰地与限界上下文对齐。如果服务边界与相应领域的限界上下文对齐，并且微服务代表了这些限界上下文，那么这很好地表明微服务是松耦合且高内聚的。


    ### 注意


    限界上下文是一个明确的边界，领域模型存在于该边界之内。在边界内部，通用语言的所有术语和短语都具有特定含义，并且模型精确地反映了该语言。^(¹)


    让我们用限界上下文来扩展之前的例子。在那里我们确定了四个领域：库存与订单管理、计费与财务、配送以及客户管理。我们设计的每个微服务都归属于其中一个领域。尽管微服务与领域之间是一对一的关系，但我们现在知道，一个领域可以有多个限界上下文，因此也可以有多个微服务。例如，以库存与订单管理领域为例，我们有`订单处理`微服务，但基于不同的限界上下文（例如，`库存`微服务），我们也可以有多个其他微服务。要做到这一点，我们需要更仔细地审视库存与订单管理领域下提供的核心功能，并识别出相应的限界上下文。


    ### 注意


    建议限界上下文通过各自拥有独立的团队、代码库和数据库模式来保持其分离性。


    企业的库存与订单管理部门负责管理库存，并确保现有库存能够满足客户需求。它还需要知道何时向供应商订购更多库存，以优化销售和仓储设施。每当收到新订单时，它必须更新库存并锁定相应物品以供配送。一旦计费部门完成并确认付款，配送部门就必须在其仓库中定位该物品，并使其可供拣选和配送。同时，当商店中某物品的可用数量达到某个阈值时，库存与订单管理部门应联系供应商以获取更多库存，并在收到后更新库存。


    领域驱动设计的一个关键亮点是领域专家与开发人员之间的协作。除非你正确理解库存管理部门在企业内部是如何运作的，否则你永远无法识别出相应的限界上下文。基于我们之前讨论的内容，凭借我们对库存管理的有限理解，我们可以识别出以下三个限界上下文。


    *   *订单处理*：此限界上下文封装了与处理订单相关的功能，包括锁定订单中的库存物品、记录客户订单等。


    *   *库存*：库存本身可以被视为一个限界上下文。它负责在收到供应商的物品后更新库存，并释放物品以供配送。


    *   *供应商管理*：此限界上下文封装了与供应商管理相关的功能。在释放物品以供配送时，供应商管理会检查库存中是否有足够的库存，如果没有，则通知相应的供应商。


    图 2-4 展示了库存与订单管理领域下的多个微服务，每个微服务代表一个限界上下文。在这里，服务边界与相应领域的限界上下文对齐。限界上下文之间的通信仅通过针对明确定义的接口传递消息来进行。如图
    2-4 所示，`订单处理`微服务首先更新`库存`微服务以锁定订单中的物品，然后触发`ORDER_PROCESSING_COMPLETED`事件。监听`ORDER_PROCESSING_COMPLETED`事件的`计费`微服务执行支付处理，然后触发`PAYMENT_PROCESSING_COMPLETED`事件。监听`PAYMENT_PROCESSING_COMPLETED`事件的`供应商管理`微服务检查库存中的物品数量是否高于最低阈值，如果低于则通知供应商。监听同一事件的`配送`微服务执行其操作以查找物品（可能向仓库机器人发送指令），然后将物品分组以构建订单并使其准备好配送。完成后，`配送`微服务将触发`ORDER_DISPATCHED`事件，该事件通知`订单处理`微服务，并更新订单状态。


    ![../images/461146_1_En_2_Chapter/461146_1_En_2_Fig4_HTML.jpg](img/461146_1_En_2_Fig4_HTML.jpg)


    图 2-4

    限界上下文之间的通信


    一个好的设计会将一个微服务的范围界定为单个限界上下文。任何跨越多个限界上下文的微服务都偏离了最初的目标。当我们拥有一个微服务，它将业务逻辑封装在定义良好的接口之后，并代表一个限界上下文时，引入新的变更将对整个系统没有影响或影响极小。

