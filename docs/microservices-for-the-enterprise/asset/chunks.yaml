    ## gRPC 入门


    在第 3 章中，我们讨论了 gRPC 的基础知识。在本节中，我们将了解一个微服务如何通过 gRPC 与另一个微服务通信。在上一节中，我们了解了`订单处理`微服务（`sample01`）如何通过
