  trans: '

    #### 使用 YAML 文件创建服务


    尽管我们已经运行了一个 Pod，但其中运行的微服务在 Pod 外部是无法访问的。要将微服务暴露到 Pod 外部，我们需要创建一个服务。同样，要定义一个服务，我们需要一个服务描述文件，即一个
    YAML 文件，如下所示。完整的 YAML 文件（`ecomm-service.yml`）位于 `ch08/sample03` 目录中。


    ```

    apiVersion: v1

    kind: Service

    metadata:

    name: ecomm-service

    spec:

    selector:

    app: ecommapp

    ports:

    - port: 80

    targetPort: 9000

    type: NodePort

    ```


    这里可以看到 `kind` 属性的值被设置为 `Service`，并且在 `selector/app` 属性下，其值被设置为我们之前创建的 `ecomm-pod`
    的 `label`。此服务通过 HTTP 端口 80 暴露给外部世界，发往该端口的流量将被路由到端口 9000（`targetPort`），即“订单处理”微服务的端口。最后，另一个我们不能忽略的重要属性是
    `type`，其值被设置为 `NodePort`。当服务类型的值设置为 `NodePort` 时，它会在每个节点的 IP 上通过一个静态端口暴露该服务。


    让我们从 `ch08/sample03` 目录运行以下命令来创建服务。


    ```

    :\> kubectl create -f ecomm-service.yml

    service/ecomm-service created

    ```


    如果服务创建成功，以下命令应返回服务的状态。在那里你可以看到服务的端口 80 被映射到了 Kubernetes 主节点的端口 32179。


    ```

    :\> kubectl get svc

    NAME            TYPE        CLUSTER-IP      EXTERNAL-IP   PORT(S)

    ecomm-service   NodePort    10.97.200.207           80:32179/TCP

    kubernetes      ClusterIP   10.96.0.1               443/TCP

    ```


    如果你想删除一个服务，请使用以下命令。这只会移除服务，而不会删除对应的 Pod。


    ```

    :\> kubectl delete -f ecomm-service.yml

    ```


    #### 使用 cURL 测试 Pod


    现在让我们从宿主机调用“订单处理”服务。这里我们使用 Kubernetes 集群主节点的 IP 地址（你可以通过 `kubectl cluster-info`
    命令获取）。


    ```

    :\> curl http://192.168.99.100:32179/order/11

    {"customer_id":"101021","order_id":"11","payment_method":{"card_type":"VISA","expiration":"01/22","name":"John
    Doe","billing_address":"201, 1st Street, San Jose, CA"},"items":[{"code":"101","qty":1},{"code":"103","qty":5}],"shipping_address":"201,
    1st Street, San Jose, CA"}

    ```


    这个请求仅访问了“订单处理”微服务，并未验证两个微服务之间的通信。让我们使用以下请求通过“订单处理”微服务创建一个订单，该请求随后也会更新“库存”微服务。


    ```

    curl -v -H "Content-Type: application/json" -d ''{"customer_id":"101021","payment_method":{"card_type":"VISA","expiration":"01/22","name":"John
    Doe","billing_address":"201, 1st Street, San Jose, CA"},"items":[{"code":"101","qty":1},{"code":"103","qty":5}],"shipping_address":"201,
    1st Street, San Jose, CA"}''  http://192.168.99.100:32179/order

    ```


    我们可以通过查看其日志来确认我们的请求是否访问了“库存”微服务。以下命令有助于从运行在 Pod 中的容器获取日志。这里，`ecomm-pod` 是 Pod
    的名称，`inventory` 是容器名称（如 Pod 部署描述符 YAML 文件中定义的那样）。“库存”微服务的日志会打印出我们订单请求中的商品代码。


    ```

    :\> kubectl logs ecomm-pod -c inventory


    ```


    #### 同一 Pod 内的容器之间如何进行通信？


    在一个 Pod 内部，微服务之间的通信可以通过多种方式进行。在此示例中，“订单处理”微服务使用 `localhost` 作为主机名与“库存”微服务通信，如下方位于
    `ch08/sample04/ src/main/java/com/apress/ch08/sample04/service/OrderProcessing.java`
    的代码库所示。在那里你可以看到，我们使用的是 *localhost*（`http://`*localhost*`:9090/inventory`），而不是
    IP 地址或主机名。


    ```

    @RequestMapping(method = RequestMethod.POST)

    public ResponseEntity createOrder(@RequestBody Order order) {

    if (order != null) {

    RestTemplate restTemplate = new RestTemplate();

    URI uri = URI.create(

    "http://inventory:9090/inventory");

    restTemplate.put(uri, order.getItems());

    order.setOrderId(UUID.randomUUID().toString());

    URI location = ServletUriComponentsBuilder

    .fromCurrentRequest().path("/{id}")

    .buildAndExpand(order.getOrderId())

    .toUri();

    return ResponseEntity.created(location).build();

    }

    return ResponseEntity.status(

    HttpStatus.BAD_REQUEST).build();

    }

    ```


    除了通过 localhost 使用 HTTP 之外，在单个 Pod 内进行容器间通信还有两种其他流行选项：使用共享卷和使用进程间通信（IPC）。我们建议感兴趣的读者参考
    Kubernetes 文档^(¹¹³)中关于这些主题的内容。


    #### 不同 Pod 中的容器之间如何进行通信？


    不同 Pod 中的容器通过 Pod IP 地址和相应的端口相互通信。在 Kubernetes 集群中，每个 Pod 都有自己独特的 IP 地址。

    '
- fmt: '#### Deployments and Replica Sets


    Even though we discussed creating a pod using a deployment descriptor, in practice
    you will never use it. You’ll use a deployment instead. A *deployment* is an object
    type in Kubernetes (just like a pod) that helps us manage pods using ReplicaSets.
    A *ReplicaSet* is an essential component in a Kubernetes cluster where you can
    specify how you want to scale up and down a given pod. Before we create a deployment,
    let’s do some clean up by deleting the pod we created and the corresponding service.


    The following commands first delete the service and then the pod. You need to
    run these commands from the `ch08/sample03` directory.


    ```

    :\> kubectl delete -f ecomm-service.yml

    :\> kubectl delete -f ecomm-pod.yml

    ```


    Now, to create a deployment, we need to define our requirements in a deployment
    descriptor, which is a YAML file. The complete YAML file (`ecomm-deployment.yml`)
    is available in the `ch08/sample03` directory. Here you can see that the value
    of the `kind` attribute is set to `Deployment`. The value of `spec/replicas` is
    set to `3`, which means this deployment will create three instances of the pod
    defined under `template`. Just like in the deployment descriptor for the pod (which
    we used before), here too we define the container images those should be part
    of the pod, created under this deployment.


    ```

    apiVersion: apps/v1beta1

    kind: Deployment

    metadata:

    name: ecomm-deployment

    spec:

    replicas: 3

    template:

    metadata:

    labels:

    app: ecomm-deployment

    spec:

    containers:

    - name: orderprocessing

    image: prabath/sample04

    ports:

    - containerPort : 9000

    - name: inventory

    image: prabath/sample02

    ports:

    - containerPort : 9090

    ```


    Let’s use the following command from `ch08/sample03` to create a deployment.


    ```

    :\> kubectl create -f ecomm-deployment.yml

    deployment.apps/ecomm-deployment created

    ```


    If the deployment is successfully created, the following command should return
    the status of it. The output says that three replicas of the pod defined under
    the corresponding deployment have been created and are ready to use.


    ```

    :\> kubectl get deployments

    NAME               DESIRED   CURRENT   UP-TO-DATE   AVAILABLE   AGE

    ecomm-deployment   3         3         3            3           23m

    ```


    The following command shows all the pods created by this deployment.


    ```

    :\> kubectl get pods

    NAME                                READY  STATUS    RESTARTS AGE

    ecomm-deployment-546f8c4d6b-67ttd   2/2    Running   1        24m

    ecomm-deployment-546f8c4d6b-hldnf   2/2    Running   0        24m

    ecomm-deployment-546f8c4d6b-m9vmt   2/2    Running   0        24m

    ```


    Now we need to create a service pointing to this deployment, so the services running
    in the pods are accessible from the outside. Here we use `ecomm-dep-service.yml`,
    which is available in the `ch08/sample03` directory, to create the service. The
    only difference from the previous case is the value of `spec/select/app`, and
    it now points to the `labels/app` of the deployment.


    ```

    apiVersion: v1

    kind: Service

    metadata:

    name: ecomm-service

    spec:

    selector:

    app: ecomm-deployment

    ports:

    - port: 80

    targetPort: 9000

    type: NodePort

    ```


    Let’s use the following command from `ch08/sample03` to create the service.


    ```

    :\> kubectl create -f ecomm-dep-service.yml

    service/ecomm-service created

    ```


    If the service is successfully created, the following command should return the
    status of the service. There you can see that port 80 of the service is mapped
    to port 31763 of the Kubernetes master node.


    ```

    :\> kubectl get svc

    NAME           TYPE       CLUSTER-IP     EXTERNAL-IP  PORT(S)

    ecomm-service  NodePort   10.111.102.84         80:31763/TCP

    kubernetes     ClusterIP  10.96.0.1             443/TCP

    ```


    Now let’s invoke the `Order Processing` service from the host machine.


    ```

    :\> curl http://192.168.99.100:31763/order/11

    {"customer_id":"101021","order_id":"11","payment_method":{"card_type":"VISA","expiration":"01/22","name":"John
    Doe","billing_address":"201, 1st Street, San Jose, CA"},"items":[{"code":"101","qty":1},{"code":"103","qty":5}],"shipping_address":"201,
    1st Street, San Jose, CA"}

    ```


    #### Scaling a Deployment


    In the previous section, we started our deployment with three replicas or three
    instances of the pod defined under the deployment descriptor. The following command
    shows how to scale the replicas to five. Here, `deployment.extensions/ecomm-deployment`
    is the name of our deployment.


    ```

    :\> kubectl scale --replicas=5 deployment.extensions/ecomm-deployment

    deployment.extensions/ecomm-deployment scaled

    ```


    Immediately after this command, if you run the following, you will find that new
    two pods are created.


    ```

    :\> kubectl get pods

    NAME                               READY   STATUS             RESTARTS

    ecomm-deployment-546f8c4d6b-67ttd  2/2     Running            1

    ecomm-deployment-546f8c4d6b-hldnf  2/2     Running            0

    ecomm-deployment-546f8c4d6b-hsqnp  0/2     ContainerCreating  0

    ecomm-deployment-546f8c4d6b-m9vmt  2/2     Running            0

    ecomm-deployment-546f8c4d6b-vt624  0/2     ContainerCreating  0

    ```


    If you run the same command again in a few seconds, you find that all the pods
    are successfully created.


    ```

    NAME                               READY   STATUS             RESTARTS

    ecomm-deployment-546f8c4d6b-67ttd  2/2     Running            1

    ecomm-deployment-546f8c4d6b-hldnf  2/2     Running            0

    ecomm-deployment-546f8c4d6b-hsqnp  0/2     Running            0

    ecomm-deployment-546f8c4d6b-m9vmt  2/2     Running            0

    ecomm-deployment-546f8c4d6b-vt624  0/2     Running            0

    ```


    #### Autoscaling a Deployment


    Kubernetes also lets you autoscale a deployment based on certain parameters. For
    example, the following command sets the `ecomm-deployment` to autoscale based
    on the average CPU utilization. If the average CPU utilization across all the
    pods is over 50%, then the system should start scaling up to 10 replicas. At the
    same time, if the CPU utilization goes below 50%, the system should scale down
    to one replica.


    ```

    :\> kubectl autoscale deployment ecomm-deployment --cpu-percent=50 --min=1 --max=10

    horizontalpodautoscaler.autoscaling/ecomm-deployment autoscaled

    ```


    #### Helm: Package Management with Kubernetes


    Helm^([^(114)](#fn114)) is a package manager for Kubernetes, and it makes it possible
    to organize Kubernetes objects in a packaged application that anyone can download
    and install in one click or customize. Such packages are known as *charts* in
    Helm. Using Helm charts, you can define, install, and upgrade even the most complex
    Kubernetes applications.


    A chart is a collection of files that describes a related set of Kubernetes resources.
    A single chart might be used to deploy something simple, like a memcached pod,
    or something complex, like a full web app stack with HTTP servers, databases,
    caches, and so on. Installing a chart is quite similar to installing a package
    using a package management tool such as Apt or Yum. Once you have Helm up and
    running, installing a package can be as simple as running `helm install stable/mysql`
    in the command line.


    Helm charts describe even the most complex apps, provide repeatable application
    installation, and serve as a single point of authority. Also, you can build lifecycle
    management for your Kubernetes-based microservices as charts, which are easy to
    version, share, and host on public or private servers. You can also roll back
    to any specific version if required.


    ## Microservices Deployment Patterns


    Based on the business requirements, we find that there are multiple deployment
    patterns for microservices. Microservices were there a while, even before the
    containers became mainstream, and these deployment patterns have evolved over
    time. In the following sections, we weigh the pros and cons of each of these deployment
    patterns.'
