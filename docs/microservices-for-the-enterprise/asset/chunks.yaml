    ## Summary


    In this chapter, we discussed the common patterns and fundamentals related to
    securing microservices. Securing service-to-service communication is the most
    critical part in securing microservices, where we have two options with JWT and
    certificates. Edge security is mostly handled by the API gateway with OAuth 2.0\.
    There are two models in access controlling microservices: centralized PDP and
    embedded PDP. Toward the end of the chapter, we also discussed the value of a
    security sidecar in the microservice architecture. Understanding the fundamentals
    of securing microservices is a key to build a production-ready microservices deployment.
    In the next chapter, we discuss how to implement security for microservices using
    Spring Boot.


