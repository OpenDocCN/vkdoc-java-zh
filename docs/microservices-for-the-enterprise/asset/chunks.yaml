- fmt: '### Protecting a Microservice with JWT


    In this section, we see how to extend the `Order Processing` microservice we used
    in the previous section (`ch12/sample02/`) to support self-issued access tokens
    or JWTs. We only need to comment out the `security.oauth2.resource.user-info-uri`
    property and uncomment the `security.oauth2.resource.jwt.keyUri` property in the
    `sample02/src/main/resources/application.properties` file. The complete `application.properties`
    file will look like the following.


    ```

    #security.oauth2.resource.user-info-uri:https://localhost:8443/user

    security.oauth2.resource.jwt.keyUri: https://localhost:8443/oauth/token_key

    ```


    Here the value of `security.oauth2.resource.jwt.keyUri` points to the public key
    corresponding to the private key, which is used to sign the JWT by the authorization
    server. It’s an endpoint hosted under the authorization server. If you just type
    `https://localhost:8443/oauth/token_key` on the browser, you will find the public
    key, as shown here. This is the key the resource server, or in this case, the
    `Order Processing` microservice uses to verify the signature of the JWT included
    in the request.


    ```

    {

    "alg":"SHA256withRSA",

    "value":"-----BEGIN PUBLIC KEY-----\\n-----END
    PUBLIC KEY-----"

    }

    ```


    Once we have a JWT access token obtained from the OAuth 2.0 authorization server,
    in the same as we did before, with the following cURL command, we can access the
    protected resource. Make sure the value of `$TOKEN` is replaced with a valid access
    token.


    ```

    \> curl -k -H "Authorization: Bearer $TOKEN" https://localhost:9443/order/11

    {"customer_id":"101021","order_id":"11","payment_method":{"card_type":"VISA","expiration":"01/22","name":"John
    Doe","billing_address":"201, 1st Street, San Jose, CA"},"items":[{"code":"101","qty":1},{"code":"103","qty":5}],"shipping_address":"201,
    1st Street, San Jose, CA"}

    ```


    ## Controlling Access to a Microservice


    There are multiple ways to control access to microservices. In this section, we
    see how to control access to different operations in a microservice based on the
    scopes associated with the access token and the user’s roles.


    ### Scope-Based Access Control


    Here we use self-contained access tokens (or JWTs) and first you need to have
    a valid JWT obtained from the OAuth 2.0 authorization server. The following command
    will get you a JWT access token with the scope `foo`. Make sure to replace the
    value of `$CLIENTID` and `$CLIENTSECRET` appropriately and keep the `sample01`
    (which is our authorization server) running.


    ```

    \> curl -v -X POST --basic -u $CLIENTID:$CLIENTSECRET -H "Content-Type: application/x-www-form-urlencoded;charset=UTF-8"
    -k -d "grant_type=client_credentials&scope=foo" https://localhost:8443/oauth/token

    ```


    To enable scope-based access control for the `Order Processing` microservice (`sample02`),
    we need to add the `@EnableGlobalMethodSecurity` annotation to the `sample02/src/main/java/com/apress/ch12/sample02/OrderProcessingApp.java`
    class, as shown here.


    ```

    @SpringBootApplication

    @EnableGlobalMethodSecurity(prePostEnabled = true)

    @EnableResourceServer

    public class OrderProcessingApp {

    }

    ```


    Now let’s use the `@PreAuthorize` annotation at the method level to enforce scope-based
    access control. The following method in the `sample02/src/main/java/com/apress/ch12/sample02/service/OrderProcessing.java`
    class requires the `bar` scope to access it.


    ```

    @PreAuthorize("#oauth2.hasScope(''bar'')")

    @RequestMapping(value = "/{id}", method= RequestMethod.GET)

    public ResponseEntity getOrder(@PathVariable("id") String orderId) {

    }

    ```


    Let’s try run the following cURL command, with the previously obtained JWT access
    token, which only has the `foo` scope. The command should result in an error,
    since our token does not carry the required scope value.


    ```

    \> curl -k -H "Authorization: Bearer $TOKEN" https://localhost:9443/order/11

    {"error":"access_denied","error_description":"Access is denied"}

    ```


    ### Role-Based Access Control


    Just like in the previous section, here we have to use self-contained access tokens
    (or JWTs) and first you need to have a valid JWT obtained from the OAuth 2.0 authorization
    server.


    The following cURL command will give you a JWT access token using the `password`
    grant type. Be sure to replace the values of `$CLIENTID`, `$CLIENTSECRET`, `$USERNAME`,
    and `$PASSWORD` appropriately. Unlike in the scope-based scenario, the client
    credentials grant type won’t work here, as by default, no roles are associated
    with clients (only with users).


    ```

    \> curl -v -X POST --basic -u $CLIENTID:$CLIENTSECRET -H "Content-Type: application/x-www-form-urlencoded;charset=UTF-8"
    -k -d "grant_type=password&username=$USERNAME&password=$PASSWORD&scope=foo" https://localhost:8443/oauth/token

    ```


    To enable role-based access control for the `Order Processing` microservice (`sample02`),
    we need to add the `@EnableGlobalMethodSecurity` annotation to the `sample02/src/main/java/com/apress/ch12/sample02/OrderProcessingApp.java`
    class, as shown here (this is the same step we did while setting up scope-based
    access control in the previous section).


    ```

    @SpringBootApplication

    @EnableGlobalMethodSecurity(prePostEnabled = true)

    @EnableResourceServer

    public class OrderProcessingApp {

    }

    ```


    Now let’s use the `@PreAuthorize` annotation at the method level to enforce role-based
    access control. The following method in the `sample02/src/main/java/com/apress/ch12/sample02/service/OrderProcessing.java`
    class requires the `USER` role to access it. By default, we add the `USER` role
    to the user named `peter`, from our authorization server. Hence an access token
    issued to him should be good enough to access this operation.


    ```

    @PreAuthorize("hasRole(USER)")

    @RequestMapping(value = "/{id}", method= RequestMethod.GET)

    public ResponseEntity getOrder(@PathVariable("id") String orderId) {

    }

    ```


    Let’s try to run the following cURL command, with the previously obtained JWT
    access token, which only has the `foo` scope. If it’s issued to a user having
    the `USER` role it should result in a successful response.


    ```

    \> curl -k -H "Authorization: Bearer $TOKEN" https://localhost:9443/order/11

    ```


    Finally, if we want to control access to a method both by the scope and the role,
    we can use the following annotation against the corresponding method.


    ```

    @PreAuthorize("#oauth2.hasScope(''bar'') and hasRole(''USER'')")

    ```


    ## Securing Service-to-Service Communication


    In the previous section, we discussed how to set up an OAuth 2.0 authorization
    and secure a microservice with OAuth 2.0. In this section, we see how to invoke
    one microservice from another securely. We follow two approaches here—one is based
    on JWT and the other is based on TLS mutual authentication.'
