  trans: '

    ### 事件通知


    事件通知是 EDA 的一种常见形式，即某个服务发送事件，以通知其他服务其领域内发生的变化。通常，事件接收方必须拥有自主权来决定是否执行任务。事件本身无需携带大量数据；通常，提供一个可获取更新信息的引用就足够了。


    例如，如图 10-3 所示，假设我们有两个微服务，分别名为 `Customer` 和 `Shipping`。当客户信息（例如客户地址）发生变化时，我们可以向
    `Shipping` 服务发送一个事件通知。该事件本身可能不包含变更的所有细节，但会包含一个引用，指向可以获取变更相关信息的位置。如第 3 章所述，基于事件的异步通信可用于实现此类场景；我们可以使用基于队列的通信或基于主题的通信来实现。


    ![../images/461146_1_En_10_Chapter/461146_1_En_10_Fig3_HTML.jpg](img/461146_1_En_10_Fig3_HTML.jpg)


    图 10-3


    事件通知


    显然，大多数消息/事件代理解决方案都可以作为实现此模式的基础架构，而 Kafka、RabbitMQ 和 ActiveMQ 在该领域最为常用。


    将逻辑流作为事件通知的一部分来运行是一种反模式。例如，如果你的事件发布者期望接收者在收到事件后执行某些特定任务，那么事件发布者和接收者之间就存在逻辑流。一些纯粹理论性的微服务书籍和其他资料建议，微服务的每一次集成/组合都必须使用异步事件驱动通信。这实际上意味着在你的微服务之间会存在通过事件通知运行的逻辑流。


    拥有这类逻辑流并非一种实用的方法，因为它们极难管理和排查。或许，你唯一能推导出此类逻辑流的方法是通过可观测性（链路追踪）。因此，在将事件通知模式应用于需要传递命令（你期望接收者在收到事件后执行明确任务）的场景时，你需要格外谨慎。


    ### 事件携带状态传输


    这是事件通知模式的一种细微变体。当事件被触发时，订阅者会收到包含变更数据详细信息的事件。因此，接收方服务无需访问或引用任何其他系统或服务。数据已作为事件的一部分被接收。图
    10-4 展示了我们在上一节讨论的相同场景，但现在已修改为使用事件携带状态传输。


    ![../images/461146_1_En_10_Chapter/461146_1_En_10_Fig4_HTML.jpg](img/461146_1_En_10_Fig4_HTML.jpg)


    图 10-4


    事件携带状态传输


    这种方法的一个潜在缺点是数据会在多个服务间重复，因为所有订阅者都会收到相同的数据。其实现技术可能与事件通知类似。另一方面，它也能减少网络流量，因为在这种方法中，运输服务无需向客户服务发送请求来获取更新后的地址。


    ### 事件溯源


    通过使用异步消息传递技术，我们可以将实体的每个状态变更事件持久化存储为一系列事件。所有这些事件都存储在事件总线或事件日志中，订阅者可以通过处理该实体上发生的事件序列来推导出该实体的状态。例如，如图
    10-5 所示，`Order Processing` 服务将 `Order` 实体上发生的变化作为事件发布。诸如 `order created`、`updated`、`paid`、`shipped`
    等状态变更事件会被发布到事件总线。通过事件溯源，由于我们在事件日志中拥有所有状态变更事件，多个消费者可以物化出同一数据的不同视图，并且这些消费者可以完全丢弃应用状态，然后通过在空应用上从事件日志中重新运行事件来重建状态。此外，由于事件是按顺序记录的，我们可以确定任意时间点的应用状态。如果需要重放之前执行过的事件（可能对这些事件进行了一些修改），我们也可以利用事件日志来实现。


    ![../images/461146_1_En_10_Chapter/461146_1_En_10_Fig5_HTML.jpg](img/461146_1_En_10_Fig5_HTML.jpg)


    图 10-5


    事件溯源


    订阅者应用和服务可以通过重放订单上发生的事件来重新创建订单的状态。例如，它可以检索所有与 `order 11234` 相关的事件，并推导出该订单的当前状态。

    '
- fmt: '# Command Query Responsibility Segregation (CQRS)


    Most of the conventional services or applications are developed with the assumption
    that we *create* new records, *read* records, *update* existing records, and *delete*
    records when we’re done with them. These are known as `CRUD` (Create, Read, Update,
    and Delete) operations and all these operations are executed on top of a common
    model. This approach is known as the *CRUD model*.


    However, with the microservices and modern sophisticated enterprise requirements
    having a common data model for all, such operations are not always feasible. For
    example, suppose that you have two functionalities of a given service, one to
    search and read records from the table and the other one to update records in
    the table. In most cases, these two functionalities are drastically different
    and using a common data model often complicates the implementation. In such cases,
    we can split the common data model into a query model and a command model. This
    is the fundamental concept behind `CQRS`.


    In `CQRS` (see Figure [10-6](#461146_1_En_10_Chapter.xhtml#Fig6)), the query model
    is primarily used for reading data from the datastore, while the command model
    is used for managing records in the datastore.


    These models may operate on the same database but often have dedicated databases
    with significant advantages. If we assume that we use two dedicated databases
    for each model, then we need some sort of event-driven messaging mechanism to
    keep the data in sync. In most cases, eventual consistency (we discuss this in
    detail in Chapter 5) is sufficient for `CQRS` scenarios, hence the event-driven
    messaging techniques that we discussed earlier can be used to build `CQRS`.


    ![../images/461146_1_En_10_Chapter/461146_1_En_10_Fig6_HTML.jpg](images/461146_1_En_10_Chapter/461146_1_En_10_Fig6_HTML.jpg)


    Figure 10-6


    `CQRS` involves splitting the data model into two and operating them on top of
    dedicated databases, which are eventually consistent via events


    In the context of microservices, we can consider that each query and command model
    are part of two different microservices. Since they have dedicated databases and
    well-defined functionalities, they are adhering to most of the microservice data
    management techniques. The complete decoupling of query and command model allows
    us to use two completely different persistent layers (databases) for command and
    query services. For example, we can use a database that is optimized for reads
    in the query model while we use a write-optimized database for command model.
    While `CQRS` has several advantages, such as independent scaling and management
    of read and write components of your application, we should use it when it is
    absolutely necessary to have the separation between the command and query models,
    because it comes with added complexity related to synchronizing the same data
    across multiple datastores/caches. For most commons use cases, the `CRUD` model
    fits elegantly.


    ## Streams


    A *stream* is a sequence of events/data elements made available over time. A series
    of events over time is quite common in modern enterprise applications, where continuous
    streams are generated with regard to many use cases, such as financial trading
    systems, weather data, traffic information, etc. The seams between the event-driven
    architecture and streams are pretty hard to determine, if you don’t delve deep
    into the concept of stream processing.


    ### Stream Processing


    The software components that receive and send data streams and execute the business
    logic are called *stream processors*. Unlike conventional event-driven architecture,
    the processing logic of a stream is written against not one event but across multiple.


    In the context of microservices, some of the input to your microservice can come
    from streams or microservices, which have to publish to a given stream. Therefore,
    the ability to integrate stream processing along with your service is a common
    requirement.


    #### Programmatic Stream Processing


    Stream processing can be done by writing code to process events sequentially from
    a source event stream. As shown in Figure [10-7](#461146_1_En_10_Chapter.xhtml#Fig7),
    an *actor* or *agent* that accepts an event, processes the event and produces
    new events. A stream processor allows you to write logic for each actor, which
    takes care of most of the heavy lifting tasks such as collecting data, delivering
    to each actor, ordering, results collection, scaling, and error handling.


    ![../images/461146_1_En_10_Chapter/461146_1_En_10_Fig7_HTML.jpg](images/461146_1_En_10_Chapter/461146_1_En_10_Fig7_HTML.jpg)


    Figure 10-7


    Stream processing with code


    There are quite a few stream processor solutions out there, including `Apache
    Storm`^([^(140)](#fn140)), `Apache Flink`^([^(141)](#fn141)), and `Kafka Streams`^([^(142)](#fn142)),
    and they are based on a coding approach to stream processing.


    #### Streaming SQL


    Rather writing code to do stream processing, we can use SQL-like syntax to process
    streams. This is known as streaming SQL. With *streaming SQL*, you don’t need
    to write code to build your stream processing use cases. Rather most of the essential
    functionalities can be abstracted into a streaming SQL engine.


    Therefore, streaming SQL enables us to manipulate streaming data declaratively
    without having to write code. There are many stream-processing solutions, such
    as `Apache Flink`, `Kafka` (`KSQL`), that now offer streaming SQL support.


    ## A Microservices Architecture with APIs, Events, and Streams


    A pragmatic microservices architecture is often built on top of APIs, events,
    and streams. We discussed in Chapter [6](#461146_1_En_6_Chapter.xhtml), “Microservices
    Governance,” how to organize services around core services, integration services,
    and API services. You can extend the same model to support events and streams.
    In Figure [10-8](#461146_1_En_10_Chapter.xhtml#Fig8), you can observe that we
    used API services to expose business functionalities to the consumers and those
    API services are centrally managed by the API management component. API services
    are deployed on micro-gateway nodes, which means each API service has an independent
    runtime but is controlled by the central API management layer.


    ![../images/461146_1_En_10_Chapter/461146_1_En_10_Fig8_HTML.jpg](images/461146_1_En_10_Chapter/461146_1_En_10_Fig8_HTML.jpg)


    Figure 10-8


    Microservices reference architecture with APIs, events, and streams


    Microservices are integrated using active/orchestration and reactive (choreography)
    patterns and the event bus is used as the messaging backbone.


    Microservices can receive events from external event sources and each consumer
    service has the business logic of processing those events. Similarly, stream-processing
    logic is also part of the services that consume the source streams. They can either
    implement using streaming SQL runtimes or programmatically process the event streams.
    Unlike API management, the consumption of events and streams is managed when services
    publish events to the consumers. If required, the events and stream-sinking services
    can be managed via an event and stream-management layer when we sink events or
    streams. Similar to the API management ecosystem, we can build an event and stream
    management layer, so that we can fully manage the event sinking or stream sinking
    (publishing) channels of our microservices implementation.'
