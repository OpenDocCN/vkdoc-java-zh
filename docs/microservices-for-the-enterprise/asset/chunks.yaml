  trans: '

    #### 证书吊销


    无论是在 TLS 双向认证还是基于 JWT 的方法中，证书吊销都有点棘手。这是一个更难解决的问题——尽管有多种可选方案：CRL（证书吊销列表/RFC 2459）、OCSP（在线证书状态协议/RFC
    2560）、OCSP 装订（RFC 6066）以及 OCSP 必须装订。


    使用 CRL 时，证书颁发机构（CA）必须维护一份已吊销证书的列表。发起 TLS 握手的客户端必须从相应的证书颁发机构获取这份长长的已吊销证书列表，然后检查服务器证书是否在该列表中。客户端不必为每个请求都这样做，而是可以在本地缓存
    CRL。但这又会导致一个问题：安全决策是基于过时数据做出的。当使用 TLS 双向认证时，服务器也必须对客户端执行相同的证书验证。CRL 已是一种不常用的技术。最终人们认识到
    CRL 行不通，并开始构建新的东西，也就是 OCSP。


    在 OCSP 的世界里，情况比 CRL 稍好一些。TLS 客户端无需从证书颁发机构下载整个吊销证书列表，就能检查特定证书的状态。换句话说，每次客户端与新的下游微服务通信时，它都必须与相应的
    OCSP 响应程序^(¹⁴⁸)通信，以验证服务器（或服务）证书的状态——而服务器也必须对客户端证书执行相同的操作。这会给 OCSP 响应程序带来大量流量。同样，客户端仍然可以缓存
    OCSP 的判定结果，但这又会回到基于过时数据做出决策的老问题上。


    使用 OCSP 装订时，客户端无需每次与下游微服务通信时都去访问 OCSP 响应程序。下游微服务会从相应的 OCSP 响应程序获取 OCSP 响应，并将其装订或附加到证书上。由于相应的证书颁发机构对
    OCSP 响应进行了签名，客户端可以通过验证签名来接受它。这使情况稍有好转。现在是由服务（而非客户端）与 OCSP 响应程序通信。但在双向 TLS 认证模型中，与普通的
    OCSP 相比，这并不会带来额外的好处。


    使用 OCSP 必须装订时，服务（下游微服务）向客户端（上游微服务）保证，在 TLS 握手期间收到的服务证书上附带了 OCSP 响应。如果证书上没有附带 OCSP
    响应，客户端必须立即拒绝连接，而不是进行软失败处理。


    #### 短期证书


    从最终用户的角度来看，短期证书的行为与当前普通证书的工作方式相同，只是它们的有效期非常短。TLS 客户端无需担心对短期证书进行 CRL 或 OCSP 验证，只需关注证书上印刻的过期时间即可。


    短期证书的挑战主要在于其部署和维护。自动化是救星！Netflix 建议使用分层方法（见图 11-8）来构建短期证书部署。你会有一个驻留在 TPM（可信平台模块）或
    SGX（软件保护扩展）中的系统身份或长期凭证，其上具有很高的安全性。然后使用该凭证获取一个短期证书。接着，使用该短期证书为你的微服务提供凭证，该微服务将被另一个微服务消费。每个微服务都可以使用其长期凭证定期刷新短期证书。仅有短期证书还不够——托管服务（或
    TLS 终结器）的底层平台应支持对服务器证书进行动态更新。许多 TLS 终结器都支持动态重新加载服务器证书，但在大多数情况下无法做到零停机。


    ![../images/461146_1_En_11_Chapter/461146_1_En_11_Fig8_HTML.jpg](img/461146_1_En_11_Fig8_HTML.jpg)


    图 11-8

    Netflix 如何使用短期证书


    ## 边缘安全


    在第 7 章“集成微服务”和第 10 章“API、事件和流”中，我们讨论了向外界暴露微服务的不同技术。其中讨论的一种常见方法是使用 *API 网关*模式。使用
    API 网关模式（见图 11-9）——需要对外暴露的微服务将在 API 网关中拥有对应的 API。并非所有微服务都需要通过 API 网关暴露。


    最终用户对微服务（通过 API）的访问应在边缘——即 API 网关处进行验证。保护 API 最常用的方法是 OAuth 2.0。随着时间的推移，OAuth
    2.0 已成为 API 安全的事实标准。


    ![../images/461146_1_En_11_Chapter/461146_1_En_11_Fig9_HTML.jpg](img/461146_1_En_11_Fig9_HTML.jpg)


    图 11-9

    API 网关模式


    ### OAuth 2.0


    OAuth 2.0 是一个访问委托框架。它允许某人代表他人执行某些操作。在 OAuth 2.0 流程中有四个主要角色：客户端、授权服务器、资源服务器和资源所有者。假设你构建了一个
    Web 应用程序，允许用户将其 Flickr 照片导出到该应用中。在这种情况下，你的 Web 应用程序必须访问 Flickr API，以代表实际拥有照片的用户导出照片。这里，Web
    应用程序是 OAuth 2.0 客户端，Flickr 是资源服务器（保存其用户的照片），而想要将照片导出到 Web 应用程序的 Flickr 用户是资源所有者。为了让你的应用程序代表
    Flickr 用户访问 Flickr API，它需要某种授权许可。授权服务器颁发授权许可，在这种情况下，它将是 Flickr 本身。但在实践中，授权服务器和资源服务器可能是两个不同的实体。OAuth
    2.0 并未将两者耦合在一起。


    ### 注意


    OAuth 2.0 客户端可以是 Web 应用程序、原生移动应用程序、单页应用程序，甚至是桌面应用程序。无论客户端是谁，它都应为授权服务器所知。每个 OAuth
    客户端都有一个标识符，称为*客户端 ID*，由授权服务器分配。每当客户端与授权服务器通信时，它都必须传递其客户端 ID。在某些情况下，客户端必须使用某种凭证来证明其身份。最流行的凭证形式是*客户端密钥*。它就像一个密码。但始终建议
    OAuth 客户端使用更强的凭证，例如证书或 JWT。


    OAuth 2.0 引入了多种授权类型。OAuth 2.0 中的授权类型解释了协议；客户端应获得资源所有者的同意，才能代表其访问资源。此外，还有一些授权类型定义了仅代表自身获取令牌的协议（`client_credentials`）——换句话说，客户端同时也是资源所有者。图
    11-10 从高层级说明了 OAuth 2.0 协议。它描述了 OAuth 客户端、资源所有者、授权服务器和资源服务器之间的交互。

    '
- fmt: '### Note


    The OAuth 2.0 core specification (RFC 6749^([^(149)](#fn149))) defines five grant
    types: authorization code, implicit, password, client credentials, and refresh.
    The authorization code grant type is the most popular grant type, used by more
    than 70% of the web applications. In fact, it is the recommended grant type for
    many of the use cases, whether you have a web application, a native mobile application,
    or even a single page application (SPA).


    ![../images/461146_1_En_11_Chapter/461146_1_En_11_Fig10_HTML.jpg](images/461146_1_En_11_Chapter/461146_1_En_11_Fig10_HTML.jpg)


    Figure 11-10


    The OAuth 2.0 protocol


    Whoever wants to access a microservice via the API gateway must get a valid OAuth
    token first (see Figure [11-11](#461146_1_En_11_Chapter.xhtml#Fig11)). A system
    can access a microservice, just by being itself — or on behalf of another user.
    For the latter case, an example would be when a user logs in to a web application
    and the web application accesses a microservice on behalf of the user who logged
    in. When a system wants to access an API on behalf of another user, authorization
    code is the recommended grant type. In other cases where a system accesses an
    API by being itself, we can use the client credentials grant type.


    ### Note


    There are two types of OAuth 2.0 access tokens: `reference` tokens and `self-contained`
    tokens. A reference token is an arbitrary string issued by the authorization server
    to the client application to be used against a resource server. It must have a
    proper length and should be unpredictable. Whenever a resource server sees a reference
    access token, it has to talk to the corresponding authorization server to validate
    it. A self-contained access token is a signed JWT (or a JWS). To validate a self-contained
    access token, the resource server does not need to talk to the authorization server.
    It can validate the token by validating its signature.


    ![../images/461146_1_En_11_Chapter/461146_1_En_11_Fig11_HTML.jpg](images/461146_1_En_11_Chapter/461146_1_En_11_Fig11_HTML.jpg)


    Figure 11-11


    End-to-end authentication flow


    Let’s see how end-to-end communication works, as illustrated in Figure [11-11](#461146_1_En_11_Chapter.xhtml#Fig11):


    1.  The user logs into the web app/mobile app via the identity provider, which
    the web app/mobile app trusts via OpenID Connect (this can be SAML 2.0 too). OpenID
    Connect is an identity federation protocol built on top of OAuth 2.0. SAML 2.0
    is another similar identity federation protocol.


    2.  The web app gets an OAuth 2.0 `access_token`, a `refresh_token`, and an `id_token`.
    The `id_token` will identify the end user to the web app. OpenID Connect introduces
    the `id_token` to the OAuth flow. If SAML 2.0 is used, then the web app needs
    to talk to the token endpoint of the OAuth authorization server it trusts and
    exchange the SAML token to an OAuth `access_token`, following the SAML 2.0 grant
    type for OAuth 2.0. Each `access_token` has an expiration, and when the `access_token`
    is expired or close to expiration, the OAuth client can use the `refresh_token`
    to talk to the authorization (no need to have the end user) and get a new `access_token`.


    3.  The web app invokes an API on behalf of the end user — passing the `access_token`
    along with the API request.


    4.  API gateway intercepts the request from the web app, extracts the `access_token`,
    and talks to the Token Exchange endpoint (or the STS), which will validate the
    `access_token` and then issue a JWT (signed by it) to the API gateway. This JWT
    will also carry the user context. While STS validating the `access_token` it will
    talk to the corresponding OAuth authorization server via an API (Introspection
    API as defined by the RFC 7662^([^(150)](#fn150))).


    5.  The API gateway will pass through the JWT along with the request to the downstream
    microservices.


    6.  Each microservice will validate the JWT it receives and then, for the downstream
    service calls, it can create a new JWT signed by itself and send it along with
    the request. Another approach is to use a nested JWT — so the new JWT will also
    carry the previous JWT. Also, there is third approach, where each microservice
    talks to the security token service and exchanges the token it got for a new token,
    to talk to the other downstream microservices.


    ### Note


    A detailed explanation of OAuth 2.0 and OpenID Connect is out of the scope of
    this book. We encourage interested readers to go through the book, *Advanced API
    Security*, written by one of the authors of this book and published by Apress.


    With this approach, only the API calls coming from the external clients will go
    through the API gateway. When one microservice talks to another, that needs not
    to go through the gateway. Also, from a given microservice perspective, whether
    you get a request from an external client or another microservice, what you get
    is a JWT — so this is a symmetric security model.


    ## Access Control


    Authorization is a business function. Each microservice can determine the criteria
    to allow access to its operations. In the simplest form of authorization, we check
    whether a given user can perform a given action on a particular resource. The
    combination of an action and a resource is termed as the permission. An authorization
    check evaluates whether a given user has the minimum set of required permissions
    to access a given resource. The resource can define who can perform and which
    actions they can perform. The declaration of the required permissions for a given
    resource can be done in multiple ways. The most common way is to attach a policy
    or an access control list (ACL) to the resource. There are multiple policy languages
    being used to express these access control requirements. If you are familiar with
    Amazon Web Services (AWS), you might have noticed the quite simple, but strong,
    JSON-based policy language^([^(151)](#fn151)) used there, as shown here.


    ```

    {

    "Version": "2012-10-17",

    "Statement": {

    "Effect": "Allow",

    "Action": "s3:ListBucket",

    "Resource": "arn:aws:s3:::example_bucket"

    }

    }

    ```


    Open Policy Agent^([^(152)](#fn152)) (OPA) introduces another policy language
    mostly targeting policy-based control for cloud native environments. The following
    shows a sample policy defined in OPA, which allows access to all HTTP requests.


    ```

    package http.authz

    allow = true

    ```


    XACML (eXtensible Access Control Markup Language) provides another way of defining
    access control policies. It is so far the only standard (by OASIS) out there for
    a policy language. The following section delves deeply into XACML.'
