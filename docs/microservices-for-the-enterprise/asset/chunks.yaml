- fmt: '### Setting Up an OAuth 2.0 Authorization Server


    The responsibility of the authorization server is to issue tokens to its clients
    and respond to the validation requests from downstream microservices. This also
    plays the role of a security token service (STS), as shown in Figure [12-1](#461146_1_En_12_Chapter.xhtml#Fig1).
    There are many open source OAuth 2.0 authorization servers out there: WSO2 Identity
    Server, Keycloak, Gluu, and many more. In a production deployment, you may use
    one of them, but for this example, we are setting up a simple OAuth 2.0 authorization
    server with Spring Boot. It is another microservice and quite useful in developer
    testing. The code corresponding to the authorization server is in the `ch12/sample01`
    directory.


    Let’s start by looking at `ch12/sample01/pom.xml` for the notable Maven dependencies.
    These dependencies introduce a new set of annotations (the `@EnableAuthorizationServer`
    annotation and `@EnableResourceServer` annotation) to turn a Spring Boot application
    to an OAuth 2.0 authorization server.


    ```

    org.springframework.boot

    spring-boot-starter-security


    org.springframework.security.oauth

    spring-security-oauth2

    ```


    The `sample01/src/main/java/com/apress/ch12/sample01/TokenServiceApp.java` class
    carries the `@EnableAuthorizationServer` annotation, which turns the project into
    an OAuth 2.0 authorization server. We’ve added the `@EnableResourceServer` annotation
    to the same class, as it also has to act as a resource server to validate access
    tokens and return the user information. It’s understandable that the terminology
    here is little confusing, but that’s the easiest way to implement the token validation
    endpoint (in fact, the user info endpoint, which also indirectly does the token
    validation) in Spring Boot. When you use self-contained access tokens (JWTs),
    this token validation endpoint is not required.


    The registration of clients with the Spring Boot authorization server can be done
    in multiple ways. This example registers clients in the code itself, in the `sample01/src/main/java/com/apress/ch12/sample01/config/AuthorizationServerConfig.java`
    file. The `AuthorizationServerConfig` class extends the `AuthorizationServerConfigurerAdapter`
    class to override its default behavior. Here we set the client ID to `10101010`,
    client secret to `11110000`, available scope values to `foo` and/or `bar`, authorized
    grant types to `client_credentials`, `password`, and `refresh_token`, and the
    validity period of an access token to `60` seconds. Most of the terminology we
    use here is from OAuth 2.0 and those we explained in Chapter [11](#461146_1_En_11_Chapter.xhtml).


    ```

    @Override

    public void configure(ClientDetailsServiceConfigurer clients) throws Exception
    {

    clients.inMemory().withClient("10101010")

    .secret("11110000").scopes("foo", "bar")

    .authorizedGrantTypes("client_credentials", "password",

    "refresh_token")

    .accessTokenValiditySeconds(60);

    }

    ```


    To support password grant type, the authorization server has to connect to a user
    store. A user store can be a database or an LDAP server that stores user credentials
    and attributes. Spring Boot supports integration with multiple user stores, but
    once again, the most convenient one, which is just good enough for this example,
    is an in-memory user store. The following code from the `sample01/src/main/java/com/apress/ch12/sample01/config/WebSecurityConguration.java`
    file adds a user with the `USER` role to the system.


    ```

    @Override

    public void configure(AuthenticationManagerBuilder auth) throws

    Exception {

    auth.inMemoryAuthentication()

    .withUser("peter").password("peter123").roles("USER");

    }

    ```


    Once we define the in-memory user store in Spring Boot, we also need to engage
    that with the OAuth 2.0 authorization flow, as shown next, in the code `sample01/src/main/java/com/apress/ch12/sample01/config/AuthorizationServerConfig.java`.


    ```

    @Autowired

    private AuthenticationManager authenticationManager;

    @Override

    public void configure(AuthorizationServerEndpointsConfigurer endpoints) throws
    Exception {

    endpoints.authenticationManager(authenticationManager);

    }

    ```


    To start the authorization server, use the following command from the `ch12/sample01/`
    directory to spin up the `TokenService` microservice.


    ```

    \> mvn spring-boot:run

    ```


    To get an access token using the client credentials OAuth 2.0 grant type, use
    the following command. Make sure to replace the values of `$CLIENTID` and `$CLIENTSECRET`
    appropriately. The hard-coded value for the client ID and client secret used in
    our example are `10101010` and `11110000`, respectively.


    ```

    \> curl -v -X POST --basic -u $CLIENTID:$CLIENTSECRET -H "Content-Type: application/x-www-form-urlencoded;charset=UTF-8"
    -k -d "grant_type=client_credentials&scope=foo" https://localhost:8443/oauth/token

    {"access_token":"81aad8c4-b021-4742-93a9-e25920587c94","token_type":"bearer","expires_in":43199,"scope":"foo"}

    ```


    ### Note


    We use the `–k` option in the cURL command. Since we have self-signed (untrusted)
    certificates to secure our HTTPS endpoint, we need to pass the `–k` parameter
    to tell cURL to ignore the trust validation. You can find more details about the
    parameters used here from the OAuth 2.0 6749 RFC: [`https://tools.ietf.org/html/rfc6749`](https://tools.ietf.org/html/rfc6749).


    To get an access token using the password OAuth 2.0 grant type, use the following
    command. Be sure to replace the values of `$CLIENTID`, `$CLIENTSECRET`, `$USERNAME`,
    and `$PASSWORD` appropriately. The hard-coded value for the client ID and client
    secret used in our example are `10101010` and `11110000` respectively; for `username`
    and `password`, we used `peter` and `peter123`.


    ```

    \> curl -v -X POST --basic -u $CLIENTID:$CLIENTSECRET -H "Content-Type: application/x-www-form-urlencoded;charset=UTF-8"
    -k -d "grant_type=password&username=$USERNAME&password=$PASSWORD&scope=foo" https://localhost:8443/oauth/token

    {"access_token":"69ff86a8-eaa2-4490-adda-6ce0f10b9f8b","token_type":"bearer","refresh_token":"ab3c797b-72e2-4a9a-a1c5-c550b2775f93","expires_in":43199,"scope":"foo"}

    ```'
  raw: '### Setting Up an OAuth 2.0 Authorization Server


    The responsibility of the authorization server is to issue tokens to its clients
    and respond to the validation requests from downstream microservices. This also
    plays the role of a security token service (STS) , as shown in Figure [12-1](#461146_1_En_12_Chapter.xhtml#Fig1).
    There are many open source OAuth 2.0 authorization servers out there: WSO2 Identity
    Server, Keycloak, Gluu, and many more. In a production deployment, you may use
    one of them, but for this example, we are setting up a simple OAuth 2.0 authorization
    server with Spring Boot. It is another microservice and quite useful in developer
    testing. The code corresponding to the authorization server is in the `ch12/sample01`
    directory.


    Let’s start by looking at `ch12/sample01/pom.xml` for the notable Maven dependencies.
    These dependencies introduce a new set of annotations (the `@EnableAuthorizationServer`
    annotation and `@EnableResourceServer` annotation) to turn a Spring Boot application
    to an OAuth 2.0 authorization server.


    ```

    org.springframework.boot

    spring-boot-starter-security


    org.springframework.security.oauth

    spring-security-oauth2


    ```


    The `sample01/src/main/java/com/apress/ch12/sample01/TokenServiceApp.java` class
    carries the `@EnableAuthorizationServer` annotation, which turns the project into
    an OAuth 2.0 authorization server. We’ve added the `@EnableResourceServer` annotation
    to the same class, as it also has to act as a resource server to validate access
    tokens and return the user information. It’s understandable that the terminology
    here is little confusing, but that’s the easiest way to implement the token validation
    endpoint (in fact, the user info endpoint, which also indirectly does the token
    validation) in Spring Boot. When you use self-contained access tokens (JWTs),
    this token validation endpoint is not required.


    The registration of clients with the Spring Boot authorization server can be done
    in multiple ways. This example registers clients in the code itself, in the `sample01/src/main/java/com/apress/ch12/sample01/config/AuthorizationServerConfig.java`
    file. The `AuthorizationServerConfig` class extends the `AuthorizationServerConfigurerAdapter`
    class to override its default behavior. Here we set the client ID to `10101010`,
    client secret to `11110000`, available scope values to `foo` and/or `bar`, authorized
    grant types to `client_credentials`, `password,` and `refresh_token`, and the
    validity period of an access token to `60` seconds. Most of the terminology we
    use here is from OAuth 2.0 and those we explained in Chapter [11](#461146_1_En_11_Chapter.xhtml).


    ```

    @Override

    public void configure(ClientDetailsServiceConfigurer clients) throws Exception
    {

    clients.inMemory().withClient("10101010")

    .secret("11110000").scopes("foo", "bar")

    .authorizedGrantTypes("client_credentials", "password",

    "refresh_token")

    .accessTokenValiditySeconds(60);

    }

    ```


    To support password grant type, the authorization server has to connect to a user
    store. A user store can be a database or an LDAP server that stores user credentials
    and attributes. Spring Boot supports integration with multiple user stores, but
    once again, the most convenient one, which is just good enough for this example,
    is an in-memory user store. The following code from the `sample01/src/main/java/com/apress/ch12/sample01/config/WebSecurityConguration.java`
    file adds a user with the `USER` role to the system.


    ```

    @Override

    public void configure(AuthenticationManagerBuilder auth) throws

    Exception {

    auth.inMemoryAuthentication()

    .withUser("peter").password("peter123").roles("USER");

    }

    ```


    Once we define the in-memory user store in Spring Boot, we also need to engage
    that with the OAuth 2.0 authorization flow, as shown next, in the code `sample01/src/main/java/com/apress/ch12/sample01/config/AuthorizationServerConfig.java`.


    ```

    @Autowired

    private AuthenticationManager authenticationManager;

    @Override

    public void configure(AuthorizationServerEndpointsConfigurer endpoints) throws
    Exception {

    endpoints.authenticationManager(authenticationManager);

    }

    ```


    To start the authorization server, use the following command from the `ch12/sample01/`
    directory to spin up the `TokenService` microservice.


    ```

    \> mvn spring-boot:run

    ```


    To get an access token using the client credentials OAuth 2.0 grant type, use
    the following command. Make sure to replace the values of `$CLIENTID` and `$CLIENTSECRET`
    appropriately. The hard-coded value for the client ID and client secret used in
    our example are `10101010` and `11110000`, respectively.


    ```

    \> curl -v -X POST --basic -u $CLIENTID:$CLIENTSECRET -H "Content-Type: application/x-www-form-urlencoded;charset=UTF-8"
    -k -d "grant_type=client_credentials&scope=foo" https://localhost:8443/oauth/token

    {"access_token":"81aad8c4-b021-4742-93a9-e25920587c94","token_type":"bearer","expires_in":43199,"scope":"foo"}

    ```


    ### Note


    We use the `–k` option in the cURL command. Since we have self-signed (untrusted)
    certificates to secure our HTTPS endpoint, we need to pass the `–k` parameter
    to tell cURL to ignore the trust validation. You can find more details about the
    parameters used here from the OAuth 2.0 6749 RFC: [`https://tools.ietf.org/html/rfc6749`](https://tools.ietf.org/html/rfc6749)
    .


    To get an access token using the password OAuth 2.0 grant type, use the following
    command. Be sure to replace the values of `$CLIENTID`, `$CLIENTSECRET, $USERNAME`,
    and `$PASSWORD` appropriately. The hard-coded value for the client ID and client
    secret used in our example are `10101010` and `11110000` respectively; for `username`
    and `password` , we used `peter` and `peter123`.


    ```

    \> curl -v -X POST --basic -u $CLIENTID:$CLIENTSECRET -H "Content-Type: application/x-www-form-urlencoded;charset=UTF-8"
    -k -d "grant_type=password&username=$USERNAME&password=$PASSWORD&scope=foo" https://localhost:8443/oauth/token

    {"access_token":"69ff86a8-eaa2-4490-adda-6ce0f10b9f8b","token_type":"bearer","refresh_token":"ab3c797b-72e2-4a9a-a1c5-c550b2775f93","expires_in":43199,"scope":"foo"}

    ```'
