  trans: '

    #### 使用微服务创建 Docker 镜像


    要创建 Docker 镜像，首先需要创建一个 Dockerfile。正如我们在前几节中讨论的，该文件定义了所有其他依赖镜像、其他二进制依赖项以及启动微服务的命令。以下代码列出了在
    `ch08/sample01` 目录中创建的 Dockerfile 的内容。由于我们使用 Spring Boot 构建微服务，因此镜像中需要包含 Java。有两种选择。一种是从头开始获取
    Java 二进制文件并将其安装到镜像中，另一种方法是找到一个已存在 Java 环境的 Docker 容器并复用。第二种方法是推荐的方法，我们在此使用。我们使用
    `openjdk:8-jdk-alpine` 作为基础镜像，该镜像将在我们构建镜像时从 Docker Hub 拉取。


    ```

    FROM openjdk:8-jdk-alpine

    ADD target/sample01-1.0.0.jar /sample01-1.0.0.jar

    ENTRYPOINT ["java", "-jar", "sample01-1.0.0.jar"]

    ```


    让我们使用 `ch08/sample01` 目录中的以下命令来构建一个名为（命令中的 `-t`）`sample01` 的 Docker 镜像。如果您尚未将
    `openjdk:8-jdk-alpine` 镜像加载到 Docker 引擎中，您看到的输出可能与这里显示的略有不同。


    ```

    :\> docker build -t sample01 .

    Sending build context to Docker daemon 17.45MB

    Step 1/3: FROM openjdk:8-jdk-alpine

    ---> 83621aae5e20

    Step 2/3: ADD target/sample01-1.0.0.jar /sample01-1.0.0.jar

    ---> f3448272e3a9

    Step 3/3: ENTRYPOINT ["java", "-jar", "sample01-1.0.0.jar"]

    ---> Running in ec9a9f91c950

    Removing intermediate container ec9a9f91c950

    ---> 35188a2bfb00

    Successfully built 35188a2bfb00

    Successfully tagged sample01:latest

    ```


    从这个输出中可以学到一件重要的事情。你可以看到 Docker 引擎分三步执行操作。Dockerfile 中的每一行都对应一个步骤。Docker 将镜像构建为层。此操作中的每一步都会创建一个层。这些层是只读的，并且可以在多个容器之间复用。在本章后面，当我们更好地理解容器的行为后，再来重新审视这个概念。


    要列出 Docker 引擎中的所有镜像，我们可以使用以下命令。


    ```

    :\> docker image ls

    ```


    #### 将微服务作为 Docker 容器运行


    一旦我们有了微服务的 Docker 镜像，就可以使用以下命令来启动一个 Docker 容器。


    ```

    :\> docker run -p 9000:9000 sample01

    ```


    此命令指示 Docker 引擎从 `sample01` 镜像启动一个新的 Docker 容器，并将主机的 9000 端口映射到 Docker 容器的 9000
    端口。我们这里选择 9000，因为容器中的微服务在 9000 端口上启动。除非我们将容器端口映射到主机端口，否则我们将无法与在容器中运行的微服务进行通信。


    运行此命令时，您可以看到容器中运行的微服务的输出会打印在主机的控制台上。并且，如果您使用 Ctrl+C，它将终止容器。这是因为，按照我们执行此命令的方式，容器已附加到主机的终端。通过在
    `docker run` 命令中使用 `-d` 选项，我们可以将容器与主机终端分离。这将返回与我们刚刚启动的容器相对应的容器 ID。


    ```

    :\> docker run -d -p 9000:9000 sample01

    9a5cd90b714fc5a27281f94622c1a0d8f1dd1a344f4f4fcc6609413db39de000

    ```


    要测试在容器中运行的微服务，请在主机上使用以下命令。


    ```

    :\> curl http://localhost:9000/order/11

    {"customer_id":"101021","order_id":"11","payment_method":{"card_type":"VISA","expiration":"01/22","name":"John
    Doe","billing_address":"201, 1st Street, San Jose, CA"},"items":[{"code":"101","qty":1},{"code":"103","qty":5}],"shipping_address":"201,
    1st Street, San Jose, CA"}>

    ```


    ### 提示


    如果我们想查看 Docker 引擎上运行的所有容器，可以使用 `docker ps` 命令。要停止正在运行的容器，需要使用 `docker stop <container
    id>` 命令。另外，如果您想删除一个容器，请使用 `docker rm <container id>` 命令。删除容器后，您可以使用 `docker rmi
    <image name>` 命令从本地注册表中删除相应的 Docker 镜像。


    #### 将 Docker 镜像发布到 Docker Hub


    Docker Hub 是一个公共的 Docker 注册表，任何人都可以推送和拉取 Docker 镜像。首先，我们需要从 [`https://hub.docker.com/`](https://hub.docker.com/)
    创建一个 Docker ID。例如，在下面的示例中，我们使用 Docker ID `prabath`。创建带有密码的 Docker ID 后，使用以下命令将您的
    Docker ID 注册到本地运行的 Docker 客户端。


    ```

    :\> docker login --username=prabath

    ```


    此命令将提示您输入密码，Docker 客户端会将您的凭据存储在钥匙串中。接下来，使用以下命令查找我们之前创建的 Docker 镜像的镜像 ID，并复制与 `sample01`
    镜像对应的 `IMAGE ID` 字段的值；例如，`35188a2bfb00`。


    ```

    :\> docker images

    ```


    现在，我们需要使用 Docker Hub 中的 Docker ID 为我们的镜像打标签，如下面的命令所示。打标签有助于为镜像创建更有意义的名称，并且由于我们计划将此镜像发布到
    Docker Hub，请确保标签遵循以您的 Docker Hub 帐户名开头的约定。您需要将 `prabath` 替换为您的 Docker Hub 帐户名。


    ```

    :\> docker tag 35188a2bfb00 prabath/sample01

    ```


    最后，使用以下命令将镜像推送到 Docker Hub，发布后它应该会出现在您的 Docker Hub 帐户下。


    ```

    :\> docker push prabath/sample01

    ```


    现在，任何人都可以使用以下命令从任何地方拉取此镜像。


    ```

    :\> docker pull prabath/sample01

    ```


    ### Docker Compose


    在实践中，微服务部署中通常有多个服务，每个服务都有自己的容器。例如，在图 8-4 中，`订单处理` 微服务与 `库存` 微服务通信。此外，还可能存在一个微服务依赖于其他服务（如数据库）的情况。数据库将是另一个容器，但仍然属于同一个应用程序。Docker
    Compose 有助于定义和管理此类多容器环境。它是除了 Docker 客户端和 Docker 引擎（主机）之外，我们必须安装的另一个工具。

    '
- fmt: '### Note


    Compose is a tool for defining and running multi-container Docker applications.
    With Compose, you use a YAML file to configure your application’s services. Then,
    with a single command, you create and start all the services from your configuration^([^(107)](#fn107)).
    You can refer to the Docker documentation^([^(108)](#fn108)) for more details.
    It’s quite straightforward.


    ![../images/461146_1_En_8_Chapter/461146_1_En_8_Fig4_HTML.jpg](images/461146_1_En_8_Chapter/461146_1_En_8_Fig4_HTML.jpg)


    Figure 8-4 Multi-container microservices deployment


    Docker Compose uses a YAML file to define the configuration of an application.
    The following is an example YAML file that’s named `docker-compose.yml`, and it
    brings up the `Order Processing(sample01)` and `Inventory(sample02)` microservices.
    You can find the complete file in the `ch08/sample02` directory.


    ```

    version: ''3.3''

    services:

    inventory:

    image: sample02

    ports:

    - "9090:9090"

    restart: always

    orderprocessing:

    image: sample01

    restart: always

    ports:

    - "9000:9000"

    depends_on:

    - inventory

    ```


    Here we define two services, `inventory` and `orderprocessing`. The `ports` tag
    under each service defines the port forwarding rules (which we discussed). The
    `image` tag points to the Docker image. The `depends_on` tag defined under `orderprocessing`
    states that it depends on the `inventory` service. You can define multiple services
    under the `depends_on` tag. Finally, you may notice the value of the `restart`
    tag is set to `always`, under both the services, which instructs the Docker engine
    to restart the services always, in case they are down.


    ### Building a Docker Image for Inventory Microservice


    We already have a Docker image for the `Order Processing` microservice. Let’s
    create another one for the `Inventory` microservice. To create a Docker image,
    first we need to create a Dockerfile. As we discussed in previous sections, this
    file defines all the other dependent images, other binary dependencies, and the
    command to start our microservices. The following lists the contents of the Dockerfile
    created in the `ch08/sample02` directory.


    ```

    FROM openjdk:8-jdk-alpine

    ADD target/sample02-1.0.0.jar /sample02-1.0.0.jar

    ENTRYPOINT ["java", "-jar", "sample02-1.0.0.jar"]

    ```


    Let’s use the following command from the `ch08/sample02` directory to build the
    Docker image with the name `sample02`. Before running this command, make sure
    you have built the sample with Maven.


    ```

    :\> docker build -t sample02 .

    ```


    Now, let’s push this image to the Docker Hub. This may not be useful for this
    example, but later in the book, we’ll refer directly to the image from the Docker
    Hub. Use the following command to find the image ID of the Docker image we created
    before and copy the value of `IMAGE ID` field corresponding to the `sample02`
    image; for example, `35199a2bfb00`.


    ```

    :\> docker images

    ```


    Now we need to tag our image with the Docker ID from the Docker Hub, as shown
    in the following command. Finally, use the following command to push the image
    to the Docker Hub, and it should appear under your Docker Hub account once published.
    Also make sure that you are logged into the Docker Hub with the `docker login`
    command, prior to executing the `docker push` command.


    ```

    :\> docker tag 35199a2bfb00 prabath/sample02

    :\> docker push prabath/sample02

    ```


    If you are already running the `Order Processing` microservice, stop the running
    container. To find all the containers running in the Docker host, use the following
    command and it will return the container ID of all the containers. Find the container
    ID (for example `e1039667db1a`) related to the `sample01` image.


    ```

    :\> docker ps

    ```


    To remove a running container, we have to stop it first, and then remove it.


    ```

    :\> docker container stop e1039667db1a

    :\> docker container rm e1039667db1a

    ```


    ### Launching the Application with Docker Compose


    We are all set to launch our application with Docker Compose. Run the following
    command from `ch08/sample02`. This is where we have `docker-compose.yml`, which
    we created before.


    ```

    :\> docker-compose up

    ```


    Since we are launching `docker-compose` here in the attached mode (with no `–d`)
    you will be able to see the output from both the containers on your terminal.
    Also you will notice that each log from both the microservices is tagged with
    the corresponding service name defined in the `docker-compose.yml` file.


    ### Testing the Application with cURL


    Now we have all our microservices running with Docker Compose. Let’s first try
    to test the `Order Processing` microservice with the following cURL command. This
    call only hits the `Order Processing` microservice and returns the result.


    ```

    :\> curl http://localhost:9000/order/11

    {"customer_id":"101021","order_id":"11","payment_method":{"card_type":"VISA","expiration":"01/22","name":"John
    Doe","billing_address":"201, 1st Street, San Jose, CA"},"items":[{"code":"101","qty":1},{"code":"103","qty":5}],"shipping_address":"201,
    1st Street, San Jose, CA"}>

    ```


    Let’s try another request to the `Order Processing` microservice, which also invokes
    the `Inventory` microservice. The request goes to `Order Processing` microservice
    and it invokes the `Inventory` microservice. Here we are posting a JSON request
    to the `Order Processing` microservice.


    ```

    :\> curl -v -H "Content-Type: application/json" -d ''{"customer_id":"101021","payment_method":{"card_type":"VISA","expiration":"01/22","name":"John
    Doe","billing_address":"201, 1st Street, San Jose, CA"},"items":[{"code":"101","qty":1},{"code":"103","qty":5}],"shipping_address":"201,
    1st Street, San Jose, CA"}'' http://localhost:9000/order

    ```


    Now if you look at the terminal attached to both containers, you will find the
    following output, which confirms that the request has hit the `Inventory` microservice.


    ```

    inventory_1 | 101

    inventory_1 | 103

    ```


    ### How Does the Communication Happen Between Containers?


    To see how exactly the two microservices are wired in our previous example, we
    need to look at the source code of the `Order Processing` microservice, which
    available at `ch08/sample01/src/main/java/com/apress/ch08/sample01/service/OrderProcessing.java`.
    There you can see that, instead of an IP address or a hostname, we use the service
    name (as defined in the `docker-compose.yml`) of the Inventory microservice: `http://inventory:9090/inventory`.


    ```

    @RequestMapping(method = RequestMethod.POST)

    public ResponseEntity createOrder(@RequestBody Order order) {

    if (order != null) {

    RestTemplate restTemplate = new RestTemplate();

    URI uri = URI.create(

    "http://inventory:9090/inventory");

    restTemplate.put(uri, order.getItems());

    order.setOrderId(UUID.randomUUID().toString());

    URI location = ServletUriComponentsBuilder

    .fromCurrentRequest().path("/{id}")

    .buildAndExpand(order.getOrderId())

    .toUri();

    return ResponseEntity.created(location).build();

    }

    return ResponseEntity.status(

    HttpStatus.BAD_REQUEST).build();

    }

    ```


    ### Note


    By default, Compose sets up a single network for your app. Each container for
    a service joins the default network and is both reachable by other containers
    on that network, as well as discoverable by them at a hostname identical to the
    container name^([^(109)](#fn109)).'
  raw: '### Note


    Compose is a tool for defining and running multi-container Docker applications.
    With Compose, you use a YAML file to configure your application’s services. Then,
    with a single command, you create and start all the services from your configuration^([^(107)](#fn107)).
    You can refer to the Docker documentation^([^(108)](#fn108)) for more details.
    It’s quite straightforward.


    ![../images/461146_1_En_8_Chapter/461146_1_En_8_Fig4_HTML.jpg](images/461146_1_En_8_Chapter/461146_1_En_8_Fig4_HTML.jpg)


    Figure 8-4


    Multi-container microservices deployment


    Docker Compose uses a YAML file to define the configuration of an application.
    The following is an example YAML file that’s named `docker-compose.yml`, and it
    brings up the `Order Processing(sample01)` and `Inventory(sample02)` microservices.
    You can find the complete file in the `ch08/sample02` directory.


    ```

    version: ''3.3''

    services:

    inventory:

    image: sample02

    ports:

    - "9090:9090"

    restart: always

    orderprocessing:

    image: sample01

    restart: always

    ports:

    - "9000:9000"

    depends_on:

    - inventory

    ```


    Here we define two services, `inventory` and `orderprocessing` . The `ports` tag
    under each service defines the port forwarding rules (which we discussed). The
    `image` tag points to the Docker image. The `depends_on` tag defined under `orderprocessing`
    states that it depends on the `inventory` service. You can define multiple services
    under the `depends_on` tag. Finally, you may notice the value of the `restart`
    tag is set to `always`, under both the services, which instructs the Docker engine
    to restart the services always, in case they are down.


    #### Building a Docker Image for Inventory Microservice


    We already have a Docker image for the `Order Processing` microservice. Let’s
    create another one for the `Inventory` microservice. To create a Docker image,
    first we need to create a Dockerfile. As we discussed in previous sections, this
    file defines all the other dependent images, other binary dependencies, and the
    command to start our microservices. The following lists the contents of the Dockerfile
    created in the `ch08/sample02` directory.


    ```

    FROM openjdk:8-jdk-alpine

    ADD target/sample02-1.0.0.jar /sample02-1.0.0.jar

    ENTRYPOINT ["java", "-jar", "sample02-1.0.0.jar"]

    ```


    Let’s use the following command from the `ch08/sample02` directory to build the
    Docker image with the name `sample02`. Before running this command, make sure
    you have built the sample with Maven.


    ```

    :\> docker build -t sample02 .

    ```


    Now, let’s push this image to the Docker Hub. This may not be useful for this
    example, but later in the book, we’ll refer directly to the image from the Docker
    Hub. Use the following command to find the image ID of the Docker image we created
    before and copy the value of `IMAGE ID` field corresponding to the `sample02`
    image; for example, `35199a2bfb00`.


    ```

    :\> docker images

    ```


    Now we need to tag our image with the Docker ID from the Docker Hub, as shown
    in the following command. Finally, use the following command to push the image
    to the Docker Hub, and it should appear under your Docker Hub account once published.
    Also make sure that you are logged into the Docker Hub with the `docker login`
    command, prior to executing the `docker push` command.


    ```

    :\> docker tag 35199a2bfb00 prabath/sample02

    :\> docker push prabath/sample02

    ```


    If you are already running the `Order Processing` microservice, stop the running
    container. To find all the containers running in the Docker host, use the following
    command and it will return the container ID of all the containers. Find the container
    ID (for example `e1039667db1a`) related to the `sample01` image.


    ```

    :\> docker ps

    ```


    To remove a running container, we have to stop it first, and then remove it.


    ```

    :\> docker container stop e1039667db1a

    :\> docker container rm e1039667db1a

    ```


    #### Launching the Application with Docker Compose


    We are all set to launch our application with Docker Compose. Run the following
    command from `ch08/sample02`. This is where we have `docker-compose.yml`, which
    we created before.


    ```

    :\> docker-compose up

    ```


    Since we are launching `docker-compose` here in the attached mode (with no `–d`)
    you will be able to see the output from both the containers on your terminal.
    Also you will notice that each log from both the microservices is tagged with
    the corresponding service name defined in the `docker-compose.yml` file.


    #### Testing the Application with cURL


    Now we have all our microservices running with Docker Compose. Let’s first try
    to test the `Order Processing` microservice with the following cURL command. This
    call only hits the `Order Processing` microservice and returns the result.


    ```

    :\> curl http://localhost:9000/order/11

    {"customer_id":"101021","order_id":"11","payment_method":{"card_type":"VISA","expiration":"01/22","name":"John
    Doe","billing_address":"201, 1st Street, San Jose, CA"},"items":[{"code":"101","qty":1},{"code":"103","qty":5}],"shipping_address":"201,
    1st Street, San Jose, CA"}>

    ```


    Let’s try another request to the `Order Processing` microservice, which also invokes
    the `Inventory` microservice. The request goes to `Order Processing` microservice
    and it invokes the `Inventory` microservice. Here we are posting a JSON request
    to the `Order Processing` microservice.


    ```

    :\> curl -v -H "Content-Type: application/json" -d ''{"customer_id":"101021","payment_method":{"card_type":"VISA","expiration":"01/22","name":"John
    Doe","billing_address":"201, 1st Street, San Jose, CA"},"items":[{"code":"101","qty":1},{"code":"103","qty":5}],"shipping_address":"201,
    1st Street, San Jose, CA"}'' http://localhost:9000/order

    ```


    Now if you look at the terminal attached to both containers, you will find the
    following output, which confirms that the request has hit the `Inventory` microservice.


    ```

    inventory_1 | 101

    inventory_1 | 103

    ```


    #### How Does the Communication Happen Between Containers?


    To see how exactly the two microservices are wired in our previous example, we
    need to look at the source code of the `Order Processing` microservice, which
    available at `ch08/sample01/ src/main/java/com/apress/ch08/sample01/service/OrderProcessing.java`.
    There you can see that, instead of an IP address or a hostname, we use the service
    name (as defined in the `docker-compose.yml`) of the Inventory microservice: `http://inventory:9090/inventory`.


    ```

    @RequestMapping(method = RequestMethod.POST)

    public ResponseEntity createOrder(@RequestBody Order order) {

    if (order != null) {

    RestTemplate restTemplate = new RestTemplate();

    URI uri = URI.create(

    "http://inventory:9090/inventory");

    restTemplate.put(uri, order.getItems());

    order.setOrderId(UUID.randomUUID().toString());

    URI location = ServletUriComponentsBuilder

    .fromCurrentRequest().path("/{id}")

    .buildAndExpand(order.getOrderId())

    .toUri();

    return ResponseEntity.created(location).build();

    }

    return ResponseEntity.status(

    HttpStatus.BAD_REQUEST).build();

    }

    ```


    ### Note


    By default, Compose sets up a single network for your app. Each container for
    a service joins the default network and is both reachable by other containers
    on that network, as well as discoverable by them at a hostname identical to the
    container name^([^(109)](#fn109)).'
