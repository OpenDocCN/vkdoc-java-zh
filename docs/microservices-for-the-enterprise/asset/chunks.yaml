  trans: '

    ### 服务生命周期管理


    微服务具有不同的生命周期阶段，包括*规划*、*设计*、*实现*、*部署*、*维护*和*退役*。鉴于微服务的去中心化特性，这些任务通常由拥有每个微服务的团队负责。在大多数实际场景中，无论业务范围以及用于开发微服务的技术如何，为微服务设定统一的生命周期阶段是很常见的。服务生命周期管理技术会集中应用于微服务架构中。这包括部署生命周期管理、如何对服务进行版本控制等。这些能力大多作为服务网格中的
    API 管理或控制平面的一部分来实现。我们将在第 9 章“服务网格”和第 10 章“API、事件和流”中详细讨论它们。


    ### 服务质量（QoS）


    在向消费者暴露服务之前，需要考虑多个服务质量（QoS）方面。服务可以作为安全服务暴露，利用各种安全协议和标准（从传输层安全、访问令牌等开始）。此外，还可以使用速率限制和节流来控制对服务的访问。缓存以及将各种钩子集成到监控和货币化中是其他一些重要的
    QoS 特性。这些需求大多与微服务的治理直接相关，并且通常是集中控制的。


    我们将在第 11 章“微服务安全基础”和第 12 章“保护微服务安全”中详细介绍微服务安全基础知识和用例。


    ### 服务可观测性


    当应用程序与多个微服务交互时，为所有服务提供指标、追踪、日志记录、可视化和告警能力至关重要，这样你才能清晰了解它们的交互情况，并在出现问题时进行故障排除。所有这些需求都整合在一个概念下，称为*可观测性*。


    在微服务架构中，很可能有成百上千个服务相互通信。获取服务指标、追踪消息和服务交互、获取服务日志、理解服务的运行时依赖关系、在发生故障时进行故障排除以及为异常设置告警，这些都可以归入可观测性的范畴。


    大多数可观测性工具作为集中式实体运行，所有服务都可以将所需数据推送到其中，这些数据对于指标、追踪、日志记录、可视化等非常有用。由可观测性工具负责分析数据并进行处理，以便推导出所需的可观测性相关信息。我们将在第
    13 章“可观测性”中讨论用于微服务可观测性的所有技术和工具。


    至此，我们已经讨论了微服务治理的大部分关键方面。现在，是时候看看这些概念如何在实际中实现了。


    ## 实现微服务治理


    我们在前面章节中讨论的微服务治理方面，是在四个关键类别下实现的（见图 6-1）。虽然微服务的设计、开发和部署并非集中治理，但这些方面是作为集中且可扩展的实体来实现的。


    ![../images/461146_1_En_6_Chapter/461146_1_En_6_Fig1_HTML.jpg](img/461146_1_En_6_Fig1_HTML.jpg)


    图 6-1


    实现微服务治理的关键组件


    让我们重新审视前面章节中讨论的治理方面，看看它们是如何以及在哪里针对这些组件实现的。


    ### 服务注册与发现


    如果考虑服务定义，服务标识符、消息模型、接口等的定义是可以在没有集中治理的情况下完成的事情。然而，这些服务定义必须发布到集中式服务注册中心。服务注册中心是一个集中式组件，它还将定义一个规范模型来描述服务。所有服务所有者都应以其规范形式将服务定义发布到服务注册中心。即使服务是用截然不同的技术（例如
    OpenAPI 与 gRPC）实现的，你仍然可以找到这些服务的通用元数据，并将其添加到服务注册中心。


    服务注册中心还附带一个服务发现协议（或 API），可用于在运行时检索服务信息。（我们将在下一节详细讨论服务注册与发现。）


    ### 开发生命周期管理


    服务生命周期管理通常在服务部署层面实现。例如，当某个服务必须部署到多个环境时，部署过程将处理在这些环境之间复制或迁移相同服务代码的需求。这还包括各种与 DevOps
    相关的部署方法（蓝绿部署、金丝雀部署、AB 测试等），并描述了如何管理不同的环境，例如开发环境、测试环境、质量保证环境、预发布环境、生产环境等。


    ### API 管理/API 网关


    API 管理在实现多个微服务治理方面起着关键作用。如第 1 章“微服务的理由”所述，API 管理层或 API 网关用于将微服务作为*受管*API 暴露给消费者。这包括我们在前面章节中讨论的所有服务质量方面，以及其他一些
    API 管理特有的细节，例如货币化。作为 API 管理的一部分，我们可以在运行时对服务应用安全、服务版本控制、节流、缓存、货币化等。重要的是要理解，这些能力中的大多数必须集中应用于服务调用。因此，API
    网关是集中治理或管理的，而这些能力的应用可以是集中式或分散式的。此外，API 网关可用于外部或内部消费者。当微服务通过内部 API 网关相互通信时，这些能力同样适用。


    API 管理解决方案通常与服务注册中心协同工作，以发现服务，并将其用作 API 存储库（即，与 API 相关的信息也可以通过服务注册中心发布和发现）。当我们使用现有服务并从中创建新
    API 时，这也非常有用。


    另一个重要方面是，API 管理解决方案提供了丰富的 API 发现和消费能力。因此，可以利用 API 管理来管理所有微服务（而不是选择要对外暴露的服务）。


    我们将把关于这些主题的详细讨论推迟到第 10 章“API、事件和流”中进行。

    '
- fmt: '### Observability


    Observability is something that is generically applicable to all your microservices.
    Each microservice can push data to any of those observability tools using the
    recommended observability agents. Observability tools offer a centralized view
    of all the interactions of your microservices and they operate as passive entities
    which would not intervene the original flow of business messages. The API management
    solution or API gateway also work hand-in-hand with observability tools. Most
    of the observability aspects that we discussed in the previous sections are often
    applicable to APIs as well.


    There are specialized observability tools for each observability aspect, such
    as metrics, tracing, logging, service visualization, alerting, etc. We’ll delve
    deep into microservices observability in Chapter [13](#461146_1_En_13_Chapter.xhtml).


    ## Service Registry and Discovery


    When you run hundreds or thousands of microservices, it is quite important to
    have a central place to get the details of services. That’s where service registry
    and discovery come into the picture. In many resources that describe services
    registry and discovery in the context of microservices, it is explained as a mechanism
    to obtain the location of the microservice during execution. However, the service
    registry has a much broader meaning and can be used much more effectively.


    Because you have so many services to deal with, it’s very important to have a
    central place where you can obtain all service information. As we discussed in
    previous sections, service registry is that place where we store all the service
    definitions (not just the service URLs, as some microservices articles explain).
    Consumers can get all the service definitions by accessing the service registry.
    Then the service discovery defines a way to access the service registry. Service
    owners should register the service at the service registry so that the consumers
    can discover them. Also, the owners are responsible for updating and maintaining
    the information of services. The most commonly practiced use cases for service
    registry and discovery in a microservices architecture is to have addressable
    names for services that make them independent of the infrastructure that they
    are running on. For example, when we are doing a service call, we use a name with
    a logical reference to the service and the service discovery resolves that name
    to the actual endpoint address of the service. Therefore, external services or
    consumers do not need to change their code when there’s a change in the actual
    endpoint address.


    In general, we can consider service registry to be the repository to publish and
    retrieve canonical service definitions of all services in your microservices architecture.
    The mechanism, which we use to retrieve service definitions, is known as service
    discovery.


    Let’s discuss some of the commonly used patterns for service registry and discovery.
    As shown in Figure [6-2](#461146_1_En_6_Chapter.xhtml#Fig2), let’s take a scenario
    where we have a client that wants to call a service, but the service address is
    either not known or dynamically changes. In that case we can use a service registry
    to store service definitions. The client has to discover the service information
    by calling the API of the service registry and then use the information retrieved
    from the registry for the actual service calls. Often, most of the service registries
    offer a RESTful interface (or gRPC) along with dedicated client libraries to cater
    to this requirement. This mechanism is known as *client-side service discovery*.


    ![../images/461146_1_En_6_Chapter/461146_1_En_6_Fig2_HTML.jpg](images/461146_1_En_6_Chapter/461146_1_En_6_Fig2_HTML.jpg)


    Figure 6-2


    Client-side service discovery


    The other pattern of service discovery (see Figure [6-3](#461146_1_En_6_Chapter.xhtml#Fig3))
    is to offload the service discovery task to an intermediate component such as
    a load balancer. In this case, the client invokes the service with a predefined
    URL and the load balancer uses that as a key to resolve the actual URL of the
    service. In this pattern, the client is unaware of the existence of a service
    registry. This pattern is known as *server-side service discovery.*


    ![../images/461146_1_En_6_Chapter/461146_1_En_6_Fig3_HTML.jpg](images/461146_1_En_6_Chapter/461146_1_En_6_Fig3_HTML.jpg)


    Figure 6-3


    Server-side service discovery


    Client-side discovery is commonly used when the client is fully aware of the existence
    of the service registry and client code contains the service discovery logic.
    Server-side discovery is often used with container management systems such as
    Kubernetes and Docker Swarm, where service discovery is transparent to the client
    side.


    Service registry implementations are not dependent on any of the service discovery
    mechanisms. In fact, in both cases, either the client or an intermediate application
    (load balancer) uses the same service registry APIs.


    The service registry is often used as the centralized component for service discovery
    and therefore it can be the single point of failure. Therefore, It’s important
    to ensure high availability of the service registry as part of the deployment.


    In the next couple of sections, we’ll take a closer look at the commonly used
    service registry solutions.'
