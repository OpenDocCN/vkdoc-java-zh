    ### 说明


    Compose 是一款用于定义和运行多容器 Docker 应用的工具。使用 Compose 时，你可以通过一个 YAML 文件来配置应用的服务。然后，只需一条命令，就能根据配置创建并启动所有服务^(¹⁰⁷)。更多详情可参考
    Docker 文档^(¹⁰⁸)。操作起来相当简单。


    ![../images/461146_1_En_8_Chapter/461146_1_En_8_Fig4_HTML.jpg](img/461146_1_En_8_Fig4_HTML.jpg)


    图 8-4


    多容器微服务部署


    Docker Compose 使用一个 YAML 文件来定义应用的配置。以下是一个名为 `docker-compose.yml` 的 YAML 文件示例，它启动了
    `Order Processing(sample01)` 和 `Inventory(sample02)` 这两个微服务。你可以在 `ch08/sample02`
    目录中找到完整的文件。


    ```

    version: ''3.3''

    services:

    inventory:

    image: sample02

    ports:

    - "9090:9090"

    restart: always

    orderprocessing:

    image: sample01

    restart: always

    ports:

    - "9000:9000"

    depends_on:

    - inventory

    ```


    这里我们定义了两个服务：`inventory` 和 `orderprocessing`。每个服务下的 `ports` 标签定义了端口转发规则（我们之前讨论过）。`image`
    标签指向 Docker 镜像。`orderprocessing` 下定义的 `depends_on` 标签表明它依赖于 `inventory` 服务。你可以在
    `depends_on` 标签下定义多个服务。最后，你可能注意到两个服务下的 `restart` 标签值都设置为 `always`，这指示 Docker 引擎在服务宕机时始终重启它们。


    #### 为库存微服务构建 Docker 镜像


    我们已经有了 `Order Processing` 微服务的 Docker 镜像。现在为 `Inventory` 微服务再创建一个。要创建 Docker 镜像，首先需要创建一个
    Dockerfile。正如我们在前几节中讨论的，这个文件定义了所有其他依赖镜像、其他二进制依赖项以及启动微服务的命令。以下列出了在 `ch08/sample02`
    目录中创建的 Dockerfile 的内容。


    ```

    FROM openjdk:8-jdk-alpine

    ADD target/sample02-1.0.0.jar /sample02-1.0.0.jar

    ENTRYPOINT ["java", "-jar", "sample02-1.0.0.jar"]

    ```


    让我们使用以下命令从 `ch08/sample02` 目录构建名为 `sample02` 的 Docker 镜像。在运行此命令之前，请确保你已经使用 Maven
    构建了示例。


    ```

    :\> docker build -t sample02 .

    ```


    现在，让我们将此镜像推送到 Docker Hub。对于这个示例来说，这可能没什么用，但在本书后面，我们将直接从 Docker Hub 引用镜像。使用以下命令查找我们之前创建的
    Docker 镜像的镜像 ID，并复制与 `sample02` 镜像对应的 `IMAGE ID` 字段的值；例如，`35199a2bfb00`。


    ```

    :\> docker images

    ```


    现在，我们需要像以下命令所示，使用 Docker Hub 中的 Docker ID 为我们的镜像打标签。最后，使用以下命令将镜像推送到 Docker Hub，发布后它应该会出现在你的
    Docker Hub 账户下。同时，在执行 `docker push` 命令之前，请确保你已经使用 `docker login` 命令登录到 Docker
    Hub。


    ```

    :\> docker tag 35199a2bfb00 prabath/sample02

    :\> docker push prabath/sample02

    ```


    如果你已经在运行 `Order Processing` 微服务，请停止正在运行的容器。要查找 Docker 主机中运行的所有容器，请使用以下命令，它将返回所有容器的容器
    ID。找到与 `sample01` 镜像相关的容器 ID（例如 `e1039667db1a`）。


    ```

    :\> docker ps

    ```


    要移除一个正在运行的容器，我们必须先停止它，然后再移除。


    ```

    :\> docker container stop e1039667db1a

    :\> docker container rm e1039667db1a

    ```


    #### 使用 Docker Compose 启动应用


    我们已经准备好使用 Docker Compose 启动应用了。从 `ch08/sample02` 目录运行以下命令。这是我们之前创建 `docker-compose.yml`
    文件的地方。


    ```

    :\> docker-compose up

    ```


    由于我们在这里以附加模式（不带 `–d` 参数）启动 `docker-compose`，你将能够在终端上看到两个容器的输出。你还会注意到，来自两个微服务的每条日志都带有
    `docker-compose.yml` 文件中定义的相应服务名称的标签。


    #### 使用 cURL 测试应用


    现在，我们所有的微服务都在 Docker Compose 下运行。让我们首先尝试使用以下 cURL 命令测试 `Order Processing` 微服务。此调用仅访问
    `Order Processing` 微服务并返回结果。


    ```

    :\> curl http://localhost:9000/order/11

    {"customer_id":"101021","order_id":"11","payment_method":{"card_type":"VISA","expiration":"01/22","name":"John
    Doe","billing_address":"201, 1st Street, San Jose, CA"},"items":[{"code":"101","qty":1},{"code":"103","qty":5}],"shipping_address":"201,
    1st Street, San Jose, CA"}>

    ```


    让我们尝试另一个请求，该请求发送到 `Order Processing` 微服务，同时也会调用 `Inventory` 微服务。请求先到达 `Order Processing`
    微服务，然后它再调用 `Inventory` 微服务。这里我们向 `Order Processing` 微服务发送一个 JSON 请求。


    ```

    :\> curl -v -H "Content-Type: application/json" -d ''{"customer_id":"101021","payment_method":{"card_type":"VISA","expiration":"01/22","name":"John
    Doe","billing_address":"201, 1st Street, San Jose, CA"},"items":[{"code":"101","qty":1},{"code":"103","qty":5}],"shipping_address":"201,
    1st Street, San Jose, CA"}'' http://localhost:9000/order

    ```


    现在，如果你查看连接到两个容器的终端，将会看到以下输出，这确认了请求已经到达了 `Inventory` 微服务。


    ```

    inventory_1 | 101

    inventory_1 | 103

    ```


    #### 容器之间如何通信？


    要了解在我们的上一个示例中两个微服务是如何精确连接的，我们需要查看 `Order Processing` 微服务的源代码，该代码位于 `ch08/sample01/
    src/main/java/com/apress/ch08/sample01/service/OrderProcessing.java`。在那里你可以看到，我们使用的是
    Inventory 微服务的服务名称（如 `docker-compose.yml` 中所定义），而不是 IP 地址或主机名：`http://inventory:9090/inventory`。


    ```

    @RequestMapping(method = RequestMethod.POST)

    public ResponseEntity createOrder(@RequestBody Order order) {

    if (order != null) {

    RestTemplate restTemplate = new RestTemplate();

    URI uri = URI.create(

    "http://inventory:9090/inventory");

    restTemplate.put(uri, order.getItems());

    order.setOrderId(UUID.randomUUID().toString());

    URI location = ServletUriComponentsBuilder

    .fromCurrentRequest().path("/{id}")

    .buildAndExpand(order.getOrderId())

    .toUri();

    return ResponseEntity.created(location).build();

    }

    return ResponseEntity.status(

    HttpStatus.BAD_REQUEST).build();

    }

    ```


    ### 说明


    默认情况下，Compose 会为你的应用设置一个单一网络。每个服务的容器都会加入默认网络，该网络上的其他容器既可以访问它们，也可以通过与其容器名称相同的主机名发现它们^(¹⁰⁹)。

