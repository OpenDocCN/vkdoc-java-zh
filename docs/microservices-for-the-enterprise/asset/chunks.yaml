    ### 将 Spring Cloud Sleuth 与 Spring Boot 微服务集成


    将 Sleuth 与 Spring Boot 集成非常简单。从 Git 仓库下载所有示例后，你可以在 `ch13/sample01` 目录中找到与本示例相关的源代码。


    ### 注意


    本书不打算对 Spring Cloud Sleuth 进行全面介绍，建议需要详细了解的读者参考 Sleuth 文档，地址为：[`https://cloud.spring.io/spring-cloud-sleuth/single/spring-cloud-sleuth.html`](https://cloud.spring.io/spring-cloud-sleuth/single/spring-cloud-sleuth.html)。


    让我们看看添加到 `ch13/sample01/pom.xml` 文件中的一些值得注意的 Maven 依赖项。`spring-cloud-starter-sleuth`
    依赖项引入了所有与 Sleuth 相关的依赖。一旦集成到 Maven 项目中，Sleuth 的跨度（Span）和跟踪（Trace）信息将自动添加到所有日志中。Sleuth
    会拦截发送到特定微服务的所有 HTTP 请求，并检查所有消息以查看是否已有跟踪信息。如果有，则会提取这些信息并将其提供给相应的微服务。此外，Sleuth 还会将跟踪信息注入到
    Spring 映射诊断上下文（MDC）中，这样微服务生成的日志将自动包含跟踪数据。当 HTTP 请求从微服务发出时，Sleuth 会再次将跟踪信息注入到出站请求或响应中。


    ```

    org.springframework.cloud

    spring-cloud-starter-sleuth

    2.0.0.RC1


    ```


    让我们看看源代码（`ch13/sample01/src/main/java/com/apress/ch13/sample01/service/OrderProcessing.java`），它记录了与订单检索请求相关的数据。这里用于记录消息的日志记录
    API 与 Sleuth 无关——它只是 `slf4j`^(¹⁶²) API。


    ```

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    @RequestMapping(value = "/{id}", method = RequestMethod.GET)

    public ResponseEntity getOrder(@PathVariable("id") String orderId) {

    logger.info("retrieving order:" + orderId);

    Item book1 = new Item("101", 1);

    Item book2 = new Item("103", 5);

    PaymentMethod myvisa = new PaymentMethod("VISA", "01/22", "John Doe",

    "201, 1st Street, San Jose, CA");

    Order order = new Order("101021", orderId, myvisa, new Item[] { book1,

    book2 },"201, 1st Street, San Jose, CA");

    return ResponseEntity.ok(order);

    }

    ```


    在运行代码之前，需要在 `ch13/sample01/src/main/resources/application.properties` 文件中配置几个重要的属性。


    ```

    spring.application.name=sample01

    spring.sleuth.sampler.percentage=0.1

    ```


    属性 `spring.application.name` 的值会作为服务名称，与跟踪 ID 和跨度 ID 一起添加到日志中。一旦 Sleuth 被集成，服务名称、跟踪
    ID、跨度 ID 以及一个指示日志是否已发布到 Zipkin 的标志位，都会被附加到日志中。在下面的示例中，`sample01` 是服务名称（从属性文件中获取），`d25a633196c01c19`（第一个）是跟踪
    ID，`d25a633196c01c19`（第二个）是跨度 ID，`false` 表示此日志未发布到 Zipkin。我们将在本章后面介绍 Zipkin，目前可以将其视为一个在微服务部署中捕获所有跟踪信息的服务器。


    ```

    INFO [sample01,d25a633196c01c19,d25a633196c01c19,false] 27437 --- [nio-9000-exec-2]
    c.a.c.sample01.service.OrderProcessing: retrieving order:11

    ```


    `application.properties` 文件中的 `spring.sleuth.sampler.percentage` 属性表示需要跟踪的请求百分比。默认设置为
    0.1，这意味着只有 10% 的请求会被发布到 Zipkin。通过将其设置为 1.0，所有请求都会被发布。


    现在，让我们看看如何运行 `Order Processing` 微服务，并使用以下 cURL 命令调用它（从 `ch13/sample01` 目录运行）。


    ```

    \> mvn clean install

    \> mvn spring-boot:run

    \> curl http://localhost:9000/order/11

    ```


    此 cURL 命令将打印订单详情，如果你查看运行 `Order Processing` 微服务的命令控制台，会发现以下日志，其中包含跟踪 ID、跨度 ID
    以及其他元数据。


    ```

    INFO [sample01,d25a633196c01c19,d25a633196c01c19,false] 27437 --- [nio-9000-exec-2]
    c.a.c.sample01.service.OrderProcessing: retrieving order:11

    ```


    好吧，如果你觉得这个示例本身没什么用，我们并不感到惊讶。它除了记录日志之外什么也没做——完全没有跟踪。下一节将消除你的疑虑，并可能让你相信跟踪的价值。


    ### 使用 Spring Cloud Sleuth 跟踪多个微服务之间的消息


    让我们将目前讨论的示例扩展到多个微服务，看看一个给定的请求是如何在整个通信网络中被跟踪的。如果你已经按照上一节的说明启动了 `Order Processing`
    微服务（`sample01`），请保持其运行。除此之外，你还需要启动 `Inventory` 微服务。让我们通过从 `ch13/sample02` 目录运行以下命令来启动
    `Inventory` 微服务。


    ```

    \> mvn clean install

    \> mvn spring-boot:run

    ```


    现在，当我们运行 cURL 客户端向 `Order Processing` 微服务下订单时，它将与 `Inventory` 微服务通信以更新库存（见图 13-1）。


    ```

    \> curl -v  -k  -H "Content-Type: application/json" -d ''{"customer_id":"101021","payment_method":{"card_type":"VISA","expiration":"01/22","name":"John
    Doe","billing_address":"201, 1st Street, San Jose, CA"},"items":[{"code":"101","qty":1},{"code":"103","qty":5}],"shipping_address":"201,
    1st Street, San Jose, CA"}'' http://localhost:9000/order

    ```


    让我们查看运行 `Order Processing` 微服务的命令控制台。它应该会打印出以下包含跟踪信息的日志。


    ```

    INFO [sample01,76f19c035e8e1ddb,76f19c035e8e1ddb,false] 29786 --- [nio-9000-exec-1]
    c.a.c.sample01.service.OrderProcessing   : creating order :10dcc849-3d8d-49fb-ac58-bc5da29db003

    ```


    运行 `Inventory` 微服务的命令控制台会打印出以下日志。


    ```

    INFO [sample04,76f19c035e8e1ddb,be46d1595ef606a0,false] 29802 --- [io-10000-exec-1]
    c.a.ch13.sample02.service.Inventory      : item code 101

    INFO [sample04,76f19c035e8e1ddb,be46d1595ef606a0,false] 29802 --- [io-10000-exec-1]
    c.a.ch13.sample02.service.Inventory      : item code 103

    ```


    在两个微服务打印的日志中，跟踪 ID（`76f19c035e8e1ddb`）是相同的，而每个微服务都有自己的跨度 ID（`76f19c035e8e1ddb`
    和 `be46d1595ef606a0`）。在下一节中，我们将看到如何将这些日志发布到 Zipkin，并可视化一个请求在多个微服务之间的完整路径。


    ## 使用 Zipkin 进行数据可视化和关联


    Zipkin^(¹⁶³) 是一个分布式跟踪系统，有助于可视化和关联微服务之间的通信路径。它还通过收集时序数据来帮助诊断延迟问题。所有微服务都可以被配置为将日志连同跟踪信息一起发布到
    Zipkin（见图 13-4）。

    '
- fmt: '### Note


    A comprehensive introduction to Zipkin is out of the scope of this book, and we
    recommend readers looking for details to refer to the Zipkin documentation available
    at [`https://zipkin.io/`](https://zipkin.io/).


    Setting up Zipkin is quite straightforward with Docker. In Chapter [8](#461146_1_En_8_Chapter.xhtml),
    “Deploying and Running Microservices,” we discussed Docker in detail, and assuming
    you have Docker up and running in your machine, you can spin up a Docker container
    with Zipkin, with the following command. In case you want to try Zipkin without
    Docker, refer to the installation guide available at [`https://zipkin.io/pages/quickstart.html`](https://zipkin.io/pages/quickstart.html).


    ```

    > docker run -d -p 9411:9411 openzipkin/zipkin

    ```


    This command binds port 9411 of the host machine to port 9411 on the Docker container.
    Once the Zipkin node gets started, you can access its web-based console from the
    host machine, via `http://localhost:9411/zipkin/`, or simply with `http://localhost:9411`
    (see Figure [13-5](#461146_1_En_13_Chapter.xhtml#Fig5)). The next step is to update
    the configuration of the `Order Processing` and `Inventory` microservices (from
    the previous section, `sample01` and `sample02`) to publish logs to Zipkin. If
    you have both the microservices running, first stop them and update the `application.properties`
    file with the following. You need to do this for both microservices. The `spring.zipkin.baseUrl`
    property carries the server URL of the Zipkin server.


    ```

    spring.zipkin.baseUrl=http://localhost:9411/

    ```


    In addition to setting up this property in the `application.properties` file,
    we also must add the following dependency to the `pom.xml` file of both the microservices
    to complete the Zipkin integration. The `spring-cloud-sleuth-zipkin` dependency
    takes care of publishing logs to the Zipkin server, and those have to be in a
    format understood by Zipkin.


    ```

    org.springframework.cloud

    spring-cloud-sleuth-zipkin

    2.0.0.RC1

    ```


    Start the `Order Processing` and `Inventory` microservices and use the following
    cURL command to place an order with the `Order Processing` microservice. Do it
    for few times, so we gather enough logs at the Zipkin. Also, keep in mind that
    not all the logs are sent to Zipkin—it depends on the value you set for the `spring.sleuth.sampler.percentage`
    property in the `application.properties` file. In a typical microservices deployment
    the data volume can be very high, hence the volume of traced data. Based on the
    volume of requests you get and the business criticality of the operations performed
    by the microservices, you can decide what percentage of requests needs be sampled
    or sent to Zipkin.


    ![../images/461146_1_En_13_Chapter/461146_1_En_13_Fig4_HTML.jpg](images/461146_1_En_13_Chapter/461146_1_En_13_Fig4_HTML.jpg)


    Figure 13-4


    Each microservice is instrumented to publish logs to Zipkin


    ```

    > curl -v  -k  -H "Content-Type: application/json" -d ''{"customer_id":"101021","payment_method":{"card_type":"VISA","expiration":"01/22","name":"John
    Doe","billing_address":"201, 1st Street, San Jose, CA"},"items":[{"code":"101","qty":1},{"code":"103","qty":5}],"shipping_address":"201,
    1st Street, San Jose, CA"}'' http://localhost:9000/order

    ```


    For the traced data, which is published from each microservice to Zipkin, you’ll
    find the following logs printed on the command console, which runs each microservice.
    Notice that the fourth parameter of the tracing information added to each, which
    indicates whether the logs are published to Zipkin, and that is set to `true`.


    ```

    INFO [sample01,bf581ac0009c6e48,bf581ac0009c6e48,true] 30166 --- [nio-9000-exec-1]
    c.a.c.sample01.service.OrderProcessing : retrieving order:11

    INFO [sample02,1a35024149ac7711,98239453fa5582ba,true] 30153 --- [io-10000-exec-7]
    c.a.ch04.sample04.service.Inventory : item code 101

    INFO [sample02,1a35024149ac7711,98239453fa5582ba,true] 30153 --- [io-10000-exec-7]
    c.a.ch04.sample04.service.Inventory : item code 103

    ```


    What happens underneath here is that Sleuth instruments your application to generate
    tracing information in a format understood by Zipkin. Zipkin is the data collector
    and once all the microservices publish traced data to Zipkin, it helps you to
    do the distributed tracing. To do distributed tracing, you need both the parts.


    ### Note


    Jaeger^([^(164)](#fn164)) is another open source distributed tracing system inspired
    by Zipkin and Dapper and developed by Uber.


    ![../images/461146_1_En_13_Chapter/461146_1_En_13_Fig5_HTML.jpg](images/461146_1_En_13_Chapter/461146_1_En_13_Fig5_HTML.jpg)


    Figure 13-5


    Zipkin web-based console


    Now let’s see how to find some useful information from the Zipkin server with
    the published tracing information. On the home page of the Zipkin web console,
    in the `Service Name` dropdown box, you will notice that we have two names: `sample01`
    and `sample02`. Those are the service names associated with our two microservices
    and by picking one service name there, you can find all the tracing information
    related to that microservice. Figure [13-6](#461146_1_En_13_Chapter.xhtml#Fig6)
    shows the tracing information related to `sample01` or the `Order Processing`
    microservice.


    ### Note


    The Zipkin architecture is built with four main components: collector, storage,
    search, and web UI. The traced data published from applications (or microservices)
    first hits the collector. The collector validates, stores, and indexes the data
    for lookups. The storage of Zipkin is pluggable and it natively supports Cassandra,
    ElasticSearch, and MySQL. Once the data is indexed and stored, the search component
    of Zipkin provides a JSON API to interact with traces, which is mostly used by
    the web UI.


    ![../images/461146_1_En_13_Chapter/461146_1_En_13_Fig6_HTML.jpg](images/461146_1_En_13_Chapter/461146_1_En_13_Fig6_HTML.jpg)


    Figure 13-6


    Tracing information related to the Order Processing microservice


    Zipkin also has another nice feature, which builds a dependency graph for your
    microservice by analyzing inbound and outbound traffic patterns. This is quite
    useful when we have many microservices in our deployment. Anyway, in this particular
    example it’s a very simple graph between the `Order Processing` (`sample01`) and
    `Inventory` (`sample02`) microservices, as shown in Figure [13-7](#461146_1_En_13_Chapter.xhtml#Fig7).


    ![../images/461146_1_En_13_Chapter/461146_1_En_13_Fig7_HTML.jpg](images/461146_1_En_13_Chapter/461146_1_En_13_Fig7_HTML.jpg)


    Figure 13-7


    Dependency graph between the OrderProcessing and Inventory microservices


    ### Event-Driven Log Aggregation Architecture


    Let’s revisit Figure [13-4](#461146_1_En_13_Chapter.xhtml#Fig4), which is the
    high-level design of what we are going to discuss in this section. The design
    here is bit different from what we proposed in Chapter [2](#461146_1_En_2_Chapter.xhtml),
    “Designing Microservices” (see Figure [2-17](#461146_1_En_2_Chapter.xhtml#Fig17)).
    Figure [13-8](#461146_1_En_13_Chapter.xhtml#Fig8) depicts the redone design as
    per the recommendation for a log aggregator architecture in Chapter [2](#461146_1_En_2_Chapter.xhtml).


    ![../images/461146_1_En_13_Chapter/461146_1_En_13_Fig8_HTML.jpg](images/461146_1_En_13_Chapter/461146_1_En_13_Fig8_HTML.jpg)


    Figure 13-8


    Zipkin with event-driven log aggregation architecture


    Unlike in Figure [13-4](#461146_1_En_13_Chapter.xhtml#Fig4), here there is no
    direct coupling between the Zipkin server and the microservices. Each microservice
    publishes the logs to a messaging system, which can be either RabbitMQ or Kafka,
    and Zipkin picks the logs from the messaging system. The advantage of this model
    is that even if the Zipkin server is down for some time, microservices can independently
    keep on publishing logs and Zipkin picks them all from the messaging system when
    it reboots.'
