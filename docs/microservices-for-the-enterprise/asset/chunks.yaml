    ## Fundamentals of Microservices Communication


    As discussed in the first chapter, services are business capability-oriented and
    the interactions between these services form a system or a product, which is related
    to a particular set of business use cases. Hence inter-service communication is
    a key factor to the success of the microservices architecture.


    A microservices-based application consists of a suite of independent services
    that communicate with each other through messaging. Messaging is not a new concept
    in distributed systems. In monolithic applications, business functionalities of
    different processors/components are invoked using function calls or language-level
    method calls. In Service Oriented Architecture (SOA), this was shifted toward
    more loosely coupled web service level messaging, which is primarily based on
    SOAP, on top of different protocols such as HTTP, message queuing, etc. Almost
    all of the service interactions are implemented at the centralized Enterprise
