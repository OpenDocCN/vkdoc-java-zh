    us to use two completely different persistent layers (databases) for command and
    query services. For example, we can use a database that is optimized for reads
    in the query model while we use a write-optimized database for command model.
    While CQRS has several advantages, such as independent scaling and management
    of read and write components of your application, we should use it when it is
    absolutely necessary to have the separation between the command and query models,
    because it comes with added complexity related to synchronizing the same data
    across multiple datastores/caches. For most commons use cases, the CRUD model
    fits elegantly.


    ## Streams


    A *stream* is a sequence of events/data elements made available over time. A series
    of events over time is quite common in modern enterprise applications, where continuous
    streams are generated with regard to many use cases, such as financial trading
    systems, weather data, traffic information, etc. The seams between the event-driven
    architecture and streams are pretty hard to determine, if you don’t delve deep
    into the concept of stream processing.


    ### Stream Processing


    The software components that receive and send data streams and execute the business
    logic are called *stream processors*. Unlike conventional event-driven architecture,
    the processing logic of a stream is written against not one event but across multiple.


    In the context of microservices, some of the input to your microservice can come
    from streams or microservices, which have to publish to a given stream. Therefore,
    the ability to integrate stream processing along with your service is a common
    requirement.


    #### Programmatic Stream Processing


    Stream processing can be done by writing code to process events sequentially from
    a source event stream. As shown in Figure [10-7](#461146_1_En_10_Chapter.xhtml#Fig7),
    an *actor* or *agent* that accepts an event, processes the event and produces
    new events. A stream processor allows you to write logic for each actor, which
    takes care of most of the heavy lifting tasks such as collecting data, delivering
    to each actor, ordering, results collection, scaling, and error handling.


    ![../images/461146_1_En_10_Chapter/461146_1_En_10_Fig7_HTML.jpg](images/461146_1_En_10_Chapter/461146_1_En_10_Fig7_HTML.jpg)


    Figure 10-7


    Stream processing with code


    There are quite a few stream processor solutions out there, including Apache Storm^([^(140)](#fn140)),
    Apache Flink^([^(141)](#fn141)), and Kafka Streams^([^(142)](#fn142)), and they
    are based on a coding approach to stream processing.


    #### Streaming SQL


    Rather writing code to do stream processing, we can use SQL-like syntax to process
    streams. This is known as streaming SQL. With *streaming SQL*, you don’t need
    to write code to build your stream processing use cases. Rather most of the essential
    functionalities can be abstracted into a streaming SQL engine.


    Therefore, streaming SQL enables us to manipulate streaming data declaratively
    without having to write code. There are many stream-processing solutions, such
    as Apache Flink, Kafka (KSQL), that now offer streaming SQL support.


    ## A Microservices Architecture with APIs, Events, and Streams


    A pragmatic microservices architecture is often built on top of APIs, events,
    and streams. We discussed in Chapter [6](#461146_1_En_6_Chapter.xhtml), “Microservices
    Governance,” how to organize services around core services, integration services,
    and API services. You can extend the same model to support events and streams.
    In Figure [10-8](#461146_1_En_10_Chapter.xhtml#Fig8), you can observe that we
    used API services to expose business functionalities to the consumers and those
    API services are centrally managed by the API management component. API services
    are deployed on micro-gateway nodes, which means each API service has an independent
    runtime but is controlled by the central API management layer.


    ![../images/461146_1_En_10_Chapter/461146_1_En_10_Fig8_HTML.jpg](images/461146_1_En_10_Chapter/461146_1_En_10_Fig8_HTML.jpg)


    Figure 10-8


    Microservices reference architecture with APIs, events, and streams


    Microservices are integrated using active/orchestration and reactive (choreography)
    patterns and the event bus is used as the messaging backbone.


    Microservices can receive events from external event sources and each consumer
    service has the business logic of processing those events. Similarly, stream-processing
    logic is also part of the services that consume the source streams. They can either
    implement using streaming SQL runtimes or programmatically process the event streams.
    Unlike API management, the consumption of events and streams is managed when services
    publish events to the consumers. If required, the events and stream-sinking services
    can be managed via an event and stream-management layer when we sink events or
    streams. Similar to the API management ecosystem, we can build an event and stream
    management layer, so that we can fully manage the event sinking or stream sinking
    (publishing) channels of our microservices implementation.'
  trans: '

    ### 命令查询职责分离 (CQRS)


    大多数传统服务或应用程序在开发时都基于这样一个假设：我们*创建*新记录、*读取*记录、*更新*现有记录，并在处理完毕后*删除*记录。这些操作被称为 CRUD（创建、读取、更新和删除）操作，并且所有这些操作都在一个通用模型之上执行。这种方法被称为*CRUD
    模型*。


    然而，对于微服务和现代复杂的企业需求而言，为所有操作使用一个通用数据模型并不总是可行的。例如，假设某个服务具有两个功能：一个用于从表中搜索和读取记录，另一个用于更新表中的记录。在大多数情况下，这两个功能截然不同，使用通用数据模型常常会使实现变得复杂。在这种情况下，我们可以将通用数据模型拆分为查询模型和命令模型。这就是
    CQRS 背后的基本概念。


    在 CQRS 中（见图 10-6），查询模型主要用于从数据存储中读取数据，而命令模型则用于管理数据存储中的记录。


    这些模型可以操作同一个数据库，但通常使用专用数据库会带来显著优势。如果我们假设为每个模型使用两个专用数据库，那么就需要某种事件驱动的消息传递机制来保持数据同步。在大多数情况下，最终一致性（我们将在第
    5 章详细讨论）足以满足 CQRS 场景的需求，因此，我们之前讨论过的事件驱动消息传递技术可用于构建 CQRS。


    ![../images/461146_1_En_10_Chapter/461146_1_En_10_Fig6_HTML.jpg](img/461146_1_En_10_Fig6_HTML.jpg)


    图 10-6


    CQRS 涉及将数据模型一分为二，并在专用数据库上操作它们，这些数据库通过事件最终保持一致


    在微服务的上下文中，我们可以认为每个查询和命令模型都是两个不同微服务的一部分。由于它们拥有专用数据库和定义明确的功能，因此它们遵循了大多数微服务数据管理技术。查询和命令模型的完全解耦允许我们为命令服务和查询服务使用两个完全不同的持久层（数据库）。例如，我们可以在查询模型中使用针对读取操作优化的数据库，同时为命令模型使用针对写入操作优化的数据库。虽然
    CQRS 具有诸多优势，例如可以独立扩展和管理应用程序的读写组件，但我们只应在确实需要分离命令和查询模型时才使用它，因为它会带来与跨多个数据存储/缓存同步相同数据相关的额外复杂性。对于大多数常见用例，CRUD
    模型更为简洁适用。


    ## 流


    *流*是随时间推移可用的一系列事件/数据元素。在现代企业应用中，随时间推移产生一系列事件的情况非常普遍，许多用例都会生成连续的数据流，例如金融交易系统、天气数据、交通信息等。如果不深入探究流处理的概念，就很难界定事件驱动架构与流之间的界限。


    ### 流处理


    接收和发送数据流并执行业务逻辑的软件组件称为*流处理器*。与传统的基于单个事件编写处理逻辑的事件驱动架构不同，流处理逻辑是针对多个事件编写的。


    在微服务的上下文中，微服务的一些输入可能来自流或其他需要发布到特定流的微服务。因此，将流处理与您的服务集成在一起的能力是一个常见需求。


    #### 编程式流处理


    流处理可以通过编写代码来顺序处理来自源事件流的事件来实现。如图 10-7 所示，一个*参与者*或*代理*接收事件、处理事件并生成新事件。流处理器允许您为每个参与者编写逻辑，这负责处理大部分繁重任务，例如收集数据、分发到每个参与者、排序、结果收集、扩展和错误处理。


    ![../images/461146_1_En_10_Chapter/461146_1_En_10_Fig7_HTML.jpg](img/461146_1_En_10_Fig7_HTML.jpg)


    图 10-7


    使用代码进行流处理


    市面上有不少流处理器解决方案，包括 Apache Storm^(¹⁴⁰)、Apache Flink^(¹⁴¹) 和 Kafka Streams^(¹⁴²)，它们都基于编码方式进行流处理。


    #### 流式 SQL


    除了编写代码进行流处理，我们还可以使用类似 SQL 的语法来处理流。这被称为流式 SQL。使用*流式 SQL*，您无需编写代码来构建流处理用例。相反，大多数基本功能都可以抽象到流式
    SQL 引擎中。


    因此，流式 SQL 使我们能够以声明方式操作流数据，而无需编写代码。许多流处理解决方案，例如 Apache Flink、Kafka (KSQL)，现在都提供流式
    SQL 支持。


    ## 结合 API、事件和流的微服务架构


    一个实用的微服务架构通常构建在 API、事件和流之上。我们在第 6 章“微服务治理”中讨论了如何围绕核心服务、集成服务和 API 服务来组织服务。您可以扩展相同的模型以支持事件和流。在图
    10-8 中，您可以看到我们使用 API 服务向消费者公开业务功能，并且这些 API 服务由 API 管理组件集中管理。API 服务部署在微网关节点上，这意味着每个
    API 服务都有独立的运行时，但受中央 API 管理层控制。


    ![../images/461146_1_En_10_Chapter/461146_1_En_10_Fig8_HTML.jpg](img/461146_1_En_10_Fig8_HTML.jpg)


    图 10-8


    结合 API、事件和流的微服务参考架构


    微服务通过主动/编排模式和响应式（编排）模式进行集成，事件总线用作消息传递主干。


    微服务可以从外部事件源接收事件，每个消费者服务都包含处理这些事件的业务逻辑。类似地，流处理逻辑也是消费源流的服务的一部分。它们可以使用流式 SQL 运行时实现，也可以通过编程方式处理事件流。与
    API 管理不同，事件和流的消费是在服务向消费者发布事件时进行管理的。如果需要，当我们将事件或流下沉时，可以通过事件和流管理层来管理事件和流下沉服务。类似于
    API 管理生态系统，我们可以构建一个事件和流管理层，从而完全管理我们微服务实现的事件下沉或流下沉（发布）通道。

    '
- fmt: '# Summary


    In this chapter, you learned about how to expose your microservices as managed
    APIs. The API management layer is the primary entry point to your microservices
    consumers where you expose business functionalities as APIs. We discussed the
    key components of an API management solution—API Gateway, API Store/Developer
    portal, API Publisher/Lifecycle Manager, API Analytics/Observability, and API
    Security solutions. We identified the differences between the API Gateway and
    service mesh proxy, and we discussed how API management and service mesh can coexist.


    An event-driven architecture is quite useful for making services autonomous. We
    discussed the commonly used pattern for an event-driven architecture—event notification,
    event state transfer, event sourcing, and CQRS. Most of the event-driven communication
    patterns are implemented with the technologies that are used in messaging queuing
    and publisher-subscriber messaging infrastructures.


    Streams are a special case of an event-driven architecture, where a sequence of
    events are processed over time. Stream processing is often done using a dedicated
    query language called streaming SQL, while some solutions are based on a pure
    coding approach to process streams.


    APIs, events, and streams act as the front door to your enterprise’s microservices
    implementation. You can extend the microservices reference architecture with APIs,
    events, and streams by connecting the external systems with the internal microservices.


    Footnotes [1](#461146_1_En_10_Chapter.xhtml#Fn1_source) [2](#461146_1_En_10_Chapter.xhtml#Fn2_source)
    [3](#461146_1_En_10_Chapter.xhtml#Fn3_source) [4](#461146_1_En_10_Chapter.xhtml#Fn4_source)


    # 11. Microservices Security Fundamentals


    The microservices architecture expands the attack surface with multiple microservices
    communicating with each other remotely. Instead of having one or two entry points,
    now we have hundreds of entry points to worry about. It’s a common principle in
    security that the strength of a given system is only as strong as the strength
    of its weakest link. The more entry points we have, the broader the attack surface,
    and the higher the risk of being attacked. Unlike in a monolithic application,
    the depth and breadth we need to worry about in securing a microservice is much
    higher. There are multiple perspectives in securing microservices: secure development
    lifecycle and test automation, security in DevOps, and application level security.


    ### Note


    In 2010, it was discovered that since 2006, a gang of robbers equipped with a
    powerful vacuum cleaner had stolen more than 600,000 euros from the Monoprix supermarket
    chain in France. The most interesting thing was the way they did it. They found
    out the weakest link in the system and attacked it. To transfer money directly
    into the store’s cash coffers, cashiers slid tubes filled with money through pneumatic
    suction pipes. The robbers realized that it was sufficient to drill a hole in
    the pipe near the trunk and then connect a vacuum cleaner to capture the money.
    They didn’t have to deal with the coffer shield.


    The key driving force behind the microservices architecture is the speed to production
    (or the time to market). One should be able to introduce a change to a service,
    test it, and instantly deploy it into production. A proper secure development
    lifecycle and test automation strategy needs to be there to make sure that we
    do not introduce security vulnerabilities at the code level. We need to have a
    proper plan for static code analysis and dynamic testing—and most importantly
    those tests should be part of the continuous delivery (CD) process. Any vulnerability
    should be identified early in the development lifecycle and should have shorter
    feedback cycles.


    There are multiple microservices deployment patterns—but the most commonly used
    one is service-per-host model. The host does not necessarily mean a physical machine—most
    probably it would be a container (Docker). The DevOps security needs to worry
    about container-level security. How do we isolate a container from other containers
    and what level of isolation we have between the container and the host operating
    system? Apart from containers, Kubernetes as a container orchestration platform
    introduced another level of isolation, in the form of a `pod`. Now we need to
    worry about securing the communication between containers as well as between pods.
    In Chapter [8](#461146_1_En_8_Chapter.xhtml), “Deploying and Running Microservices,”
    we discussed containers and security in detail. Another important pattern with
    respect to microservices deployment is the `Service Mesh`, which we discussed
    in detail in Chapter [9](#461146_1_En_9_Chapter.xhtml), “Service Mesh”. In a typical
    containerized deployment in Kubernetes, the communication between pods always
    happens through a Service Mesh, to be precise, through the Service Mesh proxy.
    The Service Mesh proxy is now responsible for applying and enforcing security
    between two microservices.


    How do we authenticate and access control users to microservices and how do we
    secure the communication channels between microservices? All this falls under
    application-level security. This chapter covers security fundamentals with a set
    of patterns to address the challenges we face in securing microservices at the
    application level. What does it mean to secure a microservice? How does securing
    a microservice differ from securing any other service? What’s so special about
    microservices? All these questions will be addressed in this chapter. Security
    at the development time and in the deployment process (with Docker and Kubernetes)
    is out of the scope of this book. We encourage the readers who are keen on knowing
    all the aspects in microservices security to refer to a book specifically focusing
    on microservices security.'
