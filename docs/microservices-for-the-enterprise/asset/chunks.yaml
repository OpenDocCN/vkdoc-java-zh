- fmt: '### Monolithic API Gateway for Integrating Microservices


    One common anti-pattern is to use an API gateway as the service integration (or
    composition) layer to expose business services to the consumers. For example,
    suppose you have developed several microservices and the business functionality
    that you want to expose needs to have some collaboration (or orchestration) between
    multiple services. What you need to build is a composite microservice that talks
    to a couple of downstream services and exposes the composite functionality. In
    many microservices implementations, we developed the integration logic as part
    of the API gateway, which is more or less a monolithic component. There are many
    real-world examples from the existing microservices implementations. For example,
    Figure [7-3](#461146_1_En_7_Chapter.xhtml#Fig3) illustrates how the Netflix API
    gateway^([^(96)](#fn96)) was initially implemented.


    ![../images/461146_1_En_7_Chapter/461146_1_En_7_Fig3_HTML.jpg](images/461146_1_En_7_Chapter/461146_1_En_7_Fig3_HTML.jpg)


    Figure 7-3


    Netflix API gateway : service integration is done at the API gateway level and
    multiple APIs are part of the monolithic API gateway layer


    Netflix is probably the most popular and successful microservices implementation
    out there. Netflix exposes their internal services through the Netflix API layer.
    They explain the functionality of the Netflix API as follows:


    > *The Netflix API is the “front door” to the Netflix ecosystem of microservices.
    As requests come from devices, the API provides the logic of composing calls to
    all services that are required to construct a response. It gathers whatever information
    it needs from the backend services, in whatever order needed, formats and filters
    the data as necessary, and returns the response. So, at its core, the Netflix
    API is an orchestration service that exposes coarse-grained APIs by composing
    fined grained functionality provided by the microservices.*


    You can clearly observe that the orchestration layer , which is a monolithic component,
    contains a significant portion of the business logic in this scenario. This leads
    to numerous trade-offs that are associated with monolithic applications that we
    discussed in earlier chapters (such as no failure isolation, can’t scale independently,
    ownership issues, etc.).


    Netflix has identified the drawbacks to the approach and introduced a new architecture
    for the very same scenario with a segregated API gateway layer, which is no longer
    monolithic. As shown in Figure [7-4](#461146_1_En_7_Chapter.xhtml#Fig4), at the
    API gateway layer, each composition service is implemented as an independent entity.


    ![../images/461146_1_En_7_Chapter/461146_1_En_7_Fig4_HTML.jpg](images/461146_1_En_7_Chapter/461146_1_En_7_Fig4_HTML.jpg)


    Figure 7-4


    Netflix API gateway with independent APIs that integrate microservices


    This approach is pretty much the same as introducing an integration service that
    is not part of a monolithic runtime and enforces the API gateway related functionality
    as part of the service runtime. They also tried another alternative of keeping
    the API gateway as dumb as possible and introducing a composite service where
    API gateway simply acts as a pass-through runtime.


    The key takeaway from this use case is that you shouldn’t be using an API gateway
    as a monolithic runtime to put the business logic. The service integration or
    composition logic must be part of another microservice (either at the API gateway
    layer or at the services layer).


    ### Integrating Microservice with an ESB


    There are some microservices implementations that bring in ESB back to a microservices
    architecture, by using ESB as a runtime to implement the service integration.
    In most cases, ESB is deployed in a container to serve the service integration
    of a specific use case. However, ESB has inherent limitations, such as too bulky
    to be run as a container, not so developer friendly because of the configuration-based
    integration, etc. In fact, there are some ESB vendors who try to promote this
    pattern, but this is something that you should avoid while integrating microservices.
    (There are also container friendly and lightweight versions of ESBs which can
    be used to independently integrate microservices, which is far better than using
    a central ESB.)


    ### Using Homogeneous Technologies to Build all Your Microservices


    We’ve discussed earlier that smart endpoints and dumb pipes literally means that
    all the cool features that we get out-of-the-box with ESBs now have to be implemented
    as part of our service logic. When we develop microservices, we need to consider
    that not all microservices are similar. There are certain services that will focus
    more on the business logic and computations, while some services are more about
    inter-service communications and network calls. If we stick to a single homogenous
    set of technologies to build all these microservices, and then we will have to
    put more effort into building the core components for integrating microservices
    than focusing on the business logic of the service. For example, service integration
    often requires service discover and resilient communication (such as circuit breakers).
    Some frameworks or programming languages offer these capabilities out-of-the-box
    while some don’t. Therefore, your architecture should be flexible enough to pick
    the right technology for the job.


    ## Organizing Microservices


    Identifying different types of microservices based on their interactions and using
    the most appropriate technologies to build them is the key to building a successful
    microservices architecture. If we take a closer look at the microservices implementation,
    we can identify different types of services that we can categorize into a few
    different categories. Based on service functionalities and granularities, we can
    identify the following service categories.


    ### Core Services


    There are microservices that are fine-grained, self-contained (with no external
    service dependencies) and mostly consist of the business logic with little or
    no network communication logic. Given that these services do not have significant
    network communication functionalities, you are free to select any service implementation
    technology that can fulfill the service’s business logic. Also, these services
    may have their own private databases that are leveraged to build the business
    logic. Such microservices can be categorized as *core* or *atomic* microservices.'
