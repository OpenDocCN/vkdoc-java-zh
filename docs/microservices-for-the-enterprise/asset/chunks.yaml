    ## Event-Driven Microservices with Kafka


    In Chapter [3](#461146_1_En_3_Chapter.xhtml), we discussed the fundamentals of
    event-driven microservices and Kafka. In this section, we see how one microservice
    communicates with another microservice via asynchronous messaging. Going by the
    design we presented in Chapter [2](#461146_1_En_2_Chapter.xhtml), the `Order Processing`
    microservice (`sample07`) publishes an event to Kafka upon completing processing
    an order, and the `Billing` (`sample08`) microservice listens to the same event,
    consumes the message, and once billing is completed, publishes another event to
    Kafka. The `sample07` or the `Order Processing` microservice acts as the event
    publisher (or the event source) and the `sample08` or the `Billing` microservice
    acts as the event consumer (or the event sink). The source code of these two microservices
    is available under `ch04/sample07` and `ch04/sample08`. Figure [4-4](#461146_1_En_4_Chapter.xhtml#Fig4)
    shows the interactions between microservices and the message broker (Kafka).


    ![../images/461146_1_En_4_Chapter/461146_1_En_4_Fig4_HTML.jpg](images/461146_1_En_4_Chapter/461146_1_En_4_Fig4_HTML.jpg)


    Figure 4-4


    Event-driven microservices with Kafka


    ### Setting Up a Kafka Message Broker


    In this section we discuss how to set up a Kafka message broker. For the recommendations
    on a production deployment, always refer to the Kafka official documentation^([^(79)](#fn79)).


    First we need to download the latest Kafka distribution. For the samples in the
    book, we are using version 2.11-1.1\. Once the Kafka distribution is downloaded
    and unzipped, you can run the following command to start ZooKeeper^([^(80)](#fn80)).
    Kafka uses ZooKeeper, so you need to first start a ZooKeeper server if you don’t
    already have one. You can use the convenience script packaged with Kafka to get
    a quick-and-dirty single-node ZooKeeper instance.


    ```

    \> cd kafka_2.11-1.1.0

    \> bin/zookeeper-server-start.sh config/zookeeper.propertie

    ```


    Now we can use the following command in a different console to start the Kafka
    server.


    ```

    \> cd kafka_2.11-1.1.0

    \> bin/kafka-server-start.sh config/server.properties

    ```


    For our use case, we need two topics: `ORDER_PROCESSING_COMPLETED` and `PAYMENT_PROCESSING_COMPLETED`.
    Let’s create the topics using the following commands.


    ```

    \> cd kafka_2.11-1.1.0

    \> bin/kafka-topics.sh --create --zookeeper localhost:2181 --replication-factor
    1 --partitions 1 --topic ORDER_PROCESSING_COMPLETED

    Created topic "ORDER_PROCESSING_COMPLETED"

    \> bin/kafka-topics.sh --create --zookeeper localhost:2181 --replication-factor
    1 --partitions 1 --topic PAYMENT_PROCESSING_COMPLETED

    Created topic "PAYMENT_PROCESSING_COMPLETED"

    ```


    You can use the following command to view all the topics available in the message
    broker.


    ```

    \> cd kafka_2.11-1.1.0

    \> bin/kafka-topics.sh --list --zookeeper localhost:2181

    ORDER_PROCESSING_COMPLETED

    PAYMENT_PROCESSING_COMPLETED

    ```


    ### Building Publisher (Event Source)


    In this section, we discuss how to build the `Order Processing` microservice to
    publish events to the `ORDER_PROCESSING_COMPLETED` topic. Let’s look at the notable
    dependencies added to the `pom.xml` file inside `sample07`. These two dependencies
    take care of the `@EnableBinding` annotation in the `sample07/src/main/java/com/apress/ch04/sample07/OrderProcessingApp.java`
    class and all the dependencies related to Kafka.


    ```

    org.springframework.cloud

    spring-cloud-stream


    org.springframework.cloud

    spring-cloud-starter-stream-kafka


    ```


    Now let’s look at the code, which publishes the event to the message broker. When
    the `Order Processing` (`src/main/java/com/apress/ch04/sample07/service/OrderProcessing.java`)
    microservice gets an order update, it talks to the `OrderPublisher` (`src/main/java/com/apress/ch04/sample07/OrderPublisher.java`)
    class to publish the event.


    ```

    @Service

    public class OrderPublisher {

    @Autowired

    private Source source;

    public void publish(Order order) {

    source.output().send(MessageBuilder.withPayload(order).build());

    }

    }

    ```


    The name of the topic and the message broker information are picked from the `/src/main/resources/application.properties`
    file.


    ```

    spring.cloud.stream.bindings.output.destination:ORDER_PROCESSING_COMPLETED

    spring.cloud.stream.bindings.output.content-type:application/json

    spring.cloud.stream.kafka.binder.zkNodes:localhost

    spring.cloud.stream.kafka.binder.zkNodes.brokers: localhost

    ```


    Use the following Maven command to spin up the publisher microservice.


    ```

    \> cd sample07

    \> mvn spring-boot:run

    ```'
