- fmt: '### Note


    If you carefully observe the two responses we got for the OAuth 2.0 client credentials
    grant type and the password grant type, you might have noticed that there is no
    refresh token in the client credentials grant type flow. In OAuth 2.0, the refresh
    token is used to obtain a new access token, when the access token is expired.
    This is quite useful when the user is offline and the client application has no
    access to his/her credentials to get a new access token. In that case, the only
    way is to use a refresh token. For the client credentials grant type, there is
    no user involved, and it always has access to its own credentials, so it can be
    used any time it wants to get a new access token. Hence a refresh token is not
    required.


    Now let’s see how to validate an access token by talking to the authorization
    server. The resource server usually does this. An interceptor running on the resource
    server intercepts the request, extracts the access token, and then talks to the
    authorization server. We see in the next section how to configure a resource server
    (another microservice protected with OAuth 2.0), and the following command shows
    how to directly talk to the authorization server to validate the access token
    obtained in the previous command. Be sure to replace the `$TOKEN` value with the
    corresponding access token.


    ```

    \> curl -k -X POST -H "Authorization: Bearer $TOKEN" -H "Content-Type: application/json"   https://localhost:8443/user

    {"details":{"remoteAddress":"0:0:0:0:0:0:0:1","sessionId":null,"tokenValue":"9f3319a1-c6c4-4487-ac3b-51e9e479b4ff","tokenType":"Bearer","decodedDetails":null},"authorities":[],"authenticated":true,"userAuthentication":null,"credentials":"","oauth2Request":{"clientId":"10101010","scope":["bar"],"requestParameters":{"grant_type":"client_credentials","scope":"bar"},"resourceIds":[],"authorities":[],"approved":true,"refresh":false,"redirectUri":null,"responseTypes":[],"extensions":{},"grantType":"client_credentials","refreshTokenRequest":null},"clientOnly":true,"principal":"10101010","name":"10101010"}

    ```


    This command returns the metadata associated with the access token, if the token
    is valid. The response is built inside the `user()` method of the `sample01/src/main/java/com/apress/ch12/sample01/TokenServiceApp.java`
    class, as shown in the following code snippet. With the `@RequestMapping` annotation,
    we map the `/user` context (from the request) to the `user()` method.


    ```

    @RequestMapping("/user")

    public Principal user(Principal user) {

    return user;

    }

    ```


    ### Note


    By default, with no extensions, Spring Boot stores issued tokens in memory. If
    you restart the server after issuing a token and then validate it, it will result
    in an error response.


    ### Protecting a Microservice with OAuth 2.0


    In this section, we see how to protect a Spring Boot microservice with OAuth 2.0.
    In OAuth terminology, it’s a resource server. The code corresponding to the OAuth
    2.0 protected `Order Processing` microservice is in the `ch12/sample02` directory.
    To secure the microservice with OAuth 2.0, we add the `@EnableResourceServer`
    annotation to the `sample02/src/main/java/com/apress/ch12/sample02/OrderProcessingApp.java`
    class and point the `security.oauth2.resource.user-info-uri` property in the `sample02/src/main/resources/application.properties`
    file to the authorization server’s user info endpoint. The following shows the
    `application.properties` file corresponding to `sample02`. Note that the `security.oauth2.resource.jwt.keyUri`
    property is commented out there by default; we’ll discuss its usage later in the
    chapter.


    ```

    server.port=9443

    server.ssl.key-store: keystore.jks

    server.ssl.key-store-password: springboot

    server.ssl.keyAlias: spring

    security.oauth2.resource.user-info-uri=https://localhost:8443/user

    #security.oauth2.resource.jwt.keyUri: https://localhost:8443/oauth/token_key

    ```


    Since the `Order Processing` microservice calls the user info endpoint over HTTPS,
    and we use self-signed certificates to secure the authorization server, this call
    will result in a trust validation error. To overcome that, we need to export the
    public certificate of the authorization server from `ch12/sample01/keystore.jks`
    to a new key store and set it as the trust store of the `Order Processing` microservice.


    Use the following `keytool` command to export the public certificate and store
    it in the `cert.crt` file. The password used to protect `keystore.jks` is `springboot`.
    Instead of the `export` argument, which instructs the `keytool` to export a certificate
    under the given `alias`, you can also use the `exportcert` argument.


    ```

    \> keytool -export -keystore keystore.jks -alias spring -file cert.crt

    ```


    Now use the following `keytool` command to create a new trust store with `cert.crt`.
    Here we use `authserver` as the alias to store the authorization server’s public
    certificate in `trust-store.jks` and copy the trust store to the `ch12/sample02`
    directory (by default, you will find all the key stores and trust stores required
    to run the samples under the corresponding directories, when you clone the code
    from the sample Git repository). We use the same password, `springboot`, to protect
    `trust-store.jks` as well. Instead of the `import` argument, which instructs the
    `keytool` to import a certificate under the given `alias`, you can also use the
    `importcert` argument.


    ```

    \> keytool -import -file cert.crt -alias authserver -keystore trust-store.jks

    ```


    We also need to set the location of the trust store and its password as system
    parameters in the code. You will find the following code snippet in the `sample02/src/main/java/com/apress/ch12/sample02/OrderProcessingApp.java`
    class, which sets the system properties.


    ```

    static {

    String path = System.getProperty("user.dir");

    System.setProperty("javax.net.ssl.trustStore", path

    + File.separator + "trust-store.jks");

    System.setProperty("javax.net.ssl.trustStorePassword", "springboot");

    HttpsURLConnection.setDefaultHostnameVerifier(new HostnameVerifier()

    {

    public boolean verify(String hostname, SSLSession session) {

    return true;

    }

    });

    }

    ```'
