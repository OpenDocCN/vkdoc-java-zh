  trans: '

    ### 使用 OpenAPI 定义 API


    为微服务设计 API 的关键思想是隐藏实现细节，仅暴露处理特定业务功能的接口。OpenAPI 规范（OAS），原名 Swagger，为 REST API 定义了一种标准的、与编程语言无关的接口描述。它允许人类和计算机无需访问源代码、额外文档或检查网络流量，就能发现并理解服务的能力。


    OpenAPI 文档描述 API 的服务，并以 YAML 或 JSON 格式呈现。这些文档可以静态生成并提供，也可以从应用程序动态生成。


    你可以先设计 API（契约优先），然后再实现 API（可能使用代码生成插件）；也可以先实现 API，再为你的服务推导出 OpenAPI 定义。然而，务必记住，OpenAPI
    并非旨在涵盖所有可能的 RESTful 服务设计风格。你可以参考 OpenAPI 示例^(¹³⁹)来学习如何构建基于 OpenAPI 的 API 定义。


    ### 你的 API 查询语言：GraphQL


    正如第 3 章“服务间通信”中所讨论的，GraphQL 为 API 提供了一种查询语言，这些 API 不一定基于 REST 架构。我们仍然可以在基于 GraphQL
    的服务之上实现 API 管理，并将其作为托管 API 暴露。基于 GraphQL 的 API 可能比传统的 RESTful API 更强大，因为它提供了对
    API 中数据的完整且易于理解的描述，赋予客户端精确获取所需数据（不多不少）的能力，使 API 更易于随时间演进，并支持强大的开发者工具。


    ### API 管理与服务网格


    API 网关/管理解决方案与服务网格具有相似的特征，这使社区中的一些人感到困惑。为了区分 API 网关和服务网格，让我们仔细看看两者的关键特征。理解与 API
    网关和服务网格管理进行交互的用户非常重要。


    *   **API 管理**：与 API 管理交互的用户正在创建和管理他们希望作为 API 暴露的业务功能。

    *   **服务网格管理**：与服务网格交互的用户主要负责管理微服务之间通信的非业务逻辑方面。他们或多或少地管理着服务的服务间通信基础设施。


    基于这种区别，图 10-2 展示了如何将 API 管理与服务网格结合使用。


    ![../images/461146_1_En_10_Chapter/461146_1_En_10_Fig2_HTML.jpg](img/461146_1_En_10_Fig2_HTML.jpg)


    图 10-2


    使用服务网格和 API 网关的服务间通信


    我们在 API 网关层开发的 API/边缘服务服务于特定的业务功能。它们调用下游微服务，并可能包含一些创建多个服务组合/混搭的业务逻辑。API 服务还需要以弹性的方式调用下游服务，并应用各种稳定性模式，例如断路器、超时和负载均衡/故障转移。它们可以将这些功能卸载到服务网格。因此，每个
    API 服务旁边都会运行一个服务网格边车代理。（尽管市面上大多数 API 网关解决方案都内置了这些功能，但它们仍然可以将这些功能卸载到服务网格。）由于服务网格是网络通信基础设施，它允许你从服务代码中解耦并卸载大部分应用程序网络功能，因此你将拥有一个单独的控制平面来管理这些能力。可能存在某些重叠的功能，例如给定
    API 服务的可观测性，这在服务网格和 API 管理的可观测性能力中都可以获得。我们仍然可以将它们视为两个不同的东西，因为 API 管理层是为业务能力设计的，而服务网格层是为非业务逻辑的服务间通信需求设计的。另一个重要的区别是，API
    管理层只管理你的 API 服务，而服务网格控制平面管理你所有的服务实例。


    ### 注意


    API 管理和服务网格存在一些重叠的功能，但重要的是要理解这两个概念服务于根本不同的需求。


    有一些 API 管理解决方案支持从同一层/组件进行 API 管理和服务网格管理。例如，Apigee 和 Istio 支持类似的架构模式。通过 Apigee
    对 Istio 集成的支持，用户可以通过 Istio 的原生配置机制添加 API 管理功能，从而将 Istio 网格中的一个或多个服务暴露为 API。Apigee
    APIM 通过 Istio Mixer 发布 API 策略等，并在每个边车处应用这些策略。通过这种方法，我们不再使用 API 微网关，而是将所有内容卸载到边车代理。API
    令牌验证、限流可以通过 APIM UI 进行管理。这种模式相对较新，还有待在实际生产用例中进行实战检验。


    ### 实现 API 管理


    为你的微服务实现全面的 API 管理需要满足我们之前讨论的所有 API 管理方面。有不少解决方案大幅削减了 API 管理功能，并将其作为微服务的 API 网关进行推广。在选择
    API 管理解决方案时，你需要谨慎，并确保它能满足你所有的 API 管理需求。此外，如果你已经完全接受了容器原生架构，那么诸如 API 网关之类的组件也必须是容器原生的（即，它们必须支持微网关架构）。


    市面上有不少 API 管理解决方案，例如 Apigee、WSO2 API Manager、Kong、MuleSoft 等。我们不侧重于比较它们或推荐特定解决方案。我们希望给予读者充分的自由来评估它们并选择最合适的技术。你可以在第
    10 章的示例中找到一些使用这些 API 管理解决方案构建的 API 管理用例。


    ## 事件


    事件驱动架构（EDA）是软件应用程序中广泛使用的一种架构范式，其中给定应用程序响应一个或多个事件通知来执行某种形式的代码/逻辑。EDA 使应用程序/服务比客户端-服务器架构更加自治，在客户端-服务器架构中，发送通知的一方会等待或依赖于消费事件的消费者。


    在微服务的上下文中，我们已经在异步通信风格（第 2 章，“设计微服务”）和响应式编排/编舞（第 7 章）下讨论过多种形式的 EDA。基本上，我们可以设计微服务使其在完全事件驱动的模型下运行，异步消息传递使它们更加自治。在本章中，我们将探讨微服务架构中一些常用的事件驱动模式。

    '
- fmt: '### Event Notifications


    Event notification is a common form of EDA where a service sends events to notify
    other services of a change in its domain. Often the event receiver must have the
    autonomy to carry out the task, if it wishes to do so. An event needs not carry
    much data on it; often a reference to where the updated information can be retrieved
    is sufficient.


    For example, as shown in Figure [10-3](#461146_1_En_10_Chapter.xhtml#Fig3), suppose
    we have two microservices, called `Customer` and `Shipping`. When there is a change
    in customer information, such as a customer’s address, we can send an event notification
    to the `Shipping` service. The event itself may not have all the details of the
    change, but includes a reference to where the information related to the change
    can be obtained. As discussed in Chapter [3](#461146_1_En_3_Chapter.xhtml), the
    asynchronous event-based communication can be used to realize such scenarios;
    we can use queue-based communication or topic-based communication to do this.


    ![../images/461146_1_En_10_Chapter/461146_1_En_10_Fig3_HTML.jpg](images/461146_1_En_10_Chapter/461146_1_En_10_Fig3_HTML.jpg)


    Figure 10-3


    Event notifications


    Obviously, most of the message/event broker solutions can be used as the backbone
    to implement this pattern and `Kafka`, `RabbitMQ`, and `ActiveMQ` are most commonly
    used in this domain.


    It is an anti-pattern to have logic flow that runs as part of event notifications.
    For example, if your event publisher expects the receivers to do a certain tasks
    upon the receipt of your event, then there is a logic flow between the event publisher
    and receiver. Some of the mere theoretical microservices books and other resources
    suggest that every integration/composition of microservices must be done using
    asynchronous event-driven communication. That literally means having logic flows
    across your microservices that run via event notifications.


    Having these kinds of logic flows is not a practical approach because they are
    extremely hard to manage and troubleshoot. Maybe the only way that you can derive
    such a logic flow is via observability (tracing). Therefore, you need to be cautious
    when applying an event-notification pattern to a scenario where you need to pass
    commands (you expect the receiver would do a definite task upon the receipt of
    your event).


    ### Event-Carried State Transfer


    This is a subtle variation of the event notification pattern. When an event is
    triggered, the subscribers are notified with events that contain details of the
    data that changed. So, the recipient services don’t need to access or refer to
    any other systems or services. The data is already being received as part of the
    event. Figure [10-4](#461146_1_En_10_Chapter.xhtml#Fig4) shows the same scenario
    that we discussed in the previous section, which is now modified with an event-carried
    state transfer.


    ![../images/461146_1_En_10_Chapter/461146_1_En_10_Fig4_HTML.jpg](images/461146_1_En_10_Chapter/461146_1_En_10_Fig4_HTML.jpg)


    Figure 10-4


    Event-carried state transfer


    One of the possible downsides of this approach is the duplication of data across
    multiple services, because all the subscribers will receive the same data. The
    implementation technology can be similar to event notifications. On the flip side,
    there is also decreased network traffic, because in this approach, the shipping
    service would not need to make a request to the customer service to get the updated
    address.


    ### Event Sourcing


    By using asynchronous messaging techniques, we can persist each state-changing
    event of an entity as a sequence of events. All such events are stored in an event
    bus or event log and subscribers can derive the state of that entity by processing
    the sequence of events that has taken place on that entity. For example, as shown
    in Figure [10-5](#461146_1_En_10_Chapter.xhtml#Fig5), the `Order Processing` service
    publishes the changes taken place on the `Order` entity as events. The state-changing
    events such as `order created`, `updated`, `paid`, `shipped`, etc. are published
    to the event bus. With event sourcing, since we have all the state changing events
    in the event log, multiple consumers can materialize different view of the same
    data and those consumers can discard the application state completely and rebuild
    it by re-running the events from the event log on an empty application. Also,
    we can determine the application state at any point in time as the events are
    recorded sequentially. If we need to replay the events executed previously (maybe
    with some modifications to those events), we can also do that using the event
    log.


    ![../images/461146_1_En_10_Chapter/461146_1_En_10_Fig5_HTML.jpg](images/461146_1_En_10_Chapter/461146_1_En_10_Fig5_HTML.jpg)


    Figure 10-5


    Event sourcing


    The subscriber applications and services can recreate the status of an order by
    just replaying the events that are taking place on an order. For example, it can
    retrieve all the events related to `order 11234` and derive the current state
    of the order.'
