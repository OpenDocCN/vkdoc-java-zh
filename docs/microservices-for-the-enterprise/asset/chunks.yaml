- fmt: '### Service-to-Service Communication


    In this section, we see how one microservice directly talks to another microservice
    over HTTP. We extend our domain-driven design example from Chapter [2](#461146_1_En_2_Chapter.xhtml).
    As per Figure [4-2](#461146_1_En_4_Chapter.xhtml#Fig2), the `Order Processing`
    microservice (`sample01`) talks directly to the `Inventory` microservice (`sample04`)
    over HTTP to update the inventory.


    ![../images/461146_1_En_4_Chapter/461146_1_En_4_Fig2_HTML.jpg](images/461146_1_En_4_Chapter/461146_1_En_4_Fig2_HTML.jpg)


    Figure 4-2


    Communication between microservices


    First, let’s get the `Inventory` microservice up and running. You can find the
    code for this microservice inside `ch04/sample04`. It’s another Spring Boot application,
    and there isn’t anything new from what we have discussed so far. Let’s look at
    the `updateItems` method in the `src/main/java/com/apress/ch04/sample04/service/Inventory.java`
    class. This method simply accepts an array of items, iterates through them, and
    prints the item code. Later in this section, the `Order Processing` microservice
    (`sample01`) will invoke this method to update the inventory.


    ```

    @RestController

    @RequestMapping(value = "/inventory")

    public class Inventory {

    @RequestMapping(method = RequestMethod.PUT)

    public ResponseEntity updateItems(@RequestBody Item[] items) {

    if (items == null || items.length == 0) {

    return ResponseEntity.badRequest().build();

    }

    for (Item item : items) {

    if (item != null) {

    System.out.println(item.getCode());

    }

    }

    return ResponseEntity.noContent().build();

    }

    }

    ```


    Let’s spin up the `sample04` microservice with the following Maven command. It
    will start on port 9000 (make sure to stop any of the microservices we started
    before, and ensure that no other service is running on port 9000).


    ```

    \> cd sample04

    \> mvn clean install

    \> mvn spring-boot:run

    ```


    Now let’s revisit our `sample01` code, which is at `ch04/sample01`. There we have
    the `createOrder` method, which accepts an order, and then talks to the `Inventory`
    microservice (`sample04`). You can find the corresponding code inside the `src/main/java/com/apress/ch04/sample01/service/OrderProcessing.java`
    class.


    ```

    @RequestMapping(method = RequestMethod.POST)

    public ResponseEntity createOrder(@RequestBody Order order) {

    if (order != null) {

    RestTemplate restTemplate = new RestTemplate();

    URI uri = URI.create("http://localhost:9000/inventory");

    restTemplate.put(uri, order.getItems());

    order.setOrderId(UUID.randomUUID().toString());

    URI location = ServletUriComponentsBuilder

    .fromCurrentRequest().path("/{id}")

    .buildAndExpand(order.getOrderId())

    .toUri();

    return ResponseEntity.created(location).build();

    }

    return ResponseEntity.status(HttpStatus.BAD_REQUEST).build();

    }

    ```


    Let’s spin up the `sample01` microservice with the following Maven command. It
    will start on port 8080.


    ```

    \> cd sample01

    \> mvn clean install

    \> mvn spring-boot:run

    ```


    To test the completed end-to-end flow, let’s use the following command.


    ```

    \> curl -v -H "Content-Type: application/json" -d ''{"customer_id":"101021","payment_method":{"card_type":"VISA","expiration":"01/22","name":"John
    Doe","billing_address":"201, 1st Street, San Jose, CA"},"items":[{"code":"101","qty":1},{"code":"103","qty":5}],"shipping_address":"201,
    1st Street, San Jose, CA"}'' http://localhost:8080/order

    HTTP/1.1 201

    Location: http://localhost:8080/order/b3a28d20-c086-4469-aab8-befcf2ba3345

    ```


    You will also notice that the item codes are printed on the console where the
    `sample04` microservice is running.


    ## Getting Started with gRPC


    In Chapter [3](#461146_1_En_3_Chapter.xhtml), we discussed the fundamentals of
    gRPC. In this section, we see how one microservice communicates with another microservice
    via gRPC. In the previous section, we saw how the `Order Processing` microservice
    (`sample01`) talks directly to the `Inventory` microservice (`sample04`) over
    HTTP to update inventory. Here we have modified the `sample01` and `sample04`
    microservices and built two new microservices, `sample06` and `sample05`. The
    `sample05` or the `Inventory` microservice acts as a gRPC server and the `sample06`
    or the `Order Processing` microservice acts as a gRPC client. Source code for
    these two microservices is available under `ch04/sample05` and `ch04/sample06`.
    Figure [4-3](#461146_1_En_4_Chapter.xhtml#Fig3) shows the setup for this exercise.


    ![../images/461146_1_En_4_Chapter/461146_1_En_4_Fig3_HTML.jpg](images/461146_1_En_4_Chapter/461146_1_En_4_Fig3_HTML.jpg)


    Figure 4-3


    Communication between microservices via gRPC


    ### Building the gRPC Service


    First we need to create an IDL (Interface Definition Language). You can find it
    under `sample05/src/main/proto/InventoryService.proto`. Later we will use a Maven
    plugin to build the Java classes from this IDL file, and it will by default look
    for the location `sample05/src/main/proto/`. Unless you want to change the plugin
    configuration, make sure the IDL file is in this location. The following code
    shows the contents of the IDL file.


    ```

    syntax = "proto3";

    option java_multiple_files = true;

    package com.apress.ch04.sample05.service;

    message Item {

    string code = 1;

    int32 qty = 2;

    }

    message ItemList {

    repeated Item item = 1;

    }

    message UpdateItemsResp {

    string code = 1;

    }

    service InventoryService {

    rpc updateItems(ItemList) returns (UpdateItemsResp);

    }

    ```


    Now let’s see what is new in our Maven `pom.xml` file. There are multiple dependencies
    added, but the only notable dependency is the `grpc-spring-boot-starter`. This
    takes care of the `@GRpcService` annotation in the `sample05/src/main/java/com/apress/ch04/sample05/service/Inventory.java`
    class, which spins up the Spring Boot application and exposes our microservice
    over gRPC.


    ```

    org.lognet

    grpc-spring-boot-starter

    0.0.6


    ```


    We also need to add one new extension and a new Maven plugin to the `pom.xml`
    file. The `os-maven-plugin` extension will determine the operating system of the
    current setup and pass that information to the `protobuf-maven-plugin` plugin.
    The `protobuf-maven-plugin` plugin is used to generate the Java classes from the
    IDL.


    ```

    ………………………………


    kr.motd.maven

    os-maven-plugin

    1.4.1.Final


    ………………………………


    org.xolstice.maven.plugins

    protobuf-maven-plugin

    0.5.0

    ………………………………

    </plugin

    ```


    The following Maven command can be used to create the Java classes from the IDL.
    By default they are created under the `target/generated-sources/protobuf/grpc-java`
    and `target/generated-sources/protobuf/java` directories.


    ```

    \> cd sample05

    \> mvn package

    ```


    Now let’s look at our service code. The `Inventory` (`sample05/src/main/java/com/apress/ch04/sample05/services/Inventory.java`)
    class extends `InventoryServiceImplBase`, which is a class generated by the Maven
    plugin. Once the `Order Processing` microservice does a `POST` to the `Inventory`
    microservice, it will simply print item codes and return.


    ```

    @GRpcService

    public class Inventory extends InventoryServiceImplBase{

    @Override

    public void updateItems(ItemList request,

    StreamObserver

    responseObserver)

    {

    List items = request.getItemList();

    for (Item item : items) {

    System.out.println(item.getCode());

    }

    responseObserver.onNext(UpdateItemsResp.newBuilder()

    .setCode("success").build());

    responseObserver.onCompleted();

    }

    }

    ```


    To spin up the `Inventory` microservice and expose it over gRPC, use the following
    Maven command.


    ```

    \> cd sample05

    \> mvn spring-boot:run

    ```


    Once the server starts, it looks for the following line. By default it starts
    on 6565 and you can change it by adding the property `grpc.port` to the `application.properties`
    file and setting its value to the port number you need. In our case, we have set
    it to `7000` (`grpc.port=7000`).


    ```

    gRPC Server started, listening on port 7000

    ```'
  raw: '### Service-to-Service Communication


    In this section, we see how one microservice directly talks to another microservice
    over HTTP. We extend our domain-driven design example from Chapter [2](#461146_1_En_2_Chapter.xhtml).
    As per Figure [4-2](#461146_1_En_4_Chapter.xhtml#Fig2), the `Order Processing`
    microservice (`sample01`) talks directly to the `Inventory` microservice (`sample04`)
    over HTTP to update the inventory.


    ![../images/461146_1_En_4_Chapter/461146_1_En_4_Fig2_HTML.jpg](images/461146_1_En_4_Chapter/461146_1_En_4_Fig2_HTML.jpg)


    Figure 4-2


    Communication between microservices


    First, let’s get the `Inventory` microservice up and running. You can find the
    code for this microservice inside `ch04/sample04`. It’s another Spring Boot application,
    and there isn’t anything new from what we have discussed so far. Let’s look at
    the `updateItems` method in the `src/main/java/com/apress/ch04/sample04/service/Inventory.java`
    class. This method simply accepts an array of items , iterates through them, and
    prints the item code. Later in this section, the `Order Processing` microservice
    (`sample01`) will invoke this method to update the inventory.


    ```

    @RestController

    @RequestMapping(value = "/inventory")

    public class Inventory {

    @RequestMapping(method = RequestMethod.PUT)

    public ResponseEntity updateItems(@RequestBody Item[] items) {

    if (items == null || items.length == 0) {

    return ResponseEntity.badRequest().build();

    }

    for (Item item : items) {

    if (item != null) {

    System.out.println(item.getCode());

    }

    }

    return ResponseEntity.noContent().build();

    }

    }

    ```


    Let’s spin up the `sample04` microservice with the following Maven command. It
    will start on port 9000 (make sure to stop any of the microservices we started
    before, and ensure that no other service is running on port 9000).


    ```

    \> cd sample04

    \> mvn clean install

    \> mvn spring-boot:run

    ```


    Now let’s revisit our `sample01` code, which is at `ch04/sample01`. There we have
    the `createOrder` method, which accepts an order, and then talks to the `Inventory`
    microservice (`sample04`). You can find the corresponding code inside the `src/main/java/com/apress/ch04/sample01/service/OrderProcessing.java`
    class.


    ```

    @RequestMapping(method = RequestMethod.POST)

    public ResponseEntity createOrder(@RequestBody Order order) {

    if (order != null) {

    RestTemplate restTemplate = new RestTemplate();

    URI uri = URI.create("http://localhost:9000/inventory");

    restTemplate.put(uri, order.getItems());

    order.setOrderId(UUID.randomUUID().toString());

    URI location = ServletUriComponentsBuilder

    .fromCurrentRequest().path("/{id}")

    .buildAndExpand(order.getOrderId())

    .toUri();

    return ResponseEntity.created(location).build();

    }

    return ResponseEntity.status(HttpStatus.BAD_REQUEST).build();

    }

    ```


    Let’s spin up the `sample01` microservice with the following Maven command. It
    will start on port 8080.


    ```

    \> cd sample01

    \> mvn clean install

    \> mvn spring-boot:run

    ```


    To test the completed end-to-end flow , let’s use the following command.


    ```

    \> curl -v -H "Content-Type: application/json" -d ''{"customer_id":"101021","payment_method":{"card_type":"VISA","expiration":"01/22","name":"John
    Doe","billing_address":"201, 1st Street, San Jose, CA"},"items":[{"code":"101","qty":1},{"code":"103","qty":5}],"shipping_address":"201,
    1st Street, San Jose, CA"}'' http://localhost:8080/order

    HTTP/1.1 201

    Location: http://localhost:8080/order/b3a28d20-c086-4469-aab8-befcf2ba3345

    ```


    You will also notice that the item codes are printed on the console where the
    `sample04` microservice is running.


    ## Getting Started with gRPC


    In Chapter [3](#461146_1_En_3_Chapter.xhtml), we discussed the fundamentals of
    gRPC. In this section, we see how one microservice communicates with another microservice
    via gRPC. In the previous section, we saw how the `Order Processing` microservice
    (`sample01`) talks directly to the `Inventory` microservice (`sample04`) over
    HTTP to update inventory. Here we have modified the `sample01` and `sample04`
    microservices and built two new microservices, `sample06` and `sample05`. The
    `sample05` or the `Inventory` microservice acts as a gRPC server and the `sample06`
    or the `Order Processing` microservice acts as a gRPC client. Source code for
    these two microservices is available under `ch04/sample05` and `ch04/sample06`.
    Figure [4-3](#461146_1_En_4_Chapter.xhtml#Fig3) shows the setup for this exercise.


    ![../images/461146_1_En_4_Chapter/461146_1_En_4_Fig3_HTML.jpg](images/461146_1_En_4_Chapter/461146_1_En_4_Fig3_HTML.jpg)


    Figure 4-3


    Communication between microservices via gRPC


    ### Building the gRPC Service


    First we need to create an IDL (Interface Definition Language). You can find it
    under `sample05/src/main/proto/InventoryService.proto`. Later we will use a Maven
    plugin to build the Java classes from this IDL file, and it will by default look
    for the location `sample05/src/main/proto/`. Unless you want to change the plugin
    configuration, make sure the IDL file is in this location. The following code
    shows the contents of the IDL file .


    ```

    syntax = "proto3";

    option java_multiple_files = true;

    package com.apress.ch04.sample05.service;

    message Item {

    string code = 1;

    int32 qty = 2;

    }

    message ItemList {

    repeated Item item = 1;

    }

    message UpdateItemsResp {

    string code = 1;

    }

    service InventoryService {

    rpc updateItems(ItemList) returns (UpdateItemsResp);

    }

    ```


    Now let’s see what is new in our Maven `pom.xml` file . There are multiple dependencies
    added, but the only notable dependency is the `grpc-spring-boot-starter`. This
    takes care of the `@GRpcService` annotation in the `sample05/src/main/java/com/apress/ch04/sample05/service/Inventory.java`
    class, which spins up the Spring Boot application and exposes our microservice
    over gRPC.


    ```

    org.lognet

    grpc-spring-boot-starter

    0.0.6


    ```


    We also need to add one new extension and a new Maven plugin to the `pom.xml`
    file. The `os-maven-plugin` extension will determine the operating system of the
    current setup and pass that information to the `protobuf-maven-plugin` plugin.
    The `protobuf-maven-plugin` plugin is used to generate the Java classes from the
    IDL.


    ```

    ………………………………


    kr.motd.maven

    os-maven-plugin

    1.4.1.Final


    ………………………………


    org.xolstice.maven.plugins

    protobuf-maven-plugin

    0.5.0

    ………………………………

    </plugin

    ```


    The following Maven command can be used to create the Java classes from the IDL
    . By default they are created under the `target/generated-sources/protobuf/grpc-java`
    and `target/generated-sources/protobuf/java` directories.


    ```

    \> cd sample05

    \> mvn package

    ```


    Now let’s look at our service code. The `Inventory` (`sample05/src/main/java/com/apress/ch04/sample05/services/Inventory.java`)
    class extends `InventoryServiceImplBase`, which is a class generated by the Maven
    plugin. Once the `Order Processing` microservice does a `POST` to the `Inventory`
    microservice, it will simply print item codes and return.


    ```

    @GRpcService

    public class Inventory extends InventoryServiceImplBase{

    @Override

    public void updateItems(ItemList request,

    StreamObserver

    responseObserver)

    {

    List items = request.getItemList();

    for (Item item : items) {

    System.out.println(item.getCode());

    }

    responseObserver.onNext(UpdateItemsResp.newBuilder()

    .setCode("success").build());

    responseObserver.onCompleted();

    }

    }

    ```


    To spin up the `Inventory` microservice and expose it over gRPC, use the following
    Maven command.


    ```

    \> cd sample05

    \> mvn spring-boot:run

    ```


    Once the server starts, it looks for the following line. By default it starts
    on 6565 and you can change it by adding the property `grpc.port` to the `application.properties`
    file and setting its value to the port number you need. In our case, we have set
    it to `7000` (`grpc.port=7000`).


    ```

    gRPC Server started, listening on port 7000

    ```'
