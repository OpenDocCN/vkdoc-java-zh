    # 6. Microservices Governance


    The microservices architecture inherently has to deal with dozens to hundreds
    or thousands of services. When you operate at that scale, you need to have some
    governance processes in place. However, using a strict centralized governance
    process will hinder the autonomy of the microservices architecture. Therefore,
    we need to rethink a strategy for microservices governance.


    In this chapter, we walk through the requirements for microservices governance
    and delve deep into a few key aspects of it, such as *service registry* and *governance*.
    The rest of the governance topics are covered in the upcoming chapters.


    ## Why Microservices Governance?


    Service Oriented Architecture (SOA) governance was one of the key driving forces
    behind the operational success of SOA and it provides cooperation and coordination
    between different entities in an organization (development teams, service consumers,
    etc.). Although it defines a comprehensive set of theoretical concepts as part
    of SOA governance, only a handful of concepts are being actively used in practice.


    When we shift into a microservices architecture, most of the useful governance
    concepts are also being discarded. The governance concept in microservices is
    just interpreted^([^(89)](#fn89)) as a decentralized process, which gives each
    team/entity the freedom to govern their own domain, in the way they prefer. Decentralized
    governance is applicable to the service development, deployment, and execution
    processes, but there’s a lot more to it than that. Let’s take a closer look at
    various aspects of microservices governance and see how we can implement them
    in practice.


    ## Aspects of Microservices Governance


    Microservices governance comprises various practices that are coordinated together
    to realize a real-world scenario. Most of these concepts are not new but ones
    that we have successfully used in the SOA governance. They are equally applicable
    under the microservices architecture.


    ### Service Definition


    Any microservice that we develop must have enough information to uniquely identify
    itself, its functionality, and how a consumer should consume it. Therefore, it
    must have a mechanism to specify the service definition and it should be readily
    available to the service consumers.


    There are several technologies (discussed in Chapter [3](#461146_1_En_3_Chapter.xhtml),
    “Inter-service Communication”)—such as `OpenAPI` (`Swagger`), `GrahQL` schema,
    `gRPC`, and protocol buffer—that define service interfaces. These allow you to
    define the service identifiers, service interfaces (i.e., the available service
    functionalities), and service message models (schema or message format of the
    service requests and responses). Other service metadata, such as service ownership
    and service level agreements (SLAs), can also be part of the service definition.


    Service definitions are often stored in a central repository, to which the consumers
    have access and the service owners can publish.


    ### Service Registry and Discovery


    The service registry is the place where you can store the service definitions,
    so that the service providers can make their services available and known to the
    consumers. Service consumers locate the services that they want to invoke using
    the service registry. The service metadata, which are part of the service definition
    (such as service URL, message models, supported functionalities, etc.), can be
    retrieved via the service registry.


    The service registry defines an API to publish and access service definitions.
    When a service is created or updated, the service owners should publish the service
    definition to the service registry and the consumers can discover services during
    the runtime using a service discovery mechanism. Later in the chapter, we take
    a closer look at the most commonly used service registries and discovery mechanisms
    in the microservices architecture.'
