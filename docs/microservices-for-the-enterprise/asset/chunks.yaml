    ## 将 Fluentd 日志收集器与 Docker 结合使用


    Fluentd 是一个可扩展的数据收集工具，以守护进程方式运行。微服务可以将日志发布到 Fluentd。它拥有丰富的插件集，可以从不同来源读取不同格式的日志并解析数据。此外，它还可以格式化、聚合日志，并将其发布到第三方系统，如
    Splunk、Prometheus、MongoDB、PostgreSQL、AWS S3、Kafka 等（见图 13-19）。Fluentd 架构的妙处在于它将数据源与目标系统解耦。无需更改微服务，Fluentd
    即可更改日志的目标系统或添加新的目标系统。它还可以对日志消息进行内容过滤，并根据特定条件决定将日志发布到哪些系统。


    ![../images/461146_1_En_13_Chapter/461146_1_En_13_Fig19_HTML.jpg](img/461146_1_En_13_Fig19_HTML.jpg)


    图 13-19

    Fluentd 的多个输入源和目标系统


    在接下来的章节中，我们将了解如何从运行在 Docker 容器中的微服务向 Fluentd 发布日志。首先，我们将设置 Fluentd，然后了解如何启动微服务并向
    Fluentd 发布日志。


    ### 将 Fluentd 作为 Docker 容器启动


    启动 Fluentd 最简单直接的方法是使用 Docker 容器。在实践中，这也是最常见的方法。在生产环境中，当所有微服务都在 Kubernetes 环境（我们在第
    8 章中讨论过）中运行时，Fluentd 节点（充当守护进程）将与相应的微服务运行在同一个 Pod 中。实际上，你可以将运行 Fluentd 的容器视为微服务的边车（sidecar）（见图
    13-20）。默认情况下，微服务会将日志发布到 `localhost:24224`，这是 Fluentd 通过 TCP 监听的端口。


    ![../images/461146_1_En_13_Chapter/461146_1_En_13_Fig20_HTML.png](img/461146_1_En_13_Fig20_HTML.png)


    图 13-20

    微服务和 Fluentd 容器运行在同一个 Pod 中


    让我们使用以下命令来启动 Fluentd Docker 容器。在此之前，请确保主机文件系统的主目录下有一个名为 `data` 的目录——你也可以使用自己的目录代替
    `~/data`。


    ```

    :\> docker run -d  -p 24224:24224 -v ~/data:/fluentd/log  fluent/fluentd

    ```


    正如我们在第 8 章中学到的，容器是不可变的。换句话说，当容器关闭时，它不会保存我们在其运行期间对其文件系统所做的任何更改。默认情况下，`Order Processing`
    微服务发布到 Fluentd 的所有日志都将存储在容器文件系统的 `/fluent/log` 目录中。为了永久保存这些数据，我们需要使用 Docker 卷。使用上述命令中的
    `–v` 选项，我们将主机文件系统中的 `~/data` 目录映射到容器文件系统中的 `/fluent/log` 目录。即使容器关闭，我们也应该能够在 `~/data`
    目录中找到日志文件。上述命令中的 `–p` 选项将 Docker 容器的 `24224` 端口（Fluentd 默认监听的端口）映射到宿主机的 `24224`
    端口。`fluent/fluentd` 是容器镜像的名称，它将从 Docker Hub 拉取。


    一旦我们启动并运行了 Fluentd，我们就可以启动一个包含 `Order Processing` 微服务的 Docker 容器。

