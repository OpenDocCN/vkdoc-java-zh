    the new advancements in DevOps engineering. We can use configuration management
    tools like Puppet^([^(12)](#fn12)) or Chef^([^(13)](#fn13)) to manage configurations
    centrally and automate the distribution between all the nodes in the system. In
    today’s microservices deployment, we use a similar kind of approach with slight
    variations. No configuration changes are done on running servers; instead, a new
    container will be created with the new configuration using Puppet or Chef and
    will be deployed into the corresponding servers. This is the same approach Netflix
    follows.


    The second purpose of having a shared disk is for the database. In a traditional
    web application as well as in a microservices deployment, we cannot totally eliminate
    the need for having a shared database. But to avoid the issues in scalability,
    we can have a separate database server, which can scale independently. Then again,
    even though we share the same database between different nodes of the same microservice,
    it is not encouraged to share the same database between different microservices.
    In Chapter [5](#461146_1_En_5_Chapter.xhtml), “Data Management”, we talk about
    different data sharing strategies related to microservices.


    ### Port Binding


    The port binding factor highlights the need of having completely self-contained
    applications. If you take a traditional web application, let’s say a Java EE application,
    it is deployed in some kind of Java EE container, for example a Tomcat, WebLogic,
    or WebSphere server, as a WAR (Web Application aRchive) file. The web application
    does not worry about how people (or systems) access it, under which transport
    (HTTP or HTTPS) or which port. Those decisions are made at the web container level
    (Tomcat, WebLogic, or WebSphere server configuration). A WAR file cannot exist
    on its own; it relies on the underneath container to do the transport/port bindings.
    They are not self-contained.


    This seventh factor says your application itself has to do the port binding and
    expose it as a service, without relying on a third-party container. This is very
    common in microservice deployments. For example, Spring Boot^([^(14)](#fn14)),
    a popular Java-based microservices framework, lets you build microservices as
    self contained, self-executable JAR files. There are many other microservice frameworks
    (Dropwizard^([^(15)](#fn15)) and MSF4J^([^(16)](#fn16))) out there that do the
    same. Chapter [4](#461146_1_En_4_Chapter.xhtml), “Developing Services” covers
    how to develop and deploy microservices with Spring Boot.


    ### Concurrency


    There are two ways an application can scale, either vertically or horizontally.
    To scale an application vertically, you add more resources to each node. For example,
    you add more CPU power or more memory. This method is becoming less popular these
    days, as people looking toward running software on commodity hardware. To scale
    an application horizontally, you need not to worry about the resources each node
    has, rather you increase the number of nodes in the system. The 7^(th) factor,
    *concurrency,* says that an application should be able to horizontally scale or
    scale out.


    The ability to dynamically scale (horizontally) is another important aspect of
    today’s microservice deployments. The system, which controls the deployment, will
    spin up and spin down server instances as the load goes up and down to increase/decrease
    the throughput of the entire system. Unless each microservice instance can scale
    horizontally, dynamic scalability is not possible here.


    ### Disposability


    The 9^(th) factor talks about the ability of an application to spin up fast and
    shut down gracefully when required. If we cannot spin up an application fast enough,
    then it’s really hard to achieve dynamic scalability. Most of today’s microservice
    deployments rely on containers and expect the startup time to be milliseconds.
    When you architect a microservice, you need to make sure that it adds less overhead
    to the server startup time. This is further encouraged by following one microservice
    per host (container) model, which we discuss in detail later in the book in Chapter
    [8](#461146_1_En_8_Chapter.xhtml). This is opposed to having multiple monolithic
    applications per server model, where each application contributes to the server
    startup time, which is usually in minutes (not even in seconds).


    Everything at Google runs on containers. In 2014, Google spun up two billion containers
    per week. That means for every second Google was firing up on average some 3,300
    containers^([^(17)](#fn17)).'
  trans: '

    ### 进程


    第六个要素指出，进程应该是无状态的，并且应避免使用粘性会话。无状态意味着应用程序在执行操作前后，不应假设内存中存在任何数据。任何符合第六要素的微服务部署，其设计方式都应该是无状态的。在典型的企业级微服务部署中，你会发现，给定微服务的多个实例会根据其收到的负载而动态创建和销毁。如果我们要在这些微服务的内存中维护某种状态，那么在所有微服务实例间复制状态将是一个繁琐的过程，并且会增加大量复杂性。无状态微服务可以按需复制，并且在启动期间甚至运行时，各个实例之间无需协调，这引导我们走向无共享架构。


    #### 无共享架构


    无共享架构是分布式计算中一个成熟的原则。它指出，系统中的给定节点不应与其他节点共享磁盘或内存，这比仅仅是无状态更进一步。这有助于构建高度可扩展的系统。一个可扩展的系统，当向系统引入更多节点或资源时，应该能够针对增加的负载产生更高的吞吐量。如果我们在系统的节点之间共享资源，那么引入更多节点将会给这些共享资源带来更多负载，因此对总吞吐量的影响将会较小。


    在典型的 Web 应用程序中，节点之间共享磁盘主要有两个目的。一是为了在节点之间共享一些通用的配置文件，在大多数情况下，这是通过将共享磁盘驱动器挂载到每个节点来实现的。如果无法使用共享驱动器，我们可以在这些节点之间构建某种复制机制，可能使用共享仓库。一个节点可以将其更改提交到共享的
    Git 或 Subversion 仓库，其他节点则定期拉取更新。还有另一种方法，随着 DevOps 工程的新进展，这种方法如今相当普遍。我们可以使用像 Puppet^(¹²)或
    Chef^(¹³)这样的配置管理工具来集中管理配置，并自动分发到系统中的所有节点。在当今的微服务部署中，我们使用类似的方法，但略有变化。不会在正在运行的服务器上进行配置更改；相反，会使用
    Puppet 或 Chef 创建一个包含新配置的新容器，并将其部署到相应的服务器上。Netflix 采用的就是这种方法。


    共享磁盘的第二个目的是用于数据库。在传统的 Web 应用程序以及微服务部署中，我们无法完全消除对共享数据库的需求。但为了避免可扩展性问题，我们可以有一个独立的数据库服务器，它可以独立扩展。话虽如此，即使我们在同一微服务的不同节点之间共享同一个数据库，也不鼓励在不同微服务之间共享同一个数据库。在第
    5 章“数据管理”中，我们将讨论与微服务相关的不同数据共享策略。


    ### 端口绑定


    端口绑定要素强调了拥有完全自包含应用程序的必要性。如果你拿一个传统的 Web 应用程序，比如一个 Java EE 应用程序，它通常以 WAR（Web 应用程序归档）文件的形式部署在某种
    Java EE 容器中，例如 Tomcat、WebLogic 或 WebSphere 服务器。Web 应用程序不关心人们（或系统）如何访问它，使用哪种传输协议（HTTP
    或 HTTPS）或哪个端口。这些决定是在 Web 容器级别（Tomcat、WebLogic 或 WebSphere 服务器配置）做出的。WAR 文件不能独立存在；它依赖底层的容器来进行传输/端口绑定。它们不是自包含的。


    这第七个要素指出，你的应用程序本身必须进行端口绑定，并将其作为服务暴露出来，而不依赖于第三方容器。这在微服务部署中非常常见。例如，Spring Boot^(¹⁴)，一个流行的基于
    Java 的微服务框架，允许你将微服务构建为自包含、可独立执行的 JAR 文件。还有许多其他微服务框架（Dropwizard^(¹⁵)和 MSF4J^(¹⁶)）也实现了同样的功能。第
    4 章“开发服务”将介绍如何使用 Spring Boot 开发和部署微服务。


    ### 并发


    应用程序有两种扩展方式：垂直扩展或水平扩展。要垂直扩展应用程序，你需要为每个节点增加更多资源。例如，增加更多 CPU 能力或更多内存。这种方法如今越来越不受欢迎，因为人们倾向于在通用硬件上运行软件。要水平扩展应用程序，你无需担心每个节点的资源，而是增加系统中的节点数量。第
    7 个要素*并发*指出，应用程序应该能够进行水平扩展或向外扩展。


    动态扩展（水平扩展）的能力是当今微服务部署的另一个重要方面。控制部署的系统会根据负载的升降来创建和销毁服务器实例，以增加/减少整个系统的吞吐量。除非每个微服务实例都能水平扩展，否则这里无法实现动态可扩展性。


    ### 可处置性


    第 9 个要素讨论了应用程序在需要时能够快速启动并优雅关闭的能力。如果我们不能足够快地启动应用程序，那么实现动态可扩展性就非常困难。当今大多数微服务部署都依赖于容器，并期望启动时间达到毫秒级。当你设计微服务架构时，需要确保它尽可能减少对服务器启动时间的开销。遵循每个主机（容器）一个微服务的模型可以进一步促进这一点，我们将在本书后面的第
    8 章中详细讨论。这与每个服务器多个单体应用程序的模型相反，后者中每个应用程序都会增加服务器启动时间，这通常是以分钟（甚至不是秒）为单位计算的。


    谷歌的一切都运行在容器上。2014 年，谷歌每周启动 20 亿个容器。这意味着平均每秒钟，谷歌会启动大约 3300 个容器^(¹⁷)。

    '
- fmt: '### Dev/Prod Parity


    The 10^(th) factor states the importance of ensuring that the development, staging,
    and production environments stay identical, as much as possible. In reality many
    do have fewer resources on development servers, while making staging and production
    servers identical. When you do not have the same level of resources that you have
    in the staging and production environments as in the development environment,
    you sometimes need to wait until staging deployment to discover issues. We have
    noticed that some companies do not have a cluster in the development environment,
    and later waste hundreds of developer hours debugging state replication issues
    in the staging cluster.


    It’s not just the number of nodes or hardware resources; this is also applicable
    to the other services that your application relies on. For example, you should
    not have a `MySQL` database in your developer environment, if you plan to have
    `Oracle` in the production; don’t have `Java 1.6` in your developer environment
    if you plan to have `Java 1.8` in the production. Most of the microservice deployments
    today rely on container-based (for example, `Docker`) deployments to avoid such
    mishaps, as all third-party dependencies are packaged in the container itself.
    One of the key fundamentals behind microservices is its rapid development and
    deployment. Early feedback cycle is extremely important and adhering to the 10^(th)
    factor helps us get there.


    ### Logs


    The 11^(th) factor says that you need to treat logs as event streams. Logs play
    two roles in an application. They help identify what is going on in the system
    and isolate any issues, and they can be used as audit trails. Most of the traditional
    applications push logs into files, and then these files are pushed into log management
    applications, like `Splunk`^([^(18)](#fn18)) and `Kibana`^([^(19)](#fn19)). Managing
    logs in a microservices environment is challenging, as there are many instances
    of microservices. To cater to a single request, there can be multiple requests
    generated between these microservices. It is important to have the ability to
    trace and correlate a given request between all the microservices in the system.


    Log aggregation^([^(20)](#fn20)) is a common pattern followed by many microservice
    deployments. This pattern suggests introducing a centralized logging service,
    which aggregates logs from all the microservice instances in the environment.
    The administrators can search and analyze the logs from the central server and
    can also configure alerts that are triggered when certain messages appear in the
    logs. We can further improve this pattern by using a messaging system, as shown
    in Figure [2-17](#461146_1_En_2_Chapter.xhtml#Fig17). This decouples the logging
    service from all the other microservices. Each microservice will publish a log
    event (with a correlation ID) to a message queue and the logging service will
    read from it.


    ![../images/461146_1_En_2_Chapter/461146_1_En_2_Fig17_HTML.jpg](images/461146_1_En_2_Chapter/461146_1_En_2_Fig17_HTML.jpg)


    Figure 2-17


    Publishing logs from multiple microservices to a centralized logging server


    Even though the traditional applications use filesystem-based logging, it is quite
    discouraged in a microservices environment. Going by the ninth factor, a given
    microservice should be disposable at any given moment. This introduces the concept
    of *immutable servers*. An immutable server is never modified after it is first
    launched. If we are not modifying a server, then you cannot write anything to
    its filesystem. Following the immutable server pattern helps reproduce the same
    server instance from a configuration and dispose at any given time.


    ### Admin Processes


    This 12^(th) factor highlights the need for running administrative tasks as one-off
    processes. These tasks could be a database migration (due to a new version of
    the application) of a one-time script that needs to be run along with the application
    itself. The origin of this 12th factor seems to be little bias toward interpreted
    languages like `Ruby`, which support and encourage an interactive programming
    shell. Once the application is up, the developers can `SSH` into those servers
    and run certain scripts via these interactive programming consoles. If we adhere
    to the 12^(th) factor, we should completely avoid such remotely done administrative
    tasks via `SSH`, rather introduce an admin process and make the admin tasks part
    of it. In a microservices deployment, just as you run your microservices in different
    containers, this admin process can also run from its own container.


    ### Beyond the 12 Factor App


    It is awesome to see how the original 12 factors introduced in 2012 (at a time
    when microservices were not mainstream and `Docker` was not even born) relate
    to the microservice deployments becoming mainstream today. In 2016, Kevin Hoffman
    from Pivotal introduced^([^(21)](#fn21)) three more factors to the original set,
    which we discuss next.


    #### API First


    Anyone coming from the SOA background must be familiar with the two approaches
    commonly used for service development: contract first and code first. With contract
    first, we first develop the service interface in a programming language independent
    manner. In the SOAP world, this produces a `WSDL` (Web Services Description Language),
    and in REST world, it could be an `OpenAPI`^([^(22)](#fn22)) document (formerly
    known as `Swagger`). The `OpenAPI` specification is a powerful definition format
    to describe RESTful APIs.


    With this factor, Kevin highlights the need to start any application development
    following the API first approach, which is an extension to the contract first
    approach. In an environment where you have multiple development teams working
    on multiple microservices, under different schedules, having the API defined first
    for each microservice, helps all the teams build their microservices against APIs.
    This helps improve the productivity of the development process, without worrying
    too much about the implementation details of other microservices one has to integrate.
    If the implementation of a given microservice is not available at the time you
    are ready to test, you can simply mock it against the published API. There are
    many tools out there under different programming languages to create such mock
    instances.


    #### Telemetry


    According to Wikipedia, *telemetry* is an automated communications process by
    which measurements and other data are collected at remote or inaccessible points
    and transmitted to the receiving equipment for monitoring. When it comes to software,
    this is extremely useful to track the health of production servers and to identify
    any issues. Kevin Hoffman suggests a great analogy to highlight the need of telemetry
    for applications. Think of your applications like unmanned space shuttles launched
    into the space—this definition is so powerful and require no further explanation
    on the importance of telemetry.


    Telemetry data can be categorized into three areas—application performance monitoring,
    domain specific, health and system logs. The number of HTTP requests, the number
    of database calls, and the time it takes to serve each request over the time are
    all recorded under the application performance monitoring category. The domain
    specific data category records data related to business functions. For example,
    the `Order Processing` microservice will push data related to orders being processed,
    including the number of new orders, open orders, and closed orders by date. The
    data related to server startup, shutdown, memory consumption and CPU utilization
    fall in the health and system logs category.'
