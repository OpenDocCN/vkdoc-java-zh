- fmt: '### Load Balancing and Failover


    The key ideas behind load balancing and failover are quite simple. Load balancing
    is used to distribute the load across multiple microservice instances, while failover
    is used to reroute requests to alternate services if a given service fails. In
    the conventional middleware implementation such as ESBs, these functionalities
    are also implemented as part of the service logic. However, with the advancement
    of containers and container management systems such as Kubernetes, most of these
    functionalities are now built into the deployment ecosystem itself. Also, most
    of the cloud infrastructure vendors, such as Amazon Web Services (AWS), Google
    Cloud, and Azure offer these capabilities as part of their infrastructure as a
    service (IaaS) offerings. We discuss containers and Kubernetes in detail in Chapter
    [8](#461146_1_En_8_Chapter.xhtml), “Deploying and Running Microservices”.


    ### Active or Reactive Composition


    As we discussed in the section on microservices integration patterns, building
    active or reactive service compositions is absolutely vital to any real-world
    microservices implementation. Therefore, microservice integration technologies
    should support building active and reactive compositions. At the implementation
    level this means the ability to invoke services through different protocols, use
    supporting components such as circuit breakers, and create composite business
    logic. For active compositions, support for synchronous service invocations (implemented
    on top of non-blocking threads with callbacks) is quite important. For reactive
    compositions, support for messaging styles such as pub-sub and queue-based messaging
    is required along with seamless integration with messaging backbones such as Kafka
    or RabbitMQ. Also, different message exchange patterns need to be implemented
    at the service level—the ability to mix and match such patterns is required. For
    example, the inbound request may be an asynchronous message, while the external
    (outbound) service invocations are synchronous. Therefore, we should be able to
    mix and match these message-exchange patterns.


    ### Data Formats


    When we are building compositions, we must create compositions out of different
    data formats. For instance, a given microservice will be exposed via a given data
    format (for inbound requests), while it invokes other services (outbound), for
    which use different data formats. When we create compositions of these services,
    we must do type matching between these data formats and implement our service
    in a type-safe manner. Therefore, service implementation technologies that we
    are using should worry about all the different data formats and should provide
    a convenient way to handle those formats. Data formats such as JSON, Avro, CSV,
    XML, protocol buffers, are widely used in practice.


    ### Container-Native and DevOps Ready


    Microservices development technologies that we use should be cloud-native and
    container-native. The same applies to integration services. When you are building
    an integration service, the development technologies that you use have to be cloud-
    and container-native. When we were discussing the anti-patterns for microservices
    integration, using ESB for integrating microservices was heavily discouraged.
    The primary reason behind that is that almost all the ESB technologies are NOT
    cloud- or container-native.


    For a technology to be cloud- or container-native, the runtime should start within
    a few seconds (or less), the memory footprint, CPU consumption and storage required
    must be extremely low. Therefore, when selecting a technology for microservice
    integration, we should consider all these aspects.


    In addition to the container-native aspects of the runtime, the integration microservice
    development technologies have to worry about native integrations with containers
    and container management systems such as Kubernetes. What this means is how easily
    you can create a container out of the applications or services that you develop.
    Having support to configure and create the container-related artifacts with your
    service development technology will vastly improve the agility of your microservices
    development process. We cover the details of containers, Docker, and Kubernetes
    in Chapter [8](#461146_1_En_8_Chapter.xhtml).


    ### Governance of Integration Services


    We covered governance aspects of microservices in Chapter [6](#461146_1_En_6_Chapter.xhtml),
    “Microservices Governance”. Some governance aspects, such as observability, are
    extremely crucial when we build microservice integrations. For instance, let’s
    revisit the hybrid composition scenario that we discussed earlier (see Figure
    [7-10](#461146_1_En_7_Chapter.xhtml#Fig10)).


    ![../images/461146_1_En_7_Chapter/461146_1_En_7_Fig10_HTML.jpg](images/461146_1_En_7_Chapter/461146_1_En_7_Fig10_HTML.jpg)


    Figure 7-10


    Observability is mandatory with complex microservice integrations


    Figure [7-10](#461146_1_En_7_Chapter.xhtml#Fig10) shows that you can clearly see
    all the interaction between microservices and we can get a clear idea about all
    the business use cases. However, just think about how these interactions look
    at the operational level. We will not have this kind of a view if we don’t have
    a proper observability mechanism in place. As part of the integration service
    development technology, we need to have a seamless way to integrate existing observability
    tools to get the metrics, tracing, logging, service visualization, and alerting
    for your integration services.


    ### Stateless, Stateful, or Long-Running Services


    Microservices design favors stateless immutable services and most of the use cases
    can be realized with the use of such stateless services. However, there are many
    use cases, such as business processes, workflows, and so on, that require stateful
    and long-running services. In the context of conventional integration middleware,
    such requirements are implemented and supported at the ESB or business process
    solution level. With microservices, these requirements have to built from the
    ground up, so having native support at the integration microservice level for
    such capabilities will be useful.


    The ability to build workflows, business processes, and distributed transactions
    with SAGAs (which is discussed in Chapter [5](#461146_1_En_5_Chapter.xhtml), “Data
    Management”) is a key requirement of stateful and long-running services.


    ## Technologies for Building Integration Services


    From what we have discussed so far in this chapter, it should be clear that there
    is no silver-bullet technology that we can use to build microservices. There are
    different types of microservices and each microservice addresses a drastically
    different set of requirements. Hence, to realize such microservices, we need to
    leverage polyglot microservice development technologies. In this section, we discuss
    some of the most commonly used microservices development technologies; ones that
    are more suitable for building microservice compositions or integration microservices.


    There are microservices frameworks that are built on top of generic programming
    languages such as Java and provide abstractions via different technologies to
    cater to microservice composition. Integration frameworks, on the other hand,
    are not solely targeted to build microservices (rather they are built to address
    the generic enterprise integration requirements), but still they can be used to
    integrate microservices. Also, there are certain programming languages that cater
    to such microservice integration needs out-of-the-box.


    Let’s take a closer look at some of the microservice development frameworks, integration
    frameworks, and generic programming languages that are commonly used in practice.'
