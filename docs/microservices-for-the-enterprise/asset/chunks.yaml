    wrapper objects and we can use them when invoking external services and systems.
    The main idea behind using a circuit breaker is, if the service invocation fails
    and reaches a certain threshold, then the circuit breaker wrapper prevents any
    further invocation of the external service. Rather it immediately returns from
    the circuit breaker with an error. Figure [7-8](#461146_1_En_7_Chapter.xhtml#Fig8)
    shows the behavior of the circuit breaker when it is in the closed and open states.


    ![../images/461146_1_En_7_Chapter/461146_1_En_7_Fig8_HTML.jpg](images/461146_1_En_7_Chapter/461146_1_En_7_Fig8_HTML.jpg)


    Figure 7-8


    Behavior of circuit breaker. When the circuit is closed, the circuit breaker wrapper
    object allows the service calls to go through to the external service. When the
    circuit is open, it prevents the invocations of the external service and returns
    immediately.


    When there is an invocation failure, a circuit breaker keeps that state and updates
    the threshold count and, based on the threshold count or frequency of the failure
    count, it opens the circuit. When the circuit is open, the real invocation of
    the external service is prevented, and the circuit breaker generates an error
    and returns immediately.


    When the circuit is in an open state for a certain period of time, we can apply
    a self-resetting behavior by trying the service invocation again (for a new request)
    after a suitable interval and resetting the breaker should it succeed. This time
    interval is known as circuit reset timeout. With this behavior, we can identify
    three different states in the circuit breaker, which are depicted in Figure [7-9](#461146_1_En_7_Chapter.xhtml#Fig9).


    ![../images/461146_1_En_7_Chapter/461146_1_En_7_Fig9_HTML.jpg](images/461146_1_En_7_Chapter/461146_1_En_7_Fig9_HTML.jpg)


    Figure 7-9


    Circuit breaker’s states


    We can consider that when the reset timeout is reached, the circuit state is changed
    to the half-open state, where the circuit breaker allows another invocation of
    the external service for a new request that comes to the microservice. If it succeeds,
    the circuit breaker will change to the closed state again and to the open state
    otherwise.


    By design, circuit breaker is a mechanism to degrade the performance of a system
    when it is not performing well or is failing (rather than failing the entire system).
    It will prevent any further damage to the system or cascading failures. We can
    tune the circuit breaker with various backoff mechanisms, timeouts, reset intervals,
    and error codes that it must directly go into open states, or error codes that
    it should ignore, etc. These behaviors are implemented at different levels with
    different complexities using various circuit breaker implementations. It is important
    to keep in mind that the circuit breaker behavior has a closer relationship with
    the business requirements of a particular microservices based application.


    #### Fail Fast


    In the fail fast pattern, the key objective is to detect a failure as quickly
    as possible. It is built around the concept that a failure response is much better
    than a slow failure response. Hence, detecting a failure at the early stages is
    an important factor during inter-service communication. We can detect failures
    at different stages of the inter-service communication. In certain situations,
    just by looking at the contents of the request/message, we can decide that this
    request is not a valid one. In other cases, we can check for the system resources
    (such as thread pools, connections, socket limits, and databases) and the state
    of the downstream components of the request lifecycle.


    Fail fast, together with timeouts, will help us develop microservices based applications
    that are stable and responsive.


    #### Bulkhead


    Bulkhead is a mechanism to partition your application so that an error that occurs
    in a partition is localized to that one partition only. It won’t bring the entire
    system to an unstable state; only that partition will fail. At the core design
    principles of microservices, the bulkhead pattern is heavily used. When we design
    microservices, we deliberately group similar operations into a microservice and
    independent business functionalities are implemented as separate microservices.
    Hence, microservices are deployed independently on different runtimes (VMs or
    containers), which means a failure of a given functionality would not affect the
    other functionalities.


    However, for some reason, if you have to implement two or more business functionalities
    inside a single service, you need to take precautions to partition your service
    so that failure of a certain set of business operations will not affect the rest
    of the operations. In general, it is recommended to identify such independent
    operations and covert them to microservices if possible. However, if you can’t
    split them into services, there are certain techniques to implements bulkheads
    within a single service/application. For example, we can have a dedicated resource
    (such as a thread pool, storage, or database) to handle different partitions of
    a service.'
