  trans: '

    ## 单体架构与微服务架构


    在单体应用中，所有服务都部署在同一个应用服务器上，应用服务器本身提供会话管理功能。服务之间的交互通过本地调用完成，所有服务可以共享用户的登录状态。每个服务（或组件）无需独立对用户进行身份验证。身份验证将在拦截器（interceptor）中集中完成，该拦截器会拦截所有服务调用。一旦身份验证完成，它会在服务（或组件）之间传递用户的登录上下文，而该过程因平台而异。图
    11-1 展示了单体应用中多个组件之间的交互。单体应用部署在单个应用容器中，通常位于裸机主机或虚拟机上。


    ![../images/461146_1_En_11_Chapter/461146_1_En_11_Fig1_HTML.jpg](img/461146_1_En_11_Fig1_HTML.jpg)


    图 11-1


    在单体应用中共享用户会话


    在 Java EE 环境中，拦截器可以是一个 Servlet 过滤器。该 Servlet 过滤器会拦截所有发往其注册上下文的请求，并强制执行身份验证。服务调用方必须携带有效的凭据或可映射到用户的会话令牌。一旦
    Servlet 过滤器找到该用户，它就可以创建一个登录上下文并将其传递给下游组件。每个下游组件都可以从登录上下文中识别用户，以执行任何授权操作。


    在微服务环境中，安全性变得更具挑战性。在微服务世界中，服务被限定范围并部署在分布式环境中的多个容器中。服务交互不再是本地的，而是远程的，通常通过 HTTP
    进行。图 11-2 展示了多个微服务之间的交互。


    ![../images/461146_1_En_11_Chapter/461146_1_En_11_Fig2_HTML.jpg](img/461146_1_En_11_Fig2_HTML.jpg)


    图 11-2


    多个微服务之间的交互


    这里的挑战在于：我们如何对用户进行身份验证，然后以对称的方式在微服务之间传递登录上下文，以及每个微服务如何相互进行身份验证并对用户进行授权。以下部分将介绍在微服务架构中保护服务间通信安全的不同技术，既包括身份验证和授权，也包括在不同微服务之间传播用户上下文。


    ## 保护服务间通信安全


    服务间通信可以通过 HTTP 同步进行，也可以通过事件驱动的消息传递异步进行。在第 3 章“服务间通信”中，我们讨论了微服务之间的同步和异步消息传递。有两种常见的方法可以保护服务间通信的安全。一种基于
    JSON Web Token (JWT)，另一种基于传输层安全 (TLS) 双向认证。在以下部分中，我们将探讨 JWT 在微服务架构中保护服务间通信安全的作用。


    ### JSON Web Token (JWT)


    JWT（JSON Web Token）定义了一个容器，用于在相关方之间传输数据（见图 11-3）。它于 2015 年 5 月成为 IETF 标准，即 RFC
    7519^(¹⁴³)。JWT 可用于：


    ![../images/461146_1_En_11_Chapter/461146_1_En_11_Fig3_HTML.jpg](img/461146_1_En_11_Fig3_HTML.jpg)


    图 11-3


    通过 JWT 在相关方之间传输数据


    *   在相关方之间传播身份信息。例如，用户属性，如名字、姓氏、电子邮件地址、电话号码等。


    *   在相关方之间传播用户的权限。权限定义了用户在目标系统上能够执行的操作。


    *   通过不安全的信道在相关方之间安全地传输数据。JWT 可用于传输已签名和/或加密的消息。


    *   断言身份，前提是 JWT 的接收方信任断言方（令牌颁发者）。例如，JWT 的颁发者可以使用其私钥对负载进行签名，从而保护其完整性，使得中间人无法篡改消息。接收方可以通过使用颁发者对应的公钥进行验证，来校验
    JWT 的签名。如果接收方信任其已知的公钥，那么它也信任 JWT 的颁发者。


    JWT 可以被签名、加密，或两者兼有。已签名的 JWT 称为 JWS^(¹⁴⁴)（JSON Web Signature），已加密的 JWT 称为 JWE^(¹⁴⁵)（JSON
    Web Encryption）。实际上，JWT 本身并不独立存在——它要么是 JWS，要么是 JWE。它就像一个抽象类——JWS 和 JWE 是具体的实现。这里我需要更精确地说明一下。JWS
    和 JWE 的含义比 JWT 更广泛。JWS 定义了如何序列化（或表示）任何已签名的消息负载；它可以是 JSON、XML 或任何格式。同样，JWE 定义了如何序列化加密的负载。JWS
    和 JWE 都支持两种序列化方式：*紧凑序列化*和*JSON 序列化*。只有当 JWS 或 JWE 遵循紧凑序列化时，我们才称其为 JWT。任何 JWT 都必须遵循紧凑序列化。换句话说，遵循
    JSON 序列化的 JWS 或 JWE 令牌不能称为 JWT。

    '
- fmt: '### Note


    Further details on JWS and JWE are out of the scope of this book. Any interested
    readers who want a detailed walk-through of JWS and JWE should refer to this blog:
    “JWT, JWS and JWE for Not So Dummies!” at `https://medium.facilelogin.com/jwt-jws-and-jwe-for-not-so-dummies-b63310d201a3`.


    Let’s take a closer look at the following sample JWT:


    ```

    eyJhbGciOiJSUzI1NiIsImtpZCI6Ijc4YjRjZjIzNjU2ZGMzOTUzNjRmMWI2YzAyOTA3NjkxZjJjZGZmZTEifQ..TVKv-pdyvk2gW8sGsCbsnkqsrS0T-H00xnY6ETkIfgIxfotvFn5IwKm3xyBMpy0FFe0Rb5Ht8AEJV6PdWyxz8rMgX2HROWqSo_RfEfUpBb4iOsq4W28KftW5H0IA44VmNZ6zU4YTqPSt4TPhyFC9fP2D_Hg7JQozpQRUfbWTJI

    ```


    This looks gibberish until you break it by periods (`.`) and `base64url-decode`
    each part. There are two periods in it, which break the whole string into three
    parts (see Figure [11-4](#461146_1_En_11_Chapter.xhtml#Fig4)). Once you `base64url-decode`
    the first part, it appears like so:


    ![../images/461146_1_En_11_Chapter/461146_1_En_11_Fig4_HTML.jpg](images/461146_1_En_11_Chapter/461146_1_En_11_Fig4_HTML.jpg)


    Figure 11-4


    JWS (compact serializing, representing a JWT)


    ```

    {"alg":"RS256","kid":"78b4cf23656dc395364f1b6c02907691f2cdffe1"}

    ```


    This first part (once parted by the periods) of the JWT is known as the JOSE header.
    JOSE stands for JavaScript Object Signing and Encryption—and it’s the name of
    the IETF working group^([^(146)](#fn146)) that works on standardizing the representation
    of integrity-protected data using JSON data structures.


    The JOSE header indicates that it’s a signed message with the provided algorithm
    under the `alg` parameter. The token issuer asserts the identity of the end user
    by signing the JWT, which carries data related to the user’s identity. Both the
    `alg` and `kid` elements there are not defined in the JWT specification, but in
    the JSON Web Signature (JWS) specification. The JWT specification only defines
    two elements (`typ` and `cty`) in the JOSE header and both the JWS and JWE specifications
    extend it to add more appropriate elements.


    ### Note


    Both JWS and JWE compact serialization use `base64url` encoding. It is a slight
    variation of the popular `base64` encoding. The `base64` encoding defines how
    to represent binary data in an ASCII string format. Its objective is to transmit
    binary data such as keys or digital certificates in a printable format. This type
    of encoding is needed if these objects are transported as part of an email body,
    a web page, an XML document, or a JSON document.


    To do `base64` encoding, first the binary data is grouped into 24-bit groups.
    Then each 24-bit group is divided into four 6-bit groups. A printable character
    can represent each 6-bit group based on its bit value in decimal. For example,
    the decimal value of the 6-bit group `000111` is 7. As per Figure [11-5](#461146_1_En_11_Chapter.xhtml#Fig5)
    the character `H` represents this 6-bit group. Apart from the characters shown
    in Figure [11-5](#461146_1_En_11_Chapter.xhtml#Fig5), the character `=` is used
    to specify a special processing function, which is to pad. If the length of the
    original binary data is not an exact multiple of 24, then we need padding. Let’s
    say the length is 232, which is not a multiple of 24. Now we need to pad this
    binary data to make its length equal to the very next multiple of the 24, which
    is 240. In other words, we need to pad this binary data by 8 to make its length
    240. In this case, padding is done by adding eight 0s to the end of the binary
    data. Now, when we divide 240 bits by 6 to build 6-bit groups, the last 6-bit
    group will be all zeros, and this complete group will be represented by the padding
    character `=`.


    One issue with `base64` encoding is that it does not work quite well with URLs.
    The `+` and `/` characters in `base64` encoding (see Figure [11-5](#461146_1_En_11_Chapter.xhtml#Fig5))
    have a special meaning when used within a URL. If we try to send a `base64` encoded
    image as a URL query parameter and if the `base64` encoded string carries either
    of these two characters, the browser will interpret the URL incorrectly. The `base64url`
    encoding was introduced to address this problem. It works exactly the same as
    `base64` encoding other than two exceptions: the character `-` is used in `base64url`
    encoding instead of the character `+` and the character `_` is used in `base64url`
    encoding instead of the character `/`.


    ![../images/461146_1_En_11_Chapter/461146_1_En_11_Fig5_HTML.jpg](images/461146_1_En_11_Chapter/461146_1_En_11_Fig5_HTML.jpg)


    Figure 11-5


    Base64 encoding


    The second part of the JWT, as shown in Figure [11-4](#461146_1_En_11_Chapter.xhtml#Fig4),
    is known as the JWT claim set (see Figure [11-6](#461146_1_En_11_Chapter.xhtml#Fig6)).
    Whitespace can be explicitly retained while building the JWT claim set—no canonicalization
    is required before `base64url` encoding or decoding. Canonicalization is the process
    of converting different forms of a message into a single standard form. This is
    used mostly before signing XML messages.


    ![../images/461146_1_En_11_Chapter/461146_1_En_11_Fig6_HTML.jpg](images/461146_1_En_11_Chapter/461146_1_En_11_Fig6_HTML.jpg)


    Figure 11-6


    JWT claim set


    The JWT claim set represents a JSON object whose members are the claims asserted
    by the JWT issuer. Each claim name within a JWT must be unique. If there are duplicate
    claim names, then the JWT parser will either return a parsing error or just return
    the claims set with the very last duplicate claim. JWT specification does not
    explicitly define which claims are mandatory and which are optional. It’s up to
    each application of JWT to define mandatory and optional claims. For example,
    the OpenID Connect specification defines the mandatory and optional claims. According
    to the OpenID Connect core specification, `iss`, `sub`, `add`, `exp`, and `iat`
    are treated as mandatory elements, while `auth_time`, `nonce`, `acr`, `amr`, and
    `azp` are optional elements. In addition to the mandatory and optional claims,
    which are defined in the specification, the token issuer can include additional
    elements into the JWT claim set.


    The third part of the JWT (shown in Figure [11-4](#461146_1_En_11_Chapter.xhtml#Fig4))
    is the signature, which is also `base64url` encoded. The cryptographic elements
    related to the signature are defined in the JOSE header. In this particular example,
    the token issuer uses RSASSA-PKCS1-V1_5 with the SHA-256 hashing algorithm, which
    is expressed by the value of the `alg` element in the JOSE header: `RS256`. The
    signature is calculated against the first two parts in the JWS—the JOSE header
    and the JWT claim set.'
  raw: '### Note


    Further details on JWS and JWE are out of the scope of this book. Any interested
    readers who want a detailed walk-through of JWS and JWE should refer to this blog:
    “JWT, JWS and JWE for Not So Dummies!” at [`https://medium.facilelogin.com/jwt-jws-and-jwe-for-not-so-dummies-b63310d201a3`](https://medium.facilelogin.com/jwt-jws-and-jwe-for-not-so-dummies-b63310d201a3)
    .


    Let’s take a closer look at the following sample JWT:


    ```

    eyJhbGciOiJSUzI1NiIsImtpZCI6Ijc4YjRjZjIzNjU2ZGMzOTUzNjRmMWI2YzAyOTA3NjkxZjJjZGZmZTEifQ..TVKv-pdyvk2gW8sGsCbsnkqsrS0T-H00xnY6ETkIfgIxfotvFn5IwKm3xyBMpy0FFe0Rb5Ht8AEJV6PdWyxz8rMgX2HROWqSo_RfEfUpBb4iOsq4W28KftW5H0IA44VmNZ6zU4YTqPSt4TPhyFC9fP2D_Hg7JQozpQRUfbWTJI

    ```


    This looks gibberish until you break it by periods (.) and *base64url-decode*
    each part. There are two periods in it, which break the whole string into three
    parts (see Figure [11-4](#461146_1_En_11_Chapter.xhtml#Fig4)). Once you base64url-decode
    the fist part, it appears like so:


    ![../images/461146_1_En_11_Chapter/461146_1_En_11_Fig4_HTML.jpg](images/461146_1_En_11_Chapter/461146_1_En_11_Fig4_HTML.jpg)


    Figure 11-4


    JWS (compact serializing, representing a JWT)


    ```

    {"alg":"RS256","kid":"78b4cf23656dc395364f1b6c02907691f2cdffe1"}

    ```


    This first part (once parted by the periods) of the JWT is known as the JOSE header.
    JOSE stands for JavaScript Object Signing and Encryption—and it’s the name of
    the IETF working group^([^(146)](#fn146)) that works on standardizing the representation
    of integrity-protected data using JSON data structures.


    The JOSE header indicates that it’s a signed message with the provided algorithm
    under the `alg` parameter. The token issuer asserts the identity of the end user
    by signing the JWT, which carries data related to the user’s identity. Both the
    `alg` and `kid` elements there are not defined in the JWT specification, but in
    the JSON Web Signature (JWS) specification. The JWT specification only defines
    two elements (`typ` and `cty`) in the JOSE header and both the JWS and JWE specifications
    extend it to add more appropriate elements.


    ### Note


    Both JWS and JWE compact serialization use base64url encoding. It is a slight
    variation of the popular base64 encoding. The base64 encoding defines how to represent
    binary data in an ASCII string format. Its objective is to transmit binary data
    such as keys or digital certificates in a printable format. This type of encoding
    is needed if these objects are transported as part of an email body, a web page,
    an XML document, or a JSON document.


    To do base64 encoding, first the binary data is grouped into 24-bit groups. Then
    each 24-bit group is divided into four 6-bit groups. A printable character can
    represent each 6-bit group based on its bit value in decimal. For example, the
    decimal value of the 6-bit group 000111 is 7. As per Figure [11-5](#461146_1_En_11_Chapter.xhtml#Fig5)
    the character H represents this 6-bit group. Apart from the characters shown in
    Figure [11-5](#461146_1_En_11_Chapter.xhtml#Fig5), the character = is used to
    specify a special processing function, which is to pad. If the length of the original
    binary data is not an exact multiple of 24, then we need padding. Let’s say the
    length is 232, which is not a multiple of 24\. Now we need to pad this binary
    data to make its length equal to the very next multiple of the 24, which is 240\.
    In other words, we need to pad this binary data by 8 to make its length 240\.
    In this case, padding is done by adding eight 0s to the end of the binary data.
    Now, when we divide 240 bits by 6 to build 6-bit groups, the last 6-bit group
    will be all zeros, and this complete group will be represented by the padding
    character =.


    One issue with base64 encoding is that it does not work quite well with URLs.
    The *+* and */* characters in base64 encoding (see Figure [11-5](#461146_1_En_11_Chapter.xhtml#Fig5))
    have a special meaning when used within a URL. If we try to send a base64 encoded
    image as a URL query parameter and if the base64 encoded string carries either
    of these two characters, the browser will interpret the URL incorrectly. The base64url
    encoding was introduced to address this problem. It works exactly the same as
    base64 encoding other than two exceptions: the character *-* is used in base64url
    encoding instead of the character *+* and the character *_* is used in base64url
    encoding instead of the character */*.


    ![../images/461146_1_En_11_Chapter/461146_1_En_11_Fig5_HTML.jpg](images/461146_1_En_11_Chapter/461146_1_En_11_Fig5_HTML.jpg)


    Figure 11-5


    Base64 encoding


    The second part of the JWT, as shown in Figure [11-4](#461146_1_En_11_Chapter.xhtml#Fig4),
    is known as the JWT claim set (see Figure [11-6](#461146_1_En_11_Chapter.xhtml#Fig6)).
    Whitespace can be explicitly retained while building the JWT claim set—no canonicalization
    is required before base64url encoding or decoding. Canonicalization is the process
    of converting different forms of a message into a single standard form. This is
    used mostly before signing XML messages.


    ![../images/461146_1_En_11_Chapter/461146_1_En_11_Fig6_HTML.jpg](images/461146_1_En_11_Chapter/461146_1_En_11_Fig6_HTML.jpg)


    Figure 11-6


    JWT claim set


    The JWT claim set represents a JSON object whose members are the claims asserted
    by the JWT issuer. Each claim name within a JWT must be unique. If there are duplicate
    claim names, then the JWT parser will either return a parsing error or just return
    the claims set with the very last duplicate claim. JWT specification does not
    explicitly define which claims are mandatory and which are optional. It’s up to
    the each application of JWT to define mandatory and optional claims. For example,
    the OpenID Connect specification defines the mandatory and optional claims. According
    to the OpenID Connect core specification, `iss`, `sub`, `add`, `exp`, and `iat`
    are treated as mandatory elements, while `auth_time`, `nonce`, `acr`, `amr`, and
    `azp` are optional elements. In addition to the mandatory and optional claims,
    which are defined in the specification, the token issuer can include additional
    elements into the JWT claim set.


    The third part of the JWT (shown in Figure [11-4](#461146_1_En_11_Chapter.xhtml#Fig4))
    is the signature, which is also base64url encoded. The cryptographic elements
    related to the signature are defined in the JOSE header. In this particular example,
    the token issued uses RSASSA-PKCS1-V1_5 with the SHA-256 hashing algorithm, which
    is expressed by the value of the `alg` element in the JOSE header: RS256\. The
    signature is calculated against the first two parts in the JWS—the JOSE header
    and the JWT claim set.'
  trans: '

    ### 注意


    关于 JWS 和 JWE 的更多细节超出了本书的讨论范围。任何希望深入了解 JWS 和 JWE 的读者，请参考这篇博客：《JWT、JWS 和 JWE 傻瓜指南！》，网址为
    [`https://medium.facilelogin.com/jwt-jws-and-jwe-for-not-so-dummies-b63310d201a3`](https://medium.facilelogin.com/jwt-jws-and-jwe-for-not-so-dummies-b63310d201a3)。


    让我们仔细看看下面这个 JWT 示例：


    ```

    eyJhbGciOiJSUzI1NiIsImtpZCI6Ijc4YjRjZjIzNjU2ZGMzOTUzNjRmMWI2YzAyOTA3NjkxZjJjZGZmZTEifQ..TVKv-pdyvk2gW8sGsCbsnkqsrS0T-H00xnY6ETkIfgIxfotvFn5IwKm3xyBMpy0FFe0Rb5Ht8AEJV6PdWyxz8rMgX2HROWqSo_RfEfUpBb4iOsq4W28KftW5H0IA44VmNZ6zU4YTqPSt4TPhyFC9fP2D_Hg7JQozpQRUfbWTJI

    ```


    这看起来像天书，直到你用句点（.）将其分割，并对每个部分进行 *base64url 解码*。其中有两个句点，将整个字符串分成了三个部分（见图 11-4）。一旦你对第一部分进行
    base64url 解码，它就会显示如下：


    ![../images/461146_1_En_11_Chapter/461146_1_En_11_Fig4_HTML.jpg](img/461146_1_En_11_Fig4_HTML.jpg)


    图 11-4


    JWS（紧凑序列化，表示一个 JWT）


    ```

    {"alg":"RS256","kid":"78b4cf23656dc395364f1b6c02907691f2cdffe1"}

    ```


    JWT 的第一部分（按句点分割后）被称为 JOSE 头部。JOSE 代表 JavaScript 对象签名与加密——这也是 IETF 工作组^(¹⁴⁶) 的名称，该工作组致力于标准化使用
    JSON 数据结构表示完整性保护数据的方式。


    JOSE 头部表明这是一个使用 `alg` 参数下指定算法进行签名的消息。令牌颁发者通过签名 JWT 来断言最终用户的身份，该 JWT 携带了与用户身份相关的数据。其中的
    `alg` 和 `kid` 元素并非在 JWT 规范中定义，而是在 JSON Web 签名（JWS）规范中定义。JWT 规范仅在 JOSE 头部中定义了两个元素（`typ`
    和 `cty`），而 JWS 和 JWE 规范对其进行了扩展，以添加更多合适的元素。


    ### 注意


    JWS 和 JWE 的紧凑序列化都使用 base64url 编码。这是流行 base64 编码的一个微小变体。base64 编码定义了如何以 ASCII 字符串格式表示二进制数据。其目标是以可打印的格式传输二进制数据，例如密钥或数字证书。如果这些对象作为电子邮件正文、网页、XML
    文档或 JSON 文档的一部分进行传输，则需要这种编码类型。


    要进行 base64 编码，首先将二进制数据分组为 24 位一组。然后将每个 24 位组划分为四个 6 位组。每个 6 位组可以根据其十进制位值由一个可打印字符表示。例如，6
    位组 000111 的十进制值为 7。根据图 11-5，字符 H 代表这个 6 位组。除了图 11-5 中显示的字符外，字符 = 用于指定一个特殊处理功能，即填充。如果原始二进制数据的长度不是
    24 的精确倍数，那么我们需要进行填充。假设长度为 232，它不是 24 的倍数。现在我们需要填充这个二进制数据，使其长度等于 24 的下一个倍数，即 240。换句话说，我们需要将这个二进制数据填充
    8 位，使其长度变为 240。在这种情况下，填充是通过在二进制数据的末尾添加八个 0 来完成的。现在，当我们用 240 位除以 6 来构建 6 位组时，最后一个
    6 位组将全为零，并且这个完整的组将由填充字符 = 表示。


    base64 编码的一个问题是它不能很好地与 URL 配合使用。base64 编码中的 *+* 和 */* 字符（见图 11-5）在 URL 中使用时具有特殊含义。如果我们尝试将
    base64 编码的图像作为 URL 查询参数发送，并且 base64 编码的字符串包含这两个字符中的任何一个，浏览器将错误地解释该 URL。base64url
    编码就是为了解决这个问题而引入的。它的工作方式与 base64 编码完全相同，但有两个例外：在 base64url 编码中使用字符 *-* 代替字符 *+*，并使用字符
    *_* 代替字符 */*。


    ![../images/461146_1_En_11_Chapter/461146_1_En_11_Fig5_HTML.jpg](img/461146_1_En_11_Fig5_HTML.jpg)


    图 11-5


    Base64 编码


    JWT 的第二部分，如图 11-4 所示，被称为 JWT 声明集（见图 11-6）。在构建 JWT 声明集时，可以显式保留空白——在进行 base64url
    编码或解码之前，不需要进行规范化。规范化是将消息的不同形式转换为单一标准形式的过程。这主要用于对 XML 消息进行签名之前。


    ![../images/461146_1_En_11_Chapter/461146_1_En_11_Fig6_HTML.jpg](img/461146_1_En_11_Fig6_HTML.jpg)


    图 11-6


    JWT 声明集


    JWT 声明集表示一个 JSON 对象，其成员是 JWT 颁发者所断言的声明。JWT 中的每个声明名称必须是唯一的。如果存在重复的声明名称，JWT 解析器将返回解析错误，或者仅返回包含最后一个重复声明的声明集。JWT
    规范没有明确定义哪些声明是必需的，哪些是可选的。这取决于每个 JWT 应用程序来定义必需和可选的声明。例如，OpenID Connect 规范定义了必需和可选的声明。根据
    OpenID Connect 核心规范，`iss`、`sub`、`add`、`exp` 和 `iat` 被视为必需元素，而 `auth_time`、`nonce`、`acr`、`amr`
    和 `azp` 是可选元素。除了规范中定义的必需和可选声明之外，令牌颁发者还可以将其他元素包含到 JWT 声明集中。


    JWT 的第三部分（如图 11-4 所示）是签名，它也是经过 base64url 编码的。与签名相关的加密元素在 JOSE 头部中定义。在这个特定示例中，颁发的令牌使用
    RSASSA-PKCS1-V1_5 和 SHA-256 哈希算法，这由 JOSE 头部中 `alg` 元素的值 RS256 表示。签名是针对 JWS 中的前两个部分——JOSE
    头部和 JWT 声明集——计算得出的。

    '
- fmt: "#### Propagating Trust and User Identity\n\nThe user context from one microservice\
    \ to another can be passed along with a `JWS` (see Figure [11-7](#461146_1_En_11_Chapter.xhtml#Fig7)).\
    \ Since a key known to the calling microservice signs the `JWS`, it will carry\
    \ both the end user identity (as claimed in the `JWT`) and the identity of the\
    \ calling microservice (via the signature). In other words, the calling microservice\
    \ itself is the issuer of the `JWS`. To accept the `JWS`, the recipient microservice\
    \ first needs to validate the signature of the `JWS` against the public key embedded\
    \ in the `JWS` itself or retrieved via any other mechanism. That’s not just enough\
    \ — then it needs to check whether it can trust that key or not. Trust between\
    \ microservices can be established in multiple ways. One way is to provision the\
    \ trusted certificates, by service, to each microservice. It’s a no brainer to\
    \ realize that this would not scale in a microservices deployment. The approach\
    \ we would like to suggest is to build a private certificate authority (`CA`)\
    \ and use intermediate certificate authorities by different microservices teams,\
    \ if the need arises. Now, rather than trusting every individual certificate,\
    \ the recipient microservices will only trust either the root certificate authority\
    \ or an intermediary. That will vastly reduce the overhead in certificate provisioning.\n\
    \n> **Note**  \n> Trust bootstrap is a harder problem to solve. The Secure Production\
    \ Identity Framework For Everyone (`SPIFFE`)^([^(147)](#fn147)) project builds\
    \ an interesting solution around this, which can be used to bootstrap trust between\
    \ different nodes in a microservices deployment. With `SPIFFE`, each node will\
    \ get an identifier and a key pair, which can be used to authenticate to other\
    \ nodes it communicates with.\n\n![../images/461146_1_En_11_Chapter/461146_1_En_11_Fig7_HTML.jpg](images/461146_1_En_11_Chapter/461146_1_En_11_Fig7_HTML.jpg)\n\
    \n**Figure 11-7** Passing user context as a `JWT` between microservices\n\nIn\
    \ the `JWT`, the public key corresponding to the key used to sign the token represents\
    \ the caller (or the calling microservice). How does the recipient microservice\
    \ find the end user information? The `JWT` carries a parameter called `sub` in\
    \ its claim set, which represents the subject or the user who owns the `JWT`.\
    \ If any microservice needs to identify the user during its operations, this is\
    \ the attribute it should look into. The value of the `sub` attribute is unique\
    \ only for a given issuer. If you have a microservice, which accepts tokens from\
    \ multiple issuers, then the uniqueness of the user should be decided as a combination\
    \ of the issuer and the `sub` attribute. In addition to the subject identifier,\
    \ the `JWT` can also carry user attributes such as `first_name`, `last_name`,\
    \ `email`, and so on.\n\n> **Note**  \n> When we pass user context between microservices\
    \ via a `JWT`, each microservice has to bear the cost of `JWT` validation, which\
    \ also includes a cryptographic operation to validate the token signature. Caching\
    \ the `JWT` at the microservices level against the data extracted out of it would\
    \ reduce the impact of repetitive token validation. The cache expiration time\
    \ must match the `JWT` expiration time. Once again, the impact of caching would\
    \ be quite low if the `JWT` expiration time is quite low.\n\nWhen issuing a `JWT`\
    \ from a token issuer, it has to be issued to a given audience. The audience is\
    \ the consumer of the token. For example, if the microservice `foo` wants to talk\
    \ to the microservice `bar`, then the token is issued by `foo` (or a third party\
    \ issuer), and the audience of the token is `bar`. The `aud` parameter in the\
    \ `JWT` claim set specifies the intended audience of the token. It can be a single\
    \ recipient or a set of recipients. Prior to any validation check, the token recipient\
    \ must first see whether the particular `JWT` is issued for its use. If not, it\
    \ should reject it immediately. The token issuer should know, prior to issuing\
    \ the token, who the intended recipient (or the recipients) of the token is. The\
    \ value of the `aud` parameter must be a pre-agreed value between the token issuer\
    \ and the recipients. In a microservices environment, we can use a regular expression\
    \ to validate the audience of the token. For example, the value of the `aud` in\
    \ the token can be `*.facilelogin.com`, while each recipient under the `facilelogin.com`\
    \ domain can have its own `aud` values: `foo.facilelogin.com`, `bar.facilelogin.com`,\
    \ and so on.\n\n### Transport Layer Security (TLS) Mutual Authentication\n\nTransport\
    \ Layer Security (`TLS`) mutual authentication, also known as client authentication\
    \ or two-way Secure Socket Layer (`SSL`), is part of the `TLS` handshake process.\
    \ In one-way `TLS`, only the server proves its identity to the client; this is\
    \ mostly used in e-commerce to win consumer confidence by guaranteeing the legitimacy\
    \ of the e-commerce vendor. In contrast, mutual authentication authenticates both\
    \ parties — the client and the server. In a microservices environment, `TLS` mutual\
    \ authentication can be used between microservices to authenticate each other.\n\
    \nBoth in `TLS` mutual authentication and with the `JWT`-based approach, each\
    \ microservice needs to have its own certificates. The difference between the\
    \ two approaches is that, in `JWT`-based authentication, the `JWS` can carry the\
    \ end user identity as well as the upstream service identity. With `TLS` mutual\
    \ authentication, the end user identity has to be passed at the application level\
    \ — probably as an HTTP header."
