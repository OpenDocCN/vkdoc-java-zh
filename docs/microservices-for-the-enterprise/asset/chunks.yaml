    ### 注意


    对 Zipkin 的全面介绍超出了本书的范围，我们建议需要了解详情的读者参考 [`https://zipkin.io/`](https://zipkin.io/)
    上的 Zipkin 文档。


    使用 Docker 搭建 Zipkin 非常简单。在第 8 章“部署和运行微服务”中，我们详细讨论了 Docker，假设你的机器上已经安装并运行了 Docker，你可以通过以下命令启动一个包含
    Zipkin 的 Docker 容器。如果你想在没有 Docker 的情况下尝试 Zipkin，请参考 [`https://zipkin.io/pages/quickstart.html`](https://zipkin.io/pages/quickstart.html)
    上的安装指南。


    ```

    \> docker run -d -p 9411:9411 openzipkin/zipkin

    ```


    该命令将宿主机的 9411 端口绑定到 Docker 容器的 9411 端口。一旦 Zipkin 节点启动，你就可以从宿主机通过 `http://localhost:9411/zipkin/`
    或直接使用 `http://localhost:9411` 访问其基于 Web 的控制台（见图 13-5）。下一步是更新 `Order Processing`
    和 `Inventory` 微服务（来自上一节的 `sample01` 和 `sample02`）的配置，以便将日志发布到 Zipkin。如果这两个微服务正在运行，请先停止它们，然后用以下内容更新
    `application.properties` 文件。你需要对这两个微服务都执行此操作。`spring.zipkin.baseUrl` 属性指定了 Zipkin
    服务器的 URL。


    ```

    spring.zipkin.baseUrl=http://localhost:9411/

    ```


    除了在 `application.properties` 文件中设置此属性外，我们还必须在两个微服务的 `pom.xml` 文件中添加以下依赖项，以完成 Zipkin
    集成。`spring-cloud-sleuth-zipkin` 依赖项负责将日志发布到 Zipkin 服务器，并且这些日志必须采用 Zipkin 能够理解的格式。


    ```

    org.springframework.cloud

    spring-cloud-sleuth-zipkin

    2.0.0.RC1


    ```


    启动 `Order Processing` 和 `Inventory` 微服务，并使用以下 cURL 命令向 `Order Processing` 微服务下订单。重复执行几次，以便在
    Zipkin 中收集足够的日志。同时请记住，并非所有日志都会发送到 Zipkin——这取决于你在 `application.properties` 文件中为
    `spring.sleuth.sampler.percentage` 属性设置的值。在典型的微服务部署中，数据量可能非常大，因此跟踪数据量也很大。根据你收到的请求量以及微服务所执行操作的业务关键性，你可以决定需要对多少百分比的请求进行采样或发送到
    Zipkin。


    ![../images/461146_1_En_13_Chapter/461146_1_En_13_Fig4_HTML.jpg](img/461146_1_En_13_Fig4_HTML.jpg)


    图 13-4


    每个微服务都被配置为向 Zipkin 发布日志


    ```

    \> curl -v  -k  -H "Content-Type: application/json" -d ''{"customer_id":"101021","payment_method":{"card_type":"VISA","expiration":"01/22","name":"John
    Doe","billing_address":"201, 1st Street, San Jose, CA"},"items":[{"code":"101","qty":1},{"code":"103","qty":5}],"shipping_address":"201,
    1st Street, San Jose, CA"}'' http://localhost:9000/order

    ```


    对于从每个微服务发布到 Zipkin 的跟踪数据，你会在运行每个微服务的命令控制台上看到以下日志。请注意，添加到每条日志中的跟踪信息的第四个参数指示日志是否已发布到
    Zipkin，该参数设置为 `true`。


    ```

    INFO [sample01,bf581ac0009c6e48,bf581ac0009c6e48,true] 30166 --- [nio-9000-exec-1]
    c.a.c.sample01.service.OrderProcessing : retrieving order:11

    INFO [sample02,1a35024149ac7711,98239453fa5582ba,true] 30153 --- [io-10000-exec-7]
    c.a.ch04.sample04.service.Inventory : item code 101

    INFO [sample02,1a35024149ac7711,98239453fa5582ba,true] 30153 --- [io-10000-exec-7]
    c.a.ch04.sample04.service.Inventory : item code 103

    ```


    其底层原理是，Sleuth 对你的应用程序进行检测，以生成 Zipkin 能够理解的格式的跟踪信息。Zipkin 是数据收集器，一旦所有微服务将跟踪数据发布到
    Zipkin，它就能帮助你进行分布式跟踪。要实现分布式跟踪，这两个部分缺一不可。


    ### 注意


    Jaeger^(¹⁶⁴) 是另一个受 Zipkin 和 Dapper 启发、由 Uber 开发的开源分布式跟踪系统。


    ![../images/461146_1_En_13_Chapter/461146_1_En_13_Fig5_HTML.jpg](img/461146_1_En_13_Fig5_HTML.jpg)


    图 13-5


    Zipkin 基于 Web 的控制台


    现在，让我们看看如何利用已发布的跟踪信息从 Zipkin 服务器中找到一些有用的信息。在 Zipkin Web 控制台的主页上，在 `Service Name`
    下拉框中，你会注意到有两个名称：`sample01` 和 `sample02`。这些是与我们的两个微服务关联的服务名称，通过在此处选择一个服务名称，你可以找到与该微服务相关的所有跟踪信息。图
    13-6 显示了与 `sample01` 或 `Order Processing` 微服务相关的跟踪信息。


    ### 注意


    Zipkin 架构由四个主要组件构成：收集器、存储、搜索和 Web UI。从应用程序（或微服务）发布的跟踪数据首先到达收集器。收集器对数据进行验证、存储和索引，以便进行查找。Zipkin
    的存储是可插拔的，它原生支持 Cassandra、ElasticSearch 和 MySQL。数据被索引和存储后，Zipkin 的搜索组件提供了一个 JSON
    API 来与跟踪数据进行交互，该 API 主要由 Web UI 使用。


    ![../images/461146_1_En_13_Chapter/461146_1_En_13_Fig6_HTML.jpg](img/461146_1_En_13_Fig6_HTML.jpg)


    图 13-6


    与 Order Processing 微服务相关的跟踪信息


    Zipkin 还有另一个很好的功能，它通过分析入站和出站流量模式来为你的微服务构建依赖关系图。当我们的部署中有许多微服务时，这非常有用。无论如何，在这个特定示例中，它只是
    `Order Processing`（`sample01`）和 `Inventory`（`sample02`）微服务之间的一个非常简单的图，如图 13-7
    所示。


    ![../images/461146_1_En_13_Chapter/461146_1_En_13_Fig7_HTML.jpg](img/461146_1_En_13_Fig7_HTML.jpg)


    图 13-7


    OrderProcessing 和 Inventory 微服务之间的依赖关系图


    ### 事件驱动的日志聚合架构


    让我们重新审视图 13-4，这是我们将要在本节讨论内容的高级设计。这里的设计与我们第 2 章“设计微服务”（见图 2-17）中提出的设计略有不同。图 13-8
    展示了根据第 2 章中日志聚合器架构的建议重新设计后的方案。


    ![../images/461146_1_En_13_Chapter/461146_1_En_13_Fig8_HTML.jpg](img/461146_1_En_13_Fig8_HTML.jpg)


    图 13-8


    采用事件驱动日志聚合架构的 Zipkin


    与图 13-4 不同，这里 Zipkin 服务器和微服务之间没有直接耦合。每个微服务将日志发布到消息系统（可以是 RabbitMQ 或 Kafka），然后
    Zipkin 从消息系统中获取日志。这种模型的优势在于，即使 Zipkin 服务器宕机一段时间，微服务也可以独立地继续发布日志，当 Zipkin 重启后，它会从消息系统中获取所有日志。

