    .secret("11110000").scopes("foo", "bar")

    .authorizedGrantTypes("client_credentials", "password",

    "refresh_token")

    .accessTokenValiditySeconds(60);

    }

    ```


    为了支持密码授权类型，授权服务器需要连接到一个用户存储。用户存储可以是存储用户凭据和属性的数据库或 LDAP 服务器。Spring Boot 支持与多种用户存储集成，但同样，最方便且足以满足本示例需求的是内存用户存储。以下来自
