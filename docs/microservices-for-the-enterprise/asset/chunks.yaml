    # 12. 保护微服务安全


    在第[11](#461146_1_En_11_Chapter.xhtml)章“微服务安全基础”中，我们讨论了与保护微服务安全相关的常见模式和基础知识。如果您尚未阅读，我们强烈建议您先阅读该章。在本章中，我们将讨论如何使用Spring
    Boot实现微服务安全。我们将解释如何直接调用微服务（无论是作为最终用户还是系统），如何保护两个微服务之间的通信，如何进行访问控制，以及如何保护对Actuator端点的访问。


    ## 使用OAuth 2.0保护微服务安全


    在典型的微服务部署中，OAuth 2.0用于边缘安全（见图[12-1](#461146_1_En_12_Chapter.xhtml#Fig1)）。位于微服务部署前端的网关将验证OAuth
    2.0访问令牌，并向下游微服务颁发自己的令牌。此令牌可以是内部安全令牌服务（STS）颁发的另一个OAuth令牌，该服务受所有下游微服务信任。如果它是自包含的访问令牌（或JSON
    Web令牌），则微服务本身可以通过验证其签名来验证令牌。如果不是，则必须与安全令牌服务暴露的令牌验证端点通信。在本章的示例中，我们跳过了网关交互，接收访问令牌的微服务直接与令牌颁发者通信以验证令牌。


    ![../images/461146_1_En_12_Chapter/461146_1_En_12_Fig1_HTML.jpg](images/461146_1_En_12_Chapter/461146_1_En_12_Fig1_HTML.jpg)


    图12-1


    通过API网关访问受保护的微服务


    ### 启用传输层安全性（TLS）


    图[12-1](#461146_1_En_12_Chapter.xhtml#Fig1)中使用的OAuth 2.0令牌是Bearer令牌。Bearer令牌就像现金。如果有人从你那里偷了十美元，没有人能阻止他或她在星巴克用偷来的钱买一杯咖啡。收银员永远不会质疑此人证明金钱所有权。同样，任何窃取Bearer令牌的人都可以冒充其所有者，并访问资源（或微服务）。每当我们使用Bearer令牌时，都必须通过安全的通信通道使用它们，因此我们需要为图[12-1](#461146_1_En_12_Chapter.xhtml#Fig1)中所示的所有通信通道启用TLS。'
