- fmt: '### Failure Tolerance


    As discussed in the previous section, microservices are more prone to failures
    due to the proliferation of the services and their inter-service network communications.
    A given microservice application is a collection of fine-grained services and
    therefore a failure of one or more of those services should not bring down the
    entire application. Therefore, we should gracefully handle a given failure of
    a microservice so that it has minimum impact on the business functionalities of
    the application. Designing microservices in failure-tolerable fashion requires
    the adaptation of the required technologies from the design, development, and
    deployment phases.


    For example, in the retail example, let’s say the `Product Details` microservices
    is critical to the functionality of the e-commerce application. Hence we need
    to apply all the resiliency-related capabilities, such as circuit breakers, disaster
    recovery, load-balancing, fail-over, and dynamic scaling based on traffic patterns,
    which we discuss in detail in Chapter [7](#461146_1_En_7_Chapter.xhtml), “Integrating
    Microservices”.


    It is really important to mimic all such possible failures as part of the service
    development and testing, using tools such as Netflix’s Chaos Monkey. A given service
    implementation should also be responsible for all the resiliency related activities;
    such behaviors are automatically verified as part of the CICD (continuous integration,
    continuous delivery) process.


    The other aspect of failure tolerance is the ability to observe the behavior of
    the microservices that you run in production. Detecting or predicting failures
    in a service and restoring such services is quite important. For example, suppose
    that you have monitoring, tracing, logging, etc. enabled for all your microservices
    in the online retail application example. Then you observe a significant latency
    and low TPS (Transactions Per Second) in the `Product Search` service. This is
    an indication of a possible future outage of that service. If the microservices
    are observable, you should be able to analyze the reasons for the current symptoms.
    Therefore, even if you have employed chaos testing during the development phase,
    it’s important to have a solid observability infrastructure in place for all your
    microservices to achieve failure tolerance. We will discuss the observability
    techniques in detail in Chapter [13](#461146_1_En_13_Chapter.xhtml), “Observability”.


    We cover failure tolerance techniques and best practices in Chapter [7](#461146_1_En_7_Chapter.xhtml),
    “Integrating Microservices” and Chapter [8](#461146_1_En_8_Chapter.xhtml), “Deploying
    and Running Microservices” in detail.


    ### Decentralized Data Management


    In a monolithic architecture, the application stores data in single and centralized
    logical databases to implement various functionalities/capabilities of the application.
    In a microservices architecture, the functionalities are dispersed across multiple
    microservices. If we use the same centralized database, the microservices will
    be no longer independent from each other (for instance, if the database schema
    is changed by one microservice, that will break several other services). Therefore,
    each microservice must have its own database and database schema.


    Each microservice can have a private database to persist the data that requires
    implementing the business functionality offered by it. A given microservice can
    only access the dedicated private database and not the databases of other microservices.


    In some business scenarios, you might have to update several databases for a single
    transaction. In such scenarios, the databases of other microservices should be
    updated through the corresponding service API only (they are not allowed to access
    the database directly).


    The decentralized data management gives you the fully decoupled microservices
    and the liberty of choosing disparate data-management techniques (SQL or NoSQL
    etc., different database management systems for each service). We look at the
    data management techniques of the microservices architecture in detail in Chapter
    [5](#461146_1_En_5_Chapter.xhtml), “Data Management”.


    ### Service Governance


    SOA governance was one of a key driving forces behind the operational success
    of SOA; it provides the cooperation and coordination between the different entities
    in an organization (development teams, service consumers, etc.). Although it defines
    a comprehensive set of theoretical concepts as part of SOA governance, only a
    handful of concepts are being actively used in practice. When we shift into a
    microservices architecture, most of the useful governance concepts are discarded
    and the governance in microservices is interpreted as a decentralized process,
    which allows each team/entity to govern its own domain, as it prefers. Decentralized
    governance is applicable to the service development, deployment, and execution
    process, but there’s a lot more to it than that. Hence we deliberately didn’t
    use the term *decentralized governance*.


    We can identify two key aspects of governance: design-time governance of services
    (selecting technologies, protocols, etc.) and runtime governance (service definitions,
    service registry and discovery, service versioning, service runtime dependencies,
    service ownerships and consumers, enforcing QoS, and service observerability).


    Design-time governance in microservices is mostly a decentralized process where
    each service owner is given the freedom to design, develop, and run their services.
    Then they can use the right tool for the job, rather than standardize on a single
    technology platform. However, we should define some common standards that are
    applicable across the organization (for example, irrespective of the development
    language, all code should go through a review process and automatically be merged
    into the mainline).


    The runtime governance aspect of microservices is implemented at various levels
    and often we don’t call it *runtime governance* in a microservices context (service
    registry and discovery is one such popular concept that is extremely useful in
    a microservices architecture). So, rather than learn about these concepts as a
    set of discrete concepts, it’s easier to understand them if we look at the runtime-governance
    perspective.


    Runtime governance is absolutely critical in the microservices architecture (it
    is even more important than SOA runtime governance), simply because of the number
    of microservices that we have to deal with. The implementation of runtime governance
    is often done as a centralized component. For example, suppose that we need to
    discover service endpoints and metadata in our online retail application scenario.
    Then all the services have to call a centralized registry service (which can have
    its own scaling capabilities, yet a logically centralized component). Similarly,
    if we want to apply QoS (quality of service) enforcements such as security, by
    throttling centrally, we need a central place such as an API Manager/gateway to
    do that. In fact, some of the runtime governance aspects are implemented at the
    API gateway layer too.


    We’ll look at microservices governance aspects in detail in Chapter [6](#461146_1_En_6_Chapter.xhtml),
    “Microservices Governance” and API Management in Chapter [10](#461146_1_En_10_Chapter.xhtml),
    “APIs, Events and Streams”.'
