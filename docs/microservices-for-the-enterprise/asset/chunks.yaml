  trans: '

    #### 请求路由


    让我们尝试使用 Istio 的 `BookInfo` 示例构建一个简单的请求路由场景。Istio 的 `BookInfo` 示例由四个独立的微服务组成，每个服务都有多个版本。假设我们需要应用一个路由规则，将所有流量路由到
    `Ratings` 服务的 v1（版本 1）。


    你可以通过应用一个虚拟服务，并为每个虚拟服务添加路由规则，将流量路由到服务的 v1 版本来实现此示例。在下面的代码片段中，我们展示了 `Ratings` 和
    `Reviews` 服务的规则。同样，你需要对 `BookInfo` 示例中的所有服务执行此操作。


    ```

    apiVersion: networking.istio.io/v1alpha3

    kind: VirtualService

    metadata:

    name: ratings

    ...

    spec:

    hosts:

    - ratings

    http:

    - route:

    - destination:

    host: ratings

    subset: v1


    apiVersion: networking.istio.io/v1alpha3

    kind: VirtualService

    metadata:

    name: reviews

    ...

    spec:

    hosts:

    - reviews

    http:

    - route:

    - destination:

    host: reviews

    subset: v1


    ```


    在某些场景下，你可能需要根据请求进行基于内容的路由。例如，以下 `Reviews` 服务的虚拟服务配置展示了一个基于 HTTP 标头的路由场景，它专门查找一个
    HTTP 标头，并将流量路由到服务的 v2 版本。


    ```

    apiVersion: networking.istio.io/v1alpha3

    kind: VirtualService

    metadata:

    name: reviews

    ...

    spec:

    hosts:

    - reviews

    http:

    - match:

    - headers:

    end-user:

    exact: jason

    route:

    - destination:

    host: reviews

    subset: v2

    - route:

    - destination:

    host: reviews

    subset: v1

    ```


    #### 弹性


    作为弹性服务间通信技术的一部分，你可以通过 Istio Sidecar 代理调用其他服务时使用*超时*。例如，假设你想在调用 Istio `Bookinfo`
    示例的 `Reviews` 服务时应用超时。那么你可以将超时配置作为为 `Reviews` 服务创建的虚拟服务的一部分包含在内。


    以下配置在调用 `Reviews` 服务时设置了 0.5 秒的超时，并且调用被路由到服务的 v2 版本。


    ```

    apiVersion: networking.istio.io/v1alpha3

    kind: VirtualService

    metadata:

    name: reviews

    spec:

    hosts:

    - reviews

    http:

    - route:

    - destination:

    host: reviews

    subset: v2

    timeout: 0.5s

    ```


    调用特定服务的*熔断器*配置可以作为 *DestinationRule*（将在虚拟服务路由之后应用）来应用。例如，假设我们需要在调用 `Httpbin` 服务时应用熔断器配置。那么我们可以应用以下
    *DestinationRule*，其中包含当并发连接和请求超过一个时打开熔断器的规则。


    ```

    apiVersion: networking.istio.io/v1alpha3

    kind: DestinationRule

    metadata:

    name: httpbin

    spec:

    host: httpbin

    trafficPolicy:

    connectionPool:

    tcp:

    maxConnections: 1

    http:

    http1MaxPendingRequests: 1

    maxRequestsPerConnection: 1

    outlierDetection:

    consecutiveErrors: 1

    interval: 1s

    baseEjectionTime: 3m

    maxEjectionPercent: 100

    ```


    类似地，当你通过 Istio 调用服务时，还可以应用许多其他与服务弹性相关的功能。


    #### 故障注入


    路由规则可以指定在将 HTTP 请求转发到规则对应的请求目标时注入一个或多个故障。故障可以是延迟或中止。在以下示例中，我们对所有发往 `Ratings` 服务
    v1 版本的请求注入一个 HTTP 400 响应。


    ```

    apiVersion: networking.istio.io/v1alpha3

    kind: VirtualService

    metadata:

    name: ratings

    spec:

    hosts:

    - ratings

    http:

    - fault:

    abort:

    percent: 10

    httpStatus: 400

    route:

    - destination:

    host: ratings

    subset: v1

    ```


    #### 策略执行


    我们在本章前面介绍了 Istio Mixer 作为 Istio 的主要组件之一，它负责策略执行和遥测数据收集。让我们看看如何利用策略执行来实现速率限制。


    例如，假设你需要配置 Istio，根据原始客户端的 IP 地址对发往 `Product Page` 服务的流量进行速率限制。你将使用 `X-Forwarded-For`
    请求标头作为客户端 IP 地址。


    从 Istio 方面，你需要配置内存配额（`memquota`）适配器以启用速率限制（或在生产环境中使用 Redis 配额）。你可以应用 `memquota`
    处理程序配置，如下所示。


    ```

    apiVersion: config.istio.io/v1alpha2

    kind: memquota

    metadata:

    name: handler

    namespace: istio-system

    spec:

    quotas:

    - name: requestcount.quota.istio-system

    maxAmount: 500

    validDuration: 1s

    - dimensions:

    destination: reviews

    maxAmount: 1

    validDuration: 5s

    - dimensions:

    destination: productpage

    maxAmount: 2

    validDuration: 5s

    ```


    此 `memquota` 处理程序定义了三种不同的速率限制方案。如果没有匹配的覆盖规则，默认方案是每 1 秒（1s）500 个请求。第一种方案是，如果目标为
    reviews，则每 5 秒（`validDuration`）1 个请求（`maxAmount`）。


    第二种方案是，如果目标为 `Product Page` 服务，则每 5 秒 2 个请求。


    ```

    apiVersion: config.istio.io/v1alpha2

    kind: quota

    metadata:

    name: requestcount

    namespace: istio-system

    spec:

    dimensions:

    source: request.headers["x-forwarded-for"] | "unknown"

    destination: destination.labels["app"] | destination.service.host | "unknown"

    destinationVersion: destination.labels["version"] | "unknown"

    ```


    配额模板定义了三个维度，`memquota` 或 `redisquota` 使用这些维度来对匹配特定属性的请求设置覆盖规则。`destination` 将被设置为
    `destination.labels["app"]`、`destination.service.host` 或 `unknown` 中的第一个非空值。


    ```

    apiVersion: config.istio.io/v1alpha2

    kind: rule

    metadata:

    name: quota

    namespace: istio-system

    spec:

    actions:

    - handler: handler.memquota

    instances:

    - requestcount.quota

    ```


    此规则告诉 Mixer 调用 `handler.memquota\handler.redisquota` 处理程序，并将使用实例 `requestcount.quota`
    构建的对象传递给它。这将把配额模板中的维度映射到 `memquota` 或 `redisquota` 处理程序。


    ```

    apiVersion: config.istio.io/v1alpha2

    kind: QuotaSpec

    metadata:

    name: request-count

    namespace: istio-system

    spec:

    rules:

    - quotas:

    - charge: "1"

    quota: requestcount:

    ```


    此 QuotaSpec 定义了你创建的 `requestcount` 配额，每次计费为 1。


    ```

    kind: QuotaSpecBinding

    metadata:

    name: request-count

    namespace: istio-system

    spec:

    quotaSpecs:

    - name: request-count

    namespace: istio-system

    services:

    - name: productpage

    namespace: default

    ```


    此 `QuotaSpecBinding` 将你创建的 `QuotaSpec` 绑定到要应用它的服务。`Product Page` 服务被显式绑定到 request-count。请注意，你必须定义命名空间，因为它与
    `QuotaSpecBinding` 的命名空间不同。

