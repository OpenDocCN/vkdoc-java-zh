  trans: '

    ## 异步通信


    在微服务架构的早期实现中，同步通信被广泛采用，成为服务间通信的事实标准。然而，微服务之间的异步通信正变得越来越流行，因为它能使服务更加自治。


    在异步通信中，客户端不会即时等待响应。客户端可能根本收不到响应，或者响应会通过不同的通道异步接收。


    微服务之间的异步消息传递是通过使用轻量级且无业务逻辑的消息代理来实现的。该代理不包含任何业务逻辑，是一个高可用的集中式实体。异步消息传递主要有两种类型——单接收者和多接收者。


    ### 单接收者


    在单接收者模式下，一条给定的消息通过消息代理可靠地从生产者传递到恰好一个消费者（见图 3-4）。由于这是一种异步消息传递风格，生产者在生成消息时不会等待消费者的响应，消费者可能在线也可能不在线。这在从一个微服务向另一个微服务发送基于异步消息的命令时非常有用。鉴于微服务可以使用不同的技术实现，我们必须以与技术无关的方式实现生产者和消费者微服务之间的可靠消息传递。


    ![../images/461146_1_En_3_Chapter/461146_1_En_3_Fig4_HTML.jpg](img/461146_1_En_3_Fig4_HTML.jpg)


    图 3-4


    基于 AMQP 的单接收者异步通信


    高级消息队列协议（AMQP）是单接收者通信中最常用的标准。


    #### AMQP


    AMQP^(²⁹) 是一种处理发布者和消费者的消息协议。发布者生成消息，消费者获取并处理这些消息。消息代理的职责是确保来自发布者的消息能够到达正确的消费者。AMQP
    保证了消息传递的可靠性、消息的快速可靠投递以及消息确认。


    以我们的在线零售应用用例为例。假设 `Checkout` 微服务向 `Order Processing` 微服务发送一个异步命令来下单。


    我们可以使用 AMQP 消息代理（例如 RabbitMQ^(³⁰) 或 ActiveMQ^(³¹)）作为无业务逻辑的消息基础设施，`Checkout` 微服务可以向代理中的特定队列生成一条消息。在独立的通道上，`Order
    Processing` 微服务可以作为消费者订阅该队列，并以异步方式接收消息。针对此用例，我们可以识别出以下关键组件。


    *   *消息*：传输的数据内容，包括有效载荷和消息属性。

    *   *AMQP 消息代理*：一个实现 AMQP 协议的中心应用程序，它接受来自生产者的连接以进行消息排队，以及来自消费者的连接以从队列中消费消息。

    *   *生产者*：将消息放入队列的应用程序。

    *   *消费者*：从队列中接收消息的应用程序。


    生产者可以指定各种消息属性，这些属性可能对代理有用，也可能仅供消费微服务处理。


    由于网络不可靠，代理与微服务之间的通信可能会在处理消息时失败。AMQP 定义了一个名为*消息确认*的概念，这对于实现消息的可靠传递非常有用。当消息被传递给消费者时，消费者会通知代理，可以是自动通知，也可以是应用程序代码决定通知时。在消息确认模式下，代理只有在收到针对该消息（或消息组）的通知时，才会完全从队列中移除该消息。此外，由于我们使用了队列，可以确保消息的有序传递和处理。AMQP
    引入了一系列可靠性机制。


    故障可能发生在代理、发布者和消费者之间的网络交互中，也可能发生在代理和客户端应用程序的运行过程中。


    确认机制允许消费者向服务器表明它已成功接收消息。同样，代理也可以使用确认机制来通知生产者它已成功接收消息（例如，RabbitMQ 中的确认）。因此，确认信号表示消息已收到且所有权已转移，接收方将对其承担全部责任。


    AMQP 0-9-1 提供了*心跳*功能，以确保应用层能够及时发现连接中断和完全无响应的对端。心跳功能也适用于可能终止空闲 TCP 连接的网络设备。


    *   *代理故障*：为了处理代理故障，AMQP 标准为交换机、队列和持久化消息定义了持久性概念，要求持久化对象或持久化消息在重启后依然存在。为你所使用的代理启用集群功能。

    *   *生产者故障*：在向代理生成消息时，生产者应重新发送任何未收到代理确认的消息。这里存在消息重复的可能性，因为代理可能已经发送了确认，但该确认从未到达生产者（由于网络故障等原因）。因此，消费者应用程序需要执行去重操作，或以幂等方式处理传入的消息（即，即使多次处理同一条消息，内部状态也不会改变）。


    在网络故障（或运行时崩溃）的情况下，消息可能会重复，消费者必须准备好处理这些情况。如果可能，最简单的处理方式是确保你的消费者以幂等方式处理消息，而不是显式地进行去重。


    在故障条件下，当消息无法路由时，消息可能会被返回给发布者、丢弃，或者如果代理实现了扩展，则会被放入所谓的“死信队列”。发布者可以通过使用特定参数发布消息来决定如何处理此类情况。


    目前有多种开源消息代理解决方案，RabbitMQ 可能是最流行且使用最广泛的一种。Apache ActiveMQ、ActiveMQ Artemis 和 Apache
    Qpid 也很受欢迎。


    AMQP 规范有多个版本，v0-9-1 是最常用的版本。最新版本是 1.0，但尚未在整个行业中被完全采用。从微服务架构的角度来看，我们不必学习 AMQP 协议的细节；对其功能和消息传递模式有基础层面的了解就足够了。AMQP
    还定义了除单接收者交换之外的其他消息交换风格，例如扇出、主题和基于标头的交换。


    ### 重要提示


    AMQP 消息代理通常被开发为单体运行时，并非专门用于微服务架构。因此，大多数代理都带有各种功能，允许你将业务逻辑放入代理内部（例如路由）。因此，在使用这些代理时必须格外谨慎，并且只能将它们用作无业务逻辑的代理。所有异步消息传递的智能逻辑都应仅存在于我们的服务逻辑中。


    我们将在第 4 章中讨论一个与此处描述类似的开发用例。

    '
- fmt: '### Multiple Receivers


    When the asynchronous messages produced by one producer should go to more than
    one consumer, the publisher-subscriber or multiple receiver style communication
    will be useful.


    As an example use case, suppose that there is a `Product Management` service,
    which produces the information on the price updates of the products. That information
    has to be propagated to multiple microservices, such as `Shopping Cart`, `Fraud
    Detection`, `Subscriptions`, etc. As shown in Figure [3-5](#461146_1_En_3_Chapter.xhtml#Fig5),
    we can use an event bus as the communication infrastructure and the `Product Management`
    service can publish the price update events to a particular topic. The services
    that are interested in receiving price update events should subscribe to the same
    topic. The interested services will receive events on subscribed topics only if
    they are available at the time of the event broadcasting by the event bus. If
    the underlying event bus implementation supports it, the subscriber may have the
    option of subscribing as a durable subscriber, in which it will receive all the
    events despite being offline at the time of the event broadcasting.


    ![../images/461146_1_En_3_Chapter/461146_1_En_3_Fig5_HTML.jpg](images/461146_1_En_3_Chapter/461146_1_En_3_Fig5_HTML.jpg)


    Figure 3-5


    Multiple receivers (pub-sub) based asynchronous communication


    There are multiple messaging protocols that support pub-sub messaging. Most of
    the AMQP-based brokers support pub-sub, but Kafka (which has its own messaging
    protocol) is the most widely used message broker for multiple receiver/pub-sub
    type messaging between microservices. Let’s take a closer look at Kafka and revisit
    this implementation with Kafka.


    #### Kafka


    Apache Kafka^([^(32)](#fn32)) is a distributed publish/subscribe messaging system.
    It is often described as a *distributed commit log*, as the data within Kafka
    is stored durably, in order, and can be read deterministically. Also, data is
    distributed within the Kafka system for failover and scalability.


    Let’s take a closer look at how we can implement a publisher-subscriber scenario
    using Kafka. As illustrated in Figure [3-6](#461146_1_En_3_Chapter.xhtml#Fig6),
    we can use Kafka as the distributed pub-sub messaging system to build multiple
    microservice asynchronous messaging scenarios.


    The unit of data used in Kafka is known as a *message* (an array of bytes). Unlike
    other messaging protocols, the data contained within it does not have a specific
    format or meaning to Kafka. Messages can also contain metadata, which can be helpful
    in publishing or consuming messages.


    ![../images/461146_1_En_3_Chapter/461146_1_En_3_Fig6_HTML.jpg](images/461146_1_En_3_Chapter/461146_1_En_3_Fig6_HTML.jpg)


    Figure 3-6


    Multiple receivers (pub-sub) based asynchronous communication with Kafka


    These messages in Kafka are categorized into *topics*. A given topic can optionally
    be split into multiple *partitions*. A partition is a logical and physical componentization
    of a given topic, in which the producer can decide to which partition it wants
    to write. This is typically done using the message metadata known as *key*. Kafka
    generates a hash of the key and maps it to a specific partition (i.e., all messages
    produced with a given key reside on the same partition). Partitions are the primary
    mechanism in Kafka for parallelizing consumption and scaling a topic beyond the
    throughput limits of a single node. Each partition can be hosted in different
    nodes.


    Each message is written to a partition with the offset number. The *offset* is
    an incrementally numbered position that starts at 0 at the beginning of the partition.


    The *producers* write the messages to a specific topic. By default, the producer
    does not care what partition a specific message is written to and will distribute
    messages over all partitions of a topic evenly. In some cases, the producer will
    direct messages to specific partitions using the message metadata, *key*.


    The *consumers* subscribe to one or more topics and read the messages in the order
    in which they were produced. The consumer keeps track of which messages it has
    already consumed by keeping track of the *offset* of messages. Each message in
    a given partition has a unique offset. By storing the offset of the last consumed
    message for each partition (in Zookeeper or in Kafka), a consumer can stop and
    restart without losing its place.


    Consumers work as part of a *consumer group*, where one or more consumers work
    together to consume a topic. The group ensure that one consumer group member only
    consumes message from each partition. However, a given consumer group member can
    consume from multiple partitions. Obliviously, the concept of a consumer group
    is useful when we have to horizontally scale the consumption of a topic with a
    high message volume.


    Now let’s try to take these concepts further with the scenario shown in Figure
    [3-6](#461146_1_En_3_Chapter.xhtml#Fig6). In the following multiple-receiver messaging
    scenario, which is based on Kafka, there are two topics created in Kafka: `price_update`
    and `order_update`.


    There are two `Product Management` producers (microservices from different departments)
    publishing product price update information (the producer can explicitly write
    to a given partition or the load can be distributed among the partitions evenly).
    For the `price_update` topic, there are three different consumers (from three
    consumer groups). They will independently read messages from Kafka and will maintain
    their own offset. For instance, suppose that there is an outage of `Subscription`
    services so that it was not able to receive the price updates during certain time.
    When the `Subscription` service starts again, it can check the currently persisted
    offset and pull all the events it received when it was offline.


    The order-processing scenario with the `order_update` topic is slightly different.
    In that scenario, we can assume that we have a high load coming through the order
    update channels and we need to scale the consumer side to process them more efficiently.
    Hence, we use a consumer group with two consumers, so that they can parallel-process
    the order update events from multiple partitions.


    A single Kafka server is known as a *broker*, and it serves message publishing
    and consuming. Multiple Kafka brokers can operate as a single cluster. From the
    multiple brokers in a cluster, there is a single broker, which functions as the
    cluster controller and takes care of the cluster administrative operations such
    as assigning partitions to brokers and detecting brokers failures. A partition
    is assigned to multiple brokers and there is a leader broker for each partition.
    Therefore, Kafka messaging has high availability because of the replication of
    the partitions across multiple brokers and the ability to appoint a new leader
    if the existing partition leader is not available (Kafka uses Zookeeper for most
    of the coordination tasks).


    With clustering, Kafka is becoming even more powerful, so that you can massively
    scale your asynchronous messaging capabilities.'
