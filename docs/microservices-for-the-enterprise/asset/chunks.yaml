- fmt: '### Joins with Materialize View Using Asynchronous Events


    There are certain data composition scenarios where you need to materialize the
    view with pre-joined data coming from multiple microservices. For example, consider
    the scenario illustrated in Figure [5-9](#461146_1_En_5_Chapter.xhtml#Fig9). Here
    we have the `Order Processing` and `Customer` services, and we need to materialize
    the customer-order join/view. The materialized view will be used for a specific
    business function, which requires the join between orders and customers.


    ![../images/461146_1_En_5_Chapter/461146_1_En_5_Fig9_HTML.jpg](images/461146_1_En_5_Chapter/461146_1_En_5_Fig9_HTML.jpg)


    **Figure 5-9** – Joins with materialized view using asynchronous events


    The `Order Processing` and `Customer` services publish order and customer update
    events to the event bus/broker. There is a service that has subscribed to those
    events and it then materializes the join of orders and customers. That service
    (`Customer-Order-View-Sync`) maintains a de-normalized join between the orders
    and customers, which is done ahead of time rather than in realtime. As shown in
    Figure [5-9](#461146_1_En_5_Chapter.xhtml#Fig9), the `Customer-Order-View-Sync`
    service also has a component that operates on the Customer-Order View Cache that
    serves all the external queries.


    > **Tip:** Data composition with materializing view is suitable for compositions
    with large numbers of rows (m:n joins with high cardinality) on each side.


    The denormalized data can be kept in a cache or other such storage and it could
    be consumed by another microservices as a read-only datastore.


    ### Transactions with Microservices


    Transactions are an important concept in software applications. They allow you
    to group a set of operations that should be executed together in an all-or-none
    scenario (i.e., they are executed or are all rolled back in the event of a failure).
    Transactions are quite commonly used in the context of a database but not limited
    to it. In this chapter, we mainly focus on the database transactions.


    ACID (Atomicity, Consistency, Isolation, and Durability) is a set of properties
    of database transactions intended to guarantee validity even in the event of a
    failure. Therefore, a sequence of database operations that satisfies the ACID
    properties can be considered a transaction.


    The monolithic applications are often built on top of a single centralized relational
    database and transactions are used to keep data in a consistent state across multiple
    tables. Using the ACID properties in the application provides the capability of
    beginning a transaction to perform changes like insert, update, and delete and
    allows committing or rolling back the transaction. With monolithic applications
    and centralized databases, it is quite straightforward to begin a transaction,
    change the data in multiple rows (which can span across multiple tables), and
    finally commit the transaction.


    With microservices, the business requirements related to transactions wouldn’t
    change drastically. However, unlike a centralized database, microservices have
    their own database and the transactional boundaries that span across multiple
    services and databases. Therefore, implementation of such transactional scenarios
    is no longer straightforward as it is with monolithic applications and centralized
    databases.


    #### Avoiding Distributed Transactions with Two-Phase Commit


    Distributed transactions are built around the concept of using a centralized process
    called a *transaction manager* to orchestrate the steps of a transaction. The
    main algorithm that is used in implementing distributed transactions is known
    as *two-phase commit* (2PC). Let’s look at the details of the two-phase commit
    protocol. The changes required by a transaction are sent to each participant and
    initially stored temporarily at each participant of the transaction. Then the
    transaction manager initiates the voting/commit-request phase.


    **Voting/Commit-Request Phase**


    - The transaction manager/coordinator sends a *prepare* request to all the services
    that participate in a given transaction.

    - The transaction manager will wait until all services reply yes or no.


    **Commit Phase**


    - Based on the responses received in the first phase, if all the services have
    responded with a yes, then the transaction manager will commit the transaction.

    - If any of the services respond with a no (or don’t respond at all), then the
    transaction manager will invoke the rollback operations for all the participating
    services. Once the commit message is received, all the participant entities persist
    the temporarily stored changes.


    The distributed transactions method addresses most of the transaction requirements
    that we discussed earlier, but it comes with inherent limitations that hinder
    the usage of distributed transactions with 2PC for most microservices transactional
    behaviors. Some of the limitations of the two-phase commit method are:


    - The transaction manager is the single point of failure. All pending transactions
    will never complete.

    - If a given participant fails to respond, then the entire transaction will be
    blocked.

    - A commit can fail after voting. The 2PC protocol assumes that if a given participant
    has responded with a yes, then it can definitely commit the transaction too. This
    is not the case in most practical scenarios.

    - Given the distributed and autonomous nature of microservices, using a distributed
    transactions/two-phase commit for implementing transactional business use cases
    is a complex, error-prone task that can hinder the scalability of the entire system.


    > **Tip:** Avoid using distributed transactions with two-phase commit for microservices
    transactions.


    It is better if you can avoid using distributed transactions with two-phase commit
    when implementing transactions across multiple microservices. However, the requirement
    of building transactional business scenarios, which span multiple microservices,
    is still valid. There are several other alternatives you can use.


    #### Publishing Events Using Local Transactions


    Asynchronous event-based data management is quite common in microservices data
    management. There are certain transactional behaviors that you can implement in
    event-driven architecture that allow you to achieve atomicity. For example, suppose
    that the `Order Processing` service illustrated in Figure [5-10](#461146_1_En_5_Chapter.xhtml#Fig10)
    is responsible for updating the `ORDER` table and publishing an event to the event
    bus in a transactional manner (i.e., update the order and publish the event at
    once).


    ![../images/461146_1_En_5_Chapter/461146_1_En_5_Fig10_HTML.jpg](images/461146_1_En_5_Chapter/461146_1_En_5_Fig10_HTML.jpg)


    **Figure 5-10** – Using local transactions to update a database table and create
    an event


    Here, we have used an event table to store the order update events. So, the `Order
    Processing` service can start a local transaction, which includes order update
    operations, and add an event to the `ORDER_EVENT` table. Both of these operations
    will be executed in the same local transaction boundary.


    There is a dedicated service/process that is responsible for consuming the `ORDER_EVENT`
    table and publishing the event to the event bus. It can also use local transactions
    to read the events, publish them to an event bus/message broker, and update the
    order event table. The event consumer service is responsible for reading events
    from the event bus and handling them in the transaction boundary of that service.


    This approach avoids the usage of distributed transactions with 2PC, but it has
    some limitations, such as dependency on a database that supports transactions
    (i.e., most of the NoSQL databases do not support transactions).'
  raw: '#### Joins with Materialize View Using Asynchronous Events


    There are certain data composition scenarios where you need to materialize the
    view with pre-joined data coming from multiple microservices. For example, consider
    the scenario illustrated in Figure [5-9](#461146_1_En_5_Chapter.xhtml#Fig9). Here
    we have the `Order Processing` and `Customer` services, and we need to materialize
    the customer-order join/view. The materialized view will be used for a specific
    business function, which requires the join between orders and customers.


    ![../images/461146_1_En_5_Chapter/461146_1_En_5_Fig9_HTML.jpg](images/461146_1_En_5_Chapter/461146_1_En_5_Fig9_HTML.jpg)


    Figure 5-9


    Joins with materialized view using asynchronous events


    The `Order Processing` and `Customer` services publish order and customer update
    events to the event bus/broker. There is a service that has subscribed to those
    events and it then materializes the join of orders and customers. That service
    (`Customer-Order-View-Sync`) maintains a de-normalized join between the orders
    and customers, which is done ahead of time rather than in realtime. As shown in
    Figure [5-9](#461146_1_En_5_Chapter.xhtml#Fig9), `Customer-Order-View-Sync` service
    also has a component that operates on the Customer-Order View Cache that serves
    all the external queries.


    ### Tip


    Data composition with materializing view is suitable for compositions with large
    numbers of rows (m:n joins with high cardinality) on each side.


    The denormalized data can be kept in a cache or other such storage and it could
    be consumed by another microservices as a read-only datastore.


    ## Transactions with Microservices


    Transactions are an important concept in software applications. They allow you
    to group a set of operations that should be executed together in an all-or-none
    scenario (i.e., they are executed or are all rolled back in the event of a failure).
    Transactions are quite commonly used in the context of a database but not limited
    to it. In this chapter, we mainly focus on the database transactions.


    ACID (Atomicity, Consistency, Isolation, and Durability) is a set of properties
    of database transactions intended to guarantee validity even in the event of a
    failure. Therefore, a sequence of database operations that satisfies the ACID
    properties can be considered a transaction.


    The monolithic applications are often built on top of a single centralized relational
    database and transactions are used to keep data in a consistent state across multiple
    tables. Using the ACID properties in the application provides the capability of
    beginning a transaction to perform changes like insert, update, and delete and
    allows committing or rolling back the transaction. With monolithic applications
    and centralized databases, it is quite straightforward to begin a transaction,
    change the data in multiple rows (which can span across multiple tables), and
    finally commit the transaction.


    With microservices, the business requirements related to transactions wouldn’t
    change drastically. However, unlike a centralized database, microservices have
    their own database and the transactional boundaries that span across multiple
    services and databases. Therefore, implementation of such transactional scenarios
    is no longer straightforward as it is with monolithic applications and centralized
    databases.


    ### Avoiding Distributed Transactions with Two-Phase Commit


    Distributed transactions are built around the concept of using a centralized process
    called a *transaction manager* to orchestrate the steps of a transaction. The
    main algorithm that is used in implementing distributed transactions is known
    as *two-phase commit* (2PC). Let’s look at the details of the two-phase commit
    protocol. The changes required by a transaction are sent to each participant and
    initially stored temporarily at each participant of the transaction. Then the
    transaction manager initiates the voting/commit-request phase.


    *Voting/Commit-Request Phase*


    *   The transaction manager/coordinator sends a *prepare* request to all the services
    that participate in a given transaction.


    *   The transaction manager will wait until all services reply yes or no.


    *Commit Phase*


    *   Based on the responses received in the first phase, if all the services have
    responded with a yes, then the transaction manager will commit the transaction.


    *   If any of the services respond with a no (or don’t respond at all), then the
    transaction manager will invoke the rollback operations for all the participating
    services. Once the commit message is received, all the participant entities persist
    the temporarily stored changes.


    The distributed transactions method addresses most of the transaction requirements
    that we discussed earlier, but it comes with inherent limitations that hinder
    the usage of distributed transactions with 2PC for most microservices transactional
    behaviors. Some of the limitations of the two-phase commit method are:


    *   The transaction manager is the single point of failure. All pending transactions
    will never complete.


    *   If a given participant fails to respond, then the entire transaction will
    be blocked.


    *   A commit can fail after voting. The 2PC protocol assumes that if a given participant
    has responded with a yes, then it can definitely commit the transaction too. This
    is not the case in most practical scenarios.


    *   Given the distributed and autonomous nature of microservices, using a distributed
    transactions/two-phase commit for implementing transactional business use cases
    is a complex, error-prone task that can hinder the scalability of the entire system.


    ### Tip


    Avoid using distributed transactions with two-phase commit for microservices transactions.


    It is better if you can avoid using distributed transactions with two-phase commit
    when implementing transactions across multiple microservices. However, the requirement
    of building transactional business scenarios, which span multiple microservices,
    is still valid. There are several other alternatives you can use.


    ### Publishing Events Using Local Transactions


    Asynchronous event-based data management is quite common in microservices data
    management. There are certain transactional behaviors that you can implement in
    event-driven architecture that allow you to achieve atomicity. For example, suppose
    that the `Order Processing` service illustrated in Figure [5-10](#461146_1_En_5_Chapter.xhtml#Fig10)
    is responsible for updating the `ORDER` table and publishing an event to the event
    bus in a transactional manner (i.e., update the order and publish the event at
    once).


    ![../images/461146_1_En_5_Chapter/461146_1_En_5_Fig10_HTML.jpg](images/461146_1_En_5_Chapter/461146_1_En_5_Fig10_HTML.jpg)


    Figure 5-10


    Using local transactions to update a database table and create an event


    Here, we have used an event table to store the order update events. So, the `Order
    Processing` service can start a local transaction, which includes order update
    operations, and add an event to the `ORDER_EVENT` table. Both of these operations
    will be executed in the same local transaction boundary.


    There is a dedicated service/process that is responsible for consuming the `ORDER_EVENT`
    table and publishing the event to the event bus. It can also use local transactions
    to read the events, publish them to an event bus/message broker, and update the
    order event table. The event consumer service is responsible for reading events
    from the event bus and handling them in the transaction boundary of that service.


    This approach avoids the usage of distributed transactions with 2PC, but it has
    some limitations, such as dependency on a database that supports transactions
    (i.e., most of the NoSQL databases do not support transactions).'
  trans: '

    #### 使用异步事件与物化视图进行连接


    在某些数据组合场景中，你需要将来自多个微服务的预连接数据物化成视图。例如，考虑图 5-9 所示的场景。这里我们有`订单处理`服务和`客户`服务，我们需要物化客户-订单连接/视图。该物化视图将用于特定的业务功能，该功能需要订单与客户之间的连接。


    ![../images/461146_1_En_5_Chapter/461146_1_En_5_Fig9_HTML.jpg](img/461146_1_En_5_Fig9_HTML.jpg)


    图 5-9


    使用异步事件与物化视图进行连接


    `订单处理`服务和`客户`服务将订单和客户更新事件发布到事件总线/代理。有一个服务订阅了这些事件，然后它物化了订单和客户的连接。该服务（`客户-订单-视图-同步`）维护了订单和客户之间的反规范化连接，这是提前完成的，而非实时进行。如图
    5-9 所示，`客户-订单-视图-同步`服务还有一个组件，该组件操作于客户-订单视图缓存，为所有外部查询提供服务。


    ### 提示


    使用物化视图进行数据组合适用于每侧都有大量行（高基数的多对多连接）的组合场景。


    反规范化后的数据可以保存在缓存或其他此类存储中，并且可以被其他微服务作为只读数据存储来消费。


    ## 微服务中的事务


    事务是软件应用程序中的一个重要概念。它们允许你将一组操作组合在一起，这些操作应在全有或全无的场景下一起执行（即，要么全部执行，要么在发生故障时全部回滚）。事务在数据库上下文中非常常见，但并不仅限于此。在本章中，我们主要关注数据库事务。


    ACID（原子性、一致性、隔离性和持久性）是一组数据库事务的属性，旨在即使在发生故障时也能保证有效性。因此，满足 ACID 属性的一系列数据库操作可以被视为一个事务。


    单体应用通常构建在单个集中式关系数据库之上，并使用事务来保持跨多个表的数据处于一致状态。在应用程序中使用 ACID 属性提供了启动事务以执行插入、更新和删除等更改的能力，并允许提交或回滚事务。对于单体应用和集中式数据库，启动事务、更改多行数据（可能跨多个表）并最终提交事务是相当直接的。


    对于微服务，与事务相关的业务需求不会发生根本性变化。然而，与集中式数据库不同，微服务拥有自己的数据库，并且事务边界跨越多个服务和数据库。因此，实现此类事务场景不再像单体应用和集中式数据库那样直接。


    ### 避免使用两阶段提交的分布式事务


    分布式事务是围绕使用一个称为*事务管理器*的集中式进程来编排事务步骤的概念构建的。实现分布式事务使用的主要算法称为*两阶段提交*（2PC）。让我们看看两阶段提交协议的细节。事务所需的更改被发送给每个参与者，并最初临时存储在每个事务参与者处。然后，事务管理器启动投票/提交请求阶段。


    *投票/提交请求阶段*


    *   事务管理器/协调器向参与给定事务的所有服务发送一个*准备*请求。


    *   事务管理器将等待，直到所有服务回复“是”或“否”。


    *提交阶段*


    *   基于第一阶段收到的响应，如果所有服务都回复了“是”，那么事务管理器将提交该事务。


    *   如果任何服务回复“否”（或根本不回复），那么事务管理器将为所有参与服务调用回滚操作。一旦收到提交消息，所有参与者实体就会持久化临时存储的更改。


    分布式事务方法解决了我们之前讨论的大多数事务需求，但它带有固有的局限性，这些局限性阻碍了将带有 2PC 的分布式事务用于大多数微服务事务行为。两阶段提交方法的一些局限性包括：


    *   事务管理器是单点故障。所有未决事务将永远无法完成。


    *   如果某个参与者未能响应，那么整个事务将被阻塞。


    *   提交可能在投票后失败。2PC 协议假设，如果某个参与者回复了“是”，那么它也一定能够提交该事务。在大多数实际场景中并非如此。


    *   鉴于微服务的分布式和自治特性，使用分布式事务/两阶段提交来实现事务性业务用例是一项复杂且容易出错的任务，可能会阻碍整个系统的可扩展性。


    ### 提示


    避免对微服务事务使用带有两阶段提交的分布式事务。


    在跨多个微服务实现事务时，最好避免使用带有两阶段提交的分布式事务。然而，构建跨多个微服务的事务性业务场景的需求仍然有效。还有其他几种替代方案可供使用。


    ### 使用本地事务发布事件


    基于异步事件的数据管理在微服务数据管理中非常常见。你可以在事件驱动架构中实现某些事务行为，从而让你实现原子性。例如，假设图 5-10 中所示的`订单处理`服务负责以事务方式更新`ORDER`表并向事件总线发布事件（即，同时更新订单并发布事件）。


    ![../images/461146_1_En_5_Chapter/461146_1_En_5_Fig10_HTML.jpg](img/461146_1_En_5_Fig10_HTML.jpg)


    图 5-10


    使用本地事务更新数据库表并创建事件


    这里，我们使用了一个事件表来存储订单更新事件。因此，`订单处理`服务可以启动一个本地事务，该事务包括订单更新操作，并向`ORDER_EVENT`表添加一个事件。这两个操作将在同一个本地事务边界内执行。


    有一个专门的服务/进程负责消费`ORDER_EVENT`表并将事件发布到事件总线。它也可以使用本地事务来读取事件，将它们发布到事件总线/消息代理，并更新订单事件表。事件消费者服务负责从事件总线读取事件，并在该服务的事务边界内处理它们。


    这种方法避免了使用带有 2PC 的分布式事务，但它有一些局限性，例如依赖于支持事务的数据库（即，大多数 NoSQL 数据库不支持事务）。

