- fmt: '# Timeouts


    Almost all the applications we build today do remote calls over the network. It
    can be an HTTP request to a web service endpoint, a database call over JDBC, or
    an authentication request to an LDAP server. Anything over the network is fallible;
    hence we should not wait infinitely expecting a response from the remote endpoint.
    For example, in a database connection, if we decide to wait infinitely until we
    see a response, that takes one connection out of the database connection pool
    for the period of the wait time. And if we have few more like that, the overall
    performance of the application will start to degrade.


    `Timeouts` decide how much time we want to tolerate waiting for a response. For
    every remote call we do from our microservice, we must have a timeout. Neither
    the very long timeouts nor the very short ones are going to help. It will be a
    learning exercise to figure out the best fit. Make sure every time a connection
    times out to have a log entry. That helps in the future to adjust the timeout
    value.


    Let’s see how this could happen in practice. From our customer portal, to load
    suggestions for the logged in user, based on his/her previous order patterns,
    we have to call the `Customer Suggestions` microservice. This service has to talk
    to a database internally to load the suggestions. If the connection to the database
    times out, what should we return? If we build the microservice with a recovery-oriented
    development mindset, we should not just return an error, rather we should return
    a default set of suggestions, which will not break anything in the customer portal.
    From a business point of view, this may not be effective, but from the end user’s
    user experience point of view it’s a good pattern to follow.


    # Circuit Breaker


    The circuit breaker protects electrical appliances by controlling the flow of
    electricity (see Figure [2-14](#461146_1_En_2_Chapter.xhtml#Fig14)). If the flow
    of electricity is higher than a certain threshold value, the circuit breaker will
    break the flow and protect the appliances behind it from damages. The circuit
    breaker pattern brings this same concept to the software world. If our microservice
    keeps timing out against one endpoint all the time, there is no point keep trying,
    at least for some time. The circuit breaker pattern suggests wrapping such operations
    with a component that can circumvent calls when the system is not healthy. This
    component will maintain some threshold value for failures and, if it is met, then
    will break the circuit; no more calls will hit the wrapped operation. It may also
    wait for some configured time interval and close the circuit to see if the operation
    returns errors, and if does not, it will keep the circuit closed for all the subsequent
    operations.


    ![../images/461146_1_En_2_Chapter/461146_1_En_2_Fig14_HTML.jpg](images/461146_1_En_2_Chapter/461146_1_En_2_Fig14_HTML.jpg)


    Figure 2-14


    MCBs (miniature circuit breakers), mostly used in homes


    # Bulkheads


    Bulkheads are mostly used in ships and boats to build watertight compartments,
    so that if one compartment is caught in the water, the people can move to another
    compartment for safety. The damage in one compartment will not take the ship completely
    down, as the compartments are isolated from each other.


    The bulkheads pattern borrows this same concept. This pattern highlights how we
    can allocate resources, such as thread pools, which are connection pools for outbound
    connections. If we have one single thread pool for all outbound endpoints, then,
    if one endpoint happens to be slow in responding, releasing the corresponding
    thread to the pool will take more time. If this repeats consistently then will
    have an impact on requests directed to other endpoints as well, since more threads
    are now waiting on the slow endpoint. Following the bulkheads pattern, we can
    have one thread pool per endpoint—or in a way you can logically group those together.
    This prevents an issue in one bad endpoint being propagated into other good endpoints.
    The bulkheads pattern partitions capacity to preserve partial functionality when
    bad things happen.


    # Steady State


    The steady state pattern highlights the need of adhering to a design that lets
    your system run in a steady state for a long time without frequent interventions.
    Every time your DevOps team has to touch the system, they increase the possibility
    of introducing new errors, no matter how experienced they are. In March 2017,
    there was a massive AWS (Amazon Web Services) outage. This four-hour outage at
    AWS S3 system caused disruptions, slowdowns, and failure-to-load errors across
    the United States. Amazon later published^([⁴](#fn4)) the cause of the issue,
    which was a trivial human error. An authorized S3 team member using an established
    playbook executed a command, which was intended to remove a small number of servers
    for one of the S3 subsystems that is used by the S3 billing process. Unfortunately,
    one of the inputs to the command was entered incorrectly and a larger set of servers
    was removed than intended.


    The design of a system must be done in a way to keep humans away from it whenever
    possible. Everything, from development to deployment, must be automated. This
    includes cleaning up resources that accumulate in the production servers. The
    best example are the logs. Accumulating log files can easily fill up the filesystem.
    Later in this chapter we discuss an approach to managing logs in an effective
    manner in a microservices deployment.


    We also used to store temporary states and time-bound tokens in the database,
    which causes the database to grow heavily over the time. Even though these tokens
    and temporary states are no longer valid, they still sit in the database, eating
    space and slowing down the system. The design of the system should have a way
    to clean such data periodically via an automated process.


    In-memory caching is another area to look into. Memory is a limited, precious
    resource in a running system. Letting an in-memory cache grow infinitely will
    cause system performance to degrade and, ultimately, the system will run out of
    memory. It is always recommend to have an upper limit (in terms of the number
    of elements in the cache) to the cache and have an LRU (least recently used) strategy
    to clean up. With the least recently used strategy, when the cache hits its upper
    limit, the least recently used element will be evicted to find room for the new
    one. Periodic flush is another strategy to clean up the cache.


    The steady state pattern says that, for every mechanism that accumulates a resource,
    some other mechanism must recycle that resource.


    # Fail Fast


    Fail fast pattern highlights the need for making decisions early in the flow of
    execution, if the request is going to fail or be rejected. For example, if the
    load balancer already knows that a given node is down, there is no point in sending
    requests there again and again to find out its up or not. Rather, that node can
    be marked as a faulty node until you hear a valid heartbeat from it. The circuit
    breaker pattern can also be used to implement a fail fast strategy. With the circuit
    breaker pattern, we can isolate faulty endpoints, and any requests going out for
    such endpoints can be rejected without retrying, until circuit breaker decides
    that it’s time to recheck.'
