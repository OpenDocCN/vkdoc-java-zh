    ### 注意


    如果你仔细观察我们为 OAuth 2.0 客户端凭证授权类型和密码授权类型获得的两种响应，你可能会注意到客户端凭证授权类型流程中没有刷新令牌。在 OAuth
    2.0 中，当访问令牌过期时，刷新令牌用于获取新的访问令牌。这在用户离线且客户端应用程序无法访问其凭据以获取新访问令牌时非常有用。在这种情况下，唯一的方法是使用刷新令牌。对于客户端凭证授权类型，没有用户参与，并且它始终可以访问自己的凭据，因此它可以随时用于获取新的访问令牌。因此，不需要刷新令牌。


    现在，让我们看看如何通过与授权服务器通信来验证访问令牌。资源服务器通常执行此操作。运行在资源服务器上的拦截器拦截请求，提取访问令牌，然后与授权服务器通信。我们将在下一节中看到如何配置资源服务器（另一个受
    OAuth 2.0 保护的微服务），以下命令展示了如何直接与授权服务器通信以验证上一条命令中获取的访问令牌。请务必将 `$TOKEN` 值替换为相应的访问令牌。


    ```

    \> curl -k -X POST -H "Authorization: Bearer $TOKEN" -H "Content-Type: application/json"   https://localhost:8443/user

    {"details":{"remoteAddress":"0:0:0:0:0:0:0:1","sessionId":null,"tokenValue":"9f3319a1-c6c4-4487-ac3b-51e9e479b4ff","tokenType":"Bearer","decodedDetails":null},"authorities":[],"authenticated":true,"userAuthentication":null,"credentials":"","oauth2Request":{"clientId":"10101010","scope":["bar"],"requestParameters":{"grant_type":"client_credentials","scope":"bar"},"resourceIds":[],"authorities":[],"approved":true,"refresh":false,"redirectUri":null,"responseTypes":[],"extensions":{},"grantType":"client_credentials","refreshTokenRequest":null},"clientOnly":true,"principal":"10101010","name":"10101010"}

    ```


    如果令牌有效，此命令将返回与访问令牌关联的元数据。响应是在 `sample01/src/main/java/com/apress/ch12/sample01/TokenServiceApp.java`
    类的 `user()` 方法内部构建的，如下面的代码片段所示。通过 `@RequestMapping` 注解，我们将 `/user` 上下文（来自请求）映射到
    `user()` 方法。


    ```

    @RequestMapping("/user")

    public Principal user(Principal user) {

    return user;

    }

    ```


    ### 注意


    默认情况下，在没有扩展的情况下，Spring Boot 会将已颁发的令牌存储在内存中。如果在颁发令牌后重新启动服务器，然后尝试验证该令牌，将会导致错误响应。


    ### 使用 OAuth 2.0 保护微服务


    在本节中，我们将了解如何使用 OAuth 2.0 保护 Spring Boot 微服务。在 OAuth 术语中，它被称为资源服务器。与受 OAuth 2.0
    保护的 `订单处理` 微服务对应的代码位于 `ch12/sample02` 目录中。为了使用 OAuth 2.0 保护微服务，我们将 `@EnableResourceServer`
    注解添加到 `sample02/src/main/java/com/apress/ch12/sample02/OrderProcessingApp.java`
    类，并将 `sample02/src/main/resources/application.properties` 文件中的 `security.oauth2.resource.user-info-uri`
    属性指向授权服务器的用户信息端点。以下显示了与 `sample02` 对应的 `application.properties` 文件。请注意，`security.oauth2.resource.jwt.keyUri`
    属性默认被注释掉了；我们将在本章后面讨论其用法。


    ```

    server.port=9443

    server.ssl.key-store: keystore.jks

    server.ssl.key-store-password: springboot

    server.ssl.keyAlias: spring

    security.oauth2.resource.user-info-uri=https://localhost:8443/user

    #security.oauth2.resource.jwt.keyUri: https://localhost:8443/oauth/token_key

    ```


    由于 `订单处理` 微服务通过 HTTPS 调用用户信息端点，并且我们使用自签名证书来保护授权服务器，因此此调用将导致信任验证错误。为了解决这个问题，我们需要将授权服务器的公共证书从
    `ch12/sample01/keystore.jks` 导出到一个新的密钥库，并将其设置为 `订单处理` 微服务的信任库。


    使用以下 `keytool` 命令导出公共证书并将其存储在 `cert.crt` 文件中。用于保护 `keystore.jks` 的密码是 `springboot`。除了使用
    `export` 参数（指示 `keytool` 导出给定 `alias` 下的证书）外，您还可以使用 `exportcert` 参数。


    ```

    \> keytool -export -keystore keystore.jks -alias spring -file cert.crt

    ```


    现在使用以下 `keytool` 命令创建一个包含 `cert.crt` 的新信任库。这里我们使用 `authserver` 作为别名，将授权服务器的公共证书存储在
    `trust-store.jks` 中，并将该信任库复制到 `ch12/sample02` 目录（默认情况下，当您从示例 Git 仓库克隆代码时，您会在相应目录下找到运行示例所需的所有密钥库和信任库）。我们也使用相同的密码
    `springboot` 来保护 `trust-store.jks`。除了使用 `import` 参数（指示 `keytool` 导入给定 `alias`
    下的证书）外，您还可以使用 `importcert` 参数。


    ```

    \> keytool -import -file cert.crt -alias authserver -keystore trust-store.jks

    ```


    我们还需要在代码中将信任库的位置及其密码设置为系统参数。您将在 `sample02/src/main/java/com/apress/ch12/sample02/OrderProcessingApp.java`
    类中找到以下代码片段，用于设置系统属性。


    ```

    static {

    String path = System.getProperty("user.dir");

    System.setProperty("javax.net.ssl.trustStore", path

    + File.separator + "trust-store.jks");

    System.setProperty("javax.net.ssl.trustStorePassword", "springboot");

    HttpsURLConnection.setDefaultHostnameVerifier(new HostnameVerifier()

    {

    public boolean verify(String hostname, SSLSession session) {

    return true;

    }

    });

    }

    ```

