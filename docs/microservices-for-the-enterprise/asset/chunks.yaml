  trans: '

    ### 动手试试


    你可以尝试第 4 章“开发服务”中的 gRPC 服务示例。


    gRPC 支持服务器流式 RPC，即客户端向服务器发送请求，并获取一个流来读取一系列返回消息。客户端从返回的流中读取数据，直到没有更多消息为止。


    ```

    rpc productUpdate(ProdUpdateReq) returns (stream ProdUpdateStatues){

    }

    ```


    同样，你也可以使用客户端流式 RPC，即客户端写入一系列消息，并以流的形式发送给服务器。客户端完成消息写入后，等待服务器读取这些消息并返回响应。


    ```

    rpc productUpdate(stream productUpdates) returns (ProdUpdateStatus) {

    }

    ```


    双向流式 RPC 允许双方通过读写流发送一系列消息。这两个流独立运行，因此客户端和服务器可以按任意顺序进行读写。例如，服务器可以等待接收完所有客户端消息后再写入响应，也可以交替读取一条消息再写入一条消息，或者采用其他读写组合方式。


    ```

    rpc productUpdate(stream productUpdates) returns (stream ProdUpdateStatuses){

    }

    ```


    gRPC 支持的认证机制包括 SSL/TLS 以及基于令牌的 Google 认证。


    #### 使用 gRPC 进行错误处理


    你还可以使用 gRPC 实现各种错误处理技术。如果发生错误，gRPC 会返回一个错误状态码，以及一个可选的字符串错误消息，用于提供错误的更多详细信息。


    REST 和 gRPC 是微服务实现中最常用的同步消息协议。不过，还有其他几种同步消息技术偶尔也会用于微服务实现。


    ### GraphQL


    RESTful 服务建立在资源概念之上，这些资源通过 HTTP 方法进行操作。当你开发的服务符合 REST 的基于资源的架构时，它能完美运行。但一旦偏离 RESTful
    风格，服务就无法达到预期效果。


    此外，在某些场景下，客户端需要同时从多个资源获取数据，这会导致通过多次服务调用来调用多个资源（或者总是发送包含冗余数据的大型响应）。


    GraphQL^(²⁶) 通过为 API 提供查询语言以及利用现有数据执行这些查询的运行时，解决了传统基于 REST 的服务中的此类问题。GraphQL 提供了对
    API 中数据的完整且易于理解的描述，赋予客户端精确获取所需数据（不多不少）的能力，使 API 更易于随时间演进，并支持强大的开发者工具。


    客户端可以向 API 发送 GraphQL 查询，并精确获取所需内容，客户端对其获取的数据拥有完全控制权。典型的 REST API 需要从多个 URL 加载数据，而基于
    GraphQL 的服务则能在单个请求中获取应用所需的所有数据。


    例如，你可以向基于 GraphQL 的服务发送以下查询：


    ```

    {

    hero {

    name

    }

    }

    ```


    并获取如下所示的结果：


    ```

    {

    "data": {

    "hero": {

    "name": "R2-D2"

    }

    }

    }

    ```


    查询的形状与结果完全相同，服务器确切知道客户端请求了哪些字段。


    GraphQL 服务器会公开一个描述 API 的 schema。这个 schema 由类型定义组成。每个类型都有一个或多个字段，每个字段接受零个或多个参数，并返回一个特定类型。一个
    GraphQL schema 的示例是关于一本书和书的作者。这里我们定义了 `Book` 和 `Author` 的类型，以及操作名称。在前面的示例中，我们使用了省略了
    `query` 关键字和查询名称的简写语法，但在生产应用中，包含这些内容有助于减少代码歧义。因此，在这个示例中，`query` 是操作类型，`latestBooks`
    是操作名称：


    ```

    type Book {

    isbn: ID

    title: String

    text: String

    category: String

    author: Author

    }

    type Author {

    id: ID

    name: String

    thumbnail: String

    books: [Book]

    }

    # 应用的根查询

    type Query {

    latestBooks(count: Int, offset: Int): [Book]!

    }

    # 应用的根变更

    type Mutation {

    addBook(id: String!, title: String!, text: String!, category: String, author:
    Author!) : Book!

    }

    ```


    操作类型是 `query`、`mutation` 或 `subscription`，它描述了你打算执行的操作类型。除非你使用查询简写语法（这种情况下无法为操作提供名称或变量定义），否则操作类型是必需的。


    每个 GraphQL 服务都有一个查询类型，并且可能有也可能没有变更类型。这些类型与常规对象类型相同，但它们很特殊，因为它们定义了每个 GraphQL 查询的入口点。与查询类似，你可以在
    `mutation` 类型上定义字段，这些字段可作为根变更字段，你可以在查询中调用它们。按照惯例，任何导致写入的操作都应通过变更显式发送。


    ### 动手试试


    你可以尝试第 4 章“开发服务”中的 GraphQL 服务示例。


    ### WebSockets


    WebSockets^(²⁷) 协议可以简单地理解为*基于 Web 的 TCP*。它可以被视为一种传输协议，是全双工且异步的。因此，你可以在 WebSockets
    之上叠加任何消息协议。


    WebSockets 协议使用单个 TCP 连接进行双向流量传输，并使用 HTTP 作为初始握手协议，以便与现有基础设施兼容。它在 TCP 之上进行初始握手，之后的行为类似于原始
    TCP 套接字。图 3-3 展示了使用 WebSockets 的客户端和服务器之间的交互。


    ![../images/461146_1_En_3_Chapter/461146_1_En_3_Fig3_HTML.jpg](img/461146_1_En_3_Fig3_HTML.jpg)


    图 3-3


    WebSockets 通信


    HTTP2 和 WebSockets 有不少相似之处，例如使用单个连接、双向消息传递、二进制消息等。但区别在于，WebSockets 允许你在其之上构建自己的消息协议（例如，你可以在
    WebSockets 之上构建 MQTT 或 AMQP）。WebSockets 架构由客户端和服务器之间打开的套接字组成，用于全双工（双向）通信。因此，如果你的微服务需要这种全双工通信以及通过
    Web 路由流量的能力，那么 WebSockets 是一个绝佳选择。


    ### Thrift


    Thrift^(²⁸) 允许你在一个简单的定义文件中定义数据类型和服务接口。与 gRPC 类似，编译器使用接口定义生成代码，用于轻松构建能够跨编程语言无缝通信的
    RPC 客户端和服务器。Thrift 使用 TCP 作为传输协议，以其极高的消息传递性能而闻名，但在某些互操作性需求方面有所欠缺，例如防火墙和负载均衡器，以及在开发服务时的易用性方面。

    '
- fmt: '# Asynchronous Communication


    In most of the early implementations of the microservices architecture, synchronous
    communication is being embraced as the de-facto inter-service communication style.
    However, asynchronous communication between microservices is getting increasingly
    popular as it makes services more autonomous.


    In asynchronous communication, the client does not wait for a response in a timely
    manner. The client may not receive a response at all or the response will be received
    asynchronously via a different channel.


    The asynchronous messaging between microservices is implemented with the use of
    a lightweight and dumb message broker. There is no business logic in the broker
    and it is a centralized entity with high-availability. There are two main types
    of asynchronous messaging styles—single receiver and multiple receivers.


    ## Single Receiver


    In single receiver mode, a given message is reliably delivered from a producer
    to exactly one consumer through a message broker (see Figure [3-4](#461146_1_En_3_Chapter.xhtml#Fig4)).
    Since this an asynchronous messaging style, the producer doesn’t wait for a response
    from the consumer nor during the time of producing the message, and the consumer
    may or may not be available. This is useful when sending asynchronous message-based
    commands from one microservice to the other. Given that microservices can be implemented
    using different technologies, we must implement reliable message delivery between
    the producer and consumer microservices in a technology-agnostic manner.


    ![../images/461146_1_En_3_Chapter/461146_1_En_3_Fig4_HTML.jpg](images/461146_1_En_3_Chapter/461146_1_En_3_Fig4_HTML.jpg)


    Figure 3-4


    Single receiver based asynchronous communication with AMQP


    The Advanced Message Queuing Protocol (AMQP) protocol is the most commonly used
    standard with single receiver-based communication.


    ### AMQP


    AMQP^([^(29)](#fn29)) is a messaging protocol that deals with publishers and consumers.
    The publishers produce the messages and the consumers pick them up and process
    them. It’s the job of the message broker to ensure that the messages from a publisher
    go to the right consumers. AMQP ensures reliability of message delivery, rapid
    and ensured delivery of messages, and message acknowledgements.


    Let’s take an example scenario from our online retail application use case. Suppose
    that the `Checkout` microservice places an order as an asynchronous command to
    the `Order Processing` microservice.


    We can use an AMQP message broker (such as `RabbitMQ`^([^(30)](#fn30)) or `ActiveMQ`^([^(31)](#fn31)))
    as the dumb messaging infrastructure and the `Checkout` microservice can produce
    a message to the specific queue in the broker. On an independent channel, the
    `Order Processing` microservice can subscribe to the queue as a consumer, and
    it receives messages in asynchronous fashion. For this use case, we can identify
    the following key components.


    *   *Message*: Content of data transferred, which includes the payload and message
    attributes.

    *   *AMQP Message Broker*: A central application that implements the AMQP protocol,
    which accepts connections from producers for message queuing and from consumers
    for consuming messages from queues.

    *   *Producer*: An application that puts messages in a queue.

    *   *Consumer*: An application that receives messages from queues.


    The producers may specify various message attributes, which can be useful to the
    broker or which only intend to be processed by the consuming microservice.


    Since networks are unreliable, the communication between the broker and microservices
    may fail to process messages. AMQP defines a concept called *message acknowledgements*,
    which is useful in implementing reliable delivery of the messages. When a message
    is delivered to a consumer, the consumer notifies the broker, either automatically
    or when the application code decides to do so. In message acknowledgements mode,
    the broker will only completely remove a message from a queue when it receives
    a notification for that message (or group of messages). Also, since we are using
    a queue, we can ensure the ordered delivery and processing of the messages. There
    is a set of reliability mechanisms introduced by AMQP.


    The failures can occur between the network interactions of broker, publisher,
    and consumer or the runtime of broker and client applications can fail.


    Acknowledgements allow the consumer to indicate to the server that it has received
    the message successfully. Similarly, the broker can use acknowledgements to inform
    the producer that it has successfully received the message (e.g., confirms in
    `RabbitMQ`). Therefore, an acknowledgement signals the receipt of a message and
    a transfer of ownership, whereby the receiver assumes full responsibility for
    it.


    AMQP 0-9-1 offers a *heartbeat* feature to ensure that the application layer promptly
    finds out about disrupted connections and completely unresponsive peers. Heartbeats
    also work with network equipment, which may terminate idle TCP connections.


    *   *Broker failures*: In order to handle broker failures, the AMQP standard defines
    a concept of durability for exchanges, queues, and persistent messages, requiring
    that a durable object or persistent message survive a restart. Enable clustering
    for the broker that you are using.

    *   *Producer failures*: When producing messages to the broker, the producers
    should retransmit any messages for which an acknowledgement has not been received
    from the broker. There is a possibility of message duplication here, because the
    broker might have sent a confirmation that never reached the producer (due to
    network failures, etc.). Therefore, consumer applications will need to perform
    de-duplication or handle incoming messages in an idempotent manner (i.e. internal
    state doesn’t change even if we process the same message multiple times).


    In the event of network failure (or a runtime crashing), messages can be duplicated,
    and consumers must be prepared to handle them. If possible, the simplest way to
    handle this is to ensure that your consumers handle messages in an idempotent
    way rather than explicitly deal with de-duplication.


    In failure conditions, when a message cannot be routed, messages may be returned
    to publishers, dropped, or, if the broker implements an extension, placed into
    a so-called “dead letter queue”. Publishers can decide how to handle such situations
    by publishing messages using certain parameters.


    There are several open source message broker solutions out there and `RabbitMQ`
    could possibly be the most popular and widely used one. `Apache ActiveMQ`, `ActiveMQ
    Artemis`, and `Apache Qpid` are also popular.


    There are multiple versions of the AMQP specification and v0-9-1 is the most commonly
    used one. The latest version is 1.0, which is yet to be fully adopted across the
    industry. From the microservices architecture perspective, we don''t have to learn
    the details of the AMQP protocol; having a foundation level knowledge of the capabilities
    and messaging patterns it offers will be sufficient. AMQP also defines other message
    exchanging styles than single receiver-based exchanging, such as fan-out, topic,
    and header-based exchanging.


    ### Important


    AMQP message brokers are usually developed as monolithic runtimes and are not
    intended to be used only in the microservices architecture. Hence, most brokers
    come with various features that allow you to put business logic inside the broker
    (such as routing). So, we have to be extra cautious when using these brokers and
    we must only use them as dumb brokers. All the asynchronous messaging smarts should
    lie on our service logic only.


    We discuss a development use case similar to the one described here in Chapter
    [4](#461146_1_En_4_Chapter.xhtml).'
