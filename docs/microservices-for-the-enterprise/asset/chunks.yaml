    ## 使用 Kafka 的事件驱动微服务


    在第 3 章中，我们讨论了事件驱动微服务和 Kafka 的基础知识。在本节中，我们将了解一个微服务如何通过异步消息与另一个微服务通信。按照我们在第 2 章中提出的设计，`Order
    Processing` 微服务（`sample07`）在处理完订单后向 Kafka 发布一个事件，而 `Billing`（`sample08`）微服务监听同一个事件，消费该消息，并在计费完成后向
    Kafka 发布另一个事件。`sample07` 或 `Order Processing` 微服务充当事件发布者（或事件源），而 `sample08` 或
    `Billing` 微服务充当事件消费者（或事件接收器）。这两个微服务的源代码位于 `ch04/sample07` 和 `ch04/sample08` 目录下。图
    4-4 展示了微服务与消息代理（Kafka）之间的交互。


    ![../images/461146_1_En_4_Chapter/461146_1_En_4_Fig4_HTML.jpg](img/461146_1_En_4_Fig4_HTML.jpg)


    图 4-4


    使用 Kafka 的事件驱动微服务


    ### 设置 Kafka 消息代理


    在本节中，我们将讨论如何设置 Kafka 消息代理。关于生产环境部署的建议，请始终参考 Kafka 官方文档^(⁷⁹)。


    首先，我们需要下载最新的 Kafka 发行版。对于本书中的示例，我们使用的是 2.11-1.1 版本。下载并解压 Kafka 发行版后，你可以运行以下命令来启动
    ZooKeeper^(⁸⁰)。Kafka 使用 ZooKeeper，因此如果你还没有 ZooKeeper 服务器，需要先启动一个。你可以使用 Kafka 附带的便捷脚本来快速搭建一个单节点
    ZooKeeper 实例。


    ```

    \> cd kafka_2.11-1.1.0

    \> bin/zookeeper-server-start.sh config/zookeeper.propertie

    ```


    现在，我们可以在另一个控制台中使用以下命令来启动 Kafka 服务器。


    ```

    \> cd kafka_2.11-1.1.0

    \> bin/kafka-server-start.sh config/server.properties

    ```


    对于我们的用例，我们需要两个主题：`ORDER_PROCESSING_COMPLETED` 和 `PAYMENT_PROCESSING_COMPLETED`。让我们使用以下命令创建这些主题。


    ```

    \> cd kafka_2.11-1.1.0

    \> bin/kafka-topics.sh --create --zookeeper localhost:2181 --replication-factor
    1 --partitions 1 --topic ORDER_PROCESSING_COMPLETED

    Created topic "ORDER_PROCESSING_COMPLETED"

    \> bin/kafka-topics.sh --create --zookeeper localhost:2181 --replication-factor
    1 --partitions 1 --topic PAYMENT_PROCESSING_COMPLETED

    Created topic "PAYMENT_PROCESSING_COMPLETED"

    ```


    你可以使用以下命令查看消息代理中所有可用的主题。


    ```

    \> cd kafka_2.11-1.1.0

    \> bin/kafka-topics.sh --list --zookeeper localhost:2181

    ORDER_PROCESSING_COMPLETED

    PAYMENT_PROCESSING_COMPLETED

    ```


    ### 构建发布者（事件源）


