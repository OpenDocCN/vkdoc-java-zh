    The user context from one microservice to another can be passed along with a JWS
    (see Figure [11-7](#461146_1_En_11_Chapter.xhtml#Fig7)). Since a key known to
    the calling microservice signs the JWS, it will carry both the end user identity
    (as claimed in the JWT) and the identity of the calling microservice (via the
    signature). In other words, the calling microservice itself is the issuer of the
    JWS. To accept the JWS, the recipient microservice first needs to validate the
    signature of the JWS against the public key embedded in the JWS itself or retrieved
    via any other mechanism. That’s not just enough — then it needs to check whether
    it can trust that key or not. Trust between microservices can be established in
    multiple ways. One way is to provision the trusted certificates, by service, to
    each microservice. It’s a no brainer to realize that this would not scale in a
    microservices deployment. The approach we would like to suggest is to build a
    private certificate authority (CA) and use intermediate certificate authorities
    by different microservices teams, if the need arises. Now, rather than trusting
    every individual certificate, the recipient microservices will only trust either
    the root certificate authority or an intermediary. That will vastly reduce the
    overhead in certificate provisioning.


    ### Note


    Trust bootstrap is a harder problem to solve. The Secure Production Identity Framework
    For Everyone (SPIFFE)^([^(147)](#fn147)) project builds an interesting solution
    around this, which can be used to bootstrap trust between different nodes in a
    microservices deployment. With SPIFFE, each node will get an identifier and a
    key pair, which can be used to authenticate to other nodes it communicates with.


    ![../images/461146_1_En_11_Chapter/461146_1_En_11_Fig7_HTML.jpg](images/461146_1_En_11_Chapter/461146_1_En_11_Fig7_HTML.jpg)


    Figure 11-7


    Passing user context as a JWT between microservices


    In the JWT, the public key corresponding to the key used to sign the token represents
    the caller (or the calling microservice). How does the recipient microservice
    find the end user information? The JWT carries a parameter called `sub` in its
    claim set, which represents the subject or the user who owns the JWT. If any microservice
    needs to identify the user during its operations, this is the attribute it should
    look into. The value of the `sub` attribute is unique only for a given issuer.
    If you have a microservice, which accepts tokens from multiple issuers, then the
    uniqueness of the user should be decided as a combination of the issuer and the
    `sub` attribute. In addition to the subject identifier, the JWT can also carry
    user attributes such as first_name, last_name, email, and so on.


    ### Note


    When we pass user context between microservices via a JWT, each microservice has
    to bear the cost of JWT validation, which also includes a cryptographic operation
    to validate the token signature. Caching the JWT at the microservices level against
    the data extracted out of it would reduce the impact of repetitive token validation.
    The cache expiration time must match the JWT expiration time. Once again, the
    impact of caching would be quite low if the JWT expiration time is quite low.


    When issuing a JWT from a token issuer, it has to be issued to a given audience.
    The audience is the consumer of the token. For example, if the microservice `foo`
    wants to talk to the microservice `bar`, then the token is issued by `foo` (or
    a third party issuer), and the audience of the token is `bar`. The `aud` parameter
    in the JWT claim set specifies the intended audience of the token. It can be a
    single recipient or a set of recipients. Prior to any validation check, the token
    recipient must first see whether the particular JWT is issued for its use. If
    not, it should reject it immediately. The token issuer should know, prior to issuing
    the token, who the intended recipient (or the recipients) of the token is. The
    value of the `aud` parameter must be a pre-agreed value between the token issuer
    and the recipients. In a microservices environment, we can use a regular expression
    to validate the audience of the token. For example, the value of the `aud` in
    the token can be `*.facilelogin.com`, while each recipient under the `facilelogin.com`
    domain can have its own `aud` values: `foo.facilelogin.com`, `bar.facilelogin.com`,
    and so on.


    ### Transport Layer Security (TLS) Mutual Authentication


    Transport Layer Security (TLS) mutual authentication, also known as client authentication
    or two-way Secure Socket Layer (SSL), is part of the TLS handshake process. In
    one-way TLS, only the server proves its identity to the client; this is mostly
    used in e-commerce to win consumer confidence by guaranteeing the legitimacy of
    the e-commerce vendor. In contrast, mutual authentication authenticates both parties—the
    client and the server. In a microservices environment, TLS mutual authentication
    can be used between microservices to authenticate each other.


    Both in TLS mutual authentication and with the JWT-based approach, each microservice
    needs to have its own certificates. The difference between the two approaches
    is that, in JWT-based authentication, the JWS can carry the end user identity
    as well as the upstream service identity. With TLS mutual authentication, the
    end user identity has to be passed at the application level—probably as an HTTP
    header.'
  trans: '

    #### 传播信任与用户身份


    微服务间的用户上下文可通过 JWS 传递（见图 11-7）。由于 JWS 由调用方微服务已知的密钥签名，因此它将同时携带最终用户身份（如 JWT 中所声明）和调用方微服务的身份（通过签名）。换句话说，调用方微服务本身就是
    JWS 的签发者。要接受该 JWS，接收方微服务首先需要根据 JWS 中嵌入的或通过其他机制检索到的公钥来验证 JWS 签名。但这还不够——随后它需要检查是否能够信任该密钥。微服务之间的信任可以通过多种方式建立。一种方法是按服务向每个微服务预置受信任的证书。显而易见，这种方式在微服务部署中无法扩展。我们建议的方法是构建一个私有证书颁发机构（CA），并在需要时由不同微服务团队使用中间证书颁发机构。这样，接收方微服务不再信任每个单独的证书，而只信任根证书颁发机构或中间证书颁发机构。这将大大减少证书预置的开销。


    ### 注意


    信任引导是一个更难解决的问题。安全生产身份框架（SPIFFE）^(¹⁴⁷)项目围绕此问题构建了一个有趣的解决方案，可用于在微服务部署中引导不同节点之间的信任。通过
    SPIFFE，每个节点将获得一个标识符和一个密钥对，可用于向与其通信的其他节点进行身份验证。


    ![../images/461146_1_En_11_Chapter/461146_1_En_11_Fig7_HTML.jpg](img/461146_1_En_11_Fig7_HTML.jpg)


    图 11-7


    在微服务之间以 JWT 形式传递用户上下文


    在 JWT 中，与用于签署令牌的密钥相对应的公钥代表调用者（或调用方微服务）。接收方微服务如何找到最终用户信息？JWT 在其声明集中携带一个名为 `sub`
    的参数，该参数代表 JWT 的主体或拥有该 JWT 的用户。如果任何微服务需要在其操作过程中识别用户，这就是它应该查看的属性。`sub` 属性的值仅对给定的签发者是唯一的。如果你有一个接受来自多个签发者令牌的微服务，那么用户的唯一性应由签发者和
    `sub` 属性的组合来决定。除了主体标识符之外，JWT 还可以携带用户属性，例如 first_name、last_name、email 等。


    ### 注意


    当我们通过 JWT 在微服务之间传递用户上下文时，每个微服务都必须承担 JWT 验证的成本，其中还包括用于验证令牌签名的加密操作。在微服务层面对 JWT 及其提取的数据进行缓存，可以减少重复令牌验证的影响。缓存过期时间必须与
    JWT 过期时间匹配。同样，如果 JWT 过期时间很短，缓存的影响将会很小。


    当从令牌签发者签发 JWT 时，必须将其签发给特定的受众。受众是令牌的消费者。例如，如果微服务 `foo` 想要与微服务 `bar` 通信，那么令牌由 `foo`（或第三方签发者）签发，令牌的受众是
    `bar`。JWT 声明集中的 `aud` 参数指定了令牌的预期受众。它可以是一个接收者或一组接收者。在任何验证检查之前，令牌接收者必须首先查看该特定 JWT
    是否是为其使用而签发的。如果不是，应立即拒绝。令牌签发者在签发令牌之前，应该知道令牌的预期接收者（或接收者们）是谁。`aud` 参数的值必须是令牌签发者和接收者之间预先约定的值。在微服务环境中，我们可以使用正则表达式来验证令牌的受众。例如，令牌中
    `aud` 的值可以是 `*.facilelogin.com`，而 `facilelogin.com` 域下的每个接收者可以有自己的 `aud` 值：`foo.facilelogin.com`、`bar.facilelogin.com`
    等。


    ### 传输层安全（TLS）双向认证


    传输层安全（TLS）双向认证，也称为客户端认证或双向安全套接层（SSL），是 TLS 握手过程的一部分。在单向 TLS 中，只有服务器向客户端证明其身份；这主要用于电子商务中，通过保证电子商务供应商的合法性来赢得消费者信心。相比之下，双向认证对双方——客户端和服务器——都进行身份验证。在微服务环境中，TLS
    双向认证可用于微服务之间相互进行身份验证。


    在 TLS 双向认证和基于 JWT 的方法中，每个微服务都需要拥有自己的证书。这两种方法的区别在于，在基于 JWT 的认证中，JWS 可以携带最终用户身份以及上游服务身份。而使用
    TLS 双向认证时，最终用户身份必须在应用层传递——可能作为 HTTP 头传递。

    '
- fmt: '### Certificate Revocation


    Both in TLS mutual authentication and with the JWT based approach, the certificate
    revocation is bit tricky. It is a harder problem to solve — though there are multiple
    options available: `CRL` (Certification Revocation List/RFC 2459), `OCSP` (Online
    Certificate Status Protocol / RFC 2560), `OCSP Stapling` (RFC 6066), and `OCSP
    Stapling Required`.


    With `CRL`, the certificate authority (`CA`) has to maintain a list of revoked
    certificates. The client who initiates the TLS handshake has to get the long list
    of revoked certificates from the corresponding certificate authority and then
    check whether the server certificate is in the revoked certificate list. Instead
    of doing that for each request, the client can cache the `CRL` locally. Then you
    run into the problem that the security decisions are made based on stale data.
    When TLS mutual authentication is used, the server also has to do the same certificate
    verification against the client. The `CRL` is a not more often used technique.
    Eventually people recognized that `CRL`s are not going to work and started building
    something new, which is the `OCSP`.


    In the `OCSP` world, the things are little bit better than `CRL`. The TLS client
    can check the status of a specific certificate without downloading the whole list
    of revoked certificates from the certificate authority. In other words, each time
    the client talks to a new downstream microservice, it has to talk to the corresponding
    `OCSP` responder to validate the status of the server (or the service) certificate
    — and the server has to do the same against the client certificate. That creates
    some extensive traffic on the `OCSP` responder. Once again clients still can cache
    the `OCSP` decision, but then again it will lead to the same old problem of making
    decisions on stale data.


    With `OCSP stapling`, the client does not need to go to the `OCSP` responder each
    time it talks to a downstream microservice. The downstream microservice will get
    the `OCSP` response from the corresponding `OCSP` responder and staple or attach
    the response to the certificate. Since the corresponding certificate authority
    signs the `OCSP` response, the client can accept it by validating the signature.
    This makes things little better. Instead of the client, the service has to talk
    to the `OCSP` responder. But in a mutual TLS authentication model, this won’t
    bring any additional benefits when compared to the plain `OCSP`.


    With `OCSP must stapling`, the service (downstream microservice) gives a guarantee
    to the client (upstream microservice) that the `OCSP` response is attached to
    the service certificate it receives during the TLS handshake. In case the `OCSP`
    response is not attached to the certificate, rather than doing a soft failure,
    the client must immediately reject the connection.


    ### Short-Lived Certificates


    From the end user perspective the short-lived certificates behave the same way
    as the normal certificates work today, they just have a very short expiration.
    The TLS client needs not to worry about doing `CRL` or `OCSP` validations against
    short-lived certificates and rather sticks to the expiration time, stamped on
    the certificate itself.


    The challenge in short-lived certificates mostly lies in their deployment and
    maintenance. Automation is the goddess of rescue! Netflix suggests using a layered
    approach (see Figure 11-8) to build a short-lived certificate deployment. You
    would have a system identity or long-lived credential that resides in a `TPM`
    (Trusted Platform Module) or an `SGX` (Software Guard Extension) having lot of
    security on it. Then use that credential to get a short-lived certificate. Then
    use the short-lived certificate for your microservice, which would be consumed
    by another microservice. Each microservice can refresh the short-lived certificates
    regularly using its long-lived credentials. Having the short-lived certificate
    is not enough — the underlying platform, which hosts the service (or the TLS terminator),
    should support dynamic updates to the server certificate. A lot of TLS terminators
    out there support dynamically reloading the server certificates, but not with
    zero downtime in most cases.


    ![../images/461146_1_En_11_Chapter/461146_1_En_11_Fig8_HTML.jpg](images/461146_1_En_11_Chapter/461146_1_En_11_Fig8_HTML.jpg)


    Figure 11-8: How Netflix uses short-lived certificates


    ## The Edge Security


    In Chapter 7, “Integrating Microservices” and Chapter 10, “APIs, Events, and Streams,”
    we discussed different techniques for exposing microservices to the rest of the
    world. One common approach discussed there was to use the *API gateway* pattern.
    With the API gateway pattern (see Figure 11-9) — the microservices, which need
    to be exposed outside, would have a corresponding API in the API gateway. Not
    all the microservices need to be exposed from the API gateway.


    The end user’s access to the microservices (via an API) should be validated at
    the edge — or at the API gateway. The most common way of securing APIs is `OAuth
    2.0`. Over time, `OAuth 2.0` has become the de-facto standard for API security.


    ![../images/461146_1_En_11_Chapter/461146_1_En_11_Fig9_HTML.jpg](images/461146_1_En_11_Chapter/461146_1_En_11_Fig9_HTML.jpg)


    Figure 11-9: The API gateway pattern


    ### OAuth 2.0


    `OAuth 2.0` is a framework for access delegation. It lets someone do something
    on behalf of someone else. There are four main characters in an `OAuth 2.0` flow:
    the client, the authorization server, the resource server, and the resource owner.
    Let’s say you build a web application that lets users export their Flickr photos
    into it. In that case, your web application has to access the Flickr API to export
    photos on behalf of the users who actually own the photos. There the web application
    is the `OAuth 2.0` client, Flickr is the resource server (which holds its users’
    photos), and the Flickr user who wants to export photos to the web application
    is the resource owner. For your application to access Flickr API on behalf of
    the Flickr user, it needs some sort of an authorization grant. The authorization
    server issues the authorization grant, and in this case it’ll be Flickr itself.
    But, in practice there can be many cases where the authorization server and the
    resource server are two different entities. `OAuth 2.0` does not couple those
    two together.


    ### Note


    An `OAuth 2.0` client can be a web application, a native mobile application, a
    single page application, or even a desktop application. Whoever the client is,
    it should be known to the authorization server. Each `OAuth` client has an identifier,
    which is known as a *client ID*, given to it by the authorization server. Whenever
    a client communicates with authorization server, it has to pass its `client ID`.
    In some cases, client has to use some kind of credentials to prove who it is.
    The most popular form of credentials is the *client secret*. It is like a password.
    But it is always recommended that `OAuth` clients use stronger credentials, like
    certificates or `JWT`s.


    `OAuth 2.0` introduces multiple grant types. A grant type in `OAuth 2.0` explains
    the protocol; the client should get the resource owner’s consent to access a resource
    on his behalf. Also, there are some grant types that define a protocol to get
    a token, just on behalf of himself (`client_credentials`) — in other words, the
    client is also the resource owner. Figure 11-10 illustrates `OAuth 2.0` protocol
    at a very high-level. It describes the interactions between the `OAuth` client,
    the resource owner, the authorization server, and the resource server.'
