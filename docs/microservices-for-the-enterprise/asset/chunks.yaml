- fmt: '# Introduction to Open Tracing


    Distributed tracing becomes quite tricky when different microservices in the same
    microservices deployment use different tracing modules. For example, the `Order
    Processing` microservice may use Sleuth to generate spans and traces, while the
    `Inventory` microservice uses another module. Both can publish the traced data
    to Zipkin, but unless both the modules share the same definition for spans and
    traces, and respect the traced data generated from the each other, this information
    will be useless. This forces developers to use the same tracing modules in all
    the microservices, which is sort of a violation of the polyglot architecture,
    which we proudly talk about with respect to microservices. *Open tracing* is an
    initiative to address this concern by building an open standard. It precisely
    defines what’s a span and what’s a trace under the open tracing data model.


    Open tracing has to work across multiple programming languages. At the time of
    this writing, it defines language-level APIs for nine programming languages: Go,
    Python, JavaScript, Java, C#, Objective-C, C++, Ruby, and PHP. There are several
    implementations of these APIs already. Jaeger, the open source distributed tracing
    system developed by Uber, has support for open tracing and includes open tracing
    client libraries for several programming languages: Java, Go, Python, Node.js,
    C++, and C#.


    ## Distributed Tracing with Open Tracing Using Spring Boot Microservices and Zipkin


    Zipkin has support for open tracing, but not the Sleuth. You can think about Sleuth
    as the tracing client, while Zipkin is the server that collects all the traced
    data. In the examples we discussed in previous sections, Sleuth was used as a
    tracing client for Zipkin, and it used a Zipkin specific format, which won’t work
    with open tracing. In this section, we see how to publish traced data from a Spring
    Boot microservice, which is compatible with open tracing. The source code related
    to this example is available in the `ch13/sample03` directory.


    Let’s look at some of the notable Maven dependencies added to the `ch13/sample03/pom.xml`
    file. The `opentracing-spring-cloud-starter` and `opentracing-spring-zipkin-starter`
    dependencies bring in all the dependencies required to publish open tracing compatible
    tracing information to Zipkin.


    ```

    io.opentracing.contrib

    opentracing-spring-cloud-starter

    0.1.13


    io.opentracing.contrib

    opentracing-spring-zipkin-starter

    0.1.1

    ```


    Assuming you are still running the Zipkin node from the previous section, add
    the `opentracing.zipkin.http-sender.baseUrl` property to the `application.properties`
    file, which carries the server URL of the Zipkin server.


    ```

    opentracing.zipkin.http-sender.baseUrl=http://localhost:9411/

    ```


    Now, let’s run the `Order Processing` microservice and invoke it with the following
    cURL command (run from the `ch13/sample03` directory). Do it a few times and observe
    the data recorded at Zipkin via its web console running at `http://localhost:9411/zipkin/`.


    ```

    \> mvn clean install

    \> mvn spring-boot:run

    \> curl http://localhost:9000/order/11

    ```


    ## Distributed Tracing with Open Tracing Using Spring Boot Microservices and Jaeger


    In the previous section we explained how to publish open tracing compatible traces
    to Zipkin. Since it’s open tracing, not just Zipkin, any other product supporting
    open tracing should accept it. In this section, we see how to publish traced data
    from a Spring Boot microservice to Jaeger, which is compatible with open tracing
    (see Figure 13-9). Jaeger is another open source distributed tracing system inspired
    by Zipkin and Dapper and developed by Uber. The source code related to this example
    is available in the `ch13/sample04` directory. We can spin up a Jaeger Docker
    instance with the following command, which will start running on HTTP port 16686
    and UDP port 5775. After it starts, we can access its web console via `http://localhost:16686/`.


    ![../images/461146_1_En_13_Chapter/461146_1_En_13_Fig9_HTML.jpg](images/461146_1_En_13_Chapter/461146_1_En_13_Fig9_HTML.jpg)


    Figure 13-9 Jaeger web console


    ```

    \> docker run -d -p 5775:5775/udp -p 16686:16686 jaegertracing/all-in-one:latest

    ```


    ### Note


    A comprehensive introduction to Jaeger is out of the scope of this book, and we
    recommend readers looking for details to refer to the Jaeger documentation available
    at [https://www.jaegertracing.io/docs/](https://www.jaegertracing.io/docs/).


    Let’s look at some of the notable Maven dependencies added to the `ch13/sample04/pom.xml`
    file. The `opentracing-spring-cloud-starter` and `opentracing-spring-cloud-starter-jaeger`
    dependencies bring all the dependencies required to publish open tracing-compatible
    tracing information to Jaeger.


    ```

    io.opentracing.contrib

    opentracing-spring-cloud-starter

    0.1.13


    io.opentracing.contrib

    opentracing-spring-cloud-starter-jaeger

    0.1.13

    ```


    From our Spring Boot microservice we use UDP port 5775 to connect to the Jaeger
    server to publish traces. We need to add the `opentracing.jaeger.udp-sender.host`
    and `opentracing.jaeger.udp-sender.port` properties to the `application.properties`
    file.


    ```

    opentracing.jaeger.udp-sender.host=localhost

    opentracing.jaeger.udp-sender.port=5775

    ```


    Now, let’s run the `Order Processing` microservice and invoke it with the following
    cURL command (run from the `ch13/sample04` directory). Do it a few times and observe
    the data recorded under Jaeger via its web console running at `http://localhost:16686/`.


    ```

    \> mvn clean install

    \> mvn spring-boot:run

    \> curl http://localhost:9000/order/11

    ```


    ## Metrics with Prometheus


    Prometheus is an open source system for monitoring and alerting. In this section,
    we see how to use Prometheus to monitor a microservices deployment. The way it
    works is that all of your microservices will expose their own endpoints to expose
    their metrics outside and Prometheus will periodically poll those endpoints (see
    Figure 13-10).


    ### Note


    A comprehensive introduction to Prometheus is out of the scope of this book, and
    we recommend readers looking for details to refer to the Prometheus documentation
    available at [https://prometheus.io/](https://prometheus.io/).


    ![../images/461146_1_En_13_Chapter/461146_1_En_13_Fig10_HTML.jpg](images/461146_1_En_13_Chapter/461146_1_En_13_Fig10_HTML.jpg)


    Figure 13-10 Prometheus pulls traced data from the connected microservices'
