  trans: '

    # 8. 部署与运行微服务


    微服务架构的两大主要目标是快速上线和应用的演进能力。与单体应用不同，微服务的部署包含众多独立部署的个体。我们不再面对单一部署，而是成百上千个部署。如果没有自动化构建系统，管理这样的部署将是一场噩梦。自动化构建系统有助于简化部署流程，但无法解决大规模部署中的所有问题。我们还需要关注微服务及其所有依赖项的可移植性，确保开发者测试的环境与测试环境和生产环境保持一致。这有助于在开发周期早期发现任何问题，从而将生产环境中出现问题的可能性降至最低。本章将讨论不同的微服务部署模式、容器、容器编排、容器原生微服务框架，最后介绍持续交付。


    ## 容器与微服务


    容器的主要目标是为其运行的应用程序提供容器化环境。容器化环境是一种隔离环境。一个或多个容器可以运行在同一台物理主机上，但一个容器无法感知其他容器中运行的进程。例如，如果你在容器中运行微服务，它拥有自己独立的文件系统、网络接口、进程和主机名视图。假设一个名为
    *foo* 的微服务运行在 *foo* 容器中，它可以通过主机名 *localhost* 引用同一容器中的任何其他服务；而另一个名为 *bar* 的微服务运行在
    *bar* 容器中，同样可以通过主机名 *localhost* 引用同一容器中的任何其他服务，尽管 *foo* 和 *bar* 容器都运行在同一台主机上^(¹⁰⁴)。


    容器的概念在几年前因 Docker 而流行起来，但它有着悠久的历史。1979 年，UNIX V7 引入了 `chroot` 系统调用，用户能够更改运行进程的根目录，使其无法访问根目录之外的文件系统任何部分。1982
    年，该功能被添加到 BSD 中，时至今日，`chroot` 仍被系统管理员视为在非容器化环境中运行任何进程时的最佳实践。二十多年后的 2000 年，FreeBSD
    引入了一个名为 FreeBSD Jails 的新概念。通过 Jails，同一主机环境可以被划分为多个隔离环境，每个环境可以拥有自己的 IP 地址。2001
    年，Linux VServer 引入了类似 FreeBSD Jails 的概念。通过 Linux VServer，主机环境可以按文件系统、网络和内存进行分区。Sun
    公司在 2004 年推出了 Solaris Containers，引入了另一种进程隔离的变体。谷歌在 2006 年推出了 Process Containers，旨在对
    CPU、磁盘 I/O、内存和网络进行隔离。一年后，该技术更名为控制组（control groups），并合并到 Linux 内核 2.6.24 中。


    Linux 的 *cgroups* 和 *namespaces* 是我们今天所看到的容器的基础。2008 年，LXC（Linux Containers）利用
    cgroups 和 namespaces 实现了 Linux 容器管理器。2011 年，CloudFoundry 推出了基于 LXC 的容器实现，名为 Warden，但后来改为自己的实现。Docker
    诞生于 2013 年，与 Warden 一样，它也是基于 LXC 构建的。Docker 使容器技术变得更加易用，在接下来的章节中，我们将详细讨论 Docker。


    ### Docker 简介


    如前所述，Docker 提供的容器化技术建立在 Linux 控制组和命名空间之上。Linux 命名空间通过让每个进程拥有独立的系统视图（包括文件、进程、网络接口、主机名等）来构建隔离。控制组（也称为
    *cgroups*）则限制每个进程可以消耗的资源数量。这两者的结合可以在同一台主机上构建一个隔离环境，共享相同的 CPU、内存、网络和文件系统，而互不影响。


    Docker 引入的隔离级别与我们在虚拟机中看到的截然不同。在 Docker 流行之前，虚拟机被用来复制相似的操作环境及其所有依赖项。如果你真的做过这件事，大概能体会到其中的痛苦！虚拟机镜像非常庞大。它打包了从操作系统到应用级二进制依赖项的所有内容。可移植性是一个主要问题。图
    8-1 展示了虚拟机如何创建隔离。


    ![../images/461146_1_En_8_Chapter/461146_1_En_8_Fig1_HTML.jpg](img/461146_1_En_8_Fig1_HTML.jpg)


    图 8-1


    使用类型 2 虚拟机监控程序的高级虚拟机架构


    虚拟机运行在虚拟机监控程序上。虚拟机监控程序有两种类型。类型 1 虚拟机监控程序不需要宿主操作系统，而类型 2 虚拟机监控程序则运行在宿主操作系统之上。每个虚拟机都自带自己的操作系统。要在同一台宿主操作系统上运行多个虚拟机，你需要一台性能强大、配置高的计算机。为每个微服务使用一个虚拟机来构建隔离环境，既大材小用又浪费资源。如果你熟悉虚拟机，可以将容器视为轻量级的虚拟机。每个容器都提供一个隔离环境，但它们与宿主机共享相同的操作系统内核。图
    8-2 展示了容器如何创建隔离。


    ![../images/461146_1_En_8_Chapter/461146_1_En_8_Fig2_HTML.jpg](img/461146_1_En_8_Fig2_HTML.jpg)


    图 8-2


    在同一台宿主操作系统上运行多个容器


    与虚拟机不同，部署在同一台宿主机上的所有容器共享相同的操作系统内核。它实际上是一个隔离的进程。启动一个容器时，无需承担启动操作系统的开销；只需运行容器内的应用程序即可。此外，由于容器不打包操作系统，你可以在同一台宿主机上运行许多容器。这些是选择容器作为部署和分发微服务最流行方式的关键驱动力。


    Docker 在 Linux 内核自带的控制组和命名空间之上构建了进程隔离。即使没有 Docker，我们仍然可以使用 Linux 内核实现同样的功能。那么，为什么
    Docker 会成为最流行的容器技术呢？除了进程隔离之外，Docker 还增加了若干新特性，使其对开发者社区更具吸引力。这些特性包括：使容器可移植、围绕 Docker
    Hub 构建生态系统、提供用于容器管理的 API 并围绕其构建工具、以及使容器镜像可复用。本章将详细讨论这些特性。

    '
- fmt: '## Installing Docker


    Docker follows a client-server architecture model, where you have a Docker client
    and a Docker host (which is also known as the *Docker Engine*). When you install
    Docker locally in your machine, you will get both the client and the host installed.
    All the instructions on how to install Docker based on your platform are available
    from the Docker website^([^(105)](#fn105)). At the time of writing the book, Docker
    is available on MacOS, Windows, CentOS, Debian, Fedora, and Ubuntu. The following
    command will help to test the Docker installation. If the installation is successful,
    this will return the related system information.


    ```

    :\> docker info

    ```


    The following command will also return the versions related to the Docker client
    and the engine.


    ```

    :\> docker version

    Client:

    Version: 18.03.1-ce

    API version: 1.37

    Go version: go1.9.5

    Git commit: 9ee9f40

    Built: Thu Apr 26 07:13:02 2018

    OS/Arch: darwin/amd64

    Experimental: false

    Orchestrator: swarm

    Server:

    Engine:

    Version: 18.03.1-ce

    API version: 1.37 (minimum version 1.08)

    Go version: go1.9.5

    Git commit: 9ee9f40

    Built: Thu Apr 26 07:22:38 2018

    OS/Arch: linux/amd64

    Experimental: true

    ```


    ## Docker Architecture


    Figure [8-3](#461146_1_En_8_Chapter.xhtml#Fig3) shows the high-level Docker architecture
    where we have the Docker client, Docker host, or the engine and the registry.
    The Docker client is the command-line tool that we are going to interact with.
    The Docker Daemon running on the Docker host listens to the requests coming from
    the client and acts accordingly. The client can communicate with the daemon using
    a REST API, over UNIX sockets, or a network interface. In the following sections,
    we explain how exactly the communication happens and the sequence of events.


    ![../images/461146_1_En_8_Chapter/461146_1_En_8_Fig3_HTML.jpg](images/461146_1_En_8_Chapter/461146_1_En_8_Fig3_HTML.jpg)


    Figure 8-3


    High-level Docker architecture


    ## Docker Images


    A Docker image is a package that includes your microservice (or your application)
    along with all its dependencies. Your application will see only the dependencies
    that you pack in your Docker image. You define the filesystem for your image,
    and it will not have access to the host filesystem. A Docker image is created
    using a Dockerfile. The Dockerfile defines all the dependencies to build a Docker
    image.


    ### Note


    For readers who are keen on exploring more on Docker concepts, we recommend following
    the Docker documentation^([^(106)](#fn106)).


    The following code shows the contents from a sample Dockerfile. The first line
    says start building this new image using the base image called `openjdk:8-jdk-alpine`.
    When we build the Docker image from this Dockerfile with the tooling provided
    by Docker, it first loads the `openjdk:8-jdk-alpine` image. First the Docker engine
    will see whether the image is in the local registry of images, and if not, it
    will load from a remote registry (for example, the Docker Hub). Also, if the `openjdk:8-jdk-alpine`
    image has dependencies on other Docker images, those will also be pulled and stored
    in the local registry.


    ```

    FROM openjdk:8-jdk-alpine

    ADD target/sample01-1.0.0.jar /sample01-1.0.0.jar

    ENTRYPOINT ["java", "-jar", "sample01-1.0.0.jar"]

    ```


    The second line says to copy `sample01-1.0.0.jar` from the `target` directory
    under the current location of the filesystem (this is in fact our host filesystem,
    which we use to create a Docker image) to the root of the filesystem of the image
    we want to create. The third line defines the entry point or the command to execute
    when someone runs this Docker image.


    To build a Docker image from a Dockerfile, we use the following command. We go
    through this later in the chapter, so you do not need to try it out now. This
    command will produce a Docker image and, by default, it will be stored in the
    local image registry. This is in fact the Docker client. Once we execute the command,
    the Docker daemon running on the Docker engine will make sure all the dependent
    images are loaded locally and the new image is created.


    ```

    :\> docker build -t sample01 .

    ```


    ## Docker Registry


    If you are familiar with Maven, you may already know how Maven repositories work.
    The Docker registries follow a similar concept. A Docker registry is a repository
    of Docker images. They operate at different levels. The Docker Hub is a public
    Docker registry where anyone can push and pull images. Later in the chapter, we
    explain how to publish and retrieve images to and from the Docker Hub. Having
    a centralized registry of all the images helps you share and reuse them. It is
    also becoming a popular way of distributing software. If your organization needs
    a restricted Docker registry just for its employees, that can be done too.


    The following command will list all the Docker images stored in your local machine.
    This will include all the images you built locally as well as pulled from a Docker
    registry.


    ```

    :\> docker image ls

    ```


    The following command will list all the containers available in the host machine
    and their status. In the next section, we discuss the difference between images
    and containers.


    ```

    :\> docker ps

    ```


    ## Containers


    A container is a running instance of a Docker image. In fact, images become containers
    when they run on a Docker engine. There can be many images in your local machine,
    but not all of them are running all the time, unless you explicitly make them
    to run. A container is in fact a regular Linux container defined by namespaces
    and control groups. We use the following command to start a Docker container from
    a Docker image. Here, `sample01` is the image name. This command will first check
    whether `sample01` image and all the other base images are in the local Docker
    registry, and if not, it will pull all the missing images from a remote registry.
    Finally, once all the images are there, the container will start and execute the
    program or the command, set as the `ENTRYPOINT` in the corresponding Dockerfile.


    ```

    :\> docker run sample01

    ```


    ## Deploying Microservices with Docker


    In this section, we see how to create a Docker image with a microservice, run
    it, and then finally publish it to the Docker Hub. First, we need to have our
    microservice running locally. Once you download all the examples from the Git
    repository of the book, you can find the source code related to this sample available
    in the `ch08/sample01` directory. Let’s build the sample with the following command,
    run from the `ch08/sample01` directory.


    ```

    :\> mvn clean install

    ```


    This will result in the `target/sample01-1.0.0.jar` file. This is our microservice,
    and now we need to create a Docker image with it.


    ### Note


    To run the examples in this chapter, you need Java 8 or latest, Maven 3.2 or latest,
    and a Git client. Once you have successfully installed those tools, you need to
    clone the Git repo: [`https://github.com/microservices-for-enterprise/samples.git`](https://github.com/microservices-for-enterprise/samples.git)
    . The chapter samples are in the `ch08` directory.


    ```

    :\> git clone https://github.com/microservices-for-enterprise/samples.git

    ```'
