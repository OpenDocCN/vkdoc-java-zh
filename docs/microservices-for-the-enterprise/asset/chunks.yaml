  trans: '

    #### 安装 Docker


    Docker 采用客户端-服务器架构模型，包含一个 Docker 客户端和一个 Docker 主机（也称为 *Docker 引擎*）。当你在本地机器上安装
    Docker 时，客户端和主机会同时被安装。所有基于不同平台安装 Docker 的说明都可以在 Docker 官网找到^(¹⁰⁵)。在本书撰写时，Docker
    支持 MacOS、Windows、CentOS、Debian、Fedora 和 Ubuntu 系统。以下命令可用于测试 Docker 是否安装成功。如果安装成功，该命令将返回相关的系统信息。


    ```

    :\> docker info

    ```


    以下命令将返回 Docker 客户端和引擎的版本信息。


    ```

    :\> docker version

    Client:

    Version: 18.03.1-ce

    API version: 1.37

    Go version: go1.9.5

    Git commit: 9ee9f40

    Built: Thu Apr 26 07:13:02 2018

    OS/Arch: darwin/amd64

    Experimental: false

    Orchestrator: swarm

    Server:

    Engine:

    Version: 18.03.1-ce

    API version: 1.37 (minimum version 1.08)

    Go version: go1.9.5

    Git commit: 9ee9f40

    Built: Thu Apr 26 07:22:38 2018

    OS/Arch: linux/amd64

    Experimental: true

    ```


    #### Docker 架构


    图 8-3 展示了 Docker 的高层架构，其中包括 Docker 客户端、Docker 主机（或引擎）以及镜像仓库。Docker 客户端是我们将要与之交互的命令行工具。运行在
    Docker 主机上的 Docker 守护进程会监听来自客户端的请求并做出相应处理。客户端可以通过 REST API、UNIX 套接字或网络接口与守护进程通信。在接下来的章节中，我们将详细解释通信的具体方式以及事件的执行顺序。


    ![../images/461146_1_En_8_Chapter/461146_1_En_8_Fig3_HTML.jpg](img/461146_1_En_8_Fig3_HTML.jpg)


    图 8-3

    Docker 高层架构


    #### Docker 镜像


    Docker 镜像是一个包含你的微服务（或应用程序）及其所有依赖项的软件包。你的应用程序只能看到打包在 Docker 镜像中的依赖项。你可以为镜像定义文件系统，该文件系统无法访问主机的文件系统。Docker
    镜像通过 Dockerfile 创建。Dockerfile 定义了构建 Docker 镜像所需的所有依赖项。


    ### 注意


    对于希望深入探索 Docker 概念的读者，我们建议查阅 Docker 官方文档^(¹⁰⁶)。


    以下代码展示了一个示例 Dockerfile 的内容。第一行表示使用名为 `openjdk:8-jdk-alpine` 的基础镜像开始构建这个新镜像。当我们使用
    Docker 提供的工具从这个 Dockerfile 构建 Docker 镜像时，它会首先加载 `openjdk:8-jdk-alpine` 镜像。Docker
    引擎会先检查该镜像是否存在于本地镜像仓库中，如果没有，则会从远程仓库（例如 Docker Hub）加载。此外，如果 `openjdk:8-jdk-alpine`
    镜像依赖于其他 Docker 镜像，这些依赖镜像也会被拉取并存储在本地仓库中。


    ```

    FROM openjdk:8-jdk-alpine

    ADD target/sample01-1.0.0.jar /sample01-1.0.0.jar

    ENTRYPOINT ["java", "-jar", "sample01-1.0.0.jar"]

    ```


    第二行表示将 `sample01-1.0.0.jar` 从当前文件系统位置下的 `target` 目录（这实际上是我们的主机文件系统，用于创建 Docker
    镜像）复制到我们要创建的镜像的文件系统根目录。第三行定义了入口点，即当有人运行此 Docker 镜像时要执行的命令。


    要基于 Dockerfile 构建 Docker 镜像，我们使用以下命令*。* 本章后面会详细介绍，你现在无需尝试。此命令将生成一个 Docker 镜像，默认情况下，它会存储在本地镜像仓库中。这实际上就是
    Docker 客户端。一旦我们执行该命令，运行在 Docker 引擎上的 Docker 守护进程将确保所有依赖镜像都被加载到本地，并创建新的镜像。


    ```

    :\> docker build -t sample01 .

    ```


    #### Docker 镜像仓库


    如果你熟悉 Maven，你可能已经了解 Maven 仓库的工作原理。Docker 镜像仓库遵循类似的概念。Docker 镜像仓库是存储 Docker 镜像的仓库。它们在不同层级上运行。Docker
    Hub 是一个公共的 Docker 镜像仓库，任何人都可以推送和拉取镜像。在本章后面，我们将解释如何向 Docker Hub 发布镜像以及从中检索镜像。拥有一个集中式的镜像仓库有助于共享和复用镜像。这也正成为一种流行的软件分发方式。如果你的组织需要仅限员工使用的受限
    Docker 镜像仓库，这也是可以实现的。


    以下命令将列出存储在本地机器上的所有 Docker 镜像。这包括你在本地构建的所有镜像以及从 Docker 镜像仓库拉取的镜像。


    ```

    :\> docker image ls

    ```


    以下命令将列出主机上所有可用的容器及其状态。在下一节中，我们将讨论镜像和容器之间的区别。


    ```

    :\> docker ps

    ```


    #### 容器


    容器是 Docker 镜像的一个运行实例。实际上，当镜像在 Docker 引擎上运行时，它们就变成了容器。你的本地机器上可以有许多镜像，但除非你明确让它们运行，否则它们不会一直运行。容器实际上是一个由命名空间和控制组定义的常规
    Linux 容器。我们使用以下命令从 Docker 镜像启动一个 Docker 容器。这里，`sample01` 是镜像名称。此命令会首先检查 `sample01`
    镜像以及所有其他基础镜像是否在本地 Docker 镜像仓库中，如果没有，它将从远程仓库拉取所有缺失的镜像。最后，一旦所有镜像就绪，容器将启动并执行在相应 Dockerfile
    中设置为 `ENTRYPOINT` 的程序或命令。


    ```

    :\> docker run sample01

    ```


    ### 使用 Docker 部署微服务


    在本节中，我们将了解如何创建一个包含微服务的 Docker 镜像，运行它，并最终将其发布到 Docker Hub。首先，我们需要让微服务在本地运行。从本书的
    Git 仓库下载所有示例后，你可以在 `ch08/sample01` 目录中找到与此示例相关的源代码。让我们在 `ch08/sample01` 目录下使用以下命令构建示例。


    ```

    :\> mvn clean install

    ```


    这将生成 `target/sample01-1.0.0.jar` 文件。这就是我们的微服务，现在我们需要用它创建一个 Docker 镜像。


    ### 注意


    要运行本章的示例，你需要 Java 8 或更高版本、Maven 3.2 或更高版本以及一个 Git 客户端。成功安装这些工具后，你需要克隆 Git 仓库：[`https://github.com/microservices-for-enterprise/samples.git`](https://github.com/microservices-for-enterprise/samples.git)
    。本章的示例位于 `ch08` 目录中。


    `:\> git clone` [`https://github.com/microservices-for-enterprise/samples.git`](https://github.com/microservices-for-enterprise/samples.git)

    '
- fmt: '### Creating a Docker Image with a Microservice


    To create a Docker image, first we need to create a `Dockerfile`. As we discussed
    in previous sections, this file defines all the other dependent images, other
    binary dependencies, and the command to start our microservice. The following
    code lists the contents of the `Dockerfile`, created in the `ch08/sample01` directory.
    Since we use Spring Boot to build the microservice, we need to have Java in our
    image. There are two options. One is to get Java binary and install it to our
    image from scratch and the other approach is to find a Docker container already
    existing with a Java environment and reuse it. The second approach is the recommended
    one and we use it here. We use `openjdk:8-jdk-alpine` as the base image, which
    will be pulled from the Docker Hub at the time we build our image.


    ```

    FROM openjdk:8-jdk-alpine

    ADD target/sample01-1.0.0.jar /sample01-1.0.0.jar

    ENTRYPOINT ["java", "-jar", "sample01-1.0.0.jar"]

    ```


    Let’s use the following command from `ch08/sample01` directory to build a Docker
    image with the name (`-t` in the command) `sample01`. The output you see may be
    slightly different from what is shown here, if you do not have the `openjdk:8-jdk-alpine`
    image already loaded into your Docker engine.


    ```

    :\> docker build -t sample01 .

    Sending build context to Docker daemon 17.45MB

    Step 1/3: FROM openjdk:8-jdk-alpine

    ---> 83621aae5e20

    Step 2/3: ADD target/sample01-1.0.0.jar /sample01-1.0.0.jar

    ---> f3448272e3a9

    Step 3/3: ENTRYPOINT ["java", "-jar", "sample01-1.0.0.jar"]

    ---> Running in ec9a9f91c950

    Removing intermediate container ec9a9f91c950

    ---> 35188a2bfb00

    Successfully built 35188a2bfb00

    Successfully tagged sample01:latest

    ```


    There is one important thing to learn from this output. There you can see Docker
    engine performs the operation in three steps. There is a step corresponding to
    each line in the `Dockerfile`. Docker builds images as layers. Each step in this
    operation creates a layer. These layers are read-only and reusable between multiple
    containers. Let’s revisit this concept, later in this chapter, once we better
    understand the behavior of containers.


    To list all the images in the Docker engine, we can use the following command.


    ```

    :\> docker image ls

    ```


    ### Running a Microservice as a Docker Container


    Once we have the Docker image available for our microservice, we can use the following
    command to spin up a Docker container with it.


    ```

    :\> docker run -p 9000:9000 sample01

    ```


    This command instructs the Docker engine to spin up a new Docker container from
    the `sample01` image and map port 9000 of the host machine to port 9000 of the
    Docker container. We picked 9000 here, because our microservice in the container
    starts on port 9000. Unless we map the container port to a host machine port,
    we won’t be able to communicate with our microservice running in a container.


    When you run this command, you can see that the output from the microservice running
    in the container is printed on the console of the host machine. And also if you
    use `Ctrl+C`, it will kill the container. That is because, in the way we executed
    this command, the container is attached to the host machine’s terminal. With the
    `-d` option used in the `docker run` command, we can de-attach the container from
    the host machine terminal. This will return the container ID corresponding to
    the one we just started.


    ```

    :\> docker run -d -p 9000:9000 sample01

    9a5cd90b714fc5a27281f94622c1a0d8f1dd1a344f4f4fcc6609413db39de000

    ```


    To test our microservice running in the container, use the following command from
    the host machine.


    ```

    :\> curl http://localhost:9000/order/11

    {"customer_id":"101021","order_id":"11","payment_method":{"card_type":"VISA","expiration":"01/22","name":"John
    Doe","billing_address":"201, 1st Street, San Jose, CA"},"items":[{"code":"101","qty":1},{"code":"103","qty":5}],"shipping_address":"201,
    1st Street, San Jose, CA"}>

    ```


    ### Hint


    If we want to see all the containers running on our Docker engine, we can use
    the `docker ps` command. To stop a running container, we need to use the `docker
    stop <container id>` command. Also if you want remove a container, use the `docker
    rm <container id>` command. Once you remove the container, you can delete the
    corresponding Docker image from your local registry with the `docker rmi <image
    name>` command.


    ### Publishing a Docker Image to the Docker Hub


    Docker Hub is a public Docker registry available to anyone to push Docker images
    and pull from. First, we need to create a Docker ID from [`https://hub.docker.com/`](https://hub.docker.com/).
    For example, we use the Docker ID `prabath` in the following example. Once you
    create a Docker ID, with a password, use the following command to register your
    Docker ID with the Docker client running locally.


    ```

    :\> docker login --username=prabath

    ```


    This command will prompt you to enter the password, and the Docker client will
    store your credentials in the keychain. Next, use the following command to find
    the image ID of the Docker image we created before and copy the value of `IMAGE
    ID` field corresponding to the `sample01` image; for example, `35188a2bfb00`.


    ```

    :\> docker images

    ```


    Now we need to tag our image with the Docker ID from the Docker Hub, as shown
    in the following command. Tagging helps create a more meaningful name for an image
    and since we plan to publish this image to the Docker Hub, make sure the tag follows
    the convention, where it starts with your Docker Hub account name. You would need
    to replace `prabath` from your Docker Hub account name.


    ```

    :\> docker tag 35188a2bfb00 prabath/sample01

    ```


    Finally, use the following command to push the image to the Docker Hub, and it
    should appear under your Docker Hub account once published.


    ```

    :\> docker push prabath/sample01

    ```


    Now, anyone can pull this image from anywhere, using the following command.


    ```

    :\> docker pull prabath/sample01

    ```


    ### Docker Compose


    In practice, in a microservices deployment we have more than one service, where
    each service has its own container. For example, in Figure [8-4](#461146_1_En_8_Chapter.xhtml#Fig4)
    the `Order Processing` microservice talks to the `Inventory` microservice. Also,
    there can be cases where one microservice depends on other services like a database.
    The database will be another container, but still part of the same application.
    The Docker Compose helps define and manage such multi-container environments.
    It’s another tool that we have to install apart from the Docker client and the
    Docker engine (host).'
