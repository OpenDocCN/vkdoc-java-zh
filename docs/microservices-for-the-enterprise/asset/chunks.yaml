  trans: '

    ### 使用 JWT 保护微服务


    在本节中，我们将了解如何扩展上一节（`ch12/sample02/`）中使用的`订单处理`微服务，以支持自签发访问令牌或 JWT。我们只需在 `sample02/src/main/resources/application.properties`
    文件中注释掉 `security.oauth2.resource.user-info-uri` 属性，并取消注释 `security.oauth2.resource.jwt.keyUri`
    属性。完整的 `application.properties` 文件将如下所示。


    ```

    #security.oauth2.resource.user-info-uri:https://localhost:8443/user

    security.oauth2.resource.jwt.keyUri: https://localhost:8443/oauth/token_key

    ```


    这里，`security.oauth2.resource.jwt.keyUri` 的值指向与私钥对应的公钥，授权服务器使用该私钥对 JWT 进行签名。这是授权服务器上的一个端点。如果你在浏览器中直接输入
    `https://localhost:8443/oauth/token_key`，你将找到公钥，如下所示。资源服务器（在本例中为`订单处理`微服务）使用此密钥来验证请求中包含的
    JWT 的签名。


    ```

    {

    "alg":"SHA256withRSA",

    "value":"-----BEGIN PUBLIC KEY-----\\n-----END
    PUBLIC KEY-----"

    }

    ```


    一旦我们从 OAuth 2.0 授权服务器获得 JWT 访问令牌，与之前一样，使用以下 cURL 命令，我们就可以访问受保护的资源。请确保将 `$TOKEN`
    的值替换为有效的访问令牌。


    ```

    \> curl -k -H "Authorization: Bearer $TOKEN" https://localhost:9443/order/11

    {"customer_id":"101021","order_id":"11","payment_method":{"card_type":"VISA","expiration":"01/22","name":"John
    Doe","billing_address":"201, 1st Street, San Jose, CA"},"items":[{"code":"101","qty":1},{"code":"103","qty":5}],"shipping_address":"201,
    1st Street, San Jose, CA"}

    ```


    ## 控制对微服务的访问


    有多种方法可以控制对微服务的访问。在本节中，我们将了解如何根据与访问令牌关联的作用域和用户角色来控制对微服务中不同操作的访问。


    ### 基于作用域的访问控制


    这里我们使用自包含访问令牌（或 JWT），首先你需要从 OAuth 2.0 授权服务器获取一个有效的 JWT。以下命令将为你获取一个作用域为 `foo` 的
    JWT 访问令牌。请确保适当替换 `$CLIENTID` 和 `$CLIENTSECRET` 的值，并保持 `sample01`（即我们的授权服务器）运行。


    ```

    \> curl -v -X POST --basic -u $CLIENTID:$CLIENTSECRET -H "Content-Type: application/x-www-form-urlencoded;charset=UTF-8"
    -k -d "grant_type=client_credentials&scope=foo" https://localhost:8443/oauth/token

    ```


    要为`订单处理`微服务（`sample02`）启用基于作用域的访问控制，我们需要将 `@EnableGlobalMethodSecurity` 注解添加到
    `sample02/src/main/java/com/apress/ch12/sample02/OrderProcessingApp.java` 类中，如下所示。


    ```

    @SpringBootApplication

    @EnableGlobalMethodSecurity(prePostEnabled = true)

    @EnableResourceServer

    public class OrderProcessingApp {

    }

    ```


    现在，让我们在方法级别使用 `@PreAuthorize` 注解来实施基于作用域的访问控制。`sample02/src/main/java/com/apress/ch12/sample02/service/OrderProcessing.java`
    类中的以下方法需要 `bar` 作用域才能访问。


    ```

    @PreAuthorize("#oauth2.hasScope(''bar'')")

    @RequestMapping(value = "/{id}", method= RequestMethod.GET)

    public ResponseEntity getOrder(@PathVariable("id") String orderId) {

    }

    ```


    让我们尝试运行以下 cURL 命令，使用之前获取的仅具有 `foo` 作用域的 JWT 访问令牌。该命令应该会返回错误，因为我们的令牌不包含所需的作用域值。


    ```

    \> curl -k -H "Authorization: Bearer $TOKEN" https://localhost:9443/order/11

    {"error":"access_denied","error_description":"Access is denied"}

    ```


    ### 基于角色的访问控制


    与上一节类似，这里我们必须使用自包含访问令牌（或 JWT），首先你需要从 OAuth 2.0 授权服务器获取一个有效的 JWT。


    以下 cURL 命令将使用 `password` 授权类型为你提供一个 JWT 访问令牌。请确保适当替换 `$CLIENTID`、`$CLIENTSECRET`、`$USERNAME`
    和 `$PASSWORD` 的值。与基于作用域的场景不同，客户端凭证授权类型在这里不起作用，因为默认情况下，客户端没有关联角色（只有用户有关联角色）。


    ```

    \> curl -v -X POST --basic -u $CLIENTID:$CLIENTSECRET -H "Content-Type: application/x-www-form-urlencoded;charset=UTF-8"
    -k -d "grant_type=password&username=$USERNAME&password=$PASSWORD&scope=foo" https://localhost:8443/oauth/token

    ```


    要为`订单处理`微服务（`sample02`）启用基于角色的访问控制，我们需要将 `@EnableGlobalMethodSecurity` 注解添加到 `sample02/src/main/java/com/apress/ch12/sample02/OrderProcessingApp.java`
    类中，如下所示（这与我们在上一节设置基于作用域的访问控制时执行的步骤相同）。


    ```

    @SpringBootApplication

    @EnableGlobalMethodSecurity(prePostEnabled = true)

    @EnableResourceServer

    public class OrderProcessingApp {

    }

    ```


    现在，让我们在方法级别使用 `@PreAuthorize` 注解来实施基于角色的访问控制。`sample02/src/main/java/com/apress/ch12/sample02/service/OrderProcessing.java`
    类中的以下方法需要 `USER` 角色才能访问。默认情况下，我们从授权服务器将 `USER` 角色添加给了名为 `peter` 的用户。因此，颁发给他的访问令牌应该足以访问此操作。


    ```

    @PreAuthorize("hasRole(USER)")

    @RequestMapping(value = "/{id}", method= RequestMethod.GET)

    public ResponseEntity getOrder(@PathVariable("id") String orderId) {

    }

    ```


    让我们尝试运行以下 cURL 命令，使用之前获取的仅具有 `foo` 作用域的 JWT 访问令牌。如果该令牌是颁发给具有 `USER` 角色的用户，则应该会返回成功响应。


    ```

    \> curl -k -H "Authorization: Bearer $TOKEN" https://localhost:9443/order/11

    ```


    最后，如果我们想同时根据作用域和角色来控制对某个方法的访问，我们可以对相应方法使用以下注解。


    ```

    @PreAuthorize("#oauth2.hasScope(''bar'') and hasRole(''USER'')")

    ```


    ## 保护服务间通信


    在上一节中，我们讨论了如何设置 OAuth 2.0 授权以及如何使用 OAuth 2.0 保护微服务。在本节中，我们将了解如何安全地从一个微服务调用另一个微服务。我们采用两种方法——一种基于
    JWT，另一种基于 TLS 双向认证。

    '
- fmt: '### Service-to-Service Communication Secured with JWT


    In this section, we see how to invoke a microservice secured with OAuth 2.0 from
    another microservice by passing a JWT.


    Figure [12-2](#461146_1_En_12_Chapter.xhtml#Fig2) extends Figure [12-1](#461146_1_En_12_Chapter.xhtml#Fig1)
    by introducing the `Inventory` microservices. Upon receiving an order, the `Order
    Processing` microservice talks to the `Inventory` microservice to update the inventory.
    Here, the `Order Processing` microservice passes the access token it gets to the
    `Inventory` microservice.


    ![../images/461146_1_En_12_Chapter/461146_1_En_12_Fig2_HTML.jpg](images/461146_1_En_12_Chapter/461146_1_En_12_Fig2_HTML.jpg)


    Figure 12-2


    Protecting service-to-service communication with OAuth 2.0


    The token validation step in Figure [12-2](#461146_1_En_12_Chapter.xhtml#Fig2)
    will change if we use self-contained (JWT) access tokens. In that case, there
    is no validation call from the microservice to the authorization server (or the
    security token issuer). Each microservice will fetch the corresponding public
    key from the authorization server and will validate the signature of the JWT locally.


    In this example, we use JWT access tokens. In previous sections we have already
    configured the authorization server (`sample01`) and the `Order Processing` microservice
    (`sample02`) to work with JWT. Now let’s see how to set up the `Inventory` microservice.
    The code corresponding to the `Inventory` microservice is in the `ch12/sample03`
    directory. The way it works is almost same as the `Order Processing` microservice
    in `sample02`. To enable JWT authentication, make sure the following property
    is uncommented in the `sample03/src/main/resources/application.properties` file.


    ```

    security.oauth2.resource.jwt.keyUri: https://localhost:8443/oauth/token_key

    ```


    Now we can start the `Inventory` microservice with the following Maven command,
    run from the `sample03` directory. The service starts on HTTPS port 10443.


    ```

    \> mvn spring-boot:run

    ```


    To execute the end-to-end flow, we need to place an order at the `Order Processing`
    (`sample02`) microservice. It will talk only to the `Inventory` (`sample03`) microservice.
    Before we run our cURL client against the `Order Processing` microservice, let’s
    look at its code, which talks to the `Inventory` microservice. We use `OAuth2RestTemplate`
    to talk to the `Inventory` microservice, which will automatically pass the access
    token (`Order Processing` microservice) it got from the client application. The
    corresponding code is available in the `sample02/src/main/java/com/apress/ch12/sample02/client/InventoryClient.java`
    file. The `Order Processing` microservice gets the complete order from the client
    application, then extracts the list of items from the request, and updates the
    inventory by talking to the `Inventory` microservice.


    ```

    @Component

    public class InventoryClient {

    @Autowired

    OAuth2RestTemplate restTemplate;

    public void updateInventory(Item[] items) {

    URI uri = URI.create("https://localhost:10443/inventory");

    restTemplate.put(uri, items);

    }

    }

    ```


    Assuming the OAuth 2.0 authorization server (`sample01`) is running, let’s run
    the following cURL command to get an access token. Be sure to replace the values
    of `$CLIENTID`, `$CLIENTSECRET`, `$USERNAME`, and `$PASSWORD` appropriately. Also
    note that we pass both `foo` and `bar` as scope values.


    ```

    \> curl -v -X POST --basic -u $CLIENTID:$CLIENTSECRET -H "Content-Type: application/x-www-form-urlencoded;charset=UTF-8"
    -k -d "grant_type=password&username=$USERNAME&password=$PASSWORD&scope=foo bar"
    https://localhost:8443/oauth/token

    ```


    This will produce a JWT access token. Along with that token, let’s place an order
    by talking to the `Order Processing` microservice (`sample02`) by running the
    following cURL command.


    ```

    curl -v  -k -H "Authorization: Bearer $TOKEN" -H "Content-Type: application/json"
    -d ''{"customer_id":"101021","payment_method":{"card_type":"VISA","expiration":"01/22","name":"John
    Doe","billing_address":"201, 1st Street, San Jose, CA"},"items":[{"code":"101","qty":1},{"code":"103","qty":5}],"shipping_address":"201,
    1st Street, San Jose, CA"}'' https://localhost:9443/order

    ```


    If all works fine, we should see the `201` HTTP status code at the cURL client
    and the order numbers printed on the terminal that runs the `Inventory` microservice.'
