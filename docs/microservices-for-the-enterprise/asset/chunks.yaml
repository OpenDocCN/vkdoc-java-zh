    # 9. Service Mesh


    In Chapter [7](#461146_1_En_7_Chapter.xhtml), “Integrating Microservices,” we
    discussed that microservices have to communicate with each other and inter-service
    communication is one of the key challenges in realizing the microservices architecture.
    In the conventional Service Oriented Architecture (SOA), the centralized Enterprise
    Service Bus (ESB) facilitated most of the inter-service communication requirements
    and with the shift to the *smart endpoints and dumb pipes with Microservices architecture*,
    now the service developers have to take care of all the complexities of inter-service
    communication. *Service Mesh* has immerged as a pattern to overcome most of these
    challenges. It does this by providing a generic distributed layer that encapsulates
    the commodity features of inter-service communication which are not part of the
    business logic of the service.


    ### Note


    Some of the concepts and examples in this chapter may require prior knowledge
    of `Docker` and `Kubernetes`. If you are new to either of these technologies,
    we recommend you read Chapter [8](#461146_1_En_8_Chapter.xhtml), “Deploying and
    Running Microservices” first.


    In this chapter, we delve deep into the motivation and key concepts behind the
    Service Mesh pattern. Then we discuss some of the main Service Mesh implementations
    with real-world examples.


    ## Why Service Mesh?


    The main motivation behind the inception of Service Mesh is the challenges we
    started to encounter after the elimination of the centralized ESB architecture,
    which lead us to build smart endpoints and dumb pipes.


    As with many emerging technologies, there is a lot of hype around the microservices
    architecture. Most people think that microservices architecture is the answer
    to all the problems they had with the previous SOA/ESB architecture. However,
    when we observe the real-world microservices implementations, we can see that
    most of the functionalities that a centralized bus (ESB) supports are now implemented
    at the microservices level. We are more or less solving the same set of fundamental
    problems, but we are solving them at different dimensions with microservices.


    For example, let’s consider a scenario where you need to call multiple downstream
    services in a resilient manner and expose the functionality as an another microservice.
    As shown in Figure [9-1](#461146_1_En_9_Chapter.xhtml#Fig1), with the ESB architecture,
    you can easily leverage the built-in capabilities of ESB, in order to build virtual/composite
    services and functionalities such as circuit breakers, timeouts, service discovery,
    etc., which are useful during inter-service communication, are already provided
    as out of the box capabilities of an ESB.


    ![../images/461146_1_En_9_Chapter/461146_1_En_9_Fig1_HTML.jpg](images/461146_1_En_9_Chapter/461146_1_En_9_Fig1_HTML.jpg)


    Figure 9-1


    From ESB to smart endpoints and dumb pipes


    When you implement the same scenario using microservices, you no longer have a
    centralized integration/ESB layer, but a set of microservices. You have to implement
    all these functionalities at the each microservice level.


    Therefore, a microservice that communicates with other services embeds both the
    business logic and the network communication logic. As illustrated in Figure [9-2](#461146_1_En_9_Chapter.xhtml#Fig2),
    each microservice contains a significant portion of its code related to network
    communication, which is independent from the service’s business logic. From the
    perspective of the application level, `microservice-P` communicates with `microservice-Q`
    (denoted as a dashed-line) and the actual communication takes place over the network
    stack.


    ![../images/461146_1_En_9_Chapter/461146_1_En_9_Fig2_HTML.jpg](images/461146_1_En_9_Chapter/461146_1_En_9_Fig2_HTML.jpg)


    Figure 9-2


    Microservice components and service-to-service communication


    We can identify the key responsibilities of each of these layers as follows:


    - *Business Logic* implements the business functionalities, computations, and
    service composition/integration logic.

    - *Network Functions* take care of the inter-service communication mechanisms
    (basic service invocation through a given protocol, apply resiliency and stability
    patterns, service discovery, and instrumentation for observability). These network
    functions are built on top of the underlying operating system (OS) level network
    stack.


    Now think about the effort involved in implementing such a microservice. Implementing
    the functionalities related to service-to-service communication from scratch is
    a nightmare. Rather than focusing on the business logic, you will have to spend
    a lot of time building service-to-service communication functionalities. This
    is even worse if you use multiple technologies to build microservices, because
    you need to duplicate the same efforts across different languages (e.g., the circuit
    breaker has to be implemented in `Java`, `Node`, `Python`, etc.).


    Since most of the inter-service communication requirements are quite generic across
    all microservices implementations, we can think about offloading all such tasks
    to a different layer, so that we can keep the service code independent. That’s
    where *Service Mesh* comes into the picture.


    ## What Is a Service Mesh?


    In a nutshell, a Service Mesh is an inter-service communication infrastructure.
    With A Service Mesh, a given microservice won’t directly communicate with the
    other microservices. Rather, all service-to-service communications will take place
    on top of a software component called the *Service Mesh proxy* (or *sidecar proxy*).
    Sidecar or Service Mesh proxy is a software component that is co-located with
    the service in the same VM or pod (`Kubernetes`). The sidecar proxy layer is known
    as the *Data Plane*. All these sidecar proxies are controlled via a *Control Plane*.
    That is where all the configuration related to inter-service communications are
    applied.'
