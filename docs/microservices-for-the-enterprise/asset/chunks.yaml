- fmt: '### Data Formats


    Ballerina has a structural type system with primitive, record, object, tuple,
    and union types. This type-safe model incorporates type inference at assignment
    and provides numerous compile-time integrity checks for connectors, logic, and
    network-bound payloads.


    The code that integrates services and systems often has to deal with complex distributed
    errors. Ballerina has error-handling capabilities based on union types. Union
    types explicitly capture the semantics without requiring developers to create
    unnecessary wrapper types. When you decide to pass the errors back to the caller,
    you can use the `check` operator.


    For example, when you have a JSON data received over a message, you can cast it
    to a type that you have defined as part of your logic. Then you can safely cast
    the two types by handling the possible error as part of a `match` clause written
    against that union type.


    ```

    // this is a simple structured object definition in Ballerina

    // it can be automatically mapped into JSON and back again

    type Payment {

    string name,

    string cardnumber,

    int month,

    int year,

    int cvc;

    };

    ...

    json payload = check request.getJsonPayload();

    // The next line shows typesafe parsing of JSON into an object

    Payment|error p = payload;

    match p {

    Payment x => {

    io:println(x);

    res.statusCode = 200;

    // return the JSON that has been created

    res.setJsonPayload(check x);

    }

    error e => {

    res.statusCode = 400 ;

    // return the error message if the JSON failed to parse

    res.setStringPayload(e.message);

    }

    _ = caller -> respond (res);

    ```


    ### Observability


    Monitoring, logging, and distributed tracing are key methods that reveal the internal
    state of the Ballerina code to provide the observability. Ballerina provides out-of-the-box
    capabilities to work with observability tools, such as Prometheus, Grafana, Jaeger,
    and Elastic Stack, all with minimal configuration.


    ### Workflow Engine Solutions


    We conclude our discussion of microservice integration technologies with technologies
    that are specifically designed for microservices that require workflows (i.e.,
    long-running stateful processes that may also need some human interactions). Building
    workflows in a microservices architecture is a special case of integration requirements.
    There are quite a few new and existing solutions morphing into the microservices
    workflow domain. Zeebe, Netflix Conductor, Apache NiFi, AWS Step Functions, Spring
    Cloud Data Flow, and Microsoft Logic Apps are good examples.


    *Zeebe*^([^(101)](#fn101)) supports the stateful orchestration of workers and
    microservices using visual workflows (developed by Camunda, which is a popular
    open source Business Process Model and Notation—BPMN—solution). It allows users
    to define orchestration flows visually using BPMN 2.0 or YAML. Zeebe ensures that,
    once started, flows are always carried out fully, retrying steps in case of failures.
    Along the way, Zeebe maintains a complete audit log, so that the progress of flows
    can be monitored and tracked. Zeebe is a Big Data system and scales seamlessly
    with growing transaction volumes. (You can try a Zeebe example from our examples
    in `ch07/sample17`.)


    *Netflix Conductor*^([^(102)](#fn102)) is an open source workflow engine that
    uses a JSON DSL to define a workflow. Conductor allows creating complex process/business
    flows in which an individual task is implemented by a microservice.


    *Apache NiFi*^([^(103)](#fn103)) is a conventional integration framework that
    supports powerful and scalable directed graphs of data routing, transformation,
    and system mediation logic.


    ## Inception of the Service Mesh


    What we have seen so far in this chapter is that microservices have to work with
    other microservices, data, web APIs, and other systems. Since we don’t use a centralized
    ESB as a bus to connect all these services and systems, the inter-services communication
    is now part of the service developer. Although many microservices frameworks address
    most of such needs, it’s still a daunting task for the service developer to take
    care of all the requirements of integrating microservices.


    To overcome this problem, architects identify that some of the inter-service communication
    functionalities can be treated as commodity features and the service code can
    be made independent from them. The core concept of a Service Mesh is to identify
    the commodity network communication functionalities such as circuit breaker, timeouts,
    basic routing, service discovery, secure communication, observability, etc. and
    implement them at a component called a *sidecar*, which you run alongside the
    microservices you develop. These sidecars are controlled by a central management
    called a *control plane*.


    With the advent of the Service Mesh, the microservice developers get more freedom
    when it comes to polyglot service development technologies and they focus less
    on the inter-service communication. They can focus more on the business capabilities
    of a service that they develop.


    We discuss the Service Mesh in detail in Chapter [9](#461146_1_En_9_Chapter.xhtml),
    “Service Mesh,” and delve deep into some of the existing service mesh implementations.


    ## Summary


    In this chapter, we took an in-depth analysis of the microservices integration
    challenges. With the omission of ESB, we need to practice the smart endpoints
    and dumb client philosophy when we develop services. With this approach, most
    of the ESB capabilities now need to be supported at the microservices that we
    develop. We identified some of the commonly used microservice integration patterns:
    active compositions/orchestrations, reactive compositions/choreography, and a
    hybrid approach. It is more pragmatic to stick to a hybrid approach of integrating
    microservices and select the integration patterns based on your use cases.


    In order to facilitate microservices integration, the microservices development
    frameworks need to have a unique set of capabilities such as built-in network
    communication abstractions, support for resiliency patterns, native support to
    data types, ability to govern integration microservices, cloud and container native
    nature, etc. With respect to those requirements, we had a detailed discussion
    of some of the key microservice implementation technologies. With the inception
    of the Service Mesh, some of the microservice integration requirement can be offloaded
    to a distributed network communication abstraction, which is executed as a sidecar
    alongside each service and controlled by a centralized control plane. In the next
    chapter, we discuss how to deploy and run microservices.


