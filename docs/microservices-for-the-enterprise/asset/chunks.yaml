    # 3. 服务间通信


    在微服务架构中，服务是自治的，并通过网络进行通信以满足业务用例。一系列这样的服务构成了一个*系统*，而消费者通常与这些系统进行交互。因此，基于微服务的应用可以被视为一个分布式系统，它在不同的网络位置上运行多个服务。每个服务都在自己的进程中运行。因此，微服务使用进程间或服务间通信风格进行交互。


    在本章中，我们将讨论微服务的通信风格以及用于微服务通信的标准协议。本章会对这些协议和风格进行比较和对比。然而，我们将推迟讨论微服务集成、弹性服务间通信和服务发现。这些主题将在第
    6 章“微服务治理”和第 7 章“集成微服务”中详细讨论。


    ## 微服务通信基础


    正如第一章所讨论的，服务是以业务能力为导向的，这些服务之间的交互构成了一个系统或产品，它与一组特定的业务用例相关。因此，服务间通信是微服务架构成功的关键因素。


    基于微服务的应用由一套独立服务组成，这些服务通过消息传递相互通信。消息传递在分布式系统中并非新概念。在单体应用中，不同处理器/组件的业务功能是通过函数调用或语言级方法调用来调用的。在面向服务架构（SOA）中，这转向了更松耦合的
    Web 服务级消息传递，它主要基于 SOAP，并运行在 HTTP、消息队列等不同协议之上。几乎所有的服务交互都是在集中式企业服务总线（ESB）层实现的。


    在微服务的上下文中，没有像 SOA/Web 服务那样要求使用特定的通信模式和消息格式的限制。相反，微服务架构倾向于根据用例选择适当的服务协作机制和用于交换信息的消息格式。


    微服务通信风格主要涉及服务如何从一个服务向另一个服务发送或接收数据。微服务中最常用的通信风格是同步和异步。


    ## 同步通信


    在同步通信风格中，客户端发送请求并等待服务的响应。双方必须保持连接打开，直到客户端收到响应。客户端的执行逻辑在没有响应的情况下无法继续。而在异步通信中，客户端可以发送消息并完全完成操作，无需等待响应。


    请注意，同步通信和阻塞通信是两回事。有些教科书和资源将同步通信解释为纯粹的阻塞场景，即客户端线程基本上会阻塞直到收到响应。这是不正确的。我们可以使用非阻塞
    IO 实现，它在服务响应时注册一个回调函数，客户端线程可以返回而无需阻塞在特定响应上。因此，同步通信风格可以构建在非阻塞异步实现之上。

    '
- fmt: '### REST


    Representational State Transfer (REST) is an architectural style that builds distributed
    systems based on hypermedia. The REST model uses a navigational scheme to represent
    objects and services over a network. These are known as resources. A client can
    access the resource using the unique URI and a representation of the resource
    is returned. REST doesn’t depend on any of the implementation protocols, but the
    most common implementation is the HTTP application protocol. While accessing RESTful
    resources with the HTTP protocol, the URL of the resource serves as the resource
    identifier and `GET`, `PUT`, `DELETE`, `POST`, and `HEAD` are the standard HTTP
    operations to be performed on that resource. The REST architecture style is inherently
    based on synchronous messaging.


    To understand how we can use the REST architectural style in service development,
    let’s consider the order-management scenario of the online retail application.
    We can model the order-management scenario as a RESTful service called Order Processing.
    As shown in Figure [3-1](#461146_1_En_3_Chapter.xhtml#Fig1), you can define the
    resource *order* for this service.


    ![../images/461146_1_En_3_Chapter/461146_1_En_3_Fig1_HTML.jpg](images/461146_1_En_3_Chapter/461146_1_En_3_Fig1_HTML.jpg)


    Figure 3-1


    Different operations that you can execute on the Order Processing RESTful service


    To place a new order, you can use the HTTP `POST` message with the content of
    the order, which is sent to the URL (`http://xyz.retail.com/order`). The response
    from the service contains an `HTTP 201 Created` message with the location header
    pointing to the newly created resource (`http://xyz.retail.com/order/123456`).
    Now you can retrieve the order details from that URL by sending an HTTP `GET`
    request. Similarly, you can update the order and delete the order using the appropriate
    HTTP methods.


    Since REST is a style, when it comes to the realization of RESTful services, we
    need to make sure that our RESTful services are fully aligned with the core principles
    of REST. In fact, most of the RESTful services out there violate the core REST
    style concepts. To design a proper RESTful service, Leonard Richardson has [defined](https://www.crummy.com/writing/speaking/2008-QCon/act3.html)^([^(23)](#fn23))
    a maturity model for REST-based services.


    #### Richardson Maturity Model


    There are four levels in the *Richardson Maturity Model:*


    *   *Level 0 –* *Swamp of PoX* : A service at this level is in fact not considered
    RESTful at all. For example, suppose that there is a SOAP web service exposed
    over HTTP to implement online retail capabilities. This service has one URL (`http://xyz.retail.com/legacy/RetailService`)
    and, based on the content of the request, it decides the operation (order processing,
    customer management, product search, etc.) that it needs to carry out. A single
    HTTP method (in most cases, `POST`) is used and no HTTP constructs or concepts
    are used for the logic of the service. Everything is based on the content of the
    message. The best example of a Level 0 service is any SOAP web service.


    *   *Level 1 –* *Resource URIs* : A service is considered to be at this level
    when it has individual URIs for each resource, but the message still contains
    operation details. For example, the retail application can have resources for
    `/orders`, `/products`, `/customers`, etc., but the CRUD (Create, Read, Update,
    Delete) operations for a given resource are still done through the content of
    the message. No HTTP methods or response status codes are used.


    *   *Level 2 –* *HTTP Verbs* : Instead of using the message content to determine
    the operation, we can use an HTTP verb instead. Hence, an HTTP `POST` message
    that is sent to the `/order` context can add a new order (order details are given
    in the message content but now we don’t have operation details). Also, the proper
    HTTP status codes should be supported. For example, the response of an invalid
    request should be on status code 500. The example that we illustrated in Figure
    [3-1](#461146_1_En_3_Chapter.xhtml#Fig1) facilitates all these capabilities. A
    RESTful service, which is at Level 2 or higher, is considered to be a proper REST
    API.


    *   *Level 3 –* *Hypermedia Controls* : At level 3, the service responses have
    links that control the application state for the client. Often this concept is
    known as HATEOAS (Hypertext as The Engine of Application State). The hypermedia
    controls tell us what we can do next, and the URI of the resource we need to manipulate
    to do it. Rather than us having to know where to post our next request, the hypermedia
    in the response tell us how to do it.


    Owing to the fact that REST is primarily implemented on top of HTTP (which is
    widely used, less complicated, and firewall friendly), REST is the most common
    form of microservice communication style adopted by microservices implementations.
    Let’s consider some best practices when using RESTful microservices.


    *   RESTful HTTP-based microservices (REST is independent of the implementation
    protocol, but there are no non-HTTP RESTful services used in practice) are good
    for external facing microservices (or APIs) because it’s easier to expose them
    through existing infrastructures, such as firewalls, reverse proxies, load balancers,
    etc.


    *   The resource scope should be fine-grained so that we can directly map it to
    an operation-related business capability (e.g., add order).


    *   Use the Richardson maturity models and other RESTful service best practices
    for designing services.


    *   Use versioning strategies when applicable. (Versioning is typically implemented
    at the API Gateway level when you decide to expose your service as APIs. We discuss
    this in detail in Chapter [7](#461146_1_En_7_Chapter.xhtml).)


    As a lot of microservices frameworks use REST as their de-facto styles, you may
    be tempted to use it for all your microservices implementations. But you should
    use REST only if it’s the most appropriate style for your use cases. (Be sure
    to consider the other suitable styles, which are discussed in this chapter.)


    ### Try it out


    You can try a RESTful web services sample in Chapter [4](#461146_1_En_4_Chapter.xhtml),
    “Developing Services”.'
