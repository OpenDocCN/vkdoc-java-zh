  trans: '

    #### 部署与副本集


    尽管我们之前讨论了如何使用部署描述文件创建 Pod，但在实际工作中你永远不会这样使用。你会改用部署（Deployment）。**部署**是 Kubernetes
    中的一种对象类型（就像 Pod 一样），它帮助我们通过副本集（ReplicaSet）来管理 Pod。**副本集**是 Kubernetes 集群中的一个核心组件，你可以通过它指定如何对某个
    Pod 进行扩缩容。在创建部署之前，我们先清理一下环境，删除之前创建的 Pod 和对应的服务。


    以下命令首先删除服务，然后删除 Pod。你需要从 `ch08/sample03` 目录下运行这些命令。


    ```

    :\> kubectl delete -f ecomm-service.yml

    :\> kubectl delete -f ecomm-pod.yml

    ```


    现在，要创建一个部署，我们需要在部署描述文件（一个 YAML 文件）中定义我们的需求。完整的 YAML 文件（`ecomm-deployment.yml`）位于
    `ch08/sample03` 目录下。在这里你可以看到，`kind` 属性的值被设置为 `Deployment`。`spec/replicas` 的值被设置为
    `3`，这意味着该部署将创建三个在 `template` 下定义的 Pod 实例。就像我们之前使用的 Pod 部署描述文件一样，这里我们也定义了构成该部署下
    Pod 的容器镜像。


    ```

    apiVersion: apps/v1beta1

    kind: Deployment

    metadata:

    name: ecomm-deployment

    spec:

    replicas: 3

    template:

    metadata:

    labels:

    app: ecomm-deployment

    spec:

    containers:

    - name: orderprocessing

    image: prabath/sample04

    ports:

    - containerPort : 9000

    - name: inventory

    image: prabath/sample02

    ports:

    - containerPort : 9090

    ```


    让我们在 `ch08/sample03` 目录下使用以下命令来创建一个部署。


    ```

    :\> kubectl create -f ecomm-deployment.yml

    deployment.apps/ecomm-deployment created

    ```


    如果部署创建成功，以下命令应返回其状态。输出显示，在相应部署下定义的 Pod 的三个副本已创建并准备就绪。


    ```

    :\> kubectl get deployments

    NAME               DESIRED   CURRENT   UP-TO-DATE   AVAILABLE   AGE

    ecomm-deployment   3         3         3            3           23m

    ```


    以下命令显示此部署创建的所有 Pod。


    ```

    :\> kubectl get pods

    NAME                                READY  STATUS    RESTARTS AGE

    ecomm-deployment-546f8c4d6b-67ttd   2/2    Running   1        24m

    ecomm-deployment-546f8c4d6b-hldnf   2/2    Running   0        24m

    ecomm-deployment-546f8c4d6b-m9vmt   2/2    Running   0        24m

    ```


    现在我们需要创建一个指向此部署的服务，以便 Pod 中运行的服务可以从外部访问。这里我们使用位于 `ch08/sample03` 目录下的 `ecomm-dep-service.yml`
    来创建服务。与之前情况的唯一区别在于 `spec/select/app` 的值，现在它指向部署的 `labels/app`。


    ```

    apiVersion: v1

    kind: Service

    metadata:

    name: ecomm-service

    spec:

    selector:

    app: ecomm-deployment

    ports:

    - port: 80

    targetPort: 9000

    type: NodePort

    ```


    让我们在 `ch08/sample03` 目录下使用以下命令来创建服务。


    ```

    :\> kubectl create -f ecomm-dep-service.yml

    service/ecomm-service created

    ```


    如果服务创建成功，以下命令应返回服务的状态。你可以看到，服务的 80 端口被映射到了 Kubernetes 主节点的 31763 端口。


    ```

    :\> kubectl get svc

    NAME           TYPE       CLUSTER-IP     EXTERNAL-IP  PORT(S)

    ecomm-service  NodePort   10.111.102.84         80:31763/TCP

    kubernetes     ClusterIP  10.96.0.1             443/TCP

    ```


    现在让我们从宿主机调用 `Order Processing` 服务。


    ```

    :\> curl http://192.168.99.100:31763/order/11

    {"customer_id":"101021","order_id":"11","payment_method":{"card_type":"VISA","expiration":"01/22","name":"John
    Doe","billing_address":"201, 1st Street, San Jose, CA"},"items":[{"code":"101","qty":1},{"code":"103","qty":5}],"shipping_address":"201,
    1st Street, San Jose, CA"}

    ```


    #### 扩缩部署


    在上一节中，我们以三个副本（即部署描述文件下定义的 Pod 的三个实例）启动了部署。以下命令展示了如何将副本数扩展到五个。这里，`deployment.extensions/ecomm-deployment`
    是我们的部署名称。


    ```

    :\> kubectl scale --replicas=5 deployment.extensions/ecomm-deployment

    deployment.extensions/ecomm-deployment scaled

    ```


    在此命令之后立即运行以下命令，你会发现创建了两个新的 Pod。


    ```

    :\> kubectl get pods

    NAME                               READY   STATUS             RESTARTS

    ecomm-deployment-546f8c4d6b-67ttd  2/2     Running            1

    ecomm-deployment-546f8c4d6b-hldnf  2/2     Running            0

    ecomm-deployment-546f8c4d6b-hsqnp  0/2     ContainerCreating  0

    ecomm-deployment-546f8c4d6b-m9vmt  2/2     Running            0

    ecomm-deployment-546f8c4d6b-vt624  0/2     ContainerCreating  0

    ```


    几秒钟后再次运行同样的命令，你会发现所有 Pod 都已成功创建。


    ```

    NAME                               READY   STATUS             RESTARTS

    ecomm-deployment-546f8c4d6b-67ttd  2/2     Running            1

    ecomm-deployment-546f8c4d6b-hldnf  2/2     Running            0

    ecomm-deployment-546f8c4d6b-hsqnp  0/2     Running            0

    ecomm-deployment-546f8c4d6b-m9vmt  2/2     Running            0

    ecomm-deployment-546f8c4d6b-vt624  0/2     Running            0

    ```


    #### 自动扩缩部署


    Kubernetes 还允许你根据特定参数自动扩缩部署。例如，以下命令设置 `ecomm-deployment` 根据平均 CPU 利用率进行自动扩缩。如果所有
    Pod 的平均 CPU 利用率超过 50%，则系统应开始扩展到最多 10 个副本。同时，如果 CPU 利用率低于 50%，系统应缩减到 1 个副本。


    ```

    :\> kubectl autoscale deployment ecomm-deployment --cpu-percent=50 --min=1 --max=10

    horizontalpodautoscaler.autoscaling/ecomm-deployment autoscaled

    ```


    #### Helm：Kubernetes 的包管理


    Helm^(¹¹⁴) 是 Kubernetes 的包管理器，它使得将 Kubernetes 对象组织成一个打包的应用程序成为可能，任何人都可以一键下载、安装或自定义。这些包在
    Helm 中被称为 **图表（charts）**。使用 Helm 图表，你可以定义、安装甚至升级最复杂的 Kubernetes 应用程序。


    一个图表是一组描述相关 Kubernetes 资源集合的文件。单个图表可用于部署简单的对象，比如一个 memcached Pod，或者复杂的东西，比如一个包含
    HTTP 服务器、数据库、缓存等的完整 Web 应用栈。安装图表与使用 Apt 或 Yum 等包管理工具安装包非常相似。一旦你启动并运行了 Helm，安装一个包可以简单到在命令行中运行
    `helm install stable/mysql`。


    Helm 图表甚至可以描述最复杂的应用程序，提供可重复的应用程序安装，并作为单一权威点。此外，你可以为基于 Kubernetes 的微服务构建生命周期管理，将其作为图表，这些图表易于版本控制、共享，并可以托管在公共或私有服务器上。如果需要，你还可以回滚到任何特定版本。


    ## 微服务部署模式


    根据业务需求，我们发现存在多种微服务部署模式。早在容器成为主流之前，微服务就已经存在一段时间了，这些部署模式也随着时间的推移而演变。在接下来的章节中，我们将权衡每种部署模式的优缺点。

    '
- fmt: '### Multiple Services per Host


    This model is useful when you have fewer microservices and do not expect each
    microservice to be isolated from the others. Here the host can be a physical machine
    or a virtual machine. This pattern will not scale when you have multiple microservices,
    and also will not help you in achieving the benefits of a microservices architecture.


    ### Service per Host


    With this model, the physical host machine isolates each microservice. This pattern
    will not scale when you have many microservices, even for something around 10.
    It will be a waste of resources and will be a maintenance nightmare. Also, it
    becomes harder and more time consuming to replicate the same operating environment
    across development, test, staging, and production setups.


    ### Service per Virtual Machine


    With this model, the virtual machine isolates each microservice. This pattern
    is better than the previous service per host model, but still will not scale when
    you have many microservices. A virtual machine carries a lot of overhead, and
    we need to have powerful hardware to run multiple virtual machines in a single
    physical host. Also, due to the increased size, the virtual machine images are
    less portable.


    ### Service per Container


    This is the most common and the recommended deployment model. Each microservice
    is deployed in its own container. This makes microservices more portable and scalable.


    ## Container-Native Microservice Frameworks


    Most of the microservices frameworks and programming languages that we use to
    build microservices are not designed to work with container management and orchestration
    technologies by default. Therefore, developers or DevOps have to put extra effort
    to create the artifacts/configurations that are required for deploying the applications
    as containers. There are certain technologies, such as `Metaparticle.io`, that
    try to build a uniform set of plugins to incorporate such container-native capabilities
    into the application’s or microservice’s code that you develop, as annotations.
    We discuss several of them next.


    ### Metaparticle


    `Metaparticle`^([^(115)](#fn115)) is getting some traction when it comes to microservice
    development as it provides some interesting features to harness your applications
    with containers and Kubernetes.


    `Metaparticle` is a standard library for cloud-native applications on Kubernetes.
    The objective of `Metaparticle` is to democratize the development of distributed
    systems by providing simple, but powerful building blocks, built on top of containers
    and Kubernetes.


    `Metaparticle` provides access to these primitives via familiar programming language
    interfaces. Developers no longer need to master multiple tools and file formats
    to harness the power of containers and Kubernetes. `Metaparticle` allows us to
    do the following:


    - Containerize your applications.

    - Deploy your applications to Kubernetes.

    - Quickly develop replicated, load-balanced services.

    - Handle synchronization like locking and master election between distributed
    replicas.

    - Easily develop cloud-native patterns like sharded systems.


    For example, let’s consider the following code snippet, which contains a simple
    Java code for a `hello world` HTTP service. You can find the complete code example
    in the `ch08/sample05` directory.


    ```

    public class Main {

    private static final int port = 8080;

    public static void main(String[] args) {

    // Code of a simple HTTP service

    }

    }

    ```


    Here we use `Metaparticle` to containerize our Java microservices. You need to
    have the following Maven dependency to build a program with `Metaparticle`.


    ```

    io.metaparticle

    metaparticle-package

    0.1-SNAPSHOT

    ```


    To harness your code with Docker and Kubernetes, you need to wrap the code of
    the HTTP service with `Metaparticle` constructs.


    ```

    @Package(repository = "docker.io/your_docker_id",

    jarFile = "target/metaparticle-hello-1.0-SNAPSHOT.jar")

    public static void main(String[] args) {

    Containerize(() -> {

    try {

    HttpServer server = HttpServer.create(new InetSocketAddress(port), 0);

    ...

    ```


    Here, we use the `@Package` annotation to describe how to package the application
    and specify the Docker Hub username. Also, we need to wrap the main function in
    the `Containerize` function, which triggers the `Metaparticle` code when we build
    our microservice application.


    Now we can build your application with `mvn compile` and, once the build is successful,
    we can run it with `mvn exec:java -Dexec.mainClass=io.metaparticle.tutorial.Main`.


    This will start the HTTP microservice as a container. To access this service externally,
    we need to expose the ports of our microservice application. To do this, we need
    to add a `@Runtime` annotation to supply the ports to expose.


    ```

    ...

    @Runtime(ports={port})

    ...

    ```


    As a final step, consider the task of exposing a replicated service on the Internet.
    To do this, we need to expand our usage of the `@Runtime` and `@Package` annotations.
    The `@Package` annotation has its `publish` field added with a value set to `true`.
    This is necessary in order to push the built image to the Docker repository. Then,
    we add the `executor` field to the `@Runtime` annotation to set our execution
    environment to `metaparticle`, which will launch the service into the currently
    configured Kubernetes environment. Finally, we add a `replicas` field to the `@Runtime`
    annotation. This specifies the number of replicas to schedule.


    ```

    ...

    @Runtime(ports={port},

    replicas = 4,

    executor = "metaparticle")

    @Package(repository = "kasunindrasiri",

    jarFile = "target/metaparticle-package-tutorial-0.1-SNAPSHOT-jar-with-dependencies.jar",

    publish = true,

    verbose = true)

    ...

    ```


    After we compile and run this, we can see that there are four pod replicas running
    behind a Kubernetes `ClusterIP` service.


    #### Containerizing a Spring Boot Service


    We can use `Metaparticle` to containerize an existing Spring Boot application
    by using the `Metaparticle` dependency and annotations. First we need to add the
    `Metaparticle` dependency to our project’s `pom` file and add execute the `SpringApplicaiton.run`
    inside the `Containerize` function.


    ```

    import static io.metaparticle.Metaparticle.Containerize;

    @SpringBootApplication

    public class BootDemoApplication {

    @Runtime(ports = {8080},

    replicas = 4,

    executor = "metaparticle")

    @Package(repository = "your-docker-user-goes-here",

    jarFile = "target/boot-demo-0.0.1-SNAPSHOT.jar",

    publish = true,

    verbose = true)

    public static void main(String[] args) {

    Containerize(() ->  SpringApplication.run(BootDemoApplication.class, args));

    }

    }

    @RestController

    class HelloController {

    @GetMapping("/")

    public String hello(HttpServletRequest request) {

    System.out.printf("[%s]%n", request.getRequestURL());

    return String.format("Hello containers [%s] from %s",

    request.getRequestURL(), System.getenv("HOSTNAME"));

    }

    }

    ```


    In addition to seamless containerization, it also offers other features such as
    distributed synchronization, sharding, etc. In addition to `Metaparticle`, languages
    such as `Ballerina.io` support such capabilities via the annotations. You can
    find the complete example in the `ch08/sample06` directory.'
