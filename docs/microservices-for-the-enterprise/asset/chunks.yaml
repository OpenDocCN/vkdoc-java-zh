    ### 构建消费者（事件接收端）


    本节将讨论如何构建 `Inventory` 微服务（`sample08`），以消费发布到 `ORDER_PROCESSING_COMPLETED` 主题的消息。本示例中使用的
    Maven 依赖项与之前相同，其用途也一致。我们直接来看从主题中消费消息的代码。`InventoryApp` 类（`sample08/src/main/java/com/apress/ch04/sample08/InventoryApp.java`）中的
    `consumeOderUpdates` 方法仅从主题读取数据并打印订单 ID。


    ```

    @SpringBootApplication

    @EnableBinding(Sink.class)

    public class InventoryApp {

    public static void main(String[] args) {

    SpringApplication.run(InventoryApp.class, args);

    }

    @StreamListener(Sink.INPUT)

    public void consumeOderUpdates(Order order) {

    System.out.println(order.getOrderId());

    }

    }

    ```


    主题名称和消息代理信息从 `sample08/src/main/resources/application.properties` 文件中获取。


    ```

    server.port=9000

    spring.cloud.stream.bindings.input.destination:ORDER_PROCESSING_COMPLETED

    spring.cloud.stream.bindings.input.content-type:application/json

    spring.cloud.stream.kafka.binder.zkNodes:localhost

    spring.cloud.stream.kafka.binder.zkNodes.brokers: localhost

    ```


    使用以下 Maven 命令启动消费者微服务。


    ```

    \> cd sample08

    \> mvn spring-boot:run

    ```


    为了测试完整的端到端流程，我们使用以下命令通过 `Order Processing` 微服务创建一个订单。


    ```

    \> curl -v -H "Content-Type: application/json" -d ''{"customer_id":"101021","payment_method":{"card_type":"VISA","expiration":"01/22","name":"John
    Doe","billing_address":"201, 1st Street, San Jose, CA"},"items":[{"code":"101","qty":1},{"code":"103","qty":5}],"shipping_address":"201,
    1st Street, San Jose, CA"}'' http://localhost:8080/order

    HTTP/1.1 201

    Location: http://localhost:8080/order/5f8ecb9c-8146-4021-aaad-b6b1d69fb80f

    ```


    现在，如果你查看运行 `Inventory` 微服务（`sample08`）的控制台，会发现订单 ID 已被打印出来。


    你也可以使用以下命令查看发布到 `ORDER_PROCESSING_COMPLETED` 主题的消息。


    ```

    \> cd kafka_2.11-1.1.0

    \> bin/kafka-console-consumer.sh --bootstrap-server localhost:9092 --from-beginning
    --topic ORDER_PROCESSING_COMPLETED

    {"customer_id":"101021","order_id":"d203e371-2a8a-4a4c-a286-11e5b723f3d7","payment_method":{"card_type":"VISA","expiration":"01/22","name":"John
    Doe","billing_address":"201, 1st Street, San Jose, CA"},"items":[{"code":"101","qty":1},{"code":"103","qty":5}],"shipping_address":"201,
    1st Street, San Jose, CA2"}

    ```


    ## 构建 GraphQL 服务


    在第 3 章中，我们讨论了 GraphQL 如何用于某些 RESTful 服务架构不适用的同步消息传递场景。现在，让我们尝试使用 Spring Boot 构建一个基于
    GraphQL 的服务。你可以在 `ch04/sample09` 目录下找到完整的代码。


    通过将 `graphql-spring-boot-starter`^(⁸¹) 依赖项添加到项目中，你可以启动一个 GraphQL 服务器。配合 GraphQL
    Java Tools 库，你只需编写服务所需的代码即可。首先，我们需要确保项目中包含以下依赖项。


    ```

    com.graphql-java

    graphql-spring-boot-starter

    3.6.0


    com.graphql-java

    graphql-java-tools

    3.2.0


    ```


    Spring Boot 会自动获取相应的依赖项并设置适当的处理器以自动工作。默认情况下，这会将 GraphQL 服务暴露在 `/graphql` 端点（在
    `sample09` 下的 `/src/main/resources/application.properties` 文件中配置），并接受包含 GraphQL
    负载的 `POST` 请求。GraphQL Tools 库通过处理 GraphQL 模式文件来构建正确的结构，然后将特殊的 Bean 连接到该结构。Spring
    Boot GraphQL Starter（`graphql-spring-boot-starter`）会自动查找这些模式文件。这些文件需要以 `.graphqls`
    扩展名保存，并且可以位于类路径中的任何位置。


    这里的一个强制性要求是，必须恰好有一个根查询，并且最多有一个根变更。根查询需要在 Spring 上下文中定义特殊的 Bean 来处理其中的各种字段。主要要求是这些
    Bean 实现 `GraphQLQueryResolver` 接口，并且模式中根查询的每个字段在这些类中都有一个同名的方法。


    ```

    public class Query implements GraphQLQueryResolver {

    private BookDao bookDao;

    public List getRecentBooks(int count, int offset) {

    return bookDao.getRecentBooks(count, offset);

    }

    }

    ```


    方法签名必须包含与 GraphQL 模式中每个参数相对应的参数。它还应该为 GraphQL 模式中的类型返回正确的返回类型。任何简单类型（如 `String`、`Int`、`List`
    等）都可以使用等效的 Java 类型，系统会自动映射它们。


    前面代码片段中的 `getRecentBooks` 方法处理针对之前定义的模式中 `recentBooks` 字段的任何 GraphQL 查询。


    ```

    public class Book {

    private String id;

    private String title;

    private String category;

    private String authorId;

    }

    ```


    一个 Java Bean 代表 GraphQL 服务器中的每个复杂类型。GraphQL 还有一个配套工具，名为 *GraphiQL*^(⁸²)。这是一个用户界面（UI），可以与任何
    GraphQL 服务器通信并对其执行查询和变更。Java Bean 内部的字段将根据字段名称直接映射到 GraphQL 响应中的字段。关于如何运行 `sample09`
    的说明，可在示例 Git 仓库中 `ch04/sample09` 目录下的 README 文件中找到。

