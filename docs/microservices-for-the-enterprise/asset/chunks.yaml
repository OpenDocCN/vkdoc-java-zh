    ### 开发/生产环境一致性


    第 10 条因素强调了确保开发、预发布和生产环境尽可能保持一致的重要性。现实中，许多公司在开发服务器上资源较少，而让预发布和生产服务器保持一致。当开发环境与预发布、生产环境的资源水平不同时，有时需要等到预发布部署才能发现问题。我们注意到，有些公司在开发环境中没有集群，后来浪费了数百个开发工时来调试预发布集群中的状态复制问题。


    这不仅涉及节点数量或硬件资源，也适用于应用所依赖的其他服务。例如，如果你计划在生产环境中使用 Oracle，就不应在开发环境中使用 MySQL 数据库；如果你计划在生产环境中使用
    Java 1.8，就不应在开发环境中使用 Java 1.6。如今，大多数微服务部署都依赖基于容器（例如 Docker）的部署来避免此类问题，因为所有第三方依赖项都打包在容器本身中。微服务的关键基础之一是其快速开发和部署。早期反馈循环极其重要，而遵循第
    10 条因素有助于我们实现这一目标。


    ### 日志


    第 11 条因素指出，你需要将日志视为事件流。日志在应用中扮演两个角色：它们有助于识别系统中正在发生的事情并隔离任何问题，同时也可用作审计追踪。大多数传统应用将日志推送到文件中，然后这些文件被推送到日志管理应用，如
    Splunk^(¹⁸)和 Kibana^(¹⁹)。在微服务环境中管理日志颇具挑战性，因为存在大量微服务实例。为了处理单个请求，这些微服务之间可能会生成多个请求。因此，能够追踪并关联系统中所有微服务之间的特定请求至关重要。


    日志聚合^(²⁰)是许多微服务部署遵循的常见模式。该模式建议引入一个集中式日志服务，用于聚合环境中所有微服务实例的日志。管理员可以从中央服务器搜索和分析日志，还可以配置在日志中出现特定消息时触发的警报。我们可以通过使用消息系统进一步改进此模式，如图
    2-17 所示。这使日志服务与所有其他微服务解耦。每个微服务将日志事件（带有关联 ID）发布到消息队列，日志服务将从队列中读取。


    ![../images/461146_1_En_2_Chapter/461146_1_En_2_Fig17_HTML.jpg](img/461146_1_En_2_Fig17_HTML.jpg)


    图 2-17


    从多个微服务向集中式日志服务器发布日志


    尽管传统应用使用基于文件系统的日志记录，但在微服务环境中强烈不推荐这样做。根据第 9 条因素，给定的微服务应在任何时刻都是可丢弃的。这引入了*不可变服务器*的概念。不可变服务器在首次启动后永远不会被修改。如果我们不修改服务器，那么就无法向其文件系统写入任何内容。遵循不可变服务器模式有助于从配置中重现相同的服务器实例，并在任何时刻将其丢弃。


    ### 管理进程


    第 12 条因素强调了将管理任务作为一次性进程运行的必要性。这些任务可能是数据库迁移（由于应用的新版本），或是需要与应用本身一起运行的临时脚本。第 12 条因素的起源似乎对
    Ruby 等解释型语言略有偏向，这些语言支持并鼓励交互式编程 shell。一旦应用启动，开发人员可以通过 SSH 登录到这些服务器，并通过这些交互式编程控制台运行某些脚本。如果我们遵循第
    12 条因素，就应完全避免通过 SSH 远程执行此类管理任务，而是引入一个管理进程，并将管理任务作为其一部分。在微服务部署中，就像你在不同容器中运行微服务一样，这个管理进程也可以在其自己的容器中运行。


    ### 超越 12 因素应用


    看到 2012 年提出的原始 12 因素（当时微服务尚未成为主流，Docker 甚至还未诞生）与如今成为主流的微服务部署如此相关，真是令人惊叹。2016 年，Pivotal
    公司的 Kevin Hoffman^(²¹)在原始因素基础上引入了另外三个因素，我们接下来将讨论这些因素。


    #### API 优先


    任何有 SOA 背景的人都必须熟悉服务开发常用的两种方法：契约优先和代码优先。采用契约优先时，我们首先以编程语言无关的方式开发服务接口。在 SOAP 世界中，这会生成
    WSDL（Web 服务描述语言），而在 REST 世界中，它可能是一个 OpenAPI^(²²)文档（以前称为 Swagger）。OpenAPI 规范是描述
    RESTful API 的强大定义格式。


    通过这一因素，Kevin 强调了遵循 API 优先方法开始任何应用开发的必要性，这是对契约优先方法的扩展。在多个开发团队按不同时间表处理多个微服务的环境中，首先为每个微服务定义
    API，有助于所有团队根据 API 构建其微服务。这有助于提高开发过程的效率，而无需过多担心需要集成的其他微服务的实现细节。如果在准备测试时某个微服务的实现尚不可用，你可以简单地根据已发布的
    API 对其进行模拟。不同编程语言下有许多工具可用于创建此类模拟实例。


    #### 遥测


    根据维基百科，*遥测*是一种自动化通信过程，通过该过程在远程或不可达点收集测量值和其他数据，并将其传输到接收设备进行监控。在软件方面，这对于跟踪生产服务器的健康状况和识别任何问题极为有用。Kevin
    Hoffman 提出了一个很好的类比来强调应用遥测的必要性。将你的应用想象成发射到太空的无人航天飞机——这个定义如此有力，无需再对遥测的重要性进行额外解释。


    遥测数据可分为三类：应用性能监控、领域特定数据、健康与系统日志。HTTP 请求数量、数据库调用次数以及随时间变化处理每个请求所花费的时间，都记录在应用性能监控类别下。领域特定数据类别记录与业务功能相关的数据。例如，`订单处理`微服务将推送与正在处理的订单相关的数据，包括按日期统计的新订单数、未结订单数和已结订单数。与服务器启动、关闭、内存消耗和
    CPU 利用率相关的数据则属于健康与系统日志类别。

    '
- fmt: '### Security


    This is a notable missing factor in the original 12 factors. Any application or
    microservice should worry about security from its early stages of design. There
    are multiple perspectives in securing microservices. The key driving force behind
    microservices is the speed to production (or the time to market). One should be
    able to introduce a change to a service, test it, and instantly deploy it in production.
    To make sure we do not introduce security vulnerabilities at the code level, we
    need to have a proper plan for static code analysis and dynamic testing — and
    most importantly those tests should be part of the continuous delivery (`CD`)
    process. Any vulnerability should be identified early in the development lifecycle
    and should have shorter feedback cycles.


    There are multiple microservices deployment patterns (which we will discuss later
    in the book in Chapter [8](#461146_1_En_8_Chapter.xhtml)), but the most commonly
    used one is service-per-host model. The host does not necessarily mean a physical
    machine — most probably it would be a container (`Docker`). We need to worry about
    container-level security here and worry about how to isolate a container from
    other containers and what level of isolation we have between the container and
    the host operating system.


    And last, but not least, we need to worry about application-level security. The
    design of the microservice should talk about how we authenticate and access control
    users and how we secure the communication channels between microservices. We discuss
    microservices security in detail in Chapter [11](#461146_1_En_11_Chapter.xhtml),
    “Microservices Security Fundamentals” and Chapter [12](#461146_1_En_12_Chapter.xhtml),
    “Securing Microservices”.


    ### Summary


    In this chapter we discussed the essential concepts related to the design of microservices.
    The chapter started with a discussion of domain-driven design principles, which
    are the key ingredients in modeling microservices from the business point of view.
    Then we delved deep into microservices design principles and finally concluded
    with the 12-factor app, which is a collection of best practices and guidelines
    to build and maintain much scalable, maintainable, and portable applications.


    The external parties via messages consume any business functionality that is implemented
    as a microservice. Microservices can leverage messaging styles such as synchronous
    messaging and asynchronous messaging based on the business use cases. In the next
    chapter, we discuss messaging technologies and protocols in detail.


