  trans: '

    ## 摘要


    本章的主要目标是让你了解企业架构的当前状态，以及微服务如何融入其中。在本章中，我们讨论了企业架构如何从单体应用演进到微服务。我们还讨论了当我们转向微服务时，ESB
    和 API 网关的角色发生了怎样的变化。此外，我们还探讨了微服务架构的关键特征及其优缺点，这将为理解本书后续内容奠定基础。


    # 2. 设计微服务


    史蒂夫·乔布斯认为，设计不仅关乎事物的外观和感觉，更在于它如何运作。一个微服务在内部如何工作以及如何与其他微服务交互，高度依赖于其设计。大多数关于微服务的架构概念和设计原则并不仅仅与微服务相关。它们已经存在了一段时间，甚至在
    SOA（面向服务架构）流行的早期就已出现。有些人甚至称微服务为“做对了的 SOA”！SOA 的根本问题在于人们没有把设计做对。他们陷入了炒作之中，而忽略了关键的设计原则。随着时间的推移，SOA
    变成了另一个流行词，而其最初的需求却未能得到解决。微服务作为一个概念应运而生，填补了这一空白。除非你密切关注微服务的架构概念和设计原则，否则你并没有真正在做微服务！


    查尔斯·安东尼·理查德·霍尔爵士是开发了快速排序算法的英国科学家。在 1980 年接受图灵奖的演讲中，他提到设计软件有两种方法：一种是让软件变得非常简单，以至于明显没有缺陷；另一种是让它变得非常复杂，以至于没有明显的缺陷——第一种方法要困难得多。在微服务设计中，你需要关注其内部和外部架构。内部架构定义了如何设计微服务本身，而外部架构则涉及它如何与其他微服务通信。除非你让这两种设计都变得简单且易于演进，否则你将会使系统容易出错，并偏离微服务的关键设计目标。在任何微服务设计的核心中，投产时间、可扩展性、复杂性本地化和弹性都是关键要素。除非你让设计变得简单，否则很难达到这些期望。


    ## 领域驱动设计


    领域驱动设计（DDD）并不是随微服务引入的新概念，它已经存在了相当长的时间。埃里克·埃文斯在他的著作《领域驱动设计：软件核心复杂性应对之道》中创造了“领域驱动设计”这个术语。随着微服务成为主流的架构模式，人们开始意识到领域驱动设计概念在设计微服务中的适用性。这种设计在界定微服务的范围方面起着关键作用。


    ### 注意


    对领域驱动设计的深入解释超出了本书的范围。本章重点介绍领域驱动设计在构建微服务中的应用。对领域驱动设计有浓厚兴趣的读者，建议阅读埃里克·埃文斯的著作。除了埃里克的书，我们还推荐阅读斯科特·米利特和尼克·图恩合著的《领域驱动设计模式、原理与实践》。


    什么是领域驱动设计？它主要是关于对复杂业务逻辑进行建模，或者构建对复杂业务逻辑的抽象。*领域*是领域驱动设计的核心。我们开发的所有软件都与某些用户活动或兴趣相关。埃里克·埃文斯说，用户应用程序的学科领域就是软件的领域。有些领域涉及物理世界。在零售业务中，你会找到买家、卖家、供应商、合作伙伴以及许多其他实体。有些领域是无形的。例如，在加密货币领域，一个比特币钱包应用程序处理的是无形资产。无论是什么，领域都与业务相关，而不是与软件相关。当然，当你构建在软件领域内运行的软件时（例如配置管理程序），软件本身也可以成为一个领域。


    在本书中，我们将使用许多例子来详细阐述这些概念。假设我们有一个正在构建电子商务应用的企业零售商。该零售商有四个主要部门：库存与订单管理、客户管理、配送以及计费与财务。每个部门可能有多个科室。库存与订单管理部门的订单处理科室接受订单，锁定库存中的商品，然后将控制权移交给计费与财务部门处理付款。一旦付款成功处理，配送部门就会准备发货。客户管理部门负责管理所有客户的个人数据以及与客户的所有交互。见图
    2-1。


    ![../images/461146_1_En_2_Chapter/461146_1_En_2_Fig1_HTML.jpg](img/461146_1_En_2_Fig1_HTML.jpg)


    图 2-1


    分而治之


    领域驱动设计背后的一个关键原则是*分而治之*。在我们的例子中，零售领域是核心业务领域。每个部门可以被视为一个子领域。识别核心业务领域及其相关的子领域至关重要。这有助于我们遵循微服务架构原则为零售商构建电子商务应用。许多架构师在构建微服务架构时面临的关键挑战之一，是如何为每个服务确定合适的粒度。领域驱动设计在这方面提供了帮助。顾名思义，在领域驱动设计中，*领域*是至高无上的！


    让我们退一步，看看*康威定律*。它指出，任何设计系统的组织，最终产生的设计结构都是该组织沟通结构的复制品。这证明了根据部门来识别企业中的子领域是合理的。一个特定的部门是为了某个目的而成立的。部门内部有其自身的沟通结构，部门之间也有沟通结构。甚至一个给定的部门也可以有多个科室，我们可以将每个这样的科室识别为一个子领域。详情见图
    2-1。


    让我们看看如何将这个领域结构映射到微服务架构中。我们或许可以开始用四个微服务来构建我们的电子商务应用（见图 2-2）：`订单处理`、`客户`、`配送`和`计费`。


    ![../images/461146_1_En_2_Chapter/461146_1_En_2_Fig2_HTML.jpg](img/461146_1_En_2_Fig2_HTML.jpg)


    图 2-2

    '
- fmt: '# Communication between Microservices


    Suppose that these microservices communicate with each other via messages, which
    are sent as events. The request first hits the `Order Processing` microservice,
    and once it locks the items in the inventory, fires the `ORDER_PROCESSING_COMPLETED`
    event. Events are a way of communicating between microservices. There can be multiple
    other services listening to the `ORDER_PROCESSING_COMPLETED` event and once they
    are notified, start acting upon it accordingly. As per Figure [2-2](#461146_1_En_2_Chapter.xhtml#Fig2),
    the `Billing` microservice receives the `ORDER_PROCESSING_COMPLETED` event and
    starts processing the payment. Amazon, for example, does not process payments
    at the time an order is placed, but only when it is ready to ship. Just like Amazon,
    the `Order Processing` microservice will fire the `ORDER_PROCESSING_COMPLETED`
    event only when the order is ready to ship. This event itself contains the data
    required to process the payment by the `Billing` microservice. In this particular
    example, it carries the customer ID and the payment method. The `Billing` microservice
    stores customer payment options in its own repository, including the credit card
    information, so it can now independently process the payment.


    ### Note


    Using events to communicate between microservices is one of the commonly used
    patterns in inter-microservice communication. It removes point-to-point connections
    between microservices and the communication happens via a messaging system. Each
    microservice, once it’s done with its own processing, publishes an event to a
    topic, while the other microservices, which register themselves as listeners to
    the interested topics, will act accordingly once they receive a notification.
    Messaging technologies used in microservices, microservice integration patterns,
    and event-driven messaging patterns are covered in Chapter [3](#461146_1_En_3_Chapter.xhtml),
    “Inter-Service Communication,” Chapter [7](#461146_1_En_7_Chapter.xhtml), “Integrating
    Microservices,” and Chapter [10](#461146_1_En_10_Chapter.xhtml), “APIs, Events,
    and Streams,” respectively.


    Once the `Billing` microservice completes processing the payment, it will fire
    the `PAYMENT_PROCESSING_COMPLETED` event and the `Delivery` microservice will
    capture it. This event carries the customer ID, order ID, and invoice. Now the
    `Delivery` microservice loads the customer delivery address from its own repository
    and prepares the order for delivery. Even though the `Customer` microservice is
    shown in Figure [2-2](#461146_1_En_2_Chapter.xhtml#Fig2), it is not being used
    during the order processing flow. When new customers are on-boarded into the system
    or existing customers want to update their personal data, the `Customer` microservice
    will be used.


    > *A project faces serious problems when its language is fractured.—Eric Evans*


    Each microservice in Figure [2-2](#461146_1_En_2_Chapter.xhtml#Fig2) belongs to
    a business domain. The inventory and order management is the domain of the `Order
    Processing` microservice; customer management is the domain of the `Customer`
    microservice; delivery is the domain of the `Delivery` microservice; and billing
    & finance is the domain of the `Billing` microservice. Each of these domains or
    departments can have its own communication structure internally along with its
    own terminology to represent business activities.


    Each domain can be modeled independently. As much as one can be independent from
    the others, it gains more flexibility to evolve on its own. Domain-driven design
    defines best practices and guidelines on how you can model a given domain. It
    highlights the need to have a *ubiquitous language* to define the domain model.
    The ubiquitous language is a shared team language, which is shared by domain experts
    and the developers. In fact, ubiquitous means that the same language must be used
    everywhere within a given context (or to be precise, within a bounded context,
    which we discuss in the section to follow), from conversations to code. This bridges
    the gap in communication between domain experts and developers. Domain experts
    are thorough with their own jargons, but have limited or no understanding of the
    technical terms used in software development, while the developers know how to
    describe a system in technical terms, but have no or limited domain expertise.
    The ubiquitous language fills this gap and brings everyone to the same page.


    The terminology defined by the ubiquitous language must be bounded by the corresponding
    context. The context is related to a domain. For example, the ubiquitous language
    can be used to define an entity called *customer*. The definition of the customer
    entity in the inventory and order management domain does not necessarily need
    to be the same as in the customer management domain. For example, the customer
    entity in the inventory and order management domain may have properties such as
    order history, open orders, and scheduled orders, while the customer entity in
    the customer management domain has properties such as first name, last name, home
    address, email address, mobile number, etc. The customer entity in the billing
    & finance domain may have properties like credit card number, billing address,
    billing history, and scheduled payments. Any term defined by ubiquitous language
    must only be interpreted under the corresponding context.


    ### Note


    A typical software project involves domain experts only during the requirement-gathering
    phase. A business analyst (BA) translates the business use cases into a technical
    requirements specification. The business analyst completely owns the requirements
    and there is no feedback cycle. The model is developed, as heard by the business
    analyst. One key aspect in domain-driven design is to encourage more, lengthy
    communication between domain experts and developers. This goes well beyond the
    initial requirement-gathering phase and finally ends up with building a domain
    model well understood by both the domain experts and developers.


    Let’s delve deep in to this example. In our architecture, a given microservice
    belongs to a single business domain and the communication between microservices
    happens via message passing. The message passing can be based on an event-driven
    architecture or just over HTTP. Each message from one microservice to another
    carries domain objects. For example, the `ORDER_PROCESSING_COMPLETED` event carries
    the *order* domain object, while the `PAYMENT_PROCESSING_COMPLETED` event carries
    the *invoice* domain object (see Figure [2-2](#461146_1_En_2_Chapter.xhtml#Fig2)).
    The definition of these domain objects must be carefully derived via domain-driven
    design with the collaboration between domain experts and developers.


    ### Note


    Domain-driven design has its own inherent challenges. One challenge is to get
    domain experts involved in the project throughout its execution. It also takes
    a considerable amount of time to build the ubiquitous language, which requires
    good collaboration between domain experts and developers. Unlike developing a
    monolithic application, which expands across all the domains, building a solution
    for a given domain and encapsulating domain-specific business logic requires a
    change in developer mindset, which is also challenging.'
  raw: 'Communication between microservices


    Suppose that these microservices communicate with each other via messages, which
    are sent as events. The request first hits the `Order Processing` microservice,
    and once it locks the items in the inventory, fires the `ORDER_PROCESSING_COMPLETED`
    event. Events are a way of communicating between microservices. There can be multiple
    other services listening to the `ORDER_PROCESSING_COMPLETED` event and once they
    are notified, start acting upon it accordingly. As per Figure [2-2](#461146_1_En_2_Chapter.xhtml#Fig2),
    the `Billing` microservice receives the `ORDER_PROCESSING_COMPLETED` event and
    starts processing the payment. Amazon, for example, does not process payments
    at the time an order is placed, but only when it is ready to ship. Just like Amazon,
    the `Order Processing` microservice will fire the `ORDER_PROCESSING_COMPLETED`
    event only when the order is ready to ship. This event itself contains the data
    required to process the payment by the `Billing` microservice. In this particular
    example, it carries the customer ID and the payment method. The `Billing` microservice
    stores customer payment options in its own repository, including the credit card
    information, so it can now independently process the payment.


    ### Note


    Using events to communicate between microservices is one of the commonly used
    patterns in inter-microservice communication. It removes point-to-point connections
    between microservices and the communication happens via a messaging system. Each
    microservice, once it’s done with its own processing, publishes an event to a
    topic, while the other microservices, which register themselves as listeners to
    the interested topics, will act accordingly once they receive a notification.
    Messaging technologies used in microservices, microservice integration patterns,
    and event-driven messaging patterns are covered in Chapter [3](#461146_1_En_3_Chapter.xhtml),
    “Inter-Service Communication,” Chapter [7](#461146_1_En_7_Chapter.xhtml), “Integrating
    Microservices,” and Chapter [10](#461146_1_En_10_Chapter.xhtml), “APIs, Events,
    and Streams,” respectively.


    Once the `Billing` microservice completes processing the payment, it will fire
    the `PAYMENT_PROCESSING_COMPLETED` event and the `Delivery` microservice will
    capture it. This event carries the customer ID, order ID, and invoice. Now the
    `Delivery` microservice loads the customer delivery address from its own repository
    and prepares the order for delivery. Even though the `Customer` microservice is
    shown in Figure [2-2](#461146_1_En_2_Chapter.xhtml#Fig2), it is not being used
    during the order processing flow. When new customers are on-boarded into the system
    or existing customers want to update their personal data, the `Customer` microservice
    will be used.


    > *A project faces serious problems when its language is fractured.—Eric Evans*


    Each microservice in Figure [2-2](#461146_1_En_2_Chapter.xhtml#Fig2) belongs to
    a business domain. The inventory and order management is the domain of the `Order
    Processing` microservice; customer management is the domain of the `Customer`
    microservice; delivery is the domain of the `Delivery` microservice; and billing
    & finance is the domain of the `Billing` microservice. Each of these domains or
    departments can have its own communication structure internally along with its
    own terminology to represent business activities.


    Each domain can be modeled independently. As much as one can be independent from
    the others, it gains more flexibility to evolve on its own. Domain-driven design
    defines best practices and guidelines on how you can model a given domain. It
    highlights the need to have a *ubiquitous language* to define the domain model.
    The ubiquitous language is a shared team language, which is shared by domain experts
    and the developers. In fact, ubiquitous means that the same language must be used
    everywhere within a given context (or to be precise, within a bounded context,
    which we discuss in the section to follow), from conversations to code. This bridges
    the gap in communication between domain experts and developers. Domain experts
    are thorough with their own jargons, but have limited or no understanding of the
    technical terms used in software development, while the developers know how to
    describe a system in technical terms, but have no or limited domain expertise.
    The ubiquitous language fills this gap and brings everyone to the same page.


    The terminology defined by the ubiquitous language must be bounded by the corresponding
    context. The context is related to a domain. For example, the ubiquitous language
    can be used to define an entity called *customer*. The definition of the customer
    entity in the inventory and order management domain does not necessarily need
    to be the same as in the customer management domain. For example, the customer
    entity in the inventory and order management domain may have properties such as
    order history, open orders, and scheduled orders, while the customer entity in
    the customer management domain has properties such as first name, last name, home
    address, email address, mobile number, etc. The customer entity in the billing
    & finance domain may have properties like credit card number, billing address,
    billing history, and scheduled payments. Any term defined by ubiquitous language
    must only be interpreted under the corresponding context.


    ### Note


    A typical software project involves domain experts only during the requirement-gathering
    phase. A business analyst (BA) translates the business use cases into a technical
    requirements specification. The business analyst completely owns the requirements
    and there is no feedback cycle. The model is developed, as heard by the business
    analyst. One key aspect in domain-driven design is to encourage more, lengthy
    communication between domain experts and developers. This goes well beyond the
    initial requirement-gathering phase and finally ends up with building a domain
    model well understood by both the domain experts and developers.


    Let’s delve deep in to this example. In our architecture, a given microservice
    belongs to a single business domain and the communication between microservices
    happens via message passing. The message passing can be based on an event-driven
    architecture or just over HTTP. Each message from one microservice to another
    carries domain objects. For example, the `ORDER_PROCESSING_COMPLETED` event carries
    the *order* domain object, while the `PAYMENT_PROCESSING_COMPLETED` event carries
    the *invoice* domain object (see Figure [2-2](#461146_1_En_2_Chapter.xhtml#Fig2)).
    The definition of these domain objects must be carefully derived via domain-driven
    design with the collaboration between domain experts and developers.


    ### Note


    Domain-driven design has its own inherent challenges. One challenge is to get
    domain experts involved in the project throughout its execution. It also takes
    a considerable amount of time to build the ubiquitous language, which requires
    good collaboration between domain experts and developers. Unlike developing a
    monolithic application, which expands across all the domains, building a solution
    for a given domain and encapsulating domain-specific business logic requires a
    change in developer mindset, which is also challenging.'
  trans: '

    微服务间的通信


    假设这些微服务通过以事件形式发送的消息进行相互通信。请求首先到达`订单处理`微服务，一旦它锁定库存中的商品，就会触发`ORDER_PROCESSING_COMPLETED`事件。事件是微服务之间的一种通信方式。可以有多个其他服务监听`ORDER_PROCESSING_COMPLETED`事件，一旦收到通知，它们就会相应地开始处理。如图
    2-2 所示，`账单`微服务接收`ORDER_PROCESSING_COMPLETED`事件并开始处理支付。例如，亚马逊并非在下单时处理支付，而是在准备发货时才处理。与亚马逊类似，`订单处理`微服务仅在订单准备发货时才会触发`ORDER_PROCESSING_COMPLETED`事件。该事件本身包含了`账单`微服务处理支付所需的数据。在这个具体例子中，它携带了客户
    ID 和支付方式。`账单`微服务在其自身的存储库中存储客户的支付选项，包括信用卡信息，因此它可以独立处理支付。


    ### 注意


    使用事件在微服务之间进行通信是微服务间通信中常用的模式之一。它消除了微服务之间的点对点连接，通信通过消息系统进行。每个微服务在完成自身处理后，会向一个主题发布事件，而其他注册为感兴趣主题监听器的微服务，在收到通知后会相应地采取行动。微服务中使用的消息传递技术、微服务集成模式以及事件驱动消息模式将分别在第
    3 章“服务间通信”、第 7 章“集成微服务”和第 10 章“API、事件与流”中介绍。


    一旦`账单`微服务完成支付处理，它将触发`PAYMENT_PROCESSING_COMPLETED`事件，`配送`微服务将捕获该事件。此事件携带客户 ID、订单
    ID 和发票。现在，`配送`微服务从其自身的存储库中加载客户配送地址，并准备订单进行配送。尽管图 2-2 中显示了`客户`微服务，但在订单处理流程中并未使用它。当新客户接入系统或现有客户想要更新其个人数据时，才会使用`客户`微服务。


    > *当一个项目的语言支离破碎时，它就会面临严重的问题。——埃里克·埃文斯*


    图 2-2 中的每个微服务都属于一个业务领域。库存和订单管理是`订单处理`微服务的领域；客户管理是`客户`微服务的领域；配送是`配送`微服务的领域；账单与财务是`账单`微服务的领域。这些领域或部门内部可以有自己的沟通结构，以及用于表示业务活动的自身术语。


    每个领域都可以独立建模。一个领域越能独立于其他领域，它就越能灵活地自主演进。领域驱动设计定义了如何对给定领域进行建模的最佳实践和指导原则。它强调了使用*通用语言*来定义领域模型的必要性。通用语言是一种共享的团队语言，由领域专家和开发人员共同使用。事实上，“通用”意味着在给定的上下文（或者更准确地说，在限界上下文内，我们将在下一节讨论）中，从对话到代码，都必须使用同一种语言。这弥合了领域专家和开发人员之间的沟通鸿沟。领域专家精通自己的行话，但对软件开发中使用的技术术语了解有限或根本不了解；而开发人员知道如何用技术术语描述系统，但缺乏或仅有有限的领域专业知识。通用语言填补了这一空白，使所有人达成共识。


    由通用语言定义的术语必须受相应上下文的约束。上下文与某个领域相关。例如，通用语言可用于定义一个名为*客户*的实体。库存和订单管理领域中客户实体的定义，不一定需要与客户管理领域中的定义相同。例如，库存和订单管理领域中的客户实体可能具有订单历史、未结订单和计划订单等属性，而客户管理领域中的客户实体则具有名字、姓氏、家庭地址、电子邮件地址、手机号码等属性。账单与财务领域中的客户实体可能具有信用卡号、账单地址、账单历史和计划付款等属性。任何由通用语言定义的术语，都只能在相应的上下文中进行解释。


    ### 注意


    一个典型的软件项目仅在需求收集阶段涉及领域专家。业务分析师将业务用例转化为技术需求规格说明书。业务分析师完全拥有需求，并且没有反馈循环。模型是根据业务分析师所听到的内容开发的。领域驱动设计的一个关键方面是鼓励领域专家和开发人员之间进行更多、更长时间的沟通。这远远超出了最初的需求收集阶段，最终会构建出一个领域专家和开发人员都充分理解的领域模型。


    让我们深入探讨这个例子。在我们的架构中，一个给定的微服务属于单个业务领域，微服务之间的通信通过消息传递进行。消息传递可以基于事件驱动架构，或者仅通过 HTTP
    进行。从一个微服务到另一个微服务的每条消息都携带领域对象。例如，`ORDER_PROCESSING_COMPLETED`事件携带*订单*领域对象，而`PAYMENT_PROCESSING_COMPLETED`事件携带*发票*领域对象（见图
    2-2）。这些领域对象的定义必须通过领域驱动设计，在领域专家和开发人员的协作下仔细推导得出。


    ### 注意


    领域驱动设计有其固有的挑战。一个挑战是让领域专家在整个项目执行过程中参与进来。建立通用语言也需要相当长的时间，这需要领域专家和开发人员之间良好的协作。与开发跨越所有领域的单体应用不同，为给定领域构建解决方案并封装特定领域的业务逻辑，需要开发人员转变思维方式，这也具有挑战性。

    '
- fmt: '### Bounded Context


    As we discussed, one of the most challenging parts of a microservices design is
    to scope out a microservice. This is where the SOA and its implementations had
    poorly defined the scope. In SOA, while doing a design, we take into consideration
    the entire enterprise. It will not worry about individual business domains, but
    rather the enterprise as a whole. It will not worry about inventory and order
    management, billing and finance, delivery and customer management as separate
    independent domains—but rather will treat the complete system as an enterprise
    e-commerce application.


    Figure [2-3](#461146_1_En_2_Chapter.xhtml#Fig3) illustrates the layered architecture
    of an e-commerce application done by an SOA architect. For anyone from some SOA
    background, this should look quite familiar. What we have here is a monolithic
    application. Even though the service layer exposes some functionality as services,
    none is decoupled from each other. The scoping of services was not done based
    on the business domain they belong to. For example, the `Order Processing` service
    may also deal with billing and delivery. In Chapter [1](#461146_1_En_1_Chapter.xhtml),
    “The Case for Microservices,” we discussed the deficiencies of such a monolithic
    architecture.


    ![../images/461146_1_En_2_Chapter/461146_1_En_2_Fig3_HTML.jpg](images/461146_1_En_2_Chapter/461146_1_En_2_Fig3_HTML.jpg)


    Figure 2-3


    A layered architecture of an e-commerce application


    As we discussed in the previous section, domain-driven design helps scope out
    microservices. The scoping of a microservice is done around a *bounded context*.
    The bounded context is at the heart of a microservices design. Eric Evans first
    introduced bounded context as a design pattern in his book *Domain-Driven Design:
    Tackling Complexity in the Heart of Software*. The idea is that any given domain
    consists of multiple bounded contexts, and each bounded context encapsulates related
    functionalities into domain models and defines integration points to other bounded
    contexts. In other words, each bounded context has an explicit interface, where
    it defines what models to share with other contexts. By explicitly defining what
    models should be shared, and not sharing the internal representation, we can avoid
    the potential pitfalls that can result in tight coupling. These modular boundaries
    are great candidates for microservices. In general, microservices should cleanly
    align to bounded contexts. If the service boundaries are aligned to the bounded
    contexts of the corresponding domain, and the microservices represent those bounded
    contexts, that’s a great indication that the microservices are loosely coupled
    and strongly cohesive.


    ### Note


    A bounded context is an explicit boundary within which a domain model exists.
    Inside the boundary all terms and phrases of the ubiquitous language have a specific
    meaning, and the model reflects the language with exactness.^([¹](#fn1))


    Let’s extend our previous example with bounded contexts. There we identified four
    domains: inventory and order management, billing and finance, delivery, and customer
    management. Each microservice we designed attached to one of those domains. Even
    though we have one-to-one relationship between a microservice to a domain, we
    know by now that one domain can have more than one bounded context, hence more
    than one microservices. For example, if you take the inventory & order management
    domain, we have the `Order Processing` microservice, but we also can have multiple
    other microservices as well, based on different bounded contexts (e.g., the `Inventory`
    microservice). To do that, we need to take a closer look at the key functions
    provided under the inventory and order management domain and identify the corresponding
    bounded contexts.


    ### Note


    It is recommended that bounded contexts maintain their separation by each having
    its own team, codebase, and the database schema.


    The inventory and order management department of an enterprise takes care of managing
    stocks and makes sure customer demand can be met with the existing stocks. It
    should also know when to order more stocks from suppliers to optimize the sales
    as well as the storage facilities. Whenever it receives a new order, it has to
    update the inventory and lock the corresponding items for delivery. Once the payment
    is done and confirmed by the billing department, the delivery department has to
    locate the item in its warehouse and make it available for pick up and delivery.
    At the same time, whenever the available quantity of an item in the store reaches
    some threshold value, the inventory and order management department should contact
    the suppliers to get more, and once received, should update the inventory.


    One of the key highlights of the domain-driven design is the collaboration between
    domain experts and the developers. Unless you have proper understanding of how
    an inventory management department works within an enterprise, you will never
    identify the corresponding bounded contexts. With our limited understanding of
    inventory management, based on what was discussed before, we can identify the
    following three bounded contexts.


    - *Order processing* : This bounded context encapsulates the functionality related
    to processing an order, which includes locking the items in the order in the inventory,
    recording orders against the customer, etc.

    - *Inventory* : Inventory itself can be treated as a bounded context. This takes
    care of updating the stocks upon receiving items from suppliers and releasing
    for delivery.

    - *Supplier management* : This bounded context encapsulates the functionality
    related to managing suppliers. Upon releasing an item for delivery, supplier management
    checks whether it has enough stocks in the inventory, and if not, it notifies
    the corresponding suppliers.


    Figure [2-4](#461146_1_En_2_Chapter.xhtml#Fig4) illustrates multiple microservices
    under the inventory and order management domain, representing each of the bounded
    contexts. Here the service boundaries are aligned to the bounded contexts of the
    corresponding domain. The communication between bounded contexts happens only
    via message passing against well-defined interfaces. As per Figure [2-4](#461146_1_En_2_Chapter.xhtml#Fig4),
    the `Order Processing` microservice first updates the `Inventory` microservice
    to lock the items in the order and then triggers the `ORDER_PROCESSING_COMPLETED`
    event. The `Billing` microservice listening to the `ORDER_PROCESSING_COMPLETED`
    event executes payment processing and then triggers the `PAYMENT_PROCESSING_COMPLETED`
    event. The `Supplier Management` microservice listening to the `PAYMENT_PROCESSING_COMPLETED`
    event checks whether the number of items in the stocks is above the minimal threshold
    and if not notifies the suppliers. The `Delivery` microservice listening to the
    same event executes its operations to look up the items (probably sending instructions
    to warehouse bots) and then groups the items together to build the order and make
    it ready for delivery. Once that’s done, the `Delivery` microservice will trigger
    the `ORDER_DISPATCHED` event, which notifies the `Order Processing` microservice,
    and will update the order status.


    ![../images/461146_1_En_2_Chapter/461146_1_En_2_Fig4_HTML.jpg](images/461146_1_En_2_Chapter/461146_1_En_2_Fig4_HTML.jpg)


    Figure 2-4


    Communication between bounded contexts


    A good design will scope out one microservice to a single bounded context. Any
    microservice expanding across multiple bounded contexts deviates from the original
    goals. When we have one microservice, encapsulating the business logic behind
    a well defined interface and representing one bounded context, bringing in new
    changes will have no or minimal impact on the complete system.'
