  trans: '

    ### REST


    表述性状态传递（REST）是一种基于超媒体构建分布式系统的架构风格。REST 模型使用导航方案来通过网络表示对象和服务，这些对象和服务被称为资源。客户端可以使用唯一的
    URI 访问资源，并返回该资源的表示形式。REST 不依赖于任何实现协议，但最常见的实现是 HTTP 应用协议。在使用 HTTP 协议访问 RESTful
    资源时，资源的 URL 作为资源标识符，而 `GET`、`PUT`、`DELETE`、`POST` 和 `HEAD` 是对该资源执行的标准 HTTP 操作。REST
    架构风格本质上基于同步消息传递。


    为了理解如何在服务开发中使用 REST 架构风格，让我们考虑在线零售应用的订单管理场景。我们可以将订单管理场景建模为一个名为“订单处理”的 RESTful
    服务。如图 3-1 所示，你可以为此服务定义资源 *order*。


    ![../images/461146_1_En_3_Chapter/461146_1_En_3_Fig1_HTML.jpg](img/461146_1_En_3_Fig1_HTML.jpg)


    图 3-1


    可以在订单处理 RESTful 服务上执行的不同操作


    要下新订单，你可以使用包含订单内容的 HTTP `POST` 消息，该消息发送到 URL（`http://xyz.retail.com/order`）。来自服务的响应包含一条
    `HTTP 201 Created` 消息，其中 location 标头指向新创建的资源（`http://xyz.retail.com/order/123456`）。现在，你可以通过发送
    HTTP `GET` 请求从该 URL 检索订单详情。类似地，你可以使用适当的 HTTP 方法更新订单和删除订单。


    由于 REST 是一种风格，在实现 RESTful 服务时，我们需要确保我们的 RESTful 服务完全符合 REST 的核心原则。事实上，目前大多数 RESTful
    服务都违反了核心的 REST 风格概念。为了设计一个合适的 RESTful 服务，Leonard Richardson [定义](https://www.crummy.com/writing/speaking/2008-QCon/act3.html)^(²³)了一个基于
    REST 服务的成熟度模型。


    #### Richardson 成熟度模型


    *Richardson 成熟度模型*包含四个层级：


    *   *第 0 级 –* *PoX 沼泽*：处于此级别的服务实际上不被视为 RESTful。例如，假设有一个通过 HTTP 暴露的 SOAP Web 服务来实现在线零售功能。该服务只有一个
    URL（`http://xyz.retail.com/legacy/RetailService`），并根据请求的内容决定需要执行的操作（订单处理、客户管理、产品搜索等）。它使用单一的
    HTTP 方法（大多数情况下是 `POST`），并且没有使用任何 HTTP 结构或概念来实现服务逻辑。一切都基于消息的内容。第 0 级服务的最佳示例是任何
    SOAP Web 服务。


    *   *第 1 级 –* *资源 URI*：当服务为每个资源拥有独立的 URI，但消息仍然包含操作细节时，该服务被认为处于此级别。例如，零售应用可以拥有
    /orders、/products、/customers 等资源，但针对给定资源的 CRUD（创建、读取、更新、删除）操作仍然通过消息内容完成。不使用 HTTP
    方法或响应状态码。


    *   *第 2 级 –* *HTTP 动词*：我们可以使用 HTTP 动词来代替使用消息内容确定操作。因此，发送到 /order 上下文的 HTTP `POST`
    消息可以添加一个新订单（订单详情在消息内容中给出，但现在我们没有操作细节）。此外，应该支持适当的 HTTP 状态码。例如，无效请求的响应应为状态码 500。我们在图
    3-1 中展示的示例具备了所有这些能力。处于第 2 级或更高级别的 RESTful 服务被认为是合适的 REST API。


    *   *第 3 级 –* *超媒体控制*：在第 3 级，服务响应包含控制客户端应用状态的链接。这个概念通常被称为 HATEOAS（超媒体作为应用状态引擎）。超媒体控制告诉我们接下来可以做什么，以及需要操作哪个资源的
    URI 来完成它。我们无需知道下一步请求应该发往何处，响应中的超媒体会告诉我们如何操作。


    由于 REST 主要基于 HTTP 实现（HTTP 被广泛使用、复杂性较低且对防火墙友好），REST 是微服务实现所采用的最常见的微服务通信风格。让我们考虑使用
    RESTful 微服务时的一些最佳实践。


    *   基于 HTTP 的 RESTful 微服务（REST 独立于实现协议，但实践中没有使用非 HTTP 的 RESTful 服务）适合面向外部的微服务（或
    API），因为通过现有基础设施（如防火墙、反向代理、负载均衡器等）更容易暴露它们。


    *   资源范围应该是细粒度的，以便我们可以将其直接映射到与操作相关的业务能力（例如，添加订单）。


    *   使用 Richardson 成熟度模型和其他 RESTful 服务最佳实践来设计服务。


    *   在适用时使用版本控制策略。（当你决定将服务作为 API 暴露时，版本控制通常在 API 网关级别实现。我们将在第 7 章详细讨论这一点。）


    由于许多微服务框架将 REST 作为其事实上的风格，你可能会倾向于将其用于所有微服务实现。但你应该仅在 REST 最适合你的用例时才使用它。（请务必考虑本章讨论的其他合适风格。）


    ### 动手尝试


    你可以在第 4 章“开发服务”中尝试一个 RESTful Web 服务示例。

    '
- fmt: '### gRPC


    Remote Procedure Calls (RPC) was a popular inter-process communication technology
    for building client-server applications in distributed systems. It was quite popular
    before the advent of web services and RESTful services. The key objective of RPC
    is to make the process of executing code on a remote machine as simple and straightforward
    as calling a local function. Most conventional RPC implementations, such as CORBA,
    have drawbacks, such as the complexity involved in remote calls and using TCP
    as the transport protocol. Most conventional RPC technologies have lost their
    popularity. So you may wonder why we are talking about another RPC technology,
    gRPC.


    `gRPC`^([^(24)](#fn24)) (gRPC Remote Procedure Calls) was originally developed
    by Google as an internal project called Stubby, which focused on high performance
    inter-service communication technology. Later it was open sourced as `gRPC`. There
    are alternatives such as Thrift, which is really fast. But Thrift-based communication
    required a lot of work from the developer side, as it exposed the low-level network
    details to the users (it exposes raw sockets), which made life harder for the
    developers. Also, being based on TCP is also a major limitation, as it’s not suitable
    for modern web APIs and mobile devices.


    `gRPC` enables the communication between applications built on top of heterogeneous
    technologies. It is based on the idea of defining a service and specifying the
    methods that can be called remotely with their parameters and return types. `gRPC`
    tries to overcome most of the limitations of the traditional RPC implementations.


    By default, `gRPC` uses protocol buffers^([^(25)](#fn25)), Google’s mature open
    source mechanism for serializing structured data (can be used with other data
    formats such as JSON). Protocol buffers are a flexible, efficient, automated mechanism
    for serializing structured data. `gRPC` uses protocol buffers, such as the Interface
    Definition Language (IDL), to describe both the service interface and the structure
    of the payload messages. Once a service is defined using the protocol buffer IDL,
    the service consumers can create a server skeleton and the client can create the
    stub to invoke the service in multiple programming languages.


    Using HTTP2 as the transport protocol is a key reason for the success and wide
    adaptation of `gRPC`. So, it’s quite handy to understand the advantages that HTTP2
    contains.


    ### A Glimpse of HTTP2


    Despite its wide adaptation, HTTP 1.1 has several limitations that hinder modern
    web scale computing. The main limitations of HTTP 1.1 are:


    *   *Head of line blocking*: Each connection can handle one request at a time.
    If the current request is blocked, then the next request will wait. Therefore,
    we have to maintain multiple connections between the client and server to support
    real use cases. HTTP1.1 defines a pipeline to overcome this, but it’s not widely
    adopted.

    *   *HTTP 1.1 protocol overhead*: In HTTP 1.1, many headers are repeated across
    multiple requests. For example, headers such as `User-Agent` and `Cookie` are
    sent over and over, which is a waste of bandwidth. HTTP 1.1 defines the GZIP format
    to compress the payload, but that doesn’t apply to the headers.


    HTTP2 came up with solutions for most of these limitations. Most importantly,
    HTTP2 extends the HTTP capabilities, which makes it fully backward compatible
    with existing applications.


    All communication between a client and server is performed over a single TCP connection
    that can carry any number of bidirectional *flows of bytes*. HTTP2 defines the
    concept of a *stream*, which is a bidirectional flow of bytes within an established
    connection, which may carry one or more messages. *Frame* is the smallest unit
    of communication in HTTP2, and each frame contains a frame header, which at a
    minimum identifies the stream to which the frame belongs. A *message* is a complete
    sequence of frames that map to a logical HTTP message, such as a request or response,
    which consists of one or more frames. So, based on this approach, the request
    and response can be fully multiplexed, by allowing the client and server to break
    down an HTTP message into independent frames, interleave them, and then reassemble
    them on the other end.


    HTTP2 avoids header repetition and introduces header compression to optimize the
    use of bandwidth. It also introduces a new feature of sending server push messages
    without using the request-response style messages. HTTP2 is also a binary protocol,
    which boosts its performance. It also supports message priorities out of the box.


    ### Inter-Service Communication with gRPC


    By now you should have a good understanding of the advantages of HTTP2 and how
    it helps `gRPC` to perform better. Let’s dive into a complete example that’s implemented
    using `gRPC`. As illustrated in Figure [3-2](#461146_1_En_3_Chapter.xhtml#Fig2),
    suppose that, in our online retail application example, there is a `Returns` service
    calling a `Product Management` service to update the product inventory with returned
    items. The `Returns` service is implemented using Java and the `Product Management`
    service is implemented using the Go language. The `Product Management` service
    is using `gRPC` and it exposes its contract via the `ProductMgt.proto` file.


    ![../images/461146_1_En_3_Chapter/461146_1_En_3_Fig2_HTML.jpg](images/461146_1_En_3_Chapter/461146_1_En_3_Fig2_HTML.jpg)


    Figure 3-2


    `gRPC` communication


    So, the `Product Management` service developer will use the `ProductMgt.proto`
    file to generate the server-side skeleton in the Go language. Basically, the developer
    uses this in his project and complies it, so that it generates the service and
    client stubs. To implement the service, we can use the generated service stub
    and implement the required business logic of that service.


    The consumer, which is the `Returns` service, can use the same `ProductMgt.proto`
    file to generate the client-side stub (in Java) and invoke the service. The `Product
    Management` service, which has an operation to add products, will have a `ProductMgt.proto`
    definition similar to the following.


    ```

    // ProductMgt.proto

    syntax = "proto3";

    option java_multiple_files = true;

    option java_package = "kasun.mfe.ecommerce";

    option java_outer_classname = "EcommerceProto";

    option objc_class_prefix = "HLW";

    package ecommerce;

    service ProductMgt {

    rpc AddProduct (ProductRequest) returns (ProductResponse) {}

    }

    message ProductRequest {

    string productID = 1;

    string name = 2;

    string description = 3;

    }

    message ProductResponse {

    string productID = 1;

    string status = 2;

    }

    ```


    Under the hood, when a client invokes the service, the client-side `gRCP` library
    uses the `Proto Buf` and marshals the remote function call, which is then sent
    over HTTP2. At the server side, the request is un-marshaled and the respective
    function invocation is executed using `Proto Buf`. The response follows a similar
    execution flow from the server to the client.'
