- fmt: '# Publishing Logs to Fluentd from a Microservice Running in a Docker Container


    Here we are going to use the same `Order Processing` microservice, which we discussed
    through out the book, but instead of building it from the source code, we are
    going to pull it from the Docker hub. The following command will spin up a Docker
    container (having the image name `prabath/sample01`) with the `Order Processing`
    microservice.


    ```

    :\> docker run -d -p 9000:9000 --log-driver=fluentd prabath/sample01

    ```


    In this command, we use the `log-driver` argument with the value `fluentd`^([^(166)](#fn166)).
    Docker uses this driver to publish logs from the `stdout`^([^(167)](#fn167)) (by
    default) to the Fluentd daemon (or the container, which runs Fluentd). The microservices
    developer does not need to make any changes here or do anything specific to Fluentd.
    By default, the `fluentd` log driver connects to `localhost:24224` over TCP. If
    we run Fluentd on a different port, we need to pass the `fluentd-address` argument
    to the `docker run` command, with a value pointing to the Fluentd container (e.g.,
    `fluentd-address=localhost:28444`).


    If it all works fine, once the `Order Processing` service is started, we should
    see some logs available in the `~/data` directory in the host filesystem. This
    is the directory we used to create a Docker volume before.


    ### Note


    A comprehensive introduction to Fluentd is out of the scope of this book. We recommend
    readers looking for details to refer to the Fluentd documentation available at
    [`https://docs.fluentd.org/`](https://docs.fluentd.org/).


    ## How It Works


    Fluentd uses a config file, which defines the input sources and the output targets.
    By default it is in the `/fluentd/etc` directory of the container filesystem where
    Fluentd is running. The file is called `fluent.conf`. Let’s look at the default
    content of `fluent.conf`. The `source` tag defines where the data comes from.
    Under that we have `forward` and `port` elements, which make Fluentd accepts messages
    on port 24224 over TCP. The responsibility of the `source` tag is to accept messages
    and hand them over to the Fluentd routing engine as events. Each event has three
    elements: tag, time, and record. The sender (in our case the fluentd driver) defines
    the value of the tag.


    ### Note


    You can find all the configurations related to the fluentd Docker image from here:
    [`https://hub.docker.com/r/fluent/fluentd/`](https://hub.docker.com/r/fluent/fluentd/).
    It also explains how to override the default Fluentd configuration file, which
    ships with the image.


    ```

    @type  forward

    @id    input1

    @label @mainstream

    port  24224


    @type stdout


    @type file

    @id   output_docker1

    path         /fluentd/log/docker.*.log

    symlink_path /fluentd/log/docker.log

    append       true

    time_slice_format %Y%m%d

    time_slice_wait   1m

    time_format       %Y%m%dT%H%M%S%z


    @type file

    @id   output1

    path         /fluentd/log/data.*.log

    symlink_path /fluentd/log/data.log

    append       true

    time_slice_format %Y%m%d

    time_slice_wait   10m

    time_format       %Y%m%dT%H%M%S%z

    ```


    The `match` element will tell Fluentd what to do with the matching messages. It
    matches the value of the `tag` element in each event with the criteria defined
    in the `match` element. In our case, it checks whether the `tag` starts with the
    word `docker`. The most common use case of the `match` element is to define the
    output targets. In the previous configuration, the output is written to a file
    in the `/fluentd/log` directory (in the container). If we want to send the output
    to different other systems, we can use any of the available Fluentd plugins^([^(168)](#fn168)).
    Finally, the `label` element defined under the `source` element acts as a reference.
    For example, when the `match` element gets executed, if there is a `label` defined
    under the `source`, then only the `match` element under the corresponding `label`
    will get executed. The objective of the `label` element is to reduce the configuration
    file complexity.


    ### Note


    Logstash^([^(169)](#fn169)), which is part of the well-known ELK (ElasticSearch,
    Logstash, Kibana) stack, provides similar functionality to Fluentd. Before you
    pick a logging solution for your enterprise, we recommend evaluating the pros
    and cons of both Fluentd and Logstash.


    ## Using Fluentd in a Microservices Deployment


    In this section, we see how to extend this Fluentd example architecturally to
    fit into a production microservices deployment. As we discussed (and as shown
    in Figure [13-21](#461146_1_En_13_Chapter.xhtml#Fig21)), each Kubernetes pod (which
    we discussed in Chapter [8](#461146_1_En_8_Chapter.xhtml)) will have an instance
    of Fluentd running in a container. This container can be treated as a sidecar.
    Each microservice in our deployment will have a similar setup. Each Fluentd node
    can filter out the logs they need and publish them to another Fluentd node, which
    can do the log aggregation. This Fluentd node also can decide what other target
    systems it has to publish logs.


    ![../images/461146_1_En_13_Chapter/461146_1_En_13_Fig21_HTML.jpg](images/461146_1_En_13_Chapter/461146_1_En_13_Fig21_HTML.jpg)


    Figure 13-21


    Fluentd in a production deployment


    ## Summary


    In this chapter, we discussed one of the key aspects of the microservices architecture—the
    observability—and the three pillars behind observability—logging, metrics, and
    tracing. We also discussed distributed tracing, which is in fact the most important
    enabler of observability. Distributed tracing helps tracing a request, which spans
    across multiple systems. We used Spring Cloud Sleuth, Zipkin, and Jaeger to build
    a distributed tracing system and used Prometheus and Grafana for visualization,
    monitoring, and alerting. Finally, we discussed how to use Fluentd, an extensible
    log-collection tool, in a containerized deployment.


