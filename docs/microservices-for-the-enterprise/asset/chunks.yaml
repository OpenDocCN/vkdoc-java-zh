  trans: '

    ### 注意


    OAuth 2.0 核心规范（RFC 6749^(¹⁴⁹)）定义了五种授权类型：授权码、隐式、密码、客户端凭证和刷新。授权码授权类型是最流行的授权类型，超过
    70% 的 Web 应用程序都在使用它。事实上，对于许多用例来说，无论是 Web 应用程序、原生移动应用程序，甚至是单页应用程序（SPA），它都是推荐的授权类型。


    ![../images/461146_1_En_11_Chapter/461146_1_En_11_Fig10_HTML.jpg](img/461146_1_En_11_Fig10_HTML.jpg)


    图 11-10


    OAuth 2.0 协议


    任何想要通过 API 网关访问微服务的系统都必须首先获取一个有效的 OAuth 令牌（见图 11-11）。一个系统可以仅凭自身身份访问微服务，也可以代表另一个用户进行访问。对于后一种情况，一个例子是当用户登录到
    Web 应用程序，然后该 Web 应用程序代表登录用户访问微服务。当一个系统想要代表另一个用户访问 API 时，授权码是推荐的授权类型。在其他情况下，当系统仅凭自身身份访问
    API 时，我们可以使用客户端凭证授权类型。


    ### 注意


    OAuth 2.0 访问令牌有两种类型：*引用*令牌和*自包含*令牌。引用令牌是由授权服务器颁发给客户端应用程序，供其向资源服务器使用的任意字符串。它必须有适当的长度，并且应该是不可预测的。每当资源服务器看到一个引用访问令牌时，它必须与相应的授权服务器通信以验证该令牌。自包含访问令牌是一个签名的
    JWT（或 JWS）。要验证自包含访问令牌，资源服务器无需与授权服务器通信。它可以通过验证令牌的签名来验证该令牌。


    ![../images/461146_1_En_11_Chapter/461146_1_En_11_Fig11_HTML.jpg](img/461146_1_En_11_Fig11_HTML.jpg)


    图 11-11


    端到端认证流程


    让我们看看端到端通信是如何工作的，如图 11-11 所示：


    1.  用户通过身份提供者登录 Web 应用/移动应用，该 Web 应用/移动应用通过 OpenID Connect 信任该身份提供者（也可以是 SAML
    2.0）。OpenID Connect 是一个构建在 OAuth 2.0 之上的身份联合协议。SAML 2.0 是另一个类似的身份联合协议。


    2.  Web 应用获取一个 OAuth 2.0 `access_token`、一个 `refresh_token` 和一个 `id_token`。`id_token`
    将用于向 Web 应用标识最终用户。OpenID Connect 将 `id_token` 引入到 OAuth 流程中。如果使用 SAML 2.0，那么 Web
    应用需要与其信任的 OAuth 授权服务器的令牌端点通信，并按照 OAuth 2.0 的 SAML 2.0 授权类型，将 SAML 令牌交换为 OAuth
    `access_token`。每个 `access_token` 都有一个过期时间，当 `access_token` 过期或即将过期时，OAuth 客户端可以使用
    `refresh_token` 与授权服务器通信（无需最终用户参与）并获取一个新的 `access_token`。


    3.  Web 应用代表最终用户调用 API——将 `access_token` 与 API 请求一起传递。


    4.  API 网关拦截来自 Web 应用的请求，提取 `access_token`，并与令牌交换端点（或 STS）通信，该端点将验证 `access_token`，然后向
    API 网关颁发一个 JWT（由其签名）。此 JWT 还将携带用户上下文。当 STS 验证 `access_token` 时，它将通过 API（RFC 7662^(¹⁵⁰)
    定义的 Introspection API）与相应的 OAuth 授权服务器通信。


    5.  API 网关将 JWT 与请求一起传递给下游微服务。


    6.  每个微服务将验证其收到的 JWT，然后，对于下游服务调用，它可以创建一个由自身签名的新 JWT，并将其与请求一起发送。另一种方法是使用嵌套 JWT——这样新
    JWT 也将携带之前的 JWT。此外，还有第三种方法，即每个微服务与安全令牌服务通信，并将其获得的令牌交换为新令牌，以便与其他下游微服务通信。


    ### 注意


    关于 OAuth 2.0 和 OpenID Connect 的详细解释超出了本书的范围。我们鼓励感兴趣的读者阅读本书作者之一撰写并由 Apress 出版的《高级
    API 安全》一书。


    采用这种方法，只有来自外部客户端的 API 调用会通过 API 网关。当一个微服务与另一个微服务通信时，则无需通过网关。此外，从某个微服务的角度来看，无论请求是来自外部客户端还是另一个微服务，它收到的都是一个
    JWT——因此这是一个对称的安全模型。


    ## 访问控制


    授权是一项业务功能。每个微服务都可以决定允许访问其操作的标准。在最简单的授权形式中，我们检查给定用户是否可以对特定资源执行给定操作。操作和资源的组合称为权限。授权检查评估给定用户是否拥有访问给定资源所需的最小权限集。资源可以定义谁可以执行操作以及他们可以执行哪些操作。声明给定资源所需权限的方式有多种。最常见的方式是为资源附加一个策略或访问控制列表（ACL）。有多种策略语言用于表达这些访问控制需求。如果您熟悉
    Amazon Web Services（AWS），您可能已经注意到那里使用的相当简单但强大的基于 JSON 的策略语言^(¹⁵¹)，如下所示。


    ```

    {

    "Version": "2012-10-17",

    "Statement": {

    "Effect": "Allow",

    "Action": "s3:ListBucket",

    "Resource": "arn:aws:s3:::example_bucket"

    }

    }

    ```


    Open Policy Agent^(¹⁵²)（OPA）引入了另一种策略语言，主要针对云原生环境的基于策略的控制。以下展示了在 OPA 中定义的一个示例策略，该策略允许访问所有
    HTTP 请求。


    ```

    package http.authz

    allow = true

    ```


    XACML（可扩展访问控制标记语言）提供了另一种定义访问控制策略的方式。它迄今为止是策略语言方面唯一的（由 OASIS 制定的）标准。下一节将深入探讨 XACML。

    '
- fmt: '# XACML (eXtensible Access Control Markup Language)


    XACML is the de-facto standard for fine-grained access control. It introduces
    a way to represent the required set of permissions to access a resource, in a
    very fine-grained manner in an XML-based domain-specific language (DSL).


    XACML provides a reference architecture, a request response protocol, and a policy
    language. Under the reference architecture, it talks about a Policy Administration
    Point (`PAP`), a Policy Decision Point (`PDP`), a Policy Enforcement Point (`PEP`),
    and a Policy Information Point (`PIP`). This is a highly distributed architecture
    in which none of the components is tightly coupled. The `PAP` is the place where
    you author policies. The `PDP` is the place where policies are evaluated and decisions
    are made. While evaluating policies, if there is any missing information that
    can’t be derived from the XACML request, the `PDP` calls the `PIP`. The role of
    the `PIP` is to feed the `PDP` any missing information, which can be user attributes
    or any other required details. The policy is enforced through a `PEP`, which sits
    between the client and the service and intercepts all requests. From the client
    request, it extracts certain attributes such as the subject, the resource, and
    the action; then it builds a standard XACML request and calls the `PDP`. Then
    it gets a XACML response from the `PDP`. That is defined under the XACML request/response
    model. The XACML policy language defines a schema to create XACML policies for
    access control.


    Figure [11-12](#461146_1_En_11_Chapter.xhtml#Fig12) shows the XACML component
    architecture. The policy administrator first needs to define XACML policies via
    the `PAP` (Policy Administration Point) and those policies will get stored in
    the policy store. To check whether a given entity has the permission to access
    a given resource, the `PEP` (Policy Enforcement Point) has to intercept the access
    request, create a XACML request, and send it to the XACML `PDP` (Policy Decision
    Point). The XACML request can carry any attributes that could help the decision-making
    process at the `PDP`.


    ![../images/461146_1_En_11_Chapter/461146_1_En_11_Fig12_HTML.jpg](images/461146_1_En_11_Chapter/461146_1_En_11_Fig12_HTML.jpg)


    Figure 11-12


    XACML component architecture


    For example, it can include the subject identifier, the resource identifier, and
    the action the given subject is going to perform on the resource. The microservice
    that needs to authorize the user has to build a XACML request by extracting the
    relevant attributes from the JWT and talk to the `PDP`. The `PIP` (Policy Information
    Point) comes into the picture when the `PDP` finds that certain attributes required
    for policy evaluation are missing in the XACML request. Then the `PDP` will talk
    to the `PIP` to find the missing attributes. The `PIP` can connect to relevant
    datastores, find the attributes, and then feed those into the `PDP`.


    ## Note


    XACML is an XML-based open standard for policy-based access control developed
    under the OASIS XACML technical committee. The latest XACML 3.0 specification
    was standardized in January 2013. See [`www.oasis-open.org/committees/tc_home.php?wg_abbrev=xacml`](https://www.oasis-open.org/committees/tc_home.php%253Fwg_abbrev%253Dxacml).


    There are two main ways to bring in a policy decision point (`PDP`) to the microservices
    architecture. In fact `PDP` is an implementation-agnostic term; it does not have
    a deep coupling to the policy language in terms of the architectural perspective.
    As shown in Figure [11-13](#461146_1_En_11_Chapter.xhtml#Fig13), one way is to
    treat the `PDP` as a single, remote endpoint, where all the microservices connect
    to authorize the access requests. Each microservice will create its own XACML
    request and pass it over a communication channel to the `PDP`. `PDP` evaluates
    the request against the corresponding policies and sends back the XACML response.


    ![../images/461146_1_En_11_Chapter/461146_1_En_11_Fig13_HTML.jpg](images/461146_1_En_11_Chapter/461146_1_En_11_Fig13_HTML.jpg)


    Figure 11-13


    Centralized/remote XACML PDP


    Figure [11-14](#461146_1_En_11_Chapter.xhtml#Fig14) shows an example XACML request
    in JSON. Here we can assume that someone invokes the `bar` microservice to buy
    a beer. The `bar` microservice extracts the subject or the user who invokes the
    service from the JWT coming along with the request and builds the XACML request
    accordingly.


    ![../images/461146_1_En_11_Chapter/461146_1_En_11_Fig14_HTML.jpg](images/461146_1_En_11_Chapter/461146_1_En_11_Fig14_HTML.jpg)


    Figure 11-14


    XACML request in JSON


    ## Note


    With the increasing popularity and adaptation of APIs, it becomes crucial for
    XACML to be easily understood in order to increase the likelihood that it will
    be adopted. XML is often considered too verbose. Developers increasingly prefer
    a lighter representation using JSON, the JavaScript Object notation. The profile
    “Request / Response Interface based on JSON and HTTP for XACML 3.0” aims at defining
    a JSON format for the XACML request and response.


    See [`https://www.oasis-open.org/committees/document.php?document_id=47775`](https://www.oasis-open.org/committees/document.php%253Fdocument_id%253D47775).'
  raw: '### XACML (eXtensible Access Control Markup Language)


    XACML is the de-facto standard for fine-grained access control. It introduces
    a way to represent the required set of permissions to access a resource, in a
    very fine-grained manner in an XML-based domain-specific language (DSL).


    XACML provides a reference architecture, a request response protocol, and a policy
    language. Under the reference architecture, it talks about a Policy Administration
    Point (PAP), a Policy Decision Point (PDP), a Policy Enforcement Point (PEP),
    and a Policy Information Point (PIP). This is a highly distributed architecture
    in which none of the components is tightly coupled. The PAP is the place where
    you author policies. The PDP is the place where policies are evaluated and decisions
    are made. While evaluating policies, if there is any missing information that
    can’t be derived from the XACML request, the PDP calls the PIP. The role of the
    PIP is to feed the PDP any missing information, which can be user attributes or
    any other required details. The policy is enforced through a PEP, which sits between
    the client and the service and intercepts all requests. From the client request,
    it extracts certain attributes such as the subject, the resource, and the action;
    then it builds a standard XACML request and calls the PDP. Then it gets a XACML
    response from the PDP. That is defined under the XACML request/response model.
    The XACML policy language defines a schema to create XACML policies for access
    control.


    Figure [11-12](#461146_1_En_11_Chapter.xhtml#Fig12) shows the XACML component
    architecture. The policy administrator first needs to define XACML policies via
    the PAP (Policy Administration Point) and those policies will get stored in the
    policy store. To check whether a given entity has the permission to access a given
    resource, the PEP (Policy Enforcement Point) has to intercept the access request,
    create a XACML request, and send it to the XACML PDP (Policy Decision Point).
    The XACML request can carry any attributes that could help the decision-making
    process at the PDP.


    ![../images/461146_1_En_11_Chapter/461146_1_En_11_Fig12_HTML.jpg](images/461146_1_En_11_Chapter/461146_1_En_11_Fig12_HTML.jpg)


    Figure 11-12


    XACML component architecture


    For example, it can include the subject identifier, the resource identifier, and
    the action the given subject is going to perform on the resource. The microservice
    that needs to authorize the user has to build a XACML request by extracting the
    relevant attributes from the JWT and talk to the PDP. The PIP (Policy Information
    Point) comes into the picture when the PDP finds that certain attributes required
    for policy evaluation are missing in the XACML request. Then the PDP will talk
    to the PIP to find the missing attributes. The PIP can connect to relevant datastores,
    find the attributes, and then feed those into the PDP.


    ### Note


    XACML is an XML-based open standard for policy-based access control developed
    under the OASIS XACML technical committee. The latest XACML 3.0 specification
    was standardized in January 2013\. See [`www.oasis-open.org/committees/tc_home.php?wg_abbrev=xacml`](https://www.oasis-open.org/committees/tc_home.php%253Fwg_abbrev%253Dxacml)
    .


    There are two main ways to bring in a policy decision point (PDP) to the microservices
    architecture. In fact PDP is an implementation-agnostic term; it does not have
    a deep coupling to the policy language in terms of the architectural perspective.
    As shown in Figure [11-13](#461146_1_En_11_Chapter.xhtml#Fig13), one way is to
    treat the PDP as a single, remote endpoint, where all the microservices connect
    to authorize the access requests. Each microservice will create its own XACML
    request and pass it over a communication channel to the PDP. PDP evaluates the
    request against the corresponding policies and sends back the XACML response.


    ![../images/461146_1_En_11_Chapter/461146_1_En_11_Fig13_HTML.jpg](images/461146_1_En_11_Chapter/461146_1_En_11_Fig13_HTML.jpg)


    Figure 11-13


    Centralized/remote XACML PDP


    Figure [11-14](#461146_1_En_11_Chapter.xhtml#Fig14) shows an example XACML request
    in JSON. Here we can assume that someone invokes the `bar` microservice to buy
    a beer. The `bar` microservice extracts the subject or the user who invokes the
    service from the JWT coming along with the request and builds the XACML request
    accordingly.


    ![../images/461146_1_En_11_Chapter/461146_1_En_11_Fig14_HTML.jpg](images/461146_1_En_11_Chapter/461146_1_En_11_Fig14_HTML.jpg)


    Figure 11-14


    XACML request in JSON


    ### Note


    With the increasing popularity and adaptation of APIs, it becomes crucial for
    XACML to be easily understood in order to increase the likelihood that it will
    be adopted. XML is often considered too verbose. Developers increasingly prefer
    a lighter representation using JSON, the JavaScript Object notation. The profile
    “Request / Response Interface based on JSON and HTTP for XACML 3.0” aims at defining
    a JSON format for the XACML request and response.


    See [`https://www.oasis-open.org/committees/document.php?document_id=47775`](https://www.oasis-open.org/committees/document.php%253Fdocument_id%253D47775)
    .'
  trans: '

    ### XACML（可扩展访问控制标记语言）


    XACML 是细粒度访问控制的事实标准。它引入了一种方法，能够以非常精细的方式，在基于 XML 的领域特定语言（DSL）中表示访问资源所需的一组权限。


    XACML 提供了一个参考架构、一个请求响应协议以及一个策略语言。在参考架构下，它涉及策略管理点（PAP）、策略决策点（PDP）、策略执行点（PEP）和策略信息点（PIP）。这是一个高度分布式的架构，其中没有任何组件是紧密耦合的。PAP
    是您编写策略的地方。PDP 是评估策略并做出决策的地方。在评估策略时，如果缺少任何无法从 XACML 请求中推导出的信息，PDP 会调用 PIP。PIP 的作用是向
    PDP 提供任何缺失的信息，这些信息可以是用户属性或任何其他必需的细节。策略通过 PEP 来执行，PEP 位于客户端和服务之间，并拦截所有请求。从客户端请求中，它提取某些属性，例如主体、资源和操作；然后构建一个标准的
    XACML 请求并调用 PDP。接着，它会从 PDP 获取一个 XACML 响应。这定义在 XACML 请求/响应模型下。XACML 策略语言定义了一个模式，用于创建用于访问控制的
    XACML 策略。


    图 11-12 展示了 XACML 组件架构。策略管理员首先需要通过 PAP（策略管理点）定义 XACML 策略，这些策略将被存储在策略存储库中。为了检查某个给定实体是否有权限访问给定资源，PEP（策略执行点）必须拦截访问请求，创建一个
    XACML 请求，并将其发送给 XACML PDP（策略决策点）。XACML 请求可以携带任何有助于 PDP 决策过程的属性。


    ![../images/461146_1_En_11_Chapter/461146_1_En_11_Fig12_HTML.jpg](img/461146_1_En_11_Fig12_HTML.jpg)


    图 11-12


    XACML 组件架构


    例如，它可以包含主体标识符、资源标识符以及给定主体要对资源执行的操作。需要授权用户的微服务必须通过从 JWT 中提取相关属性来构建一个 XACML 请求，并与
    PDP 通信。当 PDP 发现 XACML 请求中缺少策略评估所需的某些属性时，PIP（策略信息点）就会发挥作用。然后 PDP 会与 PIP 通信以查找缺失的属性。PIP
    可以连接到相关的数据存储，查找属性，然后将这些属性提供给 PDP。


    ### 注意


    XACML 是一种基于 XML 的开放标准，用于基于策略的访问控制，由 OASIS XACML 技术委员会开发。最新的 XACML 3.0 规范于 2013
    年 1 月标准化。参见 [`www.oasis-open.org/committees/tc_home.php?wg_abbrev=xacml`](https://www.oasis-open.org/committees/tc_home.php%253Fwg_abbrev%253Dxacml)
    。


    将策略决策点（PDP）引入微服务架构主要有两种方式。实际上，PDP 是一个与实现无关的术语；从架构角度来看，它与策略语言没有深度耦合。如图 11-13 所示，一种方式是将
    PDP 视为一个单一的远程端点，所有微服务都连接到该端点以授权访问请求。每个微服务将创建自己的 XACML 请求，并通过通信通道将其传递给 PDP。PDP
    根据相应的策略评估请求，并发回 XACML 响应。


    ![../images/461146_1_En_11_Chapter/461146_1_En_11_Fig13_HTML.jpg](img/461146_1_En_11_Fig13_HTML.jpg)


    图 11-13


    集中式/远程 XACML PDP


    图 11-14 展示了一个 JSON 格式的 XACML 请求示例。这里我们可以假设有人调用了 `bar` 微服务来购买啤酒。`bar` 微服务从随请求一起发送的
    JWT 中提取主体或调用服务的用户，并相应地构建 XACML 请求。


    ![../images/461146_1_En_11_Chapter/461146_1_En_11_Fig14_HTML.jpg](img/461146_1_En_11_Fig14_HTML.jpg)


    图 11-14


    JSON 格式的 XACML 请求


    ### 注意


    随着 API 的日益普及和适配，XACML 易于理解以增加其被采用的可能性变得至关重要。XML 通常被认为过于冗长。开发人员越来越倾向于使用 JSON（JavaScript
    对象表示法）这种更轻量的表示方式。名为“基于 JSON 和 HTTP 的 XACML 3.0 请求/响应接口”的配置文件旨在为 XACML 请求和响应定义一种
    JSON 格式。


    参见 [`https://www.oasis-open.org/committees/document.php?document_id=47775`](https://www.oasis-open.org/committees/document.php%253Fdocument_id%253D47775)
    。

    '
- fmt: '### Embedded PDP


    There are certain drawbacks to the remote or the centralized PDP model that could
    easily violate base microservices principles:


    - **Performance cost**: Each time we need to do an access control check, the corresponding
    microservice has to talk to the PDP over the wire. With decision caching at the
    client side, the transport cost and the cost of the policy evaluation can be cut
    down. But with caching, we will make security decisions based on stale data.

    - **The ownership of policy information points (PIP)**: Each microservice should
    have the ownership of its PIPs, which know where to bring in the data required
    to do the access controlling. With this approach we are building a centralized
    PDP, which has all the PIPs corresponding to all the microservices.

    - **Monolithic PDP**: The centralized PDP becomes another monolithic application.
    All the policies associated with all the microservices are stored centrally in
    the monolithic PDP. Introducing changes is hard as a change to one policy may
    have an impact on all the policies, since all the policies are evaluated under
    the same policy engine.


    As illustrated in Figure [11-15](#461146_1_En_11_Chapter.xhtml#Fig15), the embedded
    PDP will run along with each microservice. It follows an eventing model for policy
    distribution, where each microservice will subscribe to its interested topics
    to get the appropriate access control policies from the PAP and then update the
    embedded PDP. You can have PAPs by microservices teams or one globally in a multi-tenanted
    mode. When a new policy is available or when there is a policy update, the PAP
    will publish an event to the corresponding topics. The embedded PDP model introduces
    a message broker to the microservices architecture.


    ![../images/461146_1_En_11_Chapter/461146_1_En_11_Fig15_HTML.jpg](images/461146_1_En_11_Chapter/461146_1_En_11_Fig15_HTML.jpg)


    Figure 11-15 Embedded XACML PDP


    This approach does not violate the immutable server concept in microservices.
    *Immutable server* means that you build servers or containers directly out of
    configuration loaded from a repository at the end of the continuous delivery process
    and you should be able to build the same container again and again with the same
    configuration. So, we would not expect anyone to log in to a server and do any
    configuration changes there. With the embedded PDP model — even though the server
    loads the corresponding policies while it’s running — if we spin up a new container
    it too gets the same set of policies from the corresponding PAP.


    There is an important question that’s still unanswered. What is the role of the
    API gateway under the context of authorization? We can have two levels of policy
    enforcements. One is globally for all the requests going through the API gateway
    (which will act as the policy enforcement point or the PEP), and the other one
    is at the service level. The service-level policies must be enforced via some
    kind of an interceptor at the container or the service level.


    ## Security Sidecar


    We introduced the concept of sidecar in the Chapter [2](#461146_1_En_2_Chapter.xhtml),
    “Designing Microservices”. Let’s quickly recap. As shown in Figure [11-16](#461146_1_En_11_Chapter.xhtml#Fig16),
    the sidecar pattern is derived from the vehicle where a sidecar is attached to
    a motorcycle. If you’d like you can attach different sidecars (of different colors
    or designs) to the same motorcycle, provided that the interface between those
    two is unchanged. The same applies in the microservices world, where our microservice
    resembles the motorcycle, while the security processing layer resembles the sidecar.
    The communication between the microservice and the sidecar happens over a remote
    channel (not a local, in-process call), but both the microservice and the sidecar
    will be deployed in the same physical/virtual machine, so it will not be routed
    over the network. Also, keep in mind that the sidecar itself is another microservice.


    ![../images/461146_1_En_11_Chapter/461146_1_En_11_Fig16_HTML.png](images/461146_1_En_11_Chapter/461146_1_En_11_Fig16_HTML.png)


    Figure 11-16 Sidecar


    ### Note


    As discussed in Chapter [9](#461146_1_En_9_Chapter.xhtml), Istio^([^(153)](#fn153))
    introduces a sidecar proxy for supporting strong identity, powerful policy, transparent
    TLS encryption, and authentication, authorization, and audit (AAA) tools to protect
    your services and data. Istio Citadel provides strong service-to-service and end-user
    authentication with built-in identity and credential management, based on the
    sidecar and control plane architecture.


    There are many benefits of implementing security as a sidecar in the microservices
    architecture. The following list explains some of them.


    - The microservice implementation does not need to worry about the internals of
    the security implementation and those need not to be in the same programming language.

    - When implemented as a sidecar, the security functionality can be reused by other
    microservices, without worrying about individual implementation details.

    - The ownership of the security sidecar can be taken care by a different team
    that has expertise on the security domain, other than the microservices developers,
    who worry about domain-specific business functionalities.


    Let’s see how the security sidecar fits into the microservices architecture. As
    shown in Figure [11-17](#461146_1_En_11_Chapter.xhtml#Fig17), there can be four
    main functionalities of a security sidecar: token validation (`introspection`),
    get user info (`userinfo`), token issuance (`token`), and authorize access requests
    (`pdp`). Each microservice should have its own interceptor that intercepts all
    the requests and talk to the token validation endpoint to check whether the provided
    token is good enough to access the corresponding microservice. To make the sidecar
    interoperable, it is recommended to expose the OAuth 2.0 introspection endpoint^([^(154)](#fn154))
    to validate the tokens. This endpoint will accept a token in the request and will
    reply with a JSON payload, which includes information related to the provided
    token.


    ![../images/461146_1_En_11_Chapter/461146_1_En_11_Fig17_HTML.jpg](images/461146_1_En_11_Chapter/461146_1_En_11_Fig17_HTML.jpg)


    Figure 11-17 Security sidecar


    The following text shows a request to the introspection endpoint and a response
    from it.


    ```

    POST /introspect HTTP/1.1

    Host: sidecar.local

    Accept: application/json

    Content-Type: application/x-www-form-urlencoded

    token=2YotnFZFEjr1zCsicMWpAA

    HTTP/1.1 200 OK

    Content-Type: application/json

    {

    "active": true,

    "client_id": "l238j323ds-23ij4",

    "username": "jdoe",

    "scope": "read write dolphin",

    "sub": "jdoe",

    "aud": "https://foo.com",

    "iss": "https://issuer.example.com/",

    "exp": 1419356238,

    "iat": 1419350238

    }

    ```


    Once the token is validated, if the microservice wants to find more information
    about the end user who invoked the microservice, it can talk to the `userinfo`
    endpoint exposed by the security sidecar. This is another standard endpoint defined
    in the OpenID Connect specification^([^(155)](#fn155)). This endpoint accepts
    a request with a valid token and returns the associated user’s information in
    a JSON message. The following text shows a request to the `userinfo` endpoint
    and a response from it.


    ```

    GET /userinfo HTTP/1.1

    Host: sidecar.local

    Authorization: Bearer SlAV32hkKG

    HTTP/1.1 200 OK

    Content-Type: application/json

    {

    "sub": "jdoe",

    "name": "Jane Doe",

    "given_name": "Jane",

    "family_name": "Doe",

    "preferred_username": "j.doe",

    "email": "janedoe@example.com",

    }

    ```'
