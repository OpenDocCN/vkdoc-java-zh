    ### 用于微服务集成的单体 API 网关


    一种常见的反模式是使用 API 网关作为服务集成（或组合）层，向消费者暴露业务服务。例如，假设你开发了多个微服务，而你想要暴露的业务功能需要多个服务之间进行某种协作（或编排）。你需要构建的是一个复合微服务，它能够与多个下游服务通信，并暴露复合功能。在许多微服务实现中，我们将集成逻辑作为
    API 网关的一部分来开发，而 API 网关或多或少是一个单体组件。现有的微服务实现中有许多真实案例。例如，图 7-3 展示了 Netflix API 网关^(⁹⁶)最初是如何实现的。


    ![../images/461146_1_En_7_Chapter/461146_1_En_7_Fig3_HTML.jpg](img/461146_1_En_7_Fig3_HTML.jpg)


    图 7-3


    Netflix API 网关：服务集成在 API 网关层完成，多个 API 属于单体 API 网关层的一部分


    Netflix 可能是目前最流行且最成功的微服务实现。Netflix 通过 Netflix API 层暴露其内部服务。他们这样描述 Netflix API
    的功能：


    > *Netflix API 是 Netflix 微服务生态系统的“前门”。当请求从设备端到达时，API 提供编排调用所有构建响应所需服务的逻辑。它从后端服务收集所需的任何信息，按需要的顺序进行，根据需要格式化并过滤数据，然后返回响应。因此，Netflix
    API 的核心是一个编排服务，它通过组合微服务提供的细粒度功能来暴露粗粒度的 API。*


    你可以清楚地观察到，在这种场景下，编排层（一个单体组件）包含了相当大一部分业务逻辑。这导致了我们在前几章讨论过的与单体应用相关的众多权衡（例如，无故障隔离、无法独立扩展、所有权问题等）。


    Netflix 已经认识到这种方法的缺点，并为完全相同的场景引入了一种新的架构，即采用分离的 API 网关层，该层不再是单体结构。如图 7-4 所示，在 API
    网关层，每个组合服务都作为一个独立的实体实现。


    ![../images/461146_1_En_7_Chapter/461146_1_En_7_Fig4_HTML.jpg](img/461146_1_En_7_Fig4_HTML.jpg)


    图 7-4


    具有独立 API 的 Netflix API 网关，用于集成微服务


    这种方法与引入一个不属于单体运行时的集成服务，并将 API 网关相关功能作为服务运行时的一部分来实施，几乎完全相同。他们还尝试了另一种替代方案，即尽可能保持
    API 网关的“哑”特性，并引入一个复合服务，让 API 网关仅充当透传运行时。


    从这个用例中得出的关键结论是，你不应该将 API 网关用作放置业务逻辑的单体运行时。服务集成或组合逻辑必须是另一个微服务的一部分（无论是在 API 网关层还是在服务层）。


    ### 使用 ESB 集成微服务


    有些微服务实现通过使用 ESB 作为运行时来实现服务集成，从而将 ESB 带回了微服务架构。在大多数情况下，ESB 被部署在容器中，以服务于特定用例的服务集成。然而，ESB
    有其固有的局限性，例如过于庞大而无法作为容器运行，由于基于配置的集成而对开发者不够友好等。事实上，确实有一些 ESB 供应商试图推广这种模式，但这是你在集成微服务时应该避免的。（也存在对容器友好且轻量级的
    ESB 版本，可用于独立集成微服务，这比使用中心化的 ESB 要好得多。）


    ### 使用同质化技术构建所有微服务


    我们之前讨论过，智能端点和哑管道字面意思就是，所有我们开箱即用从 ESB 获得的酷炫功能现在都必须作为服务逻辑的一部分来实现。在开发微服务时，我们需要考虑到并非所有微服务都是相似的。有些服务会更侧重于业务逻辑和计算，而有些服务则更关注服务间通信和网络调用。如果我们坚持使用单一的同质化技术集来构建所有这些微服务，那么我们将不得不投入更多精力来构建集成微服务的核心组件，而不是专注于服务的业务逻辑。例如，服务集成通常需要服务发现和弹性通信（如断路器）。有些框架或编程语言开箱即用地提供了这些能力，而有些则没有。因此，你的架构应该足够灵活，以便为工作选择合适的技术。


    ## 组织微服务


    根据交互方式识别不同类型的微服务，并使用最合适的技术来构建它们，是构建成功微服务架构的关键。如果我们更仔细地审视微服务实现，我们可以识别出不同类型的服务，并将其归类为几个不同的类别。基于服务功能和粒度，我们可以识别出以下服务类别。


    ### 核心服务


    有些微服务是细粒度的、自包含的（没有外部服务依赖），并且主要由业务逻辑组成，几乎没有或完全没有网络通信逻辑。鉴于这些服务没有显著的网络通信功能，你可以自由选择任何能够满足服务业务逻辑的服务实现技术。此外，这些服务可能拥有自己的私有数据库，用于构建业务逻辑。这类微服务可以归类为*核心*或*原子*微服务。

    '
- fmt: '### Integration Services


    Core microservices often cannot be directly mapped to business functionalities,
    as they are too fine-grained. Any realistic business capability would require
    the interactions or composition of multiple microservices. Such interactions or
    compositions are implemented as an *integration service* or a composite service.
    These services often have to support a significant portion of ESB functionalities
    such as routing, transformations, orchestration, resiliency and stability patterns,
    etc., at the service level itself.


    Integration services serve a composite business functionality, are independent
    from each other, and contain business logic (routing, what services to call, how
    to do data type mapping, etc.) and network communication logic (inter-service
    communication through various protocols and resiliency behaviors such as circuit
    breakers). Also, they may or may not have private databases associated with the
    business functionality of the service. These services can bridge the other legacy
    and proprietary systems (e.g., ERP systems), external web APIs (e.g., Salesforce),
    shared databases, etc. (often known as the anti-corruption layer).


    It’s very important to select the appropriate service development technology for
    building integration microservices. Since network communication is a critical
    part of integration services, you should select the most suitable technology for
    implementing these services. In the latter part of this chapter, we discuss the
    technologies and frameworks that are suitable for building these services.


    ### API Services


    You will expose a selected set of your composite services or even some core services
    as managed APIs using API services or edge services. These services are a special
    type of integration services, which apply basic routing capabilities, versioning
    of APIs, API security, throttling, monetization, API compositions, etc.


    In most of these microservices implementations, API services are implemented as
    part of a monolithic API gateway runtime, and this violates the core microservices
    architectural concepts. However, most of the API gateway solutions are now moving
    toward a micro-gateway capability in which you can deploy your API services on
    an independent and lightweight runtime, while you manage them centrally. When
    it comes to implementation, the requirements are pretty similar to the integration
    services and we will require some additional features. We discuss API services
    and API management in a more broad way in Chapter [10](#461146_1_En_10_Chapter.xhtml),
    “APIs, Events, and Streams”.


    Since we have a good understanding of the different types of microservices, let’s
    discuss some of the microservices integration patterns that we can commonly use.


    ## Microservices Integration Patterns


    We have found seams in different microservices categories, so now it’s time to
    see how they can be used in real-world applications. When it comes to integrating
    microservices, we can identify a couple of integration patterns. Let’s discuss
    them in detail and see the pros and cons along with when to use those patterns.


    ### Active Composition or Orchestration


    Microservice integration can be implemented in such a way that a given (integration)
    microservice actively calls several other services (can be core or composite service).
    The business logic and the network communication are built as part of the integration
    service. The integration microservice should formulate business functionality
    out of the composition that it does. For example, as illustrated in Figure [7-5](#461146_1_En_7_Chapter.xhtml#Fig5),
    `microservice-1` calls `microservice-4` and `microservice-5` synchronously. The
    business capability that `microservice-1` offers is a composition of the capabilities
    of `microservice-4` and `microservice-5`. Also, the integration service that we
    develop can be exposed as an API via the API gateway layer.


    ![../images/461146_1_En_7_Chapter/461146_1_En_7_Fig5_HTML.jpg](images/461146_1_En_7_Chapter/461146_1_En_7_Fig5_HTML.jpg)


    Figure 7-5


    Active composition of microservices : a given integration microservice calls multiple
    microservices and formulates a business capability


    The key concept here is that, with an active composition , we create an integration
    service that’s dependent on some other set of microservices. If you consider the
    theoretical aspects that we discussed in the first few chapters, this seems like
    a violation of the microservices principles. But it’s virtually impossible to
    build anything useful without depending on the other services and systems. What
    really important here is to understand the boundaries between these services and
    clearly define the capabilities.


    Active compositions are commonly used when we need to control the service integration
    at a centralized service and when communication between dependent services is
    synchronous. Once you clearly define the business capability for an integration
    service, the business logic of it resides in a single service. That makes management
    and maintenance quite easier.


    ### Note


    Synchronous communication doesn’t mean that the implementation is based on a blocking
    communication model. We can build synchronous communication on top of a fully
    non-blocking implementation where threads are not blocked on a given request-response
    interaction. We can leverage non-blocking programming models to implement such
    synchronous communication patterns.


    This approach may be not a best fit if you have asynchronous or event-driven use
    cases. The dependencies between services could be an issue for certain business
    use cases. Even if you use non-blocking techniques to implement the synchronous
    communication, the request is bound to the latency of all the dependent services.
    For example, if a given integration service is invoked, it is bound to the sum
    of all the latencies incurred by all the dependent services.


    ### Reactive Composition or Choreography


    With the reactive communication style, we don’t have a service that synchronously
    calls other services. Instead, all the interactions between services are implemented
    using the asynchronous event-driven communication style. For example, as shown
    in Figure [7-6](#461146_1_En_7_Chapter.xhtml#Fig6), the communication between
    the microservices and the consumer application is done via event-driven asynchronous
    messaging. Therefore, we need to use an event bus as the messaging backbone. The
    event bus is a dumb messaging infrastructure and all the logic resides at the
    service level.


    ![../images/461146_1_En_7_Chapter/461146_1_En_7_Fig6_HTML.jpg](images/461146_1_En_7_Chapter/461146_1_En_7_Fig6_HTML.jpg)


    Figure 7-6


    Reactive compositions with asynchronous event-driven communication


    As discussed in Chapter [3](#461146_1_En_3_Chapter.xhtml), “Inter-Service Communication,”
    the communication can be either queue-based (a single consumer) or pub-sub (multiple
    consumers). Based on your requirements, you can use Kafka, RabbitMQ, or ActiveMQ
    etc. as the event bus.


    Reactive composition makes microservices inherently autonomous. Since we don’t
    have a service that contains the centralized composition logic, these microservices
    are not dependent on each other. They only become active when a given event occurs
    and then it processes the message and completes the work once the result is published
    to the event bus.'
