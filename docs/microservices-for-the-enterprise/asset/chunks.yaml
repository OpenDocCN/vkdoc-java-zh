  trans: '

    ### 使用 JWT 保障服务间通信安全


    在本节中，我们将了解如何通过传递 JWT，从另一个微服务调用受 OAuth 2.0 保护的微服务。


    图 12-2 在图 12-1 的基础上引入了 `Inventory` 微服务。收到订单后，`Order Processing` 微服务会与 `Inventory`
    微服务通信以更新库存。在此过程中，`Order Processing` 微服务将其获取的访问令牌传递给 `Inventory` 微服务。


    ![../images/461146_1_En_12_Chapter/461146_1_En_12_Fig2_HTML.jpg](img/461146_1_En_12_Fig2_HTML.jpg)


    图 12-2


    使用 OAuth 2.0 保护服务间通信


    如果我们使用自包含的（JWT）访问令牌，图 12-2 中的令牌验证步骤将会改变。在这种情况下，微服务无需向授权服务器（或安全令牌颁发者）发起验证调用。每个微服务将从授权服务器获取相应的公钥，并在本地验证
    JWT 的签名。


    在本示例中，我们使用 JWT 访问令牌。在前面的章节中，我们已经配置了授权服务器（`sample01`）和 `Order Processing` 微服务（`sample02`）以支持
    JWT。现在，让我们看看如何设置 `Inventory` 微服务。与 `Inventory` 微服务对应的代码位于 `ch12/sample03` 目录中。其工作方式与
    `sample02` 中的 `Order Processing` 微服务几乎相同。要启用 JWT 认证，请确保在 `sample03/src/main/resources/application.properties`
    文件中取消以下属性的注释。


    ```

    security.oauth2.resource.jwt.keyUri: https://localhost:8443/oauth/token_key

    ```


    现在，我们可以从 `sample03` 目录运行以下 Maven 命令来启动 `Inventory` 微服务。该服务将在 HTTPS 端口 10443 上启动。


    ```

    \> mvn spring-boot:run

    ```


    要执行端到端流程，我们需要在 `Order Processing`（`sample02`）微服务处下订单。它只会与 `Inventory`（`sample03`）微服务通信。在针对
    `Order Processing` 微服务运行 cURL 客户端之前，让我们先查看其与 `Inventory` 微服务通信的代码。我们使用 `OAuth2RestTemplate`
    与 `Inventory` 微服务通信，它会自动传递从客户端应用程序获取的访问令牌（`Order Processing` 微服务）。相应的代码位于 `sample02/src/main/java/com/apress/ch12/sample02/client/InventoryClient.java`
    文件中。`Order Processing` 微服务从客户端应用程序获取完整订单，然后从请求中提取商品列表，并通过与 `Inventory` 微服务通信来更新库存。


    ```

    @Component

    public class InventoryClient {

    @Autowired

    OAuth2RestTemplate restTemplate;

    public void updateInventory(Item[] items) {

    URI uri = URI.create("https://localhost:10443/inventory");

    restTemplate.put(uri, items);

    }

    }

    ```


    假设 OAuth 2.0 授权服务器（`sample01`）正在运行，让我们运行以下 cURL 命令来获取访问令牌。请确保适当替换 `$CLIENTID`、`$CLIENTSECRET`、`$USERNAME`
    和 `$PASSWORD` 的值。另请注意，我们同时传递了 `foo` 和 `bar` 作为作用域值。


    ```

    \> curl -v -X POST --basic -u $CLIENTID:$CLIENTSECRET -H "Content-Type: application/x-www-form-urlencoded;charset=UTF-8"
    -k -d "grant_type=password&username=$USERNAME&password=$PASSWORD&scope=foo bar"
    https://localhost:8443/oauth/token

    ```


    这将生成一个 JWT 访问令牌。使用该令牌，让我们通过运行以下 cURL 命令与 `Order Processing` 微服务（`sample02`）通信来下订单。


    ```

    curl -v  -k -H "Authorization: Bearer $TOKEN" -H "Content-Type: application/json"
    -d ''{"customer_id":"101021","payment_method":{"card_type":"VISA","expiration":"01/22","name":"John
    Doe","billing_address":"201, 1st Street, San Jose, CA"},"items":[{"code":"101","qty":1},{"code":"103","qty":5}],"shipping_address":"201,
    1st Street, San Jose, CA"}'' https://localhost:9443/order

    ```


    如果一切正常，我们应该会在 cURL 客户端看到 `201` HTTP 状态码，并且在运行 `Inventory` 微服务的终端上会打印出订单号。

    '
- fmt: '### Service-to-Service Communication Secured with TLS Mutual Authentication


    In this section, we see how to enable TLS mutual authentication between the `Order
    Processing` microservice and the `Inventory` microservice. In most cases, TLS
    mutual authentication is used to enable server-to-server authentication, while
    JWT is used to pass the user context between microservices.


    One primary requirement to enable mutual authentication is that each service should
    have its own key store (`keystore.jks`) and a trust store (`trust-store.jks`).
    Even though both are key stores, we use the term key store specifically to highlight
    the key store that stores the server’s private/public key pair, while the trust
    store carries the public certificates of the trusted servers and clients. For
    example, when the `Order Processing` microservice talks to the `Inventory` microservice,
    which is secured with TLS mutual authentication, the public certificate of the
    certificate authority that signs the `Order Processing` microservice’s public
    key must be in the trust store (`sample03/trust-store.jks`) of the `Inventory`
    microservice.


    Since we use self-signed certificates here, we have no certificate authority,
    hence we include the public certificate itself. The `Order Processing` microservice,
    which acts as the TLS mutual authentication client, uses its keys from the key
    store (`sample02/keystore.jks`) during the TLS handshake for authentication. It
    also has to store the public certificate of the certificate authority that signs
    the `Inventory` microservice’s public key, in its trust store (`sample02/trust-store.jks`).
    Once again, since we do not have a certificate authority, we store the public
    certificate itself. Figure [12-3](#461146_1_En_12_Chapter.xhtml#Fig3) illustrates
    what we discussed here.


    ![../images/461146_1_En_12_Chapter/461146_1_En_12_Fig3_HTML.jpg](images/461146_1_En_12_Chapter/461146_1_En_12_Fig3_HTML.jpg)


    **Figure 12-3** Distribution of certificates to facilitate TLS mutual authentication


    Let’s revisit the steps involved in setting up the key stores in the `Order Processing`
    microservice. First, make sure that we have the key store at `sample02/keystore.jks`
    and the trust store at `sample02/trust-store.jks`. The following properties related
    to both the key stores are set appropriately in the `sample02/src/main/java/com/apress/ch12/sample02/OrderProcessingApp.java`
    file. Also, we already added the public certificate of the `Inventory` microservice
    to the `sample02/trust-store.jks` file.


    ```

    System.setProperty("javax.net.ssl.trustStore", path + File.separator + "trust-store.jks");

    System.setProperty("javax.net.ssl.trustStorePassword", "springboot")

    System.setProperty("javax.net.ssl.keyStore",  path + File.separator + "keystore.jks");

    System.setProperty("javax.net.ssl.keyStorePassword", "springboot");

    ```


    Once we have the `javax.net.ssl.keyStore` and `javax.net.ssl.keyStorePassword`
    system properties set, the client automatically picks the corresponding key pair
    to respond to the server’s challenge to request the client certificate, during
    the TLS handshake.


    Now, let’s look at the server-side configurations. The `Inventory` microservice
    should have its key store under `/sample03/keystore.jks` and trust store under
    `sample03/trust-store.jks`. The following properties related to trust store are
    set appropriately in the `sample03/src/main/java/com/apress/ch12/sample03/InventoryApp.java`
    file. Here we have only set the trust store properties. There is no need to set
    properties related to the key store unless it’s acting as a TLS client.


    ```

    System.setProperty("javax.net.ssl.trustStore", path + File.separator + "trust-store.jks");

    System.setProperty("javax.net.ssl.trustStorePassword", "springboot");

    ```


    To enable TLS mutual authentication for the `Inventory` microservice, set the
    following property in the `sample03/src/main/resources/application.properties`
    file.


    ```

    server.ssl.client-auth:need

    ```


    Now we can test the end-to-end flow by invoking the `Order Processing` microservice
    with a valid access token. To cater to the request, the `Order Processing` microservice
    talks to the `Inventory` microservice, which is protected with TLS mutual authentication.


    ```

    curl -v  -k -H "Authorization: Bearer $TOKEN" -H "Content-Type: application/json"
    -d ''{"customer_id":"101021","payment_method":{"card_type":"VISA","expiration":"01/22","name":"John
    Doe","billing_address":"201, 1st Street, San Jose, CA"},"items":[{"code":"101","qty":1},{"code":"103","qty":5}],"shipping_address":"201,
    1st Street, San Jose, CA"}'' https://localhost:9443/order

    ```


    ## Securing Actuator Endpoints


    Spring Boot provides out-of-the-box monitoring capabilities via the actuators.
    For any Spring Boot microservice, you can add the following dependency to activate
    the actuator endpoints.


    ```

    org.springframework.boot

    spring-boot-starter-actuator

    ```


    A sample microservice project with this dependency is available at `ch12/sample04`.
    Let’s spin up the `Order Processing` microservice from the `sample04` directory
    with the following command. The service will start on HTTPS port 8443.


    ```

    \> mvn spring-boot:run

    ```


    Since we have not engaged in any security at this point, if we run the following
    cURL command, it will successfully return a response.


    ```

    \> curl -k https://localhost:8443/health

    {"status":"UP"}

    ```


    To enable security, we need to add the following dependency to the `sample04/pom.xml`
    file.


    ```

    org.springframework.boot

    spring-boot-starter-security

    ```


    Now, uncomment the `@Configuration` class-level annotation in the `sample04/src/main/java/com/apress/ch12/sample04/config/SecurityConfig.java`
    file. By default it was kept commented, so that Spring Boot won’t pick the overridden
    configuration in that class and we can try the non-secured scenario. In the same
    class, the following code snippet introduces a user called `admin` to the system
    with the `ACTUATOR` role. When the actuator endpoints are secured, only the users
    in the `ACTUATOR` role will be able to invoke the endpoints.


    ```

    @Override

    public void configure(AuthenticationManagerBuilder auth) throws Exception {

    auth.inMemoryAuthentication().withUser("admin")

    .password("admin").roles("ACTUATOR");

    }

    ```


    Now restart the service and try the same cURL command with `admin/admin` credentials.


    ```

    \> curl –k --basic -u admin:admin  https://localhost:8443/health

    {"status":"UP"}

    ```


    ## Summary


    In Chapter [11](#461146_1_En_11_Chapter.xhtml), we discussed the common patterns
    and fundamentals related to securing microservices. This chapter focused on building
    those patterns with microservices developed in Spring Boot. In the next chapter,
    we discuss the role of observability in a microservices deployment.'
