- fmt: '### Try it out


    You can try a gRPC service sample in Chapter [4](#461146_1_En_4_Chapter.xhtml),
    “Developing Services”.


    gRPC allows server streaming RPCs where the client sends a request to the server
    and gets a stream to read a sequence of messages back. The client reads from the
    returned stream until there are no more messages.


    ```

    rpc productUpdate(ProdUpdateReq) returns (stream ProdUpdateStatues){

    }

    ```


    Similarly, you can use client-streaming RPCs where the client writes a sequence
    of messages and sends them over to the server as a stream. Once the client has
    finished writing the messages, it waits for the server to read them and returns
    its response.


    ```

    rpc productUpdate(stream productUpdates) returns (ProdUpdateStatus) {

    }

    ```


    Bidirectional streaming RPCs are where both sides send a sequence of messages
    using a read-write stream. The two streams operate independently, so clients and
    servers can read and write in whatever order they like. For example, the server
    could wait to receive all the client messages before writing its responses, or
    it could alternately read a message and then write a message, or follow some other
    combination of reads and writes.


    ```

    rpc productUpdate(stream productUpdates) returns (stream ProdUpdateStatuses){

    }

    ```


    Authentication mechanisms supported in gRPC are SSL/TLS and token-based authentications
    with Google.


    #### Error Handling with gRPC


    You can also implement various error-handling techniques with gRPC. If an error
    occurs, gRPC returns one of its error status codes and an optional string error
    message that provides further details of the error.


    REST and gRPC are the most commonly used synchronous messaging protocols in microservices
    implementations. However, there are several other synchronous messaging technologies
    that are occasionally used for microservice implementations.


    ### GraphQL


    The RESTful services are built on the concept of resources, which are manipulated
    via HTTP methods. When the service you develop fits the resource-based architecture
    of REST, it works flawlessly. But as soon as it deviates from the RESTful style,
    the service fails to deliver the expected outcome.


    Also, in some scenarios, the client needs data from multiple resources at the
    same time, which results in invocation of multiple resources via multiple service
    calls (or always sending large responses with redundant data).


    GraphQL^([^(26)](#fn26)) addresses such concerns in a conventional REST-based
    service by providing a query language for APIs and a runtime for fulfilling those
    queries with your existing data. GraphQL provides a complete and understandable
    description of the data in your API, gives clients the power to ask for exactly
    what they need and nothing more, makes it easier to evolve APIs over time, and
    enables powerful developer tools.


    The client can send a GraphQL query to the API and get exactly what the client
    needs, and the client has full control over the data it gets. The typical REST
    APIs require loading from multiple URLs, but GraphQL-based services get all the
    data your app needs in a single request.


    For example, you may send the following query to a GraphQL-based service:


    ```

    {

    hero {

    name

    }

    }

    ```


    And retrieve the result, which is shown here.


    ```

    {

    "data": {

    "hero": {

    "name": "R2-D2"

    }

    }

    }

    ```


    The query has exactly the same shape as the result and the server knows exactly
    what fields the client requests.


    The GraphQL server exposes a schema describing the API. This schema is made up
    of type definitions. Each type has one or more fields, which each take zero or
    more arguments and return a specific type. An example GraphQL schema is one for
    a book and an author of a book. Here we have defined the types for `Book` and
    `Author`, along with the operation name. In our previous example, we used a shorthand
    syntax where we omit both the `query` keyword and the query name, but in production
    apps, it’s useful to include these to make our code less ambiguous. So, in this
    example we have `query` as the operation type and `latestBooks` as the operation
    name:


    ```

    type Book {

    isbn: ID

    title: String

    text: String

    category: String

    author: Author

    }

    type Author {

    id: ID

    name: String

    thumbnail: String

    books: [Book]

    }

    # The Root Query for the application

    type Query {

    latestBooks(count: Int, offset: Int): [Book]!

    }

    # The Root Mutation for the application

    type Mutation {

    addBook(id: String!, title: String!, text: String!, category: String, author:
    Author!) : Book!

    }

    ```


    The operation type is `query`, `mutation`, or `subscription` and it describes
    what type of operation you’re intending to do. The operation type is required
    unless you’re using the query shorthand syntax, in which case you can’t supply
    a name or variable definition for your operation.


    Every GraphQL service has a query type and may or may not have a mutation type.
    These types are the same as a regular object type, but they are special because
    they define the entry point of every GraphQL query. Similar to a query, you can
    define fields on the `mutation` type, and those are available as the root mutation
    fields you can call in your query. As a convention any operations that cause writes
    should be sent explicitly via a mutation.


    ### Try it out


    You can try a GraphQL service sample in Chapter [4](#461146_1_En_4_Chapter.xhtml),
    “Developing Services”.


    ### WebSockets


    WebSockets^([^(27)](#fn27)) protocol can simply be introduced as TCP over the
    web. It can be considered a transport protocol, which is fully duplex and asynchronous.
    So, you can overlay any messaging protocol on top of WebSockets.


    The WebSockets protocol uses a single TCP connection for traffic in both directions
    and uses HTTP as the initial handshaking protocol, so that it can work with the
    existing infrastructure. It works on top of TCP for the initial handshake, and
    then it acts like raw TCP sockets. Figure [3-3](#461146_1_En_3_Chapter.xhtml#Fig3)
    shows the interactions of a client and server that use WebSockets.


    ![../images/461146_1_En_3_Chapter/461146_1_En_3_Fig3_HTML.jpg](images/461146_1_En_3_Chapter/461146_1_En_3_Fig3_HTML.jpg)


    Figure 3-3 WebSockets communication


    There are quite a few similarities with HTTP2 and WebSockets, such as using a
    single connection, bi-directional messaging, binary messages, etc. But the difference
    here is that WebSockets allows you to build your own messaging protocol on top
    of WebSockets (for instance, you can build MQTT or AMQP over WebSockets). The
    WebSockets architecture consists of a socket that is opened between the client
    and the server for full-duplex (bidirectional) communication. So, if your microservices
    require having such full-duplex communication and the ability to route the traffic
    via the web, then WebSockets is a great choice.


    ### Thrift


    Thrift^([^(28)](#fn28)) allows you to define data types and service interfaces
    in a simple definition file. Similar to gRPC, using the interface definition,
    the compiler generates code to be used to easily build RPC clients and servers
    that communicate seamlessly across programming languages. Thrift uses TCP as the
    transport protocol and it is known to have very high-performance messaging but
    it lacks certain interoperability requirements such as firewalls and load balancers
    and ease of use when it comes to developing services.'
