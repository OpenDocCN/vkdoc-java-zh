    gRPC 客户端。这两个微服务的源代码位于 `ch04/sample05` 和 `ch04/sample06` 下。图 4-3 展示了此练习的设置。


    ![../images/461146_1_En_4_Chapter/461146_1_En_4_Fig3_HTML.jpg](img/461146_1_En_4_Fig3_HTML.jpg)


    图 4-3


    通过 gRPC 的微服务间通信


