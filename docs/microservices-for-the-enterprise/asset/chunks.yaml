  trans: '

    ### 多接收者模式


    当一个生产者产生的异步消息需要发送给多个消费者时，发布-订阅或多接收者通信模式将非常有用。


    以一个用例为例，假设有一个`产品管理`服务，它负责生成产品价格更新的信息。该信息需要传播到多个微服务，例如`购物车`、`欺诈检测`、`订阅`等。如图 3-5
    所示，我们可以使用事件总线作为通信基础设施，`产品管理`服务可以将价格更新事件发布到特定主题。对接收价格更新事件感兴趣的服务应订阅同一主题。只有当这些感兴趣的服务在事件总线广播事件时处于可用状态，它们才会接收到订阅主题上的事件。如果底层事件总线实现支持，订阅者可以选择作为持久订阅者进行订阅，这样即使它们在事件广播时处于离线状态，也能接收到所有事件。


    ![../images/461146_1_En_3_Chapter/461146_1_En_3_Fig5_HTML.jpg](img/461146_1_En_3_Fig5_HTML.jpg)


    图 3-5


    基于多接收者（发布-订阅）的异步通信


    有多种消息协议支持发布-订阅消息传递。大多数基于 AMQP 的代理都支持发布-订阅，但 Kafka（拥有自己的消息协议）是微服务间多接收者/发布-订阅类型消息传递中使用最广泛的消息代理。让我们更仔细地看看
    Kafka，并用 Kafka 重新审视这个实现。


    #### Kafka


    Apache Kafka^(³²)是一个分布式发布/订阅消息系统。它通常被描述为一个*分布式提交日志*，因为 Kafka 中的数据是持久化、有序存储的，并且可以确定性地读取。此外，数据在
    Kafka 系统内分布以实现故障转移和可扩展性。


    让我们更仔细地看看如何使用 Kafka 实现发布者-订阅者场景。如图 3-6 所示，我们可以使用 Kafka 作为分布式发布-订阅消息系统来构建多微服务异步消息传递场景。


    Kafka 中使用的数据单元称为*消息*（一个字节数组）。与其他消息协议不同，其中包含的数据对 Kafka 没有特定的格式或含义。消息还可以包含元数据，这有助于发布或消费消息。


    ![../images/461146_1_En_3_Chapter/461146_1_En_3_Fig6_HTML.jpg](img/461146_1_En_3_Fig6_HTML.jpg)


    图 3-6


    使用 Kafka 的基于多接收者（发布-订阅）的异步通信


    Kafka 中的这些消息被分类到*主题*中。一个给定的主题可以选择性地拆分为多个*分区*。分区是给定主题的逻辑和物理组件化，生产者可以决定写入哪个分区。这通常使用称为*键*的消息元数据来完成。Kafka
    生成键的哈希值并将其映射到特定分区（即，使用给定键生成的所有消息都位于同一分区上）。分区是 Kafka 中用于并行化消费和扩展主题以超越单节点吞吐量限制的主要机制。每个分区可以托管在不同的节点上。


    每条消息都带有偏移量写入分区。*偏移量*是一个递增编号的位置，从分区开头开始为 0。


    *生产者*将消息写入特定主题。默认情况下，生产者不关心特定消息写入哪个分区，并将消息均匀地分布到主题的所有分区。在某些情况下，生产者会使用消息元数据*键*将消息定向到特定分区。


    *消费者*订阅一个或多个主题，并按照消息生成的顺序读取它们。消费者通过跟踪消息的*偏移量*来记录已消费的消息。给定分区中的每条消息都有一个唯一的偏移量。通过存储每个分区最后消费消息的偏移量（在
    Zookeeper 或 Kafka 中），消费者可以停止并重新启动而不会丢失其位置。


    消费者作为*消费者组*的一部分工作，其中一个或多个消费者协同工作来消费一个主题。该组确保一个消费者组成员只从每个分区消费消息。但是，一个给定的消费者组成员可以从多个分区消费。显然，当我们必须水平扩展对高消息量主题的消费时，消费者组的概念非常有用。


    现在，让我们尝试结合图 3-6 所示的场景进一步理解这些概念。在以下基于 Kafka 的多接收者消息传递场景中，Kafka 中创建了两个主题：`price_update`和`order_update`。


    有两个`产品管理`生产者（来自不同部门的微服务）发布产品价格更新信息（生产者可以显式写入给定分区，或者负载可以在分区之间均匀分布）。对于`price_update`主题，有三个不同的消费者（来自三个消费者组）。它们将独立地从
    Kafka 读取消息，并维护自己的偏移量。例如，假设`订阅`服务发生故障，导致其在一段时间内无法接收价格更新。当`订阅`服务重新启动时，它可以检查当前持久化的偏移量，并拉取它在离线期间本应接收到的所有事件。


    使用`order_update`主题的订单处理场景略有不同。在该场景中，我们可以假设通过订单更新通道的负载很高，我们需要扩展消费者端以更有效地处理它们。因此，我们使用一个包含两个消费者的消费者组，以便它们可以并行处理来自多个分区的订单更新事件。


    单个 Kafka 服务器称为*代理*，它负责消息的发布和消费。多个 Kafka 代理可以作为单个集群运行。在集群中的多个代理中，有一个代理充当集群控制器，负责集群管理操作，例如将分区分配给代理和检测代理故障。一个分区被分配给多个代理，并且每个分区有一个领导者代理。因此，由于分区在多个代理之间复制，并且能够在现有分区领导者不可用时指定新的领导者（Kafka
    使用 Zookeeper 处理大部分协调任务），Kafka 消息传递具有高可用性。


    通过集群，Kafka 变得更加强大，因此您可以大规模扩展异步消息传递能力。

    '
- fmt: '### Tip


    Can we do exactly-once delivery with Kafka? There is an interesting article^([^(33)](#fn33))
    on how we can implement exactly-once delivery with Kafka. Most of the concepts
    start from the key Kafka principles that we discussed in this chapter, and you
    can easily build the same level of guaranteed delivery with your microservices.


    We’ve only discussed a selected subset of capabilities of Kafka that are useful
    in building the multiple receiver asynchronous messaging scenarios, and there
    are a lot of other technical details that are not included in the scope of this
    book.


    There are several other brokers, such as ActiveMQ and RabbitMQ, that can offer
    you the same set of pub-sub messaging capabilities for simple-to-medium scale
    asynchronous messaging scenarios. However, if you need a fully distributed and
    scalable asynchronous messaging infrastructure, then Kafka is a good choice. There
    are various asynchronous messaging and event stream processing solutions that
    are built on top of Kafka such as Confluent Open Source Platform, which may give
    you some additional capabilities for your microservices implementation.


    #### Other Asynchronous Communication Protocols


    There are quite a few asynchronous messaging protocols that we haven’t discussed.
    MQTT^([^(34)](#fn34)), STOMP^([^(35)](#fn35)), and CoAP^([^(36)](#fn36)) are also
    quite popular. If you think you have the expertise and that one of these is the
    best technology choice for your microservices messaging, then go for it. We do
    not cover those protocols in detail, as they don’t have any explicit characteristics
    that are important in the microservices context.


    ## Synchronous versus Asynchronous Communication


    At this point, you should have a solid understanding of the synchronous and asynchronous
    messaging techniques. It’s very important to understand when to use those communication
    styles in your microservices architecture implementation.


    The main difference between synchronous and asynchronous communication is that
    there are scenarios in which it is not possible to keep a connection open between
    a client and a server. A durable one-way communication is more practical in those
    scenarios. Synchronous communication is more suitable in scenarios where you need
    to build services that provide request-response style interactions. If the messages
    are event-driven and the client doesn’t expect a response immediately, asynchronous
    communication is more suitable.


    However, in many books and articles, it is emphasized that synchronous communication
    is evil, and we should only use asynchronous communication for microservices as
    it enables the service autonomy. In many cases, the comparison between synchronous
    and asynchronous communication is being interpreted in such a way that, in synchronous
    communication a given thread will be blocked until it waits for a response. This
    is completely false, because most synchronous messaging implementations are based
    on fully non-blocking messaging architectures. (That is, the client-side sender
    sends the request and registers a callback, and the thread is returned. When the
    response is received, it is correlated with the original request and the response
    is processed.)


    So, coming back to the pragmatic use of these communication styles, we need to
    select the communication style based on our use case.


    In scenarios where short-running interactions require a client and service to
    communicate in the request-response style, the synchronous communication is mandatory.
    For example, in our online retail use case, a product search service is communicated
    in a synchronous fashion, because you want to submit a search query and want to
    see the search results immediately. Scenarios such as order placing or processing
    are inherently asynchronous. Hence, the asynchronous messaging style is the best
    fit for such scenarios.


    ### Tip


    Embracing only synchronous (e.g. REST) or asynchronous messaging between microservices
    is a complete myth. When adopting microservices to your enterprise scenarios,
    you may be required to use a mix or a hybrid of both of those communication styles.


    ## Message Formats/Types


    We have discussed about several communication styles and protocols that are commonly
    used in the microservices architecture. The information exchange between the microservices
    is based on exchanging messages. Determining which message formats to use in those
    scenarios is important.


    ### JSON and XML


    In most of the REST-based microservices implementations, JSON is the de-facto
    message interchange format, owing to its simplicity, readability, and performance.
    However, there are some services based on XML (not SOAP). However, they lack some
    important features, such as robust type handling and compatibility between schema
    versions. In most of the scenarios where your services are exposed to the external
    consumers, we heavily use JSON as the message type, while usage of XML is quite
    limited to specific use cases. As part of the service development, the service
    has to process the incoming JSON or XML messages and map them to types that are
    used in the service code.


    ### Protocol Buffers


    With a communication style such as gRPC, the message formats are well-defined
    and use a dedicated data interchange format such as protocol buffers. The service
    developer doesn’t need to worry about processing the messages in a given message
    format. During marshaling and un-marshaling all the required type mapping is done
    and users only deal with the well-defined types. Owing to the flexible, efficient,
    automated mechanism of data serialization and deserialization, protocol buffers
    are ideal for high throughput synchronous messaging between internal services.
    Currently, the application of protocol buffers in microservices communication
    is heavily done using gRPC-based services.


    ### Avro


    Apache Avro^([^(37)](#fn37)) addresses the key limitations of most of the conventional
    data interchange formats such as JSON and XML. Avro is a data serialization system
    that provides rich data structures for data representations, a compact format,
    great bindings for a wide variety of programming languages, direct mapping to
    and from JSON, and an extensible schema language defined in pure JSON.


    Therefore, Avro is heavily used in most of the asynchronous messaging scenarios
    in microservices implementations. For example, most of the Kafka-based messaging
    systems leverage Avro to define the schema for producing and consuming messages.


    ## Service Definitions and Contracts


    When you have a business capability that’s implemented as a service, you need
    to define and publish the service contract. In traditional monolithic applications,
    we rarely have such features to define the business capabilities of an application.
    In SOA/web services world, WSDL is used to define the service contract, but as
    we all know, WSDL is not the ideal solution for defining a microservices contract,
    as WSDL is insanely complex and tightly coupled to SOAP.


    Since we build microservices on top of the REST architectural style, we can use
    the same REST API definition techniques to define the contract of the microservices.
    Therefore, microservices use the standard REST API definition languages such as
    OpenAPIs^([^(38)](#fn38)) to define the service contracts. For services that don’t
    fit the resource-based architecture, we can leverage GraphQL schemas.


    As you saw in the gRPC section, protocol buffer definitions of your service are
    the service definition and contracts for your gRPC-based service (the same applies
    to other RPC styles such as Thrift). Service definitions are applicable to synchronous
    communication; there is no standard way of defining a service contract for asynchronous
    event-based communication.'
  raw: '### Tip


    Can we do exactly-once delivery with Kafka? There is an interesting article^([^(33)](#fn33))
    on how we can implement exactly-once delivery with Kafka. Most of the concepts
    start from the key Kafka principles that we discussed in this chapter, and you
    can easily build the same level of guaranteed delivery with your microservices.


    We’ve only discussed a selected subset of capabilities of Kafka that are useful
    in building the multiple receiver asynchronous messaging scenarios, and there
    are a lot of other technical details that are not included in the scope of this
    book.


    There are several other brokers, such as ActiveMQ and RabbitMQ, that can offer
    you the same set of pub-sub messaging capabilities for simple-to-medium scale
    asynchronous messaging scenarios. However, if you need a fully distributed and
    scalable asynchronous messaging infrastructure, then Kafka is a good choice. There
    are various asynchronous messaging and event stream processing solutions that
    are built on top of Kafka such as Confluent Open Source Platform, which may give
    you some additional capabilities for your microservices implementation.


    #### Other Asynchronous Communication Protocols


    There are quite a few asynchronous messaging protocols that we haven’t discussed.
    MQTT^([^(34)](#fn34)), STOMP^([^(35)](#fn35)), and CoAP^([^(36)](#fn36)) are also
    quite popular. If you think you have the expertise and that one of these is the
    best technology choice for your microservices messaging, then go for it. We do
    not cover those protocols in detail, as they don’t have any explicit characteristics
    that are important in the microservices context.


    ## Synchronous versus Asynchronous Communication


    At this point, you should have a solid understanding of the synchronous and asynchronous
    messaging techniques. It’s very important to understand when to use those communication
    styles in your microservices architecture implementation.


    The main difference between synchronous and asynchronous communication is that
    there are scenarios in which it is not possible to keep a connection open between
    a client and a server. A durable one-way communication is more practical in those
    scenarios. Synchronous communication is more suitable in scenarios where you need
    to build services that provide request-response style interactions. If the messages
    are event-driven and the client doesn’t expect a response immediately, asynchronous
    communication is more suitable.


    However, in many books and articles, it is emphasized that synchronous communication
    is evil, and we should only use asynchronous communication for microservices as
    it enables the service autonomy. In many cases, the comparison between synchronous
    and asynchronous communication is being interpreted in such a way that, in synchronous
    communication a given thread will be blocked until it waits for a response. This
    is completely false, because most synchronous messaging implementations are based
    on fully non-blocking messaging architectures. (That is, the client-side sender
    sends the request and registers a callback, and the thread is returned. When the
    response is received, it is correlated with the original request and the response
    is processed.)


    So, coming back to the pragmatic use of these communication styles, we need to
    select the communication style based on our use case.


    In scenarios where short-running interactions require a client and service to
    communicate in the request-response style, the synchronous communication is mandatory.
    For example, in our online retail use case, a product search service is communicated
    in a synchronous fashion, because you want to submit a search query and want to
    see the search results immediately. Scenarios such as order placing or processing
    are inherently asynchronous. Hence, the asynchronous messaging style is the best
    fit for such scenarios.


    ### Tip


    Embracing only synchronous (e.g. REST) or asynchronous messaging between microservices
    is a complete myth. When adopting microservices to your enterprise scenarios,
    you may be required to use a mix or a hybrid of both of those communication styles.


    ## Message Formats/Types


    We have discussed about several communication styles and protocols that are commonly
    used in the microservices architecture. The information exchange between the microservices
    is based on exchanging messages. Determining which message formats to use in those
    scenarios is important.


    ### JSON and XML


    In most of the REST-based microservices implementations, JSON is the de-facto
    message interchange format, owing to its simplicity, readability, and performance.
    However, there are some services based on XML (not SOAP). However, they lack some
    important features, such as robust type handling and compatibility between schema
    versions. In most of the scenarios where your services are exposed to the external
    consumers, we heavily use JSON as the message type, while usage of XML is quite
    limited to specific use cases. As part of the service development, the service
    has to process the incoming JSON or XML messages and map them to types that are
    used in the service code.


    ### Protocol Buffers


    With a communication style such as gRPC, the message formats are well-defined
    and use a dedicated data interchange format such as protocol buffers. The service
    developer doesn’t need to worry about processing the messages in a given message
    format. During marshaling and un-marshaling all the required type mapping is done
    and users only deal with the well-defined types. Owing to the flexible, efficient,
    automated mechanism of data serialization and deserialization, protocol buffers
    are ideal for high throughput synchronous messaging between internal services.
    Currently, the application of protocol buffers in microservices communication
    is heavily done using gRPC-based services.


    ### Avro


    Apache Avro^([^(37)](#fn37)) addresses the key limitations of most of the conventional
    data interchange formats such as JSON and XML. Avro is a data serialization system
    that provides rich data structures for data representations, a compact format,
    great bindings for a wide variety of programming languages, direct mapping to
    and from JSON, and an extensible schema language defined in pure JSON.


    Therefore, Avro is heavily used in most of the asynchronous messaging scenarios
    in microservices implementations. For example, most of the Kafka-based messaging
