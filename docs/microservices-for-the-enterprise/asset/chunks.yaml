    ## 使用自包含访问令牌（JWT）保护微服务


    在第 11 章中，我们详细讨论了 JWT 及其用法。在本节中，我们将使用从我们的 OAuth 2.0 授权服务器颁发的 JWT 来访问受保护的微服务。


    ### 设置授权服务器以颁发 JWT


    在本节中，我们将了解如何扩展我们在上一节（`ch12/sample01/`）中使用的授权服务器，以支持自包含访问令牌或 JWT。第一步是创建一个新的密钥对以及一个密钥库。此密钥用于签署从授权服务器颁发的
    JWT。以下 `keytool` 命令将创建一个包含密钥对的新密钥库。


    ```

    \> keytool -genkey -alias jwtkey -keyalg RSA -keysize 2048 -dname "CN=localhost"
    -keypass springboot -keystore jwt.jks -storepass springboot

    ```


    此命令创建一个名为 `jwt.jks` 的密钥库，并使用密码 `springboot` 进行保护。我们需要将此密钥库复制到 `sample01/src/main/resources/`。要生成自包含访问令牌，我们需要在
    `sample01/src/main/resources/application.properties` 文件中设置以下属性的值。


    ```

    spring.security.oauth.jwt: true

    spring.security.oauth.jwt.keystore.password: springboot

    spring.security.oauth.jwt.keystore.alias: jwtkey

    spring.security.oauth.jwt.keystore.name: jwt.jks

    ```


    `spring.security.oauth.jwt` 的值默认设置为 `false`，需要将其更改为 `true` 才能颁发 JWT。其他三个属性不言自明，你需要根据创建密钥库时使用的值进行适当设置。


    让我们浏览一下源代码中为支持 JWT 所做的显著更改。首先，在 `pom.xml` 文件中，我们需要添加以下依赖项，该依赖项负责构建 JWT。


    ```

    org.springframework.security

    spring-security-jwt


    ```


    在 `sample01/src/main/java/com/apress/ch12/sample01/config/AuthorizationServerConfig.java`
    类中，我们添加了以下方法，该方法负责注入有关如何从密钥库检索私钥的详细信息。此私钥用于签署 JWT。


    ```

    @Bean

    protected JwtAccessTokenConverter jwtConeverter() {

    String pwd = environment.getProperty(

    "spring.security.oauth.jwt.keystore.password");

    String alias = environment.getProperty(

    "spring.security.oauth.jwt.keystore.alias");

    String keystore = environment.getProperty(

    "spring.security.oauth.jwt.keystore.name");

    KeyStoreKeyFactory keyStoreKeyFactory = new KeyStoreKeyFactory(

    new ClassPathResource(keystore),

    pwd.toCharArray());

    JwtAccessTokenConverter converter = new JwtAccessTokenConverter();

    converter.setKeyPair(keyStoreKeyFactory.getKeyPair(alias));

    return converter;

    }

    ```


    在同一个类文件中，我们还设置了 `JwtTokenStore` 作为令牌存储。以下函数以一种方式实现，即仅当 `application.properties`
    文件中的 `spring.security.oauth.jwt` 属性设置为 `true` 时，我们才将 `JwtTokenStore` 设置为令牌存储。


    ```

    @Bean

    public TokenStore tokenStore() {

    String useJwt = environment.getProperty("spring.security.oauth.jwt");

    if (useJwt != null && "true".equalsIgnoreCase(useJwt.trim())) {

    return new JwtTokenStore(jwtConeverter());

    } else {

    return new InMemoryTokenStore();

    }

    }

    ```


    最后，我们需要将令牌存储设置到 `AuthorizationServerEndpointsConfigurer`，这在以下函数中完成，并且同样，仅当我们想要使用
    JWT 时才进行设置。


    ```

    @Autowired

    private AuthenticationManager authenticationManager;

    @Override

    public void configure(AuthorizationServerEndpointsConfigurer endpoints) throws
    Exception {

    String useJwt = environment.getProperty("spring.security.oauth.jwt");

    if (useJwt != null && "true".equalsIgnoreCase(useJwt.trim())) {

    endpoints.tokenStore(tokenStore()).tokenEnhancer(jwtConeverter())

    .authenticationManager(authenticationManager);

    } else {

    endpoints.authenticationManager(authenticationManager);

    }

    }

    ```


    要启动授权服务器，请使用 `ch12/sample01/` 目录中的以下命令来启动 `TokenService` 微服务，该服务现在会颁发自包含访问令牌（JWT）。


    ```

    \> mvn spring-boot:run

    ```


    要使用客户端凭证 OAuth 2.0 授权类型获取访问令牌，请使用以下命令。确保适当替换 `$CLIENTID` 和 `$CLIENTSECRET` 的值。


    ```

    \> curl -v -X POST --basic -u $CLIENTID:$CLIENTSECRET -H "Content-Type: application/x-www-form-urlencoded;charset=UTF-8"
    -k -d "grant_type=client_credentials&scope=foo" https://localhost:8443/oauth/token

    ```


    此命令将返回一个 base64-url 编码的 JWT，以下显示了解码后的版本。


    ```

    { "alg": "RS256", "typ": "JWT" }

    { "scope": [ "foo" ], "exp": 1524793284, "jti": "6e55840e-886c-46b2-bef7-1a14b813dd0a",
    "client_id": "10101010" }

    ```


    这里只显示了解码后的头部和负载；我们跳过了签名（它是 JWT 的第三部分）。由于我们使用了 `client_credentials` 授权类型，JWT 不包含主题或用户名。它还包含与令牌关联的作用域值。

