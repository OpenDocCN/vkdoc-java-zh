    # 3. Inter-Service Communication


    In the microservices architecture, services are autonomous and communicate over
    the network to cater a business use case. A collection of such services forms
    a *system* and the consumers often interact with those systems. Therefore, a microservices-based
    application can be considered a distributed system running multiple services on
    different network locations. A given service runs on its own process. So microservices
    interact using inter-process or inter-service communication styles.


    In this chapter we discuss the microservice communication styles and the standard
    protocols that are used for microservice communication. The chapter compares and
    contrasts those protocols and styles. However, we will defer the discussion on
    integrating microservices, resilient inter-service communication, and service
    discovery. Those topics are discussed in detail in Chapter [6](#461146_1_En_6_Chapter.xhtml),
    “Microservices Governance” and Chapter [7](#461146_1_En_7_Chapter.xhtml), “Integrating
    Microservices”.


    ### Fundamentals of Microservices Communication


    As discussed in the first chapter, services are business capability-oriented and
    the interactions between these services form a system or a product, which is related
    to a particular set of business use cases. Hence inter-service communication is
    a key factor to the success of the microservices architecture.


    A microservices-based application consists of a suite of independent services
    that communicate with each other through messaging. Messaging is not a new concept
    in distributed systems. In monolithic applications, business functionalities of
    different processors/components are invoked using function calls or language-level
    method calls. In Service Oriented Architecture (`SOA`), this was shifted toward
    more loosely coupled web service level messaging, which is primarily based on
    `SOAP`, on top of different protocols such as `HTTP`, message queuing, etc. Almost
    all of the service interactions are implemented at the centralized Enterprise
    Service Bus (`ESB`) layer.


    In the context of microservices, there is no such restriction as with `SOA`/Web
    Services to use a specific communication pattern and message format. Rather, the
    microservices architecture favors selecting the appropriate service collaboration
    mechanism and message format that are used to exchange information, based on the
    use case.


    Microservice communications styles are predominantly about how services send or
    receive data from one service to the other. The most common type of communication
    styles used in microservices are synchronous and asynchronous.


    ### Synchronous Communication


    In the synchronous communication style, the client sends a request and waits for
    a response from the service. Both parties have to keep the connection open until
    the client receives the response. The execution logic of the client cannot proceed
    without the response. Whereas in asynchronous communication, the client can send
    a message and be completely done with it without waiting for a response.


    Note that synchronous and blocking communication are two different things. There
    are some textbooks and resources that interpret the synchronous communication
    as a pure blocking scenario in which the client thread basically blocks until
    it gets the response. That is not correct. We can use a non-blocking `IO` implementation,
    which registers a callback function once the service responds back, and the client
    thread can be returned without blocking on a particular response. Hence, the synchronous
    communication style can be built on top of a non-blocking asynchronous implementation.'
