    ## 引言


    微服务架构已成为企业软件架构领域最流行的架构风格之一。由于其带来的诸多好处，大多数企业正在将其现有的单体应用转型为基于微服务架构的应用。因此，对于任何软件架构师或软件工程师而言，理解微服务架构的关键架构概念，以及如何在实际中运用这些架构原则来解决真实的业务用例，都至关重要。


    在本书中，我们为读者提供对微服务架构原则的全面理解，并讨论如何在真实场景中运用这些概念。同时，我们不局限于特定技术或框架，而是涵盖了一系列广泛的技术和框架，这些技术和框架最适合微服务架构的特定方面。


    本书的另一个关键区别在于，它解决了在企业架构环境中构建微服务时面临的一些基本挑战，例如服务间通信、无集中式企业服务总线（ESB）的服务集成、将微服务作为 API
    暴露以避免集中式 API 网关、确定微服务的范围与大小，以及利用微服务安全模式。本书中解释的所有概念都配有真实用例，并附带了读者可以尝试的示例。这些用例大多受
    Netflix 和 Google 等现有微服务实现，以及作者在旧金山湾区参加各种聚会和会议的启发。


    本书涵盖了一些在实现微服务架构中广泛使用且前沿的技术和模式，例如容器原生部署技术（Docker、Kubernetes、Helm）、消息传递标准与协议（gRPC、HTTP2、Kafka、AMQP、OpenAPI、GraphQL
    等）、响应式与主动式微服务集成、服务网格（Istio 和 Linkerd）、微服务弹性模式（断路器、超时、舱壁等）、安全标准（OAuth 2、JWT 和证书）、使用
    API、事件和流与微服务结合，以及通过日志记录、指标和追踪构建可观测的微服务。


    ## 致谢


    我们首先要感谢 Apress 的助理编辑总监 Jonathan Gennick，他评估并接受了我们关于本书的提案。然后，Apress 的协调编辑 Jill
    Balzano 在整个出版过程中对我们极为耐心和宽容。非常感谢你，Jill。Apress 的开发编辑 Laura Berendson 也在后期给予了我们帮助。谢谢
    Laura！Alp Tunc 担任了技术审校。谢谢 Alp 的高质量审阅。


    WSO2 的创始人兼首席架构师 Dr. Sanjiva Weerawarana 是我们长期的导师。我们衷心感谢 Dr. Sanjiva 的指导、教诲和支持。我们还要感谢
    WSO2 的首席执行官 Tyler Jewel 和首席技术官 Paul Fremantle 的指引，这帮助我们探索了微服务领域。最后，我们要感谢我们的家人和父母；没有他们，一切皆不可能！


    ### 关于作者与技术审校


    ### 关于作者


    ### 关于技术审校


    # 1. 微服务的理由


    由于技术领域的范式转变以及寻求以快速且可靠的方式构建应用程序的更好方法的愿望，企业软件架构总是随着新的架构风格而演变。


    微服务架构已被广泛采用为一种架构风格，它允许你快速且安全地构建软件应用程序。微服务架构提倡将软件系统构建为一组独立自治的服务（独立开发、部署和扩展），这些服务之间松散耦合。通过集成所有这些服务及其他系统，这些服务形成一个单一的软件应用程序。


    在本章中，我们将探讨什么是微服务、微服务的特征（附有真实示例），以及微服务在企业软件架构背景下的优缺点。


    为了更好地理解什么是微服务，我们需要回顾微服务之前使用的一些架构风格，以及企业架构是如何演变以接纳微服务架构的。


    ## 从单体架构到微服务架构


    探索企业架构从单体应用到微服务的演变，是理解微服务关键动机和特征的好方法。让我们从单体应用的讨论开始。'
- fmt: '### Monolithic Applications


    Enterprise software applications are designed to facilitate numerous business
    requirements. In the monolithic architecture style, all the business functionalities
    are piled into a single monolithic application and built as a single unit.


    Consider a real-world example to understand monolithic applications further. Figure
    [1-1](#461146_1_En_1_Chapter.xhtml#Fig1) shows an online retail application, which
    is built using the monolithic architecture style.


    ![../images/461146_1_En_1_Chapter/461146_1_En_1_Fig1_HTML.png](images/461146_1_En_1_Chapter/461146_1_En_1_Fig1_HTML.png)


    Figure 1-1


    Online retail application developed with a monolithic architecture


    The entire retail application is a collection of several components, such as order
    management, payments, product management, and so on. Each of these components
    offers a wide range of business functionalities. Adding or modifying a functionality
    to a component was extremely expensive owing to its monolithic nature. Also, to
    facilitate the overall business requirements, these components had to communicate
    with each other. The communications between these components were often built
    on top of proprietary protocols and standards, and they were based on the point-to-point
    communication style. Hence, modifying or replacing a given component was also
    quite complicated. For example, if the retail enterprise wanted to switch to a
    new order management system while keeping the rest, doing so would require quite
    a lot of changes to the other existing components too.


    We can generalize the common characteristics of monolithic application as follows:


    - Designed, developed, and deployed as a single unit.

    - Overwhelmingly complex for most of the real-world business use cases, which
    leads to nightmares in maintaining, upgrading, and adding new features.

    - It’s hard to practice Agile development and delivery methodologies. Since the
    application has to be built as a single unit, most of the business capabilities
    that it offers cannot have their own lifecycles.

    - You must redeploy the entire application in order to update any part of it.

    - As the monolithic app grows, it may take longer and longer to start up, which
    adds to the overall cost.

    - It has to be scaled as a single application and is difficult to scale with conflicting
    resource requirements. (For example, since a monolithic application offers multiple
    business capabilities, one capability may require more CPU while another requires
    more memory. It’s hard to cater to the individual needs of these capabilities.)

    - One unstable service can bring the whole application down.

    - It’s very difficult to adopt new technologies and frameworks, as all the functionalities
    have to build on homogeneous technologies/frameworks. (For example, if you are
    using Java, all new projects have to be based on Java, even if that are better
    alternative technologies out there.)


    As a solution to some of the limitations of the monolithic application architecture,
    Service Oriented Architecture (SOA) and Enterprise Service Bus (ESB) emerged.


    ### SOA and ESB


    SOA tries to combat the challenges of large monolithic applications by segregating
    the functionalities of monolithic applications into reusable, loosely coupled
    entities called *services*. These services are accessible via calls over the network.


    - A service is a self-contained implementation of a well-defined business functionality
    that is accessible over the network. Applications in SOA are built based on services.

    - Services are software components with well-defined interfaces that are implementation-independent.
    An important aspect of SOA is the separation of the service interface (the what)
    from its implementation (the how).

    - The consumers are only concerned about the service interface and do not care
    about its implementation.

    - Services are self-contained (perform predetermined tasks) and loosely coupled
    (for independence).

    - Services can be dynamically discovered. The consumers often don’t need to know
    the exact location and other details of a service. They can discover the service’s
    metadata via a service metadata repository or a service registry. When there’s
    a change to the service metadata, the service can update its metadata in the service
    registry.

    - Composite services can be built from aggregates of other services.


    With the SOA paradigm, each business functionality is built as a (coarse-grained)
    service (often implemented as Web Services) with several sub-functionalities.
    These services are deployed inside an application server. When it comes to the
    consumption of business functionalities, we often need to integrate/plumb multiple
    such services (and create composite services) and other systems. Enterprise Service
    Bus (ESB) is used to integrate those services, data, and systems. Consumers use
    the composite services exposed from the ESB layer. Hence, ESB is used as the centralized
    bus (see Figure [1-2](#461146_1_En_1_Chapter.xhtml#Fig2)) that connects all these
    services and systems.


    ![../images/461146_1_En_1_Chapter/461146_1_En_1_Fig2_HTML.jpg](images/461146_1_En_1_Chapter/461146_1_En_1_Fig2_HTML.jpg)


    Figure 1-2


    SOA/ESB style based online retail system


    For example, let’s go back to our online retail application use case. Figure [1-2](#461146_1_En_1_Chapter.xhtml#Fig2)
    illustrates the implementation of the online retail application using SOA/web
    services. Here we have defined multiple web services that cater to various business
    capabilities such as products, customers, shopping, orders, payments, etc. At
    the ESB layer, we may integrate such business capabilities and create composite
    business capabilities, which are exposed to the consumers. Or the ESB layer may
    just be used to expose the functionalities as it is, with additional cross-cutting
    features such as security. So, obviously the ESB layer also contains a significant
    portion of the business logic of the entire application. Other cross-cutting concerns
    such as security, monitoring, and analytics may also be applied at the ESB layer.
    The ESB layer is a monolithic entity where all developers share the same runtime
    to develop/deploy their service integrations.'
