    ### 注意


    如果您在构建或运行本书提供的示例时遇到任何问题，请参考 Git 仓库中对应章节下的 README 文件：[`https://github.com/microservices-for-enterprise/samples.git`](https://github.com/microservices-for-enterprise/samples.git)。我们将更新
    Git 仓库中的示例和相应的 README 文件，以反映与本书使用的工具、库和框架相关的任何变更或更新。


    ### Hello World!


    这是有史以来最简单的微服务。您可以在 `ch04/sample01` 目录下找到代码。要使用 Maven 构建项目，请使用以下命令：


    ```

    \> cd sample01

    \> mvn clean install

    ```


    在深入探讨代码之前，我们先看看添加到 `ch04/sample01/pom.xml` 中的一些值得注意的 Maven 依赖项和插件。


    Spring Boot 提供了不同的 `starter` 依赖项，用于与不同的 Spring 模块集成。`spring-boot-starter-web`
    依赖项引入了 Tomcat 和 Spring MVC，并完成了组件之间的所有连接，将开发者的工作量降至最低。`spring-boot-starter-actuator`
    依赖项引入了生产就绪功能，帮助您监控和管理应用程序。


    ```

    org.springframework.boot

    spring-boot-starter-web


    org.springframework.boot

    spring-boot-starter-actuator


    ```


    在 `pom.xml` 文件中，我们还有 `spring-boot-maven-plugin` 插件，它允许您从 Maven 启动 Spring Boot
    服务。


    ```

    org.springframework.boot

    spring-boot-maven-plugin


    ```


    现在，让我们看看类文件 `src/main/java/com/apress/ch04/sample01/service/OrderProcessing.java`
    中的 `checkOrderStatus` 方法。该方法接受一个订单 ID 并返回订单状态。以下代码中使用了三个值得注意的注解。`@RestController`
    是一个类级别注解，它将相应的类标记为 REST 端点，该端点接受并生成 JSON 负载。`@RequestMapping` 注解可以在类级别和方法级别定义。类级别注解中的
    `value` 属性定义了相应端点注册的路径。方法级别的相同属性会附加到类级别的路径上。花括号中的任何内容都是路径中任意变量值的占位符。例如，对 `/order/101`
    和 `/order/102`（其中 101 和 102 是订单 ID）的 `GET` 请求会命中 `checkOrderStatus` 方法。实际上，`value`
    属性的值是一个 URI 模板^(⁷⁷)。`@PathVariable` 注解从 `@RequestMapping` 注解的 `value` 属性定义的 URI
    模板中提取提供的变量，并将其绑定到方法签名中定义的变量。


    ```

    @RestController

    @RequestMapping(value = "/order")

    public class OrderProcessing {

    @RequestMapping(value = "/{id}", method = RequestMethod.GET)

    public String checkOrderStatus

    (@PathVariable("id") String orderId)

    {

    return ResponseEntity.ok("{''status'' : ''shipped''}");

    }

    }

    ```


    另一个值得查看的重要类文件位于 `src/main/java/com/apress/ch04/sample01/OrderProcessingApp.java`。这个类负责在其自己的应用服务器（本例中为嵌入式
    Tomcat）中启动我们的微服务。默认情况下，它在端口 8080 上启动，您可以通过将例如 `server.port = 9000` 添加到 `src/main/resources/application.properties`
    文件来更改端口。这会将服务器端口设置为 9000。以下展示了来自 `OrderProcessingApp` 类的代码片段，该类负责启动我们的微服务。在类级别定义的
    `@SpringBootApplication` 注解，是 Spring 中其他四个注解的快捷方式：`@Configuration`、`@EnableAutoConfiguration`、`@EnableWebMvc`
    和 `@ComponentScan`。


    ```

    @SpringBootApplication

    public class OrderProcessingApp {

    public static void main(String[] args) {

    SpringApplication.run(OrderProcessingApp.class, args);

    }

    }

    ```


    现在，让我们看看如何运行我们的微服务并通过 cURL 客户端与之通信。以下从 `ch04/sample01` 目录执行的命令展示了如何使用 Maven 启动我们的
    Spring Boot 应用程序。


    ```

    \> mvn spring-boot:run

    ```


    要使用 cURL 客户端测试微服务，请在另一个命令控制台中使用以下命令。它将在初始命令之后打印如下所示的输出。


    ```

    \> curl http://localhost:8080/order/11

    {"customer_id":"101021","order_id":"11","payment_method":{"card_type":"VISA","expiration":"01/22","name":"John
    Doe","billing_address":"201, 1st Street, San Jose, CA"},"items": [{"code":"101","qty":1},{"code":"103","qty":5}],"shipping_address":"201,
    1st Street, San Jose, CA"}

    ```


    ### Spring Boot Actuator


    收集运行中微服务的遥测数据极其重要。这在第 13 章中有详细讨论。在本节中，我们将探讨 Spring Boot 通过 `actuator` 端点^(⁷⁸)
    开箱即用提供的一些监控功能。`actuator` 端点背后运行着多个服务，其中大部分默认是启用的。正如上一节所讨论的，我们只需要添加对 `spring-boot-starter-actuator`
    的依赖即可启用它。让我们保持上一示例中的 Spring Boot 应用程序运行，并执行一组 cURL 命令。


    以下 cURL 命令对 `actuator/health` 端点执行 `GET` 请求，返回服务器状态。


    ```

    \> curl http://localhost:8080/actuator/health

    {"status":"UP"}

    ```


    Spring Boot 通过 HTTP 和 JMX 暴露遥测数据。出于安全原因，并非所有数据都通过 HTTP 暴露，只有 `health` 和 `info`
    服务。我们可以自行承担风险，看看如何通过 HTTP 启用 `httptrace` 端点。您需要将以下内容添加到 `src/main/resources/application.properties`
    文件中，并重新启动 Spring Boot 应用程序。


    ```

    management.endpoints.web.exposure.include = health,info,httptrace

    ```


    现在，让我们多次访问我们的微服务。


    ```

    \> curl http://localhost:8080/order/11

    \> curl http://localhost:8080/order/11

    \> curl http://localhost:8080/order/11

    ```


    以下 cURL 命令将调用 `httptrace` 端点，该端点将返回 HTTP 跟踪信息。


    ```

    \> curl http://localhost:8080/actuator/httptrace

    {

    "traces":[

    {

    "timestamp":"2018-03-29T16:42:46.235Z",

    "principal":null,

    "session":null,

    "request":{

    "method":"GET",

    "uri":"http://localhost:8080/order/11",

    "headers":{

    "host":[

    "localhost:8080"

    ],

    "user-agent":[

    "curl/7.54.0"

    ],

    "accept":[

    "*/*"

    ]

    },

    "remoteAddress":null

    },

    "response":{

    "status":200,

    "headers":{

    "Content-Type":[

    "text/plain;charset=UTF-8"

    ],

    "Content-Length":[

    "7"

    ],

    "Date":[

    "Thu, 29 Mar 2018 16:42:46 GMT"

    ]

    }

    },

    "timeTaken":14

    }

    ]

    }

    ```

