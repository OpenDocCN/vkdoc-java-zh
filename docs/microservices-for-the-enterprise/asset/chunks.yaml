  trans: '

    ## 微服务间的数据共享


    在单体数据库中，进行任意数据组合都非常容易，因为我们共享一个单一的单体数据库。然而，在微服务上下文中，每一条数据都由单个服务（即单个*记录系统*）所拥有。任何其他服务或系统都不能直接访问记录系统（或持久层）。访问其他微服务所拥有数据的唯一途径是通过服务接口或
    API。其他系统通过已发布的 API 访问数据时，或许可以使用只读本地缓存来在本地保存数据。


    为了满足这些需求，我们需要提出合适的技术来实现微服务间的数据共享，因为大多数业务场景都需要它。


    ### 消除共享表


    在多个服务/应用程序之间共享表是单体数据库中非常常见的模式。如前所述，当我们在两个或多个微服务之间共享一个表时，对该表模式的更改可能会影响所有依赖的微服务。例如，如图
    5-2 所示，`订单处理`服务和`物流`服务共享同一个表`TRACKING_INFO`，该表用于跟踪订单状态。这两个服务都可能对该表进行读写操作，底层的中央数据库提供了所有必需的功能（例如
    ACID 事务）。然而，如果我们需要更改`TRACKING_INFO`表的模式，那么这将同时影响`订单处理`服务和`物流`服务。此外，也无法在共享表中存放特定于某个服务（该服务不希望共享）的数据。这类共享表场景与微服务数据管理的基本原则不相容。一个服务的持久化存储/数据库应该是独立的，并且只能由一个微服务对其进行操作。因此，采用微服务架构时，我们需要消除此类共享表。


    ![../images/461146_1_En_5_Chapter/461146_1_En_5_Fig2_HTML.jpg](img/461146_1_En_5_Fig2_HTML.jpg)


    图 5-2


    使用共享表的两个服务之间的数据管理


    那么，我们如何消除共享表呢？如果你按照我们之前讨论的微服务数据处理原则来思考，给定的数据必须由单个服务拥有。因此，在这个例子中（如图 5-3 所示），跟踪信息应该被拆分成两个表。一个表应包含与`订单处理`微服务相关的数据，另一个表应包含与`物流`微服务相关的数据。这两个表上可以存在重复的共享数据，并且服务负责通过各自发布的
    API（不直接访问数据库）来保持数据同步。我们将在本章后面详细讨论这些同步技术。


    ![../images/461146_1_En_5_Chapter/461146_1_En_5_Fig3_HTML.jpg](img/461146_1_En_5_Fig3_HTML.jpg)


    图 5-3


    拆分共享数据并将其作为独立实体进行管理


    共享表的另一种变体是共享数据被表示为独立的业务实体。在前面的例子中，共享数据（跟踪信息）并不代表一个业务实体。因此，让我们举一个不同的例子：在`订单处理`服务和`产品管理`服务之间共享客户数据。在这种情况下，这两个服务都在其业务逻辑中使用来自共享数据表（`CUSTOMER`表）的数据。我们现在可以识别出，客户信息不仅仅是一个表，而是一个完全不同的业务实体。我们可以简单地将其视为一个面向业务能力的实体，并将其建模为一个微服务。如图
    5-4 所示，我们可以引入`客户`微服务，让它拥有客户数据，而其他服务可以通过`客户`服务暴露的 API 来消费客户数据。


    ![../images/461146_1_En_5_Chapter/461146_1_En_5_Fig4_HTML.jpg](img/461146_1_En_5_Fig4_HTML.jpg)


    图 5-4


    服务通过建立在客户数据库之上的服务共享客户信息


    因此，我们可以确定消除在多个微服务之间共享数据表所涉及的关键步骤。


    1.  识别共享表，并确定该共享表中存储的数据所对应的业务能力。


    2.  将共享表迁移到专用数据库，并在该数据库之上，创建上一步中识别出的新服务（业务能力）。


    3.  移除其他服务对所有数据库的直接访问，仅允许它们通过服务发布的 API 访问数据。


    通过这种设计，我们需要为新创建的共享服务指定一个专属所有者，该所有者可以修改该服务的服务接口或模式。这也有助于我们发现这些服务之间新的业务边界，这将使我们的基于微服务的应用程序能够适应未来的任何新需求。


    ### 共享数据


    将数据存储在多张表中并通过外键（FK）进行连接，是关系数据库中非常常见的技术。外键是一个列或列的组合，用于建立和强制两张表中数据之间的链接。你可以在创建或修改表时通过定义`FOREIGN
    KEY`约束来创建外键。外键实现了存储在多张表中的数据之间的参照完整性，这意味着如果外键包含一个值，则该值引用相关表中一条已存在的记录。


    例如，图 5-5 展示了`订单处理`服务和`产品管理`服务，它们使用了`ORDER`表和`PRODUCT`表。一个给定的订单包含多个产品，订单表通过一个指向`PRODUCT`表主键的外键来引用这些产品。有了外键约束，你只能向`ORDER`表的外键中添加来自已存在`ORDER`实体的值。


    ![../images/461146_1_En_5_Chapter/461146_1_En_5_Fig5_HTML.jpg](img/461146_1_En_5_Fig5_HTML.jpg)


    图 5-5


    共享数据库 - 表之间的外键关系


    对于单体共享数据库，使用外键和连接数据是相当简单的。但是，当你希望拥有独立的服务并为每个服务使用一个数据库时，拥有这种用于参照完整性的链接几乎是不可能的。因此，在微服务架构中，我们需要找到不同的方法来处理这种情况。让我们看看一些常用的技术来实现这些需求。

    '
- fmt: '### Synchronous Lookups


    When you have a dedicated database for each microservice, if one service needs
    to access the data of the other, it can simply access the published API of that
    microservice and retrieve the required data. For example, as shown in Figure [5-6](#461146_1_En_5_Chapter.xhtml#Fig6),
    the order service keeps the required product IDs that are part of a given order.
    If the `Order Processing` service requires the detailed information of the products,
    then from its application logic, it has to invoke the `Product Management` service
    and retrieve the product information.


    ![../images/461146_1_En_5_Chapter/461146_1_En_5_Fig6_HTML.jpg](images/461146_1_En_5_Chapter/461146_1_En_5_Fig6_HTML.jpg)


    Figure 5-6


    Using synchronous lookups to the service interface to access the data owned by
    other services


    This technique is quite trivial to understand and at the implementation level,
    you need to write extra logic to do an external service call. We need to keep
    in mind that, unlike databases, we no longer have the referential integrity of
    a foreign key constraint. This means that the service developers have to take
    care of the consistency of data that they put into the table. For example, when
    you create an order you need to make sure (possibly by calling the product service)
    that the products that are referred from that order actually exist in the `PRODUCT`
    table.


    ### Using Asynchronous Events


    Sharing data using synchronous lookups from other microservices may be expensive
    in certain business scenarios. As an alternative, we can leverage the event-driven
    architecture (publisher-subscriber pattern) to share data between services. For
    example, for the same scenario of the `Order Processing` and `Product Management`
    services (see Figure [5-7](#461146_1_En_5_Chapter.xhtml#Fig7)), we can introduce
    an event-driven communication pattern, in which we have an event bus, which is
    used as the messaging infrastructure. If there is an update to a product, the
    `Product Management` service (publisher) updates its product table and publishes
    an event into the event bus. The `Order Processing` service (subscriber) has subscribed
    to the interested topic of product updates and, therefore, as the `Product Management`
    service publishes product update events to that topic, the `Order Processing`
    service will receive them. Then it can update its local cache of product information
    and use the cache to implement the business logic of the `Product Management`
    service.


    ![../images/461146_1_En_5_Chapter/461146_1_En_5_Fig7_HTML.jpg](images/461146_1_En_5_Chapter/461146_1_En_5_Fig7_HTML.jpg)


    Figure 5-7


    Using asynchronous events to share data between microservices


    As the event bus you can select any asynchronous messaging technology (we discussed
    asynchronous messaging techniques in detail in Chapter [3](#461146_1_En_3_Chapter.xhtml),
    “Inter-Service Communication”), such as Kafka or AMQP Broker (such as RabbitMQ),
    and you can use different subscription techniques to ensure the delivery of the
    event to the subscriber (such as durable subscriptions).


    With this approach, you can eliminate synchronous service calls from one service
    to the other, but since we are using a local cache, the data can be stale. Hence
    the asynchronous event-based data sharing is an eventual consistency model. Eventual
    consistency makes sure that the data of each service gets consistent eventually
    (you may get stale data for a certain amount of time). The time taken by the services
    to get consistent data may or may not be defined. Therefore, we need to use this
    pattern for use cases that are not affected by an eventual consistency nature.


    ### Shared Static Data


    When it comes to storing and sharing the immutable read-only metadata, conventional
    monolithic databases are often used and data is shared through a shared table.
    For example, data such as U.S. states, list of countries, etc., is often used
    as the shared static data. With a microservices approach, since we don’t want
    to share the databases, we need to think about how to keep the shared static data.


    One would think that having another microservices with the static data would solve
    this problem, but it is overkill to have a service just to get some static information
    that does not change over time. Hence, sharing static data is often done with
    shared libraries. For example, if a given service wants to use the static metadata,
    it has to import the shared library into the service code.


    ## Data Composition


    Composing data from multiple entities and creating different views is a very common
    requirement in data management. With monolithic databases (RDBMS in particular),
    it is trivially easy to build the composition of multiple tables using joins in
    SQL statements. So, you can seamlessly compose different data views out of the
    exiting entities and use them in your services.


    However, in the microservices context, when you introduce the database per microservice
    method, building data compositions becomes very complex. You no longer can use
    the built-in constructs such as joins to compose data, which are dispersed among
    multiple databases owned by different services.


    Let’s take a closer look at some of the commonly used techniques to do data composition
    with microservices.


    ### Composite Services or Client-Side Mashups


    When you have to create join of data from multiple microservices, you are only
    allowed to access the service APIs. So, to create composition of data from multiple
    microservices, you can create a composite service on top of the existing microservices.
    The composite service is responsible for invoking the downstream services and
    does the runtime composition of the data retrieved via service calls.


    For example, let’s consider the example shown in Figure [5-8](#461146_1_En_5_Chapter.xhtml#Fig8).
    Suppose that we need to create a composition of the orders placed and have the
    details of the customers who have placed those orders. Here we have two services—`Order
    Processing` and `Customer`—which have their own databases to hold the orders and
    customer information.


    ![../images/461146_1_En_5_Chapter/461146_1_En_5_Fig8_HTML.jpg](images/461146_1_En_5_Chapter/461146_1_En_5_Fig8_HTML.jpg)


    Figure 5-8


    Data composition using a composite service that calls the downstream services
    and aggregates the data


    The requirement that we have at hand is to create a join of the orders and customers.
    With the composite service approach, we can create a new service—the `Customer-Order`
    composite service—and call the `Order Processing` and `Customer` microservices
    from it. You need to implement the runtime data composition logic as well as the
    communication logic (for example, to invoke RESTful `Order Processing` and `Customer`
    microservices) inside the composite service.


    One other alternative is to implement the same runtime data composition at the
    client side. Basically, rather having a composite service, the consumers/client
    applications can call the required downstream services and build the composition
    themselves. This is often known as a *client-side mashup*.


    Composite services or client-side mashups are suitable when the data that you
    have joined is relatively small. Since this is a runtime composition, if you are
    going to load a lot of data into memory, the runtime of the composite service
    will require a lot of memory. Therefore, we need to select this approach based
    on the data composition scenario that we have to implement.


    ### Tip


    Data composition with composite services or client-side mashup is suitable for
    joins of 1:m type, where a row from one table can have multiple matching rows
    in another table.'
