    ## 开放追踪简介


    当同一微服务部署中的不同微服务使用不同的追踪模块时，分布式追踪会变得相当棘手。例如，`订单处理`微服务可能使用 Sleuth 来生成跨度（span）和追踪（trace），而`库存`微服务则使用另一个模块。两者都可以将追踪数据发布到
    Zipkin，但除非这两个模块共享相同的跨度和追踪定义，并尊重彼此生成的追踪数据，否则这些信息将毫无用处。这迫使开发者在所有微服务中使用相同的追踪模块，这在一定程度上违背了我们引以为傲的微服务多语言架构。*开放追踪*^(¹⁶⁵)
    是一项旨在通过构建开放标准来解决此问题的倡议。它精确地定义了在开放追踪数据模型下什么是跨度，什么是追踪。


    开放追踪必须跨多种编程语言工作。在撰写本文时，它为九种编程语言定义了语言级别的 API：Go、Python、JavaScript、Java、C#、Objective-C、C++、Ruby
    和 PHP。这些 API 已有多种实现。由 Uber 开发的开源分布式追踪系统 Jaeger 支持开放追踪，并包含针对多种编程语言的开放追踪客户端库：Java、Go、Python、Node.js、C++
    和 C#。


    ### 使用 Spring Boot 微服务和 Zipkin 进行基于开放追踪的分布式追踪


    Zipkin 支持开放追踪，但 Sleuth 不支持。你可以将 Sleuth 视为追踪客户端，而 Zipkin 是收集所有追踪数据的服务器。在前面章节讨论的示例中，Sleuth
    被用作 Zipkin 的追踪客户端，并且它使用了 Zipkin 特定的格式，这种格式不适用于开放追踪。在本节中，我们将了解如何从与开放追踪兼容的 Spring
    Boot 微服务发布追踪数据。与此示例相关的源代码位于 `ch13/sample03` 目录中。


    让我们看看添加到 `ch13/sample03/pom.xml` 文件中的一些值得注意的 Maven 依赖项。`opentracing-spring-cloud-starter`
    和 `opentracing-spring-zipkin-starter` 依赖项引入了将兼容开放追踪的追踪信息发布到 Zipkin 所需的所有依赖项。


    ```

    io.opentracing.contrib

    opentracing-spring-cloud-starter

    0.1.13


    io.opentracing.contrib

    opentracing-spring-zipkin-starter

    0.1.1


    ```


    假设你仍在运行上一节中的 Zipkin 节点，请将 `opentracing.zipkin.http-sender.baseUrl` 属性添加到 `application.properties`
    文件中，该属性包含 Zipkin 服务器的服务器 URL。


    ```

    opentracing.zipkin.http-sender.baseUrl=http://localhost:9411/

    ```


    现在，让我们运行 `订单处理` 微服务，并使用以下 cURL 命令（从 `ch13/sample03` 目录运行）调用它。执行几次，并通过运行在 `http://localhost:9411/zipkin/`
    的 Zipkin Web 控制台观察记录的数据。


    ```

    \> mvn clean install

    \> mvn spring-boot:run

    \> curl http://localhost:9000/order/11

    ```


    ### 使用 Spring Boot 微服务和 Jaeger 进行基于开放追踪的分布式追踪


    在上一节中，我们解释了如何将兼容开放追踪的追踪信息发布到 Zipkin。由于它是开放追踪，不仅仅是 Zipkin，任何其他支持开放追踪的产品都应该能够接收它。在本节中，我们将了解如何将追踪数据从
    Spring Boot 微服务发布到与开放追踪兼容的 Jaeger（见图 13-9）。Jaeger 是另一个受 Zipkin 和 Dapper 启发、由 Uber
    开发的开源分布式追踪系统。与此示例相关的源代码位于 `ch13/sample04` 目录中。我们可以使用以下命令启动一个 Jaeger Docker 实例，该实例将在
    HTTP 端口 16686 和 UDP 端口 5775 上运行。启动后，我们可以通过 `http://localhost:16686/` 访问其 Web 控制台。


    ![../images/461146_1_En_13_Chapter/461146_1_En_13_Fig9_HTML.jpg](img/461146_1_En_13_Fig9_HTML.jpg)


    图 13-9


    Jaeger Web 控制台


    ```

    \> docker run -d -p 5775:5775/udp -p 16686:16686 jaegertracing/all-in-one:latest

    ```


    ### 注意


    对 Jaeger 的全面介绍超出了本书的范围，我们建议需要详细了解的读者参考 [`https://www.jaegertracing.io/docs/`](https://www.jaegertracing.io/docs/)
    上的 Jaeger 文档。


    让我们看看添加到 `ch13/sample04/pom.xml` 文件中的一些值得注意的 Maven 依赖项。`opentracing-spring-cloud-starter`
    和 `opentracing-spring-cloud-starter-jaeger` 依赖项引入了将兼容开放追踪的追踪信息发布到 Jaeger 所需的所有依赖项。


    ```

    io.opentracing.contrib

    opentracing-spring-cloud-starter

    0.1.13


    io.opentracing.contrib

    opentracing-spring-cloud-starter-jaeger

    0.1.13


    ```


    从我们的 Spring Boot 微服务中，我们使用 UDP 端口 5775 连接到 Jaeger 服务器以发布追踪信息。我们需要将 `opentracing.jaeger.udp-sender.host`
    和 `opentracing.jaeger.udp-sender.port` 属性添加到 `application.properties` 文件中。


    ```

    opentracing.jaeger.udp-sender.host=localhost

    opentracing.jaeger.udp-sender.port=5775

    ```


    现在，让我们运行 `订单处理` 微服务，并使用以下 cURL 命令（从 `ch13/sample04` 目录运行）调用它。执行几次，并通过运行在 `http://localhost:16686/`
    的 Jaeger Web 控制台观察记录的数据。


    ```

    \> mvn clean install

    \> mvn spring-boot:run

    \> curl http://localhost:9000/order/11

    ```


    ## 使用 Prometheus 进行指标监控


    Prometheus 是一个用于监控和告警的开源系统。在本节中，我们将了解如何使用 Prometheus 监控微服务部署。其工作方式是，所有微服务都将暴露自己的端点以向外部公开其指标，然后
    Prometheus 将定期轮询这些端点（见图 13-10）。


    ### 注意


    对 Prometheus 的全面介绍超出了本书的范围，我们建议需要详细了解的读者参考 [`https://prometheus.io/`](https://prometheus.io/)
    上的 Prometheus 文档。


    ![../images/461146_1_En_13_Chapter/461146_1_En_13_Fig10_HTML.jpg](img/461146_1_En_13_Fig10_HTML.jpg)


    图 13-10


    Prometheus 从连接的微服务拉取追踪数据

