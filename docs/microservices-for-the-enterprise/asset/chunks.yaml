    and produce the best products to address their needs. No point in producing something
    useless to its customers. This is the level of collaboration expected between
    upstream/downstream contexts adhering to the customer/supplier pattern. This helps
    the downstream contexts to provide suggestions, and request changes to the interface
    between the two contexts. Following this pattern, there is more responsibility
    on the upstream context. A given upstream context not only deals with one downstream
    context. You need to be extra careful that a suggestion from one downstream context
    does not break the contract between the upstream context and another downstream
    context.


    #### Partnership


    When we have two or more teams building microservices under different bounded
    contexts, but overall moving toward the same goal, and there are notable inter-dependencies
    between them, partnership pattern is an ideal way to build collaboration. Teams
    can collaborate in making decisions over the technical interfaces, release schedules,
    and anything of common interest. The partnership pattern is also applicable to
    any teams using the shared kernel pattern. The collaboration required to build
    the shared kernel can be established via a partnership. Also keep in mind that
    the output of the partnership pattern is not necessarily a shared kernel. It can
    be any interdependent services with nothing concrete to share.


    #### Published Language


    Microservices or bounded contexts, which follow the published language pattern,
    should agree on a published language to communicate. Here the *published* means
    that the language is readily available to the community that might be interested
    in using it. This can be XML, JSON, or any other language corresponding to the
    domain where the microservices are. Here the domain means the core domain. For
    example, there are domain specific languages used in the financial, e-business,
    and many other domains.


    This pattern highlights the importance of using a well-documented shared language
    to express necessary domain information as a common medium of communication. Figure
    [2-10](#461146_1_En_2_Chapter.xhtml#Fig10) shows how the translation works in
    and out of the published language to the context-specific languages. There we
    have a Java to JSON parser at the `Order Processing` microservice end, which knows
    how to create a JSON document from a Java object model. We use the JSON to C#
    parser at the `Inventory` microservice end to build a C# object model from a JSON
    document.


    ![../images/461146_1_En_2_Chapter/461146_1_En_2_Fig10_HTML.png](images/461146_1_En_2_Chapter/461146_1_En_2_Fig10_HTML.png)


    Figure 2-10


    Published language pattern


    #### Open Host Service


    In the anti-corruption layer pattern we have a translation layer between upstream
    and downstream microservices (or bounded contexts). When we have multiple downstream
    services, each downstream service has to handle the translation, as shown in Figure
    [2-11](#461146_1_En_2_Chapter.xhtml#Fig11). Both the `Delivery` and `Supplier
    Management` microservices have to translate the object model they get from the
    `Billing` upstream microservice to their own respective domain models (see Figure
    [2-11](#461146_1_En_2_Chapter.xhtml#Fig11)). If each of these downstream microservice
    has its own domain model, it doesn’t matter. We cannot avoid the translation happening
    at each end. But, if we have many downstream microservices doing the same translation,
    then it’s a duplication of the effort. The open host service pattern suggests
    an approach to overcome this.


    ![../images/461146_1_En_2_Chapter/461146_1_En_2_Fig11_HTML.jpg](images/461146_1_En_2_Chapter/461146_1_En_2_Fig11_HTML.jpg)


    Figure 2-11


    Anti-corruption layer pattern with multiple downstream services


    One way to implement the open host service pattern is to expose the upstream microservice
    functionality via an API, and the API does the translation. Now, all the downstream
    microservices, which share the same domain model, can talk to the API (instead
    of the upstream microservice) and follow either the conformist or customer/supplier
    pattern.


    Figure [2-12](#461146_1_En_2_Chapter.xhtml#Fig12) shows the implementation of
    the open host service pattern using an API. We’ll be discussing the role of an
    API gateway, in a microservices architecture, in Chapter [10](#461146_1_En_10_Chapter.xhtml):
    APIs, Events and Streams.


    ![../images/461146_1_En_2_Chapter/461146_1_En_2_Fig12_HTML.png](images/461146_1_En_2_Chapter/461146_1_En_2_Fig12_HTML.png)


    Figure 2-12


    Open host service pattern


    #### Separate Ways


    Let’s revisit the microservices design we did for our e-commerce application.
    There we have a `Customer` microservice and an `Order Processing` microservice
    (see Figure [2-2](#461146_1_En_2_Chapter.xhtml#Fig2)). Think of a customer portal,
    which talks to the `Customer` microservice and displays user profile. It may be
    useful to the end user to see his/her order history, along with the profile data.
    But the `Customer` microservice does not have direct access to the order history
    of a given customer; it’s under the control of `Order Processing` microservice.
    One way to facilitate this is to integrate the `Order Processing` microservice
    with the `Customer` microservice, and change the domain model of the `Customer`
    microservice to return the order history along with the profile data, which is
    a costly integration.


    Integration is always expensive and sometimes the benefit is small. The separate
    ways pattern suggests avoiding such costly integrations, and finds other ways
    to cater such requests. For example, in this particular scenario, we can avoid
    the integration between the `Order Processing` microservice and the `Customer`
    microservice and provide a link to the customer portal, along with the profile
    data to retrieve order history, and that will directly talk to the `Order Processing`
    microservice (see Figure [2-13](#461146_1_En_2_Chapter.xhtml#Fig13)).


    ![../images/461146_1_En_2_Chapter/461146_1_En_2_Fig13_HTML.jpg](images/461146_1_En_2_Chapter/461146_1_En_2_Fig13_HTML.jpg)


    Figure 2-13


    Separate ways pattern


    #### Big Ball of Mud


    Most of the time you don’t get a chance to work on a green-field project. Always
    you find some kind of a legacy system with lots of resistance to integrate with
    other systems in a standard manner. These systems do not have clear boundaries
    and clean domain models. The big ball of mud pattern highlights the need to identify
    such systems and treat them in a special context. We should not try to apply sophisticated
    modeling to these contexts, but rather find a way to integrate via an API or some
    kind of a service interface and use an anti-corruption layer pattern at the downstream
    service end.


    ## Design Principles


    Domain-driven design helps us scope out microservices along with bounded contexts.
    At its core in any microservices design, time to production, scalability, complexity
    localization, and resiliency are key elements. Adhering to the following design
    principles helps a microservice reach those design goals.'
  trans: '

    #### 客户/供应商模式


    顺从模式有其自身的缺陷，即下游上下文或服务对于其与上游上下文之间的接口应如何设计没有发言权。在上下游限界上下文工作的团队之间不存在协作。客户/供应商模式是朝着在这两个团队之间建立更好沟通、并找到协作构建接口方法迈出的一步。它不像共享内核模式那样是完全的协作，而更像是一种客户/供应商关系。下游上下文是客户，上游上下文是供应商。


    客户不能完全决定供应商做什么。但同样，供应商也不能完全忽视客户的反馈。一个好的供应商总会倾听客户的意见，提取积极因素，向客户提供反馈，并生产出满足其需求的最佳产品。生产对客户无用的东西毫无意义。这就是遵循客户/供应商模式的上下游上下文之间预期的协作水平。这有助于下游上下文提供建议，并请求更改两个上下文之间的接口。遵循此模式，上游上下文承担了更多责任。一个给定的上游上下文不仅要处理一个下游上下文。你需要格外小心，确保来自一个下游上下文的建议不会破坏上游上下文与另一个下游上下文之间的契约。


    #### 伙伴关系模式


    当我们有两个或多个团队在不同的限界上下文下构建微服务，但总体朝着相同的目标前进，并且它们之间存在显著的相互依赖关系时，伙伴关系模式是建立协作的理想方式。团队可以就技术接口、发布计划以及任何共同关心的事项进行协作决策。伙伴关系模式也适用于任何使用共享内核模式的团队。构建共享内核所需的协作可以通过伙伴关系来建立。同时请记住，伙伴关系模式的输出不一定是共享内核。它可以是任何相互依赖的服务，而无需共享具体内容。


    #### 发布语言模式


    遵循发布语言模式的微服务或限界上下文，应就一种发布语言达成一致以进行通信。这里的*发布*意味着该语言对可能对其感兴趣的社区是随时可用的。这可以是 XML、JSON
    或与微服务所在领域相对应的任何其他语言。这里的领域指的是核心领域。例如，在金融、电子商务和许多其他领域中使用的特定领域语言。


    此模式强调了使用文档完善的共享语言来表达必要的领域信息，作为通用通信媒介的重要性。图 2-10 展示了在发布语言和特定上下文语言之间如何进行转换。在`订单处理`微服务端，我们有一个
    Java 到 JSON 的解析器，它知道如何从 Java 对象模型创建 JSON 文档。我们在`库存`微服务端使用 JSON 到 C# 的解析器，从 JSON
    文档构建 C# 对象模型。


    ![../images/461146_1_En_2_Chapter/461146_1_En_2_Fig10_HTML.png](img/461146_1_En_2_Fig10_HTML.png)


    图 2-10


    发布语言模式


    #### 开放主机服务模式


    在防腐层模式中，我们在上游和下游微服务（或限界上下文）之间有一个转换层。当我们有多个下游服务时，每个下游服务都必须处理转换，如图 2-11 所示。`配送`和`供应商管理`微服务都必须将从上游`计费`微服务获取的对象模型转换到它们各自的领域模型（见图
    2-11）。如果这些下游微服务各自拥有自己的领域模型，那倒没关系。我们无法避免在每个端点进行转换。但是，如果我们有许多下游微服务都在做相同的转换，那就造成了重复劳动。开放主机服务模式提出了一种克服此问题的方法。


    ![../images/461146_1_En_2_Chapter/461146_1_En_2_Fig11_HTML.jpg](img/461146_1_En_2_Fig11_HTML.jpg)


    图 2-11


    具有多个下游服务的防腐层模式


    实现开放主机服务模式的一种方法是通过 API 暴露上游微服务功能，并由该 API 执行转换。现在，所有共享相同领域模型的下游微服务都可以与 API（而不是上游微服务）通信，并遵循顺从模式或客户/供应商模式。


    图 2-12 展示了使用 API 实现开放主机服务模式。我们将在第 10 章：API、事件和流中讨论 API 网关在微服务架构中的作用。


    ![../images/461146_1_En_2_Chapter/461146_1_En_2_Fig12_HTML.png](img/461146_1_En_2_Fig12_HTML.png)


    图 2-12


    开放主机服务模式


    #### 各自为政模式


    让我们重新审视为电子商务应用所做的微服务设计。其中有一个`客户`微服务和一个`订单处理`微服务（见图 2-2）。设想一个客户门户，它与`客户`微服务通信并显示用户资料。对最终用户来说，能够在其资料数据旁边看到自己的订单历史可能很有用。但是`客户`微服务无法直接访问特定客户的订单历史；它由`订单处理`微服务控制。实现这一点的一种方法是集成`订单处理`微服务和`客户`微服务，并更改`客户`微服务的领域模型，使其在返回资料数据的同时返回订单历史，这是一种成本高昂的集成。


    集成总是昂贵的，有时收益却很小。各自为政模式建议避免这种成本高昂的集成，并寻找其他方式来满足此类请求。例如，在这种特定场景下，我们可以避免`订单处理`微服务和`客户`微服务之间的集成，而是在客户门户中提供一个链接，连同资料数据一起用于检索订单历史，该链接将直接与`订单处理`微服务通信（见图
    2-13）。


    ![../images/461146_1_En_2_Chapter/461146_1_En_2_Fig13_HTML.jpg](img/461146_1_En_2_Fig13_HTML.jpg)


    图 2-13


    各自为政模式


    #### 大泥球模式


    大多数时候，你没有机会从事一个全新项目。你总会发现某种遗留系统，它们极难以标准方式与其他系统集成。这些系统没有清晰的边界和干净的领域模型。大泥球模式强调了识别此类系统并在特殊上下文中处理它们的必要性。我们不应尝试对这些上下文应用复杂的建模，而应找到通过
    API 或某种服务接口进行集成的方法，并在下游服务端使用防腐层模式。


    ## 设计原则


    领域驱动设计帮助我们结合限界上下文来界定微服务的范围。在任何微服务设计的核心中，上市时间、可扩展性、复杂性局部化和弹性都是关键要素。遵循以下设计原则有助于微服务实现这些设计目标。

    '
- fmt: '### High Cohesion And Loose Coupling


    `Cohesion` is a measure of how well a given system is self-contained. Gary McLean
    Hall, in his book *Adaptive Code*, presents cohesion as a measure of the contextual
    relationship between variables in a method, methods in a class, classes in a module,
    modules in a solution, solutions in a subsystem, and subsystems in a system. This
    fractal relationship is important because a lack of cohesion at any scope is problematic.
    Cohesion can be low or high based on the strength of the contextual relationships.
    In a microservices architecture, if we have one microservice to address two or
    more unrelated problems, or in other words two or more problems with weak contextual
    relationships, this results in a low cohesive system. Low cohesive systems are
    brittle in nature. When we build one microservice to address many other not-so
    related requirements, chances are high that we have to change the implementation
    more frequently.


    How do we know, given two requirements, if we have a strong contextual relationship?
    This is the whole point of the exercise we carried out in the previous section
    under domain-driven design. If your requirements fall under the same bounded context,
    then those do have a strong contextual relationship. If the service boundaries
    of a microservice are aligned to the bounded context of the corresponding domain,
    then it will produce a highly cohesive microservice.


    ### Note


    A highly cohesive and loosely coupled system will naturally follow the *single
    responsibility principle*. The single responsibility principle states that a component
    or a system that adheres to it should only have one reason to change.


    Cohesion and coupling are two related properties of a system design. A highly
    cohesive system is naturally loosely coupled. `Coupling` is a measure of the interdependence
    between different systems or, in our case, microservices. When we have a high
    interdependency between microservices, this will result in a tightly coupled system,
    while a low interdependency will produce a loosely coupled system. Tightly coupled
    systems build a brittle system architecture. A change done in one system will
    affect all the related systems. If one system goes down, all the related systems
    will be dysfunctional. When we have a high cohesive system, we group all the related
    or interdependent functionalities together, into one system (or group into one
    bounded context). So, it does not need to heavily rely on other systems.


    A microservices architecture must be highly cohesive and loosely coupled, by definition.


    ### Resilience


    `Resilience` is a measure of the capacity of a system or individual components
    in a system to recover quickly from a failure. In other words it is an attribute
    of a system that enables it to deal with failure in a way that doesn’t cause the
    entire system to fail. A microservices architecture is naturally a distributed
    system. A distributed system is a collection of computes (or nodes) connected
    over the network, with no shared memory, that appears to its users as a single
    coherent system. In a distributed system, failures are not strange. Now and forever
    the network will always be unreliable. An underwater fiber optics cable may get
    damaged by a submarine, a router can be blown up due to the heat, a load balancer
    can start to malfunction, computers may run out of memory, a power failure can
    take a database server down, an earthquake may take an entire data center down—and
    for a thousand and one other reasons the communication in a distributed system
    may fail.


    ### Note


    In 1994, Peter Deutsch, a Sun fellow at the time, drafted seven assumptions architects
    and designers of distributed systems are likely to make, which prove wrong in
    the long run and result in all sorts of troubles and pain for the solution and
    architects who made the assumptions. In 1997, James Gosling added another such
    fallacy. The assumptions are now collectively known as *the eight fallacies of
    distributed computing*: 1. The network is reliable. 2. Latency is zero. 3. Bandwidth
    is infinite. 4. The network is secure. 5. Topology doesn’t change. 6. There is
    one administrator. 7. Transport cost is zero. 8. The network is homogeneous.^([²](#fn2))


    Failures are unavoidable. Ariel Tseitlin, in his ACM paper, *“*Anti-Fragile Organization,”^([³](#fn3))
    talks about embracing failures to improve resilience and maximize availability,
    taking Netflix as an example. One way Ariel highlights in his paper to increase
    the resilience of a system is to reduce uncertainty by regularly inducing failures.
    Netflix accepts the idea of inducing failures regularly and takes an aggressive
    approach by writing programs that cause failures and running them in production
    in daily basis (The Netflix Simian Army). Google too goes beyond simple tests
    to mimic server failures, and as part of its annual Disaster Recovery Test (DiRT)
    exercises, it has simulated large-scale disasters such as earthquakes.


    ### Note


    Netflix has taken three important steps to build a more anti-fragile system and
    organization. The first step is to treat every engineer as an operator of the
    corresponding service. The second step is to treat each failure as an opportunity
    to learn and the third is to foster a blameless culture.


    The most common way to counter attack failures in a distributed system is via
    redundancy. Each component in the distributed system will have a redundant counterpart.
    If one component fails, the corresponding counterpart will take over. Not all
    the time, every component in a system will be able to recover from a failure with
    zero downtime. Apart from redundancy, having a developer mindset focusing on recovery-oriented
    development helps in building more resilient software. The following lists a set
    of patterns that were initially introduced by Michael T. Nygard in his book, *Release
    It,* to build resilient software. Today, these patterns are part and parcel of
    microservices development. Many microservices frameworks have first class support
    for implementing these patterns. What follows is a detailed explanation of resilient
    communication patterns and we revisit them when we discuss microservice integration
    in Chapter [7](#461146_1_En_7_Chapter.xhtml). There we discuss how they are used
    in practice with most of the common microservice development frameworks.'
