    graphs are rendered accordingly.


    ![../images/461146_1_En_13_Chapter/461146_1_En_13_Fig14_HTML.jpg](images/461146_1_En_13_Chapter/461146_1_En_13_Fig14_HTML.jpg)


    Figure 13-14: Setting up queries to build a dashboard with Grafana


    Once we complete this process, we can find the dashboard that we just created,
    listed on Grafana home page under Recently viewed dashboards. You can click on
    it to view the dashboard, which will appear as shown in Figure [13-15](#461146_1_En_13_Chapter.xhtml#Fig15).


    ![../images/461146_1_En_13_Chapter/461146_1_En_13_Fig15_HTML.jpg](images/461146_1_En_13_Chapter/461146_1_En_13_Fig15_HTML.jpg)


    Figure 13-15: Grafana dashboard to monitor the microservices deployment


    ### Creating Alerts with Grafana


    Grafana lets you create alerts and associate them with a graph (or a dashboard
    panel). To create an alert corresponding to the dashboard we created in the previous
    section, first we need to edit the graph (see Figure [13-16](#461146_1_En_13_Chapter.xhtml#Fig16))
    by clicking on its title and choosing Edit. Under Alerts, we can create a rule,
    which states under which conditions the system should raise an alert (see Figure
    [13-17](#461146_1_En_13_Chapter.xhtml#Fig17)). The only type of condition that
    Grafana supports at the moment is a query and for an alert rule, you can add multiple
    queries linked to each other (with an `AND` or an `OR`).


    ### Note


    Grafana alerting support is only limited to the data sources: Graphite, Prometheus,
    ElasticSearch, InfluxDB, OpenTSDB, MySQL, Postgres, and Cloudwatch.


    ![../images/461146_1_En_13_Chapter/461146_1_En_13_Fig16_HTML.jpg](images/461146_1_En_13_Chapter/461146_1_En_13_Fig16_HTML.jpg)


    Figure 13-16: The Grafana dashboard monitors the microservices deployment


    The following query indicates that when the maximum value of the metric A (see
    Figure [13-14](#461146_1_En_13_Chapter.xhtml#Fig14), in our case `heap`) is above
    3 for the next five minutes, raise an alert. This rule is evaluated every 60 seconds.


    ```

    WHEN max() OF query(A, 5m, now) IS ABOVE 3

    ```


    In addition to the `max()` function, Grafana also supports `avg()`, `min()`, `sum()`,
    `last()`, `count()`, `median()`, `diff()`, `percent_diff()`, and `count_non_null()`.
    See Figure [13-17](#461146_1_En_13_Chapter.xhtml#Fig17).


    ![../images/461146_1_En_13_Chapter/461146_1_En_13_Fig17_HTML.jpg](images/461146_1_En_13_Chapter/461146_1_En_13_Fig17_HTML.jpg)


    Figure 13-17: Configuring alerts


    Once the alert rules are set, we can configure whom to send the notifications
    along with a message, under the Notifications menu, when an alert is raised (see
    Figure [13-18](#461146_1_En_13_Chapter.xhtml#Fig18)). Grafana supports multiple
    notification channels, including Email, PagerDuty, Telegram, Slack, and many more.


    ![../images/461146_1_En_13_Chapter/461146_1_En_13_Fig18_HTML.jpg](images/461146_1_En_13_Chapter/461146_1_En_13_Fig18_HTML.jpg)


    Figure 13-18: Configuring notifications


    ## Using Fluentd Log Collector with Docker


    Fluentd is an extensible data collection tool that runs as a daemon. Microservices
    can publish logs to Fluentd. It has a rich set of plugins, which can read logs
    in different formats from different sources and parse the data. Also, it can format,
    aggregate, and publish logs to third-party systems like Splunk, Prometheus, MongoDB,
    PostgreSQL, AWS S3, Kafka, and many more (see Figure [13-19](#461146_1_En_13_Chapter.xhtml#Fig19)).
    The beauty of Fluentd architecture is that it decouples data sources from target
    systems. With no changes to your microservice, Fluentd can change the target system
    of your logs or add new target systems. Also it can do content filtering on log
    messages and, based on certain criteria, decide which systems to publish the logs.


    ![../images/461146_1_En_13_Chapter/461146_1_En_13_Fig19_HTML.jpg](images/461146_1_En_13_Chapter/461146_1_En_13_Fig19_HTML.jpg)


    Figure 13-19: Multiple input sources and target systems with Fluentd


    In the following sections, we see how to publish logs to Fluentd from a microservice
    running on a Docker container. First we’ll set up Fluentd and then see how to
    spin up a microservice and publish logs to Fluentd.


    ### Starting Fluentd as a Docker Container


    The easiest and the most straightforward way to spin up Fluentd is using a Docker
    container. In practice, this is the most common approach too. In a production
    setup, where all your microservices are running in a Kubernetes environment (which
    we discussed in Chapter [8](#461146_1_En_8_Chapter.xhtml)), the Fluentd node (which
    acts as a daemon) will run in the same pod, along with the corresponding microservice.
    In fact, you can treat the container running the Fluentd as a sidecar to the microservice
    (see Figure [13-20](#461146_1_En_13_Chapter.xhtml#Fig20)). The microservice, by
    default, will publish the logs to `localhost:24224`, which is the port Fluentd
    is listening to over TCP.


    ![../images/461146_1_En_13_Chapter/461146_1_En_13_Fig20_HTML.png](images/461146_1_En_13_Chapter/461146_1_En_13_Fig20_HTML.png)


    Figure 13-20: Microservice and Fluentd containers are running in the same pod


    Let’s use the following command to spin up the Fluentd Docker container. Before
    that, make sure you have a directory called `data` in the home directory of the
    host filesystem—or you can have your own directory instead of `~/data`.


    ```

    :\> docker run -d  -p 24224:24224 -v ~/data:/fluentd/log  fluent/fluentd

    ```


    As we learned in Chapter [8](#461146_1_En_8_Chapter.xhtml), containers are immutable.
    In other words, when a container goes down it will not save any of the changes
    we have done to its filesystem while running. By default all the logs published
    to Fluentd by the `Order Processing` microservice will be stored in the `/fluent/log`
    directory in the container filesystem. To persist that data permanently, we need
    to use a Docker volume. Using the `-v` option in the previous command, we map
    the `~/data` directory in the host filesystem to the `/fluent/log` directory in
    the container filesystem. Even when the container goes down, we should be able
    to find the log files in the `~/data` directory. The `-p` option in the previous
    command maps the port `24224` from the Docker container (the port Fluentd listens
    by default) to port `24224` of the host machine. `fluent/fluentd` is the name
    of the container image, which will be pulled from the Docker Hub.


    Once we get the Fluentd up and running, we can start a Docker container with the
    `Order Processing` microservice.'
