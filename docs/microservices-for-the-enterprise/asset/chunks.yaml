  trans: '

    #### Saga 日志


    Saga 日志是一种分布式日志，用于持久化记录给定 Saga 执行过程中的每个事务/操作。从高层来看，Saga 日志包含各种状态变更操作，例如 `Begin
    Saga`、`End Saga`、`Abort Saga`、`Begin T-i`、`End T-i`、`Begin C-i` 和 `End C-i`。


    Saga 日志通常使用分布式日志来实现，而像 Kafka 这样的系统常被用于此实现。


    #### Saga 执行协调器 (SEC)


    SEC 是编排整个逻辑并负责执行 Saga 的主要组件。给定 Saga 中的所有步骤都记录在 Saga 日志中，SEC 负责写入和解释 Saga 日志中的记录。它还执行子事务/操作（例如，调用酒店服务并进行预订），并在必要时执行相应的补偿事务。虽然与
    Saga 相关的步骤记录在 Saga 日志中，但编排逻辑（可以表示为有向无环图）是 SEC 进程的一部分（编排可以使用您自己的自定义逻辑构建，也可以基于 BPMN
    等标准构建）。


    非常重要的一点是，与 2PC 中的协调器不同，SEC 并不是一个对整个执行过程拥有中央控制的特殊进程。它确实作为一个集中式运行时运行，但该运行时是“哑”的，执行逻辑保存在分布式的
    Saga 日志中。然而，必须确保 SEC 始终保持运行。如果 SEC 发生故障，应基于相同的分布式 Saga 日志启动一个新的 SEC 进程。


    既然您已经对 SEC 和 Saga 日志有了很好的理解，那么让我们深入探讨分布式 Saga 的执行过程。


    #### 执行分布式 Saga


    一个分布式 Saga 是一个有向无环图 (DAG)，SEC 的主要任务就是执行这个 DAG。假设在我们的旅行预订场景中（见图 5-15），我们将 SEC 内置于旅行社服务中。


    SEC 可以开始处理记录在分布式日志中的 Saga。


    ![../images/461146_1_En_5_Chapter/461146_1_En_5_Fig15_HTML.jpg](img/461146_1_En_5_Fig15_HTML.jpg)


    图 5-15


    成功 Saga 的执行步骤


    一旦旅行社服务收到旅行预订请求，SEC 就会通过向 Saga 日志写入一条 `Start Saga` 指令以及处理该 Saga 所需的任何其他元数据来启动一个
    Saga。一旦该记录被持久化地提交到日志中，SEC 就可以进入下一条指令。


    然后，基于 Saga 的 DAG，SEC 可以选择执行航空、酒店或租车事务中的一个（假设这三个可以并行执行）。假设首先执行航空事务。在这种情况下，SEC 会向
    Saga 日志记录一条 `Start Airline` 消息。然后，SEC 执行预订航班的操作。


    一旦 SEC 收到来自航空服务的响应，它就会提交 `End Airline` 消息以及来自航空服务的响应，我们可能在 Saga 的后半部分需要用到这个响应。


    类似地，这一系列步骤会持续进行，直到我们成功执行了航空、酒店和租车服务上的所有三个操作。


    最后，由于我们已成功完成所有操作，SEC 会将 `End Saga` 消息提交到 Saga 日志中。这是一个成功的 Saga 执行。


    现在让我们来看一个失败场景下的 Saga。在图 5-16 中，我们拥有与之前讨论的相同的一系列步骤，但在本例中，租车过程失败了（例如，假设在指定日期没有可用的车辆）。


    ![../images/461146_1_En_5_Chapter/461146_1_En_5_Fig16_HTML.jpg](img/461146_1_En_5_Fig16_HTML.jpg)


    图 5-16


    不成功 Saga 的执行步骤


    由于我们检测到某个子事务（即租车预订）失败，我们需要回滚到目前为止已执行的所有其他子事务。因此，在 Saga 日志中，您可以找到 `Start Car Rental`
    日志，而现在租车预订已失败。现在，我们必须遍历到目前为止已执行的 Saga 的逆向 DAG，并提交回滚。


    当租车服务对租车预订返回错误时，SEC 会将 `Abort Car Rental` 消息提交到 Saga 日志。


    由于这是一个失败场景，SEC 必须为当前 Saga 启动回滚操作。SEC 可以通过反转此 Saga 的 DAG 并反向处理 Saga 日志来回滚到目前为止已完成的所有子事务。


    因此，SEC 会在 Saga 日志中查找任何包含 car、hotel 和 airline 的记录，并找到关于酒店和航空子事务的记录。SEC 将为酒店和航空执行补偿事务。它可以使用存储在
    Saga 日志中的信息（例如预订号）来执行补偿事务。


    成功执行补偿事务后，SEC 会将 `[Comp] Airline` 和 `[Comp] Hotel` 消息提交到 Saga 日志。


    最后，SEC 可以将 Saga 完成信息提交到 Saga 日志中。


    SEC 故障相对更容易处理，因为我们可以通过处理 Saga 日志来重新创建 DAG 和状态。此外，为了使 Saga 按预期运行，子事务应最多发送一次，而补偿事务至少发送一次（幂等性）。


    同样重要的是要记住，在任何给定的时间点，系统可能不处于完全一致的状态，但随着时间的推移，它会达到一致的状态（最终一致性）。当我们遍历 Saga DAG 时，我们执行子事务并完成它们。但是，当我们遇到问题时，我们会回滚事务。在不成功的
    Saga 示例中，我们预订了航空和酒店，然后后来取消了这两个预订。


    ### 注意


    Saga 模式的核心概念旨在实现最终一致性。


    Saga 模式不仅仅适用于数据库事务。Saga 概念在实践中被广泛用于工作流、支付处理、金融系统等解决方案中。此外，Saga 模式也适用于任何需要审批和人工交互的用例。


    大多数能够在微服务环境中运行的工作流解决方案都支持用于微服务的 Saga 模式。在第 7 章“集成微服务”中，我们将探讨此类工作流和业务流程如何在微服务架构的上下文中使用。


    ## 多语言持久化


    通过去中心化的数据管理，您可以利用最适合您用例的持久化技术。根据您的用例，一个微服务可以使用 SQL 数据库，而另一个服务可以利用 NoSQL 数据库。


    例如，一个社交媒体应用的微服务可能使用关系型/SQL 数据库来存储其用户信息，而多媒体存储则基于 NoSQL 数据库。

    '
- fmt: '# Caching


    As part of the data-management techniques for microservices, caching plays a critical
    role as it improves availability, scalability, and performance of a given microservice.
    At each microservice level, we can cache the business entities that a given service
    operates on. Usually such business entities (or objects) do not frequently change
    (e.g., product information service caches the product name and details in a cache,
    which will be frequently used for product searching). Such data can usually be
    cached on-demand (when we first access the product information from the underlying
    datastore). Also, you can cache any service-level metadata (configurations or
    static data) during the service startup.


    One of the most important aspects of caching is not to use a central caching layer
    that is shared between microservices. However, the instances of a given microservice
    will all have the same data requirements, so it makes sense to share a caching
    layer across these instances.


    There are quite a few caching solutions out there, but `Redis`^([^(85)](#fn85)),
    `Ehcache`^([^(86)](#fn86)), `Hazelcast`^([^(87)](#fn87)), and `Coherence`^([^(88)](#fn88))
    are some of the more popular caching implementations. `Redis` in particular has
    been widely used in open source and container-native microservice caching scenarios.
    `Redis` is an open source, in-memory data structure store, used as a database,
    cache, and message broker. It supports data structures such as strings, hashes,
    lists, sets, sorted sets with range queries, bitmaps, hyperloglogs, and geospatial
    indexes with radius queries. While `Redis` is mainly used for caching in the microservices
    context, it can also be used as a database or message broker (publisher-subscriber
    messaging).


    # Summary


    In this chapter, we discussed the decentralized data-management techniques that
    we can leverage in a microservices architecture. The database per microservices
    pattern gives us a set of advantages and several challenges too. The conventional
    data sharing across multiple tables using SQL, dependencies between tables such
    as foreign key constraints, etc. are no longer applicable when each microservice
    can only operate on a single private database.


    We discussed several techniques that we can use to share data between microservices,
    such as runtime lookups by accessing the service interface, asynchronous event-based
    data sharing using local caches, and maintaining a materialized view using event-driven
    communication.


    Transactions are one of the main challenging aspects in distributed data management
    with microservices. You are no longer able to define transaction boundaries that
    span across multiple business services (multiple tables), as each service has
    a dedicated database and services are not allowed to access the external databases
    directly. Using distributed transaction with two-phase commit is not an option
    due to the inherent limitations related to scalability. Sagas provide an alternative
    approach to distributed transactions with two-phase commit. With the use of sub-transactions,
    which are associated with a corresponding compensating transaction, we can build
    transactional safe business scenarios that span over multiple microservices.


