- fmt: '#### Resiliency Patterns


    Spring Boot leverages libraries such as Netflix Hystrix to allow resilient microservices
    communication. Spring Cloud Netflix Hystrix implementation looks for any method
    annotated with the `@HystrixCommand` annotation and wraps that method in a proxy
    connected to a circuit breaker so that Hystrix can monitor it. For example, in
    the following code snippet, the method that invokes the external RESTful service
    is annotated with the `@HystrixCommand` annotation.


    ```

    package hello;

    import com.netflix.hystrix.contrib.javanica.annotation.HystrixCommand;

    import org.springframework.stereotype.Service;

    import org.springframework.web.client.RestTemplate;

    import java.net.URI;

    @Service

    public class BookService {

    private final RestTemplate restTemplate;

    public BookService(RestTemplate rest) {

    this.restTemplate = rest;

    }

    @HystrixCommand(fallbackMethod = "reliable")

    public String readingList() {

    URI uri = URI.create("http://localhost:8090/recommended");

    return this.restTemplate.getForObject(uri, String.class);

    }

    public String reliable() {

    return "Microservices for Enterprise (APress)";

    }

    }

    ```


    We’ve applied `@HystrixCommand` to our original `readingList()` method. We also
    have a new method here, called `reliable()`. The `@HystrixCommand` annotation
    has `reliable` as its `fallbackMethod`, so if, for some reason, Hystrix opens
    the circuit on `readingList()`, we’ll have a default result to be shown. You can
    try this example from our examples in `ch07/sample06`.


    #### Data Formats


    Spring Boot allows you to write your microservices so that they can produce, consume,
    and transform multiple data formats, by primarily using Jackson^([^(98)](#fn98))
    data processing tools.


    ```

    // Java Object to JSON

    ObjectMapper objectMapper = new ObjectMapper();

    Car car = new Car("yellow", "renault");

    objectMapper.writeValue(new File("target/car.json"), car);

    // JSON to Java Object

    String json = "{ \"color\" : \"Black\", \"type\" : \"BMW\" }";

    Car car = objectMapper.readValue(json, Car.class);

    ```


    Jackson provides a comprehensive set of data processing capabilities for a diverse
    set of data types, including the flagship streaming JSON parser/generator library,
    matching data-binding library (POJOs to and from JSON), and additional data format
    modules to process data encoded in Avro, BSON, CBOR, CSV, Smile, (Java) Properties,
    Protobuf, XML or YAML. It even provides a large set of data format modules to
    support data types of widely used data types such as Guava, Joda, Pcollections,
    and many, many others. You can try this example from our examples in `ch07/sample07`.


    #### Observability


    You can enable metrics, logging, and distributed tracing for your Spring Boot
    microservices applications. It requires minimal changes in your microservices
    application to make your Spring Boot integration microservices observable. When
    we delve deep into observability concepts in Chapter [13](#461146_1_En_13_Chapter.xhtml),
    “Observability,” we discuss these capabilities in detail.


    ### Dropwizard


    Dropwizard is another popular microservice development framework. The main objective
    of Dropwizard is to provide performant, reliable implementations of everything
    a production-ready web application needs. Because this functionality is extracted
    into a reusable library, your application remains lean and focused, reducing both
    time-to-market and maintenance burdens.


    Dropwizard uses the Jetty HTTP library to embed a tuned HTTP server directly into
    your project. Jersey is used as the RESTful web application development engine,
    while Jackson handles the data formats. There are several other libraries that
    are bundled with Dropwizard by default. However, unlike Spring Boot, for certain
    microservice integrations that require integration with multiple network protocols
    and web APIs, there’s a limited set of features offered from it out-of-the-box.


    ### Apache Camel and Spring Integration


    *Apache Camel* is a conventional integration framework designed to address the
    centralized integration/ESB needs. The key objectives of the Apache Camel integration
    framework is to provide an easy-to-use mechanism for implementing Enterprise Integration
    Patterns-EIPs such as content-based routing, transformations, protocol switching,
    scatter-gather, etc., in a trivial way with a small footprint and overhead, embeddable
    in your existing microservices.


    Given its Domain Specific Language (DSL) capabilities to work with multiple languages
    such as Java, Scala, etc., and lightweight integration framework nature, there
    are quite a few microservices use cases that Apache Camel can address. Apache
    Camel has components that can consume and produce messages via almost all the
    popular network protocols, web APIs, and systems. You can build a Camel based
    self-contained runtime that can run on a container. (In fact, there are on going
    efforts on building a container native runtime that natively runs on Kubernetes,
    called Camel-K). For example, in the following example, you can find a Camel DSL
    of an integration use case that involves multiple EIPs.


    ```

    public void configure() {

    from("direct:cafe")

    .split().method("orderSplitter")

    .to("direct:drink");

    from("direct:drink").recipientList().method("drinkRouter");

    from("seda:coldDrinks?concurrentConsumers=2")

    .to("bean:barista?method=prepareColdDrink")

    .to("direct:deliveries");

    from("seda:hotDrinks?concurrentConsumers=3")

    .to("bean:barista?method=prepareHotDrink")

    .to("direct:deliveries");

    from("direct:deliveries")

    .aggregate(new CafeAggregationStrategy())

    .method("waiter", "checkOrder").completionTimeout(5 * 1000L)

    .to("bean:waiter?method=prepareDelivery")

    .to("bean:waiter?method=deliverCafes");

    }

    ```


    Also, Apache Camel offers seamless integration with Spring Boot, which makes a
    powerful combination to facilitate microservice integration. You can try this
    example from our examples in `ch07/sample08`.


    *Spring Integration* is quite similar to Apache Camel and it extends the Spring
    programming model to support well-known EIPs. Spring Integration enables lightweight
    messaging within Spring-based applications and supports integration with external
    systems via declarative adapters. Those adapters provide a higher level of abstraction
    over Spring''s support for remoting, messaging, and scheduling. Spring Integration''s
    primary goal is to provide a simple model for building enterprise integration
    solutions while maintaining the separation of concerns that is essential for producing
    maintainable, testable code.


    The following code is an example DSL of a Spring Integration-based use case, which
    is similar to what we have seen with Camel.


    ```

    @MessagingGateway

    public interface Cafe {

    @Gateway(requestChannel = "orders.input")

    void placeOrder(Order order);

    }

    private AtomicInteger hotDrinkCounter = new AtomicInteger();

    private AtomicInteger coldDrinkCounter = new AtomicInteger();

    @Bean(name = PollerMetadata.DEFAULT_POLLER)

    public PollerMetadata poller() {

    return Pollers.fixedDelay(1000).get();

    }

    @Bean

    public IntegrationFlow orders() {

    return f -> f

    .split(Order.class, Order::getItems)

    .channel(c -> c.executor(Executors.newCachedThreadPool()))

    .route(OrderItem::isIced, mapping -> mapping

    .subFlowMapping("true", sf -> sf

    .channel(c -> c.queue(10))

    .publishSubscribeChannel(c -> c

    .subscribe(s ->

    s.handle(m -> sleepUninterruptibly(1, TimeUnit.SECONDS)))

    ...

    ```


    If you compare and contrast Camel and Spring Integration, you may find that Spring
    Integration DSL exposes the lower-level EIPs (e.g., channels, gateways, etc.),
    whereas the Camel DSL focuses more on the high-level integration abstractions.


    With either Camel or Spring Integration, you can build your microservices integration
    based on a well defined DSL. However, keep in mind that you are constrained by
    this DSL and you will have to do a lot of tweaks when you are building real programming
    logic on top of a DSL.'
