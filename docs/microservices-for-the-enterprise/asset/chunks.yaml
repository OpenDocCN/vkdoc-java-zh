- fmt: '### Note


    If you find any issues in building or running the examples given in this book,
    refer to the `README` file under the corresponding chapter in the Git repository:
    [`https://github.com/microservices-for-enterprise/samples.git`](https://github.com/microservices-for-enterprise/samples.git).
    We will update the examples and the corresponding `README` files in the Git repository
    to reflect any changes related to the tools, libraries, and frameworks used in
    this book.


    ### Spring Boot


    Spring Boot is a microservice framework built on top of the Spring platform by
    taking an opinionated view of the Spring platform and third-party libraries, so
    that you can get started with minimum fuss. Spring Boot makes it easy to create
    standalone, production-grade Spring based applications that you can *just run*.
    You can write most of the Spring Boot microservices with no or minimal spring
    configuration. Spring Boot tries to make microservices implementation trivial
    by offering the following capabilities:


    - Create stand-alone Spring applications.

    - Embed Tomcat, Jetty, or Undertow directly (no need to deploy WAR files).

    - Provide opinionated *starter* POMs to simplify your Maven configuration.

    - Automatically configure Spring whenever possible.

    - Provide production-ready features such as metrics, health checks, and externalized
    configuration.

    - Absolutely no code generation and no requirement for XML configuration.


    Let’s discuss some of the key features that are essential for integrating microservices
    offered by Spring Boot.


    #### RESTful Services


    You can build composition microservices using Spring Boot’s service development
    features. For example, you can build a simple RESTful service using Spring Boot
    as follows.


    Suppose that you need to build an HTTP RESTful service that handles `GET` requests
    for a `/greeting` endpoint, optionally with a name parameter in the query string.
    The `GET` request should return a `200 OK` response with a JSON payload in the
    body that represents a greeting. As the first step, to model the greeting, you
    need to define a representation for the greeting as follows.


    ```

    package com.apress.ch07;

    public class Greeting {

    private final long id;

    private final String content;

    public Greeting(long id, String content) {

    this.id = id;

    this.content = content;

    }

    public long getId() {

    return id;

    }

    public String getContent() {

    return content;

    }

    }

    ```


    Then you can create the service and resource that will serve the greeting requests.
    In Spring’s approach to building RESTful web services, we have a controller to
    handle HTTP requests. These components are easily identified by the `@RestController`
    annotation, and the `GreetingController` class handles the `GET` requests for
    the `/greeting` endpoint (context) by returning a new instance of the `Greeting`
    class:


    ```

    package com.apress.ch07;

    import java.util.concurrent.atomic.AtomicLong;

    import org.springframework.web.bind.annotation.RequestMapping;

    import org.springframework.web.bind.annotation.RequestParam;

    import org.springframework.web.bind.annotation.RestController;

    @RestController

    public class GreetingController {

    private static final String template = "Hello, %s!";

    private final AtomicLong counter = new AtomicLong();

    @RequestMapping("/greeting")

    public Greeting greeting(@RequestParam(value="name",

    defaultValue="World") String name) {

    return new Greeting(counter.incrementAndGet(),

    String.format(template, name));

    }

    }

    ```


    Since the response format is a POJO, it is explicitly converted to a JSON. If
    you want to control it, you can do this with `@GetMapping(path = "/hello", produces=MediaType.APPLICATION_JSON_VALUE)`
    at the request-mapping level.


    You can try this example from our examples in `ch07/sample01`.


    #### Network Communication Abstractions


    Consuming and producing data over the network is supported in Spring Boot via
    numerous abstractions, as discussed next.


    ##### HTTP


    You can consume a RESTful service with Spring REST templates. Here we have specified
    the POJO that we need to convert the response to. The `getForObject` retrieves
    a representation by doing a `GET` on the URL. The response (if any) is converted
    and returned.


    ```

    RestTemplate restTemplate = new RestTemplate();

    Quote quote = restTemplate.getForObject("http://gturnquist-quoters.cfapps.io/api/random",
    Quote.class);

    log.info(quote.toString());

    ```


    Similarly, `RestTemplate` also supports other HTTP verbs such as `POST`, `PUT`,
    and `DELETE`. When it comes to create a service that exposes a RESTful service,
    you can use Spring’s support for embedding the Tomcat servlet container as the
    HTTP runtime, instead of deploying to an external instance. You can try this example
    from our examples in `ch07/sample02`.


    ##### JMS


    Spring Boot also provides abstractions to integrate with other network communication
    protocols and systems. For example, you can create a service that consumes messages
    via JMS as follows:


    ```

    @JmsListener(destination = "mailbox", containerFactory = "myFactory")

    public void receiveMessage(Email email) {

    System.out.println("Received ");

    }

    ```


    The `@JmsListener` annotation defines the name of the `Destination` that this
    method should listen to and the reference to the `JmsListenerContainerFactory`
    is used to create the underlying message listener container. Passing a value to
    the `containerFactory` attribute is not necessary unless you need to customize
    the way the container is built, as Spring Boot registers a default factory if
    necessary.


    The messages can be produced using `JMSTemplates`.


    ```

    public class JmsQueueSender {

    private JmsTemplate jmsTemplate;

    private Queue queue;

    public void setConnectionFactory(ConnectionFactory cf) {

    this.jmsTemplate = new JmsTemplate(cf);

    }

    public void setQueue(Queue queue) {

    this.queue = queue;

    }

    public void simpleSend() {

    this.jmsTemplate.send(this.queue, new MessageCreator() {

    public Message createMessage(Session session) throws JMSException {

    return session.createTextMessage("hello queue world");

    }

    });

    }

    }

    ```


    The `JmsTemplate` contains many convenience methods to send a message. There are
    send methods that specify the destination using a `javax.jms.Destination` object
    and those that specify the destination using a string for use in a JNDI lookup.
    You can try this example from our examples in `ch07/sample03`.


    ##### Databases/JDBC


    For integrating your microservices with databases via JDBC, Spring provides a
    template class called `JdbcTemplate` that makes it easy to work with SQL relational
    databases and JDBC. Most generic JDBC code is full of resource acquisition, connection
    management, exception handling, and general error checking that is wholly unrelated
    to what the code is meant to achieve. The `JdbcTemplate` takes care of all of
    that for you.


    ```

    jdbcTemplate.query(

    "SELECT id, first_name, last_name FROM customers WHERE first_name = ?", new Object[]
    { "Josh" },

    (rs, rowNum) -> new Customer(rs.getLong("id"), rs.getString("first_name"), rs.getString("last_name"))

    ).forEach(customer -> log.info(customer.toString()));

    ```


    You can try this example from our examples in `ch07/sample04`. In addition to
    what we have mentioned, Spring provides the ability to integrate with numerous
    other network protocols.


    ##### Web APIs: Twitter


    Integrating with web APIs such as Twitter is something that is supported by Spring
    Boot’s libraries dedicated to each web API. For instance, connecting and tweeting
    from your Spring Boot microservice is pretty straightforward. You just need to
    initiate `TwitterTemplate` and call the required operations of it. You can try
    this example from our examples in `ch07/sample05`.


    ```

    Twitter twitter = new TwitterTemplate(consumerKey, consumerSecret);

    twitter.timelineOperations().updateStatus("Microservices for Enterprise.!")

    ```


    As you can see, Spring Boot offers one of the most comprehensive set of capabilities
    to integrate your microservices with other systems and APIs.'
