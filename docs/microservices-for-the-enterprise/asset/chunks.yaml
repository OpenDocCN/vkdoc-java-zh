    receive data from one service to the other. The most common type of communication
    styles used in microservices are synchronous and asynchronous.


    ## Synchronous Communication


    In the synchronous communication style, the client sends a request and waits for
    a response from the service. Both parties have to keep the connection open until
    the client receives the response. The execution logic of the client cannot proceed
