- fmt: '#### Creating a Service with a YAML File


    Even though we have a running pod, none of the microservices running there are
    accessible outside the pod. To expose a microservice outside of a pod, we need
    to create a service. Once again to define a service, we need to have a service
    descriptor, a YAML file, as shown here. The complete YAML file (`ecomm-service.yml`)
    is available in the `ch08/sample03` directory.


    ```

    apiVersion: v1

    kind: Service

    metadata:

    name: ecomm-service

    spec:

    selector:

    app: ecommapp

    ports:

    - port: 80

    targetPort: 9000

    type: NodePort

    ```


    Here you can see the value of the `kind` attribute is set to `Service`, and under
    `selector/app` attribute, the value is set to the `label` of the `ecomm-pod` we
    created before. This service exposed to the outside world via HTTP port 80 and
    the traffic coming to it will be routed to port 9000 (`targetPort`), which is
    the port of the `Order Processing` microservice. Finally, another important attribute
    we cannot miss is the `type`, where the value is set to `NodePort`. When the value
    of the service type is set to `NodePort`, it exposes the service on each node’s
    IP at a static port.


    Let’s run the following command from the `ch08/sample03` directory to create the
    service.


    ```

    :\> kubectl create -f ecomm-service.yml

    service/ecomm-service created

    ```


    If the service is successfully created, the following command should return the
    status of the service. There you can see that port 80 of the service is mapped
    to port 32179 of the Kubernetes master node.


    ```

    :\> kubectl get svc

    NAME            TYPE        CLUSTER-IP      EXTERNAL-IP   PORT(S)

    ecomm-service   NodePort    10.97.200.207           80:32179/TCP

    kubernetes      ClusterIP   10.96.0.1               443/TCP

    ```


    If you want to delete a service, use the following command. This will only remove
    the service, not the corresponding pod.


    ```

    :\> kubectl delete -f ecomm-service.yml

    ```


    #### Testing the Pod with cURL


    Now let’s invoke the `Order Processing` service from the host machine. Here we
    use the IP address of Kubernetes cluster master node (which you can obtain from
    the `kubectl cluster-info` command).


    ```

    :\> curl http://192.168.99.100:32179/order/11

    {"customer_id":"101021","order_id":"11","payment_method":{"card_type":"VISA","expiration":"01/22","name":"John
    Doe","billing_address":"201, 1st Street, San Jose, CA"},"items":[{"code":"101","qty":1},{"code":"103","qty":5}],"shipping_address":"201,
    1st Street, San Jose, CA"}

    ```


    This request only hits the `Order Processing` microservice and does not validate
    the communication between the two microservices. Let’s use the following request
    to create an order via the `Order Processing` microservice, which will also then
    update the `Inventory` microservice.


    ```

    curl -v -H "Content-Type: application/json" -d ''{"customer_id":"101021","payment_method":{"card_type":"VISA","expiration":"01/22","name":"John
    Doe","billing_address":"201, 1st Street, San Jose, CA"},"items":[{"code":"101","qty":1},{"code":"103","qty":5}],"shipping_address":"201,
    1st Street, San Jose, CA"}''  http://192.168.99.100:32179/order

    ```


    We can confirm whether our request hits the `Inventory` microservice by looking
    at its logs. The following command helps to get the logs from a container running
    in a pod. Here, `ecomm-pod` is the name of the pod, and `inventory` is the container
    name (as defined in the pod deployment descriptor YAML file). The logs from the
    `Inventory` microservice print the item codes from our order request.


    ```

    :\> kubectl logs ecomm-pod -c inventory

    ```


    #### How Does Communication Happen Between Containers in the Same Pod?


    Within a pod, communication between microservices can happen in different ways.
    In this example, the `Order Processing` microservice uses `localhost` as the hostname
    to talk to the `Inventory` microservice, as per the following codebase available
    at `ch08/sample04/src/main/java/com/apress/ch08/sample04/service/OrderProcessing.java`.
    There you can see, instead of an IP address or a hostname, that we use `localhost`
    (`http://localhost:9090/inventory`).


    ```

    @RequestMapping(method = RequestMethod.POST)

    public ResponseEntity createOrder(@RequestBody Order order) {

    if (order != null) {

    RestTemplate restTemplate = new RestTemplate();

    URI uri = URI.create(

    "http://inventory:9090/inventory");

    restTemplate.put(uri, order.getItems());

    order.setOrderId(UUID.randomUUID().toString());

    URI location = ServletUriComponentsBuilder

    .fromCurrentRequest().path("/{id}")

    .buildAndExpand(order.getOrderId())

    .toUri();

    return ResponseEntity.created(location).build();

    }

    return ResponseEntity.status(

    HttpStatus.BAD_REQUEST).build();

    }

    ```


    In addition to using HTTP over localhost, there are two other popular options
    for inter-container communication within a single pod: using shared volumes and
    using inter-process communication (IPC). We recommend interested readers to refer
    to Kubernetes documentation^([^(113)](#fn113)) on those topics.


    #### How Does Communication Happen Between Containers in Different Pods?


    The containers in different pods communicate with each other using the pod IP
    address and the corresponding port. In a Kubernetes cluster, each pod has its
    own distinct IP address.'
