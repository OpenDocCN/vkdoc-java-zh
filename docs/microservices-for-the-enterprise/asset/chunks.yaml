- fmt: '### Observability


    Service observability can be considered a combination of monitoring, distributed
    logging, distributed tracing, and visualization of a service’s runtime behavior
    and dependencies. Hence observability can be also considered part of runtime governance.
    With the proliferation of fine-grained services, the ability to observe the runtime
    behavior of a service is absolutely critical. Observability components are often
    a centralized component in the microservices implementation and each service pushes
    data into those components (rather, observability runtimes pull data from services).
    Observability is useful for identifying and debugging potential issues, while
    services are in production and can be also used for business functionality purposes
    (such as monetization). We’ll discuss the wide range of tools and techniques for
    building observable services in Chapter [13](#461146_1_En_13_Chapter.xhtml), “Observability”.


    ## Microservices: Benefits and Liabilities


    As with any architecture or technology, there are benefits and liabilities with
    the microservices architecture. Since you have a good understanding of the key
    microservices characteristics, this is a good time to talk about them. Let’s start
    with the benefits of microservices.


    ### Benefits


    One of the main reasons for the popularity of the microservices architecture are
    the benefits that it provides over the conventional software architecture patterns.
    Let’s have a closer look at the key benefits of the microservices architecture.


    #### Agile and Rapid Development of Business Functionalities


    The microservices architecture favors autonomous service development, which helps
    us with Agile and rapid development of business functionalities. In a conventional
    architecture, converting a business functionality to a production-ready software
    application functionality takes many cycles, primarily due to the size of the
    system, codebase, and dependencies. With autonomous service development, you just
    need to focus on the interface and the functionality of the service (not the functionality
    of the entire system, which is far more complex), as all the other services only
    communicate through the network calls via service interfaces.


    #### Replaceability


    Due to its autonomous nature, microservices are also *replaceable*. Since we are
    building services as an independent entity, which is communicating via network
    calls and defined APIs, we can easily replace that functionality with another
    better implementation. Being focused on a specific functionality, having a limited
    scope and size, and deploying it in an independent runtime, all make it much easier
    to build a replaceable service.


    #### Failure Isolation and Predictability


    Replaceability also helps us to achieve failure isolation and prediction. As discussed,
    a microservices-based application cannot blow up like a conventional monolithic
    application due to the failure of any given component or service. Having proper
    observability features also helps us to identify or predict potential failures.


    #### Agile Deployment and Scalability


    Ease of deployment and scaling could well be the most important value proposition
    of microservices. With the modern cloud-based container native infrastructures,
    the ability to easily deploy a service and scale it dynamically is becoming trivial.
    Since we are building capabilities as autonomous services, we can easily leverage
    all such container and cloud-native technologies to facilitate Agile deployment
    and scalability.


    #### Align with Organizational Structure


    Since microservices are business capability oriented, they can well be aligned
    with the organizational/team structure. Often a given organization is structured
    in a way that it delivers the business capabilities. Therefore, the ownership
    of each service can easily be given to the teams who own the business functionality.
    Therefore, given that a microservice focuses on specific business functionality,
    you can pick a relatively small team to own that microservice. This has a positive
    impact on the development team, because the scope of a given service is simple
    and well defined. That way, the team can fully own service’s entire lifecycle.


    ### Liabilities


    Most of the liabilities of the microservices architecture are primarily due to
    the proliferation of services that you need to cope with.


    #### Inter-Service Communication


    Inter-service communication complexity could possibly be more challenging than
    the implementation of the actual services. As discussed earlier, the smart endpoints
    and dumb pipes concept forces us to have inter-service communication logic as
    part of our microservices. The service developers have to spend a substantial
    amount of time on plumbing microservices together to create a composite business
    functionality.


    #### Service Governance


    Having a number of services communicated over the network also *complicates the
    governance and observability aspect of services*. If you don’t have the proper
    governance and observability tools in place, it will be a nightmare to identify
    service dependencies and detect failures. For example, service lifecycle management,
    testing, discovery, monitoring, quality of service, and various other service
    governance capabilities will become more complex with a microservices architecture.


    #### Heavily Depends on Deployment Methodologies


    The success of deploying and scaling microservices is heavily dependent on the
    adoption of containers and container orchestration systems. If you don’t have
    such an infrastructure in place, you will need to invest time and energy on it
    (and don’t even think about having a successful microservices architecture without
    containers). Ultimately, a successful microservices architecture is also up to
    the teams and people. The ownership of services, thinking about making service
    lightweight and container-native, not having a central point to integrate services,
    etc., requires organization-level engineering culture changes.


    #### Complexity of Distributed Data and Transaction Management


    Since a microservices architecture promotes localizing the data to a given service,
    distributed data management will be quite daunting. The same applies to distributed
    transactions. Implementing transaction boundaries that span across multiple microservices
    will be quite challenging.


    ## How and When to Use Microservices


    We discussed how the microservices architecture has evolved from the conventional
    centralized enterprise architecture, covered the key characteristics of it, and
    discussed the pros and cons of using it. However, we need to have a solid set
    of guidelines on when to use the microservices architecture and when to avoid
    it.


    - The microservices architecture is ideal when your current enterprise architecture
    requires modularity.

    - If the business problem that you are trying to solve with your software application
    is quite simple, you may not need microservices at all (having a simple monolithic
    web application and a database is usually sufficient).

    - Your software application has to embrace container-based deployment.

    - If your system is far too complex to be segregated into microservices, you should
    identify the areas into which you can introduce microservices with minimal impact.
    Then, start implementing a small use case on microservices and build the required
    ecosystem components around that.

    - Understanding business capabilities is quite critical for designing microservices.
    Understanding microservices design techniques, as explained in Chapter [2](#461146_1_En_2_Chapter.xhtml),
    “Designing Microservices,” are essential prior to service implementation

    - For each specific microservice domain (such as data management, inter-service
    communication, security, etc.), we discuss in detail the best practices and anti-patterns
    in the upcoming chapters.'
