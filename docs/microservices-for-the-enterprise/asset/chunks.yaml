  trans: '

    #### 在 Spring Boot 中使用 Eureka


    Spring Boot 原生支持将 Eureka 用作服务注册中心。让我们仔细看看如何在 Spring Boot 应用程序中使用 Eureka，并在实践中运用服务注册与发现功能。


    通过一些注解，你可以在应用程序中快速启用和配置基于 Eureka 的服务注册与发现模式。Eureka 实例可以被注册，客户端则能通过 Spring 管理的
    Bean 来发现这些实例。使用声明式的 Java 配置即可创建一个内嵌的 Eureka 服务器。


    首先，你需要有一个正在运行的 Eureka 服务器。如 `ch06/sample02` 的示例代码所示，你可以使用 Spring Cloud 的 `@EnableEurekaServer`
    注解，将 Eureka 服务注册中心作为一个 Spring 应用程序启动。因此，你的应用程序代码如下所示。


    ```

    @EnableEurekaServer

    @SpringBootApplication

    public class EurekaServiceApplication {

    public static void main(String[] args) {

    SpringApplication.run(EurekaServiceApplication.class, args);

    }

    }

    ```


    此应用程序将启动一个 Eureka 服务注册中心实例，你可以通过 `application.properties` 文件更改其各种行为。


    现在，让我们尝试从另一个 Spring Boot 应用程序向该服务注册中心注册一个服务。应用程序名称从你的 Spring Boot 应用程序的 `bootstrap.properties`
    中获取。


    ```

    @EnableDiscoveryClient

    @SpringBootApplication

    public class EurekaClientApplication {

    public static void main(String[] args) {

    SpringApplication.run(EurekaClientApplication.class, args);

    }

    }

    ```


    现在，你可以使用另一个 Spring Boot 应用程序来发现服务，该应用程序利用发现客户端来发现服务。


    ```

    @RestController

    class ServiceInstanceRestController {

    @Autowired

    private DiscoveryClient discoveryClient;

    @RequestMapping("/service-instances/{applicationName}")

    public List serviceInstancesByApplicationName(

    @PathVariable String applicationName) {

    return this.discoveryClient.getInstances(applicationName);

    }

    }

    ```


    此服务从 Eureka 服务注册中心检索应用程序名称，并将其作为响应的一部分返回。


    ### Etcd


    Etcd^(⁹⁵) 是一个通用的分布式键值存储，旨在可靠且快速地保存和提供对关键数据的访问。它通过分布式锁、领导者选举和写屏障实现可靠的分布式协调。Etcd
    集群旨在实现高可用性以及永久性的数据存储和检索。因此，etcd 也被用作服务注册中心的实现。然而，它提供了远超服务注册与发现的广泛能力。etcd 提供了一个名为
    `etdcctl` 的 CLI 工具和一个 gRPC API 来与之交互。


    etcd v3 使用 gRPC 作为其消息协议。etcd 项目包含一个基于 gRPC 的 Go 客户端和一个命令行工具 `etcdctl`，用于通过 gRPC
    与 etcd 集群通信。对于不支持 gRPC 的语言，etcd 提供了一个 JSON grpc-gateway。该网关充当一个 RESTful 代理，将 HTTP/JSON
    请求转换为 gRPC 消息。


    etcd 被广泛用作大多数现有注册中心和部署编排解决方案（例如 Kubernetes）的一部分。


    ### 使用 Kubernetes 进行服务发现


    在 Kubernetes 环境中，当你从一个服务调用另一个服务时，无需担心服务的实际位置。Kubernetes 默认使用 DNS 名称来发现 Pod。因此，如果你想从
    `foo` 服务调用 `bar` 服务，在 `foo` 服务的代码中，你可以直接引用 `http://bar:<port``>` 作为服务端点。Kubernetes
    会将名称解析并映射到实际的端点。Kubernetes 内部使用 etcd 作为其分布式键值存储。


    需要牢记的是，尽管 Kubernetes 提供了开箱即用的无缝服务发现能力，但它并非旨在作为服务开发者或消费者与之交互的存储库和接口。这时，你可能希望将此类服务定义管理在外部服务注册中心中。


    我们将在第 8 章“部署和运行微服务”中详细讨论 Kubernetes，并深入探讨一个在 Kubernetes 内部使用服务发现的真实示例。


    ## 总结


    在本章中，我们从广泛的角度讨论了微服务治理。我们并未将其仅仅抽象为一个去中心化的过程，而是详细审视了微服务治理的各个方面，例如服务定义、生命周期管理、注册与发现、服务质量以及可观测性。虽然服务设计、开发和部署可以作为一个完全去中心化的过程来完成，但有几个概念需要集中应用于你的微服务治理。在此背景下，我们介绍了微服务治理实现的关键方面——服务注册与发现、开发生命周期管理、API
    管理和可观测性。我们在微服务治理的背景下为这些概念奠定了基础，并将详细讨论推迟到后续专门针对每个主题的章节中。


    在本章中，我们详细讨论了微服务治理中的服务注册与发现方面。我们讨论了服务注册与发现的重要性，并介绍了几种常用的模式。然后，我们通过真实示例讨论了一些最流行的服务注册中心解决方案，例如
    Consul 和 Eureka。


    脚注 1   2   3   4   5   6   7


    # 7. 集成微服务


    微服务架构提倡将软件应用程序构建为一组独立的服务。当我们需要实现一个特定的业务用例时，通常需要多个微服务之间的通信和协调。因此，集成微服务并构建服务间通信已成为实现微服务架构最具挑战性的任务之一。


    在现有的大多数书籍和其他资源中，微服务集成的概念很少被讨论，或者以一种非常抽象的方式解释。因此，在本章中，我们将深入探讨集成微服务的关键挑战、集成微服务的模式，以及我们可以利用的框架和语言。

