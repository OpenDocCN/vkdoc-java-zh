  trans: '

    #### 可观测性


    使用 Istio 时，让服务具备可观测性变得异常简单。例如，假设你想为微服务应用启用分布式追踪，那么你需要在 Istio 安装中安装相应的附加组件（如 Zipkin^(¹³⁵)
    或 Jaeger^(¹³⁶)）。现在，当你向微服务发送请求时，请求会经过 Sidecar 代理。这些 Sidecar 代理能够自动将追踪跨度发送到 Zipkin
    或 Jaeger。


    Istio 代理也能自动发送跨度。它们需要一些提示来将整个追踪链路串联起来。应用需要传播适当的 HTTP 头，这样当代理将跨度信息发送到 Zipkin 或
    Jaeger 时，这些跨度才能被正确关联成一条完整的追踪链路。


    类似地，可观测性的其他方面也可以在无需或仅需对代码进行极少修改的情况下得到支持。关于如何使用 Istio 让服务具备可观测性的更多细节，请参考 Istio
    文档^(¹³⁷)。我们将在第 13 章“可观测性”中，结合微服务详细讨论可观测性。


    #### 安全性


    Istio 的安全能力仍在快速发展。在本书撰写时，Istio 提供了以下安全特性：


    *   服务间的双向 TLS（mTLS）认证

    *   服务的白名单和黑名单

    *   基于拒绝的访问控制

    *   基于角色的访问控制（RBAC）


    关于这些安全用例的更多细节，请参考 Istio 文档^(¹³⁸)。


    既然你已经对 Istio 有了更深入的了解，让我们来看看另一个流行的服务网格实现：Linkerd。


    ## Linkerd


    Linkerd 是一个开源网络代理，旨在作为服务网格部署：一个用于管理、控制和监控应用内服务间通信的专用层。


    Linkerd 负责处理跨服务通信中困难且易出错的部分——包括延迟感知的负载均衡、连接池、TLS、仪表化以及请求级路由。Linkerd 构建在 Netty
    和 Finagle 之上。


    图 9-10 展示了 Linkerd 如何作为服务网格来连接多个微服务。你可以发现它使用了与 Istio 非常相似的标准服务网格模式。


    ![../images/461146_1_En_9_Chapter/461146_1_En_9_Fig10_HTML.jpg](img/461146_1_En_9_Fig10_HTML.jpg)


    图 9-10


    Linkerd 服务网格


    要开始使用 Linkerd（[`https://linkerd.io/getting-started/locally/`](https://linkerd.io/getting-started/locally/)），你可以在本地机器上运行它，并在同一台机器上运行你的服务（两个运行时位于同一主机上）。运行
    Linkerd 时，你可以使用以下 Yaml 配置文件来启动你的服务网格。假设你的微服务在 HTTP 端口 9999 上运行。以下配置将在 HTTP 端口
    4140 上启动 Linkerd。


    ```

    #linkerd.yaml

    routers:

    - protocol: http

    dtab: |

    /svc => /#/io.l5d.fs

    servers:

    - ip: 0.0.0.0

    port: 4140

    ```


    Linkerd 默认使用基于文件的服务发现机制。使用 Linkerd 自带的配置，当它需要解析服务端点时，首先查找的是 `disco/` 目录。通过此配置，Linkerd
    会查找文件名与目标具体名称对应的文件，并期望这些文件包含以换行符分隔的主机端口格式地址列表。


    ```

    head disco/*

    ==> disco/thrift-buffered  disco/thrift-framed  disco/web <==

    127.0.0.1 9999

    ```


    当你使用以下 URL 向 Linkerd（端口 4140）发送请求时，目标是通过查看 HTTP 主机头（即 `web`）来发现的。


    ```

    $ curl -H "Host: web" http://localhost:4140/

    ```


    根据之前的基于文件的服务发现配置，Linkerd 可以解析出服务 `web` 的主机和端口（9999）。


    我们可以扩展相同的配置，通过使用 Linkerd 的 `failureAccrual` 配置来实现对后端微服务的弹性调用。


    ```

    - protocol: http

    label: io.l5d.consecutiveFailures

    dtab: /svc => /#/io.l5d.fs/service2;

    client:

    failureAccrual:

    kind: io.l5d.consecutiveFailures

    failures: 5

    backoff:

    kind: constant

    ms: 10000

    servers:

    - port: 4142

    ip: 0.0.0.0

    service:

    responseClassifier:

    kind: io.l5d.http.nonRetryable5XX

    ```


    `failureAccrual` 在 Linkerd 配置的客户端部分下进行配置，因此任何与后端相关的故障都位于该路由上，并受客户端约束，从而实现弹性。


    ## 我们应该使用服务网格吗？


    在本书撰写时，使用服务网格的趋势非常强劲。然而，当时服务网格的生产环境使用还很少见。因此，我们对其真正的优缺点还没有足够的了解。让我们来看看在使用服务网格时需要注意的一些关键领域。


    ### 优点


    服务网格无疑有能力彻底改变我们开发云原生服务和应用的方式。鉴于微服务架构在服务间通信方面带来的复杂性，服务网格提供了一些有前景的优势：


    *   *开发者可以更多地关注业务功能，而非服务间通信*：大多数通用功能都在微服务代码之外实现，并且是可复用的。

    *   *开箱即用的可观测性*：服务通过 Sidecar 天生具备可观测性。因此，分布式追踪、日志记录、指标等无需服务开发者额外投入。

    *   *对多语言服务友好*：在选择微服务实现语言时拥有更多自由。你无需担心特定语言是否支持或拥有构建网络应用功能的库。

    *   *集中管理的去中心化系统*：大多数能力可以通过控制平面集中管理，并推送到去中心化的 Sidecar 运行时中。


    如果你已经在企业中运行 Kubernetes，那么将服务网格引入你的架构是相当直接的。


    ### 缺点


    *   *复杂性*：引入服务网格会显著增加给定微服务实现中的运行时实例数量。

    *   *增加额外跳数*：每次服务调用都必须经过一次额外的跳转（通过服务网格 Sidecar 代理）。

    *   *服务网格解决的是部分问题*：服务网格仅解决服务间通信的一部分问题，还有许多复杂问题它无法解决，例如复杂路由、转换/类型映射，以及与其他服务和系统的集成。这些问题必须由微服务的业务逻辑来解决。

    *   *不成熟*：服务网格技术相对较新，尚不能宣称已完全准备好用于大规模部署的生产环境。

    '
- fmt: '# Summary


    In this chapter, we took a detailed look at the concept of a Service Mesh and
    the key reason behind its inception. Service Mesh tries to simplify some of the
    inter-service communication complexities and service governance requirements.
    When we use a Service Mesh, the developers don’t need to worry about the inter-service
    communication and most of the other crosscutting features of a service such as
    security, observability, etc. Each microservice runs with a co-located sidecar,
    which is controlled by a central control plan. The sidecars are controlled using
    a predefined configuration, which is pushed via the control plane. `Istio` is
    one of the most commonly used implementations of the Service Mesh. The Service
    Mesh concept is relatively new and yet to be fully battle-tested. So, we need
    to be very aware of its pros and cons.


    Footnotes [1](#461146_1_En_9_Chapter.xhtml#Fn1_source) [2](#461146_1_En_9_Chapter.xhtml#Fn2_source)
    [3](#461146_1_En_9_Chapter.xhtml#Fn3_source) [4](#461146_1_En_9_Chapter.xhtml#Fn4_source)
    [5](#461146_1_En_9_Chapter.xhtml#Fn5_source) [6](#461146_1_En_9_Chapter.xhtml#Fn6_source)
    [7](#461146_1_En_9_Chapter.xhtml#Fn7_source) [8](#461146_1_En_9_Chapter.xhtml#Fn8_source)
    [9](#461146_1_En_9_Chapter.xhtml#Fn9_source) [10](#461146_1_En_9_Chapter.xhtml#Fn10_source)
    [11](#461146_1_En_9_Chapter.xhtml#Fn11_source) [12](#461146_1_En_9_Chapter.xhtml#Fn12_source)
    [13](#461146_1_En_9_Chapter.xhtml#Fn13_source) [14](#461146_1_En_9_Chapter.xhtml#Fn14_source)


    # 10. APIs, Events, and Streams


    In this chapter, we focus on how microservices can connect with external services,
    systems and data using APIs, Events and Streams.


    As discussed in previous chapters, any of the microservices applications that
    you develop have to expose the business capabilities to consumers in such a way
    that you can create, manage, secure, analyze, and scale those capabilities. Therefore,
    such capabilities are exposed to consumers as APIs, which are governed by a process
    commonly known as API management. Similarly, Microservices can consume external
    APIs via invoking API calls. APIs more or less follow a synchronous and request-response
    messaging type communication.


    Microservices can also build on top Event-driven architecture, where applications
    are fully decoupled from each other and communicate via asynchronous events or
    messages. An event can be emitted by a given service or a system and some other
    service can act on it. Microservices have to cater to various event-driven communication
    styles, with internal as well as external service boundaries.


    A stream is an unbounded set of events that a service processes continuously.
    The consumer service of a given stream keeps processing that stream and can emit
    the resulting events based on the stream processing logic.


    The business capabilities of your microservices based applications can be exposed
    using APIs, events or stream and they can also connect and consume external APIs,
    events and streams.


    Let’s delve deeply into each of these areas and see how we can leverage them when
    building a microservices architecture.


    ## APIs and API Management


    Any business capability that you want to expose to a consumer (internal or external)
    can be considered an API. Exposing such business capabilities in a way that you
    can create, manage, secure, analyze, and scale them, is known as *API management*.
    By using API management solutions, you can enable policy and key validation, service
    versioning, quota management, primitive transformations, authorization and access
