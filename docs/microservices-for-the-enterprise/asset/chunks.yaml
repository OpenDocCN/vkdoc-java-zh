    The master node is also known as the Kubernetes control plane, which controls
    the complete Kubernetes cluster. There are four main components in a Kubernetes
    control plane: the API server, scheduler, controller manager, and etcd. The API
    server exposes a set of APIs to all the worker nodes and also to the other components
    in the control plane itself. The scheduler assigns a worker node to each deployment
    unit of your application. The applications are actually running on a worker node.


    ![../images/461146_1_En_8_Chapter/461146_1_En_8_Fig5_HTML.jpg](images/461146_1_En_8_Chapter/461146_1_En_8_Fig5_HTML.jpg)


    Figure 8-5


    High-level Kubernetes architecture (a Kubernetes cluster)


    The controller manager is responsible for managing and tracking all the nodes
    in the Kubernetes deployment. It makes sure components are replicated properly
    and autoscaled, the failures are handled gracefully, as well as performs many
    other tasks. The `etcd` is a highly available, consistent datastore, which stores
    the Kubernetes cluster configuration.


    A worker node consists of three components—a kubelet, a container runtime, and
    a kube-proxy. The container runtime can be based on Docker or rkt. Even though
    the Kubernetes container runtime was initially tied to Docker and rkt, it can
    now be extended to support any Open Container Initiative (OCI)-based container
    runtimes via the Container Runtime Interface (CRI). The responsibility of the
    kubelet is to manage the node by communicating with the API server running on
    the master node. It is running on each worker node and acts as a node agent to
    the master node. Kube-proxy or the Kubernetes network proxy does simple TCP and
    UDP stream forwarding or round-robin TCP and UDP forwarding across a set of backends.


    #### Installing Kubectl


    The Kubernetes master node can run anywhere. To interact with the master node,
    we need to have kubectl installed locally in our machine. The kubectl installation
    instructions are available at [`https://kubernetes.io/docs/tasks/tools/install-kubectl/`](https://kubernetes.io/docs/tasks/tools/install-kubectl/)
    . Make sure that the version of kubectl is within one minor version difference
    of your cluster.


    #### Installing Minikube


    Minikube is the best way to get started with Kubernetes in your local machine.
    Unlike a production Kubernetes cluster, Minikube only supports one-node Kubernetes
    cluster. In this chapter, we use Minikube to set up a Kubernetes cluster. Minikube
    installation details are available at [`https://kubernetes.io/docs/tasks/tools/install-minikube/`](https://kubernetes.io/docs/tasks/tools/install-minikube/)
    . You will never use Minikube in a production environment, but the Kubernetes
    concepts that you learn with Minikube are still valid across any type of a Kubernetes
    distribution.


    #### Test the Kubernetes Setup


    Once you have installed both the kubectl and Minikube in your local machine, we
    need to start the Minikube server with the following command.


    ```

    :\> minikube start

    minikube config set WantUpdateNotification false

    Starting local Kubernetes v1.9.0 cluster...

    Starting VM...

    Getting VM IP address...

    Moving files into cluster...

    Setting up certs...

    Connecting to cluster...

    Setting up kubeconfig...

    Starting cluster components...

    Kubectl is now configured to use the cluster.

    Loading cached images from config file.

    ```


    Once Minikube starts, run the following command to verify the communication between
    kubectl and the Kubernetes cluster. This prints the version of both the kubectl
    client and the Kubernetes cluster.


    ```

    :\> kubectl version

    Client Version: version.Info{Major:"1", Minor:"11", GitVersion:"v1.11.0", GitCommit:"91e7b4fd31fcd3d5f436da26c980becec37ceefe",
    GitTreeState:"clean", BuildDate:"2018-06-27T22:30:22Z", GoVersion:"go1.10.3",
    Compiler:"gc", Platform:"darwin/amd64"}

    Server Version: version.Info{Major:"", Minor:"", GitVersion:"v1.9.0", GitCommit:"925c127ec6b946659ad0fd596fa959be43f0cc05",
    GitTreeState:"clean", BuildDate:"2018-01-26T19:04:38Z", GoVersion:"go1.9.1", Compiler:"gc",
    Platform:"linux/amd64"}

    ```


    Also, with the following command, we can determine where the Kubernetes cluster
    is running.


    ```

    :\> kubectl cluster-info

    Kubernetes master is running at https://192.168.99.100:8443

    ```


    Now we can use following command to see all the nodes in our Kubernetes cluster.
    Since we are running Minikube, you will only find one node.


    ```

    :\> kubectl get nodes

    NAME       STATUS    ROLES     AGE       VERSION

    minikube   Ready         24d       v1.9.0

    ```


    To find more details about a given node, use the following command. This will
    return a whole lot of metadata related to the node.


    ```

    :\> kubectl describe nodes minikube

    ```


    ### Kubernetes Core Concepts


    In this section, we discuss fundamental concepts associated with Kubernetes. Before
    we get there, let’s look at how Kubernetes works with containers.


    The first thing we need to do prior to a Kubernetes deployment is to identify
    and package our applications into container images, where at runtime, each application
    will have its own isolated container. Then we need to identify how we are going
    to group these containers. For example, there can be microservices that run always
    together, and only one microservice exposes the functionality to the outsiders.
    In all the other cases, communication between microservices is just internal.
    Another example is a database we have as a container, which is only used by one
    microservice. In that case, we can group the database container and the corresponding
    microservice together. Well, someone of course can argue this as an anti-pattern.
    We do not disagree. Let’s revisit our example, after defining the term pod, within
    the context of Kubernetes.'
  trans: '

    ## 容器编排


    容器和 Docker 极大地减轻了微服务开发中的大部分痛点。如果没有 Docker，微服务今天可能不会如此流行。然而，容器只解决了大规模微服务部署中的一部分问题。如何管理容器从创建到终止的整个生命周期？如何调度容器在网络中不同的物理机上运行，跟踪其运行状态，并在给定集群的多个容器之间进行负载均衡？如何自动扩展容器以满足不断变化的请求或负载？这些都是容器编排框架所要解决的问题。Kubernetes
    和 Apache Mesos 是最流行的容器编排框架。在本章中，我们只关注 Kubernetes。


    ### Kubernetes 简介


    简而言之，Docker 抽象了机器（或计算机），而 Kubernetes 抽象了网络。谷歌于 2014 年将 Kubernetes 作为开源项目向公众推出。在
    Kubernetes 之前，谷歌多年来一直致力于一个名为 Borg 的项目，以帮助其内部开发人员和系统管理员管理部署在大型数据中心上的数千个应用程序/服务。Kubernetes
    是 Borg 的下一代产品。


    Kubernetes 让你能够轻松地将运行在容器中的任何类型的应用程序部署并扩展到数千个节点。例如，在部署描述文件（Kubernetes 可识别）中，你可以指定需要运行多少个`订单处理`微服务的实例。


    #### Kubernetes 架构


    与 Docker 一样，Kubernetes 也采用基于客户端-服务器的架构。有一个 Kubernetes 主节点和一组与之连接的工作节点。主节点也称为 Kubernetes
    控制平面，它控制整个 Kubernetes 集群。Kubernetes 控制平面包含四个主要组件：API 服务器、调度器、控制器管理器和 etcd。API
    服务器向所有工作节点以及控制平面内的其他组件公开一组 API。调度器为应用程序的每个部署单元分配一个工作节点。应用程序实际上运行在工作节点上。


    ![../images/461146_1_En_8_Chapter/461146_1_En_8_Fig5_HTML.jpg](img/461146_1_En_8_Fig5_HTML.jpg)


    图 8-5


    高级 Kubernetes 架构（一个 Kubernetes 集群）


    控制器管理器负责管理和跟踪 Kubernetes 部署中的所有节点。它确保组件被正确复制和自动扩展，优雅地处理故障，并执行许多其他任务。`etcd`是一个高可用、一致性的数据存储，用于存储
    Kubernetes 集群配置。


    一个工作节点包含三个组件：kubelet、容器运行时和 kube-proxy。容器运行时可以基于 Docker 或 rkt。尽管 Kubernetes 容器运行时最初与
    Docker 和 rkt 绑定，但现在可以通过容器运行时接口（CRI）扩展以支持任何基于开放容器倡议（OCI）的容器运行时。kubelet 的职责是通过与主节点上运行的
    API 服务器通信来管理节点。它运行在每个工作节点上，并作为主节点的节点代理。Kube-proxy 或 Kubernetes 网络代理执行简单的 TCP 和
    UDP 流转发，或在一组后端之间进行轮询的 TCP 和 UDP 转发。


    #### 安装 Kubectl


    Kubernetes 主节点可以运行在任何地方。要与主节点交互，我们需要在本地机器上安装 kubectl。kubectl 的安装说明可在[`https://kubernetes.io/docs/tasks/tools/install-kubectl/`](https://kubernetes.io/docs/tasks/tools/install-kubectl/)找到。请确保
    kubectl 的版本与你的集群的次版本号相差不超过一个。


    #### 安装 Minikube


    Minikube 是在本地机器上开始使用 Kubernetes 的最佳方式。与生产环境的 Kubernetes 集群不同，Minikube 仅支持单节点 Kubernetes
    集群。在本章中，我们使用 Minikube 来搭建一个 Kubernetes 集群。Minikube 的安装详情可在[`https://kubernetes.io/docs/tasks/tools/install-minikube/`](https://kubernetes.io/docs/tasks/tools/install-minikube/)找到。你永远不会在生产环境中使用
    Minikube，但通过 Minikube 学到的 Kubernetes 概念在任何类型的 Kubernetes 发行版中仍然有效。


    #### 测试 Kubernetes 设置


    在本地机器上安装好 kubectl 和 Minikube 后，我们需要使用以下命令启动 Minikube 服务器。


    ```

    :\> minikube start

    minikube config set WantUpdateNotification false

    Starting local Kubernetes v1.9.0 cluster...

    Starting VM...

    Getting VM IP address...

    Moving files into cluster...

    Setting up certs...

    Connecting to cluster...

    Setting up kubeconfig...

    Starting cluster components...

    Kubectl is now configured to use the cluster.

    Loading cached images from config file.

    ```


    Minikube 启动后，运行以下命令来验证 kubectl 与 Kubernetes 集群之间的通信。这将打印 kubectl 客户端和 Kubernetes
    集群的版本信息。


    ```

    :\> kubectl version

    Client Version: version.Info{Major:"1", Minor:"11", GitVersion:"v1.11.0", GitCommit:"91e7b4fd31fcd3d5f436da26c980becec37ceefe",
    GitTreeState:"clean", BuildDate:"2018-06-27T22:30:22Z", GoVersion:"go1.10.3",
    Compiler:"gc", Platform:"darwin/amd64"}

    Server Version: version.Info{Major:"", Minor:"", GitVersion:"v1.9.0", GitCommit:"925c127ec6b946659ad0fd596fa959be43f0cc05",
    GitTreeState:"clean", BuildDate:"2018-01-26T19:04:38Z", GoVersion:"go1.9.1", Compiler:"gc",
    Platform:"linux/amd64"}

    ```


    此外，通过以下命令，我们可以确定 Kubernetes 集群的运行位置。


    ```

    :\> kubectl cluster-info

    Kubernetes master is running at https://192.168.99.100:8443

    ```


    现在我们可以使用以下命令查看 Kubernetes 集群中的所有节点。由于我们运行的是 Minikube，你只会看到一个节点。


    ```

    :\> kubectl get nodes

    NAME       STATUS    ROLES     AGE       VERSION

    minikube   Ready         24d       v1.9.0

    ```


    要查找有关特定节点的更多详细信息，请使用以下命令。这将返回与该节点相关的大量元数据。


    ```

    :\> kubectl describe nodes minikube

    ```


    ### Kubernetes 核心概念


    在本节中，我们将讨论与 Kubernetes 相关的基本概念。在此之前，我们先来看看 Kubernetes 是如何与容器协同工作的。


    在进行 Kubernetes 部署之前，我们需要做的第一件事是将应用程序识别并打包成容器镜像，这样在运行时，每个应用程序都将拥有自己独立的容器。然后，我们需要确定如何对这些容器进行分组。例如，有些微服务可能始终一起运行，并且只有一个微服务向外部暴露功能。在其他所有情况下，微服务之间的通信都是内部的。另一个例子是，我们有一个作为容器的数据库，它只被一个微服务使用。在这种情况下，我们可以将数据库容器和相应的微服务分组在一起。当然，有人可能会认为这是一种反模式。我们并不反对。让我们在
    Kubernetes 的上下文中定义了 Pod 这个术语之后，再来重新审视我们的例子。

    '
- fmt: '# Pod


    在 Kubernetes 中，我们将一组容器称为一个`Pod`。`Pod`是 Kubernetes 中最小的部署单元。你不能直接部署容器，首先需要将一个或多个容器组合成一个`Pod`。由于`Pod`是最小的部署单元，Kubernetes
    只能对`Pod`进行扩缩容，而不能对单个容器进行扩缩容。换句话说，所有组合成一个`Pod`的容器必须具有相同的扩缩容需求。回顾之前的例子，你可以将一组微服务组合在一个`Pod`中，前提是它们都具有相同的扩缩容需求。但将微服务与数据库组合在一个`Pod`中并不是理想的使用场景，因为数据库通常具有与微服务不同的扩缩容需求。


    `Pod`的一个常见用途是让微服务自身带有一个边车代理（参见图 8-6）。在这里，所有进出微服务的请求都通过该代理。这种模型将在第 9 章“服务网格”中详细讨论。


    ![../images/461146_1_En_8_Chapter/461146_1_En_8_Fig6_HTML.png](images/461146_1_En_8_Chapter/461146_1_En_8_Fig6_HTML.png)


    图 8-6 将一组服务组合成一个`Pod`


    尽管一个`Pod`可以包含多个容器，但它们共享相同的网络接口和存储。`Pod`内的容器可以使用`localhost`作为主机名相互通信，并且默认情况下，`Pod`内的任何服务都不会暴露到`Pod`外部。此外，由于同一`Pod`中的所有容器共享相同的网络接口，因此不能有两个容器在同一个端口上启动它们的服务。在将`Pod`调度到工作节点时，Kubernetes
    会确保同一`Pod`中的所有容器被调度到同一台物理机器上运行（参见图 8-7）。


    ![../images/461146_1_En_8_Chapter/461146_1_En_8_Fig7_HTML.jpg](images/461146_1_En_8_Chapter/461146_1_En_8_Fig7_HTML.jpg)


    图 8-7 同一`Pod`中的容器被调度到同一台物理机器上运行


    ## 创建 Pod


    让我们看看下面的部署描述符，它用于创建一个包含`Order Processing`微服务和`Inventory`微服务的`Pod`。这里我们首先将`kind`属性的值设置为`Pod`，然后在`spec`属性下，定义需要组合到这个`Pod`中的镜像集合。


    ### 重要说明


    这里我们假设`Order Processing`和`Inventory`微服务都适合放在一个`Pod`中，并且它们具有相同的扩缩容需求。这仅仅是为了使示例简单明了并解释概念而做出的假设。


    ```

    apiVersion: v1

    kind: Pod

    metadata:

    name: ecomm-pod

    labels:

    app: ecommapp

    spec:

    containers:

    - name: orderprocessing

    image: prabath/sample04

    ports:

    - containerPort : 9000

    - name: inventory

    image: prabath/sample02

    ports:

    - containerPort : 9090

    ```


    一旦应用程序开发人员编写好部署描述符，他就会通过`kubectl`，经由 API 服务器将其输入到 Kubernetes 控制平面。然后调度器会将`Pod`调度到工作节点上，相应的容器运行时会从
    Docker 仓库拉取容器镜像。


    ### 注意


    在 Kubernetes 部署描述符中，我们指向的是`Order Processing`微服务的一个略微修改的版本（与我们之前讨论的相比），称为`sample04`，而不是`sample01`。


    ## ReplicaSet


    当你在 Kubernetes 环境中部署一个`Pod`时，你可以指定希望始终保持运行的给定`Pod`的实例数量。还可能存在许多其他的扩缩容需求，我们将在本章后面通过示例进行讨论。`ReplicaSet`^([^(110)](#fn110))
    负责监控正在运行的`Pod`数量，并确保维持预期的数量。如果某个`Pod`因故宕机，`ReplicaSet`将确保启动一个新的`Pod`。本章后面将解释`ReplicaSet`的工作原理。


    ## Service


    从某种意义上说，Kubernetes 中的`Service`^([^(111)](#fn111)) 是提供相同功能的一组`Pod`。这些`Pod`实际上是同一个`Pod`的不同实例。例如，为了应对高流量，你可能运行同一个`Order
    Processing`微服务的五个实例作为五个`Pod`。这些`Pod`通过一个`Service`暴露给外部世界。`Service`拥有自己的 IP 地址和端口，在其生命周期内不会改变，并且它知道如何将流量路由到所附着的`Pod`。微服务客户端应用程序无需担心直接与`Pod`通信，而是与`Service`通信。同时，基于扩缩容需求或其他原因，`Pod`可能会启动和停止。每当`Pod`启动和停止时，它可能会携带不同的
    IP 地址，这使得客户端应用程序很难与`Pod`建立连接。Kubernetes 中的`Service`解决了这个问题。本章后面有一个示例演示了如何在 Kubernetes
    中创建`Service`。


    ## Deployment


    `Deployment`^([^(112)](#fn112)) 是一个更高级别的构造，可用于在 Kubernetes 环境中部署和管理应用程序。它使用`ReplicaSet`（这是一个低级别的构造）来创建`Pod`。我们将在本章后面讨论如何使用`Deployment`构造。


    图 8-8 展示了`Pod`、`Service`、`ReplicaSet`和`Deployment`之间的关系。


    ![../images/461146_1_En_8_Chapter/461146_1_En_8_Fig8_HTML.jpg](images/461146_1_En_8_Chapter/461146_1_En_8_Fig8_HTML.jpg)


    图 8-8 Pod、Service、ReplicaSet 和 Deployment


    ## 在 Kubernetes 环境中部署微服务


    在本节中，我们将了解如何创建一个包含两个微服务的`Pod`，并从宿主机使用`cURL`调用其中一个微服务，同时这两个微服务在同一`Pod`内相互通信。


    ### 使用 YAML 文件创建 Pod


    我们需要做的第一件事是为我们的`Pod`编写一个部署描述符。这与我们在上一节中讨论的 YAML 文件相同。在那里，我们创建了一个名为`ecomm-pod`的`Pod`，其中包含两个容器镜像：`prabath/sample04`和`prabath/sample02`。在本章前面，我们创建了这两个镜像并推送到了
    Docker Hub（`sample04`是`sample01`的一个略微修改的版本）。YAML 配置中的每个容器都定义了微服务运行的端口。例如，`Order
    Processing`微服务运行在 HTTP 端口 9000 上，而`Inventory`微服务运行在 HTTP 端口 9090 上。你可以在`ch08/sample03`目录中找到完整的
    YAML 文件（`ecomm-pod.yml`）。要使用此 YAML 配置创建`Pod`，请从`ch08/sample03`目录运行以下命令。


    ```

    :\> kubectl create -f ecomm-pod.yml

    pod/ecomm-pod created

    ```


    如果`Pod`创建成功，以下命令应返回`Pod`的状态。


    ```

    :\> kubectl get pods

    NAME        READY     STATUS    RESTARTS   AGE

    ecomm-pod   2/2       Running   0          1m

    ```


    第一次运行时，状态更新为`Running`可能需要一些时间，因为工作节点的容器环境需要从 Docker Hub 拉取容器镜像。`Ready`列下的值 2/2
    表示此`Pod`中的两个容器都已准备好接受请求。要查找有关此`Pod`的更多详细信息，我们可以使用以下命令。这将再次返回有关给定`Pod`的大量有用信息。图
    8-9 显示了输出的一部分，其中列出了启动`Pod`时生成的所有事件。


    ![../images/461146_1_En_8_Chapter/461146_1_En_8_Fig9_HTML.jpg](images/461146_1_En_8_Chapter/461146_1_En_8_Fig9_HTML.jpg)


    图 8-9 启动 ecomm-pod 时的事件


    ```

    :\> kubectl describe pod ecomm-pod

    ```


    如果你想删除一个`Pod`，请使用以下命令。


    ```

    :\> kubectl delete -f ecomm-pod.yml

    ```'
  raw: '#### Pod


    In Kubernetes, we call a group of containers a pod. A *pod* is the smallest deployment
    unit in Kubernetes. You cannot just deploy containers. First we need to group
    one or more containers as a pod. Since the pod is the smallest deployment unit
    in Kubernetes, it can scale only the pods, not the containers. In other words,
    all the containers grouped as a pod must have the same scalability requirements.
    If we revisit our previous example, you can group a set of microservices together
    in a pod. If all of them have the same scalability requirements. But grouping
    a microservice with a database in a pod is not an ideal use case. Usually a database
    has different scalability requirements than a microservice.


    One common use case for a pod is to have a sidecar proxy with the microservice
    itself (see Figure [8-6](#461146_1_En_8_Chapter.xhtml#Fig6)). Here, all the inbound
    and outbound requests to the microservice flow through the proxy. This model is
    discussed in detail in Chapter [9](#461146_1_En_9_Chapter.xhtml), “Service Mesh”.


    ![../images/461146_1_En_8_Chapter/461146_1_En_8_Fig6_HTML.png](images/461146_1_En_8_Chapter/461146_1_En_8_Fig6_HTML.png)


    Figure 8-6


    Grouping a set of services into a pod


    Even though a pod can have multiple containers, all of them share the same network
    interface and storage. Containers within a pod can communicate with each other
    using `localhost` as the hostname, and none of the services by default are exposed
    outside the pod. Also, since all the containers in same pod share the same network
    interface, no two containers can spin up their services on the same port. When
    scheduling pods on worker nodes, Kubernetes makes sure that all the containers
    in the same pod are scheduled to run on the same physical machine (see Figure
    [8-7](#461146_1_En_8_Chapter.xhtml#Fig7)).


    ![../images/461146_1_En_8_Chapter/461146_1_En_8_Fig7_HTML.jpg](images/461146_1_En_8_Chapter/461146_1_En_8_Fig7_HTML.jpg)


    Figure 8-7


    Containers in the same pod are scheduled to run on the same physical machine


    #### Creating a Pod


    Let’s look at the following deployment descriptor, which is used to create a pod
    with the `Order Processing` microservice and the `Inventory` microservice. Here
    first we set the value of the `kind` attribute to `Pod`, and later under the `spec`
    attribute, we define the set of images need to be grouped into this pod.


    ### Important


    Here we made an assumption that both the `Order Processing` and `Inventory` microservices
    fit into a pod and both of them have the same scalability requirements. This is
    a mere assumption we made here to make the examples straightforward and explain
    the concepts.


    ```

    apiVersion: v1

    kind: Pod

    metadata:

    name: ecomm-pod

    labels:

    app: ecommapp

    spec:

    containers:

    - name: orderprocessing

    image: prabath/sample04

    ports:

    - containerPort : 9000

    - name: inventory

    image: prabath/sample02

    ports:

    - containerPort : 9090

    ```


    Once the application developer comes up with the deployment descriptor, he or
    she will feed that into the Kubernetes control plane using kubectl, via the API
    server. Then the scheduler will schedule the pods on worker nodes, and the corresponding
    container runtime will pull the container images from the Docker registry.


    ### Note


    In the Kubernetes deployment descriptor we point to a slightly modified version
    of the `Order Processing` microservice (from what we discussed earlier) called
    `sample04`, instead of the `sample01`.


    #### ReplicaSet


    When you deploy a pod in a Kubernetes environment, you can specify how many instances
    of a given pod you want to keep running all the time. There can be many other
    scaling requirements as well, which we discuss later in the chapter with examples.
    It is the responsibility of the ReplicaSet^([^(110)](#fn110)) to monitor the number
    of running pods and make sure to maintain the expected number. If one pod goes
    down for some reason, the ReplicaSet will make sure to spin up a new one. Later
    in the chapter, we explain how ReplicaSet works.


    #### Service


    In a way, a service^([^(111)](#fn111)) in Kubernetes is a grouping of pods that
    provide the same functionality. These pods in fact are different instances of
    the same pod. For example, you may run five instances of the same `Order Processing`
    microservice as five pods to cater to high traffic. These pods are exposed to
    the outside world, via a service. A service has its own IP address and port, which
    will never change during its lifetime and it knows how to route traffic to the
    attached pods. None of the microservice client applications need worry about talking
    directly to a pod, but to a service. At the same time, based on the scalability
    requirements and other reasons, pods may come up and go down. Whenever a pod comes
    up and goes down, it may carry a different IP addresses and it is hard to make
    any connection from a client application to a pod. The service in Kubernetes solves
    this problem. There is an example later in the chapter that demonstrates how to
    create a service in Kubernetes.


    #### Deployment


    Deployment^([^(112)](#fn112)) is a higher-level construct that can be used to
    deploy and manage applications in a Kubernetes environment. It uses the ReplicaSet
    (which is a low-level construct) to create pods. We discuss how to use the deployment
    construct later in this chapter.


    Figure [8-8](#461146_1_En_8_Chapter.xhtml#Fig8) illustrates how the Pods, Services,
    ReplicaSets , and Deployments are related.


    ![../images/461146_1_En_8_Chapter/461146_1_En_8_Fig8_HTML.jpg](images/461146_1_En_8_Chapter/461146_1_En_8_Fig8_HTML.jpg)


    Figure 8-8


    Pods, Services, ReplicaSets , and Deployments


    ### Deploying Microservices in a Kubernetes Environment


    In this section, we see how to create a pod with two microservices and invoke
    one microservice from the host machine using cURL while the two microservices
    communicate with each other, in the same pod.


    #### Creating a Pod with a YAML File


    The first thing we need to do is to come up with a deployment descriptor for our
    pod. It’s the same YAML file we discussed in the previous section. There we create
    a pod called `ecomm-pod`, with two container images called `prabath/sample04`
    and `prabath/sample02`. Previously in this chapter we created those two images
    and pushed to the Docker Hub (`sample04` is a slightly modified version of the
    `sample01`). Each container in the YAML configuration defines the port where the
    microservice is running. For example, the `Order Processing` microservice is running
    on HTTP port 9000, while the `Inventory` microservice is running on HTTP port
    9090\. You can find the complete YAML file (`ecomm-pod.yml`) in the `ch08/sample03`
    directory. To create a pod with this YAML configuration, run the following command
    from `ch08/sample03`.


    ```

    :\> kubectl create -f ecomm-pod.yml

    pod/ecomm-pod created

    ```


    If the pod is successfully created, the following command should return the status
    of the pod.


    ```

    :\> kubectl get pods

    NAME        READY     STATUS    RESTARTS   AGE

    ecomm-pod   2/2       Running   0          1m

    ```


    The fist time, it may take some time to get the status updated to `Running`, as
    the container environment of the worker node has to pull the container images
    from the Docker Hub. The value 2/2 under the column `Ready` states that both containers
    in this pod are ready to accept requests. To find out more details about this
    pod, we can use the following command. This will once again return a whole lot
    of useful information about the given pod. Figure [8-9](#461146_1_En_8_Chapter.xhtml#Fig9)
    shows the part of the output that lists all the events generated while booting
    up the pod.


    ![../images/461146_1_En_8_Chapter/461146_1_En_8_Fig9_HTML.jpg](images/461146_1_En_8_Chapter/461146_1_En_8_Fig9_HTML.jpg)


    Figure 8-9


    Events in starting up the ecomm-pod


    ```

    :\> kubectl describe pod ecomm-pod

    ```


    If you want to delete a pod, use the following command.


    ```

    :\> kubectl delete -f ecomm-pod.yml

    ```'
  trans: '

    #### Pod


    在 Kubernetes 中，我们将一组容器称为一个 Pod。*Pod* 是 Kubernetes 中最小的部署单元。你不能直接部署容器。首先需要将一个或多个容器组合成一个
    Pod。由于 Pod 是 Kubernetes 中最小的部署单元，因此只能对 Pod 进行扩缩容，而不能对容器进行扩缩容。换句话说，组合成一个 Pod 的所有容器必须具有相同的扩缩容需求。回顾之前的例子，如果一组微服务具有相同的扩缩容需求，你可以将它们组合在一个
    Pod 中。但将微服务和数据库组合在一个 Pod 中并不是理想的用例。通常，数据库与微服务具有不同的扩缩容需求。


    Pod 的一个常见用例是让微服务自身带有一个 Sidecar 代理（见图 8-6）。在这里，所有进出微服务的请求都通过该代理。这种模型将在第 9 章“服务网格”中详细讨论。


    ![../images/461146_1_En_8_Chapter/461146_1_En_8_Fig6_HTML.png](img/461146_1_En_8_Fig6_HTML.png)


    图 8-6


    将一组服务组合成一个 Pod


    尽管一个 Pod 可以包含多个容器，但它们共享相同的网络接口和存储。Pod 内的容器可以使用 `localhost` 作为主机名相互通信，并且默认情况下，所有服务都不会暴露在
    Pod 外部。此外，由于同一 Pod 中的所有容器共享相同的网络接口，因此不能有两个容器在同一个端口上启动服务。在将 Pod 调度到工作节点时，Kubernetes
    会确保同一 Pod 中的所有容器被调度到同一台物理机器上运行（见图 8-7）。


    ![../images/461146_1_En_8_Chapter/461146_1_En_8_Fig7_HTML.jpg](img/461146_1_En_8_Fig7_HTML.jpg)


    图 8-7


    同一 Pod 中的容器被调度到同一台物理机器上运行


    #### 创建 Pod


    让我们看看下面的部署描述文件，它用于创建一个包含 `Order Processing` 微服务和 `Inventory` 微服务的 Pod。这里我们首先将
    `kind` 属性的值设置为 `Pod`，然后在 `spec` 属性下，定义需要组合到这个 Pod 中的镜像集合。


    ### 重要说明


    这里我们假设 `Order Processing` 和 `Inventory` 微服务都适合放在一个 Pod 中，并且它们具有相同的扩缩容需求。这仅仅是我们为了使示例更直接并解释概念而做出的假设。


    ```

    apiVersion: v1

    kind: Pod

    metadata:

    name: ecomm-pod

    labels:

    app: ecommapp

    spec:

    containers:

    - name: orderprocessing

    image: prabath/sample04

    ports:

    - containerPort : 9000

    - name: inventory

    image: prabath/sample02

    ports:

    - containerPort : 9090

    ```


    一旦应用程序开发人员编写好部署描述文件，他们就会通过 API 服务器使用 kubectl 将其输入到 Kubernetes 控制平面。然后调度器会将 Pod
    调度到工作节点上，相应的容器运行时会从 Docker 仓库拉取容器镜像。


    ### 注意


    在 Kubernetes 部署描述文件中，我们指向的是 `Order Processing` 微服务（与我们之前讨论的相比）的一个略微修改的版本，称为 `sample04`，而不是
    `sample01`。


    #### ReplicaSet


    当你在 Kubernetes 环境中部署一个 Pod 时，你可以指定希望始终保持运行的给定 Pod 的实例数量。可能还有许多其他的扩缩容需求，我们将在本章后面通过示例进行讨论。ReplicaSet^(¹¹⁰)
    负责监控正在运行的 Pod 数量，并确保维持预期的数量。如果某个 Pod 因故宕机，ReplicaSet 将确保启动一个新的 Pod。本章后面将解释 ReplicaSet
    的工作原理。


    #### Service


    从某种意义上说，Kubernetes 中的 Service^(¹¹¹) 是提供相同功能的一组 Pod。这些 Pod 实际上是同一个 Pod 的不同实例。例如，你可能运行同一个
    `Order Processing` 微服务的五个实例作为五个 Pod 来应对高流量。这些 Pod 通过一个 Service 暴露给外部世界。Service
    拥有自己的 IP 地址和端口，在其生命周期内不会改变，并且它知道如何将流量路由到所连接的 Pod。微服务的客户端应用程序无需担心直接与 Pod 通信，而是与
    Service 通信。同时，基于扩缩容需求或其他原因，Pod 可能会启动和关闭。每当 Pod 启动和关闭时，它可能会携带不同的 IP 地址，这使得客户端应用程序很难与
    Pod 建立连接。Kubernetes 中的 Service 解决了这个问题。本章后面有一个示例演示了如何在 Kubernetes 中创建 Service。


    #### Deployment


    Deployment^(¹¹²) 是一个更高级别的构造，可用于在 Kubernetes 环境中部署和管理应用程序。它使用 ReplicaSet（这是一个较低级别的构造）来创建
    Pod。我们将在本章后面讨论如何使用 Deployment 构造。


    图 8-8 说明了 Pod、Service、ReplicaSet 和 Deployment 之间的关系。


    ![../images/461146_1_En_8_Chapter/461146_1_En_8_Fig8_HTML.jpg](img/461146_1_En_8_Fig8_HTML.jpg)


    图 8-8


    Pod、Service、ReplicaSet 和 Deployment


    ### 在 Kubernetes 环境中部署微服务


    在本节中，我们将了解如何创建一个包含两个微服务的 Pod，并使用 cURL 从宿主机调用其中一个微服务，同时这两个微服务在同一个 Pod 内相互通信。


    #### 使用 YAML 文件创建 Pod


    我们需要做的第一件事是为我们的 Pod 编写一个部署描述文件。这与我们在上一节中讨论的 YAML 文件相同。在那里，我们创建了一个名为 `ecomm-pod`
    的 Pod，其中包含两个容器镜像：`prabath/sample04` 和 `prabath/sample02`。在本章前面，我们创建了这两个镜像并推送到了
    Docker Hub（`sample04` 是 `sample01` 的一个略微修改的版本）。YAML 配置中的每个容器都定义了微服务运行的端口。例如，`Order
    Processing` 微服务运行在 HTTP 端口 9000 上，而 `Inventory` 微服务运行在 HTTP 端口 9090 上。你可以在 `ch08/sample03`
    目录中找到完整的 YAML 文件（`ecomm-pod.yml`）。要使用此 YAML 配置创建 Pod，请从 `ch08/sample03` 目录运行以下命令。


    ```

    :\> kubectl create -f ecomm-pod.yml

    pod/ecomm-pod created

    ```


    如果 Pod 创建成功，以下命令应返回 Pod 的状态。


    ```

    :\> kubectl get pods

    NAME        READY     STATUS    RESTARTS   AGE

    ecomm-pod   2/2       Running   0          1m

    ```


    第一次运行时，状态更新为 `Running` 可能需要一些时间，因为工作节点的容器环境需要从 Docker Hub 拉取容器镜像。`Ready` 列下的值
    2/2 表示此 Pod 中的两个容器都已准备好接受请求。要查找有关此 Pod 的更多详细信息，我们可以使用以下命令。这将再次返回关于给定 Pod 的大量有用信息。图
    8-9 显示了输出的一部分，其中列出了启动 Pod 时生成的所有事件。


    ![../images/461146_1_En_8_Chapter/461146_1_En_8_Fig9_HTML.jpg](img/461146_1_En_8_Fig9_HTML.jpg)


    图 8-9


    启动 ecomm-pod 时的事件


    ```

    :\> kubectl describe pod ecomm-pod

    ```


    如果你想删除一个 Pod，请使用以下命令。


    ```

    :\> kubectl delete -f ecomm-pod.yml

    ```

