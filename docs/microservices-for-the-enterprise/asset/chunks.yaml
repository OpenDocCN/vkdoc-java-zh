  trans: '

    #### 防腐层


    让我们回顾一下上一节讨论的场景：在“订单处理”和“库存”这两个限界上下文中，`order` 实体有两种不同的定义。对于这两个限界上下文之间的通信，契约由“库存”限界上下文定义（见图
    2-5）。当“订单处理”更新“库存”时，它必须将自己的 `order` 实体转换为“库存”限界上下文能够理解的 `order` 实体。我们使用防腐层（ACL）模式来解决这个问题。防腐层模式提供了一个转换层（见图
    2-6）。


    ![../images/461146_1_En_2_Chapter/461146_1_En_2_Fig6_HTML.png](img/461146_1_En_2_Fig6_HTML.png)


    图 2-6


    防腐层模式


    让我们看看这种模式如何应用于企业级微服务部署。想象一个场景：你的微服务需要调用一个由单体应用暴露的服务。单体应用的设计并不关心领域驱动设计。促进微服务与单体应用之间通信的最佳方式是通过防腐层。这有助于保持微服务设计更加清晰（或者说更少受到污染）。


    实现防腐层有多种方式。一种方法是将转换逻辑构建在微服务自身内部。你将使用实现微服务的同一种语言来实现防腐层。这种方法有多个缺点。微服务开发团队必须拥有防腐层的实现，因此他们需要关注单体应用侧发生的任何变更。如果我们将这个转换层实现为另一个微服务，那么我们就可以将其实现和所有权委托给另一个团队。该团队只需要理解转换逻辑，其他什么都不用管。这种方法通常被称为*边车*模式。


    如图 2-7 所示，边车模式源于车辆，其中边车附着在摩托车上。如果你愿意，你可以为同一辆摩托车挂上不同的边车（不同颜色或设计），前提是两者之间的接口保持不变。这在微服务世界中同样适用，我们的微服务类似于摩托车，而转换层类似于边车。如果单体应用发生任何变化，我们只需要更改边车的实现以与之兼容——而微服务无需任何更改。


    ![../images/461146_1_En_2_Chapter/461146_1_En_2_Fig7_HTML.jpg](img/461146_1_En_2_Fig7_HTML.jpg)


    图 2-7


    边车


    微服务和边车之间的通信通过网络进行（不是本地进程内调用），但微服务和边车都位于同一台主机上——因此它不会通过网络路由。我们将在本书后面的第 8 章“部署和运行微服务”中讨论多种微服务部署模式。同时，请记住边车本身也是一个微服务。图
    2-8 展示了如何使用边车作为防腐层。


    ![../images/461146_1_En_2_Chapter/461146_1_En_2_Fig8_HTML.jpg](img/461146_1_En_2_Fig8_HTML.jpg)


    图 2-8


    充当防腐层的边车


    防腐层是使用边车模式的一种可能方式。它也被用于其他几种用例，例如服务网格。我们将在第 9 章“服务网格”中详细讨论什么是服务网格以及边车模式如何在服务网格中使用。


    #### 共享内核


    尽管我们讨论了在限界上下文之间保持清晰边界的重要性，但在某些情况下我们需要共享领域模型。当两个或多个限界上下文存在某些共同点，并且在不同的限界上下文下维护独立的对象模型会带来大量开销时，就可能出现这种情况。例如，每个限界上下文（或微服务）都必须对调用其操作的用户进行授权。不同的领域可能使用自己的授权策略，但在许多情况下，它们共享与授权服务相同的领域模型（授权服务本身就是一个微服务或一个独立的限界上下文）。在这种情况下，授权服务的领域模型充当了共享内核。由于存在共享的代码依赖（可能封装在库中），为了使共享内核模式在实践中发挥作用，所有使用共享内核的团队必须相互良好协作（见图
    2-9）。


    ![../images/461146_1_En_2_Chapter/461146_1_En_2_Fig9_HTML.png](img/461146_1_En_2_Fig9_HTML.png)


    图 2-9


    共享内核


    #### 追随者


    我们在本章中已经讨论过上游限界上下文和下游限界上下文的责任。让我们快速回顾一下。上游上下文对下游上下文拥有更多控制权。上游上下文定义了在两个上下文之间传递的领域模型。下游上下文应该充分了解上游上下文发生的任何变化。追随者模式指出，下游上下文（追随者）必须遵守上游上下文定义的契约。


    追随者模式看起来与共享内核相似，两者都拥有共享的领域模型。区别在于决策制定和开发过程。共享内核是两个紧密协调的团队之间协作的结果，而追随者模式处理的是与一个对协作不感兴趣的团队的集成——可能是一个你无法控制的第三方服务。例如，你可能使用
    PayPal API 来处理支付。PayPal 永远不会为了适应你而改变其 API，相反，你的限界上下文必须遵守它。如果这种集成使你的领域模型变得丑陋，你可以引入一个防腐层来将集成隔离在单一位置。

    '
- fmt: '### Customer/Supplier


    The conformist pattern has its own drawbacks where the downstream context or the
    service has no say as to how the interface between itself and the upstream context
    should be. There is no collaboration between the teams who work upstream/downstream
    bounded contexts. The customer/supplier pattern is one step forward to build better
    communication between these two teams and find a way to build the interface with
    collaboration. It’s not a total collaboration like in the shared kernel pattern,
    but something like a customer/supplier relationship. The downstream context is
    the customer, and the upstream context is the supplier.


    A customer does not have complete say over what a supplier does. But, then again,
    the supplier cannot totally ignore customer feedback. A good supplier will always
    listen to its customers, extract the positives, give feedback back to the customers,
    and produce the best products to address their needs. No point in producing something
    useless to its customers. This is the level of collaboration expected between
    upstream/downstream contexts adhering to the customer/supplier pattern. This helps
    the downstream contexts to provide suggestions, and request changes to the interface
    between the two contexts. Following this pattern, there is more responsibility
    on the upstream context. A given upstream context not only deals with one downstream
    context. You need to be extra careful that a suggestion from one downstream context
    does not break the contract between the upstream context and another downstream
    context.


    ### Partnership


    When we have two or more teams building microservices under different bounded
    contexts, but overall moving toward the same goal, and there are notable inter-dependencies
    between them, partnership pattern is an ideal way to build collaboration. Teams
    can collaborate in making decisions over the technical interfaces, release schedules,
    and anything of common interest. The partnership pattern is also applicable to
    any teams using the shared kernel pattern. The collaboration required to build
    the shared kernel can be established via a partnership. Also keep in mind that
    the output of the partnership pattern is not necessarily a shared kernel. It can
    be any interdependent services with nothing concrete to share.


    ### Published Language


    Microservices or bounded contexts, which follow the published language pattern,
    should agree on a published language to communicate. Here the *published* means
    that the language is readily available to the community that might be interested
    in using it. This can be XML, JSON, or any other language corresponding to the
    domain where the microservices are. Here the domain means the core domain. For
    example, there are domain specific languages used in the financial, e-business,
    and many other domains.


    This pattern highlights the importance of using a well-documented shared language
    to express necessary domain information as a common medium of communication. Figure
    [2-10](#461146_1_En_2_Chapter.xhtml#Fig10) shows how the translation works in
    and out of the published language to the context-specific languages. There we
    have a Java to JSON parser at the `Order Processing` microservice end, which knows
    how to create a JSON document from a Java object model. We use the JSON to C#
    parser at the `Inventory` microservice end to build a C# object model from a JSON
    document.


    ![../images/461146_1_En_2_Chapter/461146_1_En_2_Fig10_HTML.png](images/461146_1_En_2_Chapter/461146_1_En_2_Fig10_HTML.png)


    Figure 2-10


    Published language pattern


    ### Open Host Service


    In the anti-corruption layer pattern we have a translation layer between upstream
    and downstream microservices (or bounded contexts). When we have multiple downstream
    services, each downstream service has to handle the translation, as shown in Figure
    [2-11](#461146_1_En_2_Chapter.xhtml#Fig11). Both the `Delivery` and `Supplier
    Management` microservices have to translate the object model they get from the
    `Billing` upstream microservice to their own respective domain models (see Figure
    [2-11](#461146_1_En_2_Chapter.xhtml#Fig11)). If each of these downstream microservice
    has its own domain model, it doesn’t matter. We cannot avoid the translation happening
    at each end. But, if we have many downstream microservices doing the same translation,
    then it’s a duplication of the effort. The open host service pattern suggests
    an approach to overcome this.


    ![../images/461146_1_En_2_Chapter/461146_1_En_2_Fig11_HTML.jpg](images/461146_1_En_2_Chapter/461146_1_En_2_Fig11_HTML.jpg)


    Figure 2-11


    Anti-corruption layer pattern with multiple downstream services


    One way to implement the open host service pattern is to expose the upstream microservice
    functionality via an API, and the API does the translation. Now, all the downstream
    microservices, which share the same domain model, can talk to the API (instead
    of the upstream microservice) and follow either the conformist or customer/supplier
    pattern.


    Figure [2-12](#461146_1_En_2_Chapter.xhtml#Fig12) shows the implementation of
    the open host service pattern using an API. We’ll be discussing the role of an
    API gateway, in a microservices architecture, in Chapter [10](#461146_1_En_10_Chapter.xhtml):
    APIs, Events and Streams.


    ![../images/461146_1_En_2_Chapter/461146_1_En_2_Fig12_HTML.png](images/461146_1_En_2_Chapter/461146_1_En_2_Fig12_HTML.png)


    Figure 2-12


    Open host service pattern


    ### Separate Ways


    Let’s revisit the microservices design we did for our e-commerce application.
    There we have a `Customer` microservice and an `Order Processing` microservice
    (see Figure [2-2](#461146_1_En_2_Chapter.xhtml#Fig2)). Think of a customer portal,
    which talks to the `Customer` microservice and displays user profile. It may be
    useful to the end user to see his/her order history, along with the profile data.
    But the `Customer` microservice does not have direct access to the order history
    of a given customer; it’s under the control of `Order Processing` microservice.
    One way to facilitate this is to integrate the `Order Processing` microservice
    with the `Customer` microservice, and change the domain model of the `Customer`
    microservice to return the order history along with the profile data, which is
    a costly integration.


    Integration is always expensive and sometimes the benefit is small. The separate
    ways pattern suggests avoiding such costly integrations, and finds other ways
    to cater such requests. For example, in this particular scenario, we can avoid
    the integration between the `Order Processing` microservice and the `Customer`
    microservice and provide a link to the customer portal, along with the profile
    data to retrieve order history, and that will directly talk to the `Order Processing`
    microservice (see Figure [2-13](#461146_1_En_2_Chapter.xhtml#Fig13)).


    ![../images/461146_1_En_2_Chapter/461146_1_En_2_Fig13_HTML.jpg](images/461146_1_En_2_Chapter/461146_1_En_2_Fig13_HTML.jpg)


    Figure 2-13


    Separate ways pattern


    ### Big Ball of Mud


    Most of the time you don’t get a chance to work on a green-field project. Always
    you find some kind of a legacy system with lots of resistance to integrate with
    other systems in a standard manner. These systems do not have clear boundaries
    and clean domain models. The big ball of mud pattern highlights the need to identify
    such systems and treat them in a special context. We should not try to apply sophisticated
    modeling to these contexts, but rather find a way to integrate via an API or some
    kind of a service interface and use an anti-corruption layer pattern at the downstream
    service end.


    ## Design Principles


    Domain-driven design helps us scope out microservices along with bounded contexts.
    At its core in any microservices design, time to production, scalability, complexity
    localization, and resiliency are key elements. Adhering to the following design
    principles helps a microservice reach those design goals.'
