- fmt: '### Saga Log


    The Saga log is a distributed log that’s used to persist every transaction/operation
    during the execution of a given Saga. At a high level, the Saga log contains various
    state-changing operations, such as `Begin Saga`, `End Saga`, `Abort Saga`, `Begin
    T-i`, `End T-i`, `Begin C-i`, and `End C-i`.


    The Saga log is often implemented using a distributed log and systems such as
    Kafka are commonly used for the implementation.


    ### Saga Execution Coordinator (SEC)


    The SEC is the main component that orchestrates the entire logic and is responsible
    for the execution of the Saga. All the steps in a given Saga are recorded in the
    Saga log and the SEC writes and interprets the records of the Saga log. It also
    executes the sub-transactions/operations (e.g., invoke the hotel service and make
    a reservation) and the corresponding compensating transactions when necessary.
    While the steps related to the Saga are recorded in the Saga log, the orchestration
    logic (which can be represented as a directed acyclic graph) is part of the SEC
    process (orchestration can be built using your own custom logic or can be built
    on top of a standard, such as BPMN).


    It is very important to understand that, unlike the coordinator in 2PC, SEC is
    not a special process that has central control of the entire execution. It certainly
    operates as a centralized runtime, but the runtime is dumb and the execution logic
    is kept in the distributed Saga log. However, it is required to make sure that
    SEC is up and running all the time. In the event of an SEC failure, a new SEC
    process should be started based on the same distributed Saga log.


    Since now you have a good understanding of the SEC and the Saga log, let’s dive
    into the execution of a distributed Saga.


    ### Executing a Distributed Saga


    A distributed Saga is a Directed Acyclic Graph (DAG) and the SEC’s primary task
    is to execute that DAG. Suppose that, in our travel-booking scenario (see Figure
    [5-15](#461146_1_En_5_Chapter.xhtml#Fig15)), we have the SEC built into the travel
    agent service.


    The SEC can start processing the Saga, which is recorded in the distributed log.


    ![../images/461146_1_En_5_Chapter/461146_1_En_5_Fig15_HTML.jpg](images/461146_1_En_5_Chapter/461146_1_En_5_Fig15_HTML.jpg)


    Figure 5-15


    Execution steps of a successful Saga


    Once the travel agent service gets a travel-booking request, SEC initiates a Saga
    by writing to the Saga log with a `Start Saga` instruction along with any other
    metadata required to process the Saga. Once the record is durably committed into
    the log, SEC can move into the next instruction.


    Then, based on the DAG of the Saga, SEC can pick one of the airline, hotel, or
    car rental transactions (given that all three can work in parallel). Suppose that
    airline transactions are executed first. In that case, the SEC logs a `Start Airline`
    message to the Saga log. Then, the SEC executes the book flight operation.


    Once the SEC receives the response from the airline service, it commits the `End
    Airline` message along with the response from the airline service, which we may
    need during the latter part of the Saga.


    Similarly, the same set of steps continues until we have successfully executed
    all three operations on the airline, hotel, and car rental services.


    Finally, since we have completed everything successfully, SEC commits the `End
    Saga` message into the Saga log. This is a successful Saga execution.


    Now let’s look at a Saga in a failure scenario. In Figure [5-16](#461146_1_En_5_Chapter.xhtml#Fig16),
    we have the same set of steps that we discussed earlier, but in this case, the
    car rental process fails (imagine there are no cars available on the specified
    dates, for example).


    ![../images/461146_1_En_5_Chapter/461146_1_En_5_Fig16_HTML.jpg](images/461146_1_En_5_Chapter/461146_1_En_5_Fig16_HTML.jpg)


    Figure 5-16


    Execution steps of an unsuccessful Saga


    Since we have detected a failure of a particular sub-transaction (i.e., the car
    reservation), we need to roll back all the other sub-transaction we made so far.
    So, in the Saga log you can find the `Start Car Rental` log and now the car reservation
    has failed. Now we have to walk through the inverted DAG of Saga that we executed
    so far and commit the rollback.


    When the car rental service returns an error for the car reservation, the SEC
    commits the `Abort Car Rental` message to the Saga log.


    Since this is a failure, the SEC has to initiate the rollback operations for the
    current Saga. The SEC can roll back the sub-transactions that are completed so
    far by inverting the DAG of this Saga and processing the Saga log backward.


    So, the SEC looks for any records with car, hotel, and airline in the Saga log
    and it finds the records on the hotel and airline sub-transactions. The SEC will
    execute the compensating transactions for the hotel and airline. It can use the
    stored information on Saga logs, such as the reservation number, to execute the
    compensation transactions.


    After a successful execution of the compensating transaction, the SEC commits
    the `[Comp] Airline` and `[Comp] Hotel` messages into the Saga log.


    Finally, the SEC can commit the Saga completion into the Saga log.


    SEC failures are relatively easier to handle, as we can recreate the DAG and the
    state by processing the Saga log. Also, in order for the Saga to function as expected,
    the sub-transaction should be sent at most once and the compensating transactions
    are sent at least once (idempotent).


    It’s also important to keep in mind that at any given point in time, the system
    may not be in full consistent state, but with time it will come to a consistent
    state (eventual consistency). We execute the sub-transactions and complete them
    as we walk through the Saga DAG. But when we come across an issue, we roll back
    the transaction. In the example of an unsuccessful Saga, we booked the airline
    and hotel, and then later we cancelled both bookings.


    ### Note


    The core concepts of the Saga pattern are intended to achieve eventual consistency.


    The Saga pattern is not just for database transactions. The Saga concept is widely
    used in practice with solutions such as workflow, payment processing, financial
    systems, etc. Also, the Saga pattern is good for any use case that requires approval
    and human interaction.


    The Saga pattern for microservices is supported in most workflow solutions that
    can operate in a microservices environment. In Chapter [7](#461146_1_En_7_Chapter.xhtml),
    “Integrating Microservices,” we explore how such workflow and business processes
    are used in the context of a microservices architecture.


    ## Polyglot Persistence


    With decentralized data management, you can take advantage of using the most appropriate
    persistent technique for your use case. Based on your use case, one microservice
    can use a SQL database, while another service can leverage a NoSQL database.


    For example, a microservices of a social media app may use a relational/SQL database
    to store its user information, while multimedia storage is based on a NoSQL database.'
