- fmt: '# Container Orchestration


    Containers and Docker took most of the pain out of working on microservices. If
    not for Docker, microservices wouldn’t be popular today. Then again, containers
    only solve one part of the problem in a large-scale microservices deployment.
    How about managing the lifecycle of a container from the point it is born to the
    point it is terminated? How about scheduling containers to run on different physical
    machines in a network, tracking their running status, and load balancing between
    multiple containers of a given cluster? How about autoscaling containers to meet
    varying requests or the load on the containers? These are the issues addressed
    in a container orchestration framework. `Kubernetes` and `Apache Mesos` are the
    most popular container orchestration frameworks. In this chapter, we only focus
    on `Kubernetes`.


    ## Introduction to Kubernetes


    In short, `Docker` abstracts the machine (or the computer), while `Kubernetes`
    abstracts the network. Google introduced `Kubernetes` to the public in 2014 as
    an open source project. Before `Kubernetes`, for many years, Google worked on
    a project called `Borg`, to help their internal developers and system administrators
    manage thousands of applications/services deployed over large datacenters. `Kubernetes`
    is the next phase of `Borg`.


    `Kubernetes` lets you deploy and scale an application of any type, running on
    a container, to thousands of nodes effortlessly. For example, in a deployment
    descriptor (which is understood by `Kubernetes`), you can specify how many instances
    of the `Order Processing` microservice you need to have.


    ### Kubernetes Architecture


    Just like in `Docker`, `Kubernetes` too follows a client-server based architecture.
    There is one `Kubernetes` master node and a set of worker nodes connected to it.
    The master node is also known as the `Kubernetes` control plane, which controls
    the complete `Kubernetes` cluster. There are four main components in a `Kubernetes`
    control plane: the API server, scheduler, controller manager, and `etcd`. The
    API server exposes a set of APIs to all the worker nodes and also to the other
    components in the control plane itself. The scheduler assigns a worker node to
    each deployment unit of your application. The applications are actually running
    on a worker node.


    ![../images/461146_1_En_8_Chapter/461146_1_En_8_Fig5_HTML.jpg](images/461146_1_En_8_Chapter/461146_1_En_8_Fig5_HTML.jpg)


    Figure 8-5


    High-level Kubernetes architecture (a Kubernetes cluster)


    The controller manager is responsible for managing and tracking all the nodes
    in the `Kubernetes` deployment. It makes sure components are replicated properly
    and autoscaled, the failures are handled gracefully, as well as performs many
    other tasks. The `etcd` is a highly available, consistent datastore, which stores
    the `Kubernetes` cluster configuration.


    A worker node consists of three components—a `kubelet`, a container runtime, and
    a `kube-proxy`. The container runtime can be based on `Docker` or `rkt`. Even
    though the `Kubernetes` container runtime was initially tied to `Docker` and `rkt`,
    it can now be extended to support any Open Container Initiative (OCI)-based container
    runtimes via the Container Runtime Interface (CRI). The responsibility of the
    `kubelet` is to manage the node by communicating with the API server running on
    the master node. It is running on each worker node and acts as a node agent to
    the master node. `Kube-proxy` or the `Kubernetes` network proxy does simple TCP
    and UDP stream forwarding or round-robin TCP and UDP forwarding across a set of
    backends.


    ### Installing Kubectl


    The `Kubernetes` master node can run anywhere. To interact with the master node,
    we need to have `kubectl` installed locally in our machine. The `kubectl` installation
    instructions are available at [`https://kubernetes.io/docs/tasks/tools/install-kubectl/`](https://kubernetes.io/docs/tasks/tools/install-kubectl/).
    Make sure that the version of `kubectl` is within one minor version difference
    of your cluster.


    ### Installing Minikube


    `Minikube` is the best way to get started with `Kubernetes` in your local machine.
    Unlike a production `Kubernetes` cluster, `Minikube` only supports one-node `Kubernetes`
    cluster. In this chapter, we use `Minikube` to set up a `Kubernetes` cluster.
    `Minikube` installation details are available at [`https://kubernetes.io/docs/tasks/tools/install-minikube/`](https://kubernetes.io/docs/tasks/tools/install-minikube/).
    You will never use `Minikube` in a production environment, but the `Kubernetes`
    concepts that you learn with `Minikube` are still valid across any type of a `Kubernetes`
    distribution.


    ### Test the Kubernetes Setup


    Once you have installed both the `kubectl` and `Minikube` in your local machine,
    we need to start the `Minikube` server with the following command.


    ```

    :\> minikube start

    minikube config set WantUpdateNotification false

    Starting local Kubernetes v1.9.0 cluster...

    Starting VM...

    Getting VM IP address...

    Moving files into cluster...

    Setting up certs...

    Connecting to cluster...

    Setting up kubeconfig...

    Starting cluster components...

    Kubectl is now configured to use the cluster.

    Loading cached images from config file.

    ```


    Once `Minikube` starts, run the following command to verify the communication
    between `kubectl` and the `Kubernetes` cluster. This prints the version of both
    the `kubectl` client and the `Kubernetes` cluster.


    ```

    :\> kubectl version

    Client Version: version.Info{Major:"1", Minor:"11", GitVersion:"v1.11.0", GitCommit:"91e7b4fd31fcd3d5f436da26c980becec37ceefe",
    GitTreeState:"clean", BuildDate:"2018-06-27T22:30:22Z", GoVersion:"go1.10.3",
    Compiler:"gc", Platform:"darwin/amd64"}

    Server Version: version.Info{Major:"", Minor:"", GitVersion:"v1.9.0", GitCommit:"925c127ec6b946659ad0fd596fa959be43f0cc05",
    GitTreeState:"clean", BuildDate:"2018-01-26T19:04:38Z", GoVersion:"go1.9.1", Compiler:"gc",
    Platform:"linux/amd64"}

    ```


    Also, with the following command, we can determine where the `Kubernetes` cluster
    is running.


    ```

    :\> kubectl cluster-info

    Kubernetes master is running at https://192.168.99.100:8443

    ```


    Now we can use following command to see all the nodes in our `Kubernetes` cluster.
    Since we are running `Minikube`, you will only find one node.


    ```

    :\> kubectl get nodes

    NAME       STATUS    ROLES     AGE       VERSION

    minikube   Ready         24d       v1.9.0

    ```


    To find more details about a given node, use the following command. This will
    return a whole lot of metadata related to the node.


    ```

    :\> kubectl describe nodes minikube

    ```


    ## Kubernetes Core Concepts


    In this section, we discuss fundamental concepts associated with `Kubernetes`.
    Before we get there, let’s look at how `Kubernetes` works with containers.


    The first thing we need to do prior to a `Kubernetes` deployment is to identify
    and package our applications into container images, where at runtime, each application
    will have its own isolated container. Then we need to identify how we are going
    to group these containers. For example, there can be microservices that run always
    together, and only one microservice exposes the functionality to the outsiders.
    In all the other cases, communication between microservices is just internal.
    Another example is a database we have as a container, which is only used by one
    microservice. In that case, we can group the database container and the corresponding
    microservice together. Well, someone of course can argue this as an anti-pattern.
    We do not disagree. Let’s revisit our example, after defining the term pod, within
    the context of `Kubernetes`.'
