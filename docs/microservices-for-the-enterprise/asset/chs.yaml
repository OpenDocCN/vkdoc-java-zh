  ### Spring Boot Actuator


  收集运行中微服务的遥测数据极其重要。这在第 13 章中有详细讨论。在本节中，我们将探讨 Spring Boot 通过 `actuator` 端点^(⁷⁸) 开箱即用提供的一些监控功能。`actuator`
  端点背后运行着多个服务，其中大部分默认是启用的。正如上一节所讨论的，我们只需要添加对 `spring-boot-starter-actuator` 的依赖即可启用它。让我们保持上一示例中的
  Spring Boot 应用程序运行，并执行一组 cURL 命令。


  以下 cURL 命令对 `actuator/health` 端点执行 `GET` 请求，返回服务器状态。


  ```

  \> curl http://localhost:8080/actuator/health

  {"status":"UP"}

  ```


  Spring Boot 通过 HTTP 和 JMX 暴露遥测数据。出于安全原因，并非所有数据都通过 HTTP 暴露，只有 `health` 和 `info` 服务。我们可以自行承担风险，看看如何通过
  HTTP 启用 `httptrace` 端点。您需要将以下内容添加到 `src/main/resources/application.properties` 文件中，并重新启动
  Spring Boot 应用程序。


  ```

  management.endpoints.web.exposure.include = health,info,httptrace

  ```


