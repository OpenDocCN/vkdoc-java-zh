  现在，取消注释 `sample04/src/main/java/com/apress/ch12/sample04/config/SecurityConfig.java`
  文件中的 `@Configuration` 类级别注解。默认情况下它保持注释状态，这样 Spring Boot 就不会加载该类中覆盖的配置，我们可以尝试非安全场景。在同一个类中，以下代码片段向系统引入了一个名为
  `admin` 且具有 `ACTUATOR` 角色的用户。当 Actuator 端点受到保护时，只有 `ACTUATOR` 角色中的用户才能调用这些端点。


  ```

  @Override

  public void configure(AuthenticationManagerBuilder auth) throws Exception {

  auth.inMemoryAuthentication().withUser("admin")

  .password("admin").roles("ACTUATOR");

  }

  ```


  现在重启服务，并使用 `admin/admin` 凭据尝试相同的 cURL 命令。


  ```

  \> curl –k --basic -u admin:admin  https://localhost:8443/health

  {"status":"UP"}

  ```


  ## 总结


  在第 11 章中，我们讨论了与保护微服务相关的常见模式和基础知识。本章重点介绍了如何使用 Spring Boot 开发的微服务来构建这些模式。在下一章中，我们将讨论可观测性在微服务部署中的作用。




  '
- '# 13. 可观测性


  收集数据的成本很低，但在需要时没有数据，代价可能非常高昂。2016 年 3 月，亚马逊宕机 20 分钟，预估收入损失达 375 万美元。同样在 2017 年 1
  月，达美航空发生系统故障，导致超过 170 个航班取消，预估损失达 850 万美元。在这两个案例中，如果我们收集了适当级别的数据，本可以预测此类行为，或者在问题发生后通过识别根本原因迅速恢复。我们拥有的信息越多，就能做出更好的决策。


  可观测性是指通过系统外部输出推断其内部状态的能力的度量^(¹⁵⁹)。这是最重要的方面之一，需要融入到任何微服务设计中。我们需要追踪每个微服务的吞吐量、成功/失败请求数、CPU、内存及其他网络资源的利用率，以及一些与业务相关的指标。在本章中，我们将讨论可观测性的必要性，日志、指标和追踪在可观测性中的作用，如何使用
  Spring Cloud Sleuth、Zipkin 和 Jaeger 构建分布式追踪系统，以及可视化、监控和告警如何与 Prometheus 和 Grafana
  协同工作。


  ## 可观测性的三大支柱


  可观测性可以通过三种方式实现：*日志*、*指标*和*追踪*，它们也被称为可观测性的三大支柱。日志是关于记录事件。它可以是任何内容。每个经过微服务的事务都可以连同其他相关元数据一起记录，包括时间戳、状态（成功/失败）、发起者等。结合来自测量事件的数据可以推导出指标。例如，单位时间内处理的事务数和事务成功率/失败率就是关于微服务的指标。指标是衡量服务运行状况（好或坏）的指示。另一个例子是延迟。日志会捕获到达微服务的每个请求的时间戳以及相应的响应时间戳。这两个时间戳之间的差值就是给定请求的延迟。通过考虑一段时间内所有此类时间差，可以得出给定服务的平均延迟，这就是一个指标。在这里，延迟作为一个指标，帮助我们判断微服务是慢还是快。此外，当我们想要设置告警时，我们总是选择指标。如果我们希望在系统开始比预期慢时收到告警，我们可能可以设置一个关于延迟的告警。当平均延迟低于预设阈值时，系统将触发告警。总之，指标帮助我们识别趋势。


  追踪也源自日志。它是对系统行为的一种不同视角，考虑了每个事件的顺序以及事件之间的相互影响。例如，追踪可以通过回溯到`订单处理`微服务，帮助你找到发往`计费`微服务的请求失败的根本原因。它并不总是需要跨越不同的系统；也可以只在一个系统内部。例如，如果下单需要
  90 毫秒，追踪应该向我们展示延迟具体发生在哪里，以及不同组件如何导致延迟。


  ## 使用 Spring Cloud Sleuth 进行分布式追踪


  分布式追踪有助于追踪跨越多个微服务的特定请求。由于微服务的特性，在大多数情况下，为了处理来自客户端的单个请求，会用到不止一个微服务。图 13-1 展示了在下单的单个请求过程中可能发生的微服务之间的所有交互。有些请求是直接的服务间调用，而另一些则是基于消息系统的异步调用。无论服务间通信如何发生，分布式追踪都提供了一种追踪请求的方法，该请求会跨越构建客户端响应所需的所有微服务。


  分布式追踪不仅为微服务增加价值，也为任何分布式系统增加价值。每当请求在网络中经过不同的组件（例如 API 网关、企业服务总线）时，你需要有能力跨所有系统追踪它。这有助于你识别和隔离与延迟、消息丢失、吞吐量等相关的问题。


  ![../images/461146_1_En_13_Chapter/461146_1_En_13_Fig1_HTML.jpg](img/461146_1_En_13_Fig1_HTML.jpg)


  图 13-1


  微服务之间的通信


  ### Spring Cloud Sleuth


  Spring Cloud Sleuth 为 Spring 微服务实现了一个分布式追踪解决方案^(¹⁶⁰)。Sleuth 借鉴了 Dapper^(¹⁶¹) 的许多概念和术语，Dapper
  是谷歌的生产级分布式系统追踪基础设施。Sleuth 中的基本工作单元称为一个*跨度*。跨度表示通信网络中两点之间执行的工作。例如，`订单处理`微服务（见图 13-1）从客户端接收订单并处理订单。然后它同步地与`库存`微服务通信，一旦收到响应，就将`ORDER_PROCESSING_COMPLETED`事件发布到消息系统。图
  13-2 展示了在完整通信网络中不同点之间如何识别跨度。一旦相应的请求到达`订单处理`微服务，跨度就会获得其初始值。实际上，跨度的值是一个 64 位标识符（尽管我们在图
  13-2 中使用字母来表示跨度）。在`订单处理`微服务内部记录的任何消息都将携带跨度 ID A。从`订单处理`微服务发送并由`库存`微服务接收的请求将携带跨度
  ID B，而当请求在`库存`微服务内部时，它将持有跨度 ID C。


  ![../images/461146_1_En_13_Chapter/461146_1_En_13_Fig2_HTML.jpg](img/461146_1_En_13_Fig2_HTML.jpg)


  图 13-2


  分布式追踪


  每个跨度都有一个父跨度。例如，跨度 B 的父跨度是跨度 A，而跨度 A 的父跨度是 null。类似地，跨度 A 也是跨度 E 的父跨度。图 13-3 按父子关系排列跨度。一组形成树状结构的跨度被称为一个*追踪*。对于给定的请求，追踪的值在所有跨度中保持不变。根据图
  13-2，追踪的值是 A，并且它在所有跨度中携带相同的值。追踪 ID 有助于关联微服务之间的消息。一旦来自不同微服务的所有日志都被发布到集中式追踪系统中，给定追踪
  ID，我们就可以跨不同系统追踪消息。


  ![../images/461146_1_En_13_Chapter/461146_1_En_13_Fig3_HTML.jpg](img/461146_1_En_13_Fig3_HTML.jpg)


  图 13-3


  一组形成树状结构的跨度


  让我们动手实践吧！让我们看看如何使用 Spring Cloud Sleuth 通过一组示例 Spring 微服务进行分布式追踪。


  ### 注意


  要运行本章中的示例，你需要 Java 8 或更高版本、Maven 3.2 或更高版本以及一个 Git 客户端。成功安装这些工具后，你需要克隆 Git 仓库：[`https://github.com/microservices-for-enterprise/samples.git`](https://github.com/microservices-for-enterprise/samples.git)。本章的示例位于
  `ch13` 目录中。


  `:\> git clone` [`github.com/microservices-for-enterprise/samples.git`](https://github.com/microservices-for-enterprise/samples.git)




  ### 将 Spring Cloud Sleuth 与 Spring Boot 微服务集成


  将 Sleuth 与 Spring Boot 集成非常简单。从 Git 仓库下载所有示例后，你可以在 `ch13/sample01` 目录中找到与本示例相关的源代码。


  ### 注意


  本书不打算对 Spring Cloud Sleuth 进行全面介绍，建议需要详细了解的读者参考 Sleuth 文档，地址为：[`https://cloud.spring.io/spring-cloud-sleuth/single/spring-cloud-sleuth.html`](https://cloud.spring.io/spring-cloud-sleuth/single/spring-cloud-sleuth.html)。


  让我们看看添加到 `ch13/sample01/pom.xml` 文件中的一些值得注意的 Maven 依赖项。`spring-cloud-starter-sleuth`
  依赖项引入了所有与 Sleuth 相关的依赖。一旦集成到 Maven 项目中，Sleuth 的跨度（Span）和跟踪（Trace）信息将自动添加到所有日志中。Sleuth
  会拦截发送到特定微服务的所有 HTTP 请求，并检查所有消息以查看是否已有跟踪信息。如果有，则会提取这些信息并将其提供给相应的微服务。此外，Sleuth 还会将跟踪信息注入到
  Spring 映射诊断上下文（MDC）中，这样微服务生成的日志将自动包含跟踪数据。当 HTTP 请求从微服务发出时，Sleuth 会再次将跟踪信息注入到出站请求或响应中。


  ```

  org.springframework.cloud

  spring-cloud-starter-sleuth

  2.0.0.RC1


  ```


  让我们看看源代码（`ch13/sample01/src/main/java/com/apress/ch13/sample01/service/OrderProcessing.java`），它记录了与订单检索请求相关的数据。这里用于记录消息的日志记录
  API 与 Sleuth 无关——它只是 `slf4j`^(¹⁶²) API。


  ```

  import org.slf4j.Logger;

  import org.slf4j.LoggerFactory;

  @RequestMapping(value = "/{id}", method = RequestMethod.GET)

  public ResponseEntity getOrder(@PathVariable("id") String orderId) {

  logger.info("retrieving order:" + orderId);

  Item book1 = new Item("101", 1);

  Item book2 = new Item("103", 5);

  PaymentMethod myvisa = new PaymentMethod("VISA", "01/22", "John Doe",

  "201, 1st Street, San Jose, CA");

  Order order = new Order("101021", orderId, myvisa, new Item[] { book1,

  book2 },"201, 1st Street, San Jose, CA");

  return ResponseEntity.ok(order);

  }

  ```


  在运行代码之前，需要在 `ch13/sample01/src/main/resources/application.properties` 文件中配置几个重要的属性。


  ```

  spring.application.name=sample01

  spring.sleuth.sampler.percentage=0.1

  ```


  属性 `spring.application.name` 的值会作为服务名称，与跟踪 ID 和跨度 ID 一起添加到日志中。一旦 Sleuth 被集成，服务名称、跟踪
  ID、跨度 ID 以及一个指示日志是否已发布到 Zipkin 的标志位，都会被附加到日志中。在下面的示例中，`sample01` 是服务名称（从属性文件中获取），`d25a633196c01c19`（第一个）是跟踪
  ID，`d25a633196c01c19`（第二个）是跨度 ID，`false` 表示此日志未发布到 Zipkin。我们将在本章后面介绍 Zipkin，目前可以将其视为一个在微服务部署中捕获所有跟踪信息的服务器。


  ```

  INFO [sample01,d25a633196c01c19,d25a633196c01c19,false] 27437 --- [nio-9000-exec-2]
  c.a.c.sample01.service.OrderProcessing: retrieving order:11

  ```


  `application.properties` 文件中的 `spring.sleuth.sampler.percentage` 属性表示需要跟踪的请求百分比。默认设置为
  0.1，这意味着只有 10% 的请求会被发布到 Zipkin。通过将其设置为 1.0，所有请求都会被发布。


  现在，让我们看看如何运行 `Order Processing` 微服务，并使用以下 cURL 命令调用它（从 `ch13/sample01` 目录运行）。


  ```

  \> mvn clean install

  \> mvn spring-boot:run

  \> curl http://localhost:9000/order/11

  ```


  此 cURL 命令将打印订单详情，如果你查看运行 `Order Processing` 微服务的命令控制台，会发现以下日志，其中包含跟踪 ID、跨度 ID 以及其他元数据。


  ```

  INFO [sample01,d25a633196c01c19,d25a633196c01c19,false] 27437 --- [nio-9000-exec-2]
  c.a.c.sample01.service.OrderProcessing: retrieving order:11

  ```


  好吧，如果你觉得这个示例本身没什么用，我们并不感到惊讶。它除了记录日志之外什么也没做——完全没有跟踪。下一节将消除你的疑虑，并可能让你相信跟踪的价值。


