  ### Kubernetes 核心概念


  在本节中，我们将讨论与 Kubernetes 相关的基本概念。在此之前，我们先来看看 Kubernetes 是如何与容器协同工作的。


  在进行 Kubernetes 部署之前，我们需要做的第一件事是将应用程序识别并打包成容器镜像，这样在运行时，每个应用程序都将拥有自己独立的容器。然后，我们需要确定如何对这些容器进行分组。例如，有些微服务可能始终一起运行，并且只有一个微服务向外部暴露功能。在其他所有情况下，微服务之间的通信都是内部的。另一个例子是，我们有一个作为容器的数据库，它只被一个微服务使用。在这种情况下，我们可以将数据库容器和相应的微服务分组在一起。当然，有人可能会认为这是一种反模式。我们并不反对。让我们在
  Kubernetes 的上下文中定义了 Pod 这个术语之后，再来重新审视我们的例子。




  #### Pod


  在 Kubernetes 中，我们将一组容器称为一个 Pod。*Pod* 是 Kubernetes 中最小的部署单元。你不能直接部署容器。首先需要将一个或多个容器组合成一个
  Pod。由于 Pod 是 Kubernetes 中最小的部署单元，因此只能对 Pod 进行扩缩容，而不能对容器进行扩缩容。换句话说，组合成一个 Pod 的所有容器必须具有相同的扩缩容需求。回顾之前的例子，如果一组微服务具有相同的扩缩容需求，你可以将它们组合在一个
  Pod 中。但将微服务和数据库组合在一个 Pod 中并不是理想的用例。通常，数据库与微服务具有不同的扩缩容需求。


  Pod 的一个常见用例是让微服务自身带有一个 Sidecar 代理（见图 8-6）。在这里，所有进出微服务的请求都通过该代理。这种模型将在第 9 章“服务网格”中详细讨论。


  ![../images/461146_1_En_8_Chapter/461146_1_En_8_Fig6_HTML.png](img/461146_1_En_8_Fig6_HTML.png)


  图 8-6


  将一组服务组合成一个 Pod


  尽管一个 Pod 可以包含多个容器，但它们共享相同的网络接口和存储。Pod 内的容器可以使用 `localhost` 作为主机名相互通信，并且默认情况下，所有服务都不会暴露在
  Pod 外部。此外，由于同一 Pod 中的所有容器共享相同的网络接口，因此不能有两个容器在同一个端口上启动服务。在将 Pod 调度到工作节点时，Kubernetes
  会确保同一 Pod 中的所有容器被调度到同一台物理机器上运行（见图 8-7）。


  ![../images/461146_1_En_8_Chapter/461146_1_En_8_Fig7_HTML.jpg](img/461146_1_En_8_Fig7_HTML.jpg)


  图 8-7


  同一 Pod 中的容器被调度到同一台物理机器上运行


  #### 创建 Pod


  让我们看看下面的部署描述文件，它用于创建一个包含 `Order Processing` 微服务和 `Inventory` 微服务的 Pod。这里我们首先将 `kind`
  属性的值设置为 `Pod`，然后在 `spec` 属性下，定义需要组合到这个 Pod 中的镜像集合。


  ### 重要说明


  这里我们假设 `Order Processing` 和 `Inventory` 微服务都适合放在一个 Pod 中，并且它们具有相同的扩缩容需求。这仅仅是我们为了使示例更直接并解释概念而做出的假设。


  ```

  apiVersion: v1

  kind: Pod

  metadata:

  name: ecomm-pod

  labels:

  app: ecommapp

  spec:

  containers:

  - name: orderprocessing

  image: prabath/sample04

  ports:

  - containerPort : 9000

  - name: inventory

  image: prabath/sample02

  ports:

  - containerPort : 9090

  ```


  一旦应用程序开发人员编写好部署描述文件，他们就会通过 API 服务器使用 kubectl 将其输入到 Kubernetes 控制平面。然后调度器会将 Pod 调度到工作节点上，相应的容器运行时会从
  Docker 仓库拉取容器镜像。


  ### 注意


  在 Kubernetes 部署描述文件中，我们指向的是 `Order Processing` 微服务（与我们之前讨论的相比）的一个略微修改的版本，称为 `sample04`，而不是
  `sample01`。


  #### ReplicaSet


  当你在 Kubernetes 环境中部署一个 Pod 时，你可以指定希望始终保持运行的给定 Pod 的实例数量。可能还有许多其他的扩缩容需求，我们将在本章后面通过示例进行讨论。ReplicaSet^(¹¹⁰)
  负责监控正在运行的 Pod 数量，并确保维持预期的数量。如果某个 Pod 因故宕机，ReplicaSet 将确保启动一个新的 Pod。本章后面将解释 ReplicaSet
  的工作原理。


  #### Service


  从某种意义上说，Kubernetes 中的 Service^(¹¹¹) 是提供相同功能的一组 Pod。这些 Pod 实际上是同一个 Pod 的不同实例。例如，你可能运行同一个
  `Order Processing` 微服务的五个实例作为五个 Pod 来应对高流量。这些 Pod 通过一个 Service 暴露给外部世界。Service 拥有自己的
  IP 地址和端口，在其生命周期内不会改变，并且它知道如何将流量路由到所连接的 Pod。微服务的客户端应用程序无需担心直接与 Pod 通信，而是与 Service
  通信。同时，基于扩缩容需求或其他原因，Pod 可能会启动和关闭。每当 Pod 启动和关闭时，它可能会携带不同的 IP 地址，这使得客户端应用程序很难与 Pod
  建立连接。Kubernetes 中的 Service 解决了这个问题。本章后面有一个示例演示了如何在 Kubernetes 中创建 Service。


  #### Deployment


  Deployment^(¹¹²) 是一个更高级别的构造，可用于在 Kubernetes 环境中部署和管理应用程序。它使用 ReplicaSet（这是一个较低级别的构造）来创建
  Pod。我们将在本章后面讨论如何使用 Deployment 构造。


  图 8-8 说明了 Pod、Service、ReplicaSet 和 Deployment 之间的关系。


  ![../images/461146_1_En_8_Chapter/461146_1_En_8_Fig8_HTML.jpg](img/461146_1_En_8_Fig8_HTML.jpg)


  图 8-8


  Pod、Service、ReplicaSet 和 Deployment


  ### 在 Kubernetes 环境中部署微服务


  在本节中，我们将了解如何创建一个包含两个微服务的 Pod，并使用 cURL 从宿主机调用其中一个微服务，同时这两个微服务在同一个 Pod 内相互通信。


  #### 使用 YAML 文件创建 Pod


  我们需要做的第一件事是为我们的 Pod 编写一个部署描述文件。这与我们在上一节中讨论的 YAML 文件相同。在那里，我们创建了一个名为 `ecomm-pod`
  的 Pod，其中包含两个容器镜像：`prabath/sample04` 和 `prabath/sample02`。在本章前面，我们创建了这两个镜像并推送到了 Docker
  Hub（`sample04` 是 `sample01` 的一个略微修改的版本）。YAML 配置中的每个容器都定义了微服务运行的端口。例如，`Order Processing`
  微服务运行在 HTTP 端口 9000 上，而 `Inventory` 微服务运行在 HTTP 端口 9090 上。你可以在 `ch08/sample03` 目录中找到完整的
  YAML 文件（`ecomm-pod.yml`）。要使用此 YAML 配置创建 Pod，请从 `ch08/sample03` 目录运行以下命令。


  ```

  :\> kubectl create -f ecomm-pod.yml

  pod/ecomm-pod created

  ```


  如果 Pod 创建成功，以下命令应返回 Pod 的状态。


  ```

  :\> kubectl get pods

  NAME        READY     STATUS    RESTARTS   AGE

  ecomm-pod   2/2       Running   0          1m

  ```


  第一次运行时，状态更新为 `Running` 可能需要一些时间，因为工作节点的容器环境需要从 Docker Hub 拉取容器镜像。`Ready` 列下的值 2/2
  表示此 Pod 中的两个容器都已准备好接受请求。要查找有关此 Pod 的更多详细信息，我们可以使用以下命令。这将再次返回关于给定 Pod 的大量有用信息。图 8-9
  显示了输出的一部分，其中列出了启动 Pod 时生成的所有事件。


  ![../images/461146_1_En_8_Chapter/461146_1_En_8_Fig9_HTML.jpg](img/461146_1_En_8_Fig9_HTML.jpg)


  图 8-9


  启动 ecomm-pod 时的事件


  ```

  :\> kubectl describe pod ecomm-pod

  ```


  如果你想删除一个 Pod，请使用以下命令。


  ```

  :\> kubectl delete -f ecomm-pod.yml

  ```




  #### 使用 YAML 文件创建服务


  尽管我们已经运行了一个 Pod，但其中运行的微服务在 Pod 外部是无法访问的。要将微服务暴露到 Pod 外部，我们需要创建一个服务。同样，要定义一个服务，我们需要一个服务描述文件，即一个
  YAML 文件，如下所示。完整的 YAML 文件（`ecomm-service.yml`）位于 `ch08/sample03` 目录中。


  ```

  apiVersion: v1

  kind: Service

  metadata:

  name: ecomm-service

  spec:

  selector:

  app: ecommapp

  ports:

  - port: 80

  targetPort: 9000

  type: NodePort

  ```


  这里可以看到 `kind` 属性的值被设置为 `Service`，并且在 `selector/app` 属性下，其值被设置为我们之前创建的 `ecomm-pod`
  的 `label`。此服务通过 HTTP 端口 80 暴露给外部世界，发往该端口的流量将被路由到端口 9000（`targetPort`），即“订单处理”微服务的端口。最后，另一个我们不能忽略的重要属性是
  `type`，其值被设置为 `NodePort`。当服务类型的值设置为 `NodePort` 时，它会在每个节点的 IP 上通过一个静态端口暴露该服务。


  让我们从 `ch08/sample03` 目录运行以下命令来创建服务。


  ```

  :\> kubectl create -f ecomm-service.yml

  service/ecomm-service created

  ```


  如果服务创建成功，以下命令应返回服务的状态。在那里你可以看到服务的端口 80 被映射到了 Kubernetes 主节点的端口 32179。


  ```

  :\> kubectl get svc

  NAME            TYPE        CLUSTER-IP      EXTERNAL-IP   PORT(S)

  ecomm-service   NodePort    10.97.200.207           80:32179/TCP

  kubernetes      ClusterIP   10.96.0.1               443/TCP

  ```


  如果你想删除一个服务，请使用以下命令。这只会移除服务，而不会删除对应的 Pod。


  ```

  :\> kubectl delete -f ecomm-service.yml

  ```


  #### 使用 cURL 测试 Pod


  现在让我们从宿主机调用“订单处理”服务。这里我们使用 Kubernetes 集群主节点的 IP 地址（你可以通过 `kubectl cluster-info`
  命令获取）。


  ```

  :\> curl http://192.168.99.100:32179/order/11

  {"customer_id":"101021","order_id":"11","payment_method":{"card_type":"VISA","expiration":"01/22","name":"John
  Doe","billing_address":"201, 1st Street, San Jose, CA"},"items":[{"code":"101","qty":1},{"code":"103","qty":5}],"shipping_address":"201,
  1st Street, San Jose, CA"}

  ```


  这个请求仅访问了“订单处理”微服务，并未验证两个微服务之间的通信。让我们使用以下请求通过“订单处理”微服务创建一个订单，该请求随后也会更新“库存”微服务。


  ```

  curl -v -H "Content-Type: application/json" -d ''{"customer_id":"101021","payment_method":{"card_type":"VISA","expiration":"01/22","name":"John
  Doe","billing_address":"201, 1st Street, San Jose, CA"},"items":[{"code":"101","qty":1},{"code":"103","qty":5}],"shipping_address":"201,
  1st Street, San Jose, CA"}''  http://192.168.99.100:32179/order

  ```


  我们可以通过查看其日志来确认我们的请求是否访问了“库存”微服务。以下命令有助于从运行在 Pod 中的容器获取日志。这里，`ecomm-pod` 是 Pod 的名称，`inventory`
  是容器名称（如 Pod 部署描述符 YAML 文件中定义的那样）。“库存”微服务的日志会打印出我们订单请求中的商品代码。


  ```

  :\> kubectl logs ecomm-pod -c inventory


  ```


  #### 同一 Pod 内的容器之间如何进行通信？


  在一个 Pod 内部，微服务之间的通信可以通过多种方式进行。在此示例中，“订单处理”微服务使用 `localhost` 作为主机名与“库存”微服务通信，如下方位于
  `ch08/sample04/ src/main/java/com/apress/ch08/sample04/service/OrderProcessing.java`
  的代码库所示。在那里你可以看到，我们使用的是 *localhost*（`http://`*localhost*`:9090/inventory`），而不是 IP
  地址或主机名。


  ```

  @RequestMapping(method = RequestMethod.POST)

  public ResponseEntity createOrder(@RequestBody Order order) {

  if (order != null) {

  RestTemplate restTemplate = new RestTemplate();

  URI uri = URI.create(

  "http://inventory:9090/inventory");

  restTemplate.put(uri, order.getItems());

  order.setOrderId(UUID.randomUUID().toString());

  URI location = ServletUriComponentsBuilder

  .fromCurrentRequest().path("/{id}")

  .buildAndExpand(order.getOrderId())

  .toUri();

  return ResponseEntity.created(location).build();

  }

  return ResponseEntity.status(

  HttpStatus.BAD_REQUEST).build();

  }

  ```


  除了通过 localhost 使用 HTTP 之外，在单个 Pod 内进行容器间通信还有两种其他流行选项：使用共享卷和使用进程间通信（IPC）。我们建议感兴趣的读者参考
  Kubernetes 文档^(¹¹³)中关于这些主题的内容。


  #### 不同 Pod 中的容器之间如何进行通信？


  不同 Pod 中的容器通过 Pod IP 地址和相应的端口相互通信。在 Kubernetes 集群中，每个 Pod 都有自己独特的 IP 地址。




  #### 部署与副本集


  尽管我们之前讨论了如何使用部署描述文件创建 Pod，但在实际工作中你永远不会这样使用。你会改用部署（Deployment）。**部署**是 Kubernetes
  中的一种对象类型（就像 Pod 一样），它帮助我们通过副本集（ReplicaSet）来管理 Pod。**副本集**是 Kubernetes 集群中的一个核心组件，你可以通过它指定如何对某个
  Pod 进行扩缩容。在创建部署之前，我们先清理一下环境，删除之前创建的 Pod 和对应的服务。


  以下命令首先删除服务，然后删除 Pod。你需要从 `ch08/sample03` 目录下运行这些命令。


  ```

  :\> kubectl delete -f ecomm-service.yml

  :\> kubectl delete -f ecomm-pod.yml

  ```


  现在，要创建一个部署，我们需要在部署描述文件（一个 YAML 文件）中定义我们的需求。完整的 YAML 文件（`ecomm-deployment.yml`）位于
  `ch08/sample03` 目录下。在这里你可以看到，`kind` 属性的值被设置为 `Deployment`。`spec/replicas` 的值被设置为
  `3`，这意味着该部署将创建三个在 `template` 下定义的 Pod 实例。就像我们之前使用的 Pod 部署描述文件一样，这里我们也定义了构成该部署下 Pod
  的容器镜像。


  ```

  apiVersion: apps/v1beta1

  kind: Deployment

  metadata:

  name: ecomm-deployment

  spec:

  replicas: 3

  template:

  metadata:

  labels:

  app: ecomm-deployment

  spec:

  containers:

  - name: orderprocessing

  image: prabath/sample04

  ports:

  - containerPort : 9000

  - name: inventory

  image: prabath/sample02

  ports:

  - containerPort : 9090

  ```


  让我们在 `ch08/sample03` 目录下使用以下命令来创建一个部署。


  ```

  :\> kubectl create -f ecomm-deployment.yml

  deployment.apps/ecomm-deployment created

  ```


  如果部署创建成功，以下命令应返回其状态。输出显示，在相应部署下定义的 Pod 的三个副本已创建并准备就绪。


  ```

  :\> kubectl get deployments

  NAME               DESIRED   CURRENT   UP-TO-DATE   AVAILABLE   AGE

  ecomm-deployment   3         3         3            3           23m

  ```


  以下命令显示此部署创建的所有 Pod。


  ```

  :\> kubectl get pods

  NAME                                READY  STATUS    RESTARTS AGE

  ecomm-deployment-546f8c4d6b-67ttd   2/2    Running   1        24m

  ecomm-deployment-546f8c4d6b-hldnf   2/2    Running   0        24m

  ecomm-deployment-546f8c4d6b-m9vmt   2/2    Running   0        24m

  ```


  现在我们需要创建一个指向此部署的服务，以便 Pod 中运行的服务可以从外部访问。这里我们使用位于 `ch08/sample03` 目录下的 `ecomm-dep-service.yml`
  来创建服务。与之前情况的唯一区别在于 `spec/select/app` 的值，现在它指向部署的 `labels/app`。


  ```

  apiVersion: v1

  kind: Service

  metadata:

  name: ecomm-service

  spec:

  selector:

  app: ecomm-deployment

  ports:

  - port: 80

  targetPort: 9000

  type: NodePort

  ```


  让我们在 `ch08/sample03` 目录下使用以下命令来创建服务。


  ```

  :\> kubectl create -f ecomm-dep-service.yml

  service/ecomm-service created

  ```


  如果服务创建成功，以下命令应返回服务的状态。你可以看到，服务的 80 端口被映射到了 Kubernetes 主节点的 31763 端口。


  ```

  :\> kubectl get svc

  NAME           TYPE       CLUSTER-IP     EXTERNAL-IP  PORT(S)

  ecomm-service  NodePort   10.111.102.84         80:31763/TCP

  kubernetes     ClusterIP  10.96.0.1             443/TCP

  ```


  现在让我们从宿主机调用 `Order Processing` 服务。


  ```

  :\> curl http://192.168.99.100:31763/order/11

  {"customer_id":"101021","order_id":"11","payment_method":{"card_type":"VISA","expiration":"01/22","name":"John
  Doe","billing_address":"201, 1st Street, San Jose, CA"},"items":[{"code":"101","qty":1},{"code":"103","qty":5}],"shipping_address":"201,
  1st Street, San Jose, CA"}

  ```


  #### 扩缩部署


  在上一节中，我们以三个副本（即部署描述文件下定义的 Pod 的三个实例）启动了部署。以下命令展示了如何将副本数扩展到五个。这里，`deployment.extensions/ecomm-deployment`
  是我们的部署名称。


  ```

  :\> kubectl scale --replicas=5 deployment.extensions/ecomm-deployment

  deployment.extensions/ecomm-deployment scaled

  ```


  在此命令之后立即运行以下命令，你会发现创建了两个新的 Pod。


  ```

  :\> kubectl get pods

  NAME                               READY   STATUS             RESTARTS

  ecomm-deployment-546f8c4d6b-67ttd  2/2     Running            1

  ecomm-deployment-546f8c4d6b-hldnf  2/2     Running            0

  ecomm-deployment-546f8c4d6b-hsqnp  0/2     ContainerCreating  0

  ecomm-deployment-546f8c4d6b-m9vmt  2/2     Running            0

  ecomm-deployment-546f8c4d6b-vt624  0/2     ContainerCreating  0

  ```


  几秒钟后再次运行同样的命令，你会发现所有 Pod 都已成功创建。


  ```

  NAME                               READY   STATUS             RESTARTS

  ecomm-deployment-546f8c4d6b-67ttd  2/2     Running            1

  ecomm-deployment-546f8c4d6b-hldnf  2/2     Running            0

  ecomm-deployment-546f8c4d6b-hsqnp  0/2     Running            0

  ecomm-deployment-546f8c4d6b-m9vmt  2/2     Running            0

  ecomm-deployment-546f8c4d6b-vt624  0/2     Running            0

  ```


  #### 自动扩缩部署


  Kubernetes 还允许你根据特定参数自动扩缩部署。例如，以下命令设置 `ecomm-deployment` 根据平均 CPU 利用率进行自动扩缩。如果所有
  Pod 的平均 CPU 利用率超过 50%，则系统应开始扩展到最多 10 个副本。同时，如果 CPU 利用率低于 50%，系统应缩减到 1 个副本。


  ```

  :\> kubectl autoscale deployment ecomm-deployment --cpu-percent=50 --min=1 --max=10

  horizontalpodautoscaler.autoscaling/ecomm-deployment autoscaled

  ```


  #### Helm：Kubernetes 的包管理


  Helm^(¹¹⁴) 是 Kubernetes 的包管理器，它使得将 Kubernetes 对象组织成一个打包的应用程序成为可能，任何人都可以一键下载、安装或自定义。这些包在
  Helm 中被称为 **图表（charts）**。使用 Helm 图表，你可以定义、安装甚至升级最复杂的 Kubernetes 应用程序。


  一个图表是一组描述相关 Kubernetes 资源集合的文件。单个图表可用于部署简单的对象，比如一个 memcached Pod，或者复杂的东西，比如一个包含
  HTTP 服务器、数据库、缓存等的完整 Web 应用栈。安装图表与使用 Apt 或 Yum 等包管理工具安装包非常相似。一旦你启动并运行了 Helm，安装一个包可以简单到在命令行中运行
  `helm install stable/mysql`。


  Helm 图表甚至可以描述最复杂的应用程序，提供可重复的应用程序安装，并作为单一权威点。此外，你可以为基于 Kubernetes 的微服务构建生命周期管理，将其作为图表，这些图表易于版本控制、共享，并可以托管在公共或私有服务器上。如果需要，你还可以回滚到任何特定版本。


  ## 微服务部署模式


  根据业务需求，我们发现存在多种微服务部署模式。早在容器成为主流之前，微服务就已经存在一段时间了，这些部署模式也随着时间的推移而演变。在接下来的章节中，我们将权衡每种部署模式的优缺点。




  ### 每主机多服务


  当微服务数量较少且不期望各服务相互隔离时，此模型较为适用。此处的宿主机可以是物理机或虚拟机。当微服务数量增多时，该模式将无法扩展，也无法帮助您实现微服务架构的优势。


  ### 每主机单服务


  在此模型中，物理宿主机隔离每个微服务。当微服务数量较多时（即使只有 10 个左右），该模式也无法扩展。这会造成资源浪费，并成为维护噩梦。此外，在开发、测试、预发布和生产环境中复制相同的运行环境会变得更加困难且耗时。


  ### 每虚拟机单服务


  在此模型中，虚拟机隔离每个微服务。该模式优于之前的每主机单服务模式，但当微服务数量较多时仍无法扩展。虚拟机开销较大，我们需要强大的硬件才能在单个物理宿主机上运行多个虚拟机。此外，由于体积增大，虚拟机镜像的可移植性较差。


  ### 每容器单服务


  这是最常见且推荐的部署模式。每个微服务部署在其自己的容器中。这使得微服务更具可移植性和可扩展性。


  ## 容器原生微服务框架


  我们用于构建微服务的大多数微服务框架和编程语言默认并非设计为与容器管理和编排技术协同工作。因此，开发人员或运维人员需要额外付出努力来创建将应用程序部署为容器所需的工件/配置。某些技术（例如
  Metaparticle.io）试图构建一组统一的插件，以将这些容器原生能力作为注解纳入您开发的应用程序或微服务代码中。接下来我们将讨论其中几种。


  ### Metaparticle


  在微服务开发方面，Metaparticle^(¹¹⁵) 正获得一些关注，因为它提供了一些有趣的功能，使您的应用程序能够与容器和 Kubernetes 协同工作。


  Metaparticle 是 Kubernetes 上云原生应用程序的标准库。其目标是通过提供构建在容器和 Kubernetes 之上的简单而强大的构建块，来普及分布式系统的开发。


  Metaparticle 通过熟悉的编程语言接口提供对这些原语的访问。开发人员不再需要掌握多种工具和文件格式来利用容器和 Kubernetes 的强大功能。Metaparticle
  允许我们执行以下操作：


  *   将您的应用程序容器化。

  *   将您的应用程序部署到 Kubernetes。

  *   快速开发复制的、负载均衡的服务。

  *   处理分布式副本之间的同步，例如锁定和主节点选举。

  *   轻松开发分片系统等云原生模式。


  例如，考虑以下代码片段，其中包含一个用于 `hello world` HTTP 服务的简单 Java 代码。您可以在 `ch08/sample05` 目录中找到完整的代码示例。


  ```

  public class Main {

  private static final int port = 8080;

  public static void main(String[] args) {

  // 简单 HTTP 服务的代码

  }

  }

  ```


  这里我们使用 Metaparticle 来容器化我们的 Java 微服务。您需要添加以下 Maven 依赖项来使用 Metaparticle 构建程序。


  ```

  io.metaparticle

  metaparticle-package

  0.1-SNAPSHOT


  ```


  为了将您的代码与 Docker 和 Kubernetes 结合，您需要使用 Metaparticle 结构包装 HTTP 服务的代码。


  ```

  @Package(repository = "docker.io/your_docker_id",

  jarFile = "target/metaparticle-hello-1.0-SNAPSHOT.jar")

  public static void main(String[] args) {

  Containerize(() -> {

  try {

  HttpServer server = HttpServer.create(new InetSocketAddress(port), 0);

  ...

  ```


  这里，我们使用 `@Package` 注解来描述如何打包应用程序并指定 Docker Hub 用户名。此外，我们需要将主函数包装在 `Containerize`
  函数中，该函数会在我们构建微服务应用程序时触发 Metaparticle 代码。


  现在，我们可以使用 `mvn compile` 构建应用程序，一旦构建成功，就可以使用 `mvn exec:java -Dexec.mainClass=io.metaparticle.tutorial.Main`
  运行它。


  这将启动 HTTP 微服务作为一个容器。要从外部访问此服务，我们需要暴露微服务应用程序的端口。为此，我们需要添加一个 `@Runtime` 注解来提供要暴露的端口。


  ```

  ...

  @Runtime(ports={port})

  ...

  ```


  最后一步，考虑在互联网上暴露一个复制服务。为此，我们需要扩展对 `@Runtime` 和 `@Package` 注解的使用。`@Package` 注解添加了 `publish`
  字段，其值设置为 `true`。这是为了将构建的镜像推送到 Docker 仓库所必需的。然后，我们向 `@Runtime` 注解添加 `executor` 字段，将执行环境设置为
  `metaparticle`，这将把服务启动到当前配置的 Kubernetes 环境中。最后，我们向 `@Runtime` 注解添加一个 `replicas`
  字段。这指定了要调度的副本数量。


  ```

  ...

  @Runtime(ports={port},

  replicas = 4,

  executor = "metaparticle")

  @Package(repository = "kasunindrasiri",

  jarFile = "target/metaparticle-package-tutorial-0.1-SNAPSHOT-jar-with-dependencies.jar",

  publish = true,

  verbose = true)

  ...

  ```


  编译并运行后，我们可以看到有四个 Pod 副本在 Kubernetes `ClusterIP` 服务后面运行。


  #### 容器化 Spring Boot 服务


  我们可以通过使用 Metaparticle 依赖项和注解来容器化现有的 Spring Boot 应用程序。首先，我们需要将 Metaparticle 依赖项添加到项目的
  `pom` 文件中，并在 `Containerize` 函数内执行 `SpringApplication.run`。


  ```

  import static io.metaparticle.Metaparticle.Containerize;

  @SpringBootApplication

  public class BootDemoApplication {

  @Runtime(ports = {8080},

  replicas = 4,

  executor = "metaparticle")

  @Package(repository = "your-docker-user-goes-here",

  jarFile = "target/boot-demo-0.0.1-SNAPSHOT.jar",

  publish = true,

  verbose = true)

  public static void main(String[] args) {

  Containerize(() ->  SpringApplication.run(BootDemoApplication.class, args));

  }

  }

  @RestController

  class HelloController {

  @GetMapping("/")

  public String hello(HttpServletRequest request) {

  System.out.printf("[%s]%n", request.getRequestURL());

  return String.format("Hello containers [%s] from %s",

  request.getRequestURL(), System.getenv("HOSTNAME"));

  }

  }

  ```


  除了无缝的容器化之外，它还提供其他功能，例如分布式同步、分片等。除了 Metaparticle，Ballerina.io 等语言也通过注解支持此类功能。您可以在
  `ch08/sample06` 目录中找到完整的示例。




  #### Spring Boot 与 Docker 集成


  Spring Boot 旨在部署并运行于容器中。它提供了插件，允许你从所开发的 Spring Boot 服务创建 Docker 镜像。你可以通过创建所需的 Dockerfile
  并将 `docker-file` Maven 插件添加到项目构建阶段来创建 Docker 镜像。例如，Dockerfile 内容如下：


  ```

  FROM openjdk:8-jdk-alpine

  VOLUME /tmp

  ARG JAR_FILE

  COPY ${JAR_FILE} app.jar

  ENTRYPOINT ["java","-Djava.security.egd=file:/dev/./urandom","-jar","/app.jar"]

  ```


  你可以将 `docker-file` 插件^(¹¹⁶) 添加到项目的 `pom` 文件中。完整的代码示例位于 `ch08/sample07` 目录。


  在 Spring Boot 运行时，它使用嵌入式 Web 服务器（如 Tomcat）来部署和启动你的服务。因此，你可以轻松地通过其嵌入式 Tomcat 运行时启动微服务。尽管启动时间和内存占用相对较高（几秒钟），我们仍可将
  Spring Boot 视为一种容器原生技术。


  #### Ballerina：Docker 与 Kubernetes 集成


  我们在第 7 章“集成微服务”中介绍了 Ballerina，它也作为语言扩展的一部分提供了一些容器原生能力。开发者只需使用所选部署方法的适当注解对代码进行标注，即可为
  Ballerina 代码生成部署工件。例如，在以下代码片段中，我们使用 Kubernetes 注解来标注代码，以生成部署工件。


  ```

  import ballerina/http;

  import ballerinax/kubernetes;

  @kubernetes:Deployment {

  enableLiveness: true,

  singleYAML: true

  }

  @kubernetes:Ingress {

  hostname: "abc.com"

  }

  @kubernetes:Service {name: "hello"}

  endpoint http:Listener helloEP {

  port: 9090

  };

  @http:ServiceConfig {

  basePath: "/helloWorld"

  }

  service helloWorld bind helloEP {

  sayHello(endpoint outboundEP, http:Request request) {

  http:Response response = new;

  response.setTextPayload("Hello, World from service helloWorld ! \n");

  _ = outboundEP->respond(response);

  }

  }

  ```


  在 Ballerina 构建阶段，它将生成 Docker 镜像和相应的 Kubernetes 部署工件。完整的代码示例位于 `ch08/sample08` 目录。Ballerina
  的部署选择非常多样化，你可以将其部署在传统的虚拟机（VM）或裸金属服务器、Docker、Kubernetes 上，如果你使用诸如 Istio 之类的服务网格，还可以部署在服务网格上。


  ## 持续集成、交付与部署


  微服务架构背后的关键理由之一是缩短产品上线时间和反馈周期。没有自动化，就无法实现这些目标。如果没有 DevOps 和自动化工具方面的及时进步，一个良好的微服务架构也只会停留在纸面上（或白板上）。微服务之所以成为一个好主意，是因为它们在开始成为主流时，就拥有了
  Docker、Ansible、Puppet、Chef 等众多工具的支持。围绕自动化的工具可以分为两大类——持续集成工具和持续部署工具。


  ### 注意


  本文是一份极佳的信息来源，包含了不同人士关于持续集成、持续部署和持续交付的观点：[`https://bit.ly/2wyBLNW`](https://bit.ly/2wyBLNW)
  。


  ### 持续集成


  持续集成通过自动化构建和源代码集成来维护源代码的完整性，使软件开发团队能够协同工作，而不会相互掣肘。它还与 DevOps 工具集成，以创建自动化的代码交付管道。持续集成帮助开发团队避免*集成地狱*——即软件在单个开发者的机器上可以工作，但当所有开发者集成代码时却失败。顶级分析公司
  Forrester 在其关于持续集成工具的最新报告^(¹¹⁷) 中，确定了该领域的十大工具：Atlassian Bamboo、AWS CodeBuild、CircleCI、CloudBees
  Jenkins、Codeship、GitLab CI、IBM UrbanCode Build、JetBrains TeamCity、Microsoft VSTS
  和 Travis CI。


  ### 持续交付


  持续交付工具将应用程序、基础设施、中间件及其支持的安装流程和依赖项打包成发布包，这些发布包在整个生命周期中进行流转。其目标是使代码始终保持可部署状态。Forrester
  关于持续交付和发布自动化的最新报告重点介绍了该领域 15 家最重要的供应商：Atlassian、CA Technologies、Chef Software、Clarive、CloudBees、Electric
  Cloud、Flexagon、Hewlett Packard Enterprise (HPE)、IBM、Micro Focus、Microsoft、Puppet、Red
  Hat、VMware 和 XebiaLabs。


  然而，如果我们关注主要支持 Kubernetes 的持续交付工具，那么诸如 Weave Cloud^(¹¹⁸)、Spinnaker^(¹¹⁹)（由 Netflix
  开发）、Codefresh^(¹²⁰)、Harness^(¹²¹) 和 GoCD^(¹²²) 等工具相当流行。


  ### 持续部署


  持续部署是一个过程，它将持续交付过程产生的工件部署到生产环境中，理想情况下，每次开发者更新代码时都会执行此操作！遵循持续部署实践的组织每天将代码部署到生产环境超过一百次。蓝绿部署、A/B
  测试和金丝雀发布是人们在持续部署中遵循的三种主要方法或实践。


  #### 蓝绿部署


  蓝绿部署是一种经过验证的、将变更引入运行系统的策略。它已经存在了近十年，并被许多大型企业成功使用。在蓝绿策略下，我们维护两个几乎相同的部署；一个称为蓝色，另一个称为绿色。在给定时间，蓝色或绿色中的一个处理实时流量——假设是蓝色。现在，我们有绿色环境来部署我们的变更并进行测试。如果一切正常，我们在负载均衡器处将实时流量从蓝色重定向到绿色。然后绿色成为处理实时流量的环境，而蓝色则可用于部署新的变更。如果出现问题，我们可以很容易地切换环境，从而自动回滚新的变更。


  #### 金丝雀发布


  金丝雀发布的概念源于煤矿工人使用的一种策略。他们过去常常带着金丝雀进入矿井，以监测空气中一氧化碳的含量。如果金丝雀死亡，意味着空气中一氧化碳含量很高，于是他们就离开煤矿。通过金丝雀发布，一个构建版本首先提供给选定的受众群体（可能占整个实时流量的
  5% 到 10%），如果运行良好（或者说没有“死亡”），那么再向所有人开放。这最大限度地降低了引入新变更的风险，因为生产发布是缓慢地、以小批量方式进行的。


  #### A/B 测试


  A/B 测试是关于评估新变更相对于旧系统的影响，或同时评估两个不同变更的影响。这主要用于跟踪因网站引入某些变更而导致的用户行为变化。例如，你的网站可能有一个版本启用了社交登录作为注册选项，而另一个版本则没有。另一个例子是，在网站上为重要消息设置不同的颜色或位置，并查看哪个被点击得更多。A/B
  测试用于衡量应用程序中不同竞争功能在实时流量下的表现。一段时间后，只有胜出的功能保留，其他竞争功能将被回滚。




  ### 说明


  对于希望了解更多持续部署细节的读者，我们推荐阅读 Danilo Sato 撰写的“金丝雀发布”文章^(¹²³)和 Marin Fowler 撰写的“蓝绿部署”文章^(¹²⁴)。


  ## 本章小结


  在本章中，我们讨论了如何使用容器在生产环境中部署和运行微服务。容器与微服务是天作之合，如果没有容器，微服务就不会成为主流。我们探讨了如何使用 Docker 部署微服务，随后讨论了
  Kubernetes 如何实现容器编排。我们还介绍了 Metaparticle，这是一个重要的云原生微服务框架，它帮助我们以注解的形式将容器原生能力集成到我们开发的应用程序或微服务代码中。最后，我们讨论了持续集成/交付与部署。


