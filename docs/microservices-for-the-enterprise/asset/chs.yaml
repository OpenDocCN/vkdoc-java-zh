  ## 使用 Kafka 的事件驱动微服务


  在第 3 章中，我们讨论了事件驱动微服务和 Kafka 的基础知识。在本节中，我们将了解一个微服务如何通过异步消息与另一个微服务通信。按照我们在第 2 章中提出的设计，`Order
  Processing` 微服务（`sample07`）在处理完订单后向 Kafka 发布一个事件，而 `Billing`（`sample08`）微服务监听同一个事件，消费该消息，并在计费完成后向
  Kafka 发布另一个事件。`sample07` 或 `Order Processing` 微服务充当事件发布者（或事件源），而 `sample08` 或 `Billing`
  微服务充当事件消费者（或事件接收器）。这两个微服务的源代码位于 `ch04/sample07` 和 `ch04/sample08` 目录下。图 4-4 展示了微服务与消息代理（Kafka）之间的交互。


  ![../images/461146_1_En_4_Chapter/461146_1_En_4_Fig4_HTML.jpg](img/461146_1_En_4_Fig4_HTML.jpg)


  图 4-4


  使用 Kafka 的事件驱动微服务


  ### 设置 Kafka 消息代理


  在本节中，我们将讨论如何设置 Kafka 消息代理。关于生产环境部署的建议，请始终参考 Kafka 官方文档^(⁷⁹)。


  首先，我们需要下载最新的 Kafka 发行版。对于本书中的示例，我们使用的是 2.11-1.1 版本。下载并解压 Kafka 发行版后，你可以运行以下命令来启动
  ZooKeeper^(⁸⁰)。Kafka 使用 ZooKeeper，因此如果你还没有 ZooKeeper 服务器，需要先启动一个。你可以使用 Kafka 附带的便捷脚本来快速搭建一个单节点
  ZooKeeper 实例。


  ```

  \> cd kafka_2.11-1.1.0

  \> bin/zookeeper-server-start.sh config/zookeeper.propertie

  ```


  现在，我们可以在另一个控制台中使用以下命令来启动 Kafka 服务器。


  ```

  \> cd kafka_2.11-1.1.0

  \> bin/kafka-server-start.sh config/server.properties

  ```


  对于我们的用例，我们需要两个主题：`ORDER_PROCESSING_COMPLETED` 和 `PAYMENT_PROCESSING_COMPLETED`。让我们使用以下命令创建这些主题。


  ```

  \> cd kafka_2.11-1.1.0

  \> bin/kafka-topics.sh --create --zookeeper localhost:2181 --replication-factor
  1 --partitions 1 --topic ORDER_PROCESSING_COMPLETED

  Created topic "ORDER_PROCESSING_COMPLETED"

  \> bin/kafka-topics.sh --create --zookeeper localhost:2181 --replication-factor
  1 --partitions 1 --topic PAYMENT_PROCESSING_COMPLETED

  Created topic "PAYMENT_PROCESSING_COMPLETED"

  ```


  你可以使用以下命令查看消息代理中所有可用的主题。


  ```

  \> cd kafka_2.11-1.1.0

  \> bin/kafka-topics.sh --list --zookeeper localhost:2181

  ORDER_PROCESSING_COMPLETED

  PAYMENT_PROCESSING_COMPLETED

  ```


  ### 构建发布者（事件源）


  在本节中，我们将讨论如何构建 `Order Processing` 微服务，以向 `ORDER_PROCESSING_COMPLETED` 主题发布事件。让我们看看
  `sample07` 内部的 `pom.xml` 文件中添加的重要依赖。这两个依赖负责处理 `sample07/src/main/java/com/apress/ch04/sample07/OrderProcessingApp.java`
  类中的 `@EnableBinding` 注解以及与 Kafka 相关的所有依赖。


  ```

  org.springframework.cloud

  spring-cloud-stream


  org.springframework.cloud

  spring-cloud-starter-stream-kafka


  ```


  现在让我们看看将事件发布到消息代理的代码。当 `Order Processing`（`src/main/java/com/apress/ch04/sample07/service/OrderProcessing.java`）微服务收到订单更新时，它会与
  `OrderPublisher`（`src/main/java/com/apress/ch04/sample07/OrderPublisher.java`）类通信以发布事件。


  ```

  @Service

  public class OrderPublisher {

  @Autowired

  private Source source;

  public void publish(Order order) {

  source.output().send(MessageBuilder.withPayload(order).build());

  }

  }

  ```


  主题名称和消息代理信息来自 `/src/main/resources/application.properties` 文件。


  ```

  spring.cloud.stream.bindings.output.destination:ORDER_PROCESSING_COMPLETED

  spring.cloud.stream.bindings.output.content-type:application/json

  spring.cloud.stream.kafka.binder.zkNodes:localhost

  spring.cloud.stream.kafka.binder.zkNodes.brokers: localhost

  ```


  使用以下 Maven 命令来启动发布者微服务。


  ```

  \> cd sample07

  \> mvn spring-boot:run

  ```




  ### 构建消费者（事件接收端）


  本节将讨论如何构建 `Inventory` 微服务（`sample08`），以消费发布到 `ORDER_PROCESSING_COMPLETED` 主题的消息。本示例中使用的
  Maven 依赖项与之前相同，其用途也一致。我们直接来看从主题中消费消息的代码。`InventoryApp` 类（`sample08/src/main/java/com/apress/ch04/sample08/InventoryApp.java`）中的
  `consumeOderUpdates` 方法仅从主题读取数据并打印订单 ID。


  ```

  @SpringBootApplication

  @EnableBinding(Sink.class)

  public class InventoryApp {

  public static void main(String[] args) {

  SpringApplication.run(InventoryApp.class, args);

  }

  @StreamListener(Sink.INPUT)

  public void consumeOderUpdates(Order order) {

  System.out.println(order.getOrderId());

  }

  }

  ```


  主题名称和消息代理信息从 `sample08/src/main/resources/application.properties` 文件中获取。


  ```

  server.port=9000

  spring.cloud.stream.bindings.input.destination:ORDER_PROCESSING_COMPLETED

  spring.cloud.stream.bindings.input.content-type:application/json

  spring.cloud.stream.kafka.binder.zkNodes:localhost

  spring.cloud.stream.kafka.binder.zkNodes.brokers: localhost

  ```


  使用以下 Maven 命令启动消费者微服务。


  ```

