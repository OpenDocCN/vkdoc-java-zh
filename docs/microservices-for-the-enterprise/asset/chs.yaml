  ```

  io.opentracing.contrib

  opentracing-spring-cloud-starter

  0.1.13


  io.opentracing.contrib

  opentracing-spring-zipkin-starter

  0.1.1


  ```


  假设你仍在运行上一节中的 Zipkin 节点，请将 `opentracing.zipkin.http-sender.baseUrl` 属性添加到 `application.properties`
  文件中，该属性包含 Zipkin 服务器的服务器 URL。


