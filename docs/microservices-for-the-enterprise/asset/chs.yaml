  ### 配置服务器


  在第二章 2 中，关于 12 要素应用，我们讨论了*配置*要素强调了将环境特定设置从代码解耦到配置中的必要性。例如，LDAP 或数据库服务器的连接 URL 就是环境特定的参数和证书。Spring
  Boot 提供了一种通过配置服务器在微服务之间共享配置的方式。多个微服务实例可以连接到该服务器，并通过 HTTP 加载配置。配置服务器既可以在本地文件系统中维护配置，也可以从
  Git 加载。从 Git 加载是理想的方式。配置服务器本身是另一个 Spring Boot 应用。你可以在`ch04/sample02`中找到配置服务器的代码。


  让我们看看添加到`ch04/sample02/pom.xml`中的一些其他值得注意的 Maven 依赖。`spring-cloud-config-server`依赖引入了将所有组件，将
  Spring Boot 应用转变为配置服务器。


  ```

  org.springframework.cloud

  spring-cloud-config-server


  ```


  要将 Spring Boot 应用转变为配置服务器，你只需要在`src/main/java/com/apress/cho4/sample02/ConfigServerApp.java`中添加一个类级别的注解，如下代码片段所示。`@EnableConfigServer`注解将完成
  Spring 模块之间的所有内部连接，从而将 Spring Boot 应用暴露为配置服务器。这是我们唯一需要的代码。


  ```

  @SpringBootApplication

  @EnableConfigServer

  public class ConfigServerApp {

  public static void main(String[] args) {

  SpringApplication.run(ConfigServerApp.class, args);

  }

  }

  ```


  在这个例子中，配置服务器从本地文件系统加载配置。你会发现以下两个属性被添加到`src/main/resources/application.properties`文件中，用于将服务器端口更改为
  9000，并为配置服务器使用`native`配置文件。当使用`native`配置文件时，配置从本地文件系统加载，而不是从 Git 加载。


  ```

  server.port=9000

  spring.profiles.active=native

  ```


  现在，我们可以在`src/main/resources`目录下为每个微服务创建属性文件。你会在`src/main/resources/sample01.properties`文件中找到以下内容，这些内容可用于定义给定微服务所需的所有配置参数。


  ```

  database.connection = jdbc:mysql://localhost:3306/sample01

  ```


