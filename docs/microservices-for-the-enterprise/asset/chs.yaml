  ## gRPC 入门


  在第 3 章中，我们讨论了 gRPC 的基础知识。在本节中，我们将了解一个微服务如何通过 gRPC 与另一个微服务通信。在上一节中，我们了解了`订单处理`微服务（`sample01`）如何通过
  HTTP 直接与`库存`微服务（`sample04`）通信以更新库存。这里我们修改了 `sample01` 和 `sample04` 微服务，并构建了两个新的微服务
  `sample06` 和 `sample05`。`sample05`（即`库存`微服务）充当 gRPC 服务器，而 `sample06`（即`订单处理`微服务）充当
  gRPC 客户端。这两个微服务的源代码位于 `ch04/sample05` 和 `ch04/sample06` 下。图 4-3 展示了此练习的设置。


  ![../images/461146_1_En_4_Chapter/461146_1_En_4_Fig3_HTML.jpg](img/461146_1_En_4_Fig3_HTML.jpg)


  图 4-3


  通过 gRPC 的微服务间通信


  ### 构建 gRPC 服务


  首先，我们需要创建一个 IDL（接口定义语言）。你可以在 `sample05/src/main/proto/InventoryService.proto` 中找到它。稍后，我们将使用
  Maven 插件从此 IDL 文件构建 Java 类，并且该插件默认会查找 `sample05/src/main/proto/` 位置。除非你想更改插件配置，否则请确保
  IDL 文件位于此位置。以下代码显示了 IDL 文件的内容。


  ```

  syntax = "proto3";

  option java_multiple_files = true;

  package com.apress.ch04.sample05.service;

  message Item {

  string code = 1;

  int32 qty = 2;

  }

  message ItemList {

  repeated Item item = 1;

  }

  message UpdateItemsResp {

  string code = 1;

  }

  service InventoryService {

  rpc updateItems(ItemList) returns (UpdateItemsResp);

  }

  ```


  现在让我们看看 Maven `pom.xml` 文件中有什么新内容。添加了多个依赖项，但唯一值得注意的依赖项是 `grpc-spring-boot-starter`。它负责处理
  `sample05/src/main/java/com/apress/ch04/sample05/service/Inventory.java` 类中的 `@GRpcService`
  注解，该类启动 Spring Boot 应用程序并通过 gRPC 暴露我们的微服务。


  ```

  org.lognet

  grpc-spring-boot-starter

  0.0.6


  ```


  我们还需要在 `pom.xml` 文件中添加一个新的扩展和一个新的 Maven 插件。`os-maven-plugin` 扩展将确定当前设置的操作系统，并将该信息传递给
  `protobuf-maven-plugin` 插件。`protobuf-maven-plugin` 插件用于从 IDL 生成 Java 类。


  ```

  ………………………………


  kr.motd.maven

  os-maven-plugin

  1.4.1.Final


  ………………………………


  org.xolstice.maven.plugins

  protobuf-maven-plugin

  0.5.0

  ………………………………

  </plugin

  ```


  以下 Maven 命令可用于从 IDL 创建 Java 类。默认情况下，它们会创建在 `target/generated-sources/protobuf/grpc-java`
  和 `target/generated-sources/protobuf/java` 目录下。


  ```

  \> cd sample05

  \> mvn package

  ```


  现在让我们看看我们的服务代码。`Inventory`（`sample05/src/main/java/com/apress/ch04/sample05/services/Inventory.java`）类扩展了
  `InventoryServiceImplBase`，这是由 Maven 插件生成的类。一旦`订单处理`微服务向`库存`微服务执行 `POST` 操作，它将简单地打印项目代码并返回。


  ```

  @GRpcService

  public class Inventory extends InventoryServiceImplBase{

  @Override

  public void updateItems(ItemList request,

  StreamObserver

  responseObserver)

  {

  List items = request.getItemList();

  for (Item item : items) {

  System.out.println(item.getCode());

  }

  responseObserver.onNext(UpdateItemsResp.newBuilder()

  .setCode("success").build());

  responseObserver.onCompleted();

  }

  }

  ```


  要启动`库存`微服务并通过 gRPC 暴露它，请使用以下 Maven 命令。


  ```

  \> cd sample05

  \> mvn spring-boot:run

  ```


  服务器启动后，它会查找以下行。默认情况下，它会在 6565 端口启动，你可以通过将属性 `grpc.port` 添加到 `application.properties`
  文件并将其值设置为你需要的端口号来更改它。在我们的例子中，我们将其设置为 `7000`（`grpc.port=7000`）。


  ```

  gRPC Server started, listening on port 7000

  ```




  ### 构建 gRPC 客户端


  现在让我们看看如何构建一个 gRPC 客户端应用程序。实际上，在我们的案例中，我们构建的 gRPC 客户端是另一个微服务。与 gRPC 服务类似，首先我们需要创建一个
