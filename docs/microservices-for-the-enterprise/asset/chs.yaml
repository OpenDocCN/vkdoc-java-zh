  Docker 主机上的 Docker 守护进程会监听来自客户端的请求并做出相应处理。客户端可以通过 REST API、UNIX 套接字或网络接口与守护进程通信。在接下来的章节中，我们将详细解释通信的具体方式以及事件的执行顺序。


