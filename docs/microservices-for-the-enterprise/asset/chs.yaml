  Minikube 启动后，运行以下命令来验证 kubectl 与 Kubernetes 集群之间的通信。这将打印 kubectl 客户端和 Kubernetes
  集群的版本信息。


  ```

  :\> kubectl version

  Client Version: version.Info{Major:"1", Minor:"11", GitVersion:"v1.11.0", GitCommit:"91e7b4fd31fcd3d5f436da26c980becec37ceefe",
