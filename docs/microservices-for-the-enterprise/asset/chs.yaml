  ```


  现在，让我们运行 `订单处理` 微服务，并使用以下 cURL 命令（从 `ch13/sample03` 目录运行）调用它。执行几次，并通过运行在 `http://localhost:9411/zipkin/`
  的 Zipkin Web 控制台观察记录的数据。


