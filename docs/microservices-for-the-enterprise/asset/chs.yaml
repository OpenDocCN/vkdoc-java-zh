  ### 设置 Prometheus


  使用 Docker 设置 Prometheus 非常简单。首先，我们需要创建一个 `prometheus.yml` 文件，其中包含 Prometheus 将要监控的所有服务。以下示例展示了一个示例文件，其中包含了我们的
  `Order Processing` 微服务（`sample05`）和 Prometheus 实例本身。一个给定的 `prometheus.yml` 文件可以有多个任务。这里，`prometheus`
  任务负责监控自身（运行在 9090 端口），而 `orderprocessing` 任务被设置为每 10 秒轮询一次 10.0.0.93:9000 端点。请记住，这里我们需要使用运行
  `Order Processing` 微服务的节点的 IP 地址，并且该地址必须能够从运行 Prometheus 的 Docker 实例访问。


  ```

  scrape_configs:

  - job_name: ''prometheus''

  scrape_interval: 10s

  static_configs:

  - targets: [''localhost:9090'']

  - job_name: ‘orderprocessing’

  scrape_interval: 10s

  metrics_path: ''/prometheus''

  static_configs:

  - targets: [''10.0.0.93:9000'']

  ```


  现在，让我们使用 `prometheus.yml` 文件启动 Prometheus Docker 实例。


  ```

  :\> docker run -p 9090:9090 -v /path/to/prometheus.yml:/etc/prometheus/prometheus.yml
  prom/prometheus

  ```


  Prometheus 节点启动后，访问 URL `http://localhost:9090/targets`，它将显示所有服务、Prometheus 监控项以及各个端点的状态（见图
  13-11）。


  ![../images/461146_1_En_13_Chapter/461146_1_En_13_Fig11_HTML.jpg](img/461146_1_En_13_Fig11_HTML.jpg)


  图 13-11


  Prometheus 目标及各个端点的状态


  ### 使用 Prometheus 构建图表


  现在，我们已经将 Spring Boot 微服务的所有指标发布到了 Prometheus。让我们看看如何构建图表来监控这些已发布的统计数据。


  首先，访问 `http://localhost:9090/graph` 并选择你想要监控的指标。例如，我们选择了 `heap_used`。然后，当你点击“Graph”选项卡时，我们应该能够看到已用堆随时间变化的图表（见图
  13-12）。这样，你可以添加任意数量的图表。


  ### 注意


  Prometheus 于 2012 年在 SoundCloud 诞生，是一个根据 Apache 2.0 许可证发布的开源项目。它主要用 Go 语言编写，并且围绕
  Prometheus 的社区在过去几年中不断壮大。2016 年，它成为第二个获得云原生计算基金会（CNCF）成员资格的项目。


  ![../images/461146_1_En_13_Chapter/461146_1_En_13_Fig12_HTML.jpg](img/461146_1_En_13_Fig12_HTML.jpg)


  图 13-12


  使用 Prometheus 监控 Spring Boot 微服务的已用堆


  ## 使用 Grafana 进行分析和监控


  Grafana 是一个用于分析和监控的开源产品，在构建仪表盘方面比 Prometheus 更强大。事实上，建议使用 Grafana 配合 Prometheus
  来构建仪表盘。Prometheus 有自己的仪表盘工具，称为 Promdash，但随着 Grafana 的进步，Prometheus 开发者放弃了它，并开始推广
  Grafana。


  ### 注意


  对 Grafana 的全面介绍超出了本书的范围，我们建议需要详细信息的读者参考 Grafana 文档，该文档可在 [`http://docs.grafana.org/`](http://docs.grafana.org/)
  获取。


  ### 使用 Grafana 构建仪表盘


  使用 Docker 设置 Grafana 非常简单。使用以下命令启动一个 Grafana Docker 实例，该实例运行在 HTTP 端口 3000 上。


  ```

  :\> docker run -d -p 3000:3000 grafana/grafana

  ```


  服务器启动后，你可以通过 `http://localhost:3000` 使用凭据 admin/admin 登录 Grafana 管理控制台。我们需要做的第一件事是引入一个新的数据源。Grafana
  使用数据源来构建图表。点击“Add Data Source”并选择 Prometheus 作为数据源类型。给它一个名称，比如 `prometheus_ds`。除了
  HTTP URL 属性外，其余保持默认即可。此 URL 应指向 Prometheus 服务器，并且该服务器必须能够从运行 Grafana 的节点访问。数据源配置如图
  13-13 所示。


  ![../images/461146_1_En_13_Chapter/461146_1_En_13_Fig13_HTML.jpg](img/461146_1_En_13_Fig13_HTML.jpg)


  图 13-13


  Grafana 数据源属性




  ### 注意


  根据图 13-13 所示的配置，我们期望 Prometheus 端点处于开放或未受保护的状态。如果它受到保护，Grafana 支持多种安全模型，包括基本身份验证和
  TLS 客户端身份验证。


  现在，我们可以通过 `http://localhost:3000/dashboard/new` 创建一个新的仪表盘。选择图表，然后点击面板标题并选择“编辑”。在“指标”下，你可以选择所选数据源提供的任何指标。如图
  13-14 所示，我们可以定义多个查询。这里我们选择了 `heap` 和 `heap_used`。查询定义了我们需要从 Prometheus 端点拉取的指标中选取哪些信息，图表会据此进行渲染。


  ![../images/461146_1_En_13_Chapter/461146_1_En_13_Fig14_HTML.jpg](img/461146_1_En_13_Fig14_HTML.jpg)


  图 13-14

  设置查询以使用 Grafana 构建仪表盘


  完成此过程后，我们可以在 Grafana 主页的“最近查看的仪表盘”下找到刚刚创建的仪表盘。你可以点击它来查看仪表盘，其显示效果将如图 13-15 所示。


  ![../images/461146_1_En_13_Chapter/461146_1_En_13_Fig15_HTML.jpg](img/461146_1_En_13_Fig15_HTML.jpg)


  图 13-15

  用于监控微服务部署的 Grafana 仪表盘


  ### 使用 Grafana 创建告警


  Grafana 允许你创建告警并将其与图表（或仪表盘面板）关联。要为我们在上一节中创建的仪表盘创建告警，首先需要编辑图表（见图 13-16），方法是点击其标题并选择“编辑”。在“告警”下，我们可以创建一个规则，该规则规定了系统在何种条件下应触发告警（见图
  13-17）。目前 Grafana 支持的唯一条件类型是查询，对于告警规则，你可以添加多个相互关联的查询（使用 `AND` 或 `OR`）。


  ### 注意


  Grafana 的告警支持仅限于以下数据源：Graphite、Prometheus、ElasticSearch、InfluxDB、OpenTSDB、MySQL、Postgres
  和 Cloudwatch。


  ![../images/461146_1_En_13_Chapter/461146_1_En_13_Fig16_HTML.jpg](img/461146_1_En_13_Fig16_HTML.jpg)


  图 13-16

  Grafana 仪表盘监控微服务部署


  以下查询表示，当指标 A（见图 13-14，在我们的例子中是 `heap`）的最大值在接下来的五分钟内超过 3 时，触发告警。此规则每 60 秒评估一次。


  ```

  WHEN max() OF query(A, 5m, now) IS ABOVE 3

  ```


  除了 `max()` 函数，Grafana 还支持 `avg()`, `min()`, `sum()`, `last()`, `count()`, `median()`,
  `diff()`, `percent_diff()` 和 `count_non_null()`。见图 13-17。


  ![../images/461146_1_En_13_Chapter/461146_1_En_13_Fig17_HTML.jpg](img/461146_1_En_13_Fig17_HTML.jpg)


  图 13-17

  配置告警


  设置好告警规则后，我们可以在“通知”菜单下配置当告警触发时向谁发送通知以及附带的消息（见图 13-18）。Grafana 支持多种通知渠道，包括 Email、PagerDuty、Telegram、Slack
  等。


  ![../images/461146_1_En_13_Chapter/461146_1_En_13_Fig18_HTML.jpg](img/461146_1_En_13_Fig18_HTML.jpg)


  图 13-18

