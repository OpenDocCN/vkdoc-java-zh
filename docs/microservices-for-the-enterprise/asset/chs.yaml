  ```


  从这个输出中可以学到一件重要的事情。你可以看到 Docker 引擎分三步执行操作。Dockerfile 中的每一行都对应一个步骤。Docker 将镜像构建为层。此操作中的每一步都会创建一个层。这些层是只读的，并且可以在多个容器之间复用。在本章后面，当我们更好地理解容器的行为后，再来重新审视这个概念。


  要列出 Docker 引擎中的所有镜像，我们可以使用以下命令。


  ```

  :\> docker image ls

  ```


  #### 将微服务作为 Docker 容器运行


  一旦我们有了微服务的 Docker 镜像，就可以使用以下命令来启动一个 Docker 容器。


  ```

  :\> docker run -p 9000:9000 sample01

  ```


  此命令指示 Docker 引擎从 `sample01` 镜像启动一个新的 Docker 容器，并将主机的 9000 端口映射到 Docker 容器的 9000
  端口。我们这里选择 9000，因为容器中的微服务在 9000 端口上启动。除非我们将容器端口映射到主机端口，否则我们将无法与在容器中运行的微服务进行通信。


  运行此命令时，您可以看到容器中运行的微服务的输出会打印在主机的控制台上。并且，如果您使用 Ctrl+C，它将终止容器。这是因为，按照我们执行此命令的方式，容器已附加到主机的终端。通过在
  `docker run` 命令中使用 `-d` 选项，我们可以将容器与主机终端分离。这将返回与我们刚刚启动的容器相对应的容器 ID。


  ```

  :\> docker run -d -p 9000:9000 sample01

  9a5cd90b714fc5a27281f94622c1a0d8f1dd1a344f4f4fcc6609413db39de000

  ```


  要测试在容器中运行的微服务，请在主机上使用以下命令。


  ```

  :\> curl http://localhost:9000/order/11

  {"customer_id":"101021","order_id":"11","payment_method":{"card_type":"VISA","expiration":"01/22","name":"John
  Doe","billing_address":"201, 1st Street, San Jose, CA"},"items":[{"code":"101","qty":1},{"code":"103","qty":5}],"shipping_address":"201,
  1st Street, San Jose, CA"}>

  ```


  ### 提示


  如果我们想查看 Docker 引擎上运行的所有容器，可以使用 `docker ps` 命令。要停止正在运行的容器，需要使用 `docker stop <container
  id>` 命令。另外，如果您想删除一个容器，请使用 `docker rm <container id>` 命令。删除容器后，您可以使用 `docker rmi
  <image name>` 命令从本地注册表中删除相应的 Docker 镜像。


  #### 将 Docker 镜像发布到 Docker Hub


  Docker Hub 是一个公共的 Docker 注册表，任何人都可以推送和拉取 Docker 镜像。首先，我们需要从 [`https://hub.docker.com/`](https://hub.docker.com/)
  创建一个 Docker ID。例如，在下面的示例中，我们使用 Docker ID `prabath`。创建带有密码的 Docker ID 后，使用以下命令将您的
  Docker ID 注册到本地运行的 Docker 客户端。


  ```

  :\> docker login --username=prabath

  ```


  此命令将提示您输入密码，Docker 客户端会将您的凭据存储在钥匙串中。接下来，使用以下命令查找我们之前创建的 Docker 镜像的镜像 ID，并复制与 `sample01`
  镜像对应的 `IMAGE ID` 字段的值；例如，`35188a2bfb00`。


  ```

  :\> docker images

  ```


  现在，我们需要使用 Docker Hub 中的 Docker ID 为我们的镜像打标签，如下面的命令所示。打标签有助于为镜像创建更有意义的名称，并且由于我们计划将此镜像发布到
  Docker Hub，请确保标签遵循以您的 Docker Hub 帐户名开头的约定。您需要将 `prabath` 替换为您的 Docker Hub 帐户名。


  ```

  :\> docker tag 35188a2bfb00 prabath/sample01

  ```


  最后，使用以下命令将镜像推送到 Docker Hub，发布后它应该会出现在您的 Docker Hub 帐户下。


  ```

  :\> docker push prabath/sample01

  ```


  现在，任何人都可以使用以下命令从任何地方拉取此镜像。


  ```

  :\> docker pull prabath/sample01

  ```


  ### Docker Compose


  在实践中，微服务部署中通常有多个服务，每个服务都有自己的容器。例如，在图 8-4 中，`订单处理` 微服务与 `库存` 微服务通信。此外，还可能存在一个微服务依赖于其他服务（如数据库）的情况。数据库将是另一个容器，但仍然属于同一个应用程序。Docker
  Compose 有助于定义和管理此类多容器环境。它是除了 Docker 客户端和 Docker 引擎（主机）之外，我们必须安装的另一个工具。




  ### 说明


  Compose 是一款用于定义和运行多容器 Docker 应用的工具。使用 Compose 时，你可以通过一个 YAML 文件来配置应用的服务。然后，只需一条命令，就能根据配置创建并启动所有服务^(¹⁰⁷)。更多详情可参考
  Docker 文档^(¹⁰⁸)。操作起来相当简单。


  ![../images/461146_1_En_8_Chapter/461146_1_En_8_Fig4_HTML.jpg](img/461146_1_En_8_Fig4_HTML.jpg)


  图 8-4


  多容器微服务部署


  Docker Compose 使用一个 YAML 文件来定义应用的配置。以下是一个名为 `docker-compose.yml` 的 YAML 文件示例，它启动了
  `Order Processing(sample01)` 和 `Inventory(sample02)` 这两个微服务。你可以在 `ch08/sample02`
  目录中找到完整的文件。


  ```

  version: ''3.3''

  services:

  inventory:

  image: sample02

  ports:

  - "9090:9090"

  restart: always

  orderprocessing:

  image: sample01

  restart: always

  ports:

  - "9000:9000"

  depends_on:

  - inventory

  ```


  这里我们定义了两个服务：`inventory` 和 `orderprocessing`。每个服务下的 `ports` 标签定义了端口转发规则（我们之前讨论过）。`image`
  标签指向 Docker 镜像。`orderprocessing` 下定义的 `depends_on` 标签表明它依赖于 `inventory` 服务。你可以在
  `depends_on` 标签下定义多个服务。最后，你可能注意到两个服务下的 `restart` 标签值都设置为 `always`，这指示 Docker 引擎在服务宕机时始终重启它们。


  #### 为库存微服务构建 Docker 镜像


  我们已经有了 `Order Processing` 微服务的 Docker 镜像。现在为 `Inventory` 微服务再创建一个。要创建 Docker 镜像，首先需要创建一个
  Dockerfile。正如我们在前几节中讨论的，这个文件定义了所有其他依赖镜像、其他二进制依赖项以及启动微服务的命令。以下列出了在 `ch08/sample02`
  目录中创建的 Dockerfile 的内容。


  ```

  FROM openjdk:8-jdk-alpine

  ADD target/sample02-1.0.0.jar /sample02-1.0.0.jar

  ENTRYPOINT ["java", "-jar", "sample02-1.0.0.jar"]

  ```


  让我们使用以下命令从 `ch08/sample02` 目录构建名为 `sample02` 的 Docker 镜像。在运行此命令之前，请确保你已经使用 Maven
  构建了示例。


  ```

  :\> docker build -t sample02 .

  ```


  现在，让我们将此镜像推送到 Docker Hub。对于这个示例来说，这可能没什么用，但在本书后面，我们将直接从 Docker Hub 引用镜像。使用以下命令查找我们之前创建的
  Docker 镜像的镜像 ID，并复制与 `sample02` 镜像对应的 `IMAGE ID` 字段的值；例如，`35199a2bfb00`。


  ```

  :\> docker images

  ```


  现在，我们需要像以下命令所示，使用 Docker Hub 中的 Docker ID 为我们的镜像打标签。最后，使用以下命令将镜像推送到 Docker Hub，发布后它应该会出现在你的
  Docker Hub 账户下。同时，在执行 `docker push` 命令之前，请确保你已经使用 `docker login` 命令登录到 Docker Hub。


  ```

  :\> docker tag 35199a2bfb00 prabath/sample02

  :\> docker push prabath/sample02

  ```


  如果你已经在运行 `Order Processing` 微服务，请停止正在运行的容器。要查找 Docker 主机中运行的所有容器，请使用以下命令，它将返回所有容器的容器
  ID。找到与 `sample01` 镜像相关的容器 ID（例如 `e1039667db1a`）。


  ```

  :\> docker ps

  ```


  要移除一个正在运行的容器，我们必须先停止它，然后再移除。


  ```

  :\> docker container stop e1039667db1a

  :\> docker container rm e1039667db1a

  ```


  #### 使用 Docker Compose 启动应用


  我们已经准备好使用 Docker Compose 启动应用了。从 `ch08/sample02` 目录运行以下命令。这是我们之前创建 `docker-compose.yml`
  文件的地方。


  ```

  :\> docker-compose up

  ```


  由于我们在这里以附加模式（不带 `–d` 参数）启动 `docker-compose`，你将能够在终端上看到两个容器的输出。你还会注意到，来自两个微服务的每条日志都带有
  `docker-compose.yml` 文件中定义的相应服务名称的标签。


  #### 使用 cURL 测试应用


  现在，我们所有的微服务都在 Docker Compose 下运行。让我们首先尝试使用以下 cURL 命令测试 `Order Processing` 微服务。此调用仅访问
  `Order Processing` 微服务并返回结果。


  ```

  :\> curl http://localhost:9000/order/11

  {"customer_id":"101021","order_id":"11","payment_method":{"card_type":"VISA","expiration":"01/22","name":"John
  Doe","billing_address":"201, 1st Street, San Jose, CA"},"items":[{"code":"101","qty":1},{"code":"103","qty":5}],"shipping_address":"201,
  1st Street, San Jose, CA"}>

  ```


  让我们尝试另一个请求，该请求发送到 `Order Processing` 微服务，同时也会调用 `Inventory` 微服务。请求先到达 `Order Processing`
  微服务，然后它再调用 `Inventory` 微服务。这里我们向 `Order Processing` 微服务发送一个 JSON 请求。


  ```

  :\> curl -v -H "Content-Type: application/json" -d ''{"customer_id":"101021","payment_method":{"card_type":"VISA","expiration":"01/22","name":"John
  Doe","billing_address":"201, 1st Street, San Jose, CA"},"items":[{"code":"101","qty":1},{"code":"103","qty":5}],"shipping_address":"201,
  1st Street, San Jose, CA"}'' http://localhost:9000/order

  ```


  现在，如果你查看连接到两个容器的终端，将会看到以下输出，这确认了请求已经到达了 `Inventory` 微服务。


  ```

  inventory_1 | 101

  inventory_1 | 103

  ```


  #### 容器之间如何通信？


  要了解在我们的上一个示例中两个微服务是如何精确连接的，我们需要查看 `Order Processing` 微服务的源代码，该代码位于 `ch08/sample01/
  src/main/java/com/apress/ch08/sample01/service/OrderProcessing.java`。在那里你可以看到，我们使用的是
  Inventory 微服务的服务名称（如 `docker-compose.yml` 中所定义），而不是 IP 地址或主机名：`http://inventory:9090/inventory`。


  ```

  @RequestMapping(method = RequestMethod.POST)

  public ResponseEntity createOrder(@RequestBody Order order) {

  if (order != null) {

  RestTemplate restTemplate = new RestTemplate();

  URI uri = URI.create(

  "http://inventory:9090/inventory");

  restTemplate.put(uri, order.getItems());

  order.setOrderId(UUID.randomUUID().toString());

  URI location = ServletUriComponentsBuilder

  .fromCurrentRequest().path("/{id}")

  .buildAndExpand(order.getOrderId())

  .toUri();

  return ResponseEntity.created(location).build();

  }

  return ResponseEntity.status(

  HttpStatus.BAD_REQUEST).build();

  }

  ```


  ### 说明


  默认情况下，Compose 会为你的应用设置一个单一网络。每个服务的容器都会加入默认网络，该网络上的其他容器既可以访问它们，也可以通过与其容器名称相同的主机名发现它们^(¹⁰⁹)。




  ## 容器编排


  容器和 Docker 极大地减轻了微服务开发中的大部分痛点。如果没有 Docker，微服务今天可能不会如此流行。然而，容器只解决了大规模微服务部署中的一部分问题。如何管理容器从创建到终止的整个生命周期？如何调度容器在网络中不同的物理机上运行，跟踪其运行状态，并在给定集群的多个容器之间进行负载均衡？如何自动扩展容器以满足不断变化的请求或负载？这些都是容器编排框架所要解决的问题。Kubernetes
  和 Apache Mesos 是最流行的容器编排框架。在本章中，我们只关注 Kubernetes。


  ### Kubernetes 简介


  简而言之，Docker 抽象了机器（或计算机），而 Kubernetes 抽象了网络。谷歌于 2014 年将 Kubernetes 作为开源项目向公众推出。在
  Kubernetes 之前，谷歌多年来一直致力于一个名为 Borg 的项目，以帮助其内部开发人员和系统管理员管理部署在大型数据中心上的数千个应用程序/服务。Kubernetes
  是 Borg 的下一代产品。


  Kubernetes 让你能够轻松地将运行在容器中的任何类型的应用程序部署并扩展到数千个节点。例如，在部署描述文件（Kubernetes 可识别）中，你可以指定需要运行多少个`订单处理`微服务的实例。


  #### Kubernetes 架构


  与 Docker 一样，Kubernetes 也采用基于客户端-服务器的架构。有一个 Kubernetes 主节点和一组与之连接的工作节点。主节点也称为 Kubernetes
  控制平面，它控制整个 Kubernetes 集群。Kubernetes 控制平面包含四个主要组件：API 服务器、调度器、控制器管理器和 etcd。API 服务器向所有工作节点以及控制平面内的其他组件公开一组
  API。调度器为应用程序的每个部署单元分配一个工作节点。应用程序实际上运行在工作节点上。


  ![../images/461146_1_En_8_Chapter/461146_1_En_8_Fig5_HTML.jpg](img/461146_1_En_8_Fig5_HTML.jpg)


  图 8-5


  高级 Kubernetes 架构（一个 Kubernetes 集群）


  控制器管理器负责管理和跟踪 Kubernetes 部署中的所有节点。它确保组件被正确复制和自动扩展，优雅地处理故障，并执行许多其他任务。`etcd`是一个高可用、一致性的数据存储，用于存储
  Kubernetes 集群配置。


  一个工作节点包含三个组件：kubelet、容器运行时和 kube-proxy。容器运行时可以基于 Docker 或 rkt。尽管 Kubernetes 容器运行时最初与
  Docker 和 rkt 绑定，但现在可以通过容器运行时接口（CRI）扩展以支持任何基于开放容器倡议（OCI）的容器运行时。kubelet 的职责是通过与主节点上运行的
  API 服务器通信来管理节点。它运行在每个工作节点上，并作为主节点的节点代理。Kube-proxy 或 Kubernetes 网络代理执行简单的 TCP 和 UDP
  流转发，或在一组后端之间进行轮询的 TCP 和 UDP 转发。


  #### 安装 Kubectl


  Kubernetes 主节点可以运行在任何地方。要与主节点交互，我们需要在本地机器上安装 kubectl。kubectl 的安装说明可在[`https://kubernetes.io/docs/tasks/tools/install-kubectl/`](https://kubernetes.io/docs/tasks/tools/install-kubectl/)找到。请确保
  kubectl 的版本与你的集群的次版本号相差不超过一个。


  #### 安装 Minikube


  Minikube 是在本地机器上开始使用 Kubernetes 的最佳方式。与生产环境的 Kubernetes 集群不同，Minikube 仅支持单节点 Kubernetes
  集群。在本章中，我们使用 Minikube 来搭建一个 Kubernetes 集群。Minikube 的安装详情可在[`https://kubernetes.io/docs/tasks/tools/install-minikube/`](https://kubernetes.io/docs/tasks/tools/install-minikube/)找到。你永远不会在生产环境中使用
  Minikube，但通过 Minikube 学到的 Kubernetes 概念在任何类型的 Kubernetes 发行版中仍然有效。


  #### 测试 Kubernetes 设置


  在本地机器上安装好 kubectl 和 Minikube 后，我们需要使用以下命令启动 Minikube 服务器。


  ```

  :\> minikube start

  minikube config set WantUpdateNotification false

  Starting local Kubernetes v1.9.0 cluster...

  Starting VM...

  Getting VM IP address...

  Moving files into cluster...

  Setting up certs...

  Connecting to cluster...

  Setting up kubeconfig...

  Starting cluster components...

  Kubectl is now configured to use the cluster.

