  目录中。让我们看看添加到 `ch13/sample05/pom.xml` 文件中的一些值得注意的 Maven 依赖项。`simpleclient_spring_boot`
  和 `simpleclient_hotspot` 依赖项带来了向 Prometheus 暴露指标所需的所有依赖项。`simpleclient_spring_boot`
  依赖项引入了两个类级别的注解：`@EnablePrometheusEndpoint` 和 `@EnableSpringBootMetricsCollector`，它们被添加到
