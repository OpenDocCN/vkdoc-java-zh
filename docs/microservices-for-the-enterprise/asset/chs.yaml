  这个位置。


  客户端 `pom.xml` 中仅有的两个新增项是 `os-maven-plugin` 扩展和 `protobuf-maven-plugin` 插件。`protobuf-maven-plugin`
  插件用于从 IDL 生成 Java 类。另外，请注意我们不需要添加对 `grpc-spring-boot-starter` 的依赖。可以使用以下 Maven 命令从
  IDL 创建 Java 类。默认情况下，它们会被创建在 `target/generated-sources/protobuf/grpc-java` 和 `target/generated-sources/protobuf/java`
  目录下。


  ```

  \> cd sample06

  \> mvn package

  ```


  现在让我们看看客户端代码。`Order Processing`（`sample06/src/main/java/com/apress/ch04/sample06/service/OrderProcessing.java`）微服务通过
  `InventoryClient`（`com/apress/ch04/sample06/InventoryClient.java`）类调用 `Inventory`
  微服务。以下是 `InventoryClient` 的源代码。它使用 `InventoryServiceBlockingStub`（一个从 IDL 生成的类）与
  gRPC 服务通信。


  ```

  public class InventoryClient {

  ManagedChannel managedChannel;

  InventoryServiceBlockingStub stub;

  public void updateItems

  (com.apress.ch04.sample06.model.Item[] items) {

  ItemList itemList = null;

  for (int i = 0; i  0) {

  itemList = ItemList.newBuilder(itemList)

  .addItem(i, item).build();

  } else {

  itemList = ItemList.newBuilder()

  .addItem(0, item).build();

  }

  }

  managedChannel = ManagedChannelBuilder

  .forAddress("localhost", 7000)

  .usePlaintext(true).build();

  stub = InventoryServiceGrpc

  .newBlockingStub(managedChannel);

  stub.updateItems(itemList);

  }

  }

  ```


