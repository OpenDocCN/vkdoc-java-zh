  ## 将 Fluentd 日志收集器与 Docker 结合使用


  Fluentd 是一个可扩展的数据收集工具，以守护进程方式运行。微服务可以将日志发布到 Fluentd。它拥有丰富的插件集，可以从不同来源读取不同格式的日志并解析数据。此外，它还可以格式化、聚合日志，并将其发布到第三方系统，如
  Splunk、Prometheus、MongoDB、PostgreSQL、AWS S3、Kafka 等（见图 13-19）。Fluentd 架构的妙处在于它将数据源与目标系统解耦。无需更改微服务，Fluentd
  即可更改日志的目标系统或添加新的目标系统。它还可以对日志消息进行内容过滤，并根据特定条件决定将日志发布到哪些系统。


  ![../images/461146_1_En_13_Chapter/461146_1_En_13_Fig19_HTML.jpg](img/461146_1_En_13_Fig19_HTML.jpg)


  图 13-19

  Fluentd 的多个输入源和目标系统


  在接下来的章节中，我们将了解如何从运行在 Docker 容器中的微服务向 Fluentd 发布日志。首先，我们将设置 Fluentd，然后了解如何启动微服务并向
  Fluentd 发布日志。


  ### 将 Fluentd 作为 Docker 容器启动


  启动 Fluentd 最简单直接的方法是使用 Docker 容器。在实践中，这也是最常见的方法。在生产环境中，当所有微服务都在 Kubernetes 环境（我们在第
  8 章中讨论过）中运行时，Fluentd 节点（充当守护进程）将与相应的微服务运行在同一个 Pod 中。实际上，你可以将运行 Fluentd 的容器视为微服务的边车（sidecar）（见图
  13-20）。默认情况下，微服务会将日志发布到 `localhost:24224`，这是 Fluentd 通过 TCP 监听的端口。


  ![../images/461146_1_En_13_Chapter/461146_1_En_13_Fig20_HTML.png](img/461146_1_En_13_Fig20_HTML.png)


  图 13-20

  微服务和 Fluentd 容器运行在同一个 Pod 中


  让我们使用以下命令来启动 Fluentd Docker 容器。在此之前，请确保主机文件系统的主目录下有一个名为 `data` 的目录——你也可以使用自己的目录代替
  `~/data`。


  ```

  :\> docker run -d  -p 24224:24224 -v ~/data:/fluentd/log  fluent/fluentd

  ```


  正如我们在第 8 章中学到的，容器是不可变的。换句话说，当容器关闭时，它不会保存我们在其运行期间对其文件系统所做的任何更改。默认情况下，`Order Processing`
  微服务发布到 Fluentd 的所有日志都将存储在容器文件系统的 `/fluent/log` 目录中。为了永久保存这些数据，我们需要使用 Docker 卷。使用上述命令中的
  `–v` 选项，我们将主机文件系统中的 `~/data` 目录映射到容器文件系统中的 `/fluent/log` 目录。即使容器关闭，我们也应该能够在 `~/data`
  目录中找到日志文件。上述命令中的 `–p` 选项将 Docker 容器的 `24224` 端口（Fluentd 默认监听的端口）映射到宿主机的 `24224`
  端口。`fluent/fluentd` 是容器镜像的名称，它将从 Docker Hub 拉取。


  一旦我们启动并运行了 Fluentd，我们就可以启动一个包含 `Order Processing` 微服务的 Docker 容器。




  ### 从 Docker 容器中的微服务向 Fluentd 发布日志


  这里我们将使用贯穿全书的同一个 `Order Processing` 微服务，但不再从源代码构建，而是从 Docker Hub 拉取它。以下命令将启动一个包含
  `Order Processing` 微服务的 Docker 容器（镜像名为 `prabath/sample01`）。


  ```

  :\> docker run -d -p 9000:9000 --log-driver=fluentd prabath/sample01

  ```


  在此命令中，我们使用了值为 `fluentd`^(¹⁶⁶) 的 `log-driver` 参数。Docker 使用此驱动程序将日志从 `stdout`^(¹⁶⁷)（默认情况下）发布到
  Fluentd 守护进程（或运行 Fluentd 的容器）。微服务开发者无需在此处进行任何更改，也无需为 Fluentd 做任何特殊处理。默认情况下，`fluentd`
  日志驱动程序通过 TCP 连接到 `localhost:24224`。如果我们在不同的端口上运行 Fluentd，则需要向 `docker run` 命令传递
  `fluentd-address` 参数，其值指向 Fluentd 容器（例如 `fluentd-address=localhost:28444`）。


  如果一切正常，一旦 `Order Processing` 服务启动，我们应该会在主机文件系统的 `~/data` 目录中看到一些日志。这是我们之前用来创建 Docker
  卷的目录。


  ### 注意


  对 Fluentd 的全面介绍超出了本书的范围。我们建议需要详细了解的读者参考 [`https://docs.fluentd.org/`](https://docs.fluentd.org/)
  上的 Fluentd 文档。


  ### 工作原理


  Fluentd 使用一个配置文件，该文件定义了输入源和输出目标。默认情况下，它位于运行 Fluentd 的容器文件系统的 `/fluentd/etc` 目录中。该文件名为
  `fluent.conf`。让我们看看 `fluent.conf` 的默认内容。`source` 标签定义了数据的来源。在其下方，我们有 `forward` 和
  `port` 元素，这使得 Fluentd 能够通过 TCP 在端口 24224 上接受消息。`source` 标签的职责是接受消息并将其作为事件交给 Fluentd
  路由引擎。每个事件包含三个元素：标签（tag）、时间（time）和记录（record）。发送者（在我们的例子中是 fluentd 驱动程序）定义了标签的值。


  ### 注意


  你可以在此处找到与 Fluentd Docker 镜像相关的所有配置：[`https://hub.docker.com/r/fluent/fluentd/`](https://hub.docker.com/r/fluent/fluentd/)
  。它还解释了如何覆盖镜像附带的默认 Fluentd 配置文件。


  ```

  @type  forward

  @id    input1

  @label @mainstream

  port  24224


  @type stdout


  @type file

  @id   output_docker1

  path         /fluentd/log/docker.*.log

  symlink_path /fluentd/log/docker.log

  append       true

  time_slice_format %Y%m%d

  time_slice_wait   1m

  time_format       %Y%m%dT%H%M%S%z


  @type file

  @id   output1

  path         /fluentd/log/data.*.log

  symlink_path /fluentd/log/data.log

  append       true

  time_slice_format %Y%m%d

  time_slice_wait   10m

  time_format       %Y%m%dT%H%M%S%z


  ```


  `match` 元素将告诉 Fluentd 如何处理匹配的消息。它将每个事件中 `tag` 元素的值与 `match` 元素中定义的条件进行匹配。在我们的例子中，它会检查
  `tag` 是否以单词 `docker` 开头。`match` 元素最常见的用途是定义输出目标。在上述配置中，输出被写入 `/fluentd/log` 目录（在容器中）的一个文件。如果我们想将输出发送到其他不同的系统，我们可以使用任何可用的
  Fluentd 插件^(¹⁶⁸)。最后，在 `source` 元素下定义的 `label` 元素充当一个引用。例如，当执行 `match` 元素时，如果 `source`
  下定义了一个 `label`，那么只有相应 `label` 下的 `match` 元素才会被执行。`label` 元素的目标是降低配置文件的复杂性。


  ### 注意


  Logstash^(¹⁶⁹) 是著名的 ELK（ElasticSearch, Logstash, Kibana）技术栈的一部分，它提供了与 Fluentd 类似的功能。在为你的企业选择日志记录解决方案之前，我们建议评估
  Fluentd 和 Logstash 的优缺点。


  ### 在微服务部署中使用 Fluentd


  在本节中，我们将了解如何从架构上扩展这个 Fluentd 示例，使其适用于生产环境的微服务部署。正如我们所讨论的（如图 13-21 所示），每个 Kubernetes
  Pod（我们在第 8 章讨论过）都会有一个 Fluentd 实例运行在一个容器中。这个容器可以被视为一个边车（sidecar）。我们部署中的每个微服务都会有类似的设置。每个
  Fluentd 节点可以过滤出它们需要的日志，并将其发布到另一个 Fluentd 节点，该节点可以执行日志聚合。这个 Fluentd 节点还可以决定它必须将日志发布到哪些其他目标系统。


  ![../images/461146_1_En_13_Chapter/461146_1_En_13_Fig21_HTML.jpg](img/461146_1_En_13_Fig21_HTML.jpg)


  图 13-21


  生产环境部署中的 Fluentd


  ## 总结


  在本章中，我们讨论了微服务架构的一个关键方面——可观测性——以及可观测性背后的三大支柱：日志记录、指标和链路追踪。我们还讨论了分布式链路追踪，它实际上是实现可观测性最重要的推动因素。分布式链路追踪有助于追踪跨越多个系统的请求。我们使用
  Spring Cloud Sleuth、Zipkin 和 Jaeger 构建了一个分布式链路追踪系统，并使用 Prometheus 和 Grafana 进行可视化、监控和告警。最后，我们讨论了如何在容器化部署中使用
  Fluentd（一个可扩展的日志收集工具）。


