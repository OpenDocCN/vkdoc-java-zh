  首先，让我们启动并运行`库存`微服务。你可以在 `ch04/sample04` 中找到该微服务的代码。这是另一个 Spring Boot 应用程序，与我们目前讨论的内容相比，并没有什么新意。让我们看一下
  `src/main/java/com/apress/ch04/sample04/service/Inventory.java` 类中的 `updateItems`
  方法。该方法简单地接收一个项目数组，遍历它们，并打印项目代码。在本节后面，`订单处理`微服务（`sample01`）将调用此方法来更新库存。


  ```

  @RestController

  @RequestMapping(value = "/inventory")

  public class Inventory {

  @RequestMapping(method = RequestMethod.PUT)

  public ResponseEntity updateItems(@RequestBody Item[] items) {

  if (items == null || items.length == 0) {

  return ResponseEntity.badRequest().build();

  }

  for (Item item : items) {

  if (item != null) {

  System.out.println(item.getCode());

  }

  }

  return ResponseEntity.noContent().build();

  }

  }

  ```


