  ## 引言


  微服务架构已成为企业软件架构领域最流行的架构风格之一。由于其带来的诸多好处，大多数企业正在将其现有的单体应用转型为基于微服务架构的应用。因此，对于任何软件架构师或软件工程师而言，理解微服务架构的关键架构概念，以及如何在实际中运用这些架构原则来解决真实的业务用例，都至关重要。


  在本书中，我们为读者提供对微服务架构原则的全面理解，并讨论如何在真实场景中运用这些概念。同时，我们不局限于特定技术或框架，而是涵盖了一系列广泛的技术和框架，这些技术和框架最适合微服务架构的特定方面。


  本书的另一个关键区别在于，它解决了在企业架构环境中构建微服务时面临的一些基本挑战，例如服务间通信、无集中式企业服务总线（ESB）的服务集成、将微服务作为 API
  暴露以避免集中式 API 网关、确定微服务的范围与大小，以及利用微服务安全模式。本书中解释的所有概念都配有真实用例，并附带了读者可以尝试的示例。这些用例大多受
  Netflix 和 Google 等现有微服务实现，以及作者在旧金山湾区参加各种聚会和会议的启发。


  本书涵盖了一些在实现微服务架构中广泛使用且前沿的技术和模式，例如容器原生部署技术（Docker、Kubernetes、Helm）、消息传递标准与协议（gRPC、HTTP2、Kafka、AMQP、OpenAPI、GraphQL
  等）、响应式与主动式微服务集成、服务网格（Istio 和 Linkerd）、微服务弹性模式（断路器、超时、舱壁等）、安全标准（OAuth 2、JWT 和证书）、使用
  API、事件和流与微服务结合，以及通过日志记录、指标和追踪构建可观测的微服务。


