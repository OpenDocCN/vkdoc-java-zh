  Netflix 采取了三个步骤来构建一个反脆弱组织^(³⁹)。第一步是将每位开发者视为相应服务的运维人员。第二步是将每次失败视为学习的机会，第三步是培养一种无指责文化。这三个小步骤帮助
  Netflix 成为微服务领域的顶尖组织。许多人向 Netflix 学习如何做事以及最佳实践。事实上，Netflix 为交付速度优化了一切。正如我们在本书中已经讨论过的，在任何微服务设计的核心中，上线时间、可扩展性、复杂性本地化和弹性都是关键要素。开发者体验是实现这些目标的最重要因素之一。在微服务环境中，开发者的体验与构建单体应用截然不同。正如
  Netflix 正确指出的那样，开发者的任务在将代码推送到源代码仓库后并未结束，他们不能期望 DevOps 工程师来构建并将更改推送到生产环境，或者期望支持工程师来处理生产环境中出现的任何问题。微服务开发环境要求开发者具备更广泛的技能。


  ### 注意


  所有 Netflix 开发者都拥有 SSH 密钥，可以访问其生产服务器，而在大多数传统应用部署中，开发者从预发布环境开始就没有访问权限。


  在过去几年中，已经开发了许多工具和框架来帮助和加速微服务开发。大多数流行的工具和框架都是开源的。在本章中，我们将讨论微服务开发者可用的不同选项，并了解如何从头构建一个微服务。


  ## 开发者工具和框架


  在不同类别下，有多个工具和框架可供微服务开发者使用。我们认为，在选择合适的微服务框架之前，有几个关键要素需要考虑。最基本的要求之一是对 RESTful 服务有良好的支持。在
  Java 世界中，大多数开发者会关注对 JAX-RS^(⁴⁰) 的支持程度。大多数基于 Java 的框架确实支持基于 JAX-RS 的注解，但为了扩展该功能，它们引入了自己的注解。


  12 因素应用的第 7 个因素（我们在第 2 章“设计微服务”中讨论过）指出，你的应用必须进行端口绑定，并将自身暴露为服务，而无需依赖第三方应用服务器。这是任何微服务框架的另一个常见要求。无需依赖任何占用资源且需要数秒（或数分钟）才能启动的重型应用服务器，你应该能够在短短几毫秒内以自包含的方式启动一个微服务。


  大多数微服务部署遵循每主机单服务模型。换句话说，一个主机上只部署一个微服务，而在大多数情况下，该主机是一个容器。每个人都在微服务框架中寻找的一个关键方面是它对容器友好。什么是容器友好（或容器原生）将在第
  8 章“部署和运行微服务”中详细讨论。语言提供的安全支持水平是选择微服务框架的另一个关键区别因素。有多种方法可以保护微服务并提供微服务之间的服务到服务通信。我们将在第
  11 章“微服务安全基础”中讨论微服务安全。


  对遥测和可观测性的一流语言支持是微服务框架的另一个重要方面。这对于跟踪生产服务器的健康状况和识别任何问题极为有用。我们将在第 13 章“可观测性”中讨论可观测性。微服务框架的另外两个重要方面是它对事务和异步消息传递的支持。异步消息传递在第
  3 章“服务间通信”中讨论过，而在第 5 章“数据管理”中，我们将讨论如何在微服务环境中处理事务。


  以下部分将介绍最流行的微服务框架和工具。在本章后面，我们将通过一组使用 Spring Boot 开发的示例进行讲解，Spring Boot 是 Java 开发者最流行的微服务开发框架。


  ### Netflix OSS


  正如我们在本章中已经讨论过的，Netflix 在微服务领域发挥着主导作用，它对微服务成为主流并被广泛采用的影响是显著的。Netflix 的美丽之处在于其对开源的承诺。Netflix
  开源软件^(⁴¹) (OSS) 计划在不同类别下拥有大约 40 个开源项目（见图 4-1）。以下部分将介绍 Netflix OSS 中与微服务开发相关的一些常见工具。


  #### Nebula


  Nebula^(⁴²) 是一个为 Netflix 工程师构建的 Gradle 插件集合，旨在消除样板构建逻辑并提供合理的约定。Nebula 的目标是简化 Netflix
  项目中常见的构建、发布、测试和打包任务。他们选择 Gradle 而非 Maven 作为构建工具，因为他们认为 Gradle 是 Java 应用的最佳选择。




  #### Spinnaker


  Spinnaker^(⁴³) 是一个多云持续交付平台，用于以高速度和信心发布软件变更。它结合了强大且灵活的管道管理系统，并与主流云提供商集成，包括 AWS EC2、Kubernetes、Google
  Compute Engine、Google Kubernetes Engine、Google App Engine、Microsoft Azure 和 OpenStack。


  #### Eureka


  Eureka^(⁴⁴) 是一个 RESTful 服务，主要用于 AWS 云中定位服务，以实现中间层服务器的负载均衡和故障转移。在微服务部署中，Eureka 可用作服务注册中心来发现端点。


  #### Archaius


  Archaius^(⁴⁵) 包含 Netflix 使用的一组配置管理 API。它允许配置在运行时动态更改，从而使生产系统无需重启即可获取配置变更。为了提供快速且线程安全的属性访问，Archaius
  在配置之上添加了一个包含所需属性的缓存层。它还创建了一个配置层次结构，并以简单、快速且线程安全的方式确定最终的属性值。


  ![../images/461146_1_En_4_Chapter/461146_1_En_4_Fig1_HTML.jpg](img/461146_1_En_4_Fig1_HTML.jpg)


  图 4-1


  Netflix OSS 部署


  #### Ribbon


  Ribbon^(⁴⁶) 是一个进程间通信（远程过程调用）库，内置软件负载均衡器（主要用于客户端负载均衡）。它主要用于支持多种序列化方案的 REST 调用。


  #### Hystrix


  Hystrix^(⁴⁷) 是一个延迟和容错库，旨在隔离对远程系统、服务和第三方库的访问点，阻止级联故障，并在故障不可避免的复杂分布式系统中实现弹性。Hystrix
  实现了第 2 章讨论的许多弹性模式。它使用*舱壁*模式来隔离依赖项之间的相互影响，并限制对任一依赖项的并发访问；同时使用*断路器*模式主动避免与故障端点通信。Hystrix
  将成功、失败、拒绝和超时报告给断路器，断路器维护一组滚动计数器来计算统计数据。它利用这些统计数据来决定何时应“跳闸”，此时它会短路所有后续请求，直到恢复期过去，之后在完成某些健康检查后再次闭合电路^(⁴⁸)。


  #### Zuul


  Zuul^(⁴⁹) 是一个网关服务，提供动态路由、监控、弹性、安全等功能。它充当 Netflix 服务器基础设施的前门，处理来自全球所有 Netflix 用户的流量。它还路由请求、支持开发者测试和调试、提供对
  Netflix 整体服务健康状况的深入洞察、保护其免受攻击，并在 AWS 区域出现问题时将流量引导至其他云区域。


  ### Spring Boot


  Spring Boot^(⁵⁰) 是 Java 开发者最流行的微服务开发框架。准确地说，Spring Boot 为 Spring 提供了一个有主见^(⁵¹)的运行时，消除了许多复杂性。尽管
  Spring Boot 有主见，但它也允许开发者覆盖其许多默认选择。由于许多 Java 开发者熟悉 Spring，并且开发便捷性是微服务世界成功的关键因素，因此许多人采用了
  Spring Boot。即使对于不使用 Spring 的 Java 开发者来说，它也是一个家喻户晓的名字。如果你使用过 Spring，肯定曾为处理庞大臃肿的 XML
  配置文件而烦恼。与 Spring 不同，Spring Boot 完全信奉约定优于配置——不再有 XML 地狱！


  ### 注意


  *约定优于配置*（也称为按约定编码）是一种软件框架使用的软件设计范式，旨在减少使用该框架的开发者需要做出的决策数量，同时又不一定丧失灵活性。^(⁵²)


  Spring Cloud^(⁵³) 于 2015 年 3 月在 Spring Boot 之后推出。它为开发者提供了快速构建分布式系统中一些常见模式的工具。Spring
  Cloud 与 Spring Boot 一起，为微服务开发者提供了出色的开发环境。Spring Cloud 的另一个特点是，它通过自动配置以及与 Spring
  环境和其他 Spring 编程模型惯用法的绑定，为 Spring Boot 应用提供 Netflix OSS 集成。只需几个简单的注解，你就可以在应用中启用和配置常见模式，并使用
  Netflix OSS 组件构建大型分布式系统。提供的模式包括使用 Eureka 进行服务发现、使用 Hystrix 实现断路器、使用 Zuul 实现智能路由，以及使用
  Ribbon 实现客户端负载均衡。我们将在本章后面的代码示例中使用 Spring Boot 和 Spring Cloud。


  ### 注意


  约定优于配置最初由 David Heinemeier Hansson 引入，用于描述 Ruby on Rails Web 框架的哲学。流行的构建自动化工具 Apache
  Maven 遵循相同的哲学。


  ### Istio


  Istio 是一个开放平台，提供统一的方式来连接、管理和保护微服务。它支持管理微服务之间的流量、执行访问策略以及聚合遥测数据，所有这些都无需更改微服务代码。在
  Google、IBM、Lyft 等众多公司的强力支持下，Istio 是微服务领域领先的*服务网格*产品之一。我们将在第 9 章“服务网格”中详细讨论服务网格。目前，服务网格是微服务架构中的一个组件，它促进服务间的通信以及路由规则，遵循我们在第
  2 章中讨论的弹性模式，例如重试、超时、断路器和舱壁。它还执行性能监控和追踪。在大多数情况下，服务网格充当边车（第 2 章），它将负责处理核心微服务实现中的横切特性。关于
  Istio 的更多细节将在第 9 章中介绍。




  ### Dropwizard


  Dropwizard 是一个广泛用于 Java 微服务开发的框架。它以少量固执己见的胶水代码而闻名，这些代码将一组库整合在一起。Dropwizard 包含 Jetty
  用于处理 HTTP 请求。Jetty^(⁵⁴) 提供了一个 Web 服务器和 `javax.servlet` 容器，并支持 HTTP/2、WebSockets、OSGi、JMX、JNDI、JAAS^(⁵⁵)
  以及许多其他集成。Dropwizard 中对 REST 和 JAX-RS（JSR 311 和 JSR 339）的支持是通过 Jersey 实现的。Jersey^(⁵⁶)
  是 JAX-RS 的参考实现。它还集成了 Jackson^(⁵⁷) 用于 JSON 解析和构建，以及 Logback^(⁵⁸) 用于日志记录。Logback 是流行的
  log4j 项目的后继者。


  对指标的支持是任何微服务框架的关键特性，Dropwizard 嵌入了 Metrics^(⁵⁹) Java 库，用于收集与运行中应用程序相关的遥测数据。Dropwizard
  还嵌入了 Liquibase^(⁶⁰)，这是一个开源的、与数据库无关的库，用于跟踪、管理和应用数据库模式变更。它使得跟踪数据库变更更加容易，尤其是在敏捷软件开发环境中。Dropwizard
  的数据库集成是通过 Jdbi 和 Hibernate 完成的。Jdbi^(⁶¹) 构建在 JDBC 之上，旨在改进 JDBC 粗糙的接口，提供一个更自然的 Java
  数据库接口，易于绑定到你的领域数据类型。与 ORM（对象关系映射）不同，它并不旨在提供一个完整的对象关系映射框架——它没有隐藏复杂性，而是提供了构建块，让你可以根据应用程序的需要构建关系与对象之间的映射。Hibernate^(⁶²)
  是 Java 开发者使用的最流行的 ORM 框架。


  Dropwizard 的历史比 Spring Boot 更悠久。事实上，Spring Boot 的诞生正是受到了 Dropwizard 成功的启发。它由 Coda
  Hale^(⁶³) 于 2011 年底在 Yammer 工作时首次发布。然而，凭借更好的开发者体验、强大的社区支持以及 Pivotal 公司的支持，Spring
  Boot 现在已成为比 Dropwizard 更优的选择。


  ### Vert.x


  Vert.x^(⁶⁴) 是一个用于在 JVM（Java 虚拟机）上构建响应式^(⁶⁵) 应用程序的工具包，支持多种语言，包括 Java、JavaScript、Groovy、Ruby、Ceylon、Scala
  和 Kotlin。它由 Tim Fox 于 2012 年在 Eclipse 基金会下作为开源项目启动。即使在微服务成为主流之前，Vert.x 就已经拥有构建微服务的强大技术栈。与
  Dropwizard 不同，Vert.x 是一个非固执己见的工具包。换句话说，它不是一个限制性的框架或容器，不会向开发者宣扬编写应用程序的特定方式。相反，Vert.x
  提供了许多有用的积木，让开发者能够按照自己想要的方式创建自己的应用程序。


  与 Dropwizard 类似，Vert.x 也支持集成 Metrics，用于收集与运行中应用程序相关的遥测数据。此外，它还支持与 Hawkular^(⁶⁶)
  集成，这是一组旨在为常见监控问题提供通用解决方案的开源项目。对于服务发现，Vert.x 集成了 HashiCorp Consul^(⁶⁷)。Consul 使服务能够轻松地注册自身，并通过
  DNS 或 HTTP 接口发现其他服务。Vert.x 支持与多个消息代理集成——例如 Apache Kafka 和 RabbitMQ——以及多种消息协议——例如
  AMQP、MQTT、JMS 和 STOMP。


  总的来说，Vert.x 拥有一个强大的生态系统来构建微服务，但 Spring Boot 凭借 Spring 社区的强力支持，仍然略胜一筹。


  ### Lagom


  Lagom^(⁶⁸) 是一个开源的、固执己见的框架，用于基于响应式原则^(⁶⁹) 使用 Java 或 Scala 构建微服务系统。Lagom 是一个瑞典语单词，意为“恰到好处”或“足够”。它构建在
  Akka^(⁷⁰) 和 Play^(⁷¹) 框架之上。Akka 是一个用于构建高度并发、分布式、有弹性的消息驱动型应用程序的工具包，适用于 Java 和 Scala。Play
  是一个高生产力的 Java 和 Scala Web 应用程序框架，集成了现代 Web 应用程序开发所需的组件和 API。在 Lagom 中，微服务基于以下内容：


  *   *Akka Actors*——通过基于 *Actor 模型* 的共享无状态架构提供隔离性

  *   *Akka Cluster*——为构成微服务的各组独立隔离的服务实例提供弹性、分片、复制、可伸缩性和负载均衡

  *   *ConductR*——提供从底层硬件到微服务实例运行时的隔离和管理^(⁷²)。


  Lagom 基于三个设计原则：消息驱动和异步通信、分布式持久化以及开发者生产力。它将异步通信设为默认方式，默认的持久化模型使用事件溯源和 CQRS（在第 10
  章“API、事件和流”中讨论）——使用 Akka Persistence 和 Cassandra，这种方式非常易于扩展、复制，并能实现完全的弹性。


  Lagom 是一个有前途但相对较新的微服务框架。


