  ### 事件驱动的日志聚合架构


  让我们重新审视图 13-4，这是我们将要在本节讨论内容的高级设计。这里的设计与我们第 2 章“设计微服务”（见图 2-17）中提出的设计略有不同。图 13-8
  展示了根据第 2 章中日志聚合器架构的建议重新设计后的方案。


  ![../images/461146_1_En_13_Chapter/461146_1_En_13_Fig8_HTML.jpg](img/461146_1_En_13_Fig8_HTML.jpg)


  图 13-8


  采用事件驱动日志聚合架构的 Zipkin


  与图 13-4 不同，这里 Zipkin 服务器和微服务之间没有直接耦合。每个微服务将日志发布到消息系统（可以是 RabbitMQ 或 Kafka），然后 Zipkin
  从消息系统中获取日志。这种模型的优势在于，即使 Zipkin 服务器宕机一段时间，微服务也可以独立地继续发布日志，当 Zipkin 重启后，它会从消息系统中获取所有日志。




  ## 开放追踪简介


  当同一微服务部署中的不同微服务使用不同的追踪模块时，分布式追踪会变得相当棘手。例如，`订单处理`微服务可能使用 Sleuth 来生成跨度（span）和追踪（trace），而`库存`微服务则使用另一个模块。两者都可以将追踪数据发布到
  Zipkin，但除非这两个模块共享相同的跨度和追踪定义，并尊重彼此生成的追踪数据，否则这些信息将毫无用处。这迫使开发者在所有微服务中使用相同的追踪模块，这在一定程度上违背了我们引以为傲的微服务多语言架构。*开放追踪*^(¹⁶⁵)
  是一项旨在通过构建开放标准来解决此问题的倡议。它精确地定义了在开放追踪数据模型下什么是跨度，什么是追踪。


  开放追踪必须跨多种编程语言工作。在撰写本文时，它为九种编程语言定义了语言级别的 API：Go、Python、JavaScript、Java、C#、Objective-C、C++、Ruby
  和 PHP。这些 API 已有多种实现。由 Uber 开发的开源分布式追踪系统 Jaeger 支持开放追踪，并包含针对多种编程语言的开放追踪客户端库：Java、Go、Python、Node.js、C++
  和 C#。


  ### 使用 Spring Boot 微服务和 Zipkin 进行基于开放追踪的分布式追踪


  Zipkin 支持开放追踪，但 Sleuth 不支持。你可以将 Sleuth 视为追踪客户端，而 Zipkin 是收集所有追踪数据的服务器。在前面章节讨论的示例中，Sleuth
  被用作 Zipkin 的追踪客户端，并且它使用了 Zipkin 特定的格式，这种格式不适用于开放追踪。在本节中，我们将了解如何从与开放追踪兼容的 Spring
  Boot 微服务发布追踪数据。与此示例相关的源代码位于 `ch13/sample03` 目录中。


