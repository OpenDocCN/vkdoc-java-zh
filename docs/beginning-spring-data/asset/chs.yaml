  \ 容器的执行流程*\n\n第 12 章 单元测试与集成测试\n\n要创建一个检查你的仓库是否正常工作的测试，你只需要对之前的测试类进行一些修改。首先要做的是添加仓库并调用某个方法来简化示例（见清单\
  \ 12-6）。这里使用了**findById**方法，因为 Flyway 在应用程序启动时会填充数据库。\n\n***清单 12-6.** 检查查询操作是否正常工作的基本单元测试*\
  \  \nimport com.apress.catalog.model.Country;\n\nimport org.junit.jupiter.api.AfterAll;\n\
  \nimport org.junit.jupiter.api.BeforeAll;\n\nimport org.junit.jupiter.api.Test;\n\
  \nimport org.springframework.beans.factory.annotation.Autowired;\n\nimport org.springframework.boot.test.context.SpringBootTest;\n\
  \nimport org.springframework.test.context.DynamicPropertyRegistry;\n\nimport org.springframework.test.context.DynamicPropertySource;\n\
  \nimport org.testcontainers.containers.PostgreSQLContainer;\n\nimport org.testcontainers.junit.jupiter.Testcontainers;\n\
  \nimport java.util.Optional;\n\nimport static org.junit.jupiter.api.Assertions.*;\n\
  \n@Testcontainers\n\n@SpringBootTest(webEnvironment = SpringBootTest.WebEnvironment.RANDOM_PORT)\n\
  \npublic class CountryRepositoryIntegrationTest {\n\n@Autowired\n\nCountryRepository\
  \ countryRepository;\n\n//之前的代码无需修改\n\n@Test\n\npublic void should_get_a_country()\
  \ {\n\nOptional<Country> country = countryRepository.findById(1L);\n\nassertAll(\n\
  \n()-> assertTrue(country.isPresent()),\n\n()-> assertEquals(\"AR\", country.get().getCode())\n\
  \n);\n\n}\n\n}\n\n第 12 章 单元测试与集成测试\n\n如果你在控制台或 IDE 中运行测试时一切正常，测试会成功完成。但是，正如你在控制台上看到的，其他测试也在用相同的命令运行，因此一个好的做法是将这种类型的测试分离到另一个配置文件中，以减少单元测试的执行时间。清单\
  \ 12-7 对 pom.xml 文件进行了一些修改，以便使用特定的集成测试配置文件来运行。但你也可以通过 Maven 在某个目标中传递要执行的测试名称来实现同样的效果。\n\
  \n***清单 12-7.** 对 pom 文件进行修改，以便在单独的配置文件中运行集成测试*\n\n\n\n<?xml version=\"1.0\" encoding=\"\
  UTF-8\"?>\n\n<project\n\nxsi:schemaLocation=\"http://maven.apache.org/POM/4.0.0\n\
  \nhttps://maven.apache.org/xsd/maven-4.0.0.xsd\">\n\n<!-- POM 文件其余部分保持不变 -->\n\n\
