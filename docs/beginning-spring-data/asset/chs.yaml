  \ 给予的出色协助。最后，感谢 Steve Anglin 建议并给予我撰写一本关于 Spring Data 书籍的机会。\n\nxv\n\n**引言**\n\n\
  过去，开发者使用 JDBC 等传统方法将信息保存到关系型数据库中。在系统规模较小或维护复杂度不高时，这种方法尚能奏效。随后，Ibatis 和 Hibernate\
  \ 等新技术逐渐兴起，降低了查询的复杂性，简化了对不同关系型数据库的访问，使开发者能够专注于创建出色的应用程序，而无需花费大量时间研究如何连接数据库或减少连接数。\n\
  \n不久之后，许多非关系型数据库出现，解决了某些问题，但其他问题依然存在。作为开发者，仍然需要使用数据库客户端，并应对各种性能问题和/或不良实践。\n\nSpring¹被证明是解决多种问题的方案，无论是依赖注入，还是如何在某个方法/类被调用前后进行拦截。框架的开发者创建出能够降低使用多种数据库（关系型与非关系型）复杂性的工具，这并不令人意外。Spring\
  \ Data 解决了大部分此类问题，提升了开发者的工作效率和创建新应用的能力。\n\n本书将介绍创建可访问多种数据库的应用的基础知识，并演示如何在不同数据库中实现功能。此外，您还将学习有助于减少应用中低效问题的最佳实践。\n\
  \n**为何撰写本书**\n\n那么，为什么要写一本关于 Spring Data 以及如何在多种数据库中持久化信息的书呢？大多数开发者会使用不同的数据库来持久化不同类型的信息；例如，有些人使用\
  \ Redis（一种可能的缓存机制）或 MongoDB（用于保存未来结构可能变化的文档）。我撰写本书的目的是阐释 Spring Data 的强大功能及其最佳实践。\n\
  \n¹ [`spring.io/`](https://spring.io/)\n\nxvii\n\n引言\n\n以下是与数据库使用相关的一些常见问题。\n\n\
  *   如何优化查询或数据库中的操作数量？\n*   如何创建单元测试来验证查询或变更是否正常工作？\n*   如何维护对数据库所有更改的记录？\n*   如何评估查询是否存在性能问题？\n\
  *   对于正在进行的项目，哪个数据库是最佳选择？\n\n这些只是我在本书中试图解答的部分问题。\n\n**本书读者对象**\n\n本书适合具备 Java 编程背景、希望了解\n\
  \n\n\n如何在不同数据库中持久化信息，以及如何创建测试来验证应用程序是否按预期运行。\n\n**注意** 本书不打算深入解释与查询创建相关的*所有*概念。\n\
