  \ setter、getter 和构造方法。\n\n**实体**\n\n表是数据库的关键元素。它们负责包含特定类型的信息，例如产品数据、用户或发票。JPA 提供了一种简单的方法，通过使用不同类型的注解将\
  \ Java 类转换为数据库中的表。其中最重要的有：\n\n\n\n**@Entity** 和 **@Table** 这两个注解都能帮助 JPA 理解类中所有需要持久化到数据库表中的属性。关于实体，另一个需要考虑的事项是重写\
  \ `hashCode` 和 `equals` 方法，以防止与对象内容发生冲突。\n\n清单 4-4 展示了如何通过这两个注解将一个简单的 Java 类转换为具有持久化状态的实体。\n\
  \n***清单 4-4.*** 表示数据库表的实体定义\n\n```java\n@Entity //此注解向 JPA 表明这是一个具有持久化状态的对象\n@Table(name\
  \ = \"country\") //此注解是可选的\npublic class Country implements Serializable {\n\n \
  \   // 所有属性的属性、构造方法、setter 和 getter 方法\n    // 重写 hashcode 和 equals 方法\n}\n```\n\
  \n当数据库中的表名与类名大小写完全一致时，**@Table** 注解中的 `name` 属性是可选的。但在 **@Entity** 注解中，`name` 属性并非可选，因为这是\
  \ Spring Data 检测到该类包含需要持久化信息的唯一方式。不过，在任何情况下都明确指定表名是一种良好的实践，因为如果你决定更改类名，应用程序可能会无法正常工作。通过定义表名，类名就变得无关紧要了，你可以随意更改它。\n\
  \n此外，你还可以定义包含该表的模式（schema），因为 JPA 支持使用多个模式。最常见的用法是为整个表组只定义一个模式。\n\n```java\n@Table(name\
  \ = \"country\", schema = \"catalog\")\n```\n\n第 4 章 持久化与领域模型\n\n现在，让我们按照[第 2 章](https://doi.org/10.1007/978-1-4842-8764-4_2)的说明运行应用程序，看看如果在\
  \ `Country` 类中只定义 **@Entity** 和 **@Table** 而不添加其他内容会发生什么。\n\n```\n2022-04-26 16:17:43.372\
