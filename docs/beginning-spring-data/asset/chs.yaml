  \n第 3 章 Spring Data 与不同类型的持久化\n\n**手动自定义查询**\n\n创建查询以访问数据库的第二种方法是经典方式——以类似于 SQL\
  \ 的格式编写需要执行的查询，并在接口中定义一个方法。清单 3-12 修改了之前的仓库，加入了一个使用代码查找元素的手动查询。\n\n***清单 3-12.***\
  \ 手动查询示例\n\nimport com.apress.catalog.model.Currency;\n\nimport org.springframework.data.jpa.repository.Query;\n\
  \nimport org.springframework.data.repository.CrudRepository;\n\nimport org.springframework.data.repository.query.Param;\n\
  \npublic interface CurrencyRepository extends\n\nCrudRepository<Currency, Long>\
  \ {\n\n// 通用查询\n\nList<Currency> findByCode(String code);\n\nList<Currency> findByCodeAndDescription(String\
  \ code, String\n\ndescription);\n\n// 排序查询\n\nList<Currency> findByDescriptionOrderByCodeAsc(String\
  \ description);\n\nList<Currency> findByDescriptionOrderByCodeDesc(String description);\n\
  \n// 手动查询\n\n@Query(\"SELECT c FROM Currency c where c.code = :code\")\n\nCurrency\
  \ retrieveByCode(@Param(\"code\") String code);\n\n}\n\n声明查询的方式有很多种。\n\n• 将其声明为接口顶部的常量，这样你就可以拥有所有方法的声明，以便理解每个方法。\n\
  \n• 将所有查询外部化到一个属性文件中，并动态导入到每个仓库中。这种方法的一个缺点是，你需要有良好的组织，才能知道哪个文件包含每个仓库的查询。\n\n第 3\
  \ 章 Spring Data 与不同类型的持久化\n\n• 最后，可以有一个类包含特定仓库的所有查询。当你有大量过长的查询时，这种方法很有用。你可以清理仓库，将方法集中在一个地方，所有查询放在另一个地方。同时，定义命名模式以识别每个查询背后的意图。\n\
  \n每种方法都有许多优点和缺点，但哪种方法最适合你，取决于你自己。\n\n既然有自动创建查询的方法，为什么还需要手动创建查询呢？\n\n一个答案是，你需要提高\
  \ Spring Data 生成的查询的性能，或者你不需要表中的所有属性。你是在处理特定的场景。这种情况被称为投影（Projections）19. 另一个答案是，查询过于复杂，以至于没有关键字可以表达它。没有任何规则能解释所有可能需要使用一种机制而非另一种机制的潜在场景。但如果你知道你的应用程序在查询性能方面存在问题，最好的选择可能是尝试手动编写查询，看看效果如何。\n\
  \n**注意** 本书不涵盖 SQL 的所有语句或语法，因为这超出了范围。附录 f 推荐了提供更多信息的书籍和网站。\n\n**实现仓库方法**\n\n\n\n\
  Spring Data 仓库提供的方法涵盖了常见场景，但你也可以通过添加方法来扩展它们。然而，某些场景需要你实现具体逻辑。清单 3-13 创建了一个接口和一个类，该类通过所有逻辑扩展了该接口。\n\
  \n19 [`docs.spring.io/spring-data/jpa/docs/current/reference/html/#projections`](https://docs.spring.io/spring-data/jpa/docs/current/reference/html/#projections)\n\
  \n第 3 章 Spring Data 与不同类型的持久化\n\n***清单 3-13.*** 自定义仓库示例\n\npublic interface CustomCurrencyJPARepository\
  \ {\n\nList<Currency> myCustomFindMethod(String code);\n\n}\n\n@Repository\n\n@Transactional\n\
  \npublic class CustomCurrencyJPARepositoryImpl extends\n\nCustomCurrencyJPARepository\
  \ {\n\n// 包含访问数据库所需的所有依赖项\n\nList<Currency> myCustomFindMethod(String code) {\n\n\
  // 此处为自定义方法的所有逻辑\n\n}\n\n}\n\n清单 3-13 中有一个代码块，你必须在构造函数中注入访问数据库所需的所有依赖项。例如，在关系型数据库中，你需要包含\
  \ `EntityManager`。关于此示例，你最后需要了解的一点是，你可以返回任何实现了 `Iterable`、`List` 和 `Set` 接口的类。但在本例中，你返回的是一个列表，因为这里对元素是否重复没有限制。\n\
  \n看完上一个示例中的代码块后，你可以考虑本节应包含哪些内容。这个问题的答案是，在完全手动编写查询和将创建查询的全部责任委托给 Spring Data 之间，还存在另一种方法。Criteria\
  \ API 提供了一种以编程方式创建查询的方法，可以防止语法错误。要实现这种方法，你必须创建一个包含所有查询创建逻辑的自定义仓库。\n\n让我们以 Criteria\
  \ API 为例。清单 3-14 将一个简单的按代码查找货币的方法转换为一个自定义方法。\n\n***清单 3-14.*** 使用 Criteria API 的自定义查询示例\n\
  \npublic interface CustomCurrencyJPARepository {\n\nList<Currency> myCustomFindMethod(String\
  \ code);\n\n}\n\n第 3 章 Spring Data 与不同类型的持久化\n\n@Repository\n\n@Transactional\n\n\
  public class CustomCurrencyJPARepositoryImpl extends\n\nCustomCurrencyJPARepository\
  \ {\n\nEntityManager em;\n\npublic CustomCurrencyRepositoryImpl(EntityManager em)\
  \ {\n\nthis.em = em;\n\n}\n\nList<Currency> myCustomFindMethod(String code) {\n\n\
  CriteriaBuilder cb = em.getCriteriaBuilder();\n\nCriteriaQuery<Currency> cq = cb.createQuery(Currency.class);\n\
  \n// 你需要定义主实体\n\nRoot<Currency> currency = cq.from(Currency.class);\n\n// 定义查询的所有条件\n\
  \nPredicate codePredicate = cb.equal(currency.get(\"code\"), code);\n\n// 你可以有多个\
  \ where 子句\n\ncq.where(codePredicate);\n\n// 创建查询，然后执行\n\nTypedQuery<Currency> query\
  \ = em.createQuery(cq);\n\nreturn query.getResultList();\n\n}\n\n}\n\n此方法的流程是：首先创建一个负责构建查询元素的\
  \ CriteriaBuilder。之后，你需要指明要获取哪个实体作为响应的一部分，在本例中是 `Currency`。下一步是定义查询的根：即 SQL 语句中\
  \ `FROM XXXX` 块中出现的表。此外，你还可以使用谓词条件包含查询需要匹配的所有条件，这些条件不一定只有一个。你可以根据需要创建任意多个。最后，你需要创建查询并指明你想要的响应类型，可以是列表或单个元素。\n\
  \n第 3 章 Spring Data 与不同类型的持久化\n\n对于 JPA，Spring Data 提供了另一种可能性，即使用类来封装创建查询的所有逻辑。规范（Specifications）是你创建的、用于扩展\
  \ `Specification` 接口的类，它封装了自定义查询的逻辑，但不需要\n\n\n\n创建一个仓库的实现。这种方法有助于你仅通过接口来表示访问数据库的层（参见清单\
  \ 3-15）。\n\n***清单 3-15.*** 使用规约的条件示例\n\npublic class CurrencySpecification implements\
  \ Specification<Currency> {\n\nprivate static final long serialVersionUID = 2753473399996931822L;\n\
  \nCurrency entity;\n\npublic CurrencySpecification(Currency entity) {\n\nthis.entity\
  \ = entity;\n\n}\n\n@Override\n\npublic Predicate toPredicate(Root<Currency> root,\
  \ CriteriaQuery<?>\n\nquery, CriteriaBuilder builder) {\n\n//创建一个新的谓词列表\n\nList<Predicate>\
  \ predicates = new ArrayList<>();\n\nCriteriaQuery<Currency> cq = builder.createQuery(Currency.class);\n\
  \n// 你需要定义主实体\n\nRoot<Currency> currency = cq.from(Currency.class);\n\n// 定义查询的所有条件\n\
  \nPredicate codePredicate = builder.equal(currency.get(\"code\"),\n\nentity.getCode());\n\
  \npredicates.add(codePredicate);\n\nreturn builder.and(predicates.toArray(new Predicate[0]));\n\
  \n}\n\n}\n\n我不想在本章引入更多复杂性。更深入的示例将在本书第二部分给出。\n\n第 3 章 Spring Data 与不同类型的持久化\n\n**总结**\n\
  \n在本章中，你学习了如何使用 Spring Data 提供的特性来访问数据库的类型，例如创建抽象层的仓库，你无法在其中定义执行查询的逻辑。你还可以创建自定义仓库并定义完整的逻辑。\n\
  \n**第 4 章**\n\n**持久化与领域**\n\n**模型**\n\n在上一章中，你学习了 Spring 的基础知识，以及如何构建一个项目，该项目通过使用\
  \ Spring Data 的分层架构，暴露一个端点，将信息持久化到数据库中。然而，该端点仅获取一个实体的信息，而没有任何与其他实体的连接或关系。在关系型数据库中，这种情况并不常见。\n\
  \n本章将解释实体之间的关系，以及如何使用继承来减少 Java 中的重复代码。为此，让我们使用你在第 [1](https://doi.org/10.1007/978-1-4842-8764-4_1)\
  \ 章的图 [1-4](https://doi.org/10.1007/978-1-4842-8764-4_1#Fig4) 中看到的目录数据库模型，该模型表示国家、州、城市和货币的目录列表。\n\
  \n最后，你将学习如何在将信息持久化到数据库之前验证实体的值，因为你可能会向数据库发送导致异常的数据。在大多数情况下，这种类型的情况意味着在大多数相关云提供商中，与跨网络传输信息相关的成本。因此，在将数据发送到数据库之前进行验证至关重要。\n\
  \n**使用注解的 JPA 配置**\n\nJPA 提供了一组注解，用于在实体中提供元数据，其理念是扩展此规范的库/框架使用这些信息来执行某些操作，例如创建表或验证数据库中的模型是否与实体匹配。\n\
  \n这个概念听起来很抽象，但 JPA 使用注解在类中表示数据库中存在的不同类型的元素和关系；例如，表中的列名可能与实体中的列名不同，或者你想指示如果表中的一行被删除，所有与该行有关系的表也需要被删除。你可以在\
  \ **jakarta.persistence** 包中找到大多数与 JPA API 相关的注解。在导入类时检查包很重要，因为许多类在不同库中具有相同的名称。\n\
  \n注解并不是将类中的属性映射到实体的唯一方式。JPA 还提供了使用 XML 描述符文件的方式，这种方式在 Hibernate 的早期版本中使用过。\n\n\n\
  \n如今，使用 XML 声明映射已不常见，但向后兼容性使得大多数 JPA 实现仍可使用它。\n\n在学习注解之前，你已经创建了一个代表数据库中表的实体。如图 4-1\
  \ 所示，灰色背景的表是应用中唯一的表，因此让我们将所有实体创建为普通的 POJO 类，不添加任何注解，因为你将在本章各节中逐步引入它们。\n\n***图 4-1.**\
  \ 整个数据库结构概览*\n\n第 4 章 持久化与领域模型\n\n这个数据库模型很常见。当用户完成结账以指定收货地址时，或当用户需要查找航班时，你可以在大多数电商网站或旅行社网站上看到这类信息。其理念是模拟一个真实场景，但不会过于复杂，因为本书的目标是让你理解\
  \ Spring Data 背后的概念。\n\n请记住，包含所有用于填充数据库的插入语句的数据库结构，存在于包含本书所有源代码的仓库中。\n\n**注意** 本书不涉及如何规范化数据库，以及如何设计一个能减少表间重复元素或信息的模式的利弊。许多书籍对这些概念有非常详细的介绍。\n\
  \n此外，本书也不解释云服务商跨网络传输信息所产生的成本，因为这是一个庞大的话题，需要为每个云服务商单独撰写一本书。互联网上有很多资源详细解释了这一主题。\n\n\
