  \ 中，其目的是执行一组测试，以检查数据库中的所有内容是否正常工作。\n\n如果你的容器出现问题，日志可能会对你有所帮助，但默认情况下这些日志不会显示在测试控制台上。Testcontainers\
  \ 会导出容器的日志。操作很简单，你只需指定日志的导出位置，并将一个消费者附加到 stdout 即可（参见清单 12-8）。\n\n***清单 12-8.***\
