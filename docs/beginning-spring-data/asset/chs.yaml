  \n要执行所有示例，您的机器上需要安装哪个 Java 版本没有限制，但所有示例均使用\n\nJDK 17 编写，这是使用 Spring Boot 3.0 所需的版本。尽管如此，只有少数开发人员在生产环境中使用此版本。根据\
