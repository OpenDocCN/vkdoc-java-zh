  \ implements\n\nCustomCountryRepository {\n\n//之前的源代码\n\n//这是另一种向数据库执行插入操作的方式\n\n\
  *private void* insertByDriver( *Country entity*) {\n\n*//使用驱动进行等价操作*\n\n*Statement*\
  \ query = *QueryBuilder*\n\n. *insertInto*(toTableName( *Country*. *class*))\n\n\
  .value(\"id\", *QueryBuilder*. *literal*( *entity*.getId()))\n\n.value(\"code\"\
  , *QueryBuilder*. *literal*( *entity*.getCode()))\n\n.value(\"name\", *QueryBuilder*.\
  \ *literal*( *entity*.getName()))\n\n.value(\"enabled\", *QueryBuilder*. *literal*(\
  \ *entity*.getEnabled())) 262\n\n第 10 章 Cassandra：宽列数据库\n\n.build();\n\ncassandraTemplate.execute(query);\n\
  \n}\n\n//这些方法从实体中获取数据库中的表名\n\n@SuppressWarnings(\"unused\")\n\nprivate *String*\
