  \n第 6 章 版本控制或迁移变更\n\n现在，您可以使用两种备选方案，并通过标头动态更改 API 的行为。这很棒，但主要问题在于您必须修改这些微服务的消费者以及许多类。\n\
  \n**包含一个库**\n\n解决无需使用标头即可更改应用程序行为这一问题的最佳方法之一是使用像 FF4J12 这样的库，它提供了一个 Web 控制台，可以动态更改值，并对某些用户设置限制。\n\
  \n该库的主要问题是，在编写本书时，它尚不支持 Spring Boot 3.x.x。\n\n***图 6-6.** FF4J Web 控制台*\n\n12 [`ff4j.org/`](https://ff4j.org/)\n\
  \n第 6 章 版本控制或迁移变更\n\n**最佳实践**\n\n功能标志的使用有一些建议或最佳实践。\n\n• **选择正确的位置使用它**。在 Spring\
  \ Data 中，确定包含它的最佳位置。这种情况并非一成不变，取决于您使用的是 DAO 还是仓库。\n• **使用描述性名称**。一个常见的错误是没有创建一个能提供有关该功能所有信息的名称。想象一下\n\
  \n\n您可能有多个应用程序将开关信息保存在同一个数据库中，这可能导致两个或多个应用程序引用不同内容时出现冲突。\n\n• **为技术和非技术用户提供访问机制。**\
  \ 其理念是为每个对微服务或平台负有责任的人提供启用或禁用值的机制。主要问题在于，您需要限制哪些功能可以访问数据库，因为并非所有非技术用户都了解查询的性能。\n\
  \n**总结**\n\n对数据库中的变更进行版本控制，可以记录所有发生的修改，以便您检测问题并进行回滚。有许多工具可以解决这种情况。本章介绍了一些工具，但其他工具不太流行，且无法与多种框架集成。不过，Spring\
  \ Boot 会不时集成新库，因此请定期查看官方文档。\n\n**第 7 章**\n\n**Redis：键/值**\n\n**数据库**\n\n有时，您需要将复杂对象持久化到数据库中，并且/或者需要长时间保存。在这种情况下，键/值存储的作用或多或少类似于\
  \ `Map<K,V>` 类，您需要一个键来获取值，但键不必是字符串。它可以是其他类型，而值可以是简单的字符串或复杂的对象。\n\nRedis1 或 Memcached2\
  \ 是此类数据库的示例，您可以将其与 Spring Boot 的另一个模块（例如缓存机制）一起使用。\n\n这些选项之间的主要区别在于您可以持久化的信息类型数量。Redis\
  \ 支持哈希、字符串、列表和集合数据类型，而 Memcached 仅支持字符串。另一个重大区别是，如果数据库发生故障，Redis 能够将信息持久化到内存或磁盘中。您肯定不希望丢失所有信息。\n\
  \n还有其他区别，但本章的目的并非比较各种键/值数据库选项。根据上述描述，我们选择使用 Redis。\n\n**什么是 Redis？**\n\nRedis 由\
  \ Salvatore Sanfilippo 于 2009 年创建。他开发此解决方案是为了解决其当时所在公司中 Web 分析器的可扩展性问题。该数据库最大的特点之一是其高性能，它是一个轻量级存储，可以保存不同类型的信息。\n\
  \n1 [`redis.io/`](https://redis.io/)\n\n2 [`memcached.org/`](https://memcached.org/)\n\
  \n© Andres Sacco 2023\n\nA. Sacco, *Beginning Spring Data*[, https://doi.org/10.1007/978-1-4842-8764-4_7](https://doi.org/10.1007/978-1-4842-8764-4_7#DOI)\n\
  \n![](img/index-201_1.png)\n\n第 7 章 Redis：键/值数据库\n\n让我们深入了解该数据库最相关的特性。\n\n• Redis\
  \ 支持最大 512 MB 的键/值。\n\n• 它支持字符串、哈希、列表、集合和有序集合数据类型。它还支持保存复杂的数据对象，例如 JSON。\n\n• Redis\
  \ 是单线程的，并且可以水平扩展。此外，它原生支持集群实例。\n\n图 7-1 反映了这些优势。\n\n***图 7-1.** 不同的数据类型*\n\nRedis\
  \ 具有用于持久化和检索信息的架构；根据您的方法，所有这些架构都可以将信息保存在内存中并保存到磁盘上。让我们简要介绍一下这些类型。\n\n• **单一数据库**：一个唯一的实例接收所有请求。如果发生故障，则无法访问信息（见图\
  \ 7-2）。当实例健康时，信息取决于其持久化策略。\n\n![](img/index-202_1.png)\n\n![](img/index-202_2.png)\n\
  \n第 7 章 Redis：键/值数据库\n\n***图 7-2.** 包含所有信息的唯一数据库*\n\n• **高可用性**：这种架构意味着您有两个 Redis\
  \ 实例（见图 7-3）。主实例接收所有\n\n\n\n操作并在从库中复制变更，因此如果主数据库不健康，你可以使用另一个实例访问信息。复制过程并非瞬间完成，通常需要几毫秒，因此信息丢失的可能性很小。\n\
  \n***图 7-3.** 具有复制机制的多数据库*\n\n• **哨兵（Sentinel）**：这是对前述方法的一种轻微改进，其中某些节点负责检测主实例和从实例是否正常运行并能响应请求（见图\
  \ 7-4）。\n\n![](img/index-203_1.png)\n\n第 7 章 Redis：键/值数据库\n\n***图 7-4.** 具有哨兵机制的多数据库*\n\
  \n• **集群（Cluster）**：这种方法意味着可以拥有多个主实例和从实例，其理念是共享信息，即某些信息存在于一个主实例中，但不在其他主实例中，同时保持信息在一个从实例中的复制机制（见图\
  \ 7-5）。当请求量巨大且信息量庞大时，这种方法尤其有用。\n\n![](img/index-204_1.png)\n\n第 7 章 Redis：键/值数据库\n\
  \n***图 7-5.** 主节点之间具有通信机制的多数据库*\n\nSpring Data 支持所有这些方案，你可以通过 **application.yml**\
  \ 进行配置。\n\n**Spring Data 数据结构**\n\nSpring Data Redis3 与 JPA 版本的理念相同，旨在通过提供一组类或组件来简化与数据库交互的复杂性，从而实现简单交互。它们包含以下组件。\n\
  \n• **驱动程序**负责与数据库交互以执行所有操作。\n\n• **RedisConnection/RedisConnectionFactory** 负责与驱动程序交互，并将所有操作和异常转换为类似于\
  \ JPA 仓库的形式。\n\n• **实体**表示并包含你在数据库中持久化的所有信息。这是为 Spring Data（JPA、Redis、Cassandra）实现保持特定标准的好方法。不过，你也可以省略这些类，使用简单的字符串或\
  \ DTO 来持久化信息。\n\n3 [`spring.io/projects/spring-data-redis`](https://spring.io/projects/spring-data-redis)\n\
  \n第 7 章 Redis：键/值数据库\n\n• **序列化器**提供了一种以其他格式在数据库中持久化和获取信息的方式。例如，你可以将对象转换为字符串并压缩信息以减小信息体积，当需要持久化大量行时，这极为有用。一些云提供商（如\
  \ AWS）会根据 Redis 所需的内存收费。\n\n• **其他组件**（使用哨兵或主/从支持）的连接方式与驱动程序类似。\n\nSpring Data 秉承了为每种数据库引入少量依赖的理念。在\
  \ Redis 中，你只需包含 Redis 的特定依赖和驱动程序，后者在后台负责与数据库交互，并执行保存或获取信息的操作。\n\nSpring Data Redis\
  \ 支持诸如 Jedis、4 Lettuce、5 JRedis6 和 RJC7 等驱动程序，但开发人员中最流行的是前两个选项。这些选项之间的主要区别在表 7-1\
  \ 中进行了对比。\n\n***表 7-1.** 客户端差异*\n\n**Jedis**\n\n**Lettuce**\n\n不支持响应式连接，会阻塞连接\n\n\
