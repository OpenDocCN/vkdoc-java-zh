  \njava.time.duration\n\nJPA 2.2 支持 **java.time** Java 8 包中的所有新类。它提供了许多以前存在于 Joda\
  \ 库中的新方法。不过，如果你使用的是旧版本的 JPA，可能会在代码中看到 **java.sql.Date** 和 **java.util.Date** 之间的转换。\n\
  \n**二进制类型**\n\n当需要保存大量数据（如书籍、视频、音频或照片）时，SQL 类型中有多种格式可以解决这个问题。表 4-5 展示了不同 SQL 类型与\
  \ Java 类之间的对应关系。\n\n第 4 章 持久化与领域模型\n\n***表 4-5.** 二进制类型的对应关系*\n\n**ANSI SQL 类型**\n\
  \n**Java 类型**\n\nVarBinarY\n\nbyte[ ], java.lang.Byte[ ],\n\njava.io.serializable\n\
  \nBloB\n\njava.sql.Blob\n\nCloB\n\njava.sql.Clob\n\nnCloB\n\njava.sql.Clob\n\nlonGVarBinarY\n\
  \nbyte[ ], java.lang.Byte[ ]\n\n**注意** BloB 和 CloB 被称为 LOB（大型对象类型）。每种类型都有\n\n\n\n\
  保存某些内容的职责，但两者的主要思想都是保存大量信息。下文将对它们逐一进行描述。\n\n• **BLOB**（二进制大对象）用于存储二进制文件，例如视频、GIF\
  \ 和音频文件。\n• **CLOB**（字符大对象）用于存储包含文本的大型文件，例如 PDF 文档、文本文件和 JSON 文件。\n• 根据数据库的不同，存在多种格式；例如，在\
  \ MySQL 中，`TEXT` 类型代表一种 CLOB。\n\n**其他类型**\n\n其他类型不属于按条件分组的范畴。在大多数情况下，使用它们可以方便地减少从数据库获取信息后的任何转换。表\
  \ 4-6 展示了一些最相关的 SQL 类型及其与 Java 类的对应关系。\n\n第 4 章 持久化与领域模型\n\n***表 4-6.** 其他类型之间的对应关系*\n\
  \n**ANSI SQL 类型**\n\n**Java 类型**\n\n`NUMERIC`\n\n`java.math.BigInteger`\n`java.math.BigDecimal`\n\
  \n`INTEGER`, `NUMERIC`, `SMALLINT`, `TINYINT`, `BIGINT`,\n`ENUM`\n`DECIMAL`, `DOUBLE`,\
  \ `FLOAT`, `CHAR`, `LONGVARCHAR`, `VARCHAR`\n\n`VARCHAR`\n\n`java.util.Currency`\n\
  `java.lang.Class`\n`java.util.Locale`\n[`java.net.URL`](http://java.net.URL)\n\n\
  枚举可以保存为多种类型，并直接映射到 Java 类中的枚举。其解释是，你可以将枚举保存为字符串或像数字这样的序数类型，并将将列信息转换为枚举值的职责委托给框架。为了实际理解这个概念，让我们创建一个洲际枚举，并在\
  \ Country 实体中包含一个属性。\n\n```java\nimport jakarta.persistence.Enumerated;\nimport\
  \ jakarta.persistence.EnumType;\n\npublic enum Continent {\n    SOUTH_AMERICA, NORTH_AMERICA,\
  \ EUROPE, ASIA, AFRICA, ANTARCTIC;\n}\n\n@Entity // 这向 JPA 表明这是一个具有持久化状态的对象\n@Table(name\
  \ = \"country\") // 这是可选的\npublic class Country implements Serializable {\n\n  \
  \  @Enumerated(EnumType.STRING)\n    private Continent continent;\n\n    // 所有属性的属性、构造器、setter\
  \ 和 getter 方法\n    // 重写 hashcode 和 equals 方法\n}\n```\n\n第 4 章 持久化与领域模型\n\n现在先不要在\
  \ Country 类中包含 continent 属性。第 [6 章](https://doi.org/10.1007/978-1-4842-8764-4_6)\
  \ 将解释如何使用 Flyway 或 Liquibase 等工具，通过对表或列的变更进行版本控制来向数据库引入修改。\n\n**非持久化属性**\n\nJPA\
  \ 提供了指示不需要持久化到数据库中的属性的可能性。这并非最佳实践，但有很多理由这样做，例如，一个在实体内部包含逻辑的旧应用程序。\n\n让我们回到你的 Country\
  \ 实体，并映射实体之间的关系，但在属性上添加 **@Transient** 注解。如果你在包含此注解的情况下运行应用程序，应用程序将毫无问题地运行，因为 JPA\
  \ 会忽略该属性，并且不会在表和实体之间创建关系。\n\n清单 4-7 展示了 Country 实体在包含一些瞬态属性时的样子。\n\n***清单 4-7.**\
  \ 非持久化属性的定义*\n\n```java\nimport jakarta.persistence.Transient;\nimport jakarta.persistence.Entity;\n\
  import jakarta.persistence.Table;\n\n@Entity // 此注解向 JPA 表明这是一个具有持久化状态的对象\n@Table(name=\
  \ \"country\") // 此注解是可选的\npublic class Country {\n\n    @Transient\n    private\
  \ Currency currency;\n\n    // 所有属性的属性、构造器、setter 和 getter 方法\n    // 重写 hashcode\
  \ 和 equals 方法\n}\n```\n\n第 4 章 持久化与领域模型\n\n**主键与生成器**\n\n主键是讨论最多的话题之一，因为有很多方法或途径来决定哪种类型最适合用作主键。有时，最佳选择是使用\
  \ Long 类型的主键，因为你在数据库中保存的行数较少。另一方面，你可能有一个包含海量行数的实体，那么使用 UUID 可能是一个不错的选择。此外，使用 UUID\
  \ 的另一个原因是出于安全考虑，因为如果你的\n\n\n\n应用程序暴露了一个端点，该端点使用 ID 提供实体的所有信息。\n\n你可以递增或递减 ID 来获取表中的行，而如果使用\
  \ UUID，则可以降低他人知晓数据库中哪些有效 UUID 存在的风险。\n\n**注意** 使用 VarChar（这是在数据库中表示 UUID 的方式）的效率低于使用数值类型（如\
  \ BigInt 或 Integer）。此外，数值类型比 VarChar 占用更少的空间。\n\n如果你使用 VarChar 来保存 UUID，请考虑该列的长度，因为有时该列的大小较小。当你尝试持久化信息时，会出现异常。\n\
  \n本书旨在解释某种方法在何种场景下优于另一种方法。请将此解释视为一种说明，即不存在适用于所有情况的正确答案，因此你可能会发现某个旧应用程序并未遵循你在本节第一部分中读到的任何方法。\n\
  \n选择实体的主键后，下一步是定义生成值的策略。为此，你需要在充当主键的属性声明上添加 `@GeneratedValue` 注解，并指明生成机制。这样做之后，JPA\
  \ 会在持久化实体之前完成该值的填充。\n\n让我们修改 Country 实体，以包含生成值的策略，并将指示下一个值的责任委托给数据库（参见清单 4-8）。\n\
  \n***清单 4-8.*** 主键生成策略的定义\n\n```java\nimport jakarta.persistence.Column;\nimport\
  \ jakarta.persistence.Entity;\nimport jakarta.persistence.GeneratedValue;\nimport\
  \ jakarta.persistence.GenerationType;\nimport jakarta.persistence.Id;\nimport jakarta.persistence.Table;\n\
  \n@Entity // 此注解向 JPA 表明这是一个具有持久化状态的对象\n@Table(name= \"country\") // 此注解是可选的\npublic\
  \ class Country implements Serializable {\n\n    @Id\n    @GeneratedValue(strategy\
  \ = GenerationType.SEQUENCE)\n    private Long id;\n\n    // 所有属性的属性、构造方法、setter\
  \ 和 getter 方法\n    // 重写 hashcode 和 equals 方法\n}\n```\n\n清单 4-8 展示了一种生成主键值的策略，但\
  \ JPA 提供了一个包含多个选项的枚举。让我们看看每个可用的选项。\n\n• **GenerationType.SEQUENCE** 在数据库中定义一个数值序列，因此在将信息持久化到\
  \ JPA 表之前，会调用该序列以获取要插入表中的下一个数值。\n使用序列的主要好处是，你可以在直接由一张表关联的多个表的任何列中使用它，但通常的做法是将其用于特定目的。支持使用\
  \ SEQUENCE 的数据库包括 Oracle 和 PostgreSQL。\n\n**注意** 每个数据库都有其特定的方式来指示生成序列的策略。让我们看看如何在\
  \ PostgreSQL 中声明。\n\n```sql\nCREATE TABLE IF NOT EXISTS city\n(\n    id bigint GENERATED\
  \ ALWAYS AS IDENTITY PRIMARY KEY,\n    name varchar(80) NOT NULL,\n    enabled BOOLEAN\
  \ DEFAULT true NOT NULL,\n    state_id bigint NOT NULL REFERENCES state(id)\n);\n\
  ```\n\n**注意** 根据数据库版本的不同，也可以在表结构之外声明生成器作为替代方案。\n\n```sql\nCREATE SEQUENCE city_id_seq;\n\
  \nCREATE TABLE IF NOT EXISTS city\n(\n    id bigint DEFAULT NEXTVAL('city_id_seq')\
  \ NOT NULL,\n    name varchar(80) NOT NULL,\n    enabled BOOLEAN DEFAULT true NOT\
  \ NULL,\n    state_id bigint NOT NULL REFERENCES state(id)\n);\n```\n\n• **GenerationType.IDENTITY**\
  \ 是一种特殊的幕后列，其功能与 SEQUENCE 检查相同，即获取下一个可用的值。某些数据库不支持定义 SEQUENCE，因此它们拥有像这样作为自增值的替代特殊列。\n\
  \n让我们检查一下 MySQL 中 City 表的定义。\n\n```sql\nCREATE TABLE IF NOT EXISTS city\n(\n   \
  \ id bigint NOT NULL AUTO_INCREMENT,\n    name varchar(80) NOT NULL,\n```\n\n\n\n\
  enabled BOOLEAN DEFAULT true NOT NULL,\n\nstate_id bigint NOT NULL state(id),\n\n\
  PRIMARY KEY (id)\n\n);\n\n第 4 章 持久化与领域模型\n\n• **GenerationType.TABLE** 是一种替代方案，适用于不支持使用\
  \ SEQUENCE 的数据库；例如，MySQL 5.7 及更低版本就不支持。其目标是在你的模式中创建一个表，该表为每个需要生成 ID 的实体包含一行，该行的值即为下一个可用的值。\n\
  \n• **GenerationType.AUTO** 是一种策略，它会考虑你所使用的数据库，并定义出最佳选项。你可以在注解中指明此策略，或者不写任何内容直接使用\
  \ **@GeneratedValue()**，因为这两种情况表示的含义相同。\n\n**注意** 存在许多表生成器的实现，用于优化并降低冲突风险。例如 hilo\
  \ 和 pooled 优化器，它们是 Hibernate 的一部分。对这些实现的详细解释超出了本书的范围，但你可以在 Vlad Mihalcea 的博客¹中找到很好的解释。\n\
  \n始终指明生成值的策略是一种好做法，这样可以更好地进行控制，而不是将决策委托给 Spring Data（Spring Data 又会委托给 Hibernate），由它来决定哪种策略最适合你。\n\
  \n**关系类型**\n\n在定义数据库结构时，许多表之间都存在关联，以减少冗余信息。当一个表中存在外键，而另一个表中存在主键时，你就能看到表之间的关系。\n\n\
  JPA 提供了一组注解，用于声明实体之间的关系类型。如果从一个实体就能访问到两个实体的信息，那么这种关系可以是单向的；例如，你可以获取某个国家使用的货币信息，但反之则不行。另一方面，如果可以从任何一个实体导航到另一个实体，则存在双向关系。\n\
  \n¹ [`vladmihalcea.com/migrate-hilo-hibernate-pooled/`](https://vladmihalcea.com/migrate-hilo-hibernate-pooled/)\n\
  \n![](img/index-123_1.png)\n\n第 4 章 持久化与领域模型\n\n下面描述了实体之间的关系类型。\n\n• **@ManyToOne**\
  \ 是最常见的关系类型，其中多个实体引用同一个实体；例如，在目录应用中，多个国家可能使用同一种货币。Spring Data 使用一个表中的外键来与另一个表进行连接；例如，国家表使用\
  \ currency_id 来与货币表中的 id 列进行连接。\n\n另一种替代方案是 **@OneToMany**，当你试图建立双向关系时使用，但在你的表中，这两种类型实际上是相同的。要建立双向关系，两个实体都需要拥有一个指向另一个实体的属性，其中一个使用\
  \ @ManyToOne，另一个使用 @OneToMany。例如，在目录应用中，存在多个 @ManyToOne 关系。让我们来建立 Country 和 Currency\
  \ 实体之间的连接。\n\n在 Country 实体中，有一个带有 @ManyToOne 注解的 Currency 属性；而在 Currency 中，你可以添加一个带有\
  \ @OneToMany 注解的 Country 属性。这就是生成双向关系的方式。一对多关系的示例见图 4-2。\n\n***图 4-2.** 目录应用的两个表*\n\
  \n• **@OneToOne** 不是最常见的关系类型。一个表拥有一个与另一个表主键关联的外键，且无法引用多行。这种类型的一个问题在于，当你创建双向关系时，两个实体都使用非空值来引用对方。这可能会引发异常，因为一个实体需要另一个实体在数据库中存在，反之亦然，这就像死锁一样。为了解决这个问题，其中一个实体需要允许空值。\n\
  \n![](img/index-124_1.png)\n\n第 4 章 持久化与领域模型\n\n\n因此，你有一种方法来持久化一个实体，然后使用它来将引用放入另一个实体中。\n\
  \n• **@ManyToMany** 是最复杂的关系之一。如果你之前使用过数据库，你就会知道这种关系意味着创建一个包含两个表主键的中间表。在 JPA 世界中，这三个表变成了两个实体，而\
  \ JPA 的具体实现负责理解查询方式，并隐藏或抽象其在数据库中的实现细节。\n\n例如，让我们将 Country 和 Currency 之间的关系转换为多对多关系，这样一个国家可以有多种货币，一种货币也可以与多个国家关联。数据库的结构类似于图\
  \ 4-3，但在你的目录应用程序中，只有两个实体：Country 和 Currency。\n\n***图 4-3.** 将关系转换为多对多关系的假设情况*\n\n\
  在所有类型的关系中，你都可以指明是否接受空值，这表示数据库中的列是否可以有一个值。当你在关系中指明此信息时，它会影响 Hibernate 为获取信息而生成的查询。例如，在一个\
  \ **@ManyToOne** 关系中，如果你允许空值，查询会使用 **LEFT JOIN** 代替，而相反的情况则使用 **INNER JOIN**。如果你在注解中未指明任何内容，则该列接受空值。\n\
  \n**注意** 在某些情况下，实体之间的关系与数据库中的表数量并不直接相关；例如，如果你在两个实体之间建立了多对多关系，它可能会转化为三个表。这种“奇怪”的情况有一个简单的解释：JPA\
  \ 及大多数实现向开发者隐藏了数据库结构的细节。\n\n在前几章中，你运行了用于填充数据库的脚本，表之间的关系是存在的，但并未在实体中进行映射。现在是时候映射实体关系了，因此让我们移除\
  \ Country 中的 @Transient 注解，并包含 **@ManyToOne** 注解，这是一对多关系的一种变体（参见代码清单 4-9）。\n\n***代码清单\
  \ 4-9.** 两个实体之间关系的定义*\n\n```java\nimport jakarta.persistence.Column;\nimport jakarta.persistence.Entity;\n\
  import jakarta.persistence.FetchType;\nimport jakarta.persistence.JoinColumn;\n\
  import jakarta.persistence.ManyToOne;\nimport jakarta.persistence.Table;\n\n@Entity\n\
  @Table(name= \"country\")\npublic class Country {\n\n    @ManyToOne\n    @JoinColumn(name\
  \ = \"currency_id\", nullable = false)\n    private Currency currency;\n\n    //\
  \ 所有属性的属性、构造器、setter 和 getter 方法\n    // 重写 hashcode 和 equals 方法\n}\n```\n\n![](img/index-126_1.png)\n\
  \n定义 Country 表中作为外键的列名非常重要，以指示 Spring Data 如何匹配表。\n\n让我们运行应用程序，并使用特定的 ID 调用 country\
  \ 端点。如果你还没有创建所有与 Currency 实体逻辑相同的类来访问信息，那么现在是时候创建了。检查一切是否正常工作的最佳方法是调用端点并检查响应，如图\
  \ 4-4 所示。\n\n***图 4-4.** 调用 country 端点的结果*\n\n**懒加载与急加载**\n\n图 4-4 显示，当你添加两个或多个实体之间的关系时，端点响应会提供所有信息，而这些信息并非在所有情况下都是必需的。\n\
  \n想象一下，在将信息发送到数据库之前，你想检查一个国家是否存在。因此，你调用一个方法，该方法接收代码并返回这些国家。\n\n\n\n特定代码。你无需检查任何与货币关系相关的内容，\n\
  \n因此有必要将货币信息加载到内存中。\n\nJPA 提供了一种机制，可以在你需要之前减少内存中的数据量。\n\n实现方法是在表示两个实体之间关系的注解中添加一个属性\
  \ **fetch**。该属性有两个可能的值。\n\n• **FetchType.LAZY** 指示 JPA 实现，在有人调用属性的 get 方法之前，无需获取关系的信息。在幕后，本例中的\
  \ Hibernate 会在表示该关系的属性中插入一个代理，该代理知道需要执行哪些查询来获取信息。这种方法在应用程序中占用更少的内存，并能让你更快地加载信息；另一方面，如果你总是需要获取关系的信息，执行操作的成本会增加，耗时也更长。\n\
  \n• **FetchType.EAGER** 指示 JPA 实现，在执行查询时必须获取所有其他实体的信息。使用这种方法，你可以减少初始化时间，因为当你在内存中拥有一个实体时，你就拥有了所有信息；另一方面，查询执行可能会花费更多时间，并对应用程序的性能产生负面影响。\n\
  \n这两种方法在性能方面各有利弊。标准做法是使用所有关系都设为 `FetchType.LAZY` 的方式，以提高应用程序性能，并显式地获取其他实体的信息。\n\n\
  让我们修改 Country 实体，以指示与货币的关系在执行查询时不需要加载所有信息（参见清单 4-10）。\n\n第 4 章 持久化与领域模型\n\n***清单\
  \ 4-10.*** 加载信息的定义\n\nimport jakarta.persistence.Column;\n\nimport jakarta.persistence.Entity;\n\
  \nimport jakarta.persistence.FetchType;\n\nimport jakarta.persistence.JoinColumn;\n\
  \nimport jakarta.persistence.ManyToOne;\n\nimport jakarta.persistence.Table;\n\n\
  @Entity\n\n@Table(name= \"country\")\n\npublic class Country implements Serializable\
  \ {\n\n@ManyToOne(fetch = FetchType.LAZY)\n\n@JoinColumn(name = \"currency_id\"\
  , nullable = false)\n\nprivate Currency currency;\n\n// 所有属性的属性、构造方法、setter 和 getter\
  \ 方法\n\n*// 重写 hashcode 和 equals 方法*\n\n}\n\n在幕后，根据从 Country 实体获取数据的策略，你会看到一条或两条查询，如表\
  \ 4-7 所示。\n\n第 4 章 持久化与领域模型\n\n***表 4-7.** 按策略执行的数据库查询*\n\n**FetchType.LAZY**\n\n\
  **FetchType.EAGER**\n\nhibernate: select country0_.id as id1_0_0_, country0_.\n\n\
  hibernate: select country0_.id\n\ncode as code2_0_0_, country0_.currency_id as\n\
  \nas id1_0_0_, country0_.code as\n\ncurrency7_0_0_, country0_.enabled as enabled3_0_0_,\
  \ code2_0_0_, country0_.currency_id\n\ncountry0_.locale as locale4_0_0_, country0_.name\
  \ as\n\nas currency7_0_0_, country0_.enabled\n\nname5_0_0_, country0_.time_zone\
  \ as time_zon6_0_0_ as enabled3_0_0_, country0_.locale\n\nfrom country country0_\
  \ where country0_.id=?\n\nas locale4_0_0_, country0_.name as\n\nhibernate: select\
  \ currency0_.id as id1_1_0_, currency0_. name5_0_0_, country0_.time_zone\n\ncode\
  \ as code2_1_0_, currency0_.decimal_places\n\nas time_zon6_0_0_, currency1_.\n\n\
  as decimal_3_1_0_, currency0_.description as\n\nid as id1_1_1_, currency1_.code\
  \ as\n\ndescript4_1_0_, currency0_.enabled as enabled5_1_0_ code2_1_1_, currency1_.decimal_\n\
  \nfrom currency currency0_ where currency0_.id=?\n\nplaces as decimal_3_1_1_, currency1_.\n\
  \ndescription as descript4_1_1_,\n\ncurrency1_.enabled as enabled5_1_1_\n\nfrom\
  \ country country0_ left outer join\n\ncurrency currency1_ on country0_.\n\ncurrency_id=currency1_.id\
  \ where\n\ncountry0_.id=?\n\nObjectMapper 使用 GET 方法将值从一个对象复制到另一个对象。\n\n因此，JPA 认为有人需要关于懒加载关系的信息，并获取该信息。\n\
  \n\n\n因此，当你调用国家端点时，会获取所有货币信息，因为 MapStruct 未配置为在映射期间忽略某些属性。\n\n**排序**\n\n当你有两个或更多关联实体，且其中一个实体包含另一个实体的元素列表时，JPA\
  \ 或 Hibernate 执行查询时不会考虑顺序。你有两个选择：在应用程序中对元素进行排序，或者将排序责任委托给数据库。\n\n让我们修改目录应用程序，在国家（country）和州（state）之间建立双向关系，以便更详细地了解情况并学习如何解决（参见清单\
  \ 4-11）。Country 实体添加了一个类型为 State 的 List 属性。\n\n第 4 章 持久化与领域模型\n\n***清单 4-11.***\
  \ 添加双向关系\n\n@Entity\n\n@Table(name= \"country\")\n\npublic class Country implements\
  \ Serializable {\n\n@OneToMany(fetch = FetchType.LAZY)\n\n@JoinColumn(name = \"\
  country_id\", nullable = false, updatable = false,\n\ninsertable = false)\n\nprivate\
  \ List<State> states;\n\n// 所有属性的属性、构造器、setter 和 getter\n\n*// 重写 hashcode 和 equals*\n\
  \n}\n\n**注意** 在 **@JoinColumn** 注解中，属性 **updatable** 和 **insertable** 设置为 false，表明修改关联实体并非该实体的职责。\n\
  \n下一步需要修改 State 实体，使其包含 **updatable** 和 **insertable** 属性，并对 DTO 进行相同处理（参见清单 4-12）。\n\
  \n***清单 4-12.*** 添加双向关系\n\n@Entity\n\n@Table(name= \"state\")\n\npublic class State\
  \ implements Serializable {\n\n@ManyToOne(fetch = FetchType.LAZY)\n\n@JoinColumn(name\
  \ = \"country_id\", nullable = false, updatable = false,\n\ninsertable = false)\n\
  \nprivate Country country;\n\n// 所有属性的属性、构造器、setter 和 getter\n\n*// 重写 hashcode\
  \ 和 equals*\n\n}\n\n第 4 章 持久化与领域模型\n\n当你使用 MapStruct 并自动执行时，从一个对象到另一个对象的映射器会调用所有\
  \ get 方法，因此 Spring Data 会假定你需要所有懒加载集合的信息。这种双向关系的主要问题在于会产生无限循环，因此你需要在 State 实体中排除\
  \ country 字段。为了解决这个问题，你必须修改 ApiMapper 类并创建一个自定义映射器（参见清单 4-13）。\n\n***清单 4-13.***\
  \ 自定义 Country 实体的映射器\n\nimport com.apress.catalog.dto.CountryDTO;\n\nimport com.apress.catalog.dto.CurrencyDTO;\n\
  \nimport com.apress.catalog.dto.StateDTO;\n\nimport com.apress.catalog.model.Country;\n\
  \nimport com.apress.catalog.model.Currency;\n\nimport com.apress.catalog.model.State;\n\
  \nimport org.mapstruct.Mapper;\n\nimport org.mapstruct.Mapping;\n\nimport org.mapstruct.factory.Mappers;\n\
  \n@Mapper(componentModel = \"spring\")\n\npublic interface ApiMapper {\n\nApiMapper\
  \ INSTANCE = Mappers.getMapper( ApiMapper.class );\n\nCurrencyDTO entityToDTO(Currency\
  \ currency);\n\nCurrency DTOToEntity(CurrencyDTO currency);\n\nCountryDTO entityToDTO(Country\
  \ country);\n\nCountry DTOToEntity(CountryDTO country);\n\n@Mapping(target=\"country\"\
  , ignore = true) //排除 country 元素以防止递归映射\n\nStateDTO stateToStateDTO(State state);\n\
  \nState stateDTOToState(StateDTO state);\n\n}\n\n现在运行应用程序并请求端点以获取某个国家的所有信息。当你获取端点响应时，所有州的顺序与数据库中按\
  \ ID 排序的顺序相同（参见图 4-5）。\n\n![](img/index-132_1.png)\n\n第 4 章 持久化与领域模型\n\n***图 4-5.**\
  \ 未对州进行排序时调用国家端点的结果。*\n\n第 4 章 持久化与领域模型\n\n为了向 JPA 指示州列表需要按条件排序，请添加带有列名的 **@OrderBy**\
  \ 注解（参见清单 4-14）。\n\n***清单 4-14.*** 针对特定列的实体排序\n\n@Entity\n\n\n\n@Table(name= \"\
  country\")\n\npublic class Country implements Serializable {\n\n@OneToMany(fetch\
  \ = FetchType.LAZY)\n\n@JoinColumn(name = \"country_id\", nullable = false, updatable\
  \ = false,\n\ninsertable = false)\n\n@OrderBy(value = \"id\")\n\nprivate List<State>\
  \ states;\n\n// 所有属性的属性、构造方法、setter 和 getter\n\n*// 重写 hashcode 和 equals*\n\n}\n\
  \n在实体中进行此修改后，当你获取状态列表时，Spring Data 会执行一个查询，并根据你在属性值中指定的列名进行排序。\n\nHibernate: select\
  \ states0_.country_id as country_5_2_0_, states0_.id as\n\nid1_2_0_, states0_.id\
  \ as id1_2_1_, states0_.code as code2_2_1_, states0_.\n\ncountry_id as country_5_2_1_,\
  \ states0_.enabled as enabled3_2_1_, states0_.\n\nname as name4_2_1_ from state\
  \ states0_ where states0_.country_id=? **order by**\n\nstates0_.code\n\n最后，重新运行应用程序，并发出与图\
  \ 4-5 相同的请求。如图 4-6 所示，所有状态都按代码排序显示。\n\n![](img/index-134_1.png)\n\n第 4 章 持久化与领域模型\n\
  \n***图 4-6.** 调用带有状态排序的国家/地区端点后的结果* 119\n\n第 4 章 持久化与领域模型\n\n最后，这种排序方式始终按同一方向进行，因此，如果你需要不同的条件来对状态进行排序，最佳解决方案是在仓库中定义一个自定义查询，该查询将排序类型作为参数接收。\n\
  \n**继承类型**\n\n与许多面向对象语言一样，Java 提供了使用继承来减少重复代码和扩展其他类功能的可能性。JPA 并未忽视这一特性，并提供了多种可能性来降低\
  \ Java 代码中应用程序领域的复杂性。在底层数据库中，其复杂性与不使用继承时可能相同。\n\n让我们回到目录应用程序，看看一个常见问题。所有实体都有一个 ID\
  \ 属性，且生成值的策略相同，因此，在多个地方重复此元素并非好事。为了减少重复代码，我们创建一个包含 ID 属性及其生成值注解的基类（参见清单 4-15）。\n\
  \n***清单 4-15.*** 用于减少重复代码的基类实体\n\n@MappedSuperclass\n\npublic **abstract** class\
  \ Base implements Serializable {\n\n@Id\n\n@GeneratedValue(strategy = GenerationType.SEQUENCE)\n\
  \nprivate Long id;\n\npublic Base(){}\n\npublic Base(Long id) {\n\nthis.id = id;\n\
  \n}\n\npublic Long getId() {\n\nreturn id;\n\n}\n\n第 4 章 持久化与领域模型\n\npublic void\
  \ setId(Long id) {\n\nthis.id = id;\n\n}\n\n}\n\n清单 4-15 展示了 **@MappedSuperclass**\
  \ 注解，它表明该类不是一个最终的实体，因此它在数据库中并不存在。相反，该类是继承它的另一个类的一部分。下一步是修改 Currency 实体，移除 Id 属性，并使其继承新的\
  \ Base 类（参见清单 4-16）。\n\n***清单 4-16.*** 继承新基类的 Currency 实体\n\n@Entity\n\n@Table(name=\
  \ \"currency\")\n\npublic class Currency extends Base implements Serializable {\n\
  \n// 所有属性的属性、构造方法、setter 和 getter\n\n*// 重写 hashcode 和 equals*\n\n}\n\n如果在所有修改之后运行应用程序，一切照旧，因为你只是修改了实体中数据库表的表示方式，仅此而已。\n\
  \n这是一种继承机制，但还有许多其他机制。\n\n**映射超类**\n\n上一节中将 ID 移动到超类的示例被称为映射超类。抽象类（映射超类的一个必要条件）的所有属性，对于\
  \ Spring Data 而言，本身并不被视为一个实体。该类的所有属性\n\n\n\n抽象类是通过继承关系成为其他实体的一部分。但在数据库中，你会在同一个表中看到所有列，如图\
  \ 4-7 所示。\n\n![](img/index-137_1.png)\n\n第 4 章 持久化与领域模型\n\n***图 4-7.** 将实体迁移至使用映射超类的策略*\n\
  \n考虑一个假设场景：你想要更改具体类某个属性的名称，而不改动其他任何内容。JPA 提供了覆盖抽象类特定属性并指定新值的可能性；例如，让我们将 Currency\
  \ 实体中 ID 的名称更改为其他值。\n\n```java\n@Entity\n@Table(name= \"currency\")\n@AttributeOverride(\n\
  \    name = \"id\",\n    column = @Column(name = \"currency_id\", nullable = false))\n\
  // 这意味着你将 id 的名称覆盖为另一个值\npublic class Currency extends Base implements Serializable\
  \ {\n    // 所有属性的属性、构造器、setter 和 getter\n    // 重写 hashCode 和 equals\n}\n```\n\n\
  ![](img/index-138_1.png)\n\n第 4 章 持久化与领域模型\n\n当你有多个类具有某些共同点，但需要对某个特定类设置例外时，此功能极为有用。\n\
  \n**每个类层次结构一张表**\n\n这种方法将整个类层次结构表示在单个表中。此策略的另一个名称是**单表**。如果你没有使用 **@Inheritance**\
  \ 注解显式指定任何内容，JPA 会默认使用此策略。\n\n每个类层次结构一张表意味着你需要在数据库表中添加一个额外的列，该列不会出现在你的实体中，因为 JPA\
  \ 需要据此来区分某一行数据属于哪个类。\n\n让我们对目录应用程序进行一些修改，以表示这种特定情况。图 4-8 中出现了一组新的实体，表示你可以拥有不直接相连的城市和机场。这两个实体都继承自\
  \ Base 类，而 Base 类不再具有 **@MappedSuperclass** 注解。\n\n***图 4-8.** 具有单表关系的新实体*\n\n这里只有两个表，因为城市和机场属于同一个类，而\
  \ BASE_TYPE 列充当鉴别器，用于确定数据库中的一行数据代表哪种实体类型。请记住，在不同表中，code 和 name 属性是唯一的。\n\n第 4 章\
  \ 持久化与领域模型\n\n```java\n@Entity\n@Inheritance(strategy = InheritanceType.SINGLE_TABLE)\n\
  @DiscriminatorColumn(name = \"BASE_TYPE\")\npublic abstract class Base implements\
  \ Serializable {\n    @Id\n    @GeneratedValue(strategy = GenerationType.SEQUENCE)\n\
  \    private Long id;\n    // 所有属性的属性、构造器、setter 和 getter\n    // 重写 hashCode 和\
  \ equals\n}\n```\n\n现在你唯一需要修改的是 City 和 Airport 实体，为它们添加 **@DiscriminatorValue**\
  \ 注解，并指定数据库中用于标识应用程序中实体的值。\n\n```java\n@Entity\n@Table(name= \"airport\")\n@DiscriminatorValue(\"\
  AIR\")\npublic class Airport extends Base implements Serializable {\n    @OneToMany(fetch\
  \ = FetchType.LAZY)\n    @JoinColumn(name = \"AIRPORT_ID\")\n    private List<Terminal>\
  \ terminals;\n    // 所有属性的属性、构造器、setter 和 getter\n    // 重写 hashCode 和 equals\n\
  }\n```\n\n城市代码的写法大致相同，但具有不同的 **@DiscriminatorValue** 注解和属性，其逻辑与本章所有示例中出现的逻辑相同。唯一在目录应用程序中之前不存在的是\
  \ Terminal 类，它与 Airport 实体存在关联关系。\n\n第 4 章 持久化与领域模型\n\n```java\n@Entity\n@Table(name=\
  \ \"terminal\")\npublic class Terminal implements Serializable {\n    @ManyToOne(fetch\
  \ = FetchType.LAZY, optional = false)\n    @JoinColumn(name = \"AIRPORT_ID\")\n\
  \    private Airport airport;\n    // 所有属性的属性、构造器、setter 和 getter\n    // 重写 hashCode\
  \ 和 equals\n}\n```\n\n\n\n**注意**：这些修改仅作为示例，展示如果你希望采用这种继承策略时实体应如何呈现。本书使用了 `@MappedSuperclass`\
  \ 注解。\n\n采用这种策略存在一些缺点；例如，你会得到多行数据，其中某些行只有部分列包含信息，而其他列则为空值，因此从某种程度上说，你失去了所有关于非空值的约束。另一个问题与信息的规范化有关，由于存在大量属性，这可能会影响查询性能。你需要自行判断哪些属性适合建立索引，哪些不适合。\n\
  \n从长期来看，这种策略会在稳定性、性能和可维护性方面引入问题，因此不建议使用，至少在新系统中不应采用。\n\n**每个子类对应一张表（Table per Subclass）**\n\
  \n这种策略是“每个类层次结构对应一张表”策略的替代方案，旨在解决将所有信息集中在一张表中、导致大量行出现空值列的问题。为了解决前一种策略的问题，该策略会为层次结构中的每个具体类生成一张表。你可以直接通过\
  \ Spring Data 提供的仓库访问任何实体。\n\n沿用之前为你的目录应用引入修改以模拟假设场景的示例，让我们对之前的场景稍作变动，以便为每个类生成一张表。\n\
  \n图 4-9 展示了在这种关系类型下，表与类之间的关联。\n\n![](img/index-141_1.png)\n\n第 4 章 持久化与领域模型\n\n\
  ***图 4-9.** 每个子类对应一张表的新实体*\n\n目录模型中存在的实体类数量与类的数量相同，其中 City 和 Airport 的 ID 值与 Base\
  \ 表的主键值相同。要访问信息，需要在两张表之间进行连接。例如，如果你想访问某个特定城市的信息，你可以像往常一样创建一个仓库，但在后台，它会向 Base 表发起请求，并与\
  \ City 表进行连接。\n\n让我们修改 Base 类，仅更改继承策略，其他保持不变。\n\n这两种策略（前一种和当前这种）的一个好处是，它们在 JPA 模型中的表示方式相同，因此你只需要更改数据库脚本即可。\n\
  \n**@Entity**\n\n**@Inheritance(strategy = InheritanceType.JOINED)**\n\npublic abstract\
  \ class Base implements Serializable {\n\n    @Id\n\n    @GeneratedValue(strategy\
  \ = GenerationType.SEQUENCE)\n\n    private Long id;\n\n    // 所有属性的属性、构造器、setter\
  \ 和 getter 方法\n\n    *// 重写 hashcode 和 equals 方法*\n\n}\n\n第 4 章 持久化与领域模型\n\n下一步是修改\
  \ Airport 类，使用 `@PrimaryKeyJoinColumn` 注解添加用于表间连接的属性。该注解并非必需，因为 JPA 会推断两张表使用相同的\
  \ ID，但如果你打算使用 `@AttributeOverride` 注解，则必须声明列名。\n\n@Entity\n\n@Table(name= \"airport\"\
  )\n\n**@PrimaryKeyJoinColumn(name = \"ID\")**\n\npublic class Airport extends Base\
  \ implements Serializable {\n\n    @OneToMany(fetch = FetchType.LAZY)\n\n    @JoinColumn(name\
  \ = \"AIRPORT_ID\")\n\n    private List<Terminal> terminals;\n\n    // 所有属性的属性、构造器、setter\
  \ 和 getter 方法\n\n    *// 重写 hashcode 和 equals 方法*\n\n}\n\n这种方法的优点在于，你必须对数据库进行规范化，减少包含空值的列的数量，从而允许使用\
  \ NOT NULL 验证。\n\n缺点在于，你必须通过表间连接才能获取所有信息，如果记录数量很多，这可能会带来很大麻烦。此外，当你在这种类型的表中插入或更新行时，也会出现这个问题，因为每次操作都会执行两条语句。这种策略的另一个问题是，需要手动编写仓库查询，因为它们更加复杂。\n\
  \n**每个类对应一张表（Table per Class）**\n\n前一种策略的一个问题在于，你需要进行连接才能获取信息。\n\n\n\n所有信息；在“每类一表”策略中，主实体与继承类之间存在信息重复。你可以访问两个实体的信息（本例中为\
  \ Base 或 Airport/City），而无需在表之间进行连接。这是一种无需在实体中做太多改动的方法。在顶层类中使用 **@Inheritance** 注解，并设置值为\
  \ **InheritanceType.TABLE_PER_CLASS**。继承类无需包含任何内容，只需继承自 Base 类即可。\n\n![](img/index-143_1.png)\n\
  \n第 4 章 持久化与领域模型\n\n沿用前面的示例，我们通过将“enabled”列移至 Base 类来进行修改，以便更清晰地了解数据库和目录应用程序（见图\
  \ 4-10） 中的情况。\n\n***图 4-10.** 使用“每类一表”的新实体*\n\nCity 和 Airport 表在所有实体中都具有相同的属性——ID\
  \ 和 ENABLED。你将信息保存在 Base 表中，其中一个表继承自它。这降低了复杂性。在类中，修改很简单。你只需在 Base 类中编写继承策略的类型即可，无需其他操作。\n\
  \n@Entity\n@Inheritance(strategy = InheritanceType.TABLE_PER_CLASS)\npublic abstract\
  \ class Base {\n    @Id\n    @GeneratedValue(strategy = GenerationType.SEQUENCE)\n\
  \    private Long id;\n    // 所有属性的属性、构造方法、setter 和 getter\n    *// 重写 hashcode\
  \ 和 equals*\n}\n\n第 4 章 持久化与领域模型\n\n在具体类中，你无需包含任何内容。只需移除你在其他策略中使用的所有先前注解即可。\n\n\
  @Entity\n@Table(name= \"airport\")\npublic class Airport extends Base {\n    @OneToMany(fetch\
  \ = FetchType.LAZY)\n    @JoinColumn(name = \"AIRPORT_ID\")\n    private List<Terminal>\
  \ terminals;\n    // 所有属性的属性、构造方法、setter 和 getter\n    *// 重写 hashcode 和 equals*\n\
  }\n\n通过这种方法，你可以为每个表创建一个仓库，并访问每个实体中你想要的特定信息。\n\n这种策略的缺点之一是，不同表中存在大量重复信息。在执行读取操作（如\
  \ select）时，你可以减少获取所有信息所需的查询或连接次数。另一方面，执行写入操作（如 INSERT、DELETE 或 UPDATE）意味着你需要修改两个表以保持数据库的一致性。所有这些考虑都是有效的。你可以直接访问实体的仓库。\n\
  \n**可嵌入类**\n\n之前所有的继承方式都意味着一个类继承自另一个类，以减少重复代码并以更易于理解的方式对系统进行建模。可嵌入类改变了这种范式，因为你可以将一个类包含在另一个类中，就像属性一样，但在数据库中它作为同一张表的一部分出现。\n\
  \n让我们通过修改目录应用程序来实际探索这种方法，以获得类似于图 4-11 的结果。\n\n![](img/index-145_1.png)\n\n第 4 章\
  \ 持久化与领域模型\n\n***图 4-11.** 在 Currency 实体中包含一个可嵌入类*\n\n首先要做的是创建一个新类，其中包含两个属性，用于审计数据库中何时创建新行以及何时发生修改。该类需要包含\
  \ @Embeddable 注解，这意味着它本身不是一个实体，因为它通过组合方式存在于另一个类内部。清单 4-17 展示了用于审计不同实体的类，你可以将其嵌入到其他类中。\n\
  \n***清单 4-17.*** 包含用于审计变更属性的可嵌入类\n\n@Embeddable\npublic class Audit implements Serializable\
  \ {\n    @Column(name = \"created_on\", nullable = false)\n    private LocalDateTime\
  \ createdOn;\n    @Column(name = \"updated_on\", nullable = true) // 需要可为空\n\n\n\
  \n因为该属性首次出现时没有值，只有在修改后才会被赋值。\n\nprivate LocalDateTime updatedOn;\n\n// 所有属性的属性、构造方法、setter\
  \ 和 getter 方法\n\n*// 重写 hashcode 和 equals 方法*\n\n}\n\n第 4 章 持久化与领域模型\n\n现在你已经有了一个可被多个其他实体包含的类，下一步是修改\
