  \n│ └── scripts\n\n│ ├── mysql\n\n│ │ ├── V1.0__init_database.sql\n\n│ │ ├── V1.1__insert_rows.sql\n\
  \n│ │ ├── V2.0__audit_tables(run on chapter 4).sql\n\n│ │ └── V3.0__version_columns(run\
