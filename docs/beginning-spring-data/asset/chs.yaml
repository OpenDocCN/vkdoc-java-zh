  )\n\nprivate String name;\n\n@Property(\"locale\")\n\nprivate String locale;\n\n\
  @Property(\"timezone\")\n\nprivate String timezone;\n\n@Property(\"enabled\")\n\n\
  private Boolean enabled = Boolean.TRUE;\n\n@Relationship(\"currency\")\n\nprivate\
  \ Currency currency;\n\n@Relationship(\"states\")\n\nprivate List<State> states;\n\
  \n// 之前的 setter 和 getter 方法\n\n// 重写 hashCode 和 equals 方法\n\n}\n\n第 9 章 Neo4j：图数据库\n\
  \n注解的使用非常简单。您可以在类的属性中为 @**Property** 或 **@Relationship** 注解指定值，但这是可选的。如果您不指定值，Spring\
  \ Data Neo4j 会认为数据库中的属性名称与类中的属性名称相同。同样，如果您在某个属性上不使用注解，Spring Data Neo4j 会决定以该属性相同的名称将信息持久化到数据库中。\n\
  \n下一步是声明与 **Country** 存在关系的其他实体，例如 **State** 和 **Currency**。我们以其中一个为例，展示定义所有这些实体的格式，如清单\
