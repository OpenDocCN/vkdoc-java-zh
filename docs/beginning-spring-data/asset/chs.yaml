  , QueryBuilder.literal(entity.getName()))\n\n第 10 章 Cassandra：宽列数据库\n\n.value(\"\
  enabled\", QueryBuilder.literal(entity.getEnabled()))\n\n//声明所有要插入的属性\n\n.build();\n\
  \nquery.setTimeout(Duration.ofMillis(100L));\n\n**总结**\n\nSpring Data for Apache\
  \ Cassandra 提供了许多与数据库交互的功能，且不会出现问题。如果框架提供的通用仓库无法满足您的需求，您可以创建自定义仓库并添加所有逻辑。\n\n与其他非关系型数据库相比，Apache\
  \ Cassandra 具有一些优势，例如无主节点，因此您可以轻松添加新节点。但在应用程序中声明节点时存在一个问题，因为您需要指定每个节点的主机，因此在某些时候，您需要重新部署应用程序。\n\
  \n![](img/index-275_1.png)\n\n**第 11 章**\n\n**响应式访问**\n\n应用程序通过 HTTP 连接建立的大部分通信都涉及一个请求、一个获取响应的特定过程以及响应（可能是异常或某种类型的信息）。\n\
  \n这种方法会带来一些问题。例如，您需要等待 API 所消费的服务返回结果，然后才能开始处理信息。但如果存在一种机制，能够以流式方式返回信息，从而使您的 API\
  \ 在获取所有信息之前就能开始执行操作，那会怎样呢？\n\n图 11-1 展示了访问数据库的标准方式。\n\n***图 11-1.** 访问数据库的标准方式*\n\
  \n本章将解释响应式编程如何为这些问题提供解决方案。\n\n© Andres Sacco 2023\n\nA. Sacco, *Beginning Spring\
  \ Data*[, https://doi.org/10.1007/978-1-4842-8764-4_11](https://doi.org/10.1007/978-1-4842-8764-4_11#DOI)\n\
  \n![](img/index-276_1.png)\n\n第 11 章 响应式访问\n\n**什么是响应式访问？**\n\n在传统应用程序中，每个请求会在一段时间内分配一个线程来执行特定操作；这种方法被称为“每请求一线程”模型。在此期间，该进程会独占内存和\
  \ CPU 资源。图 11-2 展示了大量请求同时访问数据库的情况，在每次操作返回结果之前，会浪费内存/CPU 等资源。响应式编程是一种替代方案，它解决了诸如资源合理利用等问题，从而提高了可扩展性。\n\
  \n***图 11-2.** 访问数据库的响应式方法*\n\n为了从另一个角度理解这个问题，假设您有机会同时接收一千个请求。您的应用程序可能因需要更多资源或需要增加连接池大小等因素而无法扩展。如果减少每个资源的使用时间，您就无需对基础设施或应用程序进行重大更改即可返回结果。\n\
  \n响应式编程背后的理念是不阻塞线程。相反，应用程序将请求视为带有回调的事件。这个概念多年前在 JavaScript 等其他语言中就已流行。它意味着等待直到有结果返回，然后使用回调向请求方发送通知以及操作结果。\n\
  \n第 11 章 响应式访问\n\n在此过程中，应用程序的线程可以用于处理其他请求。信息可以作为信息流返回，这样您可以在收到响应时执行不同的操作，而无需等待获取所有信息。如果在流式处理过程中发生错误，操作将终止，这是合理的，因为在阻塞方法中尝试执行相同操作时也可能发生同样的情况。\n\
  \n在 Spring Boot 中，该框架有一个用于通用响应式编程的项目，称为 Spring WebFlux，它通过使用信息流中的两个事件发布器来实现。\n\n\
  • **Mono<T>** 可以发出零个或一个元素。例如，一个端点\n\n\n\n接收一个 id，旨在返回某个实体的所有信息，但可能只返回一个元素。\n\n•\
  \ **Flux<T>** 表示你将返回零到 N 个元素，直到收到没有更多元素需要发送的通知。\n\n例如，一个端点返回数据库中所有现有的国家。\n\nSpring\
  \ WebFlux 是返回结果或与其他不直接访问数据库的应用程序进行交互的应用层。对于此操作，有 Spring 项目 1 提供这些能力。\n\n**将查询修改为响应式**\n\
  \nSpring Data 中的响应式支持出现在 2016 年，当时首批访问非关系型数据库（如 MongoDB、Redis、Cassandra 和 Neo4j）的模块版本提供了将查询结果作为信息流获取的可能性。\n\
  \n关系型数据库则是另一种情况。并非所有关系型数据库都支持使用响应式范式。R2DBC2 是与 MySQL、PostgreSQL 和 SQL Server 等数据库进行响应式交互时最常用的库之一，并且有计划增加对其他数据库的支持。\n\
  \n1 [`spring.io/projects/spring-data-r2dbc`](https://spring.io/projects/spring-data-r2dbc)\n\
  \n2 [`r2dbc.io/`](https://r2dbc.io/)\n\n第 11 章 响应式访问\n\n**非关系型数据库**\n\n本节展示了如何在\
  \ MongoDB 中实现响应式编程。尽管如此，所有数据库都提供相同的支持，重复四次相同的操作可能会显得冗余。\n\n在 MongoDB 和其他数据库中，将阻塞式应用程序转换为响应式应用程序的复杂性意味着只需进行少量更改。首先，需要引入一个依赖项，该依赖项提供你在仓库中所需使用的所有接口，如清单\
  \ 11-1 所示。\n\n***清单 11-1.*** MongoDB 响应式依赖项\n\n<dependency>\n\n<groupId>org.springframework.boot</groupId>\n\
  \n<artifactId>spring-boot-starter-data-mongodb-reactive</artifactId>\n\n</dependency>\n\
  \n第二步是启用配置以使用响应式仓库，方法是使用 `@EnableReactiveMongoRepositories` 注解，并创建一个包含配置的特定类，如清单\
  \ 11-2 所示。\n\n***清单 11-2.*** 启用对响应式访问的支持\n\nimport com.mongodb.reactivestreams.client.MongoClient;\n\
  \nimport com.mongodb.reactivestreams.client.MongoClients;\n\nimport org.springframework.context.annotation.Bean;\n\
  \nimport org.springframework.data.mongodb.config.\n\nAbstractReactiveMongoConfiguration;\n\
  \nimport org.springframework.data.mongodb.core.ReactiveMongoTemplate;\n\nimport\
  \ org.springframework.data.mongodb.repository.config.\n\nEnableReactiveMongoRepositories;\n\
  \n*//启用对响应式仓库的支持*\n\n@EnableReactiveMongoRepositories\n\npublic class MongoReactiveConfiguration\n\
  \nextends AbstractReactiveMongoConfiguration {\n\n*//声明要与数据库一起使用的客户端*\n\n@Bean\n\
  \npublic MongoClient mongoClient() {\n\n第 11 章 响应式访问\n\nreturn MongoClients.create();\n\
  \n}\n\n@Override\n\nprotected String getDatabaseName() {\n\nreturn \"catalog\";\n\
  \n}\n\n*//声明使用 MongoClient 的响应式 MongoTemplate*\n\n@Bean\n\npublic ReactiveMongoTemplate\
  \ reactiveMongoTemplate() {\n\nreturn new ReactiveMongoTemplate(mongoClient(), getDatabaseName());\n\
  \n}\n\n}\n\n现在，你的应用程序拥有继承自 **MongoRepository<T, ID>** 的仓库；思路是将其替换为 **ReactiveMongoRepository<T,\
  \ ID>** 。如果你的仓库继承自 **CrudRepository<T, ID>** ，则需要将它们替换为 **ReactiveCrudRepository<T,\
  \ ID>** 。\n\n如果你在仓库中定义的自定义方法不做任何更改，那么一切仍将以阻塞方式运行，因此你需要更改每个方法的返回值（参见清单 11-3）。\n\n\
  ***清单 11-3.*** 响应式仓库\n\nimport com.apress.catalog.model.Country;\n\nimport org.springframework.data.mongodb.repository.Query;\n\
  \nimport org.springframework.data.mongodb.repository.ReactiveMongoRepository;\n\n\
  \n\nimport reactor.core.publisher.Flux;\n\npublic interface CountryRepository extends\
  \ ReactiveMongoRepository<Count\n\nry, Long> {\n\nFlux<Country> findByCode(String\
  \ code);\n\n//这是一个自定义查询，仅针对单个字段进行查询\n\n@Query(value = \"{'code': ?0}\")\n\nFlux<Country>\
  \ findCustom(String code);\n\n第 11 章 响应式访问\n\n//这是一个自定义查询，将方法名称上的条件与查询条件相结合\n\n\
  @Query(value = \"{'code': ?0}\")\n\nFlux<Country> findEnabled(String code);\n\n\
  }\n\n这些修改会影响期望接收对象而非响应式内容的 Service 类，因此你有两个选择：一是将整个应用程序转换为响应式，这意味着你需要修改所有服务和控制器；二是调用\
  \ `block()` 方法，将响应式操作转换为阻塞操作。第二种方法并非最佳方案，因为你虽然支持响应式操作，却以标准方式使用它。这种方法可以作为将 API 转换为响应式的第一步。\n\
  \n本书不会修改所有源代码，因为这样做需要付出大量精力，但源代码的修改实际上只有几行。\n\n**关系型数据库**\n\n关系型数据库与非关系型数据库有很大不同，因为\
  \ Spring 默认不提供对响应式方法的支持。在这种情况下，你需要使用一个名为 R2DBC（响应式关系型数据库连接）的库，它为数据库提供了对响应式范式的支持。\n\
  \n该库通过大量会议文章和演讲获得了社区的广泛支持。Spring Data 包含对该库的支持，降低了在 Spring Boot 应用程序中使用的复杂性。不过，目前并非所有关系型数据库供应商都得到支持。每年都会有新的受支持数据库出现，但社区使用最相关的数据库（如\
  \ MySQL、PostgreSQL、MariaDB 和 SQL Server）均已获得支持。\n\n以下是编写本书时使用该库的一些限制。\n\n• 你不能使用嵌入式\
  \ ID，因此可以生成复合主键。\n\n• 支持 `@Version` 注解，因此你可以继续使用乐观锁。\n\n• 没有自动生成 ID 的功能，因此你需要指明想要使用的\
  \ ID 生成策略。\n\n第 11 章 响应式访问\n\n• 如果你的应用程序使用了 `@CreatedDate` 或 `@LastModifiedDate`\
  \ 注解，仍然可以继续使用，但需要通过 `@EnableR2dbcAuditing` 注解启用 R2DBC 的审计逻辑。\n\n• 你无法通过这种方法自动创建数据库，因此需要一种机制来生成整个数据库结构。一种解决方案是连接到数据库并运行脚本。\n\
  \n在应用程序中使用响应式的第一步是在 `pom.xml` 文件中添加依赖项（参见清单 11-4）。\n\n***清单 11-4.*** 添加在应用程序中使用响应式的依赖项\n\
  \n<dependency>\n\n<groupId>org.springframework.boot</groupId>\n\n<artifactId>spring-boot-starter-data-r2dbc</artifactId>\n\
  \n</dependency>\n\n<dependency>\n\n<groupId>io.r2dbc</groupId>\n\n<artifactId>r2dbc-postgresql</artifactId>\n\
  \n<version>0.8.12.RELEASE</version>\n\n</dependency>\n\n下一步是将 Spring Data 中之前的 `CrudRepository<T,\
  \ ID>` 替换为新的仓库，这些新仓库提供相同的方法，但以响应式方式实现（参见清单 11-5）。\n\n***清单 11-5.*** 响应式仓库\n\nimport\
  \ com.apress.catalog.model.State;\n\nimport org.springframework.data.r2dbc.repository.R2dbcRepository;\n\
  \nimport reactor.core.publisher.Flux;\n\npublic interface StateRepository extends\
  \ R2dbcRepository<State, Long> {\n\nFlux<State> findByCode(String code);\n\nFlux<State>\
  \ findAllByCountryId(Long id);\n\n}\n\n第 11 章 响应式访问\n\n你之前在应用程序中声明的配置不再有效。你需要更改\
  \ R2DBC 理解配置的方式（参见清单 11-6）。\n\n***清单 11-6.*** 添加使用响应式的配置\n\nspring:\n\nr2dbc:\n\n\
  username: postgres\n\n\n\npassword: postgres\n\nurl: r2dbc:postgresql://localhost:5432/catalog?autoReconnect=true\n\
  \npool:\n\nmax-create-connection-time: 2s\n\ninitial-size: 5\n\nmax-size: 10\n\n\
  所有这些改动看起来都很棒，但你需要使用 `@EnableR2dbcRepositories` 注解显式启用对响应式仓库的支持。如果不启用，应用程序会抛出一个异常，提示你未找到任何仓库（参见清单\
  \ 11-7）。\n\n***清单 11-7.*** 启用对响应式仓库的支持\n\nimport org.springframework.boot.SpringApplication;\n\
  \nimport org.springframework.boot.autoconfigure.SpringBootApplication;\n\nimport\
  \ org.springframework.data.r2dbc.repository.config.\n\nEnableR2dbcRepositories;\n\
  \n@SpringBootApplication\n\n@EnableR2dbcRepositories(basePackages = \"com.apress.catalog\"\
  )\n\npublic class ApiCatalogApplication {\n\n//之前的源代码\n\n}\n\n你的应用程序中存在用于保存审计信息的嵌入式实体，因此在本例中，让我们从所有实体中移除它们。如果你运行应用程序并通过端点开始操作，一切仍能正常工作。\n\
  \n第 11 章 响应式访问\n\n**注意事项**\n\n这种方法具有若干优势。主要问题在于，并非所有数据库都具备全部特性来支持无痛迁移至响应式方法。\n\n\
  存在一些例外情况，例如 MongoDB，其所有特性在两种方法中均可使用。然而，在其他数据库中，迁移意味着数据库层面的变更，例如 **api-catalog**\
  \ 中的嵌入式对象。这些变更存在一定风险，因此并非轻而易举。\n\n**总结**\n\n本章讨论了响应式方法如何帮助减少应用程序所需的时间和资源数量，因为每个请求并不需要等待所有响应返回结果。非关系型数据库多年前就已支持这种方法。关系型数据库并非所有供应商都提供支持，因此如果你想使用这种方法，请首先检查你的数据库是否支持。\n\
  \n下一章将讨论如何在不将整个应用程序部署到环境中的情况下，测试访问数据库的仓库。\n\n**第 12 章**\n\n**单元测试与集成**\n\n**测试**\n\
  \n测试是你永无止境学习的话题之一，因为新的技术和工具层出不穷，无论是编写测试还是简化执行任务的方式（例如创建模拟对象来检查源代码的某部分是否正常工作）。测试应用程序的原因有很多，并且在无数资源中都有阐述。你希望确保你的逻辑按预期工作，发现潜在的缺陷，并了解是否需要修改源代码以确保一切按计划运行。\n\
  \n**注意** 学习测试的最佳资源之一是 Martin Fowler 的博客 1，其中涉及 BDD、不同类型的测试以及良好实践等主题。\n\n说实话，许多开发者不喜欢编写测试来覆盖基本场景。在这种情况下，花费大量时间测试访问数据库的层（在\
  \ Spring Data 中，这通常是一个包含表示自定义查询方法的接口）意义不大。这种方法的主要问题是，你可能会在环境或集成测试中发现查询的问题，而这些测试并不仅仅覆盖数据库访问，例如，我们目录应用程序的端点在保存信息前后会发生变更，因此你可以检查服务层的逻辑是否正常工作。但你无法检查仓库中的一切是否正常。\n\
  \n1 [`martinfowler.com/tags/testing.html`](https://martinfowler.com/tags/testing.html)\n\
  \n© Andres Sacco 2023\nA. Sacco, *Beginning Spring Data*[, https://doi.org/10.1007/978-1-4842-8764-4_12](https://doi.org/10.1007/978-1-4842-8764-4_12#DOI)\n\
  \n第 12 章 单元测试与集成测试\n\n\n\n不进行正确应用测试的另一个问题是数据库版本。\n\n一些开发者使用像 H2 这样的内存数据库来执行特定测试。这种方法在某些条件下是可行的，但并非所有数据库都具备相同的特性，因此你需要使用应用在所有环境中使用的同一数据库来执行测试。\n\
  \n总而言之，测试数据访问层的主要问题之一是如何*仅*在存储库中执行测试。第二个问题是如何测试数据库访问，以便能够多次执行测试而不会出现问题。在本章中，你将学习这两个问题的解决方案。本书不详细讨论单元测试和集成测试。为此，我建议你查阅\
  \ Martin Fowler 的网站。2\n\n**使用 Mock 进行单元测试**\n\n测试 Java/Kotlin 应用最常用的库之一是 JUnit，3\
  \ 它还有许多其他库可添加额外功能，包括 Spring Boot Test，4 它使用最新版本的 JUnit 来执行某些操作。\n\n**注意** 还有其他 Java\
  \ 测试替代方案，例如 Spock5 或 TestNG。6\n\n让我们开始创建一个使用 JUnit 的通用单元测试，以检查 **CountryService**\
  \ 中 **save** 方法的逻辑是否正常工作。首先要做的是添加使用 JUnit 创建和运行单元测试所需的所有依赖项；这些依赖项在最终解决方案中也会复用。清单\
  \ 12-1 显示了需要在 pom 文件中添加的依赖项，以创建单元测试。\n\n2 [`martinfowler.com/articles/practical-test-pyramid.html`](https://martinfowler.com/articles/practical-test-pyramid.html)\n\
  \n3 [`junit.org/junit5/`](https://junit.org/junit5/)\n\n4 [`docs.spring.io/spring-boot/docs/current/reference/html/features.`](https://docs.spring.io/spring-boot/docs/current/reference/html/features.html#features.testing)\n\
  \n[html#features.testing](https://docs.spring.io/spring-boot/docs/current/reference/html/features.html#features.testing)\n\
  \n5 [`spockframework.org/`](https://spockframework.org/)\n\n6 [`testng.org/doc/`](https://testng.org/doc/)\n\
  \n第 12 章 单元测试与集成测试\n\n***清单 12-1.*** JUnit/Mockito 依赖项\n\n<dependencies>\n\n<dependency>\n\
  \n<groupId>org.mockito</groupId>\n\n<artifactId>mockito-junit-jupiter</artifactId>\n\
  \n<version>4.6.1</version>\n\n<scope>test</scope>\n\n</dependency>\n\n← 其他依赖项 –>\n\
  \n</dependencies>\n\n<build>\n\n<plugins>\n\n← 其他插件 →\n\n<plugin>\n\n<groupId>org.apache.maven.plugins</groupId>\n\
  \n<artifactId>maven-surefire-plugin</artifactId>\n\n<version>${maven-surefire-plugin.version}</version>\n\
  \n</plugin>\n\n</plugins>\n\n</build>\n\n之后，你只需要创建一个测试，检查使用存储库持久化信息的服务是否正常工作（参见清单\
  \ 12-2）。\n\n***清单 12-2.*** 服务单元测试\n\nimport com.apress.catalog.dto.CountryDTO;\n\
  \nimport com.apress.catalog.model.Country;\n\nimport com.apress.catalog.repository.CountryRepository;\n\
  \nimport com.apress.catalog.repository.StateRepository;\n\nimport jakarta.validation.Validator;\n\
  \nimport org.junit.jupiter.api.BeforeEach;\n\nimport org.junit.jupiter.api.Test;\n\
  \n第 12 章 单元测试与集成测试\n\nimport static org.junit.jupiter.api.Assertions.assertNotNull;\n\
  \nimport static org.mockito.ArgumentMatchers.any;\n\nimport static org.mockito.Mockito.mock;\n\
  \nimport static org.mockito.Mockito.when;\n\npublic class CountryServiceTest {\n\
  \nprivate CountryService service;\n\nprivate CountryRepository countryRepository;\n\
  \nprivate StateRepository stateRepository;\n\nprivate MapperFacade mapper;\n\nprivate\
  \ Validator validator;\n\n@BeforeEach\n\npublic void setUp() {\n\ncountryRepository\
  \ = mock(CountryRepository.class);\n\nstateRepository = mock(StateRepository.class);\n\
  \nmapper = mock(MapperFacade.class);\n\nvalidator = mock(Validator.class);\n\nservice\
  \ = new CountryService(countryRepository, stateRepository,\n\nmapper, validator);\n\
  \n}\n\n\n\n//此测试仅检查服务是否正常模拟了所有与数据库的交互\n\n@Test\n\npublic void should_save_a_country()\
  \ {\n\nCountryDTO countryDTO = new CountryDTO();\n\ncountryDTO.setEnabled(Boolean.TRUE);\n\
  \ncountryDTO.setCode(\"ARG\");\n\ncountryDTO.setName(\"Argentina\");\n\nCountry\
  \ country = new Country();\n\nwhen(countryRepository.save(any())).thenReturn(country);\n\
  \nassertNotNull(service.save(countryDTO));\n\n}\n\n}\n\n第 12 章 单元测试与集成测试\n\n单元测试不检查**CountryRepository**的任何内容，这很合理，因为它不属于类的代码，而是一个接口，这意味着测试这类对象并不简单。有些方法会创建一个继承自该仓库并使用`DataSource`访问数据库的具体类。然而，这种解决方案并非最佳，因为你需要创建额外的对象并修改应用程序的逻辑来进行测试。\n\
  \n**使用数据库进行集成测试**\n\n要对数据库进行测试，你需要进入更高层次的测试，因为你需要运行整个应用程序来测试持久层与数据库之间的交互。在幕后，Spring\
  \ Data 会生成具体类来访问数据库，因此对你而言，唯一能使用的对象就是带有你定义查询的仓库。当然，你可以直接使用 Spring Boot Test 来检查访问数据库的部分逻辑，但你需要访问一个数据库。因此，如果你插入一行包含表中需要唯一属性的数据，那么在同一数据库中多次运行相同的测试是不可能的，所以你需要另寻他法；例如，使用像\
  \ DbUnit 这样的工具。7 另一种解决数据库访问测试问题的方案是使用名为 Testcontainers 的库。\n\n**Testcontainers**\n\
  \nTestcontainers8 是一个轻量级、开源的库，它允许你在应用程序中运行容器并复用测试用例。该库支持多种测试框架，例如不同版本的 Junit 和 Spock。你可以在\
  \ Java 或 Kotlin 项目中使用它。\n\n7 [`www.dbunit.org/`](http://www.dbunit.org/)\n\n8 [`www.testcontainers.org/`](https://www.testcontainers.org/)\n\
  \n![](img/index-289_1.png)\n\n第 12 章 单元测试与集成测试\n\n这些容器可以是数据库，也可以是你的应用程序所需的其他服务；例如，如果你的应用程序需要使用\
  \ AWS 的特定服务，你可以使用 LocalStack9 的镜像。Testcontainers 开发了一系列模块，以降低运行容器和配置此镜像的复杂性。这些模块包含了所有常见的关系型数据库，以及一些最相关的非关系型数据库，如\
  \ MongoDB、Cassandra、Neo4j 和 ElasticSearch。如果你需要使用模块列表中未包含的数据库，你可以运行任何容器，但需要自行定义所有与配置相关的逻辑。图\
  \ 12-1 展示了一个 API 可能拥有的不同连接，例如数据库、队列和云服务提供商。\n\n***图 12-1.** 一个 API 可能拥有的所有外部连接示例*\n\
  \n在幕后，该库使用 Docker10 来下载和运行容器，因此在你的项目中使用之前，请检查该库需要满足的 Docker 版本相关的通用要求 11。2020 年\
  \ 11 月，DockerHub 对仓库中各种镜像的使用（例如下载次数）引入了限制。如果你在流水线中使用此库，运行它的机器必须满足相同的要求。\n\n9 [`github.com/localstack/localstack`](https://github.com/localstack/localstack)\n\
  \n10 [`www.docker.com/`](https://www.docker.com/)\n\n\n\n11 [`www.testcontainers.org/supported_docker_environment/`](https://www.testcontainers.org/supported_docker_environment/)\n\
  \n第 12 章 单元测试与集成测试\n\n清单 12-3 是一个简单示例，展示了如何定义一个容器并启动它，而无需任何关于 Docker 或数据库的特殊指令。\n\
  \n***清单 12-3.*** 配置并运行容器的示例\n\nPostgreSQLContainer postgreSQL = new PostgreSQLContainer(\"\
  postgres:145\")\n\n.withDatabaseName(\"integration-tests-database\")\n\n.withUsername(\"\
  test\")\n\n.withPassword(\"test\");\n\npostgreSQL.start();\n\n关于这个库，最后需要考虑的一点是，它拥有像\
  \ Elastic 和 Red Hat 这样的赞助公司，这些公司被 Wise、Zalando、Instana 和 Skyscanner 等众多知名企业所使用，因此你可以确信它并非一个缺乏支持的新库。\n\
  \n**Testcontainers vs. 嵌入式数据库**\n\n像 MongoDB 这样的数据库允许你使用另一个需要包含在 pom 文件中的库来运行嵌入式数据库。然而，这种方法存在一些问题。\n\
  \n• 并非所有数据库都支持使用嵌入式数据库，因此这只是一种适用于少数数据库的解决方案。\n• 你不知道使用的是哪个版本的数据库，因此可能会遇到前面章节中出现的问题：仓库和查询在测试中运行良好，但在真实环境中却会失败。此外，新版本的数据库可能出现且不受支持，因此其使用会受到一定限制。\n\
  • 如果你使用像 Flyway 或 Liquibase 这样的迁移工具，并且使用了 H2 数据库，那么脚本可能会失败，因为你使用了仅在 PostgreSQL 或\
  \ MySQL 中有效的特定结构或关键字。\n\n使用 Testcontainers，所有这些问题都会消失，因为你可以使用容器来代表数据库的真实版本。此外，你还可以利用\
  \ Docker 的配置，用特定信息来初始化数据库。\n\n第 12 章 单元测试与集成测试\n\n**使用 Testcontainers**\n\n开始使用它很简单；你只需要添加关于\
  \ Testcontainers 的基础依赖以及你需要的模块；在**api-catalog**中，你需要使用**PostgreSQL**模块（参见清单 12-4）。\n\
  \n***清单 12-4.*** 需要在应用程序中包含的依赖项\n\n<dependency>\n\n<groupId>org.testcontainers</groupId>\n\
  \n<artifactId>junit-jupiter</artifactId>\n\n<version>1.17.3</version>\n\n<scope>test</scope>\n\
  \n</dependency>\n\n<dependency>\n\n<groupId>org.testcontainers</groupId>\n\n<artifactId>postgresql</artifactId>\n\
  \n<version>1.17.3</version>\n\n<scope>test</scope>\n\n</dependency>\n\n**jupiter**依赖直接与\
  \ Junit5 相关联，它在后台包含了 Testcontainers 的核心依赖。如果你想在没有特定实现的情况下使用这个库——例如，你想使用 MySQL 或\
  \ MariaDB 的实现——只需包含核心依赖，并添加你想要运行的镜像名称，而无需 Testcontainers 的支持。\n\n运行一个仅启动和停止 PostgreSQL\
  \ 镜像的容器，可以创建一个如清单 12-5 所示的类，但至少需要添加一个测试。\n\n***清单 12-5.*** 运行数据库的基本单元测试\n\nimport\
