  \ 章**\n\n**Spring Data 与不同类型的持久化**\n\n第[1 章](https://doi.org/10.1007/978-1-4842-8764-4_1)讨论了信息持久化的机制。其中之一是\
  \ Spring Data，它提供了使用不同数据库进行信息持久化的可能性，具备一定的抽象层次，并且无需大量代码即可解决大多数常见操作。\n\n本章涵盖 Spring\
  \ Data 的基础知识，包括仓库（Repository）的工作原理以及如何定义自定义实现。这些主题非常重要，因为后续章节中大部分都会用到它们。\n\n**什么是\
  \ Spring Data？**\n\nSpring Data 是 Spring 支持的一系列项目，旨在简化对 MongoDB、Redis、Cassandra、Neo4j、Memcached\
  \ 以及所有关系型数据库的访问。在关系型数据库中，与 JDBC、Hibernate、JPA、JDO 或 MyBatis 等其他方案相比，Spring Data\
  \ 提供了更简化的访问方式，减少了任何数据库操作所需的类、层和配置数量。\n\nSpring Data1 首次出现在 2010 年的 Spring One 大会上。Rod\
  \ Johnson（SpringSource 公司）和 Emil Eifrem（Neo Technologies 公司）尝试使用 Spring 将 Neo4j\
  \ 数据库与应用程序连接起来。他们创建了用于在应用程序和数据库之间建立连接的类；这些类成为了 Spring Data 的基础。此后，该项目家族不断壮大，为不同的数据库提供支持，遵循着降低复杂性并在应用程序与数据库之间建立一定抽象层次的精神。\n\
  \n现在，让我们思考一下为什么需要使用 Spring Data 而不是数据库驱动程序。假设你有一个使用 Redis 的应用程序。维护这个数据库的成本很高，因此基础设施团队建议将信息迁移到经过高度优化的\
  \ Cassandra。这种情况下的问题是：如果你仅使用数据库驱动程序来实现所有持久化和检索信息的逻辑，那么你需要修改大量与 CRUD 操作、连接以及所有配置相关的代码行。但如果你使用\
  \ Spring Data，更换数据库只需修改实体中的注解和配置即可。\n\n\n\n属性，或许就是仓库中的信息，仅此而已。使用 Spring Data 从一个数据库迁移到另一个数据库所需的时间更短，并且你拥有一种访问数据库的独特方式。\n\
  \nSpring Data 包含多个模块组；有些模块适用于所有类型的数据库，而另一些则针对特定类型。让我们来看看这些模块中最相关的一些。\n\n• **Spring\
  \ Data Commons** 提供了一个元数据模型，用于通过下一节中的仓库接口将 Java 类持久化到特定数据库中。\n\n• **Spring Data\
  \ REST**2 构建在 Spring Data 模块之上，帮助你使用与实体关联的仓库创建 RESTful API。\n\n• **Spring Data JPA**3\
  \ 提供了 JPA 的实现，它使用仓库接口，在大多数情况下支持所有 CRUD 操作。如果需要，你也可以创建具有特定逻辑的自定义仓库来访问数据库。\n\n• **Spring\
  \ Data JDBC**4 提供了使用 JDBC 通过仓库访问数据库的实现，但不具备 JPA 的更多功能，例如懒加载和缓存。\n\n• **Spring Data\
  \ for Apache Cassandra**5 支持 Cassandra 实体中的所有 CRUD 操作和 TTL 定义。它还支持配置数据库的多个实例。\n\n\
  • **Spring Data MongoDB**6 提供了使用仓库或 `MongoTemplate`（另一种执行 CRUD 操作的方式）在 MongoDB 数据库中执行所有操作的可能性。\n\
