  \ 添加注解以创建新索引\n\nimport org.springframework.data.annotation.Id;\n\nimport org.springframework.data.redis.core.RedisHash;\n\
  \nimport org.springframework.data.redis.core.index.Indexed;\n\nimport java.io.Serializable;\n\
  \nimport java.util.List;\n\n@RedisHash(\"country\")\n\npublic class Country implements\
  \ Serializable {\n\n@Id\n\nprivate Long id;\n\nprivate String code;\n\n@Indexed\n\
  \n\n\nprivate String name;\n\n//Previous source code\n\n}\n\n此解决方案运行良好，但并非在数据库中创建多个索引的最佳方法。\n\
  \n第 7 章 Redis：键/值数据库\n\n**总结**\n\n本章涵盖了使用 Redis 的各种方法。其中大部分方法在 Spring Data 中均受支持，例如使用单个或多个数据库节点。您学习了如何使用自定义序列化器持久化信息，以及如何在应用程序中进行配置。\n\
  \n关于使用哪种方法，并没有唯一正确的答案，因为这取决于您的业务需求，以及在同一数据库（例如在 AWS 这样的云提供商上）运行多个实例所涉及的成本。\n\n**第\
  \ 8 章**\n\n**MongoDB：文档**\n\n**数据库**\n\n在创建应用程序时，您可能需要以特定格式持久化信息，而这些格式将来可能需要修改。您可能会认为关系型数据库是保存此类信息的最佳选择。然而，一些非关系型数据库提供了灵活修改“表”结构的能力，并且可以保存复杂的对象，同时还能创建复杂的查询。\n\
  \n非关系型数据库的演进和稳定性使其在处理大量信息时表现出色。但与关系型数据库相比，您也需要做出一些取舍，例如数据冗余。\n\n本章将讨论一种新的非关系型数据库，它可以将所有信息像文档一样保存，并介绍其主要优势。\n\
  \n**什么是文档存储？**\n\n文档存储是一种非关系型数据库，您可以将信息存储为 JSON 文档，而无需像关系型数据库那样拥有严格的模式。因此，您可以灵活地添加、删除或更改属性的格式。当然，您需要修改应用程序，以避免在源代码中产生异常。\n\
  \n这种数据源提供了一种任何人都能读懂的清晰结构，并且根据您应用程序的复杂程度，它甚至可以与某些端点的响应格式相匹配。\n\n如果您想将 **api-catalog**\
  \ 应用程序从多个表转换为仅一个表，这是可行的，同时还能保持 DTO 的精确结构。然而，主要问题之一是信息的冗余，这在非关系型数据库中很常见。不过，一些实现也提供了创建结构并将其像关系型数据库那样连接起来的可能性。\n\
  \n© Andres Sacco 2023\nA. Sacco, *Beginning Spring Data*[, https://doi.org/10.1007/978-1-4842-8764-4_8](https://doi.org/10.1007/978-1-4842-8764-4_8#DOI)\n\
  \n![](img/index-225_1.png)\n\n第 8 章 MongoDB：文档数据库\n\n图 8-1 展示了之前的关系型数据库与文档数据库之间的对应关系。\n\
  \n***图 8-1.** 关系型数据库 vs. 文档数据库*\n\n这些结构之间存在一些对应关系；例如，关系型数据库中的表，在 MongoDB（文档存储数据库的一种实现）中就是集合。因此，它并没有完全抛弃您所熟知的所有概念，而是将其转换为不同的形式。\n\
  \n**可能的使用场景**\n\n在某些情况下，这些数据库是很好的候选方案，但并没有限制它们在其他场景中的使用。让我们来看一些用例。\n\n• **目录**：一些应用程序存储电子商务中的产品信息，或与数据库性能相关的地区（如国家/城市/州或机场）信息。同时，您希望享受执行多种类型查询的所有好处。想象一下，需要执行大量查询才能获取某个特定国家的信息。那么，更好的做法是只对一个特定结构执行一次查询，并获取可以作为端点响应的\
  \ JSON。\n\n第 8 章 MongoDB：文档数据库\n\n• **内容管理**：如果您有像博客或视频平台这样的应用程序，其结构可能会因为平台本身的修改而发生变化，但您并不需要所有内容都保持相同的结构，那么这（指使用文档数据库）可能是一个不错的选择。修改新\n\
  \n\n\n添加或移除属性只会影响部分文档，而不会影响整个数据库。这是相较于关系型数据库的一个优势。\n\n这两个例子是最具代表性的。尽管如此，许多公司仍将文档存储数据库作为保存信息的主要机制，以取代关系型数据库。\n\
  \n**实现方案**\n\n这类数据库有多种实现方案。其中一些已经非常稳定，并被全球众多开发者使用。让我们来看看它们。\n\n•   **MongoDB**¹\
  \ 文档完善，被全球众多开发者使用。最新版本提供了多种方式来优化集群实例间的查询、索引、分片、复制和负载均衡。同时，它还允许你在执行查询时进行映射归约和聚合操作，从而减少在应用程序中需要编写的代码量。最后，该数据库支持多种语言，如\
  \ Java、PHP、Go、Python 和 .NET，因此，如果数据库的某个版本出现问题，很多开发者都会报告，维护人员会找到解决方案。最后要提的一点是，MongoDB\
  \ 使用一种名为 BSON 的特殊方式来存储信息，它类似于 JSON，但有所改进。\n\n•   **Amazon DocumentDB**² 类似于 MongoDB\
  \ 的一个分支，针对 AWS 进行了优化，但该数据库中的某些功能无法使用；例如，BigDecimal 精度尚不支持，你需要将数字存储为字符串。该数据库的主要优势在于性能、在可用区中拥有多个实例的能力，以及与监控相关的所有功能。\n\
  \n•   **Azure Cosmos DB**³ 是多种类型的组合，而不仅仅是文档存储。你可以用它来保存关系型数据库、宽列数据库或像 MongoDB 这样的文档存储数据库中的信息。该数据库针对在\
  \ Azure 中使用进行了优化，因此具有与 Amazon DocumentDB 类似的功能，也存在同样的问题。并非所有数据库功能都可用，因此在选择数据库之前需要考虑这一点。\n\
  \n•   **Couchbase**⁴ 与 MongoDB 非常相似。不过，你可以向引擎指示启用或禁用哪些功能，例如索引、搜索和分析，目的是优化操作的执行。该数据库中的信息以\
  \ JSON 格式存储（而非 MongoDB 中的 BSON），这限制了某些可执行的操作。\n\n这些可用的选项都是文档存储数据库。本书使用 MongoDB，根据\
  \ StackOverflow 的一份报告，27% 的开发者在使用它。⁵ 它是最常用的非关系型数据库。此外，Spring Data 从早期版本开始就对 MongoDB\
  \ 提供了大力支持，降低了使用的复杂性。\n\n**什么是 MongoDB？**\n\nMongoDB 是最流行的非关系型数据库之一，它使用类似 BJSON 的格式来存储信息。BJSON\
  \ 是一组键/值元素，类似于 JSON，但其表示方式与键/值数据库无关；在文档存储中，你可以保存复杂的文档并创建不同的查询。\n\n**注意** 该数据库之所以越来越受欢迎，是因为它支持许多\n\
  \n\n\n语言。它提供了一系列在线课程，其理念是任何人都可以学习该数据库的大部分相关概念。所有课程都是免费的，并且会颁发证书。\n\n该数据库结构与关系型数据库存在一定的对应关系；例如，数据库的概念在两者中是相同的。不过，表对应的是集合。表\
  \ 8-1 列出了最相关的对应关系；这有助于你理解 Spring Data Mongo 中出现的许多注解，或者当你在互联网上查找信息时也会有所帮助。\n\n***表\
  \ 8-1.** 两种数据库类型之间的对应关系*\n\n**关系型数据库**\n\n**MongoDB**\n\n数据库\n\n数据库\n\n表\n\n集合\n\
  \n行\n\n文档\n\n列\n\n字段\n\nMongoDB 支持的数据类型与 JSON 支持的类型类似，但包含了一些额外的类型，例如存储空间数据的可能性。如果你想执行某些考虑某物位置/坐标的查询，这一点就很重要，例如，获取我当前位置附近的所有商店。表\
  \ 8-2 展示了 MongoDB 支持的不同数据类型及其在 JSON 结构中的样貌。\n\n第 8 章 MongoDB：文档数据库\n\n***表 8-2.**\
