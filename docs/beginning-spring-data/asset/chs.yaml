  \nEnableRedisRepositories;\n\n@Configuration\n\n@EnableRedisRepositories\n\npublic\
  \ class RedisConfiguration {\n\nfinal RedisSettings settings;\n\npublic RedisConfiguration(RedisSettings\
  \ settings) {\n\nthis.settings = settings;\n\n}\n\n@Bean\n\npublic RedisTemplate<Long,\
