  \nCountry entity = new Country();\n\nentity.setName(name);\n\nIterable<Country>\
  \ country = countryRepository.findAll(Example.\n\nof(entity, matcher));\n\nif(country\
  \ != null) {\n\nresponse = mapper.mapAsList(country, CountryDTO.class);\n\n}\n\n\
  return response;\n\n}\n\n// 之前的源代码\n\n}\n\n此示例获取“name”的值并生成查询以查找信息。最后一步是在控制器中创建一个新方法，该方法接收请求并调用服务（参见清单\
  \ 7-17）。\n\n第 7 章 Redis：键/值数据库\n\n***清单 7-17.*** 控制器中的新方法\n\n@GetMapping(value =\
