  \n第 9 章 Neo4j：图数据库\n\n**实体的注解**\n\n在 Spring Data Neo4j 中，有一组注解可以应用于实体，以指示每个字段或类的含义。让我们在表\
  \ 9-2 中探讨一些最相关的注解。\n\n***表 9-2.** 最常见的 Neo4j 实体注解*\n\n**Spring Data Neo4j 注解** **含义**\n\
  \n@Node 此注解向 Spring Data 指示该类是候选对象，用于将信息持久化到数据库中。\n\n@Id 此注解指示该属性需要是唯一的，并充当关系数据库中的主键。\n\
  \n@relationship 使用此注解，你可以指示两个实体之间存在某种程度的关系。你可以将此注解视为 JPA 中 @OneToMany、@OneToOne\
  \ 和 @ManyToMany 注解的组合。\n\n@GeneratedValue 此注解指示该属性需要使用某种机制生成；它与 JPA 中同名的注解类似。\n\n\
  @property 使用此属性来指示需要持久化的属性名称，使其仅包含特定值。它类似于 JPA 中的普通列。\n\n**注意** 其中一些注解在之前的版本中有所更改，因此如果你有任何\n\
  \n\n\n问题可能不尽相同；例如，早期版本中的注解 @**Node** 现在是 @**NodeEntity**。\n\n与 Spring Data 其他数据库实现的主要区别在于，当您指明一个实体与其他实体存在关系时，它会尝试像\
  \ JPA 中的级联操作一样持久化所有信息，并检测数据库中是否已存在该节点，以避免重复信息，从而在节点之间创建关系。\n\n清单 9-3 修改了之前的 Country\
  \ 实体，使用表 9-1 中的 Neo4j 注解来持久化信息。\n\n第 9 章 Neo4j：图数据库\n\n***清单 9-3.*** Neo4j 实体的定义\n\
  \nimport org.springframework.data.neo4j.core.schema.*;\n\nimport java.io.Serializable;\n\
  \nimport java.util.List;\n\nimport java.util.Objects;\n\n@Node(\"Country\")\n\n\
