  ***图 1-13.** 组合两种模式的结构*\n\n**数据传输对象（DTO）**\n\n数据传输对象（DTO）模式在多种语言中使用，它聚合并封装数据，用于在应用程序或应用程序的各层之间传输。你可以将此模式视为一种不包含任何业务逻辑的数据结构，它可以表示多种结构的组合。\n\
  \n这种模式并非近期才出现。Martin Fowler 在 2002 年出版的《企业应用架构模式》一书中提到了它。在他的网页.25 上也对此进行了讨论。\n\n\
  该模式有助于减少为获取执行特定任务所需的所有信息而调用不同端点或进程的次数，这些调用在时间或传输信息量方面成本高昂。\n\n25 [`martinfowler.com/eaaCatalog/dataTransferObject.html`](https://martinfowler.com/eaaCatalog/dataTransferObject.html)\n\
