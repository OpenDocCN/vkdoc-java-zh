  \ 配合良好，可用于获取此信息。\n\n**验证模式**\n\n当你尝试将一个实体的信息持久化到数据库时，需要确保所有字段的值都是有效的。如果发送了错误的值或空的属性，数据库会因查询无效而抛出异常。这种情况意味着数据会在网络中传输，最终产生与你进行应用层验证相同的结果。像\
  \ AWS 和 GCP 这样的云提供商会根据网络传输的数据量收费，因此，如果你能减少直接发往数据库的请求数量，就能降低成本。\n\n为了解决这个问题，Java\
  \ 引入了 JSR380 规范 2，它提供了一组注解，涵盖了最相关的验证，例如检查某个值是否为空、是否为空字符串或是否具有特定大小。该规范仅声明了接口。多年来，唯一的实现是\
  \ Hibernate Validator3。但从 Spring Boot 2 开始，Spring Validator4 成为了一个替代选项。\n\n**注意**\
  \ 一个好的实践是在第一层（即使用 Spring Boot 作为控制器的微服务层）使用验证，但这并非唯一选择。如果你有相应的实现，也可以在服务层或仓库层等其他层使用验证。\n\
