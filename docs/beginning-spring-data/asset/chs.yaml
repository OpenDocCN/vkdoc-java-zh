  \n**仓库支持**\n\n当你编写一个需要从数据库持久化/检索信息的应用程序时，大多数情况下你会创建一个包含所有这些操作的类或层。\n\n有多种方式对这些操作进行分组：全部放在同一个类中，每个表一个类，但最常见的方式是创建一个代表\
  \ DAO 模式的类（下一节将详细讨论），其中包含一个表的所有操作。这意味着你可以有多个类来访问数据库，其主要区别在于所访问的表。为了降低拥有多个包含相同代码的类的复杂性，Spring\
  \ Data 提供了使用一个包含所有这些操作的抽象层的可能性，你只需指明所访问的实体/表的名称。\n\nSpring Data 提供了提供通用数据库操作的接口。你需要创建一个继承自这些通用接口之一的接口，并指明要访问的表或结构。在后台，Spring\
  \ Data 会根据数据库类型将此接口转换为一个查询来保存/检索信息。图 1-9 展示了组合接口以拥有更多可用操作，本书第二部分将对此进行更详细的介绍。\n\n\
  ***图 1-9.** 扩展默认 Spring Data 方法的仓库示例*\n\n第 1 章 应用程序架构\n\n**架构类型**\n\n应用程序通常具有一种结构，有助于你理解在哪里可以找到逻辑，例如验证、业务逻辑、实体以及访问数据库的接口/类。所有这些对于理解层的层次结构以及创建新功能或应用程序时需要遵循的规则都很重要。\n\
  \n在 Java 中，像 Archunit22 这样的工具允许你定义并检查项目中的一切是否遵循你定义的结构。\n\n**分层架构**\n\n这种架构类型是最简单的，因为它将应用程序像蛋糕一样拆分成不同的层，每一层只能访问同一层或更低层的元素。这类架构从具有四层（如视图/表示层、业务逻辑层、持久化层和数据库层）的架构演变为三层或五层的架构。\n\
  \n对于正确的层数没有统一的标准。但是，如果你认为三层是较少的层数，那么 Spring Boot 由控制器、服务、仓库和数据库表示，而数据库在 Spring 中并不直接作为层出现。\n\
  \n图 1-10 展示了这类架构的表示以及不同层之间如何交互。\n\n22 [`www.archunit.org/`](https://www.archunit.org/)\n\
  \n![](img/index-42_1.png)\n\n第 1 章 应用程序架构\n\n***图 1-10.** 分层的基本结构*\n\n第 1 章 应用程序架构\n\
  \n**优点**\n\n这种结构具有以下优点。\n\n•   实现和维护简单，因为你只有一个层的层次结构。\n\n•   每一层只有一个职责，并且不知道如何实现其他层的逻辑，因此你可以对某些层的逻辑进行修改，而不会直接影响其他层。\n\
  \n•   所有项目中的结构大致相同。你可以从一个项目切换到另一个项目，并知道在哪里找到所需内容。\n\n**缺点**\n\n这种架构类型具有以下缺点。\n\n\
  •   隐藏了用例，很难知道所有类或对象是如何连接起来表示一个用例的。\n\n•   根据层的大小和数量，你可能会遇到可扩展性问题，因为你可能有多个类/\n\n\
  \n\n同一包或层中的接口。\n\n**注意**：本书并未正式推荐您必须使用哪种架构类型，但大多数示例遵循分层架构。\n\n**六边形架构**\n\n分层架构为开发者提供了一种创建应用程序并理解角色或职责分离的简单方式。2005\
  \ 年，Alistar Cockburn23 提出了一种新的替代方案，该方案封装或保持所有与数据库或外部系统的外部通信无关。\n\n23 [`alistair.cockburn.us/hexagonal-architecture/`](https://alistair.cockburn.us/hexagonal-architecture/)\n\
  \n![](img/index-44_1.png)\n\n第 1 章 应用程序架构\n\n为此，他在架构中创建了输入/输出的概念，以表示与数据库或外部系统等外部资源的通信。\n\
  \n这种架构类型的主要思想是创建所有业务逻辑，使其与应用程序工作方式无关的外部工具和技术相隔离。图 1-11 展示了六边形架构的不同元素，以及如何与数据库或其他应用程序等外部资源进行交互。\n\
  \n***图 1-11.** 包含最相关层的六边形架构*\n\n该架构将六边形分为两部分。一部分称为“驱动侧”，由参与者（如外部系统和 Web/移动系统）发起交互。另一部分称为“被驱动侧”，参与者在此接收请求，以从数据库或其他外部系统获取特定信息。\n\
  \n**组件**\n\n六边形架构在结构的每个部分内部都有多个组件，但我只提及理解基本思想最相关的部分。\n\n• **基础设施** 包含负责使用不同协议与外部系统或数据库连接的端口和适配器。*端口*是与技术无关的接口，定义了访问应用程序或其他系统的方法。*适配器*是与特定技术相关的端口实现，例如对数据库的查询或\
  \ REST 控制器。\n\n第 1 章 应用程序架构\n\n• **用例** 是系统的核心，因为它包含了与各种场景及其关联方式相关的所有逻辑。根据作者的不同，该组件可能被称为*应用程序层*或*领域层*，并将用例与领域组件相结合。\n\
  \n• **实体** 是应用程序的纯领域，包含应用程序组件中使用的所有值对象实体。\n\n**优势**\n\n这种结构具有以下优势。\n\n• 您可以毫无问题地更改或替换适配器。\n\
  • 领域和用例是纯粹的，因此您可以理解业务逻辑。\n• 您可以为了测试目的更改端口的实现。\n\n**缺点**\n\n这种架构类型具有以下缺点。\n\n• 实现某些框架很困难，因为您可能会错误地判断什么是适配器/端口。\n\
  • 引入间接性来查找每个端口的实现。\n• 没有指导方针解释有关项目组织的所有事项，因此任何人都可能引入错误。\n\n第 1 章 应用程序架构\n\n**持久化设计模式**\n\
  \n在本书中，某些代码遵循相同的结构，因为这些模式与数据库访问相关联。本节介绍这些模式中最相关的部分，但本书未涵盖其他模式，其中大部分在 Martin Fowler\
  \ 的网站上有所提及。24\n\n**数据访问对象（DAO）**\n\n数据访问对象（DAO）模式用于持久化数据库信息并从中检索信息。它允许开发者将业务层与持久化层隔离，持久化层在大多数情况下与数据库关联，但也可能是任何负责访问信息的组件。\n\
  \n该模式将所有 CRUD 操作的复杂性隐藏到\n\n\n数据库，这样你就可以在不显著影响其他所有层的情况下进行更改或引入修改。在 Spring Data 中这并不常见，因为大多数开发者都使用**仓库模式**。但某些与性能或操作相关的场景并不支持该模式，因此\
  \ DAO 模式应运而生，帮助我们解决这些问题。\n\n图 1-12 展示了遵循此模式时，不同的接口/类如何交互以访问数据库。\n\n24 [`martinfowler.com/`](https://martinfowler.com/)\n\
  \n![](img/index-47_1.png)\n\n第 1 章 应用程序架构\n\n***图 1-12.** DAO 接口及其实现，以及与* *服务层*\
  \ *的交互方式*\n\n当开发者开始使用此模式时，大多数人会创建一个包含所有可能方法的通用接口，并创建一个类来访问特定表，从而减少与数据库访问相关的文件数量。清单\
  \ 1-1 展示了一个常见 DAO 可能拥有的不同方法，当然，你也可以创建其他方法，但大多数框架都实现了这些方法。\n\n***清单 1-1.*** 访问数据库的通用接口\n\
  \npublic interface CommonDao<T> {\n\nOptional<T> get(long id);\n\nList<T> getAll();\n\
  \nvoid save(T t);\n\nvoid delete(T t);\n\n}\n\n第 1 章 应用程序架构\n\n现在你已经看到了一个通用接口，其实现方式在所有情况下都大同小异。区别在于表名和访问数据库的查询语句，但所有\
  \ DAO 都遵循相同的格式。\n\n清单 1-2 展示了清单 1-1 中接口的一种可能实现；请注意，还有其他实现方式。\n\n***清单 1-2.*** 通用\
  \ DAO 的实现\n\npublic class CityDao implements CommonDao<City> {\n\nprivate List<City>\
  \ cities = new ArrayList<>();\n\npublic CityDao() {\n\ncities.add(new City(\"BUE\"\
  , \"Buenos Aires\"));\n\ncities.add(new City(\"SCL\", \"Santiago de Chile\"));\n\
  \n}\n\npublic Optional<City> get(long id) {\n\nreturn Optional.ofNullable(cities.get((int)\
  \ id));\n\n}\n\npublic List<City> getAll() {\n\nreturn cities;\n\n}\n\npublic void\
  \ save(City city) {\n\ncities.add(city);\n\n}\n\npublic void delete(City city) {\n\
  \ncities.remove(city);\n\n}\n\n}\n\n**注意** 仅关注模式示例，这里并没有数据库与应用程序内存中创建城市之间的真实连接，但概念是相同的。\n\
  \n第 1 章 应用程序架构\n\n**仓库模式**\n\n仓库模式通过访问数据库来获取特定信息，并为其他层引入了一层抽象。仓库模式的精神在于，通过使用接口访问领域对象，来模拟或协调领域与数据映射之间的关系。\n\
  \nDAO 模式与仓库模式的主要区别在于，仓库更贴近业务逻辑，并试图隐藏所有与数据库查询相关的逻辑。最常见的用法是创建一个包含特定方法的接口；像 Spring\
  \ Boot 和 Quarkus 这样的框架会将这些方法转换为针对数据库的特定查询。相比之下，DAO 则使用查询来实现所有访问数据库的逻辑。\n\n请参阅表 1-6\
  \ 来查看这两种方法之间的主要区别。\n\n***表 1-6.** DAO 与仓库的主要区别*\n\n**DAO 模式**\n\n**仓库模式**\n\n更贴近数据库，因为它使用查询和表。\n\
  \n更贴近业务/领域层，因为它提供了隐藏实现的抽象。\n\nDAO 不能包含仓库，因为它们位于不同的层。\n\n仓库可以包含或实现 DAO。\n\n它是数据的抽象。\n\
  \n它是对象集合的抽象。\n\nSpring Data 为开发者提供了一个基本接口，用于实现分页和 CRUD 操作的逻辑，而无需额外工作。清单 1-3 展示了一个遵循仓库模式的接口示例。\n\
