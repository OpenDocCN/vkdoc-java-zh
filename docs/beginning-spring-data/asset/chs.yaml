  \ 15:51:13.706 UTC [1] 日志：数据库系统已准备好接受连接\n\n**多重集成测试**\n\n当您需要测试仓库并将所有运行容器的逻辑放在该类中时，这没有问题，但如果您有很多仓库需要检查，会发生什么？Testcontainers\
  \ 提供了重用的替代方案：一个容器用于一个类的所有测试，或者一个容器用于所有测试的执行。\n\n在前面的章节中，您看到了在此库中为每个测试使用数据库或容器的策略。但是，您可以明确指示每个测试需要一个全新的容器，或者混合可以重用数据库的测试。为此，请使用\
  \ **withReuse** 方法指示 Testcontainers 保持此容器存活以供下次运行。\n\n第 12 章 单元测试与集成测试\n\npublic\
  \ static PostgreSQLContainer postgreSQL =\n\nnew PostgreSQLContainer<>(\"postgres:14\"\
  )\n\n.withUsername(\"postgres\")\n\n.withPassword(\"postgres\")\n\n.withDatabaseName(\"\
  catalog\")\n\n.withReuse(true); // 这表示您希望保持容器存活\n\n您需要删除显式停止容器的语句，因为该指令在这种情况下不起作用。下一个集成测试将从一个全新的容器开始。\n\
  \n**初始化策略**\n\n\n\n在使用数据库时，你需要先通过信息对其进行初始化，然后再运行所有测试来解决这个问题。以下是几种策略。\n\n• 使用像 Flyway\
  \ 或 Liquibase 这样的数据库迁移工具，但并非在所有情况下都适用。这些工具用于向数据库中填充信息。如果你使用它们来创建表结构，则需要寻找另一种工具，例如\
  \ DBUnit。12\n\n• 数据库容器提供了一种方法，可以包含一个脚本来填充所有数据库。\n\npublic static PostgreSQLContainer\
  \ postgreSQL =\n\nnew PostgreSQLContainer<>(\"postgres:14\")\n\n.withUsername(\"\
  postgres\")\n\n.withPassword(\"postgres\")\n\n.withInitScript(\"db/migration/V1.0__init_\n\
  \ndatabase.sql\") //初始化脚本的路径\n\n.withDatabaseName(\"catalog\");\n\n12 [`www.dbunit.org/`](https://www.dbunit.org/)\n\
  \n第 12 章 单元测试与集成测试\n\n• 另一种策略是创建一个自定义镜像，并将所有信息预加载到 Docker 仓库中。这种镜像的主要问题在于需要负责维护该自定义镜像中更新的结构和信息。不过，这种方法有助于重现关键错误或异常情况。\n\
  \npublic static PostgreSQLContainer postgreSQL =\n\nnew PostgreSQLContainer<>(\"\
  custom-postgres:1.0.0\")\n\n.withUsername(\"postgres\")\n\n.withPassword(\"postgres\"\
  );\n\n• 最后一种策略是在容器启动后，在容器内部执行命令。这种策略对于像 LocalStack 这样模拟基础设施的容器可能很有用。\n\n**潜在问题**\n\
  \nTestcontainers 并非能解决所有问题的银弹，但它能帮助你检测查询中的问题。\n\n另一方面，它也引入了其他需要考虑的问题。\n\n每次启动容器时，测试的执行时间都会增加。不同数据库的耗时也不同；例如，Cassandra\
  \ 数据库比 MySQL 数据库运行时间更长。在同一类的方法中重用容器至关重要，以防止每个测试都创建新容器。\n\n• 如果你使用固定端口并在流水线中运行测试（例如使用\
  \ Jenkins），则存在两个或多个应用程序使用相同端口而导致端口冲突的风险。此外，如果某个应用程序出现异常且未停止容器，那么下次运行同一应用程序的流水线时，这些端口将不可用，并会出现异常。最佳解决方案是使用一种机制来为容器获取随机端口。\n\
  \nTestcontainers 考虑到可能会发生此问题，因此默认提供随机端口，但你可以设置端口，并且在书籍或文章中出现的示例通常会设置端口。以下是一个定义了镜像端口的容器示例。\n\
  \n第 12 章 单元测试与集成测试\n\nPostgreSQLContainer postgreSQL = new PostgreSQLContainer(\"\
  postgres:14\")\n\n.withDatabaseName(\"integration-tests-database\")\n\n.withUsername(\"\
  test\")\n\n.withPassword(\"test\")\n\n.withExposedPorts(5432); //尽量不要设置此属性，因为默认情况下\
  \ Testcontainers 会使用随机端口来运行容器\n\n• 尝试在生产环境中使用相同的数据库版本。如果你在 AWS 上使用 ElasticSearch\
  \ 等数据库的自定义版本，请使用 LocalStack，这是一个包含大部分 AWS 服务以便在本地运行的容器。\n\n• 集成测试中存在大量重复代码来初始化容器。为了解决这个问题，你可以创建一个抽象类，定义应用程序运行所需的所有容器，以及所有需要继承该类的测试。\n\
  \n• 测试中使用的所有镜像都会下载到机器上，因此你需要定期清理，以防止所有镜像占用大量空间。\n\n• 一个潜在的问题是存在多个不同数据库的连接，因此编写配置并不简单。为了解决这个问题，你可以创建一个\
  \ docker-compose 文件并执行，其中包含允许你同时运行多个容器的模块。\n\n*import com.apress.catalog.model.Country;*\n\
  \nimport org.junit.jupiter.api.AfterAll;\n\n\n\nimport org.junit.jupiter.api.BeforeAll;\n\
  \nimport org.springframework.beans.factory.annotation.Autowired;\n\nimport org.springframework.test.context.DynamicPropertyRegistry;\n\
  \nimport org.springframework.test.context.DynamicPropertySource;\n\nimport org.testcontainers.containers.DockerComposeContainer;\n\
  \nimport org.testcontainers.containers.wait.strategy.Wait;\n\nimport java.io.File;\n\
  \nimport java.util.Optional;\n\n第 12 章 单元测试与集成测试\n\nimport static org.junit.jupiter.api.Assertions.*;\n\
