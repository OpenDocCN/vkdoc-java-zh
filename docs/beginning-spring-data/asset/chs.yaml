  \ code);\n}\n\n**定义查询**\n\n大多数情况下，Spring Data 通过使用关键字定义新方法所提供的简单查询非常出色，但并非总是如此。有时，由于查询本身的复杂性，或者因为你发现了性能问题，你需要自行定义查询。\n\
  \n如果你不想使用仓库的默认功能，Spring Data 提供了替代方案，例如在仓库中手动创建查询，或使用按示例查询。让我们简要讨论一下。\n\n**使用注解编写查询**\n\
  \n如果你熟悉 MongoDB 并在 Compass 等用户界面上编写查询，那么这种方法对你来说也不会陌生。与 JPA 一样，Mongo 也支持使用注解定义查询。清单\
  \ 8-7 编写了整个查询，或结合关键字定义编写了部分查询。\n\n***清单 8-7.*** 自定义查询\n\npublic interface CountryRepository\
  \ extends MongoRepository<Country, Long> {\n// 这是一个仅针对单个字段进行查询的自定义查询\n@Query(value\
  \ = \"{'code': ?0}\")\nList<Country> findCustom(String code);\n\n// 这是一个将方法名中的条件与查询相结合的自定义查询\n\
  @Query(value = \"{'code': ?0}\")\nList<Country> findEnabled(String code);\n}\n\n\
  第 8 章 MongoDB：文档数据库\n\n一个良好的可读性实践是使用这些方法之一，而不是创建结合方法名条件的复杂查询。此外，你可以在 JPA 中使用 @Param。\n\
  \n**按示例查询**\n\n这是 Spring Data 的另一个有趣特性，你在 Redis 章节中已经实现过。不过，使用 MongoRepository<T,ID>\
  \ 有一些优势。你无需做任何更改，因为该接口扩展自 **QueryByExampleExecutor<T>** 。你只需要创建匹配器和对象来执行查询。\n\n\
  使用示例编写查询的逻辑与第 [7](https://doi.org/10.1007/978-1-4842-8764-4_7) 章相同。为简单起见，不要重复底部看到的代码，只需在调用仓库时，在\
  \ CountryService 中包含所需的 ExampleMatcher。\n\nExampleMatcher matcher = ExampleMatcher.matching()\n\
  .withIgnorePaths(\"code\")\n.withIncludeNullValues()\n.withMatcher(\"name\", ExampleMatcher.GenericProperty\n\
  Matcher.of(ExampleMatcher.StringMatcher.DEFAULT));\n\n**将 MongoTemplate 与自定义仓库结合使用**\n\
  \n回想一下，Spring Data 提供了两种访问数据库的替代方案；一种是最常见的方法，即创建一个接口作为仓库，并将所有信息转换和操作创建的工作委托给 Spring。另一种替代方案是，你创建一个自定义仓库，并使用一种机制来执行操作，在\
  \ Mongo 中，这指的是使用 MongoTemplate。\n\nMongoTemplate 能提高某些数据库操作的性能，而且你可以做很多事情，比如创建查询。表\
  \ 8-5 详细说明了 MongoRepository<T, ID> 和 MongoTemplate 之间的主要区别，以帮助你更好地理解。\n\n\n\n在需要区分使用场景时，应选择合适的方式。\n\
  \n第 8 章 MongoDB：文档数据库\n\n***表 8-5.** 访问 MongoDB 方式的主要区别*\n\n**优点**\n\n**缺点**\n\n\
  Mongotemplate\n\n可以指定需要更新的字段，而非更新整个文档。\n\n代码行数较多，而大部分操作其实很简单。\n\n提供了执行所有 Mongo 操作的可能性，例如`updateFirst`和`upsert`。\n\
  \nMongorepository\n\n遵循与 Spring Data JPA 相同的方法结构`<T, ID>`，因此你可以使用预定义的方法，或通过关键字创建新方法。\n\
  \n它按标准创建操作并遵循规范，因此某些操作的性能可能不够理想。\n\n为了实际演示，我们创建一个包含 MongoTemplate 的自定义仓库。清单 8-8\
  \ 展示了如何执行与普通仓库相同的操作。\n\n***清单 8-8.** 自定义仓库接口定义*\n\n```java\npackage com.apress.catalog.repository;\n\
  \nimport com.apress.catalog.model.Country;\n\nimport java.util.Optional;\n\npublic\
  \ interface CustomCountryRepository {\n\n    Country save(Country entity);\n\n \
  \   Optional<Country> findById(Long id);\n\n    void deleteById(Long id);\n\n}\n\
  ```\n\n创建仓库接口后，下一步是实现与**MongoTemplate**交互的代码。清单 8-9 演示了这一点。\n\n第 8 章 MongoDB：文档数据库\n\
  \n***清单 8-9.** 自定义仓库的实现*\n\n```java\npackage com.apress.catalog.repository.impl;\n\
  \nimport com.apress.catalog.model.Country;\nimport com.apress.catalog.repository.CustomCountryRepository;\n\
  import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.data.domain.Example;\n\
  import org.springframework.data.mongodb.core.MongoTemplate;\nimport org.springframework.data.mongodb.core.query.Criteria;\n\
  import org.springframework.data.mongodb.core.query.Query;\nimport org.springframework.stereotype.Repository;\n\
  \nimport java.util.Optional;\n\n@Repository\npublic class CustomCountryRepositoryImpl\
  \ implements\n        CustomCountryRepository {\n\n    //此类将帮助你与数据库交互\n    private\
  \ final MongoTemplate mongoTemplate;\n\n    @Autowired\n    public CustomCountryRepositoryImpl(MongoTemplate\
  \ mongoTemplate) {\n        this.mongoTemplate = mongoTemplate;\n    }\n\n    @Override\n\
  \    public Country save(Country entity) {\n        return mongoTemplate.save(entity);\n\
  \    }\n\n    @Override\n    public Optional<Country> findById(Long id) {\n    \
  \    Country country = mongoTemplate.findById(id, Country.class);\n        return\
  \ Optional.of(country);\n    }\n\n    //在此方法中，你将使用 Query 类向数据库发送删除文档的条件\n    @Override\n\
  \    public void deleteById(Long id) {\n        Query query = new Query();\n   \
  \     query.addCriteria(Criteria.where(\"id\").is(id));\n        mongoTemplate.remove(query,\
  \ Country.class);\n    }\n}\n```\n\n你可以使用简单的 MongoTemplate 来查找特定元素、将信息持久化到数据库，或使用\
  \ Spring Data Mongo 提供的类编写查询。如果你想使用 Query 类编写复杂查询，最佳实践是创建一个包含所有查询定义的新类。\n\n要使用此仓库，你需要像上一章一样修改`CountryService`。如果重新运行应用程序并执行保存或检索操作，你将看到与之前仓库相同的行为。\n\
  \n值得一提的是，在这些修改中并未体现的一点是：MongoDB 支持像 JPA 一样使用`@Transactional`注解。\n\n**本章小结**\n\n\
  本章涵盖了 MongoDB 最相关的方面，这是一个由 Spring Data 支持的流行非关系型数据库。\n\n要使用此数据库，你需要分析持久化信息的方式，因为你可以使用`@DBRef`来链接或引用另一个实体，也可以在不使用它的情况下复制信息。\n\
  \n**第 9 章**\n\n**Neo4j：图数据库**\n\n本书之前介绍的大多数数据库都以类似的结构存储信息。你需要借助图表或工具来帮助理解。\n\n\n\
  它们组织信息的方式。但当另一种数据组织方式出现——一种能让表示和访问更易于理解的方式时，会发生什么呢？\n\n本章将解释图数据库的工作原理，以及如何使用 Spring\
  \ Data 进行操作。让我们探索一些用例、实现方式以及 Neo4j。\n\n**什么是图数据库？**\n\n图数据库是一种用节点和连接线表示直接相连实体的图形化表示方式，其中连接线代表实体之间的关系，这与使用表格或文档的其他类型数据库不同。每个节点代表一个实体，并包含该节点内连接的所有信息，而节点之间的关系则代表关联。\n\
  \n让我们将之前的 **api-catalog** 示例转换为一组节点和连接线来阐明这一概念，如图 9-1 所示。\n\n© Andres Sacco 2023\n\
  \nA. Sacco, *Beginning Spring Data*[, https://doi.org/10.1007/978-1-4842-8764-4_9](https://doi.org/10.1007/978-1-4842-8764-4_9#DOI)\n\
  \n![](img/index-243_1.png)\n\n第 9 章 Neo4j：图数据库\n\n***图 9-1.** 节点与连接线表示示例*\n\n这种类型的数据库解决了许多问题，远不止图\
  \ 9-1 所示的示例，下一节将进行说明。\n\n**可能的用例**\n\n在某些情况下，这些数据库是很好的候选方案，但并没有限制它们在其他场景中的使用。让我们看看几个可能的用途。\n\
  \n• **社交网络**：数据库有助于表示人与人之间的关系，以便查看每个人的动态或发布内容。\n\n• **模拟航班航线**：节点可以是机场和航班。使用节点可以轻松表示或查找特定机场，并检查哪些航班可用于特定目的地。此外，您还可以将此用例应用于其他地面交通方式，如火车或巴士。\n\
  \n• **检测欺诈模式**：您可以对购买行为及其发生的 IP 地址进行建模。如果检测到在短时间内、不同地点发生了多次操作，您可以简化检测过程。\n\n第 9\
  \ 章 Neo4j：图数据库\n\n• **推荐引擎**：假设您有一个电子商务网站，您的客户购买各种商品。如果产品之间存在一定程度的关联，您可以提供其他可能符合某些条件的选项，例如产品类别。此外，推荐引擎也可用于在\
  \ Spotify 上推荐歌曲，或在 Netflix 上推荐新电影。\n\n• **表示层级结构**：如果您是一家大公司的成员，您通常想了解某个人的合作伙伴或上级。通过使用图，您可以轻松地表示和查看公司的组织结构。\n\
  \n**实现方案**\n\n这类数据库有多种实现方案。其中一些已经非常稳定，并被全球众多开发者使用。让我们来了解一下。\n\n• **Neo4j**[¹]：该数据库是最古老的图数据库之一，支持包括\
  \ Java 在内的多种语言，并被全球大多数大型公司使用。它提供了使用社区版的可能性，您需要自行负责数据库的管理；或者您也可以选择使用云服务，类似于 MongoDB\
  \ Atlas。这意味着您需要为服务的使用付费，但可以轻松配置备份、恢复以及运行的实例数量。关于该数据库，有大量的书籍、文章、StackOverflow 讨论和视频。附录\
  \ F 列出了一些推荐书籍。\n\n• **Redis Graph**[²]：这个基于 Redis 的数据库提供了使用图的可能性。这个幕后工具实现了 GraphBLAS，它定义了一组矩阵结构（环结构）来进行图的表示。这种数据库模型具有优势，\n\
  \n[¹]: https://neo4j.com/v2/\n[²]: https://redis.io/docs/stack/graph/\n\n第 9 章 Neo4j：图数据库\n\
  \n\n\n类似于性能，并使用 openCypher3 来编写和执行查询。你可以将其作为一个需要添加到 Redis 实例中的模块来使用，但关于该主题的文章、书籍和视频并不多，因此如果出现异常情况，你可能找不到答案。\n\
  \n• **Amazon Neptune**:4 这是一个图数据库的自定义实现，可在 AWS 环境中运行。在该环境中，你需要为数据库消耗的内存/CPU 付费，并根据数据库接收的入站/出站流量支付一定费用。该数据库的主要特点是易于自动扩展，因为你将所有事务都委托给\
  \ AWS，并且可以降低读取实例之间的加载延迟，以及在无需任何操作的情况下增加存储容量。\n\n本书使用 Neo4j，一个流行的图数据库。自早期版本起，Spring\
  \ Data 就为该数据库提供了广泛支持，从而降低了其使用复杂度。\n\n**什么是 Neo4j？**\n\nNeo4j 是一个图数据库，支持像关系数据库一样的\
  \ ACID 属性，你可以在不宕机或丢失信息风险的情况下扩展数据库。该数据库针对跨节点查询以获取特定信息进行了优化。它被用于那些通过 GraphQL 暴露接口的应用程序中。5\n\
  \n以下是其最相关的特性。\n\n• 无需进行连接操作即可获取存储在另一个节点上的信息，因为它可以直接获取相连的邻近节点的信息。\n\n• 它提供了一个灵活且简单的数据模型，可以毫无问题地进行更改。\n\
  \n3 [`opencypher.org/`](https://opencypher.org/)\n\n4 [`aws.amazon.com/neptune`](https://aws.amazon.com/neptune)\n\
  \n5 [`graphql.org/`](https://graphql.org/)\n\n第 9 章 Neo4j：图数据库\n\n• 许多语言都支持它，包括\
  \ Java、Scala 和 Node.js。\n\n• 它提供了一种声明式语言来编写人类可读的查询。\n\n关系数据库与 Neo4j 之间存在一定的相似性，这有助于你理解\
  \ Neo4j 的组织方式，如表 9-1 所示，该表解释了 Spring Data Neo4j 中出现的一些注解。6\n\n***表 9-1.** 两种数据库之间的等价关系*\n\
  \n**关系数据库**\n\n**Neo4j**\n\n数据库\n\n数据库\n\n表\n\n节点\n\n列\n\n属性\n\n约束\n\n关系\n\n让我们来审视这些概念。\n\
  \n• **节点** 代表一个对象，它可以拥有一个或多个按标准分组的属性。作为 Neo4j 官方文档的建议，名称的定义需要使用驼峰命名法。7\n\n• Neo4j\
  \ 中的 **属性** 代表一个键值对，用于存储关于一个节点及其关系的信息。例如，在 api-catalog 中，一个属性可以是国家代码或描述。Neo4j 支持的部分属性类型包括字符串、浮点数、长整型、日期（所有变体）和点。\n\
  \n• **关系** 连接一个或多个节点，在大多数情况下是单向的，但也可以实现双向连接。\n\n6 [`spring.io/projects/spring-data-neo4j`](https://spring.io/projects/spring-data-neo4j)\n\
  \n7 [`neo4j.com/developer/cypher/style-guide/`](https://neo4j.com/developer/cypher/style-guide/)\n\
  \n第 9 章 Neo4j：图数据库\n\n**注意** 有许多工具可以在不创建查询的情况下绘制图形。其中最相关的是 arrows，8 Neo4j 支持该工具。你可以拖放节点，包括它们之间的链接，并包含属性，完成后，你可以导出结果，这可以是一个在\
  \ Neo4j 浏览器中运行的 Cypher 查询。\n\n**Spring Data Neo4j 简介**\n\nSpring Data 通过直接与驱动程序协作来支持数据库。在\
  \ Neo4j 中，Spring Data Neo4j9 项目已经存在多年，旨在帮助降低数据库配置和实体的复杂度。\n\n\n\n关于此项目实现的一个考量点是对使用\
  \ Neo4j 集群的支持；这是可行的，但需要在数据库和 **application.yml** 中进行额外配置。\n\n**数据库与连接设置**\n\n在本节中，你将了解如何使用\
  \ Neo4J 配置之前的 api-catalog，但排除了关于数据库安装和配置的所有细节，这些内容你可以在附录 E 中查看。\n\n让我们将 Neo4j 依赖项添加到\
  \ api-catalog 中（参见清单 9-1）。你无需显式包含 Neo4j 驱动程序，因为该依赖项已包含它。遵循同样的规则，不要包含 Spring Data\
  \ Neo4j 的依赖版本。只需包含该依赖项，并将版本选择委托给 Spring Boot，它会选择最佳版本。\n\n***清单 9-1.*** 与 Neo4j\
