  \n**第 2 章**\n\n**Spring 基础与进阶**\n\n在第 [1](https://doi.org/10.1007/978-1-4842-8764-4_1)\
  \ 章中，你了解了在数据库中持久化信息的方法。Spring Data 是唯一一个提供使用关系型和非关系型数据库可能性的方案。\n\n在讨论框架如何在幕后工作之前，你需要了解\
  \ Spring 框架是如何工作的。在本章中，你将学习如何创建一个小型项目，该项目将在本书中一直使用。\n\n根据 Synk[1](https://snyk.io/jvm-ecosystem-report-2021/?utm_campaign=JVM-SC-2021&utm_medium=Report-Link#spring-dominates)\
  \ 每年进行的调查，58% 的开发者使用 Spring，因为它提供了无需太多努力即可创建应用程序的可能性。\n\n此外，该框架还提供了与 Vault、Kubernetes、Apache\
  \ Kafka 等众多其他工具的集成。\n\n**注意** 本书不会涵盖与 Spring 框架和 Spring Boot 相关的所有主题，因为许多其他 Apress\
  \ 书籍已经涵盖了这些内容。以下仅是对相关概念的简要概述。\n\n**Spring 基础**\n\nSpring 的第一个版本于 2004 年发布，此后，采用该框架的开发者数量以及其支持的功能/技术数量都在增长。如今，有一个庞大的开发者社区为每个\
  \ Spring 版本出现的问题提供支持。每年都会举办一次年度会议，会议主题是向开发者展示最新版本的最新功能。\n\n该框架提供了一个容器，用于创建和管理现有组件。定义这些组件的方式是使用注解或\
  \ XML，如今在定义组件时，XML 已不那么流行。Spring 应用上下文负责管理每个组件的生命周期。Spring 应用了一种称为依赖注入（DI）的模式，这是一种对象接收其所依赖的其他对象的技术。其他对象的状态由\
  \ Spring 管理，无需开发者干预。图 2-1 展示了 Spring 中不同组件之间的交互方式。\n\n***图 2-1.** 组件之间的交互*\n\nSpring\
  \ 是一个由多个模块组成的生态系统，这些模块相互交互以提供功能。该生态系统包含以下元素。\n\n\n\n• **核心** 包含了 Spring 在各模块中使用的所有核心功能，例如依赖注入或组件生命周期管理。\n\
  \n• **Web** 是一个支持开发处理 HTTP 请求的 Web 应用程序的模块组。\n\n• **数据访问** 提供了一套基本工具，用于将信息持久化存储到关系型和非关系型数据库等地方。\n\
  \n• **测试** 是一个提供支持的模块组，用于创建测试以检查你使用 Spring 开发的一切是否运行正常。\n\n图 2-2 展示了组成 Spring 框架的不同模块。\n\
  \n![](img/index-56_1.png)\n\n第 2 章 Spring 基础与进阶\n\n***图 2-2.** Spring 模块*\n\n**Spring\
  \ Boot**\n\nSpring Boot 是一个于 2014 年发布的项目，旨在降低创建和开发 Java Web 应用程序的复杂性，它在底层使用了 Spring。Spring\
  \ Boot 的一些关键特性包括：自动配置所有组件以便快速上手，无需在 Web 服务器上部署构件（artifact），并提供监控和检查一切是否正常运行的方法。\n\
  \n![](img/index-57_1.png)\n\n第 2 章 Spring 基础与进阶\n\n图 2-3 展示了 Spring Boot 中存在的一些模块。图中最核心的是位于中心的模块，它负责为其他模块提供支持，并使用嵌入式\
  \ Web 服务器创建/运行应用程序。\n\n此外，它还负责将应用程序配置外部化到一个或多个文件中。\n\n***图 2-3.** Spring Boot 模块*\n\
  \nSpring Boot 中与本书主题直接交互的依赖项之一是 actuator。Actuator 负责检查并报告应用程序是否健康。通常，Spring Boot\
  \ 会在内部检查应用程序上下文中的所有内容是否正常。但当你的应用程序与数据库交互时，你可以明确指示它检查状态，并将该信息作为响应的一部分发送出去。\n\n**基本应用程序设置**\n\
  \n让我们创建一个包含城市、州和国家所有信息的目录微服务。为此，你需要为每个资源定义一组端点。大多数操作都是 CRUD（创建、检索/读取、更新、删除）操作中的常见操作。\n\
  \n第 2 章 Spring 基础与进阶\n\n首先，你必须创建一个基本骨架，以便在后续章节中添加不同的数据库来持久化信息。为简单起见，让我们使用应用了约束或具有持久化信息能力的数据库示例。\n\
  \n有多种方法可以创建使用 Spring Boot 的应用程序。请记住，你使用 Spring Boot 是为了轻松创建 Web 应用程序。有些方法需要手动创建项目并添加所有必要的依赖项来运行应用程序。在某些情况下，这种方法可能不是最佳选择，并且会因缺少依赖项而产生大量错误。为了解决这个问题，Spring\
  \ Boot 提供了一种不同的机制来简单地创建项目及其所有必要的依赖项。\n\n最流行的有两种方法。\n\n• 从网页使用 Spring Initializr²\n\
  • 使用 IDE 插件，如 Eclipse、IntelliJ 或 Visual Studio Code\n\n本书将教你如何使用这两种选项创建项目，但仅涵盖 IntelliJ\
  \ IDE。\n\n**使用 Spring Initializr 创建 API**\n\n首先，让我们使用 Spring Initializr 创建一个项目，这是一个直观的界面，可以让你了解如何配置项目。当你访问该网页时，你会看到类似于图\
  \ 2-4 的内容，你需要在此处指明：配置管理、语言、Spring Boot 版本以及所有项目元数据（组、构件、名称和 Java 版本）。\n\n[²]: [`start.spring.io/`](https://start.spring.io/)\n\
