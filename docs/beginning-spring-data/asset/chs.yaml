  \ Object> template = new RedisTemplate<>();\n\ntemplate.setConnectionFactory(connectionFactory);\n\
  \nreturn template;\n\n}\n\n// 在此 Bean 中，你定义了与主节点以及\n// 从节点或副本节点的连接，你可以拥有多个副本节点\n\
  \n@Bean\n\n第 7 章 Redis：键/值数据库\n\npublic LettuceConnectionFactory redisConnectionFactory()\
  \ {\n\nLettuceClientConfiguration clientConfig =\n\nLettuceClientConfiguration.builder()\n\
  \n.readFrom(ReadFrom.REPLICA_PREFERRED)\n\n.build();\n\nRedisStaticMasterReplicaConfiguration\n\
  \nstaticMasterReplicaConfiguration = new RedisStaticMasterReplica\n\nConfiguration(settings.getMaster().getHost(),\n\
  \nsettings.getMaster().getPort());\n\nsettings.getSlaves().forEach(slave ->\n\n\
  staticMasterReplicaConfiguration.addNode(slave.getHost(), slave.\n\ngetPort()));\n\
  \nreturn new LettuceConnectionFactory(staticMasterReplica\n\nConfiguration, clientConfig);\n\
  \n}\n\n}\n\n该配置可以支持多个从节点或副本节点，因此你可以\n\n\n\n减少对数据库操作的影响，这些操作仅需获取信息而无需修改信息。\n\n**注意**：建议始终使用\
  \ `application.yml` 中提供的配置。不过，该文件并未涵盖所有情况，例如主/从副本，因此这种情况可以作为定义驱动程序配置的一个良好替代方案。\n\
  \n在 Sentinel 中，Spring Data 可以在 **application.yml** 中指示所有节点，因此至少在你想要配置其他内容时，这种方法并非必需。\n\
  \n**对象映射与转换**\n\nSpring Data Redis 提供了一组模板，负责执行保存/删除/检索/更新信息等操作。在本章前面的部分中，你定义了一个自定义的\
  \ `RedisTemplate`，其键为 `Long` 类型，值为对象类型，这是必要的，因为它并非适用于所有可能组合的通用模板。你需要为需要持久化的每种元素类型定义\
  \ `RedisTemplate`。你可以创建一些通用的模板，例如键为字符串，值为对象。不过，还有其他模板，例如 **StringRedisTemplate**，其键/值均为字符串，因此无需再创建一个新的\
  \ `RedisTemplate` 来覆盖这种元组。\n\n在这两种情况下，你都将信息的序列化和反序列化委托给了 Spring Data。但是，你并不总是希望以特定格式保存信息，因此你可以通过实现\
  \ `RedisSerializer<T>` 接口来创建自定义序列化器。\n\n为了通过具体示例说明这一点，让我们为键值（一个 `Long` 值）创建一个基本的序列化器，如清单\
  \ 7-10 所示。\n\n***清单 7-10.*** Long 类型的自定义序列化器\n\n```java\npackage com.apress.catalog.serializer;\n\
  \nimport org.springframework.data.redis.serializer.RedisSerializer;\nimport org.springframework.data.redis.serializer.SerializationException;\n\
  import org.springframework.stereotype.Component;\n\n@Component\npublic class LongSerializer\
  \ implements RedisSerializer<Long> {\n\n    @Override\n    public byte[] serialize(Long\
  \ aLong) throws SerializationException {\n        if (null != aLong) {\n       \
  \     return aLong.toString().getBytes();\n        } else {\n            return\
  \ new byte[0];\n        }\n    }\n\n    @Override\n    public Long deserialize(byte[]\
  \ bytes) throws SerializationException {\n        if (bytes.length > 0) {\n    \
  \        return Long.parseLong(new String(bytes));\n        } else {\n         \
  \   return null;\n        }\n    }\n}\n```\n\n之后，你只需修改 `RedisConfiguration` 类，以指定用于键值的序列化器（参见清单\
  \ 7-11）。\n\n***清单 7-11.*** 添加键序列化器\n\n```java\nimport org.springframework.data.redis.core.RedisTemplate;\n\
  import com.apress.catalog.serializer.LongSerializer;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.data.redis.connection.RedisConnectionFactory;\n\
  \n@Configuration\n@EnableRedisRepositories\npublic class RedisConfiguration {\n\n\
  \    final RedisSettings settings;\n    final LongSerializer longSerializer;\n\n\
  \    public RedisConfiguration(RedisSettings settings, LongSerializer longSerializer)\
  \ {\n        this.settings = settings;\n        this.longSerializer = longSerializer;\n\
  \    }\n\n    @Bean\n    public RedisTemplate<Long, Object> redisTemplate(RedisConnectionFactory\
  \ connectionFactory) {\n        RedisTemplate<Long, Object> template = new RedisTemplate<>();\n\
  \        template.setConnectionFactory(connectionFactory);\n        template.setKeySerializer(longSerializer);\n\
  \        return template;\n    }\n\n    // 之前的源代码\n}\n```\n\n第 7 章 Redis：键/值数据库\n\
  \n\n在这种情况下，Redis 为基本数据类型定义了一个序列化器，但你可以更改其行为并创建一个新的序列化器。实现此类序列化器的一个可能原因是为了优化持久化到数据库中的信息大小，你将在最后一章中了解更多相关内容。\n\
  \n**定义自定义仓库**\n\n到目前为止，你已将持久化模型从关系型数据库更改为 Redis，而无需对仓库进行任何更改。但在 Spring Data Redis\
  \ 中，你可以使用你定义的 `RedisTemplate` 或预定义库来定义自定义仓库。\n\n让我们稍微修改之前的仓库，使其执行相同的操作，但使用 `RedisTemplate`\
  \ 而不是将所有内容委托给框架。首先要做的是创建一个接口，该接口包含仓库的所有操作，方式与清单 7-12 所示相同。\n\n***清单 7-12.*** 自定义仓库接口的定义\n\
  \npackage com.apress.catalog.repository;\n\nimport com.apress.catalog.model.Country;\n\
  \nimport java.util.Optional;\n\npublic interface CustomCountryRepository {\n\nCountry\
  \ save(Country entity);\n\nOptional<Country> findById(Long id);\n\nvoid deleteById(Long\
  \ id);\n\n}\n\n下一步是创建一个实现上述接口的具体类，并导入你在 **RedisConfiguration** 类中定义的 **RedisTemplate**。你需要从\
  \ `RedisTemplate` 中获取 `HashOperations`，它执行与数据库相关的所有操作。你可以将其视为 JPA 中的 `EntityManager`（参见清单\
  \ 7-13）。\n\n第 7 章 Redis：键/值数据库\n\n***清单 7-13.*** 自定义仓库具体类的定义\n\npackage com.apress.catalog.repository;\n\
  \nimport com.apress.catalog.model.Country;\n\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  \nimport org.springframework.data.redis.core.HashOperations;\n\nimport org.springframework.data.redis.core.RedisTemplate;\n\
  \nimport org.springframework.stereotype.Repository;\n\nimport java.util.Optional;\n\
  \n@Repository\n\npublic class CustomCountryRepositoryImpl implements\n\nCustomCountryRepository\
  \ {\n\n//使用键在数据库中创建唯一元素，例如 country_xxx\n\nprivate static final Object COUNTRY_KEY\
  \ = \"country\";\n\nprivate final RedisTemplate redisTemplate;\n\nprivate HashOperations\
  \ hashOperations;\n\n@Autowired\n\npublic CustomCountryRepositoryImpl(RedisTemplate\
  \ redisTemplate) {\n\nthis.redisTemplate = redisTemplate;\n\n//获取 HashOperations\
  \ 以直接与数据库交互\n\nthis.hashOperations = redisTemplate.opsForHash(); }\n\n@Override\n\
  \npublic Country save(Country entity) {\n\n*//执行保存操作，该操作不返回任何内容，因此你需要执行查找操作来返回它*\n\
  \nhashOperations.put(COUNTRY_KEY, entity.getId(), (Object) entity);\n\nreturn findById(entity.getId()).get();\n\
  \n}\n\n第 7 章 Redis：键/值数据库\n\n@Override\n\npublic Optional<Country> findById(Long\
  \ id) {\n\nreturn Optional.of((Country) hashOperations.get(COUNTRY_KEY, id));\n\n\
  }\n\n@Override\n\npublic void deleteById(Long id) {\n\n//此操作只需要键的“前缀”和值 country_xxxx\
  \ 即可删除\n\nhashOperations.delete(COUNTRY_KEY, id);\n\n}\n\n}\n\n这些方法中没有 `@Transactional`\
  \ 注解，因为该数据库不支持事务。\n\n最后，更改 **CountryService** 中的仓库，以使用新的仓库，方式与清单 7-14 所示相同。\n\n\
  ***清单 7-14.*** 服务修改\n\n@Service\n\npublic class CountryService {\n\nCustomCountryRepositoryImpl\
