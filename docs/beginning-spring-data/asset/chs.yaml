  \n本附录解释了如何在本书的第一部分和第二部分中安装 MySQL 和 PostgreSQL 数据库。使用哪种数据库没有限制；本附录展示了两种最流行的免费数据库。如果您可以使用其他数据库，也可以这样做，因为\
  \ Spring Data 至少支持所有现有的关系型数据库。\n\n每个部分都包含了您需要执行的步骤，以加载一个功能完备的数据库，其中包含可在微服务中使用的良好数据集。\n\
  \n1.  在您的本地机器上安装数据库。\n2.  安装用于访问数据库的客户端。\n3.  在客户端应用程序中，配置与数据库的连接。\n4.  创建模式。\n\
  5.  加载数据。\n\n您可以选择不安装数据库，而是使用 Docker 运行它。有关 Docker 如何在每个数据库上工作的更多信息，请参见附录 F。\n\n\
  **MySQL**\n\nMySQL 是一种关系型数据库，由 Sun Microsystems 于 1994 年发布。以下是使该数据库在开发者中流行的一些特性。\n\
  \n• 免费使用。\n• 在处理大量操作时具有出色的性能。\n\n© Andres Sacco 2023\n\n\n\nA. Sacco，*Spring Data\
  \ 入门*[, https://doi.org/10.1007/978-1-4842-8764-4](https://doi.org/10.1007/978-1-4842-8764-4#DOI)\n\
  \n附录 D 安装和配置关系型数据库\n\n• 根据 2021 年 StackOverflow 调查 y,1，50% 的开发者在应用中使用该数据库，这一点很重要，因为许多人能够发现并报告任何问题。\n\
  \n**步骤 1：在本地机器上安装数据库**\n\n该过程的第一步是下载数据库安装程序并运行安装过程。\n\nMySQL 支持多种操作系统，包括 Windows、macOS\
  \ 和许多 Linux 发行版。你可以从官方网站 e2 下载安装程序，并按照针对每个操作系统的指南 uctions3 进行操作。为 root 用户定义一个用户名/密码，你将在步骤\
  \ 3 中使用它来连接数据库。\n\n**步骤 2：安装客户端以访问数据库**\n\n要使用 MySQL，你需要一个客户端来帮助你执行某些操作，例如创建模式、插入数据以及检查一切是否运行正常。有许多选项可以安装到你的机器上；有些是免费的，有些则提供短期试用。本书使用\
  \ MySQL Workbench，这是 MySQL 中推荐且最流行的工具，但还有其他选项，如附录 B 所述。\n\n要根据你的操作系统下载安装程序，你可以查看\
  \ MySQL Workbench 的官方文档.4 如果你想查看安装的系统要求，可以查看 MySQL 安装网页.5\n\n**步骤 3：配置连接**\n\n安装数据库和客户端并访问它之后，下一步是打开\
  \ MySQL Workbench，并使用你在步骤 1 中设置的凭据创建一个新连接。如果安装程序没有要求设置用户名和密码，那么数据库可能默认使用 *root*\
  \ 作为用户名，密码为空。\n\n1 [`insights.stackoverflow.com/survey/2021#technology`](https://insights.stackoverflow.com/survey/2021#technology)\n\
