  \n\n\n附录 A 设置环境工具\n\n**安装 Maven**\n\n要在你的机器上运行所有示例或跟随示例操作，第二件需要安装的工具是 Maven。该工具提供了一种良好的方式来管理和解决项目中依赖版本之间的冲突。\n\
  \n根据操作系统的不同，有多种安装 Maven 的方法。有些方法需要手动操作，你需要从官方网站 e8 下载并配置环境变量，以便系统能够识别 `mvn` 命令。我们来看看如何使用包管理器工具安装\
  \ Maven。\n\n对于 macOS 和 Linux，你可以使用 [Homebrew](https://brew.sh/) 9 这个安装/更新工具。\n\n\
  ➜ ~ brew install maven\n\n此外，你也可以使用 SDKman10 来安装，它采用与 Homebrew 类似的方法，并提供了一种安装库或工具的简单方式。\n\
  \n➜ ~ sdk install maven\n\n另一种方法仅适用于特定的 Linux 发行版。\n\n• Ubuntu\n\n➜ ~ sudo apt install\
  \ maven\n\n• Fedora\n\n➜ ~ sudo dnf install maven\n\n对于 Windows 平台，有两种可能的方式。第一种是安装\
  \ SDKMAN! 并运行与 macOS 和 Linux 相同的命令。第二种方式是手动下载，将所有内容解压到一个目录中，然后创建一个名为 `M2_HOME` 的环境变量，其值指向你创建的\
  \ Maven 文件夹内的根目录位置。\n\n8 [`maven.apache.org/download.cgi`](https://maven.apache.org/download.cgi)\n\
