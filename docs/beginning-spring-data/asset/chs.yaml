  \ 13 章 检测性能问题\n\n***图 13-6.** 报告输出的结构*\n\n图 13-7 以图形方式展示了所有结果，因此你可以查看每个端点、执行时间以及其他相关信息。\n\
  \n![](img/index-330_1.jpg)\n\n第 13 章 检测性能问题\n\n***图 13-7.** 执行时间的指标*\n\n在本章中，你了解了分析访问数据库的仓库中问题的机制。不过，发现问题的方法还有很多。\n\
  \n**总结**\n\n检测与应用程序性能相关的问题有多种方法。使用哪种工具始终取决于具体问题，因为有些问题只会在生产环境中出现，而另一些问题则可以使用像 Gatling\
  \ 这样的工具以相同方式复现。\n\n我建议在 Gatling 中创建一个测试，模拟对应用程序进行修改后出现问题的情况。\n\n**第 14 章**\n\n**最佳实践**\n\
  \n开发人员经常实现一个访问数据库的解决方案，但问题会在数月后出现。这些问题可能与解决方案的实现有关，也可能无关，因为许多因素都会影响性能（例如，大量的请求，或需要在短时间内保存大量信息）。\n\
  \n最佳实践可以最大限度地减少影响，或减少数据库中保存的信息量。本章涵盖了许多最常见的实践。其中一些很简单，而另一些则需要更改应用程序。\n\n**压缩信息**\n\
  \n有时，你需要在 Redis 中保存一个庞大而复杂的对象，这本身不是问题。但是，如果你需要在短时间内保存数千个这样的对象，这可能会影响性能或增加内存使用成本。\n\
  \nRedis 允许你定义自定义序列化器，使你能够序列化或反序列化信息。让我们创建一个序列化器，它先压缩对象，然后再解压缩，以节省数据库中的空间。\n\n这个过程意味着要修改你在[第\
  \ 7 章](https://doi.org/10.1007/978-1-4842-8764-4_7)中实现的代码，但让我们先创建一个类，负责将字节数组转换为压缩对象。这个任务并不复杂，因为你可以使用这个类在将信息持久化到文件之前对其进行压缩。清单\
  \ 14-1 展示了一个压缩对象所有值的类的可能实现。\n\n***清单 14-1.*** 压缩类\n\npackage com.apress.catalog.util;\n\
  \nimport java.io.BufferedReader;\n\nimport java.io.ByteArrayInputStream;\n\nimport\
  \ java.io.ByteArrayOutputStream;\n\n© Andres Sacco 2023\n\nA. Sacco, *Beginning\
  \ Spring Data*[, https://doi.org/10.1007/978-1-4842-8764-4_14](https://doi.org/10.1007/978-1-4842-8764-4_14#DOI)\n\
  \n第 14 章 最佳实践\n\nimport java.io.IOException;\n\nimport java.io.InputStreamReader;\n\
  \nimport java.util.zip.GZIPInputStream;\n\nimport java.util.zip.GZIPOutputStream;\n\
  \npublic class CompressionUtil {\n\nprivate CompressionUtil() {\n\n// 仅用于避免创建实例\n\
  \n}\n\n*// 此方法将接收一个字节数组，并尝试使用 GZIPInputStream 解压缩信息*\n\npublic static String decompress(byte[]\
  \ compressed) throws IOException {\n\nByteArrayInputStream bis = new ByteArrayInputStream(compressed);\n\
  \nGZIPInputStream gis = new GZIPInputStream(bis);\n\nBufferedReader br = new BufferedReader(new\
  \ InputStreamReader(gis,\n\n\"UTF-8\"));\n\nStringBuilder sb = new StringBuilder();\n\
  \nString line;\n\nwhile ((line = br.readLine()) != null) {\n\nsb.append(line);\n\
  \n}\n\nbr.close();\n\ngis.close();\n\nbis.close();\n\nreturn sb.toString();\n\n\
  }\n\n\n\n*// 此方法接收一个字符串，并尝试使用 GZIPOutputStream 进行压缩*\n\npublic static byte[] compress(String\
  \ data) throws IOException {\n\nByteArrayOutputStream bos = new ByteArrayOutputStream(data.length());\n\
  \nGZIPOutputStream gzip = new GZIPOutputStream(bos);\n\ngzip.write(data.getBytes());\n\
  \ngzip.close();\n\nbyte[] compressed = bos.toByteArray();\n\n第 14 章 最佳实践\n\nbos.close();\n\
  \nreturn compressed;\n\n}\n\n}\n\n下一步是创建一个包含自定义方法的类，这些方法可以将对象转换为字节数组，反之亦然（参见清单 14-2）。其思路是使用**T**对象委托给另一个类，即需要压缩和解压缩的特定对象类型，而无需为每个需要序列化的类创建特定的类。\n\
  \n***清单 14-2.*** 将字节数组转换为对象的序列化器 package com.apress.catalog.util;\n\nimport com.apress.catalog.exception.SerializeException;\n\
  \nimport com.fasterxml.jackson.databind.DeserializationFeature;\n\nimport com.fasterxml.jackson.databind.MapperFeature;\n\
  \nimport com.fasterxml.jackson.databind.ObjectMapper;\n\nimport com.fasterxml.jackson.databind.PropertyNamingStrategy;\n\
  \nimport com.fasterxml.jackson.datatype.jsr310.JavaTimeModule;\n\nimport org.slf4j.Logger;\n\
  \nimport org.slf4j.LoggerFactory;\n\nimport java.io.IOException;\n\npublic class\
  \ JsonGzipSerializerUtil {\n\nprivate static final Logger LOGGER = LoggerFactory.getLogger(JsonGzip\n\
  \nSerializerUtil.class);\n\nprivate static final ObjectMapper OBJECT_MAPPER;\n\n\
  private JsonGzipSerializerUtil() {\n\n// 仅用于避免创建实例\n\n}\n\n// 关于如何将信息转换为字符串或对象的通用定义\n\
  \nstatic {\n\nOBJECT_MAPPER = new ObjectMapper()\n\n.configure(MapperFeature.USE_GETTERS_AS_SETTERS,\
  \ false)\n\n第 14 章 最佳实践\n\n.configure(DeserializationFeature.FAIL_ON_UNKNOWN_PROPERTIES,\n\
  \nfalse)\n\n.setPropertyNamingStrategy(PropertyNamingStrategy.SNAKE_CASE)\n\n.registerModule(new\
  \ JavaTimeModule());\n\n}\n\n*// 将对象转换为压缩后的字节数组*\n\npublic static byte[] serialize(Object\
  \ object) {\n\nbyte[] compressedJson;\n\ntry {\n\nString json = OBJECT_MAPPER.writeValueAsString(object);\n\
  \ncompressedJson = CompressionUtil.compress(json);\n\n} catch (IOException e) {\n\
  \nLOGGER.error(\"序列化对象时出错: {}\", e.getMessage());\n\nthrow new SerializeException(\"\
  无法序列化对象\", e);\n\n}\n\nreturn compressedJson;\n\n}\n\n*// 将压缩后的字节数组转换为在 <T> 上定义的特定对象*\n\
  \npublic static <T> T deserialize(byte[] raw, Class<T> reference) {\n\nif (raw ==\
  \ null)\n\nreturn null;\n\nT object;\n\ntry {\n\nString json = CompressionUtil.decompress(raw);\n\
  \nobject = OBJECT_MAPPER.readValue(json, reference);\n\n} catch (IOException e)\
  \ {\n\nLOGGER.error(\"无法反序列化对象: {}\", e.getMessage());\n\nthrow new SerializeException(\"\
  无法反序列化对象。\", e);\n\n}\n\nreturn object;\n\n}\n\n}\n\n第 14 章 最佳实践\n\n建议创建一个自定义的异常类，以表示所有与对象转换相关的可能问题（参见清单\
  \ 14-3）。\n\n***清单 14-3.*** 用于表达序列化问题的自定义异常 package com.apress.catalog.exception;\n\
  \npublic class SerializeException extends RuntimeException {\n\npublic SerializeException(String\
  \ message, Throwable cause) {\n\nsuper(message, cause);\n\n}\n\n}\n\n下一步是创建一个自定义序列化器，将特定对象转换为数据库中压缩后的对象。**JsonGzipSerializerUtil**\
  \ 类只需要传入一个待序列化的对象。如果要反序列化，只需传入一个字节数组及其对应的类类型，如清单 14-4 所示。\n\n***清单 14-4.*** 国家实体的自定义序列化器\n\
  \npackage com.apress.catalog.serializer;\n\nimport com.apress.catalog.model.Country;\n\
  \nimport com.apress.catalog.util.JsonGzipSerializerUtil;\n\nimport org.springframework.data.redis.serializer.RedisSerializer;\n\
  \nimport org.springframework.stereotype.Component;\n\n@Component\n\n\n\npublic class\
  \ CountrySerializer implements RedisSerializer<Country> {\n\npublic byte[] serialize(Country\
  \ country) {\n\nreturn JsonGzipSerializerUtil.serialize(country);\n\n}\n\npublic\
  \ Country deserialize(byte[] raw) {\n\nreturn JsonGzipSerializerUtil.deserialize(raw,\
  \ Country.class);\n\n}\n\n}\n\n第 14 章 最佳实践\n\n现在，你已经为实体创建了特定的序列化器，接下来需要在 `RedisConfiguration`\
  \ 类中将其声明为一个新的 Redis 模板（参见清单 14-5）。\n\n***清单 14-5.*** 新模板的声明\n\nimport com.apress.catalog.model.Country;\n\
  \nimport com.apress.catalog.serializer.CountrySerializer;\n\nimport com.apress.catalog.serializer.LongSerializer;\n\
  \nimport io.lettuce.core.ReadFrom;\n\nimport org.springframework.context.annotation.Bean;\n\
  \nimport org.springframework.context.annotation.Configuration;\n\nimport org.springframework.data.redis.connection.RedisConnectionFactory;\n\
  \nimport org.springframework.data.redis.connection.\n\nRedisStaticMasterReplicaConfiguration;\n\
  \nimport org.springframework.data.redis.connection.lettuce.\n\nLettuceClientConfiguration;\n\
  \nimport org.springframework.data.redis.connection.lettuce.\n\nLettuceConnectionFactory;\n\
  \nimport org.springframework.data.redis.core.RedisTemplate;\n\nimport org.springframework.data.redis.repository.configuration.\n\
  \nEnableRedisRepositories;\n\n@Configuration\n\n@EnableRedisRepositories\n\npublic\
  \ class RedisConfiguration {\n\nfinal RedisSettings settings;\n\nfinal LongSerializer\
  \ longSerializer;\n\nfinal CountrySerializer countrySerializer;\n\npublic RedisConfiguration(RedisSettings\
  \ settings, LongSerializer\n\nlongSerializer, CountrySerializer countrySerializer)\
  \ {\n\nthis.settings = settings;\n\nthis.longSerializer = longSerializer;\n\nthis.countrySerializer\
  \ = countrySerializer;\n\n}\n\n第 14 章 最佳实践\n\n@Bean\n\npublic RedisTemplate<Long,\
  \ Country> countryRedisTemplate(RedisConnection\n\nFactory connectionFactory) {\n\
  \nRedisTemplate<Long, Country> template = new RedisTemplate<>();\n\ntemplate.setConnectionFactory(connectionFactory);\n\
  \ntemplate.setKeySerializer(longSerializer);\n\n//声明负责压缩和解压缩的序列化器\n\ntemplate.setValueSerializer(countrySerializer);\n\
  \nreturn template;\n\n}\n\n//之前的源代码\n\n}\n\n最后的修改涉及修改 **CustomCountryRepositoryImpl**\
  \ 类，用一个新的 RedisTemplate 替换通用的 RedisTemplate，方式与清单 14-6 中所示相同。\n\n***清单 14-6.***\
  \ 新模板的声明\n\npublic class CustomCountryRepositoryImpl implements\n\nCustomCountryRepository\
  \ {\n\nprivate static final Object COUNTRY_KEY = \"country\";\n\nfinal RedisTemplate<Long,\
  \ Country> countryRedisTemplate;\n\nprivate HashOperations hashOperations;\n\n@Autowired\n\
  \npublic CustomCountryRepositoryImpl(RedisTemplate\n\ncountryRedisTemplate) {\n\n\
  this.countryRedisTemplate = countryRedisTemplate;\n\nthis.hashOperations = countryRedisTemplate.opsForHash();\n\
  \n}\n\n//之前的源代码\n\n}\n\n第 14 章 最佳实践\n\n该方案是解决 Redis 中对象大小导致内存使用问题的一种方法。实现相同功能有多种方式，但这种方法使得无法直接读取\
  \ Redis 中的信息，因为数据已被压缩。你需要一个工具或机制来手动解压缩，以检查数据库行中的内容。\n\n其他数据库（如 Cassandra）允许显式声明数据库使用的压缩机制。当你插入数据时，Cassandra\
  \ 会压缩并存储信息。当你尝试获取信息时，它也遵循相同的过程。\n\n**减少传输的信息量**\n\n与微服务性能和延迟相关的关键问题之一是，端点会检索集合中的所有数据。如果元素数量较少且每天对该端点的请求数量不多，这固然很好。但是，当需要通过网络传输大量元素时，这可能会成为问题，因此只返回少量元素即可。\n\
  \n\n\nSpring Data 提供了一个名为 **PagingAndSortingRepository<T, ID>** 的接口，该接口继承自 **CrudRepository<T,\
  \ ID>**。此接口提供了 **findAll** 方法，该方法接收一个名为 **Pageable** 的接口。它包含了要从数据库中获取的元素数量和偏移量。\n\
  \n**在自定义查询中使用 Optional**\n\n许多框架或库将 Optional 类作为防止应用程序中出现 NullPointerException 的“银弹”。Spring\
  \ Data 采用这种方法来防止开发者犯错，因此当你在仓库中编写自定义查询时，请返回 Optional。\n\n**在关系中使用懒加载**\n\n根据一个实体所拥有的关系集合中的元素数量，明确指定所有关系都使用\
  \ **FetchType.Lazy** 可能是一个好选择，以减少内存中的元素数量，并且仅在需要信息时才明确指示加载它。\n\n第 14 章 最佳实践\n\n\
  **持久化多个元素**\n\n另一个常见的问题是，当有一个需要持久化到数据库的元素列表时，开发者会创建一个迭代并逐个持久化每个元素。另一种方法是传递元素列表，并委托给\
  \ Spring Data 使用最佳方式来持久化信息。\n\npublic void save(List<Country> countries) {\n\n//不要使用这种方法\n\
  \nfor (Country entity: countries) {\n\ncountryRepository.save(entity);\n\n}\n\n\
  //使用这种方法\n\ncountryRepository.saveAll(countries);\n\n}\n\n**使用主/从或副本**\n\n当你的数据库有大量仅访问以获取某些信息而不做任何修改的操作时，出现的一个最相关的问题就是，这些操作可能会影响其他需要执行修改（如插入/更新/删除表中的行）的操作的性能。解决这个问题的正确方法是在数据库中配置主/从架构，并像第\
  \ [7](https://doi.org/10.1007/978-1-4842-8764-4_7) 章中配置 Redis 那样，让应用程序考虑这些因素。\n\n\
  在关系型数据库中，Spring Data 没有提供默认的方法来实现同样的功能，因此替代方案意味着你必须定义两个数据源。一个专门用于涉及数据库修改的操作，另一个用于读取信息。这种方法需要创建自定义类来指示\
  \ Spring Data，当操作是只读时，使用特定的数据源。\n\nMongo 是另一种数据库，你可以在 **application.yml** 中配置副本的所有设置，从而减少与创建自定义类来支持相关的问题。\n\
  \n第 14 章 最佳实践\n\n**使用缓存减少访问**\n\nSpring 框架允许你使用一种缓存机制，该机制不仅限于仓库层面，还可以在其他层面使用。你需要使用\
  \ **@Cacheable** 注解，并为每种你保存的对象类型定义一个特定的名称。\n\n有两种使用此机制的方法。一种选择是将元素保存在应用程序的内存中，这意味着如果你有同一个应用程序的多个实例，每个实例的缓存中都有不同的元素。另一种选择是使用\
  \ Redis 作为缓存机制，这样你就拥有一个分布式模式的缓存机制，所有实例都拥有相同的信息。每种方法都有其优缺点。第二种选择意味着你需要发出一个外部请求来检查信息是否存在于缓存中。如果你想减少应用程序对数据库的操作次数，而又无需访问像\
  \ Redis 这样的外部资源，那么最佳选择是使用第一种方法，它能更直接地减少直接访问数据库的操作数量。\n\n让我们在 **api-catalog** 中实现内存缓存机制，该应用使用关系型数据库来持久化信息。自\
  \ Spring Boot 2.x.x 起，默认的\n\n\n\n依赖项是 Caffeine1 I。它在缓存中保存和检索信息方面表现出色。按照清单 14-7 所示的方式，在\
  \ `pom` 文件中添加与缓存相关的依赖项。\n\n***清单 14-7.*** 缓存依赖项\n\n<dependency>\n\n<groupId>org.springframework.boot</groupId>\n\
  \n<artifactId>spring-boot-starter-cache</artifactId>\n\n</dependency>\n\n<dependency>\n\
  \n<groupId>com.github.ben-manes.caffeine</groupId>\n\n<artifactId>caffeine</artifactId>\n\
  \n</dependency>\n\n1 [`github.com/ben-manes/caffeine`](https://github.com/ben-manes/caffeine)\n\
  \n第 14 章 最佳实践\n\n下一步是添加带有名称的 `@Cacheable` 注解，并指定何时保存信息。以 `api-catalog` 应用程序为例，一种可行的方法是在\
  \ Service 层中包含该注解，如清单 14-8 所示。\n\n***清单 14-8.*** Service 层修改\n\n// 之前的导入\n**import\
  \ org.springframework.cache.annotation.Cacheable;**\n\n@Service\npublic class CountryService\
  \ {\n\n    *// 该注解会在调用实际实现之前，从缓存 CATALOG_COUNTRY 中获取信息*\n    *// 如果信息不存在，则尝试获取信息并保存，除非结果为空*\n\
  \    **@Cacheable(cacheNames = \"CATALOG_COUNTRY\", unless = \"#result == null\"\
  )**\n    @Transactional(readOnly = true)\n    public CountryDTO getById(Long id)\
  \ {\n        // 之前的源代码\n    }\n}\n\n你可以使用注解来存储信息。然而，这种方法存在一些问题；例如，你可能会无限期地存储大量值，这意味着你的应用程序会占用大量内存。最佳做法是创建一个配置来限制元素的数量以及应用程序存储信息的时间。\n\
  \n考虑将缓存添加到 Service 层，而不是 Repository 层，因为你的 Repository 层没有自定义方法。要在 Repository 层中使用缓存，你必须重新声明所有方法，并使用\
  \ **@Cacheable** 注解。\n\n让我们通过添加逻辑使缓存内容过期来改进之前的示例。对 **application.yml** 的修改意味着你可以为每种类型的元素进行细粒度配置，在清单\
  \ 14-8 中，这种元素是 **Country**。不过，你可能还有其他获取城市信息的方法。你需要一种方法来区分这两个缓存。\n\n第 14 章 最佳实践\n\
  \n***清单 14-8.*** 缓存配置\n\ncache:\n  configuration:\n    CATALOG_COUNTRY:\n      refreshAfterWriteTime:\
  \ 1 # 信息在需要刷新前存在的分钟数\n      expireAfterWriteTime: 1 # 分钟\n      maxSize: 180 # 内存中保存的元素数量\n\
  \n下一步是创建一个映射所有配置的类，这个类是一个 Map，旨在成为可扩展的解决方案（参见清单 14-9）。\n\n***清单 14-9.*** 加载配置的类\n\
  \npublic class CacheSettings {\n\n    private Integer refreshAfterWriteTime;\n \
  \   private Integer expireAfterWriteTime;\n    private Integer maxSize;\n\n    private\
  \ static final Integer DEFAULT_REFRESH_AFTER = 10;\n    private static final Integer\
  \ DEFAULT_EXPIRE_AFTER = 15;\n    private static final Integer DEFAULT_MAX_SIZE\
  \ = 180;\n\n    public static final CacheSettings DEFAULT_CACHE_SETTINGS = new\n\
  \        CacheSettings(DEFAULT_REFRESH_AFTER,\n                      DEFAULT_EXPIRE_AFTER,\
  \ DEFAULT_MAX_SIZE);\n\n    public CacheSettings() {\n    }\n\n    public CacheSettings(Integer\
  \ refreshAfterWriteTime, Integer\n                         expireAfterWriteTime,\
  \ Integer maxSize) {\n        this.refreshAfterWriteTime = refreshAfterWriteTime;\n\
  \        this.expireAfterWriteTime = expireAfterWriteTime;\n        this.maxSize\
  \ = maxSize;\n    }\n\n    // 定义 setter 和 getter 方法\n}\n\n第 14 章 最佳实践\n\n你需要一个类来将配置加载到\
  \ Spring 上下文中的 **application.yml** 里。为此，创建一个名为 `CacheConfiguration` 的类，该类按照清单 14-10\
  \ 所示的方式加载 \"cache\" 节点的配置。\n\n***清单 14-10.*** 加载配置\n\n\n\nimport org.springframework.boot.context.properties.ConfigurationProperties;\n\
  \nimport org.springframework.context.annotation.Configuration;\n\nimport java.util.Map;\n\
  \n@Configuration\n\n@ConfigurationProperties(\"cache\") //仅加载 application.yml 中\
  \ \"cache\" 键的信息\n\npublic class CacheConfiguration {\n\nprivate Map<String, CacheSettings>\
  \ configuration;\n\n//你可以通过名称获取特定缓存的配置，例如该缓存中可容纳的元素数量\n\npublic CacheSettings getCacheSettings(final\
  \ String cacheName) {\n\nreturn configuration.getOrDefault(cacheName, CacheSettings.DEFAULT_CACHE_SETTINGS);\n\
  \n}\n\npublic Map<String, CacheSettings> getConfiguration() {\n\nreturn configuration;\n\
  \n}\n\npublic void setConfiguration(Map<String, CacheSettings> configuration) {\n\
  \nthis.configuration = configuration;\n\n}\n\n}\n\n最后一步是创建一个类来管理缓存的所有内容，例如缓存名称以及如何获取信息（参见清单\
  \ [14-11]）。\n\n第 14 章 最佳实践\n\n***清单 14-11.*** 加载配置\n\npackage com.apress.catalog.cache;\n\
  \nimport com.apress.catalog.repository.CountryRepository;\n\nimport com.github.benmanes.caffeine.cache.Caffeine;\n\
  \nimport com.google.common.collect.Lists;\n\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  \nimport org.springframework.cache.CacheManager;\n\nimport org.springframework.cache.annotation.EnableCaching;\n\
  \nimport org.springframework.cache.caffeine.CaffeineCache;\n\nimport org.springframework.cache.support.SimpleCacheManager;\n\
  \nimport org.springframework.context.annotation.Bean;\n\nimport org.springframework.context.annotation.Configuration;\n\
  \nimport java.util.concurrent.TimeUnit;\n\nimport java.util.function.Function;\n\
  \n@Configuration\n\n@EnableCaching //启用应用程序的缓存机制\n\npublic class CacheManagerConfiguration\
  \ {\n\n//应用程序中将存在的一个缓存名称\n\npublic static final String CATALOG_COUNTRY = \"CATALOG_COUNTRY\"\
  ;\n\nprivate final CacheConfiguration cacheConfiguration;\n\nprivate final CountryRepository\
  \ countryRepository;\n\n@Autowired\n\npublic CacheManagerConfiguration(final CacheConfiguration\n\
  \ncacheConfiguration, final CountryRepository countryRepository) {\n\nthis.cacheConfiguration\
  \ = cacheConfiguration;\n\nthis.countryRepository = countryRepository;\n\n}\n\n\
  // 定义缓存名称及其使用的缓存类型\n\n@Bean\n\n第 14 章 最佳实践\n\npublic CacheManager cacheManager()\
  \ {\n\nCacheSettings cacheCitySettings = cacheConfiguration.\n\ngetCacheSettings(CATALOG_COUNTRY);\n\
  \nSimpleCacheManager simpleCacheManager = new SimpleCacheManager();\n\nsimpleCacheManager.setCaches(Lists\n\
  \n.newArrayList(buildCaffeineCache(CATALOG_COUNTRY,\n\ncacheCitySettings, countryRepository::findById)));\n\
  \nreturn simpleCacheManager;\n\n}\n\n*// 定义缓存、过期时间以及缓存中的元素数量。同时，定义获取信息的机制*\n\npublic\
  \ static CaffeineCache buildCaffeineCache(String cacheName,\n\nCacheSettings settings,\
  \ Function<Long, Object> serviceCall) {\n\nreturn new CaffeineCache(cacheName,\n\
  \nCaffeine.newBuilder().refreshAfterWrite(settings\n\n.getRefreshAfterWriteTime(),\
  \ TimeUnit.MINUTES)\n\n.expireAfterWrite(settings\n\n.getExpireAfterWriteTime(),\
  \ TimeUnit.MINUTES)\n\n.maximumSize(settings.getMaxSize()).build(key ->\n\nserviceCall.apply((Long)\
  \ key)));\n\n}\n\n}\n\n此方案的主要问题是，如果缓存中包含大量元素，就会遇到内存使用相关的问题。\n\n这些解决方案适用于所有数据库的一般规则，但关系型数据库是使用\
  \ Hibernate 提供的缓存级别的绝佳选择。\n\n第 14 章 最佳实践\n\n**总结**\n\n最佳实践能够提升应用程序的质量。许多实践可能对你的应用来说都是最佳的，这取决于具体情境，例如你的应用有多关键，以及每天接收多少请求。\n\
  \nSpring Boot 3 引入了许多特性来提升应用程序的性能，\n\n\n例如支持使用 GraalVM2 和 r 编译原生方式，以及重构与 Spring\
  \ Data 相关的项目。我建议阅读官方文档并查看论坛，以\n\n寻找解决奇怪问题的方法，因为该框架的最新版本并不\n\n稳定，可能会出现影响您平台的错误。\n\
