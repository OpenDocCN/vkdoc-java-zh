  \ 很早以前就首次讨论了规约模式。如今，该模式直接与仓库模式相关联，在 Spring Data 中用于过滤数据库表中的结果。\n\n**其他模式**\n\n我介绍了与本书最相关的一些模式，以便更好地解释如何访问数据库或在不同层之间传输信息。其他模式则用于解决特定问题，例如过滤结果或保存历史数据。\n\
  \n**总结**\n\n本章涵盖了使用 JDBC 等技术将持久化演进到 Java 数据库的过程，JDBC 提供了一种访问信息的基本方式，但可能在执行 SQL 查询时引入多种问题。JDBC\
  \ 出现后，出现了许多在数据库中访问和执行查询的方法。其中最重要的是 JPA，这是一个所有库都可以遵循的规范。\n\nSpring Data 允许开发人员在关系型和非关系型数据库之间进行切换，而无需引入重大更改。\n\
