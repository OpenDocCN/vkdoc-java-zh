  \n@Indexed\n\n@Field(value = \"code\")\n\nprivate String code;\n\n@DBRef\n\nprivate\
  \ Currency currency;\n\n// 其他字段保持不变\n\n}\n\n通过这个简单的修改，当你在数据库中持久化信息时，会看到 **DBRef('currency',\
  \ '2')**，这表明该字段与另一个集合存在引用关系。要验证这一点，最佳方式是使用附录 E 中介绍的工具。\n\n**通过 Repository 访问**\n\
  \n之前使用的 Repository 无需做任何改动，它们使用的是 **CrudRepository**，但需要将其修改为继承自 **MongoRepository<T,\
  \ ID>**，后者在底层继承了 **PaginatingAndSorting<T, ID>** 和 **QueryByExampleExecutor<T>**\
