  \ V1.1__insert_rows.sql\n\n│ ├── V2.0__audit_tables(run on chapter 4).sql\n\n│ └──\
  \ V3.0__version_columns(run on chapter 5).sql\n\n└── README.md\n\n要在数据库中执行脚本，你需要指定一个具有适当权限的用户名和密码来执行特定操作。为了对所有人隐藏此信息，你的\
  \ DevOps 团队成员可以将用户名/密码作为变量添加到环境中。这样，如果有人获取到这些信息，也能降低风险。\n\n最后，Flyway 提供了一系列可能有用的命令，例如\
  \ **validate** 用于检查所有脚本是否已正确执行，以及 **clean** 用于清除模式中存在的所有信息（仅在测试环境中使用）。\n\n**Liquibase**\n\
  \nLiquibase 提供了在独立操作系统以及使用 Maven/Gradle 的 Java 项目中使用的能力。此外，该工具还允许你在 CI/CD 工具中使用，包括\
  \ GitHub Actions5 和 Jenkins.6\n\n5 [`docs.liquibase.com/workflows/liquibase-community/setup-github-actions-`](https://docs.liquibase.com/workflows/liquibase-community/setup-github-actions-workflow.html)\n\
  [workflow.html](https://docs.liquibase.com/workflows/liquibase-community/setup-github-actions-workflow.html)\n\
  \n6 [`docs.liquibase.com/workflows/liquibase-community/using-the-jenkins-`](https://docs.liquibase.com/workflows/liquibase-community/using-the-jenkins-pipeline-stage-with-spinnaker.html)\n\
  [pipeline-stage-with-spinnaker.html](https://docs.liquibase.com/workflows/liquibase-community/using-the-jenkins-pipeline-stage-with-spinnaker.html)\n\
  \n第 6 章 版本控制或迁移变更\n\nLiquibase 有三个版本：开源版、专业版和企业版。它有一个 UI 界面，可以提供变更执行的报告和监控。你可以回滚数据库中的一个或一组变更。它能检测数据库中的恶意脚本并向你发出警报。\n\
  \n该工具与 Flyway 有很多共同点，例如变更版本控制、将变更信息保存在特定表中，以及拥有独立的版本。\n\n以下是 Liquibase 和 Flyway\
  \ 之间的主要区别：\n\n•   Liquibase 还支持非关系型数据库，如 MongoDB 和 Cassandra。\n•   Flyway 可以使用多种格式编写脚本，例如\
  \ JSON、YML、SQL 或 XML。\n•   你可以为脚本添加标签或作者，这允许你执行特定的脚本；例如，如果你只想在测试环境中执行脚本，反之亦然。\n\
  •   你可以对一个环境中的数据库进行快照，并与另一个环境进行比较。\n\n**哪个库负责版本控制？**\n\n对这个问题的普遍回答是“取决于具体情况”，因为没有一种答案能涵盖所有场景。这两个工具都拥有或多或少相同的基本功能，这些功能涵盖了最常见的场景，并且都得到了\
  \ Spring Boot 的支持。在 Spring Initializr 中，唯一可以包含在数据库迁移中的两个库是 Flyway 和 Liquibase。如果你想对非关系型数据库的变更进行版本控制，唯一的选择是\
  \ Liquibase。在本书编写时，Flyway 尚不支持。\n\n这两个工具的性能非常相似。目前没有互联网基准测试显示哪个工具使用更少的资源或迁移速度更快。\n\
  \n**在 Spring Boot 中集成库**\n\nSpring Boot 2.0.0 及更高版本支持 Flyway 和 Liquibase。你可以创建一个新项目，在\
  \ Spring Initializr 中找到依赖项，或使用你偏好的 IDE 插件（如 IntelliJ）。要集成这些工具中的任何一个，你需要执行以下步骤：\n\
  \n第 6 章 版本控制或迁移变更\n\n1.  向配置管理工具（如 Maven 或 Gradle）添加依赖项。\n2.  将脚本包含在一个位置，大多数情况下是\
  \ **/src/main/resources**。\n3.  在 **application.yml** 中包含修改，以指明所有基本配置并定义任何自定义配置。\n\
  \n让我们看看如何在每个版本控制工具上实现这些步骤。\n\n**Liquibase**\n\n你需要在你的 pom 文件中添加 Liquibase 的依赖项，而无需指定版本，因为\
  \ Spring Boot 中的父 pom 包含了与 Liquibase 兼容的正确版本（参见清单 6-1）。\n\n***清单 6-1.*** Liquibase\
  \ 依赖项\n\n<dependencies>\n    <dependency>\n        <groupId>org.liquibase</groupId>\n\
  \        <artifactId>liquibase-core</artifactId>\n    </dependency>\n    ← 其他依赖项\
  \ –>\n</dependencies>\n\n下一步是创建文件来填充你在前几章中用于检查概念的数据库。转到你的项目，在 **src/main/** 中创建两个文件夹\n\
  \n\n\n**资源：db/migrations**，包含所有脚本，以及 **db/changelog**，包含迁移过程中要执行的文件配置。\n\n最后，在 changelog\
  \ 文件夹内创建一个名为 **db.changelog-root.xml** 的空文件。\n\n图 6-4 以图形方式展示了引入所有修改后项目的结构。\n\n\
  ![](img/index-186_1.png)\n\n第 6 章 版本控制或迁移变更\n\n***图 6-4.** 包含文件后的项目结构*\n\n之后，你在\
  \ `application.yml` 中包含基本配置。如果允许 Liquibase 使用数据源中的用户名、密码和数据库 URL，则配置很短。如果你未指定任何这些信息，则从你在\
  \ Spring Boot 中定义的数据源获取信息。出于安全目的，请使用不同的用户名和密码访问数据库，并尽量不要在任何配置文件中直接包含这些值，你可以使用环境变量（参见清单\
  \ 6-2）。\n\n***清单 6-2.** 工具配置*\n\nspring:\n\n"
