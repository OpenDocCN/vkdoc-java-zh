  \n}\n\n第 1 章 应用程序架构\n\n你可以使用一个或多个仓库来隐藏访问信息的逻辑。你可以从清单 1-3 中获取接口，并创建一个具体类，以与清单 1-2\
  \ 相同的方式使用该仓库。\n\n***清单 1-4.** 使用 DAO 的仓库示例*\n\npublic class CityRepositoryImpl implements\
