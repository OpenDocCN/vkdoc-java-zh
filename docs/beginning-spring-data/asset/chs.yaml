  \ = *type*.getAnnotation( *Table*. *class*);\n\n*return* tableAnnotation != *null*\
  \ && StringUtils. *hasText*(\n\ntableAnnotation.value())\n\n? tableAnnotation.value()\n\
  \n: *type*.getSimpleName();\n\n}\n\n}\n\n**定义 TTL**\n\n此特性意味着信息仅在特定时间内可用。之后信息会消失，不建议在应用程序中指定此特性，因为根据驱动和\
