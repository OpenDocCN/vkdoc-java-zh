  \ 保存国家实体（参见图 8-2）。\n\n***图 8-2.*** 执行 POST 方法的结果\n\n第 8 章 MongoDB：文档数据库\n\n**实体的注解**\n\
  \n在 Spring Data Mongo 中，有一组注解可以应用于各种实体。表 8-3 描述了最相关的注解。\n\n***表 8-3.*** Mongo 实体中最常用的注解\n\
  \n**Spring Data Mongo 注解** **含义**\n\n@Document\n\n需要持久化到 MongoDB 的领域对象\n\n@Indexed\n\
  \n\n\n一个需要建立索引以提升搜索操作性能的特定字段\n\n`@Id`\n\n包含集合标识的属性\n\n`@transient`\n\n在持久化信息过程中忽略某个特定字段\n\
  \n`@IndexDirection`\n\n指示索引的方向：降序或升序\n\n`@Field`\n\n显式指定数据库中属性的名称，类似于 JPA 中的 `@Column`\n\
  \n`@DBref`\n\n用于连接多个集合的注解，类似于 JPA 中的 `@OneToMany` 或 `@ManyToMany`\n\n如果你使用 **@DBRef**\
  \ 引用另一个实体，对该对象的更改不会持久化到数据库中，因为无法像 JPA 那样实现级联操作。\n\n了解了这些注解后，我将对 Country 实体进行一些小的修改，以便不持久化完整的货币信息。请查看清单\
  \ 8-5 中对实体的所有修改。\n\n***清单 8-5.*** Mongo 实体的定义\n\nimport org.springframework.data.annotation.Id;\n\
  \nimport org.springframework.data.mongodb.core.index.Indexed;\n\nimport org.springframework.data.mongodb.core.mapping.DBRef;\n\
  \nimport org.springframework.data.mongodb.core.mapping.Document;\n\nimport org.springframework.data.mongodb.core.mapping.Field;\n\
  \n第 8 章 MongoDB：文档数据库\n\nimport java.util.List;\n\n@Document(value = \"country\"\
