  \n安装 JDK 后，检查您的系统上是否可以使用 Java 版本。为此，\n\n请键入以下内容。\n\n➜ ~ java –version\n\nopenjdk\
  \ 17.0.4 2022-07-19 LTS\n\nOpenJDK Runtime Environment Microsoft-38107 (build 17.0.4+8-LTS)\n\
