  \ // 必需***\n\n***@Table(name = \"currency\") //可选，仅当需要指定表名时使用***\n\n*public class\
  \ Currency {*\n\n***@Id //必需 - 标识哪个是主键***\n\n***@GeneratedValue(strategy = GenerationType.SEQUENCE)\
  \ //指示生成 ID 的方式***\n\n*private Long id;*\n\n*private String code;*\n\n*private String\
  \ description;*\n\n*private Boolean enable;*\n\n***@Column(name = \"decimal_places\"\
  , length = 5) //可选：指定列名和长度***\n\n*private String decimalPlaces;*\n\n*public Currency(Long\
  \ id, String code, String description, Boolean*\n\n*enable, String decimalPlaces)\
  \ {*\n\n*this.id = id;*\n\n*this.code = code;*\n\n*this.description = description;*\n\
  \n*this.enable = enable;*\n\n*this.decimalPlaces = decimalPlaces;*\n\n*}*\n\n*//\
  \ 所有属性的设置器和获取器*\n\n*// 重写 hashCode 和 equals 方法*\n\n*}*\n\n第 1 章 应用程序架构\n\n指定列名和长度的方法并不复杂。如果你不指定名称和默认大小，JPA\
  \ 的实现会定义这些值，对于字符串类型，默认值为 255。\n\n**注意** 你将在本书的第二部分了解更多关于 JPA 的内容。\n\n**Spring Data**\n\
  \n之前所有持久化机制的主要问题在于，你无法同时访问关系型和非关系型这两种类型的数据库。但 Spring Data 解决了这个问题，它允许你通过使用接口的仓库来访问数据库，以执行\
  \ CRUD 操作。此外，你还可以创建实现该接口的具体类。\n\n\n\n仓库接口体现了执行 Spring Data 框架未涵盖的特定操作的理念。这些仓库几乎在所有实现中都可用，用于访问数据库，以降低在同一应用程序中使用多个数据库的复杂性。\n\
  \n有一些基础仓库可用于扩展你的仓库功能。\n\n其中，有两个最为相关。`CrudRepository` 包含了所有实体的基本操作。`PagingAndSortingRepository`\
  \ 包含了使用分页和排序标准从数据库中获取某个结构信息的所有逻辑。\n\n图 1-8 说明了 Spring Data 支持 MongoDB、Redis、Neo4j、Cassandra\
  \ 以及所有关系型数据库。其他数据库，如 ElasticSearch20 和 Couchbase21，本书未作介绍，因为它们具有类似的信息存储结构。\n\n20\
  \ [`www.elastic.co/`](https://www.elastic.co/)\n21 [`www.couchbase.com/`](https://www.couchbase.com/)\n\
  \n![](img/index-37_1.png)\n\n第 1 章 应用程序架构\n\n***图 1-8.** 仓库的结构取决于数据库*\n\n**注意**\
  \ 在某些数据库中，Spring Data 提供了一种方法，可以使用在仓库或 DAO 后台使用的模板来分配和转换数据库中的异常，以执行诸如插入或检索信息之类的操作。Spring\
  \ Data JPA 不使用模板，因为它是一个用于访问所有 RDBMS 数据库的抽象层。\n\n你可以考虑使用这些模板在 Spring Data 提供的基础功能之外创建自定义仓库。例如，你可以在\
  \ Redis 中插入或检索信息之前引入安全机制或压缩机制。\n\n**对象映射**\n\nJPA 为开发者提供的最显著优势之一是能够将表与特定类进行映射，同时考虑所有可能的列类型以及表之间的关系。Spring\
  \ Data 将这种方法扩展到了所有 NoSQL 数据库。每种类型的数据库都提供了自己的注解来表示信息，以便将数据库与 Java 类进行映射。表 1-4 展示了每个对象如何在其他数据库中表示，而字段名称和类型无需重大更改。你只需要更改与每个数据库相关的注解即可。\n\
