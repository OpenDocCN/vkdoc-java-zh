  该工具大体遵循与之前相同的步骤，但 Spring Boot 中的配置


  可能更简单，具体取决于你想要使用的方法。Flyway 有多种


  执行迁移的方式。


  • 仅在 pom 文件中包含依赖项，这样当


  应用程序启动时，它会执行所有脚本并验证


