  \n![](img/index-374_1.jpg)\n\n附录 D 安装和配置关系型数据库\n\n图 D-1 显示了 MySQL Workbench 中的加号图标，点击它可以创建一个新连接。\n\
  \n***图 D-1.** 访问数据库的客户端*\n\n图 D-2 显示了填写新连接所有相关信息的界面。在此窗口中，你只需填写用户名信息。主机名为 localhost\
  \ 或 127.0.0.1，端口在所有情况下均为 3306，以及一个连接名称，该名称可以是任何内容，因为对名称没有限制。\n\n![](img/index-375_1.jpg)\n\
  \n附录 D 安装和配置关系型数据库\n\n***图 D-2.** 创建新连接*\n\n如果你想检查一切是否正常，可以点击“测试连接”按钮，然后会弹出一个窗口要求填写连接的密码。如果你想设置密码并避免每次都弹出窗口，则需要点击“存储在钥匙串中…”按钮，该按钮会要求输入密码并将值保存在你机器上的安全位置。\n\
  \n测试连接后，点击“确定”按钮保存有关连接的所有信息。\n\n**步骤 4：创建模式**\n\n当你在 MySQL Workbench 中创建好连接后（见图\
  \ D-3)，双击访问该数据库并执行你想要的任何操作。\n\n![](img/index-376_1.png)\n\n\n\n附录 D 安装并配置关系型数据库\n\
  \n***图 D-3.** MySQL Workbench 中的活动连接*\n\n你需要做的第一件事是创建一个包含所有表的新模式。\n\n点击加号图标。当表单出现时，输入数据库的名称。最后，\n\
  \n点击“应用”按钮创建一个空模式，你将在下一步中向其中填充不同的\n\n表。\n\n![](img/index-377_1.jpg)\n\n附录 D 安装并配置关系型数据库\n\
  \n***图 D-4.** 创建新模式*\n\n**步骤 5：加载数据**\n\n此过程的最后一步是创建模式的结构，并用你在关系型数据库章节中使用的信息填充它。这些信息位于代码仓库文件夹中（[github.com/apress/beginning-spring-data](http://github.com/apress/beginning-spring-data)）。每个文件夹对应一个章节。你可以在\
  \ databases 文件夹中找到所有需要执行的脚本（见图 D-5）。\n\n![](img/index-378_1.png)\n\n![](img/index-378_2.png)\n\
  \n附录 D 安装并配置关系型数据库\n\n***图 D-5.** 包含数据库脚本的源代码仓库*\n\n此文件夹内有多个文件。请按版本号依次执行每个文件（见图\
  \ D-6）。第一个要执行的脚本是 `V1.0_init_database.sql`。\n\n***图 D-6.** 需要在数据库中执行的脚本*\n\n最后一步是打开每个脚本并执行它。你可以将文件拖放到\
  \ MySQL Workbench 中来完成此操作。应用程序会打开该文件并显示其内容。之后，你只需点击按钮即可将所有脚本运行到数据库中，并对每个脚本重复此过程（见图\
  \ D-7）。\n\n![](img/index-379_1.jpg)\n\n附录 D 安装并配置关系型数据库\n\n***图 D-7.** 在 MySQL Workbench\
  \ 中加载脚本*\n\n**PostgreSQL**\n\nPostgreSQL 是一款创建于 1996 年的关系型数据库，是 MySQL 的替代品。以下是使该数据库在开发者中广受欢迎的一些特性。\n\
  \n• 免费使用。\n• 针对大量读写操作进行了优化的数据库。\n• 支持比 MySQL 更多的数据类型，例如枚举值。\n\n附录 D 安装并配置关系型数据库\n\
  \n• 根据 StackOverflow 2021 年的调查 6，PostgreSQL 是仅次于 MySQL 的第二大常用数据库，这意味着如果出现问题，会有很多人报告该错误。\n\
  \n**步骤 1：在本地机器上安装数据库**\n\n此过程的第一步是下载数据库安装程序并运行安装过程。PostgreSQL 支持多种操作系统，包括 Windows\
  \ 和 macOS，以及许多 Linux 发行版，例如 Debian、Ubuntu、Red Hat 和 Suse。你可以从官方网站 7 下载安装程序，并在点击你的操作系统后按照说明进行操作。说明网页包含了使用每个数据库版本的前提条件。\n\
  \n为 root 用户定义一个用户名/密码，你将在步骤 3 中使用它来连接数据库。\n\n**步骤 2：安装客户端以访问数据库**\n\n要使用 PostgreSQL，你需要一个客户端来帮助你执行某些操作，例如创建模式、插入数据以及检查一切是否正常运行。对于所有关系型数据库，有几种选择；有些是免费的，有些则提供短期试用。本书使用\
  \ pgAdmin，这是最流行的选择之一。\n\n通过查看官方文档 8，根据你的操作系统查找并下载安装程序。这个数据库访问客户端与其他客户端的一个巨大区别是它可以通过\
  \ Docker 运行，因此如果你不想为本书安装它，你可以使用 Docker 来运行它。\n\n当你选择操作系统时，你会看到在本地机器上安装它的前提条件和说明。\n\
  \n\n\n6 [`insights.stackoverflow.com/survey/2021#technology`](https://insights.stackoverflow.com/survey/2021#technology)\n\
  \n7 [`www.postgresql.org/download/`](https://www.postgresql.org/download/)\n\n8\
  \ [`www.pgadmin.org/download/`](https://www.pgadmin.org/download/)\n\n![](img/index-381_1.jpg)\n\
  \n![](img/index-381_2.jpg)\n\n附录 D 安装并配置关系型数据库\n\n**第 3 步：配置连接**\n\n安装数据库和客户端访问工具后，下一步是打开\
  \ pgAdmin，并使用你在第 2 步中定义的凭据登录（见图 D-8）。\n\n***图 D-8.** 登录页面*\n\n图 D-9 展示了 pgAdmin\
  \ 仪表盘。点击图标以添加新连接。\n\n***图 D-9.** 添加新服务器*\n\n![](img/index-382_1.png)\n\n附录 D 安装并配置关系型数据库\n\
  \n接下来，你会看到一个包含所有数据库相关信息的窗口，例如用户名/密码、主机名（localhost 或 127.0.0.1）、端口（5432）以及连接名称。连接名称可以是任意内容，因为名称没有限制。\n\
  \n***图 D-10.** 连接配置*\n\n如果一切正常，点击“保存”按钮。下一步你将创建模式。\n\n**第 4 步：创建模式**\n\n当你连接到在 pgAdmin\
  \ 中创建的服务器时（见图 D-11），左键单击该服务器，在菜单中选择“创建”，然后选择“数据库”选项。\n\n![](img/index-383_1.jpg)\n\
  \n![](img/index-383_2.png)\n\n附录 D 安装并配置关系型数据库\n\n***图 D-11.** 创建新数据库*\n\n下一步是填写图\
  \ D-12 所示的窗口，并保存更改。\n\n***图 D-12.** 创建新数据库的窗口*\n\n![](img/index-384_1.png)\n\n附录\
  \ D 安装并配置关系型数据库\n\n**第 5 步：加载数据**\n\n此过程的最后一步是创建模式结构，并用你在关系型数据库章节中使用的信息填充它。在源代码文件夹中有几个文件。你需要按版本号依次执行它们，因此第一个要执行的脚本是\
  \ `V1.0_init_database.sql`。\n\n最后，你需要双击所创建数据库中的“模式”部分，并点击数据库图标以打开连接来执行查询。之后，你需要将每个文件的内容复制并粘贴到查询编辑器中，然后点击“播放”按钮来执行查询。你需要对脚本文件夹中的每个文件重复此过程。\n\
  \n***图 D-13.** 创建新数据库的窗口*\n\n![](img/index-385_1.jpg)\n\n附录 D 安装并配置关系型数据库\n\n**使用\
  \ Docker 运行数据库**\n\n许多开发者不想在本地机器上安装数据库，因为它们会消耗资源且并非总是被使用。例如，要完成本书中的练习，你必须在机器上运行一个数据库。完成本书后，你可能不再需要使用\
  \ MySQL 或 PostgreSQL。使用 Docker 可以轻松运行一个数据库。\n\n你必须在 Docker Hub 网站上查找特定版本的 MySQL9\
  \ 或 PostgreSQL.10 我建议你不要使用最新版本，而是使用 Docker Hub 上存在的最后一个版本。\n\n***图 D-14.** Docker\
