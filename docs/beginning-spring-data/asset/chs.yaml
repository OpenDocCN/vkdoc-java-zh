  当数据库运行时，你可以使用与本地机器上安装的数据库相同的端口来使用它。\n\n**附录 E**\n\n**安装和配置**\n\n**非关系型数据库**\n\n\
  本附录介绍如何安装本书第三部分中使用的非关系型数据库。\n\n这类数据库的主要问题取决于你使用的具体数据库；安装过程需要时间并执行指令。我建议你使用 Docker\
  \ 来运行镜像。你也可以使用 Docker 的 UI 控制台。\n\n**Redis**\n\nRedis 是一个高性能的非关系型数据库，有多种安装选项。\n\n\
  使用流行的 Homebrew 安装工具是一种选择，这意味着数据库会安装并运行在你的机器上。阅读完本书后，如果你不再使用它，需要将其移除。清单 E-1 展示了如何使用\
  \ Homebrew 进行安装。\n\n***清单 E-1.*** 使用 Homebrew 安装\n\n$ brew install redis\n\n==>\
  \ 正在安装 redis\n\n==> 正在倒入 redis--7.0.4.x86_64_linux.bottle.tar.gz\n\n==> 注意事项\n\n\
  要在升级后重启 redis：\n\nbrew services restart redis\n\n或者，如果你不需要/不想使用后台服务，可以直接运行：\n\n\
  /home/linuxbrew/.linuxbrew/opt/redis/bin/redis-server /home/linuxbrew/.\n\nlinuxbrew/etc/redis.conf\n\
  \n© Andres Sacco 2023\n\nA. Sacco, *Beginning Spring Data*[, https://doi.org/10.1007/978-1-4842-8764-4](https://doi.org/10.1007/978-1-4842-8764-4#DOI)\n\
  \n附录 E 安装和配置非关系型数据库\n\n==> node\n\nBash 补全已安装到：\n\n/home/linuxbrew/.linuxbrew/etc/bash_completion.d\n\
  \n当此安装过程完成后，数据库将在端口 5432 上运行。如果你不想使用它或需要移除它，可以在 Homebrew 中调用 remove 或 stop 命令。\n\
  \n如果你想检查机器上安装的 Redis 版本，可以使用以下命令进行查看。同时，此命令也有助于确认安装是否成功。\n\n$ redis-server --version\n\
  \nRedis server v=7.0.4 sha=00000000:0 malloc=jemalloc-5.2.1 bits=64\n\nbuild=5aabc73c47c29d1e\n\
  \n第二种选择是创建一个 docker-compose 文件，用于运行数据库和 RedisInsight（一种用于访问和操作 Redis 的工具）。清单 E-2\
  \ 展示了使用 RedisInsight 运行 Redis 数据库的 Docker-compose 文件结构。\n\n***清单 E-2.*** 用于运行 Redis\
  \ 的 Docker-compose 文件\n\nversion: '3.1'\n\nservices:\n\nredis-db:\n\nimage: redis:6.2\n\
  \nrestart: always\n\nports:\n\n- 6379:6379\n\nredisinsight:\n\n\n\nimage: redislabs/redisinsight:1.12.1\
  \ #此版本对应工具的 2.0 版本\n\nports:\n- '8001:8001'\n\n![](img/index-390_1.png)\n\n附录 E\
  \ 安装和配置非关系型数据库\n\n创建文件后，使用 `docker-compose up` 命令运行它。然后，打开浏览器并输入 **localhost:8001**，这是\
  \ **RedisInsight** 使用的端口。图 E-1 展示了首次进入网页时 RedisInsight 的界面。\n\n***图 E-1.** RedisInsight\
  \ 主页*\n\n下一步是将此工具与正在运行的数据库连接，因此你需要点击“我已经有一个数据库”按钮。你会看到一个包含多种连接选项的网页，因为数据库可以托管在不同的位置，例如你的本地机器、专用服务器或\
  \ AWS 等云服务提供商。图 E-2 展示了配置数据库访问权限的不同选项。\n\n![](img/index-391_1.png)\n\n附录 E 安装和配置非关系型数据库\n\
  \n***图 E-2.** 数据库配置*\n\n下一步是点击“连接到 Redis 数据库”按钮，并在弹出的模态框中填写连接信息。\n\n• **host**：redis-db\n\
  • **port**：6379\n• **name**：catalog（或你希望使用的任何名称）\n\n确认所有信息后，RedisInsight 会在添加数据库之前进行连接验证，检查你提供的信息是否正确。如果一切正常，你将看到一个如图\
  \ E-3 所示的界面，其中列出了你在工具中已配置的数据库。\n\n![](img/index-392_1.png)\n\n附录 E 安装和配置非关系型数据库\n\
  \n***图 E-3.** 与数据库的连接*\n\n如果你双击该数据库，将进入一个新页面，其中包含你可以针对此特定数据库执行的所有操作，并可以检查其状态。这些操作可以通过命令行或\
  \ RedisInsight 中的 CLI 工具从你的应用程序中执行（见图 E-4）。\n\n![](img/index-393_1.png)\n\n附录 E\
  \ 安装和配置非关系型数据库\n\n***图 E-4.** 活跃的数据库*\n\n最后，你可以打开“浏览器”选项来向数据库添加新元素或检查现有元素，这有助于检查键的\
  \ TTL 是否正常（见图 E-5）。\n\n![](img/index-394_1.png)\n\n附录 E 安装和配置非关系型数据库\n\n***图 E-5.**\
  \ 浏览器选项卡，允许添加新键*\n\n**MongoDB**\n\nMongoDB 是一种非关系型数据库，它以文档形式持久化信息，并具备关系型数据库的部分功能。该数据库提供多种安装选项。\n\
  \n该数据库有相关文档 1，介绍了如何根据你的操作系统使用不同的软件包进行安装。不过，根据操作系统的不同，安装过程可能需要额外的步骤。\n\nHomebrew\
  \ 简化了安装过程的复杂性。第一步是将与 Mongo 相关的仓库添加到 Homebrew 中，默认情况下 Homebrew 并不包含这些仓库（见清单 E-3）。\n\
