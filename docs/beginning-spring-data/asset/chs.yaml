  \n**延伸阅读**\n\n本书涵盖了框架、库、技术和数据库，但并未涵盖高级主题。本附录提供了一些书籍和其他资源的列表，你可以深入探索以学习更高级的主题。资源分为三组：通用资源、关系型数据库和非关系型数据库。\n\
  \n**通用资源**\n\n• ***《Beginning IntelliJ IDEA》***，作者 Ted Hagos（Apress，2021 年）。1 本书涵盖了使用\
  \ IntelliJ 的所有方面，例如安装过程、如何调试应用程序以及掌握 IDE 基本技能最相关的要素。\n\n• [***《Learn Microservices\
  \ with Spring Boot》***](https://link.springer.com/book/10.1007/978-1-4842-6131-6)\
  \ ***3.0***，作者 Moisés Macero García（Apress，2020 年）。2 如果你想了解微服务的所有方面，例如如何创建一个新的微服务，或者使用微服务而非单体架构的理念，本书将帮助你理解这些概念以及如何使用\
  \ Spring Boot 实现它们。\n\n• ***《Docker in Action》***，作者 Jeff Nickoloff 和 Stephen Kuenzli（Manning，2019\
  \ 年）。3 本书详尽解释了 Docker 的所有方面以及它如何与操作系统层交互。此外，你还将学习如何创建镜像或运行现有镜像。\n\n\n\n1 [`link.springer.com/book/10.1007/978-1-4842-7446-0`](https://link.springer.com/book/10.1007/978-1-4842-7446-0)\n\
