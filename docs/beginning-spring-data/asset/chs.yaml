  \ 章至第 [14](https://doi.org/10.1007/978-1-4842-8764-4_14) 章）涵盖了高级主题，例如使用不同库执行单元测试和性能测试。最后一章描述了使用\
  \ Spring Data 的一些最佳实践。\n\nxxii\n\n**第 1 章**\n\n**应用程序架构**\n\n持久化通常是任何语言中最重要的主题之一，因为它为消费或产生信息的应用程序提供了一种长期保存信息的方式。过去，当开发者创建单个大型应用程序时，问题往往集中出现在一个地方。也许大部分逻辑都存在于存储过程中，但随着微服务的出现并成为行业标准，大多数应用都需要保存其信息。因此，与单体应用相比，该主题的重要性比以往任何时候都更加突出。\n\
  \n此外，在从单体架构向微服务架构过渡期间，许多非关系型数据库成为解决特定问题的替代方案，例如为具有不同结构的已保存信息提供缓存机制。\n\n自 Java 问世以来，出现了多种访问信息的方式以及其他类型的架构。本章概述了访问数据库方式的演变及其优缺点。\n\
  \n同时，您还将学习一些与关系型或非关系型数据库持久化相关的最重要的模式。\n\n**为什么持久化如此重要**\n\n持久化信息是微服务和应用程序最重要的方面之一。如果在部署、重启或系统发生故障时未能保存数据，您将丢失一切。\n\
  \n但还有其他需要考虑的因素，因为它们可能会影响整个平台的性能，增加延迟或错误。以下是一些与数据库不当使用或设计相关的问题。\n\n© Andres Sacco\
  \ 2023\nA. Sacco，《Spring Data 入门》[，https://doi.org/10.1007/978-1-4842-8764-4_1](https://doi.org/10.1007/978-1-4842-8764-4_1#DOI)\n\
  \n![](img/index-21_1.png)\n\n第 1 章 应用程序架构\n\n• 增加执行查询和从数据库获取信息的延迟\n• 由于连接方式设计错误，导致访问数据库时\
  \ CPU/内存使用率增加\n• 针对要持久化的信息类型，选择了旧版本或不正确的数据库类型\n\n存在许多与持久化相关的问题，但本书不要求您了解所有问题。一个错误的决策，或者不理解每种数据库类型的优缺点以及如何访问信息，都可能影响您的整个系统。\n\
  \n**持久化的历史**\n\n\n\n自 JDK 1.1 中引入 JDBC 以来，应用程序的持久化技术经历了一次演变，从 JDBC 发展到 ORM，再到如今使用\
  \ Spring Data——它提供了一个用于访问不同数据库的标准接口。其中一些是关系型数据库，而另一些则是非关系型数据库。\n\n持久化信息到数据库的方式有很多种。考虑到根据\
  \ Snyk 的报告,1，至少有 50% 的开发者使用 Spring Boot，那么其中许多人使用 Spring Data 似乎合乎逻辑。图 1-1 展示了从\
  \ Java 持久化技术到 2011 年 Spring Data 出现的历史。\n\n***图 1-1.** 持久化技术历史*\n\n如今，大多数与数据库交互的库仍然具有重要意义。它们都经过了多年的发展。有些库之间会相互影响；例如，在图\
  \ 1-1 中，企业级 JavaBean（EJB）和 Java 持久化 API（JPA）是两种不同的东西。早期版本的 EJB 包含了所有 JPA 规范，而 JPA\
  \ 的重要性日益增长。EJB 3.0 版本则表现为两个相互交互的独立部分。\n\n1 [`snyk.io/jvm-ecosystem-report-2021/`](https://snyk.io/jvm-ecosystem-report-2021/)\n\
  \n![](img/index-22_1.png)\n\n第 1 章 应用程序架构\n\n**JDBC**\n\nJDBC，即 Java 数据库连接（Java\
  \ Database Connectivity），提供了一个通用接口来与其他数据库进行通信和交互。更具体地说，JDBC 提供了一种连接数据库、创建和执行语句（如创建/删除/清空表）以及执行查询（如\
  \ SELECT/INSERT/UPDATE/DELETE）的方法。图 1-2 简要概述了使用 JDBC 与数据库通信时交互的不同组件。\n\n***图 1-2.**\
  \ JDBC 结构*\n\n与数据库交互涉及一组组件或层次。\n\n• **JDBC API**：此层包含所有驱动程序需要实现的所有接口，以便 Java 开发者使用它们。这一层是最重要的层之一，因为你可以从一个数据库切换到另一个数据库而无需更改太多内容，只需更换另一个数据库的驱动程序，并对列类型进行少量修改。\n\
  \n第 1 章 应用程序架构\n\n• **JDBC 驱动程序管理器**：这组类充当驱动程序和 JDBC API 之间的连接器，负责注册和注销可用的数据库、获取与数据库的连接以及与该连接相关的信息。\n\
  \n• **驱动程序**：为了实现数据库之间的连接，JDBC 将所有与特定数据库交互的逻辑隐藏在一系列驱动程序中，每个驱动程序都包含针对一个数据库的逻辑。通常，开发这些数据库的公司会为大多数语言创建相应的驱动程序。\n\
  \nJDBC 自 1997 年首次发布以来并非一成不变。后续版本尝试增加更多功能或解决与性能相关的问题（见表 1-1）。像 Spring 这样的框架实现了 JDBC\
  \ 的一个版本，并包含了该框架的一些特性。\n\n***表 1-1.** JDBC 各版本演变*\n\n**年份**\n\n**版本**\n\n**规范**\n\
  \n**JDK 版本**\n\nJDBC 4.3\n\nJSr 221\n\nJDBC 4.2\n\nJSr 221\n\nJDBC 4.1\n\nJSr 221\n\
  \nJDBC 4.0\n\nJSr 2212\n\nJDBC 3.0\n\nJSr 543\n\n1.4\n\nJDBC 2.1\n\n1.2\n\nJDBC\
  \ 1.2\n\n1.1\n\n此表展示了 JDBC 的演变过程以及详细说明每个版本引入了哪些功能的规范。一些早期版本并没有具体的规范。\n\n2 [`www.jcp.org/en/jsr/detail?id=221`](https://www.jcp.org/en/jsr/detail?id=221)\n\
  \n3 [`www.jcp.org/en/jsr/detail?id=54`](https://www.jcp.org/en/jsr/detail?id=54)\n\
  \n![](img/index-24_1.png)\n\n第 1 章 应用程序架构\n\n**JDBC 驱动程序**\n\nJDBC 驱动程序组件实现了 JDBC\
  \ API 中定义的接口，用于与数据库交互。可以将此组件视为一个客户端适配器，用于将特定数据库的元素或语法转换为 Java 能够理解的标准。\n\nJDBC 提供了四种在不同情况下推荐的驱动程序类型，如图\n\
  \n\n\n图 1-3\n\n***图 1-3.** 提供 JDBC 的驱动程序类型*\n\n第 1 章 应用程序架构\n\n**类型 1：JDBC-ODBC\
  \ 桥接器**\n\n这种类型最初被用于第一批 JDBC 驱动程序，因为当时大多数数据库都支持 ODBC 访问。该驱动程序将 JDBC 转换为 ODBC，反之亦然，充当一个独立于数据库的适配器。你可以将其视为\
  \ JDK 的一部分，是一个通用驱动程序，因此项目中无需包含任何依赖项。\n\n这种类型的驱动程序仅用于开发或测试；由于从 JDBC 转换为 ODBC 的性能问题以及安全方面的隐患，它不会在生产环境中使用。\n\
  \n**类型 2：基于客户端**\n\n下一代驱动程序变得更加流行，因为它省去了将 JDBC 转换为 ODBC 的所有步骤，直接使用每个数据库厂商的原生库进行调用，这些库通常复用现有的\
  \ C/C++ 代码来创建。\n\n其优势包括性能提升，因为无需在不同格式之间进行转换。但也存在一些缺点；例如，驱动程序必须安装在客户端机器上。\n\n**类型\
  \ 3：两层架构**\n\n*两层架构*、*网络协议*和*带有中间件的纯 Java 驱动程序*都指向同一个概念。这种类型使用 JDBC，通过套接字与中间件服务器交互，进而与数据库通信。该中间件包含了所有不同数据库的驱动程序，因此无需在每台机器上都安装所有内容。\n\
  \n这种方法的主要问题在于需要一个专用服务器来与数据库交互，这意味着更多的信息传输，并引入了一个故障点。此外，厂商需要将 C/C++ 代码重写为纯 Java。\n\
  \n**类型 4：网络协议驱动程序**\n\n*网络协议*或*原生协议驱动程序*是直接连接数据库最流行的方法之一。在这种类型中，驱动程序完全用 Java 编写，并使用每个厂商定义的协议与数据库通信。\n\
  \n这种类型提供了许多优势，包括与上一种类型相比性能卓越，并且无需在客户端或服务器上安装任何东西。但主要缺点是每个数据库都有一个使用不同协议的驱动程序。\n\n\
  第 1 章 应用程序架构\n\n**如何连接数据库**\n\n根据性能要求，有几种方法，例如使用连接池。连接数据库的基本过程包括以下步骤。\n\n1.  **导入类。**\
  \ 你必须包含使用 JDBC 和连接数据库所需的所有类。大多数情况下，所有类都位于 `java.sql.*` 包中。\n\n2.  **打开连接。** 使用 `DriverManager.getConnection()`\
  \ 创建一个连接，该连接代表与数据库的物理连接。\n\n3.  **执行查询。** 创建一个 `Statement` 对象，其中包含要在数据库中执行的查询。\n\
  \n4.  **获取数据。** 在数据库中执行查询后，你需要使用 `ResultSet.getXXX()` 方法来检索每一列的信息。\n\n5.  **关闭连接。**\
  \ 无论应用程序是否产生异常，你都需要显式关闭与数据库的连接。\n\n让我们来看看所有与访问数据库和获取特定信息相关的概念。其想法是创建一个代表国家/州/城市目录的表结构，你将在关于关系型数据库的章节中使用它。图\
  \ 1-4 展示了这些表的结构以及它们之间的不同关系。\n\n![](img/index-27_1.png)\n\n第 1 章 应用程序架构\n\n***图 1-4.**\
