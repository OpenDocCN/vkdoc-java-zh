  \ 411\n\nx\n\n![](img/index-11_1.jpg)\n\n**关于作者**\n\n**安德烈斯·萨科**自 2007 年起成为一名专业开发人员，曾使用多种语言工作，包括\
  \ Java、Scala、PHP、Node.js 和 Kotlin。他的背景主要集中在 Java 及其相关库或框架上，例如 Spring、JSF、iBATIS、Hibernate\
  \ 和 Spring Data。他专注于研究新技术，以提升所开发应用程序的性能、稳定性和质量。\n\n2017 年，他开始寻找优化应用程序间数据传输的新方法，以降低基础设施成本。他提出了适用于微服务的改进措施。这些措施实施后，成本降低了\
  \ 55%。其中一些措施与数据库的不当使用直接相关。\n\nxi\n\n![](img/index-12_1.jpg)\n\n**关于技术审校**\n\n**曼努埃尔·乔丹·埃莱拉**是一位自学成才的开发者和研究员，他乐于学习新技术用于自己的实验，并创造新的集成方案。曼努埃尔曾荣获\
  \ 2013 年 Springy 奖社区冠军和 Spring 冠军。在有限的空闲时间里，他阅读《圣经》并用吉他作曲。\n\n曼努埃尔以 dr_pompeii 的网名闻名。他曾担任多本书籍的技术审校，包括《Pro\
