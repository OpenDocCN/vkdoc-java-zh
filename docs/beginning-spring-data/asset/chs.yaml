  : \"Buenos Aires\"\n\n}\n\n]\n\n}\n\n第 8 章 MongoDB：文档数据库\n\n另一个特性是不同实体之间的关系。在 Mongo\
  \ 中，这是可能的，但存在一些限制。在一对一关系中，你可以包含对另一个集合/文档的引用，例如外键或嵌入对象，但只有一个集合。在一对多或多对多关系中也是如此。你可以嵌入一个对象数组，或者包含一个指向其他集合的引用数组。\n\
  \n**Spring Data Mongo 介绍**\n\n本书的前几章涵盖了与 Spring Data 相关的模块，包括 Spring Data Mongo，6\
  \ 它降低了数据库配置的复杂性，例如创建查询或配置连接，以及使用索引等性能方面的问题。\n\nMongoDB 有多个复制所有信息的数据库实例。此外，你还可以分片信息，这意味着你在多个实例中拥有某部分信息。在这两种情况下，对实现的影响仅仅是在\
  \ **application.yml** 中做一点小改动，因此这超出了本书的范围。\n\n**数据库和连接设置**\n\n在本节中，你将看到如何使用 MongoDB\
