  \n第 8 章 MongoDB：文档数据库\n\n**Repository 的 MongoDB 关键字**\n\nSpring Data Mongo 提供了不必手动编写所有查询的可能性。你可以像使用\
  \ Spring Data JPA 一样，在 Repository 中创建一个方法，其中包含数据库中文档需要满足的所有条件。表 8-4 列出了你可以在 Repository\
  \ 中包含的条件。\n\n***表 8-4.** 无需编写完整语句即可创建查询的关键字*\n\n**关键字**\n\n**示例**\n\n**条件**\n\n\
  equal\n\nfindByCodeEquals(String code)\n\n{\"code\": \"Bue\"}\n\nand\n\nfindByCodeAndEnabled(String\
