  \n第 1 章 应用程序架构\n\n**EJB 类型**\n\nEJB 架构包含三个主要组件：EJB 容器、应用服务器和企业级 JavaBeans（EJB），后者又分为多种类型。\n\
  \n• **会话 Bean**：这些组件包含与用户任务或用例相关的所有逻辑。会话 Bean 在该任务或用例（如同一次对话）执行期间可用。但是，如果服务器崩溃或重启，会话\
  \ Bean 中保存的所有信息都将丢失。\n\n会话 Bean 分为两种类型：有状态和无状态。主要区别在于，前者在调用后会保存状态，而后者（无状态）在调用后不保存任何信息。\n\
  \n• **消息驱动 Bean**：当需要应用程序之间的同步通信时，前面的 Bean 工作良好；但如果需要异步通信，消息驱动 Bean 则是正确的选择。最常见的实现使用\
  \ JMS（Java 消息服务）14。这种类型的 EJB 充当队列主题中的监听器，等待消息并在消息到达时执行相应操作。这种通信方式在微服务出现后变得流行。\n\n\
  • **实体**：此组件包含代表数据库表的类，并为数据库中的 CRUD（创建、检索/读取、更新、删除）操作提供接口。EJB 3.0 引入了对此类组件的更改，使用\
  \ JPA 替代了之前作为 EJB 规范一部分的实体 Bean。\n\n图 1-6 展示了构成 EJB 的各组件之间的交互。\n\n14 [`docs.oracle.com/cd/B19306_01/server.102/b14257/jm_create.htm`](https://docs.oracle.com/cd/B19306_01/server.102/b14257/jm_create.htm)\n\
  \n![](img/index-33_1.png)\n\n第 1 章 应用程序架构\n\n***图 1-6.** EJB 组件及其与 JPA 的交互方式*\n\n\
  **JPA**\n\n\n\nJava 持久化 API（JPA）是一种直接与数据库持久化相关的规范 15。更具体地说，JPA 提供了一组所有提供商都必须遵循的接口，以确保它们遵循标准，这样你就可以在不费太多力气的情况下更换提供商。\n\
  \n使用 JPA，开发者可以通过一个代表表结构的 Java 类来访问数据库中的信息，并执行某些操作，如插入、更新、删除和检索。要执行这些操作，你需要使用代表表中常见内容的注解来标注类，例如表名、列大小以及表之间的关系。\n\
  \nJPA 提供了多种执行查询以检索信息的方式。一种是像 JDBC 那样直接使用 SQL 语句，并借助类来帮助构建语句；另一种则引入了一种抽象，这样你无需编写完整的语句，因为\
  \ JPA 的提供商会动态生成该语句。图 1-7 展示了 JPA 与应用程序的不同层级或结构。\n\n15 [`www.jcp.org/en/jsr/detail?id=338`](https://www.jcp.org/en/jsr/detail?id=338)\n\
  \n![](img/index-34_1.png)\n\n第 1 章 应用程序架构\n\n***图 1-7.** 使用 JPA 的层级结构示例*\n\n该规范有许多实现，但最相关的是\
  \ Hibernate16、EclipseLink17、Apache OpenJPA18 和 Spring Data JPA19。它们各自都以不同的方式实现了\
  \ JPA 规范，优先考虑性能或开发者体验等方面。\n\n让我们看一个示例，其中你可以声明一个代表数据库中某个表的类。\n\n16 [`hibernate.org/`](https://hibernate.org/)\n\
  \n17 [`www.eclipse.org/eclipselink/`](https://www.eclipse.org/eclipselink/)\n\n\
  18 [`openjpa.apache.org/`](https://openjpa.apache.org/)\n\n19 [`spring.io/projects/spring-data`](https://spring.io/projects/spring-data)\n\
  \n第 1 章 应用程序架构\n\n*package com.apress.jpa.model;*\n\n*import javax.persistence.Column;*\n\
  \n*import javax.persistence.Entity;*\n\n*import javax.persistence.GeneratedValue;*\n\
