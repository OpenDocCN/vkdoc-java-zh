  \n} else {\n\ncountry = countryRepository.findByIdUsingQuery(id);\n\n}\n\nif(country.isPresent())\
  \ {\n\nresponse = ApiMapper.INSTANCE.entityToDTO(country.get());\n\n// 这是将实体转换为\
  \ DTO 的映射器\n\n}\n\nreturn response;\n\n}\n\n}\n\n清单 6-12 引入了对 `CountryController`\
  \ 的修改以接收该参数。\n\n***清单 6-12.*** 控制器修改\n\n@RestController\n\n@RequestMapping(\"/country\"\
