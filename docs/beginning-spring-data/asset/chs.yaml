  运行应用程序时会出现两个情况：其中一个直接与尚未定义的实体相关，即主键或主要属性。另一个在幕后实现中出现的是 Hibernate。我们无需直接使用 Hibernate，因为\
  \ Spring Data 在幕后包含了一个抽象层来隐藏真实的实现。\n\n控制台中出现的异常是可能遇到的异常之一。每个实体都需要遵循规则才能被视为有效。\n\n\
  *   每个实体都需要有一个带有 **@Id** 注解的属性/类，以指示主键或用于搜索的主要属性。\n*   实体需要有一个无参构造方法，该构造方法不能被显式定义。JPA\
  \ 会使用所有 Java 类都拥有的默认构造方法，但如果你创建了一个带参数的构造方法，则需要显式定义无参构造方法。\n*   类不能被声明为 `final`。\n\
  *   所有属性都需要有 setter 和 getter 方法。此外，重写 `hashCode` 和 `equals` 方法也是一种良好的实践。\n\n第 4\
  \ 章 持久化与领域模型\n\n要解决清单 4-4 中的问题，你只需要在 `Country` 类的 `id` 属性上添加 **@Id** 注解即可。现在，如果你运行应用程序，并且...\n\
  \n\n\n微服务再次运行，一切正常，没有任何问题。你可以在 IDE 中运行该应用程序，或执行**./mvnw spring-boot:run**命令。\n\n\
  列表 4-5 展示了带有@Id 注解的 Country 实体。\n\n***列表 4-5.*** 添加表 ID\n\n@Entity //这向 JPA 表明这是一个具有持久化状态的对象\n\
  \n@Table(name = \"country\") //这是可选的\n\npublic class Country implements Serializable\
  \ {\n\n@Id\n\nprivate Long id;\n\n*// 所有属性的属性、构造方法、setter 和 getter 方法*\n\n*// 重写\
  \ hashcode 和 equals 方法*\n\n}\n\n需要注意的是，你声明为**@Id**的属性在首次持久化后修改其值并非良好实践，因为这可能导致 Spring\
  \ Data 和 Hibernate 在后台提供的缓存机制出现问题。\n\n另一个需要考虑的是，**@Id**必须有一个值——你可以在创建对象时设置该值，或者将生成值的责任委托给数据库，使用下一节中介绍的某个键生成器。\n\
  \n**提示** 在所有实体中定义 hashCode 和 equals 方法，因为这有助于判断两个实体实例是否相同，即是否指向数据库表的同一行。如果你不声明这些方法，两个或多个实体实例之间的比较将基于内存位置，而内存位置可能不同——即使每个实例包含相同的信息。\n\
  \n当两个对象具有相同的值且指向数据库中的同一行时，这被称为数据库标识；相反，当两个对象在内存中不共享相同位置但值不同时，这被称为对象标识。\n\n第 4 章\
  \ 持久化与领域模型\n\n在继续解释与列相关的其他注解之前，请复制上一章的相同逻辑，为获取一个**Country**的信息暴露一个端点。如果你愿意，可以查看\
  \ GitHub 仓库中的文件夹以获取上一章的源代码，并将新更改添加到本章中。\n\n**列**\n\n在类中声明表名之后，下一步是声明与每个类属性匹配的每个表列的名称和类型。此外，你可以定义每个列的长度、最小值和最大值，并使用这些定义来验证特定实例中的值是否有效以进行持久化，以及该列是否允许空值。\n\
  \n为了指示名称、长度、最大值和最小值，以及是否支持空值，JPA 提供了@Column 注解，你可以在每个类属性上仅使用一种类型。\n\n**提示** 是否需要在所有属性中包含**@Column**注解？答案是否定的，因为\
  \ JPA 假设属性名称与数据库中的列名称相同。但最佳实践是在所有情况下都定义该注解，包括定义名称、是否允许空值，以及所有可用于在持久化前验证实体的可能内容。此外，考虑为字符串列设置正确的属性长度。\n\
  \n一些关系数据库供应商区分小写和大写单词，因此最佳实践是尽量在所有情况下指示列的名称。\n\n让我们修改之前的实体，以包含@Column 注解及其内部可定义的属性（参见列表\
  \ 4-6）。\n\n***列表 4-6.*** 实体中列的定义\n\nimport jakarta.persistence.Column;\n\nimport\
  \ jakarta.persistence.Entity;\n\nimport jakarta.persistence.Table;\n\n第 4 章 持久化与领域模型\n\
  \nimport jakarta.persistence.Id;\n\n@Entity //这向 JPA 表明这是一个具有持久化状态的对象\n\n@Table(name\
  \ = \"country\") //这是可选的\n\npublic class Country implements Serializable {\n\n@Id\n\
  \nprivate Long id;\n\n@Column(name = \"code\", nullable = false, length = 4)\n\n\
  private String code;\n\n@Column(name = \"name\", nullable = false, length = 30)\n\
  \n\n\nprivate String name;\n\n@Column(name = \"locale\", nullable = false, length\
  \ = 6)\n\nprivate String locale;\n\n@Column(name = \"time_zone\", nullable = false,\
  \ length = 10)\n\nprivate String timezone;\n\n@Column(name = \"enabled\", nullable\
  \ = false)\n\nprivate Boolean enabled = Boolean.TRUE;\n\n// 所有属性的属性、构造方法、setter\
  \ 和 getter 方法\n\n*// 重写 hashcode 和 equals 方法*\n\n}\n\n清单 4-6 揭示了以下内容。\n\n• 列的名称可以相同也可以不同；例如，表中的\
  \ timezone 属性声明方式就有所不同。\n\n• 如果要在列中声明默认值，可以像 enabled 属性在声明时赋值那样操作。另一种方法是使用 `columnDefinition`\
  \ 属性并指定默认值。\n\n第 4 章 持久化与领域模型\n\n***表 4-1.** 默认值的定义*\n\n**注解中的默认值**\n\n**属性中的默认值**\n\
  \n@Column(name = \"enabled\", @Column(name = \"enabled\", nullable = false, nullable\
  \ = false)\n\ncolumnDefinition = \"boolean default true\")\n\nprivate Boolean enabled\
  \ = private Boolean enabled;\n\nBoolean.TRUE;\n\n`@ColumnDefinition` 注解也能实现相同的功能，但它直接与\
  \ Hibernate 关联。我建议始终使用 JPA 提供的注解，因为如果未来 Spring Data JPA 使用了其他供应商，你的部分代码可能无法编译。\n\
  \n• `length` 属性仅对保存字符串的列有效。对于数值列，你可以使用与 Spring Validator 关联的注解来指示其支持的最小值和最大值。\n\n\
  • `nullable` 属性仅对基本类型的包装类有效。\n\n**提示** 如果需要声明某列具有唯一值，注解中有一个 `unique` 属性。默认情况下，该属性的值为\
  \ `false`，因此你需要显式声明该列是唯一的。例如，国家代码可以是唯一的，因为它明确且唯一地代表一个国家。目前，你暂不包含此属性，因为此案例用于演示如何对现有表进行修改。\n\
