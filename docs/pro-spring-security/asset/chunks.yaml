    基本 HTTP 认证

    有时，你无法真正使用登录表单来认证用户。例如，如果你的应用程序旨在被其他系统调用而非人类用户，那么向其他应用程序显示登录表单就没有意义。这是一个非常常见的用例。Web
    服务在没有用户交互的情况下相互通信，ESB 系统将系统彼此集成，JMS 客户端从其他系统生成和消费消息。

    在需要无需人类用户访问的 HTTP 暴露接口的上下文中，一种常见的方法是使用 HTTP 基本认证头。HTTP 认证头允许你将安全信息（用户名和密码）嵌入到发送给服务器的请求头中，而不是像登录表单认证那样将其发送在请求体中。

    HTTP 使用一个标准头来携带此信息。这个头被恰当地命名为 `Authorization`。使用此头时，发送请求的客户端（例如浏览器）将用户名和密码用冒号连接起来，然后对结果字符串进行
    Base64 编码，并将编码结果发送到头中。例如，如果你使用用户名 **neve** 和密码 **nardone**，客户端会创建字符串 `neve:nardone`，并在将其发送到头中之前对其进行编码。


    让我们在你的应用程序中使用基本 HTTP 认证。你需要做的第一件也是唯一一件事是移除配置文件 `SecurityConfiguration` 中的 `.formlogin()`
    元素，并添加


    ```

    .httpBasic()

    ```


    替换后，重启应用程序，在浏览器中访问 URL `http://localhost:8080/favoritesmovies/movies`。一个标准的 HTTP
    认证框会弹出，要求你输入认证详细信息，如图 5-12 所示。输入 **admin/admin123** 作为用户名和密码，然后发送请求。你将成功进入之前已经见过几次的电影页面（图
    5-5）。


    ![../images/310331_2_En_5_Chapter/310331_2_En_5_Fig12_HTML.jpg](img/310331_2_En_5_Fig12_HTML.jpg)


    图 5-12

    标准 HTTP 认证表单，基本认证配置


    当你使用 `httpBasic` 配置元素时，Spring `Security''s BasicAuthenticationFilter` 会开始工作。一个
    `BasicAuthenticationEntryPoint` 策略将在启动时被配置到 `ExceptionTranslationFilter` 中。当你第一次向
    URL `/movies` 发出请求时，框架的行为与之前相同，抛出一个由 `ExceptionTranslationFilter` 处理的访问拒绝异常。此过滤器委托给
    `AuthenticationEntryPoint` 的特定实现策略——在本例中是 `BasicAuthenticationEntryPoint`。`BasicAuthenticationEntryPoint`
    将头 `WWW-Authenticate: Basic realm="Spring Security Application"` 添加到响应中，然后向客户端发送
    HTTP 状态码 401（未授权）。客户端应该知道如何处理此代码并相应地进行操作。（在浏览器的情况下，它只是显示认证弹出窗口。）

    当你输入用户名和密码并提交请求时，请求再次沿着过滤器链进行，直到到达 `BasicAuthenticationFilter`。此过滤器检查请求头，查找以 `Basic`
    开头的 `Authorization` 头。过滤器提取头的内容，使用 `Base64.decode` 解码字符串，然后提取用户名和密码。过滤器创建一个 `UsernamePasswordAuthenticationToken`
    对象，并以标准方式将其发送给认证管理器进行认证。认证管理器将要求认证提供者检索用户，然后使用该用户创建一个 `Authentication` 对象。此过程是标准的，与使用基本认证还是表单认证无关。

