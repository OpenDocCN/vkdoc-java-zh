    \ the rest of the required user data from the datastore. It defines\njust one\
    \ method, as you can see in Listing [4-9](#310331_2_En_4_Chapter.xhtml#PC13).\
    \ You can see its\nhierarchy in Figure [4-20](#310331_2_En_4_Chapter.xhtml#Fig20).\n\
    \n![../images/310331_2_En_4_Chapter/310331_2_En_4_Fig20_HTML.jpg](images/310331_2_En_4_Chapter/310331_2_En_4_Fig20_HTML.jpg)\n\
    \nFigure 4-20\n`UserDetailsService`\nhierarchy\n\n```\npublic interface UserDetailsService\
    \ {\nUserDetails loadUserByUsername(String username) throws  UsernameNotFoundException;\n\
    }\nListing 4-9\nUserDetailsServicepackage org.springframework.security.core.userdetails\n\
    ```\n\nThe `interface org.springframework.security.core.userdetails.AuthenticationUserDetailsService`\n\
    is more generic. It allows you to retrieve a `UserDetails` using an\n`Authentication`\n\
    object instead of a `user name String,`\nmaking it more flexible to implement.\
    \ Actually, there is an\nimplementation of `AuthenticationUserDetailsService (UserDetailsByNameServiceWrapper)`\
    \ that simply delegates to a\n`UserDetailsService`\nextracting the `user name`\
    \ from the `Authentication`\nobject.\n\nListing [4-10](#310331_2_En_4_Chapter.xhtml#PC14)\
    \ shows the `AuthenticationUserDetailsService`\ninterface . These\nare the two\
    \ main strategies (`AuthenticationUserDetailsService and UserDetailsService`)\
    \ used for retrieving the user information\nwhen attempting authentication. They\
    \ are usually called from the\nparticular `AuthenticationProvider`\nthat is being\
    \ used in the application. For example, the `OpenIDAuthenticationProvider`\nand\
    \ `CasAuthenticationProvider`\ndelegate to an `AuthenticationUserDetailsService`\n\
    to obtain the user details, while the `DaoAuthenticationProvider`\ndelegates directly\
    \ to a `UserDetailsService`.\nSome other providers don’t use a user details service\
    \ of any kind (for\nexample, `JaasAuthenticationProvider`\nuses its own mechanism\
    \ to retrieve the principal from a `javax.security.auth.login.LoginContext`),\n\
    and some others use a completely custom one (for example, `LdapAuthenticationProvider`\n\
    uses a `UserDetailsContextMapper`).\n\n```\npackage org.springframework.security.core.userdetails;\n\
    public interface AuthenticationUserDetailsService {\nUserDetails loadUserDetails(T\
    \ token) throws UsernameNotFoundException;\n}\nListing 4-10\nAuthenticationUserDetailsService\n\
    ```\n\nUserDetails\nThe interface `org.springframework.security.core.userdetails.UserDetails`\n\
    object is the main abstraction in the system, and it’s used to represent\na full\
    \ user in the context of Spring Security. It is also made available\nto be accessed\
    \ later in the system from any point that has access to\n`SecurityContext`.\n\
    Normally, developers create their own implementation of this interface\nto store\
    \ particular user details they need or want (like email,\ntelephone, address,\
    \ and so on). Later, they can access this information,\nwhich will be encapsulated\
    \ in the `Authentication object`, and they can be obtained by calling the `getPrincipal`\
    \ method\non it.\n\nSome of the current `UserDetailsService`\n(for example, `InMemoryUserDetailsManager`)\n\
    implementations use the class `org.springframework.security.core.userdetails.User`,\n\
    `which is`\navailable in the core of the framework, as the `UserDetails`\nimplementation\
    \ returned by the method `loadUserByUsername`.\nHowever, this is another of those\
    \ configurable points of the framework,\nand you can easily create your own `UserDetails\
    \ implementation` and use that in your application. Listing [4-11](#310331_2_En_4_Chapter.xhtml#PC15)\
    \ shows the `UserDetails`\ninterface.\n\n```\npackage org.springframework.security.core.userdetails;\n\
    import org.springframework.security.core.Authentication;\nimport org.springframework.security.core.GrantedAuthority;\n\
    import java.io.Serializable;\nimport java.util.Collection;\npublic interface UserDetails\
    \ extends Serializable {\nCollection getAuthorities();\nString getPassword();\n\
    String getUsername();\nboolean isAccountNonExpired();\nboolean isAccountNonLocked();\n\
    boolean isCredentialsNonExpired();\nboolean isEnabled();\n}\nListing 4-11\nUserDetails\
    \ Interface\n```"
  trans: "\n*   `org.springframework.security.access.vote.AbstractAclVoter`：\n   \
    \ 这是一个抽象类，提供了编写处理领域 ACL 规则的投票器的基本框架，以便其他实现类在其功能基础上添加投票行为。目前，它由`AclEntryVoter`实现，该投票器对用户在领域对象上的权限进行投票。本章节将在专门讨论\
    \ ACL 的部分中介绍此投票器。\n\n*   `org.springframework.security.access.vote.AuthenticatedVoter`：\n\
    \    当受保护资源上存在引用三种认证级别中*任意*一种的`ConfigAttribute`时，此投票器就会进行投票。这三种级别分别是`IS_AUTHENTICATED_FULLY`、`IS_AUTHENTICATED_REMEMBERED`和`IS_AUTHENTICATED_ANONYMOUSLY`。如果`Authentication`对象的认证级别与资源中配置的认证级别匹配（或处于更高级别，层级关系为`IS_AUTHENTICATED_FULLY\
    \ > IS_AUTHENTICATED_REMEMBERED > IS_AUTHENTICATED_ANONYMOUSLY`），则投票器投赞成票。\n\n\
    *   `org.springframework.security.access.vote.RoleVoter`：\n    这可能是所有投票器中最常用的一个。默认情况下，此投票器能够对包含以`ROLE_`前缀开头（该前缀可被覆盖）的安全元数据的`ConfigAttribute`的资源进行投票。当`Authentication`对象尝试访问资源时，其`GrantedAuthorities`会与相关的`ConfigAttributes`进行匹配。如果匹配成功，则授予访问权限；否则，拒绝访问。\n\
    \n*   `org.springframework.security.access.expression.WebExpressionVoter`：\n \
    \   此投票器负责评估过滤器链中 Web 请求上下文内的 SpEL 表达式——例如`<intercept-url>`元素中的`'hasRole'`表达式。要使用此投票器，并且通常为了在\
    \ Web 安全中支持 SpEL 表达式，需要在`<http>`元素中添加`the use-expressions=\"true\"`属性。\n\n投票器模型是框架中另一个支持扩展和定制的点。您可以轻松创建自己的实现并将其添加到框架中。您将在第\
    \ 8 章中了解如何操作。\n\n完整的`AccessDecisionVoter`参考文档可在 GitHub 上找到：[`https://github.com/spring-projects/spring-security/blob/master/core/src/main/java/org/springframework/security/access/AccessDecisionVoter.java`](https://github.com/spring-projects/spring-security/blob/master/core/src/main/java/org/springframework/security/access/AccessDecisionVoter.java)。\n\
    \n```\npackage org.springframework.security.access;\nimport java.util.Collection;\n\
    import org.springframework.security.core.Authentication;\npublic interface AccessDecisionVoter\
    \ {\nint ACCESS_GRANTED = 1;\nint ACCESS_ABSTAIN = 0;\nint ACCESS_DENIED = -1;\n\
    boolean supports(ConfigAttribute attribute);\nboolean supports(Class clazz);\n\
    int vote(Authentication authentication, S object, Collection attributes);\n}\n\
    Listing. 4-8\nAccessDecisionVoter Interface\n```\n\nUserDetailsService 和 AuthenticationUserDetailsService\n\
    \n接口`org.springframework.security.core.userdetails.UserDetailsService`负责在认证请求到达应用程序时，从底层用户存储（如内存、数据库等）加载用户信息。`UserDetailsService`利用提供的`user\
    \ name`从数据存储中查找其余所需的用户数据。如清单 4-9 所示，它只定义了一个方法。您可以在图 4-20 中查看其层次结构。\n\n![../images/310331_2_En_4_Chapter/310331_2_En_4_Fig20_HTML.jpg](img/310331_2_En_4_Fig20_HTML.jpg)\n\
    \n图 4-20\n`UserDetailsService`\n层次结构\n\n```\npublic interface UserDetailsService\
    \ {\nUserDetails loadUserByUsername(String username) throws  UsernameNotFoundException;\n\
    }\nListing 4-9\nUserDetailsServicepackage org.springframework.security.core.userdetails\n\
    ```\n\n接口`org.springframework.security.core.userdetails.AuthenticationUserDetailsService`更为通用。它允许您使用`Authentication`对象（而不是`user\
    \ name String`）来检索`UserDetails`，这使得实现更加灵活。实际上，有一个`AuthenticationUserDetailsService`的实现（`UserDetailsByNameServiceWrapper`），它简单地委托给一个`UserDetailsService`，从`Authentication`对象中提取`user\
    \ name`。\n\n清单 4-10 展示了`AuthenticationUserDetailsService`接口。这是在尝试认证时用于检索用户信息的两种主要策略（`AuthenticationUserDetailsService`和`UserDetailsService`）。它们通常由应用程序中使用的特定`AuthenticationProvider`调用。例如，`OpenIDAuthenticationProvider`和`CasAuthenticationProvider`委托给`AuthenticationUserDetailsService`来获取用户详细信息，而`DaoAuthenticationProvider`则直接委托给`UserDetailsService`。其他一些提供者不使用任何类型的用户详细信息服务（例如，`JaasAuthenticationProvider`使用自己的机制从`javax.security.auth.login.LoginContext`检索主体），还有一些则使用完全自定义的服务（例如，`LdapAuthenticationProvider`使用`UserDetailsContextMapper`）。\n\
    \n```\npackage org.springframework.security.core.userdetails;\npublic interface\
    \ AuthenticationUserDetailsService {\nUserDetails loadUserDetails(T token) throws\
    \ UsernameNotFoundException;\n}\nListing 4-10\nAuthenticationUserDetailsService\n\
    ```\n\nUserDetails\n接口`org.springframework.security.core.userdetails.UserDetails`对象是系统中的主要抽象，用于在\
    \ Spring Security 上下文中表示一个完整的用户。它也可以在系统中任何可以访问`SecurityContext`的地方被后续访问。通常，开发人员会创建此接口的自定义实现，以存储他们需要或想要的特定用户详细信息（如电子邮件、电话、地址等）。之后，他们可以访问这些信息，这些信息将被封装在`Authentication\
    \ object`中，并通过调用其`getPrincipal`方法获得。\n\n一些现有的`UserDetailsService`实现（例如`InMemoryUserDetailsManager`）使用框架核心中可用的类`org.springframework.security.core.userdetails.User`作为`loadUserByUsername`方法返回的`UserDetails`实现。然而，这是框架另一个可配置的点，您可以轻松创建自己的`UserDetails\
    \ implementation`并在应用程序中使用它。清单 4-11 展示了`UserDetails`接口。\n\n```\npackage org.springframework.security.core.userdetails;\n\
    import org.springframework.security.core.Authentication;\nimport org.springframework.security.core.GrantedAuthority;\n\
    import java.io.Serializable;\nimport java.util.Collection;\npublic interface UserDetails\
    \ extends Serializable {\nCollection getAuthorities();\nString getPassword();\n\
    String getUsername();\nboolean isAccountNonExpired();\nboolean isAccountNonLocked();\n\
    boolean isCredentialsNonExpired();\nboolean isEnabled();\n}\nListing 4-11\nUserDetails\
    \ Interface\n```\n"
- fmt: '# ACL


    The `ACL` is the module in charge of securing your application at the individual
    domain object level with a fine level of granularity. This means, in a general
    way, assigning an ID to each domain object in your application and creating a
    relationship between these objects and the different users of the application.
    These relationships determine whether or not a determined user is allowed access
    to a particular domain. The `ACL` model offers a fine-grained, access-level configuration
    you can use to define different rules for accessing the objects depending on who
    is trying to access it. (For example, a user might be allowed read access while
    another user will have write/read access over the same domain object.)


    The current support for `ACL`s is configured to get the configuration rules from
    a relational database. The DDL (Data Definition Language) for configuring the
    database comes along with the framework itself, and it can be found in the `ACL`
    module.


    `ACL` security will be fully covered in Chapter [7](#310331_2_En_7_Chapter.xhtml).


    # JSP Taglib


    If you are working to secure a Java web application, the `taglib` component of
    the framework is the one you use to hide or show certain elements in your pages
    according to your users’ permissions. The tags are simple to use and, at the same
    time, very convenient for making a more usable web site. They help you adapt the
    UI of your application on a per-user (or more commonly, per-role) basis.


    # Good Design and Patterns in Spring Security


    We said it before, but we will repeat it here: One of the great aspects of working
    with open source software is that you can (and we say *you should*) look at the
    source code and understand the software at a new, deeper level. Also, you can
    look at the way the software is built, what is good, and what is bad (at least
    by your own subjective standards) and just learn how other developers work. This
    can have a great impact on the way you work, because you might discover a way
    of doing things that you couldn’t have learned on your own.


    The code for Spring Security is publicly available on GitHub at [`https://github.com/spring-projects/spring-security`](https://github.com/spring-projects/spring-security).
    Sometimes, of course, you will find things you don’t like, but that is good as
    well. You can learn from other people’s mistakes as much as you can learn from
    their successes.


    For us, Spring in general and Spring Security in particular have achieved something
    that we found invaluable in the Java development space—that is, they can make
    us better developers even without us noticing it. For instance, we often ask ourselves,
    “How many people would be using a template pattern for accessing databases if
    they weren’t using Spring, instead of a more awkward DB access layer?” or “How
    many people would be just programming against implementation classes all the time,
    creating unnecessary coupling if it wasn’t for Spring’s DI support?” or “How many
    people would have cross-cutting concerns, like transactions, all over their code
    base if it wasn’t for how easily Spring brings AOP into the development process?”


    We think helping good practices almost without noticing is really a great achievement
    of Spring. It won’t create great developers by itself for sure, but it helps the
    average developer to not make mistakes that they might make if they didn’t have
    the support of the framework and its principles to adhere to.


    As you might see from the description of the main components of the framework,
    Spring Security itself is built with good design principles and patterns in mind.
    Let’s have a brief look here at some of the things we find interesting in the
    framework, and from which you can learn. This section won’t really help you to
    do more with Spring Security, but it will serve as a way to appreciate the good
    work that has been done in constructing this fantastic framework.


    ## Strategy Pattern


    A big part of the pluggability and modularity of the framework is achieved thanks
    to the wide use of the Strategy pattern. You can find it, for example, in the
    type of `SecurityContext` to be used, the `AuthenticationProvider` hierarchy,
    the `AccessDecisionVoters`, and many other elements. Covering design patterns
    is outside the scope of this book but as a reminder of the strategy pattern’s
    power, we leave you with this definition from Wikipedia: “The strategy pattern
    defines a family of algorithms, encapsulates each one, and makes them interchangeable.
    Strategy lets the algorithm vary independently from clients that use it.”


    That definition shows a great deal of the power that comes with working with interfaces.
    You can have different implementations of the same interface and pass any of them
    to a client class for doing different kinds of work. The client classes don’t
    need to know or care about the implementation details they are working with. Knowing
    the interface or contract is enough to leverage its job.


    ## Decorator Pattern


    Built into Spring’s core AOP framework, you can find the Decorator pattern—mostly
    in the way that your annotated business classes and methods get security constraints
    applied to them. Basically, your objects have only certain meta information related
    to the security constraints that should be applied to them, and then by some “Spring
    magic” they get wrapped with security handling. Listing [4-12](#310331_2_En_4_Chapter.xhtml#PC16)
    shows the `invoke` method of `MethodSecurityInterceptor`.


    In the listing, you can see how the objects are decorated with prefunctionality
    and postfunctionality that surrounds the invocation of the actual method.


    ```

    public Object invoke(MethodInvocation mi) throws Throwable {

    InterceptorStatusToken token = super.beforeInvocation(mi);

    Object result = mi.proceed();

    returnsuper.afterInvocation(token, result);

    }

    Listing 4-12

    MethodSecurityInterceptor’s Invoke Method

    ```


    ## SRP


    Spring Security’s code seems to take very seriously the Single Responsibility
    Principle. There are many examples of it around the framework, because any object
    you choose seems to have one and only one responsibility. For example, the `AuthenticationProvider`
    deals only with the general concern of authenticating a principal with its credentials
    in the system. The `SecurityInterceptor` is simply in charge of intercepting the
    requests, and it delegates all security-checking logic to collaborating objects.
    A lot more examples like this can be extracted from the framework.


    ## DI


    Again, this is built into the Spring Framework itself, and of course as everything
    in the Spring architecture, this means that it is also inherited by the rest of
    the Spring projects, including Spring Security. Dependency injection (DI) is one
    of Spring’s most important features. Almost every component in Spring Security
    is configured through the use of dependency injection. The `AccessDecisionManager`
    is injected into the `AbstractSecurityInterceptor`, and `AccessDecisionVoter`
    implementations are injected into the `AccessDecisionManager`. And like this,
    most of the framework is built by composing components together through dependency
    injection.'
