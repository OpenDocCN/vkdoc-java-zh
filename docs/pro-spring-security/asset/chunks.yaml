    ## `UserDetails`


    接口`org.springframework.security.core.userdetails.UserDetails`对象是系统中的主要抽象，用于在Spring
    Security上下文中表示一个完整的用户。它也可以在系统中任何可以访问`SecurityContext`的地方被后续访问。通常，开发人员会创建此接口的自定义实现，以存储他们需要或想要的特定用户详细信息（如电子邮件、电话、地址等）。之后，他们可以访问这些信息，这些信息将封装在`Authentication
    object`中，并且可以通过调用其上的`getPrincipal`方法来获取。


    一些当前的`UserDetailsService`实现（例如`InMemoryUserDetailsManager`）使用框架核心中可用的类`org.springframework.security.core.userdetails.User`作为`loadUserByUsername`方法返回的`UserDetails`实现。然而，这是框架的另一个可配置点，您可以轻松创建自己的`UserDetails
    implementation`并在应用程序中使用它。清单[4-11]显示了`UserDetails`接口。


    ```

    package org.springframework.security.core.userdetails;

    import org.springframework.security.core.Authentication;

    import org.springframework.security.core.GrantedAuthority;

    import java.io.Serializable;

    import java.util.Collection;

    public interface UserDetails extends Serializable {

    Collection getAuthorities();

    String getPassword();

    String getUsername();

    boolean isAccountNonExpired();

    boolean isAccountNonLocked();

    boolean isCredentialsNonExpired();

    boolean isEnabled();

    }

