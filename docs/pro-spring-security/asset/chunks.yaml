- fmt: 'Navigate to [`https://start.spring.io/`](https://start.spring.io/) and use
    the Spring Initializr web-based Spring project generator to create the Spring
    Boot Maven project named `SpringSecurityMongoDB`, as shown in Figure [8-5](#310331_2_En_8_Chapter.xhtml#Fig5).


    ![../images/310331_2_En_8_Chapter/310331_2_En_8_Fig5_HTML.jpg](images/310331_2_En_8_Chapter/310331_2_En_8_Fig5_HTML.jpg)


    **Figure 8-5** Generate a Maven project using the Initializr web-based Spring
    project generator


    Select a Java v11 Maven project, using 2.1.4 Spring Boot version, and add the
    following dependencies: Web, Security, Thymeleaf, and MongoDB. Fill in all of
    the required information and then click to generate the project. A project `.zip`
    file will be automatically generated. Download and unzip the file on your machine.


    When opening the project with IntelliJ IDEA 2019, it will look Figure [8-6](#310331_2_En_8_Chapter.xhtml#Fig6).


    ![../images/310331_2_En_8_Chapter/310331_2_En_8_Fig6_HTML.jpg](images/310331_2_En_8_Chapter/310331_2_En_8_Fig6_HTML.jpg)


