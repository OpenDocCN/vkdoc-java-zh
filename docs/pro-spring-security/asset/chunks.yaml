    Listing 6-6 `spring-security.xml` That Uses a Database-Driven `UserDetailsService`


    In Listing 6-6, you can see that you are using the namespace `<jdbc:>` to define
    a new embedded datasource through the element `<embedded-database>`. Embedded
    datasources are a new feature introduced in Spring 3.0. You can use them to define
    different kinds of embedded datasources (basically, in-memory datasources that
    run within the Java process where they are used), such as HSQL and Derby. HSQL
    is the default. You can also see here that in the tag you are also allowed to
    specify SQL script locations you want to execute when the datasource is started
    up. The scripts execute in sequential order from the top down; in this example,
    `security-schema.sql` is executed first, and then `users.sql` is executed. The
    SQL files specified here allow you to create a simple database schema to support
    the configuration of users and authorities the way we defined them in the previous
    section. Using this embedded datasource is very convenient for examples of this
    type and for unit testing your application, but most likely you won’t use them
    in production environments. For production environments, you will use full database
    solutions, such as MySQL, PostgreSQL, Oracle, and others.


    Listing 6-7 shows the `spring-servlet.xml` file, which did not change.


    ```xml


