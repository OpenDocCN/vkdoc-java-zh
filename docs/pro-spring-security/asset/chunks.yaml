    Listing 4-1 `AbstractSecurityInterceptor`\n\nThe Security Interceptor lies at\
    \ the core of the Spring Security framework. Every call to a secured resource\
    \ in Spring Security passes through this interceptor. The `AbstractSecurityInterceptor`\
    \ shows its versatility when you realize that two not-very-related kinds of resources\
    \ (URL endpoints and methods) leverage most of the functionality of this abstract\
    \ interceptor. This, once again, shows the effort put into the design and implementation\
