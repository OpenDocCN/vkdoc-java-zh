  raw: "One of Spring Security’s strongest points is that you can plug\ndifferent\
    \ authentication mechanisms into the framework. Spring Security\nwas built to\
    \ create, as much as possible, a pluggable architecture\nmodel, where different\
    \ things can be plugged into the framework in an\neasy and unobtrusive way. In\
    \ the authentication layer, this means that\nan abstraction exists that takes\
    \ care of this part of the security\nprocess. This abstraction comes in the form,\
    \ mainly, of the `AuthenticationProvider`\ninterface, but it is also supported\
    \ by specific security servlet filters\nand user details services.\n\nSpring Security\
    \ v5 supports many different authentication mechanisms\nincluding:\n\n*   Database\n\
    \n*   LDAP\n\n*   X.509\n\n*   OAuth 2/OpenID\n\n*   WebSockets\n\n*   JSON Web\
    \ Token (JWT)\n\n*   JAAS\n\n*   CAS\n\nMost of this chapter deals with explaining\
    \ how each of these\nauthentication systems work, independently of Spring Security.\
    \ Although\nit will give you certain key details, it won’t be an in-depth\nexplanation.\
    \ Of course, you will see how Spring Security implements each\nof these authentication\
    \ mechanisms, and you will see that they have many\nthings in common when it comes\
    \ to the parts of Spring Security they use.\nIn this chapter, only examples about\
    \ database, LDAP and X.509\nauthentication will be provided while OAuth2, JAAS,\
    \ and CAS will just be\nintroduced.\n\nDatabase-Provided Authentication\nDatabase-provided\
    \ authentication works almost exactly the same way as\nwith the memory-provided\
    \ authentication users. The only\ndifference is that the users are stored in the\
    \ database and not in\nmemory. This happens at runtime when you define them in\
    \ the application\ncontext configuration file.\nWhen you use database-authentication\
    \ mechanisms, the `AuthenticationProvider`\nimplementation doesn’t need to change\
    \ at all; it’s still the `DaoAuthenticationProvider`\nyou used for the in-memory\
    \ user authentication. As you may remember,\nthis `AuthenticationProvider`\nimplementation\
    \ is based on using a `UserDetailsService`\nabstraction to retrieve the users,\
    \ so the difference here is the `UserDetailsService`\nimplementation you will\
    \ use.\nConfiguring the provisioning of users from the database is pretty\nsimple,\
    \ as you will see.\nStart by downloading and unzipping the HyperSQL Database Engine\n\
    (HSQLDB) `.zip` file from [`https://sourceforge.net/projects/hsqldb/postdownload`](https://sourceforge.net/projects/hsqldb/postdownload).\n\
    In your case, you will install the file `hsqldb-2.4.1.zip` to\n`c:\\hsqldb-2.4.1`.\n\
    In this chapter, you will use IntelliJ IDEA 2019 as an\nIDE tool. You can download\
    \ it form [`https://blog.jetbrains.com/idea/tag/intellij-idea-2019-1/`](https://blog.jetbrains.com/idea/tag/intellij-idea-2019-1/).\n\
    \nYou can configure the HSQLDB as shown in Figure [6-1](#310331_2_En_6_Chapter.xhtml#Fig1).\n\
    \n![../images/310331_2_En_6_Chapter/310331_2_En_6_Fig1_HTML.jpg](images/310331_2_En_6_Chapter/310331_2_En_6_Fig1_HTML.jpg)\n\
    \nFigure 6-1\nConfiguring hsqldb-2.4.1\n\nLater, when running the HSQLDB SQL page,\
    \ the result will look like\nFigure [6-2](#310331_2_En_6_Chapter.xhtml#Fig2).\n\
    \n![../images/310331_2_En_6_Chapter/310331_2_En_6_Fig2_HTML.jpg](images/310331_2_En_6_Chapter/310331_2_En_6_Fig2_HTML.jpg)\n\
    \nFigure 6-2\nRunning HSQLDB SQL scripts\n\nOk now HSQLDB is ready to be used.\n\
    \nThe first thing you do is define the database schema you need in order\nto make\
    \ the authentication mechanism work. The tables you need to make\nthe authentication\
    \ work are shown in Figure [6-3](#310331_2_En_6_Chapter.xhtml#Fig3).\n\n![../images/310331_2_En_6_Chapter/310331_2_En_6_Fig3_HTML.jpg](images/310331_2_En_6_Chapter/310331_2_En_6_Fig3_HTML.jpg)\n\
    \nFigure 6-3\nSimple DB schema\nneeded to support database authentication\n\n\
    Figure [6-3](#310331_2_En_6_Chapter.xhtml#Fig3) shows a simple\nschema model for\
    \ supporting authentication backed by a database. Just by\nlooking at the tables,\
    \ you should be able to see how they work. It is\nbasically a one-to-one mapping\
    \ from the in-memory implementation you\nhave been using so far. In the `USER`\
    \ table, you store\nthe user details—mainly, the username and the password. In\
    \ the `AUTHORITIES` table,\nyou store the relationship between the usernames and\
    \ the granted\nauthorities for that member—for example, `ROLE_MEMBER`.\n\nFigure\
    \ [6-4](#310331_2_En_6_Chapter.xhtml#Fig4) shows an\nextended default option you\
    \ can use to define groups and establish\nauthorities related to those groups\
    \ instead of to individual users.\n\n![../images/310331_2_En_6_Chapter/310331_2_En_6_Fig4_HTML.jpg](images/310331_2_En_6_Chapter/310331_2_En_6_Fig4_HTML.jpg)\n\
    \nFigure 6-4\nDatabase-backed authentication scheme with groups\n\nFigure [6-4](#310331_2_En_6_Chapter.xhtml#Fig4)\
    \ is a bit more\ncomplex than Figure [6-3](#310331_2_En_6_Chapter.xhtml#Fig3);\
    \ however, it is\nstill very straightforward. This time, the schema allows you\
    \ to create\nnamed groups and establish authorities belonging to these groups.\
    \ At the\nsame time, users now can belong to groups as well, meaning that users\n\
    can inherit the authorities defined for the groups to which they belong.\nFor\
    \ example, if there is a group named Administrators in the `GROUPS` table and\n\
    there are two authorities (`ROLE_ADMIN` and `ROLE_USER)` defined in\nthe `GROUP_AUTHORITIES`\n\
    table that map to the group Administrators, then a member belonging to\ngroup\
    \ Administrators (which exists in the table `GROUP_MEMBERS`) will\nhave the authorities\
    \ `ROLE_ADMIN` and `ROLE_USER` inherited\nfrom the group.\nBy default, the group\
    \ mechanism is not activated in `UserDetailsService`\n. To activate it, you need\
    \ to configure a `groupAuthoritiesByUsernameQuery`\nattribute in the corresponding\
    \ `<jdbc-user-service>`\nin the configuration file, as you will see later in the\
    \ example.\n\nNote\nFor this example project and the rest of the examples in this\n\
    chapter, unless otherwise noted, you will start with an application\nconfigured\
    \ as follows.\n\n1.  Use the example you created in Chapter [3](#310331_2_En_3_Chapter.xhtml).\n\
    \n2.  Updated the `web.xml` file with the\n    one in Listing [6-1](#310331_2_En_6_Chapter.xhtml#PC1).\n\
    \n3.  Update `spring-security.xml`\n    with the contents of Listing [6-2](#310331_2_En_6_Chapter.xhtml#PC2)\
    \ in the generated\n    `WEB-INF`\n    folder.\n\n4.  Update the servlet in the\
    \ package `com.apress.pss.servlets`\n    with the contents from Listing [6-3](#310331_2_En_6_Chapter.xhtml#PC3).\n\
    \n5.  Update `pom.xml` as shown in\n    Listing [6-4](#310331_2_En_6_Chapter.xhtml#PC4).\n\
