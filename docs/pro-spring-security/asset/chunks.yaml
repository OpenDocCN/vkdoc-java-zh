    `demo` 应用程序的 `config` 目录中。然后编辑该文件，使其看起来像清单 9-19 所示。通过这样做，你将 Spring Security 配置包含在了
    `web.xml` 文件中，就像在前几章中所做的那样。

    接下来，将清单 9-20 中的 `applicationContext-security.xml` 文件复制到 demo 应用程序的根目录。这里有你熟悉的第
    2 章中的 Spring Security 配置，但做了一些修改。你只是为 Scarvarez 家族的成员保护了 URL `/admin/*`。

    然后你需要编辑 warbler 的配置文件。为此，在应用程序的根目录下执行命令 `jruby –S warble config`。该执行会在应用程序的 `config`
    目录内生成一个 `warble.rb` 文件。确保该文件看起来像清单 9-21 所示。在该文件中，你确保了 JRuby 与 Ruby 1.9 兼容，并且当
    warbler 构建 `WAR` 文件时，Spring 配置文件会被包含在生成的 `WAR` 文件的 `WEB-INF` 目录中。

    这就是你需要做的全部工作，现在让我们再次创建 `WAR` 文件。从应用程序的根目录执行 `JRUBY_OPTS=--1.9 warble`。此命令在 Windows
    上不起作用。你应该只执行 `warble`，并单独设置 `JRUBY_OPTS` 变量。这会生成包含 Rails 应用程序的 `WAR` 文件。将其部署到你的
    Web 应用服务器上（我们将其部署到了 Tomcat 9）。

