  trans: '

    ## 需要保护的内容


    并非应用程序的每个部分都需要强大的安全模型，甚至根本不需要任何安全措施。例如，如果你的应用程序某部分旨在为所有感兴趣的用户提供静态内容，那么直接提供这些内容即可。这里可能没有任何需要处理的安全问题。


    不过，在开始开发一个新应用时，你应该思考该应用将面临的安全约束。你需要考虑以下列表中的问题，并判断它们是否适用于你的特定用例：


    *   **身份管理**：你的应用程序很可能需要为使用它的不同用户建立身份。通常，应用程序会为不同用户提供不同功能，因此你需要一种方法将用户与特定功能关联起来。同时，你还必须确保保护每个用户的身份信息，使其不被泄露。


    *   **安全连接**：在互联网环境中，世界上任何人都可能访问你的系统，并窃听其他用户访问你系统的行为。因此，你很可能需要使用某种传输层安全协议（如 SSL）来保护敏感数据的通信。


    *   **敏感数据保护**：敏感数据需要受到保护，以防恶意攻击。这适用于通信层、单个消息传输以及凭证数据存储。应在不同层面使用加密技术，以实现尽可能安全的应用程序。


    ## 更多安全问题


    除了上述问题，还有许多其他安全问题。由于这是一本关于 Spring Security 的书，而非通用的应用安全书籍，我们将只涵盖与 Spring Security
    相关的内容。但我们认为，让你明白除了 Spring Security 直接解决的问题之外，还存在更多安全问题，这一点很重要。以下是一些最常见问题的快速概述。这仅旨在让你意识到它们的存在，我们建议你查阅其他资料（例如通用的软件安全教科书），以更好地理解所有这些安全问题。


    *   **SQL（及其他代码）注入**：验证用户输入是应用安全中非常重要的一部分。如果数据未经验证，攻击者可能会将任意字符串作为输入（包括 SQL 或服务器端代码）并发送到服务器。如果服务器代码编写不当，攻击者可能会造成严重破坏，因为她可以在服务器上执行任意代码。


    *   **拒绝服务攻击**：此类攻击旨在使目标系统对其预期用户无响应。通常通过向服务器发送大量请求来耗尽服务器所有资源，使其无法响应合法请求。


    *   **跨站脚本攻击与输出清理**：这是一种以应用程序客户端部分为目标的注入方式。其思路是攻击者可以使应用程序在返回的网页中包含恶意代码，从而在用户浏览器中执行该代码。这样，攻击者就可以利用真实用户的已认证会话，在用户不知情的情况下执行操作。


    ## Java 安全选项


    Java 和 Java EE 开箱即用的安全解决方案非常全面。它们涵盖了从底层权限系统、加密 API 到身份验证和授权方案等多个领域。


    Java 提供的安全 API 列表非常广泛，以下列出了主要的几个：


    *   **Java 加密体系结构 (JCA)**：此 API 提供对加密算法的支持，包括哈希摘要和数字签名支持。


    *   **Java 加密扩展 (JCE)**：此 API 主要提供字符串加密和解密的功能，以及为对称算法生成密钥的功能。


    *   **Java 证书路径 API (CertPath)**：此 API 提供了全面的功能，用于将数字证书的验证和校验集成到应用程序中。


    *   **Java 安全套接字扩展 (JSSE)**：此 API 提供了一套标准化的功能，用于在 Java 中支持客户端和服务器端的 SSL 和 TLS
    协议。


    *   **Java 身份验证和授权服务 (JAAS)**：此 API 为 Java 应用程序提供身份验证和授权服务。它提供了一个可插拔的系统，身份验证机制可以独立地插入到应用程序中。


    请参考此链接获取 Java 11 安全 API 的完整列表：[`https://docs.oracle.com/en/java/javase/11/security/java-security-overview1.html#GUID-2EF0B3B8-9F3A-41CF-A7DA-63DB52180084`](https://docs.oracle.com/en/java/javase/11/security/java-security-overview1.html%2523GUID-2EF0B3B8-9F3A-41CF-A7DA-63DB52180084)。


    图 1-7 展示了 Java 平台安全架构和元素。


    ![../images/310331_2_En_1_Chapter/310331_2_En_1_Fig7_HTML.jpg](img/310331_2_En_1_Fig7_HTML.jpg)


    图 1-7


    Java 平台安全架构和元素


    Spring Security 的主要关注点在于身份验证/授权领域。因此，它主要与 JAAS Java API 重叠，尽管它们可以一起使用，正如你将在本书后面看到的那样。Spring
    Security 中利用了大多数其他 API。例如，`CertPath` 用于 `X509AuthenticationFilter`，`JCE` 用于 `spring-security-crypto`
    模块。


    ## 总结


    在本章中，我们从一般安全角度出发，深入介绍了纵深防御 (DiD) 及其机制。我们以非常抽象的方式解释了 IT 安全中的主要关注点，特别是从应用程序的角度。我们还非常简要地描述了在不同层面支持安全性的主要
    Java API。


    你可以看到，本章是对安全问题的一个非常快速的概述。在通用主题上深入探讨超出了本书的范围，尽管当某些主题适用于 Spring Security 时，我们会更深入地研究它们。显然，这并非一本全面的软件安全指南，如果你有兴趣了解更多关于软件安全的一般知识，应查阅专业文献。下一章将正式介绍
    Spring Security。


    脚注 1


    # 2.  Spring Security 简介


    在本章中，你将了解什么是 Spring Security，以及如何使用它来解决应用程序的安全问题。


    我们还将描述 Spring Framework 和 Spring Security 5 版本中的新特性。由于本书将大量使用 Spring Security
    5 进行身份验证和授权，因此我们将更详细地介绍如何使用它。


    最后，我们将查看框架的源代码，了解如何构建它，以及构成强大 Spring Security 项目的不同模块。'
- fmt: '# What Is Spring Security?


    `Spring Security` is a framework dedicated to providing a full array of security
    services to Java applications in a developer-friendly and flexible way. It adheres
    to the well-established practices introduced by the `Spring Framework`. `Spring
    Security` tries to address all the layers of security inside your application.
    In addition, it comes packed with an extensive array of configuration options
    that make it very flexible and powerful.


    Recall from Chapter [1](#310331_2_En_1_Chapter.xhtml) that it can be said that
    `Spring Security` is simply a comprehensive authentication/authorization framework
    built on top of the `Spring Framework`. Although the majority of applications
    that use the framework are web-based, `Spring Security`’s core can also be used
    in standalone applications.


    Many things make `Spring Security` immediately attractive to Java developers.
    To name just a few, consider the following list:


    - **It’s built on top of the successful `Spring Framework`.** This is an important
    strength of `Spring Security`. The `Spring Framework` has become “the way” to
    build enterprise Java applications, and with good reason. It is built around good
    practices and two simple yet powerful concepts: dependency injection (DI) and
    aspect-oriented programming (AOP). Also important is that many developers have
    experience with Spring, so they can leverage that experience when introducing
    `Spring Security` in their projects.


    - **It provides out-of-the-box support for many authentication models.** Even
    more important than the previous point, `Spring Security` supports out-of-the-box
    integration with Lightweight Directory Access Protocol (LDAP), OpenID, form authentication,
    Certificate X.509 authentication, database authentication, Jasypt cryptography,
    and lots more. All this support means that `Spring Security` adapts to your security
    needs—and not only that, it can change if your needs change, without much effort
    involved for the developer. More info about Jasypt cryptography can be found at
    [`www.jasypt.org/`](http://www.jasypt.org/).


    This is important from a business point of view as well because the application
    can either adapt to the corporate authentication services or implement its own,
    thus requiring only straightforward configuration changes.


    This also means that there is a lot less software for you to write, because you
    are making use of a great amount of ready-to-use code that has been written and
    tested by a large and active user community. You can, to a certain point, trust
    that this code works and use it with confidence. And if it does not work, you
    can always fix it and send a patch to those in charge of maintaining the project.


    - **It offers layered security services.** `Spring Security` allows you to secure
    your application at different levels, and to secure your web URLs, views, service
    methods, and domain model. You can pick and combine these features to achieve
    your security goals.


    This is really flexible in practice. Imagine, for instance, that you offer services
    exposed through RMI, the Web, JMS, and others. You could secure all of these interfaces,
    but maybe it’s better to secure just the business layer so that all requests are
    secured when they reach this layer. Also, maybe you don’t care about securing
    individual business objects, so you can omit that module and use just the functionality
    you need.


    - **It is open source software.** As part of the Pivotal portfolio, `Spring Security`
    is an open source software tool. It also has a large community and user base dedicated
    to testing and improving the framework. Having the opportunity to work with open
    source software is an attractive feature for most developers. The ability to look
    into the source code of the tools you like and work with is an exciting prospect.
    Whether our goal is to improve the tools or simply to understand how they work
    internally, we developers love to read code and learn from it.


    # Where Does Spring Security Fit In?


    `Spring Security` is without question a powerful and versatile tool. But like
    anything else, it is not a tool that adapts to everything you want to do. Its
    offerings have a defined scope.


    Where and why would you use `Spring Security`? Here is a list of reasons and scenarios:


    - **Your application is in Java, Groovy, or Kotlin.** The first thing to take
    into account is that `Spring Security` can be written in languages like Java,
    Groovy, or Kotlin and generally in any language supported by the JVM. So if you
    plan to work in a non-JVM language, `Spring Security` won’t be of any use to you.


    - **You need role-based authentication/authorization.** This is the main use case
    of `Spring Security`. You have a list of users and a list of resources and operations
    on those resources. You group the users into roles and allow certain roles to
    access certain operations on certain resources. That’s the core functionality.


    - **You want to secure a web application from malicious users.** As mentioned,
    `Spring Security` is mostly used in web application environments. When this is
    the case, the first thing to do is allow only the users that you want to have
    access to your application, while forbidding all others from even reaching it.


    - **You need to integrate with OpenID, LDAP, Active Directory, and databases as
    security providers.** If you need to integrate with a particular Users and Roles
    or Groups provider, you should take a look at the vast array of options `Spring
    Security` offers because integration might already be implemented for you, saving
    you from writing lots of unnecessary code. Sometimes you might not be exactly
    sure what provider your business will require to authenticate against. In this
    case, `Spring Security` makes your life easy by allowing you to switch between
    different providers in a painless way.


    - **You need to secure your domain model and allow only certain users to access
    certain objects in your application.** If you need fine-grained security (that
    is, you need to secure on a per object, per user basis), `Spring Security` offers
    the Access Control List (ACL) module, which will help you to do just that in a
    straightforward way.


    - **You want a nonintrusive, declarative way for adding security around your application.**
    Security is a cross-cutting concern, not really a core business functionality
    of your application (unless you work in a security provider firm). As such, it
    is better if it can be treated as a separate and modular add-on that you can declare,
    configure, and manage independently of your main business concerns. `Spring Security`
    is built with this in mind. By using Servlet Filters, XML configuration, and AOP
    concepts, the framework tries not to pollute your application with security rules.
    Even when using annotations, they are still metadata on top of your code. They
    don’t mess with your code logic. You, as a Java developer, must try to isolate
    the Java Configuration into a configuration library and decouple it from the rest
    of the application in a similar way you do with XML.


    - **You want to secure your service layer the same way you secure your URLs, and
    you need to add rules at the method level for allowing or disallowing user access.**
    `Spring Security` allows you to use a consistent security model throughout the
    layers of your application because it internally enforces this consistent model
    itself. You configure users, roles, and providers in just one place, and both
    the service and web layers make use of this centralized security configuration
    in a transparent way.'
  raw: '## What Is Spring Security?


    Spring Security is a framework dedicated to providing a full array of security
    services to Java applications in a developer-friendly and flexible way. It adheres
    to the well-established practices introduced by the Spring Framework. Spring Security
    tries to address all the layers of security inside your application. In addition,
    it comes packed with an extensive array of configuration options that make it
    very flexible and powerful.


    Recall from Chapter [1](#310331_2_En_1_Chapter.xhtml) that it can be said that
    Spring Security is simply a comprehensive authentication/authorization framework
    built on top of the Spring Framework. Although the majority of applications that
    use the framework are web-based, Spring Security’s core can also be used in standalone
    applications.


    Many things make Spring Security immediately attractive to Java developers. To
    name just a few, consider the following list:


    *   **It’s built on top of the successful** **Spring Framework.** This is an important
    strength of Spring Security. The Spring Framework has become “the way” to build
    enterprise Java applications, and with good reason. It is built around good practices
    and two simple yet powerful concepts: dependency injection (DI) and aspect-oriented
    programming (AOP). Also important is that many developers have experience with
    Spring, so they can leverage that experience when introducing Spring Security
    in their projects.


    *   **It provides out-of-the-box support for many authentication models.** Even
    more important than the previous point, Spring Security supports out-of-the-box
    integration with Lightweight Directory Access Protocol (LDAP), OpenID, form authentication,
    Certificate X.509 authentication, database authentication, Jasypt cryptography,
    and lots more. All this support means that Spring Security adapts to your security
    needs—and not only that, it can change if your needs change, without much effort
    involved for the developer. More info about Jasypt cryptography can be found at
    [`www.jasypt.org/`](http://www.jasypt.org/).


    This is important from a business point of view as well because the application
    can either adapt to the corporate authentication services or implement its own,
    thus requiring only straightforward configuration changes.


    This also means that there is a lot less software for you to write, because you
    are making use of a great amount of ready-to-use code that has been written and
    tested by a large and active user community. You can, to a certain point, trust
    that this code works and use it with confidence. And if it does not work, you
    can always fix it and send a patch to those in charge of maintaining the project.


    *   **It offers** **layered security services.** Spring Security allows you to
    secure your application at different levels, and to secure your web URLs, views,
    service methods, and domain model. You can pick and combine these features to
    achieve your security goals.


    This is really flexible in practice. Imagine, for instance, that you offer services
    exposed through RMI, the Web, JMS, and others. You could secure all of these interfaces,
    but maybe it’s better to secure just the business layer so that all requests are
    secured when they reach this layer. Also, maybe you don’t care about securing
    individual business objects, so you can omit that module and use just the functionality
    you need.


    *   **It is** **open source software.** As part of the Pivotal portfolio, Spring
    Security is an open source software tool. It also has a large community and user
    base dedicated to testing and improving the framework. Having the opportunity
    to work with open source software is an attractive feature for most developers.
    The ability to look into the source code of the tools you like and work with is
    an exciting prospect. Whether our goal is to improve the tools or simply to understand
    how they work internally, we developers love to read code and learn from it.


    ## Where Does Spring Security Fit In?


    Spring Security is without question a powerful and versatile tool. But like anything
    else, it is not a tool that adapts to everything you want to do. Its offerings
    have a defined scope.


    Where and why would you use Spring Security? Here is a list of reasons and scenarios:


    *   **Your application is in Java, Groovy, or Kotlin.** The first thing to take
    into account is that Spring Security can be written in languages like Java, Groovy,
    or Kotlin and generally in any language supported by the JVM. So if you plan to
    work in a non-JVM language, Spring Security won’t be of any use to you.


    *   **You need** **role-based authentication/authorization.** This is the main
    use case of Spring Security. You have a list of users and a list of resources
    and operations on those resources. You group the users into roles and allow certain
    roles to access certain operations on certain resources. That’s the core functionality.


    *   **You want to secure a** **web application** **from malicious users.** As
    mentioned, Spring Security is mostly used in web application environments. When
    this is the case, the first thing to do is allow only the users that you want
    to have access to your application, while forbidding all others from even reaching
    it.


    *   **You need to integrate with** **OpenID** **,** **LDAP** **,** **Active Directory**
    **, and** **databases** **as security providers.** If you need to integrate with
    a particular Users and Roles or Groups provider, you should take a look at the
    vast array of options Spring Security offers because integration might already
    be implemented for you, saving you from writing lots of unnecessary code. Sometimes
    you might not be exactly sure what provider your business will require to authenticate
    against. In this case, Spring Security makes your life easy by allowing you to
    switch between different providers in a painless way.


    *   **You need to secure your** **domain model** **and allow only certain users
    to access certain objects in your application.** If you need fine-grained security
    (that is, you need to secure on a per object, per user basis), Spring Security
    offers the Access Control List (ACL) module, which will help you to do just that
    in a straightforward way.


    *   **You want a nonintrusive, declarative** **way for adding security around
    your application.** Security is a cross-cutting concern, not really a core business
    functionality of your application (unless you work in a security provider firm).
    As such, it is better if it can be treated as a separate and modular add-on that
    you can declare, configure, and manage independently of your main business concerns.
    Spring Security is built with this in mind. By using Servlet Filters, XML configuration,
    and AOP concepts, the framework tries not to pollute your application with security
    rules. Even when using annotations, they are still metadata on top of your code.
    They don’t mess with your code logic. You, as a Java developer, must try to isolate
