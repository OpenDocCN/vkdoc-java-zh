- fmt: '- `org.springframework.security.access.vote.AbstractAclVoter`：这是一个抽象类，提供了编写处理领域ACL规则的投票器的骨架，以便其他实现类在其功能基础上添加投票行为。目前，它由`AclEntryVoter`实现，该投票器对用户在领域对象上的权限进行投票。此投票器将在专门讨论ACL的章节中介绍。


    - `org.springframework.security.access.vote.AuthenticatedVoter`：当受保护资源上存在引用三种可能身份验证级别中`任意`一种的`ConfigAttribute`时，此投票器进行投票。这三个级别是`IS_AUTHENTICATED_FULLY`、`IS_AUTHENTICATED_REMEMBERED`和`IS_AUTHENTICATED_ANONYMOUSLY`。如果`Authentication`对象的身份验证级别与资源中配置的身份验证级别匹配（或处于更强的层级关系中，即`IS_AUTHENTICATED_FULLY
    > IS_AUTHENTICATED_REMEMBERED > IS_AUTHENTICATED_ANONYMOUSLY`），则投票器投赞成票。


    - `org.springframework.security.access.vote.RoleVoter`：这可能是所有投票器中最常用的一个。默认情况下，此投票器能够对具有以`ROLE_`前缀开头（该前缀可被覆盖）的安全元数据的`ConfigAttribute`的资源进行投票。当`Authentication`对象尝试访问资源时，其`GrantedAuthorities`会与相关的`ConfigAttributes`进行匹配。如果匹配，则授予访问权限；如果不匹配，则拒绝访问。


    - `org.springframework.security.access.expression.WebExpressionVoter`：此投票器负责在过滤器链的Web请求上下文中评估SpEL表达式——例如`<intercept-url>`元素中的`''hasRole''`表达式。要使用此投票器，并且通常为了在Web安全中支持SpEL表达式，需要在`<http>`元素中添加`the-use-expressions="true"`属性。


    投票器模型是框架中另一个可扩展和自定义的模型。您可以轻松创建自己的实现并将其添加到框架中。您将在第[8]章中了解如何执行此操作。


    整个`AccessDecisionVoter`接口的参考信息可在GitHub上找到：[`https://github.com/spring-projects/spring-security/blob/master/core/src/main/java/org/springframework/security/access/AccessDecisionVoter.java`](https://github.com/spring-projects/spring-security/blob/master/core/src/main/java/org/springframework/security/access/AccessDecisionVoter.java)。


    ```

