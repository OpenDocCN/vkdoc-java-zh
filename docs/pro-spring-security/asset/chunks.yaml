- fmt: "### ACLs\n\nAccess control lists (ACLs) are part of the authorization process\
    \ explained in the previous section. The key difference is that ACLs normally\
    \ work at a finer grained level in the application. ACLs are simply a collection\
    \ of mappings between resources, users, and permissions. With ACLs, you can establish\
    \ rules like “User John has administrative permission on the blog post X” or “User\
    \ Luis has read permission on blog post X.” You can see the three elements: user,\
    \ permission, and resource. Figure [1-3](#310331_2_En_1_Chapter.xhtml#Fig3) shows\
    \ how ACLs work; they are just a special case of the general authorization process.\n\
    \n## Authentication and Authorization: General Concepts\n\nIn this section, we\
    \ shall introduce and explain some fundamental security concepts that you will\
    \ be coming across frequently in the rest of the book:\n\n- **User**: The first\
    \ step in securing a system from malicious attackers is to identify legitimate\
    \ users and allow access to them alone. User abstractions are created in the system\
    \ and given their own identity. They are the users that will later be allowed\
    \ to use the system.\n\n- **Credentials**: Credentials are the way a user proves\
    \ who they are. Normally, in the shape of passwords (certificates are also a common\
    \ way of presenting credentials), they are data that only the owner of it knows.\n\
    \n- **Role**: In an application security context, a role can be seen as a logical\
    \ grouping of users. This logical grouping is normally done so the grouped users\
    \ share a set of permissions in the application to access certain resources. For\
    \ example, all users with the role of admin will have the same access and permissions\
    \ to the same resources. Roles serve simply as a way to group permissions to execute\
    \ determined actions, making users with those roles inherit such permissions.\n\
    \n- **Resource**: By a *resource*, we mean, in this context, any part of the application\
    \ that we want to access and that needs to be properly secured against unauthorized\
    \ access—for example, a URL, a business method, or a particular business object.\n\
    \n- **Permissions**: Permissions refer to the access level needed to access a\
    \ particular resource. For example, two users may be allowed to read a particular\
    \ document, but only one of them is allowed to write to it. Permissions can apply\
    \ either to individual users or to users that share a particular role.\n\n- **Encryption**:\
    \ This allows you to encrypt sensible information (normally passwords, but it\
    \ can be something else, like cookies) so as to make it incomprehensible to attackers\
    \ even if they get access to the encrypted version. The idea is that you never\
    \ store the plain text version of a password, but instead store an encrypted version\
    \ so that nobody but the owner of such a password knows the original one. There\
    \ are three main kinds of encryption algorithms:\n    - **One-way encryption**:\
    \ These algorithms, referred as *hashing algorithms*, take an input string and\
    \ generate an output number known as the *message digest*. This output number\
    \ cannot be converted back into the original string. This is why the technique\
    \ is referred to as *one-way encryption*. Here is the way to use it: A requesting\
    \ client encrypts a string and sends the encrypted string to the server. The server\
    \ may have access to the original information from a previous registration process,\
    \ for example, and if it does, it can apply the same hash function to it. Then\
    \ it compares the output from this hashing to the value sent by the client. If\
    \ they match, the server validates the information. Figure [1-4](#310331_2_En_1_Chapter.xhtml#Fig4)\
    \ shows this scheme. Usually, the server doesn’t even need the original data.\
    \ It can simply store the hashed version and then compare it with the incoming\
    \ hash from the client.\n\n    ![../images/310331_2_En_1_Chapter/310331_2_En_1_Fig4_HTML.jpg](images/310331_2_En_1_Chapter/310331_2_En_1_Fig4_HTML.jpg)\n\
    \n    Figure 1-4\n\n    One-way encryption or hashing\n\n    - **Symmetric encryption**:\
    \ These algorithms provide two functions: encrypt and decrypt. A string of text\
    \ is converted into an encrypted form and then can be converted back to the original\
    \ string. In this scheme, a sender and a receiver share the same keys so that\
    \ they can encrypt and decrypt messages on both ends of the communication. One\
    \ problem with this scheme is how to share the key between the endpoints of the\
    \ communication. A common approach is to use a parallel secure channel to send\
    \ the keys. Figure [1-5](#310331_2_En_1_Chapter.xhtml#Fig5) shows symmetric encryption\
    \ at work.\n\n    ![../images/310331_2_En_1_Chapter/310331_2_En_1_Fig5_HTML.jpg](images/310331_2_En_1_Chapter/310331_2_En_1_Fig5_HTML.jpg)\n\
    \n    Figure 1-5\n\n    Symmetric encryption. The two endpoints share the same\
    \ encryption/decryption key\n\n    - **Public key cryptography**: These techniques\
    \ are based on asymmetric cryptography. In this scheme, a different key is used\
    \ for encryption than for decryption. These two keys are referred as the *public\
    \ key*, which is used to encrypt messages, and the *private key*, which is used\
    \ to decrypt messages. The advantage of this approach over symmetric encryption\
    \ is that there is no need to share the decryption key, so no one but the intended\
    \ receiver of the information is able to decrypt the message. So the normal scenario\
    \ is the following:\n        - The intended recipient of messages shares her public\
    \ key with everyone interested in sending information to her.\n        - A sender\
    \ encrypts the information with the receiver’s public key, and sends a message.\n\
    \        - The receiver uses her private key to decrypt the message.\n       \
    \ - No one else is able to decrypt the message because they don’t have the receiver’s\
    \ private key.\n\n    Figure [1-6](#310331_2_En_1_Chapter.xhtml#Fig6) shows the\
    \ public key cryptography scheme.\n\n    ![../images/310331_2_En_1_Chapter/310331_2_En_1_Fig6_HTML.jpg](images/310331_2_En_1_Chapter/310331_2_En_1_Fig6_HTML.jpg)\n\
    \n    Figure 1-6\n\n    Public key cryptography\n\nThe use of encryption achieves,\
    \ among other things, two other security goals:\n\n- **Confidentiality**: Potentially\
    \ sensitive information belonging to one user, or group of users, should be accessible\
    \ only to this user or group. Encryption algorithms are the main helper in achieving\
    \ this goal.\n\n- **Integrity**: Data sent by a valid user shouldn’t be altered\
    \ by a third entity on its way to the server, or in its storage. This is normally\
    \ accomplished through the use of one-way cryptographic algorithms that make it\
    \ almost impossible to alter an input and produce a corrupted message whose encrypted\
    \ hash is the same as the original message (thus deceiving the receiver into thinking\
    \ it is valid)."
