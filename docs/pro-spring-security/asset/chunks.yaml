  trans: '

    请注意，我们添加了一个登出链接，以便在需要时实际注销用户。本章稍后将更详细地解释如何使用 Spring Security 的登录和登出 URL。


    现在，你将更详细地了解应用程序内部发生了什么，以及你刚刚定义的配置如何帮助保护应用程序。你将跟随请求在框架中的完整旅程，并观察它所经历的不同步骤。当你向配置的
    URL 发出 HTTP 请求，并且你的 Servlet 容器处理完该请求后，该请求会到达 `DelegatingFilterProxy`，而后者又会将处理委托给安全相关的
    `FilterChainProxy`。


    通常，Spring Security 会使用大量过滤器。以 HTTP 请求过滤器为例，它将用于：


    *   拦截请求。

    *   检测身份验证（或缺失）。

    *   重定向到身份验证入口点。

    *   将请求传递给授权服务。

    *   将请求发送到 Servlet 或抛出安全异常。


    在 Spring Security v5 中，最重要的过滤器如下：


    安全过滤器链：


    *   `DelegatingFilterProxy`

    *   `FilterChainProxy`


    核心安全过滤器：


    *   `FilterSecurityInterceptor`

    *   `ExceptionTranslationFilter`

    *   `SecurityContextPersistenceFilter`

    *   `UsernamePasswordAuthenticationFilter`

    *   `AnonymousAuthenticationFilter`


    基本和摘要身份验证过滤器：


    *   `BasicAuthenticationFilter`

    *   `DigestAuthenticationFilter`


    会话管理：


    *   `SessionManagementFilter`


    CSRF 注意事项：


    *   `HiddenHttpMethodFilter`


    预认证场景：


    *   `AbstractPreAuthenticatedProcessingFilter`


    `LogoutSuccessHandler`：


    *   `LogoutFilter`


    Spring Security 感知的 `HttpServletRequestWrapper`：


    *   `SecurityContextHolderAwareRequestFilter`


    `RequestCache`：


    *   `RequestCacheFilter`


    HTTP 请求和身份验证过程及过滤器将在第 4 章中解释。


    让我们看看在登录时提供错误或正确凭据会发生什么。当浏览器被重定向并请求 URL `/login` 时，会发生以下情况：


    *   该过程与第一个请求相同，直到它到达 `DefaultLoginPageGeneratingFilter`。此时，过滤器检测到请求是针对 URL `/login`
    的，并将登录表单的 HTML 数据直接写入响应对象。然后渲染响应。


    现在尝试使用错误的凭据登录。让我们跟随请求在框架中的旅程，看看会发生什么：


    ![../images/310331_2_En_5_Chapter/310331_2_En_5_Fig6_HTML.jpg](img/310331_2_En_5_Fig6_HTML.jpg)


    图 5-6

    身份验证详细信息不正确时的身份验证过滤器


    1.  在登录表单中，输入用户名 **user** 和密码 **uspass**。

    2.  提交表单后，过滤器会以与之前相同的顺序再次被激活。然而，这次当请求到达 `UsernamePasswordAuthenticationFilter`
    时，过滤器会检查请求是否针对 URL `/login`，并确认确实如此。过滤器分别从 HTTP 请求参数 `username` 和 `password` 中提取用户名和密码身份验证信息。利用这些信息，它创建了
    `UsernamePasswordAuthenticationToken Authentication` 对象，然后将其发送给 `AuthenticationManager`（更准确地说，是其默认实现
    `ProviderManager`）进行身份验证。

    3.  `DaoAuthenticationProvider` 被 `ProviderManager` 使用 `Authentication` 对象调用。`DaoAuthentication`
    提供者是 `AuthenticationProvider` 的一个实现，它使用 `UserDetailsService` 策略从任何存储用户的地方检索用户。根据你当前的配置，它将尝试使用配置的
    `InMemoryUserDetailsManager`（`UserDetailsService` 的实现，它在 `java.util.Map` 中维护内存中的用户存储）来查找用户名为
    user 的用户。由于没有此用户名的用户，提供者会抛出 `UsernameNotFoundException` 异常。

    4.  提供者自身捕获此异常，并将其转换为 `BadCredentialsException`，以隐藏应用程序中不存在该用户的事实；相反，它将错误视为常见的用户名-密码组合错误。

    5.  该异常被 `UsernamePasswordAuthenticationFilter` 捕获。此过滤器将处理委托给 `AuthenticationFailureHandler`
    实现的一个实例，该实例进而决定将响应重定向到 URL `/login?error`。这样，登录表单会再次在浏览器中显示，并附带一条错误消息。你可以在图 5-6
    中看到此交互。


    现在让我们使用正确的凭据登录。


    首先，在控制器中创建一个新的端点来检索一些简单的文本。在控制器 `UserController` 中，创建清单 5-6 中名为 `/showmovie` 的方法。


    ```

    @GetMapping("/showmovie")

    @ResponseBody

    public String showMovie() {

    return "movie x";

    }

    清单 5-6

    一个返回简单字符串的简单端点方法

    ```


    重新启动应用程序，回到 URL `http:/localhost:8080/favoritesmovies/showmovie`，并在表单中输入用户名 **admin**
    和密码 **admin123**。然后点击登录按钮。


    *   请求遵循与之前相同的过滤器路径。这次，`InMemoryUserDetailsManager` 找到了一个具有所请求用户名的用户，并将其返回给 `DaoAuthenticationProvider`，后者创建了一个成功的
    `Authentication` 对象。

    *   成功认证后，`UsernamePasswordAuthenticationFilter` 将处理委托给 `SavedRequestAwareAuthenticationSuccessHandler`
    的一个实例，该实例在会话中查找原始请求的 URL（`/showmovie`），并将响应重定向到该 URL。


    当请求 `http://localhost:8080/favoritesmovies/showmovie` 时，请求会像之前的情况一样，沿着过滤器链进行处理。不过，这次系统中已经有一个完全通过身份验证的实体。请求到达
    `FilterSecurityInterceptor`。


    ![../images/310331_2_En_5_Chapter/310331_2_En_5_Fig8_HTML.jpg](img/310331_2_En_5_Fig8_HTML.jpg)


    图 5-8

    成功认证和授权过程的整体流程


    *   `FilterSecurityInterceptor` 收到对 URL `/showmovie` 的访问请求。然后，它恢复访问该 URL 所需的凭据（`ROLE_ADMIN`）。

    *   `AffirmativeBased` 访问决策管理器被调用，进而调用 `RoleVoter` 投票器。投票器评估已认证实体的权限列表，并将其与访问资源所需的凭据进行比较。由于投票器找到了匹配项（`ROLE_ADMIN`
    同时存在于 `Authentication` 的权限和资源的 `config` 属性中），它投出了 `ACCESS_GRANTED` 票。

    *   `FilterSecurityInterceptor` 将请求转发给请求处理链中的下一个元素，在本例中是 Spring 的 `DispatcherServlet`。

