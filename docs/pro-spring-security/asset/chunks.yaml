- fmt: '*   `parent_object`: Allows for a hierarchy of domain objects by creating
    a recursive relation with itself. So permission can be shared between the objects
    in the hierarchy. It is a foreign key to itself.

    *   `owner_sid`: The SID owning this particular domain object.

    *   `entries_inheriting`: A Boolean that specifies if, in a hierarchy of domain
    objects, permissions are inherited between the objects.

    *   Table `ACL_ENTRY`

    *   `acl_object_identity`: The identity of the object. It’s a reference to a row
    in table `ACL_OBJECT_IDENTITY`.

    *   `sid`: Identifies the SID in this ACE. It’s a reference to a row in table
    `ACL_SID`.

    *   `mask`: The actual permission. Permissions in ACL support are given as a bitmask
    represented with an integer value. In code, the default permissions are defined
    in the class `org.springframework.security.acls.domain.BasePermission`, which
    is reproduced in Listing [7-2](#310331_2_En_7_Chapter.xhtml#PC2). You can easily
    create your own class and define extra permissions if you want to do so.

    *   `granting`: A Boolean that determines if the particular ACE is for granting
    or, if false, for denying access according to the rules defined in the entry.


    You can see that there are not a lot of tables defined in the schema, but it is
    important that you understand them individually and their relationships. Figure
    [7-3](#310331_2_En_7_Chapter.xhtml#Fig3) shows the ER (entity-relationship) diagram
    for this data model to help you understand them better. The diagram describes
    the meanings of the relationships between tables in simple terms.


