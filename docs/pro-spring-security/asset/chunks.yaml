  trans: '

    如果你希望的话，也可以通过让 `<secured>` 元素直接作为 `<flow>` 元素的子元素来保护整个流程。

    这意味着，用户需要拥有所需的权限才能访问流程中的任何状态。你可以亲自尝试一下，这应该非常直观。


    其他 JVM 语言中的 Spring Security

    我们并非以下任何一种语言的专家，在示例中可能也无法使用最地道的表达方式。（我们最熟悉 Ruby，因为无论是在工作中还是闲暇时都经常使用它。它也是我们最喜欢的语言之一。）然而，我们的目标仅仅是展示，通过一些调整，你可以将
    Spring Security 集成到用 Java 以外的语言编写的项目中。


    你会看到，Spring Security 在其他 JVM 语言中的支持有时是直接且全面的（例如使用 Groovy 及其 Grails 框架时）；而在其他情况下，你可能需要自行编写集成方案来支持它。在接下来的章节中，我们将简要概述如何将
    Spring Security 集成到我们认为除 Java 之外的三种主要 JVM 语言中：**Groovy**、**JRuby** 和 **Scala**。


    请记住，Spring Security 本质上不过是一组构建在 Spring 框架之上的 Java 库，它允许你将认证/授权安全机制插入到你的应用程序中。因此，它应该能够集成到你拥有的任何
    Java（Java JVM）应用程序中。当然，并非所有功能都适用于所有应用程序。例如，过滤器链在非 Web 应用程序中就没有意义。


    Spring Security 与 Ruby (JRuby)

    Ruby 绝对是我们最喜欢的语言之一，我们花了很多时间与之打交道。它结合了出色的语法和优秀的语言结构，使用起来令人愉悦。Ruby 是一种面向对象的动态语言，专注于生产力、简洁性和易用性。


    标准的 Ruby 解释器是用 C 语言编写的，在 1.9 版本之前被称为 *MRI Ruby*。从 1.9 版本开始，官方解释器被称为 *YARV 解释器*。


    Ruby 是一种非常流行的语言，其流行很大程度上源于其出色的 Web 框架 Ruby on Rails (RoR) 的广泛使用，该框架也简称为 *Rails*。


    Rails 是一个 MVC 框架，非常强调“约定优于配置”的实践。如果你遵循框架强制执行的约定，它是一个非常高效的框架，可以用来快速、轻松地开发简单的 Web
    应用程序。


    我们不会对 Ruby 或 Rails 进行深入解释，因为这超出了本书的范围。我们也假设，如果你正在阅读本节，你可能已经了解它们，并且只是想学习如何将 Spring
    Security 集成到其中，或者想了解这是否完全可行。不过，在示例中使用 Ruby 概念时，我们会尽量给出简短的解释。


    JRuby 是一个用 Java 编写的、功能完备的 Ruby 编程语言实现。你可以使用它在 Java 虚拟机中运行 Ruby 程序，并与你的其他 JVM 语言（当然，主要是
    Java）进行交互。


    本节我们将展示一个简单的教程，介绍如何将 Spring Security 集成到 Rails 应用程序中，并判断这样做是否值得。


    在 JRuby 的情况下，没有像 Grails 中那样的插件。实际上，Java 和 Ruby 之间的集成不如 Java 和 Groovy 之间的集成那么顺畅。基本上，你需要自行实现集成方案。


    首先，我们来安装 JRuby。本书使用的 JRuby 版本是 9.2.6.0。这里我们将使用简单的安装方式：只需下载文件，解压缩，并将其可执行文件添加到路径中。以下是我们在一台
    Windows 机器上执行的过程（在其他操作系统上应该类似）：


    1.  进入你想要安装 JRuby 的目录。


    2.  从 [`https://s3.amazonaws.com/jruby.org/downloads/9.2.6.0/jruby_windows_x64_9_2_6_0.exe`](https://s3.amazonaws.com/jruby.org/downloads/9.2.6.0/jruby_windows_x64_9_2_6_0.exe)
    下载文件，并将其安装到以下目录：`c:\jruby-9.2.6.0`。


    3.  现在你应该可以访问 JRuby 了。执行 `jruby –v`，你应该会看到刚刚安装的 JRuby 版本，如图 9-9 所示。


    ![../images/310331_2_En_9_Chapter/310331_2_En_9_Fig9_HTML.jpg](img/310331_2_En_9_Fig9_HTML.jpg)


    图 9-9


    JRuby 版本页面


    4.  接下来，安装 Rails：`jruby –S gem install rails`，如图 9-10 所示。


    ![../images/310331_2_En_9_Chapter/310331_2_En_9_Fig10_HTML.jpg](img/310331_2_En_9_Fig10_HTML.jpg)


    图 9-10


    安装 Rails


    5.  现在创建你的 Rails 应用程序。与本书其他部分一样，这将是一个功能非常简单的应用程序，仅用于展示如何使用 Spring Security。我们把这个应用程序简称为
    *demo*。在你选择的目录中，输入以下命令：`rails new demo`。


    现在，你的系统中有了一个新的基本 Rails 应用程序。你可以通过命令行进入刚刚创建的 `demo` 目录，然后输入 `rails s` 来运行它。该命令将启动一个
    WEBrick 服务器，并在该服务器上运行应用程序。如果你按照示例操作，你应该能够在你的计算机上访问 `http://localhost:3000`，并看到默认的
    Rails 应用程序主页。


    在创建 Rails 应用程序的过程中，系统为你生成了大量的基础设施代码和定义良好的目录结构。如果你查看一下 `demo` 目录（这是你应用程序的根目录），你就会明白我们的意思。


    无论如何，正如我们之前所说，我们不会深入探讨 Rails 框架或 Ruby 本身。我们只是通过一个基本的示例来展示如何将 Spring Security 集成到
    Ruby on Rails 应用程序中。我们假设你已经了解 Ruby 和 Rails。


    Rails 中的 Web 层安全

    当你在上一节中运行 Rails 应用程序时，你使用的是 Ruby 服务器（WEBrick）。这个服务器对 Java Servlet 一无所知，所以你可能会猜到，使用这个服务器无法运行
    Spring Security 的 Web 层安全——你的猜测是正确的。你需要做的是在标准的 Java Web 容器中运行你的 Rails 应用程序，这就是我们接下来要做的。


    首先，安装 *warbler*，这是一个用于从你的 Rails 应用程序创建标准 WAR 文件的 gem。要安装 warbler，请使用命令 `jruby
    –S gem install warbler`。安装 warbler 后，你可以在应用程序的根目录中执行 `jruby –S warble`，它将创建 `demo.war`。


    这很好，但先不要部署它。让我们先给它添加一些功能，然后再添加 Spring Security 级别的安全保护。


    你将向应用程序添加两条简单的路由。一条将返回字符串 `SECURED`，并且仅对登录用户可访问。另一条将返回字符串 `UNSECURED`，并且对任何用户都可用。


    让我们创建一对控制器：一个用于管理员用户，一个用于标准用户。我们将这些控制器简单地命名为 `AdminsController` 和 `StandardsController`。在你的
    `demo` 应用程序根目录中输入以下两个命令来生成它们：


    ```

    rails g controller admins

    rails g controller standards

    ```


    执行这些命令会生成输出，描述已生成的工件。然后，你将编辑这些控制器，使其看起来像代码清单 9-17 和 9-18 所示。你可以在标准 Rails 位置的 `app/controllers`
    目录中找到这些控制器。

    '
- fmt: "```ruby\nclass StandardsController  \"Anybody can read this meaningless message\"\
    \nend\nend\n```\nListing 9-18: `StandardsController` with an Unsecured Action\n\
    \n```ruby\nclass AdminsController  \"This is top secret code\"\nend\nend\n```\n\
    Listing 9-17: `AdminsController` with a Secured Action\n\nThe next thing you need\
    \ to do is to copy all the Java libraries you need to use into the `lib` directory\
    \ of your Rails application:\n\n```\naopalliance-1.0.jar\ncommons-codec-1.3.jar\n\
    commons-logging-1.1.1.jar\njavax.servlet-api-4.0.1.jar\nspring-aop-5.1.8.RELEASE.jar\n\
    spring-asm-5.1.8.RELEASE.jar\nspring-beans-5.1.8.RELEASE.jar\nspring-context-5.1.8.RELEASE.jar\n\
    spring-core-5.1.8.RELEASE.jar\nspring-expression-5.1.8.RELEASE.jar\nspring-jdbc-5.1.8.RELEASE.jar\n\
    spring-security-config-5.1.5.RELEASE.jar\nspring-security-core-5.1.5.RELEASE.jar\n\
    spring-security-crypto-5.1.5.RELEASE.jar\nspring-security-web-5.1.5.RELEASE.jar\n\
    spring-tx-5.1.8.RELEASE.jar\nspring-web-5.1.8.RELEASE.jar\n```\n\nThe next step\
    \ is to enable your Rails application to be run in a standard Java web server,\
    \ such as Tomcat. For that, you’ll use the gem *warbler*. Warbler is a JRuby exclusive\
    \ gem you use to convert different kinds of Ruby applications into standard Java\
    \ packaging artifacts, such as `JAR` and `WAR` files. In your case, you’ll obviously\
    \ be creating a `WAR` file. Warbler uses internally the gem `jruby-rack` and packs\
    \ it into the `WAR`-based application. This gem is the core of the integration\
    \ between Ruby Rack–based applications (such as Rails applications) and Java web\
    \ servlet–based applications, which is what you need.\n\n`Jruby-rack` works as\
    \ a translation layer. It first initializes the Ruby part of the application with\
    \ a servlet listener (`org.jruby.rack.rails.RailsServletContextListener`), and\
    \ then, on each request, it intercepts the calls to the server with a servlet\
    \ filter, `org.jruby.rack.RackFilter`. When this filter gets the `HttpServletRequest`,\
    \ it will translate these Java-based requests into Rack requests that will pass\
    \ through to the Rails application, as these are the requests Rails will understand\
    \ as it is built on the Rack model. Of course, there is a lot more detail regarding\
    \ warbler and `jruby-rack`, but for the moment, the explanations presented here\
    \ should be enough for you to continue with the example. In Figure 9-11, you can\
    \ see a graphical illustration of how `jruby-rack` works.\n\n![../images/310331_2_En_9_Chapter/310331_2_En_9_Fig11_HTML.jpg](images/310331_2_En_9_Chapter/310331_2_En_9_Fig11_HTML.jpg)\n\
    \nFigure 9-11: A `jruby-rack` mapping of the Java and Ruby worlds\n\nTo use warbler\
    \ with Spring Security, you need to change the `web.xml` file that gets automatically\
    \ generated by it. To do this, you need to copy the `web.xml.erb` that comes with\
    \ warbler (which resides in the gem installation directory of Ruby and which is\
    \ `~/.rvm/gems/jruby-1.8/gems/warbler-1.3.6/web.xml.erb` on my computer) into\
    \ the `config` directory of your `demo` application. Then you need to edit it\
    \ and make it look like Listing 9-19. By doing this, you are including the Spring\
    \ Security configuration in your `web.xml` file as you did in previous chapters.\n\
    \nNext, copy the `applicationContext-security.xml` file from Listing 9-20 into\
    \ the root of your demo `application`. Here you have your familiar Spring Security\
