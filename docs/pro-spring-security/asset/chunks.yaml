    这几行代码定义了密钥名称、参数名称、Cookie 名称以及有效期（以秒为单位）。

    重启应用程序，访问 `http://localhost:8080/favoritesmovies/movies`。

    现在，您应该会看到一个复选框，以及用户名和密码输入框。勾选该复选框，并使用 **admin**`/`**admin123** 登录。


    这一次，请求携带了所需的参数，`TokenBasedRememberMeServices` 开始工作。它从 `Authentication` 对象中提取用户名和密码，并利用这些信息以及过期时间创建一个令牌。它基本上是将这三个值与
    XML 元素中指定的记住我密钥（`favoritesmovies_key`）拼接起来，然后对生成的字符串进行 MD5 编码。该值将与用户名一起再次进行 Base64
    编码，并作为名为 `rememberloginnardone` 的 Cookie 添加到响应中，返回给浏览器。您可以在图 5-13 中看到这个 Cookie。


    ![../images/310331_2_En_5_Chapter/310331_2_En_5_Fig13_HTML.jpg](img/310331_2_En_5_Fig13_HTML.jpg)


    图 5-13

    记住我 Cookie 示例


    重启应用程序。访问 `http://localhost:8080/favoritesmovies/movies`。

    您应该无需登录即可访问该页面。

    当此请求进入系统时，会被 `RememberMeAuthenticationFilter` 拦截，该过滤器随即开始工作。过滤器做的第一件事是检查 `SecurityContext`
    中是否没有当前的 `Authentication` 对象。因为这意味着没有用户登录，所以过滤器会调用 `RememberMeServices` 的 `autoLogin`
    方法。

    在标准配置中，`TokenBasedRememberMeServices` 是实现 `RememberMeServices` 的具体类。该实现的 `autoLogin`
    方法尝试将传入的 Cookie 解析为其组成元素，即用户名、组合元素（用户名 + “:” + 令牌过期时间 + “:” + 密码 + “:” + 密钥）的哈希值，以及令牌的过期时间。然后，它使用用户名从
    `UserDetailsService` 中检索 `UserDetails`，使用检索到的用户重新计算哈希值，并将其与传入的哈希值进行比较。如果不匹配，则抛出
    `InvalidCookieException`。如果匹配，则检查 `UserDetails`，创建一个 `Authentication` 对象并返回给调用者。

    `autoLogin` 方法从请求中提取记住我 Cookie，对其进行解码，执行一些验证，然后使用从 Cookie 中提取的用户名调用配置的 `UserDetailsService`
    的 `loadUserByUsername` 方法。接着，它创建一个 `RememberMeAuthenticationToken` 对象（`Authentication`
    的一个实现）。

    然后，`RememberMeAuthenticationFilter` 尝试根据 `AuthenticationProvider` 的 `RememberMeAuthenticationProvider`
    实现来认证这个新的 `Authentication` 对象，该实现仅在确认传入请求的哈希值与存储的记住我密钥哈希值匹配后，返回相同的 `Authentication`
    对象。

    这个 `Authentication` 对象将被 `Security Interceptor` 用于允许访问请求的 URL。


    登出

    登出非常简单。当您从应用程序登出时，您希望应用程序结束当前会话，同时移除可能为您存储在客户端的所有信息。

    如前所述，在 Spring Security v5 中，URL `/logout` 取代了在 Spring Security v4 之前使用的 URL `/j_spring_security_logout`。

    在 Spring Security 中，登出非常容易。默认情况下，您唯一需要做的就是访问 URL `/logout`。让我们来试试。


    将以下几行代码添加到 `UserController` 文件中：


    ```

    @GetMapping ("/logout")

    public String logoutPage (HttpServletRequest request, HttpServletResponse response)
    {

    Authentication auth = SecurityContextHolder.getContext().getAuthentication();

    if (auth != null){

    new SecurityContextLogoutHandler().logout(request, response, auth);

    }

    return "index";

    }

    ```


    使用以下几行代码更新安全配置文件：


    ```

    .and().logout().deleteCookies("JSESSIONID")

    .and().logout().invalidateHttpSession(true)

    .and().logout().logoutSuccessUrl("/index").permitAll()

    ```


    这几行代码告诉应用程序删除 `JSESSIONID` Cookie、使 HTTP 会话失效，并在登出后重定向到索引网页。


    接下来，在 `movies.jsp` 页面中添加一个指向登出的 HTML 链接：


    ```

    ">Logout

    ```


    最后，在 `index.jsp` 页面中添加一个简单的 HTML 链接，以便在需要时链接回 `movies`：


    ```

    ">My movies

    ```


    现在，访问 `http://localhost:8080/favoritesmovies/movies`，并使用 **admin**/**admin123**
    再次登录。

    勾选用于激活 `remember-me` 功能的复选框。您应该能够毫无问题地登录。

    如果您查看浏览器中存储的 Cookie，应该会看到 localhost 域有两个 Cookie：`JSESSIONID` 和 `rememberloginnardone`。图
    5-13 显示了这两个 Cookie。您可能会预期，如果登出，这两个 Cookie 会从浏览器中消失，从而基本上从浏览器中移除应用程序的所有痕迹。让我们来操作一下。


    点击 `movies.jsp` 页面上的登出链接。您应该会从应用程序中登出。如果您打开浏览器的 Cookie，会看到 `rememberloginnardone`
    Cookie 已经消失。`JSESSIONID` Cookie 仍然存在，但会话已被框架失效。图 5-14 显示了记住我 Cookie 和会话 Cookie。


    ![../images/310331_2_En_5_Chapter/310331_2_En_5_Fig14_HTML.jpg](img/310331_2_En_5_Fig14_HTML.jpg)


    图 5-14

    记住我 Cookie 和会话 Cookie


    登出请求的流程如下：当请求到达时，它会沿着过滤器链传递，直到到达 `LogoutFilter`。该过滤器注意到请求的 URL 是用于登出的。过滤器调用配置的
    `LogoutHandler(s)`，在运行中的应用程序中，这些处理器是 `SecurityContextLogoutHandler` 和 `TokenBasedRememberMeServices`。（它们实现了
    `LogoutHandler` 接口。）

    `SecurityContextLogoutHandler` 以标准的 Servlet 方式使 Servlet 会话失效，即调用 `HttpSession`
    对象的 `invalidate` 方法，并清除 Spring Security 中的 `SecurityContext`，如使用 `.logout().invalidateHttpSession(true)`
    所示。

    `TokenBasedRememberMeServices` 则通过将记住我 Cookie 的过期时间设置为 0 来简单地移除它。


    会话管理

    Spring Security 的 Web 支持的另一个领域是用户会话管理。关于会话，一件非常重要的事情是确保在用户成功认证时创建一个新的会话 ID。这样做可以降低会话固定攻击的可能性，在这种攻击中，一个用户设置另一个用户的会话标识符，以便在应用程序中冒充他。Spring
    Security 还提供了一个功能，您可以使用它来指定同一用户在任意给定时间可以打开的并发会话数量。

    这两个功能由名为 `SessionFixationProtectionStrategy` 的类控制，该类实现了 `SessionAuthenticationStrategy`。此策略由
    `AbstractAuthenticationProcessingFilter` 和 `SessionManagementFilter` 调用。让我们看看它们是如何工作的。

