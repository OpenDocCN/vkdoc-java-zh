    \ Java 类\n\n现在创建三个 Java 类：`SpringSecurityConfiguration`、`UserController` 和 `User`。\n\
    \n我们先创建清单 6-26 中所示的 `SpringSecurityConfiguration` Java 类。\n\n```\npackage com.apress.SpringSecurityX509Auth.Configuration;\n\
    import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
    import org.springframework.security.config.annotation.method.configuration.EnableGlobalMethodSecurity;\n\
    import org.springframework.security.config.annotation.web.builders.HttpSecurity;\n\
    import org.springframework.security.config.annotation.web.configuration.EnableWebSecurity;\n\
    import org.springframework.security.config.annotation.web.configuration.WebSecurityConfigurerAdapter;\n\
    import org.springframework.security.core.authority.AuthorityUtils;\nimport org.springframework.security.core.userdetails.User;\n\
    import org.springframework.security.core.userdetails.UserDetails;\nimport org.springframework.security.core.userdetails.UserDetailsService;\n\
    import org.springframework.security.core.userdetails.UsernameNotFoundException;\n\
    import org.springframework.security.web.util.matcher.AntPathRequestMatcher;\n\
    @Configuration\n@EnableWebSecurity\n@EnableGlobalMethodSecurity(securedEnabled\
    \ = true)\npublic class SpringSecurityConfiguration extends WebSecurityConfigurerAdapter\
    \ {\n@Override\nprotected void configure(HttpSecurity http) throws Exception {\n\
    http\n.authorizeRequests()\n.anyRequest().authenticated().and()\n.x509()\n.subjectPrincipalRegex(\"\
    CN=(.*?)(?:,|$)\")\n.userDetailsService(userDetailsService())\n.and().logout()\n\
    .logoutUrl(\"/perform_logout\")\n.logoutRequestMatcher(new AntPathRequestMatcher(\"\
    /logout\"))\n.logoutSuccessUrl(\"/admin\")\n.deleteCookies(\"JSESSIONID\")\n.invalidateHttpSession(true)\n\
    .logoutRequestMatcher(new AntPathRequestMatcher(\"/logout\"));\n}\n@Bean\npublic\
    \ UserDetailsService userDetailsService() {\nreturn (UserDetailsService) username\
    \ -> {\nif (username.equals(\"nardone\")) {\nreturn new User(username, \"\",\n\
    AuthorityUtils\n.commaSeparatedStringToAuthorityList(\"ROLE_USER\"));\n} else\
    \ {\nthrow new UsernameNotFoundException(String.format(\"User %s not found\",\
    \ username));\n}\n};\n}\n}\n清单 6-26\nSpringSecurityConfiguration Java 类\n```\n\
    \n这个 Java 类非常容易理解。一旦您提供了有效的客户端证书，它将通过以下代码行从中获取“CN”值：\n\n```\n.anyRequest().authenticated().and()\n\
    .x509()\n.subjectPrincipalRegex(\"CN=(.*?)(?:,|$)\")\n.userDetailsService(userDetailsService());\n\
    ```\n\n然后，它会检查“CN”值是否等于“**nardone**”。如果是，它将返回用户名为“**nardone**”、权限为 `ROLE_USER`\
    \ 的用户，并授权该用户继续操作：\n\n```\nif (username.equals(\"nardone\")) {\nreturn new User(username,\
    \ \"\",\nAuthorityUtils\n.commaSeparatedStringToAuthorityList(\"ROLE_USER\"));\n\
    ```\n\n现在创建清单 6-27 中所示的 `UserController` Java 类。\n\n```\npackage com.apress.SpringSecurityX509Auth.Controller;\n\
    import org.springframework.security.access.annotation.Secured;\nimport org.springframework.security.authentication.UsernamePasswordAuthenticationToken;\n\
    import org.springframework.security.config.annotation.web.builders.WebSecurity;\n\
    import org.springframework.security.core.Authentication;\nimport org.springframework.security.core.context.SecurityContextHolder;\n\
    import org.springframework.web.bind.annotation.*;\nimport com.apress.SpringSecurityX509Auth.Domain.User;\n\
    import org.springframework.web.servlet.ModelAndView;\n@RestController\npublic\
    \ class UserController {\n@Secured(\"ROLE_USER\")\n@RequestMapping(value = {\"\
    /\",\"/admin\"}, method = RequestMethod.GET)\npublic ModelAndView admin() {\n\
    ModelAndView modelAndView = new ModelAndView();\nmodelAndView.setViewName(\"admin\"\
    );\nAuthentication auth = SecurityContextHolder.getContext().getAuthentication();\n\
    modelAndView.addObject(\"currentUser\", auth.getName());\nUser user = new User();\n\
    return modelAndView;\n}\npublic void configure(WebSecurity web) throws Exception\
    \ {\nweb\n.ignoring()\n.antMatchers(\"/resources/**\");\n}\n}\n清单 6-27\nUserController\
    \ Java 类\n```\n\n这是一个简单的用户控制器 Java 类，它将根据请求重定向 URL。\n\n现在创建清单 6-28 中所示的 `User`\
    \ Java 类。\n\n```\npackage com.apress.SpringSecurityX509Auth.Domain;\npublic class\
    \ User {\nprivate String name;\npublic User() {\nthis.name = name;\n}\npublic\
    \ String getName() {\nreturn name;\n}\npublic void setName(String name) {\nthis.name\
    \ = name;\n}\n}\n清单 6-28\nUser Java 类\n```\n\n该类将从用于认证的 X.509 客户端证书中获取数据。\n这就是\
    \ Spring 处理客户端证书所需的全部配置。\n当然，事情并没有那么简单，工作也还没有完成。实际上，Spring Security X.509 支持并不对用户进行认证。用户被假定为已经过认证，Spring\
    \ Security 只是根据从证书中提取的信息创建一个成功的 `Authentication` 对象，并以标准方式将其存储在 `SecurityContext`\
    \ 中。\n因此，实际负责对用户进行认证（或者更准确地说，接受用户为正确标识的用户）的实体是 Web 服务器，它通过接受提供的客户端证书来完成此操作。基本上，如果服务器决定用户发送的证书是有效的，那么用户就是其所声称的身份，并得到认证。\n\
    在生产系统中，Web 服务器会确保客户端提供的证书由授权的可信机构签名。\n但是，您将使用一个测试环境，其中包含您常用的 Maven 配置的 Tomcat\
    \ 安装，为此，您将配置一个自签名证书，并确保 Tomcat 接受它。\n在开始之前，请确保您已在机器上安装了 `openssl` 工具。从 [`https://wiki.openssl.org/index.php/Binaries`](https://wiki.openssl.org/index.php/Binaries)\
    \ 下载它。\n让我们创建所需的服务器和客户端证书。这非常简单，您将使用 `openssl` 工具来完成：\n\n对于服务器：\n\n1.  生成服务器私钥\
    \ (PEM) 和服务器自签名证书 (CRT)：\n\n```\n    openssl req -x509 -newkey rsa:4096 -keyout\
    \ serverPrivateKey.pem -out server.crt -days 3650 -nodes\n    ```\n\n2.  创建一个包含私钥\
    \ (P12) 和相关自签名证书 (CRT) 的 PKCS12 密钥库（使用的密码：changeit）：\n\n```\n    openssl pkcs12\
    \ -export -out keyStore.p12 -inkey serverPrivateKey.pem -in server.crt\n    ```\n\
    \n3.  从服务器证书 (CRT) 生成服务器信任库 (JKS)：\n"
- fmt: "```bash\nkeytool -import -trustcacerts -alias root -file server.crt -keystore\
    \ trustStore.jks\n```\n\nFor the client:\n\n1. Generate the client’s private key\
    \ (PEM) and a certificate signing request (CSR):\n\n```bash\nopenssl req -new\
    \ -newkey rsa:4096 -out request.csr -keyout myPrivateKey.pem -nodes\n```\n\nFor\
    \ the client and server:\n\n1. Sign a client’s certificate signing request (CSR)\
    \ with a server private key (PEM) and a related certificate (CRT):\n\n```bash\n\
    openssl x509 -req -days 360 -in request.csr -CA server.crt -CAkey serverPrivateKey.pem\
    \ -CAcreateserial -out nardone.crt -sha256\n```\n\nFor the client:\n\n1. Verify\
    \ the client’s certificate (CRT):\n\n```bash\nopenssl x509 -text -noout -in nardone.crt\n\
    ```\n\n2. Create a PKCS12 keystore (P12) containing the client’s private key (PEM)\
    \ and related self-sign certificate (CRT):\n\n```bash\nopenssl pkcs12 -export\
    \ -out client_nardone.p12 -inkey myPrivateKey.pem -in nardone.crt -certfile myCertificate.crt\n\
    ```\n\nFigures [6-21](#310331_2_En_6_Chapter.xhtml#Fig21) and [6-22](#310331_2_En_6_Chapter.xhtml#Fig22)\
    \ show some of the client commands you just executed.\n\n![../images/310331_2_En_6_Chapter/310331_2_En_6_Fig22_HTML.jpg](images/310331_2_En_6_Chapter/310331_2_En_6_Fig22_HTML.jpg)\n\
    \n**Figure 6-22** Generating a client certificate\n\n![../images/310331_2_En_6_Chapter/310331_2_En_6_Fig21_HTML.jpg](images/310331_2_En_6_Chapter/310331_2_En_6_Fig21_HTML.jpg)\n\
    \n**Figure 6-21** Client certificate commands\n\nWhen executing that last step,\
    \ it is important that when asked to introduce your name by the command-line prompt,\
    \ you use the name `nardone` because it is the username you configured in the\
    \ application configuration file. The command line will show you the following\
    \ prompt: `Common Name (e.g. server FQDN or YOUR name) []:**nardone***`. That’s\
    \ it! That process created a self-signed X509 certificate with 365 days of duration\
    \ signed with the private key.\n\n> **Note**  \n> A truststore is a repository\
    \ of certificates that are trusted by the JRE that uses such a truststore. By\
    \ default the JRE truststore trusts any certificates signed by a recognized Certificate\
    \ Authority (CA). If you have a certificate not signed by a CA (like the self-signed\
    \ certificates), you will need to add it manually to the truststore so that it\
    \ can be trusted.\n\nThe execution of that file is shown in Figure [6-23](#310331_2_En_6_Chapter.xhtml#Fig23).\
    \ That simple line created the file `trustStore.jks`, which you will use as the\
    \ trust store for the Tomcat server to accept the client certificate.\n\n![../images/310331_2_En_6_Chapter/310331_2_En_6_Fig23_HTML.jpg](images/310331_2_En_6_Chapter/310331_2_En_6_Fig23_HTML.jpg)\n\
    \n**Figure 6-23** A truststore created with an imported certificate\n\nNext, you\
    \ need to add the certificate to the browser you will use to connect to the application.\
    \ Let’s use Chrome in this example. Earlier you created the `.p12` file that contains\
    \ information about the client and server certificates and the private keys associated\
    \ with both certificates.\n\nTo import that file into the client certificates\
    \ of Chrome, do the following:\n\n1. Click Chrome ➤ Settings.\n2. Click the Advanced\
    \ tab.\n3. Click View Certificates.\n4. Click Import.\n5. Locate `client_nardone.p12`\
    \ in the directory where it is stored, and double-click it.\n6. Use `changeit`\
    \ as the password when requested.\n\nThe result can be seen in Figure [6-24](#310331_2_En_6_Chapter.xhtml#Fig24).\n\
    \n![../images/310331_2_En_6_Chapter/310331_2_En_6_Fig24_HTML.jpg](images/310331_2_En_6_Chapter/310331_2_En_6_Fig24_HTML.jpg)\n\
    \n**Figure 6-24** Importing the certificate `.p12` file into the browser\n\nThe\
    \ next step is to add the server certificate to the Trusted Root Certificate Authorities\
    \ list in the web browser, shown in Figure [6-25](#310331_2_En_6_Chapter.xhtml#Fig25).\n\
    \n![../images/310331_2_En_6_Chapter/310331_2_En_6_Fig25_HTML.jpg](images/310331_2_En_6_Chapter/310331_2_En_6_Fig25_HTML.jpg)\n\
    \n**Figure 6-25** Importing the server certificate `.crt` file into the browser\n\
    \nThe next step is to update the `application.properties` with the following lines:"
