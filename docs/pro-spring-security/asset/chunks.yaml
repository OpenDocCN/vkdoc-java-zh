- fmt: '# LDAP Authentication


    The Lightweight Directory Access Protocol (LDAP) is an application-level, message-oriented
    protocol used for storing and accessing information in the way of an accessible
    tree-like directory. A directory, in general, is simply an organized datastore
    that allows for easy queries in its particular domain. For example, a TV Guide
    is a directory that allows you to find TV shows easily, and a phone book is a
    directory that provides easy access to phone numbers.


    LDAP allows the storage of very different kinds of information in a directory.
    Probably the most widely known use of LDAP-like structures is the Microsoft Windows
    Active Directory system. Other LDAP systems are widely used to store the corporate
    user databases of many companies that serve as the centralized user store.


    LDAP is not an easy system to understand, and we will try to explain it along
    with the example that we develop in this section. We will use the same code as
    in the previous section, but modify it as needed to work with LDAP instead of
    database authentication. Remember that in the previous section, we offered a bootstrap
    application to start working in all the examples in this chapter, including this
    one.


    The first thing to do is configure your users in the LDAP directory. To do this,
    you need to understand the LDAP Information Model, which defines the type of data
    you can store in your directory.


    The data in LDAP is defined by entries, attributes, and values. An *entry* is
    the basic unit of information in the directory and commonly represents an entity
    from the real world, like a user. Entries are normally defined by a particular
    object class. Each entry in the directory has an identification known as a Distinguished
    Name (or, more commonly, DN). Each entry in the directory also has a set of *attributes*
    that describe different things about the entry. Each attribute has a type and
    one or more *values*.


    You must define the data you will need. You will use users, groups, and credentials,
    as you have been doing so far. Commonly in LDAP, the user entry definition is
    known as *People*, so you will use that name to define the user entries. Your
    user will also use the standard LDAP object class `person` to define its attributes.


    ## Installing and Configuring LDAP


    For your LDAP implementation you will download and install Apache Directory Server
    (ApacheDS) at [`https://directory.apache.org/apacheds/downloads.html`](https://directory.apache.org/apacheds/downloads.html)
    and Apache Directory Studio at [`https://directory.apache.org/studio/downloads.html`](https://directory.apache.org/studio/downloads.html).
    The installation process of both tools is straightforward and shouldn´t give you
    any issues. Consult the official web page for directions.


    Apache Directory Studio allows you to access and query the server. It is an Eclipse
    application built of plugins adapted to access LDAP servers.


    Regarding the ApacheDS server, when it is installed (at least on a Mac), it will
    be started up automatically; however, you also have the option of running the
    ApacheDS server as an embedded server within the application process instead of
    having a standalone, independent LDAP server. We will be using the standalone
    server in the example.


    First of all, you want to start ApacheDS as shown in the services list in Figure
    [6-7](#310331_2_En_6_Chapter.xhtml#Fig7).


    ![../images/310331_2_En_6_Chapter/310331_2_En_6_Fig7_HTML.jpg](images/310331_2_En_6_Chapter/310331_2_En_6_Fig7_HTML.jpg)


    **Figure 6-7** Starting ApacheDS


    After installing Apache Server and Studio, you need to connect to Server from
    Studio.


    Once the ApacheDS service is running, open Apache Studio and start the LDAP Server,
    as shown in Figure [6-8](#310331_2_En_6_Chapter.xhtml#Fig8).


    ![../images/310331_2_En_6_Chapter/310331_2_En_6_Fig8_HTML.jpg](images/310331_2_En_6_Chapter/310331_2_En_6_Fig8_HTML.jpg)


    **Figure 6-8** Starting the LDAP server


    Now you can connect Apache Studio to ApacheDS. Go to the File menu in the Studio,
    select New, and then select LDAP Connection, as shown in Figure [6-9](#310331_2_En_6_Chapter.xhtml#Fig9).
    In the LDAP connection form, enter the values to connect to the local ApacheDS
    server as shown in Figure [6-10](#310331_2_En_6_Chapter.xhtml#Fig10), using `uid=admin,ou=system`
    as the DN and `secret` as the password. You can see the host is `localhost` and
    the port is `10389`. Click Next to finish the connection configuration.


    ![../images/310331_2_En_6_Chapter/310331_2_En_6_Fig10_HTML.jpg](images/310331_2_En_6_Chapter/310331_2_En_6_Fig10_HTML.jpg)


    **Figure 6-10** Connecting to the local ApacheDS server


    ![../images/310331_2_En_6_Chapter/310331_2_En_6_Fig9_HTML.jpg](images/310331_2_En_6_Chapter/310331_2_En_6_Fig9_HTML.jpg)


    **Figure 6-9** Apache Directory Studio connecting to the LDAP server


    Once the connection to the ApacheDS server is established, you need to create
    a context entry representing the top-level entry in the local directory. To do
    so, right-click the left panel’s `Root DSE` element and then select New ➤ New
    Context Entry in the contextual menu, as shown in Figure [6-11](#310331_2_En_6_Chapter.xhtml#Fig11).


    ![../images/310331_2_En_6_Chapter/310331_2_En_6_Fig11_HTML.jpg](images/310331_2_En_6_Chapter/310331_2_En_6_Fig11_HTML.jpg)


    **Figure 6-11** Creating a new context entry top-level entry


    In the first form in New Context Entry, choose to create an entry from scratch.
    Then, from the list of available object classes in the left panel, select `dNSDomain`
    and click Add. The idea here is that you are creating the top-level entry from
    which all other entries derive. You end up with something like Figure [6-12](#310331_2_En_6_Chapter.xhtml#Fig12).
    Then click Next. In the next input form, use `dc=example,dc=com` as the DN name
    of the context entry, and click Next. These values (`example` and `com`) are the
    default values for the partition and the top-level context entry included in the
    ApacheDS server. These values also partially identify every entry you create in
    the directory because, as mentioned, LDAP follows a hierarchical structure that
    builds names for entries on top of its parent entries.


    ![../images/310331_2_En_6_Chapter/310331_2_En_6_Fig12_HTML.jpg](images/310331_2_En_6_Chapter/310331_2_En_6_Fig12_HTML.jpg)


    **Figure 6-12** Selecting the dNSDomain object class for the context entry


    The next step is to import your users, for the example, into the LDAP server.
    You will be importing a couple of users using an LDIF file. An LDIF file is a
    text file that uses LDIF formatting, a standard format for describing directory
    entries in LDAP. It allows you to import and export your directory data into or
    from another LDAP directory in a standard way or just to create new data or modify
    existing data. You use it here to import the data with your users. Listing [6-16](#310331_2_En_6_Chapter.xhtml#PC17)
    shows the LDIF file you will import. You can name this file whatever you like,
    but we call it `users.ldif` in this example.'
