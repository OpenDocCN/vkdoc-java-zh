    ## Introduction


    Denying the impact of the Spring Framework in the Java world would be simply impossible.
    Spring has brought so many advantages to the Java developer that we could say
    it has made better developers of all of us. The good ones, the average ones. All
    of us.


    The previous version of this book utilized Spring Security 3. Therefore, it is
    very important to note, in this new edition of the book, the most important changes
    from v3 to v5. Spring Security v5 is now part of Pivotal since SpringSource is
    no longer used.


    Spring Framework 5 was published in September of 2017 and it can be considered
    the first major Spring Framework release since version 4 was released in December
    of 2013.


    Spring’s core building blocks of dependency injection and aspect-oriented programming
    are widely applicable to many business and infrastructure concerns, and certainly
    application security can benefit from these core functionalities. So this is Spring
    Security: an application-level security framework built on top of the powerful
    Spring Framework that deals mainly with the core security concepts of *authentication*
    and *authorization*, which are some of the fundamental functionalities of Spring
    Security v5.


    Spring Security aims to be a full-featured security solution for your Java applications.
    Although its main focus is on web applications and the Java programming language,
    you will see that it goes beyond these two domains.


    What we wanted to do in writing this book was to expose some of the internal works
    of Spring Security along with the standard explanations of how to use certain
    features. The idea is to teach beyond the basics of how to do something in particular,
    and instead focus on the plumbing inside the framework. We find that this is the
    best way of learning something: actually seeing how it is built in the core. That’s
    not to say, of course, that the book doesn’t cover basic setups and give quick,
    practical advice on using the framework, because it certainly does. The point
    is that instead of saying, “Use this to do that,” we say, “This works like this…
    and this allows you to….” This is a point of view that only tools like Spring
    afford (because they are open source).


    With that said, we suggest that the best way to use this book is to have the Spring
    Security source code checked out on your computer and go through the examples
    with both the code from the book and the code from Spring Security itself. This
    will not only help you understand each concept as it is introduced, but will also
    teach more than one good programming trick and good practice. We recommend this
    approach for studying any software whenever you have the chance. If the source
    code is out there, grab it. Sometimes a couple lines of code teach more than a
    thousand words. In this book, we will mainly introduce Spring Boot, analyze Spring
    Framework, and develop Java Web Applications with Spring Security v5.1.5, Java
    v11, and Servlet v4. Also, Spring Security v5 supports many different authentication
    mechanisms which are introduced and developed in this book, like Database (MongoDB
    and hsqldb), LDAP, X.509, OAuth 2/OpenID, WebSockets, SON Web Token (JWT), JAAS,
    and CAS. Web development frameworks like Grails and JRuby in the context of Rails
    and Scala are also introduced in this book.


    ## Who This Book Is For


    This book is written mainly for Java developers who use Spring in their work and
    need to add security to their applications in a way that leverages Spring’s proven
    concepts and techniques. The book will also be helpful to developers who want
    to add web-layer security to their applications, even if those applications are
    not fully Spring-powered at their core. The book assumes you have knowledge of
    Java and some of its tools and libraries, such as Servlets and Maven. It also
    assumes that you know what you want to use security for and in what context you
    want to use it. This means, for example, we won’t explain protocols like LDAP
    in much depth; instead, we’ll concentrate on showing you how to integrate Spring
    Security with an LDAP user store. An in-depth knowledge of Spring is not essential
    because many of the concepts are introduced as we go along, but the more you understand
    about Spring, the more you are likely to get out of this book.'
