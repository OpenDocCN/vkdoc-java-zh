- fmt: "# Summary\n\nThis was a complex chapter, but going through the inner workings\
    \ of a software tool is definitely the best way to understand it and take advantage\
    \ of it. And that is what you did. You got an in-depth explanation of Spring Security's\
    \ architecture, its major components, and the way it works from the inside.\n\n\
    You should now understand how the XML namespace works, how AOP fits into the framework,\
    \ and how, in general, the Servlet Filter functionality is used to enforce web-level\
    \ security.\n\nWe demystified the \"Spring magic\" by going through all the components\
    \ that help you add security to your applications in a seemingly simple way.\n\
    \nYou looked at some code snippets from the framework itself to get a greater\
    \ appreciation of the work done in it, as well as to understand better why things\
    \ work the way they do.\n\nYou also studied the modularity inherent in the framework\
    \ and saw how it helps to create software that is both flexible and extensible.\n\
    \nEven with all we covered in this chapter, this was basically an introduction\
    \ and a reference to have in hand when you read the upcoming chapters and you\
    \ start looking at the options to secure your applications. From now on, you will\
    \ understand where everything fits in the framework and how the different components\
    \ link to each other.\n\nIn the next chapter, you will start developing an example\
    \ application. In the beginning, it will be a simple web application, and you\
    \ will see how to secure it. You will use all your current knowledge of the framework\
    \ to tweak the configuration and test different ways of implementing security\
    \ at the web level.\n\n## 5. Web Security\n\nIn this chapter, we will continue\
    \ explaining how to apply security at the web layer for the Java Web-Based Applications\
    \ you started in Chapter [3](#310331_2_En_3_Chapter.xhtml). You will see in detail\
    \ the inner work of the security filter chain and the different metadata options\
    \ at your disposal to define security constraints in your application. We will\
    \ also explain in detail the taglib facility for enforcing security constraints\
    \ at the view level, which was also introduced in Chapter [3](#310331_2_En_3_Chapter.xhtml).\n\
    \n### Introducing the Simple Example Application\n\nIn this chapter, you will\
    \ be working on a simple test web application named `favoritesmovies`. The application\
    \ itself will be very simple. (It won't have any really useful functionality).\
    \ However, we will try to cover most of the options available for securing web\
    \ applications with Spring Security, even if some of the options don't seem realistic\
    \ for an application of this kind.\n\nFirst, you will set up the application.\
    \ As in Chapter [3](#310331_2_En_3_Chapter.xhtml), you will create a Java Web\
    \ Application and include Maven as the framework. Again, you will assume certain\
    \ versions of the different tools you need. Mainly, you will use Java 11 and Maven\
    \ 3.6.0 as you did in Chapter [3](#310331_2_En_3_Chapter.xhtml).\n\nCreate the\
    \ project as shown in Figure [5-1](#310331_2_En_5_Chapter.xhtml#Fig1).\n\n![../images/310331_2_En_5_Chapter/310331_2_En_5_Fig1_HTML.jpg](images/310331_2_En_5_Chapter/310331_2_En_5_Fig1_HTML.jpg)\n\
    \n**Figure 5-1** Creating a new dynamic web application\n\nNow you have an empty\
    \ web project. The next step will be to convert it to Maven project. At the moment,\
    \ you will use the same dependencies you had in your program from Chapter [3](#310331_2_En_3_Chapter.xhtml).\
    \ So make sure your `pom.xml` file has the content from Listing [5-1](#310331_2_En_5_Chapter.xhtml#PC1).\n\
    \n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<project xmlns=\"http://maven.apache.org/POM/4.0.0\"\
    \n         xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n         xsi:schemaLocation=\"\
    http://maven.apache.org/POM/4.0.0 \n         http://maven.apache.org/xsd/maven-4.0.0.xsd\"\
    >\n    <modelVersion>4.0.0</modelVersion>\n    <groupId>com.apress.pss</groupId>\n\
    \    <artifactId>favoritesmovies</artifactId>\n    <version>1.0-SNAPSHOT</version>\n\
    \    <packaging>war</packaging>\n    <name>pss01_favoritesmovies</name>\n    <build>\n\
    \        <plugins>\n            <plugin>\n                <groupId>org.apache.maven.plugins</groupId>\n\
    \                <artifactId>maven-compiler-plugin</artifactId>\n            \
    \    <version>3.2</version>\n            </plugin>\n            <plugin>\n   \
    \             <groupId>org.apache.maven.plugins</groupId>\n                <artifactId>maven-war-plugin</artifactId>\n\
    \                <version>2.4</version>\n                <configuration>\n   \
    \                 <webXml>src/main/webapp/WEB-INF/web.xml</webXml>\n         \
    \           <failOnMissingWebXml>false</failOnMissingWebXml>\n               \
    \     <warName>pss01_Security</warName>\n                </configuration>\n  \
    \          </plugin>\n        </plugins>\n        <finalName>favoritesmovies</finalName>\n\
    \    </build>\n</project>\n```\n\n**Listing 5-1** First `pom.xml` for `favoritesmovies`\n\
    \nAs shown previously, when creating a new Java Web Application project, a new\
    \ `index.jsp` page is automatically generated under the `WEB-INF` folder. Just\
    \ to test that it works, update the `.jsp` file to show simple \"Hello World!\"\
    \ text, and then compile and execute the application running on the external Tomcat\
    \ v9, as you did in Chapter [3](#310331_2_En_3_Chapter.xhtml).\n\nIf you open\
    \ your browser and go to `http://localhost:8080/favoritesmovies`, you will see\
    \ the message \"Hello World!\" as the output of the `index.jsp` web page, as shown\
    \ in Figure [5-2](#310331_2_En_5_Chapter.xhtml#Fig2).\n\n![../images/310331_2_En_5_Chapter/310331_2_En_5_Fig2_HTML.jpg](images/310331_2_En_5_Chapter/310331_2_En_5_Fig2_HTML.jpg)\n\
    \n**Figure 5-2** The first iteration of the application displays the simple Hello\
    \ World! page\n\nLet's start adding the security to this example.\n\nFirst, you\
    \ need to configure `pom.xml` with the Spring Security 5 dependencies shown and\
    \ explained in Chapter [3](#310331_2_En_3_Chapter.xhtml), such as:\n\n* `spring-security-web`\n\
    * `spring-security-config`\n* `spring-security-taglibs`\n\nUpdate your `pom.xml`\
    \ file as shown in Listing [5-2](#310331_2_En_5_Chapter.xhtml#PC2).\n\n```\n<?xml\
    \ version=\"1.0\" encoding=\"UTF-8\"?>\n<project xmlns=\"http://maven.apache.org/POM/4.0.0\"\
    \n         xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n         xsi:schemaLocation=\"\
    http://maven.apache.org/POM/4.0.0 \n         http://maven.apache.org/xsd/maven-4.0.0.xsd\"\
    >\n    <modelVersion>4.0.0</modelVersion>\n    <groupId>com.apress.pss</groupId>\n\
    \    <artifactId>favoritesmovies</artifactId>\n    <version>1.0-SNAPSHOT</version>\n\
    \    <packaging>war</packaging>\n    <name>pss01_favoritesmovies</name>\n    \n\
    \    <properties>\n        <springframework.version>5.1.5.RELEASE</springframework.version>\n\
    \        <springsecurity.version>5.1.5.RELEASE</springsecurity.version>\n    </properties>\n\
    \    \n    <dependencies>\n        <dependency>\n            <groupId>org.springframework</groupId>\n\
    \            <artifactId>spring-core</artifactId>\n            <version>${springframework.version}</version>\n\
    \        </dependency>\n        <dependency>\n            <groupId>org.springframework</groupId>\n\
    \            <artifactId>spring-web</artifactId>\n            <version>${springframework.version}</version>\n\
    \        </dependency>\n        <dependency>\n            <groupId>org.springframework</groupId>\n\
    \            <artifactId>spring-webmvc</artifactId>\n            <version>${springframework.version}</version>\n\
    \        </dependency>\n        <dependency>\n            <groupId>org.springframework.security</groupId>\n\
    \            <artifactId>spring-security-web</artifactId>\n            <version>${springsecurity.version}</version>\n\
    \        </dependency>\n        <dependency>\n            <groupId>org.springframework.security</groupId>\n\
    \            <artifactId>spring-security-config</artifactId>\n            <version>${springsecurity.version}</version>\n\
    \        </dependency>\n        <dependency>\n            <groupId>javax.servlet</groupId>\n\
    \            <artifactId>javax.servlet-api</artifactId>\n            <version>4.0.1</version>\n\
    \        </dependency>\n        <dependency>\n            <groupId>javax.servlet.jsp</groupId>\n\
    \            <artifactId>javax.servlet.jsp-api</artifactId>\n            <version>2.3.3</version>\n\
    \        </dependency>\n        <dependency>\n            <groupId>javax.servlet</groupId>\n\
    \            <artifactId>jstl</artifactId>\n            <version>1.2</version>\n\
    \        </dependency>\n        <dependency>\n            <groupId>taglibs</groupId>\n\
    \            <artifactId>standard</artifactId>\n            <version>1.1.2</version>\n\
    \        </dependency>\n        <dependency>\n            <groupId>org.springframework.security</groupId>\n\
    \            <artifactId>spring-security-taglibs</artifactId>\n            <version>5.1.5.RELEASE</version>\n\
    \        </dependency>\n    </dependencies>\n    \n    <build>\n        <plugins>\n\
    \            <plugin>\n                <groupId>org.apache.maven.plugins</groupId>\n\
    \                <artifactId>maven-compiler-plugin</artifactId>\n            \
    \    <version>3.2</version>\n            </plugin>\n            <plugin>\n   \
    \             <groupId>org.apache.maven.plugins</groupId>\n                <artifactId>maven-war-plugin</artifactId>\n\
    \                <version>2.4</version>\n                <configuration>\n   \
    \                 <webXml>src/main/webapp/WEB-INF/web.xml</webXml>\n         \
    \           <failOnMissingWebXml>false</failOnMissingWebXml>\n               \
    \     <warName>favoritesmovies</warName>\n                </configuration>\n \
    \           </plugin>\n        </plugins>\n        <finalName>favoritesmovies</finalName>\n\
    \    </build>\n</project>\n```\n\n**Listing 5-2** `pom.xml` with All the Security\
    \ and Framework Dependencies\n\nCreate a new folder named `view` under the `WEB-INF`\
    \ folder. It will hold all your `.jsp` web pages.\n\nNext, import all the Java\
    \ classes you used in Chapter [3](#310331_2_En_3_Chapter.xhtml).\n\nUnder the\
    \ Java package `com.apress.pss.springsecurity.controller`, copy:\n\n* `UserController`\n\
    \nUnder the Java package `com.apress.pss.springsecurity.configuration`, copy:\n\
    \n* `AppInitializer`\n* `SecurityConfiguration`\n* `SpringSecurityInitializer`\n\
    * `UserConfiguration`\n\nNote that, for the purposes of web security, it doesn't\
    \ really matter if you use a Spring MVC controller, like you do here, or if you\
    \ use simple servlets, as you did in Chapter [3](#310331_2_En_3_Chapter.xhtml),\
    \ or for that matter, if you use any other Servlet-based framework for developing\
    \ your application. Remember that, at the core, the web part of Spring Security\
    \ basically attaches itself to the standard Java servlet filter architecture.\
    \ So if your application uses servlets and filters, you can leverage Spring Security's\
    \ web support.\n\nSince Spring Framework 4.3, there are some new HTTP mapping\
    \ annotations based on `@RequestMapping`:\n\n* `@GetMapping`\n* `@PostMapping`\n\
    * `@PutMapping`\n* `@DeleteMapping`\n* `@PatchMapping`\n\nFor instance, `@GetMapping`\
    \ is a specialized version of the `@RequestMapping` annotation, which will act\
    \ as a shortcut for `@RequestMapping(method = RequestMethod.GET)`. `@GetMapping`\
    \ annotated methods handle the HTTP GET requests matched with a certain given\
    \ URI expression.\n\nNow that you've copied the Java classes from Chapter [3](#310331_2_En_3_Chapter.xhtml),\
    \ you can start making changes to them.\n\nLet's start with the Java controller\
    \ file, where using `@GetMapping` you define the controls with values `/`, `/index`,\
    \ and `/movies`, which will trigger the `index.jsp` and `movies.jsp` pages.\n\n\
    The `UserController` Java class can be found in Listing [5-3](#310331_2_En_5_Chapter.xhtml#PC3)."
