  trans: "\n### 访问控制列表\n\n访问控制列表（ACL）是上一节所述授权过程的一部分。关键区别在于，ACL 通常在应用程序中以更细粒度的级别工作。ACL\
    \ 仅仅是资源、用户和权限之间映射关系的集合。通过 ACL，你可以建立诸如“用户 John 对博客文章 X 拥有管理权限”或“用户 Luis 对博客文章 X\
    \ 拥有读取权限”之类的规则。你可以看到三个要素：用户、权限和资源。图 1-3 展示了 ACL 的工作原理；它们只是通用授权过程的一个特例。\n\n## 身份验证与授权：基本概念\n\
    \n在本节中，我们将介绍并解释一些基本的安全概念，你在本书后续部分会经常遇到它们：\n\n*   **用户**：保护系统免受恶意攻击者侵害的第一步是识别合法用户并仅允许他们访问。系统中会创建用户抽象并赋予其独立身份。这些用户就是之后被允许使用系统的人。\n\
    \n*   **凭证**：凭证是用户证明自己身份的方式。通常以密码的形式出现（证书也是提供凭证的常见方式），它们是只有其所有者才知道的数据。\n\n*  \
    \ **角色**：在应用程序安全上下文中，角色可以被视为用户的逻辑分组。进行这种逻辑分组通常是为了让分组后的用户在应用程序中共享一组访问特定资源的权限。例如，所有拥有管理员角色的用户将对相同资源拥有相同的访问权限。角色仅仅是一种将权限分组以执行特定操作的方式，使得拥有这些角色的用户继承这些权限。\n\
    \n*   **资源**：在此上下文中，*资源* 指的是我们想要访问的、并且需要妥善保护以防止未授权访问的应用程序的任何部分——例如，一个 URL、一个业务方法或一个特定的业务对象。\n\
    \n*   **权限**：权限指的是访问特定资源所需的访问级别。例如，可能允许两个用户读取某个特定文档，但只允许其中一人对其进行写入。权限可以应用于单个用户，也可以应用于共享特定角色的用户。\n\
    \n*   **加密**：这允许你对敏感信息（通常是密码，但也可能是其他内容，如 cookies）进行加密，即使攻击者获得了加密版本，也无法理解其内容。其理念是，你永远不要存储密码的明文版本，而是存储加密版本，这样除了密码所有者之外，没有人知道原始密码。主要有三种加密算法：\n\
    \    *   **单向加密**：这些算法被称为*哈希算法*，它们接收一个输入字符串并生成一个称为*消息摘要*的输出数字。这个输出数字无法转换回原始字符串。这就是该技术被称为*单向加密*的原因。使用方法如下：请求客户端加密一个字符串并将加密后的字符串发送给服务器。例如，服务器可能通过之前的注册过程拥有原始信息，如果有，它可以对原始信息应用相同的哈希函数。然后它将哈希运算的输出与客户端发送的值进行比较。如果匹配，服务器就验证该信息。图\
    \ 1-4 展示了这一方案。通常，服务器甚至不需要原始数据。它可以简单地存储哈希版本，然后将其与客户端传入的哈希值进行比较。\n\n![../images/310331_2_En_1_Chapter/310331_2_En_1_Fig4_HTML.jpg](img/310331_2_En_1_Fig4_HTML.jpg)\n\
    \n图 1-4\n\n单向加密或哈希\n\n*   **对称加密**：这些算法提供两种功能：加密和解密。一段文本字符串被转换成加密形式，然后可以再转换回原始字符串。在这种方案中，发送方和接收方共享相同的密钥，以便他们可以在通信的两端加密和解密消息。这种方案的一个问题是如何在通信端点之间共享密钥。一种常见的方法是使用并行的安全通道来发送密钥。图\
    \ 1-5 展示了对称加密的工作原理。\n\n![../images/310331_2_En_1_Chapter/310331_2_En_1_Fig5_HTML.jpg](img/310331_2_En_1_Fig5_HTML.jpg)\n\
    \n图 1-5\n\n对称加密。两个端点共享相同的加密/解密密钥\n\n*   **公钥密码学**：这些技术基于非对称密码学。在这种方案中，用于加密和解密的密钥是不同的。这两个密钥分别被称为*公钥*（用于加密消息）和*私钥*（用于解密消息）。与对称加密相比，这种方法的好处是不需要共享解密密钥，因此除了信息的预期接收者之外，没有人能够解密消息。所以通常的场景如下：\n\
    \    *   消息的预期接收者将她的公钥分享给所有有兴趣向她发送信息的人。\n\n*   发送方使用接收方的公钥加密信息，并发送消息。\n\n*   接收方使用她的私钥解密消息。\n\
    \n*   没有其他人能够解密消息，因为他们没有接收方的私钥。\n\n图 1-6 展示了公钥密码学方案。\n\n![../images/310331_2_En_1_Chapter/310331_2_En_1_Fig6_HTML.jpg](img/310331_2_En_1_Fig6_HTML.jpg)\n\
    \n图 1-6\n\n公钥密码学\n\n加密的使用，除了其他方面，还实现了另外两个安全目标：\n\n*   **机密性**：属于某个用户或用户组的潜在敏感信息，应仅能由该用户或用户组访问。加密算法是实现此目标的主要帮手。\n\
    \n*   **完整性**：由合法用户发送的数据，在传输到服务器的途中或在其存储过程中，不应被第三方篡改。这通常通过使用单向加密算法来实现，这些算法使得几乎不可能在篡改输入后产生一个损坏的消息，同时其加密哈希值与原始消息相同（从而欺骗接收者认为它是有效的）。\n"
- fmt: '# What to Secure


    Not every part of the application requires a strong security model, or even any
    security at all. If, for example, one part of your application is supposed to
    serve static content to everyone interested in it, you can simply serve this content.
    There probably are no security concerns to handle here.


    Anyway, when starting to work on a new application, you should think about the
    security constraints that your application will have. You should think about concerns
    like those in the following list and whether or not they apply to your particular
    use case:


    - **Identity management**: More than likely, your application will need to establish
    the identities of the different users that will be using it. Usually, your application
    will do different things for different users, so you need a way to associate users
    with certain functionality. You also need to be sure to protect each user’s identity
    information so that it can’t be compromised.

    - **Secured connections**: In an internet environment, where anyone in the world
    can potentially access your system and eavesdrop on other users accessing your
    system, you most likely will want to secure the communication of sensitive data
    using some kind of transport layer security, such as SSL.

    - **Sensitive data protection**: Sensitive data will need to be protected against
    malicious attacks. This applies to the communication layer and to individual message
    transmission, as well as to credentials datastores. Encryption should be used
    in different layers to achieve the most secure application possible.


    ## More Security Concerns


    There are many more security concerns than the ones explained so far. Because
    this is a Spring Security book and not a general application-security book, we
    will cover only things related to Spring Security. However, we think it is important
    that you understand that there are many more security concerns than those addressed
    directly by Spring Security. The following is a quick overview of some of the
    most common ones. This is only intended to make you aware of their existence,
    and we recommend you consult a different source (such as a general software security
    textbook) to gain a better understanding of all these concerns.


    - **SQL (and other code) injection**: Validating user input is a very important
    part of application security. If data is not validated, an attacker could potentially
    write any kind of string as input (including SQL or server-side code) and send
    that information to the server. If the server code is not properly written, the
    attacker could wreak significant havoc because she could execute any arbitrary
    code on the server.

    - **Denial of service attacks**: These attacks consist of making the target system
    unresponsive to its intended users. This is normally done by saturating the server
    with requests so that it utilizes all the server’s resources and makes it unresponsive
    to legitimate requests.

    - **Cross-site scripting and output sanitation**: A kind of injection can be done
    where the target is the client part of the application. The idea is that the attacker
    can make an application return malicious code inside the web pages returned, and
    thus execute it in the user’s browser. This way, the attacker invisibly executes
    actions using the real user’s authenticated session.


    ## Java Options for Security


    Java and Java EE out-of-the-box security solutions are very comprehensive. They
    cover areas ranging from a low-level permission system, through cryptography APIs,
    to an authentication and authorization scheme.


    The list of security APIs offered in Java is very extensive, as the following
    list of the main ones shows:


    - **Java Cryptography Architecture (JCA)**: This API offers support for cryptographic
    algorithms, including hash-digest and digital-signature support.

    - **Java Cryptographic Extensions (JCE)**: This API mainly provides facilities
    for the encryption and decryption of strings and also secret key generation for
    symmetric algorithms.

    - **Java Certification Path API (CertPath)**: This API provides comprehensive
    functionality for integrating the validation and verification of digital certificates
    into an application.

    - **Java Secure Socket Extension (JSSE)**: This API provides a standardized set
    of features to offer support for SSL and TLS protocols, both client and server,
    in Java.

    - **Java Authentication and Authorization Service (JAAS)**: This API provides
    service for authentication and authorization in Java applications. It provides
    a pluggable system where authentication mechanisms can be plugged in independently
    to applications.


    Please refer to this link for the entire list of Java 11 Security APIs: [`https://docs.oracle.com/en/java/javase/11/security/java-security-overview1.html#GUID-2EF0B3B8-9F3A-41CF-A7DA-63DB52180084`](https://docs.oracle.com/en/java/javase/11/security/java-security-overview1.html%2523GUID-2EF0B3B8-9F3A-41CF-A7DA-63DB52180084).


    Figure [1-7](#310331_2_En_1_Chapter.xhtml#Fig7) shows the Java platform security
    architecture and elements.


    ![../images/310331_2_En_1_Chapter/310331_2_En_1_Fig7_HTML.jpg](images/310331_2_En_1_Chapter/310331_2_En_1_Fig7_HTML.jpg)


    Figure 1-7


    Java platform security architecture and elements


    Spring Security’s main concerns are in the authentication/authorization realm.
    So it overlaps mainly with the JAAS Java API, although they can be used together,
    as you will see later in the book. Most of the other APIs are leveraged in Spring
    Security. For example, `CertPath` is used in `X509AuthenticationFilter` and `JCE`
    is used in the `spring-security-crypto` module.


    ## Summary


    In this chapter, we introduced security from a general point of view down to defense
    in depth (DiD) and its mechanisms. We explained in a very abstract way the main
    concerns in IT security and especially from an application point of view. We also
    described, very briefly, the main Java APIs that support security at different
    levels.


    You can see that this chapter was a very quick overview of security concerns.
    It is beyond the scope of this book to go any further than this on general topics,
    although we will study some of them in more depth when they apply to Spring Security.
    Obviously, this is nothing like a comprehensive software security guide, and if
    you are interested in learning more about software security in general, you should
    consult the specialized literature. The next chapter will introduce Spring Security
    as such.


    Footnotes [1](#310331_2_En_1_Chapter.xhtml#Fn1_source)


    # Introducing Spring Security


    In this chapter, you will learn what Spring Security is and how you can use it
    to address security concerns about your application.


    We will also describe what’s new in Spring Framework and Security version 5. How
    to use Spring Security v5 with authentication and authorization will be introduced
    a bit more in detail since we will be using them a lot in this book.


    Finally, we’ll take a look at the framework’s source code, how to build it, and
    the different modules that together form the powerful Spring Security project.'
