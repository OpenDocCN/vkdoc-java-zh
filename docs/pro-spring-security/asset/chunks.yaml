  trans: "\n接入 Spring Security 事件系统\n\nSpring Security 支持一种基于 Spring 框架自身事件模型构建的事件模型。你可以利用\
    \ Spring 的事件模型来开发能够监听框架内发生的不同事件并做出相应处理的应用程序。\n\n我们不会深入解释为何事件模型是一种如此强大的编程实践。我们只想指出一个巨大的优势：它允许你解耦应用程序，因为通常来说，事件生产者（一个或多个）和事件消费者（一个或多个）无需了解彼此的任何信息即可正常运行。理论上（实际上，对于一般事件而言，尽管\
    \ Spring 事件并非如此），你可以拥有一个完全异构的应用程序，其中每个模块都可以按照自己的节奏编写和演进，而不影响其他部分，然后通过专门使用事件将它们全部集成在一起。\n\
    \n所有 Spring 事件都应继承自抽象类 `org.springframework.context.ApplicationEvent`，Spring Security\
    \ 自身的事件也不例外。\n\n`ApplicationEvent` 抽象类的一个主要具体实现是 `org.springframework.context.event.ApplicationContextEvent`，它本身作为一系列涉及应用程序上下文生命周期的事件（`ContextClosedEvent`、`ContextRefreshedEvent`、`ContextStartedEvent`\
    \ 和 `ContextStoppedEvent`）的父类。\n\n要注册你的应用程序以接收 Spring 事件的通知，你需要在你应用程序中定义的一个（或多个）Bean\
    \ 实现接口 `org.springframework.context.ApplicationListener<E extends ApplicationEvent>`。该接口定义了一个单一方法\
    \ `void onApplicationEvent(E event)`，你可以使用它来监听应用程序中的特定类型事件。\n\n发布事件同样简单。你只需要在你的\
    \ Spring 应用程序上下文中定义一个实现接口 `org.springframework.context.ApplicationEventPublisherAware`\
    \ 的 Bean，该接口同样只定义了一个方法：\n\n```\nvoid setApplicationEventPublisher(ApplicationEventPublisher\
    \ applicationEventPublisher)\n```\n\n当应用程序启动时，Spring 会自动调用此方法，并传入一个 `ApplicationEventPublisher`\
    \ 的实例（因为它是接口，所以传入的是其实现类）。传入的 `ApplicationEventPublisher` 实例通常是包含该应用程序的 `ApplicationContext`\
    \ 实例本身。\n\n`ApplicationEventPublisher` 的 `publishEvent` 方法（位于 `AbstractApplicationContext`\
    \ 类中）的默认实现将事件的发布委托给 `ApplicationEventMulticaster` 的实现——目前唯一的实现是 `org.springframework.context.event.SimpleApplicationEventMulticaster`。\n\
    \n向所有感兴趣的监听器广播事件也很直接。你只需创建一个 `ApplicationEvent` 实现类（任何子类都可以作为事件）的实例，然后调用 `ApplicationEventPublisher`\
    \ 的 `publishEvent(ApplicationEvent event)` 方法，并将你的 `ApplicationEvent` 实例传递给它。然后\
    \ Spring 会负责确保所有注册了该特定事件的监听器都收到事件发布的通知。默认情况下，所有监听器都在与发布者相同的线程上被调用；但是，你也可以配置一个\
    \ `org.springframework.core.task.TaskExecutor`（这是一个接口，因此你可以使用像 `org.springframework.core.task.SimpleAsyncTaskExecutor`\
    \ 这样的实现类）来在不同的线程中调用监听器。在示例中配置监听器时，你将用到这一点。\n\nSpring Security 自带了一套自己的 `ApplicationEvent`\
    \ 实现，因此你可以以一种不引人注目且解耦的方式接入安全生命周期的不同节点。Spring Security 提供的 `ApplicationEvent` 实现被归类为\
    \ `Authorization`、`Authentication` 或 `javax.servlet.http.Session` 类型，并且它们具有描述性的名称，暗示了它们的功能和发布位置。在这里，我们将对它们以及它们在框架内何时发布进行具体解释。\n\
    \nSpring 中的事件工作方式如图 8-1 所示。\n\n![../images/310331_2_En_8_Chapter/310331_2_En_8_Fig1_HTML.jpg](img/310331_2_En_8_Fig1_HTML.jpg)\n\
    \n图 8-1\n Spring 事件机制。Spring Security 拥有自己的一套 ApplicationEvent 实现\n\n授权相关事件\n\n\
    这些是与授权过程可能经历的不同阶段相关的事件——例如，在授权失败时通知用户。此类别下的事件如下：\n\n*   `org.springframework.security.access.event.AbstractAuthorizationEvent`：这是所有其他授权事件的父类。它实际上并没有在\
    \ `ApplicationEvent` 之上添加任何功能。它更像是一个标记，用于标识其所有子类为授权事件。\n\n*   `org.springframework.security.access.event.AuthenticationCredentialsNotFoundEvent`：此事件用于指示无法从配置的\
    \ `SecurityContext` 中获取 `Authentication` 对象。此事件由 `AbstractSecurityInterceptor`\
    \ 的 `beforeInvocation` 方法在决定调用应具有安全性但拦截器在安全上下文中未找到所需的 `Authentication` 对象时广播。简单来说，如果条件\
    \ `SecurityContextHolder.getContext().getAuthentication() == null` 为 `true`，则会执行此事件。\n"
- fmt: "*   `org.springframework.security.access.event.AuthorizationFailureEvent`:\
    \  \n    此事件表示`Authentication`对象的主体因缺少访问安全对象所需的权限而被拒绝访问。该事件由`AbstractInterceptor`的`beforeInvocation`和`afterInvocation`方法在捕获到`AccessDeniedException`时发布。`AccessDeniedException`可由`org.springframework.security.access.AccessDecisionManager`的`decide`方法（在拦截器的预处理阶段）以及`org.springframework.security.access.intercept.AfterInvocationProviderManager`的`decide`方法（在拦截器的后处理阶段）抛出。\n\
    \n*   `org.springframework.security.access.event.AuthorizedEvent`:  \n    此事件在安全对象的访问被授予之后、实际调用安全对象之前发布。默认情况下不发布此事件，如需发布，需在安全拦截器中设置属性`publishAuthorizationSuccess`为`true`。\n\
    \n*   `org.springframework.security.access.event.LoggerListener`:  \n    此事件将拦截器相关的应用程序事件输出到Commons\
    \ Logging，因此所有失败事件将以警告级别记录，所有成功事件将以信息级别记录，所有公共调用事件将以调试级别记录。\n\n*   `org.springframework.security.access.event.PublicInvocationEvent`:\
    \  \n    此事件由`AbstractSecurityInterceptor`的`beforeInvocation`方法发布，每当安全对象接收到对非安全入口点（即未配置`ConfigAttribute`的方法）的调用时触发。在方法安全场景中，这意味着当对象的安全代理被调用时，如果特定被调用方法未配置安全元数据，则将其视为非安全公共调用。然而，并非简单调用该方法，而是在执行前广播一个事件，以通知对此感兴趣的任何监听器：已发生公共调用。这可能指向一种情况，即实际需要保护端点，而通过该事件您将获知尚未进行保护。事件发布后，拦截器将不再对此调用执行任何预处理或后处理。如果拦截器中的属性`rejectPublicInvocations`设置为`true`（该属性属于`AbstractSecurityInterceptor`类），则不会发布事件，而是抛出`IllegalArgumentException`，提示未配置`ConfigAttribute`的情况下无法执行特定调用。这意味着需要处理配置错误。\n\
    \n更多信息请访问：[https://docs.spring.io/spring-security/site/docs/5.1.4.RELEASE/api/org/springframework/security/access/event/AbstractAuthorizationEvent.html](https://docs.spring.io/spring-security/site/docs/5.1.4.RELEASE/api/org/springframework/security/access/event/AbstractAuthorizationEvent.html)\n\
    \n图[8-2](#310331_2_En_8_Chapter.xhtml#Fig2)以UML（统一建模语言）形式展示了这些事件类和接口。\n\n![../images/310331_2_En_8_Chapter/310331_2_En_8_Fig2_HTML.jpg](images/310331_2_En_8_Chapter/310331_2_En_8_Fig2_HTML.jpg)\n\
    \n**图8-2** 授权相关事件\n\n### 认证相关事件\n\n这些事件与应用程序中的认证过程及其经历的各个阶段相关，例如通知感兴趣的监听器账户已禁用或凭据已过期。认证事件由`org.springframework.security.authentication.AuthenticationEventPublisher`的实现发布，该实现由`org.springframework.security.authentication.ProviderManager`类调用。默认情况下，`ProviderManager`中配置的`AuthenticationEventPublisher`是`NullEventPublisher`的实例，这是`ProviderManager`类内部定义的私有静态类，不发布任何事件。如果您自行配置Bean，可以使用`AuthenticationEventPublisher`接口的默认实现：`org.springframework.security.authentication.DefaultAuthenticationEventPublisher`。在使用`<http>`元素进行Web层安全配置时，默认会配置此实例。\n\
    \n`DefaultAuthenticationEventPublisher`的工作方式如下：它仅实现`AuthenticationEventPublisher`接口的两个公共方法，即`publishAuthenticationSuccess`和`publishAuthenticationFailure`。这两个方法对应尝试认证时的两种可能场景；然而，在认证失败的情况下，原因可能多种多样，正如接下来将展示的大量`AuthenticationFailureXXXEvent`实例所示。在认证失败时，`DefaultAuthenticationEventPublisher`会收到对`publishAuthenticationFailure`方法的调用，然后查询认证被拒绝时抛出的异常（例如`UsernameNotFoundException`）与该异常对应的事件（例如`AuthenticationFailureBadCredentialsEvent`）之间的映射关系。随后，通过反射创建该事件的实例并发布。您可以使用`DefaultAuthenticationEventPublisher`提供的`setAdditionalExceptionMappings`方法，向异常与事件之间的默认映射中添加更多映射。\n\
    \n框架中当前与认证相关的事件如下：\n\n*   `org.springframework.security.authentication.event.AbstractAuthenticationEvent`：\
    \  \n    这是所有其他认证相关事件的父类。它不引入任何特定功能，仅用于对认证事件进行分类。\n\n*   `org.springframework.security.authentication.event.AbstractAuthenticationFailureEvent`：\
    \  \n    这是所有认证失败事件的父类。它继承自`AbstractAuthenticationEvent`，但增加了一个构造函数，该构造函数接收认证失败时抛出的异常。\n\
    \n*   `org.springframework.security.authentication.event.AuthenticationFailureBadCredentialsEvent`：\
    \  \n    当系统在认证过程中抛出`BadCredentialsException`时发布此事件。该异常由不同的`AuthenticationProvider`实现在检查`Authentication`对象的凭据无效时抛出。当抛出`UsernameNotFoundException`时也会发布此事件。`UsernameNotFoundException`通常由`UserDetailsService`实现在找不到与传入用户名对应的用户时抛出，并由`AuthenticationProvider`简单传播。\n\
    \n*   `org.springframework.security.authentication.event.AuthenticationFailureCredentialsExpiredEvent`：\
    \  \n    当抛出`CredentialsExpiredException`时发布此事件。例如，当代表用户的`UserDetails`对象从`isCredentialsNotExpired`方法返回`false`时，`AbstractUserDetailsAuthenticationProvider`的实现会抛出此异常。"
  raw: "*   `org.springframework.security.access.event.AuthorizationFailureEvent`:\n\
    \    This event indicates that the `Authentication`\n    object’s principal was\
    \ not allowed access to a secured object because it\n    lacked the required permissions\
    \ to access it. This event is published by\n    the `AbstractInterceptor`’s\n\
    \    `beforeInvocation` and\n    `afterInvocation`\n    methods when it catches\
    \ an `AccessDeniedException`.\n    An `AccessDeniedException`\n    can be thrown\
    \ by the `org.springframework.security.access.AccessDecisionManager`’s\n    `decide`\
    \ method\n    in the preprocessing phase of the interceptor, and by the `org.springframework.security.access.intercept.AfterInvocationProviderManager`’s\n\
    \    `decide` method\n    in the postprocess part of the interceptor.\n\n*   `org.springframework.security.access.event.AuthorizedEvent`:\n\
    \    This event is published after access to a secured object has been\n    granted\
    \ and before actually invoking the secured object. This event is\n    not published\
    \ by default, and if you want it to be published, you need\n    to set the property\
    \ `publishAuthorizationSuccess`\n    to `true` in the\n    security interceptor.\n\
    \n*   `org.springframework.security.access.event. LoggerListener`: This event\
    \ outputs interceptor-related\n    application events to Commons Logging, so all\
    \ failures will be logged at\n    the warning level, all with success events will\
    \ be logged at the\n    information level, and all public invocation events will\
    \ be logged at\n    the debug level.\n\n*   `level.org.springframework.security.access.event.PublicInvocationEvent`:\n\
    \    This event is published by the `AbstractSecurityInterceptor`’s\n    `beforeInvocation`\n\
    \    method whenever a secured object receives an invocation to a nonsecured\n\
    \    entry point (that is, a method without `ConfigAttribute`\n    configured).\
    \ In the case of method security, this means that when an\n    object’s security\
    \ proxy is invoked, if the particular invoked method is\n    not configured with\
    \ security metadata, it is then handled as a\n    nonsecured public call. However,\
    \ instead of simply invoking the method,\n    an event is broadcasted just before\
    \ proceeding to inform to any listener\n    interested in this fact that this\
    \ (a public invocation) has happened.\n    This could point to a case when you\
    \ actually need to secure the endpoint\n    and, thanks to the event, you will\
    \ be notified that you haven’t done so.\n    After the event is published, no\
    \ more preprocessing or postprocessing is\n    executed for this invocation on\
    \ the interceptor. If the property `rejectPublicInvocations`\n    is set to `true`\n\
    \    in the interceptor (the property is part of the `AbstractSecurityInterceptor`\n\
    \    class), the event will not be published, and instead an `IllegalArgumentException`\n\
    \    will be thrown saying that the particular invocation cannot be done\n   \
    \ without the `ConfigAttribute`(s)\n    configured. This means that a configuration\
    \ error needs to be taken care\n    of.\n\n`More info can be found at` [`https://docs.spring.io/spring-security/site/docs/5.1.4.RELEASE/api/org/springframework/security/access/event/AbstractAuthorizationEvent.html`](https://docs.spring.io/spring-security/site/docs/5.1.4.RELEASE/api/org/springframework/security/access/event/AbstractAuthorizationEvent.html)\n\
    \nFigure [8-2](#310331_2_En_8_Chapter.xhtml#Fig2) shows these\nevent classes and\
    \ interfaces in UML (Unified Modeling Language) form.\n\n![../images/310331_2_En_8_Chapter/310331_2_En_8_Fig2_HTML.jpg](images/310331_2_En_8_Chapter/310331_2_En_8_Fig2_HTML.jpg)\n\
    \nFigure 8-2\nAuthorization-related events\n\nAuthentication-Related Events\n\
    These events are related to the authentication process  in the application and\n\
    the different phases this process goes through, such as informing\ninterested\
    \ listeners of disabled accounts and expired credentials.\nAuthentication events\
    \ are published by an implementation of `org.springframework.security.authentication.AuthenticationEventPublisher`,\n\
    which is invoked by the `org.springframework.security.authentication.ProviderManager`\n\
    class. By default, the configured `AuthenticationEventPublisher`\nin the `ProviderManager`\
    \ is an\ninstance of `NullEventPublisher`,\nwhich is a private static class defined\
    \ inside the `ProviderManager` class\nitself and which doesn’t publish any events.\
    \ There exists a default\nimplementation of the interface `AuthenticationEventPublisher`\n\
    that you can use if you are configuring the beans yourself, which is\n`org.springframework.security.authentication.DefaultAuthenticationEventPublisher`.\n\
    This instance is configured by default for the web-layer security when\nusing\
    \ the `<http>`\nelement.\nThe `DefaultAuthenticationEventPublisher`\nworks in\
    \ the following way: It has only two public methods that it\nimplements from the\
    \ `AuthenticationEventPublisher`\ninterface. These methods are `publishAuthenticationSuccess`\n\
    and `publishAuthenticationFailure`.\nThey are the two possible scenarios when\
    \ attempting authentication;\nhowever, in the case of authentication failure,\
    \ there can be many\nreasons for it, as you can see from the amount of `AuthenticationFailureXXXEvent\
    \ instances` that we’ll show you next. In the case of authentication\nfailures,\
    \ the `DefaultAuthenticationEventPublisher`\nwill receive a call to the `publishAuthenticationFailure`\n\
    method, and then it will query a mapping between the exception that was\nthrown\
    \ when authentication was denied (like `UsernameNotFoundException`,\nfor example)\
    \ and the event that corresponds to such an exception (like\n`AuthenticationFailureBadCredentialsEvent`).\n\
    Then an instance of this event will be created by reflection and will be\npublished.\n\
    It is possible to add more mapping into the default mappings between\nexceptions\
    \ and events using the method provided by the `DefaultAuthenticationEventPublisher`:\n\
    `setAdditionalExceptionMappings`.\n\nThe authentication-related events currently\
    \ in the framework are the\nfollowing:\n\n*   `org.springframework.security.authentication.event.AbstractAuthenticationEvent`:\n\
    \    This is the parent class of all other authentication-related events. It\n\
    \    doesn’t introduce any particular functionality, and it serves the basic\n\
    \    function of classifying authentication events.\n\n*   `org.springframework.security.authentication.event.AbstractAuthenticationFailureEvent`:\n\
    \    This is the parent class of all the authentication failure events. It\n \
    \   extends `AbstractAuthenticationEvent`\n    but adds a constructor that takes\
    \ in the exception that was thrown when\n    the authentication failure happened.\n\
    \n*   `org.springframework.security.authentication.event.AuthenticationFailureBadCredentialsEvent`:\n\
    \    This event is published when a `BadCredentialsException`\n    is thrown by\
    \ the system during authentication. This exception is thrown\n    by the different\
    \ `AuthenticationProvider`\n    implementations when a check for the credentials\
    \ of an `Authentication` object\n    is not valid. The event is also published\
    \ when a `UsernameNotFoundException`\n    is thrown. This is thrown normally by\
    \ `UserDetailsService`\n    implementations when they can’t find a user corresponding\
    \ to the passed\n    username and simply propagated by the `AuthenticationProvider`.\n\
    \n*   `org.springframework.security.authentication.event.AuthenticationFailureCredentialsExpiredEvent`:\n\
    \    This event is published when a `CredentialsExpiredException`\n    is thrown.\
    \ This exception is thrown, for example, by an implementation\n    of `AbstractUserDetailsAuthenticationProvider`\n\
    \    when the `UserDetails` object\n    representing the user returns `false`\
    \ from the method\n    `isCredentialsNotExpired`."
  trans: "\n*   `org.springframework.security.access.event.AuthorizationFailureEvent`:\n\
    \    此事件表示`Authentication`对象的主体未被允许访问安全对象，因为它缺少访问所需的权限。当`AbstractInterceptor`的`beforeInvocation`和`afterInvocation`方法捕获到`AccessDeniedException`时，会发布此事件。`AccessDeniedException`可以由拦截器预处理阶段的`org.springframework.security.access.AccessDecisionManager`的`decide`方法抛出，也可以由拦截器后处理阶段的`org.springframework.security.access.intercept.AfterInvocationProviderManager`的`decide`方法抛出。\n\
    \n*   `org.springframework.security.access.event.AuthorizedEvent`:\n    此事件在安全对象的访问被授予之后、实际调用安全对象之前发布。默认情况下不会发布此事件，如果你希望发布它，需要在安全拦截器中将属性`publishAuthorizationSuccess`设置为`true`。\n\
    \n*   `org.springframework.security.access.event.LoggerListener`: 此事件将拦截器相关的应用程序事件输出到\
    \ Commons Logging，因此所有失败事件将以警告级别记录，所有成功事件将以信息级别记录，所有公共调用事件将以调试级别记录。\n\n*   `org.springframework.security.access.event.PublicInvocationEvent`:\n\
    \    每当安全对象接收到对非安全入口点（即未配置`ConfigAttribute`的方法）的调用时，`AbstractSecurityInterceptor`的`beforeInvocation`方法会发布此事件。在方法安全的情况下，这意味着当调用对象的安全代理时，如果被调用的特定方法未配置安全元数据，则将其作为非安全的公共调用处理。然而，并非简单地调用该方法，而是在继续执行之前广播一个事件，以通知任何对此感兴趣的监听器，此事件（公共调用）已经发生。这可能指向一种情况，即你实际上需要保护该端点，而通过此事件，你会收到尚未这样做的通知。事件发布后，拦截器将不再对此调用执行任何预处理或后处理。如果拦截器中的属性`rejectPublicInvocations`设置为`true`（该属性是`AbstractSecurityInterceptor`类的一部分），则不会发布该事件，而是抛出一个`IllegalArgumentException`，指出在没有配置`ConfigAttribute`的情况下无法进行特定调用。这意味着需要处理一个配置错误。\n\
    \n更多信息请访问 [`https://docs.spring.io/spring-security/site/docs/5.1.4.RELEASE/api/org/springframework/security/access/event/AbstractAuthorizationEvent.html`](https://docs.spring.io/spring-security/site/docs/5.1.4.RELEASE/api/org/springframework/security/access/event/AbstractAuthorizationEvent.html)\n\
    \n图 8-2 以 UML（统一建模语言）形式展示了这些事件类和接口。\n\n![../images/310331_2_En_8_Chapter/310331_2_En_8_Fig2_HTML.jpg](img/310331_2_En_8_Fig2_HTML.jpg)\n\
    \n图 8-2\n授权相关事件\n\n认证相关事件\n这些事件与应用程序中的认证过程以及该过程经历的不同阶段相关，例如通知感兴趣的监听器有关账户禁用和凭证过期的情况。认证事件由`org.springframework.security.authentication.AuthenticationEventPublisher`的实现发布，该实现由`org.springframework.security.authentication.ProviderManager`类调用。默认情况下，`ProviderManager`中配置的`AuthenticationEventPublisher`是`NullEventPublisher`的一个实例，它是`ProviderManager`类内部定义的一个私有静态类，不发布任何事件。如果你自己配置\
    \ bean，可以使用`AuthenticationEventPublisher`接口的一个默认实现，即`org.springframework.security.authentication.DefaultAuthenticationEventPublisher`。当使用`<http>`元素时，Web\
    \ 层安全默认配置此实例。\n`DefaultAuthenticationEventPublisher`的工作方式如下：它只实现了`AuthenticationEventPublisher`接口的两个公共方法。这些方法是`publishAuthenticationSuccess`和`publishAuthenticationFailure`。它们是尝试认证时可能出现的两种场景；然而，在认证失败的情况下，可能有很多原因，正如我们接下来将向你展示的大量`AuthenticationFailureXXXEvent`实例所示。在认证失败的情况下，`DefaultAuthenticationEventPublisher`将收到对`publishAuthenticationFailure`方法的调用，然后它将查询认证被拒绝时抛出的异常（例如`UsernameNotFoundException`）与该异常对应的事件（例如`AuthenticationFailureBadCredentialsEvent`）之间的映射。然后，通过反射创建此事件的一个实例并发布。\n\
    可以使用`DefaultAuthenticationEventPublisher`提供的方法`setAdditionalExceptionMappings`向异常与事件之间的默认映射中添加更多映射。\n\
    \n框架中当前与认证相关的事件如下：\n\n*   `org.springframework.security.authentication.event.AbstractAuthenticationEvent`:\n\
    \    这是所有其他认证相关事件的父类。它不引入任何特定功能，而是服务于对认证事件进行分类的基本功能。\n\n*   `org.springframework.security.authentication.event.AbstractAuthenticationFailureEvent`:\n\
    \    这是所有认证失败事件的父类。它扩展了`AbstractAuthenticationEvent`，但增加了一个构造函数，该构造函数接收认证失败时抛出的异常。\n\
    \n*   `org.springframework.security.authentication.event.AuthenticationFailureBadCredentialsEvent`:\n\
    \    当系统在认证过程中抛出`BadCredentialsException`时发布此事件。当对`Authentication`对象的凭证检查无效时，不同的`AuthenticationProvider`实现会抛出此异常。当抛出`UsernameNotFoundException`时也会发布此事件。这通常由`UserDetailsService`实现在找不到与传入用户名对应的用户时抛出，并由`AuthenticationProvider`简单地传播。\n\
    \n*   `org.springframework.security.authentication.event.AuthenticationFailureCredentialsExpiredEvent`:\n\
    \    当抛出`CredentialsExpiredException`时发布此事件。例如，当代表用户的`UserDetails`对象从方法`isCredentialsNotExpired`返回`false`时，`AbstractUserDetailsAuthenticationProvider`的实现会抛出此异常。\n"
- fmt: "- `org.springframework.security.authentication.event.AuthenticationFailureDisabledEvent`:\
    \  \n  当抛出`DisabledException`时发布此事件。如果尝试登录的用户账户已被禁用，则会抛出此异常。它由`AbstractUserDetailsAuthenticationProvider`以及`AccountStatusUserDetailsChecker`实现使用，用于评估`UserDetails.isEnabled`方法是否返回`false`。\n\
    \n- `org.springframework.security.authentication.event.AuthenticationFailureExpiredEvent`:\
    \  \n  当`ProviderManager`抛出`AccountExpiredException`时发布此事件。此异常遵循与前一种情况相同的逻辑抛出，但这次调用的是`UserDetails.isAccountNonExpired`方法。如果返回`false`，则抛出异常。\n\
    \n- `org.springframework.security.authentication.event.AuthenticationFailureLockedEvent`:\
    \  \n  当抛出`LockedException`时发布此事件。此异常在与前一种情况相同的位置（预认证检查场景）抛出，并且当代表用户的`UserDetails`从其方法`isAccountNonLocked`返回`false`时抛出。\n\
    \n- `org.springframework.security.authentication.event.AuthenticationFailureProviderNotFoundEvent`:\
    \  \n  此事件与前几个事件不同，因为它不直接与尝试登录的用户相关。相反，当抛出`ProviderNotFoundException`时发布此事件。如果`ProviderManager`中配置的`AuthenticationProviders`均无法处理认证请求，则由`ProviderManager`本身抛出此异常。\n\
    \n- `org.springframework.security.authentication.event.AuthenticationFailureProxyUntrustedEvent`:\
    \  \n  此事件表示由于CAS用户的票据由不受信任的代理生成而导致的认证失败。\n\n- `org.springframework.security.authentication.event.AuthenticationFailureServiceExceptionEvent`:\
    \  \n  当抛出`AuthenticationServiceException`时发布此事件。此异常可由系统的不同部分（例如`UsernamePasswordAuthenticationFilter`和`DaoAuthenticationProvider`）抛出，通常用于传达由于某种系统错误（例如无法访问用户存储库）而无法处理认证。\n\
    \n- `org.springframework.security.authentication.event.AuthenticationSuccessEvent`:\
    \  \n  当`DefaultAuthenticationEventPublisher`调用其`publishAuthenticationSuccess`方法时，会发布此事件。\n\
    \n- `org.springframework.security.authentication.event.InteractiveAuthenticationSuccessEvent`:\
    \  \n  此事件由框架Web层安全部分的不同过滤器直接发布，而非由`DefaultAuthenticationEventPublisher`发布。当任何主动尝试认证的过滤器（如`UsernamePasswordAuthenticationFilter`或`RememberMeAuthenticationFilter`）成功完成认证时，都会发布此事件。\n\
    \n- `org.springframework.security.authentication.jaas.event.LoggerListener`: \
    \ \n  此事件将认证相关的应用程序事件输出到Commons Logging，以便所有认证事件都将在警告级别被记录。\n\n更多信息请访问：[https://docs.spring.io/spring-security/site/docs/5.1.4.RELEASE/api/org/springframework/security/authentication/event/package-summary.html](https://docs.spring.io/spring-security/site/docs/5.1.4.RELEASE/api/org/springframework/security/authentication/event/package-summary.html)\n\
    \n图[8-3](#310331_2_En_8_Chapter.xhtml#Fig3)以UML类图展示了上述事件类。\n\n![../images/310331_2_En_8_Chapter/310331_2_En_8_Fig3_HTML.jpg](images/310331_2_En_8_Chapter/310331_2_En_8_Fig3_HTML.jpg)\n\
    \n**图8-3** 认证相关的事件类\n\n## 会话相关事件\n\n这些事件（`org.springframework.security.core.session.SessionCreationEvent`和`org.springframework.security.core.session.SessionDestroyedEvent`）直接继承自`ApplicationEvent`，与用户会话生命周期相关。它们（实际上是其具体实现子类`HttpSessionCreatedEvent`和`HttpSessionDestroyedEvent`）均由`HttpSessionEventPublisher`实例发布，该实例是标准Servlet接口`HttpSessionListener`的实现，允许`HttpSessionEventPublisher`创建会话生命周期监听器。该实现需要像其他`HttpSessionListener`一样在`web.xml`文件中进行引用。这两个会话相关事件与`HttpSessionListener`接口定义的两个方法一一对应。这些方法是：\n\
    \n```\nvoid sessionCreated(HttpSessionEvent se)\nvoid sessionDestroyed(HttpSessionEvent\
    \ se)\n```\n\n以上就是关于在Spring Security中发布和处理事件所需了解的全部理论。接下来，您将看到一个非常简单的示例，通过监听事件来为应用程序添加行为。此示例将仅监听一种类型的事件，但监听更多类型事件所需的配置完全相同。您需要实现相同的接口，但需要在泛型类型中指定不同的事件类型。\n\
    \n要开始监听事件，您只需实现`ApplicationListener`接口，并在Spring应用程序上下文中配置实现该接口的Bean。清单[8-1](#310331_2_En_8_Chapter.xhtml#PC3)展示了一个简单的实现，用于记录`AuthenticationFailureBadCredentialsEvent`事件。\n\
    \n```\npackage com.apress.pss.security;\nimport org.apache.commons.logging.Log;\n\
    import org.apache.commons.logging.LogFactory;\nimport org.springframework.context.ApplicationListener;\n\
    import org.springframework.security.authentication.event.AuthenticationFailureBadCredentialsEvent;\n\
    public class LoggerBadCredentialsEvents implements ApplicationListener{\nprivate\
    \ static Log LOG = LogFactory.getLog(LoggerBadCredentialsEvents.class);\npublic\
    \ void onApplicationEvent(\nAuthenticationFailureBadCredentialsEvent event) {\n\
    LOG.warn(\"An attempt to login with bad credentials was made with username \"\
    +\nevent.getAuthentication().getName());\n}\n}\n```\n\n**清单8-1** 监听`AuthenticationFailureBadCredentialsEvent`并记录日志的`ApplicationListener`\n\
    \n监听器的实现非常简单。您只需要实现该接口，并使用您想要监听的事件类对其进行泛型化。然后，如果您在应用程序上下文中定义了`LoggerBadCredentialsEvents`类的Bean实例，它将自动接入Spring框架的事件处理系统，并且每次发布`AuthenticationFailureBadCredentialsEvent`时，此监听器都会收到通知。要定义任何其他事件处理器，您只需使用要监听的正确事件类对处理器类进行泛型化即可。请自行尝试。测试不同事件类型的此功能应该足够简单。"
  raw: "*   `org.springframework.security.authentication.event.AuthenticationFailureDisabledEvent`:\n\
    \    This event is published when a `DisabledException` is\n    thrown. This exception\
    \ is thrown if the user account that is trying to\n    log in has been disabled.\
    \ It is used by `AbstractUserDetailsAuthenticationProvider`\n    and also by `AccountStatusUserDetailsChecker`\n\
    \    implementations evaluating if the `UserDetails.isEnabled`\n    method returns\
    \ `false`.\n\n*   `org.springframework.security.authentication.event.AuthenticationFailureExpiredEvent`:\n\
    \    This event is published by the `ProviderManager` when\n    an `AccountExpiredException`\n\
    \    is thrown. This exception is thrown following the same logic as the\n   \
    \ previous case, but this time the `UserDetails.isAccountNonExpired`\n    method\
    \ is the one that is called. If it returns `false`, the exception\n    is thrown.\n\
    \n*   `org.springframework.security.authentication.event.AuthenticationFailureLockedEvent`:\n\
    \    This event is published when a `LockedException` is\n    thrown. This exception\
    \ is thrown in the same places as the previous one\n    (in preauthentication\
    \ checking scenarios) and is thrown when the `UserDetails`\n    representing the\
    \ user returns `false` from its method\n    `isAccountNonLocked`.\n\n*   `org.springframework.security.authentication.event.AuthenticationFailureProviderNotFoundEvent`:\n\
    \    This event is different than the previous ones in that it is not related\n\
    \    directly to the user attempting to log in. Instead, this event is\n    published\
    \ when a `ProviderNotFoundException`\n    is thrown. This exception is thrown\
    \ by the `ProviderManager`\n    itself if none of the configured `AuthenticationProviders`\n\
    \    configured in the `ProviderManager` are\n    able to handle the authentication\
    \ request.\n\n*   `org.springframework.security.authentication.event.AuthenticationFailureProxyUntrustedEvent`:\n\
    \    This event indicates the authentication failure caused when the CAS\n   \
    \ user’s ticket is generated by an untrusted proxy.\n\n*   `org.springframework.security.authentication.event.AuthenticationFailureServiceExceptionEvent`:\n\
    \    This event gets published when an `AuthenticationServiceException`\n    is\
    \ thrown. This exception can be thrown by different parts of the system\n    (for\
    \ example, `UsernamePasswordAuthenticationFilter`\n    and `DaoAuthenticationProvider`),\n\
    \    and it is generally used for communicating that the authentication could\n\
    \    not be processed due to some sort of system error—for example, if the\n \
    \   user repository cannot be accessed.\n\n*   `org.springframework.security.authentication.event.AuthenticationSuccessEvent`:\n\
    \    This event is simply published by the `DefaultAuthenticationEventPublisher`\n\
    \    when its `publishAuthenticationSuccess`\n    method is called.\n\n*   `org.springframework.security.authentication.event.InteractiveAuthenticationSuccessEvent`:\n\
    \    This event is published directly by different filters in the web-layer\n\
    \    security part of the framework, and not by the `DefaultAuthenticationEventPublisher`.\n\
    \    It is published whenever a successful authentication is achieved by any\n\
    \    of the filters that actively try authentication, like the `UsernamePasswordAuthenticationFilter`\n\
    \    or the `RememberMeAuthenticationFilter`.\n\n*   `org.springframework.security.authentication.jaas.event.LoggerListener`:\n\
    \    This event outputs authentication-related application events to Commons\n\
    \    Logging so that all authentication events will be logged at the warning\n\
    \    level.\n\n`More info can be found at` [`https://docs.spring.io/spring-security/site/docs/5.1.4.RELEASE/api/org/springframework/security/authentication/event/package-summary.html`](https://docs.spring.io/spring-security/site/docs/5.1.4.RELEASE/api/org/springframework/security/authentication/event/package-summary.html)\n\
    \nFigure [8-3](#310331_2_En_8_Chapter.xhtml#Fig3) shows the\nmentioned event classes\
    \ in a UML class diagram.\n\n![../images/310331_2_En_8_Chapter/310331_2_En_8_Fig3_HTML.jpg](images/310331_2_En_8_Chapter/310331_2_En_8_Fig3_HTML.jpg)\n\
    \nFigure 8-3\nAuthentication-related event classes\n\nSession-Related Events\n\
    \nThese events (`org.springframework.security.core.session.SessionCreationEvent`\n\
    and `org.springframework.security.core.session.SessionDestroyedEvent`),\nwhich\
    \ extend directly from `ApplicationEvent`  , are related to the\nuser session\
    \ life cycle. They are both published (actually, their\nconcrete implementing\
    \ subclasses `HttpSessionCreatedEvent`\nand `HttpSessionDestroyedEvent`)\nby an\
    \ instance of `HttpSessionEventPublisher`,\nan implementation of the standard\
    \ servlet interface `HttpSessionListener`,\nwhich allows the `HttpSessionEventPublisher`\n\
    to create session life-cycle listeners. The implementation needs to be\nreferenced\
    \ in the `web.xml` file like any\nother `HttpSessionListener`.\nThe two session-related\
    \ events map one-to-one to the two methods defined\nby the `HttpSessionListener`\n\
    interface. These methods are\n\n```\nvoid sessionCreated(HttpSessionEvent se)\n\
    void sessionDestroyed(HttpSessionEvent se)\n```\n\nThis is all the theory you\
    \ need to know about publishing and handling\nevents in Spring Security. Next\
    \ you will see a very simple example where\nyou put this knowledge into practice\
    \ to add behavior to your application\nbased on listening to events.\nThis example\
    \ will listen to only one type of event, but the\nconfiguration needed to listen\
    \ to more types is exactly the same. You\nimplement the same interface but type\
    \ it differently in the generic\ntype.\n\nAll you need do to start listening for\
    \ events is implement the `ApplicationListener`\ninterface and configure the implementing\
    \ bean in the Spring application\ncontext. Listing [8-1](#310331_2_En_8_Chapter.xhtml#PC3)\
    \ shows a simple\nimplementation that logs `AuthenticationFailureBadCredentialsEvent\
    \ events`.\n\n```\npackage com.apress.pss.security;\nimport org.apache.commons.logging.Log;\n\
    import org.apache.commons.logging.LogFactory;\nimport org.springframework.context.ApplicationListener;\n\
    import org.springframework.security.authentication.event.AuthenticationFailureBadCredentialsEvent;\n\
    public class LoggerBadCredentialsEvents implements ApplicationListener{\nprivate\
    \ static Log LOG = LogFactory.getLog(LoggerBadCredentialsEvents.class);\npublic\
    \ void onApplicationEvent(\nAuthenticationFailureBadCredentialsEvent event) {\n\
    LOG.warn(\"An attempt to login with bad credentials was made with username \"\
    +\nevent.getAuthentication().getName());\n}\n}\nListing 8-1\nApplicationListener\
    \ That Listens to a AuthenticationFailureBadCredentialsEvent and Logs It\n```\n\
    \nThe implementation of the listener is very straightforward. You need\nto implement\
    \ only the interface and type it with the class of the event\nthat you want to\
    \ listen to. Then if you define a bean instance of the\nclass `LoggerBadCredentialsEvents`\n\
    in the application context, it will automatically be wired into the\nSpring Framework\
    \ event-handling system, and every time an `AuthenticationFailureBadCredentialsEvent`\n\
    is published, this listener will be notified of it.\nTo define any other event\
    \ handler, you do the same but type the\nhandler class by the correct event that\
    \ you want to listen to. Go ahead\nand try it yourself. It should be simple enough\
    \ to test this\nfunctionality for different event types."
  trans: "\n*   `org.springframework.security.authentication.event.AuthenticationFailureDisabledEvent`:\n\
    \    当抛出 `DisabledException` 时，会发布此事件。如果尝试登录的用户账户已被禁用，则会抛出此异常。`AbstractUserDetailsAuthenticationProvider`\
    \ 以及评估 `UserDetails.isEnabled` 方法是否返回 `false` 的 `AccountStatusUserDetailsChecker`\
    \ 实现会使用此事件。\n\n*   `org.springframework.security.authentication.event.AuthenticationFailureExpiredEvent`:\n\
    \    当抛出 `AccountExpiredException` 时，`ProviderManager` 会发布此事件。此异常的抛出逻辑与上一种情况相同，但这次调用的是\
    \ `UserDetails.isAccountNonExpired` 方法。如果该方法返回 `false`，则会抛出此异常。\n\n*   `org.springframework.security.authentication.event.AuthenticationFailureLockedEvent`:\n\
    \    当抛出 `LockedException` 时，会发布此事件。此异常在与上一种情况相同的位置（预认证检查场景中）抛出，并且当代表用户的 `UserDetails`\
    \ 从其 `isAccountNonLocked` 方法返回 `false` 时抛出。\n\n*   `org.springframework.security.authentication.event.AuthenticationFailureProviderNotFoundEvent`:\n\
    \    此事件与之前的事件不同，它不直接与尝试登录的用户相关。相反，当抛出 `ProviderNotFoundException` 时，会发布此事件。如果\
    \ `ProviderManager` 中配置的所有 `AuthenticationProviders` 都无法处理该认证请求，`ProviderManager`\
    \ 本身会抛出此异常。\n\n*   `org.springframework.security.authentication.event.AuthenticationFailureProxyUntrustedEvent`:\n\
    \    此事件表示由于 CAS 用户的票据是由不受信任的代理生成的而导致的认证失败。\n\n*   `org.springframework.security.authentication.event.AuthenticationFailureServiceExceptionEvent`:\n\
    \    当抛出 `AuthenticationServiceException` 时，会发布此事件。此异常可能由系统的不同部分（例如，`UsernamePasswordAuthenticationFilter`\
    \ 和 `DaoAuthenticationProvider`）抛出，通常用于传达由于某种系统错误（例如，无法访问用户存储库）而无法处理认证的信息。\n\n\
    *   `org.springframework.security.authentication.event.AuthenticationSuccessEvent`:\n\
    \    当 `DefaultAuthenticationEventPublisher` 的 `publishAuthenticationSuccess`\
    \ 方法被调用时，它会简单地发布此事件。\n\n*   `org.springframework.security.authentication.event.InteractiveAuthenticationSuccessEvent`:\n\
    \    此事件由框架 Web 层安全部分的不同过滤器直接发布，而不是由 `DefaultAuthenticationEventPublisher` 发布。只要任何主动尝试认证的过滤器（如\
    \ `UsernamePasswordAuthenticationFilter` 或 `RememberMeAuthenticationFilter`）成功完成认证，就会发布此事件。\n\
    \n*   `org.springframework.security.authentication.jaas.event.LoggerListener`:\n\
    \    此监听器将与认证相关的应用程序事件输出到 Commons Logging，以便所有认证事件都将在警告级别被记录。\n\n更多信息请访问 [`https://docs.spring.io/spring-security/site/docs/5.1.4.RELEASE/api/org/springframework/security/authentication/event/package-summary.html`](https://docs.spring.io/spring-security/site/docs/5.1.4.RELEASE/api/org/springframework/security/authentication/event/package-summary.html)\n\
    \n图 8-3 以 UML 类图的形式展示了上述事件类。\n\n![../images/310331_2_En_8_Chapter/310331_2_En_8_Fig3_HTML.jpg](img/310331_2_En_8_Fig3_HTML.jpg)\n\
    \n图 8-3\n与认证相关的事件类\n\n会话相关事件\n\n这些事件（`org.springframework.security.core.session.SessionCreationEvent`\
    \ 和 `org.springframework.security.core.session.SessionDestroyedEvent`）直接继承自 `ApplicationEvent`，与用户会话的生命周期相关。它们都由\
    \ `HttpSessionEventPublisher` 的实例发布（实际上，发布的是其具体实现子类 `HttpSessionCreatedEvent`\
    \ 和 `HttpSessionDestroyedEvent`）。`HttpSessionEventPublisher` 是标准 Servlet 接口 `HttpSessionListener`\
    \ 的一个实现，它允许 `HttpSessionEventPublisher` 创建会话生命周期监听器。该实现需要像任何其他 `HttpSessionListener`\
    \ 一样在 `web.xml` 文件中被引用。这两个与会话相关的事件与 `HttpSessionListener` 接口定义的两个方法一一对应。这些方法是：\n\
    \n```\nvoid sessionCreated(HttpSessionEvent se)\nvoid sessionDestroyed(HttpSessionEvent\
    \ se)\n```\n\n以上就是您在 Spring Security 中发布和处理事件所需了解的全部理论。接下来，您将看到一个非常简单的示例，您将把这些知识付诸实践，通过监听事件为您的应用程序添加行为。\n\
    此示例将只监听一种类型的事件，但监听更多类型所需的配置是完全相同的。您实现相同的接口，但只需在泛型类型中指定不同的事件类型即可。\n\n要开始监听事件，您需要做的就是实现\
    \ `ApplicationListener` 接口，并在 Spring 应用程序上下文中配置实现该接口的 Bean。清单 8-1 展示了一个简单的实现，它记录了\
    \ `AuthenticationFailureBadCredentialsEvent` 事件。\n\n```\npackage com.apress.pss.security;\n\
    import org.apache.commons.logging.Log;\nimport org.apache.commons.logging.LogFactory;\n\
    import org.springframework.context.ApplicationListener;\nimport org.springframework.security.authentication.event.AuthenticationFailureBadCredentialsEvent;\n\
    public class LoggerBadCredentialsEvents implements ApplicationListener{\nprivate\
    \ static Log LOG = LogFactory.getLog(LoggerBadCredentialsEvents.class);\npublic\
    \ void onApplicationEvent(\nAuthenticationFailureBadCredentialsEvent event) {\n\
    LOG.warn(\"检测到使用错误凭证尝试登录，用户名为 \"+\nevent.getAuthentication().getName());\n}\n\
    }\n清单 8-1\n监听 AuthenticationFailureBadCredentialsEvent 并记录日志的 ApplicationListener\n\
    ```\n\n监听器的实现非常简单。您只需要实现该接口，并使用您想要监听的事件类来指定其泛型类型。然后，如果您在应用程序上下文中定义了 `LoggerBadCredentialsEvents`\
    \ 类的一个 Bean 实例，它将被自动注入到 Spring 框架的事件处理系统中，并且每次发布 `AuthenticationFailureBadCredentialsEvent`\
    \ 时，此监听器都会收到通知。\n要定义任何其他事件处理器，您执行相同的操作，但使用您想要监听的正确事件类来指定处理器类的泛型类型。请继续尝试一下。针对不同的事件类型测试此功能应该足够简单。\n"
- fmt: '# Your Own AuthenticationProvider and UserDetailsService


    You saw in the previous chapter that Spring comes equipped with quite a few authentication
    options to adjust to a lot of different application requirements that you might
    have in your application. Looking at how these different authentication providers
    are set up in your application and the nice way they are contained in their own
    “modules,” you might think that you should be able to use your own authentication
    provider. The truth is, of course, that you can, and here we will show you how
    with a simple example.


    First of all, let’s review how the authentication providers work in your application.


    The main authentication entry point in Spring Security is the `AuthenticationManager`
    interface—in particular, the `ProviderManager` implementation. `ProviderManager`’s
    main functionality is to iterate through a list of `AuthenticationProvider` implementations
    that are configured on it until one of them is able to authenticate the user (wrapped
    in one of the available `Authentication` implementation objects) or, in fact,
    until discovering that none of them can, at which point it throws an exception.


    The standard way you saw in previous chapters for defining the `ProviderManager`
    and the `AuthenticationProvider` is the one shown in Listing [8-2](#310331_2_En_8_Chapter.xhtml#PC5).
    (Although the class names and the names of the elements in the XML file don’t
    exactly match, the Spring Security namespace XML parsing mechanism takes care
    of matching the combination shown of the `<authentication-manager>` and `<authentication-provider>`
    elements to the classes mentioned before.) When you use the namespace to define
    an authentication manager and an authentication provider as shown in the listing,
    the framework instantiates two `ProviderManager` objects and sets one as the parent
    of the other. This scheme is used by the `ProviderManager`, which is able to establish
    a hierarchy of authentication managers. The child `AuthenticationManager` (in
    form of the `ProviderManager` class) is queried first for authentication. If it
    doesn’t resolve the authentication request, it checks to see if it has a configured
    parent manager that it can query; if it does, it calls its `authenticate` method.
    This parent-child relationship is managed by Spring at startup time.


    In the parent-child relationship of the `ProviderManager` instances, one of them
    has defined in the `AuthenticationProvider` list a `DaoAuthenticationProvider`
    instance, coming from the `<authentication-provider>` element, and the other has
    an `AnonymousAuthenticationProvider` configured, and this one is defined when
    the `<http>` element is used and the common filters are being defined. So they
    are the two providers that are used by default when you use the common definition
    from Listing [8-2](#310331_2_En_8_Chapter.xhtml#PC5).


    ## Defining Your Own Custom AuthenticationProvider


    Defining your own custom authentication provider is simple, as you just need to
    implement the interface `org.springframework.security.authentication.AuthenticationProvider`,
    which defines only two methods:


    ```

    Authentication authenticate(Authentication authentication)

    boolean supports(Class authentication)

    ```


    But implementing the interface is not the only option. You could easily extend
    `AbstractUserDetailsAuthenticationProvider` (the way that `DaoAuthenticationProvider`
    works) if the implementation you want to create depends on the `UserDetails` abstraction
    for authentication. The main method in the `AuthenticationProvider` is the `public
    Authentication authenticate(Authentication authentication)` method. This method,
    as you can see, receives an authentication and returns an authentication. The
    important difference between the two authentication objects (the one received
    and the one returned) is that the `Authentication` object it returns will return
    `true` in the method `isAuthenticated` (if authentication is successful, of course),
    indicating that a fully authenticated object is now in existence, while the `Authentication`
    object received in the method will have this method returning `false`. This is
    the logical way to work, as this method in an `Authentication` object (`isAuthenticated`)
    and its return value are what conceptually differentiate an `Authentication` object
    that is fully authenticated from one that is used only to wrap the user details
    before actually applying the authentication logic, or, indeed, any `Authentication`
    object that hasn’t yet been fully authenticated and verified.


    Sometimes, you might not need to implement a whole `AuthenticationProvider`, but
    instead you just might need to change the place from where `UserDetails` is obtained.
    That is the case, for example, when using the `InMemoryUserDetailsManager` for
    getting `UserDetails` stored in memory or using `JdbcUserDetailsManager` when
    getting `UserDetails` stored in a relational database. Of course, you can create
    a new `UserDetailsService` to retrieve this `UserDetails` from some other source,
    and that is something we’ll show you in the upcoming examples. Figure [8-4](#310331_2_En_8_Chapter.xhtml#Fig4)
    illustrates the relationship between the `AuthenticationProvider` (actually, the
    `AbstractUserDetailsAuthenticationProvider` implementation) and the `UserDetailsService`.


    ![../images/310331_2_En_8_Chapter/310331_2_En_8_Fig4_HTML.jpg](images/310331_2_En_8_Chapter/310331_2_En_8_Fig4_HTML.jpg)


    **Figure 8-4** The AbstractUserDetailsAuthenticationProvider and UserDetailsService
    relationship


    In Figure [8-4](#310331_2_En_8_Chapter.xhtml#Fig4), both `AbstractAuthenticationProvider`
    and `UserDetailsService` can be replaced by custom implementations. The `UserCache`,
    by default, uses a `NullUserCache` implementation, which is a no-op cache. It
    can also be replaced easily, but we don’t cover that here. The idea of the cache
    is to keep the `UserDetails` objects cached in case they need to be retrieved
    again. The `authenticate` method in the `AbstractUserDetailsAuthenticationProvider`
    will look first for `UserDetails` in this cache; if the `authenticate` method
    finds the `UserDetails` in the cache, it will use that `UserDetails` to try the
    authentication. If the `authenticate` method doesn’t find `UserDetails` in the
    cache, it will query the configured `UserDetailsService` for the user and then
    store it on the cache for subsequent requests.


    ```

    Listing 8-2

    Common Definition of an AuthenticationManager and AuthenticationProvider. To Be
    Included in applicationContext-security.xml

    ```


    The first example we’ll show is how to create an authentication and login application
    using Spring Boot, Spring Security, Spring Data, Thymeleaf, and MongoDB.


    The very first step is to create the Spring Boot Maven project using the Spring
    Initializr, which is the quickest way to generate Spring Boot projects. You just
    need to choose the language, build system, and JVM version for your project, and
    it will be automatically generated with all the dependencies needed.'
