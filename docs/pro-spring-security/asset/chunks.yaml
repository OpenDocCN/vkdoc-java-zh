    #### 安全拦截器


    框架最重要的组件之一便是安全拦截器。其主要逻辑在 `AbstractSecurityInterceptor` 中实现，并有两种具体实现形式：`FilterSecurityInterceptor`
    和 `MethodSecurityInterceptor`（如图 4-4 所示）。安全拦截器负责决定是否允许特定请求访问受保护资源。顾名思义，`MethodSecurityInterceptor`
    处理针对方法调用的请求，而 `FilterSecurityInterceptor` 则处理针对 Web URL 的请求。


    安全拦截器的工作流程包含预处理和后处理两个步骤。在预处理阶段，它会检查所请求的资源是否通过某些元数据信息（或 `ConfigAttribute`）进行了保护。如果没有，则允许请求继续前往目标
    URL 或方法。如果请求的资源受到保护，安全拦截器会从当前的 `SecurityContext` 中检索 `Authentication` 对象。如有必要，该
    `Authentication` 对象将通过以下方法，根据配置的 `AuthenticationManager` 进行身份验证：


    ```

    public interface AuthenticationManager {

    Authentication authenticate(Authentication authentication)

    throws AuthenticationException;

    }

    ```


    `AuthenticationManager` 的 `authenticate` 方法主要可以执行以下三种操作：


    *   如果输入代表一个有效的凭证主体且可被验证，则返回一个 `authenticated=true` 的 `Authentication` 对象

    *   如果输入代表一个无效的凭证主体，则抛出 `AuthenticationException` 异常

    *   如果无法判断，则返回 null


    请注意，`ProviderManager`（它委托给一系列 `AuthenticationProvider` 实例）是 `AuthenticationManager`
    最常用的实现。


    使用 `ProviderManager` 的 `AuthenticationManager` 层次结构示例如图 4-4 所示。


    ![../images/310331_2_En_4_Chapter/310331_2_En_4_Fig4_HTML.jpg](img/310331_2_En_4_Fig4_HTML.jpg)


    图 4-4


    使用 ProviderManager 的 AuthenticationManager 层次结构


    对象经过身份验证后，会调用 `AccessDecisionManager` 来确定已认证的实体是否最终能够访问该资源。如果已认证的实体不被允许访问该资源，`AccessDecisionManager`
    会抛出 `AccessDeniedException` 异常。如果 `AccessDecisionManager` 判定允许 `Authentication`
    实体访问该资源，并且配置了 `RunAsManager`，则会将 `Authentication` 对象传递给 `RunAsManager`。如果未配置 `RunAsManager`，则会调用一个空操作实现。`RunAsManager`
    要么返回 null（如果未配置使用），要么返回一个新的 `Authentication` 对象，该对象包含与原始 `Authentication` 对象相同的主体、凭据和已授予权限，外加一组基于所使用的
    `RUN_AS` 的新权限。这个新的 `Authentication` 对象会被放入当前的 `SecurityContext` 中。


    在此处理之后，无论是否使用了 `RUN_AS Authentication` 对象，安全拦截器都会创建一个包含 `SecurityContext` 和 `ConfigAttributes`
    信息的新的 `InterceptorStatusToken`。此令牌将在安全拦截器的后处理阶段使用。此时，安全拦截器已准备好允许访问受保护资源，因此它会放行调用，并调用特定的受保护实体（无论是
    URL 还是方法）。调用返回后，安全拦截器的第二阶段开始生效，后处理开始。后处理步骤要简单得多，它仅涉及调用 `AfterInvocationManager`
    的 `decide` 方法（如果配置了的话）。在当前实现中，`AfterInvocationManager` 委托给 `PostInvocationAuthorizationAdvice`
    的实例，后者最终会过滤返回的对象，或在必要时抛出 `AccessDeniedException` 异常。如果你在方法级安全中使用了后调用过滤器，就会出现这种情况，你将在下一章中看到。在
    Web 安全的情况下，`AfterInvocationManager` 为 null。


    这对安全拦截器来说工作量很大。然而，由于框架在类级别上具有良好的模块化特性，你可以看到安全拦截器只是将大部分任务委托给一系列定义明确的协作者，这些协作者以非常符合
    SRP（单一职责原则）的方式专注于单一、范围狭窄的职责。这是良好的软件设计，也是你应该效仿的范例。如清单 4-1 所示，我们粘贴了 `AbstractSecurityInterceptor`
    自身代码的主要部分，以便你了解我们一直在讨论的内容。我们在代码中加入了一些注释，以帮助你更好地理解其功能；这些注释以 `//----` 开头。


    请注意，完整的 `AbstractSecurityInterceptor` 课程代码可以在 GitHub 地址 [`https://github.com/spring-projects/spring-security/blob/master/core/src/main/java/org/springframework/security/access/intercept/AbstractSecurityInterceptor.java`](https://github.com/spring-projects/spring-security/blob/master/core/src/main/java/org/springframework/security/access/intercept/AbstractSecurityInterceptor.java)
    找到。

