    ## Basic HTTP Authentication


    Sometimes, you can’t really use a login form for authenticating users. For instance,
    if your application is meant to be called by other systems instead of a human
    user, it doesn’t make sense to show a login form to the other application. This
    is a pretty common use case. Web services talk to each other without user interaction,
    ESB systems integrate systems with one another, and JMS clients produce and consume
    messages from other systems.


    In the context of HTTP-exposed interfaces that require no human user to access
    them, a common approach is to use HTTP basic authentication headers. HTTP authentication
    headers allow you to embed the security information (username and password) in
    the header of the request that you send to the server, instead of sending it in
    the body of the request, as is the case for the login form authentication.


    HTTP uses a standard header for carrying this information. The header is appropriately
    named `Authorization`. When using this header, the client that is sending the
    request (for example, a browser) concatenates the username and the password with
    a colon between them and then Base64 encodes the resulting string, sending the
    result of this in the header. For example, if you use the username `neve` and
    the password `nardone`, the client creates the string `neve:nardone` and encodes
    it prior to sending it in the header.


    Let’s use basic HTTP authentication in your application. The first and only thing
    you need to do is remove the `.formLogin()` element in your configuration file
    `SecurityConfiguration` and add instead


    ```

    .httpBasic()

    ```


    After replacing it, restart the application and go to the URL `http://localhost:8080/favoritesmovies/movies`
    in the browser. A standard HTTP authentication box will pop up asking you for
    your authentication details, as Figure [5-12](#310331_2_En_5_Chapter.xhtml#Fig12)
    shows. Type `admin/admin123` as the username and password, and send the request.
    You will successfully arrive on the movies page that you already saw a couple
    of times before (Figure [5-5](#310331_2_En_5_Chapter.xhtml#Fig5)).


    ![../images/310331_2_En_5_Chapter/310331_2_En_5_Fig12_HTML.jpg](images/310331_2_En_5_Chapter/310331_2_En_5_Fig12_HTML.jpg)


    **Figure 5-12** Standard HTTP authentication form, basic authentication configuration


    When you use the `httpBasic` configuration element, Spring `Security''s BasicAuthenticationFilter`
    comes into action. A `BasicAuthenticationEntryPoint` strategy will be configured
    into the `ExceptionTranslationFilter` on startup. When you make the first request
    to the URL `/movies`, the framework behaves as before, throwing an access-denied
    exception that is handled by the `ExceptionTranslationFilter`. This filter delegates
    to a particular implementation strategy of `AuthenticationEntryPoint`—in this
    case, `BasicAuthenticationEntryPoint`. `BasicAuthenticationEntryPoint` adds the
    header `WWW-Authenticate: Basic realm="Spring Security Application"` to the response
    and then sends an HTTP status of 401 (Unauthorized) to the client. The client
    should know how to handle this code and work accordingly. (In the case of a browser,
    it simply shows the authentication pop-up.)


    When you introduce the username and password, and submit the request, the request
    again follows the filter chain until it reaches the `BasicAuthenticationFilter`.
    This filter checks the request headers, looking for the `Authorization` header
    starting with `Basic`. The filter extracts the content of the header and uses
    `Base64.decode` to decode the string, and then it extracts the username and password.
    The filter creates a `UsernamePasswordAuthenticationToken` object and sends it
    to the authentication manager for authentication in the standard way. The authentication
    manager will ask the authentication provider to retrieve the user and then create
    an `Authentication` object with it. This process is standard and independent of
    using basic authentication or form authentication.'
