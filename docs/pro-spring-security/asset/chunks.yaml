    throughout the book. Tomcat Web Server v9 was used for the different web applications
    in the book, mainly through its Maven plugin, and the laptop used was a ThinkPad
    Yoga 360 with 8GB of RAM. All the projects were developed using the IntelliJ IDEA
    Ultimate 2019.2.


    You are free to use your own tools and operating system. Because everything is
    Java based, you should be able to compile your programs on any platform without
    problems.


    ## Downloading the Code


    The code for the examples shown in this book is available via the Download Source
    Code button located at [`www.apress.com/9781484250518`](http://www.apress.com/9781484250518)
    .


    ## Contacting the Authors


    You are more than welcome to send us any feedback regarding this book or any other
    subject we might help you with. You can contact Carlo Scarioni via his blog at
    [`http://cscarioni.blogspot.com`](http://cscarioni.blogspot.com/) , or you can
    send him email at`carlo.scarioni@gmail.com` . You can contact Massimo Nardone
    via email at`massimonardonedevchannel@gmail.com` .


    Acknowledgments


    This book is definitely the work of more than one person. The people involved
    in the preparation of this book have brought so much experience and quality to
    the final version that the end product is many times better than if I had done
    all the work myself. Their input ranged from improving text style, to introducing
    better ways to present concepts, to performing code reviews and suggesting general
    improvements that have made this book a much better reading experience.


    I am talking, of course, about the great people at Apress who have been with me
    along the full journey of writing this book. I’m talking about Steve Anglin, who
    initiated me into the project, kept an eye from afar on the progress of the book,
    and tried to make sure I kept on track as much as possible. I’m talking about
    Kevin Shea, who was my main editorial contact and made sure that I stayed on schedule
    with the book and helped with advice and support. I’m talking about Tom Welsh,
    who had the great responsibility of reading every chapter as I was writing it;
    he gave me great input on each section, including helping with my use of English
    grammar as well as ways to make the different parts more attractive to potential
    readers. I am talking about Manuel Jordan, who not only read every single chapter
    in a very detailed way, but also took on the laborious job of evaluating and executing
    every single line of code and making sure that the book provides code samples
    that can be reproduced by the readers in their own environments. His input is
    greatly appreciated, and it is the difference between having a full book or a
    half a book. There were, of course, many more people at Apress involved in the
    full review phases of the book, and I want to say “thank you for your help” to
    all of them.


    I would like to also thank the creators, committers, and community of Spring and
    Spring Security for creating such an amazing piece of software and making it available
    to everyone. A big thank you to them for letting all developers share their knowledge
    and ways of work by freely distributing the source code of the different projects
    covered by the SpringSource umbrella. They make us all wiser and better developers.


    Finally, I want to thank my wife for being with me all the time and motivating
    me to keep going forward.


    > —Carlo Scarioni


    Many thanks go to my wonderful family—my wife, Pia, and my children, Luna, Leo,
    and Neve—for supporting me while I was working on this book. You are the most
    beautiful reason of my life.


    I want to thank my beloved late mother, Maria Augusta Ciniglio, who always supported
    and loved me so much. I will love and miss you forever, my dearest mom.


    Thanks to my beloved father, Giuseppe, and my brothers, Mario and Roberto, for
    your endless love and for being the best dad and brothers in the world.


    I also want to dedicate this book to my late, dearest cousin, Gerardo “Amerigo”
    Nardone. You will be missed.


    Thanks a lot to Steve Anglin and Matthew Moodie for giving me the opportunity
    to work as writer on this book, as well as to Mark Powers for doing such a great
    job during the editorial process and supporting me all the time, and of course
    the technical reviewers of this book for helping me to make a better book.


    > —Massimo Nardone


