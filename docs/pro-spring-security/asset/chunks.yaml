    web application.


    ## Summary


    In this chapter, we showed you, at a fairly high level, how to integrate Spring
    Security into various frameworks and languages. The chosen framework was Spring’s
    own Spring Web Flow, and the illustrative languages chosen were JRuby and Groovy,
    with their web frameworks Rails and Grails, respectively.


    We showed you that integrating Spring Security into these different frameworks
    and languages can be straightforward (as with Grails) or not so straightforward
    (as with JRuby or Scala). However, through the JVM, in theory, you could integrate
    Spring Security into anything you need to secure.


    Here is the main takeaway from this chapter, regardless of the frameworks or languages
    used: Spring Security is, ultimately, just a Java library (a couple of simple
    `.jar` files). You can integrate it into any Java (as in JVM) project that you
    want. You simply have to remember what you can do with it and use the parts that
    make sense for your particular problem. For instance, using web-layer security
    wouldn’t make sense in a Swing application, or even in a web application that
    doesn’t use standard servlet filters (such as the Play framework).


