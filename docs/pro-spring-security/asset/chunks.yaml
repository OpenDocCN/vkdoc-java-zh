    **Listing 8-10** `LoginController` Java Class


    This Java class works as page controller that, based on the URL requested, will
    redirect to a page like welcome, forbidden, etc. When requesting the `/admin`
    or `/user` URL, the Java class will verify if the user credentials are ok to redirect
    to the preferred page. The `modelAndView.addObject` is used to collect information
    and messages to be displayed on the HTML pages.'
