    @Transactional

    @Secured("ACL_POST_DELETE")

    public void deletePost(Post post){

    ObjectIdentity oid = new ObjectIdentityImpl(Post.class, post.getId());

    mutableAclService.deleteAcl(oid, true);

    postStore.remove(postStore.get(post.getId()));

    }

