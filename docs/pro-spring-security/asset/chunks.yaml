- fmt: '#### The XML Namespace


    The XML namespace is of extreme importance to the general appeal and usability
    of the framework, yet it is, in theory, not strictly necessary. If you know how
    the Spring Framework’s namespaces work, you probably have a good idea of what
    is going on when you define your security-specific XML configuration in your application
    context definition files. If you don’t know how they work, maybe you think Spring
    is somehow made aware of how to treat these specific elements and how to load
    them in the general Spring application context. Either way, here we will explain
    in some detail the process behind the definition of a custom namespace in Spring,
    and particularly, the elements in the Spring Security namespace.


    Originally, Spring did not support custom XML. All that Spring understood was
    its own classes defined in the standard Spring Core namespace, where you can define
    `<bean>`s on a bean-to-bean basis and can’t really define anything conceptually
    more complex without adding that complexity yourself to the configuration.


    This `<bean>`-based configuration was, and still is, very good for configuring
    general-purpose bean instances, but it can get messy really fast for defining
    more domain-specific utilities. And beyond being messy, it is also very poor at
    expressing the business domain of the beans you are defining.


    We’ll explore this manual configuration later in the book, but for standard cases
    it is not needed, and you should simply use the namespace. However, keep in mind
    that under the hood the namespace is nothing more than syntactic sugar. At the
    end of the day, you still end up with standard Spring beans and objects.


    Spring 2.0 introduced support for defining custom XML namespaces. Since then,
    a lot of projects have made use of this facility, making them more attractive
    to work with.


    An XML custom namespace is simply an XML-based Domain Specific Language (DSL),
    guided by the rules of an XML schema (`.xsd`) file that allows developers to create
    Spring beans using concepts and a syntax more in synch with the programming concerns
    they are trying to model.


    ### Note


    A DSL is a language customized to represent the concepts of a particular application
    domain. Sometimes, a whole new language is created to support the new domain,
    which is referred to as an *external DSL*. Some other times, an existing language
    is tweaked to allow for new expressions that represent the concepts of the domain,
    and this is referred to as an *internal DSL*. In the case presented in this chapter,
    you are using a general-purpose language (XML); however, you are defining certain
    constraints about the elements (using XSD) and thus are creating an internal DSL
    to represent security concepts.


    Making Spring aware of a new namespace is really simple. (That’s not to say it
    is simple to actually parse the information of the XML and convert it to beans—this
    depends on the complexity of your DSL.) All you need is the following:


    *   An `.xsd` file defining your particular XML structure

    *   A `spring.schemas` file where you specify the mapping between a URL-based
    schema location and the location of your `.xsd` file in your classpath

    *   A `spring.handlers` file where you specify which class is in charge of handling
    everything related to your namespace

    *   A bunch of parser classes that will be in charge of parsing each of the top
    elements defined in your XML file


    In Chapter [8](#310331_2_En_8_Chapter.xhtml), you will see some examples of how
    to create a new namespace element and integrate it with Spring Security.


    For Spring Security, all the namespace configuration-related information resides
    in the `config` module. In Figure [4-7](#310331_2_En_4_Chapter.xhtml#Fig7), you
    can see the expanded structure of the `config` module as seen in the Eclipse integrated
    development environment (IDE), in this case Spring tool Suite v4 for Eclipse.


    ![../images/310331_2_En_4_Chapter/310331_2_En_4_Fig7_HTML.jpg](images/310331_2_En_4_Chapter/310331_2_En_4_Fig7_HTML.jpg)


    Figure 4-7


    Spring Security’s file structure


    The files `spring.handlers` and `spring.schemas` should reside in the `META-INF`
    directory in the classpath so that Spring can find them there.


    OK, so enough of the general namespace information. More specifically, how does
    the Spring Security namespace work?


    When you create a Spring-based application using XML-defined application context
    configuration with some of the Spring Security namespace definitions, and you
    run the application, when it starts to load up, it looks in the application context’s
    namespace definitions at the top of the XML configuration file. It will find the
    reference to the Spring Security namespace (normally a reference like `xmlns:security="http://www.springframework.org/schema/security"`).
    Using the information from the `spring.handlers` mapping file, it will see that
    the file to handle the security elements is the final class, `org.springframework.security.config.SecurityNamespaceHandler`.
    Spring calls the `parse` method of this class for every top element in the configuration
    file that uses the security namespace. Figure [4-8](#310331_2_En_4_Chapter.xhtml#Fig8)
    shows the load-up sequence for this process.


    ![../images/310331_2_En_4_Chapter/310331_2_En_4_Fig8_HTML.jpg](images/310331_2_En_4_Chapter/310331_2_En_4_Fig8_HTML.jpg)


    Figure 4-8


    Sequence of loading up a Spring namespace


    `SecurityNamespaceHandler` delegates to a series of `BeanDefinitionParser` objects
    for the individual parsing of each top-level element. The whole list of elements
    supported in the Spring Security namespace configuration are defined in the class
    `org.springframework.security.config.Elements` as constants. This class is shown
    in Listing [4-2](#310331_2_En_4_Chapter.xhtml#PC3).'
