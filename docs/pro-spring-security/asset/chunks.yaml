    **Listing 4-2** Constants for All the Spring Security Namespace Elements


    From the list of elements presented in the previous class, the top-level ones
    as used in the XML configuration files are as follows (in the previous listing,
    we refer to them by the name of the constant and not by the XML element name):


    *   `LDAP_PROVIDER`: This element is used to configure the Lightweight Directory
    Access Protocol (LDAP) authentication provider for your application in case you
    require one.

    *   `LDAP_SERVER`: This element is used to configure an LDAP server in your application.

    *   `LDAP_USER_SERVICE`: This element configures the service for retrieving user
    details from an LDAP server and populating that user’s authorities (Spring Security
    uses the term “authorities” to refer to the permission names that are granted
    to a particular user. For example, `ROLE_USER` is an authority).

    *   `USER_SERVICE`: This element defines the in-memory user service where you
    can store user names, credentials, and authorities directly in the application
    context definition file. Notice that this type of configuration is specific for
    test environments and academic purposes because it is easy to set up and fast.

    *   `JDBC_USER_SERVICE`: This element allows you to set up a database-driven user
    service, where you specify a `DataSource` and the queries to retrieve the user
    information from a database.

    *   `AUTHENTICATION_PROVIDER`: This element defines a `DaoAuthenticationProvider`,
    which is an authentication provider that delegates to an instance of `UserDetailsService`.
    The `UserDetailsService` can be any of the ones defined in the previous three
    bullet points, or a reference to a customized one.

    *   `GLOBAL_METHOD_SECURITY`: This element is in charge of setting up the global
    support in your application to the annotations `@Secured`, `@javax.annotation.security.RolesAllowed`,
    `@PreAuthorize`, and `@PostAuthorize`. This element is the one that will handle
    the registration of a method interceptor that will be aware of all the metadata
    of the bean’s methods in order to apply the corresponding security advice.

    *   `AUTHENTICATION_MANAGER`: This element registers a global `ProviderManager`
    in the application and sets up the configured `AuthenticationProviders` on it.

    *   `METHOD_SECURITY_METADATA_SOURCE`: This element registers a `MapBasedMethodSecurityMetadataSource`
    in the application context. It will hold a `Map<RegisteredMethod, List<ConfigAttribute>>`.
    It does this so that when a request is made to a method, the method can be retrieved
    and its security constraints can be checked.

    *   `DEBUG`: For development purposes, this element registers a `DebugFilter`
    in the security filter chain.

    *   `HTTP`: This is the main element for a web-based secure application. The HTTP
    element is really powerful. It allows for the definition of URL-based security-mapping
    strategies, the configuration of the filters, the Secure Sockets Layer (SSL) support,
    and other HTTP-related security configurations.

    *   `HTTP_FIREWALL`: This element uses a firewall element and adds it to the filter
    chain if it is configured. The firewall referenced should be an implementation
    of Spring’s own `HttpFirewall` interface.

    *   `FILTER_INVOCATION_DEFINITION_SOURCE`: This element has been deprecated. See
    the following one.

    *   `FILTER_SECURITY_METADATA_SOURCE`: This element wraps a list of `<intercept-url>`
    elements. These elements map the relationship between URLs and the `ConfigAttributes`
    required for accessing those URLs.

    *   `FILTER_CHAIN`: This element allows you to configure the Spring Security filter
    chain that will be used in the application, which filters you want to add to the
    chain, and a request matcher if you want to customize how the chain matches requests.
    The most important request matchers are ant-based and regexp-based.


    You will be using the Spring Security namespace thoroughly throughout the book,
    so many of the elements described here will be revisited in later chapters.'
