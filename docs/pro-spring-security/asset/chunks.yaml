    package org.springframework.integration.security.channel;

    import java.lang.reflect.Method;

    import org.aopalliance.intercept.MethodInterceptor;

    import org.aopalliance.intercept.MethodInvocation;

    import org.springframework.security.access.SecurityMetadataSource;

    import org.springframework.security.access.intercept.AbstractSecurityInterceptor;

    import org.springframework.security.access.intercept.InterceptorStatusToken;

    import org.springframework.util.Assert;

    /**

    * An AOP interceptor that enforces authorization for MessageChannel send and/or
    receive calls.

    *

    * @author Mark Fisher

    * @author Oleg Zhurakousky

    * @see SecuredChannel

    */

    public final class ChannelSecurityInterceptor extends AbstractSecurityInterceptor
    implements MethodInterceptor {

    private final ChannelSecurityMetadataSource securityMetadataSource;

    public ChannelSecurityInterceptor() {

    this(new ChannelSecurityMetadataSource());

    }

    public ChannelSecurityInterceptor(ChannelSecurityMetadataSource securityMetadataSource)
    {

    Assert.notNull(securityMetadataSource, "securityMetadataSource must not be null");

    this.securityMetadataSource = securityMetadataSource;

    }

    @Override

    public Class getSecureObjectClass() {

    return ChannelInvocation.class;

    }

    public Object invoke(MethodInvocation invocation) throws Throwable {

    Method method = invocation.getMethod();

    if (method.getName().equals("send") || method.getName().equals("receive")) {

    return this.invokeWithAuthorizationCheck(invocation);

    }

    return invocation.proceed();

    }

    private Object invokeWithAuthorizationCheck(MethodInvocation methodInvocation)
    throws Throwable {

    Object returnValue = null;

    InterceptorStatusToken token = super.beforeInvocation(new ChannelInvocation(methodInvocation));

    try {

    returnValue = methodInvocation.proceed();

    }

    finally {

    returnValue = super.afterInvocation(token, returnValue);

    }

    return returnValue;

    }

    @Override

    public SecurityMetadataSource obtainSecurityMetadataSource() {

    return this.securityMetadataSource;

    }

    }

    ```


    **Listing 8-27** `ChannelSecurityInterceptor` Java Class


    In this code, you can see that `ChannelInvocation` wraps a `MethodInvocation`
    before calling the `beforeInvocation` method on the parent class. Apart from wrapping,
    it will also do some inner processing to make the current executing channel available
    to be queried for `ConfigAttributes`. Also note that the interceptor will do its
    security validations only if the method being invoked is one of the standard "send"
    and "receive" methods of Spring Integration.


    The `ChannelSecurityMetadataSource` that is being used in the code is the one
    that will be queried for obtaining the security metadata attributes. It is the
    one that knows how to extract this information from Spring Integration Channels
    and the related `org.springframework.integration.security.channel.ChannelAccessPolicy`.
    It is very unlikely you will override the security interceptor in your own applications.
    However, it is good to know that you could do it and also understand why you would
    want to do it.


    As the example for Spring Integration shows, one reason you would want to replace
    a security interceptor (or add an additional one) is because you have certain
    abstractions, to which you want to apply interception-based security, that don''t
    fit either URL interception or simple method interceptions. You want to give a
    more meaningful name to your interception logic and also filter certain things
    that are not filtered by default with the default implementations. This is what
    the Spring Integration example is doing. It is intercepting `MessageChannel` communication,
    which is the domain element that makes sense in its context. However, in the end,
    it is basically intercepting methods and filtering to intercept only the methods
    `send` and `receive`, which again are the ones that make sense in the particular
    context.


    ## Spring Security Extensions Project


    There is a whole project dedicated to the development of Spring Security extensions,
    where people from the community can develop their own extensions on top of Spring
    Security. In this way, they can decouple these extensions from the main Spring
    Security project, allowing it to evolve independently. The home of this extensions
    project is [`https://spring.io/projects/spring-security`](https://spring.io/projects/spring-security).
    If you visit this page, you will see that currently there are two extensions projects
    in existence: Kerberos integration and SAML2 integration. There is also the OAuth
    integration, which lives on its own as an individual project. You can find it
    at [`https://docs.spring.io/spring-security/oauth/`](https://docs.spring.io/spring-security/oauth/).


    Each project in Spring Security Extensions can implement as many parts of the
    framework as it needs in order to work correctly. This means that many of the
    extension points that we defined in this chapter (and some others) could be overridden
    in a particular extension in order to do its work.


    ## Summary


    In this chapter, we showed how the modularity in the architecture of Spring Security
    pays off when you want to customize or extend its behavior. We showed how to create
    a Spring Boot Web Application using Spring Security v5 and MongoDB. We also showed
    some of the different and most common extension points that Spring Security offers
    so that you can adapt its functionality to your particular application while keeping
    the core functionality, making the work easier for you by leveraging this functionality.
    After reading this chapter, and with all the theory and practice from previous
    chapters, you should feel confident enough to implement functionality that goes
    beyond the out-of-the-box offerings of the framework.


    ## 9. Integrating Spring Security with Other Frameworks and Languages'
