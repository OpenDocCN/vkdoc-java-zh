    package com.apress.pss.springsecurity.controller;

    import javax.servlet.http.HttpServletRequest;

    import javax.servlet.http.HttpServletResponse;

    import org.springframework.security.core.Authentication;

    import org.springframework.security.core.context.SecurityContextHolder;

    import org.springframework.security.web.authentication.logout.SecurityContextLogoutHandler;

    import org.springframework.stereotype.Controller;

    import org.springframework.ui.ModelMap;

    import org.springframework.web.bind.annotation.GetMapping;

    @Controller

    public class UserController {

    @GetMapping ("/")

    public String home() {

    return "index";

    }

    @GetMapping ("/index")

    public String index() {

    return "index";

    }

    @GetMapping ("/movies")

    public String movies() {

    return "movies";

    }

    }

    ```


    Listing 5-3 The `UserController` Controller


    You can see that in this controller you specified the URL, the HTTP method, and
    the body of the request you will receive. The URL is built with a combination
    of the class-level `RequestMapping` annotation’s value concatenated with the method-level
    `RequestMapping` annotation’s value. So your URL is `movies`. The HTTP method
    is specified as POST in the `RequestMapping` annotation on the method. The `RequestBody`
    annotation in the method parameter simply tells Spring to populate the movie parameter
    with the string that comes in the body of the request. And the `ResponseBody`
    annotation at the method level tells Spring to use the return value of the method
    as the body content of the response.


