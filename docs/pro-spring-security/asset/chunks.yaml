    ## 本书结构


    本书共分为九章，循序渐进地讲解 Spring Security。内容从基础应用概述和框架结构说明开始，逐步深入到更高级的主题，例如在不同 JVM 语言中使用
    Spring Security。本书的编排顺序与该框架在实际应用中的常规使用方式相对应。


    各章节内容如下：


    *   **第** **1** **章**：总体介绍安全性，以及如何在应用层面处理安全问题。

    *   **第** **2** **章**：介绍 Spring Security v5，包括如何使用、何时使用以及其所有安全功能。

    *   **第** **3** **章**：通过一个简单的示例应用程序介绍 Spring Security，该程序在 URL 级别保护 Web 访问。

    *   **第** **4** **章**：全面介绍 Spring Security 的架构，包括主要组件及其交互方式。

    *   **第** **5** **章**：深入介绍 Spring Security 中可用的 Web 层安全选项。

    *   **第** **6** **章**：涵盖多种可集成到 Spring Security 的身份验证提供程序，包括 LDAP 和 JASS。

    *   **第** **7** **章**：介绍用于保护单个领域对象的访问控制列表（ACL），以及它们如何融入整体安全考量。

    *   **第** **8** **章**：解释如何通过利用 Spring Security 模块化架构支持的众多扩展点来扩展其核心功能。

    *   **第** **9** **章**：展示如何将 Spring Security 与不同的 Java 框架以及一些重要的 JVM 编程语言集成。


    ## 前提条件


    本书中的所有示例均使用 Java 11 和 Maven 3.6.1 构建。尽可能使用最新的 Spring 版本。全书使用的 Spring Security
    版本为 5.1.5。本书中的不同 Web 应用程序主要使用 Tomcat Web Server v9（通过其 Maven 插件），使用的笔记本电脑是配备 8GB
    内存的 ThinkPad Yoga 360。所有项目均使用 IntelliJ IDEA Ultimate 2019.2 开发。


    您可以使用自己的工具和操作系统。由于所有内容均基于 Java，您应该能够在任何平台上毫无问题地编译程序。


    ## 下载代码


    本书中示例的代码可通过位于 [`www.apress.com/9781484250518`](http://www.apress.com/9781484250518)
    的“下载源代码”按钮获取。


    ## 联系作者


    我们非常欢迎您就本书或任何我们能提供帮助的其他主题向我们提供反馈。您可以通过 Carlo Scarioni 的博客 [`http://cscarioni.blogspot.com`](http://cscarioni.blogspot.com/)
    联系他，或发送电子邮件至 `carlo.scarioni@gmail.com`。您可以通过电子邮件 `massimonardonedevchannel@gmail.com`
    联系 Massimo Nardone。


    致谢


    本书无疑是多人合作的成果。参与本书编写的人员为最终版本带来了丰富的经验和高质量的内容，使得最终成果比我独自完成要好得多。他们的贡献包括改进文本风格、引入更好的概念呈现方式、进行代码审查以及提出总体改进建议，这些都极大地提升了本书的阅读体验。


    我指的当然是 Apress 的优秀同仁们，他们陪伴我走过了撰写本书的整个旅程。我指的是 Steve Anglin，他引导我进入这个项目，远程关注本书的进展，并尽力确保我尽可能保持在正轨上。我指的是
    Kevin Shea，他是我主要的编辑联系人，确保我按时完成本书的写作，并提供了建议和支持。我指的是 Tom Welsh，他肩负着在我写作时审阅每一章的重任；他对每个部分都提出了宝贵的意见，包括帮助我改进英语语法，以及思考如何使不同部分对潜在读者更具吸引力。我指的是
    Manuel Jordan，他不仅非常详细地阅读了每一章，还承担了评估和执行每一行代码的繁重工作，确保本书提供的代码示例能够被读者在自己的环境中复现。他的贡献非常宝贵，这是决定本书是完整还是半成品的关键。当然，Apress
    还有更多人参与了本书的完整审阅阶段，我想对他们所有人说一声“感谢你们的帮助”。


    我还要感谢 Spring 和 Spring Security 的创建者、提交者和社区，感谢他们创建了如此出色的软件，并使其对所有人开放。非常感谢他们通过自由分发
    SpringSource 保护伞下各个项目的源代码，让所有开发者能够分享他们的知识和工作方式。他们让我们都成为更明智、更优秀的开发者。


    最后，我要感谢我的妻子一直陪伴着我，并激励我不断前进。


    > —Carlo Scarioni


    非常感谢我美好的家人——我的妻子 Pia，以及我的孩子 Luna、Leo 和 Neve——在我撰写本书期间给予我的支持。你们是我生命中最美好的理由。


    我要感谢我已故的挚爱母亲 Maria Augusta Ciniglio，她一直如此支持和爱我。我将永远爱您、思念您，我最亲爱的妈妈。


    感谢我挚爱的父亲 Giuseppe，以及我的兄弟 Mario 和 Roberto，感谢你们无尽的爱，你们是世界上最好的父亲和兄弟。


    我还要将本书献给我已故的最亲爱的表兄 Gerardo “Amerigo” Nardone。我们会永远怀念你。


    非常感谢 Steve Anglin 和 Matthew Moodie 给我机会作为作者参与本书的编写，同样感谢 Mark Powers 在编辑过程中所做的出色工作以及一直以来的支持，当然还要感谢本书的技术审阅者，他们帮助我使本书变得更好。


    > —Massimo Nardone


