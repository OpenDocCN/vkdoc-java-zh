    of the `Authentication`. Mainly, these processors will do some kind of validation
    and throw `SessionAuthenticationException` if appropriate. Currently, these processors
    (or strategies) include only one main class in the form of `org.springframework.security.web.authentication.session.ConcurrentSessionControlStrategy`,
