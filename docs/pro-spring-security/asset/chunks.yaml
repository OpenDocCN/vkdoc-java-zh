    Your first Java Web Application project 


    In the Package Explorer, you should now see your Pss01 project. If you expand
    it and all its children, you’ll see something like Figure [3-8](#310331_2_En_3_Chapter.xhtml#Fig8).


    ![../images/310331_2_En_3_Chapter/310331_2_En_3_Fig8_HTML.jpg](images/310331_2_En_3_Chapter/310331_2_En_3_Fig8_HTML.jpg)


    Figure 3-8


    Your first Java Web Application project structure


    In general, the structure of most Java Web Application projects will contain


    *   The target directory: Used to house all output of the build


    *   The `src` directory: Contains all of the source material for building the
    project, its site, etc.


    *   `src/main/java`: Application/library sources


    *   `src/main/resources`: Application/library resources


    *   `web`: Web application sources


    *   `Pom.xml`: `File` description of the project


    Your next step is to update the Java Web Application project’s files needed for
    your first simple application. Please note that for this simple Java Web Application
    example, you will not need to add any specific dependency to the project file
    `pom.xml`, which looks initially like Listing [3-1](#310331_2_En_3_Chapter.xhtml#PC2).


    ```


    4.0.0

    com.apress.pss

    Pss01

    1.0-SNAPSHOT


    Listing 3-1

    The pom.xml File with Servlet Dependencies

    ```


    The project right now only contains one simple `.jsp` file named `index.jsp`,
    which you will update to show the text you wish, as shown in Listing [3-2](#310331_2_En_3_Chapter.xhtml#PC3).


    ```


    $Title$


    Hello Spring Security!


    Listing 3-2

    The index.jsp File

    ```


    Next, click the Add Configuration button, located at the top-right of the IntelliJ
    tool, to configure how to run your first example.


    You can run your project using the external Tomcat Server v9, as shown in Figure
    [3-9](#310331_2_En_3_Chapter.xhtml#Fig9).


    ![../images/310331_2_En_3_Chapter/310331_2_En_3_Fig9_HTML.jpg](images/310331_2_En_3_Chapter/310331_2_En_3_Fig9_HTML.jpg)


    Figure 3-9


    Configure the running steps of your first Maven project 


    Now you can open you web browser and type the web address `http://localhost:8080`,
    as shown in Figure [3-10](#310331_2_En_3_Chapter.xhtml#Fig10).


    ![../images/310331_2_En_3_Chapter/310331_2_En_3_Fig10_HTML.jpg](images/310331_2_En_3_Chapter/310331_2_En_3_Fig10_HTML.jpg)


    Figure 3-10


    The Java Web Application project running in a web browser


    Your first Java Web Application project is now ready to be transformed into a
    Spring Security project.'
