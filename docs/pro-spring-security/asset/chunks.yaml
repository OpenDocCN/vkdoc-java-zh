- fmt: "#### The Security Interceptor\n\nOne of the most important components of the\
    \ framework is the Security Interceptor. With the main logic implemented in `AbstractSecurityInterceptor`\
    \ and with two concrete implementations in the form of `FilterSecurityInterceptor`\
    \ and `MethodSecurityInterceptor` (as shown in Figure [4-4](#310331_2_En_4_Chapter.xhtml#Fig4)),\
    \ the Security Interceptor is in charge of deciding whether a particular petition\
    \ should be allowed to go through to a secured resource. `MethodSecurityInterceptor`,\
    \ as its name should tell you, deals with petitions directed as method calls,\
    \ while `FilterSecurityInterceptor` deals with petitions directed to web URLs.\n\
    \nThe Security Interceptor works with a preprocessing step and a postprocessing\
    \ step. In the preprocessing step, it looks to see whether the requested resource\
    \ is secured with some metadata information (or `ConfigAttribute`). If it is not,\
    \ the request is allowed to continue its way either to the requested URL or method.\
    \ If the requested resource is secured, the Security Interceptor retrieves the\
    \ `Authentication` object from the current `SecurityContext`. If necessary, the\
    \ `Authentication` object will be authenticated against the configured `AuthenticationManager`\
    \ with the following method:\n\n```\npublic interface AuthenticationManager {\n\
    Authentication authenticate(Authentication authentication)\nthrows AuthenticationException;\n\
    }\n```\n\nAn `AuthenticationManager` can do mainly three things with its method:\n\
    \n- Return an `Authentication` with value `authenticated=true` if the input represents\
    \ a valid principal and can be verified\n- Throw an `AuthenticationException`\
    \ if the input represents an invalid principal\n- Return null if it can’t decide\n\
    \nNotice that `ProviderManager` (which delegates to a chain of `AuthenticationProvider`\
    \ instances) is the most commonly used implementation of `AuthenticationManager`.\n\
    \nAn example of the `AuthenticationManager` hierarchy using `ProviderManager`\
    \ is shown in Figure [4-4](#310331_2_En_4_Chapter.xhtml#Fig4).\n\n![../images/310331_2_En_4_Chapter/310331_2_En_4_Fig4_HTML.jpg](images/310331_2_En_4_Chapter/310331_2_En_4_Fig4_HTML.jpg)\n\
    \nFigure 4-4  \nAuthenticationManager hierarchy using ProviderManager\n\nAfter\
    \ the object is authenticated, `AccessDecisionManager` is called to determine\
    \ if the authenticated entity is able to finally access the resource. `AccessDecisionManager`\
    \ throws an `AccessDeniedException` if the authenticated entity is not allowed\
    \ to access the resource. If `AccessDecisionManager` decides that the `Authentication`\
    \ entity is allowed to access the resource, the `Authentication` object is passed\
    \ to `RunAsManager` if this is configured. If `RunAsManager` is not configured,\
    \ a no-op implementation is called. `RunAsManager` returns either null (if it’s\
    \ not configured to be used) or a new `Authentication` object containing the same\
    \ principal, credentials, and granted authorities as the original `Authentication`\
    \ object, plus a new set of authorities based on the `RUN_AS` that is being used.\
    \ This new `Authentication` object is put into the current `SecurityContext`.\n\
    \nAfter this processing, and independently of whether or not a `RUN_AS Authentication`\
    \ object is used, the Security Interceptor creates a new `InterceptorStatusToken`\
    \ with information about the `SecurityContext` and the `ConfigAttributes`. This\
    \ token will be used later in the postprocessing step of the Security Interceptor.\
    \ At this point, the Security Interceptor is ready to allow access to the secured\
    \ resource, so it passes the invocation through and the particular secured entity\
    \ (either a URL or a method) is invoked. After the invocation returns, the second\
    \ phase of the Security Interceptor comes into play, and the postprocessing begins.\
    \ The postprocessing step is considerably simpler, and it involves only calling\
    \ an `AfterInvocationManager`'s `decide` method if there is one configured. In\
    \ its current implementation, `AfterInvocationManager` delegates to instances\
    \ of `PostInvocationAuthorizationAdvice`, which ultimately filters the returned\
    \ objects or throws an `AccessDeniedException` if necessary. This is the case\
    \ if you are using the postinvocation filters in method-level security, as you\
    \ will see in the following chapter. In the case of web security, the `AfterInvocationManager`\
    \ is null.\n\nThat is a lot of work for the Security Interceptor. However, because\
    \ the framework is nicely modular at the class level, you can see that the Security\
    \ Interceptor simply delegates most of the task to a series of well-defined collaborators,\
    \ which in a very SRP (Single Responsibility Principle) way focus on single, narrowly\
    \ scoped responsibilities. This is good software design and an example you should\
    \ emulate. As shown in Listing [4-1](#310331_2_En_4_Chapter.xhtml#PC2), you paste\
    \ the main parts of the code from the `AbstractSecurityInterceptor` itself so\
    \ that you can see the things we’ve been talking about. We include some comments\
    \ in the code so that you can understand better what it does; they start with\
    \ `//----`.\n\nPlease notice that the entire `AbstractSecurityInterceptor` course\
    \ code can be found on the GitHub address at [`https://github.com/spring-projects/spring-security/blob/master/core/src/main/java/org/springframework/security/access/intercept/AbstractSecurityInterceptor.java`](https://github.com/spring-projects/spring-security/blob/master/core/src/main/java/org/springframework/security/access/intercept/AbstractSecurityInterceptor.java)."
  raw: '#### The Security Interceptor


    One of the most important components of the framework is the Security Interceptor.
    With the main logic implemented in `AbstractSecurityInterceptor` and with two
    concrete implementations in the form of `FilterSecurityInterceptor` and `MethodSecurityInterceptor`
    (as shown in Figure [4-4](#310331_2_En_4_Chapter.xhtml#Fig4)), the Security Interceptor
    is in charge of deciding whether a particular petition should be allowed to go
    through to a secured resource. `MethodSecurityInterceptor`, as its name should
    tell you, deals with petitions directed as method calls, while `FilterSecurityInterceptor`
    deals with petitions directed to web URLs.


    The Security Interceptor works with a preprocessing step and a postprocessing
    step. In the preprocessing step, it looks to see whether the requested resource
    is secured with some metadata information (or `ConfigAttribute`). If it is not,
    the request is allowed to continue its way either to the requested URL or method.
    If the requested resource is secured, the Security Interceptor retrieves the `Authentication`
    object from the current `SecurityContext`. If necessary, the `Authentication`
    object will be authenticated against the configured `AuthenticationManager` with
    the following method:


    ```

    public interface AuthenticationManager {

    Authentication authenticate(Authentication authentication)

    throws AuthenticationException;

    }

    ```


    An `AuthenticationManager` can do mainly three things with its method:


    *   Return an Authentication with value `authenticated=true` if the input represents
    a valid principal and can be verified


    *   Throw an `AuthenticationException` if the input represents an invalid principal


    *   Return null if it can’t decide


    Notice that `ProviderManager` (which delegates to a chain of `AuthenticationProvider`
    instances) is the most commonly used implementation of `AuthenticationManager`.


    An example of the `AuthenticationManager` hierarchy using `ProviderManager` is
    shown in Figure [4-4](#310331_2_En_4_Chapter.xhtml#Fig4).


    ![../images/310331_2_En_4_Chapter/310331_2_En_4_Fig4_HTML.jpg](images/310331_2_En_4_Chapter/310331_2_En_4_Fig4_HTML.jpg)


    Figure 4-4


    AuthenticationManager hierarchy using ProviderManager


    After the object is authenticated, `AccessDecisionManager` is called to determine
    if the authenticated entity is able to finally access the resource. `AccessDecisionManager`
    throws an `AccessDeniedException` if the authenticated entity is not allowed to
    access the resource. If `AccessDecisionManager` decides that the `Authentication`
    entity is allowed to access the resource, the `Authentication` object is passed
    to `RunAsManager` if this is configured. If `RunAsManager` is not configured,
    a no-op implementation is called. `RunAsManager` returns either null (if it’s
    not configured to be used) or a new `Authentication` object containing the same
    principal, credentials, and granted authorities as the original `Authentication`
    object, plus a new set of authorities based on the `RUN_AS` that is being used.
    This new `Authentication` object is put into the current `SecurityContext`.


    After this processing, and independently of whether or not a `RUN_AS Authentication`
    object is used, the Security Interceptor creates a new `InterceptorStatusToken`
    with information about the `SecurityContext` and the `ConfigAttributes`. This
    token will be used later in the postprocessing step of the Security Interceptor.
    At this point, the Security Interceptor is ready to allow access to the secured
    resource, so it passes the invocation through and the particular secured entity
    (either a URL or a method) is invoked. After the invocation returns, the second
    phase of the Security Interceptor comes into play, and the postprocessing begins.
    The postprocessing step is considerably simpler, and it involves only calling
    an `AfterInvocationManager''`s `decide` method if there is one configured. In
    its current implementation, `AfterInvocationManager` delegates to instances of
    `PostInvocationAuthorizationAdvice`, which ultimately filters the returned objects
    or throws an `AccessDeniedException` if necessary. This is the case if you are
    using the postinvocation filters in method-level security, as you will see in
    the following chapter. In the case of web security, the `AfterInvocationManager`
    is null.


    That is a lot of work for the Security Interceptor. However, because the framework
    is nicely modular at the class level, you can see that the Security Interceptor
    simply delegates most of the task to a series of well-defined collaborators, which
    in a very SRP (Single Responsibility Principle) way focus on single, narrowly
    scoped responsibilities. This is good software design and an example you should
    emulate. As shown in Listing [4-1](#310331_2_En_4_Chapter.xhtml#PC2), you paste
    the main parts of the code from the `AbstractSecurityInterceptor` itself so that
    you can see the things we’ve been talking about. We include some comments in the
    code so that you can understand better what it does; they start with `//----`.


    Please notice that the entire `AbstractSecurityInterceptor` course code can be
    found on the GitHub address at [`https://github.com/spring-projects/spring-security/blob/master/core/src/main/java/org/springframework/security/access/intercept/AbstractSecurityInterceptor.java`](https://github.com/spring-projects/spring-security/blob/master/core/src/main/java/org/springframework/security/access/intercept/AbstractSecurityInterceptor.java).'
