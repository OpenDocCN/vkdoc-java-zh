    \ the list of software you’ll need to download and install in the given order:\n\
    \n*   Java SE Development Kit (JDK) 11\n*   Maven 3.6.1\n*   IntelliJ IDEA Ultimate\
    \ Edition 2019.2\n*   Apache Tomcat Server v9 (External)\n\nLet’s go through the\
    \ steps required to set up everything properly.\n\nYour first step is to set up\
