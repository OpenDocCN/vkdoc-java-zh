    **Listing 8-9** `login.html` Page


    This `login.html` page will do three things:


    1.  Send the email address and password to the `LoginController` Java class as
    an HTTP POST method.

    2.  Check if the email and password are typed correctly.

    3.  Provide the signup option to add a new user to the MongoDB database.


    To check if the credentials of the user are valid and where they should be redirected,
    create the Java Controller class named `LoginController`, as shown in Listing
    [8-10](#310331_2_En_8_Chapter.xhtml#PC17).


    ```

    package com.apress.SpringSecurityMongoDB.controller;

    import com.apress.SpringSecurityMongoDB.domain.User;

    import com.apress.SpringSecurityMongoDB.service.CustomUserDetailsService;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.security.core.Authentication;

    import org.springframework.security.core.context.SecurityContextHolder;

    import org.springframework.stereotype.Controller;

    import org.springframework.validation.BindingResult;

    import org.springframework.web.bind.annotation.RequestMapping;

    import org.springframework.web.bind.annotation.RequestMethod;

    import org.springframework.web.servlet.ModelAndView;

    import javax.validation.Valid;

    @Controller

    public class LoginController {

    @Autowired

    private CustomUserDetailsService userService;

    @RequestMapping(value = "/login", method = RequestMethod.GET)

    public ModelAndView login() {

    ModelAndView modelAndView = new ModelAndView();

    modelAndView.setViewName("login");

    return modelAndView;

    }

    @RequestMapping(value = "/signup", method = RequestMethod.GET)

    public ModelAndView signup() {

    ModelAndView modelAndView = new ModelAndView();

    User user = new User();

    modelAndView.addObject("user", user);

    modelAndView.setViewName("signup");

    return modelAndView;

    }

    @RequestMapping(value = "/signup", method = RequestMethod.POST)

    public ModelAndView createNewUser(@Valid User user, BindingResult bindingResult)
    {

    ModelAndView modelAndView = new ModelAndView();

    User userExists = userService.findUserByEmail(user.getEmail());

    if (userExists != null) {

    modelAndView.addObject("message", "There is already a user registered with the
    username provided");

    bindingResult

    .rejectValue("email", "error.user",

    "There is already a user registered with the username provided");

    }

    if (bindingResult.hasErrors()) {

    modelAndView.setViewName("signup");

    } else {

    userService.saveUser(user);

    modelAndView.addObject("successMessage", "User has been registered successfully");

    modelAndView.addObject("user", new User());

    modelAndView.setViewName("login");

    }

    return modelAndView;

    }

    @RequestMapping(value = "/admin", method = RequestMethod.GET)

    public ModelAndView admin() {

    ModelAndView modelAndView = new ModelAndView();

    Authentication auth = SecurityContextHolder.getContext().getAuthentication();

    User user = userService.findUserByEmail(auth.getName());

    modelAndView.addObject("currentUser", auth.getName());

    modelAndView.addObject("role", user.getRole());

    modelAndView.addObject("adminMessage", "Content Available Only for Authenticated
    Admins!");

    modelAndView.setViewName("admin");

    return modelAndView;

    }

    @RequestMapping(value = "/user", method = RequestMethod.GET)

    public ModelAndView user() {

    ModelAndView modelAndView = new ModelAndView();

    Authentication auth = SecurityContextHolder.getContext().getAuthentication();

    User user = userService.findUserByEmail(auth.getName());

    modelAndView.addObject("currentUser", auth.getName());

    modelAndView.addObject("role", user.getRole());

    modelAndView.addObject("userMessage", "Content Available Only for Authenticated
    Users!");

    modelAndView.setViewName("user");

    return modelAndView;

    }

    @RequestMapping(value = {"/","/welcome"}, method = RequestMethod.GET)

    public ModelAndView home() {

    ModelAndView modelAndView = new ModelAndView();

    modelAndView.setViewName("welcome");

    return modelAndView;

    }

    @RequestMapping(value = {"/forbidden"}, method = RequestMethod.GET)

    public ModelAndView forbidden() {

    ModelAndView modelAndView = new ModelAndView();

    modelAndView.setViewName("forbidden");

    return modelAndView;

    }

    }

