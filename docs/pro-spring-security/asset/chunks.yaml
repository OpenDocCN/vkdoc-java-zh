- fmt: '# Password Encryption


    One thing you might have noticed in this example and all the previous examples
    is that you are storing and retrieving passwords in plain text. Spring Security
    offers an abstraction to encrypt passwords in the form of the interface that was
    in Spring Security v4 as `org.springframework.security.authentication.encoding.PasswordEncoder`
    but changed in Spring Security v5 to `org.springframework.security.crypto.password.PasswordEncoder`
    in the core framework.


    Since Spring Security v5 it was declared the `PasswordEncoder` in `org.springframework.security.authentication.encoding`
    was deprecated so this interface was removed since it was not designed for a randomly
    generated salt.


    Also, Spring Security v5 changed how encoded passwords are handled since, before
    v5, every application could only work with one password encoding algorithm.


    Before Spring Security v5, the default `PasswordEncoder` was `NoOpPasswordEncoder`
    which required plain text passwords. `PasswordEncoder` is now replaced with `BCryptPasswordEncoder`.


    Then of course we could face right away problems like, how do we deal with old
    applications using old password encodings that cannot easily migrate? And what
    happens when the password storage changes again?


    Since Spring Security v5, a concept of password encoding delegation named `DelegatingPasswordEncoder`
    was introduced, which generally allow us to use different encodings for different
    passwords.


    `DelegatingPasswordEncoder` works so that any password is encoded using the current
    password storage recommendations, allows for validating passwords in modern and
    legacy formats, and allows for upgrading the encoding in the future.


    Spring Security v5 automatically recognizes the algorithm using an identifier
    prefixing the encoded password. The general format for a password is `{id}encodedPassword`.
    Here are some examples of encoded password:


    ```

    {noop}password

    {bcrypt}$1c$23$TeLobXCxerA5EDFqwKJFn.KUT2VCdsaAwD67WETa9A.7Hrt123Kea

    {sha256}123ghjss67239nsgewt6772ghsjd22789sa2jkalsaldsdj72349378sadsajdsljd32874732salkdf

    {pbkdf2}hdsfjhdsfurehyuhhfsjdhfhfkjhdsfkjhdfkjshdfösakfucxvhkjvhcoiweshfjdsfewtsrewrwyir

    {scrypt}?shdf4Md3234hlkf843Lhhdsjfsd7982374293hsdkjfshdfh91273fgsjjdhfgssjfdggfsdllflsdlfsdfsdUp4of4g24hHnazw==$OAOec05+bXxvuu/1qZ6NUOc/9bdYSrN1oD?

    ```


    As you saw for the bcrypt example, the `{bcrypt}` prefix was used to tell Spring
    Security to use the bcrypt password encoder. In case of a password hash with no
    prefix, the delegation process uses a default encoder, which is by default the
    `StandardPasswordEncoder`. So the password will have `PasswordEncoder id = bcrypt
    and encodedPassword = $1c$23$TeLobXCxerA5EDFqwKJFn.KUT2VCdsaAwD67WETa9A.7Hrt123Kea`
    so when matching it would delegate to `BCryptPasswordEncoder`.


    Note that you can easily construct an instance of `DelegatingPasswordEncoder`
    using `PasswordEncoderFactories` like this:


    ```

    PasswordEncoder passwordEncoder = PasswordEncoderFactories.createDelegatingPasswordEncoder();

    ```


    So, how does the password matching work? It works based upon the `{id}` and the
    mapping of the id to the `PasswordEncoder` provided in the constructor, as you
    saw before.


    In general, by default, the result of invoking `matches(CharSequence, String)`
    with a password and an id that is not mapped (including a null id) will trigger
    the `IllegalArgumentException`. You can customize this behavior by using `DelegatingPasswordEncoder.setDefaultPasswordEncoderForMatches(PasswordEncoder)`.


    Finally, the Java configuration for BCrypt could be like this:


    ```

    import org.springframework.security.crypto.bcrypt.BCryptPasswordEncoder;

    @Bean

    public BCryptPasswordEncoder passwordEncoder() {

    BCryptPasswordEncoder bCryptPasswordEncoder = new BCryptPasswordEncoder();

    return bCryptPasswordEncoder;

    }

    ```


    # Handling Errors and Entry Points


    Spring Security has a very nice error-handling mechanism built in. It offers a
    comprehensive set of exceptions that map to the most common cases of security
    errors you could expect to have in a system.


    Continuing with Spring Security’s great single-responsibility architecture, the
    handling of error conditions is mostly encapsulated in one single class. This
    class is (and you have studied it before) the `org.springframework.security.web.access.ExceptionTranslationFilter`,
    and it basically deals with two types of exceptions: `AccessDeniedException` and
    `AuthenticationException`. If any other exception is caught by this filter, it
    will simply rethrow it as a `RuntimeException`.


    Spring Security offers a couple of extension points you can use to plug in functionality
    in the form of a custom entry point and a custom access-denied handler. Basically,
    what happens is that when an `AuthenticationException` is caught by the filter,
    an `AuthenticationEntryPoint`’s "commence" method is called with the HTTP request,
    the HTTP response, and the exception. The particular `AuthenticationEntryPoint`
    implementation that is configured in the application can decide what to do with
    the exception and, more importantly, what to do with the HTTP response. By default,
    the implementation used is `org.springframework.security.web.authentication.LoginUrlAuthenticationEntryPoint`,
    which redirects to the login URL, which, as you already know, is `/login` in the
    root of your application.


    The entry point is invoked when an `AuthenticationException` is thrown or when
    an `AccessDeniedException` is thrown and the current `Authentication` object is
    anonymous.


    As another artificial example, you will implement an entry point that will add
    a cookie each time an authentication attempt is made from the client side and
    then show the basic authentication scheme in the browser. This means you will
    set a cookie in the response that will increment its value every time the entry
    point is invoked. Then the cookie is sent back to the server every time with the
    new value. This means that the counter for the attempts is not stored in the server
    at all; it is stored just in the client cookie and is sent back and forth between
    the client and the server. So the server receives the cookie, increments its value,
    and then sends it back. It is not really innovative in any way, but it allows
    us, again, to show that you can override the entry point to do different things.


    Most likely, the entry point is overridden when a different kind of authentication
    scheme is being used. For example, one of the standard entry points applies when
    using authentication schemes that require showing a login page, while others (in
    particular the `BasicAuthenticationEntryPoint`) are used to set up particular
    values in the response to inform the browser how to treat it. In most cases, the
    implementation of an entry point goes hand in hand with the implementation of
    a new security filter. If you take a look at the implementations provided by the
    framework, you can see this clear relationship in `BasicAuthenticationEntryPoint`
    – `BasicAuthenticationFilter`, `LoginUrlAuthenticationEntryPoint` – `UsernamePasswordAuthenticationFilter`
    (kind of; this one is not as one-to-one), `CasAuthenticationEntryPoint` – `CasAuthenticationFilter`,
    and some others. Basically, the entry points set the groundwork and then the filter
    processes the subsequent request.


    Figure [8-21](#310331_2_En_8_Chapter.xhtml#Fig21) shows the relationship between
    the `ExceptionTranslationFilter` and the `AuthenticationEntryPoint`.


    ![../images/310331_2_En_8_Chapter/310331_2_En_8_Fig21_HTML.jpg](images/310331_2_En_8_Chapter/310331_2_En_8_Fig21_HTML.jpg)


    **Figure 8-21** The `ExceptionTranslationFilter` and `AuthenticationEntryPoint`
    relationship'
