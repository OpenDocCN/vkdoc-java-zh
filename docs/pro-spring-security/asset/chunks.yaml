    使用组的优势在于，它提供了一种将用户组织到同一类别的新层次，并且不直接将他们与特定权限关联。相反，它将整个组与权限关联。例如，你通常会认为所有管理员都属于管理员组，并且该组有许多与之相关的权限，如`ROLE_ADMIN`、`ROLE_USER`、`ROLE_OPERATOR`等。所有这些权限都可以归入同一个概念组，同时，所有用户都可以归入他们各自的组。这意味着并非所有用户都需要引用所有这些权限。他们只需要成为该组的一部分即可。当然，一个用户可以同时属于多个组。


    ## 使用现有模式


    默认情况下，`JdbcDaoImpl`配置为使用你已经看过的数据库模式和查询。然而，模式配置是灵活的，你可以调整现有的数据库用户模式（如果有的话），使其被Spring
    Security JDBC `UserDetails`支持使用，而不是为Spring Security编写一个自定义模式。当然，你当前的模式中需要存在某些概念，例如“用户”抽象、“权限”或“角色”定义，以及如果你也要使用组的话，还需要“组”抽象。如果你的数据库中已经存在这些抽象，那么从Spring
    Security的JDBC支持中访问信息就很简单了。`<jdbc-user-service>`元素中的两个属性（`authorities-by-username-query`和`group-authorities-by-username-query`）允许你指定确切的SQL，这些SQL将用于在不使用组或确实使用组时检索特定用户名的权限。


    你在上一节中看到了如何使用`group-authorities-by-username-query`属性的示例。`authorities-by-username-query`的配置方式类似，它应该是一个在其结果集中返回两列的查询。第一列代表用户名，第二列代表一个特定的权限。例如，默认查询如下所示：


    ```

    select username,authority from authorities where username = ?

    ```


    你需要在`<jdbc-user-service>`元素中更改的另一个属性是`users-by-username-query`。这里你使用所需的查询来通过用户名检索用户。该查询需要在一个记录中返回三列：`username`、`password`和`enabled`。


