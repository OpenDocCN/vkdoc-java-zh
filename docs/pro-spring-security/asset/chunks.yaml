    \ Security 期望使用这些特定的名称，以便正确处理认证过程。此外，表单应使用 POST 方法将信息发送到服务器，因为这是框架的要求。\n图中显示的“记住我”复选框将在后面解释。\n\
    `<form-login>` 元素支持更多配置选项，包括更改认证请求参数的默认 `username` 和 `password` 名称。\n\n`<form-login>`\
    \ 的属性可能包括\n\n*   `always-use-default-target`\n\n*   `authentication-details-source-ref`\n\
