    图 6-27

    选择要使用的客户端证书


    点击“确定”后，你将看到管理页面，这意味着认证成功；见图 6-28。


    ![../images/310331_2_En_6_Chapter/310331_2_En_6_Fig28_HTML.jpg](img/310331_2_En_6_Fig28_HTML.jpg)


    图 6-28

    成功的客户端证书认证管理页面


    这就是使用客户端证书认证的请求所遵循的完整流程。如你所见，Spring Security 对此的支持相当直接。


    OAuth 2

    OAuth 2.0 是行业标准的授权协议。你可以在 [`https://oauth.net/2/`](https://oauth.net/2/) 获取更多信息。Spring
    Security 5.0 现已支持 OAuth 2.0 授权框架和 OpenID Connect 1.0。Spring Security 5.1 引入了新的资源服务器支持以及额外的客户端支持。用于认证的
    OAuth 2.0 实现符合 OpenID Connect 规范并已通过 OpenID 认证，可通过 Google 的 OAuth 2.0 API 用于认证和授权。更多信息，请访问
    [`https://developers.google.com/identity/protocols/OAuth2`](https://developers.google.com/identity/protocols/OAuth2)。


    OAuth 2 支持


    *   客户端


    *   资源服务器


    *   授权服务器


    OAuth 2.0 客户端功能提供了对 OAuth 2.0 授权框架中定义的客户端角色的支持。你可以在 [`https://tools.ietf.org/html/rfc6749#section-1.1`](https://tools.ietf.org/html/rfc6749%2523section-1.1)
    获取更多信息。


    在开发 OAuth 2.0 客户端时，可使用以下主要功能：


    *   授权码授权


    *   客户端凭证授权


    *   用于 Servlet 环境的 WebClient 扩展（用于发起受保护资源请求）


    请注意，Spring Security 5 引入了一个新的 `OAuth2LoginConfigurer` 类，可用于配置外部授权服务器。


    JSON Web Token

    Spring Security 5 支持 JSON Web Token (JWT) 认证。


    基本上你需要：


    *   为 JWT 配置 Spring Security


    *   暴露带有映射/authenticate 的 REST POST API


    *   配置一个有效的 JSON Web Token


    具体来说，要配置 Spring Security 和 JWT，你需要执行两个操作：


    1.  通过以下方式生成 JWT：


    *   暴露带有映射/authenticating 的 POST API


    *   传递正确的用户名和密码


    *   生成一个 JSON Web Token


    2.  通过以下方式验证 JWT：


    *   当尝试访问带有特定映射（如 `/Testing`）的 GET API 时


    *   仅当请求包含有效的 JSON Web Token 时才允许访问


    Spring Security 和 JWT 的依赖项包括：


    ```

    io.jsonwebtoken

    jjwt

    0.9.1


    ```


    Spring WebSockets


    Spring Security 5 MVC 支持 Spring WebSockets。对于 WebSocket 实现，你需要添加以下 Maven 依赖项，例如：


    ```

    org.springframework

    spring-websocket

    ${spring.version}


    org.springframework

    spring-messaging

    ${spring.version}


    org.springframework.security

    spring-security-messaging

    ${spring-security.version}


    ```


    然后，你可以使用 `spring-security-messaging` 库，通过 `AbstractSecurityWebSocketMessageBrokerConfigurer`
    类来定义 WebSocket 特定的安全配置，如下所示：


    ```

    @Configuration

    public class SocketSecurityConfig

    extends AbstractSecurityWebSocketMessageBrokerConfigurer {

    //...//

    }

    ```


    JAAS 认证

    Java 认证和授权服务 (JAAS) 是用于管理认证和授权的现有标准 Java 支持。其功能与 Spring Security 明显重叠。JAAS 是一个相对较大的标准，涉及的内容远不止我们在此介绍的少量信息。然而，我们展示的是其主要概念，本节的目的是展示将其与
    Spring Security 集成的基本构建块。有关 JAAS 的更多信息，请查阅 Spring Security 5 参考文档。


    中央认证服务认证

    中央认证服务 (CAS) 是一个用 Java 构建的企业级单点登录解决方案，并且是开源的。它拥有强大的社区支持，并集成到许多 Java 项目中。CAS 为企业中的认证和访问控制提供了一个集中位置。


    概述

    JA-SIG 在 [`http://www.ja-sig.org`](http://www.ja-sig.org) 开发了一个名为 CAS 的企业级单点登录系统。JA-SIG
    的中央认证服务是一个简单、开源、独立的平台，支持代理功能。Spring Security 完全支持 CAS 用于单个应用程序以及由企业级 CAS 服务器保护的多应用程序部署。你可以在
    [`www.apereo.org/projects/cas`](http://www.apereo.org/projects/cas) 了解更多关于 CAS
    的信息。CAS 的一个重要特点是它被设计为充当不同认证存储解决方案的代理。这意味着它可以与 LDAP、JDBC 或包含真实用户数据的其他用户存储结合使用。这看起来很像
    Spring Security 利用这些相同用户数据存储的方式。有关 CAS 的更多信息，请查阅 Spring Security 5 参考文档。


    总结

    在本章中，我们展示了如何利用 Spring Security 的模块化架构，相对轻松地集成不同的认证机制。我们解释了框架自带的一些认证机制。具体来说，我们展示了如何通过使用客户端
    X.509 证书，针对数据库、LDAP 服务器对用户进行认证。JAAS、OAuth2/OpenID、WebSockets、JWT 和 CAS 仅作了介绍。本章重点展示了所有这些不同的认证提供者在框架内部使用时如何相互关联。目的是向你展示，将新的提供者集成到框架中非常简单，值得一试。当然，其难易程度取决于你想要接入的认证方案。本章未涵盖的认证提供者还有很多，但主要思想往往保持不变：创建一个连接到
    Spring Security 的适配器，处理集成协议的细节，并使其适应 Spring Security 的认证和授权模型。


    7. 使用 ACL 的业务对象安全

