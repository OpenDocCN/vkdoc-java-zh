    \ and Spring Security simply creates a successful `Authentication` object\nwith\
    \ information extracted from the certificate and stores it in the\n`SecurityContext`\n\
    in the standard way.\nSo the entity that is actually in charge of authenticating\
    \ the user\n(or more exactly, accepting the user as a properly identified one)\
    \ is\nthe web server, which does this by accepting the provided client\ncertificate.\
    \ Basically, if the server decides that the certificate sent\nby the user is a\
    \ valid one, the user is who she claims to be and gets\nauthenticated.\nIn a production\
    \ system, the web server makes sure that the\ncertificate provided by the client\
    \ is signed by an authorized trusted\nauthority.\nHowever, you will use a test\
    \ environment with your common\nMaven-configured Tomcat installation, and for\
    \ that you will configure a\nself-signed certificate and make sure that Tomcat\
    \ accepts it.\nBefore you start, make sure you installed the openssl tool on your\n\
    machine. Download it from [`https://wiki.openssl.org/index.php/Binaries`](https://wiki.openssl.org/index.php/Binaries).\n\
    Let’s create the server and client\ncertificates needed. It is pretty straightforward\
    \ to do, and you\nwill use the `openssl` tool to do\nit:\n\nFor the server:\n\n\
    1.  Generate a server private key (PEM) and a server self-signed certificate\n\
    \    (CRT):\n\n```\n    openssl req -x509 -newkey rsa:4096 -keyout serverPrivateKey.pem\
    \ -out server.crt -days 3650 -nodes\n    ```\n\n2.  Create a PKCS12 keystore containing\
    \ a private key (P12) and a related\n    self-signed certificate (CRT) (password\
    \ used: changeit):\n\n```\n    openssl pkcs12 -export -out keyStore.p12 -inkey\
    \ serverPrivateKey.pem -in server.crt\n    ```\n\n3.  Generate a server trust\
    \ store (JKS) from the server certificate (CRT):"
