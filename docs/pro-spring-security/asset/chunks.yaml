    interface. It will simply return a 500 status code when failing to authenticate.
    Create the class `CustomAuthenticationFailureHandler` from Listing [5-10](#310331_2_En_5_Chapter.xhtml#PC13).


    ```

    package com.apress.pss.springsecurity.configuration;

    import org.springframework.security.web.authentication.AuthenticationFailureHandler;

    import org.springframework.security.core.AuthenticationException;

