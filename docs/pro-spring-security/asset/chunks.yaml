- fmt: '*   **You need your application to remember its users on their next visit
    and allow them access.** Sometimes you don’t want or need the users of your application
    to log in every time they visit your site. Spring supports out-of-the-box, remember-me
    functionality so that a user can be automatically logged in on subsequent visits
    to your site, allowing them full or partial access to their profile’s functionality.

    *   **You want to use public/private key certificates to authenticate against
    your application.** Spring Security allows you to use X.509 certificates to verify
    the identity of the server. The server can also request a valid certificate from
    the client for establishing mutual authentication.

    *   **You need to hide elements in your web pages from certain users and show
    them to some others.** View security is the first layer of security in a secured
    web application. It is normally not enough for guaranteeing security, but it is
    very important from a usability point of view because it allows the application
    to show or hide content depending on the user that is currently logged in to the
    system.

    *   **You need more flexibility than simple role-based authentication for your
    application.** For example, suppose that you want to allow access only to users
    over 18 years of age using simple script expressions. Spring Security 3.1 uses
    the Spring Expression Language (SpEL) to allow you to customize access rules for
    your application.

    *   **You want your application to automatically handle HTTP status codes related
    to authorization errors (401, 403, and others).** The built-in exception-handling
    mechanism of Spring Security for web applications automatically translates the
    more common exceptions to their corresponding HTTP status codes; for example,
    `AccessDeniedException` gets translated to the `403` status code.

    *   **You want to configure your application to be used from other applications
    (not browsers) and allow these other applications to authenticate themselves against
    yours.** Another application accessing your application should be forced to use
    authentication mechanisms in order to gain access. For example, you can expose
    your application through REST endpoints that other applications can access with
    HTTP security.

    *   **You are running an application outside a Java EE Server.** If you are running
    your application in a simple web container like Apache Tomcat, you probably don’t
    have support for the full Java EE security stack. Spring Security can be easily
    leveraged in these environments.

    *   **You are running an application inside a Java EE Server.** Even if you are
    running a full Java EE container, Spring Security is arguably more complete, flexible,
    and easy to use than the Java EE counterpart.

    *   **You are already using Spring in your application and want to leverage your
    knowledge of it.** We explained before some of the great advantages of Spring.
    If you are currently using Spring, you probably like it a lot. So you will probably
    like Spring Security as well.


    ## Spring Security Overview


    Spring Security v5 is no longer part of SpringSource but instead is now part of
    Pivotal. Spring by Pivotal includes many projects:


    *   Spring Security

    *   Spring Boot

    *   Spring Framework

    *   Spring Cloud Data Flow

    *   Spring Cloud

    *   Spring Data

    *   Spring Integration

    *   Spring Batch

    *   Spring Hateoas

    *   Spring Rest Docs

    *   Spring Amqp

    *   Spring Mobile

    *   Spring For Android

    *   Spring Web Flow

    *   Spring Web Services

    *   Spring Ldap

    *   Spring Session

    *   Spring Shell

    *   Spring Flo

    *   Spring Kafka

    *   Spring Statemachine

    *   Spring Io Platform

    *   Spring Roo

    *   Spring Scala

    *   Spring Blazeds Integration

    *   Spring Loaded

    *   Spring Xd

    *   Spring Social


    For more information, please refer to the Spring project web page at [`https://spring.io/projects`](https://spring.io/projects).


    All of these projects are built on top of the facilities provided by the Spring
    Framework itself, which is the original project that started it all. You can think
    of Spring as the hub of all these satellite projects, providing them with a consistent
    programming model and a set of established practices. The main points you will
    see throughout the different projects is the use of DI, XML namespace-based configuration,
    and AOP, which, as you will see in the next section, are the pillars upon which
    Spring is built. In the later versions of Spring, annotations have become the
    most popular way to configure both DI and AOP concerns.


    In this book, we will mainly introduce Spring Boot, analyze Spring Framework,
    and develop Spring Security version 5. Let’s start with Spring Boot.


    What is Spring Boot?


    Spring Boot is an open source Java-based framework which is generally used for
    developing microservice, enterprise-ready applications. It was developed by the
    Pivotal Team and helps developers to create stand-alone and production-ready Spring
    applications.


    Spring Boot is considered to be an easy starting point for building all Spring-based
    applications and running them as quickly as possible, with minimal upfront configuration
    of Spring.


    ### Note


    Remember that a Spring Security application can be developed with Maven or Gradle.


    As we said, Spring Security is just one more of the Spring projects, and it is
    dedicated exclusively to addressing security concerns in your application.


    For more information, please refer to the documentation at [`https://spring.io/projects/spring-security`](https://spring.io/projects/spring-security).


    Spring Security started originally as a non-Spring project. It was originally
    known as *The Acegi Security System for Spring*, and it was not the big and powerful
    framework it is today. Originally, it dealt only with authorization and leveraged
    container-provided authentication. Because of public demand, the project started
    to get traction, as more people started using it and contributing to its continuously
    growing code base. This eventually led to it becoming a Spring Framework portfolio
    project, and then later it was rebranded as “Spring Security.”


    Here are the Spring Security major releases dates:


    *   2.0.0 (April, 2008)

    *   3.0.0 (December, 2009)

    *   4.0.0 (March, 2015)

    *   5.0.0 (November, 2017)

    *   5.1.4 (February, 2019)


    Notice that Java configuration for Spring Security was added to the Spring framework
    in Spring 3.1 and extended to Spring Security in Spring 3.2 and is defined in
    a class annotated `@Configuration`.


    So the project for many years now has been under the Pivotal umbrella of projects,
    powered by the Spring Framework itself.


    But what exactly is the Spring Framework?'
