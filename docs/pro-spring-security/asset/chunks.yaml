    \n重启应用程序，访问 URL `/movies`，并使用 **admin**/**admin123** 登录。你应该能够毫无问题地访问应用程序。\n\n\
    将此属性赋值为 `/login`。然后，在你的 `login.jsp` 中，在 `<body>` 标签之后添加清单 5-9 中的内容。\n\n```\n清单\
    \ 5-9\n显示 login.jsp 中错误的代码片段\n```\n\n如果你现在重启应用程序，尝试访问 URL `http://localhost:8080/favoritesmovies/movies`，并使用错误的用户名和密码，你将再次看到登录页面，但顶部会显示错误消息。请查看图\
    \ 5-11 了解你应该看到的页面。\n\n![../images/310331_2_En_5_Chapter/310331_2_En_5_Fig11_HTML.jpg](img/310331_2_En_5_Fig11_HTML.jpg)\n\
    \n图 5-11\n自定义表单中显示的自定义错误\n\n请注意，此 URL 可能是一个完全不同的 URL，与登录 URL 完全无关。但常见的模式是允许用户再次尝试登录，并向其显示任何错误。\n\
    \n*   `authentication-success-handler-ref`：\n    对 Spring 应用程序上下文中 `AuthenticationSuccessHandler`\
    \ bean 的引用。此 bean 在成功认证时被调用，并应处理认证后的下一步操作，通常决定应用程序中的重定向目标。当前实现形式为 `SavedRequestAwareAuthenticationSuccessHandler`，它负责在成功认证后将登录用户重定向到最初请求的\
    \ URL。\n\n*   `authentication-failure-handler-ref`：\n    对 Spring 应用程序上下文中 `AuthenticationFailureHandler`\
    \ bean 的引用。它用于处理失败的认证请求。当认证失败时，会调用此处理器。该处理器的标准行为是再次显示登录屏幕或返回 401 HTTP 状态错误。此行为由具体类\
    \ `SimpleUrlAuthenticationFailureHandler` 提供。\n"
