    LDAP 认证

    轻量级目录访问协议（LDAP）是一种面向消息的应用层协议，用于以可访问的树状目录形式存储和访问信息。通常，目录就是一个组织化的数据存储库，便于在其特定领域内进行简单查询。例如，电视指南是一个便于查找电视节目的目录，而电话簿则是一个便于查找电话号码的目录。


    LDAP 允许在目录中存储各种不同类型的信息。最广为人知的类 LDAP 结构应用可能是微软 Windows 活动目录系统。其他 LDAP 系统则被广泛用于存储许多公司的企业用户数据库，作为集中式用户存储。


    LDAP 并非一个易于理解的系统，我们将结合本节开发的示例来尝试解释它。我们将使用与上一节相同的代码，但根据需要进行修改，使其适用于 LDAP 认证而非数据库认证。请记住，在上一节中，我们提供了一个引导应用程序，用于开始本章中的所有示例，包括本示例。


    首先要做的是在 LDAP 目录中配置你的用户。为此，你需要了解 LDAP 信息模型，该模型定义了可以在目录中存储的数据类型。


    LDAP 中的数据由条目、属性和值定义。*条目*是目录中的基本信息单元，通常代表现实世界中的一个实体，例如一个用户。条目通常由特定的对象类定义。目录中的每个条目都有一个称为“专有名称”（通常简称为
    DN）的标识。目录中的每个条目还有一组*属性*，用于描述该条目的不同方面。每个属性都有一个类型和一个或多个*值*。


    你必须定义所需的数据。你将像之前一样使用用户、组和凭证。在 LDAP 中，用户条目定义通常被称为 *People*，因此你将使用该名称来定义用户条目。你的用户还将使用标准的
    LDAP 对象类 `person` 来定义其属性。


    安装和配置 LDAP

    对于你的 LDAP 实现，你将下载并安装 Apache 目录服务器（ApacheDS），地址为 [`https://directory.apache.org/apacheds/downloads.html`](https://directory.apache.org/apacheds/downloads.html)，以及
    Apache 目录工作室，地址为 [`https://directory.apache.org/studio/downloads.html`](https://directory.apache.org/studio/downloads.html)。这两个工具的安装过程都很直接，应该不会给你带来任何问题。请查阅官方网站获取指导。


    Apache 目录工作室允许你访问和查询服务器。它是一个由插件构建的 Eclipse 应用程序，适用于访问 LDAP 服务器。


    关于 ApacheDS 服务器，安装后（至少在 Mac 上），它会自动启动；不过，你也可以选择将 ApacheDS 服务器作为应用程序进程内的嵌入式服务器运行，而不是使用独立的
    LDAP 服务器。在本示例中，我们将使用独立服务器。


    首先，你需要启动 ApacheDS，如图 6-7 的服务列表所示。


    ![../images/310331_2_En_6_Chapter/310331_2_En_6_Fig7_HTML.jpg](img/310331_2_En_6_Fig7_HTML.jpg)


    图 6-7

    启动 ApacheDS


    安装 Apache 服务器和工作室后，你需要从工作室连接到服务器。


    一旦 ApacheDS 服务运行，打开 Apache 工作室并启动 LDAP 服务器，如图 6-8 所示。


    ![../images/310331_2_En_6_Chapter/310331_2_En_6_Fig8_HTML.jpg](img/310331_2_En_6_Fig8_HTML.jpg)


    图 6-8

    启动 LDAP 服务器


    现在你可以将 Apache 工作室连接到 ApacheDS。转到工作室的“文件”菜单，选择“新建”，然后选择“LDAP 连接”，如图 6-9 所示。在 LDAP
    连接表单中，输入连接到本地 ApacheDS 服务器的值，如图 6-10 所示，使用 **uid=admin,ou=system** 作为 DN，**secret**
    作为密码。你可以看到主机是 localhost，端口是 10389。点击“下一步”完成连接配置。


    ![../images/310331_2_En_6_Chapter/310331_2_En_6_Fig10_HTML.jpg](img/310331_2_En_6_Fig10_HTML.jpg)


    图 6-10

    连接到本地 ApacheDS 服务器


    ![../images/310331_2_En_6_Chapter/310331_2_En_6_Fig9_HTML.jpg](img/310331_2_En_6_Fig9_HTML.jpg)


    图 6-9

    Apache 目录工作室连接到 LDAP 服务器


    一旦与 ApacheDS 服务器建立连接，你需要创建一个表示本地目录中顶级条目的上下文条目。为此，右键单击左侧面板的 `Root DSE` 元素，然后在上下文菜单中选择“新建
    ➤ 新建上下文条目”，如图 6-11 所示。


    ![../images/310331_2_En_6_Chapter/310331_2_En_6_Fig11_HTML.jpg](img/310331_2_En_6_Fig11_HTML.jpg)


    图 6-11

    创建新的上下文条目顶级条目


    在“新建上下文条目”的第一个表单中，选择从头创建条目。然后，从左侧面板的可用对象类列表中，选择 `dNSDomain` 并点击“添加”。这里的思路是，你正在创建所有其他条目派生自的顶级条目。最终结果应类似于图
    6-12。然后点击“下一步”。在下一个输入表单中，使用 `dc=example,dc=com` 作为上下文条目的 DN 名称，然后点击“下一步”。这些值（`example`
    和 `com`）是 ApacheDS 服务器中包含的分区和顶级上下文条目的默认值。这些值也部分标识了你在目录中创建的每个条目，因为如前所述，LDAP 遵循一种层次结构，该结构在其父条目的基础上构建条目的名称。


    ![../images/310331_2_En_6_Chapter/310331_2_En_6_Fig12_HTML.jpg](img/310331_2_En_6_Fig12_HTML.jpg)


    图 6-12

    为上下文条目选择 dNSDomain 对象类


    下一步是将你的用户（对于本示例而言）导入到 LDAP 服务器。你将使用一个 LDIF 文件导入几个用户。LDIF 文件是一种使用 LDIF 格式的文本文件，这是一种用于描述
    LDAP 中目录条目的标准格式。它允许你以标准方式将目录数据导入或导出到另一个 LDAP 目录，或者仅用于创建新数据或修改现有数据。你在此处使用它来导入包含用户的数据。清单
    6-16 显示了将要导入的 LDIF 文件。你可以随意命名此文件，但在本示例中我们将其命名为 `users.ldif`。

