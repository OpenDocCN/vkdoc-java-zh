- fmt: "# Creating a New Spring Security v5 Project\n\nSpring Security builds upon\
    \ the concepts defined in the previous section and integrates nicely into the\
    \ general Spring ecosystem. You need to understand those concepts well to take\
    \ maximum advantage of Spring Security v5. However, you can start using Spring\
    \ Security without really knowing all these details, and then learn them as you\
    \ progress and look to do more advanced things.\n\nThere are two ways to create\
    \ a new Spring project.\n\nYou can either create a Spring project via Spring Boot\
    \ or via any IDE tool, which in this case is IntelliJ IDEA 2019.2.\n\nSo what\
    \ is Spring Boot? Spring Boot can be used to easily generate standalone, production-grade,\
    \ Spring-based applications.\n\nTo bootstrap your Spring application, you can\
    \ utilize the Spring Initializr. The Spring Initializr is a browser-based web\
    \ application and a REST API that will generate a ready skeleton Spring project\
    \ structure for your Spring application.\n\nTo generate a Spring application via\
    \ Spring Boot, go to the following web page and fill in all the required info:\
    \ [`https://spring.io/projects/spring-boot`](https://spring.io/projects/spring-boot).\n\
    \nPlease notice that in this book all the Spring code is developed using the IntelliJ\
    \ IDEA Ultimate Edition 2019.2 tool.\n\nWhat kind of Spring Security Maven Web\
    \ Application do you want to create?\n\nLet’s create a simple Spring Security\
    \ example where if the user requests a welcome page, they will not need to authenticate\
    \ when accessing the Admin page, which would require the admin security credentials\
    \ via username and password.\n\nIf you are using the standalone installation of\
    \ Spring Security reference release and you decide not to use any IDE tool to\
    \ build your Maven project, you will find many folders inside the installation\
    \ directory. Most of the folders in the directory correspond to individual subprojects\
    \ or modules that split the functionality of Spring Security into more discrete\
    \ and specialized units.\n\n## Spring Security v5 Source\n\nOpen source software\
    \ has an invaluable characteristic for software developers: free access to all\
    \ source code. With this, we can understand how our favorite tools and frameworks\
    \ work internally, and we also can learn a lot about the way other (perhaps very\
    \ good) developers work, including what practices, techniques, and patterns they\
    \ use. Free access to source code also enables us, in general, to gather ideas\
    \ and experience for our own development. As a more practical matter, having access\
    \ to the source code allows us to debug these applications in the context of our\
    \ application; we can find bugs or simply follow our application’s execution through\
    \ them.\n\nCurrently, Spring Security and most Spring projects live in GitHub.\
    \ You probably know about GitHub ([`https://github.com/`](https://github.com/)).\
    \ If you don’t, you should definitely take a look at it because it has become\
    \ a standard public source-code repository for many open source projects in a\
    \ multitude of programming languages.\n\nGitHub is a repository and a hosting\
    \ service for Git repositories, with a very friendly management interface. The\
    \ Spring Security project can be found inside the SpringSource general GitHub\
    \ section at [`https://github.com/SpringSource/spring-security`](https://github.com/SpringSource/spring-security).\
    \ To get the code, just download and install it as shown previously in this chapter.\n\
    \nIf you need to install the Spring Security 5.1.5.RELEASE locally, once unzipped\
    \ it will include several modules and folders, as shown in Figure 3-11.\n\n![../images/310331_2_En_3_Chapter/310331_2_En_3_Fig11_HTML.jpg](images/310331_2_En_3_Chapter/310331_2_En_3_Fig11_HTML.jpg)\n\
    \nFigure 3-11\n\nThe Spring Security v5.1.5.RELEASE folder structure\n\nHere is\
    \ a short description of some of the most important modules included in Spring\
    \ Security v5.1.5.RELEASE:\n\n*   Core (`spring-security-core`): Spring Security’s\
    \ core classes and interfaces on authentication and access control reside here.\n\
    *   Remoting (`spring-security-remoting`): In case you need Spring Remoting, this\
    \ is the module with the necessary classes.\n*   Aspect (`spring-security-aspects`):\
    \ Aspect-oriented programming support within Spring Security.\n*   Config (`spring-security-config`):\
    \ Provides XML and Java configuration support.\n*   Crypto (`spring-security-crypto`):\
    \ Contains cryptography support.\n*   Data (`spring-security-data`): Integration\
    \ with Spring Data.\n*   Messaging (`spring-security-messaging`)\n*   OAuth2:\
    \ Support for OAuth 2.x support within Spring Security:\n    *   Core (`spring-security-oauth2-core`)\n\
    \    *   Client (`spring-security-oauth2-client`)\n    *   JOSE (`spring-security-oauth2-jose`)\n\
    *   OpenID (`spring-security-openid`): OpenID web-authentication support.\n* \
    \  CAS (`spring-security-cas`): CAS (Central Authentication Service) client integration.\n\
    *   TagLib (`spring-security-taglibs`): Various tag libraries regarding Spring\
    \ Security.\n*   Test (`spring-security-test`): Testing support.\n*   Web (`spring-security-web`):\
    \ Contains web security infrastructure code, such as various filters and other\
    \ Servlet API dependencies.\n\n### Note\n\nRemember that you are using the IntelliJ\
    \ IDEA tool where the Spring Security 5.1.5.RELEASE is integrated and configured\
    \ in it. The usage of Spring Security is done via an XML link at the beginning\
    \ of the `pom.xml` file.\n\nLet’s build your Spring Security 5 Java Web Application.\n\
    \nHere are the steps you will follow to build the simple Spring Security Maven\
    \ Web Application project:\n\n*   Clone the previous simple Maven project named\
    \ `Pss01`.\n*   Import the required Spring Framework and Spring Security v5 libraries\
    \ into the project (into the `pom.xml` file).\n*   Configure the project to be\
    \ aware of Spring Security.\n*   Configure the users and roles that will be part\
    \ of the system.\n*   Configure the URLs that you want to secure.\n*   Create\
    \ all needed Java and web files.\n*   Run the Spring Security v5 project using\
    \ the external Tomcat Server v9.\n\nAs a first step, you will clone this project\
    \ and call it `pss01_Security`, so you will find both samples when downloading\
    \ the code.\n\nOnce you clone the project from `Pss01` to `pss01_Security`, you\
    \ add the Maven framework support to the project. All the files and the `pss01_Security`\
    \ project structure are shown in Figure 3-12.\n\n![../images/310331_2_En_3_Chapter/310331_2_En_3_Fig12_HTML.jpg](images/310331_2_En_3_Chapter/310331_2_En_3_Fig12_HTML.jpg)\n\
    \nFigure 3-12\n\nNew Maven project to add Spring Security\n\n### Note\n\nIt is\
    \ possible to implement the Spring Security in a Spring application using XML-\
    \ or Java-based configurations. In this chapter, you will use the Java configuration\
    \ for your Spring Security Web Application since in general it is hardly suggested\
    \ to use XML configuration as minimum as possible.\n\n## Spring Security Taglibs\n\
    \nThe Spring Security Taglibs provides the support for accessing security information\
    \ and applying security constraints in JSPs pages.\n\nTo secure the view layer\
    \ of the application, you can use\n\n*   Authorize Tag\n*   Authentication Tag\n\
    *   Accesscontrollist Tag\n*   Csrfinput Tag\n*   CsrfMetaTags Tag\n\nYou will\
    \ need to add the `spring-security-taglibs` dependency to your `pom.xml`:\n\n\
    ```\norg.springframework.security\nspring-security-taglibs\n5.1.5.RELEASE\n```"
