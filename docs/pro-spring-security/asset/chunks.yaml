- fmt: '# Spring Security and Scala


    Scala is probably the strongest language (in the sense of number of adopters and
    the liveliness of the community around it) running on top of the Java Virtual
    Machine apart from Java itself. (Scala also has a version that runs on the .NET
    platform.) Scala is a very powerful, general-purpose programming language that
    tries to merge the best of the object-oriented and functional programming paradigms.


    Scala is a language that aims to provide a concise and elegant alternative to
    the world of enterprise Java programming, while keeping the type safety of Java.
    As we said, it comes with functional programming features built in, adding a whole
    new layer of power for the seasoned object-oriented programmer that increases
    productivity.


    We are not experts in Scala or functional programming (far from it as we have
    just recently started to look at them) but we will give you the core definitions
    and the main characteristics of both and show you how to use them with Spring
    and Spring Security.


    ## Functional Programming


    Functional programming is a paradigm in which programs are composed of functions
    that receive inputs and produce outputs, while also avoiding the use of state
    and mutability. This is in clear contrast to object-oriented programming, where
    the main abstraction is the object and its internal state, and mutability is a
    very common thing. By not allowing mutability and state, functional programming
    presents itself as a good alternative for programming concurrent programs, because
    programmers don’t need to worry about synchronization between concurrent processes
    or threads.


    In Scala, functions can be passed around (as function parameters or function return
    values) as simple values. In this sense, they behave pretty much like any other
    simple value (for example, a string), and this is an important concept in a functional
    programming language. In Scala, functions are first-class objects.


    According to the literature, Scala’s name comes from the words *scalable language*.
    This implies that Scala supports object-oriented and functional programming paradigms
    and that it is suitable for simple scripting tasks or full enterprise applications.
    Combining this capability with an elegant and concise syntax makes the language
    scalable in terms of the number of domains and uses that it can address.


    ## Installing Scala


    Let’s install Scala now. There are two ways of installing Scala: via the IntelliJ
    IDEA plugin or via a manual installation. For manual installation, you just go
    to its home page ([`www.scala-lang.org/download/`](http://www.scala-lang.org/download/))
    and download the latest version (2.13.0 at the time of this writing). Uncompress
    the downloaded file in your directory of choice and configure it.


    Let’s install Scala via the plugin, as shown in Figure 9-12.


    ![../images/310331_2_En_9_Chapter/310331_2_En_9_Fig12_HTML.jpg](images/310331_2_En_9_Chapter/310331_2_En_9_Fig12_HTML.jpg)


    **Figure 9-12** Scala IDE plugin installation for IntelliJ IDEA


    OK, that was your introduction to Scala! It was a very simple introduction, we
    know. However, as we said, covering the language in depth is outside the scope
    of this book and there are a lot of great books dedicated to the topic. We’re
    assuming here that you probably know the language better than we do and you are
    just interested in how to use Spring Security with it.


    ## Creating the Project


    The next thing you’ll do is create the project by combining Scala with Spring
    and Spring Security. See Figure 9-13.


    ![../images/310331_2_En_9_Chapter/310331_2_En_9_Fig13_HTML.jpg](images/310331_2_En_9_Chapter/310331_2_En_9_Fig13_HTML.jpg)


    **Figure 9-13** New Scala project


    Convert the Scala project to a Maven project, and in the generated `pom.xml` file,
    add the Scala dependency shown in Listing 9-29.


    ```

    org.scala-tools

    maven-scala-plugin

    2.15.2

    ```


    **Listing 9-29** Scala Maven Dependency


    Next, of course, you need to add the Spring dependencies to the `pom.xml` file.
    You should know how to do this by now. You also need to add the Scala plugin in
    the plugin sections. In the end, your `pom.xml` file should look like Listing
    9-30.


    ```

    4.0.0

    com.apress.pss

    scala-example

    war

    1.0-SNAPSHOT

    scala-example Maven Webapp

    http://maven.apache.org


    scala-tools.org

    Scala-tools Maven2 Repository

    http://scala-tools.org/repo-releases


    scala-tools.org

    Scala-tools Maven2 Repository

    http://scala-tools.org/repo-releases


    org.scala-tools

    maven-scala-plugin

    2.15.2


    org.scala-lang

    scala-library

    2.11.7


    javax.servlet

    javax.servlet-api

    4.1.0


    junit

    junit

    4.5

    test


    org.springframework.security

    spring-security-core

    5.1.5.RELEASE


    org.springframework.security

    spring-security-config

    5.1.5.RELEASE


    org.springframework.security

    spring-security-web

    5.1.5.RELEASE


    commons-logging

    commons-logging

    1.1.1


    commons-codec

    commons-codec

    1.3


    org.springframework

    spring-webmvc

    5.1.5.RELEASE


    scala-example

    src/main/scala

    src/test/scala


    org.scala-tools

    maven-scala-plugin


    scala-compile-first

    process-resources


    add-source

    compile


    scala-test-compile

    process-test-resources


    testCompile

    ```


    **Listing 9-30** The `pom.xml` File in the Scala Maven Project


    This will be a simple web application with Spring MVC, and it will have a very
    simple Service layer. The big difference from the applications you saw in other
    chapters is that both the Controller layer and the Service layer will be written
    in Scala instead of Java. We’ll show you how to add security to the method level,
    but, as you’ll see, it is almost the same as with Java.


    Let’s start with the code for the controller. In the package `com.apress.pss.scala.web`
    in a source folder with the path `src/main/scala`, create the `ScalaController`
    class shown in Listing 9-31.


    ```

    package com.apress.pss.scala.web;

    import org.springframework.beans.factory.annotation.Autowired

    import org.springframework.web.bind.annotation.RequestMapping

    import org.springframework.web.bind.annotation.RequestMethod

    import org.springframework.stereotype.Controller

    import com.apress.pss.scala.service.ScalaServiceFacade

    import javax.servlet.http.HttpServletResponse

    import javax.servlet.http.HttpServletRequest

    @RequestMapping(Array("/enter"))

    class ScalaController(service: ScalaServiceFacade) {

    @RequestMapping(value = Array("/scala"), method = Array(RequestMethod.GET))

    def scalaRequest(request:HttpServletRequest, response:HttpServletResponse) = {

    val value = service.scalaService

    response.getWriter().write(value)

    }

    }

    ```


    **Listing 9-31** `ScalaController`


    In the controller, you are defining a simple method that returns (writes on the
    response, actually) whatever the service returns. Note the use of the annotation
    `@RequestMapping` in the example. With Scala, you cannot use a simple string to
    set the value of array-based annotation values. You need to set a real array with
    just one element as the value. For the rest, the example is very much like the
    Java version, with some syntax modifications.


    Then, in the package `com.apress.pss.scala.service`, create the `ScalaService`
    class shown in Listing 9-32.


    ```

    package com.apress.pss.scala.service;

    import org.springframework.stereotype.Service

    import org.springframework.security.access.annotation.Secured

    trait ScalaServiceFacade {

    def scalaService: String

    }

    class ScalaService extends ScalaServiceFacade{

    @Secured(Array("ROLE_USER"))

    def scalaService() = "Service accessed"

    }

    ```


    **Listing 9-32** `ScalaService` Class'
