    Spring Security、Groovy 与 Grails

    Groovy 是非 Java JVM 语言领域中争夺头把交椅的最强竞争者之一。它拥有一个出色的社区，目前由 SpringSource 团队支持和管理。Groovy
    是一种编程语言，它试图将 Java 的强大功能与某些动态编程语言的优雅性和开发者友好特性结合起来——主要借鉴了广受喜爱的知名语言（如 Python 和 Ruby）的思想。Groovy
    成功地创造了一个环境，让不同类型的程序员经过一些练习后都能感到得心应手（例如，经验丰富的 Java 开发者和 Ruby 开发者）。

    与其他 JVM 语言相比，Groovy 有许多优势——在我们看来，主要优势是从 Java 到 Groovy 的轻松过渡以及两种语言之间的互操作性。就过渡而言，将
    Java 程序变成 Groovy 程序很容易。事实上，你什么都不用做。一个 Java 程序本身就是一个有效的 Groovy 程序。从一个角度看这很好，但从另一个角度看则不然。即使你可以将
    Java 程序编译为 Groovy 程序，这也没有意义。归根结底，你使用 Groovy 是为了利用它相比 Java 所具有的出色特性。这些出色的特性包括大量的元编程技术、像闭包这样强大的新结构、更快的开发周期，以及更清晰、更简洁且对开发者更友好的语法。

    Grails 是一个用 Groovy 编写并旨在与 Groovy 一起使用的 Web 框架。它构建在 Spring 框架之上，并深受 Ruby on Rails
    的影响。Grails 试图用一种基于 JVM 的语言创建一个更友好、更轻量级且易于快速上手的框架。同时，它提供了更好、更简洁的开发应用程序的方式。并且，它构建在一些最强大的
    Java 库和框架之上，例如 Spring 和 Hibernate。

    让我们为示例安装 Groovy 库并指定 Groovy SDK。从 [`http://groovy-lang.org/download.html`](http://groovy-lang.org/download.html)
    提供的官方发行版中下载标准的 Groovy SDK 工具。将其解压到任意目录，并将此目录指定为库的主目录。在我们的例子中，它是 `C:\apache-groovy-sdk-2.5.6`。现在你可以创建新的示例了。


    使用 Grails 通过 URL 规则保护 Web 层

    Grails 与 Spring Security 的集成非常简单，因为 Spring Security 是 Grails 应用程序的默认安全解决方案，并且存在一个全面的插件来支持它。在这里，你将创建一个简单的
    Grails 应用程序，并学习如何使用 Spring Security 保护它。像往常一样，我们将逐步介绍这个应用程序。

    如果你还没有安装最新版本的 Grails，请下载并安装。你可以从其主页 [`http://grails.org/`](http://grails.org/)
    下载。我们使用 Grails 3.3.9 版本来运行此示例。

    要安装它，只需解压下载的 `grails-3.3.9.zip` 文件（在我们的例子中，它是 `C:\grails-3.3.9`），然后设置环境变量 `GRAILS_HOME`
    指向新解压的目录。另外，将路径 `GRAILS_HOME/bin` 添加到你的 `PATH` 环境变量中。

    在命令行中，进入你想要创建应用程序的任意目录，并执行 `grails create-app demo-grails` 来创建应用程序。

    接下来，生成两个控制器：一个安全控制器和一个非安全控制器。在生成的应用程序目录内执行 `grails create-controller secured`。然后执行
    `grails create-controller unsecured`。

    现在，你需要在每个控制器中创建一个操作，并使它们看起来像清单 9-22 和 9-23 所示。将这些文件放在应用程序的 `grails-app/controllers/demo/grails`
    目录中。

    现在使用 `grails run-app` 运行应用程序，并访问 `http://localhost:8080/demo-grails/secured/message`
    或 `http://localhost:8080/demo-grails/unsecured/message`，你应该能够毫无问题地访问这两个 URL。下一个合乎逻辑的步骤是保护安全
    URL。

    正如我们之前所说，Grails 构建在 Spring 之上，因此与 Spring Security 的集成应该是直接了当的。Grails 以巧妙的模块化方式构建，因此你可以通过插件的形式添加功能。让我们通过执行
    `grails install-plugin spring-security-core` 来安装 Spring Security 插件（在我们的当前版本中，这会安装
    1.2.7.3 版本）。然后执行命令 `grails s2-quickstart demo.security User Role` 来生成支持应用程序中用户和角色所需的模型。

    接下来，你将创建几个测试用户来尝试安全性。打开文件 `BootStrap.groovy`（位于 `grails-app/conf` 目录中），并使其看起来像清单
    9-24 中的代码。这里你创建了两个用户：一个具有角色 `ROLE_ADMIN`，另一个具有角色 `ROLE_USER`。你可以看到这段代码使用了上一步生成的类
    `User` 和 `Role`。

    与之前的示例一样，你将保护某些 URL，使其仅对具有特定角色的用户可访问。要在 Grails 中做到这一点，你需要将清单 9-25 中的代码添加到文件 `Config.groovy`（位于
    `grails-app/conf` 目录）的末尾。这段代码不言自明。它只是告诉 Grails 使用一个拦截 URL 映射来进行安全控制。这个映射定义了带有通配符的
    URL 路径（使用 `Ant` 风格的语法，我们之前为标准 Java 规则介绍过）以及允许访问这些 URL 的角色。

    通过在根目录下执行命令 `grails run-app` 来运行应用程序。现在，如果你尝试访问 `http://localhost:8080/demo-grails/unsecured/message`
    或 `http://localhost:8080/demo-grails/secured/message`，你将被重定向到一个登录页面。如果你使用用户名 **luna**
    和密码 **password** 登录，你将获得对安全 URL 的访问权限，而非安全 URL 则不行。但是，如果你使用用户名 **neve** 和密码 **password**
    登录，你将获得对 `http://localhost:8080/demo-grails/unsecured/message` 的访问权限，但在尝试访问 `http://localhost:8080/demo-grails/secured/message`
    时会收到“访问被拒绝”的错误。你可以看到你已经正确地保护了对这些 URL 的访问。

    '
- fmt: '# Spring Security 与 Grails 集成


    这个例子中很难看出你实际上正在使用 Spring Security。我们这么说是因为你没有定义任何过滤器、认证管理器、投票器、用户服务或认证提供者。实际上，你根本没有定义任何
    Spring Bean。你很容易认为底层使用了其他机制，因为这里没有任何与 Spring Security 相关的内容。这是一件好事，也是 Grails 的优秀特性之一。插件的使用为你提供了合理的通用默认值，你只需要负责定义与业务问题相关的专属内容。在安全方面，你需要定义你的用户、他们的密码，以及应用程序的角色和访问权限。


    ```

    grails.plugins.springsecurity.securityConfigType = "InterceptUrlMap"

    grails.plugins.springsecurity.interceptUrlMap = [

    ''/secured/**'':    [''ROLE_ADMIN''],

    ''/unsecured/**'':   [''ROLE_USER''],

    ]

    Listing 9-25

    An Excerpt from Config.groovy, Where We Add the URLs That Need to Be Secured

    ```


    ```

    import demo.security.Role

    import demo.security.User

    import demo.security.UserRole

    class BootStrap {

    def init = { servletContext ->

    def adminRole = new Role(authority: ''ROLE_ADMIN'').save(flush: true)

    def userRole = new Role(authority: ''ROLE_USER'').save(flush: true)

    def testAdmin = new User(username: ''luna'', enabled: true, password: ''password'')

    testAdmin.save(flush: true)

    def testUser = new User(username: ''neve'', enabled: true, password: ''password'')

    testUser.save(flush: true)

    UserRole.create testAdmin, adminRole, true

    UserRole.create testUser, userRole, false

    }

    def destroy = {

    }

    }

    Listing 9-24

    BootStrap.groovy Setting Up a Couple of Test Users with Security Roles Assigned
    to Them

    ```


    ```

    package demo.grails

    class UnsecuredController {

    def message() {

    render "message for everyone"

    }

    }

    Listing 9-23

    UnsecuredController with an Unsecured Message in the Grails Application

    ```


    ```

    package demo.grails

    class SecuredController {

    def message() {

    render "Incredibly confidential message"

    }

    }

    Listing 9-22

    SecuredController with a Secured Message in the Grails Application

    ```


    Grails 的 Spring Security 插件让你能更深入地使用 Spring Security 提供的功能，当然，它也允许你通过覆盖默认值来进行自定义。它支持的一个特性是使用
    SpEL 来定义访问规则。为了在本例的上下文中测试这一点，并使用我们能想到的最简单的安全 SpEL 表达式，只需将 `Config.groovy` 文件（来自
    Listing [9-25](#310331_2_En_9_Chapter.xhtml#PC28)）中引入的安全部分替换为 Listing [9-26](#310331_2_En_9_Chapter.xhtml#PC29)
    中的内容。如你所见，在这个列表中，你使用了安全表达式 `hasRole`，这在之前的章节中已经学习过。请注意，这是一个使用 `hasRole` 的简单示例，但在这里你可以使用
    Spring Security SpEL 支持提供的全套表达式。例如，你可以使用 `authentication.name == ''luna''` 作为表达式来代替
    `hasRole`。


    ```

    grails.plugins.springsecurity.securityConfigType = "InterceptUrlMap"

    grails.plugins.springsecurity.interceptUrlMap = [

    ''/secured/**'':    ["hasRole(''ROLE_ADMIN'')"],

    ''/unsecured/**'':   ["hasRole(''ROLE_USER'')"],

    ]

    Listing 9-26

    An Excerpt from Config.groovy, Which Uses SpEL Instead of Simple Roles

    ```


    ## 在方法级别使用 Grails 安全功能


    Grails 的 Spring Security 插件支持方法级别的安全，其方式与 Java 相同。这意味着你可以在控制器类中添加 `@grails.plugins.springsecurity.Secured`
    注解（也可以使用标准的 Spring Security `@Secured` 注解），Spring Security 将确保这些方法根据这些注解得到保护。这样做非常简单。让我们继续处理上一节中的应用程序。首先，将
    `Config.groovy` 文件（位于 `grails-app/conf` 目录）中从 `grails.plugins.springsecurity.securityConfigType
    = "InterceptUrlMap"` 这一行开始的内容替换为简单的一行 `grails.plugins.springsecurity.securityConfigType
    = "Annotation"`。然后，将 `SecuredController` 类（位于 `grails-app/controllers/demo/grails`
    目录）的内容替换为 Listing [9-27](#310331_2_En_9_Chapter.xhtml#PC30) 中的内容，并将 `UnsecuredController`
    类（位于 `grails-app/controllers/demo/grails` 目录）的内容替换为 Listing [9-28](#310331_2_En_9_Chapter.xhtml#PC31)
    中的内容。完成这些操作后，如果你重新启动应用程序，你应该会得到与上一节中保护 URL 时相同的访问限制。


    ```

    package demo.grails

    import grails.plugins.springsecurity.Secured;

    class UnsecuredController {

    @Secured(["ROLE_USER"])

    def message() {

    render "message for everyone"

    }

    }

    Listing 9-28

    UnsecuredController with the @Secured Annotation

    ```


    ```

    package demo.grails

    import grails.plugins.springsecurity.Secured;

    class SecuredController {

    @Secured(["ROLE_ADMIN"])

    def message() {

    render "Incredibly confidential message"

    }

    }

    Listing 9-27

    SecuredController with the @Secured Annotation

    ```


    在最后这两节中，我们只是浅尝了 Grails Spring Security 插件所提供的功能。实际上，你可以做几乎所有使用标准 Java 支持所能做的事情。有关使用
    Grails 插件的全面指南，请查看其官方页面：[`http://plugins.grails.org/plugin/grails/spring-security-core`](http://plugins.grails.org/plugin/grails/spring-security-core)。'
