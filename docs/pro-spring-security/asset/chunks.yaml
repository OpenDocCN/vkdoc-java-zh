    5.  访问 `http://localhost:8080/logout` 退出应用程序。然后访问 `http://localhost:8080/login`，使用用户名
    **massimo** 和密码 **nardone01** 登录。


    6.  访问 `http://localhost:8080/forum/posts`，你应该能看到两篇帖子，如图 7-14 所示。


    ![../images/310331_2_En_7_Chapter/310331_2_En_7_Fig14_HTML.jpg](img/310331_2_En_7_Fig14_HTML.jpg)


    图 7-14


    同时拥有 ROLE_USER 和 ROLE_ADMIN 角色的用户所看到的帖子


    7.  访问 `http://localhost:8080/logout` 退出应用程序。然后访问 `http://localhost:8080/login`，使用用户名
    **leo** 和密码 **nardone01** 登录。


    8.  访问 `http://localhost:8080/forum/posts`，你只会看到 Post post1，因为这是标准用户唯一能访问的帖子。视图与图
    7-12 完全相同。


    Spring Security ACL 支持还提供了 `@PreFilter` 注解，正如你所想，它在方法安全拦截过程的预处理阶段工作，而不是像 `@PostFilter`
    注解那样工作。如前所述，预处理活动由 `AccessDecisionVoter` 实现负责。对于 `@PreFilter` 注解，它由 `org.springframework.security.access.prepost.PreInvocationAuthorizationAdviceVoter`
    负责，而该投票器又像之前一样，使用 `DefaultMethodSecurityExpressionHandler` 的实例。与 `@PostFilter`
    的情况一样，带有 `@PreFilter` 注解的方法预期接收一个集合。不过，在这种情况下，不支持数组。


    我们刚刚向你展示了一个关于 ACL 过滤功能如何在实际中工作的简单演练。你可以看到，只需提供带有 `hasPermission` 表达式的 `@PostFilter`
    注解（如你所知，该表达式在内部调用 SpEL 上下文中的一个方法），我们就能指示框架如何处理方法的返回值。我们首先解释、随后在小型测试用例中演示的这个过程，可以用图
    7-15、7-16 和 7-17 来总结。


    ![../images/310331_2_En_7_Chapter/310331_2_En_7_Fig16_HTML.jpg](img/310331_2_En_7_Fig16_HTML.jpg)


    图 7-16

    一个展示基于 ACL 安全的方法拦截在预处理阶段的主要类和接口的图表


    ![../images/310331_2_En_7_Chapter/310331_2_En_7_Fig15_HTML.jpg](img/310331_2_En_7_Fig15_HTML.jpg)


    图 7-15

    一个简化的时序图，展示了当调用带有 @PreFilter 和 @PostFilter 注解的方法时发生的情况。该图显示了领域对象的参数和返回集合在方法调用前后是如何被过滤的


    `@PreFilter` 调用由 `PreInvocationAuthorizationAdviceVoter` 处理，而带有 ACL 配置属性的 `@Secured`
    注解则由 `AclEntryVoter` 处理。你可以在图中看到，在处理流程的末尾，两条路径都到达了 `SidRetrievalStrategy`、`ObjectIdentityRetrievalStrategy`
    和 `AclService` 中的核心元素。实际上，`AclPermissionEvaluator` 和 `AclEntryVoter` 执行的功能非常相似。


    ![../images/310331_2_En_7_Chapter/310331_2_En_7_Fig17_HTML.jpg](img/310331_2_En_7_Fig17_HTML.jpg)


    图 7-17

    一个展示基于 ACL 安全的方法拦截在后期处理阶段所涉及的类的图表


    同样，你可以看到两个分支。左边的分支包含 `AclEntryAfterInvocationProvider` 和 `AclEntryAfterInvocationCollectionFilteringProvider`，该分支不支持
    SpEL 表达式，并在使用 `@Secured` 和配置属性的静态名称（例如 `ACL_ALLOW_READ` 或其他，正如你在前面几节中看到的那样）时处于活动状态。右边的分支则经过支持
    SpEL 以及 `@PostFilter` 和 `@PostAuthorize` 注解的部分。你可以看到，这两个分支几乎与预处理阶段的分支一一对应。此外，你还可以看到系统中存在高度的重用，许多类同时出现在预处理和后期处理阶段。


    我们介绍了处理 ACL 安全的两种不同方式，即我们在上一段中讨论的两个分支。使用 `@Secured` 的方式较旧，不支持 SpEL 表达式；而使用 `@PreFilter`、`@PreAuthorize`、`@PostAuthorize`
    和 `@PostFilter` 的方式自 Spring Security 3.0 版本以来就已存在。它们是支持使用 SpEL 表达式的较新选项，因此在日常使用中，你可能会更倾向于使用它们。


    使用 ACL 保护视图层


    使用 ACL 保护应用程序的另一个选项是使用视图层的 JSP 标签，为没有适当权限查看领域对象的用户过滤掉这些对象。我们在 Web 安全章节中已经简要讨论过这些标签，但特意将
    ACL 标签留在这里进行更详细的介绍。为了在示例中使用它们，让我们继续使用上一节的代码，但做一些修改。首先，在 `ForumServiceImpl` 类中，注释掉
    `getPosts` 方法中的 `@PostFilter` 注解，使其不再进行任何过滤。然后将 `form.jsp` 文件修改为如清单 7-24 所示。


    ```


    帖子


    新帖子内容：


    ${post.content}


    清单 7-24

    应用了 Taglib ACL 安全以过滤领域对象的 form.jsp

    ```


    这个清单展示了在视图层保护领域对象是多么简单。实际上，它（从视图角度来看）执行了与使用 `@PostFilter` 注解时非常相似的任务。

    `<accesscontrollist>` 标签依赖于应用程序上下文配置中已配置的 `org.springframework.security.access.PermissionEvaluator`
    实现。它只有在应用程序上下文中只配置了一个此类型的 bean 时才能工作，因为它会尝试按类型检索该 bean。你可能还记得，在你的配置中，有一个具体类型为
    `org.springframework.security.acls.AclPermissionEvaluator` 的 `PermissionEvaluator`
    配置。

    现在，如果你重新启动应用程序并再次执行测试场景 7.1 中定义的步骤，从表示层的角度来看，你应该会得到与首次执行该场景时完全相同的行为。其工作方式很简单。每次评估该标签时（在对帖子集合的每次迭代中），标签处理器都会调用
    `PermissionEvaluator` 的 `hasPermission` 方法，该方法返回一个布尔值，指示是否已授予权限。如果授予了权限，则评估并渲染标签体。如果未授予权限，则跳过标签体。

