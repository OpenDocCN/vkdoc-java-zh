    The Security Interceptor lies at the core of the Spring Security framework. Every
    call to a secured resource in Spring Security passes through this interceptor.
    The `AbstractSecurityInterceptor` shows its versatility when you realize that
    two not-very-related kinds of resources (URL endpoints and methods) leverage most
    of the functionality of this abstract interceptor. This, once again, shows the
    effort put into the design and implementation of the framework.


    Figure [4-5](#310331_2_En_4_Chapter.xhtml#Fig5) shows the interceptor in a UML
    (Unified Modeling Language) class diagram. And Figure [4-6](#310331_2_En_4_Chapter.xhtml#Fig6)
    shows a simplified sequence diagram.


    ![../images/310331_2_En_4_Chapter/310331_2_En_4_Fig6_HTML.jpg](images/310331_2_En_4_Chapter/310331_2_En_4_Fig6_HTML.jpg)


