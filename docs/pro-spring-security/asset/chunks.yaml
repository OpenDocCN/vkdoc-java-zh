    # `AccessDecisionManager`


    `AccessDecisionManager` 是负责决定特定 `Authentication` 对象是否被允许访问特定资源的类。在其主要实现中，它委托给
    `AccessDecisionVoter` 对象，这些对象基本上将 `Authentication` 对象中的 `GrantedAuthorities` 与正在访问的资源所需的
    `ConfigAttribute` 进行比较，决定是否应授予访问权限。它们发出投票以允许或拒绝访问。`AccessDecisionManager` 实现会考虑投票者的输出，并应用确定的策略来决定是否授予访问权限。然而，投票者也可以选择弃权。


    `AccessDecisionManager` 接口可以在清单 [4-7](#310331_2_En_4_Chapter.xhtml#PC11) 中看到。其
    UML 类图如图 [4-19](#310331_2_En_4_Chapter.xhtml#Fig19) 所示。


    ![../images/310331_2_En_4_Chapter/310331_2_En_4_Fig19_HTML.png](images/310331_2_En_4_Chapter/310331_2_En_4_Fig19_HTML.png)


    Figure 4-19

    `AccessDecisionManager` 层次结构


    `AccessDecisionManager` 的完整参考可以在 GitHub 上找到：[`https://github.com/spring-projects/spring-security/blob/master/core/src/main/java/org/springframework/security/access/AccessDecisionManager.java`](https://github.com/spring-projects/spring-security/blob/master/core/src/main/java/org/springframework/security/access/AccessDecisionManager.java)


    ```

    package org.springframework.security.access;

    import java.util.Collection;

    import org.springframework.security.authentication.InsufficientAuthenticationException;

    import org.springframework.security.core.Authentication;

    public interface AccessDecisionManager {

    void decide(Authentication authentication, Object object, Collection configAttributes)

    throws AccessDeniedException, InsufficientAuthenticationException;

    boolean supports(ConfigAttribute attribute);

    boolean supports(Class clazz);

    }

    Listing 4-7

    AccessDecisionManager

    ```


    当前的 `AccessDecisionManager` 实现都委托给投票者，但它们的工作方式略有不同。当前投票者定义在 `org.springframework.security.access.vote`
    包中，将在以下章节中描述。


    ## `AffirmativeBased`


    此访问决策管理器调用其所有配置的投票者，如果其中任何一个投票授予访问权限，则足以让访问决策管理器允许访问受保护的资源。如果没有投票者投票授予访问权限，并且至少有一个投票者投票拒绝访问，则访问决策管理器会抛出
    `AccessDeniedException` 拒绝访问。如果只有弃权投票者，则根据 `AccessDecisionManager` 的实例变量 `allowIfAllAbstainDecisions`
    做出决定，该变量是一个布尔值，默认为 `false`，决定当所有投票者弃权时是否应授予访问权限。


    ## `ConsensusBased`


    此访问决策管理器实现调用其所有配置的投票者来决定授予或拒绝访问资源。与 `AffirmativeBased` 决策管理器的区别在于，`ConsensusBased`
    决策管理器仅在授予访问权限的投票者多于拒绝访问的投票者时才决定授予访问权限。因此，在这种情况下，多数票获胜。如果授予和拒绝的投票者数量相同，则使用实例变量
    `allowIfEqualGrantedDeniedDecisions` 的值来决定。默认情况下，此变量的值为 `true`，并且授予访问权限。当所有投票者弃权时，访问决策的处理方式与
    `AffirmativeBased` 管理器相同。


    ## `UnanimousBased`


    正如您可能猜到的，此访问决策管理器仅在所有配置的投票者都投票赞成允许访问资源时才授予访问权限。如果有任何投票者投票拒绝访问，则会抛出 `AccessDeniedException`。“全部弃权”情况的处理方式与
    `AccessDecisionManager` 的其他实现相同。


    ## `AccessDecisionVoter`


    对 `AccessDecisionManager` 及其当前实现的讨论应该已经明确了访问决策投票者的重要性，因为它们作为一个团队，最终决定特定 `Authentication`
    对象是否拥有足够的权限来访问特定资源。`org.springframework.security.access.AccessDecisionVoter` 接口也非常简单，您可以在清单
    [4-8](#310331_2_En_4_Chapter.xhtml#PC12) 中看到它。主要方法是 `vote`，从接口可以推断，它将返回三个可能的响应之一（`ACCESS_GRANTED`、`ACCES_ABSTAIN`、`ACCESS_DENIED`），具体取决于所需条件是否满足。条件的满足与否是通过分析
    `Authentication` 对象的权限与所需资源的关系来确定的。在实践中，这基本上意味着将 `Authentication` 的权限与资源的安全属性进行比较以寻找匹配项。


    以下是当前的 `AccessDecisionVoter` 实现：


    - `org.springframework.security.access.annotation.Jsr250Voter`：此投票者对使用 `JSR 250`
    注解（即 `DenyAll`、`PermitAll` 和 `RolesAllowed`）保护的资源进行投票。它们的名称非常具有描述性。`DenyAll` 不允许任何对资源的访问，与尝试访问它的
    `Authentication` 对象携带的安全信息无关。`PermitAll` 允许所有人访问，无论他们拥有什么角色。`RolesAllowed` 注解可以配置一系列角色。如果
    `Authentication` 对象尝试访问资源，它必须拥有 `RolesAllowed` 注解中配置的角色之一，才能获得此投票者的访问授权。


    - `org.springframework.security.access.prepost.PreInvocationAuthorizationAdviceVoter`：此投票者对基于
    `@PreFilter` 和 `@PreAuthorize` 注解的表达式配置的资源进行投票。`@PreFilter` 和 `@PreAuthorize`
    注解支持一个 `value` 属性，该属性可以包含 SpEL 表达式。`PreInvocationAuthorizationAdviceVoter` 负责评估这些注解中提供的
    SpEL 表达式（当然，借助 Spring 的 SpEL 评估机制）。我们将在本书的多个部分解释和使用 SpEL 表达式，因此随着本书的深入，这个概念将变得更加清晰。'
  raw: "The entire `AuthenticationProvider`\nreference can be found on GitHub at [`https://github.com/spring-projects/spring-security/blob/master/core/src/main/java/org/springframework/security/authentication/AuthenticationProvider.java`](https://github.com/spring-projects/spring-security/blob/master/core/src/main/java/org/springframework/security/authentication/AuthenticationProvider.java).\n\
    \n```\npackage org.springframework.security.authentication;\nimport org.springframework.security.core.Authentication;\n\
    import org.springframework.security.core.AuthenticationException;\npublic interface\
    \ AuthenticationProvider {\nAuthentication authenticate(Authentication authentication)\
    \ throws AuthenticationException;\nboolean supports(Class authentication);\n}\n\
    Listing 4-6\nAuthenticationProvider Interface\n```\n\nAccessDecisionManager\n\
    `AccessDecisionManager`\nis the class in charge of deciding if a particular `Authentication`\
    \ object\nis allowed or not allowed to access a particular resource . In its main\n\
    implementations, it delegates to `AccessDecisionVoter`\nobjects, which basically\
    \ compare the `GrantedAuthorities` in\nthe `Authentication` object\nagainst the\
    \ `ConfigAttribute`(s)\nrequired by the resource that is being accessed, deciding\
    \ whether or not\naccess should be granted. They emit their vote to allow access\
    \ or not.\nThe `AccessDecisionManager`\nimplementations take the output from the\
    \ voters into consideration and\napply a determined strategy on whether or not\
    \ to grant access. Voters,\nhowever, also can abstain from voting.\n\nThe `AccessDecisionManager`\n\
    interface can be seen in Listing [4-7](#310331_2_En_4_Chapter.xhtml#PC11). Its\
    \ UML class\ndiagram is shown in Figure [4-19](#310331_2_En_4_Chapter.xhtml#Fig19).\n\
    \n![../images/310331_2_En_4_Chapter/310331_2_En_4_Fig19_HTML.png](images/310331_2_En_4_Chapter/310331_2_En_4_Fig19_HTML.png)\n\
    \nFigure 4-19\n`AccessDecisionManager`\nhierarchy\n\nThe entire `AccessDecisionManager`\n\
    reference can be found on GitHub at [`https://github.com/spring-projects/spring-security/blob/master/core/src/main/java/org/springframework/security/access/AccessDecisionManager.java`](https://github.com/spring-projects/spring-security/blob/master/core/src/main/java/org/springframework/security/access/AccessDecisionManager.java)`.`\n\
    \n```\npackage org.springframework.security.access;\nimport java.util.Collection;\n\
    import org.springframework.security.authentication.InsufficientAuthenticationException;\n\
    import org.springframework.security.core.Authentication;\npublic interface AccessDecisionManager\
    \ {\nvoid decide(Authentication authentication, Object object, Collection configAttributes)\n\
    throws AccessDeniedException, InsufficientAuthenticationException;\nboolean supports(ConfigAttribute\
    \ attribute);\nboolean supports(Class clazz);\n}\nListing 4-7\nAccessDecisionManager\n\
    ```\n\nThe current `AccessDecisionManager`\nimplementations all delegate to voters,\
    \ but they work in slightly\ndifferent ways. The current voters, which are described\
    \ in the following\nsections, are defined in the package `org.springframework.security.access.vote`.\n\
    \nAffirmativeBased\nThis access decision manager calls all its configured voters,\
    \ and if\nany of them vote\nthat access should be granted, this is enough for\
    \ the access decision\nmanager to allow access to the secured resource. If no\
    \ voters vote to\ngrant access and there is at least one who votes not to grant\
    \ it, the\naccess decision manager throws an `AccessDeniedException`\ndenying\
    \ access. If there are only abstaining voters, a decision is made\nbased on the\
    \ `AccessDecisionManager`’s\ninstance variable `allowIfAllAbstainDecisions`,\n\
    which is a Boolean that defaults to false, determining if access should\nbe granted\
    \ or not when all voters abstain.\n\nConsensusBased\nThis access decision manager\
    \ implementation calls all its configured\nvoters to make a decision to either\
    \ grant or deny access to a resource.\nThe difference with the `AffirmativeBased`\n\
    decision manager is that the `ConsensusBased`\n decision manager decides to grant\
    \ access only if there are more\nvoters granting access than voters denying it.\
    \ So the majority wins in\nthis case. If there are the same number of granting\
    \ voters as denying\nvoters, the value of the instance variable `allowIfEqualGrantedDeniedDecisions`\n\
    is used to decide. By default, this variable’s value is true, and access\nis granted.\
    \ When all voters abstain, the access decision will be decided\nthe same way as\
    \ it is for the `AffirmativeBased`\nmanager.\n\nUnanimousBased\nAs you probably\
    \ guessed, this access decision manager will grant\naccess to the resource only\
    \ if all the\nconfigured voters vote in favor of allowing access to the resource.\
    \ If\nany voter votes to deny the access, the `AccessDeniedException`\nwill be\
    \ thrown. The “all abstain” case is handled the same way as with\nthe other implementations\
    \ of `AccessDecisionManager`.\n\nAccessDecisionVoter\nThis discussion of the `AccessDecisionManager`\
    \   and its current\nimplementations should have made clear the importance of\
    \ the Access\nDecision Voters, because they are the ones, working as a team, who\n\
    ultimately determine if a particular `Authentication` object\nhas enough privileges\
    \ to access a particular resource.\nThe `org.springframework.security.access.AccessDecisionVoter`\n\
    interface is very simple as well, and you can see it in Listing [4-8](#310331_2_En_4_Chapter.xhtml#PC12).\n\
    The main method is `vote`, and as can be\ndeduced from the interface, it will\
    \ return one of three possible\nresponses (`ACCESS_GRANTED`, `ACCES_ABSTAIN`,\
    \ `ACCESS_DENIED`),\ndepending on whether the required conditions are satisfied.\n\
    The satisfaction or not of the conditions is given by analyzing the\n`Authentication`\n\
    object’s rights against the required resource. In practice, this\nbasically means\
    \ that the `Authentication`’s\nauthorities  are compared against\nthe resource’s\
    \ security attributes looking for matches.\n\nThe following are the current `AccessDecisionVoter`\n\
    implementations:\n\n*   `org.springframework.security.access.annotation.Jsr250Voter`:\n\
    \    This voter votes on resources that are secured with `JSR 250`\n    annotations—namely,\
    \ `DenyAll`, `PermitAll,` and `RolesAllowed`. Their\n    names are very descriptive.\
    \ `DenyAll` won’t allow\n    any access at all to the resource, independent of\
    \ the security\n    information carried by the `Authentication` object\n    trying\
    \ to access it. `PermitAll` will allow\n    access to everyone, regardless of\
    \ what roles they have. The `RolesAllowed`\n    annotation can be configured with\
    \ a series of roles. If an `Authentication` object\n    tries to access the resource,\
    \ it must have one of the roles configured\n    in the `RolesAllowed`\n    annotation\
    \ in order to get access granted by this voter.\n\n*   `org.springframework.security.access.prepost.PreInvocationAuthorizationAdviceVoter`:\n\
    \    This voter votes on resources with expression configurations based on\n \
    \   `@PreFilter` and\n    `@PreAuthorize`\n    annotations. `@PreFilter` and `@PreAuthorize`\n\
    \    annotations support a `value` attribute that\n    can have a SpEL expression.\
    \ The `PreInvocationAuthorizationAdviceVoter`\n    is the one in charge of evaluating\
    \ the SpEL expressions (of course with\n    the help of Spring’s SpEL evaluation\
    \ mechanism) provided in these\n    annotations. We will be explaining and using\
    \ SpEL expressions in several\n    parts of the book so this concept will become\
    \ clearer as the book\n    advances."
