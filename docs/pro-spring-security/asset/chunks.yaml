- fmt: '# Digest Authentication


    Digest authentication is a very close sibling of basic HTTP authentication. Its
    main purpose is to avoid sending clear text passwords on the wire, as basic authentication
    does, by hashing the password prior to sending it to the server. This makes digest
    authentication more complex than basic authentication. Digest authentication works
    with HTTP headers the same way that basic authentication does.


    Digest authentication is based on the use of a nonce for hashing the passwords.
    A *nonce* is an arbitrary server-generated number that is used in the authentication
    process and is used only once. It is passed through the digest computation together
    with the username, password, nonce, URI being requested, and so on. In the authentication
    process, both the server and client do the digest computation and they should
    match.


    The main processing lies in two classes: `DigestAuthenticationFilter` and `DigestAuthenticationEntryPoint`.
    `DigestAuthenticationFilter` queries the request’s headers looking for the Authorization
    header, and then it checks that the header’s value starts with `Digest`. If this
    is the case, the request is carrying the security credentials that will be used
    for authentication. `DigestAuthenticationEntryPoint` is the class that is invoked
    to generate a response that demands that a digest security authentication process
    begin. This class sets the header `WWW-Authenticate` with the correct values (including
    the nonce) so that the client agent (the browser) knows it has to start the digest
    authentication process.


    To configure the digest authentication, update the `SecurityConfiguration` file
    with the following lines:


    ```

    http.addFilter(digestAuthenticationFilter())

    .exceptionHandling().authenticationEntryPoint(digestEntryPoint())

    ```


    Next, add the following bean to add the `Sigestauthentication` filter:


    ```

    private DigestAuthenticationFilter digestAuthenticationFilter() throws Exception
    {

    DigestAuthenticationFilter digestAuthenticationFilter = new DigestAuthenticationFilter();

    digestAuthenticationFilter.setUserDetailsService(userDetailsServiceBean());

    digestAuthenticationFilter.setAuthenticationEntryPoint(digestEntryPoint());

    return digestAuthenticationFilter;

    }

    ```


    Then, define the username and password using `inMemoryUserDetailsManager`:


    ```

    @Override

    @Bean

    public UserDetailsService userDetailsServiceBean() {

    InMemoryUserDetailsManager inMemoryUserDetailsManager = new InMemoryUserDetailsManager();

    inMemoryUserDetailsManager.createUser(User.withUsername("admin").password(passwordEncoder.encode("admin123")).roles(
    "ADMIN").build());

    return inMemoryUserDetailsManager;

    }

    ```


    Finally, define the `digestEntryPoint`:


    ```

    @Bean

    DigestAuthenticationEntryPoint digestEntryPoint() {

    DigestAuthenticationEntryPoint bauth = new DigestAuthenticationEntryPoint();

    bauth.setRealmName("Security Digest Authentication");

    bauth.setKey("SecurityKey");

    return bauth;

    }

    ```


    If you restart the application and go to `http://localhost:8080/favoritesmovies/movies`,
    you will be presented with a browser dialog box asking for a username and password
    exactly like the one that was shown for basic authentication. This is the `DigestAuthenticationEntryPoint`’s
    work. As explained, the entry point will fill the response object with the required
    headers so that the browser knows it needs to show the login form. Log in with
    username `admin` and password `admin123`, and you should be able to access the
    requested URL.


    The browser will create its own digested message with the password input included
    and put it in the header. It will also put the rest of the information—namely,
    nonce, cnonce, realm, and so on—in the `Digest` header. An example `Digest` header
    that is sent to the server with your current request is the following:


    ```

    ''Digest username="admin", realm=" Security Digest Authentication",

    nonce="MTM1NTY3NDc3NDIy....==", uri=" /movies",

    response="225ea6fbad618cfdf1da7d4f7efe53b8", qop=auth,

    nc=00000002, cnonce="376a9b27621880bd"''

    ```


    When the request reaches `DigestAuthenticationFilter`, the headers of the request
    contain the required digest authentication header. The information in this header
    arrives as a CSV string containing all the required information shown in the last
    paragraph, including the nonce and the client nonce (`cnonce`). (A nonce is an
    arbitrary number used only once in a cryptographic communication. See [`http://en.wikipedia.org/wiki/Cryptographic_nonce`](http://en.wikipedia.org/wiki/Cryptographic_nonce).).
    The filter extracts the information from the header, retrieves the user from the
    `UserDetailsService`, and then computes the digest with the password from the
    retrieved user to see if the digest matches the one sent in the header by the
    client. If they match, access is granted.


    # Remember-Me Authentication


    The remember-me authentication functionality is used to allow returning users
    of the application to use it without needing to log in every time. Basically,
    the application remembers certain visitors, allowing them to just open the application
    and be greeted with their personalized version of the application, as if they
    were logged in. Remember-me functionality is very convenient for users; however,
    it is also very dangerous and recommended for private (from home) use only.


    The problem should be obvious. If you use an application from a public computer
    and this application remembers your profile information, the next person who accesses
    that application from that computer will be able to impersonate you with minimum
    effort. It is also common practice to offer just a limited amount of functionality
    in the remember-me session. This means that even if you are logged in automatically
    thanks to the remember-me functionality, you won’t have access to the whole functionality
    of the application. More sensitive parts of the application might require you
    to formally log in to use them.


    This is the case, for example, with Amazon.com. When you visit Amazon.com and
    log in, the next time you visit Amazon, the site will remember you, your recommendations,
    your name, and other information about you. But if you want to buy something,
    it will ask you to log in fully to access that functionality. Remember-me authentication
    is typically supported by sending a cookie to the browser, which then, on subsequent
    sessions in the application, is sent back to the server for auto login.


    ## How does remember-me functionality work in Spring Security?


    Remember-me functionality in Spring Security is supported mainly by two components:
    the `RememberMeServices` interface and the `RememberMeAuthenticationFilter` class.
    Let’s see how they work in the context of a request.


    When the application starts up, the `RememberMeAuthenticationFilter` is in the
    filter chain of the server. Also, a `TokenBasedRememberMeServices` is instantiated
    and injected into the `AbstractAuthenticationProcessingFilter` replacing the no-op
    `NullRememberMeServices`.


    Go to `http://localhost:8080/favoritesmovies/movies`, and log in with `admin`
    as the username and `admin123` as password. When the request gets into the application,
    `UsernamePasswordAuthenticationFilter` (a subclass of `AbstractAuthenticationProcessingFilter`)
    handles the authentication process in the standard way already explained.


    After the authentication is successful, `UsernamePasswordAuthenticationFilter`
    invokes the configured `TokenBasedRememberMeServices`''s `loginSuccess` method.
    This method looks to see if the request contains the parameter `remember-me` in
    order to apply the remember-me functionality. (If the property `alwaysRemember`
    is set to `true` in the service, it will also apply the remember-me functionality.)
    Because you didn’t send this request, nothing will happen.


    So let’s add the parameter to the login form you have. Open the file `login.jsp`
    and somewhere inside the `<form>` paste the following element:


    ```

    Remember Me:

    ```


