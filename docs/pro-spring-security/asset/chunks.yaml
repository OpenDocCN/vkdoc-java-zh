    ```


    从前一个类中列出的元素来看，在 XML 配置文件中使用的顶层元素如下（在前面的清单中，我们通过常量名称而非 XML 元素名称来引用它们）：


    *   `LDAP_PROVIDER`：如果你需要为应用程序配置轻量级目录访问协议（LDAP）认证提供者，则使用此元素。


    *   `LDAP_SERVER`：此元素用于在应用程序中配置一个 LDAP 服务器。


    *   `LDAP_USER_SERVICE`：此元素配置用于从 LDAP 服务器检索用户详细信息并填充该用户权限的服务（Spring Security 使用术语“权限”来指代授予特定用户的许可名称。例如，`ROLE_USER`
    就是一个权限）。


    *   `USER_SERVICE`：此元素定义了内存用户服务，你可以在其中将用户名、凭据和权限直接存储在应用程序上下文定义文件中。请注意，这种类型的配置特定于测试环境和学术目的，因为它易于设置且速度快。


    *   `JDBC_USER_SERVICE`：此元素允许你设置一个数据库驱动的用户服务，你可以在其中指定一个 `DataSource` 以及用于从数据库检索用户信息的查询语句。


    *   `AUTHENTICATION_PROVIDER`：此元素定义了一个 `DaoAuthenticationProvider`，它是一个委托给 `UserDetailsService`
    实例的认证提供者。`UserDetailsService` 可以是前面三个要点中定义的任何一个，也可以是对自定义实现的引用。


    *   `GLOBAL_METHOD_SECURITY`：此元素负责在应用程序中设置对注解 `@Secured`、`@javax.annotation.security.RolesAllowed`、`@PreAuthorize`
    和 `@PostAuthorize` 的全局支持。该元素将处理方法拦截器的注册，该拦截器将感知 Bean 方法的所有元数据，以便应用相应的安全通知。


    *   `AUTHENTICATION_MANAGER`：此元素在应用程序中注册一个全局的 `ProviderManager`，并在其上设置已配置的 `AuthenticationProviders`。


    *   `METHOD_SECURITY_METADATA_SOURCE`：此元素在应用程序上下文中注册一个 `MapBasedMethodSecurityMetadataSource`。它将持有一个
    `Map<RegisteredMethod, List<ConfigAttribute>>`。这样做是为了当对某个方法发起请求时，可以检索该方法并检查其安全约束。


    *   `DEBUG`：出于开发目的，此元素在安全过滤器链中注册一个 `DebugFilter`。


    *   `HTTP`：这是基于 Web 的安全应用程序的主要元素。HTTP 元素非常强大。它允许定义基于 URL 的安全映射策略、配置过滤器、安全套接字层（SSL）支持以及其他与
    HTTP 相关的安全配置。


    *   `HTTP_FIREWALL`：此元素使用一个防火墙元素，如果已配置，则将其添加到过滤器链中。引用的防火墙应该是 Spring 自身 `HttpFirewall`
    接口的一个实现。


    *   `FILTER_INVOCATION_DEFINITION_SOURCE`：此元素已被弃用。请参见下一个元素。


    *   `FILTER_SECURITY_METADATA_SOURCE`：此元素包装了一个 `<intercept-url>` 元素列表。这些元素映射了
    URL 与访问这些 URL 所需的 `ConfigAttributes` 之间的关系。


    *   `FILTER_CHAIN`：此元素允许你配置将在应用程序中使用的 Spring Security 过滤器链、你想要添加到链中的过滤器，以及如果你想自定义链如何匹配请求，还可以配置一个请求匹配器。最重要的请求匹配器是基于
    Ant 路径和基于正则表达式的。


    你将在本书中全面使用 Spring Security 命名空间，因此这里描述的许多元素将在后续章节中再次讨论。

    '
- fmt: '### The Filters and Filter Chain


    The filter chain model is what Spring Security uses to secure web applications.
    This model is built on top of the standard *servlet filter* functionality. Working
    as an Intercepting Filter Pattern, the filter chain in Spring Security is built
    of a few single-responsibility filters that cover all the different security constraints
    required by the application.


    The filter chain in Spring Security preprocesses and postprocesses all the HTTP
    requests that are sent to the application and then applies security to URLs that
    require it.


    A typical filter for a single HTTP request is shown in Figure [4-9](#310331_2_En_4_Chapter.xhtml#Fig9).


    ![../images/310331_2_En_4_Chapter/310331_2_En_4_Fig9_HTML.jpg](images/310331_2_En_4_Chapter/310331_2_En_4_Fig9_HTML.jpg)


    Figure 4-9


    Spring Security filter example for a single HTTP request


    The Spring Security filter chain is made up of Spring beans; however, standard
    servlet-based web applications don’t know about Spring beans.


    From the point of view of the container, Spring Security is actually a single
    filter, which internally contains a lot of filters with different purposes.


    Spring Security is installed as a single filter in the chain named `FilterChainProxy`,
    which is a chain of filters containing all the security needed, as shown in Figure
    [4-10](#310331_2_En_4_Chapter.xhtml#Fig10).


    ![../images/310331_2_En_4_Chapter/310331_2_En_4_Fig10_HTML.jpg](images/310331_2_En_4_Chapter/310331_2_En_4_Fig10_HTML.jpg)


    Figure 4-10


    Spring Security filters overview


    In the security filter, there is also a special layer of indirection installed
    in the container named `DelegatingFilterProxy`. `DelegatingFilterProxy` does not
    need to be a Spring Bean.


    The flow works so that the `DelegatingFilterProxy` filter will delegate to a `FilterChainProxy`,
    which instead is always a bean with a fixed name of `springSecurityFilterChain`
    which at the end will be responsible, within your application, for:


    - Protecting the application URLs

    - Validating the submitted username and passwords

    - Redirecting to the login form


    The `DelegatingFilterProxy` process containing the `FilterChainProxy` is shown
    in Figure [4-11](#310331_2_En_4_Chapter.xhtml#Fig11).


    ![../images/310331_2_En_4_Chapter/310331_2_En_4_Fig11_HTML.jpg](images/310331_2_En_4_Chapter/310331_2_En_4_Fig11_HTML.jpg)


    Figure 4-11


    Spring Security filter chain overview


    The Spring Security filter configuration is achieved via a special servlet and
    two main XML files, `web.xml` and `applicationContext.xml`. Please notice that
    starting with Servlet 3.0, `web.xml` is no longer necessary.


    This special servlet filter is needed to cross the boundaries between the standard
    servlet API and life cycle and the Spring application where the bean filters will
    reside. This is the job of the `org.springframework.web.filter.DelegatingFilterProxy`
    defined in the `web.xml`, which uses under the hood the `WebApplicationContextUtils.getWebApplicationContext`
    utility method to retrieve the root application context of the application. These
    two classes are from the Spring Framework, not from Spring Security.


    Figure [4-12](#310331_2_En_4_Chapter.xhtml#Fig12) shows the configuration of the
    filter chain.


    ![../images/310331_2_En_4_Chapter/310331_2_En_4_Fig12_HTML.jpg](images/310331_2_En_4_Chapter/310331_2_En_4_Fig12_HTML.jpg)


    Figure 4-12


    Understanding the Spring Security filter configuration. The filter in the `web.xml`
    file has the same name as the bean in the Spring application context so that the
    listener can find it


    Full information about how migrating from Spring Security 3.x to 4.x and from
    4.x to 5.x (Java Configuration) can be found at [`https://docs.spring.io/spring-security/site/migrate/current/3-to-4/html5/migrate-3-to-4-jc.html`](https://docs.spring.io/spring-security/site/migrate/current/3-to-4/html5/migrate-3-to-4-jc.html)
    and [`https://github.com/spring-projects/spring-security/issues/4874`](https://github.com/spring-projects/spring-security/issues/4874).'
  raw: '#### The Filters and Filter Chain


    The filter chain model is what Spring Security uses to secure web applications.
    This model is built on top of the standard *servlet filter* functionality. Working
    as an Intercepting Filter Pattern, the filter chain in Spring Security is built
    of a few single-responsibility filters that cover all the different security constraints
    required by the application.


    The filter chain in Spring Security preprocesses and postprocesses all the HTTP
    requests that are sent to the application and then applies security to URLs that
    require it.


    A typical filter for a single HTTP request is shown in Figure [4-9](#310331_2_En_4_Chapter.xhtml#Fig9).


    ![../images/310331_2_En_4_Chapter/310331_2_En_4_Fig9_HTML.jpg](images/310331_2_En_4_Chapter/310331_2_En_4_Fig9_HTML.jpg)


    Figure 4-9


    Spring Security filter example for a single HTTP request


    The Spring Security filter chain is made up of Spring beans; however, standard
    servlet-based web applications don’t know about Spring beans.


    From the point of view of the container, Spring Security is actually a single
    filter, which internally contains a lot of filters with different purposes.


    Spring Security is installed as a single filter in the chain named FilterChainProxy,
    which is a chain of filters containing all the security needed, as shown in Figure
    [4-10](#310331_2_En_4_Chapter.xhtml#Fig10).


    ![../images/310331_2_En_4_Chapter/310331_2_En_4_Fig10_HTML.jpg](images/310331_2_En_4_Chapter/310331_2_En_4_Fig10_HTML.jpg)


    Figure 4-10


    Spring Security filters overview


    In the security filter, there is also a special layer of indirection installed
    in the container named `DelegatingFilterProxy`. `DelegatingFilterProxy` does not
    need to be a Spring Bean.


    The flow works so that the `DelegatingFilterProxy` filter will delegate to a `FilterChainProxy`,
    which instead is always a bean with a fixed name of `springSecurityFilterChain`
    which at the end will be responsible, within your application, for


    *   Protecting the application URLs


    *   Validating the submitted username and passwords


    *   Redirecting to the login form


    The `DelegatingFilterProxy` process containing the `FilterChainProxy` is shown
    in Figure [4-11](#310331_2_En_4_Chapter.xhtml#Fig11).


    ![../images/310331_2_En_4_Chapter/310331_2_En_4_Fig11_HTML.jpg](images/310331_2_En_4_Chapter/310331_2_En_4_Fig11_HTML.jpg)


    Figure 4-11


    Spring Security filter chain overview


    The Spring Security filter configuration is achieved via a special servet and
    two main XML files, `web.xml` and `applicationContext.xml`. Please notice that
    starting with Servlet 3.0, `web.xml` is no longer necessary.


    This special servlet filter is needed to cross the boundaries between the standard
    servlet API and life cycle and the Spring application where the bean filters will
    reside. This is the job of the `org.springframework.web.filter.DelegatingFilterProxy`
    defined in the `web.xml`, which uses under the hood the `WebApplicationContextUtils.getWebApplicationContext`
    utility method to retrieve the root application context of the application. These
    two classes are from the Spring Framework, not from Spring Security.


    Figure [4-12](#310331_2_En_4_Chapter.xhtml#Fig12) shows the configuration of the
    filter chain.


    ![../images/310331_2_En_4_Chapter/310331_2_En_4_Fig12_HTML.jpg](images/310331_2_En_4_Chapter/310331_2_En_4_Fig12_HTML.jpg)


    Figure 4-12


    Understanding the Spring Security filter configuration. The filter in the web.xml
    file has the same name as the bean in the Spring application context so that the
    listener can find it


    Full information about how migrating from Spring Security 3.x to 4.x and from
    4.x to 5.x (Java Configuration) can be found at [`https://docs.spring.io/spring-security/site/migrate/current/3-to-4/html5/migrate-3-to-4-jc.html`](https://docs.spring.io/spring-security/site/migrate/current/3-to-4/html5/migrate-3-to-4-jc.html)
    and [`https://github.com/spring-projects/spring-security/issues/4874`](https://github.com/spring-projects/spring-security/issues/4874).'
  trans: '

    #### 过滤器与过滤器链


    过滤器链模型是 Spring Security 用于保护 Web 应用程序的核心机制。该模型构建在标准的 *servlet 过滤器* 功能之上。作为拦截过滤器模式的一种实现，Spring
    Security 中的过滤器链由多个单一职责的过滤器组成，这些过滤器涵盖了应用程序所需的所有不同安全约束。


    Spring Security 的过滤器链会对发送到应用程序的所有 HTTP 请求进行预处理和后处理，并对需要保护的 URL 应用安全策略。


    单个 HTTP 请求的典型过滤器如图 4-9 所示。


    ![../images/310331_2_En_4_Chapter/310331_2_En_4_Fig9_HTML.jpg](img/310331_2_En_4_Fig9_HTML.jpg)


    图 4-9


    单个 HTTP 请求的 Spring Security 过滤器示例


    Spring Security 过滤器链由 Spring Bean 组成；然而，标准的基于 Servlet 的 Web 应用程序并不了解 Spring Bean。


    从容器的角度来看，Spring Security 实际上是一个单一的过滤器，其内部包含了许多具有不同用途的过滤器。


    Spring Security 作为链中名为 `FilterChainProxy` 的单一过滤器被安装，该过滤器本身是一个包含所有必需安全功能的过滤器链，如图
    4-10 所示。


    ![../images/310331_2_En_4_Chapter/310331_2_En_4_Fig10_HTML.jpg](img/310331_2_En_4_Fig10_HTML.jpg)


    图 4-10


    Spring Security 过滤器概览


    在安全过滤器中，容器中还安装了一个特殊的间接层，名为 `DelegatingFilterProxy`。`DelegatingFilterProxy` 本身不需要是一个
    Spring Bean。


    其工作流程是：`DelegatingFilterProxy` 过滤器会将请求委托给 `FilterChainProxy`，而 `FilterChainProxy`
    始终是一个具有固定名称 `springSecurityFilterChain` 的 Bean，它最终将在你的应用程序中负责：


    *   保护应用程序的 URL

    *   验证提交的用户名和密码

    *   重定向到登录表单


    包含 `FilterChainProxy` 的 `DelegatingFilterProxy` 处理过程如图 4-11 所示。


    ![../images/310331_2_En_4_Chapter/310331_2_En_4_Fig11_HTML.jpg](img/310331_2_En_4_Fig11_HTML.jpg)


    图 4-11


    Spring Security 过滤器链概览


    Spring Security 的过滤器配置是通过一个特殊的 Servlet 和两个主要的 XML 文件（`web.xml` 和 `applicationContext.xml`）来实现的。请注意，从
    Servlet 3.0 开始，`web.xml` 不再是必需的。


    这个特殊的 Servlet 过滤器用于跨越标准 Servlet API 及其生命周期与存放 Bean 过滤器的 Spring 应用程序之间的界限。这是由定义在
    `web.xml` 中的 `org.springframework.web.filter.DelegatingFilterProxy` 完成的，它在底层使用
    `WebApplicationContextUtils.getWebApplicationContext` 工具方法来检索应用程序的根应用上下文。这两个类来自
    Spring 框架，而非 Spring Security。


    图 4-12 展示了过滤器链的配置。


    ![../images/310331_2_En_4_Chapter/310331_2_En_4_Fig12_HTML.jpg](img/310331_2_En_4_Fig12_HTML.jpg)


    图 4-12


    理解 Spring Security 过滤器配置。`web.xml` 文件中的过滤器与 Spring 应用上下文中的 Bean 具有相同的名称，以便监听器能够找到它


    关于如何从 Spring Security 3.x 迁移到 4.x 以及从 4.x 迁移到 5.x（Java 配置）的完整信息，请参阅 [`https://docs.spring.io/spring-security/site/migrate/current/3-to-4/html5/migrate-3-to-4-jc.html`](https://docs.spring.io/spring-security/site/migrate/current/3-to-4/html5/migrate-3-to-4-jc.html)
    和 [`https://github.com/spring-projects/spring-security/issues/4874`](https://github.com/spring-projects/spring-security/issues/4874)。

    '
- fmt: 'The filter chain will be fully explained in Chapter [5](#310331_2_En_5_Chapter.xhtml).
    However, here we’ll provide an overview of which filters are available and what
    they do. The available filters are defined as enums in the file named `org.springframework.security.config.http.SecurityFilters`.
    The enums are then referenced later in the startup process when instantiating
    the bean definitions for each filter. Here are the defined filters:


    *   `CHANNEL_FILTER` : This filter ensures that the request is handled by the
    correct channel—meaning, in most cases, it determines whether or not the request
    is handled by HTTPS.


    *   `CONCURRENT_SESSION_FILTER` : This filter is part of the concurrent session-handling
    mechanism. Its main function is to query the session to see if it has expired
    (which happens mainly when the maximum number of concurrent sessions per user
    are reached) and to log out the user if that is the case.


    *   `SECURITY_CONTEXT_FILTER` : This filter populates `SecurityContextHolder`
    with a new or existing security context to be used by the rest of the framework.


    *   `LOGOUT_FILTER` : This filter is based, by default, on a particular URL invocation
    (`/logout`). It takes care of the logout process, including tasks such as clearing
    the cookies, removing the “remember me” information, and clearing the security
    context.


    *   `X509_FILTER` : This filter extracts the principal and credentials from an
    X509 certificate using the class `java.security.cert.X509Certificate` and attempts
    to authenticate with these preauthenticated values.


    *   `PRE_AUTH_FILTER` : This filter is used with the J2EE authentication mechanism.
    The J2EE authenticated principal will be used as the preauthenticated principal
    in the framework.


    *   `FORM_LOGIN_FILTER` : This filter is used when a user name and password is
    required on a login form. This filter takes care of authenticating with the requested
    user name and password. It handles, from Spring v4, requests to a particular URL
    (`/login`) with a particular set of user-name and password parameters (`username`,
    `password`).


    *   `OPENID_FILTER` : This filter processes `OpenId` authentication requests,
    handling both the initial request with the `OpenId` identity to the external server
    and the redirect from the `OpenId` server back to the application. All this interaction
    is managed when the filter detects requests to the preconfigured URL `/openid`
    since Spring v4.


    *   `LOGIN_PAGE_FILTER` : This filter generates a default login page when the
    user doesn’t provide a custom one. It is activated when the URL `/spring_security_login`
    is requested.


    *   `DIGEST_AUTH_FILTER` : This filter processes HTTP `Digest` authentication
    headers. It looks for the presence of both `Digest` and `Authorization` HTTP request
    headers. It can be used to provide Digest authentication to standard user agents,
    like browsers, or to application clients like SOAP. On successful authentication,
    the `SecurityContext` will be populated with the valid `Authentication` object.


    *   `BASIC_AUTH_FILTER` : This filter processes the BASIC authentication headers
    in an HTTP request. It looks for the header `Authorization` and tries to authenticate
    with these credentials.


    *   `REQUEST_CACHE_FILTER` : This filter retrieves a request from the request-cache
    that matches the current request, and it sends the cached one through the rest
    of the filter chain.


    *   `SERVLET_API_SUPPORT_FILTER` : This filter wraps the request in a request
    wrapper that implements the Servlet API security methods, like `isUserInRole`,
    and delegates it to `SecurityContextHolder`. This allows for the convenient use
    of the request object itself to get the security information. For example, you
    can use `request.getAuthentication` to retrieve the `Authentication` object.


    *   `JAAS_API_SUPPORT_FILTER` : This filter tries to obtain and use `javax.security.auth.Subject`,
    which is a final class, and continue the filter chain execution with this subject.


    *   `REMEMBER_ME_FILTER` : If no user is logged in, this filter will look to see
    whether there is any “remember me” functionality active and any “remember me”
    `Authentication` available. If there is, this filter will try to login automatically
    and authenticate with this “remember me” information.


    *   `ANONYMOUS_FILTER` : This filter checks to see whether there is already an
    `Authentication` in the context. If there is not, it creates a new `Anonymous`
    one and sets it on the security context.


    *   `SESSION_MANAGEMENT_FILTER` : This filter passes the `Authentication` object
    that corresponds to the authenticated user who is logged in to the system to some
    configured session management processors in order to do session-related handling
    of the `Authentication`. Mainly, these processors will do some kind of validation
    and throw `SessionAuthenticationException` if appropriate. Currently, these processors
    (or strategies) include only one main class in the form of `org.springframework.security.web.authentication.session.ConcurrentSessionControlStrategy`,
    dealing with both session fixation and concurrent sessions.


    *   `EXCEPTION_TRANSLATION_FILTER` : This filter handles the translation between
    Spring Security exceptions (like `AccessDeniedException`) and the corresponding
    HTTP status code. It also redirects to the application entry point in case the
    exception is thrown because there is not yet an authenticated user in the system.


    *   `FILTER_SECURITY_INTERCEPTOR` : This filter handles the authorization mechanism
    for defined URLs. It delegates to its parent class’ (`AbstractSecurityInterceptor`)
    functionality (which we’ll cover later in the chapter) the actual workflow logic
    of granting or not granting the access to the specific resource.


    *   `SWITCH_USER_FILTER` : This filter allows a user to impersonate another one
    by visiting a particular URL, which since Spring v4 was updated from `/j_spring_security_switch_user`
    to `/login/impersonate`. This URL should be secured to allow just certain users
    access to this functionality. Also, the method `attemptSwitchUser` in the implementing
    class `SwitchUserFilter` can be overridden to add constraints, so that you can
    use more finely grained information to decide if certain users are allowed or
    not allowed to impersonate other users.'
