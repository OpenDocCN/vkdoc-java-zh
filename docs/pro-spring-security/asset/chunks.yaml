    ### 面向切面编程


    AOP 是一种从主应用程序代码中提取横切关注点，并以横向方式在需要它们的各个点进行应用的技术。AOP 关注点的典型示例包括事务、日志记录和安全性。


    其主要思想是，将应用程序的核心业务逻辑与外围的专用关注点解耦，然后以透明、不突兀的方式在整个应用程序中应用这些功能。通过将这些功能（即通用的应用程序逻辑，而非核心业务逻辑）封装到其自身的模块中，它们可以被应用程序中需要它们的多个部分使用，从而避免了在代码中到处重复。在
    AOP 术语中，封装这些横切逻辑的实体被称为切面。


    Java 中有许多 AOP 的实现。最流行的可能是 AspectJ，它需要一个特殊的编译过程。Spring 支持 AspectJ，但它也包含了自己的 AOP
    实现，简称为 *Spring AOP*，这是一个纯 Java 实现，不需要特殊的编译过程。


    使用代理的 Spring AOP 仅在公有方法级别可用，并且仅当从被代理对象外部调用时才有效。这是有道理的，因为从对象内部调用方法不会调用代理；相反，它会直接调用真实的自身对象（基本上是对
    `this` 对象的调用）。在使用 Spring 时，意识到这一点非常重要，有时新手 Spring 开发者会忽略这一点。


    即使使用自己的 AOP 实现，Spring 也利用了 AspectJ 的语法和概念来定义切面。


    Spring AOP 是一个相当大的主题，但其工作方式背后的原理并不难理解。Spring AOP 通过使用动态创建的代理对象来工作，这些代理对象负责处理围绕主业务对象调用的
    AOP 关注点。你可以将代理和 Spring AOP 简单地视为装饰器模式的实现，其中你的业务对象是组件，而 AOP 代理是装饰器。图 2-2 展示了该概念的简单图形表示。这样思考，你应该能够轻松理解
    Spring AOP。清单 2-3 展示了这种魔法在概念上是如何发生的。


    ![../images/310331_2_En_2_Chapter/310331_2_En_2_Fig2_HTML.jpg](img/310331_2_En_2_Fig2_HTML.jpg)


    图 2-2


    Spring AOP 实战


    ```

    public class Business Object implements BusinessThing {

    public void doBusinessThing( ) {

    / / 一些业务逻辑

    }

    }

    清单 2-3

    业务对象，非事务性

    ```


    假设你有一个用于事务的切面。Spring 在运行时动态创建一个概念上类似于清单 2-4 的对象。


    ```

    public class BusinessObjectTransactionalDecorator implements BusinessThing {

    private BusinessThing componen t ;

    public BusinessObjectTransactionalDecorator(BusinessThing component ) {

    t h i s . co mponent = component ;

    }

    public void doBusinessThing( ) {

    / / 一些启动事务的代码

    component.doBusinessThing( ) ;

    / / 一些提交事务的代码

    }

    }

    清单 2-4

    Spring AOP 魔法

    ```


