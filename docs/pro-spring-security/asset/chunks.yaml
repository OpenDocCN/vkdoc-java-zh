    并创建一个帖子，您将看到该帖子不会显示在\n页面上。这是因为您是以 `ANONYMOUS` 用户的身份创建了该帖子。\n请记住，现在帖子只会对 `ROLE_USER`\
    \ 用户显示。如果\n您使用用户名 **leo** 和\n密码 **nardone01** 登录应用程序，并再次访问 `http://localhost:8080/forum/`，\n\
    您将看到页面上显示了该帖子以及删除按钮。以下\n段落将解释这一切在底层是如何工作的。\n正如您可能从之前的章节中回忆起的，Spring Security\n\
    的核心是 `SecurityInterceptor` 的概念\n及其两个具体实现：`FilterSecurityInterceptor`\n和 `MethodSecurityInterceptor`。\n\
    您可能还记得，拦截器的工作流程是预处理、\n处理、后处理。实际的业务逻辑发生在\n处理阶段，而预处理和后处理阶段都用于\n框架自身应用所有与授权和访问控制相关的安全关注点，\n\
    这些关注点是保护应用程序所必需的。\n预处理阶段主要由访问决策管理器和访问决策投票器负责，\n它们决定是否应允许访问特定资源（无论是方法、\n领域对象还是\
    \ URL）。后处理阶段由从 `SecurityInterceptor`\n调用的 `AfterInvocationManager` 处理。\n默认情况下，会调用\
    \ `AfterInvocationProviderManager`\n的一个实例。\n我们之前解释过这个过程：`AfterInvocationProviderManager`\n\
    遍历一个 `AfterInvocationProvider` 列表，\n由它做出是否允许访问特定领域对象实例的最终决定。\n在当前这个例子中，关键点在于调用链最终会到达一个\
    \ `ExpressionBasedPostInvocationAdvice`\n实例（通过 `PostInvocationAdviceProvider`），\n\
    该实例检查是否存在需要处理的 `postFilter` 表达式。\n如果存在，它会调用您在清单 7-22 中定义的 `DefaultMethodSecurityExpressionHandler`。\n\
    此处理器检查带有 `@PostFilter` 注解的业务方法的返回值\n确实是一个集合或数组（如果不是，则抛出异常）。\n然后它遍历这个集合，对每个对象评估\
    \ SpEL 表达式，\n并丢弃表达式评估结果为 `false` 的对象。\n您使用的表达式是一个 ACL 表达式，与大多数其他表达式一样，\n其支持方法定义在\
    \ `SecurityExpressionRoot` 类中。\n此方法（`hasPermission`）使用\n清单 7-22 中定义的权限评估器来决定\n\
    认证主体是否对所传递的对象拥有所需的权限。此评估器使用与\n`AclEntryVoter` 用于决定是否授予访问权限相同的类套件和辅助工具，\n例如 `AclService`\
    \ 和 ACL 接口中的\n`isGranted` 方法。\n所以您知道示例中发生了什么。当您尝试以匿名用户身份访问\n列表时，唯一存在的帖子从返回元素中被丢弃了，\n\
    因为该用户不满足读取对象所需的权限。（ACL 的 `isGranted` 方法\n返回了 `false`。）当您\n以 *leo/nardone01* 身份登录时，您获得了\
    \ `ROLE_USER` 角色。根据您首次创建帖子时\n指定的 ACL 规则，该角色确实被允许读取帖子对象。\n\n让我们通过一个包含多个帖子的示例来看看过滤是如何工作的。\n\
    这次，您将使用具有 `ROLE_ADMIN` 角色的用户创建一个帖子。您将\n修改帖子创建代码，以便当管理员用户创建帖子时，只有其他\n`ROLE_ADMIN`\
    \ 用户才能读取该帖子。为此，将\n`ForumServiceImpl` 类中的 `createPost` 方法更改为\n清单 7-23 所示。此清单\n\
    （像本书中的许多其他清单一样）采用了便利性优先于特别良好设计的方法。\n例如，您可能会（并且正确地）争辩说，ACL 变更不是核心 `createPost`\
    \ 方法\n业务功能的一部分，并且在代码中硬编码角色名称也是不正确的。\n再次强调，我们这样做是为了以方便的方式说明概念，\n无需过多抽象，直接切入我们试图展示的重点。\n\
    在实际环境中，您应该努力实现良好的关注点分离，\n将安全关注点放在它们自己的空间（无论是使用 AOP 还是其他方法），\n并让业务方法处理业务关注点。\n\n\
    ```\n@Transactional\npublic void createPost(Post post) {\nInteger id = new Integer(Math.abs(post.hashCode()));\n\
    ObjectIdentity oid = new ObjectIdentityImpl(Post.class, id);\nMutableAcl acl =\
    \ mutableAclService.createAcl(oid);\nUser user = (User)SecurityContextHolder.getContext().getAuthentication().getPrincipal();\n\
    acl.insertAce(0, BasePermission.ADMINISTRATION, new PrincipalSid(\nuser.getUsername()),\
    \ true);\nacl.insertAce(1, BasePermission.DELETE, new GrantedAuthoritySid(\n\"\
    ROLE_ADMIN\"), true);\nif(isAdminUserLogged()){\nacl.insertAce(2, BasePermission.READ,\
    \ new GrantedAuthoritySid(\n\"ROLE_ADMIN\"), true);\n}else{\nacl.insertAce(2,\
    \ BasePermission.READ, new GrantedAuthoritySid(\n\"ROLE_USER\"), true);\n}\nmutableAclService.updateAcl(acl);\n\
    post.setId(id);\npostStore.put(id, post);\n}\nprivate booleanisAdminUserLogged()\
    \ {\nfor(GrantedAuthority authority: SecurityContextHolder.getContext().getAuthentication().getAuthorities()){\n\
    if(authority.getAuthority().equals(\"ROLE_ADMIN\")){\nreturn true;\n}\n}\nreturn\
    \ false;\n}\n清单 7-23\ncreatePost 方法，该方法根据创建帖子的用户创建不同的 ACL，以及一个用于检查登录用户是否具有 ROLE_ADMIN\
    \ 角色的辅助方法\n```\n\n这里您添加了一个条件，基本上是说，如果登录的\n用户是管理员，则 `READ` 权限将\n仅对其他管理员（具有 `ROLE_ADMIN`\
    \ 角色的用户）可用。如果\n登录的用户不是管理员，则 `READ` 权限将\n对任何具有 `ROLE_USER` 角色的用户可用。\n让我们逐步看看这个新配置的执行情况。\n\
    \n测试场景 7-7\n\n要执行此新配置，请遵循\n以下步骤：\n\n1.  重新启动应用程序，`访问 http://localhost:8080/forum/admin`，并使用用户名\n\
    \    **leo** 和密码 **nardone01** 登录。\n\n2.  访问 `http://localhost:8080/forum/posts`\n\
    \    并创建一个内容为 *p1* 的新帖子。这将创建\n    您在图 7-12 中看到的屏幕。\n\n![../images/310331_2_En_7_Chapter/310331_2_En_7_Fig12_HTML.jpg](img/310331_2_En_7_Fig12_HTML.jpg)\n\
    \n图 7-12\n\n具有 ROLE_USER 角色的用户创建帖子后生成的屏幕\n\n3.  访问 `http://localhost:8080/logout`\n\
    \    以退出应用程序。然后访问 `http://localhost:8080/login`\n    并使用用户名 **luna** 和密码\n   \
    \ **nardone01** 登录。\n\n4.  访问 `http://localhost:8080/forum/posts`\n    并创建一个内容为\
    \ *p2* 的帖子。参见图 7-13。\n\n![../images/310331_2_En_7_Chapter/310331_2_En_7_Fig13_HTML.jpg](img/310331_2_En_7_Fig13_HTML.jpg)\n\
    \n图 7-13\n\n管理员用户创建帖子后生成的屏幕\n"
- fmt: '5. 访问`http://localhost:8080/logout`以退出应用程序。然后访问`http://localhost:8080/login`，使用用户名`massimo`和密码`nardone01`登录。


    6. 访问`http://localhost:8080/forum/posts`，您应该会看到两个帖子，如图[7-14](#310331_2_En_7_Chapter.xhtml#Fig14)所示。


    ![../images/310331_2_En_7_Chapter/310331_2_En_7_Fig14_HTML.jpg](images/310331_2_En_7_Chapter/310331_2_En_7_Fig14_HTML.jpg)


    **图 7-14** 同时拥有`ROLE_USER`和`ROLE_ADMIN`角色的用户看到的帖子


    7. 访问`http://localhost:8080/logout`以退出应用程序。然后访问`http://localhost:8080/login`，使用用户名`leo`和密码`nardone01`登录。


    8. 访问`http://localhost:8080/forum/posts`，您只会看到`Post post1`，因为它是标准用户唯一可以访问的帖子。视图与图[7-12](#310331_2_En_7_Chapter.xhtml#Fig12)完全相同。


    Spring Security ACL 支持还提供了`@PreFilter`注解，正如您所想象的，它在方法安全拦截过程的预处理阶段工作，而不是像`@PostFilter`注解那样工作。如前所述，预处理活动由`AccessDecisionVoter`实现负责。对于`@PreFilter`注解，它由`org.springframework.security.access.prepost.PreInvocationAuthorizationAdviceVoter`负责，该投票器反过来使用`DefaultMethodSecurityExpressionHandler`的实例，与之前的情况相同。与`@PostFilter`的情况一样，`@PreFilter`注解的方法预期接收一个集合。然而，在这种情况下，不支持数组。


    我们刚刚向您展示了一个关于此 ACL 过滤功能如何实际工作的简单演练。您可以看到，仅通过提供带有`hasPermission`表达式的`@PostFilter`注解（该表达式内部调用
    SpEL 上下文中的一个方法），我们就指示了框架如何处理方法的返回值。我们首先解释并在后续的小测试用例中演示的这个过程，可以用图[7-15](#310331_2_En_7_Chapter.xhtml#Fig15)、[7-16](#310331_2_En_7_Chapter.xhtml#Fig16)和[7-17](#310331_2_En_7_Chapter.xhtml#Fig17)来总结。


    ![../images/310331_2_En_7_Chapter/310331_2_En_7_Fig16_HTML.jpg](images/310331_2_En_7_Chapter/310331_2_En_7_Fig16_HTML.jpg)


    **图 7-16** 展示了在基于 ACL 安全的方法拦截预处理阶段中的主要类和接口的图表


    ![../images/310331_2_En_7_Chapter/310331_2_En_7_Fig15_HTML.jpg](images/310331_2_En_7_Chapter/310331_2_En_7_Fig15_HTML.jpg)


    **图 7-15** 一个简化的时序图，展示了调用带有`@PreFilter`和`@PostFilter`注解的方法时发生的情况。该图展示了领域对象的参数和返回集合在方法调用过程中如何被过滤。


    `@PreFilter`调用由`PreInvocationAuthorizationAdviceVoter`处理，而带有 ACL 配置属性的`@Secured`注解由`AclEntryVoter`处理。您可以在图中看到，在处理结束时，两条路径都到达了`SidRetrievalStrategy`、`ObjectIdentityRetrievalStrategy`和`AclService`中的核心元素。实际上，`AclPermissionEvaluator`和`AclEntryVoter`执行非常相似的功能。


    ![../images/310331_2_En_7_Chapter/310331_2_En_7_Fig17_HTML.jpg](images/310331_2_En_7_Chapter/310331_2_En_7_Fig17_HTML.jpg)


    **图 7-17** 展示了在基于 ACL 安全的方法拦截后处理阶段中参与的类的图表


    同样，您可以看到两个分支。左侧的分支包含`AclEntryAfterInvocationProvider`和`AclEntryAfterInvocationCollectionFilteringProvider`，该分支不支持
    SpEL 表达式，并在使用`@Secured`和静态配置属性名称（如`ACL_ALLOW_READ`等）时激活，正如您在之前几节中看到的那样。右侧分支则经过支持
    SpEL 以及`@PostFilter`和`@PostAuthorize`注解的部分。您可以看到这两个分支几乎与预处理阶段的分支一一对应。此外，您还可以看到系统中存在高度的重用，许多类同时出现在预处理和后处理阶段。


    我们涵盖了处理 ACL 安全的两种不同方式，即我们在上一段中讨论的两个分支。使用`@Secured`的方式较旧，不支持 SpEL 表达式；而使用`@PreFilter`、`@PreAuthorize`、`@PostAuthorize`和`@PostFilter`的方式自
    Spring Security 3.0 版本以来就已存在。它们是支持使用 SpEL 表达式的较新选项，因此在日常使用中您可能会更倾向于使用它们。


    ## 使用 ACL 保护视图层


    您还可以选择使用视图层的 JSP 标签来过滤掉那些没有适当权限查看领域对象的用户，从而使用 ACL 来保护应用程序。我们在 Web 安全章节中已经简要讨论过这些标签，但特意将
    ACL 标签留在这里进行更详细的介绍。为了在示例中使用它们，让我们继续使用上一节的代码，但做一些修改。首先，在`ForumServiceImpl`类中，注释掉`getPosts`方法上的`@PostFilter`注解，使其不再进行任何过滤。然后将`form.jsp`文件修改为如清单[7-24](#310331_2_En_7_Chapter.xhtml#PC25)所示。


    ```

    Posts


    New Post Content:


    ${post.content}

    ```


    **清单 7-24** 应用了 Taglib ACL 安全以过滤领域对象的`form.jsp`


    此清单展示了在视图层保护领域对象是多么简单。实际上，它（从视图角度来看）执行了与使用`@PostFilter`注解时非常相似的工作。


    `<accesscontrollist>`标签依赖于应用程序上下文配置中配置的`org.springframework.security.access.PermissionEvaluator`实现。它只有在应用程序上下文中仅配置了一个此类型的
    bean 时才能工作，因为它会尝试按类型检索该 bean。您可能还记得，您在配置中配置了一个具体类型为`org.springframework.security.acls.AclPermissionEvaluator`的`PermissionEvaluator`。


    现在，如果您重新启动应用程序并再次执行测试场景 7.1 中定义的步骤，从表示层的角度来看，您应该会得到与您首次执行该场景时完全相同的行为。其工作方式很简单。每次评估该标签时（在遍历帖子集合的每次迭代中），标签处理器都会调用`PermissionEvaluator`的`hasPermission`方法，该方法返回一个布尔值，指示是否已授予权限。如果授予了权限，则评估并渲染标签体。如果未授予权限，则跳过标签体。'
  raw: "5.  Visit `http://localhost:8080/logout`\n    to log out of the application.\
    \ Then visit `http://localhost:8080/login`\n    and log in with the username **massimo**\
    \ and the password\n    **nardone01**.\n\n6.  Visit `http://localhost:8080/forum/posts`,\n\
    \    and you should see both posts, as Figure [7-14](#310331_2_En_7_Chapter.xhtml#Fig14)\
    \ shows.\n\n![../images/310331_2_En_7_Chapter/310331_2_En_7_Fig14_HTML.jpg](images/310331_2_En_7_Chapter/310331_2_En_7_Fig14_HTML.jpg)\n\
    \nFigure 7-14\n\nPosts for a user with both ROLE_USER and ROLE_ADMIN roles\n\n\
    7.  Visit `http://localhost:8080/logout`\n    to log out of the application. Then\
    \ visit `http://localhost:8080/login`\n    and log in with the username **leo**\
    \ and the password\n    **nardone01**.\n\n8.  Visit `http://localhost:8080/forum/posts`,\n\
    \    and you’ll only see the Post post1 since it is the only one accessible\n\
    \    for standard users. The view is exactly the same as Figure [7-12](#310331_2_En_7_Chapter.xhtml#Fig12).\n\
    \nSpring Security ACL support also offers the `@PreFilter`\nannotation  which,\n\
    as you can imagine, works in the preprocess phase of the method security\ninterception\
    \ process rather than the way that the `@PostFilter`\nannotation works. As we\
    \ said before, the preprocessing activities are\ntaken care of by `AccessDecisionVoter`\n\
    implementations. In the case of the `@PreFilter`\nannotation, it is taken care\
    \ of by the `org.springframework.security.access.prepost.PreInvocationAuthorizationAdviceVoter`\n\
    which, in turn, uses an instance of `DefaultMethodSecurityExpressionHandler`\n\
    as in the previous case. As in the case of `@PostFilter`, `@PreFilter`-annotated\n\
    methods are expected to receive a collection. In this case, however,\narrays are\
    \ not supported.\n\nWe just showed you a simple walkthrough of how this ACL filtering\n\
    functionality works in practice. You can see that by providing only the\n`@PostFilter`\n\
    annotation with the `hasPermission`\nexpression (which, as you know, internally\
    \ calls a method in the SpEL\ncontext), we are instructing the framework what\
    \ to do with the returned\nvalues of the method. This process that we explained\
    \ first, and\ndemonstrated later in the small test case, can be summarized with\n\
    Figures [7-15](#310331_2_En_7_Chapter.xhtml#Fig15), [7-16](#310331_2_En_7_Chapter.xhtml#Fig16),\
    \ and [7-17](#310331_2_En_7_Chapter.xhtml#Fig17).\n\n![../images/310331_2_En_7_Chapter/310331_2_En_7_Fig16_HTML.jpg](images/310331_2_En_7_Chapter/310331_2_En_7_Fig16_HTML.jpg)\n\
    \nFigure 7-16\nA diagram showing the main classes and interfaces\nin the preprocessing\
    \ phase of a method interception with ACL-based\nsecurity\n\n![../images/310331_2_En_7_Chapter/310331_2_En_7_Fig15_HTML.jpg](images/310331_2_En_7_Chapter/310331_2_En_7_Fig15_HTML.jpg)\n\
    \nFigure 7-15\n  A simplified sequence\ndiagram of what happens when a method\
    \ with @PreFilter and @PostFilter\nannotations is invoked. The diagram shows how\
    \ parameters and return\ncollections of domain objects are filtered out on the\
    \ way in and out of\nthe method\n\n`@PreFilter`\ninvocations  are\nhandled by\
    \ the `PreInvocationAuthorizationAdviceVoter`,\nwhile `@Secured`\nannotations\
    \ with ACL config attributes are handled by the `AclEntryVoter`. You\ncan see\
    \ in the diagram that, at the end of the processing, both paths\nreach the essential\
    \ elements in the `SidRetrievalStrategy`,\n`ObjectIdentityRetrievalStrategy`,\n\
    and `AclService`.\nIn fact, the `AclPermissionEvaluator`\nand the `AclEntryVoter`\
    \ perform\nvery similar functions.\n\n![../images/310331_2_En_7_Chapter/310331_2_En_7_Fig17_HTML.jpg](images/310331_2_En_7_Chapter/310331_2_En_7_Fig17_HTML.jpg)\n\
    \nFigure 7-17\nA diagram showing the classes that participate in the postprocessing\n\
    phase of a method\ninterception with ACL-based security\n\nAgain, you can see\
    \ two branches. The branch on the left, where you\ncan see the `AclEntryAfterInvocationProvider`\n\
    and `AclEntryAfterInvocationCollectionFilteringProvider`,\nis the branch that\
    \ doesn’t support SpEL expressions and is active when\nusing `@Secured`\nand a\
    \ static name for a config attribute, something like `ACL_ALLOW_READ` or\nwhatever,\
    \ as you saw a couple of sections back. The right branch goes\nthrough the section\
    \ that supports SpEL and both `@PostFilter` and `@PostAuthorize`\nannotations.\
    \ You can see that these two branches map almost one-to-one\nto the branches in\
    \ the preprocessing phase. Also, you can see that there\nis a high level of reuse\
    \ in the system and that many classes are present\nin both the preprocessing and\
    \ postprocessing phases.\nWe covered two different ways to handle ACL security,\
    \ with the two\nbranches we talked about in the previous paragraph. The one that\
    \ uses\n`@Secured` is\nolder and doesn’t support SpEL expressions; the one using\
    \ `@PreFilter`, `@PreAuthorize`, `@PostAuthorize`, and\n`@PostFilter` has\nexisted\
    \ since version 3.0 of Spring Security. They are newer options\nthat support the\
    \ use of SpEL expressions, so you will probably favor\nthem over the other ones\
    \ in your day-to-day use.\n\nSecuring the View Layer with ACLs\n\nAnother option\
    \ you have for using ACLs to secure\napplications is to use the view-layer JSP\
    \ tags to filter out domain\nobjects for users who don’t have the proper permissions\
    \ to see them. We\ntalked a bit about these tags in the web security chapter,\
    \ but we\nintentionally left the ACL tags for more thorough treatment here. To\
    \ use\nthem in an example, let’s continue with the code from the previous\nsection,\
    \ but let’s make a couple of changes. First, in the `ForumServiceImpl`\nclass,\
    \ comment out the `@PostFilter`\nannotation in the `getPosts` method so\nthat\
    \ it doesn’t filter out anything anymore. Then change the `form.jsp` file to look\n\
    like Listing [7-24](#310331_2_En_7_Chapter.xhtml#PC25).\n\n```\n\nPosts\n\nNew\
    \ Post Content:\n\n${post.content}\n\nListing 7-24\nThe form.jsp with Taglib ACL\
    \ Security Applied for Filtering Domain Objects\n```\n\nThis listing shows how\
    \ simply you can secure domain objects on the\nview layer. In fact, it does a\
    \ very similar job (in view terms) to what\nyou get when you use the `@PostFilter`\n\
    annotation.\nThe `<accesscontrollist>`\ntag depends on the configured `org.springframework.security.access.PermissionEvaluator`\n\
    implementation that exists in the application context configuration. It\nwill\
    \ work only if there is only one bean of this type configured in the\napplication\
    \ context, because it will try to retrieve the bean by type.\nAs you might recall,\
    \ you have a configured `PermissionEvaluator`\nin your configuration of concrete\
    \ type `org.springframework.security.acls.AclPermissionEvaluator`.\nNow, if you\
    \ restart the application and again execute the steps\ndefined in Test Scenario\
    \ 7.1, you should have exactly the same behavior\nfrom a presentation layer point\
    \ of view as you had before when you first\nexecuted that scenario. The way it\
    \ works is simple. Every time the tag\nis evaluated (in each iteration over the\
    \ posts collection), the tag\nhandler calls the `PermissionEvaluator`’s\n`hasPermission`\n\
    method, which returns a Boolean indicating whether or not permission has\nbeen\
    \ granted. If permission is granted, the body of the tag is evaluated\nand rendered.\
    \ If permission is not granted, the body of the tag is\nskipped."
