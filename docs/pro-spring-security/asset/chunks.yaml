    You will be using Spring Data to set up and use MongoDB. It is not really required,
    but because you are working with Spring it seems like a good idea. According to
    the Spring Data for MongoDB website ([`https://spring.io/projects/spring-data-mongodb`](https://spring.io/projects/spring-data-mongodb)),
    it “aims to provide a familiar and consistent Spring-based programming model for
    new datastores while retaining store-specific features and capabilities.” So you
    have a Spring-based application and are using MongoDB, which is a good fit for
    it. The MongoDB dependency you need to add to the `pom.xml` file is


    ```

    org.springframework.boot

    spring-boot-starter-data-mongodb

    ```


    **Note** MongoDB can be used in embedded mode or as an external DB.


    In this example, you will use the external installation of MongoDB. You can download
    it from its official site at [`www.mongodb.com/download-center`](https://www.mongodb.com/download-center).


    After you download the `.zip` file, in our case `mongodb-src-r4.0.8.zip`, you
    can simply unpack the file somewhere and it is ready to run. To run the MongoDB
    server in Linux or Mac, just simply go to the `bin` directory of the directory
    you just unpacked and run the file `./mongod`. If you’re using Windows 10, just
    download the `.zip` file, unpack it, go to the installed folder, and run the command
    `mongod` to start it. Now MongoDB is started and up and running, as shown in Figure
    [8-7](#310331_2_En_8_Chapter.xhtml#Fig7).


    ![../images/310331_2_En_8_Chapter/310331_2_En_8_Fig7_HTML.jpg](images/310331_2_En_8_Chapter/310331_2_En_8_Fig7_HTML.jpg)


    **Figure 8-7** MongoDB started


    **Note** MongoDB is a very popular document-based database. It is part of many
    NoSQL solutions that have become so popular in the recent past. It is a very powerful
    and flexible tool. Its main power comes from the fact (at least from our perspective)
    that it combines a very scalable storage solution with a very intuitive document
    model built on top of known technologies (like JSON and JavaScript in the command-line
    interface). And it does this without forgetting about one of the best things of
    the SQL world, which is the flexibility given by the ability to execute dynamic
    queries, allowing you to query your database using very varied criteria and filtering
    options. This contrasts with, for example, key-value storage solutions that allow
    searching only by the key. As we said, MongoDB is a document store, where the
    documents are structured as JSON. MongoDB stores its documents in collections
    of documents called *collections*. We won’t explain MongoDB any further, except
    for what is needed to create and run the example. If you are interested in learning
    more about it, there is a lot of bibliography online that can help you out, starting
    with the project’s website and, in particular, this link to current books on the
    topic: [`https://docs.mongodb.com/?_ga=2.266750797.2128884934.1555058402-165371435.1555058402`](https://docs.mongodb.com/%253F_ga%253D2.266750797.2128884934.1555058402-165371435.1555058402).


    For this example, you also use the MongoDB Compass tool which is a very easy MongoDB
    tool that you can download from [`www.mongodb.com/download-center/compass?jmp=hero`](http://www.mongodb.com/download-center/compass%253Fjmp%253Dhero).
    The MongoDB Compass tool dashboard is shown in Figure [8-8](#310331_2_En_8_Chapter.xhtml#Fig8).


    ![../images/310331_2_En_8_Chapter/310331_2_En_8_Fig8_HTML.jpg](images/310331_2_En_8_Chapter/310331_2_En_8_Fig8_HTML.jpg)


    **Figure 8-8** MongoDB Compass tool


    Next, create the MongoDB database named `springsecuritymongodb` and two collections
    named `users` and `roles` needed for this example by completing the following
    steps:


    ![../images/310331_2_En_8_Chapter/310331_2_En_8_Fig9_HTML.jpg](images/310331_2_En_8_Chapter/310331_2_En_8_Fig9_HTML.jpg)


    **Figure 8-9** MongoDB looking at the newly created db, collections, users, and
    roles


    1.  Go to the directory where MongoDB was installed.

    2.  Go inside the `bin` folder.

    3.  Execute the `mongo` command.

    4.  Execute the commands shown in Figure [8-9](#310331_2_En_8_Chapter.xhtml#Fig9).


    Basically, you need two collections. The `roles` collection includes just two
    records to define if the registered user has an `ADMIN` or `USER` credential to
    access the example. You do this by first creating the `roles` collection and then
    adding two records:


    ```

    db.createCollection("roles")

    db.roles.insert({"role":"ADMIN","_class":"com.apress.SpringSecurityMongoDB.domain.Role"});

    db.roles.insert({"role":"USER","_class":"com.apress.SpringSecurityMongoDB.domain.Role"});

    ```


    Then you create another collection named `users` where a new user with credential
    `ADMIN` is added:


    ```

    db.createCollection("users")

    db.users.insert({"email":"admin@admin.com","password":"$2a$10$qNYHb8JtRrREzSFKEwXfA.230HTujndUR0qCTPsGP8.FqWetlSqmC","role":"ADMIN","roles":[{"$ref":"role","$id":"5cd04193dca5753dec0b07e9","$db":""}],"_class":"com.apress.SpringSecurityMongoDB.domain.User"});

    ```'
