    \ shown\nin Listing [6-28](#310331_2_En_6_Chapter.xhtml#PC33).\n\n```\npackage\
    \ com.apress.SpringSecurityX509Auth.Domain;\npublic class User {\nprivate String\
    \ name;\npublic User() {\nthis.name = name;\n}\npublic String getName() {\nreturn\
    \ name;\n}\npublic void setName(String name) {\nthis.name = name;\n}\n}\nListing\
    \ 6-28\nUser Java Class\n```\n\nThis class will fetch data from the X.509 client\
    \ certificate provided\nfor the authentication.\nThis is all the configuration\
    \ Spring needs to handle client\ncertificates.\nOf course, things  are not that\
    \ simple\nand the job is not yet done. In reality, Spring Security X.509 support\n\
