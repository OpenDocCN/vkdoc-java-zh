- fmt: '# Spring Security, Groovy, and Grails


    Groovy is one of the strongest contenders for the number one spot in the non-Java
    JVM language space. It has a great community and currently is supported and managed
    by the SpringSource people. Groovy is a programming language that tries to combine
    the power of Java with the elegance and developer-friendly characteristics of
    some dynamic programming languages—taking ideas mainly from well-known and much-loved
    languages such as Python and Ruby. Groovy successfully creates an environment
    where different kinds of programmers, with some practice, can feel at home (experienced
    Java developers and Ruby developers, for example).


    Groovy has many advantages when you compare it with other JVM languages—the main
    ones being, in our opinion, the easy transition from Java to Groovy and the interoperability
    between the two languages. With regard to the transition part, it is easy to take
    a Java program and make it a Groovy program. As a matter of fact, you don’t have
    to do anything. A Java program is already a valid Groovy program. This is good
    from one point of view but bad from another. Even when you can compile a Java
    program as a Groovy one, it doesn’t make sense. Ultimately, you are using Groovy
    to take advantage of the great features it has compared to Java. Those great features
    include a lot of metaprogramming techniques, new powerful constructs like closures,
    faster development cycles, and a clearer and more concise and developer-friendly
    syntax.


    Grails is a web framework written in Groovy and intended to be used with Groovy.
    It is built on top of the Spring Framework and is heavily influenced by Ruby on
    Rails. Grails is an attempt to make a friendlier and lighter framework in a JVM-based
    language that can be picked up quickly. Also, it offers better and more concise
    ways to develop applications. At the same time, it is built upon some of the strongest
    Java libraries and frameworks, such as Spring and Hibernate.


    Let’s install Groovy library for the example and specify the Groovy SDK. Download
    the standard Groovy SDK tool from the official distributions available at [`http://groovy-lang.org/download.html`](http://groovy-lang.org/download.html).
    Unpack it into any directory and specify this directory as the library home. In
    our case, it is `C:\apache-groovy-sdk-2.5.6`. Now you can create your new example.


    ## Using Grails to Secure the Web Layer with URL Rules


    Grails and Spring Security integration is incredibly simple because Spring Security
    is the default security solution for Grails applications and a comprehensive plugin
    exists to support it. Here, you’ll create a simple Grails application, and you’ll
    learn how to secure it with Spring Security. As usual, we’ll introduce this application
    in a step-by-step process.


    Download and install the latest version of Grails if you still don’t have it.
    You can download it from its homepage at [`http://grails.org/`](http://grails.org/).
    We are running this example with version 3.3.9 of Grails. To install it, simply
    unzip the downloaded the `grails-3.3.9.zip` file (in our case, it is `C:\grails-3.3.9`)
    and then set the environment variable `GRAILS_HOME` to point to the new expanded
    directory. Also, add to your `PATH` environment variable the path `GRAILS_HOME/bin`.


    At the command line, go to any directory where you want to create the application
    and execute `grails create-app demo-grails` to create the application. Next, generate
    a couple of controllers: a secured controller and an unsecured controller. Execute
    `grails create-controller secured` inside the generated application directory.
    And then execute `grails create-controller unsecured`.


    Now you need to create an action in each controller and make them look like Listings
    [9-22](#310331_2_En_9_Chapter.xhtml#PC25) and [9-23](#310331_2_En_9_Chapter.xhtml#PC26).
    Put these files in the directory `grails-app/controllers/demo/grails` of your
    application.


    Run the application now with `grails run-app` and visit either `http://localhost:8080/demo-grails/secured/message`
    or `http://localhost:8080/demo-grails/unsecured/message`, and you should be able
    to access both URLs without a problem. The next logical step is to secure the
    secured URL.


    As we said before, Grails is built on top of Spring, so it’s only logical that
    an integration with Spring Security should be straightforward. Grails is built
    in a clever modular way so that you can add functionality in the form of plugins.
    Let’s install the Spring Security plugin by executing `grails install-plugin spring-security-core`
    (which, in our current version, installs the version 1.2.7.3). Then execute the
    command `grails s2-quickstart demo.security User Role` to generate the needed
    models to support users and roles in the application.


    Next, you’ll create a couple of test users to try out security. Open the file
    `BootStrap.groovy` (in the `grails-app/conf` directory), and make it look like
    the code in Listing [9-24](#310331_2_En_9_Chapter.xhtml#PC27). Here you are creating
    two users: one with role `ROLE_ADMIN` and the other one with the role `ROLE_USER`.
    You can see that this code uses the classes generated in the previous step, `User`
    and `Role`.


    As with previous examples, you’ll secure certain URLs so that they are accessible
    only for users with a specific role. To do this in Grails, you need to add the
    code from Listing [9-25](#310331_2_En_9_Chapter.xhtml#PC28) to the end of the
    file `Config.groovy` (which resides in the directory `grails-app/conf`). The code
    is self-explanatory. It simply tells Grails to use an intercept URL map for security.
    This map defines URL paths with wildcards (in `Ant`-style syntax, which we covered
    before for standard Java rules) and the roles that are allowed to access such
    URLs.


    Run the application by executing the command `grails run-app` in the root directory.
    Now, if you try to access `http://localhost:8080/demo-grails/unsecured/message`
    or `http://localhost:8080/demo-grails/secured/message`, you’ll get redirected
    to a login page. If you log in with the username **luna** and the password **password**,
    you’ll be granted access to the secured URL and not the unsecured one. However,
    if you log in with the username **neve** and the password **password**, you’ll
    be granted access to `http://localhost:8080/demo-grails/unsecured/message` but
    you’ll get an “access denied” error when trying to access `http://localhost:8080/demo-grails/secured/message`.
    You can see that you have properly secured access to the URLs.'
