- fmt: "# 排版后的文本\n\nThen, in the element `<security:global-method-security>`, add\
    \ as a child the element `<security:expression-handler ref=\"customExpressionHandler\"\
    \ />` to make a reference to the new expression handler you just defined.\n\n\
    Restart the application now. After the application is restarted, if you visit\
    \ `http://localhost:8080/forum/` and create a post, you will see that the post\
    \ won’t be shown on the page. This is because you created the post as an `ANONYMOUS`\
    \ user. Remember that posts now will show only for `ROLE_USER` users. If you log\
    \ in to the application with the username `leo` and the password `nardone01` and\
    \ again go to `http://localhost:8080/forum/`, you will see the post on the page\
    \ and the delete button. The following paragraphs explain how it all works under\
    \ the hood.\n\nAs you might recall from previous chapters, the core of Spring\
    \ Security is the concept of the `SecurityInterceptor` and its two personifications:\
    \ `FilterSecurityInterceptor` and `MethodSecurityInterceptor`. As you probably\
    \ recall as well, the interceptors work in a preprocess, process, postprocess\
    \ flow. The actual business logic happens in the process phase, and both the preprocess\
    \ and postprocess phases are used for the framework itself to apply all the security\
    \ concerns, regarding authorization and access control, that are needed to secure\
    \ the application.\n\nThe preprocess phase is taken care of mainly by the access\
    \ decision managers and the access decision voters that decide whether or not\
    \ access should be allowed to a particular resource (be it a method, a domain\
    \ object, or a URL). The postprocess phase is handled by an `AfterInvocationManager`\
    \ that is called from the `SecurityInterceptor`. By default, an instance of `AfterInvocationProviderManager`\
    \ is called.\n\nWe explained this process before: the `AfterInvocationProviderManager`\
    \ iterates through a list of `AfterInvocationProvider`, which makes the final\
    \ decision of whether or not access to a particular domain object instance is\
    \ allowed. The important part in this current example is that the chain of calls\
    \ ends in an instance of `ExpressionBasedPostInvocationAdvice` (through the `PostInvocationAdviceProvider`),\
    \ which checks to see if there is a `postFilter` expression that needs to be handled.\
    \ If there is, it calls the `DefaultMethodSecurityExpressionHandler` that you\
    \ defined in Listing [7-22](#310331_2_En_7_Chapter.xhtml#PC23). This handler checks\
    \ that the returned value from the business method with the `@PostFilter` annotation\
    \ was indeed a collection or an array (and throws an exception if it wasn’t).\
    \ Then it iterates through this collection, evaluating the SpEL expression on\
    \ each object and discarding the object to which the evaluation of the expression\
    \ gives the value `false`. The expression you are using is an ACL expression and,\
    \ like most of the other expressions, its backing method is defined in the class\
    \ `SecurityExpressionRoot`. This method (`hasPermission`) uses the permission\
    \ evaluator defined in Listing [7-22](#310331_2_En_7_Chapter.xhtml#PC23) to decide\
    \ if the authentication has the required permissions on the object being passed.\
    \ This evaluator uses the same suites of classes and helpers that the `AclEntryVoter`\
    \ uses to decide whether or not to grant access, such as the `AclService` and\
    \ the method `isGranted` in the ACL interface.\n\nSo you know what happened in\
    \ the example. When you tried to access the list with the anonymous user, the\
    \ only existing post was discarded from the return elements because the user didn’t\
    \ match the permissions required to read the object. (ACL’s `isGranted` method\
    \ returned `false`.) When you logged in as `leo/nardone01`, you acquired the role\
    \ `ROLE_USER`. This role is indeed allowed to read post objects, as specified\
    \ by the ACL rules you created when you first created the post.\n\nLet’s see how\
    \ filtering works in an example with more than one post. This time, you’ll create\
    \ a post with a user with the role `ROLE_ADMIN`. You’ll modify the post creation\
    \ code so that when an Admin user creates a post, only other `ROLE_ADMIN` users\
    \ can read that post. To do that, change the `createPost` method in the `ForumServiceImpl`\
    \ class to look like Listing [7-23](#310331_2_En_7_Chapter.xhtml#PC24). This listing\
    \ (like many others in the book) takes an approach of preferring convenience over\
    \ particularly good design. For example, you might argue, and rightly, that the\
    \ ACL mutation is not part of the core `createPost` method business functionality,\
    \ and also that hardcoding role names in the code is not right. Again, we’re doing\
    \ this to illustrate concepts in a convenient way, without too much abstraction\
    \ and directly to the point that we’re trying to show. In a real environment,\
    \ you should try to achieve a good separation of concerns, giving the security\
    \ concerns their own space (whether using AOP or other methods) and leaving the\
    \ business method to handle, well, business concerns.\n\n```\n@Transactional\n\
    public void createPost(Post post) {\n    Integer id = new Integer(Math.abs(post.hashCode()));\n\
    \    ObjectIdentity oid = new ObjectIdentityImpl(Post.class, id);\n    MutableAcl\
    \ acl = mutableAclService.createAcl(oid);\n    User user = (User)SecurityContextHolder.getContext().getAuthentication().getPrincipal();\n\
    \    acl.insertAce(0, BasePermission.ADMINISTRATION, new PrincipalSid(\n     \
    \   user.getUsername()), true);\n    acl.insertAce(1, BasePermission.DELETE, new\
    \ GrantedAuthoritySid(\n        \"ROLE_ADMIN\"), true);\n    if(isAdminUserLogged()){\n\
    \        acl.insertAce(2, BasePermission.READ, new GrantedAuthoritySid(\n    \
    \        \"ROLE_ADMIN\"), true);\n    }else{\n        acl.insertAce(2, BasePermission.READ,\
    \ new GrantedAuthoritySid(\n            \"ROLE_USER\"), true);\n    }\n    mutableAclService.updateAcl(acl);\n\
    \    post.setId(id);\n    postStore.put(id, post);\n}\n\nprivate boolean isAdminUserLogged()\
    \ {\n    for(GrantedAuthority authority: SecurityContextHolder.getContext().getAuthentication().getAuthorities()){\n\
    \        if(authority.getAuthority().equals(\"ROLE_ADMIN\")){\n            return\
    \ true;\n        }\n    }\n    return false;\n}\n```\n\nListing 7-23: The `createPost`\
    \ Method That Creates Different ACLs Depending on the User Creating the Post,\
    \ Along with a Needed Helper Method to Check Whether the Logged-In User Has the\
    \ `ROLE_ADMIN` Role\n\nHere you added a conditional saying, basically, that if\
    \ the logged-in user is an Administrator, the `READ` permission will be available\
    \ only to other Administrators (users with the role `ROLE_ADMIN`). If the logged-in\
    \ user is not an Administrator, the `READ` permission will be available to any\
    \ user with the `ROLE_USER` role.\n\nLet’s see an execution of this new configuration\
    \ step by step.\n\n## Test Scenario 7-7\n\nTo execute this new configuration,\
    \ follow these steps:\n\n1.  Restart the application, visit `http://localhost:8080/forum/admin`,\
    \ and log in with the username `leo` and the password `nardone01`.\n\n2.  Visit\
    \ `http://localhost:8080/forum/posts` and create a new post with the content `p1`.\
    \ This creates the screen you see in Figure [7-12](#310331_2_En_7_Chapter.xhtml#Fig12).\n\
    \n    ![../images/310331_2_En_7_Chapter/310331_2_En_7_Fig12_HTML.jpg](images/310331_2_En_7_Chapter/310331_2_En_7_Fig12_HTML.jpg)\n\
    \n    Figure 7-12: The screen that is generated after a user with the role `ROLE_USER`\
    \ creates a post\n\n3.  Visit `http://localhost:8080/logout` to log out of the\
    \ application. Then visit `http://localhost:8080/login` and log in with the username\
    \ `luna` and password `nardone01`.\n\n4.  Visit `http://localhost:8080/forum/posts`\
    \ and create a post with the content `p2`. See Figure [7-13](#310331_2_En_7_Chapter.xhtml#Fig13).\n\
    \n    ![../images/310331_2_En_7_Chapter/310331_2_En_7_Fig13_HTML.jpg](images/310331_2_En_7_Chapter/310331_2_En_7_Fig13_HTML.jpg)\n\
    \n    Figure 7-13: The screen that is generated after an admin user creates a\
    \ post"
