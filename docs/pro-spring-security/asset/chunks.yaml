    The next step is to create a Java class named `CustomizeAuthenticationSuccessHandler`,
    which will be used to handle the custom login success page; see Listing [8-8](#310331_2_En_8_Chapter.xhtml#PC15).


    ```

    package com.apress.SpringSecurityMongoDB.configuration;

    import org.springframework.security.core.Authentication;

    import org.springframework.security.core.GrantedAuthority;

    import org.springframework.security.web.authentication.AuthenticationSuccessHandler;

    import org.springframework.stereotype.Component;

    import javax.servlet.ServletException;

    import javax.servlet.http.HttpServletRequest;

    import javax.servlet.http.HttpServletResponse;

    import java.io.IOException;

    @Component

    public class CustomizeAuthenticationSuccessHandler implements AuthenticationSuccessHandler
    {

    @Override

    public void onAuthenticationSuccess(HttpServletRequest request,

    HttpServletResponse response, Authentication authentication)

    throws IOException, ServletException {

    response.setStatus(HttpServletResponse.SC_OK);

    for (GrantedAuthority auth : authentication.getAuthorities()) {

    if ("ADMIN".equals(auth.getAuthority())) {

    response.sendRedirect("/admin");

    }

    if ("USER".equals(auth.getAuthority())) {

    response.sendRedirect("/user");

    }

    }

    }

    }

    ```


    **Listing 8-8** `CustomizeAuthenticationSuccessHandler` Java Class


    This Java class simply checks if the `authentication.getAuthorities` of the user
    trying to login is equal to `ADMIN` and if so will redirect to the `/admin` page,
    or if it’s `USER` and thus should redirect to the `/user` web page. It was configured
    in the `SpringSecurityConfiguration` Java class via the configuration `.authenticated().and().formLogin().successHandler(customizeAuthenticationSuccessHandler)`.


    Now create the simple `login.html` page shown in Listing [8-9](#310331_2_En_8_Chapter.xhtml#PC16).


