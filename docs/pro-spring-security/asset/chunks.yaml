- fmt: 'This file is very simple, and its only job is to import another file (the
    `example-webflow.xml` file), which will contain the entire Spring Web Flow configuration.
    This configuration will remain in a different file just to keep it separated from
    the main servlet file.


    ```

    Listing 9-9

    The spring-security.xml File

    ```


    This is another file you should be able to understand easily by now. Listing [9-9](#310331_2_En_9_Chapter.xhtml#PC10)
    shows a very basic Spring Security configuration. You are defining just a single
    user with role `ROLE_USER`, which will be enough for your tests. You are not defining
    any URL security rules here because that is not what you want to do in this Spring
    Web Flow example. You want to add security at the flow level (its states), and
    that is what we will show you how to do.


    Now you need to define the web-flow configuration of the application as well as
    the actual web flows themselves. Again, this will be a simplistic example just
    to show how the functionality works. The example will be based on Figure [9-6](#310331_2_En_9_Chapter.xhtml#Fig6).
    Listing [9-10](#310331_2_En_9_Chapter.xhtml#PC11) shows the web-flow configuration
    file, and Listing [9-11](#310331_2_En_9_Chapter.xhtml#PC12) shows your only flow
    definition.


    ```

    Listing 9-10

    The example-webflow.xml in the WEB-INF Folder

    ```


    This file defines the general configuration for Spring Web Flow. The main part
    of the file is the element `flow-registry` and its attribute `flow-builder-services`.
    This element is where the location of the flows in the application are defined.
    Currently, you’ll define only one flow, which will be in the `product.xml` file.
    Also, note the way your views will get resolved when referenced in a view state
    in a flow. The class `org.springframework.webflow.mvc.builder.MvcViewFactoryCreator`
    is the one that will resolve view locations. By default, it will resolve view
    files by looking in the flow definition directory for files whose names are the
    names of the view states concatenated with `.jsp` at the end. This simply means
    that if a view is named *review*, it will look for a file named *review.jsp*.


    ```

    Listing 9-11

    The product.xml Simple Flow in the /WEB-INF/flows/ Folder

    ```


    This is the actual flow definition. You are simply defining three view states
    here. As we said before, each of these view states will map to a physical view
    file in the application. The view files, by default behavior, should be located
    in the same directory as this flow file and should be named according to the view
    states concatenated with `.jsp` at the end. So you should have in the `WEB-INF/flows/products`
    directory files named `activation.jsp`, `success.jsp`, and `failure.jsp`. They
    are shown in Listings [9-12](#310331_2_En_9_Chapter.xhtml#PC13), [9-13](#310331_2_En_9_Chapter.xhtml#PC14),
    and [9-14](#310331_2_En_9_Chapter.xhtml#PC15), respectively.


    ```

    Spring WebFlow Activation Failed!


    Listing 9-14

    The failure.jsp for the Buy View State of the Flow

    ```


    ```

    Spring WebFlow Activation Successful!


    Listing 9-13

    The success.jsp for the Review State

    ```


    ```

    Hello Spring WebFlow!

    Activate Spring WebFlow:


    Listing 9-12

    The activation.jsp for the Main View State

    ```


    In the previous three `.jsp` files, you defined the three view states in your
    web flow. Listings [9-12](#310331_2_En_9_Chapter.xhtml#PC13) and [9-13](#310331_2_En_9_Chapter.xhtml#PC14)
    have transition triggers in the form of the `eventId` parameter in the `href`
    links. `${flowExecutionUrl}` makes reference to the current executing state of
    the flow. So, in the case of the main state the first time you access the page,
    the value of `${ flowExecutionUrl }` is `/product?execution=e1s1`, making the
    full URL to the next flow states something like `/product?execution=e1s1}&_eventId=review`.
    If you visit `http://localhost:8080/product`, you’ll be taken to the main view
    state. That view displays `activate.jsp`, where you will have one button to activate
    and one to cancel the activation, as Figure [9-7](#310331_2_En_9_Chapter.xhtml#Fig7)
    shows. The moment you click the activate button you activate the Spring Web Flow
    process and the `success.jsp` opens. Let’s use Spring Security to do just that.
    Spring Security and Spring Web Flow integrate nicely because both are part of
    the Spring portfolio.


    Securing flows with Spring Security is easy. First, you need to add to the current
    `<webflow:flow-executor>` element from the file `example-webflow.xml` (the element
    in Listing [9-15](#310331_2_En_9_Chapter.xhtml#PC16)) and add the content shown
    in Listing [9-16](#310331_2_En_9_Chapter.xhtml#PC17) somewhere in the same file.


    ![../images/310331_2_En_9_Chapter/310331_2_En_9_Fig7_HTML.jpg](images/310331_2_En_9_Chapter/310331_2_En_9_Fig7_HTML.jpg)


    Figure 9-7

    The activation.jsp, which is the entry point into the web flow


    ```

    Listing 9-16

    The Spring Security Listener Bean

    ```


    ```

    Listing 9-15

    The flow-executor with Spring Security Listener

    ```


    By implementing the preceding content, you integrate Spring Security into Spring
    Web Flow. All you need to do now is decide which parts of the flow to secure and
    what constraints to define to secure them. But before that, we’ll explain briefly
    what this `SecurityFlowExecutionListener` is doing for Spring Web Flow. Spring
    Web Flow offers an abstraction in the form of the interface `org.springframework.webflow.execution.FlowExecutionListener`,
    which allows you to implement classes to listen to or observe the life cycle of
    a flow execution. When a listener implementation is registered for the flows,
    it can intercept the flow execution at different points in its life cycle. In
    that sense, it is similar to the AOP concepts you studied before. `org.springframework.webflow.security.SecurityFlowExecutionListener`
    is a listener implementation that intercepts three particular points in the life
    cycle of the flow: `sessionCreating`, `stateEntering`, and `transitionExecuting`.
    In each of these interceptions, the listener delegates to a configured `org.springframework.security.access.AccessDecisionManager`
    like the ones we explained in different parts of this book. If an `AccessDecisionManager`
    implementation is not provided when the bean is defined, a new role-based access
    decision manager will be created on the fly.


    So now you want to secure the view-state `"activation"` and allow access to it
    only to authenticated users with role `ROLE_USER`. To do that, you simply define
    the element `<secured attributes="ROLE_USER" />` as a child of the `"activation"`
    `<view-state>` element. After you do that, if you restart the application and
    try to access the `"buy"` state, you’ll find yourself presented with the familiar
    Spring Security login screen. If you log in with the username **admin** and the
    password **admin123**, you’ll be able to reach the `"buy"` state. The resulting
    `"buy"` state view is shown in Figure [9-8](#310331_2_En_9_Chapter.xhtml#Fig8).


    ![../images/310331_2_En_9_Chapter/310331_2_En_9_Fig8_HTML.jpg](images/310331_2_En_9_Chapter/310331_2_En_9_Fig8_HTML.jpg)


    Figure 9-8

    Spring Web Flow Activation page'
