- fmt: '# Spring Framework 5: A Quick Overview


    We have mentioned the Spring Framework project quite a lot. It makes sense to
    give an overview of it at this point, because many of the Spring Security characteristics
    we will cover in the rest of the book rely on the building blocks of Spring.


    We admit we’re biased. We love Spring and have loved it for many years now. We
    think Spring has so many advantages and so many great things that we can’t start
    a new Java project without using it. Additionally, we tend to carry its concepts
    around when working with other languages and look for a way to apply them because
    they now feel so natural.


    The Spring Framework 5 overview is shown in Figure [2-1](#310331_2_En_2_Chapter.xhtml#Fig1).


    ![../images/310331_2_En_2_Chapter/310331_2_En_2_Fig1_HTML.jpg](images/310331_2_En_2_Chapter/310331_2_En_2_Fig1_HTML.jpg)


    Figure 2-1


    Spring Framework 5


    Spring Framework 5 was published in September of 2017 and it can be considered
    the first major Spring Framework release since version 4 was released in December
    of 2013.


    Here is listed of the most important new things in Spring Framework 5:


    * JDK baseline update, an upgrade to Java JDK 11

    * A reactive programming model. The Spring 5 framework is built on a reactive
    foundation and is fully asynchronous and nonblocking.

    * Programming with annotations. Spring 5 is now an annotation-based programming
    model.

    * New functional programming approach (including Kotlin)

    * Reactive-style programming with REST endpoints

    * HTTP/2 support

    * Kotlin and Spring WebFlux support

    * Lambdas support for bean registration

    * Spring WebMVC support for latest APIs

    * Testing improvements, such as conditional and concurrent testing with JUnit
    5

    * Integration testing with Spring WebFlux

    * Core framework revision

    * General updates to the Spring core and container

    * Package cleansing and deprecation support


    There are many things that attract us to Spring, but the main ones are the two
    major building blocks of the framework: dependency injection and aspect-oriented
    programming.


    Why are these two concepts so important? They are important because they allow
    you to develop loosely coupled, single-responsibility, DRY (Don’t Repeat Yourself)
    code practically by default. These two concepts, and Spring itself, are covered
    extensively in other books and online tutorials; however, we’ll give you a brief
    overview here.


    ## Dependency Injection


    The basic idea of DI, a type of Inversion of Control (IoC), is simply that instead
    of having an object instantiate its needed dependencies, the dependencies are
    somehow given to the object. In a polymorphic way, the objects that are given
    as dependencies to the target object that depends on them are known to this target
    object just by an abstraction (like an interface in Java) and not by the exact
    implementation of the dependency.


    The major advantages of the IoC architecture are:


    * Easier switching between different implementations

    * Offering a good modularity of a program

    * A great feature for testing programs by isolating components dependencies and
    allowing them to communicate through contracts

    * Dividing the execution of a certain task from its implementation


    It’s easier to look at this in code than explain it. See Listing [2-1](#310331_2_En_2_Chapter.xhtml#PC1).


    ```

    public class NonDiObject {

    private Helper helper ;

    public NonDiObject ( ) {

    helper = new HelperImpl ( ) ;

    }

    public void doStuffWithHelp( ) {

    helper.help( ) ;

    }

    }

    Listing 2-1

    The Object Itself Instantiates Its Dependencies (No Dependency Injection)

    ```


    In this example, every instance of `NonDiObject` is responsible for instantiating
    its own `Helper` in the constructor. You can see that it instantiates a `HelperImpl`,
    creating a tight, unnecessary coupling to this particular `Helper` implementation.
    Now look at Listing [2-2](#310331_2_En_2_Chapter.xhtml#PC2).


    ```

    public class DiObject {

    private Helper helper ;

    public DiObject(Helper helper) {

    this.helper = helper;

    }

    public void doStuffWithHelp( ) {

    helper.help( ) ;

    }

    }

    Listing 2-2

    The Object Receives Its Dependencies from Some External Source (with Dependency
    Injection)

    ```


    In this version, the `Helper` is passed to the `DiObject` at construction time.
    `DiObject` is not required to instantiate any dependency. It doesn’t even need
    to know how to do that or what particular implementation type the `Helper` is,
    or where it comes from. It just needs a helper and uses it for whatever requirement
    it has.


    The advantage of this approach should be clear. The second version is loosely
    coupled to the `Helper`, depending only on the `Helper` interface, allowing the
    concrete implementation to be decided at runtime and thus giving lots of flexibility
    to the design.


    Spring dependency injection configuration is normally defined in XML files, although
    later versions have turned more to annotation-based configuration and Java-based
    configuration.'
