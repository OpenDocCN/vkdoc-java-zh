  raw: '#### ConfigAttribute


    The interface `org.springframework.security.access.ConfigAttribute` encapsulates
    the access information metadata present in a secured resource. For example, for
    your study purposes, `ROLE_ADMIN` is a `ConfigAttribute`. There are a few implementations
    of `ConfigAttribute`, as you can see in Figure [4-13](#310331_2_En_4_Chapter.xhtml#Fig13).


    ![../images/310331_2_En_4_Chapter/310331_2_En_4_Fig13_HTML.jpg](images/310331_2_En_4_Chapter/310331_2_En_4_Fig13_HTML.jpg)


    Figure 4-13


    `ConfiAttribute` hierarchy


    When you annotate a method with `@Secured("ROLE_ADMIN")` or something similar,
    or specify a URL with `<security:intercept-url pattern="/hello" access="ROLE_SIMPSON_MEMBER"
    />`, Spring Security does the following. On startup, as normal Spring functionality,
    all the bean postprocessors in the `ApplicationContext` get invoked. And in the
    case of Spring Security, the process is the following.


    What happens in the case of web requests is not really that complex. Web requests
    don’t really use the postprocessor infrastructure.


    When you use the element `<security:intercept-url pattern="/x" access="ROLE_XX"
    />`, Spring Security uses the class `FilterInvocationSecurityMetadataSourceParser`
    to parse this XML. In the parsing process, the private method `parseInterceptUrlsForFilterInvocationRequestMap`
    will be invoked. This method maps the information contained in each of the URL
    patterns in the XML element into a map of Ant-style request paths, like `/*, ROLE_USER`.
    Here `/*` is an Ant pattern and `ROLE_USER` is a config attribute (this says that
    basically this config attribute is needed to access any URL with this pattern).
    This map, ultimately, will be set up in an instance of an implementation of the
    interface `org.springframework.security.web.access.intercept.FilterInvocationSecurityMetadataSource`
    inside the `FilterSecurityInterceptor`, which uses it when each request comes
    to match the requested URL against the keys in the map to find out if the URL
    is secured and then extracts the `ConfigAttributes` against which to check the
    authorities of the requesting `Authentication` object. This setup process is shown
    in Figure [4-14](#310331_2_En_4_Chapter.xhtml#Fig14).


    ![../images/310331_2_En_4_Chapter/310331_2_En_4_Fig14_HTML.jpg](images/310331_2_En_4_Chapter/310331_2_En_4_Fig14_HTML.jpg)


    Figure 4-14


    `ConfigAttribute` setup for web applications


    For method-level security, you have many options—the most common one being the
    configurations performed through the use of annotations. There are a few different
    annotations available in the framework; however, the setup treatment by the framework
    is very similar. In the case of the `@Secured` annotation, for instance, you need
    to make Spring aware that this special annotation needs a special security treatment.
    To do that, you register the following in the security application context XML
    file:


    ```


    When you set up that definition in the application context XML

    configuration, Spring Security creates a new `MethodSecurityMetadataSourceAdvisor`  and
    registers it in

    the application context. This `advisor is marked as an infrastructure advisor
    and` is picked up by Spring Core’s `InfrastructureAdvisorAutoProxyCreator`,

    which is a `BeanPostProcessor`

    that Spring initializes automatically. It processes all the beans in the

    application context and determines if any of the configured advisors can

    be applied to any of the beans and their methods. If so, it wraps the

    bean with the required advisor or advisors. The postprocessor finds the

    `MethodSecurityMetadataSourceAdvisor`

    and eventually calls an implementation of the `MethodSecurityMetadataSource`.`getAttributes`
    method

    for each bean and all its methods, to determine if they have any `ConfigAttribute`

    configured as metadata in them. If the `MethodSecurityMetadataSource`

    finds `ConfigAttributes` in

    the bean, the `InfrastructureAdvisorAutoProxyCreator`,

    from Spring Core, calls its own method (`createProxy`) to apply

    `MethodSecurityMetadataSourceAdvisor`,

    which internally contains the Security Interceptor as the `org.aopalliance.aop.Advice`

    to apply to the bean. Figure [4-15](#310331_2_En_4_Chapter.xhtml#Fig15) shows
    this

    interaction graphically.


    ![../images/310331_2_En_4_Chapter/310331_2_En_4_Fig15_HTML.jpg](images/310331_2_En_4_Chapter/310331_2_En_4_Fig15_HTML.jpg)


    Figure 4-15

    Decorating annotated beans with security advice


    At first sight, this looks like simple magic,

    but it takes a lot of hard work from Spring to do it. And you have to

    thank the Spring and Spring Security developers for taking care of all

    this and giving you a simple and powerful API for resolving your

    security concerns.


    The Authentication

    Object


    The `Authentication` object

    is an abstraction that represents the entity that logs in to the

    system—most likely, a user. Because it is normally a user

    authenticating, we’ll assume so and use the term “user” in the rest of

    the book. There are a few implementations of the `Authentication` object

    in the framework, as you can see in Figure [4-16](#310331_2_En_4_Chapter.xhtml#Fig16).


    ![../images/310331_2_En_4_Chapter/310331_2_En_4_Fig16_HTML.png](images/310331_2_En_4_Chapter/310331_2_En_4_Fig16_HTML.png)


    Figure 4-16

    Authentication hierarchy


    An `Authentication` object

    is used both when an authentication request is created (when a user logs

    in), to carry around the different layers and classes of the framework

    the requesting data, and then when it is validated, containing the

    authenticated entity and storing it in `SecurityContext`.

    The most common behavior is that when you log in to the application,

    a new `Authentication` object

    will be created, storing your user name, password, and permissions,

    which are technically known as `Principal`, `Credentials,` and

    `Authorities`,

    respectively.

    `Authentication` is an

    interface, and it is pretty simple, as Listing [4-3](#310331_2_En_4_Chapter.xhtml#PC5)
    shows.


    Note

    There are many implementations of the `Authentication`

    interface, and in this book we will refer most of the time to the

    general `Authentication`

    interface when we are not interested in the particular implementation

    type. Of course, when we need to talk about the specifics of an

    implementation detail, we will refer to the concrete classes.


    ```

    package org.springframework.security.core;

    import java.io.Serializable;

    import java.security.Principal;

    import java.util.Collection;

    import org.springframework.security.authentication.AuthenticationManager;

    import org.springframework.security.core.context.SecurityContextHolder;

    public interface Authentication extends Principal, Serializable {

    Collection getAuthorities();

    Object getCredentials();

    Object getDetails();

    Object getPrincipal();

    Boolean isAuthenticated();

    Void setAuthenticated(boolean isAuthenticated) throws IllegalArgumentException;

    }

    Listing 4-3

    The Authentication Interface

    ```'
