    下一步是让 Rails 应用程序能够在标准 Java Web 服务器（如 Tomcat）上运行。为此，你需要使用 *warbler* 这个 gem。Warbler
    是一个 JRuby 专属的 gem，用于将不同类型的 Ruby 应用程序转换为标准的 Java 打包工件，例如 `JAR` 和 `WAR` 文件。在你的场景中，显然需要创建一个
    `WAR` 文件。Warbler 内部使用 `jruby-rack` 这个 gem，并将其打包到基于 `WAR` 的应用程序中。这个 gem 是 Ruby
    Rack 基础应用（如 Rails 应用）与 Java Web Servlet 基础应用之间集成的核心，这正是你所需要的。


    `Jruby-rack` 充当了一个转换层。它首先通过一个 Servlet 监听器（`org.jruby.rack.rails.RailsServletContextListener`）初始化应用程序的
    Ruby 部分，然后在每次请求时，通过一个 Servlet 过滤器 `org.jruby.rack.RackFilter` 拦截对服务器的调用。当这个过滤器获取到
    `HttpServletRequest` 时，它会将这些基于 Java 的请求转换为 Rack 请求，并传递给 Rails 应用程序，因为 Rails 基于
    Rack 模型构建，能够理解这些请求。当然，关于 warbler 和 `jruby-rack` 还有更多细节，但目前这里的解释应该足以让你继续这个示例。在图
    9-11 中，你可以看到 `jruby-rack` 工作原理的图形化说明。


