    \ `UsernamePasswordAuthenticationFilter` that is configured in the application.\
    \ So when you log in, this strategy is invoked. When the strategy is invoked,\
    \ it retrieves the current session (which is normally the anonymous session) and\
    \ invalidates it. Then it immediately creates a new one. It also tries to migrate\
    \ certain attributes—normally, the ones used by Spring Security itself, but a\
    \ list can also be specified.\n\nTo summarize this strategy, when you log in,\
    \ it invalidates the current session, creates a new one, and copies certain attributes\
    \ from the old one to the new one.\n\nSince Spring Session 2.0, it contains the\
    \ Spring Session Core module and several other modules like Spring Session Data\
    \ MongoDB module, Spring Session Data Geode modules, etc.\n\nLet’s see how you\
    \ can configure it in your application.\n\n![../images/310331_2_En_5_Chapter/310331_2_En_5_Fig15_HTML.jpg](images/310331_2_En_5_Chapter/310331_2_En_5_Fig15_HTML.jpg)\n\
    \nFigure 5-15 Error related to concurrent sessions\n\n1.  Add the following line\
    \ to the `SecurityConfiguration` file:\n\n    ```\n    .sessionManagement().sessionCreationPolicy(SessionCreationPolicy.ALWAYS)\n\
    \    ```\n\n2.  Restart the application.\n\n3.  Open Chrome and go to `http://127.0.0.1:8080/favoritesmovies/movies`.\
    \ Log in with username **admin** and password **admin123**. You should be able\
    \ to access the page without a problem.\n\n4.  Open another browser, for instance\
    \ Firefox, and visit `http://127.0.0.1:8080/favoritesmovies/movies`. Log in with\
    \ username **admin** and password **admin123**. You should be able to access the\
    \ page without a problem.\n\n5.  Go to Chrome, and refresh the page. You will\
    \ get the following message: “This session has been expired (possibly due to multiple\
    \ concurrent logins being attempted as the same user).” This message explicitly\
    \ indicates the problem. Figure [5-15](#310331_2_En_5_Chapter.xhtml#Fig15) shows\
    \ this page.\n\nNow let’s allow two sessions at the same time by adding the following\
    \ line to the `SecurityConfiguration` file:\n\n```\n.sessionManagement().maximumSessions(2)\n\
    ```\n\nRestart the application and follow the same flow as before. This time,\
    \ you should have both sessions active at the same time.\n\n## Forcing the Request\
    \ to HTTPS\n\nBy default, the Spring Security–enabled application serves all content\
    \ through the normal HTTP channel. However, you can configure them so that they\
    \ automatically ensure a particular web request is delivered over the HTTPS channel.\n\
    \n**Note:** We’re assuming that, in general, you know the advantages of using\
    \ HTTPS over HTTP. However, here’s a brief reminder. HTTPS (or Hypertext Transfer\
    \ Protocol Secure) is a communication protocol that combines the standard HTTP\
    \ protocol with Secure Sockets Layer (SSL) or TLS for security purposes. HTTPS\
    \ achieves security in two forms. First, it allows a connecting client to authenticate\
    \ the web server that it is connecting to, ensuring that it is connecting to the\
    \ proper certified website. This is done with the use of server-side certificates.\
    \ The other security concern addressed by HTTPS is the encryption of the information\
    \ that is exchanged between client and server. HTTPS ensures that the information\
    \ cannot be read by a third party while it is being exchanged. You can find more\
    \ extensive information on this topic on Wikipedia (`http://en.wikipedia.org/wiki/HTTP_Secure`)\
    \ and many other places. Please check the official HTTPS/SSL Apache Tomcat web\
    \ page for information about how to configure HTTPS at `https://tomcat.apache.org/tomcat-9.0-doc/ssl-howto.html`.\n\
    \nWe will assume that you have configured HTTPS for your Apache Tomcat v9. Setting\
    \ up HTTPS is really straightforward; you simply add a new configuration element\
    \ to your Spring Security configuration file.\n\nSuppose you want to configure\
    \ HTTPS for your login page. Just add the following line to the `SecurityConfiguration`\
    \ file:\n\n```\nhttp.requiresChannel().antMatchers(\"/login*\").requiresSecure();\n\
    ```\n\nGo to `http://localhost:8080/favoritesmovies/movies`, as you have always\
    \ done in this chapter. This time, the application will automatically redirect\
    \ to the URL `https://localhost:8443/favoritesmovies/login`. (The browser will\
    \ probably show the typical “insecure certificate” warning, which you can see\
    \ in Figure [5-16](#310331_2_En_5_Chapter.xhtml#Fig16), but you can safely proceed\
    \ by clicking the “Proceed anyway” option, or a similar option in other browsers.)\n\
    \n![../images/310331_2_En_5_Chapter/310331_2_En_5_Fig16_HTML.jpg](images/310331_2_En_5_Chapter/310331_2_En_5_Fig16_HTML.jpg)\n\
    \nFigure 5-16 Application with HTTPS channel security and a self-signed certificate\n\
    \nThe channel functionality works in the following way. When the application starts\
    \ up, the namespace parsing mechanism notes the presence of the attribute `requires-channel`\
    \ in the `requiresChannel` elements. The class `HttpConfigurationBuilder` finds\
    \ this attribute and then creates a map of `RequestMatcher`, `ChannelAttributeFactory`.\
    \ `ChannelAttributeFactory` creates `ConfigAttribute` instances based on the value\
    \ of the `requires-channel` attribute. For example, if the required channel is\
    \ HTTPS, it creates an instance of an implementation of `ConfigAttribute` with\
    \ the value `REQUIRES_SECURE_CHANNEL` associated with the appropriate URL pattern.\
    \ After the parser finds the `antMatchers-url` with the `requires-channel` attribute\
    \ configured, it instantiates a new `ChannelProcessingFilter` bean configured\
    \ with a `ChannelDecisionManager` implementation for deciding which channel to\
    \ use for each request.\n\nWhen a request is made, it will, as normal, travel\
    \ through the filter chain. There is a filter in the filter chain called `ChannelProcessingFilter`,\
    \ as explained in the previous paragraph. This filter delegates to its configured\
    \ `ChannelDecisionManager` implementation the responsibility of deciding what\
    \ to do with the request. The decision manager, with the aid of certain helper\
    \ classes, decides if the request can proceed or if, on the contrary, the requested\
    \ channel is not admitted by the requested URL. In the latter case, it delegates\
    \ to a `ChannelProcessor` and a redirection strategy to send a redirect response\
    \ to the proper channel URL.\n\nBasically, in this example, this filter looks\
    \ at the URL `http://localhost:8080/favoritesmovies/login`, finds that this URL\
    \ matches the `antMatchers-url` pattern that has the `config` requirement `REQUIRES_SECURE_CHANNEL`,\
    \ and then calls the `RetryWithHttpsEntryPoint` that, in turn, invokes the `RedirectStrategy`\
    \ implementation’s `sendRedirect` method, which tries to redirect to `https://localhost:8443/favoritesmovies/login`.\n\
    \n## Summary\n\nIn this chapter, we covered one of the biggest concerns of the\
    \ framework: web support in Spring Security. You saw that the main functionality\
    \ comes in the form of servlet filters. This is a good thing from a standards\
    \ point of view, because it means you can leverage Spring Security web support\
    \ in other frameworks that use the standard Java servlet model.\n\nYou should\
    \ now know a lot of details about the main filters that build the framework, how\
    \ they work internally, and how they fit within each other and with the rest of\
    \ the framework. We explained all this in a practical way, trying to solve real-life\
    \ scenarios.\n\nIn the next chapter, we will cover the second major concern of\
    \ Spring Security—namely, method-level security. We will show how it compares\
    \ to web-level security, and you will see that you can leverage a lot of your\
    \ current knowledge to apply it to the method-level security layer.\n\n## 6. Configuring\
    \ Alternative Authentication Providers"
  raw: "`SessionFixationProtectionStrategy`\nis already configured by default in the\
    \ `UsernamePasswordAuthenticationFilter`\nthat is configured in the application.\
    \ So when you log in, this strategy\nis invoked. When the strategy is invoked,\
    \ it retrieves the current\nsession (which is normally the anonymous session)\
    \ and invalidates it.\nThen it immediately creates a new one. It also tries to\
    \ migrate certain\nattributes—normally, the ones used by Spring Security itself,\
    \ but a list\ncan also be specified.\nTo summarize this strategy, when you log\
    \ in, it invalidates the\ncurrent session, creates a new one, and copies certain\
    \ attributes from\nthe old one to the new one.\nSince Spring Session 2.0, it contains\
    \ the Spring Session Core module\nand several other modules like Spring Session\
    \ Data MongoDB module,\nSpring Session Data Geode modules, etc.\n\nLet’s see how\
    \ you can configure it in your application.\n\n![../images/310331_2_En_5_Chapter/310331_2_En_5_Fig15_HTML.jpg](images/310331_2_En_5_Chapter/310331_2_En_5_Fig15_HTML.jpg)\n\
    \nFigure 5-15\nError related to concurrent sessions\n\n1.  Add the following line\
    \ to the `SecurityConfiguration`\n    file:\n\n```\n    .sessionManagement().sessionCreationPolicy(SessionCreationPolicy.ALWAYS)\n\
    \    ```\n\n2.  Restart the application.\n\n3.  Open Chrome and go to `http://127.0.0.1:8080/favoritesmovies/movies`.\n\
    \    Log in with username **admin** and password\n    **admin123**. You should\
    \ be able to access the page without\n    a problem.\n\n4.  Open another browser,\
    \ for instance Firefox, and visit `http://127.0.0.1:8080/favoritesmovies/movies`.\n\
    \    Log in with username **admin** and password\n    **admin123**. You should\
    \ be able to access the page without\n    a problem.\n\n5.  Go to Chrome, and\
    \ refresh the page. You will get the following\n    message: “This session has\
    \ been expired (possibly due to multiple\n    concurrent logins being attempted\
    \ as the same user).” This message\n    explicitly indicates the problem. Figure\
    \ [5-15](#310331_2_En_5_Chapter.xhtml#Fig15) shows this\n    page.\n\nNow let’s\
    \ allow two sessions at the same time by adding the following\nline to the `SecurityConfiguration`\n\
    file:\n\n```\n.sessionManagement().maximumSessions(2)\n```\n\nRestart the application\
    \ and follow the same flow as before. This\ntime, you should have both sessions\
    \ active at the same time.\n\nForcing the Request to HTTPS\nBy default, the Spring\
    \ Security–enabled application serves all\ncontent through the normal HTTP channel.\
    \ However, you can configure them\nso that they automatically ensure a particular\
    \ web request is delivered\nover the HTTPS channel.\n\nNote\nWe’re assuming that,\
    \ in general, you know the advantages of using\nHTTPS over HTTP. However, here’s\
    \ a brief reminder. HTTPS (or Hypertext\nTransfer Protocol Secure) is a communication\
    \ protocol that combines the\nstandard HTTP protocol with Secure Sockets Layer\
    \ (SSL) or TLS for\nsecurity purposes. HTTPS achieves security in two forms. First,\
    \ it\nallows a connecting client to authenticate the web server that it is\nconnecting\
    \ to, ensuring that it is connecting to the proper certified\nwebsite. This is\
    \ done with the use of server-side certificates. The\nother security concern addressed\
    \ by HTTPS is the encryption of the\ninformation that is exchanged between client\
    \ and server. HTTPS ensures\nthat the information cannot be read by a third party\
    \ while it is being\nexchanged. You can find more extensive information on this\
    \ topic on\nWikipedia ([`http://en.wikipedia.org/wiki/HTTP_Secure`](http://en.wikipedia.org/wiki/HTTP_Secure))\n\
    and many other places. Please check the official HTTPS/SSL Apache Tomcat\nweb\
    \ page for information about how to configure HTTPS at [`https://tomcat.apache.org/tomcat-9.0-doc/ssl-howto.html`](https://tomcat.apache.org/tomcat-9.0-doc/ssl-howto.html).\n\
    \nWe will assume that you have configured HTTPS for your Apache Tomcat\nv9.\n\
    Setting up HTTPS is really straightforward; you simply add a new\nconfiguration\
    \ element to your Spring Security configuration file.\n\nSuppose you want to configure\
    \ HTTPS for your login page. Just add the\nfollowing line to the `SecurityConfiguration`\n\
    file:\n\n```\nhttp.requiresChannel().antMatchers(\"/login*\").requiresSecure();\n\
    ```\n\nGo to `http://localhost:8080/favoritesmovies/movies`,\nas you have always\
    \ done in this chapter. This time, the application will\nautomatically redirect\
    \ to the URL `https://localhost:8443/favoritesmovies/login`.\n(The browser will\
    \ probably show the typical “insecure certificate”\nwarning, which you can see\
    \ in Figure [5-16](#310331_2_En_5_Chapter.xhtml#Fig16), but you can\nsafely proceed\
    \ by clicking the “Proceed anyway” option, or a similar\noption in other browsers.)\n\
    \n![../images/310331_2_En_5_Chapter/310331_2_En_5_Fig16_HTML.jpg](images/310331_2_En_5_Chapter/310331_2_En_5_Fig16_HTML.jpg)\n\
    \nFigure 5-16\nApplication with HTTPS channel security and a self-signed\ncertificate\n\
    \nThe channel functionality works in the following way.  When the application\n\
    starts up, the namespace parsing mechanism notes the presence of the\nattribute\
    \ `requires-channel` in\nthe `requiresChannel`\nelements. The class `HttpConfigurationBuilder`\n\
    finds this attribute and then creates a map of `RequestMatcher`, `ChannelAttributeFactory`.\n\
    `ChannelAttributeFactory`\ncreates `ConfigAttribute`\ninstances based on the value\
    \ of the `requires-channel`\nattribute. For example, if the required channel is\
    \ HTTPS, it creates an\ninstance of an implementation of `ConfigAttribute` with\n\
    the value `REQUIRES_SECURE_CHANNEL`\nassociated with the appropriate URL pattern.\
    \ After the parser finds\n`the antMatchers-url` with the `requires-channel`\n\
    attribute configured, it instantiates a new `ChannelProcessingFilter`\nbean configured\
    \ with a `ChannelDecisionManager`\nimplementation for deciding which channel to\
    \ use for each request.\nWhen a request is made, it will, as normal, travel through\
    \ the filter\nchain. There is a filter in the filter chain called `ChannelProcessingFilter`,\n\
    as explained in the previous paragraph. This filter delegates to its\nconfigured\
    \ `ChannelDecisionManager`\nimplementation the responsibility of deciding what\
    \ to do with the\nrequest. The decision manager, with the aid of certain helper\
    \ classes,\ndecides if the request can proceed or if, on the contrary, the requested\n\
    channel is not admitted by the requested URL. In the latter case, it\ndelegates\
    \ to a `ChannelProcessor` and\na redirection strategy to send a redirect response\
    \ to the proper channel\nURL.\nBasically, in this example, this filter looks at\
    \ the URL `http://localhost:8080/favoritesmovies/login`,\nfinds that this URL\
    \ matches the `antMatchers-url`\npattern that has the `config` requirement\n`REQUIRES_SECURE_CHANNEL`,\n\
    and then calls the `RetryWithHttpsEntryPoint`\nthat, in turn, invokes the `RedirectStrategy`\n\
    implementation’s `sendRedirect` method,\nwhich tries to redirect to `https://localhost:8443/favoritesmovies/login.`\n\
    \nSummary\nIn this chapter, we covered one of the biggest concerns of the\nframework:\
    \ web support in Spring Security. You saw that the main\nfunctionality comes in\
    \ the form of servlet filters. This is a good thing\nfrom a standards point of\
    \ view, because it means you can leverage Spring\nSecurity web support in other\
    \ frameworks that use the standard Java\nservlet model.\nYou should now know a\
    \ lot of details about the main filters that\nbuild the framework, how they work\
    \ internally, and how they fit within\neach other and with the rest of the framework.\
    \ We explained all this in\na practical way, trying to solve real-life scenarios.\n\
    In the next chapter, we will cover the second major concern of Spring\nSecurity—namely,\
    \ method-level security. We will show how it compares to\nweb-level security,\
    \ and you will see that you can leverage a lot of your\ncurrent knowledge to apply\
    \ it to the method-level security layer.\n\n6. Configuring Alternative\nAuthentication\
    \ Providers"
  trans: "\n`SessionFixationProtectionStrategy`\n默认已在应用程序中配置的 `UsernamePasswordAuthenticationFilter`\
    \ 中启用。因此，当您登录时，该策略会被调用。策略被调用时，它会获取当前会话（通常是匿名会话）并将其失效，然后立即创建一个新会话。它还会尝试迁移某些属性——通常是\
    \ Spring Security 自身使用的属性，但也可以指定一个属性列表。\n总结一下这个策略：当您登录时，它会将当前会话失效，创建一个新会话，并将某些属性从旧会话复制到新会话中。\n\
    自 Spring Session 2.0 起，它包含了 Spring Session Core 模块以及其他几个模块，例如 Spring Session Data\
    \ MongoDB 模块、Spring Session Data Geode 模块等。\n\n让我们看看如何在应用程序中配置它。\n\n![../images/310331_2_En_5_Chapter/310331_2_En_5_Fig15_HTML.jpg](img/310331_2_En_5_Fig15_HTML.jpg)\n\
    \n图 5-15\n与并发会话相关的错误\n\n1.  将以下行添加到 `SecurityConfiguration`\n    文件中：\n\n```\n\
    \    .sessionManagement().sessionCreationPolicy(SessionCreationPolicy.ALWAYS)\n\
    \    ```\n\n2.  重新启动应用程序。\n\n3.  打开 Chrome 浏览器并访问 `http://127.0.0.1:8080/favoritesmovies/movies`。\n\
    \    使用用户名 **admin** 和密码\n    **admin123** 登录。您应该能够正常访问该页面。\n\n4.  打开另一个浏览器，例如\
    \ Firefox，并访问 `http://127.0.0.1:8080/favoritesmovies/movies`。\n    使用用户名 **admin**\
    \ 和密码\n    **admin123** 登录。您应该能够正常访问该页面。\n\n5.  转到 Chrome 浏览器并刷新页面。您将看到以下\n  \
    \  消息：“此会话已过期（可能由于同一用户尝试多次并发登录）。”此消息\n    明确指出了问题所在。图 5-15 显示了此\n    页面。\n\n现在，通过将以下行添加到\
    \ `SecurityConfiguration`\n文件中，允许同时存在两个会话：\n\n```\n.sessionManagement().maximumSessions(2)\n\
    ```\n\n重新启动应用程序并按照之前的相同流程操作。这次，您应该能够同时保持两个会话处于活动状态。\n\n强制请求使用 HTTPS\n默认情况下，启用\
    \ Spring Security 的应用程序通过普通的 HTTP 通道提供所有内容。但是，您可以对其进行配置，使其自动确保特定的 Web 请求通过 HTTPS\
    \ 通道传送。\n\n注意\n我们假设您通常了解使用 HTTPS 相对于 HTTP 的优势。不过，这里做一个简要的提醒。HTTPS（或超文本传输安全协议）是一种通信协议，它将标准的\
    \ HTTP 协议与安全套接字层（SSL）或 TLS 结合使用，以达到安全目的。HTTPS 通过两种形式实现安全性。首先，它允许连接的客户端对正在连接的 Web\
    \ 服务器进行身份验证，确保其连接到正确的认证网站。这是通过使用服务器端证书完成的。HTTPS 解决的另一个安全问题是对客户端和服务器之间交换的信息进行加密。HTTPS\
    \ 确保信息在交换过程中不会被第三方读取。您可以在维基百科（[`http://en.wikipedia.org/wiki/HTTP_Secure`](http://en.wikipedia.org/wiki/HTTP_Secure)）和许多其他地方找到关于此主题的更广泛信息。请查看官方的\
    \ HTTPS/SSL Apache Tomcat 网页，了解如何在 [`https://tomcat.apache.org/tomcat-9.0-doc/ssl-howto.html`](https://tomcat.apache.org/tomcat-9.0-doc/ssl-howto.html)\
    \ 配置 HTTPS。\n\n我们假设您已经为您的 Apache Tomcat v9 配置了 HTTPS。\n设置 HTTPS 非常简单；您只需向 Spring\
    \ Security 配置文件中添加一个新的配置元素即可。\n\n假设您想为登录页面配置 HTTPS。只需将以下行添加到 `SecurityConfiguration`\n\
    文件中：\n\n```\nhttp.requiresChannel().antMatchers(\"/login*\").requiresSecure();\n\
    ```\n\n访问 `http://localhost:8080/favoritesmovies/movies`，\n就像您在本章中一直做的那样。这次，应用程序将\n\
    自动重定向到 URL `https://localhost:8443/favoritesmovies/login`。\n（浏览器可能会显示典型的“不安全证书”\n\
    警告，您可以在图 5-16 中看到，但您可以通过单击“仍然继续”选项或类似选项安全地继续操作。）\n\n![../images/310331_2_En_5_Chapter/310331_2_En_5_Fig16_HTML.jpg](img/310331_2_En_5_Fig16_HTML.jpg)\n\
    \n图 5-16\n具有 HTTPS 通道安全性和自签名证书的应用程序\n\n通道功能的工作方式如下。当应用程序启动时，命名空间解析机制会注意到 `requiresChannel`\
    \ 元素中存在 `requires-channel` 属性。`HttpConfigurationBuilder` 类找到此属性，然后创建一个 `RequestMatcher`\
    \ 和 `ChannelAttributeFactory` 的映射。`ChannelAttributeFactory` 根据 `requires-channel`\
    \ 属性的值创建 `ConfigAttribute` 实例。例如，如果所需的通道是 HTTPS，它会创建一个 `ConfigAttribute` 实现的实例，其值为\
    \ `REQUIRES_SECURE_CHANNEL`，并与相应的 URL 模式关联。解析器找到配置了 `requires-channel` 属性的 `antMatchers-url`\
    \ 后，它会实例化一个新的 `ChannelProcessingFilter` bean，该 bean 配置了一个 `ChannelDecisionManager`\
    \ 实现，用于决定每个请求使用哪个通道。\n当发出请求时，它会像往常一样经过过滤器链。过滤器链中有一个名为 `ChannelProcessingFilter`\
    \ 的过滤器，如前所述。此过滤器将决定如何处理请求的责任委托给其配置的 `ChannelDecisionManager` 实现。决策管理器在某些辅助类的帮助下，决定请求是否可以继续，或者相反，请求的通道是否不被请求的\
    \ URL 所允许。在后一种情况下，它会委托给一个 `ChannelProcessor` 和一个重定向策略，以向正确的通道 URL 发送重定向响应。\n基本上，在此示例中，此过滤器查看\
    \ URL `http://localhost:8080/favoritesmovies/login`，发现此 URL 与具有配置要求 `REQUIRES_SECURE_CHANNEL`\
    \ 的 `antMatchers-url` 模式匹配，然后调用 `RetryWithHttpsEntryPoint`，后者又调用 `RedirectStrategy`\
    \ 实现的 `sendRedirect` 方法，该方法尝试重定向到 `https://localhost:8443/favoritesmovies/login`。\n\
    \n总结\n在本章中，我们涵盖了该框架最大的关注点之一：Spring Security 中的 Web 支持。您看到主要功能以 Servlet 过滤器的形式提供。从标准的角度来看，这是一件好事，因为它意味着您可以在使用标准\
    \ Java Servlet 模型的其他框架中利用 Spring Security 的 Web 支持。\n您现在应该了解构成该框架的主要过滤器的许多细节、它们内部的工作方式，以及它们如何相互配合并与框架的其他部分配合。我们以实践的方式解释了所有这些内容，试图解决现实生活中的场景。\n\
    在下一章中，我们将介绍 Spring Security 的第二个主要关注点——即方法级安全性。我们将展示它与 Web 级安全性的比较，您将看到您可以利用现有的大量知识将其应用于方法级安全层。\n\
    \n6. 配置替代身份验证提供程序\n"
- fmt: '# Spring Security 认证机制


    Spring Security 最强大的优势之一在于可以将不同的认证机制插入到框架中。Spring Security 的设计目标是尽可能构建一个可插拔的架构模型，使不同的组件能够以简单且不引人注目的方式接入框架。在认证层，这意味着存在一个抽象层来处理安全流程的这一部分。这种抽象主要体现在`AuthenticationProvider`接口上，同时也得到特定安全
    Servlet 过滤器和用户详情服务的支持。


    Spring Security v5 支持多种不同的认证机制，包括：


    - 数据库

    - LDAP

    - X.509

    - OAuth 2/OpenID

    - WebSockets

    - JSON Web Token (JWT)

    - JAAS

    - CAS


    本章大部分内容将解释每种认证系统如何独立于 Spring Security 工作。虽然会提供一些关键细节，但不会进行深入解释。当然，您将看到 Spring
    Security 如何实现每种认证机制，并且会发现它们在使用的 Spring Security 组件方面有许多共同之处。本章仅提供数据库、LDAP 和 X.509
    认证的示例，而 OAuth2、JAAS 和 CAS 仅作介绍。


    ## 数据库认证


    数据库认证的工作方式与内存认证几乎完全相同。唯一的区别在于用户存储在数据库中而非内存中。这在运行时定义应用程序上下文配置文件时发生。


    当使用数据库认证机制时，`AuthenticationProvider`实现无需任何更改；它仍然是用于内存用户认证的`DaoAuthenticationProvider`。您可能还记得，这个`AuthenticationProvider`实现基于使用`UserDetailsService`抽象来检索用户，因此区别在于您将使用的`UserDetailsService`实现。


    配置从数据库提供用户非常简单，您将看到这一点。


    首先，从[`https://sourceforge.net/projects/hsqldb/postdownload`](https://sourceforge.net/projects/hsqldb/postdownload)下载并解压
    HyperSQL 数据库引擎（HSQLDB）`.zip`文件。在本例中，您将把`hsqldb-2.4.1.zip`文件安装到`c:\hsqldb-2.4.1`。


    在本章中，您将使用 IntelliJ IDEA 2019 作为 IDE 工具。您可以从[`https://blog.jetbrains.com/idea/tag/intellij-idea-2019-1/`](https://blog.jetbrains.com/idea/tag/intellij-idea-2019-1/)下载它。


    您可以按照图 6-1 所示配置 HSQLDB。


    ![../images/310331_2_En_6_Chapter/310331_2_En_6_Fig1_HTML.jpg](images/310331_2_En_6_Chapter/310331_2_En_6_Fig1_HTML.jpg)


    **图 6-1** 配置 hsqldb-2.4.1


    稍后，运行 HSQLDB SQL 页面时，结果将如图 6-2 所示。


    ![../images/310331_2_En_6_Chapter/310331_2_En_6_Fig2_HTML.jpg](images/310331_2_En_6_Chapter/310331_2_En_6_Fig2_HTML.jpg)


    **图 6-2** 运行 HSQLDB SQL 脚本


    现在 HSQLDB 已准备好使用。


    首先要做的是定义使认证机制工作所需的数据库模式。使认证工作所需的表如图 6-3 所示。


    ![../images/310331_2_En_6_Chapter/310331_2_En_6_Fig3_HTML.jpg](images/310331_2_En_6_Chapter/310331_2_En_6_Fig3_HTML.jpg)


    **图 6-3** 支持数据库认证所需的简单数据库模式


    图 6-3 展示了一个支持数据库认证的简单模式模型。仅通过查看这些表，您应该就能理解它们的工作方式。这基本上是从您一直使用的内存实现的一对一映射。在`USER`表中，存储用户详细信息——主要是用户名和密码。在`AUTHORITIES`表中，存储用户名与该成员被授予权限之间的关系——例如，`ROLE_MEMBER`。


    图 6-4 展示了一个扩展的默认选项，您可以使用它来定义组，并建立与这些组相关的权限，而不是与单个用户相关。


    ![../images/310331_2_En_6_Chapter/310331_2_En_6_Fig4_HTML.jpg](images/310331_2_En_6_Chapter/310331_2_En_6_Fig4_HTML.jpg)


    **图 6-4** 带组的数据库认证方案


    图 6-4 比图 6-3 稍微复杂一些，但仍然非常直观。这次，模式允许您创建命名组并建立属于这些组的权限。同时，用户现在也可以属于组，这意味着用户可以继承其所属组定义的权限。例如，如果在`GROUPS`表中有一个名为
    Administrators 的组，并且在`GROUP_AUTHORITIES`表中定义了两个权限（`ROLE_ADMIN`和`ROLE_USER`）映射到
    Administrators 组，那么属于 Administrators 组的成员（存在于`GROUP_MEMBERS`表中）将继承该组的`ROLE_ADMIN`和`ROLE_USER`权限。


    默认情况下，组机制在`UserDetailsService`中未激活。要激活它，您需要在配置文件的相应`<jdbc-user-service>`中配置`groupAuthoritiesByUsernameQuery`属性，稍后将在示例中看到。


    > **注意**：对于本示例项目以及本章中的其余示例，除非另有说明，您将从以下配置的应用程序开始：

    > 1. 使用您在第三章创建的示例。

    > 2. 使用清单 6-1 中的内容更新`web.xml`文件。

