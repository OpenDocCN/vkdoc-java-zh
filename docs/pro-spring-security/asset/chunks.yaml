    ![../images/310331_2_En_4_Chapter/310331_2_En_4_Fig8_HTML.jpg](images/310331_2_En_4_Chapter/310331_2_En_4_Fig8_HTML.jpg)


    Figure 4-8


    Sequence of loading up a Spring namespace


    `SecurityNamespaceHandler` delegates to a series of `BeanDefinitionParser` objects
    for the individual parsing of each top-level element. The whole list of elements
