    Config.groovy 文件摘录，我们在其中添加了需要保护的 URL

    ```


    ```

    import demo.security.Role

    import demo.security.User

    import demo.security.UserRole

    class BootStrap {

    def init = { servletContext ->

    def adminRole = new Role(authority: ''ROLE_ADMIN'').save(flush: true)

    def userRole = new Role(authority: ''ROLE_USER'').save(flush: true)

    def testAdmin = new User(username: ''luna'', enabled: true, password: ''password'')

    testAdmin.save(flush: true)

    def testUser = new User(username: ''neve'', enabled: true, password: ''password'')

    testUser.save(flush: true)

    UserRole.create testAdmin, adminRole, true

    UserRole.create testUser, userRole, false

    }

    def destroy = {

    }

    }

    清单 9-24

    BootStrap.groovy 文件，设置了一组测试用户并为其分配了安全角色

    ```


    ```

    package demo.grails

    class UnsecuredController {

    def message() {

    render "message for everyone"

    }

    }

    清单 9-23

    Grails 应用程序中带有未保护消息的 UnsecuredController

    ```


    ```

    package demo.grails

    class SecuredController {

    def message() {

    render "Incredibly confidential message"

    }

    }

    清单 9-22

    Grails 应用程序中带有受保护消息的 SecuredController

    ```


    Grails 的 Spring Security 插件让你能更深入地访问 Spring Security 提供的功能，当然，它也允许你通过覆盖默认值来自定义。它支持的功能之一是在访问规则中使用
    SpEL。为了在本例的上下文中测试这一点，并使用我们能想到的最简单的安全 SpEL 表达式，只需将 `Config.groovy` 文件（来自清单 9-25）中引入的安全部分替换为清单
    9-26 中的内容。如你所见，在这个清单中，你使用了之前章节学习过的安全表达式 `hasRole`。请注意，这是一个使用 `hasRole` 的简单示例，但在这里你可以使用
    Spring Security SpEL 支持提供的全套表达式。例如，你可以使用 [`authentication.name`](http://authentication.name)
    `== ''luna''` 作为表达式，而不是 `hasRole`。


    ```

    grails.plugins.springsecurity.securityConfigType = "InterceptUrlMap"

    grails.plugins.springsecurity.interceptUrlMap = [

    ''/secured/**'':    ["hasRole(''ROLE_ADMIN'')"],

    ''/unsecured/**'':   ["hasRole(''ROLE_USER'')"],

    ]

    清单 9-26

    Config.groovy 文件摘录，使用 SpEL 代替简单角色

    ```


    在方法级别使用 Grails 安全功能


    Grails 的 Spring Security 插件支持方法级别的安全，其方式与 Java 相同。这意味着你可以在控制器类中添加 `@grails.plugins.springsecurity`
    安全注解（或者标准的 Spring Security `@Secured` 注解），Spring Security 将确保这些方法根据这些注解得到保护。这样做非常简单。让我们继续处理上一节中的应用程序。首先，将
    `Config.groovy` 文件（位于 `grails-app/conf` 目录）中从 `grails.plugins.springsecurity.securityConfigType
    = "InterceptUrlMap"` 这一行开始的内容，替换为简单的一行 `grails.plugins.springsecurity.securityConfigType
    = "Annotation"`。然后，将 `SecuredController` 类（位于 `grails-app/controllers/demo/grails`
    目录）的内容替换为清单 9-27 的内容，并将 `UnsecuredController` 类（位于 `grails-app/controllers/demo/grails`
    目录）的内容替换为清单 9-28 的内容。完成这些操作后，如果你重新启动应用程序，应该会得到与上一节保护 URL 时相同的访问限制。


    ```

    package demo.grails

    import grails.plugins.springsecurity.Secured;

    class UnsecuredController {

    @Secured(["ROLE_USER"])

    def message() {

    render "message for everyone"

    }

    }

    清单 9-28

    带有 @Secured 注解的 UnsecuredController

    ```


    ```

    package demo.grails

    import grails.plugins.springsecurity.Secured;

    class SecuredController {

    @Secured(["ROLE_ADMIN"])

    def message() {

    render "Incredibly confidential message"

    }

    }

    清单 9-27

    带有 @Secured 注解的 SecuredController

    ```


    在最后这两节中，我们只是浅尝辄止地介绍了使用 Grails Spring Security 插件所能实现的功能。实际上，你可以完成几乎所有使用标准 Java
    支持所能做到的事情。有关使用 Grails 插件的全面指南，请查看其官方页面：[`http://plugins.grails.org/plugin/grails/spring-security-core`](http://plugins.grails.org/plugin/grails/spring-security-core)。

