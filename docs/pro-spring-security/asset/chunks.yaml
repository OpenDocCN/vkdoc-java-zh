    ACL 的成本

    此示例表明，使用 ACL 会在标准业务操作之上，带来相当多的操作和逻辑开销。显然，存储一篇帖子会受到为该对象存储相应 ACL 所需的额外工作的影响，而检索一篇帖子则会受到需要根据权限过滤集合中某些元素的影响。


    本小节将深入探讨 ACL Spring Security 支持的核心类，了解其内部工作原理以及它可能如何影响您的应用程序。这个类是 `org.springframework.security.acls.jdbc.JdbcMutableAclService`。


    `JdbcMutableAclService` 是处理所有与 ACL 数据库模式相关的数据库输入和输出的类。它默认配置为与 `HSQLDB` 一起工作，这也是我们在示例中一直使用的数据库。


    该类针对您与 ACL 系统交互时执行的不同操作（例如插入到不同表中、删除 ACL、更新值，当然还有从不同表中进行选择）提供了不同的 SQL 语句。所有这些操作都使用
    Spring Core 的 `JdbcTemplate` 支持来完成。


    另一个重要的类是 `BasicLookupStrategy`，它是框架中用于查找 ACL 的 `LookupStrategy` 的默认实现。


    您看到的第一个有趣的操作是 `readAclsById` 方法，它存在于 `JdbcMutableAclService` 中，并委托给 `BasicLookupStrategy`
    中同名的方法。此方法尝试从缓存中检索请求的 ACL。如果在缓存中找到该 ACL，该方法将返回这个找到的 ACL；如果在缓存中未找到该 ACL，则实现将使用一个包含四个连接的、相对复杂的查询来查询数据库，如清单
    7-25 所示。这个查询可能会变得更复杂一些，因为 ACL 可以以最多 50 个元素为一批进行检索（这是默认值，但可以通过设置 `BasicLookupStrategy`
    类中的 `batchSize` 属性进行配置），并且对于这些元素中的每一个，`where` 子句都会向查询中添加一个 `or` 运算符。此查询的结果随后会存储在缓存中，这使得这些
    ACL 可用，以便如果另一个方法调用 `readAclsById` 请求其中一个缓存元素时，无需访问数据库。


    当您创建一篇新帖子时，会调用 `readAclsById`。此外，还会执行另一个 select 查询来检索由该领域对象表示的 `objectIdentity`
    的主键。当然，还会执行一条 `"insert into acl_object_identity"` 语句。同样，在 `ForumServiceImpl` 的同一个
    `createPost` 方法中，当您调用 `updateAcl` 方法时，会先执行一条 `"delete from acl_entry"` 语句，然后执行一批
    `"insert into acl_entry"` 语句，接着执行一条 `"update acl_object_identity"` 语句。然后，该对象标识的所有缓存条目都会被清除，并再次调用
    `readAclsById`，这将查询数据库以获取最新的信息。您可以看到，使用 ACL 后，删除一篇帖子的成本是如何显著增加的。


    删除 `Post` 对象的成本也更高，因为现在它涉及删除 ACE 条目、删除对象标识以及清除相关对象的缓存。


    本节并非要吓唬您，让您不敢使用 ACL。我们只是想让您意识到，在考虑使用 ACL 创建应用程序时，除了使用它的复杂性之外，还存在一个额外的成本，您应该将其考虑在内。您拥有的领域对象越多，您拥有的
    ACL 条目也就越多。在一个大型应用程序中，您可能谈论的是 ACL 支持表中数百万计的条目。


    ```

    select acl_object_identity.object_id_identity, acl_entry.ace_order,  acl_object_identity.id
    as acl_id,

    acl_object_identity.parent_object, acl_object_identity.entries_inheriting, acl_entry.id
    as ace_id, acl_entry.mask,

    acl_entry.granting,  acl_entry.audit_success, acl_entry.audit_failure,  acl_sid.principal
    as ace_principal,

    acl_sid.sid as ace_sid,  acli_sid.principal as acl_principal, acli_sid.sid as
    acl_sid, acl_class.class from

    acl_object_identity left join acl_sid acli_sid on acli_sid.id = acl_object_identity.owner_sid

    left join acl_class on acl_class.id = acl_object_identity.object_id_class

    left join acl_entry on acl_object_identity.id = acl_entry.acl_object_identity

    left join acl_sid on acl_entry.sid = acl_sid.id

    where ( (acl_object_identity.object_id_identity = ? and acl_class.class = ?))

    order by acl_object_identity.object_id_identity asc, acl_entry.ace_order asc

    清单 7-25

    您可以在 `org.springframework.security.acls.jdbc.BasicLookupStrategy` 类中找到的 ACL 检索查询

    ```


    总结

    在本章中，我们详细解释了如何使用 Spring Security 对 ACL 的支持。我们展示了如何在 Spring 配置文件中配置对 ACL 的支持，以及如何使用
    `@Secured`、`@PreAuthorize`、`@PreFilter`、`@PostAuthorize` 和 `@PostFilter` 注解来实现特定于领域对象的安全性。我们还介绍了框架的一些内部方面以及参与其
    ACL 功能的主要类。


    我们研究了不同的方法来确保受保护的领域对象不会出现在没有适当权限的用户的表示层中。您看到这可以通过业务层的 `@PostFilter` 中的 SpEL 表达式实现，也可以直接在您的
    JSP 文件中使用 ACL Spring Security 标签库实现。我们还快速概述了 ACL 框架使用的不同 SQL 语句，以及它们可能如何影响您的应用程序。


    8. 自定义和扩展 Spring Security


    Spring Security 是一个非常可扩展和可定制的框架。这主要是因为该框架是使用面向对象的原则和设计实践构建的，因此它对扩展开放，对修改关闭。在上一章中，您看到了
    Spring Security 中的一个主要扩展点——即不同身份验证提供者的可插拔性。本章涵盖了框架中其他一些您可以利用的扩展点，以扩展 Spring Security
    的功能，或修改/定制那些在您的应用程序中不完全按您需要方式工作的功能。


    我们还将简要介绍 Spring Security Extensions 项目（[`http://static.springsource.org/spring-security/site/extensions.html`](http://static.springsource.org/spring-security/site/extensions.html)），这是一个您可以用来为核心
    Spring Security 项目创建扩展模块的环境。


    下一节将定义我们认为的 Spring Security 中的一些主要扩展点，并描述如何使用它们来添加或修改安全解决方案中的行为。此外，本章还将展示如何使用
    Spring Boot、Spring Security、Spring Data、Thymeleaf 和 MongoDB 开发身份验证和登录应用程序。


    Spring Security 扩展点

    Spring Security 提供了一套全面的扩展点，这些扩展点可以使用您自己的实现进行自定义（或完全覆盖），同时仍然利用框架的核心。有些扩展点是显而易见的，而另一些则稍微微妙一些，在某些情况下甚至不是有意的。然而，由于该框架非常灵活，您可以利用这种灵活性来调整其配置以满足您的意图。

    '
- fmt: '# Plugging into the Spring Security Event System


    Spring Security supports an event model that is built on top of Spring Framework’s
    own event model. You can use Spring’s event model to develop applications that
    can listen to different events that happen within the framework and act accordingly.


    We won’t explain in any depth why an event model is such a powerful programming
    practice to have at your disposal. Instead, we’ll just point out one big advantage:
    it allows you to decouple your applications, because in general the event producer
    or producers and the event consumer or consumers don’t need to know anything about
    each other in order to operate correctly. In theory (and, indeed, in practice
    for events in general, although not for Spring events), you can have a completely
    heterogeneous application where you can write and evolve each module at its own
    pace without affecting other parts, and then integrate them all together through
    the exclusive use of events.


    All Spring events should extend from the abstract class `org.springframework.context.ApplicationEvent`,
    and Spring Security’s own events are no exception.


    One of the main concrete implementations of the `ApplicationEvent` abstract class
    is `org.springframework.context.event.ApplicationContextEvent`, which itself serves
    as the parent class of a series of events that involve the life cycle of the application
    context (`ContextClosedEvent`, `ContextRefreshedEvent`, `ContextStartedEvent`,
    and `ContextStoppedEvent`).


    To register your application to be notified of Spring events, you need one (or
    more) of the beans defined in your application to implement the interface `org.springframework.context.ApplicationListener<E
    extends ApplicationEvent>`. This interface defines a single method, `void onApplicationEvent(E
    event)`, that you can use to listen to a particular type of event in the application.


    Publishing events is equally easy. You only need to define a bean in your Spring
    application context that implements the interface `org.springframework.context.ApplicationEventPublisherAware`,
    which again defines only one method:


    ```

    void setApplicationEventPublisher(ApplicationEventPublisher applicationEventPublisher)

    ```


    This method is called automatically by Spring when the application starts up,
    and an instance of `ApplicationEventPublisher` (an implementation of it because
    it is an interface) is passed in. The instance of `ApplicationEventPublisher`
    that is passed in is normally the `ApplicationContext` instance itself that contains
    the application.


    The default implementation of `ApplicationEventPublisher`’s `publishEvent` method
    (which lives in the class `AbstractApplicationContext`) delegates the publishing
    of the events to an implementation of `ApplicationEventMulticaster`—the only current
    implementation of which is `org.springframework.context.event.SimpleApplicationEventMulticaster`.


    Broadcasting an event to all interested listeners is also straightforward. You
    simply need to create an instance of one of the implementing classes of `ApplicationEvent`
    (any subclass of it will do as an event) and then call the `ApplicationEventPublisher`’s
    `publishEvent(ApplicationEvent event)` method, passing your `ApplicationEvent`
    instance to it. Spring then takes care of ensuring that all the listeners registered
    for that particular event are notified of the event publication. By default, all
    listeners are invoked on the same thread as the publisher; however, you also could
    configure an `org.springframework.core.task.TaskExecutor` (which is an interface,
    so you could use an implementation class like `org.springframework.core.task.SimpleAsyncTaskExecutor`)
    to call the listeners in different threads. You will use this when you configure
    the listeners in the examples.


    Spring Security comes with its own suite of `ApplicationEvent` implementations,
    so you can hook into different points of the security life cycle in an unobtrusive
    and decoupled way. The `ApplicationEvent` implementations that Spring Security
    provides are categorized as `Authorization`, `Authentication`, or `javax.servlet.http.Session`
    types, and they have descriptive names that hint what they do and where they are
    published. Here, we will give a concrete explanation of them and when they are
    published within the framework.


    Events in Spring work as shown in Figure [8-1](#310331_2_En_8_Chapter.xhtml#Fig1).


    ![../images/310331_2_En_8_Chapter/310331_2_En_8_Fig1_HTML.jpg](images/310331_2_En_8_Chapter/310331_2_En_8_Fig1_HTML.jpg)


    **Figure 8-1** Spring event mechanism. Spring Security has its own set of `ApplicationEvent`
    implementations


    ## Authorization-Related Events


    These are events related to the different phases that an authorization process
    can go through—for example, informing a user when an authorization has failed.
    The events under this category are the following:


    - `org.springframework.security.access.event.AbstractAuthorizationEvent`: This
    is the parent class of all the other authorization events. It doesn’t really add
    any functionality on top of `ApplicationEvent`. It is more like a marker identifying
    all its subclasses as authorization events.


    - `org.springframework.security.access.event.AuthenticationCredentialsNotFoundEvent`:
    This event is used to indicate that the `Authentication` object could not be obtained
    from the configured `SecurityContext`. This event is broadcast from the `AbstractSecurityInterceptor`’s
    `beforeInvocation` method after it decides that an invocation should have security
    but the interceptor doesn’t find the required `Authentication` object in the security
    context. Simply put, this event is executed if the condition `SecurityContextHolder.getContext().getAuthentication()
    == null` is `true`.'
