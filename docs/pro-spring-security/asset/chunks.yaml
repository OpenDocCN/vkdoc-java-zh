    The next Java class to create is `UserConfiguration`, which defines where the
    Java classes and `.jps` pages needed for your application are located. In your
    case, the web resources to handle are located in `/WEB-INF/pages/` as `.jsp` pages.
    The `UserConfiguration` Java class is shown in Listing [3-10](#310331_2_En_3_Chapter.xhtml#PC13).


    ```

    package com.apress.pss.springsecurity.configuration;

    import org.springframework.context.annotation.Bean;

    import org.springframework.context.annotation.ComponentScan;

    import org.springframework.context.annotation.Configuration;

    import org.springframework.web.servlet.ViewResolver;

    import org.springframework.web.servlet.config.annotation.EnableWebMvc;

    import org.springframework.web.servlet.view.InternalResourceViewResolver;

    import org.springframework.web.servlet.view.JstlView;

    @Configuration

    @EnableWebMvc

    @ComponentScan(basePackages = "com.apress.pss.springsecurity")

    public class UserConfiguration {

    @Bean(name="SpringSecurity")

    public ViewResolver viewResolver() {

    InternalResourceViewResolver viewResolver = new InternalResourceViewResolver();

    viewResolver.setViewClass(JstlView.class);

    viewResolver.setPrefix("/WEB-INF/views/");

    viewResolver.setSuffix(".jsp");

    return viewResolver;

    }

    }

    Listing 3-10

    UserConfiguration.java

    ```


    The last Java class to create is `SecurityConfiguration`, which defines the security
    configuration for your Spring Security v5 application; see Listing [3-11](#310331_2_En_3_Chapter.xhtml#PC14).


    ```

    package com.apress.pss.springsecurity.configuration;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.context.annotation.Bean;

    import org.springframework.context.annotation.Configuration;

    import org.springframework.security.config.annotation.authentication.builders.AuthenticationManagerBuilder;

    import org.springframework.security.config.annotation.web.builders.HttpSecurity;

    import org.springframework.security.config.annotation.web.configuration.EnableWebSecurity;

    import org.springframework.security.config.annotation.web.configuration.WebSecurityConfigurerAdapter;

    import org.springframework.security.crypto.bcrypt.BCryptPasswordEncoder;

    import org.springframework.security.crypto.password.PasswordEncoder;

    @Configuration

    @EnableWebSecurity

    public class SecurityConfiguration extends WebSecurityConfigurerAdapter {

    @Autowired

    PasswordEncoder passwordEncoder;

    @Override

    protected void configure(AuthenticationManagerBuilder auth) throws Exception {

    auth.inMemoryAuthentication()

    .passwordEncoder(passwordEncoder)

    .withUser("user").password(passwordEncoder.encode("user123")).roles("USER")

    .and()

    .withUser("admin").password(passwordEncoder.encode("admin123")).roles("USER",
    "ADMIN");

    }

    @Bean

    public PasswordEncoder passwordEncoder() {

    return new BCryptPasswordEncoder();

    }

    @Override

    protected void configure(HttpSecurity http) throws Exception {

    http.authorizeRequests()

    .antMatchers("/", "/welcome", "/login").permitAll()

    .antMatchers("/authenticated/**").hasAnyRole("ADMIN", "USER")

    .and().formLogin()

    .and().logout().logoutSuccessUrl("/welcome").permitAll()

    .and().csrf().disable();

    }

    }

    Listing 3-11

    SecurityConfiguration.java

    ```


    Let’s analyses this Java class in detail. You define all security configuration
    needed in `SecurityConfiguration` and then you define the `PasswordEncoder`, which
    returns the `BCryptPassword`. You then define the page seen by, like `welcome.jsp`,
    and then the security role needed to access the `authenticated.jsp` page, such
    as admin and user. The logout will redirect to the `welcome.jsp` page and finally
    the csrf will be disabled.


