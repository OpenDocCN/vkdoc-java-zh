  trans: '

    ## 什么是 Spring Security？


    Spring Security 是一个致力于以开发者友好且灵活的方式，为 Java 应用程序提供全套安全服务的框架。它遵循 Spring 框架引入的成熟实践。Spring
    Security 试图解决应用程序内部所有层级的安全问题。此外，它还附带大量配置选项，使其非常灵活且强大。


    回顾第 1 章，可以说 Spring Security 只是一个构建在 Spring 框架之上的综合性认证/授权框架。尽管使用该框架的大多数应用程序都是基于
    Web 的，但 Spring Security 的核心也可以用于独立应用程序。


    许多特性使得 Spring Security 对 Java 开发者具有立竿见影的吸引力。仅举几例，请考虑以下列表：


    *   **它构建在成功的** **Spring 框架** **之上。** 这是 Spring Security 的一个重要优势。Spring 框架已成为构建企业级
    Java 应用程序的“标准方式”，并且理由充分。它围绕良好实践以及两个简单而强大的概念构建：依赖注入（DI）和面向切面编程（AOP）。同样重要的是，许多开发者拥有
    Spring 经验，因此他们可以在项目中引入 Spring Security 时利用这些经验。


    *   **它为多种认证模型提供开箱即用的支持。** 比上一点更重要的是，Spring Security 支持与轻量级目录访问协议（LDAP）、OpenID、表单认证、X.509
    证书认证、数据库认证、Jasypt 加密等众多技术的开箱即用集成。所有这些支持意味着 Spring Security 能够适应您的安全需求——不仅如此，如果您的需求发生变化，它也能轻松改变，而无需开发者付出太多努力。有关
    Jasypt 加密的更多信息，请访问 [`www.jasypt.org/`](http://www.jasypt.org/)。


    从业务角度来看，这一点也很重要，因为应用程序既可以适应企业认证服务，也可以实现自己的认证服务，只需进行简单的配置更改即可。


    这也意味着您需要编写的软件少得多，因为您正在使用大量由庞大且活跃的用户社区编写和测试的现成代码。在某种程度上，您可以信任这些代码能够正常工作并放心使用。如果它确实不起作用，您也可以随时修复它，并向项目维护者发送补丁。


    *   **它提供** **分层安全服务。** Spring Security 允许您在不同级别保护应用程序，并保护您的 Web URL、视图、服务方法和领域模型。您可以挑选并组合这些功能来实现您的安全目标。


    这在实践中非常灵活。例如，假设您通过 RMI、Web、JMS 等方式提供服务。您可以保护所有这些接口，但也许更好的做法是只保护业务层，这样所有请求在到达该层时都得到保护。此外，也许您不关心保护单个业务对象，因此您可以省略该模块，只使用您需要的功能。


    *   **它是** **开源软件。** 作为 Pivotal 产品组合的一部分，Spring Security 是一个开源软件工具。它还有一个致力于测试和改进该框架的大型社区和用户群。有机会使用开源软件对大多数开发者来说是一个有吸引力的特性。能够查看您喜欢并使用的工具的源代码是一个令人兴奋的前景。无论我们的目标是改进工具，还是仅仅了解它们内部的工作原理，我们开发者都喜欢阅读代码并从中学习。


    ## Spring Security 适用于何处？


    Spring Security 无疑是一个强大且多功能的工具。但与其他任何工具一样，它并非能适应您想做的所有事情。它的功能有明确的适用范围。


    您会在何处以及为何使用 Spring Security？以下是一些原因和场景列表：


    *   **您的应用程序使用 Java、Groovy 或 Kotlin。** 首先要考虑的是，Spring Security 可以用 Java、Groovy
    或 Kotlin 等语言编写，通常也适用于 JVM 支持的任何语言。因此，如果您计划使用非 JVM 语言，Spring Security 对您将毫无用处。


    *   **您需要** **基于角色的认证/授权。** 这是 Spring Security 的主要用例。您有一个用户列表，以及一个资源列表和这些资源上的操作列表。您将用户分组为角色，并允许特定角色访问特定资源上的特定操作。这就是核心功能。


    *   **您想要保护** **Web 应用程序** **免受恶意用户攻击。** 如前所述，Spring Security 主要用于 Web 应用程序环境。在这种情况下，首先要做的是只允许您希望访问应用程序的用户访问，同时禁止所有其他用户甚至接触它。


    *   **您需要与** **OpenID** **、** **LDAP** **、** **Active Directory** **和** **数据库**
    **作为安全提供者集成。** 如果您需要与特定的用户和角色或组提供者集成，您应该查看 Spring Security 提供的众多选项，因为集成可能已经为您实现，从而避免您编写大量不必要的代码。有时您可能不确定您的业务需要哪个提供者进行认证。在这种情况下，Spring
    Security 通过允许您以无痛的方式在不同提供者之间切换，让您的生活变得轻松。


    *   **您需要保护您的** **领域模型** **，并只允许特定用户访问应用程序中的特定对象。** 如果您需要细粒度的安全性（即，您需要基于每个对象、每个用户进行保护），Spring
    Security 提供了访问控制列表（ACL）模块，这将帮助您以直接的方式实现这一点。


    *   **您希望以一种非侵入式、声明性的** **方式为您的应用程序添加安全性。** 安全性是一个横切关注点，而不是您应用程序的核心业务功能（除非您在安全提供商公司工作）。因此，最好将其视为一个独立的、模块化的附加组件，您可以独立于主要业务关注点来声明、配置和管理它。Spring
    Security 正是基于此理念构建的。通过使用 Servlet 过滤器、XML 配置和 AOP 概念，该框架力求不使安全规则污染您的应用程序。即使使用注解，它们也只是代码之上的元数据。它们不会干扰您的代码逻辑。作为
    Java 开发者，您必须尝试将 Java 配置隔离到一个配置库中，并以类似于处理 XML 的方式将其与应用程序的其余部分解耦。


    *   **您希望以保护 URL 的相同方式来保护您的** **服务层** **，并且需要在方法级别添加规则以允许或禁止用户访问。** Spring Security
    允许您在应用程序的各层中使用一致的安全模型，因为它内部强制实施了这种一致的模型。您只需在一个地方配置用户、角色和提供者，服务层和 Web 层都会以透明的方式利用这个集中式的安全配置。

