    ```\n\nIf the login is successful, the user will access the `authenticated.jsp`\
    \ page, which we will explain later.\n\nNext, you need to define the Java classes\
    \ needed for your example.\n\nUnder controller:\n\n*   `UserController`\n\nUnder\
    \ package configuration:\n\n*   `AppInitializer`\n\n*   `SecurityConfiguration`\n\
    \n*   `SpringSecurityInitializer`\n\n*   `UserConfiguration`\n\nLet’s create the\
    \ two Java packages where your Java classes will be located:\n\n*   `com.apress.pss.springsecurity.controller`\n\
    \n*   `com.apress.pss.springsecurity.configuration`\n\nLet’s create the `UserController`\
    \ Java class under the package `com.apress.pss.springsecurity.controller`, as\
    \ shown in Listing [3-7](#310331_2_En_3_Chapter.xhtml#PC10).\n\n```\npackage com.apress.pss.springsecurity.controller;\n\
    import javax.servlet.http.HttpServletRequest;\nimport javax.servlet.http.HttpServletResponse;\n\
    import org.springframework.security.core.Authentication;\nimport org.springframework.security.core.context.SecurityContextHolder;\n\
    import org.springframework.security.core.userdetails.UserDetails;\nimport org.springframework.security.web.authentication.logout.SecurityContextLogoutHandler;\n\
    import org.springframework.stereotype.Controller;\nimport org.springframework.ui.ModelMap;\n\
    import org.springframework.web.bind.annotation.GetMapping;\n@Controller\npublic\
    \ class UserController {\n@GetMapping (\"/\")\npublic String homePage(ModelMap\
    \ model) {\nreturn \"welcome\";\n}\n@GetMapping (\"/welcome\")\npublic String\
    \ welcomePage(ModelMap model) {\nreturn \"welcome\";\n}\n@GetMapping (\"/authenticated\"\
    )\npublic String adminPage(ModelMap model) {\nmodel.addAttribute(\"user\", getPrincipal());\n\
    return \"authenticated\";\n}\n@GetMapping (\"/logout\")\npublic String logoutPage\
    \ (HttpServletRequest request, HttpServletResponse response) {\nAuthentication\
    \ auth = SecurityContextHolder.getContext().getAuthentication();\nif (auth !=\
    \ null){\nnew SecurityContextLogoutHandler().logout(request, response, auth);\n\
    }\nreturn \"welcome\";\n}\nprivate String getPrincipal(){\nString userName = null;\n\
    Object principal = SecurityContextHolder.getContext().getAuthentication().getPrincipal();\n\
    if (principal instanceof UserDetails) {\nuserName = ((UserDetails)principal).getUsername();\n\
    } else {\nuserName = principal.toString();\n}\nreturn userName;\n}\n}\nListing\
    \ 3-7\nUserController Java Class\n```"
  trans: "\n## 跨站请求伪造简介\n\n通过跨站请求伪造（CSRF）攻击，黑客可以修改任何 HTTP 方法（GET 或 POST）的状态，例如，通过诱骗用户点击一个经过篡改的链接，将客户端重定向到一个不安全的网页，从而窃取用户的敏感信息。\n\
    \n让我们来看看什么是 CSRF，以及如何使用 Spring Security 来防范 CSRF 攻击。常见的 CSRF 攻击包括：\n\n*   HTTP\
    \ GET 请求：诱骗受害者点击一个伪造的 GET 链接以获取敏感信息（例如用户名/密码等）。\n*   HTTP POST 请求：与 GET 类似，但使用的是\
    \ POST 方法。\n\n通常，要使用 Spring Security 的 CSRF 保护，我们必须确保只有正确的 HTTP 方法（如 PATCH、POST、PUT、DELETE\
    \ 等）才能修改状态。\n\n在 Spring Security v5 中，CSRF 保护在 Java 配置中默认是启用的。\n\n如果你必须禁用它，可以添加以下代码：`.csrf().disable()`。\n\
    \n如果你需要在服务器端启用 CSRF 保护，则需要在客户端请求中包含 CSRF 令牌，方法是添加以下代码行：\n\n```\n.\n```\n\n## 将\
    \ Spring Security v5（以及 Spring Core 本身）添加到项目中\n\n在本节中，你将开始探索框架的内部工作原理，了解其主要构建模块及其工作方式。这些信息主要是入门性质的。我们将在下一章对框架进行全面深入的回顾。我们本可以直接告诉你需要在项目中添加什么才能使应用程序运行，但我们认为，最好先向你介绍框架的不同组件，这样你就能在更好地了解框架构建方式的基础上开始编码。这意味着我们将告诉你如何获取项目源代码并构建它，然后以概括的方式解释构成框架的不同模块。\n\
    \n下一步，你需要在 Maven Web 应用程序中添加 Spring Security 5.1.4.RELEASE 版本，如清单 3-3 所示，即在 `pom.xml`\
    \ 文件中添加以下 JAR 依赖配置：\n\n*   spring-security-web\n*   spring-security-config\n*\
    \   spring-security-taglibs\n\n```\norg.springframework.security\nspring-security-web\n\
    5.1.5.RELEASE\n\norg.springframework.security\nspring-security-config\n5.1.5.RELEASE\n\
    \norg.springframework.security\nspring-security-taglibs\n5.1.5.RELEASE\n\n清单 3-3\n\
    Spring Security Maven 依赖\n```\n\n更新后的完整 `pom.xml` 文件如清单 3-4 所示。\n\n```\n\n4.0.0\n\
    groupId\npss01_Security\n1.0-SNAPSHOT\n\n5.1.5.RELEASE\n5.1.5.RELEASE\n\norg.springframework\n\
    spring-core\n${springframework.version}\n\norg.springframework\nspring-web\n${springframework.version}\n\
    \norg.springframework\nspring-webmvc\n${springframework.version}\n\norg.springframework.security\n\
    spring-security-web\n${springsecurity.version}\n\norg.springframework.security\n\
    spring-security-config\n${springsecurity.version}\n\njavax.servlet\njavax.servlet-api\n\
    4.0.1\nprovided        \n\njavax.servlet.jsp\njavax.servlet.jsp-api\n2.3.3\nprovided\n\
    \njavax.servlet\njstl\n1.2\n\ntaglibs\nstandard\n1.1.2\n\nsrc\n\norg.apache.maven.plugins\n\
    maven-compiler-plugin\n3.8.1\n\npss01_Security\n\n清单 3-4\n将 Spring Security 配置添加到\
    \ pom.xml 文件\n```\n\n请注意，`spring-webmvc` 是唯一需要的依赖，因为 `spring-core` 和 `spring-web`\
    \ 是传递性依赖。\n\n`pom.xml` 文件包含以下内容：\n\n*   项目所需的依赖，例如 Spring、Spring Security、Servlet\
    \ API 和 TagLibs。\n*   `<build>` 元素，其中包含所使用的插件，例如：\n    *   `maven-compiler-plugin`，用于指定项目中使用的\
    \ Java 版本。\n    *   Servlet 信息。\n    *   TagLibs。\n    *   `maven-war-plugin`，用于将项目构建成\
    \ WAR 文件，在本例中该文件将部署到 Tomcat。\n\n### 注意\n\n请记住，此示例中未使用任何 Spring Boot 依赖。\n\n##\
    \ 配置 Web 项目以识别 Spring Security v5\n\n要在你的 Maven Web 应用程序中激活 Spring Security，你需要配置一个特定的\
    \ Servlet 过滤器，该过滤器将负责预处理和后处理请求，以及管理所需的安全约束。\n\n让我们开始构建你的 Spring Security Maven\
    \ Web 应用程序。\n\n作为第一步，请确保所有工具和目录都已按前述方式创建。\n\n然后，如清单 3-4 所示更新 `pom.xml` 文件。\n\n\
    接下来，在一个名为 `WebContent/WEB-INF/pages/` 的新项目目录下创建所需的 `.jsp` 文件。\n\n你的项目将使用两个 `.jsp`\
    \ 页面：\n\n*   `welcome.jsp`，这是项目的起始欢迎网页。\n*   `authenticated.jsp`，这是用户成功登录后访问的管理网页。\n\
    \n`welcome.jsp` 页面如清单 3-5 所示。\n\n```\n\nSpring Security 认证示例。\n\n欢迎来到 Spring Security\
    \ 认证示例！\n\">登录\n\n清单 3-5\nwelcome.jsp\n```\n\n`welcome.jsp` 页面仅显示一条欢迎消息，并提供指向认证页面\
    \ `/authenticated` 的链接。\n\n现在让我们创建 `authenticated.jsp` 页面；参见清单 3-6。\n\n```\n\n\
    Spring Security 认证示例\n\n欢迎来到 Spring Security 认证示例！\n您的用户名是：${user}\n\n您提供了管理员认证凭据！\n\
    \n您提供了用户认证凭据！\n\n\">注销\n\n清单 3-6\nauthenticated.jsp\n```\n\n如果登录成功，用户将访问 `authenticated.jsp`\
    \ 页面，我们稍后会解释该页面。\n\n接下来，你需要定义示例所需的 Java 类。\n\n在 controller 包下：\n\n*   `UserController`\n\
    \n在 configuration 包下：\n\n*   `AppInitializer`\n*   `SecurityConfiguration`\n*\
    \   `SpringSecurityInitializer`\n*   `UserConfiguration`\n\n让我们创建两个 Java 包，你的\
    \ Java 类将位于其中：\n\n*   `com.apress.pss.springsecurity.controller`\n*   `com.apress.pss.springsecurity.configuration`\n\
    \n让我们在 `com.apress.pss.springsecurity.controller` 包下创建 `UserController` Java 类，如清单\
    \ 3-7 所示。\n\n```\npackage com.apress.pss.springsecurity.controller;\nimport javax.servlet.http.HttpServletRequest;\n\
    import javax.servlet.http.HttpServletResponse;\nimport org.springframework.security.core.Authentication;\n\
    import org.springframework.security.core.context.SecurityContextHolder;\nimport\
    \ org.springframework.security.core.userdetails.UserDetails;\nimport org.springframework.security.web.authentication.logout.SecurityContextLogoutHandler;\n\
    import org.springframework.stereotype.Controller;\nimport org.springframework.ui.ModelMap;\n\
    import org.springframework.web.bind.annotation.GetMapping;\n@Controller\npublic\
    \ class UserController {\n@GetMapping (\"/\")\npublic String homePage(ModelMap\
    \ model) {\nreturn \"welcome\";\n}\n@GetMapping (\"/welcome\")\npublic String\
    \ welcomePage(ModelMap model) {\nreturn \"welcome\";\n}\n@GetMapping (\"/authenticated\"\
    )\npublic String adminPage(ModelMap model) {\nmodel.addAttribute(\"user\", getPrincipal());\n\
    return \"authenticated\";\n}\n@GetMapping (\"/logout\")\npublic String logoutPage\
    \ (HttpServletRequest request, HttpServletResponse response) {\nAuthentication\
    \ auth = SecurityContextHolder.getContext().getAuthentication();\nif (auth !=\
    \ null){\nnew SecurityContextLogoutHandler().logout(request, response, auth);\n\
    }\nreturn \"welcome\";\n}\nprivate String getPrincipal(){\nString userName = null;\n\
    Object principal = SecurityContextHolder.getContext().getAuthentication().getPrincipal();\n\
    if (principal instanceof UserDetails) {\nuserName = ((UserDetails)principal).getUsername();\n\
    } else {\nuserName = principal.toString();\n}\nreturn userName;\n}\n}\n清单 3-7\n\
    UserController Java 类\n```\n"
