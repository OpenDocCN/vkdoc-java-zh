  trans: '

    Spring Security 最强大的特性之一，在于你可以将不同的身份验证机制插入到框架中。Spring Security 的设计目标，是尽可能构建一个可插拔的架构模型，让不同的组件能够以简单且不引人注目的方式集成到框架中。在身份验证层，这意味着存在一个抽象层来处理安全流程的这一部分。这个抽象层主要以
    `AuthenticationProvider` 接口的形式呈现，但也通过特定的安全 Servlet 过滤器和用户详情服务提供支持。


    Spring Security v5 支持多种不同的身份验证机制，包括：


    *   数据库

    *   LDAP

    *   X.509

    *   OAuth 2/OpenID

    *   WebSockets

    *   JSON Web Token (JWT)

    *   JAAS

    *   CAS


    本章的大部分内容将解释这些身份验证系统各自如何独立于 Spring Security 工作。虽然会提供一些关键细节，但不会进行深入解释。当然，你将看到 Spring
    Security 如何实现这些身份验证机制，并且你会发现它们在所使用的 Spring Security 组件方面有许多共同点。本章仅提供关于数据库、LDAP
    和 X.509 身份验证的示例，而 OAuth2、JAAS 和 CAS 将仅作介绍。


    数据库提供的身份验证

    数据库提供的身份验证的工作方式与内存提供的身份验证几乎完全相同。唯一的区别在于，用户存储在数据库中，而非内存中。这发生在运行时，当你在应用程序上下文配置文件中定义它们时。

    当你使用数据库身份验证机制时，`AuthenticationProvider` 的实现完全不需要改变；它仍然是你在内存用户身份验证中使用的 `DaoAuthenticationProvider`。你可能还记得，这个
    `AuthenticationProvider` 实现基于使用 `UserDetailsService` 抽象来检索用户，因此这里的区别在于你将使用的 `UserDetailsService`
    实现。

    正如你将看到的，配置从数据库提供用户非常简单。


    首先，从 [`https://sourceforge.net/projects/hsqldb/postdownload`](https://sourceforge.net/projects/hsqldb/postdownload)
    下载并解压 HyperSQL 数据库引擎 (HSQLDB) 的 `.zip` 文件。

    在你的案例中，你将把 `hsqldb-2.4.1.zip` 文件安装到 `c:\hsqldb-2.4.1`。

    在本章中，你将使用 IntelliJ IDEA 2019 作为 IDE 工具。你可以从 [`https://blog.jetbrains.com/idea/tag/intellij-idea-2019-1/`](https://blog.jetbrains.com/idea/tag/intellij-idea-2019-1/)
    下载它。


    你可以按照图 6-1 所示配置 HSQLDB。


    ![../images/310331_2_En_6_Chapter/310331_2_En_6_Fig1_HTML.jpg](img/310331_2_En_6_Fig1_HTML.jpg)


    图 6-1

    配置 hsqldb-2.4.1


    稍后，在运行 HSQLDB SQL 页面时，结果将如图 6-2 所示。


    ![../images/310331_2_En_6_Chapter/310331_2_En_6_Fig2_HTML.jpg](img/310331_2_En_6_Fig2_HTML.jpg)


    图 6-2

    运行 HSQLDB SQL 脚本


    好了，现在 HSQLDB 已准备好可以使用。


    你要做的第一件事是定义所需的数据库模式，以使身份验证机制正常工作。使身份验证工作所需的表如图 6-3 所示。


    ![../images/310331_2_En_6_Chapter/310331_2_En_6_Fig3_HTML.jpg](img/310331_2_En_6_Fig3_HTML.jpg)


    图 6-3

    支持数据库身份验证所需的简单数据库模式


    图 6-3 展示了一个用于支持数据库身份验证的简单模式模型。仅通过查看这些表，你应该就能理解它们的工作方式。这基本上是你迄今为止一直在使用的内存实现的一对一映射。在
    `USER` 表中，你存储用户详细信息——主要是用户名和密码。在 `AUTHORITIES` 表中，你存储用户名与该成员被授予的权限之间的关系——例如，`ROLE_MEMBER`。


    图 6-4 展示了一个扩展的默认选项，你可以使用它来定义组，并建立与这些组相关的权限，而不是与单个用户相关的权限。


    ![../images/310331_2_En_6_Chapter/310331_2_En_6_Fig4_HTML.jpg](img/310331_2_En_6_Fig4_HTML.jpg)


    图 6-4

    带组的数据库支持身份验证方案


    图 6-4 比图 6-3 稍微复杂一些；然而，它仍然非常直接。这次，模式允许你创建命名组，并建立属于这些组的权限。同时，用户现在也可以属于组，这意味着用户可以继承其所属组定义的权限。例如，如果在
    `GROUPS` 表中有一个名为 Administrators 的组，并且在 `GROUP_AUTHORITIES` 表中定义了两个权限（`ROLE_ADMIN`
    和 `ROLE_USER`）映射到 Administrators 组，那么属于 Administrators 组（存在于 `GROUP_MEMBERS` 表中）的成员将继承该组的
    `ROLE_ADMIN` 和 `ROLE_USER` 权限。

    默认情况下，组机制在 `UserDetailsService` 中未激活。要激活它，你需要在配置文件中相应的 `<jdbc-user-service>` 中配置一个
    `groupAuthoritiesByUsernameQuery` 属性，稍后你将在示例中看到。


    注意

    对于此示例项目以及本章中的其余示例，除非另有说明，否则你将从一个配置如下的应用程序开始。


    1.  使用你在第 3 章创建的示例。

