- fmt: '# 1. The Scope of Security


    Security. An incredibly overloaded word in the IT world. It means so many different
    things in so many different contexts, but in the end, it is all about protecting
    sensitive and valuable resources against malicious usage.


    In IT, we have many layers of infrastructure and code that can be subject to malicious
    attacks, and arguably we should ensure that all these layers get the appropriate
    levels of protection.


    Of course, the growth of the Internet and the pursuit of reaching more people
    with our applications have opened more and more doors to cyber criminals trying
    to access these applications in illegitimate ways.


    It is also true that good care is not always taken to ensure that a properly secured
    set of services is being offered to the public. And sometimes, even when good
    care is taken, some hackers are still smart enough to overcome security barriers
    that, superficially, appear adequate.


    The first step is to define defense in depth (DiD) and its security layers. In
    general, DiD is a way to define how to develop the cybersecurity of the IT infrastructure
    by defining how all the defensive mechanisms are layered in order to protect and
    secure data and information. A failing DiD or too weak development might be a
    consequence of a cybersecurity attack on the IT infrastructure.


    Let’s understand a bit more about the mechanisms part of DiD. First of all, DiD
    is made of three major controls:


    * **Administrative controls**: Policies, procedures, guidelines, awareness programs,
    etc.

    * **Technical controls**: Firewalls, antivirus, intrusion prevention systems (IPS),
    etc.

    * **Physical Controls**: Network and server rooms, video surveillance, etc.


    Figure [1-1](#310331_2_En_1_Chapter.xhtml#Fig1) shows the typical DiD mechanisms
    that define the IT infrastructure security layers.


    ![../images/310331_2_En_1_Chapter/310331_2_En_1_Fig1_HTML.jpg](images/310331_2_En_1_Chapter/310331_2_En_1_Fig1_HTML.jpg)


    Figure 1-1

    DiD mechanisms and IT infrastruxture layers


    The three major security layers in an IT infrastructure are the network, the operating
    system (part of the endpoint security layer), and the application itself.


    ## The Network Security Layer


    The network security layer is probably the most familiar one in the IT world.
    When people talk about IT security, they normally think of network-level security—in
    particular, security that uses firewalls.


    Even though people often associate security with the network level, this is only
    a very limited layer of protection against attackers. Generally speaking, it can
    do no more than defend IP addresses and filter network packets addressed to certain
    ports in certain machines in the network.


    This is clearly not enough in the vast majority of cases, as traffic at this level
    is normally allowed to enter the publicly open ports of your various exposed services
    with no restriction at all. Different attacks can be targeted at these open services,
    as attackers can execute arbitrary commands that could compromise your security
    constraints. There are tools like the popular `nmap` ([`http://nmap.org/`](http://nmap.org/))
    that can be used to scan a machine to find open ports. The use of such tools is
    an easy first step to take in preparing an attack, because well-known attacks
    can be used against such open ports if they are not properly secured.


    A very important part of the network-layer security, in the case of web applications,
    is the use of Secure Sockets Layer (SSL) to encode all sensitive information sent
    along the wire, but this is related more to the network protocol at the application
    level than to the network physical level at which firewalls operate.


    ## The Operating System Layer


    The operating system layer is probably the most important one in the whole security
    schema, as a properly secured operating system (OS) environment can at least prevent
    a whole host machine from going down if a particular application is compromised.


    If an attacker is somehow allowed to have unsecured access to the operating system,
    they can basically do whatever they want—from spreading viruses to stealing passwords
    or deleting your whole server’s data and making it unusable. Even worse perhaps,
    they could take control of your computer without you even noticing, and use it
    to perform other malicious acts as part of a botnet. This layer can include the
    deployment model of the applications since you need to know your operating system’s
    permission scheme to ensure that you don’t give your applications unnecessary
    privileges over your machine. Applications should run as isolated as possible
    from the other components of the host machine.


    ## The Application Layer


    The main focus of this book will be on the application layer. The application
    security layer refers to all the constraints we establish in our applications
    to make sure that only the right people can do only the right things when working
    through the application.


    Applications, by default, are open to countless avenues of attack. An improperly
    secured application can allow an attacker to steal information from the application,
    impersonate other users, execute restricted operations, corrupt data, gain access
    to the operating system level, and perform many other malicious acts.


    In this book, we will cover application-level security, which is the domain of
    Spring Security. Application-level security is achieved by implementing several
    techniques, and there are a few concepts that will help you understand better
    what the rest of the book will cover. They are the main concerns that Spring Security
    addresses to provide your applications with comprehensive protection against threats.
    In the following three subsections, we shall introduce


    * Authentication

    * Authorization

    * ACLs


    ### Authentication


    The process of authentication allows an application to validate that a particular
    user is who they claim they are. In the authentication process, a user presents
    the application with information about herself (normally, a username and a password)
    that no one else knows. The application takes this information and tries to match
    it against information it has stored—normally, in a database or LDAP^([¹](#fn1))
    (Lightweight Directory Access Protocol) server. If the information provided by
    the user matches a record in the authentication server, the user is successfully
    authenticated in the system. The application will normally create an internal
    abstraction representing this authenticated user in the system. Figure [1-2](#310331_2_En_1_Chapter.xhtml#Fig2)
    shows the authentication mechanism.


    ![../images/310331_2_En_1_Chapter/310331_2_En_1_Fig2_HTML.jpg](images/310331_2_En_1_Chapter/310331_2_En_1_Fig2_HTML.jpg)


    Figure 1-2

    Simple, standard authentication mechanism


    ### Authorization


    When a user is authenticated, that only means that the user is known to the system
    and has been recognized by it. It doesn’t mean that the user is free to do whatever
    she wants in said system. The next logical step in securing an application is
    to determine which actions the user is allowed to perform, and which resources
    she has access to, and make sure that if the user doesn’t have the proper permissions
    she cannot carry out that particular action. This is the work of the authorization
    process. In the most common case, the authorization process compares the user’s
    set of permissions against the permissions required to execute a particular action
    in the application, and if a match is found, access is granted. On the other hand,
    if no match is found, access is denied. Figure [1-3](#310331_2_En_1_Chapter.xhtml#Fig3)
    shows the authorization mechanism.


    ![../images/310331_2_En_1_Chapter/310331_2_En_1_Fig3_HTML.jpg](images/310331_2_En_1_Chapter/310331_2_En_1_Fig3_HTML.jpg)


    Figure 1-3

    Simple authorization process. The authenticated user tries to access a secured
    resource'
