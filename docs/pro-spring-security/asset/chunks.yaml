    从示例中可以看出，使用Spring Security为您的应用程序配置LDAP的基本支持作为认证解决方案并不复杂。事实上，由于模块化架构和精心设计的XML命名空间，它非常直接。对我们来说，LDAP的复杂性在于LDAP本身。尽管它是一个简单的分层系统（非常类似于标准Unix系统中的文件系统），但某些术语和功能似乎有点复杂，并且与您在上一节中探索的基于数据库的解决方案非常不同。


    正如我们之前所说，在企业内部网环境中，使用LDAP作为您的认证解决方案非常有意义，因为公司的用户群已经以集中方式存储在类似LDAP的目录中。插入到这个已有的用户管理基础设施中，是重用公司内部用户信息的好方法，而不是编写一个需要与主存储库保持同步的并行认证数据存储。


    ## X.509 认证


    X.509认证是一种使用客户端证书而非用户名-密码组合来识别用户的认证方案。使用这种方法，客户端和服务器之间会发生一种称为*相互认证*的方案。实际上，相互认证意味着，作为安全套接字层（SSL）握手的一部分，服务器要求客户端通过提供证书来证明自己的身份。在生产级服务器中，传入的客户端证书需要由适当的证书颁发机构签发和签名。


    要使用客户端证书，应用程序需要在预期处理已认证用户的区域配置为使用SSL通道，因为X.509认证协议本身就是SSL协议的一部分。


