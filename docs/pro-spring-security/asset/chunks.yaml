- fmt: 'Please notice that we added a logout link to actually log out the user if
    needed. We will explain more in detail how to use Spring Security login and logout
    URL later in this chapter.


    You will now look in more detail at what is going on in the application and how
    the configuration you just defined is helping to secure the application. You will
    follow the request throughout its trip through the framework and look at the different
    steps that it takes. When you make the HTTP request to the configured URL, and
    after your Servlet container deals with it, the request lands in the `DelegatingFilterProxy`,
    which in turn delegates the processing to the security `FilterChainProxy`.


    In general, Spring Security utilizes a lot of filters. In the case of HTTP request
    filter, it will be used to:


    - Intercept the request.

    - Detect authentication (or absence of).

    - Redirect to authentication entry point.

    - Pass the request to authorization service.

    - Send the request to the servlet or throw security exception.


    In Spring Security v5, the most important filters are the following:


    **Security Filter Chain:**


    - `DelegatingFilterProxy`

    - `FilterChainProxy`


    **Core Security Filters:**


    - `FilterSecurityInterceptor`

    - `ExceptionTranslationFilter`

    - `SecurityContextPersistenceFilter`

    - `UsernamePasswordAuthenticationFilter`

    - `AnonymousAuthenticationFilter`


    **Basic and Digest Authentication Filters:**


    - `BasicAuthenticationFilter`

    - `DigestAuthenticationFilter`


    **Session Management:**


    - `SessionManagementFilter`


    **CSRF Caveats:**


    - `HiddenHttpMethodFilter`


    **Preauthentication Scenarios:**


    - `AbstractPreAuthenticatedProcessingFilter`


    **`LogoutSuccessHandler`:**


    - `LogoutFilter`


    **Spring Security-Aware `HttpServletRequestWrapper`:**


    - `SecurityContextHolderAwareRequestFilter`


    **`RequestCache`:**


    - `RequestCacheFilter`


    The HTTP request and authentication processes and filters are explained in Chapter
    [4](#310331_2_En_4_Chapter.xhtml).


    Let’s see what happens when incorrect or correct credentials are provided when
    logging in. When the browser is redirecting and asks for the URL `/login`, the
    following occurs:


    - The process is the same as for the first request until it reaches the `DefaultLoginPageGeneratingFilter`.
    At this point, the filter detects that the request is for the URL `/login` and
    writes the login form’s HTML data directly in the response object. Then the response
    is rendered.


    Now try to log in with incorrect credentials. Let’s follow the request through
    the framework to see what happens:


    ![../images/310331_2_En_5_Chapter/310331_2_En_5_Fig6_HTML.jpg](images/310331_2_En_5_Chapter/310331_2_En_5_Fig6_HTML.jpg)


    **Figure 5-6** Authentication filter when authentication details are incorrect


    1.  In the login form, type the username **user** and the password **uspass**.

    2.  When the form is submitted, the filters are activated again in the same order
    as before. This time, however, when the request arrives at the `UsernamePasswordAuthenticationFilter`,
    the filter checks whether the request is for the URL `/login` and sees that this
    is indeed the case. The filter extracts the username and password authentication
    information from the HTTP request parameters `username` and `password`, respectively.
    With this information, it creates the `UsernamePasswordAuthenticationToken Authentication`
    object, which then sends it to the `AuthenticationManager` (or more exactly, its
    default implementation, `ProviderManager`) for authentication.

    3.  The `DaoAuthenticationProvider` gets called from the `ProviderManager` with
    the `Authentication` object. The `DaoAuthentication` provider is an implementation
    of `AuthenticationProvider`, which uses a strategy of `UserDetailsService` to
    retrieve the users from whichever storage they live in. With the configuration
    you currently have, it will try to find a user with the username of user using
    the configured `InMemoryUserDetailsManager` (the implementation of `UserDetailsService`
    that maintains an in-memory user storage in a `java.util.Map`). Because there
    is no user with this username, the provider throws a `UsernameNotFoundException`
    exception.

    4.  The provider itself catches this exception and converts it into a `BadCredentialsException`
    to hide the fact that there is no such user in the application; instead, it treats
    the error as a common username-password combination error.

    5.  The exception is caught by the `UsernamePasswordAuthenticationFilter`. This
    filter delegates to an instance of an implementation of `AuthenticationFailureHandler`,
    which in turn decides to redirect the response to the URL `/login?error`. This
    way, the login form is shown again in the browser with an error message displayed.
    You can see this interaction in Figure [5-6](#310331_2_En_5_Chapter.xhtml#Fig6).


    Let’s now log in with the correct credentials.


    First, create a new endpoint in the controller to retrieve some simple text. In
    the controller `UserController`, create the method from Listing [5-6](#310331_2_En_5_Chapter.xhtml#PC7)
    called `/showmovie`.


    ```

    @GetMapping("/showmovie")

    @ResponseBody

    public String showMovie() {

    return "movie x";

    }

    ```


    **Listing 5-6** A Simple Endpoint Method That Returns a Simple String


    Restart the application, go back to the URL `http:/localhost:8080/favoritesmovies/showmovie`,
    and type **admin** as the username and **admin123** as the password in the form.
    Then click the Login button.


    - The request follows the same filter journey as before. This time, `InMemoryUserDetailsManager`
    finds a user with the requested username and returns that to `DaoAuthenticationProvider`,
    which creates a successful `Authentication` object.

    - After successful authentication, the `UsernamePasswordAuthenticationFilter`
    delegates to an instance of `SavedRequestAwareAuthenticationSuccessHandler`, which
    looks for the original requested URL (`/showmovie`) in the session and redirects
    the response to that URL.


    When `http://localhost:8080/favoritesmovies/showmovie` is requested, the request
    works its way through the filter chain as in the previous cases. This time, though,
    you already have a fully authenticated entity in the system. The request arrives
    in the `FilterSecurityInterceptor`.


    ![../images/310331_2_En_5_Chapter/310331_2_En_5_Fig8_HTML.jpg](images/310331_2_En_5_Chapter/310331_2_En_5_Fig8_HTML.jpg)


    **Figure 5-8** Overall flow of a successful authentication and authorization process


    - The `FilterSecurityInterceptor` receives an access request to the URL `/showmovie`.
    Then it recovers the necessary credentials to access that URL (`ROLE_ADMIN`).

    - The `AffirmativeBased` access-decision manager gets called and in turn calls
    the `RoleVoter` voter. The voter evaluates the list of authorities of the authenticated
    entity and compares them with the required credentials to access the resource.
    Because the voter finds a match (`ROLE_ADMIN` is in both the `Authentication`
    authorities and the resource’s `config` attributes), it votes with an `ACCESS_GRANTED`
    vote.

    - The `FilterSecurityInterceptor` forwards the request to the next element in
    the request-handling chain, which in this case is Spring’s `DispatcherServlet`.'
