    ## Creating the Basic Tables


    Next, you create the two SQL files you are referencing in the configuration file
    and put them in the root of the classpath. Listing 6-8 shows the file `security-schema.sql`,
    and Listing 6-9 shows the file `users.sql`. Later, you will see groups coming
    into the picture as well.


    ```sql

    INSERT INTO USERS VALUES(''mnardone'',''nardone'',true);

    INSERT INTO AUTHORITIES VALUES(''mnardone'',''ROLE_NARDONE_MEMBER'');

    COMMIT;

    ```


    Listing 6-9 `users.sql` Users That Can Be Used in the Application with Their Authorities


    ```sql

    CREATE TABLE USERS(USERNAME VARCHAR_IGNORECASE(50) NOT NULL PRIMARY KEY,

    PASSWORD VARCHAR_IGNORECASE(50) NOT NULL,

    ENABLED BOOLEAN NOT NULL);

    CREATE TABLE AUTHORITIES(

    USERNAME VARCHAR_IGNORECASE(50) NOT NULL PRIMARY KEY,

    AUTHORITY VARCHAR_IGNORECASE(50) NOT NULL,

    CONSTRAINT FK_AUTHORITIES_USERS

    FOREIGN KEY(USERNAME) REFERENCES USERS(USERNAME));

    CREATE TABLE GROUPS(

    id BIGINT NOT NULL PRIMARY KEY,

    GROUP_NAME VARCHAR_IGNORECASE(50) NOT NULL);

    CREATE TABLE GROUP_MEMBERS(

    group_id BIGINT NOT NULL,

    username VARCHAR_IGNORECASE(50) NOT NULL);

    CREATE TABLE GROUP_AUTHORITIES(

    group_id BIGINT NOT NULL,

    authority VARCHAR_IGNORECASE(50) NOT NULL);

    ```


    Listing 6-8 `security-schema.sql` Defines the Needed Security Database Schema
    for Storing Users and Authorities


    Everything should be set up now, so let’s run the application on a Server Tomcat
    9 stand-alone server and log in and access the URL `http://localhost:8080/pss01_Security/login`
    with the username `mnardone` and the password `nardone`. Figures 6-5 and 6-6 show
    the login page and the `admin.jsp` page we got in our execution of the example.


    What is happening here is pretty simple and similar to what you have been working
    with up until now. When you define the element `<security:jdbc-user-service>`
    in the configuration file `security-security.xml`, Spring Security instantiates
    a different kind of `UserDetailsService` at startup than the one used for in-memory
    user details.


    The instantiated `UserDetailsService` is an `org.springframework.security.provisioning.JdbcUserDetailsManager`.
    This instance gets injected into the `DaoAuthenticationProvider` for retrieving
    users from a JDBC datastore.


    ![../images/310331_2_En_6_Chapter/310331_2_En_6_Fig5_HTML.jpg](images/310331_2_En_6_Chapter/310331_2_En_6_Fig5_HTML.jpg)


    Figure 6-5 Login screen


    It gets redirected to `http://localhost:8080/pss01_Security/admin`, as shown in
    Figure 6-6.


    ![../images/310331_2_En_6_Chapter/310331_2_En_6_Fig6_HTML.jpg](images/310331_2_En_6_Chapter/310331_2_En_6_Fig6_HTML.jpg)


    Figure 6-6 The Admin page shown after a successful authentication


    ## Using Groups


    To use groups now, let’s modify the `users.sql` file a little bit and add the
    lines from Listing 6-10 to it. These lines effectively create a group and put
    the user `mnardone` into that group. You should also remove the SQL where you
    insert into the `AUTHORITIES` table the role for user `mnardone`.


    ```sql

    INSERT INTO GROUPS VALUES(1,''GROUP_MEMBERS_NARDONE'');

    INSERT INTO GROUP_MEMBERS VALUES(1,mnardone);

    INSERT INTO GROUP_AUTHORITIES VALUES(1,''ROLE_NARDONE_MEMBER'');

    ```


    Listing 6-10 The `users.sql` Lines Used to Create a Group and Put Members into
    the Group'
  raw: "```\npackage com.apress.pss.springsecurity.controller;\nimport org.springframework.security.core.context.SecurityContextHolder;\n\
