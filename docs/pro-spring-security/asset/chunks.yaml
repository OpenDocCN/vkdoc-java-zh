    movies.jsp 页面

    ```


    由于目前尚未要求用户认证，你可以通过构建应用程序、打开 URL `http://localhost:8080/favoritesmovies/movies`
    来测试新功能，结果如图 5-3 所示。


    ![../images/310331_2_En_5_Chapter/310331_2_En_5_Fig3_HTML.jpg](img/310331_2_En_5_Fig3_HTML.jpg)


    图 5-3

    使用 .jsp 网页执行项目


    如你所见，使用 `/movies` 控制器的应用程序将触发 `movies.jsp` 页面并显示电影列表。


    现在让我们进行配置，使得 `/movies` 控制器要求经过认证且拥有 ADMIN 角色的用户才能访问。将第 3 章的 `SecurityConfiguration`
    Java 类更新为代码清单 5-5 所示的代码。


    ```

    package com.apress.pss.springsecurity.configuration;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.context.annotation.Bean;

    import org.springframework.context.annotation.Configuration;

    import org.springframework.security.config.annotation.authentication.builders.AuthenticationManagerBuilder;

    import org.springframework.security.config.annotation.web.builders.HttpSecurity;

    import org.springframework.security.config.annotation.web.configuration.EnableWebSecurity;

    import org.springframework.security.config.annotation.web.configuration.WebSecurityConfigurerAdapter;

    import org.springframework.security.crypto.bcrypt.BCryptPasswordEncoder;

    import org.springframework.security.crypto.password.PasswordEncoder;

    @Configuration

    @EnableWebSecurity

    public class SecurityConfiguration extends WebSecurityConfigurerAdapter {

    @Autowired

    PasswordEncoder passwordEncoder;

    @Override

    protected void configure(AuthenticationManagerBuilder auth) throws Exception {

    auth.inMemoryAuthentication()

    .passwordEncoder(passwordEncoder)

    .withUser("admin").password(passwordEncoder.encode("admin123")).roles("ADMIN");

    }

    @Bean

    public PasswordEncoder passwordEncoder() {

    return new BCryptPasswordEncoder();

    }

    @Override

    protected void configure(HttpSecurity http) throws Exception {

    http.authorizeRequests()

    .antMatchers("/", "/index", "/login").permitAll()

    .antMatchers("/**").hasRole("ADMIN")

    .and().formLogin()

    .and().logout().logoutSuccessUrl("/index").permitAll()

    .and().csrf().disable();

    }

    }

    代码清单 5-5

    SecurityConfiguration Java 类

    ```


    这段代码非常简单，基本上 `/`、`/index` 和 `/login` 控制器无需认证即可访问，而通过 `/**` 匹配的任何其他页面都需要经过认证且拥有
    ADMIN 角色的用户才能访问。你将使用 Spring Security v5 自动生成的默认登录页面。当使用注销链接时，需要执行注销操作；这将在后面解释。最后，如第
    3 章所述，跨站请求伪造功能已被禁用。


    接下来，将 `movies.jsp` 页面更新为：


    ```


    Spring Security 认证示例


    我最喜欢的电影列表：

    Il Postino

    La vita e'' bella

    NottingHill


    ">注销


    ```


    现在，你已经拥有了此示例所需的所有文件并完成了配置。你希望像之前一样访问相同的 URL 来进入 `movies.jsp` 页面，但这次 Spring Security
    会要求你提供管理员凭证才能访问。重启应用程序，并在浏览器的地址栏中粘贴以下 URL：`http://localhost:8080/favoritesmovies/movies`。


    这一次，你的浏览器应该会被重定向到 URL `http://localhost:8080/favoritesmovies/login`，并显示你在第 3 章中熟悉的登录表单，如图
    5-4 所示。以 `admin/admin123` 身份登录，你就可以作为管理员访问 `movies.jsp 页面`。


    ![../images/310331_2_En_5_Chapter/310331_2_En_5_Fig4_HTML.jpg](img/310331_2_En_5_Fig4_HTML.jpg)


    图 5-4

    Spring Security v5 登录表单


    一旦管理员凭证正确，Spring Security 将允许访问 `movies.jsp` 页面，如图 5-5 所示。


    ![../images/310331_2_En_5_Chapter/310331_2_En_5_Fig5_HTML.jpg](img/310331_2_En_5_Fig5_HTML.jpg)


    图 5-5

    使用管理员凭证访问的电影页面

