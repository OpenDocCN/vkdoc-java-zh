    # 4. Spring Security Architecture and Design


    In the previous chapter, you developed an initial application secured with Spring
    Security. You got an overview of the way this application worked and looked in
    detail at some of the Spring Security components that are put into action in common
    Spring Security–secured applications. In this chapter, we are going to extend
    those explanations and delve deeply into the framework.


    We’ll look at the main components of the framework, explain the work of the servlet
    filters for securing web applications, look at how Spring aspect-oriented programming
    helps you add security in an unobtrusive way, and in general, show how the framework
    is designed internally.


    ## What Components Make Up Spring Security?


    In this section, we’ll take a look at the major components that make Spring Security
    work. We’ll offer a big-picture overview of the framework and then delve deeper
    into each major component.


    ### The 10,000-Foot View


    Spring Security is a relatively flexible framework that aims to make it easy for
    the developer to implement security in an application. At the most general level,
    it’s a framework composed of intercepting rules for granting, or not granting,
    access to resources. Figure [4-1](#310331_2_En_4_Chapter.xhtml#Fig1) illustrates
    this.


    ![../images/310331_2_En_4_Chapter/310331_2_En_4_Fig1_HTML.jpg](images/310331_2_En_4_Chapter/310331_2_En_4_Fig1_HTML.jpg)


    Figure 4-1


    Spring Security 10,000-foot overview


    From this view, you can think of Spring Security simply as an extra layer built
    on top of your application, wrapping specific entry points into your logic with
    determined security rules.


    ### The 1,000-Foot View


    Going into a little more detail, we arrive at AOP and servlet filters.


    Spring Security’s interception model of security applies to two main areas of
    your application: URLs and method invocations. Spring Security wraps around these
    two *entry points* of your application and allows access only when the security
    constraints are satisfied. Both the method call and the filter-based security
    depend on a central *Security Interceptor*, where the main logic resides to make
    the decision whether or not access should be granted. In Figure [4-2](#310331_2_En_4_Chapter.xhtml#Fig2),
    you can see this more detailed overview of the framework.


    ![../images/310331_2_En_4_Chapter/310331_2_En_4_Fig2_HTML.jpg](images/310331_2_En_4_Chapter/310331_2_En_4_Fig2_HTML.jpg)


    Figure 4-2


    In this view, both method calls and HTTP requests try to access a resource, but
    first they must go through the Security Interceptor


    ### The 100-Foot View


    Spring Security might seem simple conceptually, but internally there is a lot
    going on in a very well-built software tool. This next overview will show you
    the main collaborating parts that participate in the general process of ensuring
    that your security constraints are enforced. This is particularly achievable with
    an open source project like Spring Security which allows you to get into the framework
    itself and appreciate its design and architecture by accessing the source code
    directly. After that, we’ll delve deeper into the implementation details.


    For us, what follows is the best way to understand Spring Security from the inside.
    The enumeration of what we consider to be the main components of the framework
    will help you know where everything belongs and how your application is enforcing
    the security rules that you specify for it.


    The most important Spring Security internal architecture core modules are


    *   Authentication


    *   Authorization


    The process of the Authentication and Authorization modules were introduced in
    Chapter [1](#310331_2_En_1_Chapter.xhtml).


    Figure [4-3](#310331_2_En_4_Chapter.xhtml#Fig3) provides an illustration of all
    the concept/components.


    ![../images/310331_2_En_4_Chapter/310331_2_En_4_Fig3_HTML.jpg](images/310331_2_En_4_Chapter/310331_2_En_4_Fig3_HTML.jpg)


    Figure 4-3


    The key components of Spring Security'
