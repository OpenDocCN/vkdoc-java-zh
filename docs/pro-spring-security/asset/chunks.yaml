    [7-10](#310331_2_En_7_Chapter.xhtml#PC11), [7-11](#310331_2_En_7_Chapter.xhtml#PC12),
    [7-12](#310331_2_En_7_Chapter.xhtml#PC13) and [7-13](#310331_2_En_7_Chapter.xhtml#PC14),
    respectively.


    ```

