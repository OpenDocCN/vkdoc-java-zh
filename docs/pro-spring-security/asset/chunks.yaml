- fmt: "# This chapter will introduce access control lists (ACLs) in the context of\
    \ Spring Security\n\nAccess control lists can be thought of as an extension to\
    \ the business-level security rules we reviewed in Chapter [6](#310331_2_En_6_Chapter.xhtml).\
    \ In this case, however, we’ll be looking at more fine-grained rules to secure\
    \ individual domain objects, instead of the relatively coarse-grained rules used\
    \ to secure method calls on services.\n\nWhat this means is that ACLs are in charge\
    \ of securing instances of domain classes (such as a `Forum` class, a `Cart` class,\
    \ and so on), while the standard method-level rules secure entry points determined\
    \ by methods (like a `Service` method or a `DAO` method).\n\nSecuring domain objects\
    \ with ACLs is conceptually simple. The idea is that any user has a certain level\
    \ of access (read, write, none, and so on) to each domain object. A user’s level\
    \ of access (*permissions*) to a particular domain object depends on the user,\
    \ or the role or group to which the user belongs.\n\nAs in other chapters, we’ll\
    \ explain each concept as we walk through an example. The example will be, as\
    \ usual, a very simple and not *real-world* application pared down to focus on\
    \ the concepts relevant to understanding how ACLs work.\n\n## The Security Example\
    \ Application\n\nThe example application is a simple forum system with two types\
    \ of users: standard users and administrator users. Any user can create a forum\
    \ entry, but only the user who created the entry can edit it; the other standard\
    \ users can only read it. Administrator users can read or delete an entry, but\
    \ they cannot edit it. This gives us all the combinations we need to show the\
    \ full power of ACLs. The permission logic is shown in Figure [7-1](#310331_2_En_7_Chapter.xhtml#Fig1).\
    \ The action is shown with a solid line and permissions are shown with a dotted\
    \ line.\n\n![../images/310331_2_En_7_Chapter/310331_2_En_7_Fig1_HTML.jpg](images/310331_2_En_7_Chapter/310331_2_En_7_Fig1_HTML.jpg)\n\
    \n**Figure 7-1** Permission logic for forum entries\n\nSo let’s set up the example\
    \ project.\n\nBut first, let’s review the required database schema to support\
    \ ACLs in the application. Currently, this is the only support for ACLs in Spring\
    \ Security, and it needs to be configured for the whole functionality to work.\
    \ Spring Security’s ACL module comes with the SQL scripts necessary to define\
    \ its own support in a file named `createAclSchema.sql` that currently targets\
    \ the HSQL database. (There is also an alternative file called `createAclSchemaPostgres.sql`\
    \ that targets the PostgreSQL database.) You can find this file in the source\
    \ code of the Spring Security ACL module or inside the `.jar` file itself: `spring-security-acl-3.1.3.RELEASE.jar`.\
    \ It will be in the `src/main/resources` folder in the source code, which means\
    \ it will be in the root of the `classpath`.\n\nListing [7-1](#310331_2_En_7_Chapter.xhtml#PC1)\
    \ shows the contents of this file.\n\n```\n-- ACL schema sql used in HSQLDB\n\
    -- drop table acl_entry;\n-- drop table acl_object_identity;\n-- drop table acl_class;\n\
    -- drop table acl_sid;\ncreate table acl_sid(\nid bigint generated by default\
    \ as identity(start with 100) not null primary key,\nprincipal boolean not null,\n\
    sid varchar_ignorecase(100) not null,\nconstraint unique_uk_1 unique(sid,principal));\n\
    create table acl_class(\nid bigint generated by default as identity(start with\
    \ 100) not null primary key,\nclass varchar_ignorecase(100) not null,\nconstraint\
    \ unique_uk_2 unique(class)\n);\ncreate table acl_object_identity(\nid bigint\
    \ generated by default as identity(start with 100) not null primary key,\nobject_id_class\
    \ bigint not null,\nobject_id_identity bigint not null,\nparent_object bigint,\n\
    owner_sid bigint,\nentries_inheriting boolean not null,\nconstraint unique_uk_3\
    \ unique(object_id_class,object_id_identity),\nconstraint foreign_fk_1 foreign\
    \ key(parent_object)references acl_object_identity(id),\nconstraint foreign_fk_2\
    \ foreign key(object_id_class)references acl_class(id),\nconstraint foreign_fk_3\
    \ foreign key(owner_sid)references acl_sid(id)\n);\ncreate table acl_entry(\n\
    id bigint generated by default as identity(start with 100) not null primary key,\n\
    acl_object_identity bigint not null,\nace_order int not null,\nsid bigint not\
    \ null,\nmask integer not null,\ngranting boolean not null,\naudit_success boolean\
    \ not null,\naudit_failure boolean not null,\nconstraint unique_uk_4 unique(acl_object_identity,ace_order),\n\
    constraint foreign_fk_4 foreign key(acl_object_identity) references acl_object_identity(id),\n\
    constraint foreign_fk_5 foreign key(sid) references acl_sid(id)\n);\n```\n\n**Listing\
    \ 7-1** The `createAclSchema.sql` That Defines the Needed Tables for Supporting\
    \ ACL in Spring Security\n\nTo understand the meaning of these tables, you need\
    \ to appreciate the main abstractions in Spring Security’s ACL support:\n\n- **SID\
    \ (security identity)**: An abstraction that represents a security identity in\
    \ the system to be used by the ACL infrastructure. A security identity can be\
    \ a user, role, group, and so forth. It maps to the table `ACL_SID`.\n\n- **Access\
    \ control entry (ACE)**: Represents an individual permission in the particular\
    \ ACL making relationships between objects, SIDs, and permissions. It maps to\
    \ the table `ACL_ENTRY`.\n\n- **Object identity**: Represents the identity of\
    \ an individual domain object instance. They are the entities on which the permissions\
    \ are set. It maps to the table `ACL_OBJECT_IDENTITY`.\n\nLet’s break down the\
    \ database tables into their main attributes to see their meaning. (We won’t explain\
    \ the ID attributes because they are the surrogate identifiers of each row in\
    \ the pertinent table, and they serve to, well, identify the particular entry.)\
    \ Figure [7-2](#310331_2_En_7_Chapter.xhtml#Fig2) shows the tables in graphical\
    \ form followed by the explanation of the attributes.\n\n![../images/310331_2_En_7_Chapter/310331_2_En_7_Fig2_HTML.jpg](images/310331_2_En_7_Chapter/310331_2_En_7_Fig2_HTML.jpg)\n\
    \n**Figure 7-2** Tables in the ACL schema\n\nHere are the main attributes (columns)\
    \ in the tables from Figure [7-2](#310331_2_En_7_Chapter.xhtml#Fig2):\n\n- Table\
    \ `ACL_SID`\n  - `principal`: A Boolean that indicates if the particular SID is\
    \ a principal or not. Remember that the SID can represent a group or role.\n \
    \ - `sid`: The name of the SID. It can be a username of a principal, a role name,\
    \ and so on.\n\n- Table `ACL_CLASS`\n  - `class`: The name of the class of the\
    \ domain objects you can have in the ACL system.\n\n- Table `ACL_OBJECT_IDENTITY`\n\
    \  - `object_id_identity`: A number that identifies uniquely (when combined with\
    \ the `object_id_class`) the particular instance of the domain object you are\
    \ representing.\n  - `object_id_class`: A foreign key to the table `ACL_CLASS`\
    \ that identifies the class of the domain object you are representing."
