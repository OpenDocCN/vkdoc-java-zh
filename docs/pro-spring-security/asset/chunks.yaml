    \ be aware of Spring Security.\n\n*   Configure the users and roles that will\
    \ be part of the system.\n\n*   Configure the URLs that you want to secure.\n\n\
    *   Create all needed Java and web files.\n\n*   Run the Spring Security v5 project\
    \ using the external Tomcat Server v9.\n\nAs a first step, you will clone this\
    \ project and call it pss01_Security, so you will find both samples when downloading\
    \ the code.\n\nOnce you clone the project from Pss01 to pss01_Security, you add\
    \ the Maven framework support to the project. All the files and the pss01_Security\
    \ project structure are shown in Figure [3-12](#310331_2_En_3_Chapter.xhtml#Fig12).\n\
    \n![../images/310331_2_En_3_Chapter/310331_2_En_3_Fig12_HTML.jpg](images/310331_2_En_3_Chapter/310331_2_En_3_Fig12_HTML.jpg)\n\
    \nFigure 3-12\n\nNew Maven project to add Spring Security\n\n### Note\n\nIt is\
    \ possible to implement the Spring Security in a Spring application using XML-\
    \ or Java-based configurations. In this chapter, you will use the Java configuration\
    \ for your Spring Security Web Application since in general it is hardly suggested\
    \ to use XML configuration as minimum as possible.\n\n## Spring Security Taglibs\n\
    \nThe Spring Security Taglibs provides the support for accessing security information\
    \ and applying security constraints in JSPs pages.\n\nTo secure the view layer\
    \ of the application, you can use\n\n*   Authorize Tag\n\n*   Authentication Tag\n\
    \n*   Accesscontrollist Tag\n\n*   Csrfinput Tag\n\n*   CsrfMetaTags Tag\n\nYou\
    \ will need to add the spring-security-taglibs dependency to your `pom.xml`:\n\
    \n```\norg.springframework.security\nspring-security-taglibs\n5.1.5.RELEASE\n\n\
    ```"
  trans: "\n## 创建新的 Spring Security v5 项目\n\nSpring Security 基于前一节中定义的概念构建，并很好地集成到通用的\
    \ Spring 生态系统中。你需要充分理解这些概念，才能最大限度地利用 Spring Security v5。不过，你也可以在不完全了解这些细节的情况下开始使用\
    \ Spring Security，然后在学习过程中逐步掌握，并尝试更高级的功能。\n\n创建新的 Spring 项目有两种方式。\n\n你可以通过 Spring\
    \ Boot 或任何 IDE 工具（本例中为 IntelliJ IDEA 2019.2）来创建 Spring 项目。\n\n那么，什么是 Spring Boot？Spring\
    \ Boot 可用于轻松生成独立的、生产级的、基于 Spring 的应用程序。\n\n为了引导你的 Spring 应用程序，你可以使用 Spring Initializr。Spring\
    \ Initializr 是一个基于浏览器的 Web 应用程序和 REST API，它能为你的 Spring 应用程序生成一个现成的 Spring 项目骨架结构。\n\
    \n要通过 Spring Boot 生成 Spring 应用程序，请访问以下网页并填写所有必要信息：[`https://spring.io/projects/spring-boot`](https://spring.io/projects/spring-boot)。\n\
    \n请注意，本书中的所有 Spring 代码均使用 IntelliJ IDEA Ultimate Edition 2019.2 工具开发。\n\n你想创建哪种\
    \ Spring Security Maven Web 应用程序？\n\n让我们创建一个简单的 Spring Security 示例：当用户请求欢迎页面时，他们无需进行身份验证即可访问；而访问管理页面则需要通过用户名和密码提供管理员安全凭证。\n\
    \n如果你使用的是 Spring Security 参考版本的独立安装，并且决定不使用任何 IDE 工具来构建 Maven 项目，你会在安装目录中找到许多文件夹。目录中的大多数文件夹对应着独立的子项目或模块，这些模块将\
    \ Spring Security 的功能拆分为更离散、更专业的单元。\n\n### Spring Security v5 源码\n\n开源软件对软件开发人员来说有一个宝贵的特性：可以免费访问所有源代码。通过这一点，我们可以了解我们喜爱的工具和框架的内部工作原理，也可以学习其他（可能是非常优秀的）开发人员的工作方式，包括他们使用的实践、技术和模式。通常，免费访问源代码还能让我们为自己的开发收集想法和经验。从更实际的角度来看，访问源代码使我们能够在自己的应用程序上下文中调试这些应用程序；我们可以发现错误，或者仅仅是通过它们来跟踪我们应用程序的执行过程。\n\
    \n目前，Spring Security 和大多数 Spring 项目都托管在 GitHub 上。你可能知道 GitHub（[`https://github.com/`](https://github.com/)）。如果你不知道，绝对应该去看看，因为它已经成为许多使用多种编程语言的开源项目的标准公共源代码仓库。\n\
    \nGitHub 是一个 Git 仓库的托管服务，拥有非常友好的管理界面。Spring Security 项目可以在 SpringSource 的 GitHub\
    \ 通用板块中找到，地址为 [`https://github.com/SpringSource/spring-security`](https://github.com/SpringSource/spring-security)。要获取代码，只需按照本章前面所示的方法下载并安装即可。\n\
    \n如果你需要在本地安装 Spring Security 5.1.5.RELEASE，解压后它将包含多个模块和文件夹，如图 3-11 所示。\n\n![../images/310331_2_En_3_Chapter/310331_2_En_3_Fig11_HTML.jpg](img/310331_2_En_3_Fig11_HTML.jpg)\n\
    \n图 3-11\n\nSpring Security v5.1.5.RELEASE 文件夹结构\n\n以下是 Spring Security v5.1.5.RELEASE\
    \ 中包含的一些最重要模块的简要说明：\n\n*   Core (spring-security-core)：Spring Security 关于身份验证和访问控制的核心类和接口位于此处。\n\
    *   Remoting (spring-security-remoting)：如果你需要 Spring Remoting，这是包含必要类的模块。\n* \
    \  Aspect (spring-security-aspects)：Spring Security 中的面向切面编程支持。\n*   Config (spring-security-config)：提供\
    \ XML 和 Java 配置支持。\n*   Crypto (spring-security-crypto)：包含加密支持。\n*   Data (spring-security-data)：与\
    \ Spring Data 的集成。\n*   Messaging (spring-security-messaging)\n*   OAuth2：Spring\
    \ Security 中对 OAuth 2.x 的支持：\n    *   Core (spring-security-oauth2-core)\n   \
    \ *   Client (spring-security-oauth2-client)\n    *   JOSE (spring-security-oauth2-jose)\n\
    *   OpenID (spring-security-openid)：OpenID Web 身份验证支持。\n*   CAS (spring-security-cas)：CAS（中央认证服务）客户端集成。\n\
    *   TagLib (spring-security-taglibs)：关于 Spring Security 的各种标签库。\n*   Test (spring-security-test)：测试支持。\n\
    *   Web (spring-security-web)：包含 Web 安全基础设施代码，例如各种过滤器和其他的 Servlet API 依赖。\n\n\
    ### 注意\n\n请记住，你使用的是 IntelliJ IDEA 工具，其中已集成并配置了 Spring Security 5.1.5.RELEASE。Spring\
    \ Security 的使用是通过 `pom.xml` 文件开头的 XML 链接完成的。\n\n让我们构建你的 Spring Security 5 Java\
    \ Web 应用程序。\n\n以下是构建简单 Spring Security Maven Web 应用程序项目需要遵循的步骤：\n\n*   克隆之前名为\
    \ Pss01 的简单 Maven 项目。\n*   将所需的 Spring Framework 和 Spring Security v5 库导入项目（导入到\
    \ `pom.xml` 文件中）。\n*   配置项目以识别 Spring Security。\n*   配置将成为系统一部分的用户和角色。\n*   配置你想要保护的\
    \ URL。\n*   创建所有必需的 Java 和 Web 文件。\n*   使用外部 Tomcat Server v9 运行 Spring Security\
    \ v5 项目。\n\n作为第一步，你将克隆此项目并将其命名为 pss01_Security，这样在下载代码时你将看到两个示例。\n\n将项目从 Pss01\
    \ 克隆到 pss01_Security 后，你需要为项目添加 Maven 框架支持。所有文件及 pss01_Security 项目结构如图 3-12 所示。\n\
    \n![../images/310331_2_En_3_Chapter/310331_2_En_3_Fig12_HTML.jpg](img/310331_2_En_3_Fig12_HTML.jpg)\n\
    \n图 3-12\n\n用于添加 Spring Security 的新 Maven 项目\n\n### 注意\n\n可以在 Spring 应用程序中使用基于\
    \ XML 或 Java 的配置来实现 Spring Security。在本章中，你将使用 Java 配置来构建你的 Spring Security Web\
    \ 应用程序，因为通常建议尽可能少地使用 XML 配置。\n\n## Spring Security Taglibs\n\nSpring Security\
    \ Taglibs 提供了在 JSP 页面中访问安全信息和应用安全约束的支持。\n\n为了保护应用程序的视图层，你可以使用\n\n*   Authorize\
    \ 标签\n*   Authentication 标签\n*   Accesscontrollist 标签\n*   Csrfinput 标签\n*   CsrfMetaTags\
    \ 标签\n\n你需要将 spring-security-taglibs 依赖添加到你的 `pom.xml` 中：\n\n```\norg.springframework.security\n\
    spring-security-taglibs\n5.1.5.RELEASE\n\n```\n"
- fmt: "# Introducing Cross-Site Request Forgery\n\nWith a cross-site request forgery\
    \ (CSRF) attack a hacker can modify the state of any HTTP method (`GET` or `POST`),\
    \ redirecting the client, for instance, by clicking a modified link to a not-secure\
    \ web page with the result of stealing a user’s sensitive info.\n\nLet’s have\
    \ a look to what CSRF is and how to prevent CSRF attacks using Spring Security.\
    \ Common CSRF attacks include:\n\n- HTTP GET Request: Convincing the victim to\
    \ click a fake GET link to get sensitive information (e.g. username/password,\
    \ etc.)\n- HTTP POST request: Same as GET but using the `POST` method\n\nIn general,\
    \ to use the Spring Security CSRF protection, we must ensure the right HTTP methods\
    \ like (`PATCH`, `POST`, `PUT`, `DELETE`, etc.) can modify state.\n\nIn Spring\
    \ Security v5, CSRF protection is enabled by default in the Java configuration.\n\
    \nIf you must disable it, you can add the following: `.csrf().disable()`.\n\n\
    If you need to enable the CSRF protection on the server side, you need to include\
    \ the CSRF token in your requests on the client side by adding this line:\n\n\
    ```\n.\n```\n\n# Adding Spring Security v5 (and Spring Core Itself) to the Project\n\
    \nIn this section, you’ll start your journey into the inner workings of the framework\
    \ and see its main building blocks and how it works. The information will be mostly\
    \ introductory. We’ll conduct a full, in-depth review of the framework in the\
    \ next chapter. We could just tell you what to add to the project to make the\
    \ application work, but we think it’s better to tell you first what the different\
    \ components of the framework are so that you can start coding with a better knowledge\
    \ of how the framework is built. This means that we will tell you how to grab\
    \ the source code of the project and build it, and then explain in a general way\
    \ the different modules that make up the framework.\n\nYour next step is to add\
    \ the Spring Security 5.1.4.RELEASE version, shown in Listing [3-3](#310331_2_En_3_Chapter.xhtml#PC6),\
    \ in your Maven Web Application by adding to the `pom.xml` file the following\
    \ JAR dependencies configuration:\n\n- `spring-security-web`\n- `spring-security-config`\n\
    - `spring-security-taglibs`\n\n```\norg.springframework.security\nspring-security-web\n\
    5.1.5.RELEASE\n\norg.springframework.security\nspring-security-config\n5.1.5.RELEASE\n\
    \norg.springframework.security\nspring-security-taglibs\n5.1.5.RELEASE\n\nListing\
    \ 3-3\nSpring Security Maven Dependencies\n```\n\nThe entire updated `pom.xml`\
    \ file is shown in Listing [3-4](#310331_2_En_3_Chapter.xhtml#PC7).\n\n```\n4.0.0\n\
    groupId\npss01_Security\n1.0-SNAPSHOT\n\n5.1.5.RELEASE\n5.1.5.RELEASE\n\norg.springframework\n\
    spring-core\n${springframework.version}\n\norg.springframework\nspring-web\n${springframework.version}\n\
    \norg.springframework\nspring-webmvc\n${springframework.version}\n\norg.springframework.security\n\
    spring-security-web\n${springsecurity.version}\n\norg.springframework.security\n\
    spring-security-config\n${springsecurity.version}\n\njavax.servlet\njavax.servlet-api\n\
    4.0.1\nprovided        \n\njavax.servlet.jsp\njavax.servlet.jsp-api\n2.3.3\nprovided\n\
    \njavax.servlet\njstl\n1.2\n\ntaglibs\nstandard\n1.1.2\n\nsrc\n\norg.apache.maven.plugins\n\
    maven-compiler-plugin\n3.8.1\n\npss01_Security\n\nListing 3-4\nAdding Spring Security\
    \ Configuration to the pom.xml File\n```\n\nPlease notice that `spring-webmvc`\
    \ is the only dependency needed since `spring-core` and `spring-web` are transitive\
    \ dependencies.\n\nThe `pom.xml` file contains the following:\n\n- The dependencies\
    \ needed for the project, such as Spring, Spring Security, Servlet API, and TagLibs.\n\
    - The `<build>` element containing the plugins used, such as:\n  - The `maven-compiler-plugin`,\
    \ to specify the Java version that will be used in the project\n  - The Servlet\
    \ information\n  - The TagLibs\n  - The `maven-war-plugin` needed to build the\
    \ project into a WAR file, which will be deployed to Tomcat in this case\n\n###\
    \ Note\n\nRemember that no Spring Boot dependencies were used in this example.\n\
    \n# Configuring the Web Project to Be Aware of Spring Security v5\n\nTo activate\
    \ Spring Security in your Maven Web Application, you need to configure a particular\
    \ Servlet filter that will take care of preprocessing and postprocessing the requests,\
    \ as well as managing the required security constraints.\n\nLet’s start building\
    \ your Spring Security Maven Web Application.\n\nAs a first step, please make\
    \ sure that all the tools and directories are created as described previously.\n\
    \nThen update the `pom.xml` file as shown in Listing [3-4](#310331_2_En_3_Chapter.xhtml#PC7).\n\
    \nNext, create the needed `.jsp` files under a new project directory called `WebContent/WEB-INF/pages/`.\n\
    \nYour project will utilize two `.jsp` pages:\n\n- `welcome.jsp`, which is the\
    \ starting welcome web page of the project\n- `authenticated.jsp`, which is the\
    \ admin web page to access when the user successfully logs in\n\nThe `welcome.jsp`\
    \ page is shown in Listing [3-5](#310331_2_En_3_Chapter.xhtml#PC8).\n\n```\nSpring\
    \ Security authentication example.\n\nWelcome to Spring Security authentication\
    \ example!\n\">Login\n\nListing 3-5\nwelcome.jsp\n```\n\nThe `welcome.jsp` page\
    \ will only display a welcoming message and provide the link to the authenticated\
    \ page, `/authenticated`.\n\nLet’s now create the `authenticated.jsp` page; see\
    \ Listing [3-6](#310331_2_En_3_Chapter.xhtml#PC9).\n\n```\nSpring Security authentication\
    \ example\n\nWelcome to Spring Security authentication example!\nYour username\
    \ is: ${user}\n\nYou provided Admin authentication credentials!\n\nYou provided\
    \ User authentication credentials!\n\n\">Logout\n\nListing 3-6\nauthenticated.jsp\n\
    ```\n\nIf the login is successful, the user will access the `authenticated.jsp`\
    \ page, which we will explain later.\n\nNext, you need to define the Java classes\
    \ needed for your example.\n\nUnder controller:\n\n- `UserController`\n\nUnder\
    \ package configuration:\n\n- `AppInitializer`\n- `SecurityConfiguration`\n- `SpringSecurityInitializer`\n\
    - `UserConfiguration`\n\nLet’s create the two Java packages where your Java classes\
    \ will be located:\n\n- `com.apress.pss.springsecurity.controller`\n- `com.apress.pss.springsecurity.configuration`\n\
    \nLet’s create the `UserController` Java class under the package `com.apress.pss.springsecurity.controller`,\
    \ as shown in Listing [3-7](#310331_2_En_3_Chapter.xhtml#PC10).\n\n```\npackage\
    \ com.apress.pss.springsecurity.controller;\nimport javax.servlet.http.HttpServletRequest;\n\
    import javax.servlet.http.HttpServletResponse;\nimport org.springframework.security.core.Authentication;\n\
    import org.springframework.security.core.context.SecurityContextHolder;\nimport\
    \ org.springframework.security.core.userdetails.UserDetails;\nimport org.springframework.security.web.authentication.logout.SecurityContextLogoutHandler;\n\
    import org.springframework.stereotype.Controller;\nimport org.springframework.ui.ModelMap;\n\
    import org.springframework.web.bind.annotation.GetMapping;\n@Controller\npublic\
    \ class UserController {\n@GetMapping (\"/\")\npublic String homePage(ModelMap\
    \ model) {\nreturn \"welcome\";\n}\n@GetMapping (\"/welcome\")\npublic String\
    \ welcomePage(ModelMap model) {\nreturn \"welcome\";\n}\n@GetMapping (\"/authenticated\"\
    )\npublic String adminPage(ModelMap model) {\nmodel.addAttribute(\"user\", getPrincipal());\n\
    return \"authenticated\";\n}\n@GetMapping (\"/logout\")\npublic String logoutPage\
    \ (HttpServletRequest request, HttpServletResponse response) {\nAuthentication\
    \ auth = SecurityContextHolder.getContext().getAuthentication();\nif (auth !=\
    \ null){\nnew SecurityContextLogoutHandler().logout(request, response, auth);\n\
    }\nreturn \"welcome\";\n}\nprivate String getPrincipal(){\nString userName = null;\n\
    Object principal = SecurityContextHolder.getContext().getAuthentication().getPrincipal();\n\
    if (principal instanceof UserDetails) {\nuserName = ((UserDetails)principal).getUsername();\n\
    } else {\nuserName = principal.toString();\n}\nreturn userName;\n}\n}\nListing\
    \ 3-7\nUserController Java Class\n```"
