    \nFigure 6-17\nApplication login\npage\n\nIn the LDAP, there are two users: mnardone\
    \ and lnardone. The\ndifference is that mnardone is part of the administrators\
    \ group so he\ncan access the `admin.html` page.\n\nSo log in with the username\
    \ **mnardone** and the password\n**nardone01** and you will be able to access\
    \ the admin\npage, as shown in Figure [6-18](#310331_2_En_6_Chapter.xhtml#Fig18).\n\
    \n![../images/310331_2_En_6_Chapter/310331_2_En_6_Fig18_HTML.jpg](images/310331_2_En_6_Chapter/310331_2_En_6_Fig18_HTML.jpg)\n\
    \nFigure 6-18\nAdmin-credentialed\nuser accessing the admin page\n\nIf you try\
    \ now with the **lnardone** user and the password\n**nardone02,** you will not\
    \ be able to access the admin\npage since that user is not part of the administrators\
    \ group; you’ll\nreceive the “access denied” message shown in Figure [6-19](#310331_2_En_6_Chapter.xhtml#Fig19).\n\
    \n![../images/310331_2_En_6_Chapter/310331_2_En_6_Fig19_HTML.jpg](images/310331_2_En_6_Chapter/310331_2_En_6_Fig19_HTML.jpg)\n\
    \nFigure 6-19\nA non-authorized user receiving the “access denied” message\n\n\
    The configuration is not that difficult to understand. The login\nconfiguration\
    \ is within the `SpringSecurityConfiguration`\nJava class.\n\nThe `configure(HttpSecurity\
    \ http)` will configure the HTTP with things like login, logout,\netc. The most\
    \ important configuration value is .`antMatchers(\"/admin\").hasRole(\"ADMINISTRATORS\"\
    )`\nwhich tells you that the `/admin` URL can only\nbe accessed by users in the\
    \ LDAP as part of the administrators group, as\nyou saw before:\n\n```\ndn: cn=administrators,ou=groups,dc=example,dc=com\n\
    objectclass: groupOfUniqueNames\nobjectclass: top\ncn: administrators\nuniqueMember:\
    \ uid=mnardone,ou=people,dc=example,dc=com\nou: admin\n```\n\nIn your case, mnardone\
    \ is part of the administrators LDAP group so he\ncan access the `/admin` page.\n\
    Remember that all your entries will be relative to the domain name\n`dc=example,dc=com`.\n\
    \nNext, the `configure(AuthenticationManagerBuilder auth)` will take care of the\
    \ authentication builder checking the\nuser and SHA password via the following:\n\
    \n```\n.ldapAuthentication()\n.userDnPatterns(\"uid={0},ou=people\")\n.groupSearchBase(\"\
    ou=groups\")\n.contextSource(contextSource())\n.passwordCompare()\n.passwordEncoder(new\
    \ LdapShaPasswordEncoder())\n.passwordAttribute(\"userPassword\");\n```\n\nSo\
    \ you defined the LDAP DN patter to look for a user as part of the\n`ou=people`\n\
    group.\nFinally, `DefaultSpringSecurityContextSource contextSource()` specifies\
    \ the LDAP URL to connect to.\nAs you can see from the example, configuring LDAP’s\
    \ basic support as\nthe authentication solution for your application with Spring\
    \ Security is\nnot that complex. In fact, it is very straightforward thanks to\
    \ the\nmodular architecture and the well-thought-out XML namespace. For us, the\n\
    complexity with LDAP is LDAP itself. Although it is a simple\nhierarchical system\
    \ (very much like the file system in your standard\nUnix box), some of the nomenclature\
    \ and functionality seems a bit\ncomplex and very different from the database-based\
    \ solution you explored\nin the previous section.\nAs we said before, using LDAP\
    \ as your authentication solution makes\ngreat sense in the context of corporate\
    \ intranets, where the company\nuser base is already stored in LDAP-like directories\
    \ in a centralized\nmanner. Plugins into this already existing user-management\n\
    infrastructure are a good way to reuse the user information within the\ncompany\
    \ instead of writing a parallel authentication datastore that then\nneeds to be\
    \ kept in sync with the main repository.\n\nX.509 Authentication\nX.509 authentication\
    \ is an authentication scheme that uses\nclient-side certificates instead of username-password\
    \ combinations to\nidentify the user. Using this approach, a scheme known as *mutual\
    \ authentication*\n takes place between the client and the server. In practice,\n\
    mutual authentication means that, as part of the Secure Sockets Layer\n(SSL) handshake,\
    \ the server requests that the client identify\nhimself by providing a certificate.\
    \ In a production-ready server, the\nincoming client certificate needs to be issued\
    \ and signed by a proper\ncertificate-signing authority.\nTo work with client\
    \ certificates, the application needs to be\nconfigured to use SSL channels in\
    \ the sections that are expected to deal\nwith the authenticated user, because\
    \ the X.509 authentication protocol\nitself is part of the SSL protocol.\nAs a\
    \ first thing, let’s create a Spring Security Boot project using\nthe Spring\n\
