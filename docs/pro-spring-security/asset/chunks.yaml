  trans: '

    这个文件非常简单，其唯一职责就是导入另一个文件（`example-webflow.xml` 文件），该文件将包含整个 Spring Web Flow 配置。此配置将保留在另一个文件中，以便与主
    Servlet 文件分离。


    ```


    清单 9-9

    spring-security.xml 文件

    ```


    这是另一个你现在应该能轻松理解的文件。清单 9-9 展示了一个非常基础的 Spring Security 配置。你只定义了一个具有角色 `ROLE_USER`
    的用户，这对于你的测试来说已经足够了。这里没有定义任何 URL 安全规则，因为在这个 Spring Web Flow 示例中，你并不打算这样做。你希望在流程级别（其状态）添加安全性，而这正是我们将要向你展示如何实现的。


    现在，你需要定义应用程序的 Web Flow 配置以及实际的 Web Flow 本身。同样，这将是一个简单的示例，仅用于展示功能如何工作。该示例将基于图 9-6。清单
    9-10 展示了 Web Flow 配置文件，清单 9-11 展示了你唯一的流程定义。


    ```


    清单 9-10

    WEB-INF 文件夹中的 example-webflow.xml

    ```


    该文件定义了 Spring Web Flow 的通用配置。文件的主要部分是元素 `flow-registry` 及其属性 `flow-builder-services`。此元素定义了应用程序中流程的位置。目前，你只定义一个流程，它将位于
    `product.xml` 文件中。另外，请注意当在流程的视图状态中引用视图时，视图将如何被解析。类 `org.springframework.webflow.mvc.builder.MvcViewFactoryCreator`
    将负责解析视图位置。默认情况下，它会在流程定义目录中查找文件名是视图状态名称后附加 `.jsp` 的文件来解析视图文件。这仅仅意味着，如果一个视图被命名为
    *review*，它将查找名为 *review.jsp* 的文件。


    ```


    清单 9-11

    /WEB-INF/flows/ 文件夹中的 product.xml 简单流程

    ```


    这是实际的流程定义。你在这里简单地定义了三个视图状态。正如我们之前所说，这些视图状态中的每一个都将映射到应用程序中的一个物理视图文件。根据默认行为，视图文件应与此流程文件位于同一目录中，并应根据视图状态名称后附加
    `.jsp` 来命名。因此，你应该在 `WEB-INF/flows/products` 目录中拥有名为 `activation.jsp`、`success.jsp`
    和 `failure.jsp` 的文件。它们分别显示在清单 9-12、9-13 和 9-14 中。


    ```


    Spring WebFlow 激活失败！


    清单 9-14

    流程“购买”视图状态的 failure.jsp

    ```


    ```


    Spring WebFlow 激活成功！


    清单 9-13

    “审核”状态的 success.jsp

    ```


    ```


    你好，Spring WebFlow！

    激活 Spring WebFlow：


    清单 9-12

    “主”视图状态的 activation.jsp

    ```


    在前三个 `.jsp` 文件中，你定义了 Web Flow 中的三个视图状态。清单 9-12 和 9-13 具有以 `href` 链接中的 `eventId`
    参数形式存在的转换触发器。`${flowExecutionUrl}` 引用了流程的当前执行状态。因此，在首次访问页面时的主状态下，`${ flowExecutionUrl
    }` 的值是 `/product?execution=e1s1`，使得下一个流程状态的完整 URL 类似于 `/product?execution=e1s1}&_eventId=review`。如果你访问
    `http://localhost:8080/product`，你将被带到主视图状态。该视图显示 `activate.jsp`，其中你将有一个按钮用于激活，一个按钮用于取消激活，如图
    9-7 所示。当你点击激活按钮的那一刻，你就激活了 Spring Web Flow 进程，并且 `success.jsp` 会打开。

    让我们使用 Spring Security 来实现这一点。Spring Security 和 Spring Web Flow 集成得很好，因为它们都是 Spring
    产品组合的一部分。


    使用 Spring Security 保护流程很容易。首先，你需要将当前 `<webflow:flow-executor>` 元素（来自文件 `example-webflow.xml`，即清单
    9-15 中的元素）添加到同一文件中的某个位置，并添加清单 9-16 所示的内容。


    ![../images/310331_2_En_9_Chapter/310331_2_En_9_Fig7_HTML.jpg](img/310331_2_En_9_Fig7_HTML.jpg)


    图 9-7

    activation.jsp，它是 Web Flow 的入口点


    ```

    清单 9-16

    Spring Security 监听器 Bean

    ```


    ```


    清单 9-15

    带有 Spring Security 监听器的 flow-executor

    ```


    通过实现上述内容，你将 Spring Security 集成到了 Spring Web Flow 中。你现在需要做的就是决定要保护流程的哪些部分，以及定义哪些约束来保护它们。但在此之前，我们将简要解释一下这个
    `SecurityFlowExecutionListener` 为 Spring Web Flow 做了什么。

    Spring Web Flow 以接口 `org.springframework.webflow.execution .FlowExecutionListener`
    的形式提供了一种抽象，它允许你实现类来监听或观察流程执行的生命周期。当为流程注册了监听器实现时，它可以在流程生命周期的不同点拦截流程执行。从这个意义上说，它类似于你之前学过的
    AOP 概念。

    `org.springframework.webflow.security.SecurityFlowExecutionListener` 是一个监听器实现，它拦截流程生命周期中的三个特定点：`sessionCreating`、`stateEntering`
    和 `transitionExecuting`。在每次拦截中，监听器都会委托给一个配置好的 `org.springframework.security.access.AccessDecisionManager`，就像我们在本书不同部分解释过的那样。如果在定义
    Bean 时没有提供 `AccessDecisionManager` 实现，则会动态创建一个新的基于角色的访问决策管理器。


    所以现在你想保护视图状态 `"activation"`，并且只允许具有角色 `ROLE_USER` 的已认证用户访问它。为此，你只需将元素 `<secured
    attributes="ROLE_USER" />` 定义为 `"activation"<view-state>` 元素的子元素。完成此操作后，如果你重新启动应用程序并尝试访问
    `"buy"` 状态，你将看到熟悉的 Spring Security 登录屏幕。如果你使用用户名 **admin** 和密码 **admin123** 登录，你将能够到达
    `"`buy`"` 状态。最终的 `"buy"` 状态视图如图 9-8 所示。


    ![../images/310331_2_En_9_Chapter/310331_2_En_9_Fig8_HTML.jpg](img/310331_2_En_9_Fig8_HTML.jpg)


    图 9-8

    Spring Web Flow 激活页面

