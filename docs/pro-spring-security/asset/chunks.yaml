- fmt: '# The Cost of ACLs


    This example shows that working with ACLs imposes a good deal of overhead in terms
    of the operations and logic you need to implement on top of your standard business
    operations. It’s clear that storing a post is affected by the extra work that
    is necessary to store the corresponding ACL for that object, and retrieving a
    post is affected by the need to filter out certain elements of the collection
    based on the permissions.


    This brief section will go inside the core class of the ACL Spring Security support
    to see how it works internally and how it might affect your application. This
    class is the `org.springframework.security.acls.jdbc.JdbcMutableAclService`. `JdbcMutableAclService`
    is the class that deals with all the input and output to the database for everything
    regarding the ACL database schema. It’s configured by default to work with `HSQLDB`,
    which is the database we have been using in the examples.


    This class has different SQLs for the different things you do when you interact
    with the ACL system—like inserts into the different tables, deleting ACLs, updating
    values and, of course, selecting from the different tables. All of these operations
    are done using Spring Core’s `JdbcTemplate` support.


    Another important class is `BasicLookupStrategy`, the default implementation of
    `LookupStrategy` used in the framework to look up ACLs.


    The first interesting operation you see is the method `readAclsById`, which exists
    in `JdbcMutableAclService` and delegates to a method of the same name in `BasicLookupStrategy`.
    This method tries to retrieve the requested ACL from the cache. If it finds the
    ACL in cache, the method will return this found ACL; if the ACL is not found in
    the cache, the implementation will query the database with a somewhat complex
    query with four joins, as Listing [7-25](#310331_2_En_7_Chapter.xhtml#PC26) shows.
    This query can get a bit more complex because the ACLs can be retrieved in batches
    of up to 50 elements (which is the default but is configurable by setting the
    property `batchSize` in the class `BasicLookupStrategy`) and, for each of these
    elements, the `where` clause adds an `or` operator to the query. The result from
    this query is then stored in the cache, which makes these ACLs available so that
    if another method calls `readAclsById` requesting one of the cached elements,
    the database doesn’t need to be hit.


    When you create a new post, `readAclsById` is called. Also, another select query
    is performed to retrieve the primary key of the `objectIdentity` represented by
    the domain object. And, of course, an `"insert into acl_object_identity"` is performed.
    Also, in the same `createPost` method in `ForumServiceImpl`, when you call the
    `updateAcl` method, a `"delete from acl_entry"` is performed, followed by a batch
    `"insert into acl_entry"`, followed by an `"update acl_object_identity"`. Then
    all the caching entries for that Object Identity are cleared and a new call to
    the `readAclsById` is executed, which will query the database for the up-to-date
    information. You can see how the cost of deleting a post has increased considerably
    with the use of ACLs.


    Deleting `Post` objects is also more costly because now it involves deleting ACE
    entries, deleting object identities, and clearing the cache for the relevant objects.


    This section is not meant to scare you away from using ACLs. We simply want to
    make you aware that there is an extra cost (apart from the complexity of using
    it) you should take into consideration when creating your applications with the
    use of ACLs in mind. The more domain objects you have, the more ACL entries you
    will have as well. In a big application, you might be talking about millions of
    entries in the ACL support tables.


    ```

    select acl_object_identity.object_id_identity, acl_entry.ace_order,  acl_object_identity.id
    as acl_id,

    acl_object_identity.parent_object, acl_object_identity.entries_inheriting, acl_entry.id
    as ace_id, acl_entry.mask,

    acl_entry.granting,  acl_entry.audit_success, acl_entry.audit_failure,  acl_sid.principal
    as ace_principal,

    acl_sid.sid as ace_sid,  acli_sid.principal as acl_principal, acli_sid.sid as
    acl_sid, acl_class.class from

    acl_object_identity left join acl_sid acli_sid on acli_sid.id = acl_object_identity.owner_sid

    left join acl_class on acl_class.id = acl_object_identity.object_id_class

    left join acl_entry on acl_object_identity.id = acl_entry.acl_object_identity

    left join acl_sid on acl_entry.sid = acl_sid.id

    where ( (acl_object_identity.object_id_identity = ? and acl_class.class = ?))

    order by acl_object_identity.object_id_identity asc, acl_entry.ace_order asc

    Listing 7-25

    An ACL Retrieving Query That You Can Find in the Class org.springframework.security.acls.jdbc.BasicLookupStrategy

    ```


    # Summary


    In this chapter, we explained in detail how to use Spring Security’s support for
    ACLs. We showed how to configure support for ACLs in the Spring configuration
    file and how to use the `@Secured`, `@PreAuthorize`, `@PreFilter`, `@PostAuthorize`,
    and `@PostFilter` annotations to implement domain object–specific security. We
    also introduced some internal aspects of the framework and the main classes that
    are involved in its ACL functionality.


    We examined different ways to make sure that secured domain objects don’t show
    up in the presentation layer for a user who doesn’t have appropriate permissions.
    You saw that this is achievable either with SpEL expressions at the `@PostFilter`
    business level or with the ACL Spring Security tag library directly in your JSP
    files. We also gave a quick overview of the different SQLs that are used by the
    ACL framework and how they might impact your application.


    # 8. Customizing and Extending Spring Security


    Spring Security is a very extendable and customizable framework. This is primarily
    because the framework is built using object-oriented principles and design practices
    so that it is open for extension and closed for modification. In the previous
    chapter, you saw one of the major extension points in Spring Security—namely,
    the pluggability of different authentication providers. This chapter covers some
    other extension points in the framework that you can take advantage of to extend
    Spring Security’s functionality or to modify or customize functionality that doesn’t
    work exactly the way you need in your applications.


    We will also briefly cover the Spring Security Extensions project ([`http://static.springsource.org/spring-security/site/extensions.html`](http://static.springsource.org/spring-security/site/extensions.html)),
    an environment you can use to create extension modules for the core Spring Security
    project.


    The next section defines what we consider to be some of the major extension points
    in Spring Security and describes how to use them to add or modify behavior in
    your security solution. Also, this chapter will show how to develop authentication
    and login applications using Spring Boot, Spring Security, Spring Data, Thymeleaf,
    and MongoDB.


    ## Spring Security Extension Points


    Spring Security offers a comprehensive set of extension points that can be customized
    (or completely overridden) with your own implementations and still leverage the
    core of the framework. Some of the extension points are evident, while some others
    are a bit more subtle and, in some cases, not even intended. However, because
    the framework is so flexible, you can take advantage of that flexibility to tweak
    its configuration to fit your intentions.'
