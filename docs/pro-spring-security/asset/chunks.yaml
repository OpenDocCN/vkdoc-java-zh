    总结

    在本章中，我们从一个相当高的层面展示了如何将 Spring Security 集成到各种框架和语言中。选择的框架是 Spring 自己的 Spring Web
    Flow，说明性的语言分别是 JRuby 和 Groovy，以及它们各自的 Web 框架 Rails 和 Grails。

    我们向你展示了将 Spring Security 集成到这些不同的框架和语言中，可能很简单（如 Grails），也可能不那么简单（如 JRuby 或 Scala）。然而，通过
    JVM，理论上，你可以将 Spring Security 集成到任何你需要保护的东西中。

    无论使用何种框架或语言，本章的主要收获是：Spring Security 归根结底只是一个 Java 库（几个简单的 `.jar` 文件）。你可以将它集成到任何你想要的
    Java（即 JVM）项目中。你只需要记住你能用它做什么，并使用那些对你的特定问题有意义的部件。例如，在 Swing 应用程序中，甚至在不使用标准 servlet
    过滤器的 Web 应用程序（如 Play 框架）中，使用 Web 层安全是没有意义的。


