    在这段代码中，你可以看到 `ChannelInvocation` 在调用父类的 `beforeInvocation` 方法之前，包装了一个 `MethodInvocation`。除了包装之外，它还会进行一些内部处理，使得当前正在执行的通道可以被查询以获取
    `ConfigAttributes`。


    另请注意，仅当被调用的方法是 Spring Integration 的标准“send”和“receive”方法之一时，该拦截器才会执行其安全验证。


    代码中使用的 `ChannelSecurityMetadataSource` 将被查询以获取安全元数据属性。它知道如何从 Spring Integration
    通道以及相关的 `org.springframework.integration.security.channel.ChannelAccessPolicy`
    中提取此信息。


    在你的应用程序中，你极不可能重写安全拦截器。但是，了解你可以这样做，并且理解你为何要这样做，是件好事。


    正如 Spring Integration 的示例所示，你想要替换安全拦截器（或添加额外的拦截器）的一个原因是，你拥有某些抽象概念，希望对其应用基于拦截的安全性，而这些概念既不适合
    URL 拦截，也不适合简单的方法拦截。你希望为你的拦截逻辑赋予一个更有意义的名称，并且过滤掉那些默认实现不会默认过滤的某些内容。这正是 Spring Integration
    示例所做的。它拦截了 `MessageChannel` 通信，这是在其上下文中具有意义的领域元素。然而，归根结底，它基本上是在拦截方法，并过滤以仅拦截 `send`
    和 `receive` 方法，这些方法同样是在特定上下文中具有意义的方法。


    **Spring Security 扩展项目**


    有一个专门的项目致力于开发 Spring Security 扩展，社区成员可以在 Spring Security 之上开发自己的扩展。通过这种方式，他们可以将这些扩展与
    Spring Security 主项目解耦，使其能够独立发展。该扩展项目的所在地是 [`https://spring.io/projects/spring-security`](https://spring.io/projects/spring-security)。


    如果你访问此页面，你会看到目前存在两个扩展项目：Kerberos 集成和 SAML2 集成。还有 OAuth 集成，它作为一个独立的项目存在。你可以在 [`https://docs.spring.io/spring-security/oauth/`](https://docs.spring.io/spring-security/oauth/)
    找到它。


    Spring Security 扩展中的每个项目都可以根据需要实现框架的任意多个部分，以便正常工作。这意味着我们在本章中定义的许多扩展点（以及其他一些扩展点）可以在特定扩展中被重写以完成其工作。


    **总结**


    在本章中，我们展示了当你想要自定义或扩展 Spring Security 的行为时，其架构中的模块化设计是如何发挥作用的。我们展示了如何使用 Spring
    Security v5 和 MongoDB 创建一个 Spring Boot Web 应用程序。我们还展示了 Spring Security 提供的一些不同且最常见的扩展点，以便你可以将其功能适配到你的特定应用程序，同时保留核心功能，从而利用这些功能使你的工作更轻松。阅读本章后，结合之前章节的所有理论和实践，你应该有足够的信心来实现超越框架开箱即用功能的功能。


    **9. 将 Spring Security 与其他框架和语言集成**'
- fmt: '# Spring Security in a Broader Context


    This chapter will explore Spring Security in the context of other application
    frameworks and languages that run on the JVM. You saw in previous chapters that
    the two main ways of using Spring Security are in the web layer in the shape of
    filters and in the business layer with Spring AOP. This means that you could use
    Spring Security in any application that is built on top of the Servlet technology
    or in any application that is willing to use Spring and Spring AOP to handle its
    object life cycles and interactions.


    In the following sections, you’ll see examples of both cases. We’ll start by looking
    at a couple of popular Java frameworks (one of which is also Spring-based) and
    how to use Spring Security with them. These frameworks are the popular Struts
    2 web framework and Spring Web Flow, another member of the SpringSource suite.


    After studying these two frameworks, we’ll take a brief look at a few Java Virtual
    Machine (JVM) programming languages (and some of their related frameworks) and
    how to use Spring Security with them. We’ll be looking at Groovy in the context
    of its web-development framework Grails, JRuby in the context of Rails, and Scala
    embedded in a Spring Web Application.


    We will not go into any of these frameworks or languages in much detail, because
    that would be beyond the scope of this book. The purpose of this chapter is simply
    to explain how to use Spring Security in a wider context.


    ## Spring Security with Struts 2


    Struts 2 is a popular Java web framework built by merging the original Struts
    project and the WebWork project. Struts 2 was always intended to be a complete
    evolution from the original Struts framework, adapted to a new generation of powerful
    web frameworks, and it really kept little of the original Struts principles and
    implementations. Struts 2 is widely used and is as good a candidate as any other
    external servlet-based framework to integrate with Spring and Spring Security.


    Struts 2 is an MVC (model view controller) framework built on top of the standard
    Java servlets technology, so many of the web-based security principles you have
    read about in this book apply without modification. If you want to use only the
    URL-level, web-based security you studied in Chapter [5](#310331_2_En_5_Chapter.xhtml),
    you just need to configure your `web.xml` and your Spring Security filter chain
    accordingly or you can implement using the `WebApplicationInitializer`.


    More information about the Struts 2 releases can be found at [`https://struts.apache.org/releases.html`](https://struts.apache.org/releases.html).
    In this book, Struts version 2.5.20 will be used.


    As with the rest of frameworks and languages in this chapter, we won’t explain
    Struts 2 in any depth (because there are many good books available on that subject).
    We’ll explain just enough so that you can use Spring Security with it. In fact,
    we assume that if you are reading this section, it is probably because you are
    already using Struts 2 and want to integrate Spring Security with it. However,
    to explain a little more, Figure [9-1](#310331_2_En_9_Chapter.xhtml#Fig1) shows
    the big picture of how Struts 2 works.


    ![../images/310331_2_En_9_Chapter/310331_2_En_9_Fig1_HTML.jpg](images/310331_2_En_9_Chapter/310331_2_En_9_Fig1_HTML.jpg)


    **Figure 9-1** How Struts 2 works


    When a request comes to the application, a front controller ([`http://en.wikipedia.org/wiki/Front_Controller`](http://en.wikipedia.org/wiki/Front_Controller))
    implemented in a servlet filter takes care of the request. It sends the request
    through a set of configured interceptors that perform different kinds of functionality
    before and after the action is invoked. The action is then invoked, which carries
    with it all the business logic required by the current request. After the action
    finishes, a result object representing the view is created and the interceptor
    stack is invoked in inverse order as before (while returning the result) until
    a response is finally returned to the client.


    The first step for you to do is of course download the libraries to include in
    your Maven project from this link: `https://struts.apache.org/download.cgi#struts-ga`.
    Struts 2 can be downloaded in a full distribution, including everything, or just
    as a separate set of libraries, sources, documentation, etc.


    You’ll be using Maven to build this project. So let’s create a new Maven project
    as shown in Figure [9-2](#310331_2_En_9_Chapter.xhtml#Fig2). Then follow the prompts
    by selecting a new *starter project* at the first prompt and selecting some relevant
    `groupId` and `artifactId` names. (We chose `com.apress.pss.struts` and `struts-example`,
    respectively, as shown in Figure [9-2](#310331_2_En_9_Chapter.xhtml#Fig2). You
    can use the same to follow along in the examples easily).


    ![../images/310331_2_En_9_Chapter/310331_2_En_9_Fig2_HTML.jpg](images/310331_2_En_9_Chapter/310331_2_En_9_Fig2_HTML.jpg)


    **Figure 9-2** The Struts project


    Now create a simple, functional Struts 2 web application with the components you
    need to create the test, including Spring integration (although it uses an old
    DTD version of the configuration XML file). The file structure after executing
    that command is shown in Figure [9-3](#310331_2_En_9_Chapter.xhtml#Fig3).


    ![../images/310331_2_En_9_Chapter/310331_2_En_9_Fig3_HTML.jpg](images/310331_2_En_9_Chapter/310331_2_En_9_Fig3_HTML.jpg)


    **Figure 9-3** Struts 2 application file structure after executing the Maven command


    In Figure [9-3](#310331_2_En_9_Chapter.xhtml#Fig3), you can see that there is
    a file named `struts.xml`; this is the main Struts 2 configuration file, and you
    can see its contents in Listing [9-1](#310331_2_En_9_Chapter.xhtml#PC1).


    ```

    welcome.jsp


    admin.jsp


    welcome.jsp

    ```


    **Listing 9-1** The `struts.xml` File


    In Listing [9-1](#310331_2_En_9_Chapter.xhtml#PC1), the action `"helloWorld"`
    doesn’t define a class name on the attribute `class`. In this case, it defines
    a simple string that identifies a Spring bean in the `spring-security.xml` that
    you’ll see later. When a request comes in, the framework looks at the definitions
    from this file to determine how to handle the particular request. (This definition
    is simplistic, but it’s good enough to make the point.) If it sees the name of
    a class in the `action` attribute, the framework instantiates a new object of
    that class to handle the request. If the framework detects that it is not a class,
    it looks for a bean with that ID in the Spring configuration and gets the object
    from there. All this is possible in the framework thanks to the `struts2-spring-plugin`
    plugin, which enhances Struts 2 with Spring functionality and makes it possible
    to define actions (and other components such as interceptors) in Spring beans.


    Please notice the usage of `struts-2.5.dtd` as Struts 2.5 version.


    What you’ll do now is rewrite the default `spring-security.xml`, replace it with
    the one from Listing [9-2](#310331_2_En_9_Chapter.xhtml#PC2), and add the familiar
    dependencies from Listing [9-3](#310331_2_En_9_Chapter.xhtml#PC3) to the `pom.xml`
    file.


    ```

    5.1.5.RELEASE

    5.1.5.RELEASE


    org.springframework

    spring-core

    ${springframework.version}


    org.springframework

    spring-web

    ${springframework.version}


    org.springframework

    spring-webmvc

    ${springframework.version}

    ```'
  raw: 'This chapter will explore Spring Security in the context of other

    application frameworks and languages that run on the JVM.

    You saw in previous chapters that the two main ways of using Spring

    Security are in the web layer in the shape of filters and in the

    business layer with Spring AOP. This means that you could use Spring

    Security in any application that is built on top of the Servlet

    technology or in any application that is willing to use Spring and

    Spring AOP to handle its object life cycles and interactions.

    In the following sections, you’ll see examples of both cases. We’ll

    start by looking at a couple of popular Java frameworks (one of which is

    also Spring-based) and how to use Spring Security with them. These

    frameworks are the popular Struts 2 web framework and Spring Web Flow,

    another member of the SpringSource suite.

    After studying these two frameworks, we’ll take a brief look at a few

    Java Virtual Machine (JVM) programming

    languages (and some of their related frameworks) and how to use Spring

    Security with them. We’ll be looking at Groovy in the context of its

    web-development framework Grails, JRuby in the context of Rails, and

    Scala embedded in a Spring Web Application.

    We will not go into any of these frameworks or languages in much

    detail, because that would be beyond the scope of this book. The purpose

    of this chapter is simply to explain how to use Spring Security in a

    wider context.


    Spring Security with Struts 2

    Struts 2 is a popular Java web framework  built by merging the

    original Struts project and the WebWork project. Struts 2 was always

    intended to be a complete evolution from the original Struts framework,

    adapted to a new generation of powerful web frameworks, and it really

    kept little of the original Struts principles and implementations.

    Struts 2 is widely used and is as good a candidate as any other

    external servlet-based framework to integrate with Spring and Spring

    Security.

    Struts 2 is an MVC (model view controller) framework

    built on top of the standard Java servlets technology, so many of the

    web-based security principles you have read about in this book apply

    without modification. If you want to use only the URL-level, web-based

    security you studied in Chapter [5](#310331_2_En_5_Chapter.xhtml), you just need
    to configure your

    `web.xml` and

    your Spring Security filter chain accordingly or you can implement using

    the WebApplicationInitializer.

    More information about the Struts 2 releases can be found at [`https://struts.apache.org/releases.html`](https://struts.apache.org/releases.html).

    In this book, Struts version 2.5.20 will be used.


    As with the rest of frameworks and languages in this chapter, we won’t

    explain Struts 2 in any depth (because there are many good books

    available on that subject). We’ll explain just enough so that you can

    use Spring Security with it. In fact, we assume that if you are reading

    this section it, is probably because you are already using Struts 2 and

    want to integrate Spring Security with it. However, to explain a little

    more, Figure [9-1](#310331_2_En_9_Chapter.xhtml#Fig1) shows the big

    picture of how Struts 2 works.


    ![../images/310331_2_En_9_Chapter/310331_2_En_9_Fig1_HTML.jpg](images/310331_2_En_9_Chapter/310331_2_En_9_Fig1_HTML.jpg)


    Figure 9-1

    How Struts 2 works


    When a request comes to the application, a front controller ([`http://en.wikipedia.org/wiki/Front_Controller`](http://en.wikipedia.org/wiki/Front_Controller))

    implemented in a servlet filter takes care of the request. It sends the

    request through a set of configured interceptors that perform different

    kinds of functionality before and after the action is invoked. The

    action is then invoked, which carries with it all the business logic

    required by the current request. After the action finishes, a result

    object representing the view is created and the interceptor stack is

    invoked in inverse order as before (while returning the result) until a

    response is finally returned to the client.

    The first step for you to do is of course download the libraries to

    include in your Maven project from this link:

    `https://struts.apache.org/download.cgi#struts-ga`.

    Struts 2 can be download in a full distribution, including

    everything, or just as a separate set of libraries, sources,

    documentation, etc.


    You’ll be using Maven to build this project. So let’s create a new Maven

    project as shown in Figure [9-2](#310331_2_En_9_Chapter.xhtml#Fig2). Then follow
    the

    prompts by selecting a new *starter project* at the first prompt

    and selecting some relevant `groupId` and `artifactId` names. (We

    chose `com.apress.pss.struts`

    and `struts-example`,

    respectively, as shown in Figure [9-2](#310331_2_En_9_Chapter.xhtml#Fig2). You
    can use the

    same to follow along in the examples easily).


    ![../images/310331_2_En_9_Chapter/310331_2_En_9_Fig2_HTML.jpg](images/310331_2_En_9_Chapter/310331_2_En_9_Fig2_HTML.jpg)


    Figure 9-2

    The Struts project


    Now create a simple, functional Struts 2 web application with the

    components you need to create the test, including Spring integration

    (although it uses an old DTD version of the configuration XML file). The

    file structure after executing that command is shown in Figure [9-3](#310331_2_En_9_Chapter.xhtml#Fig3).


    ![../images/310331_2_En_9_Chapter/310331_2_En_9_Fig3_HTML.jpg](images/310331_2_En_9_Chapter/310331_2_En_9_Fig3_HTML.jpg)


    Figure 9-3

    Struts 2 application

    file structure after executing the Maven command


    In Figure [9-3](#310331_2_En_9_Chapter.xhtml#Fig3), you can see

    that there is a file named `struts.xml`; this is

    the main Struts 2 configuration file, and you can see its contents in

    Listing [9-1](#310331_2_En_9_Chapter.xhtml#PC1).


    ```


    welcome.jsp


    admin.jsp


    welcome.jsp


    Listing 9-1

    The struts.xml File

    ```


    In Listing [9-1](#310331_2_En_9_Chapter.xhtml#PC1), the action,

    `"helloWorld"`,

    doesn’t define a class name on the attribute `class`. In this case,

    it defines a simple string that identifies a Spring bean in the `spring-security.xmlspring-security.xml`

    that you’ll see later. When a request comes in, the framework looks at

    the definitions from this file to determine how to handle the particular

    request. (This definition is simplistic, but it’s good enough to make

    the point.) If it sees the name of a class in the `action` attribute, the

    framework instantiates a new object of that class to handle the request.

    If the framework detects that it is not a class, it looks for a bean

    with that ID in the Spring configuration and gets the object from there.

    All this is possible in the framework thanks to the `struts2-spring-plugin`

    plugin, which enhances Struts 2 with Spring functionality and makes it

    possible to define actions (and other components such as interceptors)

    in Spring beans.

    Please notice the usage of struts-2.5.dtd as Structs 2.5 version.


    What you’ll do now is rewrite the default `spring-security.xml`,

    replace it with the one from Listing [9-2](#310331_2_En_9_Chapter.xhtml#PC2),
    and add the

    familiar dependencies from Listing [9-3](#310331_2_En_9_Chapter.xhtml#PC3) to
    the `pom.xml` file.


    ```

    5.1.5.RELEASE

    5.1.5.RELEASE


    org.springframework

    spring-core

    ${springframework.version}


    org.springframework

    spring-web

    ${springframework.version}


    org.springframework

    spring-webmvc

    ${springframework.version}'
  trans: '

    本章将探讨 Spring Security 在 JVM 上运行的其他应用框架和语言中的使用场景。

    在前面的章节中，你已经了解到使用 Spring Security 的两种主要方式：在 Web 层以过滤器（filter）的形式，以及在业务层通过 Spring
    AOP 实现。这意味着你可以在任何基于 Servlet 技术构建的应用中，或者任何愿意使用 Spring 和 Spring AOP 来管理其对象生命周期和交互的应用中使用
    Spring Security。


    在接下来的章节中，你将看到这两种情况的示例。我们将首先介绍几个流行的 Java 框架（其中一个是基于 Spring 的），以及如何在这些框架中使用 Spring
    Security。这些框架包括流行的 Struts 2 Web 框架和 Spring Web Flow（SpringSource 套件中的另一个成员）。


    在研究了这两个框架之后，我们将简要介绍几种 Java 虚拟机（JVM）编程语言（及其相关框架），以及如何在这些语言中使用 Spring Security。我们将探讨
    Groovy 及其 Web 开发框架 Grails、JRuby 及其框架 Rails，以及嵌入在 Spring Web 应用中的 Scala。


    我们不会深入探讨这些框架或语言的细节，因为那超出了本书的范围。本章的目的仅仅是解释如何在更广泛的上下文中使用 Spring Security。


    Spring Security 与 Struts 2

    Struts 2 是一个流行的 Java Web 框架，由最初的 Struts 项目和 WebWork 项目合并而成。Struts 2 从一开始就被设计为原始
    Struts 框架的全面演进，以适应新一代强大的 Web 框架，并且它几乎保留了原始 Struts 的原则和实现。

    Struts 2 被广泛使用，并且与任何其他基于 Servlet 的外部框架一样，是集成 Spring 和 Spring Security 的理想候选者。

    Struts 2 是一个构建在标准 Java Servlet 技术之上的 MVC（模型-视图-控制器）框架，因此你在本书中读到的许多基于 Web 的安全原则无需修改即可适用。如果你只想使用你在第
    5 章中学到的基于 URL 的 Web 安全，你只需要相应地配置你的 `web.xml` 和 Spring Security 过滤器链，或者使用 `WebApplicationInitializer`
    来实现。

    有关 Struts 2 版本的更多信息，请访问 [`https://struts.apache.org/releases.html`](https://struts.apache.org/releases.html)。本书将使用
    Struts 版本 2.5.20。


    与本章中的其他框架和语言一样，我们不会深入解释 Struts 2（因为关于这个主题有很多优秀的书籍）。我们只会解释足够让你能够将 Spring Security
    与之结合使用的内容。事实上，我们假设你阅读本节可能是因为你已经在使用 Struts 2，并希望将 Spring Security 集成到其中。然而，为了进一步说明，图
    9-1 展示了 Struts 2 工作原理的全貌。


    ![../images/310331_2_En_9_Chapter/310331_2_En_9_Fig1_HTML.jpg](img/310331_2_En_9_Fig1_HTML.jpg)


    图 9-1

    Struts 2 工作原理


    当请求到达应用时，一个在 Servlet 过滤器中实现的前端控制器（[`http://en.wikipedia.org/wiki/Front_Controller`](http://en.wikipedia.org/wiki/Front_Controller)）会处理该请求。它将请求发送通过一组配置好的拦截器，这些拦截器在
    Action 被调用前后执行不同的功能。然后调用 Action，该 Action 包含当前请求所需的所有业务逻辑。Action 执行完毕后，会创建一个代表视图的结果对象，然后以相反的顺序（在返回结果时）再次调用拦截器栈，直到最终将响应返回给客户端。

    你首先要做的当然是下载库文件，并将其包含在你的 Maven 项目中，下载链接如下：

    `https://struts.apache.org/download.cgi#struts-ga`。

    Struts 2 可以下载完整发行版（包含所有内容），也可以只下载单独的库、源代码、文档等。


    你将使用 Maven 来构建这个项目。因此，让我们创建一个新的 Maven 项目，如图 9-2 所示。然后按照提示操作：在第一个提示中选择一个新的 *starter
    project*，并选择一些相关的 `groupId` 和 `artifactId` 名称。（我们分别选择了 `com.apress.pss.struts`
    和 `struts-example`，如图 9-2 所示。你可以使用相同的名称以便轻松地跟随示例进行操作）。


    ![../images/310331_2_En_9_Chapter/310331_2_En_9_Fig2_HTML.jpg](img/310331_2_En_9_Fig2_HTML.jpg)


    图 9-2

    Struts 项目


    现在，使用你创建测试所需的组件创建一个简单的、功能性的 Struts 2 Web 应用，包括 Spring 集成（尽管它使用了旧版本的配置 XML 文件 DTD）。执行该命令后的文件结构如图
    9-3 所示。


    ![../images/310331_2_En_9_Chapter/310331_2_En_9_Fig3_HTML.jpg](img/310331_2_En_9_Fig3_HTML.jpg)


    图 9-3

    执行 Maven 命令后的 Struts 2 应用文件结构


    在图 9-3 中，你可以看到一个名为 `struts.xml` 的文件；这是主要的 Struts 2 配置文件，你可以在清单 9-1 中看到其内容。


    ```


    welcome.jsp


    admin.jsp


    welcome.jsp


    清单 9-1

    struts.xml 文件

    ```


    在清单 9-1 中，Action `"helloWorld"` 没有在 `class` 属性上定义类名。在这种情况下，它定义了一个简单的字符串，用于标识你稍后将在
    `spring-security.xml` 中看到的 Spring Bean。当请求到达时，框架会查看此文件中的定义，以确定如何处理该特定请求。（这个定义很简单，但足以说明问题。）如果它在
    `action` 属性中看到了一个类名，框架就会实例化该类的一个新对象来处理请求。如果框架检测到它不是类名，它就会在 Spring 配置中查找具有该 ID
    的 Bean，并从那里获取对象。这一切之所以可能，要归功于 `struts2-spring-plugin` 插件，它为 Struts 2 增加了 Spring
    功能，并使得在 Spring Bean 中定义 Action（以及其他组件，如拦截器）成为可能。

    请注意使用了 `struts-2.5.dtd` 作为 Struts 2.5 版本。


    你现在要做的就是重写默认的 `spring-security.xml`，用清单 9-2 中的内容替换它，并将清单 9-3 中熟悉的依赖项添加到 `pom.xml`
    文件中。


    ```

    5.1.5.RELEASE

    5.1.5.RELEASE


    org.springframework

    spring-core

    ${springframework.version}


    org.springframework

    spring-web

    ${springframework.version}


    org.springframework

    spring-webmvc

    ${springframework.version}

    '
- fmt: "```xml\n<dependencies>\n    <dependency>\n        <groupId>org.springframework.security</groupId>\n\
    \        <artifactId>spring-security-web</artifactId>\n        <version>${springsecurity.version}</version>\n\
    \    </dependency>\n    <dependency>\n        <groupId>org.springframework.security</groupId>\n\
    \        <artifactId>spring-security-config</artifactId>\n        <version>${springsecurity.version}</version>\n\
    \    </dependency>\n</dependencies>\n```\n\n**Listing 9-3** Spring Security Dependencies\
    \ in the `pom.xml` File\n\n**Listing 9-2** The `spring-security.xml` File for\
    \ the Struts 2 Application\n\nNext, you need to add the Spring Security filter\
    \ to the `web.xml`. This filter should execute before the Struts 2 filter, so\
    \ an authentication object is populated before reaching the action. Remember that\
    \ Struts 2 works with filters and not with servlets. Listing [9-4](#310331_2_En_9_Chapter.xhtml#PC4)\
    \ shows the `web.xml` file you can use as a test. Note that we removed some filter\
    \ definitions we don’t care to use in the example.\n\n```xml\n<web-app>\n    <display-name>struts-example</display-name>\n\
    \    <welcome-file-list>\n        <welcome-file>index.jsp</welcome-file>\n   \
    \ </welcome-file-list>\n    <context-param>\n        <param-name>contextConfigLocation</param-name>\n\
    \        <param-value>classpath:spring-security.xml</param-value>\n    </context-param>\n\
    \    <filter>\n        <filter-name>struts2</filter-name>\n        <filter-class>org.apache.struts2.dispatcher.filter.StrutsPrepareAndExecuteFilter</filter-class>\n\
    \    </filter>\n    <filter-mapping>\n        <filter-name>struts2</filter-name>\n\
    \        <url-pattern>/*</url-pattern>\n    </filter-mapping>\n    <servlet>\n\
    \        <servlet-name>spring</servlet-name>\n        <servlet-class>org.springframework.web.servlet.DispatcherServlet</servlet-class>\n\
    \    </servlet>\n    <servlet-mapping>\n        <servlet-name>spring</servlet-name>\n\
    \        <url-pattern>/</url-pattern>\n    </servlet-mapping>\n    <listener>\n\
    \        <listener-class>org.springframework.web.context.ContextLoaderListener</listener-class>\n\
    \    </listener>\n    <filter>\n        <filter-name>springSecurityFilterChain</filter-name>\n\
    \        <filter-class>org.springframework.web.filter.DelegatingFilterProxy</filter-class>\n\
    \    </filter>\n    <filter-mapping>\n        <filter-name>springSecurityFilterChain</filter-name>\n\
    \        <url-pattern>/*</url-pattern>\n    </filter-mapping>\n    <servlet>\n\
    \        <servlet-name>jspSupportServlet</servlet-name>\n        <servlet-class>org.apache.struts2.views.JspSupportServlet</servlet-class>\n\
    \    </servlet>\n</web-app>\n```\n\n**Listing 9-4** The `web.xml` with the Spring\
    \ Security Filter and Struts 2 Filter\n\nNext, we simplified the `.jsp` files\
    \ inside the `jsp` folder like this: the file `helloWorld.jsp` just contains the\
    \ string “This is your first \"Secured\" Struts2 Application!” inside, nothing\
    \ else. Struts 2 has a built-in system to handle the exceptions that might be\
    \ thrown in your application. This mechanism would get in the way of Spring Security’s\
    \ exception-handling system, which depends on `AccessDeniedException`, among other\
    \ exceptions, to be thrown to alter the flow of execution. For example, when showing\
    \ a login form, you need to deactivate the Struts 2 exception-handling mechanism.\
    \ To do that in the file `struts.xml`, you add the line `<constant name=\"struts.handle.exception\"\
    \ value=\"false\" />` just below the other line that contains a defined `<constant>`\
    \ element.\n\nFinally, you need to secure your action. Make your `HelloWorldAction`\
    \ look like Listing [9-5](#310331_2_En_9_Chapter.xhtml#PC5).\n\n```java\npackage\
    \ com.apress.pss.struts;\nimport javax.servlet.http.HttpServletRequest;\nimport\
    \ org.apache.struts2.ServletActionContext;\npublic class HelloWorldAction {\n\
    private String username;\npublic String execute() {\nHttpServletRequest request\
    \ = ServletActionContext.getRequest();\nthis.setUsername(request.getUserPrincipal().getName());\n\
    return \"SUCCESS\";\n}\npublic String getUsername() {\nreturn username;\n}\npublic\
    \ void setUsername(String username) {\nthis.username = username;\n}\n}\n```\n\n\
    **Listing 9-5** `HelloWorldAction` Secured\n\nNow if you restart your application\
    \ and visit `http://localhost:8080/struts-example/helloWorld`, you’ll be presented\
    \ with the standard Spring Security login form. If you use the login username\
    \ `admin` and password `admin123`, you’ll be able to access the page. Figure [9-4](#310331_2_En_9_Chapter.xhtml#Fig4)\
    \ shows the login, the HelloWorld, and the logout page.\n\n![../images/310331_2_En_9_Chapter/310331_2_En_9_Fig4_HTML.jpg](images/310331_2_En_9_Chapter/310331_2_En_9_Fig4_HTML.jpg)\n\
    \n**Figure 9-4** The secured Struts 2 application and the accessed action\n\n\
    ## Spring Security with Spring Web Flow\n\nSpring Web Flow is a framework, built\
    \ on top of Spring MVC, that allows you to link different steps of a web-driven\
    \ process into a fluent workflow. In other words, it allows you to define in a\
    \ declarative way the different steps that a web application can go through while\
    \ you are interacting with it. Basically, you use it to define a set of rules\
    \ and transitions between the user interface (UI) parts of a web application and\
    \ the back-end process that each transition should trigger. Please check this\
    \ link for all information about Spring Web Flow: [`https://projects.spring.io/spring-webflow/`](https://projects.spring.io/spring-webflow/).\n\
    \nWhen you create a new Maven project, you need to add the Spring MF dependency\
    \ like this:\n\n```xml\n<dependency>\n    <groupId>org.springframework.webflow</groupId>\n\
    \    <artifactId>spring-webflow</artifactId>\n    <version>2.5.1.RELEASE</version>\n\
    </dependency>\n```\n\nGraphically, Spring Web Flow works, in a simplified form,\
    \ as shown in Figure [9-5](#310331_2_En_9_Chapter.xhtml#Fig5). The example is\
    \ a fake web page for a simplified product. The boxes represent various states\
    \ (the View state, Action state, Decision state, Subflow state, and others), and\
    \ the arrows represent transitions.\n\n![../images/310331_2_En_9_Chapter/310331_2_En_9_Fig5_HTML.jpg](images/310331_2_En_9_Chapter/310331_2_En_9_Fig5_HTML.jpg)\n\
    \n**Figure 9-5** The Simple Spring Web Flow scheme shows that, from a product\
    \ page, you can go to the review page or buy the product\n\nTo implement this\
    \ simple flow with Spring Web Flow, you’ll create a new project. As is the case\
