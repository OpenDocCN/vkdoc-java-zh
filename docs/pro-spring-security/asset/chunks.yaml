    从这个例子中，首先难以察觉的一点是，你实际上正在使用 Spring Security。我们之所以这么说，是因为你既没有定义任何过滤器、认证管理器、投票器、用户服务，也没有定义任何认证提供者。实际上，你甚至没有定义任何
