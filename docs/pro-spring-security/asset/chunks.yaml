    ACL System

    ```


    Listing [7-2](#310331_2_En_7_Chapter.xhtml#PC2) shows the existing permissions
    with bitmasks represented as the integers 1, 2, 4, 8, and 16 for Read, Write,
    Create, Delete, and Administration, respectively. There are 32 bits available
    for permissions, and the default permissions set bit 0, bit 1, bit 2, bit 3, and
    bit 4, respectively, to each integer value mentioned before. This class can be
    replaced with a custom `Permission` implementation class that includes different
    permissions, or it can be extended to include more permissions.


    In theory, working this way allows for the permissions to be easily combined to
    create composed permissions by adding two of them together. For example, you could
    combine `READ` and `WRITE` permissions by summing their respective values (1 +
    2 = 3) to grant both `READ` and `WRITE` permissions. However, in practice, it
    doesn’t really work like this. The class `org.springframework.security.acls.domain.DefaultPermissionGrantingStrategy`,
    which is the one in charge of evaluating the permissions required for an object
    against the permissions stored in the list of access control entries, will do
    comparisons for exact matches. So you normally have to include an ACE for `READ`
    and another one for `WRITE`.


