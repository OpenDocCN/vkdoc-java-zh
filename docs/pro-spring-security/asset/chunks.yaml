    图 3-7


    您的第一个 Java Web 应用程序项目


    在 Package Explorer 中，您现在应该能看到您的 Pss01 项目。展开它及其所有子项，您将看到类似图 3-8 的内容。


    ![../images/310331_2_En_3_Chapter/310331_2_En_3_Fig8_HTML.jpg](img/310331_2_En_3_Fig8_HTML.jpg)


