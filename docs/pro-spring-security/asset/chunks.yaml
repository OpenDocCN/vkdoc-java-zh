    \n## OAuth 2\n\nOAuth 2.0 is the industry-standard protocol for authorization.\
    \ You can get more information at [`https://oauth.net/2/`](https://oauth.net/2/).\
    \ Spring Security 5.0 now supports the OAuth 2.0 Authorization Framework and OpenID\
    \ Connect 1.0. With Spring Security 5.1, it introduced new Resource Server support\
    \ as well as additional Client support. The OAuth 2.0 implementation for authentication,\
    \ which conforms to the OpenID Connect specification and is OpenID Certified,\
    \ can be used for both authentication and authorization via Google’s OAuth 2.0\
    \ APIs. For more information, please go to [`https://developers.google.com/identity/protocols/OAuth2`](https://developers.google.com/identity/protocols/OAuth2).\n\
    \nOAuth 2 supports:\n\n*   Client\n*   Resource Server\n*   Authorization Server\n\
    \nThe OAuth 2.0 Client features provide support for the Client role as defined\
    \ in the OAuth 2.0 Authorization Framework. You can get more information at [`https://tools.ietf.org/html/rfc6749#section-1.1`](https://tools.ietf.org/html/rfc6749%2523section-1.1).\n\
    \nWhen developing an OAuth 2.0 Client, the following main features are available:\n\
    \n*   Authorization Code Grant\n*   Client Credentials Grant\n*   `WebClient`\
    \ extension for servlet environments (for making protected resource requests)\n\
    \nNotice that Spring Security 5 introduces a new `OAuth2LoginConfigurer` class\
    \ that you can use for configuring an external Authorization Server.\n\n## JSON\
    \ Web Token\n\nSpring Security 5 supports JSON Web Token (JWT) Authentication.\n\
    \nBasically you need to:\n\n*   Configure Spring Security for JWT\n*   Expose\
    \ the REST POST API with mapping `/authenticate`\n*   Configure a valid JSON Web\
    \ Token\n\nSpecifically, to configure Spring Security and JWT, you need to perform\
    \ two operations:\n\n1.  Generate JWT by:\n    *   Exposing a POST API with mapping\
    \ `/authenticate`\n    *   Passing the correct username and password\n    *  \
    \ Generating a JSON Web Token\n\n2.  Validate a JWT by:\n    *   When trying to\
    \ access the GET API with a certain mapping like `/Testing`\n    *   Allowing\
    \ access only if a request has a valid JSON Web Token\n\nSpring Security and JWT\
    \ dependencies include the following:\n\n```xml\n<dependency>\n    <groupId>io.jsonwebtoken</groupId>\n\
    \    <artifactId>jjwt</artifactId>\n    <version>0.9.1</version>\n</dependency>\n\
    ```\n\n## Spring WebSockets\n\nSpring Security 5 MVC supports Spring WebSockets.\
    \ For WebSocket implementation, you want to add the following Maven dependencies:\n\
    \n```xml\n<dependency>\n    <groupId>org.springframework</groupId>\n    <artifactId>spring-websocket</artifactId>\n\
    \    <version>${spring.version}</version>\n</dependency>\n\n<dependency>\n   \
    \ <groupId>org.springframework</groupId>\n    <artifactId>spring-messaging</artifactId>\n\
    \    <version>${spring.version}</version>\n</dependency>\n\n<dependency>\n   \
    \ <groupId>org.springframework.security</groupId>\n    <artifactId>spring-security-messaging</artifactId>\n\
    \    <version>${spring-security.version}</version>\n</dependency>\n```\n\nThen\
    \ you simply define the configuration of WebSocket-specific security using the\
    \ `spring-security-messaging` library centers via the `AbstractSecurityWebSocketMessageBrokerConfigurer`\
    \ class like this:\n\n```java\n@Configuration\npublic class SocketSecurityConfig\n\
    extends AbstractSecurityWebSocketMessageBrokerConfigurer {\n//...//\n}\n```\n\n\
    ## JAAS Authentication\n\nThe Java Authentication and Authorization Service (JAAS)\
    \ is the existing standard Java support for managing authentication and authorization.\
    \ Its functionality clearly overlaps with that of Spring Security. JAAS is a relatively\
    \ large standard that involves a lot more than the small amount of information\
    \ we covered here. However, the main concepts are the ones we showed you, and\
    \ the goal of the section is to show the building blocks for integrating it with\
    \ Spring Security. Check out the Spring Security 5 reference documentation for\
    \ more info about JAAS.\n\n## Central Authentication Service Authentication\n\n\
    Central Authentication Service (CAS) is an enterprise single sign-on solution\
    \ built in Java and open source. It has a great support community and integrates\
    \ into many Java projects. CAS provides a centralized place for authentication\
    \ and access control in an enterprise.\n\n### Overview\n\nJA-SIG, at [`http://www.ja-sig.org`](http://www.ja-sig.org),\
    \ produces an enterprise-wide single sign-on system known as CAS. JA-SIG’s Central\
    \ Authentication Service is a simple, open source, independent platform that supports\
    \ proxy capabilities. Spring Security fully supports CAS for single applications\
    \ as well as multiple-application deployments secured by an enterprise-wide CAS\
    \ server. You can learn more about CAS at [`www.apereo.org/projects/cas`](http://www.apereo.org/projects/cas).\
    \ One important characteristic of CAS is that it is designed to serve as a proxy\
    \ to different authentication storage solutions. This means it can be used in\
    \ combination with LDAP, JDBC, or a few other user stores that contain real user\
    \ data. This looks a lot like the way Spring Security leverages these same user\
    \ data stores. Check out the Spring Security 5 reference documentation for more\
    \ info about CAS.\n\n## Summary\n\nIn this chapter, we showed how you can use\
    \ Spring Security’s modular architecture to integrate different authentication\
    \ mechanisms with relative ease. We explained some of the authentication mechanisms\
    \ that come with the framework. In particular, we showed how to authenticate your\
    \ users against a database, an LDAP server, by using Client X.509 certificates.\
    \ JAAS, OAuth2/OpenID, WebSockets, JWT, and CAS were only introduced. This chapter\
    \ focused on showing how all these different authentication providers relate to\
    \ each other when they are used inside the framework. The goal was to show you\
    \ that integrating new providers into the framework is simple enough for you to\
    \ try. Of course, how easy it is depends on the authentication scheme that you\
    \ want to plug in. There are more authentication providers that we haven’t covered\
    \ in this chapter, but the main ideas tend to remain the same: create a connector\
    \ into Spring Security that deals with the particulars of the integrating protocol,\
    \ and adapt it to use the Spring Security model of authentication and authorization.\n\
