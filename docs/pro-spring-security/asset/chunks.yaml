- fmt: 'As Figure [4-16](#310331_2_En_4_Chapter.xhtml#Fig16) shows, currently there
    are a few implementations of `Authentication` in the framework:


    - `UsernamePasswordAuthenticationToken`: This is a simple implementation that
    contains, as its name clearly specifies, the user name and password information
    of the authenticated (or pending authentication) user. It is the most common `Authentication`
    implementation used throughout the system, as many of the `AuthenticationProvider`
    objects depend directly on this class.

    - `PreAuthenticatedAuthenticationToken`: This implementation exists for handling
    preauthenticated `Authentication` objects. Preauthenticated authentications are
    those where the actual authentication process is handled by an external system,
    and Spring Security deals only with extracting the principal (or user) information
    out of the external system’s messages.

    - `OpenIDAuthenticationToken`: This is an `Authentication` implementation used
    specifically for `OpenID` authentication schemes. It is used by both the `OpenID`
    filter and the `OpenID` authentication provider.

    - `RunAsUserToken`: This implementation is used by the `RunAsManager`, which is
    called by the Security Interceptor when the accessed resource contains a `ConfigAttribute`
    that starts with the prefix `RUN_AS_`. If there is a `ConfigAttribute` with this
    value, `RunAsManager` adds new `GrantedAuthorities` to the authenticated user
    corresponding to the `RUN_AS` value.


    ## SecurityContext and SecurityContextHolder


    The interface `org.springframework.security.core.context.SecurityContext` (actually,
    its implementation is `SecurityContextImpl`) is the place where Spring Security
    stores the valid `Authentication` object, associating it with the current thread.
    The `org.springframework.security.core.context.SecurityContextHolder` is the class
    used to access `SecurityContext` from many parts of the framework. It is built
    mainly of static methods to store and access `SecurityContext`, delegating to
    configurable strategies the way to handle this `SecurityContext`—for example,
    one `SecurityContext` per thread (default), one global `SecurityContext`, or a
    custom strategy. The class diagram for these classes can be seen in Figure [4-17](#310331_2_En_4_Chapter.xhtml#Fig17),
    and Listings [4-4](#310331_2_En_4_Chapter.xhtml#PC6) and [4-5](#310331_2_En_4_Chapter.xhtml#PC7)
    show the two classes.


    ![../images/310331_2_En_4_Chapter/310331_2_En_4_Fig17_HTML.jpg](images/310331_2_En_4_Chapter/310331_2_En_4_Fig17_HTML.jpg)


    **Figure 4-17** `SecurityContext` and `SecurityContextHolder`


    ```

    package org.springframework.security.core.context;

    import org.springframework.security.core.Authentication;

    import java.io.Serializable;

    public interface SecurityContext extends Serializable {

    Authentication getAuthentication();

    void setAuthentication(Authentication authentication);

    }

    Listing 4-4

    SecurityContext Interface

    ```


    Notice that the entire `SecurityContextHolder` reference can be found on GitHub
    at [`https://github.com/spring-projects/spring-security/blob/master/core/src/main/java/org/springframework/security/core/context/SecurityContext.java`](https://github.com/spring-projects/spring-security/blob/master/core/src/main/java/org/springframework/security/core/context/SecurityContext.java).


    ```

    package org.springframework.security.core.context;

    import org.springframework.util.ReflectionUtils;

    import java.lang.reflect.Constructor;

    public class SecurityContextHolder {

    public static final String MODE_THREADLOCAL = "MODE_THREADLOCAL";

    public static final String

    MODE_INHERITABLETHREADLOCAL = "MODE_INHERITABLETHREADLOCAL";

    public static final String MODE_GLOBAL = "MODE_GLOBAL";

    public static final String SYSTEM_PROPERTY = "spring.security.strategy";

    private static String strategyName = System.getProperty(SYSTEM_PROPERTY);

    private static SecurityContextHolderStrategy strategy;

    private static int initializeCount = 0;

    static {

    initialize();

    }

    public static void clearContext() {

    strategy.clearContext();

    }

    public static SecurityContext getContext() {

    return strategy.getContext();

    }

    public static int getInitializeCount() {

    return initializeCount;

    }

    private static void initialize() {

    if ((strategyName == null) || "".equals(strategyName)) {

    strategyName = MODE_THREADLOCAL;

    }

    if (strategyName.equals(MODE_THREADLOCAL)) {

    strategy = new ThreadLocalSecurityContextHolderStrategy();

    } else if (strategyName.equals(MODE_INHERITABLETHREADLOCAL)) {

    strategy = new InheritableThreadLocalSecurityContextHolderStrategy();

    } else if (strategyName.equals(MODE_GLOBAL)) {

    strategy = new GlobalSecurityContextHolderStrategy();

    } else {

    try {

    Class clazz = Class.forName(strategyName);

    Constructor customStrategy = clazz.getConstructor();

    strategy = (SecurityContextHolderStrategy) customStrategy.newInstance();

    } catch (Exception ex) {

    ReflectionUtils.handleReflectionException(ex);

    }

    }

    initializeCount++;

    }

    public static void setContext(SecurityContext context) {

    strategy.setContext(context);

    }

    public static void setStrategyName(String strategyName) {

    SecurityContextHolder.strategyName = strategyName;

    initialize();

    }

    public static SecurityContextHolderStrategy getContextHolderStrategy() {

    return strategy;

    }

    public static SecurityContext createEmptyContext() {

    return strategy.createEmptyContext();

    }

    public String toString() {

    return "SecurityContextHolder[strategy=''" + strategyName + "''; initializeCount="
    + initializeCount + "]";

    }

    }

    Listing 4-5

    SecurityContextHolder Class

    ```


    ## AuthenticationProvider


    `AuthenticationProvider` is the main entry point for authenticating an `Authentication`
    object. This interface has only two methods, as Listing [4-6](#310331_2_En_4_Chapter.xhtml#PC10)
    shows. This is one of the major extension points of the framework, as you can
    tell by the many classes that currently extend this interface. Each of the implementing
    classes deals with a particular external provider to authenticate against. So
    if you come across a particular provider that is not supported and you need to
    authenticate against it, you probably need to implement this interface with the
    required functionality. You will see examples of this later in the book.


    `AuthenticationProvider` (see Figure [4-18](#310331_2_En_4_Chapter.xhtml#Fig18))
    is very similar to `AuthenticationManager` but it has an extra method which can
    be used to call a query if it supports a given `Authentication` type, as shown
    here:


    ```

    public interface AuthenticationProvider {

    Authentication authenticate(Authentication authentication)

    throws AuthenticationException;

    boolean supports(Class authentication);

    }

    ```


    Here are some of the existing providers that come with the framework:


    ![../images/310331_2_En_4_Chapter/310331_2_En_4_Fig18_HTML.jpg](images/310331_2_En_4_Chapter/310331_2_En_4_Fig18_HTML.jpg)


    **Figure 4-18** `AuthenticationProvider` hierarchy


    ```

    CasAuthenticationProvider

    JaasAuthenticationProvider

    DaoAuthenticationProvider

    OpenIDAuthenticationProvider

    RememberMeAuthenticationProvider

    LdapAuthenticationProvider

    ```'
