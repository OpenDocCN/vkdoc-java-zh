    name`。


    清单[4-10]显示了`AuthenticationUserDetailsService`接口。这两种主要策略（`AuthenticationUserDetailsService`和`UserDetailsService`）用于在尝试身份验证时检索用户信息。它们通常从应用程序中使用的特定`AuthenticationProvider`中调用。例如，`OpenIDAuthenticationProvider`和`CasAuthenticationProvider`委托给`AuthenticationUserDetailsService`来获取用户详细信息，而`DaoAuthenticationProvider`直接委托给`UserDetailsService`。其他一些提供者不使用任何类型的用户详细信息服务（例如，`JaasAuthenticationProvider`使用自己的机制从`javax.security.auth.login.LoginContext`检索主体），还有一些使用完全自定义的机制（例如，`LdapAuthenticationProvider`使用`UserDetailsContextMapper`）。


