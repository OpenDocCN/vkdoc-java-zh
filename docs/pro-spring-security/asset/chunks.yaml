    3.  在生成的 `WEB-INF` 文件夹中，使用清单 6-2 的内容更新 `spring-security.xml`。

    4.  使用清单 6-3 中的内容更新 `com.apress.pss.servlets` 包中的 Servlet。

    5.  如清单 6-4 所示更新 `pom.xml`。


