    *   这是认证与授权过程的完整流程。图[5-8](#310331_2_En_5_Chapter.xhtml#Fig8)以伪流程图的形式展示了完整的交互过程。


    ## 特殊URL


    从前面的解释中，您可以看到Spring Security对Web安全的支持为您在应用程序中定义了一些预配置的URL。这些URL在框架中会得到特殊处理。主要的有以下几个：


    *   `/login`：这是Spring Security用于显示应用程序登录表单的URL。当需要认证但尚未存在时，框架将重定向到此URL。

    *   `/logout`：此URL用于框架注销当前登录的用户，并使相应的会话和`SecurityContext`失效。


    从上述URL来看，首先想到的是如何在应用程序中配置自己的登录表单，以及通常如何自定义登录过程，而不是使用默认的登录过程。这就是我们接下来要做的。


    > **注意**：从Spring Security v5开始，`/login`取代了在Spring Security 4中使用的`/j_spring_security_check`。


    ## 自定义登录表单


    当您使用Spring Security v5时，对应用程序的用户认证请求是通过`http.authorizeRequests()`方法完成的。当您像之前一样通过`http.authorizeRequests()`方法配置`http`元素时，Spring
    Security会为您设置默认的登录和注销过程，包括登录URL、登录表单、登录后的默认URL以及其他一些选项。基本上，当Spring Security的上下文开始加载时，它会发现没有配置自定义登录页面URL，因此它会采用默认的URL，并创建一个新的`DefaultLoginPageGeneratingFilter`实例，该实例将被添加到过滤器链中。正如您之前所见，这个过滤器就是为您生成登录表单的那个。


    如果您想配置自己的表单，需要执行以下任务。首先要告诉框架用您自己的处理方式替换默认处理方式。您在`SecurityConfiguration` Java文件的`http.authorizeRequests()`方法中定义以下子元素：


    ```

    formLogin().loginPage("/name of the login page")

    ```


    这个元素告诉Spring Security在启动时更改其默认的登录处理机制。首先，`DefaultLoginPageGeneratingFilter`将不再被实例化。让我们先尝试这个配置。应用新配置后，重新启动应用程序并尝试访问URL
    `http://localhost:8080/favoritesmovies/movies`。


    您会被重定向到URL `/login`，并收到一个404 HTTP错误，因为您还没有为此URL定义任何处理器。这个404页面如图[5-9](#310331_2_En_5_Chapter.xhtml#Fig9)所示。


    ![../images/310331_2_En_5_Chapter/310331_2_En_5_Fig9_HTML.jpg](images/310331_2_En_5_Chapter/310331_2_En_5_Fig9_HTML.jpg)


    图5-9 定义新的登录处理页面时出现的404错误


    让我们在`UserController`中添加一个登录控制器，如清单[5-7](#310331_2_En_5_Chapter.xhtml#PC9)所示。


    ```

    @GetMapping("/login")

    public String loginPage() {

    return "login";

    }

    清单5-7 添加到UserController的登录控制器

    ```


    接下来，在`SecurityConfiguration`文件中添加以下行：


    ```

    .and().formLogin().loginPage("/login").permitAll()

    ```


    现在，根据清单[5-8](#310331_2_En_5_Chapter.xhtml#PC11)在应用程序的`WEB-INF/views`文件夹中创建`login.jsp`页面。


    ```


    Spring Security Custom Login Form


    Spring Security Custom Login Form:


    Login with Username and Password


    User:


    Password:


    Remember Me:


    清单5-8 自定义login.jsp

    ```


    如果您重新启动应用程序并再次访问`http://localhost:8080/favoritesmovies/movies`，当您被重定向到`/login`
    URL时，应该会看到您的新登录表单。该表单如图[5-10](#310331_2_En_5_Chapter.xhtml#Fig10)所示。如果您输入**admin**作为用户名，**admin123**作为密码，您将能够访问`movie
    x`页面，就像之前使用默认登录表单一样。


    ![../images/310331_2_En_5_Chapter/310331_2_En_5_Fig10_HTML.jpg](images/310331_2_En_5_Chapter/310331_2_En_5_Fig10_HTML.jpg)


    图5-10 自定义登录表单


    如果您查看`login.jsp`，您会看到用户名字段、密码字段、记住我复选框以及表单元素的`action`属性都有特定的名称。这些名称不是随机的。Spring
    Security期望使用这些特定的名称才能正确处理认证过程。此外，表单应使用POST方法将信息发送到服务器，因为这是框架的要求。图中显示的“记住我”复选框将在后面解释。


    `<form-login>`元素支持更多配置选项，包括更改认证请求参数的默认`username`和`password`名称。


    `<form-login>`的属性可能包括：


    *   `always-use-default-target`

    *   `authentication-details-source-ref`

    *   `authentication-failure-handler-ref`

    *   `authentication-failure-url`

    *   `authentication-success-handler-ref`

    *   `default-target-url`

    *   `login-page`

    *   `login-processing-url`

    *   `password-parameter`

    *   `username-parameter`

    *   `authentication-success-forward-url`

    *   `authentication-failure-forward-url`


    重新启动应用程序，访问URL `/movies`，并使用**admin**/**admin123**登录。您应该能够毫无问题地访问应用程序。


    给这个属性赋值为`/login`。然后，在您的`login.jsp`中，在`<body>`标签之后添加清单[5-9](#310331_2_En_5_Chapter.xhtml#PC12)中的内容。


    ```

    清单5-9 显示login.jsp中错误的代码片段

    ```


    如果您现在重新启动应用程序并尝试访问URL `http://localhost:8080/favoritesmovies/movies`，然后使用错误的用户名和密码，您将再次看到登录页面，但顶部会显示错误消息。请查看图[5-11](#310331_2_En_5_Chapter.xhtml#Fig11)以了解您应该看到的页面。


    ![../images/310331_2_En_5_Chapter/310331_2_En_5_Fig11_HTML.jpg](images/310331_2_En_5_Chapter/310331_2_En_5_Fig11_HTML.jpg)


    图5-11 自定义表单中显示的自定义错误


    请注意，此URL可以是一个完全不同的URL，与登录URL完全无关。但常见的模式是允许用户再次尝试登录，并向其显示任何错误。


    *   `authentication-success-handler-ref`：对Spring应用程序上下文中`AuthenticationSuccessHandler`
    bean的引用。此bean在成功认证后被调用，并应处理认证后的下一步操作，通常决定应用程序中的重定向目标。当前实现形式为`SavedRequestAwareAuthenticationSuccessHandler`，它负责在成功认证后将登录用户重定向到最初请求的URL。

    *   `authentication-failure-handler-ref`：对Spring应用程序上下文中`AuthenticationFailureHandler`
    bean的引用。它用于处理失败的认证请求。当认证失败时，会调用此处理器。该处理器的标准行为是再次显示登录屏幕或返回401 HTTP状态错误。此行为由具体类`SimpleUrlAuthenticationFailureHandler`提供。'
