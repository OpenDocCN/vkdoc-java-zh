- fmt: '# 排版后的文档


    You could also secure the whole flow if you want by having the `<secured>` element
    be a direct child of the `<flow>` element. This means that, to access any state
    of the flow, a user needs to have the required permissions. Go ahead and try it
    yourself; it should be very straightforward.


    ## Spring Security in Other JVM Languages


    We are not experts in any of the languages that follow, and maybe we won’t use
    them in the examples in the most idiomatic way. (We know Ruby best because we
    often use it both at work and during leisure time. It’s one of our favorite languages.)
    However, our objective is just to show that, with some tweaking, you can integrate
    Spring Security into projects that are written in a language other than Java.
    You’ll see that the support for Spring Security in other JVM languages is sometimes
    straightforward and comprehensive (like when using Groovy and its Grails framework);
    at other times, you might need to roll your own integration solution to support
    it. In the upcoming sections, we give a brief overview of how to integrate Spring
    Security into what we consider to be the three major JVM languages other than
    Java: Groovy, JRuby, and Scala.


    Remember that ultimately Spring Security is no more than a set of Java libraries
    built on top of Spring Framework, which allows you to plug authentication/authorization
    security mechanisms into your applications. So it should be possible to integrate
    it into any Java (Java JVM) application you have. Of course, not all functionality
    will apply to all applications. For example, the filter chain won’t make sense
    in a non-web application.


    ## Spring Security and Ruby (JRuby)


    Ruby is definitely one of our favorite languages, and we spend a lot of time working
    with it. It combines great syntax with great language constructs, and it’s a pleasure
    to work with. Ruby is an object-oriented dynamic language with a focus on productivity,
    concision, and simplicity.


    The standard Ruby interpreter is written in C and was known as `MRI Ruby` until
    version 1.9. From version 1.9 forward, the official interpreter is known as the
    `YARV interpreter`.


    Ruby is an incredibly popular language, and most of its popularity stems from
    the widespread use of its incredible web framework, Ruby on Rails (RoR), also
    known simply as `Rails`. Rails is an MVC framework that places great emphasis
    on convention over configuration practices. It’s a very productive framework you
    can use to develop simple web applications in a fast and easy way if you follow
    the conventions enforced by the framework.


    We won’t give an in-depth explanation of either Ruby or Rails because that would
    be beyond the scope of this book. We also assume that if you’re reading this section,
    you probably know about them and just want to learn how to integrate Spring Security
    into them, or to learn if it’s at all possible. However, we’ll try to give small
    explanations of Ruby concepts when we use them in the examples.


    JRuby is a fully functional implementation of the Ruby programming language written
    in Java. You can use it to run Ruby programs inside a Java virtual machine and
    interact with your other JVM languages—mainly, of course, Java.


    What we’ll show in this section is a simple tutorial for integrating Spring Security
    into a Rails application and for deciding if it’s even worth doing. In the JRuby
    case, there is no plugin like the one you find in Grails. In fact, the integration
    between Java and Ruby is not as smooth as the integration between Java and Groovy.
    Basically, you’ll have to roll your own implementation to make the integration
    work.


    First things first. Let’s install JRuby. The JRuby version used for this book
    is version 9.2.6.0. You’ll use the simple installation here: just downloading
    a file, uncompressing it, and adding its executables to the path. The following
    is the procedure we used on a Windows machine (which should be similar to other
    operating systems):


    1. Go to the directory where you want to install JRuby.

    2. Download and install the file from `https://s3.amazonaws.com/jruby.org/downloads/9.2.6.0/jruby_windows_x64_9_2_6_0.exe`
    into the following directory: `c:\jruby-9.2.6.0`.

    3. You should have access to JRuby now. Execute `jruby –v`, and you should get
    the version of JRuby you just installed, as shown in Figure 9-9.


    ![../images/310331_2_En_9_Chapter/310331_2_En_9_Fig9_HTML.jpg](images/310331_2_En_9_Chapter/310331_2_En_9_Fig9_HTML.jpg)


    **Figure 9-9** JRuby version page


    4. Next, install Rails: `jruby –S gem install rails`, as shown in Figure 9-10.


    ![../images/310331_2_En_9_Chapter/310331_2_En_9_Fig10_HTML.jpg](images/310331_2_En_9_Chapter/310331_2_En_9_Fig10_HTML.jpg)


    **Figure 9-10** Installing Rails


    5. Now create your Rails application. As in the rest of the book, this will be
    an application with very little functionality just to show you how to use Spring
    Security. Let’s call this application simply `demo`. From a directory of your
    choice, write the following command: `rails new demo`.


    You now have a new basic Rails application in the system. You can run it by going
    to the directory `demo` that you just created from the command line and entering
    `rails s`. That command will start a WEBrick server and run the application on
    that server. If you are following the example, you should be able to visit `http://localhost:3000`
    on your computer and access the default Rails application home page.


    In the process of creating the Rails application, a lot of infrastructure code
    and a well-defined directory structure was generated for you. If you take a look
    at the `demo` directory (which is the root of your application), you’ll see what
    we mean.


    Anyway, as we said before, we won’t go into any depth examining the Rails framework
    or Ruby itself. We’ll simply show with a rudimentary example how you could approach
    integrating Spring Security into a Ruby on Rails application. We are assuming
    you already know Ruby and Rails.


    ### Web-Layer Security in Rails


    When you ran your Rails application in the previous section, you ran it with a
    Ruby server (WEBrick). This server doesn’t know anything about Java servlets,
    so you might guess that it’s not possible to run Spring Security web-layer security
    with this server—and you would be correct. What you need to do is run your Rails
    application in a standard Java web container, and that is what you’ll do next.


    First, install `warbler`, a gem you use to create standard WAR files from your
    Rails application. To install warbler, use the command `jruby –S gem install warbler`.
    After warbler is installed, you can execute `jruby –S warble` in the root directory
    of your application and it will create `demo.war`.


    That’s good, but let’s not deploy it just yet. Let’s add some functionality to
    it first, and then let’s add Spring Security–level security.


    You’ll add two simple routes to your application. One will return the string `SECURED`
    and will be accessible only to logged-in users. The other one will return the
    string `UNSECURED` and will be available to any user.


    Let’s create a pair of controllers: one for admin users and one for standard users.
    You’ll call these controllers simply `AdminsController` and `StandardsController`.
    Type the following two commands in the root of your `demo` application to generate
    them:


    ```

    rails g controller admins

    rails g controller standards

    ```


    The execution of those commands generates output describing the artifacts that
    got generated. You’ll then edit those controllers to look like Listings 9-17 and
    9-18. You can find the controllers in the standard Rails location in the `app/controllers`
    directory.'
