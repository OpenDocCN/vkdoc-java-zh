  raw: "*   AuthenticationManager: Controller in the authentication process\n\n* \
    \  AuthenticationProvider: Interface that maps to a data store which stores your\
    \ user data\n\n*   Authentication Object: Object that is created upon authentication\
    \ to hold the login credentials\n\n*   GrantedAuthority: Application permission\
    \ granted to a principal\n\n*   Principal: User that performs the action\n\n*\
    \   SecurityContext: Holds the authentication and other security information\n\
    \n*   SecurityContextHolder: Provides access to SecurityContext\n\n*   UserDetails:\
    \ Data object that contains the user credentials, but also the roles of the user\n\
    \n*   UserDetailsService: Collects the user credentials and authorities (roles),\
    \ and builds an UserDetails object\n\nHere are some of the most important technologies\
    \ Spring Security v5 supports integration with:\n\n*   HTTP\n\n*   LDAP\n\n* \
    \  OpenID\n\n*   JAAS API\n\n*   CAS\n\n### Note\n\nThe current Spring Security\
    \ 5.1.4.RELEASE can be downloaded at [`https://github.com/spring-projects/spring-security/releases/tag/5.1.4.RELEASE`](https://github.com/spring-projects/spring-security/releases/tag/5.1.4.RELEASE).\n\
    \nAs previously seen, authentication and authorization are some of the fundamental\
    \ functionalities in Spring Security 5.1\\. They are very important functionalities\
    \ because they allow the Spring Security application to identify and authorize\
    \ user as well as prevent unauthorized access and control the user authorization\
    \ to access application resources.\n\nIn this book, we will present some examples\
    \ about how to develop application to authorize and authenticate users.\n\nThe\
    \ Spring Security authentication/authorization flow is shown in Figure [2-3](#310331_2_En_2_Chapter.xhtml#Fig3).\n\
    \n![../images/310331_2_En_2_Chapter/310331_2_En_2_Fig3_HTML.jpg](images/310331_2_En_2_Chapter/310331_2_En_2_Fig3_HTML.jpg)\n\
    \nFigure 2-3\n\nSpring Security authentication/authorization functionalities flow\n\
    \nSpring Security is utilized via some specific modules as JAR files. The `spring-security-core.jar`\
    \ file contains the core:\n\n*   Authentication and access-control classes and\
    \ interfaces\n\n*   Remoting support and basic provisioning APIs\n\nHere are listed\
    \ the JAR files required by any application where you will use Spring Security\
    \ and supports:\n\n*   Standalone applications\n\n*   Remote clients\n\n*   Method\
    \ (service layer) security\n\n*   JDBC user provisioning\n\nThe Spring Security\
    \ v5 project’s most important modules (JAR files) include\n\n*   Core - `spring-security-core.jar`:\n\
    \    *   `org.springframework.security.core`\n\n    *   `org.springframework.security.access`\n\
    \n    *   `org.springframework.security.authentication`\n\n    *   `org.springframework.security.provisioning`\n\
    \n*   Remoting - `spring-security-remoting.jar`\n\n*   Web - `spring-security-web.jar`\n\
    \n*   Config - `spring-security-config.jar`\n\n*   LDAP - `spring-security-ldap.jar`\n\
    \n*   OAuth 2.0 Core - `spring-security-oauth2-core.jar`\n\n*   ACL - `spring-security-acl.jar`\n\
    \n*   CAS - `spring-security-cas.jar`\n\n*   OpenID - `spring-security-openid.jar`\n\
    \n*   Test - `spring-security-test.jar`\n\nPlease notice that both Spring Security\
    \ XML and Java annotations can be used when developing Spring Security applications.\n\
    \nIn this book, both XML and Java annotations will be utilized for our examples.\n\
    \n## Summary\n\nRight now, you should have a good idea of what Spring Security\
    \ is and what it is useful for. You also learned what’s new in the Spring Security\
    \ version 5\\. Along the way, we introduced some of the major architectural and\
    \ design principles behind it and how they are layered on top of the great Spring\
    \ Framework v5\\. We introduced dependency injection and AOP. In the next chapter,\
    \ we will set up the development scene and you will build your first Spring Security–powered\
    \ web application.\n\n# 3. Setting Up the Scene\n\nThis chapter will guide you\
    \ through the process of building your first simple Spring Security v5 project\
    \ using the IntelliJ IDEA Ultimate Edition 2019.2\\. This involves the following\
    \ steps:\n\n1.  Setting up the development environment\n\n2.  Creating a new Java\
    \ Web Application project without Spring Security\n\n3.  Updating the project\
    \ with Spring Security\n\n4.  Running the example\n\nLet’s start with setting\
    \ up the development environment.\n\n## Setting Up the Development Environment\n\
    \nHere’s the list of software you’ll need to download and install in the given\
    \ order:\n\n*   Java SE Development Kit (JDK) 11\n\n*   Maven 3.6.1\n\n*   IntelliJ\
    \ IDEA Ultimate Edition 2019.2\n\n*   Apache Tomcat Server v9 (External)\n\nLet’s\
    \ go through the steps required to set up everything properly.\n\nYour first step\
    \ is to set up the Java SE Development Kit.\n\nOn most operating systems, the\
    \ JDK comes in an installer or package, so there shouldn’t be any problems."
  trans: "\n*   **AuthenticationManager**：认证过程中的控制器\n*   **AuthenticationProvider**：映射到存储用户数据的数据存储的接口\n\
    *   **Authentication Object**：认证时创建的用于保存登录凭据的对象\n*   **GrantedAuthority**：授予主体的应用程序权限\n\
    *   **Principal**：执行操作的用户\n*   **SecurityContext**：保存认证信息及其他安全信息\n*   **SecurityContextHolder**：提供对\
    \ SecurityContext 的访问\n*   **UserDetails**：包含用户凭据以及用户角色的数据对象\n*   **UserDetailsService**：收集用户凭据和权限（角色），并构建\
    \ UserDetails 对象\n\n以下是 Spring Security v5 支持集成的一些最重要的技术：\n\n*   HTTP\n*   LDAP\n\
    *   OpenID\n*   JAAS API\n*   CAS\n\n### 注意\n\n当前的 Spring Security 5.1.4.RELEASE\
    \ 版本可从 [`https://github.com/spring-projects/spring-security/releases/tag/5.1.4.RELEASE`](https://github.com/spring-projects/spring-security/releases/tag/5.1.4.RELEASE)\
    \ 下载。\n\n如前所述，认证和授权是 Spring Security 5.1 中的一些基本功能。它们是非常重要的功能，因为它们允许 Spring Security\
    \ 应用程序识别和授权用户，同时防止未经授权的访问，并控制用户访问应用程序资源的权限。\n\n在本书中，我们将提供一些关于如何开发应用程序以授权和认证用户的示例。\n\
    \nSpring Security 的认证/授权流程如图 2-3 所示。\n\n![../images/310331_2_En_2_Chapter/310331_2_En_2_Fig3_HTML.jpg](img/310331_2_En_2_Fig3_HTML.jpg)\n\
    \n图 2-3\n\nSpring Security 认证/授权功能流程\n\nSpring Security 通过一些特定的模块（以 JAR 文件形式）来使用。`spring-security-core.jar`\
    \ 文件包含核心内容：\n\n*   认证和访问控制的类与接口\n*   远程支持及基本配置 API\n\n以下列出了任何使用 Spring Security\
    \ 的应用程序所需的 JAR 文件及其支持：\n\n*   独立应用程序\n*   远程客户端\n*   方法（服务层）安全\n*   JDBC 用户配置\n\
    \nSpring Security v5 项目最重要的模块（JAR 文件）包括：\n\n*   Core - `spring-security-core.jar`：\n\
    \    *   `org.springframework.security.core`\n    *   `org.springframework.security.access`\n\
    \    *   `org.springframework.security.authentication`\n    *   `org.springframework.security.provisioning`\n\
    *   Remoting - `spring-security-remoting.jar`\n*   Web - `spring-security-web.jar`\n\
    *   Config - `spring-security-config.jar`\n*   LDAP - `spring-security-ldap.jar`\n\
    *   OAuth 2.0 Core - `spring-security-oauth2-core.jar`\n*   ACL - `spring-security-acl.jar`\n\
    *   CAS - `spring-security-cas.jar`\n*   OpenID - `spring-security-openid.jar`\n\
    *   Test - `spring-security-test.jar`\n\n请注意，在开发 Spring Security 应用程序时，既可以使用 Spring\
    \ Security XML 配置，也可以使用 Java 注解。\n\n在本书中，我们的示例将同时使用 XML 和 Java 注解。\n\n## 总结\n\n\
    现在，您应该对 Spring Security 是什么以及它的用途有了很好的了解。您还了解了 Spring Security 5 版本中的新特性。在此过程中，我们介绍了其背后的一些主要架构和设计原则，以及它们如何分层构建在强大的\
    \ Spring Framework v5 之上。我们介绍了依赖注入和 AOP。在下一章中，我们将搭建开发环境，您将构建第一个由 Spring Security\
    \ 驱动的 Web 应用程序。\n\n# 3. 搭建开发环境\n\n本章将指导您使用 IntelliJ IDEA Ultimate Edition 2019.2\
    \ 构建第一个简单的 Spring Security v5 项目。这包括以下步骤：\n\n1.  搭建开发环境\n2.  创建一个不带 Spring Security\
    \ 的新 Java Web 应用程序项目\n3.  为项目添加 Spring Security\n4.  运行示例\n\n让我们从搭建开发环境开始。\n\n\
    ## 搭建开发环境\n\n以下是您需要按给定顺序下载和安装的软件列表：\n\n*   Java SE 开发工具包 (JDK) 11\n*   Maven 3.6.1\n\
    *   IntelliJ IDEA Ultimate Edition 2019.2\n*   Apache Tomcat Server v9（外部）\n\n\
    让我们逐步完成正确配置所有内容所需的步骤。\n\n您的第一步是安装 Java SE 开发工具包。\n\n在大多数操作系统上，JDK 以安装程序或软件包的形式提供，因此应该不会有任何问题。\n"
- fmt: '### Note


    Remember that the Java SE Development Kit and Java SE Runtime Environment (JRE)
    require at minimum a Pentium 2 266 MHz processor, 128MB of memory, and 181MB disk
    for development tools for 64-bit platforms.


    Download the JDK version specific to your Windows operating system from the following
    link:


    `www.oracle.com/technetwork/java/javase/downloads/jdk11-downloads-5066655.html`.


    We will use the JDK version 11 in this book. Once you have installed the JDK on
    your Windows 10 machine, remember to set a `JAVA_HOME` system variable by following
    these steps:


    1. Open the Windows Environment Variables.

    2. Add the `JAVA_HOME` variable and point it to the JDK installed folder (in my
    case, `C:\Program Files\Java\jdk-11.0.2`).

    3. Append `%JAVA_HOME%\bin` to the system PATH variable so that all of the Java
    commands will be accessible from everywhere.


    The result is shown in Figure [3-1](#310331_2_En_3_Chapter.xhtml#Fig1).


    ![../images/310331_2_En_3_Chapter/310331_2_En_3_Fig1_HTML.jpg](images/310331_2_En_3_Chapter/310331_2_En_3_Fig1_HTML.jpg)


    Figure 3-1 — Setting up the `JAVA_HOME` system variable


    Let’s test if the JDK installation was successful. Open a command prompt and type
    the code shown in Figure [3-2](#310331_2_En_3_Chapter.xhtml#Fig2).


    ![../images/310331_2_En_3_Chapter/310331_2_En_3_Fig2_HTML.png](images/310331_2_En_3_Chapter/310331_2_En_3_Fig2_HTML.png)


    Figure 3-2 — Testing the Java installation


    Great! Java is now installed and ready to be used for the examples in the book.


    Let’s now install the IntelliJ IDEA Ultimate Edition 2019.2 for web and enterprise
    development by following these steps:


    1. Download the `.exe` file from [`www.jetbrains.com/idea/download/#section=windows`](https://www.jetbrains.com/idea/download/%2523section%253Dwindows).

    2. Install the `.exe` file, which in our case is named `ideaIU-2019.2.exe`.


    Once installed, the directory should look like Figure [3-3](#310331_2_En_3_Chapter.xhtml#Fig3).


    ![../images/310331_2_En_3_Chapter/310331_2_En_3_Fig3_HTML.jpg](images/310331_2_En_3_Chapter/310331_2_En_3_Fig3_HTML.jpg)


    Figure 3-3 — The IntelliJ IDEA 2019.2 directory


    Now IntelliJ IDEA Ultimate Edition 2019.2 for web and enterprise development tool
    is ready to be used. Figure [3-4](#310331_2_En_3_Chapter.xhtml#Fig4) shows how
    the dashboard looks when executing it.


    ![../images/310331_2_En_3_Chapter/310331_2_En_3_Fig4_HTML.jpg](images/310331_2_En_3_Chapter/310331_2_En_3_Fig4_HTML.jpg)


    Figure 3-4 — The IntelliJ IDEA Ultimate Edition 2019.2 for web and enterprise
    development dashboard


    The next step is to install Maven 3.6.1 by downloading the `.zip` file named `apache-maven-3.6.1-bin.zip`
    at this web page: [`https://maven.apache.org/download.cgi`](https://maven.apache.org/download.cgi).


    Now run the IntelliJ IDEA 2019.2 tool and configure Maven 3.6.1 as shown in Figure
    [3-5](#310331_2_En_3_Chapter.xhtml#Fig5).


    ![../images/310331_2_En_3_Chapter/310331_2_En_3_Fig5_HTML.jpg](images/310331_2_En_3_Chapter/310331_2_En_3_Fig5_HTML.jpg)


    Figure 3-5 — Local Maven 3.6.1 is configured into IntelliJ IDEA 2019.2


    Now Maven 3.6.1 is ready to be used.


    The last tool used in this book is the Apache Tomcat Server and plugin v9. The
    first step is to download and install the Apache Tomcat Server v9 `.zip` file
    named `apache-tomcat-9.0.16.zip` at [`https://tomcat.apache.org/download-90.cgi`](https://tomcat.apache.org/download-90.cgi).


    Unzip the file in a certain directory onto your Windows machine, like `C:\Program
    Files\Apache Software Foundation\apache-tomcat-9.0.22`.


    Since you need to allow Spring projects to deploy to Tomcat Servers, you need
    to define Tomcat users to access to Tomcat Manager. Let’s open and update the
    file `tomcat-users.xml` in the `conf` directory and add the following XML fragment
    inside the `<tomcat-users>` element:


    Make sure you add the Tomcat Server to IntelliJ.


    Now Apache Tomcat Server and plugin v9 are ready to be used.


    Before starting a new spring project, you want to make sure the right JDK package
    is installed into IntelliJ IDEA 2019.2 IDE tool to compile your examples and avoid
    the typical compiling issue where the JRE is found instead of JDK. The configuration
    is shown in Figure [3-6](#310331_2_En_3_Chapter.xhtml#Fig6).


    ![../images/310331_2_En_3_Chapter/310331_2_En_3_Fig6_HTML.jpg](images/310331_2_En_3_Chapter/310331_2_En_3_Fig6_HTML.jpg)


    Figure 3-6 — Configuring the JDK to compile your examples


    So now the JDK compiler is set and you are ready to start writing and running
    your first Spring Web application example.


    ## Creating a New Java Web Application Project


    With your development tools set up, you can now create your first Java Web Application
    project using IntelliJ IDEA 2019.2. The built-in wizard makes creating a new Maven
    project very easy.


    So, let’s create your first Java Web application named `Pss01`, without security,
    which will just produce the following text: Hello Spring Security!


    Here are the steps you will follow to build the simple Maven Web Application project:


    1. Create a Java Web Application v4.

    2. Create and update the needed `.jsp` file.

    3. Run the Java Web Application using the external Tomcat Server v9.


    As first step, launch the IntelliJ IDEA tool and select File ➤ New ➤ Project ➤
    Java ➤ Web Application and fill all information about the project, as shown in
    Figure [3-7](#310331_2_En_3_Chapter.xhtml#Fig7).


    ![../images/310331_2_En_3_Chapter/310331_2_En_3_Fig7_HTML.jpg](images/310331_2_En_3_Chapter/310331_2_En_3_Fig7_HTML.jpg)


    Figure 3-7 — Your first Java Web Application project


    In the Package Explorer, you should now see your `Pss01` project. If you expand
    it and all its children, you’ll see something like Figure [3-8](#310331_2_En_3_Chapter.xhtml#Fig8).


    ![../images/310331_2_En_3_Chapter/310331_2_En_3_Fig8_HTML.jpg](images/310331_2_En_3_Chapter/310331_2_En_3_Fig8_HTML.jpg)


    Figure 3-8 — Your first Java Web Application project structure


    In general, the structure of most Java Web Application projects will contain:


    * The target directory: Used to house all output of the build

    * The `src` directory: Contains all of the source material for building the project,
    its site, etc.

    * `src/main/java`: Application/library sources

    * `src/main/resources`: Application/library resources

    * `web`: Web application sources

    * `Pom.xml`: File description of the project


    Your next step is to update the Java Web Application project’s files needed for
    your first simple application. Please note that for this simple Java Web Application
    example, you will not need to add any specific dependency to the project file
    `pom.xml`, which looks initially like Listing [3-1](#310331_2_En_3_Chapter.xhtml#PC2).


    ```

    4.0.0

    com.apress.pss

    Pss01

    1.0-SNAPSHOT

    ```


    Listing 3-1 — The `pom.xml` File with Servlet Dependencies


    The project right now only contains one simple `.jsp` file named `index.jsp`,
    which you will update to show the text you wish, as shown in Listing [3-2](#310331_2_En_3_Chapter.xhtml#PC3).


    ```

    $Title$


    Hello Spring Security!

    ```


    Listing 3-2 — The `index.jsp` File


    Next, click the Add Configuration button, located at the top-right of the IntelliJ
    tool, to configure how to run your first example.


    You can run your project using the external Tomcat Server v9, as shown in Figure
    [3-9](#310331_2_En_3_Chapter.xhtml#Fig9).


    ![../images/310331_2_En_3_Chapter/310331_2_En_3_Fig9_HTML.jpg](images/310331_2_En_3_Chapter/310331_2_En_3_Fig9_HTML.jpg)


    Figure 3-9 — Configure the running steps of your first Maven project


    Now you can open your web browser and type the web address `http://localhost:8080`,
    as shown in Figure [3-10](#310331_2_En_3_Chapter.xhtml#Fig10).


    ![../images/310331_2_En_3_Chapter/310331_2_En_3_Fig10_HTML.jpg](images/310331_2_En_3_Chapter/310331_2_En_3_Fig10_HTML.jpg)


    Figure 3-10 — The Java Web Application project running in a web browser


    Your first Java Web Application project is now ready to be transformed into a
    Spring Security project.'
