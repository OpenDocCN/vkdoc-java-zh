    2.  检查电子邮件和密码是否输入正确。

    3.  提供注册选项，以便向 MongoDB 数据库添加新用户。


    为了检查用户的凭据是否有效以及他们应该被重定向到哪里，创建名为 `LoginController` 的 Java 控制器类，如清单 8-10 所示。


