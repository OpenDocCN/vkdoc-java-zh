    \ 6-24\n### `pom.xml` File\n\n```\nAs with the previous LDAP project in this chapter,\
    \ create one HTML file\nunder `templates`\nnamed `admin.html`, as shown\nin Listing\
    \ [6-25](#310331_2_En_6_Chapter.xhtml#PC28).\n```\n\n```\nSpring Security 5 and\
    \ LDAP.\n\nWelcome:  \nYou are succesfully logged as an Admin!\n\nThis content\
    \ is only shown to authenticated users.\n\nThis content is only shown to administrators.\n\
    ```\n\n## Listing 6-25\n### `admin.html`\n\nNow create three packages under `Java`\
    \ in your project.\n\n*   Configuration: Contains the `SpringSecurityConfiguration`\
    \ Java class\n*   Controller: Contains the `UserController` Java class\n*   Domain:\
    \ Contains the `User` Java class\n\nNow create three Java classes: `SpringSecurityConfiguration`,\
    \ `UserController`, and `User`.\n\nLet’s start by creating the `SpringSecurityConfiguration`\
    \ Java class shown in Listing [6-26](#310331_2_En_6_Chapter.xhtml#PC29).\n\n```\n\
    package com.apress.SpringSecurityX509Auth.Configuration;\nimport org.springframework.context.annotation.Bean;\n\
    import org.springframework.context.annotation.Configuration;\nimport org.springframework.security.config.annotation.method.configuration.EnableGlobalMethodSecurity;\n\
    import org.springframework.security.config.annotation.web.builders.HttpSecurity;\n\
    import org.springframework.security.config.annotation.web.configuration.EnableWebSecurity;\n\
    import org.springframework.security.config.annotation.web.configuration.WebSecurityConfigurerAdapter;\n\
    import org.springframework.security.core.authority.AuthorityUtils;\nimport org.springframework.security.core.userdetails.User;\n\
    import org.springframework.security.core.userdetails.UserDetails;\nimport org.springframework.security.core.userdetails.UserDetailsService;\n\
    import org.springframework.security.core.userdetails.UsernameNotFoundException;\n\
    import org.springframework.security.web.util.matcher.AntPathRequestMatcher;\n\
    @Configuration\n@EnableWebSecurity\n@EnableGlobalMethodSecurity(securedEnabled\
    \ = true)\npublic class SpringSecurityConfiguration extends WebSecurityConfigurerAdapter\
    \ {\n@Override\nprotected void configure(HttpSecurity http) throws Exception {\n\
    http\n.authorizeRequests()\n.anyRequest().authenticated().and()\n.x509()\n.subjectPrincipalRegex(\"\
    CN=(.*?)(?:,|$)\")\n.userDetailsService(userDetailsService())\n.and().logout()\n\
    .logoutUrl(\"/perform_logout\")\n.logoutRequestMatcher(new AntPathRequestMatcher(\"\
    /logout\"))\n.logoutSuccessUrl(\"/admin\")\n.deleteCookies(\"JSESSIONID\")\n.invalidateHttpSession(true)\n\
    .logoutRequestMatcher(new AntPathRequestMatcher(\"/logout\"));\n}\n@Bean\npublic\
    \ UserDetailsService userDetailsService() {\nreturn (UserDetailsService) username\
    \ -> {\nif (username.equals(\"nardone\")) {\nreturn new User(username, \"\",\n\
    AuthorityUtils\n.commaSeparatedStringToAuthorityList(\"ROLE_USER\"));\n} else\
    \ {\nthrow new UsernameNotFoundException(String.format(\"User %s not found\",\
    \ username));\n}\n};\n}\n}\n```\n\n## Listing 6-26\n### `SpringSecurityConfiguration`\
    \ Java Class\n\nThis Java class is very simple to understand. Once you provide\
    \ a valid client certificate, it will get the value `CN` from it via the following\
    \ lines:\n\n```\n.anyRequest().authenticated().and()\n.x509()\n.subjectPrincipalRegex(\"\
    CN=(.*?)(?:,|$)\")\n.userDetailsService(userDetailsService());\n```\n\nThen it\
    \ will check if the value `CN` is equal to `nardone`. If so, it will return the\
    \ username `nardone` with the authority as `ROLE_USER` and authorize the user\
    \ to proceed:\n\n```\nif (username.equals(\"nardone\")) {\nreturn new User(username,\
    \ \"\",\nAuthorityUtils\n.commaSeparatedStringToAuthorityList(\"ROLE_USER\"));\n\
    ```\n\nNow create the `UserController` Java class shown in Listing [6-27](#310331_2_En_6_Chapter.xhtml#PC32).\n\
    \n```\npackage com.apress.SpringSecurityX509Auth.Controller;\nimport org.springframework.security.access.annotation.Secured;\n\
    import org.springframework.security.authentication.UsernamePasswordAuthenticationToken;\n\
    import org.springframework.security.config.annotation.web.builders.WebSecurity;\n\
    import org.springframework.security.core.Authentication;\nimport org.springframework.security.core.context.SecurityContextHolder;\n\
    import org.springframework.web.bind.annotation.*;\nimport com.apress.SpringSecurityX509Auth.Domain.User;\n\
    import org.springframework.web.servlet.ModelAndView;\n@RestController\npublic\
    \ class UserController {\n@Secured(\"ROLE_USER\")\n@RequestMapping(value = {\"\
    /\",\"/admin\"}, method = RequestMethod.GET)\npublic ModelAndView admin() {\n\
    ModelAndView modelAndView = new ModelAndView();\nmodelAndView.setViewName(\"admin\"\
    );\nAuthentication auth = SecurityContextHolder.getContext().getAuthentication();\n\
    modelAndView.addObject(\"currentUser\", auth.getName());\nUser user = new User();\n\
    return modelAndView;\n}\npublic void configure(WebSecurity web) throws Exception\
    \ {\nweb\n.ignoring()\n.antMatchers(\"/resources/**\");\n}\n}\n```\n\n## Listing\
    \ 6-27\n### `UserController` Java Class\n\nThis is a simple User controller Java\
    \ class which will redirect URLs as requested.\n\nNow create the `User` Java class\
    \ shown in Listing [6-28](#310331_2_En_6_Chapter.xhtml#PC33).\n\n```\npackage\
    \ com.apress.SpringSecurityX509Auth.Domain;\npublic class User {\nprivate String\
    \ name;\npublic User() {\nthis.name = name;\n}\npublic String getName() {\nreturn\
    \ name;\n}\npublic void setName(String name) {\nthis.name = name;\n}\n}\n```\n\
    \n## Listing 6-28\n### `User` Java Class\n\nThis class will fetch data from the\
    \ X.509 client certificate provided for the authentication. This is all the configuration\
    \ Spring needs to handle client certificates.\n\nOf course, things are not that\
    \ simple and the job is not yet done. In reality, Spring Security X.509 support\
    \ doesn’t authenticate the user. The user is assumed to be already authenticated,\
    \ and Spring Security simply creates a successful `Authentication` object with\
    \ information extracted from the certificate and stores it in the `SecurityContext`\
    \ in the standard way.\n\nSo the entity that is actually in charge of authenticating\
    \ the user (or more exactly, accepting the user as a properly identified one)\
    \ is the web server, which does this by accepting the provided client certificate.\
    \ Basically, if the server decides that the certificate sent by the user is a\
    \ valid one, the user is who she claims to be and gets authenticated.\n\nIn a\
    \ production system, the web server makes sure that the certificate provided by\
    \ the client is signed by an authorized trusted authority.\n\nHowever, you will\
    \ use a test environment with your common Maven-configured Tomcat installation,\
    \ and for that you will configure a self-signed certificate and make sure that\
    \ Tomcat accepts it.\n\nBefore you start, make sure you installed the `openssl`\
    \ tool on your machine. Download it from [`https://wiki.openssl.org/index.php/Binaries`](https://wiki.openssl.org/index.php/Binaries).\n\
    \nLet’s create the server and client certificates needed. It is pretty straightforward\
    \ to do, and you will use the `openssl` tool to do it:\n\n### For the server:\n\
    \n1.  Generate a server private key (PEM) and a server self-signed certificate\
    \ (CRT):\n\n    ```\n    openssl req -x509 -newkey rsa:4096 -keyout serverPrivateKey.pem\
    \ -out server.crt -days 3650 -nodes\n    ```\n\n2.  Create a PKCS12 keystore containing\
    \ a private key (P12) and a related self-signed certificate (CRT) (password used:\
    \ `changeit`):\n\n    ```\n    openssl pkcs12 -export -out keyStore.p12 -inkey\
    \ serverPrivateKey.pem -in server.crt\n    ```\n\n3.  Generate a server trust\
    \ store (JKS) from the server certificate (CRT):"
