    当您需要执行以下操作时，可使用此 Java 类：


    *   通过 `findUserByEmail()` 和 `loadUserByUsername()` 加载用户信息，例如电子邮件地址或用户的 `GrantedAuthority`
    列表

    *   通过 `saveUser()` 保存新用户

    *   通过 `getUserAuthority()` 获取用户权限

    *   通过 `buildUserForAuthentication()` 构建用于身份验证的用户


    请注意，您需要 `return a new org.springframework.security.core.userdetails.User()` 来存储用户身份验证凭证，包括电子邮件、密码和权限。


    现在，您终于可以创建 `login.html` 页面了；请参见清单 8-20。


    ```


    Spinrg Boot Security 5 and MongoDB


    请以用户或管理员身份登录：


    无效的电子邮件或密码。


    电子邮件地址：


    密码：


    登录


    注册为新用户


    清单 8-20

    login.html 页面

    ```


    `login.html` 页面收集登录所需的信息（如电子邮件和密码），并通过 POST 方法将其发送到 `/login` URL，该 URL 将通过 `LoginController`
    Java 类使用以下代码行进行验证：


    ```

    @RequestMapping(value = "/login", method = RequestMethod.GET)

    public ModelAndView login() {

    ModelAndView modelAndView = new ModelAndView();

    modelAndView.setViewName("login");

    return modelAndView;

    ```


