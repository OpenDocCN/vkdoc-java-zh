  trans: '

    #### XML 命名空间


    XML 命名空间对于框架的通用吸引力和可用性至关重要，但理论上，它并非严格必要。如果你了解 Spring 框架的命名空间是如何工作的，那么在应用程序上下文定义文件中定义特定于安全性的
    XML 配置时，你可能已经很清楚发生了什么。如果你不了解它们的工作原理，你可能会认为 Spring 以某种方式知道如何处理这些特定元素，以及如何在通用的 Spring
    应用程序上下文中加载它们。无论哪种情况，我们都会在这里详细解释在 Spring 中定义自定义命名空间的过程，特别是 Spring Security 命名空间中的元素。


    最初，Spring 不支持自定义 XML。Spring 所能理解的只有其标准 Spring Core 命名空间中定义的自身类，你可以在其中逐个 bean 地定义
    `<bean>`，并且如果不自行在配置中添加复杂性，就无法真正定义任何概念上更复杂的内容。


    这种基于 `<bean>` 的配置过去是（现在仍然是）配置通用 bean 实例的绝佳方式，但在定义更特定于领域的实用程序时，它很快就会变得混乱不堪。除了混乱之外，它在表达你所定义的
    bean 的业务领域方面也非常糟糕。


    我们将在本书后面探讨这种手动配置，但对于标准情况，它是不需要的，你应该直接使用命名空间。但是，请记住，在底层，命名空间不过是语法糖。归根结底，你最终得到的仍然是标准的
    Spring bean 和对象。


    Spring 2.0 引入了对定义自定义 XML 命名空间的支持。从那时起，许多项目都利用了此功能，使其更易于使用。


    XML 自定义命名空间本质上是一种基于 XML 的领域特定语言（DSL），由 XML 模式（`.xsd`）文件的规则指导，允许开发人员使用与其试图建模的编程关注点更一致的概念和语法来创建
    Spring bean。


    ### 注意


    DSL 是一种为表示特定应用程序领域的概念而量身定制的语言。有时，会创建一种全新的语言来支持新领域，这被称为*外部 DSL*。其他时候，会对现有语言进行调整，以允许表示领域概念的新表达式，这被称为*内部
    DSL*。在本章介绍的情况下，你使用的是通用语言（XML）；但是，你正在定义关于元素（使用 XSD）的某些约束，从而创建了一个内部 DSL 来表示安全概念。


    让 Spring 识别一个新的命名空间非常简单。（这并不是说实际解析 XML 信息并将其转换为 bean 很简单——这取决于你的 DSL 的复杂性。）你只需要以下内容：


    *   一个定义特定 XML 结构的 `.xsd` 文件

    *   一个 `spring.schemas` 文件，在其中指定基于 URL 的模式位置与类路径中 `.xsd` 文件位置之间的映射

    *   一个 `spring.handlers` 文件，在其中指定哪个类负责处理与你的命名空间相关的所有事务

    *   一组解析器类，负责解析 XML 文件中定义的每个顶级元素


    在第 8 章中，你将看到一些如何创建新命名空间元素并将其与 Spring Security 集成的示例。


    对于 Spring Security，所有与命名空间配置相关的信息都位于 `config` 模块中。在图 4-7 中，你可以看到在 Eclipse 集成开发环境（IDE）中（本例中为
    Spring Tool Suite v4 for Eclipse）看到的 `config` 模块的展开结构。


    ![../images/310331_2_En_4_Chapter/310331_2_En_4_Fig7_HTML.jpg](img/310331_2_En_4_Fig7_HTML.jpg)


    图 4-7


    Spring Security 的文件结构


    文件 `spring.handlers` 和 `spring.schemas` 应位于类路径的 `META-INF` 目录中，以便 Spring 能在那里找到它们。


    好了，关于通用命名空间的信息就介绍到这里。更具体地说，Spring Security 命名空间是如何工作的？


    当你创建一个基于 Spring 的应用程序，使用 XML 定义的应用程序上下文配置，并包含一些 Spring Security 命名空间定义时，当你运行该应用程序，它开始加载时，会查看
    XML 配置文件顶部的应用程序上下文命名空间定义。它会找到对 Spring Security 命名空间的引用（通常是一个类似 `xmlns:security="`[`http://www.springframework.org/schema/security`](http://www.springframework.org/schema/security)`"`
    的引用）。使用 `spring.handlers` 映射文件中的信息，它会发现处理安全元素的文件是最终类 `org.springframework.security.config.SecurityNamespaceHandler`。Spring
    会为配置文件中使用安全命名空间的每个顶级元素调用此类的 `parse` 方法。图 4-8 显示了此过程的加载序列。


    ![../images/310331_2_En_4_Chapter/310331_2_En_4_Fig8_HTML.jpg](img/310331_2_En_4_Fig8_HTML.jpg)


    图 4-8


    加载 Spring 命名空间的序列


    `SecurityNamespaceHandler` 委托给一系列 `BeanDefinitionParser` 对象，用于单独解析每个顶级元素。Spring
    Security 命名空间配置中支持的完整元素列表在类 `org.springframework.security.config.Elements` 中定义为常量。此类如清单
    4-2 所示。

    '
