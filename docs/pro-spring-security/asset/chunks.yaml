- fmt: '### Aspect-Oriented Programming


    `AOP` is a technique for extracting cross-cutting concerns from the main application
    code and applying them in a transverse way across the points where they are needed.
    Typical examples of `AOP` concerns are transactions, logging, and security.


    The main idea is that you decouple the main business logic of your application
    from special-purpose concerns that are peripheral to this core logic, and then
    apply this functionality in a transparent, unobtrusive way through your application.
    By encapsulating this functionality (which is simply general application logic
    and not core business logic) in its own modules, they can be used by many parts
    of the application that need them, avoiding the need to duplicate this code all
    over the place. The entities that encapsulate this cross-cutting logic are referred
    to as Aspects in `AOP` terms.


    There are many implementations of `AOP` in Java. The most popular, perhaps, is
    `AspectJ`, which requires a special compilation process. Spring supports `AspectJ`,
    but it also includes its own `AOP` implementation, known simply as *Spring AOP*,
    which is a pure Java implementation that requires no special compilation process.


    Spring AOP using proxies is available only at the public-method level and just
    when it is called from outside the proxied object. This makes sense because calling
    a method from inside the object won’t call the proxy; instead, it calls the real
    self object directly (basically a call on the `this` object). This is very important
    to be aware of when working with Spring, and sometimes it is overlooked by novice
    Spring developers.


    Even when using its own `AOP` implementation, Spring leverages the `AspectJ` syntax
    and concepts for defining Aspects.


    Spring AOP is a fairly big subject, but the principle behind the way it works
    is not difficult to understand. Spring AOP works with the use of dynamically created
    proxy objects that take care of the `AOP` concerns around the invocation of your
    main business objects. You can think of the proxy and Spring AOP in general simply
    as a Decorator Pattern implementation, where your business object is the component
    and the `AOP` proxy is the decorator. Figure [2-2](#310331_2_En_2_Chapter.xhtml#Fig2)
    shows a simple graphical representation of the concept. Thinking about it this
    way, you should be able to understand Spring AOP easily. Listing [2-3](#310331_2_En_2_Chapter.xhtml#PC3)
    shows how the magic happens conceptually.


