    *   **您需要应用程序在用户下次访问时记住他们，并允许他们访问。** 有时，您不希望或不需要应用程序的用户每次访问您的网站时都登录。Spring 提供了开箱即用的“记住我”功能，以便用户在后续访问您的网站时可以自动登录，从而允许他们完全或部分访问其个人资料的功能。


    *   **您希望使用公钥/私钥证书来对您的应用程序进行身份验证。** Spring Security 允许您使用 X.509 证书来验证服务器的身份。服务器也可以向客户端请求有效证书，以建立相互认证。


    *   **您需要向某些用户隐藏网页中的元素，并向其他用户显示这些元素。** 视图安全是安全 Web 应用程序中的第一层安全。它通常不足以保证安全，但从可用性的角度来看非常重要，因为它允许应用程序根据当前登录系统的用户来显示或隐藏内容。


    *   **对于您的应用程序，您需要比简单的基于角色的身份验证更灵活的方式。** 例如，假设您希望仅允许 18 岁以上的用户使用简单的脚本表达式进行访问。Spring
    Security 3.1 使用 Spring 表达式语言 (SpEL) 允许您自定义应用程序的访问规则。


    *   **您希望您的应用程序自动处理与授权错误相关的 HTTP 状态码（401、403 等）。** Spring Security 为 Web 应用程序内置的异常处理机制会自动将更常见的异常转换为相应的
    HTTP 状态码；例如，`AccessDeniedException` 会被转换为 `403` 状态码。


    *   **您希望配置您的应用程序以供其他应用程序（而非浏览器）使用，并允许这些其他应用程序对您的应用程序进行身份验证。** 访问您应用程序的其他应用程序应被强制使用身份验证机制才能获得访问权限。例如，您可以通过
    REST 端点公开您的应用程序，其他应用程序可以使用 HTTP 安全性访问这些端点。


    *   **您在 Java EE 服务器之外运行应用程序。** 如果您在像 Apache Tomcat 这样的简单 Web 容器中运行应用程序，您可能无法获得完整的
    Java EE 安全栈支持。在这些环境中可以轻松利用 Spring Security。


    *   **您在 Java EE 服务器内部运行应用程序。** 即使您运行的是完整的 Java EE 容器，Spring Security 也比 Java
    EE 对应的方案更完整、更灵活且更易于使用。


    *   **您已经在应用程序中使用 Spring，并希望利用您对它的了解。** 我们之前解释了 Spring 的一些巨大优势。如果您目前正在使用 Spring，您可能非常喜欢它。因此，您可能也会喜欢
    Spring Security。


    ## Spring Security 概述


    Spring Security v5 不再是 SpringSource 的一部分，而是现在属于 Pivotal。Pivotal 的 Spring 包含许多项目：


    *   Spring Security

    *   Spring Boot

    *   Spring Framework

    *   Spring Cloud Data Flow

    *   Spring Cloud

    *   Spring Data

    *   Spring Integration

    *   Spring Batch

    *   Spring Hateoas

    *   Spring Rest Docs

    *   Spring Amqp

    *   Spring Mobile

    *   Spring For Android

    *   Spring Web Flow

    *   Spring Web Services

    *   Spring Ldap

    *   Spring Session

    *   Spring Shell

    *   Spring Flo

    *   Spring Kafka

    *   Spring Statemachine

    *   Spring Io Platform

    *   Spring Roo

    *   Spring Scala

    *   Spring Blazeds Integration

    *   Spring Loaded

    *   Spring Xd

    *   Spring Social


    更多信息，请参考 Spring 项目网页 [`https://spring.io/projects`](https://spring.io/projects)。


    所有这些项目都构建在 Spring 框架本身提供的设施之上，而 Spring 框架是这一切的起源项目。您可以将 Spring 视为所有这些卫星项目的中心，为它们提供一致的编程模型和一套既定实践。您将在不同项目中看到的主要要点是
    DI、基于 XML 命名空间的配置和 AOP 的使用，正如您将在下一节中看到的，这些是 Spring 赖以建立的支柱。在 Spring 的后续版本中，注解已成为配置
    DI 和 AOP 相关问题最流行的方法。


    在本书中，我们将主要介绍 Spring Boot，分析 Spring Framework，并开发 Spring Security 版本 5。让我们从 Spring
    Boot 开始。


    什么是 Spring Boot？


    Spring Boot 是一个基于 Java 的开源框架，通常用于开发微服务、企业级应用程序。它由 Pivotal 团队开发，帮助开发人员创建独立且生产就绪的
    Spring 应用程序。


    Spring Boot 被认为是构建所有基于 Spring 的应用程序并尽可能快速运行它们的一个简单起点，只需最少的 Spring 前期配置。


    ### 注意


    请记住，Spring Security 应用程序可以使用 Maven 或 Gradle 开发。


    正如我们所说，Spring Security 只是 Spring 项目中的一个，它专门致力于解决应用程序中的安全问题。


    更多信息，请参考文档 [`https://spring.io/projects/spring-security`](https://spring.io/projects/spring-security)。


    Spring Security 最初是一个非 Spring 项目。它最初被称为 *The Acegi Security System for Spring*，并且不像今天这样庞大而强大。最初，它只处理授权问题，并利用容器提供的身份验证。由于公众需求，随着越来越多的人开始使用它并为其不断增长的代码库做出贡献，该项目开始获得关注。这最终使其成为
    Spring 框架组合项目中的一个，后来更名为“Spring Security”。


    以下是 Spring Security 主要版本的发布日期：


    *   2.0.0（2008 年 4 月）

    *   3.0.0（2009 年 12 月）

    *   4.0.0（2015 年 3 月）

    *   5.0.0（2017 年 11 月）

    *   5.1.4（2019 年 2 月）


    请注意，Spring Security 的 Java 配置是在 Spring 3.1 中添加到 Spring 框架的，并在 Spring 3.2 中扩展到
    Spring Security，并在带有 `@Configuration` 注解的类中定义。


    因此，多年来，该项目一直处于 Pivotal 项目组合之下，由 Spring 框架本身提供支持。


    但 Spring 框架到底是什么？

