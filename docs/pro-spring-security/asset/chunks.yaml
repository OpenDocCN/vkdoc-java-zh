    if (this == obj)

    return true;

    if (obj == null)

    return false;

    if (getClass() != obj.getClass())

    return false;

    Post other = (Post) obj;

    if (content == null) {

    if (other.content != null)

    return false;

    } else if (!content.equals(other.content))

    return false;

    if (id == null) {

    if (other.id != null)

    return false;

    } else if (!id.equals(other.id))

    return false;

    return true;

    }

