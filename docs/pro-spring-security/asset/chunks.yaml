    摘要认证

    摘要认证是 HTTP 基本认证的**近亲**。其主要目的是避免像基本认证那样在网络上传输明文密码，通过在发送密码前对其进行哈希处理来实现。这使得摘要认证比基本认证更复杂。摘要认证与基本认证一样，通过
    HTTP 头部进行工作。


    摘要认证基于使用一次性随机数（nonce）对密码进行哈希处理。*一次性随机数*是服务器生成的一个任意数字，在认证过程中使用且仅使用一次。它会与用户名、密码、一次性随机数、请求的
    URI 等信息一起参与摘要计算。在认证过程中，服务器和客户端都会进行摘要计算，并且结果应该一致。


    主要处理逻辑位于两个类中：`DigestAuthenticationFilter` 和 `DigestAuthenticationEntryPoint`。

    `DigestAuthenticationFilter` 查询请求头以寻找 `Authorization` 头部，然后检查该头部的值是否以 `Digest`
    开头。如果是，则表明该请求携带了用于认证的安全凭证。

    `DigestAuthenticationEntryPoint` 是被调用来生成响应、要求启动摘要安全认证过程的类。该类会设置 `WWW-Authenticate`
    头部，并填入正确的值（包括一次性随机数），以便客户端代理（浏览器）知道它必须启动摘要认证过程。


    要配置摘要认证，请使用以下代码行更新 `SecurityConfiguration` 文件：


    ```

    http.addFilter(digestAuthenticationFilter())

    .exceptionHandling().authenticationEntryPoint(digestEntryPoint())

    ```


    接下来，添加以下 Bean 来添加 `DigestAuthentication` 过滤器：


    ```

    private DigestAuthenticationFilter digestAuthenticationFilter() throws Exception
    {

    DigestAuthenticationFilter digestAuthenticationFilter = new DigestAuthenticationFilter();

    digestAuthenticationFilter.setUserDetailsService(userDetailsServiceBean());

    digestAuthenticationFilter.setAuthenticationEntryPoint(digestEntryPoint());

    return digestAuthenticationFilter;

    }

    ```


    然后，使用 `inMemoryUserDetailsManager` 定义用户名和密码：


    ```

    @Override

    @Bean

    public UserDetailsService userDetailsServiceBean() {

    InMemoryUserDetailsManager inMemoryUserDetailsManager = new InMemoryUserDetailsManager();

    inMemoryUserDetailsManager.createUser(User.withUsername("admin").password(passwordEncoder.encode("admin123")).roles(
    "ADMIN").build());

    return inMemoryUserDetailsManager;

    }

    ```


    最后，定义 `digestEntryPoint`：


    ```

    @Bean

    DigestAuthenticationEntryPoint digestEntryPoint() {

    DigestAuthenticationEntryPoint bauth = new DigestAuthenticationEntryPoint();

    bauth.setRealmName("Security Digest Authentication");

    bauth.setKey("SecurityKey");

    return bauth;

    ```


    如果你重新启动应用程序并访问 `http://localhost:8080/favoritesmovies/movies`，将会看到一个浏览器对话框，要求输入用户名和密码，这与基本认证时显示的对话框完全相同。这就是
    `DigestAuthenticationEntryPoint` 的作用。如前所述，该入口点会用所需的头部信息填充响应对象，以便浏览器知道它需要显示登录表单。使用用户名
    **admin** 和密码 **admin123** 登录，你应该能够访问请求的 URL。


    浏览器会使用输入的密码创建自己的摘要消息，并将其放入头部。它还会将剩余的信息——即一次性随机数、客户端随机数、域等——放入 `Digest` 头部。以下是一个随当前请求发送到服务器的
    `Digest` 头部示例：


    ```

    ''Digest username="admin", realm=" Security Digest Authentication",

    nonce="MTM1NTY3NDc3NDIy....==", uri=" /movies",

    response="225ea6fbad618cfdf1da7d4f7efe53b8", qop=auth,

    nc=00000002, cnonce="376a9b27621880bd"''

    ```


    当请求到达 `DigestAuthenticationFilter` 时，请求头中包含所需的摘要认证头部。该头部中的信息以 CSV 字符串形式到达，包含上一段中显示的所有必需信息，包括一次性随机数和客户端随机数（`cnonce`）。（一次性随机数是在加密通信中仅使用一次的任意数字。请参阅
    [`http://en.wikipedia.org/wiki/Cryptographic_nonce`](http://en.wikipedia.org/wiki/Cryptographic_nonce)）。过滤器从头部提取信息，从
    `UserDetailsService` 中检索用户，然后使用检索到的用户密码计算摘要，以查看摘要是否与客户端在头部中发送的摘要匹配。如果匹配，则授予访问权限。


    记住我认证

    记住我认证功能用于允许应用程序的回头用户无需每次都登录即可使用。基本上，应用程序会记住某些访客，允许他们直接打开应用程序，并看到为其个性化定制的应用程序版本，就像他们已登录一样。

    记住我功能对用户来说非常方便；然而，它也非常危险，建议仅在私人（家庭）环境中使用。

    问题显而易见。如果你在公共计算机上使用某个应用程序，并且该应用程序记住了你的个人信息，那么下一个从该计算机访问该应用程序的人将能够毫不费力地冒充你。

    通常的做法是在记住我会话中仅提供有限的功能。这意味着，即使你通过记住我功能自动登录，你也无法访问应用程序的全部功能。应用程序中更敏感的部分可能需要你正式登录才能使用。

    例如，Amazon.com 就是这种情况。当你访问 Amazon.com 并登录后，下次访问 Amazon 时，网站会记住你、你的推荐、你的姓名以及其他关于你的信息。但如果你想购买东西，它会要求你完全登录才能使用该功能。

    记住我认证通常通过向浏览器发送一个 cookie 来实现，该 cookie 在后续的应用程序会话中被发送回服务器以进行自动登录。

    Spring Security 中的记住我功能是如何工作的？

    Spring Security 中的记住我功能主要由两个组件支持：`RememberMeServices` 接口和 `RememberMeAuthenticationFilter`
    类。让我们看看它们在请求上下文中是如何工作的。

    当应用程序启动时，`RememberMeAuthenticationFilter` 位于服务器的过滤器链中。同时，会实例化一个 `TokenBasedRememberMeServices`
    并将其注入到 `AbstractAuthenticationProcessingFilter` 中，替换掉无操作的 `NullRememberMeServices`。

    访问 `http://localhost:8080/favoritesmovies/movies`，并使用 **admin** 作为用户名、**admin123**
    作为密码登录。

    当请求进入应用程序时，`UsernamePasswordAuthenticationFilter`（`AbstractAuthenticationProcessingFilter`
    的子类）会按照已解释的标准方式处理认证过程。

    认证成功后，`UsernamePasswordAuthenticationFilter` 会调用配置好的 `TokenBasedRememberMeServices`
    的 `loginSuccess` 方法。该方法会检查请求是否包含 `remember-me` 参数，以便应用记住我功能。（如果服务中的 `alwaysRemember`
    属性设置为 `true`，它也会应用记住我功能。）因为你没有发送此请求，所以不会发生任何事情。


    因此，让我们将参数添加到你的登录表单中。打开 `login.jsp` 文件，并在 `<form>` 标签内的某处粘贴以下元素：


    ```

    记住我：

    ```


    然后在 `SecurityConfiguration` 配置文件中添加以下内容：

    '
- fmt: '```java

    .rememberMe() .key("remember-me").rememberMeParameter("remember-me")

    .rememberMeCookieName("rememberloginnardone").tokenValiditySeconds(100)

    ```


    These lines will define the key name, the parameter name, the cookie name, and
    validity time in seconds. Restart the application and visit `http://localhost:8080/favoritesmovies/movies`.
    You should now see a check box along with the username and password fields. Select
    the check box, and log in with **admin**`/`**admin123**.


    This time, the request carries the required parameter and `TokenBasedRememberMeServices`
    does its work. It extracts the username and password from the `Authentication`
    object and creates a token with this information and a time to expire. It basically
    concatenates these three values and the remember-me key specified in the XML element
    (`favoritesmovies_key`). And it creates an MD5 encoding out of the resulting string.
    This value will then be Base65-encoded again, together with the username, and
    added to the response as a cookie with the name `rememberloginnardone` that will
    be returned to the browser. You can see this cookie in Figure [5-13](#310331_2_En_5_Chapter.xhtml#Fig13).


    ![../images/310331_2_En_5_Chapter/310331_2_En_5_Fig13_HTML.jpg](images/310331_2_En_5_Chapter/310331_2_En_5_Fig13_HTML.jpg)


    Figure 5-13 Remember-me cookie example


    Restart the application. Visit `http://localhost:8080/favoritesmovies/movies`.
    You should be able to access the page without logging in. When this request gets
    in the system, it is intercepted by the `RememberMeAuthenticationFilter`, which
    gets into action. The first thing the filter does is check that there is no current
    `Authentication` in the `SecurityContext`. Because this means there is no user
    logged in, the filter calls the `RememberMeServices`’s `autoLogin` method. In
    the standard configuration, `TokenBasedRememberMeServices` is the concrete class
    that implements `RememberMeServices`. This implementation’s `autoLogin` method
    tries to parse the incoming cookie into its composing elements, which are the
    username, the hashed value of the combined elements (username + “:” + tokenExpiryTime
    + “:” + password + “:” + key), and the expiry time of the token. Then it retrieves
    the `UserDetails` from the `UserDetailsService` with the username, recomputes
    the hashed value with the retrieved user, and compares it with the arriving one.
    If they don’t match, an `InvalidCookieException` is thrown. If they do match,
    `UserDetails` is checked and an `Authentication` object is created and returned
    to the caller. The `autoLogin` method extracts the remember-me cookie out of the
    request, decodes it, does some validation, and then calls the configured `UserDetailsService`''s
    `loadUserByUsername` method with the username extracted from the cookie. It then
    creates a `RememberMeAuthenticationToken` object (an implementation of `Authentication`).
    The `RememberMeAuthenticationFilter` then tries to authenticate this new `Authentication`
    object against the `AuthenticationProvider`’s implementation of `RememberMeAuthenticationProvider`,
    which simply returns the same `Authentication` object after making sure that the
    hash from the incoming request matches the stored one for the remember-me key.
    This `Authentication` object will be used by the `Security Interceptor` to allow
    access to the requested URL.


    ## Logging Out


    Logging out is pretty simple. When you log out of an application, you want the
    application to end your current session, but also to remove any information it
    might have stored on the client for you. As mentioned, in Spring Security v5,
    the URL `/logout` replaced the URL `/j_spring_security_logout`, which was used
    until Spring Security v4. In Spring Security, logging out is very easy. The only
    thing you need to do by default is to visit the URL `/logout`. Let’s try that.


    Add the following lines to the `UserController` file:


    ```java

    @GetMapping ("/logout")

    public String logoutPage (HttpServletRequest request, HttpServletResponse response)
    {

    Authentication auth = SecurityContextHolder.getContext().getAuthentication();

    if (auth != null){

    new SecurityContextLogoutHandler().logout(request, response, auth);

    }

    return "index";

    }

    ```


    Update the Security Configuration file with the following lines:


    ```java

    .and().logout().deleteCookies("JSESSIONID")

    .and().logout().invalidateHttpSession(true)

    .and().logout().logoutSuccessUrl("/index").permitAll()

    ```


    These lines tell the application to delete the `JSESSIONID` cookie, invalidate
    the HTTP session, and redirect to the index web page once logged out.


    Next, add an HTML line to the `movies.jsp` page linking to logout:


    ```html

    <a href="/logout">Logout</a>

    ```


    Finally, add a simple HTML link to the `index.jsp` page to link back to `movies`
    if needed:


    ```html

    <a href="/movies">My movies</a>

    ```


    Now go to `http://localhost:8080/favoritesmovies/movies` and log in with **admin**/**admin123**
    again. Select the check box for activating `remember-me` functionality. You should
    be able to log in without problems. If you look at the cookies stored in your
    browser, you should see two cookies for the localhost domain: `JSESSIONID` and
    `rememberloginnardone`. Figure [5-13](#310331_2_En_5_Chapter.xhtml#Fig13) shows
    the two cookies. You would expect that if you log out, these two cookies would
    disappear from the browser, basically removing any trace of the application from
    your browser. Let’s do it.


    Click the logout link on the `movies.jsp` page. You should be logged out of the
    application. If you open the cookies of your browser, you will see that the cookie
    `rememberloginnardone` is gone. The `JSESSIONID` cookie exists, but the session
    was already invalidated by the framework. Figure [5-14](#310331_2_En_5_Chapter.xhtml#Fig14)
    shows Remember-me and session cookies.


    ![../images/310331_2_En_5_Chapter/310331_2_En_5_Fig14_HTML.jpg](images/310331_2_En_5_Chapter/310331_2_En_5_Fig14_HTML.jpg)


    Figure 5-14 Remember-me and session cookies


    The flow of the logout request is as follows: When the request arrives, it follows
    the filter chain until it arrives at the `LogoutFilter`. This filter notices that
    the URL that is being requested is for logout. The filter calls the configured
    `LogoutHandler(s)`, which in the running application are `SecurityContextLogoutHandler`
    and `TokenBasedRememberMeServices`. (They implement the `LogoutHandler` interface.)
    The `SecurityContextLogoutHandler` invalidates the servlet session, in the standard
    servlet way, calling the `invalidate` method on the `HttpSession` object and also
    clearing the `SecurityContext` from Spring Security as shown using `.logout().invalidateHttpSession(true)`.
    `TokenBasedRememberMeServices` simply removes the remember-me cookie by setting
    its age to 0.


    ## Session Management


    Another area of Spring Security’s web support is the management of user sessions.
    One very important thing to do regarding sessions is to make sure you create a
    new session ID when a user authenticates successfully. Doing this reduces the
    likelihood of session fixation attacks, in which one user sets another user’s
    session identifier to impersonate him in the application. Spring Security also
    offers a feature you can use to specify the number of concurrent sessions that
    the same user can have open at any given time. These two features are controlled
    by the class named `SessionFixationProtectionStrategy`, which implements `SessionAuthenticationStrategy`.
    This strategy is invoked from `AbstractAuthenticationProcessingFilter` and `SessionManagementFilter`.
    Let’s see how they work.'
