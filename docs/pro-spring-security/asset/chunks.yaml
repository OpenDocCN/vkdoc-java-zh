    清单 7-9 包含了为领域对象实例创建 ACL 的核心功能。在此示例中，您正在创建一个新的 `Post` 对象。`Post` 实例存储在一个内存映射中（这并非实际示例，但足以展示功能）。ACL
    是使用 `Post` 实例的哈希码作为领域对象的 ID 创建的。然后，您为 ACL 创建了三个 ACE。在第一个 ACE 中，您指定将 `ADMINISTRATION`
    权限授予 `Post` 的创建者，该创建者由 `SecurityContext` 的主体标识。第二个 ACE 将 `DELETE` 权限授予任何具有 `ROLE_ADMIN`
    角色的用户，第三个 ACE 将 `READ` 权限授予任何具有 `ROLE_USER` 角色的已认证用户。您还可以看到该方法被标记为 `@Transactional`。这是
    `JdbcMutableAclService` 的要求，以便它能够在事务上下文中执行所有 SQL 语句。由 `ForumServiceImpl` 实现的 `ForumService`
    接口定义如下：


    ```

