  \n图 7-9\n显示已创建帖子的界面\n\n如果点击删除按钮，应用程序会将你重定向到\n熟悉的登录页面。\n其过程如下：当你点击删除按钮时，请求\n会一路传递到\
  \ `AffirmativeBased`\n访问决策管理器，正如我们在前几章中解释的那样。该\n访问决策管理器会遍历其配置的 `AccessDecisionVoter(s)`——在\n\
  本例中，就是你显式注入的 `AclEntryVoter(s)`。\n其中一个投票器开始工作——即处理\n`ACL_POST_DELETE`\n配置属性的那个。该投票器遍历刚刚被拦截的方法的\
  \ `MethodInvocation`\n对象，并遍历其参数，寻找类型与\n`AclEntryVoter` 的 `processDomainObjectClass`\n\
  属性中配置的类型相匹配的参数，在你的案例中，该类型是 `com.apress.pss.acl.domain.Post`。\n如果在方法的参数列表中未找到此类型的对象，则会抛出\n\
  `AuthorizationServiceException`，通知你这一情况。在你的案例中，找到了该对象，并且它实际上是 `deletePost` 方法所期望的唯一参数。如果到达此参数的对象为\
  \ null，投票器将直接弃权。\n接下来，投票器会尝试从领域对象中检索一个 `ObjectIdentity`\n实例。它通过使用默认配置的 `ObjectIdentityRetrievalStrategy`\n\
  来实现，该策略的唯一实现是 `org.springframework.security.acls.domain.ObjectIdentityRetrievalStrategyImpl`。\n\
  该策略简单地调用 `ObjectIdentityImpl`\n的构造函数，该构造函数接收一个领域对象作为其唯一参数。`ObjectIdentityImpl`\n\
  中的这个构造函数假设领域对象提供了一个 `getId` 方法，以便能够检索其标识符。如果该方法不存在，则会抛出相应的异常。你的 `Post` 类具有这样的方法，因此一切正常，该方法被调用，并将返回值设置为\
  \ `ObjectIdentity` 的标识符。\n获取 `ObjectIdentity` 后，投票器尝试从 `Authentication`\n对象中检索 SID。为此，投票器使用了一个\
  \ `SidRetrievalStrategy`，\n其唯一实现（`SidRetrievalStrategyImpl`）\n会检索 `Authentication`\n\
  对象的权限（例如 `ROLE_USER`）以及主体。因此，它将拥有一个 `PrincipalSid` 实例，以及\n与经过身份验证的用户所拥有的权限数量相同的\
  \ `GrantedAuthoritySid`\n实例。\n投票器的下一步是检索针对该特定 `ObjectIdentity` 和\nSID 的实际 ACL。它借助我们之前讨论过的已配置的\
  \ `AclService` 来完成此操作。\n在下一步中，通过检索到的 ACL 的 `isGranted` 方法来查询\n是否应授予访问权限。该方法接收所需的权限（由类型为\
  \ `AclEntryVoter` 的 bean 的第三个构造函数参数定义，对于 `DELETE` 情况，其值为\n`org.springframework.security.acls.domain.BasePermission.DELETE`）\n\
  以及之前获取的 SID 列表。然后，ACL 委托给一个 `PermissionGrantingStrategy` 实例（实际上是委托给实现 `DefaultPermissionGrantingStrategy`）\n\
  来最终判断 SID 是否对领域对象拥有所需的权限。`PermissionGrantingStrategy` 的\n唯一实现 `DefaultPermissionGrantingStrategy`\n\
  简单地遍历权限列表、SID 列表以及 ACL 中的 ACE 列表。它将权限与 ACE 上的权限逐一比较，并将 SID 与 ACE 上的 SID 进行比较。如果找到匹配项，则允许访问；如果未找到任何匹配项，则通过抛出异常来拒绝访问，该异常由投票器捕获并返回\
  \ `ACCESS_DENIED`。在你的案例中，由于当前经过身份验证的用户是 `ANONYMOUS`，因此整个流程就是这样进行的。\n\n\n\n在登录页面，使用用户名\
  \ **leo** 和密码 **nardone01**（该用户已在 `applicationContext-security.xml` 文件中定义）登录，然后尝试删除该帖子。您将看到一个“访问被拒绝”的页面，如图\
  \ 7-10 所示。\n\n![../images/310331_2_En_7_Chapter/310331_2_En_7_Fig10_HTML.jpg](img/310331_2_En_7_Fig10_HTML.jpg)\n\
  \n图 7-10\n显示访问被拒绝页面的屏幕截图\n\n与之前的情况相同：已登录用户 *leo* 及其角色 `ROLE_USER` 不匹配执行该特定帖子上 `deletePost`\
  \ 操作所需的规则。正如我们之前所说，只有拥有 `ROLE_ADMIN` 角色的用户才能删除该帖子。那么，让我们来测试一下。\n\n首先，通过访问 URL `http://localhost:8080/logout`\
  \ 注销。接下来，使用用户名 **luna** 和密码 **nardone01** 登录，并再次尝试删除该帖子。这次，`Acl.isGranted` 方法返回\
  \ true，并且投票者返回 `ACCESS_GRANTED`，因为经过身份验证的用户角色与执行所需操作所需的权限之间存在匹配。这意味着代码执行最终将到达 `ForumServiceImpl`\
  \ 中的 `deletePost` 方法。这是一个非常简单的方法，它从 ACL 中删除该对象的条目，当然，也会从存储中删除该对象。（请记住，您正在使用 `java.util.Map`\
