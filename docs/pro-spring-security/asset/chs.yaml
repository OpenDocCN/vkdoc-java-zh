  \ clean install jetty:run` 来运行应用程序。它应该可以毫无问题地运行。\n接下来，如果你尝试访问 `http://localhost:8080/scala-example/enter/scala`，将会看到你之前见过多次的登录界面。\n\
  \n如果你使用用户名 **luna** 和密码 **nardone** 登录，应该能够访问该应用程序，并看到图 9-14 所示的页面。\n\n![../images/310331_2_En_9_Chapter/310331_2_En_9_Fig14_HTML.jpg](img/310331_2_En_9_Fig14_HTML.jpg)\n\
  \n图 9-14\n成功访问受保护的 Scala 应用程序\n\n关于与 Scala 的集成，我们就说这么多。你可以看到，对于像这样的简单应用程序，它与集成 Java\
  \ 本身并没有太大区别。实际上，除了语法差异之外，可能几乎是一样的。当然，在这个例子中，你从一个 Spring 应用程序开始，并用 Scala 定义了不同的组件（控制器和服务）。如果你使用的是\
  \ Scala 特有的框架，集成可能会更具挑战性。你需要记住的是，要保护方法，这些方法必须属于 Spring 管理的 bean。要保护 URL，这些 URL 必须在基于\
  \ servlet 的 Web 应用程序中被访问。\n\n总结\n在本章中，我们从一个相当高的层面展示了如何将 Spring Security 集成到各种框架和语言中。选择的框架是\
  \ Spring 自己的 Spring Web Flow，说明性的语言分别是 JRuby 和 Groovy，以及它们各自的 Web 框架 Rails 和 Grails。\n\
  我们向你展示了将 Spring Security 集成到这些不同的框架和语言中，可能很简单（如 Grails），也可能不那么简单（如 JRuby 或 Scala）。然而，通过\
  \ JVM，理论上，你可以将 Spring Security 集成到任何你需要保护的东西中。\n无论使用何种框架或语言，本章的主要收获是：Spring Security\
  \ 归根结底只是一个 Java 库（几个简单的 `.jar` 文件）。你可以将它集成到任何你想要的 Java（即 JVM）项目中。你只需要记住你能用它做什么，并使用那些对你的特定问题有意义的部件。例如，在\
  \ Swing 应用程序中，甚至在不使用标准 servlet 过滤器的 Web 应用程序（如 Play 框架）中，使用 Web 层安全是没有意义的。\n\n索引\n\
