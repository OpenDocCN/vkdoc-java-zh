  \ Spring 配置文件的名称匹配。例如，在此例中，通过将 DispatcherServlet 命名为 “spring”，Spring 将期望在 `WEB-INF`\
  \ 文件夹中找到名为 `spring-servlet.xml` 的文件，该文件应定义 Web 层的 Bean。\n\n```\n\n/WEB-INF/\n\n\
  .jsp\n\n**清单 9-8** 导入流程的 spring-servlet.xml 文件\n```\n\n\n\n这个文件非常简单，其唯一职责就是导入另一个文件（`example-webflow.xml`\
  \ 文件），该文件将包含整个 Spring Web Flow 配置。此配置将保留在另一个文件中，以便与主 Servlet 文件分离。\n\n```\n\n清单\
  \ 9-9\nspring-security.xml 文件\n```\n\n这是另一个你现在应该能轻松理解的文件。清单 9-9 展示了一个非常基础的 Spring\
  \ Security 配置。你只定义了一个具有角色 `ROLE_USER` 的用户，这对于你的测试来说已经足够了。这里没有定义任何 URL 安全规则，因为在这个\
  \ Spring Web Flow 示例中，你并不打算这样做。你希望在流程级别（其状态）添加安全性，而这正是我们将要向你展示如何实现的。\n\n现在，你需要定义应用程序的\
  \ Web Flow 配置以及实际的 Web Flow 本身。同样，这将是一个简单的示例，仅用于展示功能如何工作。该示例将基于图 9-6。清单 9-10 展示了\
  \ Web Flow 配置文件，清单 9-11 展示了你唯一的流程定义。\n\n```\n\n清单 9-10\nWEB-INF 文件夹中的 example-webflow.xml\n\
  ```\n\n该文件定义了 Spring Web Flow 的通用配置。文件的主要部分是元素 `flow-registry` 及其属性 `flow-builder-services`。此元素定义了应用程序中流程的位置。目前，你只定义一个流程，它将位于\
  \ `product.xml` 文件中。另外，请注意当在流程的视图状态中引用视图时，视图将如何被解析。类 `org.springframework.webflow.mvc.builder.MvcViewFactoryCreator`\
  \ 将负责解析视图位置。默认情况下，它会在流程定义目录中查找文件名是视图状态名称后附加 `.jsp` 的文件来解析视图文件。这仅仅意味着，如果一个视图被命名为\
  \ *review*，它将查找名为 *review.jsp* 的文件。\n\n```\n\n清单 9-11\n/WEB-INF/flows/ 文件夹中的 product.xml\
  \ 简单流程\n```\n\n这是实际的流程定义。你在这里简单地定义了三个视图状态。正如我们之前所说，这些视图状态中的每一个都将映射到应用程序中的一个物理视图文件。根据默认行为，视图文件应与此流程文件位于同一目录中，并应根据视图状态名称后附加\
  \ `.jsp` 来命名。因此，你应该在 `WEB-INF/flows/products` 目录中拥有名为 `activation.jsp`、`success.jsp`\
  \ 和 `failure.jsp` 的文件。它们分别显示在清单 9-12、9-13 和 9-14 中。\n\n```\n\nSpring WebFlow 激活失败！\n\
  \n清单 9-14\n流程“购买”视图状态的 failure.jsp\n```\n\n```\n\nSpring WebFlow 激活成功！\n\n清单 9-13\n\
  “审核”状态的 success.jsp\n```\n\n```\n\n你好，Spring WebFlow！\n激活 Spring WebFlow：\n\n清单\
  \ 9-12\n“主”视图状态的 activation.jsp\n```\n\n在前三个 `.jsp` 文件中，你定义了 Web Flow 中的三个视图状态。清单\
  \ 9-12 和 9-13 具有以 `href` 链接中的 `eventId` 参数形式存在的转换触发器。`${flowExecutionUrl}` 引用了流程的当前执行状态。因此，在首次访问页面时的主状态下，`${\
  \ flowExecutionUrl }` 的值是 `/product?execution=e1s1`，使得下一个流程状态的完整 URL 类似于 `/product?execution=e1s1}&_eventId=review`。如果你访问\
  \ `http://localhost:8080/product`，你将被带到主视图状态。该视图显示 `activate.jsp`，其中你将有一个按钮用于激活，一个按钮用于取消激活，如图\
  \ 9-7 所示。当你点击激活按钮的那一刻，你就激活了 Spring Web Flow 进程，并且 `success.jsp` 会打开。\n让我们使用 Spring\
  \ Security 来实现这一点。Spring Security 和 Spring Web Flow 集成得很好，因为它们都是 Spring 产品组合的一部分。\n\
  \n使用 Spring Security 保护流程很容易。首先，你需要将当前 `<webflow:flow-executor>` 元素（来自文件 `example-webflow.xml`，即清单\
  \ 9-15 中的元素）添加到同一文件中的某个位置，并添加清单 9-16 所示的内容。\n\n![../images/310331_2_En_9_Chapter/310331_2_En_9_Fig7_HTML.jpg](img/310331_2_En_9_Fig7_HTML.jpg)\n\
  \n图 9-7\nactivation.jsp，它是 Web Flow 的入口点\n\n```\n清单 9-16\nSpring Security 监听器 Bean\n\
  ```\n\n```\n\n清单 9-15\n带有 Spring Security 监听器的 flow-executor\n```\n\n通过实现上述内容，你将\
  \ Spring Security 集成到了 Spring Web Flow 中。你现在需要做的就是决定要保护流程的哪些部分，以及定义哪些约束来保护它们。但在此之前，我们将简要解释一下这个\
  \ `SecurityFlowExecutionListener` 为 Spring Web Flow 做了什么。\nSpring Web Flow 以接口 `org.springframework.webflow.execution\
  \ .FlowExecutionListener` 的形式提供了一种抽象，它允许你实现类来监听或观察流程执行的生命周期。当为流程注册了监听器实现时，它可以在流程生命周期的不同点拦截流程执行。从这个意义上说，它类似于你之前学过的\
  \ AOP 概念。\n`org.springframework.webflow.security.SecurityFlowExecutionListener`\
  \ 是一个监听器实现，它拦截流程生命周期中的三个特定点：`sessionCreating`、`stateEntering` 和 `transitionExecuting`。在每次拦截中，监听器都会委托给一个配置好的\
  \ `org.springframework.security.access.AccessDecisionManager`，就像我们在本书不同部分解释过的那样。如果在定义\
  \ Bean 时没有提供 `AccessDecisionManager` 实现，则会动态创建一个新的基于角色的访问决策管理器。\n\n所以现在你想保护视图状态\
  \ `\"activation\"`，并且只允许具有角色 `ROLE_USER` 的已认证用户访问它。为此，你只需将元素 `<secured attributes=\"\
  ROLE_USER\" />` 定义为 `\"activation\"<view-state>` 元素的子元素。完成此操作后，如果你重新启动应用程序并尝试访问\
  \ `\"buy\"` 状态，你将看到熟悉的 Spring Security 登录屏幕。如果你使用用户名 **admin** 和密码 **admin123**\
  \ 登录，你将能够到达 `\"`buy`\"` 状态。最终的 `\"buy\"` 状态视图如图 9-8 所示。\n\n![../images/310331_2_En_9_Chapter/310331_2_En_9_Fig8_HTML.jpg](img/310331_2_En_9_Fig8_HTML.jpg)\n\
  \n图 9-8\nSpring Web Flow 激活页面\n\n\n\n如果你希望的话，也可以通过让 `<secured>` 元素直接作为 `<flow>`\
  \ 元素的子元素来保护整个流程。\n这意味着，用户需要拥有所需的权限才能访问流程中的任何状态。你可以亲自尝试一下，这应该非常直观。\n\n其他 JVM 语言中的\
  \ Spring Security\n我们并非以下任何一种语言的专家，在示例中可能也无法使用最地道的表达方式。（我们最熟悉 Ruby，因为无论是在工作中还是闲暇时都经常使用它。它也是我们最喜欢的语言之一。）然而，我们的目标仅仅是展示，通过一些调整，你可以将\
  \ Spring Security 集成到用 Java 以外的语言编写的项目中。\n\n你会看到，Spring Security 在其他 JVM 语言中的支持有时是直接且全面的（例如使用\
  \ Groovy 及其 Grails 框架时）；而在其他情况下，你可能需要自行编写集成方案来支持它。在接下来的章节中，我们将简要概述如何将 Spring Security\
  \ 集成到我们认为除 Java 之外的三种主要 JVM 语言中：**Groovy**、**JRuby** 和 **Scala**。\n\n请记住，Spring\
  \ Security 本质上不过是一组构建在 Spring 框架之上的 Java 库，它允许你将认证/授权安全机制插入到你的应用程序中。因此，它应该能够集成到你拥有的任何\
  \ Java（Java JVM）应用程序中。当然，并非所有功能都适用于所有应用程序。例如，过滤器链在非 Web 应用程序中就没有意义。\n\nSpring Security\
  \ 与 Ruby (JRuby)\nRuby 绝对是我们最喜欢的语言之一，我们花了很多时间与之打交道。它结合了出色的语法和优秀的语言结构，使用起来令人愉悦。Ruby\
  \ 是一种面向对象的动态语言，专注于生产力、简洁性和易用性。\n\n标准的 Ruby 解释器是用 C 语言编写的，在 1.9 版本之前被称为 *MRI Ruby*。从\
  \ 1.9 版本开始，官方解释器被称为 *YARV 解释器*。\n\nRuby 是一种非常流行的语言，其流行很大程度上源于其出色的 Web 框架 Ruby on\
  \ Rails (RoR) 的广泛使用，该框架也简称为 *Rails*。\n\nRails 是一个 MVC 框架，非常强调“约定优于配置”的实践。如果你遵循框架强制执行的约定，它是一个非常高效的框架，可以用来快速、轻松地开发简单的\
  \ Web 应用程序。\n\n我们不会对 Ruby 或 Rails 进行深入解释，因为这超出了本书的范围。我们也假设，如果你正在阅读本节，你可能已经了解它们，并且只是想学习如何将\
  \ Spring Security 集成到其中，或者想了解这是否完全可行。不过，在示例中使用 Ruby 概念时，我们会尽量给出简短的解释。\n\nJRuby 是一个用\
  \ Java 编写的、功能完备的 Ruby 编程语言实现。你可以使用它在 Java 虚拟机中运行 Ruby 程序，并与你的其他 JVM 语言（当然，主要是 Java）进行交互。\n\
  \n本节我们将展示一个简单的教程，介绍如何将 Spring Security 集成到 Rails 应用程序中，并判断这样做是否值得。\n\n在 JRuby 的情况下，没有像\
  \ Grails 中那样的插件。实际上，Java 和 Ruby 之间的集成不如 Java 和 Groovy 之间的集成那么顺畅。基本上，你需要自行实现集成方案。\n\
  \n首先，我们来安装 JRuby。本书使用的 JRuby 版本是 9.2.6.0。这里我们将使用简单的安装方式：只需下载文件，解压缩，并将其可执行文件添加到路径中。以下是我们在一台\
  \ Windows 机器上执行的过程（在其他操作系统上应该类似）：\n\n1.  进入你想要安装 JRuby 的目录。\n\n2.  从 [`https://s3.amazonaws.com/jruby.org/downloads/9.2.6.0/jruby_windows_x64_9_2_6_0.exe`](https://s3.amazonaws.com/jruby.org/downloads/9.2.6.0/jruby_windows_x64_9_2_6_0.exe)\
  \ 下载文件，并将其安装到以下目录：`c:\\jruby-9.2.6.0`。\n\n3.  现在你应该可以访问 JRuby 了。执行 `jruby –v`，你应该会看到刚刚安装的\
  \ JRuby 版本，如图 9-9 所示。\n\n![../images/310331_2_En_9_Chapter/310331_2_En_9_Fig9_HTML.jpg](img/310331_2_En_9_Fig9_HTML.jpg)\n\
  \n图 9-9\n\nJRuby 版本页面\n\n4.  接下来，安装 Rails：`jruby –S gem install rails`，如图 9-10 所示。\n\
  \n![../images/310331_2_En_9_Chapter/310331_2_En_9_Fig10_HTML.jpg](img/310331_2_En_9_Fig10_HTML.jpg)\n\
  \n图 9-10\n\n安装 Rails\n\n5.  现在创建你的 Rails 应用程序。与本书其他部分一样，这将是一个功能非常简单的应用程序，仅用于展示如何使用\
  \ Spring Security。我们把这个应用程序简称为 *demo*。在你选择的目录中，输入以下命令：`rails new demo`。\n\n现在，你的系统中有了一个新的基本\
  \ Rails 应用程序。你可以通过命令行进入刚刚创建的 `demo` 目录，然后输入 `rails s` 来运行它。该命令将启动一个 WEBrick 服务器，并在该服务器上运行应用程序。如果你按照示例操作，你应该能够在你的计算机上访问\
  \ `http://localhost:3000`，并看到默认的 Rails 应用程序主页。\n\n在创建 Rails 应用程序的过程中，系统为你生成了大量的基础设施代码和定义良好的目录结构。如果你查看一下\
  \ `demo` 目录（这是你应用程序的根目录），你就会明白我们的意思。\n\n无论如何，正如我们之前所说，我们不会深入探讨 Rails 框架或 Ruby 本身。我们只是通过一个基本的示例来展示如何将\
  \ Spring Security 集成到 Ruby on Rails 应用程序中。我们假设你已经了解 Ruby 和 Rails。\n\nRails 中的 Web\
  \ 层安全\n当你在上一节中运行 Rails 应用程序时，你使用的是 Ruby 服务器（WEBrick）。这个服务器对 Java Servlet 一无所知，所以你可能会猜到，使用这个服务器无法运行\
  \ Spring Security 的 Web 层安全——你的猜测是正确的。你需要做的是在标准的 Java Web 容器中运行你的 Rails 应用程序，这就是我们接下来要做的。\n\
  \n首先，安装 *warbler*，这是一个用于从你的 Rails 应用程序创建标准 WAR 文件的 gem。要安装 warbler，请使用命令 `jruby\
  \ –S gem install warbler`。安装 warbler 后，你可以在应用程序的根目录中执行 `jruby –S warble`，它将创建 `demo.war`。\n\
  \n这很好，但先不要部署它。让我们先给它添加一些功能，然后再添加 Spring Security 级别的安全保护。\n\n你将向应用程序添加两条简单的路由。一条将返回字符串\
  \ `SECURED`，并且仅对登录用户可访问。另一条将返回字符串 `UNSECURED`，并且对任何用户都可用。\n\n让我们创建一对控制器：一个用于管理员用户，一个用于标准用户。我们将这些控制器简单地命名为\
  \ `AdminsController` 和 `StandardsController`。在你的 `demo` 应用程序根目录中输入以下两个命令来生成它们：\n\
  \n```\nrails g controller admins\nrails g controller standards\n```\n\n执行这些命令会生成输出，描述已生成的工件。然后，你将编辑这些控制器，使其看起来像代码清单\
  \ 9-17 和 9-18 所示。你可以在标准 Rails 位置的 `app/controllers` 目录中找到这些控制器。\n\n\n\n```\nclass\
  \ StandardsController  \"任何人都能阅读这条无意义的消息\"\nend\nend\n清单 9-18\n包含未安全操作的 StandardsController\n\
  ```\n\n```\nclass AdminsController  \"这是绝密代码\"\nend\nend\n清单 9-17\n包含安全操作的 AdminsController\n\
  ```\n\n接下来需要将所需的所有 Java 库复制到 Rails 应用程序的 `lib` 目录中：\n\n```\naopalliance-1.0.jar\n\
  commons-codec-1.3.jar\ncommons-logging-1.1.1.jar\njavax.servlet-api-4.0.1.jar\n\
  spring-aop-5.1.8.RELEASE.jar\nspring-asm-5.1.8.RELEASE.jar\nspring-beans-5.1.8.RELEASE.jar\n\
  spring-context-5.1.8.RELEASE.jar\nspring-core-5.1.8.RELEASE.jar\nspring-expression-5.1.8.RELEASE.jar\n\
  spring-jdbc-5.1.8.RELEASE.jar\nspring-security-config-5.1.5.RELEASE.jar\nspring-security-core-5.1.5.RELEASE.jar\n\
  spring-security-crypto-5.1.5.RELEASE.jar\nspring-security-web-5.1.5.RELEASE.jar\n\
  spring-tx-5.1.8.RELEASE.jar\nspring-web-5.1.8.RELEASE.jar\n```\n\n下一步是让 Rails 应用程序能够在标准\
  \ Java Web 服务器（如 Tomcat）上运行。为此，你需要使用 *warbler* 这个 gem。Warbler 是一个 JRuby 专属的 gem，用于将不同类型的\
  \ Ruby 应用程序转换为标准的 Java 打包工件，例如 `JAR` 和 `WAR` 文件。在你的场景中，显然需要创建一个 `WAR` 文件。Warbler\
  \ 内部使用 `jruby-rack` 这个 gem，并将其打包到基于 `WAR` 的应用程序中。这个 gem 是 Ruby Rack 基础应用（如 Rails\
  \ 应用）与 Java Web Servlet 基础应用之间集成的核心，这正是你所需要的。\n\n`Jruby-rack` 充当了一个转换层。它首先通过一个 Servlet\
  \ 监听器（`org.jruby.rack.rails.RailsServletContextListener`）初始化应用程序的 Ruby 部分，然后在每次请求时，通过一个\
  \ Servlet 过滤器 `org.jruby.rack.RackFilter` 拦截对服务器的调用。当这个过滤器获取到 `HttpServletRequest`\
  \ 时，它会将这些基于 Java 的请求转换为 Rack 请求，并传递给 Rails 应用程序，因为 Rails 基于 Rack 模型构建，能够理解这些请求。当然，关于\
  \ warbler 和 `jruby-rack` 还有更多细节，但目前这里的解释应该足以让你继续这个示例。在图 9-11 中，你可以看到 `jruby-rack`\
  \ 工作原理的图形化说明。\n\n![../images/310331_2_En_9_Chapter/310331_2_En_9_Fig11_HTML.jpg](img/310331_2_En_9_Fig11_HTML.jpg)\n\
  \n图 9-11\njruby-rack 对 Java 和 Ruby 世界的映射\n\n要将 warbler 与 Spring Security 结合使用，你需要修改由它自动生成的\
  \ `web.xml` 文件。为此，你需要将 warbler 自带的 `web.xml.erb`（位于 Ruby 的 gem 安装目录中，在我的电脑上是 `~/.rvm/gems/jruby-1.8/gems/warbler-1.3.6/web.xml.erb`）复制到\
  \ `demo` 应用程序的 `config` 目录中。然后编辑该文件，使其看起来像清单 9-19 所示。通过这样做，你将 Spring Security 配置包含在了\
  \ `web.xml` 文件中，就像在前几章中所做的那样。\n接下来，将清单 9-20 中的 `applicationContext-security.xml`\
  \ 文件复制到 demo 应用程序的根目录。这里有你熟悉的第 2 章中的 Spring Security 配置，但做了一些修改。你只是为 Scarvarez 家族的成员保护了\
  \ URL `/admin/*`。\n然后你需要编辑 warbler 的配置文件。为此，在应用程序的根目录下执行命令 `jruby –S warble config`。该执行会在应用程序的\
  \ `config` 目录内生成一个 `warble.rb` 文件。确保该文件看起来像清单 9-21 所示。在该文件中，你确保了 JRuby 与 Ruby 1.9\
  \ 兼容，并且当 warbler 构建 `WAR` 文件时，Spring 配置文件会被包含在生成的 `WAR` 文件的 `WEB-INF` 目录中。\n这就是你需要做的全部工作，现在让我们再次创建\
  \ `WAR` 文件。从应用程序的根目录执行 `JRUBY_OPTS=--1.9 warble`。此命令在 Windows 上不起作用。你应该只执行 `warble`，并单独设置\
  \ `JRUBY_OPTS` 变量。这会生成包含 Rails 应用程序的 `WAR` 文件。将其部署到你的 Web 应用服务器上（我们将其部署到了 Tomcat\
  \ 9）。\n部署完成后，你可以访问相应的 URL。在我们的电脑上，行为如下：当我们访问 `http://localhost:8080/demo/standard/message`\
  \ 时，会看到消息“任何人都能阅读这条无意义的消息。”\n\n然而，如果我们访问 `http://localhost:8080/demo/admin/message`，则会显示熟悉的登录页面。当我们使用用户名\
  \ **massimo** 和密码 **nardone** 登录后，页面上会显示以下消息：“这是绝密代码。”这正是我们期望的行为。我们已经通过基本的 Web 层安全保护了\
  \ Rails 应用程序。\n\n```\nWarbler::Config.new do |config|\nconfig.dirs = %w(app config\
  \ lib log vendor tmp)\nconfig.includes = FileList[\"db\"]\nconfig.webinf_files +=\
  \ FileList[\"applicationContext-security.xml\"]\nconfig.webxml.jruby.compat.version\
  \ = \"1.9\"\nend\n清单 9-21\nwarble.rb 配置文件\n```\n\n```\n\n清单 9-20\n针对 /admin/∗ URL\
  \ 的 applicationContext-security.xml 安全配置\n```\n\n```\n\nspring\norg.springframework.web.servlet.DispatcherServlet\n\
  \nspring\n/\n\norg.springframework.web.context.ContextLoaderListener\n\ncontextConfigLocation\n\
  \n/WEB-INF/applicationContext-security.xml\n\nspringSecurityFilterChain\norg.springframework.web.filter.DelegatingFilterProxy\n\
  \nspringSecurityFilterChain\n/*\n\nRackFilter\norg.jruby.rack.RackFilter\n\nspringSecurityFilterChain\n\
  /*\n\nRackFilter\n/*\n\njavax.sql.DataSource\nContainer\n\n清单 9-19\nconfig 文件夹中的\
  \ web.xml.erb，包含 Spring Security 配置\n```\n\n\n\nSpring Security、Groovy 与 Grails\n\
  Groovy 是非 Java JVM 语言领域中争夺头把交椅的最强竞争者之一。它拥有一个出色的社区，目前由 SpringSource 团队支持和管理。Groovy\
  \ 是一种编程语言，它试图将 Java 的强大功能与某些动态编程语言的优雅性和开发者友好特性结合起来——主要借鉴了广受喜爱的知名语言（如 Python 和 Ruby）的思想。Groovy\
  \ 成功地创造了一个环境，让不同类型的程序员经过一些练习后都能感到得心应手（例如，经验丰富的 Java 开发者和 Ruby 开发者）。\n与其他 JVM 语言相比，Groovy\
  \ 有许多优势——在我们看来，主要优势是从 Java 到 Groovy 的轻松过渡以及两种语言之间的互操作性。就过渡而言，将 Java 程序变成 Groovy\
  \ 程序很容易。事实上，你什么都不用做。一个 Java 程序本身就是一个有效的 Groovy 程序。从一个角度看这很好，但从另一个角度看则不然。即使你可以将 Java\
  \ 程序编译为 Groovy 程序，这也没有意义。归根结底，你使用 Groovy 是为了利用它相比 Java 所具有的出色特性。这些出色的特性包括大量的元编程技术、像闭包这样强大的新结构、更快的开发周期，以及更清晰、更简洁且对开发者更友好的语法。\n\
  Grails 是一个用 Groovy 编写并旨在与 Groovy 一起使用的 Web 框架。它构建在 Spring 框架之上，并深受 Ruby on Rails\
  \ 的影响。Grails 试图用一种基于 JVM 的语言创建一个更友好、更轻量级且易于快速上手的框架。同时，它提供了更好、更简洁的开发应用程序的方式。并且，它构建在一些最强大的\
  \ Java 库和框架之上，例如 Spring 和 Hibernate。\n让我们为示例安装 Groovy 库并指定 Groovy SDK。从 [`http://groovy-lang.org/download.html`](http://groovy-lang.org/download.html)\
  \ 提供的官方发行版中下载标准的 Groovy SDK 工具。将其解压到任意目录，并将此目录指定为库的主目录。在我们的例子中，它是 `C:\\apache-groovy-sdk-2.5.6`。现在你可以创建新的示例了。\n\
  \n使用 Grails 通过 URL 规则保护 Web 层\nGrails 与 Spring Security 的集成非常简单，因为 Spring Security\
  \ 是 Grails 应用程序的默认安全解决方案，并且存在一个全面的插件来支持它。在这里，你将创建一个简单的 Grails 应用程序，并学习如何使用 Spring\
  \ Security 保护它。像往常一样，我们将逐步介绍这个应用程序。\n如果你还没有安装最新版本的 Grails，请下载并安装。你可以从其主页 [`http://grails.org/`](http://grails.org/)\
  \ 下载。我们使用 Grails 3.3.9 版本来运行此示例。\n要安装它，只需解压下载的 `grails-3.3.9.zip` 文件（在我们的例子中，它是\
  \ `C:\\grails-3.3.9`），然后设置环境变量 `GRAILS_HOME` 指向新解压的目录。另外，将路径 `GRAILS_HOME/bin` 添加到你的\
  \ `PATH` 环境变量中。\n在命令行中，进入你想要创建应用程序的任意目录，并执行 `grails create-app demo-grails` 来创建应用程序。\n\
  接下来，生成两个控制器：一个安全控制器和一个非安全控制器。在生成的应用程序目录内执行 `grails create-controller secured`。然后执行\
  \ `grails create-controller unsecured`。\n现在，你需要在每个控制器中创建一个操作，并使它们看起来像清单 9-22 和 9-23\
  \ 所示。将这些文件放在应用程序的 `grails-app/controllers/demo/grails` 目录中。\n现在使用 `grails run-app`\
  \ 运行应用程序，并访问 `http://localhost:8080/demo-grails/secured/message` 或 `http://localhost:8080/demo-grails/unsecured/message`，你应该能够毫无问题地访问这两个\
  \ URL。下一个合乎逻辑的步骤是保护安全 URL。\n正如我们之前所说，Grails 构建在 Spring 之上，因此与 Spring Security 的集成应该是直接了当的。Grails\
  \ 以巧妙的模块化方式构建，因此你可以通过插件的形式添加功能。让我们通过执行 `grails install-plugin spring-security-core`\
  \ 来安装 Spring Security 插件（在我们的当前版本中，这会安装 1.2.7.3 版本）。然后执行命令 `grails s2-quickstart\
  \ demo.security User Role` 来生成支持应用程序中用户和角色所需的模型。\n接下来，你将创建几个测试用户来尝试安全性。打开文件 `BootStrap.groovy`（位于\
  \ `grails-app/conf` 目录中），并使其看起来像清单 9-24 中的代码。这里你创建了两个用户：一个具有角色 `ROLE_ADMIN`，另一个具有角色\
  \ `ROLE_USER`。你可以看到这段代码使用了上一步生成的类 `User` 和 `Role`。\n与之前的示例一样，你将保护某些 URL，使其仅对具有特定角色的用户可访问。要在\
  \ Grails 中做到这一点，你需要将清单 9-25 中的代码添加到文件 `Config.groovy`（位于 `grails-app/conf` 目录）的末尾。这段代码不言自明。它只是告诉\
  \ Grails 使用一个拦截 URL 映射来进行安全控制。这个映射定义了带有通配符的 URL 路径（使用 `Ant` 风格的语法，我们之前为标准 Java 规则介绍过）以及允许访问这些\
  \ URL 的角色。\n通过在根目录下执行命令 `grails run-app` 来运行应用程序。现在，如果你尝试访问 `http://localhost:8080/demo-grails/unsecured/message`\
  \ 或 `http://localhost:8080/demo-grails/secured/message`，你将被重定向到一个登录页面。如果你使用用户名 **luna**\
  \ 和密码 **password** 登录，你将获得对安全 URL 的访问权限，而非安全 URL 则不行。但是，如果你使用用户名 **neve** 和密码 **password**\
  \ 登录，你将获得对 `http://localhost:8080/demo-grails/unsecured/message` 的访问权限，但在尝试访问 `http://localhost:8080/demo-grails/secured/message`\
  \ 时会收到“访问被拒绝”的错误。你可以看到你已经正确地保护了对这些 URL 的访问。\n\n\n\n从这个例子中，首先难以察觉的一点是，你实际上正在使用 Spring\
  \ Security。我们之所以这么说，是因为你既没有定义任何过滤器、认证管理器、投票器、用户服务，也没有定义任何认证提供者。实际上，你甚至没有定义任何 Spring\
  \ Bean。你很容易会认为底层使用了其他机制，因为这里没有任何与 Spring Security 相关的内容。这是一件好事，也是 Grails 的优良特性之一。插件的使用为你提供了合理的通用默认配置，你只需负责定义与自身业务问题相关的专属内容。就安全而言，你需要定义你的用户、他们的密码，以及应用程序的角色和访问权限。\n\
  \n```\ngrails.plugins.springsecurity.securityConfigType = \"InterceptUrlMap\"\n\
  grails.plugins.springsecurity.interceptUrlMap = [\n'/secured/**':    ['ROLE_ADMIN'],\n\
  '/unsecured/**':   ['ROLE_USER'],\n]\n清单 9-25\nConfig.groovy 文件摘录，我们在其中添加了需要保护的\
  \ URL\n```\n\n```\nimport demo.security.Role\nimport demo.security.User\nimport\
  \ demo.security.UserRole\nclass BootStrap {\ndef init = { servletContext ->\ndef\
  \ adminRole = new Role(authority: 'ROLE_ADMIN').save(flush: true)\ndef userRole\
  \ = new Role(authority: 'ROLE_USER').save(flush: true)\ndef testAdmin = new User(username:\
  \ 'luna', enabled: true, password: 'password')\ntestAdmin.save(flush: true)\ndef\
  \ testUser = new User(username: 'neve', enabled: true, password: 'password')\ntestUser.save(flush:\
  \ true)\nUserRole.create testAdmin, adminRole, true\nUserRole.create testUser, userRole,\
  \ false\n}\ndef destroy = {\n}\n}\n清单 9-24\nBootStrap.groovy 文件，设置了一组测试用户并为其分配了安全角色\n\
  ```\n\n```\npackage demo.grails\nclass UnsecuredController {\ndef message() {\n\
  render \"message for everyone\"\n}\n}\n清单 9-23\nGrails 应用程序中带有未保护消息的 UnsecuredController\n\
  ```\n\n```\npackage demo.grails\nclass SecuredController {\ndef message() {\nrender\
  \ \"Incredibly confidential message\"\n}\n}\n清单 9-22\nGrails 应用程序中带有受保护消息的 SecuredController\n\
  ```\n\nGrails 的 Spring Security 插件让你能更深入地访问 Spring Security 提供的功能，当然，它也允许你通过覆盖默认值来自定义。它支持的功能之一是在访问规则中使用\
  \ SpEL。为了在本例的上下文中测试这一点，并使用我们能想到的最简单的安全 SpEL 表达式，只需将 `Config.groovy` 文件（来自清单 9-25）中引入的安全部分替换为清单\
  \ 9-26 中的内容。如你所见，在这个清单中，你使用了之前章节学习过的安全表达式 `hasRole`。请注意，这是一个使用 `hasRole` 的简单示例，但在这里你可以使用\
  \ Spring Security SpEL 支持提供的全套表达式。例如，你可以使用 [`authentication.name`](http://authentication.name)\
  \ `== 'luna'` 作为表达式，而不是 `hasRole`。\n\n```\ngrails.plugins.springsecurity.securityConfigType\
  \ = \"InterceptUrlMap\"\ngrails.plugins.springsecurity.interceptUrlMap = [\n'/secured/**':\
  \    [\"hasRole('ROLE_ADMIN')\"],\n'/unsecured/**':   [\"hasRole('ROLE_USER')\"\
  ],\n]\n清单 9-26\nConfig.groovy 文件摘录，使用 SpEL 代替简单角色\n```\n\n在方法级别使用 Grails 安全功能\n\n\
  Grails 的 Spring Security 插件支持方法级别的安全，其方式与 Java 相同。这意味着你可以在控制器类中添加 `@grails.plugins.springsecurity`\
  \ 安全注解（或者标准的 Spring Security `@Secured` 注解），Spring Security 将确保这些方法根据这些注解得到保护。这样做非常简单。让我们继续处理上一节中的应用程序。首先，将\
  \ `Config.groovy` 文件（位于 `grails-app/conf` 目录）中从 `grails.plugins.springsecurity.securityConfigType\
  \ = \"InterceptUrlMap\"` 这一行开始的内容，替换为简单的一行 `grails.plugins.springsecurity.securityConfigType\
  \ = \"Annotation\"`。然后，将 `SecuredController` 类（位于 `grails-app/controllers/demo/grails`\
  \ 目录）的内容替换为清单 9-27 的内容，并将 `UnsecuredController` 类（位于 `grails-app/controllers/demo/grails`\
  \ 目录）的内容替换为清单 9-28 的内容。完成这些操作后，如果你重新启动应用程序，应该会得到与上一节保护 URL 时相同的访问限制。\n\n```\npackage\
  \ demo.grails\nimport grails.plugins.springsecurity.Secured;\nclass UnsecuredController\
  \ {\n@Secured([\"ROLE_USER\"])\ndef message() {\nrender \"message for everyone\"\
  \n}\n}\n清单 9-28\n带有 @Secured 注解的 UnsecuredController\n```\n\n```\npackage demo.grails\n\
  import grails.plugins.springsecurity.Secured;\nclass SecuredController {\n@Secured([\"\
  ROLE_ADMIN\"])\ndef message() {\nrender \"Incredibly confidential message\"\n}\n\
  }\n清单 9-27\n带有 @Secured 注解的 SecuredController\n```\n\n在最后这两节中，我们只是浅尝辄止地介绍了使用 Grails\
  \ Spring Security 插件所能实现的功能。实际上，你可以完成几乎所有使用标准 Java 支持所能做到的事情。有关使用 Grails 插件的全面指南，请查看其官方页面：[`http://plugins.grails.org/plugin/grails/spring-security-core`](http://plugins.grails.org/plugin/grails/spring-security-core)。\n\
  \n\n\nSpring Security 与 Scala\nScala 很可能是除 Java 之外，在 Java 虚拟机上运行的最强大的语言（从采用者数量和社区活跃度来看）。（Scala\
  \ 也有一个在 .NET 平台上运行的版本。）Scala 是一种非常强大的通用编程语言，它试图融合面向对象和函数式编程范式的优点。\nScala 旨在为企业级\
  \ Java 编程世界提供一种简洁而优雅的替代方案，同时保留 Java 的类型安全性。正如我们所说，它内置了函数式编程特性，为经验丰富的面向对象程序员增添了全新的强大功能，从而提高了生产力。\n\
  我们并非 Scala 或函数式编程方面的专家（远非如此，因为我们最近才开始研究它们），但我们将为您提供两者的核心定义和主要特征，并向您展示如何将它们与 Spring\
  \ 和 Spring Security 结合使用。\n函数式编程是一种范式，其中程序由接收输入并产生输出的函数组成，同时避免使用状态和可变性。这与面向对象编程形成鲜明对比，在面向对象编程中，主要的抽象是对象及其内部状态，而可变性是非常普遍的现象。通过不允许可变性和状态，函数式编程为并发编程提供了一种良好的替代方案，因为程序员无需担心并发进程或线程之间的同步问题。\n\
  在 Scala 中，函数可以作为简单值传递（作为函数参数或函数返回值）。从这个意义上说，它们的行为与任何其他简单值（例如字符串）非常相似，这是函数式编程语言中的一个重要概念。在\
  \ Scala 中，函数是一等对象。\n根据文献记载，Scala 的名称来源于单词 *scalable language*（可扩展语言）。这意味着 Scala\
  \ 支持面向对象和函数式编程范式，并且适用于简单的脚本任务或完整的企业级应用程序。将这种能力与优雅简洁的语法相结合，使得该语言在其能够解决的领域和用途数量方面具有可扩展性。\n\
  现在让我们安装 Scala。安装 Scala 有两种方式：通过 IntelliJ IDEA 插件或手动安装。对于手动安装，您只需访问其主页（[`www.scala-lang.org/download/`](http://www.scala-lang.org/download/)）并下载最新版本（撰写本文时为\
  \ 2.13.0）。将下载的文件解压到您选择的目录中并进行配置。\n\n让我们通过插件安装 Scala，如图 9-12 所示。\n\n![../images/310331_2_En_9_Chapter/310331_2_En_9_Fig12_HTML.jpg](img/310331_2_En_9_Fig12_HTML.jpg)\n\
  \n图 9-12\n为 IntelliJ IDEA 安装 Scala IDE 插件\n\n好了，这就是对 Scala 的介绍！我们知道，这是一个非常简单的介绍。然而，正如我们所说，深入介绍该语言超出了本书的范围，并且有很多优秀的书籍专门讨论这个主题。我们在此假设您可能比我们更了解该语言，并且您只是对如何将\
  \ Spring Security 与它一起使用感兴趣。\n\n接下来您要做的是通过将 Scala 与 Spring 和 Spring Security 结合来创建项目。见图\
  \ 9-13。\n\n![../images/310331_2_En_9_Chapter/310331_2_En_9_Fig13_HTML.jpg](img/310331_2_En_9_Fig13_HTML.jpg)\n\
