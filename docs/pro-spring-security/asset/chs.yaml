- "# 4. Spring Security 架构与设计\n\n在上一章中，您开发了一个由 Spring Security 保护的初始应用程序。您对该应用程序的工作方式有了总体了解，并详细研究了在常见的\
  \ Spring Security 保护应用程序中投入使用的一些 Spring Security 组件。在本章中，我们将扩展这些解释并深入探讨该框架。\n\n\
  我们将研究框架的主要组件，解释用于保护 Web 应用程序的 Servlet 过滤器的工作原理，了解 Spring 面向切面编程如何帮助您以不引人注目的方式添加安全性，并总体上展示框架的内部设计方式。\n\
  \n## Spring Security 由哪些组件构成？\n\n在本节中，我们将介绍使 Spring Security 工作的主要组件。我们将提供框架的宏观概述，然后深入探讨每个主要组件。\n\
  \n### 万米高空视角\n\nSpring Security 是一个相对灵活的框架，旨在让开发人员轻松地在应用程序中实现安全性。在最一般的层面上，它是一个由拦截规则组成的框架，用于授予或拒绝授予对资源的访问权限。图\
  \ 4-1 说明了这一点。\n\n![../images/310331_2_En_4_Chapter/310331_2_En_4_Fig1_HTML.jpg](img/310331_2_En_4_Fig1_HTML.jpg)\n\
  \n图 4-1\n\nSpring Security 万米高空视角\n\n从这个视角来看，您可以将 Spring Security 简单地视为构建在应用程序之上的一个额外层，用确定的安全规则包裹住进入您逻辑的特定入口点。\n\
  \n### 千米视角\n\n再深入一点细节，我们来到了 AOP 和 Servlet 过滤器。\n\nSpring Security 的安全拦截模型适用于您应用程序的两个主要领域：URL\
  \ 和方法调用。Spring Security 包裹住您应用程序的这两个*入口点*，并且仅在满足安全约束时才允许访问。方法调用和基于过滤器的安全都依赖于一个核心的*安全拦截器*，其中驻留着决定是否应授予访问权限的主要逻辑。在图\
  \ 4-2 中，您可以看到框架的更详细概述。\n\n![../images/310331_2_En_4_Chapter/310331_2_En_4_Fig2_HTML.jpg](img/310331_2_En_4_Fig2_HTML.jpg)\n\
  \n图 4-2\n\n在此视图中，方法调用和 HTTP 请求都试图访问资源，但首先必须通过安全拦截器\n\n### 百米视角\n\nSpring Security\
  \ 在概念上可能看起来很简单，但在内部，一个构建精良的软件工具中发生了很多事情。接下来的概述将向您展示参与确保您的安全约束得到强制执行这一总体过程的主要协作部分。这对于像\
  \ Spring Security 这样的开源项目尤其可以实现，它允许您深入了解框架本身，并通过直接访问源代码来欣赏其设计和架构。之后，我们将更深入地研究实现细节。\n\
  \n对我们来说，以下是从内部理解 Spring Security 的最佳方式。列举我们认为的框架主要组件将帮助您了解每个部分属于哪里，以及您的应用程序如何强制执行您为其指定的安全规则。\n\
  \n最重要的 Spring Security 内部架构核心模块是：\n\n*   身份验证\n\n*   授权\n\n身份验证和授权模块的过程已在第 1 章中介绍。\n\
  \n图 4-3 提供了所有概念/组件的图示。\n\n![../images/310331_2_En_4_Chapter/310331_2_En_4_Fig3_HTML.jpg](img/310331_2_En_4_Fig3_HTML.jpg)\n\
  \n图 4-3\n\nSpring Security 的关键组件\n\n\n\n#### 安全拦截器\n\n框架最重要的组件之一便是安全拦截器。其主要逻辑在 `AbstractSecurityInterceptor`\
  \ 中实现，并有两种具体实现形式：`FilterSecurityInterceptor` 和 `MethodSecurityInterceptor`（如图 4-4\
  \ 所示）。安全拦截器负责决定是否允许特定请求访问受保护资源。顾名思义，`MethodSecurityInterceptor` 处理针对方法调用的请求，而 `FilterSecurityInterceptor`\
  \ 则处理针对 Web URL 的请求。\n\n安全拦截器的工作流程包含预处理和后处理两个步骤。在预处理阶段，它会检查所请求的资源是否通过某些元数据信息（或 `ConfigAttribute`）进行了保护。如果没有，则允许请求继续前往目标\
  \ URL 或方法。如果请求的资源受到保护，安全拦截器会从当前的 `SecurityContext` 中检索 `Authentication` 对象。如有必要，该\
  \ `Authentication` 对象将通过以下方法，根据配置的 `AuthenticationManager` 进行身份验证：\n\n```\npublic\
  \ interface AuthenticationManager {\nAuthentication authenticate(Authentication\
  \ authentication)\nthrows AuthenticationException;\n}\n```\n\n`AuthenticationManager`\
  \ 的 `authenticate` 方法主要可以执行以下三种操作：\n\n*   如果输入代表一个有效的凭证主体且可被验证，则返回一个 `authenticated=true`\
  \ 的 `Authentication` 对象\n*   如果输入代表一个无效的凭证主体，则抛出 `AuthenticationException` 异常\n\
  *   如果无法判断，则返回 null\n\n请注意，`ProviderManager`（它委托给一系列 `AuthenticationProvider` 实例）是\
  \ `AuthenticationManager` 最常用的实现。\n\n使用 `ProviderManager` 的 `AuthenticationManager`\
  \ 层次结构示例如图 4-4 所示。\n\n![../images/310331_2_En_4_Chapter/310331_2_En_4_Fig4_HTML.jpg](img/310331_2_En_4_Fig4_HTML.jpg)\n\
  \n图 4-4\n\n使用 ProviderManager 的 AuthenticationManager 层次结构\n\n对象经过身份验证后，会调用 `AccessDecisionManager`\
  \ 来确定已认证的实体是否最终能够访问该资源。如果已认证的实体不被允许访问该资源，`AccessDecisionManager` 会抛出 `AccessDeniedException`\
  \ 异常。如果 `AccessDecisionManager` 判定允许 `Authentication` 实体访问该资源，并且配置了 `RunAsManager`，则会将\
  \ `Authentication` 对象传递给 `RunAsManager`。如果未配置 `RunAsManager`，则会调用一个空操作实现。`RunAsManager`\
  \ 要么返回 null（如果未配置使用），要么返回一个新的 `Authentication` 对象，该对象包含与原始 `Authentication` 对象相同的主体、凭据和已授予权限，外加一组基于所使用的\
  \ `RUN_AS` 的新权限。这个新的 `Authentication` 对象会被放入当前的 `SecurityContext` 中。\n\n在此处理之后，无论是否使用了\
  \ `RUN_AS Authentication` 对象，安全拦截器都会创建一个包含 `SecurityContext` 和 `ConfigAttributes`\
  \ 信息的新的 `InterceptorStatusToken`。此令牌将在安全拦截器的后处理阶段使用。此时，安全拦截器已准备好允许访问受保护资源，因此它会放行调用，并调用特定的受保护实体（无论是\
  \ URL 还是方法）。调用返回后，安全拦截器的第二阶段开始生效，后处理开始。后处理步骤要简单得多，它仅涉及调用 `AfterInvocationManager`\
  \ 的 `decide` 方法（如果配置了的话）。在当前实现中，`AfterInvocationManager` 委托给 `PostInvocationAuthorizationAdvice`\
  \ 的实例，后者最终会过滤返回的对象，或在必要时抛出 `AccessDeniedException` 异常。如果你在方法级安全中使用了后调用过滤器，就会出现这种情况，你将在下一章中看到。在\
  \ Web 安全的情况下，`AfterInvocationManager` 为 null。\n\n这对安全拦截器来说工作量很大。然而，由于框架在类级别上具有良好的模块化特性，你可以看到安全拦截器只是将大部分任务委托给一系列定义明确的协作者，这些协作者以非常符合\
  \ SRP（单一职责原则）的方式专注于单一、范围狭窄的职责。这是良好的软件设计，也是你应该效仿的范例。如清单 4-1 所示，我们粘贴了 `AbstractSecurityInterceptor`\
  \ 自身代码的主要部分，以便你了解我们一直在讨论的内容。我们在代码中加入了一些注释，以帮助你更好地理解其功能；这些注释以 `//----` 开头。\n\n请注意，完整的\
  \ `AbstractSecurityInterceptor` 课程代码可以在 GitHub 地址 [`https://github.com/spring-projects/spring-security/blob/master/core/src/main/java/org/springframework/security/access/intercept/AbstractSecurityInterceptor.java`](https://github.com/spring-projects/spring-security/blob/master/core/src/main/java/org/springframework/security/access/intercept/AbstractSecurityInterceptor.java)\
  \ 找到。\n\n\n\n```\nprotected InterceptorStatusToken beforeInvocation(Object object)\
  \ {\nAssert.notNull(object, \"Object was null\");\nfinal boolean debug = logger.isDebugEnabled();\n\
  // --- 此处检查该过滤器是否能够处理特定类型的对象。例如，FilterSecurityInterceptor 能够处理 FilterInvocation\
  \ 对象，而 MethodSecurityInterceptor 能够处理 MethodInvocation 对象。\nif (!getSecureObjectClass().isAssignableFrom(object.getClass()))\
  \ {\nthrow new IllegalArgumentException(\"Security invocation attempted for object\
  \ \"\n+ object.getClass().getName()\n+ \" but AbstractSecurityInterceptor only configured\
  \ to support secure objects of type: \"\n+ getSecureObjectClass());\n}\n// ----\
  \ 此处检索与接收对象对应的安全元数据。因此，如果接收到的是 FilterInvocation，则会从中提取请求，并用于查找与请求路径模式匹配的 ConfigAttribute。\n\
  Collection attributes = this.obtainSecurityMetadataSource().getAttributes(object);\n\
  if (attributes == null || attributes.isEmpty()) {\nif (rejectPublicInvocations)\
  \ {\nthrow new IllegalArgumentException(\"Secure object invocation \" + object +\n\
  \" was denied as public invocations are not allowed via this interceptor. \"\n+\
  \ \"This indicates a configuration error because the \" + \"rejectPublicInvocations\
  \ property is set to 'true'\");\n}\nif (debug) {\nlogger.debug(\"Public object -\
  \ authentication not attempted\");\n}\npublishEvent(new PublicInvocationEvent(object));\n\
  return null; // 调用后无需进一步处理\n}\nif (debug) {\nlogger.debug(\"Secure object: \" +\
  \ object + \"; Attributes: \" + attributes);\n}\nif (SecurityContextHolder.getContext().getAuthentication()\
  \ == null) {\ncredentialsNotFound(messages.getMessage(\"AbstractSecurityInterceptor.authenticationNotFound\"\
  ,\n\"An Authentication object was not found in the SecurityContext\"), object, attributes);\n\
  }\nAuthentication authenticated = authenticateIfRequired();\n// ---- 此处调用决策管理器来决定是否授予访问权限。这将触发投票机制，如果访问未被授予，则应抛出异常。\n\
  try {\nthis.accessDecisionManager.decide(authenticated, object, attributes);\n}\n\
  catch (AccessDeniedException accessDeniedException) {\npublishEvent(new AuthorizationFailureEvent(object,\
  \ attributes, authenticated, accessDeniedException));\nthrow accessDeniedException;\n\
  }\nif (debug) {\nlogger.debug(\"Authorization successful\");\n}\nif (publishAuthorizationSuccess)\
  \ {\npublishEvent(new AuthorizedEvent(object, attributes, authenticated));\n}\n\
  // ---- 此处将尝试使用 Spring Security 的 run-as 功能，该功能允许用户模拟另一个用户，从而获取其安全角色，更准确地说，是获取其\
  \ GrantedAuthority。\nAuthentication runAs = this.runAsManager.buildRunAs(authenticated,\
  \ object, attributes);\nif (runAs == null) {\nif (debug) {\nlogger.debug(\"RunAsManager\
  \ did not change Authentication object\");\n}\n// 调用后无需进一步处理\nreturn new InterceptorStatusToken(SecurityContextHolder.getContext(),\
  \ false, attributes, object);\n} else {\nif (debug) {\nlogger.debug(\"Switching\
  \ to RunAs Authentication: \" + runAs);\n}\nSecurityContext origCtx = SecurityContextHolder.getContext();\n\
  SecurityContextHolder.setContext(SecurityContextHolder.createEmptyContext());\n\
  SecurityContextHolder.getContext().setAuthentication(runAs);\n// 调用后需要恢复为 token.Authenticated\n\
  return new InterceptorStatusToken(origCtx, true, attributes, object);\n}\n// ----\
  \ 如果方法在此处未抛出异常，则可以安全地继续调用直至资源。授权已获批准。\n}\nprotected Object afterInvocation(InterceptorStatusToken\
  \ token, Object returnedObject) {\nif (token == null) {\n// 公共对象\nreturn returnedObject;\n\
  }\nif (token.isContextHolderRefreshRequired()) {\nif (logger.isDebugEnabled()) {\n\
  logger.debug(\"Reverting to original Authentication: \" + token.getSecurityContext().getAuthentication());\n\
  }\nSecurityContextHolder.setContext(token.getSecurityContext());\n}\n// ---- 如果配置了\
  \ afterInvocationManager，则会调用它。\n// ---- 它将负责过滤返回值，或者在必要时抛出异常。\nif (afterInvocationManager\
  \ != null) {\n// 尝试进行调用后处理\ntry {\nreturnedObject = afterInvocationManager.decide(token.getSecurityContext().getAuthentication(),\n\
  token.getSecureObject(),\ntoken.getAttributes(), returnedObject);\n}\ncatch (AccessDeniedException\
  \ accessDeniedException) {\nAuthorizationFailureEvent event = new AuthorizationFailureEvent(token.getSecureObject(),\
  \ token .getAttributes(), token.getSecurityContext().getAuthentication(), accessDeniedException);\n\
  publishEvent(event);\nthrow accessDeniedException;\n}\n}\n// ---- 至此，完整的授权周期结束。响应返回给调用者。\n\
  return returnedObject;\n}\nListing 4-1\nAbstractSecurityIntercepto r\n```\n\n安全拦截器是\
  \ Spring Security 框架的核心。对 Spring Security 中受保护资源的每次调用都会经过此拦截器。当你意识到两种不太相关的资源（URL\
  \ 端点和方法）都利用了此抽象拦截器的大部分功能时，`AbstractSecurityInterceptor` 便展现了其多功能性。这再次体现了框架设计与实现中所付出的努力。\n\
  \n图 4-5 以 UML（统一建模语言）类图的形式展示了该拦截器。图 4-6 则展示了一个简化的时序图。\n\n![../images/310331_2_En_4_Chapter/310331_2_En_4_Fig6_HTML.jpg](img/310331_2_En_4_Fig6_HTML.jpg)\n\
  \n图 4-6\n\n简化的 AbstractSecurityInterceptor 时序图\n\n![../images/310331_2_En_4_Chapter/310331_2_En_4_Fig5_HTML.jpg](img/310331_2_En_4_Fig5_HTML.jpg)\n\
  \n图 4-5\n\n简化的 SecurityInterceptor UML 类图\n\n我们已经了解了安全拦截器的工作原理，但它们是如何产生的呢？它们如何知道要拦截什么？答案在于接下来的几个组件中，请继续阅读。\n\
  \n\n\n#### XML 命名空间\n\nXML 命名空间对于框架的通用吸引力和可用性至关重要，但理论上，它并非严格必要。如果你了解 Spring 框架的命名空间是如何工作的，那么在应用程序上下文定义文件中定义特定于安全性的\
  \ XML 配置时，你可能已经很清楚发生了什么。如果你不了解它们的工作原理，你可能会认为 Spring 以某种方式知道如何处理这些特定元素，以及如何在通用的 Spring\
  \ 应用程序上下文中加载它们。无论哪种情况，我们都会在这里详细解释在 Spring 中定义自定义命名空间的过程，特别是 Spring Security 命名空间中的元素。\n\
  \n最初，Spring 不支持自定义 XML。Spring 所能理解的只有其标准 Spring Core 命名空间中定义的自身类，你可以在其中逐个 bean 地定义\
  \ `<bean>`，并且如果不自行在配置中添加复杂性，就无法真正定义任何概念上更复杂的内容。\n\n这种基于 `<bean>` 的配置过去是（现在仍然是）配置通用\
  \ bean 实例的绝佳方式，但在定义更特定于领域的实用程序时，它很快就会变得混乱不堪。除了混乱之外，它在表达你所定义的 bean 的业务领域方面也非常糟糕。\n\
  \n我们将在本书后面探讨这种手动配置，但对于标准情况，它是不需要的，你应该直接使用命名空间。但是，请记住，在底层，命名空间不过是语法糖。归根结底，你最终得到的仍然是标准的\
  \ Spring bean 和对象。\n\nSpring 2.0 引入了对定义自定义 XML 命名空间的支持。从那时起，许多项目都利用了此功能，使其更易于使用。\n\
  \nXML 自定义命名空间本质上是一种基于 XML 的领域特定语言（DSL），由 XML 模式（`.xsd`）文件的规则指导，允许开发人员使用与其试图建模的编程关注点更一致的概念和语法来创建\
  \ Spring bean。\n\n### 注意\n\nDSL 是一种为表示特定应用程序领域的概念而量身定制的语言。有时，会创建一种全新的语言来支持新领域，这被称为*外部\
  \ DSL*。其他时候，会对现有语言进行调整，以允许表示领域概念的新表达式，这被称为*内部 DSL*。在本章介绍的情况下，你使用的是通用语言（XML）；但是，你正在定义关于元素（使用\
  \ XSD）的某些约束，从而创建了一个内部 DSL 来表示安全概念。\n\n让 Spring 识别一个新的命名空间非常简单。（这并不是说实际解析 XML 信息并将其转换为\
  \ bean 很简单——这取决于你的 DSL 的复杂性。）你只需要以下内容：\n\n*   一个定义特定 XML 结构的 `.xsd` 文件\n*   一个 `spring.schemas`\
  \ 文件，在其中指定基于 URL 的模式位置与类路径中 `.xsd` 文件位置之间的映射\n*   一个 `spring.handlers` 文件，在其中指定哪个类负责处理与你的命名空间相关的所有事务\n\
  *   一组解析器类，负责解析 XML 文件中定义的每个顶级元素\n\n在第 8 章中，你将看到一些如何创建新命名空间元素并将其与 Spring Security\
  \ 集成的示例。\n\n对于 Spring Security，所有与命名空间配置相关的信息都位于 `config` 模块中。在图 4-7 中，你可以看到在 Eclipse\
  \ 集成开发环境（IDE）中（本例中为 Spring Tool Suite v4 for Eclipse）看到的 `config` 模块的展开结构。\n\n![../images/310331_2_En_4_Chapter/310331_2_En_4_Fig7_HTML.jpg](img/310331_2_En_4_Fig7_HTML.jpg)\n\
  \n图 4-7\n\nSpring Security 的文件结构\n\n文件 `spring.handlers` 和 `spring.schemas` 应位于类路径的\
  \ `META-INF` 目录中，以便 Spring 能在那里找到它们。\n\n好了，关于通用命名空间的信息就介绍到这里。更具体地说，Spring Security\
  \ 命名空间是如何工作的？\n\n当你创建一个基于 Spring 的应用程序，使用 XML 定义的应用程序上下文配置，并包含一些 Spring Security\
  \ 命名空间定义时，当你运行该应用程序，它开始加载时，会查看 XML 配置文件顶部的应用程序上下文命名空间定义。它会找到对 Spring Security 命名空间的引用（通常是一个类似\
  \ `xmlns:security=\"`[`http://www.springframework.org/schema/security`](http://www.springframework.org/schema/security)`\"\
  ` 的引用）。使用 `spring.handlers` 映射文件中的信息，它会发现处理安全元素的文件是最终类 `org.springframework.security.config.SecurityNamespaceHandler`。Spring\
  \ 会为配置文件中使用安全命名空间的每个顶级元素调用此类的 `parse` 方法。图 4-8 显示了此过程的加载序列。\n\n![../images/310331_2_En_4_Chapter/310331_2_En_4_Fig8_HTML.jpg](img/310331_2_En_4_Fig8_HTML.jpg)\n\
  \n图 4-8\n\n加载 Spring 命名空间的序列\n\n`SecurityNamespaceHandler` 委托给一系列 `BeanDefinitionParser`\
  \ 对象，用于单独解析每个顶级元素。Spring Security 命名空间配置中支持的完整元素列表在类 `org.springframework.security.config.Elements`\
  \ 中定义为常量。此类如清单 4-2 所示。\n\n\n\n```\npackage org.springframework.security.config;\n\
  public abstract class Elements {\npublic static final String ACCESS_DENIED_HANDLER\
  \ = \"access-denied-handler\";\npublic static final String AUTHENTICATION_MANAGER\
  \ = \"authentication-manager\";\npublic static final String AFTER_INVOCATION_PROVIDER\
  \ = \"after-invocation-provider\";\npublic static final String USER_SERVICE = \"\
  user-service\";\npublic static final String JDBC_USER_SERVICE = \"jdbc-user-service\"\
  ;\npublic static final String FILTER_CHAIN_MAP = \"filter-chain-map\";\npublic static\
  \ final String INTERCEPT_METHODS = \"intercept-methods\";\npublic static final String\
  \ INTERCEPT_URL = \"intercept-url\";\npublic static final String AUTHENTICATION_PROVIDER\
  \ = \"authentication-provider\";\npublic static final String HTTP = \"http\";\n\
  public static final String LDAP_PROVIDER = \"ldap-authentication-provider\";\npublic\
  \ static final String LDAP_SERVER = \"ldap-server\";\npublic static final String\
  \ LDAP_USER_SERVICE = \"ldap-user-service\";\npublic static final String PROTECT_POINTCUT\
  \ = \"protect-pointcut\";\npublic static final String EXPRESSION_HANDLER = \"expression-handler\"\
  ;\npublic static final String INVOCATION_HANDLING = \"pre-post-annotation-handling\"\
  ;\npublic static final String INVOCATION_ATTRIBUTE_FACTORY = \"invocation-attribute-factory\"\
  ;\npublic static final String PRE_INVOCATION_ADVICE = \"pre-invocation-advice\"\
  ;\npublic static final String POST_INVOCATION_ADVICE = \"post-invocation-advice\"\
  ;\npublic static final String PROTECT = \"protect\";\npublic static final String\
  \ SESSION_MANAGEMENT = \"session-management\";\npublic static final String CONCURRENT_SESSIONS\
  \ = \"concurrency-control\";\npublic static final String LOGOUT = \"logout\";\n\
  public static final String FORM_LOGIN = \"form-login\";\npublic static final String\
  \ OPENID_LOGIN = \"openid-login\";\npublic static final String OPENID_ATTRIBUTE_EXCHANGE\
  \ = \"attribute-exchange\";\npublic static final String OPENID_ATTRIBUTE = \"openid-attribute\"\
  ;\npublic static final String BASIC_AUTH = \"http-basic\";\npublic static final\
  \ String REMEMBER_ME = \"remember-me\";\npublic static final String ANONYMOUS =\
  \ \"anonymous\";\npublic static final String FILTER_CHAIN = \"filter-chain\";\n\
  public static final String GLOBAL_METHOD_SECURITY = \"global-method-security\";\n\
  public static final String PASSWORD_ENCODER = \"password-encoder\";\npublic static\
  \ final String SALT_SOURCE = \"salt-source\";\npublic static final String PORT_MAPPINGS\
  \ = \"port-mappings\";\npublic static final String PORT_MAPPING = \"port-mapping\"\
  ;\npublic static final String CUSTOM_FILTER = \"custom-filter\";\npublic static\
  \ final String REQUEST_CACHE = \"request-cache\";\npublic static final String X509\
  \ = \"x509\";\npublic static final String JEE = \"jee\";\npublic static final String\
  \ FILTER_SECURITY_METADATA_SOURCE = \"filter-security-metadata-source\";\npublic\
  \ static final String METHOD_SECURITY_METADATA_SOURCE = \"method-security-metadata-source\"\
  ;\n@Deprecated\npublic static final String FILTER_INVOCATION_DEFINITION_SOURCE =\
  \ \"filter-invocation-definition-source\";\npublic static final String LDAP_PASSWORD_COMPARE\
  \ = \"password-compare\";\npublic static final String DEBUG = \"debug\";\npublic\
  \ static final String HTTP_FIREWALL = \"http-firewall\";\n}\n清单 4-2\n所有 Spring Security\
  \ 命名空间元素的常量\n```\n\n从前一个类中列出的元素来看，在 XML 配置文件中使用的顶层元素如下（在前面的清单中，我们通过常量名称而非 XML 元素名称来引用它们）：\n\
  \n*   `LDAP_PROVIDER`：如果你需要为应用程序配置轻量级目录访问协议（LDAP）认证提供者，则使用此元素。\n\n*   `LDAP_SERVER`：此元素用于在应用程序中配置一个\
  \ LDAP 服务器。\n\n*   `LDAP_USER_SERVICE`：此元素配置用于从 LDAP 服务器检索用户详细信息并填充该用户权限的服务（Spring\
  \ Security 使用术语“权限”来指代授予特定用户的许可名称。例如，`ROLE_USER` 就是一个权限）。\n\n*   `USER_SERVICE`：此元素定义了内存用户服务，你可以在其中将用户名、凭据和权限直接存储在应用程序上下文定义文件中。请注意，这种类型的配置特定于测试环境和学术目的，因为它易于设置且速度快。\n\
  \n*   `JDBC_USER_SERVICE`：此元素允许你设置一个数据库驱动的用户服务，你可以在其中指定一个 `DataSource` 以及用于从数据库检索用户信息的查询语句。\n\
  \n*   `AUTHENTICATION_PROVIDER`：此元素定义了一个 `DaoAuthenticationProvider`，它是一个委托给 `UserDetailsService`\
  \ 实例的认证提供者。`UserDetailsService` 可以是前面三个要点中定义的任何一个，也可以是对自定义实现的引用。\n\n*   `GLOBAL_METHOD_SECURITY`：此元素负责在应用程序中设置对注解\
  \ `@Secured`、`@javax.annotation.security.RolesAllowed`、`@PreAuthorize` 和 `@PostAuthorize`\
  \ 的全局支持。该元素将处理方法拦截器的注册，该拦截器将感知 Bean 方法的所有元数据，以便应用相应的安全通知。\n\n*   `AUTHENTICATION_MANAGER`：此元素在应用程序中注册一个全局的\
  \ `ProviderManager`，并在其上设置已配置的 `AuthenticationProviders`。\n\n*   `METHOD_SECURITY_METADATA_SOURCE`：此元素在应用程序上下文中注册一个\
  \ `MapBasedMethodSecurityMetadataSource`。它将持有一个 `Map<RegisteredMethod, List<ConfigAttribute>>`。这样做是为了当对某个方法发起请求时，可以检索该方法并检查其安全约束。\n\
  \n*   `DEBUG`：出于开发目的，此元素在安全过滤器链中注册一个 `DebugFilter`。\n\n*   `HTTP`：这是基于 Web 的安全应用程序的主要元素。HTTP\
  \ 元素非常强大。它允许定义基于 URL 的安全映射策略、配置过滤器、安全套接字层（SSL）支持以及其他与 HTTP 相关的安全配置。\n\n*   `HTTP_FIREWALL`：此元素使用一个防火墙元素，如果已配置，则将其添加到过滤器链中。引用的防火墙应该是\
  \ Spring 自身 `HttpFirewall` 接口的一个实现。\n\n*   `FILTER_INVOCATION_DEFINITION_SOURCE`：此元素已被弃用。请参见下一个元素。\n\
  \n*   `FILTER_SECURITY_METADATA_SOURCE`：此元素包装了一个 `<intercept-url>` 元素列表。这些元素映射了\
  \ URL 与访问这些 URL 所需的 `ConfigAttributes` 之间的关系。\n\n*   `FILTER_CHAIN`：此元素允许你配置将在应用程序中使用的\
  \ Spring Security 过滤器链、你想要添加到链中的过滤器，以及如果你想自定义链如何匹配请求，还可以配置一个请求匹配器。最重要的请求匹配器是基于 Ant\
  \ 路径和基于正则表达式的。\n\n你将在本书中全面使用 Spring Security 命名空间，因此这里描述的许多元素将在后续章节中再次讨论。\n\n\n\n\
  #### 过滤器与过滤器链\n\n过滤器链模型是 Spring Security 用于保护 Web 应用程序的核心机制。该模型构建在标准的 *servlet 过滤器*\
  \ 功能之上。作为拦截过滤器模式的一种实现，Spring Security 中的过滤器链由多个单一职责的过滤器组成，这些过滤器涵盖了应用程序所需的所有不同安全约束。\n\
  \nSpring Security 的过滤器链会对发送到应用程序的所有 HTTP 请求进行预处理和后处理，并对需要保护的 URL 应用安全策略。\n\n单个 HTTP\
  \ 请求的典型过滤器如图 4-9 所示。\n\n![../images/310331_2_En_4_Chapter/310331_2_En_4_Fig9_HTML.jpg](img/310331_2_En_4_Fig9_HTML.jpg)\n\
  \n图 4-9\n\n单个 HTTP 请求的 Spring Security 过滤器示例\n\nSpring Security 过滤器链由 Spring Bean\
  \ 组成；然而，标准的基于 Servlet 的 Web 应用程序并不了解 Spring Bean。\n\n从容器的角度来看，Spring Security 实际上是一个单一的过滤器，其内部包含了许多具有不同用途的过滤器。\n\
  \nSpring Security 作为链中名为 `FilterChainProxy` 的单一过滤器被安装，该过滤器本身是一个包含所有必需安全功能的过滤器链，如图\
  \ 4-10 所示。\n\n![../images/310331_2_En_4_Chapter/310331_2_En_4_Fig10_HTML.jpg](img/310331_2_En_4_Fig10_HTML.jpg)\n\
  \n图 4-10\n\nSpring Security 过滤器概览\n\n在安全过滤器中，容器中还安装了一个特殊的间接层，名为 `DelegatingFilterProxy`。`DelegatingFilterProxy`\
  \ 本身不需要是一个 Spring Bean。\n\n其工作流程是：`DelegatingFilterProxy` 过滤器会将请求委托给 `FilterChainProxy`，而\
  \ `FilterChainProxy` 始终是一个具有固定名称 `springSecurityFilterChain` 的 Bean，它最终将在你的应用程序中负责：\n\
  \n*   保护应用程序的 URL\n*   验证提交的用户名和密码\n*   重定向到登录表单\n\n包含 `FilterChainProxy` 的 `DelegatingFilterProxy`\
  \ 处理过程如图 4-11 所示。\n\n![../images/310331_2_En_4_Chapter/310331_2_En_4_Fig11_HTML.jpg](img/310331_2_En_4_Fig11_HTML.jpg)\n\
  \n图 4-11\n\nSpring Security 过滤器链概览\n\nSpring Security 的过滤器配置是通过一个特殊的 Servlet 和两个主要的\
  \ XML 文件（`web.xml` 和 `applicationContext.xml`）来实现的。请注意，从 Servlet 3.0 开始，`web.xml`\
  \ 不再是必需的。\n\n这个特殊的 Servlet 过滤器用于跨越标准 Servlet API 及其生命周期与存放 Bean 过滤器的 Spring 应用程序之间的界限。这是由定义在\
  \ `web.xml` 中的 `org.springframework.web.filter.DelegatingFilterProxy` 完成的，它在底层使用\
  \ `WebApplicationContextUtils.getWebApplicationContext` 工具方法来检索应用程序的根应用上下文。这两个类来自\
  \ Spring 框架，而非 Spring Security。\n\n图 4-12 展示了过滤器链的配置。\n\n![../images/310331_2_En_4_Chapter/310331_2_En_4_Fig12_HTML.jpg](img/310331_2_En_4_Fig12_HTML.jpg)\n\
  \n图 4-12\n\n理解 Spring Security 过滤器配置。`web.xml` 文件中的过滤器与 Spring 应用上下文中的 Bean 具有相同的名称，以便监听器能够找到它\n\
  \n关于如何从 Spring Security 3.x 迁移到 4.x 以及从 4.x 迁移到 5.x（Java 配置）的完整信息，请参阅 [`https://docs.spring.io/spring-security/site/migrate/current/3-to-4/html5/migrate-3-to-4-jc.html`](https://docs.spring.io/spring-security/site/migrate/current/3-to-4/html5/migrate-3-to-4-jc.html)\
  \ 和 [`https://github.com/spring-projects/spring-security/issues/4874`](https://github.com/spring-projects/spring-security/issues/4874)。\n\
  \n\n\n过滤器链将在第 5 章中详细说明。不过，在此我们将概述可用的过滤器及其功能。可用的过滤器在名为`org.springframework.security.config.http.SecurityFilters`的文件中被定义为枚举。随后，在启动过程中实例化每个过滤器的\
  \ Bean 定义时，会引用这些枚举。以下是已定义的过滤器：\n\n*   `CHANNEL_FILTER`：此过滤器确保请求由正确的通道处理——这意味着，在大多数情况下，它决定请求是否由\
  \ HTTPS 处理。\n\n*   `CONCURRENT_SESSION_FILTER`：此过滤器是并发会话处理机制的一部分。其主要功能是查询会话是否已过期（这主要发生在达到每个用户的最大并发会话数时），如果过期，则注销该用户。\n\
  \n*   `SECURITY_CONTEXT_FILTER`：此过滤器用一个新的或现有的安全上下文填充`SecurityContextHolder`，供框架的其余部分使用。\n\
  \n*   `LOGOUT_FILTER`：默认情况下，此过滤器基于特定的 URL 调用（`/logout`）。它负责处理注销过程，包括清除 Cookie、移除“记住我”信息以及清除安全上下文等任务。\n\
  \n*   `X509_FILTER`：此过滤器使用`java.security.cert.X509Certificate`类从 X509 证书中提取主体和凭证，并尝试使用这些预认证的值进行身份验证。\n\
  \n*   `PRE_AUTH_FILTER`：此过滤器与 J2EE 身份验证机制一起使用。J2EE 认证的主体将作为框架中的预认证主体。\n\n*   `FORM_LOGIN_FILTER`：当登录表单需要用户名和密码时，使用此过滤器。此过滤器负责使用请求的用户名和密码进行身份验证。从\
  \ Spring v4 开始，它处理对特定 URL（`/login`）的请求，并附带一组特定的用户名和密码参数（`username`、`password`）。\n\
  \n*   `OPENID_FILTER`：此过滤器处理`OpenId`身份验证请求，既处理向外部服务器发送的包含`OpenId`身份的初始请求，也处理从`OpenId`服务器重定向回应用程序的请求。当过滤器检测到对预配置\
  \ URL `/openid`（自 Spring v4 起）的请求时，会管理所有这些交互。\n\n*   `LOGIN_PAGE_FILTER`：当用户未提供自定义登录页面时，此过滤器会生成一个默认的登录页面。当请求\
  \ URL `/spring_security_login` 时，它会被激活。\n\n*   `DIGEST_AUTH_FILTER`：此过滤器处理 HTTP\
  \ `Digest` 身份验证头。它会查找`Digest`和`Authorization`这两个 HTTP 请求头。它可用于为标准用户代理（如浏览器）或应用程序客户端（如\
  \ SOAP）提供 Digest 身份验证。身份验证成功后，`SecurityContext`将填充有效的`Authentication`对象。\n\n*  \
  \ `BASIC_AUTH_FILTER`：此`过滤器`处理 HTTP 请求中的 BASIC 身份验证头。它会查找`Authorization`头，并尝试使用这些凭证进行身份验证。\n\
  \n*   `REQUEST_CACHE_FILTER`：此过滤器从请求缓存中检索与当前请求匹配的请求，并将缓存的请求发送到过滤器链的其余部分。\n\n*  \
  \ `SERVLET_API_SUPPORT_FILTER`：此过滤器将请求包装在一个请求包装器中，该包装器实现了 Servlet API 安全方法（如`isUserInRole`），并将其委托给`SecurityContextHolder`。这允许方便地使用请求对象本身来获取安全信息。例如，您可以使用`request.getAuthentication`来检索`Authentication`对象。\n\
  \n*   `JAAS_API_SUPPORT_FILTER`：此过滤器尝试获取并使用`javax.security.auth.Subject`（这是一个 final\
  \ 类），并使用此主体继续执行过滤器链。\n\n*   `REMEMBER_ME_FILTER`：如果没有用户登录，此过滤器将检查是否有任何“记住我”功能处于活动状态，以及是否有任何“记住我”`Authentication`可用。如果有，此过滤器将尝试自动登录并使用此“记住我”信息进行身份验证。\n\
  \n*   `ANONYMOUS_FILTER`：此过滤器检查上下文中是否已存在`Authentication`。如果不存在，它将创建一个新的`Anonymous`对象并将其设置在安全上下文中。\n\
  \n*   `SESSION_MANAGEMENT_FILTER`：此过滤器将对应于已登录系统的已认证用户的`Authentication`对象传递给一些配置好的会话管理处理器，以便对`Authentication`进行与会话相关的处理。主要地，这些处理器会执行某种验证，并在适当时抛出`SessionAuthenticationException`。目前，这些处理器（或策略）仅包含一个主类，即`org.springframework.security.web.authentication.session.ConcurrentSessionControlStrategy`，用于处理会话固定和并发会话。\n\
  \n*   `EXCEPTION_TRANSLATION_FILTER`：此过滤器处理 Spring Security 异常（如`AccessDeniedException`）与相应\
  \ HTTP 状态码之间的转换。如果抛出异常是因为系统中尚不存在已认证的用户，它还会重定向到应用程序入口点。\n\n*   `FILTER_SECURITY_INTERCEPTOR`：此过滤器处理已定义\
  \ URL 的授权机制。它将授予或不授予对特定资源访问权限的实际工作流逻辑委托给其父类（`AbstractSecurityInterceptor`）的功能（我们将在本章后面介绍）。\n\
  \n*   `SWITCH_USER_FILTER`：此过滤器允许用户通过访问特定 URL 来模拟另一个用户，自 Spring v4 起，该 URL 已从`/j_spring_security_switch_user`更新为`/login/impersonate`。此\
  \ URL 应受到保护，仅允许特定用户访问此功能。此外，可以实现类`SwitchUserFilter`中的`attemptSwitchUser`方法，以添加约束，从而您可以使用更细粒度的信息来决定是否允许某些用户模拟其他用户。\n\
  \n\n\n#### ConfigAttribute\n\n接口 `org.springframework.security.access.ConfigAttribute`\
  \ 封装了安全资源中的访问信息元数据。例如，为了便于学习，`ROLE_ADMIN` 就是一个 `ConfigAttribute`。`ConfigAttribute`\
  \ 有几种实现，如图 4-13 所示。\n\n![../images/310331_2_En_4_Chapter/310331_2_En_4_Fig13_HTML.jpg](img/310331_2_En_4_Fig13_HTML.jpg)\n\
  \n图 4-13\n\n`ConfigAttribute` 层次结构\n\n当你使用 `@Secured(\"ROLE_ADMIN\")` 或类似方式注解一个方法，或者通过\
  \ `<security:intercept-url pattern=\"/hello\" access=\"ROLE_SIMPSON_MEMBER\" />`\
  \ 指定一个 URL 时，Spring Security 会执行以下操作。在启动时，作为正常的 Spring 功能，`ApplicationContext` 中所有的\
  \ bean 后处理器都会被调用。而在 Spring Security 的情况下，其处理过程如下。\n\n对于 Web 请求，其处理过程实际上并不复杂。Web\
  \ 请求并不真正使用后处理器基础设施。\n\n当你使用 `<security:intercept-url pattern=\"/x\" access=\"ROLE_XX\"\
  \ />` 元素时，Spring Security 会使用 `FilterInvocationSecurityMetadataSourceParser` 类来解析这个\
  \ XML。在解析过程中，会调用私有方法 `parseInterceptUrlsForFilterInvocationRequestMap`。该方法将 XML\
  \ 元素中每个 URL 模式包含的信息映射到一个 Ant 风格请求路径的映射中，例如 `/*, ROLE_USER`。这里的 `/*` 是一个 Ant 模式，而\
  \ `ROLE_USER` 是一个配置属性（这表示基本上需要这个配置属性才能访问匹配此模式的任何 URL）。最终，这个映射会被设置在 `FilterSecurityInterceptor`\
  \ 内部的 `org.springframework.security.web.access.intercept.FilterInvocationSecurityMetadataSource`\
  \ 接口的一个实现实例中。当每个请求到来时，`FilterSecurityInterceptor` 会使用该映射，将请求的 URL 与映射中的键进行匹配，以判断该\
  \ URL 是否受保护，然后提取出 `ConfigAttributes`，并据此检查请求的 `Authentication` 对象的权限。这个设置过程如图 4-14\
  \ 所示。\n\n![../images/310331_2_En_4_Chapter/310331_2_En_4_Fig14_HTML.jpg](img/310331_2_En_4_Fig14_HTML.jpg)\n\
  \n图 4-14\n\nWeb 应用的 `ConfigAttribute` 设置\n\n对于方法级安全，你有多种选择——最常见的是通过使用注解进行配置。框架中有几种不同的注解可用；然而，框架的处理方式非常相似。例如，对于\
  \ `@Secured` 注解，你需要让 Spring 知道这个特殊注解需要特殊的安全处理。为此，你需要在安全应用上下文 XML 文件中注册以下内容：\n\n\
  ```\n\n当你在应用上下文 XML 配置中设置该定义时，Spring Security 会创建一个新的 `MethodSecurityMetadataSourceAdvisor`\
  \ 并将其注册到应用上下文中。这个 `advisor` 被标记为基础设施顾问，并由 Spring Core 的 `InfrastructureAdvisorAutoProxyCreator`\
  \ 拾取，这是一个 Spring 自动初始化的 `BeanPostProcessor`。它会处理应用上下文中的所有 bean，并判断任何已配置的顾问是否可以应用于某些\
  \ bean 及其方法。如果可以，它就会用所需的顾问包装该 bean。该后处理器找到 `MethodSecurityMetadataSourceAdvisor`，并最终为每个\
  \ bean 及其所有方法调用 `MethodSecurityMetadataSource` 的 `getAttributes` 方法实现，以判断它们是否在元数据中配置了任何\
  \ `ConfigAttribute`。如果 `MethodSecurityMetadataSource` 在 bean 中找到了 `ConfigAttributes`，那么来自\
  \ Spring Core 的 `InfrastructureAdvisorAutoProxyCreator` 会调用其自身的 `createProxy` 方法来应用\
  \ `MethodSecurityMetadataSourceAdvisor`，该顾问内部包含安全拦截器作为 `org.aopalliance.aop.Advice`\
  \ 应用于该 bean。图 4-15 以图形方式展示了这一交互过程。\n\n![../images/310331_2_En_4_Chapter/310331_2_En_4_Fig15_HTML.jpg](img/310331_2_En_4_Fig15_HTML.jpg)\n\
  \n图 4-15\n\n使用安全通知装饰带注解的 bean\n\n乍一看，这就像简单的魔法，但 Spring 为此付出了大量努力。你必须感谢 Spring 和\
  \ Spring Security 的开发人员，他们处理了所有这些细节，并为你提供了一个简单而强大的 API 来解决你的安全问题。\n\n认证对象\n\n`Authentication`\
  \ 对象是一个抽象概念，代表登录到系统的实体——很可能是用户。由于通常是用户进行身份验证，我们假设如此，并在本书的其余部分使用术语“用户”。框架中有几种 `Authentication`\
  \ 对象的实现，如图 4-16 所示。\n\n![../images/310331_2_En_4_Chapter/310331_2_En_4_Fig16_HTML.png](img/310331_2_En_4_Fig16_HTML.png)\n\
  \n图 4-16\n\n`Authentication` 层次结构\n\n`Authentication` 对象既在创建认证请求时（用户登录时）使用，用于在框架的不同层和类之间传递请求数据；也在验证通过后使用，此时它包含已认证的实体并将其存储在\
  \ `SecurityContext` 中。最常见的行为是，当你登录应用程序时，会创建一个新的 `Authentication` 对象，存储你的用户名、密码和权限，这些在技术上分别被称为\
  \ `Principal`、`Credentials` 和 `Authorities`。\n`Authentication` 是一个接口，并且非常简单，如清单\
  \ 4-3 所示。\n\n注意\n`Authentication` 接口有许多实现，在本书中，当我们不关心特定的实现类型时，我们大多数时候会引用通用的 `Authentication`\
  \ 接口。当然，当我们需要讨论某个实现细节的具体内容时，我们会引用具体的类。\n\n```\npackage org.springframework.security.core;\n\
  import java.io.Serializable;\nimport java.security.Principal;\nimport java.util.Collection;\n\
  import org.springframework.security.authentication.AuthenticationManager;\nimport\
  \ org.springframework.security.core.context.SecurityContextHolder;\npublic interface\
  \ Authentication extends Principal, Serializable {\nCollection getAuthorities();\n\
  Object getCredentials();\nObject getDetails();\nObject getPrincipal();\nBoolean\
  \ isAuthenticated();\nVoid setAuthenticated(boolean isAuthenticated) throws IllegalArgumentException;\n\
  }\n清单 4-3\nAuthentication 接口\n```\n\n\n\n如图 4-16 所示，\n目前框架中有几个 `Authentication`\
  \ 的实现：\n\n*   `UsernamePasswordAuthenticationToken`：这是一个简单的实现，顾名思义，它包含了已认证（或待认证）用户的用户名和密码信息。它是整个系统中最常用的\
  \ `Authentication` 实现，因为许多 `AuthenticationProvider` 对象都直接依赖于这个类。\n\n*   `PreAuthenticatedAuthenticationToken`：此实现用于处理预认证的\
  \ `Authentication` 对象。预认证是指实际的认证过程由外部系统处理，而 Spring Security 仅负责从外部系统的消息中提取主体（或用户）信息。\n\
  \n*   `OpenIDAuthenticationToken`：这是一个专门用于 `OpenID` 认证方案的 `Authentication` 实现。它被\
  \ `OpenID` 过滤器和 `OpenID` 认证提供者共同使用。\n\n*   `RunAsUserToken`：此实现由 `RunAsManager`\
  \ 使用。当被访问的资源包含一个以 `RUN_AS_` 前缀开头的 `ConfigAttribute` 时，安全拦截器会调用 `RunAsManager`。如果存在具有此值的\
  \ `ConfigAttribute`，`RunAsManager` 会向已认证用户添加与 `RUN_AS` 值相对应的新 `GrantedAuthorities`。\n\
  \nSecurityContext 和\nSecurityContextHolder\n\n接口 `org.springframework.security.core.context.SecurityContext`\n\
  （实际上，其实现是 `SecurityContextImpl`）是 Spring Security 存储有效 `Authentication` 对象并将其与当前线程关联的地方。`org.springframework.security.core.context.SecurityContextHolder`\n\
  是用于从框架的许多部分访问 `SecurityContext` 的类。它主要由用于存储和访问 `SecurityContext` 的静态方法构成，并将处理此 `SecurityContext`\
  \ 的方式委托给可配置的策略——例如，每个线程一个 `SecurityContext`（默认）、一个全局 `SecurityContext`，或自定义策略。这些类的类图如图\
  \ 4-17 所示，清单 4-4 和 4-5 展示了这两个类。\n\n![../images/310331_2_En_4_Chapter/310331_2_En_4_Fig17_HTML.jpg](img/310331_2_En_4_Fig17_HTML.jpg)\n\
  \n图 4-17\n`SecurityContext` 和\n`SecurityContextHolder`\n\n```\npackage org.springframework.security.core.context;\n\
  import org.springframework.security.core.Authentication;\nimport java.io.Serializable;\n\
  public interface SecurityContext extends Serializable {\nAuthentication getAuthentication();\n\
  void setAuthentication(Authentication authentication);\n}\n清单 4-4\nSecurityContext\
  \ 接口\n```\n\n请注意，整个 `SecurityContextHolder` 的引用可以在 GitHub 上找到，地址为 [`https://github.com/spring-projects/spring-security/blob/master/core/src/main/java/org/springframework/security/core/context/SecurityContext.java`](https://github.com/spring-projects/spring-security/blob/master/core/src/main/java/org/springframework/security/core/context/SecurityContext.java)。\n\
  \n```\npackage org.springframework.security.core.context;\nimport org.springframework.util.ReflectionUtils;\n\
  import java.lang.reflect.Constructor;\npublic class SecurityContextHolder {\npublic\
  \ static final String MODE_THREADLOCAL = \"MODE_THREADLOCAL\";\npublic static final\
  \ String\nMODE_INHERITABLETHREADLOCAL = \"MODE_INHERITABLETHREADLOCAL\";\npublic\
  \ static final String MODE_GLOBAL = \"MODE_GLOBAL\";\npublic static final String\
  \ SYSTEM_PROPERTY = \"spring.security.strategy\";\nprivate static String strategyName\
  \ = System.getProperty(SYSTEM_PROPERTY);\nprivate static SecurityContextHolderStrategy\
  \ strategy;\nprivate static int initializeCount = 0;\nstatic {\ninitialize();\n\
  }\npublic static void clearContext() {\nstrategy.clearContext();\n}\npublic static\
  \ SecurityContext getContext() {\nreturn strategy.getContext();\n}\npublic static\
  \ int getInitializeCount() {\nreturn initializeCount;\n}\nprivate static void initialize()\
  \ {\nif ((strategyName == null) || \"\".equals(strategyName)) {\nstrategyName =\
  \ MODE_THREADLOCAL;\n}\nif (strategyName.equals(MODE_THREADLOCAL)) {\nstrategy =\
  \ new ThreadLocalSecurityContextHolderStrategy();\n} else if (strategyName.equals(MODE_INHERITABLETHREADLOCAL))\
  \ {\nstrategy = new InheritableThreadLocalSecurityContextHolderStrategy();\n} else\
  \ if (strategyName.equals(MODE_GLOBAL)) {\nstrategy = new GlobalSecurityContextHolderStrategy();\n\
  } else {\ntry {\nClass clazz = Class.forName(strategyName);\nConstructor customStrategy\
  \ = clazz.getConstructor();\nstrategy = (SecurityContextHolderStrategy) customStrategy.newInstance();\n\
  } catch (Exception ex) {\nReflectionUtils.handleReflectionException(ex);\n}\n}\n\
  initializeCount++;\n}\npublic static void setContext(SecurityContext context) {\n\
  strategy.setContext(context);\n}\npublic static void setStrategyName(String strategyName)\
  \ {\nSecurityContextHolder.strategyName = strategyName;\ninitialize();\n}\npublic\
  \ static SecurityContextHolderStrategy getContextHolderStrategy() {\nreturn strategy;\n\
  }\npublic static SecurityContext createEmptyContext() {\nreturn strategy.createEmptyContext();\n\
  }\npublic String toString() {\nreturn \"SecurityContextHolder[strategy='\" + strategyName\
  \ + \"'; initializeCount=\" + initializeCount + \"]\";\n}\n}\n清单 4-5\nSecurityContextHolder\
  \ 类\n```\n\nAuthenticationProvider \n`AuthenticationProvider`\n是认证 `Authentication`\
  \ 对象的主要入口点。此接口只有两个方法，如清单 4-6 所示。这是框架的主要扩展点之一，从当前扩展此接口的众多类中可以看出。每个实现类都处理一个特定的外部提供者以进行认证。因此，如果你遇到一个不受支持的特定提供者并且需要对其进行认证，你可能需要实现此接口并提供所需的功能。你将在本书后面看到相关示例。\n\
  \nAuthenticationProvider（见图 4-18）与 AuthenticationManager 非常相似，但它多了一个方法，可用于查询是否支持给定的\
  \ Authentication 类型，如下所示：\n\n```\npublic interface AuthenticationProvider {\nAuthentication\
  \ authenticate(Authentication authentication)\nthrows AuthenticationException;\n\
  boolean supports(Class authentication);\n}\n```\n\n以下是框架自带的一些现有提供者：\n\n![../images/310331_2_En_4_Chapter/310331_2_En_4_Fig18_HTML.jpg](img/310331_2_En_4_Fig18_HTML.jpg)\n\
  \n图 4-18\n`AuthenticationProvider`\n层次结构\n\n```\nCasAuthenticationProvider\nJaasAuthenticationProvider\n\
  DaoAuthenticationProvider\nOpenIDAuthenticationProvider\nRememberMeAuthenticationProvider\n\
  LdapAuthenticationProvider\n```\n\n\n\n完整的 `AuthenticationProvider` 参考文档可在 GitHub\
  \ 上找到，地址为 [`https://github.com/spring-projects/spring-security/blob/master/core/src/main/java/org/springframework/security/authentication/AuthenticationProvider.java`](https://github.com/spring-projects/spring-security/blob/master/core/src/main/java/org/springframework/security/authentication/AuthenticationProvider.java)。\n\
  \n```\npackage org.springframework.security.authentication;\nimport org.springframework.security.core.Authentication;\n\
  import org.springframework.security.core.AuthenticationException;\npublic interface\
  \ AuthenticationProvider {\nAuthentication authenticate(Authentication authentication)\
  \ throws AuthenticationException;\nboolean supports(Class authentication);\n}\n\
  清单 4-6\nAuthenticationProvider 接口\n```\n\nAccessDecisionManager\n`AccessDecisionManager`\
  \ 是负责决定特定 `Authentication` 对象是否被允许访问特定资源的类。在其主要实现中，它委托给 `AccessDecisionVoter` 对象，这些对象基本上将\
  \ `Authentication` 对象中的 `GrantedAuthorities` 与所访问资源所需的 `ConfigAttribute` 进行比较，从而决定是否应授予访问权限。它们会投出允许或拒绝访问的票。`AccessDecisionManager`\
  \ 的实现会考虑投票者的输出，并应用确定的策略来决定是否授予访问权限。不过，投票者也可以选择弃权。\n\n`AccessDecisionManager` 接口可见于清单\
  \ 4-7。其 UML 类图如图 4-19 所示。\n\n![../images/310331_2_En_4_Chapter/310331_2_En_4_Fig19_HTML.png](img/310331_2_En_4_Fig19_HTML.png)\n\
  \n图 4-19\n`AccessDecisionManager` 层次结构\n\n完整的 `AccessDecisionManager` 参考文档可在 GitHub\
  \ 上找到，地址为 [`https://github.com/spring-projects/spring-security/blob/master/core/src/main/java/org/springframework/security/access/AccessDecisionManager.java`](https://github.com/spring-projects/spring-security/blob/master/core/src/main/java/org/springframework/security/access/AccessDecisionManager.java)。\n\
  \n```\npackage org.springframework.security.access;\nimport java.util.Collection;\n\
  import org.springframework.security.authentication.InsufficientAuthenticationException;\n\
  import org.springframework.security.core.Authentication;\npublic interface AccessDecisionManager\
  \ {\nvoid decide(Authentication authentication, Object object, Collection configAttributes)\n\
  throws AccessDeniedException, InsufficientAuthenticationException;\nboolean supports(ConfigAttribute\
  \ attribute);\nboolean supports(Class clazz);\n}\n清单 4-7\nAccessDecisionManager\
  \ 接口\n```\n\n当前的 `AccessDecisionManager` 实现都委托给投票者，但它们的工作方式略有不同。当前在 `org.springframework.security.access.vote`\
  \ 包中定义的投票者将在以下各节中描述。\n\nAffirmativeBased\n此访问决策管理器会调用其所有配置的投票者，如果其中任何一个投票者投票允许访问，则足以让该访问决策管理器允许访问受保护的资源。如果没有投票者投票允许访问，并且至少有一个投票者投票拒绝访问，则访问决策管理器会抛出\
  \ `AccessDeniedException` 拒绝访问。如果只有弃权的投票者，则根据 `AccessDecisionManager` 的实例变量 `allowIfAllAbstainDecisions`\
  \ 做出决定，该变量是一个布尔值，默认为 false，用于确定当所有投票者都弃权时是否应授予访问权限。\n\nConsensusBased\n此访问决策管理器实现会调用其所有配置的投票者，以决定是授予还是拒绝访问资源。与\
  \ `AffirmativeBased` 决策管理器的不同之处在于，`ConsensusBased` 决策管理器仅在投票允许访问的投票者多于投票拒绝访问的投票者时才决定授予访问权限。因此，在这种情况下，多数票获胜。如果允许访问的投票者数量与拒绝访问的投票者数量相同，则使用实例变量\
  \ `allowIfEqualGrantedDeniedDecisions` 的值来决定。默认情况下，此变量的值为 true，并且授予访问权限。当所有投票者都弃权时，访问决策的决定方式与\
  \ `AffirmativeBased` 管理器相同。\n\nUnanimousBased\n正如您可能猜到的，此访问决策管理器仅在所有配置的投票者都投票赞成允许访问资源时，才授予对资源的访问权限。如果有任何投票者投票拒绝访问，则会抛出\
  \ `AccessDeniedException`。“全部弃权”情况的处理方式与 `AccessDecisionManager` 的其他实现相同。\n\nAccessDecisionVoter\n\
  对 `AccessDecisionManager` 及其当前实现的讨论应该已经阐明了访问决策投票者的重要性，因为它们是作为一个团队工作的，最终决定特定 `Authentication`\
  \ 对象是否拥有足够的权限来访问特定资源。`org.springframework.security.access.AccessDecisionVoter` 接口也非常简单，您可以在清单\
  \ 4-8 中看到它。主要方法是 `vote`，从接口可以推断出，它将根据是否满足所需条件返回三种可能的响应之一（`ACCESS_GRANTED`、`ACCES_ABSTAIN`、`ACCESS_DENIED`）。条件是否满足是通过分析\
  \ `Authentication` 对象相对于所需资源的权限来确定的。在实践中，这基本上意味着将 `Authentication` 的权限与资源的安全属性进行比较以寻找匹配项。\n\
  \n以下是当前的 `AccessDecisionVoter` 实现：\n\n*   `org.springframework.security.access.annotation.Jsr250Voter`：此投票者对使用\
  \ `JSR 250` 注解（即 `DenyAll`、`PermitAll` 和 `RolesAllowed`）保护的资源进行投票。这些注解的名称非常具有描述性。`DenyAll`\
  \ 将完全不允许对资源进行任何访问，与尝试访问它的 `Authentication` 对象携带的安全信息无关。`PermitAll` 将允许所有人访问，无论他们拥有什么角色。`RolesAllowed`\
  \ 注解可以配置一系列角色。如果 `Authentication` 对象尝试访问该资源，它必须拥有 `RolesAllowed` 注解中配置的角色之一，才能获得此投票者的访问授权。\n\
  \n*   `org.springframework.security.access.prepost.PreInvocationAuthorizationAdviceVoter`：此投票者对具有基于\
  \ `@PreFilter` 和 `@PreAuthorize` 注解的表达式配置的资源进行投票。`@PreFilter` 和 `@PreAuthorize`\
  \ 注解支持一个 `value` 属性，该属性可以包含 SpEL 表达式。`PreInvocationAuthorizationAdviceVoter` 负责评估这些注解中提供的\
  \ SpEL 表达式（当然，借助 Spring 的 SpEL 评估机制）。我们将在本书的多个部分解释和使用 SpEL 表达式，因此随着本书的深入，这个概念将变得更加清晰。\n\
  \n\n\n*   `org.springframework.security.access.vote.AbstractAclVoter`：\n    这是一个抽象类，提供了编写处理领域\
  \ ACL 规则的投票器的基本框架，以便其他实现类在其功能基础上添加投票行为。目前，它由`AclEntryVoter`实现，该投票器对用户在领域对象上的权限进行投票。本章节将在专门讨论\
  \ ACL 的部分中介绍此投票器。\n\n*   `org.springframework.security.access.vote.AuthenticatedVoter`：\n\
  \    当受保护资源上存在引用三种认证级别中*任意*一种的`ConfigAttribute`时，此投票器就会进行投票。这三种级别分别是`IS_AUTHENTICATED_FULLY`、`IS_AUTHENTICATED_REMEMBERED`和`IS_AUTHENTICATED_ANONYMOUSLY`。如果`Authentication`对象的认证级别与资源中配置的认证级别匹配（或处于更高级别，层级关系为`IS_AUTHENTICATED_FULLY\
  \ > IS_AUTHENTICATED_REMEMBERED > IS_AUTHENTICATED_ANONYMOUSLY`），则投票器投赞成票。\n\n*\
  \   `org.springframework.security.access.vote.RoleVoter`：\n    这可能是所有投票器中最常用的一个。默认情况下，此投票器能够对包含以`ROLE_`前缀开头（该前缀可被覆盖）的安全元数据的`ConfigAttribute`的资源进行投票。当`Authentication`对象尝试访问资源时，其`GrantedAuthorities`会与相关的`ConfigAttributes`进行匹配。如果匹配成功，则授予访问权限；否则，拒绝访问。\n\
  \n*   `org.springframework.security.access.expression.WebExpressionVoter`：\n   \
  \ 此投票器负责评估过滤器链中 Web 请求上下文内的 SpEL 表达式——例如`<intercept-url>`元素中的`'hasRole'`表达式。要使用此投票器，并且通常为了在\
  \ Web 安全中支持 SpEL 表达式，需要在`<http>`元素中添加`the use-expressions=\"true\"`属性。\n\n投票器模型是框架中另一个支持扩展和定制的点。您可以轻松创建自己的实现并将其添加到框架中。您将在第\
  \ 8 章中了解如何操作。\n\n完整的`AccessDecisionVoter`参考文档可在 GitHub 上找到：[`https://github.com/spring-projects/spring-security/blob/master/core/src/main/java/org/springframework/security/access/AccessDecisionVoter.java`](https://github.com/spring-projects/spring-security/blob/master/core/src/main/java/org/springframework/security/access/AccessDecisionVoter.java)。\n\
  \n```\npackage org.springframework.security.access;\nimport java.util.Collection;\n\
  import org.springframework.security.core.Authentication;\npublic interface AccessDecisionVoter\
  \ {\nint ACCESS_GRANTED = 1;\nint ACCESS_ABSTAIN = 0;\nint ACCESS_DENIED = -1;\n\
  boolean supports(ConfigAttribute attribute);\nboolean supports(Class clazz);\nint\
  \ vote(Authentication authentication, S object, Collection attributes);\n}\nListing.\
  \ 4-8\nAccessDecisionVoter Interface\n```\n\nUserDetailsService 和 AuthenticationUserDetailsService\n\
  \n接口`org.springframework.security.core.userdetails.UserDetailsService`负责在认证请求到达应用程序时，从底层用户存储（如内存、数据库等）加载用户信息。`UserDetailsService`利用提供的`user\
  \ name`从数据存储中查找其余所需的用户数据。如清单 4-9 所示，它只定义了一个方法。您可以在图 4-20 中查看其层次结构。\n\n![../images/310331_2_En_4_Chapter/310331_2_En_4_Fig20_HTML.jpg](img/310331_2_En_4_Fig20_HTML.jpg)\n\
  \n图 4-20\n`UserDetailsService`\n层次结构\n\n```\npublic interface UserDetailsService\
  \ {\nUserDetails loadUserByUsername(String username) throws  UsernameNotFoundException;\n\
  }\nListing 4-9\nUserDetailsServicepackage org.springframework.security.core.userdetails\n\
  ```\n\n接口`org.springframework.security.core.userdetails.AuthenticationUserDetailsService`更为通用。它允许您使用`Authentication`对象（而不是`user\
  \ name String`）来检索`UserDetails`，这使得实现更加灵活。实际上，有一个`AuthenticationUserDetailsService`的实现（`UserDetailsByNameServiceWrapper`），它简单地委托给一个`UserDetailsService`，从`Authentication`对象中提取`user\
  \ name`。\n\n清单 4-10 展示了`AuthenticationUserDetailsService`接口。这是在尝试认证时用于检索用户信息的两种主要策略（`AuthenticationUserDetailsService`和`UserDetailsService`）。它们通常由应用程序中使用的特定`AuthenticationProvider`调用。例如，`OpenIDAuthenticationProvider`和`CasAuthenticationProvider`委托给`AuthenticationUserDetailsService`来获取用户详细信息，而`DaoAuthenticationProvider`则直接委托给`UserDetailsService`。其他一些提供者不使用任何类型的用户详细信息服务（例如，`JaasAuthenticationProvider`使用自己的机制从`javax.security.auth.login.LoginContext`检索主体），还有一些则使用完全自定义的服务（例如，`LdapAuthenticationProvider`使用`UserDetailsContextMapper`）。\n\
  \n```\npackage org.springframework.security.core.userdetails;\npublic interface\
  \ AuthenticationUserDetailsService {\nUserDetails loadUserDetails(T token) throws\
  \ UsernameNotFoundException;\n}\nListing 4-10\nAuthenticationUserDetailsService\n\
  ```\n\nUserDetails\n接口`org.springframework.security.core.userdetails.UserDetails`对象是系统中的主要抽象，用于在\
  \ Spring Security 上下文中表示一个完整的用户。它也可以在系统中任何可以访问`SecurityContext`的地方被后续访问。通常，开发人员会创建此接口的自定义实现，以存储他们需要或想要的特定用户详细信息（如电子邮件、电话、地址等）。之后，他们可以访问这些信息，这些信息将被封装在`Authentication\
  \ object`中，并通过调用其`getPrincipal`方法获得。\n\n一些现有的`UserDetailsService`实现（例如`InMemoryUserDetailsManager`）使用框架核心中可用的类`org.springframework.security.core.userdetails.User`作为`loadUserByUsername`方法返回的`UserDetails`实现。然而，这是框架另一个可配置的点，您可以轻松创建自己的`UserDetails\
  \ implementation`并在应用程序中使用它。清单 4-11 展示了`UserDetails`接口。\n\n```\npackage org.springframework.security.core.userdetails;\n\
  import org.springframework.security.core.Authentication;\nimport org.springframework.security.core.GrantedAuthority;\n\
  import java.io.Serializable;\nimport java.util.Collection;\npublic interface UserDetails\
  \ extends Serializable {\nCollection getAuthorities();\nString getPassword();\n\
  String getUsername();\nboolean isAccountNonExpired();\nboolean isAccountNonLocked();\n\
  boolean isCredentialsNonExpired();\nboolean isEnabled();\n}\nListing 4-11\nUserDetails\
  \ Interface\n```\n\n\n\nACL\nACL 是负责在单个领域对象级别以精细粒度保护应用程序安全的模块。这意味着，通常需要为应用程序中的每个领域对象分配一个\
  \ ID，并在这些对象与应用程序的不同用户之间建立关系。这些关系决定了特定用户是否被允许访问特定领域。ACL 模型提供了一种细粒度的访问级别配置，您可以根据尝试访问对象的不同用户来定义不同的访问规则。（例如，一个用户可能被允许读取访问，而另一个用户则对同一个领域对象拥有写入/读取访问权限。）\n\
  当前对 ACL 的支持配置为从关系型数据库中获取配置规则。用于配置数据库的 DDL（数据定义语言）随框架本身一起提供，并且可以在 ACL 模块中找到。\nACL\
  \ 安全性将在第 7 章中全面介绍。\n\nJSP 标签库\n如果您正在致力于保护 Java Web 应用程序的安全，框架的 `taglib` 组件就是您用来根据用户权限隐藏或显示页面中某些元素的工具。\n\
  这些标签使用简单，同时对于创建更易用的网站非常方便。它们帮助您基于每个用户（或更常见的是，基于每个角色）来调整应用程序的用户界面。\n\nSpring Security\
  \ 中的良好设计与模式\n我们之前说过，但这里要重申：使用开源软件的一大优点是，您可以（而且我们说是*您应该*）查看源代码，并在一个全新、更深的层次上理解该软件。此外，您可以观察软件的构建方式，哪些是好的，哪些是坏的（至少根据您自己的主观标准），并学习其他开发者的工作方式。这可能会对您的工作方式产生巨大影响，因为您可能会发现一些仅靠自己无法学到的方法。\n\
  Spring Security 的代码在 GitHub 上公开可用，地址为 [`https://github.com/spring-projects/spring-security`](https://github.com/spring-projects/spring-security)。\n\
  当然，有时您会发现一些不喜欢的部分，但这也有好处。您可以从别人的错误中学习，就像从他们的成功中学习一样。\n对我们来说，Spring 整体上，特别是 Spring\
  \ Security，在 Java 开发领域实现了一些我们认为非常宝贵的东西——那就是，它们甚至可以在我们毫无察觉的情况下，让我们成为更好的开发者。例如，我们经常问自己：“如果没有使用\
  \ Spring，有多少人会使用模板模式来访问数据库，而不是使用更笨拙的数据库访问层？”或者“如果不是因为 Spring 的依赖注入支持，有多少人会一直针对实现类编程，从而造成不必要的耦合？”或者“如果不是因为\
  \ Spring 如此轻松地将 AOP 引入开发过程，有多少人会将横切关注点（如事务）分散在整个代码库中？”\n我们认为，在几乎不被察觉的情况下帮助推广良好实践，确实是\
  \ Spring 的一大成就。它本身当然不会造就伟大的开发者，但它能帮助普通开发者避免那些在没有框架及其原则支持时可能会犯的错误。\n正如您从框架主要组件的描述中可能看到的，Spring\
  \ Security 本身也是本着良好的设计原则和模式构建的。让我们在这里简要看看框架中一些我们认为有趣且值得学习的地方。\n本节实际上不会帮助您更好地使用 Spring\
  \ Security，但它将作为一种方式来欣赏在构建这个出色框架时所完成的优秀工作。\n\n策略模式\n框架的可插拔性和模块化在很大程度上归功于策略模式的广泛使用。例如，您可以在要使用的\
  \ `SecurityContext` 类型、`AuthenticationProvider` 层次结构、`AccessDecisionVoters` 以及许多其他元素中找到它。涵盖设计模式超出了本书的范围，但作为对策略模式强大功能的提醒，我们为您留下维基百科中的这个定义：“策略模式定义了一系列算法，封装了每一个算法，并使它们可以互换。策略让算法独立于使用它的客户端而变化。”\n\
  这个定义充分展示了使用接口所带来的强大功能。您可以为同一个接口提供不同的实现，并将其中任何一个传递给客户端类以执行不同类型的工作。客户端类无需知道或关心它们正在使用的实现细节。了解接口或契约就足以完成其工作。\n\
  \n装饰器模式\n内置于 Spring 核心 AOP 框架中，您可以找到装饰器模式——主要体现在您带有注解的业务类和方法如何应用安全约束。基本上，您的对象只包含一些与应应用于它们的安全约束相关的元信息，然后通过某种“Spring\
  \ 魔法”，它们被包装了安全处理逻辑。清单 4-12 展示了 `MethodSecurityInterceptor` 的 invoke 方法。\n在清单中，您可以看到对象是如何被装饰以围绕实际方法调用的前置功能和后置功能的。\n\
  \n```\npublic Object invoke(MethodInvocation mi) throws Throwable {\nInterceptorStatusToken\
  \ token = super.beforeInvocation(mi);\nObject result = mi.proceed();\nreturnsuper.afterInvocation(token,\
  \ result);\n}\n清单 4-12\nMethodSecurityInterceptor 的 invoke 方法\n```\n\n单一职责原则\nSpring\
  \ Security 的代码似乎非常认真地对待单一职责原则。框架中有很多这样的例子，因为您选择的任何对象似乎都只有一个且唯一的职责。例如，`AuthenticationProvider`\
  \ 只处理使用其凭证在系统中认证主体的通用关注点。`SecurityInterceptor` 仅负责拦截请求，并将所有安全检查逻辑委托给协作对象。从框架中可以提取出更多类似的例子。\n\
  \n依赖注入\n同样，这内置于 Spring 框架本身，并且当然，作为 Spring 架构中的一切，这意味着它也被 Spring 的其他项目（包括 Spring\
  \ Security）所继承。依赖注入（DI）是 Spring 最重要的特性之一。Spring Security 中几乎每个组件都是通过使用依赖注入来配置的。`AccessDecisionManager`\
  \ 被注入到 `AbstractSecurityInterceptor` 中，而 `AccessDecisionVoter` 实现被注入到 `AccessDecisionManager`\
  \ 中。如此这般，框架的大部分内容都是通过依赖注入将组件组合在一起构建的。\n\n\n\n本章小结\n本章内容较为复杂，但深入探究软件工具的内部运作机制，无疑是理解并善用它的最佳途径。而这正是你所做的。你深入了解了\
  \ Spring Security 的架构、其主要组件以及其内部工作原理。\n\n现在，你应该已经理解了 XML 命名空间的工作方式、AOP 如何融入框架，以及\
  \ Servlet Filter 功能通常如何用于实施 Web 层安全。\n\n我们通过逐一剖析那些看似简单、却能帮助你为应用程序添加安全性的所有组件，揭开了“Spring\
  \ 魔法”的神秘面纱。\n\n你查看了框架本身的一些代码片段，以便更深入地理解其内部工作，并更好地理解事物为何如此运作。\n\n你还研究了框架固有的模块化特性，并看到了它如何有助于创建既灵活又可扩展的软件。\n\
  \n尽管本章涵盖了所有这些内容，但这基本上只是一个介绍和参考，供你在阅读后续章节并开始研究保护应用程序的选项时随时查阅。从现在开始，你将理解每个组件在框架中的位置，以及不同组件之间如何相互关联。\n\
  \n在下一章中，你将开始开发一个示例应用程序。起初，它将是一个简单的 Web 应用程序，你将学习如何保护它。你将运用当前所学的所有框架知识来调整配置，并测试在\
  \ Web 层实现安全性的不同方法。\n\n5. Web 安全\n\n在本章中，我们将继续讲解如何为你从第 3 章开始创建的基于 Java 的 Web 应用程序在\
  \ Web 层应用安全性。你将详细了解安全过滤器链的内部工作原理，以及可用于在应用程序中定义安全约束的不同元数据选项。我们还将详细解释用于在视图层实施安全约束的\
  \ taglib 工具，该工具也在第 3 章中介绍过。\n\n介绍简单示例应用程序\n在本章中，你将处理一个名为 `favoritesmovies` 的简单测试\
  \ Web 应用程序。该应用程序本身将非常简单（它不会有任何真正有用的功能）。但是，我们将尝试涵盖使用 Spring Security 保护 Web 应用程序的大多数可用选项，即使其中某些选项对于此类应用程序来说似乎不太现实。\n\
  \n首先，你将设置应用程序。与第 3 章一样，你将创建一个 Java Web 应用程序，并包含 Maven 作为框架。同样，你将假定所需不同工具的特定版本。主要地，你将像在第\
  \ 3 章中那样使用 Java 11 和 Maven 3.6.0。\n\n如图 5-1 所示创建项目。\n\n![../images/310331_2_En_5_Chapter/310331_2_En_5_Fig1_HTML.jpg](img/310331_2_En_5_Fig1_HTML.jpg)\n\
