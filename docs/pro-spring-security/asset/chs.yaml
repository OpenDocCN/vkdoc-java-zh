  \n图 6-21\n客户端证书命令\n\n在执行最后一步时，当命令行提示您输入名称时，务必使用名称 `nardone`，因为这是您在应用程序配置文件中配置的用户名。命令行将显示以下提示：\n\
  *通用名称（例如服务器 FQDN 或您的名称）[]:**nardone***\n就是这样！该过程创建了一个自签名的 X509 证书，有效期为 365 天，并使用私钥进行签名。\n\
  \n注意\n信任库\n是一个证书存储库，使用该信任库的 JRE 会信任其中的证书。默认情况下，JRE 信任库信任任何由公认证书颁发机构（CA）签名的证书。如果您拥有一个非\
  \ CA 签名的证书（例如自签名证书），则需要手动将其添加到信任库中，以便其能够被信任。\n\n该文件的执行过程如图 6-23 所示。这一行简单的命令创建了文件\
  \ `trustStore.jks`，您将把它用作 Tomcat 服务器的信任库，以接受客户端证书。\n\n![../images/310331_2_En_6_Chapter/310331_2_En_6_Fig23_HTML.jpg](img/310331_2_En_6_Fig23_HTML.jpg)\n\
  \n图 6-23\n通过导入证书创建的信任库\n\n接下来，您需要将证书添加到用于连接应用程序的浏览器中。本示例中使用 Chrome。之前您创建了 `.p12`\
  \ 文件，其中包含客户端和服务器证书的信息，以及与这两个证书关联的私钥。\n\n要将该文件导入 Chrome 的客户端证书中，请执行以下操作：\n\n1.  点击\
  \ Chrome ➤ 设置。\n\n2.  点击“高级”选项卡。\n\n3.  点击“管理证书”。\n\n4.  点击“导入”。\n\n5.  找到存储 `client_nardone.p12`\
  \ 的目录，然后双击该文件。\n\n6.  当提示输入密码时，使用 **changeit**。\n\n结果如图 6-24 所示。\n\n![../images/310331_2_En_6_Chapter/310331_2_En_6_Fig24_HTML.jpg](img/310331_2_En_6_Fig24_HTML.jpg)\n\
