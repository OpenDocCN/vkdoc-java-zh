  '
- "# 1. 安全范围\n\n安全。在 IT 世界中，这是一个含义极其丰富的词。它在众多不同的语境中意味着许多不同的事物，但归根结底，它关乎保护敏感且有价值的资源免受恶意使用。\n\
  \n在 IT 领域，我们拥有多层可能遭受恶意攻击的基础设施和代码，可以说，我们应该确保所有这些层级都获得适当级别的保护。\n\n当然，互联网的发展以及我们通过应用程序触达更多用户的追求，为试图以非法方式访问这些应用程序的网络犯罪分子打开了越来越多的大门。\n\
  \n同样真实的是，我们并不总能确保向公众提供一套经过妥善保护的服务。而且有时，即使我们采取了良好的防护措施，一些黑客仍然足够聪明，能够攻破那些表面上看似足够的安全屏障。\n\
  \n第一步是定义纵深防御（DiD）及其安全层级。通常，纵深防御是一种通过定义所有防御机制如何分层来保护数据和信息安全，从而制定 IT 基础设施网络安全策略的方法。纵深防御的失效或开发过于薄弱，可能导致针对\
  \ IT 基础设施的网络安全攻击。\n\n让我们更深入地了解纵深防御的机制部分。首先，纵深防御由三大控制措施组成：\n\n*   **管理控制**：策略、流程、指南、意识培训计划等。\n\
  *   **技术控制**：防火墙、防病毒软件、入侵防御系统（IPS）等。\n*   **物理控制**：网络和服务器机房、视频监控等。\n\n图 1-1 展示了定义\
  \ IT 基础设施安全层级的典型纵深防御机制。\n\n![../images/310331_2_En_1_Chapter/310331_2_En_1_Fig1_HTML.jpg](img/310331_2_En_1_Fig1_HTML.jpg)\n\
  \n图 1-1\n纵深防御机制与 IT 基础设施层级\n\nIT 基础设施中的三个主要安全层级是：网络层、操作系统层（属于端点安全层的一部分）以及应用程序层本身。\n\
  \n## 网络安全层\n\n网络安全层可能是 IT 世界中最为人熟知的一层。当人们谈论 IT 安全时，他们通常会想到网络层面的安全——特别是使用防火墙的安全。\n\
  \n尽管人们常常将安全与网络层面联系起来，但这仅仅是针对攻击者的一层非常有限的防护。一般来说，它最多只能防御 IP 地址，并过滤发往网络中特定机器上特定端口的网络数据包。\n\
  \n在绝大多数情况下，这显然是不够的，因为此层级的流量通常被允许无限制地进入你各种暴露服务的公共开放端口。不同的攻击可能针对这些开放服务，因为攻击者可以执行任意命令，从而破坏你的安全约束。有一些工具，比如流行的\
  \ `nmap` ([`http://nmap.org/`](http://nmap.org/))，可以用来扫描机器以发现开放端口。使用此类工具是准备攻击时简单易行的第一步，因为如果这些开放端口没有得到妥善保护，就可以利用众所周知的攻击手段对其进行攻击。\n\
  \n对于 Web 应用程序而言，网络安全层一个非常重要的部分是使用安全套接字层（SSL）来加密所有通过网络传输的敏感信息，但这更多与应用程序层面的网络协议相关，而非防火墙所运行的物理网络层面。\n\
  \n## 操作系统层\n\n操作系统层可能是整个安全架构中最重要的一个，因为一个妥善保护的操作系统环境，至少可以在某个特定应用程序被攻破时，防止整台主机宕机。\n\
  \n如果攻击者以某种方式获得了对操作系统的非安全访问，他们基本上可以为所欲为——从传播病毒、窃取密码，到删除你整个服务器的数据使其无法使用。更糟糕的是，他们甚至可能在你毫无察觉的情况下控制你的计算机，并将其用作僵尸网络的一部分来执行其他恶意行为。这一层可以包括应用程序的部署模型，因为你需要了解操作系统的权限方案，以确保不会赋予你的应用程序不必要的机器权限。应用程序应尽可能与主机上的其他组件隔离运行。\n\
  \n## 应用程序层\n\n本书的主要焦点将是应用程序层。应用程序安全层指的是我们在应用程序中建立的所有约束，以确保只有合适的人在使用应用程序时才能做正确的事情。\n\
  \n默认情况下，应用程序对无数攻击途径是开放的。一个保护不当的应用程序可能允许攻击者从应用程序中窃取信息、冒充其他用户、执行受限操作、破坏数据、获取操作系统级别的访问权限，以及执行许多其他恶意行为。\n\
  \n在本书中，我们将介绍应用程序级别的安全，这是 Spring Security 的领域。应用程序级别的安全是通过实施多种技术来实现的，并且有几个概念将帮助你更好地理解本书后续内容。这些是\
  \ Spring Security 为解决的主要问题，旨在为你的应用程序提供全面的威胁防护。在接下来的三个小节中，我们将介绍：\n\n*   认证\n*   授权\n\
  *   ACL（访问控制列表）\n\n### 认证\n\n认证过程允许应用程序验证某个特定用户是否为其所声称的身份。在认证过程中，用户向应用程序提供只有她自己知道的信息（通常是用户名和密码）。应用程序获取这些信息，并尝试将其与存储的信息进行匹配——通常存储在数据库或\
  \ LDAP^(¹)（轻量级目录访问协议）服务器中。如果用户提供的信息与认证服务器中的记录匹配，则该用户在系统中成功通过认证。应用程序通常会在系统中创建一个内部抽象来表示这个已认证的用户。图\
  \ 1-2 展示了认证机制。\n\n![../images/310331_2_En_1_Chapter/310331_2_En_1_Fig2_HTML.jpg](img/310331_2_En_1_Fig2_HTML.jpg)\n\
  \n图 1-2\n简单、标准的认证机制\n\n### 授权\n\n当用户通过认证时，这仅意味着该用户是系统已知的并且已被系统识别。这并不意味着该用户可以在该系统中为所欲为。保护应用程序安全的下一步逻辑是确定允许用户执行哪些操作，以及她有权访问哪些资源，并确保如果用户没有适当的权限，她就无法执行该特定操作。这就是授权过程的工作。在大多数情况下，授权过程会将用户的权限集与在应用程序中执行特定操作所需的权限进行比较，如果匹配，则授予访问权限。另一方面，如果不匹配，则拒绝访问。图\
  \ 1-3 展示了授权机制。\n\n![../images/310331_2_En_1_Chapter/310331_2_En_1_Fig3_HTML.jpg](img/310331_2_En_1_Fig3_HTML.jpg)\n\
  \n图 1-3\n简单的授权过程。已认证的用户尝试访问受保护的资源\n\n\n\n### 访问控制列表\n\n访问控制列表（ACL）是上一节所述授权过程的一部分。关键区别在于，ACL\
  \ 通常在应用程序中以更细粒度的级别工作。ACL 仅仅是资源、用户和权限之间映射关系的集合。通过 ACL，你可以建立诸如“用户 John 对博客文章 X 拥有管理权限”或“用户\
  \ Luis 对博客文章 X 拥有读取权限”之类的规则。你可以看到三个要素：用户、权限和资源。图 1-3 展示了 ACL 的工作原理；它们只是通用授权过程的一个特例。\n\
  \n## 身份验证与授权：基本概念\n\n在本节中，我们将介绍并解释一些基本的安全概念，你在本书后续部分会经常遇到它们：\n\n*   **用户**：保护系统免受恶意攻击者侵害的第一步是识别合法用户并仅允许他们访问。系统中会创建用户抽象并赋予其独立身份。这些用户就是之后被允许使用系统的人。\n\
  \n*   **凭证**：凭证是用户证明自己身份的方式。通常以密码的形式出现（证书也是提供凭证的常见方式），它们是只有其所有者才知道的数据。\n\n*   **角色**：在应用程序安全上下文中，角色可以被视为用户的逻辑分组。进行这种逻辑分组通常是为了让分组后的用户在应用程序中共享一组访问特定资源的权限。例如，所有拥有管理员角色的用户将对相同资源拥有相同的访问权限。角色仅仅是一种将权限分组以执行特定操作的方式，使得拥有这些角色的用户继承这些权限。\n\
  \n*   **资源**：在此上下文中，*资源* 指的是我们想要访问的、并且需要妥善保护以防止未授权访问的应用程序的任何部分——例如，一个 URL、一个业务方法或一个特定的业务对象。\n\
  \n*   **权限**：权限指的是访问特定资源所需的访问级别。例如，可能允许两个用户读取某个特定文档，但只允许其中一人对其进行写入。权限可以应用于单个用户，也可以应用于共享特定角色的用户。\n\
  \n*   **加密**：这允许你对敏感信息（通常是密码，但也可能是其他内容，如 cookies）进行加密，即使攻击者获得了加密版本，也无法理解其内容。其理念是，你永远不要存储密码的明文版本，而是存储加密版本，这样除了密码所有者之外，没有人知道原始密码。主要有三种加密算法：\n\
  \    *   **单向加密**：这些算法被称为*哈希算法*，它们接收一个输入字符串并生成一个称为*消息摘要*的输出数字。这个输出数字无法转换回原始字符串。这就是该技术被称为*单向加密*的原因。使用方法如下：请求客户端加密一个字符串并将加密后的字符串发送给服务器。例如，服务器可能通过之前的注册过程拥有原始信息，如果有，它可以对原始信息应用相同的哈希函数。然后它将哈希运算的输出与客户端发送的值进行比较。如果匹配，服务器就验证该信息。图\
  \ 1-4 展示了这一方案。通常，服务器甚至不需要原始数据。它可以简单地存储哈希版本，然后将其与客户端传入的哈希值进行比较。\n\n![../images/310331_2_En_1_Chapter/310331_2_En_1_Fig4_HTML.jpg](img/310331_2_En_1_Fig4_HTML.jpg)\n\
  \n图 1-4\n\n单向加密或哈希\n\n*   **对称加密**：这些算法提供两种功能：加密和解密。一段文本字符串被转换成加密形式，然后可以再转换回原始字符串。在这种方案中，发送方和接收方共享相同的密钥，以便他们可以在通信的两端加密和解密消息。这种方案的一个问题是如何在通信端点之间共享密钥。一种常见的方法是使用并行的安全通道来发送密钥。图\
  \ 1-5 展示了对称加密的工作原理。\n\n![../images/310331_2_En_1_Chapter/310331_2_En_1_Fig5_HTML.jpg](img/310331_2_En_1_Fig5_HTML.jpg)\n\
  \n图 1-5\n\n对称加密。两个端点共享相同的加密/解密密钥\n\n*   **公钥密码学**：这些技术基于非对称密码学。在这种方案中，用于加密和解密的密钥是不同的。这两个密钥分别被称为*公钥*（用于加密消息）和*私钥*（用于解密消息）。与对称加密相比，这种方法的好处是不需要共享解密密钥，因此除了信息的预期接收者之外，没有人能够解密消息。所以通常的场景如下：\n\
  \    *   消息的预期接收者将她的公钥分享给所有有兴趣向她发送信息的人。\n\n*   发送方使用接收方的公钥加密信息，并发送消息。\n\n*   接收方使用她的私钥解密消息。\n\
  \n*   没有其他人能够解密消息，因为他们没有接收方的私钥。\n\n图 1-6 展示了公钥密码学方案。\n\n![../images/310331_2_En_1_Chapter/310331_2_En_1_Fig6_HTML.jpg](img/310331_2_En_1_Fig6_HTML.jpg)\n\
  \n图 1-6\n\n公钥密码学\n\n加密的使用，除了其他方面，还实现了另外两个安全目标：\n\n*   **机密性**：属于某个用户或用户组的潜在敏感信息，应仅能由该用户或用户组访问。加密算法是实现此目标的主要帮手。\n\
  \n*   **完整性**：由合法用户发送的数据，在传输到服务器的途中或在其存储过程中，不应被第三方篡改。这通常通过使用单向加密算法来实现，这些算法使得几乎不可能在篡改输入后产生一个损坏的消息，同时其加密哈希值与原始消息相同（从而欺骗接收者认为它是有效的）。\n\
  \n\n\n## 需要保护的内容\n\n并非应用程序的每个部分都需要强大的安全模型，甚至根本不需要任何安全措施。例如，如果你的应用程序某部分旨在为所有感兴趣的用户提供静态内容，那么直接提供这些内容即可。这里可能没有任何需要处理的安全问题。\n\
  \n不过，在开始开发一个新应用时，你应该思考该应用将面临的安全约束。你需要考虑以下列表中的问题，并判断它们是否适用于你的特定用例：\n\n*   **身份管理**：你的应用程序很可能需要为使用它的不同用户建立身份。通常，应用程序会为不同用户提供不同功能，因此你需要一种方法将用户与特定功能关联起来。同时，你还必须确保保护每个用户的身份信息，使其不被泄露。\n\
  \n*   **安全连接**：在互联网环境中，世界上任何人都可能访问你的系统，并窃听其他用户访问你系统的行为。因此，你很可能需要使用某种传输层安全协议（如 SSL）来保护敏感数据的通信。\n\
  \n*   **敏感数据保护**：敏感数据需要受到保护，以防恶意攻击。这适用于通信层、单个消息传输以及凭证数据存储。应在不同层面使用加密技术，以实现尽可能安全的应用程序。\n\
  \n## 更多安全问题\n\n除了上述问题，还有许多其他安全问题。由于这是一本关于 Spring Security 的书，而非通用的应用安全书籍，我们将只涵盖与\
  \ Spring Security 相关的内容。但我们认为，让你明白除了 Spring Security 直接解决的问题之外，还存在更多安全问题，这一点很重要。以下是一些最常见问题的快速概述。这仅旨在让你意识到它们的存在，我们建议你查阅其他资料（例如通用的软件安全教科书），以更好地理解所有这些安全问题。\n\
  \n*   **SQL（及其他代码）注入**：验证用户输入是应用安全中非常重要的一部分。如果数据未经验证，攻击者可能会将任意字符串作为输入（包括 SQL 或服务器端代码）并发送到服务器。如果服务器代码编写不当，攻击者可能会造成严重破坏，因为她可以在服务器上执行任意代码。\n\
  \n*   **拒绝服务攻击**：此类攻击旨在使目标系统对其预期用户无响应。通常通过向服务器发送大量请求来耗尽服务器所有资源，使其无法响应合法请求。\n\n*\
  \   **跨站脚本攻击与输出清理**：这是一种以应用程序客户端部分为目标的注入方式。其思路是攻击者可以使应用程序在返回的网页中包含恶意代码，从而在用户浏览器中执行该代码。这样，攻击者就可以利用真实用户的已认证会话，在用户不知情的情况下执行操作。\n\
  \n## Java 安全选项\n\nJava 和 Java EE 开箱即用的安全解决方案非常全面。它们涵盖了从底层权限系统、加密 API 到身份验证和授权方案等多个领域。\n\
  \nJava 提供的安全 API 列表非常广泛，以下列出了主要的几个：\n\n*   **Java 加密体系结构 (JCA)**：此 API 提供对加密算法的支持，包括哈希摘要和数字签名支持。\n\
  \n*   **Java 加密扩展 (JCE)**：此 API 主要提供字符串加密和解密的功能，以及为对称算法生成密钥的功能。\n\n*   **Java 证书路径\
  \ API (CertPath)**：此 API 提供了全面的功能，用于将数字证书的验证和校验集成到应用程序中。\n\n*   **Java 安全套接字扩展 (JSSE)**：此\
  \ API 提供了一套标准化的功能，用于在 Java 中支持客户端和服务器端的 SSL 和 TLS 协议。\n\n*   **Java 身份验证和授权服务 (JAAS)**：此\
  \ API 为 Java 应用程序提供身份验证和授权服务。它提供了一个可插拔的系统，身份验证机制可以独立地插入到应用程序中。\n\n请参考此链接获取 Java\
  \ 11 安全 API 的完整列表：[`https://docs.oracle.com/en/java/javase/11/security/java-security-overview1.html#GUID-2EF0B3B8-9F3A-41CF-A7DA-63DB52180084`](https://docs.oracle.com/en/java/javase/11/security/java-security-overview1.html%2523GUID-2EF0B3B8-9F3A-41CF-A7DA-63DB52180084)。\n\
  \n图 1-7 展示了 Java 平台安全架构和元素。\n\n![../images/310331_2_En_1_Chapter/310331_2_En_1_Fig7_HTML.jpg](img/310331_2_En_1_Fig7_HTML.jpg)\n\
  \n图 1-7\n\nJava 平台安全架构和元素\n\nSpring Security 的主要关注点在于身份验证/授权领域。因此，它主要与 JAAS Java\
  \ API 重叠，尽管它们可以一起使用，正如你将在本书后面看到的那样。Spring Security 中利用了大多数其他 API。例如，`CertPath` 用于\
  \ `X509AuthenticationFilter`，`JCE` 用于 `spring-security-crypto` 模块。\n\n## 总结\n\n\
  在本章中，我们从一般安全角度出发，深入介绍了纵深防御 (DiD) 及其机制。我们以非常抽象的方式解释了 IT 安全中的主要关注点，特别是从应用程序的角度。我们还非常简要地描述了在不同层面支持安全性的主要\
  \ Java API。\n\n你可以看到，本章是对安全问题的一个非常快速的概述。在通用主题上深入探讨超出了本书的范围，尽管当某些主题适用于 Spring Security\
  \ 时，我们会更深入地研究它们。显然，这并非一本全面的软件安全指南，如果你有兴趣了解更多关于软件安全的一般知识，应查阅专业文献。下一章将正式介绍 Spring\
  \ Security。\n\n脚注 1\n\n"
- "# 2.  Spring Security 简介\n\n在本章中，你将了解什么是 Spring Security，以及如何使用它来解决应用程序的安全问题。\n\
  \n我们还将描述 Spring Framework 和 Spring Security 5 版本中的新特性。由于本书将大量使用 Spring Security\
  \ 5 进行身份验证和授权，因此我们将更详细地介绍如何使用它。\n\n最后，我们将查看框架的源代码，了解如何构建它，以及构成强大 Spring Security\
  \ 项目的不同模块。\n\n\n## 什么是 Spring Security？\n\nSpring Security 是一个致力于以开发者友好且灵活的方式，为\
  \ Java 应用程序提供全套安全服务的框架。它遵循 Spring 框架引入的成熟实践。Spring Security 试图解决应用程序内部所有层级的安全问题。此外，它还附带大量配置选项，使其非常灵活且强大。\n\
  \n回顾第 1 章，可以说 Spring Security 只是一个构建在 Spring 框架之上的综合性认证/授权框架。尽管使用该框架的大多数应用程序都是基于\
  \ Web 的，但 Spring Security 的核心也可以用于独立应用程序。\n\n许多特性使得 Spring Security 对 Java 开发者具有立竿见影的吸引力。仅举几例，请考虑以下列表：\n\
  \n*   **它构建在成功的** **Spring 框架** **之上。** 这是 Spring Security 的一个重要优势。Spring 框架已成为构建企业级\
  \ Java 应用程序的“标准方式”，并且理由充分。它围绕良好实践以及两个简单而强大的概念构建：依赖注入（DI）和面向切面编程（AOP）。同样重要的是，许多开发者拥有\
  \ Spring 经验，因此他们可以在项目中引入 Spring Security 时利用这些经验。\n\n*   **它为多种认证模型提供开箱即用的支持。**\
  \ 比上一点更重要的是，Spring Security 支持与轻量级目录访问协议（LDAP）、OpenID、表单认证、X.509 证书认证、数据库认证、Jasypt\
  \ 加密等众多技术的开箱即用集成。所有这些支持意味着 Spring Security 能够适应您的安全需求——不仅如此，如果您的需求发生变化，它也能轻松改变，而无需开发者付出太多努力。有关\
  \ Jasypt 加密的更多信息，请访问 [`www.jasypt.org/`](http://www.jasypt.org/)。\n\n从业务角度来看，这一点也很重要，因为应用程序既可以适应企业认证服务，也可以实现自己的认证服务，只需进行简单的配置更改即可。\n\
  \n这也意味着您需要编写的软件少得多，因为您正在使用大量由庞大且活跃的用户社区编写和测试的现成代码。在某种程度上，您可以信任这些代码能够正常工作并放心使用。如果它确实不起作用，您也可以随时修复它，并向项目维护者发送补丁。\n\
  \n*   **它提供** **分层安全服务。** Spring Security 允许您在不同级别保护应用程序，并保护您的 Web URL、视图、服务方法和领域模型。您可以挑选并组合这些功能来实现您的安全目标。\n\
  \n这在实践中非常灵活。例如，假设您通过 RMI、Web、JMS 等方式提供服务。您可以保护所有这些接口，但也许更好的做法是只保护业务层，这样所有请求在到达该层时都得到保护。此外，也许您不关心保护单个业务对象，因此您可以省略该模块，只使用您需要的功能。\n\
  \n*   **它是** **开源软件。** 作为 Pivotal 产品组合的一部分，Spring Security 是一个开源软件工具。它还有一个致力于测试和改进该框架的大型社区和用户群。有机会使用开源软件对大多数开发者来说是一个有吸引力的特性。能够查看您喜欢并使用的工具的源代码是一个令人兴奋的前景。无论我们的目标是改进工具，还是仅仅了解它们内部的工作原理，我们开发者都喜欢阅读代码并从中学习。\n\
  \n## Spring Security 适用于何处？\n\nSpring Security 无疑是一个强大且多功能的工具。但与其他任何工具一样，它并非能适应您想做的所有事情。它的功能有明确的适用范围。\n\
  \n您会在何处以及为何使用 Spring Security？以下是一些原因和场景列表：\n\n*   **您的应用程序使用 Java、Groovy 或 Kotlin。**\
  \ 首先要考虑的是，Spring Security 可以用 Java、Groovy 或 Kotlin 等语言编写，通常也适用于 JVM 支持的任何语言。因此，如果您计划使用非\
  \ JVM 语言，Spring Security 对您将毫无用处。\n\n*   **您需要** **基于角色的认证/授权。** 这是 Spring Security\
  \ 的主要用例。您有一个用户列表，以及一个资源列表和这些资源上的操作列表。您将用户分组为角色，并允许特定角色访问特定资源上的特定操作。这就是核心功能。\n\n\
  *   **您想要保护** **Web 应用程序** **免受恶意用户攻击。** 如前所述，Spring Security 主要用于 Web 应用程序环境。在这种情况下，首先要做的是只允许您希望访问应用程序的用户访问，同时禁止所有其他用户甚至接触它。\n\
  \n*   **您需要与** **OpenID** **、** **LDAP** **、** **Active Directory** **和** **数据库**\
  \ **作为安全提供者集成。** 如果您需要与特定的用户和角色或组提供者集成，您应该查看 Spring Security 提供的众多选项，因为集成可能已经为您实现，从而避免您编写大量不必要的代码。有时您可能不确定您的业务需要哪个提供者进行认证。在这种情况下，Spring\
  \ Security 通过允许您以无痛的方式在不同提供者之间切换，让您的生活变得轻松。\n\n*   **您需要保护您的** **领域模型** **，并只允许特定用户访问应用程序中的特定对象。**\
  \ 如果您需要细粒度的安全性（即，您需要基于每个对象、每个用户进行保护），Spring Security 提供了访问控制列表（ACL）模块，这将帮助您以直接的方式实现这一点。\n\
  \n*   **您希望以一种非侵入式、声明性的** **方式为您的应用程序添加安全性。** 安全性是一个横切关注点，而不是您应用程序的核心业务功能（除非您在安全提供商公司工作）。因此，最好将其视为一个独立的、模块化的附加组件，您可以独立于主要业务关注点来声明、配置和管理它。Spring\
  \ Security 正是基于此理念构建的。通过使用 Servlet 过滤器、XML 配置和 AOP 概念，该框架力求不使安全规则污染您的应用程序。即使使用注解，它们也只是代码之上的元数据。它们不会干扰您的代码逻辑。作为\
  \ Java 开发者，您必须尝试将 Java 配置隔离到一个配置库中，并以类似于处理 XML 的方式将其与应用程序的其余部分解耦。\n\n*   **您希望以保护\
  \ URL 的相同方式来保护您的** **服务层** **，并且需要在方法级别添加规则以允许或禁止用户访问。** Spring Security 允许您在应用程序的各层中使用一致的安全模型，因为它内部强制实施了这种一致的模型。您只需在一个地方配置用户、角色和提供者，服务层和\
  \ Web 层都会以透明的方式利用这个集中式的安全配置。\n\n\n\n*   **您需要应用程序在用户下次访问时记住他们，并允许他们访问。** 有时，您不希望或不需要应用程序的用户每次访问您的网站时都登录。Spring\
  \ 提供了开箱即用的“记住我”功能，以便用户在后续访问您的网站时可以自动登录，从而允许他们完全或部分访问其个人资料的功能。\n\n*   **您希望使用公钥/私钥证书来对您的应用程序进行身份验证。**\
  \ Spring Security 允许您使用 X.509 证书来验证服务器的身份。服务器也可以向客户端请求有效证书，以建立相互认证。\n\n*   **您需要向某些用户隐藏网页中的元素，并向其他用户显示这些元素。**\
  \ 视图安全是安全 Web 应用程序中的第一层安全。它通常不足以保证安全，但从可用性的角度来看非常重要，因为它允许应用程序根据当前登录系统的用户来显示或隐藏内容。\n\
  \n*   **对于您的应用程序，您需要比简单的基于角色的身份验证更灵活的方式。** 例如，假设您希望仅允许 18 岁以上的用户使用简单的脚本表达式进行访问。Spring\
  \ Security 3.1 使用 Spring 表达式语言 (SpEL) 允许您自定义应用程序的访问规则。\n\n*   **您希望您的应用程序自动处理与授权错误相关的\
  \ HTTP 状态码（401、403 等）。** Spring Security 为 Web 应用程序内置的异常处理机制会自动将更常见的异常转换为相应的 HTTP\
  \ 状态码；例如，`AccessDeniedException` 会被转换为 `403` 状态码。\n\n*   **您希望配置您的应用程序以供其他应用程序（而非浏览器）使用，并允许这些其他应用程序对您的应用程序进行身份验证。**\
  \ 访问您应用程序的其他应用程序应被强制使用身份验证机制才能获得访问权限。例如，您可以通过 REST 端点公开您的应用程序，其他应用程序可以使用 HTTP 安全性访问这些端点。\n\
  \n*   **您在 Java EE 服务器之外运行应用程序。** 如果您在像 Apache Tomcat 这样的简单 Web 容器中运行应用程序，您可能无法获得完整的\
  \ Java EE 安全栈支持。在这些环境中可以轻松利用 Spring Security。\n\n*   **您在 Java EE 服务器内部运行应用程序。**\
  \ 即使您运行的是完整的 Java EE 容器，Spring Security 也比 Java EE 对应的方案更完整、更灵活且更易于使用。\n\n*   **您已经在应用程序中使用\
  \ Spring，并希望利用您对它的了解。** 我们之前解释了 Spring 的一些巨大优势。如果您目前正在使用 Spring，您可能非常喜欢它。因此，您可能也会喜欢\
  \ Spring Security。\n\n## Spring Security 概述\n\nSpring Security v5 不再是 SpringSource\
  \ 的一部分，而是现在属于 Pivotal。Pivotal 的 Spring 包含许多项目：\n\n*   Spring Security\n*   Spring\
  \ Boot\n*   Spring Framework\n*   Spring Cloud Data Flow\n*   Spring Cloud\n*  \
  \ Spring Data\n*   Spring Integration\n*   Spring Batch\n*   Spring Hateoas\n* \
  \  Spring Rest Docs\n*   Spring Amqp\n*   Spring Mobile\n*   Spring For Android\n\
  *   Spring Web Flow\n*   Spring Web Services\n*   Spring Ldap\n*   Spring Session\n\
  *   Spring Shell\n*   Spring Flo\n*   Spring Kafka\n*   Spring Statemachine\n* \
  \  Spring Io Platform\n*   Spring Roo\n*   Spring Scala\n*   Spring Blazeds Integration\n\
  *   Spring Loaded\n*   Spring Xd\n*   Spring Social\n\n更多信息，请参考 Spring 项目网页 [`https://spring.io/projects`](https://spring.io/projects)。\n\
  \n所有这些项目都构建在 Spring 框架本身提供的设施之上，而 Spring 框架是这一切的起源项目。您可以将 Spring 视为所有这些卫星项目的中心，为它们提供一致的编程模型和一套既定实践。您将在不同项目中看到的主要要点是\
  \ DI、基于 XML 命名空间的配置和 AOP 的使用，正如您将在下一节中看到的，这些是 Spring 赖以建立的支柱。在 Spring 的后续版本中，注解已成为配置\
  \ DI 和 AOP 相关问题最流行的方法。\n\n在本书中，我们将主要介绍 Spring Boot，分析 Spring Framework，并开发 Spring\
  \ Security 版本 5。让我们从 Spring Boot 开始。\n\n什么是 Spring Boot？\n\nSpring Boot 是一个基于 Java\
  \ 的开源框架，通常用于开发微服务、企业级应用程序。它由 Pivotal 团队开发，帮助开发人员创建独立且生产就绪的 Spring 应用程序。\n\nSpring\
  \ Boot 被认为是构建所有基于 Spring 的应用程序并尽可能快速运行它们的一个简单起点，只需最少的 Spring 前期配置。\n\n### 注意\n\n\
  请记住，Spring Security 应用程序可以使用 Maven 或 Gradle 开发。\n\n正如我们所说，Spring Security 只是 Spring\
  \ 项目中的一个，它专门致力于解决应用程序中的安全问题。\n\n更多信息，请参考文档 [`https://spring.io/projects/spring-security`](https://spring.io/projects/spring-security)。\n\
  \nSpring Security 最初是一个非 Spring 项目。它最初被称为 *The Acegi Security System for Spring*，并且不像今天这样庞大而强大。最初，它只处理授权问题，并利用容器提供的身份验证。由于公众需求，随着越来越多的人开始使用它并为其不断增长的代码库做出贡献，该项目开始获得关注。这最终使其成为\
  \ Spring 框架组合项目中的一个，后来更名为“Spring Security”。\n\n以下是 Spring Security 主要版本的发布日期：\n\n\
  *   2.0.0（2008 年 4 月）\n*   3.0.0（2009 年 12 月）\n*   4.0.0（2015 年 3 月）\n*   5.0.0（2017\
  \ 年 11 月）\n*   5.1.4（2019 年 2 月）\n\n请注意，Spring Security 的 Java 配置是在 Spring 3.1 中添加到\
  \ Spring 框架的，并在 Spring 3.2 中扩展到 Spring Security，并在带有 `@Configuration` 注解的类中定义。\n\
  \n因此，多年来，该项目一直处于 Pivotal 项目组合之下，由 Spring 框架本身提供支持。\n\n但 Spring 框架到底是什么？\n\n\n\n\
  ## Spring Framework 5：快速概览\n\n我们在前文中多次提及 Spring Framework 项目。在此处对其进行概述是合理的，因为本书后续章节将要介绍的许多\
  \ Spring Security 特性都依赖于 Spring 的基础构建模块。\n\n我们承认自己有所偏爱。我们热爱 Spring，并且已经热爱多年。我们认为\
  \ Spring 拥有如此多的优势与卓越特性，以至于我们在启动任何新的 Java 项目时都无法不使用它。此外，在使用其他语言进行开发时，我们也倾向于沿用 Spring\
  \ 的概念，并寻找应用它们的方法，因为这些概念如今已显得如此自然。\n\nSpring Framework 5 的概览如图 2-1 所示。\n\n![../images/310331_2_En_2_Chapter/310331_2_En_2_Fig1_HTML.jpg](img/310331_2_En_2_Fig1_HTML.jpg)\n\
  \n图 2-1\n\nSpring Framework 5\n\nSpring Framework 5 于 2017 年 9 月发布，可被视为自 2013 年\
  \ 12 月发布版本 4 以来的首个主要 Spring Framework 版本。\n\n以下是 Spring Framework 5 中最重要的新特性列表：\n\
  \n*   JDK 基线更新，升级至 Java JDK 11\n*   响应式编程模型。Spring 5 框架构建于响应式基础之上，完全异步且非阻塞。\n* \
  \  使用注解进行编程。Spring 5 现在是一种基于注解的编程模型。\n*   新的函数式编程方法（包括 Kotlin）\n*   使用 REST 端点进行响应式风格编程\n\
  *   HTTP/2 支持\n*   Kotlin 和 Spring WebFlux 支持\n*   支持使用 Lambda 表达式注册 Bean\n*   Spring\
  \ WebMVC 对最新 API 的支持\n*   测试改进，例如使用 JUnit 5 进行条件测试和并发测试\n*   与 Spring WebFlux 的集成测试\n\
  *   核心框架修订\n*   Spring 核心与容器的常规更新\n*   包清理与弃用支持\n\nSpring 吸引我们的地方有很多，但最主要的是框架的两大基础构建模块：**依赖注入**和**面向切面编程**。\n\
  \n为什么这两个概念如此重要？因为它们实际上允许你默认开发出**松散耦合**、**单一职责**、**DRY（不要重复自己）** 的代码。这两个概念以及 Spring\
  \ 本身，在其他书籍和在线教程中已有广泛介绍；不过，我们在此会给出一个简要概述。\n\n### 依赖注入\n\nDI（依赖注入）是 IoC（控制反转）的一种类型，其基本思想很简单：不是让对象自行实例化其所需的依赖，而是以某种方式将这些依赖提供给该对象。以一种多态的方式，作为依赖提供给目标对象（该对象依赖于这些依赖）的那些对象，目标对象仅通过一个抽象（例如\
  \ Java 中的接口）来了解它们，而不是通过依赖的具体实现。\n\nIoC 架构的主要优势在于：\n\n*   更容易在不同实现之间切换\n*   提供良好的程序模块化\n\
  *   通过隔离组件依赖并允许它们通过契约进行通信，为测试程序提供了极佳特性\n*   将特定任务的执行与其实现分离\n\n通过代码来理解这一点比解释更容易。请参见清单\
  \ 2-1。\n\n```\npublic class NonDiObject {\nprivate Helper helper ;\npublic NonDiObject\
  \ ( ) {\nhelper = new HelperImpl ( ) ;\n}\npublic void doStuffWithHelp( ) {\nhelper.help(\
  \ ) ;\n}\n}\n清单 2-1\n对象自身实例化其依赖（无依赖注入）\n```\n\n在这个例子中，`NonDiObject` 的每个实例都负责在其构造函数中实例化自己的\
  \ `Helper`。你可以看到它实例化了一个 `HelperImpl`，从而与这个特定的 `Helper` 实现产生了紧密且不必要的耦合。现在请看清单 2-2。\n\
  \n```\npublic class DiObject {\nprivate Helper helper ;\npublic DiObject(Helper\
  \ helper) {\nthis.helper = helper;\n}\npublic void doStuffWithHelp( ) {\nhelper.help(\
  \ ) ;\n}\n}\n清单 2-2\n对象从外部源接收其依赖（使用依赖注入）\n```\n\n在这个版本中，`Helper` 在构造时被传递给 `DiObject`。`DiObject`\
  \ 无需实例化任何依赖。它甚至不需要知道如何实例化，或者 `Helper` 是哪种具体的实现类型，也不知道它来自何处。它只需要一个 helper，并根据其需求使用它。\n\
  \n这种方法的优势应该很清晰。第二个版本与 `Helper` 是松散耦合的，仅依赖于 `Helper` 接口，允许在运行时决定具体的实现，从而为设计提供了极大的灵活性。\n\
  \nSpring 依赖注入配置通常定义在 XML 文件中，尽管后续版本已更多地转向基于注解的配置和基于 Java 的配置。\n\n\n\n### 面向切面编程\n\
  \nAOP 是一种从主应用程序代码中提取横切关注点，并以横向方式在需要它们的各个点进行应用的技术。AOP 关注点的典型示例包括事务、日志记录和安全性。\n\n\
  其主要思想是，将应用程序的核心业务逻辑与外围的专用关注点解耦，然后以透明、不突兀的方式在整个应用程序中应用这些功能。通过将这些功能（即通用的应用程序逻辑，而非核心业务逻辑）封装到其自身的模块中，它们可以被应用程序中需要它们的多个部分使用，从而避免了在代码中到处重复。在\
  \ AOP 术语中，封装这些横切逻辑的实体被称为切面。\n\nJava 中有许多 AOP 的实现。最流行的可能是 AspectJ，它需要一个特殊的编译过程。Spring\
  \ 支持 AspectJ，但它也包含了自己的 AOP 实现，简称为 *Spring AOP*，这是一个纯 Java 实现，不需要特殊的编译过程。\n\n使用代理的\
  \ Spring AOP 仅在公有方法级别可用，并且仅当从被代理对象外部调用时才有效。这是有道理的，因为从对象内部调用方法不会调用代理；相反，它会直接调用真实的自身对象（基本上是对\
  \ `this` 对象的调用）。在使用 Spring 时，意识到这一点非常重要，有时新手 Spring 开发者会忽略这一点。\n\n即使使用自己的 AOP 实现，Spring\
  \ 也利用了 AspectJ 的语法和概念来定义切面。\n\nSpring AOP 是一个相当大的主题，但其工作方式背后的原理并不难理解。Spring AOP\
  \ 通过使用动态创建的代理对象来工作，这些代理对象负责处理围绕主业务对象调用的 AOP 关注点。你可以将代理和 Spring AOP 简单地视为装饰器模式的实现，其中你的业务对象是组件，而\
  \ AOP 代理是装饰器。图 2-2 展示了该概念的简单图形表示。这样思考，你应该能够轻松理解 Spring AOP。清单 2-3 展示了这种魔法在概念上是如何发生的。\n\
  \n![../images/310331_2_En_2_Chapter/310331_2_En_2_Fig2_HTML.jpg](img/310331_2_En_2_Fig2_HTML.jpg)\n\
  \n图 2-2\n\nSpring AOP 实战\n\n```\npublic class Business Object implements BusinessThing\
  \ {\npublic void doBusinessThing( ) {\n/ / 一些业务逻辑\n}\n}\n清单 2-3\n业务对象，非事务性\n```\n\
  \n假设你有一个用于事务的切面。Spring 在运行时动态创建一个概念上类似于清单 2-4 的对象。\n\n```\npublic class BusinessObjectTransactionalDecorator\
  \ implements BusinessThing {\nprivate BusinessThing componen t ;\npublic BusinessObjectTransactionalDecorator(BusinessThing\
  \ component ) {\nt h i s . co mponent = component ;\n}\npublic void doBusinessThing(\
  \ ) {\n/ / 一些启动事务的代码\ncomponent.doBusinessThing( ) ;\n/ / 一些提交事务的代码\n}\n}\n清单 2-4\n\
  Spring AOP 魔法\n```\n\n再次强调，记住这个简单的想法，Spring AOP 应该会更容易理解。\n\n## Spring Security\
  \ 5 的新特性\n\n本书的上一版本使用了 Spring Security 3。因此，了解从版本 3 到版本 5 最重要的变化非常重要。它们如下：\n\n*\
  \   自 v5 起，Pivotal 支持 Spring Security，因为 SpringSource 已不复存在。\n\n*   v5 使用的 javax.servlet-api\
  \ 版本是 4.0.1。\n\n*   现在，默认情况下，ContextPath 是 `/`。如果你需要定义特定的 contextPath，请使用 `/app_name`\
  \ 或通过属性进行配置；例如，`server.servlet.contextPath=/springbootapp`。\n\n*   Spring Security\
  \ 过滤器链 (CSRF)：自 v3 之后，CSRF 令牌过滤器被添加到过滤器链中，并默认开启。\n\n*   `j_username`/`j_password`\
  \ 参数：从 v4 开始，我们不再在身份验证请求中接收 `username` 值。此外，它们已更新为 `username` 和 `password`，去掉了 `j_`\
  \ 前缀。\n\n*   v5 中增加了 CSRF 保护。\n\n*   v5 中密码编码是强制性的。\n\n*   从 Servlet 3.0 开始，不再需要\
  \ `web.xml` 文件。\n\n*   使用 Java 配置可以更轻松地进行 Spring Security 配置。\n\n*   可以在 Log4J2\
  \ 配置文件中将调试级别设置为 DEBUG 的组合使用。\n\n如果你需要从 v3 迁移到 v5，我们推荐以下链接，其中展示了如何迁移：\n\n*   `https://docs.spring.io/spring-security/site/migrate/current/3-to-4/html5/migrate-3-to-4-xml.html`\n\
  \n*   `https://github.com/spring-projects/spring-framework/wiki/Upgrading-to-Spring-Framework-5.x`\n\
  \n以下是 Spring Security 5.1.4.RELEASE 中包含的一些最重要的新功能：\n\n*   支持 JDK 11\n\n*   通过 UserDetailsPasswordService\
  \ 自动升级密码存储\n\n*   支持 OAuth 2.0 客户端（适用于 Servlet 和 WebFlux）\n\n*   引入了 HTTP 防火墙保护\n\
  \n*   支持 LDAP 身份验证，现在可以使用自定义环境变量进行配置\n\n*   支持 X.509 身份验证，用于将主体作为策略进行派生\n\n*   支持\
  \ Graal 原生镜像约束\n\n*   升级到 Reactor Core 3.2、Reactor Netty 0.8、ASM 7.0 和 CGLIB 3.2.8\n\
  \n*   支持 Spring 的 JCL 桥接日志记录\n\n*   支持 FileSystemResource 中的 NIO.2 Path\n\n*   改进了核心类型和注解解析性能\n\
  \n*   控制器参数注解现在也可以在接口上被检测到\n\n*   添加了对 HTTP PUT、PATCH 和 DELETE 的 Servlet 请求参数支持\n\
  \n*   为 HTTP 请求和 WebSocket 会话添加了关联的日志消息，并增加了对 DEBUG 日志记录的控制\n\n*   更一致地检测方法注解\n\n\
  *   支持在使用 Reactor Netty 0.8 运行时使用 HTTP/2 服务器\n\n*   改进了 DEBUG 和 TRACE 日志记录\n\n*\
  \   在 WebTestClient 中支持 Hamcrest 和 XML 断言\n\n*   支持配置固定 WebSession 的 MockServerWebExchange\n\
  \n*   改进了人性化、紧凑的 DEBUG 和 TRACE 日志记录\n\n*   增加了对潜在敏感数据的 DEBUG 日志记录的控制\n\n*   更新了\
  \ Web 区域设置表示（例如，语言标签、时区 cookie 等）\n\n*   为缺失的 header、cookie 和路径变量添加了特定的 MVC 异常\n\
  \n*   为注解控制器集合添加了基础路径（外部配置）\n\n*   集中处理“forwarded”类型头\n\n*   在 @Profile 条件中支持逻辑与/或表达式\n\
  \n*   支持提供 Brotli 压缩\n\n*   在单构造函数场景中支持空集合/映射/数组注入\n\n*   支持 Hibernate ORM 5.3\n\
  \n*   在 BeanFactory API 中一致地不暴露空 bean\n\n*   改进的 Kotlin beans DSL\n\n*   通过 BeanFactory\
  \ API 进行程序化的 ObjectProvider 检索\n\n*   用于按类型解析 bean 的 ObjectProvider 可迭代/流式访问\n\n\
  *   在 @MessageMapping 方法中支持响应式客户端\n\n*   支持通过 STOMP 代理保留消息的发布顺序\n\n*   支持在控制器方法上使用\
  \ @SendTo 和 @SendToUser\n\nSpring Security 5 基础知识包括：\n\n*   身份验证：确认凭证的真实性\n\n* \
  \  授权：定义主体的访问策略\n\n\n\n*   **AuthenticationManager**：认证过程中的控制器\n*   **AuthenticationProvider**：映射到存储用户数据的数据存储的接口\n\
  *   **Authentication Object**：认证时创建的用于保存登录凭据的对象\n*   **GrantedAuthority**：授予主体的应用程序权限\n\
  *   **Principal**：执行操作的用户\n*   **SecurityContext**：保存认证信息及其他安全信息\n*   **SecurityContextHolder**：提供对\
  \ SecurityContext 的访问\n*   **UserDetails**：包含用户凭据以及用户角色的数据对象\n*   **UserDetailsService**：收集用户凭据和权限（角色），并构建\
  \ UserDetails 对象\n\n以下是 Spring Security v5 支持集成的一些最重要的技术：\n\n*   HTTP\n*   LDAP\n\
  *   OpenID\n*   JAAS API\n*   CAS\n\n### 注意\n\n当前的 Spring Security 5.1.4.RELEASE\
  \ 版本可从 [`https://github.com/spring-projects/spring-security/releases/tag/5.1.4.RELEASE`](https://github.com/spring-projects/spring-security/releases/tag/5.1.4.RELEASE)\
  \ 下载。\n\n如前所述，认证和授权是 Spring Security 5.1 中的一些基本功能。它们是非常重要的功能，因为它们允许 Spring Security\
  \ 应用程序识别和授权用户，同时防止未经授权的访问，并控制用户访问应用程序资源的权限。\n\n在本书中，我们将提供一些关于如何开发应用程序以授权和认证用户的示例。\n\
  \nSpring Security 的认证/授权流程如图 2-3 所示。\n\n![../images/310331_2_En_2_Chapter/310331_2_En_2_Fig3_HTML.jpg](img/310331_2_En_2_Fig3_HTML.jpg)\n\
  \n图 2-3\n\nSpring Security 认证/授权功能流程\n\nSpring Security 通过一些特定的模块（以 JAR 文件形式）来使用。`spring-security-core.jar`\
  \ 文件包含核心内容：\n\n*   认证和访问控制的类与接口\n*   远程支持及基本配置 API\n\n以下列出了任何使用 Spring Security\
  \ 的应用程序所需的 JAR 文件及其支持：\n\n*   独立应用程序\n*   远程客户端\n*   方法（服务层）安全\n*   JDBC 用户配置\n\n\
  Spring Security v5 项目最重要的模块（JAR 文件）包括：\n\n*   Core - `spring-security-core.jar`：\n\
  \    *   `org.springframework.security.core`\n    *   `org.springframework.security.access`\n\
  \    *   `org.springframework.security.authentication`\n    *   `org.springframework.security.provisioning`\n\
  *   Remoting - `spring-security-remoting.jar`\n*   Web - `spring-security-web.jar`\n\
  *   Config - `spring-security-config.jar`\n*   LDAP - `spring-security-ldap.jar`\n\
  *   OAuth 2.0 Core - `spring-security-oauth2-core.jar`\n*   ACL - `spring-security-acl.jar`\n\
  *   CAS - `spring-security-cas.jar`\n*   OpenID - `spring-security-openid.jar`\n\
  *   Test - `spring-security-test.jar`\n\n请注意，在开发 Spring Security 应用程序时，既可以使用 Spring\
  \ Security XML 配置，也可以使用 Java 注解。\n\n在本书中，我们的示例将同时使用 XML 和 Java 注解。\n\n## 总结\n\n\
  现在，您应该对 Spring Security 是什么以及它的用途有了很好的了解。您还了解了 Spring Security 5 版本中的新特性。在此过程中，我们介绍了其背后的一些主要架构和设计原则，以及它们如何分层构建在强大的\
  \ Spring Framework v5 之上。我们介绍了依赖注入和 AOP。在下一章中，我们将搭建开发环境，您将构建第一个由 Spring Security\
  \ 驱动的 Web 应用程序。\n\n"
