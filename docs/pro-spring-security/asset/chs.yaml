  \ ACL 的所有者，以及在 ACL 持久化到数据库后对其进行缓存。`JdbcMutableAclService` 在内部使用了 Spring 自身的 `JdbcTemplate`\
  \ 和带有预编译语句的批量更新。\n\n访问受保护对象\n接下来的逻辑步骤是，通过尝试访问已创建的帖子来确保规则确实生效。为此，你需要再设置几个用户，并完善你的服务和控制器，使其能够处理新的选项。请记住，每次重启应用时，你都在重新创建数据库。（再次强调，在生产环境中你不会希望这样做。）此外，帖子存储在一个`内存映射`中，因此当你关闭应用时，它们会丢失。那么，现在让我们逐步进行所有代码更改。\n\
  \n首先要做的是，在应用配置中添加一个 `org.springframework.security.acls.AclEntryVoter`。`AclEntryVoter`\
  \ 是 `AccessDecisionVoter` 的一个实现，类似于你之前学习过的那些（如 `RoleVoter` 等），它根据领域对象 ACL 配置所给定的规则，投票决定是授予还是拒绝访问。你需要为你希望\
  \ ACL 进行投票的每个操作创建一个 `AclEntryVoter 实例`。例如，在你的场景中，你创建了三个投票器：一个用于投票决定读取访问权限，一个用于投票决定更新权限，一个用于投票决定删除权限。在文件\
  \ `applicationContext-acl.xml` 中添加这些投票器。清单 7-16 展示了这三个投票器的定义，随后是对其工作原理的详细说明。\n\n\
  ```\n\n清单 7-16\n对应于删除、读取和更新操作的 AclEntryVoter\n```\n\n你有三个投票器 bean；然而，分析一个就相当于分析了全部。当你定义一个\
  \ `AclEntryVoter` 时，需要向其构造函数传递三个参数。第一个参数是对之前定义的 `AclService` 的引用，第二个参数映射到一个配置属性名称。我们在本书前面讨论过配置属性，这里我们只需说明，它们是\
  \ Spring Security 在拦截方法时，在 `@Secured` 注解中查找的属性。`AccessDecisionManager` 可以访问这个值，也可以访问决定是否支持特定配置属性的不同投票器。例如，如果你有一个像\
  \ `@Secured(\"ROLE_USER\")` 这样的注解，并且配置了 `RoleVoter`，那么该投票器就会执行其工作，因为 `RoleVoter`\
  \ 默认支持任何以 `ROLE_` 开头的配置属性。对于 `AclEntryVoter`，你需要精确指定该特定投票器将支持哪个配置属性。在这个例子中，第一个 bean\
  \ 将支持像 `@Secured(\"ACL_POST_DELETE\")` 这样的注解，第二个 bean 将支持像 `@Secured(\"ACL_POST_UPDATE\"\
  )` 这样的注解，第三个 bean 将支持像 `@Secured(\"ACL_POST_READ\")` 这样的注解。传递给 `AclEntryVoter` 构造函数的第三个参数是允许访问你试图对对象执行的特定操作所需的权限。例如，第一个\
  \ `AclEntryVoter` bean 的场景如下：你有一个用 `@Secured(\"ACL_POST_DELETE\")` 注解的方法，该方法接收一个\
  \ `Post` 实例作为参数。当该方法被调用时，`AclEntryVoter` 接收 `Post` 对象，然后从认证信息中检索主体，并根据 `Post` 的\
  \ ACL 评估其权限，以查看它是否拥有所需的权限——在本例中是 `BasePermission.ADMINISTRATION`。如果拥有，它将投票授予访问权限；如果没有，它将投票拒绝访问。稍后运行应用程序时，我们将更深入地解释这一点。\n\
  \n为了使这些投票器生效，你需要将它们添加到 `AccessDecisionManager` 中。目前，你使用的是默认的 `AccessDecisionManager`，因此你需要在应用上下文中显式定义一个，并注入这些投票器，以便在应用中使用它们。你可以在\
  \ `applicationContext-security.xml` 文件中执行此操作。这就像添加清单 7-17 中所示的两个 bean 一样简单。\n\n\
  ```\n\n清单 7-17\n用于使用自定义 AccessDecisionManager 的 Bean\n```\n\n这个清单中没有什么特别之处。你使用的是基于肯定（affirmative-based）的访问决策管理器，并且你将三个投票器注入到了\
  \ `decisionVoters` 属性中。\n\n接下来，让我们在服务中创建删除操作。`ForumServiceImpl` 中的 `deletePost`\
  \ 方法如清单 7-18 所示。请记得同时用新方法更新 `ForumService` 接口。\n\n```\n@Transactional\n@Secured(\"\
  ACL_POST_DELETE\")\npublic void deletePost(Post post){\nObjectIdentity oid = new\
  \ ObjectIdentityImpl(Post.class, post.getId());\nmutableAclService.deleteAcl(oid,\
  \ true);\npostStore.remove(postStore.get(post.getId()));\n}\n清单 7-18\nForumServiceImpl\
  \ 中的 deletePost 方法\n```\n\n这是一个非常简单的方法。值得注意的是 `@Secured` 注解。如果你回想一下之前对投票器的定义，你应该能够看出，此方法的调用将由你定义的第一个投票器\
  \ bean（`aclDeletePostVoter`）支持。让我们尝试一下，看看会发生什么。在此之前，你需要更新 `ForumController`，添加清单\
  \ 7-19 中的方法。\n\n\n\n```\n@RequestMapping(method = RequestMethod.POST, value = \"\
  /post/delete\")\npublic ModelAndView deletePost(@RequestParam Integer postId){\n\
  Post post = new Post(\"non-relevant\");\npost.setId(postId);\nforumService.deletePost(post);\n\
  return showForm();\n}\n清单 7-19\nForumController 中的 deletePost 方法\n```\n\n现在重新启动应用程序，访问\
