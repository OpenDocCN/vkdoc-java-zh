  \n\n\nLDAP 认证\n轻量级目录访问协议（LDAP）是一种面向消息的应用层协议，用于以可访问的树状目录形式存储和访问信息。通常，目录就是一个组织化的数据存储库，便于在其特定领域内进行简单查询。例如，电视指南是一个便于查找电视节目的目录，而电话簿则是一个便于查找电话号码的目录。\n\
  \nLDAP 允许在目录中存储各种不同类型的信息。最广为人知的类 LDAP 结构应用可能是微软 Windows 活动目录系统。其他 LDAP 系统则被广泛用于存储许多公司的企业用户数据库，作为集中式用户存储。\n\
  \nLDAP 并非一个易于理解的系统，我们将结合本节开发的示例来尝试解释它。我们将使用与上一节相同的代码，但根据需要进行修改，使其适用于 LDAP 认证而非数据库认证。请记住，在上一节中，我们提供了一个引导应用程序，用于开始本章中的所有示例，包括本示例。\n\
  \n首先要做的是在 LDAP 目录中配置你的用户。为此，你需要了解 LDAP 信息模型，该模型定义了可以在目录中存储的数据类型。\n\nLDAP 中的数据由条目、属性和值定义。*条目*是目录中的基本信息单元，通常代表现实世界中的一个实体，例如一个用户。条目通常由特定的对象类定义。目录中的每个条目都有一个称为“专有名称”（通常简称为\
  \ DN）的标识。目录中的每个条目还有一组*属性*，用于描述该条目的不同方面。每个属性都有一个类型和一个或多个*值*。\n\n你必须定义所需的数据。你将像之前一样使用用户、组和凭证。在\
  \ LDAP 中，用户条目定义通常被称为 *People*，因此你将使用该名称来定义用户条目。你的用户还将使用标准的 LDAP 对象类 `person` 来定义其属性。\n\
  \n安装和配置 LDAP\n对于你的 LDAP 实现，你将下载并安装 Apache 目录服务器（ApacheDS），地址为 [`https://directory.apache.org/apacheds/downloads.html`](https://directory.apache.org/apacheds/downloads.html)，以及\
  \ Apache 目录工作室，地址为 [`https://directory.apache.org/studio/downloads.html`](https://directory.apache.org/studio/downloads.html)。这两个工具的安装过程都很直接，应该不会给你带来任何问题。请查阅官方网站获取指导。\n\
  \nApache 目录工作室允许你访问和查询服务器。它是一个由插件构建的 Eclipse 应用程序，适用于访问 LDAP 服务器。\n\n关于 ApacheDS\
  \ 服务器，安装后（至少在 Mac 上），它会自动启动；不过，你也可以选择将 ApacheDS 服务器作为应用程序进程内的嵌入式服务器运行，而不是使用独立的 LDAP\
  \ 服务器。在本示例中，我们将使用独立服务器。\n\n首先，你需要启动 ApacheDS，如图 6-7 的服务列表所示。\n\n![../images/310331_2_En_6_Chapter/310331_2_En_6_Fig7_HTML.jpg](img/310331_2_En_6_Fig7_HTML.jpg)\n\
  \n图 6-7\n启动 ApacheDS\n\n安装 Apache 服务器和工作室后，你需要从工作室连接到服务器。\n\n一旦 ApacheDS 服务运行，打开\
  \ Apache 工作室并启动 LDAP 服务器，如图 6-8 所示。\n\n![../images/310331_2_En_6_Chapter/310331_2_En_6_Fig8_HTML.jpg](img/310331_2_En_6_Fig8_HTML.jpg)\n\
  \n图 6-8\n启动 LDAP 服务器\n\n现在你可以将 Apache 工作室连接到 ApacheDS。转到工作室的“文件”菜单，选择“新建”，然后选择“LDAP\
  \ 连接”，如图 6-9 所示。在 LDAP 连接表单中，输入连接到本地 ApacheDS 服务器的值，如图 6-10 所示，使用 **uid=admin,ou=system**\
  \ 作为 DN，**secret** 作为密码。你可以看到主机是 localhost，端口是 10389。点击“下一步”完成连接配置。\n\n![../images/310331_2_En_6_Chapter/310331_2_En_6_Fig10_HTML.jpg](img/310331_2_En_6_Fig10_HTML.jpg)\n\
  \n图 6-10\n连接到本地 ApacheDS 服务器\n\n![../images/310331_2_En_6_Chapter/310331_2_En_6_Fig9_HTML.jpg](img/310331_2_En_6_Fig9_HTML.jpg)\n\
  \n图 6-9\nApache 目录工作室连接到 LDAP 服务器\n\n一旦与 ApacheDS 服务器建立连接，你需要创建一个表示本地目录中顶级条目的上下文条目。为此，右键单击左侧面板的\
  \ `Root DSE` 元素，然后在上下文菜单中选择“新建 ➤ 新建上下文条目”，如图 6-11 所示。\n\n![../images/310331_2_En_6_Chapter/310331_2_En_6_Fig11_HTML.jpg](img/310331_2_En_6_Fig11_HTML.jpg)\n\
  \n图 6-11\n创建新的上下文条目顶级条目\n\n在“新建上下文条目”的第一个表单中，选择从头创建条目。然后，从左侧面板的可用对象类列表中，选择 `dNSDomain`\
  \ 并点击“添加”。这里的思路是，你正在创建所有其他条目派生自的顶级条目。最终结果应类似于图 6-12。然后点击“下一步”。在下一个输入表单中，使用 `dc=example,dc=com`\
  \ 作为上下文条目的 DN 名称，然后点击“下一步”。这些值（`example` 和 `com`）是 ApacheDS 服务器中包含的分区和顶级上下文条目的默认值。这些值也部分标识了你在目录中创建的每个条目，因为如前所述，LDAP\
  \ 遵循一种层次结构，该结构在其父条目的基础上构建条目的名称。\n\n![../images/310331_2_En_6_Chapter/310331_2_En_6_Fig12_HTML.jpg](img/310331_2_En_6_Fig12_HTML.jpg)\n\
  \n图 6-12\n为上下文条目选择 dNSDomain 对象类\n\n下一步是将你的用户（对于本示例而言）导入到 LDAP 服务器。你将使用一个 LDIF 文件导入几个用户。LDIF\
  \ 文件是一种使用 LDIF 格式的文本文件，这是一种用于描述 LDAP 中目录条目的标准格式。它允许你以标准方式将目录数据导入或导出到另一个 LDAP 目录，或者仅用于创建新数据或修改现有数据。你在此处使用它来导入包含用户的数据。清单\
  \ 6-16 显示了将要导入的 LDIF 文件。你可以随意命名此文件，但在本示例中我们将其命名为 `users.ldif`。\n\n\n\n```\nversion:\
  \ 1\ndn: dc=example,dc=com\nobjectclass: top\nobjectclass: domain\ndc: example\n\
  dn: ou=groups,dc=example,dc=com\nobjectclass: organizationalUnit\nobjectclass: top\n\
  ou: groups\ndn: cn=administrators,ou=groups,dc=example,dc=com\nobjectclass: groupOfUniqueNames\n\
  objectclass: top\ncn: administrators\nuniqueMember: uid=mnardone,ou=people,dc=example,dc=com\n\
  ou: admin\ndn: cn=users,ou=groups,dc=example,dc=com\nobjectclass: groupOfNames\n\
  objectclass: top\ncn: users\nmember: uid=lnardone,ou=people,dc=example,dc=com\n\
  ou: user\ndn: ou=people,dc=example,dc=com\nobjectclass: organizationalUnit\nobjectclass:\
  \ top\nou: people\ndn: uid=lnardone,ou=people,dc=example,dc=com\nobjectclass: inetOrgPerson\n\
  objectclass: organizationalPerson\nobjectclass: person\nobjectclass: top\ncn: Leo\
  \ Nardone\nsn: Leo\nuid: lnardone\nuserPassword: {SHA}F1OkcxtiioPmVX3tJlIHzZsXkDQ=\n\
  dn: uid=mnardone,ou=people,dc=example,dc=com\nobjectclass: inetOrgPerson\nobjectclass:\
  \ organizationalPerson\nobjectclass: person\nobjectclass: top\ncn: Massimo Nardone\n\
  sn: Nardone\nuid: mnardone\nuserPassword: {SHA}xcS5y9T0kjBXDpYijejbhmILFwY=\n清单\
  \ 6-16\n包含要导入 LDAP 目录的两个用户的 LDIF 文件\n```\n\n如你所见，这段代码生成了两个用户：`mnardone`（属于 administrators\
  \ 组）和 `lnardone`（不属于该组）。\n\n请注意，我们是通过这个网页生成的 SHA 密码：[`http://aspirine.org/htpasswd_en.html`](http://aspirine.org/htpasswd_en.html)。\n\
  密码如下：\n\n*   *nardone01 = {SHA}xcS5y9T0kjBXDpYijejbhmILFwY=*\n\n*   *nardone02 =\
  \ {SHA}F1OkcxtiioPmVX3tJlIHzZsXkDQ=*\n\n要导入清单 6-16 中的文件，请在 Apache Directory Studio\
  \ 中，右键单击新创建的上下文条目左侧面板。然后选择“导入” ➤ “LDIF 导入”。在如图 6-13 所示的输入表单中，选择并找到你存储清单 6-16 内容的文件（在我们的例子中是\
  \ `users.ldif`），然后单击“完成”。\n\n![../images/310331_2_En_6_Chapter/310331_2_En_6_Fig13_HTML.jpg](img/310331_2_En_6_Fig13_HTML.jpg)\n\
  \n图 6-13\n使用 Apache Directory Studio 导入 LDIF 文件\n\n在清单 6-16 中，你可以看到目录的层次结构，以及所有条目如何继承\
  \ DN `dc=example,dc=com`。正如我们刚才所说，你还可以看到不同的条目如何使用不同的标准对象类。你已经创建了两个组：administrators\
  \ 和 users。你还确定了 *lnardone* 是 users 组的成员，*mnardone* 是 administrators 组的成员，以及两个 SHA\
  \ 密码。从图形上看，这个层次结构非常简单，如图 6-14 所示。\n\n![../images/310331_2_En_6_Chapter/310331_2_En_6_Fig14_HTML.jpg](img/310331_2_En_6_Fig14_HTML.jpg)\n\
  \n图 6-14\nLDAP 层次结构，展示了你使用 LDIF 文件创建的结构\n\n接下来你需要做的是配置示例应用程序，使其能够连接到 LDAP 服务器并查询其上存储的信息。目前你有一个干净的应用程序，只包含引导组件。现在你将开始添加所需的功能。\n\
  \n首先，将 Spring Security LDAP 依赖项添加到 `pom.xml` 文件中。该依赖项如清单 6-17 所示。\n\n```\norg.springframework.ldap\n\
  spring-ldap-core\n\norg.springframework.security\nspring-security-ldap\n\n清单 6-17\n\
  Spring Security LDAP 依赖项\n```\n\n创建一个新的 Spring Security Boot 项目，包含 Web、Security、LDAP\
  \ 和 Thymeleaf，如图 6-15 所示。\n\n![../images/310331_2_En_6_Chapter/310331_2_En_6_Fig15_HTML.jpg](img/310331_2_En_6_Fig15_HTML.jpg)\n\
  \n图 6-15\n新的 Spring Boot LDAP 项目\n\n接下来，更新 `POM.xml` 文件，如清单 6-18 所示。\n\n```\n\n\
  4.0.0\ncom.apress\nSpringSecurityldapAuthentication\n0.0.1-SNAPSHOT\nSpringSecurityldapAuthentication\n\
  Demo project for Spring Boot\n\norg.springframework.boot\nspring-boot-starter-parent\n\
  1.5.7.RELEASE\n\norg.springframework.boot\nspring-boot-starter-web\n\norg.springframework.boot\n\
  spring-boot-starter-security\n\norg.springframework.ldap\nspring-ldap-core\n\norg.springframework.security\n\
  spring-security-ldap\n\ncom.unboundid\nunboundid-ldapsdk\n\norg.springframework.boot\n\
  spring-boot-starter-thymeleaf\n\norg.thymeleaf.extras\nthymeleaf-extras-springsecurity5\n\
  \norg.springframework.boot\nspring-boot-starter-test\ntest\n\norg.springframework.security\n\
  spring-security-test\ntest\n\norg.springframework.boot\nspring-boot-maven-plugin\n\
  \nmaven-compiler-plugin\n3.8.0\n\n清单 6-18\nPom.xml 文件\n```\n\n与本书前面的项目一样，你在 `templates`\
  \ 目录下创建了两个 HTML 文件：`welcome.html` 和 `admin.html`，分别如清单 6-19 和 6-20 所示。\n\n```\n\n\
  Spring Security 5 和 LDAP。\n\n欢迎：\n您已成功以管理员身份登录！\n\n注意 1：此内容仅对经过身份验证的用户显示。\n\n注意\
  \ 2：此内容仅对管理员显示。\n\n清单 6-20\nadmin.html\n```\n\n```\n\nSpring Boot Security 5 和 LDAP\
  \ 示例\n\n欢迎来到 Spring Boot Security 5 和 LDAP 示例！\n请登录。\n\n清单 6-19\nwelcome.html\n\
  ```\n\n接下来，创建一些 Java 类。从 `LoginController` 开始，如清单 6-21 所示，它与本书其他项目中使用的控制器类似。\n\n\
  ```\npackage com.apress.SpringSecurityldapAuthentication.controller;\nimport org.springframework.security.authentication.UsernamePasswordAuthenticationToken;\n\
  import org.springframework.security.config.annotation.web.builders.WebSecurity;\n\
  import org.springframework.security.core.context.SecurityContextHolder;\nimport\
  \ org.springframework.security.ldap.userdetails.LdapUserDetailsImpl;\nimport org.springframework.web.bind.annotation.GetMapping;\n\
  import org.springframework.web.bind.annotation.RequestMapping;\nimport org.springframework.web.bind.annotation.RequestMethod;\n\
  import org.springframework.web.bind.annotation.RestController;\nimport org.springframework.web.servlet.ModelAndView;\n\
  @RestController\npublic class LoginController {\n@GetMapping(\"/\")\npublic ModelAndView\
  \ home() {\nModelAndView modelAndView = new ModelAndView();\nmodelAndView.setViewName(\"\
  welcome\");\nreturn modelAndView;\n}\n@GetMapping(\"/welcome\")\npublic ModelAndView\
  \ welcome() {\nModelAndView modelAndView = new ModelAndView();\nmodelAndView.setViewName(\"\
  welcome\");\nreturn modelAndView;\n}\n@GetMapping(\"/admin\")\npublic ModelAndView\
  \ admin() {\nModelAndView modelAndView = new ModelAndView();\nUsernamePasswordAuthenticationToken\
  \ authentication =\n(UsernamePasswordAuthenticationToken)\nSecurityContextHolder.getContext().getAuthentication();\n\
  LdapUserDetailsImpl principal = (LdapUserDetailsImpl) authentication.getPrincipal();\n\
  modelAndView.addObject(\"currentUser\", principal.getDn());\nmodelAndView.addObject(\"\
  role\", principal.getAuthorities());\nmodelAndView.addObject(\"adminMessage\", \"\
  内容仅对经过身份验证的管理员可用！\");\nmodelAndView.setViewName(\"admin\");\nreturn modelAndView;\n\
  }\npublic void configure(WebSecurity web) throws Exception {\nweb\n.ignoring()\n\
  .antMatchers(\"/resources/**\");\n}\n}\n清单 6-21\nLoginController Java 类\n```\n\n\
  清单 6-21 的工作原理与你之前看到的类似，例如使用 `@GetMapping` 将应用程序重定向到特定的 HTML 页面，如 welcome、admin 等。\n\
  \n那么 LDAP 身份验证是如何工作的呢？让我们从编写一个简单的 `application.yml` 文件开始，告诉 Spring 要使用的 LDAP 服务器和条目；参见清单\
  \ 6-22。\n\n```\nspring:\nldap:\nurls: ldap://localhost:10389\nbase: dc=example,dc=com\n\
  username: uid=admin,ou=system\npassword: secret\n清单 6-22\napplication.yml 文件\n```\n\
  \n\n\n接下来，创建另一个名为 `SpringSecurityConfiguration` 的 Java 类，如清单 6-23 所示，用于处理 LDAP 认证。\n\
  \n```\npackage com.apress.SpringSecurityldapAuthentication.Configuration;\nimport\
  \ org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
  import org.springframework.security.authentication.encoding.LdapShaPasswordEncoder;\n\
  import org.springframework.security.config.annotation.authentication.builders.AuthenticationManagerBuilder;\n\
  import org.springframework.security.config.annotation.web.builders.HttpSecurity;\n\
  import org.springframework.security.config.annotation.web.configuration.EnableWebSecurity;\n\
  import org.springframework.security.config.annotation.web.configuration.WebSecurityConfigurerAdapter;\n\
  import org.springframework.security.ldap.DefaultSpringSecurityContextSource;\nimport\
  \ org.springframework.security.web.util.matcher.AntPathRequestMatcher;\nimport org.springframework.security.web.authentication.logout.LogoutSuccessHandler;\n\
  import java.util.Collections;\n@Configuration\n@EnableWebSecurity\npublic class\
  \ SpringSecurityConfiguration extends WebSecurityConfigurerAdapter {\n@Override\n\
  protected void configure(HttpSecurity http) throws Exception {\nhttp\n.authorizeRequests()\n\
  .antMatchers(\"/\").permitAll()\n.antMatchers(\"/login\").permitAll()\n.antMatchers(\"\
  /logout\").permitAll()\n.antMatchers(\"/welcome\").permitAll()\n.antMatchers(\"\
  /admin\").hasRole(\"ADMINISTRATORS\")\n.anyRequest().fullyAuthenticated()\n.and()\n\
  .formLogin()\n.defaultSuccessUrl(\"/admin\", true)\n.and().logout()\n.logoutUrl(\"\
  /perform_logout\")\n.logoutRequestMatcher(new AntPathRequestMatcher(\"/logout\"\
  ))\n.logoutSuccessUrl(\"/welcome.html\")\n.deleteCookies(\"JSESSIONID\")\n.invalidateHttpSession(true)\n\
  .logoutRequestMatcher(new AntPathRequestMatcher(\"/logout\"));\n;\n}\n@Override\n\
  public void configure(AuthenticationManagerBuilder auth) throws Exception {\nauth\n\
  .ldapAuthentication()\n.userDnPatterns(\"uid={0},ou=people\")\n.groupSearchBase(\"\
  ou=groups\")\n.contextSource(contextSource())\n.passwordCompare()\n.passwordEncoder(new\
  \ LdapShaPasswordEncoder())\n.passwordAttribute(\"userPassword\");\n}\n@Bean\npublic\
  \ DefaultSpringSecurityContextSource contextSource() {\nreturn  new DefaultSpringSecurityContextSource(\n\
  Collections.singletonList(\"ldap://localhost:10389\"), \"dc=example,dc=com\");\n\
  }\n}\n清单 6-23\nSpringSecurityConfiguration Java 类\n```\n\n现在使用此配置启动应用程序。您应该能够通过\
  \ URL `http://localhost:8080/` 看到欢迎页面，如图 6-16 所示。\n\n![../images/310331_2_En_6_Chapter/310331_2_En_6_Fig16_HTML.jpg](img/310331_2_En_6_Fig16_HTML.jpg)\n\
  \n图 6-16\n应用程序欢迎页面\n\n登录并访问 Spring Security v5 登录页面，如图 6-17 所示。\n\n![../images/310331_2_En_6_Chapter/310331_2_En_6_Fig17_HTML.jpg](img/310331_2_En_6_Fig17_HTML.jpg)\n\
  \n图 6-17\n应用程序登录页面\n\n在 LDAP 中，有两个用户：mnardone 和 lnardone。区别在于 mnardone 属于管理员组，因此他可以访问\
  \ `admin.html` 页面。\n\n因此，使用用户名 **mnardone** 和密码 **nardone01** 登录，您将能够访问管理员页面，如图\
  \ 6-18 所示。\n\n![../images/310331_2_En_6_Chapter/310331_2_En_6_Fig18_HTML.jpg](img/310331_2_En_6_Fig18_HTML.jpg)\n\
  \n图 6-18\n拥有管理员凭证的用户访问管理员页面\n\n如果您现在尝试使用 **lnardone** 用户和密码 **nardone02**，您将无法访问管理员页面，因为该用户不属于管理员组；您将收到如图\
  \ 6-19 所示的“访问被拒绝”消息。\n\n![../images/310331_2_En_6_Chapter/310331_2_En_6_Fig19_HTML.jpg](img/310331_2_En_6_Fig19_HTML.jpg)\n\
  \n图 6-19\n未授权用户收到“访问被拒绝”消息\n\n该配置并不难理解。登录配置位于 `SpringSecurityConfiguration` Java\
  \ 类中。\n\n`configure(HttpSecurity http)` 将配置 HTTP 的相关内容，如登录、注销等。最重要的配置值是 `.antMatchers(\"\
  /admin\").hasRole(\"ADMINISTRATORS\")`，它告诉您 `/admin` URL 只能由 LDAP 中属于管理员组的用户访问，正如您之前所见：\n\
  \n```\ndn: cn=administrators,ou=groups,dc=example,dc=com\nobjectclass: groupOfUniqueNames\n\
  objectclass: top\ncn: administrators\nuniqueMember: uid=mnardone,ou=people,dc=example,dc=com\n\
  ou: admin\n```\n\n在您的案例中，mnardone 属于 LDAP 管理员组，因此他可以访问 `/admin` 页面。\n请记住，您的所有条目都将相对于域名\
  \ `dc=example,dc=com`。\n\n接下来，`configure(AuthenticationManagerBuilder auth)` 将负责认证构建器，通过以下方式检查用户和\
  \ SHA 密码：\n\n```\n.ldapAuthentication()\n.userDnPatterns(\"uid={0},ou=people\")\n\
  .groupSearchBase(\"ou=groups\")\n.contextSource(contextSource())\n.passwordCompare()\n\
  .passwordEncoder(new LdapShaPasswordEncoder())\n.passwordAttribute(\"userPassword\"\
  );\n```\n\n因此，您定义了 LDAP DN 模式，以查找属于 `ou=people` 组的用户。\n最后，`DefaultSpringSecurityContextSource\
  \ contextSource()` 指定了要连接的 LDAP URL。\n\n从示例中可以看出，使用 Spring Security 为应用程序配置 LDAP\
  \ 基本支持作为认证解决方案并不复杂。事实上，由于模块化架构和精心设计的 XML 命名空间，这非常直接。对我们来说，LDAP 的复杂性在于 LDAP 本身。尽管它是一个简单的分层系统（非常类似于标准\
  \ Unix 系统中的文件系统），但某些术语和功能似乎有些复杂，并且与您在上一节中探索的基于数据库的解决方案有很大不同。\n\n正如我们之前所说，在企业内部网环境中，使用\
  \ LDAP 作为认证解决方案非常有意义，因为公司用户群已经集中存储在类似 LDAP 的目录中。将插件接入这个已有的用户管理基础设施，是重用公司内部用户信息的好方法，而无需编写一个需要与主存储库保持同步的并行认证数据存储。\n\
  \nX.509 认证\nX.509 认证是一种使用客户端证书而非用户名-密码组合来识别用户的认证方案。使用这种方法，客户端和服务器之间会发生一种称为*相互认证*的方案。实际上，相互认证意味着，作为安全套接字层\
  \ (SSL) 握手的一部分，服务器要求客户端通过提供证书来证明自己的身份。在生产级服务器中，传入的客户端证书需要由适当的证书颁发机构签发和签名。\n\n要使用客户端证书，应用程序需要在预期处理已认证用户的区域配置为使用\
  \ SSL 通道，因为 X.509 认证协议本身就是 SSL 协议的一部分。\n\n首先，让我们使用 Spring Initializr 在 [`https://start.spring.io/`](https://start.spring.io/)\
  \ 创建一个 Spring Security Boot 项目。\n\n使用以下依赖项创建新项目：Web、Security 和 Thymeleaf，如图 6-20\
  \ 所示。\n\n![../images/310331_2_En_6_Chapter/310331_2_En_6_Fig20_HTML.jpg](img/310331_2_En_6_Fig20_HTML.jpg)\n\
  \n图 6-20\n创建新的 Spring Initializr 项目\n\n打开项目并更新 `pom.xml` 文件，如清单 6-24 所示。\n\n```\n\
  \n4.0.0\n\n\n\n`org.springframework.boot`\n`spring-boot-starter-parent`\n`2.1.4.RELEASE`\n\
  \n`com.apress`\n`SpringSecurityX509Auth`\n`0.0.1-SNAPSHOT`\n`war`\n`SpringSecurityX509Auth`\n\
  用于 X509 认证的 Spring Security 项目\n\n`org.springframework.boot`\n`spring-boot-starter-security`\n\
  \n`org.springframework.boot`\n`spring-boot-starter-thymeleaf`\n\n`org.springframework.boot`\n\
  `spring-boot-starter-web`\n\n`org.springframework.boot`\n`spring-boot-starter-tomcat`\n\
  `provided`\n\n`org.springframework.boot`\n`spring-boot-starter-test`\n`test`\n\n\
  `org.springframework.security`\n`spring-security-test`\n`test`\n\n`org.springframework.boot`\n\
  `spring-boot-maven-plugin`\n\n**清单 6-24**\n**pom.xml 文件**\n\n与本章前面的 LDAP 项目类似，在\
  \ `templates` 目录下创建一个名为 `admin.html` 的 HTML 文件，如清单 6-25 所示。\n\n```\nSpring Security\
  \ 5 和 LDAP。\n\n欢迎：\n您已成功以管理员身份登录！\n\n此内容仅对已认证用户显示。\n\n此内容仅对管理员显示。\n\n清单 6-25\nadmin.html\n\
  ```\n\n现在，在项目的 `Java` 目录下创建三个包。\n\n*   `Configuration`：包含 `SpringSecurityConfiguration`\
  \ Java 类\n*   `Controller`：包含 `UserController` Java 类\n*   `Domain`：包含 `User` Java\
  \ 类\n\n现在创建三个 Java 类：`SpringSecurityConfiguration`、`UserController` 和 `User`。\n\n\
  我们先创建清单 6-26 中所示的 `SpringSecurityConfiguration` Java 类。\n\n```\npackage com.apress.SpringSecurityX509Auth.Configuration;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
  import org.springframework.security.config.annotation.method.configuration.EnableGlobalMethodSecurity;\n\
  import org.springframework.security.config.annotation.web.builders.HttpSecurity;\n\
  import org.springframework.security.config.annotation.web.configuration.EnableWebSecurity;\n\
  import org.springframework.security.config.annotation.web.configuration.WebSecurityConfigurerAdapter;\n\
  import org.springframework.security.core.authority.AuthorityUtils;\nimport org.springframework.security.core.userdetails.User;\n\
  import org.springframework.security.core.userdetails.UserDetails;\nimport org.springframework.security.core.userdetails.UserDetailsService;\n\
  import org.springframework.security.core.userdetails.UsernameNotFoundException;\n\
  import org.springframework.security.web.util.matcher.AntPathRequestMatcher;\n@Configuration\n\
  @EnableWebSecurity\n@EnableGlobalMethodSecurity(securedEnabled = true)\npublic class\
  \ SpringSecurityConfiguration extends WebSecurityConfigurerAdapter {\n@Override\n\
  protected void configure(HttpSecurity http) throws Exception {\nhttp\n.authorizeRequests()\n\
  .anyRequest().authenticated().and()\n.x509()\n.subjectPrincipalRegex(\"CN=(.*?)(?:,|$)\"\
  )\n.userDetailsService(userDetailsService())\n.and().logout()\n.logoutUrl(\"/perform_logout\"\
  )\n.logoutRequestMatcher(new AntPathRequestMatcher(\"/logout\"))\n.logoutSuccessUrl(\"\
  /admin\")\n.deleteCookies(\"JSESSIONID\")\n.invalidateHttpSession(true)\n.logoutRequestMatcher(new\
  \ AntPathRequestMatcher(\"/logout\"));\n}\n@Bean\npublic UserDetailsService userDetailsService()\
  \ {\nreturn (UserDetailsService) username -> {\nif (username.equals(\"nardone\"\
  )) {\nreturn new User(username, \"\",\nAuthorityUtils\n.commaSeparatedStringToAuthorityList(\"\
  ROLE_USER\"));\n} else {\nthrow new UsernameNotFoundException(String.format(\"User\
  \ %s not found\", username));\n}\n};\n}\n}\n清单 6-26\nSpringSecurityConfiguration\
  \ Java 类\n```\n\n这个 Java 类非常容易理解。一旦您提供了有效的客户端证书，它将通过以下代码行从中获取“CN”值：\n\n```\n.anyRequest().authenticated().and()\n\
  .x509()\n.subjectPrincipalRegex(\"CN=(.*?)(?:,|$)\")\n.userDetailsService(userDetailsService());\n\
  ```\n\n然后，它会检查“CN”值是否等于“**nardone**”。如果是，它将返回用户名为“**nardone**”、权限为 `ROLE_USER` 的用户，并授权该用户继续操作：\n\
  \n```\nif (username.equals(\"nardone\")) {\nreturn new User(username, \"\",\nAuthorityUtils\n\
  .commaSeparatedStringToAuthorityList(\"ROLE_USER\"));\n```\n\n现在创建清单 6-27 中所示的 `UserController`\
  \ Java 类。\n\n```\npackage com.apress.SpringSecurityX509Auth.Controller;\nimport\
  \ org.springframework.security.access.annotation.Secured;\nimport org.springframework.security.authentication.UsernamePasswordAuthenticationToken;\n\
  import org.springframework.security.config.annotation.web.builders.WebSecurity;\n\
  import org.springframework.security.core.Authentication;\nimport org.springframework.security.core.context.SecurityContextHolder;\n\
  import org.springframework.web.bind.annotation.*;\nimport com.apress.SpringSecurityX509Auth.Domain.User;\n\
  import org.springframework.web.servlet.ModelAndView;\n@RestController\npublic class\
  \ UserController {\n@Secured(\"ROLE_USER\")\n@RequestMapping(value = {\"/\",\"/admin\"\
  }, method = RequestMethod.GET)\npublic ModelAndView admin() {\nModelAndView modelAndView\
  \ = new ModelAndView();\nmodelAndView.setViewName(\"admin\");\nAuthentication auth\
  \ = SecurityContextHolder.getContext().getAuthentication();\nmodelAndView.addObject(\"\
  currentUser\", auth.getName());\nUser user = new User();\nreturn modelAndView;\n\
  }\npublic void configure(WebSecurity web) throws Exception {\nweb\n.ignoring()\n\
  .antMatchers(\"/resources/**\");\n}\n}\n清单 6-27\nUserController Java 类\n```\n\n\
  这是一个简单的用户控制器 Java 类，它将根据请求重定向 URL。\n\n现在创建清单 6-28 中所示的 `User` Java 类。\n\n```\npackage\
  \ com.apress.SpringSecurityX509Auth.Domain;\npublic class User {\nprivate String\
  \ name;\npublic User() {\nthis.name = name;\n}\npublic String getName() {\nreturn\
  \ name;\n}\npublic void setName(String name) {\nthis.name = name;\n}\n}\n清单 6-28\n\
  User Java 类\n```\n\n该类将从用于认证的 X.509 客户端证书中获取数据。\n这就是 Spring 处理客户端证书所需的全部配置。\n当然，事情并没有那么简单，工作也还没有完成。实际上，Spring\
  \ Security X.509 支持并不对用户进行认证。用户被假定为已经过认证，Spring Security 只是根据从证书中提取的信息创建一个成功的 `Authentication`\
  \ 对象，并以标准方式将其存储在 `SecurityContext` 中。\n因此，实际负责对用户进行认证（或者更准确地说，接受用户为正确标识的用户）的实体是\
  \ Web 服务器，它通过接受提供的客户端证书来完成此操作。基本上，如果服务器决定用户发送的证书是有效的，那么用户就是其所声称的身份，并得到认证。\n在生产系统中，Web\
  \ 服务器会确保客户端提供的证书由授权的可信机构签名。\n但是，您将使用一个测试环境，其中包含您常用的 Maven 配置的 Tomcat 安装，为此，您将配置一个自签名证书，并确保\
  \ Tomcat 接受它。\n在开始之前，请确保您已在机器上安装了 `openssl` 工具。从 [`https://wiki.openssl.org/index.php/Binaries`](https://wiki.openssl.org/index.php/Binaries)\
  \ 下载它。\n让我们创建所需的服务器和客户端证书。这非常简单，您将使用 `openssl` 工具来完成：\n\n对于服务器：\n\n1.  生成服务器私钥 (PEM)\
  \ 和服务器自签名证书 (CRT)：\n\n```\n    openssl req -x509 -newkey rsa:4096 -keyout serverPrivateKey.pem\
  \ -out server.crt -days 3650 -nodes\n    ```\n\n2.  创建一个包含私钥 (P12) 和相关自签名证书 (CRT)\
  \ 的 PKCS12 密钥库（使用的密码：changeit）：\n\n```\n    openssl pkcs12 -export -out keyStore.p12\
  \ -inkey serverPrivateKey.pem -in server.crt\n    ```\n\n3.  从服务器证书 (CRT) 生成服务器信任库\
  \ (JKS)：\n\n\n```content\n```\n    keytool -import -trustcacerts -alias root -file\
  \ server.crt -keystore trustStore.jks\n    ```\n\n针对客户端：\n\n1.  生成客户端的私钥（PEM）和证书签名请求（CSR）：\n\
  \n```\n    openssl req -new -newkey rsa:4096 -out request.csr -keyout myPrivateKey.pem\
  \ -nodes\n    ```\n\n针对客户端和服务器：\n\n1.  使用服务器私钥（PEM）和相关证书（CRT）签署客户端的证书签名请求（CSR）：\n\
  \n```\n    openssl x509 -req -days 360 -in request.csr -CA server.crt -CAkey serverPrivateKey.pem\
  \ -CAcreateserial -out nardone.crt -sha256\n    ```\n\n针对客户端：\n\n1.  验证客户端的证书（CRT）：\n\
  \n```\n    openssl x509 -text -noout -in nardone.crt\n    ```\n\n2.  创建一个包含客户端私钥（PEM）和相关自签名证书（CRT）的\
  \ PKCS12 密钥库（P12）：\n\n```\n    openssl pkcs12 -export -out client_nardone.p12 -inkey\
  \ myPrivateKey.pem -in nardone.crt -certfile myCertificate.crt\n    ```\n\n图 6-21\
  \ 和图 6-22 展示了您刚刚执行的部分客户端命令。\n\n![../images/310331_2_En_6_Chapter/310331_2_En_6_Fig22_HTML.jpg](img/310331_2_En_6_Fig22_HTML.jpg)\n\
