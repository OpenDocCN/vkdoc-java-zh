  } else {\nuserName = principal.toString();\n}\nreturn userName;\n}\n}\n清单 3-7\n\
  UserController Java 类\n```\n\n\n\n这个 Java 类主要用于处理和控制您网页的请求。因此，通过使用 `@GetMapping`，该类将处理诸如欢迎、认证和注销等网络请求。此外，该类通过名为\
  \ `getPrincipal` 的函数，将提取已登录用户的名称，以便在 `authenticated.jsp` 页面上显示。请注意，`@GetMapping`\
