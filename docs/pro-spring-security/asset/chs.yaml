  \ `.jsp` 网页。\n接下来，导入你在第 3 章中使用的所有 Java 类。\n\n在 Java 包 `com.apress.pss.springsecurity.controller`\
  \ 下，复制：\n\n*   `UserController`\n\n在 Java 包 `com.apress.pss.springsecurity.configuration`\
  \ 下，复制：\n\n*   `AppInitializer`\n\n*   `SecurityConfiguration`\n\n*   `SpringSecurityInitializer`\n\
  \n*   `UserConfiguration`\n\n请注意，就 Web 安全而言，无论你像这里一样使用 Spring MVC 控制器，还是像第 3 章那样使用简单的\
  \ Servlet，或者使用任何其他基于 Servlet 的框架来开发应用程序，这都无关紧要。请记住，Spring Security 的 Web 部分在核心上基本上是附加到标准\
  \ Java Servlet 过滤器架构上的。因此，如果你的应用程序使用 Servlet 和过滤器，你可以利用 Spring Security 的 Web 支持。\n\
  \n自 Spring Framework 4.3 起，出现了一些基于 `@RequestMapping` 的新 HTTP 映射注解：\n\n*   `@GetMapping`\n\
  \n*   `@PostMapping`\n\n*   `@PutMapping`\n\n*   `@DeleteMapping`\n\n*   `@PatchMapping`\n\
  \n例如，`@GetMapping` 是 `@RequestMapping` 注解的一个特化版本，它将作为 `@RequestMapping(method =\
  \ RequestMethod.GET)` 的快捷方式。`@GetMapping` 注解的方法用于处理与特定 URI 表达式匹配的 HTTP GET 请求。\n\
  现在你已经从第 3 章复制了 Java 类，你可以开始对它们进行修改了。\n让我们从 Java 控制器文件开始，在其中使用 `@GetMapping` 定义值为\
  \ `/`、`/index` 和 `/movies` 的控制器，这些控制器将触发 `index.jsp` 和 `movies.jsp` 页面。\n\n`UserController\
  \ Java 类` 可以在清单 5-3 中找到。\n\n\n\n```\npackage com.apress.pss.springsecurity.controller;\n\
  import javax.servlet.http.HttpServletRequest;\nimport javax.servlet.http.HttpServletResponse;\n\
  import org.springframework.security.core.Authentication;\nimport org.springframework.security.core.context.SecurityContextHolder;\n\
  import org.springframework.security.web.authentication.logout.SecurityContextLogoutHandler;\n\
  import org.springframework.stereotype.Controller;\nimport org.springframework.ui.ModelMap;\n\
  import org.springframework.web.bind.annotation.GetMapping;\n@Controller\npublic\
  \ class UserController {\n@GetMapping (\"/\")\npublic String home() {\nreturn \"\
  index\";\n}\n@GetMapping (\"/index\")\npublic String index() {\nreturn \"index\"\
  ;\n}\n@GetMapping (\"/movies\")\npublic String movies() {\nreturn \"movies\";\n\
  }\n}\n代码清单 5-3\nUserController 控制器\n```\n\n可以看到，在这个控制器中，你指定了将要接收的请求的 URL、HTTP 方法以及请求体。URL\
  \ 是通过将类级别的 `RequestMapping` 注解的值与方法级别的 `RequestMapping` 注解的值拼接而成的。因此，你的 `URL 是 movies`。HTTP\
  \ 方法在方法的 `RequestMapping` 注解中被指定为 POST。方法参数中的 `RequestBody` 注解只是告诉 Spring，用请求体中的字符串来填充\
  \ movie 参数。而方法级别的 `ResponseBody` 注解则告诉 Spring，将方法的返回值作为响应的主体内容。\n\n接下来，让我们创建一个简单的\
  \ `.jsp` 页面，命名为 `movies.jsp`，如代码清单 5-4 所示。\n\n```\n\n我最喜欢的电影列表：\nIl Postino\nLa\
  \ vita e' bella\nNottingHill\n\n代码清单 5-4\nmovies.jsp 页面\n```\n\n由于目前尚未要求用户认证，你可以通过构建应用程序、打开\
  \ URL `http://localhost:8080/favoritesmovies/movies` 来测试新功能，结果如图 5-3 所示。\n\n![../images/310331_2_En_5_Chapter/310331_2_En_5_Fig3_HTML.jpg](img/310331_2_En_5_Fig3_HTML.jpg)\n\
  \n图 5-3\n使用 .jsp 网页执行项目\n\n如你所见，使用 `/movies` 控制器的应用程序将触发 `movies.jsp` 页面并显示电影列表。\n\
  \n现在让我们进行配置，使得 `/movies` 控制器要求经过认证且拥有 ADMIN 角色的用户才能访问。将第 3 章的 `SecurityConfiguration`\
  \ Java 类更新为代码清单 5-5 所示的代码。\n\n```\npackage com.apress.pss.springsecurity.configuration;\n\
  import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.security.config.annotation.authentication.builders.AuthenticationManagerBuilder;\n\
  import org.springframework.security.config.annotation.web.builders.HttpSecurity;\n\
  import org.springframework.security.config.annotation.web.configuration.EnableWebSecurity;\n\
  import org.springframework.security.config.annotation.web.configuration.WebSecurityConfigurerAdapter;\n\
  import org.springframework.security.crypto.bcrypt.BCryptPasswordEncoder;\nimport\
  \ org.springframework.security.crypto.password.PasswordEncoder;\n@Configuration\n\
  @EnableWebSecurity\npublic class SecurityConfiguration extends WebSecurityConfigurerAdapter\
  \ {\n@Autowired\nPasswordEncoder passwordEncoder;\n@Override\nprotected void configure(AuthenticationManagerBuilder\
  \ auth) throws Exception {\nauth.inMemoryAuthentication()\n.passwordEncoder(passwordEncoder)\n\
  .withUser(\"admin\").password(passwordEncoder.encode(\"admin123\")).roles(\"ADMIN\"\
  );\n}\n@Bean\npublic PasswordEncoder passwordEncoder() {\nreturn new BCryptPasswordEncoder();\n\
  }\n@Override\nprotected void configure(HttpSecurity http) throws Exception {\nhttp.authorizeRequests()\n\
  .antMatchers(\"/\", \"/index\", \"/login\").permitAll()\n.antMatchers(\"/**\").hasRole(\"\
  ADMIN\")\n.and().formLogin()\n.and().logout().logoutSuccessUrl(\"/index\").permitAll()\n\
  .and().csrf().disable();\n}\n}\n代码清单 5-5\nSecurityConfiguration Java 类\n```\n\n\
  这段代码非常简单，基本上 `/`、`/index` 和 `/login` 控制器无需认证即可访问，而通过 `/**` 匹配的任何其他页面都需要经过认证且拥有 ADMIN\
  \ 角色的用户才能访问。你将使用 Spring Security v5 自动生成的默认登录页面。当使用注销链接时，需要执行注销操作；这将在后面解释。最后，如第\
  \ 3 章所述，跨站请求伪造功能已被禁用。\n\n接下来，将 `movies.jsp` 页面更新为：\n\n```\n\nSpring Security 认证示例\n\
  \n我最喜欢的电影列表：\nIl Postino\nLa vita e' bella\nNottingHill\n\n\">注销\n\n```\n\n现在，你已经拥有了此示例所需的所有文件并完成了配置。你希望像之前一样访问相同的\
  \ URL 来进入 `movies.jsp` 页面，但这次 Spring Security 会要求你提供管理员凭证才能访问。重启应用程序，并在浏览器的地址栏中粘贴以下\
  \ URL：`http://localhost:8080/favoritesmovies/movies`。\n\n这一次，你的浏览器应该会被重定向到 URL `http://localhost:8080/favoritesmovies/login`，并显示你在第\
  \ 3 章中熟悉的登录表单，如图 5-4 所示。以 `admin/admin123` 身份登录，你就可以作为管理员访问 `movies.jsp 页面`。\n\n\
  ![../images/310331_2_En_5_Chapter/310331_2_En_5_Fig4_HTML.jpg](img/310331_2_En_5_Fig4_HTML.jpg)\n\
  \n图 5-4\nSpring Security v5 登录表单\n\n一旦管理员凭证正确，Spring Security 将允许访问 `movies.jsp`\
  \ 页面，如图 5-5 所示。\n\n![../images/310331_2_En_5_Chapter/310331_2_En_5_Fig5_HTML.jpg](img/310331_2_En_5_Fig5_HTML.jpg)\n\
  \n图 5-5\n使用管理员凭证访问的电影页面\n\n\n\n请注意，我们添加了一个登出链接，以便在需要时实际注销用户。本章稍后将更详细地解释如何使用 Spring\
  \ Security 的登录和登出 URL。\n\n现在，你将更详细地了解应用程序内部发生了什么，以及你刚刚定义的配置如何帮助保护应用程序。你将跟随请求在框架中的完整旅程，并观察它所经历的不同步骤。当你向配置的\
  \ URL 发出 HTTP 请求，并且你的 Servlet 容器处理完该请求后，该请求会到达 `DelegatingFilterProxy`，而后者又会将处理委托给安全相关的\
  \ `FilterChainProxy`。\n\n通常，Spring Security 会使用大量过滤器。以 HTTP 请求过滤器为例，它将用于：\n\n* \
  \  拦截请求。\n*   检测身份验证（或缺失）。\n*   重定向到身份验证入口点。\n*   将请求传递给授权服务。\n*   将请求发送到 Servlet\
  \ 或抛出安全异常。\n\n在 Spring Security v5 中，最重要的过滤器如下：\n\n安全过滤器链：\n\n*   `DelegatingFilterProxy`\n\
  *   `FilterChainProxy`\n\n核心安全过滤器：\n\n*   `FilterSecurityInterceptor`\n*   `ExceptionTranslationFilter`\n\
  *   `SecurityContextPersistenceFilter`\n*   `UsernamePasswordAuthenticationFilter`\n\
  *   `AnonymousAuthenticationFilter`\n\n基本和摘要身份验证过滤器：\n\n*   `BasicAuthenticationFilter`\n\
  *   `DigestAuthenticationFilter`\n\n会话管理：\n\n*   `SessionManagementFilter`\n\nCSRF\
  \ 注意事项：\n\n*   `HiddenHttpMethodFilter`\n\n预认证场景：\n\n*   `AbstractPreAuthenticatedProcessingFilter`\n\
  \n`LogoutSuccessHandler`：\n\n*   `LogoutFilter`\n\nSpring Security 感知的 `HttpServletRequestWrapper`：\n\
  \n*   `SecurityContextHolderAwareRequestFilter`\n\n`RequestCache`：\n\n*   `RequestCacheFilter`\n\
  \nHTTP 请求和身份验证过程及过滤器将在第 4 章中解释。\n\n让我们看看在登录时提供错误或正确凭据会发生什么。当浏览器被重定向并请求 URL `/login`\
  \ 时，会发生以下情况：\n\n*   该过程与第一个请求相同，直到它到达 `DefaultLoginPageGeneratingFilter`。此时，过滤器检测到请求是针对\
  \ URL `/login` 的，并将登录表单的 HTML 数据直接写入响应对象。然后渲染响应。\n\n现在尝试使用错误的凭据登录。让我们跟随请求在框架中的旅程，看看会发生什么：\n\
  \n![../images/310331_2_En_5_Chapter/310331_2_En_5_Fig6_HTML.jpg](img/310331_2_En_5_Fig6_HTML.jpg)\n\
  \n图 5-6\n身份验证详细信息不正确时的身份验证过滤器\n\n1.  在登录表单中，输入用户名 **user** 和密码 **uspass**。\n2. \
  \ 提交表单后，过滤器会以与之前相同的顺序再次被激活。然而，这次当请求到达 `UsernamePasswordAuthenticationFilter` 时，过滤器会检查请求是否针对\
  \ URL `/login`，并确认确实如此。过滤器分别从 HTTP 请求参数 `username` 和 `password` 中提取用户名和密码身份验证信息。利用这些信息，它创建了\
  \ `UsernamePasswordAuthenticationToken Authentication` 对象，然后将其发送给 `AuthenticationManager`（更准确地说，是其默认实现\
  \ `ProviderManager`）进行身份验证。\n3.  `DaoAuthenticationProvider` 被 `ProviderManager`\
  \ 使用 `Authentication` 对象调用。`DaoAuthentication` 提供者是 `AuthenticationProvider` 的一个实现，它使用\
  \ `UserDetailsService` 策略从任何存储用户的地方检索用户。根据你当前的配置，它将尝试使用配置的 `InMemoryUserDetailsManager`（`UserDetailsService`\
  \ 的实现，它在 `java.util.Map` 中维护内存中的用户存储）来查找用户名为 user 的用户。由于没有此用户名的用户，提供者会抛出 `UsernameNotFoundException`\
  \ 异常。\n4.  提供者自身捕获此异常，并将其转换为 `BadCredentialsException`，以隐藏应用程序中不存在该用户的事实；相反，它将错误视为常见的用户名-密码组合错误。\n\
  5.  该异常被 `UsernamePasswordAuthenticationFilter` 捕获。此过滤器将处理委托给 `AuthenticationFailureHandler`\
  \ 实现的一个实例，该实例进而决定将响应重定向到 URL `/login?error`。这样，登录表单会再次在浏览器中显示，并附带一条错误消息。你可以在图 5-6\
  \ 中看到此交互。\n\n现在让我们使用正确的凭据登录。\n\n首先，在控制器中创建一个新的端点来检索一些简单的文本。在控制器 `UserController`\
  \ 中，创建清单 5-6 中名为 `/showmovie` 的方法。\n\n```\n@GetMapping(\"/showmovie\")\n@ResponseBody\n\
  public String showMovie() {\nreturn \"movie x\";\n}\n清单 5-6\n一个返回简单字符串的简单端点方法\n\
  ```\n\n重新启动应用程序，回到 URL `http:/localhost:8080/favoritesmovies/showmovie`，并在表单中输入用户名\
  \ **admin** 和密码 **admin123**。然后点击登录按钮。\n\n*   请求遵循与之前相同的过滤器路径。这次，`InMemoryUserDetailsManager`\
  \ 找到了一个具有所请求用户名的用户，并将其返回给 `DaoAuthenticationProvider`，后者创建了一个成功的 `Authentication`\
  \ 对象。\n*   成功认证后，`UsernamePasswordAuthenticationFilter` 将处理委托给 `SavedRequestAwareAuthenticationSuccessHandler`\
  \ 的一个实例，该实例在会话中查找原始请求的 URL（`/showmovie`），并将响应重定向到该 URL。\n\n当请求 `http://localhost:8080/favoritesmovies/showmovie`\
  \ 时，请求会像之前的情况一样，沿着过滤器链进行处理。不过，这次系统中已经有一个完全通过身份验证的实体。请求到达 `FilterSecurityInterceptor`。\n\
  \n![../images/310331_2_En_5_Chapter/310331_2_En_5_Fig8_HTML.jpg](img/310331_2_En_5_Fig8_HTML.jpg)\n\
  \n图 5-8\n成功认证和授权过程的整体流程\n\n*   `FilterSecurityInterceptor` 收到对 URL `/showmovie`\
  \ 的访问请求。然后，它恢复访问该 URL 所需的凭据（`ROLE_ADMIN`）。\n*   `AffirmativeBased` 访问决策管理器被调用，进而调用\
  \ `RoleVoter` 投票器。投票器评估已认证实体的权限列表，并将其与访问资源所需的凭据进行比较。由于投票器找到了匹配项（`ROLE_ADMIN` 同时存在于\
  \ `Authentication` 的权限和资源的 `config` 属性中），它投出了 `ACCESS_GRANTED` 票。\n*   `FilterSecurityInterceptor`\
  \ 将请求转发给请求处理链中的下一个元素，在本例中是 Spring 的 `DispatcherServlet`。\n\n\n\n*   请求到达 `AdminController`，它简单地返回字符串\
  \ `movie x`，然后该字符串被渲染到浏览器。图 5-7 展示了这一结果。\n\n![../images/310331_2_En_5_Chapter/310331_2_En_5_Fig7_HTML.jpg](img/310331_2_En_5_Fig7_HTML.jpg)\n\
  \n图 5-7\n\n使用正确凭证访问时返回的 showmovie 页面\n\n*   这是认证与授权过程的完整流程。图 5-8 以伪流程图的形式展示了这一完整交互。\n\
  \n特殊 URL\n\n从前面的解释中，你可以看到 Spring Security 对 Web 安全的支持为你定义了一些预配置的 URL，供你在应用程序中使用。这些\
  \ URL 在框架中会得到特殊处理。主要的有以下几个：\n\n*   `/login`：\n    这是 Spring Security 用于显示应用程序登录表单的\
  \ URL。当需要认证但尚未存在时，框架会重定向到此 URL。\n\n*   `/logout`：\n    框架使用此 URL 来注销当前登录的用户，并使相应的会话和\
  \ `SecurityContext` 失效。\n\n从上述 URL 来看，首先想到的是如何在应用程序中配置自己的登录表单，以及通常如何自定义登录过程，而不是使用默认的。这就是我们接下来要做的。\n\
  \n注意\n   从 Spring Security v5 开始，`/login` 取代了在 Spring Security 4 中使用的 `/j_spring_security_check`。\n\
  \n自定义登录表单\n当你使用 Spring Security v5 时，对应用程序的用户认证请求是通过 `http.authorizeRequests()`\
  \ 方法完成的。\n当你像之前那样通过 `http.authorizeRequests()` 方法配置 `http` 元素时，Spring Security 会为你设置默认的登录和注销过程，包括登录\
  \ URL、登录表单、登录后的默认 URL 以及其他一些选项。基本上，当 Spring Security 的上下文开始加载时，它会发现没有配置自定义登录页面 URL，因此它会采用默认的\
  \ URL，并创建一个新的 `DefaultLoginPageGeneratingFilter` 实例，该实例将被添加到过滤器链中。正如你之前所见，这个过滤器就是为你生成登录表单的那个。\n\
  \n如果你想配置自己的表单，需要执行以下任务。首先要告诉框架用你自己的处理方式替换默认处理方式。你在 `SecurityConfiguration` Java\
  \ 文件中将以下元素定义为 `http.authorizeRequests()` 方法的子元素：\n\n```\nformLogin().loginPage(\"\
  /登录页面的名称\")\n```\n\n这个元素告诉 Spring Security 在启动时更改其默认的登录处理机制。首先，`DefaultLoginPageGeneratingFilter`\
  \ 将不再被实例化。让我们先尝试这个配置。应用新配置后，重启应用程序并尝试访问 URL `http://localhost:8080/favoritesmovies/movies`。\n\
  \n你会被重定向到 URL `/login`，并收到一个 404 HTTP 错误，因为你还没有为此 URL 定义任何处理器。这个 404 页面如图 5-9 所示。\n\
  \n![../images/310331_2_En_5_Chapter/310331_2_En_5_Fig9_HTML.jpg](img/310331_2_En_5_Fig9_HTML.jpg)\n\
  \n图 5-9\n定义新的登录处理页面时出现的 404 错误\n\n让我们在 `UserController` 中添加一个登录控制器，如清单 5-7 所示。\n\
  \n```\n@GetMapping(\"/login\")\npublic String loginPage() {\nreturn \"login\";\n\
  }\n清单 5-7\n添加到 UserController 的登录控制器\n```\n\n接下来，将以下行添加到 SecurityConfiguration 文件中：\n\
  \n```\n.and().formLogin().loginPage(\"/login\").permitAll()\n```\n\n现在，根据清单 5-8\
  \ 在你的应用程序的 `WEB-INF/views` 文件夹中创建 `login.jsp` 页面。\n\n```\n\nSpring Security 自定义登录表单\n\
  \nSpring Security 自定义登录表单：\n\n使用用户名和密码登录\n\n用户：\n\n密码：\n\n记住我：\n\n清单 5-8\n自定义 login.jsp\n\
  ```\n\n如果你重启应用程序并再次访问 `http://localhost:8080/favoritesmovies/movies`，当你被重定向到 `/login`\
  \ URL 时，你应该会看到新的登录表单。该表单如图 5-10 所示。如果你输入 **admin** 作为用户名，**admin123** 作为密码，你将能够访问\
  \ `movie x` 页面，就像之前使用默认登录表单一样。\n\n![../images/310331_2_En_5_Chapter/310331_2_En_5_Fig10_HTML.jpg](img/310331_2_En_5_Fig10_HTML.jpg)\n\
  \n图 5-10\n自定义登录表单\n\n如果你查看 `login.jsp`，可以看到用户名字段、密码字段、记住我复选框以及表单元素的 action 属性都有特定的名称。这些名称并非随意指定。Spring\
  \ Security 期望使用这些特定的名称，以便正确处理认证过程。此外，表单应使用 POST 方法将信息发送到服务器，因为这是框架的要求。\n图中显示的“记住我”复选框将在后面解释。\n\
  `<form-login>` 元素支持更多配置选项，包括更改认证请求参数的默认 `username` 和 `password` 名称。\n\n`<form-login>`\
  \ 的属性可能包括\n\n*   `always-use-default-target`\n\n*   `authentication-details-source-ref`\n\
  \n*   `authentication-failure-handler-ref`\n\n*   `authentication-failure-url`\n\
  \n*   `authentication-success-handler-ref`\n\n*   `default-target-url`\n\n*   `login-page`\n\
  \n*   `login-processing-url`\n\n*   `password-parameter`\n\n*   `username-parameter`\n\
  \n*   `authentication-success-forward-url`\n\n*   `authentication-failure-forward-url`\n\
  \n重启应用程序，访问 URL `/movies`，并使用 **admin**/**admin123** 登录。你应该能够毫无问题地访问应用程序。\n\n将此属性赋值为\
  \ `/login`。然后，在你的 `login.jsp` 中，在 `<body>` 标签之后添加清单 5-9 中的内容。\n\n```\n清单 5-9\n显示\
  \ login.jsp 中错误的代码片段\n```\n\n如果你现在重启应用程序，尝试访问 URL `http://localhost:8080/favoritesmovies/movies`，并使用错误的用户名和密码，你将再次看到登录页面，但顶部会显示错误消息。请查看图\
  \ 5-11 了解你应该看到的页面。\n\n![../images/310331_2_En_5_Chapter/310331_2_En_5_Fig11_HTML.jpg](img/310331_2_En_5_Fig11_HTML.jpg)\n\
  \n图 5-11\n自定义表单中显示的自定义错误\n\n请注意，此 URL 可能是一个完全不同的 URL，与登录 URL 完全无关。但常见的模式是允许用户再次尝试登录，并向其显示任何错误。\n\
  \n*   `authentication-success-handler-ref`：\n    对 Spring 应用程序上下文中 `AuthenticationSuccessHandler`\
  \ bean 的引用。此 bean 在成功认证时被调用，并应处理认证后的下一步操作，通常决定应用程序中的重定向目标。当前实现形式为 `SavedRequestAwareAuthenticationSuccessHandler`，它负责在成功认证后将登录用户重定向到最初请求的\
  \ URL。\n\n*   `authentication-failure-handler-ref`：\n    对 Spring 应用程序上下文中 `AuthenticationFailureHandler`\
  \ bean 的引用。它用于处理失败的认证请求。当认证失败时，会调用此处理器。该处理器的标准行为是再次显示登录屏幕或返回 401 HTTP 状态错误。此行为由具体类\
  \ `SimpleUrlAuthenticationFailureHandler` 提供。\n\n\n\n让我们开发一个简单的 `AuthenticationFailureHandler`\
  \ 接口实现示例。当认证失败时，它将简单地返回一个 500 状态码。根据清单 5-10 创建 `CustomAuthenticationFailureHandler`\
  \ 类。\n\n```\npackage com.apress.pss.springsecurity.configuration;\nimport org.springframework.security.web.authentication.AuthenticationFailureHandler;\n\
  import org.springframework.security.core.AuthenticationException;\nimport javax.servlet.http.HttpServletRequest;\n\
  import javax.servlet.http.HttpServletResponse;\nimport java.io.IOException;\npublic\
  \ class CustomAuthenticationFailureHandler implements AuthenticationFailureHandler\
  \ {\n@Override\npublic void onAuthenticationFailure(HttpServletRequest request,\
  \ HttpServletResponse response, AuthenticationException e) throws\nIOException {\n\
  response.sendError(500);\n}\n}\n清单 5-10\n用于 ServerErrorFailureHandler 的 AuthenticationFailureHandler\
  \ 实现\n```\n\n然后，将以下内容添加到 `SecurityConfiguration` 类文件中：\n\n```\n.and().formLogin().loginPage(\"\
  /login\").permitAll().failureHandler(new CustomAuthenticationFailureHandler())\n\
  ```\n\n以及新的 Bean：\n\n```\n@Bean\npublic AuthenticationFailureHandler customAuthenticationFailureHandler()\
  \ {\nreturn new CustomAuthenticationFailureHandler();\n}\n```\n\n重启应用程序，访问 `http://localhost:8080/favoritesmovies/movies`，使用任意用户名和密码，然后点击提交按钮。你应该会在浏览器中看到一个\
  \ 500 错误。\n\n清单 5-11 展示了到目前为止完全更新后的 `SecurityConfiguration` 文件。\n\n```\npackage\
  \ com.apress.pss.springsecurity.configuration;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
  import org.springframework.security.config.annotation.authentication.builders.AuthenticationManagerBuilder;\n\
  import org.springframework.security.config.annotation.web.builders.HttpSecurity;\n\
  import org.springframework.security.config.annotation.web.configuration.EnableWebSecurity;\n\
  import org.springframework.security.config.annotation.web.configuration.WebSecurityConfigurerAdapter;\n\
  import org.springframework.security.crypto.bcrypt.BCryptPasswordEncoder;\nimport\
  \ org.springframework.security.crypto.password.PasswordEncoder;\nimport org.springframework.security.web.authentication.AuthenticationFailureHandler;\n\
  @Configuration\n@EnableWebSecurity\npublic class SecurityConfiguration extends WebSecurityConfigurerAdapter\
  \ {\n@Autowired\nPasswordEncoder passwordEncoder;\n@Override\nprotected void configure(AuthenticationManagerBuilder\
  \ auth) throws Exception {\nauth.inMemoryAuthentication()\n.passwordEncoder(passwordEncoder)\n\
  .withUser(\"admin\").password(passwordEncoder.encode(\"admin123\")).roles(\"ADMIN\"\
  );\n}\n@Bean\npublic PasswordEncoder passwordEncoder() {\nreturn new BCryptPasswordEncoder();\n\
  }\n@Override\nprotected void configure(HttpSecurity http) throws Exception {\nhttp.authorizeRequests()\n\
  .antMatchers(\"/\", \"/login\").permitAll()\n.antMatchers(\"/**\").hasRole(\"ADMIN\"\
  )\n.and().formLogin().loginPage(\"/login\").permitAll().failureHandler(new CustomAuthenticationFailureHandler())\n\
  .and().csrf().disable();\n}\n@Bean\npublic AuthenticationFailureHandler customAuthenticationFailureHandler()\
  \ {\nreturn new CustomAuthenticationFailureHandler();\n}\n}\n清单 5-11\nSecurityConfiguration\n\
  ```\n\n基本 HTTP 认证\n有时，你无法真正使用登录表单来认证用户。例如，如果你的应用程序旨在被其他系统调用而非人类用户，那么向其他应用程序显示登录表单就没有意义。这是一个非常常见的用例。Web\
  \ 服务在没有用户交互的情况下相互通信，ESB 系统将系统彼此集成，JMS 客户端从其他系统生成和消费消息。\n在需要无需人类用户访问的 HTTP 暴露接口的上下文中，一种常见的方法是使用\
  \ HTTP 基本认证头。HTTP 认证头允许你将安全信息（用户名和密码）嵌入到发送给服务器的请求头中，而不是像登录表单认证那样将其发送在请求体中。\nHTTP\
  \ 使用一个标准头来携带此信息。这个头被恰当地命名为 `Authorization`。使用此头时，发送请求的客户端（例如浏览器）将用户名和密码用冒号连接起来，然后对结果字符串进行\
  \ Base64 编码，并将编码结果发送到头中。例如，如果你使用用户名 **neve** 和密码 **nardone**，客户端会创建字符串 `neve:nardone`，并在将其发送到头中之前对其进行编码。\n\
  \n让我们在你的应用程序中使用基本 HTTP 认证。你需要做的第一件也是唯一一件事是移除配置文件 `SecurityConfiguration` 中的 `.formlogin()`\
  \ 元素，并添加\n\n```\n.httpBasic()\n```\n\n替换后，重启应用程序，在浏览器中访问 URL `http://localhost:8080/favoritesmovies/movies`。一个标准的\
  \ HTTP 认证框会弹出，要求你输入认证详细信息，如图 5-12 所示。输入 **admin/admin123** 作为用户名和密码，然后发送请求。你将成功进入之前已经见过几次的电影页面（图\
  \ 5-5）。\n\n![../images/310331_2_En_5_Chapter/310331_2_En_5_Fig12_HTML.jpg](img/310331_2_En_5_Fig12_HTML.jpg)\n\
  \n图 5-12\n标准 HTTP 认证表单，基本认证配置\n\n当你使用 `httpBasic` 配置元素时，Spring `Security's BasicAuthenticationFilter`\
  \ 会开始工作。一个 `BasicAuthenticationEntryPoint` 策略将在启动时被配置到 `ExceptionTranslationFilter`\
  \ 中。当你第一次向 URL `/movies` 发出请求时，框架的行为与之前相同，抛出一个由 `ExceptionTranslationFilter` 处理的访问拒绝异常。此过滤器委托给\
  \ `AuthenticationEntryPoint` 的特定实现策略——在本例中是 `BasicAuthenticationEntryPoint`。`BasicAuthenticationEntryPoint`\
  \ 将头 `WWW-Authenticate: Basic realm=\"Spring Security Application\"` 添加到响应中，然后向客户端发送\
  \ HTTP 状态码 401（未授权）。客户端应该知道如何处理此代码并相应地进行操作。（在浏览器的情况下，它只是显示认证弹出窗口。）\n当你输入用户名和密码并提交请求时，请求再次沿着过滤器链进行，直到到达\
  \ `BasicAuthenticationFilter`。此过滤器检查请求头，查找以 `Basic` 开头的 `Authorization` 头。过滤器提取头的内容，使用\
  \ `Base64.decode` 解码字符串，然后提取用户名和密码。过滤器创建一个 `UsernamePasswordAuthenticationToken`\
  \ 对象，并以标准方式将其发送给认证管理器进行认证。认证管理器将要求认证提供者检索用户，然后使用该用户创建一个 `Authentication` 对象。此过程是标准的，与使用基本认证还是表单认证无关。\n\
  \n\n\n摘要认证\n摘要认证是 HTTP 基本认证的**近亲**。其主要目的是避免像基本认证那样在网络上传输明文密码，通过在发送密码前对其进行哈希处理来实现。这使得摘要认证比基本认证更复杂。摘要认证与基本认证一样，通过\
  \ HTTP 头部进行工作。\n\n摘要认证基于使用一次性随机数（nonce）对密码进行哈希处理。*一次性随机数*是服务器生成的一个任意数字，在认证过程中使用且仅使用一次。它会与用户名、密码、一次性随机数、请求的\
  \ URI 等信息一起参与摘要计算。在认证过程中，服务器和客户端都会进行摘要计算，并且结果应该一致。\n\n主要处理逻辑位于两个类中：`DigestAuthenticationFilter`\
  \ 和 `DigestAuthenticationEntryPoint`。\n`DigestAuthenticationFilter` 查询请求头以寻找 `Authorization`\
  \ 头部，然后检查该头部的值是否以 `Digest` 开头。如果是，则表明该请求携带了用于认证的安全凭证。\n`DigestAuthenticationEntryPoint`\
  \ 是被调用来生成响应、要求启动摘要安全认证过程的类。该类会设置 `WWW-Authenticate` 头部，并填入正确的值（包括一次性随机数），以便客户端代理（浏览器）知道它必须启动摘要认证过程。\n\
  \n要配置摘要认证，请使用以下代码行更新 `SecurityConfiguration` 文件：\n\n```\nhttp.addFilter(digestAuthenticationFilter())\n\
  .exceptionHandling().authenticationEntryPoint(digestEntryPoint())\n```\n\n接下来，添加以下\
  \ Bean 来添加 `DigestAuthentication` 过滤器：\n\n```\nprivate DigestAuthenticationFilter\
  \ digestAuthenticationFilter() throws Exception {\nDigestAuthenticationFilter digestAuthenticationFilter\
  \ = new DigestAuthenticationFilter();\ndigestAuthenticationFilter.setUserDetailsService(userDetailsServiceBean());\n\
  digestAuthenticationFilter.setAuthenticationEntryPoint(digestEntryPoint());\nreturn\
  \ digestAuthenticationFilter;\n}\n```\n\n然后，使用 `inMemoryUserDetailsManager` 定义用户名和密码：\n\
  \n```\n@Override\n@Bean\npublic UserDetailsService userDetailsServiceBean() {\n\
  InMemoryUserDetailsManager inMemoryUserDetailsManager = new InMemoryUserDetailsManager();\n\
  inMemoryUserDetailsManager.createUser(User.withUsername(\"admin\").password(passwordEncoder.encode(\"\
  admin123\")).roles( \"ADMIN\").build());\nreturn inMemoryUserDetailsManager;\n}\n\
  ```\n\n最后，定义 `digestEntryPoint`：\n\n```\n@Bean\nDigestAuthenticationEntryPoint digestEntryPoint()\
  \ {\nDigestAuthenticationEntryPoint bauth = new DigestAuthenticationEntryPoint();\n\
  bauth.setRealmName(\"Security Digest Authentication\");\nbauth.setKey(\"SecurityKey\"\
  );\nreturn bauth;\n```\n\n如果你重新启动应用程序并访问 `http://localhost:8080/favoritesmovies/movies`，将会看到一个浏览器对话框，要求输入用户名和密码，这与基本认证时显示的对话框完全相同。这就是\
  \ `DigestAuthenticationEntryPoint` 的作用。如前所述，该入口点会用所需的头部信息填充响应对象，以便浏览器知道它需要显示登录表单。使用用户名\
  \ **admin** 和密码 **admin123** 登录，你应该能够访问请求的 URL。\n\n浏览器会使用输入的密码创建自己的摘要消息，并将其放入头部。它还会将剩余的信息——即一次性随机数、客户端随机数、域等——放入\
  \ `Digest` 头部。以下是一个随当前请求发送到服务器的 `Digest` 头部示例：\n\n```\n'Digest username=\"admin\"\
  , realm=\" Security Digest Authentication\",\nnonce=\"MTM1NTY3NDc3NDIy....==\",\
  \ uri=\" /movies\",\nresponse=\"225ea6fbad618cfdf1da7d4f7efe53b8\", qop=auth,\n\
  nc=00000002, cnonce=\"376a9b27621880bd\"'\n```\n\n当请求到达 `DigestAuthenticationFilter`\
  \ 时，请求头中包含所需的摘要认证头部。该头部中的信息以 CSV 字符串形式到达，包含上一段中显示的所有必需信息，包括一次性随机数和客户端随机数（`cnonce`）。（一次性随机数是在加密通信中仅使用一次的任意数字。请参阅\
  \ [`http://en.wikipedia.org/wiki/Cryptographic_nonce`](http://en.wikipedia.org/wiki/Cryptographic_nonce)）。过滤器从头部提取信息，从\
  \ `UserDetailsService` 中检索用户，然后使用检索到的用户密码计算摘要，以查看摘要是否与客户端在头部中发送的摘要匹配。如果匹配，则授予访问权限。\n\
  \n记住我认证\n记住我认证功能用于允许应用程序的回头用户无需每次都登录即可使用。基本上，应用程序会记住某些访客，允许他们直接打开应用程序，并看到为其个性化定制的应用程序版本，就像他们已登录一样。\n\
  记住我功能对用户来说非常方便；然而，它也非常危险，建议仅在私人（家庭）环境中使用。\n问题显而易见。如果你在公共计算机上使用某个应用程序，并且该应用程序记住了你的个人信息，那么下一个从该计算机访问该应用程序的人将能够毫不费力地冒充你。\n\
  通常的做法是在记住我会话中仅提供有限的功能。这意味着，即使你通过记住我功能自动登录，你也无法访问应用程序的全部功能。应用程序中更敏感的部分可能需要你正式登录才能使用。\n\
  例如，Amazon.com 就是这种情况。当你访问 Amazon.com 并登录后，下次访问 Amazon 时，网站会记住你、你的推荐、你的姓名以及其他关于你的信息。但如果你想购买东西，它会要求你完全登录才能使用该功能。\n\
  记住我认证通常通过向浏览器发送一个 cookie 来实现，该 cookie 在后续的应用程序会话中被发送回服务器以进行自动登录。\nSpring Security\
  \ 中的记住我功能是如何工作的？\nSpring Security 中的记住我功能主要由两个组件支持：`RememberMeServices` 接口和 `RememberMeAuthenticationFilter`\
  \ 类。让我们看看它们在请求上下文中是如何工作的。\n当应用程序启动时，`RememberMeAuthenticationFilter` 位于服务器的过滤器链中。同时，会实例化一个\
  \ `TokenBasedRememberMeServices` 并将其注入到 `AbstractAuthenticationProcessingFilter`\
  \ 中，替换掉无操作的 `NullRememberMeServices`。\n访问 `http://localhost:8080/favoritesmovies/movies`，并使用\
  \ **admin** 作为用户名、**admin123** 作为密码登录。\n当请求进入应用程序时，`UsernamePasswordAuthenticationFilter`（`AbstractAuthenticationProcessingFilter`\
  \ 的子类）会按照已解释的标准方式处理认证过程。\n认证成功后，`UsernamePasswordAuthenticationFilter` 会调用配置好的 `TokenBasedRememberMeServices`\
  \ 的 `loginSuccess` 方法。该方法会检查请求是否包含 `remember-me` 参数，以便应用记住我功能。（如果服务中的 `alwaysRemember`\
  \ 属性设置为 `true`，它也会应用记住我功能。）因为你没有发送此请求，所以不会发生任何事情。\n\n因此，让我们将参数添加到你的登录表单中。打开 `login.jsp`\
  \ 文件，并在 `<form>` 标签内的某处粘贴以下元素：\n\n```\n记住我：\n```\n\n然后在 `SecurityConfiguration`\
  \ 配置文件中添加以下内容：\n\n\n\n```\n.rememberMe() .key(\"remember-me\").rememberMeParameter(\"\
  remember-me\")\n.rememberMeCookieName(\"rememberloginnardone\").tokenValiditySeconds(100)\n\
  ```\n\n这几行代码定义了密钥名称、参数名称、Cookie 名称以及有效期（以秒为单位）。\n重启应用程序，访问 `http://localhost:8080/favoritesmovies/movies`。\n\
  现在，您应该会看到一个复选框，以及用户名和密码输入框。勾选该复选框，并使用 **admin**`/`**admin123** 登录。\n\n这一次，请求携带了所需的参数，`TokenBasedRememberMeServices`\
  \ 开始工作。它从 `Authentication` 对象中提取用户名和密码，并利用这些信息以及过期时间创建一个令牌。它基本上是将这三个值与 XML 元素中指定的记住我密钥（`favoritesmovies_key`）拼接起来，然后对生成的字符串进行\
  \ MD5 编码。该值将与用户名一起再次进行 Base64 编码，并作为名为 `rememberloginnardone` 的 Cookie 添加到响应中，返回给浏览器。您可以在图\
  \ 5-13 中看到这个 Cookie。\n\n![../images/310331_2_En_5_Chapter/310331_2_En_5_Fig13_HTML.jpg](img/310331_2_En_5_Fig13_HTML.jpg)\n\
  \n图 5-13\n记住我 Cookie 示例\n\n重启应用程序。访问 `http://localhost:8080/favoritesmovies/movies`。\n\
  您应该无需登录即可访问该页面。\n当此请求进入系统时，会被 `RememberMeAuthenticationFilter` 拦截，该过滤器随即开始工作。过滤器做的第一件事是检查\
  \ `SecurityContext` 中是否没有当前的 `Authentication` 对象。因为这意味着没有用户登录，所以过滤器会调用 `RememberMeServices`\
  \ 的 `autoLogin` 方法。\n在标准配置中，`TokenBasedRememberMeServices` 是实现 `RememberMeServices`\
  \ 的具体类。该实现的 `autoLogin` 方法尝试将传入的 Cookie 解析为其组成元素，即用户名、组合元素（用户名 + “:” + 令牌过期时间 +\
  \ “:” + 密码 + “:” + 密钥）的哈希值，以及令牌的过期时间。然后，它使用用户名从 `UserDetailsService` 中检索 `UserDetails`，使用检索到的用户重新计算哈希值，并将其与传入的哈希值进行比较。如果不匹配，则抛出\
  \ `InvalidCookieException`。如果匹配，则检查 `UserDetails`，创建一个 `Authentication` 对象并返回给调用者。\n\
  `autoLogin` 方法从请求中提取记住我 Cookie，对其进行解码，执行一些验证，然后使用从 Cookie 中提取的用户名调用配置的 `UserDetailsService`\
  \ 的 `loadUserByUsername` 方法。接着，它创建一个 `RememberMeAuthenticationToken` 对象（`Authentication`\
  \ 的一个实现）。\n然后，`RememberMeAuthenticationFilter` 尝试根据 `AuthenticationProvider` 的 `RememberMeAuthenticationProvider`\
  \ 实现来认证这个新的 `Authentication` 对象，该实现仅在确认传入请求的哈希值与存储的记住我密钥哈希值匹配后，返回相同的 `Authentication`\
  \ 对象。\n这个 `Authentication` 对象将被 `Security Interceptor` 用于允许访问请求的 URL。\n\n登出\n登出非常简单。当您从应用程序登出时，您希望应用程序结束当前会话，同时移除可能为您存储在客户端的所有信息。\n\
  如前所述，在 Spring Security v5 中，URL `/logout` 取代了在 Spring Security v4 之前使用的 URL `/j_spring_security_logout`。\n\
  在 Spring Security 中，登出非常容易。默认情况下，您唯一需要做的就是访问 URL `/logout`。让我们来试试。\n\n将以下几行代码添加到\
  \ `UserController` 文件中：\n\n```\n@GetMapping (\"/logout\")\npublic String logoutPage\
  \ (HttpServletRequest request, HttpServletResponse response) {\nAuthentication auth\
  \ = SecurityContextHolder.getContext().getAuthentication();\nif (auth != null){\n\
  new SecurityContextLogoutHandler().logout(request, response, auth);\n}\nreturn \"\
  index\";\n}\n```\n\n使用以下几行代码更新安全配置文件：\n\n```\n.and().logout().deleteCookies(\"JSESSIONID\"\
  )\n.and().logout().invalidateHttpSession(true)\n.and().logout().logoutSuccessUrl(\"\
  /index\").permitAll()\n```\n\n这几行代码告诉应用程序删除 `JSESSIONID` Cookie、使 HTTP 会话失效，并在登出后重定向到索引网页。\n\
  \n接下来，在 `movies.jsp` 页面中添加一个指向登出的 HTML 链接：\n\n```\n\">Logout\n```\n\n最后，在 `index.jsp`\
  \ 页面中添加一个简单的 HTML 链接，以便在需要时链接回 `movies`：\n\n```\n\">My movies\n```\n\n现在，访问 `http://localhost:8080/favoritesmovies/movies`，并使用\
  \ **admin**/**admin123** 再次登录。\n勾选用于激活 `remember-me` 功能的复选框。您应该能够毫无问题地登录。\n如果您查看浏览器中存储的\
  \ Cookie，应该会看到 localhost 域有两个 Cookie：`JSESSIONID` 和 `rememberloginnardone`。图 5-13\
  \ 显示了这两个 Cookie。您可能会预期，如果登出，这两个 Cookie 会从浏览器中消失，从而基本上从浏览器中移除应用程序的所有痕迹。让我们来操作一下。\n\
  \n点击 `movies.jsp` 页面上的登出链接。您应该会从应用程序中登出。如果您打开浏览器的 Cookie，会看到 `rememberloginnardone`\
  \ Cookie 已经消失。`JSESSIONID` Cookie 仍然存在，但会话已被框架失效。图 5-14 显示了记住我 Cookie 和会话 Cookie。\n\
  \n![../images/310331_2_En_5_Chapter/310331_2_En_5_Fig14_HTML.jpg](img/310331_2_En_5_Fig14_HTML.jpg)\n\
  \n图 5-14\n记住我 Cookie 和会话 Cookie\n\n登出请求的流程如下：当请求到达时，它会沿着过滤器链传递，直到到达 `LogoutFilter`。该过滤器注意到请求的\
  \ URL 是用于登出的。过滤器调用配置的 `LogoutHandler(s)`，在运行中的应用程序中，这些处理器是 `SecurityContextLogoutHandler`\
  \ 和 `TokenBasedRememberMeServices`。（它们实现了 `LogoutHandler` 接口。）\n`SecurityContextLogoutHandler`\
  \ 以标准的 Servlet 方式使 Servlet 会话失效，即调用 `HttpSession` 对象的 `invalidate` 方法，并清除 Spring\
  \ Security 中的 `SecurityContext`，如使用 `.logout().invalidateHttpSession(true)` 所示。\n\
  `TokenBasedRememberMeServices` 则通过将记住我 Cookie 的过期时间设置为 0 来简单地移除它。\n\n会话管理\nSpring\
  \ Security 的 Web 支持的另一个领域是用户会话管理。关于会话，一件非常重要的事情是确保在用户成功认证时创建一个新的会话 ID。这样做可以降低会话固定攻击的可能性，在这种攻击中，一个用户设置另一个用户的会话标识符，以便在应用程序中冒充他。Spring\
  \ Security 还提供了一个功能，您可以使用它来指定同一用户在任意给定时间可以打开的并发会话数量。\n这两个功能由名为 `SessionFixationProtectionStrategy`\
  \ 的类控制，该类实现了 `SessionAuthenticationStrategy`。此策略由 `AbstractAuthenticationProcessingFilter`\
  \ 和 `SessionManagementFilter` 调用。让我们看看它们是如何工作的。\n\n\n\n`SessionFixationProtectionStrategy`\n\
  默认已在应用程序中配置的 `UsernamePasswordAuthenticationFilter` 中启用。因此，当您登录时，该策略会被调用。策略被调用时，它会获取当前会话（通常是匿名会话）并将其失效，然后立即创建一个新会话。它还会尝试迁移某些属性——通常是\
  \ Spring Security 自身使用的属性，但也可以指定一个属性列表。\n总结一下这个策略：当您登录时，它会将当前会话失效，创建一个新会话，并将某些属性从旧会话复制到新会话中。\n\
  自 Spring Session 2.0 起，它包含了 Spring Session Core 模块以及其他几个模块，例如 Spring Session Data\
  \ MongoDB 模块、Spring Session Data Geode 模块等。\n\n让我们看看如何在应用程序中配置它。\n\n![../images/310331_2_En_5_Chapter/310331_2_En_5_Fig15_HTML.jpg](img/310331_2_En_5_Fig15_HTML.jpg)\n\
  \n图 5-15\n与并发会话相关的错误\n\n1.  将以下行添加到 `SecurityConfiguration`\n    文件中：\n\n```\n \
  \   .sessionManagement().sessionCreationPolicy(SessionCreationPolicy.ALWAYS)\n \
  \   ```\n\n2.  重新启动应用程序。\n\n3.  打开 Chrome 浏览器并访问 `http://127.0.0.1:8080/favoritesmovies/movies`。\n\
  \    使用用户名 **admin** 和密码\n    **admin123** 登录。您应该能够正常访问该页面。\n\n4.  打开另一个浏览器，例如 Firefox，并访问\
  \ `http://127.0.0.1:8080/favoritesmovies/movies`。\n    使用用户名 **admin** 和密码\n   \
  \ **admin123** 登录。您应该能够正常访问该页面。\n\n5.  转到 Chrome 浏览器并刷新页面。您将看到以下\n    消息：“此会话已过期（可能由于同一用户尝试多次并发登录）。”此消息\n\
  \    明确指出了问题所在。图 5-15 显示了此\n    页面。\n\n现在，通过将以下行添加到 `SecurityConfiguration`\n文件中，允许同时存在两个会话：\n\
  \n```\n.sessionManagement().maximumSessions(2)\n```\n\n重新启动应用程序并按照之前的相同流程操作。这次，您应该能够同时保持两个会话处于活动状态。\n\
  \n强制请求使用 HTTPS\n默认情况下，启用 Spring Security 的应用程序通过普通的 HTTP 通道提供所有内容。但是，您可以对其进行配置，使其自动确保特定的\
  \ Web 请求通过 HTTPS 通道传送。\n\n注意\n我们假设您通常了解使用 HTTPS 相对于 HTTP 的优势。不过，这里做一个简要的提醒。HTTPS（或超文本传输安全协议）是一种通信协议，它将标准的\
  \ HTTP 协议与安全套接字层（SSL）或 TLS 结合使用，以达到安全目的。HTTPS 通过两种形式实现安全性。首先，它允许连接的客户端对正在连接的 Web\
  \ 服务器进行身份验证，确保其连接到正确的认证网站。这是通过使用服务器端证书完成的。HTTPS 解决的另一个安全问题是对客户端和服务器之间交换的信息进行加密。HTTPS\
  \ 确保信息在交换过程中不会被第三方读取。您可以在维基百科（[`http://en.wikipedia.org/wiki/HTTP_Secure`](http://en.wikipedia.org/wiki/HTTP_Secure)）和许多其他地方找到关于此主题的更广泛信息。请查看官方的\
  \ HTTPS/SSL Apache Tomcat 网页，了解如何在 [`https://tomcat.apache.org/tomcat-9.0-doc/ssl-howto.html`](https://tomcat.apache.org/tomcat-9.0-doc/ssl-howto.html)\
  \ 配置 HTTPS。\n\n我们假设您已经为您的 Apache Tomcat v9 配置了 HTTPS。\n设置 HTTPS 非常简单；您只需向 Spring\
  \ Security 配置文件中添加一个新的配置元素即可。\n\n假设您想为登录页面配置 HTTPS。只需将以下行添加到 `SecurityConfiguration`\n\
  文件中：\n\n```\nhttp.requiresChannel().antMatchers(\"/login*\").requiresSecure();\n\
  ```\n\n访问 `http://localhost:8080/favoritesmovies/movies`，\n就像您在本章中一直做的那样。这次，应用程序将\n\
  自动重定向到 URL `https://localhost:8443/favoritesmovies/login`。\n（浏览器可能会显示典型的“不安全证书”\n\
  警告，您可以在图 5-16 中看到，但您可以通过单击“仍然继续”选项或类似选项安全地继续操作。）\n\n![../images/310331_2_En_5_Chapter/310331_2_En_5_Fig16_HTML.jpg](img/310331_2_En_5_Fig16_HTML.jpg)\n\
  \n图 5-16\n具有 HTTPS 通道安全性和自签名证书的应用程序\n\n通道功能的工作方式如下。当应用程序启动时，命名空间解析机制会注意到 `requiresChannel`\
  \ 元素中存在 `requires-channel` 属性。`HttpConfigurationBuilder` 类找到此属性，然后创建一个 `RequestMatcher`\
  \ 和 `ChannelAttributeFactory` 的映射。`ChannelAttributeFactory` 根据 `requires-channel`\
  \ 属性的值创建 `ConfigAttribute` 实例。例如，如果所需的通道是 HTTPS，它会创建一个 `ConfigAttribute` 实现的实例，其值为\
  \ `REQUIRES_SECURE_CHANNEL`，并与相应的 URL 模式关联。解析器找到配置了 `requires-channel` 属性的 `antMatchers-url`\
  \ 后，它会实例化一个新的 `ChannelProcessingFilter` bean，该 bean 配置了一个 `ChannelDecisionManager`\
  \ 实现，用于决定每个请求使用哪个通道。\n当发出请求时，它会像往常一样经过过滤器链。过滤器链中有一个名为 `ChannelProcessingFilter`\
  \ 的过滤器，如前所述。此过滤器将决定如何处理请求的责任委托给其配置的 `ChannelDecisionManager` 实现。决策管理器在某些辅助类的帮助下，决定请求是否可以继续，或者相反，请求的通道是否不被请求的\
  \ URL 所允许。在后一种情况下，它会委托给一个 `ChannelProcessor` 和一个重定向策略，以向正确的通道 URL 发送重定向响应。\n基本上，在此示例中，此过滤器查看\
  \ URL `http://localhost:8080/favoritesmovies/login`，发现此 URL 与具有配置要求 `REQUIRES_SECURE_CHANNEL`\
  \ 的 `antMatchers-url` 模式匹配，然后调用 `RetryWithHttpsEntryPoint`，后者又调用 `RedirectStrategy`\
  \ 实现的 `sendRedirect` 方法，该方法尝试重定向到 `https://localhost:8443/favoritesmovies/login`。\n\
  \n总结\n在本章中，我们涵盖了该框架最大的关注点之一：Spring Security 中的 Web 支持。您看到主要功能以 Servlet 过滤器的形式提供。从标准的角度来看，这是一件好事，因为它意味着您可以在使用标准\
  \ Java Servlet 模型的其他框架中利用 Spring Security 的 Web 支持。\n您现在应该了解构成该框架的主要过滤器的许多细节、它们内部的工作方式，以及它们如何相互配合并与框架的其他部分配合。我们以实践的方式解释了所有这些内容，试图解决现实生活中的场景。\n\
  在下一章中，我们将介绍 Spring Security 的第二个主要关注点——即方法级安全性。我们将展示它与 Web 级安全性的比较，您将看到您可以利用现有的大量知识将其应用于方法级安全层。\n\
  \n6. 配置替代身份验证提供程序\n\n\n\nSpring Security 最强大的特性之一，在于你可以将不同的身份验证机制插入到框架中。Spring Security\
  \ 的设计目标，是尽可能构建一个可插拔的架构模型，让不同的组件能够以简单且不引人注目的方式集成到框架中。在身份验证层，这意味着存在一个抽象层来处理安全流程的这一部分。这个抽象层主要以\
  \ `AuthenticationProvider` 接口的形式呈现，但也通过特定的安全 Servlet 过滤器和用户详情服务提供支持。\n\nSpring Security\
  \ v5 支持多种不同的身份验证机制，包括：\n\n*   数据库\n*   LDAP\n*   X.509\n*   OAuth 2/OpenID\n*  \
  \ WebSockets\n*   JSON Web Token (JWT)\n*   JAAS\n*   CAS\n\n本章的大部分内容将解释这些身份验证系统各自如何独立于\
  \ Spring Security 工作。虽然会提供一些关键细节，但不会进行深入解释。当然，你将看到 Spring Security 如何实现这些身份验证机制，并且你会发现它们在所使用的\
  \ Spring Security 组件方面有许多共同点。本章仅提供关于数据库、LDAP 和 X.509 身份验证的示例，而 OAuth2、JAAS 和 CAS\
  \ 将仅作介绍。\n\n数据库提供的身份验证\n数据库提供的身份验证的工作方式与内存提供的身份验证几乎完全相同。唯一的区别在于，用户存储在数据库中，而非内存中。这发生在运行时，当你在应用程序上下文配置文件中定义它们时。\n\
  当你使用数据库身份验证机制时，`AuthenticationProvider` 的实现完全不需要改变；它仍然是你在内存用户身份验证中使用的 `DaoAuthenticationProvider`。你可能还记得，这个\
  \ `AuthenticationProvider` 实现基于使用 `UserDetailsService` 抽象来检索用户，因此这里的区别在于你将使用的 `UserDetailsService`\
  \ 实现。\n正如你将看到的，配置从数据库提供用户非常简单。\n\n首先，从 [`https://sourceforge.net/projects/hsqldb/postdownload`](https://sourceforge.net/projects/hsqldb/postdownload)\
  \ 下载并解压 HyperSQL 数据库引擎 (HSQLDB) 的 `.zip` 文件。\n在你的案例中，你将把 `hsqldb-2.4.1.zip` 文件安装到\
  \ `c:\\hsqldb-2.4.1`。\n在本章中，你将使用 IntelliJ IDEA 2019 作为 IDE 工具。你可以从 [`https://blog.jetbrains.com/idea/tag/intellij-idea-2019-1/`](https://blog.jetbrains.com/idea/tag/intellij-idea-2019-1/)\
