  \ 9-34 展示了 `applicationContext-security.xml`。清单 9-35 展示了 `scala-servlet.xml` 文件。所有文件都应位于应用程序的\
  \ `WEB-IF` 目录下。\n\n```\n\n清单 9-35\n包含控制器定义的 scala-servlet.xml 文件\n```\n\n```\n\n\
