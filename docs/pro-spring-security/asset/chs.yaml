  \ 7-12 完全相同。\n\nSpring Security ACL 支持还提供了 `@PreFilter` 注解，正如你所想，它在方法安全拦截过程的预处理阶段工作，而不是像\
  \ `@PostFilter` 注解那样工作。如前所述，预处理活动由 `AccessDecisionVoter` 实现负责。对于 `@PreFilter` 注解，它由\
  \ `org.springframework.security.access.prepost.PreInvocationAuthorizationAdviceVoter`\
  \ 负责，而该投票器又像之前一样，使用 `DefaultMethodSecurityExpressionHandler` 的实例。与 `@PostFilter`\
  \ 的情况一样，带有 `@PreFilter` 注解的方法预期接收一个集合。不过，在这种情况下，不支持数组。\n\n我们刚刚向你展示了一个关于 ACL 过滤功能如何在实际中工作的简单演练。你可以看到，只需提供带有\
  \ `hasPermission` 表达式的 `@PostFilter` 注解（如你所知，该表达式在内部调用 SpEL 上下文中的一个方法），我们就能指示框架如何处理方法的返回值。我们首先解释、随后在小型测试用例中演示的这个过程，可以用图\
  \ 7-15、7-16 和 7-17 来总结。\n\n![../images/310331_2_En_7_Chapter/310331_2_En_7_Fig16_HTML.jpg](img/310331_2_En_7_Fig16_HTML.jpg)\n\
  \n图 7-16\n一个展示基于 ACL 安全的方法拦截在预处理阶段的主要类和接口的图表\n\n![../images/310331_2_En_7_Chapter/310331_2_En_7_Fig15_HTML.jpg](img/310331_2_En_7_Fig15_HTML.jpg)\n\
  \n图 7-15\n一个简化的时序图，展示了当调用带有 @PreFilter 和 @PostFilter 注解的方法时发生的情况。该图显示了领域对象的参数和返回集合在方法调用前后是如何被过滤的\n\
  \n`@PreFilter` 调用由 `PreInvocationAuthorizationAdviceVoter` 处理，而带有 ACL 配置属性的 `@Secured`\
  \ 注解则由 `AclEntryVoter` 处理。你可以在图中看到，在处理流程的末尾，两条路径都到达了 `SidRetrievalStrategy`、`ObjectIdentityRetrievalStrategy`\
  \ 和 `AclService` 中的核心元素。实际上，`AclPermissionEvaluator` 和 `AclEntryVoter` 执行的功能非常相似。\n\
  \n![../images/310331_2_En_7_Chapter/310331_2_En_7_Fig17_HTML.jpg](img/310331_2_En_7_Fig17_HTML.jpg)\n\
  \n图 7-17\n一个展示基于 ACL 安全的方法拦截在后期处理阶段所涉及的类的图表\n\n同样，你可以看到两个分支。左边的分支包含 `AclEntryAfterInvocationProvider`\
  \ 和 `AclEntryAfterInvocationCollectionFilteringProvider`，该分支不支持 SpEL 表达式，并在使用 `@Secured`\
  \ 和配置属性的静态名称（例如 `ACL_ALLOW_READ` 或其他，正如你在前面几节中看到的那样）时处于活动状态。右边的分支则经过支持 SpEL 以及 `@PostFilter`\
  \ 和 `@PostAuthorize` 注解的部分。你可以看到，这两个分支几乎与预处理阶段的分支一一对应。此外，你还可以看到系统中存在高度的重用，许多类同时出现在预处理和后期处理阶段。\n\
  \n我们介绍了处理 ACL 安全的两种不同方式，即我们在上一段中讨论的两个分支。使用 `@Secured` 的方式较旧，不支持 SpEL 表达式；而使用 `@PreFilter`、`@PreAuthorize`、`@PostAuthorize`\
  \ 和 `@PostFilter` 的方式自 Spring Security 3.0 版本以来就已存在。它们是支持使用 SpEL 表达式的较新选项，因此在日常使用中，你可能会更倾向于使用它们。\n\
  \n使用 ACL 保护视图层\n\n使用 ACL 保护应用程序的另一个选项是使用视图层的 JSP 标签，为没有适当权限查看领域对象的用户过滤掉这些对象。我们在\
  \ Web 安全章节中已经简要讨论过这些标签，但特意将 ACL 标签留在这里进行更详细的介绍。为了在示例中使用它们，让我们继续使用上一节的代码，但做一些修改。首先，在\
  \ `ForumServiceImpl` 类中，注释掉 `getPosts` 方法中的 `@PostFilter` 注解，使其不再进行任何过滤。然后将 `form.jsp`\
  \ 文件修改为如清单 7-24 所示。\n\n```\n\n帖子\n\n新帖子内容：\n\n${post.content}\n\n清单 7-24\n应用了 Taglib\
  \ ACL 安全以过滤领域对象的 form.jsp\n```\n\n这个清单展示了在视图层保护领域对象是多么简单。实际上，它（从视图角度来看）执行了与使用 `@PostFilter`\
  \ 注解时非常相似的任务。\n`<accesscontrollist>` 标签依赖于应用程序上下文配置中已配置的 `org.springframework.security.access.PermissionEvaluator`\
  \ 实现。它只有在应用程序上下文中只配置了一个此类型的 bean 时才能工作，因为它会尝试按类型检索该 bean。你可能还记得，在你的配置中，有一个具体类型为\
  \ `org.springframework.security.acls.AclPermissionEvaluator` 的 `PermissionEvaluator`\
  \ 配置。\n现在，如果你重新启动应用程序并再次执行测试场景 7.1 中定义的步骤，从表示层的角度来看，你应该会得到与首次执行该场景时完全相同的行为。其工作方式很简单。每次评估该标签时（在对帖子集合的每次迭代中），标签处理器都会调用\
  \ `PermissionEvaluator` 的 `hasPermission` 方法，该方法返回一个布尔值，指示是否已授予权限。如果授予了权限，则评估并渲染标签体。如果未授予权限，则跳过标签体。\n\
  \n\n\nACL 的成本\n此示例表明，使用 ACL 会在标准业务操作之上，带来相当多的操作和逻辑开销。显然，存储一篇帖子会受到为该对象存储相应 ACL 所需的额外工作的影响，而检索一篇帖子则会受到需要根据权限过滤集合中某些元素的影响。\n\
  \n本小节将深入探讨 ACL Spring Security 支持的核心类，了解其内部工作原理以及它可能如何影响您的应用程序。这个类是 `org.springframework.security.acls.jdbc.JdbcMutableAclService`。\n\
  \n`JdbcMutableAclService` 是处理所有与 ACL 数据库模式相关的数据库输入和输出的类。它默认配置为与 `HSQLDB` 一起工作，这也是我们在示例中一直使用的数据库。\n\
  \n该类针对您与 ACL 系统交互时执行的不同操作（例如插入到不同表中、删除 ACL、更新值，当然还有从不同表中进行选择）提供了不同的 SQL 语句。所有这些操作都使用\
  \ Spring Core 的 `JdbcTemplate` 支持来完成。\n\n另一个重要的类是 `BasicLookupStrategy`，它是框架中用于查找\
  \ ACL 的 `LookupStrategy` 的默认实现。\n\n您看到的第一个有趣的操作是 `readAclsById` 方法，它存在于 `JdbcMutableAclService`\
  \ 中，并委托给 `BasicLookupStrategy` 中同名的方法。此方法尝试从缓存中检索请求的 ACL。如果在缓存中找到该 ACL，该方法将返回这个找到的\
  \ ACL；如果在缓存中未找到该 ACL，则实现将使用一个包含四个连接的、相对复杂的查询来查询数据库，如清单 7-25 所示。这个查询可能会变得更复杂一些，因为\
  \ ACL 可以以最多 50 个元素为一批进行检索（这是默认值，但可以通过设置 `BasicLookupStrategy` 类中的 `batchSize` 属性进行配置），并且对于这些元素中的每一个，`where`\
  \ 子句都会向查询中添加一个 `or` 运算符。此查询的结果随后会存储在缓存中，这使得这些 ACL 可用，以便如果另一个方法调用 `readAclsById`\
  \ 请求其中一个缓存元素时，无需访问数据库。\n\n当您创建一篇新帖子时，会调用 `readAclsById`。此外，还会执行另一个 select 查询来检索由该领域对象表示的\
  \ `objectIdentity` 的主键。当然，还会执行一条 `\"insert into acl_object_identity\"` 语句。同样，在 `ForumServiceImpl`\
  \ 的同一个 `createPost` 方法中，当您调用 `updateAcl` 方法时，会先执行一条 `\"delete from acl_entry\"`\
  \ 语句，然后执行一批 `\"insert into acl_entry\"` 语句，接着执行一条 `\"update acl_object_identity\"\
  ` 语句。然后，该对象标识的所有缓存条目都会被清除，并再次调用 `readAclsById`，这将查询数据库以获取最新的信息。您可以看到，使用 ACL 后，删除一篇帖子的成本是如何显著增加的。\n\
  \n删除 `Post` 对象的成本也更高，因为现在它涉及删除 ACE 条目、删除对象标识以及清除相关对象的缓存。\n\n本节并非要吓唬您，让您不敢使用 ACL。我们只是想让您意识到，在考虑使用\
  \ ACL 创建应用程序时，除了使用它的复杂性之外，还存在一个额外的成本，您应该将其考虑在内。您拥有的领域对象越多，您拥有的 ACL 条目也就越多。在一个大型应用程序中，您可能谈论的是\
  \ ACL 支持表中数百万计的条目。\n\n```\nselect acl_object_identity.object_id_identity, acl_entry.ace_order,\
  \  acl_object_identity.id as acl_id,\nacl_object_identity.parent_object, acl_object_identity.entries_inheriting,\
  \ acl_entry.id as ace_id, acl_entry.mask,\nacl_entry.granting,  acl_entry.audit_success,\
  \ acl_entry.audit_failure,  acl_sid.principal as ace_principal,\nacl_sid.sid as\
  \ ace_sid,  acli_sid.principal as acl_principal, acli_sid.sid as acl_sid, acl_class.class\
  \ from\nacl_object_identity left join acl_sid acli_sid on acli_sid.id = acl_object_identity.owner_sid\n\
  left join acl_class on acl_class.id = acl_object_identity.object_id_class\nleft\
  \ join acl_entry on acl_object_identity.id = acl_entry.acl_object_identity\nleft\
  \ join acl_sid on acl_entry.sid = acl_sid.id\nwhere ( (acl_object_identity.object_id_identity\
  \ = ? and acl_class.class = ?))\norder by acl_object_identity.object_id_identity\
  \ asc, acl_entry.ace_order asc\n清单 7-25\n您可以在 `org.springframework.security.acls.jdbc.BasicLookupStrategy`\
  \ 类中找到的 ACL 检索查询\n```\n\n总结\n在本章中，我们详细解释了如何使用 Spring Security 对 ACL 的支持。我们展示了如何在\
  \ Spring 配置文件中配置对 ACL 的支持，以及如何使用 `@Secured`、`@PreAuthorize`、`@PreFilter`、`@PostAuthorize`\
  \ 和 `@PostFilter` 注解来实现特定于领域对象的安全性。我们还介绍了框架的一些内部方面以及参与其 ACL 功能的主要类。\n\n我们研究了不同的方法来确保受保护的领域对象不会出现在没有适当权限的用户的表示层中。您看到这可以通过业务层的\
  \ `@PostFilter` 中的 SpEL 表达式实现，也可以直接在您的 JSP 文件中使用 ACL Spring Security 标签库实现。我们还快速概述了\
  \ ACL 框架使用的不同 SQL 语句，以及它们可能如何影响您的应用程序。\n\n8. 自定义和扩展 Spring Security\n\nSpring Security\
  \ 是一个非常可扩展和可定制的框架。这主要是因为该框架是使用面向对象的原则和设计实践构建的，因此它对扩展开放，对修改关闭。在上一章中，您看到了 Spring Security\
  \ 中的一个主要扩展点——即不同身份验证提供者的可插拔性。本章涵盖了框架中其他一些您可以利用的扩展点，以扩展 Spring Security 的功能，或修改/定制那些在您的应用程序中不完全按您需要方式工作的功能。\n\
  \n我们还将简要介绍 Spring Security Extensions 项目（[`http://static.springsource.org/spring-security/site/extensions.html`](http://static.springsource.org/spring-security/site/extensions.html)），这是一个您可以用来为核心\
  \ Spring Security 项目创建扩展模块的环境。\n\n下一节将定义我们认为的 Spring Security 中的一些主要扩展点，并描述如何使用它们来添加或修改安全解决方案中的行为。此外，本章还将展示如何使用\
  \ Spring Boot、Spring Security、Spring Data、Thymeleaf 和 MongoDB 开发身份验证和登录应用程序。\n\n\
  Spring Security 扩展点\nSpring Security 提供了一套全面的扩展点，这些扩展点可以使用您自己的实现进行自定义（或完全覆盖），同时仍然利用框架的核心。有些扩展点是显而易见的，而另一些则稍微微妙一些，在某些情况下甚至不是有意的。然而，由于该框架非常灵活，您可以利用这种灵活性来调整其配置以满足您的意图。\n\
  \n\n\n接入 Spring Security 事件系统\n\nSpring Security 支持一种基于 Spring 框架自身事件模型构建的事件模型。你可以利用\
  \ Spring 的事件模型来开发能够监听框架内发生的不同事件并做出相应处理的应用程序。\n\n我们不会深入解释为何事件模型是一种如此强大的编程实践。我们只想指出一个巨大的优势：它允许你解耦应用程序，因为通常来说，事件生产者（一个或多个）和事件消费者（一个或多个）无需了解彼此的任何信息即可正常运行。理论上（实际上，对于一般事件而言，尽管\
  \ Spring 事件并非如此），你可以拥有一个完全异构的应用程序，其中每个模块都可以按照自己的节奏编写和演进，而不影响其他部分，然后通过专门使用事件将它们全部集成在一起。\n\
  \n所有 Spring 事件都应继承自抽象类 `org.springframework.context.ApplicationEvent`，Spring Security\
  \ 自身的事件也不例外。\n\n`ApplicationEvent` 抽象类的一个主要具体实现是 `org.springframework.context.event.ApplicationContextEvent`，它本身作为一系列涉及应用程序上下文生命周期的事件（`ContextClosedEvent`、`ContextRefreshedEvent`、`ContextStartedEvent`\
  \ 和 `ContextStoppedEvent`）的父类。\n\n要注册你的应用程序以接收 Spring 事件的通知，你需要在你应用程序中定义的一个（或多个）Bean\
  \ 实现接口 `org.springframework.context.ApplicationListener<E extends ApplicationEvent>`。该接口定义了一个单一方法\
  \ `void onApplicationEvent(E event)`，你可以使用它来监听应用程序中的特定类型事件。\n\n发布事件同样简单。你只需要在你的\
  \ Spring 应用程序上下文中定义一个实现接口 `org.springframework.context.ApplicationEventPublisherAware`\
  \ 的 Bean，该接口同样只定义了一个方法：\n\n```\nvoid setApplicationEventPublisher(ApplicationEventPublisher\
  \ applicationEventPublisher)\n```\n\n当应用程序启动时，Spring 会自动调用此方法，并传入一个 `ApplicationEventPublisher`\
  \ 的实例（因为它是接口，所以传入的是其实现类）。传入的 `ApplicationEventPublisher` 实例通常是包含该应用程序的 `ApplicationContext`\
  \ 实例本身。\n\n`ApplicationEventPublisher` 的 `publishEvent` 方法（位于 `AbstractApplicationContext`\
  \ 类中）的默认实现将事件的发布委托给 `ApplicationEventMulticaster` 的实现——目前唯一的实现是 `org.springframework.context.event.SimpleApplicationEventMulticaster`。\n\
  \n向所有感兴趣的监听器广播事件也很直接。你只需创建一个 `ApplicationEvent` 实现类（任何子类都可以作为事件）的实例，然后调用 `ApplicationEventPublisher`\
  \ 的 `publishEvent(ApplicationEvent event)` 方法，并将你的 `ApplicationEvent` 实例传递给它。然后\
  \ Spring 会负责确保所有注册了该特定事件的监听器都收到事件发布的通知。默认情况下，所有监听器都在与发布者相同的线程上被调用；但是，你也可以配置一个 `org.springframework.core.task.TaskExecutor`（这是一个接口，因此你可以使用像\
  \ `org.springframework.core.task.SimpleAsyncTaskExecutor` 这样的实现类）来在不同的线程中调用监听器。在示例中配置监听器时，你将用到这一点。\n\
  \nSpring Security 自带了一套自己的 `ApplicationEvent` 实现，因此你可以以一种不引人注目且解耦的方式接入安全生命周期的不同节点。Spring\
  \ Security 提供的 `ApplicationEvent` 实现被归类为 `Authorization`、`Authentication` 或 `javax.servlet.http.Session`\
  \ 类型，并且它们具有描述性的名称，暗示了它们的功能和发布位置。在这里，我们将对它们以及它们在框架内何时发布进行具体解释。\n\nSpring 中的事件工作方式如图\
  \ 8-1 所示。\n\n![../images/310331_2_En_8_Chapter/310331_2_En_8_Fig1_HTML.jpg](img/310331_2_En_8_Fig1_HTML.jpg)\n\
  \n图 8-1\n Spring 事件机制。Spring Security 拥有自己的一套 ApplicationEvent 实现\n\n授权相关事件\n\n\
  这些是与授权过程可能经历的不同阶段相关的事件——例如，在授权失败时通知用户。此类别下的事件如下：\n\n*   `org.springframework.security.access.event.AbstractAuthorizationEvent`：这是所有其他授权事件的父类。它实际上并没有在\
  \ `ApplicationEvent` 之上添加任何功能。它更像是一个标记，用于标识其所有子类为授权事件。\n\n*   `org.springframework.security.access.event.AuthenticationCredentialsNotFoundEvent`：此事件用于指示无法从配置的\
  \ `SecurityContext` 中获取 `Authentication` 对象。此事件由 `AbstractSecurityInterceptor` 的\
  \ `beforeInvocation` 方法在决定调用应具有安全性但拦截器在安全上下文中未找到所需的 `Authentication` 对象时广播。简单来说，如果条件\
  \ `SecurityContextHolder.getContext().getAuthentication() == null` 为 `true`，则会执行此事件。\n\
  \n\n\n*   `org.springframework.security.access.event.AuthorizationFailureEvent`:\n\
  \    此事件表示`Authentication`对象的主体未被允许访问安全对象，因为它缺少访问所需的权限。当`AbstractInterceptor`的`beforeInvocation`和`afterInvocation`方法捕获到`AccessDeniedException`时，会发布此事件。`AccessDeniedException`可以由拦截器预处理阶段的`org.springframework.security.access.AccessDecisionManager`的`decide`方法抛出，也可以由拦截器后处理阶段的`org.springframework.security.access.intercept.AfterInvocationProviderManager`的`decide`方法抛出。\n\
  \n*   `org.springframework.security.access.event.AuthorizedEvent`:\n    此事件在安全对象的访问被授予之后、实际调用安全对象之前发布。默认情况下不会发布此事件，如果你希望发布它，需要在安全拦截器中将属性`publishAuthorizationSuccess`设置为`true`。\n\
  \n*   `org.springframework.security.access.event.LoggerListener`: 此事件将拦截器相关的应用程序事件输出到\
  \ Commons Logging，因此所有失败事件将以警告级别记录，所有成功事件将以信息级别记录，所有公共调用事件将以调试级别记录。\n\n*   `org.springframework.security.access.event.PublicInvocationEvent`:\n\
  \    每当安全对象接收到对非安全入口点（即未配置`ConfigAttribute`的方法）的调用时，`AbstractSecurityInterceptor`的`beforeInvocation`方法会发布此事件。在方法安全的情况下，这意味着当调用对象的安全代理时，如果被调用的特定方法未配置安全元数据，则将其作为非安全的公共调用处理。然而，并非简单地调用该方法，而是在继续执行之前广播一个事件，以通知任何对此感兴趣的监听器，此事件（公共调用）已经发生。这可能指向一种情况，即你实际上需要保护该端点，而通过此事件，你会收到尚未这样做的通知。事件发布后，拦截器将不再对此调用执行任何预处理或后处理。如果拦截器中的属性`rejectPublicInvocations`设置为`true`（该属性是`AbstractSecurityInterceptor`类的一部分），则不会发布该事件，而是抛出一个`IllegalArgumentException`，指出在没有配置`ConfigAttribute`的情况下无法进行特定调用。这意味着需要处理一个配置错误。\n\
  \n更多信息请访问 [`https://docs.spring.io/spring-security/site/docs/5.1.4.RELEASE/api/org/springframework/security/access/event/AbstractAuthorizationEvent.html`](https://docs.spring.io/spring-security/site/docs/5.1.4.RELEASE/api/org/springframework/security/access/event/AbstractAuthorizationEvent.html)\n\
  \n图 8-2 以 UML（统一建模语言）形式展示了这些事件类和接口。\n\n![../images/310331_2_En_8_Chapter/310331_2_En_8_Fig2_HTML.jpg](img/310331_2_En_8_Fig2_HTML.jpg)\n\
  \n图 8-2\n授权相关事件\n\n认证相关事件\n这些事件与应用程序中的认证过程以及该过程经历的不同阶段相关，例如通知感兴趣的监听器有关账户禁用和凭证过期的情况。认证事件由`org.springframework.security.authentication.AuthenticationEventPublisher`的实现发布，该实现由`org.springframework.security.authentication.ProviderManager`类调用。默认情况下，`ProviderManager`中配置的`AuthenticationEventPublisher`是`NullEventPublisher`的一个实例，它是`ProviderManager`类内部定义的一个私有静态类，不发布任何事件。如果你自己配置\
  \ bean，可以使用`AuthenticationEventPublisher`接口的一个默认实现，即`org.springframework.security.authentication.DefaultAuthenticationEventPublisher`。当使用`<http>`元素时，Web\
  \ 层安全默认配置此实例。\n`DefaultAuthenticationEventPublisher`的工作方式如下：它只实现了`AuthenticationEventPublisher`接口的两个公共方法。这些方法是`publishAuthenticationSuccess`和`publishAuthenticationFailure`。它们是尝试认证时可能出现的两种场景；然而，在认证失败的情况下，可能有很多原因，正如我们接下来将向你展示的大量`AuthenticationFailureXXXEvent`实例所示。在认证失败的情况下，`DefaultAuthenticationEventPublisher`将收到对`publishAuthenticationFailure`方法的调用，然后它将查询认证被拒绝时抛出的异常（例如`UsernameNotFoundException`）与该异常对应的事件（例如`AuthenticationFailureBadCredentialsEvent`）之间的映射。然后，通过反射创建此事件的一个实例并发布。\n\
  可以使用`DefaultAuthenticationEventPublisher`提供的方法`setAdditionalExceptionMappings`向异常与事件之间的默认映射中添加更多映射。\n\
  \n框架中当前与认证相关的事件如下：\n\n*   `org.springframework.security.authentication.event.AbstractAuthenticationEvent`:\n\
  \    这是所有其他认证相关事件的父类。它不引入任何特定功能，而是服务于对认证事件进行分类的基本功能。\n\n*   `org.springframework.security.authentication.event.AbstractAuthenticationFailureEvent`:\n\
  \    这是所有认证失败事件的父类。它扩展了`AbstractAuthenticationEvent`，但增加了一个构造函数，该构造函数接收认证失败时抛出的异常。\n\
  \n*   `org.springframework.security.authentication.event.AuthenticationFailureBadCredentialsEvent`:\n\
  \    当系统在认证过程中抛出`BadCredentialsException`时发布此事件。当对`Authentication`对象的凭证检查无效时，不同的`AuthenticationProvider`实现会抛出此异常。当抛出`UsernameNotFoundException`时也会发布此事件。这通常由`UserDetailsService`实现在找不到与传入用户名对应的用户时抛出，并由`AuthenticationProvider`简单地传播。\n\
  \n*   `org.springframework.security.authentication.event.AuthenticationFailureCredentialsExpiredEvent`:\n\
  \    当抛出`CredentialsExpiredException`时发布此事件。例如，当代表用户的`UserDetails`对象从方法`isCredentialsNotExpired`返回`false`时，`AbstractUserDetailsAuthenticationProvider`的实现会抛出此异常。\n\
  \n\n\n*   `org.springframework.security.authentication.event.AuthenticationFailureDisabledEvent`:\n\
  \    当抛出 `DisabledException` 时，会发布此事件。如果尝试登录的用户账户已被禁用，则会抛出此异常。`AbstractUserDetailsAuthenticationProvider`\
  \ 以及评估 `UserDetails.isEnabled` 方法是否返回 `false` 的 `AccountStatusUserDetailsChecker`\
  \ 实现会使用此事件。\n\n*   `org.springframework.security.authentication.event.AuthenticationFailureExpiredEvent`:\n\
  \    当抛出 `AccountExpiredException` 时，`ProviderManager` 会发布此事件。此异常的抛出逻辑与上一种情况相同，但这次调用的是\
  \ `UserDetails.isAccountNonExpired` 方法。如果该方法返回 `false`，则会抛出此异常。\n\n*   `org.springframework.security.authentication.event.AuthenticationFailureLockedEvent`:\n\
  \    当抛出 `LockedException` 时，会发布此事件。此异常在与上一种情况相同的位置（预认证检查场景中）抛出，并且当代表用户的 `UserDetails`\
  \ 从其 `isAccountNonLocked` 方法返回 `false` 时抛出。\n\n*   `org.springframework.security.authentication.event.AuthenticationFailureProviderNotFoundEvent`:\n\
  \    此事件与之前的事件不同，它不直接与尝试登录的用户相关。相反，当抛出 `ProviderNotFoundException` 时，会发布此事件。如果 `ProviderManager`\
  \ 中配置的所有 `AuthenticationProviders` 都无法处理该认证请求，`ProviderManager` 本身会抛出此异常。\n\n* \
  \  `org.springframework.security.authentication.event.AuthenticationFailureProxyUntrustedEvent`:\n\
  \    此事件表示由于 CAS 用户的票据是由不受信任的代理生成的而导致的认证失败。\n\n*   `org.springframework.security.authentication.event.AuthenticationFailureServiceExceptionEvent`:\n\
  \    当抛出 `AuthenticationServiceException` 时，会发布此事件。此异常可能由系统的不同部分（例如，`UsernamePasswordAuthenticationFilter`\
  \ 和 `DaoAuthenticationProvider`）抛出，通常用于传达由于某种系统错误（例如，无法访问用户存储库）而无法处理认证的信息。\n\n*\
  \   `org.springframework.security.authentication.event.AuthenticationSuccessEvent`:\n\
  \    当 `DefaultAuthenticationEventPublisher` 的 `publishAuthenticationSuccess` 方法被调用时，它会简单地发布此事件。\n\
  \n*   `org.springframework.security.authentication.event.InteractiveAuthenticationSuccessEvent`:\n\
  \    此事件由框架 Web 层安全部分的不同过滤器直接发布，而不是由 `DefaultAuthenticationEventPublisher` 发布。只要任何主动尝试认证的过滤器（如\
  \ `UsernamePasswordAuthenticationFilter` 或 `RememberMeAuthenticationFilter`）成功完成认证，就会发布此事件。\n\
  \n*   `org.springframework.security.authentication.jaas.event.LoggerListener`:\n\
  \    此监听器将与认证相关的应用程序事件输出到 Commons Logging，以便所有认证事件都将在警告级别被记录。\n\n更多信息请访问 [`https://docs.spring.io/spring-security/site/docs/5.1.4.RELEASE/api/org/springframework/security/authentication/event/package-summary.html`](https://docs.spring.io/spring-security/site/docs/5.1.4.RELEASE/api/org/springframework/security/authentication/event/package-summary.html)\n\
  \n图 8-3 以 UML 类图的形式展示了上述事件类。\n\n![../images/310331_2_En_8_Chapter/310331_2_En_8_Fig3_HTML.jpg](img/310331_2_En_8_Fig3_HTML.jpg)\n\
  \n图 8-3\n与认证相关的事件类\n\n会话相关事件\n\n这些事件（`org.springframework.security.core.session.SessionCreationEvent`\
  \ 和 `org.springframework.security.core.session.SessionDestroyedEvent`）直接继承自 `ApplicationEvent`，与用户会话的生命周期相关。它们都由\
  \ `HttpSessionEventPublisher` 的实例发布（实际上，发布的是其具体实现子类 `HttpSessionCreatedEvent` 和\
  \ `HttpSessionDestroyedEvent`）。`HttpSessionEventPublisher` 是标准 Servlet 接口 `HttpSessionListener`\
  \ 的一个实现，它允许 `HttpSessionEventPublisher` 创建会话生命周期监听器。该实现需要像任何其他 `HttpSessionListener`\
  \ 一样在 `web.xml` 文件中被引用。这两个与会话相关的事件与 `HttpSessionListener` 接口定义的两个方法一一对应。这些方法是：\n\
  \n```\nvoid sessionCreated(HttpSessionEvent se)\nvoid sessionDestroyed(HttpSessionEvent\
  \ se)\n```\n\n以上就是您在 Spring Security 中发布和处理事件所需了解的全部理论。接下来，您将看到一个非常简单的示例，您将把这些知识付诸实践，通过监听事件为您的应用程序添加行为。\n\
  此示例将只监听一种类型的事件，但监听更多类型所需的配置是完全相同的。您实现相同的接口，但只需在泛型类型中指定不同的事件类型即可。\n\n要开始监听事件，您需要做的就是实现\
  \ `ApplicationListener` 接口，并在 Spring 应用程序上下文中配置实现该接口的 Bean。清单 8-1 展示了一个简单的实现，它记录了\
  \ `AuthenticationFailureBadCredentialsEvent` 事件。\n\n```\npackage com.apress.pss.security;\n\
  import org.apache.commons.logging.Log;\nimport org.apache.commons.logging.LogFactory;\n\
  import org.springframework.context.ApplicationListener;\nimport org.springframework.security.authentication.event.AuthenticationFailureBadCredentialsEvent;\n\
  public class LoggerBadCredentialsEvents implements ApplicationListener{\nprivate\
  \ static Log LOG = LogFactory.getLog(LoggerBadCredentialsEvents.class);\npublic\
  \ void onApplicationEvent(\nAuthenticationFailureBadCredentialsEvent event) {\n\
  LOG.warn(\"检测到使用错误凭证尝试登录，用户名为 \"+\nevent.getAuthentication().getName());\n}\n}\n\
  清单 8-1\n监听 AuthenticationFailureBadCredentialsEvent 并记录日志的 ApplicationListener\n\
  ```\n\n监听器的实现非常简单。您只需要实现该接口，并使用您想要监听的事件类来指定其泛型类型。然后，如果您在应用程序上下文中定义了 `LoggerBadCredentialsEvents`\
  \ 类的一个 Bean 实例，它将被自动注入到 Spring 框架的事件处理系统中，并且每次发布 `AuthenticationFailureBadCredentialsEvent`\
  \ 时，此监听器都会收到通知。\n要定义任何其他事件处理器，您执行相同的操作，但使用您想要监听的正确事件类来指定处理器类的泛型类型。请继续尝试一下。针对不同的事件类型测试此功能应该足够简单。\n\
  \n\n\n自定义 AuthenticationProvider 和 UserDetailsService\n\n在上一章中，你已经了解到 Spring 提供了相当多的身份验证选项，以适应你可能在应用程序中遇到的各种不同需求。观察这些不同的身份验证提供程序在你的应用程序中是如何设置的，以及它们被优雅地封装在各自“模块”中的方式，你可能会想到，你应该能够使用自己的身份验证提供程序。事实上，你当然可以，这里我们将通过一个简单的示例向你展示如何操作。\n\
  \n首先，让我们回顾一下身份验证提供程序在你的应用程序中是如何工作的。\n\nSpring Security 中主要的身份验证入口点是 `AuthenticationManager`\
  \ 接口——特别是 `ProviderManager` 实现。`ProviderManager` 的主要功能是遍历在其上配置的 `AuthenticationProvider`\
  \ 实现列表，直到其中一个能够对用户进行身份验证（用户信息被封装在某个可用的 `Authentication` 实现对象中），或者，实际上，直到发现没有一个能够进行身份验证，此时它会抛出一个异常。\n\
  \n你在前几章中看到的定义 `ProviderManager` 和 `AuthenticationProvider` 的标准方式如清单 8-2 所示。（尽管类名以及\
  \ XML 文件中元素的名称并不完全匹配，但 Spring Security 命名空间 XML 解析机制负责将所示的 `<authentication-manager>`\
  \ 和 `<authentication-provider>` 元素的组合匹配到前面提到的类。）当你像清单中那样使用命名空间定义一个身份验证管理器和一个身份验证提供程序时，框架会实例化两个\
  \ `ProviderManager` 对象，并将其中一个设置为另一个的父级。`ProviderManager` 使用这种方案，它能够建立身份验证管理器的层次结构。首先查询子级\
  \ `AuthenticationManager`（以 `ProviderManager` 类的形式）进行身份验证。如果它无法解决身份验证请求，它会检查是否有一个已配置的父级管理器可以查询；如果有，则调用其\
  \ authenticate 方法。这种父子关系由 Spring 在启动时管理。\n\n在 `ProviderManager` 实例的父子关系中，其中一个实例在\
  \ `AuthenticationProvider` 列表中定义了一个 `DaoAuthenticationProvider` 实例（来自 `<authentication-provider>`\
  \ 元素），而另一个实例配置了一个 `AnonymousAuthenticationProvider`，这个实例是在使用 `<http>` 元素并定义通用过滤器时定义的。因此，当你使用清单\
  \ 8-2 中的通用定义时，这两个提供程序是默认使用的。\n\n定义你自己的自定义身份验证提供程序很简单，因为你只需要实现 `org.springframework.security.authentication.AuthenticationProvider`\
  \ 接口，该接口只定义了两个方法：\n\n```\nAuthentication authenticate(Authentication authentication)\n\
  boolean supports(Class authentication)\n```\n\n但实现该接口并不是唯一的选择。如果你要创建的实现依赖于 `UserDetails`\
  \ 抽象进行身份验证，你可以轻松地扩展 `AbstractUserDetailsAuthenticationProvider`（就像 `DaoAuthenticationProvider`\
  \ 所做的那样）。`AuthenticationProvider` 中的主要方法是 `public Authentication authenticate(Authentication\
  \ authentication)` 方法。如你所见，该方法接收一个身份验证对象并返回一个身份验证对象。这两个身份验证对象（接收的和返回的）之间的重要区别在于，返回的\
  \ `Authentication` 对象在其 `isAuthenticated` 方法中将返回 `true`（当然，如果身份验证成功），表明现在存在一个完全经过身份验证的对象，而方法中接收的\
  \ `Authentication` 对象，该方法将返回 `false`。这是合乎逻辑的工作方式，因为 `Authentication` 对象中的这个方法（`isAuthenticated`）及其返回值，在概念上区分了一个完全经过身份验证的\
  \ `Authentication` 对象与一个仅用于在实际应用身份验证逻辑之前包装用户详细信息的 `Authentication` 对象，或者实际上，任何尚未完全通过身份验证和验证的\
  \ `Authentication` 对象。\n\n有时，你可能不需要实现整个 `AuthenticationProvider`，而只需要更改获取 `UserDetails`\
  \ 的位置。例如，当使用 `InMemoryUserDetailsManager` 获取存储在内存中的 `UserDetails`，或使用 `JdbcUserDetailsManager`\
  \ 获取存储在关系数据库中的 `UserDetails` 时，就是这种情况。当然，你可以创建一个新的 `UserDetailsService` 来从其他来源检索这些\
  \ `UserDetails`，这将在接下来的示例中向你展示。图 8-4 说明了 `AuthenticationProvider`（实际上是 `AbstractUserDetailsAuthenticationProvider`\
  \ 实现）与 `UserDetailsService` 之间的关系。\n\n![../images/310331_2_En_8_Chapter/310331_2_En_8_Fig4_HTML.jpg](img/310331_2_En_8_Fig4_HTML.jpg)\n\
  \n图 8-4\nAbstractUserDetailsAuthenticationProvider 与 UserDetailsService 的关系\n\n\
  在图 8-4 中，`AbstractAuthenticationProvider` 和 `UserDetailsService` 都可以被自定义实现替换。默认情况下，UserCache\
  \ 使用 `NullUserCache` 实现，这是一个无操作缓存。它也可以被轻松替换，但我们在此不进行讨论。缓存的想法是缓存 `UserDetails` 对象，以备需要再次检索它们。`AbstractUserDetailsAuthenticationProvider`\
  \ 中的 authenticate 方法将首先在此缓存中查找 `UserDetails`；如果 authenticate 方法在缓存中找到了 `UserDetails`，它将使用该\
  \ `UserDetails` 尝试进行身份验证。如果 authenticate 方法没有在缓存中找到 `UserDetails`，它将查询配置的 `UserDetailsService`\
  \ 以获取用户，然后将其存储在缓存中，以供后续请求使用。\n\n```\n\n清单 8-2\nAuthenticationManager 和 AuthenticationProvider\
  \ 的通用定义。需包含在 applicationContext-security.xml 中\n```\n\n我们将展示的第一个示例是如何使用 Spring Boot、Spring\
  \ Security、Spring Data、Thymeleaf 和 MongoDB 创建一个身份验证和登录应用程序。\n\n第一步是使用 Spring Initializr\
  \ 创建 Spring Boot Maven 项目，这是生成 Spring Boot 项目最快的方式。你只需为你的项目选择语言、构建系统和 JVM 版本，它就会自动生成并包含所有必需的依赖项。\n\
  \n\n\n导航至 [`https://start.spring.io/`](https://start.spring.io/)\n并使用基于 Web 的 Spring\
  \ Initializr Spring 项目生成器来\n创建名为 SpringSecurityMongoDB 的 Spring Boot Maven 项目，如\n\
  图 8-5 所示。\n\n![../images/310331_2_En_8_Chapter/310331_2_En_8_Fig5_HTML.jpg](img/310331_2_En_8_Fig5_HTML.jpg)\n\
  \n图 8-5\n 使用基于 Web 的 Initializr Spring 项目生成器生成 Maven 项目\n\n选择一个 Java v11 Maven 项目，使用\
  \ 2.1.4 版本的 Spring Boot，并\n添加以下依赖项：Web、Security、Thymeleaf 和 MongoDB。\n填写所有必需的信息，然后点击生成项目。系统将自动生成一个项目\
  \ .zip 文件。\n在你的机器上下载并解压该文件。\n\n当使用 IntelliJ IDEA 2019 打开该项目时，它将如图 8-6 所示。\n\n![../images/310331_2_En_8_Chapter/310331_2_En_8_Fig6_HTML.jpg](img/310331_2_En_8_Fig6_HTML.jpg)\n\
  \n图 8-6\n Maven 项目结构\n\n最重要的依赖项（它们将自动更新到 `pom.xml` 文件中）如代码清单 8-3 所示。\n\n```\norg.springframework.boot\n\
  spring-boot-starter-data-mongodb\n\norg.springframework.boot\nspring-boot-starter-security\n\
  \norg.springframework.boot\nspring-boot-starter-web\n\norg.springframework.boot\n\
  spring-boot-starter-thymeleaf\n\norg.thymeleaf.extras\nthymeleaf-extras-springsecurity5\n\
  \n代码清单 8-3\n所需的依赖项\n```\n\n添加了依赖项后的完整 `pom.xml` 文件如代码清单 8-4 所示。\n\n```\n\n4.0.0\n\
  \norg.springframework.boot\nspring-boot-starter-parent\n2.1.4.RELEASE\n\ncom.apress\n\
  SpringSecurityMongoDB\n0.0.1-SNAPSHOT\nSpringSecurityMongoDB\nDemo project for Spring\
  \ Boot\n\norg.springframework.boot\nspring-boot-starter-data-mongodb\n\norg.springframework.boot\n\
  spring-boot-starter-security\n\norg.springframework.boot\nspring-boot-starter-web\n\
  \norg.springframework.boot\nspring-boot-starter-thymeleaf\n\norg.thymeleaf.extras\n\
  thymeleaf-extras-springsecurity5\n\norg.springframework.boot\nspring-boot-starter-test\n\
  test\n\norg.springframework.security\nspring-security-test\ntest\n\norg.springframework.boot\n\
  spring-boot-maven-plugin\n\n代码清单 8-4\nPom.xml 文件及依赖项\n```\n\n你将使用 Spring Data 来设置和使用\
  \ MongoDB。这并非绝对必要，但由于你正在使用 Spring，因此这似乎是个好主意。根据 Spring Data for MongoDB 网站 ([`https://spring.io/projects/spring-data-mongodb`](https://spring.io/projects/spring-data-mongodb))\
  \ 的说法，它“旨在为新的数据存储提供一种熟悉且一致的基于 Spring 的编程模型，同时保留特定于存储的特性和功能。”因此，你拥有一个基于 Spring 的应用程序，并且正在使用\
  \ MongoDB，这非常契合。你需要添加到 `pom.xml` 文件中的 MongoDB 依赖项是：\n\n```\norg.springframework.boot\n\
  spring-boot-starter-data-mongodb\n\n```\n\n注意\nMongoDB 可以\n以嵌入式模式或作为外部数据库使用。\n\n\
  在本示例中，你将使用外部安装的 MongoDB。\n你可以从其官方网站 [`www.mongodb.com/download-center`](https://www.mongodb.com/download-center)\
  \ 下载它。\n\n下载 .zip 文件后（在我们的例子中是 `mongodb-src-r4.0.8.zip`），你可以简单地将文件解压到某个位置，然后就可以运行了。要在\
  \ Linux 或 Mac 上运行 MongoDB 服务器，只需进入你刚刚解压的目录的 bin 目录，然后运行 `./mongod` 文件。如果你使用的是 Windows\
  \ 10，只需下载 .zip 文件，解压，进入安装文件夹，然后运行命令 `mongod` 来启动它。\n现在 MongoDB 已启动并正在运行，如图 8-7 所示。\n\
  \n![../images/310331_2_En_8_Chapter/310331_2_En_8_Fig7_HTML.jpg](img/310331_2_En_8_Fig7_HTML.jpg)\n\
  \n图 8-7\n MongoDB 已启动\n\n注意\nMongoDB 是一种\n非常流行的基于文档的数据库。它是近年来变得非常流行的许多 NoSQL 解决方案的一部分。它是一个非常强大且灵活的工具。其主要优势在于（至少从我们的角度来看）它将高度可扩展的存储解决方案与建立在已知技术（如命令行界面中的\
  \ JSON 和 JavaScript）之上的非常直观的文档模型相结合。而且，它并没有忘记 SQL 世界最好的特性之一，即通过执行动态查询的能力所提供的灵活性，允许你使用非常多样化的标准和过滤选项来查询数据库。这与例如仅允许按键搜索的键值存储解决方案形成对比。正如我们所说，MongoDB\
  \ 是一个文档存储库，其中的文档结构化为 JSON。MongoDB 将其文档存储在称为*集合*的文档集合中。我们不会进一步解释 MongoDB，除非是为了创建和运行示例所需的内容。如果你有兴趣了解更多信息，网上有很多参考书目可以帮助你，从项目网站开始，特别是这个指向当前相关书籍的链接：[`https://docs.mongodb.com/?_ga=2.266750797.2128884934.1555058402-165371435.1555058402`](https://docs.mongodb.com/%253F_ga%253D2.266750797.2128884934.1555058402-165371435.1555058402)。\n\
  \n对于此示例，你还可以使用 MongoDB Compass 工具，这是一个非常易于使用的 MongoDB 工具，你可以从 [`www.mongodb.com/download-center/compass?jmp=hero`](http://www.mongodb.com/download-center/compass%253Fjmp%253Dhero)\
  \ 下载。MongoDB Compass 工具仪表板如图 8-8 所示。\n\n![../images/310331_2_En_8_Chapter/310331_2_En_8_Fig8_HTML.jpg](img/310331_2_En_8_Fig8_HTML.jpg)\n\
  \n图 8-8\n MongoDB Compass 工具\n\n接下来，通过完成以下步骤，创建本示例所需的名为 `springsecuritymongodb`\
  \ 的 MongoDB 数据库以及名为 `users` 和 `roles` 的两个集合：\n\n![../images/310331_2_En_8_Chapter/310331_2_En_8_Fig9_HTML.jpg](img/310331_2_En_8_Fig9_HTML.jpg)\n\
  \n图 8-9\n MongoDB 查看新创建的数据库、集合、用户和角色\n\n1.  进入 MongoDB 的安装目录。\n\n2.  进入 `bin` 文件夹。\n\
  \n3.  执行 `mongo` 命令。\n\n4.  执行图 8-9 中所示的命令。\n\n基本上，你需要两个集合。`roles` 集合仅包含两条记录，用于定义注册用户拥有\
  \ `ADMIN` 还是 `USER` 凭据来访问示例。首先创建 `roles` 集合，然后添加两条记录：\n\n```\ndb.createCollection(\"\
  roles\")\ndb.roles.insert({\"role\":\"ADMIN\",\"_class\":\"com.apress.SpringSecurityMongoDB.domain.Role\"\
  });\ndb.roles.insert({\"role\":\"USER\",\"_class\":\"com.apress.SpringSecurityMongoDB.domain.Role\"\
  });\n```\n\n然后创建另一个名为 `users` 的集合，其中添加一个具有 `ADMIN` 凭据的新用户：\n\n```\ndb.createCollection(\"\
  users\")\ndb.users.insert({\"email\":\"admin@admin.com\",\"password\":\"$2a$10$qNYHb8JtRrREzSFKEwXfA.230HTujndUR0qCTPsGP8.FqWetlSqmC\"\
  ,\"role\":\"ADMIN\",\"roles\":[{\"$ref\":\"role\",\"$id\":\"5cd04193dca5753dec0b07e9\"\
  ,\"$db\":\"\"}],\"_class\":\"com.apress.SpringSecurityMongoDB.domain.User\"});\n\
  ```\n\n\n\n`roles \":[{\"$ref\":\"role\",\"$id\":\"5cd04193dca5753dec0b07e9\",\"\
  $db\":\"\"}]` 会将此用户管理员链接到 `roles` 集合中的 `ADMIN` 角色，以便他们能够以管理员身份进行身份验证。您已成功创建了一个管理员用户，用作本示例的管理员。\n\
  \n其核心思想是：某个用户与特定角色（`ADMIN` 或 `USER`）相关联，并可根据该凭证访问示例中的相应部分。请注意，如果您不想通过命令行添加用户，也可以使用本章稍后介绍的\
  \ `signup.html` 页面，将用户添加到 MongoDB 中。\n\n现在，让我们基于您刚刚创建的项目，来构建 Spring Boot Security\
  \ v5 和 MongoDB 的示例。\n\n通过 `application.properties` 文件为应用程序添加一些属性：\n\n```\nspring.data.mongodb.database=springsecuritymongodb\n\
  spring.data.mongodb.host=localhost\nspring.data.mongodb.port=27017\nspring.freemarker.template-loader-path=/templates\n\
  spring.freemarker.expose-request-attributes=true\nspring.freemarker.expose-spring-macro-helpers=true\n\
  spring.mvc.view.prefix=/resources/templates\nspring.mvc.view.suffix=.html\nserver.error.whitelabel.enabled=false\n\
  ```\n\n您正在告知应用程序要使用的 MongoDB 数据库名称、主机和端口号。此外，由于本示例将使用 Freemarker 模板，您还需要添加一些信息，例如模板的位置，以及应用程序是否可以使用请求属性和宏辅助工具。您还定义了一些\
  \ Spring MVC 视图属性，并将 `server.error.whitelabel.enabled` 设置为 `false`，以便在示例中创建自定义错误页面。\n\
  \n现在开始创建示例。所有 Web 资源都将使用 HTML 模板创建。\n\n通常，Spring Web 框架是围绕模型-视图-控制器（MVC）模式构建的，用于在应用程序中轻松分离内容。它允许我们使用多种不同的视图技术，例如：\n\
  \n*   Java 服务器页面（JSP）\n*   Thymeleaf（用于处理 HTML、XML、文本、JavaScript 或 CSS）\n*   FreeMarker（用于\
  \ XML 文件、配置文件、电子邮件和其他基于文本的格式）\n*   Groovy（用于生成任何文本格式）\n*   Jade4j（用于生成 HTML 文件）\n\
  \n在本示例中，您将使用 Thymeleaf 来处理 HTML 文件。创建第一个名为 `welcome.html` 的 HTML 文件，如清单 8-5 所示。\n\
  \n```\n\nSpring Boot Security 5 and MongoDB 示例\n\n欢迎来到 Spring Boot Security 5 和\
  \ MongoDB 示例！\n请登录。\n\n清单 8-5\nwelcome.html\n```\n\n下一步是创建所需的示例 Java 类。\n\n您的 Spring\
  \ Boot Security 和 MongoDB 示例将包含以下 Java 包：\n\n*   configuration\n*   controller\n\
  *   domain\n*   repositories\n*   service\n\n现在，您将创建本示例中最重要的 Java 类 `SpringSecurityConfiguration`，如清单\
  \ 8-6 所示。\n\n```\npackage com.apress.SpringSecurityMongoDB.configuration;\nimport\
  \ com.apress.SpringSecurityMongoDB.service.CustomUserDetailsService;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
  import org.springframework.security.config.annotation.authentication.builders.AuthenticationManagerBuilder;\n\
  import org.springframework.security.config.annotation.web.builders.HttpSecurity;\n\
  import org.springframework.security.config.annotation.web.builders.WebSecurity;\n\
  import org.springframework.security.config.annotation.web.configuration.EnableWebSecurity;\n\
  import org.springframework.security.config.annotation.web.configuration.WebSecurityConfigurerAdapter;\n\
  import org.springframework.security.core.userdetails.UserDetailsService;\nimport\
  \ org.springframework.security.crypto.bcrypt.BCryptPasswordEncoder;\nimport org.springframework.security.web.util.matcher.AntPathRequestMatcher;\n\
  @Configuration\n@EnableWebSecurity\npublic class SpringSecurityConfiguration extends\
  \ WebSecurityConfigurerAdapter {\n@Autowired\nprivate BCryptPasswordEncoder bCryptPasswordEncoder;\n\
  @Autowired\nCustomizeAuthenticationSuccessHandler customizeAuthenticationSuccessHandler;\n\
  @Bean\npublic UserDetailsService mongoUserDetails() {\nreturn new CustomUserDetailsService();\n\
  }\n@Override\nprotected void configure(AuthenticationManagerBuilder auth) throws\
  \ Exception {\nUserDetailsService userDetailsService = mongoUserDetails();\nauth\n\
  .userDetailsService(userDetailsService)\n.passwordEncoder(bCryptPasswordEncoder);\n\
  }\n@Override\nprotected void configure(HttpSecurity http) throws Exception {\nhttp\n\
  .authorizeRequests()\n.antMatchers(\"/\").permitAll()\n.antMatchers(\"/login\").permitAll()\n\
  .antMatchers(\"/signup\").permitAll()\n.antMatchers(\"/user/**\").hasAnyAuthority(\"\
  USER\").anyRequest().authenticated().antMatchers(\"/admin/**\").hasAnyAuthority(\"\
  ADMIN\").anyRequest()\n.authenticated().and().formLogin().successHandler(customizeAuthenticationSuccessHandler)\n\
  .loginPage(\"/login\").failureUrl(\"/login?error=true\")\n.usernameParameter(\"\
  email\")\n.passwordParameter(\"password\")\n.and().logout()\n.logoutRequestMatcher(new\
  \ AntPathRequestMatcher(\"/logout\"))\n.logoutSuccessUrl(\"/\").and().exceptionHandling().accessDeniedPage(\"\
  /forbidden\");\n}\n@Override\npublic void configure(WebSecurity web) throws Exception\
  \ {\nweb\n.ignoring()\n.antMatchers(\"/resources/**\");\n}\n@Bean\npublic BCryptPasswordEncoder\
  \ passwordEncoder() {\nBCryptPasswordEncoder bCryptPasswordEncoder = new BCryptPasswordEncoder();\n\
  return bCryptPasswordEncoder;\n}\n}\n清单 8-6\nSpringSecurityConfiguration Java 类\n\
  ```\n\n该应用程序将包含：\n\n*   `BCryptPasswordEncoder:` 用于处理 BCrypt 密码\n*   `CustomizeAuthenticationSuccessHandler:`\
  \ 用于自定义登录成功处理器\n*   `Configure(HttpSecurity http):` 包含所有关于可访问哪些 URL 以及如何访问的信息。例如，用户和管理员\
  \ URL 将分别要求 `hasAnyAuthority(\"USER\")` 和 `hasAnyAuthority(\"ADMIN\")`。\n*   `Configure(WebSecurity\
  \ web):` 本示例使用的资源文件夹\n\n下一个 Java 类是 `LoginController`。为了启动 `welcome.html` 模板，您需要添加清单\
  \ 8-7 中的代码。\n\n```\n@RequestMapping(value = {\"/\",\"/welcome\"}, method = RequestMethod.GET)\n\
  public ModelAndView home() {\nModelAndView modelAndView = new ModelAndView();\n\
  modelAndView.setViewName(\"welcome\");\nreturn modelAndView;\n}\n清单 8-7\nLoginController\
  \ Java 类\n```\n\n该应用程序已准备好作为一个简单的欢迎网页进行测试。\n\n您可以使用 Spring Boot 配置构建项目，并在 Tomcat\
  \ Server v9 上运行它，如图 8-10 和 8-11 所示。\n\n![../images/310331_2_En_8_Chapter/310331_2_En_8_Fig11_HTML.jpg](img/310331_2_En_8_Fig11_HTML.jpg)\n\
  \n图 8-11\n运行 Spring Boot 项目\n\n\n\n![../images/310331_2_En_8_Chapter/310331_2_En_8_Fig10_HTML.jpg](img/310331_2_En_8_Fig10_HTML.jpg)\n\
  \n图 8-10\n配置第一个 Maven 项目的运行步骤\n\n如果你访问 `http://localhost:8080/`，\n你将看到图 8-12 所示的\
  \ `welcome.html` 页面。\n\n![../images/310331_2_En_8_Chapter/310331_2_En_8_Fig12_HTML.jpg](img/310331_2_En_8_Fig12_HTML.jpg)\n\
  \n图 8-12\nwelcome.html 页面\n\n现在，你的第一个 HTML 文件已经成功运行。接下来，你可以开始使用 MongoDB 和 Spring\
  \ Security v5 构建示例的其余部分。\n\n下一步是创建一个名为 `CustomizeAuthenticationSuccessHandler` 的\
  \ Java 类，该类将用于处理自定义的登录成功页面；参见清单 8-8。\n\n```\npackage com.apress.SpringSecurityMongoDB.configuration;\n\
  import org.springframework.security.core.Authentication;\nimport org.springframework.security.core.GrantedAuthority;\n\
  import org.springframework.security.web.authentication.AuthenticationSuccessHandler;\n\
  import org.springframework.stereotype.Component;\nimport javax.servlet.ServletException;\n\
  import javax.servlet.http.HttpServletRequest;\nimport javax.servlet.http.HttpServletResponse;\n\
  import java.io.IOException;\n@Component\npublic class CustomizeAuthenticationSuccessHandler\
  \ implements AuthenticationSuccessHandler {\n@Override\npublic void onAuthenticationSuccess(HttpServletRequest\
  \ request,\nHttpServletResponse response, Authentication authentication)\nthrows\
  \ IOException, ServletException {\nresponse.setStatus(HttpServletResponse.SC_OK);\n\
  for (GrantedAuthority auth : authentication.getAuthorities()) {\nif (\"ADMIN\".equals(auth.getAuthority()))\
  \ {\nresponse.sendRedirect(\"/admin\");\n}\nif (\"USER\".equals(auth.getAuthority()))\
  \ {\nresponse.sendRedirect(\"/user\");\n}\n}\n}\n}\n清单 8-8\nCustomizeAuthenticationSuccessHandler\
  \ Java 类\n```\n\n这个 Java 类简单地检查尝试登录的用户的 `authentication.getAuthorities` 是否等于 `ADMIN`，如果是，则重定向到\
  \ `/admin` 页面；或者如果是 `USER`，则重定向到 `/user` 网页。它是在 `SpringSecurityConfiguration` Java\
  \ 类中通过配置 `.authenticated().and().formLogin().successHandler(`**customizeAuthenticationSuccessHandler**`)`\
  \ 来配置的。\n\n现在，创建清单 8-9 中所示的简单 `login.html` 页面。\n\n```\n\nSpinrg Boot Security 5\
  \ and MongoDB\n\nPlease login as user or admin:\n\nInvalid email and password.\n\
  \nEmail Address:\n\nPassword:\n\nLogin\n\nSignup as a new user\n\n清单 8-9\nlogin.html\
  \ 页面\n```\n\n这个 `login.html` 页面将执行三项操作：\n\n1.  将电子邮件地址和密码以 HTTP POST 方法发送到 `LoginController`\
  \ Java 类。\n2.  检查电子邮件和密码是否输入正确。\n3.  提供注册选项，以便向 MongoDB 数据库添加新用户。\n\n为了检查用户的凭据是否有效以及他们应该被重定向到哪里，创建名为\
  \ `LoginController` 的 Java 控制器类，如清单 8-10 所示。\n\n```\npackage com.apress.SpringSecurityMongoDB.controller;\n\
  import com.apress.SpringSecurityMongoDB.domain.User;\nimport com.apress.SpringSecurityMongoDB.service.CustomUserDetailsService;\n\
  import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.security.core.Authentication;\n\
  import org.springframework.security.core.context.SecurityContextHolder;\nimport\
  \ org.springframework.stereotype.Controller;\nimport org.springframework.validation.BindingResult;\n\
  import org.springframework.web.bind.annotation.RequestMapping;\nimport org.springframework.web.bind.annotation.RequestMethod;\n\
  import org.springframework.web.servlet.ModelAndView;\nimport javax.validation.Valid;\n\
  @Controller\npublic class LoginController {\n@Autowired\nprivate CustomUserDetailsService\
  \ userService;\n@RequestMapping(value = \"/login\", method = RequestMethod.GET)\n\
  public ModelAndView login() {\nModelAndView modelAndView = new ModelAndView();\n\
  modelAndView.setViewName(\"login\");\nreturn modelAndView;\n}\n@RequestMapping(value\
  \ = \"/signup\", method = RequestMethod.GET)\npublic ModelAndView signup() {\nModelAndView\
  \ modelAndView = new ModelAndView();\nUser user = new User();\nmodelAndView.addObject(\"\
  user\", user);\nmodelAndView.setViewName(\"signup\");\nreturn modelAndView;\n}\n\
  @RequestMapping(value = \"/signup\", method = RequestMethod.POST)\npublic ModelAndView\
  \ createNewUser(@Valid User user, BindingResult bindingResult) {\nModelAndView modelAndView\
  \ = new ModelAndView();\nUser userExists = userService.findUserByEmail(user.getEmail());\n\
  if (userExists != null) {\nmodelAndView.addObject(\"message\", \"There is already\
  \ a user registered with the username provided\");\nbindingResult\n.rejectValue(\"\
  email\", \"error.user\",\n\"There is already a user registered with the username\
  \ provided\");\n}\nif (bindingResult.hasErrors()) {\nmodelAndView.setViewName(\"\
  signup\");\n} else {\nuserService.saveUser(user);\nmodelAndView.addObject(\"successMessage\"\
  , \"User has been registered successfully\");\nmodelAndView.addObject(\"user\",\
  \ new User());\nmodelAndView.setViewName(\"login\");\n}\nreturn modelAndView;\n\
  }\n@RequestMapping(value = \"/admin\", method = RequestMethod.GET)\npublic ModelAndView\
  \ admin() {\nModelAndView modelAndView = new ModelAndView();\nAuthentication auth\
  \ = SecurityContextHolder.getContext().getAuthentication();\nUser user = userService.findUserByEmail(auth.getName());\n\
  modelAndView.addObject(\"currentUser\", auth.getName());\nmodelAndView.addObject(\"\
  role\", user.getRole());\nmodelAndView.addObject(\"adminMessage\", \"Content Available\
  \ Only for Authenticated Admins!\");\nmodelAndView.setViewName(\"admin\");\nreturn\
  \ modelAndView;\n}\n@RequestMapping(value = \"/user\", method = RequestMethod.GET)\n\
  public ModelAndView user() {\nModelAndView modelAndView = new ModelAndView();\n\
  Authentication auth = SecurityContextHolder.getContext().getAuthentication();\n\
  User user = userService.findUserByEmail(auth.getName());\nmodelAndView.addObject(\"\
  currentUser\", auth.getName());\nmodelAndView.addObject(\"role\", user.getRole());\n\
  modelAndView.addObject(\"userMessage\", \"Content Available Only for Authenticated\
  \ Users!\");\nmodelAndView.setViewName(\"user\");\nreturn modelAndView;\n}\n@RequestMapping(value\
  \ = {\"/\",\"/welcome\"}, method = RequestMethod.GET)\npublic ModelAndView home()\
  \ {\nModelAndView modelAndView = new ModelAndView();\nmodelAndView.setViewName(\"\
  welcome\");\nreturn modelAndView;\n}\n@RequestMapping(value = {\"/forbidden\"},\
  \ method = RequestMethod.GET)\npublic ModelAndView forbidden() {\nModelAndView modelAndView\
  \ = new ModelAndView();\nmodelAndView.setViewName(\"forbidden\");\nreturn modelAndView;\n\
  }\n}\n清单 8-10\nLoginController Java 类\n```\n\n这个 Java 类充当页面控制器，根据请求的 URL，将重定向到诸如\
  \ welcome、forbidden 等页面。当请求 `/admin` 或 `/user` URL 时，该 Java 类将验证用户凭据是否正确，以便重定向到目标页面。`modelAndView.addObject`\
  \ 用于收集要在 HTML 页面上显示的信息和消息。\n\n\n\n所有页面错误都将通过 Java 控制器类 `MyErrorController` 进行管理，如清单\
  \ 8-11 所示。\n\n```\npackage com.apress.SpringSecurityMongoDB.controller;\nimport\
  \ org.springframework.boot.web.servlet.error.ErrorController;\nimport org.springframework.stereotype.Controller;\n\
  import org.springframework.web.bind.annotation.GetMapping;\nimport javax.servlet.http.HttpServletRequest;\n\
  import org.springframework.web.servlet.ModelAndView;\n@Controller\npublic class\
  \ MyErrorController implements ErrorController {\npublic MyErrorController() {}\n\
  @GetMapping(value = \"/error\")\npublic ModelAndView renderErrorPage(HttpServletRequest\
  \ httpRequest) {\nModelAndView errorPage = new ModelAndView(\"errorPage\");\nString\
  \ errorMsg = \"\";\nint httpErrorCode = getErrorCode(httpRequest);\nswitch (httpErrorCode)\
  \ {\ncase 400: {\nerrorMsg = \"Http 错误代码：400。错误请求\";\nbreak;\n}\ncase 401: {\nerrorMsg\
  \ = \"Http 错误代码：401。未授权\";\nbreak;\n}\ncase 404: {\nerrorMsg = \"Http 错误代码：404。未找到资源\"\
  ;\nbreak;\n}\ncase 500: {\nerrorMsg = \"Http 错误代码：500。服务器内部错误\";\nbreak;\n}\n}\n\
  errorPage.addObject(\"errorMsg\", errorMsg);\nreturn errorPage;\n}\nprivate int\
  \ getErrorCode(HttpServletRequest httpRequest) {\nreturn (Integer) httpRequest\n\
  .getAttribute(\"javax.servlet.error.status_code\");\n}\n@Override\npublic String\
  \ getErrorPath() {\nreturn \"/error\";\n}\n}\n清单 8-11\nMyErrorController Java 类\n\
  ```\n\n当出现白标错误时，此 Java 类将重定向到 `errorPage.html` 页面，该页面将显示从 Java 类接收到的错误消息。\n请注意，这需要在\
  \ `application.properties` 中添加以下行才能生效：\n\n```\nserver.error.whitelabel.enabled=false\n\
  ```\n\n`errorPage.html` 页面如清单 8-12 所示。\n\n```\n\nSecurity with Spring Boot\n\nError\
  \ on page!\n\nHome\n\n清单 8-12\nerrorPage.html 网页\n```\n\n`errorpage.html` 页面如图 8-13\
  \ 所示。\n\n![../images/310331_2_En_8_Chapter/310331_2_En_8_Fig13_HTML.jpg](img/310331_2_En_8_Fig13_HTML.jpg)\n\
  \n图 8-13\nerrorPage.html 页面\n\n如果请求了一个禁止访问的页面，`LoginController` Java 类将重定向到 `forbidden.html`\
  \ 页面，该页面如清单 8-13 所示。这是在 `SpringSecurityConfiguration` Java 类中配置的，如下所示：\n\n```\n\n\
  Security with Spring Boot\n\nError on page!\nErrortype: \nHome\n\n清单 8-13\nforbidden.html\
  \ 网页\n```\n\n```\nexceptionHandling().accessDeniedPage(\"/forbidden\");\n```\n\n\
  `forbidden.html` 页面如图 8-14 所示。\n\n![../images/310331_2_En_8_Chapter/310331_2_En_8_Fig14_HTML.jpg](img/310331_2_En_8_Fig14_HTML.jpg)\n\
  \n图 8-14\nforbidden.html 页面\n\n下一步是创建你需要的模型，命名为 `User` 和 `Role`，它们将存储 MongoDB 集合。首先，创建如清单\
  \ 8-14 所示的 `User` 模型。\n\n```\npackage com.apress.SpringSecurityMongoDB.domain;\n\
  import org.springframework.data.annotation.Id;\nimport org.springframework.data.mongodb.core.index.IndexDirection;\n\
  import org.springframework.data.mongodb.core.index.Indexed;\nimport org.springframework.data.mongodb.core.mapping.DBRef;\n\
  import org.springframework.data.mongodb.core.mapping.Document;\nimport java.util.Set;\n\
  @Document(collection = \"users\")\npublic class User {\n@Id\nprivate String id;\n\
  @Indexed(unique = true, direction = IndexDirection.DESCENDING)\nprivate String email;\n\
  private String password;\nprivate String role;\n@DBRef\nprivate Set roles;\npublic\
  \ String getId() {\nreturn id;\n}\npublic void setId(String id) {\nthis.id = id;\n\
  }\npublic String getEmail() {\nreturn email;\n}\npublic void setEmail(String email)\
  \ {\nthis.email = email;\n}\npublic String getPassword() {\nreturn password;\n}\n\
  public void setPassword(String password) {\nthis.password = password;\n}\npublic\
  \ String getRole() {\nreturn role;\n}\npublic void setRole(String role) {\nthis.role\
  \ = role;\n}\npublic Set getRoles() {\nreturn roles;\n}\npublic void setRoles(Set\
  \ roles) {\nthis.roles = roles;\n}\n@Override\npublic String toString() {\nreturn\
  \ \"User{\" +\n\"id=\" + id +\n\", email='\" + email.replaceFirst(\"@.*\", \"@***\"\
  ) +\n\", password='\" + password.substring(0, 10) +\n\", role=\" + role +\n'}';\n\
  }\n}\n清单 8-14\nUser Java 类\n```\n\n基本上，这个 `User` Java 类将管理从 MongoDB 获取和添加用户数据。例如，对于电子邮件地址，以下代码将获取电子邮件并将电子邮件值设置到\
  \ MongoDB 数据库中：\n\n```\npublic String getEmail() {\nreturn email;\n}\npublic void\
  \ setEmail(String email) {\nthis.email = email;\n}\n```\n\n以相同的方式创建 `Role` 模型，如清单\
  \ 8-15 所示。\n\n```\npackage com.apress.SpringSecurityMongoDB.domain;\nimport org.springframework.data.annotation.Id;\n\
  import org.springframework.data.mongodb.core.index.IndexDirection;\nimport org.springframework.data.mongodb.core.index.Indexed;\n\
  import org.springframework.data.mongodb.core.mapping.Document;\n@Document(collection\
  \ = \"roles\")\npublic class Role {\n@Id\nprivate String id;\n@Indexed(unique =\
  \ true, direction = IndexDirection.DESCENDING)\nprivate String role;\npublic String\
  \ getId() {\nreturn id;\n}\npublic void setId(String id) {\nthis.id = id;\n}\npublic\
  \ String getRole() {\nreturn role;\n}\npublic void setRole(String role) {\nthis.role\
  \ = role;\n}\n}\n清单 8-15\nRole Java 类\n```\n\n同样，与 `User` Java 类一样，`get` 和 `set`\
  \ 将用于从 MongoDB 数据库获取数据和设置数据。\n\n下一步是创建两个 Java 仓库接口，一个用于 `User`，一个用于 `Role`，以便从数据库中查找电子邮件和角色值。它们如清单\
  \ 8-16 和 8-17 所示。\n\n```\npackage com.apress.SpringSecurityMongoDB.repository;\n\
  import com.apress.SpringSecurityMongoDB.domain.Role;\nimport org.springframework.data.mongodb.repository.MongoRepository;\n\
  public interface RoleRepository extends MongoRepository {\nRole findByRole(String\
  \ role);\n}\n清单 8-17\nRole Java 接口\n```\n\n```\npackage com.apress.SpringSecurityMongoDB.repository;\n\
  import com.apress.SpringSecurityMongoDB.domain.User;\nimport org.springframework.data.mongodb.repository.MongoRepository;\n\
  public interface UserRepository extends MongoRepository {\nUser findByEmail(String\
  \ email);\n}\n清单 8-16\nUser Java 接口\n```\n\n下一步是创建 `SpringSecurityMongoDbApplication`，用于为新注册的用户设置\
  \ `ADMIN` 或 `USER` 的凭证值，如清单 8-18 所示。\n\n\n\n```\npackage com.apress.SpringSecurityMongoDB;\n\
  import com.apress.SpringSecurityMongoDB.domain.Role;\nimport com.apress.SpringSecurityMongoDB.repository.RoleRepository;\n\
  import org.springframework.boot.CommandLineRunner;\nimport org.springframework.boot.SpringApplication;\n\
  import org.springframework.boot.autoconfigure.SpringBootApplication;\nimport org.springframework.context.annotation.Bean;\n\
  @SpringBootApplication\npublic class SpringSecurityMongoDbApplication {\npublic\
  \ static void main(String[] args) {\nSpringApplication.run(SpringSecurityMongoDbApplication.class,\
  \ args);\n}\n@Bean\nCommandLineRunner init(RoleRepository roleRepository) {\nreturn\
  \ args -> {\nRole adminRole = roleRepository.findByRole(\"ADMIN\");\nif (adminRole\
  \ == null) {\nRole newAdminRole = new Role();\nnewAdminRole.setRole(\"ADMIN\");\n\
  roleRepository.save(newAdminRole);\n}\nRole userRole = roleRepository.findByRole(\"\
  USER\");\nif (userRole == null) {\nRole newUserRole = new Role();\nnewUserRole.setRole(\"\
  USER\");\nroleRepository.save(newUserRole);\n}\n};\n}\n}\n清单 8-18\nlogin.html 页面\n\
  ```\n\n`SpringSecurityMongoDbApplication` 类从 `login.html` 页面接收用户凭证值，并通过以下代码行创建并设置该值：\n\
  \n对于 `Role`：\n\n```\nRole newUserRole = new Role();\nnewUserRole.setRole(\"USER\"\
  );\nroleRepository.save(newUserRole);\n```\n\n对于 `User`：\n\n```\nRole newAdminRole\
  \ = new Role();\nnewAdminRole.setRole(\"ADMIN\");\nroleRepository.save(newAdminRole);\n\
  ```\n\n下一个 Java 类是 `CustomUserDetailsService`，这是一个实现 Spring Security 用户详情服务所需的用户功能\
  \ Java 服务类。如清单 8-19 所示。\n\n```\npackage com.apress.SpringSecurityMongoDB.service;\n\
  import com.apress.SpringSecurityMongoDB.domain.Role;\nimport com.apress.SpringSecurityMongoDB.domain.User;\n\
  import com.apress.SpringSecurityMongoDB.repository.RoleRepository;\nimport com.apress.SpringSecurityMongoDB.repository.UserRepository;\n\
  import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.security.core.GrantedAuthority;\n\
  import org.springframework.security.core.authority.SimpleGrantedAuthority;\nimport\
  \ org.springframework.security.core.userdetails.UserDetails;\nimport org.springframework.security.core.userdetails.UserDetailsService;\n\
  import org.springframework.security.core.userdetails.UsernameNotFoundException;\n\
  import org.springframework.security.crypto.bcrypt.BCryptPasswordEncoder;\nimport\
  \ org.springframework.stereotype.Service;\nimport java.util.*;\n@Service\npublic\
  \ class CustomUserDetailsService implements UserDetailsService {\n@Autowired\nprivate\
  \ UserRepository userRepository;\n@Autowired\nprivate RoleRepository roleRepository;\n\
  @Autowired\nprivate BCryptPasswordEncoder bCryptPasswordEncoder;\npublic User findUserByEmail(String\
  \ email) {\nreturn userRepository.findByEmail(email);\n}\npublic void saveUser(User\
  \ user) {\nuser.setPassword(bCryptPasswordEncoder.encode(user.getPassword()));\n\
  String getroletype;\ngetroletype = user.getRole();\nRole userRole = roleRepository.findByRole(getroletype);\n\
  user.setRoles(new HashSet(Arrays.asList(userRole)));\nuserRepository.save(user);\n\
  }\n@Override\npublic UserDetails loadUserByUsername(String email) throws UsernameNotFoundException\
  \ {\nUser user = userRepository.findByEmail(email);\nif(user != null) {\nList authorities\
  \ = getUserAuthority(user.getRoles());\nreturn buildUserForAuthentication(user,\
  \ authorities);\n} else {\nthrow new UsernameNotFoundException(\"username not found\"\
  );\n}\n}\nprivate List getUserAuthority(Set userRoles) {\nSet roles = new HashSet();\n\
  userRoles.forEach((role) -> {\nroles.add(new SimpleGrantedAuthority(role.getRole()));\n\
  });\nList grantedAuthorities = new ArrayList(roles);\nreturn grantedAuthorities;\n\
  }\nprivate UserDetails buildUserForAuthentication(User user, List authorities) {\n\
  return new org.springframework.security.core.userdetails.User(user.getEmail(), user.getPassword(),\
  \ authorities);\n}\n}\n清单 8-19\nCustomUserDetailsService Java 类\n```\n\n\n当您需要执行以下操作时，可使用此\
  \ Java 类：\n\n*   通过 `findUserByEmail()` 和 `loadUserByUsername()` 加载用户信息，例如电子邮件地址或用户的\
  \ `GrantedAuthority` 列表\n*   通过 `saveUser()` 保存新用户\n*   通过 `getUserAuthority()`\
  \ 获取用户权限\n*   通过 `buildUserForAuthentication()` 构建用于身份验证的用户\n\n请注意，您需要 `return a\
  \ new org.springframework.security.core.userdetails.User()` 来存储用户身份验证凭证，包括电子邮件、密码和权限。\n\
  \n现在，您终于可以创建 `login.html` 页面了；请参见清单 8-20。\n\n```\n\nSpinrg Boot Security 5 and MongoDB\n\
