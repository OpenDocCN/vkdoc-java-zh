  \ 将始终投票授予访问权限。清单 7-20 中的代码应添加到文件 `applicationContext-security.xml` 中。\n\n```\n\n\
  清单 7-20\n需要对自动生成的 permitAll 表达式进行投票的 PreInvocationAuthorizationAdviceVoter\n```\n\
  \n接下来，您需要更改 `getPosts` 方法的返回类型，因为您添加的过滤器仅适用于 `java.util.Collection` 实例或数组，并且由于您当前从该方法返回一个映射，因此该实现将无法工作。您现在只需返回一个帖子的集合。新方法如清单\
  \ 7-21 所示。如果您正在跟随代码操作，则应更改所有依赖于此方法的类和文件，包括 `form.jsp` 文件。\n\n```\npublic Collection\
  \ getPosts(){\nreturn new ArrayList(postStore.values());\n}\n清单 7-21\ngetPosts 方法现在返回一个帖子的集合，而不是映射\n\
  ```\n\n接下来，在清单 7-21 的方法顶部，添加注解 `@PostFilter(\"hasPermission(filterObject, 'READ')\"\
  )`，其中 `filterObject` 是返回集合中的每个对象，`READ` 是与您之前看到的 `BasePermission.READ` 匹配的权限。这就是过滤功能将被触发的地方。接下来，我们将在执行场景的上下文中解释它是如何工作的。但是，首先您需要在应用程序上下文中手动配置几个\
