  \nOAuth 2\nOAuth 2.0 是行业标准的授权协议。你可以在 [`https://oauth.net/2/`](https://oauth.net/2/)\
  \ 获取更多信息。Spring Security 5.0 现已支持 OAuth 2.0 授权框架和 OpenID Connect 1.0。Spring Security\
  \ 5.1 引入了新的资源服务器支持以及额外的客户端支持。用于认证的 OAuth 2.0 实现符合 OpenID Connect 规范并已通过 OpenID 认证，可通过\
  \ Google 的 OAuth 2.0 API 用于认证和授权。更多信息，请访问 [`https://developers.google.com/identity/protocols/OAuth2`](https://developers.google.com/identity/protocols/OAuth2)。\n\
  \nOAuth 2 支持\n\n*   客户端\n\n*   资源服务器\n\n*   授权服务器\n\nOAuth 2.0 客户端功能提供了对 OAuth 2.0\
  \ 授权框架中定义的客户端角色的支持。你可以在 [`https://tools.ietf.org/html/rfc6749#section-1.1`](https://tools.ietf.org/html/rfc6749%2523section-1.1)\
  \ 获取更多信息。\n\n在开发 OAuth 2.0 客户端时，可使用以下主要功能：\n\n*   授权码授权\n\n*   客户端凭证授权\n\n*   用于\
  \ Servlet 环境的 WebClient 扩展（用于发起受保护资源请求）\n\n请注意，Spring Security 5 引入了一个新的 `OAuth2LoginConfigurer`\
  \ 类，可用于配置外部授权服务器。\n\nJSON Web Token\nSpring Security 5 支持 JSON Web Token (JWT) 认证。\n\
  \n基本上你需要：\n\n*   为 JWT 配置 Spring Security\n\n*   暴露带有映射/authenticate 的 REST POST\
  \ API\n\n*   配置一个有效的 JSON Web Token\n\n具体来说，要配置 Spring Security 和 JWT，你需要执行两个操作：\n\
  \n1.  通过以下方式生成 JWT：\n\n*   暴露带有映射/authenticating 的 POST API\n\n*   传递正确的用户名和密码\n\
  \n*   生成一个 JSON Web Token\n\n2.  通过以下方式验证 JWT：\n\n*   当尝试访问带有特定映射（如 `/Testing`）的\
  \ GET API 时\n\n*   仅当请求包含有效的 JSON Web Token 时才允许访问\n\nSpring Security 和 JWT 的依赖项包括：\n\
  \n```\nio.jsonwebtoken\njjwt\n0.9.1\n\n```\n\nSpring WebSockets\n\nSpring Security\
  \ 5 MVC 支持 Spring WebSockets。对于 WebSocket 实现，你需要添加以下 Maven 依赖项，例如：\n\n```\norg.springframework\n\
  spring-websocket\n${spring.version}\n\norg.springframework\nspring-messaging\n${spring.version}\n\
  \norg.springframework.security\nspring-security-messaging\n${spring-security.version}\n\
  \n```\n\n然后，你可以使用 `spring-security-messaging` 库，通过 `AbstractSecurityWebSocketMessageBrokerConfigurer`\
  \ 类来定义 WebSocket 特定的安全配置，如下所示：\n\n```\n@Configuration\npublic class SocketSecurityConfig\n\
  extends AbstractSecurityWebSocketMessageBrokerConfigurer {\n//...//\n}\n```\n\n\
  JAAS 认证\nJava 认证和授权服务 (JAAS) 是用于管理认证和授权的现有标准 Java 支持。其功能与 Spring Security 明显重叠。JAAS\
  \ 是一个相对较大的标准，涉及的内容远不止我们在此介绍的少量信息。然而，我们展示的是其主要概念，本节的目的是展示将其与 Spring Security 集成的基本构建块。有关\
  \ JAAS 的更多信息，请查阅 Spring Security 5 参考文档。\n\n中央认证服务认证\n中央认证服务 (CAS) 是一个用 Java 构建的企业级单点登录解决方案，并且是开源的。它拥有强大的社区支持，并集成到许多\
  \ Java 项目中。CAS 为企业中的认证和访问控制提供了一个集中位置。\n\n概述\nJA-SIG 在 [`http://www.ja-sig.org`](http://www.ja-sig.org)\
  \ 开发了一个名为 CAS 的企业级单点登录系统。JA-SIG 的中央认证服务是一个简单、开源、独立的平台，支持代理功能。Spring Security 完全支持\
  \ CAS 用于单个应用程序以及由企业级 CAS 服务器保护的多应用程序部署。你可以在 [`www.apereo.org/projects/cas`](http://www.apereo.org/projects/cas)\
  \ 了解更多关于 CAS 的信息。CAS 的一个重要特点是它被设计为充当不同认证存储解决方案的代理。这意味着它可以与 LDAP、JDBC 或包含真实用户数据的其他用户存储结合使用。这看起来很像\
  \ Spring Security 利用这些相同用户数据存储的方式。有关 CAS 的更多信息，请查阅 Spring Security 5 参考文档。\n\n总结\n\
  在本章中，我们展示了如何利用 Spring Security 的模块化架构，相对轻松地集成不同的认证机制。我们解释了框架自带的一些认证机制。具体来说，我们展示了如何通过使用客户端\
  \ X.509 证书，针对数据库、LDAP 服务器对用户进行认证。JAAS、OAuth2/OpenID、WebSockets、JWT 和 CAS 仅作了介绍。本章重点展示了所有这些不同的认证提供者在框架内部使用时如何相互关联。目的是向你展示，将新的提供者集成到框架中非常简单，值得一试。当然，其难易程度取决于你想要接入的认证方案。本章未涵盖的认证提供者还有很多，但主要思想往往保持不变：创建一个连接到\
  \ Spring Security 的适配器，处理集成协议的细节，并使其适应 Spring Security 的认证和授权模型。\n\n7. 使用 ACL 的业务对象安全\n\
  \n\n\n本章将介绍 Spring Security 中的访问控制列表（ACL）。访问控制列表可以看作是我们在第 6 章中讨论的业务级安全规则的扩展。不过，在本章中，我们将探讨更细粒度的规则，用于保护单个领域对象，而不是用于保护服务方法调用的相对粗粒度的规则。\n\
  \n这意味着 ACL 负责保护领域类实例（例如 `Forum` 类、`Cart` 类等），而标准的方法级规则则保护由方法（例如 `Service` 方法或 `DAO`\
  \ 方法）确定的入口点。\n\n使用 ACL 保护领域对象在概念上很简单。其思想是，任何用户对每个领域对象都有一定级别的访问权限（读取、写入、无权限等）。用户对特定领域对象的访问级别（*权限*）取决于用户本身，或用户所属的角色或组。\n\
  \n与其他章节一样，我们将通过一个示例来解释每个概念。和往常一样，这个示例将是一个非常简单的、非*真实世界*的应用程序，它被简化以专注于理解 ACL 工作原理的相关概念。\n\
  \n安全示例应用程序\n\n该示例应用程序是一个简单的论坛系统，包含两种类型的用户：标准用户和管理员用户。任何用户都可以创建论坛条目，但只有创建该条目的用户才能编辑它；其他标准用户只能读取它。管理员用户可以读取或删除条目，但不能编辑它。这为我们提供了展示\
  \ ACL 全部功能所需的所有组合。权限逻辑如图 7-1 所示。操作以实线表示，权限以虚线表示。\n\n![../images/310331_2_En_7_Chapter/310331_2_En_7_Fig1_HTML.jpg](img/310331_2_En_7_Fig1_HTML.jpg)\n\
  \n图 7-1\n论坛条目的权限逻辑\n\n那么，让我们来搭建示例项目。\n\n但首先，让我们回顾一下在应用程序中支持 ACL 所需的数据库模式。目前，这是 Spring\
  \ Security 中唯一对 ACL 的支持，并且需要对其进行配置才能使整个功能正常工作。Spring Security 的 ACL 模块附带了一些 SQL\
  \ 脚本，用于在一个名为 `createAclSchema.sql` 的文件中定义其自身的支持，该文件当前针对 HSQL 数据库。（还有一个名为 `createAclSchemaPostgres.sql`\
  \ 的替代文件，它针对 PostgreSQL 数据库。）您可以在 Spring Security ACL 模块的源代码或 `.jar` 文件本身中找到此文件：`spring-security-acl-3.1.3.RELEASE.jar`。它位于源代码中的\
  \ `src/main/resources` 文件夹中，这意味着它位于 `classpath` 的根目录下。清单 7-1 显示了此文件的内容。\n\n```\n\
  -- ACL schema sql used in HSQLDB\n-- drop table acl_entry;\n-- drop table acl_object_identity;\n\
  -- drop table acl_class;\n-- drop table acl_sid;\ncreate table acl_sid(\nid bigint\
  \ generated by default as identity(start with 100) not null primary key,\nprincipal\
  \ boolean not null,\nsid varchar_ignorecase(100) not null,\nconstraint unique_uk_1\
  \ unique(sid,principal));\ncreate table acl_class(\nid bigint generated by default\
  \ as identity(start with 100) not null primary key,\nclass varchar_ignorecase(100)\
  \ not null,\nconstraint unique_uk_2 unique(class)\n);\ncreate table acl_object_identity(\n\
  id bigint generated by default as identity(start with 100) not null primary key,\n\
  object_id_class bigint not null,\nobject_id_identity bigint not null,\nparent_object\
  \ bigint,\nowner_sid bigint,\nentries_inheriting boolean not null,\nconstraint unique_uk_3\
  \ unique(object_id_class,object_id_identity),\nconstraint foreign_fk_1 foreign key(parent_object)references\
  \ acl_object_identity(id),\nconstraint foreign_fk_2 foreign key(object_id_class)references\
  \ acl_class(id),\nconstraint foreign_fk_3 foreign key(owner_sid)references acl_sid(id)\n\
  );\ncreate table acl_entry(\nid bigint generated by default as identity(start with\
  \ 100) not null primary key,\nacl_object_identity bigint not null,\nace_order int\
  \ not null,\nsid bigint not null,\nmask integer not null,\ngranting boolean not\
  \ null,\naudit_success boolean not null,\naudit_failure boolean not null,\nconstraint\
  \ unique_uk_4 unique(acl_object_identity,ace_order),\nconstraint foreign_fk_4 foreign\
  \ key(acl_object_identity) references acl_object_identity(id),\nconstraint foreign_fk_5\
  \ foreign key(sid) references acl_sid(id)\n);\n清单 7-1\n定义 Spring Security 中支持 ACL\
  \ 所需表的 createAclSchema.sql\n```\n\n要理解这些表的含义，您需要了解 Spring Security ACL 支持中的主要抽象概念：\n\
  \n*   **SID（安全标识）**：一种抽象概念，表示系统中将由 ACL 基础设施使用的安全标识。安全标识可以是用户、角色、组等。它映射到表 `ACL_SID`。\n\
  \n*   **访问控制条目（ACE）**：表示特定 ACL 中的单个权限，用于建立对象、SID 和权限之间的关系。它映射到表 `ACL_ENTRY`。\n\n\
  *   **对象标识**：表示单个领域对象实例的标识。它们是设置权限的实体。它映射到表 `ACL_OBJECT_IDENTITY`。\n\n让我们分解数据库表的主要属性，以了解它们的含义。（我们不会解释\
  \ ID 属性，因为它们是相关表中每一行的代理标识符，并且用于标识特定的条目。）图 7-2 以图形形式显示了这些表，随后是对属性的解释。\n\n![../images/310331_2_En_7_Chapter/310331_2_En_7_Fig2_HTML.jpg](img/310331_2_En_7_Fig2_HTML.jpg)\n\
  \n图 7-2\nACL 模式中的表\n\n以下是图 7-2 中表的主要属性（列）：\n\n*   表 `ACL_SID`\n\n*   `principal`：一个布尔值，指示特定的\
  \ SID 是否是主体。请记住，SID 可以表示组或角色。\n\n*   `sid`：SID 的名称。它可以是主体的用户名、角色名称等。\n\n*   表 `ACL_CLASS`\n\
  \n*   `class`：ACL 系统中可以拥有的领域对象类的名称。\n\n*   表 `ACL_OBJECT_IDENTITY`\n\n*   `object_id_identity`：一个数字，用于唯一标识（与\
  \ `object_id_class` 结合时）您所表示的领域对象的特定实例。\n\n*   `object_id_class`：指向表 `ACL_CLASS`\
  \ 的外键，用于标识您所表示的领域对象的类。\n\n\n\n*   `parent_object`\n        ：允许通过创建与自身的递归关系来建立领域对象的层次结构。这样，权限可以在层次结构中的对象之间共享。它是一个指向自身的外键。\n\
  \n*   `owner_sid`：\n        拥有此特定领域对象的 SID。\n\n*   `entries_inheriting`\n      \
  \  ：一个布尔值，用于指定在领域对象的层次结构中，权限是否在对象之间继承。\n\n*   表 `ACL_ENTRY`\n\n*   `acl_object_identity`\n\
  \        ：对象的标识。它是对表 `ACL_OBJECT_IDENTITY` 中某行的引用。\n\n*   `sid`：\n        标识此 ACE\
  \ 中的 SID。它是对表 `ACL_SID` 中某行的引用。\n\n*   `mask`：\n        实际的权限。ACL 支持中的权限以位掩码形式给出，并用整数值表示。在代码中，默认权限定义在类\
  \ `org.springframework.security.acls.domain.BasePermission` 中，该类在代码清单 7-2 中重现。如果需要，你可以轻松创建自己的类并定义额外的权限。\n\
  \n*   `granting`：一个布尔值，用于确定特定的 ACE 是根据条目中定义的规则授予访问权限，还是（如果为 false）拒绝访问权限。\n\n你可以看到模式中定义的表并不多，但重要的是你要单独理解它们以及它们之间的关系。图\
  \ 7-3 展示了此数据模型的 ER（实体-关系）图，以帮助你更好地理解它们。该图用简单的术语描述了表之间关系的含义。\n\n![../images/310331_2_En_7_Chapter/310331_2_En_7_Fig3_HTML.jpg](img/310331_2_En_7_Fig3_HTML.jpg)\n\
  \n图 7-3\nACL 安全模型的 ER 图\n\n```\npackage org.springframework.security.acls.domain;\n\
  import org.springframework.security.acls.model.Permission;\npublic class BasePermission\
  \ extends AbstractPermission {\npublic static final Permission READ = new BasePermission(1\
  \ << 0, 'R'); // 1\npublic static final Permission WRITE = new BasePermission(1\
  \ << 1, 'W'); // 2\npublic static final Permission CREATE = new BasePermission(1\
  \ << 2, 'C'); // 4\npublic static final Permission DELETE = new BasePermission(1\
  \ << 3, 'D'); // 8\npublic static final Permission ADMINISTRATION = new BasePermission(1\
  \ << 4, 'A'); // 16\nprotected BasePermission(int mask) {\nsuper(mask);\n}\nprotected\
  \ BasePermission(int mask, char code) {\nsuper(mask, code);\n}\n}\n代码清单 7-2\n在 ACL\
  \ 系统中使用的包含默认权限的 BasePermission 类\n```\n\n代码清单 7-2 展示了现有的权限及其位掩码，分别用整数 1、2、4、8 和\
  \ 16 表示读取、写入、创建、删除和管理权限。共有 32 位可用于权限，默认权限分别将第 0 位、第 1 位、第 2 位、第 3 位和第 4 位设置为前面提到的每个整数值。此类可以替换为包含不同权限的自定义\
  \ `Permission` 实现类，也可以扩展以包含更多权限。\n理论上，通过这种方式工作，可以通过将两个权限相加来轻松组合它们，从而创建组合权限。例如，你可以通过将\
  \ `READ` 和 `WRITE` 权限的各自值相加（1 + 2 = 3）来组合它们，从而同时授予 `READ` 和 `WRITE` 权限。\n然而，在实践中，它并非如此工作。负责根据访问控制条目列表中存储的权限来评估对象所需权限的类\
  \ `org.springframework.security.acls.domain.DefaultPermissionGrantingStrategy` 会进行精确匹配比较。因此，你通常需要为\
  \ `READ` 包含一个 ACE，并为 `WRITE` 包含另一个 ACE。\n\n现在，你应该已经理解了 ACL 中使用的主要概念，以及它们如何映射到框架本身提供的数据库模式。接下来，让我们设置应用程序本身。同样，你将使用\
  \ Maven 来完成此操作。在 shell 的某个目录中，执行命令 `mvn archetype:create -DarchetypeGroupId=org.apache.maven.archetypes\
  \ -DarchetypeArtifactId=maven-archetype-webapp -DarchetypeVersion=1.0 -DgroupId=com.apress.pss\
  \ -DartifactId=acl-example -Dversion=1.0-SNAPSHOT`。然后，在生成的 `pom.xml` 文件中，添加代码清单\
  \ 7-3 中所示的所有必需依赖项，包括新的 ACL 依赖项。\n\n```\n\n5.1.5.RELEASE\n5.1.5.RELEASE\n\njavax.servlet\n\
  javax.servlet-api\n4.0.1\n\njunit\njunit\n4.5\ntest\n\norg.springframework.security\n\
  spring-security-core\n${springsecurity.version}\n\norg.springframework.security\n\
  spring-security-config\n${springsecurity.version}\n\norg.springframework.security\n\
  spring-security-web\n${springsecurity.version}\n\norg.springframework.security\n\
  spring-security-taglibs\n${springsecurity.version}\n\norg.springframework.security\n\
  spring-security-acl\n3.1.2.RELEASE\n\norg.springframework\nspring-core\n${springframework.version}\n\
  \norg.springframework\nspring-web\n${springframework.version}\n\norg.springframework\n\
  spring-webmvc\n${springframework.version}\n\norg.springframework\nspring-context-support\n\
  ${springframework.version}\n\norg.aspectj\naspectjweaver\n1.7.0\n\ncommons-logging\n\
  commons-logging\n1.1.1\n\ncommons-codec\ncommons-codec\n1.3\n\njavax.servlet.jsp\n\
  javax.servlet.jsp-api\n2.3.1\n\njavax.servlet\njstl\n1.2\n\njavax.annotation\njsr250-api\n\
  1.0\n\norg.hsqldb\nhsqldb\n2.4.1\n\nnet.sf.ehcache\nehcache-core\n2.6.0\n\norg.thymeleaf.extras\n\
  thymeleaf-extras-springsecurity3\n\ntaglibs\nstandard\n1.1.2\n\norg.slf4j\nslf4j-jdk14\n\
  1.7.25\n\n代码清单 7-3\nSpring Security ACL 项目中的 Maven 依赖项\n```\n\n接下来，让我们创建你的第一个配置文件\
  \ `web.xml`。复制代码清单 7-4 中的内容。\n\n```\n\norg.springframework.web.context.ContextLoaderListener\n\
  \ncontextConfigLocation\n\n/WEB-INF/applicationContext-acl.xml\n/WEB-INF/applicationContext-security.xml\n\
  \nacl-example\norg.springframework.web.servlet.DispatcherServlet\n\nacl-example\n\
  /\n\nspringSecurityFilterChain\n\norg.springframework.web.filter.DelegatingFilterProxy\n\
  \nspringSecurityFilterChain\n/*\n\n代码清单 7-4\nweb.xml\n```\n\n接下来要创建的文件是 ACL 配置文件，让我们开始吧。这是一个非常标准的默认\
  \ ACL 文件。稍后，我们将向你展示一些可以更改以适应不同需求的内容。在 `WEB-INF` 文件夹中，创建一个名为 `applicationContext-acl.xml`\
  \ 的文件，内容来自代码清单 7-5。在代码清单之后，你将阅读相关部分的描述。\n\n```\n\n代码清单 7-5\n包含所需 ACL 配置的 applicationContext-acl.xml\n\
  ```\n\n我们将概述代码清单 7-5 中定义的每个 bean。稍后，在使用应用程序时，我们将更深入地解释框架的内部工作原理，以及启动时和执行时究竟发生了什么。\n\
  前三个 bean 并非 ACL 特有的，因为它们只是定义了数据源、JDBC 模板和事务管理器。ACL 基础设施将使用这些 bean 来访问模式中 ACL 特定的表和数据库。\n\
  \n注意\n我们定义的用于处理数据库的支持 bean 使用了 Spring 框架核心库中的类。如果你之前使用过 Spring，很可能已经遇到过并使用过这些类。你可以在官方网站\
  \ [`https://docs.spring.io/spring/docs/3.0.x/reference/jdbc.html`](https://docs.spring.io/spring/docs/3.0.x/reference/jdbc.html)\
  \ 上找到有关 Spring 数据库支持的信息。\n\n\n\n下一个 bean 的 ID 是 `aclCache`。你需要一个缓存实现来让 ACL 系统正常工作。它的功能是通过缓存\
  \ ACL 来加速 ACL 访问，避免每次查询都访问数据库。我们在 bean 定义（`EhCacheBasedAclCache`）中使用的实现是目前 ACL 模块中唯一定义的实现，它是一个非常简单的实现，委托给了\
  \ `EhCache`（[`http://ehcache.org/`](http://ehcache.org/)）。\n\n下一个 bean 的 ID 是 `lookupStrategy`。查找策略负责检索对象标识（如前所述）以及适用于每个对象标识的\
  \ ACL。我们使用的实现（`BasicLookupStrategy`）同样是框架中唯一定义的实现。它会尝试从缓存中加载 ACL，如果缓存中没有，则会从数据库中查找并缓存结果。数据库查找是批量进行的，以便同时将多个条目加载到缓存中，从而提高性能。\n\
  \n下一个 bean 的 ID 是 `aclAuthorizationStrategy`，它定义了一个 `org.springframework.security.acls.domain.AclAuthorizationStrategy`。`AclAuthorizationStrategy`\
  \ 的目标是确定某个特定主体是否能够在 ACL 基础设施本身中执行管理活动。例如，当前定义的权限有 `CHANGE_OWNERSHIP`、`CHANGE_AUDITING`\
  \ 和 `CHANGE_GENERAL`。\n\n我们在 bean 定义文件中使用的默认实现，在其构造函数中接收三个 `GrantedAuthority` 实例，这些实例决定了哪些实体将拥有前面提到的权限。在这个示例中——通常这也是最常见的方法——我们将\
  \ `ROLE_ADMIN` 设置为拥有上述权限的实体。请注意，在默认实现中，特定 ACL 的所有者也被允许拥有该 ACL 的 `CHANGE_OWNERSHIP`\
  \ 和 `CHANGE_GENERAL` 权限。\n\n最后一个 bean 的 ID 是 `aclService`，它是整个框架的主要组件。`AclService`\
  \ 和 `MutableAclService` 接口允许访问所有与 ACL 相关的操作，例如按 ID 读取 ACL、创建 ACL、删除 ACL 和更新 ACL。\n\
  \n这些就是应用程序中处理 ACL 所需的所有 bean。让我们继续配置应用程序。和往常一样，你需要让清单 7-6 中的文件随应用程序一起加载。你已经知道如何通过修改\
  \ `web.xml` 中的 `contextConfigLocation context-param` 来实现这一点。如果需要，提供的 `web.xml` 已经包含了适当的配置。\n\
  \n现在，让我们创建一个 bean 来为 ACL 创建数据库模式。在标准应用程序中，你通常不会这样做，但为了方便起见，我们在这里这样做。你在文件 `applicationContext-acl.xml`\
  \ 中定义清单 7-6 中的 bean，并在相应的包中创建清单 7-7 中的类。这个类（名为 `DatabaseSeeder`）使用提供的 `createAclSchema.sql`\
  \ 文件的一个副本（其中取消了对删除表的注释）来在数据库中创建所需的表。（该文件在本书的源代码中提供。它名为 `customCreateAclSchema.sql`，位于\
  \ `src/main/resources` 文件夹中。）如果你想自己创建它，只需使用框架自带的文件，并取消开头那些被注释掉的删除表语句的注释即可。（请记住，数据库是一个名为\
  \ `aclexample` 的内存 HSQL 数据库，它在 `dataSource` bean 中定义。）这个 bean 会在启动时像往常一样被上下文实例化，构造函数将负责设置模式。\n\
  \n```\npackage com.apress.pss.acl;\nimport java.io.IOException;\nimport org.springframework.core.io.ClassPathResource;\n\
  import org.springframework.jdbc.core.JdbcTemplate;\nimport org.springframework.util.FileCopyUtils;\n\
  public class DatabaseSeeder {\npublic DatabaseSeeder(JdbcTemplate jdbcTemplate)\
  \ throws IOException{\nString sql = new String(FileCopyUtils.copyToByteArray(new\
  \ ClassPathResource(\"customCreateAclSchema.sql\").getInputStream()));\njdbcTemplate.execute(sql);\n\
  }\n}\n清单 7-7\n执行模式创建的 DatabaseSeeder 类\n```\n\n```\n\n清单 7-6\n创建使用 ACL 所需的数据库表的\
  \ Bean\n```\n\n现在你可以为领域对象创建 ACL 了，所以让我们创建类来设置整个过程。这将涉及一些编码，因为你需要一个控制器、服务、领域对象和 JSP\
  \ 文件。你可以分别在清单 7-8、7-9、7-10、7-11、7-12 和 7-13 中看到这些文件。\n\n```\npackage com.apress.pss.acl.controllers;\n\
  import java.util.HashMap;\nimport java.util.Map;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.security.core.context.SecurityContextHolder;\nimport\
  \ org.springframework.stereotype.Controller;\nimport org.springframework.ui.ModelMap;\n\
  import org.springframework.web.bind.annotation.RequestBody;\nimport org.springframework.web.bind.annotation.RequestMapping;\n\
  import org.springframework.web.bind.annotation.RequestMethod;\nimport org.springframework.web.bind.annotation.RequestParam;\n\
  import org.springframework.web.servlet.ModelAndView;\nimport org.springframework.security.core.userdetails.UserDetails;\n\
  import com.apress.pss.acl.domain.Post;\nimport com.apress.pss.acl.services.ForumService;\n\
