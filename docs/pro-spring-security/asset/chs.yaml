  引言


  否认 Spring 框架在 Java 世界中的影响是根本不可能的。Spring 为 Java 开发者带来了如此多的优势，以至于我们可以说它让我们所有人都成为了更好的开发者——无论是优秀的开发者，还是普通的开发者，无一例外。


  本书的上一版本使用了 Spring Security 3。因此，在本新版中，非常重要的是要指出从 v3 到 v5 的最重要变化。由于 SpringSource
  已不再使用，Spring Security v5 现已成为 Pivotal 的一部分。


  Spring Framework 5 于 2017 年 9 月发布，可被视为自 2013 年 12 月发布版本 4 以来的首个主要 Spring 框架版本。


  Spring 的核心构建块——依赖注入和面向切面编程——广泛适用于许多业务和基础设施关注点，而应用程序安全无疑可以从这些核心功能中受益。这就是 Spring Security：一个构建在强大
  Spring 框架之上的应用程序级安全框架，主要处理*身份验证*和*授权*这两个核心安全概念，这也是 Spring Security v5 的一些基本功能。


  Spring Security 旨在为您的 Java 应用程序提供功能全面的安全解决方案。尽管其主要关注点是 Web 应用程序和 Java 编程语言，但您将看到它超越了这两个领域。


  我们在撰写本书时希望达成的目标是，在解释如何使用特定功能的标准说明之外，揭示 Spring Security 的一些内部工作原理。我们的理念是超越“如何做某事”的基础层面，转而关注框架内部的管道机制。我们发现这是学习的最佳方式：真正看到核心是如何构建的。当然，这并不意味着本书不涵盖基本设置，也不提供关于使用该框架的快速实用建议——因为本书确实包含了这些内容。关键在于，我们不是简单地说“用这个来做那个”，而是说“这个是这样工作的……而这允许你……”。这是一种只有像
  Spring 这样的工具才能提供的视角（因为它们是开源的）。


  话虽如此，我们建议使用本书的最佳方式是，在您的计算机上检出 Spring Security 的源代码，并同时参考本书的代码和 Spring Security 自身的代码来学习示例。这不仅有助于您理解每个引入的概念，还能教会您不止一个优秀的编程技巧和良好实践。我们建议您在有机会时，采用这种方法来学习任何软件。如果源代码就在那里，就去获取它。有时，几行代码比千言万语更能教会我们东西。在本书中，我们将主要介绍
  Spring Boot，分析 Spring Framework，并使用 Spring Security v5.1.5、Java v11 和 Servlet v4
  开发 Java Web 应用程序。此外，Spring Security v5 支持多种不同的身份验证机制，本书将介绍并开发这些机制，例如数据库（MongoDB
  和 hsqldb）、LDAP、X.509、OAuth 2/OpenID、WebSockets、JSON Web Token (JWT)、JAAS 和 CAS。本书还将介绍
  Rails 和 Scala 上下文中的 Grails 和 JRuby 等 Web 开发框架。


  ## 本书读者对象


  本书主要面向在工作中使用 Spring 并需要以利用 Spring 成熟概念和技术的方式为其应用程序添加安全性的 Java 开发者。本书也适用于希望为其应用程序添加
  Web 层安全性的开发者，即使这些应用程序的核心并非完全基于 Spring。本书假定您具备 Java 及其部分工具和库（如 Servlet 和 Maven）的知识。同时，本书假定您了解自己希望使用安全功能的目的以及使用场景。这意味着，例如，我们不会深入解释
  LDAP 等协议，而是专注于向您展示如何将 Spring Security 与 LDAP 用户存储集成。对 Spring 的深入了解并非必需，因为许多概念会随着学习进程逐步介绍，但您对
  Spring 的理解越深，从本书中获得的收益就可能越大。



  ## 本书结构


  本书共分为九章，循序渐进地讲解 Spring Security。内容从基础应用概述和框架结构说明开始，逐步深入到更高级的主题，例如在不同 JVM 语言中使用 Spring
  Security。本书的编排顺序与该框架在实际应用中的常规使用方式相对应。


  各章节内容如下：


  *   **第** **1** **章**：总体介绍安全性，以及如何在应用层面处理安全问题。

  *   **第** **2** **章**：介绍 Spring Security v5，包括如何使用、何时使用以及其所有安全功能。

  *   **第** **3** **章**：通过一个简单的示例应用程序介绍 Spring Security，该程序在 URL 级别保护 Web 访问。

  *   **第** **4** **章**：全面介绍 Spring Security 的架构，包括主要组件及其交互方式。

  *   **第** **5** **章**：深入介绍 Spring Security 中可用的 Web 层安全选项。

  *   **第** **6** **章**：涵盖多种可集成到 Spring Security 的身份验证提供程序，包括 LDAP 和 JASS。

  *   **第** **7** **章**：介绍用于保护单个领域对象的访问控制列表（ACL），以及它们如何融入整体安全考量。

  *   **第** **8** **章**：解释如何通过利用 Spring Security 模块化架构支持的众多扩展点来扩展其核心功能。

  *   **第** **9** **章**：展示如何将 Spring Security 与不同的 Java 框架以及一些重要的 JVM 编程语言集成。


  ## 前提条件


  本书中的所有示例均使用 Java 11 和 Maven 3.6.1 构建。尽可能使用最新的 Spring 版本。全书使用的 Spring Security 版本为
  5.1.5。本书中的不同 Web 应用程序主要使用 Tomcat Web Server v9（通过其 Maven 插件），使用的笔记本电脑是配备 8GB 内存的
  ThinkPad Yoga 360。所有项目均使用 IntelliJ IDEA Ultimate 2019.2 开发。


  您可以使用自己的工具和操作系统。由于所有内容均基于 Java，您应该能够在任何平台上毫无问题地编译程序。


