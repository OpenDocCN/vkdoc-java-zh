  \ 实现这个简单流程，你将创建一个新项目。与大多数示例一样，你将使用 Maven 来构建和管理你的项目。那么，让我们开始吧。让我们创建一个新的 Maven 项目，如图\
  \ 9-6 所示。\n\n![../images/310331_2_En_9_Chapter/310331_2_En_9_Fig6_HTML.jpg](img/310331_2_En_9_Fig6_HTML.jpg)\n\
  \n**图 9-6** 新的 Spring Web Flow Maven 项目\n\n现在，你将创建所有配置文件。将新项目中的 `pom.xml` 文件替换为清单\
  \ 9-6 中所示的文件，并将 `web.xml` 文件替换为清单 9-7 中所示的文件。然后，在 `WEB-INF` 目录中，分别创建清单 9-8 和 9-9\
  \ 中所示的文件，并分别命名为 `spring-servlet.xml` 和 `spring-security.xml`。\n\n```\nSpring MVC\
  \ Application\n\nspring\norg.springframework.web.servlet.DispatcherServlet\n\nspring\n\
  /\n\norg.springframework.web.context.ContextLoaderListener\n\ncontextConfigLocation\n\
  \n/WEB-INF/spring-security.xml\n\nspringSecurityFilterChain\norg.springframework.web.filter.DelegatingFilterProxy\n\
  \nspringSecurityFilterChain\n/*\n\nwelcome.jsp\n\n**清单 9-7** 用于 Spring Web Flow\
  \ 和 Spring Security 的 web.xml 文件\n```\n\n```\n4.0.0\ncom.apress.pss\nwebflow-example\n\
  0.0.1-SNAPSHOT\nwar\n\n5.1.5.RELEASE\n5.1.5.RELEASE\n\norg.springframework.webflow\n\
  spring-webflow\n2.5.1.RELEASE\n\norg.springframework\nspring-core\n${springframework.version}\n\
  \norg.springframework\nspring-web\n${springframework.version}\n\norg.springframework\n\
  spring-webmvc\n${springframework.version}\n\norg.springframework.security\nspring-security-web\n\
  ${springsecurity.version}\n\norg.springframework.security\nspring-security-config\n\
  ${springsecurity.version}\n\njavax.servlet\njavax.servlet-api\n4.0.1\n\njavax.servlet.jsp\n\
  javax.servlet.jsp-api\n2.3.3\n\njavax.servlet\njstl\n1.2\n\ntaglibs\nstandard\n\
  1.1.2\n\nsrc\n\nsrc\n\n**/*.java\n\nmaven-compiler-plugin\n3.8.0\n\nmaven-war-plugin\n\
  3.2.3\n\nWebContent\n\nwebflow-example\n\n**清单 9-6** 包含 Spring Security 和 Spring\
