  \n清单 9-30\nScala Maven 项目中的 pom.xml 文件\n```\n\n这将是一个使用 Spring MVC 的简单 Web 应用程序，并且它将有一个非常简单的\
  \ Service 层。与您在其他章节中看到的应用程序的最大区别在于，Controller 层和 Service 层都将用 Scala 而不是 Java 编写。我们将向您展示如何向方法级别添加安全性，但是，您将看到，这与\
  \ Java 几乎相同。让我们从控制器的代码开始。在路径为 `src/main/scala` 的源文件夹中的包 `com.apress.pss.scala.web`\
  \ 下，创建清单 9-31 中所示的 `ScalaController` 类。\n\n```\npackage com.apress.pss.scala.web;\n\
  import org.springframework.beans.factory.annotation.Autowired\nimport org.springframework.web.bind.annotation.RequestMapping\n\
  import org.springframework.web.bind.annotation.RequestMethod\nimport org.springframework.stereotype.Controller\n\
  import com.apress.pss.scala.service.ScalaServiceFacade\nimport javax.servlet.http.HttpServletResponse\n\
  import javax.servlet.http.HttpServletRequest\n@RequestMapping(Array(\"/enter\"))\n\
  class ScalaController(service: ScalaServiceFacade) {\n@RequestMapping(value = Array(\"\
  /scala\"), method = Array(RequestMethod.GET))\ndef scalaRequest(request:HttpServletRequest,\
  \ response:HttpServletResponse) = {\nval value = service.scalaService\nresponse.getWriter().write(value)\n\
  }\n}\n清单 9-31\nScalaController\n```\n\n在控制器中，您定义了一个简单的方法，该方法返回（实际上是在响应上写入）服务返回的任何内容。请注意示例中注解\
  \ `@RequestMapping` 的使用。使用 Scala，您不能使用简单的字符串来设置基于数组的注解值。您需要设置一个仅包含一个元素的真实数组作为值。对于其余部分，该示例与\
  \ Java 版本非常相似，只是语法上有些修改。\n\n然后，在包 `com.apress.pss.scala.service` 下，创建清单 9-32 中所示的\
  \ `ScalaService` 类。\n\n```\npackage com.apress.pss.scala.service;\nimport org.springframework.stereotype.Service\n\
  import org.springframework.security.access.annotation.Secured\ntrait ScalaServiceFacade\
  \ {\ndef scalaService: String\n}\nclass ScalaService extends ScalaServiceFacade{\n\
  @Secured(Array(\"ROLE_USER\"))\ndef scalaService() = \"Service accessed\"\n}\n清单\
  \ 9-32\nScalaService 类\n```\n\n\n\n同样，此列表中的代码非常直观。它是一个服务类，包含一个返回字符串的简单方法。请注意，这里使用了\
  \ `@Secured` 注解。\n同样，你使用了 `Array` 函数（实际上，这里间接调用的是 `Array` 伴生对象的 `apply` 方法，该方法允许你创建\
  \ `Array` 类的新实例），并传入一个字符串作为数组的唯一元素。使用 Scala，你不能像在 Java 版本中那样，采用传入简单字符串的便捷方式。\n还要注意，在类定义之前使用了\
  \ `trait`，然后该类扩展了该 trait。Scala 中的 `trait` 在某种程度上等同于 Java 中的接口，但功能更强大。虽然此示例未展示，但\
  \ trait 既可以拥有完全实现的方法，也可以拥有 Java 接口中典型的传统抽象（仅定义）方法，并且你的类可以扩展多个 trait，“继承”它们中定义的所有功能，而无需实现已经实现的方法。\n\
  这种技术也称为 *mixin*，并非 Scala 独有，因为其他语言也有实现相同目的的结构。例如，在 Ruby 中，你可以使用模块来实现与 Scala trait\
  \ 大致相同的效果。同样，我们不会深入探讨任何细节。对于此示例，你可以将 trait 简单地视为控制器用来访问服务的 Java 接口。\n\n接下来，你需要进行配置。现在，你应该非常熟悉如何配置\
  \ Spring Security Web 应用程序了。因此，我们接下来将直接展示文件，而不会深入探讨其中任何一个文件的细节。请注意，我们引用 Scala 类的方式，与我们之前在\
