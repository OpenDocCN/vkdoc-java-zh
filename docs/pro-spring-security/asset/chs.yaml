  \n图 8-18\nadmin.html 页面\n\n点击“退出”按钮即可注销。\n\n现在，如果您希望在 MongoDB 中创建一个新用户，请选择点击 `login.html`\
  \ 页面上的“`Signup as a new user`”按钮，并通过 HTTP GET 方法发送到 `/signup` 页面，该页面将通过 `LoginController`\
  \ Java 类使用以下代码行进行验证：\n\n```\n@RequestMapping(value = \"/signup\", method = RequestMethod.GET)\n\
  public ModelAndView signup() {\nModelAndView modelAndView = new ModelAndView();\n\
  User user = new User();\nmodelAndView.addObject(\"user\", user);\nmodelAndView.setViewName(\"\
  signup\");\nreturn modelAndView;\n}\n```\n\n如果您想在 MongoDB 数据库中添加一个新用户，请调用清单 8-23\
  \ 中所示的 `signup.html` 页面。\n\n```\n\nSpring Boot Security 5 and MongoDB 示例\n\n向 MongoDB\
  \ 添加新用户。\n电子邮件地址：\n\n密码：\n\n角色：\n\nUSER\nADMIN\n\n添加新用户\n\n清单 8-23\nsignup.html\
  \ 页面\n```\n\n`Signup.html` 将触发 `LoginController` 处理 `/signup` HTTP POST 方法，如下所示：\n\
  \n```\n@RequestMapping(value = \"/signup\", method = RequestMethod.POST)\npublic\
  \ ModelAndView createNewUser(@Valid User user, BindingResult bindingResult) {\n\
  ModelAndView modelAndView = new ModelAndView();\nUser userExists = userService.findUserByEmail(user.getEmail());\n\
  if (userExists != null) {\nmodelAndView.addObject(\"message\", \"提供的用户名已在数据库中注册！\
  \ \");\nbindingResult\n.rejectValue(\"email\", \"error.user\",\n\"提供的用户名已在数据库中注册！\"\
  );\n}\nif (bindingResult.hasErrors()) {\nmodelAndView.setViewName(\"signup\");\n\
  } else {\nuserService.saveUser(user);\nmodelAndView.addObject(\"successMessage\"\
  , \"新用户已成功注册\");\nmodelAndView.addObject(\"user\", new User());\nmodelAndView.setViewName(\"\
  login\");\n}\nreturn modelAndView;\n}\n```\n\n在这种情况下，`LoginController` 类使用 `/signup`\
  \ HTTP POST 方法将：\n\n*   检查用户电子邮件地址是否已在 MongoDB 数据库中注册，显示消息“提供的用户名已在数据库中注册！”，并重定向回\
  \ `/signup`。\n*   或者触发创建新用户并显示消息“新用户已成功注册”。\n\n`signup.html` 页面如图 8-19 所示。\n\n![../images/310331_2_En_8_Chapter/310331_2_En_8_Fig19_HTML.jpg](img/310331_2_En_8_Fig19_HTML.jpg)\n\
  \n图 8-19\nsignup.html 页面\n\n您最终完整的项目将如图 8-20 所示。\n\n![../images/310331_2_En_8_Chapter/310331_2_En_8_Fig20_HTML.jpg](img/310331_2_En_8_Fig20_HTML.jpg)\n\
  \n图 8-20\n完整的项目概览\n\n您已完成示例，但我们接下来将更好地描述密码加密和错误处理。\n\n\n\n密码加密\n你可能已经注意到，在本示例以及之前的所有示例中，密码都是以明文形式存储和检索的。Spring\
  \ Security 提供了一种抽象机制来加密密码，其形式为接口，该接口在 Spring Security v4 中为 `org.springframework.security.authentication.encoding.PasswordEncoder`，但在\
  \ Spring Security v5 中已变更为核心框架中的 `org.springframework.security.crypto.password.PasswordEncoder`。\n\
  \n自 Spring Security v5 起，`org.springframework.security.authentication.encoding`\
  \ 中的 `PasswordEncoder` 被声明为已弃用，因此该接口被移除，因为它并非为随机生成的盐值而设计。\n\n此外，Spring Security\
  \ v5 改变了编码密码的处理方式，因为在 v5 之前，每个应用程序只能使用一种密码编码算法。\n\n在 Spring Security v5 之前，默认的 `PasswordEncoder`\
  \ 是 `NoOpPasswordEncoder`，它要求使用明文密码。现在 `PasswordEncoder` 已被 `BCryptPasswordEncoder`\
  \ 取代。\n\n那么，我们当然会立即面临一些问题，比如：如何处理那些使用旧密码编码且难以迁移的旧应用程序？当密码存储方式再次改变时会发生什么？\n\n自 Spring\
  \ Security v5 起，引入了一个名为 `DelegatingPasswordEncoder` 的密码编码委托概念，它通常允许我们对不同的密码使用不同的编码方式。\n\
  \n`DelegatingPasswordEncoder` 的工作原理是：任何密码都使用当前推荐的密码存储方式进行编码，允许验证现代和旧格式的密码，并允许将来升级编码方式。\n\
  \nSpring Security v5 通过一个标识符前缀来识别算法，该标识符位于编码密码之前。密码的通用格式是 *{id}encodedPassword*`.`。以下是一些编码密码的示例：\n\
  \n```\n{noop}password\n{bcrypt}$1c$23$TeLobXCxerA5EDFqwKJFn.KUT2VCdsaAwD67WETa9A.7Hrt123Kea\n\
  {sha256}123ghjss67239nsgewt6772ghsjd22789sa2jkalsaldsdj72349378sadsajdsljd32874732salkdf\n\
  {pbkdf2}hdsfjhdsfurehyuhhfsjdhfhfkjhdsfkjhdfkjshdfösakfucxvhkjvhcoiweshfjdsfewtsrewrwyir\n\
  {scrypt}?shdf4Md3234hlkf843Lhhdsjfsd7982374293hsdkjfshdfh91273fgsjjdhfgssjfdggfsdllflsdlfsdfsdUp4of4g24hHnazw==$OAOec05+bXxvuu/1qZ6NUOc/9bdYSrN1oD?\n\
  ```\n\n正如你在 bcrypt 示例中看到的，使用了 `{bcrypt}` 前缀来告诉 Spring Security 使用 bcrypt 密码编码器。如果密码哈希没有前缀，委托过程会使用默认编码器，默认情况下是\
  \ `StandardPasswordEncoder`。因此，密码将包含 `PasswordEncoder id = bcrypt and encodedPassword\
  \ = $1c$23$TeLobXCxerA5EDFqwKJFn.KUT2VCdsaAwD67WETa9A.7Hrt123Kea`，这样在匹配时就会委托给 `BCryptPasswordEncoder`。\n\
  \n请注意，你可以像这样使用 `PasswordEncoderFactories` 轻松构建一个 `DelegatingPasswordEncoder` 实例：\n\
  \n```\nPasswordEncoder passwordEncoder = PasswordEncoderFactories.createDelegatingPasswordEncoder();\n\
  ```\n\n那么，密码匹配是如何工作的呢？它基于 `{id}` 以及构造函数中提供的 id 到 `PasswordEncoder` 的映射来工作，正如你之前所见。通常，默认情况下，使用一个未映射的\
  \ id（包括 null id）的密码调用 `matches(CharSequence, String)` 会触发 `IllegalArgumentException`。你可以通过使用\
  \ `DelegatingPasswordEncoder.setDefaultPasswordEncoderForMatches(PasswordEncoder)`\
  \ 来自定义此行为。\n\n最后，BCrypt 的 Java 配置可以像这样：\n\n```\nimport org.springframework.security.crypto.bcrypt.BCryptPasswordEncoder;\n\
  @Bean\npublic BCryptPasswordEncoder passwordEncoder() {\nBCryptPasswordEncoder bCryptPasswordEncoder\
  \ = new BCryptPasswordEncoder();\nreturn bCryptPasswordEncoder;\n}\n```\n\n处理错误和入口点\n\
  Spring Security 内置了一个非常出色的错误处理机制。它提供了一套全面的异常，这些异常映射到你在系统中可能遇到的最常见的安全错误情况。\n\n延续\
  \ Spring Security 优秀的单一职责架构，错误条件的处理主要封装在一个类中。这个类是（你之前已经学习过）`org.springframework.security.web.access.ExceptionTranslationFilter`，它主要处理两种类型的异常：`AccessDeniedException`\
  \ 和 `AuthenticationException`。\n\n如果此过滤器捕获到任何其他异常，它将简单地将其作为 `RuntimeException` 重新抛出。\n\
  \nSpring Security 提供了几个扩展点，你可以通过自定义入口点和自定义访问拒绝处理程序的形式来插入功能。基本上，发生的情况是：当过滤器捕获到 `AuthenticationException`\
  \ 时，会调用 `AuthenticationEntryPoint` 的 “commence” 方法，并传入 HTTP 请求、HTTP 响应和异常。应用程序中配置的特定\
  \ `AuthenticationEntryPoint` 实现可以决定如何处理该异常，更重要的是，决定如何处理 HTTP 响应。默认情况下，使用的实现是 `org.springframework.security.web.authentication.LoginUrlAuthenticationEntryPoint`，它会重定向到登录\
  \ URL，正如你已经知道的，该 URL 是应用程序根目录下的 `/login`。\n\n当抛出 `AuthenticationException` 时，或者当抛出\
  \ `AccessDeniedException` 且当前 `Authentication` 对象是匿名对象时，会调用入口点。\n\n作为另一个人为示例，你将实现一个入口点，该入口点会在每次客户端发起身份验证尝试时添加一个\
  \ cookie，然后在浏览器中显示基本身份验证方案。这意味着你将在响应中设置一个 cookie，每次调用入口点时其值都会递增。然后，每次都会将带有新值的 cookie\
  \ 发送回服务器。这意味着尝试计数器完全不存储在服务器上；它仅存储在客户端 cookie 中，并在客户端和服务器之间来回发送。因此，服务器接收 cookie，递增其值，然后将其发送回去。这并非真正意义上的创新，但它再次让我们能够展示，你可以覆盖入口点来执行不同的操作。\n\
  \n最有可能的情况是，当使用不同类型的身份验证方案时，会覆盖入口点。例如，当使用需要显示登录页面的身份验证方案时，会应用一个标准入口点；而其他入口点（特别是 `BasicAuthenticationEntryPoint`）则用于在响应中设置特定值，以告知浏览器如何处理它。在大多数情况下，入口点的实现与新的安全过滤器的实现是相辅相成的。如果你查看框架提供的实现，可以在\
  \ `BasicAuthenticationEntryPoint` – `BasicAuthenticationFilter`、`LoginUrlAuthenticationEntryPoint`\
  \ – `UsernamePasswordAuthenticationFilter`（某种程度上，并非完全一一对应）、`CasAuthenticationEntryPoint`\
  \ – `CasAuthenticationFilter` 以及其他一些实现中看到这种清晰的关系。基本上，入口点奠定基础，然后过滤器处理后续请求。\n\n图 8-21\
  \ 展示了 `ExceptionTranslationFilter` 和 `AuthenticationEntryPoint` 之间的关系。\n\n![../images/310331_2_En_8_Chapter/310331_2_En_8_Fig21_HTML.jpg](img/310331_2_En_8_Fig21_HTML.jpg)\n\
  \n图 8-21\nExceptionTranslationFilter 和 AuthenticationEntryPoint 的关系\n\n\n\n清单 8-24\
  \ 展示了一个入口点实现的示例，清单 8-25 则展示了使其生效所需的配置。这是一个非常简单的实现，但实际上它比标准的 `BasicAuthenticationEntryPoint`\
  \ 要稍微复杂一些。\n\n```\npackage com.apress.pss.security;\nimport java.io.IOException;\n\
  import javax.servlet.ServletException;\nimport javax.servlet.http.Cookie;\nimport\
  \ javax.servlet.http.HttpServletRequest;\nimport javax.servlet.http.HttpServletResponse;\n\
  import org.springframework.security.core.AuthenticationException;\nimport org.springframework.security.web.AuthenticationEntryPoint;\n\
  public class AttemptsAuthenticationEntryPoint implements AuthenticationEntryPoint{\n\
  public void commence(HttpServletRequest request,\nHttpServletResponse response,\
  \ AuthenticationException authException)\nthrows IOException, ServletException {\n\
  response.addHeader(\"WWW-Authenticate\", \"Basic realm=\\\"theapp\\\"\");\nresponse.addHeader(\"\
  Set-Cookie\",\n\"authentication_attempts=\"+(getDeniesCookie(request)+1)+\"; Max-Age=3600;\
  \ Version=1\");\nresponse.sendError(HttpServletResponse.SC_UNAUTHORIZED,\nauthException.getMessage());\n\
  }\nprivate int getDeniesCookie(HttpServletRequest request) {\nfor(Cookie cookie:request.getCookies()){\n\
  if(cookie.getName().equals(\"authentication_attempts\")){\nreturn Integer.parseInt(cookie.getValue());\n\
  }\n}\nreturn 0;\n}\n}\n清单 8-24\n创建尝试次数 Cookie 和基本认证响应的 AuthenticationEntryPoint\
  \ 实现\n```\n\n清单 8-25 中的代码与 `org.springframework.security.web.authentication.www.BasicAuthenticationEntryPoint`\
  \ 的代码有很多共同之处，因为它同样会在响应中告知浏览器启动一个新的基本认证输入流程。当然，主要区别在于对 `authentication_attempts`\
  \ Cookie 的检索和处理。该 Cookie 首先在私有方法 `getDeniesCookie` 中从请求中获取。然后，该 Cookie 的值（假定为整数）增加\
  \ 1，并在以下行的响应头中重置：\n\n```\n......\n\n...\n\n清单 8-25\n使用自定义入口点所需的 Spring 配置\n```\n\
  \n```\nresponse.addHeader(\"Set-Cookie\",\n\"authentication_attempts=\"+(getDeniesCookie(request)+1)+\"\
  ; Max-Age=3600; Version=1\");\n```\n\n如果抛出的异常类型与之前提到的不同（特别是针对已完全认证用户的 `AccessDeniedException`），则会调用\
  \ `AccessDeniedHandler` 而不是 `AuthenticationEntryPoint`。默认调用的 `AccessDeniedHandler`\
  \ 实现是 `AccessDeniedHandlerImpl`，它默认也会在响应中设置 403 错误状态，并让浏览器渲染其默认的 403 页面。不过，你也可以在处理程序中配置一个\
  \ `errorPage` 属性，以决定将请求转发（forward，应用程序内部的一种分发机制，与重定向不同）到一个自定义的错误页面，这可能是你在使用 `AccessDeniedHandler`\
  \ 时最常见的个性化设置。你也可以定义自己的 `AccessDeniedHandler` 实现，为了说明这一点，你将在此处进行此操作，但你也会像在 `AccessDeniedHandlerImpl`\
  \ 中使用一样，使用一个自定义的 `errorPage` 属性。\n\n与之前的示例一样，该实现将简单地在响应中添加一个额外的标头，其形式为一个 Cookie，用于指定从特定计算机和浏览器接收到的“访问被拒绝”响应的次数。清单\
  \ 8-26 展示了该处理程序实现的一个示例。\n\n```\npackage com.apress.pss.security;\nimport java.io.IOException;\n\
  import javax.servlet.RequestDispatcher;\nimport javax.servlet.ServletException;\n\
  import javax.servlet.http.Cookie;\nimport javax.servlet.http.HttpServletRequest;\n\
  import javax.servlet.http.HttpServletResponse;\nimport org.springframework.security.access.AccessDeniedException;\n\
  import org.springframework.security.web.WebAttributes;\nimport org.springframework.security.web.access.AccessDeniedHandler;\n\
  public class CookieAccessDeniedHandler implements AccessDeniedHandler {\nprivate\
  \ static final String ACCESS_DENIES = \"access_denies\";\nprivate String errorPage;\n\
  public void handle(HttpServletRequest request,\nHttpServletResponse response,\n\
  AccessDeniedException accessDeniedException) throws IOException,\nServletException\
  \ {\nif (!response.isCommitted()) {\nresponse.addCookie(new Cookie(ACCESS_DENIES,\n\
  String.valueOf(getDeniesCookie(request)+1)));\nif (errorPage != null) {\nrequest.setAttribute(WebAttributes.ACCESS_DENIED_403,\
  \ accessDeniedException);\nresponse.setStatus(HttpServletResponse.SC_FORBIDDEN);\n\
  RequestDispatcher dispatcher = request.getRequestDispatcher(errorPage);\ndispatcher.forward(request,\
  \ response);\n} else {\nresponse.sendError(HttpServletResponse.SC_FORBIDDEN, accessDeniedException.getMessage());\n\
  }\n}\n}\nprivate int getDeniesCookie(HttpServletRequest request) {\nfor(Cookie cookie:request.getCookies()){\n\
  if(cookie.getName().equals(ACCESS_DENIES)){\nreturn Integer.parseInt(cookie.getValue());\n\
  }\n}\nreturn 0;\n}\n}\n清单 8-26\n处理程序 Java 类\n```\n\n如前所述，这段代码与 `AccessDeniedHandlerImpl`\
  \ 基本相同。你只是在响应中添加了 Cookie，每次调用此处理程序时，该 Cookie 都会被设置为递增的值。你可以看到，其中还包含了处理 `errorPage`\
  \ 属性的逻辑（如果设置了该属性）。将执行一个 Servlet 分发器转发到该错误页面 URL，这意味着它可以访问此类内部使用的同一个请求。\n\n更改安全拦截器\n\
  安全拦截器是一个你很少会自行修改或替换的类，因为默认实现已经涵盖了过滤器安全和方法级安全的最常见场景。但是，你可以扩展它以用于不完全符合 Web 应用-业务方法服务方案的不同类型的应用程序。例如，Spring\
  \ Integration 有自己的安全拦截器实现，形式为 `org.springframework.integration.security.channel.ChannelSecurityInterceptor`。它不是处理简单的方法调用或过滤器调用，而是处理一个不同的抽象，即\
  \ `org.springframework.integration.security.channel.ChannelInvocation`。这意味着它基本上拦截了在确定的安全通道上的“发送”和“接收”调用。Spring\
  \ Integration 还使用类 `org.springframework.integration.security.channel.ChannelSecurityMetadataSource`\
  \ 作为消息通道的 `org.springframework.security.access.SecurityMetadataSource` 实现。\n\n正如\
  \ Spring Integration 示例所示，创建不同的安全拦截器，基本上是为了在你想要为不遵循标准 Web 服务方式的应用添加 Spring Security\
  \ 的授权支持时使用。但是，请记住，必须预先存在一个认证机制，因为安全拦截器会查找其授予资源访问权限所需的不同组件。这意味着 `SecurityContext`\
  \ 中必须存在一个 `Authentication` 对象，必须配置好 `AccessDecisionManager`，等等。清单 8-27 展示了来自 Spring\
  \ Integration 的安全拦截器实现。\n\n\n\n```\n/*\n* Copyright 2002-2019 the original author\
  \ or authors.\n*\n* Licensed under the Apache License, Version 2.0 (the \"License\"\
  );\n* you may not use this file except in compliance with the License.\n* You may\
  \ obtain a copy of the License at\n*\n*      https://www.apache.org/licenses/LICENSE-2.0\n\
  *\n* Unless required by applicable law or agreed to in writing, software\n* distributed\
  \ under the License is distributed on an \"AS IS\" BASIS,\n* WITHOUT WARRANTIES\
  \ OR CONDITIONS OF ANY KIND, either express or implied.\n* See the License for the\
  \ specific language governing permissions and\n* limitations under the License.\n\
  */\npackage org.springframework.integration.security.channel;\nimport java.lang.reflect.Method;\n\
  import org.aopalliance.intercept.MethodInterceptor;\nimport org.aopalliance.intercept.MethodInvocation;\n\
  import org.springframework.security.access.SecurityMetadataSource;\nimport org.springframework.security.access.intercept.AbstractSecurityInterceptor;\n\
  import org.springframework.security.access.intercept.InterceptorStatusToken;\nimport\
  \ org.springframework.util.Assert;\n/**\n* 一个 AOP 拦截器，用于对 MessageChannel 的发送和/或接收调用强制执行授权。\n\
  *\n* @author Mark Fisher\n* @author Oleg Zhurakousky\n* @see SecuredChannel\n*/\n\
  public final class ChannelSecurityInterceptor extends AbstractSecurityInterceptor\
  \ implements MethodInterceptor {\nprivate final ChannelSecurityMetadataSource securityMetadataSource;\n\
  public ChannelSecurityInterceptor() {\nthis(new ChannelSecurityMetadataSource());\n\
  }\npublic ChannelSecurityInterceptor(ChannelSecurityMetadataSource securityMetadataSource)\
  \ {\nAssert.notNull(securityMetadataSource, \"securityMetadataSource must not be\
  \ null\");\nthis.securityMetadataSource = securityMetadataSource;\n}\n@Override\n\
  public Class getSecureObjectClass() {\nreturn ChannelInvocation.class;\n}\npublic\
  \ Object invoke(MethodInvocation invocation) throws Throwable {\nMethod method =\
  \ invocation.getMethod();\nif (method.getName().equals(\"send\") || method.getName().equals(\"\
  receive\")) {\nreturn this.invokeWithAuthorizationCheck(invocation);\n}\nreturn\
  \ invocation.proceed();\n}\nprivate Object invokeWithAuthorizationCheck(MethodInvocation\
  \ methodInvocation) throws Throwable {\nObject returnValue = null;\nInterceptorStatusToken\
  \ token = super.beforeInvocation(new ChannelInvocation(methodInvocation));\ntry\
  \ {\nreturnValue = methodInvocation.proceed();\n}\nfinally {\nreturnValue = super.afterInvocation(token,\
  \ returnValue);\n}\nreturn returnValue;\n}\n@Override\npublic SecurityMetadataSource\
  \ obtainSecurityMetadataSource() {\nreturn this.securityMetadataSource;\n}\n}\n\
  清单 8-27\nChannelSecurityInterceptor Java 类\n```\n\n在这段代码中，你可以看到 `ChannelInvocation`\
  \ 在调用父类的 `beforeInvocation` 方法之前，包装了一个 `MethodInvocation`。除了包装之外，它还会进行一些内部处理，使得当前正在执行的通道可以被查询以获取\
  \ `ConfigAttributes`。\n\n另请注意，仅当被调用的方法是 Spring Integration 的标准“send”和“receive”方法之一时，该拦截器才会执行其安全验证。\n\
  \n代码中使用的 `ChannelSecurityMetadataSource` 将被查询以获取安全元数据属性。它知道如何从 Spring Integration\
  \ 通道以及相关的 `org.springframework.integration.security.channel.ChannelAccessPolicy`\
  \ 中提取此信息。\n\n在你的应用程序中，你极不可能重写安全拦截器。但是，了解你可以这样做，并且理解你为何要这样做，是件好事。\n\n正如 Spring Integration\
  \ 的示例所示，你想要替换安全拦截器（或添加额外的拦截器）的一个原因是，你拥有某些抽象概念，希望对其应用基于拦截的安全性，而这些概念既不适合 URL 拦截，也不适合简单的方法拦截。你希望为你的拦截逻辑赋予一个更有意义的名称，并且过滤掉那些默认实现不会默认过滤的某些内容。这正是\
  \ Spring Integration 示例所做的。它拦截了 `MessageChannel` 通信，这是在其上下文中具有意义的领域元素。然而，归根结底，它基本上是在拦截方法，并过滤以仅拦截\
  \ `send` 和 `receive` 方法，这些方法同样是在特定上下文中具有意义的方法。\n\n**Spring Security 扩展项目**\n\n有一个专门的项目致力于开发\
  \ Spring Security 扩展，社区成员可以在 Spring Security 之上开发自己的扩展。通过这种方式，他们可以将这些扩展与 Spring\
  \ Security 主项目解耦，使其能够独立发展。该扩展项目的所在地是 [`https://spring.io/projects/spring-security`](https://spring.io/projects/spring-security)。\n\
  \n如果你访问此页面，你会看到目前存在两个扩展项目：Kerberos 集成和 SAML2 集成。还有 OAuth 集成，它作为一个独立的项目存在。你可以在 [`https://docs.spring.io/spring-security/oauth/`](https://docs.spring.io/spring-security/oauth/)\
  \ 找到它。\n\nSpring Security 扩展中的每个项目都可以根据需要实现框架的任意多个部分，以便正常工作。这意味着我们在本章中定义的许多扩展点（以及其他一些扩展点）可以在特定扩展中被重写以完成其工作。\n\
  \n**总结**\n\n在本章中，我们展示了当你想要自定义或扩展 Spring Security 的行为时，其架构中的模块化设计是如何发挥作用的。我们展示了如何使用\
  \ Spring Security v5 和 MongoDB 创建一个 Spring Boot Web 应用程序。我们还展示了 Spring Security\
  \ 提供的一些不同且最常见的扩展点，以便你可以将其功能适配到你的特定应用程序，同时保留核心功能，从而利用这些功能使你的工作更轻松。阅读本章后，结合之前章节的所有理论和实践，你应该有足够的信心来实现超越框架开箱即用功能的功能。\n\
  \n**9. 将 Spring Security 与其他框架和语言集成**\n\n\n本章将探讨 Spring Security 在 JVM 上运行的其他应用框架和语言中的使用场景。\n\
  在前面的章节中，你已经了解到使用 Spring Security 的两种主要方式：在 Web 层以过滤器（filter）的形式，以及在业务层通过 Spring\
  \ AOP 实现。这意味着你可以在任何基于 Servlet 技术构建的应用中，或者任何愿意使用 Spring 和 Spring AOP 来管理其对象生命周期和交互的应用中使用\
  \ Spring Security。\n\n在接下来的章节中，你将看到这两种情况的示例。我们将首先介绍几个流行的 Java 框架（其中一个是基于 Spring\
  \ 的），以及如何在这些框架中使用 Spring Security。这些框架包括流行的 Struts 2 Web 框架和 Spring Web Flow（SpringSource\
  \ 套件中的另一个成员）。\n\n在研究了这两个框架之后，我们将简要介绍几种 Java 虚拟机（JVM）编程语言（及其相关框架），以及如何在这些语言中使用 Spring\
  \ Security。我们将探讨 Groovy 及其 Web 开发框架 Grails、JRuby 及其框架 Rails，以及嵌入在 Spring Web 应用中的\
  \ Scala。\n\n我们不会深入探讨这些框架或语言的细节，因为那超出了本书的范围。本章的目的仅仅是解释如何在更广泛的上下文中使用 Spring Security。\n\
  \nSpring Security 与 Struts 2\nStruts 2 是一个流行的 Java Web 框架，由最初的 Struts 项目和 WebWork\
  \ 项目合并而成。Struts 2 从一开始就被设计为原始 Struts 框架的全面演进，以适应新一代强大的 Web 框架，并且它几乎保留了原始 Struts\
  \ 的原则和实现。\nStruts 2 被广泛使用，并且与任何其他基于 Servlet 的外部框架一样，是集成 Spring 和 Spring Security\
  \ 的理想候选者。\nStruts 2 是一个构建在标准 Java Servlet 技术之上的 MVC（模型-视图-控制器）框架，因此你在本书中读到的许多基于\
  \ Web 的安全原则无需修改即可适用。如果你只想使用你在第 5 章中学到的基于 URL 的 Web 安全，你只需要相应地配置你的 `web.xml` 和 Spring\
  \ Security 过滤器链，或者使用 `WebApplicationInitializer` 来实现。\n有关 Struts 2 版本的更多信息，请访问 [`https://struts.apache.org/releases.html`](https://struts.apache.org/releases.html)。本书将使用\
  \ Struts 版本 2.5.20。\n\n与本章中的其他框架和语言一样，我们不会深入解释 Struts 2（因为关于这个主题有很多优秀的书籍）。我们只会解释足够让你能够将\
  \ Spring Security 与之结合使用的内容。事实上，我们假设你阅读本节可能是因为你已经在使用 Struts 2，并希望将 Spring Security\
  \ 集成到其中。然而，为了进一步说明，图 9-1 展示了 Struts 2 工作原理的全貌。\n\n![../images/310331_2_En_9_Chapter/310331_2_En_9_Fig1_HTML.jpg](img/310331_2_En_9_Fig1_HTML.jpg)\n\
  \n图 9-1\nStruts 2 工作原理\n\n当请求到达应用时，一个在 Servlet 过滤器中实现的前端控制器（[`http://en.wikipedia.org/wiki/Front_Controller`](http://en.wikipedia.org/wiki/Front_Controller)）会处理该请求。它将请求发送通过一组配置好的拦截器，这些拦截器在\
  \ Action 被调用前后执行不同的功能。然后调用 Action，该 Action 包含当前请求所需的所有业务逻辑。Action 执行完毕后，会创建一个代表视图的结果对象，然后以相反的顺序（在返回结果时）再次调用拦截器栈，直到最终将响应返回给客户端。\n\
  你首先要做的当然是下载库文件，并将其包含在你的 Maven 项目中，下载链接如下：\n`https://struts.apache.org/download.cgi#struts-ga`。\n\
  Struts 2 可以下载完整发行版（包含所有内容），也可以只下载单独的库、源代码、文档等。\n\n你将使用 Maven 来构建这个项目。因此，让我们创建一个新的\
  \ Maven 项目，如图 9-2 所示。然后按照提示操作：在第一个提示中选择一个新的 *starter project*，并选择一些相关的 `groupId`\
  \ 和 `artifactId` 名称。（我们分别选择了 `com.apress.pss.struts` 和 `struts-example`，如图 9-2 所示。你可以使用相同的名称以便轻松地跟随示例进行操作）。\n\
  \n![../images/310331_2_En_9_Chapter/310331_2_En_9_Fig2_HTML.jpg](img/310331_2_En_9_Fig2_HTML.jpg)\n\
  \n图 9-2\nStruts 项目\n\n现在，使用你创建测试所需的组件创建一个简单的、功能性的 Struts 2 Web 应用，包括 Spring 集成（尽管它使用了旧版本的配置\
  \ XML 文件 DTD）。执行该命令后的文件结构如图 9-3 所示。\n\n![../images/310331_2_En_9_Chapter/310331_2_En_9_Fig3_HTML.jpg](img/310331_2_En_9_Fig3_HTML.jpg)\n\
  \n图 9-3\n执行 Maven 命令后的 Struts 2 应用文件结构\n\n在图 9-3 中，你可以看到一个名为 `struts.xml` 的文件；这是主要的\
  \ Struts 2 配置文件，你可以在清单 9-1 中看到其内容。\n\n```\n\nwelcome.jsp\n\nadmin.jsp\n\nwelcome.jsp\n\
  \n清单 9-1\nstruts.xml 文件\n```\n\n在清单 9-1 中，Action `\"helloWorld\"` 没有在 `class` 属性上定义类名。在这种情况下，它定义了一个简单的字符串，用于标识你稍后将在\
  \ `spring-security.xml` 中看到的 Spring Bean。当请求到达时，框架会查看此文件中的定义，以确定如何处理该特定请求。（这个定义很简单，但足以说明问题。）如果它在\
  \ `action` 属性中看到了一个类名，框架就会实例化该类的一个新对象来处理请求。如果框架检测到它不是类名，它就会在 Spring 配置中查找具有该 ID\
  \ 的 Bean，并从那里获取对象。这一切之所以可能，要归功于 `struts2-spring-plugin` 插件，它为 Struts 2 增加了 Spring\
  \ 功能，并使得在 Spring Bean 中定义 Action（以及其他组件，如拦截器）成为可能。\n请注意使用了 `struts-2.5.dtd` 作为 Struts\
  \ 2.5 版本。\n\n你现在要做的就是重写默认的 `spring-security.xml`，用清单 9-2 中的内容替换它，并将清单 9-3 中熟悉的依赖项添加到\
  \ `pom.xml` 文件中。\n\n```\n5.1.5.RELEASE\n5.1.5.RELEASE\n\norg.springframework\nspring-core\n\
  ${springframework.version}\n\norg.springframework\nspring-web\n${springframework.version}\n\
  \norg.springframework\nspring-webmvc\n${springframework.version}\n\n\n\norg.springframework.security\n\
  spring-security-web\n${springsecurity.version}\n\norg.springframework.security\n\
  spring-security-config\n${springsecurity.version}\n\n**清单 9-3** pom.xml 文件中的 Spring\
  \ Security 依赖项\n```\n\n```\n\n**清单 9-2** Struts 2 应用程序的 spring-security.xml 文件\n\
  ```\n\n接下来，你需要将 Spring Security 过滤器添加到 `web.xml` 中。此过滤器应在 Struts 2 过滤器之前执行，以便在到达\
  \ Action 之前填充认证对象。请记住，Struts 2 使用过滤器而非 Servlet 工作。清单 9-4 展示了一个可用于测试的 `web.xml` 文件。请注意，我们移除了示例中不需要的一些过滤器定义。\n\
  \n```\n\nstruts-example\n\nindex.jsp\n\ncontextConfigLocation\nclasspath:spring-security.xml\n\
  \nstruts2\norg.apache.struts2.dispatcher.filter.StrutsPrepareAndExecuteFilter\n\n\
  struts2\n/*\n\nspring\norg.springframework.web.servlet.DispatcherServlet\n\nspring\n\
  /\n\norg.springframework.web.context.ContextLoaderListener\n\nspringSecurityFilterChain\n\
  org.springframework.web.filter.DelegatingFilterProxy\n\nspringSecurityFilterChain\n\
  /*\n\njspSupportServlet\norg.apache.struts2.views.JspSupportServlet\n\n**清单 9-4**\
  \ 包含 Spring Security 过滤器和 Struts 2 过滤器的 web.xml 文件\n```\n\n接下来，我们简化了 `jsp` 文件夹内的\
  \ `.jsp` 文件，如下所示：`helloWorld.jsp` 文件仅包含字符串 “This is your first \"Secured\" Struts2\
  \ Application!”，没有其他内容。\nStruts 2 有一个内置系统来处理应用程序中可能抛出的异常。此机制会干扰 Spring Security\
  \ 的异常处理系统，后者依赖于抛出 `AccessDeniedException` 等异常来改变执行流程。例如，在显示登录表单时，你需要停用 Struts 2\
  \ 的异常处理机制。为此，在 `struts.xml` 文件中，你需要在包含已定义 `<constant>` 元素的那一行下方添加一行 `<constant name=\"\
  struts.handle.exception\" value=\"false\" />`。\n\n最后，你需要保护你的 Action。让你的 `HelloWorldAction`\
  \ 看起来像清单 9-5 所示。\n\n```\npackage com.apress.pss.struts;\nimport javax.servlet.http.HttpServletRequest;\n\
  import org.apache.struts2.ServletActionContext;\npublic class HelloWorldAction {\n\
  private String username;\npublic String execute() {\nHttpServletRequest request\
  \ = ServletActionContext.getRequest();\nthis.setUsername(request.getUserPrincipal().getName());\n\
  return \"SUCCESS\";\n}\npublic String getUsername() {\nreturn username;\n}\npublic\
  \ void setUsername(String username) {\nthis.username = username;\n}\n}\n**清单 9-5**\
  \ 受保护的 HelloWorldAction\n```\n\n现在，如果你重新启动应用程序并访问 `http://localhost:8080/struts-example/helloWorld`，将会看到标准的\
  \ Spring Security 登录表单。如果你使用登录用户名 **admin** 和密码 **admin123**，你将能够访问该页面。图 9-4 展示了登录页面、HelloWorld\
  \ 页面和注销页面。\n\n![../images/310331_2_En_9_Chapter/310331_2_En_9_Fig4_HTML.jpg](img/310331_2_En_9_Fig4_HTML.jpg)\n\
  \n**图 9-4** 受保护的 Struts 2 应用程序及被访问的 Action\n\n### Spring Security 与 Spring Web Flow\n\
  Spring Web Flow 是一个构建于 Spring MVC 之上的框架，它允许你将 Web 驱动流程的不同步骤链接成一个流畅的工作流。换句话说，它允许你以声明式的方式定义\
  \ Web 应用程序在与用户交互过程中可能经历的不同步骤。基本上，你使用它来定义 Web 应用程序用户界面（UI）部分与每个转换应触发的后端流程之间的一组规则和转换。有关\
  \ Spring Web Flow 的所有信息，请查看此链接：[`https://projects.spring.io/spring-webflow/`](https://projects.spring.io/spring-webflow/)。\n\
  \n当你创建一个新的 Maven 项目时，需要像这样添加 Spring Web Flow 依赖：\n\n```\norg.springframework.webflow\n\
  spring-webflow\n2.5.1.RELEASE\n\n```\n\n从图形上看，Spring Web Flow 以简化的形式工作，如图 9-5 所示。该示例是一个简化产品的模拟网页。方框代表各种状态（视图状态、动作状态、决策状态、子流程状态等），箭头代表转换。\n\
  \n![../images/310331_2_En_9_Chapter/310331_2_En_9_Fig5_HTML.jpg](img/310331_2_En_9_Fig5_HTML.jpg)\n\
