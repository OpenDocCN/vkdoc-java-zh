    \n### 热Observable与冷Observable\n\n在之前的示例中，我们假设一个`Observable`在`Observer`订阅它时才开始发射项目序列：它们被称为**冷Observable**。冷Observable总是等待至少有一个观察者订阅后才开始发射项目。\n\
    \n另一方面，一个在连接到观察者之前就开始发射项目的`Observable`被称为**热Observable**。\n\n对于热Observable，观察者可以在发射期间的任何时间订阅并开始接收项目。对于热Observable，观察者可能接收到从开始起的完整项目序列，也可能接收不到。"
  raw: 'But wait, why are you using an instance of rx.Subscriber<T> here? If you take
    a look at the RxJava documentation, you will see that Subscriber<T> is an object
    that implements the rx.Observer<T> interface, so it’s legal to use it as an Observer.
    The reason why you use Subscriber instead of any other implementation of the Observer
    interface is that Subscriber also implements the Subscription interface, which
    allow you to check if the subscriber is unsubscribed (with the isUnsubscribed()
    method) and to unsubscribe it (with the unsubscribe() method).


    For simplicity, I will omit the generic syntax for rx.Subscriber<T> , Observer<T>
    , and Observable<T> , unless it affects the readability and comprehension of text
    and examples.


    From the previous example, notice that an Observer reacts to three types of events:
    • Item emission by the Observable : It occurs zero, one, or more


    times. If the sequence completes correctly, the onNext method will be invoked
    as many times as the number of items in the sequence. If an error occurs at a
    certain point, the onNext method won’t be invoked any further.


    CHAPTER 2 ■ OBSERVABLES AND OBSERVERS


    • The completion of items emission : Only when all items in the sequence are emitted
    correctly will the onCompleted method be invoked. It’s invoked only once, and
    after the last item has been emitted. It also can never happen if you’re working
    with an infinite sequence.


    • An error : Error can occur in every moment of the sequence, and the sequence
    will stop immediately. In this case, the method onError will be invoked, passing
    the error as a Throwable object. The other two methods, onNext and onCompleted
    , won’t be invoked.


    An observable cannot notify both onCompleted and onError methods, only one of
    them. It will always be the last method invoked.


    ■ Note If you use the shortest notation


    observable.subscribe(nextItem -> {


    // do something with nextItem


    });


    you won’t get notified when the sequence completes. More importantly, if an error
    occurs, an exception will be thrown by RxJava because no implementation of onError
    can be found, and your app will crash!


    With the Observable.subscribe() method (an operation-called subscription), you
    can connect an Observable to an Observer, but what if you want to disconnect them?
    This operation is called unsubscription and it looks like this:


    public void subscribeToObservable(Observable<T> observable) { Subscription subscription
    =


    observable.subscribe(new Subscriber() {


    @Override


    public void onCompleted() {


    // invoked when Observable stops emitting items


    }


    @Override


    public void onError(Throwable e) {


    // invoked when Observable throws an exception


    // while emitting items


    }


    @Override


    public void onNext(T nextItem) {


    // invoked when Observable emits an item


    CHAPTER 2 ■ OBSERVABLES AND OBSERVERS


    // usually you will consume the nextItem here


    }


    })


    // disconnect observable and observer


    subscription.unsubscribe()


    }


    You can check if the subscription has been unsubscribed (Observer and Observable
    are no longer connected) with the following method:


    subscription.isUnsubscribed()


    The unsubscribe method can be called at any time during items emission. After
    the call to unsubscribe, onNext won’t receive any other item, and the other two
    methods, onCompleted and onError , won’t be notified. After unsubscription, the
    observable can stop or continue with item emission, but the observer will not
    be notified about it. Hot and Cold Observables


    In the examples so far we assumed that an Observable begins emitting a sequence
    of items when the Observer subscribes to it: they are called cold observables
    . Cold observables always wait to have at least one observer subscribed to start
    emitting items.


    On the other hand, an Observable that begins emitting items before being connected
    to an observer is called a hot observable .


    With hot observables, an observer can subscribe and start receiving items at any
    time during the emission. With hot observables, the observer may receive the complete
    sequence of items starting from the beginning or not.'
