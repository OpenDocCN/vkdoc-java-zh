    \n此代码的输出是：\n\n```\nnext item is: 1.5\nnext item is: 2.6\nnext item is: 3.7\nsequence\
    \ completed!\n```\n\n如你所见，发射的序列在最短的序列停止时停止，在此例中，最短的序列是第一个序列（1, 2, 3）。\n\n## `concat`"
  raw: 'The flatMap operator (Figure  2-2 ) performs two types of actions: the “map”
    action that transforms the emitted items into observables and a “flatten” action
    that converts those observables into one observable. So, you can use flatMap to
    convert the input observable into any other observable (or, in other words, to
    convert the input stream into a different stream).


    ![](media/image27.jpg)


    Figure 2-2\. A marble diagram of the flatMap operator


    So, like the map operator, flatMap applies a function to each emitted item, but
    this function must return an observable. Then those items are merged into one
    observable, so the observables may be interleaved. If you need your observables
    not to be interleaved, you must use the operator concatMap .


    For example, suppose that you have a list of integers as input and you want to
    convert it in a sequence of strings in the format “Number x” where x is the next
    integer in the input list. You can combine flatMap and map as follows: List<Integer>
    input = Arrays.asList(1, 2, 3, 4, 5); Observable.just(input)


    CHAPTER 2 ■ OBSERVABLES AND OBSERVERS


    .flatMap(new Func1<List<Integer>, Observable<Integer>>() { @Override


    public Observable<Integer> call(List<Integer> item) {


    return Observable.from(item);


    }


    })


    .map(new Func1<Integer, String>() {


    @Override


    public String call(Integer t) {


    return "Number " + t;


    }


    })


    .subscribe(new Subscriber<String>() {


    @Override


    public void onCompleted() {


    System.out.println("sequence completed!");


    }


    @Override


    public void onError(Throwable e) {


    }


    @Override


    public void onNext(String item) {


    System.out.println("next item is: " + item);


    }


    });


    The results are


    next item is: Number 1


    next item is: Number 2


    next item is: Number 3


    next item is: Number 4


    next item is: Number 5


    sequence completed!


    concatMap


    The concatMap operator (Figure  2-3 ) behaves like flatMap , except that it ensures
    that the observables are not interleaved but concatenated, keeping their order.


    CHAPTER 2 ■ OBSERVABLES AND OBSERVERS


    ![](media/image33.jpg)


    Figure 2-3\. A marble diagram of the concatMap operator


    zip


    The zip operator (Figure  2-4 ) takes multiple observables as inputs and combines
    each emission via a specified function and emits the results of this function
    as a new sequence.


    ![](media/image32.jpg)


    ![](media/image31.jpg) ![](media/image30.jpg) ![](media/image29.jpg) ![](media/image28.jpg)


    Figure 2-4\. A marble diagram of the zip operator


    The function is applied in strict sequence. If there are two sequences as input,
    zip waits for the first item emitted by the first sequence, then the first item
    from the second sequence, applies the function to them, and emits the result of
    the function. It then waits for the second item from the first sequence, the second
    item from the second sequence, applies the function to these two items, and emits
    the result as a function. And so on. It will stop when the shortest sequence stops.


    Here’s an example:


    Observable<Integer> rangeMajor = Observable.range(1, 3); CHAPTER 2 ■ OBSERVABLES
    AND OBSERVERS


    Observable<Integer> rangeMinor = Observable.range(5, 10); Observable.zip(rangeMajor,
    rangeMinor,


    new Func2<Integer, Integer, String>() {


    @Override


    // order of parameters here is the same order


    // of zip parameters


    public String call(Integer major, Integer minor) {


    return major + "." + minor;


    }


    }).subscribe(new Subscriber<String>() {


    @Override


    public void onCompleted() {


    System.out.println("sequence completed!");


    }


    @Override


    public void onError(Throwable e) {


    }


    @Override


    public void onNext(String s) {


    System.out.println("next item is: " + s);


    }


    });


    In this example, the zip operator takes two sequences as inputs and a function
    that simply takes two integers and builds a string.


    The output of this code is


    next item is: 1.5


    next item is: 2.6


    next item is: 3.7


    sequence completed!


    As you can see, the emitted sequence stops when the shortest sequence stops, and
    in this case the shortest sequence is the first one (1,2,3).


    concat'
