    \n## Transformers\n\nAs mentioned, the `subscribeOn()` / `observeOn()` pair can\
    \ be used many times, forcing you to copy/paste the two lines of code necessary\
    \ to apply these two operators. Copy/paste leads to duplicated code, and it's\
    \ not a good practice. So, how can you create an operator that automatically applies\
    \ these two operators?\n\nYou can do it using `Observable.Transformer<T,R>` (\
    \ `T` is the type of input `Observable` and `R` is the type of output `Observable`).\
    \ Instances of `Transformer` are functions that are applied to an observable using\
    \ `Observable.compose()`, an operator that gives you the ability to modify the\
    \ source `Observable`, not only the items of the sequence.\n\n```\npublic static\
    \ <T> Observable.Transformer<T, T> mySchedulers() {\n    return new Observable.Transformer<T,\
    \ T>() {\n        @Override\n        public Observable<T> call(Observable<T> observable)\
    \ {\n            return observable\n                .subscribeOn(Schedulers.io())\n\
    \                .observeOn(AndroidSchedulers.mainThread());\n        }\n    };\n\
    }\n```\n\nWhen you implement `Transformer<T,R>`, you receive in input an `Observable<T>`\
    \ and you must return an `Observable<R>`. In the example above, `T` and `R` are\
    \ the same object because your `Transformer` does not modify the items of the\
    \ emitted sequence.\n\nNow you can rewrite the previous example as\n\n```\nObservable<MyResponseObject>\
    \ networkCall = ...\n\nnetworkCall\n    .compose(mySchedulers())\n    .subscribe(new\
    \ Subscriber<MyResponseObject>() {\n        @Override\n        public void onCompleted()\
    \ {\n        }\n\n        @Override\n        public void onError(Throwable e)\
    \ {\n            // here we can update the UI showing an error message\n     \
    \   }\n\n        @Override\n        public void onNext(MyResponseObject item)\
    \ {\n            // here we can update the UI reading item data\n        }\n \
    \   });\n```\n\n## Advanced Use of Schedulers\n\nYou can also use schedulers without\
    \ applying operators in a chain of observables. For example, if you want to execute\
    \ some operations in a dedicated thread, you can use the `rx.Scheduler.Worker`\
    \ class, like so:\n\n```\nWorker worker = Schedulers.newThread().createWorker();\n\
    worker.schedule(new Action0() {\n    @Override\n    public void call() {\n   \
    \     // do your work here\n    }\n});\n```\n\nThe `Worker` class implements the\
    \ `Subscription` interface, so you can call methods `unsubscribe()` and `isUnsubscribed()`\
    \ on it.\n\n`Action0` is an interface that defines just one method, `call()`,\
    \ which accepts no parameters and returns `void`.\n\n`Worker` also implements\
    \ two methods to execute actions after a certain amount of time or periodically:\n\
    \n- `Worker.schedule(Action0 action, long delayTime, TimeUnit unit)` executes\
    \ an action after the specified delay.\n- `Worker.schedulePeriodically(Action0\
    \ action, long initialDelay, long period, TimeUnit unit)` executes an action periodically,\
    \ optionally starting after a delay.\n\n## Backpressure\n\nUntil now we have considered\
    \ only situations in which the emission of items is slower than the operations\
    \ executed on each of the items. So, for every emission, there's enough time for\
    \ the subscriber to consume the emitted item before the next one is emitted.\n\
    \nThere are also situations in which the observable emits items too fast for the\
    \ subscriber, and the subscriber cannot continue the single item before receiving\
    \ the next one.\n\nFor example, take two observables, A and B, where A emits items\
    \ twice as fast as B and creates an `Observable.zip` of A and B. The resulting\
    \ observable combines the n-th item from A and n-th item from B, but meanwhile\
    \ B has also emitted items n+1 to n+m, so it should keep an always increasing\
    \ buffer of the emitted items.\n\nAnother typical case is when inside the `onNext`\
    \ method the UI is updated with data from the emitted item, but items are emitted\
    \ at a frequency higher than the frequency with which the UI is updated.\n\nBackpressure\
    \ happens every time we face such situations. We can handle backpressure in the\
    \ following ways:\n\n- By controlling the emission, applying some specific operator\
    \ to the observable\n- At consumption time in the subscriber\n\n### Handling Backpressure\
    \ During Emission: Throttling\n\nYou can use some RxJava operators to adjust the\
    \ rate at which the `Observable` emits items.\n\n#### sample\n\nWith `Observable.sample()`\
    \ you can periodically take samples of the sequence and emit the most recent item\
    \ of each sample. Figure 3-1 shows this process.\n\n![](media/image91.jpg)\n\n\
    **Figure 3-1.** The marble diagram of `Observable.sample()`\n\nLooking at the\
