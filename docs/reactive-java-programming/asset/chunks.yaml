- fmt: "# ReplaySubject\n\nWhat if you want the subscriber to receive all items emitted\
    \ prior to its subscription instead of only the last one? Just use a `ReplaySubject`.\n\
    \n## ReplaySubject\n\n`ReplaySubject<T>` (Figure 4-3) emits all items emitted\
    \ by the source `Observable`, regardless of when the observer subscribes, by keeping\
    \ a buffer of the emitted items.\n\nCHAPTER 4 ■ SUBJECTS\n\n![](media/image102.jpg)\n\
    \n**Figure 4-3.** The marble diagram for `ReplaySubject<T>`\n\nThis buffer is\
    \ backed up by an `ArrayList`, and by default it has an initial capacity of 16\
    \ and no upper bounds.\n\nRxJava provides other static factory methods to create\
    \ an instance of `ReplaySubject` with different behaviors:\n\n- `ReplaySubject.create(int\
    \ capacity)` creates an instance of `ReplaySubject` with the specified initial\
    \ capacity.\n- `ReplaySubject.createWithSize(int size)` creates an instance that\
    \ will keep a buffer with the specified size; when the buffer is full, older items\
    \ are discarded.\n- `ReplaySubject.createWithTime(long time, TimeUnit unit, Scheduler\
    \ scheduler)` creates a time-bounded `ReplaySubject`.\n- `ReplaySubject.createWithTimeAndSize(long\
    \ time, TimeUnit unit, int size, Scheduler scheduler)` lets you create a `ReplaySubject`\
    \ that is both time-bounded and size-bounded.\n\n## AsyncSubject\n\n`AsyncSubject<T>`\
    \ (Figure 4-4) is an implementation of `Subject` that:\n- Emits only the last\
    \ emitted item from the source observable after that observable completes.\n-\
    \ Emits no item if the source observable does not emit any item.\n- Notifies an\
    \ error event (without emitting any item) if the source `Observable` terminates\
    \ with an error.\n\nCHAPTER 4 ■ SUBJECTS\n\n![](media/image103.jpg)\n\n**Figure\
    \ 4-4.** The marble diagram for `AsyncSubject<T>`\n\nLet’s change the previous\
    \ example to use `AsyncSubject` instead of `PublishSubject`:\n\n```\nAsyncSubject<Integer>\
    \ subject = AsyncSubject.create();\nObservable<Integer> subjectAsObservable =\n\
    subject.asObservable();\n\n// subscribe the first Subscriber\nsubjectAsObservable.subscribe(new\
    \ Subscriber<Integer>() {\n    @Override\n    public void onCompleted() {\n  \
    \      System.out.println(\"first: sequence completed\");\n    }\n\n    @Override\n\
    \    public void onError(Throwable e) {\n    }\n\n    @Override\n    public void\
    \ onNext(Integer item) {\n        System.out.println(\"first: next item is \"\
    \ + item);\n    }\n});\n\nsubject.onNext(1);\nsubject.onNext(2);\n\n// subscribe\
    \ the second Subscriber\nsubjectAsObservable.subscribe(new Subscriber<Integer>()\
    \ {\n    @Override\n    public void onCompleted() {\n        System.out.println(\"\
    second: sequence completed\");\n    }\n\n    @Override\n    public void onError(Throwable\
    \ e) {\n    }\n\n    @Override\n    public void onNext(Integer item) {\n     \
    \   System.out.println(\"second: next item is \" + item);\n    }\n});\n\nsubject.onNext(3);\n\
    subject.onNext(4);\nsubject.onNext(5);\nsubject.onCompleted();\n```\n\nThis code\
    \ produces the following output:\n\n```\nfirst: next item is 5\nfirst: sequence\
    \ completed\nsecond: next item is 5\nsecond: sequence completed\n```\n\n## When\
    \ Should You Use Subjects?\n\nThere's an ongoing debate about the usage of `Subject`s.\
    \ Erik Meijer, one of the RxJava's fathers, says that:\n\n> They are the mutable\
    \ variables of the Rx world and in most cases you do not need them. Typically\
    \ a solution with `Create` or the other operators allows you to just wire up continuations\
    \ without adding extra state. Stated slightly differently, it is good practice\
    \ to minimize the number of objects that hold on to subscribers, you just want\
    \ to pass them through. [https://social.msdn.microsoft.com/Forums/en-US/bbf87eea-6a17-4920-96d7-2131e397a234/why-does-emeijer-not-like-subjects](https://social.msdn.microsoft.com/Forums/en-US/bbf87eea-6a17-4920-96d7-2131e397a234/why-does-emeijer-not-like-subjects)\n\
    \nAs a general rule, before using a `Subject`, ask yourself if the same purpose\
    \ can be achieved with `Observable.create()` (or any other operator that creates\
    \ observables). And, if you need to use a `Subject`, it’s a good idea to expose\
    \ it wrapped inside an `Observable` with the method `Subject.asObservable()`,\
    \ because by doing so you will not expose the mutable component of the `Subject`.\n\
    \n![](media/image104.jpg)\n\nThe following example shows how to create a reactive\
    \ version of `ArrayList`. This implementation of `ArrayList` exposes two additional\
    \ methods to get notified when an item is added or removed:"
