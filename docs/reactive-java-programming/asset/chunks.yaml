- fmt: "# Networking with RxJava and Retrofit\n\nThe results (`onNext`, `onError`,\
    \ and `onCompleted`) will be notified on the main thread.\n\n## Chaining Multiple\
    \ Network Calls\n\nChaining multiple network calls often means dealing with nested\
    \ callbacks, which make your code hard to read and maintain. Moreover, you have\
    \ to handle errors in each callback, increasing the code complexity.\n\nFrom what\
    \ you've seen so far, it's easy to understand how to use RxJava to substitute\
    \ the callback chain with a combination of observables.\n\nIn this simple scenario,\
    \ you need to call a remote API to authenticate a user, then another one to get\
    \ the user's data, and again another API to get the user's contacts.\n\nThe following\
    \ code shows nested API calls with callbacks:\n\n```java\nimport retrofit2.Callback;\n\
    import retrofit2.Call;\nimport retrofit2.Response;\n\nUser user = null;\n\nmyService.login(username,\
    \ password,\n    new Callback<AccessToken>() {\n        @Override\n        public\
    \ void success(User user, Response response) {\n            storeCredentials(response.getAccessToken())\n\
    \            myService.getUser(accessToken, new Callback<User>() {\n         \
    \       @Override\n                public void onResponse(Call<User> call,\n \
    \                   Response<User> response) {\n                    user = response.getBody();\n\
    \                    myService.getUserContact(user.getId(),\n                \
    \        new Callback<Contact>() {\n                            @Override\n  \
    \                          public Contact onResponse(Call<Contact> contact,\n\
    \                                Response<Contact> response) {\n             \
    \                   user.setContact(response.getBody());\n                   \
    \         }\n                            @Override\n                         \
    \   public void onFailure(RetrofitError error) {\n                           \
    \     // handle error here...\n                            }\n               \
    \         });\n                }\n                @Override\n                public\
    \ void onFailure(RetrofitError error) {\n                    // handle error here...\n\
    \                }\n            });\n        }\n        @Override\n        public\
    \ void failure(RetrofitError error) {\n            // handle error here...\n \
    \       }\n    });\n```\n\nAnd this is how you can transform this code using RxJava:\n\
    \n```java\nmyService.login()\n    .doOnNext(accessToken -> storeCredentials(accessToken))\n\
    \    .flatMap(accessToken -> myService.getUser(accessToken))\n    .flatMap(user\
    \ -> myService.getUserContact(user.getId()))\n    .subscribe(new Subscriber<Contact>()\
    \ {\n        @Override\n        public void onCompleted() {\n        }\n     \
    \   @Override\n        public void onError(Throwable e) {\n        }\n       \
    \ @Override\n        public void onNext(Contact contact) {\n        }\n    });\n\
    ```\n\nwhere:\n\n- `myService.login()` returns an `Observable<AccessToken>`.\n\
    - The `doOnNext()` method is applied to the result of `myService.login()` to invoke\
    \ `storeCredentials()` every time an instance of `AccessToken` is emitted.\n-\
    \ The same instance of `AccessToken` is used by the first `flatMap` operator to\
    \ invoke the method `myService.getUser(accessToken)` and thus return an `Observable<User>`.\n\
    - Another `flatMap` operator is applied to use the emitted instance of `User`\
    \ to call `myService.getUserContact(user.getId())`.\n\nWith the nested callbacks\
    \ version, there are three different places where you have to handle errors; in\
    \ the RxJava version, you can handle errors in just one place, since every error\
    \ will be forwarded to the observer and notified in the `onError` method.\n\n\
    ## Caching Data\n\nWhen working with network calls, an important topic is caching.\
    \ Caching is a mechanism to save a local copy of the network response to be used\
    \ when the network is unreachable or to avoid doing too many subsequent network\
    \ calls.\n\nRetrofit supports caching network responses using `OkHttpClient`'s\
    \ cache mechanism. In some cases, this is not enough and you need to cache data\
    \ by applying your own custom logic.\n\nAgain, RxJava can help you build a complex\
    \ caching mechanism with simple and readable code. The following code shows an\
    \ abstract implementation of a class that caches a network response on disk and\
    \ in memory. Note that in this example you take advantage of lambda expressions\
    \ (provided by Java 8) to make your code less verbose.\n\n```java\nabstract class\
    \ CacheManager<T> {\n    private T mMemoryCache;\n\n    public Observable<T> getData()\
    \ {\n        return Observable.concat(fromMemory(),\n            fromDisk(), fromNetwork())\n\
    \            .first(response -> isValid(response))\n            .onErrorResumeNext(t\
    \ -> fallbackToDiskCache());\n    }\n\n    protected Observable<T> fromNetwork()\
    \ {\n        return doNetworkCall()\n            .doOnNext(response -> {\n   \
    \             cacheInMemory(response);\n                cacheOnDisk(response);\n\
    \            })\n            .compose(logSource(\"network\"));\n    }\n}\n```"
