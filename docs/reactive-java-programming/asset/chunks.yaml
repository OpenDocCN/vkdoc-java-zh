  raw: 'The first subscriber subscribes before PublishSubject starts to emit items,
    so it will receive all five items and then complete. The second subscriber subscribes
    in the middle of the sequence, so it will receive only the subsequent items.


    CHAPTER 4 ■ SUBJECTS


    Are Subjects hot or cold observables? This example makes it easy to answer the
    question: Subjects are hot observables because they can produce items when no
    Observer is subscribed.


    Another interesting point is the usage of the Subject.asObservable() method. Subscribing
    to subject instead of subjectAsObservable will produce the same output, but the
    method Subject.asObservable() helps you by wrapping your Subject instance in an
    Observable instance. This means you can expose only the Observable interface to
    the subscribers and it also means that no one else can use the Subject instance
    to emit items or notify completed/error events.


