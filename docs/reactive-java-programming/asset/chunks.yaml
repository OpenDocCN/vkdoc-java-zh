  trans: "\n■ 注意：还有一种可观察对象称为可连接可观察对象。这种可观察对象在其“connect”方法被调用时开始发射数据项，无论是否有观察者订阅了它。\n\
    \n让我们来看一个更具体但简单的例子。创建一个发射从 1 到 5 所有整数的 Observable 并订阅它：\n\n```java\nObservable<Integer>\
    \ observable =\nObservable.from(new Integer[]{1, 2, 3, 4, 5});\nobservable.subscribe(new\
    \ Subscriber<Integer>() {\n    @Override\n    public void onCompleted() {\n  \
    \      System.out.println(\"序列完成！\");\n    }\n\n    @Override\n    public void\
    \ onError(Throwable e) {\n        System.err.println(\"异常：\" + e.getMessage());\n\
    \    }\n\n    @Override\n    public void onNext(Integer integer) {\n        System.out.println(\"\
    下一个数据项是：\" + integer);\n    }\n});\n```\n\n预期的输出是：\n\n```\nnext item is: 1\nnext\
    \ item is: 2\nnext item is: 3\nnext item is: 4\nnext item is: 5\nSequence completed!\n\
    ```\n\n我们来详细说明一下。这是一个冷可观察对象，因为它只有在观察者订阅时才会开始发射数据项。该可观察对象会生成一个包含五个数据项的序列，每个数据项代表一个整数对象（从\
    \ 1 到 5），因此观察者的`onNext`方法会被调用五次。在序列结束时，会通知`onCompleted`方法。`onError`方法永远不会被通知，因为这个序列不会产生任何类型的错误或异常。\n\
    \n热可观察对象的一个例子是，每当 UI 按钮被点击时发射一个事件的可观察对象。它不会在观察者订阅时才开始发射事件；即使没有订阅者订阅，它也会发射事件。我将在专门讨论\
    \ Subjects 的章节中介绍热可观察对象。\n\n你可能已经注意到，在这个例子中，你使用了`Observable.from()`方法创建了一个可观察对象，这是一个静态工厂方法，可以从数组、可迭代对象或`Future`创建\
    \ Observable。\n\n这并不是创建可观察对象的唯一方法。\n\n## 创建可观察对象\n\n创建可观察对象最简单的方法是使用 RxJava 库中实现的工厂方法。你已经看到了如何使用`Observable.from()`方法创建\
    \ Observable，现在让我们看看其他可用的方法。\n\n### Observable.just()\n\n`Observable.just()`创建一个\
    \ Observable，它会发射作为参数传入的一个或多个对象：\n\n```java\nObservable.just(\"一个数据项\")\nObservable.just(\"\
    第一个数据项\", \"第二个数据项\")\nObservable.just(1, 2, 3)\n```\n\n使用这个操作符，你可以将之前的例子重写为：\n\
    \n```java\nObservable<Integer> observable =\nObservable.just(1, 2, 3, 4, 5);\n\
    observable.subscribe(new Subscriber<Integer>() {\n    @Override\n    public void\
    \ onCompleted() {\n        System.out.println(\"序列完成！\");\n    }\n\n    @Override\n\
    \    public void onError(Throwable e) {\n        System.err.println(\"异常：\" +\
    \ e.getMessage());\n    }\n\n    @Override\n    public void onNext(Integer integer)\
    \ {\n        System.out.println(\"下一个数据项是：\" + integer);\n    }\n});\n```\n\n\
    输出结果相同：\n\n```\nnext item is: 1\nnext item is: 2\nnext item is: 3\nnext item is:\
    \ 4\nnext item is: 5\nSequence completed!\n```\n\n### Observable.range()\n\n`Observable.range(a,\
    \ n)`创建一个 Observable，它会发射从`a`开始的`n`个连续整数。\n\n`Observable.just(1, 2, 3, 4, 5)`和`Observable.range(1,\
    \ 5)`会发射相同的序列。\n\n### Observable.interval()\n\n前面的方法创建的可观察对象会按顺序一个接一个地发射数据项，数据项之间没有延迟。\n\
    \n但是，如果你希望数据项以一定的时间间隔发射呢？`Observable.interval(long, TimeUnit)`正是为此而生：它创建一个 Observable，发射一个从\
    \ 0 开始的整数序列，每个整数之间间隔指定的时间。第一个参数是时间量，第二个参数定义时间单位。\n\n以下可观察对象每 1 秒发射一个数据项：\n\n```java\n\
    Observable.interval(1, TimeUnit.SECONDS)\n```\n\n这个序列是一个无限序列，没有自然结束，因此`onCompleted`永远不会被通知。只有当没有更多观察者连接到（订阅）该可观察对象时，序列才会停止。\n\
    \n### Observable.timer()\n\n`Observable.timer(long, TimeUnit)`创建一个 Observable，它在给定的延迟后只发射一个数据项。当与其他可观察对象结合使用时，它可以在另一个可观察对象的序列开始之前引入延迟，这在你后面会看到。\n\
    \n### Observable.create()\n\n`Observable.create()`是让你从头开始创建 Observable 的方法。例如，如果你想创建一个只发射一个字符串“Hello!”的可观察对象，你可以这样写：\n\
    \n```java\nObservable.create(\n    new Observable.OnSubscribe<String>() {\n  \
    \      @Override\n        public void call(Subscriber<? super String> observer)\
    \ {\n            observer.onNext(\"Hello!\");\n            observer.onCompleted();\n\
    \        }\n    }\n);\n```\n\n现在假设你想创建一个可观察对象，它发射一个由网络操作产生的 JSON 字符串。如果响应成功，可观察对象会发射结果并终止。否则，它会引发一个错误。\n\
    \n```java\nObservable.create(\n    new Observable.OnSubscribe<String>() {\n  \
    \      @Override\n        public void call(Subscriber<? super String> observer)\
    \ {\n            Response response = executeNetworkCall();\n            if (observer.isUnsubscribed())\
    \ {\n                // 不发射数据项，\n                // 观察者已不再订阅\n               \
    \ return;\n            }\n            if (response != null && response.isSuccessful())\
    \ {\n                observer.onNext(convertToJson(response));\n             \
    \   observer.onCompleted();\n            } else {\n                observer\n\
    \                    .onError(new Exception(\"网络调用错误\"));\n            }\n   \
    \     }\n    }\n);\n```\n\n### Observable.empty()\n\n`Observable.empty()`创建一个\
    \ Observable，它发射一个空序列（零个数据项）然后完成。因此只有`onCompleted()`会被通知。\n\n如果你想要发射一个空序列而不是发射\
    \ null 数据项或抛出错误，这会很有用，如下所示：\n\n```java\nObject data = ...;\npublic Observable<Object>\
    \ getData() {\n    if (data == null) {\n        return Observable.empty();\n \
    \   } else {\n        return Observable.just(data);\n    }\n}\n```\n\n### Observable.error()\n\
    \n`Observable.error(throwable)`创建一个 Observable，它发射一个空序列（零个数据项）然后通知一个错误。因此只有`onError()`会被调用。\n\
    \n```java\nObject data = ...;\npublic Observable<Object> getData() {\n    if (data\
    \ == null) {\n        return Observable.error(new Exception(\"没有数据！\"));\n   \
    \ } else {\n        return Observable.just(data);\n    }\n}\n```\n\n### Observable.never()\n\
    \n`Observable.never()`创建一个 Observable，它发射一个空序列（零个数据项）并且永远不会完成。观察者的任何方法都不会被调用。\n\
    \n### Observable.defer()\n\n`Observable.defer()`仅在订阅者订阅时才创建 Observable。解释`defer()`作用的最佳方式是通过以下示例。让我们从`Person`类开始，它有两个字段：`name`和`age`。\n\
    \n```java\nclass Person {\n    private String name;\n    private int age;\n\n\
    \    public void setAge(int age) {\n        this.age = age;\n    }\n\n    public\
    \ void setName(String name) {\n        this.name = name;\n    }\n\n    public\
    \ int getAge() {\n        return age;\n    }\n\n    public String getName() {\n\
    \        return name;\n    }\n}\n```\n\n现在创建一个`Person`实例，两个用于接收年龄和姓名值的 Observable，并设置年龄和姓名的值：\n\
    \n```java\n// 创建一个新的 Person 实例\nfinal Person person = new Person();\n\nObservable<String>\
    \ nameObservable =\n    Observable.just(person.getName());\nObservable<Integer>\
    \ ageObservable =\n    Observable.just(person.getAge());\n\n// 设置年龄和姓名\nperson.setName(\"\
    Bob\");\nperson.setAge(35);\n\nageObservable.subscribe(new Subscriber<Integer>()\
    \ {\n    @Override\n    public void onCompleted() {\n    }\n\n    @Override\n\
    \    public void onError(Throwable e) {\n    }\n\n    @Override\n    public void\
    \ onNext(Integer age) {\n        System.out.println(\"年龄是：\" + age);\n    }\n\
    });\n\nnameObservable.subscribe(new Subscriber<String>() {\n    @Override\n  \
    \  public void onCompleted() {\n    }\n\n    @Override\n    public void onError(Throwable\
    \ e) {\n    }\n\n    @Override\n    public void onNext(String name) {\n      \
    \  System.out.println(\"姓名是：\" + name);\n    }\n});\n```\n"
- fmt: "当你对`Person`实例调用`observeName()`和`observeAge()`方法时会发生什么？可观察对象（Observables）会发出什么序列？不幸的是，输出将是：\n\
    \n```\nage is: 0\nname is: null\n```\n\n这不是你想要的结果。问题在于`Observable.just()`在被调用时立即求值，因此它会使用创建可观察对象时`name`和`age`所引用的确切值来创建序列。在示例中，当创建可观察对象时，`age`为`0`，`name`为`null`。\n\
    \n你希望行为稍有不同：你希望在订阅可观察对象时才求值，这可以通过使用`Observable.defer()`来实现。`Observable.defer()`接受一个`Func0<Observable<T>>`类型的实例作为参数。`Func0<R>`是一个接口，它只暴露一个方法，该方法不接受参数并返回类型为`R`的值。还有一个`Func1<T,R>`接口，它只暴露一个方法，该方法接受一个类型为`T`的参数并返回类型为`R`的值。RxJava\
    \ 为最多九个参数提供了类似的接口（`Func9<T,R>`），以及一个可变参数版本（`FuncN<R>`）。\n\n```java\nObservable<String>\
    \ nameObservable =\n    Observable.defer(new Func0<Observable<String>>() {\n \
    \       @Override\n        public Observable<String> call() {\n            return\
    \ Observable.just(person.getName());\n        }\n    });\n\nObservable<Integer>\
    \ ageObservable =\n    Observable.defer(new Func0<Observable<Integer>>() {\n \
    \       @Override\n        public Observable<Integer> call() {\n            return\
    \ Observable.just(person.getAge());\n        }\n    });\n```\n\n通过使用这两个可观察对象，前面示例的输出变为：\n\
    \n```\nage is: 35\nname is: Bob\n```\n\n这正是你所期望的结果。\n\n## 组合与转换可观察对象\n\n可观察对象特别擅长被组合和转换。通过使用库中定义的一些操作符，你可以以一种需要少量编码的简单方式组合和转换数据序列，因此更不容易出错。\n\
    \n在接下来的章节中，我将使用称为弹珠图（marble diagrams）的特殊图表来高效地解释操作符的作用。\n\n### map\n\n`map`操作符是响应式编程中最常见的操作符之一。它允许你使用指定的函数转换发出的序列中的每一个元素。\n\
    \n在图 2-1 所示的示例中，输入序列是一系列整数（1、2 和 3），序列中的每个元素都乘以 10。将`map`操作符应用于一个可观察对象，将创建一个新的可观察对象；每当第一个可观察对象发出`x`时，这个新的可观察对象将发出`x*10`。\n\
    \n![图 2-1. map 操作符的弹珠图](media/image26.jpg)\n\n**图 2-1. map 操作符的弹珠图**\n\n```java\n\
    Observable.just(1, 2, 3)\n    .map(new Func1<Integer, Integer>() {\n        @Override\n\
    \        public Integer call(Integer x) {\n            return x * 10;\n      \
    \  }\n    })\n    .subscribe(new Subscriber<Integer>() {\n        @Override\n\
    \        public void onCompleted() {\n        }\n\n        @Override\n       \
    \ public void onError(Throwable e) {\n        }\n\n        @Override\n       \
    \ public void onNext(Integer integer) {\n            System.out.println(\"next\
    \ item is: \" + integer);\n        }\n    });\n```\n\n此操作的输出是：\n\n```\nnext item\
    \ is: 10\nnext item is: 20\nnext item is: 30\n```\n\n让我们尝试理解弹珠图：上方的线代表由原始可观察对象发出的原始元素序列。下方的线代表经过操作符转换并由第二个可观察对象发出的元素（请记住，第二个可观察对象是第一个可观察对象加上操作符的结果）。中间的方框包含操作符将对每个元素执行的函数。\n\
    \n这两条线必须被视为同步的时间线：弹珠的放置方式反映了随时间发生的事件。\n\n图 2-1 显示，当发出包含元素 1 的弹珠时，包含元素 10 的弹珠也会被发出，因此转换在元素\
    \ 1 发出后立即发生，在元素 2 发出之前。当元素 2 发出时，操作符被应用，元素 20 被发出，依此类推。\n\n### flatMap"
  raw: 'What happens when you call methods observeName() and observeAge() on an instance
    of Person ? What will be the sequence emitted by the observables? Unfortunately,
    the output will be


    age is: 0


    name is: null


    This is not what you wanted. The problem here is that Observable.just() is evaluated
    as soon as it''s invoked, so it will create a sequence using the exact value that
    name and age reference when the observable is created. In the example, when the
    observable is created, age is 0 and name is null.


    You''d like to have a little different behavior here: you want the values to be
    evaluted when you subscribe to the observables, and you can do this using Observable.defer()
    . Observable.defer() accepts an instance of Func0<Observable<T>> as parameter.
    Func0<R> is an interface that exposes just one method that accepts zero arguments
    and returns a value of type R . There is also a Func1<T,R> interface that exposes
    just one method that accepts one argument of type T and returns a value of type
    R . RxJava provides similar interfaces for up to nine arguments ( Func9<T,R> )
    and a varagrs version ( FuncN<R> ).


    CHAPTER 2 ■ OBSERVABLES AND OBSERVERS


    Observable<String> nameObservable =


    Observable.defer(new


    Func0<Observable<String>>() {


    @Override


    public Observable<String> call() {


    return Observable.just(person.getName());


    }


    });


    Observable<Integer> ageObservable =


    Observable.defer(new Func0<Observable<Integer>>() { @Override


    public Observable<Integer> call() {


    return Observable.just(person.getAge());


    }


    });


    By using these two observables, the output of the previous examples becomes age
    is: 35


    name is: Bob


    And that''s what you expected.


    Composing and Transforming Observables Observables are especially good at being
    composed and transformed. With the usage of some operators defined in the library,
    you can compose and transform sequences of data in a easy way that requires little
    coding, so it’s less prone to error.


    In the following sections I’ll use special diagrams called marble diagrams that
    efficiently explain what operators do.


    m a p


    The map operator is one of the most common operators in reactive programming.
    It lets you transform every item of the emitted sequence with a specified function.


    In the example shown in Figure  2-1 , the input sequence is a series of integers
    (1, 2, and 3), and every item of the sequence is multiplied by 10\. Applying the
    map operator to an observable, a new observable will be created; this new observable
    will emit x*10 every time the first observable emits x.


    CHAPTER 2 ■ OBSERVABLES AND OBSERVERS


    ![](media/image26.jpg)


    Figure 2-1\. A marble diagram of the map operator


    Observable.just(1, 2, 3)


    .map(new Func1<Integer, Integer>() {


    @Override


    public Integer call(Integer x) {


    return x * 10;


    }


    })


    .subscribe(new Subscriber<Integer>() {


    @Override


    public void onCompleted() {


    }


    @Override


    public void onError(Throwable e) {


    }


    @Override


    public void onNext(Integer integer) {


    System.out.println("next item is: " + integer);


    }


    });


    The output of this operation is


    next item is: 10


    next item is: 20


    next item is: 30


    Let’s try to understand the marble diagram: the line above represents the original
    sequence of items that are emitted by the original observable. The line below
    represents the items transformed by the operator and emitted by the second observable
    (remember that the second observable is the first one plus the operator). The
    box in the middle contains the function that the operator will perform on each
    item.


    CHAPTER 2 ■ OBSERVABLES AND OBSERVERS


    The two lines must be considered as synchronized timelines: the marbles are placed
    in a way that reflects what happens in time.


    Figure  2-1 shows that when the marble with item 1 is emitted, the marble with
    item 10 is also emitted, so the transformation occurs as soon as the item 1 is
    emitted, before item 2 is emitted. When item 2 is emitted, the operator is applied
    and item 20 is emitted, and so on.


