- fmt: "`RxView.clicks()`方法可用于实现点击监听：\n\n```\nRxView.clicks(myView)\n    .subscribe(click\
    \ -> doSomething());\n```\n\n`RxView.clicks()`返回一个热`Observable`（之所以是热的，是因为即使没有订阅者，点击事件也会被触发）。\n\
    \n你还可以对此`Observable`应用操作符。\n\n实现一种机制来避免视图上过于频繁的连续点击会很有用。这可以通过`throttleFirst`操作符实现（关于`throttleFirst`的定义，请参见第3章）：\n\
