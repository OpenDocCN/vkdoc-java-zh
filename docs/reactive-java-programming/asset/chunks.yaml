- fmt: "但等等，为什么你在这里使用`rx.Subscriber<T>`的实例？如果你查看RxJava文档，你会看到`Subscriber<T>`是一个实现了`rx.Observer<T>`接口的对象，因此将其用作`Observer`是合法的。你使用`Subscriber`而不是`Observer`接口的其他实现的原因是，`Subscriber`还实现了`Subscription`接口，这允许你检查订阅者是否已取消订阅（通过`isUnsubscribed()`方法）以及取消订阅（通过`unsubscribe()`方法）。\n\
    \n为简单起见，我将省略`rx.Subscriber<T>`、`Observer<T>`和`Observable<T>`的泛型语法，除非它影响文本和示例的可读性与理解。\n\
    \n从前面的示例中注意到，一个`Observer`对三种类型的事件做出反应：\n\n- **Observable`发射项目`**：这种情况发生零次、一次或多次。如果序列正确完成，`onNext`方法将被调用，次数等于序列中项目的数量。如果在某个点发生错误，`onNext`方法将不再被调用。\n\
    - **项目发射完成**：只有当序列中的所有项目都正确发射时，才会调用`onCompleted`方法。它只被调用一次，并且在最后一个项目发射之后。如果你处理的是无限序列，它也可能永远不会发生。\n\
    - **错误**：错误可能在序列的任何时刻发生，并且序列将立即停止。在这种情况下，将调用`onError`方法，并将错误作为`Throwable`对象传递。另外两个方法`onNext`和`onCompleted`将不会被调用。\n\
    \n一个`Observable`不能同时通知`onCompleted`和`onError`方法，只能通知其中一个。它总是最后一个被调用的方法。\n\n> **注意**：如果你使用最简短的写法\n\
    > ```\n> observable.subscribe(nextItem -> {\n>     // do something with nextItem\n\
    > });\n> ```\n> 当序列完成时你将不会收到通知。更重要的是，如果发生错误，RxJava会抛出一个异常，因为找不到`onError`的实现，你的应用将会崩溃！\n\
    \n通过`Observable.subscribe()`方法（一种称为订阅的操作），你可以将一个`Observable`连接到一个`Observer`，但如果你想断开它们呢？这个操作称为取消订阅，它看起来像这样：\n\
    \n```\npublic void subscribeToObservable(Observable<T> observable) {\n    Subscription\
    \ subscription =\n        observable.subscribe(new Subscriber() {\n          \
    \  @Override\n            public void onCompleted() {\n                // invoked\
    \ when Observable stops emitting items\n            }\n\n            @Override\n\
    \            public void onError(Throwable e) {\n                // invoked when\
    \ Observable throws an exception\n                // while emitting items\n  \
    \          }\n\n            @Override\n            public void onNext(T nextItem)\
    \ {\n                // invoked when Observable emits an item\n              \
    \  // usually you will consume the nextItem here\n            }\n        })\n\
    \    // disconnect observable and observer\n    subscription.unsubscribe()\n}\n\
    ```\n\n你可以通过以下方法检查订阅是否已被取消订阅（`Observer`和`Observable`不再连接）：\n\n```\nsubscription.isUnsubscribed()\n\
