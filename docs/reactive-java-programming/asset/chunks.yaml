    \n```java\nsubject.onNext(\"first item\");\nsubject.onNext(\"second item\");\n\
    subject.onNext(\"third item\");\nsubject.onCompleted();\n```\n\nAs you may expect,\
    \ if you run this code you get the following output:\n\n```\nfirst item\nsecond\
    \ item\nthird item\nsequence completed\n```\n\nNow let’s create a `Subject` that\
    \ acts both as `Observable` and as `Subscriber`:\n\n```java\nObservable<Long>\
    \ interval = Observable.interval(1, TimeUnit.SECONDS);\nSubject<Long, Long> subject\
    \ = PublishSubject.create();\ninterval.subscribe(subject);\n\nsubject.subscribe(new\
    \ Subscriber<Long>() {\n    @Override\n    public void onCompleted() {\n     \
    \   System.out.println(\"first sequence completed\");\n    }\n\n    @Override\n\
    \    public void onError(Throwable e) {\n    }\n\n    @Override\n    public void\
    \ onNext(Long item) {\n        System.out.println(\"first sequence, item: \" +\
    \ item);\n    }\n});\n\nsubject.subscribe(new Subscriber<Long>() {\n    @Override\n\
    \    public void onCompleted() {\n        System.out.println(\"second sequence\
    \ completed\");\n    }\n\n    @Override\n    public void onError(Throwable e)\
    \ {\n    }\n\n    @Override\n    public void onNext(Long item) {\n        System.out.println(\"\
    second sequence, item: \" + item);\n    }\n});\n```\n\nThe `Subject` here first\
    \ subscribes to the `interval` observable (which emits an incremental `long` value\
    \ every second), then reemits a `Long` object every time it receives an item from\
