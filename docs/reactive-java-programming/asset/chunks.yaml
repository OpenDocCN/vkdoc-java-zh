    Schedulers


    By default the chain of operations of an observable is executed in the same thread
    on which the subscribe method is called. You can change this behavior using two
    operators:


    • Observable.subscribeOn(...) lets you specify a scheduler on which the observable
    operates.


    • Observable.observeOn(...) lets you specify a scheduler on which the observers
    will be notified.


    This means you can use a thread for the executions of all the chains of operations
    and a different thread to receive the onNext() , onCompleted() , and onError()
    notifications. This is often used when your observable executes I/O operations
    (like network requests or reading/writing on disk):


    myNetworkObservable()


    .subscribeOn(<background thread>)


    .observeOn(<ui thread>)


    .subscribe(...)


    The two operators can be called from any point in the chain of operators, but
    their behavior is different:


    • subscribeOn() changes the thread on which the observable operates, regardless
    of where in the chain it is applied.


    • observeOn() changes the thread that Observable will use, starting from the point
    at which it is applied.


    Usually you don''t have to create or specify a thread directly; instead, you can
    choose among the schedulers that are built in the RxJava library:


    CHAPTER 3 ■ SUBSCRIPTION LIFECYCLE


    • Schedulers.immediate() schedules work to begin immediately in the current thread.


    • Schedulers.computation() can be used for computational work, and by default
    it allocates as many threads as the number of processors. It''s not meant for
    I/O operations.


    • Schedulers.io() is meant for I/O operations.


    • Schedulers.newThread() creates a new thread for each operation.


    • Schedulers.trampoline() keeps a queue of operations, and every operation begins
    on the current thread after all previous operations have finished.


    • Schedulers.from(java.util.concurrent.Executor) uses the specified Executor as
    Scheduler.


    You have implicitly used schedulers before: Observable.timer() operates with the
    Scheduler.computation() scheduler, which will operate on a different thread. There
    are some other operators that have a particular default scheduler: buffer , debounce
    , delay , delaySubscription , interval , repeat , replay , retry , sample , skip
    , skipLast , take , takeLast , takeLastBuffer , throttleFirst , throttleLast ,
    throttleWithTimeout , timeInterval , timeout , timer , timestamp , window .


