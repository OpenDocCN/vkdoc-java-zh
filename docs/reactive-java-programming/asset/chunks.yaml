- fmt: "# RxJava 在 Android 环境中的应用\n\n有一些库为在 Android 环境中应用 RxJava 概念提供了额外支持。基础库包括：\n\
    \n- `RxAndroid`\n- `RxBindings`\n- `RxLifecycle`\n\n## RxAndroid\n\n`RxAndroid`\
    \ 是你在 Android 中需要的第一个开源库。实际上，它提供了一个非常有用的 `Scheduler` 实例，该实例在主线程（或给定的 `looper`）上调度。要安装依赖，你只需将两个依赖声明添加到\
    \ `build.gradle` 文件中：\n\n```groovy\napply plugin: 'com.android.application'\n\n\
    android {\n    compileSdkVersion 24\n    buildToolsVersion \"24.0.1\"\n    defaultConfig\
    \ {\n        applicationId \"com.example\"\n        targetSdkVersion 24\n    \
    \    versionCode 1\n        versionName \"1.0\"\n    }\n    buildTypes {\n   \
    \     release {\n            minifyEnabled true\n            shrinkResources true\n\
    \            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'\n\
    \        }\n    }\n}\n\ndependencies {\n    compile 'com.android.support:appcompat-v7:24.1.1'\n\
    \    compile 'io.reactivex:rxjava:1.2.0'\n}\n```\n\n`RxJava` 要求 `minSdkVersion\
    \ 9`，但 `RxAndroid` 要求 `minSdkVersion 14`。请参考项目网站（https://github.com/ReactiveX/RxAndroid）了解最新版本的库。\n\
    \n如你所见，你可以使用提供的 `AndroidSchedulers.mainThread()` 作为 `observeOn()` 操作符的参数，使你的 `Subscriber`\
    \ 在 UI 线程上接收 `onCompleted()` / `onError()` / `onNext()` 事件通知：\n\n```java\nObservable.range(1,\
    \ 10)\n    .subscribeOn(Schedulers.newThread())\n    .observeOn(AndroidSchedulers.mainThread())\n\
    \    .subscribe(new Subscriber<Integer>() {\n        @Override\n        public\
    \ void onCompleted() {\n            // notified on UI thread\n        }\n\n  \
    \      @Override\n        public void onError(Throwable e) {\n            // notified\
    \ on UI thread\n        }\n\n        @Override\n        public void onNext(Integer\
    \ item) {\n            // notified on UI thread\n        }\n    });\n```\n\n你也可以在另一个线程上订阅；相应的\
    \ `Scheduler` 可以通过 `AndroidSchedulers.from()` 方法实例化：\n\n```java\nBackgroundThread\
    \ myThread = new myThread();\nmyThread.start();\n\nObservable.range(1, 10)\n \
    \   .subscribeOn(AndroidSchedulers.from(myThread.getLooper()))\n    .observeOn(AndroidSchedulers.mainThread())\n\
    \    .subscribe(new Subscriber<Integer>() {\n        @Override\n        public\
    \ void onCompleted() {\n            // notified on UI thread\n        }\n\n  \
    \      @Override\n        public void onError(Throwable e) {\n            // notified\
    \ on UI thread\n        }\n\n        @Override\n        public void onNext(Integer\
    \ item) {\n            // notified on UI thread\n        }\n    });\n```\n\n如果你想围绕\
    \ `Handler` 构建一个 `Scheduler`，请使用 `HandlerThreadScheduler`。\n\n## RxBindings\n\n\
    RxJava 也可以用于以响应式方式与 UI 组件交互，而不是使用监听器。\n\n例如，要在 `View` 被点击时收到通知，你必须实现一个 `OnClickListener()`：\n\
    \n```java\nmyView.setOnClickListener(new OnClickListener() {\n    @Override\n\
    \    public void onClick(final View v) {\n    }\n});\n```\n\n或者，如果你想监听 `EditText`\
    \ 中文本的变化，你必须使用 `EditText.addTextChangedListener(TextWatcher)` 方法添加一个 `TextWatcher`：\n\
    \n```java\neditText.addTextChangedListener(new TextWatcher() {\n    @Override\n\
    \    public void onTextChanged(CharSequence s, int start, int before, int count)\
    \ {\n    }\n\n    @Override\n    public void beforeTextChanged(CharSequence s,\
    \ int start, int count, int after) {\n    }\n\n    @Override\n    public void\
    \ afterTextChanged(Editable s) {\n    }\n});\n```\n\n`RxBinding`（https://github.com/JakeWharton/RxBinding）是一个开源库，它提供了一些方法来避免使用这种回调机制，而是应用响应式逻辑。\n\
    \n要将此库添加到你的 Android 项目中，请将依赖项添加到应用的 `build.gradle` 文件中：\n\n```groovy\napply plugin:\
    \ 'com.android.application'\n\nandroid {\n    compileSdkVersion 24\n    buildToolsVersion\
    \ \"24.0.1\"\n    defaultConfig {\n        applicationId \"com.example\"\n   \
    \     targetSdkVersion 24\n        versionCode 1\n        versionName \"1.0\"\n\
    \    }\n    buildTypes {\n        release {\n            minifyEnabled true\n\
    \            shrinkResources true\n            proguardFiles getDefaultProguardFile('proguard-android.txt'),\
    \ 'proguard-rules.pro'\n        }\n    }\n}\n\ndependencies {\n    compile 'com.android.support:appcompat-v7:24.1.1'\n\
    \    compile 'io.reactivex:rxjava:1.2.0'\n    compile 'io.reactivex:rxandroid:1.2.1'\n\
    }\n```"
  raw: 'There are some libraries that provide additional support for applying RxJava
    concepts in the Android environment. The fundamentals are


    • RxAndroid


    • RxBindings


    • RxLifecycle


    RxAndroid


    RxAndroid is the first open-source library for Android that you''ll need. In fact,
    it provides a very useful instance of Scheduler that schedules on the main thread
    (or a given looper). To install the dependency, you just need to add the two dependency
    declarations to


    your build.gradle file:


    apply plugin: ''com.android.application''


    android {


    compileSdkVersion 24


    buildToolsVersion "24.0.1"


    defaultConfig {


    applicationId "com.example"


    targetSdkVersion 24


    versionCode 1


    versionName "1.0"


    }


    © Andrea Maglie 2016 [95]


    A. Maglie, Reactive Java Programming , DOI 10.1007/978-1-4842-1428-2_6 CHAPTER
    6 ■ RXJAVA AND ANDROID


    buildTypes {


    release {


    minifyEnabled true


    shrinkResources true


    proguardFiles getDefaultProguardFile(''proguard-android.txt''),


    ''proguard-rules.pro''


    }


    }


    }


    dependencies {


    compile ''com.android.support:appcompat-v7:24.1.1'' compile ''io.reactivex:rxjava:1.2.0''


    }


    RxJava requires minSdkVersion 9 , but RxAndroid requires minSdkVersion 14 . Refer
    to the project web site ( https://github.com/ReactiveX/RxAndroid ) to know


    the latest version of the library.


    As you''ve already seen, you can use the provided AndroidSchedulers.mainThread()
    as a parameter to the observeOn() operator to make your Subscriber notified of
    the onCom pleted() / onError() / onNext() events on the UI thread:


    Observable.range(1, 10)


    .subscribeOn(Schedulers.newThread())


    .observeOn(AndroidSchedulers.mainThread())


    .subscribe(new Subscriber<Integer>() {


    @Override


    public void onCompleted() {


    // notified on UI thread


    }


    @Override


    public void onError(Throwable e) {


    // notified on UI thread


    }


    @Override


    public void onNext(Integer item) {


    // notified on UI thread


    }


    });


    You can also subscribe on another thread; the corresponding Scheduler can be instantiated
    with the AndroidSchedulers.from() method: BackgroundThread myThread = new myThread();


    myThread.start();


    CHAPTER 6 ■ RXJAVA AND ANDROID


    Observable.range(1, 10)


    .subscribeOn(AndroidSchedulers.from(myThread.getLooper()) .observeOn(AndroidSchedulers.mainThread())


    .subscribe(new Subscriber<Integer>() {


    @Override


    public void onCompleted() {


    // notified on UI thread


    }


    @Override


    public void onError(Throwable e) {


    // notified on UI thread


    }


    @Override


    public void onNext(Integer item) {


    // notified on UI thread


    }


    });


    If you want to build a Scheduler around your Handler, use HandlerThreadScheduler
    . RxBindings


    RxJava can also be used to interact with UI components in a reactive way, instead
    of using listeners.


    For example, to be notified when a View is clicked, you must implement an OnClickListener()
    :


    myView.setOnClickListener(new OnClickListener() { @Override


    public void onClick(final View v) {


    }


    });


    Or if you want to listen for changes to the text typed in an EditText , you must
    add a TextWatcher with the method EditText.addTextChangedListener(TextWatcher)
    : editText.addTextChangedListener(new TextWatcher() { @Override


    public void onTextChanged(CharSequence s, int start, int before, int count) {


    }


    CHAPTER 6 ■ RXJAVA AND ANDROID


    @Override


    public void beforeTextChanged(CharSequence s, int start, int count, int after)
    {


    }


    @Override


    public void afterTextChanged(Editable s) {


    }


    });


    RxBinding ( https://github.com/JakeWharton/RxBinding ) is an open source library
    that provides some methods to avoid using this callback mechanism, applying the
    reactive logic instead.


    To add this library to your Android project, add the dependency into your app’s
    build.gradle file:


    apply plugin: ''com.android.application''


    android {


    compileSdkVersion 24


    buildToolsVersion "24.0.1"


    defaultConfig {


    applicationId "com.example"


    targetSdkVersion 24


    versionCode 1


    versionName "1.0"


    }


    buildTypes {


    release {


    minifyEnabled true


    shrinkResources true


    proguardFiles getDefaultProguardFile(''proguard-android.txt''),


    ''proguard-rules.pro''


    }


    }


    }


    dependencies {


    compile ''com.android.support:appcompat-v7:24.1.1'' compile ''io.reactivex:rxjava:1.2.0''


    compile ''io.reactivex:rxandroid:1.2.1''


    }'
