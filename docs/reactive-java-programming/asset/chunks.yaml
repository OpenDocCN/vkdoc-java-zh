    \ This kind of observable begins emitting items when its `connect` method is called,\
    \ whether or not any observers have subscribed to it.\n\nLet’s go with a more\
    \ concrete, yet simple, example. Let’s create an `Observable` that emits all integers\
    \ from 1 to 5 and subscribe to it:\n\n```java\nObservable<Integer> observable\
    \ =\nObservable.from(new Integer[]{1, 2, 3, 4, 5});\nobservable.subscribe(new\
    \ Subscriber<Integer>() {\n    @Override\n    public void onCompleted() {\n  \
    \      System.out.println(\"Sequence completed!\");\n    }\n\n    @Override\n\
    \    public void onError(Throwable e) {\n        System.err.println(\"Exception:\
    \ \" + e.getMessage());\n    }\n\n    @Override\n    public void onNext(Integer\
    \ integer) {\n        System.out.println(\"next item is: \" + integer);\n    }\n\
    });\n```\n\nThe expected output is:\n\n```\nnext item is: 1\nnext item is: 2\n\
    next item is: 3\nnext item is: 4\nnext item is: 5\nSequence completed!\n```\n\n\
    Let’s go over the details. This is a cold observable because it will begin emitting\
    \ items only when the observer subscribes. The observable will generate a sequence\
    \ of five items, each one representing an integer object (from 1 to 5), so the\
    \ `onNext` method of the observer will be invoked five times. At the end of the\
    \ sequence, the method `onCompleted` will be notified. The method `onError` will\
    \ never be notified because this sequence does not generate any kind of error\
    \ or exception.\n\nAn example of a hot observable could be an observable that\
    \ emits an event every time a UI button is clicked. It does not start to emit\
    \ events when the observer subscribes; it emits events even if no `Subscriber`\
    \ is subscribed. I will talk about hot observables in the section dedicated to\
    \ Subjects.\n\nAs you may noticed, in this example, you created an observable\
