    \        public void onNext(MyResponseObject item) {\n            // here we can\
    \ update the UI reading item data\n        }\n    });\n```\n\nIn this example,\
    \ you applied:\n\n- The `subscribeOn()` operator because otherwise the UI (the\
    \ main thread in Android) will hang until the operation is complete (and an ANR\
    \ - Application Not Responding error will be shown by the operating system). The\
    \ `Schedulers.io()` scheduler is a good choice because you're dealing with a network\
    \ operation, which is an I/O operation.\n- The `observeOn()` operator because\
    \ you cannot update the UI from a thread that is different from the UI thread;\
    \ the `AndroidSchedulers.mainThread()` that you've used here is a special scheduler\
    \ that is not included in the RxJava library but is implemented in the RxAndroid\
    \ library (a sort of add-on to RxJava for Android development; see https://github.com/ReactiveX/RxAndroid)\
    \ which will return the UI thread. If you don't apply the `observeOn()` operator,\
    \ your app will crash when trying to change\n\n![](media/image89.jpg) ![](media/image88.jpg)\n\
    \nSuppose that you want to store some data in a database as soon as a user changes\
    \ the value of an input form, without having to wait for a click of a button and\
    \ without blocking the UI thread.\n\nGiven an observable that emits an item (the\
    \ content of the form field) whenever the input changes, you can use schedulers\
    \ to execute the insertion in a separate thread.\n\n```\nObservable<String> inputObservable\
    \ = ...\n\ninputObservable.flatMap(x -> validate(x))\n    .observeOn(Schedulers.io())\n\
    \    .subscribe(new Subscriber<String>() {\n        @Override\n        public\
