    @Override


    public void onNext(Long item) {


    textView.setText("Timeout!");


    }


    });


    }


    @Override


    protected void onDestroy() {


    super.onDestroy();


    if (subscription != null && !subscription.isUnsubscribed()) { subscription.unsubscribe();


    }


    }


    You can also create a CompositeSubscription object and add all subscriptions to
    it. Then you can unsubscribe all of them at once:


    CompositeSubscription compositeSubscription


    = new CompositeSubscription();


    @Override


    protected void onCreate(Bundle savedInstanceState) { super.onCreate(savedInstanceState);


    setContentView(R.layout.activity_layout)


    TextView textView = findViewById(R.id.text_view) subscription = Observable.timer(2,
    TimeUnit.MINUTES)


    .subscribeOn(Schedulers.newThread())


    .observeOn(AndroidSchedulers.mainThread())


    .subscribe(new Subscriber<Long>() {


    @Override


    public void onCompleted() {


    }


    @Override


    public void onError(Throwable e) {


    }


    CHAPTER 6 ■ RXJAVA AND ANDROID


    @Override


    public void onNext(Long item) {


    textView.setText("Timeout!");


    }


    });


    }


    @Override


    protected void onDestroy() {


    super.onDestroy();


    compositeSubscription.unsubscribe();


    }


    Note that once CompositeSubscription.unsubscribe() is called, the object becomes
    unusable, because it will automatically unsubscribe any other subscription that
    will be added.


    Trello made an open source library called RxLifecycle ( https://github.com/ trello/RxLifecycle
    ) that simplifies managing subscription/unsubscription in the Activity (or Fragment)
    life cycle.


    To include it into your project, add the dependency to your app’s build.gradle
    file: dependencies {


    compile ''com.android.support:appcompat-v7:24.1.1'' compile ''io.reactivex:rxjava:1.2.0''


    compile ''io.reactivex:rxandroid:1.2.1''


    compile ''com.jakewharton.rxbinding:rxbinding:0.4.0'' compile ''com.trello:rxlifecycle:0.7.0''


    With this library, you can use the compose() operator to specify when to unsubscribe
    from Observable:


    myObservable


    .compose(RxLifecycle.bindUntilEvent(lifecycle, ActivityEvent.DESTROY))


    .subscribe();


    Or you can let the library auto-detect when to unsubscribe: myObservable


    .compose(RxLifecycleAndroid.bindActivity(lifecycle)) .subscribe();


    In the latter case, the unsubscription is managed in the life cycle event opposed
    to the subscription (for example, if subscription occurs in the Activity''s onStart()
    method, the unsubscription will happen in onStop() ).


