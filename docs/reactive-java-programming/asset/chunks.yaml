    \ at http://reactivex.io/languages.html .)\n\n`RxJava` is a library that implements\
    \ the concepts of `ReactiveX` in Java. As you will see in following chapters,\
    \ you can rewrite the imperative code that filters even numbers using `RxJava`:\n\
    \n```\nList<Integer> input = Arrays.asList(1, 2, 3, 4, 5);\nObservable.from(input)\n\
    \  .filter(new Func1() {\n    @Override\n    public Boolean call(Integer x) {\n\
    \      return x % 2 == 0;\n    }\n  })\n```\n\nOr, using a lambda expression:\n\
    \n```\nObservable.from(input)\n  .filter(x -> x % 2 == 0);\n```\n\nThe resulting\
    \ object (the instance of `rx.Observable`) will generate a sequence of the even\
    \ numbers contained in the input sequence: 2 and 4.\n\nIn `RxJava`, `rx.Observable`\
    \ adds two semantics to the Gang of Four's Observer pattern (the default semantic\
    \ is to emit created items, like a list with items 2,4 in the example above):\n\
    \n• The producer can notify the consumer that there is no more data available.\n\
    \n• The producer can notify the consumer that an error has occurred.\n\n**Note**\
    \ The `RxJava` library provides a programming model where we can work with events\
    \ generated from UI or asynchronous calls in the same way in which we operate\
    \ with collections and streams in Java 8.\n\n## CHAPTER 1 ■ REACTIVEX AND RXJAVA\n\
    \nThe `RxJava` library was created at Netflix as a smarter alternative to Java\
    \ Futures and callbacks. Both Futures and callbacks are straightforward to use\
    \ when there's just one level of asynchronous execution, but they are hard to\
    \ manage when they're nested.\n\nThe following example shows how the nested callbacks\
    \ problem is handled in `RxJava`.\n\n![](media/image17.jpg)\n\nSuppose that you\
