    \n## 引言\n\n使用`Observable`不仅仅是订阅和接收项目。在前面的章节中，你看到序列也可以以错误事件终止，但是你能做什么来处理错误事件呢？线程呢？一个`Observable`能否在不同的线程上操作和通知？\n\
