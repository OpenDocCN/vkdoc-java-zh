    \ = PublishSubject.create();\n\n    @Override\n    public boolean add(T item)\
    \ {\n        boolean result = super.add(item);\n        if (result) {\n      \
    \      addSubject.onNext(item);\n        }\n        return result;\n    }\n\n\
    \    @Override\n    public void add(int index, T item) {\n        super.add(index,\
    \ item);\n        addSubject.onNext(item);\n    }\n\n    @Override\n    public\
