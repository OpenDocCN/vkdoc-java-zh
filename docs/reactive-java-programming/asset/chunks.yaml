    \ is: 10\n\nnext item is: 20\n\nnext item is: 30\n\n让我们尝试理解弹珠图：上方的线条代表原始可观察对象发射的原始数据项序列。下方的线条代表经过操作符转换并由第二个可观察对象发射的数据项（请记住，第二个可观察对象是第一个可观察对象加上操作符的结果）。中间的方框包含了操作符将对每个数据项执行的函数。\n\
    \n第 2 章 ■ 可观察对象与观察者\n\n这两条线必须被视为同步的时间线：弹珠的放置方式反映了随时间发生的事件。\n\n图 2-1 显示，当包含数据项\
    \ 1 的弹珠被发射时，包含数据项 10 的弹珠也会被发射，因此转换发生在数据项 1 被发射之后、数据项 2 被发射之前。当数据项 2 被发射时，操作符被应用，数据项\
    \ 20 被发射，以此类推。\n\n**flatMap**\n"
