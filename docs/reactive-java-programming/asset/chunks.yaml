    • groupBy : Divides an Observable into a set of observables that each emit a different
    group of items from the original Observable, organized by key.


    • window : Periodically subdivides items from an Observable into Observable windows
    and emits these windows rather than emitting the items one at a time.


    Operators for Filtering Observables


    • debounce : Only emits an item from an Observable if a particular


    timespan has passed without it emitting another item.


    CHAPTER 2 ■ OBSERVABLES AND OBSERVERS


    • elementAt : Emits only item n emitted by an Observable. • ignoreElements : Does
    not emit any items from an Observable


    but mirrors its termination notification.


    • sample : Emits the most recent item emitted by an Observable within periodic
    time intervals.


    • skip : Suppresses the first n items emitted by an Observable. • skipLast : Suppresses
    the last n items emitted by an Observable. • takeLast : Emits only the last n
    items emitted by an Observable.


    Operators for Combining Observables


    • And/Then/When : Combines sets of items emitted by two or more


    observables by means of pattern and plan intermediaries; these operators are not
    part of the RxJava library but can be found in the RxJavaJoins library. ( https://github.com/ReactiveX/
    RxJavaJoins )


    • combineLatest : When an item is emitted by either of two Observables, it combines
    the latest item emitted by each


    Observable via a specified function and emits items based on the results of this
    function.


    • join : Combines items emitted by two Observables whenever an item from one Observable
    is emitted during a time window defined according to an item emitted by the other
    Observable.


    • merge : Combines multiple Observables into one by merging their emissions.


    • switchOnNext : Converts an Observable that emits Observables into a single Observable
    that emits the items emitted by the most-recently-emitted of those Observables.


