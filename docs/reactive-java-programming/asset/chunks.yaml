- fmt: "The first subscriber subscribes before `PublishSubject` starts to emit items,\
    \ so it will receive all five items and then complete. The second subscriber subscribes\
    \ in the middle of the sequence, so it will receive only the subsequent items.\n\
    \n## Chapter 4 ■ Subjects\n\nAre Subjects hot or cold observables? This example\
    \ makes it easy to answer the question: Subjects are hot observables because they\
    \ can produce items when no Observer is subscribed.\n\nAnother interesting point\
    \ is the usage of the `Subject.asObservable()` method. Subscribing to `subject`\
    \ instead of `subjectAsObservable` will produce the same output, but the method\
    \ `Subject.asObservable()` helps you by wrapping your `Subject` instance in an\
    \ `Observable` instance. This means you can expose only the `Observable` interface\
    \ to the subscribers and it also means that no one else can use the `Subject`\
    \ instance to emit items or notify completed/error events.\n\n### BehaviorSubject\n\
    \n`BehaviorSubject<T>` (Figure 4-2) is similar to `PublishSubject`, except that\
    \ the subscriber will also receive the last item emitted before its subscription.\n\
    \n![](media/image101.jpg)\n\n**Figure 4-2.** The marble diagram for `BehaviorSubject<T>`\n\
    \nLet’s take the previous example and change the `PublishSubject` instance to\
    \ a `BehaviorSubject` instance:\n\n```\nBehaviorSubject<Integer> subject = BehaviorSubject.create();\n\
    Observable<Integer> subjectAsObservable = subject.asObservable();\n```\n\n####\
    \ Chapter 4 ■ Subjects\n\n```\n// subscribe the first Subscriber\nsubjectAsObservable.subscribe(new\
    \ Subscriber<Integer>() {\n    @Override\n    public void onCompleted() {\n  \
    \      System.out.println(\"first: sequence completed\");\n    }\n\n    @Override\n\
    \    public void onError(Throwable e) {\n    }\n\n    @Override\n    public void\
    \ onNext(Integer item) {\n        System.out.println(\"first: next item is \"\
    \ + item);\n    }\n});\n\nsubject.onNext(1);\nsubject.onNext(2);\n\n// subscribe\
    \ the second Subscriber\nsubjectAsObservable.subscribe(new Subscriber<Integer>()\
    \ {\n    @Override\n    public void onCompleted() {\n        System.out.println(\"\
    second: sequence completed\");\n    }\n\n    @Override\n    public void onError(Throwable\
    \ e) {\n    }\n\n    @Override\n    public void onNext(Integer item) {\n     \
    \   System.out.println(\"second: next item is \" + item);\n    }\n});\n\nsubject.onNext(3);\n\
    subject.onNext(4);\nsubject.onNext(5);\nsubject.onCompleted();\n```\n\n#### Chapter\
    \ 4 ■ Subjects\n\nThis code produces the following output:\n\n```\nfirst: next\
    \ item is 1\nfirst: next item is 2\nsecond: next item is 2\nfirst: next item is\
    \ 3\nsecond: next item is 3\nfirst: next item is 4\nsecond: next item is 4\nfirst:\
    \ next item is 5\nsecond: next item is 5\nfirst: sequence completed\nsecond: sequence\
    \ completed\n```\n\nHere the second subscriber receives the sequence starting\
    \ from item 2, and it subscribes after the emission of item 2.\n\nRxJava also\
    \ provides the static factory method `BehaviorSubject.create(T defaultValue)`;\
    \ the instance returned by this method will emit the provided default item as\
    \ long as no item has been received from the source observable.\n\n```\nBehaviorSubject<Integer>\
    \ subject = BehaviorSubject.create(-1);\nObservable<Integer> subjectAsObservable\
    \ = subject.asObservable();\n\n// subscribe the first Subscriber\nsubjectAsObservable.subscribe(new\
    \ Subscriber<Integer>() {\n    @Override\n    public void onCompleted() {\n  \
    \      System.out.println(\"first: sequence completed\");\n    }\n\n    @Override\n\
    \    public void onError(Throwable e) {\n    }\n\n    @Override\n    public void\
    \ onNext(Integer item) {\n        System.out.println(\"first: next item is \"\
    \ + item);\n    }\n});\n\nsubject.onNext(1);\nsubject.onNext(2);\n```\n\n####\
    \ Chapter 4 ■ Subjects\n\n```\n// subscribe the second Subscriber\nsubjectAsObservable.subscribe(new\
    \ Subscriber<Integer>() {\n    @Override\n    public void onCompleted() {\n  \
    \      System.out.println(\"second: sequence completed\");\n    }\n\n    @Override\n\
    \    public void onError(Throwable e) {\n    }\n\n    @Override\n    public void\
    \ onNext(Integer item) {\n        System.out.println(\"second: next item is \"\
    \ + item);\n    }\n});\n\nsubject.onNext(3);\nsubject.onNext(4);\nsubject.onNext(5);\n\
    subject.onCompleted();\n```\n\nThe output is:\n\n```\nfirst: next item is -1\n\
