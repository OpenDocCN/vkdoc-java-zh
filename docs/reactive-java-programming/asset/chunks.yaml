    will see in following chapters, you can rewrite the imperative code that filters
    even numbers using RxJava:


    List<Integer> input = Arrays.asList(1, 2, 3, 4, 5); Observable.from(input)


    .filter(new Func1() {


    @Override


    public Boolean call(Integer x) {


    return x % 2 == 0;


    }


    })


    Or, using a lambda expression:


    Observable.from(input)


    .filter(x -> x % 2 == 0);


    The resulting object (the instance of rx.Observable ) will generate a sequence
    of the even numbers contained in the input sequence: 2 and 4\.


    In RxJava, rx.Observable adds two semantics to the Gang of Four''s Observer pattern
    (the default semantic is to emit created items, like a list with items 2,4 in
    the example above):


    • The producer can notify the consumer that there is no more data available.


    • The producer can notify the consumer that an error has occurred. ■ Note The
    RxJava library provides a programming model where we can work with events generated
    from UI or asynchronous calls in the same way in which we operate with collections
    and streams in Java 8\.


    CHAPTER 1 ■ REACTIVEX AND RXJAVA


    The RxJava library was created at Netflix as a smarter alternative to Java Futures
    and callbacks. Both Futures and callbacks are straightforward to use when there''s
    just one level of asynchronous execution, but they are hard to manage when they''re
    nested.


    The following example shows how the nested callbacks problem is handled in RxJava.


    ![](media/image17.jpg)


    Suppose that you need to call a remote API to authenticate a user, then another
    one to get the user’s data, and another API to get a user’s contacts. Typically,
    you would have to write nested API calls like this:


    User user = null;


    serviceEndpoint.login(username, password, new Callback<AccessToken>() { @Override


    public void success(User user, Response response) { // store accessToken somewhere


    serviceEndpoint.getUser(new Callback<User>() { @Override


    public void success(User userResponse, Response response) { user = userResponse;


    serviceEndpoint.getUserContact(user.getId(), new


    Callback<Contact>() {


    @Override


    public Contact success(Contact contact, Response response) {


    user.setContact(contact);


    }


    @Override


    public void failure(RetrofitError error) {


    // handle error here...


    }


    });


    }


    @Override


    public void failure(RetrofitError error) {


    // handle error here...


    }


    });


    CHAPTER 1 ■ REACTIVEX AND RXJAVA


    }


    @Override


    public void failure(RetrofitError error) {


    // handle error here...


    }


    });


    With RxJava, the nested callbacks are replaced with more efficient, readable,
    and maintainable composed functions:


    serviceEndpoint.login()


    .doOnNext(accessToken -> storeCredentials(accessToken))


    .flatMap(accessToken -> serviceEndpoint.getUser())


    .flatMap(user -> serviceEndpoint.getUserContact(user.getId()))


    As you can see, this piece of code has all the properties of functional programming,
    with the addition of the reactive component (functions are executed as a reaction
    to


    ![](media/image18.jpg) ![](media/image19.jpg)


    Introduction


    In this chapter, you’ll dive into the RxJava library. First, you’ll learn how
    to include RxJava in your Java project. Then, you will learn


    • About the building blocks of RxJava ( rx.Observable<T> , rx. Observer<T> , rx.Subscriber<T>
    )


    • The type of events that can be emitted by rx.Observable<T> and received by rx.Observer<T>


    • The operators that can be applied to observables


