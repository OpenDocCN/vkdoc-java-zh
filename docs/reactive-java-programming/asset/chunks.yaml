    \ an `Observable` out of an array, an iterable, or a `Future`.\n\nThis is not\
    \ the only way to create observables.\n\n## Creating Observables\n\nThe easiest\
    \ way to create an observable is to use the factory methods that are implemented\
    \ in the RxJava library. You’ve already seen how to create an `Observable` using\
    \ the `Observable.from()` method, so let’s take a look at the other available\
    \ methods.\n\n### `Observable.just()`\n\n`Observable.just()` creates an `Observable`\
    \ that emits the object or the objects that are passed in as parameters:\n\n```java\n\
    Observable.just(\"an item\")\nObservable.just(\"first item\", \"second item\"\
    )\nObservable.just(1, 2, 3)\n```\n\nWith this operator you can rewrite your previous\
    \ example as:\n\n```java\nObservable<Integer> observable =\nObservable.just(1,\
    \ 2, 3, 4, 5);\nobservable.subscribe(new Subscriber<Integer>() {\n    @Override\n\
    \    public void onCompleted() {\n        System.out.println(\"Sequence completed!\"\
    );\n    }\n\n    @Override\n    public void onError(Throwable e) {\n        System.err.println(\"\
    Exception: \" + e.getMessage());\n    }\n\n    @Override\n    public void onNext(Integer\
    \ integer) {\n        System.out.println(\"next item is: \" + integer);\n    }\n\
    });\n```\n\nThe output will be the same:\n\n```\nnext item is: 1\nnext item is:\
    \ 2\nnext item is: 3\nnext item is: 4\nnext item is: 5\nSequence completed!\n\
    ```\n\n### `Observable.range()`\n\n`Observable.range(a, n)` creates an `Observable`\
    \ that emits a range of `n` consecutive integers starting from `a`.\n\n`Observable.just(1,\
    \ 2, 3, 4, 5)` and `Observable.range(1, 5)` will emit the same sequence.\n\n###\
    \ `Observable.interval()`\n\nThe previous methods created observables that emit\
    \ items in sequence, one after another, with no delay between items.\n\nBut what\
    \ if you want your items to be emitted with some time interval?\n\n`Observable.interval(long,\
    \ TimeUnit)` does exactly this: it creates an `Observable` that emits a sequence\
