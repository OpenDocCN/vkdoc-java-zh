    Backpressure


    Until now we have considered only situations in which the emission of items is
    slower than the operations executed on each of the items. So, for every emission,
    there''s enough time for the subscriber to consume the emitted item before the
    next one is emitted.


    There are also situations in which the observable emits items too fast for the
    subscriber, and the subscriber cannot continue the single item before receiving
    the next one.


    For example, take two observables, A and B, where A emits items twice as fast
    as B and creates an Observable.zip of A and B. The resulting observable combines
    the n-th item from A and n-th item from B, but meanwhile B has also emitted items
    n+1 to n+m, so it should keep an always increasing buffer of the emitted items.


    Another typical case is when inside the onNext method the UI is updated with data
    from the emitted item, but items are emitted at a frequency higher than the frequency
    with which the UI is updated.


    Backpressure happens every time we face such situations. We can handle backpressure
    in the following ways:


    • By controlling the emission, applying some specific operator to the observable


    • At consumption time in the subscriber


    Handling Backpressure During Emission: Throttling You can use some RxJava operators
    to adjust the rate at which the Observable emits items.


