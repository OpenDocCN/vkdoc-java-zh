    CHAPTER 1 ■ REACTIVEX AND RXJAVA


    In reactive programming, the value of x should updated whenever the values of
    y or z change.


    So, if the initial values are y = 1 and z = 1 , you’ll have


    x = y + z = 2 .


    If y (or z ) changes its value, this does not mean that x changes automatically,
    but you must implement a mechanism to update the values of x when values of y
    and z are changed.


    Functional reactive programming is a new programming paradigm; it was made popular
    by Erik Meijer (who created the Rx library for .NET when working at Microsoft)
    and it’s based on two concepts:


    • Code “reacts” to events.


    • Code handles values as they vary in time, propagating changes to every part
    of the code that uses those values.


    Streams of Data


    The key to understand reactive programming is to think about it as operating on
    a stream of data.


    But what do I mean by “stream of data?” I mean a sequence of events, where an
    event could be user input (like a tap on a button), a response from an API request
    (like a Facebook feed), data contained in a collection, or even a single variable.


    In reactive programming, there''s often a component that acts as the source, emitting
    a sequence of items (or a stream of data), and some other components that observe
    this flow of items and react to each emitted item (they “react” to item emission).
    The Observer Pattern


    The Observer pattern is a design pattern in which there are two kinds of objects:
    observers and subjects. An observer is an object that observes the changes of
    one or more subjects; a subject is an object that keeps a list of its observers
    and automatically notifies them when it changes its state.


    The definition of the Observer pattern from the “Gang of Four” book ( Design Patterns:
    Elements of Reusable Object-Oriented Software by Erich Gamma, Richard Helm, Ralph
    Johnson, and John Vlissides, ISBN 0-201-63361-2) is to


    “ Define a one-to-many dependency between objects so that when one object changes
    state, all its dependents are notified and updated automatically. ”


    This pattern is the core of reactive programming. It fits perfectly the concept
    of reactive programming by providing the structures to implement the produce/react
    mechanism.


    CHAPTER 1 ■ REACTIVEX AND RXJAVA


    Java SDK implements the Observer pattern with the class java.util.Observable and
    the interface java.util.Observer .


    class Subject extends java.util.Observable {


    public void doWorkAndNotify() {


    Object result = doWork();


    notifyObservers(result);


    }


    }


    class MyObserver implements Observer {


    @Override


    public void update(Observable obs, Object item) { doSomethingWith(item)


    }


    }


    T h e Subject class extends java.utils.Observable and is responsible for producing
    an object and notifying the observers as soon as the item has been produced.


    MyObserver implements Observer and is responsible for observing Subject and consuming
    every item that Subject produces.


    Putting Subject and MyObserver together,


    MyObserver myObserver = new MyObserver();


    Subject subject = new Subject();


    subject.addObserver(myObserver);


    subject.doWorkAndNotify();


    Unfortunately, this implementation reveals itself to be too simple when you start
    to write more complex logic.


    You’ll never use this implementation; instead you’ll use the built-in RxJava implementation.


