    Introduction


    Working with observables is not only about subscribing and receiving items. In
    previous chapters, you saw that sequences can also terminate with an error


    event, but what can you do to handle an error event? And what about threads? Can
    an Observable operate and notify on different threads?


    In this chapter, you''ll learn


    • The tools that RxJava provides to manage error events


    • How to use schedulers to operate on different threads


    • How to deal with backpressure


    Error Handling


    As mentioned, an observable''s emission can end with either a completed event
    or error event, but not both.


    If an error occurs at any time during the emission, the sequence is stopped and
    the onError() method is called.


    But what do we mean by "error?"


    • An error is any exception than is thrown during the emission of the sequence.


    • It can be thrown by the source observable or by any operator applied to the
    source observable.


    • The first exception that is thrown causes the sequence to be stopped, so no
    other exception can be thrown.


    • The exception is propagated from the observable that throws it to the subscribers,
    so the other operators are skipped.


    • Operators don’t have to handle the exception; it''s all left up to the subscriber
    (as opposed to the callback mechanism, where you have to handle errors in each
    callback).


    © Andrea Maglie 2016 [41]


    A. Maglie, Reactive Java Programming , DOI 10.1007/978-1-4842-1428-2_3 CHAPTER
    3 ■ SUBSCRIPTION LIFECYCLE


    The observable itself does not throw the exception; it only notifies the subscriber
    calling the onError() method. If the observable fails calling the onError() method
    (i.e. an exception is thrown when calling onError() ), the onError() method won''t
    be called anymore and another exception will be thrown.


    There are some exceptions that are not handled as error events but they are thrown,
    causing JVM to stop:


    • rx.exceptions.OnErrorNotImplementedException


    • rx.exceptions.OnErrorFailedException


    • rx.exceptions.OnCompletedFailedException


    • java.lang.StackOverflowError


    • java.lang.VirtualMachineError


    • java.lang.ThreadDeath


    • java.lang.LinkageError


    Typically, in Java code, you catch exceptions using the try/catch block. With
    observables, there''s no try/catch block, but you can choose between different
    techniques to recover from errors.


    Handling Errors in the onError() Method The most common scenario is to handle
    errors in the onError() method. The subscriber''s onError() method is responsible
    for handling the error state.


    In the following example, you generate a sequence of strings in which every string
    should represent an integer, and then you deliberately introduce an invalid string
    in the middle of the sequence.'
