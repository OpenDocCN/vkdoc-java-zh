  trans: "\n处理发射过程中的背压：缓冲  \n控制背压的另一种方法是在通知订阅者之前将项目收集到缓冲区中。订阅者的 `onNext()` 方法将不会接收到单个发射的项目，而是接收到一个包含缓冲区中收集的项目的集合。\n\
    \n要应用此技术，你可以使用 `buffer()` 和 `window()` 操作符。  \n**Buffer**\n\n`Observable.buffer()`\
    \ 允许你按指定的时间间隔定期收集项目。你可以选择基于项目数量或时间间隔来创建缓冲区，  \n也可以通过传递一个函数来计算关闭每个缓冲区所需的条件（图 3-4）。你还可以指定一个触发缓冲区开始的\
    \ Observable。\n\n![](img/image94.jpg)\n\n图 3-4\\. `Observable.buffer()` 的弹珠图\n\
    \n**Window**\n\n`Observable.window()` 与 `buffer` 类似，但它不是从源 Observable 发射项目集合，而是发射多个\
    \ Observable，每个 Observable 发射源 Observable 的一个子集项目，然后以 `onCompleted` 通知终止。\n\n\
    你可以选择基于时间间隔（图 3-5）、项目数量（图 3-6）来创建“窗口”，  \n或者通过传递一个函数来计算关闭每个窗口所需的条件。\n\n第 3 章 ■\
    \ 订阅生命周期\n\n![](img/image98.jpg)\n\n图 3-5\\. 基于时间间隔的 `Observable.window()` 弹珠图\n\
    \n![](img/image97.jpg)\n\n图 3-6\\. 基于项目数量的 `Observable.window()` 弹珠图\n\n■ 注意 如果发生错误，两个操作符都会通知\
    \ `onError` 方法并停止构建当前缓冲区或窗口。未完成的缓冲区/窗口中的项目将不会转发给订阅者。\n\n第 3 章 ■ 订阅生命周期\n\n**在订阅者内部处理背压**\
    \  \n在订阅者内部，你可以要求 Observable 减慢发射速度。因此，在上面的 zip 示例中，你可以要求 B 缓慢发射项目，而不是应用节流操作符。\n\
    \n在订阅者的 `onStart()` 方法中，你必须调用 `Subscriber.request(n)` 方法，其中 `n` 是一个整数，表示在下一次调用\
    \ `request()` 之前你希望 Observable 发射的最大项目数。然后，在 `onNext()` 方法中消费项目后，你必须再次调用 `request()`\
    \ 来告诉 Observable 继续发射接下来的 `n` 个项目。\n\n在以下示例中，你设置 `n = 1`，这样你可以在下一个项目发射之前消费每个项目：\n\
    \n```java\nmyObservable.subscribe(new Subscriber<T>() {\n\n    @Override\n   \
    \ public void onStart() {\n        request(1);\n    }\n\n    @Override\n    public\
    \ void onCompleted() {\n    }\n\n    @Override\n    public void onError(Throwable\
    \ e) {\n    }\n\n    @Override\n    public void onNext(T item) {\n        consume(item);\n\
    \        request(1);\n    }\n});\n```\n\n这里你在 `onStart()` 和 `onNext()` 中调用了 `request()`\
    \ 方法，参数均为 1，因为你假设在下一个项目发射之前只能消费一个项目，但这些值是独立的，可以根据用例进行调整。\n\n如果你省略了 `request()`\
    \ 调用，Observable 会像往常一样发射项目，不会减慢发射速度；调用 `request(0)` 可以达到相同的效果。\n\n![](img/image99.jpg)\n\
    \n在前面的章节中，你学习了 `Observable<T>`、`Observer<T>` 和 `Subscriber<T>`，以及它们在 RxJava 响应式编程中的作用：Observable\
    \ 对象发射一系列事件，Subscriber 对象作为观察者，对 Observable 发射的每个事件做出反应。\n\nRxJava 库提供了一个同时充当\
    \ Observable 和 Observer 的代理：它被称为 `Subject<T,R>`，其中 `T` 是输入值的类型，`R` 是输出值的类型。\n\n\
    一个 Subject 可以：\n\n• 订阅一个或多个 Observable（作为 Subscriber）  \n• 通过重新发射来传递它观察到的项目  \n\
    • 发射新项目\n\nSubject 不依赖调度器，而是假设所有序列化和语法正确性都由 Subject 的调用者处理。\n\n让我们看看 Subject 如何充当\
    \ Observable（`PublishSubject` 将在后面介绍）：\n"
