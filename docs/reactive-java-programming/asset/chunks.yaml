    In the previous example, you didn''t specify any Scheduler, so the code is executed
    using the default Scheduler.


    Suppose that you''re working on an application with a UI and that the network
    operation is kicked off by clicking on a button. You don''t want the UI to be
    blocked waiting for the response, so you need to execute all the networking stuff
    on a separate thread. This can be done by applying the subscribeOn() operator.
    A network operation is an I/O operation, so the right scheduler to apply is Schedulers.io()
    .


