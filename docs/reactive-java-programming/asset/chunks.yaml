    \ if you have a long chain of operators, you don't want your\n\n![](media/image87.jpg)\
    \ ![](media/image86.jpg)\n\nA typical use case in which you have to specify both\
    \ the `subscribeOn()` and `observeOn()` operators is when you’re developing an\
    \ Android app and you have to update the UI after getting data from a remote server.\n\
    \n```\nObservable<MyResponseObject> networkCall = ...\n\nnetworkCall.subscribeOn(Schedulers.io())\n\
    \    .observeOn(AndroidSchedulers.mainThread())\n    .subscribe(new Subscriber<MyResponseObject>()\
