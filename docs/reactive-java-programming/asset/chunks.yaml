    \ variable `x` at the same time that the function is called; later, variables\
    \ `y` and `z` can change, but these changes will not automatically influence the\
    \ value of `x`.\n\nIn reactive programming, the value of `x` should be updated\
    \ whenever the values of `y` or `z` change.\n\nSo, if the initial values are `y\
    \ = 1` and `z = 1`, you'll have `x = y + z = 2`.\n\nIf `y` (or `z`) changes its\
    \ value, this does not mean that `x` changes automatically, but you must implement\
    \ a mechanism to update the values of `x` when values of `y` and `z` are changed.\n\
    \nFunctional reactive programming is a new programming paradigm; it was made popular\
    \ by Erik Meijer (who created the Rx library for .NET when working at Microsoft)\
    \ and it's based on two concepts:\n\n- Code \"reacts\" to events.\n- Code handles\
    \ values as they vary in time, propagating changes to every part of the code that\
    \ uses those values.\n\n## Streams of Data\n\nThe key to understand reactive programming\
    \ is to think about it as operating on a stream of data.\n\nBut what do I mean\
    \ by \"stream of data?\" I mean a sequence of events, where an event could be\
    \ user input (like a tap on a button), a response from an API request (like a\
    \ Facebook feed), data contained in a collection, or even a single variable.\n\
    \nIn reactive programming, there's often a component that acts as the source,\
    \ emitting a sequence of items (or a stream of data), and some other components\
    \ that observe this flow of items and react to each emitted item (they \"react\"\
    \ to item emission).\n\n## The Observer Pattern\n\nThe Observer pattern is a design\
    \ pattern in which there are two kinds of objects: observers and subjects. An\
    \ observer is an object that observes the changes of one or more subjects; a subject\
    \ is an object that keeps a list of its observers and automatically notifies them\
    \ when it changes its state.\n\nThe definition of the Observer pattern from the\
    \ \"Gang of Four\" book (*Design Patterns: Elements of Reusable Object-Oriented\
    \ Software* by Erich Gamma, Richard Helm, Ralph Johnson, and John Vlissides, ISBN\
    \ 0-201-63361-2) is to:\n\n> \"Define a one-to-many dependency between objects\
    \ so that when one object changes state, all its dependents are notified and updated\
    \ automatically.\"\n\nThis pattern is the core of reactive programming. It fits\
    \ perfectly the concept of reactive programming by providing the structures to\
    \ implement the produce/react mechanism.\n\nJava SDK implements the Observer pattern\
    \ with the class `java.util.Observable` and the interface `java.util.Observer`.\n\
    \n```java\nclass Subject extends java.util.Observable {\n    public void doWorkAndNotify()\
    \ {\n        Object result = doWork();\n        notifyObservers(result);\n   \
    \ }\n}\n\nclass MyObserver implements Observer {\n    @Override\n    public void\
    \ update(Observable obs, Object item) {\n        doSomethingWith(item);\n    }\n\
    }\n```\n\nThe `Subject` class extends `java.utils.Observable` and is responsible\
    \ for producing an object and notifying the observers as soon as the item has\
    \ been produced.\n\n`MyObserver` implements `Observer` and is responsible for\
    \ observing `Subject` and consuming every item that `Subject` produces.\n\nPutting\
    \ `Subject` and `MyObserver` together:\n\n```java\nMyObserver myObserver = new\
    \ MyObserver();\nSubject subject = new Subject();\nsubject.addObserver(myObserver);\n\
    subject.doWorkAndNotify();\n```\n\nUnfortunately, this implementation reveals\
    \ itself to be too simple when you start to write more complex logic.\n\nYou'll\
    \ never use this implementation; instead you'll use the built-in RxJava implementation.\n\
    \n## What's ReactiveX?\n\nFrom `http://reactivex.io/` comes the following definition:\
    \ ReactiveX is a combination of the best ideas from the Observer pattern, the\
    \ Iterator pattern, and functional programming.\n\nIt's a library that implements\
    \ functional reactive programming in many languages. It uses \"observables\" to\
    \ represent asynchronous data streams, and it abstracts all details related to\
