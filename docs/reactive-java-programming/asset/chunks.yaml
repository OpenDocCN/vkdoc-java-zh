- fmt: "# The `concat` Operator\n\nThe `concat` operator (Figure 2-5) concatenates\
    \ two or more emissions, generating one emission where all the items from the\
    \ first source emission appear before the items of the second source emission.\
    \ Also, the `concat` operator waits for each sequence to be completed before subscribing\
    \ to the next observable.\n\n![](media/image38.jpg) ![](media/image37.jpg) ![](media/image36.jpg)\
    \ ![](media/image35.jpg) ![](media/image34.jpg)\n\nFigure 2-5. A marble diagram\
    \ of the `concat` operator\n\nIn the following example, you concatenate two sequences\
    \ of strings:\n\n```java\nObservable<String> first = Observable.just(\"one\",\
    \ \"two\");\nObservable<String> second = Observable.just(\"three\", \"four\",\
    \ \"five\");\n\nObservable.concat(first, second)\n    .subscribe(new Subscriber<String>()\
    \ {\n        @Override\n        public void onCompleted() {\n            System.out.println(\"\
    sequence completed!\");\n        }\n\n        @Override\n        public void onError(Throwable\
    \ e) {\n        }\n\n        @Override\n        public void onNext(String s) {\n\
    \            System.out.println(\"next item is: \" + s);\n        }\n    });\n\
    ```\n\nThe output is:\n\n```\nnext item is: one\nnext item is: two\nnext item\
    \ is: three\nnext item is: four\nnext item is: five\nsequence completed!\n```\n\
    \nNote that you can only concatenate sequences of objects of the same type (i.e.,\
    \ you cannot concatenate an `Observable` that emits strings with one that emits\
    \ integers).\n\nDo you remember the definition of hot and cold observables? What\
    \ would happen if you concatenate a cold observable (`first`) with a hot one (`second`)?\
    \ The `concat` operator will emit all items from the first observable, and then\
    \ it will subscribe to the second (the hot observable) and will start to emit\
    \ all items from the hot observable, losing all of the items that the hot observable\
    \ emitted before the subscription.\n\n# The `filter` Operator\n\nThe `filter`\
    \ operator uses a specified function to allow only some items of the source sequence\
    \ to be emitted.\n\nHere is the translation of the diagram shown in Figure 2-6\
    \ into Java code:\n\n![](media/image43.jpg) ![](media/image42.jpg) ![](media/image44.jpg)\
    \ ![](media/image45.jpg) ![](media/image47.jpg) ![](media/image46.jpg) ![](media/image41.jpg)\
    \ ![](media/image40.jpg)\n\nFigure 2-6. A marble diagram of the `filter` operator\n\
    \n```java\nObservable.from(new Integer[]{2, 30, 22, 5, 60, 1})\n    .filter(new\
    \ Func1<Integer, Boolean>() {\n        @Override\n        public Boolean call(Integer\
    \ x) {\n            return x > 10;\n        }\n    })\n    .subscribe(new Subscriber<Integer>()\
    \ {\n        @Override\n        public void onCompleted() {\n            System.out.println(\"\
    sequence completed!\");\n        }\n\n        @Override\n        public void onError(Throwable\
    \ e) {\n        }\n\n        @Override\n        public void onNext(Integer item)\
    \ {\n            System.out.println(\"next item is: \" + item);\n        }\n \
    \   });\n```\n\nAnd the output of this code is:\n\n```\nnext item is: 30\nnext\
    \ item is: 22\nnext item is: 60\nsequence completed!\n```\n\n# The `distinct`\
    \ Operator\n\nThe `distinct` operator (Figure 2-7) applies a filter to the source\
    \ sequence. If an item is emitted more than once, only the first occurrence will\
    \ be emitted.\n\n![](media/image54.jpg) ![](media/image53.jpg) ![](media/image52.jpg)\n\
    \nFigure 2-7. A marble diagram of the `distinct` operator\n\n# The `first` Operator\n\
    \nThe `first` operator (Figure 2-8) emits only the first item of a sequence. If\
    \ a function is specified, it will be used to filter the items, so only the first\
    \ item of the sequence that meets the conditions will be emitted.\n\n![](media/image51.jpg)\
    \ ![](media/image50.jpg) ![](media/image49.jpg) ![](media/image48.jpg)\n\nFigure\
    \ 2-8. A marble diagram of the `first` operator\n\nYou can take the example written\
    \ for the `filter` operator and change it by applying the operator `first` instead\
    \ of `filter`:\n\n```java\nObservable.from(new Integer[]{2, 30, 22, 5, 60, 1})\n\
    \    .first(new Func1<Integer, Boolean>() {\n        @Override\n        public\
    \ Boolean call(Integer x) {\n            return x > 10;\n        }\n    })\n \
    \   .subscribe(new Subscriber<Integer>() {\n        @Override\n        public\
    \ void onCompleted() {\n            System.out.println(\"sequence completed!\"\
    );\n        }\n\n        @Override\n        public void onError(Throwable e) {\n\
    \        }\n\n        @Override\n        public void onNext(Integer item) {\n\
    \            System.out.println(\"next item is: \" + item);\n        }\n    });\n\
    ```\n\nAs you may expect, the output will be similar to the output of the `filter`\
    \ operator, but limited to one item:\n\n```\nnext item is: 30\nsequence completed!\n\
    ```"
