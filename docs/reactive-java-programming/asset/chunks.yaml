    \ although deep skills are not required.\n\n## Imperative and Functional Programming\n\
    \nAs you may already know, Java is an imperative programming language. Typically,\
    \ a Java program consists of a sequence of instructions. Each of these instructions\
    \ is executed in the same order in which you write them, and the execution leads\
    \ to changes in the state of the program.\n\nElectronic supplementary material\
    \ The online version of this chapter (doi: 10.1007/978-1-4842-1428-2_1) contains\
    \ supplementary material, which is available to authorized users.\n\n© Andrea\
    \ Maglie 2016 [1]\n\nA. Maglie, *Reactive Java Programming*, DOI 10.1007/978-1-4842-1428-2_1\n\
    \nFor example, the following code creates a collection of even numbers:\n\n```java\n\
    List<Integer> input = Arrays.asList(1, 2, 3, 4, 5);\nList<Integer> output = new\
    \ ArrayList<>();\n\nfor (Integer x : input) {\n    if (x % 2 == 0) {\n       \
    \ output.add(x);\n    }\n}\n```\n\nIn order to produce the desired output, you\
    \ define every step that the program has to take to build the result list, and\
    \ each step is defined sequentially:\n\n1. Define and create an input list.\n\
    2. Define and create an empty output list.\n3. Take each item of the input list.\n\
    4. If the item is even, add it to the output list.\n5. Continue with the following\
    \ item until the end of the input list is reached.\n\nOne alternative to imperative\
    \ programming is functional programming. In functional programming, the result\
    \ of the program derives from the evaluation of mathematical functions, without\
    \ changing the internal program state. In fact, for every function `f(x)`, the\
    \ result of the function depends on the arguments passed to the function. Each\
    \ time `f(x)` is called, passing the same parameter `x`, you always get the same\
    \ result. This is similar to an Object's static method that does not depend on\
    \ any of the Object's members.\n\nIn simpler terms, in functional programming\
    \ the blocks with which you build the program are not objects but functions and\
    \ procedures.\n\nSo, using functional programming, the example above can be rewritten\
    \ with the following pseudocode:\n\n```\nvar output = input.where( x -> x % 2\
    \ == 0);\n```\n\nHere, you don't have a sequence of steps but just a function\
    \ (`x % 2 == 0`) passed as a parameter to another function (`where()`) that is\
    \ applied to an object (`input`). The arrow (`->`) annotation means \"apply function\
    \ `f(x)` (right side of the expression) to the variable `x` (left side of expression).\"\
    \n\nThe features of a functional language are the following:\n\n- **Higher-order\
    \ functions**: Higher-order functions are functions that take other functions\
    \ as arguments.\n- **Immutable data**: Data is immutable by default; instead of\
    \ modifying existing values, functional languages often operate on a copy of original\
    \ values to preserve them (in Java, primitive types are already immutable but\
    \ an object is not, so its implementation must not allow the object's state to\
    \ be changed after creation).\n- **Concurrency**: Concurrency is supported and\
    \ is safer to implement, thanks also to the immutability by default.\n- **Referential\
    \ transparency**: This term defines the fact that computations can be performed\
    \ at any time, always producing the same result (similar to static methods in\
    \ Java).\n- **Lazy evaluation**: Values can be computed only when needed (lazily)\
    \ because functions can be evaluated at any time, always giving the same result\
    \ (these functions do not depend on the program's internal state).\n\nThere are\
    \ programming languages that are defined as purely functional programming languages,\
    \ like Haskell, Hope, and Mercury. Java is not one of these languages, but we\
    \ can get the advantages of functional programming also in Java.\n\nWith the release\
    \ of Java 8, some constructs of functional programming have been added, like lambda\
    \ functions and streams. But with the `RxJava` library we can use concepts of\
    \ functional programming with Java 1.7 and Java 1.6.\n\n### Lambda Expressions\n\
    \nLambda expressions are anonymous functions; the lambda operator is indicated\
    \ using an arrow symbol pointing to the right (`->`). Inputs are placed at the\
    \ left of the operator, and the function body is placed at the right.\n\nIn Java,\
    \ lambda expressions can be used to replace anonymous inner classes that implement\
