  raw: 'The RxJava library ( https://github.com/ReactiveX/RxJava ) can be included
    by simply adding the corresponding dependency to your project (no other dependencies
    are required). At the time of writing, the latest version is 1.1.10\.


    You include it in a Maven project like so:


    <dependency>


    <groupId>io.reactivex</groupId>


    <artifactId>rxjava</artifactId>


    <version>1.1.10</version>


    </dependency>


    If you''re working with a gradle project, it looks like this:


    compile ''io.reactivex:rxjava: 1.1.10''


    RxJava supports all versions of JDK starting from Java 6\. If you’re working with
    Java 8, you can take advantage of Java native support for lambda expressions;
    otherwise, you can use lambda expression by adding retrolambda as a dependency
    ( https://github.com/ evant/gradle-retrolambda ).


    © Andrea Maglie 2016 [11]


    A. Maglie, Reactive Java Programming , DOI 10.1007/978-1-4842-1428-2_2 CHAPTER
    2 ■ OBSERVABLES AND OBSERVERS


    Definition of Observable


    An Observable is an object that emits a sequence (or stream) of events. It represents
    a push-based collection, which is a collection in which events are pushed when
    they are created.


    An observable emits a sequence that can be empty, finite, or infinite. When the
    sequence is finite, a complete event is emitted after the end of the sequence.
    At any time during the emission (but not after the end of it) an error event can
    be emitted, stopping the emission and cancelling the emission of the complete
    event.


    When the sequence is empty, only the complete event is emitted, without emitting
    any item. With an infinite sequence, the complete event is never emitted.


    As you''ll see later, the emission can be tranformed, filtered, or combined with
    other emissions.


    Definition of Observer


    An Observer is an object that subscribes to an Observable. It listens and reacts
    to whatever sequence of items is emitted by the Observable.


    The Observer is not blocked while waiting for new emitted items, so in concurrent
    operations, no blocking occurs. It just wakes up when a new item is emitted.


    This is one of the core principles of reactive programming: instead of executing
    instructions one at a time (always waiting for the previous instruction to be
    completed), the observable provides a mechanism to retrieve and transform data,
    and the Observer activates this mechanism, all in a concurrent way.


    The following pseudocode is an example of the method that the Observer implements
    that reacts to the Observable’s items:


    onNext = { it -> doSomething }


    Here, the method is defined, but nothing is invoked. To start reacting, you need
    to subscribe to the Observable:


    observable.subscribe(onNext)


    Now the observer is listening for items and will react to every new item that
    will be emitted.


    Let’s rewrite this example in Java code using RxJava APIs:


    public void subscribeToObservable(Observable<T> observable) { observable.subscribe(nextItem
    -> {


    // invoked when Observable emits an item


    // usually you will consume the nextItem here });


    }


    Now it’s clear that in order to connect an observable with an observer, you must
    use the subscribe method.


    CHAPTER 2 ■ OBSERVABLES AND OBSERVERS


    onNext, onCompleted, onError


    The rx.Observer<T> interface does not define only the onNext(T) method, but also
    the following methods:


    • onCompleted() notifies the Observer when the Observable stops emitting items
    because the sequence is completed normally. • onError(Throwable) notifies the
    Observer when the Observable


    raises an error and stops emitting items, even if the sequence is not completed.


    public void subscribeToObservable(Observable<T> observable) { observable.subscribe(new
    Subscriber<>() {


    @Override


    public void onCompleted() {


    // invoked when Observable stops emitting items


    }


    @Override


    public void onError(Throwable e) {


    // invoked when Observable throws an exception


    // while emitting items


    }


    @Override


    public void onNext(T nextItem) {


    // invoked when Observable emits an item


    // usually you will consume the nextItem here


    }


    });


    }'
