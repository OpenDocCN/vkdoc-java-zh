- fmt: "```java\nprivate Observable<T> fallbackToDiskCache() {\n    System.out.println(\"\
    fallback to disk cache\");\n    return fromDisk();\n}\n\nprotected void cacheOnDisk(T\
    \ response) {\n    System.out.println(\"saving data on disk: \" + response);\n\
    \    persistOnDisk(response);\n}\n\nprotected Observable<T> fromDisk() {\n   \
    \ Observable<T> observable = Observable.create(subscriber -> {\n        T response\
    \ = readFromDisk();\n        if (response != null) {\n            subscriber.onNext(response);\n\
    \            cacheInMemory(response);\n        }\n        subscriber.onCompleted();\n\
    \    });\n    return observable.compose(logSource(\"disk\"));\n}\n\nprotected\
    \ void cacheInMemory(T response) {\n    mMemoryCache = response;\n}\n\nprotected\
    \ Observable<T> fromMemory() {\n    Observable<T> observable = Observable.create(subscriber\
    \ -> {\n        subscriber.onNext(mMemoryCache);\n        subscriber.onCompleted();\n\
    \    });\n    return observable.compose(logSource(\"memory\"));\n}\n\npublic void\
    \ deleteAll() {\n    mMemoryCache = null;\n    deleteFromDisk();\n}\n\nprivate\
    \ Observable.Transformer<T, T> logSource(final String source) {\n    return dataObservable\
    \ -> dataObservable.doOnNext(data -> {\n        if (data == null) {\n        \
    \    System.out.println(source + \" does not have any data.\");\n        } else\
    \ if (!isValid(data)) {\n            System.out.println(source + \" has stale\
    \ data.\");\n        } else {\n            System.out.println(source + \" has\
    \ the data you are looking for!\");\n        }\n    });\n}\n\nabstract boolean\
    \ isValid(T data);\nabstract Observable<T> doNetworkCall();\nabstract void persistOnDisk(T\
    \ response);\nabstract T readFromDisk();\nabstract void deleteFromDisk();\n```\n\
    \nLet’s break down this code:\n\n- The main idea is to use the `Observable.concat()`\
    \ operator to concatenate three operations: getting data from memory, getting\
    \ data from the disk, and getting data from the network, in this exact order.\n\
    - Then you apply the `first()` operator with a function that filters out data\
    \ that is not valid (i.e. it's not null or it's not too old). So if the memory\
    \ returns valid data, it will be forwarded to the subscriber and no data will\
    \ be read from the disk or the network. If the memory returns invalid data, the\
    \ data will be read from the disk, checking if it's valid, and so on.\n- If some\
    \ error occurs (for example, no network connection or server unreachable), you\
    \ fall back to disk cache. This is done with the help of operator `onErrorResumeNext()`,\
    \ which makes the source `Observable` emit items from the given `Observable` (`fallbackToDiskCache()`)\
    \ in case of an error.\n- The `fromNetwork()` `Observable` retrieves data from\
    \ the network and uses the `onNext()` operator to cache data on disk and in memory\
    \ when the subscriber's `onNext()` method is notified. Remember that `fromNetwork()`\
    \ is called only if memory and the disk contain invalid data.\n- The same logic\
    \ is applied to the `fromDisk()` method, where you save data in memory before\
    \ notifying the subscriber's `onNext()` method.\n- Finally, you use the `Observable.compose()`\
    \ operator to apply the `logSource()` operator that prints informations about\
    \ the current source of data.\n\nNote how you used `Observable.create()` to create\
    \ the observers for getting data from memory and from disk.\n\nThe details about\
    \ getting data from the network and saving and reading data from disk are left\
    \ to the concrete implementation.\n\nIn these examples, you’ve used only a few\
    \ of the many features that the Retrofit library provides, because the focus was\
    \ on the RxJava integration part. With Retrofit, you can manage not only `GET`\
    \ requests but also `POST`, `DELETE`, `PUT`, and `PATCH` requests. You can specify\
    \ header and query parameters, manipulate a URL’s path, send form-encoded and\
