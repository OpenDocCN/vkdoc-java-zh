    \ item: 1\nfirst sequence, item: 2\nsecond sequence, item: 2\nfirst sequence,\
    \ item: 3\nsecond sequence, item: 3\nfirst sequence, item: 4\nsecond sequence,\
    \ item: 4\nfirst sequence, item: 5\n...\n```\n\nIn RxJava, the class `Subject`\
    \ is an abstract class. In these examples, you didn't create a concrete implementation\
    \ of `Subject`; you used one of the built-in implementations available, returned\
    \ by the static factory method `PublishSubject.create()`.\n\nRxJava provides four\
    \ different implementations of `Subject`.\n\n## PublishSubject\n\n`PublishSubject<T>`\
    \ (Figure 4-1) is a `Subject` that:\n\n- Emits all the items emitted by the source\
    \ observable, starting from the moment of the subscription\n- Notifies of an error\
    \ event and does not emit any other item if the source `Observable` terminates\
    \ with an error\n\n![](media/image100.jpg)\n\n**Figure 4-1.** The marble diagram\
    \ for `PublishSubject<T>`\n\nTo create an instance of `PublishSubject` (Figure\
    \ 4-1), you can use the static factory method `PublishSubject.create()`.\n\nNow,\
