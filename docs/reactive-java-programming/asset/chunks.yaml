    \ listener) { ... }\n}\n\ninterface OnButtonClickListener {\n    void onButtonClicked();\n\
    }\n```\n\nTo attach a click listener to the `Button`, you can use an anonymous\
    \ function:\n\n```java\nButton button = ...\nbutton.setOnClickListener(\n    new\
    \ OnButtonClickListener() {\n        void onButtonClicked() {\n            //\
    \ do something on button clicked\n        }\n    }\n)\n```\n\nUsing lambda expressions,\
    \ the code above becomes the following:\n\n```java\nButton button = ...\nbutton.setOnClickListener(\
    \ () -> // do something on button clicked )\n```\n\nOn the right side of the lambda\
    \ operator you include all of the code to be executed when the button is clicked;\
    \ this code has no input, as indicated by the two brackets on the left side of\
    \ the lambda operator.\n\nIf the method `onButtonClicked` accepts some parameters,\
    \ the example above becomes:\n\n```java\ninterface OnButtonClickListener {\n \
    \   void onButtonClicked(Object param);\n}\n\nButton button = ...\nbutton.setOnClickListener(\
    \ param ->\n    // do something on button clicked\n    // param can be used in\
    \ this code block\n)\n```\n\nJava support for lambda expressions was introduced\
    \ in Java 8, but you can use them in previous Java versions using the `retrolambda`\
    \ library (https://github.com/evant/gradle-retrolambda).\n\n### Imperative or\
    \ Functional?\n\nSo, why should you choose functional programming over imperative\
    \ programming?\n\nFunctional code is often shorter and easier to understand than\
    \ the corresponding imperative code. You can do the same work by writing less\
    \ code, and every programmer knows that less code leads to less bugs.\n\nIn imperative\
    \ programming, implementing abstraction requires you to define interfaces and\
    \ split code into components that implement those interfaces; functional languages\
    \ make it easier to create abstractions (just think about how lambda expressions\
    \ avoid the necessity of creating interfaces with implementations).\n\n## Reactive\
    \ Programming\n\nReactive programming takes functional programming a little bit\
    \ further, by adding the concept of data flows (see the next section) and propagation\
    \ of data changes.\n\nIn imperative programming, a value can be assigned to a\
    \ variable in the following way:\n\n```\nx = y + z\n```"
