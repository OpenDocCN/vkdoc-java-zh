    private Observable.Transformer<T, T> logSource(final String source) { CHAPTER
    5 ■ NETWORKING WITH RXJAVA AND RETROFIT


    return dataObservable -> dataObservable.doOnNext(data -> { if (data == null) {


    System.out.println(source + " does not have any data.");


    } else if (!isValid(data)) {


    System.out.println(source + " has stale data.");


    } else {


    System.out.println(source + " has the data you are looking for!");


    }


    });


    }


    abstract boolean isValid(T data);


    abstract Observable<T> doNetworkCall();


    abstract void persistOnDisk(T response);


    abstract T readFromDisk();


    abstract void deleteFromDisk();


    }


    Let’s break down this code:


    • The main idea is to use the Observable.concat() operator to concatenate three
    operations: getting data from memory, getting data from the disk, and getting
    data from the network, in this exact order.


    • Then you apply the first() operator with a function that filters out data that
    is not valid (i.e. it''s not null or it''s not too old). So if the memory returns
    valid data, it will be forwarded to the subscriber and no data will be read from
    the disk or the network. If the memory returns invalid data, the data will be
    read from the disk, checking if it''s valid, and so on.


    • If some error occurs (for example, no network connection or server unreachable),
    you fall back to disk cache. This is done with the help of operator onErrorResumeNext()
    , which makes the source Observable emit items from the given Observable ( fallbackToDiskCache()
    ) in case of an error.


    • The fromNetwork() Observable retrieves data from the network and uses the onNext()
    operator to cache data on disk and in memory when the subscriber''s onNext() method
    is notified. Remember that fromNetwork() is called only if memory and the disk
    contain invalid data.


    CHAPTER 5 ■ NETWORKING WITH RXJAVA AND RETROFIT


    • The same logic is applied to the fromDisk() method, where you save data in memory
    before notifying the subscriber''s onNext() method.


    • Finally, you use the Observable.compose() operator to apply the logSource()
    operator that prints informations about the current source of data.


    Note how you used Observable.create() to create the observers for getting data
    from memory and from disk.


    The details about getting data from the network and saving and reading data from
    disk are left to the concrete implementation.


    In these examples, you’ve used only a few of the many features that the Retrofit
    library provides, because the focus was on the RxJava integration part. With Retrofit,
    you can manage not only GET requests but also POST, DELETE, PUT, and PATCH requests.
    You can specify header and query parameters, manipulate a URL’s path, send form-encoded
    and multipart data. Go to http://square.github.io/retrofit/ for the full


    documentation.


    ![](media/image109.jpg)


    In the actual mobile-driven world, talking about Java also means also talking
    about Android.


    The RxJava library can be used in Android development without any other requirements.
    This means that all the code examples that you have seen so far can be included
    in an Android project; all you need to do is add the dependency for RxJava in
    your build.gradle file.'
