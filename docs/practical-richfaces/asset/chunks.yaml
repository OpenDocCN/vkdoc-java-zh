    组件属性来定义该特定指示器的特定样式。这些属性是 `acceptClass`、`draggingClass` 和 `rejectClass`。    ![images](img/square.jpg)
    **注意** 在撰写本书时，没有选项可以重新定义不同指示器状态的标记，只能使用 CSS 重新设置样式。换句话说，如果您需要在指示器内部显示不同的图标来表示拒绝或接受状态，可以做到——但只能通过使用
    CSS 选择器（在某些状态下隐藏和显示某些元素）或使用 CSS 类中定义的背景图像。重新定义标记的选项可能会在未来的版本中添加，因此请经常访问 [`www.jboss.org/richfaces`](http://www.jboss.org/richfaces)
    上的 JBoss 社区 RichFaces 页面以获取新更新。    ### 将拖放与树组件一起使用    将拖放与树组件一起使用听起来可能很复杂；但是，一旦您完成本节，您将看到它实际上并不那么困难。我们所做的就是将第
    9 章 的知识与本章的知识结合起来。我们将实现在不同父节点之间移动叶节点。尽管这是一个基本示例，但您应该能够将其扩展到任何更复杂的情况。    让我们创建一个简单的树模型，就像我们在第
