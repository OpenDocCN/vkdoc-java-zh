    as shown in [Listing 3-63](#Chapter03.html#list_3_63).


    ***Listing 3-63.** Defining a listener method inside a managed bean*


    `<a4j:commandButton value="Update (a4j:actionListener)" render="out">`

    `   <a4j:actionListener listener="#{actionListenerBean.listener}"/>`

    `</a4j:commandButton>`


    Inside a managed bean, the listener would be defined like [Listing 3-64](#Chapter03.html#list_3_64).


    ***Listing 3-64.** Defining the listener inside the managed bean*


    `public void listener (ActionEvent event){`

    `  FacesContext.getCurrentInstance()`

    `     .addMessage(null, new FacesMessage("a4j:actionListener - listener`

    `        invoked at "+new Date()));`

    `}`


    Defining the listener inside the managed bean would give you access to other bean
    properties and methods.


    ![images](images/square.jpg) **Tip** Using the `<a4j:actionListener>` is a good
    way to add multiple listeners to a component.


    As you probably know, there are two ways to define an action listener with a JSF
    standard `<f:actionListener>` tag. Both are a little more complicated than using
    the `<a4j:actionListener>` we just showed. The first one is using `binding`, as
    shown in [Listing 3-65](#Chapter03.html#list_3_65).


    ***Listing 3-65.** Define an action listener using binding*


    `<a4j:commandButton value="Update (binding)" render="out">`

    `   <f:actionListener binding="#{actionListenerBean.anotherListener}"/>`

    `</a4j:commandButton>`


    Inside a managed bean, you need to define an inner anonymous class for this listener,
    as shown in [Listing 3-66](#Chapter03.html#list_3_66). In this case, you also
    get access to bean properties and methods from within the anonymous inner class.


    ***Listing 3-66.** Define an inner anonymous class for this listener*


    `public ActionListener getAnotherListener () {`

    `   return new ActionListener (){`

    `      public void processAction (ActionEvent event){`

    `         FacesContext.getCurrentInstance()`

    `            .addMessage(null, new FacesMessage("binding - listener invoked at`

    `               "+new Date()));`

    `         }`

    `      };`

    `}`


    The last option, and probably the least popular, is to implement in the interface.
    We will show it to you so that you can compare all three methods. [Listing 3-67](#Chapter03.html#list_3_67)
    shows the interface. Note that the class is not registered as a managed bean.


    ***Listing 3-67.** Shows the interface*


    `public class YetAnotherListener  implements javax.faces.event.ActionListener{`

    `   public void processAction(ActionEvent event) throws       AbortProcessingException
    {`

