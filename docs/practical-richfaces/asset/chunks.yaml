  raw: '##### Using Popup Panel As a Wizard


    Let''s look at an example where you can edit information in the popup panel. When
    you place input fields or buttons or links inside the popup panel, you need to
    make sure the popup panel has its own form. One thing to keep in mind is that
    it''s not allowed to nest forms, so the popup panel must not be placed in some
    external form at the same time.


    ![images](images/square.jpg) **Note** To avoid the problems of overlapping the
    popup panel with any z-index by the elements that are at upper DOM levels and
    have relative positioning (a common problem in Internet Explorer), the root node
    of the popup panel is moved to the top of a DOM tree. That''s why you should use
    a separate `<h:form>` inside the popup panel if you want to perform submits from
    this panel.


    [Listing 6-33](#Chapter06.html#list_6_33) shows an example using a popup panel
    as a wizard.


    ***Listing 6-33.** Popup panel as a wizard*


    `<rich:popupPanel id="modalPanel8" header="Edit User Information"`

    `   width="350" height="150" autosized="true">`

    `   <h:form>`

    `      <rich:tabPanel switchType="client">`

    `         <rich:tab header="personal">`

    `            <h:panelGrid columns="2">`

    `               <h:outputText value="Name:" />`

    `               <h:inputText value="#{userBean.name}" label="username"/>`

    `               <h:outputText value="Age:" />`

    `               <h:inputText value="#{userBean.age}" label="age"/>`

    `            </h:panelGrid>`

    `         </rich:tab>`

    `         <rich:tab header="Location">`

    `            <h:panelGrid columns="2">`

    `               <h:outputText value="City:" />`

    `               <h:inputText value="#{userBean.city}" id="city"/>`

    `               <h:outputText value="Country:" />`

    `               <h:inputText value="#{userBean.country}" label="country"/>`

    `            </h:panelGrid>`

    `         </rich:tab>`

    `      </rich:tabPanel>`

    `      <a4j:commandButton value="Close" id="close"`

    `         onclick="#{rich:component(''modalPanel8'')}.hide(); return false;" />`

    `      <a4j:commandButton value="Save and Close" id="save" render="input"`

    `         oncomplete="if (#{facesContext.maximumSeverity==null})`

    `         #{rich:component(''modalPanel8'')}.hide();" />`

    `   </h:form>`

    `</rich:popupPanel>`

    `<a4j:outputPanel ajaxRendered="true">`

    `   <rich:popupPanel id="msgPanel" modal="true" zindex="101" header="Correct`

    `      your input!" autosized="true"`

    `      show="#{facesContext.maximumSeverity!=null}">`

    `      <h:messages style="color:red" />`

    `      <a href="#" onclick="#{rich:component(''msgPanel'')}.hide()">Hide</a>`

    `   </rich:popupPanel>`

    `</a4j:outputPanel>`

    `<h:form>`

    `   <h:panelGrid id="input">`

    `      <h:outputText value="Name: #{userBean.name}" />`

    `      <h:outputText value="Age: #{userBean.age}" />`

    `      <h:outputText value="City: #{userBean.city}" />`

    `      <h:outputText value="Country: #{userBean.country}" />`

    `      <a onclick="#{rich:component(''modalPanel8'')}.show()">Edit User`

    `         wizard</a>`

    `   </h:panelGrid>`

    `</h:form>`


    The managed bean contains just simple *`User`* properties, as shown in [Listing
    6-34](#Chapter06.html#list_6_34).


    ***Listing 6-34.** Managed bean*


    `@ManagedBean`

    `@RequestScoped`

    `public class UserBean {`

    `   @Length(min = 3, max = 15, message="Name should be defined(3 to 15`

    `      characters)")`

    `   private String name = "";`

    `   @Min(value = 18, message = "You should be over 18 years to place orders")`

    `   @NotNull(message="Age should be specified")`

    `   private Integer age;`

    `   @NotEmpty(message="City should be specified")`

    `   private String city=null;`

    `   @NotEmpty(message="Country should be specified")`

    `   private String country=null;`

    `   //getters and setters`

    `}`


    A wizard is launched to enter values for *`#{userBean}`* properties. From the
    popup panel, you can cancel, edit, or save the value when closing the panel. If
    you save the value, the value entered is then updated in the main page.


    One thing to note is that you need to point the *`render`* attribute of the Save
    and Close button to the *`<h:panelGrid>`* ID, as shown in [Listing 6-33](#Chapter06.html#list_6_33),
    to see the updated values in the parent page. Notice the separate *`<h:form>`*
    inside the popup panel.


    Also notice that to save the input inside the popup panel, we are using *`<a4j:commandButton>`*
    to perform an Ajax submit of the values to the server. Once the request is done,
    the *`oncomplete`* event will be processed and will close the popup.


    ![images](images/square.jpg) **Note** This sample shows you again how to open
    the panel as a result of server-side actions. The panel with messages that appear
    in the event of a failed validation are shown automatically, depending on whether
    messages are added to the context during request.


    All the steps are shown here. [Figure 6-26](#Chapter06.html#fig_6_26) shows the
    initial page state before opening the edit panel.


    ![images](images/0626.jpg)


    ***Figure 6-26.** User details prior to filling the properties.*


    [Figure 6-27](#Chapter06.html#fig_6_27) shows the edit popup.


    ![images](images/0627.jpg)


    ***Figure 6-27.** Popup panel which accepts user input shown*


    [Figure 6-28](#Chapter06.html#fig_6_28) shows the second popup, which contains
    messages about failed form validation.


    ![images](images/0628.jpg)


    ***Figure 6-28.** Popup panel with messages shown in the result of wrong input*


    In [Figure 6-29](#Chapter06.html#fig_6_29) you see the result after successful
    user information entering.


    ![images](images/0629.jpg)


    ***Figure 6-29.** User details after editing with popup wizard complete*'
