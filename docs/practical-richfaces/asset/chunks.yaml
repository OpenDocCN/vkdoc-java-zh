- fmt: "So far so good, but you might have noticed that if we use the `startText`\
    \ and `stopText` attribute then we are limited to displaying only text. It's possible\
    \ to display rich content, other components for example, if we use facets defined\
    \ on the `<a4j:status>` tag: `start`, `stop`, and `error`. You probably already\
    \ guessed how they work—identical to `startText`, `stopText`, and `errorText`,\
    \ but allow you to display any content inside them. [Listing 3-60](#Chapter03.html#list_3_60)\
    \ shows an example using the `start` facet with an image.\n\n**Listing 3-60.**\
    \ An example using the `start` facet with an image\n\n```\n<h:form>\n   <h:panelGrid>\n\
    \      <h:panelGrid columns=\"3\">\n         <h:inputText value=\"#{ajaxStatusBean.text}\"\
    \ />\n         <a4j:commandButton value=\"Convert\" action=\"#{ajaxStatusBean.upperCase}\"\
    \n            render=\"upper\" />\n         <a4j:status>\n            <f:facet\
    \ name=\"start\">\n               <h:graphicImage value=\"/status/ajax-loader.gif\"\
    \ />\n            </f:facet>\n         </a4j:status>\n      </h:panelGrid>\n \
    \     <h:outputText id=\"upper\" value=\"#{ajaxStatusBean.text}\" />\n   </h:panelGrid>\n\
    </h:form>\n```\n\nThe result is shown in [Figure 3-10](#Chapter03.html#fig_3_10).\n\
    \n![images](images/0310.jpg)\n\n**Figure 3-10.** Showing the Ajax status with\
    \ an image\n\n### Showing a Popup During an Ajax Request\n\n`<a4j:status>` comes\
    \ with two events that can be used to invoke any JavaScript `onstart` and `onstop`\
    \ events. Using `<a4j:status>` `onstart` and `onstop` events with the combination\
    \ of the `<rich:popupPanel>` component, we can block the page during an Ajax request.\
    \ This could be used so that the user won't click any other buttons or links on\
    \ the page when an Ajax request is being executed.\n\nUsing the `<a4j:status>`\
    \ API with `<rich:popupPanel>` is shown in [Listing 3-61](#Chapter03.html#list_3_61).\
    \ With `onstart`, we show a popup panel, and with `onstop`, we hide the popup\
    \ panel. `<rich:popupPanel>` can also be configured as a non-blocking popup. We\
    \ will cover this component in [Chapter 6](#Chapter06.html#ch6).\n\n**Listing\
    \ 3-61.** Using the `<a4j:status>` API with `<rich:popupPanel>`\n\n```\n<h:form>\n\
    \   <h:panelGrid>\n      <h:panelGrid columns=\"3\">\n         <h:inputText value=\"\
    #{ajaxStatusBean.text}\" />\n         <a4j:commandButton value=\"Convert\"\n \
    \           action=\"#{ajaxStatusBean.upperCase}\"\n            render=\"upper\"\
    \ />\n         <a4j:status onstart=\"#{rich:component('statusPanel')}.show();\"\
    \n            onstop=\"#{rich:component('statusPanel')}.hide();\" />\n      </h:panelGrid>\n\
    \      <h:outputText id=\"upper\" value=\"#{ajaxStatusBean.text}\" />\n   </h:panelGrid>\n\
    </h:form>\n\n<rich:popupPanel id=\"statusPanel\" header=\"Converting\">\n   <h:outputText\
    \ value=\"Please wait..\" />\n</rich:popupPanel>\n```\n\nThe result is shown in\
    \ [Figure 3-11](#Chapter03.html#fig_3_11).\n\n![images](images/0311.jpg)\n\n**Figure\
    \ 3-11.** Popup panel is opened on Ajax request with `<a4j:status>` JavaScript\
    \ API\n\n`<a4j:status>` also comes with JavaScript API listed in [Table 3-9](#Chapter03.html#tab_3_9).\n\
    \n![images](images/t0309.jpg)\n\nJavaScript API is useful when you need to utilize\
    \ the same status for non-Ajax requests (by invoking `start()` on the `<h:commandButton>`\
    \ click, for example), or to show it during any time-consuming JavaScript activities.\n\
    \n### Displaying Logging and Debugging Information with `<a4j:log>`\n\n`<a4j:log>`\
    \ is a client-side utility for Ajax logging and debugging. It generates JavaScript\
    \ that opens a debug window, logging client processing information such as requests,\
    \ responses, and DOM changes.\n\nTo use it, just place `<a4j:log/>` tag on a page,\
    \ as follows:\n\n```\n<a4j:log />\n```\n\nIt shows output when an Ajax request\
    \ is fired, so let's use it with a button with the current time, as shown in [Listing\
