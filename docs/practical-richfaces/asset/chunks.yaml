    7-52.** `walk()` 方法以及一个辅助方法*  `protected static boolean areEqualRanges(SequenceRange
    range1, SequenceRange range2) {` `   if (range1 == null || range2 == null) {`
    `      return range1 == null && range2 == null;` `   } else {` `      return range1.getFirstRow()
    == range2.getFirstRow() && range1.getRows() == range2.getRows();` `   }` `}`  `@Override`
    `public void walk(FacesContext facesContext, DataVisitor visitor, Range range,
    Object argument) {` `   SequenceRange sequenceRange = (SequenceRange) range;`
    `   if (this.cachedItems == null || !areEqualRanges(this.cachedRange, sequenceRange))
    {` `      Session session = HibernateUtils.`*`getSessionFactory`*`().openSession();`
    `      try {` `         Criteria criteria = createCriteria(session);` `         if
    (sequenceRange != null) {` `            int first = sequenceRange.getFirstRow();`
    `            int rows = sequenceRange.getRows();` `            criteria.setFirstResult(first);`
    `            if (rows > 0) {` `               criteria.setMaxResults(rows);` `            }`
    `         }` `         this.cachedRange = sequenceRange;` `         this.cachedItems
    = criteria.list();` `      } finally {` `         session.close();` `      }`
    `   }` `   for (T item : this.cachedItems) {` `      visitor.process(facesContext,
    item.getId(), argument);` `   }` `}`  如您所见，思路非常简单。首先，我们检查是否尚未缓存数据。即使数据已缓存，我们也会检查缓存的数据范围是否与表格传递的当前范围匹配。如果不匹配，则组件是首次渲染，或者使用
