    ***Figure 5-29.** <rich_calendar> component*


    [Figure 5-30](#Chapter05.html#fig_5_30) shows an example of how the month selection
    works.


    ![images](images/0530.jpg)


    ***Figure 5-30.** Month selection with <rich_calendar>*


    [Figure 5-31](#Chapter05.html#fig_5_31) shows an example of selecting time.


    ![images](images/0531.jpg)


    ***Figure 5-31.** Time selection with <rich_calendar>*


    ![images](images/square.jpg) **Note**The time selection turns on automatically
    when the pattern for calendar contains time. If it contains only the date, time
    controls will not appear.


    All the examples shown so far in the calendar are pop-ups. [Figure 5-32](#Chapter05.html#fig_5_32)
    shows an inline calendar.


