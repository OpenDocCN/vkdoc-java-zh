    定义了第二列的样式类。


    最后，我们使用了两个行事件处理器——`onrowmouseout` 和 `onrowmouseover`——它们实际上与标准的 HTML `onmouseover`
    和 `onmouseout` 类似，但为每个组件行上的相应事件定义了处理器。这些处理器会将鼠标悬停行的所有单元格字体加粗，当鼠标离开该行时，再将字体恢复为正常（非粗体）。


