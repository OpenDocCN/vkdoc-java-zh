    ### 使用 `<rich:togglePanel>`


    *`<rich:togglePanel>`* 实际上是 *`<rich:accordion>`* 和 *`<rich:tabPanel>`* 的基础组件。之所以最后介绍它，是因为该组件是一个相当通用的面板实现，具备状态切换功能，而我们之前已经介绍过相关组件。


    *`<rich:accordion>`*、*`<rich:tab>`* 和 *`<rich:collapsiblePanel>`* 更受欢迎且更常用。你可以在
    *`<rich:togglePanel>`* 中使用 *`<rich:togglePanelItem>`* 定义两个或多个面板，并为组件（可以在面板内部或外部）添加
    *`<rich:toggleControl>`* 切换行为，从而实现状态切换。


    让我们看一个以名言作为面板内容的示例。图 6-16 展示了面板的外观。


    ![images](img/0616.jpg)


    ***图 6-16.** 切换面板初始状态*


    接下来，我们隐藏当前面板，并使用链接显示下一个面板，如图 6-17 所示。


    ![images](img/0617.jpg)


    ***图 6-17.** 切换面板切换到下一项*


    清单 6-20 展示了实现此功能的代码。


    ***清单 6-20.** 展示切换面板到下一项的代码*


    `<h:form>`

    `   <rich:panel style="width:450px">`

    `      <rich:togglePanel id="quotes" switchType="ajax">`

    `         <rich:togglePanelItem>`

    `            <h:panelGrid>`

    `               <h:outputText value="C makes it easy to shoot yourself in the`

    `                  foot; C++ makes it harder, but when you do, it blows away`

    `                  your whole leg." />`

    `               <h:outputText value="- Bjarne Stroustrup"`

    `                  style="font-style: italic" />`

    `               <h:commandLink value="Next">`

    `                  <rich:toggleControl targetItem="@next" />`

    `               </h:commandLink>`

    `            </h:panelGrid>`

    `         </rich:togglePanelItem>`

    `         <rich:togglePanelItem>`

    `            <h:panelGrid>`

    `               <h:outputText value="If you are going through hell,`

    `                  keep going." />`

    `               <h:outputText value="- Sir Winston Churchill (1874-1965)"`

    `                  style="font-style: italic" />`

    `               <h:commandLink value="Next">`

    `                  <rich:toggleControl targetItem="@next" />`

    `               </h:commandLink>`

    `            </h:panelGrid>`

    `         </rich:togglePanelItem>`

    `         <rich:togglePanelItem>`

    `            <h:panelGrid>`

    `               <h:outputText value="Life is pleasant. Death is peaceful. It''s`

    `                  the transition that''s troublesome." />`

    `               <h:outputText value="- Isaac Asimov"`

    `                  style="font-style: italic" />`

    `               <h:commandLink value="Next">`

    `                  <rich:toggleControl targetItem="@next" />`

    `               </h:commandLink>`

    `            </h:panelGrid>`

    `         </rich:togglePanelItem>`

    `         ...`

    `      </rich:togglePanel>`

    `   </rich:panel>`

    `</h:form>`


    通过使用 *`<rich:panel>`* 组件来添加面板。面板的状态（或内容）通过在内部添加 *`<rich:togglePanel>`* 以及一组嵌套的
    *`<rich:togglePanelItem>`* 组件来定义（没有预定义的标记）。切换控件是一个简单的 *`<h:commandLink>`*，并带有
    *`<rich:toggleControl>`* 行为。这增加了更大的灵活性，并允许在各种用例中使用该组件。


    行为是 JSF 2 规范中一个很好的补充。我们可以将 *`<rich:toggleControl>`* 的行为插入到任何事件（本例中默认使用 *`click`*
    事件）的任何控件上，因此我们不再局限于仅使用按钮或链接。在此示例中，我们使用链接并通过 *`@next`* 关键字在状态之间切换，但你也可以使用以下预定义关键字：*`@prev`*、*`@first`*
    和 *`@last`*。


    切换顺序由组件内子项的顺序决定。*`cycledSwitching`* 属性控制当您继续沿同一方向切换时，面板是否会从边界项切换到相反项。


    还有另一种执行切换的方法。*`<rich:togglePanelItem>`* 可以使用 *`name`* 属性命名。然后在 *`<rich:toggleControl>`*
    中，你可以在 *`targetItem`* 属性中使用该名称。


    最后，带有行为的控件放置在面板本身内部，但你可以轻松地在面板组件外部使用它们。你需要在 *`<rich:toggleControl>`* 行为上使用 *`targetPanel`*
    属性，该属性使用相应的面板 *`name`* 定义。在清单 6-21 中，我们对前面的示例稍作修改。


    ***清单 6-21.** 在 `<rich:toggleControl>` 行为上使用 `targetPanel` 属性*


    `<h:form>`

    `   <rich:panel style="width:450px">`

    `      <rich:togglePanel id="tp2" switchType="ajax">`

    `         <rich:togglePanelItem>`

    `            <h:panelGrid>`

    `               <h:outputText value="C makes it easy to shoot yourself in the`

    `                  foot; C++ makes it harder, but when you do, it blows away`

    `                  your whole leg." />`

    `               <h:outputText value="- Bjarne Stroustrup"`

    `                  style="font-style: italic" />`

    `            </h:panelGrid>`

    `         </rich:togglePanelItem>`

    `         <rich:togglePanelItem>`

    `            <h:panelGrid>`

    `               <h:outputText value="If you are going through hell, keep`

    `                  going." />`

    `               <h:outputText value="- Sir Winston Churchill (1874-1965)"`

    `                  style="font-style: italic" />`

    `            </h:panelGrid>`

    `         </rich:togglePanelItem>`

    `         <rich:togglePanelItem name="einstein">`

    `            <h:panelGrid>`

    `               <h:outputText value="Make everything as simple as possible,`

    `                  but not simpler" />`

    `               <h:outputText value="- Albert Einstein (1879-1955)"`

    `                  style="font-style: italic" />`

    `            </h:panelGrid>`

    `         </rich:togglePanelItem>`

    `      </rich:togglePanel>`

    `      <h:panelGrid columns="3">`

    `         <h:commandButton value="Back">`

    `            <rich:toggleControl targetPanel="tp2" targetItem="@prev" />`

    `         </h:commandButton>`

    `         <h:commandButton value="Einstein''s quote">`

    `            <rich:toggleControl targetPanel="tp2" targetItem="einstein" />`

    `         </h:commandButton>`

    `         <h:commandButton value="Next">`

    `            <rich:toggleControl targetPanel="tp2" targetItem="@next" />`

    `         </h:commandButton>`

    `      </h:panelGrid>`

    `   </rich:panel>`

    `</h:form>`


    请注意，我们使用了带有 *`<rich:toggleControl>`* 行为的按钮（而不是链接），并将它们放置在切换面板外部。图 6-18 显示了点击爱因斯坦按钮后的结果。


    ![images](img/0618.jpg)


    ***图 6-18.** 点击 Bjarne 名言按钮后*


    与其他面板一样，*`<rich:togglePanel>`* 可以使用三种常见模式进行切换：*`server`*、*`ajax`* 和 *`client`*。同样，它允许使用
    *`activeItem`* 属性将当前面板 ID 绑定到模型，并使用 *`itemChangeListener`* 在 ajax 或 server 模式下处理项目切换。


    ![images](img/square.jpg) **注意** 在 ajax 和 server 模式下，面板必须放置在表单内。


    现在，让我们再创建一个示例，以突出使用此组件的灵活性。RichFaces 提供了开箱即用的 *`<rich:tabPanel>`* 组件，但它不提供垂直选项卡对齐功能。让我们使用
    *`<rich:togglePanel>`* 组件创建自定义实现，如图 6-19 所示。


    ![images](img/0619.jpg)


    ***图 6-19.** 使用 `<rich:togglePanel>` 创建的自定义选项卡面板*


