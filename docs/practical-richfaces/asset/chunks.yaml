- fmt: "#### JavaScript API\n\n`<rich:togglePanel>`组件提供了表[6-5](#Chapter06.html#tab_6_5)所示的JavaScript\
    \ API方法。\n\n![images](images/t0605.jpg)\n\n### 使用`<rich:popupPanel>`\n\n`<rich:popupPanel>`组件实现了一个弹出面板，具有拖拽、调整大小、屏幕遮挡等常见功能。弹出面板可以相互调用，并轻松填充动态内容。打开和关闭面板通过客户端JavaScript代码完成。\n\
    \n你可以在弹出面板内放置任何其他内容和任何其他JSF组件，但让我们从如何选择面板类型以及如何打开或关闭面板开始。你也可以将弹出面板视为当前页面中的一个`div`，它只是被显示或隐藏。\n\
    \n#### 选择面板类型\n\nRichFaces 4中的弹出面板可以是模态的（遮挡整个屏幕）或非模态的。RichFaces 3仅提供`<rich:modalPanel>`，它只支持模态弹出。\n\
    \n你可以根据用例需求使用`modal`布尔属性。默认情况下，它将作为模态打开。要以非模态方式打开弹出面板，请设置`modal=\"false\"`。[示例6-23](#Chapter06.html#list_6_23)展示了一个例子。\n\
    \n***示例6-23.** 以非模态方式打开弹出面板*\n\n```\n<rich:popupPanel modal=\"false\">\n   ...\n\
    </rich:popupPanel>\n```\n\n#### 打开和关闭弹出面板\n\n[示例6-24](#Chapter06.html#list_6_24)展示了打开和关闭模态弹出面板的最简单方法。\n\
    \n***示例6-24.** 打开和关闭模态弹出面板的最简单方法*\n\n```\n<a href=\"#\" onclick=\"#{rich:component('modalPanel')}.show()\"\
    >Open</a>\n\n<rich:popupPanel id=\"modalPanel\">\n   <h:outputText value=\"Cool,\
    \ I just opened a modal panel!\" />\n   <a href=\"#\" onclick=\"#{rich:component('modalPanel')}.hide()\"\
    >Hide</a>\n</rich:popupPanel>\n```\n\n这段代码将生成图[6-20](#Chapter06.html#fig_6_20)所示的图像。\n\
    \n![images](images/0620.jpg)\n\n***图6-20.** 简单的模态弹出面板*\n\n为了打开弹出面板，我们使用了`show()`JavaScript\
    \ API方法。`#{rich:component(id)}`函数是一个RichFaces客户端EL函数，它允许你引用任何组件。这在[第12章](#Chapter12.html#ch12)中有更详细的描述。\n\
    \n要关闭它，你应该使用`hide()`函数，如下所示：\n\n```\n<a href=\"#\" onclick=\"#{rich:component('modalPanel')}.hide()\"\
    >Hide</a>\n```\n\n##### 添加标题\n\n通过添加名为`header`的facet或同名的属性，可以为面板添加标题。这与为`<rich:panel>`添加标题几乎相同。有了标题，你现在可以拖拽组件在屏幕上移动。[示例6-25](#Chapter06.html#list_6_25)中的代码提供了一个示例。\n\
    \n***示例6-25.** 在屏幕上拖拽组件的代码*\n\n```\n<a href=\"#\" onclick=\"#{rich:component('modalPanel2')}.show()\"\
    >Open</a>\n<rich:popupPanel id=\"modalPanel2\">\n   <f:facet name=\"header\">\n\
    \      Modal panel\n   </f:facet>\n   <h:outputText value=\"Cool, I just opened\
    \ a modal panel!\" />\n   <a href=\"#\" onclick=\"#{rich:component('modalPanel2')}.hide()\"\
    >Hide</a>\n</rich:popupPanel>\n```\n\n这将生成图[6-21](#Chapter06.html#fig_6_21)所示的图像。\n\
    \n![images](images/0621.jpg)\n\n***图6-21.** 带标题的模态面板*\n\n##### 添加标题控件\n\n你还可以在标题右侧添加一个控件来关闭弹出面板。这通过向弹出面板添加`control`facet来实现，如[示例6-26](#Chapter06.html#list_6_26)所示。\n\
    \n***示例6-26.** 向弹出面板添加`control`facet*\n\n```\n<a href=\"#\" onclick=\"#{rich:component('modalPanel3')}.show()\"\
    >Open</a>\n<rich:popupPanel id=\"modalPanel3\">\n   <f:facet name=\"header\">\n\
    \      Modal panel\n   </f:facet>\n   <f:facet name=\"controls\">\n      <h:outputLink\
    \ value=\"#\" style=\"font-size:large; color:black; text-\n         decoration:none;\"\
    \ onclick=\"#{rich:component('modalPanel3')}.hide();\n         return false;\"\
    >\n            X\n      </h:outputLink>\n   </f:facet>\n   <h:outputText value=\"\
    Cool, I just opened a modal panel!\" />\n   <a href=\"#\" onclick=\"#{rich:component('modalPanel3')}.hide()\"\
    >Hide</a>\n</rich:popupPanel>\n```\n\n在facet内部是一个“X”符号链接，点击它可以关闭面板。`onclick`事件指向面板的`hide()`函数以关闭面板，如图[6-22](#Chapter06.html#fig_6_22)所示。\n\
    \n![images](images/0622.jpg)\n\n***图6-22.** 标题中带有关闭控件的模态面板*\n\n##### 打开/关闭面板的其他方式\n\
    \n除了使用`#{rich:component(id)}`，你还可以使用`<rich:componentControl>`组件。如[第12章](#Chapter12.html#ch12)所述，它是一种通用行为，允许基于父组件支持的已定义事件（例如`click`或`change`）调用任何RichFaces组件上的JavaScript\
    \ API，如[示例6-27](#Chapter06.html#list_6_27)所示。\n\n***示例6-27.** 使用`<rich:componentControl>`组件*\n\
    \n```\n<h:commandButton value=\"Open\">\n   <rich:componentControl operation=\"\
    show\" target=\"modalPanel4\" />\n</h:commandButton>\n<rich:popupPanel id=\"modalPanel4\"\
    \ modal=\"false\">\n   <f:facet name=\"header\">\n      Non-modal popup panel\n\
    \   </f:facet>\n   <f:facet name=\"controls\">\n      <h:graphicImage value=\"\
    /modalPanel/close.png\" style=\"cursor:pointer\"\n         onclick=\"Richfaces.hideModalPanel('modalPanel4')\"\
    \ />\n   </f:facet>\n   <h:outputText value=\"Cool, I just opened non-modal popup\
    \ panel!\" />\n   <h:outputLink value=\"#\">\n      <h:outputText value=\"Hide\"\
    \ />\n      <rich:componentControl event=\"click\" operation=\"hide\"\n      \
    \   target=\"modalPanel4\" />\n   </h:outputLink>\n</rich:popupPanel>\n```\n\n\
    请注意，图[6-23](#Chapter06.html#fig_6_23)显示了一个非模态状态的弹出面板。\n\n![images](images/0623.jpg)\n\
    \n***图6-23.** 通过`<rich:componentControl>`从按钮调用的非模态弹出面板*\n\n这种显示和隐藏弹出面板的方法与我们最初演示的方法基本相同。\n\
    \n##### 从服务器端操作打开/关闭面板\n\n在RichFaces相关的博客和社区论坛中经常出现的一个问题是如何在服务器端控制弹出面板的打开。这可能是由于控制是客户端的；你在客户端显示或隐藏它，因此如何从服务器端控制它并不立即明确。\n\
    \n实际上这相当简单，如[示例6-28](#Chapter06.html#list_6_28)所示。这是一个向用户显示欢迎窗口（弹出面板）的示例。\n\n\
    ***示例6-28.** 欢迎窗口（弹出面板）示例*\n\n```\n<rich:popupPanel id=\"modalPanel7\" autosized=\"\
    true\" header=\"Welcome!\"\n   show=\"#{simplePopupBean.justRegistered}\">\n \
    \  We hope you're getting much fun playing with RichFaces!!\n   <a href=\"#\"\
    \ onclick=\"#{rich:component('modalPanel7')}.hide()\">Hide</a>\n</rich:popupPanel>\n\
    ```\n\n在这个示例中，我们使用`show`属性来决定页面加载时是否显示该组件。当该属性绑定到EL时，可以在运行时控制是否显示该组件。\n\n有一点需要记住：如果你通过Ajax进行更改，请不要忘记更新整个组件，以便它能够根据新值重新初始化并显示或隐藏。"
  raw: '#### JavaScript API


    The *`<rich:togglePanel>`* component provides the JavaScript API methods shown
    in [Table 6-5](#Chapter06.html#tab_6_5).


    ![images](images/t0605.jpg)


    ### Using <rich:popupPanel>


    The *`<rich:popupPanel>`* component implements a popup with various common features
    like dragging, resizing, screen blocking ability, and more. Popups can be called
    from one another and easily populated with dynamic content. Opening and closing
    the panel is done through client JavaScript code.


    You can place any other content and any other JSF component inside the popup panel,
    but let''s start with how you can choose the panel type and perform opening or
    closing the panel. You might also think about the popup panel as being just a
    *`div`* inside the current page that simply is shown or hidden.


    #### Choosing Your Panel Type


    A popup panel in RichFaces 4 can be either be modal (blocking the entire screen)
    or non-modal. RichFaces 3 came only with *`<rich:modalPanel>`*, which only provides
    a modal popup.


    You could use the *`modal`* boolean attribute according to your use-case requirements.
    By default it will be opened as modal. To open the popup as non-modal, set *`modal="false"`*.
    [Listing 6-23](#Chapter06.html#list_6_23) shows an example.


    ***Listing 6-23.** To open the popup as non-modal*


    `<rich:popup` *`modal="false"`*`>`

    `   ...`

    `</rich:popup>`


    #### Opening and Closing the Popup Panel


    [Listing 6-24](#Chapter06.html#list_6_24) shows the simplest way to open and close
    the modal popup panel.


    ***Listing 6-24.** Simplest way to open and close the modal popup panel*


    `<a href="#" onclick="#{rich:component(''modalPanel'')}.show()">Open</a>`


    `<rich:popupPanel id="modalPanel">`

    `   <h:outputText value="Cool, I just opened a modal panel!" />`

    `   <a href="#" onclick="#{rich:component(''modalPanel'')}.hide()">Hide</a>`

    `</rich:popupPanel>`


    This code will produce the image shown in [Figure 6-20](#Chapter06.html#fig_6_20).


    ![images](images/0620.jpg)


    ***Figure 6-20.** Simple modal popup*


    To open the popup panel, we used the *`show()`* JavaScript API method. The *`#{rich:component(id)}`*
    function is a RichFaces client-side EL function that enables you to reference
    any component. It is described more in [Chapter 12](#Chapter12.html#ch12).


    To close it, you should use the *`hide()`* function, as follows:


    `<a href="#" onclick="#{rich:component(''modalPanel'')}.hide()">Hide</a>`


    ##### Adding a Header


    It''s possible to add a panel header by adding a facet named `header` or an attribute
    with the same name. This is virtually identical to adding a header to `<rich:panel>`.
    With the header, you can now drag the component across the screen. The code in
    [Listing 6-25](#Chapter06.html#list_6_25) provides an example.


    ***Listing 6-25.** Code to drag the component across the screen*


    `<a href="#" onclick="#{rich:component(''modalPanel2'')}.show()">Open</a>`

    `<rich:popupPanel id="modalPanel2">`

    `   <f:facet name="header">`

    `      Modal panel`

    `   </f:facet>`

    `   <h:outputText value="Cool, I just opened a modal panel!" />`

    `   <a href="#" onclick="#{rich:component(''modalPanel2'')}.hide()">Hide</a>`

    `</rich:popupPanel>`


    This produces the image shown in [Figure 6-21](#Chapter06.html#fig_6_21).


    ![images](images/0621.jpg)


    ***Figure 6-21.** Modal panel with header*


    ##### Adding Header Controls


    You can also add a control on the right side of the header to close the popup
    panel. It''s achieved by adding *`control`* facets to the popup panel, as shown
    in [Listing 6-26](#Chapter06.html#list_6_26).


    ***Listing 6-26.** Adding* `control` *facets to the popup panel*


    `<a ref="#" onclick="#{rich:component(''modalPanel3'')}.show()">Open</a>`

    `<rich:popupPanel id="modalPanel3">`

    `   <f:facet name="header">`

    `      Modal panel`

    `   </f:facet>`

    `   <f:facet name="controls">`

    `      <h:outputLink value="#" style="font-size:large; color:black; text-`

    `         decoration:none;" onclick="#{rich:component(''modalPanel3'')}.hide();`

    `         return false;">`

    `            X`

    `      </h:outputLink>`

    `   </f:facet>`

    `   <h:outputText value="Cool, I just opened a modal panel!" />`

    `   <a href="#" onclick="#{rich:component(''modalPanel3'')}.hide()">Hide</a>`

    `</rich:popupPanel>`


    Inside the facet is an “X” symbol link that can be clicked to close the panel.
    The *`onclick`* event points to the panel *`hide()`* function to close the panel,
    as shown in [Figure 6-22](#Chapter06.html#fig_6_22).


    ![images](images/0622.jpg)


    ***Figure 6-22.** Modal panel with close control in header*


    ##### Other Ways to Open/Close the Panel


    Instead of using the *`#{rich:component(id)}`*, you can use the *`<rich:componentControl>`*
    component. As described in [Chapter 12](#Chapter12.html#ch12), it''s a universal
    behavior that allows calling the JavaScript API on any RichFaces component based
    on a defined event supported by the parent component, such as *`click`* or *`change`*,
    as shown in [Listing 6-27](#Chapter06.html#list_6_27).


    ***Listing 6-27.** Using the* `<rich:componentControl>` *component*


    `<h:commandButton value="Open">`

    `   <rich:componentControl operation="show" target="modalPanel4" />`

    `</h:commandButton>`

    `<rich:popupPanel id="modalPanel4" modal="false">`

    `   <f:facet name="header">`

    `      Non-modal popup panel`

    `   </f:facet>`

    `   <f:facet name="controls">`

    `      <h:graphicImage value="/modalPanel/close.png" style="cursor:pointer"`

    `         onclick="Richfaces.hideModalPanel(''modalPanel4'')" />`

    `   </f:facet>`

    `   <h:outputText value="Cool, I just opened non-modal popup panel!" />`

    `   <h:outputLink value="#">`

    `      <h:outputText value="Hide" />`

    `      <rich:componentControl event="click" operation="hide"`

    `         target="modalPanel4" />`

    `   </h:outputLink>`

    `</rich:popupPanel>`


    Note that [Figure 6-23](#Chapter06.html#fig_6_23) shows a popup in non-modal state.


    ![images](images/0623.jpg)


    ***Figure 6-23.** Non-modal popup called from button with <rich:componentControl>*


    This approach to showing and hiding the popup and the one we originally demonstrated
    are basically identical.


    ##### Open/Close Panel from Server-Side Action


    One question that often arises in RichFaces related blogs and community forum
    threads is how to control the opening of a popup panel on the server. It''s probably
    due to the control being client-side; you show or hide it on the client so it''s
    not immediately clear how to control it from the server.


    It''s actually rather simple and is shown in [Listing 6-28](#Chapter06.html#list_6_28).
    This is an example of a welcome window (popup) shown to the user.


    ***Listing 6-28.** Example of a welcome window (popup)*


    `<rich:popupPanel id="modalPanel7" autosized="true" header="Welcome!"`

    `   show="#{simplePopupBean.justRegistered}">`

    `   We hope you''re getting much fun playing with RichFaces!!`

    `   <a href="#" onclick="#{rich:component(''modalPanel7'')}.hide()">Hide</a>`

    `</rich:popupPanel>`


    In this example, we use the *`show`* attribute to determine whether or not to
    show the component when the page is loaded. When the attribute is bound to EL,
    it''s possible to control whether or not to show the component in runtime.


    There is just one thing to keep in mind: if you are making changes via Ajax, don''t
    forget to update the entire component in order for it to get re-initialized and
    shown or hidden based on a new value.'
