    Tree Nodes Lazy Loading    Now let’s create a more interesting sample where we
    handle node events. Let’s implement simple lazy loading for the nodes when additional
    nodes get added to the model only on expansion of the parent node. This is a great
    example, as you will be able to apply these concepts when working with large data
    sets, such as getting data from a database or a from a remote service call.    First
    let’s create the bean that holds the `org.richfaces.model.TreeNode`-based model,
    as shown in [Listing 9-19](#Chapter09.html#list_9_19).    ***Listing 9-19.** Creating
    the bean that holds the `org.richfaces.model.TreeNode`-based model*  `@ManagedBean`
    `@ViewScoped` `public class LazyTreeBean {`  `   private TreeNode rootNode = null;`  `   public
    void initNodes() {` `      rootNode = new TreeNodeImpl();` `      RichFacesTreeNode
    node = new RichFacesTreeNode("Node 1");` `      rootNode.addChild("1", node);`
    `      node = new RichFacesTreeNode("Node 2");` `      rootNode.addChild("2",
    node);` `      node = new RichFacesTreeNode("Node 3");` `      rootNode.addChild("3",
    node);` `      node = new RichFacesTreeNode("Node 4");` `      rootNode.addChild("4",
    node);` `   }` `   public void setRootNode(TreeNode rootNode) {` `      this.rootNode
    = rootNode;` `   }` `   public TreeNode getRootNode() {` `      if (rootNode ==
    null) {` `         initNodes();` `      }` `      return rootNode;` `   }` `}`  As
    you can see, we’re initially instantiating only four root nodes without any children.
    Now let''s put a tree on a page that will use this data model, as shown in [Listing
    9-20](#Chapter09.html#list_9_20).    ***Listing 9-20.** Putting a tree on a page
    that will use this data model*  `<h:form>` `   <rich:tree value="#{lazyTreeBean.rootNode}"
    var="node" toggleType="ajax">` `      <rich:treeNode>` `         #{node.data}`
    `      </rich:treeNode>` `   </rich:tree>` `</h:form>`  [Figure 9-8](#Chapter09.html#fig_9_8)
    shows that when rendered, the tree will be shown as usual; but on node expansion
    nothing will be shown because the node is just a leaf without children.  ![images](images/0908.jpg)  ***Figure
    9-8.** Tree without child nodes*    Next, let’s create a toggle listener that
    will add child nodes to the node that was expanded. The listener is shown in [Listing
    9-21](#Chapter09.html#list_9_21).    ***Listing 9-21.** Creating a toggle listener
    that will add child nodes*  `public void toggleListener(TreeToggleEvent event)
    {` `   UITree tree = (UITree) event.getComponent();` `   RichFacesTreeNode modelNode
    = (RichFacesTreeNode)tree.getRowData();` `   for (int i = 0; i < 5; i++) {` `      RichFacesTreeNode
    node =` `         new RichFacesTreeNode(modelNode.getData() + "." + i);` `      modelNode.addChild(i,
    node);` `   }` `}`  Notice that we are getting the `UITree` instance from the
    event and not the currently toggled node object. It’s passed to the listener by
    design, as toggled node data could be easily accessed via the `getRowData()` method,
    but at the same time you have the option to operate with a complete tree instance
    using its API.    After we get the toggled node data object, we simply create
    five dummy child nodes and add them as child nodes to the current node. `<rich:tree>`
    will automatically mark the toggled node to be updated on the client, so we don''t
    need to add any additional `render` definitions on the page. The only thing we
    need to do is point the tree component to the listener method.  `<rich:tree ...
    toggleListener="#{lazyTreeBean.toggleListener}">`  We are now ready to try this
    example. After opening the page and a few expand actions, you should see the result
    shown in [Figure 9-9](#Chapter09.html#fig_9_9).  ![images](images/0909.jpg)  ***Figure
    9-9.** Tree with child nodes lazy loaded*    This is really simple and could be
    easily used in any scenario in which you need to load new nodes during runtime.    Now
    let’s proceed to the next sections, which describe declarative models usage.    ###
    Using <rich:tree> Adaptors to Build the Data Model    RichFaces provides two adaptors
    to construct `<rich:tree>` data model. Both <`rich:treeModelRecursiveAdaptor>`
    and <`rich:treeModelAdaptor>` allow you to point the tree to an existent, non-hierarchical
    data model declaratively. It means that if you already have a model that is `Collection`-
    or `Map`-based, you have no need to convert them manually into the hierarchical
    models in the way we showed earlier. You could easily use all that data to create
    a tree, as is, with the help of adaptor tags.    #### Using <rich:treeModelAdaptor>    `<rich:treeModelAdaptor>`
    allows you to point the tree to some `Collection` or `Map` with any objects and
    add them as a nodes to the tree model. It has a `nodes` attribute that’s used
    to point the adaptor to the data. Tree could be defined with any number of adaptors
    at the same level, and adaptors can also be nested in order to define child nodes
    as needed.    Let’s create an example. First, we will create the model that will
    store data in a `List`. [Listing 9-22](#Chapter09.html#list_9_22) shows the base
    object, which will define an abstract entity (we called it `Entry`) with a set
    of properties defined.    ***Listing 9-22.** Shows an example of the base object*  `public
    class Entry {` `   private String name;`  `   private List<String> properties;`
    `   // Getters and setters`  `   public Entry(String name) {` `      super();`
    `      this.name = name;` `   }`  `}`  The class defines two properties: the `properties`
    list, representing a list of simple string properties related to an entry, and
    the `name` string, which stores the name of the entry. Next, in [Listing 9-23](#Chapter09.html#list_9_23),
    let’s create the managed bean that will initialize the collection of entries and
    that we will use to build the tree.    ***Listing 9-23.** The managed bean*  `@ManagedBean`
    `@SessionScoped` `public class DeclarativeTreeNodesBean {`  `   private List<Entry>
    entries = null;`  `   public void initEntries(){` `      entries = new ArrayList<Entry>();`  `      Entry
    entry = new Entry("Desktop Type");` `      List<String> childEntries = new ArrayList<String>();`
    `      childEntries.add("Compact");` `      childEntries.add("Everyday");` `      childEntries.add("Gaming");`
    `      childEntries.add("Premium");` `      entry.setProperties(childEntries);`
    `      entries.add(entry);`  `      entry = new Entry("Customer Reviews");` `      childEntries
    = new ArrayList<String>();` `      childEntries.add("Top Rated");` `      entry.setProperties(childEntries);`
    `      entries.add(entry);`  `      //More initialization stuff` `   }` `   public
    List<Entry> getEntries() {` `      if (entries == null) {` `         initEntries();`
    `      }` `      return entries;` `   }` `   public void setEntries(List<Entry>
    entries) {` `      this.entries = entries;` `   }` `}`  We have a list of `Entry`
    objects, and every `Entry` is initialized with its properties. We used the same
    data as from the previous example. In [Listing 9-24](#Chapter09.html#list_9_24),
    let’s review the page code, which defines `<rich:tree>` and points it to the plain
    data model using `<rich:treeModelAdaptor>` tag.    ***Listing 9-24.** Review the
    page code*  `<rich:tree var="node" toggleType="client">` `   <rich:treeModelAdaptor
    nodes="#{declarativeTreeNodesBean.entries}">` `      <rich:treeNode>` `         #{node.name}`
    `      </rich:treeNode>` `      <rich:treeModelAdaptor nodes="#{node.properties}"/>`
    `   </rich:treeModelAdaptor>` `</rich:tree>`  [Figure 9-10](#Chapter09.html#fig_9_10)
    shows how it looks. Go ahead review the code more closely.  ![images](images/0910.jpg)  ***Figure
    9-10.** Tree built using model adaptor*    ![images](images/square.jpg) **Note**
    The adaptor doesn''t provide a `var` attribute. The `<rich:tree> var` variable
    can be used at any level.    That’s definitely what we expected to see. Notice
    that we achieved the result by only using page tags and without any modifications
    at model level or without creation of any kind of `TreeNode` objects and storing
    them hierarchically.    Let’s look at the page code again. The first `<rich:treeModelAdaptor>`
    iterates over our list of entries and constructs the first level of the tree.
    We are using `<rich:treeNode>` as usual in order to define the markup of the created
    tree nodes. In our case, we need to name the property of the `Entry` to be rendered
    as a node label.    As we mentioned before, adaptors could be nested without any
    restrictions. In our case, a nested adaptor iterates the list of properties for
    the currently iterated `Entry`. Properties objects are just string objects, so
    we have no need for it in `<rich:treeNode>` usage, as each will be only used as
    the labels.    #### Using <rich:treeModelRecursiveAdaptor>    `<rich:treeModelRecursiveAdaptor>`
    is an extension of a `<rich:treeNodesAdaptor>` component. According to the name,
    it provides a simple way to create a tree model iterating over an existing model
    recursively. It should be defined using two base attributes: the `roots` attribute
    defines the collection or map used at the top of the recursion, and the `nodes`
    is used to add nested nodes recursively.    The most common and probably most
    often used example for such model is the file system representation. We will show
    you how to create such a sample using the code, which has no tree-specific objects.
    The tree data model will again be automatically created by the component with
    the help of the adaptors tags.    In our example, we will get all the directories
    and file listings from our application web root folder. [Listing 9-25](#Chapter09.html#list_9_25)
    shows the code for the base `FileSystem` node class.    ***Listing 9-25.** Shows
    the code for the base `FileSystem` node class*  `public class FileSystemNode {`
    `   private String path;` `   private List<FileSystemNode> directories;` `   private
    List<String> files;` `   private String shortPath;`  `   private static final
    Function<String, FileSystemNode> FACTORY =` `      new Function<String,  FileSystemNode>()
    {` `         public FileSystemNode apply(String from) {` `            return new
    FileSystemNode(from.substring(0, from.length() - 1));` `         };` `   };` `   private
    static final Function<String, String> TO_SHORT_PATH = new` `      Function<String,
    String>() {` `      public String apply(String from) {` `         int idx = from.lastIndexOf(''/'');`
    `         if (idx < 0) {` `            return from;` `         }` `         return
    from.substring(idx + 1);` `      };` `   };` `   public FileSystemNode(String
    path) {` `      this.path = path;` `      int idx = path.lastIndexOf(''/'');`
    `      if (idx != -1) {` `         shortPath = path.substring(idx + 1);` `      }
    else {` `         shortPath = path;` `      }` `   }   ` `   public synchronized
    List<FileSystemNode> getDirectories() {` `      if (directories == null) {` `         directories
    = Lists.newArrayList();` `         Iterables.addAll(directories,` `         Iterables.transform(Iterables.filter(getResourcePaths(),
    Predicates.containsPattern("/$")),` `         FACTORY));` `      }` `      return
    directories;` `   }` `   public synchronized List<String> getFiles() {` `      if
    (files == null) {` `         files = new ArrayList<String>();` `         Iterables.addAll(files,
    Iterables.transform(` `         Iterables.filter(getResourcePaths(),` `            Predicates.not(Predicates.containsPattern("/$"))),`
    `            TO_SHORT_PATH));` `      }` `      return files;` `   }` `   private
    Iterable<String> getResourcePaths() {` `      FacesContext facesContext = FacesContext.getCurrentInstance();`
    `      ExternalContext externalContext = facesContext.getExternalContext();` `      Set<String>
    resourcePaths = externalContext.getResourcePaths(this.path);` `      if (resourcePaths
    == null) {` `         resourcePaths = Collections.emptySet();` `      }` `      return
    resourcePaths;` `   }   ` `   public String getShortPath() {` `      return shortPath;`
    `   }` `}`  The `FileSystemNode` object returns the list of directories and files
    at given levels and defines a set of utility methods used in order to transform
    path strings, providing simple representation for them. It uses Google''s Guava
    libraries, which make working with collections much simpler. You can learn more
    about the project from Guava: Google Core Libraries for Java 1.5+ at [`http://code.google.com/p/guava-libraries`](http://code.google.com/p/guava-libraries).    The
    bean that defines the root level and operates with the `FileSystemNode` objects
    to get the file system structure starting from the root directory is shown in
    [Listing 9-26](#Chapter09.html#list_9_26).    ***Listing 9-26.** The bean that
    defines the root level and operates with the `FileSystemNode` objects*  `@ManagedBean`
    `@RequestScoped` `public class FileSystemBean {`  `   private List<FileSystemNode>
    rootDirs;` `   private List<String> rootFiles;` `   private FileSystemNode rootNode
    = new FileSystemNode("/");`  `   public List<FileSystemNode> getRootDirs() {`
    `      if (rootDirs == null) {` `         rootDirs = rootNode.getDirectories();`
    `      }` `      return rootDirs;` `   }` `   public List<String> getRootFiles()
    {` `      if (rootFiles == null) {` `         rootFiles = rootNode.getFiles();`
    `      }` `      return rootFiles;` `   }` `}`  Let''s look at what we have. The
    bean returns a list of files and directories for the root level. Besides every
    `FileSystemNode`, which actually represents a directory, it''s also possible to
    create a list of directories and files inside. Now we just need to reflect that
    in the `<rich:tree>` page definition using adaptor tags shown in [Listing 9-27](#Chapter09.html#list_9_27).    ***Listing
    9-27.** Create a list of directories and files inside*  `<rich:tree toggleType="client"
    var="item">` **`   <rich:treeModelRecursiveAdaptor roots="#{fileSystemBean.rootDirs}"`
    `      nodes="#{item.directories}">`** `   <rich:treeNode>` `     #{item.shortPath}`
    `   </rich:treeNode>` **`      <rich:treeModelAdaptor nodes="#{item.files}">`**
    `      <rich:treeNode>#{item}</rich:treeNode>` `   </rich:treeModelAdaptor>` `  </rich:treeModelRecursiveAdaptor>`
    **`      <rich:treeModelAdaptor nodes="#{fileSystemBean.rootFiles}">`** `      <rich:treeNode>#{item}</rich:treeNode>`
    `  </rich:treeModelAdaptor>` `</rich:tree>`  The recursive tree node adaptor defined
    first, iterates over the directories starting from `rootDirs` and recursively
    retrieving directories as defined in the `nodes` attribute. In addition to nested
    `<rich:treeModelAdaptor>`, adaptor iterates over the files inside every directory.    The
    second adapter, which is nested inside `<rich:tree>`, iterates over root-level
    directory files. [Figure 9-11](#Chapter09.html#fig_9_11) shows the result after
    the tree gets rendered and we expanded a few nodes.  ![images](images/0911.jpg)  ***Figure
    9-11.** Tree built using the recursive model adaptor*    ![images](images/square.jpg)
    **Note** As of writing of this book and the first release of RichFaces version
    4.0, tree components don''t provide JavaScript API. We anticipate such API will
    be added in a future RichFaces release.    ### Summary    This chapter covered
    one of the most important components in RichFaces: tree. Although also considered
    one of the most difficult to use (in any framework), RichFaces provides a number
    of features that make working with trees rather simple, but at the same time flexible
    and powerful.    RichFaces allows you to build and display a tree structure based
    on an existing Swing model, but also allows you to build custom models. We have
    also shown you how to expand and collapse nodes and invoke server-side listeners
    when a node is selected. Finally, we covered how to take a list structure and
    present it in a tree structure using the powerful RichFaces tree adaptors.    ##
    C H A P T E R  10    ## Rich Drag-and-Drop Components    Being able to drag and
    drop items inside a browser is cool and becoming an important feature. RichFaces
    provides a set of features that enable you to drag and drop almost any JSF component.
    The available drag-and-drop components provide everything you need, so you won''t
    have to deal with any JavaScript. Although drag-and-drop is happening on the client
    side, RichFaces allows binding drag-and-drop events to server-side listeners.
    Another thing to keep in mind is that drag-and-drop components are actually just
    functional components (similar to the Core tag library in JSF), so they don''t
    provide a lot in terms of UI, only the functionality to drag-and-drop other components.    ###
    Using <rich:dragSource> and <rich:dropZone>    Enabling drag-and-drop in JSF pages
    using RichFaces can be done by only using two tags: `<rich:dragSource>` and `<rich:dropTarget>`.
    `<rich:dragSource>` is nested inside the component that you want to drag and `<rich:dropTarget>`
    is nested inside the component that should become the drop zone. Let''s first
    cover some of the basic attributes and then run through an example.    As we mentioned,
    these drag and drop components are added as children to any components, and will
    encode all the necessary JavaScript to make the source draggable and the target
    a drop zone. [Listing 10-1](#Chapter10.html#list_10_1) shows an example of making
    the image component draggable.    ***Listing 10-1.** An example of making the
    image component draggable*  `<h:graphicImage value="/images/nikon-dx3100.png"`
    **`id="dragImage">`** **`   <rich:dragSource/>`** `</h:graphicImage>`  An image
    is rendered but it is also now draggable. Drag it with the mouse as you usually
    do with any desktop items. The result is shown in [Figure 10-1](#Chapter10.html#fig_10_1).  ![images](images/1001.jpg)  ***Figure
    10-1.** Dragged image*    ![images](images/square.jpg) **Note** Two examples of
    components in JSF that don''t encode an id to the client unless you specify it
    explicitly are `<h:outputText>` and `<h:graphicImage>`. If you are adding drag-and-drop
    capability to such components and no id is present, drag-and-drop will not work.
    Adding drag-and-drop capability to component requires that the client id is present.
    So, a good practice is always to specify the id for a component.    So far nothing
    is happening after we release the element. The dragged image simply disappears
    from the screen; but that''s what is supposed to happen. RichFaces drag-and-drop
    components do not provide client-side reordering of elements within a DOM tree
    or any sort of absolute position change. To process the drop of the component,
    we need to define a drop zone. Once a component is dropped into this zone, we
    can send an Ajax request in order to process the drop event. Basically, `<rich:dropTarget>`
    provides a way to attach a client-side listener for a drop operation that will
    send a standard Ajax request. Let''s add `<rich:dropTarget>` to the page. Remember
    that both tags register listeners on parent components, so we will use `<rich:panel>`
    as a drop zone. [Listing 10-2](#Chapter10.html#list_10_2) shows the code.    ***Listing
    10-2.** Adding `<rich:dropTarget>` to the page*  `<h:form>` `   <a4j:status startText="Processing
    drop event"/>` `   <rich:panel id="dropZone" header="Drop Here">` `      <rich:dropTarget/>`
    `   </rich:panel>` `</h:form>`  The result shown in [Figure 10-2](#Chapter10.html#fig_10_2).  ![images](images/1002.jpg)  ***Figure
    10-2.** <rich:panel> as a drop zone*    As you see we also added `<a4j:status>`
    to show the Ajax request status. However, after we drag the image and drop it
    into the panel, we still don''t see status component activation. So the request
    is not being sent. We are still missing one thing to make it work.    You can
    attach the drag component to any component and also attach the drop component
    to any component. It''s required to declare which drag sources correspond to which
    drop zones. In other words, you need to define that items of type A, for example,
    can be dropped into only one particular drop zone and not any other.    To make
    this work, we need to define a `type` attribute on the `<rich:dragSource>` component.
    It should be any string identifier that will be used to attach it to the drop
    target. Then we should define an `acceptedTypes` attribute for `<rich:dropTarget>`.
    It should be set to all accepted drag sources. You can use a comma or a space
    to separate string values or bind the attribute to a bean property that holds
    `Set` or `List` of types.    [Listing 10-3](#Chapter10.html#list_10_3) shows the
    code with all the updates.    ***Listing 10-3.** Shows the updated code*  `<h:graphicImage
    value="/images/nikon-dx3100.png" id=`**`"dragImage"`**`>` `<rich:dragSource` **`type="img"/>`**
    `</h:graphicImage>` `<a4j:status startText="Processing drop event" />` `<h:form>`
    `   <rich:panel id="dropZone" header="Drop Here">` `<rich:dropTarget` **`acceptedTypes="img"/>`**
    `   </rich:panel>` `</h:form>`  Finally, after dropping the image into the panel,
    the Ajax request status should be shown as illustrated in [Figure 10-3](#Chapter10.html#fig_10_3).  ![images](images/1003.jpg)  ***Figure
    10-3.** Ajax request sent after drop event*    In this example we set the drag
    source type (`type="img"`) and then defined `acceptedTypes="img"` to make sure
    that only the component of that type can be dropped into this drop zone. If you
    have a drop zone that should accept any types of draggable components, then, instead
    of listing each accepted type, we could set the drop zone to accept any type,
    such as the following:  `acceptedTypes="@all"`   Even though any component can
    now be dropped into this drop zone, we still need to define the drag source type
    for every `<rich:dragSource>` component.    ### Invoking Server-side Listener
    on Drop    Things are looking good—we can drag-and-drop components—but we are
    still missing something. The missing part is the ability to invoke server-side
    listeners when a drop occurs, in order to add some business logic to those operations.    To
    add a server-side listener, we define the `dropListener` attribute for `<rich:dropTarget>`
    with a method expression to the listener inside the bean. The listener method
    signature is as follows:  `public void listenerName(org.richfaces.event.DropEvent
    event)`  We will touch on `DropEvent` and the information it exposes in listener
    code shortly, but for now let''s cover two more attributes that should be used
    to handle a drop operation on the server side and which are related to the `DropEvent`.
    `dragValue` defined on `<rich:dragSource>` and `dropValue` defined on `<rich:dropTarget>`
    are used in order to pass additional information to the listener.    Now let''s
    review `DropEvent` closer. [Table 10-1](#Chapter10.html#tab_10_1) lists methods
    available on the `DropEvent` object.    ![images](images/t1001.jpg)    ![images](images/square.jpg)
    **Note** It''s also possible to use `<f:param>` or `<a4j:param>` tags to pass
    parameters to `<rich:dropTarget>` as we do for JSF links, buttons, or any other
    action component. However, because `<rich:dragSource>` is not an action component,
    it will not process the additional parameters.    ### Shopping Cart Example    Let''s
    create an example that consists of a list of products and a shopping cart. Moving
    products into the cart will be implemented using drag and drop. [Listing 10-4](#Chapter10.html#list_10_4)
