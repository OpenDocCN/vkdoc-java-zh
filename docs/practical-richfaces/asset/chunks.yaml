    context parameter in your *`web.xml`* file, so RichFaces will take the value of
    the parameter and parse bundled RichFaces ECSS stylesheets on the fly to fill
    corresponding properties with values from skin properties. Yes, it is still plain
    CSS behind the scenes.    ![images](images/square.jpg) **Note**  In addition to
    dynamic resources generation, RichFaces offers an option to generate all the skin
    resources during application compile time. That allows it to serve resources in
    a static manner through CDN (Content Delivery Network), for example. RichFaces
    provides a special resource plug-in that is responsible for static resources generation
    and makes it possible to deploy a RichFaces application in the cloud.    ![images](images/square.jpg)
    **Note**  In RichFaces 4 a new ECSS (EL CSS) format that uses standard CSS syntax
    is introduced, removing proprietary `.xcss` format. Later we’ll show you how it
    looks and why a separate format rather than CSS parsing is used.    ### Creating
    Your Own Skins    As you can see, several skins are available for you to try,
    but you might want to create your own. That’s easy enough to do. In fact, you
    can basically take an existing skin and make changes until you like how the page
    is rendered.    First you have to place a custom skin where RichFaces can find
    it. You can put it in one of the following classpath directories in your application:
    `META-INF/skins/` or `WEB-INF/classes`.    ![images](images/square.jpg) **Note**  You
    could use skins packaged in application JAR files. Skin files should be placed
    in `META-INF/skins/` folder inside the JAR file.    Take the `ruby` skin and copy
    it to the Java source directory in the application. When the application is built,
    it will be copied to `WEB-INF/classes`.    Let’s say you want to change the skin
    name. Suppose you want to call your skin `newyork`. The naming convention is rather
    simple (`name.skin.properties`). Because you want to call your skin `newyork`,
    you will rename the file you just copied to  `newyork.skin.properties`  Next you
    have to register the skin in the `web.xml` file, as shown in [Listing 13-4](#Chapter13.html#list_13_4).    ***Listing
    13-4.** Register the skin in the `web.xml` file*  `<context-param>` `   <param-name>org.richfaces.skin</param-name>`
    `   <param-value>newyork</param-value>` `</context-param>`  If you keep it as
    it is, you simply have created a copy of the *`ruby`* skin with a different name.
    Your goal in this section is to create a custom skin that is different.    Make
    the changes to the following parameters in the skin, as shown in [Listing 13-5](#Chapter13.html#list_13_5).    ***Listing
    13-5.** Shows changes to the parameters in the skin*  `generalSizeFont=16px` `headerSizeFont=16px`  When
