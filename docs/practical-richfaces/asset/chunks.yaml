    #### 表排序


    本节将介绍 RichFaces 数据迭代组件中可用的排序功能。我们将使用一个基于 `List` 的示例，并在“迭代组件高级模型”部分介绍一个使用自定义数据模型的更复杂示例。


    基本排序功能可以通过两种方式实现：使用 JavaScript API 或使用外部控件。


    ![images](img/square.jpg) **注意** 截至本书编写时，尚未实现用于排序和筛选的内置控件。我们将介绍基本的 API。请查阅 JBoss
    社区的 RichFaces 组件参考文档 [`www.jboss.org/richfaces/docs`](http://www.jboss.org/richfaces/docs)
    以及其他信息资源，以了解何时可能添加此类控件。


    要开始排序，您需要做的就是在 `<rich:column>` 标签中添加 `sortBy` 属性，并将其指向某个对象属性（基于您想要排序的内容）。为了在请求之间存储排序状态，请使用
