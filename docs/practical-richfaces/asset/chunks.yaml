    <dependency>\n   <groupId>net.sf.ehcache</groupId>\n   <artifactId>ehcache</artifactId>\n\
    </dependency>\n```\n\n###### CDK (Component Development Kit) Annotations Dependencies\n\
    \n[Listing 2-4](#Chapter02.html#list_2_4) shows compile time dependency. It is\
    \ only needed if you are creating or accessing RichFaces components instances\
    \ in your application actions or listeners in order to define CDK annotations.\n\
    \n***Listing 2-4.** Shows compile time dependency*\n\n```\n<dependency>\n   <groupId>org.richfaces.cdk</groupId>\n\
    \   <artifactId>annotations</artifactId>\n   <scope>provided</scope>\n</dependency>\n\
    ```"
  raw: '#### When Starting with JSF, Keep an Open Mind


    It''s not difficult to find forums, blog posts, and other resources from people
    who are just starting with JSF and are dissatisfied with the framework. You must
    remember that most people who are starting with JSF are coming from JSP, Struts,
    or a similar homegrown framework. When they start evaluating JSF, they bring the
    same style and development approach to JSF that they used with JSP and Struts.
    This is where all the problems start.


    You can''t take that approach and use it with JSF. It provides a whole different
    paradigm to web development—as we''ve explained. The user interface is developed
    from UI components; it''s very different from what people are used to doing with
    JSP and Struts. So when someone tries to do simple things in a “JSP way” in JSF,
    they fail and get frustrated. He might say, “But I could do this in JSP in about
    five minutes.” Of course, he or she probably could, but JSP is not really doing
    anything more than mixing Java and HTML. JSP provides so little abstraction that
    you can do basically anything—even if in most cases it isn''t done correctly,
    the key is that it was still accomplished one way or another.


    This approach doesn''t work anymore in JSF. Before you become dissatisfied with
    JSF, it''s important to spend at least some time learning the framework and understanding
    how it works before actually evaluating it for a project. Put your JSP or Struts
    approach aside for a second, and learn how to build web applications using UI
    components. We promise that you will have much more success with JSF this way.


    ### Summary


    This chapter briefly introduced JSF, Ajax, and RichFaces. The goal was to give
    you a general picture of how all these technologies fit together. In [Chapter
    2](#Chapter02.html#ch2), you''ll install the tools you''ll use in this book, and
    then you will jump into using one of the first RichFaces tags, `<a4j:ajax>`.


    ## C H A P T E R  2


    ## Getting Started


    In this chapter we are going to get our hands dirty. We will set up our working
    environment so that you can try all the examples. As JSF 2 now has Ajax functionality
    built-in, we will cover that first and then move on to RichFaces and start showing
    you how RichFaces extends that functionality.


    ### Setting Up


    RichFaces can be used in any container that is JSF 2 compatible. This means all
    servers compliant with the Java EE 6 specification (JBoss AS6/7, Glassfish 3)
    and all major servlet containers (Tomcat, Jetty, and Resin).


    #### Adding RichFaces to an Existing JSF 2 Project


    Not to tie you to any specific IDE (integrated development environment), but we
    will use Apache Maven to set up a project. Since RichFaces is built on top of
    JSF 2, its installation is as easy as adding a few JARs to your project. Configure
    your repositories following the Maven Getting Started Guide located on the JBoss
    Community web site at [`http://community.jboss.org/wiki/MavenGettingStarted-Users`](http://community.jboss.org/wiki/MavenGettingStarted-Users).
    Then, simply add [Listing 2-1](#Chapter02.html#list_2_1) to your projects `pom.xml`.
    Complete Maven guide can be found at: [`http://www.sonatype.com/books/mvnref-book/reference`](http://www.sonatype.com/books/mvnref-book/reference).


    ***Listing 2-1.** Add this to your projects `pom.xml`*


    `<dependencyManagement>`

    `  <dependencies>`

    `    <dependency>`

    `      <groupId>org.richfaces</groupId>`

    `      <artifactId>richfaces-bom</artifactId>`

    `      <version>${richfaces.version}</version>`

    `      <scope>import</scope>`

    `      <type>pom</type>`

    `    </dependency>`

    `  </dependencies>`

    `</dependencyManagement>`

    `…`

    `<dependency>`

    `  <groupId>org.richfaces.ui</groupId>`

    `  <artifactId>richfaces-components-ui</artifactId>`

    `</dependency>`

    `<dependency>`

    `  <groupId>org.richfaces.core</groupId>`

    `  <artifactId>richfaces-core-impl</artifactId>`

    `</dependency>`


    For other build systems, such as Ant, just add the following JARs to your projects
    `WEB-INF/lib` directory:


    *   `richfaces-core-api-<ver>.jar`

    *   `richfaces-core-impl-<ver>.jar`

    *   `richfaces-components-api-<ver>.jar`

    *   `richfaces-components-ui-<ver>.jar`

    *   `sac-1.3.jar`

    *   `cssparser-0.9.5.jar`

    *   `google-guava-r08.jar`


    ![images](images/square.jpg) **Note** Version of `sac-x.x.jar` and `cssparster-x.x.x.jar`
    are the most current as of writing of this book. Please check the JBoss Community
    RichFaces web site at [`www.jboss.org/richfaces`](http://www.jboss.org/richfaces)
    for the latest versions.


    ##### Optional Dependencies


    There are a number of optional JAR files (dependencies) you may want to add to
    a RichFaces project depending on your deployment or features you want to use.
    The optional JAR files are for client-side validation when using Apache Tomcat,
    caching, and using Component Development Kit annotations.


    ###### Validation Dependencies


    If you are deploying to Apache Tomcat and will be using client-side validation,
    then the following JARs are also needed:


    *   `validation-api.jar`

    *   `hibernate-validator.jar`

    *   `slf4j-api.jar`

    *   `slf4j-jdk14.jar`


    [Listing 2-2](#Chapter02.html#list_2_2) shows the Maven dependency that should
    be used.


    ***Listing 2-2.** The Maven dependency that should be used*


    `<dependency>`

    `   <groupId>org.hibernate</groupId>`

    `   <artifactId>hibernate-validator</artifactId>`

    `   <version>4.1.0.Final</version>`

    `</dependency>`


    ![images](images/square.jpg) **Note** `validation-api` will be brought in transitively
    with `hibernate-validator`.


    If deploying to a Java EE 6 server, then these libraries are not needed with the
    application because they are included in the server. It''s still a good idea to
    include the dependency, but change the `scope` to `provided` in order to use during
    the application build.


    ###### Caching Dependencies


    For optimal performance it''s recommended to add one of the following caching
    frameworks to the application classpath: Ehcache, JBoss Cache, or OSCache. When
    you create a new RichFaces project with the RichFaces Maven archetype, Ehcache
    dependency is present in the `pom.xml` file, as shown in [Listing 2-3](#Chapter02.html#list_2_3).


    ***Listing 2-3.** Create a new RichFaces project with the RichFaces Maven archetype*


    `<dependency>`

    `   <groupId>net.sf.ehcache</groupId>`

    `   <artifactId>ehcache</artifactId>`

    `</dependency>`


    ###### CDK (Component Development Kit) Annotations Dependencies


    [Listing 2-4](#Chapter02.html#list_2_4) shows compile time dependency. It is only
    needed if you are creating or accessing RichFaces components instances in your
    application actions or listeners in order to define CDK annotations.


    ***Listing 2-4.** Shows compile time dependency*


    `<dependency>`

    `   <groupId>org.richfaces.cdk</groupId>`

    `   <artifactId>annotations</artifactId>`

    `   <scope>provided</scope>`

    `</dependency>`'
  trans: '

    #### 初学 JSF 时，请保持开放心态


    不难找到一些论坛、博客文章和其他资源，它们来自刚开始接触 JSF 并对该框架感到不满的人。你必须记住，大多数刚开始学习 JSF 的人都是从 JSP、Struts
    或类似的自制框架转过来的。当他们开始评估 JSF 时，他们带着与使用 JSP 和 Struts 时相同的风格和开发方法来对待 JSF。这就是所有问题的根源。


    你不能用那种方法来使用 JSF。正如我们所解释的，它为 Web 开发提供了一种完全不同的范式。用户界面是由 UI 组件开发的；这与人们习惯用 JSP 和 Struts
    做的事情截然不同。因此，当有人试图在 JSF 中以“JSP 的方式”做简单的事情时，他们会失败并感到沮丧。他可能会说：“但我用 JSP 大约五分钟就能搞定。”当然，他或她可能确实能做到，但
    JSP 实际上不过是把 Java 和 HTML 混在一起。JSP 提供的抽象程度极低，以至于你基本上可以做任何事情——即使大多数情况下做得并不正确，关键在于它总归是完成了。


    这种方法在 JSF 中不再适用。在你对 JSF 感到不满之前，重要的是至少花一些时间学习这个框架，了解它是如何工作的，然后再实际评估它是否适合某个项目。暂时把你的
    JSP 或 Struts 方法放在一边，学习如何使用 UI 组件构建 Web 应用程序。我们保证，用这种方式使用 JSF，你会取得更大的成功。


    ### 小结


    本章简要介绍了 JSF、Ajax 和 RichFaces。目的是让你大致了解所有这些技术是如何结合在一起的。在第 2 章中，你将安装本书中使用的工具，然后开始使用第一个
    RichFaces 标签`<a4j:ajax>`。


    ## 第 2 章


    ## 入门


    在本章中，我们将动手实践。我们将设置工作环境，以便你可以尝试所有示例。由于 JSF 2 现在内置了 Ajax 功能，我们将首先介绍这一点，然后转向 RichFaces，并开始向你展示
    RichFaces 如何扩展该功能。


    ### 环境设置


    RichFaces 可用于任何兼容 JSF 2 的容器。这意味着所有符合 Java EE 6 规范的服务器（JBoss AS6/7、Glassfish 3）以及所有主要的
    Servlet 容器（Tomcat、Jetty 和 Resin）。


    #### 将 RichFaces 添加到现有 JSF 2 项目


    为了不让你局限于任何特定的 IDE（集成开发环境），我们将使用 Apache Maven 来设置项目。由于 RichFaces 构建在 JSF 2 之上，其安装就像向项目添加几个
    JAR 文件一样简单。按照 JBoss 社区网站上位于[`http://community.jboss.org/wiki/MavenGettingStarted-Users`](http://community.jboss.org/wiki/MavenGettingStarted-Users)的
    Maven 入门指南配置你的仓库。然后，只需将清单 2-1 添加到你的项目`pom.xml`中。完整的 Maven 指南可在[`http://www.sonatype.com/books/mvnref-book/reference`](http://www.sonatype.com/books/mvnref-book/reference)找到。


    ***清单 2-1.** 将此添加到你的项目`pom.xml`中*


    `<dependencyManagement>`

    `  <dependencies>`

    `    <dependency>`

    `      <groupId>org.richfaces</groupId>`

    `      <artifactId>richfaces-bom</artifactId>`

    `      <version>${richfaces.version}</version>`

    `      <scope>import</scope>`

    `      <type>pom</type>`

    `    </dependency>`

    `  </dependencies>`

    `</dependencyManagement>`

    `…`

    `<dependency>`

    `  <groupId>org.richfaces.ui</groupId>`

    `  <artifactId>richfaces-components-ui</artifactId>`

    `</dependency>`

    `<dependency>`

    `  <groupId>org.richfaces.core</groupId>`

    `  <artifactId>richfaces-core-impl</artifactId>`

    `</dependency>`


    对于其他构建系统，如 Ant，只需将以下 JAR 文件添加到项目的`WEB-INF/lib`目录中：


    *   `richfaces-core-api-<ver>.jar`

    *   `richfaces-core-impl-<ver>.jar`

    *   `richfaces-components-api-<ver>.jar`

    *   `richfaces-components-ui-<ver>.jar`

    *   `sac-1.3.jar`

    *   `cssparser-0.9.5.jar`

    *   `google-guava-r08.jar`


    ![images](img/square.jpg) **注意** `sac-x.x.jar`和`cssparster-x.x.x.jar`的版本是本书撰写时的最新版本。请访问
    JBoss 社区 RichFaces 网站[`www.jboss.org/richfaces`](http://www.jboss.org/richfaces)查看最新版本。


    ##### 可选依赖项


    根据你的部署或想要使用的功能，你可能需要向 RichFaces 项目添加一些可选的 JAR 文件（依赖项）。这些可选的 JAR 文件用于在使用 Apache
    Tomcat 时的客户端验证、缓存以及使用组件开发工具包注解。


    ###### 验证依赖项


    如果你要部署到 Apache Tomcat 并将使用客户端验证，则还需要以下 JAR 文件：


    *   `validation-api.jar`

    *   `hibernate-validator.jar`

    *   `slf4j-api.jar`

    *   `slf4j-jdk14.jar`


    清单 2-2 显示了应使用的 Maven 依赖项。


    ***清单 2-2.** 应使用的 Maven 依赖项*


    `<dependency>`

    `   <groupId>org.hibernate</groupId>`

    `   <artifactId>hibernate-validator</artifactId>`

    `   <version>4.1.0.Final</version>`

    `</dependency>`


    ![images](img/square.jpg) **注意** `validation-api`将通过`hibernate-validator`传递引入。


    如果部署到 Java EE 6 服务器，则应用程序不需要这些库，因为它们已包含在服务器中。仍然建议包含该依赖项，但将`scope`更改为`provided`，以便在应用程序构建期间使用。


    ###### 缓存依赖项


    为了获得最佳性能，建议将以下缓存框架之一添加到应用程序类路径中：Ehcache、JBoss Cache 或 OSCache。当你使用 RichFaces Maven
    原型创建新的 RichFaces 项目时，`pom.xml`文件中会存在 Ehcache 依赖项，如清单 2-3 所示。


    ***清单 2-3.** 使用 RichFaces Maven 原型创建新的 RichFaces 项目*


    `<dependency>`

    `   <groupId>net.sf.ehcache</groupId>`

    `   <artifactId>ehcache</artifactId>`

    `</dependency>`


    ###### CDK（组件开发工具包）注解依赖项


    清单 2-4 显示了编译时依赖项。仅当你在应用程序操作或监听器中创建或访问 RichFaces 组件实例以定义 CDK 注解时才需要它。


    ***清单 2-4.** 显示编译时依赖项*


    `<dependency>`

    `   <groupId>org.richfaces.cdk</groupId>`

    `   <artifactId>annotations</artifactId>`

    `   <scope>provided</scope>`

    `</dependency>`

