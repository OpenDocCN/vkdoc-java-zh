    #### Using <rich:tooltip> with Data Iteration Components


    Like the popup panel, the *`<rich:toolTip>`* component can be useful with data
    iteration components. For example, when mouse cursor is moved over a particular
    row cell, more information is displayed in the tooltip about that record.


    One way to pre-render the content of the tooltip for each row is by setting *`mode="client"`*,
    as shown in [Listing 6-45](#Chapter06.html#list_6_45).


