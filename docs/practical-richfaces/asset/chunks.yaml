    the *`<rich:dataGrid>`* component and pass the image to a *`<a4j:mediaOutput>`*
    component in order to output the image file thumbnail.


    #### Component Facets


    A single `progress` facet is available on the `<rich:fileUpload>` component. It
    allows you to redefine built-in `<rich:progressBar>` functionality in the component.
    You could place `<rich:progressBar>` inside the facet and customize its behavior
    or look and feel as you need.


    #### Component JavaScript API


