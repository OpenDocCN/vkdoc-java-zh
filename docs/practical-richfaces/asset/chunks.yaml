  trans: '好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。



    清单 7-41 展示了页面代码。    ***清单 7-41.** 页面代码*  `<h:form>` `    <rich:panel style="width:650px"
    header="rich:dataTable sample">` `        <rich:dataTable value="#{olympicGamesBean.games}"
    var="game" id="table">` `            <f:facet name="header">奥运会列表</f:facet>` `            <rich:column>`
    `                <f:facet name="header">旗帜</f:facet>` `                <h:graphicImage
    value="#{game.flagURI}" />` `            </rich:column>` `<rich:column` **`filterExpression="#{fn:startsWith(game.city,`**
    **`filteringBean.cityFilterString)}"`**`>` `                <f:facet name="header">`
    **`<h:inputText value="#{filteringBean.cityFilterString}">`** **`<a4j:ajax render="table@body"
    />`** **`</h:inputText>`** `                </f:facet>` `                #{game.city}`
    `            </rich:column>` `<rich:column` **`filterExpression="#{fn:containsIgnoreCase(game.country,`**
    **`filteringBean.countryFilterString)}">`** `                <f:facet name="header">`
    **`<h:inputText value="#{filteringBean.countryFilterString}">`** **`<a4j:ajax
    render="table@body" />`** **`</h:inputText>`** `                </f:facet>` `                #{game.country}`
    `            </rich:column>` `            <rich:column>` `                <f:facet
    name="header">季节</f:facet>` `                #{game.season}` `            </rich:column>`
    `<rich:column` **`filter="#{filteringBean.centuryFilter}">`** `                <f:facet
    name="header">` **`<h:selectOneMenu value="#{filteringBean.centuryFilterNumber}">`**
    **`<a4j:ajax render="table@body" />`** `                        <f:selectItem
    itemLabel="" itemValue="0" />` `                        <f:selectItem itemLabel="19
    世纪" itemValue="19" />` `                        <f:selectItem itemLabel="20 世纪"
    itemValue="20" />` `                        <f:selectItem itemLabel="21 世纪" itemValue="21"
    />` `                    </h:selectOneMenu>` `                </f:facet>` `                #{game.year}`
    `            </rich:column>` `        </rich:dataTable>` `    </rich:panel>` `</h:form>`  在页面上，我们看到三列被定义为可过滤的。城市列使用了
    `fn:startWith` JSTL 函数，国家列使用了 `fn:containsIgnoreCase`。第三列使用了绑定到 `FilteringBean`
    中 `centuryFilter` 对象的 `filter` 属性。前两列的当前过滤值存储在两个字符串属性中，这两个属性绑定到输入 `cityFinteringString`
    和 `countryFilteringString`，以及一个存储在 `FilteringBean` 的 `centuryFilteringNumber`
    字段中的整数属性。作为过滤的结果，我们应该只更新表格中的数据，并且不丢失输入焦点。我们使用 `body` 元组件，通过 `<a4j:ajax>` 仅更新了表格的主体，这在本章的“使用部分表格更新”部分中提到过。    清单
    7-42 展示了 Bean 的代码。    ***清单 7-42.** Bean 代码*  `@ManagedBean` `@ViewScoped` `public
    class FilteringBean implements Serializable{`  `    private String cityFilterString;`
    `    private String countryFilterString;` `    private int centuryFilterNumber;`  `    public
    Filter<GameDescriptor> getCenturyFilter() {` `        return new Filter<GameDescriptor>()
    {` `            @Override` `            public boolean accept(GameDescriptor t)
    {` `                switch (centuryFilterNumber) {` `                    case
    19:` `                        return (t.getYear() >= 1800) && (t.getYear() < 1900);`
    `                    case 20:` `                        return (t.getYear() >=
    1900) && (t.getYear() < 2000);` `                    case 21:` `                        return
    (t.getYear() >= 2000);` `                    default:` `                    return
    true;` `                }` `            }` `        };` `    }` `    //Getters
    and Setters` `}`  `cityFilteringString` 和 `countryFilteringString` 属性会根据 `filterExpression`
    属性中定义的 JSTL 函数，与每个奥运会的相应属性进行比较。`CenturyFilter` 对象可能是我们最感兴趣的。正如我们之前所说，类似于排序 `comparator`
    的用法，迭代对象（`GameDescriptor`）会在每次迭代时传递给 `accept` 方法，以检查它是否满足过滤条件。我们根据可能的选择组件值使用一个简单的
    `switch` 语句来检查当前对象的年份是否与所选世纪匹配。    图 7-30 展示了按国家和世纪过滤后的表格外观。  ![images](img/0730.jpg)  ***图
    7-30.** 表格过滤*    非常简单，不是吗？现在让我们向您展示第二种方法，即使用 JavaScript API。表格客户端对象提供了 `filter()`
    API 方法。此方法需要传入三个参数：列 ID、当前过滤值和清除标志。第一个和第二个参数是必需的，无需解释。第三个参数决定了在调用新的过滤时，是清除其他过滤规则还是将其添加到之前的规则中。    清单
    7-43 展示了 API 使用示例的页面代码。    ***清单 7-43.** API 使用*  `<h:form>` `    <rich:panel
    style="width:650px" header="rich:dataTable sample">` `        <a4j:outputPanel
    ajaxRendered="true" layout="block">` `            <a4j:repeat value="#{filteringBean.continents}"
    var="cont">` **`<h:outputLink value="#"`** **`styleClass="#{filteringBean.continentFilterString==cont
    ?`** **`''bold'':''''}">`** **`#{cont}`** **`<rich:componentControl target="table2"
    operation="filter" event="click">`** **`<f:param value="contCol"/>`** **`<f:param
    value="#{cont}"/>`** **`</rich:componentControl>`** **`</h:outputLink> |`** `            </a4j:repeat>`
    `        </a4j:outputPanel>` `        <a4j:outputPanel ajaxRendered="true" layout="block">`
    `            <h:outputLink value="#" styleClass="#{filteringBean.centuryFilterNumber==0
    ?` `               ''bold'':''''}"` `                onclick=`**`"#{rich:component(''table2'')}.filter(''centCol'',
    0);`** `return false;">` `                    全部可用` `            </h:outputLink>
    |` `            <h:outputLink value="#" styleClass="#{filteringBean.centuryFilterNumber==19
    ?` `               ''bold'':''''}"` `                onclick=`**`"#{rich:component(''table2'')}.filter(''centCol'',
    19);`** `return false;">` `                19 世纪` `            </h:outputLink>
    |` `            <h:outputLink value="#" styleClass="#{filteringBean.centuryFilterNumber==20
    ?` `               ''bold'':''''}"` `                onclick=`**`"#{rich:component(''table2'')}.filter(''centCol'',
    20);`** `return false;">` `                20 世纪` `            </h:outputLink>
    |` `            <h:outputLink value="#" styleClass="#{filteringBean.centuryFilterNumber==21
    ?` `               ''bold'':''''}"` `                onclick=`**`"#{rich:component(''table2'')}.`**`filter(''centCol'',
    21); return false;">` `                21 世纪` `            </h:outputLink> |`
    `        </a4j:outputPanel>` `        <rich:dataTable value="#{olympicGamesBean.games}"
    var="game" id="table2">` `            <f:facet name="header">奥运会列表</f:facet>`
    `            <!--其他列-->` `<rich:column id="contCol"` **`filterValue="#{filteringBean.continentFilterString}"`**
    **`filterExpression="#{(filteringBean.continentFilterString=='''') ||`** **`(game.continent==filteringBean.continentFilterString)}">`**
    `                <f:facet name="header">大洲</f:facet>` `                    #{game.continent}`
    `            </rich:column>` `            <!--其他列-->` `<rich:column` **`filter="#{filteringBean.centuryFilter}"`**
    **`filterValue="#{filteringBean.centuryFilterNumber}"`** `id="centCol">` `                <f:facet
    name="header">年份</f:facet>` `                #{game.year}` `            </rich:column>`
    `        </rich:dataTable>` `    </rich:panel>` `</h:form>` 我们添加了与清单 7-42 中相同的世纪过滤器，对于大洲，我们使用了空或相等条件。为了执行过滤，我们调用了
    `filter()` API 方法，并传入了目标列 ID 和过滤值参数。    我们添加到 Bean 中的所有内容是一个带有 getter 方法的 `continents`
    数组，以便动态填充我们的过滤面板，如下所示：  `public final static String[] continents = { "欧洲", "亚洲",
    "北美洲", "南美洲", "大洋洲" };`  图 7-31 展示了点击“北美洲”和“21 世纪”链接后的结果。  ![images](img/0731.jpg)  ***图
    7-31.** 通过 JavaScript API 过滤的表格*    由于我们没有为过滤器定义输入，我们需要定义 `filterValue` 属性，其 EL
