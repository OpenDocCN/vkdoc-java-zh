  raw: '#### Customizing the <rich:dataScroller> Look and Feel


    `<rich:dataScroller>` allows flexible look-and-feel customization. It can be defined
    to be hidden if all values from the data model will fit onto just one page, as
    follows:


    `<rich:dataScroller renderIfSinglePage="false"/>`


    Forward and rewind button behavior can be customized in a similar way. There are
    three attributes to control them: `boundaryControls` (for first and next), `fastControls`
    (for switching to a few pages forward or back), and `stepControls` (previous and
    next).


    All the attributes can take the following values: `show` (default), `hide`, and
    `auto`. If the value is `hide`, the corresponding controls will not be rendered.
    If the value is `auto`, the controls will not be rendered in boundary scroller
    states (first, rewind, and previous steps controls will not be encoded when the
    table is on the first page). And if the value is `show`, the controls will be
    rendered, but disabled if an action is not available.


    By default, the fast-step control will switch to either the previous or next page.
    Using the `fastStep` attribute, you can configure how many pages to switch or
    jump. It should be defined with an integer value that indicates the number of
    pages that should be skipped on scrolling when using that control.


    The following is an example that uses these attributes:


    `<rich:dataScroller stepControls="hide" boundaryControls="auto" fastControls="auto"
    fastStep="3"/>`


    This example demonstrates that the next/previous controls will not be rendered;
    the first/last and fast-step controls will always be rendered; and that three
    pages will be switched on any fast-step control activation.


    In addition to controlling the behavior of the step and boundary buttons, you
    can also customize the look and feel of these buttons. The component offers various
    facets to control the appearance of the `first`, `last`, `next`, `previous`, `fastforward`,
    and `fastrewind` controls (and their disabled counterparts).


    You can create a facet for active (clickable) and inactive (not clickable) controls.
    An inactive control is, for example, when you are looking at the last page and
    the `next` control is disabled.


    [Listing 7-23](#Chapter07.html#list_7_23) shows an example with all the facets
    defined.


    ***Listing 7-23.** All control facets defined*


    `<rich:dataScroller >`

    `   <f:facet name="first">First</f:facet>`

    `   <f:facet name="first_disabled">First</f:facet>`

    `   <f:facet name="last">Last</f:facet>`

    `   <f:facet name="last_disabled">Last</f:facet>`

    `   <f:facet name="next">Next</f:facet>`

    `   <f:facet name="next_disabled">Next</f:facet>`

    `   <f:facet name="previous">Prev</f:facet>`

    `   <f:facet name="previous_disabled">Prev</f:facet>`

    `   <f:facet name="fastForward">FF</f:facet>`

    `   <f:facet name="fastForward_disabled">FF</f:facet>`

    `   <f:facet name="fastRewind">FR</f:facet>`

    `   <f:facet name="fastRewind_disabled">FR</f:facet>`

    `</rich:dataScroller>`


    This code produces the result shown in [Figure 7-18](#Chapter07.html#fig_7_18).


    ![images](images/0718.jpg)


    ***Figure 7-18.** Customizing scroller controls using facets*


    This example uses text to create the controls, but it’s possible to use any other
    components, as well as images, to create the controls.


    That covers boundary and step buttons. Let’s now look at page-number controls.
    If your data set contains hundreds of the pages, you definitely do not want to
    show page numbers for all of them. So it’s possible to control the number of page
    numbers that are displayed by setting the `maxPages` attribute.


    We also want to mention the `lastPageMode` attribute. It specifies the number
    of rows to display on the last page. If the last page contains only one row and
    you want the table to be the same size on any page, you should set the attribute
    to `full`. Let’s say you have 42 records, and you display five objects on a page.
    When you switch to the last page, it will only list the final two objects. With
    `lastPageMode` set to `full`, the last page will display five objects, starting
    from row 38\. If you want to display only the actual rows remaining, use the `short`
    value. Usage example for full mode will be shown in an upcoming JavaScript API
    example.


    #### Using Other Data Components with <rich:dataScroller>


    We have been using `<rich:dataTable>` to show how to use `<rich:dataScroller>`,
    but you can use `<rich:datascroller>` in a similar fashion with any other data
    iteration components.


    [Listing 7-24](#Chapter07.html#list_7_24) is an example using `<rich:list>` with
    `<rich:dataScroller>`. Note that the `for` attribute points to `<rich:list>`.


    ***Listing 7-24.** Using `<rich:list>` with `<rich:dataScroller>`*


    `<h:form>`

    `   <rich:panel header="Using rich:datascroller">`

    `<rich:list type="definitions" value="#{olympicGamesBean.games}" var="game"` **`rows="5"`**

    **`id="list"`**`>`

    `         <f:facet name="term"><b>#{game.year}</b></f:facet>`

    `            #{game.country}, #{game.city}, #{game.from} - #{game.to}`

    `      </rich:list>`

    `      <`**`rich:dataScroller for="list" maxPages="4"/>`**

    `   </rich:panel>`

    `</h:form>`


    [Figure 7-19](#Chapter07.html#fig_7_19) shows what the code will produce.


    ![images](images/0719.jpg)


    ***Figure 7-19.** Using <rich:dataScroller> with <rich:list>*


    #### Using <rich:dataScroller> with <rich:dataGrid>


    [Listing 7-25](#Chapter07.html#list_7_25) shows an example of `<rich:dataGrid>`
    with scroller. There is one difference between using scroller with `<rich:dataTable>`
    and `<rich:dataGrid>`. The `<rich:dataGrid>` uses the `elements` attribute instead
    of `rows`.


    ***Listing 7-25.** `<rich:dataGrid>` with scroller*


    `<h:form>`

    `<rich:dataGrid value="#{olympicGamesBean.games}" var="game" columns="3"` **`elements="9"`**

    `      id="grid">`

    `      <rich:panel>`

    `         <h:graphicImage value="#{game.flagURI}" />`

    `         <b>#{game.country} - #{game.city}</b> <br />`

    `         <i>#{game.from} - #{game.to}</i>`

    `      </rich:panel>`

    `      <f:facet name="footer">`

    **`<rich:dataScroller maxPages="4" />`**

    `      </f:facet>`

    `   </rich:dataGrid>`


    `</h:form>`


    We are using the `elements=`"`9`" attribute in this example. It means the same
    as the rows attribute for all the other iteration components. It was renamed because
    `<rich:dataGrid>` renders objects in a line, and so the rows attribute wouldn’t
    be a good fit. [Figure 7-20](#Chapter07.html#fig_7_20) shows the result.


    ![images](images/0720.jpg)


    ***Figure 7-20.** Using <rich:dataScroller> with <rich:dataGrid>*


    #### <rich:dataScroller> JavaScript API


    The `<rich:dataScroller>` component provides the JavaScript functions shown in
    [Table 7-5](#Chapter07.html#tab_7_5).


    ![images](images/t0705.jpg)'
