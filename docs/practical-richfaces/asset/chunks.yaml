    As we mentioned, we introduced a new `sortPriorities` list and added the column
    id to it after sorting on that column was invoked (but only in case it was not
    added before). Now we are not removing anything from the map prior to adding or
    changing the `sortOrder`. Also, you see a simple `resetSorting` method that clears
    both the `sortOrders` map and the `sortPriorities` list.


    Now that we have covered all the attributes, you have full control over the table
    component sorting state. You will apply the same basic attributes when using more
    complex custom data models in upcoming sections.


    One other example we want to cover is sorting using JavaScript API. It’s optimal
    for simple cases where you do not need to use links with custom Ajax request options.
    In fact, the examples we used are simple and JavaScript API usage is sufficient.


    The table client object provides the `sort()` method, which should take three
    parameters: a column id, sort order, and a clearance boolean flag. The last two
    parameters are optional. Basically, you define it by which column table should
    be sorted. Then if needed, define a new sort order for that column (it will be
    reverted if not passed). The last parameter, clearance flag, tells the table if
    you want all the previous sorts to be reset prior to when the new sorting was
    applied.


