  raw: '#### Using Component Client-side JavaScript API


    JSF is a server-side framework, which means that, in most cases, when we need
    to control a component such as change a value or property, we send a request to
    the server, make the change, and update the component on the client.


    Let''s again take our tab panel example to place three buttons or links outside
    the tab panel. Each button will be labeled with the city name. By clicking the
    button, the associated tab is selected. The page is shown in [Figure 4-6](#Chapter04.html#fig_4_6).


    ![images](images/0406.jpg)


    ***Figure 4-6.** Selecting tabs with components outside the tab panel*


    This is pretty easy to do. First we add a *`name`* attribute to each tab. Then
    we bind the *`activeItem`*, as follows, to a bean property that holds current
    tab name:


    `activeItem="#{cityBean.selectedTab}"`


    Next there would be an `action` (or `actionListener`*`)`* on each button. Inside
    each action we set an *`activeItem`* attribute based on the button clicked. [Listing
    4-7](#Chapter04.html#list_4_7) shows the page code.


    ***Listing 4-7.** Shows the page code*


    `<h:form>`

    `   <a4j:commandButton value="San Francisco" action="#{cityBean.sfAction}" render="cities"/>`

    `   <a4j:commandButton value="Los Angeles" action="#{cityBean.laAction}" render="cities"/>`

    `   <a4j:commandButton value="New York City" action="#{cityBean.nycAction}" render="cities"/>`

    `   <rich:tabPanel id="cities" style="width:40%" activeItem="#{cityBean.selectedTab}">`

    `      <rich:tab header="San Francisco"  name="sf" >`

    `         ...`

    `      </rich:tab>`

    `      <rich:tab header="Los Angeles" name="la">`

    `         ...`

    `      </rich:tab>`

    `      <rich:tab header="New York City" name="nyc">`

    `         ...`

    `      </rich:tab>`

    `   </rich:tabPanel>`

    `</h:form>`


    [Listing 4-8](#Chapter04.html#list_4_8) shows the managed bean with actions.


    ***Listing 4-8.** Shows the managed bean with actions*


    `@ManagedBean`

    `@RequestScoped`

    `public class CityBean {`


    `   private String selectedTab="sf"; // getter and setter`

    `   public void sfAction () {`

    `      this.selectedTab="sf";`

    `   }`

    `   public void laAction () {`

    `      this.selectedTab ="la";`

    `   }`

    `   public void nycAction () {`

    `      this.selectedTab ="nyc";`

    `   }`

    `}`


    This is an easy way to switch tabs by sending an Ajax request to the server. Let''s
    say we want to do the same thing, but instead using plain HTML buttons and without
    using any of our code to manage active tab from custom listeners. Many rich components
    provide client-side JavaScript API, which allows us to control the component entirely
    on the client. `<rich:tabPanel>` provides such API as well.


    There are two things we need to know before using the API. First, we need to get
    a reference to the component in the browser. Second, we need to know what methods
    are available for us to call. To get a reference to the component, we are going
    to use a RichFaces built-in `#{rich:component(''id'')}` client function. As for
    the JavaScript API that is available, you will need to use the RichFaces components
    guide. But, for the next example, we will tell you the available JavaScript API.


    Let''s take the tab example and change the buttons to call the tab panel''s JavaScript
    API to switch tabs. [Listing 4-9](#Chapter04.html#list_4_9) shows the JSF page
    with updated buttons.


    ***Listing 4-9.** Shows the JSF page with updated buttons*


    `<h:form>`

    `   <input type="button" value="San Francisco"`

    `      onclick="#{rich:component(''cities'')}.switchToItem(''sf'')"/>`

    `   <input type="button"  value="Los Angeles"`

    `      onclick="#{rich:component(''cities'')}.switchToItem(''la'')"/>`

    `   <input type="button"  value="New York City"`

    `      onclick="#{rich:component(''cities'')}.switchToItem(''nyc'')"/>`

    `   <rich:tabPanel id="cities" style="width:40%" >`

    `      <rich:tab header="San Francisco" name="sf">`

    `         <h:outputText value="San Francisco is a major city in northern California,
    on the`![images](images/U002.jpg)

    `            West Coast of`

    `            the United States" />`

    `      </rich:tab>`

    `      <rich:tab header="Los Angeles" name="la">`

    `         <h:outputText value="Los Angeles is a major city in southern California,
    on the`![images](images/U002.jpg)

    `            West Coast of`

    `            the United States" />`

    `      </rich:tab>`

    `      <rich:tab header="New York City" name="nyc">`

    `         <h:outputText  value="New York City is a major city on the East Coast
    of the United`![images](images/U002.jpg)

    `            States" />`

    `      </rich:tab>`

    `   </rich:tabPanel>`

    `</h:form>`


    There are a number of interesting things in [Listing 4-9](#Chapter04.html#list_4_9)
    The three buttons are just plain HTML buttons. This means they don''t send an
    Ajax request. You probably noticed that every `onclick` attribute is set to an
    interesting expression. Those are the two things we needed to invoke client-side
    JavaScript API: one, a reference to the component, and two, a method name to invoke.


    `#{rich:component(''id'')}` is a built-in RichFaces function that gives us a reference
    to a component''s JavaScript property, which holds all the available functions.
    Once we have the reference, it''s just a matter of calling the function we need.
    In our case the function name is `switchToItem(''itemName'')`, and we are passing
    the tab name we want to display.


    You might have noticed that we still send an Ajax request to the server. The request
    is sent because the `switchType` attribute is set to `ajax` by default on the
    tab panel. Even though we switched to another tab via the component''s JavaScript
    API, tab content is not available, and so it has to get it from the server. To
    make it client only, set `switchType="client"` and try running it again. You can
    place `<a4j:log>` on the page and you will see that no Ajax request is now sent.


    [Table 4-2](#Chapter04.html#tab_4_2) lists all the JavaScript API on the `<rich:tabPanel>`
    component.


    ![images](images/t0402.jpg)


    If we wanted to use `switchToItem(itemName)` and use the predefined names, you
    would add the code shown in [Listing 4-10](#Chapter04.html#list_4_10).


    ***Listing 4-10.** Using `switchToItem(itemName)` and the predefined names*


    `<input type="button" value="First" onclick="#{rich:component(''cities'')}.switchToItem`![images](images/U002.jpg)

    `(''@first'')"/>`

    `<input type="button"  value="Next" onclick="#{rich:component(''cities'')}.switchToItem`![images](images/U002.jpg)

    `(''@next'')"/>`

    `<input type="button"  value="Prev" onclick="#{rich:component(''cities'')}.switchToItem`![images](images/U002.jpg)

    `(''@prev'')"/>`

    `<input type="button"  value="Last" onclick="#{rich:component(''cities'')}.switchToItem`![images](images/U002.jpg)

    `(''@last'')"/>`


    Many other rich components provide client-side API. How do you find the available
    API? Again, visit the RichFaces components guide located at [`www.jboss.org/richfaces/docs`](http://www.jboss.org/richfaces/docs).
    Every component that has API will be listed under the JavaScript API section.


    This is a very powerful feature in RichFaces that adds a lot of flexibility to
    your application. You can control rich components entirely on the client.


    ### Summary


    In this chapter we covered the key concepts shared by rich components: using facets,
    sending an Ajax request from rich components, and using components client-side
    JavaScript API. These concepts are very important and will be the foundation for
    the rest of the chapters in this book. The next chapter will introduce you to
    rich input and selection components.


    ## C H A P T E R  5'
