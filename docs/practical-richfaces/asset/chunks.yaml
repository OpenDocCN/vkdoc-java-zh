    ### 总结


    在本章中，我们向您展示了如何使用 Maven 设置一个 RichFaces 项目，并介绍了如何使用 JSF 2 标准的 `<f:ajax>` 行为。然后，我们展示了
    RichFaces 的 `<a4j:ajax>` 行为如何通过额外的功能和属性来升级标准的 `<f:ajax>`。


    第 3 章将继续介绍 RichFaces 如何通过诸如 `<a4j:commandButton>`、`<a4j:commandLink>`、`<a4j:poll>`、`<a4j:jsFunction>`
    和 `<a4j:region>` 等标签来升级和扩展标准的 Ajax 功能。请记住，我们在本章中介绍的所有功能和属性也适用于我们刚刚列出的这些标签。我们还将介绍高级客户端队列定制以及
    RichFaces 在标准 JSF 2 队列之上提供的功能。


    ## 第 3 章


    ## a4j:* 标签、功能与概念


    在前面的章节中，我们介绍了 RichFaces 的 `<a4j:ajax>` 标签，它通过更多功能和选项扩展并升级了标准的 *`<f:ajax>`* 标签。在本章中，我们将继续介绍
    a4j:* 库的标签、功能和概念。我们将介绍更多触发 Ajax 请求的标签，例如 *`<a4j:poll>`*、*`<a4j:jsFunction>`*、使用
    *`<a4j:outputPanel>`* 组件的高级渲染选项、高级执行选项，以及对标准 Ajax 客户端队列的众多升级。


    ### 发送 Ajax 请求


    在本节中，您将学习如何使用三个新的 RichFaces 组件来发送 Ajax 请求：`<a4j:commandButton>`（和 `<a4j:commandLink>`）是一个内置
    Ajax 行为的按钮；`<a4j:jsFunction>` 允许您从任何 HTML 事件或 JavaScript 函数发送 Ajax 请求；`<a4j:poll>`
    使您能够定期发送 Ajax 请求。

