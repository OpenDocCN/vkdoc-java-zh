    \  <h:panelGrid columns=\"2\">\n               <h:outputText value=\"Name:\" />\n\
    \               <h:inputText value=\"#{userBean.name}\" label=\"username\"/>\n\
    \               <h:outputText value=\"Age:\" />\n               <h:inputText value=\"\
    #{userBean.age}\" label=\"age\"/>\n            </h:panelGrid>\n         </rich:tab>\n\
    \         <rich:tab header=\"Location\">\n            <h:panelGrid columns=\"\
    2\">\n               <h:outputText value=\"City:\" />\n               <h:inputText\
