    ## 富数据迭代组件


    如果你已经知道如何使用标准的 JSF `<h:dataTable>` 组件，那么基本上你就知道如何使用 RichFaces 中提供的任何数据迭代组件了。现在，RichFaces
    在标准数据表组件提供的基础功能之上，还提供了许多特性，例如高级模型、懒加载、排序、过滤、皮肤和部分表格更新。


    JSF 2 提供了两个用于迭代数据的组件：`<h:dataTable>` 和 `<ui:repeat>`。`<h:dataTable>` 组件会生成一个 HTML
    `<table>..</table>` 结构。`<ui:repeat>` 组件允许你使用任何 HTML 标记来包装集合并进行迭代。然而，在实际的企业级应用中显示集合时，简单的表格格式并不总是合适的。你可能还需要为表格添加滚动条、实现懒加载、选择、列宽调整以及排序自定义。或者，你可能希望显示各种
    HTML 列表，例如定义列表、有序列表或无序列表。这正是 RichFaces 组件发挥作用的地方。


    ![images](img/square.jpg) **注意** 本章中的大多数截图都使用了 wine 皮肤。第 13 章 介绍了如何更换皮肤。


    RichFaces 提供了以下用于显示集合的组件：


    1.  `<rich:dataTable>`

    2.  `<rich:extendedDataTable>`

    3.  `<rich:collapsibleSubTable>`

    4.  `<rich:list>`

    5.  `<rich:dataGrid>`

    6.  `<a4j:repeat>`


    所有这些组件都可以绑定到与标准 `<h:dataTable>` 组件相同的数据类型；然而，在简单情况下，绑定到任何类型数据迭代组件的最常见对象是 `java.util.List`。在更复杂的情况下，我们将向你展示如何使用高级的
    RichFaces 数据模型。


    ### 数据准备


    让我们从创建将在示例中使用的数据开始。你可能需要花几分钟时间来回顾一下（尽管它非常简单），因为为了节省篇幅，我们不会在后续的代码清单中重复它，而只会添加需要添加到数据
    bean 中以实现特定功能的方法。这个简单的基于 `List` 的模型将填充自 19 世纪开始的奥运会信息。我们将使用 JAXB 从 XML 文件加载数据。（此示例使用了
    Java 6。）清单 7-1 展示了 XML 文件的内容。


    ![images](img/square.jpg) **提示** Java 架构 for XML Binding (JAXB) 提供了一种快速便捷的方式在
    XML 模式和 Java 表示之间进行绑定，使 Java 开发人员能够轻松地在 Java 应用程序中整合 XML 数据和数据处理功能。了解更多信息，请访问
    [`jaxb.java.net/`](http://jaxb.java.net/)。如果你不熟悉 JAXB 或对基于 XML 的数据创建不感兴趣，可以跳过本节。只需查看
    `GameDescriptor` 类即可。本章中的示例数据将由 `java.util.List` 中的 `GameDescriptor` 类组成。通常，任何包含在列表中的、具有若干属性的
    Java bean 都可以用作数据模型对象。


    ***清单 7-1.** XML 文件*


    `<games>`

    `   <game>`

    `      <city>Athens</city>`

    `      <country>Greece</country>`

    `      <continent>Europe</continent>`

    `      <flag>greece_old</flag>`

    `      <number>1</number>`

    `      <season>Summer</season>`

    `      <fromDate>4/6/1896</fromDate>`

    `      <toDate>4/15/1896</toDate>`

    `   </game>`


    `<!-- 其他游戏条目 -->`

    `</games>`


    清单 7-2 展示了用于存储单个游戏信息的 GameDescriptor 对象。


    ***清单 7-2.** 用于存储单个游戏信息的 GameDescriptor 对象*


    `public class GameDescriptor implements Serializable {`

    `   private String city;`

    `   private String country;`

    `   private String continent;`

    `   private String flagName;`

    `   private int number;`

    `   private Calendar fromDate = new GregorianCalendar(Locale.US);`

    `   private Calendar toDate = new GregorianCalendar(Locale.US);`

    `   private seasons season;`

    `   private statuses status = statuses.passed;`

    `   private enum statuses {passed, future, canceled};`

    `private enum seasons {Winter,` `Summer``};`

    `   public int getYear() {`

    `      return fromDate.get(Calendar.YEAR);`

    `   }`

    `   public String getFrom() {`

    `      if (!status.equals(statuses.canceled)) {`

    `         return fromDate.get(Calendar.DAY_OF_MONTH) + " "`

    `            + fromDate.getDisplayName(Calendar.MONTH, Calendar.LONG, Locale.US);`

    `      } else return "";`

    `   }`

    `   public String getTo() {`

    `      if (!status.equals(statuses.canceled)) {`

    `         return toDate.get(Calendar.DAY_OF_MONTH) + " "`

    `            + toDate.getDisplayName(Calendar.MONTH, Calendar.LONG, Locale.US);`

    `      } else return "";`

    `   }`

