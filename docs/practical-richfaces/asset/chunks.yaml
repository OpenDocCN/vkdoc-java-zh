    could be defined for all the groups and items at panel level, but could also be
    redefined for a particular group or item using the `mode` attribute on the group
    or item tag.    Let’s also review server-side events and listeners provided by
    the components shown in [Table 8-3](#Chapter08.html#tab_8_3).    ![images](images/t0803.jpg)    That’s
    enough theory—now we will build an example of using server-side actions and listeners
    for the component. We will use the code that is pretty similar to one that we
    used in the `<rich:dropDownMenu>` section. Let’s take a look at the page code
    in [Listing 8-18](#Chapter08.html#list_8_18).    ***Listing 8-18.** The page code*  `<h:form>`
