    总结    本章介绍了各种数据迭代组件，从最基本的 `<a4j:repeat>`（它不产生任何标记）到复杂的组件，如 `<rich:extendedDataTable>`。所有数据迭代组件的一个独特功能是部分表格更新，您可以在其中指定要更新的特定行。所有组件的外观和感觉都可以通过皮肤进行高度自定义，这将在第
    13 章 中介绍。最后，我们介绍了在数据表组件中使用自定义模型实现复杂的数据库内分页/排序/过滤操作。    ## 第 8 章    ## 丰富的菜单组件    在本章中，您将探索
