    Many web sites that use Ajax show an Ajax request status such as a moving animated
    image or a “Loading…” message at the top of the screen. Some block the entire
    page while the Ajax request is being executed. There are a number of reasons why
    it might make sense to show an Ajax request status. As there is no full page refresh,
    the user might not even be aware that a request is being executed. Showing the
    status indicates that something is happening—and perhaps the user won''t click
    the button or link again. Well, as you probably know by now, there is no such
    thing as “perhaps” in web development. Another usage is to block the screen while
    the Ajax request is being executed in order to prevent the user from clicking
    any actions until the Ajax request is complete. Without debating this any further,
    it''s up to you if you want to show the Ajax status. Our job is to show you how
    to use a `<a4j:status>` component in RichFaces. This component is used to show
    an Ajax request status.


    The following are three ways define `<a4j:status>`:


