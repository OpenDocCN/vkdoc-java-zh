    The panel is added by using a *`<rich:panel>`* component. The panel states (or
    the content) are defined by the addition of *`<rich:togglePanel>`* inside with
    the set of nested *`<rich:togglePanelItem>`* components (there isn''t any predefined
    markup). Controls for switching are a simple *`<h:commandLink>`* with *`<rich:toggleControl>`*
    behavior. This adds greater flexibility and allows using the component in various
    use cases.


    Behaviors are a great addition to JSF specification made in JSF 2\. We could plug
    our *`<rich:toggleControl>`*''s behavior to any control on any event (*`click`*
    by default is used in this case), so we are not limited to just a button or a
    link anymore. In this example we use links and switched between states using the
    *`@next`* keyword, but you can also use the following predefined keywords: *`@prev`*,
    *`@first`*, and *`@last`*.


    The order of switching defined by the order of child items within the component.
    The *`cycledSwitching`* attribute controls whether the panel will be switched
    from the boundary item to the opposite one if you continue switching in the same
    direction.


