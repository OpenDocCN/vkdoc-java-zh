    nodes within <rich:tree>*    During data model iteration, the EL expression defined
    at the nodeType attribute is evaluated using the current object defined in the
    `var attribute`. A lookup is then performed for the node with the same type among
    nested components. If the node with a corresponding type is found, it will be
    used for node markup rendering. If the node is not found, the tree will lookup
    the node without the type specified, and it will become the default node for all
    the objects, which can’t be associated with any type. If neither default node
    is found, the tree will create a default one, as was done in previous examples
    where <rich:treeNode> was not used.    ![images](images/square.jpg) **Note** If
    a `<rich:treeNode>` has the `rendered` attribute evaluated as `false` in context
    of an iteration, the node will not be rendered and no default nodes will be used
    or created.    #### Tree Toggling and Selection Modes    A RichFaces tree can
    be defined with different modes to be used while the user performs tree nodes
    expansion or selects a particular node. [Table 9-1](#Chapter09.html#tab_9_1) shows
    the attributes that should be used to define the modes.    ![images](images/t0901.jpg)    `toggleType`
    defines how every tree node child will be loaded. With the `client` type, the
    complete tree will be rendered on page load and nodes toggling will be done through
    JavaScript (on the client). In `ajax` and `server` modes, `<rich:tree>` will perform
    form submission via Ajax or standard POST in order to load the child components
    when the tree nodes get expanded.    `selectionType` can be set to the similar
    values—`client`, `ajax`, `server`—but for the selection user action. We will use
    `ajax` `selectionType` in all the later samples created in order to show you different
    options for processing tree events on the server side.    ![images](images/square.jpg)
    **Note** `<rich:tree>` needs to be placed inside `<h:form>` to perform an Ajax
    (or standard) request.    ![images](images/square.jpg) **Tip** A popular question
    is how to implement a simple navigation tree that does not perform actions, but
    redirects to another view through simple links. Set `selectionType=client` and
    use `<h:outputLink>` as the tree node. The tree itself won’t send an Ajax request,
    but you can navigate via `<h:outputLink>`.    #### Selection Event Handling    In
    a real application, in addition to rendering the tree, we also need to know how
    to handle the user action when a particular tree node is selected.    In addition
    to the `selectionType` definition we need to point the tree to a server-side listener
    method. `<rich:tree>` provides the `selectionChangeListener` attribute in order
    to do that. That attribute should be defined with the method expression and the
    method accepts `TreeSelectionChangeEvent` as a parameter. That event provides
    two methods that should be used in order to process selection: `getOldSelection()`
    and `getNewSelection()`. These methods return the collection of `rowKey`s to identify
    previous and new selections.    [Listing 9-13](#Chapter09.html#list_9_13) shows
    the tree definition with the listener defined.    ***Listing 9-13.** Shows the
    tree definition*  `<h:form>` `   <rich:tree value="#{richFacesTreeNodeBean.rootNode}"
    var="node" toggleType="client"` `      selectionType="ajax"` `         selectionChangeListener="#{richFacesTreeNodeBean.selectionChanged}">`
    `      <rich:treeNode>` `         #{node.data}` `      </rich:treeNode>` `   </rich:tree>`
    `</h:form>`  Now we will need to add some code to the RichFacesTreeNodeBean bean
    that will be used to process user selection. We will add the list in which we
    store selected objects, such as the panel and the listener method, as shown in
    [Listing 9-14](#Chapter09.html#list_9_14).    ***Listing 9-14.** The bean that
    will be used to process user selection*  `private List<String> selection = new
    ArrayList<String>();`  `public void selectionChanged(TreeSelectionChangeEvent
    event){` `   selection.clear();` `   UITree tree = (UITree)event.getComponent();`
    `   Object storedRowKey = tree.getRowKey();` `   for (Object rowKey : event.getNewSelection())
    {` `      tree.setRowKey(rowKey);` `      selection.add(((RichFacesTreeNode)tree.getRowData()).getData());`
    `   }` `   tree.setRowKey(storedRowKey);` `}`  Looks pretty straightforward, doesn’t
    it? We are just iterating through a collection of `rowKey`s for newly-selected
    objects that are passed to the listener, getting the object from the tree model
    object that corresponds to that key, and placing its data into a result list.    ![images](images/square.jpg)
    **Note** In our example, `getData()` only returns the selected node object, but
    you can also get any other object property or complete object.    Now we just
    need to add a component that will iterate through the result list to show the
    selection on the page. We will use `<a4j:repeat>` for that, as [Listing 9-15](#Chapter09.html#list_9_15)
    shows.    ***Listing 9-15.** Using `<a4j:repeat>`*  `<a4j:outputPanel layout="block"`
    **`ajaxRendered="true"`**`>` `<rich:panel header="Current selection:"` **`rendered="#{not
    empty`** **`      richFacesTreeNodeBean.selection}"`**`>` `<a4j:repeat` **`value="#{richFacesTreeNodeBean.selection}"`**
    `var="nodeData">` `         #{nodeData}` `      </a4j:repeat>` `   </rich:panel>`
    `</a4j:outputPanel>`  That’s all for now. If the selection list is filled, the
    panel will be rendered and repeat defined inside that panel will iterate over
    the selection list. [Figure 9-6](#Chapter09.html#fig_9_6) shows the result of
    the node selected.  ![images](images/0906.jpg)  ***Figure 9-6.** Tree with nodes
    selection*    ![images](images/square.jpg) **Note** `event.getNewSelection()`
    returns a Collection even though only single node selection is supported right
    now. This is done because a future version of the component should support multiple
