    ![images](images/square.jpg) **Tip** To avoid showing status when no Ajax request
    is active, simply don''t set `stopText` property (or `stop` facet).


    [Figure 3-7](#Chapter03.html#fig_3_7) shows when there is an active request on
    the server.


