    #### 使用 limitRender 属性关闭自动渲染面板


    自动渲染面板是一个很好的功能，因为它可以更轻松地标记页面中应始终渲染的部分。你不再需要使用 `render` 指向组件。然而，可能会出现这样的情况：页面上的某个特定
    Ajax 操作不应更新自动渲染面板，而应仅限于当前 `render` 中设置的内容。我们将探讨如何在特定情况下关闭自动渲染面板。我们将使用图 3-4 所示的页面。


    ![images](img/0304.jpg)


    ***图 3-4.** 关闭自动渲染面板*


    JSF 页面如清单 3-35 所示。


    ***清单 3-35.** JSF 页面*


    `<h:form>`

    `   <h:panelGrid columns="2">`

    `      <a4j:commandButton value="Update All Groups" render="group1, group2" />`

    `      <a4j:commandButton value="Update Group 1 and 2 Only" render="group1, group2"`

    `         limitRender="true" />`

    `   </h:panelGrid>`

    `   <h:panelGrid columns="1" id="group1">`

    `      <f:facet name="header">Group 1</f:facet>`

    `      <h:outputText value="#{timeBean.time1}" />`

    `      <h:outputText value="#{timeBean.time2}" />`

    `   </h:panelGrid>`

    `   <h:panelGrid columns="1" id="group2">`

    `      <f:facet name="header">Group 2</f:facet>`

    `      <h:outputText value="#{timeBean.time3}" />`

    `   </h:panelGrid>`

    `   <a4j:outputPanel ajaxRendered="true" layout="block">`

    `      <h:panelGrid id="group3">`

    `         <f:facet name="header">Group 3</f:facet>`

    `         <h:outputText value="#{timeBean.time4}" />`

    `         <h:outputText value="#{timeBean.time5}" />`

    `      </h:panelGrid>`

    `   </a4j:outputPanel>`

    `</h:form>`


    在清单 3-5 中，当点击“Update All Groups”按钮时，所有时钟都会被渲染（更新）。Group 1 和 Group 2 通过 id 更新，因为按钮设置了
    `render="group1, group2"`。Group 3 被更新是因为它位于自动渲染面板内。如果点击第二个按钮（仅更新 Group 1 和 Group
    2），则只有 Group 1 和 Group 2 被渲染。位于自动渲染面板内的 Group 3 不会被更新。原因在于第二个按钮使用了 `limitRender="true"`。这意味着将渲染限制为当前
    render 属性中设置的组件（在本例中是 Group1 和 Group2）。另一种理解方式是，我们针对这个特定按钮关闭了所有自动渲染面板。这是一个便捷的功能，为你自定义渲染内容提供了更大的灵活性和控制力。


