    由于验证没有失败，我们完成了所有阶段。下一个问题是：当我们仅进行验证时，是否需要经历所有阶段？可能不需要。当仅进行验证时，到达阶段 3（处理验证）就足够了，即使输入正确，我们也可以跳转到“渲染响应”阶段。当我们实际上不需要时，为什么要调用“更新模型”和“调用应用”阶段呢？让我们让请求更快一些。

