    `acceptedTypes="img"` 以确保只有该类型的组件可以放入此放置区域。如果您有一个放置区域应该接受任何类型的可拖动组件，那么，与其列出每个接受的类型，不如将放置区域设置为接受任何类型，例如：  `acceptedTypes="@all"`  尽管现在任何组件都可以放入此放置区域，但我们仍然需要为每个
    `<rich:dragSource>` 组件定义拖动源类型。    ### 在放置时调用服务器端侦听器    事情看起来不错——我们可以拖放组件——但我们仍然缺少一些东西。缺少的部分是在发生放置时调用服务器端侦听器的能力，以便为这些操作添加一些业务逻辑。    要添加服务器端侦听器，我们为
    `<rich:dropTarget>` 定义 `dropListener` 属性，并使用指向 Bean 内侦听器的方法表达式。侦听器方法签名如下：  `public
    void listenerName(org.richfaces.event.DropEvent event)`  我们稍后将讨论 `DropEvent` 以及它在侦听器代码中公开的信息，但现在让我们介绍两个应该用于在服务器端处理放置操作并且与
    `DropEvent` 相关的属性。在 `<rich:dragSource>` 上定义的 `dragValue` 和在 `<rich:dropTarget>`
    上定义的 `dropValue` 用于向侦听器传递附加信息。    现在让我们更仔细地回顾 `DropEvent`。表 10-1 列出了 `DropEvent`
