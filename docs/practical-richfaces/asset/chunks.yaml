    in [Listing 8-12](#Chapter08.html#list_8_12).    ***Listing 8-12.** Adding icons
    to the menu items*  `<rich:toolbar width="150px">` `   <rich:dropDownMenu mode="ajax"
    label="File">` `      <rich:menuItem label="New" icon="/images/icons/new.gif"
    />` `      <rich:menuItem label="Open File..." icon="/images/icons/open.gif" />`
