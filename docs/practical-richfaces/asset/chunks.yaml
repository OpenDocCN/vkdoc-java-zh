    `toString()` method anymore, as we are defining the representation using a set
    of nested `<rich:treeNode>` tags. Looking through [Listing 9-12](#Chapter09.html#list_9_12),
    notice the `nodeType` attribute of `<rich:tree>` and the type attribute defined
