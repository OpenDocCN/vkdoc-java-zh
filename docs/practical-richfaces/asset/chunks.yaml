- fmt: "#### Look-and-Feel Customization\n\nLet’s start a deeper component review\
    \ with a look-and-feel customization. First, let’s add a zebra-style, row hover-effect\
    \ and additional column styling. For the zebra-style effect and column styling\
    \ we will use attributes familiar if you used `<h:dataTable>` before. But, in\
    \ order to add a row highlight for a hover, we will use events specific to a RichFaces\
    \ table. For standard events such as `onmouseover`, `onclick`, and so on, the\
    \ RichFaces table components also provides row events like `onrowclick`, `onrowdblclick`,\
    \ and other like events.\n\nAs we will only add `<rich:dataTable>` attributes,\
    \ let’s look through the table definition in [Listing 7-7](#Chapter07.html#list_7_7).\
    \ All the columns remain unchanged.\n\n***Listing 7-7.** Adding `<rich:dataTable>`\
    \ attributes*\n\n```\n<style>\n   .odd{\n      background-color: #{richSkin.additionalBackgroundColor};\n\
    \   }\n   .even{\n      background-color: #{richSkin.tableSubHeaderBackgroundColor};\n\
    \   }\n   .cityColumn{\n      font-weight:bold;\n   }\n</style>\n\n<rich:panel\
    \ style=\"width:650px\" header=\"rich:dataTable sample\">\n   <rich:dataTable\
    \ value=\"#{olympicGamesBean.games}\" var=\"game\" rowClasses=\"odd, even\"\n\
    \      columnClasses=\",cityColumn\" onrowmouseover=\"this.style.fontWeight='bold'\"\
    \n      onrowmouseout=\"this.style.fontWeight='normal'\">\n      ...\n   </rich:dataTable>\n\
    </rich:panel>\n```\n\nThe result is shown in [Figure 7-2](#Chapter07.html#fig_7_2).\
    \ Notice that the `rowClasses` attribute changed the backgrounds in both odd and\
    \ even columns. That’s a standard attribute and applies comma-separated class\
    \ names sequentially to corresponding row elements. Also, `columnClasses` defines\
    \ the second-column style class.\n\nFinally, we are using two row event handlers—`onrowmouseout`\
    \ and `onrowmouseover`—which are actually similar to standard HTML `onmouseover`\
    \ and `onmouseout`, but define handlers for corresponding events on every component\
    \ row. The handlers change all the cell fonts of the hovered row to bold and then\
    \ back to normal (not bold) when the mouse leaves the row.\n\n![images](images/0702.jpg)\n\
    \n***Figure 7-2.** Rich data table with column styling and row hover events*\n\
    \nNow let’s review the last and most interesting attribute related to CSS styling.\
    \ `rowClass` is an attribute specific to RichFaces tables. It gets evaluated during\
    \ iteration opposite to `rowClasses`, which gets evaluated prior to iterating\
    \ the data model, so it can’t be dynamically populated according to the model.\n\
    \nLet’s change the background color of canceled game rows to the red. The code\
    \ that adds such functionality is shown in [Listing 7-8](#Chapter07.html#list_7_8).\n\
    \n***Listing 7-8.** Changing the cancelled game row background color to red*\n\
    \n```\n.red{\n    color:red;\n}\n</style>\n<rich:panel style=\"width:650px\" header=\"\
    rich:dataTable sample\">\n    <rich:dataTable value=\"#{olympicGamesBean.games}\"\
    \ var=\"game\"\n        rowClasses=\"odd, even\" columnClasses=\"cityColumn\"\n\
    \        onrowmouseover=\"this.style.fontWeight='bold'\"\n        onrowmouseout=\"\
    this.style.fontWeight='normal'\"\n        rowClass=\"#{game.status == 'canceled'\
    \ ? 'red' : ''}\">\n```\n\n[Figure 7-3](#Chapter07.html#fig_7_3) shows the result.\n\
    \n![images](images/0703.jpg)\n\n***Figure 7-3.** Rich data table with rows styled\
    \ according to iteration data*\n\nThat’s it. Now you could easily apply any class\
    \ to the whole row. Other use-cases that could require that feature include Task,\
    \ Issue, or E-mail tables where rows should be styled according to item importance.\
    \ In the past, you had to add the same class to all columns; that was not as easily\
    \ maintainable and also caused much more HTML code to be rendered in the table\
    \ markup.\n\n#### Using Sub-Tables and Defining Complex Header Markups\n\nIn real\
    \ applications, you will often have to deal with much more complex table-based\
    \ data representations. Your tables could require using columns and rows spanning,\
    \ which is the ability to define complex header structures to properly add the\
    \ table content descriptions. Luckily, the RichFaces `<rich:dataTable>` component\
    \ allows you to define rich, master-details tables using nested sub-tables.\n\n\
    Before we will start with the example, let us introduce the `<rich:collapsibleSubTable>`\
    \ component. Used together with the `<rich:dataTable>`, it allows you to implement\
    \ master-details tables of any complexity. It should be placed as either a child\
    \ of `<rich:dataTable>` or `<rich:collapsibleSubTable>`, and iterate through a\
    \ nested data model. And as you can probably guess, according to the name in RichFaces\
    \ 4, it provides collapse/expand features right out of the box. So let’s start\
    \ with a simple example. The table we need to implement is shown in [Figure 7-4](#Chapter07.html#fig_7_4).\n\
    \n![images](images/0704.jpg)\n\n***Figure 7-4.** Collapsible data table*\n\nNow,\
    \ let’s review [Listing 7-9](#Chapter07.html#list_7_9), which shows the code used\
    \ to create this table.\n\n***Listing 7-9.** Collapsible data table*\n\n```\n\
    <rich:dataTable value=\"#{olympicGamesBean.gamesMapKeys}\" var=\"continent\">\n\
    \   <f:facet name=\"header\">\n      <rich:columnGroup>\n         <rich:column\
    \ colspan=\"9\">Games by Continent</rich:column>\n         <rich:column colspan=\"\
    2\" breakRowBefore=\"true\"></rich:column>\n         <rich:column colspan=\"3\"\
    >Place</rich:column>\n         <rich:column colspan=\"3\">Dates</rich:column>\n\
    \         <rich:column>Notes</rich:column>\n         </rich:columnGroup>\n   \
    \   </f:facet>\n      <rich:column colspan=\"9\">#{continent}</rich:column>\n\
    \      <rich:collapsibleSubTable value=\"#{olympicGamesBean.gamesMap[continent]}\"\
    \ var=\"game\">\n         <rich:column>\n            <f:facet name=\"header\"\
    >Season</f:facet>\n               #{game.season}\n            </rich:column>\n\
    \         <rich:column>\n            <f:facet name=\"header\">Number</f:facet>\n\
    \               #{game.number}\n         </rich:column>\n         <!--More columns-->\n\
    \   </rich:collapsibleSubTable>\n</rich:dataTable>\n```\n\nWe added the code snippet\
    \ shown in [Listing 7-10](#Chapter07.html#list_7_10) to `OlympicGamesBean` bean,\
    \ previously shown in [Listing 7-5](#Chapter07.html#list_7_5).\n\n***Listing 7-10.**\
    \ Code snippet added to `OlympicGamesBean` bean*\n\n```\nprivate Map<String, List<GameDescriptor>>\
    \ gamesMap;\n\npublic Map<String, List<GameDescriptor>> getGamesMap(){\n   if\
    \ (gamesMap==null){\n      gamesMap = new HashMap<String, List<GameDescriptor>>();\n\
    \      for (GameDescriptor game : games) {\n         List<GameDescriptor> gamesFromMap\
    \ = gamesMap.get(game.getContinent());\n            if (gamesFromMap == null){\n\
    \               gamesFromMap = new ArrayList<GameDescriptor>();\n            }\n\
    \            gamesFromMap.add(game);\n            gamesMap.put(game.getContinent(),\
    \ gamesFromMap);\n      }\n   }\n   return gamesMap;\n}\n\npublic List<String>\
    \ getGamesMapKeys(){\n   Map<String, List<GameDescriptor>> map = getGamesMap();\n\
    \   List<String> continents = new ArrayList<String>();\n   Iterator<String> it\
    \ = map.keySet().iterator();\n   while (it.hasNext()){\n      continents.add(it.next());\n\
    \   }\n   Collections.sort(continents);\n   return continents;\n}\n```\n\nLet’s\
    \ look at the header. The `<rich:columnGroup>` component is used to encode a set\
    \ of columns into a row that wraps them in a separate `<tr>`. Using `colspan=\"\
    9\"` on the first column and `breakBefore=\"true\"` on the second, we stretched\
    \ the first cell to table width and had the next cell encode as a new row prior\
    \ to rendering. Again using `colspan=\"3\"`, we made the other cells group similar\
    \ columns under common “Place” and “Dates” headers."
