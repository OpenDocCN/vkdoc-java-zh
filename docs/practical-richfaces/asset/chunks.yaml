    Country:\" />\n               <h:inputText value=\"#{userBean.country}\" label=\"\
    country\"/>\n            </h:panelGrid>\n         </rich:tab>\n      </rich:tabPanel>\n\
    \      <a4j:commandButton value=\"Close\" id=\"close\"\n         onclick=\"#{rich:component('modalPanel8')}.hide();\
    \ return false;\" />\n      <a4j:commandButton value=\"Save and Close\" id=\"\
    save\" render=\"input\"\n         oncomplete=\"if (#{facesContext.maximumSeverity==null})\n\
    \         #{rich:component('modalPanel8')}.hide();\" />\n   </h:form>\n</rich:popupPanel>\n\
    <a4j:outputPanel ajaxRendered=\"true\">\n   <rich:popupPanel id=\"msgPanel\" modal=\"\
    true\" zindex=\"101\" header=\"Correct\n      your input!\" autosized=\"true\"\
    \n      show=\"#{facesContext.maximumSeverity!=null}\">\n      <h:messages style=\"\
    color:red\" />\n      <a href=\"#\" onclick=\"#{rich:component('msgPanel')}.hide()\"\
    >Hide</a>\n   </rich:popupPanel>\n</a4j:outputPanel>\n<h:form>\n   <h:panelGrid\
    \ id=\"input\">\n      <h:outputText value=\"Name: #{userBean.name}\" />\n   \
    \   <h:outputText value=\"Age: #{userBean.age}\" />\n      <h:outputText value=\"\
    City: #{userBean.city}\" />\n      <h:outputText value=\"Country: #{userBean.country}\"\
    \ />\n      <a onclick=\"#{rich:component('modalPanel8')}.show()\">Edit User\n\
    \         wizard</a>\n   </h:panelGrid>\n</h:form>\n```\n\nThe managed bean contains\
    \ just simple `User` properties, as shown in [Listing 6-34](#Chapter06.html#list_6_34).\n\
    \n***Listing 6-34.** Managed bean*\n\n```\n@ManagedBean\n@RequestScoped\npublic\
    \ class UserBean {\n   @Length(min = 3, max = 15, message=\"Name should be defined(3\
    \ to 15\n      characters)\")\n   private String name = \"\";\n   @Min(value =\
    \ 18, message = \"You should be over 18 years to place orders\")\n   @NotNull(message=\"\
