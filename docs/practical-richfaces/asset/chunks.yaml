- fmt: '### Defining Execute Regions with `<a4j:region>`


    When sending an Ajax request it''s always important to keep in mind what is going
    to be processed or executed on the server. As we know, when using `<f:ajax>` or
    `<a4j:ajax>` the `execute` attribute defaults to `@this` (other values `execute`
    can be set to are: `@all`, `@form`, `@none`, id''s, EL expressions similar to
    used in `render`). When using RichFaces `<a4j:poll>` or `<a4j:jsFunction>`, the
    `execute` attribute also defaults to `@this`. But, when using `<a4j:commandButton>`
    or `<a4j:commandLink>`, the `execute` attribute sets to the `@form` value. Why
    did RichFaces change the default value? In the majority of cases, a button or
    link are used inside a form to perform a complete form submit. You will enter
    information and click a button or a link to submit. As you have just entered input,
    you need to process that input as well. If `execute` was set to the default value
    of `@this`, we would need to include every input component inside the form to
    be executed as well, or set `execute` to `@form` (or parent container id). Having
    the `<a4j:commandButton>` and `<a4j:commandLink>` `execute` attribute default
    to `@form`, makes development easier.


    RichFaces adds another feature that makes marking what to execute simpler. RichFaces
    adds `<a4j:region>` and the `@region` keyword. [Listing 3-36](#Chapter03.html#list_3_36)
    shows a JSF that will not work, as `<a4j:ajax>` nested inside `<h:commandButton>`
    doesn''t have the `execute` attribute set.


    **Listing 3-36.** Shows a JSF that will not work


    ```

    <h:form>

       <h:panelGrid>

          <h:selectOneMenu id="type" value="#{flowerRegionBean.type}">

             <f:selectItem itemValue="Roses" itemLabel="Roses" />

             <f:selectItem itemValue="Tulips" itemLabel="Tulips" />

             <f:selectItem itemValue="Irises" itemLabel="Irises" />

          </h:selectOneMenu>

          <h:selectOneMenu id="size" value="#{flowerRegionBean.size}">

             <f:selectItem itemValue="Small" itemLabel="Small" />

             <f:selectItem itemValue="Large" itemLabel="Large" />

             <f:selectItem itemValue="Extra Large" itemLabel="Extra Large" />

          </h:selectOneMenu>

          <h:selectOneMenu value="#{flowerRegionBean.vase}">

             <f:selectItem itemValue="Standard vase" itemLabel="Standard vase" />

             <f:selectItem itemValue="Premium vase" itemLabel="Premium vase" />

             <f:selectItem itemValue="No vase" itemLabel="No vase" />

          </h:selectOneMenu>

          <h:commandButton value="Buy Flowers!">

             <a4j:ajax event="click"/>

          </h:commandButton>

       </h:panelGrid>

       <a4j:outputPanel ajaxRendered="true" layout="block">

          <h:panelGrid>

             <h:outputText value="#{flowerRegionBean.type}" />

             <h:outputText value="#{flowerRegionBean.size}" />

             <h:outputText value="#{flowerRegionBean.vase}" />

          </h:panelGrid>

       </a4j:outputPanel>

    </h:form>

    ```


    The managed bean is shown in [Listing 3-37](#Chapter03.html#list_3_37).


    **Listing 3-37.** The managed bean


    ```

    @ManagedBean

    @RequestScoped

    public class FlowerRegionBean {


       private String type;

       private String size;

       private String vase;


       // getters and setters

    }

    ```


    To make this work, we would either have to list all input components in `execute`
    attribute or set an ID on the panel grid and point `execute` to it. The alternative
    approach, which is more declarative in nature, is to use `<a4j:region>`. Therefore,
    to make the example in [Listing 3-37](#Chapter03.html#list_3_37) work, all we
    need to do is wrap input components and the button inside `<a4j:region>`, as shown
    in [Listing 3-38](#Chapter03.html#list_3_38).


    **Listing 3-38.** Wrap input components and the button inside `<a4j:region>`


    ```

    <h:form>

    <a4j:region>

          <h:panelGrid>

             …

             <h:commandButton value="Buy Flowers!">

                <a4j:ajax event="click" />

             </h:commandButton>

          </h:panelGrid>

    </a4j:region>

       <a4j:outputPanel ajaxRendered="true">

          <h:panelGrid>

             <h:outputText value="#{flowerRegionBean.type}" />

             <h:outputText value="#{flowerRegionBean.size}" />

             <h:outputText value="#{flowerRegionBean.vase}" />

          </h:panelGrid>

       </a4j:outputPanel>

    </h:form>

    ```


    This approach is more declarative, as you no longer need to specify which IDs
    to execute. Any Ajax request from within the region and all input components inside
    the region will be executed (unless other Ajax components or behaviors specify
    what components to execute explicitly, in which case they will override the region).
    When using a region, you can also use the `@region` keyword, as follows:


    ```

    <a4j:ajax event="click" execute="@region"/>

    ```


    This indicates to execute everything inside the region and is optional. Even if
    we don''t specify `@region`, as we did in our example, the region is executed
    by default.'
