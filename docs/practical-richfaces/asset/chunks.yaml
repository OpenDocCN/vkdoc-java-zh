- fmt: "### Redefining Parts of a Component Using Facets\n\nLet's start with the popular\
    \ tab panel component, which is shown in [Figure 4-3](#Chapter04.html#fig_4_3).\n\
    \n![images](images/0403.jpg)\n\n***Figure 4-3.** Rich tab panel*\n\nThe JSF page\
    \ code is shown in [Listing 4-1](#Chapter04.html#list_4_1).\n\n***Listing 4-1.**\
    \ The JSF page code*\n\n```\n<h:form>\n   <rich:tabPanel style=\"width:40%\" switchType=\"\
    ajax\">\n      <rich:tab header=\"San Francisco\">\n         <h:outputText value=\"\
    San Francisco is a major city in northern California, on the\n            West\
    \ Coast of\n            the United States\" />\n      </rich:tab>\n      <rich:tab\
    \ header=\"Los Angeles\">\n         <h:outputText value=\"Los Angeles is a major\
    \ city in southern California, on the\n            West Coast of    \n       \
    \     the United States\" />\n      </rich:tab>\n      <rich:tab header=\"New\
    \ York City\">\n         <h:outputText value=\"New York City is a major city on\
    \ the East Coast of the United\nStates\" />\n         </rich:tab>\n   </rich:tabPanel>\n\
    </h:form>\n```\n\n`<rich:tabPanel>` is a container for one or more `<rich:tab>`\
    \ components. You can place any content or components inside each tab. The header\
    \ for each tab is defined by the `header` attribute. This is good, but what if\
    \ you wanted to put an image of the city or the city flag next to the name? Using\
    \ the `header` attribute, we can't really do it, as we are limited only to text.\n\
    \nHow can we do it? Luckily, the component (and many other rich components) provides\
    \ facets so that we can redefine some parts of the component with any content;\
    \ and in our case that would be the header. Using a facet called `header`, we\
    \ can redefine each tab header with images, text, or really anything we want.\
    \ We are no longer limited by text. Before we move on, notice that we also set\
    \ the `switchType` attribute to `ajax`, which is also the default value. You can\
    \ also set `switchType` to `client` or `server` switching modes.\n\nLet's add\
    \ the city flag for each city to its header, as shown in [Figure 4-4](#Chapter04.html#fig_4_4).\n\
    \n![images](images/0404.jpg)\n\n***Figure 4-4.** Rich tab panel with images in\
    \ tab headers*\n\nThe updated JSF page is shown in [Listing 4-2](#Chapter04.html#list_4_2).\n\
    \n***Listing 4-2.** The updated JSF page*\n\n```\n<h:form>\n   <rich:tabPanel\
    \ style=\"width:40%\" switchType=\"ajax\">\n      <rich:tab>\n         <f:facet\
    \ name=\"header\">\n            <h:panelGrid columns=\"2\">\n               <h:outputText\
    \ value=\"San Francisco\" />\n               <h:graphicImage value=\"/images/sf_flag.png\"\
    \ height=\"25\" width=\"25\" />\n           </h:panelGrid>\n         </f:facet>\n\
    \         <h:outputText value=\"San Francisco is a major city in northern California,\
    \ on the\n            West Coast of\n            the United States\" />\n    \
    \  </rich:tab>\n      <rich:tab>\n         <f:facet name=\"header\">\n       \
    \     <h:panelGrid columns=\"2\">\n               <h:outputText value=\"Los Angeles\"\
    \ />\n               <h:graphicImage value=\"/images/la_flag.png\" height=\"25\"\
    \ width=\"25\" />\n            </h:panelGrid>\n         </f:facet>\n         <h:outputText\
    \ value=\"Los Angeles is a major city in southern California, on the\n       \
    \     West Coast of\n            the United States\" />\n      </rich:tab>\n \
    \     <rich:tab>\n         <f:facet name=\"header\">\n            <h:panelGrid\
    \ columns=\"2\">\n               <h:outputText value=\"New York City\" />\n  \
    \             <h:graphicImage value=\"/images/nyc_flag.png\" height=\"25\" width=\"\
    25\" />\n            </h:panelGrid>\n         </f:facet>\n         <h:outputText\
    \ value=\"New York City is a major city on the East Coast of the United\nStates\"\
    \ />\n         </rich:tab>\n   </rich:tabPanel>\n</h:form>\n```\n\nIf you look\
    \ closely at [Listing 4-2](#Chapter04.html#list_4_2), we have added a facet named\
    \ `header`. Inside the facet we placed the city name and city flag image. It's\
    \ also important to mention that both the city name and the city flag image are\
    \ inside a panel grid. The JSF facet can only have one child. If we want to include\
    \ more than one component, we need to wrap them inside a container. We used `<h:panelGrid>`,\
    \ we could have also used `<h:panelGroup>`. Using the `header` facet, we are able\
    \ to define the header for each tab with any content; we are no longer limited\
    \ to just text. In addition to the `header` facet, `<rich:tab>` panel provides\
    \ other facets. The complete list of facets is shown in [Table 4-1](#Chapter04.html#tab_4_1).\n\
    \n![images](images/t0401.jpg)\n\nHow do you find which facets are available? The\
    \ best place to learn this is the RichFaces components guide. You can find it\
    \ by visiting [`www.jboss.org/richfaces/docs`](http://www.jboss.org/richfaces/docs).\n\
    \nMany other RichFaces components offer various facets that allow you to redefine\
    \ various parts of the component."
