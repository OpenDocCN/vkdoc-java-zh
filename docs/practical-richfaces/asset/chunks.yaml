    请注意，我们在 `<rich:dataTable>` 中使用了 `sortPriority` 属性。该属性应绑定到一个列 ID 的集合。它用于定义执行排序的顺序。因此，该集合中
    ID 的顺序将决定列排序的顺序。图 7-27 显示了先按国家排序，再按城市排序后的结果。请注意，城市现在也根据其所属国家进行了排序。


