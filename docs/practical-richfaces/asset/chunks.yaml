    网站以获取更新。    ## 第 9 章    ## 丰富的树组件    树是表示分层数据的理想组件。它们是任何 UI 库中最流行的复杂组件之一（可能仅次于表格）。树对于构建菜单、构建分层过滤器等非常有用。RichFaces
    树组件提供了以树状结构表示数据所需的一切。本章将解释基础知识，并使用 RichFaces 树组件提供高级示例。    ### 使用 <rich:tree>    `<rich:tree>`
    是一个通用组件的实现，旨在显示分层数据。与任何其他 JSF 迭代组件一样，它必须绑定到一个为树提供数据的模型。图 9-1 展示了树组件的实际应用。  ![images](img/0901.jpg)  ***图
