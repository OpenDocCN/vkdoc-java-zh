    representation using a set of nested <rich:treeNode> tags*  `<rich:tree value="#{typifiedRichFacesTreeNodeBean.rootNode}"
    var="node"` **`nodeType="#{node.type}"`** `   toggleType="client" selectionType="client">`
    `<rich:treeNode` **`type="NODE"`**`>` `      <h:outputText value="#{node.data}"
    />` `   </rich:treeNode>` `<rich:treeNode` **`type="LEAF"`**`>` `      <h:outputLink
    value="#">` `         #{node.data}` `      </h:outputLink>` `   </rich:treeNode>`
    `</rich:tree>`  And finally, [Figure 9-5](#Chapter09.html#fig_9_5) shows the result.
    Notice the links rendered at the second level opposite the plain text labels at
