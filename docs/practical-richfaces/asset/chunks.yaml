    `               OpenFile}"` `               render="menu" />` `            <rich:menuItem
    label="Close" actionListener="#{dropDownBean.listenerClose}"` `               render="menu"
    />` `            <rich:menuItem label="Close All" actionListener="#{dropDownBean.listenerCloseAll}"`
    `               render="menu" />` `         </rich:dropDownMenu>` `         <rich:dropDownMenu
    label="Edit" mode="ajax">` `            <rich:menuItem label="Undo" actionListener="#{dropDownBean.listenerUndo}"`
    `               render="menu" />` `         </rich:dropDownMenu>` `         <rich:dropDownMenu
