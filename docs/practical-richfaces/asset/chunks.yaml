- fmt: "### Using `<rich:extendedDataTable>`\n\nThe `<rich:extendedDataTable>` component\
    \ basically works just like `<h:dataTable>` and `<rich:dataTable>`. But, just\
    \ based on its name, it adds a set of additional features to the standard implementation.\
    \ The component provides vertical and horizontal scrolling for table body parts,\
    \ frozen columns on the left side, lazy loading via Ajax while using vertical\
    \ scroll, columns resizing and reordering, and selection features. That sounds\
    \ pretty good for an out-of-the-box table component. So, let’s start with a basic\
    \ example and then we’ll describe the features in more details.\n\nWe will use\
    \ the same code as the first example of `<rich:dataTable>`, but will change the\
    \ table tag to create an extended table. [Figure 7-7](#Chapter07.html#fig_7_7)\
    \ shows the result.\n\n![images](images/0707.jpg)\n\n***Figure 7-7.** Extended\
    \ data table*\n\n[Listing 7-13](#Chapter07.html#list_7_13) shows almost the same\
    \ code that we used in the very first `<rich:dataTable>` example.\n\n***Listing\
    \ 7-13.** Creating an extended data table*\n\n```\n<rich:panel style=\"width:1000px\"\
    >\n   <rich:extendedDataTable value=\"#{olympicGamesBean.games}\" var=\"game\"\
    >\n      <f:facet name=\"header\">Olympic Games List</f:facet>\n      <rich:column>\n\
    \         <f:facet name=\"header\">Flag</f:facet>\n            <h:graphicImage\
    \ value=\"#{game.flagURI}\" />\n      </rich:column>\n      <rich:column>\n  \
    \       <f:facet name=\"header\">City</f:facet>\n            #{game.city}\n  \
    \    </rich:column>\n         <!--Other columns-->\n   </rich:extendedDataTable>\n\
    </rich:panel>\n```\n\nThat’s it! There is really nothing specific that you need\
    \ to know to start using this component.\n\nLet’s review features one by one,\
    \ starting with the column resize feature. As you probably noticed in [Figure\
    \ 7-7](#Chapter07.html#fig_7_7), there are additional empty spaces on the right\
    \ side. The reason for this is pretty simple. The feature to resize columns is\
    \ always enabled for the component; every column has a default width if it not\
    \ set explicitly. The table can be stretched to its parent element width (1000\
    \ pixels in our case). The remaining space is reserved with an empty column, without\
    \ any styling, to be used if you try to resize any column. Resize is performed\
    \ by a drag-and-drop of the column header.\n\n![images](images/square.jpg) **Note**\
    \ If we decrease the panel width, we will see columns on the right become hidden\
    \ behind the panel border. That’s how the component works; the table gets stretched\
    \ to the parent element size only until the sum of all the columns’ width is not\
    \ wider than the parent element, and then the table enlarges to fit them all.\
    \ One solution is to set a smaller width for some concrete columns. But, if they\
    \ are later resized by the user, the right columns become hidden again as the\
    \ table width enlarges. The scrolling feature should be activated in this case.\n\
    \nLet’s move on to the scrolling feature. The only options you need to specify\
    \ on this component are the width and height attributes. The defined size attribute\
    \ made the corresponding scroll active on the component. Let’s review the example.\
    \ We will decrease the wrapper panel and at the same time define the table size\
    \ to fit that panel. The code shown in [Listing 7-14](#Chapter07.html#list_7_14).\n\
    \n***Listing 7-14.** Using the scrolling feature*\n\n```\n<rich:panel style=\"\
    width:650px\" header=\"rich:extendedDataTable sample\">\n   <rich:extendedDataTable\
    \ value=\"#{olympicGamesBean.games}\" var=\"game\" style=\"height:200px;width:620px;\"\
    >\n      <f:facet name=\"header\">Olympic Games List</f:facet>\n      <rich:column>\n\
    \         <f:facet name=\"header\">Flag</f:facet>\n            <h:graphicImage\
    \ value=\"#{game.flagURI}\" />\n      </rich:column>\n      <rich:column>\n  \
    \       <f:facet name=\"header\">City</f:facet>\n            #{game.city}\n  \
    \    </rich:column>\n      <!--Other columns-->\n   </rich:extendedDataTable>\n\
    </rich:panel>\n```\n\n[Figure 7-8](#Chapter07.html#fig_7_8) shows the result.\n\
    \n![images](images/0708.jpg)\n\n***Figure 7-8.** Extended data table*\n\nUsing\
    \ this code makes all the table data load on the client side and scroll without\
    \ any additional data fetching. But, for large data sets it’s not a good idea\
    \ because it will greatly decrease performance. So, the next feature we are going\
    \ to cover is lazy Ajax loading of rows while performing vertical scrolling. In\
    \ order to use this feature we should define only one attribute, `clientRows`.\
    \ The standard `rows` attribute determines the number of rows loaded on the client\
    \ and allows you to implement pagination with external controls. The `clientRows`\
    \ attribute tells the component the number of rows that should be preloaded on\
    \ the client, and the number loaded after a vertical scroll. The following is\
    \ a simple example:\n\n```\n<rich:extendedDataTable value=\"#{olympicGamesBean.games}\"\
    \ var=\"game\"\nstyle=\"height:200px; width:620px;\" clientRows=\"20\">\n```\n\
    \nOnly 20 rows will be loaded while the component initially renders and when the\
    \ vertical scroll position is changed. The next 20 rows corresponding to scroll\
    \ position will be fetched via Ajax.\n\n![images](images/square.jpg) **Note**\
    \ As any other component that performs an Ajax request, `<rich:extendedDataTable>`\
    \ requires `<h:form>` around it when Ajax lazy loading is used.\n\nThe ability\
    \ to define the number of columns on the right as “fixed” or “frozen” is another\
    \ feature. The `frozenColumns` attribute set to a number means that that number\
    \ of columns will not be affected by horizontal scrolling. Let’s look at the following\
    \ example:\n\n```\n<rich:extendedDataTable value=\"#{olympicGamesBean.games}\"\
    \ var=\"game\"\nfrozenColumns=\"2\" style=\"height:200px; width:620px;\" clientRows=\"\
    20\">\n```\n\nThis makes the table scroll horizontally, as illustrated in [Figure\
    \ 7-9](#Chapter07.html#fig_7_9). Notice that the columns flag and the city are\
    \ still visible as the first two columns, even though the other columns scrolled.\n\
    \n![images](images/0709.jpg)\n\n***Figure 7-9.** Extended data table with “frozen”\
    \ columns*\n\nThe last unique feature of the `<rich:extendedDataTable>` is rows\
    \ selection. It’s controlled by the set of attributes shown in [Table 7-3](#Chapter07.html#tab_7_3).\n\
    \n![images](images/t0703.jpg)\n\nLooking at the default value for the `selectionMode`\
    \ attribute, the selection feature is turned on by default and multiple rows could\
    \ be selected by using the SHIFT and CTRL keys together with row clicks.\n\nLet’s\
    \ review the selection example. The page code is in [Listing 7-15](#Chapter07.html#list_7_15).\n\
    \n***Listing 7-15.** Using the selection feature*"
  raw: '### Using <rich:extendedDataTable>


    The `<rich:extendedDataTable>` component basically works just like `<h:dataTable>`
    and `<rich:dataTable>`. But, just based on its name, it adds a set of additional
    features to the standard implementation. The component provides vertical and horizontal
    scrolling for table body parts, frozen columns on the left side, lazy loading
    via Ajax while using vertical scroll, columns resizing and reordering, and selection
    features. That sounds pretty good for an out-of-the-box table component. So, let’s
    start with a basic example and then we’ll describe the features in more details.


    We will use the same code as the first example of `<rich:dataTable>`, but will
    change the table tag to create an extended table. [Figure 7-7](#Chapter07.html#fig_7_7)
    shows the result.


    ![images](images/0707.jpg)


    ***Figure 7-7.** Extended data table*


    [Listing 7-13](#Chapter07.html#list_7_13) shows almost the same code that we used
    in the very first `<rich:dataTable>` example.


    ***Listing 7-13.** Creating an extended data table*


    `<rich:panel style="width:1000px">`

    `   <rich:extendedDataTable value="#{olympicGamesBean.games}" var="game">`

    `      <f:facet name="header">Olympic Games List</f:facet>`

    `      <rich:column>`

    `         <f:facet name="header">Flag</f:facet>`

    `            <h:graphicImage value="#{game.flagURI}" />`

    `      </rich:column>`

    `      <rich:column>`

    `         <f:facet name="header">City</f:facet>`

    `            #{game.city}`

    `      </rich:column>`

    `         <!--Other columns-->`

    `   </rich:extendedDataTable>`

    `</rich:panel>`


    That’s it! There is really nothing specific that you need to know to start using
    this component.


    Let’s review features one by one, starting with the column resize feature. As
    you probably noticed in [Figure 7-7](#Chapter07.html#fig_7_7), there are additional
    empty spaces on the right side. The reason for this is pretty simple. The feature
    to resize columns is always enabled for the component; every column has a default
    width if it not set explicitly. The table can be stretched to its parent element
    width (1000 pixels in our case). The remaining space is reserved with an empty
    column, without any styling, to be used if you try to resize any column. Resize
    is performed by a drag-and-drop of the column header.


    ![images](images/square.jpg) **Note** If we decrease the panel width, we will
    see columns on the right become hidden behind the panel border. That’s how the
    component works; the table gets stretched to the parent element size only until
    the sum of all the columns’ width is not wider than the parent element, and then
    the table enlarges to fit them all. One solution is to set a smaller width for
    some concrete columns. But, if they are later resized by the user, the right columns
    become hidden again as the table width enlarges. The scrolling feature should
    be activated in this case.


    Let’s move on to the scrolling feature. The only options you need to specify on
    this component are the width and height attributes. The defined size attribute
    made the corresponding scroll active on the component. Let’s review the example.
    We will decrease the wrapper panel and at the same time define the table size
    to fit that panel. The code shown in [Listing 7-14](#Chapter07.html#list_7_14).


    ***Listing 7-14.** Using the scrolling feature*


    `<rich:panel style="width:650px" header="rich:extendedDataTable sample">`

    `   <rich:extendedDataTable value="#{olympicGamesBean.games}" var="game" style="`**`height:200px;`**

    **`width:620px;`**`">`

    `      <f:facet name="header">Olympic Games List</f:facet>`

    `      <rich:column>`

    `         <f:facet name="header">Flag</f:facet>`

    `            <h:graphicImage value="#{game.flagURI}" />`

    `      </rich:column>`

    `      <rich:column>`

    `         <f:facet name="header">City</f:facet>`

    `            #{game.city}`

    `      </rich:column>`

    `      <!--Other columns-->`

    `   </rich:extendedDataTable>`

    `</rich:panel>`


    [Figure 7-8](#Chapter07.html#fig_7_8) shows the result.


    ![images](images/0708.jpg)


    ***Figure 7-8.** Extended data table*


    Using this code makes all the table data load on the client side and scroll without
    any additional data fetching. But, for large data sets it’s not a good idea because
    it will greatly decrease performance. So, the next feature we are going to cover
    is lazy Ajax loading of rows while performing vertical scrolling. In order to
    use this feature we should define only one attribute, `clientRows`. The standard
    `rows` attribute determines the number of rows loaded on the client and allows
    you to implement pagination with external controls. The `clientRows` attribute
    tells the component the number of rows that should be preloaded on the client,
    and the number loaded after a vertical scroll. The following is a simple example:


    `<rich:extendedDataTable value="#{olympicGamesBean.games}" var="game"`

    `style="height:200px; width:620px;"` **`clientRows="20"`**`>`


    Only 20 rows will be loaded while the component initially renders and when the
    vertical scroll position is changed. The next 20 rows corresponding to scroll
    position will be fetched via Ajax.


    ![images](images/square.jpg) **Note** As any other component that performs an
    Ajax request, `<rich:extendedDataTable>` requires `<h:form>` around it when Ajax
    lazy loading is used.


    The ability to define the number of columns on the right as “fixed” or “frozen”
    is another feature. The `frozenColumns` attribute set to a number means that that
    number of columns will not be affected by horizontal scrolling. Let’s look at
    the following example:


    `<rich:extendedDataTable value="#{olympicGamesBean.games}" var="game"`

    **`frozenColumns="2"`** `style="height:200px; width:620px;" clientRows="20">`


    This makes the table scroll horizontally, as illustrated in [Figure 7-9](#Chapter07.html#fig_7_9).
    Notice that the columns flag and the city are still visible as the first two columns,
    even though the other columns scrolled.


    ![images](images/0709.jpg)


    ***Figure 7-9.** Extended data table with “frozen” columns*


    The last unique feature of the `<rich:extendedDataTable>` is rows selection. It’s
    controlled by the set of attributes shown in [Table 7-3](#Chapter07.html#tab_7_3).


    ![images](images/t0703.jpg)


    Looking at the default value for the selectionMode attribute, the selection feature
    is turned on by default and multiple rows could be selected by using the SHIFT
    and CTRL keys together with row clicks.


    Let’s review the selection example. The page code is in [Listing 7-15](#Chapter07.html#list_7_15).


    ***Listing 7-15.** Using the selection feature*'
