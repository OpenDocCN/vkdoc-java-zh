    we should add the popup to the page, as shown in [Listing 8-23](#Chapter08.html#list_8_23).    ***Listing
    8-23.** Adding the popup to the page*  `<rich:popupPanel id="about" header="About">`
    `   <h:outputText value="That popup opened from &lt;rich:panelMenuItem&gt; component.
    " />` `   <h:commandLink value="Hide" onclick="#{rich:component(''about'')}.hide();return
    false;"/>`  `</rich:popupPanel>`  The result of clicking the `About` menu item
    is shown in [Figure 8-18](#Chapter08.html#fig_8_18).  ![images](images/0818.jpg)  ***Figure
    8-18.** Popup panel opened from panel menu*    #### Using Panel Menu Components
    JavaScript API    `<rich:panelMenu>` provides JavaScript API, as shown in [Table
    8-4](#Chapter08.html#tab_8_4).    ![images](images/t0804.jpg)    `<rich:panelMenuGroup>`
    provides JavaScript API, as shown in [Table 8-5](#Chapter08.html#tab_8_5).    ![images](images/t0805.jpg)    `<rich:panelMenuItem>`
    provides only `select()` method, which is used to select an item.    ### Summary    This
    chapter covered various RichFaces menu components. We used them in different modes
    for calling some server-side actions and performing simple JavaScript calls. Any
    time a menu item fires an Ajax request, all the basic principles we covered for
    `<a4j:ajax>`, such as `render`, `execute`, and client queue usage, apply as well.    Even
    though `<rich:contextMenu>` is not available at the time of writing, it will surely
    be added in a future RichFaces release. Check the JBoss Community RichFaces site
    at [`www.jboss.org/richfaces`](http://www.jboss.org/richfaces) for updates.    ##
    C H A P T E R  9    ## Rich Tree Components    Trees are ideal components to represent
    hierarchical data. They are one of the most popular complex components in any
    UI library (probably next to tables). Trees are very useful for building menus,
    building hierarchical filters, and so on. RichFaces tree components provide everything
    you need to represent data in a tree-like structure. This chapter will explain
    the basics and provide advanced examples using RichFaces tree components.    ###
    Using <rich:tree>    `<rich:tree>` is an implementation of a common component
    designed to display hierarchical data. As any other JSF iteration component, it
    has to be bound to a model that provides the data for the tree. [Figure 9-1](#Chapter09.html#fig_9_1)
    shows the tree component in action.  ![images](images/0901.jpg)  ***Figure 9-1.**
    A simple RichFaces tree*    One thing to keep in mind is that this component can’t
    be designed in a static way simply from page code (putting a component on a page
    without binding to a model is usually possible with other components). The ability
    to place the component on a page without binding to a data model could be added
    to RichFaces in the future.    #### Creating a Tree Model Based on the Swing TreeNode
    Interface    Let’s start with data model creation. If you ever used Swing’s `javax.swing.tree.TreeNode`,
    then you already know how to create a model for the RichFaces tree component.
    Let’s start with Swing tree node support and explore RichFaces’ proprietary `org.richfaces.model.TreeNode`
    interface in upcoming sections.    ![images](images/square.jpg) **Note** If you
    have a project where data is organized using Swing’s TreeNode, you should be able
    to use the data and classes from the project here.    Let’s create a simple `SwingTreeNodeImpl`
    class that implements a `javax.swing.tree.TreeNode` interface. [Listing 9-1](#Chapter09.html#list_9_1)
    shows the class.    ***Listing 9-1.** Shows the class*  `public class SwingTreeNodeImpl
    implements TreeNode {` `   private List<SwingTreeNodeImpl> childNodes;` `   private
    String data;`  `   // Getters and setters`  `   public SwingTreeNodeImpl(String
    data) {` `      super();` `      this.data = data;` `   }` `   public void addChild(SwingTreeNodeImpl
    child) {` `      if (child != null) {` `         if (childNodes == null) {` `            childNodes
    = new ArrayList<SwingTreeNodeImpl>();` `         }` `         childNodes.add(child);`
    `      }` `   }` `   @Override` `   public TreeNode getChildAt(int childIndex)
    {` `      return (childNodes == null) ? null : childNodes.get(childIndex);` `   }`
    `   @Override` `   public int getChildCount() {` `      return (childNodes ==
    null) ? null : childNodes.size();` `   }` `   @Override` `   public TreeNode getParent()
    {` `      return null;` `   }` `   @Override` `   public int getIndex(TreeNode
    node) {` `      return (childNodes == null) ? null : childNodes.indexOf(node);`
    `   }` `   @Override` `   public boolean getAllowsChildren() {` `      return
    true;` `   }` `   @Override` `   public boolean isLeaf() {` `      return (childNodes
    == null);` `   }` `   @Override` `   public Enumeration children() {` `      return
    Iterators.asEnumeration(childNodes.iterator());` `   }` `   @Override` `   public
    String toString() {` `      return data;` `   }` `}`  If you are familiar with
    `TreeNode`, then this code should be self-explanatory. Every node has a list that
    stores child nodes and a simple string `data` field that contains information
    on that node. All other methods are implementation methods of the `TreeNode` interface
    and return all the needed information to process the node and allow data modifications.    ![images](images/square.jpg)
    **Note** Instead of implementing the Swing TreeNode, you can also extend the default
    `org.richfaces.model.SwingTreeNodeImpl<T>` implementation provided by RichFaces.    Now
    that we have covered tree node implementation, let''s look at [Listing 9-2](#Chapter09.html#list_9_2)
    to see how we can populate the tree shown in `SwingTreeNodeBean`.    ***Listing
    9-2.** Populate the tree shown in SwingTreeNodeBean*  `@ManagedBean` `@ViewScoped`
    `public class SwingTreeNodeBean {`  `   List<SwingTreeNodeImpl> rootNodes = null;`  `   public
    void initNodes() {` `      rootNodes = new ArrayList<SwingTreeNodeImpl>();` `      SwingTreeNodeImpl
    node = new SwingTreeNodeImpl("Desktop Type");` `      node.addChild(new SwingTreeNodeImpl("Compact"));`
    `      node.addChild(new SwingTreeNodeImpl("Everyday"));` `      node.addChild(new
    SwingTreeNodeImpl("Gaming"));` `      node.addChild(new SwingTreeNodeImpl("Premium"));`
    `      rootNodes.add(node);` `      node = new SwingTreeNodeImpl("Customer Reviews");`
    `      node.addChild(new SwingTreeNodeImpl("Top Rated"));` `      rootNodes.add(node);`
    `      node = new SwingTreeNodeImpl("Current Offers");` `      node.addChild(new
    SwingTreeNodeImpl("On Sale"));` `      node.addChild(new SwingTreeNodeImpl("Special
    Offers"));` `      node.addChild(new SwingTreeNodeImpl("Package Deals"));` `      node.addChild(new
    SwingTreeNodeImpl("Financing offers"));` `      node.addChild(new SwingTreeNodeImpl("Outlet
    Center"));` `      rootNodes.add(node);` `      node = new SwingTreeNodeImpl("Availability");`
    `      node.addChild(new SwingTreeNodeImpl("In store & Online"));` `      node.addChild(new
    SwingTreeNodeImpl("Online only"));` `      rootNodes.add(node);` `   }` `   public
    void setRootNodes(List<SwingTreeNodeImpl> rootNodes) {` `      this.rootNodes
    = rootNodes;` `   }` `   public List<SwingTreeNodeImpl> getRootNodes() {` `      if
    (rootNodes == null){` `         initNodes();` `      }` `      return rootNodes;`
    `   }` `}`  Now that we have the data initialized, let’s see the RichFaces tree
    in action. [Listing 9-3](#Chapter09.html#list_9_3) shows the page code for displaying
    the tree.    ***Listing 9-3.** Page code for displaying the tree*  `<h:form>`
    `   <rich:tree value="#{swingTreeNodeBean.rootNodes}" var="node" />` `</h:form>`  Pretty
    simple isn’t it? The tree rendered is shown in [Figure 9-2](#Chapter09.html#fig_9_2).  ![images](images/0902.jpg)  ***Figure
    9-2.** <rich:tree> built using Swing TreeNode*    Note that we don''t need to
    define any markup for tree nodes. The tree is rendered using default implementation
    and with the help of the `SwingTreeNodeImpl toString()` method, it returns a string
    value for the node name. That''s fine when you are just getting started, but still
    would like to have more flexibility in defining tree nodes such as binding to
    a different property in the node data model object.    #### Creating a Tree Model
    Based on the RichFaces TreeNode Interface    RichFaces also supports the `org.richfaces.model.TreeNode`
    interface and provides default implementation for this interface. [Listing 9-4](#Chapter09.html#list_9_4)
    shows the interface.    ***Listing 9-4.** The `org.richfaces.model.TreeNode` interface*  `public
    interface TreeNode {` `   public TreeNode getChild(Object key);` `   public int
    indexOf(Object key);` `   public Iterator<Object> getChildrenKeysIterator();`
    `   public boolean isLeaf();` `   public void addChild(Object key, TreeNode child);`
    `   public void insertChild(int idx, Object key, TreeNode child);` `   public
    void removeChild(Object key);` `}`  Assuming you already read about the RichFaces
    data iteration components in [Chapter 7](#Chapter07.html#ch7), you should notice
    the main difference between that interface and Swing’s. It uses a key–child node
    relation instead of an index–child node relation. It’s similar to the `<rich:dataTable>`
    row key–row data relation explained in the data models section in [Chapter 7](#Chapter07.html#ch7).
    As you remember, all the iteration components in RichFaces, including complex
    components like trees, use `ExtendedDataModel` as the base abstract model and
    uses `rowKey`s to identify the data in the model. That makes the components better
    integrated with the database layer. Actually, even when defining the Swing-based
    model you are still using ExtendedDataModel under the hood, as the tree automatically
    wraps your model to it.    Let''s return to the code. This time we will not work
    on all interface methods implementation. Instead we will extend default `TreeNodeImpl`
    implementation, as shown in [Listing 9-5](#Chapter09.html#list_9_5).    ***Listing
    9-5.** Extend default `TreeNodeImpl` implementation*  `public class RichFacesTreeNode
    extends TreeNodeImpl {`  `   private String data;`  `   public RichFacesTreeNode(String
    data) {` `      super();` `      this.data = data;` `   }` `   public String getData()
    {` `      return data;` `   }` `   public void setData(String data) {` `      this.data
    = data;` `   }` `   @Override` `   public String toString() {` `return` `data;`
    `   }` `}`  ![images](images/square.jpg) **Note** We will be using the RichFaces
    TreeNode object across all the samples in the remainder of the chapter.    [Listing
    9-6](#Chapter09.html#list_9_6) shows a bean in which we populate the tree. It
    looks very similar to the one we created using the Swing tree model.    ***Listing
    9-6.** Shows a bean used to populate the tree*  `@ManagedBean` `@ViewScoped` `public
