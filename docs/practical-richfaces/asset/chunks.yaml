    `      </h:panelGrid>`

    `      <h:outputText id="upper" value="#{ajaxStatusBean.text}" />`

    `   </h:panelGrid>`

    `</h:form>`


    In [Listing 3-56](#Chapter03.html#list_3_56), the status is placed inside the
    form, thus any other component activated inside this form will invoke (show) this
    status as well.


    The managed bean is shown in [Listing 3-57](#Chapter03.html#list_3_57).


    ***Listing 3-57.** The manage bean*


    `@ManagedBean`

    `@RequestScoped`

    `public class AjaxStatusBean {`


    `   private String text;`


    `   public void upperCase () {`

