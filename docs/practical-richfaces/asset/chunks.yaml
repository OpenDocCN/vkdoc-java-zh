    `<h:form>`

    `...`

    `   <a4j:commandButton value="Send" render="out"/>`

    `</h:form>`


    We went from three to just one line of code. It looks simpler and cleaner. There
    is one more difference we need to tell you about. Let''s rewrite this example
    using the `<a4j:commandButton>`, as shown in [Listing 3-8](#Chapter03.html#list_3_8).


    ***Listing 3-8.** Example using the `<a4j:commandButton>`*


    `<h:form>`

    `   <h:panelGrid columns="2">`

    `      <h:outputText value="Name:"/>`

    `      <h:inputText value="#{bean.name}"/>`

    `      <h:outputText value="Echo:"/>`

    `      <h:outputText id="echo" value="#{bean.name}"/>`

    `      <h:outputText value="Count:"/>`

    `      <h:outputText id="count" value="#{bean.count}"/>`

    `   </h:panelGrid>`

    `   <a4j:commandButton value="Submit" render="echo count" action="#{bean.countAction}"/>`

    `</h:form>`


    If you run the example in [Listing 3-8](#Chapter03.html#list_3_8), it will work
    as expected and notice that we didn''t have to specify the `execute` attribute.
    Because it is so common when using a button to also execute input fields inside
    the form, the `execute` in the `<a4j:commandButton>` (and `<a4j:commandLink>`)
    is set by default to `@form`. You can always overwrite the default value by using
    either a predefined value such as `@all`, ids, or EL, as shown in [Table 3-1](#Chapter03.html#tab_3_1).
    We also don''t need to set the event attribute. `<a4j:commandButton>` uses the
