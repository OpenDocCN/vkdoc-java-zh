    让我们看看如何使用 *`onevent`* 回调来添加自定义 JavaScript，以便在 Ajax 请求期间被调用。请记住，这些是客户端（浏览器）事件。首先，我们需要创建
    JavaScript 函数。我们可以将代码清单 2-46 放在 JSF 页面中 `<body>` 标签之后。


    ***代码清单 2-46.** 创建 JavaScript 函数*


    `<script>`

    `function ajaxRequestListener (event){`

    `   if (event.status == ''begin''){`

    `      if(!confirm(''您确定要更改颜色吗？'' + ''`

    `         (''+event.status+'')'')) {`

    `            form.reset();`

    `            return false;`

    `      }`

    `   }`

    `   else if (event.status == ''complete''){`

    `      alert(''即将进行 DOM 更新'' + '' (''+event.status+'')'');`

    `   }`

    `   else if (event.status == ''success''){`

    `        alert(''颜色已更改。我们早就告诉过您。'' + '' (''+event.status+'')'');`

    `   }`

    `}`


    `</script>`


    因为 `ajaxRequestListener` JavaScript 函数会在 *`begin`*、*`complete`* 和 *`success`*
    这三个时间点被调用三次，所以该函数包含三个 if 语句来分别处理每个事件。我们唯一需要做的就是将回调函数添加到 `<f:ajax>` 行为中，如代码清单 2-47
