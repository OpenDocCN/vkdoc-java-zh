- fmt: "# Events\n\nJSF takes you beyond the request/response paradigm and provides\
    \ a powerful event-based model. The UI components that you use to build the user\
    \ interface are sending events (when activated or clicked) to the server (browser\
    \ events such as click are mapped to server-side component events). Listeners\
    \ then process the events. For example, clicking a button (which is a UI component)\
    \ is an event that is processed by an appropriate listener. (The JSF event-based\
    \ model offers an approach to UI development similar to other user interface frameworks\
    \ such as Swing and Flex.)\n\nFor instance, in the `#{simpleBean.save}` expression\
    \ defined in an action attribute, `save` is a method inside `simpleBean` bean.\
    \ It is usually referred to as a JSF action and will be invoked when the button\
    \ is clicked:\n\n```\n<h:commandButton value=\"Submit\" action=\"#{simpleBean.save}\"\
    />\n```\n\nBefore we continue, you need to be familiar with the JSF life-cycle\
    \ phases shown in [Figure 1-5](#Chapter01.html#fig_1_5) and need to understand\
    \ what each phase does. We will be using this same diagram to show RichFaces concepts.\
    \ Make sure you understand what each phase does and what happens to the flow in\
    \ case of a conversion/validation error or when using the `immediate=\"true\"\
    ` attribute. Understanding the life cycle can also help with debugging your JSF\
    \ applications with phase listeners. You will be using a phase listener later\
    \ in this book. In case you need to brush up on JSF phases, this article at Javabeat\
    \ ([`www.javabeat.net/articles/54-request-processing-lifecycle-phases-in-jsf-1.html`](http://www.javabeat.net/articles/54-request-processing-lifecycle-phases-in-jsf-1.html))\
    \ is a good place to do that.\n\n![images](images/0105.jpg)\n\n**Figure 1-5.**\
    \ JSF life cycle\n\n# Ajax\n\nWhen JSF 1.x was developed, it didn't have any Ajax\
    \ features simply because Ajax didn't exist as we know it today. Luckily in 2006\
    \ RichFaces came along and made it very easy to add Ajax functionality to existing\
    \ or new JSF applications. For example, if you had a standard input text component\
    \ like the following:\n\n```\n<h:inputText value=\"#{order.amount}\"/>\n```\n\n\
    To send an Ajax request based on some event was very easy with RichFaces. All\
    \ you had to do is add the `<a4j:support>` tag, specify the event to fire the\
    \ Ajax request, and specify which components to re-render, as follows:\n\n```\n\
    <h:inputText value=\"#{order.amount}\">\n   <a4j:support event=\"onkeyup\" reRender=\"\
    id1\"/>\n</h:inputText/>\n<h:outputText value=\"#{order.total}\" id=\"id1\"/>\n\
    ```\n\nWhen JSF EG (Expert Group) started working on JSF version 2, they introduced\
    \ basic Ajax support into the specification. The Ajax behavior `<f:ajax>` in JSF\
    \ 2 is closely based on the popular RichFaces 3 `<a4j:support>` tag. Taking the\
    \ above example, adding Ajax support in JSF 2 is done like this:\n\n```\n<h:inputText\
    \ value=\"#{order.amount}\">\n   <f:ajax event=\"keyup\" render=\"id1\"/>\n</h:inputText/>\n\
    <h:outputText value=\"#{order.total}\" id=\"id1\"/>\n```\n\nThis example looks\
    \ very similar to the RichFaces 3 example. The obvious changes are the new behavior\
    \ (`<f:ajax>`), the event is specified without the *on*-part and instead of `reRender`,\
    \ the `render` attribute is used. However, the core Ajax concepts are very similar.\
    \ In addition to using `<f:ajax>` behavior, it's also possible to send an Ajax\
    \ request in a programmatic way, as follows:\n\n```\n<h:form id=\"form\">\n  \
    \ <h:commandButton id=\"button\" value=\"Update\"\nonclick=\"jsf.ajax.request(this,event,\
    \ {render:'form:out'}); ![Images](images/U001.jpg)\n      return false;\" />\n\
    \  <h:output Text value=\"#{timeBean.now}\" id=\"out\"/>\n</h:form>\n```\n\nEven\
    \ though basic, Ajax is now part of the JSF 2 standard. We will cover more `<f:ajax>`\
    \ features later in the book.\n\nBefore we tell you more about RichFaces, we must\
    \ ask: why would you use JSF? Well, the shortest answer is that (after a short\
    \ learning curve) JSF simplifies development. The basic purpose of any framework\
    \ is to simplify development by hiding the tasks that are common to any application.\
    \ JSF does exactly that. You don't have to worry anymore about how to get data\
    \ from the request or how to define navigation or convert values. JSF provides\
    \ all this and more out of the box. If all the plumbing is covered by the framework,\
    \ that leaves you more time to work on the actual application. Finally, a JSF\
    \ component approach makes it the perfect technology to be used with Ajax.\n\n\
    # An Overview of RichFaces\n\nIf you are wondering why we need RichFaces if there\
    \ is now Ajax functionality in JSF 2, it's because the Ajax functionality in JSF\
    \ 2 is very basic. You only get `<f:ajax>` behavior. That's not enough to build\
    \ real rich enterprise Ajax applications. That's exactly why you need RichFaces,\
    \ a rich framework for JSF. It consists of the following parts:\n\n*   Rich and\
    \ Ajax components divided into two tag libraries (`a4j:`, `rich:`)\n*   Skins\n\
    *   Client-side and object validation extension for Bean Validation (JSR 303)\n\
    *   CDK (Component Development Kit)\n\nBesides these main parts, RichFaces extends\
    \ the standard JSF 2 Ajax request queue, and adds various rendering optimization\
    \ attributes that we will cover in this book. A RichFaces application can also\
    \ be deployed in the cloud, to places such as GAE (Google Apps Engine), Amazon\
    \ EC2, and CloudBees, and OpenShift. RichFaces not only extends JSF, it makes\
    \ JSF richer. In fact, you can't use RichFaces without JSF. You use RichFaces\
    \ with either the Mojarra JSF (Oracle RI) implementation or the MyFaces implementation.\
    \ RichFaces simply provides ready-to-use Ajax components (and other features)\
    \ to enable building Ajax-based applications. Another way to look at it as extra\
    \ JSF components beyond what standard JSF provides. These components provide all\
    \ the necessary JavaScript, so you almost never have to work with JavaScript directly.\n\
    \n![images](images/square.jpg) **Note** Whenever we mention RichFaces, we always\
    \ refer to RichFaces version 4. RichFaces 3.x is based on JSF 1.2. RichFaces 3.3.3\
    \ supports JSF 1.2 and has very basic support for JSF 2. This version was introduced\
    \ for projects that needed to be deployed on a Java EE 6 application server, which\
    \ shipped with JSF 2 when RichFaces 4 wasn't yet available. Everything in this\
    \ book is based on RichFaces 4 version. Client-side validation is only available\
    \ starting with RichFaces 4.\n\n[Table 1-1](#Chapter01.html#tab_1_1) summarizes\
    \ JSF and RichFaces version compatibility.\n\n![Images](images/t0101.jpg)\n\n\
    ## RichFaces's Component Tag Libraries\n\nRichFaces components are divided into\
    \ two tag libraries: one tag library is called `a4j:`, and the other is called\
    \ `rich:`. The `a4j:` tag library provides page-level Ajax support and other utility\
    \ tags. It basically provides foundation-like controls where you decide how to\
    \ send a request, what to send to the server, and what to update. This approach\
    \ gives you a lot of power and flexibility. The `rich:` tag library provides rich\
    \ UI components. Rich components are anything beyond what the standard HTML tags\
    \ provide; for example, a tab panel. There is no standard JSF nor HTML tag for\
    \ a tab panel, so RichFaces provides one that makes it a rich component (beyond\
    \ out-of-the-box HTML). Many rich components also have built-in Ajax support.\
    \ These components fire an Ajax request and do partial page updates automatically.\
    \ And most of them support pluggable and customizable Ajax behavior using `a4j:`\
    \ tags.\n\n## RichFaces Skins\n\nAnother major feature is skins. Any number of\
    \ skins (defined via a property file) can be created with different color schemes.\
    \ When a particular skin is set, component renderers will refer to that skin and\
    \ generate colors and styles based on that skin. This means you can easily change\
    \ the look and feel of the whole application by simply switching to a different\
    \ skin. Skins can be customized, created, and overwritten on a CSS level. We have\
    \ dedicated [Chapter 12](#Chapter12.html#ch12) to this topic."
  raw: '#### Events


    JSF takes you beyond the request/response paradigm and provides a powerful event-based
    model. The UI components that you use to build the user interface are sending
    events (when activated or clicked) to the server (browser events such as click
    are mapped to server-side component events). Listeners then process the events.
    For example, clicking a button (which is a UI component) is an event that is processed
    by an appropriate listener. (The JSF event-based model offers an approach to UI
    development similar to other user interface frameworks such as Swing and Flex.)


    For instance, in the *`#{simpleBean.save}`* expression defined in an action attribute,
    *`save`* is a method inside *`simpleBean`* bean. It is usually referred to as
    a JSF action and will be invoked when the button is clicked:


    `<h:commandButton value="Submit" action="#{simpleBean.save}"/>`


    Before we continue, you need to be familiar with the JSF life-cycle phases shown
    in [Figure 1-5](#Chapter01.html#fig_1_5) and need to understand what each phase
    does. We will be using this same diagram to show RichFaces concepts. Make sure
    you understand what each phase does and what happens to the flow in case of a
    conversion/validation error or when using the `immediate="true"` attribute. Understanding
    the life cycle can also help with debugging your JSF applications with phase listeners.
    You will be using a phase listener later in this book. In case you need to brush
    up on JSF phases, this article at Javabeat ([`www.javabeat.net/articles/54-request-processing-lifecycle-phases-in-jsf-1.html`](http://www.javabeat.net/articles/54-request-processing-lifecycle-phases-in-jsf-1.html))
    is a good place to do that.


    ![images](images/0105.jpg)


    ***Figure 1-5.** JSF life cycle*


    #### Ajax


    When JSF 1.x was developed, it didn''t have any Ajax features simply because Ajax
    didn''t exist as we know it today. Luckily in 2006 RichFaces came along and made
    it very easy to add Ajax functionality to existing or new JSF applications. For
    example, if you had a standard input text component like the following:


    *`<h:inputText value="#{order.amount}"/>`*


    To send an Ajax request based on some event was very easy with RichFaces. All
    you had to do is add the *`<a4j:support>`* tag, specify the event to fire the
    Ajax request, and specify which components to re-render, as follows:


    *`<h:inputText value="#{order.amount}">`*

    *`   <a4j:support event="onkeyup" reRender="id1"/>`*

    *`</h:inputText/>`*

    *`<h:outputText value="#{order.total}" id="id1"/>`*


    When JSF EG (Expert Group) started working on JSF version 2, they introduced basic
    Ajax support into the specification. The Ajax behavior `<f:ajax>` in JSF 2 is
    closely based on the popular RichFaces 3 `<a4j:support>` tag. Taking the above
    example, adding Ajax support in JSF 2 is done like this:


    *`<h:inputText value="#{order.amount}">`*

    *`   <f:ajax event="keyup" render="id1"/>`*

    *`</h:inputText/>`*

    *`<h:outputText value="#{order.total}" id="id1"/>`*


    This example looks very similar to the RichFaces 3 example. The obvious changes
    are the new behavior (`<f:ajax>`), the event is specified without the *on*-part
    and instead of reRender, the *`render`* attribute is used. However, the core Ajax
    concepts are very similar. In addition to using `<f:ajax>` behavior, it''s also
    possible to send an Ajax request in a programmatic way, as follows:


    `<h:form id="form">`

    `   <h:commandButton id="button" value="Update"`

    `onclick="jsf.ajax.request(this,event, {render:''form:out''});` ![Images](images/U001.jpg)

    `      return false;" />`

    `  <h:output Text value="#{timeBean.now}" id="out"/>`

    `</h:form>`


    Even though basic, Ajax is now part of the JSF 2 standard. We will cover more
    `<f:ajax>` features later in the book.


    Before we tell you more about RichFaces, we must ask: why would you use JSF? Well,
    the shortest answer is that (after a short learning curve) JSF simplifies development.
    The basic purpose of any framework is to simplify development by hiding the tasks
    that are common to any application. JSF does exactly that. You don''t have to
    worry anymore about how to get data from the request or how to define navigation
    or convert values. JSF provides all this and more out of the box. If all the plumbing
    is covered by the framework, that leaves you more time to work on the actual application.
    Finally, a JSF component approach makes it the perfect technology to be used with
    Ajax.


    ### An Overview of RichFaces


    If you are wondering why we need RichFaces if there is now Ajax functionality
    in JSF 2, it''s because the Ajax functionality in JSF 2 is very basic. You only
    get `<f:ajax>` behavior. That''s not enough to build real rich enterprise Ajax
    applications. That''s exactly why you need RichFaces, a rich framework for JSF.
    It consists of the following parts:


    *   Rich and Ajax components divided into two tag libraries (`a4j:`, `rich:`)

    *   Skins

    *   Client-side and object validation extension for Bean Validation (JSR 303)

    *   CDK (Component Development Kit)


    Besides these main parts, RichFaces extends the standard JSF 2 Ajax request queue,
    and adds various rendering optimization attributes that we will cover in this
    book. A RichFaces application can also be deployed in the cloud, to places such
    as GAE (Google Apps Engine), Amazon EC2, and CloudBees, and OpenShift. RichFaces
    not only extends JSF, it makes JSF richer. In fact, you can''t use RichFaces without
    JSF. You use RichFaces with either the Mojarra JSF (Oracle RI) implementation
    or the MyFaces implementation. RichFaces simply provides ready-to-use Ajax components
    (and other features) to enable building Ajax-based applications. Another way to
    look at it as extra JSF components beyond what standard JSF provides. These components
    provide all the necessary JavaScript, so you almost never have to work with JavaScript
    directly.


    ![images](images/square.jpg) **Note** Whenever we mention RichFaces, we always
    refer to RichFaces version 4\. RichFaces 3.x is based on JSF 1.2. RichFaces 3.3.3
    supports JSF 1.2 and has very basic support for JSF 2. This version was introduced
    for projects that needed to be deployed on a Java EE 6 application server, which
    shipped with JSF 2 when RichFaces 4 wasn''t yet available. Everything in this
    book is based on RichFaces 4 version. Client-side validation is only available
    starting with RichFaces 4.


    [Table 1-1](#Chapter01.html#tab_1_1) summarizes JSF and RichFaces version compatibility.


    ![Images](images/t0101.jpg)


    #### RichFaces''s Component Tag Libraries


    RichFaces components are divided into two tag libraries: one tag library is called
    `a4j:`, and the other is called `rich:`. The `a4j:` tag library provides page-level
    Ajax support and other utility tags. It basically provides foundation-like controls
    where you decide how to send a request, what to send to the server, and what to
    update. This approach gives you a lot of power and flexibility. The `rich:` tag
    library provides rich UI components. Rich components are anything beyond what
    the standard HTML tags provide; for example, a tab panel. There is no standard
    JSF nor HTML tag for a tab panel, so RichFaces provides one that makes it a rich
    component (beyond out-of-the-box HTML). Many rich components also have built-in
    Ajax support. These components fire an Ajax request and do partial page updates
    automatically. And most of them support pluggable and customizable Ajax behavior
    using `a4j:` tags.


    #### RichFaces Skins


    Another major feature is skins. Any number of skins (defined via a property file)
    can be created with different color schemes. When a particular skin is set, component
    renderers will refer to that skin and generate colors and styles based on that
    skin. This means you can easily change the look and feel of the whole application
    by simply switching to a different skin. Skins can be customized, created, and
    overwritten on a CSS level. We have dedicated [Chapter 12](#Chapter12.html#ch12)
    to this topic.'
