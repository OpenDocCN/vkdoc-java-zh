    API，将 `Range` 中的参数设置为条件参数（要获取的第一个对象索引和应获取的对象数量）。获取结果后，我们将其与当前的 `Range` 对象一起缓存在会话中。    最后，我们遍历刚刚获得的结果集，调用
    `Visitor` 的 `process()` 方法。    ![images](img/square.jpg) **注意** 传递给访问者的 `rowKey`
