    like `onrowclick`, onrowdblclick, and other like events.


    As we will only add `<rich:dataTable>` attributes, let’s look through the table
    definition in [Listing 7-7](#Chapter07.html#list_7_7). All the columns remain
    unchanged.


    ***Listing 7-7.** Adding <rich:dataTable> attributes*


    `<style>`

    `   .odd{`

    `      background-color: #{richSkin.additionalBackgroundColor};`

    `   }`

    `   .even{`

    `      background-color: #{richSkin.tableSubHeaderBackgroundColor};`

    `   }`

    `   .cityColumn{`

    `      font-weight:bold;`

    `   }`

    `</style>`


    `<rich:panel style="width:650px" header="rich:dataTable sample">`

    `   <rich:dataTable value="#{olympicGamesBean.games}" var="game" rowClasses="odd,
    even"`

    `      columnClasses=",cityColumn" onrowmouseover="this.style.fontWeight=''bold''"`

    `      onrowmouseout="this.style.fontWeight=''normal''">`

    `      ...`

    `   </rich:dataTable>`

    `</rich:panel>   `


    The result is shown in [Figure 7-2](#Chapter07.html#fig_7_2). Notice that the
    `rowClasses` attribute changed the backgrounds in both odd and even columns. That’s
    a standard attribute and applies comma-separated class names sequentially to corresponding
    row elements. Also, `columnClasses` defines the second-column style class.


    Finally, we are using two row event handlers—`onrowmouseout` and `onrowmouseover`—which
    are actually similar to standard HTML `onmouseover` and `onmouseout`, but define
    handlers for corresponding events on every component row. The handlers change
    all the cell fonts of the hovered row to bold and then back to normal (not bold)
    when the mouse leaves the row.


    ![images](images/0702.jpg)


    ***Figure 7-2.** Rich data table with column styling and row hover events*


    Now let’s review the last and most interesting attribute related to CSS styling.
    `rowClass` is an attribute specific to RichFaces tables. It gets evaluated during
    iteration opposite to `rowClasses`, which gets evaluated prior to iterating the
    data model, so it can’t be dynamically populated according to the model.


    Let’s change the background color of canceled game rows to the red. The code that
    adds such functionality is shown in [Listing 7-8](#Chapter07.html#list_7_8).


    ***Listing 7-8.** Changing the cancelled game row background color to red*


    `.red{`

    `    color:red;`

    `}`

    `</style>`

    `<rich:panel style="width:650px" header="rich:dataTable sample">`

    `    <rich:dataTable value="#{olympicGamesBean.games}" var="game"`

    `        rowClasses="odd, even" columnClasses="cityColumn"`

    `        onrowmouseover="this.style.fontWeight=''bold''"`

    `        onrowmouseout="this.style.fontWeight=''normal''"`

    `        rowClass="#{game.status == ''canceled'' ? ''red'' : ''''}">`


    [Figure 7-3](#Chapter07.html#fig_7_3) shows the result.


    ![images](images/0703.jpg)


    ***Figure 7-3.** Rich data table with rows styled according to iteration data*


    That’s it. Now you could easily apply any class to the whole row. Other use-cases
    that could require that feature include Task, Issue, or E-mail tables where rows
    should be styled according to item importance. In the past, you had to add the
    same class to all columns; that was not as easily maintainable and also caused
    much more HTML code to be rendered in the table markup.


    #### Using Sub-Tables and Defining Complex Header Markups


    In real applications, you will often have to deal with much more complex table-based
    data representations. Your tables could require using columns and rows spanning,
    which is the ability to define complex header structures to properly add the table
    content descriptions. Luckily, the RichFaces `<rich:dataTable>` component allows
    you to define rich, master-details tables using nested sub-tables.


    Before we will start with the example, let us introduce the `<rich:collapsibleSubTable>`
    component. Used together with the `<rich:dataTable>`, it allows you to implement
    master-details tables of any complexity. It should be placed as either a child
    of `<rich:dataTable>` or `<rich:collapsibleSubTable>`, and iterate through a nested
    data model. And as you can probably guess, according to the name in RichFaces
    4, it provides collapse/expand features right out of the box. So let’s start with
    a simple example. The table we need to implement is shown in [Figure 7-4](#Chapter07.html#fig_7_4).


    ![images](images/0704.jpg)


    ***Figure 7-4.** Collapsible data table*


    Now, let’s review [Listing 7-9](#Chapter07.html#list_7_9), which shows the code
    used to create this table.


    ***Listing 7-9.** Collapsible data table*


    `<rich:dataTable value="#{olympicGamesBean.gamesMapKeys}" var="continent">`

    `   <f:facet name="header">`

    `      <rich:columnGroup>`

    `         <rich:column colspan="9">Games by Continent</rich:column>`

    `         <rich:column colspan="2" breakRowBefore="true"></rich:column>`

    `         <rich:column colspan="3">Place</rich:column>`

    `         <rich:column colspan="3">Dates</rich:column>`

    `         <rich:column>Notes</rich:column>`

    `         </rich:columnGroup>`

    `      </f:facet>`

    `      <rich:column colspan="9">#{continent}</rich:column>`

    `      <rich:collapsibleSubTable value="#{olympicGamesBean.gamesMap[continent]}"
    var="game">`

    `         <rich:column>`

    `            <f:facet name="header">Season</f:facet>`

    `               #{game.season}`

    `            </rich:column>`

    `         <rich:column>`

    `            <f:facet name="header">Number</f:facet>`

    `               #{game.number}`

    `         </rich:column>`

    `         <!--More columns-->`

    `   </rich:collapsibleSubTable>`

    `</rich:dataTable>`


    We added the code snippet shown in [Listing 7-10](#Chapter07.html#list_7_10) to
    `OlympicGamesBean` bean, previously shown in [Listing 7-5](#Chapter07.html#list_7_5).


    ***Listing 7-10.** Code snippet added to `OlympicGamesBean` bean*


    `private Map<String, List<GameDescriptor>> gamesMap;`


    `public Map<String, List<GameDescriptor>> getGamesMap(){`

    `   if (gamesMap==null){`

    `      gamesMap = new HashMap<String, List<GameDescriptor>>();`

    `      for (GameDescriptor game : games) {`

    `         List<GameDescriptor> gamesFromMap = gamesMap.get(game.getContinent());`

    `            if (gamesFromMap == null){`

    `               gamesFromMap = new ArrayList<GameDescriptor>();`

    `            }`

    `            gamesFromMap.add(game);`

    `            gamesMap.put(game.getContinent(), gamesFromMap);`

    `      }`

    `   }`

    `   return gamesMap;`

    `}`


    `public List<String> getGamesMapKeys(){`

    `   Map<String, List<GameDescriptor>> map = getGamesMap();`

    `   List<String> continents = new ArrayList<String>();`

    `   Iterator<String> it = map.keySet().iterator();`

    `   while (it.hasNext()){`

    `      continents.add(it.next());`

    `   }`

    `   Collections.sort(continents);`

    `   return continents;`

    `}`


    Let’s look at the header. The `<rich:columnGroup>` component is used to encode
    a set of columns into a row that wraps them in a separate `<tr>`. Using `colspan="9"`
    on the first column and `breakBefore="true"` on the second, we stretched the first
    cell to table width and had the next cell encode as a new row prior to rendering.
    Again using `colspan="3"`, we made the other cells group similar columns under
    common “Place” and “Dates” headers.'
