    clicked column header link into the map to which we mapped sort orders; or we
    revert it in case it is already there. The name that we are using on the page
    to get the sort order from the map passed with `<a4j:param>` tag. So, all the
    naming definitions are actually made at view level and we are using a constant
    to get the column name for sorting from the request variables.


