    清单 7-36 展示了 `SortingBean` bean，随后是对此示例的进一步说明。


    ***清单 7-36.** `SortingBean` bean*


    `@ManagedBean`

    `@ViewScoped`

    `public class SortingBean implements Serializable{`


    `   private Map<String, SortOrder> sortOrders = new HashMap<String, SortOrder>();`

    `   private static final String SORT_PROPERTY = "sortProperty";`


    `   // getters 和 setters`


    `   private void modifySortProperty(Map<String, SortOrder> orders, String sortProperty,
    SortOrder`

    `      currentOrder) {`

    `      if ((currentOrder == null) || (currentOrder == SortOrder.ascending)) {`

    `         orders.put(sortProperty, SortOrder.descending);`

    `      } else {`

    `         orders.put(sortProperty, SortOrder.ascending);`

    `      }`

    `   }`

    `   private String getSortProperty() {`

    `      String sortProperty = FacesContext.getCurrentInstance()    `

    `         .getExternalContext().getRequestParameterMap().get(SORT_PROPERTY);`

    `      return sortProperty;`

    `   }`

    `   public Comparator<GameDescriptor> getYearComparator() {`

    `      return new Comparator<GameDescriptor>() {`

    `         @Override`

    `         public int compare(GameDescriptor o1, GameDescriptor o2) {`

    `            return o1.getFromDate().compareTo(o2.getFromDate());`

    `         }`

    `      };`

    `   }`

    `   public void sort() {`

    `      String sortProperty = getSortProperty();`

    `      SortOrder currentOrder = sortOrders.get(sortProperty);`

    `      sortOrders.clear();`

    `      modifySortProperty(sortOrders, sortProperty, currentOrder);`

    `   }`

    `}`


    让我们从城市列开始回顾代码。我们添加了指向 `#{game.city}` 的 `sortOrder`，因此城市字符串值将用于排序。我们将 `sortOrder`
    属性指向 map 对象，并将其置于城市键下。实际上，这里可以使用任何键，并且你可以自由实现任何类型的对象来存储排序顺序。对于这个简单案例，我们只是使用了更便捷和简单的代码。


    接下来，我们添加了 `<a4j:commandLink>` 控件，它将执行一个 Ajax 请求来对表格进行排序。排序后整个表格会发生变化，因此我们将表格的
    id 添加到了该链接的 render 属性中。


    现在，让我们看看 Java 代码。我们将当前点击的列标题链接的 `sortOrder` 放入我们映射排序顺序的 map 中；如果该排序顺序已存在，则将其反转。我们在页面上使用的名称，用于从通过
    `<a4j:param>` 标签传递的 map 中获取排序顺序。因此，所有命名定义实际上都是在视图层完成的，我们使用一个常量从请求变量中获取用于排序的列名。


    国家列也使用了相同的简单定义。年份列则更有趣。我们可以将 `sortBy` 设置为年份属性，并依赖内置排序，因为我们希望当年份相同时，列排序能考虑月份和日期属性。为此，我们将添加一个比较器。对象（本例中为
    `#{game}`）被传入比较器，以便可以检查和比较任何属性。在我们的 bean 中，我们使用了默认的 Date 对象比较器方法，如下所示：


    `            return o1.getFromDate().compareTo(o2.getFromDate());`


    现在我们可以确信，只要年份相同，我们就会比较包含月份和日期的开始日期。


    图 7-26 展示了按年份排序后的结果。


    ![images](img/0726.jpg)


    ***图 7-26.** 使用年份属性进行表格排序*


    关于使用 `sortBy` 属性进行内置排序，有一点重要说明。在对字符串属性进行排序时，你可以使用 `Collator` 来执行本地化敏感的字符串比较。在这种情况下，只需在你的
    `web.xml` 应用程序中将 `org.richfaces.datatableUsesViewLocale` 上下文参数设置为 `true` 即可。

