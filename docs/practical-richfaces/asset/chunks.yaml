    When you run the above example, it''s not going to work because we forgot to modify
    the `execute` attribute on the `<f:ajax>` behavior. If you remember from [Chapter
    2](#Chapter02.html#ch2), the default `execute` value for `<f:ajax>` is `@this`.
    `@this` means only this (current) component will be executed and the input components
