    #### Table Filtering


    This section describes the basics of table filtering in RichFaces. We take a similar
    approach as the sorting section, showing the main, basic filtering features that
    can be applied to either `<rich:dataTable>` or `<rich:extendedDataTable>` components.
    We will cover a more complicated case in the “Iteration Components Advanced Models”
    section, including using a database based filtering.


    Analogous to sorting tables, filtering functionality can be implemented in two
    ways: using JavaScript API or using RichFaces action controls.


    ![images](images/square.jpg) **Note** Similar to sorting functionality, table
    components don’t provide built-in filtering controls. We will implement them using
    `<a4j:ajax>` and JavaScipt API. Make sure to follow the RichFaces Components Guide
    in order to learn when such built-in controls might become available.


    Let’s start with basic attributes that should be used for filtering implementation.
    We will then build two different examples.


    The first attribute is the `filterExpression`. It is an attribute on `<rich:column>`.
    For simple cases where a table’s built-in filtering is used, it should be set
    to an EL expression that is evaluated to a boolean value, and return `true` if
    the current iteration object matches the condition for filtering for that column.
    You could use JSTL, Seam, or any custom function in this attribute.


    An alternative to the declarative approach is using the `filter` attribute. This
    attribute should be defined with an EL expression pointing to an object that implements
    the `org.richfaces.model.Filter<T>` interface. This object should implements a
    single `accept(T t)` method, which should be passed with the row object and return
    a similar boolean result that shows whether the object satisfies the filter condition
    or not.


    Now that we have covered the concepts, let’s review an example of filtering implementation
    using inputs in headers that are plugged with `<a4j:ajax>` behavior in order to
    filter the table when values get changed.


    In this example, we will use JSTL functions, so we need to add proper namespace
    to the page, as follows:'
