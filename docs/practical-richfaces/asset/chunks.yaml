    page loads for the first time, nothing will be displayed and when Ajax is activated,
    `startText` content will be displayed.


    `<a4j:status startText="Working..."/>`


    You can also style the label shown with `startStyle` attribute (`stopStyle` also
    available), as follows:


    `<a4j:status startText="Working..." startStyle="background-color:#ffA500"/>`


    You are not limited to displaying the status next to the button or link; using
    the `style` attribute you can specify absolute positioning for the status. Let''s
    move the status outside the form; this means that any component on the page will
    activate this status and that we are moving the status to display at the very
    top of the browser window, as shown in [Figure 3-9](#Chapter03.html#fig_3_9).


    ![images](images/0309.jpg)


    ***Figure 3-9.** Using absolute positioning for Ajax status*


    The code is shown in [Listing 3-58](#Chapter03.html#list_3_58).


    ***Listing 3-58.** The code for the Ajax status*


    `<a4j:status id="ajaxStatus" startText="Working..."`

    `          startStyle="background-color: #ffA500;`

    `          font-weight:bold;`

    `          position: absolute;`

    `          left: 520px;`

    `          top: 1px;`

    `          width: 100px;" />`

    `<h:form>`

    `   <h:panelGrid>`

    `      <h:panelGrid columns="3">`

    `         <h:inputText value="#{ajaxStatusBean.text}" />`

    `         <a4j:commandButton value="Convert"`

    `            action="#{ajaxStatusBean.upperCase}"`

    `            render="upper" />`

    `      </h:panelGrid>`

