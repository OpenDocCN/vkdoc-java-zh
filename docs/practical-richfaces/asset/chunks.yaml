    ***图 7-2.** 具有列样式和行悬停事件的富数据表格*


    现在，让我们回顾最后一个与 CSS 样式相关且最有趣的属性。`rowClass` 是 RichFaces 表格特有的属性。它在迭代过程中被求值，这与 `rowClasses`
    相反，后者在迭代数据模型之前被求值，因此无法根据模型动态填充。


    让我们将已取消比赛行的背景色改为红色。添加此功能的代码如清单 7-8 所示。


    ***清单 7-8.** 将已取消比赛行的背景色改为红色*


    `.red{`

    `    color:red;`

    `}`

    `</style>`

    `<rich:panel style="width:650px" header="rich:dataTable sample">`

    `    <rich:dataTable value="#{olympicGamesBean.games}" var="game"`

    `        rowClasses="odd, even" columnClasses="cityColumn"`

    `        onrowmouseover="this.style.fontWeight=''bold''"`

    `        onrowmouseout="this.style.fontWeight=''normal''"`

    `        rowClass="#{game.status == ''canceled'' ? ''red'' : ''''}">`


    图 7-3 显示了结果。


    ![images](img/0703.jpg)


    ***图 7-3.** 根据迭代数据设置行样式的富数据表格*


    就是这样。现在，你可以轻松地将任何类应用于整个行。其他可能需要此功能的用例包括任务、问题或电子邮件表格，在这些表格中，行应根据项目的重要性来设置样式。过去，你必须将相同的类添加到所有列；这不仅难以维护，还会导致表格标记中渲染出更多的
    HTML 代码。


    #### 使用子表格和定义复杂表头标记


    在实际应用中，你经常需要处理更复杂的基于表格的数据表示。你的表格可能需要使用列和行合并，即定义复杂表头结构的能力，以便恰当地添加表格内容描述。幸运的是，RichFaces
    `<rich:dataTable>` 组件允许你使用嵌套的子表格来定义丰富的主从表格。


    在我们开始示例之前，先介绍一下 `<rich:collapsibleSubTable>` 组件。它与 `<rich:dataTable>` 一起使用，允许你实现任意复杂度的主从表格。它应该作为
    `<rich:dataTable>` 或 `<rich:collapsibleSubTable>` 的子元素放置，并遍历嵌套的数据模型。正如你可能根据其名称猜到的，在
    RichFaces 4 中，它开箱即用地提供了折叠/展开功能。那么，让我们从一个简单的示例开始。我们需要实现的表格如图 7-4 所示。


