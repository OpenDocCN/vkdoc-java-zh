    #### Table Sorting


    This section will cover sorting functionality available in RichFaces data iteration
    components. We will use a `List`-based example and cover a more complex example
    with a custom data model in the “Iteration Components Advanced Models” section.


    Basic sorting functionality can be implemented in two ways: by using JavaScript
    API or by using external controls.


    ![images](images/square.jpg) **Note** No built-in controls for sorting and filtering
    are implemented as of writing of this book. We will cover basic API. Please check
    the JBoss Community’s RichFaces Component Reference at [`www.jboss.org/richfaces/docs`](http://www.jboss.org/richfaces/docs)
    and other informational resources to learn when such controls might be added.


    To start sorting, all you need to do is add the sortBy attribute, with it pointing
    to some object property (based on what you want to sort) to the `<rich:column>`
    tag. In order to store the sorting state between requests, use the `sortOrder`
    attribute, which should be bound to the server-side object with the values from
    the `org.richfaces.component.SortOrder` set (`unsorted`, `ascending` or `descending)`.


    `comparator` is another `<rich:column>` attribute that you can use to customize
    the sorting. It can be used instead of `sortBy` in order to define a custom comparator
    that will be called by the component during sorting for comparison of the objects
    according to your rules.


    ![images](images/square.jpg) **Tip** We use `<rich:dataTable>` in the examples;
    however, the same code can be used with the `<rich:extendedDataTable>` component.


    To start, let’s review sorting using external controls. [Listing 7-35](#Chapter07.html#list_7_35)
    is the code we used to define three columns of the sortable, Olympic Games table.


