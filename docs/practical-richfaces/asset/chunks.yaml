    rootNode;` `   }`  }    The RichFaces TreeNode-based model should have the only
    root node (the Swing model `Collection` of root nodes was supported as value binding).
    It is not an actual root, but simply a fake node that is not getting rendered
    to the view, and so should not contain any data. It’s only a placeholder for the
    set of child nodes that will be the actual set of root nodes (it''s designed this
    way to support backward compatibility with previous RichFaces version).    [Listing
    9-7](#Chapter09.html#list_9_7) shows the page, which still looks very simple.    ***Listing
    9-7.** The simple page*  `<h:form>` `   <rich:tree value="#{richFacesTreeNodeBean.rootNode}"
    var="node"/>` `</h:form>`  The tree rendered is shown in [Figure 9-3](#Chapter09.html#fig_9_3).  ![images](images/0903.jpg)  ***Figure
    9-3.** <rich:tree> built using the RichFaces TreeNode*    You are probably curious
    why the leaf nodes have the same representation as the nodes with children and
    are not shown as leafs? That''s how it’s designed. When we implemented Swing’s
    TreeNode interface, we implemented the `isLeaf()` method to return a boolean value,
    which determines if the collection is empty. RichFaces default Swing node implementation
    does the same.    On the other hand, `org.richfaces.model.TreeNodeImpl` doesn’t
    make the decision if the node is a leaf according to the presence of its children.
    It has to be defined with a flag passed to the constructor or have its `isLeaf()`
    method properly overridden. This is done to allow the developers to manually specify
    the leaf node property if the developer wants to implement lazy node loading or
    just needs to have an empty nodes representation. Thus, a node can have no children
    initialized, but have `isLeaf()` returning true by default. We will show you a
    little later how to initialize the RichFaces `TreeNodeImpl` to be a leaf.    ####
    Using <rich:treeNode> to Define Tree Nodes Markup    Let’s see now how we can
    replace using the `toString()` method and encode iteration object properties instead.
    We just need to add a `<rich:treeNode>` object to the `<rich:tree>` and define
    the content of the node inside using the var attribute in the same way as the
    `<rich:column>` content inside tables. Then every node will be rendered using
    that markup. In order to create the same representation but which does not rely
    on the `toString()` method, we only make changes to the page code. [Listing 9-8](#Chapter09.html#list_9_8)
    shows the page code.    ***Listing 9-8.** The page code*  `<h:form>` `  <rich:tree
    value="#{richFacesTreeNodeBean.rootNode}" var="node">` `    <rich:treeNode>` `      #{node.data}`
    `    </rich:treeNode>` `  </rich:tree>` `</h:form>`  Using this code, we get the
    tree rendered in [Figure 9-4](#Chapter09.html#fig_9_4).  ![images](images/0904.jpg)  ***Figure
    9-4.** Creating a custom node using <rich:treeNode>*    Using `<rich:treeNode>`
    allows you to place outputs such as links, images, formatted text, and so on.
    The next section will introduce you to another feature of the `<rich:treeNode>`
    and demonstrate different ways to render nodes.    #### Using Different Types
    of Nodes in a Tree    Suppose we need to show the nodes in a different way according
    to some conditions or properties of the model node. `<rich:tree>` easily allows
    you to do that. `<rich:treeNode>` provides the type attribute, which should be
    used for that purpose. All you need to do to use different kinds of nodes is add
    a property to the node’s model objects, which will identify the node type. It
    could be any property with any values. Then you need to add a set of `<rich:treeNode>`
    components as child components to the `<rich:tree>` with the type attributes defined
    according to possible model types. Finally, define the markups inside every `<rich:treeNode>`.    In
    order to make a decision about which node should be rendered for the current iteration,
    the `<rich:tree>` component provides the `nodeType` attribute. You should use
    it to define the property on the node that stores its type. Or, alternatively,
    use a simple EL expression that will be evaluated to possible types.    In the
    previous sample we added a single string data property to our `RichFacesTreeNode`,
    which was used to represent a node on the client. Now let’s add another property
    that will identify the node type, as shown in [Listing 9-9](#Chapter09.html#list_9_9).    ***Listing
    9-9.** Adding another property that will identify the node type*  `public class
    TypifiedRichFacesTreeNode extends TreeNodeImpl {` `   private String data;` `   private
    SimpleTreeNodeTypes type;`  `   public TypifiedRichFacesTreeNode(String data,
    SimpleTreeNodeTypes type) {` `      super(type.equals(SimpleTreeNodeTypes.LEAF));`
    `      this.data = data;` `      this.type = type;` `   }`  `   public String
    getData() {` `      return data;` `   }` `   public void setData(String data)
    {` `      this.data = data;` `   }`  `   public SimpleTreeNodeTypes getType()
    {` `      return type;` `   }`  `   public void setType(SimpleTreeNodeTypes type)
    {` `      this.type = type;` `   }` `}`  ![images](images/square.jpg) **Note**
    `TreeNodeImpl` provides constructor with a leaf parameter. In our object, which
    extends `TreeNodeImpl`, we call `super()` passing the leaf parameter according
    to our type definition. So it will be properly rendered as a leaf by the component
    for the objects initialized with a true leaf value.    [Listing 9-10](#Chapter09.html#list_9_10)
    shows an Enum for note types.    ***Listing 9-10.** Shows an Enum for note types*  `public
