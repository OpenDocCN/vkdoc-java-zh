    it for the `<rich:toolbar>` component. We will continue using it when we cover
    the `<rich:dropDownMenu>` component in the next section.    ### Using <rich:dropDownMenu>    `<rich:dropDownMenu>`
    produces a drop-down menu, as shown in [Figure 8-7](#Chapter08.html#fig_8_7).  ![images](images/0807.jpg)  ***Figure
    8-7.** Simple drop-down menu*    Every menu item can be associated with a particular
    action or action listener to be invoked via a standard `POST` request with a full
    page update or via Ajax. All the standard Ajax concepts apply here as well, such
    as `render`, `execute`, and other Ajax options.    The code to create this menu
    is shown in [Listing 8-8](#Chapter08.html#list_8_8).    ***Listing 8-8.** The
    code to create the simple drop-down menu*  `<h:form>` `   <rich:toolbar>` `      <rich:dropDownMenu
    mode="ajax" label ="File">` `         <rich:menuItem label="New" />` `         <rich:menuItem
    label="Open File..." />` `         <rich:menuItem label="Close" />` `         <rich:menuItem
    label="Close All" />` `      </rich:dropDownMenu>` `      <rich:dropDownMenu mode="ajax"
    >` `         <f:facet name="label">` `            <h:outputText value="Edit" />`
    `         </f:facet>` `         <rich:menuItem label="Undo" />` `      </rich:dropDownMenu>`
    `      <rich:dropDownMenu mode="ajax" >` `         <f:facet name="label">` `            <h:outputText
    value="Help" />` `         </f:facet>` `         <rich:menuItem label="About"
    />` `      </rich:dropDownMenu>` `   </rich:toolbar>` `</h:form>`  `<rich:toolbar>`
    is the container component, which we have covered before. Inside, you place one
    or more `<rich:dropDownMenu>` components. You use the `label` facet or attribute
    to define the top menu label. From there, you use `<rich:menuItem>` to create
    each menu item. That’s pretty simple.    ![images](images/square.jpg) **Note**  You
    are not required to use `<rich:toolbar>` as a drop-down menu parent. You may choose
    any other wrapper component or even create your own instead.    Notice that the
    `mode` attribute is set to `ajax`. It has three possible values: `ajax`, `server`,
    and `client`. `client` means no request will be sent to the server. In such case
    you should handle click events on your own using some custom JavaScript handler
    methods, behaviors or by attaching `<a4j:ajax>`, for example. You can also set
    the `mode` attribute on a particular `<rich:menuItem>`, which will override the
    `mode` on the parent `<rich:dropDownMenu>` component.    You want to make each
    menu actually do something. We’ll show you how to add an action listener for each
    menu. Just to demonstrate that a listener is actually called, you can display
    the menu name selected each time.    The changes are rather minor. You’ll add
    an action listener to each menu item. This means you will need to create a managed
    bean first, so let’s start with the code in [Listing 8-9](#Chapter08.html#list_8_9).    ***Listing
    8-9.** Creating a managed bean*  `@ManagedBean` `@RequestScoped` `public class
    DropDownBean {`  `   private String menuSelected;`  `   public String getMenuSelected()
    {` `      return menuSelected;` `   }` `   public void listenerNew(ActionEvent
    event) {` `      menuSelected = "New";` `   }` `   public void listenerOpenFile(ActionEvent
    event) {` `      menuSelected = "Open File...";` `   }` `   public void listenerClose(ActionEvent
    event) {` `      menuSelected = "Close";` `   }` `   public void listenerCloseAll(ActionEvent
    event) {` `      menuSelected = "Close All";` `   }` `   public void listenerUndo(ActionEvent
    event) {` `      menuSelected = "Undo";` `   }` `}`  With the code in [Listing
    8-9](#Chapter08.html#list_8_9), you have defined a listener for each menu item
    and also created a property to display the selected menu item that you’ll display
    on a page. Let’s see what changes are needed on the JSF page. The changes are
    shown in [Listing 8-10](#Chapter08.html#list_8_10).    ***Listing 8-10.** JSF
    page*  `<h:form>` `   <h:panelGrid columns="2">` `      <rich:toolbar width="150px">`
