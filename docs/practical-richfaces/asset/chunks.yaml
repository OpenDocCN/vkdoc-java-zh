- fmt: "# Popup Panels and Performance\n\nReal-world applications are widely using\
    \ various popups across the pages. There are some claims about performance downgrades\
    \ when using `<rich:popupPanel>` on pages. Usually the reason for this is trying\
    \ to pre-render every popup panel content to the client. In the past, most of\
    \ the use-cases were implemented by using navigation between master and details\
    \ pages. Today many rich controls like tooltip, popup, sliding panel, and so on\
    \ are available to designers trying to keep as much content on the same page as\
    \ possible in order to build single-page-like applications.\n\nThis is really\
    \ convenient for the application users. But without mechanisms of lazy loading\
    \ and some other optimization techniques, it could greatly influence performance.\
    \ So the main thing you should keep in mind while using the component is to limit\
    \ the number of instances (especially heavy-weight) as possible. And remember\
    \ the following:\n\n- Do not include popups in iteration components in order to\
    \ simply generate popups with row details.\n- Do not use several different panel\
    \ instances in templates for all application pages. This is especially important\
    \ if the panels themselves use other rich components.\n- Do not add Ajax-rendered\
    \ zones (via `<a4j:outputPanel>`) to every panel if only one will be actually\
    \ updated in most view use-cases.\n\nIf you think about it, it all makes sense.\
    \ First, every panel instance adds additional HTML to be rendered and loaded on\
    \ the client. Second, every panel adds additional JavaScript initialization for\
    \ the popup itself and for the components used in markup. Third, defining Ajax-rendered\
    \ zones is good for panels in templates to catch all the changes without taking\
    \ care about searching for the concrete panel that needs to be updated (re-rendered).\
    \ But in that case, Ajax response size (and therefore time) will be increased\
    \ and so will influence the Ajax performance.\n\nIdeally, where possible, you\
    \ should use something like [Listing 6-40](#Chapter06.html#list_6_40) in your\
    \ applications.\n\n**Listing 6-40.** Code to improve performance\n\n```\n<a4j:outputPanel\
    \ id=\"updateMeToLoadPanel\" layout=\"block\">\n   <rich:popupPanel rendered=\"\
    #{controller.panelNeeded}\">\n      <a4j:outputPanel id=\"updateMeWhenPanelExist\"\
    \ layout=\"block\">\n         <ui:include src=\"#{controller.currentPanelURI}\"\
    \ />\n      <a4j:outputPanel/>\n   </rich:popupPanel>\n</a4j:outputPanel>\n```\n\
    \nA single panel instance is used and added only when it's needed. If the panel\
    \ is already present in a view but has to be updated, then only inner `<a4j:outputPanel>`\
    \ should be re-rendered to avoid JavaScript re-initialization of the popup. And\
    \ `<ui:include>` `src` attribute, pointed to the subview, should be shown after\
    \ the Ajax request. Then the panel could be shown using `oncomplete` of Ajax controls.\n\
    \nIdeally you should define only as many popups instances that you need nested\
    \ panels for, and not for every separate case on the view.\n\n## JavaScript API\n\
    \nThe `<rich:popupPanel>` component provides the JavaScript API methods shown\
    \ in [Table 6-6](#Chapter06.html#tab_6_6).\n\n![images](images/t0606.jpg)\n\n\
    ## Using `<rich:toolTip>`\n\n`<rich:toolTip>` allows you to display a tooltip\
    \ based on some event. The most common case would be when you move the mouse over\
    \ some text label or icon image. The tooltip can contain any other JSF components\
    \ and content.\n\nLet's say you start with something like this and want to display\
    \ information about New York City when the mouse cursor moves over the city name,\
    \ as shown in [Figure 6-33](#Chapter06.html#fig_6_33).\n\n![images](images/0633.jpg)\n\
    \n**Figure 6-33.** Panel with city name\n\n[Listing 6-41](#Chapter06.html#list_6_41)\
    \ shows how to define a simple tooltip for that case. The content of the tooltip\
    \ is enclosed within `<rich:toolTip>`. If the tooltip content is just a small\
    \ amount of text, you can use the `value` attribute of `<rich:toolTip>` instead.\
    \ By default, the tooltip will be displayed when the `mouseover` event occurs.\
    \ We will show you later in this chapter how you can specify the event implicitly.\n\
    \n**Listing 6-41.** Defining a simple tooltip\n\n```\n<rich:panel style=\"width:350px\"\
    >\n   <f:facet name=\"header\">Using rich:toolTip</f:facet>\n   <h:form>\n   \
    \   <h:outputText id=\"nyc\" value=\"New York City\" style=\"font-size: xx-\n\
    \         large;\" />\n      <rich:tooltip mode=\"ajax\" target=\"nyc\">\n   \
    \      <h:panelGroup style=\"width:200px\">\n            New York City is the\
    \ most populous city in the United States,\n            with its metropolitan\
    \ area ranking among the largest urban areas\n            in the world. For more\
    \ than a century, it has been one of the\n            world's major centers of\
    \ commerce and finance.\n         </h:panelGroup>\n      </rich:tooltip>\n   </h:form>\n\
    </rich:panel>\n```\n\nThe `target` attribute in [Listing 6-41](#Chapter06.html#list_6_41)\
    \ points to the component whose event should activate the tooltip. It's also possible\
    \ just to wrap the tooltip inside the actual component. We will show an example\
    \ later in this chapter.\n\nFinally, the loading mode used is `ajax`. In other\
    \ words, when the mouse cursor moves over the text, an Ajax request is sent to\
    \ the server to get the content of the tooltip. Another option is to use `client`\
    \ mode. When using `mode=\"client\"`, the tooltip content will be pre-rendered\
    \ to the client. Tooltip does not provide `server` mode because there are no reasons\
    \ to make a full-page refresh just to show the tooltip.\n\n[Figure 6-34](#Chapter06.html#fig_6_34)\
    \ shows the result when `mouseover` occurs at panel body text.\n\n![images](images/0634.jpg)\n\
    \n**Figure 6-34.** Tooltip above the text label\n\nWhen using `ajax` mode, you\
    \ can display a default message while the tooltip content is being retrieved from\
    \ the server. This is useful if the operation to get the tooltip content might\
    \ take a little while. To show the default content, you can use a facet named\
    \ `loading`. [Figure 6-35](#Chapter06.html#fig_6_35) shows how it looks in `ajax`\
    \ mode when data for tooltip requested by default without even specifying the\
    \ facet.\n\n![images](images/0635.jpg)\n\n**Figure 6-35.** Tooltip “loading” label\n\
    \nAnother useful attribute is `followMouse`. When set to `true`, the tooltip will\
    \ follow the mouse as long as it stays on the element, as shown in [Listing 6-42](#Chapter06.html#list_6_42).\n\
    \n**Listing 6-42.** `followMouse`\n\n```\n<h:form>\n<rich:panel style=\"width:350px\"\
    \ id=\"panel\">\n   <f:facet name=\"header\">Using rich:toolTip</f:facet>\n\n\
    <rich:tooltip mode=\"client\" followMouse=\"true\">\n         <f:facet name=\"\
    loading\">Loading...</f:facet>\n         <h:panelGrid style=\"width:200px\">\n\
    \            New York City is the most populous city in the United States,\n \
    \           with its metropolitan area ranking among the largest urban areas\n\
    \            in the world. For more than a century, it has been one of the\n \
    \           world's major centers of commerce and finance.\n         </h:panelGrid>\n\
    \      </rich:tooltip>\n      <h:outputText id=\"nyc\" value=\"New York City\"\
    \ style=\"font-size: xx-\n         large;\" />\n\n   </rich:panel>\n</h:form>\n\
    ```"
  raw: '##### Popup Panels and Performance


    Real-world applications are widely using various popups across the pages. There
    are some claims about performance downgrades when using `<rich:popupPanel>` on
    pages. Usually the reason for this is trying to pre-render every popup panel content
    to the client. In the past, most of the use-cases were implemented by using navigation
    between master and details pages. Today many rich controls like tooltip, popup,
    sliding panel, and so on are available to designers trying to keep as much content
    on the same page as possible in order to build single-page-like applications.


    This is really convenient for the application users. But without mechanisms of
    lazy loading and some other optimization techniques, it could greatly influence
    performance. So the main thing you should keep in mind while using the component
    is to limit the number of instances (especially heavy-weight) as possible. And
    remember the following:


    *   Do not include popups in iteration components in order to simply generate
    popups with row details.

    *   Do not use several different panel instances in templates for all application
    pages. This is especially important if the panels themselves use other rich components.

    *   Do not add Ajax-rendered zones (via *`<a4j:outputPanel>`*) to every panel
    if only one will be actually updated in most view use-cases.


    If you think about it, it all makes sense. First, every panel instance adds additional
    HTML to be rendered and loaded on the client. Second, every panel adds additional
    JavaScript initialization for the popup itself and for the components used in
    markup. Third, defining Ajax-rendered zones is good for panels in templates to
    catch all the changes without taking care about searching for the concrete panel
    that needs to be updated (re-rendered). But in that case, Ajax response size (and
    therefore time) will be increased and so will influence the Ajax performance.


    Ideally, where possible, you should use something like [Listing 6-40](#Chapter06.html#list_6_40)
    in your applications.


    ***Listing 6-40.** Code to improve performance*


    `<a4j:outputPanel id="updateMeToLoadPanel" layout="block">`

    `   <rich:popupPanel rendered="#{controller.panelNeeded}">`

    `      <a4j:outputPanel id="updateMeWhenPanelExist" layout="block">`

    `         <ui:include src="#{controller.currentPanelURI}" />`

    `      <a4j:outputPanel/>`

    `   </rich:popupPanel>`

    `</a4j:outputPanel>`


    A single panel instance is used and added only when it''s needed. If the panel
    is already present in a view but has to be updated, then only inner *`<a4j:outputPanel>`*
    should be re-rendered to avoid JavaScript re-initialization of the popup. And
    *`<ui:include>`* *`src`* attribute, pointed to the subview, should be shown after
    the Ajax request. Then the panel could be shown using *`oncomplete`* of Ajax controls.


    Ideally you should define only as many popups instances that you need nested panels
    for, and not for every separate case on the view.


    #### JavaScript API


    The *`<rich:popupPanel>`* component provides the JavaScript API methods shown
    in [Table 6-6](#Chapter06.html#tab_6_6).


    ![images](images/t0606.jpg)


    ### Using <rich:toolTip>


    *`<rich:toolTip>`* allows you to display a tooltip based on some event. The most
    common case would be when you move the mouse over some text label or icon image.
    The tooltip can contain any other JSF components and content.


    Let''s say you start with something like this and want to display information
    about New York City when the mouse cursor moves over the city name, as shown in
    [Figure 6-33](#Chapter06.html#fig_6_33).


    ![images](images/0633.jpg)


    ***Figure 6-33.** Panel with city name*


    [Listing 6-41](#Chapter06.html#list_6_41) shows how to define a simple tooltip
    for that case. The content of the tooltip is enclosed within `<rich:toolTip>`.
    If the tooltip content is just a small amount of text, you can use the *`value`*
    attribute of `<rich:toolTip>` instead. By default, the tooltip will be displayed
    when the *`mouseover`* event occurs. We will show you later in this chapter how
    you can specify the event implicitly.


    ***Listing 6-41.** Defining a simple tooltip*


    `<rich:panel style="width:350px">`

    `   <f:facet name="header">Using rich:toolTip</f:facet>`

    `   <h:form>`

    `      <h:outputText id="nyc" value="New York City" style="font-size: xx-`

    `         large;" />`

    `      <rich:tooltip mode="ajax" target="nyc">`

    `         <h:panelGroup style="width:200px">`

    `            New York City is the most populous city in the United States,`

    `            with its metropolitan area ranking among the largest urban areas`

    `            in the world. For more than a century, it has been one of the`

    `            world''s major centers of commerce and finance.`

    `         </h:panelGroup>`

    `      </rich:tooltip>`

    `   </h:form>`

    `</rich:panel>`


    The *`target`* attribute in [Listing 6-41](#Chapter06.html#list_6_41) points to
    the component whose event should activate the tooltip. It''s also possible just
    to wrap the tooltip inside the actual component. We will show an example later
    in this chapter.


    Finally, the loading mode used is *`ajax`*. In other words, when the mouse cursor
    moves over the text, an Ajax request is sent to the server to get the content
    of the tooltip. Another option is to use *`client`* mode. When using *`mode="client"`*,
    the tooltip content will be pre-rendered to the client. Tooltip does not provide
    *`server`* mode because there are no reasons to make a full-page refresh just
    to show the tooltip.


    [Figure 6-34](#Chapter06.html#fig_6_34) shows the result when *`mouseover`* occurs
    at panel body text.


    ![images](images/0634.jpg)


    ***Figure 6-34.** Tooltip above the text label*


    When using *`ajax`* mode, you can display a default message while the tooltip
    content is being retrieved from the server. This is useful if the operation to
    get the tooltip content might take a little while. To show the default content,
    you can use a facet named *`loading`*. [Figure 6-35](#Chapter06.html#fig_6_35)
    shows how it looks in `ajax` mode when data for tooltip requested by default without
    even specifying the facet.


    ![images](images/0635.jpg)


    ***Figure 6-35.** Tooltip “loading” label*


    Another useful attribute is *`followMouse`*. When set to *`true`*, the tooltip
    will follow the mouse as long as it stays on the element, as shown in [Listing
    6-42](#Chapter06.html#list_6_42).


    ***Listing 6-42.** `followMouse`*


    `<h:form>`

    `<rich:panel style="width:350px" id="panel">`

    `   <f:facet name="header">Using rich:toolTip</f:facet>`


    `<rich:tooltip mode="client"` **`followMouse="true"`**`>`

    `         <f:facet name="loading">Loading...</f:facet>`

    `         <h:panelGrid style="width:200px">`

    `            New York City is the most populous city in the United States,`

    `            with its metropolitan area ranking among the largest urban areas`

    `            in the world. For more than a century, it has been one of the`

    `            world''s major centers of commerce and finance.`

    `         </h:panelGrid>`

    `      </rich:tooltip>`

    `      <h:outputText id="nyc" value="New York City" style="font-size: xx-`

    `         large;" />`


    `   </rich:panel>`

    `</h:form>`'
