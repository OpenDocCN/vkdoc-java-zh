  raw: '#### Using Partial Table Updates


    We are ready to cover partial updates for iteration components. This is a very
    important and powerful feature that allows you to update a limited set of components
    in defined rows instead of performing a full table update.


    We’ll start with the basics and learn how to do updates in the context of a current
    row. An Ajax component inside the current row can update any component inside
    the same row by pointing to the component id. You get this functionality out of
    the box.


    In this section, let’s move away from the Olympic Games list example and create
    a model that shows a simple, editable sales report. [Listing 7-26](#Chapter07.html#list_7_26)
    shows the code for SalesItem object.


    ***Listing 7-26.** SalesItem object*


    `public class SalesItem {`

    `   private int productCode;`

    `   private double proposedPrice;`

    `   private double salesCost;`

    `   private String reason;`

    `   private double discount = 0;`

    `   public ArrayList<SelectItem> getReasons() {`

    `   ArrayList<SelectItem> reasons = new ArrayList<SelectItem>();`

    `   if (proposedPrice != 0.0) {`

    `      if (proposedPrice <= salesCost) {`

    `         reasons.add(new SelectItem("Nobody Needs It"));`

    `         reasons.add(new SelectItem("Bad Quality"));`

    `         reasons.add(new SelectItem("Partly Broken"));`

    `      } else {`

    `         reasons.add(new SelectItem("Just Good"));`

    `         reasons.add(new SelectItem("Everybody Asks for It"));`

    `         }`

    `      }`

    `      return reasons;`

    `   }`

    `   public SalesItem(int productCode, double salesCost) {`

    `      super();`

    `      this.productCode = productCode;`

    `      this.salesCost = salesCost;`

    `   }`

    `   public double getProposedGrossMargin() {`

    `      if (proposedPrice == 0)`

    `         return 0;`

    `      else {`

    `         return (proposedPrice-salesCost)/proposedPrice ;`

    `      }`

    `   }`

    `   // Getters and setters`

    `}`


    [Listing 7-27](#Chapter07.html#list_7_27) shows the SalesReport bean code.


    ***Listing 7-27.** SalesReport bean code*


    `@ManagedBean`

    `@ViewScoped`

    `public class SalesReport {`

    `   List<SalesItem> items = null;`

    `   private void initData() {`

    `      items = new ArrayList<SalesItem>();`

    `      items.add(new SalesItem(1, 20.00));`

    `      items.add(new SalesItem(2, 10.00));`

    `      items.add(new SalesItem(3, 20.00));`

    `      items.add(new SalesItem(4, 20.00));`

    `   }`

    `   public List<SalesItem> getItems() {`

    `      if (items == null)`

    `         initData();`

    `      return items;`

    `   }`

    `   // Getters and setters`

    `}`


    We will use this model for all examples in the “Using Partial Table Updates” section.


    Now, let’s go through the page definition in [Listing 7-28](#Chapter07.html#list_7_28).


    ***Listing 7-28.** Page definition*


    `<h:form>`

    `   <rich:panel header="Partial updates in tables">`

    `      <rich:dataTable value="#{salesReport.items}" var="item" rowKeyVar="key">`

    `         <rich:column>`

    `            <f:facet name="header">Product Code</f:facet>`

    `            <h:outputText value="#{item.productCode}" />`

    `         </rich:column>`

    `         <rich:column>`

    `            <f:facet name="header">Proposed Price</f:facet>`

    `            <h:inputText value="#{item.proposedPrice}" size="7">`

    `<a4j:ajax event="valueChange"` **`render="reason, margin"`** `/>`

    `            </h:inputText>`

    `         </rich:column>`

    `         <rich:column>`

    `            <f:facet name="header">Sales Cost</f:facet>`

    `            <h:outputText value="#{item.salesCost}" />`

    `         </rich:column>`

    `         <rich:column>`

    `            <f:facet name="header">Reason</f:facet>`

    `<h:selectOneMenu` **`id="reason"`** `required="true" value="#{item.reason}">`

    `               <f:selectItems value="#{item.reasons}" />`

    `            </h:selectOneMenu>`

    `         </rich:column>`

    `         <rich:column>`

    `            <f:facet name="header">Proposed Gross Margin</f:facet>`

    `<h:outputText` **`id="margin"`** `value="#{item.proposedGrossMargin}">`

    `               <f:convertNumber pattern="$###0.000" />`

    `            </h:outputText>`

    `         </rich:column>`

    `      </rich:dataTable>`

    `   </rich:panel>`

    `</h:form>`


    As you can see, we are setting the `render` attribute to `reason` and `margin`
    component ids in other columns, and updates in case it occurs in the same row.
    This is an example of partial-table rendering in the context of the row.


    [Figure 7-21](#Chapter07.html#fig_7_21) shows the result after a number of prices
    are modified.


    ![images](images/0721.jpg)


    ***Figure 7-21.** Partial updates of the components in context of row*


    The content of the Reason and Proposed Gross Margin columns are updated by sending
    it to the client.


    Now let’s review a more complex example. Suppose we have to update some subset
    of objects and want to render corresponding columns. As you know, you can define
    the render attribute for all the RichFaces Ajax components with an EL expression,
    which allows us to populate a dynamic list of ids of the component to be updated.
    That’s one solution to populate a list of updated ids. But, it is not really a
    convenient or maintainable solution because the model needs know about table id’s
    (including parent-naming container ids) and the ids of the component placed in
    columns.


    RichFaces (starting with version 4.0) has a special `@rows(rowKeysCollection)`
    function available that should be used to define dynamic rows updates. You need
    a set of model row keys that will define the rows to be updated in the table.
    Let’s use an actual example. Suppose we have a populated table and want to set
    discounts on all the items that have negative Proposed Gross Margin values. [Listing
    7-29](#Chapter07.html#list_7_29) shows the changed page with a new discount column,
    as well as the button that we added to the form.


    ***Listing 7-29.** Changed page with a new discount column and button*


    `<h:form>`

    `   <rich:panel header="Partial updates in tables">`

    `      <rich:dataTable value="#{salesReport.items}" var="item" rowKeyVar="key"
    id=”`**`table`**`”>`

    `    <!--All the other columns -->`

    **`<rich:column>`**

    **`<f:facet name="header">Discount</f:facet>`**

    **`<h:outputText id="discount" value="#{item.discount}">`**

    **`<f:convertNumber type="percent"/>`**

    **`</h:outputText>`**

    **`</rich:column>`**

    `     </rich:dataTable>`

    **`<a4j:commandButton execute="@this" value="Set 20% discount to unprofitable
    products"`**

    **`action="#{salesReport.addDiscounts}"`**

    **`render="table:@rows(salesReport.updatedItems):discount"/>`**

    `  </rich:panel>`

    `</h:form>`'
  trans: '

    #### 使用部分表更新


    接下来我们将介绍迭代组件的部分更新功能。这是一个非常重要且强大的特性，它允许你更新指定行中的部分组件，而无需执行完整的表更新。


    我们将从基础开始，学习如何在当前行的上下文中执行更新。当前行内的 Ajax 组件可以通过指向组件 ID 来更新同一行内的任何组件。此功能开箱即用。


    在本节中，我们将不再使用奥运会列表示例，而是创建一个展示简单、可编辑销售报告的模型。清单 7-26 展示了 `SalesItem` 对象的代码。


    ***清单 7-26.** SalesItem 对象*


    `public class SalesItem {`

    `   private int productCode;`

    `   private double proposedPrice;`

    `   private double salesCost;`

    `   private String reason;`

    `   private double discount = 0;`

    `   public ArrayList<SelectItem> getReasons() {`

    `   ArrayList<SelectItem> reasons = new ArrayList<SelectItem>();`

    `   if (proposedPrice != 0.0) {`

    `      if (proposedPrice <= salesCost) {`

    `         reasons.add(new SelectItem("Nobody Needs It"));`

    `         reasons.add(new SelectItem("Bad Quality"));`

    `         reasons.add(new SelectItem("Partly Broken"));`

    `      } else {`

    `         reasons.add(new SelectItem("Just Good"));`

    `         reasons.add(new SelectItem("Everybody Asks for It"));`

    `         }`

    `      }`

    `      return reasons;`

    `   }`

    `   public SalesItem(int productCode, double salesCost) {`

    `      super();`

    `      this.productCode = productCode;`

    `      this.salesCost = salesCost;`

    `   }`

    `   public double getProposedGrossMargin() {`

    `      if (proposedPrice == 0)`

    `         return 0;`

    `      else {`

    `         return (proposedPrice-salesCost)/proposedPrice ;`

    `      }`

    `   }`

    `   // Getters and setters`

    `}`


    清单 7-27 展示了 `SalesReport` Bean 的代码。


    ***清单 7-27.** SalesReport Bean 代码*


    `@ManagedBean`

    `@ViewScoped`

    `public class SalesReport {`

    `   List<SalesItem> items = null;`

    `   private void initData() {`

    `      items = new ArrayList<SalesItem>();`

    `      items.add(new SalesItem(1, 20.00));`

    `      items.add(new SalesItem(2, 10.00));`

    `      items.add(new SalesItem(3, 20.00));`

    `      items.add(new SalesItem(4, 20.00));`

    `   }`

    `   public List<SalesItem> getItems() {`

    `      if (items == null)`

    `         initData();`

    `      return items;`

    `   }`

    `   // Getters and setters`

    `}`


    我们将在“使用部分表更新”部分的所有示例中使用此模型。


    现在，让我们来看一下清单 7-28 中的页面定义。


    ***清单 7-28.** 页面定义*


    `<h:form>`

    `   <rich:panel header="Partial updates in tables">`

    `      <rich:dataTable value="#{salesReport.items}" var="item" rowKeyVar="key">`

    `         <rich:column>`

    `            <f:facet name="header">Product Code</f:facet>`

    `            <h:outputText value="#{item.productCode}" />`

    `         </rich:column>`

    `         <rich:column>`

    `            <f:facet name="header">Proposed Price</f:facet>`

    `            <h:inputText value="#{item.proposedPrice}" size="7">`

    `<a4j:ajax event="valueChange"` **`render="reason, margin"`** `/>`

    `            </h:inputText>`

    `         </rich:column>`

    `         <rich:column>`

    `            <f:facet name="header">Sales Cost</f:facet>`

    `            <h:outputText value="#{item.salesCost}" />`

    `         </rich:column>`

    `         <rich:column>`

    `            <f:facet name="header">Reason</f:facet>`

    `<h:selectOneMenu` **`id="reason"`** `required="true" value="#{item.reason}">`

    `               <f:selectItems value="#{item.reasons}" />`

    `            </h:selectOneMenu>`

    `         </rich:column>`

    `         <rich:column>`

    `            <f:facet name="header">Proposed Gross Margin</f:facet>`

    `<h:outputText` **`id="margin"`** `value="#{item.proposedGrossMargin}">`

    `               <f:convertNumber pattern="$###0.000" />`

    `            </h:outputText>`

    `         </rich:column>`

    `      </rich:dataTable>`

    `   </rich:panel>`

    `</h:form>`


    如你所见，我们将 `render` 属性设置为其他列中的 `reason` 和 `margin` 组件 ID，并在同一行内发生更新时进行更新。这是行上下文中的部分表渲染示例。


    图 7-21 展示了修改多个价格后的结果。


    ![images](img/0721.jpg)


    ***图 7-21.** 行上下文中组件的部分更新*


    “原因”和“建议毛利率”列的内容通过发送到客户端进行更新。


    现在让我们来看一个更复杂的示例。假设我们需要更新某些对象的子集，并希望渲染相应的列。如你所知，你可以使用 EL 表达式为所有 RichFaces Ajax
    组件定义 `render` 属性，这允许我们填充一个待更新组件的动态 ID 列表。这是一种填充更新 ID 列表的解决方案。但这并不是一个真正方便或可维护的解决方案，因为模型需要知道表
    ID（包括父级命名容器 ID）以及放置在列中的组件的 ID。


    RichFaces（从 4.0 版本开始）提供了一个特殊的 `@rows(rowKeysCollection)` 函数，用于定义动态行更新。你需要一组模型行键，用于定义表中要更新的行。让我们用一个实际示例来说明。假设我们有一个已填充数据的表，并希望为所有“建议毛利率”为负值的项目设置折扣。清单
    7-29 展示了修改后的页面，其中包含一个新的折扣列，以及我们添加到表单中的按钮。


    ***清单 7-29.** 包含新折扣列和按钮的修改后页面*


    `<h:form>`

    `   <rich:panel header="Partial updates in tables">`

    `      <rich:dataTable value="#{salesReport.items}" var="item" rowKeyVar="key"
    id=”`**`table`**`”>`

    `    <!--All the other columns -->`

    **`<rich:column>`**

    **`<f:facet name="header">Discount</f:facet>`**

    **`<h:outputText id="discount" value="#{item.discount}">`**

    **`<f:convertNumber type="percent"/>`**

    **`</h:outputText>`**

    **`</rich:column>`**

    `     </rich:dataTable>`

    **`<a4j:commandButton execute="@this" value="Set 20% discount to unprofitable
    products"`**

    **`action="#{salesReport.addDiscounts}"`**

    **`render="table:@rows(salesReport.updatedItems):discount"/>`**

    `  </rich:panel>`

    `</h:form>`

