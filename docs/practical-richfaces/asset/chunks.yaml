    模型支持根节点 `Collection` 作为值绑定）。它不是一个实际的根，而只是一个不会被渲染到视图中的虚拟节点，因此不应包含任何数据。它只是一个占位符，用于存放将成为实际根节点集的子节点（这样设计是为了支持与以前
