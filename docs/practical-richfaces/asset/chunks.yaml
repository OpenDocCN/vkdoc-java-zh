    RichFaces offers a good number of out-of-the-box components for different data
    representation. This chapter will cover output components such as simple panels,
    collapsible panels, tabbed panels, toggle panels, and popup panels. Be prepared
    for numerous examples as well as common usages, such as how to use a popup panel
    to display a wizard or a status message.'
