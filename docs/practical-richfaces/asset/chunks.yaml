    10-2 显示了样式名称并说明了何时使用它们。    ![images](img/t1002.jpg)    现在，使指示器在不同状态下更改以更好地通知用户当前操作选项应该是一项非常简单的任务。在清单
    10-12 中，让我们将 CSS 类添加到我们之前的示例页面。    ***清单 10-12.** 将 CSS 类添加到我们之前的示例页面*  `<style>`
    `   .rf-ind-drag{` `   }` `   .rf-ind-acpt{` `      border:3px solid green;` `   }`
    `   .rf-ind-rejt{` `      border:3px solid red;` `   }` `</style>`  基于此样式，指示器被定义为在拖动时看起来像这样。当悬停在接受此对象的放置区域上时，会添加绿色边框。并且，当将组件悬停在不接受此对象类型的放置区域上时，会显示红色边框。因此，当我们将其中一个项目悬停在购物车上时，我们会看到它更新为绿色边框，如图
    10-9 所示。  ![images](img/1009.jpg)  ***图 10-9.** 在接受状态下使用绿色边框自定义的拖动指示器*    能够以这种方式进行样式设置看起来更加用户友好。    下一节将描述如何使用特殊的
    `<rich:dragIndicator>` 组件使用自定义内容自定义拖动指示器。    ### 使用 <rich:dragIndicator>    `<rich:dragIndicator>`
    是一个非常简单的组件，允许您定义一些自定义的静态内容，这些内容在执行拖动操作时显示在鼠标光标下方。    开始使用此组件需要了解两件事。首先，指示器的内容应使用任何嵌套组件定义。其次，指示器本身应使用
    `<rich:dragSource>` 行为上同名的 `dragIndicator` 属性（指定了指示器 `id`）附加到 `<rich:dragSource>`。    那么，让我们继续一个示例。使用购物车示例，我们将指示器添加到页面的任何位置，如清单
    10-13 所示。    ***清单 10-13.** 使用购物车示例将指示器添加到页面的任何位置*  `<rich:dragIndicator id="indicator">`
    `   <rich:panel>` `      <h:outputText value="将产品拖放到购物车" />` `   </rich:panel>`
