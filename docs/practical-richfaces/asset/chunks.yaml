    #### 事件


    JSF 超越了请求/响应范式，提供了一个强大的基于事件的模型。用于构建用户界面的 UI 组件会在被激活或点击时向服务器发送事件（例如，点击等浏览器事件会被映射到服务器端组件事件）。然后由监听器处理这些事件。例如，点击一个按钮（它是一个
    UI 组件）就是一个由相应监听器处理的事件。（JSF 基于事件的模型为 UI 开发提供了一种类似于其他用户界面框架（如 Swing 和 Flex）的方法。）


    例如，在动作属性中定义的 *`#{simpleBean.save}`* 表达式里，*`save`* 是 *`simpleBean`* Bean 中的一个方法。它通常被称为
    JSF 动作，并会在按钮被点击时调用：


    `<h:commandButton value="Submit" action="#{simpleBean.save}"/>`


    在继续之前，你需要熟悉 图 1-5 中展示的 JSF 生命周期阶段，并理解每个阶段的作用。我们将使用同样的图表来展示 RichFaces 的概念。请确保你理解每个阶段的作用，以及在发生转换/验证错误或使用
    `immediate="true"` 属性时，流程会发生什么变化。理解生命周期也有助于你通过阶段监听器调试 JSF 应用程序。你将在本书后面用到阶段监听器。如果你需要复习
    JSF 阶段，Javabeat 上的这篇文章（[`www.javabeat.net/articles/54-request-processing-lifecycle-phases-in-jsf-1.html`](http://www.javabeat.net/articles/54-request-processing-lifecycle-phases-in-jsf-1.html)）是一个不错的参考。


    ![images](img/0105.jpg)


    ***图 1-5.** JSF 生命周期*


    #### Ajax


    当 JSF 1.x 被开发出来时，它没有任何 Ajax 特性，仅仅是因为当时 Ajax 还不像我们今天所熟知的那样存在。幸运的是，在 2006 年，RichFaces
    出现了，它使得为现有或新的 JSF 应用程序添加 Ajax 功能变得非常容易。例如，如果你有一个像下面这样的标准输入文本组件：


    *`<h:inputText value="#{order.amount}"/>`*


    使用 RichFaces，基于某个事件发送 Ajax 请求非常容易。你只需添加 *`<a4j:support>`* 标签，指定触发 Ajax 请求的事件，并指定要重新渲染的组件，如下所示：


    *`<h:inputText value="#{order.amount}">`*

    *`   <a4j:support event="onkeyup" reRender="id1"/>`*

    *`</h:inputText/>`*

    *`<h:outputText value="#{order.total}" id="id1"/>`*


    当 JSF EG（专家组）开始着手 JSF 2 版本时，他们将基本的 Ajax 支持引入了规范。JSF 2 中的 Ajax 行为 `<f:ajax>` 紧密地基于流行的
    RichFaces 3 `<a4j:support>` 标签。以上面的例子为例，在 JSF 2 中添加 Ajax 支持是这样做的：


    *`<h:inputText value="#{order.amount}">`*

    *`   <f:ajax event="keyup" render="id1"/>`*

    *`</h:inputText/>`*

    *`<h:outputText value="#{order.total}" id="id1"/>`*


    这个例子看起来与 RichFaces 3 的例子非常相似。明显的变化是使用了新的行为（`<f:ajax>`），事件指定时去掉了 *on* 前缀，并且使用了
    *`render`* 属性代替了 reRender。然而，核心的 Ajax 概念非常相似。除了使用 `<f:ajax>` 行为，还可以通过编程方式发送 Ajax
    请求，如下所示：


    `<h:form id="form">`

    `   <h:commandButton id="button" value="Update"`

    `onclick="jsf.ajax.request(this,event, {render:''form:out''});` ![Images](img/U001.jpg)

    `      return false;" />`

    `  <h:output Text value="#{timeBean.now}" id="out"/>`

    `</h:form>`


    尽管是基础功能，Ajax 现在已经是 JSF 2 标准的一部分。我们将在本书后面介绍更多 `<f:ajax>` 的特性。


    在我们进一步介绍 RichFaces 之前，必须问一个问题：为什么要使用 JSF？嗯，最简单的答案是（经过短暂的学习曲线后）JSF 简化了开发。任何框架的基本目的都是通过隐藏所有应用程序共有的任务来简化开发。JSF
    正是这样做的。你不再需要担心如何从请求中获取数据，如何定义导航，或者如何转换值。JSF 开箱即用地提供了所有这些功能，甚至更多。如果所有的基础管道工作都由框架处理，那么你就有更多时间专注于实际的应用程序。最后，JSF
    的组件方法使其成为与 Ajax 结合使用的完美技术。


    ### RichFaces 概述


    如果你想知道既然 JSF 2 现在有了 Ajax 功能，为什么还需要 RichFaces，那是因为 JSF 2 中的 Ajax 功能非常基础。你只能得到 `<f:ajax>`
    行为。这不足以构建真正丰富的企业级 Ajax 应用程序。这正是你需要 RichFaces 的原因，它是一个用于 JSF 的丰富框架。它由以下部分组成：


    *   分为两个标签库（`a4j:`，`rich:`）的丰富组件和 Ajax 组件

    *   皮肤

    *   用于 Bean 验证（JSR 303）的客户端和对象验证扩展

    *   CDK（组件开发工具包）


    除了这些主要部分，RichFaces 还扩展了标准的 JSF 2 Ajax 请求队列，并添加了各种渲染优化属性，我们将在本书中介绍这些内容。RichFaces
    应用程序也可以部署在云端，例如 GAE（Google Apps Engine）、Amazon EC2、CloudBees 和 OpenShift。RichFaces
    不仅扩展了 JSF，还使 JSF 更加丰富。事实上，没有 JSF 就无法使用 RichFaces。你可以将 RichFaces 与 Mojarra JSF（Oracle
    RI）实现或 MyFaces 实现一起使用。RichFaces 只是提供了现成的 Ajax 组件（和其他特性）来支持构建基于 Ajax 的应用程序。另一种看待它的方式是，它提供了超出标准
    JSF 所提供的额外 JSF 组件。这些组件提供了所有必要的 JavaScript，因此你几乎不需要直接处理 JavaScript。


    ![images](img/square.jpg) **注意** 每当我们提到 RichFaces 时，我们总是指 RichFaces 4 版本。RichFaces
    3.x 基于 JSF 1.2。RichFaces 3.3.3 支持 JSF 1.2，并对 JSF 2 有非常基本的支持。这个版本是为那些需要部署在 Java
    EE 6 应用服务器上的项目而引入的，这些服务器随附了 JSF 2，但当时 RichFaces 4 尚未可用。本书中的所有内容都基于 RichFaces 4
    版本。客户端验证仅从 RichFaces 4 开始可用。


    表 1-1 总结了 JSF 和 RichFaces 的版本兼容性。


    ![Images](img/t0101.jpg)


    #### RichFaces 的组件标签库


    RichFaces 组件分为两个标签库：一个标签库称为 `a4j:`，另一个称为 `rich:`。`a4j:` 标签库提供页面级别的 Ajax 支持和其他实用标签。它基本上提供了基础性的控件，让你决定如何发送请求、向服务器发送什么内容以及更新什么内容。这种方法为你提供了强大的能力和灵活性。`rich:`
    标签库提供丰富的 UI 组件。丰富组件是指超出标准 HTML 标签所提供的任何内容；例如，一个选项卡面板。标准 JSF 或 HTML 都没有用于选项卡面板的标签，因此
    RichFaces 提供了一个，使其成为一个丰富组件（超越了开箱即用的 HTML）。许多丰富组件还具有内置的 Ajax 支持。这些组件会触发 Ajax 请求并自动进行部分页面更新。并且它们中的大多数支持使用
    `a4j:` 标签进行可插拔和可定制的 Ajax 行为。


    #### RichFaces 皮肤


    另一个主要特性是皮肤。可以创建任意数量的皮肤（通过属性文件定义），并具有不同的配色方案。当设置了特定的皮肤时，组件渲染器将引用该皮肤，并根据该皮肤生成颜色和样式。这意味着你可以通过简单地切换到不同的皮肤来轻松更改整个应用程序的外观和感觉。皮肤可以在
    CSS 级别进行自定义、创建和覆盖。我们专门用第 12 章来讨论这个主题。

