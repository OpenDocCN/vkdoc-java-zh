- fmt: "### Partial View Processing\n\nWithout Ajax, when a page (form) is submitted,\
    \ the entire form is processed on the server. When we say *processed on the server*,\
    \ we refer to input or action components that go through the JSF life cycle; in\
    \ particular, phases such as Apply Request Values, Process Validation, Update\
    \ Model, and Invoke Application.\n\nAgain, without Ajax it's simple. The entire\
    \ form or all the components within the form are processed. When working with\
    \ Ajax, the situation is different. We might want only a particular component\
    \ to be processed and not process all other components; for example, if we only\
    \ want to validate one component and don't need to validate anything else. In\
    \ such case, we need to be able to select which component is processed.\n\nDeciding\
    \ what to process is done via the `execute` attribute, described in [Table 2-4](#Chapter02.html#tab_2_4).\n\
    \n![Images](images/t0204.jpg)\n\nThe `execute` attribute can have different values,\
    \ as shown in [Table 2-5](#Chapter02.html#tab_2_5).\n\n![Images](images/t0205.jpg)\n\
    \nNotice that default value is `@this`, which means that the component firing\
    \ the Ajax request will be processed by default. [Listing 2-17](#Chapter02.html#list_2_17)\
    \ shows an example.\n\n**Listing 2-17.** Example\n\n```\n<h:commandButton value=\"\
    Click\">\n  <f:ajax render=\"id\"/>\n</h:commandButton>\n```\n\nThis is equivalent\
    \ to [Listing 2-18](#Chapter02.html#list_2_18).\n\n**Listing 2-18.** Another example\n\
    \n```\n<h:commandButton value=\"Click\">\n  <f:ajax execute=\"@this\" render=\"\
    id\"/>\n</h:commandButton>\n```\n\nEverything is good if we only want to process\
    \ (execute) the button. But what happens if we have something like [Listing 2-19](#Chapter02.html#list_2_19)?\n\
    \n**Listing 2-19.** Example code\n\n```\n<h:form>\n   <h:panelGrid columns=\"\
    2\">\n      <h:outputText value=\"Text:\" />\n      <h:inputText value=\"#{bean.text}\"\
    \ />\n\n      <h:outputText value=\"Echo:\" />\n      <h:outputText id=\"text\"\
    \ value=\"#{bean.text}\" />\n\n      <h:outputText value=\"Count:\" />\n     \
    \ <h:outputText id=\"count\" value=\"#{bean.count}\" />\n   </h:panelGrid>\n \
    \  <h:commandButton value=\"Submit\">\n      <f:ajax render=\"text count\" listener=\"\
    #{bean.countListener}\" />\n   </h:commandButton>\n</h:form>\n```\n\nThe managed\
    \ bean is shown in [Listing 2-20](#Chapter02.html#list_2_20).\n\n**Listing 2-20.**\
    \ Managed bean\n\n```\n@ManagedBean\n@RequestScoped\npublic class Bean {\n\n \
    \  private String text;\n   private Integer count;\n\n   public void countListener(AjaxBehaviorEvent\
    \ event) {\n      count = text.length();\n   }\n}\n```\n\nEverything appears to\
    \ be fine, but when you run it you will get an error. Do you see where the problem\
    \ is? We attached Ajax behavior to a button, using the default value for `execute`,\
    \ which is `@this`. When the button is clicked, only that button is processed;\
    \ the input fields are not processed and inside the listener you will get an exception\
    \ (`NullPointerException` as the `text` property is null).\n\nThis code example\
    \ introduced another `<f:ajax>` behavior attribute, `listener`, which is described\
    \ in [Table 2-6](#Chapter02.html#tab_2_6).\n\n![Images](images/t0206.jpg)\n\n\
    Notice that the `listener` takes one argument of a type `AjaxBehaviorEvent`, as\
    \ shown in [Listing 2-21](#Chapter02.html#list_2_21).\n\n**Listing 2-21.** The\
    \ listener takes one argument of a type `AjaxBehaviorEvent`\n\n```\nimport javax.faces.event.AjaxBehaviorEvent;\n\
    \npublic void listenerName(AjaxBehaviorEvent event) {\n   …\n}\n```\n\n![images](images/square.jpg)\
    \ **Note** The entire form is still submitted to the server. But only the button\
