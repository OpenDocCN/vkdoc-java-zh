- fmt: "#### Calendar Internationalization\n\nThe calendar component provides very\
    \ rich UI, as shown in [Figure 5-32](#Chapter05.html#fig_5_32), and comes with\
    \ a large number of text labels and other internal controls. This brings us to\
    \ a very important calendar feature: internationalization support. [Table 5-8](#Chapter05.html#tab_5_8)\
    \ shows attributes that are available in order to customize labels related to\
    \ the dates pop-up representation.\n\n![images](images/t0508.jpg)\n\nBy default,\
    \ values from [Table 5-8](#Chapter05.html#tab_5_8) are set with data from current\
    \ `Locale` and should be used only if you want to define custom labels.\n\nWe\
    \ also need to handle all the UI labels localization. The calendar component does\
    \ not provide attributes for all the labels available on the component. The reason\
    \ is rather simple. The set of the labels is very large and defining them all\
    \ on the page would make the component look “heavy.” Thus, the component uses\
    \ message bundles for getting predefined localization properties. [Table 5-9](#Chapter05.html#tab_5_9)\
    \ lists available calendar properties.\n\n![images](images/t0509.jpg)\n\n![images](images/t0509a.jpg)\n\
    \nThese properties could be defined in either one of the two places, the choice\
    \ is up to the developer. It could be an application message bundle (registered\
    \ in a JSF configuration file) or it could be a separate message bundle that should\
    \ be placed in an `org.richfaces.renderkit` package with name `calendar.properties`.\n\
    \nLet's look at an example shown in [Figure 5-33](#Chapter05.html#fig_5_33) using\
    \ the component with an Italian locale.\n\n![images](images/0533.jpg)\n\n**Figure\
    \ 5-33.** `<rich_calendar>` with Italian locale\n\nIn order to achieve that, we\
    \ created a `bundle_it.properties` file in a Java source root folder with content\
    \ from [Listing 5-28](#Chapter05.html#list_5_28).\n\n**Listing 5-28.** Creating\
    \ a `bundle_it.properties` file in a Java source root folder\n\n```\nRICH_CALENDAR_APPLY_LABEL=Applica\n\
    RICH_CALENDAR_TODAY_LABEL=Oggi\nRICH_CALENDAR_CLEAN_LABEL=Reimposta\nRICH_CALENDAR_CANCEL_LABEL=Annulla\n\
    RICH_CALENDAR_OK_LABEL=Ok\nRICH_CALENDAR_CLOSE_LABEL=Chiudi\n```\n\nNext, we added\
    \ the registered file in `faces-config.xml`.\n\n```\n<application>\n   <message-bundle>bundle</message-bundle>\n\
    </application>\n```\n\nAnd now set the calendar to use an Italian locale.\n\n\
    ```\n<rich_calendar datePattern=\"dd/M/yy hh:mm:ss\" locale=\"it\"/>\n```\n\n\
    ![images](images/square.jpg) **Note** There is no need for explicit definitions\
    \ of the `locale` attribute in most cases. Applying current locale will affect\
    \ all calendars and corresponding bundles will be used for all of them. You should\
    \ just provide those bundles.\n\n#### Server-side Customization with CalendarDataModel\n\
    \nThe calendar component supports a data model definition that allows customizing\
    \ month markup according to a custom data model. In order to create a data model,\
    \ we need to implement two interfaces: `CalendarDataModel` and `CalendarDataModelItem`.\
    \ The class that implements `CalendarDataModel` will have the `getData` method\
    \ implemented and responsible for returning instances (a range of dates, for example)\
    \ of `CalendarDataModelItem` for a given date range. Each `CalendarDataModelItem`\
    \ represents one calendar day. It also defines a `getTooltip` reserved method\
    \ that will be used for future tooltip implementations. `CalendarDataModelItem`\
    \ implementation has methods listed in [Table 5-10](#Chapter05.html#tab_5_10).\n\
    \n![images](images/t0510.jpg)\n\nAll methods listed will be called by the calendar\
    \ during month data-fetching in order to apply customizations to every date cell.\n\
    \nThe calendar component works in two modes: Ajax and client. In client mode,\
    \ the calendar switches between months on the client side, rebuilding the month\
    \ markup every time it is switched on. In Ajax mode, new month data is fetched\
    \ from the server. The `dataModel` is used in both cases if defined. In Ajax mode\
    \ it's called when switching between months to load new months' data. For client\
    \ mode we have to specify `preloadDateRangeBegin` and `preloadDateRangeEnd` attributes.\
    \ Those attributes define a range of dates for which the data model will be loaded\
    \ to the client. Then it will be used to construct the month on the client.\n\n\
    Let's look at an example of data model usage. We will use Ajax mode. The data\
    \ model will define simple rules, as follows:\n\n*   Dates that are before the\
    \ current date are disabled and styled correspondingly.\n*   Tuesdays and Thursdays\
    \ are considered “busy” days that are disabled and styled in a special way.\n\
    *   Saturdays and Sundays are disabled and also will have a special style.\n\n\
    [Listing 5-29](#Chapter05.html#list_5_29) shows the JSF page code.\n\n**Listing\
