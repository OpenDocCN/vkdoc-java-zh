    ***Listing 3-34.** Shows an example using the `block` value*


    `<a4j:outputPanel layout="block">`

    `…`

    `</a4j:outputPanel>`


    ![images](images/square.jpg) **Note** Similar to `<h:panelGroup>`, `<a4j:outputPanel>`
    can produce `<span>` or `<div>` elements according to the `layout` attribute.
    `<span>` is encoded by default. It''s important to have it defined as a block
    when using block HTML elements, such as `<div>` and `<table>`, in order to have
    valid HTML encoded.


    #### Using the limitRender Attribute to Turn off Auto-Rendered Panels


    The auto-rendered panel is a good feature to have, as it makes it easier to mark
    parts of the page that should always be rendered. You no longer need to point
    to components with `render`. However, there might be a situation where a particular
    Ajax action on a page should not update the auto-rendered panels but be limited
    to only what is set in the current `render`. We are trying to see how to turn
    off auto-rendered panels in a specific case. We are going to use the page shown
    in [Figure 3-4](#Chapter03.html#fig_3_4).


    ![images](images/0304.jpg)


    ***Figure 3-4.** Turning off auto-rendered panels*


    The JSF page is shown in [Listing 3-35](#Chapter03.html#list_3_35).


    ***Listing 3-35.** The JSF page*


    `<h:form>`

    `   <h:panelGrid columns="2">`

    `      <a4j:commandButton value="Update All Groups" render="group1, group2" />`

    `      <a4j:commandButton value="Update Group 1 and 2 Only" render="group1, group2"`

    `         limitRender="true" />`

    `   </h:panelGrid>`

    `   <h:panelGrid columns="1" id="group1">`

    `      <f:facet name="header">Group 1</f:facet>`

    `      <h:outputText value="#{timeBean.time1}" />`

    `      <h:outputText value="#{timeBean.time2}" />`

    `   </h:panelGrid>`

    `   <h:panelGrid columns="1" id="group2">`

    `      <f:facet name="header">Group 2</f:facet>`

    `      <h:outputText value="#{timeBean.time3}" />`

    `   </h:panelGrid>`

    `   <a4j:outputPanel ajaxRendered="true" layout="block">`

    `      <h:panelGrid id="group3">`

    `         <f:facet name="header">Group 3</f:facet>`

    `         <h:outputText value="#{timeBean.time4}" />`

    `         <h:outputText value="#{timeBean.time5}" />`

    `      </h:panelGrid>`

    `   </a4j:outputPanel>`

    `</h:form>`


    In [Listing 3-5](#Chapter03.html#list_3_5), when the Update All Groups button
    is clicked, all the clocks are rendered (updated). Group 1 and Group 2 are updated
    via ids, as the button has `render="group1, group2"`. Group 3 is updated because
    it is inside an auto-rendered panel. If the second button is clicked (Update Groups
    2 and 3 only), then only Group 1 and Group 2 are rendered. Group 3, which is inside
    the auto-rendered panel, is not updated. The reason it''s not updated is because
    use `limitRender="true"` is in the second button. What this means is to limit
    rendering only to a component set in the current render attribute (in our case
    it''s Group1 and Group2). Another way to look at it is we turned off all auto-rendered
    panels for this particular button. This is a handy feature and gives you further
    flexibility and control in customizing what to render.


    ![images](images/square.jpg) **Note** `limitRender="true"` can also be used to
    turn off auto rendering of `<rich:message>` and `<rich:messages>` components.


    ### Advanced Execute Options


    In this section you are going to learn about a number of advanced execute options
    available in RichFaces. We will first learn about the RichFaces `<a4j:region>`
    tag, which allows you to define what to execute in a more declarative way and
    then learn how to skip phases in the JSF lifecycle when doing validation.'
