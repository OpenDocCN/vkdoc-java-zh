- fmt: '### Using `<rich:togglePanel>`


    `<rich:togglePanel>` is actually the base component for `<rich:accordion>` and
    `<rich:tabPanel>`. It''s covered last simply because the component is a pretty
    general implementation of panels with a states-switching feature and components
    that we covered previously.


    `<rich:accordion>`, `<rich:tab>`, and `<rich:collapsiblePanel>` are more popular
    and more often used. You define two or more panels using `<rich:togglePanelItem>`
    within the `<rich:togglePanel>` and add `<rich:toggleControl>` switching behavior
    to components (it can be inside or outside the panel), which switch those states.


    Let''s look at an example that uses famous quotes as the content for the panels.
    [Figure 6-16](#Chapter06.html#fig_6_16) shows how the panel looks.


    ![images](images/0616.jpg)


    ***Figure 6-16.** Toggle panel initial state*


    Next, let''s hide the current panel and show the next one using the link, as shown
    in [Figure 6-17](#Chapter06.html#fig_6_17).


    ![images](images/0617.jpg)


    ***Figure 6-17.** Toggle panel switched to next item*


    [Listing 6-20](#Chapter06.html#list_6_20) shows the code to accomplish this.


    ***Listing 6-20.** Shows the code to toggle panel switched to next item*


    ```

    <h:form>

       <rich:panel style="width:450px">

          <rich:togglePanel id="quotes" switchType="ajax">

             <rich:togglePanelItem>

                <h:panelGrid>

                   <h:outputText value="C makes it easy to shoot yourself in the

                      foot; C++ makes it harder, but when you do, it blows away

                      your whole leg." />

                   <h:outputText value="- Bjarne Stroustrup"

                      style="font-style: italic" />

                   <h:commandLink value="Next">

                      <rich:toggleControl targetItem="@next" />

                   </h:commandLink>

                </h:panelGrid>

             </rich:togglePanelItem>

             <rich:togglePanelItem>

                <h:panelGrid>

                   <h:outputText value="If you are going through hell,

                      keep going." />

                   <h:outputText value="- Sir Winston Churchill (1874-1965)"

                      style="font-style: italic" />

                   <h:commandLink value="Next">

                      <rich:toggleControl targetItem="@next" />

                   </h:commandLink>

                </h:panelGrid>

             </rich:togglePanelItem>

             <rich:togglePanelItem>

                <h:panelGrid>

                   <h:outputText value="Life is pleasant. Death is peaceful. It''s

                      the transition that''s troublesome." />

                   <h:outputText value="- Isaac Asimov"

                      style="font-style: italic" />

                   <h:commandLink value="Next">

                      <rich:toggleControl targetItem="@next" />

                   </h:commandLink>

                </h:panelGrid>

             </rich:togglePanelItem>

             ...

          </rich:togglePanel>

       </rich:panel>

    </h:form>

    ```


    The panel is added by using a `<rich:panel>` component. The panel states (or the
    content) are defined by the addition of `<rich:togglePanel>` inside with the set
    of nested `<rich:togglePanelItem>` components (there isn''t any predefined markup).
    Controls for switching are a simple `<h:commandLink>` with `<rich:toggleControl>`
    behavior. This adds greater flexibility and allows using the component in various
    use cases.


    Behaviors are a great addition to JSF specification made in JSF 2. We could plug
    our `<rich:toggleControl>`''s behavior to any control on any event (`click` by
    default is used in this case), so we are not limited to just a button or a link
    anymore. In this example we use links and switched between states using the `@next`
    keyword, but you can also use the following predefined keywords: `@prev`, `@first`,
    and `@last`.


    The order of switching defined by the order of child items within the component.
    The `cycledSwitching` attribute controls whether the panel will be switched from
    the boundary item to the opposite one if you continue switching in the same direction.


    There is also another way to perform switching. The `<rich:togglePanelItem>` can
    be named using the `name` attribute. In `<rich:toggleControl>` you would then
    use the name in the `targetItem` attribute.


    Finally, the controls with behavior are placed within the panel itself, but you
    can easily use them outside the panel component. You use the `targetPanel` attribute
    on the `<rich:toggleControl>` behavior defined with the corresponding panel `name`.
    In [Listing 6-21](#Chapter06.html#list_6_21), let''s slightly change the previous
    sample.


    ***Listing 6-21.** Using the `targetPanel` attribute on the `<rich:toggleControl>`
    behavior*


    ```

    <h:form>

       <rich:panel style="width:450px">

          <rich:togglePanel id="tp2" switchType="ajax">

             <rich:togglePanelItem>

                <h:panelGrid>

