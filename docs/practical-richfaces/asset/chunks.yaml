    #### 合并来自不同组件的事件


    我们展示了来自同一组件的事件（在排队时）会被合并。通过使用 *`requestGroupingId`* 属性将它们放入同一个请求组，也可以合并来自不同组件的事件。由于此设置适用于单个组件，我们使用
    *`<a4j:attachQueue>`* 标签来设置该参数，如清单 3-53 所示。


    ***清单 3-53.** 使用* `<a4j:attachQueue>` *标签设置该参数*


    `<a4j:commandButton value="按钮 A" action="#{queueBean.action1}"`

    ` render="now1"`

    `   status="action1Status">`

    **`<a4j:attachQueue requestGroupingId="ajaxGroup" />`**

    `</a4j:commandButton>`


    `<a4j:commandButton value="按钮 B" action="#{queueBean.action2}"`

    ` render="now2"`

    `   status="action2Status">`

    **`<a4j:attachQueue requestGroupingId="ajaxGroup" requestDelay="0" />`**

    `</a4j:commandButton>`


    一旦我们将两个按钮更新为属于同一个请求组，让我们追踪表 3-8 中的序列。


    ![images](img/t0308.jpg)


    事件 A1 和 A2 被合并，因为它们来自同一个组件。当我们对事件 B1 进行排队时，它会合并（或替换）A2，因为两个按钮现在属于同一个请求组 ID。现在，B1
    会立即触发，因为它没有任何延迟。例如，如果我们为其设置 1 秒（1000 毫秒）的延迟，那么 B1 将替换 A2 并在 1 秒后触发。


    #### 忽略“过时”响应


    让我们回顾一个之前看到的示例，其中小写字符串被转换为大写字符串。在之前的示例中，我们在点击按钮后调用操作。此示例略有更新；我们现在在 *`keyup`* 事件上调用操作。JSF
    页面如清单 3-54 所示。


    ***清单 3-54.** JSF 页面*


    `<h:form>`

    `   <a4j:status startText="工作中..."`

    `      startStyle="background-color: #ffA500;`

    `      font-weight:bold;`

    `      position: absolute;`

    `      left: 520px;`

    `      top: 1px;`

    `      width: 100px;" />`


    `   <a4j:queue requestDelay="500"/>`

    `   <h:panelGrid>`

    `      <h:panelGrid>`

    `         <h:outputText value="输入要转换为大写的小写文本：" />`

    `         <h:inputText value="#{queueIgnoreOldBean.text}" >`

    `            <a4j:ajax event="keyup" render="upper"`

    `               listener="#{queueIgnoreOldBean.upperCase}"/>`

    `         </h:inputText>`

    `      </h:panelGrid>`

    `      <h:outputText id="upper" value="#{queueIgnoreOldBean.text}" />`

    `   </h:panelGrid>`

    `</h:form>`


    请注意，我们在发送 Ajax 请求之前设置了半秒的延迟。这将允许我们“合并”事件。或者换句话说，等待用户输入更多字母。


    托管 Bean 如清单 3-55 所示。


    ***清单 3-55.** 托管 Bean*


    `@ManagedBean`

    `@RequestScoped`

    `public class QueueIgnoreOldBean {`

    `   private String text;`


    `   // Getter 和 Setter`


    `   public void upperCase(AjaxBehaviorEvent event) {`

    `      try {`

    `         Thread.sleep(2500);`

    `      } catch (InterruptedException e) {`

    `         e.printStackTrace();`

    `      }`

    `      setText(text.toUpperCase());`

    `   }`

    `}`


    假设我们输入单词“dog”。将发送一个请求，操作执行需要 2.5 秒，此时我们应该看到单词 DOG 呈现在页面上。让我们重复此操作，但当请求在服务器上执行时，快速删除“dog”并输入“cat”。


    您将看到的结果是，首先会呈现 DOG，然后呈现 CAT。现在的问题是，如果用户已将输入更改为“cat”，呈现 DOG 是否有意义？答案取决于具体情况，但在大多数情况下，不再需要显示
    DOG，因为用户输入了“cat”。在这种情况下，DOG 是一个“过时”的响应。是否要呈现 DOG 由您决定。幸运的是，RichFaces 提供了一个队列功能，允许您忽略“过时”的响应。RichFaces
    队列提供了一个 `ignoreDupResponse` 属性，允许您实现这一点。当设置为 `true` 时，它将忽略来自同一组件的重复响应。重复是什么意思？重复意味着，如果当前正在执行一个请求，并且来自同一组件（或由
    `requestGroupingId` 分组的组件）的另一个请求已排队，那么它将忽略原始响应或 DOM 更新。重要的是要理解，请求仍会在服务器上执行（我们无法在那里阻止它），只有
    DOM 更新会被丢弃或忽略。


    要忽略“过时”响应，我们将 `ignoreDupRepsonses` 属性添加到队列中，如下所示：


    `<a4j:queue requestDelay="500" ignoreDupResponses="true"/>`


    让我们再次运行页面。输入“dog”，并在请求执行期间（状态显示中），快速删除并输入“cat”。您现在应该只看到 CAT 被呈现。原始响应（DOG）已完成，但我们决定忽略此
    DOM 更新。


    重要的是要记住，RichFaces 提供了大量高级功能，但它只是升级了标准的 JSF 2 队列。


    ### 更多 a4j:* 标签和功能


    本节将涵盖更多 a4j:* 标签和功能，例如如何在 Ajax 请求期间显示状态、如何显示 Ajax 请求/响应日志信息，以及一种更简单的调用操作监听器的方法。

