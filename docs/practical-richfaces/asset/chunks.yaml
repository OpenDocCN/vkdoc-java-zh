    CDK features, let us caution you about an important piece in the code that is
    not directly related to CDK or JSF. `name="#{clientId}"` should be used as an
    input element to make the value of the input passed request parameters properly.
    Don’t forget that the simple requirement of HTML forms writing your components
    means that you don’t spend much time debugging your decode() methods.    Input
    value gets encoded using `#{getInputValue(facesContext, component)}` method call.
    In fact, we are showing you a way to calling methods from superclass (we will
    define that method in `SpinnerBaseRenderer`). You might want to write any other
    utility methods and refer from the template as it is done for the `value` attribute.    Most
    interesting to us are the <`cdk:scriptObject>` and <`cdk:scriptOption>` tags.
    Considering that most rich components provides interactive UI using JavaScript,
