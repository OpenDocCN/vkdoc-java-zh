    `      <h:outputText id="echo" value="#{bean.name}"/>`

    `      <h:outputText value="Count:"/>`

    `      <h:outputText id="count" value="#{bean.count}"/>`

    `   </h:panelGrid>`

    `   <h:commandButton value="Submit" action="#{bean.countAction}">`

    `     <f:ajax event="click" render="echo count"/>`

    `   </h:commandButton>`

    `</h:form>`


    托管 Bean 的代码如清单 3-4 所示。


    ***清单 3-4.** 托管 Bean 代码*


    `@ManagedBean`

    `@RequestScoped`


    `public class Bean {`


    `   private String name;`

    `   private Integer count;`


    `   public void countAction (){`

    `      count = name.length();`

    `   }`

    `   // getters and setters`

    `}`


    当你运行上述示例时，它不会正常工作，因为我们忘记修改 `<f:ajax>` 行为上的 `execute` 属性。如果你还记得第 2 章的内容，`<f:ajax>`
    的默认 `execute` 值是 `@this`。`@this` 意味着只有当前组件会被执行，而输入组件则不会。要修复这个问题，我们必须添加 `execute`
    属性，如清单 3-5 所示。


    ***清单 3-5.** 添加 execute 属性*


