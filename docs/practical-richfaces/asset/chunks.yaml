    14-8.** Abstract component class*  `@JsfComponent(type = "org.richfaces.book.Spinner",
    family = "javax.faces.Input", renderer = @JsfRenderer(template = "spinner.template.xml"))`
    `public abstract class AbstractSpinnerComponent extends UIInput {`  `   @Attribute`
    `    public abstract boolean isDisabled();`  `    @Attribute(defaultValue = "1")`
    `    public abstract String getStep();`  `    @Attribute(defaultValue = "0")`
