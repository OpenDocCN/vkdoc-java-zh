    UI 组件数据模型。    ##### 用于分页的 ExtendedDataModel 实现    `ExtendedDataModel` 实现用于分页的主题是那些使用迭代组件和
    JSF/RichFaces 的人中最受欢迎的主题之一。所有组件库参考都展示了将表格组件指向托管 Bean 中的列表，并在该模型之上实现附加功能的非常简单的示例。但是，后来，将这样的
    Bean 连接到数据库层似乎非常耗时，例如，获取完整列表以仅使用 `first` 和 `rows` 表格属性显示 10 到 20 行。    同样的问题也适用于
    RichFaces `<rich:dataTable>`–`<rich:dataScroller/>` 组件对。简单地将表格指向 `List` 并默认包装到
    `SequenceDataModel` 中，会获取整个列表并使用 `first`、`rows` 和 `page` 属性对其进行部分编码。但是，实际应用程序的常见任务是优化数据库调用，并仅获取与要显示的当前页面对应的数据。接下来，我们将正确实现模型以达到该结果。    ![images](img/square.jpg)
    **注意** 这是新开发人员非常常见的问题（甚至是期望）。开发人员期望表格能够执行部分数据获取，因为它提供了一个数据滚动组件。然而，JSF 中的 UI 组件对底层模型一无所知，并且如果没有提供适当的自定义实现，则完全依赖于默认实现。默认实现会获取完整列表，将其包装为模型，并使其可用于页面。    让我们在清单
