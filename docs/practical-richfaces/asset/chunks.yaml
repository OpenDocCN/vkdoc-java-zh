    The only attribute that you will have to use is `fileUploadListener`. It should
    be defined with a method expression, and the listener method will be responsible
    for processing uploaded files. It should be a void method that accepts a single
    parameter of `org.richfaces.event.FileUploadEvent` type. `FileUploadEvent` provides
    a `getUploadedFile` method that returns an instance of the uploaded file described
    in [Listing 5-34](#Chapter05.html#list_5_34).


    Let''s also look at a simple bean that stores an uploaded file object in session.


