  raw: '##### Dynamic render with RichFaces


    When using RichFaces `<a4j:ajax>` and `render="#{bean.renderComponents}"`, the
    component ids to be rendered are resolved in the current request. To go back to
    our original example, just switch to using `<a4j:ajax>` and everything will work.
    [Listing 2-33](#Chapter02.html#list_2_33) shows the JSF page again.


    ***Listing 2-33.** Shows the JSF page*


    `<h:form id="form">`

    `   <h:panelGrid>`

    `      <h:selectOneRadio value="#{bean.selection}">`

    `         <f:selectItem itemValue="clock1" itemLabel="Clock 1" />`

    `         <f:selectItem itemValue="clock2" itemLabel="Clock 2" />`

    `         <f:selectItem itemValue="clock3" itemLabel="Clock 3" />`

    `      </h:selectOneRadio>`

    `      <h:commandButton id="updateButton" value="Update">`

    `      <a4j:ajax event="click" execute="@form"`

    `         listener="#{bean.selectComponents}"   `

    `            render="#{bean.renderComponents}"/>`

    `       </h:commandButton>`

    `   </h:panelGrid>`

    `   <h:panelGrid cellspacing="6">`

    `      <h:outputText id="clock1" value="#{bean.clock1}" />`

    `      <h:outputText id="clock2" value="#{bean.clock2}" />`

    `      <h:outputText id="clock3" value="#{bean.clock3}" />`

    `   </h:panelGrid>`

    `</h:form>`


    All we did is change the behavior name from `<f:ajax>` to `<a4j:ajax>`.


    [Listing 2-34](#Chapter02.html#list_2_34) shows the managed bean.


    ***Listing 2-34.** Shows the managed bean*


    `@ManagedBean`

    `@RequestScoped`

    `public class Bean {`


    `   private String selection;`

    `   private List <String> renderComponents;`


    `   @PostConstruct`

    `   public void init (){`

    `      renderComponents = new ArrayList <String>();`

    `   }`

    `   public void selectComponents (AjaxBehaviorEvent event){`

    `      renderComponents.add(selection);`

    `   }`

    `   public List<String> getRenderComponents() {`

    `      return renderComponents;`

    `   }`

    `   public String getSelection() {`

    `      return selection;`

    `   }`

    `   public void setSelection(String selection) {`

    `      this.selection = selection;`

    `   }`

    `   public Date getClock1() {`

    `      return new Date();`

    `   }`

    `   public Date getClock2() {`

    `      return new Date();`

    `   }`

    `   public Date getClock3() {`

    `      return new Date();`

    `   }`

    `}`


    Notice that we no longer need to add the button to the list of components to be
    rendered. Running the application, everything is now updated as you would expect.


    Simplicity is just one of the advantages to using `<a4j:ajax>` and the `render`
    attribute bound to EL. One more advantage is that evaluating the ids on the server
    instead of getting them client side is more secure, as anyone could send a request
    with ids using `<f:ajax>`. If this happens with `<a4j:ajax>`, these ids will simply
    be ignored.


    ![images](images/square.jpg) **Note** The same functionality is available on other
    RichFaces tags, such as `<a4j:commandButton>`, `<a4j:commandLink>`, `<a4j:poll>`,
    and `<a4j:jsFunction>`. We will cover this in [Chapter 3](#Chapter03.html#ch3).
    We used the `listener` attribute on either `<f:ajax>` or `<a4j:ajax>` behaviors.
    If you have an action or an `actionListener` set on the button or link, those
    will be invoked in a standard way.


    #### execute Attribute Options


    The same way it''s possible to bind the `render` attribute to EL or decide which
    components to render in runtime, it''s also possible to decide which components
    to execute in runtime or bind the `execute` attribute to EL. For example:


    `<f:ajax event="blur" execute="#{bean.executeComponents}" render="out"/>`


    When using just JSF 2, `execute` works in similar fashion to `render` in regards
    to when the ids are resolved. As with `render`, the ids in `execute` are resolved
    but then rendered to the page and only used on the next request. When using RichFaces
    `a4j:ajax` behavior instead of *`f`*`:ajax`, then ids are resolved and those components
    are executed in the current request.


    `<a4j:ajax event="blur" execute="#{bean.executeComponents}" render="out"/>`


    While determining which components to render at runtime is common, determining
    which components to execute is rarely used, if at all. But, it''s important to
    understand the difference in when ids are resolved and when they are used when
    using JSF 2 `<f:ajax>` and RichFaces `<a4j:ajax>` behaviors.


    RichFaces offers one more option for deciding what to execute with its `<a4j:region>`
    tag. This tag will be covered in [Chapter 3](#Chapter03.html#ch3).'
  trans: '

    ##### 使用 RichFaces 进行动态渲染


    当使用 RichFaces 的 `<a4j:ajax>` 和 `render="#{bean.renderComponents}"` 时，需要渲染的组件 ID
    会在当前请求中解析。回到我们最初的示例，只需改用 `<a4j:ajax>`，一切就能正常工作。清单 2-33 再次展示了这个 JSF 页面。


    ***清单 2-33.** 展示 JSF 页面*


    `<h:form id="form">`

    `   <h:panelGrid>`

    `      <h:selectOneRadio value="#{bean.selection}">`

    `         <f:selectItem itemValue="clock1" itemLabel="时钟 1" />`

    `         <f:selectItem itemValue="clock2" itemLabel="时钟 2" />`

    `         <f:selectItem itemValue="clock3" itemLabel="时钟 3" />`

    `      </h:selectOneRadio>`

    `      <h:commandButton id="updateButton" value="更新">`

    `      <a4j:ajax event="click" execute="@form"`

    `         listener="#{bean.selectComponents}"   `

    `            render="#{bean.renderComponents}"/>`

    `       </h:commandButton>`

    `   </h:panelGrid>`

    `   <h:panelGrid cellspacing="6">`

    `      <h:outputText id="clock1" value="#{bean.clock1}" />`

    `      <h:outputText id="clock2" value="#{bean.clock2}" />`

    `      <h:outputText id="clock3" value="#{bean.clock3}" />`

    `   </h:panelGrid>`

    `</h:form>`


    我们所做的只是将行为名称从 `<f:ajax>` 改为 `<a4j:ajax>`。


    清单 2-34 展示了受管 bean。


    ***清单 2-34.** 展示受管 bean*


    `@ManagedBean`

    `@RequestScoped`

    `public class Bean {`


    `   private String selection;`

    `   private List <String> renderComponents;`


    `   @PostConstruct`

    `   public void init (){`

    `      renderComponents = new ArrayList <String>();`

    `   }`

    `   public void selectComponents (AjaxBehaviorEvent event){`

    `      renderComponents.add(selection);`

    `   }`

    `   public List<String> getRenderComponents() {`

    `      return renderComponents;`

    `   }`

    `   public String getSelection() {`

    `      return selection;`

    `   }`

    `   public void setSelection(String selection) {`

    `      this.selection = selection;`

    `   }`

    `   public Date getClock1() {`

    `      return new Date();`

    `   }`

    `   public Date getClock2() {`

    `      return new Date();`

    `   }`

    `   public Date getClock3() {`

    `      return new Date();`

    `   }`

    `}`


    请注意，我们不再需要将按钮添加到要渲染的组件列表中。运行应用程序，现在所有内容都会按预期更新。


    简洁只是使用 `<a4j:ajax>` 和绑定到 EL 的 `render` 属性的优势之一。另一个优势是，在服务器端评估 ID 而非从客户端获取它们更加安全，因为任何人都可以使用
    `<f:ajax>` 发送带有 ID 的请求。如果这种情况发生在 `<a4j:ajax>` 上，这些 ID 将被直接忽略。


    ![images](img/square.jpg) **注意** 其他 RichFaces 标签也提供相同的功能，例如 `<a4j:commandButton>`、`<a4j:commandLink>`、`<a4j:poll>`
    和 `<a4j:jsFunction>`。我们将在第 3 章中介绍这些内容。我们在 `<f:ajax>` 或 `<a4j:ajax>` 行为上使用了 `listener`
    属性。如果你在按钮或链接上设置了 action 或 `actionListener`，它们将以标准方式被调用。


    #### execute 属性选项


    与可以将 `render` 属性绑定到 EL 或在运行时决定渲染哪些组件一样，也可以在运行时决定执行哪些组件，或将 `execute` 属性绑定到 EL。例如：


    `<f:ajax event="blur" execute="#{bean.executeComponents}" render="out"/>`


    当仅使用 JSF 2 时，`execute` 在 ID 解析时机方面的工作方式与 `render` 类似。与 `render` 一样，`execute` 中的
    ID 会被解析，然后渲染到页面上，并且仅在下一个请求中使用。当使用 RichFaces 的 `a4j:ajax` 行为而不是 *`f`*`:ajax` 时，ID
    会被解析，并且这些组件会在当前请求中执行。


    `<a4j:ajax event="blur" execute="#{bean.executeComponents}" render="out"/>`


    虽然在运行时决定渲染哪些组件很常见，但决定执行哪些组件却很少使用（即便有的话）。但是，理解在使用 JSF 2 `<f:ajax>` 和 RichFaces
    `<a4j:ajax>` 行为时，ID 何时被解析以及何时被使用的区别非常重要。


    RichFaces 通过其 `<a4j:region>` 标签提供了另一个用于决定执行内容的选项。该标签将在第 3 章中介绍。

