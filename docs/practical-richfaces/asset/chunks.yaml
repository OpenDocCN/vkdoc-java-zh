    in the template using tags in the interface. But, now you know how to do it the
    other way as well. Also, note that we do not declare any `library` for jQuery
    dependency. That’s because we plan to use the component in the RichFaces environment
    and the RichFaces resource handler automatically picks that resource from bundled
