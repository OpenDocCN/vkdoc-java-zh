- fmt: "# Using Component Client-side JavaScript API\n\nJSF is a server-side framework,\
    \ which means that, in most cases, when we need to control a component such as\
    \ change a value or property, we send a request to the server, make the change,\
    \ and update the component on the client.\n\nLet's again take our tab panel example\
    \ to place three buttons or links outside the tab panel. Each button will be labeled\
    \ with the city name. By clicking the button, the associated tab is selected.\
    \ The page is shown in [Figure 4-6](#Chapter04.html#fig_4_6).\n\n![images](images/0406.jpg)\n\
    \n**Figure 4-6.** Selecting tabs with components outside the tab panel\n\nThis\
    \ is pretty easy to do. First we add a `name` attribute to each tab. Then we bind\
    \ the `activeItem`, as follows, to a bean property that holds current tab name:\n\
    \n`activeItem=\"#{cityBean.selectedTab}\"`\n\nNext there would be an `action`\
    \ (or `actionListener`) on each button. Inside each action we set an `activeItem`\
    \ attribute based on the button clicked. [Listing 4-7](#Chapter04.html#list_4_7)\
    \ shows the page code.\n\n**Listing 4-7.** Shows the page code\n\n```\n<h:form>\n\
    \   <a4j:commandButton value=\"San Francisco\" action=\"#{cityBean.sfAction}\"\
    \ render=\"cities\"/>\n   <a4j:commandButton value=\"Los Angeles\" action=\"#{cityBean.laAction}\"\
    \ render=\"cities\"/>\n   <a4j:commandButton value=\"New York City\" action=\"\
    #{cityBean.nycAction}\" render=\"cities\"/>\n   <rich:tabPanel id=\"cities\" style=\"\
    width:40%\" activeItem=\"#{cityBean.selectedTab}\">\n      <rich:tab header=\"\
    San Francisco\"  name=\"sf\" >\n         ...\n      </rich:tab>\n      <rich:tab\
    \ header=\"Los Angeles\" name=\"la\">\n         ...\n      </rich:tab>\n     \
    \ <rich:tab header=\"New York City\" name=\"nyc\">\n         ...\n      </rich:tab>\n\
    \   </rich:tabPanel>\n</h:form>\n```\n\n[Listing 4-8](#Chapter04.html#list_4_8)\
    \ shows the managed bean with actions.\n\n**Listing 4-8.** Shows the managed bean\
    \ with actions\n\n```\n@ManagedBean\n@RequestScoped\npublic class CityBean {\n\
    \n   private String selectedTab=\"sf\"; // getter and setter\n   public void sfAction\
    \ () {\n      this.selectedTab=\"sf\";\n   }\n   public void laAction () {\n \
    \     this.selectedTab =\"la\";\n   }\n   public void nycAction () {\n      this.selectedTab\
    \ =\"nyc\";\n   }\n}\n```\n\nThis is an easy way to switch tabs by sending an\
    \ Ajax request to the server. Let's say we want to do the same thing, but instead\
    \ using plain HTML buttons and without using any of our code to manage active\
    \ tab from custom listeners. Many rich components provide client-side JavaScript\
    \ API, which allows us to control the component entirely on the client. `<rich:tabPanel>`\
    \ provides such API as well.\n\nThere are two things we need to know before using\
    \ the API. First, we need to get a reference to the component in the browser.\
    \ Second, we need to know what methods are available for us to call. To get a\
    \ reference to the component, we are going to use a RichFaces built-in `#{rich:component('id')}`\
    \ client function. As for the JavaScript API that is available, you will need\
    \ to use the RichFaces components guide. But, for the next example, we will tell\
    \ you the available JavaScript API.\n\nLet's take the tab example and change the\
    \ buttons to call the tab panel's JavaScript API to switch tabs. [Listing 4-9](#Chapter04.html#list_4_9)\
    \ shows the JSF page with updated buttons.\n\n**Listing 4-9.** Shows the JSF page\
    \ with updated buttons\n\n```\n<h:form>\n   <input type=\"button\" value=\"San\
    \ Francisco\"\n      onclick=\"#{rich:component('cities')}.switchToItem('sf')\"\
    />\n   <input type=\"button\"  value=\"Los Angeles\"\n      onclick=\"#{rich:component('cities')}.switchToItem('la')\"\
    />\n   <input type=\"button\"  value=\"New York City\"\n      onclick=\"#{rich:component('cities')}.switchToItem('nyc')\"\
    />\n   <rich:tabPanel id=\"cities\" style=\"width:40%\" >\n      <rich:tab header=\"\
    San Francisco\" name=\"sf\">\n         <h:outputText value=\"San Francisco is\
    \ a major city in northern California, on the\n            West Coast of\n   \
    \         the United States\" />\n      </rich:tab>\n      <rich:tab header=\"\
    Los Angeles\" name=\"la\">\n         <h:outputText value=\"Los Angeles is a major\
    \ city in southern California, on the\n            West Coast of\n           \
    \ the United States\" />\n      </rich:tab>\n      <rich:tab header=\"New York\
    \ City\" name=\"nyc\">\n         <h:outputText  value=\"New York City is a major\
    \ city on the East Coast of the United\n            States\" />\n      </rich:tab>\n\
    \   </rich:tabPanel>\n</h:form>\n```\n\nThere are a number of interesting things\
    \ in [Listing 4-9](#Chapter04.html#list_4_9). The three buttons are just plain\
    \ HTML buttons. This means they don't send an Ajax request. You probably noticed\
    \ that every `onclick` attribute is set to an interesting expression. Those are\
    \ the two things we needed to invoke client-side JavaScript API: one, a reference\
    \ to the component, and two, a method name to invoke.\n\n`#{rich:component('id')}`\
    \ is a built-in RichFaces function that gives us a reference to a component's\
    \ JavaScript property, which holds all the available functions. Once we have the\
    \ reference, it's just a matter of calling the function we need. In our case the\
    \ function name is `switchToItem('itemName')`, and we are passing the tab name\
    \ we want to display.\n\nYou might have noticed that we still send an Ajax request\
    \ to the server. The request is sent because the `switchType` attribute is set\
    \ to `ajax` by default on the tab panel. Even though we switched to another tab\
    \ via the component's JavaScript API, tab content is not available, and so it\
    \ has to get it from the server. To make it client only, set `switchType=\"client\"\
    ` and try running it again. You can place `<a4j:log>` on the page and you will\
    \ see that no Ajax request is now sent.\n\n[Table 4-2](#Chapter04.html#tab_4_2)\
    \ lists all the JavaScript API on the `<rich:tabPanel>` component.\n\n![images](images/t0402.jpg)\n\
    \nIf we wanted to use `switchToItem(itemName)` and use the predefined names, you\
    \ would add the code shown in [Listing 4-10](#Chapter04.html#list_4_10).\n\n**Listing\
    \ 4-10.** Using `switchToItem(itemName)` and the predefined names\n\n```\n<input\
    \ type=\"button\" value=\"First\" onclick=\"#{rich:component('cities')}.switchToItem('@first')\"\
    />\n<input type=\"button\"  value=\"Next\" onclick=\"#{rich:component('cities')}.switchToItem('@next')\"\
    />\n<input type=\"button\"  value=\"Prev\" onclick=\"#{rich:component('cities')}.switchToItem('@prev')\"\
    />\n<input type=\"button\"  value=\"Last\" onclick=\"#{rich:component('cities')}.switchToItem('@last')\"\
    />\n```\n\nMany other rich components provide client-side API. How do you find\
    \ the available API? Again, visit the RichFaces components guide located at [`www.jboss.org/richfaces/docs`](http://www.jboss.org/richfaces/docs).\
    \ Every component that has API will be listed under the JavaScript API section.\n\
    \nThis is a very powerful feature in RichFaces that adds a lot of flexibility\
    \ to your application. You can control rich components entirely on the client.\n\
    \n## Summary\n\nIn this chapter we covered the key concepts shared by rich components:\
