    If you don’t have much experience with jQuery, we recommend you spend some time
    learning it. Knowing jQuery is important when you build your own custom components
    or extend existing components.    Now we are ready to create the actual component.
    Let’s start by creating a project for it.    ### Creating the Project    First,
    we are going to create a project in which we build the custom component.    ![images](images/square.jpg)
    **Note** As of writing of this book, no special Maven archetype exists for creating
    a project where you would build a custom component with CDK. Thus, we are going
    to create a standard Maven project and add the required dependencies.    In our
    case, we are going to create a standard Maven project using the following command:  `mvn
    archetype:generate`  We choose the default `maven-archetype-quickstart` archetype
