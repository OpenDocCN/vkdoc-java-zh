    ***Figure 5-32.** <rich_calendar>shown as rendered inline*


    As you see in [Figure 5-32](#Chapter05.html#fig_5_32), the calendar has the same
    look and feel, but no input field is displayed. [Listing 5-27](#Chapter05.html#list_5_27)
