    label="Group 2">` `            <rich:panelMenuItem label="Item 2.1" />` `         </rich:panelMenuGroup>`
    `         <rich:panelMenuItem label="Item 3" />` `      </rich:panelMenu>` `   </rich:panel>`
    `</h:form>`  You can use a facet with the `label` name instead of the corresponding
