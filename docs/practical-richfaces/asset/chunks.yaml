    />\n       </h:selectOneRadio>\n   </h:panelGrid>\n<h:panelGrid id=\"wonderPanel\"\
    >\n      <h:dataTable id=\"wonderList\" value=\"#{wonderListBean.list}\"\n   \
    \      var=\"wonder\" rendered=\"#{dynamicUpdateBean.display}\">\n          ...\n\
    \      </h:dataTable>\n</h:panelGrid>\n</h:form>\n```\n\nThere is one more feature\
    \ worth mentioning. `<a4j:outputPanel>` can also be used for layout. It comes\
    \ with a `layout` attribute that can be set to either `block` to render a `<div>`\
    \ tag, `inline` to render a `<span>` tag (default). [Listing 3-34](#Chapter03.html#list_3_34)\
    \ shows an example using the `block` value.\n\n**Listing 3-34.** Shows an example\
    \ using the `block` value\n\n```\n<a4j:outputPanel layout=\"block\">\n…\n</a4j:outputPanel>\n\
    ```\n\n![images](images/square.jpg) **Note** Similar to `<h:panelGroup>`, `<a4j:outputPanel>`\
    \ can produce `<span>` or `<div>` elements according to the `layout` attribute.\
    \ `<span>` is encoded by default. It's important to have it defined as a block\
    \ when using block HTML elements, such as `<div>` and `<table>`, in order to have\
    \ valid HTML encoded.\n\n### Using the limitRender Attribute to Turn off Auto-Rendered\
    \ Panels\n\nThe auto-rendered panel is a good feature to have, as it makes it\
    \ easier to mark parts of the page that should always be rendered. You no longer\
    \ need to point to components with `render`. However, there might be a situation\
    \ where a particular Ajax action on a page should not update the auto-rendered\
