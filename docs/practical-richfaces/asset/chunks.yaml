    12-4 中，按钮被放置在表单内部。这不是必需的，按钮也可以放在表单外部。通常，当调用 JavaScript 函数时，不需要表单，因为我们没有向服务器发出任何请求。但是，组件本身可能会根据调用的
    API 发送 Ajax 请求。手风琴的默认切换类型是 `ajax`。这意味着当单击按钮时，它会调用 `<rich:accordion>` 上的 API 方法来切换项目，并且
