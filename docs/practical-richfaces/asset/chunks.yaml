    `saveOnBlur`，现在让我们看看 `saveOnSelect`。通常，您可以尝试一个示例选择，它会保存值并在做出选择后立即进入已保存状态。如果将该属性设置为
    false，则选择后列表将关闭；但组件不会保存该值，而是等待额外的操作，例如按回车键、点击 UI 保存控件，或者如果 `saveOnBlur` 为 true，则组件失去焦点。


    #### JavaScript API


    该组件提供与 `<rich:inplaceInput>` 相同的 JavaScript API。表 5-2 显示了仅在 `<rich:inplaceSelect>`
    组件上可用的方法。


    ![images](img/t0502.jpg)


    以上内容涵盖了 RichFaces 4 版本中可用的 `<rich:inplaceSelect>` 组件。


    ### 使用 <rich:autocomplete>


    `<rich:autocomplete>` 是一个输入组件，可在用户输入时提供建议。对于使用过 RichFaces 3 的用户来说，该组件经过重新设计，结合了
    `<rich:suggestionBox>` 和 `rich:comboBox` 组件的功能。尽管 `<rich:autocomplete>` 提供了丰富的输入功能，但其底层只是一个基本的输入组件。


    新的 `<rich:autocomplete>` 组件可以配置为以下四种模式工作：


    *   *Ajax*。每次 *`keyup`* 都会触发一个 Ajax 请求，更新建议列表并向用户显示新结果。

    *   *缓存 Ajax*。在此模式下，当输入最少字符数时，组件会请求数据，但如果前缀没有变化，则不会发出额外的请求。在前缀改变之前，进一步的列表过滤完全在客户端执行。

    *   *客户端*。所有数据在组件渲染时都渲染到客户端。此后，仅使用客户端过滤来提供建议。不会向服务器发送 Ajax 请求。

    *   *懒加载客户端*。与客户端模式类似，只有在组件被激活并输入最少字符数后，才会获取完整列表。此后，即使初始前缀发生变化，也不会执行额外的 Ajax 请求。随着进一步输入，客户端过滤会执行，因为组件期望所有数据都在一次
    Ajax 请求中加载完成。


    让我们回顾两种全新的模式：缓存 Ajax 和懒加载客户端。这两种模式的工作方式类似，但没有对请求数量进行额外优化。尽管我们提到了优化，但这两种模式在某些情况下仍然有用。例如，当列表非常小且不需要额外的
    Ajax 请求来获取数据时，应仅使用客户端模式。或者，如果建议获取算法很复杂并且依赖于用户输入的每个字母，则应使用 Ajax 模式。


    清单 5-8 展示了一个使用懒加载客户端模式的 *`<rich:autocompete>`* 示例。


    ***清单 5-8.** 使用懒加载客户端模式的* `<rich:autocompete>` *示例*


    `<h:form>`

    `<rich:autocomplete autocompleteList="#{autocompleteBean.suggestions}"` ![images](img/U002.jpg)

    `      mode="lazyClient"/>`

    `</h:form>`


    清单 5-9 展示了受管 bean。


    ***清单 5-9.** 受管 bean*


    `@ManagedBean`

    `@SessionScoped`

    `public class AutocompleteBean {`

    `   private List<String> suggestions = null;`


    `   public AutocompleteBean() {`

    `      suggestions = new ArrayList<String>();`

    `      suggestions.add("Banana");`

    `      suggestions.add("Cranberry");`

    `      suggestions.add("Blueberry");`

    `      suggestions.add("Orange");`

    `      suggestions.add("Apple");`

    `      suggestions.add("Strawberry");`

    `   }`

    `   //Getter and setter`

    `}`


    图 5-10 显示了用户开始输入时的渲染效果。


    ![images](img/0510.jpg)


    ***图 5-10.** <rich:autocomplete> 组件*


    当输入第一个字母时，组件会通过 Ajax 获取所有建议，并假定列表不会改变。所有进一步的过滤将在客户端进行。仅在组件第一次被激活时发送一次 Ajax 请求以获取所有数据，之后不会再发送任何请求。如果我们在清单
    5-8 中将模式改为 `client`，组件将在初始渲染时将所有数据渲染到客户端，并且根本不会发送任何 Ajax 请求。所有过滤都将在客户端完成。

