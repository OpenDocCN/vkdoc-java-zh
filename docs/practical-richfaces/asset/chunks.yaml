    ##### JSF 2 中的编程式 Ajax


    JSF 2 确实提供了一种从客户端以编程方式发送 Ajax 请求的方法（可用于编程式发送 Ajax 请求的请求参数列于表 3-2）。为此，我们首先需要加载代码清单
    3-22 中所示的 JavaScript 库。（当使用 `<f:ajax>` 行为或任何 RichFaces 标签时，JavaScript 库会自动加载。）


    ***代码清单 3-22.** 加载 JavaScript 库*


    `<h:head>`

    `   <h:outputScript name="jsf.js" library="javax.faces"/>`

    `<h:/head>`


    触发 Ajax 请求的代码如代码清单 3-23 所示。


    ***代码清单 3-23.** 触发 Ajax 请求*


    `<h:form id="form">`

    `   <h:panelGrid>`

    `      <h:commandButton id="button" value="更新"`

    `         onclick="jsf.ajax.request(this,event, {render:''form:out''}); return
    false;" />`

    `      <h:outputText value="#{manualAjax.now}" id="out" />`

    `   </h:panelGrid>`

    `</h:form>`


    ![images](img/t0302.jpg)


    ![images](img/square.jpg) **注意** `render` 必须指向客户端 ID，而非组件 ID。


    代码清单 3-24 展示了另一个使用 `<h:inputText>` 的示例。


    ***代码清单 3-24.** 使用 `<h:inputText>` 的示例*


    `<h:form id="form2">`

    `   <h:panelGrid>`

    `      <h:inputText value="#{manualAjax.text}"`

    `         onkeyup="jsf.ajax.request(this, event, {render:''form2:out''});`

    `            return false;" />`

    `      <h:outputText value="#{manualAjax.text}" id="out" />`

    `   </h:panelGrid>`

    `</h:form>`


    我们认为使用 `<a4j:jsFunction>` 更简单，因为您无需手动编写任何 JavaScript 代码，并且可以获得 `a4j:ajax` 行为中同样可用的所有额外特性和功能。


    以下 Ajax 属性可用于 `<a4j:jsFunction>`：`onbegin`、`onbeforedomupdate`、`oncomplete`、`bypassUpdates`、`limitRender`、`data`
    和 `status`。


    `<a4j:jsFunction>` 可能看起来是一个非常简单的标签。虽然它易于使用，但实际上非常强大。与任何暴露客户端事件的 JSF 组件（几乎所有组件都如此）一样，`<a4j:jsFunction>`
    可以与这些事件一起使用来触发 Ajax 请求。取任意 HTML 标签，`<a4j:jsFunction>` 都可以用于基于某个标签事件来触发 Ajax 请求。理论上，任何使用
    `<a4j:ajax>` 的地方，`<a4j:jsFunction>` 都可以替代它，因为在渲染标记时，`<a4j:ajax>` 渲染的 JavaScript
    与 `<a4j:jsFunction>` 渲染的非常相似。您可以将 `<a4j:jsFunction>` 视为所有 Ajax 触发标签和行为的底层或基础标签。


    #### 使用 <a4j:poll> 进行轮询


    `<a4j:poll>` 的工作方式与我们讨论过的所有其他动作组件几乎完全相同，但无需点击或输入内容来发送请求，该组件会定期向服务器发送（轮询）Ajax 请求。您可以轻松地通过
    `render` 属性指定要更新的组件，以及要调用的 `action` 或 `actionListener`。我们之前涵盖的所有核心 Ajax 概念同样适用于此组件。让我们通过一个示例来了解，您将看到服务器时间在运行。您还可以停止和启动时钟。


    页面加载时，应用程序将如图 3-2 所示。


    ![images](img/0302.jpg)


    ***图 3-2.** 使用 <a4j:poll>*


    当页面首次加载时，时钟是关闭的。然后您可以使用按钮启动或停止时钟。在开始之前，请务必记住，使用 `<a4j:poll>` 组件时，`execute` 的默认值是
    `@this`。


    代码清单 3-25 展示了 JSF 页面。


    ***代码清单 3-25.** 展示 JSF 页面*


    `<h:form>`

    `   <a4j:poll id="poll" interval="500" enabled="#{clockBean.enabled}"`

    `      render="clock" />`

    `   <h:panelGrid columns="2">`

    `      <h:panelGrid columns="2">`

    `         <a4j:commandButton value="启动时钟"`

    `            action="#{clockBean.startClock}"`

    `            render="poll" />`

    `         <a4j:commandButton value="停止时钟"`

    `            action="#{clockBean.stopClock}"`

    `            render="poll" />`

    `      </h:panelGrid>`

    `      <h:outputText id="clock" value="#{clockBean.now}" />`

    `   </h:panelGrid>`

    `</h:form>`


    它有几个重要的属性：`interval` 定义了向服务器发送请求的频率（以毫秒为单位），`enabled` 根据其设置为 `true` 或 `false`
    来决定组件是否发送请求。您需要能够在某些条件发生时停止或启动轮询。


    当页面首次加载时，`enabled` 被评估为 `false`，因此轮询被禁用。当点击“启动时钟”按钮时，`startClock` 方法会将 `enabled`
    设置为 `true`，从而启用轮询。`<a4j:poll>` 每 500 毫秒（半秒）轮询一次服务器，并更新显示时间的组件。当点击“停止时钟”按钮时，`enabled`
    被设置为 `false`，从而禁用轮询。


    每当您在运行时启用或禁用该组件时，都需要重新渲染该组件。这是必需的，以便读取 `enabled` 的新值，并在浏览器中更新 JavaScript 以启动或停止轮询。


    另请注意，我们将 `<a4j:poll>` 与按钮放在同一个表单内。将 `<a4j:poll>` 放在同一个表单内是可以的，因为默认情况下其 `execute`
    设置为 `@this`。即使表单内有其他输入组件，它们会被发送到服务器，但不会在服务器上被处理。您可以将 `<a4j:poll>` 放在其自己的表单中，以减少提交到服务器的数据量。我们的示例相当简单，尽管
    `<a4j:poll>` 可以放在同一个表单中，但此概念可应用于更大的应用程序。


    代码清单 3-26 展示了受管 bean。


    ***代码清单 3-26.** 受管 bean*


    `@ManagedBean`

    `@RequestScoped`

    `public class ClockBean {`


    `   private boolean enabled; // getter 和 setter`


    `   public java.util.Date getNow() {`

    `      return new java.util.Date();`

    `   }`

    `   public void stopClock() {`

    `      enabled = false;`

    `   }`

    `   public void startClock() {`

    `      enabled = true;`

    `   }`

    `}`


    以下 Ajax 属性可用于 `<a4j:poll>`：`onbegin`、`onbeforedomupdate`、`oncomplete`、`bypassUpdates`、`limitRender`、`data`
    和 `status`。


    ### 高级部分视图渲染选项


    在本节中，您将学习 RichFaces 中可用的高级渲染特性。我们将首先介绍自动渲染面板——其内容会在任何 Ajax 请求时自动渲染——然后向您展示如何将渲染范围限制为仅在当前
    `render` 属性中显示的组件。

