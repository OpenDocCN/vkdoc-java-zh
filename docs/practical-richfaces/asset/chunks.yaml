- fmt: "### Ajax Request from any Event or JavaScript Function Using `<a4j:jsFunction>`\n\
    \nSo far we covered two ways to fire an Ajax request: first using a `<a4j:ajax>`\
    \ behavior, and next using either `<a4j:commandButton>` or `<a4j:commandLink>`.\
    \ `<a4j:ajax>` (and `<f:ajax>` on which it's based) is a behavior and is always\
    \ attached based on some event to another UI component, such as a button, select,\
    \ and so forth. It's never used by itself. `<a4j:commandButton>` is a button with\
    \ built-in Ajax behavior and `<a4j:commandLink>` is a link with built-in Ajax\
    \ behavior. All provide a specific functionality. But let's say we would like\
    \ to fire an Ajax request from an HTML tag, not a JSF component. We can't use\
    \ `<a4j:ajax>`—it's a behavior and has to be attached to another JSF component.\
    \ This is where `<a4j:jsFunction>` is useful. It allows you to fire an Ajax request\
    \ from any JavaScript event or function.\n\nTo see how `<a4j:jsFunction>` works,\
    \ let's take an example we saw in the previous section, as shown in [Listing 3-9](#Chapter03.html#list_3_9).\n\
    \n**Listing 3-9.** Shows how `<a4j:jsFunction>` works\n\n```\n<h:form>\n   <h:panelGrid\
    \ columns=\"2\">\n      <h:outputText value=\"Name:\" />\n      <h:inputText value=\"\
    #{bean.name}\" />\n      <h:outputText value=\"Echo:\" />\n      <h:outputText\
    \ id=\"echo\" value=\"#{bean.name}\" />\n      <h:outputText value=\"Count:\"\
    \ />\n      <h:outputText id=\"count\" value=\"#{bean.count}\" />\n   </h:panelGrid>\n\
    \   <a4j:commandButton value=\"Submit\" render=\"echo, count\"\n      action=\"\
    #{bean.countAction}\" />\n</h:form>\n```\n\nInstead of using `<a4j:commandButton>`,\
    \ let's use `<a4j:jsFunction>` to fire an Ajax request, as shown in [Listing 3-10](#Chapter03.html#list_3_10).\n\
    \n**Listing 3-10.** Using `<a4j:jsFunction>` to fire an Ajax request\n\n```\n\
    <h:form>\n   <h:panelGrid columns=\"2\">\n      <h:outputText value=\"Name:\"\
    \ />\n      <h:inputText value=\"#{bean.name}\" />\n      <h:outputText value=\"\
    Echo:\" />\n      <h:outputText id=\"echo\" value=\"#{bean.name}\" />\n      <h:outputText\
    \ value=\"Count:\" />\n      <h:outputText id=\"count\" value=\"#{bean.count}\"\
    \ />\n   </h:panelGrid>\n   <input type=\"button\" value=\"Submit\" onclick=\"\
    sendAjaxRequest();\"/>\n\n   <a4j:jsFunction name=\"sendAjaxRequest\" execute=\"\
    @form\"\n      action=\"#{bean.countAction}\" render=\"echo, count\"/>\n</h:form>\n\
    ```\n\nThe `execute` attribute of `<a4j:function>` is set to `@this` according\
    \ to the JSF default value, so there we explicitly changed it to `@form` to have\
    \ all the inputs processed.\n\n[Listing 3-10](#Chapter03.html#list_3_10) shows\
    \ the changes we made. First, we replaced `<a4j:commandButton>` with a regular\
    \ HTML button; next, we defined `<a4j:jsFunction>`. Notice that the button also\
    \ has a `click` event that calls a `sendAjaxRequest()` JavaScript function. This\
    \ function is defined by `<a4j:jsFuction>` and it's just a standard JavaScript\
    \ function. If we look at the rendered code, the function we are calling looks\
    \ like [Listing 3-11](#Chapter03.html#list_3_11).\n\n**Listing 3-11.** This function\
    \ is defined by `<a4j:jsFuction>`\n\n```\n<script type=\"text/javascript\">\n\
    \   sendAjaxRequest=function(){RichFaces.ajax(\"j_idt5:j_idt11\",null, {\"incId\"\
    :\"1\"} )};\n</script>\n```\n\nWithout `<a4j:jsFunction>` we would have to type\
    \ something similar by hand. `<a4j:jsFunction>` looks just like any other control\
    \ that fires an Ajax request: there is an `execute` attribute, there is an `action`\
    \ attribute, and there is a `render` attribute. Everything we learned about these\
    \ attributes applies here as well. What you get is the ability to fire a standard\
    \ Ajax request from any HTML tag, based on any event that tag supports.\n\n![images](images/square.jpg)\
    \ **Tip** The `<a4j:jsFunction>` execute attribute default value is `@this`.\n\
    \nIn [Listing 3-11](#Chapter03.html#list_3_11) we called `sendAjaxRequest()` directly\
    \ from the `click` event. We can as easily invoke `sendAjaxRequest()` from another\
    \ JavaScript function, which would allow us to invoke any other logic before firing\
    \ the request, as shown in [Listing 3-12](#Chapter03.html#list_3_12) (changes\
    \ are in bold).\n\n**Listing 3-12.** Shows how to easily invoke `sendAjaxRequest()`\
    \ from another JavaScript function\n\n```\n<h:form>\n   <h:panelGrid columns=\"\
    2\">\n      <h:outputText value=\"Name:\" />\n      <h:inputText value=\"#{bean.name}\"\
    \ />\n      <h:outputText value=\"Echo:\" />\n      <h:outputText id=\"echo\"\
    \ value=\"#{bean.name}\" />\n      <h:outputText value=\"Count:\" />\n      <h:outputText\
    \ id=\"count\" value=\"#{bean.count}\" />\n   </h:panelGrid>\n   <input type=\"\
    button\" value=\"Submit\" onclick=\"doAjax();\"/>\n   <a4j:jsFunction name=\"\
    sendAjaxRequest\" execute=\"@form\"\n      action=\"#{bean.countAction}\"  render=\"\
    echo, count\"/>\n<script>\nfunction doAjax () {\n// do something here\nsendAjaxRequest();\n\
    }\n</script>\n</h:form>\n```\n\nThere is one more case where `<a4j:jsFunction>`\
    \ is very useful. You may call the function to get values from the server, serialize\
    \ them, and pass to the client using the `data` attribute. You can then use the\
    \ data received in some client-side function. An example is shown in [Listing\
    \ 3-13](#Chapter03.html#list_3_13), where the data received from the server is\
    \ shown in an alert window with an `oncomplete` event.\n\n**Listing 3-13.** The\
    \ data received from the server is shown in an alert window\n\n```\n<h:form>\n\
    \   <input type=\"button\" value=\"Update\" onclick=\"updateName('Joe');\"/>\n\
    \   <a4j:jsFunction name=\"updateName\" render=\"showname\"\n      data=\"#{jsFunctionNameBean.greeting}\"\
    \ oncomplete=\"alert(event.data)\">\n      <a4j:param name=\"param1\" assignTo=\"\
    #{jsFunctionNameBean.name}\"/>\n   </a4j:jsFunction>\n   <h:outputText id=\"showname\"\
    \ value=\"#{jsFunctionNameBean.greeting}\"/>\n</h:form>\n```\n\nThe managed bean\
    \ is shown in [Listing 3-14](#Chapter03.html#list_3_14).\n\n**Listing 3-14.**\
    \ The managed bean\n\n```\n@ManagedBean (name=\"jsFunctionNameBean\")\n@RequestScoped\n\
    public class JSFunctionNameBean {\n\n   private String name; // setter and getter\n\
    \n   public String getGreeting () {\n      return \"Hello \"+this.name;\n   }\n\
    }\n```\n\nIn this example, the value of `#{jsFunctionNameBean.greeting}` property\
    \ gets serialized after the name is set on the server-side, it is then passed\
    \ back to the client and displayed using JavaScript alert. In a real application\
    \ you may want to bring any additional data from the server and call some real\
    \ post-processing JavaScript handlers function. This is very useful if you need\
    \ to pass some inputs to the server, get a result back, and then process the result\
    \ with the `oncomplete` script.\n\nIn the next section we will see how to pass\
    \ parameters to the JavaScript function created with `<a4j:jsFunction>` and, in\
    \ turn, send them to the server. Then, we will see an alternative way to send\
    \ an Ajax request from any HTML event or JavaScript script using a standard JSF\
    \ programmatic Ajax approach."
  raw: '#### Ajax Request from any Event or JavaScript Function Using <a4j:jsFunction>


    So far we covered two ways to fire an Ajax request: first using a `<a4j:ajax>`
    behavior, and next using either `<a4j:commandButton>` or `<a4j:commandLink>`.
    `<a4j:ajax>` (and `<f:ajax>` on which it''s based) is a behavior and is always
    attached based on some event to another UI component, such as a button, select,
    and so forth. It''s never used by itself. `<a4j:commandButton>` is a button with
    built-in Ajax behavior and `<a4j:commandLink>` is a link with built-in Ajax behavior.
    All provide a specific functionality. But let''s say we would like to fire an
    Ajax request from an HTML tag, not a JSF component. We can''t use `<a4j:ajax>`—it''s
    a behavior and has to be attached to another JSF component. This is where `<a4j:jsFunction>`
    is useful. It allows you to fire an Ajax request from any JavaScript event or
    function.


    To see how `<a4j:jsFunction>` works, let''s take an example we saw in the previous
    section, as shown in [Listing 3-9](#Chapter03.html#list_3_9).


    ***Listing 3-9.** Shows how `<a4j:jsFunction>` works*


    `<h:form>`

    `   <h:panelGrid columns="2">`

    `      <h:outputText value="Name:" />`

    `      <h:inputText value="#{bean.name}" />`

    `      <h:outputText value="Echo:" />`

    `      <h:outputText id="echo" value="#{bean.name}" />`

    `      <h:outputText value="Count:" />`

    `      <h:outputText id="count" value="#{bean.count}" />`

    `   </h:panelGrid>`

    `   <a4j:commandButton value="Submit" render="echo, count"`

    `      action="#{bean.countAction}" />`

    `</h:form>`


    Instead of using `<a4j:commandButton>`, let''s use `<a4j:jsFunction>` to fire
    an Ajax request, as shown in [Listing 3-10](#Chapter03.html#list_3_10).


    ***Listing 3-10.** Using `<a4j:jsFunction>` to fire an Ajax request*


    `<h:form>`

    `   <h:panelGrid columns="2">`

    `      <h:outputText value="Name:" />`

    `      <h:inputText value="#{bean.name}" />`

    `      <h:outputText value="Echo:" />`

    `      <h:outputText id="echo" value="#{bean.name}" />`

    `      <h:outputText value="Count:" />`

    `      <h:outputText id="count" value="#{bean.count}" />`

    `   </h:panelGrid>`

    `   <input type="button" value="Submit" onclick="sendAjaxRequest();"/>`


    `   <a4j:jsFunction name="sendAjaxRequest" execute="@form"`

    `      action="#{bean.countAction}" render="echo, count"/>`

    `</h:form>`


    The `execute` attribute of `<a4j:function>` is set to `@this` according to the
    JSF default value, so there we explicitly changed it to `@form` to have all the
    inputs processed.


    [Listing 3-10](#Chapter03.html#list_3_10) shows the changes we made. First, we
    replaced `<a4j:commandButton>` with a regular HTML button; next, we defined `<a4j:jsFunction>`.
    Notice that the button also has a `click` event that calls a `sendAjaxRequest()`
    JavaScript function. This function is defined by `<a4j:jsFuction>` and it''s just
    a standard JavaScript function. If we look at the rendered code, the function
    we are calling looks like [Listing 3-11](#Chapter03.html#list_3_11).


    ***Listing 3-11.** This function is defined by `<a4j:jsFuction>`*


    `<script type="text/javascript">`

    `   sendAjaxRequest=function(){RichFaces.ajax("j_idt5:j_idt11",null, {"incId":"1"}
    )};`

    `</script>`


    Without `<a4j:jsFunction>` we would have to type something similar by hand. `<a4j:jsFunction>`
    looks just like any other control that fires an Ajax request: there is an `execute`
    attribute, there is an `action` attribute, and there is a `render` attribute.
    Everything we learned about these attributes applies here as well. What you get
    is the ability to fire a standard Ajax request from any HTML tag, based on any
    event that tag supports.


    ![images](images/square.jpg) **Tip** The `<a4j:jsFunction>` execute attribute
    default value is `@this`.


    In [Listing 3-11](#Chapter03.html#list_3_11) we called `sendAjaxRequest()` directly
    from the `click` event. We can as easily invoke `sendAjaxRequest()` from another
    JavaScript function, which would allow us to invoke any other logic before firing
    the request, as shown in [Listing 3-12](#Chapter03.html#list_3_12) (changes are
    in bold).


    ***Listing 3-12.** Shows how to easily invoke `sendAjaxRequest()` from another
    JavaScript function*


    `<h:form>`

    `   <h:panelGrid columns="2">`

    `      <h:outputText value="Name:" />`

    `      <h:inputText value="#{bean.name}" />`

    `      <h:outputText value="Echo:" />`

    `      <h:outputText id="echo" value="#{bean.name}" />`

    `      <h:outputText value="Count:" />`

    `      <h:outputText id="count" value="#{bean.count}" />`

    `   </h:panelGrid>`

    `   <input type="button" value="Submit" onclick="doAjax();"/>`

    `   <a4j:jsFunction name="sendAjaxRequest" execute="@form"`

    `      action="#{bean.countAction}"  render="echo, count"/>`

    **`<script>`**

    **`function doAjax () {`**

    **`// do something here`**

    **`sendAjaxRequest();`**

    **`}`**

    **`</script>`**

    `</h:form>`


    There is one more case where `<a4j:jsFunction>` is very useful. You may call the
    function to get values from the server, serialize them, and pass to the client
    using the `data` attribute. You can then use the data received in some client-side
    function. An example is shown in [Listing 3-13](#Chapter03.html#list_3_13), where
    the data received from the server is shown in an alert window with an `oncomplete`
    event.


    ***Listing 3-13.** The data received from the server is shown in an alert window*


    `<h:form>`

    `   <input type="button" value="Update" onclick="updateName(''Joe'');"/>`

    `   <a4j:jsFunction name="updateName" render="showname"`

    `      data="#{jsFunctionNameBean.greeting}" oncomplete="alert(event.data)">`

    `      <a4j:param name="param1" assignTo="#{jsFunctionNameBean.name}"/>`

    `   </a4j:jsFunction>`

    `   <h:outputText id="showname" value="#{jsFunctionNameBean.greeting}"/>`

    `</h:form>`


    The managed bean is shown in [Listing 3-14](#Chapter03.html#list_3_14).


    ***Listing 3-14.** The managed bean*


    `@ManagedBean (name="jsFunctionNameBean")`

    `@RequestScoped`

    `public class JSFunctionNameBean {`


    `   private String name; // setter and getter`


    `   public String getGreeting () {`

    `      return "Hello "+this.name;`

    `   }`

    `}`


    In this example, the value of `#{jsFunctionNameBean.greeting}` property gets serialized
    after the name is set on the server-side, it is then passed back to the client
    and displayed using JavaScript alert. In a real application you may want to bring
    any additional data from the server and call some real post-processing JavaScript
    handlers function. This is very useful if you need to pass some inputs to the
    server, get a result back, and then process the result with the `oncomplete` script.


    In the next section we will see how to pass parameters to the JavaScript function
    created with `<a4j:jsFunction>` and, in turn, send them to the server. Then, we
    will see an alternative way to send an Ajax request from any HTML event or JavaScript
    script using a standard JSF programmatic Ajax approach.'
  trans: '

    #### 使用 `<a4j:jsFunction>` 从任意事件或 JavaScript 函数发起 Ajax 请求


    到目前为止，我们介绍了两种发起 Ajax 请求的方式：第一种是使用 `<a4j:ajax>` 行为，第二种是使用 `<a4j:commandButton>`
    或 `<a4j:commandLink>`。`<a4j:ajax>`（以及它所基于的 `<f:ajax>`）是一种行为，它总是基于某个事件附加到另一个 UI
    组件上，例如按钮、选择框等。它本身从不单独使用。`<a4j:commandButton>` 是一个内置 Ajax 行为的按钮，而 `<a4j:commandLink>`
    是一个内置 Ajax 行为的链接。它们都提供了特定的功能。但是，假设我们想从一个 HTML 标签（而非 JSF 组件）发起 Ajax 请求。我们不能使用 `<a4j:ajax>`——它是一种行为，必须附加到另一个
    JSF 组件上。这时，`<a4j:jsFunction>` 就派上用场了。它允许你从任何 JavaScript 事件或函数发起 Ajax 请求。


    为了了解 `<a4j:jsFunction>` 的工作原理，让我们看一个上一节中的例子，如清单 3-9 所示。


    ***清单 3-9.** 展示 `<a4j:jsFunction>` 的工作原理*


    `<h:form>`

    `   <h:panelGrid columns="2">`

    `      <h:outputText value="姓名：" />`

    `      <h:inputText value="#{bean.name}" />`

    `      <h:outputText value="回显：" />`

    `      <h:outputText id="echo" value="#{bean.name}" />`

    `      <h:outputText value="计数：" />`

    `      <h:outputText id="count" value="#{bean.count}" />`

    `   </h:panelGrid>`

    `   <a4j:commandButton value="提交" render="echo, count"`

    `      action="#{bean.countAction}" />`

    `</h:form>`


    现在，我们不使用 `<a4j:commandButton>`，而是使用 `<a4j:jsFunction>` 来发起 Ajax 请求，如清单 3-10 所示。


    ***清单 3-10.** 使用 `<a4j:jsFunction>` 发起 Ajax 请求*


    `<h:form>`

    `   <h:panelGrid columns="2">`

    `      <h:outputText value="姓名：" />`

    `      <h:inputText value="#{bean.name}" />`

    `      <h:outputText value="回显：" />`

    `      <h:outputText id="echo" value="#{bean.name}" />`

    `      <h:outputText value="计数：" />`

    `      <h:outputText id="count" value="#{bean.count}" />`

    `   </h:panelGrid>`

    `   <input type="button" value="提交" onclick="sendAjaxRequest();"/>`


    `   <a4j:jsFunction name="sendAjaxRequest" execute="@form"`

    `      action="#{bean.countAction}" render="echo, count"/>`

    `</h:form>`


    根据 JSF 的默认值，`<a4j:function>` 的 `execute` 属性被设置为 `@this`，因此我们在这里显式地将其改为 `@form`，以便处理所有输入。


    清单 3-10 展示了我们所做的更改。首先，我们将 `<a4j:commandButton>` 替换为一个普通的 HTML 按钮；接着，我们定义了 `<a4j:jsFunction>`。请注意，该按钮还有一个
    `click` 事件，它调用了一个名为 `sendAjaxRequest()` 的 JavaScript 函数。这个函数由 `<a4j:jsFuction>`
    定义，它只是一个标准的 JavaScript 函数。如果我们查看渲染后的代码，我们调用的函数看起来像清单 3-11 所示。


    ***清单 3-11.** 此函数由 `<a4j:jsFuction>` 定义*


    `<script type="text/javascript">`

    `   sendAjaxRequest=function(){RichFaces.ajax("j_idt5:j_idt11",null, {"incId":"1"}
    )};`

    `</script>`


    如果没有 `<a4j:jsFunction>`，我们就需要手动编写类似的代码。`<a4j:jsFunction>` 看起来就像其他任何发起 Ajax 请求的控件一样：它有
    `execute` 属性、`action` 属性和 `render` 属性。我们学到的关于这些属性的所有知识在这里同样适用。你得到的能力是：可以从任何 HTML
    标签，基于该标签支持的任何事件，发起一个标准的 Ajax 请求。


    ![images](img/square.jpg) **提示** `<a4j:jsFunction>` 的 `execute` 属性默认值为 `@this`。


    在清单 3-11 中，我们直接从 `click` 事件调用了 `sendAjaxRequest()`。我们也可以轻松地从另一个 JavaScript 函数中调用
    `sendAjaxRequest()`，这允许我们在发起请求之前调用任何其他逻辑，如清单 3-12 所示（更改部分以粗体显示）。


    ***清单 3-12.** 展示如何轻松地从另一个 JavaScript 函数调用 `sendAjaxRequest()`*


    `<h:form>`

    `   <h:panelGrid columns="2">`

    `      <h:outputText value="姓名：" />`

    `      <h:inputText value="#{bean.name}" />`

    `      <h:outputText value="回显：" />`

    `      <h:outputText id="echo" value="#{bean.name}" />`

    `      <h:outputText value="计数：" />`

    `      <h:outputText id="count" value="#{bean.count}" />`

    `   </h:panelGrid>`

    `   <input type="button" value="提交" onclick="doAjax();"/>`

    `   <a4j:jsFunction name="sendAjaxRequest" execute="@form"`

    `      action="#{bean.countAction}"  render="echo, count"/>`

    **`<script>`**

    **`function doAjax () {`**

    **`// 在此处执行某些操作`**

    **`sendAjaxRequest();`**

    **`}`**

    **`</script>`**

    `</h:form>`


    还有一种情况，`<a4j:jsFunction>` 非常有用。你可以调用该函数从服务器获取值，将其序列化，并使用 `data` 属性传递给客户端。然后，你可以在某个客户端函数中使用接收到的数据。示例如清单
    3-13 所示，其中从服务器接收到的数据通过 `oncomplete` 事件在警告窗口中显示。


    ***清单 3-13.** 从服务器接收到的数据显示在警告窗口中*


    `<h:form>`

    `   <input type="button" value="更新" onclick="updateName(''Joe'');"/>`

    `   <a4j:jsFunction name="updateName" render="showname"`

    `      data="#{jsFunctionNameBean.greeting}" oncomplete="alert(event.data)">`

    `      <a4j:param name="param1" assignTo="#{jsFunctionNameBean.name}"/>`

    `   </a4j:jsFunction>`

    `   <h:outputText id="showname" value="#{jsFunctionNameBean.greeting}"/>`

    `</h:form>`


    受管 Bean 如清单 3-14 所示。


    ***清单 3-14.** 受管 Bean*


    `@ManagedBean (name="jsFunctionNameBean")`

    `@RequestScoped`

    `public class JSFunctionNameBean {`


    `   private String name; // setter 和 getter`


    `   public String getGreeting () {`

    `      return "你好 "+this.name;`

    `   }`

    `}`


    在这个例子中，`#{jsFunctionNameBean.greeting}` 属性的值在服务器端设置名称后被序列化，然后传回客户端，并使用 JavaScript
    的 `alert` 显示。在实际应用中，你可能希望从服务器获取任何附加数据，并调用一些真正的后处理 JavaScript 处理函数。如果你需要向服务器传递一些输入，获取结果，然后使用
    `oncomplete` 脚本处理结果，这将非常有用。


    在下一节中，我们将看到如何向由 `<a4j:jsFunction>` 创建的 JavaScript 函数传递参数，进而将它们发送到服务器。然后，我们将看到另一种使用标准
    JSF 编程式 Ajax 方法从任何 HTML 事件或 JavaScript 脚本发送 Ajax 请求的方式。

    '
- fmt: "### Passing Parameters with `<a4j:param>`\n\nLet's look at another example\
    \ where an Ajax request is not fired directly from a JSF component, but from an\
    \ HTML tag when a mouse is placed over the name of a drink, as shown in [Figure\
    \ 3-1](#Chapter03.html#fig_3_1).\n\n![images](images/0301.jpg)\n\n**Figure 3-1.**\
    \ Using `<a4j:jsFunction>` with `<a4j:param>`\n\n[Listing 3-15](#Chapter03.html#list_3_15)\
    \ shows the JSF code.\n\n**Listing 3-15.** The JSF code\n\n```\n<table border=\"\
    1\">\n   <tr>\n      <td onmouseover=\"setdrink('Espresso')\"\n         onmouseout=\"\
    setdrink('')\">Espresso</td>\n      <td onmouseover=\"setdrink('Cappuccino')\"\
    \n         onmouseout=\"setdrink('')\">Cappuccino</td>\n      <td onmouseover=\"\
    setdrink('Tea')\"\n         onmouseout=\"setdrink('')\">Tea</td>\n   </tr>\n</table>\n\
    <h:outputText id=\"drink\" value=\"I like #{jsFunctionDrinkBean.drink}\" />\n\n\
    <h:form>\n   <a4j:jsFunction name=\"setdrink\" execute=\"@form\" render=\"drink\"\
    >\n      <a4j:param name=\"param1\" assignTo=\"#{jsFunctionDrinkBean.drink}\"\
    \ />\n   </a4j:jsFunction>\n</h:form>\n```\n\nThe managed bean code is shown in\
    \ [Listing 3-16](#Chapter03.html#list_3_16).\n\n**Listing 3-16.** The managed\
    \ bean code\n\n```\n@ManagedBean (name=\"jsFunctionDrinkBean\")\n@RequestScoped\n\
    public class JSFunctionDrinkBean {\n\n   private String drink;\n   // setter and\
    \ getter\n}\n```\n\nWe no longer fire a request from a JSF component; the Ajax\
    \ request is fired from HTML tag when we place the mouse over the table row (`onmouseover`\
    \ event) and is also fired when we move the mouse out (`onmouseout` event). When\
    \ one of these events occurs, a call to `setdrink(..)` is made. `setdrink` is\
    \ a JavaScript function defined by `<a4j:jsFuction>`, which in turn fired the\
    \ Ajax request and could also do partial page rendering.\n\nYou will notice one\
    \ difference from the previous example; our JavaScript function defined by `<a4j:jsFunction>`\
    \ takes a parameter, either the name of the drink or an empty string. We somehow\
    \ have to pass it to the bean, set it to the `drink` attribute, and then render\
    \ it. This is done via the `<a4j:param>` tag. Parameters will be passed in the\
    \ same order as defined inside the `<a4j:jsFunction>` tag.\n\nThe `<a4j:param>`\
    \ is very similar to the standard `<f:param>`, but with one major and very helpful\
    \ difference. When using `<f:param>`, the value is added to the request and then\
    \ has to be retrieved from the request with this link of code. [Listing 3-17](#Chapter03.html#list_3_17)\
