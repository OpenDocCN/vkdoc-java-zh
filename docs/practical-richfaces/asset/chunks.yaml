    增加了一个非常重要的功能。除了将从服务器端表达式评估的参数传递给客户端函数之外，当 `noEscape` 属性设置为 `true` 时，`<a4j:param>`
    的值也可以作为客户端 JavaScript 表达式进行评估。我们将在下一节中展示一个示例。    ##### 使用 <rich:hashParam> 传递
    JavaScript 哈希    在前面的部分中，我们看到了如何传递基于字符串的参数。然而，也可以向函数传递一个 JavaScript 哈希。RichFaces
    现在附带了一个名为 `<rich:hashParam>` 的新组件，它允许您向 JavaScript 函数传递一个 JavaScript 哈希或哈希表。哈希表与哈希映射非常相似；它由键和关联值组成。    让我们看看清单
    12-9 中的示例，它显示了打开一个弹出面板并通过 `<rich:hashParam>` 标签传递诸如宽度、高度和定位等信息。    ***清单 12-9.**
    打开一个弹出面板并通过 `<rich:hashParam>` 标签传递信息*  `<h:outputLink value="#">` `   <h:outputText
    value="打开" />` `   <rich:componentControl event="click" target="popup" operation="show">`
    `      <a4j:param noEscape="true" value="event" />` `      <rich:hashParam>` `         <a4j:param
    name="width" value="500" />` `         <a4j:param name="height" value="300" />`
    `         <a4j:param name="minWidth" value="300" />` `         <a4j:param name="minHeight"
    value="150" />` `         <a4j:param noEscape="true" name="left"` `            value="(jQuery(window).width()/2)-250"
    />` `         <a4j:param noEscape="true" name="top"` `            value="(jQuery(window).height()/2)-150"
    />` `      </rich:hashParam>` `   </rich:componentControl>` `</h:outputLink>`  `<rich:popupPanel
    header="RichFaces" id="popup">` `   <h:panelGrid>` `      <h:outputText value="这是一个
    RichFaces 弹出窗口" />` `      <h:outputLink value="#">` `         <h:outputText value="关闭"
    />` `         <rich:componentControl event="click" target="popup"` `            operation="hide"/>`
    `      </h:outputLink>` `   </h:panelGrid>` `</rich:popupPanel>`  从清单 12-9 中，传递给弹出窗口的所有参数都使用
    `<rich:hashParam>` 标签插入到 JavaScript 哈希表中。实际参数使用 `<a4j:param>` 标签定义，但您也可以使用标准的
    `<f:param>` 来处理除 top、left 和 event 参数之外的所有参数。对于 top 和 left，该值不是基于字符串的值，而是一个根据当前浏览器窗口大小计算定位的
    jQuery 函数。在这些情况下需要设置 `noEscape="true"`；否则，参数将被视为服务器端表达式，并且 jQuery 函数将不会被调用。    ![images](img/square.jpg)
    **注意** 在撰写本书时，只有 `<rich:popupPanel>` 组件接受 JavaScript 哈希表作为其 API 的参数。我们预计未来会有更多组件支持
    JavaScript 哈希表参数。    ![images](img/square.jpg) **注意** 您可能想知道为什么我们传递 `<a4j:param
    noEscape="true" value="event">` 作为第一个参数。这是必需的，因为 show 方法具有以下签名：`show(event, options)`。您可以在没有参数的情况下调用
    `show()`，但如果您确实提供了参数，则必须同时指定两者。    ### 其他 RichFaces 客户端函数    除了广泛使用的 `#{rich:component()}`
