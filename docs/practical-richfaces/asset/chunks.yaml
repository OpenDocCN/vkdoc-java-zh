    #### JSF 是一项标准


    JSF 是 Java 6（及 5）企业版（Java EE）平台的一部分。这意味着众多公司和个体共同协作，就框架的工作方式达成了一致。关于标准是好是坏的争论超出了本书的范畴，但至少该框架并非由单一实体设计而成。


    #### JSF 有两个主要版本


    目前存在两个 JSF 版本：1.2 版是 Java EE 5 平台的一部分，而 JSF 2 是 Java EE 6 平台的一部分。


    #### JSF 有两个主要实现


    由于 JSF 是一个规范，目前有两个主要实现。第一个是 Mojarra，来自 Oracle 的参考实现。另一个是来自 Apache 的 MyFaces。要了解更多关于
    JSF 的信息，JavaServerFaces.org（[`www.javaserverfaces.org`](http://www.javaserverfaces.org)）是一个很好的去处。


    #### JSF 具有极强的可扩展性


    可扩展性特性很可能是使 JSF 成为构建 Web 应用程序流行工具的最主要原因。从一开始，JSF 就被设计为可扩展的。通过标准，JSF 允许你使用新功能和更高级的功能来扩展框架。你获得了新功能，但却是以标准且被认可的方式进行的。其中一个受益最大的领域是丰富的
    UI 组件生态系统，其中包括 RichFaces。这个生态系统并不仅限于 UI 组件——自定义转换器、验证器、视图处理器以及其他扩展也被创建出来。


    ### 最重要的 JSF 特性


    JSF 提供了长长的特性列表。然而，由于这不是一本专门的 JSF 书籍，我们将简要介绍三个最重要的特性：用户界面组件、事件以及 JSF 2 中新增的 Ajax
    功能。如果你觉得需要复习 JSF 技能，我们推荐以下两本书：David Geary 和 Cay Horstmann 合著的 *Core JavaServer
    Faces, Third Edition*（Prentice Hall, 2010）以及 Ed Burns 和 Chris Schalk 合著的 *JavaServer
    Faces 2.0, The Complete Reference*（McGraw-Hill, 2009）。


    ![images](img/square.jpg) **提示** 开始学习 JSF 的两个绝佳去处是 [`http://javaserverfaces.org`](http://javaserverfaces.org)
    和 [`http://jsfcentral.com`](http://jsfcentral.com)。


    #### 用户界面组件


    UI 组件是 JSF 框架的主要特性。JSF 自带约 30 个即开即用的用户界面组件。通常被称为标准组件，它们提供了用于输入、输出、命令（按钮和链接）、标签和布局的基本用户界面小部件，以及用于显示表格数据的简单控件。许多实用组件，如加载样式、脚本和
    HTML 页面部分（head、body）也同样可用。


    所有 JSF Web 应用程序都是由组件构建而成的。JSF UI 组件是一个服务器端的 Java 对象，能够处理输入、触发动作和渲染内容。组件层次结构是 JSF
    处理的核心。而标签则用于构建该组件树。一个 JSF 组件可以简单如一个输入字段，也可以复杂如一个带标签的面板或树形控件。例如，以下标签代表一个输入组件：


    `<h:inputText value="#{order.amount}"/>`


    这是一个绑定（连接）到某个 Java 对象的输入组件。你会将此标签放在 JSF 页面上，而不是直接编写 HTML 代码。该标签背后的组件知道如何生成所有必要且正确的
    HTML、CSS 和 JavaScript。标签代表服务器端的 UI 组件，并用于构建如图 1-4 所示的 JSF 组件树。


    ##### 组件渲染


    JSF 框架将组件与其呈现方式（编码）以及输入处理方式（解码）分离开来。组件的表现形式可以轻松地根据可用的显示设备类型（例如，手机）进行变化。在本书中，你将只使用
    JSF 开箱即用的 HTML 渲染工具包。


    以下列表展示了渲染器提供的一些功能：


    *   渲染可以由组件本身完成，或委托给一个特殊的渲染器类。

    *   除了 HTML 之外，还可以渲染诸如 WML 和 XML 之类的标记语言。

    *   标准 JSF 组件附带一个 HTML 4.0.1 渲染工具包。


    图 1-4 展示了这一切是如何结合在一起的。


    ![images](img/0104.jpg)


    ***图 1-4.** 标签代表服务器端组件。服务器端组件在 JSF 请求结束时渲染标记（HTML）。*


    让我们逐一解读图中的编号部分。


    1.  这是一个由 JSF 标签组成的 JSF 页面。当 JSF 处理该页面时，这些标签会创建图中第二部分所示的 JSF UI 组件（Java 类）。

    2.  这是 JSF UI 组件树，代表了 JSF 页面上定义的组件。组件树会经历一个复杂的生命周期，期间会发生各种事情，例如转换和验证。最后，JSF 会要求每个组件渲染器渲染标记。

    3.  左侧面板是生成的 HTML 代码，右侧面板显示用户在浏览器中看到的内容。这只是标准的 HTML 4.0.1 版本。


    如你所见，通常你不会直接处理 HTML 标记。你只需使用那些能渲染所有必要标记的组件即可。


    关于渲染其他标记语言的说明。在 JSF 早期，组件可以根据客户端设备渲染不同标记的想法很有趣。那时，可用的移动设备通常使用 XML 或 WML 等标记语言。如今情况大不相同。大多数现代移动设备，如智能手机和平板电脑，都配备了支持所有最新
    HTML、JavaScript 和 CSS 功能的强大浏览器。在某些情况下，移动设备上的浏览器甚至比 PC 上的更好。这意味着生成 HTML 以外的标记已不再那么重要，或者随着支持
    HTML 的手机和其他设备的普及而逐渐淡出。


    这并不意味着渲染器不再扮演重要角色。尽管 HTML 现在在各种设备上都得到支持，但渲染器在生成何种标记（HTML）方面仍然发挥作用。随着移动设备的爆炸式增长，我们现在必须为大量不同的屏幕尺寸开发应用程序。无论是
    3.5 英寸屏幕的手机、7 英寸屏幕的平板电脑，还是大屏幕笔记本电脑，能容纳的“内容”（或显示区域）都是有限的。这正是渲染器可以发挥作用的地方。基于设备、屏幕尺寸甚至屏幕分辨率，渲染器可以提供不同的标记。

