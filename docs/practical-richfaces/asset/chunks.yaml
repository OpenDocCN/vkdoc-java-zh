    `      </rich:panel>` `      <rich:panel header="Shopping Cart">` **`<rich:dropTarget
    render="panel" acceptedTypes="products"`** **`dropListener="#{shoppingCartBean.processDrop}"
    />`** `         <h:panelGrid>` `            <h:outputText value="#{shoppingCartBean.productsCountString}"`
