    \ environment so that you can try all the examples. As JSF 2 now has Ajax functionality\
    \ built-in, we will cover that first and then move on to RichFaces and start showing\
    \ you how RichFaces extends that functionality.\n\n### Setting Up\n\nRichFaces\
    \ can be used in any container that is JSF 2 compatible. This means all servers\
    \ compliant with the Java EE 6 specification (JBoss AS6/7, Glassfish 3) and all\
    \ major servlet containers (Tomcat, Jetty, and Resin).\n\n#### Adding RichFaces\
    \ to an Existing JSF 2 Project\n\nNot to tie you to any specific IDE (integrated\
    \ development environment), but we will use Apache Maven to set up a project.\
    \ Since RichFaces is built on top of JSF 2, its installation is as easy as adding\
    \ a few JARs to your project. Configure your repositories following the Maven\
    \ Getting Started Guide located on the JBoss Community web site at [`http://community.jboss.org/wiki/MavenGettingStarted-Users`](http://community.jboss.org/wiki/MavenGettingStarted-Users).\
    \ Then, simply add [Listing 2-1](#Chapter02.html#list_2_1) to your projects `pom.xml`.\
    \ Complete Maven guide can be found at: [`http://www.sonatype.com/books/mvnref-book/reference`](http://www.sonatype.com/books/mvnref-book/reference).\n\
    \n***Listing 2-1.** Add this to your projects `pom.xml`*\n\n```\n<dependencyManagement>\n\
    \  <dependencies>\n    <dependency>\n      <groupId>org.richfaces</groupId>\n\
    \      <artifactId>richfaces-bom</artifactId>\n      <version>${richfaces.version}</version>\n\
    \      <scope>import</scope>\n      <type>pom</type>\n    </dependency>\n  </dependencies>\n\
    </dependencyManagement>\n…\n<dependency>\n  <groupId>org.richfaces.ui</groupId>\n\
    \  <artifactId>richfaces-components-ui</artifactId>\n</dependency>\n<dependency>\n\
    \  <groupId>org.richfaces.core</groupId>\n  <artifactId>richfaces-core-impl</artifactId>\n\
    </dependency>\n```\n\nFor other build systems, such as Ant, just add the following\
    \ JARs to your projects `WEB-INF/lib` directory:\n\n*   `richfaces-core-api-<ver>.jar`\n\
    *   `richfaces-core-impl-<ver>.jar`\n*   `richfaces-components-api-<ver>.jar`\n\
    *   `richfaces-components-ui-<ver>.jar`\n*   `sac-1.3.jar`\n*   `cssparser-0.9.5.jar`\n\
    *   `google-guava-r08.jar`\n\n![images](images/square.jpg) **Note** Version of\
    \ `sac-x.x.jar` and `cssparster-x.x.x.jar` are the most current as of writing\
    \ of this book. Please check the JBoss Community RichFaces web site at [`www.jboss.org/richfaces`](http://www.jboss.org/richfaces)\
    \ for the latest versions.\n\n##### Optional Dependencies\n\nThere are a number\
    \ of optional JAR files (dependencies) you may want to add to a RichFaces project\
    \ depending on your deployment or features you want to use. The optional JAR files\
    \ are for client-side validation when using Apache Tomcat, caching, and using\
    \ Component Development Kit annotations.\n\n###### Validation Dependencies\n\n\
    If you are deploying to Apache Tomcat and will be using client-side validation,\
    \ then the following JARs are also needed:\n\n*   `validation-api.jar`\n*   `hibernate-validator.jar`\n\
    *   `slf4j-api.jar`\n*   `slf4j-jdk14.jar`\n\n[Listing 2-2](#Chapter02.html#list_2_2)\
    \ shows the Maven dependency that should be used.\n\n***Listing 2-2.** The Maven\
    \ dependency that should be used*\n\n```\n<dependency>\n   <groupId>org.hibernate</groupId>\n\
    \   <artifactId>hibernate-validator</artifactId>\n   <version>4.1.0.Final</version>\n\
    </dependency>\n```\n\n![images](images/square.jpg) **Note** `validation-api` will\
    \ be brought in transitively with `hibernate-validator`.\n\nIf deploying to a\
    \ Java EE 6 server, then these libraries are not needed with the application because\
    \ they are included in the server. It's still a good idea to include the dependency,\
    \ but change the `scope` to `provided` in order to use during the application\
    \ build.\n\n###### Caching Dependencies\n\nFor optimal performance it's recommended\
    \ to add one of the following caching frameworks to the application classpath:\
    \ Ehcache, JBoss Cache, or OSCache. When you create a new RichFaces project with\
    \ the RichFaces Maven archetype, Ehcache dependency is present in the `pom.xml`\
