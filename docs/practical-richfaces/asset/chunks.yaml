    The custom skin parameters will not be used in RichFaces components, but you will
    be able to apply them to some standard or third-party components. The way of applying
    skin parameters to any components on the view is described next. Skin parameters
    in the skin file could be defined with EL values.    #### Changing the Skin Parameter    You
    are probably asking, how do I know which skin parameter to change? In other words,
