    **Note**  In general, you should use one of the standard control skinning approaches
    in your application. Either skin all the standard components and HTML tags automatically
    (setting `org.richfaces.enableControlSkinning` to true) or apply the special `CSS
    class rfs-ctn` (setting `org.richfaces.enableControlSkinningClasses` to true)
    on containers to skin standard components and HTML tags within that container
    only.  ![images](images/1309.jpg)  ***Figure 13-9.** Skinning standard JSF components*    Standard
    Controls skinning applies not only to components but also to standard HTML controls
    (as simple CSS selectors for HTML elements used under the hood). The code in [Listing
    13-24](#Chapter13.html#list_13_24) is an example.    ***Listing 13-24.** Standard
    Controls skinning*  `<h:panelGrid columns="1" styleClass=" rfs-ctn">` `   <h:outputText
    value="Favorite city: " />` `   <h:inputText value="#{geography.city}" />` `   <h:commandButton
    action="next" value="Submit" />` `   <input type="button" value="HTML Button"/>`
    `</h:panelGrid>`  It will display [Figure 13-10](#Chapter13.html#fig_13_10).  ![images](images/1310.jpg)  ***Figure
    13-10.** Applying the skins feature to standard HTML tags*    More specific CSS
    classes representing various skin parameters are also available. To learn what’s
    available, look inside the *`richfaces-core-impl-4.0.x.jar`* file in /*`META-INF/resources/skinning-classes.ecss`*.
    This file will also show you the mapping between specially defined CSS class parameters
    and skin parameters. [Listing 13-25](#Chapter13.html#list_13_25) is an example
    entry.    ***Listing 13-25.** Example entry*  `.rfs-txt-general{` `   font-size:
    ''#{richSkin.generalSizeFont}'';` `   font-family: ''#{richSkin.generalFamilyFont}'';`
    `   color: ''#{richSkin.generalTextColor}'';`  `}`  A specially defined .*`rfs-txt-general`*
    CSS class will be combined from the skin properties *`generalSizeFont`*, *`generalFamilyFont`*,
    and *`generalTextColor`*. In turn, these skin properties correspond to the *`font-size`*,
    *`font-family`*, and *`color`* CSS properties, respectively. [Listing 13-26](#Chapter13.html#list_13_26)
    is an example using *`.rfs-txt-general`* and another .*`rfs-btn`* (similar to
