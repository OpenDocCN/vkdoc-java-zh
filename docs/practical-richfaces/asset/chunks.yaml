    ### Using <rich:autocomplete>


    `<rich:autocomplete>` is an input component that provides suggestions during user
    input. For those who worked with RichFaces 3, this component is redesigned and
    combines the functionality of `<rich:suggestionBox>` and `rich:comboBox` components.
    Even though `<rich:autocomplete>` provides a rich input feature, under the hood
    it''s just the basic input component.


    The new `<rich:autocomplete>` component can be configured to work in the following
    four modes:


    *   *Ajax*. Every *`keyup`* triggers an Ajax request that updates the suggestions
    list and shows new results to the user.

    *   *Cached Ajax*. In this mode, the component requests data when the minimum
    number of characters is entered, but doesn''t make additional requests if the
    prefix does not change. Further list filtering is performed completely on the
    client side until the prefix changes.

    *   *Client*. All the data is rendered to the client when the component is rendered.
    From then on, only client filtering is used for suggestions. No Ajax requests
    are fired to the server.

    *   *Lazy Client*. Similar to client mode, a complete list is fetched only after
    the component is activated and the minimum number of characters is entered. No
    additional Ajax requests are performed after that, even if the initial prefix
    changes. Client filtering is performed on further typing, as the component expects
    all the data loaded during a single Ajax request.


    Let''s review two completely new modes: cached Ajax and lazy client. These two
    work similarly but without additional optimization of requests count. Although
    we mentioned optimization, these two modes could be still useful in some cases.
    For example, where the list is really small and additional Ajax requests for data
    are unexpected, only the client mode should be used. Or if the suggestions fetching
    algorithm is complex and depends on every letter in user input, Ajax mode should
    be used.


    [Listing 5-8](#Chapter05.html#list_5_8) shows an example of *`<rich:autocompete>`*
    using the lazy client mode.


