    RichFaces 中最重要的组件之一：树。尽管也被认为是最难使用的组件之一（在任何框架中），但 RichFaces 提供了许多功能，使得使用树变得相当简单，同时又灵活且强大。    RichFaces
    允许您基于现有的 Swing 模型构建和显示树结构，但也允许您构建自定义模型。我们还向您展示了如何展开和折叠节点，以及在选择节点时调用服务器端侦听器。最后，我们介绍了如何使用强大的
    RichFaces 树适配器获取列表结构并将其呈现在树结构中。    ## 第 10 章    ## 丰富的拖放组件    能够在浏览器内拖放项目很酷，并且正在成为一个重要的功能。RichFaces
    提供了一组功能，使您能够拖放几乎任何 JSF 组件。可用的拖放组件提供了您所需的一切，因此您无需处理任何 JavaScript。尽管拖放发生在客户端，但 RichFaces
    允许将拖放事件绑定到服务器端侦听器。另一件要记住的事情是，拖放组件实际上只是功能组件（类似于 JSF 中的核心标签库），因此它们在 UI 方面提供的功能不多，只提供拖放其他组件的功能。    ###
    使用 <rich:dragSource> 和 <rich:dropZone>    使用 RichFaces 在 JSF 页面中启用拖放只需使用两个标签：`<rich:dragSource>`
    和 `<rich:dropTarget>`。`<rich:dragSource>` 嵌套在您想要拖动的组件内部，`<rich:dropTarget>` 嵌套在应该成为放置区域的组件内部。让我们首先介绍一些基本属性，然后运行一个示例。    正如我们提到的，这些拖放组件作为子组件添加到任何组件中，并将编码所有必要的
    JavaScript，使源可拖动，目标成为放置区域。清单 10-1 显示了一个使图像组件可拖动的示例。    ***清单 10-1.** 使图像组件可拖动的示例*  `<h:graphicImage
    value="/images/nikon-dx3100.png"` **`id="dragImage">`** **`   <rich:dragSource/>`**
    `</h:graphicImage>`  图像被渲染，但现在也可以拖动。像处理任何桌面项目一样用鼠标拖动它。结果如图 10-1 所示。  ![images](img/1001.jpg)  ***图
    10-1.** 拖动的图像*    ![images](img/square.jpg) **注意** JSF 中两个不向客户端编码 id 的组件示例是 `<h:outputText>`
    和 `<h:graphicImage>`，除非您显式指定 id。如果您向此类组件添加拖放功能并且没有 id，则拖放将不起作用。向组件添加拖放功能要求客户端
    id 存在。因此，一个好的做法是始终为组件指定 id。    到目前为止，释放元素后什么也没有发生。拖动的图像只是从屏幕上消失；但这是预期的行为。RichFaces
    拖放组件不提供 DOM 树内元素的客户端重新排序或任何类型的绝对位置更改。要处理组件的放置，我们需要定义一个放置区域。一旦组件被放入此区域，我们可以发送一个
    Ajax 请求来处理放置事件。基本上，`<rich:dropTarget>` 提供了一种为放置操作附加客户端侦听器的方法，该侦听器将发送一个标准的 Ajax
    请求。让我们将 `<rich:dropTarget>` 添加到页面。请记住，两个标签都在父组件上注册侦听器，因此我们将使用 `<rich:panel>` 作为放置区域。清单
    10-2 显示了代码。    ***清单 10-2.** 将 `<rich:dropTarget>` 添加到页面*  `<h:form>` `   <a4j:status
    startText="处理放置事件"/>` `   <rich:panel id="dropZone" header="拖放到此处">` `      <rich:dropTarget/>`
    `   </rich:panel>` `</h:form>`  结果如图 10-2 所示。  ![images](img/1002.jpg)  ***图 10-2.**
    作为放置区域的 <rich:panel>*    如您所见，我们还添加了 `<a4j:status>` 来显示 Ajax 请求状态。但是，在我们拖动图像并将其放入面板后，我们仍然没有看到状态组件激活。所以请求没有被发送。我们仍然缺少一件东西来使其工作。    您可以将拖动组件附加到任何组件，也可以将放置组件附加到任何组件。需要声明哪些拖动源对应于哪些放置区域。换句话说，您需要定义类型
    A 的项目，例如，只能放入一个特定的放置区域，而不能放入其他区域。    为了使其工作，我们需要在 `<rich:dragSource>` 组件上定义一个
    `type` 属性。它应该是任何字符串标识符，用于将其附加到放置目标。然后，我们应该为 `<rich:dropTarget>` 定义一个 `acceptedTypes`
    属性。它应该设置为所有接受的拖动源。您可以使用逗号或空格分隔字符串值，或者将属性绑定到保存 `Set` 或 `List` 类型的 Bean 属性。    清单
