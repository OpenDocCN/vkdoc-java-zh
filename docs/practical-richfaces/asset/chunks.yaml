    ajax，只有默认的 facet 会被预渲染。工具提示内容将在请求工具提示时通过 Ajax 加载。


    ![images](img/square.jpg) **注意** 最好的解决方案是将工具提示定义在表格外部，并仅显示特定单元格的信息（理想情况下无需任何额外请求）。但在当前版本的
    RichFaces 中，这并不简单。目前尚未实现客户端模板功能。没有该功能，您将需要在显示之前使用自定义 JavaScript 更新工具提示内容，或者通过
    `ajax` 进行更新。


    #### JavaScript API


    *`<rich:tooltip>`* 组件提供了表 6-7 中描述的 JavaScript API 方法。


