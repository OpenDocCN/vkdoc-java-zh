    to be generated in that UI class. Each of the annotations has a set of attributes.
    We will review the most important attributes in Tables 14-2 and 14-3\. [Table
    14-2](#Chapter14.html#tab_14_2) shows the `@JsfComponent` properties.    ***Table
    14-2.** @JsfComponent Properties*     | **Property** | **Description** | | ---
    | --- | | type | Specifies component type for the generated component. | | family
    | Specifies component family for the generated component. | | generate | Name
    of the UI class to be generated. By default is `UI<Abstract class name>` (without
    “abstract” prefix). | | facets | Defines component facets. It’s an array of `@Facet`
    annotations. The `Facet#generate()` attribute tells the CDK to generate a getter
    and setter for the facet. | | fires | Array of `@Event` annotations that defines
    JSF events (and custom ones which inherited from `FacesEvent`) fired by component.
    For each event, CDK generates `add/remove/get<Event>Listener` methods, creates
