    7-34 所示。  ![images](img/0734.jpg)  ***图 7-34.** 页面更改后具有动态列并由自定义模型支持的 <rich:dataTable>*    您可以通过调试或向模型添加一些日志记录代码轻松检查，数据库调用仅通过以下方式执行：    1.  在初始渲染时执行两次，以缓存所有对象计数并获取前
    10 条记录。 2.  页面更改时执行一次，加载接下来的 10 条记录。在复杂情况下，不应以这种简单方式缓存行数，因为表大小可能会改变；但对于具有静态表的简单情况，它是有效的。    事实证明，`walk()`
    方法在每个请求中被调用多次；次数与组件需要根据 JSF 规范（解码、渲染）迭代值的次数一样多。并且 `rowCount` 也会被 `<rich:dataTable>`
    和 `<rich:dataScoller>` 组件调用多次。因此，如前所述，如果表格直接指向数据库结果集，而不是像我们创建的那样使用模型，您将在初始渲染或单个请求中看到大量的数据库调用。这种实现的性能将非常低。    #####
