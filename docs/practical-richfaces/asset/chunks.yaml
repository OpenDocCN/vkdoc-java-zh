- fmt: "### `bypassUpdates` Attribute\n\nValidation is obviously a very common task\
    \ in any Web application. When only validating form inputs, it's usually not necessary\
    \ to go through all the JSF life cycle phases, in particular Update Model and\
    \ Invoke Application phases. In this section you will learn how to skip these\
    \ two phases when validating form fields to optimize the JSF request. Let's start\
    \ with a very simple example that looks like [Figure 2-2](#Chapter02.html#fig_2_2).\n\
    \n![images](images/0202.jpg)\n\n***Figure 2-2.** A simple registration form.*\n\
    \n[Figure 2-3](#Chapter02.html#fig_2_3) shows how it looks when an error has occurred.\n\
    \n![images](images/0203.jpg)\n\n***Figure 2-3.** A simple registration with an\
    \ error message*\n\n[Listing 2-35](#Chapter02.html#list_2_35) shows the `register.xhtml`\
    \ page.\n\n***Listing 2-35.** Shows the `register.xhtml` page*\n\n```\n<h:form>\n\
    \   <h:panelGrid columns=\"3\">\n      <h:outputText value=\"Name:\" />\n    \
    \  <h:inputText id=\"name\" value=\"#{bean2.name}\">\n         <f:validateRequired/>\n\
    \         <f:validateLength minimum=\"3\"/>\n         <a4j:ajax event=\"blur\"\
    \ render=\"errorName\"/>\n      </h:inputText>\n      <h:message id=\"errorName\"\
    \ for=\"name\"/>\n\n      <h:outputText value=\"Age:\" />\n      <h:inputText\
    \ id=\"age\" value=\"#{bean2.age}\">\n         <f:validateRequired/>\n       \
    \  <f:validateLongRange minimum=\"0\"/>\n         <a4j:ajax event=\"blur\" render=\"\
    errorAge\"/>\n      </h:inputText>\n      <h:message id=\"errorAge\" for=\"age\"\
    />\n   </h:panelGrid>\n   <h:commandButton value=\"Register\" action=\"result\"\
    />\n</h:form>\n```\n\n[Listing 2-36](#Chapter02.html#list_2_36) shows the `result.xhtml`\
    \ page.\n\n***Listing 2-36.** Shows the `result.xhtml` page*\n\n```\n<h:panelGrid>\n\
    \      <h:outputText value=\"#{bean2.name}, #{bean2.age}\" />\n</h:panelGrid>\n\
    ```\n\n[Listing 2-37](#Chapter02.html#list_2_37) shows the managed bean.\n\n***Listing\
    \ 2-37.** Shows the managed bean*\n\n```\n@ManagedBean\n@RequestScoped\npublic\
    \ class Bean2 {\n   private String name;\n   private Integer age;\n\n   // getters\
    \ and setters\n}\n```\n\nThis is a very simple registration form with Ajax-based\
    \ validation. In other words, when we blur the field (tab out or click outside),\
    \ an Ajax request is fired. We start going through JSF phases. If there is a validation\
    \ error, after Process Validations, we go to Render Response. If there is no validation\
    \ error, then we finish all the phases, going through Update Model and Invoke\
    \ Application. To see this in action, let's create a phase listener that will\
    \ print a message to the console as we pass each phase.\n\nIn case you need to\
    \ review the JSF phases, they are shown in [Figure 2-4](#Chapter02.html#fig_2_4).\n\
    \n![images](images/0204.jpg)\n\n***Figure 2-4.** JSF life cycle diagram*\n\nJSF\
    \ fires what are called phase events before and after each phase. We can write\
    \ a listener to listen to these events and output a message to the log. The phase\
    \ listener can be used for anything else, such as injecting a custom functionality\
    \ between phases.\n\nThe phase listener is shown in [Listing 2-38](#Chapter02.html#list_2_38).\n\
    \n***Listing 2-38.** The phase listener*\n\n```\nimport javax.faces.event.PhaseEvent;\n\
    import javax.faces.event.PhaseId;\nimport javax.faces.event.PhaseListener;\n\n\
    public class PhaseTracker implements PhaseListener {\n\n   public void afterPhase(PhaseEvent\
    \ event) {\n      event.getFacesContext().getExternalContext().log(\"AFTER\"\n\
    \         +event.getPhaseId());\n   }\n   public void beforePhase(PhaseEvent event)\
    \ {\n      event.getFacesContext().getExternalContext().log(\"BEFORE  \"\n   \
    \      +event.getPhaseId());\n   }\n   public PhaseId getPhaseId() {\n      return\
    \ PhaseId.ANY_PHASE;\n   }\n}\n```\n\nThe methods `beforePhase` and `afterPhase`\
    \ are very simple. All we do is print a message to the log. `getPhaseId()` returns\
    \ the phase id for which to call this particular listener. We would like the listener\
    \ to be invoked for each phase, so we return `PhaseId.ANY_PHASE`. It's possible\
    \ to return a particular phase such as `PhaseId.INVOKE_APPLICATION` or it's also\
    \ possible to return two or more phases.\n\nThe final step is to register this\
    \ phase listener in a JSF configuration file (`faces-config.xml`), as shown in\
    \ [Listing 2-39](#Chapter02.html#list_2_39).\n\n***Listing 2-39.** Register the\
    \ phase listener in a JSF configuration file*\n\n```\n<lifecycle>\n  <phase-listener>org.richfaces..book.PhaseTracker</phase-listener>\n\
    </lifecycle>\n```\n\nThere is no annotation yet for phase listeners in JSF 2.\n\
    \nWhen you load the page, place the mouse cursor inside the name field, but then\
    \ click somewhere else. You should see the console shown in [Listing 2-40](#Chapter02.html#list_2_40).\n\
    \n***Listing 2-40.** Displayed console*\n\n```\nINFO: BEFORE RESTORE_VIEW 1\n\
    Feb 8, 2011 2:39:49 PM org.apache.catalina.core.ApplicationContext log\nINFO:\
    \ AFTER RESTORE_VIEW 1\nFeb 8, 2011 2:39:49 PM org.apache.catalina.core.ApplicationContext\
    \ log\nINFO: BEFORE APPLY_REQUEST_VALUES 2\nFeb 8, 2011 2:39:49 PM org.apache.catalina.core.ApplicationContext\
    \ log\nINFO: AFTER APPLY_REQUEST_VALUES 2\nFeb 8, 2011 2:39:49 PM org.apache.catalina.core.ApplicationContext\
    \ log\nINFO: BEFORE PROCESS_VALIDATIONS 3\nFeb 8, 2011 2:39:49 PM org.apache.catalina.core.ApplicationContext\
    \ log\nINFO: AFTER PROCESS_VALIDATIONS 3\nFeb 8, 2011 2:39:49 PM org.apache.catalina.core.ApplicationContext\
    \ log\nINFO: BEFORE RENDER_RESPONSE 6\nFeb 8, 2011 2:39:49 PM org.apache.catalina.core.ApplicationContext\
    \ log\nINFO: AFTER RENDER_RESPONSE 6\n```\n\nWe arrived at Phase 3, validation\
    \ failed and we jumped to Phase 6. So far it all makes sense. Now enter a valid\
    \ value either for name or age. You should now see the console shown in [Listing\
    \ 2-41](#Chapter02.html#list_2_41).\n\n***Listing 2-41.** After entering a valid\
    \ value, you will see the following console*\n\n```\nINFO: BEFORE RESTORE_VIEW\
    \ 1\nFeb 8, 2011 2:41:23 PM org.apache.catalina.core.ApplicationContext log\n\
    INFO: AFTER RESTORE_VIEW 1\nFeb 8, 2011 2:41:23 PM org.apache.catalina.core.ApplicationContext\
    \ log\nINFO: BEFORE APPLY_REQUEST_VALUES 2\nFeb 8, 2011 2:41:23 PM org.apache.catalina.core.ApplicationContext\
    \ log\nINFO: AFTER APPLY_REQUEST_VALUES 2\nFeb 8, 2011 2:41:23 PM org.apache.catalina.core.ApplicationContext\
    \ log\nINFO: BEFORE PROCESS_VALIDATIONS 3\nFeb 8, 2011 2:41:23 PM org.apache.catalina.core.ApplicationContext\
    \ log\nINFO: AFTER PROCESS_VALIDATIONS 3\nFeb 8, 2011 2:41:23 PM org.apache.catalina.core.ApplicationContext\
    \ log\nINFO: BEFORE UPDATE_MODEL_VALUES 4\nFeb 8, 2011 2:41:23 PM org.apache.catalina.core.ApplicationContext\
    \ log\nINFO: AFTER UPDATE_MODEL_VALUES 4\nFeb 8, 2011 2:41:23 PM org.apache.catalina.core.ApplicationContext\
    \ log\nINFO: BEFORE INVOKE_APPLICATION 5\nFeb 8, 2011 2:41:23 PM org.apache.catalina.core.ApplicationContext\
    \ log\nINFO: AFTER INVOKE_APPLICATION 5\nFeb 8, 2011 2:41:23 PM org.apache.catalina.core.ApplicationContext\
    \ log\nINFO: BEFORE RENDER_RESPONSE 6\nFeb 8, 2011 2:41:23 PM org.apache.catalina.core.ApplicationContext\
    \ log\nINFO: AFTER RENDER_RESPONSE 6\n```\n\nAs validation didn't fail, we competed\
    \ all the phases. The next question is: do we need to go through all the phases\
    \ when we are only validating? Probably not. When only validating, it's enough\
    \ to reach Phase 3 (Process Validations), and even if the input is correct we\
    \ can jump to the Render Response phase. Why invoke the Update Model and Invoke\
    \ Application phases when we actually don't need to? Let's make our request quicker."
