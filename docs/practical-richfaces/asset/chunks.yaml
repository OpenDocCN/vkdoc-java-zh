    RichFaces makes it easier to use a button or link with Ajax support by providing
    button and link components with built-in Ajax: `<a4j:commandButton>` and `<a4j:commandLink>`.
    [Listing 3-6](#Chapter03.html#list_3_6) shows an example we saw earlier.


    ***Listing 3-6.** Example*


