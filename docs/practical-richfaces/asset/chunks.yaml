    7-32.** No results to display after filtering*    #### Iteration Components Advanced
    Models    If you previously worked with JSF tables, you know that you can pass
    not only a simple `List` to the `<rich:dataTable>` value, but also point the table
    to the data model that is an object of a class that extends the `javax.faces.model.DataModel<E>`
    abstract class.    RichFaces adds the following two data models:    *   `org.ajax4jsf.model.ExtendedDataModel<E>`:
    A base model abstract class. It defines the abstract model contract, which helps
    to manage complex data structures like trees, spreadsheets, and so on, in complex
    iteration components. *   `org.richfaces.model.ArrangeableModel`: A model implementation
    that extends `ExtendedDataModel` and implements the `org.richfaces.model.Arrangeable`
    interface. This model adds filtering and sorting operations.    Let’s go over
    why we need these special data models.    The `ExtendedDataModel` adds the `rowKey`
    entity to a JSF model and uses `rowKey` instead (in some cases together with)
    of `rowIndex`. This key is an abstract property that allows us to identify the
    object among a wrapped collection. This key can be your database entity id for
    example. Using keys instead of just indexes guarantees that we will easily and
    correctly get the object from the wrapped model, in the case of a paginated model,
    with built-in component selection enabled. Using `javax.faces.model.DataModel`,
    which uses indexes, we will need to design and implement additional “model index”
    or “database object” lookup functionality. When using `ExtendedDataModel`, all
    the necessary methods and default implementation are already provided.    `ExtendedDataModel`
    has `org.ajax4jsf.model.SequenceDataModel<E>` simple implementation used as the
    default model for the iteration components (when sorting and filtering features
    are not activated). It extends with `org.richfaces.model.TreeSequenceKeyModel<V>`,
    which is also an abstract class with implementations used in tree components.    Finally,
    `ArrangeableModel` extends the `ExtendedDataModel`, providing default implementation
    for abstract classes and implementing the `Arrangeable` interface. It uses the
    same methods from the extended model and with an additional `arrange()` method
    used to set sorting and filtering rules to the model from the component level.    Let’s
    review both models by creating two examples.    ##### Data Preparation    In order
    to get close to a real-world application, we will add a database layer to our
    application and use Hibernate to work with the data.    We will use HSQLDB (version
    1.8.0.2 ) for the database in our example, and Hibernate Core (version 3.6.2).    The
    next step is to add the Hibernate configuration file (hibernate.cfg.xml) to the
    application resources. Its content is shown in [Listing 7-45](#Chapter07.html#list_7_45).    ***Listing
    7-45.** Adding the Hibernate configuration file to application resources*  `<?xml
