    `</rich:toolbar>`  The result is shown in [Figure 8-11](#Chapter08.html#fig_8_11).  ![images](images/0811.jpg)  ***Figure
    8-11.** Menu items with icons*    #### Using <rich:menuGroup> and <rich:menuSeparator>    There
    are two more components available for rich menu creation: `<rich:menuGroup>` and
    `<rich:menuSeparator>`.    `<rich:menuGroup>` allows you to define a sub-menu
    and `<rich:separator>` allows you to add a horizontal line separator between two
    items. Note that menu groups could be nested as needed. Using these components,
    you will be able to create menus of any depth and complexity. Let’s look at the
    example in [Figure 8-12](#Chapter08.html#fig_8_12).  ![images](images/0812.jpg)  ***Figure
    8-12.** Complex menu with nested sub-menus and items separators*    The code for
