- fmt: "## Rich Input and Select Components\n\nData input is one of the main functions\
    \ of any web application. RichFaces provides various, easy-to-use rich components\
    \ for entering input such as `<rich:inplaceSelect>`, `<rich:autocomplete>`, `<rich_calendar>`,\
    \ and many more. As with all rich components, rich input components come with\
    \ a skins feature, a rich JavaScript client API, and facets to make it easier\
    \ for you to redefine component markup. All the rich input components and their\
    \ powerful and flexible features will make it easy for you to create applications\
    \ using RichFaces.\n\n![images](images/square.jpg) **Note** Although some components\
    \ provide out-of-the-box Ajax functionality, others, such as `<rich:toolbar>`,\
    \ don't provide any Ajax functionality. Components like that just provide rich\
    \ UI. All components in the `rich:` tag library can also be skinned. *Skins*,\
    \ covered in more detail in [Chapter 12](#Chapter12.html#ch12), let you change\
    \ the look and feel of the application easily and on the fly. We just wanted to\
    \ mention this in case you were wondering why a component such as `<rich:toolbar>`\
    \ is rich.\n\n![images](images/square.jpg) **Note** When you run examples in other\
    \ chapters and notice that your colors are different, don't be concerned. We are\
    \ simply using a different skin for many of the screen shots in this book. This\
    \ chapter uses the `blueSky` skin. Jump forward to [Chapter 12](#Chapter12.html#ch12)\
    \ to discover the types of skins available. Pick any one you want, and set it\
    \ in the `web.xml` file per the instructions in that chapter. Also keep in mind\
    \ that if you have the printed book, then the screen shots will be black and white.\
    \ If you have the eBook, then you will have color screen shots.\n\n### Getting\
    \ Started\n\nAll the rich input components described in this chapter extend standard\
    \ JSF inputs and selects with specific rich capabilities, customization, and features.\
    \ This means that the `UIInput` (base class for input components) core functionality\
    \ is available for every component. For example, as with standard JSF input components,\
    \ all rich input-based components support the following features:\n\n*   Binding\
    \ to the model using the `value` attribute\n*   Attaching converters and validators\n\
    *   Ability to disable the input\n*   Customization of tab order for inputs on\
    \ the page\n\nAll the inputs have a number of new features unified across most\
    \ of the components, which will be shown throughout the chapter and include the\
    \ following:\n\n*   *Default label support*. When the initial value is not specified,\
    \ an optional label can be used to provide instructions to the user; for example,\
    \ “Click to edit.”\n*   *Many controls can be activated and used via keyboard*.\
    \ It is also possible to disable or enable keyboard support.\n\n![images](images/square.jpg)\
    \ **Note** Most features described in this chapter are applicable to most input\
    \ components, except one: the `<rich:fileUpload>` component. Although still an\
    \ input, it is based on different foundation classes than other input components.\
    \ We cover the `<rich:fileUpload>` component at the end of this chapter.\n\n###\
    \ Using `<rich:inplaceInput>`\n\n`<rich:inplaceInput>` is a rich extension to\
    \ the standard input component; an example is shown in [Figure 5-1](#Chapter05.html#fig_5_1).\n\
    \n![images](images/0501.jpg)\n\n***Figure 5-1.** `<rich:inplaceInput>` component*\n\
    \nIt's possible to click the label to have the component switch to an input field.\
    \ Once the input is entered, the component switches back to label state. So, let's\
    \ start with the simplest case, shown in [Listing 5-1](#Chapter05.html#list_5_1).\n\
    \n***Listing 5-1.** The simplest case.*\n\n```\n<h:form>\n   <h:panelGrid columns=\"\
    1\">\n      <rich:inplaceInput value=\"#{inplaceInputBean.name}\"\n         defaultLabel=\"\
    Click to edit name\"/>\n      <rich:inplaceInput value=\"#{inplaceInputBean.email}\"\
    \n         defaultLabel=\"Click to edit email\"/>\n   </h:panelGrid>\n</h:form>\n\
    ```\n\nThe managed bean is shown in [Listing 5-2](#Chapter05.html#list_5_2).\n\
    \n***Listing 5-2.** The managed bean*\n\n```\n@ManagedBean\n@RequestScoped\npublic\
    \ class InplaceInputBean {\n\n    private String email;\n    private String name;\n\
    \n    // Setter and getter methods\n}\n```\n\nThis is really not much different\
    \ from using the standard input component. One extra attribute that we are using\
    \ here is `defaultLabel`, which sets the label that you can click to start editing\
    \ the value. [Figure 5-2](#Chapter05.html#fig_5_2) shows what this code produces.\n\
    \n![images](images/0502.jpg)\n\n***Figure 5-2.** `<rich:inplaceInput>` with default\
    \ labels*\n\nIf the value to which the component is bound has an initial value,\
    \ then that value will be displayed instead of the label.\n\nOnce the value has\
    \ been changed, the change in value is indicated by a small red triangle in the\
    \ top-left corner, as shown in [Figure 5-3](#Chapter05.html#fig_5_3).\n\n![images](images/0503.jpg)\n\
    \n***Figure 5-3.** `<rich:inplaceInput>` with the value changed*\n\nTo start editing,\
    \ you click the label. When done editing, you click anywhere outside the component\
    \ to save the input. This is important: keep in mind that nothing is sent to the\
    \ server. In other words, no Ajax request is fired to the server. The value has\
    \ changed only in the browser. This means it's a rich client-side component. You\
    \ would click a button or a link to submit the page. Alternatively, it's possible\
    \ to use `<a4j:ajax>` on component JavaScript events to send an Ajax request to\
    \ the server (the events are shown later).\n\nThere is also an option to add controls\
    \ to save or cancel the changes, as shown in [Figure 5-4](#Chapter05.html#fig_5_4).\
    \ To enable controls, set `showControls=\"true\"`.\n\n![images](images/0504.jpg)\n\
    \n***Figure 5-4.** `<rich:inplaceInput>` with controls to save or cancel the input*\n\
    \nThe component provides many event handlers attributes. One of the most common\
    \ is the standard `onchange` event attribute, which is normally used to add some\
    \ processing when the value is changed. You can use it to send an Ajax request\
    \ to validate the new input. In [Listing 5-3](#Chapter05.html#list_5_3), we attached\
    \ Ajax behavior to be fired on `change` event. Every edit and saving of the value\
    \ causes the output to be updated with the entered string value.\n\n***Listing\
    \ 5-3.** Attaching Ajax behavior to be fired on change event*\n\n```\n<h:form>\n\
    \   <h:panelGrid columns=\"1\">\n      <rich:inplaceInput value=\"#{inplaceInputBean.name}\"\
    \n         defaultLabel=\"Double click to edit name\" editEvent=\"dblclick\">\n\
    \         <a4j:ajax event=\"change\" render=\"out\" />\n      </rich:inplaceInput>\n\
    \      <h:outputText value=\"#{inplaceInputBean.name}\" id=\"out\"/>\n   </h:panelGrid>\n\
    </h:form>\n```\n\nEntering a new value into the component, and either blurring\
    \ (tabbing out or clicking outside the component) or pressing the Enter key, causes\
    \ an Ajax request with a new value to be sent to the server, updating the output\
    \ component. Note that the `editEvent` attribute allows you to customize the event,\
    \ which will cause the component to be switched to editable state. In our example,\
    \ `dblclick` used."
  raw: '## Rich Input and Select Components


    Data input is one of the main functions of any web application. RichFaces provides
    various, easy-to-use rich components for entering input such as `<rich:inplaceSelect>`,
    `<rich:autocomplete>`, `<rich_calendar>`, and many more. As with all rich components,
    rich input components come with a skins feature, a rich JavaScript client API,
    and facets to make it easier for you to redefine component markup. All the rich
    input components and their powerful and flexible features will make it easy for
    you to create applications using RichFaces.


    ![images](images/square.jpg) **Note** Although some components provide out-of-the-box
    Ajax functionality, others, such as `<rich:toolbar>`, don''t provide any Ajax
    functionality. Components like that just provide rich UI. All components in the
    `rich:` tag library can also be skinned. *Skins*, covered in more detail in [Chapter
    12](#Chapter12.html#ch12), let you change the look and feel of the application
    easily and on the fly. We just wanted to mention this in case you were wondering
    why a component such as `<rich:toolbar>` is rich.


    ![images](images/square.jpg) **Note** When you run examples in other chapters
    and notice that your colors are different, don''t be concerned. We are simply
    using a different skin for many of the screen shots in this book. This chapter
    uses the `blueSky` skin. Jump forward to [Chapter 12](#Chapter12.html#ch12) to
    discover the types of skins available. Pick any one you want, and set it in the
    `web.xml` file per the instructions in that chapter. Also keep in mind that if
    you have the printed book, then the screen shots will be black and white. If you
    have the eBook, then you will have color screen shots.


    ### Getting Started


    All the rich input components described in this chapter extend standard JSF inputs
    and selects with specific rich capabilities, customization, and features. This
    means that the `UIInput` (base class for input components) core functionality
    is available for every component. For example, as with standard JSF input components,
    all rich input-based components support the following features:


    *   Binding to the model using the value attribute

    *   Attaching converters and validators

    *   Ability to disable the input

    *   Customization of tab order for inputs on the page


    All the inputs have a number of new features unified across most of the components,
    which will be shown throughout the chapter and include the following:


    *   *Default label support*. When the initial value is not specified, an optional
    label can be used to provide instructions to the user; for example, “Click to
    edit.”

    *   *Many controls can be activated and used via keyboard*. It is also possible
    to disable or enable keyboard support.


    ![images](images/square.jpg) **Note** Most features described in this chapter
    are applicable to most input components, except one: the `<rich:fileUpload>` component.
    Although still an input, it is based on different foundation classes than other
    input components. We cover the `<rich:fileUpload>` component at the end of this
    chapter.


    ### Using <rich:inplaceInput>


    `<rich:inplaceInput>` is a rich extension to the standard input component; an
    example is shown in [Figure 5-1](#Chapter05.html#fig_5_1).


    ![images](images/0501.jpg)


    ***Figure 5-1.** <rich:inplaceInput> component*


    It''s possible to click the label to have the component switch to an input field.
    Once the input is entered, the component switches back to label state. So, let''s
    start with the simplest case, shown in [Listing 5-1](#Chapter05.html#list_5_1).


    ***Listing 5-1.** The simplest case.*


    `<h:form>`

    `   <h:panelGrid columns="1">`

    `      <rich:inplaceInput value="#{inplaceInputBean.name}"`

    `         defaultLabel="Click to edit name"/>`

    `      <rich:inplaceInput value="#{inplaceInputBean.email}"`

    `         defaultLabel="Click to edit email"/>`

    `   </h:panelGrid>`

    `</h:form>`


    The managed bean is shown in [Listing 5-2](#Chapter05.html#list_5_2).


    ***Listing 5-2.** The managed bean*


    `@ManagedBean`

    `@RequestScoped`

    `public class InplaceInputBean {`


    `    private String email;`

    `    private String name;`


    `    // Setter and getter methods`

    `}`


    This is really not much different from using the standard input component. One
    extra attribute that we are using here is `defaultLabel`, which sets the label
    that you can click to start editing the value. [Figure 5-2](#Chapter05.html#fig_5_2)
    shows what this code produces.


    ![images](images/0502.jpg)


    ***Figure 5-2.** <rich:inplaceInput> with default labels*


    If the value to which the component is bound has an initial value, then that value
    will be displayed instead of the label.


    Once the value has been changed, the change in value is indicated by a small red
    triangle in the top-left corner, as shown in [Figure 5-3](#Chapter05.html#fig_5_3).


    ![images](images/0503.jpg)


    ***Figure 5-3.** <rich:inplaceInput> with the value changed*


    To start editing, you click the label. When done editing, you click anywhere outside
    the component to save the input. This is important: keep in mind that nothing
    is sent to the server. In other words, no Ajax request is fired to the server.
    The value has changed only in the browser. This means it''s a rich client-side
    component. You would click a button or a link to submit the page. Alternatively,
    it''s possible to use `<a4j:ajax>` on component JavaScript events to send an Ajax
    request to the server (the events are shown later).


    There is also an option to add controls to save or cancel the changes, as shown
    in [Figure 5-4](#Chapter05.html#fig_5_4). To enable controls, set `showControls="true"`.


    ![images](images/0504.jpg)


    ***Figure 5-4.** <rich:inplaceInput> with controls to save or cancel the input*


    The component provides many event handlers attributes. One of the most common
    is the standard *`onchange`* event attribute, which is normally used to add some
    processing when the value is changed. You can use it to send an Ajax request to
    validate the new input. In [Listing 5-3](#Chapter05.html#list_5_3), we attached
    Ajax behavior to be fired on `change` event. Every edit and saving of the value
    causes the output to be updated with the entered string value.


    ***Listing 5-3.** Attaching Ajax behavior to be fired on change event*


    `<h:form>`

    `   <h:panelGrid columns="1">`

    `      <rich:inplaceInput value="#{inplaceInputBean.name}"`

    `         defaultLabel="Double click to edit name" editEvent="dblclick">`

    ***`<a4j:ajax event="change" render="out" />`***

    `      </rich:inplaceInput>`

    `      <h:outputText value="#{inplaceInputBean.name}" id="out"/>`

    `   </h:panelGrid>`

    `</h:form>`


    Entering a new value into the component, and either blurring (tabbing out or clicking
    outside the component) or pressing the Enter key, causes an Ajax request with
    a new value to be sent to the server, updating the output component. Note that
    the `editEvent` attribute allows you to customize the event, which will cause
    the component to be switched to editable state. In our example, `dblclick` used.'
  trans: '

    ## 富输入与选择组件


    数据输入是任何 Web 应用的主要功能之一。RichFaces 提供了多种易于使用的富组件用于输入，例如 `<rich:inplaceSelect>`、`<rich:autocomplete>`、`<rich_calendar>`
    等。与所有富组件一样，富输入组件具备皮肤功能、丰富的 JavaScript 客户端 API 以及便于重新定义组件标记的面板（facets）。所有富输入组件及其强大灵活的特性，将使您能够轻松地使用
    RichFaces 创建应用程序。


    ![images](img/square.jpg) **注意** 尽管某些组件提供了开箱即用的 Ajax 功能，但其他组件（如 `<rich:toolbar>`）并不提供任何
    Ajax 功能。这类组件仅提供丰富的用户界面。`rich:` 标签库中的所有组件也都可以应用皮肤。*皮肤* 功能（详见第 12 章）让您可以轻松且即时地更改应用程序的外观。我们在此提及这一点，以防您对
    `<rich:toolbar>` 这样的组件为何被称为“富”组件感到疑惑。


    ![images](img/square.jpg) **注意** 当您在其他章节运行示例并注意到颜色不同时，无需担心。本书中的许多截图只是使用了不同的皮肤。本章使用的是
    `blueSky` 皮肤。请跳转到第 12 章了解可用的皮肤类型。选择您喜欢的任意一种，并按照该章的说明在 `web.xml` 文件中进行设置。另请注意，如果您拥有的是印刷版书籍，截图将是黑白的；如果您拥有的是电子书，则可以看到彩色截图。


    ### 入门指南


    本章描述的所有富输入组件都扩展了标准的 JSF 输入和选择组件，并增加了特定的富功能、定制选项和特性。这意味着每个组件都具备 `UIInput`（输入组件的基类）的核心功能。例如，与标准
    JSF 输入组件一样，所有基于富输入的组件都支持以下特性：


    *   使用 `value` 属性绑定到模型

    *   附加转换器和验证器

    *   能够禁用输入

    *   自定义页面上输入组件的 Tab 键顺序


    所有输入组件都拥有许多跨大多数组件统一的新特性，这些特性将在本章中展示，包括以下内容：


    *   *默认标签支持*。当未指定初始值时，可以使用可选标签向用户提供提示；例如，“点击编辑”。

    *   *许多控件可以通过键盘激活和使用*。也可以启用或禁用键盘支持。


    ![images](img/square.jpg) **注意** 本章描述的大多数特性适用于大多数输入组件，但有一个例外：`<rich:fileUpload>`
    组件。虽然它也是一个输入组件，但它基于与其他输入组件不同的基础类。我们将在本章末尾介绍 `<rich:fileUpload>` 组件。


    ### 使用 <rich:inplaceInput>


    `<rich:inplaceInput>` 是标准输入组件的富扩展；示例如图 5-1 所示。


    ![images](img/0501.jpg)


    ***图 5-1.** <rich:inplaceInput> 组件*


    您可以点击标签，使组件切换为输入字段。输入完成后，组件会切换回标签状态。那么，让我们从最简单的案例开始，如清单 5-1 所示。


    ***清单 5-1.** 最简单的案例*


    `<h:form>`

    `   <h:panelGrid columns="1">`

    `      <rich:inplaceInput value="#{inplaceInputBean.name}"`

    `         defaultLabel="点击编辑姓名"/>`

    `      <rich:inplaceInput value="#{inplaceInputBean.email}"`

    `         defaultLabel="点击编辑邮箱"/>`

    `   </h:panelGrid>`

    `</h:form>`


    托管 Bean 如清单 5-2 所示。


    ***清单 5-2.** 托管 Bean*


    `@ManagedBean`

    `@RequestScoped`

    `public class InplaceInputBean {`


    `    private String email;`

    `    private String name;`


    `    // Setter 和 Getter 方法`

    `}`


    这与使用标准输入组件确实没有太大区别。我们在这里使用的一个额外属性是 `defaultLabel`，它设置了您可以点击以开始编辑值的标签。图 5-2 显示了这段代码产生的效果。


    ![images](img/0502.jpg)


    ***图 5-2.** 带有默认标签的 <rich:inplaceInput>*


    如果组件绑定的值有初始值，则会显示该值而不是标签。


    一旦值被更改，左上角会出现一个红色小三角形来指示值的变更，如图 5-3 所示。


    ![images](img/0503.jpg)


    ***图 5-3.** 值已更改的 <rich:inplaceInput>*


    要开始编辑，请点击标签。编辑完成后，点击组件外部的任意位置即可保存输入。这一点很重要：请记住，没有任何内容发送到服务器。换句话说，没有向服务器发起 Ajax
    请求。值仅在浏览器中发生了更改。这意味着它是一个富客户端组件。您需要点击按钮或链接来提交页面。或者，也可以在组件的 JavaScript 事件上使用 `<a4j:ajax>`
    向服务器发送 Ajax 请求（事件将在后面展示）。


    还有一个选项可以添加控件来保存或取消更改，如图 5-4 所示。要启用控件，请设置 `showControls="true"`。


    ![images](img/0504.jpg)


    ***图 5-4.** 带有保存或取消输入控件的 <rich:inplaceInput>*


    该组件提供了许多事件处理程序属性。最常见的是标准的 *`onchange`* 事件属性，通常用于在值更改时添加一些处理逻辑。您可以使用它来发送 Ajax 请求以验证新的输入。在清单
    5-3 中，我们附加了在 `change` 事件上触发的 Ajax 行为。每次编辑和保存值都会导致输出组件更新为输入的字符串值。


    ***清单 5-3.** 附加在 change 事件上触发的 Ajax 行为*


    `<h:form>`

    `   <h:panelGrid columns="1">`

    `      <rich:inplaceInput value="#{inplaceInputBean.name}"`

    `         defaultLabel="双击编辑姓名" editEvent="dblclick">`

    ***`<a4j:ajax event="change" render="out" />`***

    `      </rich:inplaceInput>`

    `      <h:outputText value="#{inplaceInputBean.name}" id="out"/>`

    `   </h:panelGrid>`

    `</h:form>`


    在组件中输入新值，然后通过失焦（Tab 键移出或点击组件外部）或按 Enter 键，都会导致向服务器发送一个包含新值的 Ajax 请求，从而更新输出组件。请注意，`editEvent`
    属性允许您自定义触发组件切换到可编辑状态的事件。在我们的示例中，使用了 `dblclick`（双击）。

