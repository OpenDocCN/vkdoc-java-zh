    our spinner is rendered, and clicking on buttons will cause the value to be changed,
    as shown in [Figure 14-9](#Chapter14.html#fig_14_9).  ![images](images/1409.jpg)  ***Figure
    14-9.** Spinner component rendered*    Go ahead and try the component with different
    values, bind it to a bean property, and perform a submit. It should all work.    ###
    Adding Common Attributes    We would like to enhance our component to add encoding
    of styling, event, and other standard attributes. Turns out it’s pretty simple
    to do. We won’t even make changes to the `AbstractSpinner` class, defining all
    those standard attributes using getters marked with `@Attribute`. At first it’s
    rather annoying to do that repetitive work for standard properties. And what is
    more important, it could be the cause of some mistakes and is hard to maintain.
    As all those attributes are renderer-specific, it would be more logical to group
    them somehow and, ideally, even add them at renderer-template level. We are able
    to do so using CDK.    Most of the standard HTML and JSF attributes are already
    available as common, reusable, JSF-configuration, XML fragments (faces-config
    CDK extensions) in CDK, so we will do it using the `<cdk:import-attributes>` tag
    in the template. And if you prefer this way, can still add them in abstract class
    using the `attributes` attribute of the `@JSFComponent` annotation. It also allows
    reusable config parts inclusions.    Let’s look at one of the XML fragments from
    CDK (`core-props.xml`) in [Listing 14-16](#Chapter14.html#list_14_16).    ***Listing
    14-16.** XML fragments from CDK*  `<?xml version="1.0" encoding="UTF-8"?>` `<cdk:properties`   `   >`
    `   <property>` `      <description>CSS style(s) to be applied when this component
    is rendered.</description>` `      <display-name>CSS Styles</display-name>` `      <icon
    />` `      <property-name>style</property-name>` `      <property-class>java.lang.String</property-class>`
    `      <property-extension>` `         <cdk:pass-through>true</cdk:pass-through>`
    `      </property-extension>` `   </property>` `   <property>` `      <description>Space-separated
    list of CSS style class(es) to be applied when this element is rendered.` `         This
    value must be passed through as the "class" attribute on generated markup.</description>`
    `      <display-name>CSS Style Classes</display-name>` `      <icon />` `      <property-name>styleClass</property-name>`
    `      <property-class>java.lang.String</property-class>` `      <property-extension>`
    `         <cdk:pass-through>false</cdk:pass-through>` `      </property-extension>`
    `   </property>` `   <!--more attributes definitions>` `</cdk:properties>`  ![images](images/square.jpg)
    **Note** We will not list all common fragment file names because the list is rather
    long. We just want to make sure that you are aware that they exist and know that
    using them will make development simpler. Refer to CDK documentation at [`http://jboss.org/richfaces`](http://jboss.org/richfaces)
    to get a complete file list and listings.    When we include the XML in template
    or abstract class, corresponding attributes will be added to a generated component
    class. You’re free to create your own XML fragments to reuse some attributes across
    similar components.    Let’s see how it works. We need to add the next set of
    tags to our `spinner.template.xml` `<cc:interface>` section, as shown in [Listing
    14-17](#Chapter14.html#list_14_17).    ***Listing 14-17.** Adding tags to `spinner.template.xml`
    `<cc:interface>`*  `<cdk:import-attributes src="urn:attributes:events-props.xml"/>`
    `<cdk:import-attributes src="urn:attributes:core-props.xml"/>` `<cdk:import-attributes
    src="urn:attributes:i18n-props.xml"/>` `<cdk:import-attributes src="urn:attributes:focus-props.xml"/>`
    `<cdk:import-attributes src="urn:attributes:input-props.xml"/>`  Now let’s build
    the spinner and check the result in `UISpinner.java` generated class. Note that
    we are getting even more than expected, except for new attributes in the properties
    map, you can easily see that our class now implements `ClientBehaviorHolder` and
    provides the implementation of interface methods. So all the events like `change`,
    `keyup`, and so on are now available as behavior events.    Interested in how
    that was achieved? It’s pretty simple; CDK makes the decision whether there are
    any client behavior events according to the events’ definitions (doesn’t matter
    if using the `@Attribute` annotation or a JSF configuration file fragment) and
    defines event name (using `@EventName` or `<cdk:event-name>`) property. If at
    least one such attribute is found, the component is marked as the client behaviors
    holder and corresponding attributes are added to a behavior events map.    So
    the only thing remaining for the attribute to be useful is to use them in an HTML
    template in the `<cc:implementation>` section in order for them to render on the
    page.    We will add most of the attributes to show you how it works. Let’s change
    the beginning of our template implementation section, as shown in [Listing 14-18](#Chapter14.html#list_14_18)    ***Listing
    14-18.** Changing the beginning of the template implementation section*  `<cc:implementation>`
    `<span id="#{clientId}"  class="#{component.attributes[''styleClass'']}"` `   cdk:passThroughWithExclusions="id
    class">` `   <input type="text" name="#{clientId}" id="#{clientId}Input" cdk:passThrough="onchange"`
    `      value="#{getInputValue(facesContext, component)}"/>`  Note the `styleClass`
    encoded using a corresponding attribute at the `<span>` element and all the pass-through
    attributes except `id` and `class` are encoded there too. Also note that the component
    `change` event attribute will be encoded in the `<input>` element.    Now let’s
    build the spinner in order for the renderer to be re-generated, and update the
    sample application code as shown in [Listing 14-19](#Chapter14.html#list_14_19).    ***Listing
    14-19.** Update sample application code*  `<h:form>` `   <prf:spinner value="50"
    styleClass="fooClass">` `      <a4j:ajax event="change" />` `   </prf:spinner>`
    `</h:form>`  Let’s examine the source HTML code generated in the result (visually
    the result will be the same). [Listing 14-20](#Chapter14.html#list_14_20) shows
    how our component code now looks on the client.    ***Listing 14-20.** Component
    code*  `<span class="fooClass" id="j_idt7:j_idt8">` `   <input id="j_idt7:j_idt8Input"
    name="j_idt7:j_idt8" type="text" value="50"`  `onchange="RichFaces.ajax(this,event,{"parameters":{"javax.faces.behavior.event":"change",`
    `      "org.richfaces.ajax.component":"j_idt7:j_idt8"} ,"sourceId":this} )" />`
    `   <button id="j_idt7:j_idt8Dec" type="button">&lt;</button>` `   <button id="j_idt7:j_idt8Inc"
    type="button">&gt;</button>` `   <script>` `      $(document.getElementById(''j_idt7:j_idt8'')).Spinner({"value":"50"}
    );` `   </script>` `</span>`  Notice the `fooClass` encoded at the `<span>` element,
    and the Ajax behavior for the `change` event encoded in our `<input>`.    ###
    Implementing the Disabled State    Implementing this feature is pretty simple.
    All we need to consider is the `disabled` attribute, which was added as one of
    the common inputs attributes from the `input-props.xml`.    We will implement
    it using JSTL tags support in the renderer template and rendering corresponding
    property to input and buttons using HTML attributes. See [Listing 14-21](#Chapter14.html#list_14_21)
    for `<cc:implementation>` section changes.    ***Listing 14-21.** `<cc:implementation>`
    section changes*  `<cc:implementation>` `<span id="#{clientId}" class="#{component.attributes[''styleClass'']}"`
    `   cdk:passThroughWithExclusions="id class">` `   <input type="text" name="#{clientId}"
    id="#{clientId}Input"` `      cdk:passThrough="onchange" value="#{getInputValue(facesContext,
    component)}"` `      disabled="#{component.attributes[''disabled'']?''disabled'':''''}"
    />` `   <button type="button" id="#{clientId}Dec"` `      disabled="#{component.attributes[''disabled'']?''disabled'':''''}">&lt;</button>`
    `   <button type="button" id="#{clientId}Inc"` `      disabled="#{component.attributes[''disabled'']?''disabled'':''''}">&gt;</button>`
    `   <c:if test="#{not component.attributes[''disabled'']}">` `      <script>`
    `         <cdk:scriptObject name="options">` `            <cdk:scriptOption attributes="step
    maxValue minValue" />` `            <cdk:scriptOption name="value" value="#{component.attributes[''value'']}"
    defaultValue="0" />` `         </cdk:scriptObject>` `         $(document.getElementById(''#{clientId}'')).Spinner(#{toScriptArgs(options)});`
    `      </script>` `   </c:if>` `</span>` `</cc:implementation>`  As you can see,
    we added simple conditions for `disabled` attributes on elements. We wrapped the
    script declaration with `<c:if>`, which checks the disabled state because we do
    not want any scripts to be attached to our component in the disabled state. Now
    let’s change the declaration of the spinner in the sample to have `disabled=`"`true`"
    set (keeping the `<a4j:ajax>` behavior defined as in the previous sample) and
    check the HTML output, as shown in [Listing 14-22](#Chapter14.html#list_14_22).    ***Listing
    14-22.** HTML output*  `<span id="j_idt7:j_idt8" class="fooClass">` `   <input
    type="text" value="50" name="j_idt7:j_idt8" id="j_idt7:j_idt8Input"` `      disabled="disabled">`
    `   <button type="button" id="j_idt7:j_idt8Dec" disabled="disabled">&lt;</button>`
    `   <button type="button" id="j_idt7:j_idt8Inc" disabled="disabled">&gt;</button>`
    `</span>`  Except proper attributes encoded and script not being rendered, the
    client behaviors (our `<a4j:ajax>`) are also ignored. This looks absolutely correct
    as the disabled component is not supposed to fire any events.    [Figure 14-10](#Chapter14.html#list_14_10)
    shows the rendered component on the page when disabled.  ![images](images/1410.jpg)  *Figure
    14-10\. Spinner component disabled*    ### Skinning the Spinner Component    Finally,
    it would be a good idea to encode at least a few styles for the spinner to improve
    its look and feel, and make it consistent with the other RichFaces components,
    and again show RichFaces’ skins in action.    As shown in [Listing 14-23](#Chapter14.html#list_14_23),
    let’s add the stylesheet with the `spinner.ecss` name to our `\META-INF\resources\org.richfaces.book\`
    folder (the same where the script is placed).    ***Listing 14-23.** Stylesheet
    with `spinner.ecss`*  `.practrf-sp {` `   border-width: 1px;` `   border-style:
    solid;` `   border-color: ''#{richSkin.panelBorderColor}'';` `   display: inline-block;`
    `   font-size: 1px;` `   white-space: nowrap;` `}` `input.practrf-sp-inp[type="text"]
    {` `   background-color: ''#{richSkin.controlBackgroundColor}'';` `   border:
    0px;` `   color: ''#{richSkin.generalTextColor}'';` `   font-family : ''#{richSkin.generalFamilyFont}'';`
    `   font-size : ''#{richSkin.generalSizeFont}'';` `   margin: 0px;` `   padding:
    0px;` `   vertical-align: top;` `}` `button.practrf-sp-dec, button.practrf-sp-inc{`
    `   background-color:  ''#{richSkin.headerBackgroundColor}'';` `   background-image:none;`
    `}`  ![images](images/square.jpg) **Note** We qualified our CSS selectors with
    `<input>` and `<button>` element names in order to overwrite the standard skinning
    classes, if standard elements skinning was enabled. By applying at the same time
    as the standard skinning classes, these selectors will have a higher priority.    Now,
    we need to encode this resource with the component by adding the following to
    the `SpinnerBaseRenderer` after the `spinner.js` dependency declaration:  `@ResourceDependency(library
    = "org.richfaces.book", name = "spinner.ecss")`  The class encoding should be
    added to our `spinner.template.xml` template, as shown in [Listing 14-24.](#Chapter14.html#list_14_24)    ***Listing
    14-24.** Adding class encoding to template*  `<span id="#{clientId}" class="practrf-sp
    #{component.attributes[''styleClass'']}" ...>` `   <input id="#{clientId}Input"
    class="practrf-sp-inp"... />` `   <button id="#{clientId}Dec" class="practrf-sp-dec"...>&lt;</button>`
    `   <button id="#{clientId}Inc" class="practrf-sp-inc"...>&gt;</button>` `   …`
    `</span>`  We now need to enable skinning in our test application (by default
    the RichFaces Maven archetype project doesn’t generate any skin parameter in `web.xml`).
    Let’s pick `emeraldTown`, as shown in [Listing 14-25](#Chapter14.html#list_14_25).    ***Listing
    14-25.** Enabling skinning*  `<context-param>` `    <param-name>org.richfaces.skin</param-name>`
    `    <param-value>emeraldTown</param-value>` `  </context-param>` `  <context-param>`
    `     <param-name>org.richfaces.enableControlSkinning</param-name>` `     <param-value>false</param-value>`
    ` </context-param>`  ![images](images/square.jpg) **Note** We disabled standard
    skinning, which is on by default, so that it would not interfere without skinning
    properties added (buttons and inputs could be affected by it). Now, we can check
    results in a “clean environment.” Of course, as we continue working, we should
    turn it back on to check that all our styles are still applied and properly redefining
    standard skinning styles.    We now rebuild the spinner project, refresh the sample,
    and publish and check the result. It should render like [Figure 14-11](#Chapter14.html#fig_14_11).  ![images](images/1411.jpg)  ***Figure
    14-11.** Skinned spinner component*    By following this approach, you can add
    additional styling to the custom component.    ### Summary    As you can see from
    the results, RichFaces CDK makes is very easy to build rich, custom components.
    With CDK, we have a readable, HTML-based template that has about 30 lines of code,
    a small and simple basic renderer class, and a fairly basic abstract class. As
    a result, we have the `UISpinner` component class implementation, which has about
    400 lines of code and performs all the basics, such as evaluating component attributes
    properly, storing with `StateHelper`, and implementing the `ClientBehaviorHolder`
    interface.    We now have a renderer class generated, which contains more than
    250 lines of code and performs everything needed with component encoding, including
    the proper encode of behavior events.    Finally, we have large `faces-config.xml`
    and `taglib.xml` files generated without any significant effort.    The RichFaces
    Component Development Kit tool is one of the RichFaces development team’s biggest
    achievements. It is worth being used by all JSF component developers—even if you
    are not using the components from rich:* tag library, but need to create your
    own custom component.    ## Index    ### ![images](images/square.jpg) A    a4j    advanced
