    Template    Now it’s time to return to the HTML template that we produced and
    create a renderer class that will encode the markup and script. It’s also time
    to learn the basics of RichFaces CDK renderer templates.    The template can be
    used for the following purposes:    *   To define the markup of the component
    in a standard HTML format, this will be transformed to set or `ResponseWriter`
    methods in the generated renderer class. *   To allow common, renderer-specific
    attributes (for example, import common HTML attributes) to be added.    Now let’s
    look at the first feature in action. The template file is a well-formed XML file
    that has the same structure as a JSF 2 composite component. Why not just HTML?
    Because similar to JSF 2 composite components, we also need an additional interface
    part where we can specify all renderer-related information, add imports, and so
    on. Also, it’s already standardized by JSF and provides a convenient contract
    for definitions. The implementation contains an actual HTML template, which will
    be encoded.    Now let’s go through [Listing 14-10](#Chapter14.html#list_14_10).
    We named the file `spinner.template.xml` according to CDK conventions and placed
    it in the `src/main/resources/templates` folder.    ***Listing 14-10.** spinner.template.xml*  `<?xml
    version="1.0" encoding="UTF-8"?>` `<cdk:root`    `   >` `   <cc:interface>` `      <cdk:class>org.richfaces.book.renderkit.SpinnerRenderer</cdk:class>`
    `      <cdk:superclass>org.richfaces.book.renderkit.SpinnerBaseRenderer</cdk:superclass>`
    `      <cdk:component-family>javax.faces.Input</cdk:component-family>` `      <cdk:renderer-type>org.richfaces.book.renderkit.SpinnerRenderer</cdk:renderer-type>`
    `   </cc:interface>` `   <cc:implementation>` `      <span id="#{clientId}">`
    `         <input type="text" name="#{clientId}" id="#{clientId}Input"` `            value="#{getInputValue(facesContext,
    component)}" />` `         <button type="button" id="#{clientId}Dec">&lt;</button>`
    `         <button type="button" id="#{clientId}Inc">&gt;</button>` `         <script>`
    `            <cdk:scriptObject name="options">` `               <cdk:scriptOption
    attributes=" step maxValue minValue"/>` `               <cdk:scriptOption name="value"
    value="#{component.attributes[''value'']}" defaultValue="0"/>` `            </cdk:scriptObject>`
    `            $(document.getElementById(''#{clientId}'')).Spinner(#{toScriptArgs(options)});`
    `         </script>` `      </span>` `   </cc:implementation>` `</cdk:root>`  Let’s
    start from the `<cc:interface>` section. The tag names explain what they do. We
    define the name for the generated renderer class. Then, defining that the renderer
    will extend the `SpinnerBaseRenderer` class (we will create it a little later),
    point it to the component family and specify the renderer type.    In the `<cc:implementation>`
    section, we copied the HTML template and added some references to component variables.
    As we already covered the markup during prototyping, let’s move to EL definitions
    and the new special tags there. You should see `clientId`, `facesContext`, and
    `component` referenced there. The CDK template exposes these objects like implicit
    variables so that you can refer to them as needed in the template. You can easily
    reference any other object that you need in a similar manner. For that, you need
    to define it in the template using the `<cdk:object>` tag. (There and across the
    description we will point you to tags that are available in templates; later we
    will provide the table with detailed descriptions.)    ![images](images/square.jpg)
