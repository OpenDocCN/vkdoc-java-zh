- fmt: "Let's look at another feature. Whenever the control loses focus and the value\
    \ has been changed, the new value gets applied. It looks similar to a spreadsheet\
    \ functionality (you tab out and the new value gets set). However, in some cases\
    \ any input change could be tied to an expensive server-side database call or\
    \ a complex service invocation. In such cases, the user should confirm before\
    \ the value is saved. `saveOnBlur=\"false\"` could be used and will cause the\
    \ component to cancel changes. It's useful when `showControls=\"true\"`.\n\n```\n\
    <rich:inplaceInput value=\"#{inplaceInputBean.name}\"\nsaveOnBlur=\"false\" showControls=\"\
    true\" defaultLabel=\"Click to edit name\"/>\n```\n\nIf the `saveOnblur` property\
    \ is set to `false`, applying a new value is only possible by using the Enter\
    \ key or clicking on the save UI control. Losing focus will reset the value to\
    \ the previous value.\n\nThis covers the `<rich:inplaceInput>` component. Keep\
    \ in mind again that all the standard conversion and validation rules apply here\
    \ as well.\n\n### JavaScript API\n\nThe component provides the JavaScript functions\
    \ shown in [Table 5-1](#Chapter05.html#tab_5_1), which could be invoked on the\
    \ client.\n\n![images](images/t0501.jpg)\n\n[Listing 5-4](#Chapter05.html#list_5_4)\
    \ shows an example updating another `<rich:inplaceInput>` input component on the\
    \ client.\n\n**Listing 5-4.** Updating another `<rich:inplaceInput>` input component\
    \ on the client\n\n```\n<h:panelGrid>\n   <rich:inplaceInput defaultLabel=\"Enter\
    \ your name\" id=\"name\"\nonchange=\"#{rich:component('nickname')}.\nsetValue(#{rich:component('name')}.getValue());\"\
    \ />\n   <rich:inplaceInput defaultLabel=\"Enter your nickname\" id=\"nickname\"\
    \ />\n</h:panelGrid>\n```\n\nWith the code in [Listing 5-4](#Chapter05.html#list_5_4),\
    \ the `nickname` input component will be set to a value entered in the `name`\
    \ input component, when that value changes (on `change` event). Note that this\
    \ assignment is done via the component JavaScript API and thus no event or Ajax\
    \ request is fired to the server.\n\n### Using `<rich:inplaceSelect>`\n\n`<rich:inplaceSelect>`\
    \ is similar to `<rich:inplaceInput>`, but instead of allowing the user to enter\
    \ the value, it shows a drop-down list from which a value can be selected, as\
    \ shown in [Figure 5-5](#Chapter05.html#fig_5_5).\n\n![images](images/0505.jpg)\n\
    \n**Figure 5-5.** `<rich:inplaceInput>` component\n\n[Figure 5-6](#Chapter05.html#fig_5_6)\
    \ shows the component when activated.\n\n![images](images/0506.jpg)\n\n**Figure\
    \ 5-6.** `<rich:inplaceSelect>` component activated\n\n[Listing 5-5](#Chapter05.html#list_5_5)\
    \ shows the JSF page code.\n\n**Listing 5-5.** Shows the JSF page code\n\n```\n\
    <rich:inplaceSelect value=\"#{inplaceSelectBean.fruit}\"\n   defaultLabel=\"Select\
    \ fruit\">\n   <f:selectItem itemValue=\"1\" itemLabel=\"Banana\" />\n   <f:selectItem\
    \ itemValue=\"2\" itemLabel=\"Cranberry\" />\n   <f:selectItem itemValue=\"3\"\
    \ itemLabel=\"Blueberry\" />\n   <f:selectItem itemValue=\"4\" itemLabel=\"Orange\"\
    \ />\n   <f:selectItem itemValue=\"5\" itemLabel=\"Apple\" />\n   <f:selectItem\
    \ itemValue=\"6\" itemLabel=\"Strawberry\" />\n</rich:inplaceSelect>\n```\n\n\
    The bean for the samples contains the single string property with getter and setter,\
    \ so it's omitted. The same `defaultLabel` attribute (as in `<rich:inplaceInput>`)\
    \ sets the label to be displayed if `#{inplaceSelectBean.fruit}` is initialized\
    \ to one of the values; then that value will be displayed instead of the \"Select\
    \ fruit\" label.\n\nCreating the list of options is rather simple. You just use\
    \ the standard `<f:selectItem>` or `<f:selectItems>` tag to build the list. The\
    \ core of this component is based on the JSF standard `UISelectOne` class.\n\n\
    As with `<rich:inplaceInput>`, you can add controls to the component in order\
    \ to either save or cancel the edited value by setting `showControls=\"true\"\
    ` (see [Figure 5-7](#Chapter05.html#fig_5_7)).\n\n![images](images/0507.jpg)\n\
    \n**Figure 5-7.** `<rich:inplaceSelect>` additional UI controls\n\nAlso similar\
