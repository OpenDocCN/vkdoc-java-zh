    #### JavaScript 交互或回调事件


    触发 Ajax 请求不需要编写任何 JavaScript 代码。使用 `<f:ajax>` 或更高级的 `<a4j:ajax>` 可以从任何组件触发 Ajax
    请求。然而，在某些情况下，你可能希望在 Ajax 请求完成之前或之后调用或注入自定义的 JavaScript 函数。JSF 2 提供了两个回调事件，`onevent`
    和 `onerror`，允许你在 Ajax 请求期间调用自定义 JavaScript。它们分别在表 2-10 中进行了描述。


    ![图片](img/t0210.jpg)


