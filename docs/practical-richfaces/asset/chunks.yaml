    #### 外观定制


    让我们从外观定制开始，对组件进行更深入的探讨。首先，我们添加斑马纹样式、行悬停效果以及额外的列样式。对于斑马纹效果和列样式，我们将使用一些属性，如果你之前用过
    `<h:dataTable>`，应该对这些属性很熟悉。但是，为了添加悬停时的行高亮效果，我们将使用 RichFaces 表格特有的事件。对于标准事件，例如
