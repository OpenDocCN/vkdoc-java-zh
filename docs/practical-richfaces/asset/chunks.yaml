    7-32.** 过滤后无结果显示*    #### 迭代组件高级模型    如果您以前使用过 JSF 表格，您知道不仅可以向 `<rich:dataTable>`
    值传递一个简单的 `List`，还可以将表格指向一个数据模型，该模型是扩展了 `javax.faces.model.DataModel<E>` 抽象类的类的对象。    RichFaces
    添加了以下两个数据模型：    *   `org.ajax4jsf.model.ExtendedDataModel<E>`：一个基础模型抽象类。它定义了抽象模型契约，有助于在复杂的迭代组件中管理复杂的数据结构，如树、电子表格等。
    *   `org.richfaces.model.ArrangeableModel`：一个模型实现，它扩展了 `ExtendedDataModel` 并实现了
    `org.richfaces.model.Arrangeable` 接口。此模型添加了过滤和排序操作。    让我们来探讨一下为什么需要这些特殊的数据模型。    `ExtendedDataModel`
    向 JSF 模型添加了 `rowKey` 实体，并使用 `rowKey` 代替（在某些情况下与 `rowIndex` 一起使用）。这个键是一个抽象属性，允许我们在包装的集合中标识对象。例如，这个键可以是您的数据库实体
    ID。使用键而不是仅仅使用索引，可以保证我们在分页模型中，在启用了内置组件选择的情况下，能够轻松、正确地从包装模型中获取对象。使用基于索引的 `javax.faces.model.DataModel`，我们需要设计和实现额外的“模型索引”或“数据库对象”查找功能。而使用
    `ExtendedDataModel`，所有必要的方法和默认实现都已提供。    `ExtendedDataModel` 有一个简单的实现 `org.ajax4jsf.model.SequenceDataModel<E>`，用作迭代组件的默认模型（当排序和过滤功能未激活时）。它通过
    `org.richfaces.model.TreeSequenceKeyModel<V>` 进行扩展，后者也是一个抽象类，其实现用于树组件。    最后，`ArrangeableModel`
    扩展了 `ExtendedDataModel`，为抽象类提供了默认实现，并实现了 `Arrangeable` 接口。它使用扩展模型中的相同方法，并增加了一个
    `arrange()` 方法，用于从组件级别向模型设置排序和过滤规则。    让我们通过创建两个示例来回顾这两个模型。    ##### 数据准备    为了更接近真实世界的应用程序，我们将向应用程序添加一个数据库层，并使用
