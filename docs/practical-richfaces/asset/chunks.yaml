    ### 使用 `<rich:fileUpload>` 上传文件


    `<rich:fileUpload>` 组件（如图 5-37 所示）提供了异步文件输入功能，并具有高度可定制的丰富外观，可显示上传文件信息和进度指示。


    ![images](img/0537.jpg)


    ***图 5-37.** `<rich:fileUpload>` 组件*


    定义该组件的 JSF 页面代码如 清单 5-33 所示。


    ***清单 5-33.** JSF 页面代码*


    `<h:form>`

    `   <rich:fileUpload fileUploadListener="#{fileUploadBean.listener}"/>`

    `<h:form>`


    你必须使用的唯一属性是 `fileUploadListener`。它应使用一个方法表达式来定义，该监听器方法将负责处理上传的文件。它应该是一个接受单个 `org.richfaces.event.FileUploadEvent`
    类型参数的无返回值方法。`FileUploadEvent` 提供了一个 `getUploadedFile` 方法，该方法返回一个已上传文件的实例，如 清单
    5-34 所述。


    让我们也来看一个简单的 Bean，它将上传的文件对象存储在会话中。


    ***清单 5-34.** 一个简单的受管 Bean*


    `import org.richfaces.model.UploadedFile;`

    `...`

    `@ManagedBean`

    `@SessionScoped`

    `public class FileUploadBean {`

    `   private UploadedFile file;`

    `   public void listener(FileUploadEvent event) throws Exception {`

    `      file = event.getUploadedFile();`

    `   }`

    `   //Getters and setters`

    `}`


    表 5-13 列出了可用于获取已上传文件信息的 *`UploadedFile`* 接口方法。


    ![images](img/t0513.jpg)


    让我们回顾一些额外的设置。首先，与任何向服务器发送 Ajax 请求的组件一样，你必须使用一个表单来包裹该组件。但是，使用 RichFaces 文件上传组件时，你无需将表单设置为多部分表单，因为
    RichFaces 会自动处理。使用标准的 `<h:form>` 就足够了。


    文件上传组件有两个选项，它们在 `web.xml` 中定义为应用程序上下文参数，如 表 5-14 所示。


    ![images](img/t0514.jpg)


    现在，让我们添加一个关于可以上传哪种文件类型的限制，如 清单 5-35 所示。


    ***清单 5-35.** 添加上传文件的限制*


    `<rich:fileUpload id="fileUpload"` ***`acceptedTypes="jpg, gif, png"`***![images](img/U002.jpg)

    `   fileUploadListener="#{fileUploadBean.listener}"   `![images](img/U002.jpg)

    ***`disabled="#{fileUploadBean.filesCountExceeded}"`***`/>`


    现在，该组件将只允许上传 .jpg、.gif 和 .png 图片，并且一旦 `#{fileUploadBean.filesCountExceeded}` 评估为
    true，该组件将被禁用，不再允许任何额外的上传。如果 `#{fileUploadBean.filesCountExceeded}` 在服务器端发生变化，则需要重新渲染该组件以更新其在客户端的状态。


    让我们看另一个支持缩略图预览的图片上传示例，如 清单 5-36 所示。


    ***清单 5-36.** 支持缩略图预览的图片上传*


    `<h:form>`

    `   <h:panelGrid columns="2" columnClasses="top,top">`

    `      <rich:fileUpload fileUploadListener="#{fileUploadBean.listener}"`

    `         maxFilesQuantity="#{fileUploadBean.uploadsAvailable}" id="upload"`

    `         acceptedTypes="jpg, gif, png, bmp">`

    ***`<a4j:ajax event="uploadcomplete" execute="@none" render="info" />`***

    `      </rich:fileUpload>`

    `<h:panelGroup` ***`id="info"`***`>`

    `   <rich:panel bodyClass="info">`

    `      <f:facet name="header">已上传文件信息</f:facet>`

    `      <rich:dataGrid columns="1" value="#{fileUploadBean.files}" var="file" rowKeyVar="row">`

    `         <rich:panel>`

    `            <h:panelGrid columns="2">`

    `            <a4j:mediaOutput element="img" mimeType="#{file.contentType}"`

    `               createContent="#{fileUploadBean.paint}" value="#{row}" style="width:100px;`![images](img/U002.jpg)

    `height:100px;"`

    `               cacheable="false">`

    `               <f:param value="#{fileUploadBean.timeStamp}" name="time" />`

    `            </a4j:mediaOutput>`

    `            <h:panelGrid columns="2">`

    `               <h:outputText value="文件名：" />`

    `               <h:outputText value="#{file.name}" />`

    `               <h:outputText value="文件长度（字节）：" />`

    `               <h:outputText value="#{file.size}" />`

    `            </h:panelGrid>`

    `            </h:panelGrid>`

    `         </rich:panel>`

    `      </rich:dataGrid>`

    `   </rich:panel>`

    `   </h:panelGroup>`

    `   </h:panelGrid>`

    `</h:form>`


    相应的受管 Bean 代码片段如 清单 5-37 所示。


    ***清单 5-37.** 受管 Bean 代码片段*


    `@ManagedBean`

    `@SessionScoped`

    `public class FileUploadBean {`

    `   private ArrayList<UploadedFile> files = new ArrayList<UploadedFile>();`


    `   public void paint(OutputStream stream, Object object) throws IOException {`

    `      stream.write(getFiles().get((Integer) object).getData());`

    `   }`


    `   public void listener(FileUploadEvent event) throws Exception {`

    `      UploadedFile item = event.getUploadedFile();`

    `      files.add(item);`

    `   }`


    `   public Date getTimeStamp(){`

    `      return new Date();`

    `   }`


    `   // Getters and setters`

    `}`


    文件上传后，`<a4j:ajax>` 会向服务器发起一个 Ajax 请求并更新缩略图面板，如图 5-38 所示。


    ![images](img/0538.jpg)


    ***图 5-38.** 带有缩略图面板的 `<rich:fileUpload>`*


    每个上传的文件都存储在一个列表中。然后我们使用 *`<rich:dataGrid>`* 组件遍历该列表，并将图片传递给 *`<a4j:mediaOutput>`*
    组件以输出图片文件的缩略图。


    #### 组件 Facet


    `<rich:fileUpload>` 组件提供了一个 `progress` facet。它允许你重新定义组件内置的 `<rich:progressBar>`
    功能。你可以将 `<rich:progressBar>` 放置在该 facet 内，并根据需要自定义其行为或外观。


    #### 组件 JavaScript API


    在撰写本书时，`<rich:fileUpload>` 组件不提供公共的 JavaScript API。JavaScript API 可能会在未来的版本中添加。请访问
    JBoss 社区 RichFaces 网站 [`http://richfaces.org`](http://richfaces.org) 以获取更新。


    ### 总结


    本章涵盖了 RichFaces 的输入组件。所有输入组件都提供了丰富的客户端功能，有些还内置了 Ajax 支持。对于未提供开箱即用 Ajax 支持的输入组件，你可以通过将
    `<a4j:ajax>` 行为附加到组件可用的任何事件上，轻松地添加 Ajax 支持。


    在使用这些组件时，请不要忘记许多组件提供的丰富的 JavaScript API。许多组件还提供了 facet 来重新定义组件的某些部分。所有这些特性使得 RichFaces
    输入组件非常强大且灵活。


    在底层，大多数组件只是输入组件，因此所有基本的 JSF 概念（例如转换和验证）同样适用。要查看所有输入组件的实际效果，请访问 JBoss 社区 RichFaces
    网站上的组件演示，网址为 [`http://www.jboss.org/richfaces/demos`](http://www.jboss.org/richfaces/demos)。


    现在我们已经完成了丰富的输入组件，下一章将介绍丰富的输出组件，例如弹出面板、选项卡等。


    ## 第 6 章


    ## 丰富的面板和输出组件


    RichFaces 提供了大量开箱即用的组件，用于不同的数据展示。本章将介绍输出组件，例如简单面板、可折叠面板、选项卡面板、切换面板和弹出面板。请准备好迎接大量的示例以及常见用法，例如如何使用弹出面板来显示向导或状态消息。

