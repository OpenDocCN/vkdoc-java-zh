    The following Ajax attributes are available to use with `<a4j:commandButton>`
    and `<a4j:commandLink>` tags: `onbegin`, `onbeforedomupdate`, `oncomplete`, `bypassUpdates`,
    `limitRender`, `data`, and `status`.


    ![images](images/square.jpg) **Note** `<a4j:commandLink>` works exactly the same
    as `<a4j:commandButton>`, but instead of a button it will render a link.'
