- fmt: "### Component Customization\n\nTo manage the placement of an inserted popup,\
    \ use the `zindex` attribute, which is similar to the standard HTML style and\
    \ can specify window placement relative to the content. That is especially important\
    \ in case multiple non-modal popups are opened from the different page controls.\
    \ In case of opening one panel from another, the last will be automatically adjusted\
    \ to be on top.\n\nTo manage window placement, use the `left` and `top` attributes.\
    \ They define a window offset relative to the top-left corner of the window. These\
    \ parameters (and some others, like `size` parameters) can be defined at tag level\
    \ or passed to the `show()` method as we will show next. The last approach allows\
    \ using a popup in a more dynamic way.\n\nPopup panels can also support resize\
    \ and move operations on the client side. To allow or disallow these operations,\
    \ set the `resizeable` and `moveable` attributes to `true` or `false`. Popup resizing\
    \ is also limited by the `minWidth` and `minHeight` attributes specifying the\
    \ minimal sizes. [Listing 6-29](#Chapter06.html#list_6_29) shows an example.\n\
    \n**Listing 6-29.** Popup resizing\n\n```\n<h:commandButton value=\"Show popup\"\
    >\n   <rich:componentControl target=\"modalPanel5\" operation=\"show\">\n    \
    \  <a4j:param noEscape=\"true\" value=\"event\" />\n      <rich:hashParam>\n \
    \        <f:param name=\"minWidth\" value=\"300px\" />\n         <f:param name=\"\
    minHeight\" value=\"150px\" />\n         <a4j:param noEscape=\"true\" name=\"\
    left\"\n            value=\"(jQuery(window).width()/2)-250\" />\n            <a4j:param\
    \ noEscape=\"true\" name=\"top\"\n               value=\"(jQuery(window).height()/2)-150\"\
    \ />\n      </rich:hashParam>\n   </rich:componentControl>\n</h:commandButton>\n\
    <rich:popupPanel id=\"modalPanel5\" modal=\"false\" resizeable=\"true\"\n   header=\"\
    Dynamic popup panel\" moveable=\"true\">\n   <p>Cool, I just opened non-modal\
    \ popup panel passing parameters from\n      script!</p>\n   <p>It could be resized\
    \ and moved to any part of the screen\"</p>\n   <a href=\"#\" onclick=\"#{rich:component('modalPanel5')}.hide()\"\
    >Hide</a>\n</rich:popupPanel>\n```\n\n[Figure 6-24](#Chapter06.html#fig_6_24)\
    \ shows the result when the page is rendered.\n\n![images](images/0624.jpg)\n\n\
    **Figure 6-24.** Popup panel with dynamic sizes\n\nAs you can see, we defined\
    \ some functional parameters like `resizeable` and `moveable` at panel level,\
    \ but passed positioning and size attributes from a concrete opening link. This\
    \ adds more flexibility to component. Read more about `<a4j:param>` and `<rich:hashParam>`\
    \ in corresponding sections about core (a4j:tags, features, and concepts) and\
    \ miscellaneous (RichFaces functions, component control, miscellaneous) components.\n\
    \n### Advanced Component Usage Samples\n\nWhat we have shown you so far is how\
    \ to open and close popup panels using various methods, as well as performing\
    \ basic customization. Obviously, you want to use a panel for more interesting\
    \ things, such as entering and saving input or maybe even building wizard-like\
    \ behavior.\n\n#### Performing Content Updates Inside `<rich:popupPanel>`\n\n\
    So far, you have been using the JavaScript API to open and close the popup panels.\
    \ This works fine, but you probably want to display some server-side data, such\
    \ as data from a managed bean. For the data to be updated every time you open\
    \ the popup panel, the content has to be rendered by Ajax before opening the panel.\
    \ To be able to update content, use already known Ajax controls such as `<a4j:commandlLink>`\
    \ or `<a4j:commandButton>`.\n\nSuppose you have added a time display to the popup\
    \ panel, as shown in [Listing 6-30](#Chapter06.html#list_6_30).\n\n**Listing 6-30.**\
    \ Adding a time display to the popup panel\n\n```\n<a href=\"#\" onclick=\"#{rich:component('modalPanel6')}.show()\"\
    >Open</a>\n<rich:popupPanel id=\"modalPanel6\" autosized=\"true\" header=\"Time\
    \ Panel\">   <h:panelGrid>\n      <h:outputText value=\"Cool, I just opened a\
    \ modal panel!\" />\n      <h:outputText id=\"time\" value=\"Time: #{simplePopupBean.now}\"\
    >\n         <f:convertDateTime />\n      </h:outputText>\n   </h:panelGrid>\n\
    \   <a href=\"#\" onclick=\"#{rich:component('modalPanel6')}.hide()\">Hide</a>\n\
    </rich:popupPanel>\n```\n\n`#{simplePopupBean.now}` simply returns the current\
    \ server time, as shown in [Listing 6-31](#Chapter06.html#list_6_31).\n\n**Listing\
    \ 6-31.** Using `#{simplePopupBean.now}`\n\n```\n@ManagedBean\n@RequestScoped\n\
    public class SimplePopupBean {\n   public Date getNow(){\n      return new Date();\n\
    \   }\n}\n```\n\nWhen the page is rendered for the first time, the time from the\
    \ server will be rendered on the page. When the popup panel is opened, the value\
    \ previously rendered will be shown. The time will not be the current time because\
    \ you haven't updated it (re-rendered it). To solve this, you'll use `<a4j:commandLink>`\
    \ to open the popup panel and re-render the component that shows the time. This\
    \ way, each time the popup panel is opened you will get the latest time from the\
    \ server, as demonstrated in [Listing 6-32](#Chapter06.html#list_6_32).\n\n**Listing\
    \ 6-32.** Using `<a4j:commandLink>`\n\n```\n<h:form>\n   <a4j:commandLink value=\"\
    Open\"\n      onclick=\"#{rich:component('modalPanel6')}.show()\" render=\"time\"\
    \ />\n</h:form>\n<rich:popupPanel id=\"modalPanel6\" autosized=\"true\" header=\"\
    Time Panel\">\n   <h:panelGrid>\n      <h:outputText value=\"Cool, I just opened\
    \ a modal panel!\" />\n      <h:outputText id=\"time\" value=\"Time: #{simplePopupBean.now}\"\
    >\n         <f:convertDateTime />\n      </h:outputText>\n   </h:panelGrid>\n\
    \   <a href=\"#\" onclick=\"#{rich:component('modalPanel6')}.hide()\">Hide</a>\n\
    </rich:popupPanel>\n```\n\nFigure 6-25 shows the popup opened using Ajax link.\n\
    \n![images](images/0625.jpg)\n\n**Figure 6-25.** Popup panel with the content\
    \ updated by Ajax\n\nAgain, it will help you to think about the popup panel as\
    \ simply a section of the same page that can be shown or hidden. Other than that,\
    \ all the rules for Ajax rendering apply as before."
  raw: '#### Component Customization


    To manage the placement of an inserted popup, use the *`zindex`* attribute, which
    is similar to the standard HTML style and can specify window placement relative
    to the content. That is especially important in case multiple non-modal popups
    are opened from the different page controls. In case of opening one panel from
    another, the last will be automatically adjusted to be on top.


    To manage window placement, use the *`left`* and *`top`* attributes. They define
    a window offset relative to the top-left corner of the window. These parameters
    (and some others, like *`size`* parameters) can be defined at tag level or passed
    to the *`show()`* method as we will show next. The last approach allows using
    a popup in a more dynamic way.


    Popup panels can also support resize and move operations on the client side. To
    allow or disallow these operations, set the *`resizeable`* and *`moveable`* attributes
    to *`true`* or *`false`*. Popup resizing is also limited by the *`minWidth`* and
    *`minHeight`* attributes specifying the minimal sizes. [Listing 6-29](#Chapter06.html#list_6_29)
    shows an example.


    ***Listing 6-29.** Popup resizing*


    `<h:commandButton value="Show popup">`

    `   <rich:componentControl target="modalPanel5" operation="show">`

    `      <a4j:param noEscape="true" value="event" />`

    `      <rich:hashParam>`

    `         <f:param name="minWidth" value="300px" />`

    `         <f:param name="minHeight" value="150px" />`

    `         <a4j:param noEscape="true" name="left"`

    `            value="(jQuery(window).width()/2)-250" />`

    `            <a4j:param noEscape="true" name="top"`

    `               value="(jQuery(window).height()/2)-150" />`

    `      </rich:hashParam>`

    `   </rich:componentControl>`

    `</h:commandButton>`

    `<rich:popupPanel id="modalPanel5" modal="false" resizeable="true"`

    `   header="Dynamic popup panel" moveable="true">`

    `   <p>Cool, I just opened non-modal popup panel passing parameters from`

    `      script!</p>`

    `   <p>It could be resized and moved to any part of the screen"</p>`

    `   <a href="#" onclick="#{rich:component(''modalPanel5'')}.hide()">Hide</a>`

    `</rich:popupPanel>`


    [Figure 6-24](#Chapter06.html#fig_6_24) shows the result when the page is rendered.


    ![images](images/0624.jpg)


    ***Figure 6-24.** Popup panel with dynamic sizes*


    As you can see, we defined some functional parameters like *`resizeable`* and
    *`moveable`* at panel level, but passed positioning and size attributes from a
    concrete opening link. This adds more flexibility to component. Read more about
    *`<a4j:param>`* and *`<rich:hashParam>`* in corresponding sections about core
    (a4j:tags, features, and concepts) and miscellaneous (RichFaces functions, component
    control, miscellaneous) components.


    #### Advanced Component Usage Samples


    What we have shown you so far is how to open and close popup panels using various
    methods, as well as performing basic customization. Obviously, you want to use
    a panel for more interesting things, such as entering and saving input or maybe
    even building wizard-like behavior.


    ##### Performing Content Updates Inside <rich:popupPanel>


    So far, you have been using the JavaScript API to open and close the popup panels.
    This works fine, but you probably want to display some server-side data, such
    as data from a managed bean. For the data to be updated every time you open the
    popup panel, the content has to be rendered by Ajax before opening the panel.
    To be able to update content, use already known Ajax controls such as *`<a4j:commandlLink>`*
    or *`<a4j:commandButton>`*.


    Suppose you have added a time display to the popup panel, as shown in [Listing
    6-30](#Chapter06.html#list_6_30).


    ***Listing 6-30.** Adding a time display to the popup panel*


    `<a href="#" onclick="#{rich:component(''modalPanel6'')}.show()">Open</a>`

    `<rich:popupPanel id="modalPanel6" autosized="true" header="Time Panel">   <h:panelGrid>`

    `      <h:outputText value="Cool, I just opened a modal panel!" />`

    `      <h:outputText id="time" value="Time: #{simplePopupBean.now}">`

    `         <f:convertDateTime />`

    `      </h:outputText>`

    `   </h:panelGrid>`

    `   <a href="#" onclick="#{rich:component(''modalPanel6'')}.hide()">Hide</a>`

    `</rich:popupPanel>`


    *`#{simplePopupBean.now}`* simply returns the current server time, as shown in
    [Listing 6-31](#Chapter06.html#list_6_31).


    ***Listing 6-31.** Using* `#{simplePopupBean.now}`


    `@ManagedBean`

    `@RequestScoped`

    `public class SimplePopupBean {`

    `   public Date getNow(){`

    `      return new Date();`

    `   }`

    `}`


    When the page is rendered for the first time, the time from the server will be
    rendered on the page. When the popup panel is opened, the value previously rendered
    will be shown. The time will not be the current time because you haven''t updated
    it (re-rendered it). To solve this, you''ll use *`<a4j:commandLink>`* to open
    the popup panel and re-render the component that shows the time. This way, each
    time the popup panel is opened you will get the latest time from the server, as
    demonstrated in [Listing 6-32](#Chapter06.html#list_6_32).


    ***Listing 6-32.** Using* `<a4j:commandLink>`


    `<h:form>`

    `   <a4j:commandLink value="Open"`

    `      onclick="#{rich:component(''modalPanel6'')}.show()" render="time" />`

    `</h:form>`

    `<rich:popupPanel id="modalPanel6" autosized="true" header="Time Panel">`

    `   <h:panelGrid>`

    `      <h:outputText value="Cool, I just opened a modal panel!" />`

    `      <h:outputText id="time" value="Time: #{simplePopupBean.now}">`

    `         <f:convertDateTime />`

    `      </h:outputText>`

    `   </h:panelGrid>`

    `   <a href="#" onclick="#{rich:component(''modalPanel6'')}.hide()">Hide</a>`

    `</rich:popupPanel>`


    Figure 6-25 shows the popup opened using Ajax link.


    ![images](images/0625.jpg)


    ***Figure 6-25.** Popup panel with the content updated by Ajax*


    Again, it will help you to think about the popup panel as simply a section of
    the same page that can be shown or hidden. Other than that, all the rules for
    Ajax rendering apply as before.'
  trans: '

    #### 组件自定义


    要管理插入弹出窗口的位置，请使用 *`zindex`* 属性，该属性类似于标准 HTML 样式，可以指定窗口相对于内容的位置。当从不同页面控件打开多个非模态弹出窗口时，这一点尤其重要。如果从一个面板打开另一个面板，后打开的面板将自动调整至最上层。


    要管理窗口位置，请使用 *`left`* 和 *`top`* 属性。它们定义了窗口相对于窗口左上角的偏移量。这些参数（以及其他一些参数，如 *`size`*
    参数）可以在标签级别定义，或者像我们接下来展示的那样传递给 *`show()`* 方法。后一种方法允许以更动态的方式使用弹出窗口。


    弹出面板还可以支持客户端的调整大小和移动操作。要允许或禁止这些操作，请将 *`resizeable`* 和 *`moveable`* 属性设置为 *`true`*
    或 *`false`*。弹出窗口的调整大小也受到 *`minWidth`* 和 *`minHeight`* 属性的限制，这些属性指定了最小尺寸。清单 6-29
    展示了一个示例。


    ***清单 6-29.** 弹出窗口调整大小*


    `<h:commandButton value="Show popup">`

    `   <rich:componentControl target="modalPanel5" operation="show">`

    `      <a4j:param noEscape="true" value="event" />`

    `      <rich:hashParam>`

    `         <f:param name="minWidth" value="300px" />`

    `         <f:param name="minHeight" value="150px" />`

    `         <a4j:param noEscape="true" name="left"`

    `            value="(jQuery(window).width()/2)-250" />`

    `            <a4j:param noEscape="true" name="top"`

    `               value="(jQuery(window).height()/2)-150" />`

    `      </rich:hashParam>`

    `   </rich:componentControl>`

    `</h:commandButton>`

    `<rich:popupPanel id="modalPanel5" modal="false" resizeable="true"`

    `   header="Dynamic popup panel" moveable="true">`

    `   <p>Cool, I just opened non-modal popup panel passing parameters from`

    `      script!</p>`

    `   <p>It could be resized and moved to any part of the screen"</p>`

    `   <a href="#" onclick="#{rich:component(''modalPanel5'')}.hide()">Hide</a>`

    `</rich:popupPanel>`


    图 6-24 展示了页面渲染后的结果。


    ![images](img/0624.jpg)


    ***图 6-24.** 具有动态尺寸的弹出面板*


    如您所见，我们在面板级别定义了一些功能参数，如 *`resizeable`* 和 *`moveable`*，但将定位和尺寸属性从具体的打开链接传递进来。这为组件增加了更多灵活性。在关于核心（a4j:tags、特性和概念）和杂项（RichFaces
    函数、组件控制、杂项）组件的相应章节中，阅读更多关于 *`<a4j:param>`* 和 *`<rich:hashParam>`* 的内容。


    #### 高级组件使用示例


    到目前为止，我们向您展示了如何使用各种方法打开和关闭弹出面板，以及执行基本自定义。显然，您希望将面板用于更有趣的事情，例如输入和保存数据，甚至构建类似向导的行为。


    ##### 在 <rich:popupPanel> 内部执行内容更新


    到目前为止，您一直在使用 JavaScript API 来打开和关闭弹出面板。这工作得很好，但您可能希望显示一些服务器端数据，例如来自受管 bean 的数据。为了在每次打开弹出面板时都能更新数据，内容必须在打开面板之前通过
    Ajax 渲染。为了能够更新内容，请使用已知的 Ajax 控件，例如 *`<a4j:commandlLink>`* 或 *`<a4j:commandButton>`*。


    假设您已在弹出面板中添加了一个时间显示，如清单 6-30 所示。


    ***清单 6-30.** 向弹出面板添加时间显示*


    `<a href="#" onclick="#{rich:component(''modalPanel6'')}.show()">Open</a>`

    `<rich:popupPanel id="modalPanel6" autosized="true" header="Time Panel">   <h:panelGrid>`

    `      <h:outputText value="Cool, I just opened a modal panel!" />`

    `      <h:outputText id="time" value="Time: #{simplePopupBean.now}">`

    `         <f:convertDateTime />`

    `      </h:outputText>`

    `   </h:panelGrid>`

    `   <a href="#" onclick="#{rich:component(''modalPanel6'')}.hide()">Hide</a>`

    `</rich:popupPanel>`


    *`#{simplePopupBean.now}`* 简单地返回当前服务器时间，如清单 6-31 所示。


    ***清单 6-31.** 使用* `#{simplePopupBean.now}`


    `@ManagedBean`

    `@RequestScoped`

    `public class SimplePopupBean {`

    `   public Date getNow(){`

    `      return new Date();`

    `   }`

    `}`


    当页面首次渲染时，服务器的时间将渲染在页面上。当弹出面板打开时，将显示之前渲染的值。该时间不会是当前时间，因为您尚未更新（重新渲染）它。为了解决这个问题，您将使用
    *`<a4j:commandLink>`* 来打开弹出面板并重新渲染显示时间的组件。这样，每次打开弹出面板时，您都会从服务器获取最新时间，如清单 6-32
    所示。


    ***清单 6-32.** 使用* `<a4j:commandLink>`


    `<h:form>`

    `   <a4j:commandLink value="Open"`

    `      onclick="#{rich:component(''modalPanel6'')}.show()" render="time" />`

    `</h:form>`

    `<rich:popupPanel id="modalPanel6" autosized="true" header="Time Panel">`

    `   <h:panelGrid>`

    `      <h:outputText value="Cool, I just opened a modal panel!" />`

    `      <h:outputText id="time" value="Time: #{simplePopupBean.now}">`

    `         <f:convertDateTime />`

    `      </h:outputText>`

    `   </h:panelGrid>`

    `   <a href="#" onclick="#{rich:component(''modalPanel6'')}.hide()">Hide</a>`

    `</rich:popupPanel>`


    图 6-25 显示了使用 Ajax 链接打开的弹出窗口。


    ![images](img/0625.jpg)


    ***图 6-25.** 内容由 Ajax 更新的弹出面板*


    再次强调，将弹出面板视为同一页面中可以显示或隐藏的一个部分，这将有助于您的理解。除此之外，所有关于 Ajax 渲染的规则都像之前一样适用。

    '
- fmt: "### Using Popup Panel As a Wizard\n\nLet's look at an example where you can\
    \ edit information in the popup panel. When you place input fields or buttons\
    \ or links inside the popup panel, you need to make sure the popup panel has its\
    \ own form. One thing to keep in mind is that it's not allowed to nest forms,\
    \ so the popup panel must not be placed in some external form at the same time.\n\
    \n![images](images/square.jpg) **Note** To avoid the problems of overlapping the\
    \ popup panel with any z-index by the elements that are at upper DOM levels and\
    \ have relative positioning (a common problem in Internet Explorer), the root\
    \ node of the popup panel is moved to the top of a DOM tree. That's why you should\
    \ use a separate `<h:form>` inside the popup panel if you want to perform submits\
    \ from this panel.\n\n[Listing 6-33](#Chapter06.html#list_6_33) shows an example\
    \ using a popup panel as a wizard.\n\n***Listing 6-33.** Popup panel as a wizard*\n\
    \n```\n<rich:popupPanel id=\"modalPanel8\" header=\"Edit User Information\"\n\
    \   width=\"350\" height=\"150\" autosized=\"true\">\n   <h:form>\n      <rich:tabPanel\
