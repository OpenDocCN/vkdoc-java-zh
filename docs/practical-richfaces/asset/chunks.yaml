    Right now any component will show this status. Let''s update the page so that
    the status is shown only when we click the Convert button. We first need to give
    the status a name, as shown in [Listing 3-59](#Chapter03.html#list_3_59). Note
    that we are setting the name, not the id.


    ***Listing 3-59.** Giving the status a name*


    `<a4j:status id="ajaxStatus"` **`name="ajaxStatus"`** `startText="Working..."`

    `          startStyle="background-color: #ffA500;`

    `          font-weight:bold;`

    `          position: absolute;`

    `          left: 520px;`

    `          top: 1px;`

    `          width: 100px;" />`


    Next we need to update `<a4j:commandButton>` to reference that status, using the
    status attribute as follows:


    `<a4j:commandButton value="Convert"`

    `   action="#{ajaxStatusBean.upperCase}" render="upper"`

    **`status="ajaxStatus"`**`/>`


    The status will be shown only when this button is activated. No other component
    anywhere on the page will activate this status. Again, this is called a named
