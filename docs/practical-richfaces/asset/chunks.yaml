    \ `click` event by default.\n\n![images](images/square.jpg) **Tip** The `<a4j:commandButton>`\
    \ and `<a4j:commandLink>` execute is set to `@form`.\n\n![images](images/t0301.jpg)\n\
    \nThe following Ajax attributes are available to use with `<a4j:commandButton>`\
    \ and `<a4j:commandLink>` tags: `onbegin`, `onbeforedomupdate`, `oncomplete`,\
    \ `bypassUpdates`, `limitRender`, `data`, and `status`.\n\n![images](images/square.jpg)\
    \ **Note** `<a4j:commandLink>` works exactly the same as `<a4j:commandButton>`,\
    \ but instead of a button it will render a link."
