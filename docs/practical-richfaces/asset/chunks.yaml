    ## 关于技术审校


    ![image](img/jason_lee.jpg) ![image](img/square.jpg) **杰森·李**是甲骨文公司技术团队的高级成员，负责
    GlassFish 项目的管理控制台和 RESTful 管理接口团队。他拥有超过 14 年的专业经验，涉及从 Java AWT 桌面应用到企业级 Web 应用的多种语言和框架。自
    2005 年起，杰森便参与 JavaServer Faces 的开发，既是 JSF 参考实现 Mojarra 的提交者，也是 JSF 2.0 专家组的成员。他活跃于俄克拉荷马城
    Java 用户组，曾担任演讲者和前主席。他在 [`http://blogs.steeplesoft.com`](http://blogs.steeplesoft.com)
    上撰写关于各种技术的博客。杰森与妻子、两个儿子和一只拳师犬居住在俄克拉荷马州。


    ## 引言


    我们参与 JSF 和 RichFaces 的开发已有多年，包括多年教授 JSF 和 RichFaces 课程。根据我们的经验，我们意识到许多开发者在使用 RichFaces
    和 JSF 时，并未充分理解这些技术的全部潜力。缺乏这种理解，开发者就无法充分利用框架。


    当然，经过一些试错，几乎每个人都能让他们的应用程序以某种形式运行起来。然而，开发者往往不明白为什么他们的特定应用程序能工作。更重要的是，开发者会感到沮丧，并逐渐对这项技术产生反感。这就是我们编写《实用
    RichFaces》第二版的重要原因——提高开发者社区的理解水平，从而避免这种挫败感，让 RichFaces 和 JSF 作为优秀的技术得到应有的赏识。


    本书完全基于全新改进的 JSF 2，并涵盖了全新且大幅改进的 RichFaces 4。我们涵盖了 RichFaces 中所有你需要了解的最重要的概念、特性、标签和组件——全部集中在一处。虽然本书并未试图涵盖每个组件的每一个属性，但这其实并无必要。然而，通过本书你将获得对核心概念、特性和标签的扎实理解，我们保证你将能够使用任何
    RichFaces 组件。


    ### 谁应该阅读本书


    本书适合任何具备 JSF 基础知识、希望学习如何使用 RichFaces 构建基于 Ajax 的应用程序的读者。如果你对 JSF 完全陌生，我们建议先阅读一本关于
    JSF 2 的书籍。即使你已经在使用 RichFaces 4（或 RichFaces 3），本书也能填补许多知识空白。我们确信，在阅读本书的过程中，你至少会说一次：“我不知道
    RichFaces 还能做到这个！”或者“我不知道我还能这样做！”


    ## 第 1 章


    ## 基础知识


    欢迎阅读《实用 RichFaces》第二版。在你手中（或你的电脑/手机/平板电脑上），你已拥有使用 JSF 和 RichFaces 开始开发酷炫且丰富的 Ajax
    应用程序所需的一切。在第一章中，我们将简要介绍 JavaServer Faces (JSF)，因为 RichFaces 是 JSF 的一个框架。虽然我们假设你具备一些
    JSF 知识，但别担心——即使你刚刚入门，我们也确保本书中的材料和所有示例都非常易于理解。在介绍完 JSF 之后，我们将讨论 RichFaces：它的特性、背后的历史、它是如何起步的以及如今的发展状况。最后，我们将分享两个故事，帮助你使用
    JSF 时保持开放的心态，并提供一些使用服务器端框架的技巧。这些故事来自我们的个人经验，应该能帮助你成为更好的 JSF 和 RichFaces 开发者。


    ### 先给我讲讲 RichFaces！


    你购买这本书是为了学习 RichFaces，所以我们先插入这一小段，让你不必等待。然后我们将快速概述 JSF，再回来更详细地介绍 RichFaces。你可能认为
    RichFaces 只是一个丰富的组件库（这也没错）。但是，它的功能远不止于此。丰富的组件只是 RichFaces 提供的主要特性之一。RichFaces
    是一个用于 JSF 的丰富框架，提供两个标签库（`a4j:` 和 `rich:`）中的丰富和 Ajax 组件、皮肤功能、基于 JSR-303 Bean 验证的客户端验证扩展，以及
    CDK（组件开发工具包）。


    当然，你还会获得许多其他特性，我们将在本书中逐一介绍，例如高级渲染功能、事件处理选项和 Ajax 客户端队列优化。组件是你可以“感受和触摸”的东西，所以让我们快速举例说明
    RichFaces 提供了哪些类型的组件。


    `a4j:` 标签库提供了许多核心或基础组件，例如内置 Ajax 支持的按钮和链接、Ajax 轮询和 Ajax 状态。然而，在这个阶段，查看 `rich:`
    标签库中的组件示例会更有趣。在图 1-1 中，你可以看到一个丰富的选项卡面板和日历组件。


    ![images](img/0101.jpg)


    ***图 1-1.** RichFaces 选项卡面板和日历（blueSky 皮肤）*


    如果你正在阅读本书的电子版，那么图 1-1 将以浅蓝色显示。只需更改一个参数，我们就可以在 ruby 皮肤下渲染页面，如图 1-2 所示。图 1-2 的另一个区别是它还显示了一个可选的时间选择控件。每个组件都提供了大量的自定义选项。


    ![images](img/0102.jpg)


    ***图 1-2.** RichFaces 选项卡面板和带时间选择的日历（ruby 皮肤）*


    选项卡可以通过 Ajax 切换，日历中的上/下个月也是如此。让我们再看一个丰富的组件，如图 1-3 所示。它显示了一个丰富的原地输入组件，展示了三种状态。原地输入最初渲染为标签（第一个组件）；点击后，它切换为输入框（第二个组件）；编辑完成后，又变回标签（第三个组件）。


    ![images](img/0103.jpg)


    ***图 1-3.** 丰富的原地输入组件（显示三种模式）*


    我们希望你现在对 RichFaces 能做什么有了一个概念。请相信我们，它能做的远不止这些。现在我们将短暂绕道，向你介绍一些关于 JSF 的知识。为什么？因为
    RichFaces 是一个 JSF 框架，它完全基于 JSF，因此了解底层框架的工作原理非常重要。


    ### 什么是 JSF？


    让我们从最简单的定义开始。JSF 只是一个用于构建 Web 应用程序的框架。更具体一点，我们构建的是基于浏览器或 HTML 的应用程序，不涉及任何插件。你可能在想，至少有几十个其他框架也符合这个描述。JSF
    有许多特性使其不同于其他框架。让我们来回顾一下。


    #### JSF 应用程序由 UI 组件构建而成


    JSF 是一个 Java 框架，用于通过可重用组件构建基于浏览器的用户界面 (UI)。JSF 的重点在于 UI 组件。使用 UI 组件时，你无需直接处理 HTML
    标记，因为 JSF 和其他丰富的组件将提供构建应用程序所需的所有 UI 小部件。然而，HTML 标签在页面布局中仍然扮演着重要角色。在组件内部，渲染器（用于生成
    HTML 的 Java 类）负责生成适当的标记。由于你正在构建 Web 应用程序，而客户端基本上就是浏览器，因此所需的标记是 HTML（尽管它可以是任何东西，如
    WML、SGL 甚至 XML），因此组件的渲染器将生成发送到客户端（浏览器）的 HTML 标记。

