    和 `<h:graphicImage>`。如果您将工具提示作为子组件添加到此类组件且未提供 ID，它将无法工作，因为找不到要附加的元素。为组件添加工具提示需要存在客户端
    ID。因此，一个好的做法是始终为父组件添加 ID。


    您可以在工具提示内包含任何其他 JSF 组件。让我们添加服务器时间、工具提示调用计数器以及一张图片。如清单 6-43 所示，我们将使用 *`mode="ajax"`*，因此每次显示工具提示时，时间和计数器都应更新。


