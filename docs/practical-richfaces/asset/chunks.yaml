    ***清单 3-2.** 使用链接代替按钮*


    `<h:form>`

    `...`

    `   <h:commandLink value="Send">`

    `     <f:ajax event="click" render="out"/>`

    `   </h:commandLink>`

    `   <h:outputText id="out"/>`

    `</h:form>`


    在这两个示例中，当点击按钮时，会触发一个 Ajax 请求，并且 id 为 `out` 的组件会被重新渲染。在大多数情况下，你会有一组输入字段和一个用于提交它们的按钮，如清单
    3-3 所示。


