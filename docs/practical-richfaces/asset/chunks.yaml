  raw: '#### Calendar Internationalization


    The calendar component provides very rich UI, as shown in [Figure 5-32](#Chapter05.html#fig_5_32),
    and comes with a large number of text labels and other internal controls. This
    brings us to a very important calendar feature: internationalization support.
    [Table 5-8](#Chapter05.html#tab_5_8) shows attributes that are available in order
    to customize labels related to the dates pop-up representation.


    ![images](images/t0508.jpg)


    By default, values from [Table 5-8](#Chapter05.html#tab_5_8) are set with data
    from current `Locale` and should be used only if you want to define custom labels.


    We also need to handle all the UI labels localization. The calendar component
    does not provide attributes for all the labels available on the component. The
    reason is rather simple. The set of the labels is very large and defining them
    all on the page would make the component look “heavy.” Thus, the component uses
    message bundles for getting predefined localization properties. [Table 5-9](#Chapter05.html#tab_5_9)
    lists available calendar properties.


    ![images](images/t0509.jpg)


    ![images](images/t0509a.jpg)


    These properties could be defined in either one of the two places, the choice
    is up to the developer. It could be an application message bundle (registered
    in a JSF configuration file) or it could be a separate message bundle that should
    be placed in an `org.richfaces.renderkit` package with name `calendar.properties`.


    Let''s look at an example shown in [Figure 5-33](#Chapter05.html#fig_5_33) using
    the component with an Italian locale.


    ![images](images/0533.jpg)


    ***Figure 5-33.** <rich_calendar> with Italian locale*


    In order to achieve that, we created a `bundle_it.properties` file in a Java source
    root folder with content from [Listing 5-28](#Chapter05.html#list_5_28).


    ***Listing 5-28.** Creating a `bundle_it.properties` file in a Java source root
    folder*


    `RICH_CALENDAR_APPLY_LABEL=Applica`

    `RICH_CALENDAR_TODAY_LABEL=Oggi`

    `RICH_CALENDAR_CLEAN_LABEL=Reimposta`

    `RICH_CALENDAR_CANCEL_LABEL=Annulla`

    `RICH_CALENDAR_OK_LABEL=Ok`

    `RICH_CALENDAR_CLOSE_LABEL=Chiudi`


    Next, we added the registered file in *`faces-config.xml`*.


    `<application>`

    `   <message-bundle>bundle</message-bundle>`

    `</application>`


    And now set the calendar to use an Italian locale.


    `<rich_calendar datePattern="dd/M/yy hh:mm:ss" locale="it"/>`


    ![images](images/square.jpg) **Note** There is no need for explicit definitions
    of the locale attribute in most cases. Applying current locale will affect all
    calendars and corresponding bundles will be used for all of them. You should just
    provide those bundles.


    #### Server-side Customization with CalendarDataModel


    The calendar component supports a data model definition that allows customizing
    month markup according to a custom data model. In order to create a data model,
    we need to implement two interfaces: `CalendarDataModel` and `CalendarDataModelItem`.
    The class that implements `CalendarDataModel` will have the `getData` method implemented
    and responsible for returning instances (a range of dates, for example) of `CalendarDataModelItem`
    for a given date range. Each `CalendarDataModelItem` represents one calendar day.
    It also defines a `getTooltip` reserved method that will be used for future tooltip
    implementations. `CalendarDataModelItem` implementation has methods listed in
    [Table 5-10](#Chapter05.html#tab_5_10).


    ![images](images/t0510.jpg)


    All methods listed will be called by the calendar during month data-fetching in
    order to apply customizations to every date cell.


    The calendar component works in two modes: Ajax and client. In client mode, the
    calendar switches between months on the client side, rebuilding the month markup
    every time it is switched on. In Ajax mode, new month data is fetched from the
    server. The `dataModel` is used in both cases if defined. In Ajax mode it''s called
    when switching between months to load new months'' data. For client mode we have
    to specify `preloadDateRangeBegin` and `preloadDateRangeEnd` attributes. Those
    attributes define a range of dates for which the data model will be loaded to
    the client. Then it will be used to construct the month on the client.


    Let''s look at an example of data model usage. We will use Ajax mode. The data
    model will define simple rules, as follows:


    *   Dates that are before the current date are disabled and styled correspondingly.

    *   Tuesdays and Thursdays are considered “busy” days that are disabled and styled
    in a special way.

    *   Saturdays and Sundays are disabled and also will have a special style.


    [Listing 5-29](#Chapter05.html#list_5_29) shows the JSF page code.


    ***Listing 5-29.** The JSF page code*


    `<style>`

    `   .bdc {`

    `      background-color: gray;`

    `   }`

    `   .wdc {`

    `      font-weight: bold;`

    `      font-style: italic;`

    `   }`

    `</style>`

    `<h:form>`

    `   <rich_calendar mode="ajax" popup="false"`

    `      dataModel="#{calendarModel}" />`

    `</h:form>`


    ![images](images/square.jpg) **Note** Don''t forget to place `<rich_calendar>`
    inside `<h:form>` when using Ajax mode.


    The managed bean code is shown in [Listing 5-30](#Chapter05.html#list_5_30).


    ***Listing 5-30.** The managed bean code*


    `@ManagedBean`

    `@ApplicationScoped`

    `public class CalendarModel implements CalendarDataModel {`

    `   private static final String WEEKEND_DAY_CLASS = "wdc";`

    `   private static final String BUSY_DAY_CLASS = "bdc";`

    `   private static final String BOUNDARY_DAY_CLASS = "rf-ca-boundary-dates";`


    `   private boolean checkBusyDay(Calendar calendar) {`

    `      return (calendar.get(Calendar.DAY_OF_WEEK) == Calendar.TUESDAY ||`

    `      calendar.get(Calendar.DAY_OF_WEEK) == Calendar.THURSDAY);`

    `   }`


    `   private boolean checkWeekend(Calendar calendar) {`

    `      return (calendar.get(Calendar.DAY_OF_WEEK) == Calendar.SUNDAY ||`

    `      calendar.get(Calendar.DAY_OF_WEEK) == Calendar.SATURDAY);`

    `   }`'
  trans: '

    #### 日历国际化


    日历组件提供了非常丰富的用户界面，如图 5-32 所示，并附带大量文本标签和其他内部控件。这引出了一个非常重要的日历特性：国际化支持。表 5-8 展示了可用于自定义与日期弹出表示相关标签的属性。


    ![images](img/t0508.jpg)


    默认情况下，表 5-8 中的值使用当前 `Locale` 的数据设置，仅当您想定义自定义标签时才应使用。


    我们还需要处理所有用户界面标签的本地化。日历组件并未为组件上所有可用的标签提供属性。原因很简单。标签集非常庞大，在页面上全部定义会使组件显得“臃肿”。因此，该组件使用消息包来获取预定义的本地化属性。表
    5-9 列出了可用的日历属性。


    ![images](img/t0509.jpg)


    ![images](img/t0509a.jpg)


    这些属性可以在以下两个位置之一定义，选择权在于开发者。可以是应用程序消息包（在 JSF 配置文件中注册），也可以是单独的消息包，应放置在 `org.richfaces.renderkit`
    包中，并命名为 `calendar.properties`。


    让我们来看一个示例，如图 5-33 所示，该示例使用了意大利语区域的组件。


    ![images](img/0533.jpg)


    ***图 5-33.** 使用意大利语区域的 <rich_calendar>*


    为了实现这一点，我们在 Java 源代码根文件夹中创建了一个 `bundle_it.properties` 文件，其内容如 清单 5-28 所示。


    ***清单 5-28.** 在 Java 源代码根文件夹中创建 `bundle_it.properties` 文件*


    `RICH_CALENDAR_APPLY_LABEL=Applica`

    `RICH_CALENDAR_TODAY_LABEL=Oggi`

    `RICH_CALENDAR_CLEAN_LABEL=Reimposta`

    `RICH_CALENDAR_CANCEL_LABEL=Annulla`

    `RICH_CALENDAR_OK_LABEL=Ok`

    `RICH_CALENDAR_CLOSE_LABEL=Chiudi`


    接下来，我们在 *`faces-config.xml`* 中添加了已注册的文件。


    `<application>`

    `   <message-bundle>bundle</message-bundle>`

    `</application>`


    现在，将日历设置为使用意大利语区域。


    `<rich_calendar datePattern="dd/M/yy hh:mm:ss" locale="it"/>`


    ![images](img/square.jpg) **注意** 在大多数情况下，无需显式定义 locale 属性。应用当前区域设置将影响所有日历，并且相应的包将用于所有日历。您只需提供这些包即可。


    #### 使用 CalendarDataModel 进行服务器端定制


    日历组件支持数据模型定义，允许根据自定义数据模型自定义月份标记。为了创建数据模型，我们需要实现两个接口：`CalendarDataModel` 和 `CalendarDataModelItem`。实现
    `CalendarDataModel` 的类将实现 `getData` 方法，并负责为给定的日期范围返回 `CalendarDataModelItem` 实例（例如，一个日期范围）。每个
    `CalendarDataModelItem` 代表一个日历日。它还定义了一个 `getTooltip` 保留方法，该方法将用于未来的工具提示实现。`CalendarDataModelItem`
    实现具有 表 5-10 中列出的方法。


    ![images](img/t0510.jpg)


    在月份数据获取期间，日历将调用列出的所有方法，以便对每个日期单元格应用自定义设置。


    日历组件以两种模式工作：Ajax 模式和客户端模式。在客户端模式下，日历在客户端切换月份，每次切换时都会重建月份标记。在 Ajax 模式下，新的月份数据从服务器获取。如果定义了
    `dataModel`，则在两种情况下都会使用它。在 Ajax 模式下，切换月份以加载新月份数据时会调用它。对于客户端模式，我们必须指定 `preloadDateRangeBegin`
    和 `preloadDateRangeEnd` 属性。这些属性定义了数据模型将加载到客户端的日期范围。然后，它将用于在客户端构建月份。


    让我们看一个数据模型使用的示例。我们将使用 Ajax 模式。数据模型将定义简单的规则，如下所示：


    *   当前日期之前的日期被禁用并具有相应的样式。

    *   星期二和星期四被视为“忙碌”日，被禁用并以特殊方式设置样式。

    *   星期六和星期日被禁用，并且也将具有特殊样式。


    清单 5-29 显示了 JSF 页面代码。


    ***清单 5-29.** JSF 页面代码*


    `<style>`

    `   .bdc {`

    `      background-color: gray;`

    `   }`

    `   .wdc {`

    `      font-weight: bold;`

    `      font-style: italic;`

    `   }`

    `</style>`

    `<h:form>`

    `   <rich_calendar mode="ajax" popup="false"`

    `      dataModel="#{calendarModel}" />`

    `</h:form>`


    ![images](img/square.jpg) **注意** 使用 Ajax 模式时，不要忘记将 `<rich_calendar>` 放在 `<h:form>`
    内部。


    托管 bean 代码如 清单 5-30 所示。


    ***清单 5-30.** 托管 bean 代码*


    `@ManagedBean`

    `@ApplicationScoped`

    `public class CalendarModel implements CalendarDataModel {`

    `   private static final String WEEKEND_DAY_CLASS = "wdc";`

    `   private static final String BUSY_DAY_CLASS = "bdc";`

    `   private static final String BOUNDARY_DAY_CLASS = "rf-ca-boundary-dates";`


    `   private boolean checkBusyDay(Calendar calendar) {`

    `      return (calendar.get(Calendar.DAY_OF_WEEK) == Calendar.TUESDAY ||`

    `      calendar.get(Calendar.DAY_OF_WEEK) == Calendar.THURSDAY);`

    `   }`


    `   private boolean checkWeekend(Calendar calendar) {`

    `      return (calendar.get(Calendar.DAY_OF_WEEK) == Calendar.SUNDAY ||`

    `      calendar.get(Calendar.DAY_OF_WEEK) == Calendar.SATURDAY);`

    `   }`

