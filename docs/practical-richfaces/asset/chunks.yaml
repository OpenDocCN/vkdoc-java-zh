    ***Listing 12-19.** Using a built-in jQuery `hide()` function to hide the panel*\n\
    \n```\n<input type=\"button\" id=\"showButton\" value=\"Show panel\"/>\n<rich:jQuery\
    \ selector=\"#showButton\" event=\"click\" query=\"$('#nycInfo').show()\"/>\n\
    ```\n\nWhile using `event` attributes to define the query as an event handler,\
    \ you might want to define the binding type because jQuery allows different binding\
    \ types for event handlers. The `attachType` attribute is used for that. `bind`\
    \ type is the default type and means that the event handler will be bound to all\
    \ elements returned by the selector and currently present on the page. `live`\
    \ type works the same as `bind` and also means that the event handler defined\
    \ in the query will be bound to all elements that will appear on the page later\
    \ (for example, created using JavaScript or loaded via Ajax). And `one` type means\
    \ the event handler is bound to all elements currently defined by the `selector`\
    \ attribute. After the first invocation of the event, the handler of `one` type\
    \ is unbound such that it no longer fires when the event occurs.\n\nEverything\
