    \ API方法。\n\n![images](images/t0603.jpg)\n\n## 使用`<rich:accordion>`\n\n`<rich:accordion>`允许您创建一组面板，当选择打开特定面板时，当前打开的面板会关闭或折叠。每个面板的内容可以预渲染到客户端。这意味着当您打开或关闭面板时，更改仅发生在客户端（浏览器）。这是`switchType\
    \ = \"client\"`的示例。除了客户端切换类型外，还可以使用`ajax`（当前默认类型）和`server`（完整页面重新加载）模式切换组件。请注意，此组件必须放在表单内才能正常工作。\n\
    \n使用该组件相当简单。一个手风琴由一个或多个手风琴项组成，如[清单6-15](#Chapter06.html#list_6_15)所示。\n\n**清单6-15.**\
    \ 一个手风琴由一个或多个手风琴项组成\n\n```\n<h:form>\n   <rich:panel style=\"width:550px\" header=\"\
    Using rich:accordion\">\n      <rich:accordion>\n         <rich:accordionItem\
    \ header=\"New York\">\n            Statue of Liberty\n         </rich:accordionItem>\n\
    \         <rich:accordionItem header=\"San Francisco\">\n            Golden Gate\
    \ Bridge\n         </rich:accordionItem>\n         <rich:accordionItem header=\"\
    Los Angeles\">\n            Hollywood\n         </rich:accordionItem>\n      </rich:accordion>\n\
    \   </rich:panel>\n</h:form>\n```\n\n结果如[图6-14](#Chapter06.html#fig_6_14)所示。\n\
    \n![images](images/0614.jpg)\n\n**图6-14.** 简单的手风琴控件\n\n要为每个手风琴项定义标题，面板使用名为`header`的facet或属性。当需要自定义标题以包含不仅仅是简单文本（如图像或更复杂的内容）时，facet非常有用。对于更简单的文本情况，可以使用`header`属性。与任何面板一样，您可以在每个手风琴项内放置任何内容。\n\
    \n[图6-15](#Chapter06.html#fig_6_15)显示了一个具有更复杂布局和先前面板中已使用的一些自定义设置的组件示例。\n\n![images](images/0615.jpg)\n\
    \n**图6-15.** 自定义的手风琴控件\n\n[清单6-16](#Chapter06.html#list_6_16)显示了所使用的代码。\n\n**清单6-16.**\
    \ 用于自定义手风琴控件的代码\n\n```\n<h:form>\n   <rich:panel style=\"width:500px\" header=\"\
    Using rich:accordion\">\n      <rich:accordion itemRightIconInactive=\"chevronUp\"\
    \n         itemRightIconActive=\"chevronDown\" itemRightIconDisabled=\"grid\"\
    >\n         <rich:accordionItem>\n            <f:facet name=\"header\">\n    \
    \           <h:panelGrid columns=\"2\">\n                  <h:outputText value=\"\
    New York City\" />\n                  <h:graphicImage value=\"/images/yellow_lamp.gif\"\
    \ />\n               </h:panelGrid>\n            </f:facet>\n            <h:graphicImage\
    \ value=\"/images/NY-flag.png\"\n               style=\"float:right\" />\n   \
    \         New York City (officially The City of New York) is the most\n      \
    \      populous city in the United States, with its metropolitan area\n      \
    \      ranking among the largest urban areas in the world.\n         </rich:accordionItem>\n\
    \         ...\n         <rich:accordionItem disabled=\"true\">\n            ...\n\
    \         </rich:accordionItem>\n      </rich:accordion>\n   </rich:panel>\n</h:form>\n\
    ```\n\n从[清单6-13](#Chapter06.html#list_6_13)的代码可以看出，可以通过设置`disabled=\"true\"`属性来禁用手风琴项。[清单6-17](#Chapter06.html#list_6_17)显示了如何为手风琴项标题定义图标。\n\
    \n**清单6-17.** 显示如何为手风琴项标题定义图标\n\n```\n<h:form>\n   <rich:accordion itemRightIconInactive=\"\
    chevronUp\"\n      itemRightIconActive=\"chevronDown\"\n      itemRightIconDisabled=\"\
    grid\">\n      ...\n   </rich:accordion>\n</h:form>\n```\n\n对于定义面板图标，您可以使用如[清单6-17](#Chapter06.html#list_6_17)所示的RichFaces内置图标。要使用自定义图标，可以将图标属性指向自定义图像URI。该组件还提供了将图标定位在手风琴项或组的左侧或右侧的属性。完整的内置图标名称和定位属性列表可在RichFaces文档中找到，网址为http://jboss.org/richfaces/docs。\n\
    \n与其他面板一样，可以通过`activeItem`属性在状态集之间切换，该属性保存所选项目的名称，并且可以绑定到EL以在运行时控制选择。面板切换模式与我们介绍的其他面板类似：`ajax`、`server`或`client`。当使用`ajax`和`server`模式时，组件会触发服务器端`org.richfaces.event.ItemChangeEvent`事件，并提供`itemChangeListener`属性，用于定义处理该事件的监听器。[清单6-18](#Chapter06.html#list_6_18)显示了如何在组件上定义监听器。\n\
    \n**清单6-18.** 显示如何在组件上定义监听器\n\n```\n<h:form>\n   <rich:accordion activeItem=\"\
    sf\"\n      itemChangeListener=\"#{panelsBean.processAccordionChange}\"\n    \
    \  switchType=\"ajax\">\n      ...\n   </rich:accordion>\n</h:form>\n```\n\n[清单6-19](#Chapter06.html#list_6_19)显示了托管bean中监听器的代码。\n\
    \n![images](images/square.jpg) **注意** 在ajax和server模式下，手风琴必须放在表单内。\n\n**清单6-19.**\
    \ 显示托管bean中监听器的代码\n\n```\n@ManagedBean\n@RequestScoped\npublic class PanelsBean\
    \ {\n   public void processAccordionChange(ItemChangeEvent event){\n      // Process\
    \ the event...\n   }\n}\n```\n\n# JavaScript API\n\n`<rich:accordion>`组件提供了[表6-4](#Chapter06.html#tab_6_4)中所示的JavaScript\
    \ API方法。\n\n![images](images/t0604.jpg)"
  raw: '#### JavaScript API


    The *`<rich:tabPanel>`* component provides the JavaScript API methods shown in
    [Table 6-3](#Chapter06.html#tab_6_3).


    ![images](images/t0603.jpg)


    ### Using <rich:accordion>


    *`<rich:accordion>`* allows you to create a set of panels that can be switched
    when a particular panel is selected to be opened and the currently opened panel
    is closed or collapsed. Content for each panel could be pre-rendered to the client.
    This means when you open or close the panels, the change occurs only on the client
    (the browser). This is an example of *`switchType = "client"`*. In addition to
    client switch type, the component can also be switched by using *`ajax (default
    type now)`* and *`server`* (full page reload) modes. Note that this component
    has to be inside a form to work properly.


    Using the component is rather simple. An accordion consists of one or more accordion
    items, as shown in [Listing 6-15](#Chapter06.html#list_6_15).


    ***Listing 6-15.** An accordion consists of one or more accordion items*


    `<h:form>`

    `   <rich:panel style="width:550px" header="Using rich:accordion">`

    `      <rich:accordion>`

    `         <rich:accordionItem header="New York">`

    `            Statue of Liberty`

    `         </rich:accordionItem>`

    `         <rich:accordionItem header="San Francisco">`

    `            Golden Gate Bridge`

    `         </rich:accordionItem>`

    `         <rich:accordionItem header="Los Angeles">`

    `            Hollywood`

    `         </rich:accordionItem>`

    `      </rich:accordion>`

    `   </rich:panel>`

    `</h:form>`


    The result is shown in [Figure 6-14](#Chapter06.html#fig_6_14).


    ![images](images/0614.jpg)


    ***Figure 6-14.** Simple accordion control*


    To define a header for each accordion item, a facet or attribute with the *`header`*
    name is used for panels. A facet is useful when you need to customize the header
    to include more than just simple text, such as images or more complex content.
    And for simpler text cases, you can use the *`header`* attribute. As with any
    panel, you can place any content inside each accordion item.


    [Figure 6-15](#Chapter06.html#fig_6_15) shows a sample of the component with a
    more complex layout and some customization already used in previous panels.


    ![images](images/0615.jpg)


    ***Figure 6-15.** Customized accordion control*


    [Listing 6-16](#Chapter06.html#list_6_16) shows the code used.


    ***Listing 6-16.** Code used to customize accordion control*


    `<h:form>`

    `   <rich:panel style="width:500px" header="Using rich:accordion">`

    `      <rich:accordion itemRightIconInactive="chevronUp"`

    `         itemRightIconActive="chevronDown" itemRightIconDisabled="grid">`

    `         <rich:accordionItem>`

    `            <f:facet name="header">`

    `               <h:panelGrid columns="2">`

    `                  <h:outputText value="New York City" />`

    `                  <h:graphicImage value="/images/yellow_lamp.gif" />`

    `               </h:panelGrid>`

    `            </f:facet>`

    `            <h:graphicImage value="/images/NY-flag.png"`

    `               style="float:right" />`

    `            New York City (officially The City of New York) is the most`

    `            populous city in the United States, with its metropolitan area`

    `            ranking among the largest urban areas in the world.`

    `         </rich:accordionItem>`

    `         ...`

    `         <rich:accordionItem disabled="true">`

    `            ...`

    `         </rich:accordionItem>`

    `      </rich:accordion>`

    `   </rich:panel>`

    `</h:form>`


    As you can see from the code in [Listing 6-13](#Chapter06.html#list_6_13), an
    accordion item can be disabled by setting *`disabled="true"`* attribute. [Listing
    6-17](#Chapter06.html#list_6_17) shows how to define icons for the accordion item
    headers.


    ***Listing 6-17.** Shows how to define icons for the accordion item headers*


    `<h:form>`

    `   <rich:accordion itemRightIconInactive="chevronUp"`

    `      itemRightIconActive="chevronDown"`

    `      itemRightIconDisabled="grid">`

    `      ...`

    `   </rich:accordion>`

    `</h:form>`


    For defining panel icons, you can use RichFaces built-in icons as shown in [Listing
    6-17](#Chapter06.html#list_6_17). To use custom icons, you can point icon attributes
    to a custom image URI. The component also offers attributes to position the icons
    on either the left or right side on the accordion item or group. A complete list
    of built-in icon names and positioning attributes can be found in RichFaces documentation
    available at http://jboss.org/richfaces/docs.


    As with other panels, switching between sets of states is possible via the *`activeItem`*
    attribute, which holds the name of the selected item, and can be bound to EL to
    control the selection in runtime. The panel switch modes are similar to other
    panels we covered: *`ajax`*, *`server`*, or *`client`* . When using *`ajax`* and
    `server` modes, the component fires a server-side *`org.richfaces.event.ItemChangeEvent`*
    event and provides an *`itemChangeListener`* attribute that is used to define
    the listener that will process it. [Listing 6-18](#Chapter06.html#list_6_18) shows
    how the listener is defined on the component.


    ***Listing 6-18.** Shows how the listener is defined on the component*


    `<h:form>`

    `   <rich:accordion activeItem="sf"`

    `      itemChangeListener="#{panelsBean.processAccordionChange}"`

    `      switchType="ajax">`

    `      ...`

    `   </rich:accordion>`

    `</h:form>`


    [Listing 6-19](#Chapter06.html#list_6_19) shows the code for the listener inside
    the managed bean.


    ![images](images/square.jpg) **Caution** The accordion has to be placed inside
    a form in ajax and server mode.


    ***Listing 6-19.** Shows the code for the listener inside the managed bean*


    `@ManagedBean`

    `@RequestScoped`

    `public class PanelsBean {`

    `   public void processAccordionChange(ItemChangeEvent event){`

    `      // Process the event...`

    `   }`

    `}`


    #### JavaScript API


    The *`<rich:accordion>`* component provides the JavaScript API methods shown in
    [Table 6-4](#Chapter06.html#tab_6_4).


    ![images](images/t0604.jpg)'
