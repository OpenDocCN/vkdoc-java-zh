- fmt: "### Using `<rich:collapsiblePanel>`\n\n`<rich:collapsiblePanel>` is similar\
    \ to the `<rich:panel>` component with the additional functionality of being closed\
    \ or open. [Listing 6-5](#Chapter06.html#list_6_5) shows an example.\n\n**Listing\
    \ 6-5.** `<rich:collapsiblePanel> example`\n\n```\n<h:form>\n   <rich:collapsiblePanel\
    \ width=\"450px\" switchType=\"ajax\" header=\"New York City\">\n   New York City\
    \ (officially The City of New York) is the most populous city\n   in the United\
    \ States, with its metropolitan area ranking among the largest\n   urban areas\
    \ in the world. It has been the largest city in the United\n   States since 1790,\
    \ and was the country's first capital city and the site\n   of George Washington's\
    \ inauguration as the first president of the United\n   States...\n   </rich:collapsiblePanel>\n\
    </h:form>\n```\n\nYou can see in [Figure 6-5](#Chapter06.html#fig_6_5) and [Figure\
    \ 6-6](#Chapter06.html#fig_6_6) how the panel will look collapsed and expanded.\
    \ In order to change the state of the panel, you can click anywhere in header.\n\
    \n![images](images/0605.jpg)\n\n**Figure 6-5.** Expanded panel\n\n![images](images/0606.jpg)\n\
    \n**Figure 6-6.** Collapsed panel\n\n![images](images/square.jpg) **Note** As\
    \ the panel has two states (open/close) you have the option to define different\
    \ content for the header using two facets: `headerExpanded` (when open) and `headerCollapsed`\
    \ (when closed). When using the `header` attribute, the header label will stay\
    \ the same whether opened or closed.\n\nNow let's change the indication icons\
    \ in the header of the panel by using the other icons, as shown in [Listing 6-6](#Chapter06.html#list_6_6).\n\
    \n**Listing 6-6.** Changing the indication icons\n\n```\n<rich:collapsiblePanel\
    \ rightCollapsedIcon=\"triangleUp\"\n   leftCollapsedIcon=\"/images/yellow_lamp.gif\"\
    \n   leftExpandedIcon=\"/images/yellow_lamp.gif \"\n   rightExpandedIcon=\"triangleDown\"\
    \ style=\"width:450px\" switchType=\"ajax\"\n   header=\"New York City\">\n```\n\
    \nThe result is shown in [Figures 6-7](#Chapter06.html#fig_6_7) and [6-8](#Chapter06.html#fig_6_8).\n\
    \n![images](images/0607.jpg)\n\n**Figure 6-7.** Expanded panel with customized\
    \ and repositioned indication icon\n\n![images](images/0608.jpg)\n\n**Figure 6-8.**\
    \ Collapsed panel with customized and repositioned indication icon\n\nIn addition\
    \ to the values of `triangleUp` and `triangleDown`, `leftcollapsedIcon` and `rightCollapsed-Icon`\
    \ attributes can be set to the following predefined icons: `disc`, `grid`, `chevron`,\
    \ `triangle`, `chevronUp`, `chevronDown`, `none`, and `transparent`. `none` means\
    \ there will be no icon and `transparent` helps the header look consistent when\
    \ some panels use icons and others don't.\n\n![images](images/square.jpg) **Note**\
    \ The built-in icons could be used across all the panels and some other components,\
    \ such as `<rich:accordion>`, `<rich:panelMenu>`, and so on (some components are\
    \ planned to be added with support after the first 4.0 release), which provide\
    \ icon attributes. You will see some of them used later in this and other chapters.\
    \ It's also possible to use custom icons—simply provide URI to the icon images,\
    \ as shown in [Listing 6-6](#Chapter06.html#list_6_6). Also as you can see, you\
    \ should use attributes in pairs to define left and right icons for both states.\n\
    \nLet's switch our attention to the `switchType` attribute used in [Listing 6-6](#Chapter06.html#list_6_6).\
    \ There are three switch types available, which are listed in [Table 6-1](#Chapter06.html#tab_6_1).\n\
    \n![images](images/t0601.jpg)\n\n![images](images/square.jpg) **Caution** `<rich:collapsiblePanel>`\
    \ and all the other switchable panels require `<h:form>` around them in server\
    \ and Ajax modes to perform a submit. Also note that it's not possible to place\
    \ a form inside each panel.\n\nIn Ajax and server modes, components will fire\
    \ `org.richfaces.event.PanelToggleEvent`, which could be processed similarly to\
    \ button and link action events by using the listener defined in the `panelToggleListener`\
    \ attribute, as shown in [Listings 6-7](#Chapter06.html#list_6_7) and [6-8](#Chapter06.html#list_6_8).\n\
    \n![images](images/square.jpg) **Note** All the Ajax request customization and\
    \ optimization attributes described in [Chapter 3](#Chapter03.html#ch3) can be\
    \ used for the panel when switch mode is `Ajax`.\n\n**Listing 6-7.** Using the\
    \ listener defined in the `panelToggleListener` attribute\n\n```\n<rich:collapsiblePanel\
    \ switchType=\"ajax\" expanded=\"#{cityBean.isOpen}\"\n   panelToggleListener=\"\
    #{bean.loadPanelData}\">\n   ...\n</rich:collapsiblePanel>\n```\n\n**Listing 6-8.**\
    \ Using `org.richfaces.event.PanelToggleEvent`\n\n```\nprivate void loadPanelData(PanelToggleEvent\
    \ event){\n   //refresh panel data if needed on expand, for example\n}\n```\n\n\
    To control whether the component is closed or opened when rendered for the first\
    \ time, simply set the `expanded` attribute to either `true` or `false`, as follows:\n\
    \n```\n<rich:collapsiblePanel switchType=\"ajax\" expanded=\"false\">\n```\n\n\
    You can also point to an EL expression to control the attribute inside the managed\
    \ bean, as follows:\n\n```\n<rich:collapsiblePanel switchType=\"ajax\" expanded=\"\
    #{cityBean.isOpen}\">\n```\n\n#### JavaScript API\n\nThe component currently provides\
    \ only one JavaScript API method, `switchPanel()`, which can be invoked on the\
    \ client and switch the current state to opposite. Check the “RichFaces Component\
    \ Reference” at `www.jboss.org/richfaces/docs` for new methods added by the RichFaces\
    \ team."
  raw: '### Using <rich:collapsiblePanel>


    `<rich:collapsiblePanel>` is similar to the `<rich:panel>` component with the
    additional functionality of being closed or open. [Listing 6-5](#Chapter06.html#list_6_5)
    shows an example.


    ***Listing 6-5.** `<rich:collapsiblePanel> example`*


    `<h:form>`

    `   <rich:collapsiblePanel width="450px" switchType="ajax" header="New York City">`

    `   New York City (officially The City of New York) is the most populous city`

    `   in the United States, with its metropolitan area ranking among the largest`

    `   urban areas in the world. It has been the largest city in the United`

    `   States since 1790, and was the country''s first capital city and the site`

    `   of George Washington''s inauguration as the first president of the United`

    `   States...`

    `   </rich:collapsiblePanel>`

    `</h:form>`


    You can see in [Figure 6-5](#Chapter06.html#fig_6_5) and [Figure 6-6](#Chapter06.html#fig_6_6)
    how the panel will look collapsed and expanded. In order to change the state of
    the panel, you can click anywhere in header.


    ![images](images/0605.jpg)


    ***Figure 6-5.** Expanded panel*


    ![images](images/0606.jpg)


    ***Figure 6-6.** Collapsed panel*


    ![images](images/square.jpg) **Note** As the panel has two states (open/close)
    you have the option to define different content for the header using two facets:
    `headerExpanded` (when open) and `headerCollapsed` (when closed). When using the
    header attribute, the header label will stay the same whether opened or closed.


    Now let''s change the indication icons in the header of the panel by using the
    other icons, as shown in [Listing 6-6](#Chapter06.html#list_6_6).


    ***Listing 6-6.** Changing the indication icons*


    `<rich:collapsiblePanel` ***`rightCollapsedIcon="triangleUp"`***

    ***`   leftCollapsedIcon="/images/yellow_lamp.gif"`***

    ***`   leftExpandedIcon="/images/yellow_lamp.gif "`***

    ***`   rightExpandedIcon="triangleDown"`*** `style="width:450px" switchType="ajax"`

    `   header="New York City">`


    The result is shown in [Figures 6-7](#Chapter06.html#fig_6_7) and [6-8](#Chapter06.html#fig_6_8).


    ![images](images/0607.jpg)


    ***Figure 6-7.** Expanded panel with customized and repositioned indication icon*


    ![images](images/0608.jpg)


    ***Figure 6-8.** Collapsed panel with customized and repositioned indication icon*


    In addition to the values of `triangleUp` and `triangleDown`, `leftcollapsedIcon`
    and `rightCollapsed-Icon` attributes can be set to the following predefined icons:
    `disc`, `grid`, `chevron`, `triangle`, `chevronUp`, `chevronDown`, `none`, and
    `transparent`. `none` means there will be no icon and `transparent` helps the
    header look consistent when some panels use icons and others don''t.


    ![images](images/square.jpg) **Note** The built-in icons could be used across
    all the panels and some other components, such as `<rich:accordion>`, `<rich:panelMenu>`,
    and so on (some components are planned to be added with support after the first
    4.0 release), which provide icon attributes. You will see some of them used later
    in this and other chapters. It''s also possible to use custom icons—simply provide
    URI to the icon images, as shown in [Listing 6-6](#Chapter06.html#list_6_6). Also
    as you can see, you should use attributes in pairs to define left and right icons
    for both states.


    Let''s switch our attention to the `switchType` attribute used in [Listing 6-6](#Chapter06.html#list_6_6).
    There are three switch types available, which are listed in [Table 6-1](#Chapter06.html#tab_6_1).


    ![images](images/t0601.jpg)


    ![images](images/square.jpg) **Caution** `<rich:collapsiblePanel>` and all the
    other switchable panels require `<h:form>` around them in server and Ajax modes
    to perform a submit. Also note that it''s not possible to place a form inside
    each panel.


    In Ajax and server modes, components will fire `org.richfaces.event.PanelToggleEvent`,
    which could be processed similarly to button and link action events by using the
    listener defined in the *`panelToggleListener`* attribute, as shown in [Listings
    6-7](#Chapter06.html#list_6_7) and [6-8](#Chapter06.html#list_6_8).


    ![images](images/square.jpg) **Note** All the Ajax request customization and optimization
    attributes described in [Chapter 3](#Chapter03.html#ch3) can be used for the panel
    when switch mode is *`Ajax`*.


    ***Listing 6-7.** Using the listener defined in the* `panelToggleListener` *attribute*


    `<rich:collapsiblePanel switchType="ajax" expanded="#{cityBean.isOpen}"`

    ***`   panelToggleListener=”#{bean.loadPanelData}”`***`>`

    `   ...`

    `</rich:collapsiblePanel>`


    ***Listing 6-8.** Using org `.richfaces.event.PanelToggleEvent`*


    `private void loadPanelData(`***`PanelToggleEvent event`***`){`

    `   //refresh panel data if needed on expand, for example`

    `}`


    To control whether the component is closed or opened when rendered for the first
    time, simply set the *`expanded`* attribute to either *`true`* or *`false`*, as
    follows:


    `<rich:collapsiblePanel switchType="ajax"` ***`expanded="false"`***`>`


    You can also point to an EL expression to control the attribute inside the managed
    bean, as follows:


    `<rich:collapsiblePanel switchType="ajax"` ***`expanded="#{cityBean.isOpen}"`***`>`


    #### JavaScript API


    The component currently provides only one JavaScript API method, `switchPanel()`,
    which can be invoked on the client and switch the current state to opposite. Check
    the “RichFaces Component Reference” at `www.jboss.org/richfaces/docs` for new
    methods added by the RichFaces team.'
  trans: '

    ### 使用 `<rich:collapsiblePanel>`


    `<rich:collapsiblePanel>` 与 `<rich:panel>` 组件类似，但额外支持关闭或打开状态。清单 6-5 展示了一个示例。


    ***清单 6-5.** `<rich:collapsiblePanel> 示例`*


    `<h:form>`

    `   <rich:collapsiblePanel width="450px" switchType="ajax" header="纽约市">`

    `   纽约市（官方名称为纽约市）是美国人口最多的城市，其都会区位列世界最大城市群之一。`

    `   自 1790 年以来，它一直是美国最大的城市，也是美国第一个首都城市，`

    `   并见证了乔治·华盛顿就任美国第一任总统的典礼...`

    `   </rich:collapsiblePanel>`

    `</h:form>`


    你可以在图 6-5 和图 6-6 中看到面板折叠和展开时的效果。要改变面板的状态，你可以点击标题栏的任意位置。


    ![images](img/0605.jpg)


    ***图 6-5.** 展开的面板*


    ![images](img/0606.jpg)


    ***图 6-6.** 折叠的面板*


    ![images](img/square.jpg) **注意** 由于面板有两种状态（打开/关闭），你可以选择使用两个 facet 为标题定义不同的内容：`headerExpanded`（打开时）和
    `headerCollapsed`（关闭时）。当使用 header 属性时，无论面板是打开还是关闭，标题标签都将保持不变。


    现在，让我们通过使用其他图标来更改面板标题中的指示图标，如清单 6-6 所示。


    ***清单 6-6.** 更改指示图标*


    `<rich:collapsiblePanel` ***`rightCollapsedIcon="triangleUp"`***

    ***`   leftCollapsedIcon="/images/yellow_lamp.gif"`***

    ***`   leftExpandedIcon="/images/yellow_lamp.gif "`***

    ***`   rightExpandedIcon="triangleDown"`*** `style="width:450px" switchType="ajax"`

    `   header="纽约市">`


    结果如图 6-7 和图 6-8 所示。


    ![images](img/0607.jpg)


    ***图 6-7.** 使用自定义并重新定位的指示图标的展开面板*


    ![images](img/0608.jpg)


    ***图 6-8.** 使用自定义并重新定位的指示图标的折叠面板*


    除了 `triangleUp` 和 `triangleDown` 之外，`leftcollapsedIcon` 和 `rightCollapsedIcon`
    属性还可以设置为以下预定义图标：`disc`、`grid`、`chevron`、`triangle`、`chevronUp`、`chevronDown`、`none`
    和 `transparent`。`none` 表示没有图标，而 `transparent` 有助于在部分面板使用图标而其他面板不使用图标时，保持标题外观的一致性。


    ![images](img/square.jpg) **注意** 内置图标可用于所有面板以及一些其他组件，例如 `<rich:accordion>`、`<rich:panelMenu>`
    等（计划在 4.0 首次发布后为某些组件添加支持），这些组件提供了图标属性。你将在本章及后续章节中看到其中一些组件的使用。也可以使用自定义图标——只需提供图标图像的
    URI，如清单 6-6 所示。此外，如你所见，你应该成对使用属性来为两种状态定义左右图标。


    现在让我们将注意力转向清单 6-6 中使用的 `switchType` 属性。共有三种可用的切换类型，列于表 6-1 中。


    ![images](img/t0601.jpg)


    ![images](img/square.jpg) **警告** `<rich:collapsiblePanel>` 和所有其他可切换面板在服务器和 Ajax
    模式下都需要在其周围放置 `<h:form>` 才能执行提交。另请注意，无法在每个面板内部放置表单。


    在 Ajax 和服务器模式下，组件将触发 `org.richfaces.event.PanelToggleEvent`，该事件可以通过使用 *`panelToggleListener`*
    属性中定义的监听器来处理，类似于按钮和链接操作事件，如清单 6-7 和清单 6-8 所示。


    ![images](img/square.jpg) **注意** 第 3 章 中描述的所有 Ajax 请求自定义和优化属性，在切换模式为 *`Ajax`*
    时均可用于面板。


    ***清单 6-7.** 使用* `panelToggleListener` *属性中定义的监听器*


    `<rich:collapsiblePanel switchType="ajax" expanded="#{cityBean.isOpen}"`

    ***`   panelToggleListener=”#{bean.loadPanelData}”`***`>`

    `   ...`

    `</rich:collapsiblePanel>`


    ***清单 6-8.** 使用 `org.richfaces.event.PanelToggleEvent`*


    `private void loadPanelData(`***`PanelToggleEvent event`***`){`

    `   // 例如，在展开时根据需要刷新面板数据`

    `}`


    要控制组件首次渲染时是关闭还是打开，只需将 *`expanded`* 属性设置为 *`true`* 或 *`false`*，如下所示：


    `<rich:collapsiblePanel switchType="ajax"` ***`expanded="false"`***`>`


    你也可以指向一个 EL 表达式来控制托管 bean 中的属性，如下所示：


    `<rich:collapsiblePanel switchType="ajax"` ***`expanded="#{cityBean.isOpen}"`***`>`


    #### JavaScript API


    该组件目前仅提供一个 JavaScript API 方法 `switchPanel()`，该方法可以在客户端调用，并将当前状态切换到相反状态。请访问 `www.jboss.org/richfaces/docs`
    查看“RichFaces 组件参考”，了解 RichFaces 团队添加的新方法。

    '
- fmt: "### Using `<rich:tabPanel>` and `<rich:tab>`\n\n`<rich:tabPanel>` and `<rich:tab>`\
    \ let you create tabbed panes on a page. `<rich:tabPanel>` is the container that\
    \ consists of one or more tabs (`<rich:tab>`).\n\n`<rich:tab>` is the container\
    \ for a single tab and can contain any other content and any JSF components.\n\
    \n[Listing 6-9](#Chapter06.html#list_6_9) shows a sample tab panel.\n\n**Listing\
    \ 6-9.** A sample tab panel\n\n```\n<h:form>\n   <rich:panel style=\"width:500px\"\
    >\n      <f:facet name=\"header\">rich:tabPanel and rich:tab</f:facet>\n     \
    \ <rich:tabPanel switchType=\"ajax\">\n         <rich:tab header=\"New York City\"\
    >\n            Statue of Liberty\n         </rich:tab>\n         <rich:tab header=\"\
    San Francisco\">\n            Golden Gate Bridge\n         </rich:tab>\n     \
    \    <rich:tab header=\"Los Angeles\">\n            Hollywood\n         </rich:tab>\n\
    \      </rich:tabPanel>\n   </rich:panel>\n</h:form>\n```\n\nThe result is shown\
    \ in [Figure 6-9](#Chapter06.html#fig_6_9).\n\n![images](images/0609.jpg)\n\n\
    **Figure 6-9.** Simple tab panel\n\nHeaders for `<rich:tab>` are created in the\
    \ same way as `<rich:panel>`, using an attribute with a `header` name.\n\nIt's\
    \ easy to mark any tab as disabled by setting `disabled=\"true\"`. Of course,\
    \ the `disabled` attribute can point to an EL expression and be controlled via\
    \ the model during runtime.\n\nYou can also use a facet named `header` instead\
    \ of a corresponding attribute to define tab headers out of any number of components;\
    \ for example, if you want to include images in the header for each tab, as shown\
    \ in [Figure 6-10](#Chapter06.html#fig_6_10).\n\n![images](images/0610.jpg)\n\n\
    **Figure 6-10.** Tab panel with custom headers\n\n[Listing 6-10](#Chapter06.html#list_6_10)\
    \ shows the code used.\n\n**Listing 6-10.** Code for tab panel with custom headers\n\
    \n```\n<h:form>\n   <rich:panel style=\"width:500px\">      <f:facet name=\"header\"\
    >rich:tabPanel and\n rich:tab</f:facet>\n      <rich:tabPanel switchType=\"ajax\"\
    >\n         <rich:tab>\n            <f:facet name=\"header\">\n              \
    \ <h:panelGrid columns=\"2\">\n                  <h:graphicImage value=\"/images/yellow_lamp.gif\"\
    />\n                  <h:outputText value=\"New York City\" />\n             \
    \  </h:panelGrid>\n            </f:facet>\n            <h:outputText value=\"\
    Statue of Liberty\" />\n         </rich:tab>\n         <rich:tab>\n          \
    \  <f:facet name=\"header\">...</f:facet>\n            <h:outputText value=\"\
    Golden Gate Bridge\" />\n         </rich:tab>\n<rich:tab disabled=\"true\">\n\
    \            <f:facet name=\"header\">...</f:facet>\n            <h:outputText\
    \ value=\"Hollywood\" />\n         </rich:tab>\n      </rich:tabPanel>\n   </rich:panel>\n\
    </h:form>\n```\n\nFor `<rich:collapsiblePanel>` you can use the same three `switchType`'s:\
    \ `server`, `ajax` and `client`. [Table 6-2](#Chapter06.html#tab_6_2) shows the\
    \ available events and listeners information.\n\n![images](images/t0602.jpg)\n\
    \nBy setting the `activeItem` attribute to point to the `name` of the tab to display,\
    \ it's possible to control which tab opens when the page is loaded for the first\
    \ time. Note that each tab will have `name` generated based on its `id` if `name`\
    \ not set.\n\n[Listing 6-11](#Chapter06.html#list_6_11) shows how to open a particular\
    \ tab and render what is shown in [Figure 6-11](#Chapter06.html#fig_6_11).\n\n\
    **Listing 6-11.** Shows how to open a particular tab and render the display\n\n\
    ```\n<h:form>\n   <rich:panel style=\"width:500px\">\n      <f:facet name=\"header\"\
    >rich:tabPanel and rich:tab</f:facet>\n<rich:tabPanel switchType=\"ajax\" activeItem=\"\
    sf\">\n<rich:tab header=\"New York City\" name=\"nyc\">\n            Statue of\
    \ Liberty\n         </rich:tab>\n<rich:tab header=\"San Francisco\" name=\"sf\"\
    >\n            Golden Gate Bridge\n         </rich:tab>\n<rich:tab header=\"Los\
    \ Angeles\" name=\"la\">\n            Hollywood\n         </rich:tab>\n      </rich:tabPanel>\n\
    \   </rich:panel>\n</h:form>\n```\n\n![images](images/0611.jpg)\n\n**Figure 6-11.**\
    \ Tab panel with initial selected tab defined\n\nA frequent question is: how do\
    \ you control the selected tab inside the model? Well, that's very simple to do.\
    \ Just point `activeItem` using EL expression to the bean property that will hold\
    \ the currently active tab name, as shown in [Listing 6-12](#Chapter06.html#list_6_12).\n\
    \n**Listing 6-12.** Pointing `activeItem` using EL expression to the bean property\n\
    \n```\n<h:form>\n   <rich:panel style=\"width:500px\">\n      <h:selectOneRadio\
    \ value=\"#{cityTabBean.city}\"\n         valueChangeListener=\"#{cityTabBean.changeCity}\"\
    >\n         <f:selectItem itemLabel=\"New York\" itemValue=\"nyc\" />\n      \
    \   <f:selectItem itemLabel=\"San Francisco\" itemValue=\"sf\" />\n         <f:selectItem\
    \ itemLabel=\"Los Angeles\" itemValue=\"la\" />\n<a4j:ajax event=\"change\" render=\"\
    cityTabs @this\" />\n      </h:selectOneRadio>\n   </rich:panel>\n   <rich:panel\
    \ style=\"width:500px\" header=\"rich:tabPanel and rich:tab\">\n<rich:tabPanel\
    \ switchType=\"ajax\" id=\"cityTabs\"\n         activeItem=\"#{cityTabBean.selectedTab}\"\
    >\n         <rich:tab label=\"New York City\" name=\"nyc\">\n            Statue\
    \ of Liberty\n         </rich:tab>\n         <rich:tab label=\"San Francisco\"\
    \ name=\"sf\">\n            Golden Gate Bridge\n         </rich:tab>\n       \
    \  <rich:tab label=\"Los Angeles\" name=\"la\">\n            Hollywood\n     \
    \    </rich:tab>\n      </rich:tabPanel>\n   </rich:panel>\n</h:form>\n```\n\n\
    By selecting a radio button, an Ajax request (via `<a4j:ajax>`) is sent and the\
    \ `selectedTab` property, which is bound to the `activeItem` attribute holding\
    \ the name of the selected tab, gets updated in select `ValueChangeListener`.\
    \ That's pretty simple, right?\n\nThe Java bean code is shown in [Listing 6-13](#Chapter06.html#list_6_13).\n\
    \n**Listing 6-13.** The Java bean code\n\n```\n@ManagedBean\n@SessionScoped\n\
    public class CityTabBean {\n   private String city = \"sf\";\n   private String\
    \ selectedTab = \"sf\";\n   public void changeCity(ValueChangeEvent event) {\n\
    \      selectedTab = (String)event.getNewValue();\n   }\n   // getters and setters\n\
    }\n```\n\nIt renders as shown in [Figure 6-12](#Chapter06.html#fig_6_12).\n\n\
    ![images](images/0612.jpg)\n\n**Figure 6-12.** Tab panel switched outside\n\n\
    Another option for switching tab panels by external controls is to use its JavaScript\
    \ API. [Listing 6-14](#Chapter06.html#list_6_14) shows the code to switch tabs\
    \ with JavaScript API.\n\n**Listing 6-14.** Shows the code to switch tabs with\
    \ JavaScript API\n\n```\n<rich:panel style=\"width:500px\" header=\"rich:tabPanel\
    \ and rich:tab\">\n   <h:form>\n      <rich:panel>\n         <a4j:commandLink\
    \ value=\"First\"\n            onclick=\"#{rich:component('tp')}.switchToItem('@first');\n\
    \            return false;\" />\n         <a4j:commandLink value=\"Previous\"\n\
