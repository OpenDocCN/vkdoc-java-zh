  raw: '### Using <rich:togglePanel>


    *`<rich:togglePanel>`* is actually the base component for *`<rich:accordion>`*
    and *`<rich:tabPanel>`*. It''s covered last simply because the component is a
    pretty general implementation of panels with a states-switching feature and components
    that we covered previously.


    *`<rich:accordion>`*, *`<rich:tab>`*, and *`<rich:collapsiblePanel>`*) are more
    popular and more often used. You define two or more panels using *`<rich:togglePanelItem>`*
    within the *`<rich:togglePanel>`* and add *`<rich:toggleControl>`* switching behavior
    to components (it can be inside or outside the panel), which switch those states.


    Let''s look at an example that uses famous quotes as the content for the panels.
    [Figure 6-16](#Chapter06.html#fig_6_16) shows how the panel looks.


    ![images](images/0616.jpg)


