    environment variable was not set. Use Eclipse preferences and point it to your
    local repository, as shown in [Figure 14-4](#Chapter14.html#fig_14_4).  ![images](images/1404.jpg)  ***Figure
    14-4.** Setting Maven repository in Eclipse*    Now that we are done with the
    setup, we can start building the component.    ### Creating a Components Library    Before
    creating the component classes and renderer templates, let’s define our tag library
    from the beginning. Don’t worry, it will not require any XML. Simply create a
    package-info.java class and put it in the `org.richfaces.book` package with the
