    to the <rich:tree> page definition*  `<h:form>` `<rich:tree value="#{richFacesTreeNodeBean.rootNode}"
    var="node"` **`toggleType="ajax"`** **`      toggleListener="#{richFacesTreeNodeBean.nodeToggled}"`**`>`
    `    <rich:treeNode>` `      #{node.data}` `    </rich:treeNode>` `  </rich:tree>`
    `</h:form>`  We are using the same r`ichFacesTreeNode` bean that holds the tree
    constructed using the simple `RichFacesTreeNode`. We will add the property that
