    \ to see how to turn off auto-rendered panels in a specific case. We are going\
    \ to use the page shown in [Figure 3-4](#Chapter03.html#fig_3_4).\n\n![images](images/0304.jpg)\n\
    \n**Figure 3-4.** Turning off auto-rendered panels\n\nThe JSF page is shown in\
    \ [Listing 3-35](#Chapter03.html#list_3_35).\n\n**Listing 3-35.** The JSF page\n\
    \n```\n<h:form>\n   <h:panelGrid columns=\"2\">\n      <a4j:commandButton value=\"\
    Update All Groups\" render=\"group1, group2\" />\n      <a4j:commandButton value=\"\
    Update Group 1 and 2 Only\" render=\"group1, group2\"\n         limitRender=\"\
    true\" />\n   </h:panelGrid>\n   <h:panelGrid columns=\"1\" id=\"group1\">\n \
    \     <f:facet name=\"header\">Group 1</f:facet>\n      <h:outputText value=\"\
    #{timeBean.time1}\" />\n      <h:outputText value=\"#{timeBean.time2}\" />\n \
    \  </h:panelGrid>\n   <h:panelGrid columns=\"1\" id=\"group2\">\n      <f:facet\
    \ name=\"header\">Group 2</f:facet>\n      <h:outputText value=\"#{timeBean.time3}\"\
    \ />\n   </h:panelGrid>\n   <a4j:outputPanel ajaxRendered=\"true\" layout=\"block\"\
    >\n      <h:panelGrid id=\"group3\">\n         <f:facet name=\"header\">Group\
    \ 3</f:facet>\n         <h:outputText value=\"#{timeBean.time4}\" />\n       \
    \  <h:outputText value=\"#{timeBean.time5}\" />\n      </h:panelGrid>\n   </a4j:outputPanel>\n\
    </h:form>\n```\n\nIn [Listing 3-5](#Chapter03.html#list_3_5), when the Update\
    \ All Groups button is clicked, all the clocks are rendered (updated). Group 1\
    \ and Group 2 are updated via ids, as the button has `render=\"group1, group2\"\
    `. Group 3 is updated because it is inside an auto-rendered panel. If the second\
    \ button is clicked (Update Groups 2 and 3 only), then only Group 1 and Group\
    \ 2 are rendered. Group 3, which is inside the auto-rendered panel, is not updated.\
    \ The reason it's not updated is because use `limitRender=\"true\"` is in the\
    \ second button. What this means is to limit rendering only to a component set\
    \ in the current render attribute (in our case it's Group1 and Group2). Another\
    \ way to look at it is we turned off all auto-rendered panels for this particular\
    \ button. This is a handy feature and gives you further flexibility and control\
    \ in customizing what to render.\n\n![images](images/square.jpg) **Note** `limitRender=\"\
    true\"` can also be used to turn off auto rendering of `<rich:message>` and `<rich:messages>`\
    \ components.\n\n### Advanced Execute Options\n\nIn this section you are going\
    \ to learn about a number of advanced execute options available in RichFaces.\
    \ We will first learn about the RichFaces `<a4j:region>` tag, which allows you\
    \ to define what to execute in a more declarative way and then learn how to skip\
    \ phases in the JSF lifecycle when doing validation."
