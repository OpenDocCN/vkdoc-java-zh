    (`in.taglib.xml`) generated.    ### CDK Renderer Template Tags and Other Features    As
    promised, we will give you an overview of the available CDK template tags. [Table
    14-4](#Chapter14.html#tab_14_4) provides summary of the most important `cdk:`
    tags available for usage in a <`cc:interface>` section.    ***Table 14-4.** Tags
    Available in the <cc:interface> Section*     | **Tag** | **Description** | | ---
    | --- | | `<cdk:class>` | Full-qualified Java class name for generated renderer.
    | | `<cdk:superclass>` | Full-qualified Java class name for generated `Renderer`
    superclass. That class should extend `javax.faces.render.Renderer`, and can be
    used to put `decode()`, some logic and helper methods. By default if that tag
    is not used, the generated renderer extends `javax.faces.render.Renderer` class.
    | | `<cdk:component-family>` | JSF component family id, used to associate renderer
    with component. | | `<cdk:renderer-type>` | JSF `Renderer` type assigned to the
    generated renderer. | | `<cdk:renders-children>` | Boolean value that will be
    returned from the `getRendersChildren()` method. | | `<cdk:import>` | Defines
    additional Java import directives for the generated class. Has next attributes—`package`,
    `names` (comma separated names for imported classes) and `static` (allows you
    to generate an “import static” directive). | | `<cdk:import-attributes>` | Allows
    CDK to import the attributes definition from the JSF configuration file fragment,
    the same as used by the `@JsfComponent#attributes`. The `src` attribute should
    contain a URL for that fragment. | | `<cdk:resource-dependency>` | Defines JSF
    resource used by the component. Resource defined by that element added to `@ResourceDependencies`
    annotation for generated type. Attributes available are the same as for annotation.
    |    ![images](images/square.jpg) **Note** Table 14-4 lists the most important
    attributes as of writing of this book. For updates and new attributes in CDK,
    visit the JBoss Community RichFaces web site at [`http://jboss.org/richfaces`](http://jboss.org/richfaces).    [Table
    14-5](#Chapter14.html#tab_14_5) describes the tags that could be used in the <`cc:implementation>`
    section. (To save space and time, we will not mention tags already described in
    earlier Listings.)    ***Table 14-5.** Tags Available in <cc:implementation> Section*     |
    **Tag** | **Description** | | --- | --- | | `<cdk:body>` | Allows you to separate
    the template into parts. All the content before the tag will be generated in the
    `encodeBegin()` method. All the content declared inside the `<cdk:body>` tag is
    compiled into statements of the `encodeChildren()` method. And all content declared
    after the `<cdk:body>` tag is compiled into statements of the `encodeEnd()` method.
    If that tag doesn’t exist in template at all the content is rendered in the `encodeEnd()`
    method. | | `<cdk:call>` | Arbitrary method invocation statement. Useful when
    you have some rendering method in abstract class and need to call it to encode
    some dynamical piece of component. | | `<cdk:switch>` `<cdk:case>` `<cdk:default>`
    | Used to construct Java switch statement. All the expressions should be evaluated
    into valid code for switch statement. Switch tag uses `key` attribute, and case
    tag using `values` attribute. | | `<cdk:object>` | Introduces new variable (The
    same as implicit `facesContext` and `component`). Variable’s scope is limited
    to the context of the current method, i.e. variables defined before `<cdk:body>`
    are not available after it. |    The last group of tags that should be mentioned
    are JSTL tags, which you are probably already familiar with. Currently CDK supports
    `<c:forEach>`, `<c:choose>`, `<c:if>`, `<c:otherwise>`, and `<c:when>` tags.    CDK
    templates tags also allow two special attributes to be used in any HTML tag. The
    first attribute is `cdk:passThroughWithExclusions`, which renders all attributes
    allowed for an HTML element except ones defined in attribute value (space separated
    list). CDK expects that component attribute name to be the same as in HTML. That’s
    useful to render single-element components or for the root element. We added to
    our span as follows:  `<span cdk:passThroughWithExclusions="id class">`  This
    tells CDK to encode all `<span>` HTML attributes using the same named attributes
    at the component. That’s why it’s most useful only for the root element (`style`,
    `dir`, `lang`, and others should be applied to the root element of the component).    The
    second attribute is `cdk:passThrough`. As opposed to cdk:`passThroughWithExclusions`,
    it renders all attributes defined in its value (a space-separated list). If component
    and HTML attributes have the same name, it’s typed as is. Otherwise, the developer
    can provide a component attribute name separated by a colon, for example:  ` <span
    cdk:passThrough=” style class:styleClass”/>`  This means render component `style`
    attribute as HTML `style`, and `component#styleClass` as HTML `class`.    You
    should now be able to write templates of any complexity with options such as using
    special CDK tags, having implicit variables, the ability to define custom variables,
    and the facility to call the methods from your common classes. We will add a few
    enhancements a little later using some of these features.    ### Creating a Sample
