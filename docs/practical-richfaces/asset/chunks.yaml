- fmt: "### Combining Events from the Same Component\n\nOne of the features that RichFaces\
    \ adds on top of the standard queue is the ability to combine events from the\
    \ same component. If a particular button is clicked multiple times (while there\
    \ is another request on the server), all events from this button will be “combined.”\
    \ In other words, when the request executing on the server completes, only one\
    \ request will be sent to process multiple clicks done during that time. This\
    \ is the behavior you usually want. If the same button is clicked seven times,\
    \ you will want only one request to be sent.\n\nLet's look at an example in [Listing\
    \ 3-49](#Chapter03.html#list_3_49), which shows two buttons. Each button updates\
    \ the time in its column, and when an Ajax request is sent, the appropriate status\
    \ is shown in the upper-right corner of the browser.\n\n**Listing 3-49.** Shows\
    \ two buttons\n\n```\n<a4j:status name=\"action1Status\" startText=\"Button A\"\
    \n   startStyle=\"background-color: #ffA500;\n   font-weight:bold;\n   position:\
    \ absolute;\n   right: 5px;\n   top: 1px;\n   width: 140px;\" />\n<a4j:status\
    \ name=\"action2Status\" startText=\"Button B\"\n   startStyle=\"background-color:\
    \ #FF0000;\n   font-weight:bold;\n   position: absolute;\n   right: 5px;\n   top:\
    \ 1px;\n   width: 120px;\" />\n\n<a4j:queue/>\n\n<h:form>\n   <h:panelGrid columns=\"\
    2\" border=\"1\">\n      <a4j:commandButton value=\"Button A\" action=\"#{queueBean.action1}\"\
    \n         render=\"now1\" status=\"action1Status\"/>\n      <a4j:commandButton\
    \ value=\"Button B\" action=\"#{queueBean.action2}\"\n         render=\"now2\"\
    \ status=\"action2Status\"/>\n      <h:outputText id=\"now1\" value=\"#{queueBean.now1}\"\
    \ />\n      <h:outputText id=\"now2\" value=\"#{queueBean.now2}\" />\n   </h:panelGrid>\n\
    </h:form>\n```\n\nThe rendered page is shown in [Figure 3-5](#Chapter03.html#fig_3_5).\n\
    \n![images](images/0305.jpg)\n\n**Figure 3-5.** Using the RichFaces queue\n\n\
    The managed bean is rather simple and shown in [Listing 3-50](#Chapter03.html#list_3_50).\
    \ One thing to point out, we put both actions to sleep to give us a more “real\
    \ world” scenario.\n\n**Listing 3-50.** The managed bean\n\n```\n@ManagedBean\n\
    @RequestScoped\npublic class QueueBean {\n\n   public Date getNow1 (){\n     \
    \ return (new Date ());\n   }\n   public Date getNow2 (){\n      return (new Date\
    \ ());\n   }\n   public void action1 () {\n      try {\n         Thread.sleep\
    \ (4000);\n      } catch (InterruptedException e) {\n         e.printStackTrace();\n\
    \      }\n   }\n   public void action2 () {\n      try {\n         Thread.sleep\
    \ (1000);\n      } catch (InterruptedException e) {\n         e.printStackTrace();\n\
    \      }\n   }\n}\n```\n\nNow that we have the code down, let's examine how the\
    \ queue works. Because it's a RichFaces application and we use RichFaces components,\
    \ we get some extra features.\n\nIf you click Button A once, a request—let's call\
    \ it A1—will be sent to the server and it will take 4 seconds for it to complete.\
    \ If you click Button A again within the 4 seconds (A2), the new event will be\
    \ queued and only be sent when request A1 finishes executing on the server. This\
    \ is nothing new, you get this functionality from the standard queue. [Table 3-3](#Chapter03.html#tab_3_3)\
    \ shows the sequence of events.\n\n![images](images/t0303.jpg)\n\nA2 will be fired\
    \ only when request A1 completes.\n\nLet's do something similar, but while request\
    \ A1 is executing on the server, we will click the button multiple times. Because\
    \ the same button is clicked, each new event or click will overwrite (or combine)\
    \ with the currently queued event. No matter how many times you click the button,\
    \ only one event will be sent to the server. This feature will prevent flooding\
    \ the server with identical requests. The sequence of events is shown in [Table\
    \ 3-4](#Chapter03.html#tab_3_4).\n\n![images](images/t0304.jpg)\n\nOnce request\
    \ A1 completes, request A6 will be sent and the client queue is now empty.\n\n\
    ![images](images/square.jpg) **Tip** Events from the same component are “combined”\
    \ together.\n\nThere is also a second button. Let's trace the events when we mix\
    \ clicking both buttons, shown in [Table 3-5](#Chapter03.html#tab_3_5).\n\n![images](images/t0305.jpg)\n\
    \n![images](images/t0305a.jpg)\n\nNotice that something different happened here.\
    \ As long as we were clicking Button A, those events were combined. Once we clicked\
    \ Button B and the last event in the queue was from A, events no longer could\
    \ be combined and that event was added to the queue. What this means is that events\
    \ can be combined as long as the event just activated and the event last in queue\
    \ are from the same component.\n\nRichFaces queue features are there even though\
    \ we didn't place the `<a4j:queue>` tag on the page. In fact, you get a queue\
    \ on every page automatically. RichFaces provides this application-wide on all\
    \ pages with the `context` parameter, as shown in [Listing 3-51](#Chapter03.html#list_3_51).\n\
    \n**Listing 3-51.** RichFaces provides this application-wide on all pages with\
    \ the `context` parameter\n\n```\n<context-param>\n   <param-name>org.richfaces.queue.global.enabled</param-name>\n\
    \   <param-value>true</param-value>\n</context-param>\n```\n\nWhen defining some\
    \ of the queues we mentioned earlier—view-level, form-level and component mapped—all\
    \ are just overwriting a queue with a bigger scope. If at some point you need\
    \ to set any attributes on this global queue, the name of the queue is `org.richfaces.queue.global`,\
    \ and setting attributes would look like the following:\n\n```\n<a4j:queue name=\"\
    org.richfces.queue.global\" requestDelay=\"2000\">\n```\n\n### Setting a Delay\n\
    \nYou can set a delay on a queue by using the `requestDelay` attribute (set to\
    \ 4 seconds in the following sample):\n\n```\n<a4j:queue requestDelay=\"4000\"\
    >\n```\n\nThis means that every request will be queued and delayed by 4 seconds\
    \ before sending. Note that this is a view-level queue and so all the controls\
    \ will be delayed by 4 seconds. Another way to look at a delay is that it is the\
    \ time to wait for new requests to be fired from the same component and for this\
    \ new event to replace the one that has been queued. Let's trace events with [Table\
    \ 3-6](#Chapter03.html#tab_3_6).\n\n![images](images/t0306.jpg)\n\nFor event A4\
    \ to be fired, two things need to happen: the previous request from the server\
    \ has to finish and the A4 delay time has to pass.\n\nWe told you that each component\
    \ can overwrite either view-level or form-level queue settings by using the `<a4j:attachQueue>`\
    \ behavior. Right now our delay is view-level. For the second button, let's overwrite\
    \ the delay and set it to 0, as shown in [Listing 3-52](#Chapter03.html#list_3_52).\n\
    \n**Listing 3-52.** Overwrite the delay and set it to 0\n\n```\n<a4j:commandButton\
    \ value=\"Button B\" action=\"#{queueBean.action2}\" render=\"now2\"\n       \
    \  status=\"action2Status\">\n   <a4j:attachQueue requestDelay=\"0\"/>\n</a4j:commandButton>\n\
    ```\n\nButton A will use the view-level queue and each event will be delayed 4\
    \ seconds. Button B will still use the view-level queue but overwrites the delay\
    \ by setting it to 0.\n\nIn [Table 3-6](#Chapter03.html#tab_3_6), we used only\
    \ one component. Let's see what happens if we now use two buttons. Let's say we\
    \ queued A1, and within the delay period of 4 seconds, we clicked Button B. What\
    \ will happen is shown in [Table 3-7](#Chapter03.html#tab_3_7): event A1 will\
    \ fire immediately, without waiting for its delay period to pass.\n\nIf you didn't\
    \ have this book, your first reaction might have been to think it's a bug. But,\
    \ it's not a bug. The reason event A1 was sent without waiting for its delay to\
    \ pass is because B1 cannot be combined with A1, and as there are no more events\
    \ queued that can be combined with A1, A1 fires immediately. To reinforce, a delay\
    \ could be used to wait for the same events (from the same component) to be combined.\n\
    \n![images](images/t0307.jpg)"
  raw: '#### Combining Events from the Same Component


    One of the features that RichFaces adds on top of the standard queue is the ability
    to combine events from the same component. If a particular button is clicked multiple
    times (while there is another request on the server), all events from this button
    will be “combined.” In other words, when the request executing on the server completes,
    only one request will be sent to process multiple clicks done during that time.
    This is the behavior you usually want. If the same button is clicked seven times,
    you will want only one request to be sent.


    Let''s look at an example in [Listing 3-49](#Chapter03.html#list_3_49), which
    shows two buttons. Each button updates the time in its column, and when an Ajax
    request is sent, the appropriate status is shown in the upper-right corner of
    the browser.


    ***Listing 3-49.** Shows two buttons*


    `<a4j:status name="action1Status" startText="Button A"`

    `   startStyle="background-color: #ffA500;`

    `   font-weight:bold;`

    `   position: absolute;`

    `   right: 5px;`

    `   top: 1px;`

    `   width: 140px;" />`

    `<a4j:status name="action2Status" startText="Button B"`

    `   startStyle="background-color: #FF0000;`

    `   font-weight:bold;`

    `   position: absolute;`

    `   right: 5px;`

    `   top: 1px;`

    `   width: 120px;" />`


    `<a4j:queue/>`


    `<h:form>`

    `   <h:panelGrid columns="2" border="1">`

    `      <a4j:commandButton value="Button A" action="#{queueBean.action1}"`

    `         render="now1" status="action1Status"/>`

    `      <a4j:commandButton value="Button B" action="#{queueBean.action2}"`

    `         render="now2" status="action2Status"/>`

    `      <h:outputText id="now1" value="#{queueBean.now1}" />`

    `      <h:outputText id="now2" value="#{queueBean.now2}" />`

    `   </h:panelGrid>`

    `</h:form>`


    The rendered page is shown in [Figure 3-5](#Chapter03.html#fig_3_5).


    ![images](images/0305.jpg)


    ***Figure 3-5.** Using the RichFaces queue*


    The managed bean is rather simple and shown in [Listing 3-50](#Chapter03.html#list_3_50).
    One thing to point out, we put both actions to sleep to give us a more “real world”
    scenario.


    ***Listing 3-50.** The managed bean*


    `@ManagedBean`

    `@RequestScoped`

    `public class QueueBean {`


    `   public Date getNow1 (){`

    `      return (new Date ());`

    `   }`

    `   public Date getNow2 (){`

    `      return (new Date ());`

    `   }`

    `   public void action1 () {`

    `      try {`

    `         Thread.sleep (4000);`

    `      } catch (InterruptedException e) {`

    `         e.printStackTrace();`

    `      }`

    `   }`

    `   public void action2 () {`

    `      try {`

    `         Thread.sleep (1000);`

    `      } catch (InterruptedException e) {`

    `         e.printStackTrace();`

    `      }`

    `   }`

    `}`


    Now that we have the code down, let''s examine how the queue works. Because it''s
    a RichFaces application and we use RichFaces components, we get some extra features.


    If you click Button A once, a request—let''s call it A1—will be sent to the server
    and it will take 4 seconds for it to complete. If you click Button A again within
    the 4 seconds (A2), the new event will be queued and only be sent when request
    A1finishes executing on the server. This is nothing new, you get this functionality
    from the standard queue. [Table 3-3](#Chapter03.html#tab_3_3) shows the sequence
    of events.


    ![images](images/t0303.jpg)


    A2 will be fired only when request A1 completes.


    Let''s do something similar, but while request A1 is executing on the server,
    we will click the button multiple times. Because the same button is clicked, each
    new event or click will overwrite (or combine) with the currently queued event.
    No matter how many times you click the button, only one event will be sent to
    the server. This feature will prevent flooding the server with identical requests.
    The sequence of events is shown in [Table 3-4](#Chapter03.html#tab_3_4).


    ![images](images/t0304.jpg)


    Once request A1 completes, request A6 will be sent and the client queue is now
    empty.


    ![images](images/square.jpg) **Tip** Events from the same component are “combined”
    together.


    There is also a second button. Let''s trace the events when we mix clicking both
    buttons, shown in [Table 3-5](#Chapter03.html#tab_3_5).


    ![images](images/t0305.jpg)


    ![images](images/t0305a.jpg)


    Notice that something different happened here. As long as we were clicking Button
    A, those events were combined. Once we clicked Button B and the last event in
    the queue was from A, events no longer could be combined and that event was added
    to the queue. What this means is that events can be combined as long as the event
    just activated and the event last in queue are from the same component.


    RichFaces queue features are there even though we didn''t place the `<a4j:queue>`
    tag on the page. In fact, you get a queue on every page automatically. RichFaces
    provides this application-wide on all pages with the `context` parameter, as shown
    in [Listing 3-51](#Chapter03.html#list_3_51).


    ***Listing 3-51.** RichFaces provides this application-wide on all pages with
    the `context` parameter*


    `<context-param>`

    `   <param-name>org.richfaces.queue.global.enabled</param-name>`

    `   <param-value>true</param-value>`

    `</context-param>`


    When defining some of the queues we mentioned earlier—view-level, form-level and
    component mapped—all are just overwriting a queue with a bigger scope. If at some
    point you need to set any attributes on this global queue, the name of the queue
    is `org.richfaces.queue.global`, and setting attributes would look like the following:


    `<a4j:queue name="org.richfces.queue.global" requestDelay="2000">`


    #### Setting a Delay


    You can set a delay on a queue by using the *`requestDelay`* attribute (set to
    4 seconds in the following sample):


    `<a4j:queue requestDelay="4000">`


    This means that every request will be queued and delayed by 4 seconds before sending.
    Note that this is a view-level queue and so all the controls will be delayed by
    4 seconds. Another way to look at a delay is that it is the time to wait for new
    requests to be fired from the same component and for this new event to replace
    the one that has been queued. Let''s trace events with [Table 3-6](#Chapter03.html#tab_3_6).


    ![images](images/t0306.jpg)


    For event A4 to be fired, two things need to happen: the previous request from
    the server has to finish and the A4 delay time has to pass.


    We told you that each component can overwrite either view-level or form-level
    queue settings by using the `<a4j:attachQueue>` behavior. Right now our delay
    is view-level. For the second button, let''s overwrite the delay and set it to
    0, as shown in [Listing 3-52](#Chapter03.html#list_3_52).


    ***Listing 3-52.** Overwrite the delay and set it to 0*


    `<a4j:commandButton value="Button B" action="#{queueBean.action2}" render="now2"`

    `         status="action2Status">`

    **`<a4j:attachQueue requestDelay="0"/>`**

    `</a4j:commandButton>`


    Button A will use the view-level queue and each event will be delayed 4 seconds.
    Button B will still use the view-level queue but overwrites the delay by setting
    it to 0.


    In [Table 3-6](#Chapter03.html#tab_3_6), we used only one component. Let''s see
    what happens if we now use two buttons. Let''s say we queued A1, and within the
    delay period of 4 seconds, we clicked Button B. What will happen is shown in [Table
    3-7](#Chapter03.html#tab_3_7): event A1 will fire immediately, without waiting
    for its delay period to pass.


    If you didn''t have this book, your first reaction might have been to think it''s
    a bug. But, it''s not a bug. The reason event A1 was sent without waiting for
    its delay to pass is because B1 cannot be combined with A1, and as there are no
    more events queued that can be combined with A1, A1 fires immediately. To reinforce,
    a delay could be used to wait for the same events (from the same component) to
    be combined.


    ![images](images/t0307.jpg)'
  trans: '

    #### 合并来自同一组件的事件


    RichFaces 在标准队列基础上增加的功能之一是能够合并来自同一组件的事件。如果某个特定按钮被多次点击（而此时服务器上还有另一个请求在处理），该按钮的所有事件将被“合并”。换句话说，当服务器上正在执行的请求完成后，只会发送一个请求来处理在此期间发生的多次点击。这通常是你想要的行为。如果同一个按钮被点击了七次，你只会希望发送一个请求。


    我们来看一下代码清单 3-49 中的示例，其中展示了两个按钮。每个按钮都会更新其所在列的时间，当发送 Ajax 请求时，相应的状态会显示在浏览器的右上角。


    ***代码清单 3-49.** 展示两个按钮*


    `<a4j:status name="action1Status" startText="按钮 A"`

    `   startStyle="background-color: #ffA500;`

    `   font-weight:bold;`

    `   position: absolute;`

    `   right: 5px;`

    `   top: 1px;`

    `   width: 140px;" />`

    `<a4j:status name="action2Status" startText="按钮 B"`

    `   startStyle="background-color: #FF0000;`

    `   font-weight:bold;`

    `   position: absolute;`

    `   right: 5px;`

    `   top: 1px;`

    `   width: 120px;" />`


    `<a4j:queue/>`


    `<h:form>`

    `   <h:panelGrid columns="2" border="1">`

    `      <a4j:commandButton value="按钮 A" action="#{queueBean.action1}"`

    `         render="now1" status="action1Status"/>`

    `      <a4j:commandButton value="按钮 B" action="#{queueBean.action2}"`

    `         render="now2" status="action2Status"/>`

    `      <h:outputText id="now1" value="#{queueBean.now1}" />`

    `      <h:outputText id="now2" value="#{queueBean.now2}" />`

    `   </h:panelGrid>`

    `</h:form>`


    渲染后的页面如图 3-5 所示。


    ![images](img/0305.jpg)


    ***图 3-5.** 使用 RichFaces 队列*


    托管 Bean 相当简单，如代码清单 3-50 所示。需要指出一点，我们让两个操作都休眠一段时间，以便模拟更“真实”的场景。


    ***代码清单 3-50.** 托管 Bean*


    `@ManagedBean`

    `@RequestScoped`

    `public class QueueBean {`


    `   public Date getNow1 (){`

    `      return (new Date ());`

    `   }`

    `   public Date getNow2 (){`

    `      return (new Date ());`

    `   }`

    `   public void action1 () {`

    `      try {`

    `         Thread.sleep (4000);`

    `      } catch (InterruptedException e) {`

    `         e.printStackTrace();`

    `      }`

    `   }`

    `   public void action2 () {`

    `      try {`

    `         Thread.sleep (1000);`

    `      } catch (InterruptedException e) {`

    `         e.printStackTrace();`

    `      }`

    `   }`

    `}`


    现在我们已经有了代码，让我们来研究队列是如何工作的。由于这是一个 RichFaces 应用程序，并且我们使用了 RichFaces 组件，因此我们获得了一些额外的功能。


    如果你点击按钮 A 一次，一个请求（我们称之为 A1）将被发送到服务器，并且需要 4 秒才能完成。如果你在 4 秒内再次点击按钮 A（A2），新事件将被排队，并且只有在请求
    A1 在服务器上执行完成后才会被发送。这并不新鲜，标准队列也能提供此功能。表 3-3 显示了事件序列。


    ![images](img/t0303.jpg)


    只有当请求 A1 完成时，A2 才会被触发。


    让我们做类似的事情，但在请求 A1 在服务器上执行期间，我们多次点击该按钮。由于点击的是同一个按钮，每个新事件或点击将覆盖（或合并）当前排队的事件。无论你点击按钮多少次，只会有一个事件被发送到服务器。此功能可防止用相同的请求淹没服务器。事件序列如表
    3-4 所示。


    ![images](img/t0304.jpg)


    一旦请求 A1 完成，请求 A6 将被发送，并且客户端队列现在为空。


    ![images](img/square.jpg) **提示** 来自同一组件的事件会被“合并”在一起。


    还有第二个按钮。让我们追踪混合点击两个按钮时的事件，如表 3-5 所示。


    ![images](img/t0305.jpg)


    ![images](img/t0305a.jpg)


    注意这里发生了一些不同的事情。只要我们在点击按钮 A，这些事件就会被合并。一旦我们点击了按钮 B，并且队列中的最后一个事件来自 A，事件就不再能被合并，并且该事件被添加到队列中。这意味着，只要刚刚激活的事件和队列中的最后一个事件来自同一组件，事件就可以被合并。


    即使我们没有在页面上放置 `<a4j:queue>` 标签，RichFaces 队列功能仍然存在。事实上，每个页面都会自动获得一个队列。RichFaces
    通过 `context` 参数在所有页面上提供此应用程序级别的功能，如代码清单 3-51 所示。


    ***代码清单 3-51.** RichFaces 通过 `context` 参数在所有页面上提供此应用程序级别的功能*


    `<context-param>`

    `   <param-name>org.richfaces.queue.global.enabled</param-name>`

    `   <param-value>true</param-value>`

    `</context-param>`


    当定义我们之前提到的一些队列时——视图级别、表单级别和组件映射——都只是用更大作用域的队列覆盖一个队列。如果在某个时候你需要在这个全局队列上设置任何属性，队列的名称是
    `org.richfaces.queue.global`，设置属性如下所示：


    `<a4j:queue name="org.richfces.queue.global" requestDelay="2000">`


    #### 设置延迟


    你可以通过使用 *`requestDelay`* 属性来设置队列的延迟（在以下示例中设置为 4 秒）：


    `<a4j:queue requestDelay="4000">`


    这意味着每个请求在发送前都会被排队并延迟 4 秒。请注意，这是一个视图级别的队列，因此所有控件都将延迟 4 秒。另一种看待延迟的方式是，它是等待从同一组件触发新请求，并且让这个新事件替换已排队事件的时间。让我们通过表
    3-6 来追踪事件。


    ![images](img/t0306.jpg)


    要使事件 A4 被触发，需要满足两个条件：服务器上的前一个请求必须完成，并且 A4 的延迟时间必须过去。


    我们之前提到过，每个组件可以通过使用 `<a4j:attachQueue>` 行为来覆盖视图级别或表单级别的队列设置。现在我们的延迟是视图级别的。对于第二个按钮，让我们覆盖延迟并将其设置为
    0，如代码清单 3-52 所示。


    ***代码清单 3-52.** 覆盖延迟并将其设置为 0*


    `<a4j:commandButton value="按钮 B" action="#{queueBean.action2}" render="now2"`

    `         status="action2Status">`

    **`<a4j:attachQueue requestDelay="0"/>`**

    `</a4j:commandButton>`


    按钮 A 将使用视图级别的队列，每个事件将延迟 4 秒。按钮 B 仍将使用视图级别的队列，但通过将延迟设置为 0 来覆盖它。


    在表 3-6 中，我们只使用了一个组件。让我们看看如果现在使用两个按钮会发生什么。假设我们排队了 A1，并且在 4 秒的延迟期内，我们点击了按钮 B。会发生的情况如表
    3-7 所示：事件 A1 将立即触发，无需等待其延迟期过去。


    如果你没有这本书，你的第一反应可能会认为这是一个 bug。但是，这不是 bug。事件 A1 无需等待其延迟过去就被发送的原因是，B1 无法与 A1 合并，并且由于没有更多可以合并到
    A1 的事件排队，A1 会立即触发。为了强调，延迟可用于等待相同的事件（来自同一组件）被合并。


    ![images](img/t0307.jpg)

