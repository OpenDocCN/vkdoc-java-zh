    fires an Ajax request on this page will activate this status.

    *   Status per form. Status is placed inside a form. Any component within that
    form that fires an Ajax request will activate this status (view status will not
    be activated).

    *   Named status. Status is given a name and components that fire an Ajax request
    must refer to that status by name. If no component references this status, the
    status will not be shown.


    So, how do you define what the component shows? The simplest way is to use two
    attributes named `startText` and `stopText`. `startText` shows any text when the
    request is being executed on the server, and `stopText` is the text shown when
    there is no active Ajax request. A third attribute, `errorText`, is available
    to display text in case of server error.


    The following three figures show Ajax at different steps. To keep the example
    simple but still demonstrate the full power of `<a4j:status>`, we are going to
    take and convert a string entered in uppercase.


    [Figure 3-6](#Chapter03.html#fig_3_6) shows the page after it was just loaded;
    however, `stopText` is already displayed because there is no active Ajax request.


    ![images](images/0306.jpg)


