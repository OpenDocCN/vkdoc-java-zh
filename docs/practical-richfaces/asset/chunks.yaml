  raw: '### Using <rich:tabPanel> and <rich:tab>


    `<rich:tabPanel>` and `<rich:tab>` let you create tabbed panes on a page. `<rich:tabPanel>`
    is the container that consists of one or more tabs `(<rich:tab>`).


    `<rich:tab>` is the container for a single tab and can contain any other content
    and any JSF components.


    [Listing 6-9](#Chapter06.html#list_6_9) shows a sample tab panel.


    ***Listing 6-9.** A sample tab panel*


    `<h:form>`

    `   <rich:panel style="width:500px">`

    `      <f:facet name="header">rich:tabPanel and rich:tab</f:facet>`

    `      <rich:tabPanel switchType="ajax">`

    `         <rich:tab header="New York City">`

    `            Statue of Liberty`

    `         </rich:tab>`

    `         <rich:tab header="San Francisco">`

    `            Golden Gate Bridge`

    `         </rich:tab>`

    `         <rich:tab header="Los Angeles">`

    `            Hollywood`

    `         </rich:tab>`

    `      </rich:tabPanel>`

    `   </rich:panel>`

    `</h:form>`


    The result is shown in [Figure 6-9](#Chapter06.html#fig_6_9).


    ![images](images/0609.jpg)


    ***Figure 6-9.** Simple tab panel*


    Headers for *`<rich:tab>`* are created in the same way as *`<rich:panel>`*, using
    an attribute with a `header` name.


    It''s easy to mark any tab as disabled by setting *`disabled="true"`*. Of course,
    the *`disabled`* attribute can point to an EL expression and be controlled via
    the model during runtime.


    You can also use a facet named *`header`* instead of a corresponding attribute
    to define tab headers out of any number of components; for example, if you want
    to include images in the header for each tab, as shown in [Figure 6-10](#Chapter06.html#fig_6_10).


    ![images](images/0610.jpg)


    ***Figure 6-10.** Tab panel with custom headers*


    [Listing 6-10](#Chapter06.html#list_6_10) shows the code used.


    ***Listing 6-10.** Code for tab panel with custom headers*


    `<h:form>`

    `   <rich:panel style="width:500px">      <f:facet name="header">rich:tabPanel
    and`

    ` rich:tab</f:facet>`

    `      <rich:tabPanel switchType="ajax">`

    `         <rich:tab>`

    `            <f:facet name="header">`

    `               <h:panelGrid columns="2">`

    `                  <h:graphicImage value="/images/yellow_lamp.gif"/>`

    `                  <h:outputText value="New York City" />`

    `               </h:panelGrid>`

    `            </f:facet>`

    `            <h:outputText value="Statue of Liberty" />`

    `         </rich:tab>`

    `         <rich:tab>`

    `            <f:facet name="header">...</f:facet>`

    `            <h:outputText value="Golden Gate Bridge" />`

    `         </rich:tab>`

    `<rich:tab` **`disabled="true"`**`>`

    `            <f:facet name="header">...</f:facet>`

    `            <h:outputText value="Hollywood" />`

    `         </rich:tab>`

    `      </rich:tabPanel>`

    `   </rich:panel>`

    `</h:form>`


    For *`<rich:collapsiblePanel>`* you can use the same three *`s`*`witchType`''s:
    *`server`*, *`ajax`* and *`client`*. [Table 6-2](#Chapter06.html#tab_6_2) shows
    the available events and listeners information.


    ![images](images/t0602.jpg)


    By setting the *`activeItem`* attribute to point to the *`name`* of the tab to
    display, it''s possible to control which tab opens when the page is loaded for
    the first time. Note that each tab will have *`name`* generated based on its *`id`*
    if *`name`* not set.


    [Listing 6-11](#Chapter06.html#list_6_11) shows how to open a particular tab and
    render what is shown in [Figure 6-11](#Chapter06.html#fig_6_11).


    ***Listing 6-11.** Shows how to open a particular tab and render the display*


    `<h:form>`

    `   <rich:panel style="width:500px">`

    `      <f:facet name="header">rich:tabPanel and rich:tab</f:facet>`

    `<rich:tabPanel switchType="ajax"` ***`activeItem="sf"`***`>`

    `<rich:tab header="New York City"` ***`name="nyc"`***`>`

    `            Statue of Liberty`

    `         </rich:tab>`

    `<rich:tab header="San Francisco"` ***`name="sf"`***`>`

    `            Golden Gate Bridge`

    `         </rich:tab>`

    `<rich:tab header="Los Angeles"` ***`name="la"`***`>`

    `            Hollywood`

    `         </rich:tab>`

    `      </rich:tabPanel>`

    `   </rich:panel>`

    `</h:form>` ![images](images/0611.jpg)


    ***Figure 6-11.** Tab panel with initial selected tab defined*


    A frequent question is: how do you control the selected tab inside the model?
    Well, that''s very simple to do. Just point *`activeItem`* using EL expression
    to the bean property that will hold the currently active tab name, as shown in
    [Listing 6-12](#Chapter06.html#list_6_12).


    ***Listing 6-12.** Pointing* `activeItem` *using EL expression to the bean property*


    `<h:form>`

    `   <rich:panel style="width:500px">`

    `      <h:selectOneRadio value="#{cityTabBean.city}"`

    `         valueChangeListener="#{cityTabBean.changeCity}">`

    `         <f:selectItem itemLabel="New York" itemValue="nyc" />`

    `         <f:selectItem itemLabel="San Francisco" itemValue="sf" />`

    `         <f:selectItem itemLabel="Los Angeles" itemValue="la" />`

    ***`<a4j:ajax event="change" render="cityTabs @this" />`***

    `      </h:selectOneRadio>`

    `   </rich:panel>`

    `   <rich:panel style="width:500px" header="rich:tabPanel and rich:tab">`

    `<rich:tabPanel switchType="ajax"` ***`id="cityTabs`*`"`**

    `         activeItem="#{cityTabBean.selectedTab}">`

    `         <rich:tab label="New York City" name="nyc">`

    `            Statue of Liberty`

    `         </rich:tab>`

    `         <rich:tab label="San Francisco" name="sf">`

    `            Golden Gate Bridge`

    `         </rich:tab>`

    `         <rich:tab label="Los Angeles" name="la">`

    `            Hollywood`

    `         </rich:tab>`

    `      </rich:tabPanel>`

    `   </rich:panel>`

    `</h:form>`


    By selecting a radio button, an Ajax request (via *`<a4j:ajax>`*) is sent and
    the *`selectedTab`* property, which is bound to the *`activeItem`* attribute holding
    the name of the selected tab, gets updated in select *`ValueChangeListener`*.
    That''s pretty simple, right?


    The Java bean code is shown in [Listing 6-13](#Chapter06.html#list_6_13).


    ***Listing 6-13.** The Java bean code*


    `@ManagedBean`

    `@SessionScoped`

    `public class CityTabBean {`

    `   private String city = "sf";`

    `   private String selectedTab = "sf";`

    `   public void changeCity(ValueChangeEvent event) {`

    `      selectedTab = (String)event.getNewValue();`

    `   }`

    `   // getters and setters`

    `}`


    It renders as shown in [Figure 6-12](#Chapter06.html#fig_6_12).


    ![images](images/0612.jpg)


    ***Figure 6-12.** Tab panel switched outside*


    Another option for switching tab panels by external controls is to use its JavaScript
    API. [Listing 6-14](#Chapter06.html#list_6_14) shows the code to switch tabs with
    JavaScript API.


    ***Listing 6-14.** Shows the code to switch tabs with JavaScript API*


    `<rich:panel style="width:500px" header="rich:tabPanel and rich:tab">`

    `   <h:form>`

    `      <rich:panel>`

    `         <a4j:commandLink value="First"`

    `            onclick="#{rich:component(''tp'')}.switchToItem(''@first'');`

    `            return false;" />`

    `         <a4j:commandLink value="Previous"`

    `            onclick="#{rich:component(''tp'')}.switchToItem(''@prev'');`

    `            return false;" />`

    `         <a4j:commandLink value="New York City"`

    `            onclick="#{rich:component(''tp'')}.switchToItem(''nyc'');`

    `            return false;" />`

    `         <a4j:commandLink value="San Francisco"`

    `            onclick="#{rich:component(''tp'')}.switchToItem(''sf'');`

    `            return false;" />`

    `         <a4j:commandLink value="Los Angeles"`

    `            onclick="#{rich:component(''tp'')}.switchToItem(''la'');`

    `            return false;" />`

    `         <a4j:commandLink value="Next"`

    `            onclick="#{rich:component(''tp'')}.switchToItem(''@next'');`

    `            return false;" />`

    `         <a4j:commandLink value="Last"`

    `            onclick="#{rich:component(''tp'')}.switchToItem(''@last'');`

    `            return false;" />`

    `      </rich:panel>`

    `      <rich:tabPanel switchType="ajax" id="tp">`

    `         <rich:tab header="New York City" name="nyc">`

    `            Statue of Liberty`

    `         </rich:tab>`

    `         <rich:tab header="San Francisco" name="sf">`

    `            Golden Gate Bridge`

    `         </rich:tab>`

    `         <rich:tab header="Los Angeles" name="la">`

    `            Hollywood`

    `         </rich:tab>`

    `      </rich:tabPanel>`

    `   </h:form>`

    `</rich:panel>`


    [Figure 6-13](#Chapter06.html#fig_6_13) shows a tab panel that can be switched
    by links to a particular tab or to the first and last tabs using shortcut links
    (First/Previous, Next/Last).


    ![images](images/0613.jpg)


    ***Figure 6-13.** Switching the tab panel using JavaScript*


    The *`<rich:tabPanel>`* currently provides no icons attributes for tabs, and the
    tab component doesn''t currently support tabs positioning on the right or along
    the side. These features are planned to be implemented in next release of RichFaces.
    Visit the RichFaces community often at `www.jboss.org/richfaces/docs` for updates
    and new features.


    ![images](images/square.jpg) **Caution** It''s not possible to place a form inside
    the tab.'
  trans: '

    ### 使用 `<rich:tabPanel>` 和 `<rich:tab>`


    `<rich:tabPanel>` 和 `<rich:tab>` 允许您在页面上创建选项卡面板。`<rich:tabPanel>` 是一个容器，包含一个或多个选项卡
    `(<rich:tab>)`。


    `<rich:tab>` 是单个选项卡的容器，可以包含任何其他内容和任何 JSF 组件。


    清单 6-9 展示了一个示例选项卡面板。


    ***清单 6-9.** 一个示例选项卡面板*


    `<h:form>`

    `   <rich:panel style="width:500px">`

    `      <f:facet name="header">rich:tabPanel and rich:tab</f:facet>`

    `      <rich:tabPanel switchType="ajax">`

    `         <rich:tab header="New York City">`

    `            Statue of Liberty`

    `         </rich:tab>`

    `         <rich:tab header="San Francisco">`

    `            Golden Gate Bridge`

    `         </rich:tab>`

    `         <rich:tab header="Los Angeles">`

    `            Hollywood`

    `         </rich:tab>`

    `      </rich:tabPanel>`

    `   </rich:panel>`

    `</h:form>`


    结果如图 6-9 所示。


    ![images](img/0609.jpg)


    ***图 6-9.** 简单的选项卡面板*


    *`<rich:tab>`* 的标题创建方式与 *`<rich:panel>`* 相同，都是使用带有 `header` 名称的属性。


    通过设置 *`disabled="true"`*，可以轻松地将任何选项卡标记为禁用。当然，*`disabled`* 属性可以指向一个 EL 表达式，并在运行时通过模型进行控制。


    您还可以使用名为 *`header`* 的 facet 来代替相应的属性，以定义由任意数量组件组成的选项卡标题；例如，如果您想在每个选项卡的标题中包含图像，如图
    6-10 所示。


    ![images](img/0610.jpg)


    ***图 6-10.** 带有自定义标题的选项卡面板*


    清单 6-10 展示了所使用的代码。


    ***清单 6-10.** 带有自定义标题的选项卡面板的代码*


    `<h:form>`

    `   <rich:panel style="width:500px">      <f:facet name="header">rich:tabPanel
    and`

    ` rich:tab</f:facet>`

    `      <rich:tabPanel switchType="ajax">`

    `         <rich:tab>`

    `            <f:facet name="header">`

    `               <h:panelGrid columns="2">`

    `                  <h:graphicImage value="/images/yellow_lamp.gif"/>`

    `                  <h:outputText value="New York City" />`

    `               </h:panelGrid>`

    `            </f:facet>`

    `            <h:outputText value="Statue of Liberty" />`

    `         </rich:tab>`

    `         <rich:tab>`

    `            <f:facet name="header">...</f:facet>`

    `            <h:outputText value="Golden Gate Bridge" />`

    `         </rich:tab>`

    `<rich:tab` **`disabled="true"`**`>`

    `            <f:facet name="header">...</f:facet>`

    `            <h:outputText value="Hollywood" />`

    `         </rich:tab>`

    `      </rich:tabPanel>`

    `   </rich:panel>`

    `</h:form>`


    对于 *`<rich:collapsiblePanel>`*，您可以使用相同的三种 *`s`*`witchType`：*`server`*、*`ajax`*
    和 *`client`*。表 6-2 显示了可用的事件和监听器信息。


    ![images](img/t0602.jpg)


    通过将 *`activeItem`* 属性设置为要显示的选项卡的 *`name`*，可以控制在页面首次加载时打开哪个选项卡。请注意，如果未设置 *`name`*，每个选项卡将根据其
    *`id`* 生成 *`name`*。


    清单 6-11 展示了如何打开特定选项卡并呈现图 6-11 所示的内容。


    ***清单 6-11.** 展示如何打开特定选项卡并呈现显示内容*


    `<h:form>`

    `   <rich:panel style="width:500px">`

    `      <f:facet name="header">rich:tabPanel and rich:tab</f:facet>`

    `<rich:tabPanel switchType="ajax"` ***`activeItem="sf"`***`>`

    `<rich:tab header="New York City"` ***`name="nyc"`***`>`

    `            Statue of Liberty`

    `         </rich:tab>`

    `<rich:tab header="San Francisco"` ***`name="sf"`***`>`

    `            Golden Gate Bridge`

    `         </rich:tab>`

    `<rich:tab header="Los Angeles"` ***`name="la"`***`>`

    `            Hollywood`

    `         </rich:tab>`

    `      </rich:tabPanel>`

    `   </rich:panel>`

    `</h:form>` ![images](img/0611.jpg)


    ***图 6-11.** 定义了初始选中选项卡的选项卡面板*


    一个常见的问题是：如何在模型内部控制选中的选项卡？嗯，这非常简单。只需使用 EL 表达式将 *`activeItem`* 指向将保存当前活动选项卡名称的 bean
    属性即可，如清单 6-12 所示。


    ***清单 6-12.** 使用 EL 表达式将* `activeItem` *指向 bean 属性*


    `<h:form>`

    `   <rich:panel style="width:500px">`

    `      <h:selectOneRadio value="#{cityTabBean.city}"`

    `         valueChangeListener="#{cityTabBean.changeCity}">`

    `         <f:selectItem itemLabel="New York" itemValue="nyc" />`

    `         <f:selectItem itemLabel="San Francisco" itemValue="sf" />`

    `         <f:selectItem itemLabel="Los Angeles" itemValue="la" />`

    ***`<a4j:ajax event="change" render="cityTabs @this" />`***

    `      </h:selectOneRadio>`

    `   </rich:panel>`

    `   <rich:panel style="width:500px" header="rich:tabPanel and rich:tab">`

    `<rich:tabPanel switchType="ajax"` ***`id="cityTabs`*`"`**

    `         activeItem="#{cityTabBean.selectedTab}">`

    `         <rich:tab label="New York City" name="nyc">`

    `            Statue of Liberty`

    `         </rich:tab>`

    `         <rich:tab label="San Francisco" name="sf">`

    `            Golden Gate Bridge`

    `         </rich:tab>`

    `         <rich:tab label="Los Angeles" name="la">`

    `            Hollywood`

    `         </rich:tab>`

    `      </rich:tabPanel>`

    `   </rich:panel>`

    `</h:form>`


    通过选择一个单选按钮，会发送一个 Ajax 请求（通过 *`<a4j:ajax>`*），并且绑定到 *`activeItem`* 属性（该属性保存所选选项卡的名称）的
    *`selectedTab`* 属性会在 select *`ValueChangeListener`* 中得到更新。这非常简单，对吧？


    Java bean 代码如清单 6-13 所示。


    ***清单 6-13.** Java bean 代码*


    `@ManagedBean`

    `@SessionScoped`

    `public class CityTabBean {`

    `   private String city = "sf";`

    `   private String selectedTab = "sf";`

    `   public void changeCity(ValueChangeEvent event) {`

    `      selectedTab = (String)event.getNewValue();`

    `   }`

    `   // getters and setters`

    `}`


    其呈现效果如图 6-12 所示。


    ![images](img/0612.jpg)


    ***图 6-12.** 通过外部控件切换的选项卡面板*


    通过外部控件切换选项卡面板的另一个选项是使用其 JavaScript API。清单 6-14 展示了使用 JavaScript API 切换选项卡的代码。


    ***清单 6-14.** 展示使用 JavaScript API 切换选项卡的代码*


    `<rich:panel style="width:500px" header="rich:tabPanel and rich:tab">`

    `   <h:form>`

    `      <rich:panel>`

    `         <a4j:commandLink value="First"`

    `            onclick="#{rich:component(''tp'')}.switchToItem(''@first'');`

    `            return false;" />`

    `         <a4j:commandLink value="Previous"`

    `            onclick="#{rich:component(''tp'')}.switchToItem(''@prev'');`

    `            return false;" />`

    `         <a4j:commandLink value="New York City"`

    `            onclick="#{rich:component(''tp'')}.switchToItem(''nyc'');`

    `            return false;" />`

    `         <a4j:commandLink value="San Francisco"`

    `            onclick="#{rich:component(''tp'')}.switchToItem(''sf'');`

    `            return false;" />`

    `         <a4j:commandLink value="Los Angeles"`

    `            onclick="#{rich:component(''tp'')}.switchToItem(''la'');`

    `            return false;" />`

    `         <a4j:commandLink value="Next"`

    `            onclick="#{rich:component(''tp'')}.switchToItem(''@next'');`

    `            return false;" />`

    `         <a4j:commandLink value="Last"`

    `            onclick="#{rich:component(''tp'')}.switchToItem(''@last'');`

    `            return false;" />`

    `      </rich:panel>`

    `      <rich:tabPanel switchType="ajax" id="tp">`

    `         <rich:tab header="New York City" name="nyc">`

    `            Statue of Liberty`

    `         </rich:tab>`

    `         <rich:tab header="San Francisco" name="sf">`

    `            Golden Gate Bridge`

    `         </rich:tab>`

    `         <rich:tab header="Los Angeles" name="la">`

    `            Hollywood`

    `         </rich:tab>`

    `      </rich:tabPanel>`

    `   </h:form>`

    `</rich:panel>`


    图 6-13 展示了一个可以通过链接切换到特定选项卡，或使用快捷链接（First/Previous, Next/Last）切换到第一个和最后一个选项卡的选项卡面板。


    ![images](img/0613.jpg)


    ***图 6-13.** 使用 JavaScript 切换选项卡面板*


    *`<rich:tabPanel>`* 目前不提供选项卡的图标属性，并且选项卡组件目前也不支持将选项卡定位在右侧或侧面。这些功能计划在 RichFaces
    的下一个版本中实现。请经常访问 RichFaces 社区 `www.jboss.org/richfaces/docs` 以获取更新和新功能。


    ![images](img/square.jpg) **注意** 无法在选项卡内部放置表单。

