- fmt: "### Skipping Model Updates During Validation\n\nValidating an input field\
    \ only when the user tabs out or clicks elsewhere is a popular technique that\
    \ can easily be done with Ajax using the `blur` event. [Listing 3-39](#Chapter03.html#list_3_39)\
    \ shows an example.\n\n**Listing 3-39.** Validating an input field with Ajax using\
    \ the `blur` event\n\n```xml\n<h:form>\n   <h:panelGrid columns=\"3\">\n     \
    \ <h:outputText value=\"Name:\" />\n      <h:inputText id=\"name\" value=\"#{bypassUpdatesBean.name}\"\
    \ >\n         <a4j:ajax event=\"blur\" render=\"nameMessage\"/>\n      </h:inputText>\n\
    \      <h:message for=\"name\" id=\"nameMessage\"/>\n\n      <h:outputText value=\"\
    Email:\" />\n      <h:inputText id=\"email\" value=\"#{bypassUpdatesBean.email}\"\
    \ >\n         <a4j:ajax event=\"blur\" render=\"emailMessage\" />\n      </h:inputText>\n\
    \      <h:message for=\"email\" id=\"emailMessage\"/>\n\n      <h:outputText value=\"\
    Age:\" />\n      <h:inputText id=\"age\" value=\"#{bypassUpdatesBean.age}\" >\n\
    \         <a4j:ajax event=\"blur\" render=\"ageMessage\" />\n      </h:inputText>\n\
    \      <h:message for=\"age\" id=\"ageMessage\"/>\n   </h:panelGrid>\n   <h:commandButton\
    \ value=\"Submit\" action=\"page2\"/>\n</h:form>\n```\n\nEach input field has\
    \ an Ajax behavior attached to its `blur` event. After the input has been entered\
    \ and the user clicks elsewhere or tabs out, an Ajax request will be sent. Validation\
    \ constraints are defined using Bean Validation annotations inside the managed\
    \ bean, as shown in [Listing 3-40](#Chapter03.html#list_3_40). Now, once the entire\
    \ form has been filled and validated, there is button to submit in order to invoke\
    \ the application logic to do something with the input, such as add a new record.\n\
    \n**Listing 3-40.** Validation constraints are defined using Bean Validation annotations\
    \ inside the managed bean\n\n```java\n@ManagedBean\n@RequestScoped\npublic class\
    \ BypassUpdatesBean {\n\n   @Length (min=3, message=\"Name must be at least {min}\
    \ characters long\")\n   private String name;\n\n   @Email(message=\"Invalid email\
    \ address\")\n   private String email;\n\n   @Min(value=1, message=\"Age must\
    \ be greater than 0\")\n   private Integer age;\n\n   // Getters and setters\n\
    }\n```\n\nLet's look closely at what happens when a `blur` event occurs. When\
    \ a `blur` event occurs, an Ajax request is sent to the server and the component's\
    \ data is validated. If we look at what phases we pass when this request is sent,\
    \ then we would see the following (also, at the end of this section, read how\
    \ to create a phase tracker):\n\n- Restore View\n- Apply Request Values\n- Process\
    \ Validations\n- Update Model Values\n- Invoke Application\n- Render Response\n\
    \nNow, is it really necessary to go through Update Model and Invoke Application\
    \ phases when only validating? The answer is no. No action is called and when\
    \ the submit button is clicked, we then go through all the phases as expected.\
    \ So, when validating, we really just need to get to Process Validations and we\
    \ can safely jump to Render Response from there. If validation fails, we will\
    \ go to Render Response anyway, but we would like to go to Render Response even\
    \ if the value is valid.\n\nIf you look closely at the JSF page is [Listing 3-41](#Chapter03.html#list_3_41),\
    \ you will notice that each `<a4j:ajax>` has an extra attribute: `bypassUpdates=\"\
    true\"`.\n\n**Listing 3-41.** Notice that each `<a4j:ajax>` has an extra attribute:\
    \ `bypassUpdates=\"true\"`\n\n```xml\n<h:form>\n   <h:panelGrid columns=\"3\"\
    >\n      <h:outputText value=\"Name:\" />\n      <h:inputText id=\"name\" value=\"\
    #{bypassUpdatesBean.name}\" >\n         <a4j:ajax event=\"blur\" render=\"nameMessage\"\
    \ bypassUpdates=\"true\"/>\n      </h:inputText>\n      <h:message for=\"name\"\
    \ id=\"nameMessage\"/>\n\n      <h:outputText value=\"Email:\" />\n      <h:inputText\
    \ id=\"email\" value=\"#{bypassUpdatesBean.email}\" >\n         <a4j:ajax event=\"\
    blur\" render=\"emailMessage\" bypassUpdates=\"true\"/>\n      </h:inputText>\n\
    \      <h:message for=\"email\" id=\"emailMessage\"/>\n\n      <h:outputText value=\"\
    Age:\" />\n      <h:inputText id=\"age\" value=\"#{bypassUpdatesBean.age}\" >\n\
    \         <a4j:ajax event=\"blur\" render=\"ageMessage\" bypassUpdates=\"true\"\
    />\n      </h:inputText>\n      <h:message for=\"age\" id=\"ageMessage\"/>\n \
    \  </h:panelGrid>\n   <h:commandButton value=\"Submit\" action=\"page2\"/>\n</h:form>\n\
    ```\n\nThis attribute does exactly what we want. It will take use to Process Validations\
    \ and then jump to Render Response even if the value is valid. We will pass through\
    \ the following phases:\n\n- Restore View\n- Apply Request Values\n- Process Validations\n\
    - Render Response\n\n![images](images/square.jpg) **Tip** Use `bypassUpdates`\
    \ to optimize the JSF lifecycle during form validation.\n\n### Creating a Phase\
    \ Tracker\n\n[Listing 3-42](#Chapter03.html#list_3_42) shows an example of a simple\
    \ phase tracker. When registered in a JSF configuration file, it will output what\
    \ JSF phases have passed during a JSF request.\n\n**Listing 3-42.** An example\
    \ of a simple phase tracker\n\n```java\npackage org.richfaces.book.utils.PhaseTracker\n\
    public class PhaseTracker implements javax.faces.event.PhaseListener{\n\n   public\
    \ void afterPhase(PhaseEvent e) {\n      e.getFacesContext().getExternalContext().log(\"\
    after \"+e.getPhaseId());\n   }\n   public void beforePhase(PhaseEvent e) {\n\
    \      e.getFacesContext().getExternalContext().log(\"before \"+e.getPhaseId());\n\
    \   }\n   public PhaseId getPhaseId() {\n      return PhaseId.ANY_PHASE;\n   }\n\
    }\n```\n\n[Listing 3-43](#Chapter03.html#list_3_43) shows a phase tracker registration\
    \ in a JSF configuration file.\n\n**Listing 3-43.** A phase tracker registration\
    \ in a JSF configuration file (`faces-config.xml`)\n\n```xml\n<lifecycle>\n  <phase-listener>org.richfaces.book.utils.PhaseTracker</phase-listener>\n\
    </lifecycle>\n```\n\nWhile running with the phase tracker, [Listing 3-44](#Chapter03.html#list_3_44)\
    \ shows the output when validation error occurs.\n\n**Listing 3-44.** Shows the\
    \ output when validation error occurs\n\n```\nApr 5, 2011 4:24:33 PM org.apache.catalina.core.ApplicationContext\
    \ log\nINFO: before RESTORE_VIEW 1\nApr 5, 2011 4:24:33 PM org.apache.catalina.core.ApplicationContext\
    \ log\nINFO: after RESTORE_VIEW 1\nApr 5, 2011 4:24:33 PM org.apache.catalina.core.ApplicationContext\
    \ log\nINFO: before APPLY_REQUEST_VALUES 2\nApr 5, 2011 4:24:33 PM org.apache.catalina.core.ApplicationContext\
    \ log\nINFO: after APPLY_REQUEST_VALUES 2\nApr 5, 2011 4:24:33 PM org.apache.catalina.core.ApplicationContext\
    \ log\nINFO: before PROCESS_VALIDATIONS 3\nApr 5, 2011 4:24:33 PM org.apache.catalina.core.ApplicationContext\
    \ log\nINFO: after PROCESS_VALIDATIONS 3\nApr 5, 2011 4:24:33 PM org.apache.catalina.core.ApplicationContext\
    \ log\nINFO: before RENDER_RESPONSE 6\nApr 5, 2011 4:24:33 PM org.apache.catalina.core.ApplicationContext\
    \ log\nINFO: after RENDER_RESPONSE 6\n```"
  raw: '#### Skipping Model Updates During Validation


    Validating an input field only when the user tabs out or clicks elsewhere is a
    popular technique that can easily be done with Ajax using the `blur` event. [Listing
    3-39](#Chapter03.html#list_3_39) shows an example.


    ***Listing 3-39.** Validating an input field with Ajax using the blur event*


    `<h:form>`

    `   <h:panelGrid columns="3">`

    `      <h:outputText value="Name:" />`

    `      <h:inputText id="name" value="#{bypassUpdatesBean.name}" >`

    `         <a4j:ajax event="blur" render="nameMessage"/>`

    `      </h:inputText>`

    `      <h:message for="name" id="nameMessage"/>`


    `      <h:outputText value="Email:" />`

    `      <h:inputText id="email" value="#{bypassUpdatesBean.email}" >`

    `         <a4j:ajax event="blur" render="emailMessage" />`

    `      </h:inputText>`

    `      <h:message for="email" id="emailMessage"/>`


    `      <h:outputText value="Age:" />`

    `      <h:inputText id="age" value="#{bypassUpdatesBean.age}" >`

    `         <a4j:ajax event="blur" render="ageMessage" />`

    `      </h:inputText>`

    `      <h:message for="age" id="ageMessage"/>`

    `   </h:panelGrid>`

    `   <h:commandButton value="Submit" action="page2"/>`

    `</h:form>`


    Each input field has an Ajax behavior attached to its `blur` event. After the
    input has been entered and the user clicks elsewhere or tabs out, an Ajax request
    will be sent. Validation constraints are defined using Bean Validation annotations
    inside the managed bean, as shown in [Listing 3-40](#Chapter03.html#list_3_40).
    Now, once the entire form has been filled and validated, there is button to submit
    in order to invoke the application logic to do something with the input, such
    as add a new record.


    ***Listing 3-40.** Validation constraints are defined using Bean Validation annotations
    inside the managed bean*


    `@ManagedBean`

    `@RequestScoped`

    `public class BypassUpdatesBean {`


    `   @Length (min=3, message="Name must be at least {min} characters long")`

    `   private String name;`


    `   @Email(message="Invalid email address")`

    `   private String email;`


    `   @Min(value=1, message="Age must be greater than 0")`

    `   private Integer age;`


    `   // Getters and setters`

    `}`


    Let''s look closely at what happens when a `blur` event occurs. When a `blur`
    event occurs, an Ajax request is sent to the server and the component''s data
    is validated. If we look at what phases we pass when this request is sent, then
    we would see the following (also, at the end of this section, read how to create
    a phase tracker):


    *   Restore View

    *   Apply Request Values

    *   Process Validations

    *   Update Model Values

    *   Invoke Application

    *   Render Response


    Now, is it really necessary to go through Update Model and Invoke Application
    phases when only validating? The answer is no. No action is called and when the
    submit button is clicked, we then go through all the phases as expected. So, when
    validating, we really just need to get to Process Validations and we can safely
    jump to Render Response from there. If validation fails, we will go to Render
    Response anyway, but we would like to go to Render Response even if the value
    is valid.


    If you look closely at the JSF page is [Listing 3-41](#Chapter03.html#list_3_41),
    you will notice that each `<a4j:ajax>` has an extra attribute: `bypassUpdates="true"`.


    ***Listing 3-41.** Notice that each `<a4j:ajax>` has an extra attribute: `bypassUpdates="true"`*


    `<h:form>`

    `   <h:panelGrid columns="3">`

    `      <h:outputText value="Name:" />`

    `      <h:inputText id="name" value="#{bypassUpdatesBean.name}" >`

    `         <a4j:ajax event="blur" render="nameMessage" bypassUpdates="true"/>`

    `      </h:inputText>`

    `      <h:message for="name" id="nameMessage"/>`


    `      <h:outputText value="Email:" />`

    `      <h:inputText id="email" value="#{bypassUpdatesBean.email}" >`

    `         <a4j:ajax event="blur" render="emailMessage" bypassUpdates="true"/>`

    `      </h:inputText>`

    `      <h:message for="email" id="emailMessage"/>`


    `      <h:outputText value="Age:" />`

    `      <h:inputText id="age" value="#{bypassUpdatesBean.age}" >`

    `         <a4j:ajax event="blur" render="ageMessage" bypassUpdates="true"/>`

    `      </h:inputText>`

    `      <h:message for="age" id="ageMessage"/>`

    `   </h:panelGrid>`

    `   <h:commandButton value="Submit" action="page2"/>`

    `</h:form>`


    This attribute does exactly what we want. It will take use to Process Validations
    and then jump to Render Response even if the value is valid. We will pass through
    the following phases:


    *   Restore View

    *   Apply Request Values

    *   Process Validations

    *   Render Response


    ![images](images/square.jpg) **Tip** Use `bypassUpdates` to optimize the JSF lifecycle
    during form validation.


    ##### Creating a Phase Tracker


    [Listing 3-42](#Chapter03.html#list_3_42) shows an example of a simple phase tracker.
    When registered in a JSF configuration file, it will output what JSF phases have
    passed during a JSF request.


    ***Listing 3-42.** An example of a simple phase tracker*


    `package org.richfaces.book.utils.PhaseTracker`

    `public class PhaseTracker implements javax.faces.event.PhaseListener{`


    `   public void afterPhase(PhaseEvent e) {`

    `      e.getFacesContext().getExternalContext().log("after "+e.getPhaseId());`

    `   }`

    `   public void beforePhase(PhaseEvent e) {`

    `      e.getFacesContext().getExternalContext().log("before "+e.getPhaseId());`

    `   }`

    `   public PhaseId getPhaseId() {`

    `      return PhaseId.ANY_PHASE;`

    `   }`

    `}`


    [Listing 3-43](#Chapter03.html#list_3_43) shows a phase tracker registration in
    a JSF configuration file.


    ***Listing 3-43.** A phase tracker registration in a JSF configuration file (`faces-config.xml`)*


    `<lifecycle>`

    `  <phase-listener>org.richfaces.book.utils.PhaseTracker</phase-listener>`

    `</lifecycle>`


    While running with the phase tracker, [Listing 3-44](#Chapter03.html#list_3_44)
    shows the output when validation error occurs.


    ***Listing 3-44.** Shows the output when validation error occurs*


    `Apr 5, 2011 4:24:33 PM org.apache.catalina.core.ApplicationContext log`

    `INFO: before RESTORE_VIEW 1`

    `Apr 5, 2011 4:24:33 PM org.apache.catalina.core.ApplicationContext log`

    `INFO: after RESTORE_VIEW 1`

    `Apr 5, 2011 4:24:33 PM org.apache.catalina.core.ApplicationContext log`

    `INFO: before APPLY_REQUEST_VALUES 2`

    `Apr 5, 2011 4:24:33 PM org.apache.catalina.core.ApplicationContext log`

    `INFO: after APPLY_REQUEST_VALUES 2`

    `Apr 5, 2011 4:24:33 PM org.apache.catalina.core.ApplicationContext log`

    `INFO: before PROCESS_VALIDATIONS 3`

    `Apr 5, 2011 4:24:33 PM org.apache.catalina.core.ApplicationContext log`

    `INFO: after PROCESS_VALIDATIONS 3`

    `Apr 5, 2011 4:24:33 PM org.apache.catalina.core.ApplicationContext log`

    `INFO: before RENDER_RESPONSE 6`

    `Apr 5, 2011 4:24:33 PM org.apache.catalina.core.ApplicationContext log`

    `INFO: after RENDER_RESPONSE 6`'
