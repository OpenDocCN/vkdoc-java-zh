    {`  `    private String menuSelected;`  `    public String getMenuSelected() {`
    `        return menuSelected;` `    }`  `    public PanelMenuBean() {` `    }`  `    public
    void listenerNew(ActionEvent event) {` `        menuSelected = "New";` `    }`  `    public
    void listenerOpenFile(ActionEvent event) {` `        menuSelected = "Open File...";`
    `    }`  `    public void listenerSave(ActionEvent event) {` `        menuSelected
    = "Save";` `    }`  `    public void listenerSaveAll(ActionEvent event) {` `        menuSelected
    = "Save All";` `    }`  `    public void listenerFileGroup() {` `        menuSelected
    = "File Group";` `    }` `}`  Basically we are just storing the label of the group
    or item activated and updating it on the page. The result after expanding the
    `File` group is shown in [Figure 8-16](#Chapter08.html#fig_8_16).  ![images](images/0816.jpg)  ***Figure
    8-16.** Label updated after File group expansion*    The result of the `Open File`
    menu item activation is shown in [Figure 8-17](#Chapter08.html#fig_8_17).  ![images](images/0817.jpg)  ***Figure
    8-17.** Label updated after Open File menu item activation*    There is one more
    interesting attribute that influences menu behavior as well as its look and feel.
    `selectable="true"` in the `File` group means that the group will function as
    an item when selected and any previously selected item will be cleared. The `activeItem`
    attribute, which holds the currently selected item, will be set to the selected
    group name. In other words group became not just item’s container but also a higher
    level item.    When would you use this? It’s useful when expanding the group updates
    on some part of the page with group-related content. And when clicking a item
    in this group, it will show updated content specific to that item. If `selectable`
    is set to *`false`*, the group will still expand and collapse, but the action
    or listener on the group will not be invoked and the `activeItem` attribute will
    not be set to that menu group name after the group expansion. In other words,
    only item could be stored in the model as active in case group has `selectable="false"`.
    A group simply becomes an item container in such case.    In [Chapter 6](#Chapter06.html#ch6)
    we showed you how to manage currently selected item using the `activeItem` attribute.
    It should be set to some menu group `name` (if groups are selectable) or some
    menu item `name`. Also, for the groups you could use the `expanded` attribute
    to control its current state (if `true`, the group will be rendered expanded).
    Both attributes support EL so you could easily manage the `<rich:panelMenu>` state
    in your actions.    [Listings 8-20](#Chapter08.html#list_8_20) and [8-21](#Chapter08.html#list_8_21)
    show how the selected item or group could be defined.    ***Listing 8-20.** Defining
