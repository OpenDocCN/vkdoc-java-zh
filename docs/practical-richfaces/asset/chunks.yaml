    This is where you can see the difference between using custom objects or just
    strings in the suggestion. As we are using custom objects, and can display multiple
    object properties (as we do in the example), the `<rich:column>` tag is used to
    define data columns in the pop-up. This also allows you display content other
    than text, such as images. Next, we need to create the `suggest` method that will
    return values based on input provided. [Listing 5-17](#Chapter05.html#list_5_17)
    shows the method that is placed inside the managed bean.


    ***Listing 5-17.** Shows the method that is placed inside the managed bean*


    *`public ArrayList <State> suggest (String input){`*

    `   ArrayList <State> result = new ArrayList <State>();`

    `   for(State state : statesList) {`

    `      if ((state.getName().toLowerCase()).startsWith(input.toLowerCase()))`

    `         result.add(state);`

    `      }`

    `   return result;`

    `}`


    All we are doing is going through the list of states and checking whether the
    current state name starts with the prefix entered. Because this is inside a managed
    bean, you are free to implement any other method of retrieving the suggested values.
    [Figure 5-15](#Chapter05.html#fig_5_15) shows the result.


    ![images](images/0515.jpg)


    ***Figure 5-15.** <rich:autocomplete> with complex content inside the pop-up*


    Another attribute we want to tell you about is `fetchValue`. As we show objects
    with multiple properties in a suggestions pop-up, we give a hint as to what to
    insert in the selection from the objects list. In this case a state name is used
    for insertion. If you don''t specify `fetchValue`, then the object string representation
    will be inserted (`State.toString()` in this case).


    We are also using the `layout` attribute. This attribute controls what markup
    the component will use for pop-up when a complex list is displayed. In our example,
    we use the *`table`* layout All possible layouts are shown in [Table 5-3](#Chapter05.html#tab_5_3).


    ![images](images/t0503.jpg)


    As you can see, the component is very flexible. You can display any type of information
    and in any number of columns.


