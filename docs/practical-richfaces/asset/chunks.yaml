    13-7.** Parameters in the skin file*  `additionalBackgroundColor=blue` `tabDisabledTextColor=green`  ###
    Using Skins and CSS    Using skins gives you a lot of abstraction in defining
    CSS for the application. However, sometimes you might need more flexibility and
    control over the look and feel. In other words, you might want to define additional
    styles beyond what the skins permit.    There are three levels to defining the
    look and feel of your application. Each stage or level gives you a different degree
    of control. The three approaches are as follows:    *   Skin-based CSS. Using
    ECSS (EL CSS) stylesheets with skin property values applied *   Redefining skin-inserted
    CSS classes *   Adding user-defined styles (via *`style`* or *`styleClass`*-like
    attributes; RichFaces components make available many other class-based attributes)    ####
    Skin-Based CSS    Using skins is basically a global way of describing the look
    and feel of the application. RichFaces will go through the ECSS files applying
    properties of the currently loaded skin. This is the first approach. You control
    the look and feel of an application entirely through skins.    ##### What is ECSS?    In
    RichFaces 4, ECSS (EL CSS) files are used to generate component CSS according
    to skin on the fly when the page is rendered. It uses the familiar CSS format.
    [Listing 13-8](#Chapter13.html#list_13_8) shows how a portion of the `panel.ecss`
    file for `<rich:panel>` looks.    ***Listing 13-8.** A portion of the panel.ecss
    file*  `.rf-p{` `   background-color:''#{richSkin.generalBackgroundColor}'';`
    `   color:''#{richSkin.panelBorderColor}'';` `   border-width:1px;` `   border-style:solid;`
    `   padding:1px;` `}   ` `.rf-p-hdr{` `   background-color:''#{richSkin.headerBackgroundColor}'';`
    `   border-color:''#{richSkin.headerBackgroundColor}'';` `   …` `}`  But why ECSS
    and not just simple CSS with EL inside? Yes, JSF 2 allows you to use EL expressions
    in CSS resources right out of the box. However, there are problems:    *   JSF
    allows turning off EL usage in stylesheets if application CSS files have not used
    it. This is allowed in order to improve performance. But it is not acceptable
    for RichFaces components, where skins is the core feature and components styling
    could be completely broken. *   RichFaces parses the ECSS files to trim properties
    that are not defined by skin. This additional parsing should be done on RichFaces
    resources only and not applied to any third-party or standard stylesheets.    If
    you created your own ECSS stylesheet and need to add to the view, you should simply
    use JSF 2 facilities for that, for example  `<h:outputStylesheet name="application.ecss"/>`  or
    with a ResourceDependency annotation, such as  `@ResourceDependency(name="application.ecss")`  ####
    Redefining Skin-Based CSS Classes    We’ll now demonstrate how to redefine or
    customize CSS styles generated by the skin.    To add new custom styles, simply
    append your custom style into any of the predefined CSS classes coming from the
    skin ECSS. Using the same approach, you can overwrite any of the default styles.
    Let’s look at an example using the `<rich:panel>` component shown in [Listing
    13-9](#Chapter13.html#list_13_9).    ***Listing 13-9.** An example using the `<rich:panel>`
