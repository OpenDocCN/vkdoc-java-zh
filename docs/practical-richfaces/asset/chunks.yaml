    #### 使用 `<a4j:region>` 定义执行区域


    发送 Ajax 请求时，始终需要牢记服务器端将要处理或执行的内容。如我们所知，使用 `<f:ajax>` 或 `<a4j:ajax>` 时，`execute`
    属性默认为 `@this`（可设置的其他值包括：`@all`、`@form`、`@none`、ID、以及类似于 `render` 中使用的 EL 表达式）。使用
    RichFaces 的 `<a4j:poll>` 或 `<a4j:jsFunction>` 时，`execute` 属性也默认为 `@this`。但是，使用
    `<a4j:commandButton>` 或 `<a4j:commandLink>` 时，`execute` 属性则设置为 `@form` 值。为什么 RichFaces
    要更改默认值？在大多数情况下，按钮或链接在表单内用于执行完整的表单提交。您输入信息后，点击按钮或链接进行提交。由于您刚刚输入了内容，因此也需要处理这些输入。如果
    `execute` 设置为默认值 `@this`，我们就需要将表单内的每个输入组件也包含进来以便执行，或者将 `execute` 设置为 `@form`（或父容器的
    ID）。将 `<a4j:commandButton>` 和 `<a4j:commandLink>` 的 `execute` 属性默认设置为 `@form`，使得开发更加便捷。


    RichFaces 还增加了另一项功能，使标记要执行的内容更加简单。RichFaces 增加了 `<a4j:region>` 和 `@region` 关键字。清单
    3-36 展示了一个无法正常工作的 JSF 示例，因为嵌套在 `<h:commandButton>` 内部的 `<a4j:ajax>` 没有设置 `execute`
    属性。


    ***清单 3-36.** 展示一个无法正常工作的 JSF 示例*


    `<h:form>`

    `   <h:panelGrid>`

    `      <h:selectOneMenu id="type" value="#{flowerRegionBean.type}">`

    `         <f:selectItem itemValue="Roses" itemLabel="Roses" />`

    `         <f:selectItem itemValue="Tulips" itemLabel="Tulips" />`

    `         <f:selectItem itemValue="Irises" itemLabel="Irises" />`

    `      </h:selectOneMenu>`

    `      <h:selectOneMenu id="size" value="#{flowerRegionBean.size}">`

    `         <f:selectItem itemValue="Small" itemLabel="Small" />`

    `         <f:selectItem itemValue="Large" itemLabel="Large" />`

    `         <f:selectItem itemValue="Extra Large" itemLabel="Extra Large" />`

    `      </h:selectOneMenu>`

    `      <h:selectOneMenu value="#{flowerRegionBean.vase}">`

    `         <f:selectItem itemValue="Standard vase" itemLabel="Standard vase" />`

    `         <f:selectItem itemValue="Premium vase" itemLabel="Premium vase" />`

    `         <f:selectItem itemValue="No vase" itemLabel="No vase" />`

    `      </h:selectOneMenu>`

    `      <h:commandButton value="Buy Flowers!">`

    `         <a4j:ajax event="click"/>`

    `      </h:commandButton>`

    `   </h:panelGrid>`

    `   <a4j:outputPanel ajaxRendered="true" layout="block">`

    `      <h:panelGrid>`

    `         <h:outputText value="#{flowerRegionBean.type}" />`

    `         <h:outputText value="#{flowerRegionBean.size}" />`

    `         <h:outputText value="#{flowerRegionBean.vase}" />`

    `      </h:panelGrid>`

    `   </a4j:outputPanel>`

    `</h:form>`


    托管 Bean 如清单 3-37 所示。


    ***清单 3-37.** 托管 Bean*


    `@ManagedBean`

    `@RequestScoped`

    `public class FlowerRegionBean {`


    `   private String type;`

    `   private String size;`

    `   private String vase;`


    `   // getters and setters`

    `}`


    要使其正常工作，我们要么必须在 `execute` 属性中列出所有输入组件，要么在面板网格上设置一个 ID 并将 `execute` 指向该 ID。另一种本质上更具声明性的方法是使用
    `<a4j:region>`。因此，要使清单 3-37 中的示例正常工作，我们只需将输入组件和按钮包裹在 `<a4j:region>` 内，如清单 3-38
    所示。


    ***清单 3-38.** 将输入组件和按钮包裹在 `<a4j:region>` 内*


    `<h:form>`

    **`<a4j:region>`**

    `      <h:panelGrid>`

    `         …`

    `         <h:commandButton value="Buy Flowers!">`

    `            <a4j:ajax event="click" />`

    `         </h:commandButton>`

    `      </h:panelGrid>`

    **`</a4j:region>`**

    `   <a4j:outputPanel ajaxRendered="true">`

    `      <h:panelGrid>`

    `         <h:outputText value="#{flowerRegionBean.type}" />`

    `         <h:outputText value="#{flowerRegionBean.size}" />`

    `         <h:outputText value="#{flowerRegionBean.vase}" />`

    `      </h:panelGrid>`

    `   </a4j:outputPanel>`

    `</h:form>`


    这种方法更具声明性，因为您不再需要指定要执行哪些 ID。来自该区域内的任何 Ajax 请求以及该区域内的所有输入组件都将被执行（除非其他 Ajax 组件或行为明确指定了要执行的组件，在这种情况下它们将覆盖该区域）。使用区域时，您还可以使用
    `@region` 关键字，如下所示：


    `<a4j:ajax event="click" execute="@region"/>`


    这表示执行该区域内的所有内容，并且是可选的。即使我们没有像示例中那样指定 `@region`，该区域默认也会被执行。

