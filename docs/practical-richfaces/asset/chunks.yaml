    Let''s see how we can use the *`onevent`* callback to add custom JavaScript to
    be called during the Ajax request. Keep in mind these are client-side (browser)
    events. First, we need to create the JavaScript function. We can place [Listing
    2-46](#Chapter02.html#list_2_46) right after the `<body>` tag in the JSF page.


    ***Listing 2-46.** Creating a JavaScript function*


    `<script>`

    `function ajaxRequestListener (event){`

    `   if (event.status == ''begin''){`

    `      if(!confirm(''Are you sure you want change the color?'' + ''`

    `         (''+event.status+'')'')) {`

    `            form.reset();`

    `            return false;`

    `      }`

    `   }`

    `   else if (event.status == ''complete''){`

    `      alert(''Just before DOM update'' + '' (''+event.status+'')'');`

    `   }`

    `   else if (event.status == ''success''){`

    `        alert(''Color changed. We told you so.'' + '' (''+event.status+'')'');`

    `   }`

    `}`


    `</script>`


    Because the `ajaxRequestListener` JavaScript function will be called three times,
    at *`begin`*, *`complete`* and *`success`* points, the function has three if-statements
    to handle each event separately. The only thing we are left to do is add the callback
    function to `<f:ajax>` behavior, as shown in [Listing 2-47](#Chapter02.html#list_2_47).


    ***Listing 2-47.** Adding a callback function to `<f:ajax>` behavior*


