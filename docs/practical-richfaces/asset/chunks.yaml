    11-4.** 将消息显示为简单列表*    如果您需要基于表格的标记，请将 `display` 属性更新为 `table-row` 值，并考虑到 span
    作为表格行进行 CSS 调整。    #### 回退到服务器验证    当您使用没有客户端实现的验证时，例如使用自定义验证时，RichFaces 将自动回退到服务器端
    Ajax 验证。您无需做任何事情。目前，RichFaces 仅为 Bean 验证（JSR 303）规范中的所有验证提供客户端实现。如果我们采用 Hibernate
    Validator，它是参考实现（在我们的示例中使用），它超出了规范的范围，并提供了额外的验证，例如 `@Email`。`@Email` 将确保输入具有有效的电子邮件格式。RichFaces
    目前不支持此注解，在我们的示例中，我们使用了 `@Pattern` 注解。但是，使用 `@Email`，我们可以精确地看到何时使用客户端验证以及何时使用服务器端验证。    ![images](img/square.jpg)
    **注意** RichFaces 为 `javax.validation.*` 包中的所有验证器提供客户端实现。注解列表可以在 Java EE 6 教程：使用
    Bean 验证页面 [`http://download.oracle.com/javaee/6/tutorial/doc/gircz.html`](http://download.oracle.com/javaee/6/tutorial/doc/gircz.html)
    上找到。    首先，我们需要更新 Bean。清单 11-9 显示了在 `email` 属性上使用 `@Email` 而不是 `@Pattern` 注解（仅显示与
    `@Email` 注解相关的部分代码）。    ***清单 11-9.** 更新后的托管 Bean*  `import org.hibernate.validator.constraints.Email;`
    `// 其他导入` `@ManagedBean` `@RequestScoped` `public class ValidationBean {` `   @Email`
    `   private String email;` `   // 其他属性、getter 和 setter` `}`  您会注意到 `@Email` 注解来自
    `org.hibernate.validator.*` 包。    当您运行页面时，您不会看到任何差异，这是期望的结果。即使没有为 `@Email` 约束提供客户端实现，一切也按预期工作；`email`
    的验证在后台回退到了服务器端。在页面上放置 `<a4j:log>` 标签是一种非常快速和简单的方法，可以查看何时调用客户端验证以及何时调用服务器端验证。如果您还记得，`<a4j:log>`
    显示 Ajax 请求和响应信息。如果使用了客户端验证，那么 `<a4j:log>` 将不会显示任何输出。如果使用了服务器端验证，那么 `<a4j:log>`
    将显示 Ajax 请求和响应信息。    ### 图形验证器    在 JSF 中验证组件的值很简单，但比较两个输入是否相等或根据任何其他验证规则进行验证，不幸的是，并不是一项容易的任务。没有内置的
    JSF 功能允许我们在验证期间“查看”两个或多个值。您可以找到变通方法，但 RichFaces 通过其 `<rich:graphValidator>` 标签使这项任务变得简单得多。最简单的理解方法是看一个示例，最简单的示例是查看两个字符串输入是否相等。让我们从清单
    11-10 中显示的 JSF 页面开始。    ***清单 11-10.** JSF 页面*  `<rich:messages />` `<h:form>`
    `   <h:panelGrid columns="2">` `      <h:outputText value="文本 1:" />` `      <h:inputText
    id="text1" value="#{graphValidationBean.text1}" />` `      <h:outputText value="文本
    2:" />` `      <h:inputText id="text2" value="#{graphValidationBean.text2}" />`
    `   </h:panelGrid>` `   <h:commandButton action="result.xhtml" value="检查输入" />`
    `</h:form>`  页面非常简单；它只有两个输入。我们的目标是单独验证每个输入，但也要确保两个输入相等。这与您今天在许多表单上看到的确认密码字段非常相似。还有一点需要注意的是，错误消息使用
    `<rich:messages>` 显示在页面顶部。    单击按钮时，如果输入有效且相等，我们将导航到 `result.xhtml` 页面。此页面可以简单到显示以下内容：  `<h4>输入相等。</h4>`  验证约束在清单
    11-11 中定义。    ***清单 11-11.** 定义验证约束*  `@ManagedBean` `@RequestScoped` `public
    class GraphValidationBean implements java.lang.Cloneable{` `   @NotNull` `   @Size
    (min=3,max=10, message="文本 1 必须在 {min} 和 {max} 之间。")` `   private String text1;`  `   @NotNull`
    `   @Size (min=3,max=10, message="文本 2 必须在 {min} 和 {max} 之间。")` `   private String
    text2;`  `   @AssertTrue (message="文本 1 和文本 2 不相等")` `   public boolean isTextEqual
    (){` `      return text1.equals(text2);` `   }    @Override` `   public Object
    clone() throws CloneNotSupportedException {` `      return super.clone();` `   }`
    `   // Getters and setters` `}`  我们可以继续运行页面。验证应该按预期被调用。但是，即使输入中的值不相等，我们也能够导航到下一页。如果您仔细查看页面和
    Bean，您会注意到输入组件绑定到 `text1` 和 `text2` 属性。但是，还有一个使用 `@AssertTrue` 定义的约束。它没有绑定到页面上的任何
    UI 组件，但这也是我们需要的约束。它将检查两个输入是否相同。我们如何确保检查此约束？我们将所有输入包含在 `<rich:graphValidator>`
    内部，并将标签的 `value` 属性设置为指向名为 `graphValidator` 的托管 Bean，如清单 11-12 所示。    ***清单 11-12.**
    使用 `<rich:graphValidator>`*  `<rich:messages for="gv"/>` `<h:form>` **`<rich:graphValidator
    value="#{graphValidatorBean}" id="gv">`** `      <h:panelGrid columns="2">` `         <h:outputText
    value="文本 1:" />` `         <h:inputText id="text1" value="#{graphValidationBean.text1}"
    />` `         <h:outputText value="文本 2:" />` `         <h:inputText id="text2"
    value="#{graphValidationBean.text2}" />` `      </h:panelGrid>` **`</rich:graphValidator>`**
    `   <h:commandButton action="result.xhtml" value="检查输入" />` `</h:form>`  当页面提交时，每个组件都会像往常一样在“处理验证”阶段进行验证。错误消息显示在页面顶部，如图
    11-5 所示。  ![images](img/1105.jpg)  ***图 11-5.** 单独验证每个输入*    如果每个单独的组件都通过了验证，那么图形验证器就派上用场了。如您所见，`<rich:graphValidator>`
    的 value 属性绑定到托管 Bean。这就是触发对整个 Bean 再次运行验证的原因，包括未绑定到任何 UI 组件的约束。所以基本上，所有绑定的属性都会被再次验证，并且它们已经持有有效的值。此外，我们验证了
    Bean 中的所有其他约束。在我们的示例中，那就是 `@AssertTrue`，如图 11-6 所示。  ![images](img/1106.jpg)  ***图
    11-6.** 图形验证器错误消息*    这个验证在哪里发生？它发生在“处理验证”阶段。您可能想知道，如果值尚未设置到属性中（因为我们还没有通过“更新模型”阶段），如何对整个
    Bean 调用验证？RichFaces 会复制或克隆（称为 `clone()`）Bean，提交的值被复制到克隆的副本中，然后对克隆的副本调用验证。这就是为什么我们需要将所有绑定到该
    Bean 属性的输入包装在 `<rich:graphValidator>` 标签中，并且 Bean 必须实现 `java.lang.Cloneable` 接口。唯一的例外在下面的注意事项中说明。    ![images](img/square.jpg)
    **注意** 如果 Bean 没有实现 `Cloneable`，则会抛出 `CloneNotSupportedException` 异常。在这种情况下，当
    RichFaces 尝试克隆对象时，验证将在“更新模型”阶段之后进行（在模型实际更新后，所有值都可用）。不用担心，您不会看到此异常，因为 RichFaces
    会捕获它，并将在“更新模型”阶段执行验证。    ![images](img/square.jpg) **注意** 为了使图形验证器在“处理验证”阶段被调用，`clone()`
    方法必须被覆盖并且是公共的。在简单属性的情况下，您不需要做任何事情，只需调用 `super()`。如果存在其他属性——例如自定义对象（因此需要深克隆）、列表或映射——则克隆机制必须由开发人员实现。    ###
    总结    验证是任何 Web 应用程序的关键部分。JSF 2 通过为强大且流行的 Bean 验证提供开箱即用的支持，使验证变得容易。RichFaces 通过提供客户端验证将验证提升到了一个新的水平。RichFaces
    通过将验证模型带到客户端来简单地扩展它。验证可以在客户端执行，而无需发送 Ajax 请求。在特定验证的客户端实现不可用的情况下，RichFaces 会静默地回退到服务器端验证，而无需开发人员做任何事情。最后，RichFaces
    提供了图形验证器，它可以再次验证整个 Bean。图形验证器验证所有绑定到 UI 组件的属性，以及未绑定到 UI 组件的属性。图形验证器对于条件验证很有用，例如比较两个输入是否满足验证规则。    ##
    第 12 章    ## 丰富的组件 JavaScript API、客户端函数和使用 jQuery    在本章中，我们将介绍许多杂项但重要的组件和函数。我们将从广泛使用的
    `#{rich:component()}` 客户端函数和 `<rich:componentControl>` 行为开始。两者都使得调用组件上可用的 JavaScript
    API 成为可能。然后我们将介绍其他客户端函数。最后，我们将介绍剩余的两个组件：`<rich:jQuery>`，它将 jQuery JavaScript 框架集成到
    JSF 应用程序中，以及 `<rich:hashParam>`，它允许将一组客户端参数传递给客户端组件。    ### 调用组件的 JavaScript API    在本节中，我们将向您展示两种不同的调用组件
    JavaScript API 的方法。    #### 使用 #rich:component(id) 函数    我们在第 4 章 中介绍丰富组件时已经介绍了
    `#{rich:component()}`。但让我们在这里再次简要介绍它。如您所知，许多 RichFaces 组件都提供了 JavaScript API。当组件提供
    JavaScript API 时，可以在客户端控制该组件，例如在选项卡组件的情况下切换选项卡，或者在弹出组件的情况下显示和隐藏。在我们可以在组件上调用 JavaScript
    函数之前，我们需要在客户端获取对该组件的引用，而这正是 `#{rich:component()}` 所做的。当放置在页面上时，它会渲染一个 JavaScript，该
    JavaScript 在浏览器中获取对组件的引用。    让我们通过一个示例来看看它是如何工作的。我们将从 RichFaces 中最流行的组件之一开始：`<rich:popupPanel>`。此弹出窗口通常渲染在页面上，但它是隐藏的。显示和隐藏弹出窗口是在客户端（例如浏览器）上完成的。清单
    12-1 显示了一个弹出面板。    ***清单 12-1.** 一个弹出面板*  `<h:outputLink value="#"  ` `   onclick="#{rich:component(''popup'')}.show();return`
    `      false;">打开</h:outputLink>` `   <rich:popupPanel header="RichFaces" id="popup">`
    `      <h:panelGrid>` `         <h:outputText value="这是一个 RichFaces 弹出窗口" />`
    `         <h:outputLink value="#"` `            onclick="#{rich:component(''popup'')}.hide();">关闭</h:outputLink>`
    `      </h:panelGrid>` `</rich:popupPanel>`  最重要的代码在打开和关闭链接的 `onclick` 事件中。正如我们已经提到的，显示和隐藏面板是在客户端完成的，因此我们需要在客户端获取对弹出组件的引用并调用
    JavaScript API。这正是我们使用 `#{rich:component()}` 所做的。`#{rich:component()}` 提供了对所有组件
    JavaScript API 的引用。有了这个引用，我们可以调用任何可用的函数。在我们的示例中，我们调用 `show()` 来显示组件，调用 `hide()`
    来隐藏组件。您如何知道哪些 API 可用？RichFaces 文档列出了每个组件的所有函数。每当您需要获取组件 JavaScript API 的引用时，您可以使用
    `#{rich:component()}`，并将组件 id 传递给它，如下所示：  `#{rich:component(id)}`  需要指出的是，该函数接受组件
    id，而不是客户端 id。    ![images](img/square.jpg) **提示** [`www.jboss.org/richfaces`](http://www.jboss.org/richfaces)
