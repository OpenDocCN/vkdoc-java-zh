    #### bypassUpdates 属性


    验证在任何 Web 应用中显然都是一项非常常见的任务。当仅验证表单输入时，通常不需要经历 JSF 生命周期的所有阶段，特别是更新模型阶段和调用应用阶段。在本节中，你将学习如何在验证表单字段时跳过这两个阶段，以优化
    JSF 请求。让我们从一个非常简单的示例开始，该示例看起来像图 2-2。


    ![images](img/0202.jpg)


    ***图 2-2.** 一个简单的注册表单。*


    图 2-3 显示了发生错误时的样子。


    ![images](img/0203.jpg)


    ***图 2-3.** 带有错误消息的简单注册表单*


    清单 2-35 展示了 `register.xhtml` 页面。


    ***清单 2-35.** 展示 `register.xhtml` 页面*


    `<h:form>`

    `   <h:panelGrid columns="3">`

    `      <h:outputText value="Name:" />`

    `      <h:inputText id="name" value="#{bean2.name}">`

    `         <f:validateRequired/>`

    `         <f:validateLength minimum="3"/>`

    `         <a4j:ajax event="blur" render="errorName"/>`

    `      </h:inputText>`

    `      <h:message id="errorName" for="name"/>`


    `      <h:outputText value="Age:" />`

    `      <h:inputText id="age" value="#{bean2.age}">`

    `         <f:validateRequired/>`

    `         <f:validateLongRange minimum="0"/>`

    `         <a4j:ajax event="blur" render="errorAge"/>`

    `      </h:inputText>`

    `      <h:message id="errorAge" for="age"/>`

    `   </h:panelGrid>`

    `   <h:commandButton value="Register" action="result"/>`

    `</h:form>`


    清单 2-36 展示了 `result.xhtml` 页面。


    ***清单 2-36.** 展示 `result.xhtml` 页面*


    `<h:panelGrid>`

    `      <h:outputText value="#{bean2.name}, #{bean2.age}" />`

    `</h:panelGrid>`


    清单 2-37 展示了受管 bean。


    ***清单 2-37.** 展示受管 bean*


    `@ManagedBean`

    `@RequestScoped`

    `public class Bean2 {`

    `   private String name;`

    `   private Integer age;`


    `   // getters and setters`

    `}`


    这是一个非常简单的带有基于 Ajax 验证的注册表单。换句话说，当我们使字段失去焦点（Tab 键移出或点击外部）时，会触发一个 Ajax 请求。我们开始经历
    JSF 阶段。如果存在验证错误，在“处理验证”阶段之后，我们会转到“渲染响应”阶段。如果没有验证错误，那么我们会完成所有阶段，经历“更新模型”和“调用应用”阶段。为了观察实际效果，让我们创建一个阶段监听器，它会在我们经过每个阶段时向控制台打印一条消息。


    如果你需要回顾 JSF 阶段，它们显示在图 2-4 中。


    ![images](img/0204.jpg)


    ***图 2-4.** JSF 生命周期图*


    JSF 在每个阶段之前和之后触发所谓的事件。我们可以编写一个监听器来监听这些事件，并向日志输出一条消息。阶段监听器可以用于其他任何目的，例如在阶段之间注入自定义功能。


    阶段监听器如清单 2-38 所示。


    ***清单 2-38.** 阶段监听器*


    `import javax.faces.event.PhaseEvent;`

    `import javax.faces.event.PhaseId;`

    `import javax.faces.event.PhaseListener;`


    `public class PhaseTracker implements PhaseListener {`


    `   public void afterPhase(PhaseEvent event) {`

    `      event.getFacesContext().getExternalContext().log("AFTER`

    `         "+event.getPhaseId());`

    `   }`

    `   public void beforePhase(PhaseEvent event) {`

    `      event.getFacesContext().getExternalContext().log("BEFORE  `

    `         "+event.getPhaseId());`

    `   }`

    `   public PhaseId getPhaseId() {`

    `      return PhaseId.ANY_PHASE;`

    `   }`

    `}`


    `beforePhase` 和 `afterPhase` 方法非常简单。我们所做的只是向日志打印一条消息。`getPhaseId()` 返回要调用此特定监听器的阶段
    ID。我们希望监听器在每个阶段都被调用，因此我们返回 `PhaseId.ANY_PHASE`。也可以返回一个特定的阶段，例如 `PhaseId.INVOKE_APPLICATION`，或者也可以返回两个或更多阶段。


    最后一步是在 JSF 配置文件（`faces-config.xml`）中注册此阶段监听器，如清单 2-39 所示。


    ***清单 2-39.** 在 JSF 配置文件中注册阶段监听器*


    `<lifecycle>`

    `  <phase-listener>org.richfaces..book.PhaseTracker</phase-listener>`

    `</lifecycle>`


    在 JSF 2 中，阶段监听器还没有注解。


    当你加载页面时，将鼠标光标放在名称字段内，然后点击其他地方。你应该会看到如清单 2-40 所示的控制台输出。


    ***清单 2-40.** 显示的控制台输出*


