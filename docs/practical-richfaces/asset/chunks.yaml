    />`  当您拖动任何产品时，您将不再看到面板。相反，您将看到一个只有定义内容的小面板。并且，如果我们不删除 `rf-ind-drag` 和其他两个样式（放置接受、放置不接受）的样式类定义，我们应该会看到如图
