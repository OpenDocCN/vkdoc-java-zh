    As with other panels, `<rich:togglePanel>` can be switched using three common
    modes: `server`, `ajax`, and `client`. And in the same way, it allows the `activeItem`
    attribute to bind the current panel id to the model and `itemChangeListener` to
    process the item switching in ajax or server mode.


    ![images](images/square.jpg) **Caution** The panel has to be placed inside a form
    in ajax and server mode.


