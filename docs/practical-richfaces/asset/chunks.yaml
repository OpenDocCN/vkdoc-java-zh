    `<cdk:scriptObject>` tag allows creating a hash map from the parameters defined
    using `<cdk:scriptOption>` tags for further referencing JavaScript statements
    in the template.    We have two script options. One of the options uses the `attributes`
    attribute to reference `step`, `maxValue`, and `minValue` component attributes.
    In this case they will be placed into a map with the same names, and the values
    will be retrieved from the component object. That’s one way to insert a set of
    attributes into a JavaScript options map.    The second option shows you the way
    to output a single option. In fact, in our case we might output `value` using
    the first tag in the same way. We wanted to demonstrate an alternative and more
    flexible usage. We define any `name` using a corresponding attribute (and not
    use the same name that the attribute is using). We define `defaultValue` (in case
    it’s not defined on a base component class using `@Attribute` or the class doesn’t
    exist) and reference the value with any valid EL expression. In our case we are
    referencing the `component` using an implicit variable and getting value from
