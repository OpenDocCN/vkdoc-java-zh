- fmt: "### Dynamic render with RichFaces\n\nWhen using RichFaces `<a4j:ajax>` and\
    \ `render=\"#{bean.renderComponents}\"`, the component ids to be rendered are\
    \ resolved in the current request. To go back to our original example, just switch\
    \ to using `<a4j:ajax>` and everything will work. [Listing 2-33](#Chapter02.html#list_2_33)\
    \ shows the JSF page again.\n\n**Listing 2-33.** Shows the JSF page\n\n```\n<h:form\
    \ id=\"form\">\n   <h:panelGrid>\n      <h:selectOneRadio value=\"#{bean.selection}\"\
    >\n         <f:selectItem itemValue=\"clock1\" itemLabel=\"Clock 1\" />\n    \
    \     <f:selectItem itemValue=\"clock2\" itemLabel=\"Clock 2\" />\n         <f:selectItem\
    \ itemValue=\"clock3\" itemLabel=\"Clock 3\" />\n      </h:selectOneRadio>\n \
    \     <h:commandButton id=\"updateButton\" value=\"Update\">\n      <a4j:ajax\
    \ event=\"click\" execute=\"@form\"\n         listener=\"#{bean.selectComponents}\"\
    \   \n            render=\"#{bean.renderComponents}\"/>\n       </h:commandButton>\n\
    \   </h:panelGrid>\n   <h:panelGrid cellspacing=\"6\">\n      <h:outputText id=\"\
    clock1\" value=\"#{bean.clock1}\" />\n      <h:outputText id=\"clock2\" value=\"\
    #{bean.clock2}\" />\n      <h:outputText id=\"clock3\" value=\"#{bean.clock3}\"\
    \ />\n   </h:panelGrid>\n</h:form>\n```\n\nAll we did is change the behavior name\
    \ from `<f:ajax>` to `<a4j:ajax>`.\n\n[Listing 2-34](#Chapter02.html#list_2_34)\
    \ shows the managed bean.\n\n**Listing 2-34.** Shows the managed bean\n\n```\n\
    @ManagedBean\n@RequestScoped\npublic class Bean {\n\n   private String selection;\n\
    \   private List <String> renderComponents;\n\n   @PostConstruct\n   public void\
    \ init (){\n      renderComponents = new ArrayList <String>();\n   }\n   public\
    \ void selectComponents (AjaxBehaviorEvent event){\n      renderComponents.add(selection);\n\
    \   }\n   public List<String> getRenderComponents() {\n      return renderComponents;\n\
    \   }\n   public String getSelection() {\n      return selection;\n   }\n   public\
    \ void setSelection(String selection) {\n      this.selection = selection;\n \
    \  }\n   public Date getClock1() {\n      return new Date();\n   }\n   public\
    \ Date getClock2() {\n      return new Date();\n   }\n   public Date getClock3()\
    \ {\n      return new Date();\n   }\n}\n```\n\nNotice that we no longer need to\
    \ add the button to the list of components to be rendered. Running the application,\
    \ everything is now updated as you would expect.\n\nSimplicity is just one of\
    \ the advantages to using `<a4j:ajax>` and the `render` attribute bound to EL.\
    \ One more advantage is that evaluating the ids on the server instead of getting\
    \ them client side is more secure, as anyone could send a request with ids using\
    \ `<f:ajax>`. If this happens with `<a4j:ajax>`, these ids will simply be ignored.\n\
    \n![images](images/square.jpg) **Note** The same functionality is available on\
    \ other RichFaces tags, such as `<a4j:commandButton>`, `<a4j:commandLink>`, `<a4j:poll>`,\
    \ and `<a4j:jsFunction>`. We will cover this in [Chapter 3](#Chapter03.html#ch3).\
    \ We used the `listener` attribute on either `<f:ajax>` or `<a4j:ajax>` behaviors.\
    \ If you have an action or an `actionListener` set on the button or link, those\
    \ will be invoked in a standard way.\n\n### execute Attribute Options\n\nThe same\
    \ way it's possible to bind the `render` attribute to EL or decide which components\
