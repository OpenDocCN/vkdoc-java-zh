  raw: '#### render Attribute Options


    As you have seen, the `render` attribute works the same way except for a few differences
    when using id or EL, as shown in [Table 2-8](#Chapter02.html#tab_2_8).


    ![Images](images/t0208.jpg)


    In standard JSF 2, it''s possible to list any number of ids in `render`, each
    separated by a space, as shown in [Listing 2-26](#Chapter02.html#list_2_26).


    ***Listing 2-26.** List any number of ids, each separated by a space*


    `<h:inputText value="#{bean.text}">`

    `   <f:ajax event="change" render="id1 id2 id3 idX"/>`

    `</h:inputText>`


    When using `<a4j:ajax>`, in addition to a space, it''s also possible to separate
    with a comma (,) as shown in [Listing 2-27](#Chapter02.html#list_2_27).


    ***Listing 2-27.** Example of separating ids with a comma instead of just a space*


    `<h:inputText value="#{bean.text}">`

    `   <f:ajax event="change" render="id1, id2, id3, idN"/>`

    `</h:inputText>`


    We believe using a comma is a little easier and more familiar for those who used
    `<a4j:support>` with RichFaces 3, but it''s really up to you.


    The second difference is more important. Next, we''ll use an example to show how
    it works in JSF 2.


    ##### Dynamic render


    To show how a dynamic render works in JSF 2, we''ll create a sample page to look
    like [Figure 2-1](#Chapter02.html#fig_2_1).


    ![images](images/0201.jpg)


    ***Figure 2-1.** Dynamic render with three clocks*


    Instead of hard coding the component to render, we are going to select which component
    we would like to update. Now, being able to set the `render` attribute to an EL
    is supported by JSF 2; however, it works slightly different when using RichFaces.


    [Listing 2-28](#Chapter02.html#list_2_28) shows the JSF page.


    ***Listing 2-28.** Shows the JSF page*


    `<h:form id="form">`

    `   <h:panelGrid>`

    `      <h:selectOneRadio value="#{bean.selection}">`

    `         <f:selectItem itemValue="clock1" itemLabel="Clock 1" />`

    `         <f:selectItem itemValue="clock2" itemLabel="Clock 2" />`

    `         <f:selectItem itemValue="clock3" itemLabel="Clock 3" />`

    `      </h:selectOneRadio>`

    `      <h:commandButton id="updateButton" value="Update">`

    `        <f:ajax event="click" execute="@form" listener="#{bean.selectComponents}"`

    `                render="#{bean.renderComponents}" />`

    `       </h:commandButton>`

    `   </h:panelGrid>`

    `   <h:panelGrid cellspacing="6">`

    `      <h:outputText id="clock1" value="#{bean.clock1}" />`

    `      <h:outputText id="clock2" value="#{bean.clock2}" />`

    `      <h:outputText id="clock3" value="#{bean.clock3}" />`

    `   </h:panelGrid>`

    `</h:form>`


    [Listing 2-29](#Chapter02.html#list_2_29) shows the managed bean.


    ***Listing 2-29.** Shows the managed bean*


    `import java.util.ArrayList;`

    `import java.util.Date;`

    `import java.util.List;`


    `import javax.annotation.PostConstruct;`

    `import javax.faces.bean.ManagedBean;`

    `import javax.faces.context.FacesContext;`

    `import javax.faces.event.AjaxBehaviorEvent;`


    `@ManagedBean`

    `@RequestScoped`

    `public class Bean {`


    `   private String selection;`

    `   private List <String> renderComponents;`


    `   @PostConstruct`

    `   public void init (){`

    `      renderComponents = new ArrayList <String>();`

    `      renderComponents.add("updateButton");`

    `   }`

    `   public void selectComponents (AjaxBehaviorEvent event){`

    `      renderComponents.add(selection);`

    `   }`

    `   public List<String> getRenderComponents() {`

    `      return renderComponents;`

    `   }`

    `   public String getSelection() {`

    `      return selection;`

    `   }`

    `   public void setSelection(String selection) {`

    `      this.selection = selection;`

    `   }`

    `   public Date getClock1() {`

    `      return new Date();`

    `   }`

    `   public Date getClock2() {`

    `      return new Date();`

    `   }`

    `   public Date getClock3() {`

    `      return new Date();`

    `   }`

    `}`


    Select Clock 2 and press update. Nothing happens. Now go ahead and select Clock
    3\. Click update. Clock 2 got updated. That''s not a bug, that''s how JSF 2 works
    with `render` bound to an EL.


    Let''s take it step by step, as follows:


    1.  Page is rendered for the first time

    2.  Select any clock, let''s say Clock 1\. Click submit.

    3.  The value of `Clock1` is sent to the server. At this point we would expect
    component `Clock1` to be rendered (but, it will only happen on next request).

    4.  During rendering, `#{bean.renderComponents}` is resolved and the `Clock1`
    id is rendered into the page.

    5.  When we next select Clock 3, for example, and fire the request, the `Clock1`
    id that was rendered into the page will now be rendered.


    As you can see, when using EL in render, there is a one request delay when rendering
    the components. What this means is that components (ids) to be rendered need to
    come from the browser. In order for the desired component id to be updated at
    each request, we need to render the actual button—so that `#{bean.renderComponents}`
    will be resolved and a new value will be rendered. This is accomplished by the
    following `init()` method:


    `renderComponents.add("updateButton");`


    To solve this problem, we can work directly with JSF''s `PartialViewContext` class.
    This class holds the ids to be rendered; and if we add the id programmatically,
    then the render will happen at the right time. The updated `selectComponents`
    method will look like [Listing 2-30](#Chapter02.html#list_2_30).


    ***Listing 2-30.** The updated selectComponents method*


    `public void selectComponents (AjaxBehaviorEvent event){`

    `   UIComponent button = event.getComponent();`

    `   UIOutput output = (UIOutput)button.findComponent(selection);`

    `   FacesContext.getCurrentInstance().getPartialViewContext().getRenderIds().`

    `      add(output.getClientId());`

    `}`


    We first get a reference to the button component that fired the Ajax request.
    We then use `findComponent(id)` method to find the output component that we want
    to render. On the last line, we get the output component client id and add the
    components to be rendered.


    This allows us to include the component id to be rendered in the current request,
    instead of being one request behind as we saw before. With this change, we can
    also update the `init()` method shown in [Listing 2-31](#Chapter02.html#list_2_31).


    ***Listing 2-31.** Update the init() method*


    `@PostConstruct`

    `public void init (){`

    `   renderComponents = new ArrayList <String>();`

    `}`


    We can take out `render="#{bean.renderComponents}"` because it''s no longer used.
    The button will look as shown in [Listing 2-32](#Chapter02.html#list_2_32).


    ***Listing 2-32.** Displays how the button will look after you take out render
    `="#{bean.renderComponents}"`*


    `<h:commandButton id="updateButton" value="Update">`

    `   <f:ajax event="click" execute="@form" listener="#{bean.selectComponents}"/>`

    `</h:commandButton>`


    This approach works, but we believe it should be simpler. We believe it would
    have been simpler if we could continue using `render="#{bean.renderComponents}"`
    and having the ids resolved in the same request. That''s possible if we use the
    RichFaces `<a4j:ajax>` behavior.


    ![images](images/square.jpg) **Tip** JSF 2 just passes all the parameters from
    the client side to the server. RichFaces 4 also evaluates the parameters on the
    server side.'
