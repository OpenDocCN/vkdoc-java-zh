    That’s all there is to header creation. Let’s now look at the rest of the table.


    #### Master-Details Tables with <rich:collapsibleSubTable>


    According to the bean code changes, we have a list of continent names that are
    used as `String` keys for the map: `public List<String> getGamesMapKeys()`. The
    map consists of `GameDescriptor` object lists: `public Map<String, List<GameDescriptor>>
    getGamesMap()`. So, the `<rich:dataTable>` component iterates through the list
    of keys and encodes a single column with that key, which is getting stretched
    using `colspan` to the entire table length. Then, the `<rich:collapsibleSubtable>`
    iterates through every list from the map, retrieving them by the current continent
    name, and encodes the remaining columns with corresponding data.


    ![images](images/square.jpg) **Note** Later you will see that `<rich:dataTable>`
    and `<rich:extendedDataTable>` share many features using similar definitions.
    However, the particular features of row and column spanning (both in the header
    and body) and `<rich:collapsibleSubTable>` usage are available only with `<rich:dataTable>`.
    This will be covered further in the `<rich:extendedDataTable>` section.


    Now let’s cover the `<rich:collapsibleSubTable>` component, which is used for
    expanding and collapsing content. All you need to be able to expand or collapse
    is to add `<rich:collapsibleSubTableToggler>` inside one of the table columns
    and point to the sub-table.


    [Figure 7-6](#Chapter07.html#fig_7_6) shows the table with only the “Oceania”
    sub-table expanded.


    ![images](images/0706.jpg)


    ***Figure 7-6.** Table with collapsible sub-table*


    [Listing 7-12](#Chapter07.html#list_7_12) shows the code used to create this table.


    ***Listing 7-12.** Table with collapsible sub-table*


    `<rich:dataTable value="#{olympicGamesBean.gamesMapKeys}" var="continent">`

    `   <f:facet name="header">`

    `      <!--header content-->`

    `   </f:facet>`

    `   <rich:column colspan="9">`

    `      <rich:collapsibleSubTableToggler for="sbtable"/>`

    `         #{continent}`

    `   </rich:column>`

    `   <rich:collapsibleSubTable id="sbtable" value="#{olympicGamesBean.gamesMap[continent]}"`

    `      var="game">`

    `   <rich:column>`

    `      <f:facet name="header">Season</f:facet>`

    `         #{game.season}`

    `      </rich:column>`

    `      <!--other columns>`

    `   </rich:collapsibleSubTable>`

    `</rich:dataTable>`


    By default, toggle encoded as an icon (actually two icons shown for different
    states: one for expand and one for collapse). To customize the icon, use the `expandedLabel`,
    `collapsedLabel`, `expandedIcon` and `collapsedIcon` attributes. You can override
    the complete markup because you need to use the `expanded` and `collapsed` facets.
    The `for` attribute is used to point the toggle to the sub-table, which should
    be controlled via this component.


    Now let’s check `<rich:collapsibleSubTable>`, attributes which should be used
    to control its state switching. Let’s first mention `expandMode`. As typical with
    RichFaces components with states switching, valid values for that attribute are
    `ajax`, `server`, and `client`. The initial and current sub-table state can be
    managed using the `expanded` attribute bound to a boolean property in your model.
    If set to `true`, the sub-table for the current row will be expanded.


    That’s all there is to basic `<rich:dataTable>` features usage. There are other
    advanced features, but because they are shared by other data iteration components,
    the “Iteration Components Advanced Usage” section found later in this chapter
    will cover features such sorting, filtering, pagination, and advanced data models.


