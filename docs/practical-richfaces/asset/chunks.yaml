    you to return drag-and-drop items*    Now you can take any item in the shopping
    cart, remove it from the shopping cart, and put it back into the products list
    via drag and drop.    ### Customizing the Drag Indicator    [Figure 10-8](#Chapter10.html#fig_10_8)
    shows what you see when an item is dragged on the page using the default drag
    indicator.  ![images](images/1008.jpg)  ***Figure 10-8.** Dragged state default
    indication*    By default, the drag indication element is achieved by cloning
    the DOM section that is being dragged.    Using the default is fine, but we would
    like to have the option to customize the object that''s being dragged with some
    styling, for example, and other options.    Luckily, as with everything else in
    RichFaces, it''s pretty easy to do. The RichFaces drag-and-drop feature adds a
    set of predefined CSS classes (the same as with UI-rich components) that are applied
    to the cloned indicator element in different states. [Table 10-2](#Chapter10.html#tab_10_2)
    shows the style names and explains when they should be used.    ![images](images/t1002.jpg)    Now
    it should be a pretty easy task to make the indicator change in different states
    in order to better notify the user about current action options. In [Listing 10-12](#Chapter10.html#list_10_12),
    let''s add the CSS classes to our previous sample page.    ***Listing 10-12.**
    Adding the CSS classes to our previous sample page*  `<style>` `   .rf-ind-drag{`
    `   }` `   .rf-ind-acpt{` `      border:3px solid green;` `   }` `   .rf-ind-rejt{`
    `      border:3px solid red;` `   }` `</style>`  Based on this styling, the indicator
    is defined to look as it is when just dragged. A green border is added when hovering
    over the drop zone that accepts this object. And, a red border is shown when hovering
    the components over a drop zone that doesn''t accept this object type. So when
    we hover one of the items over the cart, we will see it updated with a green border,
    as shown in [Figure 10-9](#Chapter10.html#fig_10_9).  ![images](images/1009.jpg)  ***Figure
    10-9.** Drag indicator customized with green border in accept state*    Being
    able to style in this way looks a lot more user-friendly.    The next section
    describes how to customize the drag indicator with custom content using a special
    `<rich:dragIndicator>` component.    ### Using <rich:dragIndicator>    `<rich:dragIndicator>`
    is a pretty simple component that allows you to define some custom static content
    that is shown under the mouse cursor when you perform a drag operation.    There
    are two things you need to know to start using this component. First, the content
    of indicator should be defined using any nested components. Second, the indicator
    itself should be attached to `<rich:dragSource>` using same named `dragIndicator`
    attribute on the `<rich:dragSource>` behavior with the indicator `id` specified.    So,
    let''s proceed with an example. Using the cart sample, we will add the indicator
    anywhere on the page, as shown in [Listing 10-13](#Chapter10.html#list_10_13).    ***Listing
    10-13.** Adding the indicator anywhere on the page using the cart sample*  `<rich:dragIndicator
    id="indicator">` `   <rich:panel>` `      <h:outputText value="Drop product to
    cart" />` `   </rich:panel>` `</rich:dragIndicator>`  Now you need only to point
    our drag behaviors to it using code as follows:  `<rich:dragSource ... dragIndicator="indicator"
    />`  When you drag any product, you will no longer see the panel. Instead, you
    will see a smaller panel with only the content defined. And, if we don''t remove
    our style class definitions for `rf-ind-drag` and two other styles (drop accepted,
    drop not accepted), we should see the results shown in [Figures 10-10](#Chapter10.html#fig_10_10)
    and [10-11.](#Chapter10.html#fig_10_11)  ![images](images/1010.jpg)  ***Figure
    10-10.** Panel with static indicator dragged*  ![images](images/1011.jpg)  ***Figure
    10-11.** Panel with static indicator over the drop zone*    Besides the rf-* classes,
    which are applied to all the indicators in the page, you can use `<rich:dragIndicator>`
    component attributes to define specific styles for that particular indicator.
    Those attributes are `acceptClass`, `draggingClass`, and `rejectClass`.    ![images](images/square.jpg)
    **Note** As of the writing of this book, there are no options to redefine markup
    for different indicator states, only the option of restyling it using CSS. In
    other words, if you need to show a different icon to indicate the reject or accept
    state inside the indicator, it can be done—but only by using CSS selectors (to
    hide and show some elements in some states) or by using background images defined
    in CSS classes. The option to redefine markup could be added in a future release,
    so check the JBoss Community RichFaces page at [`www.jboss.org/richfaces`](http://www.jboss.org/richfaces)
    often for new updates.    ### Using Drag-and-Drop with Tree Components    Drag-and-drop
    with tree components might sound complicated; however, once you finish this section,
    you will see that it''s actually not that difficult. All we are doing is combining
    knowledge from [Chapter 9](#Chapter09.html#ch9) with knowledge from this chapter.
    We will implement moving the leaf nodes between different parent nodes. Although
    this is a basic example, you should be able to extend it to any more complicated
    case.    Let''s create a simple tree model, as we did in [Chapter 9](#Chapter09.html#ch9).
    [Listing 10-14](#Chapter10.html#list_10_14) shows the code for Swing''s `TreeNode`
    implementation, which will be used to create a tree model.    ***Listing 10-14.**
    Shows the code for the Swing''s `TreeNode` implementation*  `public class FileSystemNode
    extends org.richfaces.model.SwingTreeNodeImpl<Object> {` `   private String label;`  `   public
    FileSystemNode(String label) {` `      super();` `      this.label = label;` `   }`  `   public
    String getNodeType() {` `      return isLeaf() ? "leaf" : "node";` `   }` `}`  ![images](images/square.jpg)
    **Note** We use the `SwingTreeNodeImpl` default implementation class from richfaces-api
    as it is more convenient for that specific sample because it already provides
    the `getParent()` method implemented. We will use that method to perform moving
    between nodes more easily. `org.richfaces.TreeNodeImpl` doesn''t have such a method
    and we would have to add it if we wanted to switch to that implementation.    It''s
    as simple as possible. It will store either the file or directory name and will
    return two string types, `leaf` and `node`, according to the `isLeaf()` method.
    Later, we will use a different type of node on the page.    Now, let''s look at
    the bean that initializes the model in [Listing 10-15](#Chapter10.html#list_10_15).    ***Listing
    10-15.** The bean that initializes the model*  `@ManagedBean` `@SessionScoped`
    `public class TreeDnDBean {`  `   private List<SwingTreeNodeImpl<Object>> nodes;`  `   public
    TreeDnDBean() {` `      nodes = new ArrayList<SwingTreeNodeImpl<Object>>();` `      for
    (Integer i = 1; i < 5; i++) {` `         FileSystemNode rootNode = new FileSystemNode("folder
    " + i);` `         for (Integer j = 1; j <= 5; j++) {` `            FileSystemNode
    leafNode =` `               new FileSystemNode("pic" + i + "." + j + ".jpg");`
    `            rootNode.addChild(leafNode);` `         }` `         nodes.add(rootNode);`
    `      }` `   }` `   public List<SwingTreeNodeImpl<Object>> getNodes() {` `      return
    nodes;` `   }` `}`  This bean creates a set of “folder” nodes and adds numerous
    “pic” leaf nodes inside. We already know how to create tree models using `SwingTreeNodeImpl`
    and other options, thus let''s just jump to the JSF page, shown in [Listing 10-16](#Chapter10.html#list_10_16).    ***Listing
    10-16.** The JSF page*  `<h:form>` `   <rich:tree value="#{treeDnDBean.nodes}"
    nodeType="#{node.nodeType}" var="node"` `      id=" tree" toggleType="client">`
    `      <rich:treeNode type="leaf">` `         <h:outputText value="#{node.label}"
    />` `      </rich:treeNode>` `      <rich:treeNode type="node">` `         <h:outputText
    value="#{node.label}" />` `      </rich:treeNode>` `   </rich:tree>` `</h:form>`  Note
    that we are using two `<rich:treeNode>` tags on the page, with the same content
    in them. Why did we do that? We are going to implement drag-and-drop of leafs
    between different nodes. The simplest way to achieve this is to define leafs as
    draggable and nodes as drop zones. An easy way to do it is to have different placeholders
    for the drag-and-drop behaviors. In a more complicated case where you might need
    to support moving folders, you would need to have folders as drag sources and
    as drop zones at the same time, plus be able to handle a restriction such as not
    being able to drop the node on itself.    Now let''s see the result of the page
    rendered. We should check that our tree was created successfully before proceeding
    with adding drag-and-drop functionality. The correct tree is shown in [Figure
    10-12](#Chapter10.html#fig_10_12).  ![images](images/1012.jpg)  ***Figure 10-12.**
    Tree component*    Now we are ready to add drag-and-drop to the tree. The updated
    page is shown in [Listing 10-17](#Chapter10.html#list_10_17) and followed by an
    explanation of what we did.    ***Listing 10-17.** Adding drag-and-drop to the
    tree*  `<style>` `   .rf-ind-acpt {` `      border: 2px solid green;` `   }` `</style>`
    `<h:form>` `   <rich:tree value="#{treeDnDBean.rootNode}" nodeType="#{node.type}"
    var="node"` `      toggleType="client" id="tree">` `      <rich:treeNode type="node">`
    `         <a4j:outputPanel>` `            <rich:dropTarget acceptedTypes="file"
    render="tree" execute="tree"` `               dropListener="#{treeDnDBean.moveFile}"
    dropValue="#{node}" />` `            <h:outputText value="#{node.label}" />` `         </a4j:outputPanel>`
    `      </rich:treeNode>` `      <rich:treeNode type="leaf">` `         <a4j:outputPanel>`
    `            <rich:dragSource type="file" dragValue="#{node}" />` `            <h:outputText
    value="#{node.label}" />` `         </a4j:outputPanel>` `      </rich:treeNode>`
    `   </rich:tree>` `</h:form>`  Leafs are marked as draggable using `<rich:dragSupport>`
    and nodes became drop zones using `<rich:dropTarget>`. We pointed value attributes
    (`dragValue`, `dropValue`) of both components to the `#{node}` iteration variable,
    so we will get corresponding node objects inside listeners.    `<rich:dropTarget>`
    performs a complete tree re-render in order to update the markup after the nodes
    movement. We set the `execute` attribute to the tree itself to save its state
    during submission. (Nodes toggling occurs on the client according to the `toggleType`
    attribute, so by default, we will lose the state.)    Ideally you may want to
    use partial rendering of the updated nodes. But that just out of scope for this
    sample and will make the code more complicated. We want to concentrate on drag-and-drop
    functionality instead. Partial rendering using the @rows() function described
    in iteration components chapter can also work for trees.    ![images](images/square.jpg)
    **Note** We wrapped the content of the draggable node with an additional `<a4j:outputPanel>`
    because the drag indicator created by default is just a clone of the dragged element,
    and we wouldn''t want a nested tree structure together with the selection and
    connecting lines (in the case of a draggable node with child nodes) to be cloned.
    In the current markup, only a `<span>` with a text label will be moved when dragged.
    The same goes for a drop zone node. We want just the node without its child components
    to become drop target.    The last step is to create the drop listener method
    that will actually perform movement of the leaf node from one parent to another.
    Let''s look at the code in [Listing 10-18](#Chapter10.html#list_10_18).    ***Listing
    10-18.** Creating the drop listener method*  `public void moveFile(DropEvent event)
    {` `   FileSystemNode draggedNode = (FileSystemNode) event.getDragValue();` `   FileSystemNode
    droppedNode = (FileSystemNode) event.getDropValue();` `    ((FileSystemNode) draggedNode.getParent()).removeChild(draggedNode);`
    `   droppedNode.addChild(draggedNode);` `}`  As you can see in the code, `DropEvent`
    provides two values: the drag value and drop value. As we are passing complete
    node objects (referencing it using tree iteration `var`) in the value attribute,
    we are getting those objects in the listener. Next, we remove the node that we
    dragged from its parent and add it to the node to which it was dropped. [Figure
    10-13](#Chapter10.html#fig_10_13) shows the tree after two files from “folder
    1” get dropped into “folder 2.”  ![images](images/1013.jpg)  ***Figure 10-13.**
    Nodes from one folder moved via drag-and-drop to another*    As you can see, drag-and-drop
    with trees is not that complicated. We are defining some node components to be
    draggable and some node components to act as a drop zone. The only difference
    is that we are now working with tree nodes and leafs; other than that, all the
    concepts are the same.    ### Dragging and Dropping Within Tables    Using drag-and-drop
    within tables is not difficult (it''s actually even easier than dragging and dropping
    within a tree), we will give you a few pointers in this short section.    As we
    already know, drag and drop is always added to parent component. This means that
    drag and drop can either be added to the table itself or a column inside the table,
    but not to a row. That is, if we add `<rich:dragSupport>` as an immediate child
    of table, the entire table will be draggable—probably not what we need. If we
    add `<rich:dragSupport>` to a `<rich:column>`, we will be able to drag only that
    single column; other columns will not be draggable.    If you want to achieve
    “row dragging” functionality, the solution is to embed a drag support component
    within every column of the table. Basically, we get the functionality of the entire
    row with drag support when we add drag support to each column.    It''s also a
    good idea to create a good drag indicator, so that you don''t just drag the current
    column content (the default drag indicator is the same content that''s being dragged).
    With the custom indicator, no matter which column is actually selected when dragged,
    the indicator will show the same information and it will appear as only the row
    is being dragged.    ![images](images/square.jpg) **Note** Functionality to enable
    native drag-and-drop support for iteration components is planned in the future.
    For example, a feature such as row context that can be dragged and dropped might
    be added. Check the JBoss Community RichFaces page at [`www.jboss.org/richfaces`](http://www.jboss.org/richfaces)
    for updates.    ### Summary    In this chapter we showed you that adding drag-and-drop
    capability to your JSF application is very simple with RichFaces. To be able to
    drag any component on the page, we add the `<rich:dragSource>` behavior. To make
    any are on the page to act as a drop zone, we add a `<rich:dragTarget>` behavior.
    Although drag-and-drop is happening on the client side, to communicate the drag-and-drop
    action to the server, we use the standard listener approach. In addition, RichFaces
    provides options to enforce which items can be dropped into which particular drop
    zones, as well as the ability to customize the drag indicator. Finally, we showed
    you how to add drag-and-drop functionality to trees and provided tips on how to
    achieve drag-and-drop within tables.    ## C H A P T E R  11    ## Rich Validation    Validating
    user input is a major part of any web application. JSF provides a number of tags
    to enable basic validation and makes it pretty easy to build custom validators.
    JSF 2 makes validation even simpler by providing out-of-the-box support for popular
    Bean Validation (JSR 303). RichFaces takes validation to the next level and extends
    Bean Validation by providing client-side validation. Client-side validation allows
    validation to be performed on the client based on Bean Validation constraints.
    This is a must-have feature for high-performance enterprise web sites. In addition
    to client-side validation, RichFaces also provides a cross-field or object validation
    feature where one or two fields can be validated together. That''s exactly what
    we are going to cover in this chapter.    ### Bean Validation    To start with
    client-side validation, we first need to tell you about Bean Validation support
    in JSF 2\. Bean Validation is part of a Java EE stack and was born from Hibernate
    Validator. In fact, Hibernate Validator is the reference implementation for Bean
    Validation. Instead of putting validation in the view, place validation constraints
    on the model and have the view call those validations. For example, in [Listing
    11-1](#Chapter11.html#list_11_1), Bean Validation constraints are applied to three
    properties. `name` has to be at least three characters long, age has to be between
    two and 120, and email has to match the regular expression.    ***Listing 11-1.**
    Bean Validation constraints are applied to three properties*  `@ManagedBean` `@RequestScoped`
    `public class ValidationBean {` `   @Size (min=3)` `   private String name;`  `   @Min
    (2) @Max (120)` `   private Integer age;`  `   @Pattern (regexp=".+@.+\\.[a-z]+")`
    `   private String email;` `   // getters and setters` `}`   ![images](images/square.jpg)
    **Note** Regular expression for the e-mail we use is rather simple. You can find
    a more strict expression for validating an e-mail address.    Why is this better
    than placing validation in the JSF page? If you will be accessing the model from
    various JSF views, but also in other ways not from a JSF view, then you don''t
    need to repeat validation definitions and validation can be reused. Luckily, Bean
    Validation support in JSF 2 is built-in; in other words, there is nothing you
    need to do. Just bind a JSF component to a property with Bean Validation annotation
    and the validation will be invoked during the Process Validation phase as usual.
    [Listing 11-2](#Chapter11.html#list_11_2) shows the JSF page where components
    are bound to properties from [Listing 11-1](#Chapter11.html#list_11_1).    ***Listing
    11-2.** Shows the JSF page*  `<h:form>` `   <h:panelGrid columns="3">` `      <h:outputText
    value="Name:" />` `      <h:inputText id="name" value="#{validationBean.name}"
    >` `         <a4j:ajax render="nameMsg"/>` `      </h:inputText>` `      <h:message
    for="name" id="nameMsg"/>` `      <h:outputText value="Email:" />` `      <h:inputText
    id="email" value="#{validationBean.email}" >` `         <a4j:ajax render="emailMsg"/>`
    `      </h:inputText>` `      <h:message for="email" id="emailMsg"/>` `      <h:outputText
    value="Age:" />` `      <h:inputText id="age" value="#{validationBean.age}" >`
    `         <a4j:ajax render="ageMsg"/>` `      </h:inputText>` `      <h:message
    for="age" id="ageMsg"/>` `   </h:panelGrid>` `</h:form>`   ![images](images/square.jpg)
    **Tip** Using `<a4j:ajax>`, you can also set `bypassUpdates="true"`. This will
    bypass or skip the Update Model phase and the Invoke Application phase, even if
    the values are valid. This is useful when only validating the form. When only
    validating, you rarely have a need to update the model and invoke the application.
    `bypassUpdates` is covered in more detail in [Chapter 3](#Chapter03.html#ch3).    There
    is nothing new here; it looks like a very standard JSF page. Validation (Ajax
    request) will be sent on a `change` event. To display the error message we use
    the `<h:message>` component. We don''t have any validation on the page itself.
    Instead, when the page will be submitted, user-entered values will be checked
    against the constraints specified in the managed bean via Bean Validation annotations.
    Again, you get all this with JSF 2, out of the box. Running the page will produce
    the result shown in [Figure 11-1](#Chapter11.html#fig_11_1).  ![images](images/1101.jpg)  ***Figure
    11-1.** Bean Validation standard error messages*    A note on the error messages:
    the messages that are rendered are the standard messages from Bean Validation.
    One way to customize the error messages is by setting the `message` property on
    the validation annotation. For more ways to customize the messages, refer to Bean
    Validation documentation (see the following Tip for suggestions found on the internet).
    For example, changing the message for e-mail validation can be done like the following:  `@Pattern
    (regexp=".+@.+\\.[a-z]+", message="Email has invalid format")`   ![images](images/square.jpg)
    **Tip** Learn more about Bean Validation (JSR 303) at the Java Community Process
    Program web site at [`www.jcp.org/en/jsr/detail?id=303`](http://www.jcp.org/en/jsr/detail?id=303)
    and from the Java EE 6 Tutorial: Using Being Validation page at [`http://download.oracle.com/javaee/6/tutorial/doc/gircz.html`](http://download.oracle.com/javaee/6/tutorial/doc/gircz.html).    ###
    RichFaces Client-side Validation    RichFaces takes validation to the next level
    by providing client-side validation. In other words, validation can be done on
    the client without sending an Ajax request. How does RichFaces do it? RichFaces
    extends standard Bean Validation by bringing the validation to the client. You
    might be wondering why you need client-side validation when you can “quickly”
    validate with Ajax? It''s true that validating with Ajax can be fast, but an Ajax
    request is still sent to the server. In high-performance, high-traffic applications,
    being able to validate on the client and without sending an Ajax request can greatly
    improve performance.    Let''s take our page and add client-side validation to
    it. To add client-side validation to a form is very easy, probably too easy. All
    we need to do is place the `<rich:validator>` tag inside the input component that''s
    being validated. By default, client validation will be invoked on the change event,
    but we can use any other event by setting the event attribute. The only other
    thing we need to do is use `<rich:message>` or `<rich:messages>` tags to display
    the error message. Client-side validation error messages will not be displayed
    with the standard `<h:message>` tag. There are no changes in the bean because
    we use the same Bean Validation but now bring it to the client.    [Listing 11-3](#Chapter11.html#list_11_3)shows
    the update page with client-side validation.    ***Listing 11-3.** Shows the update
    page with client-side validation*  `<h:form>` `   <h:panelGrid columns="3">` `      <h:outputText
    value="Name:" />` `      <h:inputText id="name" value="#{validationBean.name}"
    >` **`<rich:validator/>`** `      </h:inputText>` **`<rich:message for="name"
    />`** `      <h:outputText value="Email:" />` `      <h:inputText id="email" value="#{validationBean.email}"
    >` **`<rich:validator/>`** `      </h:inputText>` **`<rich:message for="email"/>`**
    `      <h:outputText value="Age:" />` `      <h:inputText id="age" value="#{validationBean.age}"
    >` **`<rich:validator/>`** `      </h:inputText>` **`<rich:message for="age"/>`**
    `   </h:panelGrid>` `</h:form>`   As you can see, `<rich:validator>` is now nested
    inside each input field. In fact, it''s a client behavior just like `<a4j:ajax>`.
    And, being a behavior, it attaches to a parent UI component event, just like `<a4j:ajax>`.
    As validation is performed on input components, the default event to which `<rich:validator>`
    attaches is `change`. We also replaced `<h:message>` with `<rich:message>` because
    client-side validation messages will be displayed only when using either `<rich:message>`
    or `<rich:messages>`. When the page is rendered, RichFaces will render all the
    necessary JavaScript to the client to perform validation by looking at bean property
    and its annotation. Running the page will produce the result shown in [Figure
    11-2](#Chapter11.html#fig_11_2).  ![images](images/1102.jpg)  ***Figure 11-2.**
    RichFaces client-side validation*    To change the event that triggers client-side
    validation, set the `event` attribute. For example, the code that follows will
    invoke client-side validation on a blur event:  `<rich:validator event="blur"/>`   ![images](images/square.jpg)
    **Caution** `<rich:message>` or `<rich:messages>` must be used when using client-side
    validation. These components provide the necessary JavaScript to be updated on
    the client. And, of course, they also work with standard server-side validation
    as well.    Although Bean Validation is the preferred way to add validation in
    JSF 2, RichFaces client validation still supports standard JSF validation. This
    makes it possible to add client-side validation to a page where standard JSF validator
    tags are already used.    As of writing of this book, client-side validation only
    supports single field-based validation. What this means is that it''s possible
    to invoke client-side validation when a change event (default event) or blur event
    (or any other event supported by the UI component) occurs on a particular field.
    If there is a control to submit the entire form, such as when a button or link
    is clicked, client-side validation will not be performed but the standard server-side
    validation will be. There are plans to add client-side validation support when
    a form is submitted in the future.    ### Using <rich:message> and <rich:messages>    `<rich:message>`
    and `<rich:messages>` are used to display messages or error messages and work
    just like the standard `<h:message>` and `<h:messages>` tags, but with a number
    of extra features. Just to remind you, `<h:message>` or `<rich:message>` displays
    a message for a particular component via the for attribute. On the other hand,
    `<h:messages>` or `<rich:messages>` displays all current messages from a current
    JSF request.    As for differences, one major difference is that the messages
    are automatically rendered, which means you don''t need to point to component
    via the render attribute. If you remember, we can achieve a similar result where
    we don''t need to use render using `<a4j:outputPanel ajaxRendered="true">`. [Listing
    11-4](#Chapter11.html#list_11_4) shows such an example.    ***Listing 11-4.**
    An example*  `<a4j:outputPanel ajaxRendered="true">` `   <h:message for="email"/>`
    `</a4j:outputPanel>`   `<a4j:outputPanel ajaxRendered="true">` is always automatically
    rendered. So, the following is identical to [Listing 11-4](#Chapter11.html#list_11_4):  `<rich:message
    for="email"/>`   This message will be rendered automatically. We can summarize
    it like this. Where `<a4j:outputPanel ajaxRendered="true">` is an auto-rendered
    panel, `<rich:message>` or `<rich:messages>` is an auto-rendered message.    ![images](images/square.jpg)
    **Note** It''s possible to turn off auto-rendered panels or messages by setting
    the `limitRender="true"` attribute on action components and `<a4j:ajax>` behavior.
    This `limitRender` attribute is covered in [Chapter 2](#Chapter02.html#ch2).    ####
    Customizing Message Icons    Another extra feature that you probably noticed is
    that the error message in [Figure 11-2](#Chapter11.html#fig_11_2) now has an icon.
    That''s again because we used the `<rich:message>` tag. To remove the icon, we
    have to overwrite one of the Skin CSS classes used by the component, as shown
    in [Listing 11-5](#Chapter11.html#list_11_5).    ***Listing 11-5.** Overwrite
    one of the Skin CSS classes used by the component*  `<style>` `.rf-msg-err {`
    `   background-image: none;` `}` `</style>`   Of course, instead of removing the
    icon, you could point that CSS property to your own image to be used as an icon.    The
    CSS class we have shown applies to messages with `ERROR` severity; for messages
    with other severity levels, use the following CSS classes: `.rf-msg-ftl (FATAL)`,
    `.rf-msg-inf (INFO)`, and `.rf-msg-wrn (WARNING)`.    Also remember that `<rich:messages>`
    uses `rf-msgs-*` classes while `<rich:message>` uses `rf-msg-*` classes.    ####
    Separating Summary and Details Styling    Another simple but cool look-and-feel
    customization improvement is rendering details and summary parts of messages as
    separate HTML elements and support for separately styling them. [Listing 11-6](#Chapter11.html#list_11_6)
    shows the page where there is a button and messages. Let''s say the button needs
    to add user-friendly messages when some services required for business action
    are not responsive. Look closely at the two predefined classes used in the example.    ***Listing
    11-6.** Shows the page where there is a button and messages*  `<style>` `   .rf-msgs-sum{`
    `      font-weight: bold;` `   }` `   .rf-msgs-det{` `      font-style: italic;`
    `   }` `</style>` `<h:form>` `   <h:panelGrid>       <!--Form elements-->` `      <rich:messages
    showDetail="true" showSummary="true"/>` `      <a4j:commandButton value="Submit"
             action="#{beanValidation2.serviceAction}"/>    </h:panelGrid>` `</h:form>`   Code
    for the action is shown in [Listing 11-7](#Chapter11.html#list_11_7).    ***Listing
    11-7.** Code for the action*  **`public void`** `serviceAction(){` `   //Business
    code` `   FacesMessage message = new FacesMessage("Service Error. ",` `      "Sorry,
    you caught us doing maintenance.");` `   FacesContext.`*`getCurrentInstance`*`().addMessage(null,
    message);` `}`   The message consists of two parts. Summary reflects message category,
    such as services error, and the details provide more specific information. Using
    different CSS classes, it''s possible to style summary and details differently.
    Everything together is shown in [Figure 11-3](#Chapter11.html#fig_11_3).  ![images](images/1103.jpg)  ***Figure
    11-3.** Displaying summary and details parts*    #### Changing <rich:messages>
    Layout    By default `<rich:messages>` is rendered as a set of `<span>` elements
