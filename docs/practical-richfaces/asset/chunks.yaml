    ExtendedDataModel Implementation for Paging    The topic of `ExtendedDataModel`
    implementation for paging is one of the most popular among those who play with
    iteration components and JSF/RichFaces in general. All the component library references
    show pretty simple examples of pointing the table component to the list from a
    managed bean and implementing additional functionality on top of that model. But
    later, getting such a bean connected to the database layer appears too time consuming,
    for example, to get a complete list to show only 10 to 20 rows using the `first`
    and `rows` table attributes.    The same problem applied to the RichFaces `<rich:dataTable>`–`<rich:dataScroller/>`
    components pair. Simple usage of the tables pointed to `List` for example and
    wrapped to the `SequenceDataModel` by default, obtains the entire list and partially
    encodes it using the `first`, `rows`, and `page` properties. But a common task
    for a real application is to optimize database calls and fetch only the data that
    corresponds to the current page to be displayed. Next, we will implement the model
    properly to achieve that result.    ![images](images/square.jpg) **Note** This
    is a very common question (or even expectation) from new developers. Developers
    expect the table to be able to perform partial data fetching because it provides
    a data scrolling component. A UI component in JSF, however, doesn’t know anything
    about the underlying model and completely relies on the default if proper custom
    implementation is not provided. The default gets a complete list, wraps it as
    a model, and makes it available for the page.    Let’s review more of the `ExtendedDataModel`
    abstract class in [Listing 7-50](#Chapter07.html#list_7_50).    ***Listing 7-50.**
    `ExtendedDataModel` Abstract Class*  `public abstract class ExtendedDataModel<E>
    extends DataModel<E> {` `    public abstract void setRowKey(Object key);` `    public
    abstract Object getRowKey();` `    public abstract void walk(FacesContext context,
    DataVisitor visitor, Range range, Object` `       argument);` `}`  It defines
    three new methods extending the standard JSF `DataModel`. Having only the `rowIndex`
    isn’t really enough for complex data models and features. Furthermore, the `walk()`
    method should be implemented and provide functionality of iteration over the model
    using the “Visitor” pattern. Concrete iteration components that use the models
    based on this will call the `walk()` method a few times at different request phases.
    The following parameters will be passed to the method: a `FacesContext` instance,
    a `visitor` object that will perform current iteration data processing, and a
    `range` object that specifies the range of iteration component and can accept
    one more argument depending on implementation.    When we know which methods we
    should compare to the standard `DataModel,` let’s look at [Listing 7-51](#Chapter07.html#list_7_51),
