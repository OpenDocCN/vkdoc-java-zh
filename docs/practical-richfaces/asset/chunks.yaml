- fmt: "### Using `<rich:select>`\n\n`<rich:select>` is a brand new component in RichFaces\
    \ 4 and it is based on a standard `UISelectOne` component under the hood, as shown\
    \ in [Listing 5-18](#Chapter05.html#list_5_18).\n\n**Listing 5-18.** Using `<rich:select>`\n\
    \n```\n<rich:select id=\"select\" defaultLabel=\"Select Value...\" value=\"#{selectBean.value}\"\
    >\n   <f:selectItem itemValue=\"0\" itemLabel=\"Banana\" />\n   <f:selectItem\
    \ itemValue=\"1\" itemLabel=\"Cranberry\" />\n   <f:selectItem itemValue=\"2\"\
    \ itemLabel=\"Blueberry\" />\n   <f:selectItem itemValue=\"3\" itemLabel=\"Orange\"\
    \ />\n   <f:selectItem itemValue=\"4\" itemLabel=\"Strawberry\" />\n   <f:selectItem\
    \ itemValue=\"4\" itemLabel=\"Apple\" />\n</rich:select>\n```\n\n[Figure 5-16](#Chapter05.html#fig_5_16)\
    \ shows what will be rendered.\n\n![images](images/0516.jpg)\n\n**Figure 5-16.**\
    \ `<rich:select>` component\n\nAfter clicking the component, it will show the\
    \ list of options (as does the standard component), as in [Figure 5-17](#Chapter05.html#fig_5_17).\n\
    \n![images](images/0517.jpg)\n\n**Figure 5-17.** `<rich:select>` pop-up selection\n\
    \nYou are probably wondering, why does RichFaces re-implement the standard `<h:selectOneMenu>`\
    \ component? The answer is that the RichFaces component provides a number of extra\
    \ features. The component is skinned using the RichFaces skins feature, unlike\
    \ the standard component that renders differently in the various browsers and\
    \ has styling limitations in some browsers. The component provides a default label\
    \ (common to all RichFaces inputs), and has direct keyboard-input features.\n\n\
    You will learn about skins in [Chapter 12](#Chapter12.html#ch12), so let's see\
    \ how the direct keyboard-input feature works. All you need to activate this feature\
    \ is to add `enableManualInput=\"true\"`. After the component renders, you will\
    \ be able to type into the input field directly and the component will filter\
    \ the list according to the prefix entered, as shown in [Figure 5-18](#Chapter05.html#fig_5_18).\n\
    \n![images](images/0518.jpg)\n\n**Figure 5-18.** `<rich:select>` with direct typing\
    \ enabled\n\nAs the component provides select functionality, if you enter a value\
    \ that can't be matched with any of selection items, the input will be highlighted\
    \ as erroneous (the incorrect input will be shown in red) as shown in [Figure\
    \ 5-19](#Chapter05.html#fig_5_19). Keep in mind that such input will cause validation\
    \ errors when the page is submitted.\n\n![images](images/0519.jpg)\n\n**Figure\
    \ 5-19.** `<rich:select>` with incorrect input\n\nThe selection change is a client-side\
    \ operation. As for any other rich client component, we can attach an Ajax behavior\
    \ to some component event to fire an Ajax request. Let's repeat the dependent\
    \ selects example, but now using the `<rich:select>` component. The JSF page is\
    \ shown in [Listing 5-19](#Chapter05.html#list_5_19).\n\n**Listing 5-19.** The\
    \ JSF page\n\n```\n<h:form>\n   <h:panelGrid>\n      <rich:select defaultLabel=\"\
    Click to select items type\"\n            value=\"#{selectBean.currentType}\"\n\
    \            valueChangeListener=\"#{selectBean.valueChanged}\"\n            editEvent=\"\
    dblclick\">\n         <f:selectItems value=\"#{selectBean.firstList}\" />\n  \
    \       <a4j:ajax event=\"change\" render=\"second\" execute=\"@this\" />\n  \
    \    </rich:select>\n      <a4j:outputPanel id=\"second\" layout=\"block\">\n\
    \         <rich:select value=\"#{selectBean.currentType}\"\n               defaultLabel=\"\
    Click to select item\"\n               rendered=\"#{not empty selectBean.currentType}\"\
    >\n            <f:selectItems value=\"#{selectBean.secondList}\" />\n        \
    \ </rich:select>\n      </a4j:outputPanel>\n   </h:panelGrid>\n</h:form>\n```\n\
    \nAs you can see, the page code is completely the same as in the `<rich:inplaceSelect>`\
    \ example ([Listing 5-7](#Chapter05.html#list_5_7)). We just replaced the `<rich:inplaceSelect>`\
    \ component with `<rich:select>`. [Listing 5-20](#Chapter05.html#list_5_20) shows\
    \ the managed bean code, which is also unchanged.\n\n**Listing 5-20.** Shows the\
    \ unchanged managed bean code\n\n```\n@ManagedBean\n@RequestScoped\npublic class\
    \ SelectBean {\n   private static final String[] FRUITS = { \"Banana\", \"Cranberry\"\
    ,\n      \"Blueberry\", \"Orange\" };\n   private static final String[] VEGETABLES\
    \ = { \"Potatoes\", \"Broccoli\",\n      \"Garlic\", \"Carrot\" };\n   private\
    \ String currentItem = null;\n   private String currentType = null;\n   private\
    \ List<SelectItem> firstList = new ArrayList<SelectItem>();\n   private List<SelectItem>\
    \ secondList = new ArrayList<SelectItem>();\n\n   public SelectBean() {\n    \
    \  SelectItem item = new SelectItem(\"fruits\", \"Fruits\");\n      firstList.add(item);\n\
    \      item = new SelectItem(\"vegetables\", \"Vegetables\");\n      firstList.add(item);\n\
    \      for (int i = 0; i < FRUITS.length; i++) {\n         item = new SelectItem(FRUITS[i]);\n\
    \      }\n   }\n   public void valueChanged(ValueChangeEvent event) {\n      secondList.clear();\n\
    \      if (null != event.getNewValue()) {\n         String[] currentItems;\n \
    \        if (((String) event.getNewValue()).equals(\"fruits\")) {\n          \
    \  currentItems = FRUITS;\n         } else {\n            currentItems = VEGETABLES;\n\
    \         }\n         for (int i = 0; i < currentItems.length; i++) {\n      \
    \      SelectItem item = new SelectItem(currentItems[i]);\n            secondList.add(item);\n\
    \         }\n      }\n   }\n   //Getters and setters\n}\n```\n\n[Figure 5-20](#Chapter05.html#fig_5_20)\
    \ shows the result. When the type selection is made in the first component, the\
    \ second component list is updated based on the value selected in the first.\n\
    \n![images](images/0520.jpg)\n\n**Figure 5-20.** Dynamic `<rich:select>` components\n\
    \n### JavaScript API\n\n[Table 5-5](#Chapter05.html#tab_5_5) shows component JavaScript\
    \ API.\n\n![images](images/0505.jpg)"
  raw: '### Using <rich:select>


    `<rich:select>` is a brand new component in RichFaces 4 and it is based on a standard
    `UISelectOne` component under the hood, as shown in [Listing 5-18](#Chapter05.html#list_5_18).


    ***Listing 5-18.** Using `<rich:select>`*


    `<rich:select id="select" defaultLabel="Select Value..." value="#{selectBean.value}">>`

    `   <f:selectItem itemValue="0" itemLabel="Banana" />`

    `   <f:selectItem itemValue="1" itemLabel="Cranberry" />`

    `   <f:selectItem itemValue="2" itemLabel="Blueberry" />`

    `   <f:selectItem itemValue="3" itemLabel="Orange" />`

    `   <f:selectItem itemValue="4" itemLabel="Strawberry" />`

    `   <f:selectItem itemValue="4" itemLabel="Apple" />`

    `</rich:select>`


    [Figure 5-16](#Chapter05.html#fig_5_16) shows what will be rendered.


    ![images](images/0516.jpg)


    ***Figure 5-16.** <rich:select> component*


    After clicking the component, it will show the list of options (as does the standard
    component), as in [Figure 5-17](#Chapter05.html#fig_5_17).


    ![images](images/0517.jpg)


    ***Figure 5-17.** <rich:select> pop-up selection*


    You are probably wondering, why does RichFaces re-implement the standard `<h:selectOneMenu>`
    component? The answer is that the RichFaces component provides a number of extra
    features. The component is skinned using the RichFaces skins feature, unlike the
    standard component that renders differently in the various browsers and has styling
    limitations in some browsers The component provides a default label (common to
    all RichFaces inputs), and has direct keyboard-input features.


    You will learn about skins in [Chapter 12](#Chapter12.html#ch12), so let''s see
    how the direct keyboard-input feature works. All you need to activate this feature
    is to add `enableManualInput="true"`. After the component renders, you will be
    able to type into the input field directly and the component will filter the list
    according to the prefix entered, as shown in [Figure 5-18](#Chapter05.html#fig_5_18).


    ![images](images/0518.jpg)


    ***Figure 5-18.** <rich:select> with direct typing enabled*


    As the component provides select functionality, if you enter a value that can''t
    be matched with any of selection items, the input will be highlighted as erroneous
    (the incorrect input will be shown in red) as shown in [Figure 5-19](#Chapter05.html#fig_5_19)
    Keep in mind that such input will cause validation errors when the page is submitted.


    ![images](images/0519.jpg)


    ***Figure 5-19.** <rich:select> with incorrect input*


    The selection change is a client-side operation. As for any other rich client
    component, we can attach an Ajax behavior to some component event to fire an Ajax
    request. Let''s repeat the dependent selects example, but now using the `<rich:select>`
    component. The JSF page is shown in [Listing 5-19](#Chapter05.html#list_5_19).


    ***Listing 5-19.** The JSF page*


    `<h:form>`

    `   <h:panelGrid>`

    `<rich:select defaultLabel="Click to select items type"` ![images](images/U002.jpg)

    `         value="#{selectBean.currentType}"  `![images](images/U002.jpg)

    ***`valueChangeListener="#{selectBean.valueChanged}"`***

    `         editEvent="dblclick">`

    `         <f:selectItems value="#{selectBean.firstList}" />`

    ***`<a4j:ajax event="change" render="second" execute="@this" />`***

    `      </rich:select>`

    `<a4j:outputPanel` ***`id="second"`*** `layout="block">`

    `         <rich:select value="#{selectBean.currentType}"`

    `            defaultLabel="Click to select item"`

    `            rendered="#{not empty selectBean.currentType}">`

    `            <f:selectItems value="#{selectBean.secondList}" />`

    `         </rich:select>`

    `      </a4j:outputPanel>`

    `   <h:panelGrid>`

    `</h:form>`


    As you can see, the page code is completely the same as in the `<rich:inplaceSelect>`
    example ([Listing 5-7](#Chapter05.html#list_5_7)). We just replaced the `<rich:inplaceSelect>`
    component with `<rich:select>`. [Listing 5-20](#Chapter05.html#list_5_20) shows
    the managed bean code, which is also unchanged.


    ***Listing 5-20.** Shows the unchanged managed bean code*


    `@ManagedBean`

    `@RequestScoped`

    `public class SelectBean {`

    `   private static final String[] FRUITS = { "Banana", "Cranberry",  `![images](images/U002.jpg)

    `      "Blueberry", "Orange" };`

    `private static final String[] VEGETABLES = { "Potatoes", "Broccoli",` ![images](images/U002.jpg)

    `      "Garlic", "Carrot" };`

    `   private String currentItem = null;`

    `   private String currentType = null;`

    `   private List<SelectItem> firstList = new ArrayList<SelectItem>();`

    `   private List<SelectItem> secondList = new ArrayList<SelectItem>();`


    `   public SelectBean() {`

    `      SelectItem item = new SelectItem("fruits", "Fruits");`

    `      firstList.add(item);`

    `      item = new SelectItem("vegetables", "Vegetables");`

    `      firstList.add(item);`

    `      for (int i = 0; i < FRUITS.length; i++) {`

    `         item = new SelectItem(FRUITS[i]);`

    `      }`

    `   }`

    `public void` ***`valueChanged`***`(ValueChangeEvent event) {`

    `      secondList.clear();`

    `      if (null != event.getNewValue()) {`

    `         String[] currentItems;`

    `         if (((String) event.getNewValue()).equals("fruits")) {`

    `            currentItems = FRUITS;`

    `         } else {`

    `            currentItems = VEGETABLES;`

    `         }`

    `         for (int i = 0; i < currentItems.length; i++) {`

    `            SelectItem item = new SelectItem(currentItems[i]);`

    `            secondList.add(item);`

    `         }`

    `      }`

    `   }`

    `   //Getters and setters`

    `}`


    [Figure 5-20](#Chapter05.html#fig_5_20) shows the result. When the type selection
    is made in the first component, the second component list is updated based on
    the value selected in the first.


    ![images](images/0520.jpg)


    ***Figure 5-20.** Dynamic <rich:select> components*


    #### JavaScript API


    [Table 5-5](#Chapter05.html#tab_5_5) shows component JavaScript API.


    ![images](images/0505.jpg)'
  trans: '

    ### 使用 `<rich:select>`


    `<rich:select>` 是 RichFaces 4 中一个全新的组件，其底层基于标准的 `UISelectOne` 组件，如清单 5-18 所示。


    ***清单 5-18.** 使用 `<rich:select>`*


    `<rich:select id="select" defaultLabel="选择值..." value="#{selectBean.value}">>`

    `   <f:selectItem itemValue="0" itemLabel="香蕉" />`

    `   <f:selectItem itemValue="1" itemLabel="蔓越莓" />`

    `   <f:selectItem itemValue="2" itemLabel="蓝莓" />`

    `   <f:selectItem itemValue="3" itemLabel="橙子" />`

    `   <f:selectItem itemValue="4" itemLabel="草莓" />`

    `   <f:selectItem itemValue="4" itemLabel="苹果" />`

    `</rich:select>`


    图 5-16 展示了渲染后的效果。


    ![images](img/0516.jpg)


    ***图 5-16.** `<rich:select>` 组件*


    点击该组件后，它会显示选项列表（与标准组件相同），如图 5-17 所示。


    ![images](img/0517.jpg)


    ***图 5-17.** `<rich:select>` 弹出选择*


    您可能会好奇，为什么 RichFaces 要重新实现标准的 `<h:selectOneMenu>` 组件？答案是 RichFaces 组件提供了许多额外功能。该组件使用
    RichFaces 皮肤特性进行样式化，这与在不同浏览器中渲染效果各异且在某些浏览器中存在样式限制的标准组件不同。该组件提供了默认标签（所有 RichFaces
    输入组件共有），并具备直接键盘输入功能。


    您将在第 12 章中了解皮肤，现在先来看看直接键盘输入功能是如何工作的。要激活此功能，只需添加 `enableManualInput="true"`。组件渲染后，您将能够直接在输入字段中键入内容，组件会根据输入的前缀过滤列表，如图
    5-18 所示。


    ![images](img/0518.jpg)


    ***图 5-18.** 启用直接键入功能的 `<rich:select>`*


    由于该组件提供了选择功能，如果您输入的值无法与任何选择项匹配，输入内容将被高亮显示为错误（错误输入将以红色显示），如图 5-19 所示。请注意，此类输入在提交页面时会导致验证错误。


    ![images](img/0519.jpg)


    ***图 5-19.** 输入错误的 `<rich:select>`*


    选择更改是一个客户端操作。与其他富客户端组件一样，我们可以将 Ajax 行为附加到某个组件事件上，以触发 Ajax 请求。让我们重复依赖选择示例，但现在使用
    `<rich:select>` 组件。JSF 页面如清单 5-19 所示。


    ***清单 5-19.** JSF 页面*


    `<h:form>`

    `   <h:panelGrid>`

    `<rich:select defaultLabel="点击选择项目类型"` ![images](img/U002.jpg)

    `         value="#{selectBean.currentType}"  `![images](img/U002.jpg)

    ***`valueChangeListener="#{selectBean.valueChanged}"`***

    `         editEvent="dblclick">`

    `         <f:selectItems value="#{selectBean.firstList}" />`

    ***`<a4j:ajax event="change" render="second" execute="@this" />`***

    `      </rich:select>`

    `<a4j:outputPanel` ***`id="second"`*** `layout="block">`

    `         <rich:select value="#{selectBean.currentType}"`

    `            defaultLabel="点击选择项目"`

    `            rendered="#{not empty selectBean.currentType}">`

    `            <f:selectItems value="#{selectBean.secondList}" />`

    `         </rich:select>`

    `      </a4j:outputPanel>`

    `   <h:panelGrid>`

    `</h:form>`


    如您所见，页面代码与 `<rich:inplaceSelect>` 示例（清单 5-7）完全相同。我们只是将 `<rich:inplaceSelect>`
    组件替换为 `<rich:select>`。清单 5-20 展示了托管 Bean 代码，同样未作更改。


    ***清单 5-20.** 展示未更改的托管 Bean 代码*


    `@ManagedBean`

    `@RequestScoped`

    `public class SelectBean {`

    `   private static final String[] FRUITS = { "香蕉", "蔓越莓",  `![images](img/U002.jpg)

    `      "蓝莓", "橙子" };`

    `private static final String[] VEGETABLES = { "土豆", "西兰花",` ![images](img/U002.jpg)

    `      "大蒜", "胡萝卜" };`

    `   private String currentItem = null;`

    `   private String currentType = null;`

    `   private List<SelectItem> firstList = new ArrayList<SelectItem>();`

    `   private List<SelectItem> secondList = new ArrayList<SelectItem>();`


    `   public SelectBean() {`

    `      SelectItem item = new SelectItem("fruits", "水果");`

    `      firstList.add(item);`

    `      item = new SelectItem("vegetables", "蔬菜");`

    `      firstList.add(item);`

    `      for (int i = 0; i < FRUITS.length; i++) {`

    `         item = new SelectItem(FRUITS[i]);`

    `      }`

    `   }`

    `public void` ***`valueChanged`***`(ValueChangeEvent event) {`

    `      secondList.clear();`

    `      if (null != event.getNewValue()) {`

    `         String[] currentItems;`

    `         if (((String) event.getNewValue()).equals("fruits")) {`

    `            currentItems = FRUITS;`

    `         } else {`

    `            currentItems = VEGETABLES;`

    `         }`

    `         for (int i = 0; i < currentItems.length; i++) {`

    `            SelectItem item = new SelectItem(currentItems[i]);`

    `            secondList.add(item);`

    `         }`

    `      }`

    `   }`

    `   //Getter 和 Setter 方法`

    `}`


    图 5-20 展示了结果。当在第一个组件中进行类型选择后，第二个组件的列表会根据第一个组件中选择的值进行更新。


    ![images](img/0520.jpg)


    ***图 5-20.** 动态 `<rich:select>` 组件*


    #### JavaScript API


    表 5-5 展示了组件的 JavaScript API。


    ![images](img/0505.jpg)

