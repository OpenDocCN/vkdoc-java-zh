- fmt: "### Showing Ajax Status with `<a4j:status>`\n\nMany web sites that use Ajax\
    \ show an Ajax request status such as a moving animated image or a “Loading…”\
    \ message at the top of the screen. Some block the entire page while the Ajax\
    \ request is being executed. There are a number of reasons why it might make sense\
    \ to show an Ajax request status. As there is no full page refresh, the user might\
    \ not even be aware that a request is being executed. Showing the status indicates\
    \ that something is happening—and perhaps the user won't click the button or link\
    \ again. Well, as you probably know by now, there is no such thing as “perhaps”\
    \ in web development. Another usage is to block the screen while the Ajax request\
    \ is being executed in order to prevent the user from clicking any actions until\
    \ the Ajax request is complete. Without debating this any further, it's up to\
    \ you if you want to show the Ajax status. Our job is to show you how to use a\
    \ `<a4j:status>` component in RichFaces. This component is used to show an Ajax\
    \ request status.\n\nThe following are three ways define `<a4j:status>`:\n\n*\
    \   Status per view (page). Status is placed outside any form. Any component that\
    \ fires an Ajax request on this page will activate this status.\n*   Status per\
    \ form. Status is placed inside a form. Any component within that form that fires\
    \ an Ajax request will activate this status (view status will not be activated).\n\
    *   Named status. Status is given a name and components that fire an Ajax request\
    \ must refer to that status by name. If no component references this status, the\
    \ status will not be shown.\n\nSo, how do you define what the component shows?\
    \ The simplest way is to use two attributes named `startText` and `stopText`.\
    \ `startText` shows any text when the request is being executed on the server,\
    \ and `stopText` is the text shown when there is no active Ajax request. A third\
    \ attribute, `errorText`, is available to display text in case of server error.\n\
    \nThe following three figures show Ajax at different steps. To keep the example\
    \ simple but still demonstrate the full power of `<a4j:status>`, we are going\
    \ to take and convert a string entered in uppercase.\n\n[Figure 3-6](#Chapter03.html#fig_3_6)\
    \ shows the page after it was just loaded; however, `stopText` is already displayed\
    \ because there is no active Ajax request.\n\n![images](images/0306.jpg)\n\n***Figure\
    \ 3-6.** No active Ajax request; page just loaded*\n\n![images](images/square.jpg)\
    \ **Tip** To avoid showing status when no Ajax request is active, simply don't\
    \ set `stopText` property (or `stop` facet).\n\n[Figure 3-7](#Chapter03.html#fig_3_7)\
    \ shows when there is an active request on the server.\n\n![images](images/0307.jpg)\n\
    \n***Figure 3-7.** During active Ajax request*\n\n[Figure 3-8](#Chapter03.html#fig_3_8)\
    \ shows after the request is done.\n\n![images](images/0308.jpg)\n\n***Figure\
    \ 3-8.** After Ajax request is completed*\n\nThe JSF page is shown in [Listing\
    \ 3-56](#Chapter03.html#list_3_56).\n\n***Listing 3-56.** The JSF page*\n\n```\n\
    <h:form>\n   <h:panelGrid>\n      <h:panelGrid columns=\"3\">\n         <h:inputText\
    \ value=\"#{ajaxStatusBean.text}\" />\n         <a4j:commandButton value=\"Convert\"\
    \ action=\"#{ajaxStatusBean.upperCase}\"\n            render=\"upper\"/>\n   \
    \      <a4j:status startText=\"Working...\" stopText=\"Done\" />\n      </h:panelGrid>\n\
    \      <h:outputText id=\"upper\" value=\"#{ajaxStatusBean.text}\" />\n   </h:panelGrid>\n\
    </h:form>\n```\n\nIn [Listing 3-56](#Chapter03.html#list_3_56), the status is\
    \ placed inside the form, thus any other component activated inside this form\
    \ will invoke (show) this status as well.\n\nThe managed bean is shown in [Listing\
    \ 3-57](#Chapter03.html#list_3_57).\n\n***Listing 3-57.** The manage bean*\n\n\
    ```\n@ManagedBean\n@RequestScoped\npublic class AjaxStatusBean {\n\n   private\
    \ String text;\n\n   public void upperCase () {\n      try {\n         Thread.sleep\
    \ (3000);\n      } catch (InterruptedException e) {\n         e.printStackTrace();\n\
    \      }\n      setText(text.toUpperCase());\n   }\n   public String getText()\
    \ {\n      return text;\n   }\n   public void setText(String text) {\n      this.text\
    \ = text;\n   }\n}\n```\n\nThe bean is rather simple. The only thing you will\
    \ notice is that we put the action to sleep for 3 seconds. Without this, the action\
    \ is executed very fast and it's difficult to see the status. So, this is really\
    \ only done to “mimic” a more realistic example.\n\nSeeing the text “Done” is\
    \ not something you would expect when the page first loads. It's perfectly fine\
    \ not to use it at all and only define `startText`. When the page loads for the\
    \ first time, nothing will be displayed and when Ajax is activated, `startText`\
    \ content will be displayed.\n\n```\n<a4j:status startText=\"Working...\"/>\n\
    ```\n\nYou can also style the label shown with `startStyle` attribute (`stopStyle`\
    \ also available), as follows:\n\n```\n<a4j:status startText=\"Working...\" startStyle=\"\
    background-color:#ffA500\"/>\n```\n\nYou are not limited to displaying the status\
    \ next to the button or link; using the `style` attribute you can specify absolute\
    \ positioning for the status. Let's move the status outside the form; this means\
    \ that any component on the page will activate this status and that we are moving\
    \ the status to display at the very top of the browser window, as shown in [Figure\
    \ 3-9](#Chapter03.html#fig_3_9).\n\n![images](images/0309.jpg)\n\n***Figure 3-9.**\
    \ Using absolute positioning for Ajax status*\n\nThe code is shown in [Listing\
    \ 3-58](#Chapter03.html#list_3_58).\n\n***Listing 3-58.** The code for the Ajax\
    \ status*\n\n```\n<a4j:status id=\"ajaxStatus\" startText=\"Working...\"\n   \
    \       startStyle=\"background-color: #ffA500;\n          font-weight:bold;\n\
    \          position: absolute;\n          left: 520px;\n          top: 1px;\n\
    \          width: 100px;\" />\n<h:form>\n   <h:panelGrid>\n      <h:panelGrid\
    \ columns=\"3\">\n         <h:inputText value=\"#{ajaxStatusBean.text}\" />\n\
    \         <a4j:commandButton value=\"Convert\"\n            action=\"#{ajaxStatusBean.upperCase}\"\
    \n            render=\"upper\" />\n      </h:panelGrid>\n      <h:outputText id=\"\
    upper\" value=\"#{ajaxStatusBean.text}\" />\n   </h:panelGrid>\n</h:form>\n```\n\
    \nRight now any component will show this status. Let's update the page so that\
    \ the status is shown only when we click the Convert button. We first need to\
    \ give the status a name, as shown in [Listing 3-59](#Chapter03.html#list_3_59).\
    \ Note that we are setting the name, not the id.\n\n***Listing 3-59.** Giving\
    \ the status a name*\n\n```\n<a4j:status id=\"ajaxStatus\" name=\"ajaxStatus\"\
    \ startText=\"Working...\"\n          startStyle=\"background-color: #ffA500;\n\
    \          font-weight:bold;\n          position: absolute;\n          left: 520px;\n\
    \          top: 1px;\n          width: 100px;\" />\n```\n\nNext we need to update\
    \ `<a4j:commandButton>` to reference that status, using the `status` attribute\
    \ as follows:\n\n```\n<a4j:commandButton value=\"Convert\"\n   action=\"#{ajaxStatusBean.upperCase}\"\
    \ render=\"upper\"\n   status=\"ajaxStatus\"/>\n```\n\nThe status will be shown\
    \ only when this button is activated. No other component anywhere on the page\
    \ will activate this status. Again, this is called a named status.\n\n![images](images/square.jpg)\
    \ **Note** Any RichFaces components that sends an Ajax request can show (activate)\
    \ `<a4j:status>`. A named status will not be shown if no component references\
    \ it by name."
