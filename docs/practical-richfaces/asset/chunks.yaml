    #### 使用 <a4j:status> 显示 Ajax 状态


    许多使用 Ajax 的网站会在屏幕顶部显示 Ajax 请求状态，例如一个移动的动画图像或一条“加载中…”消息。有些网站会在执行 Ajax 请求时阻止整个页面。显示
    Ajax 请求状态可能有多种理由。由于没有完整的页面刷新，用户甚至可能不知道正在执行请求。显示状态可以表明有事情正在发生——这样用户或许就不会再次点击按钮或链接。不过，你可能已经知道，在
    Web 开发中不存在“或许”这种说法。另一种用途是在执行 Ajax 请求时锁定屏幕，以防止用户在请求完成前点击任何操作。我们不再对此进行深入讨论，是否显示
    Ajax 状态由你决定。我们的任务是向你展示如何在 RichFaces 中使用 `<a4j:status>` 组件。该组件用于显示 Ajax 请求状态。


    以下是定义 `<a4j:status>` 的三种方式：


    *   **按视图（页面）的状态**：状态放置在任意表单之外。此页面上任何触发 Ajax 请求的组件都会激活此状态。

    *   **按表单的状态**：状态放置在表单内部。该表单内任何触发 Ajax 请求的组件都会激活此状态（视图状态不会被激活）。

    *   **命名状态**：状态被赋予一个名称，触发 Ajax 请求的组件必须通过名称引用该状态。如果没有组件引用此状态，则不会显示该状态。


    那么，如何定义组件显示的内容呢？最简单的方法是使用两个属性：`startText` 和 `stopText`。`startText` 在服务器端执行请求时显示文本，`stopText`
    在没有活跃的 Ajax 请求时显示文本。第三个属性 `errorText` 可用于在服务器出错时显示文本。


    以下三张图展示了 Ajax 在不同步骤中的状态。为了保持示例简单，同时展示 `<a4j:status>` 的全部功能，我们将获取一个输入的字符串并将其转换为大写。


    图 3-6 展示了页面刚加载后的状态；然而，由于没有活跃的 Ajax 请求，`stopText` 已经显示出来。


    ![images](img/0306.jpg)


    ***图 3-6.** 无活跃 Ajax 请求；页面刚加载*


    ![images](img/square.jpg) **提示** 为了避免在没有活跃 Ajax 请求时显示状态，只需不设置 `stopText` 属性（或
    `stop` 区域）即可。


    图 3-7 展示了服务器端有活跃请求时的状态。


    ![images](img/0307.jpg)


    ***图 3-7.** 活跃 Ajax 请求期间*


    图 3-8 展示了请求完成后的状态。


    ![images](img/0308.jpg)


    ***图 3-8.** Ajax 请求完成后*


    JSF 页面如代码清单 3-56 所示。


    ***代码清单 3-56.** JSF 页面*


    `<h:form>`

    `   <h:panelGrid>`

    `      <h:panelGrid columns="3">`

    `         <h:inputText value="#{ajaxStatusBean.text}" />`

    `         <a4j:commandButton value="Convert" action="#{ajaxStatusBean.upperCase}"`

    `            render="upper"/>`

    `         <a4j:status startText="Working..." stopText="Done" />`

    `      </h:panelGrid>`

    `      <h:outputText id="upper" value="#{ajaxStatusBean.text}" />`

    `   </h:panelGrid>`

    `</h:form>`


    在代码清单 3-56 中，状态被放置在表单内部，因此该表单内任何其他被激活的组件也会调用（显示）此状态。


    受管 Bean 如代码清单 3-57 所示。


    ***代码清单 3-57.** 受管 Bean*


    `@ManagedBean`

    `@RequestScoped`

    `public class AjaxStatusBean {`


    `   private String text;`


    `   public void upperCase () {`

    `      try {`

    `         Thread.sleep (3000);`

    `      } catch (InterruptedException e) {`

    `         e.printStackTrace();`

    `      }`

    `      setText(text.toUpperCase());`

    `   }`

    `   public String getText() {`

    `      return text;`

    `   }`

    `   public void setText(String text) {`

    `      this.text = text;`

    `   }`

    `}`


    这个 Bean 相当简单。你唯一会注意到的是我们让动作休眠了 3 秒钟。如果没有这个休眠，动作会执行得非常快，很难看到状态。所以，这实际上只是为了“模拟”一个更真实的示例。


    在页面首次加载时看到“Done”文本可能不是你期望的。完全不使用它，只定义 `startText` 也是完全可以的。当页面首次加载时，不会显示任何内容，当
    Ajax 被激活时，会显示 `startText` 的内容。


    `<a4j:status startText="Working..."/>`


    你还可以使用 `startStyle` 属性（`stopStyle` 也可用）来设置显示的标签样式，如下所示：


    `<a4j:status startText="Working..." startStyle="background-color:#ffA500"/>`


    你不必将状态显示限制在按钮或链接旁边；使用 `style` 属性，你可以为状态指定绝对定位。让我们将状态移到表单外部；这意味着页面上的任何组件都会激活此状态，并且我们将状态移动到浏览器窗口的最顶部显示，如图
    3-9 所示。


    ![images](img/0309.jpg)


    ***图 3-9.** 为 Ajax 状态使用绝对定位*


    代码如代码清单 3-58 所示。


    ***代码清单 3-58.** Ajax 状态的代码*


    `<a4j:status id="ajaxStatus" startText="Working..."`

    `          startStyle="background-color: #ffA500;`

    `          font-weight:bold;`

    `          position: absolute;`

    `          left: 520px;`

    `          top: 1px;`

    `          width: 100px;" />`

    `<h:form>`

    `   <h:panelGrid>`

    `      <h:panelGrid columns="3">`

    `         <h:inputText value="#{ajaxStatusBean.text}" />`

    `         <a4j:commandButton value="Convert"`

    `            action="#{ajaxStatusBean.upperCase}"`

    `            render="upper" />`

    `      </h:panelGrid>`

    `      <h:outputText id="upper" value="#{ajaxStatusBean.text}" />`

    `   </h:panelGrid>`

    `</h:form>`


    现在任何组件都会显示此状态。让我们更新页面，使得仅当我们点击 Convert 按钮时才显示状态。我们首先需要给状态一个名称，如代码清单 3-59 所示。注意，我们设置的是名称，而不是
    id。


    ***代码清单 3-59.** 为状态命名*


    `<a4j:status id="ajaxStatus"` **`name="ajaxStatus"`** `startText="Working..."`

    `          startStyle="background-color: #ffA500;`

    `          font-weight:bold;`

    `          position: absolute;`

    `          left: 520px;`

    `          top: 1px;`

    `          width: 100px;" />`


    接下来，我们需要更新 `<a4j:commandButton>` 以引用该状态，使用 `status` 属性如下：


    `<a4j:commandButton value="Convert"`

    `   action="#{ajaxStatusBean.upperCase}" render="upper"`

    **`status="ajaxStatus"`**`/>`


    该状态将仅在此按钮被激活时显示。页面上任何其他组件都不会激活此状态。同样，这被称为命名状态。


    ![images](img/square.jpg) **注意** 任何发送 Ajax 请求的 RichFaces 组件都可以显示（激活）`<a4j:status>`。如果没有组件通过名称引用命名状态，则该状态将不会显示。

