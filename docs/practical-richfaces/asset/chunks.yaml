- fmt: "#### Using `<a4j:commandButton>` and `<a4j:commandLink>`\n\nAdding Ajax behavior\
    \ to a JSF button or link is not very difficult and looks as shown in [Listing\
    \ 3-1](#Chapter03.html#list_3_1) when using a button.\n\n**Listing 3-1.** Adding\
    \ Ajax behavior to a JSF button\n\n```\n<h:form>\n...\n   <h:commandButton value=\"\
    Send\">\n     <f:ajax event=\"click\" render=\"out\"/>\n   </h:commandButton>\n\
    </h:form>\n```\n\nAnd using a link instead of a button, it is virtually identical,\
    \ as shown in [Listing 3-2](#Chapter03.html#list_3_2).\n\n**Listing 3-2.** Using\
    \ a link instead of a button\n\n```\n<h:form>\n...\n   <h:commandLink value=\"\
    Send\">\n     <f:ajax event=\"click\" render=\"out\"/>\n   </h:commandLink>\n\
    \   <h:outputText id=\"out\"/>\n</h:form>\n```\n\nIn both examples, when a button\
    \ is clicked an Ajax request will be fired and a component with id `out` will\
    \ be rendered. In most cases you have a number of input fields and then a button\
    \ to submit them, as shown in [Listing 3-3](#Chapter03.html#list_3_3).\n\n**Listing\
    \ 3-3.** Shows that you have a number of input fields and then a button to submit\
    \ them\n\n```\n<h:form>\n   <h:panelGrid columns=\"2\">\n      <h:outputText value=\"\
    Name:\"/>\n      <h:inputText value=\"#{bean.name}\"/>\n      <h:outputText value=\"\
    Echo:\"/>\n      <h:outputText id=\"echo\" value=\"#{bean.name}\"/>\n      <h:outputText\
    \ value=\"Count:\"/>\n      <h:outputText id=\"count\" value=\"#{bean.count}\"\
    />\n   </h:panelGrid>\n   <h:commandButton value=\"Submit\" action=\"#{bean.countAction}\"\
    >\n     <f:ajax event=\"click\" render=\"echo count\"/>\n   </h:commandButton>\n\
    </h:form>\n```\n\nThe managed bean code is shown in [Listing 3-4](#Chapter03.html#list_3_4).\n\
    \n**Listing 3-4.** The managed bean code\n\n```\n@ManagedBean\n@RequestScoped\n\
    \npublic class Bean {\n\n   private String name;\n   private Integer count;\n\n\
    \   public void countAction (){\n      count = name.length();\n   }\n   // getters\
    \ and setters\n}\n```\n\nWhen you run the above example, it's not going to work\
    \ because we forgot to modify the `execute` attribute on the `<f:ajax>` behavior.\
    \ If you remember from [Chapter 2](#Chapter02.html#ch2), the default `execute`\
    \ value for `<f:ajax>` is `@this`. `@this` means only this (current) component\
    \ will be executed and the input components will not. To fix it, we have to add\
    \ `execute` attribute as shown in [Listing 3-5](#Chapter03.html#list_3_5).\n\n\
    **Listing 3-5.** Adding execute attribute\n\n```\n<h:form>\n   <h:panelGrid columns=\"\
    2\">\n      <h:outputText value=\"Name:\"/>\n      <h:inputText value=\"#{bean.name}\"\
    />\n      <h:outputText value=\"Echo:\"/>\n      <h:outputText id=\"echo\" value=\"\
    #{bean.name}\"/>\n      <h:outputText value=\"Count:\"/>\n      <h:outputText\
    \ id=\"count\" value=\"#{bean.count}\"/>\n   </h:panelGrid>\n   <h:commandButton\
    \ value=\"Submit\" action=\"#{bean.countAction}\">\n     <f:ajax event=\"click\"\
    \ execute=\"@form\" render=\"echo count\"/>\n   </h:commandButton>\n</h:form>\n\
    ```\n\n![images](images/square.jpg) **Tip** The default value for `execute` in\
    \ `<f:ajax>` behavior is `@this`. Also, we recommend always setting the `event`\
    \ attribute, even if using a default value, to reduce errors and make the code\
    \ more readable.\n\nRichFaces makes it easier to use a button or link with Ajax\
    \ support by providing button and link components with built-in Ajax: `<a4j:commandButton>`\
    \ and `<a4j:commandLink>`. [Listing 3-6](#Chapter03.html#list_3_6) shows an example\
    \ we saw earlier.\n\n**Listing 3-6.** Example\n\n```\n<h:form>\n...\n   <h:commandButton\
    \ value=\"Send\">\n     <f:ajax event=\"click\" render=\"out\"/>\n   </h:commandButton>\n\
    </h:form>\n```\n\nWhen using the RichFaces `<a4j:commandButton>`, the example\
    \ would look like [Listing 3-7](#Chapter03.html#list_3_7).\n\n**Listing 3-7.**\
    \ Example when using the RichFaces `<a4j:commandButton>`\n\n```\n<h:form>\n...\n\
    \   <a4j:commandButton value=\"Send\" render=\"out\"/>\n</h:form>\n```\n\nWe went\
    \ from three to just one line of code. It looks simpler and cleaner. There is\
    \ one more difference we need to tell you about. Let's rewrite this example using\
    \ the `<a4j:commandButton>`, as shown in [Listing 3-8](#Chapter03.html#list_3_8).\n\
    \n**Listing 3-8.** Example using the `<a4j:commandButton>`\n\n```\n<h:form>\n\
    \   <h:panelGrid columns=\"2\">\n      <h:outputText value=\"Name:\"/>\n     \
    \ <h:inputText value=\"#{bean.name}\"/>\n      <h:outputText value=\"Echo:\"/>\n\
    \      <h:outputText id=\"echo\" value=\"#{bean.name}\"/>\n      <h:outputText\
    \ value=\"Count:\"/>\n      <h:outputText id=\"count\" value=\"#{bean.count}\"\
    />\n   </h:panelGrid>\n   <a4j:commandButton value=\"Submit\" render=\"echo count\"\
    \ action=\"#{bean.countAction}\"/>\n</h:form>\n```\n\nIf you run the example in\
    \ [Listing 3-8](#Chapter03.html#list_3_8), it will work as expected and notice\
    \ that we didn't have to specify the `execute` attribute. Because it is so common\
    \ when using a button to also execute input fields inside the form, the `execute`\
    \ in the `<a4j:commandButton>` (and `<a4j:commandLink>`) is set by default to\
    \ `@form`. You can always overwrite the default value by using either a predefined\
    \ value such as `@all`, ids, or EL, as shown in [Table 3-1](#Chapter03.html#tab_3_1).\
