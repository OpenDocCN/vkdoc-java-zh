    ### 总结


    RichFaces 提供了广泛的富输出组件，从基本面板到弹出窗口和工具提示。本章向您展示了如何使用和自定义这些组件的许多不同示例和技巧。与任何 RichFaces
    组件一样，您可以使用皮肤自定义这些组件的外观和感觉。第 13 章 专门介绍皮肤及其自定义。要查看这些组件及其他组件的实际效果，请访问 JBoss 社区 RichFaces
    网站 `www.jboss.org/richfaces` 上的 RichFaces 组件演示应用程序。


    现在您已经了解了输出组件，我们将在下一章介绍数据迭代组件。


