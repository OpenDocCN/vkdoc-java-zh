    false;`  `   public void cityListener(ActionEvent event){` `      if (event.getComponent().getId().equals("nyc"))
    nyc = true; else nyc = false;` `      if (event.getComponent().getId().equals("sf"))
    sf = true; else sf = false;` `      if (event.getComponent().getId().equals("la"))
    la = true; else la = false;` `   }` `   // Getters and setters` `}`  It’s also
    possible to specify a separator between items (components) on the toolbar. Four
