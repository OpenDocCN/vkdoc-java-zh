    **Note** To keep the code shorter, we skipped a few methods that are not used
    in this implementation.    That’s a generic model. It’s marked as abstract and
    parameterized with t he object class. This allows you to later use the same model
    code for all our various objects across the application.    Let’s review the methods
    overridden from the `ExtendedDataModel`. As we said before, the id of the wrapped
    object from the database is used as a `rowKey` for the object. `getRowData()`
    simply iterates the cached items (collected during the `walk()` method execution)
    and performs lookup for an object id equals to the current `rowKey`.    The `isRowAvailable()`
    is a standard method from `DataModel` and simply returns the result from checking
    the current `rowData` for value. Let’s review another `getRowCount()` simple method
    before looking at the `walk()` method.    We’re using Hibernate Criteria API for
    retrieving entities. We created `Criteria` without any new `Criterions` added
    in order to get the size of the result set. We’re performing simple caching of
    that size in session using the `cachedRowCount` bean property.    Notice that
    very important parts—`getRowIndex()` and `setRowIndex()`—are not required to be
    implemented properly when using a simple `<rich:dataTable>` component. We only
    added them as stub methods. However, if you will want to use `<rich:extendedDataTable>`,
    it requires these methods to have proper implementation for selection functionality.
    The reason for this is rather simple: as the table allows sequential selection
    of row ranges (for example standard UI SHIFT key + mouse click selection), it
    can’t use only `rowKeys` because you can’t characterize a range using anything
    except indexes. If you require selection, the following two methods need to be
    implemented:    1.  `setRowIndex(index)`: This method calls the `setRowKey(rowKey)`
    method and passes the `rowKey` of the object, which corresponds to the index for
    a given range and sorting/filtering rules applied to the wrapped model. 2.  `getRowIndex():`
    This returns the index in the wrapped model of the object for a currently set
    `rowKey`.    In [Listing 7-52](#Chapter07.html#list_7_52), let’s review in detail
    the most important `walk()` method, as well as one helper method.    ***Listing
    7-52.** `walk()` method as well as one helper method*  `protected static boolean
    areEqualRanges(SequenceRange range1, SequenceRange range2) {` `   if (range1 ==
    null || range2 == null) {` `      return range1 == null && range2 == null;` `   }
    else {` `      return range1.getFirstRow() == range2.getFirstRow() && range1.getRows()
    == range2.getRows();` `   }` `}`  `@Override` `public void walk(FacesContext facesContext,
    DataVisitor visitor, Range range, Object argument) {` `   SequenceRange sequenceRange
    = (SequenceRange) range;` `   if (this.cachedItems == null || !areEqualRanges(this.cachedRange,
    sequenceRange)) {` `      Session session = HibernateUtils.`*`getSessionFactory`*`().openSession();`
    `      try {` `         Criteria criteria = createCriteria(session);` `         if
    (sequenceRange != null) {` `            int first = sequenceRange.getFirstRow();`
    `            int rows = sequenceRange.getRows();` `            criteria.setFirstResult(first);`
    `            if (rows > 0) {` `               criteria.setMaxResults(rows);` `            }`
    `         }` `         this.cachedRange = sequenceRange;` `         this.cachedItems
    = criteria.list();` `      } finally {` `         session.close();` `      }`
    `   }` `   for (T item : this.cachedItems) {` `      visitor.process(facesContext,
    item.getId(), argument);` `   }` `}`  As you can see, the idea is pretty simple.
    First, we are checking that we haven’t already cached the data. Even if the data
    is cached, we then check whether the cached data range matches the current range
    passed by the table. . If no match, the component is getting rendered first time
    or it was switched to a different page using the `<rich:dataScroller>` component
    or by changing `first` and/or `rows` attributes. In this case we use `Criteria`
    API, setting parameters from `Range` as criteria parameters (first object index
    to fetch and number of objects which should be fetched). After getting the result.
    we cache it in a session with the current `Range` object.    Finally, we are iterating
    over the result set that we just obtained, calling the `process()` method of the
    `Visitor`.    ![images](images/square.jpg) **Note** The `rowKey` passed to the
    visitor is added to the `clientId` of nested components for every iteration. `getRowKey()`
    has to return a value that is a string-based and is compatible with `javax.faces.component.UIComponent#getClientId(FacesContext
    ctx)`. In other cases, you have to provide the `rowKeyConverter` using a corresponding
    iteration component attribute.    Finally, we need to check the model class for
    specific `GameDescriptor` objects and the page that defines the `<rich:dataTable>`
