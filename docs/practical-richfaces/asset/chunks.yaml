    #### 表格过滤


    本节介绍 RichFaces 中表格过滤的基础知识。我们采用与排序部分类似的方法，展示可应用于 `<rich:dataTable>` 或 `<rich:extendedDataTable>`
    组件的主要基本过滤功能。我们将在“迭代组件高级模型”部分中介绍更复杂的情况，包括使用基于数据库的过滤。


    与表格排序类似，过滤功能可以通过两种方式实现：使用 JavaScript API 或使用 RichFaces 操作控件。


    ![images](img/square.jpg) **注意** 与排序功能类似，表格组件不提供内置的过滤控件。我们将使用 `<a4j:ajax>` 和 JavaScript
    API 来实现它们。请务必遵循 RichFaces 组件指南，以了解此类内置控件何时可用。


    让我们从用于实现过滤的基本属性开始。然后我们将构建两个不同的示例。


    第一个属性是 `filterExpression`。它是 `<rich:column>` 上的一个属性。对于使用表格内置过滤的简单情况，应将其设置为一个 EL
    表达式，该表达式计算结果为布尔值，如果当前迭代对象满足该列的过滤条件，则返回 `true`。您可以在该属性中使用 JSTL、Seam 或任何自定义函数。


    声明式方法的替代方案是使用 `filter` 属性。该属性应使用一个 EL 表达式来定义，该表达式指向一个实现了 `org.richfaces.model.Filter<T>`
    接口的对象。该对象应实现一个 `accept(T t)` 方法，该方法接收行对象作为参数，并返回一个类似的布尔结果，指示该对象是否满足过滤条件。


    现在我们已经介绍了这些概念，让我们来看一个过滤实现的示例，该示例使用表头中的输入框，并为其添加 `<a4j:ajax>` 行为，以便在值发生变化时过滤表格。


    在此示例中，我们将使用 JSTL 函数，因此需要向页面添加适当的命名空间，如下所示：

    '
- fmt: "\n[Listing 7-41](#Chapter07.html#list_7_41) shows the page code.\n\n***Listing\
    \ 7-41.** Page code*\n\n```\n<h:form>\n    <rich:panel style=\"width:650px\" header=\"\
    rich:dataTable sample\">\n        <rich:dataTable value=\"#{olympicGamesBean.games}\"\
    \ var=\"game\" id=\"table\">\n            <f:facet name=\"header\">Olympic Games\
    \ List</f:facet>\n            <rich:column>\n                <f:facet name=\"\
    header\">Flag</f:facet>\n                <h:graphicImage value=\"#{game.flagURI}\"\
    \ />\n            </rich:column>\n            <rich:column filterExpression=\"\
    #{fn:startsWith(game.city, filteringBean.cityFilterString)}\">\n             \
    \   <f:facet name=\"header\">\n                    <h:inputText value=\"#{filteringBean.cityFilterString}\"\
    >\n                        <a4j:ajax render=\"table@body\" />\n              \
    \      </h:inputText>\n                </f:facet>\n                #{game.city}\n\
    \            </rich:column>\n            <rich:column filterExpression=\"#{fn:containsIgnoreCase(game.country,\
    \ filteringBean.countryFilterString)}\">\n                <f:facet name=\"header\"\
    >\n                    <h:inputText value=\"#{filteringBean.countryFilterString}\"\
    >\n                        <a4j:ajax render=\"table@body\" />\n              \
    \      </h:inputText>\n                </f:facet>\n                #{game.country}\n\
    \            </rich:column>\n            <rich:column>\n                <f:facet\
    \ name=\"header\">Season</f:facet>\n                #{game.season}\n         \
    \   </rich:column>\n            <rich:column filter=\"#{filteringBean.centuryFilter}\"\
    >\n                <f:facet name=\"header\">\n                    <h:selectOneMenu\
    \ value=\"#{filteringBean.centuryFilterNumber}\">\n                        <a4j:ajax\
    \ render=\"table@body\" />\n                        <f:selectItem itemLabel=\"\
    \" itemValue=\"0\" />\n                        <f:selectItem itemLabel=\"19th\
    \ century\" itemValue=\"19\" />\n                        <f:selectItem itemLabel=\"\
    20th century\" itemValue=\"20\" />\n                        <f:selectItem itemLabel=\"\
    21st century\" itemValue=\"21\" />\n                    </h:selectOneMenu>\n \
    \               </f:facet>\n                #{game.year}\n            </rich:column>\n\
    \        </rich:dataTable>\n    </rich:panel>\n</h:form>\n```\n\nOn the page we\
    \ see three columns, which get defined as filterable. The City column uses the\
    \ `fn:startWith` JSTL function and the Country column uses `fn:containsIgnoreCase`.\
    \ The third column uses the `filter` attribute bound to a `centuryFilter` object\
    \ in our `FilteringBean`. Current filtering values for the first two columns are\
    \ stored in two string properties bound to inputs `cityFinteringString` and `countryFilteringString`\
    \ and an integer property stored in the `centuryFilteringNumber` field of `FilteringBean`.\
    \ As a result of filtering, we should update only data in the table and not loose\
    \ our input focus. We updated only the body of the table from `<a4j:ajax>` using\
    \ the `body` meta-component, which were mentioned in the “Using Partial Table\
    \ Updates” section of this chapter.\n\n[Listing 7-42](#Chapter07.html#list_7_42)\
    \ shows the bean code.\n\n***Listing 7-42.** The bean code*\n\n```\n@ManagedBean\n\
    @ViewScoped\npublic class FilteringBean implements Serializable{\n\n    private\
    \ String cityFilterString;\n    private String countryFilterString;\n    private\
    \ int centuryFilterNumber;\n\n    public Filter<GameDescriptor> getCenturyFilter()\
    \ {\n        return new Filter<GameDescriptor>() {\n            @Override\n  \
    \          public boolean accept(GameDescriptor t) {\n                switch (centuryFilterNumber)\
    \ {\n                    case 19:\n                        return (t.getYear()\
    \ >= 1800) && (t.getYear() < 1900);\n                    case 20:\n          \
    \              return (t.getYear() >= 1900) && (t.getYear() < 2000);\n       \
    \             case 21:\n                        return (t.getYear() >= 2000);\n\
    \                    default:\n                    return true;\n            \
    \    }\n            }\n        };\n    }\n    //Getters and Setters\n}\n```\n\n\
    `cityFilteringString` and `countryFilteringString` properties get compared with\
    \ every Olympic Game corresponding property, according to JSTL functions defined\
    \ in `filterExpression` attributes. The `CenturyFilter` object is probably of\
    \ most interest to us. As we said earlier, analogous to the sorting `comparator`\
    \ usage, the iteration object (`GameDescriptor`) is passed to the `accept` method\
    \ on every iteration to check whether it satisfies filter conditions or not. We\
    \ use a simple `switch` statement according to possible select component values\
    \ to check whether the year for the current object is matching the chosen century.\n\
    \n[Figure 7-30](#Chapter07.html#fig_7_30) shows how the table looks after filtered\
    \ by country and century.\n\n![images](images/0730.jpg)\n\n***Figure 7-30.** Table\
    \ filtering*\n\nPretty simple isn’t it? Now let’s show you the second approach,\
    \ using JavaScript API. The table client object provides the `filter()` API method.\
    \ This method should be passed with three parameters: column id, current filter\
    \ value, and clearance flag. The first and the second parameter are required and\
    \ don’t need an explanation. The third parameter determines if the other filtering\
    \ rules should be cleared on a new filtering call or be added to previous ones.\n\
    \n[Listing 7-43](#Chapter07.html#list_7_43) shows the page code for the API usage\
    \ example.\n\n***Listing 7-43.** API usage*\n\n```\n<h:form>\n    <rich:panel\
    \ style=\"width:650px\" header=\"rich:dataTable sample\">\n        <a4j:outputPanel\
    \ ajaxRendered=\"true\" layout=\"block\">\n            <a4j:repeat value=\"#{filteringBean.continents}\"\
    \ var=\"cont\">\n                <h:outputLink value=\"#\" styleClass=\"#{filteringBean.continentFilterString==cont\
    \ ? 'bold':''}\">\n                    #{cont}\n                    <rich:componentControl\
    \ target=\"table2\" operation=\"filter\" event=\"click\">\n                  \
    \      <f:param value=\"contCol\"/>\n                        <f:param value=\"\
    #{cont}\"/>\n                    </rich:componentControl>\n                </h:outputLink>\
    \ |\n            </a4j:repeat>\n        </a4j:outputPanel>\n        <a4j:outputPanel\
    \ ajaxRendered=\"true\" layout=\"block\">\n            <h:outputLink value=\"\
    #\" styleClass=\"#{filteringBean.centuryFilterNumber==0 ? 'bold':''}\"\n     \
    \           onclick=\"#{rich:component('table2')}.filter('centCol', 0); return\
    \ false;\">\n                    All available\n            </h:outputLink> |\n\
    \            <h:outputLink value=\"#\" styleClass=\"#{filteringBean.centuryFilterNumber==19\
    \ ? 'bold':''}\"\n                onclick=\"#{rich:component('table2')}.filter('centCol',\
    \ 19); return false;\">\n                19th century\n            </h:outputLink>\
    \ |\n            <h:outputLink value=\"#\" styleClass=\"#{filteringBean.centuryFilterNumber==20\
    \ ? 'bold':''}\"\n                onclick=\"#{rich:component('table2')}.filter('centCol',\
    \ 20); return false;\">\n                20th century\n            </h:outputLink>\
    \ |\n            <h:outputLink value=\"#\" styleClass=\"#{filteringBean.centuryFilterNumber==21\
    \ ? 'bold':''}\"\n                onclick=\"#{rich:component('table2')}.filter('centCol',\
    \ 21); return false;\">\n                21st century\n            </h:outputLink>\
    \ |\n        </a4j:outputPanel>\n        <rich:dataTable value=\"#{olympicGamesBean.games}\"\
    \ var=\"game\" id=\"table2\">\n            <f:facet name=\"header\">Olympic Games\
    \ List</f:facet>\n            <!--Other columns-->\n            <rich:column id=\"\
    contCol\" filterValue=\"#{filteringBean.continentFilterString}\" filterExpression=\"\
    #{(filteringBean.continentFilterString=='') || (game.continent==filteringBean.continentFilterString)}\"\
    >\n                <f:facet name=\"header\">Continent</f:facet>\n            \
    \        #{game.continent}\n            </rich:column>\n            <!--Other\
    \ columns-->\n            <rich:column filter=\"#{filteringBean.centuryFilter}\"\
    \ filterValue=\"#{filteringBean.centuryFilterNumber}\" id=\"centCol\">\n     \
    \           <f:facet name=\"header\">Year</f:facet>\n                #{game.year}\n\
    \            </rich:column>\n        </rich:dataTable>\n    </rich:panel>\n</h:form>\n\
    ```\n\nWe added the same century filter from [Listing 7-42](#Chapter07.html#list_7_42),\
    \ and for the continents we used empty or equals conditions. In order to perform\
    \ filtering, we called the `filter()` API method with target column id and filter\
    \ value parameters.\n\nAll we added to the bean was a `continents` array with\
    \ a getter method in order to populate our filter panel dynamically, as follows:\n\
    \n```\npublic final static String[] continents = { \"Europe\", \"Asia\", \"North\
    \ America\", \"South America\", \"Oceania\" };\n```\n\n[Figure 7-31](#Chapter07.html#fig_7_31)\
    \ shows the result after clicking the “North America” and “21st Century” links.\n\
    \n![images](images/0731.jpg)\n\n***Figure 7-31.** Table filtered via JavaScript\
    \ API*\n\nAs we have no inputs defined for the filter, we need to define the `filterValue`\
    \ attribute with the EL expression set to the bean property, which will be updated\
    \ with the current filtering value, and so could be used in the `Filter` object\
    \ and defined in the `filterExpression`.\n\nIf the filter returns no data, you\
    \ can use the `noDataLabel` attribute or the `noData` facet in order to define\
    \ the content to be shown in such case. Adding a facet is shown in [Listing 7-44](#Chapter07.html#list_7_44).\n\
    \n[Listing 7-44](#Chapter07.html#list_7_44). Adding a Facet to Table Filtered\
    \ via JavaScript API.\n\n```\n<f:facet name=\"noData\">\n    <h:outputText value=\"\
    No games for current filter found\" style=\"font-weight:bold\"/>\n</f:facet>\n\
    ```\n\nThe result will be as shown in [Figure 7-32](#Chapter07.html#fig_7_32)\
    \ after clicking “Asia” and “19th Century.”\n\n![images](images/0732.jpg)\n\n\
    ***Figure 7-32.** No results to display after filtering*\n\n#### Iteration Components\
    \ Advanced Models\n\nIf you previously worked with JSF tables, you know that you\
    \ can pass not only a simple `List` to the `<rich:dataTable>` value, but also\
    \ point the table to the data model that is an object of a class that extends\
    \ the `javax.faces.model.DataModel<E>` abstract class.\n\nRichFaces adds the following\
    \ two data models:\n\n*   `org.ajax4jsf.model.ExtendedDataModel<E>`: A base model\
    \ abstract class. It defines the abstract model contract, which helps to manage\
    \ complex data structures like trees, spreadsheets, and so on, in complex iteration\
    \ components.\n*   `org.richfaces.model.ArrangeableModel`: A model implementation\
    \ that extends `ExtendedDataModel` and implements the `org.richfaces.model.Arrangeable`\
    \ interface. This model adds filtering and sorting operations.\n\nLet’s go over\
    \ why we need these special data models.\n\nThe `ExtendedDataModel` adds the `rowKey`\
    \ entity to a JSF model and uses `rowKey` instead (in some cases together with)\
    \ of `rowIndex`. This key is an abstract property that allows us to identify the\
    \ object among a wrapped collection. This key can be your database entity id for\
    \ example. Using keys instead of just indexes guarantees that we will easily and\
    \ correctly get the object from the wrapped model, in the case of a paginated\
    \ model, with built-in component selection enabled. Using `javax.faces.model.DataModel`,\
    \ which uses indexes, we will need to design and implement additional “model index”\
    \ or “database object” lookup functionality. When using `ExtendedDataModel`, all\
    \ the necessary methods and default implementation are already provided.\n\n`ExtendedDataModel`\
    \ has `org.ajax4jsf.model.SequenceDataModel<E>` simple implementation used as\
    \ the default model for the iteration components (when sorting and filtering features\
    \ are not activated). It extends with `org.richfaces.model.TreeSequenceKeyModel<V>`,\
    \ which is also an abstract class with implementations used in tree components.\n\
    \nFinally, `ArrangeableModel` extends the `ExtendedDataModel`, providing default\
    \ implementation for abstract classes and implementing the `Arrangeable` interface.\
    \ It uses the same methods from the extended model and with an additional `arrange()`\
    \ method used to set sorting and filtering rules to the model from the component\
    \ level.\n\nLet’s review both models by creating two examples.\n\n##### Data Preparation\n\
    \nIn order to get close to a real-world application, we will add a database layer\
    \ to our application and use Hibernate to work with the data.\n\nWe will use HSQLDB\
    \ (version 1.8.0.2 ) for the database in our example, and Hibernate Core (version\
    \ 3.6.2).\n\nThe next step is to add the Hibernate configuration file (`hibernate.cfg.xml`)\
    \ to the application resources. Its content is shown in [Listing 7-45](#Chapter07.html#list_7_45).\n\
    \n***Listing 7-45.** Adding the Hibernate configuration file to application resources*\n\
    \n```\n<?xml version='1.0' encoding='utf-8'?>\n<!DOCTYPE hibernate-configuration\
    \ PUBLIC\n\"-//Hibernate/Hibernate Configuration DTD//EN\"\n\"http://hibernate.sourceforge.net/hibernate-configuration-3.0.dtd\"\
    >\n<hibernate-configuration>\n    <session-factory>\n        <property name=\"\
    hibernate.connection.driver_class\">org.hsqldb.jdbcDriver</property>\n       \
    \ <property name=\"hibernate.connection.url\">jdbc:hsqldb:mem:iteration-sample</property>\n\
    \        <property name=\"hibernate.connection.username\">sa</property>\n    \
    \    <property name=\"hibernate.connection.password\"></property>\n        <property\
    \ name=\"hibernate.connection.pool_size\">10</property>\n        <property name=\"\
    show_sql\">true</property>\n        <property name=\"dialect\">org.hibernate.dialect.HSQLDialect</property>\n\
    \        <property name=\"hibernate.hbm2ddl.auto\">create</property>\n       \
    \ <mapping resource=\"gameDescriptor.hbm.xml\" />\n    </session-factory>\n</hibernate-configuration>\n\
    ```\n\nThat’s a pretty a simple Hibernate configuration file, so we will not spend\
    \ much time on it. If you need more information on Hibernate, please visit the\
    \ JBoss Community’s Hibernate page at [`http://hibernate.org`](http://hibernate.org).\
    \ Most interesting is the mapping that is defined using the `<mapping>` element.\
    \ [Listing 7-46](#Chapter07.html#list_7_46) shows that mapping.\n\n***Listing\
    \ 7-46.** Mapping the hibernate configuration file*\n\n```\n<?xml version=\"1.0\"\
    \ encoding=\"UTF-8\"?>\n<!DOCTYPE hibernate-mapping PUBLIC\n    \"-//Hibernate/Hibernate\
    \ Mapping DTD 3.0//EN\"\n    \"http://hibernate.sourceforge.net/hibernate-mapping-3.0.dtd\"\
    >\n<hibernate-mapping>\n    <class name=\"org.richfaces.book.examples.model.GameDescriptor\"\
    >\n        <id name=\"id\">\n            <generator class=\"increment\" />\n \
    \       </id>\n        <property name=\"city\" />\n        <property name=\"country\"\
    \ />\n        <property name=\"continent\" />\n        <property name=\"flagName\"\
    \ />\n        <property name=\"number\" />\n        <property name=\"season\"\
    \ />\n        <property name=\"status\" />\n        <property name=\"fromDate\"\
    \ />\n        <property name=\"toDate\" />\n    </class>\n</hibernate-mapping>\n\
    ```\n\nIt’s the `GameDescriptor` class, `id` field definition for the class objects\
    \ and fields definitions. You are already familiar with the class itself, as we\
    \ used it across the entire chapter, and we just mapped it to the database using\
    \ that descriptor. One thing we also performed in the code is defining that the\
    \ `GameDescriptor` class extends the `BaseDescriptor` class. And that `BaseDescriptor`\
    \ is a simple class, shown in [Listing 7-47](#Chapter07.html#list_7_47), which\
    \ provides a single `id` property together with accessor methods. So we are using\
    \ that `id` property in mapping.\n\n***Listing 7-47.** `BaseDescriptor`*\n\n```\n\
    public class BaseDescriptor implements Serializable{\n   private Integer id;\n\
    \   public Integer getId() { return id; }\n   public void setId(Integer id) {\
    \ this.id = id; }\n}\n```\n\nYou are probably wondering why we didn’t use annotations.\
    \ We could have added the same mappings via annotations in the `GameDescriptor`\
    \ class itself to look more modern. But, we just didn’t want to add more annotations\
    \ to the class that already defined a couple of JAXB annotations (to initialize\
    \ it from XML).\n\nThe easiest way for us to populate the database is to persist\
    \ the collection we already initialized from XML and used for all the samples\
    \ earlier. [Listing 7-48](#Chapter07.html#list_7_48) shows the application scoped\
    \ bean, which populates the database.\n\n***Listing 7-48.** Application scoped\
    \ bean*\n\n```\n@ApplicationScoped\n@ManagedBean(eager = true)\npublic class GamesHibernateBean\
    \ {\n\n   @ManagedProperty(value = \"#{gamesParser.gamesList}\")\n   private List<GameDescriptor>\
    \ games = new ArrayList<GameDescriptor>();\n   private static final String[] GAME_FIELDS\
    \ = {\"country\", \"city\", \"continent\", \"season\",\n      \"number\", \"year\"\
    };\n\n   @PostConstruct\n   public void fillDatabase(){\n      Session hibernateSession\
    \ = HibernateUtils.getSessionFactory().openSession();\n         for (BaseDescriptor\
    \ game : games) {\n            try {\n               hibernateSession.persist(game);\n\
    \            }catch (HibernateException e){\n                e.printStackTrace();\n\
    \            }\n        }\n        hibernateSession.flush();\n        hibernateSession.close();\n\
    \    }\n\n    public String[] getGameFields(){\n        return GAME_FIELDS;\n\
    \    }\n\n    public void setGames(List<GameDescriptor> games) {\n        this.games\
    \ = games;\n    }\n    public List<GameDescriptor> getGames() {\n        return\
    \ games;\n    }\n}\n```\n\nAccording to the `eager=true` definition, an application\
    \ scoped bean will be created on application start. The `gamesList` will be injected\
    \ from the `GameParser`, which was used in the beginning of this chapter. We just\
    \ iterate over the injected list and persist every object into the database.\n\
    \nIn order to obtain the Hibernate session, we used the popular `HibernateUtils`\
    \ class, which provides basic implementation of session factory programmatic lookup\
    \ from the Hibernate documentation, as shown in [Listing 7-49](#Chapter07.html#list_7_49).\n\
    \n***Listing 7-49.** `HibernateUtils`*\n\n```\npublic class HibernateUtils {\n\
    \    private static final SessionFactory sessionFactory;\n    static {\n     \
    \   try {\n            sessionFactory = new Configuration().configure().buildSessionFactory();\n\
    \        } catch (Throwable ex) {\n            System.err.println(\"Initial SessionFactory\
    \ creation failed.\" + ex);\n            throw new ExceptionInInitializerError(ex);\n\
    \        }\n    }\n\n    public static SessionFactory getSessionFactory() {\n\
    \        return sessionFactory;\n    }\n}\n```\n\n![images](images/square.jpg)\
    \ **Note** We intentionally decided to go with a very basic JSF-Hibernate configuration.\
    \ Showing different advanced options of plugging Hibernate or JPA, for example,\
    \ into the JSF application is beyond the scope of this book; we want to concentrate\
    \ on the UI components data model.\n\n##### ExtendedDataModel Implementation for\
    \ Paging\n\nThe topic of `ExtendedDataModel` implementation for paging is one\
    \ of the most popular among those who play with iteration components and JSF/RichFaces\
    \ in general. All the component library references show pretty simple examples\
    \ of pointing the table component to the list from a managed bean and implementing\
    \ additional functionality on top of that model. But later, getting such a bean\
    \ connected to the database layer appears too time consuming, for example, to\
    \ get a complete list to show only 10 to 20 rows using the `first` and `rows`\
    \ table attributes.\n\nThe same problem applied to the RichFaces `<rich:dataTable>`–`<rich:dataScroller/>`\
    \ components pair. Simple usage of the tables pointed to `List` for example and\
    \ wrapped to the `SequenceDataModel` by default, obtains the entire list and partially\
    \ encodes it using the `first`, `rows`, and `page` properties. But a common task\
    \ for a real application is to optimize database calls and fetch only the data\
    \ that corresponds to the current page to be displayed. Next, we will implement\
    \ the model properly to achieve that result.\n\n![images](images/square.jpg) **Note**\
    \ This is a very common question (or even expectation) from new developers. Developers\
    \ expect the table to be able to perform partial data fetching because it provides\
    \ a data scrolling component. A UI component in JSF, however, doesn’t know anything\
    \ about the underlying model and completely relies on the default if proper custom\
    \ implementation is not provided. The default gets a complete list, wraps it as\
    \ a model, and makes it available for the page.\n\nLet’s review more of the `ExtendedDataModel`\
    \ abstract class in [Listing 7-50](#Chapter07.html#list_7_50).\n\n***Listing 7-50.**\
    \ `ExtendedDataModel` Abstract Class*\n\n```\npublic abstract class ExtendedDataModel<E>\
    \ extends DataModel<E> {\n    public abstract void setRowKey(Object key);\n  \
    \  public abstract Object getRowKey();\n    public abstract void walk(FacesContext\
    \ context, DataVisitor visitor, Range range, Object\n       argument);\n}\n```\n\
    \nIt defines three new methods extending the standard JSF `DataModel`. Having\
    \ only the `rowIndex` isn’t really enough for complex data models and features.\
    \ Furthermore, the `walk()` method should be implemented and provide functionality\
    \ of iteration over the model using the “Visitor” pattern. Concrete iteration\
    \ components that use the models based on this will call the `walk()` method a\
    \ few times at different request phases. The following parameters will be passed\
    \ to the method: a `FacesContext` instance, a `visitor` object that will perform\
    \ current iteration data processing, and a `range` object that specifies the range\
    \ of iteration component and can accept one more argument depending on implementation.\n\
    \nWhen we know which methods we should compare to the standard `DataModel,` let’s\
    \ look at [Listing 7-51](#Chapter07.html#list_7_51), which shows our custom model\
    \ (other methods will be explained soon).\n\n***Listing 7-51.** Custom model*\n\
    \n```\npublic abstract class BasePageableHibernateModel<T extends BaseDescriptor>\
    \ extends\n   ExtendedDataModel<T> {\n   protected Class<T> entityClass;\n   protected\
    \ SequenceRange cachedRange = null;\n   protected Integer cachedRowCount = null;\n\
    \   protected List<T> cachedItems = null;\n   protected Object rowKey;\n\n   public\
    \ BasePageableHibernateModel(Class<T> entityClass) {\n      super();\n      this.entityClass\
    \ = entityClass;\n   }\n\n   @Override\n   public Object getRowKey() {\n     \
    \ return rowKey;\n   }\n\n   @Override\n   public void setRowKey(Object key) {\n\
    \      this.rowKey = key;\n   }\n\nprotected Criteria createCriteria(Session session)\
    \ {\n      return session.createCriteria(entityClass);\n   }\n\n   @Override\n\
    \   public void walk(FacesContext facesContext, DataVisitor visitor, Range range,\
    \ Object\n      argument) {\n      // Will be described in details later in the\
    \ chapter\n   }\n\n   @Override\n   public int getRowCount() {\n      if (this.cachedRowCount\
    \ == null) {\n         Session session = HibernateUtils.getSessionFactory().openSession();\n\
    \         try {\n            Criteria criteria = createCriteria(session);\n  \
    \          this.cachedRowCount = criteria.list().size();\n         } finally {\n\
    \            session.close();\n         }\n      }\n      return this.cachedRowCount;\n\
    \   }\n\n   @Override\n   public T getRowData() {\n      for (T t : cachedItems)\
    \ {\n         if (t.getId().equals(this.getRowKey())) {\n            return t;\n\
    \         }\n      }\n      return null;\n   }\n\n   @Override\n   public boolean\
    \ isRowAvailable() {\n      return (getRowData() != null);\n   }\n   // other\
    \ methods see note below\n}\n```\n\n![images](images/square.jpg) **Note** To keep\
    \ the code shorter, we skipped a few methods that are not used in this implementation.\n\
    \nThat’s a generic model. It’s marked as abstract and parameterized with t he\
    \ object class. This allows you to later use the same model code for all our various\
    \ objects across the application.\n\nLet’s review the methods overridden from\
    \ the `ExtendedDataModel`. As we said before, the id of the wrapped object from\
    \ the database is used as a `rowKey` for the object. `getRowData()` simply iterates\
    \ the cached items (collected during the `walk()` method execution) and performs\
    \ lookup for an object id equals to the current `rowKey`.\n\nThe `isRowAvailable()`\
    \ is a standard method from `DataModel` and simply returns the result from checking\
    \ the current `rowData` for value. Let’s review another `getRowCount()` simple\
    \ method before looking at the `walk()` method.\n\nWe’re using Hibernate Criteria\
    \ API for retrieving entities. We created `Criteria` without any new `Criterions`\
    \ added in order to get the size of the result set. We’re performing simple caching\
    \ of that size in session using the `cachedRowCount` bean property.\n\nNotice\
    \ that very important parts—`getRowIndex()` and `setRowIndex()`—are not required\
    \ to be implemented properly when using a simple `<rich:dataTable>` component.\
    \ We only added them as stub methods. However, if you will want to use `<rich:extendedDataTable>`,\
    \ it requires these methods to have proper implementation for selection functionality.\
    \ The reason for this is rather simple: as the table allows sequential selection\
    \ of row ranges (for example standard UI SHIFT key + mouse click selection), it\
    \ can’t use only `rowKeys` because you can’t characterize a range using anything\
    \ except indexes. If you require selection, the following two methods need to\
    \ be implemented:\n\n1.  `setRowIndex(index)`: This method calls the `setRowKey(rowKey)`\
    \ method and passes the `rowKey` of the object, which corresponds to the index\
    \ for a given range and sorting/filtering rules applied to the wrapped model.\n\
    2.  `getRowIndex():` This returns the index in the wrapped model of the object\
    \ for a currently set `rowKey`.\n\nIn [Listing 7-52](#Chapter07.html#list_7_52),\
    \ let’s review in detail the most important `walk()` method, as well as one helper\
    \ method.\n\n***Listing 7-52.** `walk()` method as well as one helper method*\n\
    \n```\nprotected static boolean areEqualRanges(SequenceRange range1, SequenceRange\
    \ range2) {\n   if (range1 == null || range2 == null) {\n      return range1 ==\
    \ null && range2 == null;\n   } else {\n      return range1.getFirstRow() == range2.getFirstRow()\
    \ && range1.getRows() == range2.getRows();\n   }\n}\n\n@Override\npublic void\
    \ walk(FacesContext facesContext, DataVisitor visitor, Range range, Object argument)\
    \ {\n   SequenceRange sequenceRange = (SequenceRange) range;\n   if (this.cachedItems\
    \ == null || !areEqualRanges(this.cachedRange, sequenceRange)) {\n      Session\
    \ session = HibernateUtils.getSessionFactory().openSession();\n      try {\n \
    \        Criteria criteria = createCriteria(session);\n         if (sequenceRange\
    \ != null) {\n            int first = sequenceRange.getFirstRow();\n         \
    \   int rows = sequenceRange.getRows();\n            criteria.setFirstResult(first);\n\
    \            if (rows > 0) {\n               criteria.setMaxResults(rows);\n \
    \           }\n         }\n         this.cachedRange = sequenceRange;\n      \
    \   this.cachedItems = criteria.list();\n      } finally {\n         session.close();\n\
    \      }\n   }\n   for (T item : this.cachedItems) {\n      visitor.process(facesContext,\
    \ item.getId(), argument);\n   }\n}\n```\n\nAs you can see, the idea is pretty\
    \ simple. First, we are checking that we haven’t already cached the data. Even\
    \ if the data is cached, we then check whether the cached data range matches the\
    \ current range passed by the table. . If no match, the component is getting rendered\
    \ first time or it was switched to a different page using the `<rich:dataScroller>`\
    \ component or by changing `first` and/or `rows` attributes. In this case we use\
    \ `Criteria` API, setting parameters from `Range` as criteria parameters (first\
    \ object index to fetch and number of objects which should be fetched). After\
    \ getting the result. we cache it in a session with the current `Range` object.\n\
    \nFinally, we are iterating over the result set that we just obtained, calling\
    \ the `process()` method of the `Visitor`.\n\n![images](images/square.jpg) **Note**\
    \ The `rowKey` passed to the visitor is added to the `clientId` of nested components\
    \ for every iteration. `getRowKey()` has to return a value that is a string-based\
    \ and is compatible with `javax.faces.component.UIComponent#getClientId(FacesContext\
    \ ctx)`. In other cases, you have to provide the `rowKeyConverter` using a corresponding\
    \ iteration component attribute.\n\nFinally, we need to check the model class\
    \ for specific `GameDescriptor` objects and the page that defines the `<rich:dataTable>`\
    \ component. [Listing 7-53](#Chapter07.html#list_7_53) shows the `PageableHibernateModel`\
    \ class.\n\n***Listing 7-53.** `PageableHibernateModel` class*\n\n```\n@ManagedBean\n\
    @SessionScoped\npublic class PageableHibernateModel extends BasePageableHibernateModel<GameDescriptor>\
    \ {\n\n   public PageableHibernateModel() {\n      super(GameDescriptor.class);\n\
    \   }\n\n}\n```\n\nHave you ever seen a simpler model class? By now you should\
    \ realize how important it is to provide a generic model for your data objects.\
    \ Once implemented, it usually makes concrete models implementations the easiest\
    \ task. We just passed the `GameDescriptor` class to initialization. An abstract\
    \ model we reviewed earlier implements everything we need.\n\n![images](images/square.jpg)\
    \ **Note** We wanted to keep the examples simple, but keep in mind that placing\
    \ data in a session scope is not always a good idea because you may run into concurrent\
    \ access problems.\n\nIn [Listing 7-54](#Chapter07.html#list_7_54), let’s look\
    \ at the page that uses that model, and render the table with a limited page size\
    \ and `<rich:dataScroller>` control.\n\n***Listing 7-54.** Render the table with\
    \ a limited page size and `<rich:dataScroller>` control*\n\n```\n<rich:dataTable\
    \ value=\"#{pageableHibernateModel}\" var=\"game\" rows=\"10\" id=\"table\">\n\
    \   <f:facet name=\"header\">Olympic Games List</f:facet>\n   <c:forEach items=\"\
    #{gamesHibernateBean.gameFields}\" var=\"column\">\n      <rich:column id=\"#{column}\"\
    >\n         <f:facet name=\"header\">\n            <h:outputText value=\"#{column}\"\
    />\n         </f:facet>\n         <h:outputText value=\"#{game[column]}\"/>\n\
    \      </rich:column>\n   </c:forEach>\n   <f:facet name=\"footer\">\n      <rich:dataScroller/>\n\
    \   </f:facet>\n</rich:dataTable>\n```\n\nThings are pretty simple here. We are\
    \ using a registered data model as a table value, and using the `rows` attribute,\
    \ limiting the number of rows per page to 10.\n\nMost notable there is `<c:forEach>`\
    \ usage, which provides a way to iterate over the `gameFields` (column names stored\
    \ in `GamesHibernateBean`) and dynamically add columns to the table.\n\n![images](images/square.jpg)\
    \ **Note** Using `<c:forEach>` instead of `<ui:repeat>` is needed in this case.\
    \ `<c:forEach>` has to be used in cases where we need to create the actual components\
    \ in a JSF tree during the view creation phase, rather than iterating over a single\
    \ instance at the render response phase (as would happen with `<ui:repeat>`).\
    \ There are many good JSF-related resources that can provide more information.\n\
    \nThe footer facet contains the `<rich:dataScroller>` component.\n\n[Figure 7-33](#Chapter07.html#fig_7_33)\
    \ shows how it will looks on initial rendering.\n\n![images](images/0733.jpg)\n\
    \n***Figure 7-33.** `<rich:dataTable>` with dynamic columns and backed by custom\
    \ model*\n\nWhen we click to some other page, the table will be switched, as shown\
    \ in [Figure 7-34](#Chapter07.html#fig_7_34).\n\n![images](images/0734.jpg)\n\n\
    ***Figure 7-34.** `<rich:dataTable>` with dynamic columns and backed by custom\
    \ model after page change*\n\nYou can easily check with debug or adding some logging\
    \ code to the model that database calls are performed only in the following ways:\n\
    \n1.  Twice on initial rendering in order to cache all the object counts and to\
    \ get the first 10 records.\n2.  Once for a page change, when the next 10 records\
    \ are loaded. In complex cases, a row count should not be cached in such a simple\
    \ way because the table size could change; but it works for simple cases with\
    \ static tables.\n\nIt turns out that the `walk()` method is called a few times\
    \ per request; as many times as the component needed to iterate over the value\
    \ according to JSF specification (decode, render). And `rowCount` also gets called\
    \ a few times by the `<rich:dataTable>` and `<rich:dataScoller>` components. So,\
    \ as previously mentioned, if a table points to a database result set directly,\
    \ rather than using the model like we created, you will see numerous database\
    \ calls on initial rendering or a single request. The performance of such implementations\
    \ will be extremely low.\n\n##### ArrangeableModel Implementation for Filtering\
    \ and Sorting\n\nThis section shows you `ArrangeableModel` implementation in order\
    \ to implement in-database sorting and filtering. `ArrangeableModel` is based\
    \ on the same `ExtendedDataModel` but also implements the `Arrangeable` interface.\
    \ We will not implement all the base functionality in our `ArrangeableModel` from\
    \ scratch. Instead, we will extend our `BasePageableModel`.\n\nBut first, in [Listing\
    \ 7-55](#Chapter07.html#list_7_55), let’s see how the page will be changed.\n\n\
    ***Listing 7-55.** Code for `ArrangeableModel` implementation*\n\n```\n<h:form>\n\
    \    <a4j:outputPanel ajaxRendered=\"true\" layout=\"block\">\n        <a4j:repeat\
    \ value=\"#{filteringBean.continents}\" var=\"cont\">\n            <h:outputLink\
    \ value=\"#\" styleClass=\"#{filteringBean.continentFilterString==cont ? 'bold':''}\"\
    >\n                #{cont}\n                <rich:componentControl target=\"table\"\
    \ operation=\"filter\" event=\"click\">\n                    <f:param value=\"\
    continent\" />\n                    <f:param value=\"#{cont}\" />\n          \
    \      </rich:componentControl>\n            </h:outputLink> |\n        </a4j:repeat>\n\
    \    </a4j:outputPanel>\n   <rich:dataTable value=\"#{arrangeableHibernateModel}\"\
    \ var=\"game\" rows=\"10\" id=\"table\">\n      <f:facet name=\"header\">Olympic\
    \ Games List</f:facet>\n      <c:forEach items=\"#{gamesHibernateBean.gameFields}\"\
    \ var=\"column\">\n        <rich:column id=\"#{column}\" sortBy=\"#{column}\"\
    \ filterExpression=\"#{column}\">\n            <f:facet name=\"header\">\n   \
    \             <h:commandLink value=\"#{column}\">\n                    <rich:componentControl\
    \ target=\"table\" operation=\"sort\">\n                        <f:param value=\"\
    #{column}\" />\n                        <f:param value=\"\" />\n             \
    \           <f:param name=\"reset\" value=\"true\" />\n                    </rich:componentControl>\n\
    \                </h:commandLink>\n            </f:facet>\n            <h:outputText\
    \ value=\"#{game[column]}\"/>\n         </rich:column>\n      </c:forEach>\n \
    \     <f:facet name=\"footer\">\n         <rich:dataScroller/>\n      </f:facet>\n\
    \   </rich:dataTable>\n</h:form>\n```\n\nThe differences include the following:\n\
    \n1.  The `sortBy` and `filterExpression` properties for the column are from the\
    \ filtering and sorting section. Instead of setting them to object properties\
    \ or simple boolean expressions, we passed column names as parameters in order\
    \ to pick the column names that were activated on the model level.\n2.  The `FilteringBean`\
    \ remained the same as in the previous example. It contains the same static continents\
    \ array.\n3.  The block of links for filtering that use a simple JavaScript API.\n\
    4.  The links in headers for sorting are also based on a simple JavaScript API.\n\
    \nIt’s now time to dig into the code for `BaseArrangeableHibernateModel` is just\
    \ a concrete implementation of the generic one), as shown in [Listing 7-56](#Chapter07.html#list_7_56).\
    \ It extends the `BasePageableHibernateModel` so that all the base model methods\
    \ remain at a super-class level and we will see only additional and changed methods.\
    \ In order to make the code cleaner, we skipped a few utility methods, but will\
    \ explain them after the initial model review.\n\n***Listing 7-56.** Code for\
    \ `BaseArrangeableHibernateModel`*\n\n```\npublic abstract class BaseArrangeableHibernateModel<T\
    \ extends BaseDescriptor> extends\n   BasePageableHibernateModel<T> implements\
    \ Arrangeable {\n  private List<FilterField> filterFields;\n  private List<SortField>\
    \ sortFields;\n\n  public BaseArrangeableHibernateModel(Class<T> entityClass)\
    \ {\n    super(entityClass);\n  }\n\n  private void appendFilters(FacesContext\
    \ context, Criteria criteria) {\n      // Described in details later. Adds filters\
    \ to the Criteria.\n  }\n\n  private void appendSorts(FacesContext context, Criteria\
    \ criteria) {\n      // Described in details later. Adds sorts to the Criteria.\n\
    \  }\n\n  private String getPropertyName(FacesContext facesContext, Expression\
    \ expression) {\n      // Described in details later. Used to get properties names\
    \ defined in sortBy and filterExpression\n  }\n\n  @Override\n  public void walk(FacesContext\
    \ facesContext, DataVisitor visitor, Range range, Object argument) {\n    SequenceRange\
    \ sequenceRange = (SequenceRange) range;\n    if (this.cachedItems == null ||\
    \ !areEqualRanges(this.cachedRange, sequenceRange)) {\n       Session session\
    \ = HibernateUtils.getSessionFactory().openSession();\n         try {\n      \
    \      Criteria criteria = createCriteria(session);\n            appendFilters(facesContext,\
    \ criteria);\n            appendSorts(facesContext, criteria);\n            if\
    \ (sequenceRange != null) {\n               int first = sequenceRange.getFirstRow();\n\
    \               int rows = sequenceRange.getRows();\n               criteria.setFirstResult(first);\n\
    \               if (rows > 0) {\n                  criteria.setMaxResults(rows);\n\
    \               }\n            }\n            this.cachedRange = sequenceRange;\n\
    \            this.cachedItems = criteria.list();\n         } finally {\n     \
    \       session.close();\n         }\n    }\n    for (T item : this.cachedItems)\
    \ {\n      visitor.process(facesContext, item.getId(), argument);\n    }\n  }\n\
    \n  @Override\n  public int getRowCount() {\n    if (this.cachedRowCount == null){\n\
    \          Session session = HibernateUtils.getSessionFactory().openSession();\n\
    \          try {\n             Criteria criteria = createCriteria(session);\n\
    \             appendFilters(FacesContext.getCurrentInstance(), criteria);\n  \
    \           cachedRowCount = criteria.list().size();\n          } finally {\n\
    \             session.close();\n          }\n        }\n     return this.cachedRowCount;\n\
    \  }\n\n  public void arrange(FacesContext facesContext, ArrangeableState state)\
    \ {\n    if (state != null) {\n      this.filterFields = state.getFilterFields();\n\
    \      this.sortFields = state.getSortFields();\n      this.cachedItems = null;\n\
    \      this.cachedRange = null;\n      this.cachedRowCount=null;\n    }\n  }\n\
    }\n```\n\nLet’s now review what we have here, starting from the `getRowCount()`\
    \ method. It creates `Criteria` and gets the list size in case the row count is\
    \ still not marked as cached. It only appends filters to the `Criteria` prior\
    \ to getting the result set size.\n\nThe new `arrange()` method accepts the `FacesContext`\
    \ and `ArrangeableState` objects as parameters. The `ArrangeableState` object\
    \ provides three methods: `getFilterFields()`, `getSortFields()`, and `getLocale()`.\
    \ The filter fields contain information about `filterValue`, `filterExpression`,\
    \ and `Filter` objects attached to the column. The sort fields contain information\
    \ about `sortValue`, `sortBy`, and defined `Comparator`s.\n\nIf you check RichFaces\
    \ sources, you will see that in default `ArrangeableModel` implementation, the\
    \ `arrange()` method, performs sorting and filtering. But that’s not usually the\
    \ case for the custom model. Because of the difference with the default, it doesn’t\
    \ operate on a full list, but partially loads it according to the current page\
    \ range in `walk()`. So we store sorting and filtering fields for further processing\
    \ in `walk()` in that method.\n\nLet’s review the `walk()` method, which looks\
    \ very similar to the `walk()` method from the pageable model; the only difference\
    \ is that it appends sorting and filtering to `Criteria` prior to fetching the\
    \ result list.\n\nWe’ll look at the trimmed methods in more detail in [Listing\
    \ 7-57](#Chapter07.html#list_7_57).\n\n***Listing 7-57.** Trimmed methods*\n\n\
    ```\nprivate String getPropertyName(FacesContext facesContext, Expression expression)\
    \ {\n   try {\n   return (String) ((ValueExpression) expression).getValue(facesContext.getELContext());\n\
    \   } catch (ELException e) {\n    throw new FacesException(e.getMessage(), e);\n\
    \   }\n}\n\nprivate void appendSorts(FacesContext context, Criteria criteria)\
    \ {\n  if (sortFields != null) {\n    for (SortField sortField : sortFields) {\n\
    \      SortOrder ordering = sortField.getSortOrder();\n      if (SortOrder.ascending.equals(ordering)\
    \ || SortOrder.descending.equals(ordering)) {\n        String propertyName = getPropertyName(context,\
    \ sortField.getSortBy());\n        Order order = SortOrder.ascending.equals(ordering)\
    \ ? Order.asc(propertyName) :\n          Order.desc(propertyName);\n        criteria.addOrder(order.ignoreCase());\n\
    \      }\n    }\n  }\n}\n\nprivate void appendFilters(FacesContext context, Criteria\
    \ criteria) {\n  if (filterFields != null) {\n    for (FilterField filterField\
    \ : filterFields) {\n      String propertyName = getPropertyName(context,filterField.getFilterExpression());\n\
    \      String filterValue = (String)filterField.getFilterValue();\n      if (filterValue\
    \ != null && filterValue.length() != 0) {\n        criteria.add(Restrictions.like(propertyName,\
    \ filterValue,\n           MatchMode.ANYWHERE).ignoreCase());\n      }\n    }\n\
    \  }\n}\n```\n\nThis method seems fairly self-explanatory. Every `append*()` method\
    \ iterates over the sort or filter fields, obtains the current values for filtering\
    \ or sorting, and applies it to the criteria by using its API. The `getPropertyName()`\
    \ method obtains the column names that were passed using `sortBy` and `filterExpression`\
    \ by getting value from the given `ValueExpression`.\n\nIt’s time to see the result,\
    \ first looking at the simple concrete object model class shown in [Listing 7-58](#Chapter07.html#list_7_58).\n\
    \n***Listing 7-58.** Simple concrete object model class*\n\n```\n@ManagedBean\n\
    @SessionScoped\npublic class ArrangeableHibernateModel extends BaseArrangeableHibernateModel<GameDescriptor>\
    \ {\n   public ArrangeableHibernateModel() {\n      super(GameDescriptor.class);\n\
    \   }\n}\n```\n\n[Figure 7-35](#Chapter07.html#fig_7_35) shows the table after\
    \ initial rendering.\n\n![images](images/0735.jpg)\n\n***Figure 7-35.** Table\
    \ backed by `ArrangeableModel` custom implementation*\n\n[Figure 7-36](#Chapter07.html#fig_7_36)\
    \ shows the table after sorting (by city) and filtering (by continent).\n\n![images](images/0736.jpg)\n\
    \n***Figure 7-36.** Filtered and sorted table*\n\nThat’s all the coverage related\
    \ to models and the advanced features they provide. We believe you now have all\
    \ the information to implement complex data models with RichFaces data iteration\
    \ components.\n\n### Summary\n\nThis chapter introduced various data iteration\
    \ components, from the most basic `<a4j:repeat>`, which doesn’t produce any markup,\
    \ to complex components such as `<rich:extendedDataTable>`. One unique feature\
    \ that all data iteration components have is partial-table update, where you can\
    \ specify which specific row(s) to update. The look and feel of all components\
    \ can be greatly customized via skins, which are covered in [Chapter 13](#Chapter13.html#ch13).\
    \ At the end we covered the usage of custom models implementations for complex,\
    \ in-database paging/sorting/filtering operations in data table components.\n\n\
    ## C H A P T E R 8\n\n## Rich Menu Components\n\nIn this chapter, you’ll explore\
    \ the various menu components available in RichFaces. First we’ll first cover\
    \ toolbar and drop-down menu components, and then we’ll show you a panel menu\
    \ component. The context menu unfortunately was not included into the RichFaces\
    \ 4.0 final release, but will definitely be added in one of the first 4.x updates.\n\
    \n![images](images/square.jpg) **Note** Component images in this chapter use a\
    \ slightly customized `blueSky` skin with a larger general font size. If you want\
    \ to use it, create a new skin and overwrite the font size as follows:\n\n```\n\
    baseSkin=blueSky\ngeneralSizeFont=12px\n```\n\nIf you are not sure how to use\
    \ this custom skin, [Chapter 13](#Chapter13.html#ch13) covers skins in detail.\n\
    \n### Using `<rich:toolbar>`\n\n`<rich:toolbar>` creates a horizontal bar that\
    \ can hold any other JSF component, including any action components.\n\nYou can\
    \ easily use `<rich:toolbar>` in conjunction with `<rich:panel>`, where the panel\
    \ holds some information associated with a link in the toolbar. [Figure 8-1](#Chapter08.html#fig_8_1)\
    \ shows how it looks.\n\n![images](images/0801.jpg)\n\n***Figure 8-1.** Simple\
    \ toolbar*\n\nThe code is shown in [Listing 8-1](#Chapter08.html#list_8_1).\n\n\
    ***Listing 8-1.** Simple toolbar code*\n\n```\n<h:form>\n   <rich:toolbar>\n \
    \     <a4j:commandLink id=\"nyc\" value=\"New York City\" actionListener=\"#{toolbarBean.cityListener}\"\
    \ />\n      <a4j:commandLink id=\"sf\" value=\"San Francisco\" actionListener=\"\
    #{toolbarBean.cityListener}\" />\n      <a4j:commandLink id=\"la\" value=\"Los\
    \ Angeles\" actionListener=\"#{toolbarBean.cityListener}\" />\n   </rich:toolbar>\n\
    </h:form>\n<rich:panel>\n   <a4j:outputPanel ajaxRendered=\"true\">\n      <h:panelGrid\
    \ rendered=\"#{toolbarBean.nyc}\">\n         New York City is the most populous\
    \ city in the United States, with its metropolitan\n            area ranking among\
    \ the largest urban areas in the world. For more than a century,\n           \
    \ it has been one of the world's major centers of commerce and finance. New York\n\
    \            City is rated as an alpha world city for its global influences in\
    \ media, politics,\n            education,  entertainment, arts and fashion. The\
    \ city is also a major center for\n            foreign affairs, hosting the headquarters\
    \ of the United Nations.\n      </h:panelGrid>\n      <h:panelGrid rendered=\"\
    #{toolbarBean.sf}\">\n         San Francisco is the fourth most populous city\
    \ in California and the 14th most\n            populous city in the United States.\
    \ San Francisco is a popular international\n            tourist destination renowned\
    \ for its steep rolling hills, an eclectic mix of\n            Victorian and modern\
    \ architecture, and famous landmarks, including the Golden\n            Gate Bridge,\
    \ Alcatraz Island, the cable cars, Coit Tower, and Chinatown.\n      </h:panelGrid>\n\
    \      <h:panelGrid rendered=\"#{toolbarBean.la}\">\n         Los Angeles is the\
    \ largest city in the state of California and the second-largest\n           \
    \ in the United States. Los Angeles is one of the world's centers of culture,\n\
    \            technology, media, business, and international trade.\n      </h:panelGrid>\n\
    \   </a4j:outputPanel>\n</rich:panel>\n```\n\nTwo attributes, `width` and `height`,\
    \ are available on components in order to allow simple definitions for those basic\
    \ properties without using CSS. We will use `height` across all the examples and\
    \ `width` will be set to 100% by default. Besides the attributes usage, you could\
    \ define the same sizes using Skins CSS (`rf-tb` class) in order not to repeat\
    \ the definition for all the toolbars. Skins will be described in later chapter,\
    \ but for now just keep in mind that you may use CSS instead of the sizes attributes\
    \ used there.\n\nIn this example, the toolbar contains three command links, but\
    \ keep in mind that any JSF component can be placed inside the toolbar. The links\
    \ simply change the rendered panel content, and after `<a4j:outputPanel>` get\
    \ automatically updated (because of `ajaxRendered=true`) and corresponding description\
    \ is rendered. In order for the example to be complete, see the bean code in [Listing\
    \ 8-2](#Chapter08.html#list_8_2).\n\n***Listing 8-2.** The bean code*\n\n```\n\
    @ManagedBean\n@ViewScoped\npublic class ToolbarBean implements Serializable {\n\
    \   private boolean nyc = true;\n   private boolean sf = false;\n   private boolean\
    \ la = false;\n\n   public void cityListener(ActionEvent event){\n      if (event.getComponent().getId().equals(\"\
    nyc\")) nyc = true; else nyc = false;\n      if (event.getComponent().getId().equals(\"\
    sf\")) sf = true; else sf = false;\n      if (event.getComponent().getId().equals(\"\
    la\")) la = true; else la = false;\n   }\n   // Getters and setters\n}\n```\n\n\
    It’s also possible to specify a separator between items (components) on the toolbar.\
    \ Four built-in separators are available: `none`, `line`, `square`, and `disc`.\
    \ We set the toolbar to use the `line` separator using the following:\n\n```\n\
    <rich:toolbar height=\"24px\" itemSeparator=\"line\">\n```\n\nThe result shown\
    \ in [Figure 8-2](#Chapter08.html#fig_8_2).\n\n![images](images/0802.jpg)\n\n\
    ***Figure 8-2.** Toolbar with items separator*\n\nYou could also use a custom\
    \ separator image. Let’s say we slightly modify the declaration again to the following:\n\
    \n```\n<rich:toolbar itemSeparator=\"/img/ico.gif\">\n```\n\nWe see our corresponding\
    \ custom icon applied instead of the line ones from the [Figure 8-2](#Chapter08.html#fig_8_2).\n\
    \nIt’s also possible to place a custom separator by creating a facet named `itemSeparator`.\
    \ An example shown in [Listing 8-3](#Chapter08.html#list_8_3).\n\n***Listing 8-3.**\
    \ Placing a custom separator*\n\n```\n<rich:toolbar height=\"24px\">\n   <f:facet\
    \ name=\"itemSeparator\">\n      <h:outputText value=\"|\"/>\n   </f:facet>\n\
    \   ...\n<rich:toolbar>\n```\n\nThe result is shown in [Figure 8-3](#Chapter08.html#fig_8_3).\n\
    \n![images](images/0803.jpg)\n\n***Figure 8-3.** Toolbar with custom items separator*\n\
    \nYou can place any components inside a facet. Just remember that a facet can\
    \ hold only one child. If you need to place more than one component inside, use\
    \ `<h:panelGroup>` to wrap them (JSF limitation).\n\nIt is also possible to group\
    \ items on the toolbar when needed. Suppose you want to group together cities\
    \ on the West Coast, as it’s done in [Listing 8-4](#Chapter08.html#list_8_4).\n\
    \n***Listing 8-4.** Grouping together cities on the West Coast*\n\n```\n<h:form>\n\
    \   <rich:toolbar itemSeparator=\"disc\" height=\"24px\">\n      <a4j:commandLink\
    \ id=\"nyc\" value=\"New York City\" actionListener=\"#{toolBarBean.cityListener}\"\
    \ />\n      <rich:toolbarGroup itemSeparator=\"square\" location=\"right\">\n\
    \         <a4j:commandLink id=\"sf\" value=\"San Francisco\" actionListener=\"\
    #{toolBarBean.cityListener}\" />\n         <a4j:commandLink id=\"la\" value=\"\
    Los Angeles\" actionListener=\"#{toolBarBean.cityListener}\" />\n      </rich:toolbarGroup>\n\
    \   </rich:toolbar>\n<h:form>\n<!-- content panels -->\n```\n\nWhen grouping,\
    \ you can specify a different `itemSeparator` for the group, as well as the `location`\
    \ of the group. In the previous example, the group is placed to the right, which\
    \ produces the result shown in [Figure 8-4](#Chapter08.html#fig_8_4).\n\n![images](images/0804.jpg)\n\
    \n***Figure 8-4.** Toolbar with the group aligned to the right*\n\nYou could define\
    \ any number of left and right aligned groups within the toolbar and they will\
    \ be aligned according to the order of definition on the page.\n\nYou can as easily\
    \ place any JSF component inside the toolbar. For example, [Listing 8-5](#Chapter08.html#list_8_5)\
    \ shows how to use images inside.\n\n***Listing 8-5.** Placing any JSF component\
    \ inside the toolbar*\n\n```\n<rich:panel>\n   <rich:toolbar itemSeparator=\"\
    line\" height=\"24px\">\n      <h:graphicImage value=\"/images/states/flag_california.gif\"\
    \ width=\"24\" height=\"21\"/>\n       <h:graphicImage value=\"/images/states/flag_newyork.gif\"\
    \ width=\"24\" height=\"21\"/>\n       <h:graphicImage value=\"/images/states/flag_florida.gif\"\
    \ width=\"24\" height=\"21\"/>\n       <h:graphicImage value=\"/images/states/flag_massachusetts.gif\"\
    \ width=\"24\" height=\"21\"/>\n   </rich:toolbar>\n</rich:panel>\n```\n\nThis\
    \ result produced is shown in [Figure 8-5](#Chapter08.html#fig_8_5).\n\n![images](images/0805.jpg)\n\
    \n***Figure 8-5.** Toolbar with images*\n\nOf course in order for the toolbar\
    \ to become useful, we need to wrap the images with links or add some click-handling\
    \ behaviors.\n\nLet’s create a more interesting usage sample. You already know\
    \ about the `<rich:popupPanel>` component from [Chapter 6](#Chapter06.html#ch6).\
    \ Let’s attach it to `<rich:toolbar>` and have it activated on a corresponding\
    \ link click. Let’s take a look at it in [Listing 8-6](#Chapter08.html#list_8_6).\n\
    \n***Listing 8-6.** Attaching `<rich:popupPanel>` to `<rich:toolbar>`*\n\n```\n\
    <rich:toolbar height=\"24px\">\n   <h:outputLink value=\"#\" id=\"ll\">\n    \
    \  <rich:componentControl event=\"click\" operation=\"show\" target=\"loginPane\"\
    >\n         <a4j:param name=\"event\" value=\"event\" noEscape=\"true\" />\n \
    \        <rich:hashParam>\n            <a4j:param noEscape=\"true\" name=\"top\"\
    \n               value=\"jQuery(#{rich:element('ll')}.parentNode).offset().top\
    \ +\n               jQuery(#{rich:element('ll')}.parentNode).height()\" />\n \
    \           <a4j:param noEscape=\"true\" name=\"left\"\n               value=\"\
    jQuery(#{rich:element('ll')}.parentNode).offset().left\" />\n         </rich:hashParam>\n\
    \      </rich:componentControl>\n      Account\n   </h:outputLink>\n</rich:toolbar>\n\
    <rich:messages/>\n<rich:popupPanel id=\"loginPane\"  modal=\"false\" autosized=\"\
    true\">\n   <h:form>\n      <h:panelGrid columns=\"2\">\n         Name:\n    \
    \     <h:inputText value=\"#{userBean.userName}\" />\n         Password:\n   \
    \      <h:inputSecret value=\"#{userBean.password}\" />\n      </h:panelGrid>\n\
    \      <h:commandButton value=\"Login\"\n             onclick=\"#{rich:component('loginPane')}.hide();\"\
    \ action=\"#{userBean.login}\"/>\n   </h:form>\n</rich:popupPanel>\n```\n\nThis\
    \ allows you to attach a popup component (`<rich:popupPanel>`) to the `<rich:toolbar>`\
    \ control, as shown in [Figure 8-6](#Chapter08.html#fig_8_6).\n\n![images](images/0806.jpg)\n\
    \n***Figure 8-6.** Toolbar with attached popup panel*\n\nWe used the `<rich:popupPanel>`\
    \ Java Script API and passed position coordinates dynamically from JavaScript.\n\
    \n![images](images/square.jpg) **Note** `<rich:hashParam>` is described in detail\
    \ in [Chapter 12](#Chapter12.html#ch12). All you need to understand in this example\
    \ is that it groups the nested parameters to JavaScript hash (similar to Java\
    \ hash map). It's used because the `<rich:popupPanel>` `show()` API method accepts\
    \ two parameters, event and hash map, with named options (we passed left and top\
    \ position there).\n\nThe `UserBean` code is shown in [Listing 8-7](#Chapter08.html#list_8_7).\n\
    \n***Listing 8-7.** `UserBean` code*\n\n```\n@ManagedBean\n@SessionScoped\npublic\
    \ class UserBean {\n\n   private String userName;\n   private String password;\n\
    \n   public void login() {\n      FacesContext.getCurrentInstance().addMessage(null,\n\
    \         new FacesMessage(FacesMessage.SEVERITY_INFO, userName + \" logged!\"\
    , userName +\n            \" logged!\"));\n   }\n  //Getters and setters\n}\n\
    ```\n\nWhen the button is clicked, a `login()` action will be executed and a message\
    \ about a successful login will appear below the toolbar.\n\nThat’s it for the\
    \ `<rich:toolbar>` component. We will continue using it when we cover the `<rich:dropDownMenu>`\
    \ component in the next section.\n\n### Using `<rich:dropDownMenu>`\n\n`<rich:dropDownMenu>`\
    \ produces a drop-down menu, as shown in [Figure 8-7](#Chapter08.html#fig_8_7).\n\
    \n![images](images/0807.jpg)\n\n***Figure 8-7.** Simple drop-down menu*\n\nEvery\
    \ menu item can be associated with a particular action or action listener to be\
    \ invoked via a standard `POST` request with a full page update or via Ajax. All\
    \ the standard Ajax concepts apply here as well, such as `render`, `execute`,\
    \ and other Ajax options.\n\nThe code to create this menu is shown in [Listing\
    \ 8-8](#Chapter08.html#list_8_8).\n\n***Listing 8-8.** The code to create the\
    \ simple drop-down menu*\n\n```\n<h:form>\n   <rich:toolbar>\n      <rich:dropDownMenu\
    \ mode=\"ajax\" label =\"File\">\n         <rich:menuItem label=\"New\" />\n \
    \        <rich:menuItem label=\"Open File...\" />\n         <rich:menuItem label=\"\
    Close\" />\n         <rich:menuItem label=\"Close All\" />\n      </rich:dropDownMenu>\n\
    \      <rich:dropDownMenu mode=\"ajax\" >\n         <f:facet name=\"label\">\n\
    \            <h:outputText value=\"Edit\" />\n         </f:facet>\n         <rich:menuItem\
    \ label=\"Undo\" />\n      </rich:dropDownMenu>\n      <rich:dropDownMenu mode=\"\
    ajax\" >\n         <f:facet name=\"label\">\n            <h:outputText value=\"\
    Help\" />\n         </f:facet>\n         <rich:menuItem label=\"About\" />\n \
    \     </rich:dropDownMenu>\n   </rich:toolbar>\n</h:form>\n```\n\n`<rich:toolbar>`\
    \ is the container component, which we have covered before. Inside, you place\
    \ one or more `<rich:dropDownMenu>` components. You use the `label` facet or attribute\
    \ to define the top menu label. From there, you use `<rich:menuItem>` to create\
    \ each menu item. That’s pretty simple.\n\n![images](images/square.jpg) **Note**\
    \ You are not required to use `<rich:toolbar>` as a drop-down menu parent. You\
    \ may choose any other wrapper component or even create your own instead.\n\n\
    Notice that the `mode` attribute is set to `ajax`. It has three possible values:\
    \ `ajax`, `server`, and `client`. `client` means no request will be sent to the\
    \ server. In such case you should handle click events on your own using some custom\
    \ JavaScript handler methods, behaviors or by attaching `<a4j:ajax>`, for example.\
    \ You can also set the `mode` attribute on a particular `<rich:menuItem>`, which\
    \ will override the `mode` on the parent `<rich:dropDownMenu>` component.\n\n\
    You want to make each menu actually do something. We’ll show you how to add an\
    \ action listener for each menu. Just to demonstrate that a listener is actually\
    \ called, you can display the menu name selected each time.\n\nThe changes are\
    \ rather minor. You’ll add an action listener to each menu item. This means you\
    \ will need to create a managed bean first, so let’s start with the code in [Listing\
    \ 8-9](#Chapter08.html#list_8_9).\n\n***Listing 8-9.** Creating a managed bean*\n\
    \n```\n@ManagedBean\n@RequestScoped\npublic class DropDownBean {\n\n   private\
    \ String menuSelected;\n\n   public String getMenuSelected() {\n      return menuSelected;\n\
    \   }\n   public void listenerNew(ActionEvent event) {\n      menuSelected = \"\
    New\";\n   }\n   public void listenerOpenFile(ActionEvent event) {\n      menuSelected\
    \ = \"Open File...\";\n   }\n   public void listenerClose(ActionEvent event) {\n\
    \      menuSelected = \"Close\";\n   }\n   public void listenerCloseAll(ActionEvent\
    \ event) {\n      menuSelected = \"Close All\";\n   }\n   public void listenerUndo(ActionEvent\
    \ event) {\n      menuSelected = \"Undo\";\n   }\n}\n```\n\nWith the code in [Listing\
    \ 8-9](#Chapter08.html#list_8_9), you have defined a listener for each menu item\
    \ and also created a property to display the selected menu item that you’ll display\
    \ on a page. Let’s see what changes are needed on the JSF page. The changes are\
    \ shown in [Listing 8-10](#Chapter08.html#list_8_10).\n\n***Listing 8-10.** JSF\
    \ page*\n\n```\n<h:form>\n   <h:panelGrid columns=\"2\">\n      <rich:toolbar\
    \ width=\"150px\">\n         <rich:dropDownMenu mode=\"ajax\" label=\"File\">\n\
    \            <rich:menuItem label=\"New\" actionListener=\"#{dropDownBean.listenerNew}\"\
    \n               render=\"menu\" />\n            <rich:menuItem label=\"Open File...\"\
    \ actionListener=\"#{dropDownBean.listenerOpenFile}\"\n               render=\"\
    menu\" />\n            <rich:menuItem label=\"Close\" actionListener=\"#{dropDownBean.listenerClose}\"\
    \n               render=\"menu\" />\n            <rich:menuItem label=\"Close\
    \ All\" actionListener=\"#{dropDownBean.listenerCloseAll}\"\n               render=\"\
    menu\" />\n         </rich:dropDownMenu>\n         <rich:dropDownMenu label=\"\
    Edit\" mode=\"ajax\">\n            <rich:menuItem label=\"Undo\" actionListener=\"\
    #{dropDownBean.listenerUndo}\"\n               render=\"menu\" />\n         </rich:dropDownMenu>\n\
    \         <rich:dropDownMenu label=\"Help\">\n            <rich:menuItem mode=\"\
    ajax\" label=\"About\" />\n         </rich:dropDownMenu>\n      </rich:toolbar>\n\
    \      <h:panelGroup id=\"menu\">\n         <h:outputText value=\"#{dropDownBean.menuSelected}\"\
    \ />\n      </h:panelGroup>\n   </h:panelGrid>\n</h:form>\n```\n\nEvery menu item\
    \ has an action listener associated with it, and the `menuSelected` property is\
    \ updated on selection to show what was selected. That’s it!\n\n[Figure 8-8](#Chapter08.html#fig_8_8)\
    \ shows what the page would look like after Edit ![images](images/U002.jpg) Undo\
    \ were selected. Now select File ![images](images/U002.jpg) Open File, also as\
    \ shown in [Figure 8-8](#Chapter08.html#fig_8_8).\n\n![images](images/0808.jpg)\n\
    \n***Figure 8-8.** Label updated after Undo item selected*\n\n“Open File. . .”\
    \ is now displayed on the right side of the menu, as shown in [Figure 8-9](#Chapter08.html#fig_8_9).\n\
    \n![images](images/0809.jpg)\n\n***Figure 8-9.** Label updated after Open File\
    \ item selected*\n\n![images](images/square.jpg) **Note** In [Listing 8-10](#Chapter08.html#list_8_10),\
    \ we used a different action listener for each menu item. We could also have used\
    \ just one action listener for each menu, such as `actionListener=\"#{dropDownBean.select}\"\
    `. In this case we would need to use `ActionEvent` passed to the listener to determine\
    \ which component activated. It's also possible to use `action` to invoke a method\
    \ on the server. `action` can also be used for navigation.\n\nYou have left the\
    \ `About` menu item in the `Help` menu without any action. Let’s use what we have\
    \ already covered and use client mode to open a modal popup when Help ![images](images/U002.jpg)\
    \ About is selected.\n\nFirst, you need to create the popup panel, as done in\
    \ [Listing 8-11](#Chapter08.html#list_8_11).\n\n***Listing 8-11.** Creating a\
    \ popup panel*\n\n```\n<rich:popupPanel id=\"about\">\n   <f:facet name=\"header\"\
    >\n      <h:panelGroup>\n         <h:graphicImage value=\"/images/icons/yellow_lamp.gif\"\
    \ />\n         <h:outputText value=\"About\" />\n      </h:panelGroup>\n   </f:facet>\n\
    \   <h:panelGrid>\n      <h:outputText value=\"About text goes here\" />\n   \
    \   <a href=\"#\" onclick=\"#{rich:component('about')}.hide();return false\">OK\
    \ </a>\n   </h:panelGrid>\n</rich:popupPanel>\n```\n\nNext, you need to open the\
    \ menu when Help ![images](images/U002.jpg) About is selected. That’s pretty simple\
    \ to do. Just change the `About` menu item declaration to the next, as follows:\n\
    \n```\n<rich:menuItem mode=\"client\" label=\"About\" onclick=\"#{rich:component('about')}.show();\"\
    \ />\n```\n\n`#{rich:component('about')}.show()` is used to show the popup. Running\
    \ the application will produce what you see in [Figure 8-10](#Chapter08.html#fig_8_10)\
    \ when Help ![images](images/U002.jpg) About is selected.\n\n![images](images/0810.jpg)\n\
    \n***Figure 8-10.** Popup opened on menu-item click*\n\nNow let’s add some icons\
    \ to our menu items. `<rich:menuItem>` provides `icon` and `iconDisabled` attribute\
    \ for that purpose. A simple usage is shown in [Listing 8-12](#Chapter08.html#list_8_12).\n\
    \n***Listing 8-12.** Adding icons to the menu items*\n\n```\n<rich:toolbar width=\"\
    150px\">\n   <rich:dropDownMenu mode=\"ajax\" label=\"File\">\n      <rich:menuItem\
    \ label=\"New\" icon=\"/images/icons/new.gif\" />\n      <rich:menuItem label=\"\
    Open File...\" icon=\"/images/icons/open.gif\" />\n      <rich:menuItem label=\"\
    Save\" icon=\"/images/icons/save.gif\" />\n      <rich:menuItem label=\"Save All\"\
    \ icon=\"/images/icons/save_all.gif\" />\n   </rich:dropDownMenu>\n</rich:toolbar>\n\
    ```\n\nThe result is shown in [Figure 8-11](#Chapter08.html#fig_8_11).\n\n![images](images/0811.jpg)\n\
    \n***Figure 8-11.** Menu items with icons*\n\n#### Using `<rich:menuGroup>` and\
    \ `<rich:menuSeparator>`\n\nThere are two more components available for rich menu\
    \ creation: `<rich:menuGroup>` and `<rich:menuSeparator>`.\n\n`<rich:menuGroup>`\
    \ allows you to define a sub-menu and `<rich:separator>` allows you to add a horizontal\
    \ line separator between two items. Note that menu groups could be nested as needed.\
    \ Using these components, you will be able to create menus of any depth and complexity.\
    \ Let’s look at the example in [Figure 8-12](#Chapter08.html#fig_8_12).\n\n![images](images/0812.jpg)\n\
    \n***Figure 8-12.** Complex menu with nested sub-menus and items separators*\n\
    \nThe code for this menu creation is shown in [Listing 8-13](#Chapter08.html#list_8_13).\n\
    \n***Listing 8-13.** Code for creating complex menu*\n\n```\n<rich:toolbar>\n\
    \   <rich:dropDownMenu mode=\"ajax\" label=\"File\">\n      <rich:menuItem label=\"\
    New\" icon=\"/images/icons/new.gif\" />\n      <rich:menuItem label=\"Open File...\"\
    \ icon=\"/images/icons/open.gif\" />\n      <rich:menuGroup label=\"Save\">\n\
    \         <rich:menuItem label=\"Save\" icon=\"/images/icons/save.gif\" />\n \
    \        <rich:menuItem label=\"Save As..\" icon=\"/images/icons/save_as.gif\"\
    \ />\n         <rich:menuItem label=\"Save All\" icon=\"/images/icons/save_all.gif\"\
    \ />\n      </rich:menuGroup>\n      <rich:menuSeparator />\n      <rich:menuItem\
    \ label=\"Print\" icon=\"/images/icons/print.gif\"/>\n      <rich:menuItem label=\"\
    Print Preview\" icon=\"/images/icons/print_preview.gif\"/>\n   </rich:dropDownMenu>\n\
    </rich:toolbar>\n```\n\n#### Using `<rich:menuItem>` as a Standalone Component\n\
    \n`<rich:menuItem>` is not only used to construct the menu items for `<rich:dropDownMenu>`,\
    \ but can also be used as a standalone component. You are probably wondering when\
    \ and why you would use it.\n\nLet’s say you are using a toolbar, but in addition\
    \ to menus you also want to place other items, such as `About` link—which is just\
    \ a top level link, without menu popups. In such case you can place a link inside\
    \ the toolbar as we showed in the `<rich:toolbar>` section. But, at the same time,\
    \ you want it to look consistent with other items in the menu. So, you would have\
    \ to add styling and hover CSS selectors. You would also need to add an icon and\
    \ align it with the link. That’s probably a better job for a composite component.\
    \ Going back to `<rich:menuItem>`, being able to use this component as a standalone,\
    \ we can achieve the same functionality without doing any extra work. An example\
    \ is shown in [Figure 8-13](#Chapter08.html#fig_8_13).\n\n![images](images/0813.jpg)\n\
    \n***Figure 8-13.** Menu items in toolbar*\n\nThe very simple code that creates\
    \ such a toolbar is shown in [Listing 8-14](#Chapter08.html#list_8_14).\n\n***Listing\
    \ 8-14.** Simple code to create toolbar*\n\n```\n<rich:toolbar width=\"100px;\"\
    >\n   <rich:menuItem label=\"New\" icon=\"/images/icons/new.gif\" />\n   <rich:menuItem\
    \ label=\"Open File...\" icon=\"/images/icons/open.gif\" />\n</rich:toolbar>\n\
    ```\n\n#### Using Menu Components JavaScript API\n\n`<rich:dropDownMenu>` provides\
    \ JavaScript API, as shown in [Table 8-1](#Chapter08.html#tab_8_1).\n\n![images](images/t0801.jpg)\n\
    \n`<rich:menuItem>` provides a single `activate()` method that can be useful to\
    \ call directly if used as a standalone component.\n\n### Using `<rich:panelMenu>`\n\
    \n`<rich:panelMenu>` builds a vertical, collapsible menu with any depth level.\
    \ Let’s look at [Figure 8-14](#Chapter08.html#fig_8_14).\n\n![images](images/0814.jpg)\n\
    \n***Figure 8-14.** Simple panel menu*\n\nTo start building this menu, you first\
    \ start with `<rich:panelMenu>`, which acts as the main container for all menu\
    \ items or nodes. Inside the container, you can place any number of menu items\
    \ (`<rich:panelMenuItem>`) or groups (`<rich:panelMenuGroup>`). Each group in\
    \ turn can have many menu items or additional groups, and so on. There is no limit\
    \ to the depth of the menu that you can create.\n\n[Listing 8-15](#Chapter08.html#list_8_15)\
    \ shows the code for creation of the menu shown in [Figure 8-14](#Chapter08.html#fig_8_14).\n\
    \n***Listing 8-15.** Shows code for simple panel menu*\n\n```\n<h:form>\n   <rich:panel\
    \ style=\"width:450px\" header=\"Using rich:panelMenu\">\n      <rich:panelMenu\
    \ mode=\"ajax\" topItemLeftIcon=\"disc\" itemLeftIcon=\"grid\"\n         topGroupExpandedLeftIcon=\"\
    chevronDown\" groupExpandedLeftIcon=\"triangleDown\"\n         expandSingle=\"\
    false\">\n         <rich:panelMenuGroup label=\"Group 1\">\n            <rich:panelMenuItem\
    \ label=\"Item 1.1\" />\n            <rich:panelMenuItem label=\"Item 1.2\" />\n\
    \            <rich:panelMenuGroup label=\"Group 1.3\">\n               <rich:panelMenuItem\
    \ label=\"Item 1.3.1\" />\n               <rich:panelMenuGroup label=\"Group 1.3.2\"\
    >\n                  <rich:panelMenuItem label=\"Item 1.3.2.1\" />\n         \
    \      </rich:panelMenuGroup>\n            </rich:panelMenuGroup>\n         </rich:panelMenuGroup>\n\
    \         <rich:panelMenuGroup label=\"Group 2\">\n            <rich:panelMenuItem\
    \ label=\"Item 2.1\" />\n         </rich:panelMenuGroup>\n         <rich:panelMenuItem\
    \ label=\"Item 3\" />\n      </rich:panelMenu>\n   </rich:panel>\n</h:form>\n\
    ```\n\nYou can use a facet with the `label` name instead of the corresponding\
    \ attribute in `<rich:panelMenuGroup>`. The content of `<rich:panelMenuItem>`\
    \ could be customized using any other nested components. The code in [Listing\
    \ 8-16](#Chapter08.html#list_8_16) will render the same menu shown in [Figure\
    \ 8-14](#Chapter08.html#fig_8_14).\n\n***Listing 8-16.** Code to render the menu\
    \ shown in [Figure 8-14](#Chapter08.html#fig_8_14)*\n\n```\n<h:form>\n   <rich:panelMenu\
    \ mode=\"ajax\" topItemLeftIcon=\"disc\" itemLeftIcon=\"grid\"\n      topGroupExpandedLeftIcon=\"\
    chevronDown\" groupExpandedLeftIcon=\"triangleDown\"\n      expandSingle=\"false\"\
    >\n      <rich:panelMenuGroup>\n         <f:facet name=\"label\">\n          \
    \  <h:outputText value=\"Group 1\" />\n         </f:facet>\n         <rich:panelMenuItem>\n\
    \            <h:outputText value=\"Item 1.1\" />\n         </rich:panelMenuItem>\n\
    \         <rich:panelMenuItem>\n            <h:outputText value=\"Item 1.2\" />\n\
    \         </rich:panelMenuItem>\n         ...\n      </rich:panelMenuGroup>\n\
    \      ...\n   </rich:panelMenu>\n</h:form>\n```\n\nNote the `expandSingle` attribute\
    \ used at `<rich:panelMenu>`. If it’s set to `true`, only one group at the same\
    \ level could be expanded and the next expansion will collapse the previous one.\
    \ We set it to `false` there so you could see both top groups opened.\n\nThe next\
    \ interesting attribute is `bubbleSelection`. If it’s set to `true`, all the parent\
    \ groups will be visually highlighted if some child item is selected. In other\
    \ cases only the currently selected menu item will be selected.\n\nAny group or\
    \ item can be disabled using the `disabled=\"true\"` declaration.\n\nOne last\
    \ feature related to the look and feel of the component is using the icon attributes.\
    \ Looking at [Figure 8-14](#Chapter08.html#fig_8_14), you can see that the groups\
    \ and items at the higher level are displayed with a special look and feel that\
    \ is different from the look and feel of their children groups and items (a separate\
    \ style and icon attributes were used for top level and nested items and groups).\
    \ Also, groups and items can have both right- and left-side icons and can also\
    \ have different ones for all the states—collapsed, expanded and disabled. Because\
    \ the number of attributes to customize this is rather large, see the RichFaces\
    \ Reference Guide at [`www.jboss.org/richfaces/docs`](http://www.jboss.org/richfaces/docs),\
    \ or just use your IDE content assist to find all the available attributes. Icon\
    \ attributes can be defined with the standard icons mentioned in [Chapter 6](#Chapter06.html#ch6)\
    \ (we already used them in the earlier example) and, of course, defined with URI\
    \ to custom icons. An example using icons is shown in [Figure 8-15](#Chapter08.html#fig_8_15).\n\
    \n![images](images/0815.jpg)\n\n***Figure 8-15.** Panel menu with both standard\
    \ and custom icons used*\n\nThe code to create the menu in [Figure 8-15](#Chapter08.html#fig_8_15)\
    \ is shown in [Listing 8-17](#Chapter08.html#list_8_17). We used standard RichFaces\
    \ icons for top groups and custom ones for items.\n\n***Listing 8-17.** Code to\
    \ create the menu in [Figure 8-15](#Chapter08.html#fig_8_15)*\n\n```\n<h:form>\n\
    \   <rich:panelMenu topGroupCollapsedLeftIcon=\"chevronUp\" width=\"200px\"\n\
    \      topGroupExpandedLeftIcon=\"chevronDown\">\n      <rich:panelMenuGroup label=\"\
    File\">\n         <rich:panelMenuItem label=\"New\" leftIcon=\"/images/icons/new.gif\"\
    />\n         <rich:panelMenuItem label=\"Open File...\" leftIcon=\"/images/icons/new.gif\"\
    />\n         <rich:panelMenuItem label=\"Save\" leftIcon=\"/images/icons/save.gif\"\
    />\n         <rich:panelMenuItem label=\"Save All\" leftIcon=\"/images/icons/save_all.gif\"\
    \ />\n      </rich:panelMenuGroup>\n      <rich:panelMenuGroup label=\"Help\"\
    >\n         <rich:panelMenuItem label=\"About\" leftIcon=\"/images/icons/yellow_lamp.gif\"\
    \ />\n      </rich:panelMenuGroup>\n   </rich:panelMenu>\n</h:form>\n```\n\n####\
    \ Invoking User Actions for Groups and Items\n\nLet’s finish with UI related features\
    \ review and proceed with functional part of the component. Items and groups could\
    \ be configured to use different modes. Let’s check the attributes available on\
    \ `<rich:panelMenu>` component in [Table 8-2](#Chapter08.html#tab_8_2).\n\n![images](images/t0802.jpg)\n\
    \nModes could be defined for all the groups and items at panel level, but could\
    \ also be redefined for a particular group or item using the `mode` attribute\
    \ on the group or item tag.\n\nLet’s also review server-side events and listeners\
    \ provided by the components shown in [Table 8-3](#Chapter08.html#tab_8_3).\n\n\
    ![images](images/t0803.jpg)\n\nThat’s enough theory—now we will build an example\
    \ of using server-side actions and listeners for the component. We will use the\
    \ code that is pretty similar to one that we used in the `<rich:dropDownMenu>`\
    \ section. Let’s take a look at the page code in [Listing 8-18](#Chapter08.html#list_8_18).\n\
    \n***Listing 8-18.** The page code*\n\n```\n<h:form>\n   <h:panelGrid columns=\"\
    2\">\n      <rich:panelMenu topGroupCollapsedLeftIcon=\"chevronUp\" width=\"200px\"\
    \n         topGroupExpandedLeftIcon=\"chevronDown\">\n         <rich:panelMenuGroup\
    \ selectable=\"true\" mode=\"ajax\" label=\"File\" render=\"menu\"\n         \
    \   action=\"#{panelMenuBean.listenerFileGroup}\">\n            <rich:panelMenuItem\
    \ label=\"New\" leftIcon=\"/images/icons/new.gif\"\n               actionListener=\"\
    #{panelMenuBean.listenerNew}\" render=\"menu\" />\n            <rich:panelMenuItem\
    \ label=\"Open File...\" leftIcon=\"/images/icons/new.gif\"\n               actionListener=\"\
    #{panelMenuBean.listenerOpenFile}\" render=\"menu\" />\n            <rich:panelMenuItem\
    \ label=\"Save\" leftIcon=\"/images/icons/save.gif\"\n               actionListener=\"\
    #{panelMenuBean.listenerSave}\" render=\"menu\" />\n            <rich:panelMenuItem\
    \ label=\"Save All\" leftIcon=\"/images/icons/save_all.gif\"\n               actionListener=\"\
    #{panelMenuBean.listenerSaveAll}\" render=\"menu\" />\n         </rich:panelMenuGroup>\n\
    \         <rich:panelMenuGroup label=\"Help\">\n            <rich:panelMenuItem\
    \ label=\"About\" leftIcon=\"/images/icons/yellow_lamp.gif\" />\n         </rich:panelMenuGroup>\n\
    \      </rich:panelMenu>\n      <h:panelGroup id=\"menu\">\n         <h:outputText\
    \ value=\"#{panelMenuBean.menuSelected}\" />\n      </h:panelGroup>\n   </h:panelGrid>\n\
    </h:form>\n```\n\nThe managed bean code is shown in [Listing 8-19](#Chapter08.html#list_8_19).\n\
    \n***Listing 8-19.** The managed bean code*\n\n```\n@ManagedBean\n@RequestScoped\n\
    public class PanelMenuBean {\n\n    private String menuSelected;\n\n    public\
    \ String getMenuSelected() {\n        return menuSelected;\n    }\n\n    public\
    \ PanelMenuBean() {\n    }\n\n    public void listenerNew(ActionEvent event) {\n\
    \        menuSelected = \"New\";\n    }\n\n    public void listenerOpenFile(ActionEvent\
    \ event) {\n        menuSelected = \"Open File...\";\n    }\n\n    public void\
    \ listenerSave(ActionEvent event) {\n        menuSelected = \"Save\";\n    }\n\
    \n    public void listenerSaveAll(ActionEvent event) {\n        menuSelected =\
    \ \"Save All\";\n    }\n\n    public void listenerFileGroup() {\n        menuSelected\
    \ = \"File Group\";\n    }\n}\n```\n\nBasically we are just storing the label\
    \ of the group or item activated and updating it on the page. The result after\
    \ expanding the `File` group is shown in [Figure 8-16](#Chapter08.html#fig_8_16).\n\
    \n![images](images/0816.jpg)\n\n***Figure 8-16.** Label updated after File group\
    \ expansion*\n\nThe result of the `Open File` menu item activation is shown in\
    \ [Figure 8-17](#Chapter08.html#fig_8_17).\n\n![images](images/0817.jpg)\n\n***Figure\
    \ 8-17.** Label updated after Open File menu item activation*\n\nThere is one\
    \ more interesting attribute that influences menu behavior as well as its look\
    \ and feel. `selectable=\"true\"` in the `File` group means that the group will\
    \ function as an item when selected and any previously selected item will be cleared.\
    \ The `activeItem` attribute, which holds the currently selected item, will be\
    \ set to the selected group name. In other words group became not just item’s\
    \ container but also a higher level item.\n\nWhen would you use this? It’s useful\
    \ when expanding the group updates on some part of the page with group-related\
    \ content. And when clicking a item in this group, it will show updated content\
    \ specific to that item. If `selectable` is set to `false`, the group will still\
    \ expand and collapse, but the action or listener on the group will not be invoked\
    \ and the `activeItem` attribute will not be set to that menu group name after\
    \ the group expansion. In other words, only item could be stored in the model\
    \ as active in case group has `selectable=\"false\"`. A group simply becomes an\
    \ item container in such case.\n\nIn [Chapter 6](#Chapter06.html#ch6) we showed\
    \ you how to manage currently selected item using the `activeItem` attribute.\
    \ It should be set to some menu group `name` (if groups are selectable) or some\
    \ menu item `name`. Also, for the groups you could use the `expanded` attribute\
    \ to control its current state (if `true`, the group will be rendered expanded).\
    \ Both attributes support EL so you could easily manage the `<rich:panelMenu>`\
    \ state in your actions.\n\n[Listings 8-20](#Chapter08.html#list_8_20) and [8-21](#Chapter08.html#list_8_21)\
    \ show how the selected item or group could be defined.\n\n***Listing 8-20.**\
    \ Defining a group*\n\n```\n<rich:panelMenu activeItem=\"fileGroup\">\n   ...\n\
    \   <rich:panelMenuGroup name=\"fileGroup\" selectable=\"true\" label=\"File\"\
    >\n   ...\n```\n\n***Listing 8-21.** Defining an item*\n\n```\n<rich:panelMenu\
    \ activeItem=\"aboutItem\">\n   ...\n   <rich:panelMenuItem name=\"aboutItem\"\
    \ label=\"About\">\n   ...\n```\n\nThe expansion state could be controlled in\
    \ the same manner, as follows:\n\n```\n<rich:panelMenuGroup expanded=\"true\"\
    \ label=\"File\">\n```\n\nAs we’ve already done in drop-down menu section, let’s\
    \ add an `About` item that is using `client` mode with a client-side action. We\
    \ have no handlers defined for the menu item in the previous sample. So let’s\
    \ modify it, as shown in [Listing 8-22](#Chapter08.html#list_8_22).\n\n***Listing\
    \ 8-22.** Modifying the menu items*\n\n```\n<rich:panelMenuGroup label=\"Help\"\
    >\n   <rich:panelMenuItem label=\"About\" leftIcon=\"/images/icons/yellow_lamp.gif\"\
    \ mode=\"client\"\n      onclick=\"#{rich:component('about')}.show()\"/>\n</rich:panelMenuGroup>\n\
    ```\n\nAnd we should add the popup to the page, as shown in [Listing 8-23](#Chapter08.html#list_8_23).\n\
    \n***Listing 8-23.** Adding the popup to the page*\n\n```\n<rich:popupPanel id=\"\
    about\" header=\"About\">\n   <h:outputText value=\"That popup opened from &lt;rich:panelMenuItem&gt;\
    \ component. \" />\n   <h:commandLink value=\"Hide\" onclick=\"#{rich:component('about')}.hide();return\
    \ false;\"/>\n</rich:popupPanel>\n```\n\nThe result of clicking the `About` menu\
    \ item is shown in [Figure 8-18](#Chapter08.html#fig_8_18).\n\n![images](images/0818.jpg)\n\
    \n***Figure 8-18.** Popup panel opened from panel menu*\n\n#### Using Panel Menu\
    \ Components JavaScript API\n\n`<rich:panelMenu>` provides JavaScript API, as\
    \ shown in [Table 8-4](#Chapter08.html#tab_8_4).\n\n![images](images/t0804.jpg)\n\
    \n`<rich:panelMenuGroup>` provides JavaScript API, as shown in [Table 8-5](#Chapter08.html#tab_8_5).\n\
    \n![images](images/t0805.jpg)\n\n`<rich:panelMenuItem>` provides only `select()`\
    \ method, which is used to select an item.\n\n### Summary\n\nThis chapter covered\
    \ various RichFaces menu components. We used them in different modes for calling\
    \ some server-side actions and performing simple JavaScript calls. Any time a\
    \ menu item fires an Ajax request, all the basic principles we covered for `<a4j:ajax>`,\
    \ such as `render`, `execute`, and client queue usage, apply as well.\n\nEven\
    \ though `<rich:contextMenu>` is not available at the time of writing, it will\
    \ surely be added in a future RichFaces release. Check the JBoss Community RichFaces\
    \ site at [`www.jboss.org/richfaces`](http://www.jboss.org/richfaces) for updates.\n\
    \n## C H A P T E R 9\n\n## Rich Tree Components\n\nTrees are ideal components\
    \ to represent hierarchical data. They are one of the most popular complex components\
    \ in any UI library (probably next to tables). Trees are very useful for building\
    \ menus, building hierarchical filters, and so on. RichFaces tree components provide\
    \ everything you need to represent data in a tree-like structure. This chapter\
    \ will explain the basics and provide advanced examples using RichFaces tree components.\n\
    \n### Using `<rich:tree>`\n\n`<rich:tree>` is an implementation of a common component\
    \ designed to display hierarchical data. As any other JSF iteration component,\
    \ it has to be bound to a model that provides the data for the tree. [Figure 9-1](#Chapter09.html#fig_9_1)\
    \ shows the tree component in action.\n\n![images](images/0901.jpg)\n\n***Figure\
    \ 9-1.** A simple RichFaces tree*\n\nOne thing to keep in mind is that this component\
    \ can’t be designed in a static way simply from page code (putting a component\
    \ on a page without binding to a model is usually possible with other components).\
    \ The ability to place the component on a page without binding to a data model\
    \ could be added to RichFaces in the future.\n\n#### Creating a Tree Model Based\
    \ on the Swing TreeNode Interface\n\nLet’s start with data model creation. If\
    \ you ever used Swing’s `javax.swing.tree.TreeNode`, then you already know how\
    \ to create a model for the RichFaces tree component. Let’s start with Swing tree\
    \ node support and explore RichFaces’ proprietary `org.richfaces.model.TreeNode`\
    \ interface in upcoming sections.\n\n![images](images/square.jpg) **Note** If\
    \ you have a project where data is organized using Swing’s TreeNode, you should\
    \ be able to use the data and classes from the project here.\n\nLet’s create a\
    \ simple `SwingTreeNodeImpl` class that implements a `javax.swing.tree.TreeNode`\
    \ interface. [Listing 9-1](#Chapter09.html#list_9_1) shows the class.\n\n***Listing\
    \ 9-1.** Shows the class*\n\n```\npublic class SwingTreeNodeImpl implements TreeNode\
    \ {\n   private List<SwingTreeNodeImpl> childNodes;\n   private String data;\n\
    \n   // Getters and setters\n\n   public SwingTreeNodeImpl(String data) {\n  \
    \    super();\n      this.data = data;\n   }\n   public void addChild(SwingTreeNodeImpl\
    \ child) {\n      if (child != null) {\n         if (childNodes == null) {\n \
    \           childNodes = new ArrayList<SwingTreeNodeImpl>();\n         }\n   \
    \      childNodes.add(child);\n      }\n   }\n   @Override\n   public TreeNode\
    \ getChildAt(int childIndex) {\n      return (childNodes == null) ? null : childNodes.get(childIndex);\n\
    \   }\n   @Override\n   public int getChildCount() {\n      return (childNodes\
    \ == null) ? null : childNodes.size();\n   }\n   @Override\n   public TreeNode\
    \ getParent() {\n      return null;\n   }\n   @Override\n   public int getIndex(TreeNode\
    \ node) {\n      return (childNodes == null) ? null : childNodes.indexOf(node);\n\
    \   }\n   @Override\n   public boolean getAllowsChildren() {\n      return true;\n\
    \   }\n   @Override\n   public boolean isLeaf() {\n      return (childNodes ==\
    \ null);\n   }\n   @Override\n   public Enumeration children() {\n      return\
    \ Iterators.asEnumeration(childNodes.iterator());\n   }\n   @Override\n   public\
    \ String toString() {\n      return data;\n   }\n}\n```\n\nIf you are familiar\
    \ with `TreeNode`, then this code should be self-explanatory. Every node has a\
    \ list that stores child nodes and a simple string `data` field that contains\
    \ information on that node. All other methods are implementation methods of the\
    \ `TreeNode` interface and return all the needed information to process the node\
    \ and allow data modifications.\n\n![images](images/square.jpg) **Note** Instead\
    \ of implementing the Swing TreeNode, you can also extend the default `org.richfaces.model.SwingTreeNodeImpl<T>`\
    \ implementation provided by RichFaces.\n\nNow that we have covered tree node\
    \ implementation, let's look at [Listing 9-2](#Chapter09.html#list_9_2) to see\
    \ how we can populate the tree shown in `SwingTreeNodeBean`.\n\n***Listing 9-2.**\
    \ Populate the tree shown in `SwingTreeNodeBean`*\n\n```\n@ManagedBean\n@ViewScoped\n\
    public class SwingTreeNodeBean {\n\n   List<SwingTreeNodeImpl> rootNodes = null;\n\
    \n   public void initNodes() {\n      rootNodes = new ArrayList<SwingTreeNodeImpl>();\n\
    \      SwingTreeNodeImpl node = new SwingTreeNodeImpl(\"Desktop Type\");\n   \
    \   node.addChild(new SwingTreeNodeImpl(\"Compact\"));\n      node.addChild(new\
    \ SwingTreeNodeImpl(\"Everyday\"));\n      node.addChild(new SwingTreeNodeImpl(\"\
    Gaming\"));\n      node.addChild(new SwingTreeNodeImpl(\"Premium\"));\n      rootNodes.add(node);\n\
    \      node = new SwingTreeNodeImpl(\"Customer Reviews\");\n      node.addChild(new\
    \ SwingTreeNodeImpl(\"Top Rated\"));\n      rootNodes.add(node);\n      node =\
    \ new SwingTreeNodeImpl(\"Current Offers\");\n      node.addChild(new SwingTreeNodeImpl(\"\
    On Sale\"));\n      node.addChild(new SwingTreeNodeImpl(\"Special Offers\"));\n\
    \      node.addChild(new SwingTreeNodeImpl(\"Package Deals\"));\n      node.addChild(new\
    \ SwingTreeNodeImpl(\"Financing offers\"));\n      node.addChild(new SwingTreeNodeImpl(\"\
    Outlet Center\"));\n      rootNodes.add(node);\n      node = new SwingTreeNodeImpl(\"\
    Availability\");\n      node.addChild(new SwingTreeNodeImpl(\"In store & Online\"\
    ));\n      node.addChild(new SwingTreeNodeImpl(\"Online only\"));\n      rootNodes.add(node);\n\
    \   }\n   public void setRootNodes(List<SwingTreeNodeImpl> rootNodes) {\n    \
    \  this.rootNodes = rootNodes;\n   }\n   public List<SwingTreeNodeImpl> getRootNodes()\
    \ {\n      if (rootNodes == null){\n         initNodes();\n      }\n      return\
    \ rootNodes;\n   }\n}\n```\n\nNow that we have the data initialized, let’s see\
    \ the RichFaces tree in action. [Listing 9-3](#Chapter09.html#list_9_3) shows\
    \ the page code for displaying the tree.\n\n***Listing 9-3.** Page code for displaying\
    \ the tree*\n\n```\n<h:form>\n   <rich:tree value=\"#{swingTreeNodeBean.rootNodes}\"\
    \ var=\"node\" />\n</h:form>\n```\n\nPretty simple isn’t it? The tree rendered\
    \ is shown in [Figure 9-2](#Chapter09.html#fig_9_2).\n\n![images](images/0902.jpg)\n\
    \n***Figure 9-2.** `<rich:tree>` built using Swing TreeNode*\n\nNote that we don't\
    \ need to define any markup for tree nodes. The tree is rendered using default\
    \ implementation and with the help of the `SwingTreeNodeImpl toString()` method,\
    \ it returns a string value for the node name. That's fine when you are just getting\
    \ started, but still would like to have more flexibility in defining tree nodes\
    \ such as binding to a different property in the node data model object.\n\n####\
    \ Creating a Tree Model Based on the RichFaces TreeNode Interface\n\nRichFaces\
    \ also supports the `org.richfaces.model.TreeNode` interface and provides default\
    \ implementation for this interface. [Listing 9-4](#Chapter09.html#list_9_4) shows\
    \ the interface.\n\n***Listing 9-4.** The `org.richfaces.model.TreeNode` interface*\n\
    \n```\npublic interface TreeNode {\n   public TreeNode getChild(Object key);\n\
    \   public int indexOf(Object key);\n   public Iterator<Object> getChildrenKeysIterator();\n\
    \   public boolean isLeaf();\n   public void addChild(Object key, TreeNode child);\n\
    \   public void insertChild(int idx, Object key, TreeNode child);\n   public void\
    \ removeChild(Object key);\n}\n```\n\nAssuming you already read about the RichFaces\
    \ data iteration components in [Chapter 7](#Chapter07.html#ch7), you should notice\
    \ the main difference between that interface and Swing’s. It uses a key–child\
    \ node relation instead of an index–child node relation. It’s similar to the `<rich:dataTable>`\
    \ row key–row data relation explained in the data models section in [Chapter 7](#Chapter07.html#ch7).\
    \ As you remember, all the iteration components in RichFaces, including complex\
    \ components like trees, use `ExtendedDataModel` as the base abstract model and\
    \ uses `rowKey`s to identify the data in the model. That makes the components\
    \ better integrated with the database layer. Actually, even when defining the\
    \ Swing-based model you are still using `ExtendedDataModel` under the hood, as\
    \ the tree automatically wraps your model to it.\n\nLet's return to the code.\
    \ This time we will not work on all interface methods implementation. Instead\
    \ we will extend default `TreeNodeImpl` implementation, as shown in [Listing 9-5](#Chapter09.html#list_9_5).\n\
    \n***Listing 9-5.** Extend default `TreeNodeImpl` implementation*\n\n```\npublic\
    \ class RichFacesTreeNode extends TreeNodeImpl {\n\n   private String data;\n\n\
    \   public RichFacesTreeNode(String data) {\n      super();\n      this.data =\
    \ data;\n   }\n   public String getData() {\n      return data;\n   }\n   public\
    \ void setData(String data) {\n      this.data = data;\n   }\n   @Override\n \
    \  public String toString() {\nreturn data;\n   }\n}\n```\n\n![images](images/square.jpg)\
    \ **Note** We will be using the RichFaces TreeNode object across all the samples\
    \ in the remainder of the chapter.\n\n[Listing 9-6](#Chapter09.html#list_9_6)\
    \ shows a bean in which we populate the tree. It looks very similar to the one\
    \ we created using the Swing tree model.\n\n***Listing 9-6.** Shows a bean used\
    \ to populate the tree*\n\n```\n@ManagedBean\n@ViewScoped\npublic class RichFacesTreeNodeBean\
    \ {\n\n   private TreeNode rootNode = null;\n\n   public void initNodes() {\n\
    \      rootNode = new TreeNodeImpl();\n      RichFacesTreeNode node = new RichFacesTreeNode(\"\
    Desktop Type\");\n      node.addChild(\"1_1\",new RichFacesTreeNode(\"Compact\"\
    ));\n      node.addChild(\"1_2\",new RichFacesTreeNode(\"Everyday\"));\n     \
    \ node.addChild(\"1_3\",new RichFacesTreeNode(\"Gaming\"));\n      node.addChild(\"\
    1_4\",new RichFacesTreeNode(\"Premium\"));\n      rootNode.addChild(\"1\",node);\n\
    \      // other initialization code\n   }\n\n   public void setRootNode(TreeNode\
    \ rootNode) {\n      this.rootNode = rootNode;\n   }\n\n   public TreeNode getRootNode()\
    \ {\n      if (rootNode == null) {\n         initNodes();\n      }\n      return\
    \ rootNode;\n   }\n\n}\n```\n\nThe RichFaces TreeNode-based model should have\
    \ the only root node (the Swing model `Collection` of root nodes was supported\
    \ as value binding). It is not an actual root, but simply a fake node that is\
    \ not getting rendered to the view, and so should not contain any data. It’s only\
    \ a placeholder for the set of child nodes that will be the actual set of root\
    \ nodes (it's designed this way to support backward compatibility with previous\
    \ RichFaces version).\n\n[Listing 9-7](#Chapter09.html#list_9_7) shows the page,\
    \ which still looks very simple.\n\n***Listing 9-7.** The simple page*\n\n```\n\
    <h:form>\n   <rich:tree value=\"#{richFacesTreeNodeBean.rootNode}\" var=\"node\"\
    />\n</h:form>\n```\n\nThe tree rendered is shown in [Figure 9-3](#Chapter09.html#fig_9_3).\n\
    \n![images](images/0903.jpg)\n\n***Figure 9-3.** `<rich:tree>` built using the\
    \ RichFaces TreeNode*\n\nYou are probably curious why the leaf nodes have the\
    \ same representation as the nodes with children and are not shown as leafs? That's\
    \ how it’s designed. When we implemented Swing’s TreeNode interface, we implemented\
    \ the `isLeaf()` method to return a boolean value, which determines if the collection\
    \ is empty. RichFaces default Swing node implementation does the same.\n\nOn the\
    \ other hand, `org.richfaces.model.TreeNodeImpl` doesn’t make the decision if\
    \ the node is a leaf according to the presence of its children. It has to be defined\
    \ with a flag passed to the constructor or have its `isLeaf()` method properly\
    \ overridden. This is done to allow the developers to manually specify the leaf\
    \ node property if the developer wants to implement lazy node loading or just\
    \ needs to have an empty nodes representation. Thus, a node can have no children\
    \ initialized, but have `isLeaf()` returning true by default. We will show you\
    \ a little later how to initialize the RichFaces `TreeNodeImpl` to be a leaf.\n\
    \n#### Using `<rich:treeNode>` to Define Tree Nodes Markup\n\nLet’s see now how\
    \ we can replace using the `toString()` method and encode iteration object properties\
    \ instead. We just need to add a `<rich:treeNode>` object to the `<rich:tree>`\
    \ and define the content of the node inside using the `var` attribute in the same\
    \ way as the `<rich:column>` content inside tables. Then every node will be rendered\
    \ using that markup. In order to create the same representation but which does\
    \ not rely on the `toString()` method, we only make changes to the page code.\
    \ [Listing 9-8](#Chapter09.html#list_9_8) shows the page code.\n\n***Listing 9-8.**\
    \ The page code*\n\n```\n<h:form>\n  <rich:tree value=\"#{richFacesTreeNodeBean.rootNode}\"\
    \ var=\"node\">\n    <rich:treeNode>\n      #{node.data}\n    </rich:treeNode>\n\
    \  </rich:tree>\n</h:form>\n```\n\nUsing this code, we get the tree rendered in\
    \ [Figure 9-4](#Chapter09.html#fig_9_4).\n\n![images](images/0904.jpg)\n\n***Figure\
    \ 9-4.** Creating a custom node using `<rich:treeNode>`*\n\nUsing `<rich:treeNode>`\
    \ allows you to place outputs such as links, images, formatted text, and so on.\
    \ The next section will introduce you to another feature of the `<rich:treeNode>`\
    \ and demonstrate different ways to render nodes.\n\n#### Using Different Types\
    \ of Nodes in a Tree\n\nSuppose we need to show the nodes in a different way according\
    \ to some conditions or properties of the model node. `<rich:tree>` easily allows\
    \ you to do that. `<rich:treeNode>` provides the `type` attribute, which should\
    \ be used for that purpose. All you need to do to use different kinds of nodes\
    \ is add a property to the node’s model objects, which will identify the node\
    \ type. It could be any property with any values. Then you need to add a set of\
    \ `<rich:treeNode>` components as child components to the `<rich:tree>` with the\
    \ `type` attributes defined according to possible model types. Finally, define\
    \ the markups inside every `<rich:treeNode>`.\n\nIn order to make a decision about\
    \ which node should be rendered for the current iteration, the `<rich:tree>` component\
    \ provides the `nodeType` attribute. You should use it to define the property\
    \ on the node that stores its type. Or, alternatively, use a simple EL expression\
    \ that will be evaluated to possible types.\n\nIn the previous sample we added\
    \ a single string data property to our `RichFacesTreeNode`, which was used to\
    \ represent a node on the client. Now let’s add another property that will identify\
    \ the node type, as shown in [Listing 9-9](#Chapter09.html#list_9_9).\n\n***Listing\
    \ 9-9.** Adding another property that will identify the node type*\n\n```\npublic\
    \ class TypifiedRichFacesTreeNode extends TreeNodeImpl {\n   private String data;\n\
    \   private SimpleTreeNodeTypes type;\n\n   public TypifiedRichFacesTreeNode(String\
    \ data, SimpleTreeNodeTypes type) {\n      super(type.equals(SimpleTreeNodeTypes.LEAF));\n\
    \      this.data = data;\n      this.type = type;\n   }\n\n   public String getData()\
    \ {\n      return data;\n   }\n   public void setData(String data) {\n      this.data\
    \ = data;\n   }\n\n   public SimpleTreeNodeTypes getType() {\n      return type;\n\
    \   }\n\n   public void setType(SimpleTreeNodeTypes type) {\n      this.type =\
    \ type;\n   }\n}\n```\n\n![images](images/square.jpg) **Note** `TreeNodeImpl`\
    \ provides constructor with a leaf parameter. In our object, which extends `TreeNodeImpl`,\
    \ we call `super()` passing the leaf parameter according to our type definition.\
    \ So it will be properly rendered as a leaf by the component for the objects initialized\
    \ with a true leaf value.\n\n[Listing 9-10](#Chapter09.html#list_9_10) shows an\
    \ Enum for note types.\n\n***Listing 9-10.** Shows an Enum for note types*\n\n\
    ```\npublic enum SimpleTreeNodeTypes {\n    NODE, LEAF\n}\n```\n\nThe modified\
    \ bean that initializes data for the tree is shown in [Listing 9-11](#Chapter09.html#list_9_11).\n\
    \n***Listing 9-11.** The modified bean*\n\n```\n@ManagedBean\n@ViewScoped\npublic\
    \ class TypifiedRichFacesTreeNodeBean {\n\n   private TreeNode rootNode = null;\n\
    \n   public void initNodes() {\n      rootNode = new TreeNodeImpl();\n\n     \
    \ TypifiedRichFacesTreeNode node = new TypifiedRichFacesTreeNode(\n         \"\
    Desktop Type\", SimpleTreeNodeTypes.NODE);\n      node.addChild(\"1_1\", new\n\
    \         TypifiedRichFacesTreeNode(\"Compact\",SimpleTreeNodeTypes.LEAF));\n\
    \      node.addChild(\"1_2\", new\n         TypifiedRichFacesTreeNode(\"Everyday\"\
    ,SimpleTreeNodeTypes.LEAF));\n      node.addChild(\"1_3\", new\n         TypifiedRichFacesTreeNode(\"\
    Gaming\",SimpleTreeNodeTypes.LEAF));\n      node.addChild(\"1_4\", new\n     \
    \    TypifiedRichFacesTreeNode(\"Premium\",SimpleTreeNodeTypes.LEAF));\n     \
    \ rootNode.addChild(\"1\", node);\n      //Other nodes initialization\n   }\n\
    \   public void setRootNode(TreeNode rootNode) {\n      this.rootNode = rootNode;\n\
    \   }\n   public TreeNode getRootNode() {\n      if (rootNode == null) {\n   \
    \      initNodes();\n      }\n      return rootNode;\n   }\n}\n```\n\nNotice that\
    \ we don't need the `toString()` method anymore, as we are defining the representation\
    \ using a set of nested `<rich:treeNode>` tags. Looking through [Listing 9-12](#Chapter09.html#list_9_12),\
    \ notice the `nodeType` attribute of `<rich:tree>` and the `type` attribute defined\
    \ on every `<rich:treeNode>`. This is the way to point the `<rich:treeNode>` to\
    \ our model type for every iterated tree node.\n\n***Listing 9-12.** Defining\
    \ the representation using a set of nested `<rich:treeNode>` tags*\n\n```\n<rich:tree\
    \ value=\"#{typifiedRichFacesTreeNodeBean.rootNode}\" var=\"node\" nodeType=\"\
    #{node.type}\"\n   toggleType=\"client\" selectionType=\"client\">\n    <rich:treeNode\
    \ type=\"NODE\">\n      <h:outputText value=\"#{node.data}\" />\n   </rich:treeNode>\n\
    \    <rich:treeNode type=\"LEAF\">\n      <h:outputLink value=\"#\">\n       \
    \  #{node.data}\n      </h:outputLink>\n   </rich:treeNode>\n</rich:tree>\n```\n\
    \nAnd finally, [Figure 9-5](#Chapter09.html#fig_9_5) shows the result. Notice\
    \ the links rendered at the second level opposite the plain text labels at the\
    \ root nodes.\n\n![images](images/0905.jpg)\n\n***Figure 9-5.** Different custom\
    \ nodes within `<rich:tree>`*\n\nDuring data model iteration, the EL expression\
    \ defined at the `nodeType` attribute is evaluated using the current object defined\
    \ in the `var` attribute. A lookup is then performed for the node with the same\
    \ type among nested components. If the node with a corresponding type is found,\
    \ it will be used for node markup rendering. If the node is not found, the tree\
    \ will lookup the node without the type specified, and it will become the default\
    \ node for all the objects, which can’t be associated with any type. If neither\
    \ default node is found, the tree will create a default one, as was done in previous\
    \ examples where `<rich:treeNode>` was not used.\n\n![images](images/square.jpg)\
    \ **Note** If a `<rich:treeNode>` has the `rendered` attribute evaluated as `false`\
    \ in context of an iteration, the node will not be rendered and no default nodes\
    \ will be used or created.\n\n#### Tree Toggling and Selection Modes\n\nA RichFaces\
    \ tree can be defined with different modes to be used while the user performs\
    \ tree nodes expansion or selects a particular node. [Table 9-1](#Chapter09.html#tab_9_1)\
    \ shows the attributes that should be used to define the modes.\n\n![images](images/t0901.jpg)\n\
    \n`toggleType` defines how every tree node child will be loaded. With the `client`\
    \ type, the complete tree will be rendered on page load and nodes toggling will\
    \ be done through JavaScript (on the client). In `ajax` and `server` modes, `<rich:tree>`\
    \ will perform form submission via Ajax or standard POST in order to load the\
    \ child components when the tree nodes get expanded.\n\n`selectionType` can be\
    \ set to the similar values—`client`, `ajax`, `server`—but for the selection user\
    \ action. We will use `ajax` `selectionType` in all the later samples created\
    \ in order to show you different options for processing tree events on the server\
    \ side.\n\n![images](images/square.jpg) **Note** `<rich:tree>` needs to be placed\
    \ inside `<h:form>` to perform an Ajax (or standard) request.\n\n![images](images/square.jpg)\
    \ **Tip** A popular question is how to implement a simple navigation tree that\
    \ does not perform actions, but redirects to another view through simple links.\
    \ Set `selectionType=client` and use `<h:outputLink>` as the tree node. The tree\
    \ itself won’t send an Ajax request, but you can navigate via `<h:outputLink>`.\n\
    \n#### Selection Event Handling\n\nIn a real application, in addition to rendering\
    \ the tree, we also need to know how to handle the user action when a particular\
    \ tree node is selected.\n\nIn addition to the `selectionType` definition we need\
    \ to point the tree to a server-side listener method. `<rich:tree>` provides the\
    \ `selectionChangeListener` attribute in order to do that. That attribute should\
    \ be defined with the method expression and the method accepts `TreeSelectionChangeEvent`\
    \ as a parameter. That event provides two methods that should be used in order\
    \ to process selection: `getOldSelection()` and `getNewSelection()`. These methods\
    \ return the collection of `rowKey`s to identify previous and new selections.\n\
    \n[Listing 9-13](#Chapter09.html#list_9_13) shows the tree definition with the\
    \ listener defined.\n\n***Listing 9-13.** Shows the tree definition*\n\n```\n\
    <h:form>\n   <rich:tree value=\"#{richFacesTreeNodeBean.rootNode}\" var=\"node\"\
    \ toggleType=\"client\"\n      selectionType=\"ajax\"\n         selectionChangeListener=\"\
    #{richFacesTreeNodeBean.selectionChanged}\">\n      <rich:treeNode>\n        \
    \ #{node.data}\n      </rich:treeNode>\n   </rich:tree>\n</h:form>\n```\n\nNow\
    \ we will need to add some code to the `RichFacesTreeNodeBean` bean that will\
    \ be used to process user selection. We will add the list in which we store selected\
    \ objects, such as the panel and the listener method, as shown in [Listing 9-14](#Chapter09.html#list_9_14).\n\
    \n***Listing 9-14.** The bean that will be used to process user selection*\n\n\
    ```\nprivate List<String> selection = new ArrayList<String>();\n\npublic void\
    \ selectionChanged(TreeSelectionChangeEvent event){\n   selection.clear();\n \
    \  UITree tree = (UITree)event.getComponent();\n   Object storedRowKey = tree.getRowKey();\n\
    \   for (Object rowKey : event.getNewSelection()) {\n      tree.setRowKey(rowKey);\n\
    \      selection.add(((RichFacesTreeNode)tree.getRowData()).getData());\n   }\n\
    \   tree.setRowKey(storedRowKey);\n}\n```\n\nLooks pretty straightforward, doesn’t\
    \ it? We are just iterating through a collection of `rowKey`s for newly-selected\
    \ objects that are passed to the listener, getting the object from the tree model\
    \ object that corresponds to that key, and placing its data into a result list.\n\
    \n![images](images/square.jpg) **Note** In our example, `getData()` only returns\
    \ the selected node object, but you can also get any other object property or\
    \ complete object.\n\nNow we just need to add a component that will iterate through\
    \ the result list to show the selection on the page. We will use `<a4j:repeat>`\
    \ for that, as [Listing 9-15](#Chapter09.html#list_9_15) shows.\n\n***Listing\
    \ 9-15.** Using `<a4j:repeat>`*\n\n```\n<a4j:outputPanel layout=\"block\" ajaxRendered=\"\
    true\">\n    <rich:panel header=\"Current selection:\" rendered=\"#{not empty\n\
    \          richFacesTreeNodeBean.selection}\">\n        <a4j:repeat value=\"#{richFacesTreeNodeBean.selection}\"\
    \ var=\"nodeData\">\n             #{nodeData}\n          </a4j:repeat>\n     \
    \  </rich:panel>\n</a4j:outputPanel>\n```\n\nThat’s all for now. If the selection\
    \ list is filled, the panel will be rendered and repeat defined inside that panel\
    \ will iterate over the selection list. [Figure 9-6](#Chapter09.html#fig_9_6)\
    \ shows the result of the node selected.\n\n![images](images/0906.jpg)\n\n***Figure\
    \ 9-6.** Tree with nodes selection*\n\n![images](images/square.jpg) **Note** `event.getNewSelection()`\
    \ returns a `Collection` even though only single node selection is supported right\
    \ now. This is done because a future version of the component should support multiple\
    \ selections.\n\n#### Expansion Event Handling\n\nNext, let’s add similar processing\
    \ for nodes expansion or collapse. You just need to add `toggleListener` to the\
    \ `<rich:tree>` page definition. [Listing 9-16](#Chapter09.html#list_9_16) shows\
    \ a simple page used to create such a sample.\n\n***Listing 9-16.** Adding `toggleListener`\
    \ to the `<rich:tree>` page definition*\n\n```\n<h:form>\n    <rich:tree value=\"\
    #{richFacesTreeNodeBean.rootNode}\" var=\"node\" toggleType=\"ajax\"\n       \
    \   toggleListener=\"#{richFacesTreeNodeBean.nodeToggled}\">\n    <rich:treeNode>\n\
    \      #{node.data}\n    </rich:treeNode>\n  </rich:tree>\n</h:form>\n```\n\n\
    We are using the same `richFacesTreeNode` bean that holds the tree constructed\
    \ using the simple `RichFacesTreeNode`. We will add the property that will hold\
    \ the data of the node that changed state, and the listener that will populate\
    \ the data, as shown in [Listing 9-17](#Chapter09.html#list_9_17).\n\n***Listing\
    \ 9-17.** Adding the listener that will populate the data*\n\n```\nprivate String\
    \ toggledNodeData = null;\n\npublic void nodeToggled(TreeToggleEvent event) {\n\
    \   toggledNodeData = ((RichFacesTreeNode)((UITree)event.getComponent()).getRowData()).getData();\n\
    }\n```\n\n[Listing 9-18](#Chapter09.html#list_9_18) shows an additional output\
    \ component to show the changes in the page.\n\n***Listing 9-18.** Shows an additional\
    \ output component to show the changes in the page*\n\n```\n<a4j:outputPanel layout=\"\
    block\" ajaxRendered=\"true\">\n   <h:outputText value=\"#{richFacesTreeNodeBean.toggledNodeData}\
    \ has the state changed!\"\n      rendered=\"#{not empty richFacesTreeNodeBean.toggledNodeData}\"\
    \ />\n</a4j:outputPanel>\n```\n\n[Figure 9-7](#Chapter09.html#fig_9_7) shows the\
    \ rendered result.\n\n![images](images/0907.jpg)\n\n***Figure 9-7.** Tree nodes\
    \ toggling processing*\n\n#### Tree Nodes Lazy Loading\n\nNow let’s create a more\
    \ interesting sample where we handle node events. Let’s implement simple lazy\
    \ loading for the nodes when additional nodes get added to the model only on expansion\
    \ of the parent node. This is a great example, as you will be able to apply these\
    \ concepts when working with large data sets, such as getting data from a database\
    \ or a from a remote service call.\n\nFirst let’s create the bean that holds the\
    \ `org.richfaces.model.TreeNode`-based model, as shown in [Listing 9-19](#Chapter09.html#list_9_19).\n\
    \n***Listing 9-19.** Creating the bean that holds the `org.richfaces.model.TreeNode`-based\
    \ model*\n\n```\n@ManagedBean\n@ViewScoped\npublic class LazyTreeBean {\n\n  \
    \ private TreeNode rootNode = null;\n\n   public void initNodes() {\n      rootNode\
    \ = new TreeNodeImpl();\n      RichFacesTreeNode node = new RichFacesTreeNode(\"\
    Node 1\");\n      rootNode.addChild(\"1\", node);\n      node = new RichFacesTreeNode(\"\
    Node 2\");\n      rootNode.addChild(\"2\", node);\n      node = new RichFacesTreeNode(\"\
    Node 3\");\n      rootNode.addChild(\"3\", node);\n      node = new RichFacesTreeNode(\"\
    Node 4\");\n      rootNode.addChild(\"4\", node);\n   }\n   public void setRootNode(TreeNode\
    \ rootNode) {\n      this.rootNode = rootNode;\n   }\n   public TreeNode getRootNode()\
    \ {\n      if (rootNode == null) {\n         initNodes();\n      }\n      return\
    \ rootNode;\n   }\n}\n```\n\nAs you can see, we’re initially instantiating only\
    \ four root nodes without any children. Now let's put a tree on a page that will\
    \ use this data model, as shown in [Listing 9-20](#Chapter09.html#list_9_20).\n\
    \n***Listing 9-20.** Putting a tree on a page that will use this data model*\n\
    \n```\n<h:form>\n   <rich:tree value=\"#{lazyTreeBean.rootNode}\" var=\"node\"\
    \ toggleType=\"ajax\">\n      <rich:treeNode>\n         #{node.data}\n      </rich:treeNode>\n\
    \   </rich:tree>\n</h:form>\n```\n\n[Figure 9-8](#Chapter09.html#fig_9_8) shows\
    \ that when rendered, the tree will be shown as usual; but on node expansion nothing\
    \ will be shown because the node is just a leaf without children.\n\n![images](images/0908.jpg)\n\
    \n***Figure 9-8.** Tree without child nodes*\n\nNext, let’s create a toggle listener\
    \ that will add child nodes to the node that was expanded. The listener is shown\
    \ in [Listing 9-21](#Chapter09.html#list_9_21).\n\n***Listing 9-21.** Creating\
    \ a toggle listener that will add child nodes*\n\n```\npublic void toggleListener(TreeToggleEvent\
    \ event) {\n   UITree tree = (UITree) event.getComponent();\n   RichFacesTreeNode\
    \ modelNode = (RichFacesTreeNode)tree.getRowData();\n   for (int i = 0; i < 5;\
    \ i++) {\n      RichFacesTreeNode node =\n         new RichFacesTreeNode(modelNode.getData()\
    \ + \".\" + i);\n      modelNode.addChild(i, node);\n   }\n}\n```\n\nNotice that\
    \ we are getting the `UITree` instance from the event and not the currently toggled\
    \ node object. It’s passed to the listener by design, as toggled node data could\
    \ be easily accessed via the `getRowData()` method, but at the same time you have\
    \ the option to operate with a complete tree instance using its API.\n\nAfter\
    \ we get the toggled node data object, we simply create five dummy child nodes\
    \ and add them as child nodes to the current node. `<rich:tree>` will automatically\
    \ mark the toggled node to be updated on the client, so we don't need to add any\
    \ additional `render` definitions on the page. The only thing we need to do is\
    \ point the tree component to the listener method.\n\n```\n<rich:tree ... toggleListener=\"\
    #{lazyTreeBean.toggleListener}\">\n```\n\nWe are now ready to try this example.\
    \ After opening the page and a few expand actions, you should see the result shown\
    \ in [Figure 9-9](#Chapter09.html#fig_9_9).\n\n![images](images/0909.jpg)\n\n\
    ***Figure 9-9.** Tree with child nodes lazy loaded*\n\nThis is really simple and\
    \ could be easily used in any scenario in which you need to load new nodes during\
    \ runtime.\n\nNow let’s proceed to the next sections, which describe declarative\
    \ models usage.\n\n### Using `<rich:tree>` Adaptors to Build the Data Model\n\n\
    RichFaces provides two adaptors to construct `<rich:tree>` data model. Both `<rich:treeModelRecursiveAdaptor>`\
    \ and `<rich:treeModelAdaptor>` allow you to point the tree to an existent, non-hierarchical\
    \ data model declaratively. It means that if you already have a model that is\
    \ `Collection`- or `Map`-based, you have no need to convert them manually into\
    \ the hierarchical models in the way we showed earlier. You could easily use all\
    \ that data to create a tree, as is, with the help of adaptor tags.\n\n#### Using\
    \ `<rich:treeModelAdaptor>`\n\n`<rich:treeModelAdaptor>` allows you to point the\
    \ tree to some `Collection` or `Map` with any objects and add them as a nodes\
    \ to the tree model. It has a `nodes` attribute that’s used to point the adaptor\
    \ to the data. Tree could be defined with any number of adaptors at the same level,\
    \ and adaptors can also be nested in order to define child nodes as needed.\n\n\
    Let’s create an example. First, we will create the model that will store data\
    \ in a `List`. [Listing 9-22](#Chapter09.html#list_9_22) shows the base object,\
    \ which will define an abstract entity (we called it `Entry`) with a set of properties\
    \ defined.\n\n***Listing 9-22.** Shows an example of the base object*\n\n```\n\
    public class Entry {\n   private String name;\n\n   private List<String> properties;\n\
    \   // Getters and setters\n\n   public Entry(String name) {\n      super();\n\
    \      this.name = name;\n   }\n\n}\n```\n\nThe class defines two properties:\
    \ the `properties` list, representing a list of simple string properties related\
    \ to an entry, and the `name` string, which stores the name of the entry. Next,\
    \ in [Listing 9-23](#Chapter09.html#list_9_23), let’s create the managed bean\
    \ that will initialize the collection of entries and that we will use to build\
    \ the tree.\n\n***Listing 9-23.** The managed bean*\n\n```\n@ManagedBean\n@SessionScoped\n\
    public class DeclarativeTreeNodesBean {\n\n   private List<Entry> entries = null;\n\
    \n   public void initEntries(){\n      entries = new ArrayList<Entry>();\n\n \
    \     Entry entry = new Entry(\"Desktop Type\");\n      List<String> childEntries\
    \ = new ArrayList<String>();\n      childEntries.add(\"Compact\");\n      childEntries.add(\"\
    Everyday\");\n      childEntries.add(\"Gaming\");\n      childEntries.add(\"Premium\"\
    );\n      entry.setProperties(childEntries);\n      entries.add(entry);\n\n  \
    \    entry = new Entry(\"Customer Reviews\");\n      childEntries = new ArrayList<String>();\n\
    \      childEntries.add(\"Top Rated\");\n      entry.setProperties(childEntries);\n\
    \      entries.add(entry);\n\n      //More initialization stuff\n   }\n   public\
    \ List<Entry> getEntries() {\n      if (entries == null) {\n         initEntries();\n\
    \      }\n      return entries;\n   }\n   public void setEntries(List<Entry> entries)\
    \ {\n      this.entries = entries;\n   }\n}\n```\n\nWe have a list of `Entry`\
    \ objects, and every `Entry` is initialized with its properties. We used the same\
    \ data as from the previous example. In [Listing 9-24](#Chapter09.html#list_9_24),\
    \ let’s review the page code, which defines `<rich:tree>` and points it to the\
    \ plain data model using `<rich:treeModelAdaptor>` tag.\n\n***Listing 9-24.**\
    \ Review the page code*\n\n```\n<rich:tree var=\"node\" toggleType=\"client\"\
    >\n   <rich:treeModelAdaptor nodes=\"#{declarativeTreeNodesBean.entries}\">\n\
    \      <rich:treeNode>\n         #{node.name}\n      </rich:treeNode>\n      <rich:treeModelAdaptor\
    \ nodes=\"#{node.properties}\"/>\n   </rich:treeModelAdaptor>\n</rich:tree>\n\
    ```\n\n[Figure 9-10](#Chapter09.html#fig_9_10) shows how it looks. Go ahead review\
    \ the code more closely.\n\n![images](images/0910.jpg)\n\n***Figure 9-10.** Tree\
    \ built using model adaptor*\n\n![images](images/square.jpg) **Note** The adaptor\
    \ doesn't provide a `var` attribute. The `<rich:tree> var` variable can be used\
    \ at any level.\n\nThat’s definitely what we expected to see. Notice that we achieved\
    \ the result by only using page tags and without any modifications at model level\
    \ or without creation of any kind of `TreeNode` objects and storing them hierarchically.\n\
    \nLet’s look at the page code again. The first `<rich:treeModelAdaptor>` iterates\
    \ over our list of entries and constructs the first level of the tree. We are\
    \ using `<rich:treeNode>` as usual in order to define the markup of the created\
    \ tree nodes. In our case, we need to name the property of the `Entry` to be rendered\
    \ as a node label.\n\nAs we mentioned before, adaptors could be nested without\
    \ any restrictions. In our case, a nested adaptor iterates the list of properties\
    \ for the currently iterated `Entry`. Properties objects are just string objects,\
    \ so we have no need for it in `<rich:treeNode>` usage, as each will be only used\
    \ as the labels.\n\n#### Using `<rich:treeModelRecursiveAdaptor>`\n\n`<rich:treeModelRecursiveAdaptor>`\
    \ is an extension of a `<rich:treeNodesAdaptor>` component. According to the name,\
    \ it provides a simple way to create a tree model iterating over an existing model\
    \ recursively. It should be defined using two base attributes: the `roots` attribute\
    \ defines the collection or map used at the top of the recursion, and the `nodes`\
    \ is used to add nested nodes recursively.\n\nThe most common and probably most\
    \ often used example for such model is the file system representation. We will\
    \ show you how to create such a sample using the code, which has no tree-specific\
    \ objects. The tree data model will again be automatically created by the component\
    \ with the help of the adaptors tags.\n\nIn our example, we will get all the directories\
    \ and file listings from our application web root folder. [Listing 9-25](#Chapter09.html#list_9_25)\
    \ shows the code for the base `FileSystem` node class.\n\n***Listing 9-25.** Shows\
    \ the code for the base `FileSystem` node class*\n\n```\npublic class FileSystemNode\
    \ {\n   private String path;\n   private List<FileSystemNode> directories;\n \
    \  private List<String> files;\n   private String shortPath;\n\n   private static\
    \ final Function<String, FileSystemNode> FACTORY =\n      new Function<String,\
    \  FileSystemNode>() {\n         public FileSystemNode apply(String from) {\n\
    \            return new FileSystemNode(from.substring(0, from.length() - 1));\n\
    \         };\n   };\n   private static final Function<String, String> TO_SHORT_PATH\
    \ = new\n      Function<String, String>() {\n      public String apply(String\
    \ from) {\n         int idx = from.lastIndexOf('/');\n         if (idx < 0) {\n\
    \            return from;\n         }\n         return from.substring(idx + 1);\n\
    \      };\n   };\n   public FileSystemNode(String path) {\n      this.path = path;\n\
    \      int idx = path.lastIndexOf('/');\n      if (idx != -1) {\n         shortPath\
    \ = path.substring(idx + 1);\n      } else {\n         shortPath = path;\n   \
    \   }\n   }\n   public synchronized List<FileSystemNode> getDirectories() {\n\
    \      if (directories == null) {\n         directories = Lists.newArrayList();\n\
    \         Iterables.addAll(directories,\n         Iterables.transform(Iterables.filter(getResourcePaths(),\
    \ Predicates.containsPattern(\"/$\")),\n         FACTORY));\n      }\n      return\
    \ directories;\n   }\n   public synchronized List<String> getFiles() {\n     \
    \ if (files == null) {\n         files = new ArrayList<String>();\n         Iterables.addAll(files,\
    \ Iterables.transform(\n         Iterables.filter(getResourcePaths(),\n      \
    \      Predicates.not(Predicates.containsPattern(\"/$\"))),\n            TO_SHORT_PATH));\n\
    \      }\n      return files;\n   }\n   private Iterable<String> getResourcePaths()\
    \ {\n      FacesContext facesContext = FacesContext.getCurrentInstance();\n  \
    \    ExternalContext externalContext = facesContext.getExternalContext();\n  \
    \    Set<String> resourcePaths = externalContext.getResourcePaths(this.path);\n\
    \      if (resourcePaths == null) {\n         resourcePaths = Collections.emptySet();\n\
    \      }\n      return resourcePaths;\n   }\n   public String getShortPath() {\n\
    \      return shortPath;\n   }\n}\n```\n\nThe `FileSystemNode` object returns\
    \ the list of directories and files at given levels and defines a set of utility\
    \ methods used in order to transform path strings, providing simple representation\
    \ for them. It uses Google's Guava libraries, which make working with collections\
    \ much simpler. You can learn more about the project from Guava: Google Core Libraries\
    \ for Java 1.5+ at [`http://code.google.com/p/guava-libraries`](http://code.google.com/p/guava-libraries).\n\
    \nThe bean that defines the root level and operates with the `FileSystemNode`\
    \ objects to get the file system structure starting from the root directory is\
    \ shown in [Listing 9-26](#Chapter09.html#list_9_26).\n\n***Listing 9-26.** The\
    \ bean that defines the root level and operates with the `FileSystemNode` objects*\n\
    \n```\n@ManagedBean\n@RequestScoped\npublic class FileSystemBean {\n\n   private\
    \ List<FileSystemNode> rootDirs;\n   private List<String> rootFiles;\n   private\
    \ FileSystemNode rootNode = new FileSystemNode(\"/\");\n\n   public List<FileSystemNode>\
    \ getRootDirs() {\n      if (rootDirs == null) {\n         rootDirs = rootNode.getDirectories();\n\
    \      }\n      return rootDirs;\n   }\n   public List<String> getRootFiles()\
    \ {\n      if (rootFiles == null) {\n         rootFiles = rootNode.getFiles();\n\
    \      }\n      return rootFiles;\n   }\n}\n```\n\nLet's look at what we have.\
    \ The bean returns a list of files and directories for the root level. Besides\
    \ every `FileSystemNode`, which actually represents a directory, it's also possible\
    \ to create a list of directories and files inside. Now we just need to reflect\
    \ that in the `<rich:tree>` page definition using adaptor tags shown in [Listing\
    \ 9-27](#Chapter09.html#list_9_27).\n\n***Listing 9-27.** Create a list of directories\
    \ and files inside*\n\n```\n<rich:tree toggleType=\"client\" var=\"item\">\n \
    \  <rich:treeModelRecursiveAdaptor roots=\"#{fileSystemBean.rootDirs}\"\n    \
    \  nodes=\"#{item.directories}\">\n   <rich:treeNode>\n     #{item.shortPath}\n\
    \   </rich:treeNode>\n      <rich:treeModelAdaptor nodes=\"#{item.files}\">\n\
    \      <rich:treeNode>#{item}</rich:treeNode>\n   </rich:treeModelAdaptor>\n \
    \ </rich:treeModelRecursiveAdaptor>\n      <rich:treeModelAdaptor nodes=\"#{fileSystemBean.rootFiles}\"\
    >\n      <rich:treeNode>#{item}</rich:treeNode>\n  </rich:treeModelAdaptor>\n\
    </rich:tree>\n```\n\nThe recursive tree node adaptor defined first, iterates over\
    \ the directories starting from `rootDirs` and recursively retrieving directories\
    \ as defined in the `nodes` attribute. In addition to nested `<rich:treeModelAdaptor>`,\
    \ adaptor iterates over the files inside every directory.\n\nThe second adapter,\
    \ which is nested inside `<rich:tree>`, iterates over root-level directory files.\
    \ [Figure 9-11](#Chapter09.html#fig_9_11) shows the result after the tree gets\
    \ rendered and we expanded a few nodes.\n\n![images](images/0911.jpg)\n\n***Figure\
    \ 9-11.** Tree built using the recursive model adaptor*\n\n![images](images/square.jpg)\
    \ **Note** As of writing of this book and the first release of RichFaces version\
    \ 4.0, tree components don't provide JavaScript API. We anticipate such API will\
    \ be added in a future RichFaces release.\n\n### Summary\n\nThis chapter covered\
    \ one of the most important components in RichFaces: tree. Although also considered\
    \ one of the most difficult to use (in any framework), RichFaces provides a number\
    \ of features that make working with trees rather simple, but at the same time\
    \ flexible and powerful.\n\nRichFaces allows you to build and display a tree structure\
    \ based on an existing Swing model, but also allows you to build custom models.\
    \ We have also shown you how to expand and collapse nodes and invoke server-side\
    \ listeners when a node is selected. Finally, we covered how to take a list structure\
    \ and present it in a tree structure using the powerful RichFaces tree adaptors.\n\
    \n## C H A P T E R 10\n\n## Rich Drag-and-Drop Components\n\nBeing able to drag\
    \ and drop items inside a browser is cool and becoming an important feature. RichFaces\
    \ provides a set of features that enable you to drag and drop almost any JSF component.\
    \ The available drag-and-drop components provide everything you need, so you won't\
    \ have to deal with any JavaScript. Although drag-and-drop is happening on the\
    \ client side, RichFaces allows binding drag-and-drop events to server-side listeners.\
    \ Another thing to keep in mind is that drag-and-drop components are actually\
    \ just functional components (similar to the Core tag library in JSF), so they\
    \ don't provide a lot in terms of UI, only the functionality to drag-and-drop\
    \ other components.\n\n### Using `<rich:dragSource>` and `<rich:dropZone>`\n\n\
    Enabling drag-and-drop in JSF pages using RichFaces can be done by only using\
    \ two tags: `<rich:dragSource>` and `<rich:dropTarget>`. `<rich:dragSource>` is\
    \ nested inside the component that you want to drag and `<rich:dropTarget>` is\
    \ nested inside the component that should become the drop zone. Let's first cover\
    \ some of the basic attributes and then run through an example.\n\nAs we mentioned,\
    \ these drag and drop components are added as children to any components, and\
    \ will encode all the necessary JavaScript to make the source draggable and the\
    \ target a drop zone. [Listing 10-1](#Chapter10.html#list_10_1) shows an example\
    \ of making the image component draggable.\n\n***Listing 10-1.** An example of\
    \ making the image component draggable*\n\n```\n<h:graphicImage value=\"/images/nikon-dx3100.png\"\
    \ id=\"dragImage\">\n   <rich:dragSource/>\n</h:graphicImage>\n```\n\nAn image\
    \ is rendered but it is also now draggable. Drag it with the mouse as you usually\
    \ do with any desktop items. The result is shown in [Figure 10-1](#Chapter10.html#fig_10_1).\n\
    \n![images](images/1001.jpg)\n\n***Figure 10-1.** Dragged image*\n\n![images](images/square.jpg)\
    \ **Note** Two examples of components in JSF that don't encode an id to the client\
    \ unless you specify it explicitly are `<h:outputText>` and `<h:graphicImage>`.\
    \ If you are adding drag-and-drop capability to such components and no id is present,\
    \ drag-and-drop will not work. Adding drag-and-drop capability to component requires\
    \ that the client id is present. So, a good practice is always to specify the\
    \ id for a component.\n\nSo far nothing is happening after we release the element.\
    \ The dragged image simply disappears from the screen; but that's what is supposed\
    \ to happen. RichFaces drag-and-drop components do not provide client-side reordering\
    \ of elements within a DOM tree or any sort of absolute position change. To process\
    \ the drop of the component, we need to define a drop zone. Once a component is\
    \ dropped into this zone, we can send an Ajax request in order to process the\
    \ drop event. Basically, `<rich:dropTarget>` provides a way to attach a client-side\
    \ listener for a drop operation that will send a standard Ajax request. Let's\
    \ add `<rich:dropTarget>` to the page. Remember that both tags register listeners\
    \ on parent components, so we will use `<rich:panel>` as a drop zone. [Listing\
    \ 10-2](#Chapter10.html#list_10_2) shows the code.\n\n***Listing 10-2.** Adding\
    \ `<rich:dropTarget>` to the page*\n\n```\n<h:form>\n   <a4j:status startText=\"\
    Processing drop event\"/>\n   <rich:panel id=\"dropZone\" header=\"Drop Here\"\
    >\n      <rich:dropTarget/>\n   </rich:panel>\n</h:form>\n```\n\nThe result shown\
    \ in [Figure 10-2](#Chapter10.html#fig_10_2).\n\n![images](images/1002.jpg)\n\n\
    ***Figure 10-2.** `<rich:panel>` as a drop zone*\n\nAs you see we also added `<a4j:status>`\
    \ to show the Ajax request status. However, after we drag the image and drop it\
    \ into the panel, we still don't see status component activation. So the request\
    \ is not being sent. We are still missing one thing to make it work.\n\nYou can\
    \ attach the drag component to any component and also attach the drop component\
    \ to any component. It's required to declare which drag sources correspond to\
    \ which drop zones. In other words, you need to define that items of type A, for\
    \ example, can be dropped into only one particular drop zone and not any other.\n\
    \nTo make this work, we need to define a `type` attribute on the `<rich:dragSource>`\
    \ component. It should be any string identifier that will be used to attach it\
    \ to the drop target. Then we should define an `acceptedTypes` attribute for `<rich:dropTarget>`.\
    \ It should be set to all accepted drag sources. You can use a comma or a space\
    \ to separate string values or bind the attribute to a bean property that holds\
    \ `Set` or `List` of types.\n\n[Listing 10-3](#Chapter10.html#list_10_3) shows\
    \ the code with all the updates.\n\n***Listing 10-3.** Shows the updated code*\n\
    \n```\n<h:graphicImage value=\"/images/nikon-dx3100.png\" id=\"dragImage\">\n\
    \    <rich:dragSource type=\"img\"/>\n</h:graphicImage>\n<a4j:status startText=\"\
    Processing drop event\" />\n<h:form>\n   <rich:panel id=\"dropZone\" header=\"\
    Drop Here\">\n        <rich:dropTarget acceptedTypes=\"img\"/>\n   </rich:panel>\n\
    </h:form>\n```\n\nFinally, after dropping the image into the panel, the Ajax request\
    \ status should be shown as illustrated in [Figure 10-3](#Chapter10.html#fig_10_3).\n\
    \n![images](images/1003.jpg)\n\n***Figure 10-3.** Ajax request sent after drop\
    \ event*\n\nIn this example we set the drag source type (`type=\"img\"`) and then\
    \ defined `acceptedTypes=\"img\"` to make sure that only the component of that\
    \ type can be dropped into this drop zone. If you have a drop zone that should\
    \ accept any types of draggable components, then, instead of listing each accepted\
    \ type, we could set the drop zone to accept any type, such as the following:\n\
    \n```\nacceptedTypes=\"@all\"\n```\n\nEven though any component can now be dropped\
    \ into this drop zone, we still need to define the drag source type for every\
    \ `<rich:dragSource>` component.\n\n### Invoking Server-side Listener on Drop\n\
    \nThings are looking good—we can drag-and-drop components—but we are still missing\
    \ something. The missing part is the ability to invoke server-side listeners when\
    \ a drop occurs, in order to add some business logic to those operations.\n\n\
    To add a server-side listener, we define the `dropListener` attribute for `<rich:dropTarget>`\
    \ with a method expression to the listener inside the bean. The listener method\
    \ signature is as follows:\n\n```\npublic void listenerName(org.richfaces.event.DropEvent\
    \ event)\n```\n\nWe will touch on `DropEvent` and the information it exposes in\
    \ listener code shortly, but for now let's cover two more attributes that should\
    \ be used to handle a drop operation on the server side and which are related\
    \ to the `DropEvent`. `dragValue` defined on `<rich:dragSource>` and `dropValue`\
    \ defined on `<rich:dropTarget>` are used in order to pass additional information\
    \ to the listener.\n\nNow let's review `DropEvent` closer. [Table 10-1](#Chapter10.html#tab_10_1)\
    \ lists methods available on the `DropEvent` object.\n\n![images](images/t1001.jpg)\n\
    \n![images](images/square.jpg) **Note** It's also possible to use `<f:param>`\
    \ or `<a4j:param>` tags to pass parameters to `<rich:dropTarget>` as we do for\
    \ JSF links, buttons, or any other action component. However, because `<rich:dragSource>`\
    \ is not an action component, it will not process the additional parameters.\n\
    \n### Shopping Cart Example\n\nLet's create an example that consists of a list\
    \ of products and a shopping cart. Moving products into the cart will be implemented\
    \ using drag and drop. [Listing 10-4](#Chapter10.html#list_10_4) shows the `Product`\
    \ object.\n\n***Listing 10-4.** Shows the `Product` object*\n\n```\npublic class\
    \ Product {\n\n   private static final String IMAGES_EXT = \".jpg\";\n   private\
    \ static final String IMAGES_DIR = \"/images/\";\n   private String title;\n \
    \  private String description;\n   private String img;\n\n   public Product(String\
    \ title, String description, String img) {\n      super();\n      this.title =\
    \ title;\n      this.description = description;\n      this.img = img;\n   }\n\
    \n   public String getIconURI() {\n      return IMAGES_DIR + this.img +  IMAGES_EXT;\n\
    \   }\n   // Getters and setters\n}\n```\n\nThe `Product` object provides three\
    \ properties—`name`, `description`, and `icon`—all used to represent it in the\
    \ list.\n\n[Listing 10-5](#Chapter10.html#list_10_5) shows a bean that initializes\
    \ a collection of products.\n\n***Listing 10-5.** Shows a bean that initializes\
    \ a collection of products*\n\n```\n@ManagedBean\n@RequestScoped\npublic class\
    \ ShoppingCartBean {\n   public List<Product> items;\n   public List<Product>\
    \ cartItems;\n\n   public String getProductsCountString() {\n      return cartItems.size()\
    \ + \" products in cart\";\n   }\n   public ShoppingCartBean() {\n      items\
    \ = new ArrayList<Product>();\n      cartItems = new ArrayList<Product>();\n \
    \     items.add(new Product(\"Nikon D3100\",\n         \"14.2MP Digital SLR Camera\
    \ with 18-55mm f/3.5-5.6 AF-S DX VR Nikkor Zoom Lens\", \"nikon-d3100\"));\n \
    \     items.add(new Product(\"Canon Rebel XS\",\n         \"10.1MP Digital SLR\
    \ Camera with EF-S 18-55mm f/3.5-5.6 IS Lens (Black)\", \"canon-xs\"));\n    \
    \     //More items initialization code\n    }\n    //Getters and setters\n}\n\
    ```\n\nNot much to explain here. We create shopping items and place them in a\
    \ list.\n\nNow, let's create the page that will display a list of items and add\
    \ drag-and-drop to it. [Listing 10-6](#Chapter10.html#list_10_6) shows the initial\
    \ page code.\n\n***Listing 10-6.** Shows the initial page code*\n\n```\n<h:form>\n\
    \   <h:panelGrid columns=\"2\" id=\"panel\">\n      <rich:panel header=\"Products\"\
    \ style=\"width:300px\">\n         <rich:dataGrid value=\"#{shoppingCartBean.items}\"\
    \ var=\"item\">\n            <rich:panel style=\"width:275px\">\n            \
    \    <rich:dragSource type=\"products\" dragValue=\"#{item}\" />\n           \
    \       <h:panelGrid columns=\"2\">\n                     <h:graphicImage value=\"\
    #{item.iconURI}\" />\n                        <fieldset>\n                   \
    \     <legend><b>#{item.title}\"</b></legend>\n                        #{item.description}\n\
    \                        </fieldset>\n                  </h:panelGrid>\n     \
    \       </rich:panel>\n         </rich:dataGrid>\n      </rich:panel>\n      <rich:panel\
    \ header=\"Shopping Cart\">\n        <rich:dropTarget render=\"panel\" acceptedTypes=\"\
    products\"\n        dropListener=\"#{shoppingCartBean.processDrop}\" />\n    \
    \     <h:panelGrid>\n            <h:outputText value=\"#{shoppingCartBean.productsCountString}\"\
    \n               rendered=\"#{not empty shoppingCartBean.cartItems}\" />\n   \
    \         <h:graphicImage value=\"#{empty shoppingCartBean.cartItems ?\n     \
    \          '/images/empty_cart.png' :\n               '/images/cart.png'}\" />\n\
    \            <h:link outcome=\"checkout\" rendered=\"#{not empty\n           \
    \    shoppingCartBean.cartItems}\">\n               Checkout\n            </h:link>\n\
    \         </h:panelGrid>\n      </rich:panel>\n   </h:panelGrid>\n</h:form>\n\
    ```\n\nNow let's review the code. We created two panels. The left panel will display\
    \ a list of products using the `<rich:dataGrid>` component. Inside every cell,\
    \ a panel is displayed with product details. We then add drag capability to the\
    \ panel using `<rich:dragSource>`. The `<rich:dragSource>` component is defined\
    \ with the `products` type and also defines the drag value (using `dragValue`\
    \ attribute) as the current iteration object.\n\nThe right panel contains an icon\
    \ of a shopping cart and will get updated when items are dropped into it. It will\
    \ display an added products count, and the link to the checkout page will become\
    \ enabled once an item is added to the cart. `<rich:dropTarget>` defines the entire\
    \ panel as a drop zone and defines the same `products` as an accepted type.\n\n\
    [Figure 10-4](#Chapter10.html#fig_10_4) shows how the page is rendered initially.\n\
    \n![images](images/1004.jpg)\n\n***Figure 10-4.** Products page with shopping\
    \ cart*\n\nThe only thing we are missing is the drop listener method implementation.\
    \ So let's add it to the `ShoppingCartBean` class, as defined in [Listing 10-7](#Chapter10.html#list_10_7).\n\
    \n***Listing 10-7.** Adding the drop listener method to the `ShoppingCartBean`\
    \ class*\n\n```\npublic void processDrop(DropEvent event) {\n   Product dragValue\
    \ = (Product)event.getDragValue();\n   cartItems.add(dragValue);\n   items.remove(dragValue);\n\
    }\n```\n\nRecall that we are passing the `Product` object exposed as an iteration\
    \ variable and as a drag value (`#{item}`). Inside the listener, we are getting\
    \ the object and adding it to the `cartItems` list, and then removing it from\
    \ `items` list. [Figure 10-5](#Chapter10.html#fig_10_5) shows the page after we\
    \ drag-and-drop two items.\n\n![images](images/1005.jpg)\n\n***Figure 10-5.**\
    \ A few products were dropped into the shopping cart.*\n\nLooks pretty simple,\
    \ doesn't it? And finally, to complete the example, let's navigate to the checkout\
    \ page by using `<h:link>` with a `checkout` outcome. This means that we have\
    \ the `checkout.xhtml` page in the same directory as the shopping page. [Listing\
    \ 10-8](#Chapter10.html#list_10_8) shows the page.\n\n***Listing 10-8.** Navigating\
    \ to the checkout page by using `<h:link>` with a `checkout` outcome*\n\n```\n\
    <rich:dataTable value=\"#{shoppingCartBean.cartItems}\" var=\"item\">\n   <f:facet\
    \ name=\"header\">Items for checkout</f:facet>\n   <rich:column>#{item.title}</rich:column>\n\
    \    <rich:column>#{item.description}</rich:column>\n</rich:dataTable>\n```\n\n\
    We use a table that is bound to the `cartItems` list in the `ShoppingCartBean`\
    \ object. When we click on the checkout link in the cart, we should see the result\
    \ shown in [Figure 10-6](#Chapter10.html#fig_10_6).\n\n![images](images/1006.jpg)\n\
    \n***Figure 10-6.** Checkout page*\n\n### Two-way Drag-and-Drop Operations\n\n\
    Let's improve our example and ability to remove some items from the shopping cart\
    \ and place them back in the products list. There is nothing complicated here;\
    \ we will just need the same drag support on the target items (shopping cart)\
    \ and define drop support on the source list (products list).\n\nLet's review\
    \ page changes in segments, starting with changes to the products size. [Listing\
    \ 10-9](#Chapter10.html#list_10_9) shows the products panel modified.\n\n***Listing\
    \ 10-9.** Shows the modified products panel*\n\n```\n<rich:panel header=\"Products\"\
    \ style=\"width:300px\">\n    <rich:dropTarget acceptedTypes=\"targetProducts\"\
    \n    dropListener=\"#{shoppingCartBean.processRemove}\" render=\"panel\"/>\n\
    \   <rich:dataGrid value=\"#{shoppingCartBean.items}\" var=\"item\">\n      <rich:panel\
    \ style=\"width:275px\">\n         <rich:dragSource type=\"products\" dragValue=\"\
    #{item}\" />\n         <h:panelGrid columns=\"2\">\n            <h:graphicImage\
    \ value=\"#{item.iconURI}\" />\n            <fieldset>\n               <legend><b>#{item.title}\"\
    </b></legend>\n               #{item.description}\n            </fieldset>\n \
    \        </h:panelGrid>\n      </rich:panel>\n   </rich:dataGrid>\n</rich:panel>\n\
    ```\n\nIt's almost the same as before, but now we have added `<rich:dropTarget>`\
    \ to the entire products panel, which accepts dragged elements of the `targetProducts`\
    \ type and calls the `processRemove()` drop listener from the same `ShoppingCartBean`\
    \ bean. [Listing 10-10](#Chapter10.html#list_10_10) shows the method code.\n\n\
    ***Listing 10-10.** The method code*\n\n```\npublic void processRemove(DropEvent\
    \ event) {\n   Product dragValue = (Product)event.getDragValue();\n   cartItems.remove(dragValue);\n\
    \   items.add(dragValue);\n}\n```\n\n[Listing 10-11](#Chapter10.html#list_10_11)\
    \ shows the modified panel with shopping cart.\n\n***Listing 10-11.** The modified\
    \ panel with shopping cart*\n\n```\n<rich:panel header=\"Shopping Cart\">\n  \
    \ <h:panelGrid>\n      <h:outputText value=\"#{shoppingCartBean.productsCountString}\"\
    \n         rendered=\"#{not empty shoppingCartBean.cartItems}\" />\n      <h:graphicImage\
    \ value=\"#{empty shoppingCartBean.cartItems ?\n         '/images/empty_cart.png'\
    \ : '/images/cart.png'}\" />\n      <h:link outcome=\"checkout\" rendered=\"#{not\
    \ empty\n         shoppingCartBean.cartItems}\">\n         Checkout\n      </h:link>\n\
    \        <rich:dataGrid value=\"#{shoppingCartBean.cartItems}\" var=\"item\">\n\
    \         <a4j:outputPanel layout=\"block\">\n            <rich:dragSource type=\"\
    targetProducts\" dragValue=\"#{item}\" />\n            <h:panelGrid columns=\"\
    2\">\n               <h:graphicImage value=\"#{item.iconURI}\" style=\"width:30px;\
    \ height:30px;\" />\n               #{item.title}\n            </h:panelGrid>\n\
    \         </a4j:outputPanel>\n      </rich:dataGrid>\n   </h:panelGrid>\n   <rich:dropTarget\
    \ render=\"panel\" acceptedTypes=\"products\"\n      dropListener=\"#{shoppingCartBean.processDrop}\"\
    \ />\n</rich:panel>\n```\n\nThere, we added a small list of items that appear\
    \ below the cart. Every item was added with drag capability using `<rich:dragSource>`\
    \ with `targetProducts` as the type and the current iteration object (`#{item}`)\
    \ as the value. Now we are able to pass the items either way between the lists.\
    \ [Figure 10-7](#Chapter10.html#fig_10_7) shows the page when two items are added\
    \ to the cart.\n\n![images](images/1007.jpg)\n\n***Figure 10-7.** List in shopping\
    \ cart allows you to return drag-and-drop items*\n\nNow you can take any item\
    \ in the shopping cart, remove it from the shopping cart, and put it back into\
    \ the products list via drag and drop.\n\n### Customizing the Drag Indicator\n\
    \n[Figure 10-8](#Chapter10.html#fig_10_8) shows what you see when an item is dragged\
    \ on the page using the default drag indicator.\n\n![images](images/1008.jpg)\n\
    \n***Figure 10-8.** Dragged state default indication*\n\nBy default, the drag\
    \ indication element is achieved by cloning the DOM section that is being dragged.\n\
    \nUsing the default is fine, but we would like to have the option to customize\
    \ the object that's being dragged with some styling, for example, and other options.\n\
    \nLuckily, as with everything else in RichFaces, it's pretty easy to do. The RichFaces\
    \ drag-and-drop feature adds a set of predefined CSS classes (the same as with\
    \ UI-rich components) that are applied to the cloned indicator element in different\
    \ states. [Table 10-2](#Chapter10.html#tab_10_2) shows the style names and explains\
    \ when they should be used.\n\n![images](images/t1002.jpg)\n\nNow it should be\
    \ a pretty easy task to make the indicator change in different states in order\
    \ to better notify the user about current action options. In [Listing 10-12](#Chapter10.html#list_10_12),\
    \ let's add the CSS classes to our previous sample page.\n\n***Listing 10-12.**\
    \ Adding the CSS classes to our previous sample page*\n\n```\n<style>\n   .rf-ind-drag{\n\
    \   }\n   .rf-ind-acpt{\n      border:3px solid green;\n   }\n   .rf-ind-rejt{\n\
    \      border:3px solid red;\n   }\n</style>\n```\n\nBased on this styling, the\
    \ indicator is defined to look as it is when just dragged. A green border is added\
    \ when hovering over the drop zone that accepts this object. And, a red border\
    \ is shown when hovering the components over a drop zone that doesn't accept this\
    \ object type. So when we hover one of the items over the cart, we will see it\
    \ updated with a green border, as shown in [Figure 10-9](#Chapter10.html#fig_10_9).\n\
    \n![images](images/1009.jpg)\n\n***Figure 10-9.** Drag indicator customized with\
    \ green border in accept state*\n\nBeing able to style in this way looks a lot\
    \ more user-friendly.\n\nThe next section describes how to customize the drag\
    \ indicator with custom content using a special `<rich:dragIndicator>` component.\n\
    \n### Using `<rich:dragIndicator>`\n\n`<rich:dragIndicator>` is a pretty simple\
    \ component that allows you to define some custom static content that is shown\
    \ under the mouse cursor when you perform a drag operation.\n\nThere are two things\
    \ you need to know to start using this component. First, the content of indicator\
    \ should be defined using any nested components. Second, the indicator itself\
    \ should be attached to `<rich:dragSource>` using same named `dragIndicator` attribute\
    \ on the `<rich:dragSource>` behavior with the indicator `id` specified.\n\nSo,\
    \ let's proceed with an example. Using the cart sample, we will add the indicator\
    \ anywhere on the page, as shown in [Listing 10-13](#Chapter10.html#list_10_13).\n\
    \n***Listing 10-13.** Adding the indicator anywhere on the page using the cart\
    \ sample*\n\n```\n<rich:dragIndicator id=\"indicator\">\n   <rich:panel>\n   \
    \   <h:outputText value=\"Drop product to cart\" />\n   </rich:panel>\n</rich:dragIndicator>\n\
    ```\n\nNow you need only to point our drag behaviors to it using code as follows:\n\
    \n```\n<rich:dragSource ... dragIndicator=\"indicator\" />\n```\n\nWhen you drag\
    \ any product, you will no longer see the panel. Instead, you will see a smaller\
    \ panel with only the content defined. And, if we don't remove our style class\
    \ definitions for `rf-ind-drag` and two other styles (drop accepted, drop not\
    \ accepted), we should see the results shown in [Figures 10-10](#Chapter10.html#fig_10_10)\
    \ and [10-11.](#Chapter10.html#fig_10_11)\n\n![images](images/1010.jpg)\n\n***Figure\
    \ 10-10.** Panel with static indicator dragged*\n\n![images](images/1011.jpg)\n\
    \n***Figure 10-11.** Panel with static indicator over the drop zone*\n\nBesides\
    \ the `rf-*` classes, which are applied to all the indicators in the page, you\
    \ can use `<rich:dragIndicator>` component attributes to define specific styles\
    \ for that particular indicator. Those attributes are `acceptClass`, `draggingClass`,\
    \ and `rejectClass`.\n\n![images](images/square.jpg) **Note** As of the writing\
    \ of this book, there are no options to redefine markup for different indicator\
    \ states, only the option of restyling it using CSS. In other words, if you need\
    \ to show a different icon to indicate the reject or accept state inside the indicator,\
    \ it can be done—but only by using CSS selectors (to hide and show some elements\
    \ in some states) or by using background images defined in CSS classes. The option\
    \ to redefine markup could be added in a future release, so check the JBoss Community\
    \ RichFaces page at [`www.jboss.org/richfaces`](http://www.jboss.org/richfaces)\
    \ often for new updates.\n\n### Using Drag-and-Drop with Tree Components\n\nDrag-and-drop\
    \ with tree components might sound complicated; however, once you finish this\
    \ section, you will see that it's actually not that difficult. All we are doing\
    \ is combining knowledge from [Chapter 9](#Chapter09.html#ch9) with knowledge\
    \ from this chapter. We will implement moving the leaf nodes between different\
    \ parent nodes. Although this is a basic example, you should be able to extend\
    \ it to any more complicated case.\n\nLet's create a simple tree model, as we\
    \ did in [Chapter 9](#Chapter09.html#ch9). [Listing 10-14](#Chapter10.html#list_10_14)\
    \ shows the code for Swing's `TreeNode` implementation, which will be used to\
    \ create a tree model.\n\n***Listing 10-14.** Shows the code for the Swing's `TreeNode`\
    \ implementation*\n\n```\npublic class FileSystemNode extends org.richfaces.model.SwingTreeNodeImpl<Object>\
    \ {\n   private String label;\n\n   public FileSystemNode(String label) {\n  \
    \    super();\n      this.label = label;\n   }\n\n   public String getNodeType()\
    \ {\n      return isLeaf() ? \"leaf\" : \"node\";\n   }\n}\n```\n\n![images](images/square.jpg)\
    \ **Note** We use the `SwingTreeNodeImpl` default implementation class from `richfaces-api`\
    \ as it is more convenient for that specific sample because it already provides\
    \ the `getParent()` method implemented. We will use that method to perform moving\
    \ between nodes more easily. `org.richfaces.TreeNodeImpl` doesn't have such a\
    \ method and we would have to add it if we wanted to switch to that implementation.\n\
    \nIt's as simple as possible. It will store either the file or directory name\
    \ and will return two string types, `leaf` and `node`, according to the `isLeaf()`\
    \ method. Later, we will use a different type of node on the page.\n\nNow, let's\
    \ look at the bean that initializes the model in [Listing 10-15](#Chapter10.html#list_10_15).\n\
    \n***Listing 10-15.** The bean that initializes the model*\n\n```\n@ManagedBean\n\
    @SessionScoped\npublic class TreeDnDBean {\n\n   private List<SwingTreeNodeImpl<Object>>\
    \ nodes;\n\n   public TreeDnDBean() {\n      nodes = new ArrayList<SwingTreeNodeImpl<Object>>();\n\
    \      for (Integer i = 1; i < 5; i++) {\n         FileSystemNode rootNode = new\
    \ FileSystemNode(\"folder \" + i);\n         for (Integer j = 1; j <= 5; j++)\
    \ {\n            FileSystemNode leafNode =\n               new FileSystemNode(\"\
    pic\" + i + \".\" + j + \".jpg\");\n            rootNode.addChild(leafNode);\n\
    \         }\n         nodes.add(rootNode);\n      }\n   }\n   public List<SwingTreeNodeImpl<Object>>\
    \ getNodes() {\n      return nodes;\n   }\n}\n```\n\nThis bean creates a set of\
    \ “folder” nodes and adds numerous “pic” leaf nodes inside. We already know how\
    \ to create tree models using `SwingTreeNodeImpl` and other options, thus let's\
    \ just jump to the JSF page, shown in [Listing 10-16](#Chapter10.html#list_10_16).\n\
    \n***Listing 10-16.** The JSF page*\n\n```\n<h:form>\n   <rich:tree value=\"#{treeDnDBean.nodes}\"\
    \ nodeType=\"#{node.nodeType}\" var=\"node\"\n      id=\" tree\" toggleType=\"\
    client\">\n      <rich:treeNode type=\"leaf\">\n         <h:outputText value=\"\
    #{node.label}\" />\n      </rich:treeNode>\n      <rich:treeNode type=\"node\"\
    >\n         <h:outputText value=\"#{node.label}\" />\n      </rich:treeNode>\n\
    \   </rich:tree>\n</h:form>\n```\n\nNote that we are using two `<rich:treeNode>`\
    \ tags on the page, with the same content in them. Why did we do that? We are\
    \ going to implement drag-and-drop of leafs between different nodes. The simplest\
    \ way to achieve this is to define leafs as draggable and nodes as drop zones.\
    \ An easy way to do it is to have different placeholders for the drag-and-drop\
    \ behaviors. In a more complicated case where you might need to support moving\
    \ folders, you would need to have folders as drag sources and as drop zones at\
    \ the same time, plus be able to handle a restriction such as not being able to\
    \ drop the node on itself.\n\nNow let's see the result of the page rendered. We\
    \ should check that our tree was created successfully before proceeding with adding\
    \ drag-and-drop functionality. The correct tree is shown in [Figure 10-12](#Chapter10.html#fig_10_12).\n\
    \n![images](images/1012.jpg)\n\n***Figure 10-12.** Tree component*\n\nNow we are\
    \ ready to add drag-and-drop to the tree. The updated page is shown in [Listing\
    \ 10-17](#Chapter10.html#list_10_17) and followed by an explanation of what we\
    \ did.\n\n***Listing 10-17.** Adding drag-and-drop to the tree*\n\n```\n<style>\n\
    \   .rf-ind-acpt {\n      border: 2px solid green;\n   }\n</style>\n<h:form>\n\
    \   <rich:tree value=\"#{treeDnDBean.rootNode}\" nodeType=\"#{node.type}\" var=\"\
    node\"\n      toggleType=\"client\" id=\"tree\">\n      <rich:treeNode type=\"\
    node\">\n         <a4j:outputPanel>\n            <rich:dropTarget acceptedTypes=\"\
    file\" render=\"tree\" execute=\"tree\"\n               dropListener=\"#{treeDnDBean.moveFile}\"\
    \ dropValue=\"#{node}\" />\n            <h:outputText value=\"#{node.label}\"\
    \ />\n         </a4j:outputPanel>\n      </rich:treeNode>\n      <rich:treeNode\
    \ type=\"leaf\">\n         <a4j:outputPanel>\n            <rich:dragSource type=\"\
    file\" dragValue=\"#{node}\" />\n            <h:outputText value=\"#{node.label}\"\
    \ />\n         </a4j:outputPanel>\n      </rich:treeNode>\n   </rich:tree>\n</h:form>\n\
    ```\n\nLeafs are marked as draggable using `<rich:dragSupport>` and nodes became\
    \ drop zones using `<rich:dropTarget>`. We pointed value attributes (`dragValue`,\
    \ `dropValue`) of both components to the `#{node}` iteration variable, so we will\
    \ get corresponding node objects inside listeners.\n\n`<rich:dropTarget>` performs\
    \ a complete tree re-render in order to update the markup after the nodes movement.\
    \ We set the `execute` attribute to the tree itself to save its state during submission.\
    \ (Nodes toggling occurs on the client according to the `toggleType` attribute,\
    \ so by default, we will lose the state.)\n\nIdeally you may want to use partial\
    \ rendering of the updated nodes. But that just out of scope for this sample and\
    \ will make the code more complicated. We want to concentrate on drag-and-drop\
    \ functionality instead. Partial rendering using the `@rows()` function described\
    \ in iteration components chapter can also work for trees.\n\n![images](images/square.jpg)\
    \ **Note** We wrapped the content of the draggable node with an additional `<a4j:outputPanel>`\
    \ because the drag indicator created by default is just a clone of the dragged\
    \ element, and we wouldn't want a nested tree structure together with the selection\
    \ and connecting lines (in the case of a draggable node with child nodes) to be\
    \ cloned. In the current markup, only a `<span>` with a text label will be moved\
    \ when dragged. The same goes for a drop zone node. We want just the node without\
    \ its child components to become drop target.\n\nThe last step is to create the\
    \ drop listener method that will actually perform movement of the leaf node from\
    \ one parent to another. Let's look at the code in [Listing 10-18](#Chapter10.html#list_10_18).\n\
    \n***Listing 10-18.** Creating the drop listener method*\n\n```\npublic void moveFile(DropEvent\
    \ event) {\n   FileSystemNode draggedNode = (FileSystemNode) event.getDragValue();\n\
    \   FileSystemNode droppedNode = (FileSystemNode) event.getDropValue();\n    ((FileSystemNode)\
    \ draggedNode.getParent()).removeChild(draggedNode);\n   droppedNode.addChild(draggedNode);\n\
    }\n```\n\nAs you can see in the code, `DropEvent` provides two values: the drag\
    \ value and drop value. As we are passing complete node objects (referencing it\
    \ using tree iteration `var`) in the value attribute, we are getting those objects\
    \ in the listener. Next, we remove the node that we dragged from its parent and\
    \ add it to the node to which it was dropped. [Figure 10-13](#Chapter10.html#fig_10_13)\
    \ shows the tree after two files from “folder 1” get dropped into “folder 2.”\n\
    \n![images](images/1013.jpg)\n\n***Figure 10-13.** Nodes from one folder moved\
    \ via drag-and-drop to another*\n\nAs you can see, drag-and-drop with trees is\
    \ not that complicated. We are defining some node components to be draggable and\
    \ some node components to act as a drop zone. The only difference is that we are\
    \ now working with tree nodes and leafs; other than that, all the concepts are\
    \ the same.\n\n### Dragging and Dropping Within Tables\n\nUsing drag-and-drop\
    \ within tables is not difficult (it's actually even easier than dragging and\
    \ dropping within a tree), we will give you a few pointers in this short section.\n\
    \nAs we already know, drag and drop is always added to parent component. This\
    \ means that drag and drop can either be added to the table itself or a column\
    \ inside the table, but not to a row. That is, if we add `<rich:dragSupport>`\
    \ as an immediate child of table, the entire table will be draggable—probably\
    \ not what we need. If we add `<rich:dragSupport>` to a `<rich:column>`, we will\
    \ be able to drag only that single column; other columns will not be draggable.\n\
    \nIf you want to achieve “row dragging” functionality, the solution is to embed\
    \ a drag support component within every column of the table. Basically, we get\
    \ the functionality of the entire row with drag support when we add drag support\
    \ to each column.\n\nIt's also a good idea to create a good drag indicator, so\
    \ that you don't just drag the current column content (the default drag indicator\
    \ is the same content that's being dragged). With the custom indicator, no matter\
    \ which column is actually selected when dragged, the indicator will show the\
    \ same information and it will appear as only the row is being dragged.\n\n![images](images/square.jpg)\
    \ **Note** Functionality to enable native drag-and-drop support for iteration\
    \ components is planned in the future. For example, a feature such as row context\
    \ that can be dragged and dropped might be added. Check the JBoss Community RichFaces\
    \ page at [`www.jboss.org/richfaces`](http://www.jboss.org/richfaces) for updates.\n\
    \n### Summary\n\nIn this chapter we showed you that adding drag-and-drop capability\
    \ to your JSF application is very simple with RichFaces. To be able to drag any\
    \ component on the page, we add the `<rich:dragSource>` behavior. To make any\
    \ are on the page to act as a drop zone, we add a `<rich:dragTarget>` behavior.\
    \ Although drag-and-drop is happening on the client side, to communicate the drag-and-drop\
    \ action to the server, we use the standard listener approach. In addition, RichFaces\
    \ provides options to enforce which items can be dropped into which particular\
    \ drop zones, as well as the ability to customize the drag indicator. Finally,\
    \ we showed you how to add drag-and-drop functionality to trees and provided tips\
    \ on how to achieve drag-and-drop within tables.\n\n## C H A P T E R 11\n\n##\
    \ Rich Validation\n\nValidating user input is a major part of any web application.\
    \ JSF provides a number of tags to enable basic validation and makes it pretty\
    \ easy to build custom validators. JSF 2 makes validation even simpler by providing\
    \ out-of-the-box support for popular Bean Validation (JSR 303). RichFaces takes\
    \ validation to the next level and extends Bean Validation by providing client-side\
    \ validation. Client-side validation allows validation to be performed on the\
    \ client based on Bean Validation constraints. This is a must-have feature for\
    \ high-performance enterprise web sites. In addition to client-side validation,\
    \ RichFaces also provides a cross-field or object validation feature where one\
    \ or two fields can be validated together. That's exactly what we are going to\
    \ cover in this chapter.\n\n### Bean Validation\n\nTo start with client-side validation,\
    \ we first need to tell you about Bean Validation support in JSF 2. Bean Validation\
    \ is part of a Java EE stack and was born from Hibernate Validator. In fact, Hibernate\
    \ Validator is the reference implementation for Bean Validation. Instead of putting\
    \ validation in the view, place validation constraints on the model and have the\
    \ view call those validations. For example, in [Listing 11-1](#Chapter11.html#list_11_1),\
    \ Bean Validation constraints are applied to three properties. `name` has to be\
    \ at least three characters long, age has to be between two and 120, and email\
    \ has to match the regular expression.\n\n***Listing 11-1.** Bean Validation constraints\
    \ are applied to three properties*\n\n```\n@ManagedBean\n@RequestScoped\npublic\
    \ class ValidationBean {\n   @Size (min=3)\n   private String name;\n\n   @Min\
    \ (2) @Max (120)\n   private Integer age;\n\n   @Pattern (regexp=\".+@.+\\\\.[a-z]+\"\
    )\n   private String email;\n   // getters and setters\n}\n```\n\n![images](images/square.jpg)\
    \ **Note** Regular expression for the e-mail we use is rather simple. You can\
    \ find a more strict expression for validating an e-mail address.\n\nWhy is this\
    \ better than placing validation in the JSF page? If you will be accessing the\
    \ model from various JSF views, but also in other ways not from a JSF view, then\
    \ you don't need to repeat validation definitions and validation can be reused.\
    \ Luckily, Bean Validation support in JSF 2 is built-in; in other words, there\
    \ is nothing you need to do. Just bind a JSF component to a property with Bean\
    \ Validation annotation and the validation will be invoked during the Process\
    \ Validation phase as usual. [Listing 11-2](#Chapter11.html#list_11_2) shows the\
    \ JSF page where components are bound to properties from [Listing 11-1](#Chapter11.html#list_11_1).\n\
    \n***Listing 11-2.** Shows the JSF page*\n\n```\n<h:form>\n   <h:panelGrid columns=\"\
    3\">\n      <h:outputText value=\"Name:\" />\n      <h:inputText id=\"name\" value=\"\
    #{validationBean.name}\" >\n         <a4j:ajax render=\"nameMsg\"/>\n      </h:inputText>\n\
    \      <h:message for=\"name\" id=\"nameMsg\"/>\n      <h:outputText value=\"\
    Email:\" />\n      <h:inputText id=\"email\" value=\"#{validationBean.email}\"\
    \ >\n         <a4j:ajax render=\"emailMsg\"/>\n      </h:inputText>\n      <h:message\
    \ for=\"email\" id=\"emailMsg\"/>\n      <h:outputText value=\"Age:\" />\n   \
    \   <h:inputText id=\"age\" value=\"#{validationBean.age}\" >\n         <a4j:ajax\
    \ render=\"ageMsg\"/>\n      </h:inputText>\n      <h:message for=\"age\" id=\"\
    ageMsg\"/>\n   </h:panelGrid>\n</h:form>\n```\n\n![images](images/square.jpg)\
    \ **Tip** Using `<a4j:ajax>`, you can also set `bypassUpdates=\"true\"`. This\
    \ will bypass or skip the Update Model phase and the Invoke Application phase,\
    \ even if the values are valid. This is useful when only validating the form.\
    \ When only validating, you rarely have a need to update the model and invoke\
    \ the application. `bypassUpdates` is covered in more detail in [Chapter 3](#Chapter03.html#ch3).\n\
    \nThere is nothing new here; it looks like a very standard JSF page. Validation\
    \ (Ajax request) will be sent on a `change` event. To display the error message\
    \ we use the `<h:message>` component. We don't have any validation on the page\
    \ itself. Instead, when the page will be submitted, user-entered values will be\
    \ checked against the constraints specified in the managed bean via Bean Validation\
    \ annotations. Again, you get all this with JSF 2, out of the box. Running the\
    \ page will produce the result shown in [Figure 11-1](#Chapter11.html#fig_11_1).\n\
    \n![images](images/1101.jpg)\n\n***Figure 11-1.** Bean Validation standard error\
    \ messages*\n\nA note on the error messages: the messages that are rendered are\
    \ the standard messages from Bean Validation. One way to customize the error messages\
    \ is by setting the `message` property on the validation annotation. For more\
    \ ways to customize the messages, refer to Bean Validation documentation (see\
    \ the following Tip for suggestions found on the internet). For example, changing\
    \ the message for e-mail validation can be done like the following:\n\n```\n@Pattern\
    \ (regexp=\".+@.+\\\\.[a-z]+\", message=\"Email has invalid format\")\n```\n\n\
    ![images](images/square.jpg) **Tip** Learn more about Bean Validation (JSR 303)\
    \ at the Java Community Process Program web site at [`www.jcp.org/en/jsr/detail?id=303`](http://www.jcp.org/en/jsr/detail?id=303)\
    \ and from the Java EE 6 Tutorial: Using Being Validation page at [`http://download.oracle.com/javaee/6/tutorial/doc/gircz.html`](http://download.oracle.com/javaee/6/tutorial/doc/gircz.html).\n\
    \n### RichFaces Client-side Validation\n\nRichFaces takes validation to the next\
    \ level by providing client-side validation. In other words, validation can be\
    \ done on the client without sending an Ajax request. How does RichFaces do it?\
    \ RichFaces extends standard Bean Validation by bringing the validation to the\
    \ client. You might be wondering why you need client-side validation when you\
    \ can “quickly” validate with Ajax? It's true that validating with Ajax can be\
    \ fast, but an Ajax request is still sent to the server. In high-performance,\
    \ high-traffic applications, being able to validate on the client and without\
    \ sending an Ajax request can greatly improve performance.\n\nLet's take our page\
    \ and add client-side validation to it. To add client-side validation to a form\
    \ is very easy, probably too easy. All we need to do is place the `<rich:validator>`\
    \ tag inside the input component that's being validated. By default, client validation\
    \ will be invoked on the change event, but we can use any other event by setting\
    \ the event attribute. The only other thing we need to do is use `<rich:message>`\
    \ or `<rich:messages>` tags to display the error message. Client-side validation\
    \ error messages will not be displayed with the standard `<h:message>` tag. There\
    \ are no changes in the bean because we use the same Bean Validation but now bring\
    \ it to the client.\n\n[Listing 11-3](#Chapter11.html#list_11_3)shows the update\
    \ page with client-side validation.\n\n***Listing 11-3.** Shows the update page\
    \ with client-side validation*\n\n```\n<h:form>\n   <h:panelGrid columns=\"3\"\
    >\n      <h:outputText value=\"Name:\" />\n      <h:inputText id=\"name\" value=\"\
    #{validationBean.name}\" >\n        <rich:validator/>\n      </h:inputText>\n\
    \        <rich:message for=\"name\" />\n      <h:outputText value=\"Email:\" />\n\
    \      <h:inputText id=\"email\" value=\"#{validationBean.email}\" >\n       \
    \ <rich:validator/>\n      </h:inputText>\n        <rich:message for=\"email\"\
    />\n      <h:outputText value=\"Age:\" />\n      <h:inputText id=\"age\" value=\"\
    #{validationBean.age}\" >\n        <rich:validator/>\n      </h:inputText>\n \
    \       <rich:message for=\"age\"/>\n   </h:panelGrid>\n</h:form>\n```\n\nAs you\
    \ can see, `<rich:validator>` is now nested inside each input field. In fact,\
    \ it's a client behavior just like `<a4j:ajax>`. And, being a behavior, it attaches\
    \ to a parent UI component event, just like `<a4j:ajax>`. As validation is performed\
    \ on input components, the default event to which `<rich:validator>` attaches\
    \ is `change`. We also replaced `<h:message>` with `<rich:message>` because client-side\
    \ validation messages will be displayed only when using either `<rich:message>`\
    \ or `<rich:messages>`. When the page is rendered, RichFaces will render all the\
    \ necessary JavaScript to the client to perform validation by looking at bean\
    \ property and its annotation. Running the page will produce the result shown\
    \ in [Figure 11-2](#Chapter11.html#fig_11_2).\n\n![images](images/1102.jpg)\n\n\
    ***Figure 11-2.** RichFaces client-side validation*\n\nTo change the event that\
    \ triggers client-side validation, set the `event` attribute. For example, the\
    \ code that follows will invoke client-side validation on a blur event:\n\n```\n\
    <rich:validator event=\"blur\"/>\n```\n\n![images](images/square.jpg) **Caution**\
    \ `<rich:message>` or `<rich:messages>` must be used when using client-side validation.\
    \ These components provide the necessary JavaScript to be updated on the client.\
    \ And, of course, they also work with standard server-side validation as well.\n\
    \nAlthough Bean Validation is the preferred way to add validation in JSF 2, RichFaces\
    \ client validation still supports standard JSF validation. This makes it possible\
    \ to add client-side validation to a page where standard JSF validator tags are\
    \ already used.\n\nAs of writing of this book, client-side validation only supports\
    \ single field-based validation. What this means is that it's possible to invoke\
    \ client-side validation when a change event (default event) or blur event (or\
    \ any other event supported by the UI component) occurs on a particular field.\
    \ If there is a control to submit the entire form, such as when a button or link\
    \ is clicked, client-side validation will not be performed but the standard server-side\
    \ validation will be. There are plans to add client-side validation support when\
    \ a form is submitted in the future.\n\n### Using `<rich:message>` and `<rich:messages>`\n\
    \n`<rich:message>` and `<rich:messages>` are used to display messages or error\
    \ messages and work just like the standard `<h:message>` and `<h:messages>` tags,\
    \ but with a number of extra features. Just to remind you, `<h:message>` or `<rich:message>`\
    \ displays a message for a particular component via the `for` attribute. On the\
    \ other hand, `<h:messages>` or `<rich:messages>` displays all current messages\
    \ from a current JSF request.\n\nAs for differences, one major difference is that\
    \ the messages are automatically rendered, which means you don't need to point\
    \ to component via the `render` attribute. If you remember, we can achieve a similar\
    \ result where we don't need to use `render` using `<a4j:outputPanel ajaxRendered=\"\
    true\">`. [Listing 11-4](#Chapter11.html#list_11_4) shows such an example.\n\n\
    ***Listing 11-4.** An example*\n\n```\n<a4j:outputPanel ajaxRendered=\"true\"\
    >\n   <h:message for=\"email\"/>\n</a4j:outputPanel>\n```\n\n`<a4j:outputPanel\
    \ ajaxRendered=\"true\">` is always automatically rendered. So, the following\
    \ is identical to [Listing 11-4](#Chapter11.html#list_11_4):\n\n```\n<rich:message\
    \ for=\"email\"/>\n```\n\nThis message will be rendered automatically. We can\
    \ summarize it like this. Where `<a4j:outputPanel ajaxRendered=\"true\">` is an\
    \ auto-rendered panel, `<rich:message>` or `<rich:messages>` is an auto-rendered\
    \ message.\n\n![images](images/square.jpg) **Note** It's possible to turn off\
    \ auto-rendered panels or messages by setting the `limitRender=\"true\"` attribute\
    \ on action components and `<a4j:ajax>` behavior. This `limitRender` attribute\
    \ is covered in [Chapter 2](#Chapter02.html#ch2).\n\n#### Customizing Message\
    \ Icons\n\nAnother extra feature that you probably noticed is that the error message\
    \ in [Figure 11-2](#Chapter11.html#fig_11_2) now has an icon. That's again because\
    \ we used the `<rich:message>` tag. To remove the icon, we have to overwrite one\
    \ of the Skin CSS classes used by the component, as shown in [Listing 11-5](#Chapter11.html#list_11_5).\n\
    \n***Listing 11-5.** Overwrite one of the Skin CSS classes used by the component*\n\
    \n```\n<style>\n.rf-msg-err {\n   background-image: none;\n}\n</style>\n```\n\n\
    Of course, instead of removing the icon, you could point that CSS property to\
    \ your own image to be used as an icon.\n\nThe CSS class we have shown applies\
    \ to messages with `ERROR` severity; for messages with other severity levels,\
    \ use the following CSS classes: `.rf-msg-ftl (FATAL)`, `.rf-msg-inf (INFO)`,\
    \ and `.rf-msg-wrn (WARNING)`.\n\nAlso remember that `<rich:messages>` uses `rf-msgs-*`\
    \ classes while `<rich:message>` uses `rf-msg-*` classes.\n\n#### Separating Summary\
    \ and Details Styling\n\nAnother simple but cool look-and-feel customization improvement\
    \ is rendering details and summary parts of messages as separate HTML elements\
    \ and support for separately styling them. [Listing 11-6](#Chapter11.html#list_11_6)\
    \ shows the page where there is a button and messages. Let's say the button needs\
    \ to add user-friendly messages when some services required for business action\
    \ are not responsive. Look closely at the two predefined classes used in the example.\n\
    \n***Listing 11-6.** Shows the page where there is a button and messages*\n\n\
    ```\n<style>\n   .rf-msgs-sum{\n      font-weight: bold;\n   }\n   .rf-msgs-det{\n\
    \      font-style: italic;\n   }\n</style>\n<h:form>\n   <h:panelGrid>\n     \
    \ <!--Form elements-->\n      <rich:messages showDetail=\"true\" showSummary=\"\
    true\"/>\n      <a4j:commandButton value=\"Submit\"\n         action=\"#{beanValidation2.serviceAction}\"\
    />\n   </h:panelGrid>\n</h:form>\n```\n\nCode for the action is shown in [Listing\
    \ 11-7](#Chapter11.html#list_11_7).\n\n***Listing 11-7.** Code for the action*\n\
    \n```\npublic void serviceAction(){\n   //Business code\n   FacesMessage message\
    \ = new FacesMessage(\"Service Error. \",\n      \"Sorry, you caught us doing\
    \ maintenance.\");\n   FacesContext.getCurrentInstance().addMessage(null, message);\n\
    }\n```\n\nThe message consists of two parts. Summary reflects message category,\
    \ such as services error, and the details provide more specific information. Using\
    \ different CSS classes, it's possible to style summary and details differently.\
    \ Everything together is shown in [Figure 11-3](#Chapter11.html#fig_11_3).\n\n\
    ![images](images/1103.jpg)\n\n***Figure 11-3.** Displaying summary and details\
    \ parts*\n\n#### Changing `<rich:messages>` Layout\n\nBy default `<rich:messages>`\
    \ is rendered as a set of `<span>` elements with the `display=\"block\"` CSS property\
    \ defined. Messages are aligned vertically with icon images on the left. If you\
    \ want to show the messages as a simple HTML unordered list, you can change those\
    \ `<span>` element display properties to be list-items, as shown in [Listing 11-8](#Chapter11.html#list_11_8).\n\
    \n***Listing 11-8.** Changing those `<span>` element display properties to be\
    \ list-items*\n\n```\n<style>\n.rf-msgs-err{\n   display:list-item;\n   margin-left:20px;\n\
    \   padding-left:0px;\n   background-image:none;\n}\n</style>\n<h:form>\n   <rich:messages/>\n\
    \   <h:panelGrid columns=\"2\">\n      <h:outputText value=\"Name:\" />\n    \
    \  <h:inputText label=\"Name\" id=\"name\" required=\"true\">\n         <f:validateLength\
    \ minimum=\"3\" />\n      </h:inputText>\n      <h:outputText value=\"Job:\" />\n\
    \      <h:inputText label=\"Job\" id=\"job\" required=\"true\">\n         <f:validateLength\
    \ minimum=\"3\" maximum=\"50\" />\n      </h:inputText>\n      <f:facet name=\"\
    footer\">\n         <a4j:commandButton value=\"Ajax Validate\"/>\n      </f:facet>\n\
    \   </h:panelGrid>\n</h:form>\n```\n\nOn the page there are two inputs with some\
    \ validation applied using JSF tags, and an Ajax button, which validates the form\
    \ and the `<rich:messages>` components.\n\nNotice that we added `<style>` definition.\
    \ We are just changing the `display` property to `list-item`, removing the icon\
    \ and making minor adjustments required because of its span-based markup. The\
    \ result is shown in [Figure 11-4](#Chapter11.html#fig_11_4).\n\n![images](images/1104.jpg)\n\
    \n***Figure 11-4.** Displaying messages as a simple list*\n\nIf you need table-based\
    \ markup, update the `display` property to have `table-row` value and make CSS\
    \ adjustments considering that span as a table row.\n\n#### Falling Back to Server\
    \ Validation\n\nWhen you use a validation that doesn't have its client-side implementation,\
    \ such as when a custom validation is used, RichFaces will automatically fall\
    \ back to server-side Ajax validation. You don't have to do anything. Currently\
    \ RichFaces only provides client-side implementations for all validations from\
    \ Bean Validation (JSR 303) specification. If we take Hibernate Validator, which\
    \ is the reference implementation (used in our examples), it goes beyond the specification\
    \ and provides additional validations, such as `@Email`. `@Email` will make sure\
    \ the input has a valid e-mail format. RichFaces currently doesn't support this\
    \ annotation and in our examples we used a `@Pattern` annotation. But, using `@Email`,\
    \ we can precisely see when client-side validation is used and when server-side\
    \ validation is used.\n\n![images](images/square.jpg) **Note** RichFaces provides\
    \ client-side implementation for all validators in a `javax.validation.*` package.\
    \ The list of annotations can be found at The Java EE 6 Tutorial: Using Bean Validation\
    \ page at [`http://download.oracle.com/javaee/6/tutorial/doc/gircz.html`](http://download.oracle.com/javaee/6/tutorial/doc/gircz.html).\n\
    \nFirst, we need to update the bean. [Listing 11-9](#Chapter11.html#list_11_9)\
    \ shows using `@Email` instead of the `@Pattern` annotation on an `email` property\
    \ (only partial code is shown, related to `@Email` annotation).\n\n***Listing\
    \ 11-9.** Updated managed bean*\n\n```\nimport org.hibernate.validator.constraints.Email;\n\
    // other imports\n@ManagedBean\n@RequestScoped\npublic class ValidationBean {\n\
    \   @Email\n   private String email;\n   // Other properties, getters and setters\n\
    }\n```\n\nYou will notice that `@Email` annotation is coming from a `org.hibernate.validator.*`\
    \ package.\n\nWhen you run the page, you won't see any difference and that's the\
    \ desired result. Even though there is no client-side implementation for the `@Email`\
    \ constraint, everything worked as expected; validation for `email` fell back\
    \ to the server-side behind the scenes. Placing `<a4j:log>` tag on the page is\
    \ a very quick and easy way to see when client-side validation is invoked and\
    \ when server-side validation is invoked. If you remember, `<a4j:log>` shows the\
    \ Ajax request and response information. If client-side validation is used, then\
    \ the `<a4j:log>` won't display any output. If server-side validation is used,\
    \ then the `<a4j:log>` will display the Ajax request and response information.\n\
    \n### Graph Validator\n\nValidating a component's value is simple in JSF, but\
    \ comparing whether two inputs are equals or against any other validation rules,\
    \ unfortunately, is not an easy task. No built-in JSF feature allows us to “look”\
    \ at two or more values during validation. You can find workarounds, but RichFaces\
    \ makes this task a lot simpler with its `<rich:graphValidator>` tag. The simplest\
    \ way to understand would be to look at an example, and the simplest example is\
    \ to see whether two string inputs are equal. Let's start with the JSF page shown\
    \ in [Listing 11-10](#Chapter11.html#list_11_10).\n\n***Listing 11-10.** The JSF\
    \ page*\n\n```\n<rich:messages />\n<h:form>\n   <h:panelGrid columns=\"2\">\n\
    \      <h:outputText value=\"Text 1:\" />\n      <h:inputText id=\"text1\" value=\"\
    #{graphValidationBean.text1}\" />\n      <h:outputText value=\"Text 2:\" />\n\
    \      <h:inputText id=\"text2\" value=\"#{graphValidationBean.text2}\" />\n \
    \  </h:panelGrid>\n   <h:commandButton action=\"result.xhtml\" value=\"Check Input\"\
    \ />\n</h:form>\n```\n\nThe page is very simple; it has only two inputs. Our goal\
    \ is to validate each input individually but also make sure both inputs are equals.\
    \ This is very similar to confirming a password field that you see on many forms\
    \ today. One more thing to note is that the error messages are displayed at the\
    \ top of the page using `<rich:messages>`.\n\nWhen the button is clicked, we navigate\
    \ to the `result.xhtml` page, if the input is valid and also equal. This page\
    \ can be as simple as displaying the following:\n\n```\n<h4>Inputs are equal.</h4>\n\
    ```\n\nValidation constraints are defined in [Listing 11-11](#Chapter11.html#list_11_11).\n\
    \n***Listing 11-11.** Defining validation constraints*\n\n```\n@ManagedBean\n\
    @RequestScoped\npublic class GraphValidationBean implements java.lang.Cloneable{\n\
    \   @NotNull\n   @Size (min=3,max=10, message=\"Text 1 must be between {min} and\
    \ {max}.\")\n   private String text1;\n\n   @NotNull\n   @Size (min=3,max=10,\
    \ message=\"Text 2 must be between {min} and {max}.\")\n   private String text2;\n\
    \n   @AssertTrue (message=\"Text 1 and Text 2 are not equal\")\n   public boolean\
    \ isTextEqual (){\n      return text1.equals(text2);\n   }\n   @Override\n   public\
    \ Object clone() throws CloneNotSupportedException {\n      return super.clone();\n\
    \   }\n   // Getters and setters\n}\n```\n\nWe can go ahead and run the page.\
    \ Validation should be invoked as expected. However, we are also able to navigate\
    \ to the next page, even if the values in the inputs are not equals. If you look\
    \ carefully at the page and bean, you will notice that input components are bound\
    \ to `text1` and `text2` properties. But, there is another constraint defined\
    \ with `@AssertTrue`. It's not bound to any UI component on the page, but that's\
    \ also the constraint that we need. It will check whether the two inputs are the\
    \ same. How do we make sure this constraint is checked? We enclose all the inputs\
    \ inside `<rich:graphValidator>` and set the tags `value` attribute to point to\
    \ the managed bean named `graphValidator`, as shown in [Listing 11-12](#Chapter11.html#list_11_12).\n\
    \n***Listing 11-12.** Using `<rich:graphValidator>`*\n\n```\n<rich:messages for=\"\
    gv\"/>\n<h:form>\n    <rich:graphValidator value=\"#{graphValidatorBean}\" id=\"\
    gv\">\n      <h:panelGrid columns=\"2\">\n         <h:outputText value=\"Text\
    \ 1:\" />\n         <h:inputText id=\"text1\" value=\"#{graphValidationBean.text1}\"\
    \ />\n         <h:outputText value=\"Text 2:\" />\n         <h:inputText id=\"\
    text2\" value=\"#{graphValidationBean.text2}\" />\n      </h:panelGrid>\n    </rich:graphValidator>\n\
    \   <h:commandButton action=\"result.xhtml\" value=\"Check Input\" />\n</h:form>\n\
    ```\n\nWhen the page is submitted, each component is validated, as usual, during\
    \ the Process Validations phase. Error messages are displayed at the top of the\
    \ page, as shown in [Figure 11-5](#Chapter11.html#fig_11_5).\n\n![images](images/1105.jpg)\n\
    \n***Figure 11-5.** Validating each input separately*\n\nIf every single component\
    \ passes its validation, that's when the graph validator comes into play. As you\
    \ can see, the `<rich:graphValidator>` value property is bound to the managed\
    \ bean. That's what triggers the validation to be run for the entire bean again,\
    \ including the constraint that wasn't bound to any UI component. So basically,\
    \ all the properties that are bound are validated again, and they already hold\
    \ the valid values. Plus, we validate all the other constraints in the bean. In\
    \ our example, that would be `@AssertTrue`, as shown in [Figure 11-6](#Chapter11.html#fig_11_6).\n\
    \n![images](images/1106.jpg)\n\n***Figure 11-6.** Graph validator error message*\n\
    \nWhere does this validation happen? It happens during the Process Validations\
    \ phase. You are probably wondering, how can validation be invoked on the entire\
    \ bean if the values are not yet set in the properties because we haven't passed\
    \ the Update Model phase? RichFaces makes a copy or clones (called `clone()`)\
    \ the bean, the values submitted are copied into the cloned copy, and then the\
    \ validation is invoked on the cloned copy. That's the reason we need to wrap\
    \ all the inputs that bound to that bean's properties with the `<rich:graphValidator>`\
    \ tag, and the bean has to implement the `java.lang.Cloneable` interface. The\
    \ only exception to this is noted in the following caution.\n\n![images](images/square.jpg)\
    \ **Caution** If the bean doesn't implement `Cloneable, CloneNotSupportedException`\
    \ exception is thrown. In this case, when RichFaces attempts to clone the object,\
    \ then validation will be done during the Update Model phase (after the model\
    \ will be actually updated so all the values available). Don't worry, you won't\
    \ see this exception because RichFaces will catch it and will perform validation\
    \ during the Update Model phase.\n\n![images](images/square.jpg) **Note** For\
    \ graph validator to be invoked during the Process Validations phase, the `clone()`\
    \ method has to be overwritten and be public. In a case of simple properties,\
    \ you don't need to do anything and just call `super()`. If there are other properties—such\
    \ as custom object (so a deep clone needed), lists, or maps—the clone mechanism\
    \ has to be implemented by the developer.\n\n### Summary\n\nValidation is a crucial\
    \ part of any web application. JSF 2 makes validation easy with out-of-the-box\
    \ support for powerful and popular Bean Validation. RichFaces takes validation\
    \ to the next level by providing client-side validation. RichFaces simply extends\
    \ the Bean Validation model by bringing it to the client. Validation can be performed\
    \ on the client without sending an Ajax request. In situations where client-side\
    \ implementation for a particular validation is not available, RichFaces quietly\
    \ falls back to server-side validation without the developer needing to do anything.\
    \ Finally, RichFaces provides graph validator, which enables validation of the\
    \ entire bean again. The graph validator validates all properties bound to UI\
    \ components, as well as properties not bound to UI components. Graph validator\
    \ is useful for conditional validation, such as comparing whether two inputs satisfy\
    \ a validation rule.\n\n## C H A P T E R 12\n\n## Rich Components JavaScript API,\
    \ Client Functions, and Using jQuery\n\nIn this chapter we are going to cover\
    \ a number of miscellaneous but important components and functions. We will start\
    \ with the widely used `#{rich:component()}` client function and `<rich:componentControl>`\
    \ behavior. Both make it possible to call the JavaScript API available on a component.\
    \ We will then cover other client functions. We will finally cover two remaining\
    \ components: `<rich:jQuery>`, which integrates the jQuery JavaScript framework\
    \ into a JSF application, and `<rich:hashParam>`, which allows passing a group\
    \ of client-side parameters to a client-side component.\n\n### Invoking a Component’s\
    \ JavaScript API\n\nIn this section, we are going to show you two different ways\
    \ to invoke the component’s JavaScript API.\n\n#### Using `#rich:component(id)`\
    \ Function\n\nWe already covered `#{rich:component()}` in [Chapter 4](#Chapter04.html#ch4)\
    \ when we introduced rich components. But let’s cover it here briefly again. As\
    \ you know by now, many RichFaces components provide JavaScript API. When a component\
    \ provides JavaScript API, it’s possible to control the component on the client,\
    \ such as switching tabs in case of a tab component, or showing and hiding in\
    \ the case of a popup component. Before we can invoke a JavaScript function on\
    \ a component, we need to get a reference to that component on the client, and\
    \ that’s exactly what `#{rich:component()}` does. When placed on a page, it renders\
    \ a JavaScript that obtains a reference to the component in the browser.\n\nLet’s\
    \ see how it works in an example. We will start with one of the most popular components\
    \ in RichFaces: `<rich:popupPanel>`. This popup is usually rendered on the page,\
    \ but it is hidden from view. Showing and hiding a popup is done on the client-side\
    \ (e.g., the browser). [Listing 12-1](#Chapter12.html#list_12_1) shows a popup\
    \ panel.\n\n***Listing 12-1.** A popup panel*\n\n```\n<h:outputLink value=\"#\"\
    \n   onclick=\"#{rich:component('popup')}.show();return false;\">Open</h:outputLink>\n\
    \   <rich:popupPanel header=\"RichFaces\" id=\"popup\">\n      <h:panelGrid>\n\
    \         <h:outputText value=\"This is a RichFaces popup\" />\n         <h:outputLink\
    \ value=\"#\"\n            onclick=\"#{rich:component('popup')}.hide();\">Close</h:outputLink>\n\
    \      </h:panelGrid>\n</rich:popupPanel>\n```\n\nThe most important code is in\
    \ the `onclick` event in both open and close links. As we already mentioned, showing\
    \ and hiding a panel is done on the client, so we need to get a reference to the\
    \ popup component on the client and invoke JavaScript API. That’s exactly what\
    \ we do with `#{rich:component()}`. `#{rich:component()}` gives a reference to\
    \ all the component JavaScript API. With this reference, we can invoke any available\
    \ function. In our example, we call `show()` to show the component, and `hide()`\
    \ to hide the component. How do you know what API is available? RichFaces documentation\
    \ lists all functions for each component. Whenever you need to get a reference\
    \ to the component’s JavaScript API, you use `#{rich:component()}`, passing it\
    \ the component id, as follows:\n\n```\n#{rich:component(id)}\n```\n\nIt’s important\
    \ to point out that the function takes the component id, not the client id.\n\n\
    ![images](images/square.jpg) **Tip** RichFaces documentation at [`www.jboss.org/richfaces`](http://www.jboss.org/richfaces)\
    \ lists all JavaScript API for each component.\n\nSo far we used `show()` without\
    \ any arguments. If we want to pass any arguments to the popup panel, we have\
    \ to use this signature: `show(event, {param1:value, param2:value})`. [Listing\
    \ 12-2](#Chapter12.html#list_12_2) shows the updated popup example.\n\n***Listing\
    \ 12-2.** Passing arguments to the popup panel*\n\n```\n<h:outputLink value=\"\
    #\" onclick=\"#{rich:component('popup')}.show(event,\n   {top:5,left:5,width:200,height:250});\"\
    >Open</h:outputLink>\n\n<rich:popupPanel header=\"RichFaces\" id=\"popup\">\n\
    \   <h:panelGrid>\n      <h:outputText value=\"This is a RichFaces pop-up\" />\n\
    \      <h:outputLink value=\"#\"\n         onclick=\"#{rich:component('popup')}.hide();\"\
    >Close</h:outputLink>\n   </h:panelGrid>\n</rich:popupPanel>\n```\n\n`event` is\
    \ a variable and the parameters are passed in JSON format.\n\n![images](images/square.jpg)\
    \ **Tip** Any component JavaScript function that takes arguments should either\
    \ be invoked with no arguments (if supports calls with just default values) or\
    \ should pass all the arguments with `event` being the first: `foo(event, options)`.\n\
    \nLet’s try another example using the accordion component. When using an accordion,\
    \ to switch to a different item we just click that item. Another way to switch\
    \ items is to use the JavaScript API that the component provides. [Figure 12-1](#Chapter12.html#fig_12_1)\
    \ shows the accordion followed by the code listing.\n\n![images](images/1201.jpg)\n\
    \n***Figure 12-1.** RichFaces accordion panel with three major U.S. cities*\n\n\
    [Listing 12-3](#Chapter12.html#list_12_3) shows the page code.\n\n***Listing 12-3.**\
    \ The page code*\n\n```\n<h:form>\n   <rich:panel style=\"width:350px\">\n   \
    \   <rich:accordion id=\"cities\">\n         <rich:accordionItem header=\"New\
    \ York City\" name=\"nyc\">\n            <h:outputText value=\"You selected New\
    \ York City\" />\n         </rich:accordionItem>\n         <rich:accordionItem\
    \ header=\"San Francisco\" name=\"sf\">\n            <h:outputText value=\"You\
    \ selected San Francisco\" />\n         </rich:accordionItem>\n         <rich:accordionItem\
    \ header=\"Los Angeles\" name=\"la\">\n            <h:outputText value=\"You selected\
    \ Los Angeles\" />\n         </rich:accordionItem>\n      </rich:accordion>\n\
    \   </rich:panel>\n</h:form>\n```\n\nAccordion provides JavaScript API for switching\
    \ items. We are going to add a button for each city and when the button is clicked,\
    \ the item corresponding to a city will be selected. [Listing 12-4](#Chapter12.html#list_12_4)\
    \ shows the three buttons.\n\n***Listing 12-4.** Shows the three buttons*\n\n\
    ```\n<h:form>\n   <rich:panel style=\"width:350px\">\n      <rich:accordion id=\"\
    cities\">\n         <rich:accordionItem header=\"New York City\" name=\"nyc\"\
    >\n            <h:outputText value=\"You selected New York City\" />\n       \
    \  </rich:accordionItem>\n         <rich:accordionItem header=\"San Francisco\"\
    \ name=\"sf\">\n            <h:outputText value=\"You selected San Francisco\"\
    \ />\n         </rich:accordionItem>\n         <rich:accordionItem header=\"Los\
    \ Angeles\" name=\"la\">\n            <h:outputText value=\"You selected Los Angeles\"\
    \ />\n         </rich:accordionItem>\n      </rich:accordion>\n\n      <input\
    \ type=\"button\" value=\"New York City\"\n         onclick=\"#{rich:component('cities')}.switchToItem('nyc')\"\
    \ />\n      <input type=\"button\" value=\"San Francisco\"\n         onclick=\"\
    #{rich:component('cities')}.switchToItem('sf')\" />\n      <input type=\"button\"\
    \ value=\"Los Angeles\"\n         onclick=\"#{rich:component('cities')}.switchToItem('la')\"\
    \ />\n   </rich:panel>\n</h:form>\n```\n\nWe again use the `#{rich:component()}`\
    \ client function to get a reference to the accordion component first (`cities`\
    \ id). Once we have a reference, we can invoke any available JavaScript function\
    \ on the component. In our example, we call `switchToItem()`, passing it the name\
    \ of the accordion item to which we want to switch.\n\nIn [Listing 12-4](#Chapter12.html#list_12_4),\
    \ the buttons were placed inside the form. That’s not required and the buttons\
    \ could have been placed outside the form. Usually, when invoking a JavaScript\
    \ function, the form is not required because we are not making any requests to\
    \ the server. However it’s possible that the component itself will send an Ajax\
    \ request according to the API called. The default switch type for an accordion\
    \ is `ajax`. This means that when a button is clicked it calls the API method\
    \ on `<rich:accordion>` to switch the item, and an Ajax request is sent by the\
    \ `<rich:accordion>` to the server. An easy way to check this is to place an `<a4j:log>`\
    \ component on the page. Whenever an Ajax request is sent, this component will\
    \ output request/response information. If we change accordion’s `switchType=\"\
    client\"`, then no request will be sent because all the items are rendered on\
    \ first page load and further switching is done entirely on the client.\n\nIn\
    \ addition to switching to a named item like we did in our example, [Listing 12-4](#Chapter12.html#list_12_4),\
    \ accordion also supports switching to first, last, next, and previous items.\
    \ [Listing 12-5](#Chapter12.html#list_12_5) shows these four buttons.\n\n***Listing\
    \ 12-5.** Shows the first, last, next, and previous items buttons*\n\n```\n<input\
    \ type=\"button\" value=\"First\"\n   onclick=\"#{rich:component('cities')}.switchToItem('@first')\"\
    \ />\n<input type=\"button\" value=\"Next\"\n   onclick=\"#{rich:component('cities')}.switchToItem('@next')\"\
    \ />\n<input type=\"button\" value=\"Previous\"\n   onclick=\"#{rich:component('cities')}.switchToItem('@prev')\"\
    \ />\n<input type=\"button\" value=\"Last\"\n   onclick=\"#{rich:component('cities')}.switchToItem('@last')\"\
    \ />\n```\n\nThe accordion provides predefined names for switching to these tabs,\
    \ such as `@first`, and this naming format closely follows JSF 2 convention.\n\
    \n![images](images/square.jpg) **Tip** Other RichFaces components that can be\
    \ switched and are built out of “items” such as `<rich:accordionItem>`, which\
    \ provide the same `switchToItem()` API and the same predefined names.\n\n####\
    \ Using `<rich:componentControl>`\n\nIn the previous section we showed you how\
    \ to invoke component’s JavaScript API using the `#{rich:component()}` function.\
    \ There is another way to invoke the API. This second approach is more declarative\
    \ and uses `<rich:componentControl>` behavior. The name of the component implies\
    \ what it does. It makes it possible to control a component from another component\
    \ that is done via JavaScript.\n\nLet’s take two examples from previous sections\
    \ and update them to use `<rich:componentControl>`. [Listing 12-6](#Chapter12.html#list_12_6)\
    \ shows the popup panel example updated using `<rich:componentControl>` instead\
    \ of the `#{rich:component()}` function.\n\n***Listing 12-6.** Shows the popup\
    \ panel example updated using `<rich:componentControl>` instead of the `#{rich:component()}`\
    \ function*\n\n```\n<h:outputLink value=\"#\">\n   <h:outputText value=\"Open\"\
    \ />\n   <rich:componentControl event=\"click\" target=\"popup\" operation=\"\
    show\" />\n</h:outputLink>\n\n<rich:popupPanel header=\"RichFaces\" id=\"popup\"\
    >\n   <h:panelGrid>\n      <h:outputText value=\"This is a RichFaces pop-up\"\
    \ />\n      <h:outputLink value=\"#\">\n      <h:outputText value=\"Close\" />\n\
    \         <rich:componentControl event=\"click\" target=\"popup\"\n          \
    \  operation=\"hide\" />\n      </h:outputLink>\n   </h:panelGrid>\n</rich:popupPanel>\n\
    ```\n\nLet’s take a closer look at the opening link. Instead of using `#{rich:component()}`\
    \ we nest `<rich:componentControl>` behavior inside. `<rich:componentControl>`\
    \ attaches itself to the parent component and then invokes a JavaScript function\
    \ on another component. We specified the following three attributes: `event=\"\
    click\"` indicates which event to listen on the parent component; `target=\"popup\"\
    ` indicates on which component to invoke the function; `operation=\"show\"` indicates\
    \ which function to invoke on the component. This looks very similar to using\
    \ `#{rich:component()}`, simply done in a more declarative fashion. To close (hide)\
    \ the popup, we use the same setup, but instead of invoking the show operation\
    \ (`show()` function), we invoke the hide operation (`hide()` function). One major\
    \ difference between these two approaches is that the `#{rich:component()}` function\
    \ can be used with any HTML tag, but being a behavior, `<rich:componentControl>`\
    \ can be attached only to another JSF component.\n\n![images](images/square.jpg)\
    \ **Tip** When specifying operation in `<rich:componentControl>`, only the operation\
    \ (function) name is used, without parenthesis ().\n\n##### Passing Parameters\
    \ with `<a4j:param>`\n\nNow let’s update the accordion example to use `<rich:componentControl>`.\
    \ We are not going to repost the accordion markup because it stays the same. We\
    \ will only update the buttons. When we switched accordion items, we passed the\
    \ item’s name to the `switchToItem()` function. Let’s see how we can do the same\
    \ using `<rich:componentControl>`. [Listing 12-7](#Chapter12.html#list_12_7) shows\
    \ using `<rich:componentControl>` on external buttons to control the items.\n\n\
    ***Listing 12-7.** Using `<rich:componentControl>` on external buttons to control\
    \ the items*\n\n```\n<h:commandButton value=\"New York\">\n   <rich:componentControl\
    \ event=\"click\" target=\"cities\"\n      operation=\"switchToItem\">\n     \
    \ <a4j:param value=\"nyc\" />\n   </rich:componentControl>\n</h:commandButton>\n\
    <h:commandButton value=\"San Francisco\">\n   <rich:componentControl event=\"\
    click\" target=\"cities\"\n      operation=\"switchToItem\">\n      <a4j:param\
    \ value=\"sf\" />\n   </rich:componentControl>\n</h:commandButton>\n<h:commandButton\
    \ value=\"Los Angeles\">\n   <rich:componentControl event=\"click\" target=\"\
    cities\"\n      operation=\"switchToItem\">\n      <a4j:param value=\"la\" />\n\
    \   </rich:componentControl>\n</h:commandButton>\n```\n\nNotice that for the operation\
    \ attribute, we specify only the function name; there is no option to pass parameters\
    \ there. How do we pass the parameter? We include `<a4j:param>` with the accordion\
    \ item’s name inside `<rich:componentControl>`. It’s possible to pass multiple\
    \ parameters; they will be applied in the order the `<a4j:param>` tag is listed.\n\
    \nInstead of `<a4j:param>`, we can also use the standard `<f:param>` tag. Both\
    \ will give us the same result. [Listing 12-8](#Chapter12.html#list_12_8) shows\
    \ using `<f:param>` with a button.\n\n***Listing 12-8.** Using `<f:param>` with\
    \ a button*\n\n```\n<h:commandButton value=\"New York\">\n   <rich:componentControl\
    \ event=\"click\" target=\"cities\"\n      operation=\"switchToItem\">\n     \
    \ <f:param value=\"nyc\" />\n   </rich:componentControl>\n</h:commandButton>\n\
    ```\n\nHowever, `<a4j:param>` adds one very important feature. In addition to\
    \ passing parameters evaluated from server-side expressions to client functions,\
    \ the `<a4j:param>` value can also be evaluated as a client-side JavaScript expression\
    \ when the `noEscape` attribute is set to `true`. We show an example of this in\
    \ next section.\n\n##### Passing JavaScript Hash with `<rich:hashParam>`\n\nIn\
    \ previous sections we saw how to pass string-based parameters. However, it’s\
    \ also possible to pass a JavaScript hash to a function. RichFaces now comes with\
    \ a new component called `<rich:hashParam>`, which allows you to pass a JavaScript\
    \ hash or hash table to a JavaScript function. A hash table is very similar to\
    \ a hash map; it consists of keys and associated values.\n\nLet’s look at an example\
    \ in [Listing 12-9](#Chapter12.html#list_12_9), which shows opening a popup panel\
    \ and passing information such as width, height, and positioning via the `<rich:hashParam>`\
    \ tag.\n\n***Listing 12-9.** Opening a popup panel and passing information via\
    \ the `<rich:hashParam>` tag*\n\n```\n<h:outputLink value=\"#\">\n   <h:outputText\
    \ value=\"Open\" />\n   <rich:componentControl event=\"click\" target=\"popup\"\
    \ operation=\"show\">\n      <a4j:param noEscape=\"true\" value=\"event\" />\n\
    \      <rich:hashParam>\n         <a4j:param name=\"width\" value=\"500\" />\n\
    \         <a4j:param name=\"height\" value=\"300\" />\n         <a4j:param name=\"\
    minWidth\" value=\"300\" />\n         <a4j:param name=\"minHeight\" value=\"150\"\
    \ />\n         <a4j:param noEscape=\"true\" name=\"left\"\n            value=\"\
    (jQuery(window).width()/2)-250\" />\n         <a4j:param noEscape=\"true\" name=\"\
    top\"\n            value=\"(jQuery(window).height()/2)-150\" />\n      </rich:hashParam>\n\
    \   </rich:componentControl>\n</h:outputLink>\n\n<rich:popupPanel header=\"RichFaces\"\
    \ id=\"popup\">\n   <h:panelGrid>\n      <h:outputText value=\"This is a RichFaces\
    \ pop-up\" />\n      <h:outputLink value=\"#\">\n         <h:outputText value=\"\
    Close\" />\n         <rich:componentControl event=\"click\" target=\"popup\"\n\
    \            operation=\"hide\"/>\n      </h:outputLink>\n   </h:panelGrid>\n\
    </rich:popupPanel>\n```\n\nFrom [Listing 12-9](#Chapter12.html#list_12_9), all\
    \ parameters passed to the popup are inserted into a JavaScript hash tab with\
    \ the `<rich:hashParam>` tag. The actual parameter is defined with the `<a4j:param>`\
    \ tag but you can also use the standard `<f:param>` for all except top, left,\
    \ and event parameters. For top and left, the value is not a string-based value\
    \ but a jQuery function that calculates the positioning based on the current browser\
    \ window size. Setting `noEscape=\"true\"` is required in those cases; otherwise,\
    \ the parameters will be treated as server-side expressions and the jQuery function\
    \ will not be invoked.\n\n![images](images/square.jpg) **Note** As of writing\
    \ of this book, only `<rich:popupPanel>` component accepts a JavaScript hash table\
    \ as an argument to its API. We anticipate more components will support JavaScript\
    \ hash table arguments in the future.\n\n![images](images/square.jpg) **Note**\
    \ You might be wondering why we pass `<a4j:param noEscape=\"true\" value=\"event\"\
    >` as the first parameter. This is required because the `show` method has the\
    \ following signature `: show(event, options)`. You can invoke `show()` without\
    \ any arguments, but if you do provide arguments, both must be specified.\n\n\
    ### Other RichFaces Client Functions\n\nIn addition to the widely used `#{rich:component()}`\
    \ to invoke client JavaScript API, RichFaces provides the following client-side\
    \ functions:\n\n*   `#{rich:clientId(id)}`: Returns a client id for a component\
    \ from passed component id\n*   `#{rich:element(id)}`: Returns a DOM element from\
    \ passed component id\n*   `#{rich:findComponent(id)}`: Returns a server-side\
    \ component instance for passed component id\n*   `#{rich:isUserInRole(role)}`:\
    \ Returns if the user has a specified role\n\nLet’s try the first three in an\
    \ example and then come back to the `#{rich:userInRole()}` function. To start,\
    \ we are going to place a `<rich:calendar>` on the page, shown in [Listing 12-10](#Chapter12.html#list_12_10),\
    \ and use this component with all the functions.\n\n***Listing 12-10.** Placing\
    \ a `<rich:calendar>` on the page*\n\n```\n<h:form id=\"form\">\n   <rich:calendar\
    \ popup=\"true\" id=\"calendar\" />\n</h:form>\n```\n\nFirst, as these are client-side\
    \ functions, they are invoked via EL, inside `#{}`. If we need to get the calendar’s\
    \ client id, we place this on a page, as follows:\n\n```\n#{rich:clientId('calendar')}\n\
    ```\n\nAnd we get the following output:\n\n```\nform:calendar\n```\n\nWe place\
    \ them on a page because it’s an easy way to test and see what they produce. However,\
    \ in real applications, you will most likely use them from inside a JavaScript\
    \ function.\n\nIf we need to get a calendar’s DOM element, we place this on a\
    \ page, as follows:\n\n```\n#{rich:element('calendar')}\n```\n\nAnd we get the\
    \ following output:\n\n```\ndocument.getElementById('form:calendar')\n```\n\n\
    Let’s also try `#{rich:component}` and see what we get. So, we place the following\
    \ on a page:\n\n```\n#{rich:component('calendar')}\n```\n\nAnd we get the following\
    \ result:\n\n```\nRichFaces.$('form:calendar')\n```\n\nBehind the scenes this\
    \ is a jQuery selector that will let us call the available JavaScript functions\
    \ on this component. We don’t recommend using JavaScript from `#{rich:component(id)}`\
    \ directly anywhere. `#{rich:component(id)}` is a shortcut and in case of changes\
    \ to implementation or refactoring, you won’t have to make any changes to the\
    \ application.\n\nLet’s now try `#{rich:findComponent}`, which is best demonstrated\
    \ in an example shown in [Listing 12-11](#Chapter12.html#list_12_11).\n\n***Listing\
    \ 12-11.** Using `#{rich:findComponent}`*\n\n```\n<h:form id=\"form\">\n   <h:panelGrid>\n\
    \      <h:outputText value=\"Text:\" />\n      <h:inputText id=\"input\">\n  \
    \       <a4j:ajax event=\"keyup\" render=\"echo\"/>\n      </h:inputText>\n  \
    \    <h:outputText value=\"Echo:\" />\n      <h:outputText id=\"echo\" value=\"\
    #{rich:findComponent('input').value}\" />\n   </h:panelGrid>\n</h:form>\n```\n\
    \nThis example shows a somewhat typical echo-like example. Any input typed is\
    \ echoed immediately on the next line because we use the `keyup` event. What’s\
    \ interesting is that there is no managed bean or managed property bound and used\
    \ in this example. The page in our example is submitted as always and the value\
    \ entered is set into the component. As we don’t bind the input component to a\
    \ managed bean property, the value just stays in the component. Using `#{rich:findComponent(id)}`,\
    \ we find that input component in a JSF component tree, get its value, and then\
    \ display it on the page with `#{rich:findComponent(id).value}`. In other words,\
    \ we are working directly with a JSF component tree, without needing a backing\
    \ bean. This could be useful if you need to test something quickly without having\
    \ to build and bind to a model.\n\nThe last function is called `#{rich:isUserInRole(role)}`.\
    \ It provides a shortcut to a standard Java EE security feature, which in turn\
    \ makes the following call:\n\n```\nfacesContext.getExternalContext.getUserInRole(role)\n\
    ```\n\nWhat’s good about this function is that it doesn’t care how and where roles\
    \ are defined. Roles can be defined in `web.xml` but can also be defined somewhere\
    \ else, depending on application configuration. The function returns `true` if\
    \ current user is in the provided role. For example, suppose only the administrator\
    \ should see some part of a page, as shown in [Listing 12-12](#Chapter12.html#list_12_12).\n\
    \n***Listing 12-12.** Example of the administrator’s defined role*\n\n```\n<rich:panel\
    \ header=\"Admin panel\" rendered=\"#{rich:isUserInRole('admin')}\">\n  Very sensitive\
    \ information\n</rich:panel>\n\n <rich:panel header=\"User panel\">\n   General\
    \ information\n</rich:panel>\n```\n\nIn the above example, unless the current\
    \ user is authenticated as admin, the top panel will not be rendered. For this\
    \ to work, appropriate security roles need to be defined in the `web.xml` file.\n\
    \n### Using jQuery with `<rich:jQuery>`\n\njQuery JavaScript framework is at the\
    \ heart of RichFaces because it’s the only JavaScript framework used (and extended)\
    \ by RichFaces. The following is a jQuery description from jQuery.com: “jQuery\
    \ is a fast and concise JavaScript Library that simplifies HTML document traversing,\
    \ event handling, animating, and Ajax interactions for rapid web development.”^([1](#Chapter12.html#CH-12-FN-1))\n\
    \nWe also would like to add that jQuery is one of the most popular JavaScript\
    \ frameworks out there. We highly recommend that you do some reading about how\
    \ jQuery works. A good starting point is the JQuery: The Write Less, Do More,\
    \ JavaScript Library web site at [`http://jquery.com`](http://jquery.com). You\
    \ can also find a number of good books out there. One of them is *jQuery: Novice\
    \ to Ninja* by Earle Castledine and Craig Sharkie (SitePoint, 2010).\n\njQuery\
    \ works with the browser DOM. With jQuery, you first select a single element or\
    \ group of elements in the DOM and then do something with it or query it. If this\
    \ particular query should be done when a button is clicked, for example, then\
    \ we also attach this selector/query to some HTML element. There are many different\
    \ tools, easy and advanced, to select an element, and many different things you\
    \ can “perform” on the selection. Why do we need the `<rich:jQuery>` tag? `<rich:jQuery>`\
    \ allows a more convenient and declarative way of adding jQuery queries to a page\
    \ and its elements. One last thing to mention, jQuery being a JavaScript framework,\
    \ it works in the client or the browser. Let’s do an easy example with `<rich:panel>`\
    \ shown in [Listing 12-13](#Chapter12.html#list_12_13).\n\n***Listing 12-13.**\
    \ Example with `<rich:panel>`*\n\n```\n<rich:panel header=\"New York\" id=\"nycInfo\"\
    \ style=\"width:50%\">\n   New York is the most populous city in the United States\
    \ and the center of the New York\n   Metropolitan Area, one of the most populous\
    \ metropolitan areas in the world. New York\n   exerts a significant impact upon\
    \ global commerce, finance, media, culture, art, fashion,\n   research, technology,\
    \ education, and entertainment. As the home of the United Nations\n   Headquarters,\
    \ it is also an important center for international affairs. The city is often\n\
    \   referred to as New York City or the City of New York to distinguish it from\
    \ the state of New\n   York, of which it is a part. Source: http://en.wikipedia.org/wiki/New_York_City.\n\
    </rich:panel>\n```\n\nLet’s say we would like to change the header title from\
    \ “New York” to “New York City.” This is easily done with jQuery. We first attach\
    \ jQuery to a button, on button click we select the panel, and then we do the\
    \ content change. [Listing 12-14](#Chapter12.html#list_12_14) shows a button that\
    \ does that.\n\n***Listing 12-14.** Attaching jQuery to a button*\n\n```\n<input\
    \ type=\"button\" id=\"changeButton\" value=\"Update panel\" />\n<rich:jQuery\
    \ selector=\"#changeButton\"\n   query=\"click(function(){\n      $('#nycInfo\
    \ .rf-p-hdr').text('New York City');\n})\"/>\n```\n\nThe `selector` attribute\
    \ is used to select one or more elements on the page. In our example, `selector=\"\
    #changeButton\"` selects the button that will be clicked. `query` binds the handler\
    \ function to the click event on the selected button. Inside the handler function,\
    \ we first select the panel (`#nycInfo`), then we select its header by its CSS\
    \ class (`.rf-p-hdr`) and invoke the `text()` function to modify the header. You\
    \ might be wondering why we first select `#nycInfo` and then `.rf-p-hdr`. A rich\
    \ panel is a complex component and consists of a number of HTML tags. jQuery allows\
    \ you to filter elements, and only returns the elements that you need. `#nycInfo`\
    \ would return the entire panel—and that’s not what we need. However, once we\
    \ have the panel and search for `.rf-p-hdr`, we get the header element which we\
    \ want to modify.\n\n____________________\n¹ [http://jquery.com/.](http://jquery.com/.)\n\
    \n![images](images/square.jpg) **Note** `$('id')` is a shortcut for `jQuery('id')`.\n\
    \nLet’s also change the text color inside the panel to blue. [Listing 12-15](#Chapter12.html#list_12_15)\
    \ shows the changes.\n\n***Listing 12-15.** Change the text color inside the panel*\n\
    \n```\n<input type=\"button\" id=\"changeButton\" value=\"Update panel\" />\n\n\
    <rich:jQuery selector=\"#changeButton\"\n   query=\"click(function(){\n      $('#nycInfo\
    \ .rf-p-hdr').text('New York City');\n      $('.rf-p-b').css('color', 'blue');\n\
    })\"/>\n```\n\nNotice that we didn’t specify a panel id before; this means we\
    \ are not selecting a particular panel, and if we had other panels on the page,\
    \ they would also change body color. To test this, just add another `<rich:panel>`\
    \ to the page, for example, as shown in [Listing 12-16](#Chapter12.html#list_12_16).\n\
    \n***Listing 12-16.** Testing which panels would change body color*\n\n```\n<rich:panel>\n\
    \   This panel will also turn blue.\n</rich:panel>\n```\n\nIf you look at the\
    \ `query` attribute value in [Listing 12-15](#Chapter12.html#list_12_15), it looks\
    \ rather long and somewhat complicated. We can simplify the markup by setting\
    \ the event via the `event` attribute, as shown in [Listing 12-17](#Chapter12.html#list_12_17).\
    \ That attribute allows us to bind the query defined in the corresponding attribute\
    \ to a specified event without an additional definition in query itself.\n\n***Listing\
    \ 12-17.** Simplify the markup by setting the event via the `event` attribute*\n\
    \n```\n<input type=\"button\" id=\"changeButton\" value=\"Update panel\" />\n\
    <rich:jQuery selector=\"#changeButton\" event=\"click\"\n   query=\"$('#nycInfo\
    \ .rf-p-hdr').text('New York City');\n                $('.rf-p-b').css('color',\
    \ 'blue');\" />\n```\n\nLet’s add one more jQuery effect: add a button that hides\
    \ the panel. [Listing 12-18](#Chapter12.html#list_12_18) shows the page code.\n\
    \n***Listing 12-18.** Adding a button that hides the panel*\n\n```\n<input type=\"\
    button\" id=\"hideButton\" value=\"Hide panel\"/>\n<rich:jQuery selector=\"#hideButton\"\
    \ event=\"click\" query=\"$('#nycInfo').hide()\"/>\n```\n\nWe use a built-in jQuery\
    \ `hide()` function to hide the panel. The only other difference, instead of specifying\
    \ the event in query, we use a separate `event` attribute to set the `click` event,\
    \ which makes the tag markup even simpler. We can’t leave this without adding\
