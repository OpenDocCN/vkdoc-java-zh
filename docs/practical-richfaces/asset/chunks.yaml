    API 和相同的预定义名称。    #### 使用 <rich:componentControl>    在上一节中，我们向您展示了如何使用 `#{rich:component()}`
    函数调用组件的 JavaScript API。还有另一种调用 API 的方法。这第二种方法更加声明式，并使用 `<rich:componentControl>`
    行为。组件的名称暗示了它的作用。它使得从一个组件控制另一个组件成为可能，这是通过 JavaScript 完成的。    让我们从前面部分中选取两个示例，并将它们更新为使用
    `<rich:componentControl>`。清单 12-6 显示了使用 `<rich:componentControl>` 而不是 `#{rich:component()}`
    函数更新的弹出面板示例。    ***清单 12-6.** 显示使用 `<rich:componentControl>` 而不是 `#{rich:component()}`
    函数更新的弹出面板示例*  `<h:outputLink value="#">` `   <h:outputText value="打开" />` `   <rich:componentControl
    event="click" target="popup" operation="show" />` `</h:outputLink>`  `<rich:popupPanel
    header="RichFaces" id="popup">` `   <h:panelGrid>` `      <h:outputText value="这是一个
    RichFaces 弹出窗口" />` `      <h:outputLink value="#">` `      <h:outputText value="关闭"
    />` `         <rich:componentControl event="click" target="popup"` `            operation="hide"
    />` `      </h:outputLink>` `   </h:panelGrid>` `</rich:popupPanel>`  让我们仔细看看打开链接。我们没有使用
    `#{rich:component()}`，而是在内部嵌套了 `<rich:componentControl>` 行为。`<rich:componentControl>`
    将自身附加到父组件，然后在另一个组件上调用 JavaScript 函数。我们指定了以下三个属性：`event="click"` 指示在父组件上监听哪个事件；`target="popup"`
    指示在哪个组件上调用函数；`operation="show"` 指示在组件上调用哪个函数。这看起来与使用 `#{rich:component()}` 非常相似，只是以更声明式的方式完成。要关闭（隐藏）弹出窗口，我们使用相同的设置，但不是调用
    show 操作（`show()` 函数），而是调用 hide 操作（`hide()` 函数）。这两种方法之间的一个主要区别是，`#{rich:component()}`
    函数可以与任何 HTML 标签一起使用，但作为一种行为，`<rich:componentControl>` 只能附加到另一个 JSF 组件。    ![images](img/square.jpg)
    **提示** 在 `<rich:componentControl>` 中指定操作时，只使用操作（函数）名称，不带括号 ()。    ##### 使用 <a4j:param>
