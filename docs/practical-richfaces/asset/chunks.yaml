    you to specify the tag name and handler class for the component. See `@Tag` for
    more details. | | attributes | Contains array of strings, each contains the name
    of `faces-config.xml` fragment with attributes definitions, that lets CDK reuse
    the attributes definition in different components. CDK looks for these files in
    project classpath `META-INF/cdk/` attributes folder, and provides a set of such
    files for most HTML elements and standard components. | | renderer | Associates
    component with `Renderer` implementation. There are two options to link the component
    with renderer: 1) by the renderer type or 2) by the template name. For the type,
    CDK doesn’t check the existence of the target renderer because it would be defined
    in another module. For the template name, CDK enforces both the renderer and the
    component to share the same renderer type and family. | | interfaces | Array of
    Java interface classes that should be implemented by generated component. |    [Table
    14-3](#Chapter14.html#tab_14_3) shows the `@Attribute` properties.    ***Table
