    \ id=\"Update\" value=\"Update\" render=\"time\"/>\n      <h:outputText value=\"\
    #{logBean.now}\" id=\"time\"/>\n   </h:panelGrid>\n   <a4j:log />\n</h:form>\n\
    ```\n\nWhen the page is rendered and the button is clicked, you will see the output\
    \ shown in [Figure 3-12](#Chapter03.html#fig_3_12).\n\n![images](images/0312.jpg)\n\
    \n**Figure 3-12.** Output from `<a4j:log>` component\n\nSelecting the `debug`\
    \ level and hitting the Update button will produce a more verbose output, as shown\
    \ in [Figure 3-13](#Chapter03.html#fig_3_13).\n\n![images](images/0313.jpg)\n\n\
    **Figure 3-13.** Output from `<a4j:log>` component with `debug` level selected\n\
    \nIn case there is an error, such as server not running, you might see output\
    \ like [Figure 3-14](#Chapter03.html#fig_3_14).\n\n![images](images/0314.jpg)\n\
    \n**Figure 3-14.** Output from `<a4j:log>` component when server error occurs\n\
    \nIf you want to set a log level during development, then the `level` attribute\
