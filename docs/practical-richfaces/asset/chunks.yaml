    `         <button type="button" id="spinnerDec">&lt;</button>` `         <button
    type="button" id="spinnerInc">&gt;</button>` **`         <script>`** **`            $(''#spinner'').Spinner({value:10});`**
    **`         </script>`** `      </span>` `</body>` `</html>`  When the page is
