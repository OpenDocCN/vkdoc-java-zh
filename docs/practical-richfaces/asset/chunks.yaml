    ## About the Authors


    ![image](images/square.jpg) **Max Katz** is a senior systems engineer and lead
    RIA (Rich Internet Application) strategist at Exadel, a software development company.
    He is a well-known speaker appearing at many conferences, webinars, and JUG (Java
