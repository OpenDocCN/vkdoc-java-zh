    You bought this book to learn about RichFaces, so we are going to squeeze in this
    short section so you don''t have to wait. We will then do quick overview of JSF,
    and go back to telling you more about RichFaces in more detail. You probably think
    of RichFaces as a rich component library (and that''s fine). But, is it also much
    more. Rich components are just one of the main features that RichFaces offers.
    RichFaces is a rich framework for JSF and offers rich and Ajax components in two
    tag libraries (`a4j:` and `rich:`), a Skins feature, a client-side validation
    extension based on JSR-303 Bean Validation, and CDK (Component Development Kit).


    Of course you get many other features, which we will cover throughout the book,
    such as advanced rendering features, event handling options, and Ajax client queue
    optimization. The components are something you can “feel and touch,” so let us
    give you a quick example of what kind of components RichFaces offers.


    The `a4j:` tag library offers many core or foundation components, such as buttons
    and links with built-in Ajax support, Ajax polling, and Ajax status. At this stage,
    however, it''s more interesting to look at examples of components from the `rich:`
    tag library. In [Figure 1-1](#Chapter01.html#fig_1_1), you can see a rich tab
    panel and calendar components.


    ![images](images/0101.jpg)


    ***Figure 1-1.** RichFaces tab panel and calendar (blueSky skin)*


    If you are reading an electronic version of this book, then [Figure 1-1](#Chapter01.html#fig_1_1)
    will appear in light blue color. By changing just one parameter, we can render
    the page in the ruby skin, as shown in [Figure 1-2](#Chapter01.html#fig_1_2).
    Another difference in [Figure 1-2](#Chapter01.html#fig_1_2) is that it is also
    showing an optional control to select time. Each component offers a large number
    of customization options.


    ![images](images/0102.jpg)


    ***Figure 1-2.** RichFaces tab panel and calendar with time selection (ruby skin)*


    The tabs can be switched via Ajax, as well as previous/next month in the calendar.
    Let''s look at one more rich component, shown in [Figure 1-3](#Chapter01.html#fig_1_3).
    It shows a rich inplace input component displayed three times. Inplace input renders
    initially as a label (first component); when clicked, it switches to an input
    (second component); and then back to a label when editing is done (third component).


    ![images](images/0103.jpg)


    ***Figure 1-3.** Rich inplace input component (shown in three modes)*


    We hope you now get an idea of what RichFaces can do. Trust us, it can do a whole
    lot more. We will now take a brief detour to tell you a little bit about JSF.
    Why? Well, RichFaces is a JSF frameworks, it is based entirely on JSF so it''s
    important to know how the underlying framework works.


    ### What is JSF?


    Let''s start with the simplest definition. JSF is just a framework for building
    web applications. To be a little bit more specific, we are building a browser-based
    or HTML application, no plug-ins involved. You are probably thinking, there are
    at least a couple dozen other frameworks that would fit this description. JSF
    has a number of features that makes it different than other frameworks. Let''s
    review them.


    #### JSF Application Is Built Out of UI Components


    JSF is a Java framework for building browser-based user interfaces (UIs) out of
    reusable components. The emphasis in JSF is on UI components. When working with
    UI components, you won''t deal with HTML markup directly because JSF and other
    rich components will provide all the necessary UI widgets to build the application.
    However, HTML tags still play an important role in the layout of the page. Within
    the components themselves, renderers (Java classes for generating HTML) are responsible
    for producing the appropriate markup. Because you are building web applications
    and the client is basically the browser, the markup needed is HTML (although it
    can be anything like WML, SGL, or even XML) so the components'' renderers will
    generate the HTML markup that will be sent to the client (browser).'
