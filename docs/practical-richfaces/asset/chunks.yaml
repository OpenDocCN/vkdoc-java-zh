    *and another .*`rfs-btn`  `<h:panelGrid columns="1">` `   <h:outputText value="Favorite
    city: " styleClass="rfs-txt-general"/>` `   <h:inputText value="#{geography.city}"
    styleClass="rfs-txt-general"/>` `   <h:commandButton action="next" value="Submit"
    styleClass="rfs-btn"/>` `</h:panelGrid>`  This will display [Figure 13-11](#Chapter13.html#fig_13_11).  ![images](images/1311.jpg)  ***Figure
    13-11.** Using special RichFaces CSS classes to skin standard JSF components*    Notice
    that “Favorite city” (`<h:outputText>`) has been skinned as well. It has a different
    style than the previous examples.    #### Using #{richSkin} Implicit Object    It’s
    possible to turn off the “Standard Controls Skinning” feature and style a single
    component without loading the complete standard skinning ECSS. In such case you
    should use skin properties directly from the current skin, in particular components
    styles. This allows you to skin standard controls without having to update that
    particular style each time you change skin or skin parameters.    Suppose you
    add a button to your tabs example and turned the standard controls skinning feature
    off, as in the following code:  `<h:commandButton action="next" value="Next page
    -` `    I want to learn about world oceans!"/>`  The result is shown in [Figure
    13-12](#Chapter13.html#fig_13_12).  ![images](images/1312.jpg)  ***Figure 13-12.**
    Using #{richSkin} to skin standard JSF components*    As you can see, it’s a standard
    JSF button (*`h:commandButton`*) and, of course, not skinnable. You can add a
    style via the `style` or `styleClass` attribute that matches the current skin
    (`ruby`), but then you would need to adjust it each time you change the skin.
    A better way is to use skin parameters to add style to the button. For example,
    you can use `tabBackgroundColor` as the color for the button, as shown in [Listing
    13-27](#Chapter13.html#list_13_27). Of course, you can use any other skin parameter
    from the skin.    ***Listing 13-27.** `tabBackgroundColor`*  `<h:commandButton
    action="next" value="Next page -` `   I want to learn about world oceans!"` `   style="background-color:#{`**`richSkin.tabBackgroundColor`**`}"/>`  The
    result is shown in [Figure 13-13](#Chapter13.html#fig_13_13).  ![images](images/1313.jpg)  ***Figure
    13-13.** Standard JSF buttons styled with skin colors using #{richSkin}*    Let’s
    review `#{richSkin.tabBackgroundColor}`. `#{richSkin}` is an implicit object that
    points to the current skin and allows you to access any of the skin’s parameters.
    It’s no different from the `#{view}` and `#{initParam}` implicit objects. You
    can reference any skin parameter in this way. It’s just the same as usage of the
    object in ECSS files.    You can pull styles from the skin without even using
    any RichFaces components, as shown in [Listing 13-28](#Chapter13.html#list_13_28).    ***Listing
    13-28.** Pulling styles from the skin without using RichFace components*  `<div
    style="color: #D01F3C;` `border: 2px solid` **`#{richSkin.panelBorderColor};`**
    `   width: 300px">` `   I can even use Skins without any RichFaces components`
    `</div>`  [Listing 13-29](#Chapter13.html#list_13_29) is an example of how to
    highlight a row in a table when the mouse cursor is over that row, and returns
    default color when the cursor moves out.    ***Listing 13-29.** Highlighting a
    row in a table*  `<rich:dataTable value="#{carBean.allCars}" var="car" rows="10"`
    `   onRowMouseOver="this.style.backgroundColor=''#D5D2D1''"` `   onRowMouseOut="this.style.backgroundColor=''`**`#{richSkin.tableBackgroundColor}`**`''">`  `   <rich:column>`
    `      <h:outputText value="#{car.make}" />` `   </rich:column>` `   <!--Other
    columns-->` `</rich:dataTable>`  Result from last example are shown in [Figure
    13-14](#Chapter13.html#fig_13_14).  ![images](images/1314.jpg)  ***Figure 13-14.**
    Highlighting currently selected row using #{richSkin}*    ### Summary    This
    chapter demonstrated one of the major features in RichFaces: skins. Skins is simply
    a powerful extension to CSS. By using skins, you can easily change the look and
    feel of your entire application. The chapter also demonstrated various ways to
    create custom skins, as well as customizing, extending, and redefining existing
    skins. We also covered skinning non-RichFaces components, such as standard JSF
    tags and standard HTML tags.    Now that we are done with skins, the next chapter
    will cover RichFaces Component Development Kit (CDK). The CDK allows you to quickly
    and easily build your own custom rich components.    ## C H A P T E R  14    ##
    RichFaces CDK: Building Custom Components    In this chapter we will cover one
    of the most interesting topics in RichFaces: building custom components with the
    Component Development Kit (CDK). As you can judge from this book and other resources
    on the Internet, RichFaces is more than just a component library for JSF. It extends
    JSF with advanced Ajax features and customization, client-side validation, skins,
    JavaScript component API, and much more. There is one great feature, however,
    to which we want to dedicate an entire chapter: building custom JSF components
    with RichFaces CDK. Note that we said JSF components and not RichFaces components.
    Yes, with CDK you can build custom JSF (not necessarily RichFaces) components.
    In our opinion, that’s one of the strongest features of CDK.    ![images](images/square.jpg)
    **Note** This chapter requires slightly more advanced knowledge of JSF 2 features,
    such as life cycle, components building foundation, and behavior principles. If
    you feel you need to brush up your JSF skills, we recommend the following two
    books: *Core JavaServer Faces, Third Edition* by David Geary and Cay Horstmann
    (Prentice Hall, 2010) and *JavaServer Faces 2.0, The Complete Reference* by Ed
    Burns and Chris Schalk (McGraw-Hill, 2009).    We will start with a short overview
    of RichFaces CDK in order to understand how it will help us in our JSF component
    developer jobs.    JSF component development can be a rather tedious task. Components
    are usually easy to work with when you are placing them on pages, setting properties,
    or attaching actions or listeners. However, building the component is usually
    more challenging. Let’s review the standard JSF component development process
    from the beginning.    First, you need to create a base component class and add
    all the component attributes as properties with accessor methods, which allows
    you to store and access property values by using the StateHelper object. Then,
    ideally, you will have to create a renderer-specific class, which will consist
    of all HTML-specific attributes, such as events, styles, and others that are defined
    in the same manner as the base component class. In addition, if a behavior support
    (such as Ajax) is present, behavior events should be declared separately, as well.
    Then you will need to perform another challenging task—writing a renderer that
    will process the changes made on the client and render the HTML code back. Even
    for simple components, rendering HTML code inside Java code is not simple. For
    example, it is challenging to review and debug such code by looking for missed
    end tags or missed attributes. Things usually get even more complicated when you
    need to extend your own component from these classes. Finally, in some cases we
    will need to write the Facelets TagHandler class for our component.    After we
    are done with these tasks, we will have to become good XML developers. Yes, even
    in the Java EE6 era, it’s still an important part of the job in many instances.
    We need to add the JSF configuration file with all the component description information,
    such as component class, component family, `renderkit` definitions, and so on.
    After that, we will create a `component.taglib.xml` file, which will define a
    View Definition Language (VDL) tag for the component.    Similar work needs to
    be done to create client behavior.    How does RichFaces CDK help us? Almost at
    every step. Let’s take a look at how the basic steps described earlier will be
    made easier.    1.  *Component classes*. CDK allows you to generate a UI class
    with all the accessors for attributes just from an abstract class marked with
    a special annotation as a component and with set of abstract getter methods marked
    with the other annotations as attributes.          In the best cases, when you
    have no complex component functionality that should be implemented in component
    classes, you will not need a base abstract class. If you prefer, you could just
    create faces-config.xml with a few CDK-specific extensions and all the component
    classes stuff will be generated. 2.  *Renderer classes*. In the best case scenario,
    you will not need to write any line of Java code. CDK includes an XML template
    compiler that will generate renderer from the XML template (which is really just
    an HTML template under the hood and very similar to a JSF 2 composite component
    template). But, even if you need some Java utility methods for encoding, you will
    not need to write much code. Simply define the base class in the XML template
    and implement the base class with only the methods needed. Then the methods can
    be used directly in templates. 3.  *XML configuration*. There is no longer any
    need for faces-config.xml and component.taglib.xml XML development. All the information
    will be extracted from abstract class annotations, and the template and the configuration
    files will be generated automatically. The only reason to write `faces-config.xml`
    on your own with CDK is if you prefer to generate a UI-component class instead
    of writing an abstract component class. 4.  *Events, listeners, and behaviors*.
    CDK includes functionality for more easily defining events, listeners, behaviors,
    and so on.    Now that we have covered the basics of CDK, we are going to build
    a custom component together.    Before we start, there are two things we want
    to point out. First, RichFaces CDK is a separate feature in RichFaces. You don’t
    need to know how to use the CDK to use any of the components we covered in this
    book. The topic of building custom components is extensive and could probably
    make up an entire book by itself. In this chapter we are going to introduce CDK
    and give you an idea of how it works. For anything more, please visit the JBoss
    Community RichFaces page at [`http://jboss.org/richfaces`](http://jboss.org/richfaces).
    Second, some CDK parts and functionality are still being finalized; so again,
    make sure to visit the RichFaces site often for any changes and updates.    ###
    Development Plan    Our plan is to create a simple spinner component that provides
    richer UI to simplify numerical input.    First, any component requires simple
    HTML prototyping work to create a future template to be rendered, and to define
    core attributes we will add to the component. This will help us prepare the JavaScript
    part of the component, and if implement carefully, we can add it to the component
    without any additional changes.    Then we will create a Maven project and see
    how we will get component and renderer classes generated using an abstract component
    class and our HTML template moved to a special XML template file.    Next, we
    will create a project using the RichFaces project archetype and check the component
    in that application. We will also add a CSS stylesheet to the component, which
    is based on RichFaces skins, so it will be skinned as all the other RichFaces
    components.    ### Client-side Prototyping    Let’s start with the HTML prototype.
    We won’t be using any complicated markup because the goal is to show you how to
    use the CDK, not write complicated markup. We will start from the base markup
    and later you will be able to improve it with any customizations you want.    [Listing
    14-1](#Chapter14.html#list_14_1) shows the code we will use.    ***Listing 14-1.**
    Base markup*  `<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"`
    `  "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">` `<html>` `   <head>`
    `      <meta http-equiv="content-type" content="text/html; charset=UTF-8" />`
    `   </head>` `   <body>` `      <span id="spinner" >` `         <input type="text"
    value="100" id="spinnerInput"/>` `         <button type="button" id="spinnerDec">&lt;</button>`
    `         <button type="button" id="spinnerInc">&gt;</button>` `      </span>`
    `   </body>` `</html>`  [Figure 14-1](#Chapter14.html#fig_14_1) shows the result.  ![images](images/1401.jpg)  *Figure
    14-1\. Spinner HTML prototype*    Let’s create a jQuery plug-in that will add
    client functionality to the spinner. First we need to revise the options necessary
    for making it customizable. Later, we will convert these options to be attributes
    on the component.    [Table 14-1](#Chapter14.html#list_14_1) shows the final attribute
    list.    ***Table 14-1.** Attribute List*     | **Option** | **Default** | **Description**
    | | --- | --- | --- | | `value` | 0 | Current value of the spinner. | | `maxValue`
    | 100 | Maximum value that can be entered | | `minValue` | 0 | Minimum value that
    can be entered. | | `step` | 1 | The value by which the current value will be
    decreased or increased during corresponding UI controls activation. |    You would
    probably need more attributes if you were to use this component in production,
    but for the purpose of our example, these are sufficient. [Listing 14-2](#Chapter14.html#list_14_2)
    shows a simple jQuery plug-in that we created. It includes the following functionality:    *   Binds
    the handlers to the buttons, which performs a value change on button click. *   Binds
    the handler to the keyup keyboard event and performs the same button click when
    up or down arrows are clicked. *   Binds the handler to the `change` event of
    the input, which verifies correctness of the current value and switches it to
    the last valid, in case the user entered some non-numerical value or a value that
    is outside of the min/max range.    ***Listing 14-2.** spinner.js from meta-inf/resources/org.richfaces.book*  `(function($)
    {` `   var defaultOptions = {` `      step : 1,` `      maxValue : 100,` `      minValue
    : 0` `   };` `   $.fn.Spinner = function(opts) {` `      var options = $.extend({},
    defaultOptions, opts);` `      return this.each(function() {` `         var input
    = document.getElementById(this.id + "Input");` `         var incControl = document.getElementById(this.id
    + ''Inc'');` `         var decControl = document.getElementById(this.id + ''Dec'');`
    `         var inc = function (event) {` `            var newValue = Number(input.value)
    + (options.step);` `            if (newValue < options.maxValue){` `               input.value=currentValue=newValue;`
    `            } else {` `               input.value=currentValue=options.maxValue;`
    `            }` `         };` `         var dec = function(event) {` `            var
    newValue = Number(input.value) - (options.step);` `            if (newValue >
    options.minValue){` `               input.value=currentValue=newValue;` `            }
    else {` `               input.value=currentValue=options.minValue;` `            }`
    `         };` `         var handleKey = function(event) {` `            switch
    (event.keyCode) {` `               case 38:` `                  inc(event); break;`
    `               case 40:` `                  dec(event); break;` `               }`
    `         };` `         var verify = function(event) {` `            var valueToVerify
    = input.value;` `            if (isNaN(valueToVerify)) {` `               input.value
    = currentValue;` `               return;` `            }` `            if (Number(valueToVerify)
    < options.minValue){` `               input.value = currentValue = options.minValue;`
    `               return ;` `            }` `            if (Number(valueToVerify)
    > options.maxValue) {` `               input.value = currentValue = options.maxValue;`
    `               return ;` `            }` `            currentValue = input.value;`
    `         };` `         $(incControl).click(inc);` `         $(decControl).click(dec);`
    `         $(input).keydown(handleKey);` `         $(input).change(verify);` `         if
    (!isNaN(options.value)) {` `            input.value = options.value;` `            verify();`
    `         }` `      });` `   };` `})(jQuery);`  The plug-in gets initialized with
    the options passed to constructor, and at the same time it provides defaults for
    them. This means that if some options are not passed, the component still works
    based on default values. In general, that’s a very good practice because in many
    cases there are a set of parameters that often don’t change. Performing such initialization
    will reduce the HTML size.    We then obtain DOM elements for the input and buttons
    because we need to bind handlers to their events. `inc()` and `dec()` functions
    are then defined to increase or decrease the current value from input to the number
    defined in the step option. The `handleKey()` function calls `inc()` or `dec()`
    functions depending on the keyCode we get from `event`. (We want the component
    to be able to change its value after keyboard events.) The `verify()` method will
    be called to verify the entered input when change event occurs. It will check
    the correctness of the new input (the user could change it manually by typing
    a non-numerical value in the input) and if it’s incorrect, performs switching
    to the previous valid value or to some of the boundary values.    Finally, we
    perform binding on all methods to corresponding DOM element events and perform
    initialization of input with the initial value passed in options.    That’s it.
    All we need now is add the script to our HTML template. As our client script is
    built as a jQuery plug-in, we should remember to add a base jQuery library there
    as well. We used jQuery 1.5.1, but you should also be able to use jQuery 1.6.x.
    [Listing 14-3](#Chapter14.html#list_14_3) shows what it looks like after the changes.    ***Listing
