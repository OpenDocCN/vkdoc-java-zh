    that sends Ajax requests to the server, you have to use a form to wrap the component.
    However, using the RichFaces file upload component, you don''t need to make the
    form a multipart form, as it will be automatically handled by RichFaces. Using
    the standard `<h:form>` is sufficient.


    File upload component has two options that are defined as application context-parameters
    in `web.xml` listed in [Table 5-14](#Chapter05.html#tab_5_14).


    ![images](images/t0514.jpg)


    Now let''s add a limitation as to what kind of files can be uploaded, as in [Listing
    5-35](#Chapter05.html#list_5_35).


