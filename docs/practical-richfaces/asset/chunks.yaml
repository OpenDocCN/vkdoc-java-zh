    展示了放置在托管 bean 中的方法。


    ***清单 5-17.** 展示放置在托管 bean 中的方法*


    *`public ArrayList <State> suggest (String input){`*

    `   ArrayList <State> result = new ArrayList <State>();`

    `   for(State state : statesList) {`

    `      if ((state.getName().toLowerCase()).startsWith(input.toLowerCase()))`

    `         result.add(state);`

    `      }`

    `   return result;`

    `}`


    我们所做的只是遍历州列表，并检查当前州名称是否以输入的前缀开头。由于这是在托管 bean 内部，您可以自由实现任何其他检索建议值的方法。图 5-15 显示了结果。


    ![images](img/0515.jpg)


    ***图 5-15.** 弹出窗口内包含复杂内容的 <rich:autocomplete>*


    我们想告诉您的另一个属性是 `fetchValue`。当我们在建议弹出窗口中显示具有多个属性的对象时，我们提示从对象列表中选择时要插入的内容。在这种情况下，使用州名称进行插入。如果您不指定
    `fetchValue`，则将插入对象的字符串表示形式（在本例中为 `State.toString()`）。


    我们还使用了 `layout` 属性。此属性控制当显示复杂列表时组件将用于弹出窗口的标记。在我们的示例中，我们使用了 *`table`* 布局。所有可能的布局如表
    5-3 所示。


    ![images](img/t0503.jpg)


