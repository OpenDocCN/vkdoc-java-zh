- fmt: "# RichFaces Client-side Validation\n\nJSF comes with a number of out-of-the-box\
    \ validators and JSF 2 now also supports Bean Validation (JSR 303). RichFaces\
    \ 4 takes validation a step further and adds client-side validation based on Bean\
    \ Validation. It is now possible to perform validation on the client according\
    \ to JSR-303 definitions. It means that basic client-side validation no longer\
    \ requires creating and plugging custom JavaScript validators to components; it\
    \ just synchronizes them for different layers at the framework level.\n\nAlso,\
    \ with RichFaces you will be able to achieve that validation across the whole\
    \ application following the DRY ([http://en.wikipedia.org/wiki/Don%27t_repeat_yourself](http://en.wikipedia.org/wiki/Don%27t_repeat_yourself))\
    \ principle. In case validating on the client is not possible, Ajax fallback (server-side)\
    \ support is available. Besides, RichFaces provides so-called Object Validation\
    \ that allows validating server-side Entities in the whole, even if some properties\
    \ are not present in current view. Client-side validation is covered in [Chapter\
    \ 11](#Chapter11.html#ch11).\n\n# RichFaces' Component Development Kit\n\nAnother\
    \ part of the framework is the Component Development Kit (CDK). The CDK includes\
    \ various Maven archetypes, a code generation facility, descriptors and tests\
    \ generation facility, and a templating facility that allows the creation of renderer\
    \ classes using only page code. These features enable a component developer to\
    \ avoid the routine process of component creation. The CDK greatly simplifies\
    \ and speeds up rich component development with built-in Ajax support. This edition\
    \ of the book now includes CDK coverage. CDK is covered in [Chapter 13](#Chapter13.html#ch13).\n\
    \n# Using RichFaces with CDI and Dependency Injection\n\nContexts and Dependency\
    \ Injection, or CDI (JSR 299), and Dependency Injection for Java (JSR 330) are\
    \ both part of the Java EE 6 platform. Both provide services and components to\
    \ make it simpler to develop enterprise Java applications. Although JSF 2 now\
    \ provides a simpler way to configure beans with annotations, using CDI beans\
    \ instead of JSF beans gives a lot more flexibility and power to the developer\
    \ by providing a unified programming model. JSF 2 works with CDI Beans out of\
    \ the box. As RichFaces 4 is based on JSF 2, CDI can be used with any RichFaces\
    \ 4 components as well. So that we don't introduce another layer (which is really\
    \ outside the scope of this book), examples in this book will use standard JSF\
    \ beans. In all examples, JSF beans can be easily replaced with CDI beans.\n\n\
    # RichFaces: A Historical Perspective\n\nIf you search for RichFaces, eventually\
    \ you will see a reference to Ajax4jsf. This section provides a brief history\
    \ of Ajax4jsf and how it became part of RichFaces. Ajax4jsf has its roots in RichFaces.\
    \ The Ajax4jsf framework was created and designed by Alexander Smirnov. In early\
    \ 2005, he was looking to add a “hot” new technology along with the associated\
    \ experience to his résumé. Roughly at the same time, Jesse James Garrett was\
    \ establishing the concept of Ajax. Meanwhile, JSF was starting to pick up steam.\
    \ Alexander figured, why not just merge the two so it would be easy to have Ajax\
    \ functionality within a JSF application?\n\nHe started the project on SourceForge.net,\
    \ called it Telamon (taken from the Shakespearean play, *Antony and Cleopatra*),\
    \ and Ajax4jsf was born. In the fall of that same year, Smirnov joined Exadel,\
    \ a software engineering company, and continued to develop the framework. Smirnov's\
    \ goal was to create a tool that was easy to use, would add client-side richness\
    \ to pure server-side JSF technology, and could be used with any existing JSF\
    \ component libraries.\n\nThe first version of what would become Ajax4jsf was\
    \ released in March 2006. It wasn't quite a stand-alone thing yet. Rather, it\
    \ was part of a product called Exadel RichFaces. Later in the same year, RichFaces\
    \ was split off, and the Ajax4jsf framework was born.\n\nWhile RichFaces provided\
    \ out-of-the-box components, or what's called a component-centric Ajax approach\
    \ (components that do everything you need), Ajax4jsf provided what's called page-wide\
    \ Ajax support. You as a developer specify what parts of the page should be processed\
    \ on the server after client-side user actions, and also what parts should be\
    \ rendered back (rendering is happening on the server and partial DOM updating\
    \ is happening on the client) after processing. Ajax4jsf became an open source\
    \ project hosted on Java.net, while RichFaces became a commercial JSF component\
    \ library. Ajax4jsf became a very popular project because it arrived at the right\
    \ time (just when people were starting to add Ajax to their applications), but\
    \ more importantly, because it was very easy to use.\n\nIf you had a button such\
    \ as\n\n`<h:commandButton value=\"Submit\" action=\"#{bean.save}\"/>`\n\nand wanted\
    \ to add Ajax capability, all you had to do was change the namespace and add a\
    \ `reRender` attribute (RichFaces 3 code), as follows:\n\n`<a4j:commandButton\
    \ value=\"Submit\" action=\"#{bean.save}\" reRender=\"id1, id2\"/>`\n\nAnd if\
    \ you had an input field and wanted to add Ajax capability to it, then all you\
    \ had to do next was add a `<a4:support>` tag inside, as follows:\n\n```\n<h:inputText\
    \ value=\"#{order.amount}\">\n   <a4j:support event=\"onkeyup\" reRender=\"id1,\
    \ id2\"/>\n</h:inputText/>\n```\n\nFast-forward to March 2007. JBoss and Exadel\
    \ forged a partnership where Ajax4jsf and RichFaces would be under the JBoss umbrella\
    \ and called JBoss Ajax4jsf and JBoss RichFaces. RichFaces would also be open\
    \ source and free. In September 2007, JBoss and Exadel decided to recombine Ajax4jsf\
    \ and RichFaces under the RichFaces name. This made sense because both libraries\
    \ were free and open source. Having just one product solved many version and compatibility\
    \ issues that existed before, such as figuring out which version of Ajax4jsf works\
    \ with which version of RichFaces.\n\nAlthough today you will still see an `a4j:`\
    \ namespace used, the product is now called RichFaces.\n\nBefore we end this chapter,\
    \ we would like to offer some advice from our personal experience that will help\
    \ you become a better JSF and RichFaces developer.\n\n# Understanding That JSF\
    \ Application Is Running on the Server\n\nBased on our experience teaching JSF,\
    \ it is sometimes difficult for people who are new to JSF to grasp the idea behind\
    \ the JSF component tree and how it relates to what they see in the browser. It's\
    \ important to keep in mind that JSF is a server-side framework (thus the name\
    \ JavaServer Faces). This means the application is running on the server. This\
    \ also means that any event processing will be done on the server. Now, how does\
    \ this all fit with what you see in the browser? The browser is basically a user-readable\
    \ view of the tree. It's just a mirror image of the tree, but in a format (the\
    \ browser) you can understand. When building a JSF application, it might help\
    \ to think you are always working with the JSF component tree. Anything you change\
    \ or invoke is always on the component tree, and the browser is just a client\
    \ for displaying pages.\n\nYou might be wondering, but what about Ajax? In the\
    \ context of JSF, when using rich components, they will render all the necessary\
    \ JavaScript to send an Ajax request from the browser to the server. When the\
    \ request is done, JSF will render some components from the component tree and\
    \ send that response back to the browser. Upon receiving the response, JavaScript\
    \ in the browser will do a DOM update (or partial page update). Even though we\
    \ now have rich components, Ajax JSF requests are still sent to the server. To\
    \ give you a little head start, there are also what's called client-side events.\
    \ These events happen on the browser, such as expanding or collapsing a panel.\
    \ In such case no request is sent to the server. We will cover them in more detail\
    \ later in the book."
  raw: '#### RichFaces Client-side Validation


    JSF comes with a number of out-of-the-box validators and JSF 2 now also supports
    Bean Validation (JSR 303). RichFaces 4 takes validation a step further and adds
    client-side validation based on Bean Validation. It is now possible to perform
    validation on the client according to JSR-303 definitions. It means that basic
    client-side validation no longer requires creating and plugging custom JavaScript
    validators to components; it just synchronizes them for different layers at the
    framework level.


    Also, with RichFaces you will be able to achieve that validation across the whole
    application following the DRY ([http://en.wikipedia.org/wiki/Don%27t_repeat_yourself](http://en.wikipedia.org/wiki/Don%27t_repeat_yourself))
    principle. In case validating on the client is not possible, Ajax fallback (server-side)
    support is available. Besides, RichFaces provides so-called Object Validation
    that allows validating server-side Entities in the whole, even if some properties
    are not present in current view. Client-side validation is covered in [Chapter
    11](#Chapter11.html#ch11).


    #### RichFaces'' Component Development Kit


    Another part of the framework is the Component Development Kit (CDK). The CDK
    includes various Maven archetypes, a code generation facility, descriptors and
    tests generation facility, and a templating facility that allows the creation
    of renderer classes using only page code. These features enable a component developer
    to avoid the routine process of component creation. The CDK greatly simplifies
    and speeds up rich component development with built-in Ajax support. This edition
    of the book now includes CDK coverage. CDK is covered in [Chapter 13](#Chapter13.html#ch13).


    #### Using RichFaces with CDI and Dependency Injection


    Contexts and Dependency Injection, or CDI (JSR 299), and Dependency Injection
    for Java (JSR 330) are both part of the Java EE 6 platform. Both provide services
    and components to make it simpler to develop enterprise Java applications. Although
    JSF 2 now provides a simpler way to configure beans with annotations, using CDI
    beans instead of JSF beans gives a lot more flexibility and power to the developer
    by providing a unified programming model. JSF 2 works with CDI Beans out of the
    box. As RichFaces 4 is based on JSF 2, CDI can be used with any RichFaces 4 components
    as well. So that we don''t introduce another layer (which is really outside the
    scope of this book), examples in this book will use standard JSF beans. In all
    examples, JSF beans can be easily replaced with CDI beans.


    #### RichFaces: A Historical Perspective


    If you search for RichFaces, eventually you will see a reference to Ajax4jsf.
    This section provides a brief history of Ajax4jsf and how it became part of RichFaces.
    Ajax4jsf has its roots in RichFaces. The Ajax4jsf framework was created and designed
    by Alexander Smirnov. In early 2005, he was looking to add a “hot” new technology
    along with the associated experience to his résumé. Roughly at the same time,
    Jesse James Garrett was establishing the concept of Ajax. Meanwhile, JSF was starting
    to pick up steam. Alexander figured, why not just merge the two so it would be
    easy to have Ajax functionality within a JSF application?


    He started the project on SourceForge.net, called it Telamon (taken from the Shakespearean
    play, *Antony and Cleopatra*), and Ajax4jsf was born. In the fall of that same
    year, Smirnov joined Exadel, a software engineering company, and continued to
    develop the framework. Smirnov''s goal was to create a tool that was easy to use,
    would add client-side richness to pure server-side JSF technology, and could be
    used with any existing JSF component libraries.


    The first version of what would become Ajax4jsf was released in March 2006\. It
    wasn''t quite a stand-alone thing yet. Rather, it was part of a product called
    Exadel RichFaces. Later in the same year, RichFaces was split off, and the Ajax4jsf
    framework was born.


    While RichFaces provided out-of-the-box components, or what''s called a component-centric
    Ajax approach (components that do everything you need), Ajax4jsf provided what''s
    called page-wide Ajax support. You as a developer specify what parts of the page
    should be processed on the server after client-side user actions, and also what
    parts should be rendered back (rendering is happening on the server and partial
    DOM updating is happening on the client) after processing. Ajax4jsf became an
    open source project hosted on Java.net, while RichFaces became a commercial JSF
    component library. Ajax4jsf became a very popular project because it arrived at
    the right time (just when people were starting to add Ajax to their applications),
    but more importantly, because it was very easy to use.


    If you had a button such as


    *`<h:commandButton value="Submit" action="#{bean.save}"/>`*


    and wanted to add Ajax capability, all you had to do was change the namespace
    and add a *`reRender`* attribute (RichFaces 3 code), as follows:


    *`<a4j:commandButton value="Submit" action="#{bean.save}" reRender="id1, id2"/>`*


    And if you had an input field and wanted to add Ajax capability to it, then all
    you had to do next was add a `<a4:support>` tag inside, as follows:


    *`<h:inputText value="#{order.amount}">`*

    *`   <a4j:support event="onkeyup" reRender="id1, id2"/>`*

    *`</h:inputText/>`*


    Fast-forward to March 2007\. JBoss and Exadel forged a partnership where Ajax4jsf
    and RichFaces would be under the JBoss umbrella and called JBoss Ajax4jsf and
    JBoss RichFaces. RichFaces would also be open source and free. In September 2007,
    JBoss and Exadel decided to recombine Ajax4jsf and RichFaces under the RichFaces
    name. This made sense because both libraries were free and open source. Having
    just one product solved many version and compatibility issues that existed before,
    such as figuring out which version of Ajax4jsf works with which version of RichFaces.


    Although today you will still see an `a4j:` namespace used, the product is now
    called RichFaces.


    Before we end this chapter, we would like to offer some advice from our personal
    experience that will help you become a better JSF and RichFaces developer.


    #### Understanding That JSF Application Is Running on the Server


    Based on our experience teaching JSF, it is sometimes difficult for people who
    are new to JSF to grasp the idea behind the JSF component tree and how it relates
    to what they see in the browser. It''s important to keep in mind that JSF is a
    server-side framework (thus the name JavaServer Faces). This means the application
    is running on the server. This also means that any event processing will be done
    on the server. Now, how does this all fit with what you see in the browser? The
    browser is basically a user-readable view of the tree. It''s just a mirror image
    of the tree, but in a format (the browser) you can understand. When building a
    JSF application, it might help to think you are always working with the JSF component
    tree. Anything you change or invoke is always on the component tree, and the browser
    is just a client for displaying pages.


    You might be wondering, but what about Ajax? In the context of JSF, when using
    rich components, they will render all the necessary JavaScript to send an Ajax
    request from the browser to the server. When the request is done, JSF will render
    some components from the component tree and send that response back to the browser.
    Upon receiving the response, JavaScript in the browser will do a DOM update (or
    partial page update). Even though we now have rich components, Ajax JSF requests
    are still sent to the server. To give you a little head start, there are also
    what''s called client-side events. These events happen on the browser, such as
    expanding or collapsing a panel. In such case no request is sent to the server.
    We will cover them in more detail later in the book.'
  trans: '

    #### RichFaces 客户端验证


    JSF 自带了许多开箱即用的验证器，而 JSF 2 现在也支持 Bean 验证（JSR 303）。RichFaces 4 将验证功能向前推进了一步，增加了基于
    Bean 验证的客户端验证。现在可以根据 JSR-303 定义在客户端执行验证。这意味着基本的客户端验证不再需要创建自定义的 JavaScript 验证器并将其插入到组件中；它只是在框架层面为不同层同步这些验证器。


    此外，使用 RichFaces，您将能够遵循 DRY（[`en.wikipedia.org/wiki/Don%27t_repeat_yourself`](http://en.wikipedia.org/wiki/Don%27t_repeat_yourself)）原则，在整个应用程序中实现这种验证。如果无法在客户端进行验证，则支持
    Ajax 回退（服务器端）。此外，RichFaces 提供了所谓的对象验证，允许整体验证服务器端实体，即使某些属性在当前视图中不存在。客户端验证将在第 11
    章中介绍。


    #### RichFaces 组件开发工具包


    该框架的另一部分是组件开发工具包（CDK）。CDK 包含各种 Maven 原型、代码生成工具、描述符和测试生成工具，以及一个允许仅使用页面代码创建渲染器类的模板工具。这些特性使组件开发者能够避免组件创建过程中的例行程序。CDK
    极大地简化并加速了具有内置 Ajax 支持的富组件开发。本书的这一版现在包含了 CDK 的相关内容。CDK 将在第 13 章中介绍。


    #### 将 RichFaces 与 CDI 和依赖注入结合使用


    上下文与依赖注入（CDI，JSR 299）和 Java 依赖注入（JSR 330）都是 Java EE 6 平台的一部分。两者都提供服务与组件，以简化企业级
    Java 应用程序的开发。尽管 JSF 2 现在提供了一种更简单的方式来使用注解配置 Bean，但使用 CDI Bean 而非 JSF Bean 通过提供统一的编程模型，为开发者带来了更多的灵活性和能力。JSF
    2 开箱即用地支持 CDI Bean。由于 RichFaces 4 基于 JSF 2，CDI 也可以与任何 RichFaces 4 组件一起使用。为了避免引入另一层（这实际上超出了本书的范围），本书中的示例将使用标准的
    JSF Bean。在所有示例中，JSF Bean 都可以轻松替换为 CDI Bean。


    #### RichFaces：历史视角


    如果您搜索 RichFaces，最终会看到对 Ajax4jsf 的引用。本节简要介绍 Ajax4jsf 的历史以及它如何成为 RichFaces 的一部分。Ajax4jsf
    起源于 RichFaces。Ajax4jsf 框架由 Alexander Smirnov 创建和设计。在 2005 年初，他正寻求将一项“热门”新技术及其相关经验添加到他的简历中。大约在同一时间，Jesse
    James Garrett 正在确立 Ajax 的概念。与此同时，JSF 开始获得发展势头。Alexander 想，为什么不将两者合并，这样在 JSF 应用程序中就能轻松拥有
    Ajax 功能呢？


    他在 SourceForge.net 上启动了该项目，并将其命名为 Telamon（取自莎士比亚戏剧《*安东尼与克莉奥佩特拉*》），Ajax4jsf 由此诞生。同年秋天，Smirnov
    加入了软件工程公司 Exadel，并继续开发该框架。Smirnov 的目标是创建一个易于使用的工具，为纯服务器端的 JSF 技术增加客户端丰富性，并且可以与任何现有的
    JSF 组件库一起使用。


    后来成为 Ajax4jsf 的第一个版本于 2006 年 3 月发布。它当时还不是一个完全独立的东西。相反，它是一个名为 Exadel RichFaces
    产品的一部分。同年晚些时候，RichFaces 被分离出来，Ajax4jsf 框架诞生了。


    RichFaces 提供开箱即用的组件，即所谓的以组件为中心的 Ajax 方法（组件完成您所需的一切），而 Ajax4jsf 则提供所谓的页面级 Ajax
    支持。作为开发者，您指定在客户端用户操作后，页面的哪些部分应在服务器上处理，以及处理完成后哪些部分应被渲染回来（渲染在服务器端进行，部分 DOM 更新在客户端进行）。Ajax4jsf
    成为一个托管在 Java.net 上的开源项目，而 RichFaces 则成为一个商业化的 JSF 组件库。Ajax4jsf 成为一个非常受欢迎的项目，因为它出现在正确的时间（恰逢人们开始将
    Ajax 添加到他们的应用程序中），但更重要的是，因为它非常易于使用。


    如果您有一个像这样的按钮


    *`<h:commandButton value="Submit" action="#{bean.save}"/>`*


    并且想要添加 Ajax 功能，您所要做的就是更改命名空间并添加一个 *`reRender`* 属性（RichFaces 3 代码），如下所示：


    *`<a4j:commandButton value="Submit" action="#{bean.save}" reRender="id1, id2"/>`*


    如果您有一个输入字段并想为其添加 Ajax 功能，那么接下来您要做的就是在其内部添加一个 `<a4:support>` 标签，如下所示：


    *`<h:inputText value="#{order.amount}">`*

    *`   <a4j:support event="onkeyup" reRender="id1, id2"/>`*

    *`</h:inputText/>`*


    时间快进到 2007 年 3 月。JBoss 和 Exadel 建立了合作伙伴关系，Ajax4jsf 和 RichFaces 将归入 JBoss 旗下，并分别称为
    JBoss Ajax4jsf 和 JBoss RichFaces。RichFaces 也将是开源且免费的。2007 年 9 月，JBoss 和 Exadel
    决定将 Ajax4jsf 和 RichFaces 重新合并到 RichFaces 名下。这是有道理的，因为这两个库都是免费且开源的。拥有单一产品解决了以前存在的许多版本和兼容性问题，例如确定哪个版本的
    Ajax4jsf 与哪个版本的 RichFaces 兼容。


    尽管今天您仍然会看到使用 `a4j:` 命名空间，但该产品现在被称为 RichFaces。


    在结束本章之前，我们想根据个人经验提供一些建议，这些建议将帮助您成为更好的 JSF 和 RichFaces 开发者。


    #### 理解 JSF 应用程序运行在服务器上


    根据我们教授 JSF 的经验，对于刚接触 JSF 的人来说，有时很难理解 JSF 组件树的概念以及它如何与他们在浏览器中看到的内容相关联。重要的是要记住，JSF
    是一个服务器端框架（因此得名 JavaServer Faces）。这意味着应用程序运行在服务器上。这也意味着任何事件处理都将在服务器上完成。那么，这一切如何与您在浏览器中看到的内容相契合呢？浏览器基本上是组件树的一个用户可读视图。它只是组件树的一个镜像，但采用您可以理解的格式（浏览器）。在构建
    JSF 应用程序时，想象您始终在处理 JSF 组件树可能会有所帮助。您更改或调用的任何内容始终在组件树上，而浏览器只是用于显示页面的客户端。


    您可能会想，那 Ajax 呢？在 JSF 的上下文中，当使用富组件时，它们会渲染所有必要的 JavaScript，以从浏览器向服务器发送 Ajax 请求。请求完成后，JSF
    将从组件树中渲染一些组件，并将该响应发送回浏览器。收到响应后，浏览器中的 JavaScript 将执行 DOM 更新（或部分页面更新）。即使我们现在有了富组件，Ajax
    JSF 请求仍然会发送到服务器。为了让您有个初步了解，还有所谓的客户端事件。这些事件发生在浏览器上，例如展开或折叠面板。在这种情况下，不会向服务器发送请求。我们将在本书后面更详细地介绍它们。

