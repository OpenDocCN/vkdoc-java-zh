  raw: 'The `autocompleteList` attribute is used to define data for the component.
    It points the component to a list of strings. In addition, the component provides
    one more way to define data: the `autocompleteMethod` attribute. It should be
    defined with a method that accepts a single string parameter and returns a list
    of suggestions. The parameter passed is the current value (prefix) from client
    input. Inside the method you can write any custom logic to return a list of suggestions
    based on the prefix passed from the client. But if you are using the `autocompleteMethod`
    for suggestions population instead of `autocompleteList` for client or lazy client
    mode, then you should not consider the prefix, as the component assumes that all
    the data will be loaded and thus will make no requests on prefix changes. [Listing
    5-10](#Chapter05.html#list_5_10) shows how it works when using `cachedAjax` mode.


    ***Listing 5-10.** Using cachedAjax mode*


    `<h:form>`

    `   <rich:autocomplete autocompleteMethod="#{autocompleteBean.autocomplete}"`

    `      mode="cachedAjax" tokens="," minChars="2" />`

    `</h:form>`


    [Listing 5-11](#Chapter05.html#list_5_11) shows the method code from the managed
    bean (it uses the same `suggestions` list).


    ***Listing 5-11.** Shows the method code from the managed bean*


    `public List<String> autocomplete(String prefix) {`

    `   List<String> result = new ArrayList<String>();`

    `   for (String suggestion : suggestions) {`

    `      if (suggestion.startsWith(prefix)){`

    `         result.add(suggestion);`

    `      }`

    `   }`

    `   return result;`

    `}`


    We should get almost the same results as from the previous example. However, there
    are two differences. Attribute `minChars` specifies the minimum number of characters
    entered before the component will ask the server side for suggestions (send an
    Ajax request). You will get the suggestions only after typing two or more letters.
    The `tokens` attribute is used and is set to a single comma (,) value. This attribute
    should be defined with some string and every character after that token string
    will become a separator between words. So, every character from that string (defined
    using token attribute) becomes a separator between different words. [Figure 5-11](#Chapter05.html#fig_5_11)
    shows what happens when using a token followed by additional characters (prefix).


    ![images](images/0511.jpg)


    ***Figure 5-11.** <rich:autocomplete> using tokens*


    Let''s try to change mode from `cachedAjax` to just `ajax`. In such case you will
    see that the request will be sent on every `keyup` after two letters entered rather
    than being called only on prefix changes.


    Now, let''s review more attributes that affect the look and feel, as well as selection
    features. The component can render an additional button that will show all the
    suggestions even if the `minChars` condition hasn''t been satisfied, as shown
    in [Listing 5-12](#Chapter05.html#list_5_12).


    ***Listing 5-12.** Rendering an additional button that shows all the suggestions*


    `<h:form>`

    `<rich:autocomplete autocompleteList="#{autocompleteBean.suggestions}"` ![images](images/U002.jpg)

    `mode="lazyClient"` ***`showButton="true" selectFirst="true"`*** `/>`

    `</h:form>`


    The result is shown in [Figure 5-12](#Chapter05.html#fig_5_12). Note the button
    on the right side of input (with the arrow pointing down). Also, notice that the
    first matching suggestion is shown inside the input and will be set into the input
    when you blur out. That''s getting achieved by the `selectFirst` attribute set
    to `true`.


    ![images](images/0512.jpg)


    ***Figure 5-12.** <rich:autocomplete> with selectFirst=”true”*


    Another design-related attribute is `autofill`. If set to *`true`*, the component
    will insert the remaining part of the first matching suggestion, as shown in [Figure
    5-13](#Chapter05.html#fig_5_13). It will be inserted selected so further input
    will update it.


    ![images](images/0513.jpg)


    ***Figure 5-13.**<rich:autocomplete> with autofill=”true”*


    #### <rich:autocomplete> Client-side Filter Customization


    You''re able to return the suggestions from the server according to any custom
    filtering logic in *`autocompleteMethod`*. But, the same could be done on the
    client side when using client mode or just `autocompleteList` for fetching the
    data. All you have to define is the `clientFilterFunction` attribute, which should
    be set to a JavaScript function name that does the filtering. It should accept
    two parameters: prefix entered and suggestion string. It should return true in
    case the string matches the prefix, or false if not. The method will be called
    by the component for every available suggestion for the current prefix. The default
    filter function uses “startsWith” logic to filter results, but you can easily
    customize it to use anything else. For example, [Listing 5-13](#Chapter05.html#list_5_13)
    shows a JavaScript function that performs filtering using the “contains” rule
    for substring value.


    ***Listing 5-13.** Shows a JavaScript function that performs filtering*


    `<script>`

    `function` ***`customFilter`***`(subString, value){`

    `   if(subString.length>=1) {`

    `      if(value.indexOf(subString)!=-1)`

    `         return true;`

    `      else`

    `         return false;`

    `   }   `

    `   return true;`

    `};`

    `</script>`


    `<h:form>`

    `<rich:autocomplete autocompleteList="#{autocompleteBean.suggestions}"` ![images](images/U002.jpg)

    `mode="lazyClient"` ***`clientFilterFunction="customFilter"`***`/>`

    `</h:form>`


    Running the JavaScript custom filter function is shown in [Figure 5-14](#Chapter05.html#fig_5_14).
    User-entered “be” appears as a substring in all three values shown in the list.


    ![images](images/0514.jpg)


    ***Figure 5-14.** <rich:autocomplete> custom client filtering*


    As mentioned earlier, “contains” logic is now used for filtering instead of the
    default “startsWith.”'
