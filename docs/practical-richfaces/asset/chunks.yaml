    #### 使用 `<a4j:outputPanel>` 实现自动渲染区域


    要渲染一个或一组组件，我们使用 `render` 属性。`render` 属性可以接受以下任意值：`@all`、`@this`、`@form`、`@none`、ID，以及绑定到
    Set、List 或包含 ID 的 String 的 EL 表达式。RichFaces 在使用 EL 时增加了一项重要特性：ID 会在同一个请求中被解析。我们在第
    2 章中介绍过这个特性。RichFaces 提供的另一个功能是能够用逗号分隔 ID（而 JSF 2 中仅支持空格），如下所示：


    `render="id1, id2, id3"`


    使用带 ID 的 `render` 属性通常已经足够，但如果某些组件需要在每次请求时都渲染，情况就会变得相当复杂。此外，如果假设有大量组件会发送 Ajax
    请求，我们就需要在每个这样的组件或行为上指定需要渲染的组件。RichFaces 通过提供一个特殊的 `<a4j:outputPanel>` 组件解决了这个问题：使用该组件后，面板内的所有组件都会在任何
    Ajax 请求时自动渲染，无需通过 `render` 属性指向该面板或其内部的组件。


    代码清单 3-27 展示了一个使用 `<a4j:outputPanel>` 的示例。就其本身而言，`<a4j:outputPanel>` 与 `<h:panelGroup>`
    差别不大。然而，要使此面板及其内部所有内容自动渲染，我们需要设置一个特殊的 `ajaxRendered="true"` 属性，如代码清单 3-27 所示。


    ***代码清单 3-27.** 设置特殊的 `ajaxRendered="true"` 属性*


    `<h:form>`

    `   <a4j:commandButton value="更新时间" />`

    `   <a4j:outputPanel ajaxRendered="true">`

    `      <h:outputText value="#{clockBean.now}" />`

    `   </a4j:outputPanel>`

    `</h:form>`


    请注意，`<a4j:commandButton>` 没有 `render` 属性，但时间仍然被渲染了，这是因为我们使用了 `<a4j:outputPanel
    ajaxRendered="true">`，这再次将整个面板标记为自动渲染区域。


    `<a4j:outputPanel>` 另一个常见的用途是包装那些在页面初始显示时不渲染，但在 Ajax 请求后才渲染的组件。这也是许多用户在开始使用 JSF
    和 Ajax 时经常遇到的问题。让我们以图 3-3 中所示的“世界七大奇迹”示例为例。


    ![图片](img/0303.jpg)


    ***图 3-3.** 显示或隐藏世界七大奇迹列表*


    顶部有两个按钮，用于隐藏或显示表格。当页面首次渲染时，表格不渲染（隐藏）。然后，选择“显示”应渲染该表格。


    JSF 页面如代码清单 3-28 所示。


    ***代码清单 3-28.** 展示 JSF 页面*


    `<h:form>`

    `   <h:panelGrid>`

    `      <h:selectOneRadio value="#{dynamicUpdateBean.display}">`

    `         <f:selectItem itemLabel="显示" itemValue="true" />`

    `         <f:selectItem itemLabel="隐藏" itemValue="false" />`

    `         <a4j:ajax execute="@this" render="wonderList" />`

    `      </h:selectOneRadio>`

    `   </h:panelGrid>`


    `   <h:dataTable id="wonderList" value="#{wonderListBean.list}"`

    `      var="wonder" rendered="#{dynamicUpdateBean.display}">`

    `      <f:facet name="header">世界七大奇迹</f:facet>`

    `      <h:column>`

    `         <f:facet name="header">名称</f:facet>`

    `         <h:outputText value="#{wonder.name}" />`

    `      </h:column>`

    `      <h:column>`

    `          <f:facet name="header">位置</f:facet>`

    `          <h:outputText value="#{wonder.location}" />`

    `      </h:column>`

    `   </h:dataTable>`

    `</h:form>`


    在代码清单 3-28 中，当页面首次渲染时，`#{dynamicUpdateBean.display}` 被设置为 `false`，因此表格不显示。当选择“显示”按钮时，我们使用
    Ajax 请求将 `#{dynamicUpdateBean.display}` 设置为 `true`，然后渲染表格。如果你运行这段代码，表格将不会显示。正如我们之前提到的，这是刚开始使用
    JSF 和 Ajax 的用户常遇到的障碍。问题的根源在于，我们试图重新渲染一个之前未在页面中渲染过的组件。在解释这个问题之前，代码清单 3-29 展示了 `Wonder`
    类。


    ***代码清单 3-29.** 展示 Wonder 类*


    `public class Wonder {`


    `   private String name;`

    `   private String location;`


    `   public Wonder(String name, String location) {`


    `      this.name = name;`

    `      this.location = location;`

    `   }`

    `   // Getters 和 Setters`

    `}`


    代码清单 3-30 展示了保存奇迹列表的管理 Bean。


    ***代码清单 3-30.** 保存奇迹列表的管理 Bean*


    `@ManagedBean`

    `@RequestScoped`

    `public class WonderListBean {`


    `   private ArrayList <Wonder> list;`


    `   public ArrayList<Wonder> getList() {`

    `        return list;`

    `   }`

    `   @PostConstruct`

    `   public void init () {`

    `      list = new ArrayList <Wonder>();`

    `      list.add(new Wonder("奇琴伊察", "墨西哥"));`

    `      list.add(new Wonder("救世基督像", "巴西"));`

    `      list.add(new Wonder("罗马斗兽场", "意大利"));`

    `      list.add(new Wonder("中国长城", "中国"));`

    `      list.add(new Wonder("马丘比丘", "秘鲁"));`

    `      list.add(new Wonder("佩特拉古城", "约旦"));`

    `      list.add(new Wonder("泰姬陵", "印度"));`

    `   }`

    `}`


    当页面首次渲染时，表格组件没有被渲染。换句话说，没有向浏览器发送任何标记。当我们选择“显示”时，我们发送一个 Ajax 请求并将 `#{dynamicUpdateBean.display}`
    设置为 `true`。同时我们也渲染了表格（`render="wonderList"`）。表格标记被发送到浏览器。现在的问题是，RichFaces 不知道应该更新浏览器中的哪个
    DOM 节点来放置表格内容，仅仅因为之前不存在这样的节点。


    Ajax 更新是基于 ID 完成的。当某些标记被渲染并发送到浏览器时，它会附带一个 ID。JavaScript 负责更新 DOM，并会尝试定位一个具有完全相同
    ID 的节点。如果找到了这样的 ID，那么新内容将替换 DOM 中的旧内容，从而实现 Ajax 更新。如果找不到这样的节点（就像我们这种情况），那么新内容就会被简单地忽略。


    解决方案是创建一个始终渲染的表格占位符。然后，我们不再更新（渲染）表格本身，而是渲染这个占位符。占位符内的任何内容都将毫无问题地始终更新。如果我们使用 `<a4j:outputPanel>`，实际上可以同时获得两个特性。首先，我们得到了一个占位符，其次，我们不再需要渲染表格，因为
    `<a4j:outputPanel ajaxRendered="true">` 是一个自动渲染的面板。代码清单 3-31 展示了如何使用 `<a4j:outputPanel>`
    实现这一点。


    ***代码清单 3-31.** 使用 `<a4j:outputPanel>`*


    `<h:form>`

    `   <h:panelGrid>`

    `       <h:selectOneRadio value="#{dynamicUpdateBean.display}">`

    `       <f:selectItem itemLabel="显示" itemValue="true" />`

    `       <f:selectItem itemLabel="隐藏" itemValue="false" />`

    **`<a4j:ajax execute="@this"/>`**

    `       </h:selectOneRadio>`

    `   </h:panelGrid>`

    **`<a4j:outputPanel ajaxRendered="true" layout="block">`**

    `      <h:dataTable id="wonderList" value="#{wonderListBean.list}"`

    `         var="wonder" rendered="#{dynamicUpdateBean.display}">`

    `          ...`

    `      </h:dataTable>`

    **`</a4j:outputPanel>`**

    `</h:form>`

