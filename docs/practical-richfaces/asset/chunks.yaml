- fmt: "### Uploading files with `<rich:fileUpload>`\n\n`<rich:fileUpload>`, shown\
    \ in [Figure 5-37](#Chapter05.html#fig_5_37), is a component that provides asynchronous\
    \ file input features and a highly customizable rich look and feel with uploading\
    \ files information and progress indication.\n\n![images](images/0537.jpg)\n\n\
    ***Figure 5-37.** `<rich:fileUpload>` component*\n\nThe JSF page code that defines\
    \ the component is shown in [Listing 5-33](#Chapter05.html#list_5_33).\n\n***Listing\
    \ 5-33.** The JSF page code*\n\n```\n<h:form>\n   <rich:fileUpload fileUploadListener=\"\
    #{fileUploadBean.listener}\"/>\n<h:form>\n```\n\nThe only attribute that you will\
    \ have to use is `fileUploadListener`. It should be defined with a method expression,\
    \ and the listener method will be responsible for processing uploaded files. It\
    \ should be a void method that accepts a single parameter of `org.richfaces.event.FileUploadEvent`\
    \ type. `FileUploadEvent` provides a `getUploadedFile` method that returns an\
    \ instance of the uploaded file described in [Listing 5-34](#Chapter05.html#list_5_34).\n\
    \nLet's also look at a simple bean that stores an uploaded file object in session.\n\
    \n***Listing 5-34.** A simple managed bean*\n\n```\nimport org.richfaces.model.UploadedFile;\n\
    ...\n@ManagedBean\n@SessionScoped\npublic class FileUploadBean {\n   private UploadedFile\
    \ file;\n   public void listener(FileUploadEvent event) throws Exception {\n \
    \     file = event.getUploadedFile();\n   }\n   //Getters and setters\n}\n```\n\
    \n[Table 5-13](#Chapter05.html#tab_5_13) lists `UploadedFile` interface methods\
    \ that can be used to obtain uploaded file information.\n\n![images](images/t0513.jpg)\n\
    \nLet's review a number of additional settings. At first, as with any component\
    \ that sends Ajax requests to the server, you have to use a form to wrap the component.\
    \ However, using the RichFaces file upload component, you don't need to make the\
    \ form a multipart form, as it will be automatically handled by RichFaces. Using\
    \ the standard `<h:form>` is sufficient.\n\nFile upload component has two options\
    \ that are defined as application context-parameters in `web.xml` listed in [Table\
    \ 5-14](#Chapter05.html#tab_5_14).\n\n![images](images/t0514.jpg)\n\nNow let's\
    \ add a limitation as to what kind of files can be uploaded, as in [Listing 5-35](#Chapter05.html#list_5_35).\n\
    \n***Listing 5-35.** Adding a limitation to what files can be uploaded*\n\n```\n\
    <rich:fileUpload id=\"fileUpload\" acceptedTypes=\"jpg, gif, png\"\n   fileUploadListener=\"\
    #{fileUploadBean.listener}\"   \ndisabled=\"#{fileUploadBean.filesCountExceeded}\"\
    />\n```\n\nNow the component will allow uploading only .jpg, .gif and .png images\
    \ and once `#{fileUploadBean.filesCountExceeded}` evaluates to true, the component\
    \ will be disabled and not allow any additional uploads. If `#{fileUploadBean.filesCountExceeded}`\
    \ changes on the server, the component needs to be re-rendered in order to update\
    \ its state on the client.\n\nLet's look at another example uploading images with\
    \ thumbnail support, as in [Listing 5-36](#Chapter05.html#list_5_36).\n\n***Listing\
    \ 5-36.** Uploading images with thumbnail support*\n\n```\n<h:form>\n   <h:panelGrid\
    \ columns=\"2\" columnClasses=\"top,top\">\n      <rich:fileUpload fileUploadListener=\"\
    #{fileUploadBean.listener}\"\n         maxFilesQuantity=\"#{fileUploadBean.uploadsAvailable}\"\
    \ id=\"upload\"\n         acceptedTypes=\"jpg, gif, png, bmp\">\n<a4j:ajax event=\"\
    uploadcomplete\" execute=\"@none\" render=\"info\" />\n      </rich:fileUpload>\n\
    <h:panelGroup id=\"info\">\n   <rich:panel bodyClass=\"info\">\n      <f:facet\
    \ name=\"header\">Uploaded Files Info</f:facet>\n      <rich:dataGrid columns=\"\
    1\" value=\"#{fileUploadBean.files}\" var=\"file\" rowKeyVar=\"row\">\n      \
    \   <rich:panel>\n            <h:panelGrid columns=\"2\">\n            <a4j:mediaOutput\
    \ element=\"img\" mimeType=\"#{file.contentType}\"\n               createContent=\"\
    #{fileUploadBean.paint}\" value=\"#{row}\" style=\"width:100px;\nheight:100px;\"\
    \n               cacheable=\"false\">\n               <f:param value=\"#{fileUploadBean.timeStamp}\"\
    \ name=\"time\" />\n            </a4j:mediaOutput>\n            <h:panelGrid columns=\"\
    2\">\n               <h:outputText value=\"File Name:\" />\n               <h:outputText\
    \ value=\"#{file.name}\" />\n               <h:outputText value=\"File Length(bytes):\"\
    \ />\n               <h:outputText value=\"#{file.size}\" />\n            </h:panelGrid>\n\
    \            </h:panelGrid>\n         </rich:panel>\n      </rich:dataGrid>\n\
    \   </rich:panel>\n   </h:panelGroup>\n   </h:panelGrid>\n</h:form>\n```\n\nAnd\
    \ the managed bean snippet is shown in [Listing 5-37](#Chapter05.html#list_5_37).\n\
    \n***Listing 5-37.** The managed bean snippet*\n\n```\n@ManagedBean\n@SessionScoped\n\
    public class FileUploadBean {\n   private ArrayList<UploadedFile> files = new\
    \ ArrayList<UploadedFile>();\n\n   public void paint(OutputStream stream, Object\
    \ object) throws IOException {\n      stream.write(getFiles().get((Integer) object).getData());\n\
    \   }\n\n   public void listener(FileUploadEvent event) throws Exception {\n \
    \     UploadedFile item = event.getUploadedFile();\n      files.add(item);\n \
    \  }\n\n   public Date getTimeStamp(){\n      return new Date();\n   }\n\n   //\
    \ Getters and setters\n}\n```\n\nAfter the files are uploaded, `<a4j:ajax>` performs\
    \ an Ajax request to the server and updates the thumbnails panel, as shown in\
    \ [Figure 5-38](#Chapter05.html#fig_5_38).\n\n![images](images/0538.jpg)\n\n***Figure\
    \ 5-38.** `<rich:fileUpload>` with thumbnails panel*\n\nEvery uploaded file was\
    \ stored in a list. We then iterate over the list using the `<rich:dataGrid>`\
    \ component and pass the image to a `<a4j:mediaOutput>` component in order to\
    \ output the image file thumbnail.\n\n#### Component Facets\n\nA single `progress`\
    \ facet is available on the `<rich:fileUpload>` component. It allows you to redefine\
    \ built-in `<rich:progressBar>` functionality in the component. You could place\
    \ `<rich:progressBar>` inside the facet and customize its behavior or look and\
    \ feel as you need.\n\n#### Component JavaScript API\n\nAs of the writing of this\
    \ book, the `<rich:fileUpload>` component doesn't provide public JavaScript API.\
    \ JavaScript API might be added in future releases. Visit the JBoss Community\
    \ RichFaces site at [`http://richfaces.org`](http://richfaces.org) for updates.\n\
    \n### Summary\n\nThis chapter covered RichFaces input components. All input components\
    \ provide rich client functionality and some have built-in Ajax support. For input\
    \ components that don't provide built-in Ajax support out of the box, you can\
    \ easily add Ajax support by attaching `<a4j:ajax>` behavior to any event available\
    \ on the component.\n\nAs you are working with these components, don't forget\
    \ the rich JavaScript API many provide. Many components also provide facets to\
    \ redefine some part of a component. All these features make RichFaces input components\
    \ very powerful and flexible.\n\nUnder the hood, most components are just inputs\
    \ so all the basic JSF concepts, such as conversion and validation, apply here\
    \ as well. To see all the input components in action, view the components demo\
    \ on the JBoss Community RichFaces site at [`http://www.jboss.org/richfaces/demos`](http://www.jboss.org/richfaces/demos).\n\
    \nNow that we are done with rich input components, in the next chapter we will\
    \ tell you about rich output components, such as pop-up panels, tabs, and more.\n\
    \n## C H A P T E R 6\n\n## Rich Panel and Output Components\n\nRichFaces offers\
    \ a good number of out-of-the-box components for different data representation.\
    \ This chapter will cover output components such as simple panels, collapsible\
    \ panels, tabbed panels, toggle panels, and popup panels. Be prepared for numerous\
    \ examples as well as common usages, such as how to use a popup panel to display\
    \ a wizard or a status message."
