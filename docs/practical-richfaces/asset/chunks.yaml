    **`<a4j:attachQueue requestGroupingId="ajaxGroup" requestDelay="0" />`**

    `</a4j:commandButton>`


    Once we update both buttons to belong to the same request group, let''s trace
    the sequence in [Table 3-8.](#Chapter03.html#tab_3_8)


    ![images](images/t0308.jpg)


    Events A1 and A2 are combined because they are from the same component. When we
    queue the event, B1, it combines (or replaces) A2, as both buttons are now in
    the same request group id. Now, B1 fires immediately, as it doesn''t have any
    delay. If we were to put a delay for 1 second (1000ms), for example, then B1 would
    replace A2 and fire after 1 second.


    #### Ignoring “Stale” Responses


    Let''s review an example we saw earlier where a lowercase string is converted
    to an uppercase string. In the earlier example, we invoked the action after clicking
    a button. This example is slightly updated; we now invoke the action on the *`keyup`*
    event. The JSF page is shown in [Listing 3-54](#Chapter03.html#list_3_54).


    ***Listing 3-54.** The JSF page*


    `<h:form>`

    `   <a4j:status startText="Working..."`

    `      startStyle="background-color: #ffA500;`

    `      font-weight:bold;`

    `      position: absolute;`

    `      left: 520px;`

    `      top: 1px;`

    `      width: 100px;" />`


    `   <a4j:queue requestDelay="500"/>`

    `   <h:panelGrid>`

    `      <h:panelGrid>`

    `         <h:outputText value="Enter lower case text to convert to upper`

    `            case:" />`

    `         <h:inputText value="#{queueIgnoreOldBean.text}" >`

    `            <a4j:ajax event="keyup" render="upper"`

    `               listener="#{queueIgnoreOldBean.upperCase}"/>`

    `         </h:inputText>`

    `      </h:panelGrid>`

    `      <h:outputText id="upper" value="#{queueIgnoreOldBean.text}" />`

    `   </h:panelGrid>`

    `</h:form>`


    Notice that we put a delay of a half second before sending the Ajax request. This
    will allow us to “combine” events. Or in other words, wait for the user to enter
    more letters.


    The managed bean is shown in [Listing 3-55](#Chapter03.html#list_3_55).


    ***Listing 3-55.** The manage bean*


    `@ManagedBean`

    `@RequestScoped`

    `public class QueueIgnoreOldBean {`

    `   private String text;`


    `   // Getter and setter`


    `   public void upperCase(AjaxBehaviorEvent event) {`

    `      try {`

    `         Thread.sleep(2500);`

    `      } catch (InterruptedException e) {`

    `         e.printStackTrace();`

    `      }`

    `      setText(text.toUpperCase());`

    `   }`

    `}`


    Let''s say we type the word “dog.” A request will be sent, it takes 2.5 seconds
    for the action to be executed, at which point we should see the word DOG rendered
    in the page. Let''s repeat this again, but when the request is being executed
    on the server, quickly delete “dog” and type “cat.”


    The result that you will see is that first DOG will be rendered and then CAT will
    be rendered. Now the question is, does it make sense to render DOG if the user
    has changed the input to “cat?” The answer will depend, but in most cases there
    is no more need to show DOG because the user typed “cat.” DOG is in this case
    is a “stale” response. Whether you want to render DOG or not is up to you. Luckily,
    RichFaces provides a queue feature that allows you to ignore “stale” responses.
    The RichFaces queue provides an `ignoreDupResponse` attribute that allows you
    to do just that. When set to `true`, it will ignore duplicate responses from the
    same component. What does duplicate mean? Duplicate means that if a request is
    currently being executed and another request from the same component (or components
    grouped by `requestGroupingId`) is queued, then it will ignore the original response
    or DOM update. It''s important to understand that the request will execute on
    the server (we can''t stop it there), only the DOM update will be dropped or ignored.


    To ignore a “stale” response, we add the `ignoreDupRepsonses` attribute to the
    queue, as follows:


    `<a4j:queue requestDelay="500" ignoreDupResponses="true"/>`


    Let''s run the page again. Enter “dog,” and while the request is being executed
    (status is shown), quickly delete and type “cat.” You should now see only CAT
    rendered. The original response (DOG) finished, but we decided to ignore this
    DOM update.


    It''s important to keep in mind that RichFaces provides a great number of advanced
    features, but it just upgrades the standard JSF 2 queue.


    ### More a4j:* Tags and Features


    This section will cover more a4j:* tags and features, such as how to show status
    during an Ajax request, how to display Ajax request/response logging information,
    and a simpler way to invoke action listeners.'
