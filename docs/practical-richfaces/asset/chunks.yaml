    class="rfs-ctn">` `   <h:panelGrid columns="1" >` `      <h:outputText value="Favorite
    city: " />` `      <h:inputText value="#{geography.city}" />` `      <h:commandButton
    action="next" value="Submit" />` `   </h:panelGrid>` `</div>`  `<h:panelGrid columns="1"`
    **`styleClass="rfs-ctn"`**`>` `   <h:outputText value="Favorite city: " />` `   <h:inputText
    value="#{geography.city}" />` `   <h:commandButton action="next" value="Submit"
    />` `</h:panelGrid>`  When we enabled *`org.richfaces.enableControlSkinningClasses,`*
    we also turned off *`org.richfaces.enableControlSkinning`*, as only one approach
