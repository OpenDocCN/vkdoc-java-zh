  raw: '#### Partial View Processing


    Without Ajax, when a page (form) is submitted, the entire form is processed on
    the server. When we say *processed on the server*, we refer to input or action
    components that go through the JSF life cycle; in particular, phases such as Apply
    Request Values, Process Validation, Update Model, and Invoke Application.


    Again, without Ajax it''s simple. The entire form or all the components within
    the form are processed. When working with Ajax, the situation is different. We
    might want only a particular component to be processed and not process all other
    components; for example, if we only want to validate one component and don''t
    need to validate anything else. In such case, we need to be able to select which
    component is processed.


    Deciding what to process is done via the `execute` attribute, described in [Table
    2-4](#Chapter02.html#tab_2_4).


    ![Images](images/t0204.jpg)


    The `execute` attribute can have different values, as shown in [Table 2-5](#Chapter02.html#tab_2_5).


    ![Images](images/t0205.jpg)


    Notice that default value is `@this`, which means that the component firing the
    Ajax request will be processed by default. [Listing 2-17](#Chapter02.html#list_2_17)
    shows an example.


    ***Listing 2-17.** Example*


    `<h:commandButton value="Click">`

    `  <f:ajax render="id"/>`

    `</h:commandButton>`


    This is equivalent to [Listing 2-18](#Chapter02.html#list_2_18).


    ***Listing 2-18.** Another example*


    `<h:commandButton value="Click">`

    `  <f:ajax execute="@this" render="id"/>`

    `</h:commandButton>`


    Everything is good if we only want to process (execute) the button. But what happens
    if we have something like [Listing 2-19](#Chapter02.html#list_2_19)?


    ***Listing 2-19.** Example code*


    `<h:form>`

    `   <h:panelGrid columns="2">`

    `      <h:outputText value="Text:" />`

    `      <h:inputText value="#{bean.text}" />`


    `      <h:outputText value="Echo:" />`

    `      <h:outputText id="text" value="#{bean.text}" />`


    `      <h:outputText value="Count:" />`

    `      <h:outputText id="count" value="#{bean.count}" />`

    `   </h:panelGrid>`

    `   <h:commandButton value="Submit">`

    `      <f:ajax render="text count" listener="#{bean.countListener}" />`

    `   </h:commandButton>`

    `</h:form>`


    The managed bean is shown in [Listing 2-20](#Chapter02.html#list_2_20).


    ***Listing 2-20.** Managed bean*


    `@ManagedBean`

    `@RequestScoped`

    `public class Bean {`


    `   private String text;`

    `   private Integer count;`


    `   public void countListener(AjaxBehaviorEvent event) {`

    `      count = text.length();`

    `   }`

    `}`


    Everything appears to be fine, but when you run it you will get an error. Do you
    see where the problem is? We attached Ajax behavior to a button, using the default
    value for `execute`, which is `@this`. When the button is clicked, only that button
    is processed; the input fields are not processed and inside the listener you will
    get an exception (`NullPointerException` as the `text` property is null).


    This code example introduced another `<f:ajax>` behavior attribute, `listener`,
    which is described in [Table 2-6](#Chapter02.html#tab_2_6).


    ![Images](images/t0206.jpg)


    Notice that the `listener` takes one argument of a type `AjaxBehaviorEvent`, as
    shown in [Listing 2-21](#Chapter02.html#list_2_21).


    ***Listing 2-21.** The listener takes one argument of a type AjaxBehaviorEvent*


    `import javax.faces.event.AjaxBehaviorEvent;`


    `public void listenerName(AjaxBehaviorEvent event) {`

    `   …`

    `}`


    ![images](images/square.jpg) **Note** The entire form is still submitted to the
    server. But only the button is processed (executed) on the server. If you have
    been using RichFaces 3, then this is something you will run into immediately because
    the entire form was processed by default.


    There are a number of ways to fix the problem. First, we can list the ids we want
    to process in the `execute` attribute, as shown in [Listing 2-22](#Chapter02.html#list_2_22).


    ***Listing 2-22.** Listed ids we want to process in the execute attribute*


    `<h:form>`

    `   <h:panelGrid columns="2">`

    `      <h:outputText value="Text:" />`

    `<h:inputText` **`id="inputText"`** `value="#{bean.text}" />`


    `      <h:outputText value="Echo:" />`

    `      <h:outputText id="text" value="#{bean.text}" />`


    `      <h:outputText value="Count:" />`

    `      <h:outputText id="count" value="#{bean.count}" />`

    `   </h:panelGrid>`

    `   <h:commandButton value="Submit">`

    `      <f:ajax render="text count" listener="#{bean.countListener}"`

    **`execute="inputText"`**`/>`

    `   </h:commandButton>`

    `</h:form>`


    ![images](images/square.jpg) **Note** Even though we don''t list a button in the
    `execute` list, the button is processed automatically because it''s the control
    that''s being activated.


    Instead of listing the ids, another option is to use the predefined value `@form`
    to process the entire form, as shown in [Listing 2-23](#Chapter02.html#list_2_23).


    ***Listing 2-23.** Option to use the predefined value @form*


    `<h:form>`

    `   <h:panelGrid columns="2">`

    `      <h:outputText value="Text:" />`

    `<h:inputText` **`id="inputText"`** `value="#{bean.text}" />`


    `      <h:outputText value="Echo:" />`

    `      <h:outputText id="text" value="#{bean.text}" />`


    `      <h:outputText value="Count:" />`

    `      <h:outputText id="count" value="#{bean.count}" />`

    `   </h:panelGrid>`

    `   <h:commandButton value="Submit">`

    `      <f:ajax render="text count" listener="#{bean.countListener}"`

    **`execute="@form"`**`/>`

    `   </h:commandButton>`

    `</h:form>`


    You are probably wondering at this point, where is the RichFaces coverage? Well,
    we wanted to make sure that you are familiar with basic Ajax features in JSF 2
    first, as everything in RichFaces 4 is based on the core JSF 2 functionality.


    Now that we have covered the basics, we can start learning how RichFaces upgrades
    and makes more powerful this basic feature set. If you feel that you need a little
    more JSF 2 coverage, we recommend the following two books: *Core JavaServer Faces
    (Third Edition)* by David Geary and Cay Horstmann (Prentice Hall, 2010), and *JavaServer
    Faces 2.0: The Complete Reference* by Ed Burns and Chris Schalk (McGraw-Hill,
    2009).


    ### RichFaces <a4j:ajax>


    The first thing we should tell you is that the good old and popular `a4j:support`
    has been retired. Instead, there is now the new and shiny `<a4j:ajax>` tag. Why
    the change? RichFaces 4 is based on JSF 2 and in order to show that RichFaces
    simply extends the core functionality, the tag follows the same naming convention,
    and so is now called `<a4j:ajax>`.


    At this point you are probably wondering what''s the difference between the standard
    `<f:ajax>` and `<a4j:ajax>` tag. First of all, `<a4j:ajax>` is 100-percent based
    on `<f:ajax>` behavior functionality.


    [Listing 2-24](#Chapter02.html#list_2_24) shows one of the examples used in this
    chapter.


    ***Listing 2-24.** Example*


    `<h:inputText value="#{bean.text}">`

    `   <f:ajax event="change"/>`

    `</h:inputText>`


    We can rewrite as shown in [Listing 2-25](#Chapter02.html#list_2_25).


    ***Listing 2-25.** Rewrite of [Listing 2-24](#Chapter02.html#list_2_24)*


    `<h:inputText value="#{bean.text}">`

    `   <a4j:ajax event="change"/>`

    `</h:inputText>`


    And it''s going to work exactly the same way. In other words, anywhere you see
    `<f:ajax>`, it can be replaced with `<a4j:ajax>`, and everything will work exactly
    the same way. What else do you get besides a name change? [Table 2-7](#Chapter02.html#tab_2_7)
    summarizes the extras you get when using the `<a4j:ajax>` tag.


    ![Images](images/t0207.jpg)


    ![Images](images/t0207a.jpg)


    Let''s now explore each feature or upgrade in more detail.'
  trans: '

    #### 局部视图处理


    在不使用 Ajax 的情况下，当页面（表单）被提交时，整个表单会在服务器端被处理。我们所说的*在服务器端处理*，指的是输入或动作组件会经历 JSF 生命周期；具体来说，包括应用请求值、处理验证、更新模型和调用应用程序等阶段。


    同样，不使用 Ajax 时，处理过程很简单。整个表单或表单内的所有组件都会被处理。当使用 Ajax 时，情况就不同了。我们可能只想处理某个特定的组件，而不处理所有其他组件；例如，如果我们只想验证一个组件，而不需要验证其他任何东西。在这种情况下，我们需要能够选择哪个组件被处理。


    决定处理什么内容是通过 `execute` 属性来完成的，如表 2-4 所述。


    ![Images](img/t0204.jpg)


    `execute` 属性可以有不同的值，如表 2-5 所示。


    ![Images](img/t0205.jpg)


    请注意，默认值是 `@this`，这意味着触发 Ajax 请求的组件默认会被处理。清单 2-17 展示了一个示例。


    ***清单 2-17.** 示例*


    `<h:commandButton value="Click">`

    `  <f:ajax render="id"/>`

    `</h:commandButton>`


    这等同于清单 2-18。


    ***清单 2-18.** 另一个示例*


    `<h:commandButton value="Click">`

    `  <f:ajax execute="@this" render="id"/>`

    `</h:commandButton>`


    如果我们只想处理（执行）按钮，一切都没问题。但是，如果我们遇到像清单 2-19 这样的情况会发生什么呢？


    ***清单 2-19.** 示例代码*


    `<h:form>`

    `   <h:panelGrid columns="2">`

    `      <h:outputText value="Text:" />`

    `      <h:inputText value="#{bean.text}" />`


    `      <h:outputText value="Echo:" />`

    `      <h:outputText id="text" value="#{bean.text}" />`


    `      <h:outputText value="Count:" />`

    `      <h:outputText id="count" value="#{bean.count}" />`

    `   </h:panelGrid>`

    `   <h:commandButton value="Submit">`

    `      <f:ajax render="text count" listener="#{bean.countListener}" />`

    `   </h:commandButton>`

    `</h:form>`


    托管 Bean 如清单 2-20 所示。


    ***清单 2-20.** 托管 Bean*


    `@ManagedBean`

    `@RequestScoped`

    `public class Bean {`


    `   private String text;`

    `   private Integer count;`


    `   public void countListener(AjaxBehaviorEvent event) {`

    `      count = text.length();`

    `   }`

    `}`


    一切看起来都很好，但当你运行它时，你会得到一个错误。你看到问题出在哪里了吗？我们将 Ajax 行为附加到一个按钮上，使用了 `execute` 的默认值 `@this`。当按钮被点击时，只有那个按钮被处理；输入字段没有被处理，在监听器中你会得到一个异常（因为
    `text` 属性为 null，所以是 `NullPointerException`）。


    这个代码示例引入了另一个 `<f:ajax>` 行为属性 `listener`，如表 2-6 所述。


    ![Images](img/t0206.jpg)


    请注意，`listener` 接受一个 `AjaxBehaviorEvent` 类型的参数，如清单 2-21 所示。


    ***清单 2-21.** 监听器接受一个 AjaxBehaviorEvent 类型的参数*


    `import javax.faces.event.AjaxBehaviorEvent;`


    `public void listenerName(AjaxBehaviorEvent event) {`

    `   …`

    `}`


    ![images](img/square.jpg) **注意** 整个表单仍然会被提交到服务器。但只有按钮在服务器端被处理（执行）。如果你一直在使用 RichFaces
    3，那么你会立即遇到这个问题，因为默认情况下整个表单都会被处理。


    有多种方法可以解决这个问题。首先，我们可以在 `execute` 属性中列出我们想要处理的 id，如清单 2-22 所示。


    ***清单 2-22.** 在 execute 属性中列出我们想要处理的 id*


    `<h:form>`

    `   <h:panelGrid columns="2">`

    `      <h:outputText value="Text:" />`

    `<h:inputText` **`id="inputText"`** `value="#{bean.text}" />`


    `      <h:outputText value="Echo:" />`

    `      <h:outputText id="text" value="#{bean.text}" />`


    `      <h:outputText value="Count:" />`

    `      <h:outputText id="count" value="#{bean.count}" />`

    `   </h:panelGrid>`

    `   <h:commandButton value="Submit">`

    `      <f:ajax render="text count" listener="#{bean.countListener}"`

    **`execute="inputText"`**`/>`

    `   </h:commandButton>`

    `</h:form>`


    ![images](img/square.jpg) **注意** 即使我们没有在 `execute` 列表中列出按钮，该按钮也会被自动处理，因为它是被激活的控件。


    除了列出 id，另一种选择是使用预定义值 `@form` 来处理整个表单，如清单 2-23 所示。


    ***清单 2-23.** 使用预定义值 @form 的选项*


    `<h:form>`

    `   <h:panelGrid columns="2">`

    `      <h:outputText value="Text:" />`

    `<h:inputText` **`id="inputText"`** `value="#{bean.text}" />`


    `      <h:outputText value="Echo:" />`

    `      <h:outputText id="text" value="#{bean.text}" />`


    `      <h:outputText value="Count:" />`

    `      <h:outputText id="count" value="#{bean.count}" />`

    `   </h:panelGrid>`

    `   <h:commandButton value="Submit">`

    `      <f:ajax render="text count" listener="#{bean.countListener}"`

    **`execute="@form"`**`/>`

    `   </h:commandButton>`

    `</h:form>`


    此时你可能在想，RichFaces 的内容在哪里？嗯，我们想确保你首先熟悉 JSF 2 中的基本 Ajax 特性，因为 RichFaces 4 中的所有内容都基于核心的
    JSF 2 功能。


    既然我们已经介绍了基础知识，我们可以开始学习 RichFaces 如何升级并使这个基本功能集更加强大。如果你觉得需要更多关于 JSF 2 的内容，我们推荐以下两本书：David
    Geary 和 Cay Horstmann 合著的 *Core JavaServer Faces (Third Edition)*（Prentice Hall,
    2010），以及 Ed Burns 和 Chris Schalk 合著的 *JavaServer Faces 2.0: The Complete Reference*（McGraw-Hill,
    2009）。


    ### RichFaces <a4j:ajax>


    我们首先要告诉你的是，过去常用且流行的 `a4j:support` 已经被淘汰了。取而代之的是新的、闪亮的 `<a4j:ajax>` 标签。为什么会有这个变化？RichFaces
    4 基于 JSF 2，为了表明 RichFaces 只是扩展了核心功能，该标签遵循相同的命名约定，因此现在被称为 `<a4j:ajax>`。


    此时你可能想知道标准的 `<f:ajax>` 和 `<a4j:ajax>` 标签之间有什么区别。首先，`<a4j:ajax>` 100% 基于 `<f:ajax>`
    的行为功能。


    清单 2-24 展示了本章中使用的一个示例。


    ***清单 2-24.** 示例*


    `<h:inputText value="#{bean.text}">`

    `   <f:ajax event="change"/>`

    `</h:inputText>`


    我们可以像清单 2-25 那样重写。


    ***清单 2-25.** 清单 2-24 的重写*


    `<h:inputText value="#{bean.text}">`

    `   <a4j:ajax event="change"/>`

    `</h:inputText>`


    它的工作方式完全相同。换句话说，在任何你看到 `<f:ajax>` 的地方，都可以用 `<a4j:ajax>` 替换，并且一切都会以完全相同的方式工作。除了名称更改，你还能得到什么？表
    2-7 总结了使用 `<a4j:ajax>` 标签时获得的额外功能。


    ![Images](img/t0207.jpg)


    ![Images](img/t0207a.jpg)


    现在让我们更详细地探讨每个特性或升级。

