    Using <rich:menuItem> as a Standalone Component    `<rich:menuItem>` is not only
    used to construct the menu items for `<rich:dropDownMenu>`, but can also be used
    as a standalone component. You are probably wondering when and why you would use
    it.    Let’s say you are using a toolbar, but in addition to menus you also want
    to place other items, such as `About` link—which is just a top level link, without
    menu popups. In such case you can place a link inside the toolbar as we showed
    in the `<rich:toolbar>` section. But, at the same time, you want it to look consistent
    with other items in the menu. So, you would have to add styling and hover CSS
    selectors. You would also need to add an icon and align it with the link. That’s
    probably a better job for a composite component. Going back to `<rich:menuItem>`,
    being able to use this component as a standalone, we can achieve the same functionality
    without doing any extra work. An example is shown in [Figure 8-13](#Chapter08.html#fig_8_13).  ![images](images/0813.jpg)  ***Figure
    8-13.** Menu items in toolbar*    The very simple code that creates such a toolbar
    is shown in [Listing 8-14](#Chapter08.html#list_8_14).    ***Listing 8-14.** Simple
    code to create toolbar*  `<rich:toolbar width="100px;">` `   <rich:menuItem label="New"
    icon="/images/icons/new.gif" />` `   <rich:menuItem label="Open File..." icon="/images/icons/open.gif"
    />` `</rich:toolbar>`  #### Using Menu Components JavaScript API    `<rich:dropDownMenu>`
    provides JavaScript API, as shown in [Table 8-1](#Chapter08.html#tab_8_1).    ![images](images/t0801.jpg)    `<rich:menuItem>`
    provides a single `activate()` method that can be useful to call directly if used
    as a standalone component.    ### Using <rich:panelMenu>    `<rich:panelMenu>`
    builds a vertical, collapsible menu with any depth level. Let’s look at [Figure
    8-14](#Chapter08.html#fig_8_14).  ![images](images/0814.jpg)  ***Figure 8-14.**
    Simple panel menu*    To start building this menu, you first start with `<rich:panelMenu>`,
    which acts as the main container for all menu items or nodes. Inside the container,
    you can place any number of menu items (`<rich:panelMenuItem>`) or groups (`<rich:panelMenuGroup>`).
    Each group in turn can have many menu items or additional groups, and so on. There
    is no limit to the depth of the menu that you can create.    [Listing 8-15](#Chapter08.html#list_8_15)
    shows the code for creation of the menu shown in [Figure 8-14](#Chapter08.html#fig_8_14).    ***Listing
    8-15.** Shows code for simple panel menu*  `<h:form>` `   <rich:panel style="width:450px"
    header="Using rich:panelMenu">` `      <rich:panelMenu mode="ajax" topItemLeftIcon="disc"
    itemLeftIcon="grid"` `         topGroupExpandedLeftIcon="chevronDown" groupExpandedLeftIcon="triangleDown"`
    `         expandSingle="false">` `         <rich:panelMenuGroup label="Group 1">`
