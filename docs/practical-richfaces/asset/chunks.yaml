- fmt: "#### render Attribute Options\n\nAs you have seen, the `render` attribute\
    \ works the same way except for a few differences when using id or EL, as shown\
    \ in [Table 2-8](#Chapter02.html#tab_2_8).\n\n![Images](images/t0208.jpg)\n\n\
    In standard JSF 2, it's possible to list any number of ids in `render`, each separated\
    \ by a space, as shown in [Listing 2-26](#Chapter02.html#list_2_26).\n\n**Listing\
    \ 2-26.** List any number of ids, each separated by a space\n\n```\n<h:inputText\
    \ value=\"#{bean.text}\">\n   <f:ajax event=\"change\" render=\"id1 id2 id3 idX\"\
    />\n</h:inputText>\n```\n\nWhen using `<a4j:ajax>`, in addition to a space, it's\
    \ also possible to separate with a comma (`,`), as shown in [Listing 2-27](#Chapter02.html#list_2_27).\n\
    \n**Listing 2-27.** Example of separating ids with a comma instead of just a space\n\
    \n```\n<h:inputText value=\"#{bean.text}\">\n   <f:ajax event=\"change\" render=\"\
    id1, id2, id3, idN\"/>\n</h:inputText>\n```\n\nWe believe using a comma is a little\
    \ easier and more familiar for those who used `<a4j:support>` with RichFaces 3,\
    \ but it's really up to you.\n\nThe second difference is more important. Next,\
    \ we'll use an example to show how it works in JSF 2.\n\n### Dynamic render\n\n\
    To show how a dynamic render works in JSF 2, we'll create a sample page to look\
    \ like [Figure 2-1](#Chapter02.html#fig_2_1).\n\n![images](images/0201.jpg)\n\n\
    **Figure 2-1.** Dynamic render with three clocks\n\nInstead of hard coding the\
    \ component to render, we are going to select which component we would like to\
    \ update. Now, being able to set the `render` attribute to an EL is supported\
    \ by JSF 2; however, it works slightly different when using RichFaces.\n\n[Listing\
    \ 2-28](#Chapter02.html#list_2_28) shows the JSF page.\n\n**Listing 2-28.** Shows\
    \ the JSF page\n\n```\n<h:form id=\"form\">\n   <h:panelGrid>\n      <h:selectOneRadio\
    \ value=\"#{bean.selection}\">\n         <f:selectItem itemValue=\"clock1\" itemLabel=\"\
    Clock 1\" />\n         <f:selectItem itemValue=\"clock2\" itemLabel=\"Clock 2\"\
    \ />\n         <f:selectItem itemValue=\"clock3\" itemLabel=\"Clock 3\" />\n \
    \     </h:selectOneRadio>\n      <h:commandButton id=\"updateButton\" value=\"\
    Update\">\n        <f:ajax event=\"click\" execute=\"@form\" listener=\"#{bean.selectComponents}\"\
    \n                render=\"#{bean.renderComponents}\" />\n       </h:commandButton>\n\
