    `event` 属性，即使使用默认值，也能减少错误并使代码更具可读性。


    RichFaces 通过提供内置 Ajax 支持的按钮和链接组件 `<a4j:commandButton>` 和 `<a4j:commandLink>`，使得使用支持
    Ajax 的按钮或链接更加容易。清单 3-6 展示了一个我们之前见过的示例。


    ***清单 3-6.** 示例*


