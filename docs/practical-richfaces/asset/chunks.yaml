    ### Summary


    In this chapter we showed you how to set up a RichFaces project using Maven and
    covered how to use JSF 2 standard `<f:ajax>` behavior. We then showed you how
    RichFaces `<a4j:ajax>` behavior upgrades the standard `<f:ajax>` with extra features
    and attributes.


    [Chapter 3](#Chapter03.html#ch3) will continue coverage of how RichFaces upgrades
    and extends standard Ajax functionality with tags such as `<a4j:commandButton>`,
    `<a4j:commandLink>`, `<a4j:poll>`, `<a4j:jsFunction>`, and `<a4j:region>` tags
    among the few. Keep in mind that all the features and attributes we covered in
    this chapter are also available on the tags we just listed. We will also cover
    advanced client queue customization and features that RichFaces provides on top
    of standard JSF 2 queue.


    ## C H A P T E R  3


    ## a4j:* Tags, Features and Concepts


    In previous chapters we covered the RichFaces `<a4j:ajax>` tag, which extends
    and upgrades the standard *`<f:ajax>`* tags with more features and options. In
    this chapter we are going to continue covering a4j:* library tags, features, and
    concepts. We will cover additional tags that fire an Ajax request, such as *`<a4j:poll>`*,
    *`<a4j:jsFunction>`*, advanced rendering options using the *`<a4j:outputPanel>`*
    component, advanced execute options, and numerous upgrades to the standard Ajax
    client queue.


    ### Sending an Ajax Request


    In this section you will learn how to use three new RichFaces components to send
    an Ajax request: `<a4j:commandButton>` (and `<a4j:commandLink>`) is a button with
    built-in Ajax behavior; `<a4j:jsFunction>` allows you to send an Ajax request
    from any HTML event or JavaScript function; and `<a4j:poll>` enables you to periodically
    send an Ajax request.'
