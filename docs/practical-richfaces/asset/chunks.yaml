    open a reference. Find the `<rich:panel>` component section there and look through
    the “Style classes and skin parameters” section inside.    All components will
    display a table showing how various CSS class names correspond to components.    [Table
    13-6](#Chapter13.html#tab_13_6) explains how each CSS class corresponds to the
    component’s appearance.    ![images](images/t1306.jpg)    The rest of components
    follow the same approach.    The last approach is to use fully user-defined classes
    just as you would normally.    #### User-Defined Style    The last approach is
    to use the attributes you have always used, such as `style`, `styleClass`, and
    any other component-defined style properties, such as `bodyClass`, `headerClass`,
    and so on, to define custom style classes. Using the same example, you add a user-defined
    class to the `<rich:panel>` component using the `styleClass` attribute, as shown
    in [Listing 13-15](#Chapter13.html#list_13_15).    ***Listing 13-15.** Adding
    a user-defined class to the `<rich:panel>` component using the `styleClass` attribute*  `<rich:panel
    id="panel" style="width:300px" styleClass="myClass">` `   <f:facet name="header">`
    `      Using skins is so cool...` `   </f:facet>` `   I can easily change how
    my application looks` `</rich:panel>`  `myClass` is defined in [Listing 13-16](#Chapter13.html#list_13_16).    ***Listing
    13-16.** myClass*  `<style>`  `.myClass {` `   font-style: italic` `}` `</style>`  The
    generated HTML is shown in [Listing 13-17](#Chapter13.html#list_13_17).    ***Listing
    13-17.** Generated HTML*  `<div style="width: 300px;" id="panel" class="rf-p myClass">`
    `   <div id="panel_header" class="rf-p-hdr">` `        Using skins is so cool!`
    `   </div>` `   <div id="panel_body" class="rf-p-b">` `        I can easily change
