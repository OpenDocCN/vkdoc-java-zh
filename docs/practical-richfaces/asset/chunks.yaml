- fmt: "### Creating a New Project with RichFaces\n\nThe RichFaces project also contains\
    \ several Maven archetypes to quickly create projects (including one for a Google\
    \ App Engine targeted project).\n\n[Listing 2-5](#Chapter02.html#list_2_5) shows\
    \ a simple project generation where `groupId` defines the package for Java classes\
    \ (for example, managed beans) and `artifactId` defines the name for the project.\n\
    \n**Listing 2-5.** Shows a simple project generation\n\n```\nmvn archetype:generate\n\
    \  -DarchetypeGroupId=org.richfaces.archetypes\n  -DarchetypeArtifactId=richfaces-archetype-simpleapp\n\
    \  -DarchetypeVersion=<version>\n  -DgroupId=<groupId>\n  -DartifactId=<artifactId>\n\
    ```\n\n[Listing 2-6](#Chapter02.html#list_2_6) shows actual code for generating\
    \ a RichFaces project.\n\n**Listing 2-6.** Generating a RichFaces project\n\n\
    ```\nmvn archetype:generate \\\n  -DarchetypeGroupId=org.richfaces.archetypes\
    \ \\\n  -DarchetypeArtifactId=richfaces-archetype-simpleapp \\\n  -DarchetypeVersion=4.0.0.Final\
    \ \\\n  -DgroupId=org.richfaces.book  \\\n  -DartifactId=richfaces4-start\n```\n\
    \n[Listing 2-7](#Chapter02.html#list_2_7) shows a standard Maven project structure.\n\
    \n**Listing 2-7.** The standard Maven project structure\n\n```\nrichfaces4-start\n\
    \   /src\n   /target\n   pom.xml\n   readme.txt\n```\n\nThe project comes with\
    \ a simple one-page application. Let's deploy and run the project to make sure\
    \ everything works. If you open the `readme.txt` file, you will see the commands\
    \ to build the application for either a Tomcat or a JBoss 6 server.\n\n![images](images/square.jpg)\
    \ **Tip** If you want to try the latest snapshot version, change the version to\
    \ `4.0.1-SNAPSHOT` or `4.1.0-SNAPSHOT`.\n\nThe Tomcat command is as follows:\n\
    \n```\nmvn clean package\n```\n\nThe following is a Tomcat and JBoss 6 command:\n\
    \n```\nmvn clean package -P release\n```\n\nAs you can see, creating a new RichFaces\
    \ 4 project is very simple and you can easily open it in any IDE that supports\
    \ importing a Maven-based project. Even though it's possible to use plain Eclipse\
    \ (we recommend Eclipse for Java EE Developer) there is one IDE that has the best\
    \ RichFaces 4 support out there, and that's JBoss Tools or JBoss Developer Studio.\n\
    \nJBoss Tools is an open source and free set of plug-ins for Eclipse, which provides\
    \ wizards, advanced source and visual tools for building JSF 2 and RichFaces 4\
    \ applications. Additional features include Seam, CDI, JPA, and Hibernate tools.\
    \ You can download JBoss Tools from [`www.jboss.org/tools`](http://www.jboss.org/tools).\
    \ As of writing of this book, you would want to download JBoss Tools version 3.2\
    \ for Eclipse 3.6 (or the latest version 3.3 for Eclipse 3.7).\n\nYou will also\
    \ find instructions on how to install JBoss Tools. It's rather simple: you will\
    \ need to download the latest supported Eclipse for Java EE developers and then\
    \ point to the JBoss Tools plug-ins URL in the Eclipse Install Software screen.\
    \ Finally, you will need a servlet container such as Tomcat to deploy the application.\
    \ We recommend Tomcat 7.\n\nIf you would rather install everything from one file\
    \ (Eclipse, JBoss Tools), then you can choose JBoss Developer Studio. You can\
    \ download JBoss Developer Studio from [`www.jboss.com/products/devstudio/`](http://www.jboss.com/products/devstudio/).\n\
    \nOnce you set up Eclipse or Eclipse with JBoss Tools, there are two ways to import\
    \ the Maven project into Eclipse. One method is to execute the following command\
    \ inside the project root folder:\n\n```\nmvn eclipse:eclipse -Dwtpversion=2.0\n\
    ```\n\nThis command makes it possible to import the project into Eclipse by adding\
    \ Eclipse project configuration files such as `.project` and `.classpath`. Once\
    \ you run this command in Eclipse, select File/Import/General/Existing Project\
    \ into Workspace and point to the project root directory.\n\nAn alternative method\
    \ is by installing the M2Eclipse ([`http://m2eclipse.sonatype.org/`](http://m2eclipse.sonatype.org/))\
    \ plug-in, which helps with working with Maven-based projects in Eclipse. If you\
    \ install the optional Integration with Web Tools Project (WTP) M2Eclipse extension,\
    \ it will allow you to easily deploy to a Tomcat server. Once installed, select\
    \ File/Import/Maven/Existing Maven Projects and point to project root.\n\n![images](images/square.jpg)\
    \ **Tip** If Eclipse is not your cup of tea, NetBeans and IntelliJ are excellent\
    \ IDEs and both have first class Maven support.\n\n### Configuring RichFaces\n\
    \nThere is nothing you actually need to do to configure RichFaces. If you look\
    \ inside the `web.xml` file in the generated project, you will see no mention\
    \ of a RichFaces filter. Starting with RichFaces 4, you don't need to register\
    \ a filter in the `web.xml` file. If RichFaces JARs are present in the project,\
    \ RichFaces will be used.\n\n#### Configuring a Skin\n\nThe only feature you might\
    \ want to configure is a RichFaces skin. Skins are covered in detail in [Chapter\
    \ 13](#Chapter13.html#ch13), but to use any of the out-of-the-box skins, just\
    \ set the context parameter shown in [Listing 2-8](#Chapter02.html#list_2_8).\n\
    \n**Listing 2-8.** Setting RichFaces skin in `web.xml` file\n\n```\n<context-param>\n\
    \    <param-name>org.richfaces.skin</param-name>\n    <param-value>ruby</param-value>\n\
    </context-param>\n```\n\n`ruby` is one of the built-in skins. You can choose any\
    \ skin from the following list:\n\n*   `DEFAULT`\n*   `plain`\n*   `emeraldTown`\n\
    *   `blueSky`\n*   `wine`\n*   `japanCherry`\n*   `ruby`\n*   `classic`\n*   `deepMarine`\n\
    *   `NULL`\n\n### Ajax in JSF 2\n\nJSF 2 comes with basic Ajax functionality built\
    \ in. If you have used RichFaces 3, then you will see that JSF 2 Ajax was greatly\
    \ inspired by the popular RichFaces `<a4j:support>` tag. You will see that the\
    \ concepts are the same, with a few things changed, such as attribute names. If\
    \ you are new to RichFaces, don't worry, in this chapter we will cover everything\
    \ from the beginning.\n\nAjax in JSF 2 comes in a form `<f:ajax>` behavior. Notice\
    \ that we call it a behavior instead of a component. A behavior is a new concept\
    \ in JSF 2. A behavior in JSF 2 is a client-side behavior (functionality) that\
    \ is added to a component. Let's see how to use the standard Ajax functionality\
    \ in JSF 2 before we get to RichFaces.\n\nWhen working with Ajax in the context\
    \ of JSF, you need to keep three things in mind: First, how to send an Ajax request;\
    \ second, what to process on the server (partial view processing); and third,\
    \ what to render (partial view rendering)."
  raw: '### Creating a New Project with RichFaces


    The RichFaces project also contains several Maven archetypes to quickly create
    projects (including one for a Google App Engine targeted project).


    [Listing 2-5](#Chapter02.html#list_2_5) shows a simple project generation where
    `groupId` defines the package for Java classes (for example, managed beans) and
    `artifactId` defines the name for the project.


    ***Listing 2-5.** Shows a simple project generation*


    `mvn archetype:generate`

    `  -DarchetypeGroupId=org.richfaces.archetypes`

    `  -DarchetypeArtifactId=richfaces-archetype-simpleapp`

    `  -DarchetypeVersion=<version>`

    `  -DgroupId=<groupId>`

    `  -DartifactId=<artifactId>`


    [Listing 2-6](#Chapter02.html#list_2_6) shows actual code for generating a RichFaces
    project.


    ***Listing 2-6.** Generating a RichFaces project*


    `mvn archetype:generate \`

    `  -DarchetypeGroupId=org.richfaces.archetypes \`

    `  -DarchetypeArtifactId=richfaces-archetype-simpleapp \`

    `  -DarchetypeVersion=4.0.0.Final \`

    `  -DgroupId=org.richfaces.book  \`

    `  -DartifactId=richfaces4-start`


    [Listing 2-7](#Chapter02.html#list_2_7) shows a standard Maven project structure.


    ***Listing 2-7.** The standard Maven project structure*


    `richfaces4-start`

    `   /src`

    `   /target`

    `   pom.xml`

    `   readme.txt`


    The project comes with a simple one-page application. Let''s deploy and run the
    project to make sure everything works. If you open the `readme.txt` file, you
    will see the commands to build the application for either a Tomcat or a JBoss
    6 server.


    ![images](images/square.jpg) **Tip** If you want to try the latest snapshot version,
    change the version to 4.0.1-SNAPSHOT or 4.1.0-SNAPSHOT.


    The Tomcat command is as follows:


    `mvn clean package`


    The following is a Tomcat and JBoss 6 command:


    `mvn clean package -P release`


    As you can see, creating a new RichFaces 4 project is very simple and you can
    easily open it in any IDE that supports importing a Maven-based project. Even
    though it''s possible to use plain Eclipse (we recommend Eclipse for Java EE Developer)
    there is one IDE that has the best RichFaces 4 support out there, and that''s
    JBoss Tools or JBoss Developer Studio.


    JBoss Tools is an open source and free set of plug-ins for Eclipse, which provides
    wizards, advanced source and visual tools for building JSF 2 and RichFaces 4 applications.
    Additional features include Seam, CDI, JPA, and Hibernate tools. You can download
    JBoss Tools from [`www.jboss.org/tools`](http://www.jboss.org/tools). As of writing
    of this book, you would want to download JBoss Tools version 3.2 for Eclipse 3.6
    (or the latest version 3.3 for Eclipse 3.7).


    You will also find instructions on how to install JBoss Tools. It''s rather simple:
    you will need to download the latest supported Eclipse for Java EE developers
    and then point to the JBoss Tools plug-ins URL in the Eclipse Install Software
    screen. Finally, you will need a servlet container such as Tomcat to deploy the
    application. We recommend Tomcat 7.


    If you would rather install everything from one file (Eclipse, JBoss Tools), then
    you can choose JBoss Developer Studio. You can download JBoss Developer Studio
    from [`www.jboss.com/products/devstudio/`](http://www.jboss.com/products/devstudio/).


    Once you set up Eclipse or Eclipse with JBoss Tools, there are two ways to import
    the Maven project into Eclipse. One method is to execute the following command
    inside the project root folder:


    `mvn eclipse:eclipse -Dwtpversion=2.0`


    This command makes it possible to import the project into Eclipse by adding Eclipse
    project configuration files such as `.project` and `.classpath`. Once you run
    this command in Eclipse, select File/Import/General/Existing Project into Workspace
    and point to the project root directory.


    An alternative method is by installing the M2Eclipse ([`http://m2eclipse.sonatype.org/`](http://m2eclipse.sonatype.org/))
    plug-in, which helps with working with Maven-based projects in Eclipse. If you
    install the optional Integration with Web Tools Project (WTP) M2Eclipse extension,
    it will allow you to easily deploy to a Tomcat server. Once installed, select
    File/Import/Maven/Existing Maven Projects and point to project root.


    ![images](images/square.jpg) **Tip** If Eclipse is not your cup of tea, NetBeans
    and IntelliJ are excellent IDEs and both have first class Maven support.


    ### Configuring RichFaces


    There is nothing you actually need to do to configure RichFaces. If you look inside
    the `web.xml` file in the generated project, you will see no mention of a RichFaces
    filter. Starting with RichFaces 4, you don''t need to register a filter in the
    `web.xml` file. If RichFaces JARs are present in the project, RichFaces will be
    used.


    #### Configuring a Skin


    The only feature you might want to configure is a RichFaces skin. Skins are covered
    in detail in [Chapter 13](#Chapter13.html#ch13), but to use any of the out-of-the-box
    skins, just set the context parameter shown in [Listing 2-8](#Chapter02.html#list_2_8).


    ***Listing 2-8.** Setting RichFaces skin in web.xml file*


    `<context-param>`

    `    <param-name>org.richfaces.skin</param-name>`

    `    <param-value>ruby</param-value>`

    `</context-param>`


    *`ruby`* is one of the built-in skins. You can choose any skin from the following
    list:


    *   `DEFAULT`

    *   `plain`

    *   `emeraldTown`

    *   `blueSky`

    *   `wine`

    *   `japanCherry`

    *   `ruby`

    *   `classic`

    *   `deepMarine`

    *   `NULL`


    ### Ajax in JSF 2


    JSF 2 comes with basic Ajax functionality built in. If you have used RichFaces
    3, then you will see that JSF 2 Ajax was greatly inspired by the popular RichFaces
    `<a4j:support>` tag. You will see that the concepts are the same, with a few things
    changed, such as attribute names. If you are new to RichFaces, don''t worry, in
    this chapter we will cover everything from the beginning.


    Ajax in JSF 2 comes in a form `<f:ajax>` behavior. Notice that we call it a behavior
    instead of a component. A behavior is a new concept in JSF 2\. A behavior in JSF
    2 is a client-side behavior (functionality) that is added to a component. Let''s
    see how to use the standard Ajax functionality in JSF 2 before we get to RichFaces.


    When working with Ajax in the context of JSF, you need to keep three things in
    mind: First, how to send an Ajax request; second, what to process on the server
    (partial view processing); and third, what to render (partial view rendering).'
  trans: '

    ### 使用 RichFaces 创建新项目


    RichFaces 项目还包含多个 Maven 原型，用于快速创建项目（包括一个针对 Google App Engine 的项目）。


    清单 2-5 展示了一个简单的项目生成过程，其中 `groupId` 定义了 Java 类（例如托管 Bean）的包，`artifactId` 定义了项目的名称。


    ***清单 2-5.** 展示一个简单的项目生成过程*


    `mvn archetype:generate`

    `  -DarchetypeGroupId=org.richfaces.archetypes`

    `  -DarchetypeArtifactId=richfaces-archetype-simpleapp`

    `  -DarchetypeVersion=<version>`

    `  -DgroupId=<groupId>`

    `  -DartifactId=<artifactId>`


    清单 2-6 展示了生成一个 RichFaces 项目的实际代码。


    ***清单 2-6.** 生成一个 RichFaces 项目*


    `mvn archetype:generate \`

    `  -DarchetypeGroupId=org.richfaces.archetypes \`

    `  -DarchetypeArtifactId=richfaces-archetype-simpleapp \`

    `  -DarchetypeVersion=4.0.0.Final \`

    `  -DgroupId=org.richfaces.book  \`

    `  -DartifactId=richfaces4-start`


    清单 2-7 展示了一个标准的 Maven 项目结构。


    ***清单 2-7.** 标准的 Maven 项目结构*


    `richfaces4-start`

    `   /src`

    `   /target`

    `   pom.xml`

    `   readme.txt`


    该项目附带一个简单的单页应用程序。让我们部署并运行该项目，以确保一切正常。如果你打开 `readme.txt` 文件，将会看到用于在 Tomcat 或 JBoss
    6 服务器上构建应用程序的命令。


    ![images](img/square.jpg) **提示** 如果你想尝试最新的快照版本，请将版本号改为 4.0.1-SNAPSHOT 或 4.1.0-SNAPSHOT。


    Tomcat 命令如下：


    `mvn clean package`


    以下是 Tomcat 和 JBoss 6 的命令：


    `mvn clean package -P release`


    如你所见，创建一个新的 RichFaces 4 项目非常简单，你可以轻松地在任何支持导入基于 Maven 项目的 IDE 中打开它。尽管可以使用普通的 Eclipse（我们推荐使用
    Eclipse for Java EE Developer），但有一个 IDE 对 RichFaces 4 的支持最好，那就是 JBoss Tools 或
    JBoss Developer Studio。


    JBoss Tools 是一套开源且免费的 Eclipse 插件，它提供了用于构建 JSF 2 和 RichFaces 4 应用程序的向导、高级源代码和可视化工具。其他功能包括
    Seam、CDI、JPA 和 Hibernate 工具。你可以从 [`www.jboss.org/tools`](http://www.jboss.org/tools)
    下载 JBoss Tools。在撰写本书时，你应该下载适用于 Eclipse 3.6 的 JBoss Tools 3.2 版本（或适用于 Eclipse 3.7
    的最新 3.3 版本）。


    你还会找到如何安装 JBoss Tools 的说明。这相当简单：你需要下载最新支持的 Eclipse for Java EE 开发者版本，然后在 Eclipse
    的 Install Software 界面中指向 JBoss Tools 插件的 URL。最后，你需要一个像 Tomcat 这样的 Servlet 容器来部署应用程序。我们推荐使用
    Tomcat 7。


    如果你希望从一个文件中安装所有内容（Eclipse、JBoss Tools），那么你可以选择 JBoss Developer Studio。你可以从 [`www.jboss.com/products/devstudio/`](http://www.jboss.com/products/devstudio/)
    下载 JBoss Developer Studio。


    一旦你设置好 Eclipse 或带有 JBoss Tools 的 Eclipse，有两种方法可以将 Maven 项目导入 Eclipse。一种方法是在项目根文件夹内执行以下命令：


    `mvn eclipse:eclipse -Dwtpversion=2.0`


    此命令通过添加 Eclipse 项目配置文件（如 `.project` 和 `.classpath`），使得可以将项目导入 Eclipse。在 Eclipse
    中运行此命令后，选择 File/Import/General/Existing Project into Workspace，然后指向项目根目录。


    另一种方法是安装 M2Eclipse ([`http://m2eclipse.sonatype.org/`](http://m2eclipse.sonatype.org/))
    插件，它有助于在 Eclipse 中处理基于 Maven 的项目。如果你安装了可选的 Integration with Web Tools Project
    (WTP) M2Eclipse 扩展，它将允许你轻松部署到 Tomcat 服务器。安装完成后，选择 File/Import/Maven/Existing Maven
    Projects，然后指向项目根目录。


    ![images](img/square.jpg) **提示** 如果你不喜欢 Eclipse，NetBeans 和 IntelliJ 也是优秀的 IDE，并且两者都提供一流的
    Maven 支持。


    ### 配置 RichFaces


    实际上，你不需要做任何事来配置 RichFaces。如果你查看生成项目中的 `web.xml` 文件，你会发现没有提到 RichFaces 过滤器。从 RichFaces
    4 开始，你不需要在 `web.xml` 文件中注册过滤器。如果项目中存在 RichFaces JAR 包，RichFaces 就会被使用。


    #### 配置皮肤


    你可能想要配置的唯一功能是 RichFaces 皮肤。皮肤将在第 13 章中详细介绍，但要使用任何现成的皮肤，只需设置清单 2-8 中所示的上下文参数即可。


    ***清单 2-8.** 在 web.xml 文件中设置 RichFaces 皮肤*


    `<context-param>`

    `    <param-name>org.richfaces.skin</param-name>`

    `    <param-value>ruby</param-value>`

    `</context-param>`


    *`ruby`* 是内置皮肤之一。你可以从以下列表中选择任意皮肤：


    *   `DEFAULT`

    *   `plain`

    *   `emeraldTown`

    *   `blueSky`

    *   `wine`

    *   `japanCherry`

    *   `ruby`

    *   `classic`

    *   `deepMarine`

    *   `NULL`


    ### JSF 2 中的 Ajax


    JSF 2 内置了基本的 Ajax 功能。如果你使用过 RichFaces 3，那么你会看到 JSF 2 Ajax 在很大程度上受到了流行的 RichFaces
    `<a4j:support>` 标签的启发。你会发现概念是相同的，只是更改了一些内容，例如属性名称。如果你是 RichFaces 新手，请不要担心，本章我们将从头开始介绍所有内容。


    JSF 2 中的 Ajax 以 `<f:ajax>` 行为的形式出现。请注意，我们称其为行为而不是组件。行为是 JSF 2 中的一个新概念。JSF 2 中的行为是添加到组件上的客户端行为（功能）。在我们介绍
    RichFaces 之前，先来看看如何在 JSF 2 中使用标准的 Ajax 功能。


    在 JSF 上下文中使用 Ajax 时，你需要记住三件事：第一，如何发送 Ajax 请求；第二，在服务器上处理什么（部分视图处理）；第三，渲染什么（部分视图渲染）。

    '
- fmt: "### Sending an Ajax Request\n\nSending an Ajax request is pretty straight\
    \ forward: you really just have one option and that's using `<f:ajax>` behavior.\
    \ This behavior is always attached to another UI component on a page; it's never\
    \ used by itself. [Listing 2-9](#Chapter02.html#list_2_9) shows an example.\n\n\
    ***Listing 2-9.** Sending an Ajax Request*\n\n```\n<h:inputText value=\"#{bean.text}\"\
    >\n   <f:ajax />\n</h:inputText>\n```\n\nThat's pretty simple, right? We just\
    \ added the ability to fire an Ajax request when the value inside the input field\
    \ changes. The Ajax request is fired from the client (browser) and always on some\
    \ browser event, such as click, change, and so forth. To be more precise, it can\
    \ be any event supported by the parent UI component. Components represent HTML\
    \ elements in the browser, so it's all the events that are supported by that particular\
    \ HTML element.\n\nThe managed bean is shown in [Listing 2-10](#Chapter02.html#list_2_10).\n\
    \n***Listing 2-10.** Managed bean*\n\n```\n@ManagedBean\n@RequestScoped\npublic\
    \ class Bean {\n\n   private String text;\n\n   // getter and setter\n}\n```\n\
    \nYou probably noticed that we didn't actually specify the event, but said that\
    \ the Ajax request would be fired when the value in the input field changes. The\
    \ reason the Ajax request would fire on value change is because the default value\
    \ `change` event is used. Every UI component in JSF 2 has a standard event on\
    \ which the Ajax request would be fired if one is not explicitly specified. For\
    \ example, with `<h:commandButton>` the default event is `action`.\n\nWhen we\
    \ want to fire an Ajax request on an event other than the default, or when we\
    \ just want to make the code more readable by showing the event, then the `event`\
    \ attribute is used. It is described in [Table 2-1](#Chapter02.html#tab_2_1).\n\
    \n![Images](images/t0201.jpg)\n\nIf we wanted to specify the `change` event in\
    \ our example, which is also the default event, it would look like in [Listing\
    \ 2-11](#Chapter02.html#list_2_11) and work exactly the same way.\n\n***Listing\
    \ 2-11.** Specify the change event*\n\n```\n<h:inputText value=\"#{bean.text}\"\
    >\n   <f:ajax event=\"change\"/>\n</h:inputText>\n```\n\nOr we could use a different\
    \ event, as shown in [Listing 2-12](#Chapter02.html#list_2_12).\n\n***Listing\
    \ 2-12.** Changing the default event*\n\n```\n<h:inputText value=\"#{bean.text}\"\
    >\n   <f:ajax event=\"keyup\"/>\n</h:inputText>\n```\n\n![images](images/square.jpg)\
    \ **Note** If you are familiar with RichFaces 3, you specify the event with `on\
    \ [eventName]`, for example `onchange`. In JSF 2 and RichFaces 4, you only specify\
    \ the actual action: `keyup`.\n\nIf we were using a button, it would look like\
    \ in [Listing 2-13](#Chapter02.html#list_2_13).\n\n***Listing 2-13.** Example\
    \ button*\n\n```\n<h:commandButton value=\"Save\">\n   <f:ajax/>\n</h:commandButton>\n\
    ```\n\nWe are not specifying the event, as it will default to click. If we wanted\
    \ to specify a different event, we would use the `event` attribute shown in [Listing\
    \ 2-14](#Chapter02.html#list_2_14).\n\n***Listing 2-14.** Event attribute*\n\n\
    ```\n<h:commandButton value=\"Save\">\n   <f:ajax event=\"mouseover\"/>\n</h:commandButton>\n\
    ```\n\nNow that we covered the basics of firing an Ajax request, let's add a very\
    \ important part: partial view rendering.\n\n### Partial View Rendering\n\nNow\
    \ that we know how to fire an Ajax request, we also would like to do a partial\
    \ page update or partial view rendering.\n\n![images](images/square.jpg) **Note**\
    \ From now on, whenever we use `<f:ajax>` tag, we will specify the event even\
    \ if it's the default event. We believe it makes the code more readable and easier\
    \ to understand.\n\nAs we are in the context of JSF, we can specify which component\
    \ or components we would like to update or render via the `render` attribute described\
    \ in [Table 2-2](#Chapter02.html#tab_2_2).\n\n![Images](images/t0202.jpg)\n\n\
    Updating our example would look like [Listing 2-15](#Chapter02.html#list_2_15).\n\
    \n***Listing 2-15.** Updating the example*\n\n```\n<h:form>\n   <h:panelGrid>\n\
    \      <h:inputText value=\"#{bean.text}\" >\n         <f:ajax event=\"keyup\"\
    \ render=\"text\"/>\n      </h:inputText>\n      <h:outputText id=\"text\" value=\"\
    #{bean.text}\" />\n   </h:panelGrid>\n</h:form>\n```\n\nOn every `keyup`, an Ajax\
    \ request will be fired to the server. The request will go through the standard\
    \ JSF life cycle, but instead of rendering the entire view, we are only going\
    \ to render the `<h:outputText>` component with `text` id.\n\n![images](images/square.jpg)\
    \ **Note** In RichFaces 3, the attribute to specify what to re-render is called\
    \ `reRender`. In JSF 2 it is called `render`. As RichFaces 4 is based on JSF 2,\
    \ it uses `render` in all components. You could also define ids using absolute\
    \ addressing, such as when updating a component with the same \"text\" id placed\
    \ in other form. For example, `render=\":form2:text\"`.\n\nIn the earlier example,\
    \ we set `render` to one component. We can also decide to render more than one\
    \ component. In this case, we would just list the ids of all components, space\
    \ separated, as follows:\n\n```\n<f:ajax event=\"keyup\" render=\"id1 id2 id3\"\
    />\n```\n\nIn case you don't want to list every single component, it's possible\
    \ to render just the parent container, such as `<h:panelGrid>`. In this case,\
    \ all its children components will also be rendered, as shown in [Listing 2-16](#Chapter02.html#list_2_16).\n\
    \n***Listing 2-16.** Rendering all components inside a panel*\n\n```\n<h:commandButton\
    \ value=\"Save\">\n    <f:ajax event=\"click\" render=\"out\"/>\n</h:commandButton>\n\
    …\n<h:panelGrid id=\"out\">\n   <h:outputText />\n   <h:outputText />\n</h:panelGrid>\n\
    ```\n\nIn addition to the component id, `render` can also be set to a number of\
    \ predefined values, as shown in [Table 2-3](#Chapter02.html#tab_2_3).\n\n![Images](images/t0203.jpg)\n\
    \nBefore we move on to partial view processing, there is one more thing we want\
    \ to tell you. You will hear people use the terms *partial page update* and *partial\
    \ view rendering* interchangeably. That's absolutely fine, but it's worth pointing\
    \ out how they relate in the context of JSF.\n\nIn JSF, the view is rendered on\
    \ the server. When we add Ajax, the view is still rendered on the server—we just\
    \ don't need to render everything. We render specified components and thus we\
    \ refer to it as partial view rendering. When the rendered response (after an\
    \ Ajax request) is sent to the browser, that's where the partial page update happens\
    \ in the browser. There is a JavaScript library that takes the response and does\
    \ the DOM (Document Object Model) update. It's fine to use a partial page update\
    \ or partial view rendering—as long as you understand that the markup is rendered\
    \ on the server and the actual page update happens in the browser."
  raw: '#### Sending an Ajax Request


    Sending an Ajax request is pretty straight forward: you really just have one option
    and that''s using `<f:ajax>` behavior. This behavior is always attached to another
    UI component on a page; it''s never used by itself. [Listing 2-9](#Chapter02.html#list_2_9)
    shows an example.


    ***Listing 2-9.** Sending an Ajax Request*


    `<h:inputText value="#{bean.text}">`

    `   <f:ajax />`

    `</h:inputText>`


    That''s pretty simple, right? We just added the ability to fire an Ajax request
    when the value inside the input field changes. The Ajax request is fired from
    the client (browser) and always on some browser event, such as click, change,
    and so forth. To be more precise, it can be any event supported by the parent
    UI component. Components represent HTML elements in the browser, so it''s all
    the events that are supported by that particular HTML element.


    The managed bean is shown in [Listing 2-10](#Chapter02.html#list_2_10).


    ***Listing 2-10.** Managed bean*


    `@ManagedBean`

    `@RequestScoped`

    `public class Bean {`


    `   private String text;`


    `   // getter and setter`

    `}`


    You probably noticed that we didn''t actually specify the event, but said that
    the Ajax request would be fired when the value in the input field changes. The
    reason the Ajax request would fire on value change is because the default value
    `change` event is used. Every UI component in JSF 2 has a standard event on which
    the Ajax request would be fired if one is not explicitly specified. For example,
    with `<h:commandButton>` the default event is `action`.


    When we want to fire an Ajax request on an event other than the default, or when
    we just want to make the code more readable by showing the event, then the `event`
    attribute is used. It is described in [Table 2-1](#Chapter02.html#tab_2_1).


    ![Images](images/t0201.jpg)


    If we wanted to specify the `change` event in our example, which is also the default
    event, it would look like in [Listing 2-11](#Chapter02.html#list_2_11) and work
    exactly the same way.


    ***Listing 2-11.** Specify the change event*


    `<h:inputText value="#{bean.text}">`

    `   <f:ajax event="change"/>`

    `</h:inputText>`


    Or we could use a different event, as shown in [Listing 2-12](#Chapter02.html#list_2_12).


    ***Listing 2-12.** Changing the default event*


    `<h:inputText value="#{bean.text}">`

    `   <f:ajax event="keyup"/>`

    `</h:inputText>`


    ![images](images/square.jpg) **Note** If you are familiar with RichFaces 3, you
    specify the event with on [eventName], for example `onchange`. In JSF 2 and RichFaces
    4, you only specify the actual action: `keyup`.


    If we were using a button, it would look like in [Listing 2-13](#Chapter02.html#list_2_13).


    ***Listing 2-13.** Example button*


    `<h:commandButton value="Save">`

    `   <f:ajax/>`

    `</h:commandButton>`


    We are not specifying the event, as it will default to click. If we wanted to
    specify a different event, we would use the `event` attribute shown in [Listing
    2-14](#Chapter02.html#list_2_14).


    ***Listing 2-14.** Event attribute*


    `<h:commandButton value="Save">`

    `   <f:ajax event="mouseover"/>`

    `</h:commandButton>`


    Now that we covered the basics of firing an Ajax request, let''s add a very important
    part: partial view rendering.


    #### Partial View Rendering


    Now that we know how to fire an Ajax request, we also would like to do a partial
    page update or partial view rendering.


    ![images](images/square.jpg) **Note** From now on, whenever we use *`<f:ajax>`*
    tag, we will specify the event even if it''s the default event. We believe it
    makes the code more readable and easier to understand.


    As we are in the context of JSF, we can specify which component or components
    we would like to update or render via the `render` attribute described in [Table
    2-2](#Chapter02.html#tab_2_2).


    ![Images](images/t0202.jpg)


    Updating our example would look like [Listing 2-15](#Chapter02.html#list_2_15).


    ***Listing 2-15.** Updating the example*


    `<h:form>`

    `   <h:panelGrid>`

    `      <h:inputText value="#{bean.text}" >`

    `         <f:ajax event="keyup" render="text"/>`

    `      </h:inputText>`

    `      <h:outputText id="text" value="#{bean.text}" />`

    `   </h:panelGrid>`

    `</h:form>`


    On every `keyup`, an Ajax request will be fired to the server. The request will
    go through the standard JSF life cycle, but instead of rendering the entire view,
    we are only going to render the `<h:outputText>` component with `text` id.


    ![images](images/square.jpg) **Note** In RichFaces 3, the attribute to specify
    what to re-render is called `reRender`. In JSF 2 it is called `render`. As RichFaces
    4 is based on JSF 2, it uses `render` in all components. You could also define
    ids using absolute addressing, such as when updating a component with the same
    “text” id placed in other form. For example, `render=":form2:text"`.


    In the earlier example, we set `render` to one component. We can also decide to
    render more than one component. In this case, we would just list the ids of all
    components, space separated, as follows:


    `<f:ajax event="keyup" render="id1 id2 id3"/>`


    In case you don''t want to list every single component, it''s possible to render
    just the parent container, such as `<h:panelGrid>`. In this case, all its children
    components will also be rendered, as shown in [Listing 2-16](#Chapter02.html#list_2_16).


    ***Listing 2-16.** Rendering all components inside a panel*


    `<h:commandButton value="Save">`

    `    <f:ajax event="click" render="out"/>`

    `</h:commandButton>`

    `…`

    `<h:panelGrid id="out">`

    `   <h:outputText />`

    `   <h:outputText />`

    `</h:panelGrid>`


    In addition to the component id, *`render`* can also be set to a number of predefined
    values, as shown in [Table 2-3](#Chapter02.html#tab_2_3).


    ![Images](images/t0203.jpg)


    Before we move on to partial view processing, there is one more thing we want
    to tell you. You will hear people use the terms *partial page update* and *partial
    view rendering* interchangeably. That''s absolutely fine, but it''s worth pointing
    out how they relate in the context of JSF.


    In JSF, the view is rendered on the server. When we add Ajax, the view is still
    rendered on the server—we just don''t need to render everything. We render specified
    components and thus we refer to it as partial view rendering. When the rendered
    response (after an Ajax request) is sent to the browser, that''s where the partial
    page update happens in the browser. There is a JavaScript library that takes the
    response and does the DOM (Document Object Model) update. It''s fine to use a
    partial page update or partial view rendering—as long as you understand that the
    markup is rendered on the server and the actual page update happens in the browser.'
  trans: '

    #### 发送 Ajax 请求


    发送 Ajax 请求相当直接：实际上你只有一个选项，那就是使用 `<f:ajax>` 行为。此行为始终附加到页面上的另一个 UI 组件上；它从不单独使用。清单
    2-9 展示了一个示例。


    ***清单 2-9.** 发送 Ajax 请求*


    `<h:inputText value="#{bean.text}">`

    `   <f:ajax />`

    `</h:inputText>`


    这很简单，对吧？我们只是添加了在输入字段内的值发生变化时触发 Ajax 请求的能力。Ajax 请求从客户端（浏览器）发起，并且总是在某个浏览器事件（如 click、change
    等）上触发。更准确地说，它可以是父 UI 组件支持的任何事件。组件代表浏览器中的 HTML 元素，因此它涵盖了该特定 HTML 元素所支持的所有事件。


    托管 bean 如清单 2-10 所示。


    ***清单 2-10.** 托管 bean*


    `@ManagedBean`

    `@RequestScoped`

    `public class Bean {`


    `   private String text;`


    `   // getter 和 setter`

    `}`


    你可能已经注意到，我们实际上并没有指定事件，但提到 Ajax 请求会在输入字段的值发生变化时触发。Ajax 请求会在值变化时触发的原因是使用了默认的 `change`
    事件。JSF 2 中的每个 UI 组件都有一个标准事件，如果未明确指定，Ajax 请求将在此事件上触发。例如，对于 `<h:commandButton>`，默认事件是
    `action`。


    当我们希望在默认事件之外的其他事件上触发 Ajax 请求，或者仅仅想通过显示事件来使代码更具可读性时，就会使用 `event` 属性。该属性在表 2-1 中进行了描述。


    ![图片](img/t0201.jpg)


    如果我们想在我们的示例中指定 `change` 事件（这也是默认事件），代码将如清单 2-11 所示，并且工作方式完全相同。


    ***清单 2-11.** 指定 change 事件*


    `<h:inputText value="#{bean.text}">`

    `   <f:ajax event="change"/>`

    `</h:inputText>`


    或者我们可以使用不同的事件，如清单 2-12 所示。


    ***清单 2-12.** 更改默认事件*


    `<h:inputText value="#{bean.text}">`

    `   <f:ajax event="keyup"/>`

    `</h:inputText>`


    ![图片](img/square.jpg) **注意** 如果你熟悉 RichFaces 3，你会使用 on [eventName] 来指定事件，例如 `onchange`。在
    JSF 2 和 RichFaces 4 中，你只需指定实际的动作：`keyup`。


    如果我们使用按钮，代码将如清单 2-13 所示。


    ***清单 2-13.** 示例按钮*


    `<h:commandButton value="保存">`

    `   <f:ajax/>`

    `</h:commandButton>`


    我们没有指定事件，因为它将默认为 click。如果我们想指定一个不同的事件，我们将使用清单 2-14 中所示的 `event` 属性。


    ***清单 2-14.** 事件属性*


    `<h:commandButton value="保存">`

    `   <f:ajax event="mouseover"/>`

    `</h:commandButton>`


    现在我们已经介绍了触发 Ajax 请求的基础知识，接下来让我们添加一个非常重要的部分：部分视图渲染。


    #### 部分视图渲染


    既然我们已经知道如何触发 Ajax 请求，我们还想进行部分页面更新或部分视图渲染。


    ![图片](img/square.jpg) **注意** 从现在开始，每当我们使用 *`<f:ajax>`* 标签时，即使它是默认事件，我们也会指定该事件。我们认为这能使代码更具可读性且更易于理解。


    由于我们处于 JSF 的上下文中，我们可以通过 `render` 属性指定要更新或渲染的组件，该属性在表 2-2 中进行了描述。


    ![图片](img/t0202.jpg)


    更新我们的示例将如清单 2-15 所示。


    ***清单 2-15.** 更新示例*


    `<h:form>`

    `   <h:panelGrid>`

    `      <h:inputText value="#{bean.text}" >`

    `         <f:ajax event="keyup" render="text"/>`

    `      </h:inputText>`

    `      <h:outputText id="text" value="#{bean.text}" />`

    `   </h:panelGrid>`

    `</h:form>`


    每次 `keyup` 事件发生时，都会向服务器发起一个 Ajax 请求。该请求将经历标准的 JSF 生命周期，但不会渲染整个视图，我们只渲染 id 为 `text`
    的 `<h:outputText>` 组件。


    ![图片](img/square.jpg) **注意** 在 RichFaces 3 中，用于指定要重新渲染内容的属性称为 `reRender`。在 JSF
    2 中，它被称为 `render`。由于 RichFaces 4 基于 JSF 2，它在所有组件中都使用 `render`。你也可以使用绝对寻址来定义 id，例如当更新放置在其他表单中具有相同“text”
    id 的组件时。例如，`render=":form2:text"`。


    在前面的示例中，我们将 `render` 设置为一个组件。我们也可以决定渲染多个组件。在这种情况下，我们只需列出所有组件的 id，用空格分隔，如下所示：


    `<f:ajax event="keyup" render="id1 id2 id3"/>`


    如果你不想列出每一个单独的组件，也可以只渲染父容器，例如 `<h:panelGrid>`。在这种情况下，其所有子组件也将被渲染，如清单 2-16 所示。


    ***清单 2-16.** 渲染面板内的所有组件*


    `<h:commandButton value="保存">`

    `    <f:ajax event="click" render="out"/>`

    `</h:commandButton>`

    `…`

    `<h:panelGrid id="out">`

    `   <h:outputText />`

    `   <h:outputText />`

    `</h:panelGrid>`


    除了组件 id 之外，*`render`* 也可以设置为一些预定义的值，如表 2-3 所示。


    ![图片](img/t0203.jpg)


    在我们继续讨论部分视图处理之前，还有一件事想告诉你。你会听到人们互换使用术语 *部分页面更新* 和 *部分视图渲染*。这完全没问题，但值得指出它们在 JSF
    上下文中的关系。


    在 JSF 中，视图是在服务器端渲染的。当我们添加 Ajax 时，视图仍然在服务器端渲染——我们只是不需要渲染所有内容。我们渲染指定的组件，因此我们称之为部分视图渲染。当渲染后的响应（在
    Ajax 请求之后）被发送到浏览器时，部分页面更新就在浏览器中发生了。有一个 JavaScript 库负责接收响应并执行 DOM（文档对象模型）更新。使用部分页面更新或部分视图渲染都可以——只要你理解标记是在服务器端渲染的，而实际的页面更新发生在浏览器中。

