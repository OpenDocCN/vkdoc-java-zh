    `public void` **`sortMultiple()`** `{`

    `      String sortProperty = getSortProperty();`

    `      SortOrder currentOrder = sortOrdersMultiple.get(sortProperty);`

    `      modifySortProperty(sortOrdersMultiple, sortProperty, currentOrder);`

