    groupExpandedLeftIcon="triangleDown"` `      expandSingle="false">` `      <rich:panelMenuGroup>`
    `         <f:facet name="label">` `            <h:outputText value="Group 1" />`
    `         </f:facet>` `         <rich:panelMenuItem>` `            <h:outputText
