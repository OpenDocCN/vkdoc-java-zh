    public JavaScript API. JavaScript API might be added in future releases. Visit
    the JBoss Community RichFaces site at [`http://richfaces.org`](http://richfaces.org)
    for updates.


    ### Summary


    This chapter covered RichFaces input components. All input components provide
    rich client functionality and some have built-in Ajax support. For input components
    that don''t provide built-in Ajax support out of the box, you can easily add Ajax
    support by attaching `<a4j:ajax>` behavior to any event available on the component.


    As you are working with these components, don''t forget the rich JavaScript API
    many provide. Many components also provide facets to redefine some part of a component.
    All these features make RichFaces input components very powerful and flexible.


    Under the hood, most components are just inputs so all the basic JSF concepts,
    such as conversion and validation, apply here as well. To see all the input components
    in action, view the components demo on the JBoss Community RichFaces site at [`http://www.jboss.org/richfaces/demos`](http://www.jboss.org/richfaces/demos).


    Now that we are done with rich input components, in the next chapter we will tell
    you about rich output components, such as pop-up panels, tabs, and more.


