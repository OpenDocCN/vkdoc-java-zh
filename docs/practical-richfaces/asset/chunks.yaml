    have been applied to the whole panel, as in [Figure 13-6](#Chapter13.html#fig_13_6).  ![images](images/1306.jpg)  ***Figure
    13-6.** Applying italics to the whole panel*    This approach allows you to control
    styling for a particular panel component. Even if you have multiple panels, only
    one will be affected.    To summarize, there are three different ways to work
    with the look and feel of your application. The first level is using the built-in
    skins feature. Keep in mind that skins are simply a higher-level abstraction to
    good old CSS. The next level is redefining the CSS classes automatically generated
    for each component. The last level is using attributes such as `style` and `styleClass`
    (and any other component that defines the style attribute) to gain even further
    control over the look and feel. This last method allows you to change the look
    and feel for just the component on the current page without affecting components
    on other pages.    #### Dynamically Changing Skins    We have shown you how to
    create and use custom skins. It’s also possible to load any skin when the application
    is running, including your custom skin. To enable such functionality, the *`org.richfaces.skin`*
    parameter in *`web.xml`* has to point to an EL expression that resolves to the
    current skin, as shown in [Listing 13-18](#Chapter13.html#list_13_18).    ***Listing
    13-18.** Using the* `org.richfaces.skin` *parameter*  `<context-param>` `   <param-name>org.richfaces.skin</param-name>`
    `   <param-value>#{skinBean.currentSkin}</param-value>` `</context-param>`  The
    bean would look like [Listing 13-19](#Chapter13.html#list_13_19).    ***Listing
    13-19.** The managed bean*  `@ManagedBean(name="skinBean")` `@SessionScoped` `public
    class SkinBean implements Serializable {`  `   private String currentSkin = "newyork";`  `   public
    String getCurrentSkin() {` `       return currentSkin;` `   }`  `   public void
    setCurrentSkin(String skin) {` `       this.currentSkin = skin;` `   }` `}`  In
    this example, *`skin`* property inside the `SkinBean` managed bean will hold the
    currently selected skin. It should be initialized to some initial skin value,
    for example, through the managed bean’s configuration or just initializing the
    property with initial skin name as done in [Listing 13-13](#Chapter13.html#list_13_13).
    The bean should also be placed in session scope so that the skin is not reset
    on each request.    Now you can easily change the look and feel of the application
    by dynamically setting the `currentSkin` property to one of the available skins
    in your application.    ![images](images/square.jpg) **Note**  If you are changing
    skins when the application is running, it makes sense to reload the full page.
    Without a full-page refresh, it’s not possible to update all the ECSS loaded Update
    of resources via Ajax might result in unexpected results.    #### Standard Controls
    Skinning    Starting with RichFaces 3.2.1, the RichFaces team made standard controls
    skinning pretty simple. Nothing needs to be done in order for the skins to be
    applied to all standard controls.    In [Listing 13-20](#Chapter13.html#list_13_20),
    let’s look at a very simple example of a JSF page without RichFaces.    ***Listing
    13-20.** Example of a JSF page without RichFaces*  `<h:panelGrid columns="1">`
    `   <h:outputText value="Favorite city: "/>` `   <h:inputText value="#{geography.city}"/>`
    `</h:panelGrid>` `<h:commandButton action="next" value="Submit"/>`  The result
    is shown in [Figure 13-7](#Chapter13.html#fig_13_7).  ![images](images/1307.jpg)  ***Figure
    13-7.** The resulted image*    So far, there is nothing interesting—just a plain
    JSF page.    In RichFaces 4, the context parameter shown in [Listing 13-21](#Chapter13.html#list_13_21)
    is available and set to *`true`* by default. This means that all standard controls
    on a page will be skinned.    ***Listing 13-21.** The context parameter*  `<context-param>`
    `   <param-name>org.richfaces.enableControlSkinning</param-name>` `   <param-value>true</param-value>`
    `</context-param>`  This example will now look like [Figure 13-8](#Chapter13.html#fig_13_8),
    with the RichFaces added and `ruby` skin defined.  ![images](images/1308.jpg)  ***Figure
    13-8.** Favorite City*    If you want to style controls on your own without influencing
    all the standard ones, define the context parameter with false value.    Another
    parameter that is set to false by default is `org.richfaces.enableControlSkinningClasses`.
    To enable it, add the code found in [Listing 13-22](#Chapter13.html#list_13_22)
    to your `web.xml` file.    ***Listing 13-22.** `org.richfaces.enableControlSkinningClasses`*  `<context-param>`
    `   <param-name>org.richfaces.enableControlSkinningClasses</param-name>` `   <param-value>true</param-value>`
    `</context-param>`  When enabled, it offers a special predefined CSS class: `rfs-ctn`
