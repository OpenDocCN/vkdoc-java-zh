- fmt: "### Sending an Ajax Request\n\nLet's look at another important feature in\
    \ rich components: sending an Ajax request. As we said before, there are components\
    \ that have built-in Ajax behavior and there are components that are pure client-side.\
    \ These components don't have built-in Ajax behavior, but we can easily add it.\
    \ Let's use our tab example. `<rich:tab>` is one rich component that has built-in\
    \ Ajax support.\n\nThe switching of tabs is by default done via Ajax, but can\
    \ also be set to either client or server. When we select a new tab, an Ajax request\
    \ is sent and the entire content of the new tab will be rendered. You don't have\
    \ to do anything. Now, it's also possible to render content outside the tab. We\
    \ will show it to you a little bit later.\n\nThe JSF page with the tab panel we\
    \ used earlier is shown in [Listing 4-3](#Chapter04.html#list_4_3). The only difference\
    \ is that we added a component that shows time.\n\n**Listing 4-3.** The JSF page\
    \ with the tab panel used earlier\n\n```\n<h:form>\n   <rich:tabPanel style=\"\
    width:40%\" switchType=\"ajax\">\n      <rich:tab header=\"San Francisco\">\n\
    \         <h:outputText value=\"San Francisco is a major city in northern California,\
    \ on the\n            West Coast of\n            the United States\" />\n    \
    \    <h:outputText value=\"#{timeBean.now}\" />\n      </rich:tab>\n      <rich:tab\
    \ header=\"Los Angeles\">\n         <h:outputText value=\"Los Angeles is a major\
    \ city in southern California, on the\n            West Coast of\n           \
    \ the United States\" />\n<h:outputText value=\"#{timeBean.now}\" />\n      </rich:tab>\n\
    \      <rich:tab header=\"New York City\">\n         <h:outputText value=\"New\
    \ York City is a major city on the East Coast of the United\n            States\"\
    \ />\n<h:outputText value=\"#{timeBean.now}\" />\n      </rich:tab>\n   </rich:tabPanel>\n\
    </h:form>\n```\n\nInside the managed bean, there is a single method, as shown\
    \ in [Listing 4-4](#Chapter04.html#list_4_4).\n\n**Listing 4-4.** Single method\
    \ used inside the managed bean\n\n```\npublic Date getNow (){\n   return new Date();\n\
    }\n```\n\nEvery time a tab is switched, the time component in the corresponding\
    \ tab will be updated. Rendering content outside the tab panel is very simple:\
    \ all we have to do is use the `render` attribute. [Listing 4-5](#Chapter04.html#list_4_5)\
    \ shows a page where the time component is placed outside the tab panel. One other\
    \ thing to notice is that each `<rich:tab>` now has the `render` attribute set\
    \ to point to the component we want to update.\n\n**Listing 4-5.** Shows a page\
    \ where the time component is placed outside the tab panel\n\n```\n<h:form>\n\
    \   <rich:tabPanel style=\"width:40%\">\n      <rich:tab header=\"San Francisco\"\
    \ render=\"time\">\n         <h:outputText value=\"San Francisco is a major city\
    \ in northern California, on the\n            West Coast of\n            the United\
    \ States\" />\n      </rich:tab>\n      <rich:tab header=\"Los Angeles\" render=\"\
    time\">\n         <h:outputText value=\"Los Angeles is a major city in southern\
    \ California, on the\n            West Coast of\n            the United States\"\
    \ />\n      </rich:tab>\n      <rich:tab header=\"New York City\" render=\"time\"\
    >\n         <h:outputText value=\"New York City is a major city on the East Coast\
    \ of the United\n            States\" />\n      </rich:tab>\n   </rich:tabPanel>\n\
    \   <h:outputText value=\"#{timeBean.now}\" id=\"time\" />\n</h:form>\n```\n\n\
    As an alternative, instead of pointing via `render`, another option is to wrap\
    \ any components to be updated inside `<a4j:outputPanel ajaxRendered=\"true\"\
    >`. Also, keep in mind that all attributes we covered in previous chapters, such\
    \ as `limitRender` and queue features, are available to use.\n\nTab panel is a\
    \ rich component that has Ajax behavior built-in. Now let's look at the `<rich:inplaceInput>`\
    \ component. It's a rich client component, but doesn't have built-in Ajax behavior.\n\
    \nWhen we place the component on a page, it provides a very rich way to enter\
    \ any input, as follows:\n\n```\n<rich:inplaceInput value=\"#{inplaceInputBean.text}\"\
    \n   defaultLabel=\"Click to edit\" showControls=\"true\"/>\n```\n\n[Figure 4-5](#Chapter04.html#fig_4_5)\
    \ shows the component activated on a page.\n\n![images](images/0405.jpg)\n\n**Figure\
    \ 4-5.** Inplace input component in input mode\n\nThe key thing to understand\
    \ is that all the changes we make are happening only on the client; no Ajax request\
    \ is sent to the server. Why? Well, it's a rich client component (with just regular\
    \ input behind the scenes). How do you send an Ajax request? One way is to place\
    \ a button or link inside the form, next to the component. Once a value has been\
    \ entered into `<rich:inplaceInput>` component (and saved, the component changes\
    \ to label), the button or link next to the component is clicked. This is not\
    \ much different than using a standard input field.\n\nLet's say we want to send\
    \ an Ajax request when a new value is saved inside `<rich:inplaceInput>`. Turns\
    \ out that this is very easy as well. All we need to do is add an Ajax behavior\
    \ based on an event, as shown in [Listing 4-6](#Chapter04.html#list_4_6).\n\n\
    **Listing 4-6.** Add an Ajax behavior based on an event\n\n```\n<h:form>\n   <h:panelGrid>\n\
    \      <rich:inplaceInput value=\"#{inplaceInputBean.text}\" defaultLabel=\"Click\
    \ to edit\"\n         showControls=\"true\">\n         <a4j:ajax event=\"change\"\
    \ render=\"echo\"/>\n      </rich:inplaceInput>\n      <h:outputText value=\"\
    #{inplaceInputBean.text}\" id=\"echo\"/>\n   </h:panelGrid>\n</h:form>\n```\n\n\
    [Listing 4-6](#Chapter04.html#list_4_6) shows a simple example where a value entered\
    \ inside `<rich:inplaceInput>` and saved, will be displayed or echoed next to\
    \ it. This is done by adding `<a4j:ajax>` behavior based on a `change` event.\
    \ That's it. As you can see, even though `<rich:inplaceInput>` might be a new\
    \ component to you, using it is very simple. We apply the same concepts we already\
    \ know. This also means that any other rich component that defines any client\
    \ event handlers, such as `onclick` or `onblur`, can have an Ajax behavior attached\
    \ to it. This is a very powerful concept and gives you a lot of flexibility.\n\
    \nIt's worth mentioning again: all other attributes, such as `limitRender`, `bypassUpdates`,\
    \ queue optimization, and much more, are available to use in `<a4j:ajax>` as well.\n\
    \nHow do you find which events are available on a component? The RichFaces components\
    \ documentation at [`www.jboss.org/richfaces/docs`](http://www.jboss.org/richfaces/docs)\
    \ will list all the client events available on a component."
  raw: '#### Sending an Ajax Request


    Let''s look at another important feature in rich components: sending an Ajax request.
    As we said before, there are components that have built-in Ajax behavior and there
    are components that are pure client-side. These components don''t have built-in
    Ajax behavior, but we can easily add it. Let''s use our tab example. *`<rich:tab>`*
    is one rich component that has built-in Ajax support.


    The switching of tabs is by default done via Ajax, but can also be set to either
    client or server. When we select a new tab, an Ajax request is sent and the entire
    content of the new tab will be rendered. You don''t have to do anything. Now,
    it''s also possible to render content outside the tab. We will show it to you
    a little bit later.


    The JSF page with the tab panel we used earlier is shown in [Listing 4-3](#Chapter04.html#list_4_3).
    The only difference is that we added a component that shows time.


    ***Listing 4-3.** The JSF page with the tab panel used earlier*


    `<h:form>`

    `   <rich:tabPanel style="width:40%" switchType="ajax">`

    `      <rich:tab header="San Francisco">`

    `         <h:outputText value="San Francisco is a major city in northern California,
    on the`![images](images/U002.jpg)

    `            West Coast of`

    `            the United States" />`

    `        <`**`h:outputText value="#{timeBean.now}" />`**

    `      </rich:tab>`

    `      <rich:tab header="Los Angeles">`

    `         <h:outputText value="Los Angeles is a major city in southern California,
    on the`![images](images/U002.jpg)

    `            West Coast of`

    `            the United States" />`

    **`<h:outputText value="#{timeBean.now}" />`**

    `      </rich:tab>`

    `      <rich:tab header="New York City">`

    `         <h:outputText value="New York City is a major city on the East Coast
    of the United`![images](images/U002.jpg)

    `            States" />`

    **`<h:outputText value="#{timeBean.now}" />`**

    `      </rich:tab>`

    `   </rich:tabPanel>`

    `</h:form>`


    Inside the managed bean, there is a single method, as shown in [Listing 4-4](#Chapter04.html#list_4_4).


    ***Listing 4-4.** Single method used inside the managed bean*


    `public Date getNow (){`

    `   return new Date();`

    `}`


    Every time a tab is switched, the time component in the corresponding tab will
    be updated. Rendering content outside the tab panel is very simple: all we have
    to do is use the `render` attribute. [Listing 4-5](#Chapter04.html#list_4_5) shows
    a page where the time component is placed outside the tab panel. One other thing
    to notice is that each `<rich:tab>` now has the `render` attribute set to point
    to the component we want to update.


    ***Listing 4-5.** Shows a page where the time component is placed outside the
    tab panel*


    `<h:form>`

    `   <rich:tabPanel style="width:40%">`

    `      <rich:tab header="San Francisco" render="time">`

    `         <h:outputText value="San Francisco is a major city in northern California,
    on the`![images](images/U002.jpg)

    `            West Coast of`

    `            the United States" />`

    `      </rich:tab>`

    `      <rich:tab header="Los Angeles" render="time">`

    `         <h:outputText value="Los Angeles is a major city in southern California,
    on the`![images](images/U002.jpg)

    `            West Coast of`

    `            the United States" />`

    `      </rich:tab>`

    `      <rich:tab header="New York City" render="time">`

    `         <h:outputText value="New York City is a major city on the East Coast
    of the United`![images](images/U002.jpg)

    `            States" />`

    `      </rich:tab>`

    `   </rich:tabPanel>`

    `   <h:outputText value="#{timeBean.now}" id="time" />`

    `</h:form>`


    As an alternative, instead of pointing via render, another option is to wrap any
    components to be updated inside `<a4j:outputPanel ajaxRendered="true">`. Also,
    keep in mind that all attributes we covered in previous chapters, such as `limitRender`
    and queue features, are available to use.


    Tab panel is a rich component that has Ajax behavior built-in. Now let''s look
    at the `<rich:inplaceInput>` component. It''s a rich client component, but doesn''t
    have built-in Ajax behavior.


    When we place the component on a page, it provides a very rich way to enter any
    input, as follows:


    `<rich:inplaceInput value="#{inplaceInputBean.text}"`

    `   defaultLabel="Click to edit" showControls="true"/>`


    [Figure 4-5](#Chapter04.html#fig_4_5) shows the component activated on a page.


    ![images](images/0405.jpg)


    ***Figure 4-5.** Inplace input component in input mode*


    The key thing to understand is that all the changes we make are happening only
    on the client; no Ajax request is sent to the server. Why? Well, it''s a rich
    client component (with just regular input behind the scenes). How do you send
    an Ajax request? One way is to place a button or link inside the form, next to
    the component. Once a value has been entered into `<rich:inplaceInput>` component
    (and saved, the component changes to label), the button or link next to the component
    is clicked. This is not much different than using a standard input field.


    Let''s say we want to send an Ajax request when a new value is saved inside `<rich:inplaceInput>`.
    Turns out that this is very easy as well. All we need to do is add an Ajax behavior
    based on an event, as shown in [Listing 4-6](#Chapter04.html#list_4_6).


    ***Listing 4-6.** Add an Ajax behavior based on an event*


    `<h:form>`

    `   <h:panelGrid>`

    `      <rich:inplaceInput value="#{inplaceInputBean.text}" defaultLabel="Click
    to edit"`

    `         showControls="true">`

    `         <a4j:ajax event="change" render="echo"/>`

    `      </rich:inplaceInput>`

    `      <h:outputText value="#{inplaceInputBean.text}" id="echo"/>`

    `   </h:panelGrid>`

    `</h:form>`


    [Listing 4-6](#Chapter04.html#list_4_6) shows a simple example where a value entered
    inside `<rich:inplaceInput>` and saved, will be displayed or echoed next to it.
    This is done by adding `<a4j:ajax>` behavior based on a `change` event. That''s
    it. As you can see, even though `<rich:inplaceInput>` might be a new component
    to you, using it is very simple. We apply the same concepts we already know. This
    also means that any other rich component that defines any client event handlers,
    such as *`onclick`* or *`onblur`*, can have an Ajax behavior attached to it. This
    is a very powerful concept and gives you a lot of flexibility.


    It''s worth mentioning again: all other attributes, such as *`limitRender`*, *`bypassUpdates`*,
    queue optimization, and much more, are available to use in `<a4j:ajax>` as well.


    How do you find which events are available on a component? The RichFaces components
    documentation at [`www.jboss.org/richfaces/docs`](http://www.jboss.org/richfaces/docs)
    will list all the client events available on a component.'
  trans: '

    #### 发送 Ajax 请求


    让我们来看看富组件中的另一个重要特性：发送 Ajax 请求。正如我们之前所说，有些组件内置了 Ajax 行为，而有些组件则是纯客户端组件。这些组件没有内置的
    Ajax 行为，但我们可以轻松地为其添加。让我们使用选项卡示例。*`<rich:tab>`* 是一个内置了 Ajax 支持的富组件。


    默认情况下，选项卡的切换是通过 Ajax 完成的，但也可以设置为客户端或服务器端。当我们选择一个新的选项卡时，会发送一个 Ajax 请求，并且新选项卡的全部内容将被渲染。你无需做任何操作。现在，也可以渲染选项卡外部的内容。稍后我们会向你展示这一点。


    我们之前使用的带有选项卡面板的 JSF 页面如清单 4-3 所示。唯一的区别是我们添加了一个显示时间的组件。


    ***清单 4-3.** 之前使用的带有选项卡面板的 JSF 页面*


    `<h:form>`

    `   <rich:tabPanel style="width:40%" switchType="ajax">`

    `      <rich:tab header="旧金山">`

    `         <h:outputText value="旧金山是北加州的一个主要城市，位于`![images](img/U002.jpg)

    `            美国西海岸"`

    `          />`

    `        <`**`h:outputText value="#{timeBean.now}" />`**

    `      </rich:tab>`

    `      <rich:tab header="洛杉矶">`

    `         <h:outputText value="洛杉矶是南加州的一个主要城市，位于`![images](img/U002.jpg)

    `            美国西海岸"`

    `          />`

    **`<h:outputText value="#{timeBean.now}" />`**

    `      </rich:tab>`

    `      <rich:tab header="纽约市">`

    `         <h:outputText value="纽约市是美国东海岸的一个主要城市`![images](img/U002.jpg)

    `          " />`

    **`<h:outputText value="#{timeBean.now}" />`**

    `      </rich:tab>`

    `   </rich:tabPanel>`

    `</h:form>`


    在受管 bean 内部，有一个单一的方法，如清单 4-4 所示。


    ***清单 4-4.** 受管 bean 内部使用的单一方法*


    `public Date getNow (){`

    `   return new Date();`

    `}`


    每次切换选项卡时，对应选项卡中的时间组件都会被更新。在选项卡面板外部渲染内容非常简单：我们只需使用 `render` 属性。清单 4-5 展示了一个将时间组件放置在选项卡面板外部的页面。另外需要注意的一点是，每个
    `<rich:tab>` 现在都设置了 `render` 属性，指向我们想要更新的组件。


    ***清单 4-5.** 展示了一个将时间组件放置在选项卡面板外部的页面*


    `<h:form>`

    `   <rich:tabPanel style="width:40%">`

    `      <rich:tab header="旧金山" render="time">`

    `         <h:outputText value="旧金山是北加州的一个主要城市，位于`![images](img/U002.jpg)

    `            美国西海岸"`

    `          />`

    `      </rich:tab>`

    `      <rich:tab header="洛杉矶" render="time">`

    `         <h:outputText value="洛杉矶是南加州的一个主要城市，位于`![images](img/U002.jpg)

    `            美国西海岸"`

    `          />`

    `      </rich:tab>`

    `      <rich:tab header="纽约市" render="time">`

    `         <h:outputText value="纽约市是美国东海岸的一个主要城市`![images](img/U002.jpg)

    `          " />`

    `      </rich:tab>`

    `   </rich:tabPanel>`

    `   <h:outputText value="#{timeBean.now}" id="time" />`

    `</h:form>`


    作为替代方案，除了通过 `render` 指向之外，另一种选择是将任何需要更新的组件包裹在 `<a4j:outputPanel ajaxRendered="true">`
    内部。另外，请记住，我们在前几章中介绍的所有属性，例如 `limitRender` 和队列特性，都可以使用。


    选项卡面板是一个内置了 Ajax 行为的富组件。现在让我们看看 `<rich:inplaceInput>` 组件。它是一个富客户端组件，但没有内置的 Ajax
    行为。


    当我们将该组件放置在页面上时，它提供了一种非常丰富的方式来输入任何内容，如下所示：


    `<rich:inplaceInput value="#{inplaceInputBean.text}"`

    `   defaultLabel="点击编辑" showControls="true"/>`


    图 4-5 展示了该组件在页面上激活时的状态。


    ![images](img/0405.jpg)


    ***图 4-5.** 处于输入模式的内联输入组件*


    需要理解的关键点是，我们所做的所有更改都只发生在客户端；没有向服务器发送 Ajax 请求。为什么？嗯，因为它是一个富客户端组件（后台只是一个常规输入框）。如何发送
    Ajax 请求？一种方法是在表单中，在该组件旁边放置一个按钮或链接。一旦在 `<rich:inplaceInput>` 组件中输入了值（并保存，组件会变为标签），就点击组件旁边的按钮或链接。这与使用标准输入字段没有太大区别。


    假设我们想在 `<rich:inplaceInput>` 内部保存新值时发送一个 Ajax 请求。事实证明，这也非常简单。我们只需要基于一个事件添加 Ajax
    行为，如清单 4-6 所示。


    ***清单 4-6.** 基于事件添加 Ajax 行为*


    `<h:form>`

    `   <h:panelGrid>`

    `      <rich:inplaceInput value="#{inplaceInputBean.text}" defaultLabel="点击编辑"`

    `         showControls="true">`

    `         <a4j:ajax event="change" render="echo"/>`

    `      </rich:inplaceInput>`

    `      <h:outputText value="#{inplaceInputBean.text}" id="echo"/>`

    `   </h:panelGrid>`

    `</h:form>`


    清单 4-6 展示了一个简单的示例，其中在 `<rich:inplaceInput>` 中输入并保存的值，将显示或回显在其旁边。这是通过基于 `change`
    事件添加 `<a4j:ajax>` 行为来实现的。仅此而已。如你所见，即使 `<rich:inplaceInput>` 对你来说可能是一个新组件，使用它也非常简单。我们应用了我们已经知道的相同概念。这也意味着，任何定义了客户端事件处理程序（例如
    *`onclick`* 或 *`onblur`*）的其他富组件，都可以附加 Ajax 行为。这是一个非常强大的概念，为你提供了极大的灵活性。


    值得再次提及的是：所有其他属性，例如 *`limitRender`*、*`bypassUpdates`*、队列优化等等，也可以在 `<a4j:ajax>`
    中使用。


    如何查找组件上有哪些可用事件？位于 [`www.jboss.org/richfaces/docs`](http://www.jboss.org/richfaces/docs)
    的 RichFaces 组件文档将列出组件上所有可用的客户端事件。

