    9-3 所示。  ![images](img/0903.jpg)  ***图 9-3.** 使用 RichFaces TreeNode 构建的 <rich:tree>*    您可能想知道为什么叶节点与有子节点的节点具有相同的表示形式，而没有显示为叶节点？这就是它的设计方式。当我们实现
    Swing 的 TreeNode 接口时，我们实现了 `isLeaf()` 方法来返回一个布尔值，该值确定集合是否为空。RichFaces 默认的 Swing
    节点实现也做了同样的事情。    另一方面，`org.richfaces.model.TreeNodeImpl` 不会根据子节点的存在来决定节点是否为叶节点。它必须通过传递给构造函数的标志来定义，或者其
    `isLeaf()` 方法必须被正确覆盖。这样做是为了允许开发人员手动指定叶节点属性，如果开发人员想要实现延迟节点加载或只需要空节点表示的话。因此，一个节点可能没有初始化子节点，但默认情况下
    `isLeaf()` 返回 true。我们稍后将向您展示如何初始化 RichFaces `TreeNodeImpl` 使其成为叶节点。    #### 使用
    <rich:treeNode> 定义树节点标记    现在让我们看看如何替换使用 `toString()` 方法，而是编码迭代对象属性。我们只需要向 `<rich:tree>`
