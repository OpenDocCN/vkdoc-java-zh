    `</h:form>`  Note the `expandSingle` attribute used at `<rich:panelMenu>`. If
    it’s set to `true`, only one group at the same level could be expanded and the
    next expansion will collapse the previous one. We set it to `false` there so you
    could see both top groups opened.    The next interesting attribute is `bubbleSelection`.
    If it’s set to `true`, all the parent groups will be visually highlighted if some
    child item is selected. In other cases only the currently selected menu item will
    be selected.    Any group or item can be disabled using the `disabled="true"`
    declaration.    One last feature related to the look and feel of the component
    is using the icon attributes. Looking at [Figure 8-14](#Chapter08.html#fig_8_14),
    you can see that the groups and items at the higher level are displayed with a
    special look and feel that is different from the look and feel of their children
    groups and items (a separate style and icon attributes were used for top level
    and nested items and groups). Also, groups and items can have both right- and
    left-side icons and can also have different ones for all the states—collapsed,
    expanded and disabled. Because the number of attributes to customize this is rather
    large, see the RichFaces Reference Guide at [`www.jboss.org/richfaces/docs`](http://www.jboss.org/richfaces/docs),
    or just use your IDE content assist to find all the available attributes. Icon
    attributes can be defined with the standard icons mentioned in [Chapter 6](#Chapter06.html#ch6)
