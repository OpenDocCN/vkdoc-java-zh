- fmt: '#### JSF Is a Standard


    `JSF` is a part of the Java 6 (and 5) Enterprise Edition (`Java EE`) platform.
    This means that a bunch of companies and individuals got together and agreed on
    how the framework should work. The debate whether standards are good or bad is
    beyond the scope of this book but at least the framework was designed by more
    than just one entity.


    #### JSF Has Two Main Versions


    Today there are two `JSF` versions: version 1.2 is a part of the `Java EE 5` platform
    and `JSF 2` is a part of the `Java EE 6` platform.


    #### JSF Has Two Main Implementations


    Because `JSF` is a specification, today there are two main implementations. The
    first is `Mojarra`, a reference implementation from Oracle. The other is `MyFaces`
    from Apache. A great place to learn more about `JSF` is `JavaServerFaces.org`
    ([`www.javaserverfaces.org`](http://www.javaserverfaces.org)).


    #### JSF Is Very Extendable


    The extensibility feature is probably most responsible for making `JSF` a popular
    tool for building web applications. From the beginning, `JSF` was designed to
    be extended. Through standards, `JSF` allows you to extend the framework with
    new features and more advanced functionality. You are getting new functionality,
    but you are doing it in a standard and accepted way. One area that benefits most
    from this is the rich UI component ecosystem, which includes `RichFaces`. This
    eco-system is not limited to UI components—custom converters, validators, view
    handlers, and other extensions are created as well.


    ### The Most Important JSF Features


    `JSF` offers a long list of features. However, since this is not a dedicated `JSF`
    book, we will briefly cover the three most important features: user interface
    components, events, and the new Ajax functionality in `JSF 2`. If you feel you
    need to review your `JSF` skills, we recommend the following two books: *Core
    JavaServer Faces*, *Third Edition* by David Geary and Cay Horstmann (Prentice
    Hall, 2010) and *JavaServer Faces 2.0, The Complete Reference* by Ed Burns and
    Chris Schalk (McGraw-Hill, 2009).


    ![images](images/square.jpg) **Tip** Two really great places to start learning
    `JSF` are [`http://javaserverfaces.org`](http://javaserverfaces.org) and [`http://jsfcentral.com`](http://jsfcentral.com).


    #### User Interface Components


    UI components are the main feature of the `JSF` framework. `JSF` ships with about
    30 ready-to-use user interface components. Usually referred to as standard components,
    they provide basic user interface widgets for input, output, commands (buttons
    and links), labels, and layout, as well as simple controls to display tabular
    data. A number of utility components such as loading styles, scripts, and HTML
    page sections (head, body) are available as well.


    All `JSF` web applications are built out of components. A `JSF` UI component is
    a server-side Java object capable of processing input, firing actions, and rendering
    content. Component hierarchy is what `JSF` deals with. And tags are used for building
    that component tree. A `JSF` component can be as simple as an input field or as
    sophisticated as a tabbed panel or tree. For example, the following tag represents
    an input component:


    `<h:inputText value="#{order.amount}"/>`


    This is an input component that is bound (connected) to some Java object. You
    would place this tag on a `JSF` page instead of directly writing HTML code. The
    component behind the tag knows how to generate all the necessary and correct HTML,
    CSS, and JavaScript. Tags represent the server-side UI components and are used
    to build the `JSF` component tree shown in [Figure 1-4](#Chapter01.html#fig_1_4).


    ##### Component Rendering


    The `JSF` framework separates a component from the way it is presented (encoding)
    and the way input is processed (decoding). The appearance of the component can
    be easily varied for the type of display device available (for example, a mobile
    phone). For this book, you''ll work only with the HTML rendering kit that `JSF`
    provides out of the box.


    The following list demonstrates some of the features renderers provide:


    *   Rendering can be done by the component itself or delegated to a special renderer
    class.

    *   Rendering markup such as WML and XML, in addition to HTML.

    *   Standard `JSF` components come with an HTML 4.0.1 rendering kit.


    [Figure 1-4](#Chapter01.html#fig_1_4) shows how all this fits together.


    ![images](images/0104.jpg)


    ***Figure 1-4.** Tags represent server-side components. Server-side components
    render markup (HTML) at the end of the JSF request.*


    Let''s walk through the numbered parts of this figure.


    1.  This is a `JSF` page that consists of `JSF` tags. When the page is processed
    by `JSF`, these tags create `JSF` UI components (Java classes) shown in the second
    part of the figure.

    2.  This is the `JSF` UI component tree that represents the components defined
    on the `JSF` page. The component tree goes through a sophisticated life cycle
    where various things happen, such as conversion and validation. At the end, `JSF`
    will ask each component renderer to render markup.

    3.  The panel on the left is the generated HTML code and the panel on the right
    shows what users see in the browser. This is just the standard HTML 4.0.1 version.


    As you can see, usually you won''t be working with HTML markup directly. You will
    simply use components that render the entire necessary markup.


    A note on rendering other markup languages. In the early days of `JSF`, the idea
    that components can render different markup based on client device was an interesting
    one. At that time, the mobile devices available usually worked with markup languages
    such as XML or WML. Today the situation is very different. Most modern mobiles
    devices, such as smart phones and tablets, come with powerful browsers supporting
    all the latest HTML, JavaScript, and CSS features. In some cases, the browser
    on a mobile device is better than the one on a PC. This means that generation
    markup other than HTML is no longer as important or has simply faded with the
    availability of mobile phones and other devices that support HTML.


    This doesn''t mean that renderers no longer play an important role. Even though
    HTML is now supported on various devices, renderers still play a role in regards
    to the kind of markup (HTML) that is generated. With the explosion of mobile devices,
    we now have to develop applications for a large number of different screen sizes.
    There is only so much “content” (or real estate) that can fit on a mobile phone
    with a 3.5-inch screen, or a tablet with a 7-inch screen, or even on a large laptop
    screen. This is exactly where renderers can help. Based on the device, screen
    size, and even screen resolution, the renderers can provide different markup.'
