    ***Listing 7-11.** Changing the header definition*


    `<f:facet name="header">`

    `   <rich:columnGroup>`

    `      <rich:column rowspan="2" colspan="2"></rich:column>`

    `      <rich:column colspan="6">Games by Continent</rich:column>`

    `      <rich:column rowspan="2" colspan="2"></rich:column>`

