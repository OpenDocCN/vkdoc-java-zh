    10-8.** 拖动状态的默认指示*    默认情况下，拖动指示元素是通过克隆正在拖动的 DOM 部分来实现的。    使用默认设置很好，但我们希望可以选择自定义正在拖动的对象，例如添加一些样式和其他选项。    幸运的是，与
