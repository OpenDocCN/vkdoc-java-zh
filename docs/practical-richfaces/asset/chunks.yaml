    the `arrange()` method, performs sorting and filtering. But that’s not usually
    the case for the custom model. Because of the difference with the default, it
    doesn’t operate on a full list, but partially loads it according to the current
    page range in `walk()`. So we store sorting and filtering fields for further processing
    in `walk()` in that method.    Let’s review the `walk()` method, which looks very
    similar to the `walk()` method from the pageable model; the only difference is
    that it appends sorting and filtering to Criteria prior to fetching the result
    list.    We’ll look at the trimmed methods in more detail in [Listing 7-57](#Chapter07.html#list_7_57).    ***Listing
    7-57.** Trimmed methods*  `private String getPropertyName(FacesContext facesContext,
    Expression expression) {` `   try {` `   return (String) ((ValueExpression) expression).getValue(facesContext.getELContext());`
    `   } catch (ELException e) {` `    throw new FacesException(e.getMessage(), e);`
    `   }` `}`  `private void appendSorts(FacesContext context, Criteria criteria)
    {` `  if (sortFields != null) {` `    for (SortField sortField : sortFields) {`
    `      SortOrder ordering = sortField.getSortOrder();` `      if (SortOrder.ascending.equals(ordering)
    || SortOrder.descending.equals(ordering)) {` `        String propertyName = getPropertyName(context,
    sortField.getSortBy());` `        Order order = SortOrder.ascending.equals(ordering)
    ? Order.asc(propertyName) :` `          Order.desc(propertyName);` `        criteria.addOrder(order.ignoreCase());`
    `      }` `    }` `  }` `}`   `private void appendFilters(FacesContext context,
    Criteria criteria) {` `  if (filterFields != null) {` `    for (FilterField filterField
    : filterFields) {` `      String propertyName = getPropertyName(context,filterField.getFilterExpression());`
    `      String filterValue = (String)filterField.getFilterValue();` `      if (filterValue
    != null && filterValue.length() != 0) {` `        criteria.add(Restrictions.like(propertyName,
    filterValue,` `           MatchMode.ANYWHERE).ignoreCase());` `      }` `    }`
    `  }` `}`  This method seems fairly self-explanatory. Every `append*()` method
    iterates over the sort or filter fields, obtains the current values for filtering
    or sorting, and applies it to the criteria by using its API. The `getPropertyName()`
    method obtains the column names that were passed using `sortBy` and `filterExpression`
    by getting value from the given `ValueExpression`.    It’s time to see the result,
    first looking at the simple concrete object model class shown in [Listing 7-58](#Chapter07.html#list_7_58).    ***Listing
    7-58.** Simple concrete object model class*  `@ManagedBean` `@SessionScoped` `public
    class ArrangeableHibernateModel extends BaseArrangeableHibernateModel<GameDescriptor>
    {` `   public ArrangeableHibernateModel() {` `      super(GameDescriptor.class);`
    `   }` `}`  [Figure 7-35](#Chapter07.html#fig_7_35) shows the table after initial
    rendering.  ![images](images/0735.jpg)  ***Figure 7-35.** Table backed by ArrangeableModel
    custom implementation*    [Figure 7-36](#Chapter07.html#fig_7_36) shows the table
    after sorting (by city) and filtering (by continent).  ![images](images/0736.jpg)  ***Figure
    7-36.** Filtered and sorted table*    That’s all the coverage related to models
    and the advanced features they provide. We believe you now have all the information
    to implement complex data models with RichFaces data iteration components.    ###
    Summary    This chapter introduced various data iteration components, from the
    most basic `<a4j:repeat>`, which doesn’t produce any markup, to complex components
    such as `<rich:extendedDataTable>`. One unique feature that all data iteration
    components have is partial-table update, where you can specify which specific
    row(s) to update. The look and feel of all components can be greatly customized
    via skins, which are covered in [Chapter 13](#Chapter13.html#ch13). At the end
    we covered the usage of custom models implementations for complex, in-database
    paging/sorting/filtering operations in data table components.    ## C H A P T
    E R  8    ## Rich Menu Components    In this chapter, you’ll explore the various
    menu components available in RichFaces. First we’ll first cover toolbar and drop-down
    menu components, and then we’ll show you a panel menu component. The context menu
    unfortunately was not included into the RichFaces 4.0 final release, but will
    definitely be added in one of the first 4.x updates.    ![images](images/square.jpg)
    **Note**  Component images in this chapter use a slightly customized blueSky skin
    with a larger general font size. If you want to use it, create a new skin and
    overwrite the font size as follows:  `baseSkin=blueSky` `generalSizeFont=12px`  If
    you are not sure how to use this custom skin, [Chapter 13](#Chapter13.html#ch13)
    covers skins in detail.    ### Using <rich:toolbar>    `<rich:toolbar>` creates
    a horizontal bar that can hold any other JSF component, including any action components.    You
    can easily use `<rich:toolbar>` in conjunction with `<rich:panel>`, where the
    panel holds some information associated with a link in the toolbar. [Figure 8-1](#Chapter08.html#fig_8_1)
    shows how it looks.  ![images](images/0801.jpg)  ***Figure 8-1.** Simple toolbar*    The
    code is shown in [Listing 8-1](#Chapter08.html#list_8_1).    ***Listing 8-1.**
