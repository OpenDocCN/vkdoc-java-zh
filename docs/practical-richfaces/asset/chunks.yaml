    attributes, `width` and `height`, are available on components in order to allow
    simple definitions for those basic properties without using CSS. We will use `height`
    across all the examples and `width` will be set to 100% by default. Besides the
    attributes usage, you could define the same sizes using Skins CSS (`rf-tb` class)
    in order not to repeat the definition for all the toolbars. Skins will be described
    in later chapter, but for now just keep in mind that you may use CSS instead of
    the sizes attributes used there.    In this example, the toolbar contains three
    command links, but keep in mind that any JSF component can be placed inside the
    toolbar. The links simply change the rendered panel content, and after `<a4j:outputPanel>`
    get automatically updated (because of `ajaxRendered=true`) and corresponding description
    is rendered. In order for the example to be complete, see the bean code in [Listing
    8-2](#Chapter08.html#list_8_2).    ***Listing 8-2.** The bean code*  `@ManagedBean`
    `@ViewScoped` `public class ToolbarBean implements Serializable {` `   private
