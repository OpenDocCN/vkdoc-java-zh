    <h:form>\n<rich:autocomplete autocompleteList=\"#{autocompleteBean.suggestions}\"\
    \ ![images](images/U002.jpg)\nmode=\"lazyClient\" showButton=\"true\" selectFirst=\"\
    true\" />\n</h:form>\n```\n\n结果如[图 5-12](#Chapter05.html#fig_5_12) 所示。请注意输入框右侧的按钮（带有向下箭头）。另外，请注意第一个匹配的建议会显示在输入框内，并且当你失去焦点时，它将被设置到输入框中。这是通过将`selectFirst`属性设置为`true`来实现的。\n\
