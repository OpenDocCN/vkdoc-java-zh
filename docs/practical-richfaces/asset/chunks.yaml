    />` `   </rich:componentControl>` `</h:commandButton>` `<h:commandButton value="旧金山">`
    `   <rich:componentControl event="click" target="cities"` `      operation="switchToItem">`
    `      <a4j:param value="sf" />` `   </rich:componentControl>` `</h:commandButton>`
    `<h:commandButton value="洛杉矶">` `   <rich:componentControl event="click" target="cities"`
    `      operation="switchToItem">` `      <a4j:param value="la" />` `   </rich:componentControl>`
    `</h:commandButton>`  请注意，对于 `operation` 属性，我们只指定了函数名称；没有选项可以在那里传递参数。我们如何传递参数？我们在
    `<rich:componentControl>` 内部包含带有手风琴项目名称的 `<a4j:param>`。可以传递多个参数；它们将按照 `<a4j:param>`
    标签列出的顺序应用。    除了 `<a4j:param>`，我们也可以使用标准的 `<f:param>` 标签。两者都会给我们相同的结果。清单 12-8
    显示了在按钮上使用 `<f:param>`。    ***清单 12-8.** 在按钮上使用 `<f:param>`*  `<h:commandButton
    value="纽约">` `   <rich:componentControl event="click" target="cities"` `      operation="switchToItem">`
