    #### 使用 `<a4j:commandButton>` 和 `<a4j:commandLink>`


    为 JSF 按钮或链接添加 Ajax 行为并不困难，使用按钮时，其代码如清单 3-1 所示。


    ***清单 3-1.** 为 JSF 按钮添加 Ajax 行为*


    `<h:form>`

    `...`

    `   <h:commandButton value="Send">`

    `     <f:ajax event="click" render="out"/>`

    `   </h:commandButton>`

