- fmt: '# About the Technical Reviewer


    ![image](images/jason_lee.jpg) ![image](images/square.jpg) **Jason Lee** is a
    senior member of the technical staff for Oracle, where he works on the GlassFish
    project on the Administration Console and RESTful Administration interface teams.
    He has more than 14 years of professional experience, ranging from Java AWT desktop
    applications to enterprise web applications, in a variety of languages and frameworks.
    Jason has been involved with JavaServer Faces since 2005, both as a committer
    on Mojarra, the JSF reference implementation, as well as being a member of the
    JSF 2.0 Expert Group. He is active in the Oklahoma City Java Users Group, both
    as a speaker and former president. He blogs about various technologies at [`http://blogs.steeplesoft.com`](http://blogs.steeplesoft.com).
    Jason lives in Oklahoma with his wife, two sons, and one Boxer.


    # Introduction


    We have been involved with JSF and RichFaces for many years now, including teaching
    JSF and RichFaces courses for many years. From our experience, we have come to
    realize that many developers are using RichFaces and JSF without understanding
    the full potential of the technology. Without this understanding, developers can’t
    fully utilize the framework.


    Of course, after a bit of trial and error, almost everyone gets their application
    to work in some form. However, developers often don’t understand why their particular
    application works. And, more importantly, developers get frustrated and grow to
    dislike the technology. That’s an important reason we wrote this second edition
    of Practical RichFaces—to raise the level of understanding in the developer community
    so this frustration can be avoided and so that RichFaces and JSF can be appreciated
    for the great technologies they are.


    This book is entirely based on the new and improved JSF 2 and covers the new and
    greatly improved RichFaces 4. We cover all the most important concepts, features,
    tags, and components available in RichFaces that you need to know—all in one place.
    While the book doesn’t try to cover every single attribute for every single component,
    that’s not really necessary. However, with the solid understanding of core concepts,
    features, and tags that you will get from this book, we guarantee you will be
    able to use any RichFaces component.


    ## Who Should Read This Book


    The book is for anyone with a basic knowledge of JSF who wants to learn how to
    build Ajax-based applications with RichFaces. If you are completely new to JSF,
    we recommend picking up a book on JSF 2. Even if you have been using RichFaces
    4 (or RichFaces 3), this book will fill in many of the gaps. We are sure you will
    say at least once in the course of reading this book, “I didn’t know that was
    possible with RichFaces!” or “I didn’t know I could do that!”


    # Chapter 1: The Basics


    Welcome to *Practical RichFaces*, second edition. In your hands (or on your computer/phone/tablet),
    you''ve got everything you need to start developing cool and rich Ajax applications
    with JSF and RichFaces. In this first chapter, we will give you a short overview
    of JavaServer Faces (JSF), as RichFaces is a framework for JSF. Although we do
    assume that you have some knowledge of JSF, don''t worry—even if you are just
    starting, we made sure the material and all the examples in this book are very
    easy to understand. Once we cover JSF, we will discuss RichFaces: its features
    and the history behind it, how it got started and where it is today. Lastly, we
    will share two stories to help you keep an open mind when using JSF, as well as
    some tips on working with a server-side framework. The stories are from our personal
    experiences and should help you become a better JSF and RichFaces developer.


    ## Tell Me About RichFaces First!


    You bought this book to learn about RichFaces, so we are going to squeeze in this
    short section so you don''t have to wait. We will then do quick overview of JSF,
    and go back to telling you more about RichFaces in more detail. You probably think
    of RichFaces as a rich component library (and that''s fine). But, is it also much
    more. Rich components are just one of the main features that RichFaces offers.
    RichFaces is a rich framework for JSF and offers rich and Ajax components in two
    tag libraries (`a4j:` and `rich:`), a Skins feature, a client-side validation
    extension based on JSR-303 Bean Validation, and CDK (Component Development Kit).


    Of course you get many other features, which we will cover throughout the book,
    such as advanced rendering features, event handling options, and Ajax client queue
    optimization. The components are something you can “feel and touch,” so let us
    give you a quick example of what kind of components RichFaces offers.


    The `a4j:` tag library offers many core or foundation components, such as buttons
    and links with built-in Ajax support, Ajax polling, and Ajax status. At this stage,
    however, it''s more interesting to look at examples of components from the `rich:`
    tag library. In Figure 1-1, you can see a rich tab panel and calendar components.


    ![images](images/0101.jpg)


    **Figure 1-1.** RichFaces tab panel and calendar (blueSky skin)


    If you are reading an electronic version of this book, then Figure 1-1 will appear
    in light blue color. By changing just one parameter, we can render the page in
    the ruby skin, as shown in Figure 1-2. Another difference in Figure 1-2 is that
    it is also showing an optional control to select time. Each component offers a
    large number of customization options.


    ![images](images/0102.jpg)


    **Figure 1-2.** RichFaces tab panel and calendar with time selection (ruby skin)


    The tabs can be switched via Ajax, as well as previous/next month in the calendar.
    Let''s look at one more rich component, shown in Figure 1-3. It shows a rich inplace
    input component displayed three times. Inplace input renders initially as a label
    (first component); when clicked, it switches to an input (second component); and
    then back to a label when editing is done (third component).


    ![images](images/0103.jpg)


    **Figure 1-3.** Rich inplace input component (shown in three modes)


    We hope you now get an idea of what RichFaces can do. Trust us, it can do a whole
    lot more. We will now take a brief detour to tell you a little bit about JSF.
    Why? Well, RichFaces is a JSF frameworks, it is based entirely on JSF so it''s
    important to know how the underlying framework works.


    ## What is JSF?


    Let''s start with the simplest definition. JSF is just a framework for building
    web applications. To be a little bit more specific, we are building a browser-based
    or HTML application, no plug-ins involved. You are probably thinking, there are
    at least a couple dozen other frameworks that would fit this description. JSF
    has a number of features that makes it different than other frameworks. Let''s
    review them.


    ### JSF Application Is Built Out of UI Components


    JSF is a Java framework for building browser-based user interfaces (UIs) out of
    reusable components. The emphasis in JSF is on UI components. When working with
    UI components, you won''t deal with HTML markup directly because JSF and other
    rich components will provide all the necessary UI widgets to build the application.
    However, HTML tags still play an important role in the layout of the page. Within
    the components themselves, renderers (Java classes for generating HTML) are responsible
    for producing the appropriate markup. Because you are building web applications
    and the client is basically the browser, the markup needed is HTML (although it
    can be anything like WML, SGL, or even XML) so the components'' renderers will
    generate the HTML markup that will be sent to the client (browser).'
