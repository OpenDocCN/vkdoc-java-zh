    10-13 显示了将“文件夹 1”中的两个文件拖放到“文件夹 2”后的树。  ![images](img/1013.jpg)  ***图 10-13.**
    通过拖放从一个文件夹移动到另一个文件夹的节点*    如您所见，树的拖放并不复杂。我们将一些节点组件定义为可拖动的，将一些节点组件定义为放置区域。唯一的区别是我们现在处理的是树节点和叶节点；除此之外，所有概念都是相同的。    ###
    在表格内拖放    在表格内使用拖放并不困难（实际上甚至比在树内拖放更容易），我们将在这一小节中给您一些提示。    正如我们已经知道的，拖放总是添加到父组件。这意味着拖放可以添加到表格本身或表格内的列，但不能添加到行。也就是说，如果我们将
    `<rich:dragSupport>` 作为表格的直接子元素添加，整个表格将是可拖动的——这可能不是我们需要的。如果我们将 `<rich:dragSupport>`
    添加到 `<rich:column>`，我们将只能拖动该单个列；其他列将不可拖动。    如果您想要实现“行拖动”功能，解决方案是在表格的每一列中嵌入一个拖动支持组件。基本上，当我们向每一列添加拖动支持时，我们就获得了整个行的拖动功能。    创建一个好的拖动指示器也是一个好主意，这样您就不会只拖动当前列的内容（默认拖动指示器与正在拖动的内容相同）。使用自定义指示器，无论实际选择哪一列进行拖动，指示器都将显示相同的信息，并且看起来就像只拖动了一行。    ![images](img/square.jpg)
    **注意** 未来计划为迭代组件启用原生拖放支持的功能。例如，可能会添加诸如可拖放的行上下文之类的功能。请访问 [`www.jboss.org/richfaces`](http://www.jboss.org/richfaces)
    上的 JBoss 社区 RichFaces 页面以获取更新。    ### 总结    在本章中，我们向您展示了使用 RichFaces 向 JSF 应用程序添加拖放功能非常简单。为了能够拖动页面上的任何组件，我们添加了
    `<rich:dragSource>` 行为。为了使页面上的任何区域充当放置区域，我们添加了 `<rich:dragTarget>` 行为。尽管拖放发生在客户端，但为了将拖放操作传达给服务器，我们使用了标准的侦听器方法。此外，RichFaces
    提供了选项来强制执行哪些项目可以放入哪些特定的放置区域，以及自定义拖动指示器的能力。最后，我们向您展示了如何向树添加拖放功能，并提供了有关如何在表格内实现拖放的提示。    ##
    第 11 章    ## 丰富的验证    验证用户输入是任何 Web 应用程序的主要部分。JSF 提供了许多标签来启用基本验证，并且使得构建自定义验证器非常容易。JSF
    2 通过为流行的 Bean 验证（JSR 303）提供开箱即用的支持，使验证变得更加简单。RichFaces 将验证提升到了一个新的水平，并通过提供客户端验证来扩展
    Bean 验证。客户端验证允许基于 Bean 验证约束在客户端执行验证。这是高性能企业网站必备的功能。除了客户端验证之外，RichFaces 还提供了一个跨字段或对象验证功能，其中可以一起验证一个或两个字段。这正是我们将在本章中介绍的内容。    ###
    Bean 验证    要开始使用客户端验证，我们首先需要告诉您 JSF 2 中的 Bean 验证支持。Bean 验证是 Java EE 堆栈的一部分，源自
    Hibernate Validator。事实上，Hibernate Validator 是 Bean 验证的参考实现。与其将验证放在视图中，不如将验证约束放在模型上，并让视图调用这些验证。例如，在清单
    11-1 中，Bean 验证约束应用于三个属性。`name` 必须至少三个字符长，`age` 必须在 2 到 120 之间，`email` 必须匹配正则表达式。    ***清单
    11-1.** Bean 验证约束应用于三个属性*  `@ManagedBean` `@RequestScoped` `public class ValidationBean
    {` `   @Size (min=3)` `   private String name;`  `   @Min (2) @Max (120)` `   private
    Integer age;`  `   @Pattern (regexp=".+@.+\\.[a-z]+")` `   private String email;`
    `   // getters and setters` `}`   ![images](img/square.jpg) **注意** 我们用于电子邮件的正则表达式相当简单。您可以找到更严格的表达式来验证电子邮件地址。    为什么这比将验证放在
    JSF 页面中更好？如果您将从各种 JSF 视图访问模型，但也以非 JSF 视图的其他方式访问模型，那么您不需要重复验证定义，并且验证可以被重用。幸运的是，JSF
    2 中的 Bean 验证支持是内置的；换句话说，您不需要做任何事情。只需将 JSF 组件绑定到具有 Bean 验证注解的属性，验证将像往常一样在“处理验证”阶段被调用。清单
    11-2 显示了 JSF 页面，其中组件绑定到清单 11-1 中的属性。    ***清单 11-2.** 显示 JSF 页面*  `<h:form>` `   <h:panelGrid
    columns="3">` `      <h:outputText value="名称:" />` `      <h:inputText id="name"
    value="#{validationBean.name}" >` `         <a4j:ajax render="nameMsg"/>` `      </h:inputText>`
    `      <h:message for="name" id="nameMsg"/>` `      <h:outputText value="电子邮件:"
    />` `      <h:inputText id="email" value="#{validationBean.email}" >` `         <a4j:ajax
    render="emailMsg"/>` `      </h:inputText>` `      <h:message for="email" id="emailMsg"/>`
    `      <h:outputText value="年龄:" />` `      <h:inputText id="age" value="#{validationBean.age}"
    >` `         <a4j:ajax render="ageMsg"/>` `      </h:inputText>` `      <h:message
    for="age" id="ageMsg"/>` `   </h:panelGrid>` `</h:form>`   ![images](img/square.jpg)
    **提示** 使用 `<a4j:ajax>`，您还可以设置 `bypassUpdates="true"`。这将绕过或跳过“更新模型”阶段和“调用应用程序”阶段，即使值有效。这在仅验证表单时很有用。仅验证时，您很少需要更新模型和调用应用程序。`bypassUpdates`
    在第 3 章 中有更详细的介绍。    这里没有什么新内容；它看起来像一个非常标准的 JSF 页面。验证（Ajax 请求）将在 `change` 事件上发送。为了显示错误消息，我们使用了
    `<h:message>` 组件。页面本身没有任何验证。相反，当页面提交时，用户输入的值将根据托管 Bean 中通过 Bean 验证注解指定的约束进行检查。同样，您可以通过
    JSF 2 开箱即用地获得所有这些。运行页面将产生如图 11-1 所示的结果。  ![images](img/1101.jpg)  ***图 11-1.**
    Bean 验证标准错误消息*    关于错误消息的说明：渲染的消息是 Bean 验证的标准消息。自定义错误消息的一种方法是在验证注解上设置 `message`
    属性。有关自定义消息的更多方法，请参阅 Bean 验证文档（请参阅以下提示中建议的互联网资源）。例如，更改电子邮件验证的消息可以像下面这样：  `@Pattern
    (regexp=".+@.+\\.[a-z]+", message="电子邮件格式无效")`   ![images](img/square.jpg) **提示**
    在 Java Community Process Program 网站 [`www.jcp.org/en/jsr/detail?id=303`](http://www.jcp.org/en/jsr/detail?id=303)
    和 Java EE 6 教程：使用 Bean 验证页面 [`http://download.oracle.com/javaee/6/tutorial/doc/gircz.html`](http://download.oracle.com/javaee/6/tutorial/doc/gircz.html)
    上了解更多关于 Bean 验证（JSR 303）的信息。    ### RichFaces 客户端验证    RichFaces 通过提供客户端验证将验证提升到了一个新的水平。换句话说，验证可以在客户端完成，而无需发送
    Ajax 请求。RichFaces 是如何做到的呢？RichFaces 通过将验证带到客户端来扩展标准的 Bean 验证。您可能想知道为什么在可以通过 Ajax“快速”验证时还需要客户端验证？通过
    Ajax 验证确实很快，但仍然会向服务器发送一个 Ajax 请求。在高性能、高流量的应用程序中，能够在客户端进行验证而无需发送 Ajax 请求可以极大地提高性能。    让我们获取我们的页面并向其添加客户端验证。向表单添加客户端验证非常容易，可能太容易了。我们需要做的就是将
    `<rich:validator>` 标签放在正在验证的输入组件内部。默认情况下，客户端验证将在 `change` 事件上调用，但我们可以通过设置 `event`
    属性来使用任何其他事件。我们唯一需要做的另一件事是使用 `<rich:message>` 或 `<rich:messages>` 标签来显示错误消息。客户端验证错误消息将不会使用标准的
    `<h:message>` 标签显示。Bean 中没有变化，因为我们使用相同的 Bean 验证，但现在将其带到客户端。    清单 11-3 显示了带有客户端验证的更新页面。    ***清单
    11-3.** 显示带有客户端验证的更新页面*  `<h:form>` `   <h:panelGrid columns="3">` `      <h:outputText
    value="名称:" />` `      <h:inputText id="name" value="#{validationBean.name}" >`
    **`<rich:validator/>`** `      </h:inputText>` **`<rich:message for="name" />`**
    `      <h:outputText value="电子邮件:" />` `      <h:inputText id="email" value="#{validationBean.email}"
    >` **`<rich:validator/>`** `      </h:inputText>` **`<rich:message for="email"/>`**
    `      <h:outputText value="年龄:" />` `      <h:inputText id="age" value="#{validationBean.age}"
    >` **`<rich:validator/>`** `      </h:inputText>` **`<rich:message for="age"/>`**
    `   </h:panelGrid>` `</h:form>`  如您所见，`<rich:validator>` 现在嵌套在每个输入字段内部。实际上，它是一个客户端行为，就像
    `<a4j:ajax>` 一样。并且，作为一种行为，它附加到父 UI 组件事件，就像 `<a4j:ajax>` 一样。由于验证是在输入组件上执行的，`<rich:validator>`
    附加到的默认事件是 `change`。我们还用 `<rich:message>` 替换了 `<h:message>`，因为客户端验证消息只有在使用 `<rich:message>`
    或 `<rich:messages>` 时才会显示。当页面渲染时，RichFaces 将通过查看 Bean 属性及其注解来渲染所有必要的 JavaScript
    到客户端以执行验证。运行页面将产生如图 11-2 所示的结果。  ![images](img/1102.jpg)  ***图 11-2.** RichFaces
    客户端验证*    要更改触发客户端验证的事件，请设置 `event` 属性。例如，以下代码将在 `blur` 事件上调用客户端验证：  `<rich:validator
    event="blur"/>`   ![images](img/square.jpg) **注意** 使用客户端验证时，必须使用 `<rich:message>`
    或 `<rich:messages>`。这些组件提供了必要的 JavaScript 以在客户端更新。当然，它们也适用于标准的服务器端验证。    尽管 Bean
    验证是在 JSF 2 中添加验证的首选方式，但 RichFaces 客户端验证仍然支持标准的 JSF 验证。这使得可以在已经使用标准 JSF 验证器标签的页面上添加客户端验证。    在撰写本书时，客户端验证仅支持基于单个字段的验证。这意味着可以在特定字段上发生
    `change` 事件（默认事件）或 `blur` 事件（或 UI 组件支持的任何其他事件）时调用客户端验证。如果有一个控件用于提交整个表单，例如单击按钮或链接时，则不会执行客户端验证，而是执行标准的服务器端验证。未来有计划在提交表单时添加客户端验证支持。    ###
    使用 <rich:message> 和 <rich:messages>    `<rich:message>` 和 `<rich:messages>` 用于显示消息或错误消息，其工作方式与标准的
    `<h:message>` 和 `<h:messages>` 标签类似，但具有许多额外的功能。提醒一下，`<h:message>` 或 `<rich:message>`
    通过 `for` 属性显示特定组件的消息。另一方面，`<h:messages>` 或 `<rich:messages>` 显示当前 JSF 请求中的所有当前消息。    至于区别，一个主要区别是消息会自动渲染，这意味着您不需要通过
    `render` 属性指向组件。如果您还记得，我们可以使用 `<a4j:outputPanel ajaxRendered="true">` 实现类似的结果，而无需使用
    render。清单 11-4 显示了这样一个示例。    ***清单 11-4.** 一个示例*  `<a4j:outputPanel ajaxRendered="true">`
    `   <h:message for="email"/>` `</a4j:outputPanel>`  `<a4j:outputPanel ajaxRendered="true">`
    总是自动渲染。因此，以下内容与清单 11-4 相同：  `<rich:message for="email"/>`  此消息将自动渲染。我们可以这样总结。`<a4j:outputPanel
    ajaxRendered="true">` 是一个自动渲染的面板，而 `<rich:message>` 或 `<rich:messages>` 是一个自动渲染的消息。    ![images](img/square.jpg)
    **注意** 可以通过在操作组件和 `<a4j:ajax>` 行为上设置 `limitRender="true"` 属性来关闭自动渲染的面板或消息。这个 `limitRender`
    属性在第 2 章 中介绍过。    #### 自定义消息图标    您可能注意到的另一个额外功能是，图 11-2 中的错误消息现在有一个图标。这再次是因为我们使用了
