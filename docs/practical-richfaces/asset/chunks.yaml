- fmt: "### Opening the Popup Panel from Within a Table\n\nAnother common usage is\
    \ opening a popup panel from within a table to view or edit the selected record.\n\
    \n[Figure 6-30](#Chapter06.html#fig_6_30) shows an example.\n\n![images](images/0630.jpg)\n\
    \n***Figure 6-30.** Table with airlines information*\n\nAfter clicking a View\
    \ link, a popup panel opens and shows the selected record information, as shown\
    \ in [Figure 6-31](#Chapter06.html#fig_6_31).\n\n![images](images/0631.jpg)\n\n\
    ***Figure 6-31.** Details popup panel shown for the table row*\n\nThe page source\
    \ for these example figures is shown in [Listing 6-35](#Chapter06.html#list_6_35).\n\
    \n***Listing 6-35.** Page source*\n\n```\n<h:form>\n   <rich:dataTable value=\"\
    #{airlinesBean.airlines}\" var=\"airline\">\n      <f:facet name=\"header\">Airlines</f:facet>\n\
    \      <rich:column>\n         <f:facet name=\"header\">Name</f:facet>\n     \
    \       #{airline.name}\n      </rich:column>\n      <rich:column>\n         <f:facet\
    \ name=\"header\">Actions</f:facet>\n         <a4j:commandLink value=\"View\"\n\
    \            oncomplete=\"#{rich:component('popupPanel9')}.show()\"\n        \
    \    render=\"airlineInfo\">\n            <f:setPropertyActionListener value=\"\
    #{airline}\"\n               target=\"#{airlinesBean.selected}\" />\n        \
    \ </a4j:commandLink>\n      </rich:column>\n   </rich:dataTable>\n</h:form>\n\
    <rich:popupPanel id=\"popupPanel9\" width=\"250\" height=\"100\">\n   <f:facet\
    \ name=\"header\">\n      Airline Information\n   </f:facet>\n   <h:panelGrid\
    \ id=\"airlineInfo\" columns=\"2\">\n      <h:outputText value=\"Name:\" />\n\
    \      <h:outputText value=\"#{airlinesBean.selected.name}\" />\n      <h:outputText\
    \ value=\"Code\" />\n      <h:outputText value=\"#{airlinesBean.selected.code}\"\
    \ />\n   </h:panelGrid>\n   <a href=\"#\" onclick=\"#{rich:component('popupPanel9')}.hide();return\n\
    \      false;\">Close</a>\n</rich:popupPanel>\n```\n\nThe Java code is pretty\
    \ simple. Note the `AirlinesBean` code in [Listing 6-36](#Chapter06.html#list_6_36).\n\
    \n***Listing 6-36.** `AirlinesBean` code*\n\n```\n@ManagedBean\n@SessionScoped\n\
    public class AirlinesBean {\n   private Airline selected;\n   private List<Airline>\
    \ airlines;\n   public AirlinesBean() {\n      airlines = new ArrayList<Airline>();\n\
    \      airlines.add(new Airline(\"American Airlines\", \"AA\"));\n      airlines.add(new\
    \ Airline(\"United Airlines\", \"UA\"));\n      airlines.add(new Airline(\"Delta\"\
    , \"DD\"));\n      airlines.add(new Airline(\"Southwest Airlines\", \"WN\"));\n\
    \      airlines.add(new Airline(\"US Airways\", \"US\"));\n   }\n   //Getters\
    \ and setters\n}\n```\n\nAnd the `Airline` object is shown in [Listing 6-37](#Chapter06.html#list_6_37).\n\
    \n***Listing 6-37.** Airline object*\n\n```\npublic class Airline {\n   private\
    \ String name;\n   private String code;\n\n   public Airline(String name, String\
    \ code) {\n      this.name = name;\n      this.code = code;\n   }\n   //Getters\
    \ and setters\n}\n```\n\nWe are using `<f:setPropertyActionListener>` to set the\
    \ object that was selected in the table. The selected object is then updated inside\
    \ the popup panel. This is no different from selecting the same object, and instead\
    \ of showing it in a popup panel, you can display the object below the table,\
    \ for example. To use a popup panel, it will help you to think that from the server\
    \ perspective it's all one page.\n\n![images](images/square.jpg) **Note** Additional\
    \ details about the iteration components are covered in [Chapter 7](#Chapter07.html#ch7).\n\
    \n### Using the Popup Panel to Show Status\n\nAnother common usage for the popup\
    \ panel is to show some operation status. Because the modal popup panel will block\
    \ the underlying view, the user can't click any other buttons or links while the\
    \ current operation is executed. The basic idea is that you click some function\
    \ and a panel is shown. On completion of the operation, the panel is hidden. You\
    \ are also going to use `<a4j:status>` to help with this. `<a4j:status>` will\
    \ actually show and hide the popup panel. [Listing 6-38](#Chapter06.html#list_6_38)\
    \ shows the page code.\n\n***Listing 6-38.** Using `<a4j:status>`*\n\n```\n<h:form>\n\
    \   <a4j:commandButton actionListener=\"#{bean.calculate}\" value=\"Calculate\"\
    \ />\n</h:form>\n<rich:popupPanel id=\"mp\" style=\"text-align:center\">\n   <h:outputText\
    \ value=\"Please wait...\" style=\"font-weight:bold;font-\n      size:large\"\
    \ />\n</rich:popupPanel>\n<a4j:status id=\"actionStatus\"\n   onstart=\"#{rich:component('mp')}.show('',{height:'80',\
    \ width:'150'})\"\n   onstop=\"#{rich:component('mp')}.hide()\" />\n```\n\nThe\
    \ `calculate()` method (which causes some long-running processing) will be defined,\
    \ as shown in [Listing 6-39](#Chapter06.html#list_6_39).\n\n***Listing 6-39.**\
    \ `calculate()` method*\n\n```\n@ManagedBean\n@RequestScoped\npublic class Bean\
    \ {\n   public void calculate(ActionEvent event){\n      // some long running\
    \ calculations or this for testing:\n      try {\n          Thread.sleep(3000);\n\
    \        } catch (InterruptedException e) {\n           e.printStackTrace();\n\
    \        }\n   }\n}\n```\n\n[Figure 6-32](#Chapter06.html#fig_6_32) shows the\
    \ result.\n\n![images](images/0632.jpg)\n\n***Figure 6-32.** Popup panel used\
    \ as blocking operation status window*\n\nWhen the button is clicked, the `#{bean.calculate}`\
    \ listener is invoked. Let's assume it takes a few seconds to complete (you can\
    \ put the current thread to sleep for a few seconds if you are testing). You know\
    \ from before that you can use `<a4j:status>` to display any content while the\
    \ Ajax request is being processed. In this example facets are not defined, but\
    \ we are using `<a4j:status>`'s `start` and `stop` events to show and hide the\
    \ popup panel. Again `#{rich:component(id)}` is the RichFaces client EL function\
    \ that allows you to call the JavaScript API on the referenced component. That's\
    \ exactly what the example does. On the request start, you call `show()` on the\
    \ popup panel. When the request has been completed (`onstop` event handler called),\
