    So let’s draw our attention from server-side code for a moment to copy `spinner.js`,
    which we used as a prototype to the `src\main\resources\META-INF\resources\org.richfaces.book\`
    folder in our project.    The second thing is the actual code that we implemented.
    We defined the `decode()` method for our component and added the utility method
    used in our renderer template. Now, let’s look closer to the methods introduced.    The
    `decode()` method is used on any input JSF component to process all the changes
    and events from the client-side and maps them the server-side component instance
    and raises corresponding server-side events. The `decode()` method retrieves the
    value from request map and stores it in the `UISpinner` submitted value property.
    As `UISpinner` extends `UIInput`, the value will be validated and updated according
    to a standard JSF `UIInput` contract.    There are two more methods in the base
    class. `getConvertedValue()` overrides the `UIInput` method, which is called during
    process validation to convert it prior to validation. The `getInputValue()` method
    is referenced in the template to render value in the `<input>` tag. Both of them
    call utility methods in `org.richfaces.component.util.InputUtils`. These methods
    perform conversions according to the type of server-side properties used as value
    binding with default converters. So if we use the `int` or `Integer` property
    in the bean as our component value, the component will try to convert it using
    `javax.faces.convert.IntegerConverter`.    Now we are ready to build the project.
