  raw: '## Rich Data Iteration Components


    If you know how to use the standard JSF `<h:dataTable>` component, then you basically
    know how to use any data iteration components available in RichFaces. Now, RichFaces
    offers a number of features above and beyond what the standard data table component
    provides, such as advanced models, lazy loading, sorting, filtering, skins, and
    partial-table updates.


    JSF 2 provides two components to iterate over data: `<h:dataTable>` and `<ui:repeat>`.
    The `<h:dataTable>` component generates an HTML `<table>..</table>` structure.
    The `<ui:repeat>` component allows you to iterate over collections wrapping with
    any HTML markup. However, when displaying collections in real enterprise applications,
    a simple table format is not always appropriate. You might also need to add scrolls
    to your tables, implement lazy loading, selection, or columns resizes, and order
    customization. Or, you might want to display various HTML lists, such as definition,
    ordered, or unordered. This is where RichFaces components come in.


    ![images](images/square.jpg) **Note** Most screenshots in this chapter utilize
    the wine skin. [Chapter 13](#Chapter13.html#ch13) covers how to change skins.


    RichFaces provides the following components to display collections:


    1.  <rich:dataTable>

    2.  <rich:extendedDataTable>

    3.  <rich:collapsibleSubTable>

    4.  <rich:list>

    5.  <rich:dataGrid>

    6.  <a4j:repeat>


    All these components can be bound to the same data types as the standard `<h:dataTable>`
    component; however, the most common object that is bound to any type of data iteration
    component in simple cases is `java.util.List`. And, in more complex cases we will
    show you how to use advanced RichFaces data models.


    ### Data Preparation


    Let’s start with the creation of the data that we will use across the examples.
    You might want to take a few minutes to review it (although it’s pretty simple)
    because to save space, we will not repeat it in future code listings but will
    add only methods that should be added to the data bean to implement particular
    functionality. That simple `List`-based model will populate information about
    Olympic Games starting from 19th century. We will load the data from an XML file
    by using JAXB. (Java 6 was used for this example.) [Listing 7-1](#Chapter07.html#list_7_1)
    shows how the XML file looks.


    ![images](images/square.jpg) **Tip** The Java Architecture for XML Binding (JAXB)
    provides a fast and convenient way to bind between XML schemas and Java representations,
    making it easy for Java developers to incorporate XML data and processing functions
    in Java applications. Learn more at [http://jaxb.java.net/](http://jaxb.java.net/).
    You’re free to skip this section if not familiar with JAXB or just not interested
    in XML-based data creation. Simply review the `GameDescriptor` class. Sample data
    in this chapter will consist of `GameDescriptor` class inside a `java.util.List`.
    In general, any Java bean with a couple of properties placed inside a list could
    be used as a data model object.


    ***Listing 7-1.** XML file*


    `<games>`

    `   <game>`

    `      <city>Athens</city>`

    `      <country>Greece</country>`

    `      <continent>Europe</continent>`

    `      <flag>greece_old</flag>`

    `      <number>1</number>`

    `      <season>Summer</season>`

    `      <fromDate>4/6/1896</fromDate>`

    `      <toDate>4/15/1896</toDate>`

    `   </game>`


    `<!-- other game entries-->`

    `</games>`


    [Listing 7-2](#Chapter07.html#list_7_2) shows the GameDescriptor object that is
    used to store single-game information.


    ***Listing 7-2.** GameDescriptor object used to store single-game information*


    `public class GameDescriptor implements Serializable {`

    `   private String city;`

    `   private String country;`

    `   private String continent;`

    `   private String flagName;`

    `   private int number;`

    `   private Calendar fromDate = new GregorianCalendar(Locale.US);`

    `   private Calendar toDate = new GregorianCalendar(Locale.US);`

    `   private seasons season;`

    `   private statuses status = statuses.passed;`

    `   private enum statuses {passed, future, canceled};`

    `private enum seasons {Winter,` `Summer``};`

    `   public int getYear() {`

    `      return fromDate.get(Calendar.YEAR);`

    `   }`

    `   public String getFrom() {`

    `      if (!status.equals(statuses.canceled)) {`

    `         return fromDate.get(Calendar.DAY_OF_MONTH) + " "`

    `            + fromDate.getDisplayName(Calendar.MONTH, Calendar.LONG, Locale.US);`

    `      } else return "";`

    `   }`

    `   public String getTo() {`

    `      if (!status.equals(statuses.canceled)) {`

    `         return toDate.get(Calendar.DAY_OF_MONTH) + " "`

    `            + toDate.getDisplayName(Calendar.MONTH, Calendar.LONG, Locale.US);`

    `      } else return "";`

    `   }`

    `   public String getFlagURI() {`

    `      return "/images/flags/" + flagName + ".png";`

    `   }`

    `   @XmlElement`

    `   public String getCity() {`

    `      return city;`

    `   }`

    `   // Getters and setters`

    `}`


    As it mentioned, `JAXB` is used in the example to parse XML and create `GameDescriptor`
    objects. Note that all getters are marked with an `@XmlElement` annotation, such
    as `getCity`, as shown in [listing 7-2](#Chapter07.html#list_7_2).


    `getYear`, `getTo`, and `getFrom` are used to get specific dates’ representation,
    which will be used in the table. Images are placed in the `WebApp/images/flags`
    folder, and the `getFlagURI` method will transform an image name from an XML file
    to an image URI used inside a page.'
