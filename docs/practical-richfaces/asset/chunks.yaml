    Double click to select items type\"\n      value=\"#{inplaceSelectBean2.currentType}\"\
    \nvalueChangeListener=\"#{inplaceSelectBean2.valueChanged}\"\n      editEvent=\"\
    dblclick\">\n      <f:selectItems value=\"#{inplaceSelectBean2.firstList}\" />\n\
    <a4j:ajax event=\"change\" render=\"second\" execute=\"@this\" />\n      </rich:inplaceSelect>\n\
    \      <a4j:outputPanel id=\"second\" layout=\"block\">\n<rich:inplaceSelect value=\"\
    #{inplaceSelectBean2.currentType}\"\n            defaultLabel=\"Click to select\
    \ item\"\n            rendered=\"#{not empty inplaceSelectBean2.currentType}\"\
    >\n            <f:selectItems value=\"#{inplaceSelectBean2.secondList}\" />\n\
    \         </rich:inplaceSelect>\n      </a4j:outputPanel>\n      <h:panelGrid>\n\
    \   </h:form>\n```\n\nA simple Java bean, which holds both of the select item\
    \ lists and changes the second list when selection in the first list is changed,\
    \ is shown in [Listing 5-7](#Chapter05.html#list_5_7).\n\n**Listing 5-7.** A simple\
