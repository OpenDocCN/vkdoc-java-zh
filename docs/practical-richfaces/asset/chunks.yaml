    http://jboss.org/richfaces/docs 的 RichFaces 文档中找到。


    与其他面板一样，可以通过 *`activeItem`* 属性在状态集之间进行切换，该属性保存所选项目的名称，并且可以绑定到 EL 以在运行时控制选择。面板切换模式与我们介绍的其他面板类似：*`ajax`*、*`server`*
