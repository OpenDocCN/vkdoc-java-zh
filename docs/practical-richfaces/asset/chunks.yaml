    ##### Showing a Popup During an Ajax Request


    `<a4j:status>` comes with two events that can be used to invoke any JavaScript
    `onstart` and `onstop` events. Using `<a4j:status>` `onstart` and `onstop` events
    with the combination of the `<rich:popupPanel>` component, we can block the page
    during an Ajax request. This could be used so that the user won''t click any other
    buttons or links on the page when an Ajax request is being executed.


    Using the `<a4j:status>` API with `<rich:popupPanel>` is shown in [Listing 3-61](#Chapter03.html#list_3_61).
    With `onstart`, we show a popup panel, and with `onstop`, we hide the popup panel.
    `<rich:popupPanel>` can also be configured as a non-blocking popup. We will cover
    this component in [Chapter 6](#Chapter06.html#ch6).


    ***Listing 3-61.** Using the `<a4j:status>` API with `<rich:popupPanel>`*


    `<h:form>`

    `   <h:panelGrid>`

    `      <h:panelGrid columns="3">`

    `         <h:inputText value="#{ajaxStatusBean.text}" />`

    `         <a4j:commandButton value="Convert"`

    `            action="#{ajaxStatusBean.upperCase}"`

    `            render="upper" />`

    `         <a4j:status onstart="#{rich:component(''statusPanel'')}.show();"`

    `            onstop="#{rich:component(''statusPanel'')}.hide();" />`

    `      </h:panelGrid>`

    `      <h:outputText id="upper" value="#{ajaxStatusBean.text}" />`

    `   </h:panelGrid>`

    `</h:form>`


    `<rich:popupPanel id="statusPanel" header="Converting">`

    `   <h:outputText value="Please wait.." />`

    `</rich:popupPanel>`


    The result is shown in [Figure 3-11](#Chapter03.html#fig_3_11).


    ![images](images/0311.jpg)


    ***Figure 3-11.** Popup panel is opened on Ajax request with <a4j:status> JavaScript
    API*


    `<a4j:status>` also comes with JavaScript API listed in [Table 3-9](#Chapter03.html#tab_3_9).


    ![images](images/t0309.jpg)


    JavaScript API is useful when you need to utilize the same status for non-Ajax
    requests (by invoking `start()` on the `<h:commandButton>` click, for example),
    or to show it during any time-consuming JavaScript activities.


    #### Displaying Logging and Debugging Information with <a4j:log>


    *`<a4j:log>`* is a client-side utility for Ajax logging and debugging. It generates
    JavaScript that opens a debug window, logging client processing information such
    as requests, responses, and DOM changes.


    To use it, just place `<a4j:log/>` tag on a page, as follows:


    `<a4j:log />`


    It shows output when an Ajax request is fired, so let''s use it with a button
    with the current time, as shown in [Listing 3-62](#Chapter03.html#list_3_62).


    ***Listing 3-62.** A button with the current time*


    `<h:form id="form">`

    `   <h:panelGrid>`

    `      <a4j:commandButton id="Update" value="Update" render="time"/>`

    `      <h:outputText value="#{logBean.now}" id="time"/>`

    `   </h:panelGrid>`

    `   <a4j:log />`

    `</h:form>`


    When the page is rendered and the button is clicked, you will see the output shown
    in [Figure 3-12](#Chapter03.html#fig_3_12).


    ![images](images/0312.jpg)


    ***Figure 3-12.** Output from <a4j:log> component*


    Selecting the `debug` level and hitting the Update button will produce a more
    verbose output, as shown in [Figure 3-13](#Chapter03.html#fig_3_13).


    ![images](images/0313.jpg)


    ***Figure 3-13.** Output from <a4j:log> component with debug level selected*


    In case there is an error, such as server not running, you might see output like
    [Figure 3-14](#Chapter03.html#fig_3_14).


    ![images](images/0314.jpg)


    ***Figure 3-14.** Output from <a4j:log> component when server error occurs*


    If you want to set a log level during development, then the `level` attribute
    can be used, as follows:


    `<a4j:log level="DEBUG"/>`


    The `level` attribute can be set to the following values:


    *   ERROR

    *   DEBUG

    *   INFO

    *   WARN

    *   ALL (the default setting, logs all data)


    The default behavior is for the log to be rendered inside the page. As an alternative,
    the log can be opened in a popup window. To do that, set the `mode` attribute
    to `popup`, as follows:


    `<a4j:log mode="popup"/>`


    To open the popup, press Ctrl+Shift+L. To reconfigure the hot key combination,
    set the `hotkey` attribute to a new letter; for example `hotkey="D"` will open
    the popup when pressing Ctrl+Shift+D.


    ![images](images/square.jpg) **Note** The log is automatically updated after each
    Ajax request. It does not need to be explicitly re-rendered.'
