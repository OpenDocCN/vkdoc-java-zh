    `<rich:dataTable>` 一样使用 `<rich:extendedDataTable>`。


    以上涵盖了 `<rich:extendedDataTable>` 中最重要的功能。我们将在本章后面的“迭代组件高级用法”部分介绍更多高级功能。


    #### <rich:extendedDataTable> JavaScript API


    `<rich:extendedDataTable>` 组件提供了表 7-4 中所示的 JavaScript 函数。


    ![images](img/t0704.jpg)

    ![images](img/t0704a.jpg)


    ### 使用 <rich:list> 在列表中显示数据


    `<rich:list>` 组件允许从模型创建不同的 HTML 列表。图 7-11 展示了一个动态填充的无序列表的简单示例。


    ![images](img/0711.jpg)


    ***图 7-11.** 作为无序列表的 RichFaces <rich:list>*


    用于创建该列表的页面代码如清单 7-17 所示。


    ***清单 7-17.** 作为无序列表的 RichFaces <rich:list>*


    `<rich:panel style="width:280px" header="rich:list 示例">`

    `   <rich:list value="#{olympicGamesBean.games}" var="game">`

    `      #{game.year}: #{game.country}, #{game.city}`

    `   </rich:list>`

    `</rich:panel>`


    此组件最有趣的属性是 `type`。它指定要渲染的列表类型。可以定义为 `ordered`、`unordered` 和 `definitions` 值。从清单
    7-17 可以看出，`unordered` 是默认值。图 7-12 显示了当使用以下代码将值更改为 `ordered` 时将渲染的内容：


    `<rich:list type="ordered" …/>.`

    ![images](img/0712.jpg)


    ***图 7-12.** 作为有序列表的 RichFaces <rich:list>*


    如果我们想渲染一个定义列表，则需要为列表术语使用一个 facet。清单 7-18 展示了填充定义列表的代码。


    ***清单 7-18.** 填充定义列表*


    `<rich:panel style="width:280px" header="rich:list 示例">`

    `   <rich:list type="definitions" value="#{olympicGamesBean.games}" var="game">`

    `      <f:facet name="term"><b>#{game.year}</b></f:facet>`

    `      #{game.country}, #{game.city}, #{game.from} - #{game.to}`

    `   </rich:list>`

    `</rich:panel>`


    在此示例中，我们使用年份属性作为术语。对于描述，我们列出了奥运会的国家、城市和日期，如图 7-13 所示。


    ![images](img/0713.jpg)


    ***图 7-13.** 作为定义列表的 RichFaces <rich:list>*


    以上就是 `<rich:list>` 组件的全部内容。如您所见，这是一个非常直接的组件。至于 `<rich:dataTable>`，您可以使用不同的类属性（`rowClasses`、`rowClass`）或事件处理程序属性（`onclick`、`onrowclick`）来自定义基本外观、感觉和行为。


    ### 使用 <rich:dataGrid> 在网格中显示数据


    `<rich:dataGrid>` 是 `<rich:dataTable>` 和 `<h:panelGrid>` 的混合体。虽然该组件仍然像本章中的所有其他组件一样遍历数据模型，但它将组件输出为
    `<h:panelGrid>`，并放置指定数量的列。


    例如，使用清单 7-19 中的以下代码，每三条记录（对象）将占据一行。


    ***清单 7-19.** 每三条记录（对象）将占据一行*


    `<rich:panel style="width:650px" header="rich:dataGrid 示例">`

    `   <rich:dataGrid  value="#{olympicGamesBean.games}" var="game" columns="3">`

    `      <rich:panel style="with:200px;">`

    `         <h:graphicImage value="#{game.flagURI}" />`

    `         <b>#{game.country} - #{game.city}</b><br/>`

    `         <i>#{game.from} - #{game.to}</i>`

    `      </rich:panel>`

    `   </rich:dataGrid>`

    `</rich:panel>`


    此代码产生的结果如图 7-14 所示。


    ![images](img/0714.jpg)


    ***图 7-14.** <rich:dataGrid> 迭代信息面板*


    例如，如果我们将 `columns` 更改为“2”，则每行将看到两个对象（面板）。


    并且，与表格组件类似，您可以使用名为 `header` 和 `footer` 的 facet 为网格添加页眉和页脚。

    '
- fmt: "### Iterating over Custom Markup with `<a4j:repeat>`\n\nEven though the `<a4j:repeat>`\
    \ component is part of the `a4j:` tag library, we decided to cover it in this\
    \ section because it’s the base component for all data iteration components in\
    \ RichFaces. So why is it mentioned last, after all the other iteration components?\
    \ We wanted to highlight the more popular concrete implementations first.\n\n\
    The idea behind the component is the same as in Facelets `<ui:repeat>`. It’s used\
    \ to iterate over a data model; however, it doesn’t produce any HTML markup. You,\
    \ the developer, are responsible for adding any content, HTML, or JSF tags to\
    \ be iterated. If you ever need to iterate over a list of values but none of the\
    \ out-of-the-box components provide what you need, this is the component you want\
    \ to use.\n\nThe RichFaces team added special implementation in order to add features\
    \ not available in `<ui:repeat>`. In addition to being able to bind to advanced\
    \ RichFaces data models, it also supports partial-table rendering and pagination.\n\
    \nLet’s cover some of the basic features. The more advanced features will be also\
    \ covered in the “Iteration Components Advanced Usage” section.\n\nLet’s say we\
    \ need the output to be similar to the one from the `<rich:dataGrid>` component\
    \ from the previous section (or let’s assume we didn’t have `<rich:dataGrid>`\
    \ at all). In addition, we want the columns count to depend on the browser window\
    \ width. Resizing the window should increase the number of columns and setting\
    \ less width should make it output fewer ones. Take a look at the code in [Listing\
    \ 7-20](#Chapter07.html#list_7_20).\n\n***Listing 7-20.** Resizing the window\
    \ and setting less width*\n\n```\n<a4j:repeat value=\"#{olympicGamesBean.games}\"\
    \ var=\"game\"  >\n   <rich:panel style=\"width:220px; height:60px; float:left;\
    \ margin:5px;\">\n      <h:graphicImage value=\"#{game.flagURI}\" />\n      <b>#{game.country}\
    \ - #{game.city}</b><br />\n      <i>#{game.from} - #{game.to}</i>\n   </rich:panel>\n\
    </a4j:repeat>\n```\n\nNotice that the component doesn’t produce any markup, but\
    \ will render a `<rich:panel>` for each data object. If we open the page and reduce\
    \ the browser window to about 800 pixels, we will see the result in [Figure 7-15](#Chapter07.html#fig_7_15).\n\
    \n![images](images/0715.jpg)\n\n***Figure 7-15.** Using `<a4j:repeat>` to create\
    \ a grid*\n\nBy making the browser window twice as big, we will see six columns\
    \ in one row instead. So `<a4j:repeat>` is the best option when you need to implement\
    \ any specific layout using the dynamic model iteration.\n\nAs it is the base\
    \ component for all the other iteration components, most of the features covered\
    \ in the rest of this book can be used with `<a4j:repeat>`, as well.\n\n### Iteration\
    \ Components Advanced Usage\n\nThis section will show advanced features available\
    \ on data iteration components. Most of the features are available for all RichFaces\
    \ data iteration components.\n\n#### Adding Pagination with `<rich:dataScroller>`\n\
    \nIn the earlier examples, we didn’t use a large data set (50+ Olympic Games since\
    \ 1896). But in a real enterprise application, you deal with much larger data\
    \ sets. One of the classical patterns to represent such data sets is adding a\
    \ pagination control to the table, which allows using a fixed number of objects\
    \ on each page. Fortunately, RichFaces comes with a component called `<rich:datascroller>`\
    \ that provides pagination.\n\nSo, let’s start with a simple example. We’ll limit\
    \ the number of games to 10 per page and add `<rich:dataScroller>` to our table\
    \ footer. [Figure 7-16](#Chapter07.html#fig_7_16) shows that in action.\n\n![images](images/0716.jpg)\n\
    \n***Figure 7-16.** Using the `<rich:dataScroller>` component*\n\nAll we need\
    \ to do is add the `rows` attribute with the number of rows per page, and add\
    \ the `<rich:dataScroller>` tag to the table footer without any additional attributes.\
    \ (`rows` is a standard attribute from the `<h:dataTable>` component.) Look through\
    \ these changes in [Listing 7-21](#Chapter07.html#list_7_21).\n\n***Listing 7-21.**\
    \ Add the `<rich:dataScroller>` tag to the table footer*\n\n```\n<h:form>\n<rich:dataTable\
    \ value=\"#{olympicGamesBean.games}\" var=\"game\" rows=\"10\">\n      <f:facet\
    \ name=\"header\">Olympic Games List</f:facet>\n         <rich:column>\n     \
    \       <f:facet name=\"header\">Flag</f:facet>\n            <h:graphicImage value=\"\
    #{game.flagURI}\" />\n         </rich:column>\n         <rich:column>\n      \
    \      <f:facet name=\"header\">City</f:facet>\n            #{game.city}\n   \
    \      </rich:column>\n         <!--Other columns-->\n      <f:facet name=\"footer\"\
    >\n<rich:dataScroller />\n      </f:facet>\n   </rich:dataTable>\n</h:form>\n\
    ```\n\nWe added `<h:form>` around the table. Any component that sends an Ajax\
    \ request needs to be placed inside a form.\n\n![images](images/square.jpg) **Note**\
    \ `<rich:extendedDataTable>` could use the same code to add pagination. It uses\
    \ the same `rows` attribute to split the model into pages. As we mentioned in\
    \ the `<rich:extendedDataTable>` section, this component also uses a separate\
    \ `clientRows` attribute to add Ajax loading via vertical scroll. The component\
    \ can even define both attributes. You should keep in mind, however, that Ajax\
    \ loading done by `clientRows`-sized portions and is limited to `rows`—a defined\
    \ number of rows. `<rich:dataScroller>` should be still used to switch pages.\n\
    \nWe also need to mention that you can use `<rich:dataScroller>` defined outside\
    \ the table; and even more than once instance of the scroller can be placed on\
    \ a page. An example is shown in [Figure 7-17](#Chapter07.html#fig_7_17).\n\n\
    ![images](images/0717.jpg)\n\n***Figure 7-17.** Using multiple scrollers outside\
    \ of the table*\n\nTo use the `<rich:dataScroller>` component outside the table,\
    \ you should use the `for` attribute pointed to the table id. Updated code is\
    \ shown [Listing 7-22](#Chapter07.html#list_7_22).\n\n***Listing 7-22.** Using\
    \ the `for` attribute pointed to the table id*\n\n```\n<h:form>\n<rich:dataScroller\
    \ for=\"table\"/>\n   <rich:dataTable value=\"#{olympicGamesBean.games}\" var=\"\
    game\" rows=\"5\" id=\"table\">\n       <!--Columns definitions-->\n   </rich:dataTable>\n\
    <rich:dataScroller for=\"table\"/>\n</h:form>\n```\n\nThere are a few important\
    \ attributes that should also be mentioned. First, the `page` attribute can be\
    \ defined by the page that is currently shown. It allows you to restore the previous\
    \ state when returning to the view with the table from a details screen. In order\
    \ to allow such dynamic page setting, it could be defined with EL, as follows:\n\
    \n```\n<rich:dataScroller for=\"table\" page=\"#{viewController.gamesTablePage}\"\
    />\n```\n\n![images](images/square.jpg) **Note** If you will define a non-existent\
    \ page number or a non-valid value, the component will reset to some of the boundary\
    \ values. For example, if you set page 10 as the current page, and the table consists\
    \ of only nine pages, then page 9, the last page, will set automatically. If the\
    \ value is not valid, or less than 1, then the first page will be shown. When\
    \ an incorrect value is used, a warning message about the correction is shown\
    \ in the console."
  raw: '### Iterating over Custom Markup with <a4j:repeat>


    Even though the `<a4j:repeat>` component is part of the a4j: tag library, we decided
    to cover it in this section because it’s the base component for all data iteration
    components in RichFaces. So why is it mentioned last, after all the other iteration
    components? We wanted to highlight the more popular concrete implementations first.


    The idea behind the component is the same as in Facelets `<ui:repeat>`. It’s used
    to iterate over a data model; however, it doesn’t produce any HTML markup. You,
    the developer, are responsible for adding any content, HTML, or JSF tags to be
    iterated. If you ever need to iterate over a list of values but none of the out-of-the-box
    components provide what you need, this is the component you want to use.


    The RichFaces team added special implementation in order to add features not available
    in `<ui:repeat>`. In addition to being able to bind to advanced RichFaces data
    models, it also supports partial-table rendering and pagination.


    Let’s cover some of the basic features. The more advanced features will be also
    covered in the “Iteration Components Advanced Usage” section.


    Let’s say we need the output to be similar to the one from the `<rich:dataGrid>`
    component from the previous section (or let’s assume we didn’t have `<rich:dataGrid>`
    at all). In addition, we want the columns count to depend on the browser window
    width. Resizing the window should increase the number of columns and setting less
    width should make it output fewer ones. Take a look at the code in [Listing 7-20](#Chapter07.html#list_7_20).


    ***Listing 7-20.** Resizing the window and setting less width*


    `<a4j:repeat value="#{olympicGamesBean.games}" var="game"  >`

    `   <rich:panel style="width:220px; height:60px; float:left; margin:5px;">`

    `      <h:graphicImage value="#{game.flagURI}" />`

    `      <b>#{game.country} - #{game.city}</b><br />`

    `      <i>#{game.from} - #{game.to}</i>`

    `   </rich:panel>`

    `</a4j:repeat>`


    Notice that the component doesn’t produce any markup, but will render a <rich:panel>
    for each data object. If we open the page and reduce the browser window to about
    800 pixels, we will see the result in [Figure 7-15](#Chapter07.html#fig_7_15).


    ![images](images/0715.jpg)


    ***Figure 7-15.** Using <a4j:repeat> to create a grid*


    By making the browser window twice as big, we will see six columns in one row
    instead. So `<a4j:repeat>` is the best option when you need to implement any specific
    layout using the dynamic model iteration.


    As it is the base component for all the other iteration components, most of the
    features covered in the rest of this book can be used with `<a4j:repeat>`, as
    well.


    ### Iteration Components Advanced Usage


    This section will show advanced features available on data iteration components.
    Most of the features are available for all RichFaces data iteration components.


    #### Adding Pagination with <rich:dataScroller>


    In the earlier examples, we didn’t use a large data set (50+ Olympic Games since
    1896). But in a real enterprise application, you deal with much larger data sets.
    One of the classical patterns to represent such data sets is adding a pagination
    control to the table, which allows using a fixed number of objects on each page.
    Fortunately, RichFaces comes with a component called `<rich:datascroller>` that
    provides pagination.


    So, let’s start with a simple example. We’ll limit the number of games to 10 per
    page and add `<rich:dataScroller>` to our table footer. [Figure 7-16](#Chapter07.html#fig_7_16)
    shows that in action.


    ![images](images/0716.jpg)


    ***Figure 7-16.** Using the <rich:dataScroller> component*


    All we need to do is add the `rows` attribute with the number of rows per page,
    and add the `<rich:dataScroller>` tag to the table footer without any additional
    attributes. (`rows` is a standard attribute from the `<h:dataTable>` component.)
    Look through these changes in [Listing 7-21](#Chapter07.html#list_7_21).


    ***Listing 7-21.** Add the `<rich:dataScroller>` tag to the table footer*


    `<h:form>`

    `<rich:dataTable value="#{olympicGamesBean.games}" var="game"` **`rows="10"`**`>`

    `      <f:facet name="header">Olympic Games List</f:facet>`

    `         <rich:column>`

    `            <f:facet name="header">Flag</f:facet>`

    `            <h:graphicImage value="#{game.flagURI}" />`

    `         </rich:column>`

    `         <rich:column>`

    `            <f:facet name="header">City</f:facet>`

    `            #{game.city}`

    `         </rich:column>`

    `         <!--Other columns-->`

    `      <f:facet name="footer">`

    **`<rich:dataScroller />`**

    `      </f:facet>`

    `   </rich:dataTable>`

    `</h:form>`


    We added `<h:form>` around the table. Any component that sends an Ajax request
    needs to be placed inside a form.


    ![images](images/square.jpg) **Note** `<rich:extendedDataTable>` could use the
    same code to add pagination. It uses the same `rows` attribute to split the model
    into pages. As we mentioned in the `<rich:extendedDataTable>` section, this component
    also uses a separate `clientRows` attribute to add Ajax loading via vertical scroll.
    The component can even define both attributes. You should keep in mind, however,
    that Ajax loading done by `clientRows`-sized portions and is limited to “rows”—a
    defined number of rows. `<rich:dataScroller>` should be still used to switch pages.


    We also need to mention that you can use `<rich:dataScroller>` defined outside
    the table; and even more than once instance of the scroller can be placed on a
    page. An example is shown in [Figure 7-17](#Chapter07.html#fig_7_17).


    ![images](images/0717.jpg)


    ***Figure 7-17.** Using multiple scrollers outside of the table*


    To use the `<rich:dataScroller>` component outside the table, you should use the
    for attribute pointed to the table id. Updated code is shown [Listing 7-22](#Chapter07.html#list_7_22).


    ***Listing 7-22.** Using the for attribute pointed to the table id*


    `<h:form>`

    `<rich:dataScroller` **`for="table"`**`/>`

    `   <rich:dataTable value="#{olympicGamesBean.games}" var="game" rows="5" id="table">`

    `       <!--Columns definitions-->`

    `   </rich:dataTable>`

    `<rich:dataScroller` **`for="table"`**`/>`

    `</h:form>`


    There are a few important attributes that should also be mentioned. First, the
    `page` attribute can be defined by the page that is currently shown. It allows
    you to restore the previous state when returning to the view with the table from
    a details screen. In order to allow such dynamic page setting, it could be defined
    with EL, as follows:


    `<rich:dataScroller for="table"` **`page="#{viewController.gamesTablePage}"`**`/>`


    ![images](images/square.jpg) **Note** If you will define a non-existent page number
    or a non-valid value, the component will reset to some of the boundary values.
    For example, if you set page 10 as the current page, and the table consists of
    only nine pages, then page 9, the last page, will set automatically. If the value
    is not valid, or less than 1, then the first page will be shown. When an incorrect
    value is used, a warning message about the correction is shown in the console.'
  trans: '

    ### 使用 `<a4j:repeat>` 遍历自定义标记


    尽管 `<a4j:repeat>` 组件是 a4j 标签库的一部分，但我们决定在本节中介绍它，因为它是 RichFaces 中所有数据迭代组件的基础组件。那么，为什么在所有其他迭代组件之后才提到它呢？我们想先重点介绍更常用的具体实现。


    该组件的理念与 Facelets 的 `<ui:repeat>` 相同。它用于遍历数据模型；但是，它不会生成任何 HTML 标记。您作为开发者，需要负责添加任何需要迭代的内容、HTML
    或 JSF 标签。如果您需要遍历一个值列表，但现成的组件都无法满足您的需求，那么这就是您要使用的组件。


    RichFaces 团队添加了特殊的实现，以增加 `<ui:repeat>` 中不可用的功能。除了能够绑定到高级 RichFaces 数据模型之外，它还支持部分表格渲染和分页。


    让我们介绍一些基本功能。更高级的功能也将在“迭代组件高级用法”部分中介绍。


    假设我们需要输出与上一节中 `<rich:dataGrid>` 组件类似的结果（或者假设我们根本没有 `<rich:dataGrid>`）。此外，我们希望列数取决于浏览器窗口的宽度。调整窗口大小应增加列数，而减小宽度则应减少列数。请查看代码清单
    7-20 中的代码。


    ***代码清单 7-20.** 调整窗口大小并减小宽度*


    `<a4j:repeat value="#{olympicGamesBean.games}" var="game"  >`

    `   <rich:panel style="width:220px; height:60px; float:left; margin:5px;">`

    `      <h:graphicImage value="#{game.flagURI}" />`

    `      <b>#{game.country} - #{game.city}</b><br />`

    `      <i>#{game.from} - #{game.to}</i>`

    `   </rich:panel>`

    `</a4j:repeat>`


    请注意，该组件不会生成任何标记，但会为每个数据对象渲染一个 `<rich:panel>`。如果我们打开页面并将浏览器窗口缩小到大约 800 像素，我们将看到图
    7-15 中的结果。


    ![images](img/0715.jpg)


    ***图 7-15.** 使用 `<a4j:repeat>` 创建网格*


    将浏览器窗口放大一倍，我们将在同一行中看到六列。因此，当您需要使用动态模型迭代来实现任何特定布局时，`<a4j:repeat>` 是最佳选择。


    由于它是所有其他迭代组件的基础组件，本书其余部分介绍的大多数功能也可以与 `<a4j:repeat>` 一起使用。


    ### 迭代组件高级用法


    本节将介绍数据迭代组件可用的高级功能。大多数功能适用于所有 RichFaces 数据迭代组件。


    #### 使用 `<rich:dataScroller>` 添加分页


    在之前的示例中，我们没有使用大型数据集（自 1896 年以来的 50 多届奥运会）。但在实际的企业应用中，您会处理更大的数据集。表示此类数据集的经典模式之一是为表格添加分页控件，该控件允许每页使用固定数量的对象。幸运的是，RichFaces
    提供了一个名为 `<rich:datascroller>` 的组件，它提供了分页功能。


    那么，让我们从一个简单的示例开始。我们将每页的游戏数量限制为 10 个，并将 `<rich:dataScroller>` 添加到表格页脚。图 7-16 展示了实际效果。


    ![images](img/0716.jpg)


    ***图 7-16.** 使用 `<rich:dataScroller>` 组件*


    我们只需要添加带有每页行数的 `rows` 属性，并将 `<rich:dataScroller>` 标签添加到表格页脚，无需任何其他属性。（`rows` 是
    `<h:dataTable>` 组件的标准属性。）请查看代码清单 7-21 中的这些更改。


    ***代码清单 7-21.** 将 `<rich:dataScroller>` 标签添加到表格页脚*


    `<h:form>`

    `<rich:dataTable value="#{olympicGamesBean.games}" var="game"` **`rows="10"`**`>`

    `      <f:facet name="header">奥运会列表</f:facet>`

    `         <rich:column>`

    `            <f:facet name="header">国旗</f:facet>`

    `            <h:graphicImage value="#{game.flagURI}" />`

    `         </rich:column>`

    `         <rich:column>`

    `            <f:facet name="header">城市</f:facet>`

    `            #{game.city}`

    `         </rich:column>`

    `         <!--其他列-->`

    `      <f:facet name="footer">`

    **`<rich:dataScroller />`**

    `      </f:facet>`

    `   </rich:dataTable>`

    `</h:form>`


    我们在表格周围添加了 `<h:form>`。任何发送 Ajax 请求的组件都需要放在表单内部。


    ![images](img/square.jpg) **注意** `<rich:extendedDataTable>` 可以使用相同的代码来添加分页。它使用相同的
    `rows` 属性将模型拆分为多个页面。正如我们在 `<rich:extendedDataTable>` 部分中提到的，该组件还使用单独的 `clientRows`
    属性通过垂直滚动添加 Ajax 加载。该组件甚至可以同时定义这两个属性。但是，您应该记住，由 `clientRows` 大小的部分完成的 Ajax 加载受限于“rows”——定义的行数。仍然应使用
    `<rich:dataScroller>` 来切换页面。


    我们还需要提到，您可以使用在表格外部定义的 `<rich:dataScroller>`；甚至可以在一个页面上放置多个滚动器实例。示例如图 7-17 所示。


    ![images](img/0717.jpg)


    ***图 7-17.** 在表格外部使用多个滚动器*


    要在表格外部使用 `<rich:dataScroller>` 组件，您应该使用指向表格 id 的 `for` 属性。更新后的代码如代码清单 7-22 所示。


    ***代码清单 7-22.** 使用指向表格 id 的 `for` 属性*


    `<h:form>`

    `<rich:dataScroller` **`for="table"`**`/>`

    `   <rich:dataTable value="#{olympicGamesBean.games}" var="game" rows="5" id="table">`

    `       <!--列定义-->`

    `   </rich:dataTable>`

    `<rich:dataScroller` **`for="table"`**`/>`

    `</h:form>`


    还有一些重要的属性也应该提及。首先，`page` 属性可以由当前显示的页面定义。它允许您在从详细信息屏幕返回到包含表格的视图时恢复之前的状态。为了允许这种动态页面设置，可以使用
    EL 来定义它，如下所示：


    `<rich:dataScroller for="table"` **`page="#{viewController.gamesTablePage}"`**`/>`


    ![images](img/square.jpg) **注意** 如果您定义了一个不存在的页码或无效的值，组件将重置为某个边界值。例如，如果您将第 10 页设置为当前页，而表格只有
    9 页，那么将自动设置第 9 页（最后一页）。如果该值无效或小于 1，则将显示第一页。当使用不正确的值时，控制台会显示一条关于修正的警告消息。

