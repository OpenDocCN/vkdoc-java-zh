- fmt: "### Using `<rich:panel>`\n\n`<rich:panel>` is just a panel or a container\
    \ for any other content. You can place anything you want inside it, such as text\
    \ or any other JSF components. A sample panel with text is shown in [Figure 6-1](#Chapter06.html#fig_6_1).\n\
    \n![images](images/0601.jpg)\n\n**Figure 6-1.** Panel without header\n\nThe code\
    \ for this panel is shown in [Listing 6-1](#Chapter06.html#list_6_1).\n\n**Listing\
    \ 6-1.** Code for the panel without header\n\n```\n<rich:panel style=\"width:450px\"\
    >\n   New York City (officially The City of New York) is the most populous city\n\
    \   in the United States, with its metropolitan area ranking among the largest\n\
    \   urban areas in the world. It has been the largest city in the United\n   States\
    \ since 1790, and was the country's first capital city and the site\n   of George\
    \ Washington's inauguration as the first president of the United\n   States...\n\
    </rich:panel>\n```\n\nYou can easily add a panel `header` by setting `header`\
    \ using attribute or using the same named `<f:facet>` as shown in [Listing 6-2](#Chapter06.html#list_6_2).\n\
    \n**Listing 6-2.** Adding a panel header with `<f:facet>`\n\n```\n<rich:panel\
    \ style=\"width:450px\">\n   <f:facet name=\"header\">New York City</f:facet>\n\
    \   New York City (officially The City of New York) is the most populous city\n\
    \   in the United States, with its metropolitan area ranking among the largest\n\
    \   urban areas in the world. It has been the largest city in the United\n   States\
    \ since 1790, and was the country's first capital city and the site\n   of George\
    \ Washington's inauguration as the first president of the United\n   States...\n\
    </rich:panel>\n```\n\n[Figure 6-2](#Chapter06.html#fig_6_2) shows what it looks\
    \ like.\n\n![images](images/0602.jpg)\n\n**Figure 6-2.** Panel with header\n\n\
    Keep in mind that you can place any other JSF components inside and the component\
    \ is fully skinnable.\n\n[Listing 6-3](#Chapter06.html#list_6_3) is an example\
    \ of a second `<rich:panel>` nested inside the first one. In this example an image\
    \ was placed inside the first panel and an image was placed inside the header\
    \ for the second panel.\n\n**Listing 6-3.** Example of a second `<rich:panel>`\
    \ nested inside the first one\n\n```\n<rich:panel style=\"width:450px\">\n   <f:facet\
    \ name=\"header\">New York City</f:facet>\n   <h:graphicImage value=\"/images/NY-flag.png\"\
    \ style=\"float:right\" />\n   New York City (officially The City of New York)\
    \ is the most populous city\n   in the United States, with its metropolitan area\
    \ ranking among the largest\n   urban areas in the world. It has been the largest\
    \ city in the United\n   States since 1790, and was the country's first capital\
    \ city and the site\n   of George Washington's inauguration as the first president\
    \ of the United\n   States...\n   <rich:panel>\n      <f:facet name=\"header\"\
    >\n         <h:panelGroup>\n            <h:graphicImage value=\"/images/yellow_lamp.gif\"\
    \ />\n            <h:outputText value=\"5 Boroughs\" />\n         </h:panelGroup>\n\
    \      </f:facet>\n   New York City comprises five boroughs, each of which is\
    \ coextensive with a\n   county: The Bronx, Brooklyn, Manhattan, Queens and Staten\
    \ Island. With\n   over 8.2 million residents within an area of 322 square miles\
    \ (830 km),\n   New York City is the most densely populated major city in the\
    \ United\n   States.\n   </rich:panel>\n</rich:panel>\n```\n\n[Figure 6-3](#Chapter06.html#fig_6_3)\
    \ shows the result.\n\n![images](images/0603.jpg)\n\n**Figure 6-3.** Nested panels\
    \ with various content\n\nThe component also supports all standard mouse and keyboard\
    \ event handlers. Let's check one more example that shows how to use component\
    \ event handlers in order to highlight the component content. The page code is\
    \ shown in [Listing 6-4](#Chapter06.html#list_6_4).\n\n**Listing 6-4.** Using\
    \ component event handlers\n\n```\n<style>\n.body:hover {\n   font-weight:bold;\n\
    }\n.highlight-font{\n   text-decoration: underline;\n}\n</style>\n<rich:panel\
    \ bodyClass=\"body\" headerClass=\"header\" style=\"width:450px\"\n   onmouseover=\"\
    jQuery('.header').addClass('highlight-font');\"\n   onmouseout=\"jQuery('.header').removeClass('highlight-font');\"\
    >\n      <f:facet name=\"header\">New York City</f:facet>\n   New York City (officially\
    \ The City of New York) is the most populous\n   city in the United States, with\
    \ its metropolitan area\n   ...\n</rich:panel>\n```\n\nWe are using the same panels,\
    \ but with the `mouseover` event we make the font bold inside the panel, as shown\
    \ in [Figure 6-4](#Chapter06.html#fig_6_4).\n\n![images](images/0604.jpg)\n\n\
    **Figure 6-4.** Panel with background color changed on mouseover\n\nTwo methods\
    \ were used here. We added a CSS class by using simple jQuery statements to underline\
    \ text in the header. We also applied a font weight change to the panel body by\
    \ using a standard CSS `hover` selector."
  raw: '### Using <rich:panel>


    *`<rich:panel>`* is just a panel or a container for any other content. You can
    place anything you want inside it, such as text or any other JSF components. A
    sample panel with text is shown in [Figure 6-1](#Chapter06.html#fig_6_1).


    ![images](images/0601.jpg)


    ***Figure 6-1.** Panel without header*


    The code for this panel is shown in [Listing 6-1](#Chapter06.html#list_6_1).


    ***Listing 6-1.** Code for the panel without header*


    `<rich:panel style="width:450px">`

    `   New York City (officially The City of New York) is the most populous city`

    `   in the United States, with its metropolitan area ranking among the largest`

    `   urban areas in the world. It has been the largest city in the United`

    `   States since 1790, and was the country''s first capital city and the site`

    `   of George Washington''s inauguration as the first president of the United`

    `   States...`

    `</rich:panel>`


    You can easily add a panel *`header`* by setting *`header`* using attribute or
    using the same named `<f:facet>` as shown in [Listing 6-2](#Chapter06.html#list_6_2).


    ***Listing 6-2.** Adding a panel header with `<f:facet>`*


    `<rich:panel style="width:450px">`

    ***`   <f:facet name="header">New York City</f:facet>`***

    `   New York City (officially The City of New York) is the most populous city`

    `   in the United States, with its metropolitan area ranking among the largest`

    `   urban areas in the world. It has been the largest city in the United`

    `   States since 1790, and was the country''s first capital city and the site`

    `   of George Washington''s inauguration as the first president of the United`

    `   States...`

    `</rich:panel>`


    [Figure 6-2](#Chapter06.html#fig_6_2) shows what it looks like.


    ![images](images/0602.jpg)


    ***Figure 6-2.** Panel with header*


    Keep in mind that you can place any other JSF components inside and the component
    is fully skinnable.


    [Listing 6-3](#Chapter06.html#list_6_3) is an example of a second `<rich:panel>`
    nested inside the first one. In this example an image was placed inside the first
    panel and an image was placed inside the header for the second panel.


    ***Listing 6-3.** Example of a second `<rich:panel>` nested inside the first one*


    `<rich:panel style="width:450px">`

    `   <f:facet name="header">New York City</f:facet>`

    `   <h:graphicImage value="/images/NY-flag.png" style="float:right" />`

    `   New York City (officially The City of New York) is the most populous city`

    `   in the United States, with its metropolitan area ranking among the largest`

    `   urban areas in the world. It has been the largest city in the United`

    `   States since 1790, and was the country''s first capital city and the site`

    `   of George Washington''s inauguration as the first president of the United`

    `   States...`

    `   <rich:panel>`

    `      <f:facet name="header">`

    `         <h:panelGroup>`

    `            <h:graphicImage value="/images/yellow_lamp.gif" />`

    `            <h:outputText value="5 Boroughs" />`

    `         </h:panelGroup>`

    `      </f:facet>`

    `   New York City comprises five boroughs, each of which is coextensive with a`

    `   county: The Bronx, Brooklyn, Manhattan, Queens and Staten Island. With`

    `   over 8.2 million residents within an area of 322 square miles (830 km),`

    `   New York City is the most densely populated major city in the United`

    `   States.`

    `   </rich:panel>`

    `</rich:panel>`


    [Figure 6-3](#Chapter06.html#fig_6_3) shows the result.


    ![images](images/0603.jpg)


    ***Figure 6-3.** Nested panels with various content*


    The component also supports all standard mouse and keyboard event handlers. Let''s
    check one more example that shows how to use component event handlers in order
    to highlight the component content. The page code is shown in [Listing 6-4](#Chapter06.html#list_6_4).


    ***Listing 6-4.** Using component event handlers*


    `<style>`

    `.body:hover {`

    `   font-weight:bold;`

    `}`

    `.highlight-font{`

    `   text-decoration: underline;`

    `}`

    `</style>`

    `<rich:panel bodyClass="body" headerClass="header" style="width:450px"`

    `   onmouseover="jQuery(''.header'').addClass(''highlight-font'');"`

    `   onmouseout="jQuery(''.header'').removeClass(''highlight-font'');">`

    `      <f:facet name="header">New York City</f:facet>`

    `   New York City (officially The City of New York) is the most populous`

    `   city in the United States, with its metropolitan area`

    `   ...`

    `</rich:panel>`


    We are using the same panels, but with the *`mouseover`* event we make the font
    bold inside the panel, as shown in [Figure 6-4](#Chapter06.html#fig_6_4).


    ![images](images/0604.jpg)


    ***Figure 6-4.** Panel with background color changed on mouseover*


    Two methods were used here. We added a CSS class by using simple jQuery statements
    to underline text in the header. We also applied a font weight change to the panel
    body by using a standard CSS `hover` selector.'
