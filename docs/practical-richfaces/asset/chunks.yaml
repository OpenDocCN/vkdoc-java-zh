- fmt: "In this sample you also see the tooltip defined without `target` attribute\
    \ usage. It is attached to the parent component (`<rich:panel>`).\n\n![images](images/square.jpg)\
    \ **Note** There are components in JSF that don't encode its ID to the client\
    \ unless you specify it explicitly. Two examples are `<h:outputText>` and `<h:graphicImage>`.\
    \ If you are adding a tooltip to such components as a child and no ID is present,\
    \ it will not work because it will not find an element to attach to. Adding a\
    \ tooltip to a component requires that a client id is present. So a good practice\
    \ is always to add an ID to parent components.\n\nYou can include any other JSF\
    \ components inside the tooltip. Let's add the server time and a counter of the\
    \ tooltip invocations, as well as an image. As shown in [Listing 6-43](#Chapter06.html#list_6_43),\
    \ we will use `mode=\"ajax\"`, so every time the tooltip is displayed, the time\
    \ and counter should be updated.\n\n**Listing 6-43.** Using `mode=\"ajax\"`\n\n\
    ```\n<h:form>\n   <rich:panel style=\"width:350px\">\n      <f:facet name=\"header\"\
    >Using rich:toolTip</f:facet>\n      <h:outputText id=\"nyc\" value=\"New York\
    \ City\" style=\"font-size: xx-\n         large;\" />\n      <rich:tooltip mode=\"\
    ajax\" for=\"nyc\" followMouse=\"true\"\n         showEvent=\"click\">\n     \
    \    <f:facet name=\"loading\">Loading...</f:facet>\n         <h:panelGrid style=\"\
    width:200px\">\n            <b>#{tooltip.now}\"</b>\n            New York City\
    \ is the most populous city in the United States,\n            with its metropolitan\
    \ area ranking among the largest urban\n            areas in the world. For more\
    \ than a century, it has been one\n            of the world's major centers of\
    \ commerce and finance.\n            <h:graphicImage value=\"/images/NY-flag.png\"\
    />\n            <h:outputText value=\"Tooltip invoked #{tooltip.counter} times\"\
    \n               style=\"font-weight:italic\" />\n         </h:panelGrid>\n  \
    \    </rich:tooltip>\n   </rich:panel>\n</h:form>\n```\n\nThis code produces [Figure\
    \ 6-36](#Chapter06.html#fig_6_36).\n\n![images](images/0636.jpg)\n\n**Figure 6-36.**\
    \ Tooltip with complex content and server-side data\n\nYou will see that the time\
    \ was updated. `#{tooltip.now}` is bound to a getter that just returns the new\
    \ time and `#{tooltip.counter}` increases every time the tooltip is requested,\
    \ shown in [Listing 6-44](#Chapter06.html#list_6_44).\n\n**Listing 6-44.** `#{tooltip.now}`\
    \ and `#{tooltip.counter}`\n\n```\n@ManagedBean\n@SessionScoped\npublic class\
    \ Tooltip {\n   private int counter = 0;\n\n   public Date getNow() {\n      return\
    \ new Date();\n   }\n\n   public int getCounter() {\n      return ++counter;\n\
    \   }\n}\n```\n\nIf you switch to `mode=\"client\"`, the tooltip content, including\
    \ the time, will be pre-rendered and no longer updated. This also demonstrates\
    \ how to show a tooltip for a component, and binding it on any event supported\
    \ by that component.\n\nThere we use the `click` event as defined in the `showEvent`\
    \ attribute, as follows:\n\n```\n<rich:tooltip mode=\"ajax\" for=\"nyc\" followMouse=\"\
    true\" showEvent=\"click\">\n```\n\n![images](images/square.jpg) **Note** You\
    \ can use any component event to show the tooltip, but the event should provide\
    \ positioning information. If a custom event on the component will not provide\
    \ positioning information, the tooltip will not be positioned properly because\
    \ it does not know where the event has occurred. `focus` event provides positioning\
    \ information only if input was activated with a mouse. Currently, the tooltip\
    \ can't be shown properly out of the box when the input gets focused using keyboard\
    \ tabbing.\n\n### Using `<rich:tooltip>` with Data Iteration Components\n\nLike\
    \ the popup panel, the `<rich:toolTip>` component can be useful with data iteration\
    \ components. For example, when mouse cursor is moved over a particular row cell,\
    \ more information is displayed in the tooltip about that record.\n\nOne way to\
    \ pre-render the content of the tooltip for each row is by setting `mode=\"client\"\
    `, as shown in [Listing 6-45](#Chapter06.html#list_6_45).\n\n**Listing 6-45.**\
    \ Pre-render the content of the tooltip for each row\n\n```\n<rich:dataTable id=\"\
    statesTable\"\n   value=\"#{statesBean.statesList}\" var=\"state\">\n   <h:column>\n\
    \      <f:facet name=\"header\">State</f:facet>\n      <h:outputText value=\"\
    #{state.name}\" />\n      <rich:tooltip mode=\"client\" >\n         <h:panelGrid>\n\
    \            <h:outputText value=\"#{state.name}\" style=\"font-weight:bold\"\
    />\n            <h:outputText value=\"#{state.capital}\" />\n            <h:graphicImage\
    \ value=\"#{state.flagImage}\"/>\n         </h:panelGrid>\n      </rich:tooltip>\n\
    \   </h:column>\n</rich:dataTable>\n```\n\nThis produces [Figure 6-37](#Chapter06.html#fig_6_37).\n\
    \n![images](images/0637.jpg)\n\n**Figure 6-37.** Tooltip over the table cell\n\
    \nYou are probably wondering how to show the tooltip but not pre-render it to\
    \ the client. That's definitely a good question as usage of tooltip pre-rendered\
    \ inside iteration components could also affect the performance if the tooltip\
    \ component contains complex markup and there are many rows in the iteration component,\
    \ such as table. However, nothing complicated here—you should just change the\
    \ mode to ajax and only the default facet will be pre-rendered. Tooltip content\
    \ will be loaded via Ajax when the tooltip is requested.\n\n![images](images/square.jpg)\
