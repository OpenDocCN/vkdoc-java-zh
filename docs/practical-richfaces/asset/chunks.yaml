    \ just show with particular cell information (ideally without any additional requests).\
    \ But it's not so trivial with the current version of RichFaces. There is still\
    \ no client templating feature implemented. And without that feature you will\
    \ need to update the tooltip content using custom JavaScript before showing or\
    \ updating via `ajax` anyway.\n\n### JavaScript API\n\nThe `<rich:tooltip>` component\
    \ provides the JavaScript API method described in [Table 6-7](#Chapter06.html#tab_6_7).\n\
    \n![images](images/t0607.jpg)\n\n### Summary\n\nRichFaces provides a wide range\
    \ of rich output components, from a basic panel to popups and tool tips. This\
    \ chapter showed you many different examples and tips on how to use and customize\
    \ these components. As with any RichFaces component, you can customize the look\
    \ and feel of these components with skins. [Chapter 13](#Chapter13.html#ch13)\
    \ is dedicated to skins and their customization. To see these and other components\
    \ in action, go to the RichFaces components demo application available at the\
    \ JBoss Community RichFaces web site at `www.jboss.org/richfaces`.\n\nNow that\
    \ you have learned about output components, we are going to cover data iteration\
    \ components in the next chapter.\n\n## C H A P T E R 7"
