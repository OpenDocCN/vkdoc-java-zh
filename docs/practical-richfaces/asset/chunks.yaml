- fmt: "### Using `<a4j:actionListener>`\n\n`<a4j:actionListener>` is a small upgrade\
    \ over the standard `<f:actionListener>` in JSF. Using `<a4j:actionListener>`,\
    \ it's possible to define a listener method inside a managed bean and reference\
    \ it using a standard method-binding expression, as shown in [Listing 3-63](#Chapter03.html#list_3_63).\n\
    \n***Listing 3-63.** Defining a listener method inside a managed bean*\n\n```\n\
    <a4j:commandButton value=\"Update (a4j:actionListener)\" render=\"out\">\n   <a4j:actionListener\
    \ listener=\"#{actionListenerBean.listener}\"/>\n</a4j:commandButton>\n```\n\n\
    Inside a managed bean, the listener would be defined like [Listing 3-64](#Chapter03.html#list_3_64).\n\
    \n***Listing 3-64.** Defining the listener inside the managed bean*\n\n```\npublic\
    \ void listener (ActionEvent event){\n  FacesContext.getCurrentInstance()\n  \
    \   .addMessage(null, new FacesMessage(\"a4j:actionListener - listener\n     \
    \   invoked at \"+new Date()));\n}\n```\n\nDefining the listener inside the managed\
    \ bean would give you access to other bean properties and methods.\n\n![images](images/square.jpg)\
    \ **Tip** Using the `<a4j:actionListener>` is a good way to add multiple listeners\
    \ to a component.\n\nAs you probably know, there are two ways to define an action\
    \ listener with a JSF standard `<f:actionListener>` tag. Both are a little more\
    \ complicated than using the `<a4j:actionListener>` we just showed. The first\
    \ one is using `binding`, as shown in [Listing 3-65](#Chapter03.html#list_3_65).\n\
    \n***Listing 3-65.** Define an action listener using binding*\n\n```\n<a4j:commandButton\
    \ value=\"Update (binding)\" render=\"out\">\n   <f:actionListener binding=\"\
    #{actionListenerBean.anotherListener}\"/>\n</a4j:commandButton>\n```\n\nInside\
    \ a managed bean, you need to define an inner anonymous class for this listener,\
    \ as shown in [Listing 3-66](#Chapter03.html#list_3_66). In this case, you also\
    \ get access to bean properties and methods from within the anonymous inner class.\n\
    \n***Listing 3-66.** Define an inner anonymous class for this listener*\n\n```\n\
    public ActionListener getAnotherListener () {\n   return new ActionListener (){\n\
    \      public void processAction (ActionEvent event){\n         FacesContext.getCurrentInstance()\n\
    \            .addMessage(null, new FacesMessage(\"binding - listener invoked at\n\
    \               \"+new Date()));\n         }\n      };\n}\n```\n\nThe last option,\
    \ and probably the least popular, is to implement in the interface. We will show\
    \ it to you so that you can compare all three methods. [Listing 3-67](#Chapter03.html#list_3_67)\
    \ shows the interface. Note that the class is not registered as a managed bean.\n\
    \n***Listing 3-67.** Shows the interface*\n\n```\npublic class YetAnotherListener\
    \  implements javax.faces.event.ActionListener{\n   public void processAction(ActionEvent\
    \ event) throws       AbortProcessingException {\n         FacesContext.getCurrentInstance()\n\
    \            .addMessage(null, new FacesMessage(\"Interface - listener invoked\
    \ \n                at \"+new Date()));\n      }\n}\n```\n\nUsing this on a page\
    \ is shown in [Listing 3-68](#Chapter03.html#list_3_68). Notice that we use the\
    \ `type` attribute, which takes the full class name as a string, not a value expression.\
    \ Using this approach you don't have access to properties from this page.\n\n\
    ***Listing 3-68.** Use the type attribute which takes the full class name as a\
    \ string*\n\n```\n<a4j:commandButton value=\"Update (Interface)\" render=\"out\"\
    >\n   <f:actionListener\n      type=\"org.richfaces.book.actionlistener.YetAnotherListener\"\
    />\n</a4j:commandButton>\n```\n\nNow that you have seen all three approaches,\
    \ using `<a4j:actionListener>` appears to be the most straightforward. You simply\
    \ define a listener inside a managed bean and reference it via a standard method-binding\
    \ expression.\n\n![images](images/square.jpg) **Tip** The `<a4j:actionListener>`\
    \ tag supports all `<f:actionListener>` tag attributes and features.\n\n### Summary\n\
    \nThis chapter covered some of the most important upgrades that RichFaces adds\
    \ on top of standard JSF. In this chapter we showed you additional RichFaces components\
    \ for sending an Ajax request, such as `<a4j:commandButton>`, `<a4j:commandLink>`,\
    \ `<a4j:poll>`, and `<a4j:jsFunction>`. We then covered advanced rendering options\
    \ such as using the `<a4j:outputPanel>` component and the `limitRender` attribute.\n\
    \nWhen deciding what part of the JSF view to execute, RichFaces adds another advanced\
    \ option by providing the `<a4j:region>` component. RichFaces greatly upgrades\
    \ the standard JSF queue with advanced features and flexible customization options.\
    \ As we continue the RichFaces journey in the next chapter, we are going to introduce\
    \ you to rich components or the `rich:*` tag library.\n\n## C H A P T E R  4\n\
    \n## Getting Started with Rich Components\n\nNow that we have covered RichFaces\
    \ foundation, `a4j:*` tags, advanced features, and customization, in this chapter\
    \ we are going to get started with rich components or the `rich:*` tag library.\
    \ We won't cover all the components here; we have other chapters for that. In\
    \ this chapter, we will show you the concepts and common features that all rich\
    \ components share. Some common features are using facets, components JavaScript\
    \ API, and sending Ajax requests. Once you master these concepts, you will be\
    \ able to use any rich component available today or introduced in a future RichFaces\
    \ release.\n\n### Rich or Ajax Component?\n\nIf you're asking—should I use a rich\
    \ or Ajax component?—it doesn't matter. It can be either one or even both as long\
    \ as we understand what we are talking about. Let's take an example using the\
    \ `<rich:inplaceInput>` component. The component renders as a label, as shown\
    \ in [Figure 4-1](#Chapter04.html#fig_4_1).\n\n![images](images/0401.jpg)\n\n\
    ***Figure 4-1.** `<rich:inplaceInput>` in label state*\n\nWhen clicking on the\
    \ label, the component switches to input, as shown in [Figure 4-2](#Chapter04.html#fig_4_2).\n\
    \n![images](images/0402.jpg)\n\n***Figure 4-2.** `<rich:inplaceInput>` in input\
    \ state*\n\nThis component is rich because it provides a rich UI—or a rich way\
    \ for entering input. But, at the same time, behind the scenes it's just a regular\
    \ input field. Could this also be an Ajax component? Probably yes. However, it's\
    \ important to understand that this component doesn't send an Ajax request automatically.\
    \ In other words, when changing from label to input or input to label, no Ajax\
    \ request will be sent. All the changes will only happen on the client (browser).\
    \ An even better name for this would be a rich client component. Now, don't get\
    \ discouraged, there is a way to send an Ajax request from this component and\
    \ we will show it to you later.\n\nSo, there are components in RichFaces (`rich:*`\
    \ tag library) that are rich client components, but they don't send an Ajax request.\
    \ But, there are other rich client components that do send an Ajax request. One\
    \ such example is the `<rich:tabPanel>` component. In other words, Ajax behavior\
    \ (based on some event) is built into them.\n\nNow that it's clearer what we're\
    \ exactly dealing with, let's explore the common features and concepts that rich\
    \ components share.\n\n### Rich Components Features\n\nAll rich components share\
    \ a number of common features, as follows:\n\n*   Redefining parts of a component\
    \ using facets\n*   Sending an Ajax request\n*   Using component client-side JavaScript\
    \ API\n*   Emitting client-side events (client behavior can be attached to such\
    \ events)\n*   Skins\n\n![images](images/square.jpg) **Note** Some rich components\
    \ might not have all the features. To get the most up-to-date information, visit\
    \ the RichFaces documentation page at [`www.jboss.org/richfaces/docs`](http://www.jboss.org/richfaces/docs).\n\
    \n[Chapter 13](#Chapter13.html#ch13) of this book covers skins in depth. We don't\
    \ cover the components of the other three items with the same depth. That's not\
    \ the goal here. The goal is to show you the important concepts that all rich\
    \ components share. But, again, the following chapters will cover various rich\
    \ components in more detail."
