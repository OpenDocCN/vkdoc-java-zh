    13-3](#Chapter13.html#fig_13_3). As you can see if you open the file, you have
    modified the font sizes. All RichFaces components will now inherit this look and
    feel throughout the application.  ![images](images/1303.jpg)  ***Figure 13-3.**
    Rich panel and tabs in custom skin*    ![images](images/square.jpg) **Note**  We’re
    changing only the font attributes to make it easier for you to see the difference
    on the black-and-white page.    In the previous example, you copied the whole
    skin and then modified skin parameters. An alternative way to create a custom
    skin (it’s probably also simpler), is to create a new skin and base it on any
    of the existing skins, rather than copying the whole skin file. Overwrite only
    the parameter you need. For example, the `newyork.skin.properties` file will look
