    `activeItem` 属性将设置为选定的组名。换句话说，组不仅成为项目的容器，而且成为一个更高级别的项目。    什么时候会用到这个？当展开组会更新页面上的某些部分并显示与组相关的内容时，这很有用。而当单击此组中的项目时，它将显示特定于该项目的更新内容。如果
