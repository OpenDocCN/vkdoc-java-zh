    ![images](images/0637.jpg)


    ***Figure 6-37.** Tooltip over the table cell*


    You are probably wondering how to show the tooltip but not pre-render it to the
    client. That''s definitely a good question as usage of tooltip pre-rendered inside
    iteration components could also affect the performance if the tooltip component
    contains complex markup and there are many rows in the iteration component, such
    as table. However, nothing complicated here—you should just change the mode to
    ajax and only the default facet will be pre-rendered. Tooltip content will be
    loaded via Ajax when the tooltip is requested.


    ![images](images/square.jpg) **Note** The best solution would be to define tooltip
    outside of the table and just show with particular cell information (ideally without
    any additional requests). But it''s not so trivial with the current version of
    RichFaces. There is still no client templating feature implemented. And without
    that feature you will need to update the tooltip content using custom JavaScript
    before showing or updating via `ajax` anyway.


    #### JavaScript API


    The *`<rich:tooltip>`* component provides the JavaScript API method described
    in [Table 6-7](#Chapter06.html#tab_6_7).


    ![images](images/t0607.jpg)


    ### Summary


    RichFaces provides a wide range of rich output components, from a basic panel
    to popups and tool tips. This chapter showed you many different examples and tips
    on how to use and customize these components. As with any RichFaces component,
    you can customize the look and feel of these components with skins. [Chapter 13](#Chapter13.html#ch13)
    is dedicated to skins and their customization. To see these and other components
    in action, go to the RichFaces components demo application available at the JBoss
    Community RichFaces web site at `www.jboss.org/richfaces`.


    Now that you have learned about output components, we are going to cover data
    iteration components in the next chapter.


