- fmt: "When the `Register` button is clicked, we don't want to go through all the\
    \ phases, we want to skip `Update Model` and `Invoke Application` phases. How\
    \ do we achieve that? That's where the `bypassUpdates` attribute is going to help\
    \ us and described in [Table 2-9](#Chapter02.html#tab_2_9).\n\n![Images](images/t0209.jpg)\n\
    \n[Listing 2-42](#Chapter02.html#list_2_42) shows updating the JSF page and setting\
    \ `bypassUpdates=\"true\"`.\n\n**Listing 2-42.** Updating the JSF page\n\n```\n\
    <h:form>\n   <h:panelGrid columns=\"3\">\n      <h:outputText value=\"Name:\"\
    \ />\n      <h:inputText id=\"name\" value=\"#{bean2.name}\">\n         <f:validateRequired/>\n\
    \         <f:validateLength minimum=\"3\"/>\n<a4j:ajax event=\"blur\" render=\"\
    errorName\" bypassUpdates=\"true\"/>\n      </h:inputText>\n      <h:message id=\"\
    errorName\" for=\"name\"/>\n\n      <h:outputText value=\"Age:\" />\n      <h:inputText\
    \ id=\"age\" value=\"#{bean2.age}\">\n         <f:validateRequired/>\n       \
    \  <f:validateLongRange minimum=\"0\"/>\n<a4j:ajax event=\"blur\" render=\"errorAge\"\
    \ bypassUpdates=\"true\"/>\n      </h:inputText>\n      <h:message id=\"errorAge\"\
    \ for=\"age\"/>\n   </h:panelGrid>\n   <h:commandButton value=\"Register\" action=\"\
    result\"/>\n</h:form>\n```\n\nRunning the page again and entering invalid values\
    \ causes validation to fail; and from the `Process Validations` phase we jump\
    \ to `Render Response`, as before. But, when we enter a valid value, we get the\
    \ same behavior because we set `bypassUpdates=\"true\"`. For example, entering\
    \ ‘Joe' in the name field and then clicking outside the field should allow you\
    \ to see it in the console shown in [Listing 2-43](#Chapter02.html#list_2_43).\n\
    \n**Listing 2-43.** Example of the console after entering the name field\n\n```\n\
    INFO: AFTER RESTORE_VIEW 1\nFeb 8, 2011 3:01:28 PM org.apache.catalina.core.ApplicationContext\
    \ log\nINFO: BEFORE APPLY_REQUEST_VALUES 2\nFeb 8, 2011 3:01:28 PM org.apache.catalina.core.ApplicationContext\
    \ log\nINFO: AFTER APPLY_REQUEST_VALUES 2\nFeb 8, 2011 3:01:28 PM org.apache.catalina.core.ApplicationContext\
    \ log\nINFO: BEFORE PROCESS_VALIDATIONS 3\nFeb 8, 2011 3:01:28 PM org.apache.catalina.core.ApplicationContext\
    \ log\nINFO: AFTER PROCESS_VALIDATIONS 3\nFeb 8, 2011 3:01:28 PM org.apache.catalina.core.ApplicationContext\
    \ log\nINFO: BEFORE RENDER_RESPONSE 6\nFeb 8, 2011 3:01:28 PM org.apache.catalina.core.ApplicationContext\
    \ log\nINFO: AFTER RENDER_RESPONSE 6\n```\n\nOnce we reach the `Process Validation`\
    \ phase, the component is validated and we go directly to the `Render Response`\
    \ phase. Again, there is no need to continue with the other phases because they\
    \ will be invoked when the `Register` button is clicked. So to summarize, `bypassUpdates`\
    \ is useful when doing Ajax-based validation.\n\n## JavaScript Interactions or\
    \ Callback Events\n\nFiring an Ajax request doesn't require writing any JavaScript\
    \ code. Using `<f:ajax>` or the more advanced `<a4j:ajax>` makes it possible to\
    \ fire an Ajax request from any component. However, there might be a situation\
    \ where you might want to call or inject a custom JavaScript function before or\
    \ after the Ajax request completes. JSF 2 provides two callback events, `onevent`\
    \ and `onerror`, which allow you to invoke a custom JavaScript during the Ajax\
    \ request. They are described in [Table 2-10](#Chapter02.html#tab_2_10).\n\n![Images](images/t0210.jpg)\n\
    \n`onevent` consists of three sub-events, described in [Table 2-11](#Chapter02.html#tab_2_11).\n\
    \n![Images](images/t0211.jpg)\n\nLet's start with a simple example. The application\
    \ looks like [Figure 2-5](#Chapter02.html#fig_2_5).\n\n![images](images/0205.jpg)\n\
    \n**Figure 2-5.** A simple form with different colors\n\n[Listing 2-44](#Chapter02.html#list_2_44)\
    \ shows the JSF page.\n\n**Listing 2-44.** Shows the JSF page\n\n```\n<h:form>\n\
    \   <h:panelGrid id=\"panel\" style=\"background-color: #{bean3.color}\">\n  \
    \    <h:selectOneRadio value=\"#{bean3.color}\">\n         <f:selectItem itemValue=\"\
    red\" itemLabel=\"Red\" />\n         <f:selectItem itemValue=\"yellow\" itemLabel=\"\
    Yellow\" />\n         <f:selectItem itemValue=\"blue\" itemLabel=\"Blue\" />\n\
    \         <f:ajax event=\"click\" render=\"panel\" />\n      </h:selectOneRadio>\n\
    \   </h:panelGrid>\n</h:form>\n```\n\n[Listing 2-45](#Chapter02.html#list_2_45)\
    \ shows the managed bean.\n\n**Listing 2-45.** Shows the managed bean\n\n```\n\
    @ManagedBean\n@RequestScoped\npublic class Bean3 {\n   private String color;\n\
    \n   // getter and setter\n}\n```\n\nLet's see how we can use the `onevent` callback\
    \ to add custom JavaScript to be called during the Ajax request. Keep in mind\
    \ these are client-side (browser) events. First, we need to create the JavaScript\
    \ function. We can place [Listing 2-46](#Chapter02.html#list_2_46) right after\
    \ the `<body>` tag in the JSF page.\n\n**Listing 2-46.** Creating a JavaScript\
    \ function\n\n```\n<script>\nfunction ajaxRequestListener (event){\n   if (event.status\
    \ == 'begin'){\n      if(!confirm('Are you sure you want change the color?' +\
    \ '\n         ('+event.status+')')) {\n            form.reset();\n           \
    \ return false;\n      }\n   }\n   else if (event.status == 'complete'){\n   \
    \   alert('Just before DOM update' + ' ('+event.status+')');\n   }\n   else if\
    \ (event.status == 'success'){\n        alert('Color changed. We told you so.'\
    \ + ' ('+event.status+')');\n   }\n}\n\n</script>\n```\n\nBecause the `ajaxRequestListener`\
    \ JavaScript function will be called three times, at `begin`, `complete` and `success`\
    \ points, the function has three if-statements to handle each event separately.\
    \ The only thing we are left to do is add the callback function to `<f:ajax>`\
    \ behavior, as shown in [Listing 2-47](#Chapter02.html#list_2_47).\n\n**Listing\
    \ 2-47.** Adding a callback function to `<f:ajax>` behavior\n\n```\n<h:form>\n\
    \   <h:panelGrid id=\"panel\" style=\"background-color: #{bean3.color}\">\n  \
    \    <h:selectOneRadio value=\"#{bean3.color}\">\n         <f:selectItem itemValue=\"\
    red\" itemLabel=\"Red\" />\n         <f:selectItem itemValue=\"yellow\" itemLabel=\"\
    Yellow\" />\n         <f:selectItem itemValue=\"blue\" itemLabel=\"Blue\" />\n\
    <f:ajax event=\"click\" render=\"panel\" onevent=\"ajaxRequestListener\"/>\n \
    \     </h:selectOneRadio>\n   </h:panelGrid>\n</h:form>\n```\n\n[Figure 2-6](#Chapter02.html#fig_2_6)\
    \ shows running the application and selecting a new color.\n\n![images](images/0206.jpg)\n\
    \n**Figure 2-6.** Selecting Blue color, begin sub-event\n\n[Figure 2-7](#Chapter02.html#fig_2_7)\
    \ shows the complete sub-event alert dialog.\n\n![images](images/0207.jpg)\n\n\
    **Figure 2-7.** Selecting Blue color, complete sub-event\n\n[Figure 2-8](#Chapter02.html#fig_2_8)\
    \ shows the success sub-event alert dialog.\n\n![images](images/0208.jpg)\n\n\
    **Figure 2-8.** Selecting Blue color, success sub-event"
