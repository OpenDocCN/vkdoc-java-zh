    \ above and beyond what the standard data table component provides, such as advanced\
    \ models, lazy loading, sorting, filtering, skins, and partial-table updates.\n\
    \nJSF 2 provides two components to iterate over data: `<h:dataTable>` and `<ui:repeat>`.\
    \ The `<h:dataTable>` component generates an HTML `<table>..</table>` structure.\
    \ The `<ui:repeat>` component allows you to iterate over collections wrapping\
    \ with any HTML markup. However, when displaying collections in real enterprise\
    \ applications, a simple table format is not always appropriate. You might also\
    \ need to add scrolls to your tables, implement lazy loading, selection, or columns\
    \ resizes, and order customization. Or, you might want to display various HTML\
    \ lists, such as definition, ordered, or unordered. This is where RichFaces components\
    \ come in.\n\n![images](images/square.jpg) **Note** Most screenshots in this chapter\
    \ utilize the wine skin. [Chapter 13](#Chapter13.html#ch13) covers how to change\
    \ skins.\n\nRichFaces provides the following components to display collections:\n\
    \n1. `<rich:dataTable>`\n2. `<rich:extendedDataTable>`\n3. `<rich:collapsibleSubTable>`\n\
    4. `<rich:list>`\n5. `<rich:dataGrid>`\n6. `<a4j:repeat>`\n\nAll these components\
    \ can be bound to the same data types as the standard `<h:dataTable>` component;\
    \ however, the most common object that is bound to any type of data iteration\
    \ component in simple cases is `java.util.List`. And, in more complex cases we\
    \ will show you how to use advanced RichFaces data models.\n\n## Data Preparation\n\
    \nLet’s start with the creation of the data that we will use across the examples.\
    \ You might want to take a few minutes to review it (although it’s pretty simple)\
    \ because to save space, we will not repeat it in future code listings but will\
    \ add only methods that should be added to the data bean to implement particular\
    \ functionality. That simple `List`-based model will populate information about\
    \ Olympic Games starting from 19th century. We will load the data from an XML\
    \ file by using JAXB. (Java 6 was used for this example.) [Listing 7-1](#Chapter07.html#list_7_1)\
    \ shows how the XML file looks.\n\n![images](images/square.jpg) **Tip** The Java\
    \ Architecture for XML Binding (JAXB) provides a fast and convenient way to bind\
    \ between XML schemas and Java representations, making it easy for Java developers\
    \ to incorporate XML data and processing functions in Java applications. Learn\
    \ more at [http://jaxb.java.net/](http://jaxb.java.net/). You’re free to skip\
    \ this section if not familiar with JAXB or just not interested in XML-based data\
    \ creation. Simply review the `GameDescriptor` class. Sample data in this chapter\
    \ will consist of `GameDescriptor` class inside a `java.util.List`. In general,\
    \ any Java bean with a couple of properties placed inside a list could be used\
    \ as a data model object.\n\n***Listing 7-1.** XML file*\n\n```\n<games>\n   <game>\n\
    \      <city>Athens</city>\n      <country>Greece</country>\n      <continent>Europe</continent>\n\
    \      <flag>greece_old</flag>\n      <number>1</number>\n      <season>Summer</season>\n\
    \      <fromDate>4/6/1896</fromDate>\n      <toDate>4/15/1896</toDate>\n   </game>\n\
    \n<!-- other game entries-->\n</games>\n```\n\n[Listing 7-2](#Chapter07.html#list_7_2)\
    \ shows the `GameDescriptor` object that is used to store single-game information.\n\
    \n***Listing 7-2.** `GameDescriptor` object used to store single-game information*\n\
    \n```\npublic class GameDescriptor implements Serializable {\n   private String\
    \ city;\n   private String country;\n   private String continent;\n   private\
    \ String flagName;\n   private int number;\n   private Calendar fromDate = new\
    \ GregorianCalendar(Locale.US);\n   private Calendar toDate = new GregorianCalendar(Locale.US);\n\
    \   private seasons season;\n   private statuses status = statuses.passed;\n \
    \  private enum statuses {passed, future, canceled};\nprivate enum seasons {Winter,\
    \ Summer};\n   public int getYear() {\n      return fromDate.get(Calendar.YEAR);\n\
    \   }\n   public String getFrom() {\n      if (!status.equals(statuses.canceled))\
    \ {\n         return fromDate.get(Calendar.DAY_OF_MONTH) + \" \"\n           \
    \ + fromDate.getDisplayName(Calendar.MONTH, Calendar.LONG, Locale.US);\n     \
    \ } else return \"\";\n   }\n   public String getTo() {\n      if (!status.equals(statuses.canceled))\
    \ {\n         return toDate.get(Calendar.DAY_OF_MONTH) + \" \"\n            +\
    \ toDate.getDisplayName(Calendar.MONTH, Calendar.LONG, Locale.US);\n      } else\
    \ return \"\";\n   }\n   public String getFlagURI() {\n      return \"/images/flags/\"\
    \ + flagName + \".png\";\n   }\n   @XmlElement\n   public String getCity() {\n\
    \      return city;\n   }\n   // Getters and setters\n}\n```\n\nAs it mentioned,\
    \ `JAXB` is used in the example to parse XML and create `GameDescriptor` objects.\
    \ Note that all getters are marked with an `@XmlElement` annotation, such as `getCity`,\
