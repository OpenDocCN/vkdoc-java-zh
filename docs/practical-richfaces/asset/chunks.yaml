    ##### Using the Popup Panel to Show Status


    Another common usage for the popup panel is to show some operation status. Because
    the modal popup panel will block the underlying view, the user can''t click any
    other buttons or links while the current operation is executed. The basic idea
    is that you click some function and a panel is shown. On completion of the operation,
    the panel is hidden. You are also going to use *`<a4j:status>`* to help with this.
    *`<a4j:status>`* will actually show and hide the popup panel. [Listing 6-38](#Chapter06.html#list_6_38)
    shows the page code.


    ***Listing 6-38.** Using* `<a4j:status>`


    `<h:form>`

    `   <a4j:commandButton actionListener="#{bean.calculate}" value="Calculate" />`

    `</h:form>`

    `<rich:popupPanel id="mp" style="text-align:center">`

    `   <h:outputText value="Please wait..." style="font-weight:bold;font-`

    `      size:large" />`

    `</rich:popupPanel>`

    `<a4j:status id="actionStatus"`

    `   onstart="#{rich:component(''mp'')}.show('''',{height:''80'', width:''150''})"`

    `   onstop="#{rich:component(''mp'')}.hide()" />`


    The `calculate()` method (which causes some long-running processing) will be defined,
    as shown in [Listing 6-39](#Chapter06.html#list_6_39).


    ***Listing 6-39.** `calculate()` method*


    `@ManagedBean`

    `@RequestScoped`

    `public class Bean {`

    `   public void calculate(ActionEvent event){`

    `      // some long running calculations or this for testing:`

    `      try {`


    `          Thread.sleep(3000);`


    `        } catch (InterruptedException e) {`


    `           e.printStackTrace();`


    `        }`

    `   }`

    `}`


    [Figure 6-32](#Chapter06.html#fig_6_32) shows the result.


    ![images](images/0632.jpg)


    ***Figure 6-32.** Popup panel used as blocking operation status window*


    When the button is clicked, the *`#{bean.calculate}`* listener is invoked. Let''s
    assume it takes a few seconds to complete (you can put the current thread to sleep
    for a few seconds if you are testing). You know from before that you can use *`<a4j:status>`*
    to display any content while the Ajax request is being processed. In this example
    facets are not defined, but we are using *`<a4j:status>`*''s *`start`* and *`stop`*
    events to show and hide the popup panel. Again *`#{rich:component(id)}`* is the
    RichFaces client EL function that allows you to call the JavaScript API on the
    referenced component. That''s exactly what the example does. On the request start,
    you call *`show()`* on the popup panel. When the request has been completed (*`onstop`*
    event handler called), you call *`hide()`* on the popup panel.'
