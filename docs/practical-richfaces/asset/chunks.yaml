- fmt: "# 排版后的内容\n\nLet’s review what we added to the code. The most important part\
    \ is the `render` defined in the `<a4j:commandButton>`. It consists of a table\
    \ id (`table`), a `@rows()` function, and a discount component id (`discount`),\
    \ all separated with a naming container separator character (usually “:” although\
    \ it could be configured per application, so be careful there). The `updatedItems`\
    \ will be resolved to the rows id in which to update the `discount` component\
    \ id. You might be wondering why the special `@rows()` syntax is used. We can’t\
    \ really use the standard EL, such as `#{rows()}`, because it would only give\
    \ us a single string representation after evaluation. What was needed in our case\
    \ was to have set of ids for render. And that specific function usage does the\
    \ trick.\n\n![images](images/square.jpg) **Tip** You don’t deal with client ids\
    \ or containers ids when performing partial table updates. RichFaces makes it\
    \ very simple by letting you define everything with just component ids and row\
    \ keys.\n\nNow let’s look at the `addDiscount` method and `updatedItems` list\
    \ in [Listing 7-30](#Chapter07.html#list_7_30), which hold row keys from `SalesReport`.\n\
    \n***Listing 7-30.** `addDiscount` method and `updatedItems` list*\n\n```\nprivate\
    \ List<Integer> updatedItems = new ArrayList<Integer>();\npublic void addDiscounts()\
    \ {\n   for (SalesItem item : items) {\n      if (item.getProposedGrossMargin()\
    \ < 0) {\n         item.setDiscount(0.2);\n         updatedItems.add(items.indexOf(item));\n\
    \      }\n   }\n}\n// Getters and setters\n```\n\nHere we simply iterate over\
    \ the model and are looking for objects with the negative `proposedGrossMargin`\
    \ value. Then we add a discount to that object and put its `rowKey` in the `updatedItems`\
    \ list. Note that for our simple, list-based model, `rowKey` will be equal to\
    \ the index in the list. For more complex models (with filtering/sorting and so\
    \ on) you should not return the index in the original collection, but with a separate\
    \ object `rowKey`. We will cover this later in the chapter. When running this,\
    \ we see only two components updated, as shown in [Figure 7-22](#Chapter07.html#fig_7_22).\n\
    \n![images](images/0722.jpg)\n\n***Figure 7-22.** Using partial-table update to\
    \ update a set of rows*\n\nBoth of the features we just described—updating components\
    \ within the same row and updating components within a set of rows—works for any\
    \ RichFaces iteration component, including base `<a4j:repeat>`.\n\nThere is another\
    \ very handy partial-table update feature that RichFaces provides that allows\
    \ you to update only the header, footer, or table body. To do this, RichFaces\
    \ provides three pre-defined values: `@body`, `@header`, and `@footer`. They are\
