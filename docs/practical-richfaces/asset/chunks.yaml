    11-8.** Changing those <span> element display properties to be list-items*  `<style>`
    `.rf-msgs-err{` `   display:list-item;` `   margin-left:20px;` `   padding-left:0px;`
    `   background-image:none;` `}` `</style>` `<h:form>` `   <rich:messages/>` `   <h:panelGrid
    columns="2">` `      <h:outputText value="Name:" />` `      <h:inputText label="Name"
    id="name" required="true">` `         <f:validateLength minimum="3" />` `      </h:inputText>`
    `      <h:outputText value="Job:" />` `      <h:inputText label="Job" id="job"
    required="true">` `         <f:validateLength minimum="3" maximum="50" />` `      </h:inputText>`
    `      <f:facet name="footer">` `         <a4j:commandButton value="Ajax Validate"/>`
    `      </f:facet>` `   </h:panelGrid>` `</h:form>`   On the page there are two
    inputs with some validation applied using JSF tags, and an Ajax button, which
    validates the form and the `<rich:messages>` components.    Notice that we added
