- fmt: "### Programmatic Ajax in JSF 2\n\nJSF 2 does offer a way to send an Ajax request\
    \ programmatically from the client (available request parameters for sending Ajax\
    \ request programmatically are listed in [Table 3-2](#Chapter03.html#tab_3_2)).\
    \ In order to do it, we first need to load the JavaScript library shown in [Listing\
    \ 3-22](#Chapter03.html#list_3_22). (When using the `<f:ajax>` behavior, or any\
    \ RichFaces tag, JavaScript libraries are loaded automatically.)\n\n***Listing\
    \ 3-22.** Loading the JavaScript library*\n\n```\n<h:head>\n   <h:outputScript\
    \ name=\"jsf.js\" library=\"javax.faces\"/>\n<h:/head>\n```\n\nFiring an Ajax\
    \ request would look like [Listing 3-23](#Chapter03.html#list_3_23).\n\n***Listing\
    \ 3-23.** Firing an Ajax request*\n\n```\n<h:form id=\"form\">\n   <h:panelGrid>\n\
    \      <h:commandButton id=\"button\" value=\"Update\"\n         onclick=\"jsf.ajax.request(this,event,\
    \ {render:'form:out'}); return false;\" />\n      <h:outputText value=\"#{manualAjax.now}\"\
    \ id=\"out\" />\n   </h:panelGrid>\n</h:form>\n```\n\n![images](images/t0302.jpg)\n\
    \n![images](images/square.jpg) **Note** `render` has to point to a client id,\
    \ not a component id.\n\n[Listing 3-24](#Chapter03.html#list_3_24) shows another\
    \ example using `<h:inputText>`.\n\n***Listing 3-24.** Example using `<h:inputText>`*\n\
    \n```\n<h:form id=\"form2\">\n   <h:panelGrid>\n      <h:inputText value=\"#{manualAjax.text}\"\
    \n         onkeyup=\"jsf.ajax.request(this, event, {render:'form2:out'});\n  \
    \          return false;\" />\n      <h:outputText value=\"#{manualAjax.text}\"\
    \ id=\"out\" />\n   </h:panelGrid>\n</h:form>\n```\n\nWe believe it's simpler\
    \ to use `<a4j:jsFunction>` because you don't have to manually write any JavaScript\
    \ code and you get all the extra features and functionality that are also available\
    \ in `a4j:ajax` behavior.\n\nThe following Ajax attributes are available to use\
    \ with `<a4j:jsFunction>`: `onbegin`, `onbeforedomupdate`, `oncomplete`, `bypassUpdates`,\
    \ `limitRender`, `data`, and `status`.\n\n`<a4j:jsFunction>` might look like a\
    \ very simplistic tag. Although it's simple to use, it's actually very powerful.\
    \ Like any JSF component that exposes client events (almost all components do),\
    \ `<a4j:jsFunction>` can be used with those events to fire an Ajax request. Take\
    \ any HTML tag and `<a4j:jsFunction>` can be used to fire an Ajax request based\
    \ on some tag event. In theory, anywhere `<a4j:ajax>` is used, `<a4j:jsFunction>`\
    \ can replace it because when the markup is rendered, the JavaScript that `<a4j:ajax>`\
    \ renders is very similar to what `<a4j:jsFunction>` renders. You can look at\
    \ `<a4j:jsFunction>` as a lower level or foundation tag for all Ajax firing tags\
    \ and behaviors.\n\n### Polling with `<a4j:poll>`\n\n`<a4j:poll>` works in an\
    \ almost identical fashion to all the other action components we have discussed,\
    \ but instead of having to click or type something to send a request, the component\
    \ will periodically send (poll) an Ajax request to the server. You can easily\
    \ specify which components to update via the `render` attribute and which `action`\
    \ or `actionListener` to invoke. All the core Ajax concepts we covered so far\
    \ apply to this component as well. Let's walk through an example where you see\
    \ the server time running. You will also be able to stop and start the clock.\n\
    \nWhen the page is loaded, the application will look as shown in [Figure 3-2](#Chapter03.html#fig_3_2).\n\
    \n![images](images/0302.jpg)\n\n***Figure 3-2.** Using `<a4j:poll>`*\n\nWhen the\
    \ page is loaded for the first time, the clock is off. You can then use the buttons\
    \ to start or stop the clock. Before we start, it's important to keep in mind\
    \ that the default value for `execute` is `@this` when using the `<a4j:poll>`\
    \ component.\n\n[Listing 3-25](#Chapter03.html#list_3_25) shows the JSF page.\n\
    \n***Listing 3-25.** Shows the JSF page*\n\n```\n<h:form>\n   <a4j:poll id=\"\
    poll\" interval=\"500\" enabled=\"#{clockBean.enabled}\"\n      render=\"clock\"\
    \ />\n   <h:panelGrid columns=\"2\">\n      <h:panelGrid columns=\"2\">\n    \
    \     <a4j:commandButton value=\"Start Clock\"\n            action=\"#{clockBean.startClock}\"\
    \n            render=\"poll\" />\n         <a4j:commandButton value=\"Stop Clock\"\
    \n            action=\"#{clockBean.stopClock}\"\n            render=\"poll\" />\n\
    \      </h:panelGrid>\n      <h:outputText id=\"clock\" value=\"#{clockBean.now}\"\
    \ />\n   </h:panelGrid>\n</h:form>\n```\n\nIt has a couple of important attributes:\
    \ `interval` defines how often a request will be sent to the server (in milliseconds),\
    \ and `enabled` determines whether the component will send a request depending\
    \ on whether it's set to `true` or `false`. You need to be able to stop or start\
    \ the polling when some condition happens.\n\nWhen the page is loaded for the\
    \ first time, `enabled` is evaluated to `false`, and thus the poll is disabled.\
    \ When the Start Clock button is clicked, the `startClock` method will set `enabled`\
    \ to `true`, which enables the polling. `<a4j:poll>` polls the server every 500\
    \ milliseconds (half a second) and updates the component that displays the time.\
    \ When the Stop Clock button is clicked, `enabled` is set to `false`, which disables\
    \ the polling.\n\nWhenever you enable or disable the component in runtime, you\
    \ need to render the component. This is needed so the new value for `enabled`\
    \ is read and the JavaScript is updated in the browser to either start or stop\
    \ polling.\n\nAlso notice we place `<a4j:poll>` inside the same form as the buttons.\
    \ Placing `<a4j:poll>` inside the same form is fine because by default its `execute`\
    \ is set to `@this`. Even if we had other input component inside the form, they\
    \ would be sent to the server but they wouldn't be processed on the server. You\
    \ could place `<a4j:poll>` inside its own form and submit less data to the server.\
    \ Our example is rather simple, and although `<a4j:poll>` can be placed in the\
    \ same form, the concept can be applied to a larger application.\n\n[Listing 3-26](#Chapter03.html#list_3_26)\
    \ shows the managed bean.\n\n***Listing 3-26.** The managed bean*\n\n```\n@ManagedBean\n\
    @RequestScoped\npublic class ClockBean {\n\n   private boolean enabled; // getter\
    \ and setter\n\n   public java.util.Date getNow() {\n      return new java.util.Date();\n\
    \   }\n   public void stopClock() {\n      enabled = false;\n   }\n   public void\
    \ startClock() {\n      enabled = true;\n   }\n}\n```\n\nThe following Ajax attributes\
    \ are available to use with `<a4j:poll>`: `onbegin`, `onbeforedomupdate`, `oncomplete`,\
    \ `bypassUpdates`, `limitRender`, `data`, and `status`.\n\n### Advanced Partial\
    \ View Rendering Options\n\nIn this section you are going to learn about advanced\
    \ rendering features available in RichFaces. We will first cover the auto-rendered\
    \ panel—whose content is automatically rendered on any Ajax request—and then show\
    \ you how to limit rendering to only components shown in the current `render`\
    \ attribute."
  raw: '##### Programmatic Ajax in JSF 2


    JSF 2 does offer a way to send an Ajax request programmatically from the client
    (available request parameters for sending Ajax request programmatically are listed
    in [Table 3-2](#Chapter03.html#tab_3_2)). In order to do it, we first need to
    load the JavaScript library shown in [Listing 3-22](#Chapter03.html#list_3_22).
    (When using the `<f:ajax>` behavior, or any RichFaces tag, JavaScript libraries
    are loaded automatically.)


    ***Listing 3-22.** Loading the JavaScript library*


    `<h:head>`

    `   <h:outputScript name="jsf.js" library="javax.faces"/>`

    `<h:/head>`


    Firing an Ajax request would look like [Listing 3-23](#Chapter03.html#list_3_23).


    ***Listing 3-23.** Firing an Ajax request*


    `<h:form id="form">`

    `   <h:panelGrid>`

    `      <h:commandButton id="button" value="Update"`

    `         onclick="jsf.ajax.request(this,event, {render:''form:out''}); return
    false;" />`

    `      <h:outputText value="#{manualAjax.now}" id="out" />`

    `   </h:panelGrid>`

    `</h:form>`


    ![images](images/t0302.jpg)


    ![images](images/square.jpg) **Note** `render` has to point to a client id, not
    a component id.


    [Listing 3-24](#Chapter03.html#list_3_24) shows another example using `<h:inputText>`.


    ***Listing 3-24.** Example using `<h:inputText>`*


    `<h:form id="form2">`

    `   <h:panelGrid>`

    `      <h:inputText value="#{manualAjax.text}"`

    `         onkeyup="jsf.ajax.request(this, event, {render:''form2:out''});`

    `            return false;" />`

    `      <h:outputText value="#{manualAjax.text}" id="out" />`

    `   </h:panelGrid>`

    `</h:form>`


    We believe it''s simpler to use `<a4j:jsFuction>` because you don''t have to manually
    write any JavaScript code and you get all the extra features and functionality
    that are also available in `a4j:ajax` behavior.


    The following Ajax attributes are available to use with `<a4j:jsFunction>`: `onbegin`,
    `onbeforedomupdate`, `oncomplete`, `bypassUpdates`, and `limitRender`, `data`,
    and `status`.


    `<a4j:jsFunction>` might look like a very simplistic tag. Although it''s simple
    to use, it''s actually very powerful. Like any JSF component that exposes client
    events (almost all components do), `<a4j:jsFunction>` can be used with those events
    to fire an Ajax request. Take any HTML tag and `<a4j:jsFunction>` can be used
    to fire an Ajax request based on some tag event. In theory, anywhere `<a4j:ajax>`
    is used, `<a4j:jsFunction>` can replace it because when the markup is rendered,
    the JavaScript that `<a4:ajax>` renders is very similar to what `<a4j:jsFunction>`
    renders. You can look at `<a4j:jsFuction>` as a lower level or foundation tag
    for all Ajax firing tags and behaviors.


    #### Polling with <a4j:poll>


    `<a4j:poll>` works in an almost identical fashion to all the other action components
    we have discussed, but instead of having to click or type something to send a
    request, the component will periodically send (poll) an Ajax request to the server.
    You can easily specify which components to update via the `render` attribute and
    which `action` or `actionListener` to invoke. All the core Ajax concepts we covered
    so far apply to this component as well. Let''s walk through an example where you
    see the server time running. You will also be able to stop and start the clock.


    When the page is loaded, the application will look as shown in [Figure 3-2](#Chapter03.html#fig_3_2).


    ![images](images/0302.jpg)


    ***Figure 3-2.** Using <a4j:poll>*


    When the page is loaded for the first time, the clock is off. You can then use
    the buttons to start or stop the clock. Before we start, it''s important to keep
    in mind that the default value for `execute` is `@this` when using the `<a4j:poll>`
    component.


    [Listing 3-25](#Chapter03.html#list_3_25) shows the JSF page.


    ***Listing 3-25.** Shows the JSF page*


    `<h:form>`

    `   <a4j:poll id="poll" interval="500" enabled="#{clockBean.enabled}"`

    `      render="clock" />`

    `   <h:panelGrid columns="2">`

    `      <h:panelGrid columns="2">`

    `         <a4j:commandButton value="Start Clock"`

    `            action="#{clockBean.startClock}"`

    `            render="poll" />`

    `         <a4j:commandButton value="Stop Clock"`

    `            action="#{clockBean.stopClock}"`

    `            render="poll" />`

    `      </h:panelGrid>`

    `      <h:outputText id="clock" value="#{clockBean.now}" />`

    `   </h:panelGrid>`

    `</h:form>`


    It has a couple of important attributes: `interval` defines how often a request
    will be sent to the server (in milliseconds), and `enabled` determines whether
    the component will send a request depending on whether it''s set to `true` or
    `false`. You need to be able to stop or start the polling when some condition
    happens.


    When the page is loaded for the first time, `enabled` is evaluated to `false`,
    and thus the poll is disabled. When the Start Clock button is clicked, the `startClock`
    method will set `enabled` to `true`, which enables the polling. `<a4j:poll>` polls
    the server every 500 milliseconds (half a second) and updates the component that
    displays the time. When the Stop Clock button is clicked, `enabled` is set to
    `false`, which disables the polling.


    Whenever you enable or disable the component in runtime, you need to render the
    component. This is needed so the new value for enabled is read and the JavaScript
    is updated in the browser to either start or stop polling.


    Also notice we place `<a4j:poll>` inside the same form as the buttons. Placing
    `<a4j:poll>` inside the same form is fine because by default its execute is set
    to `@this`. Even if we had other input component inside the form, they would be
    sent to the server but they wouldn''t be processed on the server. You could place
    `<a4j:poll>` inside its own form and submit less data to the server. Our example
    is rather simple, and although `<a4j:poll>` can be placed in the same form, the
    concept can be applied to a larger application.


    [Listing 3-26](#Chapter03.html#list_3_26) shows the managed bean.


    ***Listing 3-26.** The managed bean*


    `@ManagedBean`

    `@RequestScoped`

    `public class ClockBean {`


    `   private boolean enabled; // getter and setter`


    `   public java.util.Date getNow() {`

    `      return new java.util.Date();`

    `   }`

    `   public void stopClock() {`

    `      enabled = false;`

    `   }`

    `   public void startClock() {`

    `      enabled = true;`

    `   }`

    `}`


    The following Ajax attributes are available to use with `<a4j:poll>`: `onbegin`,
    `onbeforedomupdate`, `oncomplete`, `bypassUpdates`, and `limitRender`, `data`,
    and `status`.


    ### Advanced Partial View Rendering Options


    In this section you are going to learn about advanced rendering features available
    in RichFaces. We will first cover the auto-rendered panel—whose content is automatically
    rendered on any Ajax request—and then show you how to limit rendering to only
    components shown in the current `render` attribute.'
