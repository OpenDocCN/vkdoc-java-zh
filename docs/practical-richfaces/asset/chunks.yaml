  raw: '#### Using Complex Markup in <rich:autocomplete> Pop-ups


    The `<rich:autocomplete>` examples we have shown you so far used a simple list
    of strings in the pop-up as suggestions for user input. In general, you''re free
    to use any custom objects for suggestions. In that case the component should be
    defined with the pop-up list representation and the property of the custom object,
    which should actually be inserted into the input when that object is selected.


    Let''s look at an example using custom objects and start with a managed bean,
    shown in [Listing 5-14](#Chapter05.html#list_5_14).


    ***Listing 5-14.** An example using custom objects*


