- fmt: "### Using `<rich:inputNumberSlider>`\n\n`<rich:inputNumberSlider>` renders\
    \ a slider for inputting a number, as shown in [Figure 5-21](#Chapter05.html#fig_5_21).\n\
    \n![images](images/0521.jpg)\n\n***Figure 5-21.** `<rich:inputNumberSlider>` component*\n\
    \nThe code is rather simple, that's all you need to render the component.\n\n\
    ```\n<rich:inputNumberSlider value=\"#{inputNumberBean.numberOfItems}\" />\n```\n\
    \nThe `InputNumberBean` code is rather simple and contains just the single integer\
    \ property with getter and setter, so it's omitted.\n\nAs this is basically just\
    \ a rich input field, all the standard JSF rules, such as conversion/validation\
    \ and event handling, apply to this component.\n\nThe component provides a number\
    \ of rich features. You can easily set the minimum or maximum values, as well\
    \ as the step value shown in [Figure 5-22](#Chapter05.html#fig_5_22) (the amount\
    \ by which the value will be increased or decreased when the handle is dragged).\n\
    \n![images](images/0522.jpg)\n\n***Figure 5-22.** `<rich:inputNumberSlider>` with\
    \ custom boundary values*\n\n[Listing 5-21](#Chapter05.html#list_5_21) shows the\
    \ component configured with the minimum and maximum value, as well as the step\
    \ size.\n\n***Listing 5-21.** Shows the component configured with minimum and\
    \ maximum value*\n\n```\n<rich:inputNumberSlider value=\"#{inputNumberBean.numberOfItems}\"\
    \n   minValue=\"0\"\n   maxValue=\"500\"\n   step=\"2\"/>\n```\n\nIn order to\
    \ disable manual input, set the `enableManualInput` attribute to `false`. This\
    \ will force the user to use the component slider to set the value. [Figure 5-23](#Chapter05.html#fig_5_23)\
    \ shows the result.\n\n![images](images/0523.jpg)\n\n***Figure 5-23.** `<rich:inputNumberSlider>`\
    \ with manual input disabled*\n\n[Listing 5-22](#Chapter05.html#list_5_22) shows\
    \ the component with the disabled manual input.\n\n***Listing 5-22.** Shows the\
    \ component with the disabled manual input*\n\n```\n<rich:inputNumberSlider value=\"\
    #{inputNumberBean.numberOfItems}\"\n   minValue=\"0\"\n   maxValue=\"500\"\n \
    \  step=\"2\"\n   enableManualInput=\"false\"/>\n```\n\nTo place the input field\
    \ on the left side, set the `inputPosition` attribute, as shown in [Figure 5-24](#Chapter05.html#fig_5_24).\n\
    \n![images](images/0524.jpg)\n\n***Figure 5-24.** `<rich:inputNumberSlider>` with\
    \ input shown on the left*\n\n[Listing 5-23](#Chapter05.html#list_5_23) shows\
    \ the code to position the input on the left.\n\n***Listing 5-23.** Shows the\
    \ code to position the input*\n\n```\n<rich:inputNumberSlider value=\"#{inputNumberBean.numberOfItems}\"\
    \n   minValue=\"0\"\n   maxValue=\"500\"\n   step=\"2\"\n   inputPosition=\"left\"\
    />\n```\n\nThe default value is `right`. To hide the input field completely, set\
    \ `showInput=\"false\"` as shown in [Listing 5-24](#Chapter05.html#list_5_24).\n\
    \n***Listing 5-24.** Hiding the input field completely*\n\n```\n<rich:inputNumberSlider\
    \ value=\"#{inputNumberBean.numberOfItems}\"\n   minValue=\"0\"\n   maxValue=\"\
    500\"\n   step=\"2\"\n   showInput=\"false\"/>\n```\n\n[Figure 5-25](#Chapter05.html#fig_5_25)\
    \ shows the component with the input field hidden.\n\n![images](images/0525.jpg)\n\
    \n***Figure 5-25.** `<rich:inputNumberSlider>` with input not displayed*\n\nIn\
    \ order to add additional arrow controls on the slider sides, use the `showArrows`\
    \ attribute, as shown in [Listing 5-25](#Chapter05.html#list_5_25).\n\n***Listing\
    \ 5-25.** Using the `showArrows` attribute*\n\n```\n<rich:inputNumberSlider value=\"\
    #{inputNumberBean.numberOfItems}\"\n   minValue=\"0\" maxValue=\"500\"\n   step=\"\
    2\" showArrows=\"true\"/>\n```\n\n[Figure 5-26](#Chapter05.html#fig_5_26) shows\
    \ the result.\n\n![images](images/0526.jpg)\n\n***Figure 5-26.** `<rich:inputNumberSlider>`\
    \ with additional arrows next to boundary values*\n\nOther attributes, such as\
    \ `showBoundaryValues`, determine whether the minimum/maximum values are shown.\
    \ If set to `false`, `showToolTip` will not display a tooltip when the handle\
    \ is dragged. The tooltip shows the current value of the component when dragged.\n\
    \nAs with any other input, `<rich:inputNumberSlider>` provides a `disabled` attribute\
    \ that allows disabling the component according to some permissions and so on.\
    \ [Figure 5-27](#Chapter05.html#fig_5_27) shows how a disabled component looks.\n\
    \n![images](images/0527.jpg)\n\n***Figure 5-27.** `<rich:inputNumberSlider>` with\
    \ manual input disabled*\n\n#### JavaScript API\n\n[Table 5-6](#Chapter05.html#tab_5_6)\
    \ shows the component JavaScript API.\n\n![images](images/t0506.jpg)\n\n### Using\
    \ `<rich_inputnumberspinner>`\n\n`<rich_inputnumberspinner>` provides a familiar\
    \ input field, but it renders a slider with up and down arrows to increase or\
    \ decrease the value, as shown in [Figure 5-28](#Chapter05.html#fig_5_28).\n\n\
    ![images](images/0528.jpg)\n\n***Figure 5-28.** `<rich_inputnumberspinner>` component*\n\
    \nThe code is rather simple again; that's all you need to do to render the `<rich:inplaceNumberSpinner>`\
    \ component.\n\n```\n<rich_inputnumberspinner value=\"#{inputNumberBean.numberOfItems}\"\
    />\n```\n\n[Listing 5-26](#Chapter05.html#list_5_26) shows that similar attributes\
    \ exist on `<rich_inputnumberspinner>` as on `<rich:inputNumberSlider>`.\n\n***Listing\
    \ 5-26.** Shows that similar attributes exist*\n\n```\n<rich_inputnumberspinner\
    \ value=\"#{inputNumberBean.numberOfItems}\"\n   maxValue=\"500\"\n   minValue=\"\
    0\"\n   step=\"5\"\n   enableManualInput=\"false\"/>\n```\n\nYou can set the minimum\
    \ and maximum values, set the step size, and disable manual input.\n\nOne other\
    \ attribute available on this component is `cycled`. While set to `true`, when\
    \ the value reaches one of the boundaries (minimum/maximum), it will be set to\
    \ the next boundary or reversed.\n\n#### JavaScript API\n\n[Table 5-7](#Chapter05.html#tab_5_7)\
    \ shows the JavaScript API available on this component.\n\n![images](images/t0507.jpg)\n\
    \n### Using `<rich_calendar>`\n\nThe calendar component allows you to select the\
    \ date and time values either inline or via a pop-up menu.\n\n```\n<rich_calendar\
    \ value=\"#{calendarBean.today}\"\n   datePattern=\"dd/M/yy HH:mm:ss\"/>\n```\n\
    \nWhere `#{calendarBean.today}` is of type `java.util.Date` with getter and setter\
    \ methods.\n\n![images](images/square.jpg) **Note** Calendar allows a value to\
    \ be bound to different types of objects: `String`, `Date`, `GregorianCalendar`.\
    \ It will convert the current value automatically depending on the type of value,\
    \ or you could add a custom converter for custom date types.\n\n[Figure 5-29](#Chapter05.html#fig_5_29)\
    \ shows an example of selecting a date. Note that by default the calendar is rendered\
    \ with an input field. When activated, the calendar is shown in a pop-up.\n\n\
    ![images](images/0529.jpg)\n\n***Figure 5-29.** `<rich_calendar>` component*\n\
    \n[Figure 5-30](#Chapter05.html#fig_5_30) shows an example of how the month selection\
    \ works.\n\n![images](images/0530.jpg)\n\n***Figure 5-30.** Month selection with\
    \ `<rich_calendar>`*\n\n[Figure 5-31](#Chapter05.html#fig_5_31) shows an example\
    \ of selecting time.\n\n![images](images/0531.jpg)\n\n***Figure 5-31.** Time selection\
    \ with `<rich_calendar>`*\n\n![images](images/square.jpg) **Note** The time selection\
    \ turns on automatically when the pattern for calendar contains time. If it contains\
    \ only the date, time controls will not appear.\n\nAll the examples shown so far\
    \ in the calendar are pop-ups. [Figure 5-32](#Chapter05.html#fig_5_32) shows an\
    \ inline calendar.\n\n![images](images/0532.jpg)\n\n***Figure 5-32.** `<rich_calendar>`\
    \ shown as rendered inline*\n\nAs you see in [Figure 5-32](#Chapter05.html#fig_5_32),\
    \ the calendar has the same look and feel, but no input field is displayed. [Listing\
    \ 5-27](#Chapter05.html#list_5_27) shows the component code to render an inline\
    \ calendar.\n\n***Listing 5-27.** Shows the component code to render an inline\
    \ calendar*\n\n```\n<rich_calendar value=\"#{calendarBean.today}\"\n   datePattern=\"\
    dd/M/yy hh:mm:a\" popup=\"false\"/>\n```"
  raw: '### Using <rich:inputNumberSlider>


    `<rich:inputNumberSlider>` renders a slider for inputting a number, as shown in
    [Figure 5-21](#Chapter05.html#fig_5_21).


    ![images](images/0521.jpg)


    ***Figure 5-21.** <rich:inputNumberSlider> component*


    The code is rather simple, that''s all you need to render the component.


    `<rich:inputNumberSlider value="#{inputNumberBean.numberOfItems}" />`


    The `InputNumberBean` code is rather simple and contains just the single integer
    property with getter and setter, so it''s omitted.


    As this is basically just a rich input field, all the standard JSF rules, such
    as conversion/validation and event handling, apply to this component.


    The component provides a number of rich features. You can easily set the minimum
    or maximum values, as well as the step value shown in [Figure 5-22](#Chapter05.html#fig_5_22)
    (the amount by which the value will be increased or decreased when the handle
    is dragged).


    ![images](images/0522.jpg)


    ***Figure 5-22.** <rich:inputNumberSlider> with custom boundary values*


    [Listing 5-21](#Chapter05.html#list_5_21) shows the component configured with
    the minimum and maximum value, as well as the step size.


    ***Listing 5-21.** Shows the component configured with minimum and maximum value*


    `<rich:inputNumberSlider value="#{inputNumberBean.numberOfItems}"`

    ***`minValue="0"`***

    ***`maxValue="500"`***

    ***`step="2"`***`/>`


    In order to disable manual input, set the `enableManualInput` attribute to `false`.
    This will force the user to use the component slider to set the value. [Figure
    5-23](#Chapter05.html#fig_5_23) shows the result.


    ![images](images/0523.jpg)


    ***Figure 5-23.** <rich:inputNumberSlider> with manual input disabled*


    [Listing 5-22](#Chapter05.html#list_5_22) shows the component with the disabled
    manual input.


    ***Listing 5-22.** Shows the component with the disabled manual input*


    `<rich:inputNumberSlider value="#{inputNumberBean.numberOfItems}"`

    `   minValue="0"`

    `   maxValue="500"`

    `   step="2"`

    ***`enableManualInput="false"`***`/>`


    To place the input field on the left side, set the `inputPosition` attribute,
    as shown in [Figure 5-24](#Chapter05.html#fig_5_24).


    ![images](images/0524.jpg)


    ***Figure 5-24.** <rich:inputNumberSlider> with input shown on the left*


    [Listing 5-23](#Chapter05.html#list_5_23) shows the code to position the input
    on the left.


    ***Listing 5-23.** Shows the code to position the input*


    `<rich:inputNumberSlider value="#{inputNumberBean.numberOfItems}"`

    `   minValue="0"`

    `   maxValue="500"`

    `   step="2"`

    ***`inputPosition="left"/`***`>`


    The default value is `right`. To hide the input field completely, set `showInput="false"`
    as shown in [Listing 5-24](#Chapter05.html#list_5_24).


    ***Listing 5-24.**Hiding the input field completely*


    `<rich:inputNumberSlider value="#{inputNumberBean.numberOfItems}"`

    `   minValue="0"`

    `   maxValue="500"`

    `   step="2"`

    **`showInput="false"/>`**


    [Figure 5-25](#Chapter05.html#fig_5_25) shows the component with the input field
    hidden.


    ![images](images/0525.jpg)


    ***Figure 5-25.** <rich:inputNumberSlider> with input not displayed*


    In order to add additional arrow controls on the slider sides, use the `showArrows`
    attribute, as shown in [Listing 5-25](#Chapter05.html#list_5_25).


    ***Listing 5-25.** Using the showArrows attribute*


    `<rich:inputNumberSlider value="#{inputNumberBean.numberOfItems}"`

    `   minValue="0" maxValue="500"`

    `step="2"` ***`showArrows="true"`*** `/>`


    [Figure 5-26](#Chapter05.html#fig_5_26) shows the result.


    ![images](images/0526.jpg)


    ***Figure 5-26.** <rich:inputNumberSlider> with additional arrows next to boundary
    values*


    Other attributes, such as `showBoundaryValues`, determine whether the minimum/maximum
    values are shown. If set to `false`, `showToolTip` will not display a tooltip
    when the handle is dragged. The tooltip shows the current value of the component
    when dragged.


    As with any other input, `<rich:inputNumberSlider>` provides `disabled` attribute
    that allows a disabling component according to some permissions and so on. [Figure
    5-27](#Chapter05.html#fig_5_27) shows how a disabled component looks.


    ![images](images/0527.jpg)


    ***Figure 5-27.** <rich:inputNumberSlider> with manual input disabled*


    #### JavaScript API


    [Table 5-6](#Chapter05.html#tab_5_6) shows the component JavaScript API.


    ![images](images/t0506.jpg)


    ### Using <rich_inputnumberspinner>


    `<rich_inputnumberspinner>` provides a familiar input field, but it renders a
    slider with up and down arrows to increase or decrease the value, as shown in
    [Figure 5-28](#Chapter05.html#fig_5_28).


    ![images](images/0528.jpg)


    ***Figure 5-28.** <rich_inputnumberspinner> component*


    The code is rather simple again; that''s all you need to do to render the <*`rich:inplaceNumberSpinner>`*
    component.


    `<rich_inputnumberspinner value="#{inputNumberBean.numberOfItems}"/>`


    [Listing 5-26](#Chapter05.html#list_5_26) shows that similar attributes exist
    on `<rich_inputnumberspinner>` as on `<rich:inputNumberSlider>`.


    ***Listing 5-26.** Shows that similar attributes exist*


    `<rich_inputnumberspinner value="#{inputNumberBean.numberOfItems}"`

    `   maxValue="500"`

    `   minValue="0"`

    `   step="5"`

    `   enableManualInput="false"/>`


    You can set the minimum and maximum values, set the step size, and disable manual
    input.


    One other attribute available on this component is `cycled`. While set to `true`,
    when the value reaches one of the boundaries (minimum/maximum), it will be set
    to the next boundary or reversed.


    #### JavaScript API


    [Table 5-7](#Chapter05.html#tab_5_7) shows the JavaScript API available on this
    component.


    ![images](images/t0507.jpg)


    ### Using <rich_calendar>


    The calendar component allows you to select the date and time values either inline
    or via a pop-up menu.


    `<rich_calendar value="#{calendarBean.today}"`

    `   datePattern="dd/M/yy HH:mm:ss"/>`


    Where `#{calendarBean.today}` is of type `java.util.Date` with getter and setter
    methods.


    ![images](images/square.jpg) **Note** Calendar allows a value to be bound to different
    type of objects: String, Date, GregorianCalendar. It will convert the current
    value automatically depending on the type of value, or you could add a custom
    converter for custom date types.


    [Figure 5-29](#Chapter05.html#fig_5_29) shows an example of selecting a date.
    Note that by default the calendar is rendered with an input field. When activated,
    the calendar is shown in a pop-up.


