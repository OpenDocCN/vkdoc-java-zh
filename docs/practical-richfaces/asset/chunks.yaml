    \ **Tip** You can also use `<a4j:param>` with non-Ajax action components such\
    \ as `<h:commandButton>`, and `GET` components such as `<h:button>`."
  raw: '##### Passing Parameters with <a4j:param>


    Let''s look at another example where an Ajax request is not fired directly from
    a JSF component, but from an HTML tag when a mouse is placed over the name of
    a drink, as shown in [Figure 3-1](#Chapter03.html#fig_3_1).


    ![images](images/0301.jpg)


    ***Figure 3-1.** Using <a4j:jsFunction> with <a4j:param>*


    [Listing 3-15](#Chapter03.html#list_3_15) shows the JSF code.


    ***Listing 3-15.** The JSF code*


    `<table border="1">`

    `   <tr>`

    `      <td onmouseover="setdrink(''Espresso'')"`

    `         onmouseout="setdrink('''')">Espresso</td>`

    `      <td onmouseover="setdrink(''Cappuccino'')"`

    `         onmouseout="setdrink('''')">Cappuccino</td>`

    `      <td onmouseover="setdrink(''Tea'')"`

    `         onmouseout="setdrink('''')">Tea</td>`

    `   </tr>`

    `</table>`

    `<h:outputText id="drink" value="I like #{jsFunctionDrinkBean.drink}" />`


    `<h:form>`

    `   <a4j:jsFunction name="setdrink" execute="@form" render="drink">`

    `      <a4j:param name="param1" assignTo="#{jsFunctionDrinkBean.drink}" />`

    `   </a4j:jsFunction>`

    `</h:form>`


    The managed bean code is shown in [Listing 3-16](#Chapter03.html#list_3_16).


    ***Listing 3-16.** The managed bean code*


    `@ManagedBean (name="jsFunctionDrinkBean")`

    `@RequestScoped`

    `public class JSFunctionDrinkBean {`


    `   private String drink;`

    `   // setter and getter`

    `}`


    We no longer fire a request from a JSF component; the Ajax request is fired from
    HTML tag when we place the mouse over the table row (`onmouseover` event) and
    is also fired when we move the mouse out (`onmouseout` event). When one of these
    events occurs, a call to `setdrink(..)` is made. `setdrink` is a JavaScript function
    defined by `<a4j:jsFuction>`, which in turn fired the Ajax request and could also
    do partial page rendering.


    You will notice one difference from the previous example; our JavaScript function
    defined by `<a4j:jsFunction>` takes a parameter, either the name of the drink
    or an empty string. We somehow have to pass it to the bean, set it to the `drink`
    attribute, and then render it. This is done via the `<a4j:param>` tag. Parameters
    will be passed in the same order as defined inside the `<a4j:jsFunction>` tag.


    The `<a4j:param>` is very similar to the standard `<f:param>`, but with one major
    and very helpful difference. When using `<f:param>`, the value is added to the
    request and then has to be retrieved from the request with this link of code.
    [Listing 3-17](#Chapter03.html#list_3_17) shows a very simple example using `<f:param>`.


    ***Listing 3-17.** Using the `<f:param> value to the request`*


    `<a4j:commandButton>`

    `   <f:param name="firstName" value="Tammy"/>`

    `</a4j:commandButton>`


    To get the value inside the bean, we can use something like the following:


    `String value = FacesContext.getCurrentInstance().getExternalContext()`

    `   .getRequestParameterMap().get("firstName");`


    Going back to `<a4j:param>`, it adds a parameter to the request in the same fashion,
    but also does the assignment automatically. In other words, it will set the value
    into the bean property, assuming it has a setter method. It''s just an upgraded
    version of `<f:param>` where you don''t have to do anything to get the value.
    [Listing 3-18](#Chapter03.html#list_3_18) shows an example using `<a4j:param>`.


    ***Listing 3-18.** Using `<a4j:param> instead of <f:param>`*


    `<a4j:commandButton>`

    `   <a4j:param name="firstName" value="Tammy" assignTo="#{paramBean.firstName}"/>`

    `</a4j:commandButton>`


    The `firstName` property, with getter and setter needs present inside the managed
    bean, is shown in [Listing 3-19](#Chapter03.html#list_3_19).


    ***Listing 3-19.** The managed bean*


    `@ManagedBean`

    `@RequestScoped`

    `public class ParamBean {`


    `   private String firstName;`


    `   public String getFirstName() {`

    `      return firstName;`

    `   }`

    `   public void setFirstName(String firstName) {`

    `      this.firstName = firstName;`

    `   }`

    `}`


    When defining a JavaScript function with `<a4j:jsFunction>`, which takes a parameter,
    then `<a4j:param>` is used to define and assign the parameter to a bean property.
    In case you need to pass more than one parameter, you can include as many `<a4j:param>`
    tags as you need, as shown in [Listing 3-20](#Chapter03.html#list_3_20).


    ***Listing 3-20.** Including as many `<a4j:param>` tags as you need*


    `<a4j:jsFunction>`

    `   <a4j:param name="param1" assignTo="#{someBean.value1}" />`

    `   <a4j:param name="param2" assignTo="#{someBean.value2}" />`

    `   <a4j:param name="param3" assignTo="#{someBean.value3}" />`

    `</a4j:jsFunction>`


    The name has to be in the form of `param1`, `param2`, and `param3`.


    We''ve shown how to pass parameters from the server side back and forth (as parameters
    encoded from server-side EL expressions or just string constants). But it''s actually
    possible to pass pure client-side parameters. This means you can pass a result
    of a JavaScript function or JavaScript expression using `<a4j:param>` when the
    `noEscape` attribute is set to `true`. [Listing 3-21](#Chapter03.html#list_3_21)
    shows such example.


    ***Listing 3-21.** Passing a result of a JavaScript function or JavaScript expression
    using `<a4j:param>`*


    `<a4j:commandButton value="Set position" >`

    `   <a4j:param noEscape="true" value="(jQuery(window).width()/2)-250"`

    `assignTo="#{someBean.left}"/>`

    `   <a4j:param noEscape="true" value="(jQuery(window).height()/2)-150"`

    `assignTo="#{someBean.top}"/>`

    `</a4j:commandButton>`


    ![images](images/square.jpg) **Tip** You can also use `<a4j:param>` with non-Ajax
    action components such as `<h:commandButton>`, and `GET` components such as `<h:button>`.'
  trans: '

    ##### 使用 <a4j:param> 传递参数


    让我们看另一个例子，其中 Ajax 请求并非直接从 JSF 组件触发，而是当鼠标悬停在饮品名称上时，从一个 HTML 标签触发，如图 3-1 所示。


    ![images](img/0301.jpg)


    ***图 3-1.** 将 <a4j:jsFunction> 与 <a4j:param> 结合使用*


    清单 3-15 展示了 JSF 代码。


    ***清单 3-15.** JSF 代码*


    `<table border="1">`

    `   <tr>`

    `      <td onmouseover="setdrink(''Espresso'')"`

    `         onmouseout="setdrink('''')">Espresso</td>`

    `      <td onmouseover="setdrink(''Cappuccino'')"`

    `         onmouseout="setdrink('''')">Cappuccino</td>`

    `      <td onmouseover="setdrink(''Tea'')"`

    `         onmouseout="setdrink('''')">Tea</td>`

    `   </tr>`

    `</table>`

    `<h:outputText id="drink" value="I like #{jsFunctionDrinkBean.drink}" />`


    `<h:form>`

    `   <a4j:jsFunction name="setdrink" execute="@form" render="drink">`

    `      <a4j:param name="param1" assignTo="#{jsFunctionDrinkBean.drink}" />`

    `   </a4j:jsFunction>`

    `</h:form>`


    托管 Bean 的代码如清单 3-16 所示。


    ***清单 3-16.** 托管 Bean 代码*


    `@ManagedBean (name="jsFunctionDrinkBean")`

    `@RequestScoped`

    `public class JSFunctionDrinkBean {`


    `   private String drink;`

    `   // setter and getter`

    `}`


    我们不再从 JSF 组件发起请求；当鼠标悬停在表格行上时（`onmouseover` 事件），Ajax 请求从 HTML 标签触发，当鼠标移出时（`onmouseout`
    事件）也会触发。当这些事件之一发生时，会调用 `setdrink(..)`。`setdrink` 是由 `<a4j:jsFuction>` 定义的 JavaScript
    函数，它进而触发 Ajax 请求，并且也能进行部分页面渲染。


    你会注意到与上一个例子有一个不同之处；我们由 `<a4j:jsFunction>` 定义的 JavaScript 函数接受一个参数，要么是饮品的名称，要么是一个空字符串。我们必须以某种方式将其传递给
    Bean，设置到 `drink` 属性中，然后渲染它。这是通过 `<a4j:param>` 标签完成的。参数将按照在 `<a4j:jsFunction>`
    标签内定义的顺序传递。


    `<a4j:param>` 与标准的 `<f:param>` 非常相似，但有一个主要且非常有用的区别。使用 `<f:param>` 时，值被添加到请求中，然后必须通过这段代码从请求中检索出来。清单
    3-17 展示了一个使用 `<f:param>` 的非常简单的例子。


    ***清单 3-17.** 使用 `<f:param> 将值添加到请求中`*


    `<a4j:commandButton>`

    `   <f:param name="firstName" value="Tammy"/>`

    `</a4j:commandButton>`


    要在 Bean 内部获取该值，我们可以使用类似下面的代码：


    `String value = FacesContext.getCurrentInstance().getExternalContext()`

    `   .getRequestParameterMap().get("firstName");`


    回到 `<a4j:param>`，它以相同的方式向请求添加参数，但同时会自动进行赋值。换句话说，它会将值设置到 Bean 的属性中，前提是该属性有 setter
    方法。它只是 `<f:param>` 的一个升级版本，你无需做任何事就能获取值。清单 3-18 展示了一个使用 `<a4j:param>` 的例子。


    ***清单 3-18.** 使用 `<a4j:param> 替代 <f:param>`*


    `<a4j:commandButton>`

    `   <a4j:param name="firstName" value="Tammy" assignTo="#{paramBean.firstName}"/>`

    `</a4j:commandButton>`


    `firstName` 属性（需要在托管 Bean 中存在相应的 getter 和 setter）如清单 3-19 所示。


    ***清单 3-19.** 托管 Bean*


    `@ManagedBean`

    `@RequestScoped`

    `public class ParamBean {`


    `   private String firstName;`


    `   public String getFirstName() {`

    `      return firstName;`

    `   }`

    `   public void setFirstName(String firstName) {`

    `      this.firstName = firstName;`

    `   }`

    `}`


    当使用 `<a4j:jsFunction>` 定义一个接受参数的 JavaScript 函数时，`<a4j:param>` 用于定义该参数并将其赋值给 Bean
    属性。如果你需要传递多个参数，可以根据需要包含任意数量的 `<a4j:param>` 标签，如清单 3-20 所示。


    ***清单 3-20.** 根据需要包含任意数量的 `<a4j:param>` 标签*


    `<a4j:jsFunction>`

    `   <a4j:param name="param1" assignTo="#{someBean.value1}" />`

    `   <a4j:param name="param2" assignTo="#{someBean.value2}" />`

    `   <a4j:param name="param3" assignTo="#{someBean.value3}" />`

    `</a4j:jsFunction>`


    名称必须采用 `param1`、`param2` 和 `param3` 的形式。


    我们已经展示了如何从服务器端来回传递参数（作为从服务器端 EL 表达式或字符串常量编码的参数）。但实际上，也可以传递纯客户端参数。这意味着当 `noEscape`
    属性设置为 `true` 时，你可以使用 `<a4j:param>` 传递 JavaScript 函数或 JavaScript 表达式的结果。清单 3-21
    展示了这样一个例子。


    ***清单 3-21.** 使用 `<a4j:param>` 传递 JavaScript 函数或 JavaScript 表达式的结果*


    `<a4j:commandButton value="Set position" >`

    `   <a4j:param noEscape="true" value="(jQuery(window).width()/2)-250"`

    `assignTo="#{someBean.left}"/>`

    `   <a4j:param noEscape="true" value="(jQuery(window).height()/2)-150"`

    `assignTo="#{someBean.top}"/>`

    `</a4j:commandButton>`


    ![images](img/square.jpg) **提示** 你也可以将 `<a4j:param>` 与非 Ajax 动作组件（如 `<h:commandButton>`）以及
    `GET` 组件（如 `<h:button>`）一起使用。

