    a registered data model as a table value, and using the rows attribute, limiting
    the number of rows per page to 10.    Most notable there is `<c:forEach>` usage,
    which provides a way to iterate over the `gameFields` (column names stored in
    `GamesHibernateBean`) and dynamically add columns to the table.    ![images](images/square.jpg)
    **Note** Using `<c:forEach>` instead of `<ui:repeat>` is needed in this case.
    `<c:forEach>` has to be used in cases where we need to create the actual components
    in a JSF tree during the view creation phase, rather than iterating over a single
    instance at the render response phase (as would happen with `<ui:repeat>`). There
    are many good JSF-related resources that can provide more information.    The
    footer facet contains the `<rich:dataScroller>` component.    [Figure 7-33](#Chapter07.html#fig_7_33)
    shows how it will looks on initial rendering.  ![images](images/0733.jpg)  ***Figure
    7-33.** <rich:dataTable> with dynamic columns and backed by custom model*    When
    we click to some other page, the table will be switched, as shown in [Figure 7-34](#Chapter07.html#fig_7_34).  ![images](images/0734.jpg)  ***Figure
    7-34.** <rich:dataTable> with dynamic columns and backed by custom model after
    page change*    You can easily check with debug or adding some logging code to
    the model that database calls are performed only in the following ways:    1.  Twice
    on initial rendering in order to cache all the object counts and to get the first
    10 records. 2.  Once for a page change, when the next 10 records are loaded. In
    complex cases, a row count should not be cached in such a simple way because the
    table size could change; but it works for simple cases with static tables.    It
    turns out that the `walk()` method is called a few times per request; as many
    times as the component needed to iterate over the value according to JSF specification
    (decode, render). And `rowCount` also gets called a few times by the `<rich:dataTable>`
    and `<rich:dataScoller>` components. So, as previously mentioned, if a table points
    to a database result set directly, rather than using the model like we created,
    you will see numerous database calls on initial rendering or a single request.
    The performance of such implementations will be extremely low.    ##### ArrangeableModel
