- fmt: "### Using Complex Markup in `<rich:autocomplete>` Pop-ups\n\nThe `<rich:autocomplete>`\
    \ examples we have shown you so far used a simple list of strings in the pop-up\
    \ as suggestions for user input. In general, you're free to use any custom objects\
    \ for suggestions. In that case the component should be defined with the pop-up\
    \ list representation and the property of the custom object, which should actually\
