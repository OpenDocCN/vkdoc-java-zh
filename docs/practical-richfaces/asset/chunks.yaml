    `...`

    `   <h:commandLink value="Send">`

    `     <f:ajax event="click" render="out"/>`

    `   </h:commandLink>`

    `   <h:outputText id="out"/>`

    `</h:form>`


    In both examples, when a button is clicked an Ajax request will be fired and a
