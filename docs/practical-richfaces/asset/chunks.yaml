  raw: '#### Auto-Rendered Areas with <a4j:outputPanel>


    To render a component or a set of components, we use the `render` attribute. `render`
    attributes can take any of the following values: `@all`, `@this`, `@form`, `@none`,
    ids, and EL expressions bound to Set, List, or String with ids. RichFaces adds
    an important feature when using EL, the ids are resolved in the same request.
    We covered this feature in [Chapter 2](#Chapter02.html#ch2). One more thing you
    get with RichFaces is the ability to separate ids with a comma (versus just a
    space in JSF 2), as follows:


    `render="id1, id2, id3"`


    Using `render` with ids is definitely sufficient but can get rather complicated
    if there are some components that need to be rendered on every request. If we
    also assume that there are numerous components that send an Ajax request, we would
    need to specify components to be rendered on every such component or behavior.
    RichFaces solves this problem by making available a special `<a4j:outputPanel>`
    component, which when used, all components inside the panel are always rendered
    on any Ajax request without the need to point to the panel or the components inside
    via render.


    [Listing 3-27](#Chapter03.html#list_3_27) shows an example using `<a4j:outputPanel>`.
    By itself, `<a4j:outputPanel>` is not much different than `<h:panelGroup>`. However,
    to make this panel and everything inside of it auto-rendered, we set a special
    `ajaxRendered="true"` attribute, as shown in [Listing 3-27](#Chapter03.html#list_3_27).


    ***Listing 3-27.** Setting a special `ajaxRendered="true"` attribute*


    `<h:form>`

    `   <a4j:commandButton value="Update time" />`

    `   <a4j:outputPanel ajaxRendered="true">`

    `      <h:outputText value="#{clockBean.now}" />`

    `   </a4j:outputPanel>`

    `</h:form>`


    Notice that `<a4j:commandButton>` doesn''t have the `render` attribute, however
    time is still rendered because we use `<4j:outputPanel ajaxRendered="true">`,
    which again, marks the entire panel as an auto-rendered area.


    Another common place where `<a4j:outputPanel>` is used is to wrap components is
    on a page that is not rendered on the initial page display, but rendered after
    the Ajax request. This is also a common problem some users run into when starting
    with JSF and Ajax. Let''s take the Seven Wonders of the World example shown in
    [Figure 3-3](#Chapter03.html#fig_3_3).


    ![images](images/0303.jpg)


    ***Figure 3-3.** Show or hide the Seven Wonders of the World list*


    There are two buttons at the top, to hide or show the table. When the page is
    rendered for the first time, the table is not rendered (hidden). Then, selecting
    Show should render the table.


    The JSF page is shown in [Listing 3-28](#Chapter03.html#list_3_28).


    ***Listing 3-28.** Showing the JSF page*


    `<h:form>`

    `   <h:panelGrid>`

    `      <h:selectOneRadio value="#{dynamicUpdateBean.display}">`

    `         <f:selectItem itemLabel="Show" itemValue="true" />`

    `         <f:selectItem itemLabel="Hide" itemValue="false" />`

    `         <a4j:ajax execute="@this" render="wonderList" />`

    `      </h:selectOneRadio>`

    `   </h:panelGrid>`


    `   <h:dataTable id="wonderList" value="#{wonderListBean.list}"`

    `      var="wonder" rendered="#{dynamicUpdateBean.display}">`

    `      <f:facet name="header">7 Wonders of The World</f:facet>`

    `      <h:column>`

    `         <f:facet name="header">Name</f:facet>`

    `         <h:outputText value="#{wonder.name}" />`

    `      </h:column>`

    `      <h:column>`

    `          <f:facet name="header">Location</f:facet>`

    `          <h:outputText value="#{wonder.location}" />`

    `      </h:column>`

    `   </h:dataTable>`

    `</h:form>`


    In [Listing 3-28](#Chapter03.html#list_3_28), `#{dynamicUpdateBean.display}` is
    set to `false` when the page is rendered for the first time, and thus the table
    is not displayed. When selecting the Show button, we use Ajax request to set `#{dynamicUpdateBean.display}`
    to `true` and then render the table. If you run this code, the table will not
    be shown. As we mentioned earlier, this is a common stumbling block for users
    who are starting to use JSF and Ajax. The root of the problem is that we tried
    to re-render a component not previously rendered in the page. Before we explain
    this problem, [Listing 3-29](#Chapter03.html#list_3_29) shows the `Wonder` class.


    ***Listing 3-29.** Shows the Wonder class*


    `public class Wonder {`


    `   private String name;`

    `   private String location;`


    `   public Wonder(String name, String location) {`


    `      this.name = name;`

    `      this.location = location;`

    `   }`

    `   // Getters and setters`

    `}`


    [Listing 3-30](#Chapter03.html#list_3_30) shows the managed bean that holds the
    list of wonders.


    ***Listing 3-30.** The managed bean that holds the list of wonders*


    `@ManagedBean`

    `@RequestScoped`

    `public class WonderListBean {`


    `   private ArrayList <Wonder> list;`


    `   public ArrayList<Wonder> getList() {`

    `        return list;`

    `   }`

    `   @PostConstruct`

    `   public void init () {`

    `      list = new ArrayList <Wonder>();`

    `      list.add(new Wonder("Chichen Itza", "Mexico"));`

    `      list.add(new Wonder("Christ the Redeemer", "Brazil"));`

    `      list.add(new Wonder("Colosseum", "Italy"));`

    `      list.add(new Wonder("Great Wall of China", "China"));`

    `      list.add(new Wonder("Machu Picchu", "Peru"));`

    `      list.add(new Wonder("Petra", "Jordan"));`

    `      list.add(new Wonder("Taj Mahal", "India"));`

    `   }`

    `}`


    When the page was rendered for the first time, the table component wasn''t rendered.
    In other words, no markup was sent to the browser. When we select Show, we send
    an Ajax request and set `#{dynamicUpdateBean.display}` to `true`. We also render
    the table (`render="wonderList"`). Table markup is sent to the browser. Now, the
    problem is that RichFaces doesn''t know which browser DOM node to update with
    the table content simply because no such node existed before.


    Ajax updates are done based on ids. When some markup is rendered and sent to the
    browser, it comes with an id. JavaScript is responsible for updating the DOM and
    will try to locate a node with exactly the same id. If such an id is found, then
    the new content will replace the old content in the DOM and we get an Ajax update.
    If such a node isn''t found, as in our case, then the new content is simply ignored.


    The solution is to create a placeholder for a table that is always rendered. Then,
    instead of updating (rendering) the table, we will render the placeholder. Anything
    inside the placeholder will always be updated without any problems. If we use
    `<a4j:outputPanel>`, we actually get two features at once. We first get a placeholder,
    but we also don''t need to render the table anymore as `<a4j:outputPanel ajaxRendered="true">`
    is an auto-rendered panel. [Listing 3-31](#Chapter03.html#list_3_31) shows this
    using `<a4j:outputPanel>`.


    ***Listing 3-31.** Using `<a4j:outputPanel>`*


    `<h:form>`

    `   <h:panelGrid>`

    `       <h:selectOneRadio value="#{dynamicUpdateBean.display}">`

    `       <f:selectItem itemLabel="Show" itemValue="true" />`

    `       <f:selectItem itemLabel="Hide" itemValue="false" />`

    **`<a4j:ajax execute="@this"/>`**

    `       </h:selectOneRadio>`

    `   </h:panelGrid>`

    **`<a4j:outputPanel ajaxRendered="true" layout="block">`**

    `      <h:dataTable id="wonderList" value="#{wonderListBean.list}"`

    `         var="wonder" rendered="#{dynamicUpdateBean.display}">`

    `          ...`

    `      </h:dataTable>`

    **`</a4j:outputPanel>`**

    `</h:form>`'
