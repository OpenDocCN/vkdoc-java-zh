- fmt: "### Controlling Traffic with Client Queue\n\nJSF 2 comes with a built-in Ajax\
    \ client queue. There is nothing you need to do; the queue is there by default\
    \ on every page. It's a page level queue and is used by all components. The standard\
    \ queue provides basic functionality. It will automatically queue requests and\
    \ ensure that the last Ajax request will finish before a new one is sent. Let's\
    \ trace the events when using standard Ajax queue, as follows:\n\n1.  The button\
    \ is clicked.\n2.  An Ajax request is sent to the server; let's call the request\
    \ `A1`.\n3.  While request `A1` is being executed, the same button or any other\
    \ control is activated three times.\n4.  Three requests are now queued.\n5.  Once\
    \ `A1` request comes back, the first request in the queue is sent. Two are left\
    \ in the queue.\n6.  Two requests are now queued.\n\nRichFaces adds additional\
    \ functionality on top of the standard JSF 2 queue, such as the following:\n\n\
    *   Event combining from the same and different components\n*   Request delay\n\
    *   Ignoring \"stale\" responses\n*   Defining named and unnamed (view, form)\
    \ queues\n*   Overwriting queue settings by individual components\n\nIt's very\
    \ important to note that the RichFaces queue doesn't replace an existing JSF 2\
    \ queue, it uses the same queue and only upgrades the queue with additional features\
    \ and advanced functionality.\n\n![images](images/square.jpg) **Note** The Ajax\
    \ client queue only work for Ajax requests. It is not used for regular (non-Ajax)\
    \ requests.\n\nLet's start with how a queue is defined. A queue is added with\
    \ the `<a4j:queue>` tag and is configured in the following ways:\n\n*   View-level\
    \ queue (unnamed). A queue is defined outside any forms. All components use the\
    \ same queue settings.\n*   Form-level queue (unnamed). A queue is defined inside\
    \ a form. All components inside the form use this queue setting. Overwrites queue\
    \ settings defined at view-level queues.\n*   Queue is given a name (named). Any\
    \ components that need to use this queue must reference the queue by its name.\
    \ In this case, default queues (view and form) are ignored for controls that referenced\
    \ it. Overwrites queue settings defined at view-level and form-level queues.\n\
    \n[Listing 3-45](#Chapter03.html#list_3_45) shows a view-level queue.\n\n**Listing\
    \ 3-45.** Shows a view-level queue\n\n```\n<a4j:queue/>\n<h:form>\n...\n</h:form>\n\
    <h:form>\n     ...\n</h:form>\n```\n\n[Listing 3-46](#Chapter03.html#list_3_46)\
    \ shows a form-level queue.\n\n**Listing 3-46.** Shows a form-level queue\n\n\
    ```\n<h:form>\n<a4j:queue/>\n...\n</h:form>\n<h:form>\n<a4j:queue/>\n...\n</h:form>\n\
    ```\n\n[Listing 3-47](#Chapter03.html#list_3_47) shows one view-level queue and\
    \ one form-level queue. Components within form `\"form1\"` will use the queue\
    \ inside the form. All other components, including inside form `\"form2\"`, will\
    \ use the view-level queue.\n\n**Listing 3-47.** Shows one view-level queue and\
    \ one form-level queue\n\n```\n<a4j:queue/>\n<h:form id=\"form1\">\n<a4j:queue/>\n\
    ...\n</h:form>\n<h:form id=\"form2\">\n...\n</h:form>\n```\n\n[Listing 3-48](#Chapter03.html#list_3_48)\
    \ shows a named queue. When using a named queue, components have to reference\
    \ the queue via its name. This is done with a special tag called `<a4j:attachQueue>`.\n\
    \n**Listing 3-48.** Shows a named queue\n\n```\n<a4j:queue name=\"ajaxQueue\"\
    \ />\n<h:form>\n   <a4j:commandButton>\n       <a4j:attachQueue name=\"ajaxQueue\"\
    />\n    </a4j:commandButton>\n</h:form>\n```\n\n`<a4j:attachQueue>` provides the\
    \ same attributes as `<a4j:queue>` does (described later). They should be used\
    \ to redefine queue settings for specific components.\n\nThe `<a4j:attachQueue>`\
    \ tag is also used to overwriting unnamed queue settings. In that case, the `name`\
    \ attribute should be omitted.\n\n![images](images/square.jpg) **Tip** A queue\
    \ defined with a name on a page will not be used by components that don't explicitly\
    \ reference this named queue.\n\nLet's review how the standard queue works and\
    \ then show what extra features RichFaces adds to the queue. The standard JSF\
    \ queue will queue all events and will not send the next request until the one\
    \ executing on the server returns. That's pretty good functionality out-of-the-box,\
    \ but you are still missing a number of features.\n\n![images](images/square.jpg)\
    \ **Note** If you want to see how the standard JSF 2 queue works switch all Ajax\
    \ requests to be sent with `<f:ajax>` behavior."
  raw: '### Controlling Traffic with Client Queue


    JSF 2 comes with a built-in Ajax client queue. There is nothing you need to do;
    the queue is there by default on every page. It''s a page level queue and is used
    by all components. The standard queue provides basic functionality. It will automatically
    queue requests and ensure that the last Ajax request will finish before a new
    one is sent. Let''s trace the events when using standard Ajax queue, as follows:


    1.  The button is clicked.

    2.  An Ajax request is sent to the server; let''s call the request A1.

    3.  While request A1 is being executed, the same button or any other control is
    activated three times.

    4.  Three requests are now queued.

    5.  Once A1 request comes back, the first request in the queue is sent. Two are
    left in the queue.

    6.  Two requests are now queued.


    RichFaces adds additional functionality on top of the standard JSF 2 queue, such
    as the following:


    *   Event combining from the same and different components

    *   Request delay

    *   Ignoring “stale” responses

    *   Defining named and unnamed (view, form) queues

    *   Overwriting queue settings by individual components


    It''s very important to note that the RichFaces queue doesn''t replace an existing
    JSF 2 queue, it uses the same queue and only upgrades the queue with additional
    features and advanced functionality.


    ![images](images/square.jpg) **Note** The Ajax client queue only work for Ajax
    requests. It is not used for regular (non-Ajax) requests.


    Let''s start with how a queue is defined. A queue is added with the `<a4j:queue>`
    tag and is configured in the following ways:


    *   View-level queue (unnamed). A queue is defined outside any forms. All components
    use the same queue settings.

    *   Form-level queue (unnamed). A queue is defined inside a form. All components
    inside the form use this queue setting. Overwrites queue settings defined at view-level
    queues.

    *   Queue is given a name (named). Any components that need to use this queue
    must reference the queue by its name. In this case, default queues (view and form)
    are ignored for controls that referenced it. Overwrites queue settings defined
    at view-level and form-level queues.


    [Listing 3-45](#Chapter03.html#list_3_45) shows a view-level queue.


    ***Listing 3-45.** Shows a view-level queue*


    `<a4j:queue/>`

    `<h:form>`

    `...`

    `</h:form>`

    `<h:form>`

    `     ...`

    `</h:form>`


    [Listing 3-46](#Chapter03.html#list_3_46) shows a form-level queue.


    ***Listing 3-46.** Shows a form-level queue*


    `<h:form>`

    `<a4j:queue/>`

    `...`

    `</h:form>`

    `<h:form>`

    `<a4j:queue/>`

    `...`

    `</h:form>`


    [Listing 3-47](#Chapter03.html#list_3_47) shows one view-level queue and one form-level
    queue. Components within form `"form1"` will use the queue inside the form. All
    other components, including inside form `"form2"`, will use the view-level queue.


    ***Listing 3-47.** Shows one view-level queue and one form-level queue*


    `<a4j:queue/>`

    `<h:form id="form1">`

    `<a4j:queue/>`

    `...`

    `</h:form>`

    `<h:form id="form2">`

    `...`

    `</h:form>`


    [Listing 3-48](#Chapter03.html#list_3_48) shows a named queue. When using a named
    queue, components have to reference the queue via its name. This is done with
    a special tag called `<a4j:attachQueue>`.


    ***Listing 3-48.** Shows a named queue*


    `<a4j:queue name="ajaxQueue" />`

    `<h:form>`

    `   <a4j:commandButton>`

    `       <a4j:attachQueue name="ajaxQueue"/>`

    `    </a4j:commandButton>`

    `</h:form>`


    `<a4j:attachQueue>` provides the same attributes as `<a4j:queue>` does(described
    later). They should be used to redefine queue settings for specific components.


    The `<a4j:attachQueue>` tag is also used to overwriting unnamed queue settings.
    In that case, the `name` attribute should be omitted.


    ![images](images/square.jpg) **Tip** A queue defined with a name on a page will
    not be used by components that don''t explicitly reference this named queue.


    Let''s review how the standard queue works and then show what extra features RichFaces
    adds to the queue. The standard JSF queue will queue all events and will not send
    the next request until the one executing on the server returns. That''s pretty
    good functionality out-of-the-box, but you are still missing a number of features.


    ![images](images/square.jpg) **Note** If you want to see how the standard JSF
    2 queue works switch all Ajax requests to be sent with `<f:ajax>` behavior.'
  trans: '

    ### 使用客户端队列控制流量


    JSF 2 内置了一个 Ajax 客户端队列。你无需做任何事；默认情况下每个页面都有这个队列。它是一个页面级队列，所有组件都会使用它。标准队列提供了基本功能。它会自动对请求进行排队，并确保在发送新请求之前，上一个
    Ajax 请求已经完成。让我们追踪一下使用标准 Ajax 队列时的事件流程，如下所示：


    1.  按钮被点击。

    2.  一个 Ajax 请求被发送到服务器；我们称这个请求为 A1。

    3.  在请求 A1 执行期间，同一个按钮或其他控件被激活了三次。

    4.  现在有三个请求在队列中。

    5.  一旦 A1 请求返回，队列中的第一个请求就会被发送。队列中还剩下两个请求。

    6.  现在有两个请求在队列中。


    RichFaces 在标准 JSF 2 队列的基础上增加了额外的功能，例如：


    *   来自相同和不同组件的事件合并

    *   请求延迟

    *   忽略“过时”的响应

    *   定义命名和未命名（视图、表单）队列

    *   通过单个组件覆盖队列设置


    非常重要的一点是，RichFaces 队列并不会替换现有的 JSF 2 队列，它使用的是同一个队列，只是通过额外的功能和高级特性对其进行了升级。


    ![images](img/square.jpg) **注意** Ajax 客户端队列仅适用于 Ajax 请求。它不用于常规（非 Ajax）请求。


    让我们从如何定义队列开始。队列是通过 `<a4j:queue>` 标签添加的，并通过以下方式进行配置：


    *   视图级队列（未命名）。队列在任何表单之外定义。所有组件使用相同的队列设置。

    *   表单级队列（未命名）。队列在表单内部定义。表单内的所有组件都使用此队列设置。会覆盖在视图级队列中定义的设置。

    *   队列被赋予一个名称（命名）。任何需要使用此队列的组件都必须通过其名称引用该队列。在这种情况下，对于引用了该命名队列的控件，默认队列（视图级和表单级）将被忽略。会覆盖在视图级和表单级队列中定义的设置。


    清单 3-45 展示了一个视图级队列。


    ***清单 3-45.** 展示了一个视图级队列*


    `<a4j:queue/>`

    `<h:form>`

    `...`

    `</h:form>`

    `<h:form>`

    `     ...`

    `</h:form>`


    清单 3-46 展示了一个表单级队列。


    ***清单 3-46.** 展示了一个表单级队列*


    `<h:form>`

    `<a4j:queue/>`

    `...`

    `</h:form>`

    `<h:form>`

    `<a4j:queue/>`

    `...`

    `</h:form>`


    清单 3-47 展示了一个视图级队列和一个表单级队列。表单 `"form1"` 内的组件将使用表单内部的队列。所有其他组件，包括表单 `"form2"` 内的组件，都将使用视图级队列。


    ***清单 3-47.** 展示了一个视图级队列和一个表单级队列*


    `<a4j:queue/>`

    `<h:form id="form1">`

    `<a4j:queue/>`

    `...`

    `</h:form>`

    `<h:form id="form2">`

    `...`

    `</h:form>`


    清单 3-48 展示了一个命名队列。使用命名队列时，组件必须通过其名称引用该队列。这是通过一个名为 `<a4j:attachQueue>` 的特殊标签来完成的。


    ***清单 3-48.** 展示了一个命名队列*


    `<a4j:queue name="ajaxQueue" />`

    `<h:form>`

    `   <a4j:commandButton>`

    `       <a4j:attachQueue name="ajaxQueue"/>`

    `    </a4j:commandButton>`

    `</h:form>`


    `<a4j:attachQueue>` 提供了与 `<a4j:queue>` 相同的属性（稍后描述）。它们应用于为特定组件重新定义队列设置。


    `<a4j:attachQueue>` 标签也用于覆盖未命名队列的设置。在这种情况下，应省略 `name` 属性。


    ![images](img/square.jpg) **提示** 在页面上定义了名称的队列，不会被未显式引用该命名队列的组件使用。


    让我们回顾一下标准队列是如何工作的，然后展示 RichFaces 为队列添加了哪些额外功能。标准的 JSF 队列会对所有事件进行排队，并且在服务器上执行的上一个请求返回之前，不会发送下一个请求。这是开箱即用的相当不错的功能，但你仍然缺少一些特性。


    ![images](img/square.jpg) **注意** 如果你想了解标准 JSF 2 队列是如何工作的，可以将所有 Ajax 请求切换为使用 `<f:ajax>`
    行为来发送。

