    that we use the `type` attribute, which takes the full class name as a string,
    not a value expression. Using this approach you don''t have access to properties
    from this page.


    ***Listing 3-68.** Use the type attribute which takes the full class name as a
    string*


    `<a4j:commandButton value="Update (Interface)" render="out">`

    `   <f:actionListener`

    `      type="org.richfaces.book.actionlistener.YetAnotherListener"/>`

    `</a4j:commandButton>`


    Now that you have seen all three approaches, using `<a4j:actionListener>` appears
    to be the most straightforward. You simply define a listener inside a managed
    bean and reference it via a standard method-binding expression.


    ![images](images/square.jpg) **Tip** The `<a4j:actionListener>` tag supports all
    `<f:actionListener>` tag attributes and features.


    ### Summary


    This chapter covered some of the most important upgrades that RichFaces adds on
    top of standard JSF. In this chapter we showed you additional RichFaces components
    for sending an Ajax request, such as `<a4j:commandButton>`, `<a4j:commandLink>`,
    `<a4j:poll>`, and `<a4j:jsFunction>`. We then covered advanced rendering options
    such as using the `<a4j:outputPanel>` component and the `limitRender` attribute.


    When deciding what part of the JSF view to execute, RichFaces adds another advanced
    option by providing the `<a4j:region>` component. RichFaces greatly upgrades the
    standard JSF queue with advanced features and flexible customization options.
    As we continue the RichFaces journey in the next chapter, we are going to introduce
    you to rich components or the rich:* tag library.


    ## C H A P T E R  4


    ## Getting Started with Rich Components


    Now that we have covered RichFaces foundation, a4j:* tags, advanced features,
    and customization, in this chapter we are going to get started with rich components
    or the rich:* tag library. We won''t cover all the components here; we have other
    chapters for that. In this chapter, we will show you the concepts and common features
    that all rich components share. Some common features are using facets, components
    JavaScript API, and sending Ajax requests. Once you master these concepts, you
    will be able to use any rich component available today or introduced in a future
    RichFaces release.


    ### Rich or Ajax Component?


    If you''re asking—should I use a rich or Ajax component?—it doesn''t matter. It
    can be either one or even both as long as we understand what we are talking about.
    Let''s take an example using the `<rich:inplaceInput>` component. The component
    renders as a label, as shown in [Figure 4-1](#Chapter04.html#fig_4_1).


    ![images](images/0401.jpg)


    ***Figure 4-1.** <rich:inplaceInput> in label state*


    When clicking on the label, the component switches to input, as shown in [Figure
    4-2](#Chapter04.html#fig_4_2).


    ![images](images/0402.jpg)


    ***Figure 4-2.** <rich:inplaceInput> in input state*


    This component is rich because it provides a rich UI—or a rich way for entering
    input. But, at the same time, behind the scenes it''s just a regular input field.
    Could this also be an Ajax component? Probably yes. However, it''s important to
    understand that this component doesn''t send an Ajax request automatically. In
    other words, when changing from label to input or input to label, no Ajax request
    will be sent. All the changes will only happen on the client (browser). An even
    better name for this would be a rich client component. Now, don''t get discouraged,
    there is a way to send an Ajax request from this component and we will show it
    to you later.


    So, there are components in RichFaces (rich:* tag library) that are rich client
    components, but they don''t send an Ajax request. But, there are other rich client
    components that do send an Ajax request. One such example is the `<rich:tabPanel>`
    component. In other words, Ajax behavior (based on some event) is built into them.


    Now that it''s clearer what we''re exactly dealing with, let''s explore the common
    features and concepts that rich components share.


    ### Rich Components Features


    All rich components share a number of common features, as follows:


    *   Redefining parts of a component using facets

    *   Sending an Ajax request

    *   Using component client-side JavaScript API

    *   Emitting client-side events (client behavior can be attached to such events)

    *   Skins


    ![images](images/square.jpg) **Note** Some rich components might not have all
    the features. To get the most up-to-date information, visit the RichFaces documentation
    page at [`www.jboss.org/richfaces/docs`](http://www.jboss.org/richfaces/docs).


    [Chapter 13](#Chapter13.html#ch13) of this book covers skins in depth. We don''t
    cover the components of the other three items with the same depth. That''s not
    the goal here. The goal is to show you the important concepts that all rich components
    share. But, again, the following chapters will cover various rich components in
    more detail.'
  trans: '

    #### 使用 `<a4j:actionListener>`


    `<a4j:actionListener>` 是对 JSF 标准 `<f:actionListener>` 的一次小幅升级。使用 `<a4j:actionListener>`，可以在受管
    Bean 中定义一个监听器方法，并通过标准的方法绑定表达式引用它，如清单 3-63 所示。


    ***清单 3-63.** 在受管 Bean 中定义监听器方法*


    `<a4j:commandButton value="更新 (a4j:actionListener)" render="out">`

    `   <a4j:actionListener listener="#{actionListenerBean.listener}"/>`

    `</a4j:commandButton>`


    在受管 Bean 内部，监听器的定义方式如清单 3-64 所示。


    ***清单 3-64.** 在受管 Bean 中定义监听器*


    `public void listener (ActionEvent event){`

    `  FacesContext.getCurrentInstance()`

    `     .addMessage(null, new FacesMessage("a4j:actionListener - 监听器`

    `        于 "+new Date()+" 被调用"));`

    `}`


    在受管 Bean 内部定义监听器，可以让你访问其他 Bean 的属性和方法。


    ![images](img/square.jpg) **提示** 使用 `<a4j:actionListener>` 是为组件添加多个监听器的一种好方法。


    你可能知道，使用 JSF 标准的 `<f:actionListener>` 标签有两种定义动作监听器的方法。这两种方法都比我们刚才展示的 `<a4j:actionListener>`
    稍微复杂一些。第一种方法是使用 `binding`，如清单 3-65 所示。


    ***清单 3-65.** 使用 binding 定义动作监听器*


    `<a4j:commandButton value="更新 (binding)" render="out">`

    `   <f:actionListener binding="#{actionListenerBean.anotherListener}"/>`

    `</a4j:commandButton>`


    在受管 Bean 内部，你需要为此监听器定义一个内部匿名类，如清单 3-66 所示。在这种情况下，你同样可以从匿名内部类中访问 Bean 的属性和方法。


    ***清单 3-66.** 为此监听器定义内部匿名类*


    `public ActionListener getAnotherListener () {`

    `   return new ActionListener (){`

    `      public void processAction (ActionEvent event){`

    `         FacesContext.getCurrentInstance()`

    `            .addMessage(null, new FacesMessage("binding - 监听器于`

    `               "+new Date()+" 被调用"));`

    `         }`

    `      };`

    `}`


    最后一种方法，可能也是最不常用的，是通过实现接口。我们将展示这种方法，以便你可以比较所有三种方式。清单 3-67 展示了该接口。请注意，该类并未注册为受管
    Bean。


    ***清单 3-67.** 展示接口*


    `public class YetAnotherListener  implements javax.faces.event.ActionListener{`

    `   public void processAction(ActionEvent event) throws       AbortProcessingException
    {`

    `         FacesContext.getCurrentInstance()`

    `            .addMessage(null, new FacesMessage("接口 - 监听器于 `

    `                "+new Date()+" 被调用"));`

    `      }`

    `}`


    在页面上使用此方法的方式如清单 3-68 所示。请注意，我们使用了 `type` 属性，它接受完整的类名作为字符串，而不是值表达式。使用这种方法，你无法访问此页面的属性。


    ***清单 3-68.** 使用 type 属性，该属性接受完整的类名作为字符串*


    `<a4j:commandButton value="更新 (接口)" render="out">`

    `   <f:actionListener`

    `      type="org.richfaces.book.actionlistener.YetAnotherListener"/>`

    `</a4j:commandButton>`


    现在你已经了解了所有三种方法，使用 `<a4j:actionListener>` 似乎是最直接的方式。你只需在受管 Bean 中定义一个监听器，然后通过标准的方法绑定表达式引用它即可。


    ![images](img/square.jpg) **提示** `<a4j:actionListener>` 标签支持所有 `<f:actionListener>`
    标签的属性和特性。


    ### 总结


    本章介绍了 RichFaces 在标准 JSF 基础上添加的一些最重要的升级。在本章中，我们向你展示了用于发送 Ajax 请求的其他 RichFaces 组件，例如
    `<a4j:commandButton>`、`<a4j:commandLink>`、`<a4j:poll>` 和 `<a4j:jsFunction>`。然后，我们介绍了高级渲染选项，例如使用
    `<a4j:outputPanel>` 组件和 `limitRender` 属性。


    在决定执行 JSF 视图的哪一部分时，RichFaces 通过提供 `<a4j:region>` 组件增加了另一个高级选项。RichFaces 通过高级功能和灵活的定制选项极大地升级了标准的
    JSF 队列。在下一章中，我们将继续 RichFaces 之旅，向你介绍富组件或 rich:* 标签库。


    ## 第 4 章


    ## 富组件入门


    既然我们已经介绍了 RichFaces 基础、a4j:* 标签、高级特性和定制，本章我们将开始学习富组件或 rich:* 标签库。我们不会在这里涵盖所有组件；其他章节会专门介绍。在本章中，我们将向你展示所有富组件共享的概念和通用特性。一些通用特性包括使用
    facet、组件 JavaScript API 和发送 Ajax 请求。一旦你掌握了这些概念，你将能够使用当前可用或未来 RichFaces 版本中引入的任何富组件。


    ### 富组件还是 Ajax 组件？


    如果你在问——我应该使用富组件还是 Ajax 组件？——这并不重要。它可以是其中一种，甚至两者兼有，只要我们理解我们在谈论什么。让我们以 `<rich:inplaceInput>`
    组件为例。该组件渲染为一个标签，如图 4-1 所示。


    ![images](img/0401.jpg)


    ***图 4-1.** 标签状态下的 <rich:inplaceInput>*


    当点击标签时，组件会切换到输入状态，如图 4-2 所示。


    ![images](img/0402.jpg)


    ***图 4-2.** 输入状态下的 <rich:inplaceInput>*


    这个组件是“富”的，因为它提供了丰富的 UI——或者说一种富有的输入方式。但同时，在幕后它只是一个普通的输入字段。这也能算作 Ajax 组件吗？可能可以。然而，重要的是要理解这个组件不会自动发送
    Ajax 请求。换句话说，当从标签切换到输入或从输入切换到标签时，不会发送任何 Ajax 请求。所有更改只会在客户端（浏览器）上发生。对此更合适的称呼可能是富客户端组件。现在，不要气馁，有一种方法可以从这个组件发送
    Ajax 请求，我们稍后会向你展示。


    因此，RichFaces（rich:* 标签库）中有一些组件是富客户端组件，但它们不发送 Ajax 请求。但是，还有其他富客户端组件确实会发送 Ajax 请求。一个这样的例子是
    `<rich:tabPanel>` 组件。换句话说，Ajax 行为（基于某些事件）是内置于它们之中的。


    既然我们更清楚地了解了具体要处理什么，让我们探索一下富组件共享的通用特性和概念。


    ### 富组件特性


    所有富组件都共享许多通用特性，如下所示：


    *   使用 facet 重新定义组件的部分内容

    *   发送 Ajax 请求

    *   使用组件客户端 JavaScript API

    *   触发客户端事件（可以将客户端行为附加到此类事件）

    *   皮肤


    ![images](img/square.jpg) **注意** 某些富组件可能不具备所有这些特性。要获取最新信息，请访问 RichFaces 文档页面：[`www.jboss.org/richfaces/docs`](http://www.jboss.org/richfaces/docs)。


    本书的第 13 章 深入介绍了皮肤。我们不会以同样的深度介绍其他三项的组件。这不是本章的目标。目标是向你展示所有富组件共享的重要概念。但是，同样，后续章节将更详细地介绍各种富组件。

