  ```\n\n#### 枚举类型的使用\n\n在 `Section` 类中，我们首次使用了 `enum`（枚举），正如你在第 13 章中学到的，这是定义有限符号值列表的绝佳方式。在这种特定情况下，我们希望定义一些状态码，供\
  \ `Section` 类在指示选课尝试结果时使用。\n\n我们在第 13 章中详细讨论了 `enum` 类型的语法。以下代码定义了四个符号值，分别代表选课尝试的四种不同结果——`success`、`secFull`、`prereq`\
  \ 和 `prevEnroll`——每个值都对应一个 `String` 值，如下所示：\n\n```\npublic enum EnrollmentStatus\
  \ {\n// 枚举该 enum 可以取的值。\nsuccess(\"选课成功！  :o)\"),\nsecFull(\"选课失败：课程已满。  :op\"),\n\
  prereq(\"选课失败：未满足先修课程要求。  :op\"),\nprevEnroll(\"选课失败：已注册过该课程。  :op\");\n// 表示 enum\
  \ 实例的值。\nprivate final String value;\n// 一种“构造函数”（如上使用）。\nEnrollmentStatus(String\
  \ value) {\nthis.value = value;\n}\n// enum 实例值的访问器。\npublic String value() {\n\
  return value;\n}\n}\n```\n\n让我们通过研究 `Section` 的 `enroll` 方法来了解这些值是如何被使用的。\n\n\n\n\
  #### enroll( )\n\n这是一个非常复杂的方法。我先完整列出代码而不进行讨论，然后再详细解释：\n\n```\npublic EnrollmentStatus\
  \ enroll(Student s) {\n// 首先，确保该学生尚未注册此教学班，\n// 并且他/她从未修读并通过该课程。\nTranscript transcript\
  \ = s.getTranscript();\nif (s.isCurrentlyEnrolledInSimilar(this) ||\ntranscript.verifyCompletion(this.getRepresentedCourse()))\
  \ {\nreturn EnrollmentStatus.prevEnroll;\n}\n// 如果该课程有任何先修课程，\n// 检查以确保学生已完成这些课程。\n\
  Course c = this.getRepresentedCourse();\nif (c.hasPrerequisites()) {\nfor (Course\
  \ pre : c.getPrerequisites()) {\n// 查看学生的成绩单是否反映\n// 已成功完成先修课程。\nif (!transcript.verifyCompletion(pre))\
  \ {\nreturn EnrollmentStatus.prereq;\n}\n}\n}\n// 如果总注册人数已经达到\n// 该教学班的上限，则拒绝此注册请求。\n\
  if (!this.confirmSeatAvailability()) {\nreturn EnrollmentStatus.secFull;\n}\n//\
  \ 如果代码执行到这里，我们就准备正式注册该学生。\n// 注意双向性：此教学班通过 HashMap 持有学生引用，\n// 然后该学生获得此教学班的句柄。\n\
  enrolledStudents.put(s.getSsn(), s);\ns.addSection(this);\nreturn EnrollmentStatus.success;\n\
  }\n```\n\n请注意，此方法的返回类型声明为 `EnrollmentStatus`——也就是说，我们将返回一个 `EnrollmentStatus enum`\
  \ 的实例，作为表示此次注册尝试结果的符号值。\n\n我们首先验证寻求注册的 `Student`（由参数表示）尚未注册此 `Section`，并且该学生过去***从未***修读并通过此\
  \ `Course`（任何 `Section`）。我们获取该 `Student` 的成绩单句柄，并将其存储在一个名为 `transcript` 的局部引用变量中，因为在此方法中我们需要两次查阅\
  \ `Transcript` 对象：\n\n```\npublic EnrollmentStatus enroll(Student s) {\n// 首先，确保该学生尚未注册此教学班，\n\
  // 并且他/她从未修读并通过该课程。\nTranscript transcript = s.getTranscript();\n```\n\n然后，我们使用一个\
  \ `if` 语句来测试两种情况之一：(a) 该 `Student` 当前是否已注册此 `Section` 或同一 `Course` 的其他 `Section`，和/或\
  \ (b) 该 `Student` 的 `Transcript` 是否表明此前已成功完成此 `Section` 所代表的 `Course`？\n\n```\n\
  if (s.isCurrentlyEnrolledInSimilar(this) ||\ntranscript.verifyCompletion(this.getRepresentedCourse()))\
  \ {\n```\n\n由于在此方法中我们只需要使用一次此 `Course` 对象，我们无需将 `getRepresentedCourse` 方法返回的句柄保存到变量中；我们只需将此方法的调用嵌套在\
  \ `verifyCompletion` 的调用中，这样前者可以检索到 `Course` 对象，并立即将其作为参数传递给后者。\n\n每当我们在此方法中途遇到\
  \ `return` 语句（就像这里一样），方法的执行将立即终止，而不会运行到结束：\n\n```\nreturn EnrollmentStatus.prevEnroll;\n\
  }\n```\n\n请注意我们使用 `EnrollmentStatus.prevEnroll`（`EnrollmentStatus enum` 定义的符号值之一）作为返回值。声明并使用此类标准化值是与客户端代码通信状态的好方法。\n\
  \n接下来，我们检查该 `Student` 是否已满足此 `Section` 的先修课程要求（如果有的话）。我们使用 `Section` 的 `getRepresentedCourse`\
  \ 方法获取此 `Section` 所代表的 `Course` 对象的句柄，然后在该 `Course` 对象上调用 `hasPrerequisites` 方法。如果返回的结果是\
  \ `true`，那么我们就知道存在需要检查的先修课程：\n\n```\n// 如果该课程有任何先修课程，\n// 检查以确保学生已完成这些课程。\nCourse\
  \ c = this.getRepresentedCourse();\nif (c.hasPrerequisites()) {\n```\n\n如果此 `Course`\
  \ 确实有先修课程，我们使用 `Course` 类定义的 `getPrerequisites` 方法获取所有先修 `Course` 的集合，并通过一个 `for`\
  \ 循环遍历此集合：\n\n```\nfor (Course pre : c.getPrerequisites()) {\n```\n\n对于从集合中提取的每个\
  \ `Course` 对象引用 `pre`，我们在该 `Student` 的 `Transcript` 对象上调用 `verifyCompletion` 方法，并将先修\
  \ `Course` 对象引用 `pre` 作为参数传入。我们尚未查看 `Transcript` 类的内部工作原理，因此目前我们只需要知道 `verifyCompletion`\
  \ 会在该 `Student` 确实成功修读并通过相关 `Course` 时返回 `true`；否则，它将返回 `false`。我们希望在先修课程***未***满足的情况下采取行动，因此我们在表达式前面使用一元否定运算符\
  \ (`!`) 来表示：如果方法调用返回 `false`，我们希望 `if` 测试成功：\n\n```\n// 查看学生的成绩单是否反映\n// 已成功完成先修课程。\n\
  if (!transcript.verifyCompletion(pre)) {\nreturn EnrollmentStatus.prereq;\n}\n}\n\
  ```\n\n如果发现学生未满足任何一项先修课程，则会触发 `return` 语句，并返回状态值 `EnrollmentStatus.prereq`。另一方面，如果我们通过了先修课程检查而未触发\
  \ `return` 语句，此方法中的下一步就是验证该 `Section` 是否仍有可用座位。如果没有，则返回状态值 `EnrollmentStatus.secFull`：\n\
  \n```\n// 如果总注册人数已经达到\n// 该教学班的上限，则拒绝此注册请求。\nif (!this.confirmSeatAvailability())\
  \ {\nreturn EnrollmentStatus.secFull;\n}\n```\n\n最后，如果我们***同时***通过了这两项测试而毫发无损，我们就准备正式注册该\
  \ `Student`。我们使用 `HashMap` 类的 `put` 方法将 `Student` 引用插入到 `enrolledStudents HashMap`\
  \ 中，并在 `Student` 上调用 `getSsn` 方法以检索其 `ssn` 属性的 `String` 值，并将其作为键值传入：\n\n```\nenrolledStudents.put(s.getSsn(),\
  \ s);\n```\n\n为了实现 `Student` 和 `Section` 之间链接的双向性，我们接着在 `Student` 对象引用上调用 `addSection`\
  \ 方法，并将***此*** `Section` 的句柄传递给它。然后我们返回值 `EnrollmentStatus.success` 以表示注册成功：\n\n\
  ```\ns.addSection(this);\nreturn EnrollmentStatus.success;\n}\n```\n\n#### drop( )\n\
  \n`Section` 的 `drop` 方法执行与 `enroll` 相反的操作。我们首先验证相关 `Student` 确实已注册此 `Section`，因为我们无法退选一个原本就没有注册的\
  \ `Student`：\n\n```\npublic boolean drop(Student s) {\n// 我们只能退选已注册的学生。\nif (!s.isEnrolledIn(this))\
  \ return false;\n```\n\n如果该学生确实已注册，我们使用 `HashMap` 类的 `remove` 方法，再次通过其 `ssn` 属性值来定位并删除\
  \ `Student` 引用：\n\n```\nelse {\n// 在 HashMap 中找到该学生并将其移除。\nenrolledStudents.remove(s.getSsn());\n\
  ```\n\n出于双向性的考虑，我们也在 `Student` 上调用 `dropSection` 方法，以移除链接***两端***的句柄：\n\n```\n//\
  \ 注意双向性。\ns.dropSection(this);\nreturn true;\n}\n}\n```\n\n\n\n#### postGrade( )\n\
  \n`postGrade` 方法用于通过创建一个 `TranscriptEntry` 对象，将 `Section` 与被分配成绩的 `Student` 关联起来，从而为\
  \ `Student` 分配成绩。\n\n我们首先通过调用 `TranscriptEntry` 类定义的 `static` 工具方法 `validateGrade`，来验证拟分配给\
  \ `Student s` 的 `grade`（`s` 和 `grade` 都作为参数传入 `postGrade` 方法）格式是否正确。管理何为“有效”成绩表示的业务规则都编码在该方法中；当我们稍后在本章探索\
  \ `TranscriptEntry` 类时，这些业务规则将会揭晓。目前，我们只需要知道，如果 `validateGrade` 方法通过返回 `false` 拒绝了拟分配的成绩，我们随即退出\
  \ `postGrade` 方法，并向客户端代码返回 `false`，以表示为 `Student s` 提交成绩的请求已被拒绝：\n\n```\npublic\
  \ boolean postGrade(Student s, String grade) {\n// 首先，通过调用 TranscriptEntry 类提供的工具方法，\n\
  // 验证成绩格式是否正确。\nif (!TranscriptEntry.validateGrade(grade)) return false;\n```\n\n\
  接下来，为了确保我们不会无意中尝试为同一个 `Student` 多次分配成绩，我们首先检查 `assignedGrades HashMap`，看它是否已经包含该\
  \ `Student` 的条目。如果对 `HashMap` 调用 `get` 方法返回的不是 `null`，那么我们就知道该 `Student` 已经有一个成绩被提交了，于是终止方法的执行，再次返回\
  \ `false`：\n\n```\n// 通过以该 Student 为键在 HashMap 中查找条目，\n// 确保我们之前没有为该 Student 分配过成绩。\n\
  // 如果发现成绩已被分配，我们返回 false 以表示\n// 我们存在覆盖现有成绩的风险。\n// （之后可以编写另一个方法 eraseGrade()，\n\
  // 允许教授改变主意。）\nif (assignedGrades.get(s) != null) return false;\n```\n\n假设之前没有分配过成绩，我们调用适当的构造函数来创建一个新的\
  \ `TranscriptEntry` 对象。正如我们稍后研究 `TranscriptEntry` 类的内部工作原理时会看到的，该对象将维护指向被分配成绩的 `Student`\
  \ 以及为其分配成绩的 `Section` 的句柄：\n\n```\n// 首先，我们创建一个新的 TranscriptEntry 对象。\n// 注意，我们传入了对\
  \ THIS Section 的引用，\n// 因为我们希望 TranscriptEntry 对象\n// 作为一个关联类...，能够维护指向 Section\
  \ 和 Student 的“句柄”。\n// （我们将让 TranscriptEntry 构造函数负责\n// 将此 T.E. 链接到正确的 Transcript。）\n\
  TranscriptEntry te = new TranscriptEntry(s, grade, this);\n```\n\n为了使后一个链接是双向的，我们还将\
  \ `TranscriptEntry` 对象的句柄存储到 `Section` 的 `assignedGrades HashMap` 中，用于此目的：\n\n```\n\
  // 然后，我们“记住”这个成绩，因为我们希望\n// T.E. 和 Section 之间的连接是双向的。\nassignedGrades.put(s, te);\n\
  return true;\n}\n```\n\n#### getGrade( )\n\n`getGrade` 方法使用作为参数传入此方法的 `Student`\
  \ 引用作为 `assignedGrades HashMap` 的查找键，以检索其中为该 `Student` 存储的 `TranscriptEntry`：\n\n\
  ```\npublic String getGrade(Student s) {\nString grade = null;\n// 从 assignedGrades\
  \ HashMap 中检索此特定学生\n// 关联的 TranscriptEntry 对象（如果存在），\n// 进而检索其分配的成绩。\nTranscriptEntry\
  \ te = assignedGrades.get(s);\n```\n\n如果找到了 `TranscriptEntry`，我们使用它的 `getGrade`\
  \ 方法来获取实际的成绩（作为 `String` 值），以便此方法可以返回它：\n\n```\nif (te != null) {\ngrade = te.getGrade();\n\
  }\n```\n\n否则，我们返回 `null` 以表示所关注的 `Student` 尚未被分配成绩：\n\n```\n// 如果没有找到此 Student 的\
  \ TranscriptEntry，\n// 将返回 null 值以表示此情况。\nreturn grade;\n}\n```\n\n#### confirmSeatAvailability( )\n\
  \n从 `enroll` 内部调用的 `confirmSeatAvailability` 方法是一个内部的“内务管理”方法。通过将其声明为 `private`\
  \ 而非 `public` 可见性，我们限制了它的使用，使得只有 `Section` 类的其他方法才能调用它：\n\n```\nprivate boolean\
  \ confirmSeatAvailability() {\nif (enrolledStudents.size() < this.getSeatingCapacity())\
  \ return true;\nelse return false;\n}\n```\n\n\n\n### 再探委托\n\n在讨论 `Student` 类时，我曾简要提及\
  \ `displayCourseSchedule` 方法，将其作为委托的一个复杂示例，并承诺稍后会回来进一步讨论。\n\n当一个对象通过执行其某个方法来响应服务请求时，它可以利用哪些“原材料”——即数据——呢？回顾一下，一个对象可以使用的数据源包括：\n\
  \n*   已***封装为属性***在对象内部的简单数据和/或对象引用（句柄）\n*   在方法签名中***作为参数传入***的简单数据和/或对象引用\n* \
  \  通过其他类的 `public static` 属性在应用程序中***全局***可用的数据\n*   可以从该对象拥有句柄的任何对象中***请求获取***的数据\n\
  \n正是这最后一种数据源——通过***与其他对象协作***获得的数据——将在为 `Student` 类实现 `displayCourseSchedule` 方法时发挥特别重要的作用。\n\
  \n假设我们希望 `displayCourseSchedule` 方法为 `Student` 当前注册的每个 `Section` 显示以下信息：\n\n```\n\
