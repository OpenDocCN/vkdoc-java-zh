- "# 8. 对象建模过程简述\n\n对象建模的“宏观”目标 建模方法论 = 过程 + 符号 + 工具 我推荐的对象建模过程简述 关于对象建模软件工具的思考 提醒\
  \ 总结\n\n让我们看看在本书引言中遇到的那位房屋建造者。他们刚刚参加完一个题为“蓝星：建筑师的梦想成真”的研讨会回来。他们现在了解了蓝星的独特属性，并明白了为什么它们是优越的建筑材料——就像你了解了软件对象作为应用程序“建筑材料”的独特属性一样。但他们仍然缺乏在实际建筑项目中使用蓝星的经验；特别是，他们还不知道如何为一座要用蓝星建造的房屋制定合适的蓝图。而我们仍然需要了解如何为将要由对象构建的软件系统制定“蓝图”。这正是本书第二部分的重点。\n\
  \n在本章中，你将学习：\n\n*   对象建模的目标和理念\n*   我们在选择或设计建模方法论方面有多大的灵活性\n*   对象建模软件工具的优缺点\n\n\
  ## 对象建模的“宏观”目标\n\n我们在对象建模中的目标是，为将要自动化的系统呈现一个精确、简洁、易于理解的面向对象模型，即“蓝图”。这个模型将作为一种重要的沟通工具：\n\
  \n*   ***对于我们将要构建的系统的未来用户而言，对象模型传达了我们对其需求的理解***。让用户审查并批准该模型将确保我们在项目开始时走上正轨，因为在需求分析阶段的一个判断错误，其修复成本可能比在系统还只是“用户眼中的一道微光”时发现并纠正这种误解要高出几个数量级。\n\
  \n*   ***对于软件开发团队而言，对象模型传达了为了满足这些需求而需要构建的软件的结构和功能***。这不仅有利于软件工程师本人，也有利于负责质量保证、测试和文档的人员。\n\
  \n*   在应用程序投入运行很久之后，对象模型作为“原理图”继续存在，***帮助众多负责支持和维护应用程序的人员理解其结构和功能***。\n\n    当然，最后一点只有在对象模型准确反映系统实际构建方式（而不仅仅是最初设想的方式）时才成立。复杂系统的设计在构建过程中不可避免地会发生变化，因此在系统构建过程中应注意保持对象模型的最新状态。\n\
  \n\n\n### 建模方法论 = 流程 + 符号 + 工具\n\n根据韦氏词典的定义，**方法论**是：\n\n*一门学科为达成特定预期结果而采用的一套系统性程序。*\n\
  \n无论是面向对象还是其他类型的建模方法论，理想情况下都包含三个组成部分：\n\n*   ***流程***：用于收集需求并确定待建抽象的“操作方法”步骤\n*\
  \   ***符号***：用于沟通模型的图形化“语言”\n*   ***工具***：以自动化方式呈现符号的手段，通常采用“拖放”模式\n\n尽管这些构成了建模方法论的理想组成部分，但它们的重要性并不等同：\n\
  \n*   遵循合理的***流程***无疑是至关重要的。\n*   然而，有时我们可以通过叙述性的文本描述来传达抽象概念，而不必诉诸于正式的图形化***符号***来描绘它。\n\
  *   并且，当我们***确实***选择通过图形化符号来正式描绘一个抽象概念时，使用专门的***工具***并非强制要求。\n\n换句话说，遵循有条理的流程是对象建模最关键的部分；使用特定的符号很重要，但次之；而我们选择何种特定工具来呈现模型，则是三者中最不重要的方面（见图\
  \ 8-1）。\n\n![](img/78624_3_En_8_Fig1_HTML.jpg)\n\n一段文字以不同字体样式和大小递减的顺序显示“流程加符号加工具”。\n\
  \n图 8-1\n\n在方法论的三个方面中，合理的流程是最重要的\n\n多年来，众多知名的方法学家在面向对象方法论领域做出了许多重要贡献，形式包括新的流程、符号和工具。从某种意义上说，如果你是第一次接触面向对象，你是幸运的，因为你避开了持续多年的“方法论战争”——在那场争论中，方法学家及其追随者们就某些情况下深奥的细节争论不休。\n\
  \n以下是过去几十年来在对象方法论领域做出贡献的部分列表；该列表不分先后顺序：\n\n*   ***詹姆斯·兰博等人***：对象建模技术 (OMT)\n*  \
  \ ***格雷迪·布奇***：布奇方法\n*   ***莎莉·施莱尔和斯蒂芬·梅勒***：强调状态图\n*   ***丽贝卡·沃夫斯-布洛克等人***：责任驱动设计，类-职责-协作者\
  \ (CRC) 卡片\n*   ***伯特兰·迈耶***：Eiffel 编程语言，按契约编程的概念\n*   ***詹姆斯·马丁和詹姆斯·奥德尔***：改造其功能分解方法论以适用于面向对象系统\n\
  *   ***彼得·科德和爱德华·尤登***：同上一条目\n*   ***伊瓦尔·雅各布森***：将用例作为形式化需求的手段\n*   ***德里克·科尔曼等人\
  \ (惠普)***：Fusion 方法\n*   ***埃里希·伽玛、理查德·赫尔姆、拉尔夫·约翰逊和约翰·弗利赛德斯（“四人帮”）***：设计模式复用\n\n\
  近年来，业界有一股强大的推动力，旨在将相互竞争的方法论中的最佳思想融合成一种统一的方法，尤其强调提出一种通用的建模符号。由此产生的符号被称为**统一建模语言**\
  \ (**UML**)，它代表了面向对象方法论领域三位领军人物——詹姆斯·兰博、格雷迪·布奇和伊瓦尔·雅各布森——的合作成果，并已成为行业标准的对象建模符号。（你将在第\
  \ 10 章和第 11 章学习 UML 的基础知识。）\n\n与 UML 一起，这三位在业界被亲切地称为“三剑客”的先生们，也为一种被称为**统一软件开发过程**\
  \ (**RUP**) 的整体方法论的发展做出了巨大贡献。RUP 是一种全面的软件开发方法论，涵盖了建模、项目管理和配置管理工作流程。但我不会在本书中详细讨论这种特定方法论的细节，因为我的目的不是教你任何一种***特定***方法论的细节。通过学习一种合理的、***通用***的对象建模流程，你将掌握所需的知识，能够阅读、评估和选择像\
  \ RUP 这样的特定方法论，或者通过混合搭配来自不同方法论中最适合你组织的流程、符号和工具，来打造你自己的混合方法。\n\n至于建模工具，严格来说，你不需要它也能理解本书提供的内容。但我预见到你很可能想“亲自动手”使用建模工具。因此，我将在本章稍后部分对建模工具的优缺点进行一般性讨论。\n\
  \n重要的是要记住，方法论只是达到目的的手段，而***目的***——一个可用、灵活、可维护、可靠且功能正确的软件系统，以及详尽、清晰的配套文档——才是我们归根结底最关心的。\n\
  \n为了帮助说明这一点，让我们用一个简单的类比。假设我们的目标是让人们开心起来。我们决定用铅笔（工具）手绘（流程）一个笑脸（期望行为的抽象，用图形符号呈现），如图\
  \ 8-2 所示。\n\n![](img/78624_3_En_8_Fig2_HTML.jpg)\n\n一张笑脸的示意图，上方有一只手持铅笔。它们分别标有符号和抽象、流程以及工具的标签。\n\
  \n图 8-2\n\n方法论包含流程、符号和工具\n\n完成后，我们放下画笔，将笑脸画挂在墙上，然后继续做我们的事。几天过去了，我们注意到人们确实被我们的画逗乐了，因此我们最初的目标实现了。事后看来，我们本可以通过以下方式实现同样的目标：\n\
  \n*   多种“流程”——手绘、橡皮图章、从杂志上剪下图片\n*   多种“符号”——笑脸的图形符号、卡通画、笑话或标志的叙述性文字\n*   多种“工具”——钢笔、铅笔、画笔、蜡笔\n\
  \n现在，回到我们建造房屋的类比。在建筑师和施工队带着他们的设备和工具离开建筑工地很久之后，他们建造的房子将依然矗立，作为他们所用材料质量、所采用施工方法的可靠性以及最初所拥有蓝图之优雅的证明。蓝图在日后需要改造或维护房屋时会派上用场，所以我们当然不会扔掉它；但房屋的“宜居性”以及维护的便利性/经济性将是衡量成功的主要标准。\n\
  \n软件开发也是如此：一个软件开发项目真正的遗产是最终产生的软件系统，毕竟，这正是我们首先使用方法论来创建模型的原因。我们必须注意，避免陷入争论一种方法论相对于另一种方法论的相对优点的泥潭，以至于未能生产出有用的软件。正如你在图\
  \ 8-3 中所见，通往同一个目的地有***许多***条路径。\n\n![](img/78624_3_En_8_Fig3_HTML.png)\n\n一幅展示到达终点不同路径的插图，文字为：流程、符号和工具的不同组合都能引导我们达到相同目标。图中有一个指向“我们的目标”的箭头指示牌。\n\
  \n图 8-3\n\n在构建软件时，许多不同的方法都能很好地为我们服务\n\n\n\n## 我推荐的对象建模流程简述\n\n在此，我简要预览一下我所倡导的建模流程，本书第二部分后续章节将对其进行深入阐述：\n\
  \n*   首先，获取或编写一份叙述性的问题陈述，类似于本书开头给出的学生注册系统（SRS）问题陈述，或附录中包含的备选案例研究问题陈述。思考将与系统交互的不同用户类别，以及他们各自使用系统的各种场景，以确保你发现任何可能被遗漏的、不那么明显的需求。（我将在第\
  \ 9 章讨论一种用于此目的的正式技术——称为**用例建模**。）\n\n*   通过识别应用程序需要关注的各类“现实世界”对象，并确定它们之间的相互关系，来处理应用程序的数据方面。（我将在第\
  \ 10 章阐述创建正式**类图**的过程。）\n\n*   通过研究对象如何协作以完成系统使命，确定每个类需要具备哪些行为/职责，来处理应用程序的功能方面。（我将在第\
  \ 11 章阐述对面向对象系统行为方面进行建模的过程。）\n\n*   测试模型，以确保它确实满足所有原始需求。（我将在第 12 章讨论测试模型。）\n\n在接下来的章节中，你将看到每种技术的丰富示例，并且你将有机会根据每章末尾建议的练习来实践这些技术。掌握了\
  \ SRS 的坚实模型后，你就可以准备将模型转换为 Java 代码，这是本书第三部分的主题。\n\n请注意，这些流程步骤不必严格按顺序执行。事实上，当你对每个步骤都驾轻就熟后，你可能会发现自己会并行或以打乱的顺序执行其中一些步骤。例如，思考模型的行为方面可能会揭示新的数据需求。实际上，对于除了最琐碎的模型之外的所有模型，通常都需要多次循环执行这些步骤，每次迭代都“调准”更深入的理解，从而在模型和支持文档中增加更多细节。\n\
  \n同样重要的是，流程的正式程度应根据项目团队的规模和需求的复杂性进行调整。如果我们把使用方法的***形式***与该方法产生的**工件**（模型、文档、代码等）的***实质***区分开来，那么一个好的经验法则是：项目团队应将不超过\
  \ 10%`–`20%的时间花在***形式***上，而将 80%`–`90%的时间花在***实质***上。如果团队发现在形式上花费了太多时间，以至于在实质上进展甚微或毫无进展，那么就该重新评估该方法及其各个组成部分，看看可以在哪些方面进行简化调整或提高效率。\n\
  \n### 关于对象建模软件工具的思考\n\n花点时间讨论使用对象建模软件工具的利弊是值得的。出于学习如何创建模型的目的，像 PowerPoint 这样的通用绘图工具可能就足够了；就此而言，你甚至可能只想用纸和笔来勾画你的模型。但是，获得使用专门为对象建模设计的工具的实际操作经验，将能让你更好地为你的第一个“工业级”项目做好准备，因此你可能希望在开始下一章之前获取一个这样的工具。\n\
  \n你可以通过互联网搜索“对象建模工具”或“UML 工具”，找到关于各种对象建模软件工具的信息，包括免费或评估版软件的链接。\n\n我习惯不在本书中提及具体的工具、供应商、版本等，因为它们变化太快了。一旦某个软件产品在印刷品中被提及，几乎可以肯定它要么会改名，要么会更换销售它的供应商，要么会完全消失。\n\
  \n对象建模工具属于**计算机辅助软件工程**（简称**CASE**）**工具**的范畴。CASE 工具为我们提供了许多优势，但也并非没有缺点。\n\n####\
  \ 使用 CASE 工具的优势\n\n支持使用 CASE 工具的理由有很多；以下几个更具说服力。\n\n##### 易于使用\n\nCASE 工具提供了一种快速的拖放方式来创建可视化模型。与使用通用绘图工具（其基本绘图组件是简单的线条、箭头、文本、方框和其他几何形状）费力地绘制特定符号不同，CASE\
  \ 工具提供了一个或多个预制的图形组件面板，这些组件特定于所支持的符号。例如，你可以拖放一个类的图形表示，而不必费力地用更简单的绘图组件来拼凑它。\n\n#####\
  \ 增加信息内容\n\nCASE 工具生成“智能”图形，这些图形强制执行特定符号的语法规则。这与通用绘图包形成对比，后者几乎允许你绘制任何你喜欢的东西，无论它是否符合符号语法。\n\
  \nCASE 工具施加的控制可能利弊参半：好处是，它们可以防止你犯语法错误，但正如我稍后讨论的那样，它们也可能阻止你对符号进行所需的调整。\n\n此外，图中反映的类的信息——它们的名称、属性、方法和关系——通常存储在图底层的存储库中。大多数\
  \ CASE 工具都提供基于此存储库的文档生成功能，使你能够自动生成项目文档，例如数据字典报告，这是一种我将在第 10 章讨论的报告类型。如果你有需要，有些工具甚至允许你以编程方式访问此存储库。\n\
  \n##### 自动代码生成\n\n大多数 CASE 工具都提供代码生成功能，使你只需按一下按钮，就能从图表过渡到 Java（或其他语言）的骨架代码。但是，你可能希望也可能不希望使用此功能，原因如下：\n\
  \n*   取决于 CASE 工具在生成代码结构方面给予你的控制程度，生成的代码可能无法满足团队/公司标准。\n\n*   对于大多数工具，你无法在工具外部编辑生成的代码，因为工具将“不知道”你所做的更改，这意味着下次生成代码时，你的更改将被覆盖和清除。\n\
  \n*   这对从其他项目重用代码也有影响：确保你选择的工具允许你导入和引入并非源自该工具的软件组件。\n\n有时，从头开始编写代码最终会更好，因为尽管一开始可能需要稍长的时间，但在项目的整个生命周期中，管理此类代码通常要容易得多，并且你可以避免为了持续的代码维护而“受制于”某个特定的建模工具。在最坏的情况下，工具供应商倒闭，你只能得到一个不受支持的产品，甚至可能是一个无法支持的项目。\n\
  \n\n\n##### 项目管理辅助工具\n\n许多 CASE 工具都提供某种形式的版本控制功能，使您能够维护同一模型的不同版本。如果您对模型进行了修改，但在与用户评审后决定恢复到之前的版本，只要启用了版本控制，操作起来就非常简单。\n\
  \nCASE 工具通常还提供配置管理/团队协作功能，使一组建模人员能够轻松共享并共同创建单个模型。\n\n#### 使用 CASE 工具的一些缺点\n\n然而，CASE\
  \ 工具并非没有缺点：\n\n*   ***CASE 工具可能价格昂贵***。高端 CASE 工具每个“席位”花费数百甚至数千美元的情况并不少见。***好消息是***，近年来，正如本章前面提到的，许多共享/免费的\
  \ UML 建模工具已经出现。\n\n*   ***CASE 工具有时可能不够灵活***。我在本书第二部分讨论了如何根据自身需求调整流程、符号和工具，但工具并不总是配合。在接下来的章节中，我会指出一些具体例子，说明在\
  \ CASE 工具允许的情况下，你可能希望稍微调整符号。\n\n*   ***你可能会面临被“锁定”在特定供应商产品中的风险***，如果所讨论的 CASE 工具无法以供应商中立的方式（例如，作为\
  \ XML）导出你的模型。\n\n*   ***很容易陷入重形式轻实质的误区***！这对于任何自动化工具都是如此——即使是文字处理器也往往诱使人们在文档的外观上花费过多时间，而在实质性内容早已稳固之后仍如此。\n\
  \n但总的来说，使用面向对象 CASE 工具的利远大于弊——请将这些弊端视为“明智之言”，指导你如何成功地将此类工具应用于建模工作。\n\n### 提醒\n\n\
  尽管我在本书中已经多次提到，但仍有必要提醒您：对象建模的过程是***语言无关的***。我在本书第一部分介绍了 Java 语法，因为最终目标是让你熟悉对象建模和\
  \ Java 编程。然而，在本书第二部分，我们将逐渐脱离 Java，因为我们现在所处的阶段，你将要学习的概念同样适用于 Java、Python、C#或任何其他面向对象编程语言。但别担心——我们将在第三部分“重磅”回归\
  \ Java。\n\n## 总结\n\n到目前为止，从本章中需要汲取的最重要教训如下：\n\n***不要陷入重形式轻实质的误区！***\n\n你生成的模型只是达到目的的一种手段……而你用来生成模型的流程、符号和工具只是达到这一目的的***手段***的手段。如果你过于纠结使用哪种符号、流程或工具，你可能会陷入“分析瘫痪”而原地打转。不要忘记你的最终目标：构建***可用、灵活、可维护、可靠、功能正确的软件系统。***\n\
  \n练习题\n\n1.  简要描述你在最近一个软件开发项目中使用的**方法论**——包括流程、符号和工具。这种方法论的哪些方面对你和你的队友效果良好？事后看来，你认为哪些方面本可以更有效地处理？\n\
  \n2.  研究本章前面“建模方法论 = 流程 + 符号 + 工具”部分提到的其中一种对象建模技术/方法，并简要报告所涉及的流程、符号和工具。\n\n"
- "# 9. 通过用例形式化需求\n\n什么是用例？ 功能性需求与技术性需求 让用户参与 参与者 识别参与者并确定其角色 绘制系统及其参与者图 详细说明用例 将用例与参与者匹配\
  \ 画图还是不画图？ 总结\n\n当你准备出发去度假时，你可能会在脑海中或纸上列一个清单，以确保为出发做好了充分准备。你带齐了所有需要带的东西吗？你带得***太多***了吗？你安排好了暂停相关服务（报纸、邮件投递等）吗？你安排好人给植物浇水、喂宠物鼠了吗？一旦踏上旅途，你希望享受旅程，并知道当你回到家时，不会有任何灾难在等着你。\n\
  \n这与软件开发项目并无不同：在着手开发之前，我们需要整理一份系统必须提供的功能清单，以便项目顺利进行，并确保在系统交付时不会造成灾难（以未满足的需求和不满意的客户/用户的形式出现）。\n\
  \n需求分析的艺术与科学——因为它确实两者皆是！——是一个如此广泛的课题，以至于可以专门用一整本书来讨论。有一种特别的技术用于发现和完善需求，称为**用例建模**，它是\
  \ Rational 统一过程（RUP）的基石，值得你考虑。用例并非严格意义上的面向对象方法论的产物；它们可以为任何软件系统准备，无论将使用何种开发方法论。然而，它们是在对象系统的背景下首次出现在软件开发社区中，并在此背景下获得了广泛普及。\n\
  \n在本章中，你将学习\n\n*   我们必须如何预见用户在与我们未来系统交互时将扮演的所有不同角色\n\n*   我们必须站在每个用户的角度来描述软件应用程序作为一个整体需要提供的服务\n\
  \n*   如何准备用例，以此记录所有用户的集体需求\n\n我还会为你提供关于需求分析的足够背景知识，以便为用例建模提供合适的上下文。\n\n## 什么是用例？\n\
  \n在确定系统所需的功能时，我们必须寻求以下问题的答案：\n\n*   ***谁***（按用户类别划分）会想要使用我们的系统？\n\n*   系统需要提供哪些***服务***才能对每类用户有价值？\n\
  \n*   当用户出于特定目的与系统交互时，他们对***期望结果***的预期是什么？\n\n**用例**是表达这些问题答案的自然方式。每个用例都是一个简单的陈述，可以是叙述性或图形化的形式，描述系统的特定目标或结果以及谁期望该结果。例如，SRS\
  \ 的一个目标是“使学生用户能够注册课程”，这样我们就表达了第一个用例！（是的，用例确实就是这么直接。事实上，我们***需要***它们如此直接，以便系统的用户/赞助商能够理解，我们稍后会进一步讨论这一点。）\n\
  \n\n\n### 功能需求与技术需求\n\n深入思考系统的所有用例，其目的在于全面探索系统的功能需求，以确保不会忽略某一特定类别的用户或系统的潜在用途。我们区分功能需求与技术需求如下。\n\
  \n**功能需求**是指从系统使用者的角度来看，系统应如何运作或发挥功能的那些方面。功能需求又可细分为：\n\n*   ***“目标导向型”功能需求***：这类需求陈述了系统的目的，而不考虑该需求在用户视角下将如何“展开”——例如，“系统必须能够生成可定制的报告。”在指定目标导向型需求时，应避免讨论实现细节**。**\n\
  \n*   ***“外观与体验”需求***：这类需求在用户期望系统外在表现（例如，图形用户界面如何呈现）以及用户期望其如何行为方面更为具体，同样是从用户的角度出发。例如，我们可能有一个需求：“用户将点击主图形用户界面上的一个按钮，然后会出现一条确认消息……”一个好的做法是编写一份**运行概念**文档，作为“纸质原型”，描述您设想的未来系统将如何呈现和运作，以便在您开始建模之前，就能与尚未建成的系统的目标用户进行讨论。\n\
  \n在准备用例时，我们强调目标导向型功能需求**。**\n\n另一方面，**技术需求**更多地涉及系统***如何***在内部构建，以***满足***功能需求；例如，“系统将使用\
  \ TCP/IP 协议……”或“我们将使用字典集合作为跟踪学生的手段……”我们可以将这些视为程序员应如何着手处理***解决方案***的需求，这与功能需求（即对***待解决问题***的陈述）形成对比。\n\
  \n诸如此类的技术需求在用例分析中不起作用。\n\n尽管系统的用户可能具备技术素养，但最好以即使对计算机内部工作原理一无所知的用户也能理解的方式来表达功能需求。这有助于确保技术需求不会渗入功能需求陈述中，这是许多缺乏经验的软件开发人员常犯的错误。当我们允许技术需求影响功能需求时，它们会在开发生命周期中过早地人为限制问题的解决方案。\n\
  \n### 让用户参与\n\n由于系统的目标用户最了解他们需要系统做什么，因此让他们参与用例定义过程至关重要。如果目标用户（作为个体）尚未被具体定义或招募（例如对于将要商业销售的软件产品），则仍需通过识别具有类似经验的人员作为“用户代理”来考虑他们的预期需求。理想情况下，用户或用户代理将自行编写部分或全部用例；至少，您需要采访这些人，代表他们编写用例，然后获得他们的确认，证明您所写的内容确实是准确的。\n\
  \n用例是软件开发项目生命周期中最早出现的可交付成果/工件之一，但也是确保系统成功而最后被充分利用的东西之一。\n\n事实证明，它们作为编写测试脚本的基础非常有用，可以确保在系统和用户验收测试期间所有功能线程都得到执行。\n\
  \n它们还有助于准备**需求追溯矩阵**——即一份最终检查清单，用户可据此验证在系统交付时，他们所有的初始需求是否确实都已得到满足。\n\n回到本节开头提出的问题，让我们回答第一个问题——即“谁（哪类用户）会想要使用我们的系统？”——在用例术语中，这被称为识别**参与者**。\n\
  \n## 参与者\n\n**参与者**代表在系统建成后将要与之交互的任何个人或事物；参与者驱动用例。参与者通常分为两大类：\n\n*   人类用户\n\n* \
  \  其他计算机系统\n\n“交互”通常被定义为使用系统来实现某些结果，但也可以简单地理解为 (a) 向系统提供/贡献信息和/或 (b) 从系统接收/消费信息。\n\
  \n***提供***信息，我指的是参与者是否输入了实质性的信息，这些信息增加了系统存储的集体数据——例如，系主任定义一门新课程，或学生注册他们的学习计划。这不包括用户为了查询信息而必须提供的相对琐碎的信息——例如，输入学生\
  \ ID 以请求其成绩单。\n\n***消费***信息，我指的是参与者是否使用系统来获取信息——例如，教职员工打印他们将要教授的课程的学生名册，或学生在线查看他们的课程表。\n\
  \n\n\n### 识别参与者并确定其角色\n\n我们必须为系统相关的各类用户所扮演的每一种不同角色创建一个参与者。要识别这些角色，我们通常首先查阅**叙事性需求规格说明**（如果存在的话），即功能需求的陈述，例如学生注册系统的规格说明。该规格说明明确提及的用户类别只有学生用户。因此，我们肯定会将“学生”视为\
  \ SRS 的参与者类型之一。\n\n然而，如果我们跳出规格说明的局限进行思考，不难发现其他可能从使用 SRS 中受益的潜在用户类别：\n\n*   **教师**可能希望了解即将教授的某门课程有多少学生注册，或者他们可能使用该系统提交最终成绩，这些成绩会相应地反映在学生的成绩单上。\n\
  \n*   **系主任**可能希望了解各门课程的受欢迎程度，或者反之，判断某门课程是否因学生群体缺乏兴趣而应被取消。\n\n*   **注册处工作人员**可能希望使用\
  \ SRS 来验证某位特定学生是否预计能在特定学期满足毕业要求。\n\n*   **校友**可能希望使用 SRS 来申请获取其成绩单副本。\n\n*   **潜在学生**——即那些正在考虑申请入学但尚未提交申请的人——可能希望浏览即将在下一学期开设的课程，以帮助他们判断该大学的课程设置是否符合自己的兴趣。\n\
  \n*   等等。\n\n同样，由于我之前提到其他计算机系统也可以作为参与者，我们可能需要在 SRS 与大学中其他现有的自动化系统之间构建接口，例如：\n\n\
  *   **计费系统**，以便根据学生当前的课程负荷进行准确计费。\n*   **教室排课系统**，以确保根据学生人数将课程分配到容量足够的教室。\n*   **招生系统**，以便在新学生被录取并有资格注册课程时通知\
  \ SRS。\n\n当然，我们必须尽早决定待构建系统的范围，以避免“需求膨胀”或“范围蔓延”。试图容纳之前假设的所有参与者将导致一项庞大的工程，对系统的赞助方来说可能成本过高。例如，为潜在学生提供使用\
  \ SRS 预览大学课程设置的功能是否合理？或者是否有另一个不同的系统——比如某种在线课程目录——更适合此目的？通过与所有预期用户群体进行深入访谈，可以恰当地界定系统范围，而我们设想的一些参与者可能会因此被排除。\n\
  \n在我们的具体案例中，我们假设 SRS 的赞助方已决定，在构建系统时无需满足校友或潜在学生的需求——也就是说，我们无需将校友或潜在学生视为参与者。这里的关键点是，此类决定由赞助方做出，***而非程序员***！软件工程师的职责之一确实是识别需求，并且该职责的一部分当然可能包括提出软件工程师认为对用户有益的功能改进建议。但系统赞助方对最终构建的内容拥有最终决定权。\n\
  \n许多软件工程师之所以陷入困境，是因为他们自认为比客户更了解用户的真正需求。你或许确实有绝妙的想法可以提出，但请将其仅仅视为一个***建议***，并将你的任务视为要么说服赞助方/用户接受其价值，要么优雅地接受他们拒绝你建议的决定。\n\
  \n请注意，同一用户可能在不同场合以不同角色与系统交互。也就是说，一位担任系主任的教授在试图决定某门课程是否应被取消时，可能扮演“系主任”参与者的角色。或者，同一位教授在希望查询\
  \ SRS 以了解其正在教授的某门课程的学生人数时，可能扮演“教师”用户的角色。\n\n\n\n### 绘制系统及其参与者图表\n\n一旦我们确定了系统的参与者，就可以选择绘制图表。UML\
  \ 符号要求将所有参与者——无论是人类用户还是计算机系统——都表示为火柴人，然后通过直线将它们连接到代表系统的矩形，如图 9-1 所示。\n\n![](img/78624_3_En_9_Fig1_HTML.png)\n\
  \n一个由 7 个火柴人组成的图表映射到一个标有“S R S”的方块上。这些火柴人分别标注为学生、教师、系主任、注册员、计费系统、招生系统和教室调度系统。\n\n\
  图 9-1\n\n一个“规范的”UML 用例图\n\n这个图看起来相当简单，然而，对于像 SRS 开发这样的项目来说，这确实是一个可以生成的合理图表。\n\n\
  我倾向于使用略微修改过的 UML 符号版本，具体如下：\n\n*   我扩展了矩形的用途，不仅用它来表示核心系统，也用它来表示所有作为外部系统的参与者，而不是将后者表示为人类火柴人。\n\
  \n*   我发现使用箭头来反映信息的流向——即参与者是提供信息还是消费信息——更具传达性。例如，在如下修改后的符号版本中，我将学生表示为既提供信息又消费信息，而注册员仅消费信息。\n\
  \n    请注意，注册员确实也提供信息，但不是直接提供给 SRS。他们向招生系统提供关于哪些学生在大学注册的信息；然后这些信息由招生系统输入 SRS。因此，招生系统被显示为作为参与者向\
  \ SRS 提供信息；但从 SRS 的角度来看，注册员仅仅是一个消费者。\n\n通过这些符号上的细微改动，如图 9-2 所示，用例图变成了一个更具传达性的工具。\n\
  \n![](img/78624_3_En_9_Fig2_HTML.jpg)\n\n一个由学生、教师、系主任和注册员四个火柴人组成的图表，通过一个标有“S R S”的方块与计费系统、招生系统和教室调度系统的方块相互连接。\n\
  \n图 9-2\n\n用例符号的自定义版本\n\n当然，如果你决定偏离像 UML 这样广泛理解的符号标准，你需要遵循以下步骤：\n\n1.  在你的软件开发同事之间达成共识，确保整个团队使用相同的语言。\n\
  \n2.  将此类偏离（连同整个符号体系）记录并传达给你的客户/用户，以便他们也能理解你特定的“方言”。\n\n3.  确保此类文档被纳入项目的完整文档集，以便未来的文档审阅者能立即理解你的符号“修饰”。\n\
  \n然而，如果你让这些增强足够直观，它们可能不言自明。\n\n当然，正如第 8 章所指出的，你还需要考虑你正在使用的 CASE 工具（如果有的话）是否支持此类修改。\n\
  \n在本书第二部分的各个章节中，我会反复提醒你：调整或扩展你选择采用的任何流程、符号或工具，以最好地适应你公司或项目的目的，是完全可接受的；这些方法论组件中没有一个是“神圣不可侵犯的”。\n\
  \n## 指定用例\n\n在初步确定了 SRS 的参与者之后，接下来我们将列举这些参与者将如何使用系统的各种方式——换句话说，就是用例本身。\n\n一个用例代表一个逻辑“线程”，或一系列因果事件，始于参与者与系统的首次接触，止于该参与者最初使用系统的目标达成。请注意，参与者总是发起一个用例；系统代表自身发起的操作不值得开发一个用例（尽管它们确实值得作为功能需求或技术需求来表达，正如本章前面所定义的）。\n\
  \n用例强调系统“要做什么”——即功能需求——而不关心这些功能在内部“如何”实现，在这方面它们与方法签名并无不同。事实上，你可以将用例视为整个系统的“行为签名”。\n\
  \nSRS 的一些高级用例示例可能包括：\n\n*   注册一门课程。\n*   退选一门课程。\n*   确定学生的课程负荷。\n*   选择一位指导教师。\n\
  *   制定学习计划。\n*   查看课程表。\n*   请求某门课程的学生名单。\n*   请求某位学生的成绩单。\n*   维护课程信息（例如，更改课程描述、反映不同的授课教师等）。\n\
  *   确定学生的毕业资格。\n*   发布某门课程的期末成绩。\n\n请记住，用例是由参与者发起的，这就是为什么我没有将 SRS 需求规范中提到的其他功能（例如“通过电子邮件通知学生”）列为用例的原因。\n\
  \n我们可以将任何一个用例分解为多个步骤，每个步骤代表一个更详细的用例。例如，“注册一门课程”可以分解为以下步骤：\n\n1.  验证学生是否已满足先修课程要求。\n\
  2.  检查学生的学习计划，确保该课程是必修课。\n3.  检查课程是否有空余座位。\n4.  （可选）将学生列入候补名单。\n5.  等等。\n\n用例之间可以以父子关系相互关联，更详细的用例可以被多个通用用例共享。例如，“请求学生名单”和“发布期末成绩”这两个通用用例都可能涉及更详细的“验证教授正在教授该课程”这一用例。\n\
  \n不幸的是，与所有需求分析一样，没有神奇的公式可以应用来判断你是否已经识别出所有重要的用例或所有参与者，以及/或者你是否在子用例方面达到了足够的深度。用例开发的过程是迭代的；当后续迭代未能产生实质性变化时，你可能就完成了！与用户进行大量的访谈和评审，以及定期对整个用例集进行团队走查，对于确保没有遗漏任何重要内容大有裨益。\n\
  \n\n\n## 将用例与参与者对应起来\n\n下一步重要的工作是将用例与参与者对应起来。参与者和用例之间的关系可能是多对多的，即同一个参与者可能发起多个不同的用例，而一个用例也可能与多个不同的参与者相关。通过将参与者与用例进行交叉引用，我们可以确保：\n\
  \n*   我们不会识别出那些最终对系统毫无用处的参与者。\n*   反之，我们也不会指定那些最终无人关心的用例。\n\n对于每个用例-参与者组合，确定参与者是消费信息还是提供信息是很有用的。从另一个角度来看待系统的这一方面，就是判断参与者是需要对系统信息资源进行写入访问（提供信息），还是只拥有只读访问权限（消费信息）。\n\
  \n如果参与者和/或用例的数量不算太多，可以使用一个简单的表格（例如表 9-1）来总结上述所有内容。\n\n**表 9-1**\n\n**一种简单的参与者/用例交叉引用技术**\n\
  \n| 发起参与者 ==> | 学生 | 教师 | 计费系统 | 等等 |\n| --- | --- | --- | --- | --- |\n| 用例： |\
  \  |  |  |  |\n| **注册课程** | 提供信息 | 不适用 | 不适用 |  |\n| **发布最终成绩** | 消费信息 | 提供信息 |\
  \ 不适用 |  |\n| **申请成绩单** | 消费信息 | 消费信息 | 不适用 |  |\n| 等等 |  |  |  |  |\n\n## 画图还是不画图？\n\
  \n用例的概念相当直接，因此本章到目前为止所看到的简单叙述性文本通常足以表达用例。然而，UML 确实提供了一种正式的方法来绘制用例图及其与参与者的交互。如前所述，参与者（无论是人还是系统）用火柴人表示；用例用椭圆表示，椭圆下方用简短的短语描述该用例；而包围椭圆的方框代表系统边界。\n\
  \n图 9-3 展示了一个示例 UML 用例图。在这里，我们描绘了三个参与者——学生、教师和注册员——他们各自都有机会参与到“申请成绩单”这个用例中。\n\n\
  ![](img/78624_3_En_9_Fig3_HTML.jpg)\n\n一个包含学生、教师和注册员三个火柴人的图表，映射到一个“申请成绩单”的方框上。\n\
  \n**图 9-3**\n\n**一个示例 UML 用例图**\n\n在决定是否要费心绘制用例图，而不是仅仅用叙述形式表达它们时，请回想一下最初创建用例的理由：即，梳理软件开发团队对系统需求的理解，然后与用户/赞助方沟通以达成共识。由你、你的项目团队以及你的用户/赞助方来决定图表是否能增强这个过程。如果能，就使用它们；如果不能，就改用叙述性的用例文档。\n\
  \n一旦你记录了系统的参与者和用例，无论是仅通过文本还是附带了图表，这些都将成为定义待自动化问题的核心文档集的一部分。在下一章中，我们将探讨如何以这类文档为起点，来确定我们需要创建和实例化哪些类，作为系统的“构建块”。\n\
  \n## 总结\n\n在本章中，你了解到：\n\n*   用例分析是一种简单而强大的技术，用于更精确、更完整地指定系统需求。\n*   用例基于系统的目标导向功能需求。\n\
  *   用例用于描述：\n    *   待构建系统的期望行为/功能\n    *   使用这些服务的外部用户或系统（称为参与者）\n    *   两者之间的交互\n\
  \n**练习题**\n\n1.  确定可能适用于附录中讨论的处方跟踪系统（PTS）案例研究的参与者。\n2.  针对你在第 1 章练习 3 中定义其需求的问题领域，确定哪些是合适的参与者。\n\
  3.  基于附录中的 PTS 规范，列出 (a) 规范中明确要求的用例，以及 (b) 你认为值得与系统未来用户探讨的任何额外用例。\n4.  重复练习 3，但针对你在第\
  \ 1 章练习 3 中定义其需求的问题领域。\n5.  创建一个表格，将你在练习 1 中为 PTS 确定的参与者映射到你在练习 3 中为 PTS 列出的用例，并指明特定参与者在某个用例中是作为信息提供者还是消费者。\n\
  6.  创建一个表格，将你在练习 2 中确定的参与者映射到你在练习 4 中列出的用例，并指明特定参与者在某个用例中是作为信息提供者还是信息消费者。\n\n\n\n"
- "# 10. 系统静态/数据方面的建模\n\n识别合适的类 名词短语分析 精炼候选类列表 重新审视用例 生成数据字典 确定类之间的关联 关联矩阵 识别属性 UML\
  \ 表示法：对抽象的静态方面进行建模 类、属性和操作 类之间的关系 反映多重性 对象/实例图 作为属性的关联 信息沿关联“管道”“流动” 关系表示法的“混合与匹配”\
  \ 关联类 我们“已完成”的学生注册系统类图 元数据 总结\n\n在第 9 章中，我们运用用例分析技术完善了学生注册系统（SRS）的需求规格说明，现在已准备好进入下一阶段的建模，即确定如何以面向对象的方式满足这些需求。\n\
  \n我们在本书的第一部分看到，对象构成了面向对象系统的基本构建块，而类则是用于定义和实例化对象的模板。因此，一个面向对象模型必须指定以下内容：\n\n*   ***我们需要创建和实例化哪些类型的对象，以表示正确的抽象***：具体来说，包括它们的属性、方法以及彼此之间的结构关系。由于面向对象系统的这些元素一旦建立，就相当静态——就像一栋房子一旦建成，就有特定的布局、一定数量的房间、特定的屋顶轮廓线等等——我们通常将这个过程称为准备**静态模型**。\n\
  \n当然，随着时间的推移，我们可以通过进行翻新项目来改变房子的静态结构，就像随着新需求的出现，我们可以通过派生新的子类、为现有类发明新方法等来改变面向对象软件系统的静态结构一样。然而，如果一个结构——无论是房屋还是软件系统——从一开始就设计得当，那么在其生命周期内，进行此类更改的需求应该相对较少出现，并且不应过于难以适应。\n\
  \n*   ***这些对象将如何协作，以完成系统的整体需求或“使命”***：对象交互的方式实际上可能根据生效的环境而随时变化。前一时刻，一个`Course`对象可能正在注册一个`Student`对象，下一时刻，它可能正在响应一个`Professor`对象关于当前学生人数的查询。我们将详细描述对象协作的过程称为准备**动态模型**。可以将其想象成房屋中发生的所有不同的日常活动：结构相同，功能不同。\n\
  \n静态模型和动态模型只是同一枚硬币的两面：它们共同构成了面向对象的“蓝图”，我们将在本书第三部分实现面向对象的学生注册系统应用程序的模型层时，以此为基础进行工作。\n\
  \n在本章中，我们将重点构建 SRS 的静态模型，而将动态模型的讨论留到第 11 章。你将学习\n\n*   一种识别合适类及其属性的技术\n\n*   如何确定这些类之间存在的结构关系\n\
  \n*   如何使用 UML 表示法以**类图**的形式图形化地呈现这些信息\n\n## 识别合适的类\n\n我们在对象建模中的第一个挑战是确定需要哪些类作为系统的构建块。不幸的是，类识别的过程相当“模糊”；它在很大程度上依赖于直觉、先前的建模经验，以及对要开发的系统主题领域或**领域**的熟悉程度。那么，一个对象建模新手究竟***如何***开始呢？一种经过验证（但有些繁琐）的识别候选类的过程是使用“搜寻与收集”方法：即从项目文档集中搜寻并收集所有名词/名词短语的列表，然后使用排除法将这个列表精简为一组合适的类。\n\
  \n就 SRS 而言，到目前为止，我们的文档集包括以下内容：\n\n*   需求规格说明\n\n*   我们在第 9 章中准备的用例模型\n\n\n\n###\
  \ 名词短语分析\n\n首先，让我们对 SRS 需求规格说明书进行名词短语分析，该说明书最初出现在本书的引言中，其副本见下方侧边栏。所有名词短语均以粗体突出显示。\n\
  \n**在 SRS 规格说明书中突出显示名词短语**\n\n我们被要求为**大学**开发一套**自动化学生注册系统**（**SRS**）。该**系统**将使**学生**能够每**学期**在线注册**课程**，并跟踪他们完成**学位**的**进度**。\n\
  \n当**学生**首次在**大学**注册时，他们使用**SRS**制定一份**学习计划**，说明他们计划修读哪些**课程**以满足特定的**学位项目**，并选择一位**指导教师**。**SRS**将验证所提议的**学习计划**是否满足该**学生**所寻求的**学位要求**。\n\
  \n一旦**学习计划**确定，那么在每**学期**之前的**注册期间**，**学生**可以在线查看**课程安排**，并选择他们希望参加的**课程**，如果该**课程**由不止一位**教授**授课，还需指明**首选教学班**（**星期几**和**一天中的时间段**）。**SRS**将通过查阅该**学生**的在线**成绩单**（包含**已修课程**和**已获成绩**）来验证该**学生**是否已满足每门**申请课程**的必要**先修条件**（**学生**可随时在线查看其**成绩单**）。\n\
  \n假设 (a) **申请课程**的**先修条件**已满足，(b) **课程**符合**学生**的**学习计划要求**之一，并且 (c) 每门**课程**均有**空位**，则该**学生**将被注册到这些**课程**中。\n\
  \n如果 (a) 和 (b) 满足，但 (c) 不满足，则该**学生**将被列入**先到先得**的**候补名单**。如果**他们之前被列入候补名单的课程/教学班**变得有空位（要么因为其他**学生**退掉了该**课程**，要么因为该**课程**的**座位容量**增加了），该**学生**将自动注册到该**候补课程**，并且一封相关**电子邮件**将发送给该**学生**。如果不再需要该**课程**，**学生**有**责任**退掉它；否则，该**学生**将被收取该**课程**的费用。\n\
  \n**学生**可以在**课程授课学期的第一周结束**之前退掉一门**课程**。\n\n一个简单的电子表格是记录我们初步发现的理想工具；我们按照名词短语在规格说明书中出现的顺序，将其作为单列列表输入。暂时不必担心去重或合并同义词；我们稍后会进行这些操作。生成的电子表格部分内容如图\
  \ 10-1 所示。\n\n![](img/78624_3_En_10_Fig1_HTML.jpg)\n\n一张 Excel 表格的截图，显示了包含 25 个单词和短语的\
  \ A 列。其中一些单词包括系统、学生、课程、学期和学位。一些短语包括学习计划、学位要求、课程安排和指导教师。\n\n图 10-1\n\n在 SRS 规格说明书中找到的名词短语\n\
  \n我们正在处理一份非常简洁的需求规格说明书（大约 350 个单词），但这个过程已经显得非常繁琐！除非规格说明书极其简单，否则要对其进行详尽的名词短语分析是不可能的。如果你面对一份冗长的需求规格说明书，请先撰写一份不超过几页的“执行摘要”，用以概括系统的使命，然后使用这份摘要版本的规格说明书作为你名词调查的起点。以这种方式改写规格说明书还有一个额外的好处，即确保你已经通读了系统需求并理解了“全局图景”。当然，你需要与你的客户/用户一起审查你的摘要叙述，以确保你准确捕捉了所有关键点。\n\
  \n在我们将所有名词/名词短语输入电子表格后，我们对电子表格进行排序并删除重复项；这包括删除单数术语的复数形式（例如，删除“students”，保留“student”）。我们希望所有类名在最终分析中都是单数形式，因此如果在去重后列表中仍有任何复数形式（例如“prerequisites”），我们也将其改为单数。这样一来，我们的\
  \ SRS 列表长度缩减至 38 项，如图 10-2 所示。\n\n![](img/78624_3_En_10_Fig2_HTML.jpg)\n\n一张 Excel\
  \ 表格的截图，显示了包含 38 个单词和短语的 A 列。其中一些单词包括班级、完成、课程和结束。一些短语包括自动化学生注册系统、先到先得候补名单和学习计划要求。\n\
  \n图 10-2\n\n删除重复项精简了名词短语列表\n\n请记住，我们试图识别物理对象和概念对象：正如第 3 章所述，“**思想、情感或行动所指向的某种精神或物质实体**”。现在让我们再进行一轮筛选，以排除以下内容：\n\
  \n*   对系统本身的引用（“自动化学生注册系统”、“SRS”、“系统”）。\n*   对大学的引用。因为我们是在单一大学的背景下构建 SRS，大学在某种意义上“位于外部”并“包围着”SRS；我们不需要在\
  \ SRS 内部操作关于大学的信息，因此我们可以从候选类列表中排除术语“university”。\n\n但请注意，如果我们正在构建一个需要跨越多个大学的系统——例如，一个比较全国前\
  \ 100 所大学信息技术研究生学习项目的系统——那么我们确实需要将每所大学建模为一个独立的对象，在这种情况下，我们会将“university”保留在候选类列表中。\n\
  \n*   其他似乎不符合对象定义的杂项术语，包括“completion”、“end”、“progress”、“responsibility”、“registration\
  \ period”和“requirements of the degree”。诚然，其中一些术语存在争议，尤其是最后两个；为了保险起见，你可能希望创建一个被排除术语的列表，以便在建模生命周期的后期重新审视。\n\
  \n结果，列表缩减至 27 项，如图 10-3 所示——现在开始变得易于管理了！\n\n![](img/78624_3_En_10_Fig3_HTML.jpg)\n\
  \n一张 Excel 表格的截图，显示了包含 27 个单词和短语的 A 列。其中一些单词包括班级、课程、学位项目和学位。一些短语包括他或她之前被列入候补名单的班级和他或她之前被列入候补名单的教学班。\n\
  \n图 10-3\n\n进一步精简 SRS 名词短语列表\n\n\n\n下一轮处理稍显棘手。我们需要将明显的同义词分组，从每组同义词中选出最适合作为类名的术语。让领域专家参与建模团队对此步骤至关重要，因为要准确判断某些术语的细微语义差别并进行合理分组，并非易事。\n\
  \n我们将看似同义的术语归为一组，如图 10-4 所示，**加粗**显示每组同义词中我们倾向于优先选择的术语。*斜体* 词表示尚未识别出同义词的术语。\n\n\
  ![](img/78624_3_En_10_Fig4_HTML.jpg)\n\n一张 Excel 表格的截图，展示了包含 27 个单词和短语的表格的 A 列。这些单词和短语按班级、课程、成绩单、学位、教授和学习计划进行分组。\n\
  \n图 10-4\n\n同义词分组\n\n现在，我们来回顾一下做出这些选择的理由。\n\n只要可能，我们优先选择等效表达中的较短形式——用“degree”代替“degree\
  \ program”，用“plan of study”代替“plan of study requirements”——以使模型更加简洁。\n\n尽管“transcript”本身并非严格意义上的同义词，但其概念隐含了“已修课程”和“已获成绩”的记录，因此我们暂时舍弃后两个名词短语。\n\
  \n在选择候选类名时，应避免选用暗示对象之间**角色**的名词。如第 5 章所学，角色是指属于类 `A` 的对象因其与类 `B` 对象的关系/关联而具有的属性。例如，当一位教授通过“指导”关联与学生相关联时，该教授便承担了“指导教师”的角色。即使这位教授失去了所有指导的学生，从而失去了“指导教师”的角色，他/她仍然是教授——因为受雇于大学这一事实是固有的，是此人相对于\
  \ SRS 的本质属性。\n\n如果一位教授失去了大学的工作，有人可能会争辩说他/她不再是教授；但这样一来，此人也不会再与 SRS 有任何关联，因此这已无关紧要。\n\
  \n基于此，我们更倾向于将“Professor”而非“Faculty Advisor”作为候选类名，但需在脑海中记下：当我们后续考虑关联关系时，“faculty\
  \ advisor”将是一个很好的潜在关联名称。\n\n关于“课程”的概念，我们看到收集了大量名词短语，它们都以某种形式指代一门课程：“class”、“course”、“preferred\
  \ section”、“requested course”、“section”、“prerequisite”、“waitlisted class”、“class\
  \ that they were previously waitlisted for”、“section that they were previously waitlisted\
  \ for”。在这一组中，隐含了多个角色：\n\n*   “Waitlisted class”及其多种变体，暗示了 `Student` 与 `Course` 之间关联中的角色。\n\
  *   “Prerequisite”暗示了两个 `Course` 之间关联中的角色。\n*   “Requested course”暗示了 `Student`\
  \ 与 `Course` 之间关联中的角色。\n*   “Preferred section”暗示了 `Student` 与 `Course` 之间关联中的角色。\n\
  \n排除所有这些角色名称后，我们只剩下三个术语：“class”、“course”和“section”。在仓促地将它们视为同义词并只保留一个之前，让我们仔细思考一下我们试图表示的现实世界概念。\n\
  \n*   我们通常与术语“course”关联的概念是：一系列持续整个学期的讲座、作业、考试等，这些都与特定学科领域相关，并且是获得学位的教育单元。例如，“基础数学”是一门课程。\n\
  *   另一方面，术语“class”和“section”通常指在**特定**学期、一周中的特定日期和一天中的特定时间开设的***特定***课程。例如，Math\
  \ 101 课程将在即将到来的春季学期开设三个班级/教学班：\n    *   教学班 1，周二下午 4:00 至 6:00 上课。\n    *   教学班\
  \ 2，周三下午 6:00 至 8:00 上课。\n    *   教学班 3，周四下午 3:00 至 5:00 上课。\n\n因此，`Course` 与 `Class`/`Section`\
  \ 之间存在一对多的关联。同一门课程在给定学期内可能开设多次，并在课程的“生命周期”内跨越多个学期开设。\n\n因此，“course”和“class/section”确实代表了不同的抽象概念，我们将在候选类列表中保留***两者***。然而，由于“class”和“section”似乎是同义词，我们需要选择一个术语并舍弃另一个。我们最初的倾向是保留“class”并舍弃“section”，但为了避免在引用名为\
  \ `Class` (!) 的类时产生混淆，我们最终选择使用“section”。\n\n\n\n### 精炼候选类列表\n\n候选类列表已初具雏形。以下是我们剩余的“精简列表”（请暂时忽略末尾的符号\
  \ [*, +]——稍后我会解释它们的含义）：\n\n*   Course（课程）\n\n*   Day of week*（星期*）\n\n*   Degree*（学位*）\n\
  \n*   Email message+（电子邮件消息+）\n\n*   Plan of study（学习计划）\n\n*   Professor（教授）\n\n\
  *   Room*（房间*）\n\n*   Schedule of classes+（课程表+）\n\n*   Seating capacity*（座位容量*）\n\
  \n*   Section（教学班）\n\n*   Semester*（学期*）\n\n*   Student（学生）\n\n*   Time of day*（时段*）\n\
  \n*   Transcript（成绩单）\n\n*   (First-come, first-served) Waitlist（（先到先得）候补名单）\n\n\
  然而，并非所有这些候选类都能最终存活到最终模型中，因为我们将对每一个候选类进行非常严格的审查，然后才判定其是否值得作为类来实现。判断一个项目是否能独立成为一个类的经典测试是提出以下问题：\n\
  \n*   我们能否为这个类想到任何***属性***？\n\n*   我们能否想到属于这个类的对象应具备的任何***服务***？\n\n一个例子是“房间”这个术语。我们可以创建一个\
  \ `Room` 类，如下所示：\n\n```\npublic class Room {\n// 属性。\nint roomNo;\nString building;\n\
  int seatingCapacity;\n// 等等。\n}\n```\n\n或者，我们可以简单地将房间位置表示为 `Section` 类的一个 `String`\
  \ 属性：\n\n```\npublic class Section {\n// 属性。\nCourse offeringOf;\nString semester;\n\
  char dayOfWeek;  // 'M', 'T', 'W', 'R', 'F'\nString timeOfDay;\nString classroomLocation;\
  \ // 建筑名称和房间名称：例如，\n// \"创新大厅 333 室\"\n// 等等。\n}\n```\n\n哪种表示房间的方法更可取？这完全取决于房间是否需要成为我们应用程序的焦点。如果\
  \ SRS 还打算用作教室排课系统，那么我们可能确实希望实例化 `Room` 对象，以便能够要求它们执行诸如打印每周使用计划或告知我们其座位容量等服务。然而，由于这些服务并未在\
  \ SRS 规范中被提及为需求，我们将选择将 `Room` 从候选类中剔除，而是将房间标识作为 `Section` 类的一个简单 `String` 属性。不过，我们保留以后改变主意的权利；在建模工作的生命周期中，某些项目在“作为独立类”与“表示为其他类的简单属性”之间“反复摇摆”的情况并不少见。\n\
  \n对前面候选类列表中所有标有星号 (*) 的项目采用类似的思路，我们将选择将它们全部视为属性，而不是将它们作为独立的类：\n\n*   “星期”将被整合为 `Section`\
  \ 类的一个 `String` 或 `char` 属性。\n\n*   “学位”将被整合为 `Student` 类的一个 `String` 属性。\n\n* \
  \  “座位容量”将被整合为 `Section` 类的一个 `int` 属性。\n\n*   “学期”将被整合为 `Section` 类的一个 `String`\
  \ 属性。\n\n*   “时段”将被整合为 `Section` 类的一个 `String` 属性。\n\n在初次建模一个应用程序时，我们希望完全专注于功能需求，而排除技术需求，正如第\
  \ 9 章所定义的那样；这意味着我们需要避免陷入系统如何在后台运行的技术细节。理想情况下，我们希望只关注所谓的**领域类**——即最终用户能够识别并代表“现实世界”实体的抽象——并避免引入任何仅用作后台“脚手架”来支撑应用程序的额外类，这些类也称为**实现类**或**解空间类**。后者的例子包括创建一个集合对象来组织并维护对系统中所有\
  \ `Professor` 对象的引用，或者使用一个字典来提供一种基于关联的学生 ID 号快速查找特定 `Student` 对象的方法。我们将在本书的第 3 部分详细讨论解空间对象；目前，前面候选类列表中标记有加号\
  \ (+) 的项目——“电子邮件消息”、“课程表”——似乎更像是实现类而非领域类：\n\n*   电子邮件消息通常是一种短暂的数据，类似于在使用应用程序时屏幕上出现的弹出消息。一封电子邮件消息从\
  \ SRS 发送出去后，一旦收件人阅读，我们就无法控制该邮件是被保留还是删除。SRS 不太可能归档所有已发送电子邮件的副本——当然也没有这样的需求——因此，在分析的这个阶段，我们不会费心将它们建模为对象。\n\
  \n*   电子邮件消息将在第 11 章中再次出现，届时我们将讨论 SRS 应用程序的行为，因为发送电子邮件消息无疑是一个重要的行为；但电子邮件并不构成应用程序的重要结构部分，因此我们不想在建模过程的这个阶段为它们引入一个类。当我们实际开始编写系统程序时，我们可能确实会在\
  \ Java 中创建一个 `EmailMessage` 类，但它不需要被建模为领域类。（另一方面，如果我们正在为构建一个电子邮件消息系统而建模，那么 `EmailMessage`\
  \ 确实可能成为我们模型中的一个关键领域类。）\n\n*   对于课程表，我们可以选择两种方式——将其作为候选类包含在内，或将其从列表中删除。课程表作为一个单一对象，可能不是用户会直接操作的东西，但在后台会有某种课程表集合的概念，用于控制在给定学期学生注册时，哪些\
  \ `Section` 对象应作为 GUI 选择列表呈现给用户。我们现在将 `ScheduleOfClasses` 从候选类列表中省略，但随着模型的演进，我们当然可以重新审视这个决定。\n\
  \n判断一个候选类究竟是领域类还是实现类，诚然是一个灰色地带，前面任何一个被“否决”的候选类，都可以通过有力的论证被纳入或排除在 SRS 的核心领域类列表之外。事实上，整个识别类的练习希望能阐明一个最初在第\
  \ 2 章中引入的概念；由于其重要性，在此以侧边栏的形式再次重复。\n\n对象建模的挑战\n\n为软件系统开发一个合适的模型或许是软件工程中最困难的方面，因为\n\
  \n***存在无限的可能性***。抽象在某种程度上是见仁见智的：几个独立工作的不同观察者几乎肯定会得出不同的模型。谁的模型最好？激烈的争论随之而来！\n\n\n\
  好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\n\n更复杂的是，**几乎从来不存在唯一“最佳”或“正确”的模型**，只有相对于待解决问题而言“更好”或“更差”的模型（包括不正确的模型）。同一情境可以用多种同样有效的方式来建模。\n\
  \n最后，不存在“决定性测试”来判断一个模型是否**充分捕获了用户的所有需求。**\n\n随着我们继续进行 SRS 建模练习，特别是当我们从建模过渡到本书第三部分的实现时，我们将有很多机会重新思考我们在此做出的决定。需要记住的关键点是，在我们真正开始编程之前，模型并非“一成不变”，即使开始编程后，如果我们明智地使用了对象，模型也可以相当轻松地进行修改，以处理大多数新需求。把模型想象成由建模粘土塑形而成：在项目的分析和设计阶段，我们将以敏捷的方式不断重塑它，直到我们对结果感到满意为止。\n\
  \n与此同时，回到为 SRS 提出候选类列表的任务上来。经过最新一轮的审查，幸存下来的术语如下：\n\n*   `Course`\n*   `PlanOfStudy`\n\
  *   `Professor`\n*   `Section`\n*   `Student`\n*   `Transcript`\n*   `WaitList`\n\
  \n让我们最后一次审视一下 `WaitList`。SRS 确实有一个需求，即维护学生在先到先得等待列表中的位置。但事实证明，这个需求实际上可以通过 `Student`\
  \ 和 `Section` 类之间的关联，再加上一种称为**关联类**的东西（你将在本章后面了解到）的组合来处理。这对于初学者来说可能不是显而易见的，因此我们完全预料到\
  \ `WaitList` 类可能会作为建议的 SRS 类进入最终名单。但我们假设团队中有一位经验丰富的对象建模师，他说服我们删除了这个类；当我们完成本章末尾的\
  \ SRS 类图时，我们会发现这是一个合适的举措。\n\n因此，基于我们对 SRS 规格说明的名词短语分析，我们确定以下类列表：\n\n*   `Course`\n\
  *   `PlanOfStudy`\n*   `Professor`\n*   `Section`\n*   `Student`\n*   `Transcript`\n\
  \n### 重新审视用例\n\n在我们认为类列表可以确定之前，还需要做一件事，那就是重新审视我们的用例——特别是参与者——看看**这些**中是否有任何一个应该被添加为类。你可能还记得，我们在第\
  \ 9 章中为 SRS 确定了七个潜在的参与者：\n\n*   Student\n*   Faculty\n*   Department Chair\n*  \
  \ Registrar\n*   Billing System\n*   Admissions System\n*   Classroom Scheduling\
  \ System\n\n**这些参与者中，是否有任何一个值得在 SRS 中被建模为类？** 以下是判断方法：如果与任何参与者类型 `A` 关联的任何用户在登录\
  \ SRS 时需要操作（访问或修改）关于参与者类型 `B` 的信息，那么 `B` 就需要作为类包含在我们的模型中。这最好通过几个例子来说明：\n\n*   当学生登录\
  \ SRS 时，他们是否需要操作关于教职员工的信息？是的，例如，当学生选择导师时，他们可能需要查看各种教职员工的信息，以便选择合适的导师。所以，**Faculty\
  \ 参与者角色必须在 SRS 中表示为一个类**；事实上，我们已经指定了一个 `Professor` 类，所以我们已经覆盖了这一点。但学生用户本身并不关心系主任。\n\
  *   按照同样的逻辑，**我们需要将 Student 参与者角色表示为一个类**，因为当教授登录 SRS 时，他们将操作 `Student` 对象，例如打印课程名册或为学生分配成绩。由于\
  \ `Student` 已经出现在我们的候选类列表中，因此我们也覆盖了这一点。\n*   当**任何**参与者——教职员工、学生、注册官、计费系统、招生系统或教室调度系统——访问\
  \ SRS 时，他们中是否有任何人需要操作关于注册官的信息？不需要，至少根据我们目前看到的 SRS 需求是不需要的。因此，**我们不需要将 Registrar\
  \ 参与者角色建模为一个类。**\n*   **计费、招生和教室调度系统也是如此**：它们需要“幕后”访问 SRS 管理的信息，但登录 SRS 的任何人都不期望能够直接操作这三个系统中的任何一个，因此**它们不需要在\
  \ SRS 中用领域类来表示。**\n\n再次强调，当我们用代码实现 SRS 时，我们可能会发现创建“解决方案空间”的 Java 类来表示与其他自动化系统的接口是合适的；但这样的类不属于\
  \ SRS 的**领域**模型。\n\n因此，在重新审视所有参与者角色后，我们提出的候选类列表保持不变：\n\n*   `Course`\n*   `PlanOfStudy`\n\
  *   `Professor`\n*   `Section`\n*   `Student`\n*   `Transcript`\n\n这是一个“完美”的列表吗？不，没有这样的东西。事实上，在一切尘埃落定之前，这个列表可能会——而且实际上很可能会——以以下方式演变：\n\
  \n*   我们以后可能会添加类：那些我们从规格说明中剔除的术语，或者甚至没有出现在规格说明中，但通过持续调查我们会发现的术语。\n*   我们可能会看到泛化的机会——也就是说，我们可能会在两个或多个类各自的属性、方法或与其他类的关系中发现足够的共性，从而有必要创建一个共同的基类。\n\
  *   此外，如前所述，我们可能会重新考虑将某些概念表示为简单属性（学期、教室等）而不是完整类的决定，反之亦然。\n\n正如本章迄今为止所展示的，候选类列表的开发充满了不确定性。因此，在开始你的第一个对象建模工作时，让团队中有经验丰富的对象建模师可用是非常重要的。大多数有经验的建模师不会使用名词短语分析这种机械的方法来推导候选类列表；这些人可以大致审查一下规格说明，然后直接挑出重要的类，就像专业珠宝商可以轻松地从一堆假宝石中挑出真钻石一样。然而，“重要”到底意味着什么？这就是“模糊性”所在。精确定义什么使一个概念重要而另一个不那么重要是不可能的。我试图通过处理\
  \ SRS 示例来说明一些经验法则，但最终你需要一位合格的导师来指导你，直到你培养出——并信任——自己对这类事情的直觉。\n\n然而，底线是，即使是专家级的建模师，也无法真正确认一个给定候选类的适当性，除非他们在完整类图的上下文中看到其提议的用途，该图还反映了关联、属性和方法，我们将在本章后面以及第\
  \ 11 章中探讨这些内容。\n\n\n\n## 生成数据字典\n\n在分析工作的早期，明确并开始记录术语的使用至关重要。**数据字典**正是为此目的而设计的理想工具。对于每个候选类，数据字典应包含该条目在整个模型/系统上下文中的简单定义；如果有助于说明定义，可以附上示例。\n\
  \n以下侧边栏展示了我们迄今为止完整的 SRS 数据字典。\n\nSRS 数据字典，第一版：类定义\n\n*   ***课程：*** 一系列持续一整个学期的讲座、作业、考试等，所有这些都围绕特定学科领域，通常对应特定学分数，是攻读学位的一个学习单元。例如，“面向对象入门”是信息技术理学硕士学位的必修**课程**。\n\
  \n*   ***学习计划：*** 学生为满足特定学位的**课程**要求而计划修读的**课程**列表。\n\n*   ***教授：*** 负责教授**教学班**或指导**学生**的教职员工。\n\
  \n*   ***教学班：*** 特定**课程**在特定学期、特定星期几和特定时间段的开设安排（例如，**课程**“面向对象入门”在 2025 年春季学期每周一\
  \ 1:00 至 3:00 下午授课）。\n\n*   ***学生：*** 当前在大学注册，并有资格注册一个或多个**教学班**的人员。\n\n*   ***成绩单：***\
  \ 记录特定**学生**在该大学迄今为止修读的所有**课程**的文件，包括每门**课程**的修读学期、所获成绩、授予的学分，以及所获总学分和该**学生**的平均绩点（GPA）。\n\
  \n请注意，一个术语的定义中包含一个或多个其他术语是允许的，实际上也是鼓励的；当我们这样做时，后者会用**粗体文本**突出显示。\n\n数据字典与其他 SRS\
  \ 叙述性文档一起，成为关于模型的后续信息来源。随着模型的演进，我们将扩展字典，使其包含属性、关联和方法的定义。\n\n在表示某个类的 Java 代码中，将该类的字典定义作为头部注释也是一个好主意。不过，请确保此内联文档与外部字典定义保持同步。\n\
  \n## 确定类之间的关联\n\n一旦我们确定了初始候选类列表，下一步就是确定这些类如何相互关联。为此，我们回到叙述性文档集（现已包含 SRS 需求规格说明、用例和数据字典），这次重点研究***动词***短语。我们研究动词短语的目标是选择那些暗示结构关系的短语，正如我们在第\
  \ 5 章中定义的——关联、聚合和继承——但排除或忽略那些表示（瞬态）动作或行为的短语。（我们将在第 11 章从用例的角度关注行为。）\n\n例如，规格说明指出学生“选择一位指导教授”。这确实是一个动作，但该动作的结果是教授与学生之间持久的结构关系，可以通过关联“一位`教授`\
  \ *指导* 一位`学生`”来建模。\n\n作为学生的指导教授，教授还会与学生见面、回答学生的问题、推荐学生修读的课程、批准学生的学习计划等——这些是教授扮演指导角色时的行为，但不会直接导致对象之间形成任何新的关系。\n\
  \n让我们在需求规格说明上尝试动词短语分析方法。所有相关的动词短语都在下面的侧边栏中突出显示（请注意，我忽略了诸如“我们被要求开发一个自动化的 SRS……”等明显不相关的动词短语）。\n\
  \n在 SRS 规格说明中突出显示动词短语\n\n我们被要求为大学开发一个自动化的学生注册系统（SRS）。该系统将**使学生能够在线注册课程**每学期，并**跟踪他们完成学位的进度**。\n\
  \n当学生首次**在大学注册**时，他们使用 SRS 来**制定学习计划**，说明他们**计划修读哪些课程**以**满足特定学位课程的要求**，并**选择一位指导教授**。SRS\
  \ 将**验证拟定的学习计划是否满足该学生所寻求学位的要求**。\n\n一旦**学习计划已制定**，那么在每学期之前的注册期间，学生可以**在线查看课程安排**并**选择他们希望参加的任何课程，指明首选的教学班**（星期几和一天中的时间），如果该**课程由不止一位教授授课**。SRS\
  \ 将**通过查阅学生的在线成绩单**（课程完成情况和所获成绩）来**验证学生是否已满足每门申请课程的必要先修条件**（**学生可以随时在线查看他们的成绩单**）。\n\
  \n假设 (a) **所申请课程的先修条件已满足**，(b) **课程符合学生学习计划的要求之一**，并且 (c) **每门课程中都有空位**，则**学生将被注册到这些课程中**。\n\
  \n如果 (a) 和 (b) 满足，但 (c) 不满足，则**学生将被列入先到先得的候补名单**。如果**他们之前被列入候补名单的课程/教学班变得有空位**（要么是因为其他**学生已退课**，要么是因为**该课程的座位容量已增加**），则**学生将自动注册到候补课程中**，并且**一封电子邮件**通知**会发送**给学生。如果不再需要该课程，学生有责任**退课**；否则，**他们将被收取该课程的费用**。\n\
  \n**学生可以退课**，截止日期为**该课程授课**学期的第一周结束前。\n\n让我们仔细分析其中几个：\n\n\n\n*   ***“学生[...]注册[...]课程”***：虽然注册行为本身是一种动态行为，但其最终结果是在`Student`和`Section`之间建立了一种静态关系，正如关联“一个`Student`*注册*一个`Section`”所表示的那样。请注意，规范中提到的是注册“课程”（courses），而非“教学班”（sections），但正如我们在数据字典中所述，`Student`注册的是具体的`Section`，这些`Section`是`Course`的具体体现。在审查规范时请记住，自然语言往往不够精确，因此我们必须揣摩作者在每个案例中的真实意图。（如果我们自己来编写规范，那么这里就有一个激励，即尽可能让语言清晰简洁。）\n\
  \n*   ***“[学生跟踪]其学位完成进度”***：同样，这是一种行为，但它仍然暗示了`Student`和`Degree`之间的结构关系。然而，回想一下，我们并未选择将`Degree`表示为一个类——我们选择将其反映为`Student`类的一个简单`String`属性——因此，这个建议的关系对于我们已开发的候选类列表来说是无足轻重的。\n\
  \n*   ***“学生首次在大学注册入学”***：这是一种行为，其结果是`Student`与`University`之间建立了静态关系；但我们认为“大学”这个概念在系统外部，因此选择不在我们的模型中创建`University`类。所以，我们也忽略了这个动词短语。\n\
  \n*   ***“[学生]制定学习计划”***：这是一种行为，其结果是建立了静态关系“一个`Student`*遵循/执行*一个`Plan of Study`”。\n\
  \n*   ***“学生可以在线查看课程表”***：这严格来说是 SRS 的一种瞬时行为；此操作不会产生持久的关系，因此我们忽略了这个动词短语。\n\n*  \
  \ 以此类推。\n\n### 关联矩阵\n\n另一种用于确定和记录类之间应存在何种关系的补充技术是创建一个***n*** × ***n***的**关联矩阵**，其中***n***代表我们已识别的候选类数量。用类的名称标记行和列，如下表\
  \ 10-1 所示的空矩阵。\n\n表 10-1\n\nSRS 的“空”关联矩阵\n\n|   | `Section` | `Course` | `PlanOfStudy`\
  \ | `Professor` | `Student` | `Transcript` |\n| --- | --- | --- | --- | --- | ---\
  \ | --- |\n| `Section` |   |   |   |   |   |   |\n| `Course` |   |   |   |   |  \
  \ |   |\n| `PlanOfStudy` |   |   |   |   |   |   |\n| `Professor` |   |   |   |\
  \   |   |   |\n| `Student` |   |   |   |   |   |   |\n| `Transcript` |   |   |  \
  \ |   |   |   |\n\n然后，按如下方式完成矩阵。\n\n在矩阵的每个单元格中，列出你能识别出的、位于行首的类与位于列首的类之间的所有关联。例如，在表\
  \ 10-2 中高亮显示的、`Student`“行”与`Section`“列”交叉处的单元格中，我们列出了三种潜在的关联：\n\n*   一个`Student`*被列入候补名单*于一个`Section`。\n\
  *   一个`Student`*已注册*一个`Section`。（这也可以表述为“一个`Student`*当前正在参加*一个`Section`。”）\n*  \
  \ 一个`Student`*之前已修过*一个`Section`。如果我们计划维护一个学生在其学习生涯中所有修过课程的历史记录，那么这第三种关联就很重要，而如果我们想在线生成学生的成绩单，就必须这样做。（事实证明，我们只需一个关联就能“一肩挑两职”，涵盖后两种关联，你将在本章后面看到这一点。）\n\
  \n如果所讨论的类之间没有已知的关系，或者类之间的潜在关系不相关，则用×标记该单元格。例如，在表 10-2 中，代表`Professor`和`Course`交叉点的单元格被标记为×，尽管存在一种可能的关联——“一个`Professor`*有资格教授*一个`Course`”——但这与\
  \ SRS 的任务无关。\n\n如第 4 章所述，所有关联本质上都是双向的。这意味着，如果第*j*行、第*k*列的单元格指示了一个或多个关联，那么第*k*行、第*j*列的单元格应反映这些关系的互逆关系。例如，由于`PlanOfStudy`“行”与`Course`“列”的交叉点指示“一个`PlanOfStudy`*要求*一个`Course`”，那么`Course`“行”与`PlanOfStudy`“列”的交叉点必须指示“一个`Course`*被*一个`PlanOfStudy`*所要求*”。\n\
  \n陈述关联的互逆关系并不总是很实用；例如，我们的关联矩阵显示“一个`Student`*计划修读*一个`Course`”，但试图陈述其互逆关系——“一个`Course`*被*一个`Student`*计划修读*”——就相当别扭。在这种情况下，如果互逆关联的表述会很别扭，只需用符号✓表示其存在即可。\n\
  \n表 10-2\n\n我们完成的关联矩阵\n\n|   | `Section` | `Course` | `PlanOfStudy` | `Professor`\
  \ | `Student` | `Transcript` |\n| --- | --- | --- | --- | --- | --- | --- |\n| `Section`\
  \ | × | *实例* | × | *由...教授* | ✓ | *包含于* |\n| `Course` | ✓ | *先修条件* | *被...要求* |\
  \ × | ✓ | × |\n| `PlanOfStudy` | × | *要求* | × | × | *被...遵循* | × |\n| `Professor`\
  \ | *教授* | × | × | × | *指导, 教授* | × |\n| `Student` | *已注册, 候补名单, 之前已修过* | *计划修读*\
  \ | *遵循* | *受...指导, 师从* | × | *拥有* |\n| `Transcript` | *包含* | × | × | × | *属于* |\
  \ × |\n\n我们稍后将用图形形式来描绘这些关联。现在，让我们回过头来扩展我们的数据字典，以解释这些关联各自意味着什么。下面的侧边栏展示了这样一个例子。\n\
  \nSRS 数据字典补充内容\n\n**要求**（一个学习计划要求一门课程）：为了证明一名**学生**将满足其选定学位课程的要求，该**学生**必须制定一个**学习计划**。这个**学习计划**列出了该**学生**打算修读的所有**课程**，并可能指定该**学生**希望在哪个学期完成每门**课程**。\n\
  \n\n\n## 识别属性\n\n为了确定每个领域类应具有哪些属性，我们需要再次仔细阅读需求规格说明书，从中寻找线索。在之前从候选类列表中剔除部分名词/名词短语时，我们已经偶然发现了一些属性：\n\
  \n*   对于`Section`类，我们识别出“星期几”、“教室”、“座位容量”、“学期”和“时间段”作为属性。\n*   对于`Student`类，我们识别出“学位”作为属性。\n\
  \n在为类分配属性时，我们还可以运用任何关于该领域的先验知识。例如，根据我们对大学运作方式的了解，可以推断所有学生都需要某种学号作为属性，即使这在 SRS 规格说明书中并未提及。这是一个需要返回向最终用户确认的细节。\n\
  \n最后，我们还可以研究现有遗留系统中类似信息的表示方式，以此作为确定类属性的线索。例如，如果大学中已存在一个基于关系数据库设计的学生计费系统，我们可能希望研究存储学生信息的关系数据库表结构。该表中已有的列——如姓名、地址、出生日期等——都是潜在的属性选择。\n\
  \n## UML 表示法：对抽象概念的静态方面建模\n\n现在，我们对模型的静态方面有了更深入的理解，可以准备以图形方式呈现这些内容，以补充我们为 SRS 编写的叙述性文档。我们将使用\
  \ UML 来生成**类图**。以下是模型各方面应如何表示的规则。\n\n### 类、属性和操作\n\n我们将类表示为矩形。当我们首次构思一个类时——在知道其任何属性或方法之前——只需将类名放入矩形中，如图\
  \ 10-5 所示。\n\n![](img/78624_3_En_10_Fig5_HTML.png)\n\n一个标有“学生”的矩形块被另一个深色阴影的矩形块包围。\n\
  \n图 10-5\n\n`Student`类的 UML 表示\n\n***抽象***类通过将类名以斜体呈现来表示，如图 10-6 所示。\n\n![](img/78624_3_En_10_Fig6_HTML.png)\n\
  \n一个标有“人”的矩形块被另一个深色阴影的矩形块包围。\n\n图 10-6\n\n抽象类的 UML 表示\n\n当我们需要反映类的属性和行为时，我们将类矩形划分为三个**隔间**——类名隔间、属性隔间和操作隔间——如图\
  \ 10-7 所示。注意，UML 倾向于使用“操作”而非“方法”的术语，以强调该图旨在独立于编程语言。\n\n![](img/78624_3_En_10_Fig7_HTML.png)\n\
  \n一个矩形块分为三个部分，每部分包含一组文本。从上到下依次为：类名、属性隔间和操作隔间。\n\n图 10-7\n\n类矩形被划分为三个隔间\n\n某些 CASE\
  \ 工具在首次创建类时，会自动显示所有三个（空的）隔间，即使我们尚未指定任何属性或操作，如图 10-8 所示。\n\n![](img/78624_3_En_10_Fig8_HTML.png)\n\
  \n一个矩形块被分为三个部分，顶部标有“学生”。\n\n图 10-8\n\n某些 CASE 工具呈现的另一种 UML 类表示\n\n当我们开始确定特定类需要哪些属性和/或操作时，我们可以根据需要以或多或少的细节将这些内容添加到图中。\n\
  \n我们可以选择仅列出属性名称（见图 10-9），或者指定其名称及类型（见图 10-10）。\n\n![](img/78624_3_En_10_Fig10_HTML.png)\n\
  \n一个矩形块水平分为三个部分。顶部标有“学生”，中间部分提供了姓名、SSN、出生日期和 GPA 的数据类型。底部部分为空白。\n\n图 10-10\n\n有时同时显示属性名称和类型\n\
  \n![](img/78624_3_En_10_Fig9_HTML.png)\n\n一个矩形块水平分为三个部分。顶部标有“学生”，中间部分提供了姓名、SSN、出生日期和\
  \ GPA 的数据类型。底部部分为空白。\n\n图 10-9\n\n有时仅显示属性名称\n\n我们甚至可能希望为属性指定初始值，例如`gpa : double\
  \ = 0.0`，尽管这不太常见。\n\n静态属性通过在其名称下加下划线来标识（见图 10-11）。\n\n![](img/78624_3_En_10_Fig11_HTML.png)\n\
  \n一个矩形块水平分为三个部分。顶部标有“学生”，中间部分包含“总学生数”、“姓名”、“SSN”和“出生日期”。底部部分为空白。\n\n图 10-11\n\n\
  通过下划线标识静态属性\n\n我们可以选择仅在类矩形的操作隔间中列出操作名称，如图 10-12 所示，或者也可以选择使用扩展形式的操作定义，如图 10-13 中为`registerForCourse`操作所做的那样。\n\
  \n![](img/78624_3_En_10_Fig13_HTML.png)\n\n\n\n一个分为三部分的长方形方块，顶部写着“学生”，中间部分写着“姓名”、“社保号”、“出生日期”和“GPA”。底部部分将“课程注册”表示为布尔数据类型，并附有“退课”和“选择专业”文本。\n\
  \n图 10-13\n\n有时也会反映参数签名和返回类型\n\n![](img/78624_3_En_10_Fig12_HTML.png)\n\n一个长方形方块被水平分为三部分。顶部写着“学生”，中间部分写着“姓名”、“社保号”、“出生日期”和“GPA”。底部部分写着“注册课程”、“退课”和“选择专业”，并带有括号。\n\
  \n图 10-12\n\n有时只呈现方法名称\n\n请注意，UML 类图中操作规范的正式语法\n\n```\n[可见性] 名称 [(参数列表)] [: 返回类型]\n\
  ```\n\n例如\n\n```\nregisterForCourse(Course x) : boolean\n```\n\n与我们习惯看到的 Java 方法头语法不同：\n\
  \n```\n返回类型 方法名(参数列表)\n```\n\n例如：\n\n```\nboolean registerForCourse(Course x)\n\
  ```\n\n特别要注意，UML 将操作名称、参数和返回类型的组合称为**操作签名**，但在 Java 中，返回类型是方法头的一部分，但***不是*** ***方法签名***的一部分。\n\
  \n使这些操作签名具有通用性而非特定于语言的理由是，同一个模型可以在多种目标编程语言中实现。然而，可以说第一种形式并不比第二种形式本质上更好或更清晰。因此，如果你知道自己将要用\
  \ Java 编程，那么如果你的对象建模工具允许，在类图中反映标准的 Java 方法头可能是有意义的。\n\n在类图中显示每个类的所有属性和操作通常是不切实际的，因为图表会变得过于杂乱，从而失去其作为沟通工具的作用。请将数据字典视为关于模型的官方、完整的信息来源，并在图表中仅反映那些在描述每个类的使命时特别重要的属性和操作。特别是，“get”和“set”操作是所有属性隐含的，不应显式显示。\n\
  \n此外，不要仅仅因为某个类的属性或操作区域是空的，就认为该类没有关联该类型的特征；这可能仅仅意味着模型仍在演进中。\n\n### 类之间的关系\n\n第 4\
  \ 章定义了类之间可能存在的几种不同类型的结构关系：关联、聚合（一种特定类型的关联）和继承。让我们探讨每种关系类型是如何以图形方式表示的。\n\n#### 关联\n\
  \n二元关联——换句话说，两个不同类之间的关系——通过在表示参与类的矩形之间画一条线，并在线上标注关联的名称来表示。如果角色名能为模型增加价值，可以在关联线的两端反映角色名，否则应省略。\n\
  \n我们还在线的每一端标记适当的**多重性指示符**，以反映关系是一对一、一对多还是多对多（见图 10-14）；我们将在本章稍后部分讨论如何做到这一点。\n\n\
  ![](img/78624_3_En_10_Fig14_HTML.jpg)\n\n一个框图解释了多重性指示符指向左侧的类 1 和右侧的类 2。类之间的中间区域用于关联名称。文本在底部写着类\
  \ 1 和类 2 的角色。\n\n图 10-14\n\n表示类之间的关联\n\n在建模工作的这个阶段，所有关联都被假定为双向的，并且参与类在类图中的排列顺序无关紧要。因此，为了描述“一个`教授`*指导*一个`学生`”的关联，图\
  \ 10-15 中的图形符号都被认为是等效的。\n\n![](img/78624_3_En_10_Fig15_HTML.jpg)\n\n一个框图表示 8 个标记为“学生”和“教授”的方块，以不同顺序排列成两列。它指示了在\
  \ 4 个不同实例中，教授指导学生，并且是学生的导师。\n\n图 10-15\n\n`教授`和`学生`类之间“指导”关联的等效描述\n\n在复杂的图表中，为了简化所有关联名称而实现类的最佳放置通常是不可能的。因此，UML\
  \ 引入了一个简单的约定，即使用一个小箭头（◄）来反映关联名称的解读方向，这给了我们在图表中放置类矩形的更大自由度，如图 10-16 所示。\n\n![](img/78624_3_En_10_Fig16_HTML.jpg)\n\
  \n一个框图表示左侧标记为“学生”和右侧标记为“教授”的两个方块。它指示教授指导学生，并且教授是导师。\n\n图 10-16\n\n使用箭头指示关联标签的方向\n\
  \n使用 UML，无论前面两个矩形如何放置，我们仍然可以始终将关联标记为“*指导*”。\n\n很容易陷入试图让图表在类的位置、最小化交叉线等方面“完美”的陷阱。请尽量在早期抵制这种冲动，因为在建模工作完成之前，图表不可避免地会被多次修改。\n\
  \n一元（自反）关联——即属于同一个类的两个不同对象之间的关系——用一条从同一个类矩形出发并返回的关联线来表示。例如，为了描述“一个`课程`*是*（另一个不同的）`课程`的*先修课程*”的关联，我们将使用图\
  \ 10-17 中所示的符号。\n\n![](img/78624_3_En_10_Fig17_HTML.png)\n\n一个图表表示两个矩形方块。前景中的方块表示“课程”，背景中的方块表示“先修课程”。\n\
  \n图 10-17\n\n涉及`课程`类的自反关联\n\n\n\n#### 聚合\n\n聚合，正如你在第 5 章所学到的，是一种特殊形式的关联，它恰好暗示了包含关系。它与“普通”关联的区别在于，在关联线接触“包含”类的一端放置一个菱形。例如，为了描述一所大学由多个学院组成——工程学院、法学院、医学院等——我们会使用如图\
  \ 10-18 所示的表示法。\n\n![](img/78624_3_En_10_Fig18_HTML.png)\n\n一个框图从上到下表示两个分别标记为“大学”和“学院”的方块。学院指向大学的一端带有菱形。\n\
  \n图 10-18\n\n用菱形表示聚合\n\n聚合关系实际上可以朝向任何方向，只要菱形正确地锚定在“包含”类上，如图 10-19 所示。\n\n![](img/78624_3_En_10_Fig19_HTML.jpg)\n\
  \n一个图表示三对分别标记为“大学”和“学院”的矩形方块，方向各不相同。在每个实例中，学院指向大学的一端都带有菱形。\n\n图 10-19\n\n聚合可以朝向任何方向\n\
  \n聚合线通常不需要标记，因为聚合本身就暗示了“部分”-“整体”关系。\n\n然而，正如在第 5 章中提到的，即使完全不使用聚合，我们也能实现目标！为了表示上述概念，我们可以在`University`和`School`类之间创建一个简单的关联，并将其标记为“*由……组成*”，如图\
  \ 10-20 所示。\n\n![](img/78624_3_En_10_Fig20_HTML.jpg)\n\n一个框图表示左侧标记为“大学”和右侧标记为“学院”的两个方块。中间的文字说明“大学由学院组成”。\n\
  \n图 10-20\n\n作为聚合替代方案的简单关联\n\n决定使用聚合还是普通关联是微妙的，因为事实证明，两者在代码中的实现方式基本相同，正如你将在本书第 3\
  \ 部分中看到的那样。\n\n与关联线不同（关联线通常应使用其所代表的关联名称进行标记），聚合线通常不标记，因为聚合的定义本身就暗示了包含关系。\n\n当两个或多个不同的类代表某个“整体”的“部分”时，每个“部分”都与该“整体”分别构成一个聚合关系，如图\
  \ 10-21 所示。\n\n![](img/78624_3_En_10_Fig21_HTML.jpg)\n\n一个图表示顶部一个标记为“整体”的方块，底部两个分别标记为“部分\
  \ A”和“部分 B”的方块。底部的方块指向顶部的方块。\n\n图 10-21\n\n两个聚合关系，使用两个菱形绘制\n\n然而，我们经常将这些聚合线合并成一个类似组织结构图的单一结构，如图\
  \ 10-22 所示。\n\n![](img/78624_3_En_10_Fig22_HTML.png)\n\n一个图表示顶部一个标记为“整体”的方块，底部两个分别标记为“部分\
  \ A”和“部分 B”的方块。底部的方块合并指向顶部的方块。\n\n图 10-22\n\n涉及同一个“整体”类的两个聚合关系，使用单个菱形绘制\n\n这样做并不意味着部分\
  \ A 与部分 B 之间存在任何关系；这仅仅是一种简化图表的方式。\n\n组合，正如你在第 5 章所学到的，是一种强形式的聚合，其中“部分”不能脱离“整体”而存在。它使用“实心”/“黑色”菱形，而不是“空心”/“白色”菱形，如图\
  \ 10-23 所示。\n\n![](img/78624_3_En_10_Fig23_HTML.jpg)\n\n一个插图从下到上表示两个分别标记为“章节”和“书籍”的矩形方块。“章节”指向“书籍”。中间的文字写着“实心菱形”。\n\
  \n图 10-23\n\n实心菱形表示组合，这是一种强形式的聚合\n\n#### 继承\n\n继承（泛化/特化）通过一条线将派生类连接到其基类，然后在该线上标记一个接触基类的三角形来表示（见图\
  \ 10-24）。\n\n![](img/78624_3_En_10_Fig24_HTML.png)\n\n一个插图从下到上表示两个分别标记为“教授”和“人”的矩形方块。“教授”指向“人”的一端带有箭头。\n\
  \n图 10-24\n\n继承用三角形表示\n\n与聚合一样，参与继承关系的类可以以任何方向表示，只要三角形指向/接触基类即可。\n\n继承线***不应***标记，因为它们明确无误地表示了“是一个”关系。\n\
  \n与聚合类似，当两个或多个不同的类代表同一个父类的派生类时，每个派生类都与父类分别构成一个继承关系，如图 10-25 所示，但我们经常将这些继承线合并成一个单一结构，如图\
  \ 10-26 所示。\n\n![](img/78624_3_En_10_Fig26_HTML.png)\n\n一个插图表示底部两个分别标记为“子类 A”和“子类\
  \ B”的矩形方块合并后，指向顶部一个标记为“超类”的方块。\n\n图 10-26\n\n使用单个三角形表示两个派生类\n\n![](img/78624_3_En_10_Fig25_HTML.png)\n\
  \n一个插图表示底部两个分别标记为“子类 A”和“子类 B”的矩形方块，分别指向顶部一个标记为“超类”的方块。\n\n图 10-25\n\n使用两个不同的三角形表示两个派生类\n\
  \n这样做并不意味着派生类`A`与派生类`B`之间的关系与之前的描述有任何不同——在这两种情况下，这些类都被视为拥有共同父类的兄弟类。这仅仅是一种简化图表的方式。\n\
  \n\n\n### 反映多重性\n\n你在第 5 章中已经了解到，对于类 `A` 和类 `B` 之间的给定关联类型 `X`，术语“多重性”指的是：必须/可能与类型\
  \ `B` 的某个给定实例相关联的类型 `A` 的对象实例数量，反之亦然。在准备类图时，我们会在关联线的每一端进行标记，以指明从该线另一端所属类的对象角度来看，其多重性应为何值。换句话说：\n\
  \n*   我们在 `B` 端标记的是，可以与单个 `A` 实例相关联的 `B` 实例的数量。\n*   我们在 `A` 端标记的是，可以与单个 `B` 实例相关联的\
  \ `A` 实例的数量。\n\n如图 10-27 所示。\n\n![](img/78624_3_En_10_Fig27_HTML.jpg)\n\n一幅插图，展示了两个分别标记为\
  \ A 和 B 的矩形块，通过一条从左到右的线连接。左侧的文字说明有多少个 A 的实例可以与单个 B 的实例相关联。右侧的文字说明有多少个 B 的实例可以与一个\
  \ A 的实例相关联。\n\n图 10-27\n指示类之间的多重性\n\n作为回顾，给定一个属于类 `A` 的单个对象，类型 `B` 的对象与之关联的方式有四种不同的场景：\n\
  \n*   `A` 类型的对象可能与 ***恰好一个*** `B` 类型对象的实例相关联，例如“一个 `Student` (`A`) *拥有* 一个 `Transcript`\
  \ (`B`)”这种情况。在这里，每个 `A` 的实例 ***必须*** 存在一个 `B` 的实例。\n*   `A` 类型的对象可能与 ***至多一个***\
  \ `B` 类型对象的实例相关联，例如“一个 `Professor` (`A`) *担任* 一个 `Department` (`B`) 的*系主任*”这种情况。在这里，每个\
  \ `A` 的实例 ***可选*** 地存在一个 `B` 的实例。\n*   `A` 类型的对象可能与 ***一个或多个*** `B` 类型对象的实例相关联，例如“一个\
  \ `Department` (`A`) *雇佣* ***多个*** `Professor` (`B`)”这种情况。在这里，每个 `A` 的实例 ***必须***\
  \ 存在至少一个 `B` 的实例。\n*   `A` 类型的对象可能与 ***零个或多个*** `B` 类型对象的实例相关联，例如“一个 `Student` (`A`)\
  \ *正在修读* ***多个*** `Section` (`B`)”这种情况。（在我们假设的大学里，学生可以休学一学期。）在这里，每个 `A` 的实例 ***可选***\
  \ 地存在至少一个 `B` 的实例。\n\n在 UML 表示法中，多重性符号如下：\n\n*   “恰好一个” 用符号 “1” 表示。\n*   “至多一个”\
  \ 用符号 “0..1” 表示，也可以解读为“零或一”。\n*   “一个或多个” 用符号 “1..*” 表示。\n*   “零个或多个” 用符号 “0..*”\
  \ 表示。\n*   当我们知道多重性应该是“多个”，但不确定（或不想指定）是“零个或多个”还是“一个或多个”时，我们使用符号 “*”。\n*   甚至可以表示一个任意的显式数值范围\
  \ *x*..*y*，例如使用 “3..7” 来表示“一个 `Department` 雇佣的 `Professor` 不少于三名，且不超过七名”。\n\n以下是一些\
  \ UML 示例：\n\n“一个 `Student` *拥有* 恰好一个 `Transcript`，并且一个 `Transcript` *属于* 恰好一个 `Student`。”（见图\
  \ 10-28。）\n\n![](img/78624_3_En_10_Fig28_HTML.jpg)\n\n一幅插图，展示了两个分别标记为 student 和\
  \ transcript 的矩形块，通过一条从左到右的线连接。中间线上的文字是 has a。\n\n图 10-28\n强制性一对一多重性的示例\n\n“一个 `Professor`\
  \ *为* 恰好一个 `Department` *工作*，但一个 `Department` *拥有* 多个（一个或多个）`Professor` 作为雇员。”（见图\
  \ 10-29。）\n\n![](img/78624_3_En_10_Fig29_HTML.jpg)\n\n一幅插图，展示了两个分别标记为 professor\
  \ 和 department 的矩形块，通过一条从左到右的线连接。中间线上的文字是 works for。\n\n图 10-29\n强制性一对多多重性的示例\n\n\
  “一个 `Professor` *可选地担任* 至多一个 `Department` 的*系主任*，而一个 `Department` *拥有* 恰好一个 `Professor`\
  \ 担任系主任角色。”（见图 10-30。）\n\n![](img/78624_3_En_10_Fig30_HTML.jpg)\n\n一幅插图，展示了两个分别标记为\
  \ professor 和 department 的矩形块，通过一条从左到右的线连接。中间线上的文字是 chairs。\n\n图 10-30\n可选性一对多多重性的示例\n\
  \n“一个 `Student` *修读* 多个（零个或多个）`Section`，并且一个 `Section` *被* 多个（零个或多个）`Student` *修读*。”（见图\
  \ 10-31。）\n\n![](img/78624_3_En_10_Fig31_HTML.jpg)\n\n一幅插图，展示了两个分别标记为 student 和\
  \ section 的矩形块，通过一条从左到右的线连接。中间线上的文字是 attends。每个块都标有 0 dot, dot star。\n\n图 10-31\n\
  可选性多对多多重性的示例\n\n一个 `Section` 如果持续没有 `Student` 报名修读，很可能会被取消；尽管如此，在 `Section` 首次通过\
  \ SRS 开放注册后的一段时间内，它可能没有 `Student` 注册。\n\n“一个 `Course` *是* 多个（零个或多个）`Course` *的先修课程*，并且一个\
  \ `Course` *可以有* 多个（零个或多个）*先修* `Course`。”（见图 10-32。）\n\n![](img/78624_3_En_10_Fig32_HTML.png)\n\
  \n一幅插图，展示了两个矩形块。前景中的块标记为 course，背景中的块表示 prerequisite。每个块都标有 0 dot, dot star。\n\n\
  图 10-32\n自反关联上可选性多对多多重性的示例\n\n我们在聚合以及简单关联上都反映多重性。例如，图 10-33 中所示的 UML 表示法将被解释为：“一个（学生的）`Plan\
  \ of Study` *由* 多个 `Course` *组成*；任何给定的 `Course` *可以被包含在* 多个不同的（学生的）`Plan` `of Study`\
  \ 中。”\n\n![](img/78624_3_En_10_Fig33_HTML.png)\n\n一幅插图，展示了两个分别标记为 course 和 plan\
  \ of study 的矩形块。course 指向 plan of study 的一个箭头。\n\n图 10-33\n在聚合上反映多重性\n\n然而，在继承关系上反映多重性是没有意义的，因为正如第\
  \ 4 章所讨论的，继承暗示了***类***之间的关系，但***不是*** ***对象***之间的关系。也就是说，图 10-34 中所示的表示法暗示，任何属于\
  \ *Subclass B* 的对象，凭借“is a”关系，也***同时***是 *Superclass A* 的一个实例。\n\n![](img/78624_3_En_10_Fig34_HTML.png)\n\
  \n一幅插图，展示了两个分别标记为 superclass A 和 subclass B 的矩形块。subclass b 指向 superclass A 的一个箭头。\n\
  \n图 10-34\n多重性修饰不适用于继承关系\n\n如果我们想要说明类型 `A` 和 `B` 的不同对象之间的某种关系，例如“一个 `Manager` *监督*\
  \ 一个 `Employee`”，我们需要在这些类之间引入一个独立于其继承关系的单独关联，如图 10-35 所示。\n\n![](img/78624_3_En_10_Fig35_HTML.png)\n\
  \n一幅插图，展示了两个矩形块，底部标记为 manager 的块指向顶部标记为 employee 的块的一个箭头。中间的文字是 supervises。\n\n\
  图 10-35\n\n\n\n表示 `Manager` 与 `Employee` 类之间的继承关系和关联关系\n\n## 对象/实例图\n\n在描述对象如何交互时，我们有时会发现勾勒出特定对象及其链接的场景会很有帮助，为此我们会创建**对象图**，也称为**实例图**。实例（或对象）在\
  \ UML 表示法中与类非常相似，主要区别在于：\n\n![](img/78624_3_En_10_Fig36_HTML.png)\n\n一个矩形框内写着：joe\
  \ blow : student\n\n图 10-36\n\n表示一个对象\n\n*   我们通常同时提供对象的名称和类型，两者之间用冒号分隔。我们为文本添加下划线，以强调这是一个对象，而不是一个类（见图\
  \ 10-36）。\n\n![](img/78624_3_En_10_Fig37_HTML.png)\n\n一个文本框代表一个矩形框，内部标注为 student\
  \ x。框内文字为：类名被省略，因为对象名暗示了其类型。\n\n图 10-37\n\n如果类名显而易见，我们可以省略它\n\n*   如果对象的类型从其名称中显而易见，则可以省略；例如，名称“student\
  \ x”暗示该对象属于 `Student` 类（见图 10-37）。\n\n![](img/78624_3_En_10_Fig38_HTML.png)\n\n\
  一个文本框代表一个矩形框，内部标注为 : student。框内文字为：匿名学生对象，未提供名称。\n\n图 10-38\n\n表示一个匿名对象\n\n*   或者，如果我们想引用某个给定类型的“通用”对象，则可以省略对象名称；这种对象被称为**匿名对象**。请注意，在这种情况下，我们必须在类名前加上冒号（:）（见图\
  \ 10-38）。\n\n因此，如果我们想表示一位 `Professor` 类型的布朗博士是三位 `Student` 的导师，我们可以创建如图 10-39 所示的对象图。\n\
  \n![](img/78624_3_En_10_Fig39_HTML.jpg)\n\n一个框图表示左侧有一个标注为 doctor brown : professor\
  \ 的框。它连接到右侧三个表示 student 的框。连接教授和学生的线上写着 advice。\n\n图 10-39\n\n布朗博士指导三名学生\n\n为了反映一名叫乔·布洛的\
  \ `Student` 本学期参加了两个 `Section`，其中一个 `Section` 也有一名叫玛丽·格林的 `Student` 参加，我们可以创建图 10-40\
  \ 中的图。\n\n![](img/78624_3_En_10_Fig40_HTML.jpg)\n\n一个框图解释了名为乔·布洛的学生参加了两个部分：初级数学和中级艺术。另一名名为玛丽·格林的学生也参加了初级数学部分。\n\
  \n图 10-40\n\n一个涉及多个对象的实例图\n\n## 作为属性的关联\n\n给定图 10-41，它展示了关联“一个 `Course` *被提供为*一个\
  \ `Section`”，我们看到一个 `Course` 对象可以与多个不同的 `Section` 对象相关联，但任何一个 `Section` 对象只能与***一个***\
  \ `Course` 对象相关联。\n\n![](img/78624_3_En_10_Fig41_HTML.jpg)\n\n两个矩形框从左到右分别标注为 course\
  \ 和 section，通过一条线连接。线上文字为 offered as，指向 section。\n\n图 10-41\n\n`Course` 和 `Section`\
  \ 类之间的一对多关联\n\n回顾一下，两个对象相关联意味着什么？这意味着它们彼此持有“句柄”，以便能够轻松找到对方进行通信和协作，这是我们在第 4 章中详细讨论过的概念。如果我们仅根据图\
  \ 10-41 中的图来勾勒 `Course` 和 `Section` 类的属性，我们需要将这些句柄作为引用变量来考虑，如下所示：\n\n```\npublic\
  \ class Section {\n// 属性。\nprivate Course represents;   // 指向单个相关 Course 对象的“句柄”\n\
  // 等等。\n}\npublic class Course {\n// 属性。\nprivate Collection<Section> offeredAs;\
  \   // 相关 Section 对象“句柄”的集合\n// 等等。\n}\n```\n\n因此我们看到，在类图中，两个类 `A` 和 `B` 之间存在关联，意味着类\
  \ `A` ***可能*** 有一个属性声明为以下之一：\n\n*   对类型 `B` 的***单个***实例/对象的引用\n\n*   对类型 `B` 的***多个***对象引用的***集合***\n\
  \n具体取决于所涉及的多重性，反之亦然。我说“可能”是因为，当我们实际开始编程这个应用程序时，我们可能希望也可能不希望双向编码这种关系，尽管在分析阶段所有关联都被假定为双向的。我们将在第\
  \ 14 章中讨论编码双向关系的利弊。\n\n由于关联线的存在意味着两个相关类中都有作为对象引用的属性，因此在各自类的属性区域中额外列出此类属性是不合适的（见图\
  \ 10-42）。\n\n![](img/78624_3_En_10_Fig42_HTML.jpg)\n\n一个图示表示两个矩形框。左侧框写着 course offered\
  \ as collection。右侧框写着 section represents the course。中间的文字写着：不要冗余列出由关联隐含的属性。\n\n\
  图 10-42\n\n冗余地将引用反映为属性是不合适的；关联的存在已经隐含了这些属性\n\n这是初学者常犯的错误。这样做带来的最大问题是使用 CASE 工具的代码生成功能时：如果属性在类的属性区域中显式列出，同时又由关联隐含，它可能会在生成的代码中出现***两次***，如下面的代码片段所示，该代码可能从图\
  \ 10-42 中错误的 UML 图生成：\n\n`public class Course {`\n\n`// 冗余属性在代码中生成。`\n\n***Collection<Section>***\
  \ `offeredAs;   // 由于显式属性`\n\n***Collection<Section>*** `offered_as;  // 由于关联`\n\
  \n`// 等等。`\n\n`}`\n\n\n\n## 信息沿关联“管道”流动\n\n初学建模者还容易犯一个错误：在涉及一般属性时引入不必要的冗余。在图 10-43\
  \ 所示的关联中，我们看到 `Professor` 类的 `name` 属性被 `Department` 类的 `chairmanName` 属性不恰当地镜像了。\n\
  \n![](img/78624_3_En_10_Fig43_HTML.jpg)\n\n图示为两个矩形块，分别标注为“教授”和“系部”。图中显示了各自的属性。底部文字说明：教授的姓名被恰当地封装在教授块中，但却被不恰当地复制为系部中的系主任姓名。\n\
  \n图 10-43\n\n`name` 和 `chairmanName` 属性是冗余的\n\n虽然 `Department` 对象确实需要知道担任其系主任的 `Professor`\
  \ 对象的姓名，但显式创建一个 `chairmanName` 属性来反映这一信息是不恰当的。因为 `Department` 对象将对其关联的 `Professor`\
  \ 对象的引用作为一个属性来维护，所以 `Department` 在任何需要的时候都可以随时访问此信息，只需调用 `Professor` 对象的 `getName`\
  \ 方法即可。这条信息理应封装在它所属的 `Professor` 类中，不应在其他任何地方重复。图 10-44 展示了前一个图经过修正后的版本，其中消除了冗余。\n\
  \n![](img/78624_3_En_10_Fig44_HTML.jpg)\n\n图示为两个块，分别标注为“教授”和“系部”。教授的属性包括姓名、职称和社保号；系部的属性包括系名和编号。\n\
  \n图 10-44\n\n图 10-43 中的冗余已被消除\n\n本质上，每当你在图中看到一条关联/聚合线时，你可以将其视为一个概念性的“管道”，信息可以根据需要沿着该管道在相关对象之间“流动”。\n\
  \n在分析阶段，我们通常不关心属性（公有、私有）的可访问性或关联的方向性——我们通常假设图中反映的所有属性的值都可以通过调用对象上适当的“获取”方法来获得。\n\
  \n有时，这个“管道”会跨越***多个***对象，如下一个示例所示。\n\n在图 10-45 中，我们有一个涉及三个类的图。\n\n![](img/78624_3_En_10_Fig45_HTML.jpg)\n\
  \n一个框图展示了位于中心的“教学班”元素，以及左侧的“课程”元素和右侧的“教授”元素。它说明了：课程以教学班的形式提供，教授负责教授该教学班。\n\n图 10-45\n\
  \n`Course`、`Section` 和 `Professor` 类之间的关联“管道”\n\n假设有人希望获得所有曾教授过名为“面向对象入门”这门 `Course`\
  \ 的 `Professor` 的列表。由于每个 `Course` 对象都维护着对其所有 `Section` 对象（包括过去和现在的）的引用，代表“面向对象入门”的\
  \ `Course` 对象可以询问它的每个 `Section` 对象，之前或当前教授该 `Section` 的 `Professor` 是谁。反过来，每个 `Section`\
  \ 对象都维护着对其所教授/正在教授的 `Professor` 对象的引用，并可以使用 `Professor` 对象的 `getName` 方法来获取姓名。因此，信息沿着关联“管道”从\
  \ `Professor` 对象流向它们关联的 `Section` 对象，再从那里流回我们最初开始的 `Course` 对象（见图 10-46）。\n\n![](img/78624_3_En_10_Fig46_HTML.jpg)\n\
  \n图示为一系列对话气泡，包含围绕关键节点（表示课程对象、教学班对象和教授对象）的一组对话。它标明了指向其他无关教学班的链接。\n\n图 10-46\n\n关联“管道”可能相当复杂！\n\
  \n你将在第 11 章学习一种正式的、符合 UML 规范的方法来分析和描述此类“对象对话”。\n\n以下代码对这三个类的属性进行了建模，并突出显示了所有由关联驱动的属性：\n\
  \n```\npublic class Course {\n// 属性。\n// 伪代码。\nprivate Collection offeredAs;   //\
  \ 一个 Section 对象引用的集合\nprivate String courseName;\nprivate int courseNumber;\nprivate\
  \ double creditHourValue;\n// 等等。\n}\npublic class Section {\n// 属性。\nprivate Course\
  \ represents;   // 对相关 Course 对象的引用\nprivate int sectionNo;\nprivate String dayOfWeek;\n\
  private String timeOfDay;\nprivate String semester;\nprivate Professor taughtBy;\
  \  // 对相关 Professor 对象的引用\n// 等等。\n}\npublic class Professor {\n// 伪代码。\nprivate\
  \ Collection sectionsTaught; // 一个 Section 对象引用的集合\nprivate String name;\nprivate\
  \ String ssn;\n// 等等。\n}\n```\n\n如果我们知道 `Course` 类将经常需要知道所有曾教授过该 `Course` 的 `Professor`\
  \ 是谁，我们可能会决定在图中引入冗余关联“一个 `Professor` *曾教授过* 一个 `Course`”，如图 10-47 所示。\n\n![](img/78624_3_En_10_Fig47_HTML.jpg)\n\
  \n图示展示了课程、教学班和教授的元素。它标明了各单元之间的相互连接，说明课程以教学班的形式提供，教授教授该教学班。教授曾教授过该课程。\n\n图 10-47\n\
  \n当对象频繁需要更直接的“管道”进行通信时，我们会添加冗余关联\n\n这样做的好处是提高了 `Course` 对象确定谁曾教授过它的速度：通过在图 10-47\
  \ 中添加冗余关联，`Course` 对象现在可以***直接***与 `Professor` 对象通信，而无需使用 `Section` 对象作为“中间人”——但这种性能提升的代价是，我们刚刚为应用程序引入了额外的复杂性，这反映在以下代码中突出显示的新增部分：\n\
  \n```\npublic class Course {\n// 属性。\n// 伪代码。\nprivate Collection offeredAs;   \
  \   // 一个 Section 对象引用的集合\nprivate String courseName;\nprivate int courseNumber;\n\
  private float creditHourValue;\n// 伪代码。\nprivate Collection professors;    // 一个\
  \ Professor 对象引用的集合\n// 等等。\n}\npublic class Section {\n// 属性。\nprivate Course represents;\
  \   // 对相关 Course 对象的引用\nprivate int sectionNo;\nprivate String dayOfWeek;\nprivate\
  \ String timeOfDay;\nprivate String semester;\nprivate Professor taughtBy;  // 对相关\
  \ Professor 对象的引用\n// 等等。\n}\npublic class Professor {\n// 伪代码。\nprivate Collection\
  \ coursesTaught;     // 一个 Course 对象引用的集合\nprivate Collection sectionsTaught;  \
  \    // 一个 Section 对象引用的集合\nprivate String name;\nprivate String ssn;\n// 等等。\n\
  }\n```\n\n通过添加冗余关联，我们现在在维护引用完整性方面有了额外的工作。也就是说，如果指派了另一位 `Professor` 来教授某个特定的 `Section`，我们需要更新两个链接而不是一个：`Professor`\
  \ 与 `Section` 之间的链接，以及 `Professor` 与相关 `Course` 之间的链接。\n\n\n\n关键在于，决定哪些关联需要包含、哪些可以视为从其他关联推导而消除，类似于你在浏览器中决定为哪些网页创建书签：你会为频繁访问的页面添加书签，而对于偶尔需要访问的页面，则手动输入完整网址，或者通过***链***接导航。对象关联也是如此：决定在代码中实现哪些关联，取决于你打算在应用程序中最频繁使用哪些“通信路径”。当我们进入第\
  \ 11 章对对象***行为***进行建模时，你会对这些通信模式有更清晰的认识。\n\n## “混合与匹配”关系符号\n\n我们可以通过相当复杂的方式将各种关系类型交织在一起。为了理解这一点，让我们研究图\
  \ 10-48 中的模型，看看它告诉我们什么。\n\n![](img/78624_3_En_10_Fig48_HTML.jpg)\n\n模型图表示学生和教授共同属于“人”这一类别，而“人”与“系”相关联。“学校”由“系”组成，“大学”由“学校”组成。\n\
  \n图 10-48\n\n一个 UML 模型示例\n\n首先，我们看到一些熟悉的聚合和继承用法：\n\n*   图左上角的聚合用法——一个两层聚合——传达了以下事实：一个`大学`由一个或多个`学院`组成，一个`学院`由一个或多个`系`组成，但任何一个`系`只与一个`学院`关联，任何一个`学院`只与一个`大学`关联。\n\
  \n*   图右下角的继承用法表明`人`是`学生`和`教授`的共同基类。换句话说，`学生` *是一种* `人`，`教授` *是一种* `人`。\n\n我们观察到的第一个“有趣”的符号用法是，关联可用于连接聚合中不同层级的类，例如使用\
  \ *funds R&D（研发资助）* 关联来连接`大学`和`系`这两个类。这表明`大学`为一个或多个`系`提供研发资金，但一个***特定***的`系`可能获得也可能不获得研发资助。\n\
  \n接下来，我们注意到使用 *employs* 关联来连接`系`和`人`这两个类，表明一个`系` *雇佣* 一个或多个`人`，但一个特定的`人` *可能只为*\
  \ 一个`系`工作——如果该`人`确实为***任何***`系`工作的话。\n\n由于`人`是`学生`和`教授`这两个子类的超类，那么根据“is a”关系，任何关于`人`的陈述也必须适用于其派生类。因此：\n\
  \n*   ***基类参与的关联/聚合会被其派生类继承。***（这很合理，因为我们现在知道关联被实现为引用变量属性。）因此，一个特定的`学生`可能选择性地*为*一个`系`工作（例如作为助教），一个特定的`教授`也可能选择性地*为*一个`系`工作，因为`学生`和`教授`都派生自`人`。\n\
  \n*   此外，由于我们可以（通过聚合关系）推断出一个特定的`系`属于哪个`学院`和`大学`，那么一个`人`*为*某个`系`工作这一事实也隐含了该`人`*为*哪个`学院`和`大学`工作。\n\
  \n最后，我们注意到关联可用于连接继承层次结构中不同层级的类，例如使用 *mentors* 关联来连接`人`和`教授`这两个类。这里，我们表明一个`教授`可以选择性地*指导*许多`人`——`学生`和/或`教授`——反之，一个`人`——无论是`学生`还是`教授`——可以被多个`教授`（具体而言）指导。我们将最靠近`教授`类的关联线端点标记为角色“导师”，以强调`教授`在`大学`中是导师，但一般的`人`（即`学生`）则不是。\n\
  \n如果我们想反映***学生***和***教授***都可以担任导师这一事实呢？我们可以在`人`类上使用一个自反关联，如图 10-49 所示，由于继承关系，这实际上隐含了四种关系可能性：\n\
  \n![](img/78624_3_En_10_Fig49_HTML.png)\n\n一个框图表示学生和教授共同指向人。标记为“人”的方框表示导师。\n\n图\
  \ 10-49\n\n隐含的各种可能的“指导”关联\n\n*   `教授`指导`学生`\n*   `教授`指导另一位`教授`\n*   `学生`指导另一位`学生`\n\
  *   `学生`指导`教授`（这种情况不太可能）\n\n如果我们想反映只有前三种情况是可能的，我们就必须采用图 10-50 中所示的更复杂的版本，其中三个感兴趣的关系都表示为独立的关联线（两个自反关联，一个二元关联）。\n\
  \n![](img/78624_3_En_10_Fig50_HTML.jpg)\n\n一个框图表示学生和教授共同指向人。标记为“学生”和“教授”的方框表示导师。\n\
  \n图 10-50\n\n明确指定的具体导师关联\n\n尽管修改图表以反映我们对模型理解的这些细化之处已经相当繁琐，但一旦应用程序编码完成后再去修改软件，其痛苦程度将高出几个数量级。\n\
  \n\n\n## 关联类\n\n有时我们会遇到这样的情况：识别出一个对模型至关重要的属性，但它似乎无法很好地归属于任何一个类。举个例子，让我们重新审视图 10-51\
  \ 中所示的（多对多）关联“一个`学生` *参加* 一个`教学班`”。（请注意，这次我们在关联线的两端使用了“通用”的***多***重性符号，即单个星号 (*)。）\n\
  \n![](img/78624_3_En_10_Fig51_HTML.jpg)\n\n两个分别标记为“学生”和“教学班”的方块通过一条线连接。线上方文字说明：学生参加教学班。\n\
  \n图 10-51\n\n`学生`与`教学班`之间的多对多关联\n\n每学期结束时，学生会根据该学期参加的每个教学班获得一个字母等级。我们决定将这个等级表示为一个`字符串`属性（例如，“A-”、“C+”）。然而，这个“等级”属性应该属于哪里呢？\n\
  \n*   它不属于`学生`类，因为学生并非针对所有课程获得一个单一的总评等级，而是针对参加的每个教学班获得一个单独的等级。\n*   它也不属于`教学班`类，因为参加同一个教学班的所有学生通常不会获得相同的字母等级。\n\
  \n如果我们稍加思考，就会意识到这个等级实际上是给定`学生`对象与给定`教学班`对象之间***配对***的一个属性；也就是说，它是这两个对象之间存在的***链接***的一个属性。\n\
  \n在 UML 中，我们创建一个单独的类，称为**关联类**，用于存放属于对象间链接的属性，并用一条***虚线***将其连接到关联线上，如图 10-52 所示。\n\
  \n由于关联类表示两个对象之间链接的属性，因此有时非正式地称其为“**链接属性**”。\n\n![](img/78624_3_En_10_Fig52_HTML.jpg)\n\
  \n一个框图展示了两个分别标记为“学生”和“教学班”的方块连接在一起。底部另一个方块表示“已获等级”，其数据类型为字符串。\n\n图 10-52\n\n在多对多关联上放置关联类\n\
  \n每当你在类图中看到关联类时，要意识到存在另一种等效的表示方式，可以***不***使用关联类来描述相同的情况：\n\n*   对于涉及关联类的***多对多关联***，我们可以将多对多关联拆分为两个一对多关联，并将原来的关联类作为“标准”类插入到另外两个类之间。对上述的*参加*关联执行此操作后，我们得到了图\
  \ 10-53 中的等效替代表示。\n\n需要注意的重要一点是，这两个新关联的“多”端都位于新插入的类上，因为一个`学生`*获得*多个`等级`，而一个`教学班`*给出*多个`等级`。\n\
  \n![](img/78624_3_En_10_Fig53_HTML.jpg)\n\n一个框图解释了学生获得等级，教学班给出等级。等级的数据类型是字符串。它还表示学生参加教学班。\n\
  \n图 10-53\n\n图 10-52 的替代表示\n\n![](img/78624_3_En_10_Fig55_HTML.jpg)\n\n一个框图左侧有两个方块，分别表示“教授”和“薪资”。教授指向右侧一个表示“院系”的方块，说明教授为院系工作。\n\
  \n图 10-55\n\n图 10-54 的替代表示\n\n![](img/78624_3_En_10_Fig54_HTML.jpg)\n\n一个框图展示了三个分别标记为“教授”、“院系”和“薪资”的方块之间的连接。它说明教授为院系工作并获得薪资。薪资的数据类型是\
  \ Double。\n\n图 10-54\n\n在一对多关联上放置关联类\n\n*   如果我们恰好有一个针对***一对多关联***的关联类，如图 10-54\
  \ 中`教授`和`院系`之间的*工作于*关联，那么理论上，关联类的属性可以“折叠”到关联的“多”端类中，从而完全去掉关联类，如图 10-55 所示。\n*  \
  \ 对于***一对一关联***，我们可以将关联类的属性折叠到***两个类中的任意一个***中。\n\n话虽如此，但这种将关联类属性折叠到一对多或一对一关联一端的方法并不被推荐，因为它会减少模型所传达的信息量。在前面的例子中，`教授`拥有`薪资`属性的唯一原因是他/她*为*某个`院系`*工作*；如果从模型中如此消除关联类，这种雇佣关系与薪资之间的“因果”联系就会丢失。\n\
  \n请注意，关联类本身也可以与其他类建立关系。例如，图 10-56 中的图表展示了关联类`角色`与类`美国总统`之间参与的一对多关联；说明此模型的一个例子是：“电影明星安东尼·霍普金斯在电影《尼克松》中饰演理查德·M·尼克松一角，从而刻画了***真实的***前美国总统理查德·M·尼克松。”\n\
  \n![](img/78624_3_En_10_Fig56_HTML.jpg)\n\n一个框图解释了电影明星主演电影。电影明星获得一个角色，该角色刻画美国总统。角色名称的数据类型是字符串。\n\
  \n图 10-56\n\n关联类本身可以参与与其他类的关联\n\n\n\n## 我们“完成”的学生注册系统类图\n\n通过应用本章关于静态建模所涵盖的所有内容，我们可以为\
  \ SRS 生成如图 10-57 所示的 UML 类图。当然，正如我反复强调的，这并不是对需求进行建模的唯一正确方法，也未必是我们能得出的“最佳”模型；但它是对待自动化问题的静态方面的一个准确、简洁且正确的模型。\n\
  \n![](img/78624_3_En_10_Fig57_HTML.jpg)\n\n一个模型图展示了多个模块之间的相互连接，这些模块分别代表教授、人员、学生、学习计划、课程、教学班、成绩单条目和成绩单。它标明了每个变量的不同属性。\n\
  \n图 10-57\n\n我们“完成”的 SRS 类图\n\n有几点值得注意。\n\n我们选择使用“通用”的 ***多*** 重数标记（UML 中的 `*`），而不是指定\
  \ `0..*` 或 `1..*`；这在项目的初始建模阶段通常已经足够。\n\n请注意，我们在 `Student` 和 `Section` 类之间反映了两个独立的多对多关联：*等待列表*\
  \ 和 *参加*。一个给定的 `Student` 可能被列入多个不同 `Section` 的等待列表，同时他们也可能注册/参加许多 ***其他*** `Section`。这个模型没有反映的是，一个\
  \ `Student` ***不能*** 同时参加和等待同一个 `Section`。像这样的约束可以在图上用花括号括起来的文本注释来反映，或者从图中省略但在数据字典中详细说明。在图\
  \ 10-58 的图例摘录中，我们使用注释 `{ xor }` 来表示两个关联之间的“异或”情况：一个 `Student` 要么被列入给定 `Section`\
  \ 的*等待列表*，要么*参加*该 `Section`，但不能同时进行。\n\n正如本章前面提到的，我们可以通过一个单一的 *attends* 关联来处理 `Student`\
  \ 当前正在参加的 `Section` 以及过去参加过的 `Section`。参加日期——过去或现在——由 `Section` 类的“semester”属性反映；此外，对于任何正在进行的课程，`TranscriptEntry`\
  \ 关联类的“grade”属性值目前尚未确定。\n\n我们本可以在 *waitlisted for* 关联上反映一个关联类，表示给定 `Student` 在特定\
  \ `Section` 等待列表中的位置，然后我们可以继续将 `WaitList` 的概念建模为 `WaitListEntry` 对象的聚合（见图 10-58）。\n\
  \n![](img/78624_3_En_10_Fig58_HTML.jpg)\n\n一个框图展示了标记为学生、教学班、等待列表和等待列表条目的四个模块之间的关系。它解释了学生参加教学班。教学班有一个等待列表。等待列表由等待列表条目组成，其数据类型为整数。\n\
  \n图 10-58\n\n`WaitList` 可以建模为 `WaitListEntry` 对象的聚合\n\n然而，由于我们打算使用对象模型来获得用户对我们理解其主要需求的确认，我们暂时不必用这些幕后的实现细节来使图表变得杂乱。\n\
  \n我们重命名了 *attends* 关系的关联类；它在本章前面被引入时称为 `GradeReceived`，但现在被称为 `TranscriptEntry`。我们还引入了\
  \ `TranscriptEntry` 类与另一个名为 `Transcript` 的新类之间的聚合关系（见图 10-59）。\n\n![](img/78624_3_En_10_Fig59_HTML.jpg)\n\
  \n一个框图展示了标记为学生、教学班、成绩单条目和成绩单的模块之间的交互。它解释了学生参加一个教学班，并且教学班有学生的等待列表。成绩单条目包含成绩。成绩单维护学生的条目。\n\
  \n图 10-59\n\n`Transcript` 是 `TranscriptEntry` 对象的聚合\n\n让我们探讨这一切是如何演变的。\n\n当本章前面首次引入\
  \ *attends* 关联时，我们将其描绘如图 10-60 所示。\n\n![](img/78624_3_En_10_Fig60_HTML.jpg)\n\n\
  一个框图解释了学生参加一个教学班。学生收到一个成绩。成绩的数据类型是字符串。\n\n图 10-60\n\nattends 关联的初始描绘\n\n然后我们意识到，它可以等效地表示为一***对***\
  \ 一对多关联 *issues* 和 *receives*（见图 10-61）。\n\n![](img/78624_3_En_10_Fig61_HTML.jpg)\n\
  \n一个框图解释了学生收到一个成绩，教学班发布一个成绩。成绩的数据类型是字符串。它还表示学生参加该教学班。\n\n图 10-61\n\nattends 关联可以替代性地描绘为\
  \ issues 和 receives\n\n在这种替代形式中，很明显任何单个 `GradeReceived` 对象都持有一个指向 `Student` 对象的句柄和另一个指向\
  \ `Section` 对象的句柄，并且可以在需要时向它们中的任何一个请求信息。反过来，`Section` 对象通过 *offered as* 关联持有一个指向它所代表的\
  \ `Course` 对象的句柄。因此，对于 `GradeReceived` 对象来说，向 `Section` 对象请求属性 `semester`、`courseNo`、`courseName`\
  \ 和 `credits` 的值是一件简单的事情（而 `Section` 对象又必须向其关联的 `Course` 对象请求这四个值中的后三个）；这在概念上如图\
  \ 10-62 所示。\n\n![](img/78624_3_En_10_Fig62_HTML.jpg)\n\n一个框图展示了学生、成绩、教学班和课程之间的交互。顶部有一段文字：如果\
  \ GradeReceived 对象将这些值整合在一起，我们就得到了一个成绩单条目。它还指出了与每个元素相关的字段。\n\n图 10-62\n\n`GradeReceived`\
  \ 可以访问构成 `TranscriptEntry` 的所有要素\n\n如果 `GradeReceived` 对象将这些值整合在一起，我们就拥有了学生成绩单上一条明细条目所需的一切，如图\
  \ 10-63 所示。\n\n![](img/78624_3_En_10_Fig63_HTML.jpg)\n\n一个矩形框代表一个标题为“Joe Blow 的成绩单”的表格。该表格展示了课程编号、学分、课程名称、所获成绩和已获学分的详细信息。学期名称显示为“2005\
  \ 年春季”。底部有一段文字解释了已获学分的定义。\n\n图 10-63\n\n一份示例成绩单报告\n\n因此，我们看到将关联类从 `GradeReceived`\
  \ 重命名为 `TranscriptEntry` 是很有意义的。然后，将这些聚合到一个 `Transcript` 类中就是一个自然的步骤了。\n\n我们的 SRS\
  \ 图在属性方面有点“单薄”；我们只反映了在第三部分编写 SRS 模型层时最低限度需要的那些属性。\n\n当然，我们现在需要回到数据字典，以捕获我们在构建此模型时确定的所有新属性、关系和类的定义。下面的侧边栏显示了我们修订后的\
  \ SRS 数据字典。\n\n修订后的 SRS 数据字典\n\n**类**\n\n\n\n*   ***课程：*** 指一个学期内围绕特定学科领域展开的一系列讲座、作业、考试等，通常对应特定学分数，是攻读学位的学业单元。例如，“面向对象入门”是信息技术系统理学硕士学位的必修**课程**。\n\
  \n*   ***人员：*** 指与大学相关的个人。\n\n*   ***学习计划：*** 学生为满足特定学位的**课程**要求而计划修读的**课程**列表。\n\
  \n*   ***教授：*** 负责教授**教学班**或指导**学生**的教职人员。\n\n*   ***教学班：*** 特定**课程**在特定学期、特定星期几和特定时间段的开设形式。（例如，**课程**“面向对象入门”在\
  \ 2025 年春季学期每周一 13:00 至 15:00 授课。）\n\n*   ***学生：*** 当前在大学注册，并有资格注册一个或多个**教学班**的个人。\n\
  \n*   ***成绩单：*** 记录特定**学生**在本大学迄今为止所修所有**课程**的文件，包括每门**课程**的修读学期、所得成绩、授予学分，并反映累计总学分和**学生**的绩点（GPA）。\n\
  \n*   ***成绩单条目：*** **成绩单**中的单行项目，反映**课程**编号与名称、修读学期、学分数值和所得成绩。\n\n**关系**\n\n*  \
  \ ***指导——教授指导学生：*** 教授被指派在整个学生的学术生涯中监督其学业，直至学生获得学位。指导老师就课程选择、职业机会以及学生可能遇到的任何学业问题向其指导对象提供建议。\n\
  \n*   ***参加——学生参加教学班：*** 学生注册教学班，参加一学期的课堂会议，并完成所有作业和考试，最终获得代表学生掌握该学科程度的字母等级。\n\n\
  *   ***要求——学习计划要求课程：*** 学生只有在学习计划中列出的课程才能修读。学习计划可在学生指导老师的批准下进行修改。\n\n*   ***维护——学生维护成绩单：***\
  \ 每次学生完成一门课程，该课程及所得成绩的记录都会被添加到学生的成绩单中。\n\n*   ***遵循——学生遵循学习计划：*** 参见***要求***关联的注释。\n\
  \n*   ***开设为——课程开设为教学班：*** 同一门课程可以在给定学期内多次授课，当然也可以在课程的“生命周期”内跨越多个学期授课——即直到该学科内容被认为对学生群体不再有价值，或没有合格的教师来教授该课程为止。\n\
  \n*   ***先修课程——一门课程是另一门课程的先修课程：*** 如果确定课程 A 的学科内容是理解课程 B 学科内容的必要基础，则课程 A 被称为课程 B\
  \ 的先修课程。学生通常只有在成功完成课程 A 或能以其他方式证明掌握了课程 A 的学科内容后，才能修读课程 B。\n\n*   ***教授——教授教授教学班：***\
  \ 教授负责授课、布置有深度的作业、考核学生，并确保向学生提供高质量的课程学科内容教学。\n\n*   ***等待名单——学生被列入教学班等待名单：*** 如果某个教学班“已满”——例如，基于教室容量或被认为教学有效的学生小组规模，注册该课程的学生人数达到上限——那么有兴趣的学生可能会被列入等待名单，以便在该课程后续有空位时获得考虑。\n\
  \n（成绩单与成绩单条目之间的聚合关系）\n\n（人员作为教授的特化）\n\n（人员作为学生的特化）\n\n**属性**\n\n*   ***Person.ssn：***\
  \ 分配给个人的唯一社会安全号码（SSN）。\n\n*   [***Person.name：***](http://person.name) 个人姓名，格式为“姓，名”。\n\
  \n*   ***Professor.title：*** 教授获得的职称（例如，“兼职教授”）。\n\n*   ***Student.major：*** 反映学生主修学科所在的院系（例如，数学）。（我们假设学生只能指定一个主修专业。）\n\
  \n*   ***Student.degree：*** 学生正在攻读的学位（例如，理学硕士学位）。\n\n*   ***TranscriptEntry.grade：***\
  \ 字母等级 A、B、C、D 或 F，可带有可选的+/-后缀，例如 A+或 C–。\n\n*   ***Course.courseNo：*** 分配给课程的唯一\
  \ ID，由院系代号加院系内唯一数字 ID 组成（例如，MATH 101）。\n\n*   ***Course.courseName：*** 描述课程学科内容的完整名称（例如，面向对象入门）。\n\
  \n*   ***Course.credits：*** 课程所值的单元或学分数，大致相当于单周在课堂上的小时数（通常，全学期讲座课程为三个学分）。\n\n* \
  \  ***Section.sectionNo：*** 用于区分同一课程在同一学期内不同教学班/开设形式的唯一编号（例如，MATH 101，教学班编号 1）。\n\
  \n*   ***Section.dayOfWeek：*** 讲座课程上课的星期几。\n\n*   ***Section.timeOfDay：*** 课程上课的时间（范围）（例如，14:00\
  \ 至 16:00）。\n\n*   ***Section.semester：*** 表明教学班开设的学期（例如，2025 年春季）。\n\n*   ***Section.room：***\
  \ 教学班上课的教学楼和房间号（例如，创新厅，333 室）。\n\n*   ***Section.seatingCapacity：*** 允许注册教学班的最大学生人数。\n\
  \n\n\n## 元数据\n\n初学者经常提出的一个问题是：为什么我们不使用继承关系来关联`Course`和`Section`类，而是像我们选择的那样使用简单的关联？表面上看，让`Section`成为`Course`的派生类似乎确实很有吸引力，因为`Course`列出的所有属性——`courseNo`、`courseName`和`creditValue`——也适用于`Section`；那么，为什么我们不让`Section`像`Student`和`Professor`继承`Person`的所有属性那样，***继承***这些属性呢？一个简单的例子就能很快说明为什么继承并不合适。\n\
  \n假设因为“面向对象概念入门”是一门非常受欢迎的课程，大学在 2025 年春季学期开设了该课程的三个教学班。因此，我们实例化了一个`Course`对象和三个`Section`对象。如果`Section`是`Course`的派生类，那么所有***四个***对象都会携带`courseNo`、`courseName`和`creditValue`属性。填写这四个对象的属性值，如表\
  \ 10-3 所示，我们看到这四个对象的属性值存在大量重复：我们***重复***了相同的`courseNo`、`courseName`和`creditValue`属性值四次。这是因为`Course`对象中包含的信息是***众多***`Section`对象所共有的，因此也描述了这些对象。\n\
  \n表 10-3\n\n四个对象实例间的数据重复\n\n| 属性名 | Course 对象的属性值 |\n| --- | --- |\n| `courseName`\
  \ | 面向对象概念入门 |\n| `courseNo` | OBJECTS 101 |\n| `creditValue` | 3 |\n\n| 属性名 | Section\
  \ 对象 #1 的属性值 | Section 对象 #2 的属性值 | Section 对象 #3 的属性值 |\n| --- | --- | --- | ---\
  \ |\n| `courseName` | 面向对象概念入门 | 面向对象概念入门 | 面向对象概念入门 |\n| `courseNo` | OBJECTS 101\
  \ | OBJECTS 101 | OBJECTS 101 |\n| `creditValue` | 3 | 3 | 3 |\n| `studentsRegistered`\
  \ | (待定) | (待定) | (待定) |\n| `instructor` | 指向教授 X 的引用 | 指向教授 Y 的引用 | 指向教授 Z 的引用\
  \ |\n| `semesterOffered` | 2025 年春季 | 2025 年春季 | 2025 年春季 |\n| `dayOfWeek` | 星期一\
  \ | 星期二 | 星期四 |\n| `timeOfDay` | 下午 7:00 | 下午 4:00 | 下午 6:00 |\n| `classroom` |\
  \ A 厅，123 室 | B 厅，234 室 | A 厅，345 室 |\n\n为了减少冗余并促进封装，我们应该消除这些属性的***继承***，而是为 *n*\
  \ 个相关的`Section`对象实例只创建一个`Course`对象实例。然后，我们可以让每个`Section`对象持有一个指向公共`Course`对象的句柄，以便在需要时检索这些共享值。这正是我们通过一对多的\
  \ *offered as* 关联所建模的方式。\n\n当某个类`A`的实例封装了描述另一个类`B`的众多实例（例如`Course`之于`Section`）的信息时，我们将`A`对象（`Course`）包含的信息称为相对于`B`对象（`Section`）的**元数据**。\n\
  \n## 总结\n\n我们的对象模型已经开始成形！我们清楚地了解了 SRS 所需的静态结构——类、它们的属性以及它们之间的相互关系——并且能够以简洁的图形形式传达这些知识。本章未涵盖\
  \ UML 符号的许多其他修饰，但我们已研究了足以满足大多数“工业级”建模项目的核心概念。\n\n然而，我们的类图中有一个明显的“漏洞”：我们所有的类都有空的操作区域。我们将在第\
  \ 11 章中通过学习一些用于确定对象***动态行为***的补充建模技术来解决这个缺陷。\n\n在本章中，你学习了\n\n*   用于识别候选领域类的名词短语分析技术\n\
  *   用于确定这些类之间潜在关系的动词短语分析技术\n*   提出候选类具有一定主观性，因此我们必须保持灵活性，反复审视我们的模型，直到我们和用户对结果都满意为止\n\
  *   生成数据字典作为项目文档集一部分的重要性\n*   如何使用 UML 符号以类图的形式图形化地描绘模型的静态结构\n*   为项目团队配备经验丰富的对象建模导师的重要性\n\
  \n练习\n\n1.  为附录中介绍的处方跟踪系统 (PTS) 案例研究列出一份候选类列表，以及一个关联矩阵。\n2.  使用 UML 符号为 PTS 案例研究开发一个类图。反映所有重要的属性和类之间的关系，包括适当的多样性。理想情况下，如果你有可用的对象建模软件工具，应该使用它。\n\
  3.  为 PTS 准备一份数据字典，包括所有类、属性和关联的定义。\n4.  为你为第 1 章练习 3 定义的需求所对应的问题领域，列出一份候选类列表，以及一个关联矩阵。\n\
  5.  使用 UML 符号为你为第 1 章练习 3 定义的需求所对应的问题领域，开发一个类图。反映所有重要的属性和类之间的关系，包括适当的多样性。理想情况下，如果你有可用的对象建模软件工具，应该使用它。\n\
  6.  为你为第 1 章练习 3 定义的需求所对应的问题领域，准备一份数据字典，包括所有类、属性和关联的定义。\n\n\n\n"
- "# 11. 系统动态/行为方面的建模\n\n行为如何影响状态 事件 场景 “课程注册”用例的场景 #1 “课程注册”用例的场景 #2 顺序图 确定场景 #1\
  \ 中的对象和外部参与者 准备顺序图 使用顺序图确定方法 通信图 修订后的 SRS 类图 总结\n\n到目前为止，我们一直专注于所建模问题的**静态结构**——就像我们定制住宅的平面图。正如你在第\
  \ 10 章所学到的，这种静态结构通过类图及配套文档来传达。类图的构建块包括：\n\n*   类。\n*   关联/聚合。\n*   属性。\n*   泛化/特化层次结构（也称为继承关系）。\n\
  *   操作/方法。***这些在我们的类图中明显缺失***。为什么？因为它们不属于静态结构的一部分，所以我们还没有讨论如何确定它们；本章将重点讨论这个主题。\n\
  \n正如我之前多次提到的，面向对象软件系统是一组协作的对象，每个对象都有自己的“生命周期”。然而，如果每个对象都只顾自己的事务，而不考虑其他对象需要它做什么，那么将会陷入彻底的混乱！对象能够协作以执行某些整体系统任务（例如为学生注册课程）的唯一方式是，每个类都定义了适当的方法——***服务***——使其实例能够在协作中履行各自的角色。\n\
  \n为了确定这些方法/服务必须是什么，我们必须通过建模情境的**动态**方面来补充我们对待构建系统静态结构的认识：即，并发活动对象如何随时间交互，以及这些交互如何影响每个对象的状态。生成动态模型以补充静态模型，不仅能使我们确定每个类所需的方法，还能为我们提供改进静态结构的新见解。\n\
  \n在本章中，你将学习**动态模型**的构建块：\n\n*   事件\n*   场景\n*   顺序图\n*   通信图\n\n以及如何利用从这些建模产物中收集到的知识，来识别完成类图所需的操作/方法。\n\
  \n## 行为如何影响状态\n\n回到第 3 章，我们将对象的***状态***定义为在给定时间点该对象所有属性值的集合，包括：\n\n*   该对象所有“简单”属性的值——换句话说，不表示其他领域对象的属性\n\
  *   所有表示与其他领域对象链接的引用变量属性的值\n\n表 11-1 重复了第 6 章中的 `Student` 属性列表，并增加了一列来指示每个属性属于哪个类别。\n\
  \n**表 11-1**\n\n*Student* 类属性\n\n| 属性名称 | 数据类型 | 是否表示指向 SRS 领域对象的链接？ |\n| --- |\
  \ --- | --- |\n| `Name` | `String` | 否 |\n| `studentID` | `String` | 否 |\n| `birthDate`\
  \ | `Date` | 否 |\n| `Address` | `String` | 否 |\n| `Major` | `String` | 否 |\n| `Gpa`\
  \ | `double` | 否 |\n| `Advisor` | `Professor` | 是 |\n| `courseLoad` | `Course` 对象集合\
  \ | 是 |\n| `Transcript` | `TranscriptEntry` 对象集合，或 `Transcript` | 是 |\n\n在第 10 章中，你学习了\
  \ UML 对象图，它用于描绘特定个体对象之间链接的“快照”。让我们使用对象图来反映 SRS 领域中几个假设对象的状态。\n\n图 11-1 显示 Smith\
  \ 博士（一位 `Professor`）在数学系工作；Green 博士（另一位 `Professor`）在科学系工作；Bill 和 Mary 都是 `Student`，分别主修数学和科学。\n\
  \n![](img/78624_3_En_11_Fig1_HTML.jpg)\n\n一个状态图展示了两个系：数学系和科学系。在数学系，Smith 博士担任教授，Bill\
  \ 主修数学。在科学系，Green 博士担任教授，Mary 主修科学。\n\n**图 11-1**\n\n对象的状态包括它与其他对象保持的链接\n\nBill\
  \ 对自己的专业选择不满意，于是给他钦佩的教授 Green 博士打电话预约。Bill 想讨论转到科学系的可能性。在与 Green 博士会面并讨论了他的情况后，Bill\
  \ 确实决定转专业。我非正式地使用对象图上的箭头反映了这些对象交互，如图 11-2 所示；随着本章的深入，你将学习用 UML 符号表示对象交互的正式方法。\n\n\
  ![](img/78624_3_En_11_Fig2_HTML.jpg)\n\n一个状态图展示了两个系：数学系和科学系。在数学系，Smith 博士担任教授，Bill\
  \ 主修数学。在科学系，Green 博士担任教授，Mary 主修科学。Bill 学生打电话预约、会面，并转专业到科学系。\n\n**图 11-2**\n\n对象的交互会影响它们的状态\n\
  \n当所有这些活动尘埃落定后，我们看到系统的最终状态发生了变化，如图 11-3 中修订后的对象图所示。具体来说：\n\n*   Bill 的状态发生了变化，因为他与数学系对象的链接已被替换为与科学系对象的链接。\n\
  *   数学系对象的状态发生了变化，因为它不再与 Bill 有链接。\n*   科学系的状态发生了变化，因为它现在有一个之前没有的额外链接（指向 Bill）。\n\
  \n但请注意，尽管 Green 博士与 Bill 合作帮助他做出转专业的决定，但“Green 博士”（`Professor`）对象的***状态并未***因这次协作而改变。\n\
  \n![](img/78624_3_En_11_Fig3_HTML.jpg)\n\n一个状态图展示了两个系：数学系和科学系。在数学系，Smith 博士担任教授，Bill\
  \ 主修数学。在科学系，Green 博士担任教授，Mary 主修科学。从 Bill 的主修数学到科学系有一条新链接。\n\n**图 11-3**\n\n一些交互对象**不会**经历状态变化\n\
  \n因此我们看到：\n\n*   对象的动态活动可能导致**系统静态结构**的变化——即所有对象状态的集合。\n*   然而，这些活动不一定影响协作中***所有***对象的状态。\n\
  \n\n\n### 事件\n\n你在第 4 章中已经看到，对象之间的协作是由事件触发的。回顾一下，***事件*** 是作用于对象的外部刺激，以 ***消息***（方法调用）的形式传递给对象。事件可以是：\n\
  \n*   ***用户发起***（例如，在图形用户界面上点击按钮或链接的结果）\n*   ***由另一个计算机系统发起***（例如，信息从学生计费系统传输到学生注册系统）\n\
  *   ***由同一系统内的另一个对象发起***（例如，一个 `Course` 对象请求 `Transcript` 对象提供某项服务）\n\n当一个对象通过消息接收到事件通知时，它可能会以下列一种或多种方式做出反应：\n\
  \n*   对象可能改变其状态。\n*   对象可能将事件（消息）导向另一个对象。\n*   对象可能返回一个值。\n*   对象可能与其系统的外部边界进行交互。\n\
  *   对象可能看似忽略了该事件。\n\n让我们逐一详细讨论这五种反应类型。\n\n#### 对象可能改变其状态\n\n对象可能改变其状态（其“简单”属性的值和/或与其他对象的链接），例如，一个\
  \ `Professor` 对象接收到一条消息，要求其接纳一名新的 `Student` 作为指导对象，如下面的代码片段所示：\n\n```\nProfessor\
  \ p = new Professor();\nStudent s = new Student();\n// 细节省略。\np.addAdvisee(s);\n\
  ```\n\n让我们看看 `Professor` 类的 `addAdvisee` 方法的代码，了解 `Professor` 将如何响应此消息。我们看到 `Professor`\
  \ 对象正在将作为参数传入的 `Student` 对象 `s` 的引用插入到一个名为 `advisees` 的 `Student` 对象引用集合中：\n\n```\n\
  public class Professor {\n// 属性。\nCollection advisees;  // 保存 Student 对象引用。\n//\
  \ 其他细节省略。\npublic void addAdvisee(Student s) {\n// 将 s 插入到 advisees 集合中。\nadvisees.add(s);\n\
  }\n}\n```\n\n这样一来，`Professor` 对象 `p` 将与 `Student` 对象 `s` 形成一条新的 *指导* 类型的链接（见图 11-4）。\n\
  \n![](img/78624_3_En_11_Fig4_HTML.jpg)\n\n状态图展示了教授与学生之间的关系，该关系与 0、1 指导 和 0、星号 相互关联。0、1\
  \ 指导 表示一位教授可能指导零个或一个学生，而 0、星号 表示一个学生可能拥有零个或多个星号，这些星号可能代表学术成就或来自教授的表彰。\n\n图 11-4\n\
  \n重温指导关联的 UML 图\n\n典型的“设置”方法属于此类事件响应。\n\n#### 对象可能将事件（消息）导向另一个对象\n\n对象可能将事件（消息）导向另一个对象（可能包括原始消息的发送者），例如，一个\
  \ `Section` 对象接收到一条注册 `Student` 的消息，如下面的代码片段所示：\n\n```\nSection x = new Section();\n\
  Student s = new Student();\n// 细节省略。\nx.register(s);\n```\n\n如果我们接下来查看 `Section`\
  \ 类的 `register` 方法的代码，了解它将如何响应此消息，我们会看到 `Section` 对象反过来向要注册的 `Student` 发送一条消息，以验证该\
  \ `Student` 是否已完成必要的先修课程：\n\n```\npublic class Section {\n// 细节省略。\npublic boolean\
  \ register(Student s) {\n// 验证该学生是否已完成必要的先修课程。\n// （我们将部分工作委托给另一个对象，即 Student s。）\n\
  // 伪代码。\nboolean completed = s.successfullyCompleted(some prerequisite);\nif (completed)\
  \ {\n// 伪代码。\n注册该学生并返回 true 值；\n}\nelse {\n// 伪代码。\n返回 false 值以表示注册请求已被拒绝；\n}\n\
  }\n}\n```\n\n这恰好是我们在第 4 章中讨论过的***委托***的一个例子：即另一个对象（此处为 `Student`）帮助完成最初由 `Section`\
  \ 对象提出的服务请求。\n\n#### 对象可能返回一个值\n\n对象可能返回一个值。返回的值可以是以下之一：\n\n*   对象某个属性的值\n*   某个计算出的值（即我们在第\
  \ 4 章讨论过的“伪属性”）\n*   通过委托从某个***其他***对象获取的值\n*   状态码（例如 `true`/`false` 响应，表示 `boolean`\
  \ 方法的成功或失败）\n\n典型的“获取”方法属于此类事件响应。\n\n#### 对象可能与其系统的外部边界进行交互\n\n对象可能与其系统的外部边界进行交互；也就是说，它可能在图形用户界面上显示某些信息，或导致信息传递给另一个应用程序。然而，正如你将在第\
  \ 15 章和第 [16](https://doi.org/10.1007/978-1-4842-9060-6_16) 章中学到的，看似是外部系统边界的东西，在\
  \ Java 中通常被实现为另一个对象。\n\n#### 对象可能看似忽略了该事件\n\n最后，对象可能看似忽略了该事件，例如，一个 `Professor` 对象收到添加指导学生的消息，但确定被要求接纳为指导对象的\
  \ `Student` ***已经*** 是其指导对象：\n\n```\nStudent s = new Student();\nProfessor p = new\
  \ Professor();\n// 细节省略。\n// Professor p 将看似“忽略”下一条消息。\np.addAdvisee(s);\n```\n\n\
  让我们看看与之前略有不同的 `addAdvisee` 方法版本：\n\n```\npublic class Professor {\nCollection advisees;\
  \  // 保存 Student 对象引用。\n// 细节省略。\npublic void addAdvisee(Student s) {\n// 仅当 s 尚未在\
  \ 'advisees' 集合中时，才将其插入。\n// 伪代码。\nif (s is already in collection) return;  // 不执行任何操作\n\
  else advisees.add(s);\n}\n}\n```\n\n实际上，说 `Professor` 对象什么都没做是一种过于简化的说法：至少，该对象正在执行相应的方法代码，该代码正在执行一些内部状态检查（“这个学生已经是我的指导对象了吗？”）。只不过，当一切尘埃落定时，`Professor`\
  \ 对象既没有改变状态，也没有向其他对象发送任何消息，所以它***看起来***好像什么都没发生过。\n\n\n\n## 场景\n\n源自应用程序外部的事件是随机发生的：例如，我们无法预测用户何时会点击图形用户界面上的按钮。然而，为了使应用程序执行有用的功能，作为对这些外部事件的***响应***而产生的***内部***事件——换句话说，即对象在执行某些系统功能时交换的消息——***不能***任其随机发生。相反，它们必须以因果方式被编排，以导向某个期望的结果。就像乐谱指示各种乐器必须演奏哪些音符才能产生旋律一样，**场景**规定了从开始到结束执行某个系统功能时必须发生的内部消息（事件）序列。\n\
  \n我在第 9 章中引入了用例，将其作为一种从外部参与者（用户或其他计算机系统）的角度来指定应用程序所有目标的方法。*《韦氏大学词典》第 11 版*将术语***场景***定义为：\n\
  \n*一系列事件，尤指想象的事件；特指：对可能的行为过程或事件的描述或概要。*\n\n这正是该术语在对象建模意义上的用法。\n\n一个场景是某个特定用例可能如何展开的一个假设性实例。正如对象是类的实例、链接是关联的实例一样，***一个场景可以被视为一个用例的实例***。或者换句话说，正如类是创建对象的模板、关联是创建链接的模板一样，***一个用例是创建场景的模板***。因此，单个用例可以衍生出许多不同的场景，就像规划从一个城市到另一个城市的驾车旅行可能涉及许多不同的路线一样。\n\
  \n我们以叙述的方式描述场景，将其视为从一个假设的观察者的角度观察到的一系列步骤，该观察者不仅能够看到系统在执行特定请求时外部发生的情况，还能看到系统内部幕后发生的事情。（但请注意，即使我们现在关注的是内部系统流程，我们仍然只对第\
  \ 9 章中定义的***功能***需求感兴趣，而不是计算机如何工作的“比特和字节”。）\n\n以下是一个代表“注册课程”用例的示例场景，这是我们在第 9 章中为\
  \ SRS 确定的几个用例之一。\n\n### “注册课程”用例的场景 #1\n\n在第一个场景中，一位名叫弗雷德的学生成功注册了一门课程。具体的事件序列如下：\n\
  \n1.  学生弗雷德登录 SRS。\n2.  他查看当前学期的课程表，以确定他希望注册哪些课程。\n3.  弗雷德申请了一门名为“面向对象概念入门”、课程编号为\
  \ OBJ101、第 1 节的特定课程的一个名额。\n4.  检查弗雷德的学习计划，以确保所申请的课程符合他的总体学位目标。（我们假设学生不允许选修其学习计划之外的课程。）\n\
  5.  检查他的成绩单，以确保他已满足所申请课程的所有先修课程要求（如果有的话）。\n6.  确认该课程有名额。\n7.  将该课程添加到弗雷德当前的课程负荷中。\n\
  \n从弗雷德的角度（坐在电脑屏幕前！）来看，他感知到的情况是这样的：登录 SRS 后，他从可用课程列表中选择 OBJ101 第 1 节，表明他希望注册该课程，然后点击“添加”按钮（见图\
  \ 11-5）。\n\n![](img/78624_3_En_11_Fig5_HTML.jpg)\n\n屏幕显示一个学生注册系统，包含社会安全号码、姓名、总课程数、已注册课程和课程表等字段。一个箭头指向“添加”按钮，表明学生可以通过点击该按钮将课程添加到他们的注册中。该系统允许学生查看他们当前的注册状态并根据需要进行更改。\n\
  \n图 11-5\n\n弗雷德视角，第一部分\n\n片刻之后，弗雷德收到一条确认消息，如图 11-6 所示。\n\n![](img/78624_3_En_11_Fig6_HTML.jpg)\n\
  \n屏幕显示一个学生注册系统，包含社会安全号码、姓名、总课程数、已注册课程和课程表等字段。一个弹出屏幕显示“请求成功，CMP 101 名额已确认”以及“确定”按钮。\n\
  \n图 11-6\n\n弗雷德视角，第二部分\n\n弗雷德（在很大程度上）并不知道所有代表他进行的“幕后”处理步骤。\n\n前面的场景代表了一个“最佳情况”的场景，一切进展顺利，弗雷德最终成功注册了所申请的课程。但是，正如我们非常清楚的那样，事情并不总是如此顺利，以下针对***同一个***用例的替代场景就证明了这一点。除了以***粗体***显示的步骤外，场景#1\
  \ 和场景#2 之间的一切都是相同的。\n\n\n\n### “注册课程”用例的场景 #2\n\n在此场景中，弗雷德再次尝试注册一门课程。虽然他满足所有要求，但所申请的课程名额不幸已满。SRS\
  \ 为弗雷德提供了加入候补名单的选项。具体事件序列如下：\n\n1.  学生弗雷德登录 SRS。\n\n2.  弗雷德查看当前学期的课程安排，以确定他想要注册的课程。\n\
  \n3.  弗雷德申请一门名为“面向对象概念入门”、课程编号为 OBJ101、第 1 节的特定课程名额。\n\n4.  检查弗雷德的学习计划，以确保所申请的课程符合他的总体学位目标。\n\
  \n5.  检查他的成绩单，以确保他已满足所申请课程的所有先修课程要求（如有）。\n\n6.  ***检查该课程的名额可用性，但发现该课程已满。***\n\n\
  7.  ***询问弗雷德是否愿意加入先到先得的候补名单。***\n\n8.  ***弗雷德选择加入候补名单。***\n\n稍加想象，你无疑能想到该用例的许多其他场景，例如弗雷德申请了一门他的学习计划中未要求的课程，或者一门他尚未满足先修条件的课程。此外，正如第\
  \ 9 章所讨论的，还有许多其他***用例***需要考虑。\n\n对于给定的用例，我们应该考虑多少备选场景才算有实际限制？与所有需求分析一样，停止的标准有些主观。当我们似乎无法再生成***显著不同***的场景时，我们就停止；应避免琐碎的变体。\n\
  \n在设计场景时，观察我们正在建模的系统的未来用户当前如何执行相同的业务功能通常很有帮助。例如，在学生注册的情况下，学生目前必须经过哪些手动或自动步骤才能注册课程？大学在认定学生有资格注册之前会采取哪些步骤？无论当前的注册流程是\
  \ 100% 手动，还是基于你将要替换或增强的自动化系统，观察当前实现特定业务目标所涉及的步骤，都可以作为一个或多个有用场景的基础。\n\n场景一旦编写完成，应添加到我们项目的用例文档中；通常，我们会将所有场景与该文档中的相关用例配对。\n\
  \n为什么场景如此重要？因为它们是开始深入了解对象所需***行为***的手段。我们需要一种方法来形式化这些场景，以便每个类所需的实际方法变得清晰；UML **序列图**就是我们实现这一目标的方式，因此现在让我们讨论如何准备这些图。\n\
  \n## 序列图\n\n序列图是 UML **交互图**的两种类型之一（我们将在本章稍后探讨第二种类型，即**通信图**）。序列图是一种以图形方式描绘在实现给定场景时消息如何在对象之间流动的方法。\n\
  \n我们将通过为“注册课程”用例的场景 #1 创建一个序列图来说明创建序列图的过程。\n\n### 确定场景 #1 的对象和外部参与者\n\n要准备序列图，我们必须首先确定：\n\
  \n*   哪些对象类（来自我们在第 10 章的静态模型 [类图] 中指定的那些）参与执行特定场景\n*   涉及哪些外部参与者\n\n回顾“注册课程”用例的场景\
  \ #1，我们确定涉及以下对象：\n\n*   一个 `Student` 对象（代表弗雷德）\n*   一个 `Section` 对象（代表名为“面向对象概念入门”、课程编号\
  \ OBJ101、第 1 节的课程）\n*   一个属于弗雷德的 `PlanOfStudy` 对象\n*   一个也属于弗雷德的 `Transcript` 对象\n\
  \n该场景还提到学生“查看当前学期的课程安排，以确定他想要注册的课程”。你可能还记得，在第 10 章中确定候选类时，我们曾争论是否将 `ScheduleOfClasses`\
  \ 作为候选类添加到模型中，当时我们选择将其排除在外。为了充分表示场景 #1 的细节，我们将推翻这一决定，现在将 `ScheduleOfClasses` 逆向添加到我们的\
  \ UML 类图中，如下所示：\n\n*   我们将展示 `ScheduleOfClasses` 与 `Section` 类参与一对多的聚合关系，因为每个学期将实例化一个\
  \ `ScheduleOfClasses` 对象，以表示该学期开设的所有课程。（这是对学生查看的纸质手册或在线课程安排的抽象，以选择他们在给定学期希望注册的课程。）\n\
  *   我们还将把 `semester` 属性从 `Section` 类转移到 `ScheduleOfClasses`。由于每个 `Section` 对象现在将通过它们之间的聚合关系维护对其关联的\
  \ `ScheduleOfClasses` 对象的引用，因此 `Section` 对象将能够在需要时请求学期信息。\n\n这些对类图的更改结果在图 11-7 中突出显示。\n\
  \n![](img/78624_3_En_11_Fig7_HTML.jpg)\n\n一个图表说明了移除一个属性部分，并用一个封装了此信息的类的关联替换课程安排。\n\
  \n图 11-7\n\n微调 UML 图\n\n将 `ScheduleOfClasses` 确认为我们模型中的一个类，使我们能够在序列图中引用 `ScheduleOfClasses`\
  \ 对象，我们稍后将看到这一点。场景常常会揭示新的类、属性和关系，从而有助于我们构建系统的结构“图景”；这是一种常见现象，也是动态建模的***理想***副作用。\n\
  \n当然，我们还必须记得将 `ScheduleOfClasses` 的定义添加到数据字典中。\n\nScheduleOfClasses\n\n特定学期提供的所有课程/**课程**的列表；**学生**查看**课程安排**以确定他们希望注册哪些**课程**。\n\
  \n最后，由于该场景明确提到了学生用户与系统之间的交互，我们将把作为***参与者***的弗雷德与作为***对象***的弗雷德分开反映。这样做将使我们能够表示 SRS\
  \ 与用户的外部交互，以及系统内部的对象间交互。我们将代表参与者抽象的对象称为**边界类**的实例。\n\n我们调整后的对象/参与者参与列表如下：\n\n* \
  \  一个 `Student` 对象（代表弗雷德）\n*   一个 `Section` 对象（代表名为“面向对象入门”、课程编号 OBJ101、第 1 节的课程）\n\
  *   一个属于弗雷德的 `PlanOfStudy` 对象\n*   一个也属于弗雷德的 `Transcript` 对象\n*   一个 `ScheduleOfClasses`\
  \ 对象\n*   一个 `Student` 参与者（又是弗雷德！）\n\n\n\n### 准备时序图\n\n要为场景 #1 准备时序图，我们需要执行以下步骤：\n\
  \n*   我们绘制垂直虚线，每个参与场景的对象或参与者对应一条；这些线被称为对象的**生命线**。请注意，对象/参与者可以在图中从左到右以任意顺序列出，尽管通常的做法是将外部用户/参与者放在最左侧。\n\
  \n*   在每条生命线的顶部，根据情况，我们放置一个**实例图标**——即一个包含对象参与者（可选）名称和类的方框——或者一个火柴人符号来表示参与者。（关于如何构成实例图标的规则，请参考第\
  \ 10 章中关于创建对象图的章节。）\n\n*   然后，对于场景中提到的每个事件，我们将其对应的消息反映为一条从发送者生命线指向接收者生命线的水平***实线***箭头。\n\
  \n*   来自消息的响应（换句话说，方法的返回值，或者对于声明为 `void` 返回类型的方法，简单的 `return;` 语句）显示为从原始消息的**接收者**生命线***返回***到消息**发送者**生命线的水平***虚线***箭头。\n\
  \n*   消息箭头在图中按时间顺序从上到下排列。\n\n场景 #1 的完整时序图如图 11-8 所示。\n\n![](img/78624_3_En_11_Fig8_HTML.jpg)\n\
  \n时序图说明了以下步骤：登录、从数据库检索对象、请求显示课程表、课程表已显示、请求座位、验证学习计划、学习计划已验证、检查先修课程、已确认、确认座位可用性、添加到课程负载并显示确认座位消息。\n\
  \n图 11-8\n\n场景 #1 的时序图\n\n让我们逐步浏览该图，以确保您理解图中反映的所有活动：\n\n![](img/78624_3_En_11_Fig9_HTML.png)\n\
  \n时序图说明了以下步骤：学生、登录、从数据库检索对象。\n\n图 11-9\n\n当 Fred 登录时，一个 `Student` 对象被实例化。\n\n1.\
  \  当 Fred 登录系统时，他作为对象的“另一个自我”被激活（见图 11-9）。\n\n可以推测，代表每个 `Student` 的信息——换句话说，`Student`\
  \ 对象的属性值——在离线状态下保存在持久存储中（例如 DBMS 或文件），直到学生登录时，这些信息才被用来在内存中实例化一个 `Student` 对象，以镜像刚刚登录的用户。我们将在第\
  \ 15 章讨论如何从持久存储中重构对象。\n\n![](img/78624_3_En_11_Fig10_HTML.png)\n\n图表说明了请求显示课程表以及课程表已显示。\n\
  \n图 11-10\n\n按要求，显示了课程表\n\n1.  当用户/参与者 Fred 请求显示学期课程表时，我们反映消息“请求显示课程表”被发送给一个匿名的\
  \ `ScheduleOfClasses` 对象。来自 `ScheduleOfClasses` 对象的虚线箭头响应表明课程表正在通过 GUI 显示给用户（严格来说）（见图\
  \ 11-10）。\n\n我选择用*斜体*而不是常规字体来标记响应箭头，这与官方 UML 符号略有不同。\n\n1.  图中显示的下一条消息是从用户到 `Section`\
  \ 对象的消息，请求在该课程中获得一个座位。\n\n这条消息显示为源自用户。实际上，它源自 SRS GUI 的一个 GUI 组件对象，但在分析工作的这个阶段，我们不必担心这些实现细节。\n\
  \n请注意，这条消息没有立即得到回复；这是因为 `Section` 对象在能够授予该学生座位之前，需要咨询其他几个对象，即：\n\n![](img/78624_3_En_11_Fig11_HTML.png)\n\
  \n图表说明了确认座位可用性。\n\n图 11-11\n\n所请求教学班的可用性已确认\n\n1.  假设这两个其他对象都给出了肯定的响应（根据此场景的编写方式，它们理应如此），那么\
  \ `Section` 对象随后会执行一些内部处理，以验证该教学班确实有 Fred 的位置。我们将单个对象内的内部处理反映为一条循环回到其起始生命线的箭头，如图\
  \ 11-11 所示。\n\n*   `Section` 向代表 Fred 学习计划的对象发送一条消息，要求该对象确认 Fred 所请求的课程是否是其完成学位课程所需的课程之一。\n\
  \n*   接下来，`Section` 向代表 Fred 成绩单的对象发送一条消息，要求该对象确认该学生是否已令人满意地完成了先修课程——例如 COMP 001。\n\
  \n当然，如果我们要反映时序图中每个对象执行的***所有***内部处理，那么图中将***充斥***着这样的循环！我们选择显示这个特定循环的唯一原因是因为它在场景\
  \ #1 中被明确地作为一个步骤提出来；如果我们从图中省略它，可能会显得我们意外地忽略了这一步。\n\n1.  最后，在所有检查都通过后，`Section` 对象还有两个职责：\n\
  \    *   首先，它向“Fred”`Student` 对象发送一条新消息，请求 `Student` 对象将此 `Section` 添加到 Fred 的课程负载中。\n\
  \n*   接下来，`Section` 对象向用户/参与者 Fred 发送一个响应（通过 GUI），确认他在该教学班中的座位。这是对用户在该场景开始时发送的原始“请求座位”消息的响应！所有为完成该请求所必需的额外“幕后”处理——涉及\
  \ `Section` 对象与 `PlanOfStudy` 对象、`Transcript` 对象和 `Student` 对象的协作——对用户来说是透明的。正如我们在本章前面看到的，Fred\
  \ 只是从 SRS GUI 上显示的课程表中选择了某个教学班，点击了“添加”按钮，片刻之后，他的屏幕上就出现了一条确认消息。\n\n当然，与所有建模一样，这个特定的时序图不一定是描绘所选场景的最佳或唯一方式。而且，就此而言，我们可以讨论一个场景相对于另一个场景的相对优点。重要的是要记住，准备时序图只是达到目的的一种手段：即发现待构建系统的动态方面——也就是方法——以补充我们对系统的静态/结构知识。回想一下，本书第\
  \ 2 部分的***最终***目标是生成一个面向对象的蓝图，我们可以将其作为在第 3 部分中编码 SRS 模型层的基础。但是，正如已经指出的，我们在第 10 章中创建的类图有一个明显的缺陷：其所有类的操作部分都是空的。幸运的是，时序图为我们提供了缺失的信息，我们接下来将讨论这一点。\n\
  \n\n\n## 使用时序图确定方法\n\n既然我们已经准备好了时序图，那么如何充分利用其中包含的信息呢？具体来说，我们如何从这些图中“提取”关于各个类需要实现的方法的信息？\n\
  \n这个过程其实相当简单。我们逐步浏览图表，一次查看一条生命线，并研究指向该线的所有箭头：\n\n*   表示向对象发起新请求的箭头——实线箭头——标志着接收对象必须能够执行的方法。例如，我们看到一个标有“检查先修课程”的实线箭头指向代表`Transcript`对象的生命线。这告诉我们，`Transcript`类需要定义一个方法，允许某个客户端对象传入一个特定的课程对象引用，并收到一个响应，指示该`Transcript`是否包含该课程已成功完成的证据。\n\
  \n*   我们可以自由地以最直观、最有意义的方式命名方法，但要符合第 4 章讨论的方法命名约定。在这个特定场景中，我们使用该方法来检查先修课程的完成情况，因此我们可以将方法声明如下：\n\
  \n```\nboolean checkPrerequisite(Course c)\n```\n\n但这个名称不必要的局限；我们使用此方法***真正***要做的是检查某个`Course\
  \ c`是否成功完成。它恰好是另一门课程的先修课程这一事实，与方法将如何执行无关。因此，将方法命名为\n\n```\nboolean verifyCompletion(Course\
  \ c)\n```\n\n取而代之，我们将能够在应用程序中任何需要验证课程是否成功完成的地方使用它——例如，当我们检查学生是否满足毕业所需的所有课程要求时。（当然，即使它被命名为`checkPrerequisite`，我们仍然可以以这种方式使用该方法，但那样我们的代码的自我文档化能力就会降低。）\n\
  \n*   表示其他对象执行的操作的响应的箭头——虚线箭头——不会被建模为方法/操作。然而，它们确实暗示了发出此响应的方法的返回类型。例如，由于对“验证学习计划”消息的响应是“学习计划已验证”，这意味着该方法返回一个`boolean`结果；因此，我们将方法头声明如下：\n\
  \n*   循环也代表方法调用，由对象对自身执行；这些既可以代表私有的“内部管理”方法，也可以代表其他客户端对象可以使用的公有方法。\n\n```\nboolean\
  \ verifyPlan(Course c)\n```\n\n表 11-2 总结了前几页中场景#1 的时序图所反映的所有箭头。\n\n表 11-2\n\n确定场景#1\
  \ 所隐含的方法\n\n| 箭头标签 | 指向类`X`绘制 | 新请求还是对先前请求的响应？ | 要添加到类`X`的方法 |\n| --- | --- | ---\
  \ | --- |\n| 登录 | `Student` | 请求 | （一种从持久化存储（如文件或数据库）中重建此对象的方法；可能是一种特殊的构造函数形式——我们将在本书第\
  \ 3 部分讨论） |\n| 请求显示课程表 | `ScheduleOfClasses` | 请求 | `void Display()` |\n| *课程表已显示*\
  \ | `Student` | *响应* | *不适用* |\n| 请求座位 | `Section` | 请求 | `boolean enroll(Student\
  \ s)` |\n| 验证学习计划 | `PlanOfStudy` | 请求 | `boolean verifyPlan (Course c)` |\n| *学习计划已验证*\
  \ | `Section` | *响应* | *不适用* |\n| 检查先修课程 | `Transcript` | 请求 | `boolean verifyCompletion(Course\
  \ c)` |\n| *先修课程已确认* | `Section` | *响应* | *不适用* |\n| 确认座位可用性 | `Section` | 请求 |\
  \ `boolean confirmSeatAvailability()`（可能是一个私有的内部管理方法） |\n| 添加到课程负荷 | `Student` |\
  \ 请求 | `void addSection(Section s)` |\n| *显示确认座位的消息* | *(参与者/用户)* | *响应* | *不适用（最终将涉及调用用户界面对象的某个方法——我们将在本书第\
  \ 3 部分考虑这个问题）* |\n\n因此，我们已经确定了六个新的“标准”方法以及一个构造函数，这些都需要添加到我们的类图中，我们稍后将进行此操作。\n\n\
  为其他各种用例/场景组合重复此时序图生成和分析的过程，将揭示出我们为 SRS 需要实现的大部分方法。然而，尽管我们尽了最大努力，但有些方法可能直到我们开始编写类代码时才会浮现——这是意料之中的。\n\
  \n## 通信图\n\nUML 符号引入了第二种交互图，称为**通信图**，作为时序图的替代方案。两种类型的图呈现的信息基本相同，但以不同的方式描绘。\n\n\
  在通信图中，我们省略了用于描绘对象和参与者的生命线。相反，我们以最具视觉吸引力的配置方式，放置代表对象的实例图标和代表参与者的火柴人。然后，我们使用线条和箭头来表示这些对象/参与者之间来回传递的消息和响应的流程。由于我们失去了时序图中自上而下的消息流时间顺序感，我们通过按照特定场景执行期间箭头发生的顺序对其进行编号来弥补。\n\
  \n图 11-12 中的通信图等同于我们为场景#1 生成的时序图。\n\n![](img/78624_3_En_11_Fig12_HTML.jpg)\n\n状态图说明了几个元素之间的关系，包括学生、学习计划、C\
  \ M P 01 课程段、课程表和成绩单。这些元素相互连接，代表了学生学术旅程中的不同状态和转换。\n\n图 11-12\n\n场景#1 的通信图\n\n同样，从弗雷德的角度来看，他只观察到这些操作中的一小部分，如图\
  \ 11-13 所示。\n\n![](img/78624_3_En_11_Fig13_HTML.jpg)\n\n示意图说明了学生登录、请求显示课程表、请求座位、收到确认座位的消息以及查看显示的课程表的过程。\n\
  \n图 11-13\n\n弗雷德只看到了 SRS 协作的一小部分\n\n由于时序图和通信图反映的信息基本相同，许多对象建模软件工具可以自动让我们通过按下一个按钮，从一种图生成另一种图。\n\
  \n\n\n## 修订后的 SRS 类图\n\n回到我们在第 10 章中绘制的 SRS 类图，让我们反思一下从分析一个场景/时序图（见图 11-14）中获得的所有新见解——有些是行为层面的，有些是结构层面的。\n\
  \n![](img/78624_3_En_11_Fig14_HTML.jpg)\n\n该图展示了多个元素之间的关系，包括人员、学习计划、课程、教学班、成绩单条目、成绩单以及课程表。这些元素相互关联，代表了学生学术旅程的不同方面，从选择课程和安排课表，到通过成绩单跟踪学习进度。\n\
  \n图 11-14\n\n修订后的 SRS 类图\n\n请注意，我们决定暂时不反映 `confirmSeatAvailability` 这个“内务管理”方法，因为我们推测它将是一个私有方法，并且不希望让我们的图表变得杂乱。是否在类图中反映私有方法——或者就此而言，是否反映类的***任何***特性——取决于建模者，因为再次强调，图表的目的是为了沟通，而过多细节实际上可能会降低图表在这方面的有效性。\n\
  \n我们必须记住，每当我们向模型添加类、属性、关系或方法时，都要更新 SRS 数据字典。以下是我们可能希望在字典中描述方法的一种建议格式：\n\n*   ***方法***：`enroll`\n\
  \n*   ***所属类***：`Section`\n\n*   ***方法头***：`boolean enroll(Student s)`\n\n*   ***描述***：此方法将指定人员注册到该教学班，除非出现以下情况：(a)\
  \ 该教学班已满，(b) 学生的学习计划不要求此课程，或 (c) 学生未满足先修课程要求。该方法返回一个 `boolean` 值，以指示注册成功（`true`）或失败（`false`）。\n\
  \n## 本章小结\n\n在本章中，您已经了解到动态建模过程是如何作为静态建模的补充技术，丰富我们对待自动化问题的整体理解，从而帮助我们改进对象“蓝图”（也称为类图）。具体来说，您已经了解到：\n\
  \n*   事件如何触发状态变化\n*   如何基于用例开发场景\n*   如何将这些场景表示为 UML 交互图：时序图，或者通信图\n*   如何从时序图中收集关于对象预期行为的信息——即我们的类需要实现的方法——从而完善我们的类图\n\
  *   时序图如何也能提供关于系统结构方面的额外知识\n\n练习\n\n1.  针对你在第 2 章练习 3 中定义需求的问题领域，设计一个“有趣的”场景，并准备相应的时序图。\n\
  \n2.  根据你为练习 7 准备的时序图，提供一个你将添加到每个类中的所有方法头的列表。同时，注明任何需要新增的类、属性或关系。\n\n1.  药店的现有顾客玛丽·琼斯带来一张眼药水处方，要求配药。\n\
  2.  药剂师检查琼斯女士之前是否配过这种药。\n3.  药剂师发现她配过，而且上次续配的时间还不到一个月。\n4.  药剂师知道她的保险公司不会这么快就批准为同一张处方付款，于是告知了琼斯女士，她决定等以后再配。\n\
  \n1.  根据你为练习 2 准备的时序图，提供一个你将添加到每个类中的所有方法头的列表。同时，注明任何需要新增的类、属性或关系。\n\n2.  为 SRS 案例研究准备第二个时序图，基于你在第\
  \ 9 章中确定的任意 SRS 用例，自行选择一个场景。该场景应与本章中呈现的场景以及练习 2 中的场景有显著不同。你还必须像练习 2 那样叙述该场景。\n\n\
  3.  根据你为练习 4 准备的时序图，提供一个你将添加到每个类中的所有方法头的列表。同时，注明任何需要新增的类、属性或关系。\n\n4.  准备一个时序图，以表示附录中介绍的处方跟踪系统（PTS）案例研究的以下场景：\n\
