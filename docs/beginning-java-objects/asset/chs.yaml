  \ 正确使用缩进 明智地使用注释 花括号的放置 描述性变量名 本章小结\n\n你在本书第一部分中关于对象的概念性学习，以及在第二部分中关于对象建模的学习，都是与语言无关的，因此同样适用于\
  \ Java、Python、Ruby 或任何尚未发明的面向对象（OO）语言。然而，在深入第三章的对象基础知识之前，我想花些时间让你熟悉 Java 的基础知识，因为本书后续章节将使用\
  \ Java 编程语言来阐述对象概念。\n\n在本章中，你将学习：\n\n*   Java 的体系结构中立特性\n*   简单 Java 程序的结构\n*  \
  \ 编译和运行此类程序的机制\n*   Java 的基本数据类型、针对这些类型的运算符，以及使用这些类型构成的表达式\n*   Java 的**块结构**特性\n\
  *   各种类型的 Java**表达式**\n*   循环及其他流程控制结构\n*   向启动程序的命令窗口输出消息（这对于在代码演进过程中进行测试尤其有用）\n\
  *   Java 编程风格要素\n\n\n\n## Java 与架构无关\n\n要执行用 C 或 C++ 这类传统编译语言编写的程序，源代码必须首先被编译成一种称为**二进制代码**或**机器代码**的可执行形式。二进制代码本质上是由\
  \ 0 和 1 组成的模式，能够被程序运行所依赖的底层**硬件架构**所理解。\n\n即使原始的 C 或 C++ 源代码被编写成**平台无关**的——也就是说，程序没有利用任何特定于平台的语言扩展，例如特定类型的文件访问或图形用户界面（GUI）操作——最终生成的可执行版本仍然会与特定平台的架构绑定，因此只能在该架构上运行。也就是说，为\
  \ Linux 工作站编译的程序版本无法在 Windows PC 上运行，为 Windows PC 编译的版本无法在 macOS 机器上运行，以此类推。这一概念如图\
  \ 2-1 所示。\n\n![](img/78624_3_En_2_Fig1_HTML.jpg)\n\n平台无关的 C 源代码的流程图。它被分为针对 Windows、Linux\
  \ 和 Sun Solaris 的 C 编译器。每个编译器都生成平台相关的二进制代码。\n\n图 2-1\n\n传统编译语言生成平台相关的可执行程序\n\n相比之下，Java\
  \ 源代码并非为特定平台编译，而是编译成一种称为**字节码**的特殊中间格式，这种格式被认为是既平台无关又**架构中立**的。也就是说，无论 Java 程序是在\
  \ Windows、Linux、macOS 还是任何其他拥有 Java 编译器的操作系统上编译，生成的字节码都是相同的，因此可以在任何安装了（特定于平台的）Java\
  \ 虚拟机（JVM）的计算机上运行。这一点如图 2-2 所示。\n\n![](img/78624_3_En_2_Fig2_HTML.jpg)\n\n平台无关的\
  \ Java 源代码的流程图。它被分为针对 Windows、Linux 和 Sun Solaris 的 Java 编译器。每个编译器都生成平台无关的字节码。\n\
  \n图 2-2\n\nJava 编译器生成平台无关的字节码\n\nJVM 是一种特殊的软件，它知道如何**解释**和执行 Java 字节码。也就是说，Java\
  \ 程序并非像传统编译程序那样直接在操作系统的控制下运行，而是 JVM 本身在操作系统的直接控制下运行，而我们的 Java 程序则在 JVM 的控制下运行，如图\
  \ 2-3 所示。JVM 本质上充当了一个翻译器，将通用的 Java 字节码“语言”翻译成特定计算机能够理解的机器代码（二进制代码）“语言”，就像人类口译员通过翻译对话中的语句来促进说德语和说日语的人之间的讨论一样。\n\
  \n![](img/78624_3_En_2_Fig3_HTML.jpg)\n\n一台计算机的示意图，两侧各有两个部分。左侧是为 C 或 C++ 生成的编译后的二进制代码。右侧是直接运行在硬件架构之上的平台相关的\
  \ JVM。它通向被解释的 Java 字节码。\n\n图 2-3\n\n使用平台相关的 JVM 来执行平台无关的字节码\n\nJava 语言的解释性本质通常使其执行速度比编译语言稍慢一些，因为在应用程序执行时涉及一个额外的处理层，如图\
  \ 2-3 所示。然而，对于涉及人类用户交互的传统信息系统应用来说，速度上的差异是难以察觉的；其他因素，例如网络速度（对于分布式应用）、数据库管理系统（DBMS）服务器的速度（如果使用了数据库），尤其是人类在响应应用程序用户界面时的“思考时间”，都可能使任何\
  \ JVM 响应时间的延迟相形见绌。\n\n只要你在给定的目标平台上安装了合适的 JVM，就可以将 Java 字节码从一个平台转移到另一个平台，而无需重新编译原始的\
  \ Java 源代码，并且它仍然能够运行。也就是说，字节码是可跨平台转移的，如图 2-4 所示。\n\n![](img/78624_3_En_2_Fig4_HTML.jpg)\n\
  \n一台计算机和一台笔记本电脑 A 和 B 的两幅示意图，分列两侧。左侧是平台 A 的平台相关 JVM，右侧是平台 B 的平台相关 JVM，它们下方是相同的字节码。\n\
  \n图 2-4\n\n完全相同的字节码能被两个不同平台上的 JVM 理解\n\n伪代码 vs. 真实 Java 代码\n\n在本书第 1 部分和第 2 部分的代码示例中，我偶尔会使用少量伪代码来隐藏不相关的逻辑细节。为了明确说明我何时使用伪代码而非真实代码，我使用*斜体*而不是`常规\
  \ SansMono 紧缩字体`。\n\n这是真实的 Java 语法：\n\n```\nfor (int i = 0; i <= 10; i++) {\n```\n\
  \n这是伪代码：\n\n```\ncompute the grade for the ith Student\n}\n```\n\n我会再提醒你几次这个事实，以免你忘记并在过程中不小心尝试输入并编译伪代码。\n\
  \n## 一个简单 Java 程序的结构\n\n图 2-5 展示了一个最简单的 Java 程序。\n\n![](img/78624_3_En_2_Fig5_HTML.jpg)\n\
  \n一个 Java 程序结构，包含三个部分：介绍性注释、类声明和 main 方法。main 方法位于类声明框内。\n\n图 2-5\n\n一个简单 Java 程序的结构\n\
  \n让我们来了解一下我们简单程序的关键元素。\n\n### 注释\n\n在我们的简单 Java 程序中，首先看到的是一个介绍性注释：\n\n```\n// This\
  \ simple program illustrates some basic Java syntax.\n```\n\nJava 支持三种不同的注释风格：传统注释、行尾注释和\
  \ Java 文档注释。\n\n\n\n#### 传统注释\n\nJava **传统注释**源自 C 语言，以斜杠后跟星号（`/*`）开头，以星号后跟斜杠（`*/`）结尾。这两个分隔符之间的所有内容都被视为注释，因此会被\
  \ Java 编译器忽略，无论注释跨越多行：\n\n```\n/* 这是一个传统（C 风格）注释。 */\n/* 这是一个多行传统注释。这是一种临时注释掉整段代码的便捷方法，\n\
  无需删除它们。从编译器遇到上面的第一个“斜杠星号”开始，\n它就不在乎我们在这里输入什么；即使是合法的代码行，\n如下所示，也会被视为注释行，因此被编译器忽略，直到遇到第一个“星号斜杠”组合。\n\
  x = y + z;\na = b / c;\nj = s + c + f;\n*/\n/* 我们经常在传统注释的第二行到最后一行使用前导星号，\n* 纯粹是为了美观，使注释在视觉上更醒目；\n\
  * 但这些额外的星号严格来说是装饰性的——只有\n* 开头的“斜杠星号”和结尾的“星号斜杠”才会被编译器视为有意义。\n*/\n```\n\n请注意，我们不能***嵌套***块注释——也就是说，以下代码将***无法***编译：\n\
  \n```\n/* 这里开始一个注释 ...\nx = 3;\n/* 哎呀！我们错误地试图在终止第一个注释之前\n嵌套第二个注释！\n这会导致编译问题，因为\n\
  编译器会忽略这个第二个/内部注释的开始——毕竟我们已经在\n一个注释中了！——所以一旦我们试图终止\n这个第二个/内部注释，编译器会认为我们已经终止了\n第一个/外部注释……\
  \ */\nz = 2;\n// 编译器会在下一行“报错”。\n*/\n```\n\n当编译器到达我们本意是“外部”注释最后一行的终止符`*/`时，会报告以下两个编译错误：\n\
  \n```\n非法的表达式开始\n*/\n^\n```\n\n以及\n\n```\n需要 ';'\n*/\n^\n```\n\n#### 行尾注释\n\n第二种\
  \ Java 注释源自 C++，被称为**行尾注释**。我们使用双斜杠（`//`）来表示注释的开始，该注释在到达行尾时自动结束，如下所示：\n\n```\nx\
  \ = y + z;   // 注释文本一直延续到行尾 ==>\na = b / c;\n// 这里是一块连续的行尾注释。\n// 这是使用传统注释（/* ...\
  \ */）的一种替代方案，\n// 并且受到许多 Java 程序员的青睐。\nm = n * p;\n```\n\n#### Java 文档注释\n\n第三种也是最后一种\
  \ Java 注释，**Java 文档注释**（也称为 **“javadoc 注释”** ），可以被一个特殊的 `javadoc` 命令行实用程序（随 Java\
  \ 开发工具包[JDK]标准提供）从源代码文件中解析，并用于自动生成应用程序的 HTML 文档。\n\n我们将把对 javadoc 注释的深入探讨推迟到第 13\
  \ 章。\n\n### 类声明\n\n接下来是一个**类包装器**——更准确地说是**类声明**——其形式为\n\n```\npublic class ClassName\
  \ {\n...\n}\n```\n\n例如：\n\n```\npublic class SimpleProgram {\n...\n}\n```\n\n其中花括号\
  \ `{ ... }` 包围着**类体**，类体包含程序的主要逻辑以及类的其他可选构建块。\n\n在后续章节中，你将了解类在面向对象编程语言中的所有重要意义。现在，只需注意符号\
  \ `public` 和 `class` 是 Java 的两个**关键字**——即 Java 语言中保留用于特定用途的符号——而 `SimpleProgram`\
  \ 是我发明的一个名称/符号。\n\n### main 方法\n\n在 `SimpleProgram` 类声明中，我们找到了程序的起点，在 Java 中称为**main\
  \ 方法**。（在面向对象语言中，函数被称为**方法**。）`main` 方法充当 Java 应用程序的入口点。当我们通过 JVM 实例解释其字节码来执行 Java\
  \ 程序时，JVM 会调用 `main` 方法来启动我们的应用程序。\n\n对于像 `SimpleProgram` 示例这样简单的应用程序，所有程序逻辑都可以包含在这个单一的\
  \ `main` 方法中。另一方面，对于更复杂的应用程序，`main` 方法不可能包含整个系统的所有逻辑。你将在本书稍后部分学习如何构建一个超越 `main`\
  \ 方法界限的应用程序，涉及多个 Java 源代码文件/类。\n\n该方法的第一行如下所示\n\n```\npublic static void main(String[]\
  \ args) {\n```\n\n定义了所谓的 `main` 方法的**方法头**，并且应该完全按照所示形式出现（目前如此——我们将在第 13 章再次讨论此主题）。\n\
  \n我们的 `main` 方法的**方法体**，由花括号 `{ ... }` 包围，包含一条语句：\n\n```\nSystem.out.println(\"\
  Hello!\");\n```\n\n该语句将消息\n\n```\nHello!\n```\n\n打印到启动我们程序的命令窗口。我们稍后将进一步检查此语句的语法，但现在请注意语句末尾使用的分号（`;`）。所有独立的\
  \ Java 语句末尾都放置分号。而花括号 `{ ... }` 则界定代码**块**，我将在本章稍后部分更详细地讨论其重要性。\n\n在更复杂的程序中，我们通常在\
  \ `main` 方法内部执行的其他操作包括声明变量、初始化数据、显示用户界面、创建对象以及调用其他方法。\n\n现在我们已经了解了简单 Java 程序的结构，接下来为你设置一个非常简单的\
  \ Java 开发环境。\n\n## 设置简单的 Java 开发环境\n\n对于刚开始学习 Java 编程的人来说，我建议首先使用简单的文本编辑器，这样你就不会被特定\
  \ IDE 的花哨功能分散注意力，并且 IDE 也不会为你做太多工作，以至于你无法真正了解最底层发生了什么。话虽如此，一个能理解 Java 语法的编辑器肯定是有帮助的，因此我个人推荐一个非常便宜的工具叫\
  \ TextPad，可在 [`www.textpad.com/home`](http://www.textpad.com/home) 获取。\n\n安装好 TextPad\
  \ 或选择其他你喜欢的简单文本编辑器后，就该安装 Java 开发环境了。由于供应商的说明经常变化，我们提供分步说明并不实际；在本书撰写时，最新的说明可以在 Oracle\
  \ 的网站上找到，网址为 [`https://docs.oracle.com/en/java/javase/18/install`](https://docs.oracle.com/en/java/javase/18/install)。如果此链接已过时，请在\
  \ doc.oracle.com 网站上搜索最新版本的 Java 平台标准版 JDK 安装指南。\n\n一旦你的 Java 开发环境启动并运行，让我们来看看 Java\
  \ 代码是如何编译和执行的。\n\n## Java 的机制\n\n无论平台如何，编译和执行 Java 程序最简单的方法是通过命令行命令。\n\n\n\n###\
  \ 将 Java 源代码编译为字节码\n\n为了从命令行编译 Java 源代码，我们根据需要，使用 `cd` 命令导航到源代码所在的工作目录。然后，我们输入以下命令：\n\
  \n```\njavac 源代码文件名\n```\n\n例如：\n\n```\njavac SimpleProgram.java\n```\n\n来进行编译。\n\
  \n如果同一个目录下有多个 `.java` 源代码文件，我们可以列出要编译的文件名，用空格分隔：\n\n```\njavac Foo.java Bar.java\
  \ Another.java\n```\n\n或者使用通配符（`*`），例如：\n\n```\njavac *.java\n```\n\n来同时编译多个文件。\n\
  \n如果一切顺利——也就是说，如果没有出现编译器错误——那么一个名为 `SimpleProgram.class` 的字节码文件将出现在 `SimpleProgram.java`\
  \ 源代码文件所在的同一目录中。另一方面，如果确实出现了编译器错误，我们当然必须修正源代码并尝试重新编译。\n\n### 执行字节码\n\n一旦程序成功编译，我们通过以下命令执行字节码版本：\n\
  \n```\njava 字节码文件名     （注意：我们省略了 .class 后缀）\n```\n\n例如：\n\n```\njava SimpleProgram\n\
  ```\n\n请注意，***省略***字节码文件名（本例中为 `SimpleProgram.class`）的 `.class` 后缀非常重要。输入后缀将导致如下所示的错误：\n\
  \n```\nException in thread \"main\" java.lang.NoClassDefFoundError: SimpleProgram/java\n\
  ```\n\n默认情况下，JVM 会在你的默认工作目录中查找此类字节码文件。如果 JVM 找到了指定的字节码文件，它会执行该文件的 `main` 方法，你的程序就开始运行了！\n\
  \n如果由于某种原因，你试图执行的字节码不在这个默认位置，你必须告知 JVM 额外的搜索目录，这被称为**指定类路径**。你可以通过在 `java` 命令的 `-cp`\
  \ 标志后指定一个目录列表（在 Windows 下用分号 [`;`] 分隔，在 Linux 和 macOS 下用冒号 [`:`] 分隔）来实现，如下所示：\n\n\
  ```\njava –cp 要搜索的目录名称列表 字节码文件名\n```\n\n例如，在 Windows 上：\n\n```\njava –cp C:\\home\\\
  javastuff;D:\\reference\\workingdir;S:\\foo\\bar\\files SimpleProgram\n```\n\n至少，我们通常希望\
  \ JVM 搜索我们的***当前工作目录***以查找字节码文件。如果没有提供 **–cp** 值，默认情况下就会发生这种情况：\n\n```\njava SimpleProgram\n\
  ```\n\n但通常的最佳实践是将当前工作目录指定为一个单独的点号（`.`），这是 Windows/Linux/macOS 中“当前工作目录”的简写，作为类路径条目，例如：\n\
  \n```\njava –cp  .  SimpleProgram\n```\n\n或者，当类路径中需要多个条目时，将“ . ”指定为其中一个条目，例如，在 Windows\
  \ 上：\n\n```\njava –cp C:\\home\\javastuff;D:\\reference\\workingdir;. SimpleProgram\n\
  ```\n\n现在我们已经了解了编译和运行 Java 程序的机制，接下来让我们更详细地探讨 Java 的一些基本语法特性。\n\n## 原始类型\n\nJava\
  \ 被认为是一种**强类型**编程语言，因为当声明一个变量时，其类型也必须被声明。声明变量的类型，除了其他作用外，还告诉编译器在运行时为该变量分配多少内存，并限制该变量在程序中后续可能使用的上下文。\n\
  \nJava 语言定义了八种**原始类型**（这八个类型名都是 Java 关键字），如下所示。\n\n四种***整数***数值类型：\n\n*   `byte`：8\
  \ 位无符号整数\n*   `short`：16 位有符号整数\n*   `int`：32 位有符号整数\n*   `long`：64 位有符号整数\n\n两种***浮点***数值类型：\n\
  \n*   `float`：32 位单精度浮点数\n*   `double`：64 位双精度浮点数\n\n再加上两种额外的原始类型：\n\n*   `char`：单个字符，使用\
  \ 16 位 Unicode 编码（相对于 8 位 ASCII 编码）存储，使 Java 能够处理广泛的国际字符集。\n*   `boolean`：一个只能取两个值之一的变量：`true`\
  \ 或 `false`（这两个值都是 Java 中的保留字）。布尔变量通常用作标志，以指示是否应有条件地执行某些代码，如下面的代码片段所示：\n\n```\n\
  boolean error = false;  // 初始化标志。\n// ...\n// 稍后在程序中（伪代码）：\nif (出现某些错误情况) {\n//\
  \ 将标志设置为 true 以指示发生了错误。\nerror = true;\n}\n// ...\n// 再稍后在程序中：\n// 测试标志的值。\nif (error\
  \ == true) {\n// 伪代码。\n采取纠正措施 ...\n}\n```\n\n我们将在本章稍后部分专门讨论 `if` 语句的语法，它是几种不同的 Java\
  \ 流程控制语句之一。\n\n一个重要提醒\n\n如果你希望尝试编译本书中遇到的任何 Java 代码片段，请记住 (a) 伪代码（*斜体*）无法编译，并且 (b)\
  \ 所有代码至少必须包含在一个 `main` 方法中，而该方法又必须包含在一个 `class` 声明中，如图 2-5 所示。\n\n## 变量\n\n在 Java\
  \ 程序中使用变量之前，必须向 Java 编译器***声明***变量的类型和名称，例如：\n\n```\nint count;\n```\n\n给变量赋值是通过使用\
  \ Java **赋值运算符**，即等号（`=）` 来完成的。赋值语句由 `=` 左侧的（先前声明的）变量名和 `=` 右侧的、计算结果为适当类型的表达式组成（我们将在本章后面介绍其他一些类型的\
  \ Java 表达式）。例如：\n\n```\nint count = 1;\ntotal = total + 4.0;  // 这里，我们假设 total 先前在程序中被声明为\
  \ double 变量。\nprice = cost + (a + b)/length;  // 我们再次假设所有变量都已在程序前面正确声明。\n```\n\n\
  可以在声明变量的同一行提供/计算初始值：\n\n```\nint count = 3;\n```\n\n或者，可以在一个语句中声明变量，然后在程序后面的另一个语句中为其赋值：\n\
  \n```\ndouble total;\n// 中间代码 ... 细节省略\ntotal = total + 4.0;\n```\n\n可以使用 `true`\
  \ 或 `false` 字面量给 `boolean` 变量赋值：\n\n```\nboolean finished;\n// ...\nfinished = true;\n\
  ```\n\n可以通过将值（单个 Unicode 字符）括在***单***引号中来将字面量值赋给 `char` 类型的变量：\n\n```\nchar c =\
  \ 'A';\n```\n\n使用***双***引号（`\"…\"`）是为将字面量值赋给 `String` 变量保留的，`String` 是一种不同的类型，将在本章后面讨论。以下代码在\
  \ Java 中无法编译：\n\n`char c = \"A\"; // 给 char 变量赋值时必须使用单引号。`\n\n\n\n### 变量命名规范\n\n\
  在讨论 Java 变量名时，需要考虑两个方面：\n\n*   首先，某个特定名称是否被 Java 编译器视为***有效***？\n\n*   其次，某个特定的***有效***名称是否遵循了面向对象编程社区在所有语言中采用的命名***规范***？\n\
  \nJava 中***有效***的变量名必须以字母字符或美元符号开头（不鼓励使用美元符号，因为编译器在生成代码时会用到它），并且可以包含这些字符以及数字。变量名中不允许出现其他字符。\n\
  \n以下是 Java 中所有有效的变量名：\n\n```\nint simple;               // 以字母字符开头\nint more$money_is_2much;\
  \  // 可以包含美元符号、下划线和/或\n// 数字、字母字符\n```\n\n以下是无效的变量名：\n\n```\nint 1bad;         \
  \        // 起始字符不合适\nint number#sign;          // 包含无效字符\nint foo-bar;         \
  \     // 同上\nint plus+sign;            // 同上\nint x@y;                  // 同上\n\
  int dot.notation;         // 同上\n```\n\n话虽如此，面向对象编程社区遵循的***规范***是主要使用字母字符来构成变量名，避免使用下划线，并且遵循一种称为**驼峰命名法**的风格。使用驼峰命名法时，变量名的首字母为***小写***，变量名中后续每个拼接单词的***首***字母为***大写***，其余字符为***小写***。以下所有变量名既有效又符合规范：\n\
  \n```\nint grade;\ndouble averageGrade;\nString myPetRat;\nboolean weAreFinished;\n\
  ```\n\n回想一下，如前所述，Java 关键字不能用作变量名。以下代码无法编译，因为 `public` 是一个 Java 关键字：\n\n```\nint\
  \ public;\n```\n\n实际上，编译器会生成以下***两条***错误信息：\n\n```\n不是语句\nint public;\n^\n需要 ';'\n\
  int public;\n^\n```\n\n## 变量初始化\n\n在 Java 中，变量在声明时不一定被赋予初始值，但在赋值语句中***使用***变量的值之前，所有变量***必须***被显式地赋予一个值。例如，在以下代码片段中，声明了两个\
  \ `int`（整型）变量；变量 `foo` 被显式地赋予了初始值，但变量 `bar` 没有。随后尝试将这两个变量的值相加会导致编译器错误：\n\n```\n\
  int foo;\nint bar;\n// 我们显式地初始化了 foo，但没有初始化 bar。\nfoo = 3;\nfoo = foo + bar;   //\
  \ 这行代码无法编译。\n```\n\n在最后一行代码上会出现以下编译器错误：\n\n```\n变量 bar 可能尚未初始化\nfoo = foo + bar;\n\
  ^\n```\n\n要纠正此错误，我们需要在加法表达式中使用 `bar` 和 `foo` 之前，为它们都显式地赋值：\n\n```\nint foo;\nint\
  \ bar;\nfoo = 3;\n// 我们现在显式地初始化了两个变量。\nbar = 7;\nfoo = foo + bar;  // 这行代码现在可以正常编译。\n\
  ```\n\n在第 13 章中，你将了解到，在处理对象的“内部工作机制”时，自动初始化的规则会有所不同。\n\n## String 类型\n\n在本章中，我将讨论另一个重要的\
  \ Java 类型：`String` 类型，它不被视为基本类型（我们将在第 13 章中讨论 String 作为对象的特殊性质）。`String` 表示零个或多个\
  \ Unicode 字符的序列。\n\n符号 `String` 以大写字母“S”开头，而基本类型的名称则全部用小写字母表示：`int`、`float`、`boolean`\
  \ 等。这种大小写差异是有意为之且强制性的——`string`（小写）不能用作类型：\n\n```\nstring s = \"foo\";  // 这行代码无法编译。\n\
  ```\n\n错误信息：\n\n```\n找不到符号\n符号:    string\n```\n\n有多种创建和初始化 `String` 变量的方法。最简单且最常用的方法是声明一个\
  \ `String` 类型的变量，并使用**字符串字面量**为变量赋值。字符串字面量是任何用***双***引号括起来的文本，即使它只包含一个***单字符***：\n\
  \n```\nString name = \"Steve\";\nString shortString = \"A\";\n```\n\n使用临时占位符值初始化\
  \ `String` 变量的两种常用方法如下：\n\n*   赋值为空字符串，由两个连续的双引号表示：\n\n    ```\n    String s = \"\
  \";\n    ```\n\n*   赋值为 `null`，这是一个 Java 保留字，用于表示 `String` 尚未被赋予“真正的”值：\n\n    ```\n\
  \    String s = null;\n    ```\n\n加号（`+`）运算符用于数值数据类型的算术加法，但当与 `String` 一起使用时，它表示**字符串拼接**。任意数量的\
  \ `String` 值都可以使用 `+` 运算符进行拼接，如下代码片段所示：\n\n```\nString x = \"foo\";\nString y =\
  \ \"bar\";\nString z = x + y + \"!\";  // z 的值为 \"foobar!\"（x 和 y 的值不受影响）\n```\n\
  \n你将在第 13 章中了解一些其他可以对 `String` 执行或使用 `String` 执行的操作，以及对其面向对象特性的深入见解。\n\n## 大小写敏感性\n\
  \nJava 是一种**区分大小写**的语言。也就是说，在 Java 中使用大写字母与小写字母是有意为之且强制性的，例如：\n\n*   拼写相同但大小写使用不同的变量名代表***不同的***变量：\n\
  \n    ```\n    // 就 Java 编译器而言，这是两个不同的变量。\n    int x;  // 小写\n    int X;  // 大写\n\
  \    ```\n\n*   所有关键字都用小写字母表示：`public`、`class`、`int`、`boolean` 等。***不要“创意性地”将它们大写***，因为编译器会强烈反对——通常会给出难以理解的编译错误信息，如下例所示，其中保留字\
  \ `for` 被错误地大写了：\n\n    ```\n    // 保留字 'for' 应为小写。\n    For (int i = 0; i < 3;\
  \ i++) {\n    ```\n\n    这反过来会产生以下看似奇怪的编译器错误：\n\n    ```\n    需要 '.class'\n    For\
  \ (int i = 0; i < 3; i++) {\n    ^\n    ```\n\n*   `main` 方法的名称是小写的。\n\n*   如前所述，`String`\
  \ 类型以大写字母“S”开头。\n\n## Java 表达式\n\nJava 是一种**面向表达式的语言**。Java 中的**简单** **表达式**可以是以下任意一种：\n\
  \n*   ***常量***：`7`、`false`\n\n*   ***用单引号括起来的字符字面量***：`'A'`、`'3'`\n\n*   ***用双引号括起来的字符串字面量***：`\"\
  foo\"`、`\"Java\"`\n\n*   ***任何正确声明的变量的名称***：`myString`、`x`\n\n*   ***上述任意两种表达式与一个\
  \ Java 二元运算符（本章后面会详细讨论）组合而成***：`x + 2`\n\n*   ***上述任意一种表达式被一个 Java 一元运算符（本章后面会详细讨论）修改而成***：`i++`\n\
  \n*   ***上述任意一种表达式用括号括起来***：`(x + 2)`\n\n再加上一些与对象相关的其他表达式类型，你将在本书后面学到。\n\n通过嵌套括号，可以从各种不同的简单表达式类型组合出任意复杂度的表达式，例如：`((((4/x)\
  \ + y) * 7) + z)`。\n\n\n\n### 算术运算符\n\nJava 语言提供了一些基本的算术运算符，如表 2-1 所示。\n\n表 2-1\n\
  \nJava 算术运算符\n\n| 运算符 | 描述 |\n| --- | --- |\n| `+` | 加法 |\n| `-` | 减法 |\n| `*` |\
  \ 乘法 |\n| `/` | 除法 |\n| `%` | 取余（`%` 运算符左侧的操作数除以右侧操作数所得的余数，例如 `10 % 3 = 1`，因为 3\
  \ 乘以 3 等于 9，10 减去 9 余 1） |\n\n`+` 和 `-` 运算符也可以用作一元运算符，表示正数或负数：`-3.7`、`+42`。\n\n\
  除了简单的赋值运算符 `=` 之外，还有一些专门的**复合赋值运算符**，它们将变量赋值与算术运算结合在一起，如表 2-2 所示。\n\n表 2-2\n\nJava\
  \ 复合赋值运算符\n\n| 运算符 | 描述 |\n| --- | --- |\n| `+=` | `a += b` 等价于 `a = a + b`。 |\n\
  | `-=` | `a -= b` 等价于 `a = a - b`。 |\n| `*=` | `a *= b` 等价于 `a = a * b`。 |\n| `/=`\
  \ | `a /= b` 等价于 `a = a / b`。 |\n| `%=` | `a %= b` 等价于 `a = a % b`。 |\n\n我们要介绍的最后两个算术运算符是**一元递增**（`++`）和**递减**（`--`）运算符，它们用于将\
  \ `int` 变量的值增加或减少 1，或将浮点（`float`、`double`）类型的值增加或减少 1.0。它们被称为一元运算符，因为它们应用于单个变量，而二元运算符则如前所述，组合两个表达式的值。\n\
  \n一元递增和递减运算符也可以应用于 `char` 变量，以在 Unicode 排序序列中向前或向后移动一个字符位置。例如，在以下代码片段中，变量 `c` 的值将从\
  \ '`e`' 递增到 '`f`'：\n\n```\nchar c = 'e';\nc++; // c 将从 'e' 递增到 'f'。\n```\n\n递增和递减运算符可以以**前缀**或**后缀**的方式使用。如果将运算符放在其操作的变量***之前***（***前缀***模式），则对该变量的递增或递减操作会在该语句通过该变量进行任何赋值***之前***执行。例如，考虑以下使用前缀递增（`++`）运算符的代码片段。假设\
  \ `a` 和 `b` 之前已在程序中声明为 `int` 变量：\n\n```\na = 1;\nb = ++a;\n```\n\n执行完上述代码行后，变量 `a`\
  \ 的值将为 2，变量 `b` 的值也将为 2。这是因为在第二行代码中，变量 `a` 的递增（从 1 到 2）发生在将 `a` 的值赋给变量 `b`***之前***。因此，单行代码\n\
  \n```\nb = ++a;\n```\n\n在逻辑上等价于以下***两行***代码：\n\n```\na = a + 1;  // 先递增 a 的值 ...\n\
  b = a;      // ... 然后使用其值。\n```\n\n另一方面，如果将递增/递减运算符放在其操作的变量***之后***（***后缀***模式），则递增或递减操作会在该语句通过该变量进行任何赋值***之后***，使用该变量的***原始***值。让我们看一个相同的代码片段，但递增运算符以***后缀***方式编写：\n\
  \n```\na = 1;\nb = a++;\n```\n\n执行完上述代码行后，变量 `b` 的值将为 1，而变量 `a` 的值将为 2。这是因为在第二行代码中，变量\
  \ `a` 的递增（从 1 到 2）发生在将 `a` 的值赋给变量 `b`***之后***。因此，单行代码\n\n```\nb = a++;\n```\n\n\
  在逻辑上等价于以下***两行***代码：\n\n```\nb = a;      // 先使用 a 的值 ...\na = a + 1;  // ... 然后递增其值。\n\
  ```\n\n这是一个稍微复杂一点的例子；请阅读附带的注释，以确保您能理解 `x` 最终如何被赋值为 10：\n\n```\nint y = 2;\nint z\
  \ = 4;\nint x = y++ * ++z;  // x 将被赋值为 10，因为 z 会在其值用于乘法表达式\n// 之前从 4 递增到 5，而 y 会保持为\
  \ 2，直到其值用于乘法表达式之后。\n```\n\n稍后您会看到，递增和递减运算符通常与循环结合使用。\n\n### 关系运算符和逻辑运算符\n\n**逻辑表达式**以指定的方式比较两个（简单或复杂）表达式\
  \ *exp1* 和 *exp2*，结果为 `boolean` 类型的值 `true` 或 `false`。\n\n为了创建逻辑表达式，Java 提供了表 2-3\
  \ 中所示的**关系运算符**。\n\n表 2-3\n\nJava 关系运算符\n\n| 运算符 | 描述 |\n| --- | --- |\n| *exp1*\
  \ `==` *exp2* | 如果 *exp1* 等于 *exp2*，则为 `true`（注意使用***双***等号来测试相等性） |\n| *exp1* `>`\
  \ *exp2* | 如果 *exp1* 大于 *exp2*，则为 `true` |\n| *exp1* `>=` *exp2* | 如果 *exp1* 大于或等于\
  \ *exp2*，则为 `true` |\n| *exp1* `<` *exp2* | 如果 *exp1* 小于 *exp2*，则为 `true` |\n| *exp1*\
  \ `<=` *exp2* | 如果 *exp1* 小于或等于 *exp2*，则为 `true` |\n| *exp1* `!=` *exp2* | 如果 *exp1*\
  \ 不等于 *exp2*，则为 `true`（`!` 读作“非”） |\n\n除了关系运算符之外，Java 还提供了**逻辑运算符**，可用于组合/修改逻辑表达式。最常用的逻辑运算符列于表\
  \ 2-4 中。\n\n表 2-4\n\nJava 逻辑运算符\n\n| 运算符 | 描述 |\n| --- | --- |\n| *exp1* `&&` *exp2*\
  \ | 逻辑“与”；仅当 *exp1 和 exp2 都为真*时，复合表达式才为真。 |\n| *exp1* `&#124;&#124;` *exp2* | 逻辑“或”；如果\
  \ *exp1 或 exp2* 中有一个为真，则复合表达式为真。 |\n| `!`*exp* | 逻辑“非”；如果 *exp* 为假则为 `true`，如果 *exp*\
  \ 为真则为 `false`。 |\n\n以下是一个使用逻辑“与”运算符来编写复合逻辑表达式“如果 x 大于 2.0 且 y 不等于 4.0”的示例：\n\n\
  ```\nif ((x > 2.0) && (y != 4.0)) { ... }\n```\n\n逻辑表达式最常见的是与流程控制结构一起使用，这将在本章后面讨论。\n\
  \n\n\n### 表达式求值与运算符优先级\n\n正如本章前面所述，可以通过嵌套括号来构建任意复杂度的表达式——例如，`(((8 * (y + z)) + y)\
  \ * x)`。编译器通常按照从最内层括号到最外层括号、从左到右的顺序求值。假设 `x`、`y` 和 `z` 已按如下方式声明并初始化：\n\n```\nint\
  \ x = 1;\nint y = 2;\nint z = 3;\n```\n\n那么，以下赋值语句右侧的表达式：\n\n```\nint answer = ((8\
  \ * (y + z)) + y) * x;\n```\n\n将按如下步骤逐步求值：\n\n```\n((8 * (y + z)) + y) * x\n((8\
  \ * 5) + y) * x\n(40 + y) * x\n42 * x\n```\n\n在没有括号的情况下，某些运算符在表达式求值时具有比其他运算符更高的优先级。例如，乘法和除法会在加法和减法之前执行。运算符优先级可以通过使用括号显式改变；括号内的运算优先级高于括号外的运算。考虑以下代码片段：\n\
  \n```\nint j = 2 + 3 * 4;     // j 将被赋值为 14\nint k = (2 + 3) * 4;   // k 将被赋值为 20\n\
  ```\n\n在第一行没有使用括号的代码中，乘法运算优先于加法运算，因此整个表达式求值为 2 + 12 = 14；这就像我们显式地写了 `2 + (3 * 4)`\
  \ 一样，而无需实际写出。\n\n在第二行代码中，括号被显式地放在运算 `2 + 3` 周围，以便先执行加法运算，然后将结果和乘以 4，得到整个表达式的值为 5\
  \ * 4 = 20。\n\n回到之前的例子：\n\n```\nif ((x > 2.0) && (y != 4.0)) { ... }\n```\n\n注意，`>`\
  \ 和 `!=` 运算符的优先级高于 `&&` 运算符，因此我们可以去掉嵌套的括号，如下所示：\n\n```\nif (x > 2.0 && y != 4.0)\
  \ { ... }\n```\n\n然而，额外的括号当然不会造成损害，事实上，可以认为它们使表达式的意图更加清晰。\n\n### 表达式的类型\n\n**表达式的类型**\
  \ 是指表达式最终求值结果的 Java 类型。例如，给定以下代码片段：\n\n```\ndouble x = 3.0;\ndouble y = 2.0;\nif\
  \ ((x > 2.0) && (y != 4.0)) { ... }\n```\n\n表达式 `(x > 2.0) && (y != 4.0)` 求值为 `true`，因此表达式\
  \ `(x > 2.0) && (y != 4.0)` 被称为 `boolean` 类型的表达式。然而，在以下代码片段中：\n\n```\nint x = 1;\n\
  int y = 2;\nint z = 3;\nint answer = ((8 * (y + z)) + y) * x;\n```\n\n表达式 `((8 *\
  \ (y + z)) + y) * x` 求值为 `42`，因此表达式 `((8 * (y + z)) + y) * x` 被称为 `int`（整数）类型的表达式。\n\
  \n## 自动类型转换与显式强制转换\n\nJava 支持**自动类型转换**。这意味着，如果我们尝试将一个值赋给一个变量：\n\n```\n// 伪代码。\n\
  x = expression;\n```\n\n并且赋值语句***右侧***的表达式求值结果的类型与赋值语句***左侧***变量声明时的类型***不同***，Java\
  \ 会自动将右侧表达式的值转换为与 `x` 的类型匹配，但***仅当这样做不会损失精度时***。通过一个例子可以最好地理解这一点：\n\n```\nint x;\n\
  double y;\ny = 2.7;\nx = y;  // 我们试图将一个 double 值赋给一个 int 变量。\n```\n\n在前面的代码片段中，我们试图将\
  \ `y` 的 `double` 值 2.7 赋给声明为 `int` 的 `x`。如果这个赋值发生，`y` 的小数部分将被截断，`x` 最终将得到整数值 2。这代表了精度的损失，也称为**窄化转换**。\n\
  \nC 或 C++ 编译器会允许这种赋值，静默地截断该值。然而，Java 编译器不会假设这就是我们的意图，它会在最后一行代码上生成如下错误：\n\n```\n\
  可能损失精度\n找到：double\n需要：int\n```\n\n为了向 Java 编译器表明我们愿意接受精度损失，我们必须执行**显式强制转换**——也就是说，我们必须在要转换其值的表达式前面加上目标类型，并用括号括起来：\n\
  \n```\n// 伪代码。\nx = (type) expression;\n```\n\n换句话说，为了让 Java 编译器允许将更精确的浮点值赋给精度较低的整数变量，我们必须将前面示例的最后一行重写如下：\n\
  \n```\nint x;\ndouble y;\ny = 2.7;\nx = (int) y;  // 现在可以编译了，因为我们显式地\n// 告知编译器我们想要发生\n\
  // 窄化转换。\n```\n\n当然，如果我们***反转***赋值的方向，将变量 `x` 的 `int` 值赋给 `double` 变量 `y`，Java 编译器对此赋值不会有任何问题：\n\
  \n```\nint x;\ndouble y;\nx = 2;\ny = x;    // 将精度较低的 int 值赋给能够处理更高精度的 double 变量——这样没问题。\n\
  ```\n\n在这种特定情况下，我们将一个精度***较低***的值 2 赋给一个能够处理***更高***精度的变量；`y` 最终将得到值 2.0。这被称为**宽化转换**。这种转换在\
  \ Java 中是自动执行的，无需显式强制转换。\n\n请注意，在 Java 中将常量值赋给 `float` 类型的变量时存在一个特性；以下语句无法编译：\n\n\
  ```\nfloat y = 3.5;   // 这行代码无法编译！\n```\n\n因为像 `3.5` 这样带有小数部分的数值常量会被 Java 自动视为精度更高的\
  \ `double` 值，因此编译器会将其视为窄化转换，并拒绝执行赋值。要***强制***进行此类赋值，我们必须要么将浮点常量显式强制转换为 `float`：\n\
  \n```\nfloat y = (float) 3.5;   // 由于强制转换，这行代码可以编译。\n```\n\n或者，我们可以通过在赋值语句右侧的常量后使用后缀\
  \ `F` 或 `f`，强制 Java 编译器将其视为 `float`，如下所示：\n\n```\nfloat y = 3.5F;   // 可以，因为我们指明该常量应被\n\
  // 视为 float，而不是 double。\n```\n\n在本书第三部分的 SRS 应用程序中，每当需要声明浮点变量时，我们通常会使用 `double`\
  \ 而不是 `float`，仅仅是为了避免这些类型转换的麻烦。\n\n`char` 类型的表达式可以转换为任何其他数值类型，如下例所示：\n\n```\nchar\
  \ c = 'a';\n// 将 char 值赋给数值变量会传递其\n// ASCII 数值等效值。\nint x = c;\ndouble z = c;\n\
  System.out.println(x);\nSystem.out.println(z);\n```\n\n输出如下：\n\n```\n97\n97.0\n\
  ```\n\n唯一不能隐式或显式转换为其他类型的 Java 类型是 `boolean` 类型。\n\n你将在本书后面看到涉及对象的其他强制转换应用。\n\n##\
  \ 循环与其他流程控制结构\n\n程序很少会从头到尾按顺序逐行执行。相反，通过程序逻辑的执行路径通常是***有条件***的：\n\n*   可能需要在满足某个条件时让程序执行某段代码，或者在***不***满足条件时执行***另一***段代码。\n\
  *   程序可能需要重复执行某段特定代码固定次数，或者直到达到某个特定结果。\n\nJava 语言提供了多种不同类型的循环和其他流程控制结构来处理这些情况。\n\
  \n\n\n### if 语句\n\n`if` 语句是一种基本的条件分支语句，当以逻辑表达式表示的条件满足时，会执行一行或多行代码。或者，可以通过将代码放在关键字\
  \ `else` 之后，在条件***不***满足时执行一行或多行代码。在 `if` 语句中使用 `else` 子句是可选的。\n\n`if` 语句的基本语法如下：\n\
  \n```\n// 伪代码。\nif (逻辑表达式) {\n如果逻辑表达式求值为真，则执行这些花括号内的任何代码\n}\n```\n\n或者添加一个可选的 `else`\
  \ 子句：\n\n```\n// 伪代码。\nif (逻辑表达式) {\n如果逻辑表达式求值为真，则执行这些花括号内的任何代码\n}\nelse {\n如果逻辑表达式求值为假，则执行这些花括号内的任何代码\n\
  }\n```\n\n如果 `if` 或（可选的）`else` 关键字后面只跟一条可执行语句，则可以省略花括号，如下所示：\n\n```\n// 伪代码。\nif\
  \ (逻辑表达式) 如果逻辑表达式为真则执行的单条语句;\nelse 如果逻辑表达式为假则执行的单条语句;\n```\n\n例如：\n\n```\nif (x\
  \ > 3) y = x;\nelse z = x;\n```\n\n或者，可以插入可选的换行符：\n\n```\nif (x > 3)\ny = x;\nelse\n\
  z = x;\n```\n\n但通常认为始终使用花括号是一种良好的实践，如下所示：\n\n```\nif (x > 3) {\ny = x;\n}\nelse\
  \ {\nz = x;\n}\n```\n\n一个简单的 `boolean` 变量，作为布尔表达式的一种简单形式，可以作为 `if` 语句的逻辑表达式/条件。例如，编写以下代码是完全可接受的：\n\
  \n```\n// 使用布尔变量 \"finished\" 作为标志，当某个特定操作完成时，该标志将被设置为 true。\nboolean finished;\n\
  // 将其初始化为 false。\nfinished = false;\n// 中间代码的细节（其中该标志可能被设置为 true，也可能不被设置）已被省略...\n\
  // 测试该标志。\nif (finished) { // 等价于：if (finished == true) {\nSystem.out.println(\"\
  我们完成了！  :o)\");\n}\n```\n\n`!`（“非”）运算符可用于对逻辑表达式取反，这样当表达式求值为 `false` 时，与 `if` 语句关联的代码块反而会被执行：\n\
  \n```\nif (!finished) { // 等价于：if (finished == false)\nSystem.out.println(\"我们还没有完成\
  \ ... :op\");\n}\n```\n\n当测试两个表达式是否相等时，请记住我们必须使用***两个***连续的等号，而不是一个：\n\n```\nif\
  \ (x == 3) { // 注意使用双等号 (==) 来测试相等性。\ny = x;\n}\n```\n\nJava 初学者（尤其是那些之前用 C 或 C++\
  \ 编程过的人）常犯的一个错误是尝试使用***单个***等号来测试相等性，如下例所示：\n\n`// 注意下面错误地使用了单等号。`\n\n`if (x = 3)\
  \ {`\n\n`y = x;`\n\n`}`\n\n在 Java 中，`if` 测试必须基于有效的***逻辑***表达式；`x = 3` 不是一个逻辑表达式，而是一个***赋值***表达式。事实上，上述\
  \ `if` 语句在 Java 中甚至无法编译，而它在 C 和 C++ 编程语言中***却***可以编译，因为在那些语言中，`if` 测试是基于将表达式求值为***整数***值\
  \ 0（解释为 `false`）或非零值（解释为 `true`）。\n\n可以嵌套 `if-else` 结构来测试多个条件。如果嵌套，内部的 `if`（加上可选的\
  \ `else`）语句会被放置在外层 `if` 的 `if` 部分或 `else` 部分中。以下是两层嵌套 `if-else` 结构的一种常见语法：\n\n```\n\
  if (逻辑表达式-1) {\n执行此代码\n}\nelse {\nif (逻辑表达式-2) {\n执行此替代代码\n}\nelse {\n如果以上两个表达式都不为真，则执行此代码\n\
  }\n}\n```\n\n可以使用的嵌套 `if-else` 结构的数量没有限制，但如果嵌套过深，代码可能会变得难以让人类读者理解和维护。\n\n前面示例中展示的嵌套\
  \ `if` 语句也可以不使用嵌套来编写，如下所示：\n\n```\nif (逻辑表达式-1) {\n执行此代码\n}\nelse if (逻辑表达式-2) {\n\
  执行此替代代码\n}\nelse {\n如果以上两个表达式都不为真，则执行此代码\n}\n```\n\n请注意，这两种形式在逻辑上是等价的。\n\n### switch\
  \ 语句\n\n`switch` 语句类似于 `if-else` 结构，因为它允许有条件地执行一行或多行代码。然而，与 `if-else` 结构评估逻辑表达式不同，`switch`\
  \ 语句将一个表达式的值与一个或多个 `case` 标签定义的值进行比较。如果找到匹配项，则执行匹配的 `case` 标签后面的代码。可以包含一个可选的 `default`\
  \ 标签，用于定义当表达式与***任何*** `case` 标签都不匹配时要执行的代码。\n\n`switch` 语句的一般语法如下：\n\n```\nswitch\
  \ (int 或 char 表达式) {\ncase 值 1:\n如果表达式的值与值 1 匹配，则执行一行或多行代码\nbreak;\ncase 值 2:\n\
  如果表达式的值与值 2 匹配，则执行一行或多行代码\nbreak;\n// 根据需要添加更多 case 标签 ...\ncase 值 N:\n如果表达式的值与值\
  \ N 匹配，则执行一行或多行代码\nbreak;\ndefault:\n如果没有 case 匹配，则执行默认代码\n}\n```\n\n例如：\n\n```\n\
  // 假设 x 之前已被声明为 int 类型。\nswitch (x) {\ncase 1:  // 如果 x 等于 1 则执行\nSystem.out.println(\"\
  一 ...\");\nbreak;\ncase 2:  // 如果 x 等于 2 则执行\nSystem.out.println(\"二 ...\");\nbreak;\n\
  default:  // 如果 x 的值不是 1 或 2 则执行\nSystem.out.println(\"既不是一也不是二 ...\");\n}\n```\n\
  \n请注意以下几点：\n\n*   `switch` 关键字后面括号中的表达式必须是一个求值为 `char` 或 `int` 值的表达式（或者，正如我们将在本书后面学到的，也可以是其他几种特殊的表达式类型）。\n\
  \n*   `case` 标签后面的值必须是常量 `char` 或 `int` 值（或者，正如我们将在本书后面学到的，也可以是其他几种特殊的表达式类型）。\n\n\
  *   `break;` 语句使得 `switch` 在给定的 `case` 执行完毕后停止执行；执行将从 `switch` 语句的结束花括号 `}` 之后继续。\n\
  \n*   使用冒号（`:`）而不是分号（`;`）来终止 `case` 和 `default` 标签。\n\n*   给定 `case` 标签后面的语句不必用花括号括起来。它们构成一个**语句列表**，而不是一个代码块。\n\
  \n与 `if` 语句不同，`switch` 语句在找到匹配项并执行匹配的 `case` 标签后面的代码时不会自动终止。要退出 `switch` 语句，必须使用\
  \ `break` 语句。如果在给定的 `case` 标签后面没有包含 `break` 语句，执行将会“穿透”到下一个 `case` 或 `default` 标签。这种行为可以被我们利用：当多个\
  \ `case` 标签需要执行相同的逻辑时，可以将两个或多个 `case` 标签背靠背堆叠起来，如下所示：\n\n```\n// 假设 x 之前已被声明为 int\
  \ 类型\nswitch (x) {\ncase 1:\n如果 x 等于 1 则执行的代码\ncase 2:\n如果 x 等于 1 或 2 则执行的代码\ncase\
  \ 3:\n如果 x 等于 1、2 或 3 则执行的代码\nbreak;\ncase 4:\n如果 x 等于 4 则执行的代码\n}\n```\n\n\n\n\
  ### for 语句\n\n`for` 语句是一种编程结构，用于将一条或多条语句执行特定次数。`for` 语句的通用语法如下：\n\n```\nfor (initializer;\
  \ condition; iterator) {\ncode to execute while condition evaluates to true\n}\n\
  ```\n\n`for` 语句定义了三个元素，它们用分号分隔，并放在 `for` 关键字后的括号内：**初始化器**、**条件**和**迭代器**。***初始化器***用于为**循环控制变量**提供初始值。该变量可以作为初始化器的一部分声明，也可以在代码中\
  \ `for` 语句之前提前声明，例如：\n\n```\n// 循环控制变量 'i' 在 for 语句内部声明：\nfor (int i = 0; condition;\
  \ iterator) {\ncode to execute while condition evaluates to true\n}\n// 注意：当 'for'\
  \ 循环退出时，编译器不再识别 i，\n// 因为它实际上是在 'for' 循环内部声明的——我们将在本章后面讨论变量的作用域。\n```\n\n或者\n\n\
  ```\n// 循环控制变量 'i' 在 'for' 循环开始之前声明：\nint i;\nfor (i = 0; condition; iterator) {\n\
  code to execute while condition evaluates to true\n}\n```\n\n***条件***是一个逻辑表达式，通常涉及循环控制变量：\n\
  \n```\nfor (int i = 0; i < 5; iterator) {\ncode to execute as long as the value\
  \ of i remains less than 5\n}\n```\n\n***迭代器***通常对循环控制变量进行递增或递减操作：\n\n```\nfor (int\
  \ i = 0; i < 5; i++) {\ncode to execute as long as the value of i remains less than\
  \ 5\n}\n```\n\n再次注意，在初始化器和条件之后使用了分号（`;`），但***不在***迭代器之后。\n\n以下是 `for` 循环运行方式的分解说明：\n\
  \n1.  当程序执行到 `for` 语句时，首先执行初始化器（且仅执行一次）。\n2.  然后评估***条件***。如果条件评估为 `true`，则执行括号后面的代码块。\n\
  3.  代码块执行完毕后，执行迭代器。\n4.  然后重新评估条件。如果条件仍然为 `true`，则再次执行代码块，随后执行迭代器语句。\n\n此过程重复进行，直到条件变为\
  \ `false`，此时 `for` 循环终止。\n\n以下是一个使用嵌套 `for` 语句生成简单乘法表的示例。循环控制变量 `j` 和 `k` 在其各自的\
  \ `for` 语句内部声明。只要各自 `for` 语句中的条件满足，就会执行 `for` 语句后面的代码块。每次执行相应的代码块时，都会使用 `++` 运算符递增\
  \ `j` 和 `k` 的值：\n\n```\npublic class ForDemo {\npublic static void main(String[]\
  \ args) {\n// Compute a simple multiplication table.\nfor (int j = 1; j <= 4; j++)\
  \ {\nfor (int k = 1; k <= 4; k++) {\nSystem.out.println(j + \" * \" + k + \" = \"\
  \ + (j * k));\n}\n}\n}\n}\n```\n\n输出如下：\n\n```\n1 * 1 = 1\n1 * 2 = 2\n1 * 3 = 3\n\
  1 * 4 = 4\n2 * 1 = 2\n2 * 2 = 4\n2 * 3 = 6\n2 * 4 = 8\n3 * 1 = 3\n3 * 2 = 6\n3 *\
  \ 3 = 9\n3 * 4 = 12\n4 * 1 = 4\n4 * 2 = 8\n4 * 3 = 12\n4 * 4 = 16\n```\n\n与其他流程控制结构一样，如果在\
  \ `for` 条件之后只指定了一条语句，则可以省略花括号：\n\n```\nfor (int i = 0; i < 3; i++) sum = sum + i;\n\
  ```\n\n或者\n\n```\nfor (int i = 0; i < 3; i++)\nsum = sum + i;\n```\n\n但无论哪种情况，使用花括号都被认为是良好的编程实践：\n\
  \n```\nfor (int i = 0; i < 3; i++) {\nsum = sum + i;\n}\n```\n\n### while 语句\n\n\
  `while` 语句在功能上与 `for` 语句相似，两者都用于重复执行相关联的代码块。但是，如果在循环开始时无法预测代码块将要执行的次数，则 `while`\
  \ 语句是首选，因为只要满足指定条件，`while` 语句就会继续执行。\n\n`while` 语句的通用语法如下：\n\n```\nwhile (condition)\
  \ {\ncode to repeatedly execute while expression continues to evaluate to true\n\
  }\n```\n\n条件可以是一个简单或复杂的逻辑表达式，其计算结果为 `true` 或 `false`，例如：\n\n```\nint x = 1;\nint\
  \ y = 1;\nwhile ((x < 20) || (y < 10)) {\nhopefully we'll do something within this\
  \ loop body that increments the value of\neither x or y, to avoid an infinite loop!\n\
  }\n```\n\n当程序执行到 `while` 语句时，首先评估条件。如果条件为 `true`，则执行条件后面的代码块。代码块执行完毕后，再次评估条件，如果仍然为\
  \ `true`，则重复此过程，直到条件评估为 `false`，此时 `while` 循环终止。\n\n以下是一个简单示例，说明如何使用 `while` 循环打印从\
  \ 0 到 3 的连续整数值。一个名为 `finished` 的 `boolean` 变量初始设置为 `false`。`finished` 变量用作标志：只要\
  \ `finished` 为 `false`，`while` 循环后面的代码块就会继续执行。当 `i` 的值达到 4 时，`finished` 标志将被设置为\
  \ `true`，此时 `while` 循环将终止：\n\n```\npublic class WhileDemo {\npublic static void\
  \ main(String[] args) {\nboolean finished = false;\nint i = 0;\nwhile (!finished)\
  \ {\nSystem.out.println(i);\ni++;\nif (i == 4) {\nfinished = true;  // toggle the\
  \ flag to terminate the loop\n}\n}\n}\n}\n```\n\n输出如下：\n\n```\n\n```\n\n与其他流程控制结构一样，如果在条件之后只指定了一条语句，则可以省略花括号：\n\
  \n```\nwhile (x < 20) x = x * 2;\n```\n\n或者\n\n```\nwhile (x < 20)\nx = x * 2;\n\
  ```\n\n但无论哪种情况，使用花括号都被认为是良好的编程实践：\n\n```\nwhile (x < 20) {\nx = x * 2;\n}\n```\n\
  \n如果你希望循环在测试结束条件之前至少执行一次，请改用 `do … while` 语句：\n\n```\ndo {\nwhatever is to be executed\
  \ at least once;\n} while (completion test);\n```\n\n\n\n### 跳转语句\n\nJava 语言定义了两种**跳转语句**，用于将程序执行重定向到代码中其他位置的另一条语句。这两种跳转语句分别是\
  \ `break` 语句和 `continue` 语句。\n\n在本章前面部分，你已经看到 `break` 语句与 `switch` 语句结合使用的实例。`break`\
  \ 语句也可用于突然终止 `for` 或 `while` 循环。当在循环执行过程中遇到 `break` 语句时，循环会立即终止，程序执行将转移到循环之后紧接着的代码行，如下例所示：\n\
  \n```\n// 我们最初打算将 x 从 1 递增到 4 ...\nfor (int x = 1; x <= 4; x++) {\n// ... 但当 x 达到值\
  \ 3 时，我们使用 break 语句提前终止此循环。\nif (x == 3) {\nbreak;\n}\nSystem.out.println(x);\n\
  }\nSystem.out.println(\"循环结束\");\n```\n\n这段代码产生的输出如下：\n\n```\n\n循环结束\n```\n\n另一方面，`continue`\
  \ 语句用于退出循环的***当前迭代***，而***不***终止***整个***循环的执行。也就是说，`continue` 语句会将程序执行转移回循环的顶部，而不完成当前正在进行的特定迭代；对于\
  \ `for` 循环，循环计数器会递增，然后继续执行。\n\n让我们看一个与之前相同的例子，但我们将 `break` 语句替换为 `continue` 语句：\n\
  \n```\n// 我们最初打算将 x 从 1 递增到 4 ...\nfor (int x = 1; x <= 4; x++) {\n// ... 但当 x 达到值\
  \ 3 时，我们使用 continue 语句提前终止此循环迭代（仅此一次）。\nif (x == 3) {\ncontinue;\n}\nSystem.out.println(x);\n\
  }\nSystem.out.println(\"循环结束\");\n```\n\n这段代码产生的输出如下：\n\n```\n\n循环结束\n```\n\n##\
  \ 块结构语言与变量的作用域\n\nJava 是一种**块结构语言**。正如本章前面所述，一个代码“块”是由花括号 `{ ... }` 括起来的零行或多行代码序列。\n\
  \n块可以相互嵌套至任意深度，如下面的代码示例所示：\n\n```\npublic class SimpleProgram {\n// 我们位于“类”块内部（第一层深度）。\n\
  public static void main(String[] args) {\n// 我们位于“main 方法”块内部（第二层深度）。\nint x = 3;\n\
  int y = 4;\nint z = 5;\nif (x > 2) {\n// 我们现在又深入了一层（第三层），位于一个“if”块内部。\nif (y > 3)\
  \ {\n// 我们更深入了一层（第四层），位于一个嵌套的“if”块内部。\n// （我们可以继续嵌套下去！）\n} // 我们刚刚结束了第四层块。\n// （我们可以在第三层这里添加额外的代码。）\n\
  } // 第三层结束了！\n// （我们可以在第二层这里添加额外的代码。）\n} // 第二层到此结束！\n// （我们可以在第一层这里添加额外的代码。）\n\
  } // 再见了，朋友们！第一层（“类”块）刚刚结束。\n```\n\n变量可以在程序中的任何块内声明。变量的**作用域**是指程序中可以通过变量名引用该变量的那部分代码——具体来说，是从变量名首次声明的位置开始，到声明该变量的代码块的右花括号结束。只要编译器能识别变量名，就称该变量**在作用域内**。一旦程序执行退出某个代码块，在该块内声明的任何变量都将**超出作用域**，并且程序将无法访问它们；编译器实际上会忘记曾经声明过该变量。\n\
  \n作为变量作用域影响的一个例子，让我们看一个名为 `ScopeExample` 的简单程序。该程序使用了三个嵌套的代码块：一个用于 `class` 主体，一个用于\
  \ `main` 方法主体，还有一个作为 `main` 方法主体内 `if` 语句的一部分。我们依次声明了两个变量——`x`，在 `main` 代码块中（第二层），以及\
  \ `y`，在 `if` 块中（第三层）：\n\n```\npublic class ScopeExample { // 第一层块开始。\npublic static\
  \ void main(String[] args) { // 第二层块开始。\ndouble x = 2.0;  // 在第二层块声明 \"x\"。\nif\
  \ (x < 5.0) { // 第三层块开始。\ndouble y = 1.0;  // 在第三层块内部声明 \"y\"。\nSystem.out.println(\"\
  x 的值 = \" + x);   // 在第二层声明的 x，在第三层仍然在作用域内。\nSystem.out.println(\"y 的值 = \" + y);\n\
  } // 当 \"if\" 块（第三层）结束时，变量 \"y\" 超出作用域。\n// \"y\" 已超出作用域，编译器不再识别它。\n// 如果我们在后续语句中尝试引用\
  \ \"y\"，编译器将生成错误。另一方面，\"x\" 在作用域内，直到 main 方法块（第二层）结束。\nSystem.out.println(\"x 的值\
  \ = \" + x);    // 这行代码可以编译。\nSystem.out.println(\"y 的值 = \"  + y);   // 这行代码无法编译。\n\
  } // 当 main 方法块（第二层）结束时，变量 \"x\" 超出作用域。\n}\n```\n\n在前面的例子中，一旦 `if` 块结束，变量 `y` 就超出了作用域。如果我们稍后在程序中尝试访问\
  \ `y`，就像前面代码中加粗的那行所做的那样，编译器将生成以下错误消息：\n\n```\n无法解析符号\n符号 : 变量 y\nSystem.out.println(\"\
  y 的值 = \"  + y);\n^\n```\n\n请注意，给定的变量对于其声明之后任何嵌套的***内部***代码块都是可访问的。例如，在前面的 `ScopeExample`\
  \ 程序中，在 `main` 方法块级别（第二层）声明的变量 `x`，在 `if` 语句代码块（第三层）内部是可访问的。\n\n\n\n## 打印到控制台窗口\n\
  \n大多数应用程序通过图形用户界面显示消息来与用户通信。然而，有时能够将简单的文本消息显示到我们运行程序的控制台窗口也很有用，这是一种快速而粗糙的验证程序是否正常运行的方法。\n\
  \n要将文本消息打印到屏幕，我们使用以下语法：\n\n```\nSystem.out.println(要打印的表达式);\n```\n\n`System.out.println`\
  \ 方法可以接受非常复杂的表达式，并尽力将其最终转换为一个单一的 `String` 值，然后显示在屏幕上。以下是一些示例：\n\n```\nSystem.out.println(\"\
  Hi!\");         // 打印字符串字面量/常量。\nString s = \"Hi!\";\nSystem.out.println(s);   \
  \          // 打印字符串变量的值。\nString t = \"foo\";\nString u = \"bar\";\nSystem.out.println(t\
  \ + u + \"!\");   // 使用字符串连接运算符 (+)\n// 打印 \"foobar!\"。\nint x = 3;\nint y = 4;\n\
  System.out.println(x);             // 将整数值 3 的字符串表示形式\n// 打印到屏幕。\nSystem.out.println(x\
  \ + y);         // 计算 x 和 y 的和，然后将整数值 7 的\n// 字符串表示形式打印到屏幕。\n```\n\n请注意，在最后一行代码中，加号\
  \ (`+`) 被解释为***加法***运算符，而不是 `String` ***连接***运算符，因为它分隔了两个都声明为 `int` 类型的变量。因此，3 +\
  \ 4 的和被计算为 7，然后被打印出来。然而，在下一个示例中，我们得到了不同（并且可以说是不期望的）行为：\n\n```\nSystem.out.println(\"\
  x 加 y 的和是：\" + x + y);\n```\n\n上一行代码会导致打印出以下内容：\n\n```\nx 加 y 的和是：34\n```\n\n这是为什么呢？回想一下，我们是从左到右计算表达式的，因此由于两个加号中的第一个分隔了一个\
  \ `String` 字面量和一个 `int`\n\n```\nSystem.out.println(\"x 加 y 的和是：\" + x + y);\n```\n\
  \n第一个加号被解释为 `String` 连接运算符，生成了中间 `String` 值 `\"x 加 y 的和是：3\"`。第二个加号将这个中间 `String`\
  \ 值与一个 `int` 分隔开，因此第二个加号***也***被解释为 `String` 连接运算符，生成了最终的 `String` 值 `\"x 加 y 的和是：34\"\
  `，并将其打印到命令窗口。\n\n要打印 `x` 和 `y` 的***正确***和，我们必须通过将加法表达式括在嵌套括号中来强制第二个加号被解释为整数加法运算符：\n\
  \n```\nSystem.out.println(\"x 加 y 的和是：\" + (x + y));\n```\n\n嵌套括号导致最内层的表达式首先被计算，从而正确地计算出\
  \ `x + y` 的和。因此，这个 `println` 语句在屏幕上显示了正确的消息：\n\n```\nx 加 y 的和是：7\n```\n\n在编写涉及复杂表达式的代码时，最好大量使用括号，以便向编译器明确你的意图。正确使用时，多余的括号从不会造成伤害！\n\
  \n### print 与 println 的区别\n\n当我们调用 `System.out.println` 方法时，括号内包含的任何表达式都会被打印，随后跟一个（平台相关的）**行终止符**。以下代码片段\n\
  \n```\nSystem.out.println(\"第一行。\");\nSystem.out.println(\"第二行。\");\nSystem.out.println(\"\
  第三行。\");\n```\n\n会产生三行独立的输出：\n\n```\n第一行。\n第二行。\n第三行。\n```\n\n相比之下，`System.out.print()`\
  \ 方法\n\n```\nSystem.out.print(要打印的表达式);\n```\n\n会导致括号内包含的任何表达式被打印，但***不***带尾随的行终止符。将\
  \ `print` 与 `println` 结合使用，允许我们跨***一系列*** Java 语句生成***单行***输出，如下例所示：\n\n```\nSystem.out.print(\"\
  J\");        // 这里使用 print。\nSystem.out.print(\"AV\");       // 这里使用 print。\nSystem.out.println(\"\
  A!!!\");   // 注意最后一条语句使用了 println。\n```\n\n这段代码片段产生单行输出：\n\n```\nJAVA!!!\n```\n\n\
  当单个打印语句过长而无法放在一行时，如下例所示\n\n```\n// 伪代码。\n语句;\n另一条语句;\nSystem.out.println(\"这里是一个很长的单个打印语句的示例……\"\
  \n+ \"它长到换行，使得程序列表难以阅读。\");\n又一条语句;\n```\n\n我们可以通过将此类语句的内容分解为多个连接的 `String` 表达式，然后在加号边界处断开语句，使程序列表更易读：\n\
  \n```\n// 伪代码。\n语句;\n另一条语句;\nSystem.out.println(\"这里是一个如何\" +\n\"用加号断开长打印语句\" +\n\
  \"的示例。\");\n又一条语句;\n```\n\n尽管前面的 `System.out.println` 调用跨了三行代码，但它将被打印为单行输出：\n\n\
  ```\n这里是一个如何用加号断开长打印语句的示例。\n```\n\n### 转义序列\n\nJava 定义了许多**转义序列**，以便我们可以在 `String`\
  \ 或 `char` 字面量中表示特殊字符，例如换行符和制表符。最常用的转义序列列在表 2-5 中。\n\n表 2-5\n\nJava 转义序列\n\n| 转义序列\
  \ | 描述 |\n| --- | --- |\n| `\\n` | 换行 |\n| `\\b` | 退格 |\n| `\\t` | 制表符 |\n| `\\\\\
  ` | 反斜杠 |\n| `\\'` | 单引号，在单引号内使用（例如，`char singleQuote = '\\'';`） |\n| `\\\"` | 双引号，在双引号内使用（例如，`String\
  \ doubleQuote = \"\\\"\";`） |\n\n一个或多个转义序列可以包含在传递给 `print` 和 `println` 方法的表达式中。例如，考虑以下代码片段：\n\
  \n```\nSystem.out.println(\"一……\");\nSystem.out.println(\"\\t……二……\");\nSystem.out.println(\"\
  \\t\\t……三…… \\\"呜呼！！！\\\"\");\n```\n\n当执行上述代码时，会显示以下输出：\n\n```\n一……\n……二……\n……三……\
  \ \"呜呼！！！\"\n```\n\n第二行和第三行输出分别缩进了一个和两个制表位，这是由于使用了 `\\t`，而表达式 `\"呜呼！！！\"` 被打印在双引号内，这是因为我们使用了\
  \ `\\\"`。\n\n## Java 风格要素\n\n优秀程序员的一个标志是他们能编写出***人类可读***的代码，以便同事能够使用和修改他们的程序。以下部分提供了一些指南和约定，将帮助你编写清晰、可读的\
  \ Java 代码。\n\n\n\n### 正确使用缩进\n\n让 Java 程序具有可读性的最佳方法之一就是正确使用缩进，以清晰地划分其块结构。代码块中的语句应相对于外层块的起始/结束行进行缩进（即相对于带有花括号的行进行缩进）。标准建议是使用四个空格（请注意，本书中的一些示例与此标准有所不同）。\n\
  \n为了了解缩进如何使程序具有可读性，请考虑以下两个程序。在第一个简单程序中，使用了正确的缩进：\n\n```\npublic class IndentationExample\
  \ {\npublic static void main(String[] args) {\nfor (int i = 1; i <= 4; i++) {\n\
  System.out.print(i);\nif ((i == 2) || (i == 4))  {\nif (i == 2) {\nSystem.out.print(\"\
  Two \");\n}\nelse {\nSystem.out.print(\"Four \");\n}\nSystem.out.println(\"is an\
  \ even number\");\n}\nelse if ((i == 1) || (i == 3))  {\nif (i == 1) {\nSystem.out.print(\"\
  One \");\n}\nelse {\nSystem.out.print(\"Three \");\n}\nSystem.out.println(\"is an\
  \ odd number\");\n}\n}\n}\n}\n```\n\n并且，相对容易看出如何产生以下输出：\n\n```\n1 is an odd number\n\
  2 is an even number\n3 is an odd number\n4 is an even number\n```\n\n现在，让我们移除程序中所有的缩进：\n\
  \n```\npublic class IndentationExample {\npublic static void main(String[] args)\
  \ {\nfor (int i = 1; i <= 4; i++) {\nSystem.out.print(i);\nif ((i == 2) || (i ==\
  \ 4))  {\nif (i == 2) {\nSystem.out.print(\"Two \");\n}\nelse {\nSystem.out.print(\"\
  Four \");\n}\nSystem.out.println(\"is an even number\");\n}\nelse if ((i == 1) ||\
  \ (i == 3))  {\nif (i == 1) {\nSystem.out.print(\"One \");\n}\nelse {\nSystem.out.print(\"\
  Three \");\n}\nSystem.out.println(\"is an odd number\");\n}\n}\n}\n}\n```\n\n该程序的这两个版本都能被\
  \ Java 编译器理解，并且执行时产生相同的输出，但第一个版本对人类来说可读性要好得多。\n\n未能正确缩进不仅会使程序难以阅读，还会使调试变得更加困难，特别是当由于花括号不匹配/缺失而导致编译错误时。在这种情况下，编译错误消息通常会在程序中比问题实际存在位置靠后很多的行上报告。例如，以下程序在第\
  \ 9 行缺少一个左花括号，但编译器直到第 23 行才报告错误：\n\n```\npublic class IndentationExample2 {\npublic\
  \ static void main(String[] args) {\nint x = 2;\nint y = 3;\nint z = 1;\nif (x >=\
  \ 0) {\nif (y > x) {\nif (y > 2) // 我们在第 9 行这里缺少了一个左花括号，但是 ...\nSystem.out.println(\"\
  A\");\nz = x + y;\n}\nelse {\nSystem.out.println(\"B\");\nz = x - y;\n}\n}\nelse\
  \ {\nSystem.out.println(\"C\");\nz = y - x;\n}\n}\nelse System.out.println(\"D\"\
  );  // ... 编译器首先在这里报错！\n// (第 23 行)\n}\n}\n```\n\n更糟糕的是，在这种情况下编译器生成的错误消息可能相当令人费解。在这个特定示例中，编译器（错误地）将第\
  \ 23 行指向为问题所在，并附带一条误导性的错误消息：\n\n```\nIndentationExample2.java:23: illegal start\
  \ of type\nelse System.out.println(\"D\");\n^\n```\n\n这条错误消息无助于我们定位第 9 行的***真正***问题。然而，至少我们正确地缩进了代码，因此与缩进马虎或根本没有缩进的情况相比，查找缺失的花括号可能会容易得多。\n\
  \n如果你遇到一个完全没有任何意义的编译错误，请考虑在程序中更早的位置查找缺失的标点符号——即缺失的花括号、圆括号或分号！\n\n有时，我们的嵌套缩进层级过多，或者单个语句过长，导致在编辑器中查看或打印成纸质版时行会换行：\n\
  \n```\nwhile (a  d) {\nfor (int j = 0; j < 29; j++) {\nx = y + z + a - b + (c *\
  \ (d / e) + f) -\ng + h + j - l - m - n + o + p * q / r + s;\n}\n}\n}\n```\n\n为了避免这种情况，最好在空白或标点符号边界处断开有问题的行，并将续行相对于该行的起始位置进行缩进：\n\
  \n```\nwhile (a  d) {\nfor (int j = 0; j < 29; j++) {\n// 这在视觉上更受欢迎。注意续行的缩进。\nx\
  \ = y + z + a - b + (c * (d / e) + f) -\ng + h + j - l - m - n + o + p *\nq / r\
  \ + s;\n}\n}\n}\n```\n\n### 明智地使用注释\n\n另一个使代码更具可读性的重要特性是大量使用有意义的注释。编写代码时始终牢记，***你***可能知道自己在做什么，但试图阅读你代码的其他人可能不知道。（实际上，如果我们有一段时间没看自己写的代码，有时甚至需要提醒***自己***当初为什么那么做。）\n\
  \n以下是一些基本经验法则：\n\n*   如果对某段代码的功能有任何疑问，请在其前面加上注释。\n\n*   将每条注释缩进到与其所应用的代码块或语句相同的层级。\n\
  \n### 花括号的放置\n\n对于使用花括号来界定块开始/结束的块结构语言，关于代码块的***左/开***花括号应该放在哪里，主要有两种学派思想。\n\n第一种风格是将左花括号放在启动给定块的代码行的***末尾***。每个右花括号独占一行，并与包含左花括号的行的***第一个***字符对齐：\n\
  \n```\npublic class Test {\npublic static void main(String[] args) {\nfor (int i\
  \ = 0; i < 3; i++) {\nSystem.out.println(i);\n}\n}\n}\n```\n\n另一种花括号放置风格是将每个左花括号单独放在一行，并与紧邻的上一行对齐。每个右花括号像之前一样独占一行，并与对应的左花括号对齐：\n\
  \n```\npublic class Test\n{\npublic static void main(String[] args)\n{\nfor (int\
  \ i = 0; i < 3; i++)\n{\nSystem.out.println(i);\n}\n}\n}\n```\n\n这两种左/开花括号的放置方法都可以；两种方法中的第一种产生的代码清单更紧凑一些（即包含更少的空白），并且是两种风格中更流行的一种。然而，在你的代码中保持一致性是一个好习惯，所以选择你喜欢的任何一种花括号放置风格并坚持下去。\n\
  \n### 描述性变量名\n\n与缩进和注释一样，选择变量名时的目标是使程序尽可能具有可读性，从而尽可能实现自文档化。避免使用单个字母作为变量名，循环控制变量（或作为方法参数，本书后面会讨论）除外。\n\
  \n应谨慎使用缩写，并且仅当该缩写被开发者普遍使用和广泛理解时才使用。考虑以下变量声明：\n\n```\nint grd;\n```\n\n变量名 `grd`\
  \ 应该代表什么并不完全清楚。这个变量是应该代表网格（grid）、成绩（grade）还是葫芦（gourd）？更好的做法是拼写出整个单词：\n\n```\nint\
  \ grade;\n```\n\n在另一个极端，名称过长，例如可能是\n\n```\ndouble averageThirdQuarterReturnOnInvestment;\n\
  ```\n\n可能会让任何试图阅读代码的人感到不知所措。有时，缩短变量名同时保持其描述性可能具有挑战性，但请尽量将变量名的长度控制在合理范围内，例如：\n\n\
  ```\ndouble avg3rdQtrROI;\n```\n\n\n\n## 本章小结\n\n在本章中，你学习了 Java 语言的一些基础知识。具体来说，我们涵盖了：\n\
  \n*   Java 的架构中立特性\n*   一个简单 Java 程序的结构\n*   如何从命令行编译和执行 Java 程序的机制\n*   八种基本 Java\
  \ 类型和 `String` 类型\n*   如何声明和初始化这些类型的变量\n*   如何将一种类型的表达式转换为另一种类型，以及何时需要这样做\n*   算术、赋值、逻辑和关系表达式与运算符\n\
  *   Java 中可用的循环及其他几种流程控制结构\n*   如何定义代码块以及变量作用域的概念\n*   如何使用 `System.out.println`\
  \ 和 `System.out.print` 方法打印文本消息\n*   良好 Java 编程风格的一些基本要素\n\n关于 Java 还有很多需要学习——这些知识在构建本书第三部分的\
  \ SRS 应用程序时会用到——但我需要先解释一些基本的对象概念。所以，让我们进入第 3 章！\n\n练习题\n\n1.  将你目前学到的 Java 知识与你已经熟悉的另一种编程语言进行比较。这两种语言有哪些相似之处？又有哪些不同？\n\
  \n2.  [*编码*] 创建一个程序，使用 (a) `for` 循环和 `continue` 语句，以及 (b) `while` 循环和一个作为标志的 `boolean`\
  \ 变量，将 2 到 10 之间的偶数打印到命令窗口。\n\n3.  给定以下初始变量声明和值赋值，在不使用 Java 编译器的情况下，手动计算最后一行代码中表达式的值：\n\
  \n    ```\n    int a = 1;\n    int b = 1;\n    int c = 1;\n    ((((c++ + --a) *\
  \ b) != 2) && true)\n    ```\n\n使用嵌套的 `for` 或 `if` 循环，编写一个名为 `Stars.java` 的程序，生成以下输出：\n\
  \n```\n1: *\n2: **\n3: ***\n4: ****\n5: *****\n```\n\n"
- "# 3. 对象与类\n\n最简单的软件 功能分解 面向对象方法 什么是对象？ 状态/数据/属性 行为/操作/方法 什么是类？ 关于命名约定的说明 声明一个类，Java\
  \ 风格 实例化 封装 用户定义类型与引用变量 引用变量的命名约定 实例化对象：深入探讨 垃圾回收 对象作为属性 一个编译“技巧”：“桩代码”类 组合 引用作为属性的优势\
  \ 面向对象编程语言的三个显著特征 本章小结\n\n对象是面向对象应用程序的基本构建块。正如你在第 1 章中学到的，抽象涉及对现实世界进行建模，你将在本章中看到，对象是构成这种模型的各种现实世界元素的“微型抽象”。\n\
  \n在本章中，你将学习：\n\n*   与“传统”非面向对象方法相比，面向对象软件开发方法的优势\n*   如何使用类来指定对象的数据和行为\n*   如何在运行时创建对象\n\
  *   如何声明**引用变量**以在程序中符号化地引用对象\n*   对象如何在内存中相互追踪\n\n## 最简单的软件\n\n在最简单的层面上，每个软件应用程序都由两个主要组件组成：***数据***\
  \ 和操作这些数据（即输入、输出、计算、存储、检索、打印等）的***函数***。（见图 3-1。）\n\n![](img/78624_3_En_3_Fig1_HTML.png)\n\
  \n一个阴阳符号，分别标有“数据”和“函数”。\n\n图 3-1\n\n最简单的软件由数据以及操作这些数据的函数组成\n\n面向对象之前的软件设计方式被称为（**自顶向下**）**功能分解**。让我们将功能分解的软件设计方法与面向对象方法进行比较。\n\
  \n\n\n### 功能分解\n\n采用功能分解方法时，我们首先陈述系统预期执行的总体功能——例如“学生注册”。然后，我们将该功能分解为子功能：\n\n*  \
  \ “向课程目录添加新课程”\n*   “允许学生注册课程”\n*   “打印学生课程表”\n*   等等\n\n接着，我们将这些功能进一步分解为更小的子功能。例如，我们可能将“允许学生注册课程”分解为：\n\
  \n*   “显示可用课程列表”\n*   “允许学生选择课程”\n*   “验证学生是否满足所有先修条件”\n*   等等\n\n我们持续将功能分解为越来越小的逻辑单元，直到无法再合理细分，如图\
  \ 3-2 所示。\n\n![](img/78624_3_En_3_Fig2_HTML.jpg)\n\n学生注册的框图流程如下：显示可用课程列表，允许学生选择课程，并验证学生是否满足所有先修条件。这三个步骤均连接到“等等”模块。\n\
  \n图 3-2\n\n我们自上而下地对应用程序进行了功能分解……\n\n然后，我们将最底层的功能分配给不同的程序员进行编码和**单元测试**（即独立测试）。最后，我们以模块化的方式自下而上地组装这些功能，在集成过程中测试每个连续阶段的结果，直到构建出完整的应用程序，如图\
  \ 3-3 所示。\n\n![](img/78624_3_En_3_Fig3_HTML.jpg)\n\n学生注册的框图流程自下而上如下：“等等”模块连接到显示可用课程列表、允许学生选择课程以及验证学生是否满足所有先修条件。\n\
  \n图 3-3\n\n……并自下而上地组装应用程序\n\n采用功能分解方法进行软件开发时，我们的主要关注点是应用程序要执行的***功能***；***数据***则是事后才考虑的事情。也就是说：\n\
  \n*   数据从一个函数传递到下一个函数，就像汽车在汽车工厂中通过流水线工艺制造一样。\n*   因此，数据结构必须在应用程序中的***许多***地方（即许多函数）被理解。\n\
  *   如果应用程序部署后其数据结构需要更改，通常会在整个应用程序中引起***重大***的“连锁反应”。因数据结构变更导致连锁反应最显著的例子之一就是千年虫危机，一个看似简单的日期格式变更——从两位年份改为四位年份——引发了全球恐慌！为了在\
  \ 2000 年 1 月 1 日午夜钟声敲响之前，找到并修复那些预计会带来灾难性后果的连锁反应，人们花费了***数十亿***美元。\n*   尽管我们在部署前尽了最大努力对应用程序进行全面测试，但错误总是会悄然潜入而未被发现。如果应用程序完全集成后，因逻辑错误导致数据完整性出现问题，通常很难精确确定错误可能发生的位置——即***在哪个具体函数中***——因为数据已经在函数之间传递了无数次。\n\
  \n### 面向对象方法\n\n正如你在接下来的几章中将会看到的，面向对象的软件开发方法弥补了上述绝大部分缺陷。\n\n*   采用面向对象软件开发时，我们首先关注设计应用程序的***数据结构***，其次才是其功能。\n\
  *   数据被***封装***在对象内部；因此，只有数据所属的对象才需要理解其数据结构。\n*   如果应用程序部署后某个对象的数据结构需要更改，实际上***不会产生连锁反应***；只需更改受影响对象的内部逻辑即可。\n\
  *   ***每个对象负责确保其自身数据的完整性***。因此，如果某个对象的数据内部出现数据完整性错误，我们基本可以断定是该对象***自身***导致了这个问题，从而可以集中精力检查该对象的内部功能逻辑来定位“错误”。\n\
  \n## 什么是对象？\n\n在讨论软件对象之前，我们先来谈谈一般的现实世界对象。根据《韦氏大学词典》的定义，对象是“(1) 可以通过感官感知的物质实体；(2)\
  \ 思想、情感或行为所指向的某种精神或物质实体。”\n\n定义的第一部分指的是我们通常所理解的对象：即我们可以看见、触摸并占据空间的物理“事物”。由于我们打算在整个书中使用“学生注册系统”案例研究作为学习对象的基础，让我们思考一些在学术环境的通用背景下有意义的**物理对象**的例子，即：\n\
  \n*   上课的***学生***\n*   教授学生的***教授***\n*   上课的***教室***\n*   这些教室里的***视听设备***\n* \
  \  教室所在的***教学楼***\n*   学生使用的***教科书***\n*   等等\n\n当然，虽然所有这些类型的对象在典型的大学校园里都很常见，但它们并非都与学生注册课程相关，也并非都是学生注册系统案例研究所明确提及的，但我们暂时不必担心这一点。在本书的第二部分，你将学习一种技术，利用需求规格说明作为基础，来识别哪些类型的对象与特定的抽象相关。\n\
  \n现在，让我们关注定义的后半部分，特别是短语***“思想……所指向的某种精神实体”***。在学术环境中，有许多重要的**概念对象**；其中一些包括：\n\n\
  *   学生参加的**课程**\n*   教职员工所属的**院系**\n*   学生获得的**学位**\n\n当然，还有很多其他的。尽管我们看不见、摸不着、尝不到、闻不到也听不到它们，但在整体抽象中，概念对象与物理对象同等重要。\n\
  \n从软件的角度来看，一个（软件）**对象**是一种软件构造/模块，它将**状态**（**数据**）和**行为**（**函数**）捆绑在一起，共同代表了对现实世界（物理或概念）对象的抽象。这在概念上如图\
  \ 3-4 所示。\n\n![](img/78624_3_En_3_Fig4_HTML.png)\n\n一个阴阳符号，分别标有“数据的状态”和“函数的行为”。\n\
  \n图 3-4\n\n软件对象将状态（数据）和行为（函数）捆绑在一起\n\n接下来，让我们分别深入探讨对象的两个方面——状态和行为。\n\n\n\n### 状态/数据/属性\n\
  \n如果我们希望记录一名学生的信息，可能需要哪些数据？一些示例如下：\n\n*   学生的姓名\n\n*   学生的学号\n\n*   学生的出生日期\n\n\
  *   学生的地址\n\n*   学生指定的主修专业领域\n\n*   学生的累计平均绩点（即 GPA）\n\n*   学生的指导老师是谁\n\n*   学生本学期当前已注册的课程列表（即学生当前的***课程负荷***）\n\
  \n*   学生迄今为止所修全部课程的历史记录，包括每门课程的修读学期/年份以及所获成绩（即学生的***成绩单***）\n\n*   等等\n\n那么，对于一门学术课程呢？也许我们希望记录：\n\
  \n*   课程编号（例如“ART 101”）\n\n*   课程名称（例如“篮子编织入门”）\n\n*   学生在注册本课程前必须成功完成的所有课程列表（即课程的***先修课程***）\n\
  \n*   该课程对应的学分学时数\n\n*   经批准可教授本课程的教授名单\n\n*   等等\n\n在对象术语中，用于描述对象的数据元素被称为对象的**属性**。\n\
  \n一个对象的属性值，当被整体考量时，被认为定义了该对象的**状态**或状况。例如，如果我们想判断一名学生是否“符合毕业条件”（一种***状态***），我们可能会查看以下组合：\n\
  \n*   学生的成绩单（一个***属性值***）\n\n*   学生当前已注册的课程列表（第二个***属性值***）\n\n以确定该学生是否确实有望在当前学年结束时满足其选定主修专业的课程要求（第三个属性值）。\n\
  \n某个给定的属性可能很简单——例如 GPA，它可以表示为一个简单的浮点数（在 Java 中可能是 `double`）——也可能很复杂，例如“成绩单”，它代表了一个相当广泛的信息集合，没有简单的表示方式。\n\
  \n刚接触对象范式的新手程序员常常会问：“为什么不用 `String` 来表示成绩单呢？一个***很长的*** `String`，毫无疑问，但终究还是一个 `String`\
  \ 吧？” 在后续的章节中，你将了解到，用面向对象的术语来表示学生成绩单的概念，有一种更为优雅的方式。\n\n### 行为/操作/方法\n\n现在，让我们重新审视这两种对象——学生和课程——并讨论这些对象各自的行为。\n\
  \n一个学生的行为（至少是与学术事务相关的！）可能包括：\n\n*   注册一门课程\n\n*   退选一门课程\n\n*   指定主修专业领域\n\n*  \
  \ 选择一位指导老师\n\n*   告知我们他们的 GPA\n\n*   告知我们他们是否修过某门特定课程，如果修过，该课程是在何时修读、由哪位教授授课以及学生获得了什么成绩\n\
  \n要想象一个像课程这样无生命的、概念性的对象具有行为，有点困难，但如果我们把课程想象成一个有生命的东西，我们可以设想课程的行为可能包括：\n\n*   允许学生注册\n\
  \n*   判断某个学生是否已经注册\n\n*   告知我们到目前为止有多少学生已注册，或者反过来，在课程满员前还剩多少名额\n\n*   告知我们它的先修课程是什么\n\
  \n*   告知我们该课程值多少学分学时\n\n*   告知我们本学期指派哪位教授教授这门课程\n\n*   等等\n\n当我们具体讨论软件对象时，我们将对象的行为（也称为其**操作**）定义为：对象为了***访问***其属性值（数据）所做的事情，以及对象为了***修改/维护***其属性值（数据）所做的事情。\n\
  \n如果我们花点时间回顾一下前面列出的我们对学生期望的行为，我们会发现每个操作都涉及学生的一个或多个属性，例如：\n\n*   告知你他们的 GPA 涉及***访问***学生“GPA”属性的值。\n\
  \n*   选择主修专业领域涉及***修改***学生“主修专业领域”属性的值。\n\n*   注册一门课程涉及***修改***学生“课程负荷”属性的值。\n\n\
  既然你最近了解到，一个对象的属性值集合定义了它的状态，那么你现在可以看到，操作能够***改变对象的状态***。假设我们将一个尚未选择主修专业领域的学生状态定义为“未申报”学生。要求这样一个学生对象执行其“选择主修专业领域”方法，将导致该对象更新其“主修专业领域”属性的值，以反映新选定的主修专业。这样，学生的状态就从“未申报”变为“已申报”。\n\
  \n另一种思考对象操作的方式是，将其视为可以代表应用程序向对象请求的***服务***。例如，我们可以要求一个课程对象执行的一项服务是，向我们提供当前已注册该课程的所有学生列表（即***学生名册***）。\n\
  \n当我们真正开始用 Java 这样的语言来编程实现对象的行为时，我们将操作在编程语言中的表示称为**方法**，而严格来说，“操作”这个术语通常用于指代概念上的行为。\n\
  \n\n\n## 什么是类？\n\n**类**是一种抽象概念，用于描述一组相似对象中所有对象的共同特征。例如，可以创建一个名为“Student”的类，来描述学生选课系统（SRS）所能识别的所有学生对象。\n\
  \n一个类定义了：\n\n*   属于该类的每个对象的***数据结构***（即***属性***的名称和类型）\n*   这些对象要执行的操作/***方法***：具体来说，包括这些操作是什么、如何正式调用对象来执行它们，以及对象为了实际执行这些操作需要在幕后采取哪些行动\n\
  \n例如，`Student` 类可能被设计为拥有表 3-1 中列出的九个属性。\n\n表 3-1\n\n学生类的拟议属性\n\n| 属性 | Java 类型 |\n\
  | --- | --- |\n| `name` | `String` |\n| `studentId` | `String` |\n| `birthDate`\
  \ | `Date` |\n| `address` | `String` |\n| `major` | `String` |\n| `gpa` | `Double`\
  \ |\n| `advisor` | ??? |\n| `courseLoad` | ??? |\n| `transcript` | ??? |\n\n请注意，`Student`\
  \ 的许多属性可以用 Java 内置类型（例如 `String`、`double` 和 `Date`）来表示，但其中一些属性——`advisor`、`courseLoad`\
  \ 和 `transcript`——过于复杂，Java 内置类型无法处理。你将在本书稍后部分学习如何处理此类属性。\n\n在操作方面，`Student` 类可能定义五个方法，其名称如下：\n\
  \n*   `registerForCourse`\n*   `dropCourse`\n*   `chooseMajor`\n*   `changeAdvisor`\n\
  *   `printTranscript`\n\n你将在第 4 章学习如何在 Java 中正式声明方法。\n\n请注意，一个对象只能执行其所属类已定义方法的事情。从这个意义上说，对象就像一台电器：它可以做它被设计用来做的事情（DVD\
  \ 播放器提供播放、暂停、停止和搜索特定电影场景的按钮），仅此而已（你不能要求 DVD 烤一个百吉饼——至少成功的机会不大！）。因此，成功设计对象的一个重要方面是确保预见到它为了在系统中执行其“使命”所需的所有行为。你将在本书第\
  \ 2 部分学习如何根据应用程序的整体需求，正式确定对象的使命、数据结构和行为应该是什么。\n\n术语**特性**（feature）被用来统称一个类的属性和方法。也就是说，一个包含九个属性声明和五个方法声明的类定义被认为有\
  \ 14 个特性。\n\n### 关于命名约定的说明\n\n所有面向对象编程语言（OOPL），包括 Java，都遵循以下命名约定：\n\n*   在命名类时，我们以***大写***字母开头，但整个名称使用大小写混合：`Student`、`Course`、`Professor`\
  \ 等。当一个类的名称理想情况下应该是一个多词短语时，例如“course catalog”，我们将每个单词的首字母大写，并将这些单词连接起来，不使用空格、破折号或下划线分隔——例如\
  \ `CourseCatalog`。这种风格被称为**帕斯卡命名法**（Pascal casing）。\n*   属性和方法名称的约定是以***小写***字母开头，但名称中后续单词的首字母大写。因此，典型的属性名称可能是\
  \ `name`、`studentId` 或 `courseLoad`，而典型的方法名称可能是 `registerForCourse` 和 `printTranscript`。这种风格被称为**驼峰命名法**（camel\
  \ casing）。\n\n### 声明一个类：Java 风格\n\n一旦我们确定了希望赋予一组相似对象的共同数据结构和行为，我们就必须在 Java 类的上下文中将它们正式声明为属性和方法。例如，我们将按照表\
  \ 3-1 中所示的方式，对 `Student` 类的数据结构进行编程，如下所示：\n\n```\npublic class Student {\n// 属性声明通常出现在类声明的最前面\
  \ ...\nString name;\nString studentId;\nDate birthDate;\nString address;\nString\
  \ major;\ndouble gpa;\n// 类型？ advisor – 我们稍后会声明这个属性\n// 类型？ courseLoad - 同上\n//\
  \ 类型？ transcript - 同上\n// ... 然后是方法声明（细节省略——你将在第 4 章学习如何在 Java 中编写方法。）\n}\n```\n\
  \n与本书迄今为止所见的所有 Java 类定义一样，此类定义将位于一个名为 *ClassName*`.java`（具体来说是 `Student.java`）的源文件中，随后将被编译成字节码形式，文件名为\
  \ `Student.``class`。请注意，类声明中出现了保留字 `public`。我们将在本书后面讨论公共可见性的概念。\n\n请注意，为了使上述代码能够编译，我们需要在声明\n\
  \n`public class Student { ... }`\n\n之前插入语句\n\n`import java.util.Date;`\n\n我们将在第\
  \ 6 章讨论 `import` 指令。\n\n请注意，我们的 `Student` 类不需要声明 `main` 方法。与本书前面展示的用于封装程序 `main`\
  \ 方法的类不同\n\n```\npublic class Simple {\npublic static void main(String[] args) {\n\
  System.out.println(\"I love Java!!!\");\n}\n}\n```\n\n`Student` 类服务于不同的目的：即，我们正在定义\
  \ `Student` 对象的数据结构和行为应该是什么。因为 `Student` 类不包含 `main` 方法，所以尝试用 JVM 执行其字节码是没有意义的——输入\n\
  \n```\njava Student\n```\n\n会导致错误消息\n\n```\nError: main method not found in class\
  \ Student, please define the main method as:\npublic static void main(String []\
  \ args)\n```\n\n\n\n## 实例化\n\n类定义可以被视为创建软件对象的模板——一种用于以下目的的“模式”：\n\n*   在 JVM 中分配指定数量的内存，以容纳新对象的***属性***\n\
  *   将一组特定的***行为***与该对象关联\n\n术语**实例化**指的是在运行时根据类定义在内存中创建对象的过程。从一个单一的类定义（例如 `Student`）出发，我们可以创建许多具有相同数据结构和行为的对象，就像我们使用一个饼干模具来制作许多形状相同的饼干一样。因此，对象的另一种称呼是特定类的**实例**——例如，“一个\
  \ `Student` 对象是 `Student` 类的一个实例。”（我们将在本章稍后部分更详细地讨论 Java 中实例化对象的实际过程。）\n\n因此，类与对象的区别如下：\n\
  \n![](img/78624_3_En_3_Fig5_HTML.jpg)\n\n一个表格包含属性名、数据类型和值三列，下方有 9 行数据。这些行包括姓名、学生\
  \ ID、出生日期、地址和 GPA 等。顶部的文字为：Student 类定义了一个模板。\n\n图 3-5\n\n一个类规定了实例化对象的模板……\n\n* \
  \  ***类***定义了属于该类的每个对象必须拥有的特征——属性、方法；因此，类可以被视为一个***对象模板***，如图 3-5 所示。\n\n![](img/78624_3_En_3_Fig6_HTML.jpg)\n\
  \n一个表格包含属性名、数据类型和值三列，下方有 9 行数据。这些行包括姓名、学生 ID、出生日期、地址和 GPA 等。顶部的文字为：每个 Student 对象填入其独有的属性值。\n\
  \n图 3-6\n\n……然后对象填入其独有的属性值\n\n*   另一方面，***对象***是一个***已填充模板***的唯一实例，该模板已提供属性值，并且可以对其执行方法，如图\
  \ 3-6 所示。\n\n## 封装\n\n**封装**是一个正式术语，指的是将对象的状态和行为捆绑到一个单一逻辑单元中的机制。理论上，我们需要了解的关于某个特定学生的一切信息都包含在\
  \ `Student` 对象的边界内，要么是：\n\n*   直接地，作为该对象的一个属性\n*   间接地，作为一个能够回答问题或判断对象状态的方法\n\n\
  \    封装并非面向对象语言独有，但从某种意义上说，它在面向对象语言中得到了完善。如果你熟悉 C 语言，你会知道 C 语言的 `struct`（结构体）封装了数据：\n\
  \n    `struct employee {`\n\n    `char name[30];`\n\n    `int age;`\n\n    `}`\n\
  \n    而 C 语言的函数封装了逻辑——数据被传入并进行操作，并可选择性地返回一个结果：\n\n    `float average(float x, float\
  \ y) {`\n\n    `return (x + y)/2.0;`\n\n    `}`\n\n    但只有在面向对象编程语言中，将数据和行为封装在单一的类构造中，以表示现实世界实体的抽象这一概念才真正得到贯彻。\n\
  \n## 用户定义类型与引用变量\n\n在像 C 这样的非面向对象编程语言中，语句\n\n```\nint x;\n```\n\n是一个**声明**，表明变量\
  \ `x` 是一个 `int`（整数），它是 C 语言中定义的几种基本数据类型之一。这***实际上***意味着什么？它意味着：\n\n*   `x` 是我们发明的一个***符号名称***，用于引用存储在计算机内存某处的\
  \ `int`（整数）值。但我们并不关心这个值存储在哪里，因为\n*   每当我们在程序中想要操作这个特定的整数值时，我们通过它的符号名称 `x` 来引用它，例如：\n\
  \n    ```\n    if (x > 17) x = x + 5;\n    ```\n\n*   此外，我们命名为 `x` 的这个“东西”知道如何响应多种不同的操作，例如加法\
  \ (+)、减法 (–)、乘法 (*)、除法 (/)、逻辑比较 (>, <, =) 等，这些操作由 `int` 类型定义。\n\n在像 Java 这样的面向对象语言中，我们可以定义一个类，例如\
  \ `Student`，然后声明一个变量为 `Student` 类型，如下所示：\n\n```\nStudent y;\n```\n\n这***实际上***意味着什么？它意味着：\n\
  \n*   `y` 是我们发明的一个符号名称，用于引用存储在计算机内存某处的 `Student` 对象（即 `Student` 类的一个实例）。但我们并不关心这个对象存储在哪里，因为\n\
  *   每当我们在程序中想要操作这个特定对象时，我们通过它的符号名称 `y` 来引用它，例如：\n\n    ```\n    if (y.isOnAcademicProbation())\
  \ {\n    System.out.println (\"Uh oh ...\");\n    }\n    ```\n\n*   此外，我们命名为 `y`\
  \ 的这个“东西”知道如何响应多种不同的服务请求——如何注册课程、退选课程等等——这些请求由 `Student` 类定义。\n\n请注意前面例子中 `y` 作为\
  \ `Student` 类型和 `x` 作为 `int` 类型之间的相似之处。正如 `int` 被称为 Java（及其他语言）中的***预定义类型***一样，`Student`\
  \ 类被称为**用户定义类型**。并且，由于前面例子中的 `y` 是一个***引用*** `Student` 类实例（对象）的变量，因此 `y` 被称为**引用变量**。\n\
  \n相比之下，声明为 Java 中八种基本类型之一的变量——`int`、`double`、`float`、`byte`、`short`、`long`、`char`\
  \ 和 `boolean`——***不是***引用变量，因为在 Java 中，基本类型***不是*** **引用类型**；也就是说，它们不引用***对象***：\n\
  \n```\n// x 不是引用变量，因为在 Java 中，\n// int 不是对象。\nint x;\n// yesNo 不是引用变量，因为在 Java 中，\n\
  // boolean 不是对象。\nboolean yesNo;\n// 等等。\n```\n\n不同的面向对象语言对简单类型的处理方式不同。在某些面向对象语言（例如\
  \ Smalltalk）中，***所有***类型，包括像 `int` 和 `char` 这样的“简单”类型，都是引用类型，而在其他语言（例如 Java 和 C++）中则不是。\n\
  \nJava 包含引用类型和非引用类型的混合这一事实，会影响我们在某些情况下操作变量的方式，例如当我们将基本类型的值放入**集合**时，我们将在第 6 章探讨这个主题。\n\
  \n### 引用变量的命名约定\n\n引用变量的命名遵循与方法名和属性名相同的约定——即使用驼峰命名法。一些引用变量声明的示例如下：\n\n```\nCourse\
  \ prerequisiteOfThisCourse;\nProfessor facultyAdvisor;\nStudent student;\n```\n\n\
  最后一条声明 `Student student;`，如果你不熟悉区分大小写的编程语言，可能需要一些时间来适应。然而，如果在特定代码块的作用域内只有一个属于该类的变量，那么将引用变量名模式化为其所属类的名称被认为是一种良好的编程实践。由于类名以大写字母“S”开头，而引用变量名以小写字母“s”开头，因此对于编译器来说，`Student`\
  \ 和 `student` 是***完全不同的符号***。\n\n\n\n## 实例化对象：深入探讨\n\n不同的面向对象语言在对象实际实例化（创建）的时机上有所不同。在\
  \ Java 中，当我们声明一个变量为用户自定义类型时，例如：\n\n```\nStudent y;\n```\n\n我们实际上还没有在内存中创建一个对象。相反，我们只是声明了一个名为\
  \ `y` 的 `Student` 类型引用变量。这个引用变量具有指向一个 `Student` 对象的 ***潜力***，但它目前还没有指向任何一个；更确切地说，与各种简单类型的变量一样，在编译器看来，`y`\
  \ 的值是未定义的（即为 null），直到我们显式地为其赋值。\n\n如果我们想实例化一个 ***全新的*** `Student` 对象供 `y` 引用，我们必须采取一个明确的步骤：使用特殊的\
  \ Java 关键字 `new`，在运行时于 JVM 内存中分配一个新的 `Student` 对象。我们通过一条赋值语句将新对象与引用变量 `y` 关联起来，如下所示：\n\
  \n```\ny = new Student();\n```\n\n不必担心上述语句末尾的圆括号。我将在第 4 章讨论**构造器**的概念时，说明它们的重要性。\n\
  \n可以将新创建的对象想象成一个氦气球，如图 3-7 所示，而引用变量则像是握住系在气球上那根绳子的手，这样我们就可以随时访问这个对象。\n\n![](img/78624_3_En_3_Fig7_HTML.png)\n\
  \n一个标有“学生对象”的气球插图。一只标有 y 的手握着气球的绳子。\n\n图 3-7\n\n使用引用变量跟踪内存中的对象\n\n由于引用变量有时被非正式地称为“持有”一个对象，我们经常使用非正式术语**句柄**，例如在表达式“引用变量\
  \ `y` 维护着一个 `Student` 对象的句柄”中。\n\n如果你熟悉 C 和 C++ 等语言中的***指针***概念，那么引用与指针类似，因为它幕后指向存储特定对象的内存位置/地址。然而，Java\
  \ 引用***不同于***指针，因为引用不能像指针那样进行算术运算。\n\n我们也可以创建一个新对象而不立即将其赋值给引用变量，如下代码行所示：\n\n```\n\
  new Student();\n```\n\n但这样的对象就像一个没有绳子的氦气球：它确实存在，但我们永远无法在程序中访问到这个对象。本质上，它在“充气”后就会立即从内存中“飘走”。\n\
  \n请注意，我们可以将两个步骤——声明引用变量和实际实例化该变量要引用的对象——合并到一行代码中：\n\n```\nStudent y = new Student();\n\
  ```\n\n初始化引用变量 `y` 的另一种方法是使用赋值语句，将指向一个***已存在***对象的引用“交给”`y`，即一个已经被***另一个***引用变量\
  \ `x` 引用的对象（“氦气球”）。让我们看一个例子：\n\n```\n// 我们声明一个引用变量，并实例化第一个 Student 对象。\nStudent\
  \ x = new Student();\n// 我们声明第二个引用变量，但*不*实例化\n// 第二个 Student 对象。\nStudent y;\n//\
  \ 我们将 y 赋值为指向 x 所引用的*同一个*对象\n// （x 也继续指向它）。本质上，我们现在\n// 有两条“绳子”系在同一个“气球”上。\ny =\
  \ x;\n```\n\n上述赋值语句的概念性结果如图 3-8 所示：两条“绳子”被两只不同的“手”握着，系在同一个“气球”上——即两个***不同***的引用变量指向内存中***同一个***物理对象。\n\
  \n![](img/78624_3_En_3_Fig8_HTML.jpg)\n\n一个标有“学生对象”的气球插图。两只标有 x 和 y 的手握着气球的两根绳子。\n\
  \n图 3-8\n\n在同一个对象上维护多个句柄\n\n因此我们看到，***多个***引用变量可以同时指向***同一个***对象。然而，任何一个***引用变量一次只能持有/指向***一个***对象。因此，如果一个引用变量已经持有一个对象，它必须释放该对象才能指向另一个不同的对象。如果某个特定对象的所有句柄都被释放了，那么该对象对我们的程序来说就不再可访问，就像一个被放飞了的氦气球。\n\
  \n让我们扩展之前的例子来说明这些概念（注意**高亮**显示的已添加代码）：\n\n```\n// 我们声明一个引用变量，并实例化第一个 Student 对象。\n\
  Student x = new Student();\n// 我们声明第二个引用变量，但不实例化\n// 第二个对象。\nStudent y;\n// 我们将\
  \ y 赋值为指向 x 所引用的*同一个*对象\n// （x 也继续指向它）。\ny = x;\n// 我们声明第三个引用变量并实例化第二个\n// Student\
  \ 对象。\nStudent z = new Student();\n```\n\n此时，我们现在有两个指向***第一个*** `Student` 对象的引用\
  \ `x` 和 `y`，以及一个指向***第二个*** `Student` 对象的引用 `z`，如图 3-9 所示。\n\n![](img/78624_3_En_3_Fig9_HTML.jpg)\n\
  \n一个插图，显示两个气球，分别标有“学生对象 1”和“学生对象 2”。学生对象 1 有 x 和 y 两根绳子，对象 2 有 z 一根绳子。\n\n图 3-9\n\
  \n第二个对象出现\n\n让我们再次扩展我们的例子（注意**高亮**显示的已添加代码）：\n\n```\n// 我们声明一个引用变量，并实例化第一个 Student\
  \ 对象。\nStudent x = new Student();\n// 我们声明第二个引用变量，但*不*实例化\n// 第二个对象。\nStudent y;\n\
  // 我们将 y 赋值为指向 x 所引用的*同一个*对象\n// （x 也继续指向它）。\ny = x;\n// 我们现在声明第三个引用变量并实例化第二个\n\
  // Student 对象。\nStudent z = new Student();\n// 我们重新将 y 赋值为指向 z 所引用的同一个对象；\n// 因此\
  \ y 释放了第一个 Student 对象，并抓住了第二个。\ny = z;\n```\n\n因为我们现在要求 `y` 指向 `z` 所引用的同一个对象——即***第二个***\
  \ `Student` 对象——`y` 必须释放它对***第一个*** `Student` 对象的句柄。如图 3-10 所示。（但请注意，`x` 仍然持有第一个\
  \ `Student` 对象。）\n\n![](img/78624_3_En_3_Fig10_HTML.jpg)\n\n一个插图，显示两个气球，分别标有“学生对象\
  \ 1”和“学生对象 2”。它们分别有 x 和 z 的绳子，并通过 y 的绳子相互连接。\n\n图 3-10\n\n转移对象句柄\n\n现在，我们将用**高亮**显示的代码来完成我们的例子：\n\
  \n```\n// 我们声明一个引用变量，并实例化第一个\n// Student 对象。\nStudent x = new Student();\n// 我们声明第二个引用变量，但*不*实例化\n\
  // 第二个对象。\nStudent y;\n// 我们将 y 赋值为指向 x 所引用的*同一个*对象\n// （x 也继续指向它）。\ny = x;\n//\
  \ 我们现在声明第三个引用变量并实例化第二个\n// Student 对象。\nStudent z = new Student();\n// 我们重新将 y 赋值为指向\
  \ z 所引用的同一个对象。\ny = z;\n// 我们重新将 x 赋值为指向 z 所引用的同一个对象。\n// 因此 x 释放了第一个 Student 对象，并也抓住了\n\
  // 第二个。\nx = z;\n```\n\n\n\n由于我们现在要求 `x` 引用与 `z` 相同的对象——即***第二个*** `Student` 对象——`x`\
  \ 必须释放它对***第一个*** `Student` 对象的引用。由于我们不再维护对第一个 `Student` 对象的任何引用——`x`、`y` 和 `z`\
  \ 现在都指向***第二个***对象——第一个 `Student` 对象现在已从程序中丢失，如图 3-11 所示。\n\n![](img/78624_3_En_3_Fig11_HTML.jpg)\n\
  \n一幅插图，展示了两个气球，分别标记为学生对象 1 和学生对象 2。学生对象 1 没有绳子，而对象 2 有三根绳子，分别标记为 x、y 和 z。\n\n图 3-11\n\
  \n第一个 `Student` 对象现已从我们的程序中丢失\n\n让引用变量释放其对对象引用的另一种方法是将该引用变量设置为 `null` 值，正如我们在第 2\
  \ 章中讨论过的，`null` 是 Java 中用于表示不存在的对象的关键字。继续我们之前的例子：\n\n*   将 `x` 设置为 `null` 会使 `x`\
  \ 释放其对第二个 `Student` 对象的引用，如图 3-12 所示：\n\n```\n    x = null;\n    ```\n\n![](img/78624_3_En_3_Fig12_HTML.jpg)\n\
  \n一幅插图，展示了两个气球，分别标记为学生对象 1 和学生对象 2。学生对象 1 没有绳子，而对象 2 有两根绳子，分别标记为 y 和 z。\n\n图 3-12\n\
  \n第二个 `Student` 对象上仅剩两个引用\n\n![](img/78624_3_En_3_Fig13_HTML.jpg)\n\n一幅插图，展示了两个气球，分别标记为学生对象\
  \ 1 和学生对象 2。学生对象 1 没有绳子，而对象 2 有一根绳子，标记为 z。\n\n图 3-13\n\n第二个 `Student` 对象上仅剩一个引用\n\
  \n*   将 `y` 设置为 `null` 会使 `y` 释放其对第二个 `Student` 对象的引用，如图 3-13 所示：\n\n```\n    x\
  \ = null;\n    y = null;\n    ```\n\n*   对于 `z` 也是如此，如图 3-14 所示：\n\n```\n    x =\
  \ null;\n    y = null;\n    z = null;\n    ```\n\n现在，***两个*** `Student` 对象都已从我们的程序中丢失！\n\
  \n![](img/78624_3_En_3_Fig14_HTML.jpg)\n\n一幅插图，展示了两个气球，分别标记为学生对象 1 和学生对象 2。两者都没有绳子。\n\
  \n图 3-14\n\n第二个 `Student` 对象现在也已从我们的程序中丢失\n\n### 垃圾回收\n\n事实证明，如果一个对象的所有引用都被释放，那么该对象在\
  \ JVM 中占用的内存似乎就会被永久浪费。在像 C++ 这样的语言中，如果程序员没有在释放对象所有引用之前明确地回收不再需要的对象的内存，这种情况确实可能发生。未能做到这一点是\
  \ C++ 程序中长期存在的问题根源，通常被称为**内存泄漏**。\n\n在 C++ 中，这是通过以下语句实现的：\n\n`x.delete();`\n\n但在\
  \ Java 中，这样的语句是不必要的，原因我们即将讨论。\n\n另一方面，在 Java 中，JVM 会定期执行**垃圾回收**，这是一个在应用程序执行期间自动为我们回收“丢失”对象内存的过程。以下是\
  \ Java 垃圾回收器的工作原理：\n\n*   如果一个对象没有剩余的活跃引用，它就会成为垃圾回收的***候选***对象。\n\n*   然而，垃圾回收器并不会***立即***回收该对象；相反，垃圾回收发生在\
  \ JVM 确定应用程序可用内存不足时，或者 JVM 处于空闲状态时。\n\n*   因此，在一段时间内，“孤儿”对象仍会存在于内存中——我们只是没有任何引用变量可以用来访问它。\n\
  \nJava 中引入垃圾回收机制几乎消除了 C++ 中出现的那种内存泄漏。但请注意，如果我们同时维护太多活跃对象的引用，JVM 本身仍然有可能耗尽内存。因此，Java\
  \ 程序员不能完全忽视内存管理；只是在 Java 中管理内存比在 C/C++ 中更不容易出错。\n\n## 对象作为属性\n\n当我第一次讨论与 `Student`\
  \ 类相关的属性和方法时，我提到某些属性可以由 Java 语言提供的预定义类型表示，而其他一些属性（`advisor`、`courseLoad` 和 `transcript`）的类型暂时未指定。现在，让我们将学到的关于用户自定义类型的知识应用到其中一个属性上：`Student`\
  \ 类的 `advisor` 属性。\n\n我们不再将 `advisor` 属性简单地声明为一个表示导师姓名的 `String`，而是将其声明为用户自定义类型——即\
  \ `Professor` 类型，这是我们发明的另一个类。此属性类型反映在表 3-2 中。\n\n表 3-2\n\n重新审视 Student 类属性\n\n|\
  \ 属性 | 类型 |\n| --- | --- |\n| `name` | `String` |\n| `studentID` | `String` |\n\
  | `birthDate` | `Date` |\n| `address` | `String` |\n| `major` | `String` |\n| `gpa`\
  \ | `double` |\n| **advisor** | **Professor** |\n| `courseLoad` | ??? |\n| `transcript`\
  \ | ??? |\n\n这一点也反映在我们的 `Student` 类声明中：\n\n```\npublic class Student {\n// 属性声明通常放在最前面\
  \ ...\nString name;\nString studentId;\nDate birthDate;\nString address;\nString\
  \ major;\ndouble gpa;\n// 类是一种用户自定义类型，因此我们可以将属性声明为这种类型。\nProfessor advisor;\n//\
  \ 类型? courseLoad - 我们稍后会声明这个属性。\n// 类型? transcript – 同上。\n// ... 后面是方法声明（此处省略细节）。\n\
  }\n```\n\n通过将 `advisor` 属性声明为 `Professor` 类型——也就是说，让 `advisor` 属性作为一个***引用变量***——我们刚刚使一个\
  \ `Student` 对象能够维护一个指向实际 `Professor` 对象的引用，该对象代表了指导该学生的教授。\n\n反过来，`Professor` 类可能被定义为具有表\
  \ 3-3 中列出的属性。\n\n表 3-3\n\nProfessor 类属性\n\n| 属性 | 类型 |\n| --- | --- |\n| `Name`\
  \ | `String` |\n| `employeeID` | `String` |\n| `birthdate` | `Date` |\n| `Address`\
  \ | `String` |\n| `worksFor` | `String (或 Department)` |\n| **Advisee** | **Student**\
  \ |\n| `teachingAssignments` | ??? |\n\n同样，通过将 `advisee` 属性声明为 `Student` 类型——也就是说，让\
  \ `advisee` 属性成为一个引用变量——我们刚刚给了 `Professor` 对象一种方式来持有/引用实际的 `Student` 对象，该对象代表了教授正在指导的学生。\n\
  \n`Professor` 类的方法可能如下：\n\n*   `transferToDepartment`\n\n*   `adviseStudent`\n\n\
  *   `agreeToTeachCourse`\n\n*   `assignGrades`\n\n*   等等\n\n正如我们在本章前面为 `Student`\
  \ 类所做的那样，我们将用 Java 代码呈现这个 `Professor` 类的设计，如下所示：\n\n```\npublic class Professor\
  \ {\n// 属性。\nString name;\nString employeeId;\nDate birthDate;\nString address;\n\
  String worksFor;\nStudent advisee;\ndouble gpa;\n// 类型? teachingAssignments – 我们稍后会声明这个属性。\n\
  // ... 后面是方法声明（此处省略细节）。\n}\n```\n\n这个类定义将位于名为 `Professor.java` 的源文件中，随后会被编译成字节码形式，文件名为\
  \ `Professor.class`。\n\n请注意，正如前面为 `Student` 类所提到的，我们需要在声明\n\n`public class Professor\
  \ { ... }`\n\n之前插入声明\n\n`import java.util.Date;`\n\n以便代码能够正确编译。\n\n以下是关于 `Professor`\
  \ 类的几个值得注意的要点：\n\n\n\n*   教授很可能同时指导多名学生，因此像 `studentAdvisee` 这样只能引用***单个*** `Student`\
  \ 对象的属性，其作用非常有限。我们将在第 6 章讨论**集合**时介绍处理这种情况的技术，届时我们也会看到，集合对于定义 `Professor` 的 `teachingAssignments`\
  \ 属性以及 `Student` 的 `courseLoad` 和 `transcript` 属性也很有用。\n\n*   `worksFor` 属性表示教授所属的院系。我们可以选择将其表示为一个简单的\
  \ `String` 类型，用于存储院系名称，例如“MATH”；也可以将其表示为一个引用变量，该变量持有对 `Department` 对象的句柄——具体来说，就是代表“现实世界”中数学系的\
  \ `Department` 对象。当然，这样做需要我们为一个名为 `Department` 的新类定义属性和方法。\n\n正如我们将在本书第 2 部分进一步讨论的那样，是否需要发明一个新的用户自定义类型/类来表示特定的现实世界概念/抽象，这个决定并不总是那么明确。\n\
  \n### 编译“技巧”：“桩化”类\n\n如果我们想按前面所示的方式用 Java 编写 `Student` 和 `Professor` 类，那么这两个类都无法单独编译；也就是说，如果我们只编写了\
  \ `Student` 类的代码\n\n```\n// Student.java\npublic class Student {\n// 属性声明通常放在最前面\
  \ ...\nString name;\nString studentId;\nDate birthDate;\nString address;\nString\
  \ major;\ndouble gpa;\nProfessor advisor;\n// 等等\n}\n```\n\n而尚未编写 `Professor` 类（`Professor.java`）的代码，那么在编译\
  \ `Student` 时就会得到如下编译错误\n\n```\nStudent.java: 找不到符号\n符号:   类 Professor\n位置: 类 Student\n\
  Professor advisor;\n^\n```\n\n因为我们还没有向 Java 编译器将“`Professor`”定义为一个类型。\n\n我们可以等到\
  \ `Student` 和 `Professor` 两个类都编写完成后再尝试编译其中任何一个，但如果我们再引入第三个类呢？\n\n```\npublic class\
  \ Student {\nString name;\nProfessor advisor;\nDepartment major;\n// 等等\n}\npublic\
  \ class Professor {\nString name;\nStudent advisee;\nDepartment worksFor;\n// 等等\n\
  }\npublic class Department {\nString name;\nProfessor chairman;\n// 等等\n}\n```\n\
  \n或者第四个类、第五个类？我们是否必须将***所有***类都编写完成后，才能编译其中***任何一个***类？\n\n幸运的是，我们可以使用**桩化**类的技术，临时解决编译类\
  \ X（它引用了尚未编写的类 Y）时遇到的问题。回到我们最初编写的 `Student` 类\n\n```\n// Student.java\npublic class\
  \ Student {\n// 属性声明通常放在最前面 ...\nString name;\n// 等等\nProfessor advisor;\n// 等等\n\
  }\n```\n\n我们可以临时编写一个“骨架”版的 `Professor` 类，如下所示：\n\n```\n// Professor.java\n// 一个“桩”类：注意类体由一对空花括号组成！\n\
  public class Professor { }\n```\n\n尽管这个 `Professor` 类的定义可能很简单，但 Java 编译器仍会将其视为一个***合法***的类定义，编译后会生成一个\
  \ `Professor.class` 字节码文件。\n\n当我们现在尝试编译 `Student.java` 文件时，编译器会将“`Professor`”视为一个有效的符号——具体来说，是一个用户自定义类型的名称——因此\
  \ `Student` 也能正常编译。\n\n回想一下，我们可以使用单个命令同时编译 `Student.java` 和 `Professor.java`（“桩”文件）\n\
  \n`javac *.java`\n\n也就是说，`Professor.java` 不需要先单独编译。\n\n### 组合\n\n每当我们创建一个类（例如 `Student`\
  \ 或 `Professor`），并且该类的一个或多个属性本身是对其他对象的引用时，我们就在使用一种称为**组合**的面向对象技术。对象在概念上可以相互嵌套的层数是无限的，因此组合使我们能够对非常复杂的现实世界概念进行建模。事实证明，大多数“有趣的”类都使用了组合。\n\
  \n使用组合时，从概念上看，我们似乎是在物理上将对象一个嵌套在另一个内部，如图 3-15 所示。\n\n![](img/78624_3_En_3_Fig15_HTML.png)\n\
  \n一个标有“学生对象 A”的云朵图示，内部有一个表格。表格包含姓名 Joe Blow、学生 ID 12345 以及一个顾问，顾问指向一个标有“教授对象 B”的云朵。\n\
  \n图 3-15\n\n概念上的对象“嵌套”\n\n实际的对象嵌套（即在另一个类内部声明一个类）在许多面向对象编程语言中都是可行的，并且有时确实有意义——也就是说，如果从面向对象应用程序的角度来看，对象\
  \ A 不需要有自己的生命周期，并且它的存在仅仅是为了服务于其所属的对象 B**。**\n\n*   例如，把你的大脑想象成一个只存在于你的身体（另一个对象）这个上下文中的对象。\n\
  \n*   作为与 SRS 相关的对象嵌套示例，让我们考虑一个用于跟踪学生在特定课程中表现的成绩簿。如果我们定义一个 `GradeBook` 类，然后创建 `GradeBook`\
  \ 对象作为属性——每个 `Course` 对象一个——那么每个 `GradeBook` 对象完全存在于其关联的 `Course` 对象的上下文中可能是合理的。其他对象不需要直接与\
  \ `GradeBook` 通信；如果一个 `Student` 对象想向 `Course` 对象询问该 `Student` 获得了什么成绩，`Course` 对象可以在内部查询其嵌入的\
  \ `GradeBook` 对象，然后简单地将一个字母等级返回给 `Student`。\n\n然而，我们经常会遇到这样的情况——就像示例中的 `Student`\
  \ 和 `Professor` 类一样——对象 A 需要引用对象 B，对象 B 也需要反向引用对象 A，并且***两个***对象都需要能够独立于彼此，响应整个应用程序发出的请求。在这种情况下，句柄就派上用场了！\n\
  \n实际上，我们并***不是***将整个对象作为属性存储在其他对象内部；相反，我们存储的是对对象的***引用***。当对象 A 的一个属性被定义为对象引用 B\
  \ 时，这两个对象在内存中独立存在，并且只是在需要交互时，有一种便捷的方式找到对方。把你自己想象成一个对象，把你的手机号码想象成你的引用。其他人——“对象”——可以通过你的手机号码联系到你，随时与你通话，即使他们不知道你的实际位置；反之，如果你有他们的手机号码，你也可以随时给他们打电话。\n\
  \n使用句柄进行内存分配在概念上可能类似于图 3-16。\n\n![](img/78624_3_En_3_Fig16_HTML.jpg)\n\n两个云朵的图示，分别标有“学生对象\
  \ A”和“教授对象 B”。学生对象 A 包含姓名 Joe Blow、学生 ID 12345 和顾问。教授对象 B 包含姓名 Doctor Smith、员工 ID\
  \ 987 和受指导者。它们相互连接。\n\n图 3-16\n\n对象在内存中独立存在，并相互持有句柄\n\n采用这种方法，每个对象只在内存中分配一次：\n\n\
  *   `Student` 对象知道如何通过其 `advisor` 属性/句柄/***引用***，在需要时找到并与其顾问（`Professor`）对象通信。\n\
  \n*   `Professor` 对象知道如何通过其 `advisee` 属性/句柄/***引用***，在需要时找到并与其受指导者（`Student`）对象通信。\n\
  \n你将在第 4 章学习如何在 Java 中实际编写这种对象间通信的代码。\n\n\n\n## 面向对象编程语言的三个显著特征\n\n要被视为真正的面向对象语言，一种编程语言必须支持三种关键机制：\n\
  \n*   用户定义（引用）类型\n*   继承\n*   多态\n\n你刚刚学习了第一种机制；我们将在后续章节中讨论另外两种。\n\n## 本章小结\n\n\
  在本章中，你了解到：\n\n*   ***对象***是对物理或概念上的现实世界对象的软件抽象。\n*   ***类***作为创建对象的模板。具体来说，一个类定义了\
  \ (a) 对象将封装的数据，称为对象的***属性***，以及 (b) 对象将能够执行的行为，称为对象的操作/***方法***。\n*   对象可以被认为是类的一个***实例***，该实例已被赋予了属性***值***——本质上，是一个***填充好***的模板。\n\
  *   正如我们可以声明变量为基本类型（如 `int`、`double` 和 `boolean`）一样，我们也可以声明变量为***用户定义类型***（如 `Student`\
  \ 和 `Professor`）。用户定义类型被声明为类。\n*   当我们在运行时创建一个新对象（这个过程称为***实例化***）时，我们通常将该对象的引用（“句柄”）存储在一个***引用变量***中。然后，我们可以使用该引用变量作为符号名称来访问该对象并与之通信。\n\
  *   我们可以定义类 A 的属性，使其作为属于另一个类 B 的对象的引用。通过这样做，我们允许每个对象封装理应属于该对象的信息，但同时使对象能够在运行时在内存中找到彼此，以便在必要时相互联系以共享信息。\n\
  \n## 练习题\n\n1.  [*编码*] 用 Java 代码呈现本章中介绍的 `Student` 和 `Professor` 类。在此过程中，(a) 省略方法声明，并且\
