  \ 也不知道从 `Professor` 继承的 `getTitle` 或 `getEmployeeId` 方法。\n\n*   如果我们确实希望使用其中一个超类的方法版本而不是另一个，我们必须发明某种方式来告知编译器我们想要继承哪一个。\n\
