  ((Pineapple) args[i]).eat();\n}\nelse if (args[i] instanceof Bicycle) {\n((Bicycle)\
  \ args[i]).ride();\n}\nelse if (args[i] instanceof Cloud) {\n((Cloud) args[i]).paint();\n\
  }\n}\nSystem.out.println();\n}\n}\n```\n\n输出：\n\n```\n在 stringExample 中，共有 2 个参数。\n\
  foo 是一个 java.lang.String\nbar 是一个 java.lang.String\n在 stringExample 中，共有 4 个参数。\n\
  eeny 是一个 java.lang.String\nmeeny 是一个 java.lang.String\nminey 是一个 java.lang.String\n\
  mo 是一个 java.lang.String\n在 intExample 中，共有 4 个参数。\n1 是一个 int\n3 是一个 int\n9 是一个 int\n\
  27 是一个 int\n在 intExample 中，共有 0 个参数。\n在 personExample 中，共有 2 个参数。\nFred 是一个 Student\n\
  Dr. Carson 是一个 Professor\n在 objectExample 中，共有 2 个参数。\nFred 是一个 Student\n[Hello!,\
  \ How are you?, Goodbye ...] 是一个 java.util.ArrayList\n正在吃一个菠萝……\n正在骑一辆自行车……\n正在画一朵云……\n\
  ```\n\n## 总结\n\n在本章中，我们讨论了\n\n*   正式的 Java 特定术语与常用于描述对象概念的非正式术语之间的区别\n\n*   `String`\
  \ 的对象性质以及一些用于操作它们的可用方法\n\n*   如何通过消息链来构建高度复杂的表达式\n\n*   Java 异常是如何产生的，以及如何优雅地处理它们，包括定义我们自己的自定义异常类型的能力\n\
  \n*   当调用 Java 应用程序时如何从命令行读取输入，以及如何提示用户进行键盘输入，这些是在运行命令行驱动的应用程序时有用的技术\n\n*   使用 `this`\
  \ 关键字在对象的方法内部引用自身\n\n*   包装类（`Integer`、`Double` 等）的实用功能，用于将 `String` 数据转换为数值，反之亦然\n\
  \n*   Java 中对象标识的本质，如何发现对象所属的真实类，以及如何测试两个 Java 对象的相等性\n\n*   为所有用户定义的类重写 `toString`\
  \ 方法的重要性，以及 `equals` 方法如何类似地被重写\n\n掌握了所有这些 Java 知识，我们现在可以开始构建 SRS 应用程序了。\n\n练习\n\
  \n1.  [*编码*] 编写一个 Java 程序，该程序接受一系列由单个或多个空格分隔的独立字符作为命令行输入，然后将它们“粘合”在一起形成一个单词。例如，如果我们按如下方式调用程序\n\
  \n```\njava Glue B A    N A   N    A\n```\n\n那么程序应输出：\n\n```\nBANANA\n```\n\n且不含空格。\n\
  \n2.  [*编码*] 编写一个 Java 程序，该程序接受一个句子作为命令行输入，并输出关于该句子的统计信息。例如，如果我们按如下方式调用程序\n\n```\n\
  java SentenceStatistics this is my sample sentence\n```\n\n那么程序应输出以下结果：\n\n```\n\
  单词数量：          5\n最长单词：             sentence\n最长单词长度：  8\n最短单词：          is my\n\
  最短单词长度： 2\n```\n\n（为简单起见，句子中不要使用任何标点符号。）\n\n3.  [*编码*] 通过声明以下内容来练习声明枚举\n\n一个名为 `Weekday`\
  \ 的枚举，将一周的七天表示为 `String`。\n\n一个名为 `SolarSystem` 的枚举，将我们太阳系中的九大行星表示为 `Planet` 对象：水星、金星、地球、火星、木星、土星、天王星、海王星、冥王星。为了支持此枚举，声明一个简单的\
  \ `Planet` 类，该类具有以下特性：(a) 一个表示行星名称的 `String` 属性，(b) 一个以行星名称为参数的构造函数，(c) 一个返回短语 `\"\
  Planet:` *planetName*`\"` 的 `toString` 方法。\n\n4.  [*编码*] 通过将 javadoc 注释改造到您之前编写的任何\
  \ Java 代码中，来练习使用 javadoc 注释。\n\n5.  [*编码：高级*] 使用本章介绍的 `Scanner` 类作为名为 `GuessIt`\
  \ 的简单程序的基础，该程序要求用户猜测一个介于 1 到 10 之间的数字（将要猜的“答案”编程为 `GuessIt main` 方法中的一个局部 `int`\
  \ 变量）。\n\n以下是使用 `GuessIt` 程序的示例交互场景；在此示例中，假设正确答案是 6：\n\nC:\\Programs> java GuessIt\n\
  \n请输入一个介于 1 到 10 之间的数字，然后按 Enter 键：3\n\n太小了；请再试一次：7\n\n太大了；请再试一次：6\n\n\n\n"
- "# 14. 将模型转换为 Java 代码\n\n从本章获得最大价值的建议 重温 SRS 类图 Person 类（指定抽象类） Student 类（通过继承实现复用、扩展抽象类、委托）\
  \ Professor 类（关系的双向性） Course 类（自反关系、单向关系） Section 类（表示关联类、公共静态最终属性、枚举） 再谈委托 ScheduleOfClasses\
  \ 类 TranscriptEntry 关联类（静态方法） Transcript 类 SRS 驱动程序 总结\n\n现在，是时候将注意力转回到本书第 2 部分中生成的\
  \ UML 类图，以便将该面向对象的“蓝图”转换为 Java 代码，并专注于如何准确地在面向对象编程语言中对 SRS 领域信息进行建模。在本章中，你将学习如何在\
  \ Java 代码中表示以下所有面向对象的结构：\n\n*   不同多重性的关联（一对一、一对多和多对多），包括聚合\n*   继承关系\n*   关联类\n\
  *   自反关联\n*   抽象类\n*   元数据\n*   静态属性和方法\n\n以及关于何时使用这些不同结构的实用指南。我们还将介绍一种通过命令行驱动应用程序来测试核心类的技术。\n\
  \n## 从本章获得最大价值的建议\n\n掌握一门语言的***最佳***方法之一是从可运行的代码开始并进行实验。一个好的方法是通过实际编译和运行 SRS 应用程序来获得一些\
  \ Java 的实践经验；研究它，以便熟悉我们使用的技术；最后，自己修改它。如你所知，每章末尾提供的练习为你可能希望尝试的实验提供了具体建议。因此，在深入阅读本章之前，***如果你还没有下载，我鼓励你从本书的\
  \ GitHub 仓库（***[***github.com/apress/beginning-java-objects-3e***](http://github.com/apress/beginning-java-objects-3e)***）下载第***\
  \ ***14*** ***章的 Java 源代码***。\n\n我为 SRS 应用程序编写的代码量很大；在每一章中都完整列出每个 Java 类的全部代码是不现实的。因此，为了尽可能为你提供有效的学习体验，我选择只展示那些对你理解转换为\
  \ Java 语言的对象概念尤为关键的代码部分。\n\n我意识到，你当然需要访问完整的源代码来全面理解已实现的 SRS 应用程序，这也是你现在下载 SRS 源代码的另一个重要原因。我建议打印一份\
  \ SRS 源代码并将其放入活页夹中，这样你就可以在阅读本章时在打印稿上做笔记。\n\n## 重温 SRS 类图\n\n让我们将注意力转回到本书第 2 部分中生成的\
  \ SRS 类图。在与 SRS 的赞助商沟通后，我们了解到他们决定削减一些功能以降低开发成本：\n\n*   首先，他们决定不通过 SRS 自动化学生的学习计划。相反，将由每个学生自己确保他们注册的课程适合他们正在攻读的学位。\n\
  *   由于自动学习计划被取消，将不再需要跟踪学生的指导教授是谁。最初在 `Professor` 和 `Student` 类之间建模 *advises* 关系的唯一原因是，当学生首次通过\
  \ SRS 提交暂定学习计划时，可以调用其指导教授来批准该计划。\n*   最后，我们的赞助商认为，在课程名额已满时维护候补名单是一种他们可以舍弃的奢侈功能，因为大多数学生在得知课程名额已满后，会立即选择其他课程。\n\
  \n因此，我们相应地精简了 SRS 类图，以消除这些不必要的功能。此外，为了避免图表过于杂乱，我们选择不在 UML 中反映属性类型或完整的方法签名。生成的图表如图\
  \ 14-1 所示。\n\n![](img/78624_3_En_14_Fig1_HTML.jpg)\n\n一张蓝图展示了注册和选课过程中的各种状态和转换。它包括课程和教学班、学生和教授，以及成绩单和课程安排等元素。\n\
  \n图 14-1\n\n第 14 章的新 UML“蓝图”\n\n幸运的是，生成的模型仍然提供了我们需要学习如何编程的所有关键面向对象元素的示例，如表 14-1\
  \ 所列。\n\n表 14-1\n\n图 14-1 中体现的面向对象特性\n\n| 面向对象特性 | 在 SRS 类图中的体现如下 |\n| --- | ---\
  \ |\n| 继承 | `Person` 类作为 `Student` 和 `Professor` 子类的基类。 |\n| 聚合 | 我们有两个示例：`Transcript`\
  \ 类表示 `TranscriptEntry` 对象的聚合，`ScheduleOfClasses` 类表示 `Section` 对象的聚合。 |\n| 一对一关联\
  \ | `Student` 和 `Transcript` 类之间的 *maintains* 关联。 |\n| 一对多关联 | `Professor` 和 `Section`\
  \ 之间的 *teaches* 关联，`Course` 和 `Section` 之间的 *offered as* 关联。 |\n| 多对多关联 | `Student`\
  \ 和 `Section` 之间的 *attends* 关联，`Course` 类实例之间的 *prerequisite*（自反）关联。 |\n| 关联类 |\
  \ `TranscriptEntry` 类与 *attends* 关联相关联。 |\n| 自反关联 | `Course` 类实例之间的 *prerequisite*\
  \ 关联。 |\n| 抽象类 | `Person` 类将实现为抽象类。 |\n| 元数据 | 每个 `Course` 对象包含与多个 `Section` 对象相关的信息。\
  \ |\n| 静态属性 | 虽然在类图中没有具体说明，但在编写 `Section` 类代码时，我们将利用 `static` 属性。 |\n| 静态方法 | 虽然在类图中没有具体说明，但在编写\
  \ `TranscriptEntry` 类代码时，我们将利用 `static` 方法。 |\n\n在本章中，我们将编写 SRS 类图所需的八个模型类：\n\n\
  ```\nCourse.java\nPerson.java\nProfessor.java\nScheduleOfClasses.java\nSection.java\n\
  Student.java\nTranscript.java\nTranscriptEntry.java\n```\n\n以及一个“包装器”类 `SRS`，它将封装我们应用程序的\
  \ `main` 方法，以及一个辅助的 `enum`（枚举）`EnrollmentStatus`，其用途将在适当的时候解释。\n\n\n\n### Person\
  \ 类（指定抽象类）\n\n我们先从编写 `Person` 类的代码开始（见图 14-2）。\n\n![](img/78624_3_En_14_Fig2_HTML.png)\n\
  \n一个人的框图包含社保号和姓名。\n\n图 14-2\n\n`Person` 类\n\n我们在 UML 图中首先注意到的是类名使用了斜体，正如你在第 10 章中学到的，这意味着\
  \ `Person` 将被实现为一个抽象类。通过在类声明中包含关键字 `abstract`，我们可以防止客户端代码直接实例化 `Person` 对象：\n\n\
  ```\npublic abstract class Person {\n```\n\n#### Person 的属性\n\n`Person` 类的图标指定了两个简单的属性。除非另有说明，我们将在整个\
  \ SRS 应用程序中将***所有***属性设为 `private`：\n\n```\n//------------\n// 属性。\n//------------\n\
  private String name;\nprivate String ssn;\n```\n\n#### Person 的构造方法\n\n我们将为 `Person`\
  \ 类提供一个接受两个参数的构造方法，以便初始化我们的两个属性：\n\n```\n//----------------\n// 构造方法。\n//----------------\n\
  public Person(String name, String ssn) {\nthis.setName(name);\nthis.setSsn(ssn);\n\
  }\n```\n\n请注意，我们使用 `Person` 类自身的 `set` 方法来设置 `name` 和 `ssn` 属性的值，这是第 4 章推荐的最佳实践。\n\
  \n此外，由于为类创建任何构造方法都会消除该类的默认构造方法（正如我们在第 4 章中讨论的那样），我们还将编写一个替代默认构造方法的代码，以避免我们在第 5 章中讨论的与构造方法和继承相关的一些问题：\n\
  \n```\npublic Person() {\nthis.setName(\"?\");\nthis.setSsn(\"???-??-????\");\n\
  }\n```\n\n#### Person 的访问器方法\n\n接下来，我们为所有属性提供访问器方法，并遵循第 4 章推荐的正确访问器方法签名语法。我们所有类中的所有访问器方法都将声明为\
  \ `public` 可访问性：\n\n```\n//------------------\n// 访问器方法。\n//------------------\n\
  public void setName(String n) {\nname = n;\n}\npublic String getName() {\nreturn\
  \ name;\n}\npublic void setSsn(String s) {\nssn = s;\n}\npublic String getSsn()\
  \ {\nreturn ssn;\n}\n```\n\n#### toString( )\n\n我们希望 `Person` 类的所有子类都重写通常从 `Object`\
  \ 类继承的 `toString` 方法版本，这是我们在第 13 章中讨论过的一种实践。然而，我们不想费心为 `Person` 编写这样一个方法的细节；我们更希望让每个子类以适合其自身类的方式处理\
  \ `toString` 方法如何工作的细节。\n\n强制实现 `toString` 方法这一要求的最佳方式是在 `Person` 中为此方法声明一个***抽象方法***，正如我们在第\
  \ 7 章中讨论的那样：\n\n```\n//-----------------------------\n// 其他杂项方法。\n//-----------------------------\n\
  // 我们将让每个子类决定其希望如何\n// 以字符串值的形式表示。\npublic abstract String toString();\n```\n\n\
  这将确保所有从 `Person` 派生的类都用它们自己的具体版本重写这个抽象方法。（这在所有情况下都不是强制性的；我们只是希望所有 SRS 派生类都这样做。）\n\
  \n请注意，由于 `Person` 类本身通常会从 `Object` 类继承一个***通用***版本的 `toString`，我们实际上是在 `Person`\
  \ 中用***抽象***版本重写了 `Object` 的***具体*** `toString`——这是完全可行的。\n\n#### display( )\n\n\
  我们还希望 `Person` 的所有子类实现一个 `display` 方法，用于将 `Person` 对象的属性值打印到命令窗口。我们将仅使用 `display`\
  \ 方法来测试我们的应用程序，以验证对象的属性是否已正确初始化。但是，我们不会也将此方法设为抽象，而是继续实际编写此方法的主体，因为我们知道至少当 `Person`\
  \ 的属性被继承时，我们希望它们如何显示：\n\n```\npublic void display() {\nSystem.out.println(\"人员信息：\"\
  );\nSystem.out.println(\"\\t 姓名：  \" + this.getName());\nSystem.out.println(\"\\\
  t 社保号：  \" + this.getSsn());\n}\n```\n\n通过这样做，我们促进了代码重用：`Person` 的子类（`Student`、`Professor`）将能够使用\
  \ `super` 关键字将此逻辑合并到它们自己的 `display` 方法中，而无需重复编写，正如我们在第 5 章中讨论的那样。例如，以下是 `Student`\
  \ 类的 `display` 方法的预览摘录：\n\n```\npublic void display() {\n// 首先，显示通用的 Person 信息。\n\
  super.display();\n// 等等。\n```\n\n再次注意，我们在 `println` 调用中调用的是 `Person` 类的 `get` 方法，而不是直接访问属性。还要注意，我们在第二个和第三个\
  \ `println` 调用中插入了一个制表符（`\\t`），以便这两行打印输出将缩进一个制表位。\n\n这就是编写 `Person` 类的全部内容——非常简单。接下来我们将处理\
  \ `Person` 的子类 `Student` 和 `Professor`。\n\n### Student 类（通过继承实现重用、扩展抽象类、委托）\n\n\
  图 14-3 展示了 `Student` 类的 UML 表示。\n\n![](img/78624_3_En_14_Fig3_HTML.jpg)\n\n一个学生的框图，包含专业和学位，直接连接到包含社保号和姓名的人员框图。\n\
  \n图 14-3\n\n`Student` 类\n\n我们通过使用 `extends` 关键字来表明 `Student` 是 `Person` 的子类：\n\n\
  ```\npublic class Student extends Person {\n```\n\n\n\n#### 学生属性\n\n在我们的 UML 图中，`Student`类明确标出了两个属性：`major`（专业）和`degree`（学位）。然而，我们在第\
  \ 10 章中学到，还必须将关联编码为属性。`Student`参与了两个关联：\n\n*   *attends*（参加），与`Section`类构成多对多关联\n\
  *   *maintains*（维护），与`Transcript`类构成一对一关联\n\n因此，我们必须允许每个`Student`对象维护对单个`Transcript`对象和多个`Section`对象的引用。\n\
  \n在第 6 章介绍的各种 Java 集合类型中，`ArrayList`似乎是管理多个`Section`引用的最佳选择：\n\n*   `Array`（数组）略显僵化；我们必须预先设定`Array`的大小，使其足够容纳学生在大学期间所有`Section`的引用。而`ArrayList`则可以从较小的容量开始，并根据需要自动增长。\n\
  \n*   决定使用`ArrayList`还是字典类型的集合，取决于我们是否需要根据某个键值从集合中检索对象引用。我们预计不需要针对学生已参加的`Section`进行此类查找；我们***确实***需要能够验证某个学生是否参加过特定的`Section`，但这可以通过使用`ArrayList`类的`contains`方法来实现。也就是说，如果`attends`被声明为`ArrayList`类型，那么我们可以使用语句\n\
  \n```\nif (attends.contains(someSection)) { ...\n```\n\n来验证某个学生是否参加过特定的`Section`。对于`attends`集合的其他大多数用途，我们无论如何都需要遍历整个集合，例如在打印学生的课程表时。因此，`ArrayList`应该能够很好地满足我们的需求。\n\
  \n因此，`Student`类的属性如下所示：\n\n```\n//------------\n// 属性.\n//------------\nprivate\
  \ String major;\nprivate String degree;\nprivate Transcript transcript;\nprivate\
  \ ArrayList attends;\n```\n\n当然，通过继承，`Student`也继承了`Person`声明的属性——即`name`和`ssn`——但访问权限为***私有***。因此，正如我们在第\
  \ 5 章中讨论的那样，这些属性确实成为了`Student`对象“骨架结构”的一部分，但符号`name`和`ssn`并不在`Student`类的***命名空间***内。因此，我们将使用同样从`Person`继承的关联***公共***访问器（“get”/“set”）方法来按需访问它们。\n\
  \n由于我们使用了`ArrayList`类，需要记得在`Student`类的开头、类声明之前包含以下`import`指令：\n\n```\nimport java.util.ArrayList;\n\
  ```\n\n#### 学生构造方法\n\n为了方便初始化属性，我们将提供两个构造方法：\n\n```\n//----------------\n// 构造方法.\n\
  //----------------\npublic Student(String name, String ssn, String major, String\
  \ degree) {\n```\n\n在第一个`Student`构造方法中，我们使用`super(`*参数*`)`结构来复用`Person`类构造方法中的代码，从而在`Student`构造方法中建立`Student`的“Person”特性。回顾我们在第\
  \ 5 章中对`super`关键字的讨论，任何对`super(...)`的调用都必须是子类构造方法中的***第一行***代码：\n\n```\n// 复用父类构造方法的代码。\n\
  super(name, ssn);\n```\n\n在根据传入构造方法的参数设置`major`和`degree`属性的值之后\n\n```\nthis.setMajor(major);\n\
  this.setDegree(degree);\n```\n\n我们开始按如下方式实例化`transcript`属性：\n\n```\n// 创建一个全新的 Transcript\
  \ 作为此 Student 的\n// 成绩单。\nthis.setTranscript(new Transcript(this));\n```\n\n让我们从内到外分析一下上面的代码行：\n\
  \n*   首先，我们实例化一个全新的***未命名***的`Transcript`对象，将对***这个***`Student`的引用作为唯一参数传递给`Transcript`构造方法：\n\
  \n```\nnew Transcript(this)\n```\n\n（由于我们尚未讨论`Transcript`类的结构，其构造方法的签名可能看起来有些令人费解，但等我们有机会在本章后面完整回顾`Transcript`类时，一切就会变得清晰。）\n\
  \n*   然后，我们将这个实例化请求嵌套在对`setTranscript`的调用中：\n\n*   请注意，我们***本可以***用***两行***代码而不是一行来实现：\n\
  \n```\nthis.setTranscript(new Transcript(this));\n```\n\n```\nTranscript t = new\
  \ Transcript();\nthis.setTranscript(t);\n```\n\n但是，如果我们只打算引用变量`t`一次，然后在构造方法退出时它超出作用域就被丢弃，那么费心声明一个变量`t`来作为`Transcript`对象的引用是毫无意义的。正如我们在第\
  \ 13 章中讨论的那样，在单个 Java 语句中将方法调用链式/嵌套在一起是很常见的做法。\n\n最后，正如我们在第 6 章中讨论的那样，我们通常会在构造方法中实例化集合属性（例如`attends\
  \ ArrayList`），以确保在需要添加“鸡蛋”时，我们已经准备好了一个空的“鸡蛋盒”：\n\n```\n// 注意我们正在实例化空的辅助集合。\nattends\
  \ = new ArrayList();\n}\n```\n\n我们选择通过提供第二个构造方法来重载`Student`构造方法，如下代码所示，用于在我们希望创建一个尚不知道姓名、专业或学位的`Student`对象时使用。正如在第\
  \ 4 章中讨论的那样，我们使用语法`this(arguments)`在第二个构造方法中复用第一个`Student`构造方法的代码，传入字符串值`\"TBD\"\
  `作为`name`、`major`和`degree`属性的临时值：\n\n```\n// 第二种更简单的构造方法形式。\npublic Student(String\
  \ ssn) {\n// 复用第一个 Student 构造方法的代码。\nthis(\"TBD\", ssn, \"TBD\", \"TBD\");\n}\n\
  ```\n\n#### 学生访问器方法\n\n我们为所有简单（非集合）属性提供访问器方法：\n\n```\n//------------------\n// 访问器方法.\n\
