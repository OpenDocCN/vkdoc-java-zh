  \n\n\n## Javadoc 注释\n\n在第 2 章中，我们简要提到了 ***Java 文档注释***（也称为“***javadoc***”***注释***）的概念，这是一种特殊的注释类型，我们可以通过它自动为应用程序生成\
  \ HTML 文档。下面我们来探讨如何实现这一点。\n\nJava 文档注释与传统注释一样，可以跨越多行代码。然而，javadoc 注释以斜杠后跟***两个***星号\
  \ /** 开头，并以星号斜杠 */ 结尾。在 javadoc 注释的主体中，我们可以使用许多预定义的 **javadoc 标签**（其名称以“`@`”开头）来控制最终生成的\
  \ HTML 的外观。\n\n下面是一个简单的 `Person` 类，其中包含了 javadoc 注释（以**粗体**显示）：\n\n```\n// Person.java\n\
  /**\n* 一个人是一个人类。我们可以在学术环境中使用 Person 来表示学生\n* 或教授。\n*/\npublic class Person {\n//------------\n\
  // 属性。\n//------------\n/**\n* 一个人的法定姓名。通常表示为\n* \"FirstName I. LastName\"。\n*/\n\
  public String name;\n/**\n* 一个人的年龄（以年为单位）。无论一个人的下一个生日多么临近，\n* 他们的年龄始终反映他们在最近一个生日时的年龄。\n\
  */\nprivate int age;\n//-------------\n// 构造方法。\n//-------------\n/**\n* 此构造方法初始化属性\
  \ name 和 age。\n* @param n 人的姓名，按名 - 中间名首字母 -\n* 姓的顺序排列。\n* @param a 人的年龄。\n*/\n\
  public Person(String n, int a) {\nname = n;\nage = a;\n}\n/**\n* 此方法用于确定一个人的狗年年龄。\n\
  */\npublic double dogYears() {\nreturn age/7.0;\n}\n}\n```\n\n以下是关于上述示例的一些观察：\n\n\
  *   `public` 特性会自动出现在 javadoc 生成的文档中；而 `private` 特性默认情况下不会出现。因此，尽管我们已用 javadoc 风格记录了\
  \ `private age` 属性，但 `age` 不会反映在最终的 HTML 文档中，我们稍后会看到这一点。\n\n*   `@param` 是一个 javadoc\
  \ 特有的标签，用于定义方法中某个特定参数的用途；其使用的一般语法是 `@param` *参数名 描述*。\n\n*   中间的空行和/或非 javadoc 注释（如果存在）会被\
  \ `javadoc` 工具忽略：\n\n```\n/**\n* 一个人的法定姓名。通常表示为 \"FirstName I. LastName\"。\n*/\n\
  // 这里有一个非 Javadoc 注释不会造成影响，中间的空行也不会。\npublic String name;\n```\n\n要为这个类生成 HTML 文档，我们使用\
