  \n## 再论面向对象编程语言的三个显著特征\n\n在第 3 章中，我们指出了编程语言要被视为真正的面向对象语言所必需的三个关键特征。我们现在已经详细讨论了这三个特征中的前两个：\n\
  \n*   （程序员创建的）***用户定义类型***，如第 3 章所述\n\n*   ***继承***，如本章所述\n\n*   多态性\n\n剩下的就是讨论**多态性**，这是即将到来的一章（准确地说，是第\
  \ 7 章）的主题之一。然而，我们首先要稍微绕个弯，讨论一下如何通过使用一种称为**集合**的特殊对象类型来收集和组织我们创建的对象组。\n\n## 总结\n\n\
  在本章中，你学到了\n\n*   ***关联***描述的是类之间的关系——即两个特定类型/类的对象之间潜在的关系——而***链接***描述的是属于这些类的两个对象之间的实际关系。\n\
  \n*   我们根据类型 X 的多少个对象可以链接到类型 Y 的给定对象，反之亦然，来定义类 X 和 Y 之间关联的***多重性***。可能的多重性包括一对一\
  \ (1:1)、一对多 (1:m) 和多对多 (m:m)。在所有这些情况下，关系两端对象的参与可以是可选的或强制的。\n\n*   ***聚合***是一种特殊类型的关联，暗示着包含关系。\n\
  \n*   如何通过***继承***基于现有类派生新类，以及在派生这些新类时应该做什么和不应该做什么——具体来说，我们如何通过***添加特性***或***重写方法***来***扩展***超类并***特化***它。\n\
