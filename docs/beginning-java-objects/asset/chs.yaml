  \n对于`attends`集合属性，我们将提供`addSection`和`dropSection`方法，以替代传统的访问器方法，用于向`ArrayList`中添加和移除`Section`对象；我们稍后将讨论这些方法。\n\
  \n\n\n#### display( )\n\n正如我们对 `Person` 所做的那样，我们选择为 `Student` 提供一个 `display` 方法，用于测试\
  \ SRS 的命令行版本。由于 `Student` 是一种 `Person`，并且我们已经费心为从 `Person` 继承的属性编写了 `display` 方法，我们将通过使用\
  \ `super` 关键字重用该方法的代码，然后再额外显示 `Student` 对象特有的属性值：\n\n```\npublic void display()\
  \ {\n// 首先，显示通用的 Person 信息。\nsuper.display();\n// 然后，显示 Student 特有的信息。\nSystem.out.println(\"\
  学生特有信息:\");\nSystem.out.println(\"\\t 专业:  \" + this.getMajor());\nSystem.out.println(\"\
  \\t 学位:  \" + this.getDegree());\nthis.displayCourseSchedule();\nthis.printTranscript();\n\
  // 最后输出一个空行。\nSystem.out.println();\n}\n```\n\n请注意，我们在 `Student` 的 `display` 方法中调用了\
  \ `Student` 类的另外两个方法：`displayCourseSchedule` 和 `printTranscript`。我们选择将它们编写为独立的方法，而不是将其代码合并到\
  \ `display` 方法的主体中，以避免 `display` 方法变得过于杂乱。\n\n#### toString( )\n\n通过扩展抽象类（就像我们从\
  \ `Person` 派生 `Student` 子类一样），我们隐式同意用具体方法覆盖父类指定的任何抽象方法。就 `Person` 类而言，我们有一个这样的方法：`toString`：\n\
  \n```\n// 我们必须编写此方法，因为它在父类 (Person) 中被指定为抽象方法；\n// 如果不这样做，Student 类也将成为抽象类。\n//\n\
  // 对于 Student，我们希望返回如下格式的字符串：\n//\n//     Joe Blow (123-45-6789) [Master of Science\
  \ - Math]\npublic String toString() {\nreturn this.getName() + \" (\" + this.getSsn()\
  \ + \") [\" + this.getDegree() +\n\" - \" + this.getMajor() + \"]\";\n}\n```\n\n\
  #### displayCourseSchedule()\n\n`displayCourseSchedule` 方法是一个更复杂的委托示例；我们将推迟讨论此方法，直到我们讨论了更多\
  \ SRS 类之后。\n\n#### addSection( )\n\n当 `Student` 注册一个 `Section` 时，此方法将用于向 `Student`\
  \ 对象传递对该 `Section` 的引用，以便将 `Section` 引用存储在 `attends ArrayList` 中：\n\n```\npublic\
  \ void addSection(Section s) {\nattends.add(s);\n}\n```\n\n这是委托的另一个示例：`Student`\
  \ 对象将组织 `Section` 引用的工作委托给其封装的集合。\n\n#### dropSection( )\n\n当 `Student` 退选一个 `Section`\
  \ 时，此方法将用于向 `Student` 对象传递对“已退选”`Section` 的引用。`Student` 对象随后通过调用 `attends ArrayList`\
  \ 的 `remove` 方法，将删除该 `Section` 的工作委托出去：\n\n```\npublic void dropSection(Section\
  \ s) {\nattends.remove(s);\n}\n```\n\n#### isEnrolledIn( )\n\n此方法用于确定给定的 `Student`\
  \ 是否已注册到特定的 `Section`——即该 `Student` 的 `attends` 集合是否已经引用了该 `Section`——通过利用 `ArrayList`\
  \ 类的 `contains` 方法：\n\n```\n// 确定该 Student 是否已注册到 THIS\n// EXACT Section。\npublic\
  \ boolean isEnrolledIn(Section s) {\nif (attends.contains(s)) return true;\nelse\
  \ return false;\n}\n```\n\n如您所见，`Student` 类的方法中存在大量委托。我们封装为 `Student` 属性的 `ArrayList`\
  \ 为其所属的 `Student` 对象做了很多幕后工作。\n\n#### isCurrentlyEnrolledInSimilar( )\n\n虽然我们的模型没有指定，但我添加了另一个版本的\
  \ `isEnrolledIn` 方法，名为 `isCurrentlyEnrolledInSimilar`，因为在编写 `Section` 类（本章稍后介绍）时，我发现需要这样一个方法。无论您在面向对象软件开发项目的对象建模阶段投入多少思考，一旦编码开始，您将不可避免地发现需要为类添加额外的属性和方法，因为编码会促使您以非常精细的粒度思考应用程序的“机制”。\n\
  \n由于此方法有些复杂，因此首先完整显示方法代码，然后进行深入解释：\n\n```\n// 确定该 Student 是否已注册到同一课程的\n// 任何 Section。\n\
  public boolean isCurrentlyEnrolledInSimilar(Section s1) {\nboolean foundMatch =\
  \ false;\nCourse c1 = s1.getRepresentedCourse();\nfor (Section s2 : attends) {\n\
  Course c2 = s2.getRepresentedCourse();\nif (c1 == c2) {\n// attends() ArrayList\
  \ 中确实存在一个\n// 代表同一课程的 Section。\n// 检查该 Student 是否当前已注册\n// （即，他/她是否尚未收到成绩）。\n//\
  \ 如果没有成绩，则他/她当前已注册；\n// 如果有成绩，则他/她过去某个时间已完成该课程。\nif (s2.getGrade(this) == null)\
  \ {\n// 未分配成绩！这意味着\n// 该 Student 当前已注册到\n// 同一课程的一个 Section。\nfoundMatch = true;\n\
  break;\n}\n}\n}\nreturn foundMatch;\n}\n```\n\n此方法的细节如下。\n\n在编写 `Section` 类的 `enroll`\
  \ 方法（将在本章后面讨论）时，我意识到我们需要一种方法来确定特定 `Student` 是否已注册到给定 `Course` 的***任何*** `Section`。也就是说，如果某个\
  \ `Student` 试图注册 Math 101 的第 1 节，而该学生已经注册了 Math 101 的第 2 节，我们希望拒绝此请求：\n\n```\n//\
  \ 确定该 Student 是否已注册到同一课程的\n// 任何 Section。\npublic boolean isCurrentlyEnrolledInSimilar(Section\
  \ s1) {\n```\n\n我们将一个局部 `boolean` 变量初始化为 `false`，目的是如果确实发现该 `Student` 当前已注册到同一课程的某个\
  \ `Section`，则稍后将其重置为 `true`：\n\n```\nboolean foundMatch = false;\n```\n\n接下来，我们获取相关\
  \ `Section` 所代表的 `Course` 对象的句柄，并将其赋值给引用变量 `c1`：\n\n```\nCourse c1 = s1.getRepresentedCourse();\n\
  ```\n\n然后，我们使用第 6 章讨论的技术，通过 `for` 循环遍历集合，使用变量 `s2` 依次维护 `attends` 集合中每个 `Section`\
  \ 的临时句柄：\n\n```\nfor (Section s2 : attends) {\n```\n\n在 `for` 循环内部，我们获取第二个 `Course`\
  \ 对象 `c2` 的句柄——即 `Section s2` 所属的 `Course` 对象——并测试两个 `Course` 对象的相等性：\n\n```\nCourse\
  \ c2 = s2.getRepresentedCourse();\nif (c1 == c2) {\n```\n\n请注意，我们使用 `==` 进行相等性测试，因为正如我们在第\
  \ 13 章中讨论的那样，我们确实希望知道两个 `Course` 引用 `c1` 和 `c2` 是否指向***完全相同的对象***。\n\n然而，如果我们找到匹配项，工作尚未完成，因为\
  \ `Student` 的 `attends ArrayList` 保存了该 `Student` ***曾经*** 参加过的所有 `Sections`。要确定\
  \ `Section s2` 是否确实是该 `Student` ***当前*** 注册的 `Section`，我们必须检查该 `Section` 是否已给出成绩。缺少成绩——即成绩值为\
  \ `null`——表示该 `Section` 正在进行中：\n\n```\nif (s2.getGrade(this) == null) {\n// 未分配成绩！这意味着\n\
  // 该 Student 当前已注册到\n// 同一课程的一个 Section。\n```\n\n一旦我们找到***第一个***这样的匹配项，我们就可以相应地设置\
  \ `boolean` 标志，跳出外层的 `while` 循环，并向调用者返回 `true`：\n\n```\nfoundMatch = true;\nbreak;\n\
  }\n}\n}\nreturn foundMatch;\n}\n```\n\n\n\n#### getEnrolledSections( )\n\n之前使用的\
  \ `getEnrolledSections` 方法是一个简单的单行代码：\n\n```\npublic Collection getEnrolledSections()\
  \ {\nreturn attends;\n}\n```\n\n注意该方法的返回类型：我们实际上返回的是一个 `ArrayList` 引用，但将其作为***泛型***\
  \ `Collection` 引用返回。正如你在第 7 章所学到的，`Collection` 是 `java.util` 包中预定义的接口，由于 `ArrayList`\
  \ 类***实现了*** `Collection` 接口，因此 `ArrayList` ***是一种*** `Collection`。通过从该方法返回接口类型\
  \ `Collection` 而非显式类类型 `ArrayList`，我们保留了未来更改 `Student` 内部使用的集合类型的权利，而不会对客户端代码产生连锁影响——这是我们在第\
  \ 7 章中详细讨论过的接口优势之一。\n\n我们还必须记得在 `Student` 类声明的开头包含以下 `import` 指令：\n\n```\nimport\
  \ java.util.Collection;\n```\n\n#### printTranscript( )\n\n`printTranscript` 方法是***委托***的一个直观示例。我们使用\
  \ `Student` 的 `getTranscript` 方法来获取属于该 `Student` 的 `Transcript` 对象的句柄，然后调用该 `Transcript`\
  \ 对象的 `display` 方法（你将在本章后面讨论 `Transcript` 类时看到具体细节）：\n\n```\npublic void printTranscript()\
  \ {\nthis.getTranscript().display();\n}\n```\n\n请注意，我们同样可以用两行代码而不是一行来实现这一点：\n\n\
  ```\npublic void printTranscript() {\nTranscript t = this.getTranscript();\nt.display();\n\
  }\n```\n\n但“链式”版本更加简洁。\n\n接下来，我们将把注意力转向 `Professor` 类。\n\n### Professor 类（关系的双向性）\n\
  \n图 14-4 展示了 `Professor` 类的 UML 表示。\n\n![](img/78624_3_En_14_Fig4_HTML.jpg)\n\n\
  一个教授的框图，包含职称、院系以及同意授课的命令，该框图直接连接到包含社会安全号码和姓名的人员框图。\n\n图 14-4\n\n`Professor` 类\n\n\
  由于实现 `Person` 的 `Professor` 类所需的代码与 `Student` 非常相似，我将仅对 `Professor` 中特别值得注意的特性进行说明。不过，我鼓励你查看\
  \ `Professor` 类的完整代码，以增强你阅读和解释 Java 语法的能力。\n\n#### Professor 属性\n\n`Professor` 类涉及一个关联——与\
  \ `Section` 类的一对多 *teaches* 关联——因此我们必须提供一种方式，让 `Professor` 对象能够维护多个 `Section` 句柄，我们通过创建一个\
  \ `ArrayList` 类型的 `teaches` 属性来实现这一点：\n\n```\n//------------\n// 属性。\n//------------\n\
  private String title;\nprivate String department;\nprivate ArrayList teaches;\n\
  ```\n\n#### agreeToTeach( )\n\n我们的类图要求我们实现一个 `agreeToTeach` 方法。该方法接受一个 `Section`\
  \ 对象引用作为参数，并首先将此引用存储在 `teaches ArrayList` 中：\n\n```\npublic void agreeToTeach(Section\
  \ s) {\nteaches.add(s);\n```\n\n在 UML 类图中建模的关联被假定为双向的。然而，在***代码***中实现关联时，我们必须针对每个关联逐案考虑双向性是否重要。\n\
  \n*   我们能否想到任何情况下，`Professor` 对象需要知道它负责教授哪些 `Section`？是的——例如，当我们要求 `Professor` 对象打印出其教学任务时。\n\
  *   反过来呢？也就是说，我们能否想到任何情况下，`Section` 对象需要知道谁在教授它？是的——例如，当我们打印 `Student` 的课程表时。\n\n\
  因此，我们不仅必须将 `Section` 对象的引用存储在 `Professor` 的 `teaches ArrayList` 中，还必须确保以某种方式通知 `Section`\
  \ 对象，这个 `Professor` 将成为它的讲师。我们通过调用 `Section` 对象的 `setInstructor` 方法来实现这一点，并传入当前正在执行方法的\
  \ `Professor` 对象的句柄（通过 `this` 关键字），这是我们在第 13 章中讨论过的对象自引用技术：\n\n```\n// 我们希望双向链接这些对象。\n\
  s.setInstructor(this);\n}\n```\n\n#### displayTeachingAssignments( )\n\n`displayTeachingAssignments`\
  \ 方法在概念上与 `Student` 的 `displayCourseSchedule` 方法非常相似。我们将推迟到本章后面再讨论后者，但一旦我们详细讨论了\
  \ `displayCourseSchedule`，你就能回过头来重新审视 `Professor` 的 `displayTeachingAssignments`\
  \ 方法。\n\n接下来，我们将把注意力转向 `Course` 类。\n\n### Course 类（自反关系、单向关系）\n\n图 14-5 展示了 `Course`\
  \ 类的 UML 表示。以下各节将提供关于此类的更多细节。\n\n![](img/78624_3_En_14_Fig5_HTML.png)\n\n一个课程的框图，包含课程编号、课程名称和学分的先修课程，通过排课、添加先修课程和具有先修课程命令来体现。\n\
  \n图 14-5\n\n`Course` 类\n\n\n\n#### 课程属性\n\n回顾 SRS 类图，我们看到`Course`类拥有三个简单属性，并参与两个关联关系：\n\
  \n*   ***开设为（offered as）***，与`Section`类的一对多关联\n*   ***先修课程（prerequisite）***，多对多的自反关联\n\
  \n总共五个属性：\n\n```\n//------------\n// 属性\n//------------\nprivate String courseNo;\n\
  private String courseNo;\nprivate String courseName;\nprivate double credits;\n\
  private ArrayList offeredAsSection;\nprivate ArrayList prerequisites;\n```\n\n请注意，自反关联的处理方式与其他任何关联完全相同——也就是说，我们为`Course`类提供了一个名为`prerequisites`的`ArrayList`属性，使得给定的`Course`对象能够持有对***其他***`Course`对象的引用。\n\
  \n我们选择不将此自反关联实现为双向关联。也就是说，给定的`Course`对象 X 会知道哪些其他`Course`对象 A、B、C 等是***它的***先修课程，但它***不会***知道哪些`Course`对象\
  \ L、M、N 等将 X 视为***它们的***先修课程，如图 14-6 所示。\n\n![](img/78624_3_En_14_Fig6_HTML.jpg)\n\
  \n图中显示三个课程对象 L、M、N 连接到课程对象 X，再连接到课程对象 A、B、C。下方文字说明：课程对象 X 持有其先修课程的引用，但它不知道哪些课程将\
  \ X 视为它们的先修课程。\n\n图 14-6\n\n自反关联`prerequisite`未实现为双向关联\n\n我们选择单向实现此关联的理由如下：给定的`Course`对象\
