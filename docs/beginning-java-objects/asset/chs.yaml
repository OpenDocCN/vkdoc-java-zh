- "# 13. 更多 Java 细节\n\nJava 专用术语 Java 归档 (jar) 文件 创建 Jar 文件 检查 Jar 文件的内容 使用 Jar 文件中的字节码\
  \ 从 Jar 文件中提取内容 “打包”整个目录层次结构 Javadoc 注释 字符串的对象本质 字符串的操作 字符串是不可变的 StringBuffer 类\
  \ StringTokenizer 类 实例化字符串与字符串字面量池 测试字符串的相等性 消息链 使用“this”进行对象自引用 Java 异常处理 异常处理的机制\
  \ 捕获异常 解读异常堆栈跟踪 异常类层次结构 捕获通用异常类型 编译器对异常处理的强制要求 利用捕获到的异常 Try/Catch 块的嵌套 用户自定义异常类型\
