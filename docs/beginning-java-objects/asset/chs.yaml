  \n#### scheduleSection( )\n\n此方法演示了几种有趣的技术：\n\n```\npublic Section scheduleSection(char\
  \ day, String time, String room,\nint capacity) {\n// 创建一个新的 Section（注意我们分配课程序号的创意方式）...\n\
  Section s = new Section(offeredAsSection.size() + 1,\nday, time, this, room, capacity);\n\
  // ... 然后记住它！\nthis.addSection(s);\nreturn s;\n}\n```\n\n首先，请注意此方法调用`Section`类构造函数来实例化一个新的`Section`对象`s`，在`offeredAsSection\
  \ ArrayList`中存储***一个***对此`Section`对象的引用，然后将***第二个***引用返回给客户端代码。\n\n其次，我们通过将`offeredAsSection\
  \ ArrayList`的大小加 1，生成传递给`Section`构造函数的第一个参数（代表课程序号）作为“递增”序号。第一次为给定的`Course`对象调用`scheduleSection`方法时，`ArrayList`为空，因此表达式\n\
  \n```\nofferedAsSection.size() + 1\n```\n\n的计算结果为 1，因此我们将创建`Section`编号 1。第二次为同一个`Course`对象调用此方法时，`ArrayList`已经包含对第一个创建的`Section`对象的引用，因此表达式\n\
  \n```\nofferedAsSection.size() + 1\n```\n\n的计算结果为 2，因此我们将创建`Section`编号 2，依此类推。\n\
  \n然而，这种方法存在一个缺陷：如果我们创建然后***删除***`Section`对象，`ArrayList`的大小会扩大和缩小，最终可能导致重复的`Section`编号。\n\
  \n现在，让我们将注意力转向`Section`类。\n\n### Section 类（表示关联类、公共静态最终属性、枚举）\n\n图 14-7 展示了`Section`类的\
