  \ 最简单的软件，再探 本章小结\n\n正如你在第 3 章中学到的，对象是面向对象软件系统的构建块。在这样的系统中，对象相互协作以完成共同的系统目标，类似于蚁丘中的蚂蚁、公司的员工或你身体中的细胞。每个对象都有特定的结构和使命；这些各自的使命相互补充，共同完成整个系统的总体使命。\n\
  \n在本章中，你将学习\n\n\n\n*   方法如何用于指定对象的行为\n*   构成方法的各种代码元素\n*   对象如何将其方法作为服务公开给其他对象\n\
  *   对象之间如何相互通信以请求对方的服务，从而实现协作\n*   对象如何维护其数据，以及如何保护数据以确保其完整性\n*   一种称为**信息隐藏**的面向对象语言特性的强大之处，以及当类的私有实现细节不可避免地发生变化时，信息隐藏如何用于限制对应用程序代码的连锁影响\n\
  *   一种称为**构造函数**的特殊函数类型，如何在对象首次实例化时用于初始化其状态\n\n## 事件驱动对象协作\n\n简而言之，面向对象软件开发的过程包含以下四个基本步骤：\n\
  \n1.  正确确立应用程序的功能需求及其总体任务\n2.  设计满足这些需求和任务所需的适当类——包括它们的数据结构、行为以及彼此之间的关系\n3.  实例化这些类，以创建适当类型和数量的对象实例\n\
  4.  通过**外部触发事件**使这些对象运转起来\n\n想象一个蚁丘：乍一看，你可能看不到任何明显的活动。但如果你在附近扔下一块糖果，突然之间就会开始一阵忙碌，蚂蚁们会蜂拥而至，收集“好东西”，并修复如果你把糖果扔得***离蚁丘太近***可能造成的任何损坏！\n\
  \n在面向对象应用程序（“蚁丘”）中，对象（“蚂蚁”）可能由外部事件触发而开始运转，例如：\n\n*   点击 SRS 图形用户界面上的一个按钮，表示学生希望注册某门特定课程\n\
  *   从其他自动化系统接收信息，例如当 SRS 从大学的计费系统收到所有已支付学费的学生名单时\n\n一旦面向对象系统注意到此类触发事件，相应的对象就会做出反应，以连锁反应的方式自行执行服务和/或请求其他对象的服务，直到完成应用程序的某个总体目标。例如，学生用户通过\
  \ SRS 应用程序的 GUI 提出的课程注册请求，可能涉及许多不同对象的协作，如图 4-1 所示：\n\n![](img/78624_3_En_4_Fig1_HTML.jpg)\n\
  \n一个 GUI 点击的流程图，包含学生、学位项目、课程、教室和成绩单等相互连接的对象。左上角的文字说明：一个外部事件让对象开始“交谈”。\n\n图 4-1\n\
  \nSRS 对象必须协作才能完成 SRS 的总体任务\n\n*   一个 `Student` 对象（对***真实***学生用户的抽象）\n*   一个 `DegreeProgram`\
  \ 对象，用于确保所请求的课程确实是学生毕业所必需的\n*   相应的 `Course` 对象，用于确保该课程有空位可供该学生注册\n*   一个 `Classroom`\
  \ 对象，代表课程将要上课的教室，用于验证其座位容量\n*   一个 `Transcript` 对象——具体来说，是相关 `Student` 的 `Transcript`——用于确保该学生已满足该课程的所有先修条件\n\
  \n与此同时，SRS 的学生用户对幕后所有为实现目标而“忙碌奔波”的对象一无所知。学生只需填写几个字段并点击 SRS GUI 上的一个按钮，片刻之后就会看到一条消息，确认或拒绝其注册请求。\n\
  \n一旦事件链的最终目标达成（例如，为学生注册一门课程），应用程序的对象就会有效地进入空闲状态，并可能一直保持到下一个此类触发事件发生。面向对象应用程序在某些方面类似于台球游戏：用球杆击打母球，它（希望如此！）会击中另一个球，这个球可能会再撞到另外三个球，依此类推。然而，最终所有球都会静止不动，直到母球再次被击打。\n\
  \n## 声明方法\n\n让我们更详细地讨论如何将对象的行为正式指定为 Java 方法。回顾第 3 章，对象的行为可以被视为该对象能够执行的服务。为了使对象 A\
  \ 请求对象 B 的某项服务，A 需要知道与 B 通信的特定语言。也就是说：\n\n*   ***对象 A 需要明确它究竟希望 B 执行 B 的哪个方法/服务***。把你自己想象成对象\
  \ A，把宠物狗想象成对象 B。你是想让你的狗坐下？别动？随行？还是叼回东西？\n*   ***根据服务请求的不同，对象 A 可能需要向 B 提供一些额外信息，以便\
  \ B 确切知道如何执行***。如果你让狗去叼回东西，狗需要知道***叼回什么***：一个球？一根棍子？邻居家的猫？\n*   ***反过来，对象 B 需要知道对象\
  \ A 是否期望 B 报告其被要求执行任务的结果***。在命令叼回东西的情况下，你的狗有希望会把要求的物品叼回来作为结果。然而，如果你的狗在另一个房间，你喊出“坐下！”的命令，你将看不到命令的结果；你只能相信狗已经按你的要求做了。\n\
  \n我们通过声明一个**方法头**来指定/定义每个方法的这三个方面。然后，我们必须在**方法体**中编写 B 将如何执行所请求服务的幕后逻辑。\n\n对于熟悉\
  \ C 编程语言的读者来说，Java 方法声明在语法上与 C 函数声明几乎相同。像 C 这样的非面向对象语言中的函数与像 Java 这样的面向对象语言中的方法之间唯一的哲学差异在于它们执行的上下文：非面向对象函数由整个编程环境执行，而面向对象语言中的方法则由特定的对象执行。随着本章内容的展开，我们将更详细地探讨这一差异。\n\
  \n我们先来看方法头。\n\n### 方法头\n\n**方法头**是从编程角度对该方法如何被调用的正式规范。一个方法头至少包含：\n\n*   方法的**返回类型**——即当\
  \ B 的方法执行完毕时，将要从对象 B 返回给对象 A 的信息类型（如果有的话）。\n*   方法的名称。\n*   一个可选的、用逗号分隔的**形式参数**列表（指定其类型和名称），这些参数将被传递给方法，并括在圆括号中。如果不需要传递任何参数，则使用一对空圆括号；这样的方法被称为“不接受参数”，我们将它们称为**无参数方法**。\n\
  \n例如，以下是我们可能为 `Student` 类定义的一个典型方法头：\n\n```\nboolean  registerForCourse(String courseID,\
  \ int secNo)\n返回类型  方法名       用逗号分隔的形式参数列表，\n                       括在圆括号中\n   \
  \                    （圆括号可以为空）\n```\n\n在叙述性文本中非正式地提及像 `registerForCourse` 这样的方法时，一些作者会在方法名后附加一对空圆括号\
  \ `()`，例如 `registerForCourse()`。然而，这并不一定意味着***正式***的方法头是无参数的。\n\n\n\n### 方法命名规范\n\
  \nJava 方法名采用***驼峰命名法***；回顾第 2 章可知，变量名也采用驼峰命名法。作为复习，驼峰命名法的规则如下：\n\n*   方法名的首字母小写。\n\
  *   方法名中后续每个拼接单词的首字母大写，其余字母小写。\n*   不使用任何“标点”字符（如破折号、下划线等）来分隔这些单词。\n\n例如，`chooseAdvisor`\
  \ 是一个合适的方法名，而以下名称都不合适：`ChooseAdvisor`（首字母“C”大写）、`chooseadvisor`（字母“a”小写）、`choose_advisor`（使用了分隔下划线）。\n\
  \n### 向方法传递参数\n\n向方法传递参数的目的有两个：\n\n*   为其提供执行任务所需的（可选）“燃料”。\n*   以某种方式引导其行为。\n\n\
  例如，对于前面展示的 `registerForCourse` 方法，有必要告诉执行该方法的特定 `Student` 对象，我们希望它注册哪门课程；为此，我们将传入两个参数：一个课程\
  \ ID（例如“MATH 101”）和一个分节号（例如 `10`，该课程恰好安排在周一晚上 8:00 到 10:00 上课），如下所示：\n\n```\nboolean\
  \ registerForCourse(String courseID, int secNo)\n```\n\n如果我们改用***空***参数列表来声明 `registerForCourse`\
  \ 方法头：\n\n```\nboolean registerForCourse()\n```\n\n那么请求就会变得模糊不清，因为执行此方法的 `Student`\
  \ 对象将不知道它应该注册哪门课程/分节。\n\n然而，并非所有方法都需要这样的“燃料”；有些方法仅能基于对象内部以属性值形式存储的信息来产生结果，在这种情况下，不需要以参数形式提供额外的指导。例如，方法：\n\
  \n```\nint getAge()\n```\n\n被设计为无参数，因为一个 `Student` 对象大概无需提供任何限定信息就能告诉我们它的年龄，也许是通过将其\
  \ `birthDate` 属性的值与系统日期进行比较。不过，假设我们希望 `Student` 对象能够以年或月为单位报告其年龄；在这种情况下，我们可能希望如下声明\
  \ `getAge` 方法：\n\n```\nint getAge(int ageType)\n```\n\n这样我们就可以传入一个 `int`（整数）参数作为控制标志，告知\
  \ `Student` 对象我们希望如何返回答案。也就是说，我们可以这样编写 `getAge` 方法的逻辑：\n\n*   如果我们传入值 1，表示我们希望答案以年为单位返回。\n\
  *   如果我们传入值 2，我们希望答案以月为单位返回（例如，一个 21 岁的学生会回答它 252 个月大）。\n\n处理以两种不同形式获取 `Student`\
  \ 对象年龄这一需求的另一种方法是定义两个独立的方法，例如：\n\n```\nint getAgeInYears()\nint getAgeInMonths()\n\
  ```\n\n但在面向对象编程中，通过参数的值（和类型）来控制方法的行为是一种常见做法。\n\n### 方法返回类型\n\n前面声明的 `registerForCourse`\
  \ 方法显示其返回类型为 `boolean`，这意味着该方法将返回以下两个值之一：\n\n*   值 `true`，表示“任务完成”——即 `Student`\
  \ 对象已成功注册到它被指示注册的课程。\n*   值 `false`，表示注册请求因某种原因被拒绝。可能是所需的分节已满，或者学生不满足该课程的先修条件，或者所请求的课程/分节已被取消等。\n\
  \n    在第 13 章中，当你学习**异常处理**时，你将学到用于沟通并精确确定方法任务***为何***失败的技术。\n\n请注意，方法可以被设计为不返回任何内容——也就是说，它可以静默地执行其任务，无需报告其工作的结果。如果是这样，它会被声明为具有\
  \ `void` 返回类型（Java 的另一个关键字）。例如，考虑 `Student` 方法头：\n\n```\nvoid setName(String newName)\n\
  ```\n\n此方法需要一个参数——一个 `String`，表示我们希望此 `Student` 对象采用的新名称——并通过将 `Student` 对象的内部 `name`\
  \ 属性设置为传入方法的任何值来“静默”执行，不返回任何答案作为响应。\n\n以下是我们可能为 `Student` 类声明的另一个具有 `void` 返回类型的方法头示例：\n\
  \n```\nvoid switchMajor(String newDepartment, Professor newAdvisor)\n```\n\n此方法表示请求\
  \ `Student` 对象更改其主修专业领域，这涉及指定一个新的学术部门（例如“BIOLOGY”）以及一个对 `Professor` 对象的引用，该对象将在此新部门中担任学生的导师。\n\
  \n前面的示例表明，我们可以将参数声明为任何类型，包括用户定义的类型，例如 `Professor`。方法的返回类型也是如此；例如，具有以下方法头的方法：\n\n\
  ```\nProfessor getAdvisor()\n```\n\n可用于询问 `Student` 对象其导师是谁。`Student` 对象不仅仅是返回导师的***姓名***，而是返回对整个\
  \ `Professor` 对象的引用（由 `Student` 的内部 `facultyAdvisor` 属性记录；你将在本章稍后部分学习如何告知 `Student`\
  \ 对象***哪个*** `Professor` 对象将作为其 `facultyAdvisor`）。\n\n请注意，一个方法最多只能返回一个结果，这似乎有些限制。例如，如果我们想向\
  \ `Student` 对象询问该学生修过的***所有*** `Course` 的列表——我们是否必须通过多次方法调用来逐个询问？幸运的是，不必如此。方法返回的结果实际上可以是对任意复杂对象的引用，包括一种称为**集合**的特殊类型对象，它可以包含对***多个***其他对象的引用。我们将在第\
  \ 6 章深入讨论集合。\n\n\n\n### 类比\n\n让我们用一个类比来帮助说明到目前为止关于方法的讨论。以家务活为例，假设一个人能够：\n\n*   倒垃圾\n\
  *   修剪草坪\n*   洗车\n\n用 Java 代码来表达这个概念，我们可能会为 `Person` 类声明三个方法，每个方法对应一项家务（服务）：\n\n\
  *   `takeOutTheTrash`\n*   `mowTheLawn`\n*   `washTheCar`\n\n对于 `takeOutTheTrash`\
  \ 方法，我们不需要以参数的形式提供任何限定细节，也不期望执行此服务（方法）的人向我们反馈，因此我们声明方法头时，返回类型为 `void`，参数列表为空：\n\n\
  ```\nvoid takeOutTheTrash()\n```\n\n对于 `mowTheLawn` 方法，我们希望修剪草坪的人能向我们反馈是否看到了马唐草，但同样，我们不需要以参数的形式提供任何限定细节，因此我们声明方法头时，返回类型为\
  \ `boolean`（其中 `true` 表示看到了马唐草，`false` 表示没有看到），参数列表为空：\n\n```\nboolean mowTheLawn()\n\
  ```\n\n最后，对于 `washTheCar` 方法，我们可能拥有几辆不同的车，因此需要通过传入相关车辆的引用来指定要洗哪辆车。然而，我们不需要从洗车的人那里得到任何形式的回应，因此我们可以设计如下的方法头：\n\
  \n```\nvoid washTheCar(Car c)\n```\n\n我们将在本章后面重新审视这个“家务”类比，并对其进行扩展。\n\n### 方法体\n\
  \n当我们设计和编写类的方法时，仅声明方法头是不够的：我们还必须编写每个方法在被调用时应该如何运行的内部细节。这些内部编程细节，称为**方法体**，被括在方法头之后的花括号\
  \ `{ ... }` 中，如下所示：\n\n```\npublic class Student {\n// 属性。\nString name;\ndouble\
  \ gpa;\n// 此示例中省略了 Student 类的其他属性声明 ...\n// 我们声明一个方法头 ...\nboolean isHonorsStudent()\
  \ {\n// ... 并在花括号内编写此方法要执行的具体细节 ... 这就是方法体。\n// 这里，我们访问了上面在 Student 类中声明为属性的 \"\
  gpa\" 的值。\nif (gpa >= 3.5) {\n// 返回值 \"true\" 表示 \"是，这是优等生\"。\nreturn true;\n}\n\
  else {\n// 返回值 \"false\" 表示 \"否，这不是优等生\"。\nreturn false;\n}\n}\n// Student 类的其他方法声明将紧随其后，例如，\n\
  // getName()、setName()、getGpa()、setGpa() ... 细节已省略。\n}\n```\n\n因此我们可以看到，***方法是一个函数***——一个由***特定对象执行***的函数，但它仍然是一个函数。\n\
  \n### 特性可以按任意顺序声明\n\n请注意，在 Java 类中声明特性的相对顺序并不重要。也就是说，我们可以在方法 B 中引用特性 A，即使特性 A 的声明在类的整体声明中位于方法\
  \ B 的声明***之后***。\n\n例如，在以下简单的类中，我们声明了两个方法 `foo` 和 `bar`，以及一个属性 `x`。`foo` 方法能够调用\
  \ `bar` 方法，尽管 `bar` 的声明在类中位于 `foo` 的声明***之后***：\n\n```\npublic class Simple {\n\
  // 属性。\nint x;\n// 方法。\nvoid foo() {\n// 在 foo 内部调用 bar()。\nbar();\n}\n// bar()\
  \ 在 foo() 之后声明。\nvoid bar() {\nSystem.out.println(x);\n}\n}\n```\n\n在这方面，并非所有语言都生而平等；例如，在\
  \ C++ 中，你只能引用***先前已声明***的特性。因此，如果前面的例子是 C++ 而非 Java，那么从 `foo` 中调用 `bar` 将会产生编译错误。\n\
  \n类似地，属性声明不必先于类的方法声明；因此，将我们的 `Student` 类重写如下也是允许的（尽管不常见）：\n\n```\npublic class Student\
  \ {\n// 这里，我们从方法声明开始 ...\nvoid foo() {\nbar();\n}\nvoid bar() {\n// 尽管属性 'x' 的声明尚未被编译器“看到”，\n\
  // 我们仍然能够引用它。\nSystem.out.println(x);\n}\n// ... 并以属性声明结束。\nint x;\n}\n```\n\n然而，常见的做法是将所有属性声明集中放在类的开头，然后再声明其任何方法。\n\
  \n\n\n### return 语句\n\n`return` 语句是一种跳转语句，用于退出方法：\n\n```\nvoid doSomething() {\n\
  // 伪代码。\n执行此方法所需的任何操作 ...\nreturn;\n}\n```\n\n每当遇到 `return` 语句时，方法将从该行代码处停止执行，并且执行控制权会立即返回到最初调用该方法的代码。\n\
  \n对于返回类型为 `void` 的方法，`return` 关键字单独使用，作为一个完整的语句：\n\n```\nreturn;\n```\n\n然而，事实证明，对于返回类型为\
  \ `void` 的方法，使用 `return;` 语句是***可选的***。如果省略，则会在方法的最后一行隐式地添加一个 `return;` 语句。也就是说，以下两个版本的\
  \ `doSomething` 方法是等价的：\n\n```\nvoid doSomething() {\nint x = 3;\nint y = 4;\nint\
  \ z = x + y;\n}\n```\n\n和\n\n```\nvoid doSomething() {\nint x = 3;\nint y = 4;\n\
  int z = x + y;\nreturn;\n}\n```\n\n另一方面，返回类型为***非***`void` 的方法体***必须***包含至少一个显式的\
  \ `return` 语句。在这种情况下，`return` 关键字后面必须跟一个表达式，该表达式的计算结果必须与该方法声明的返回类型兼容。例如，如果一个方法被定义为返回类型\
  \ `int`，那么以下任何 `return` 语句都是可以接受的：\n\n```\nreturn 0;        // 返回一个常量整数值\nreturn\
  \ x;        // 返回变量 x 的值（假设 x\n                 // 先前已被声明为 int 类型）\nreturn x + y;\
  \    // 返回表达式 \"x + y\" 的值（这里，\n                 // 我们假设 \"x + y\" 的计算结果为 int 值）\n\
  return (int) z;  // 将变量 z 的值（假设 z 被声明为 double 类型）\n                 // 强制转换为 int\
  \ 值\n```\n\n等等。再举一个例子，如果一个方法被定义为返回类型 `boolean`，那么以下任何 `return` 语句都是可以接受的：\n\n```\n\
  return false;        // 返回一个布尔常量值\nreturn outcome;      // 返回变量 outcome 的值\n   \
  \                  // （假设 outcome 先前已被声明为 boolean 类型）\nreturn (x < 3);      // 返回将\
  \ x 的（数值）与 3 比较后得到的布尔值：\n                     // 如果 x 小于 3，此方法返回 true；\n       \
  \              // 否则，返回 false。\n```\n\n一个方法体允许包含多个 `return` 语句。然而，良好的编程实践是，在一个方法中只使用***一个***\
  \ `return` 语句，并且放在方法的最后。让我们再次看看之前讨论过的 `isHonorsStudent` 方法，它有两个 `return` 语句：\n\n\
  ```\nboolean isHonorsStudent() {\nif (gpa >= 3.5) {\nreturn true;   // 第一个 return\
  \ 语句\n}\nelse {\nreturn false;  // 第二个 return 语句\n}\n}\n```\n\n让我们重写这个方法，使用一个局部声明的\
  \ `boolean` 变量 `result` 来捕获最终要返回的 `true`/`false` 答案。我们将在方法的最后通过一个单独的 `return` 语句返回\
  \ `result` 的值：\n\n```\nboolean isHonorsStudent() {\n// 声明一个局部变量来跟踪结果；任意地\n// 将其初始化为\
  \ false。\nboolean result = false;\nif (gpa >= 3.5) {\n// 我们不直接返回 true，而是将值记录在 \"\
  result\" 变量中：\nresult = true;\n}\nelse {\n// 我们不直接返回 false，而是将值记录在 \"result\" 变量中：\n\
  result = false;\n}\n// 现在，我们在方法的末尾有一个单独的 return 语句来返回结果。\nreturn result;\n}\n```\n\
  \n事实证明，由于我们最初将 `false` 赋值给了 `result`，因此在 `else` 子句中显式地将其设置为 `false` 是不必要的；因此，我们可以将\
  \ `isHonorsStudent` 方法简化为如下形式：\n\n```\nboolean isHonorsStudent() {\n// 声明一个局部变量来跟踪结果；任意地\n\
  // 将其初始化为 false。\nboolean result = false;\nif (gpa >= 3.5) {\nresult = true;\n}\n\
  // 注意，我们已经移除了 'else' 子句……如果 \"if\" 测试\n// 失败，变量 \"result\" 已经具有 false 值。\nreturn\
  \ result;\n}\n```\n\n然而，有一种情况被认为是可以接受使用多个 `return` 语句的，那就是当一个方法需要执行一系列操作，并且其中任何一步的失败都意味着整个过程的失败时。这种情况通过伪代码说明如下：\n\
  \n```\n// 伪代码。\nboolean someMethod() {\n// 执行一个测试……如果失败，我们希望中止整个方法。\nif (第一个测试失败)\
  \ {\nreturn false;\n}\n// 如果我们通过了第一个测试，我们会进行一些额外的处理……\n做一些有趣的事情 ...\n// 然后，也许我们执行第二个测试，同样，如果测试失败，\n\
  // 就应立即放弃我们的“任务”。\nif (第二个测试失败) {\nreturn false;\n}\n// 如果我们通过了第二个测试，我们会进行一些额外的处理……\n\
  // 省略细节。\n// 如果我们到达代码中的这一点，我们返回 true 值\n// 以表明我们成功到达终点！\nreturn true;\n}\n```\n\n\
  请注意，Java 编译器会验证通过方法的所有***逻辑路径***是否都返回了类型正确的结果。例如，以下方法将产生编译错误，因为只有当 `if` 测试成功时才能到达正确的\
  \ `return` 语句；如果 `if` 测试失败，则 `return` 语句会被跳过：\n\n```\nboolean xGreaterThanThree(int\
  \ x) {\nif (x <= 3) {\nreturn false;\n}\n}\n```\n\n在这种情况下，具体的编译器错误消息如下：\n\n```\n\
  缺少 return 语句：\nboolean xGreaterThanThree(int x) {\n```\n\n## 方法实现业务规则\n\n方法体包含的逻辑定义了抽象的**业务逻辑**，也称为**业务规则**。例如，在\
  \ `isHonorsStudent` 方法中\n\n```\nboolean isHonorsStudent() {\nboolean result = false;\n\
  if (gpa >= 3.5) {\nresult = true;\n}\nreturn result;\n}\n```\n\n表达了一条用于判断学生是否为优等生的简单业务规则，即：\n\
  \n*如果学生的平均绩点（GPA）达到 3.5 或更高，那么他们就是优等生。*\n\n如果此方法背后的业务规则更复杂——例如，规则如下：\n\n> *学生要被视为优等生，必须满足以下条件：*\n\
  \n1.  > *平均绩点（GPA）达到 3.5 或更高*\n\n2.  > *至少修读了三门课程*\n\n3.  > *在这些课程中，没有一门课的成绩低于“B”*\n\
  \n那么我们的方法逻辑必然会更加复杂：\n\n```\nboolean isHonorsStudent() {\nboolean result = false;\n\
  // 伪代码。\nif ((gpa >= 3.5) &&\n(修读的课程数量 >= 3) &&\n(没有收到低于 B 的成绩)) {\nresult = true;\n\
  }\nreturn result;\n}\n```\n\n从某种意义上说，即使是方法的***头***也表达了一种简单的业务规则/需求形式——在这个特定案例中，即首先存在“优等生”这样的概念。但应用程序业务规则的***细节***则编码在其各个类的方法***体***中。\n\
  \n\n\n## 对象作为方法调用的上下文\n\n正如本章前面简要提到的，面向对象编程语言（OOPL）中的方法与面向过程语言中的函数不同，区别在于：\n\n*\
  \   函数由整个编程环境执行。\n*   方法由特定对象执行。\n\n也就是说，我们可以像下面这样“在真空中”调用一个 C 函数：\n\n```\n// 一个\
  \ C 程序。\nvoid main() {\nsqrt(42.0);  // 调用 sqrt（平方根）函数……\n// 等等。\n}\n```\n\n而在像\
  \ Java 这样的 OOPL 中，我们通常必须通过在执行方法的对象所对应的引用变量名称前加上前缀，后跟一个句点（**点号**）来**限定**方法调用。以下面的\
  \ `registerForCourse` 方法为例：\n\n```\n// 实例化两个 Student 对象。\nStudent x = new Student();\n\
  Student y = new Student();\n// 在 Student 对象 x 上调用 registerForCourse 方法，要求它\n// 注册课程\
  \ MATH 101，第 10 节；Student y 不受影响。\nx.registerForCourse(\"MATH 101\", 10);\n```\n\
  \n我们将 `referenceVariable.methodName(args)` 这种形式的表达式称为**消息**——也就是说，这行代码\n\n```\n\
  x.registerForCourse(\"MATH 101\", 10);\n```\n\n既可以解释为“在对象 `x` 上调用方法”，也可以解释为“向对象\
  \ `x` 发送消息”。无论哪种方式，此类代码都应被视为***请求对象*** `x` ***代表其所属的应用程序执行一个方法作为服务***。\n\n“向对象发送消息”这一术语源于\
  \ Smalltalk 语言，并在泛指 OOPL 时使用。在专门讨论 Java 时，更倾向于使用“在对象上调用方法”这一术语。类似地，对于通用的 OOPL 术语“消息”，Java\
  \ 特有的替代说法是“方法调用”。在本书中，我会在指代这些概念时交替使用通用形式和 Java 特有形式，但倾向于使用通用的“消息”术语。\n\n由于我们使用“点号”将方法调用附加到特定的引用变量上，我们非正式地将\
  \ `referenceVariable.methodName(args)` 这种表示法称为**点号表示法**。\n\n另一种非正式理解 `x.methodName(args)`\
  \ 表示法的方式是，我们正在“**与对象** `x` **对话**”；具体来说，我们正在“与”对象 `x` “对话”，请求它执行一个特定的方法/服务。让我们回到本章前面介绍的家务活类比来说明这一点。\n\
  \n回想一下，一个人能够完成以下家务：\n\n*   倒垃圾\n*   修剪草坪\n*   洗车\n\n以下是将此抽象概念表示为 Java 代码的形式：\n\n\
  ```\npublic class Person {\n// 此代码片段省略了属性……\n// 方法。\nvoid takeOutTheTrash() {  ...\
  \ }\nboolean mowTheLawn() { ... }\nvoid washTheCar(Car c)  { ... }\n}\n```\n\n我们决定让我们的三个十几岁的儿子\
  \ Larry、Moe 和 Curly 每人做这三项家务中的一项。我们该如何要求他们做呢？如果我们只是简单地说：\n\n*   “请洗一下 Camry。”\n\
  *   “请把垃圾倒掉。”\n*   “请修剪一下草坪，如果看到马唐草告诉我一声。”\n\n很可能***没有***一项家务会被完成，因为我们没有指定***某个***儿子来执行这些请求！Larry、Moe\
  \ 和 Curly 很可能都会继续盯着电视看，因为他们中没有人会承认某个请求是专门针对他们的。\n\n另一方面，如果我们改为这样说：\n\n*   “***Larry***，请洗一下\
  \ Camry。”\n*   “***Moe***，请把垃圾倒掉。”\n*   “***Curly***，请修剪一下草坪，如果看到马唐草告诉我一声。”\n\n\
  我们就将每个请求指向了***特定的***儿子；同样，使用 Java 语法，这可以表示如下：\n\n```\n// 我们声明并实例化三个 Person 对象：\n\
  Person larry = new Person();\nPerson moe = new Person();\nPerson curly = new Person();\n\
  // 同时，再实例化一个 Car 对象！\nCar camry = new Car();\n// 我们向每个儿子发送一条消息，指明我们希望他们每个人执行的服务：\n\
  larry.washTheCar(camry);\nmoe.takeOutTheTrash();\nboolean crabgrassFound = curly.mowTheLawn();\n\
  ```\n\n通过将每个方法调用应用于特定的“儿子”（`Person` 对象引用），哪个对象被要求执行哪个服务就变得清晰无误了。\n\n假设 `takeOutTheTrash`\
  \ 是如前所述为 `Person` 类定义的方法，那么以下代码在 Java 中（或者，就此而言，在任何 OOPL 中）都无法编译，因为方法调用是**未限定的**——也就是说，缺少了点号表示法：\n\
  \n```\npublic class BadCode {\npublic static void main(String[] args) {\n// 下一行代码无法编译——\"\
  点号\"在哪里？也就是说，我们在和哪个对象对话？？？\ntakeOutTheTrash();\n}\n}\n```\n\n会报告以下编译错误：\n\n```\n\
  找不到符号\n符号  :    方法 takeOutTheTrash()\n位置:  类 BadCode\n```\n\n然而，在像 C 这样的***非***\
  \ OOPL 中，没有对象或类的概念，因此这类语言中的函数***总是***“在真空中”（即在整个编程环境中）被调用：\n\n```\n// 一个 C 程序。\n\
  void main() {\nsqrt(42.0);\n// 等等。\n}\n```\n\n### 再谈 Java 表达式\n\n当我们在第 2 章讨论 Java\
  \ 表达式时，列表中省略了一种表达式形式——即***消息***——因为我们当时还没有讨论对象。我在此重复了构成 Java 表达式的列表，并将消息表达式添加其中：\n\
  \n*   ***常量***：`7`、`false`\n*   ***字符字面量***：`'A'`、`'&'`\n*   ***字符串字面量***：`\"foo\"\
  `\n*   ***任何声明为到目前为止我们见过的预定义类型之一的变量名***：`myString`、`x`\n*   ***上述任何一项被 Java 一元运算符修改后的形式***：`i++`\n\
  *   ***方法调用（“消息”）***：`z.length()`\n*   ***上述任意两项通过 Java 二元运算符组合后的形式***：`z.length()\
  \ + 2`\n*   ***上述任何简单表达式用括号括起来的形式***：`(z.length() + 2)`\n\n消息表达式的***类型***是该方法返回结果的类型。例如，如果\
  \ `length()` 是一个返回类型为 `int` 的方法，那么表达式 `z.length()` 就是一个 `int` 类型的表达式；如果 `registerForCourse`\
  \ 是一个返回类型为 `boolean` 的方法，那么表达式 `s.registerForCourse(...)` 就是一个 `boolean` 类型的表达式。\n\
  \n\n\n### 捕获方法返回的值\n\n每当我们调用一个返回类型非 `void` 的方法时，我们可以选择忽略或响应该方法返回的值。在之前的示例中，我们将 `Student`\
  \ 类的 `registerForCourse` 方法声明为返回 `boolean` 类型：\n\n```\nboolean registerForCourse(String\
  \ courseID, int secNo)\n```\n\n但在调用该方法时，我们并未关注返回的 `boolean` 值是什么：\n\n```\nx.registerForCourse(\"\
  MATH 101\", 10);\n```\n\n如果我们希望响应非 `void` 方法返回的值，可以选择将该值捕获到声明为适当类型的变量中，如下例所示：\n\n\
  ```\nboolean successfullyRegistered = x.registerForCourse(\"MATH 101\", 10);\nif\
  \ (!successfullyRegistered) { // 或：if (successfullyRegistered == false)\n// 伪代码。\n\
  注册失败时要执行的操作 ...\n}\n```\n\n然而，如果我们只打算在代码中使用一次方法返回的值，那么费心声明一个像 `successfullyRegistered`\
  \ 这样的显式变量来捕获结果就显得多余了。我们可以通过将消息表达式***嵌套***在更复杂的语句中来直接响应结果。例如，我们可以重写前面的代码片段，消除变量 `successfullyRegistered`，如下所示：\n\
  \n```\n// 注册一门课程并响应方法返回的值。\nif (!(x.registerForCourse(\"MATH 101\", 10))) {\n//\
  \ 伪代码。\n注册失败时要执行的操作 ...\n}\n```\n\n由于 `registerForCourse` 方法返回一个 `boolean` 值，消息\
  \ `x.registerForCourse(...)` 是一个 `boolean` 表达式，可以在 `if` 语句的 `if` 子句中使用。此外，我们可以像上例那样对表达式应用\
  \ `!`（“非”）运算符。\n\n在开发面向对象应用程序时，我们经常将方法调用与其他类型的语句结合使用——例如，在向命令窗口打印输出时：\n\n```\nStudent\
  \ s = new Student();\n// 省略细节。\nSystem.out.println(\"名为 \" + s.getName() + \" 的学生\"\
  \ +\n\" 的 GPA 为 \" + s.getGPA());\n```\n\n### 方法签名\n\n我们已经了解到，方法头至少包含方法的返回类型、名称和形式参数列表：\n\
  \n```\nvoid switchMajor(String newDepartment, Professor newAdvisor)\n```\n\n然而，从用于在对象上调用方法的代码角度来看，返回类型和参数名称在检查时并不直接可见：\n\
  \n```\nStudent s = new Student();\nProfessor p = new Professor();\n// 省略细节 ...\n\
  s.chooseMajor(\"MATH\", p);\n```\n\n通过检查最后一行代码，我们可以推断出：\n\n*   `chooseMajor` 是为\
  \ `Student` 类定义的方法的名称；否则，编译器会拒绝这一行。\n\n*   `chooseMajor` 方法声明了两个参数，类型分别为 `String`\
  \ 和 `Professor`，因为我们传入的参数类型正是这些：具体来说，是一个 `String` 字面量和一个对 `Professor` 对象的引用。\n\n\
  然而，我们***无法***通过检查这段代码确定的是：(a) 对应方法头中形式参数的***命名***方式，或 (b) 该方法的***返回类型***声明为什么；它可能是\
  \ `void`，或者该方法可能返回一个非 `void` 的结果，而我们只是选择忽略它。\n\n因此，我们将方法的**签名**定义为方法头中那些通过检查调用方法的代码可以“发现”的方面，即：\n\
  \n*   方法的***名称***\n\n*   方法声明的***参数***的顺序、类型和数量\n\n但***排除***：\n\n*   参数名称\n\n* \
  \  方法的返回类型\n\n此外，我们将引入非正式术语**参数签名**，指方法签名的***子集***，由参数的顺序、类型和数量组成，但排除方法***名称***。\n\
  \n“参数签名”并非行业标准术语，但它仍然很有用。我们将在本书中一直使用它。\n\n以下是一些方法头及其对应方法/参数签名的示例：\n\n*   ***方法头***：`int\
  \ getAge(int ageType)`\n    *   ***方法签名***：`getAge(int)`\n\n    *   ***参数签名***：`(int)`\n\
  \n*   ***方法头***：`void chooseMajor(String newDepartment, Professor newAdvisor)`\n\
  \    *   ***方法签名***：`chooseMajor(String, Professor)`\n\n    *   ***参数签名***：`(String,\
  \ Professor)`\n\n*   ***方法头***：`String getName()`\n    *   ***方法签名***：`getName()`\n\
  \n    *   ***参数签名***：`()`\n\n### 选择描述性的方法名称\n\n为方法分配直观、描述性的名称有助于使应用程序的代码具有自文档性。当与精心设计的变量名称（如下面代码示例中所选的名称）结合使用时，注释（几乎）是多余的：\n\
  \n```\npublic class IntuitiveNames {\npublic static void main(String[] args) {\n\
  Student student;\nProfessor professor;\nCourse course1;\nCourse course2;\nCourse\
  \ course3;\n// 在程序稍后部分 ...\n// 这段代码相当容易理解！\n// 学生选择一位教授作为其导师 ...\nstudent.chooseAdvisor(professor);\n\
  // ... 并注册三门课程中的第一门。\nstudent.registerForCourse(course1);\n// 等等。\n```\n\n现在，将前面的代码与下面“模糊”得多的代码进行对比：\n\
  \n```\npublic class FuzzyNames {\npublic static void main(String[] args) {\nStudent\
  \ s;\nProfessor p;\nCourse c1;\nCourse c2;\nCourse c3;\n// 在程序稍后部分 ...\n// 如果没有注释，接下来的这段代码就不那么直观了。\n\
  s.choose(p);\ns.reg(c1);\n// 等等。\n```\n\n\n\n## 方法重载\n\n**重载**是一种语言机制，允许同一个类中的两个或多个不同方法拥有***相同***的名称，只要它们具有***不同***的参数签名即可。许多非面向对象语言（如\
  \ C）以及面向对象语言（如 Java）都支持重载。\n\n例如，`Student` 类可以合法地定义以下五个不同的 `print` 方法头：\n\n```\n\
  void print(String fileName) { ... // 版本 #1\nvoid print(int detailLevel) { ... //\
  \ 版本 #2\nvoid print(int detailLevel, String fileName) { ... // 版本 #3\nint print(String\
  \ reportTitle, int maxPages) { ... // 版本 #4\nboolean print() { ... // 版本 #5\n```\n\
  \n因此，`print` 方法被称为**重载**。请注意，这五个方法在参数签名上各不相同：\n\n*   第一个方法接受一个 `String` 作为参数。\n\
  *   第二个方法接受一个 `int`。\n*   第三个方法接受两个参数——一个 `int` 后跟一个 `String`。\n*   第四个方法接受两个参数——一个\
  \ `String` 后跟一个 `int`（虽然参数类型与前一个方法头相同，但顺序不同）。\n*   第五个方法不接受任何参数。\n\n因此，这五个方法头都代表了有效且不同的方法，它们可以和谐地共存于\
  \ `Student` 类中，而不会引起编译器的任何报错。\n\n然后，我们可以根据向 `Student` 对象发送的消息形式，选择希望 `Student` 对象执行这五种\
  \ `print` 方法中的哪一种“风味”：\n\n```\nStudent s = new Student();\n// 调用接受单个 String 参数的\
  \ print 版本。\ns.print(\"output.rpt\");\n// 调用接受单个 int 参数的 print 版本。\ns.print(2);\n\
  // 调用接受两个参数（一个 int 后跟一个 String）的版本。\ns.print(2, \"output.rpt\");\n// 等等。\n```\n\n\
  编译器能够根据参数签名，明确地将每次调用匹配到对应的 `print` 方法版本。\n\n这个例子说明了为什么重载方法必须具有唯一的参数签名：如果我们***允许***将以下额外的\
  \ `print` 方法作为 `Student` 的第六个方法引入：\n\n```\nboolean print(int levelOfDetail) { ...\
  \ // 版本 #6\n```\n\n尽管它的参数签名——单个 `int`——与另外五个 `print` 方法之一的参数签名重复：\n\n```\nvoid print(int\
  \ detailLevel) { ... // 版本 #2\n```\n\n那么编译器将无法确定我们试图通过以下代码行调用的是 `print` 方法的哪个版本（#2\
  \ 还是 #6）：\n\n```\ns.print(3);  // 我们想执行哪个版本：#2 还是 #6？求助！！！\n```\n\n因此，为了简化问题，编译器通过阻止类声明具有相同参数签名的同名方法，从一开始就防止了这种歧义的发生。如果我们试图将\
  \ `print` 方法的版本 #6 与其他五个版本一起声明，将会产生如下编译器错误：\n\n```\nprint(int) is already defined\
  \ in Student\nboolean print(int levelOfDetail) {\n^\n```\n\n方法重载的能力使我们能够创建一整套名称相似、执行基本相同任务的方法。回想一下第\
  \ 2 章，我们讨论了用于在命令窗口显示打印输出的 `System.out.println` 方法。事实证明，`System.out.println` 方法不止一个，而是有***许多***个版本；每个重载版本接受不同的参数类型（`println(int)`、`println(String)`、`println(double)`\
  \ 等）。使用重载的 `System.out.println` 方法比使用名为 `printlnString`、`printlnInt`、`printlnDouble`\
  \ 等单独的方法要简单和整洁得多。\n\n请注意，不存在所谓的***属性***重载；也就是说，如果一个类试图声明两个同名的属性：\n\n```\npublic\
  \ class Student {\nprivate String studentId;\nprivate int studentId;\n// 等等。\n```\n\
  \n编译器将在第二个声明处生成一条错误消息：\n\n```\nstudentId is already defined in Student\n```\n\n\n\
  \n## 对象间的消息传递\n\n现在让我们看一个涉及两个对象的消息传递示例。假设我们定义了两个类——`Student`和`Course`——并且为每个类定义了以下方法。\n\
  \n*   对于`Student`类：\n\n```\n    boolean successfullyCompleted(Course c)\n    ```\n\
  \n给定一个指向特定`Course`对象的引用`c`，我们要求接收此消息的`Student`对象确认该学生确实已修读相关课程并获得了及格成绩。\n\n*   对于`Course`类：\n\
  \n```\n    boolean register(Student s)\n    ```\n\n给定一个指向特定`Student`对象的引用`s`，我们要求接收此消息的`Course`对象执行注册该学生所需的任何操作。在这种情况下，我们期望`Course`最终返回`true`或`false`，以指示注册请求的成功或失败。\n\
  \n图 4-2 展示了一个`Course`对象`c`与`Student`对象`s`之间可能的消息交换过程；图中每个编号步骤都在后续文本中进行了说明。实线箭头表示正在传递的消息/正在调用的方法；虚线箭头表示从方法返回的值。\n\
  \n![](img/78624_3_En_4_Fig2_HTML.jpg)\n\n一个框图，展示了课程对象 c 与学生对象 s 之间通过命令 c 点 register\
  \ 和 s 点 successfullyCompleted 进行消息传递的循环，并返回反馈为 true。\n\n图 4-2\n\n`Student`与`Course`对象之间的消息传递\n\
  \n（在阅读步骤 1`–`4 时，请参考图 4-2。）\n\n1.  一个`Course`对象`c`接收到消息\n\n```\n    c.register(s);\n\
  \    ```\n\n其中`s`代表一个特定的`Student`对象。（目前，我们不必担心此消息的来源；它很可能是由用户与 SRS 图形界面的交互触发的。我们将在本章稍后的“对象作为客户端和供应方”一节中看到所有这些消息是如何发出的完整代码上下文。）\n\
  \n2.  为了让`Course`对象`c`正式确定是否应允许`s`注册，`c`向`Student s`发送消息\n\n```\n    s.successfullyCompleted(c2);\n\
  \    ```\n\n其中`c2`代表对另一个***不同***`Course`对象的引用，该对象恰好是`Course c`的先修课程。（不必担心`Course\
  \ c`如何知道`c2`是其先修课程之一；这涉及与`c`的内部`prerequisites`属性交互，我们尚未讨论该属性。另外，`Course c2`未在图 4-2\
  \ 中描绘，因为严格来说，`c2`并未参与对象`c`和`s`之间的这场“讨论”。`c2`是被***谈论***的对象，但本身并未进行任何对话！）\n\n3.  `Student`对象`s`向`c`回复值`true`，表示`s`已成功完成先修课程。（我们暂时忽略`s`如何确定这一点的细节；这涉及与`s`的内部`transcript`属性交互，我们尚未介绍其结构。）\n\
  \n4.  确信该学生已满足课程的先修要求后，`Course`对象`c`完成注册学生的工作（内部细节暂时省略），并通过向服务请求的发起者响应值`true`来确认注册。\n\
  \n这个例子过于简单；实际上，`Course c`可能还需要与许多其他对象进行通信：\n\n*   一个`Classroom`对象（课程所在的教室，以确保有足够空间容纳另一名学生）\n\
  *   一个`DegreeProgram`对象（学生所追求的学位，以确保所请求的课程确实是该学生攻读学位所需的）\n*   等等——在发送`true`响应以指示注册`Student\
  \ s`的请求已完成之前\n\n我们将在本章稍后看到这个消息交换的一个稍微复杂的版本。\n\n## 委托\n\n如果向对象 A 发出请求，并且在完成该请求的过程中，A\
  \ 又向另一个对象 B 请求协助，这被称为 A 对 B 的**委托**。对象之间的委托概念与现实世界中人与人之间的委托完全相同：如果你的“另一半”让你在他们外出办事时修剪草坪，而你转而雇佣邻居家的青少年修剪草坪，那么，就你的伴侣而言，草坪已经修剪好了。你将活动委托给他人这一事实（希望是）无关紧要！\n\
  \n对象之间发生委托的事实通常对消息的发起者也是透明的。在我们之前的消息传递示例中，当`Course c`要求`s`验证是否已修读先修课程时，`c`将注册`Student\
  \ s`的部分工作***委托回***了`s`。然而，从注册请求的发起者——`c.register(s);`——的角度来看，这似乎是一个简单的交互：即，请求者要求\
  \ c 注册一名学生，而 c 确实做到了！c 为完成此操作所需的所有幕后细节对请求者都是隐藏的（见图 4-3）。\n\n![](img/78624_3_En_4_Fig3_HTML.jpg)\n\
  \n一个框图，一只眼睛通过命令 c 点 register 连接到课程对象 c，并返回反馈为 true。\n\n图 4-3\n\n请求者仅看到消息交换的外部细节\n\
  \n\n\n## 获取对象的句柄\n\n对象 A 能够向对象 B 传递消息的唯一方式是 A 拥有对 B 的引用/句柄。这可以通过几种不同的方式实现。\n\n*\
  \   ***对象 A 可能将指向 B 的引用作为其自身的一个属性来维护***。例如，下面是第 3 章中的一个例子，一个 `Student` 对象拥有一个 `Professor`\
  \ 引用作为其属性：\n\n```\n    public class Student {\n    // 属性。\n    String name;\n  \
  \  Professor facultyAdvisor;\n    // 等等。\n    ```\n\n（同样，本章稍后你将学习如何告知一个 `Student`\
  \ 对象***哪个*** `Professor` 对象将作为其 `facultyAdvisor`。）\n\n打个比方，这就像一个人 A 将另一个人 B 的电话号码“永久”记录在他的通讯录中，这样每当\
  \ A 需要与 B 联系时，他就可以查找并拨打 B 的电话。\n\n*   ***对象 A 可能通过其某个方法的参数获得指向 B 的引用***。这就是在前面的消息传递示例中，当调用\
  \ `c` 的 `register` 方法时，`Course` 对象 `c` 如何获得对 `Student` 对象 `s` 的访问权限：\n\n```\n  \
  \  c.register(s);\n    ```\n\n这类似于一个人 A 拿到一张写有另一个人 B 电话号码的纸条，这样 A 就可以给 B 打电话。\n\n\
  *   ***指向对象 B 的引用可能被设为“全局可用”***，使得所有其他对象都能访问它。我们将在本书后面讨论实现此目的的技术，并在构建 SRS 时使用这些技术。\n\
  \n这相当于在广告牌上公布 B 的电话号码，让***任何人***都可以打电话！\n\n*   ***对象 A 可能必须通过调用某个第三方对象 C 上的方法来显式请求指向\
  \ B 的句柄/引用***。由于这可能是 A 获取 B 句柄最复杂的方式，我们将用一个例子来说明。\n\n这类似于一个人 A 必须打电话给另一个人 C，向 C\
  \ 索要 B 的电话号码。\n\n回到几页前 `Course` 对象 `c` 和 `Student` 对象 `s` 之间的交互示例，让我们让这个交互稍微复杂一点：\n\
  \n*   首先，我们引入第三个对象：一个 `Transcript` 对象 `t`，它代表 `Student` 对象 `s` 所修所有课程的记录。\n\n* \
  \  此外，我们假设 `Student s` 将指向 `Transcript t` 的句柄作为 `s` 的一个属性（具体来说是 `transcript` 属性）来维护，并且反过来，`Transcript\
  \ t` 将指向其“所有者” `Student s` 的句柄作为 `t` 的一个属性来维护：\n\n```\n    public class Student\
  \ {\n    // 属性。\n    Transcript transcript;\n    // 等等。\n    }\n    public class\
  \ Transcript {\n    // 属性。\n    Student owner;\n    // 等等。\n    }\n    ```\n\n图\
  \ 4-4 反映了 `Course c`、`Student s` 和 `Transcript t` 之间更复杂的消息交换；图中每个带编号的步骤都在随后的文本中进行了说明。同样，实线箭头表示正在传递的消息/正在调用的方法；虚线箭头表示从方法返回的值。\n\
  \n![](img/78624_3_En_4_Fig4_HTML.jpg)\n\n一个框图，显示了课程对象 c、学生对象 s 和成绩单对象 t 之间通过命令 c.register、s.getTranscript\
  \ 和 t.successfulCompletion 进行消息传递的循环。它返回反馈为 true，并带有对成绩单 t 的引用。\n\n图 4-4\n\n一个涉及三个对象的更复杂的消息传递示例\n\
  \n（在阅读步骤 1`–`6 时，请参考图 4-4。）\n\n1.  在这个增强的对象交互中，第一步与之前描述的完全相同：即，一个 `Course` 对象 `c`\
  \ 接收到消息\n\n```\n    c.register(s);\n    ```\n\n其中 `s` 代表一个 `Student` 对象。\n\n2. \
  \ 现在，`Course c` 不再像之前那样向 `Student s` 发送消息 `s.successfullyCompleted(c2)`（其中 `c2`\
  \ 代表一门先修课程 `Course`），而是向该 `Student` 发送消息\n\n```\n    s.getTranscript();\n    ```\n\
  \n因为 `c` 想直接检查 `s` 的成绩单。这条消息对应于 `Student` 类上的一个方法，其方法头声明如下：\n\n```\n    Transcript\
  \ getTranscript()\n    ```\n\n请注意，此方法被定义为返回一个 `Transcript` 对象引用——具体来说，就是指向属于该学生的\
  \ `Transcript` 对象的句柄。\n\n3.  由于 `Student s` 将指向其 `Transcript` 对象的句柄作为一个属性来维护，因此\
  \ `s` 可以轻松地通过将指向 `t` 的句柄传回给 `Course` 对象 `c` 来响应此消息。\n\n4.  现在 `Course c` 拥有了它***自己***指向\
  \ `Transcript t` 的临时句柄，对象 `c` 可以直接与 `t` 对话。对象 `c` 接着向 `t` 询问 `t` 是否有任何记录表明 `Student\
  \ s` 已成功完成 `c` 的先修课程 `c2`，它通过传递消息\n\n```\n    t.successfulCompletion(c2);\n    ```\n\
  \n来实现。这意味着为 `Transcript` 类定义了一个方法，其方法头为\n\n```\n    boolean successfulCompletion(Course\
  \ c)\n    ```\n\n5.  `Transcript` 对象 `t` 向 `Course c` 响应值 `true`，表明 `Student s`\
  \ 确实已成功完成所讨论的先修课程。（请注意，`Student s` 并不知道 `c` 正在与 `t` 通信；`s` 只知道 `c` 在之前的一条消息中要求它返回一个指向\
  \ `t` 的句柄，但 `s` 并不了解 `c` 为何要这个句柄。）\n\n这与现实世界中的情况并无不同，即一个人 A 向另一个人 C 索要 B 的电话号码，却没有告诉\
  \ C ***为什么***他们想给 B 打电话。\n\n6.  在确认 `Student s` 已满足其先修课程要求后，`Course` 对象 `c` 完成注册该学生的工作（此处省略内部细节），并通过向步骤\
  \ 1 中最初发起注册请求的发起者响应一个值 `true` 来确认注册。既然 `c` 已完成此事务，它便丢弃其（临时的）指向 `t` 的句柄。\n\n请注意，从最初向\
  \ `Course c` 发送消息\n\n```\nc.register(s);\n```\n\n的发起者的角度来看，这个更复杂的交互看起来与之前更简单的交互***完全相同***，如图\
  \ 4-5 所示。原始消息的发送者只知道 `Course c` 最终对该请求响应了一个值 `true`。\n\n![](img/78624_3_En_4_Fig5_HTML.jpg)\n\
  \n一个框图，显示一个眼睛通过命令 c.register 连接到课程对象 c，该命令返回反馈为 true。\n\n图 4-5\n\n从请求者的角度来看，这个更复杂交互的外部细节看起来完全相同\n\
  \n\n\n## 对象作为客户端与供应方\n\n在之前 `Course` 对象与 `Student` 对象之间传递消息的例子中，我们可以将 `Course` 对象\
  \ `c` 视为 `Student` 对象 `s` 的**客户端**，因为 `c` 请求 `s` 执行其方法之一——即 `getTranscript`——作为对\
  \ `c` 的一项***服务***。这与现实世界中***你***作为客户，请求会计师、律师或建筑师提供服务的概念完全相同。类似地，当 `c` 请求 `t` 执行其\
  \ `successfulCompletion` 方法时，`c` 也是 `Transcript t` 的客户端。因此，我们将调用对象 X 上方法的代码称为相对于\
  \ X 的**客户端代码**，因为此类代码受益于 X 提供的服务。\n\n让我们看几个与几页前涉及 `Course`、`Student` 和 `Transcript`\
  \ 对象的消息传递示例相对应的客户端代码示例。第一个代码示例取自应用程序的 `main` 方法，它实例化了两个对象——`Course c` 和 `Student\
  \ s`——并调用了其中一个对象的方法，使它们开始“对话”：\n\n```\npublic class MyApp {\npublic static void\
  \ main(String[] args) {\nCourse c = new Course();\nStudent s = new Student();\n\
  // 细节省略...\n// 调用 Course 对象 c 上的方法。\n// （这在前面的图中标记为消息 (1)；该图中标记为 (6) 的返回值\n// 被捕获到布尔变量\
  \ \"success\" 中。）\nboolean success = c.register(s);\n// 等等。\n}\n}\n```\n\n在此示例中，`main`\
  \ 方法体被视为相对于 `Course` 对象 `c` 的***客户端代码***，因为 `main` 方法请求 `c` 执行其 `register` 方法作为一项服务。\n\
  \n现在让我们看看在 `Course` 类内部实现 `register` 方法体的代码：\n\n```\npublic class Course {\n// 属性细节省略...\n\
  public boolean register(Student s) {\nboolean outcome = false;\n// 获取 Student s\
  \ 的 Transcript 对象的句柄。\n// （这在前面的图中标记为消息 (2)。）\nTranscript t = s.getTranscript();\n\
  // （此方法的返回值在前面的图中标记为 (3)。）\n// 现在，请求该 Transcript 对象提供服务。\n// （假设 c2 是某个先修课程 Course\
  \ 的句柄...）\n// （这在前面的图中标记为消息 (4)。）\nif (t.successfulCompletion(c2)) {\n// （下一个返回值在前面的图中标记为\
  \ (5)。）\noutcome = true;\n}\nelse {\noutcome = false;\n}\nreturn outcome;\n}\n//\
  \ 等等。\n```\n\n我们看到，`Course` 类的 `register` 方法体被视为相对于 `Student` 对象 `s` **和** `Transcript`\
  \ 对象 `t` 的***客户端代码***，因为这段代码请求 `s` 和 `t` 各自执行一项服务：`s.getTranscript()` 和 `t.successfulCompletion(c2)`。\n\
  \n每当对象 A 是对象 B 的客户端时，对象 B 反过来可以被视为 A 的**供应方**。请注意，两个对象之间的客户端和供应方角色并非绝对；这些角色仅在特定消息传递事件期间有效。如果我请你把面包递给我，我是你的客户端，你是我的供应方；如果片刻之后你请我把黄油递给你，那么你是我的客户端，我是你的供应方。\n\
  \n关于对象作为客户端和供应方的概念，在 Bertrand Meyer 所著的 *Object-Oriented Software Construction*（Prentice\
  \ Hall，2000 年）中有进一步讨论。\n\n## 信息隐藏/可访问性\n\n正如我们一直使用点符号向对象发送消息一样，我们也可以使用点符号来引用对象的属性。例如，如果我们声明一个引用变量\
  \ `x` 的类型为 `Student`，我们可以从客户端代码中通过以下符号引用 `Student x` 的任何属性：\n\n```\nx.attribute_name\n\
  ```\n\n其中点用于限定所关注***属性***的名称，该名称属于表示该对象的引用变量：`x.name`、`x.gpa` 等。\n\n以下是一些额外的示例：\n\
  \n```\n// 实例化两个对象。\nStudent x = new Student();\nStudent y = new Student();\n// 使用点符号将属性作为变量访问。\n\
  // 分配学生 x 的姓名...\nx.name = \"John Smith\";\n// ...以及学生 y 的姓名。\ny.name = \"Joe Blow\"\
  ;\n// 比较两个学生的年龄。\nif (x.age == y.age) { ... }\n```\n\n然而，仅仅因为我们***可以***以这种方式访问属性，并不意味着我们***应该***这样做。我们有很多理由希望***限制***对对象数据的访问，以便让对象完全控制其数据何时以及如何被修改，并且有多种机制可以让我们借助\
  \ Java 编译器来强制执行此类限制。\n\n在实践中，对象通常会限制对其某些特性（属性或方法）的访问。这种限制被称为**信息隐藏**。在一个设计良好的面向对象应用程序中，一个类通常会公开其对象***能做什么***——即对象能够提供的服务，通过类的方法头声明——但***隐藏***其内部细节，包括它们***如何***执行这些服务以及为了***支持***这些服务而在内部维护的数据（属性）。\n\
  \n打个比方，想想干洗店的黄页广告。这样的广告会宣传干洗店提供的服务——即他们***能为你做什么***：“我们清洗正装”、“我们专长清洗地毯”等等。然而，广告通常***不会***透露他们***如何***进行清洗的细节——例如，他们使用哪些特定的化学品或设备——因为你，潜在客户，无需知道这些细节就能判断某家干洗店是否能提供你所需的服务。\n\
  \n我们使用术语**可访问性**来指代对象的某个特定特性是否可以在声明它的类之外被访问——即是否可以通过点符号从客户端代码访问。特性的可访问性是通过在其声明开头放置一个**访问修饰符**关键字来确定的：\n\
  \n```\npublic class MyClass {\n// 属性。\naccess-modifier int x;\n// 等等。\n// 方法。\n\
  access-modifier void foo() { ... }\n// 等等。\n}\n```\n\nJava 定义了多种不同的访问修饰符。让我们探讨使用两个主要访问修饰符\
  \ `private` 和 `public` 的含义。\n\n还有第三个访问修饰符 `protected`，以及默认的 `package` 级别访问权限，我们将在本书后面再讨论。\n\
  \n\n\n### 公共可访问性\n\n当一个特性被声明为具有**公共可访问性**时，客户端代码可以通过点符号自由访问它。例如，如果我们在声明中将关键字 `public`\
  \ 放在 `Student` 类的 `name` 属性的类型之前，从而将其声明为公共可访问的：\n\n```\npublic class Student {\n\
  public String name;\n// 等等\n}\n```\n\n我们就授予了客户端代码通过点符号直接访问 `Student` 对象的 `name`\
  \ 属性的权限；也就是说，编写如下客户端代码是完全可接受的：\n\n```\npublic class MyProgram {\npublic static void\
  \ main(String[] args) {\nStudent x = new Student();\n// 因为 name 是 Student 类的公共属性，我们可以通过点符号从客户端代码访问它。\n\
  x.name = \"Fred Schnurd\";  // 为 x 的 name 属性赋值\n// 或者：\nSystem.out.println(x.name);\
  \  // 获取 x 的 name 属性的值\n// 等等\n}\n}\n```\n\n类似地，如果我们将 `Student` 的 `isHonorsStudent`\
  \ 方法声明为具有公共可访问性，我们通过在方法头声明开头添加关键字 `public` 来实现：\n\n```\npublic class Student {\n\
  // 此示例省略了属性细节。\n// 方法。\npublic boolean isHonorsStudent() { ... }\n// 等等\n}\n```\n\
  \n我们就授予了客户端代码通过点符号在 `Student` 对象上调用 `isHonorsStudent` 方法的权限；也就是说，编写如下客户端代码是完全可接受的：\n\
  \n```\npublic class MyProgram {\npublic static void main(String[] args) {\nStudent\
  \ x = new Student();\n// 因为 isHonorsStudent 是一个公共方法，我们可以通过点符号从客户端代码访问它。\nif (x.isHonorsStudent())\
  \ { ... }\n// 等等\n}\n```\n\n### 私有可访问性\n\n另一方面，当一个特性被声明为具有**私有可访问性**时，它***不能***在声明它的类外部被访问——也就是说，我们***不能***使用点符号从客户端代码访问此类特性。例如，如果我们将\
  \ `Student` 类的 `ssn` 属性声明为具有 `private` 可访问性：\n\n```\npublic class Student {\npublic\
  \ String name;\nprivate String ssn;\n// 等等\n}\n```\n\n那么我们将不允许从客户端代码通过点符号直接访问 `ssn`。在以下代码示例中，**加粗**的那一行会出现编译器错误：\n\
  \n```\npublic class MyProgram {\npublic static void main(String[] args) {\nStudent\
  \ x = new Student();\n// 客户端代码不允许！ssn 是 Student 类的私有属性，因此这无法编译。\nx.ssn = \"123-45-6789\"\
  ;\n// 等等\n}\n```\n\n产生的错误信息将是：\n\n```\nssn has private access in Student\n```\n\n\
  对于声明为 `private` 的***方法***也是如此——也就是说，此类方法不能从客户端代码调用。例如，如果我们将 `Student` 的 `printInfo`\
  \ 方法声明为 `private`：\n\n```\npublic class Student {\n// 此示例省略了属性细节。\n// 方法。\npublic\
  \ boolean isHonorsStudent() { ... }\nprivate void printInfo() { ... }\n// 等等\n}\n\
  ```\n\n那么就不可能从客户端代码中在 `Student` 对象上调用 `printInfo` 方法。在以下代码片段中，**加粗**的那一行会出现编译器错误：\n\
  \n```\npublic class MyProgram {\npublic static void main(String[] args) {\nStudent\
  \ x = new Student();\n// 因为 printInfo() 是一个私有方法，我们不能通过点符号从客户端代码访问它；这无法编译：\nx.printInfo();\n\
  // 等等\n}\n```\n\n产生的错误信息将是：\n\n```\nprintInfo() has private access in Student\n\
  ```\n\n### 公开服务\n\n事实证明，类的方法通常被声明为 `public`，因为对象（类）需要公开其服务（就像黄页广告的类比一样），以便客户端代码可以请求这些服务。相比之下，大多数属性通常被声明为\
  \ `private`（并且实际上是“隐藏的”），以便对象可以对其数据保持最终控制。我们将在本章后面看到几个关于对象如何做到这一点的详细示例。\n\n尽管没有明确声明，但实现每个方法的内部代码（即方法体）在某种意义上也是***隐式***私有的。当客户端对象\
  \ A 请求另一个对象 B 执行其某个方法时，A 不需要知道 B ***如何***执行其操作的幕后细节；对象 A 只需要相信对象 B 会执行“广告中宣传的”服务。这在图\
  \ 4-6 中概念性地进行了描绘，其中类/对象中被视为私有的那些方面被描绘成被一堵不可穿透的砖墙与客户端代码隔离开来。\n\n![](img/78624_3_En_4_Fig6_HTML.jpg)\n\
  \n一个方框说明了公共信息和私有信息之间的区别。公共信息可以访问诸如课程的注册和退课信息等声明的细节。而私有信息则包含姓名、社会安全号码和地址等内部细节，这些细节被一堵墙有效地保护起来。\n\
  \n图 4-6\n\n公共可见性与私有可见性\n\n### 方法头，再探\n\n让我们修改本章前面关于方法头的定义。一个方法头实际上由以下部分组成：\n\n*\
  \   ***方法的访问修饰符***\n*   方法的返回类型——即方法执行完毕后，对象 B 将要传回给对象 A 的信息的数据类型（如果有的话）\n*   方法的名称\n\
  *   一个可选的、用逗号分隔的形式参数列表（指定其类型和名称），这些参数将被传递给方法，并括在圆括号中\n\n例如，下面是一个我们可能为 `Student`\
  \ 类定义的典型方法头，其中包含了访问修饰符：\n\n```\npublic     boolean    registerForCourse (String\
  \ courseID, int secNo)\n访问        返回类型      方法名称        用逗号分隔的形式参数列表，\n修饰符     \
  \                              括在圆括号中\n                                        \
  \ （圆括号可以为空）\n```\n\n\n\n### 从类自身方法内部访问类的特性\n\n请注意，我们可以从某个类的**任何**自身方法体**内部**访问该类的所有特性，***无论其可访问性如何***；也就是说，`public`/`private`\
  \ 修饰符仅影响从**类外部**（即**从客户端代码**）访问某个特性。\n\n让我们通过以下示例来了解如何从类的一个方法内部访问另一个特性：\n\n```\n\
  public class Student {\n// 几个私有属性。\nprivate String name;\nprivate String ssn;\n\
  private double totalLoans;\nprivate double tuitionOwed;\n// 所有这些属性都会提供 get/set 方法；\n\
  // 细节省略……\npublic void printStudentInfo() {\n// 访问 Student 类的属性。\nSystem.out.println(\"\
  Name:  \" + name);\nSystem.out.println(\"Student ID:  \" + ssn);\n// 等等。\n}\npublic\
  \ boolean allBillsPaid() {\nboolean answer = false;\n// 访问 Student 类的另一个方法。\ndouble\
  \ amt = moneyOwed();\nif (amt == 0.0) {\nanswer = true;\n}\nelse {\nanswer = false;\n\
  }\nreturn answer;\n}\nprivate double moneyOwed() {\n// 访问 Student 类的属性。\nreturn\
  \ totalLoans + tuitionOwed;\n}\n}\n```\n\n我们首先注意到，从 `Student` 方法**内部**访问 `Student`\
  \ 类的任何特性时，无需使用点号表示法。编译器会自动理解，当使用**简单名称**（即不带点号前缀的名称，也称为**非限定名称**）时，类正在访问自身的某个特性，例如：\n\
  \n```\npublic void printStudentInfo() {\n// 这里，我们访问 \"name\" 属性时没有使用点号表示法。\nSystem.out.println(\"\
  Name:  \" + name);\n// 等等。\n}\n```\n\n以及\n\n```\npublic boolean allBillsPaid() {\n\
  boolean answer = false;\n// 这里，我们访问 \"moneyOwed\" 方法时没有使用点号表示法。\ndouble amt = moneyOwed();\n\
  // 等等。\n}\n```\n\n话虽如此，Java 关键字 `this` 可以在类的任何方法中以点号表示法形式使用——`this.featureName`——以强调我们正在访问**同一个类**的另一个特性。我将之前的\
  \ `Student` 示例重写，以利用 `this` 关键字：\n\n```\npublic class Student {\n// 几个私有属性。\nprivate\
  \ String name;\nprivate String ssn;\nprivate double totalLoans;\nprivate double\
  \ tuitionOwed;\n// 所有这些属性都会提供 get/set 方法；\n// 细节省略……\npublic void printStudentInfo()\
  \ {\n// 我们添加了前缀 \"this.\"。\nSystem.out.println(\"Name:  \" + this.name);\nSystem.out.println(\"\
  Student ID:  \" + this.ssn);\n// 等等。\n}\npublic boolean allBillsPaid() {\nboolean\
  \ answer = false;\n// 我们添加了前缀 \"this.\"。\ndouble amt = this.moneyOwed();\nif (amt\
  \ == 0.0) {\nanswer = true;\n}\nelse {\nanswer = false;\n}\nreturn answer;\n}\n\
  private double moneyOwed() {\n// 我们添加了前缀 \"this.\"。\nreturn this.totalLoans + this.tuitionOwed;\n\
  }\n}\n```\n\n两种方式——在内部特性引用前加上 `this.` 前缀或省略此类限定前缀——都是可以接受的；常见做法是除非必要（例如消除方法参数与同名属性之间的歧义），否则不使用\
  \ `this.` 前缀。也就是说，允许声明与属性同名的参数，如下代码所示：\n\n```\npublic class Student {\nprivate String\
  \ major;\n// 其他属性省略。\n// 注意，我们在以下方法中使用了 \"major\" 作为参数名\n// ——这与上面 \"major\" 属性的名称重复。不过这是可以的，\n\
  // 只要我们在下面的方法体中使用 \"this.\" 来区分两者。\npublic void updateMajor(String major) {\n//\
  \ 在下一行代码中，赋值语句左侧的 \"this.major\"\n// 指的是名为 \"major\" 的**属性**，而赋值语句右侧的 \"major\"\n\
  // 指的是名为 \"major\" 的**参数**。\nthis.major = major;\n}\n// 等等。\n}\n```\n\n当然，我们可以通过为方法参数选择另一个名称来避免使用\
  \ `this.` 前缀：\n\n```\npublic class Student {\nprivate String major;\n// 其他属性省略。\n\
  public void updateMajor(String m) {\n// 没有歧义！\nmajor = m;\n}\n// 等等。\n}\n```\n\n\
  重要的是要避免**意外地**给参数/局部变量起与属性同名的名称，因为这可能导致难以诊断的错误。例如，在下面的 `Student` 类中，同时存在一个名为 `major`\
  \ 的**属性**和一个**局部变量**。请参考代码示例中的注释，了解为什么这会产生问题：\n\n```\npublic class Student {\n//\
  \ 属性。\nprivate String major;\npublic void updateMajor() {\n// 我们无意中声明了一个局部变量 \"\
  major\"，其名称\n// 与该类的属性相同。这是个**坏主意**！\n// 注意，这段代码会**编译通过，不会报错**……\nString major =\
  \ null;\n// 在方法后面：\n// 我们**以为**下面是在更新**属性** \"major\" 的值，\n// 但实际上更新的是**局部变量** \"\
  major\"，\n// 该方法一结束，该变量就会超出作用域；\n// 与此同时，**属性** \"major\" 的值保持不变！\nmajor = major.toUppercase();\n\
  // 等等。\n}\n}\n```\n\n我们将在本书后面看到 `this` 关键字的其他用途，涉及代码重用和对象自引用。\n\n## 从客户端代码访问私有特性\n\
  \n如果私有特性无法在对象自身方法之外访问，客户端代码如何操作它们呢？当然是通过**公有**特性！\n\n良好的面向对象编程实践要求提供公有的**访问器方法**，通过它们，对象的客户端可以有效地操作选定的私有属性，以读取或修改其值。这是为什么呢？***这样我们就能让对象在判断客户端代码对其属性的操作是否有效时拥有“最终决定权”***。也就是说，我们希望对象参与判断其类定义的任何业务规则是否被违反。在查看具体示例说明***为什么***这如此重要之前，我们先讨论一下***如何***声明访问器方法的机制。\n\
  \n\n\n### 声明访问器方法\n\n以下代码摘自 `Student` 类，展示了我们为读取/写入 `Student` 类中两个名为 `name` 和 `facultyAdvisor`\
  \ 的 `private` 属性而编写的常规访问器方法——非正式地称为 **“get”** 和 **“set” 方法**：\n\n```\npublic class\
  \ Student {\n// 属性通常声明为 private。\nprivate String name;\nprivate Professor facultyAdvisor;\n\
  // 本例中省略了其他属性 ...\n// 提供公共访问器方法，用于从客户端代码读取/修改\n// private 属性。\n// 客户端代码将使用此方法读取（\"\
  get\"）特定 Student 对象的\n// \"name\" 属性的值。\npublic String getName() {\nreturn name;\n\
  }\n// 客户端代码将使用此方法修改（\"set\"）特定 Student 对象的\n// \"name\" 属性的值。\npublic void setName(String\
  \ newName) {\nname = newName;\n}\n// 客户端代码将使用此方法读取（\"get\"）特定 Student 对象的\n// facultyAdvisor\
  \ 属性的值。\npublic Professor getFacultyAdvisor() {\nreturn facultyAdvisor;\n}\n// 客户端代码将使用此方法修改（\"\
  set\"）特定 Student 对象的\n// facultyAdvisor 属性的值。\npublic void setFacultyAdvisor(Professor\
  \ p) {\nfacultyAdvisor = p;\n}\n// 等等。\n}\n```\n\n“get” 和 “set” 的命名法是从 ***客户端代码***\
  \ 的角度出发的：将 “set” 方法视为 ***客户端代码*** 将值 ***存入*** 对象属性的方式（参见图 4-7）…\n\n![](img/78624_3_En_4_Fig7_HTML.png)\n\
  \n一个砖墙形状的框图，对象名为 fred，带有一个指向内部的箭头 set。\n\n图 4-7\n\n“set” 方法用于将数据传递 **到** 对象内部\n\n\
  … 而 “get” 方法则是 ***客户端代码*** 从对象 ***获取*** 属性值的方式（参见图 4-8）。\n\n![](img/78624_3_En_4_Fig8_HTML.png)\n\
  \n一个砖墙形状的框图，对象名为 fred，带有一个指向外部的箭头 get。\n\n图 4-8\n\n“get” 方法用于从对象 **获取** 数据\n\n###\
  \ 推荐的 “Get”/“Set” 方法头\n\n对于以下形式的属性声明\n\n```\naccessibility*  attribute-type attributeName;\
  \     * 通常为 private\n```\n\n例如，\n\n```\nprivate String majorField;\n```\n\n编写常规访问器方法头的规则如下。\n\
  \n***对于 “get” 方法，公式如下：***\n\n```\npublic attribute-type getAttributeName()\n```\n\
  \n例如：\n\n*   方法名称的编写方式是将相关属性名称的首字母大写（例如 `majorField`），并在前面加上 “get”（例如 `getMajorField`）。\n\
  \n*   请注意，我们通常不会向 “get” 方法传递任何参数，因为我们只希望对象将其某个属性的值返回给我们；我们通常不需要告诉对象任何特殊信息，它就能知道如何执行此操作。\n\
  \n*   此外，由于我们期望对象返回特定属性的值，因此 “get” 方法的返回类型必须与相关属性的类型匹配。如果我们 “获取” 的是 `int` 属性的值，那么相应\
  \ “get” 方法的返回类型必须是 `int`；如果我们 “获取” 的是 `Professor` 属性的值，那么相应 “get” 方法的返回类型必须是 `Professor`；以此类推。\n\
  \n*   以下是一个完整的典型 “get” 方法，在 `Student` 类的上下文中展示：\n\n```\n    public class Student\
  \ {\n    private String majorField;\n    // 本例中省略了其他属性。\n    public String getMajorField()\
  \ {\n    // 返回 majorField 属性的值。\n    return majorField;\n    }\n    // 等等。\n   \
  \ }\n    ```\n\n```\npublic String getMajorField()\n```\n\n***对于 “set” 方法，公式如下：***\n\
  \n```\npublic void setAttributeName(attributeType parameterName)\n```\n\n例如：\n\n\
  *   方法名称的编写方式是将相关属性名称的首字母大写（例如 `majorField`），并在前面加上 “set”（例如 `setMajorField`）。\n\
  \n*   对于 “set” 方法，我们必须传入希望对象在设置其相应属性值时使用的值，并且传入值的类型必须与正在设置的属性的类型匹配。如果我们 “设置” 的是\
  \ `int` 属性的值，那么传入相应 “set” 方法的参数必须是 `int`；如果我们 “设置” 的是 `Professor` 属性的值，那么传入相应 “set”\
  \ 方法的参数必须是 `Professor`；以此类推。\n\n*   由于简单的 “set” 方法通常期望静默地执行其任务，而不向客户端返回值，因此我们通常将\
  \ “set” 方法的返回类型声明为 `void`。\n\n*   以下是一个完整的典型 “set” 方法，在 `Student` 类的上下文中展示：\n\n\
  ```\n    public class Student {\n    private String majorField;\n    // 本例中省略了其他属性。\n\
  \    public String getMajorField() {\n    // 返回 majorField 属性的值。\n    return majorField;\n\
  \    }\n    public void setMajorField(String major) {\n    // 将作为参数传入的值赋值为 majorField\
  \ 属性的新值。\n    majorField = major;\n    }\n    }\n    ```\n\n```\npublic void setMajorField(String\
  \ major)\n```\n\n“get” 方法的命名约定有一个例外：当属性类型为 `boolean` 时，建议将 “get” 方法命名为以动词 `is` 开头，而不是以\
  \ `get` 开头。然而，`boolean` 属性的 “set” 方法仍遵循标准命名约定，例如：\n\n```\npublic class Student {\n\
  private boolean honorsStudent;\n// 本例中省略了其他属性 ...\n// Get 方法。对于 boolean 类型，方法名以\
  \ \"is\" 开头，而非 \"get\"。\npublic boolean isHonorsStudent() {\nreturn honorsStudent;\n\
  }\n// Set 方法。\npublic void setHonorsStudent(boolean x) {\nhonorsStudent = x;\n}\n\
  // 等等。\n}\n```\n\n到目前为止，我们看到的所有 “get”/“set” 方法体都是简单的 “单行代码”：我们要么在 “get” 方法中使用简单的\
  \ `return` 语句返回相关属性的值，要么在 “set” 方法中将传入参数的值复制到内部属性中以进行存储。这并不意味着所有 “get”/“set” 方法都必须如此简单；事实上，访问器方法中实际编码的内容有无限可能，因为正如我们之前讨论的，方法必须实现业务规则，不仅涉及对象的行为方式，还涉及其数据可以假设的有效状态。\n\
  \n举一个简单的例子，假设我们总是希望以 “S. BARKER” 这样的格式存储 `Student` 的 `name`，例如 “Steve Barker”，其中我们将名字缩写为单个字母，并将整个名称表示为全大写。因此，我们可能希望将\
  \ `Student` 类的 `setName` 方法编写如下：\n\n```\npublic void setName(String newName) {\n\
  // 首先，根据需要重新格式化 newName ...\n// 伪代码。\nif (newName 包含完整的名) {\n// 修改 newName 的值。\n\
  newName = 将 newName 中的名转换为单个字符后跟一个句点;\n}\n// 接下来，将 newName 转换为全大写。\n// 伪代码。\nnewName\
  \ = newName 的大写版本;\n// 只有这样，我们才用（修改后的）值更新 name 属性。\nname = newName;\n}\n```\n\n\n\
  \n### IDE 生成的 Get/Set 方法\n\n在大多数 IDE 中，get 和 set 方法都是自动生成的。在这种情况下，传入 set 方法的参数名称通常与属性名称相同，例如：\n\
  \n```\npublic class Student {\nString majorField;\n// 其他细节省略\npublic void setMajorField(String\
  \ majorField) {\nthis.majorField = majorField;\n}\n```\n\n在上述代码中，`majorField` 前面使用关键字\
  \ `this` 后跟一个点号 (`.`)，是向编译器指示：***局部变量*** `majorField` 的值将被传递给同名的***属性***。\n\n###\
  \ 属性值的“持久性”\n\n由于我之前没有明确说明，而且这一点可能并非对所有人都显而易见，我现在想提请注意一个事实：只要对象本身在内存中存在，其属性值就会持续存在。也就是说，一旦我们在应用程序中实例化一个\
  \ `Student` 对象\n\n```\nStudent s = new Student();\n```\n\n那么，我们分配给 `s` 属性的任何值\n\n\
  ```\ns.setName(\"Mel\");\n```\n\n都会持续存在，直到该值被显式更改\n\n```\n// 重命名 Student s。\ns.setName(\"\
  Klemmie\");\n```\n\n或者整个对象被 Java 虚拟机 (JVM) 垃圾回收为止——我们在第 3 章讨论过这个过程。因此，回到我们在第 3 章中将对象比作氦气球的类比，只要代表\
  \ `Student s` 的“氦气球”保持“充气”状态，每当我们向 `s` 询问其姓名时，它都会“记住”我们***最后***分配给其 `name` 属性的值。\n\
  \n### 从客户端代码使用访问器方法\n\n我们已经知道如何从客户端代码使用点号表示法来调用对象上的方法，因此在对象引用上调用访问器方法时，我们将采用相同的方式：\n\
  \n```\nStudent s = new Student();\n// 修改（\"set\"）属性值。\ns.setName(\"Joe\");\n// 读取（\"\
  get\"）属性值。\nSystem.out.println(\"Name: \" +  s.getName());\n```\n\n我在本章前面承诺过要讨论如何通知某个\
  \ `Student` 对象其 `facultyAdvisor` 是哪位特定的 `Professor`；既然你已经了解了“set”方法，这简直易如反掌！假设 (a)\
  \ `facultyAdvisor` 是 `Student` 类的一个属性，声明类型为 `Professor`，并且 (b) 我们为此属性编写了一个“标准”头为\
  \ `public void setFacultyAdvisor(Professor p)` 的“set”方法，那么以下是用于“让”学生认识其导师的客户端代码：\n\
  \n```\nStudent s1 = new Student();\nStudent s2 = new Student();\nStudent s3 = new\
  \ Student();\nStudent s4 = new Student();\n// 等等。\nProfessor p1 = new Professor();\n\
  Professor p2 = new Professor();\n// 等等。\n// 细节省略 ...\ns1.setFacultyAdvisor(p1);\n\
  s2.setfacultyAdvisor(p1);\ns3.setFacultyAdvisor(p2);\ns4.setFacultyAdvisor(p2);\n\
  // 等等。\n```\n\n## 封装加信息隐藏的强大之处\n\n你之前了解到，封装是一种将对象的状态（属性值）和行为（方法）捆绑在一起的机制。既然你已经对\
  \ public/private 可访问性有了一些了解，那么封装值得更深入的讨论。\n\n将对象视为一座“守卫”其数据——即其所有属性值——的“堡垒”是很有用的。与其试图直接穿过堡垒的墙壁（这通常会导致死亡和毁灭\
  \ (!)），我们理想的做法是接近门口的守卫，请求允许进入。一般来说，对象也是如此：未经对象的许可和知情——也就是说，如果不使用对象的某个可公开访问的方法来访问属性值——我们就无法直接访问对象私有声明的属性的值。\n\
  \n假设你刚认识一个人，想知道他们的名字。确定他们名字的一种方法是把手伸进他们的口袋，掏出钱包，查看他们的驾照——这本质上是在未经他们许可的情况下访问他们的私有属性值！更符合社会规范的方式是直接询问他们的名字——类似于使用他们的\
  \ `getName` 方法——并让他们做出相应的回应。他们可能会用正式姓名、昵称或化名来回应，也可能会说：“这不关你的事！”——但重点是，你给予了这个人（对象）根据访问器方法的逻辑编码方式来***控制***其回应的能力。\n\
  \n通过公共访问器限制对对象私有属性的访问，我们获得了三个重要的好处：\n\n*   防止对封装数据的未授权访问\n*   有助于确保数据完整性\n*   当类的私有实现细节必须更改时，限制可能在整个应用程序中发生的“连锁效应”\n\
  \n让我们详细讨论这些好处。\n\n### 防止对封装数据的未授权访问\n\n`Student` 对象维护的关于自身的一些信息——例如，学生的身份证号码——可能是高度机密的。`Student`\
  \ 对象可能会在必要时选择性地传递这些信息——例如，在注册课程时——但可能不希望将此类信息提供给任何碰巧随意询问它的对象。\n\n只需将属性设为私有，并有意省略用于请求该属性值的公共“get”方法，其他对象就无法请求\
  \ `Student` 对象的身份证号码。\n\n\n\n### 帮助确保数据完整性\n\n如前所述，反对声明公共属性的理由之一是对象会失去对其数据的控制，因为正如我们之前所见，公共属性的值可以被客户端代码更改，而不必考虑对象类可能希望施加的任何业务规则。另一方面，当使用访问器方法来更改私有属性的值时，可以在“set”方法中内置值检查，以确保属性值不会被设置为“不适当”的值。\n\
  \n举个例子，假设我们声明了一个 `Student` 属性，如下所示：\n\n```\nprivate String birthDate;\n```\n\n我们的意图是以“mm/dd/yyyy”格式记录出生日期。通过要求客户端代码调用方法来操作\
  \ `birthDate` 属性（而不是允许直接公共访问该属性），我们可以在这些方法中提供逻辑来验证任何新提议的出生日期的格式，并拒绝无效的格式。我们将通过为\
  \ `Student` 类声明一个 `updateBirthDate` 方法来演示这一概念，如下代码所示：\n\n```\npublic class Student\
  \ {\nprivate String birthDate;\n// 此示例中省略了其他属性 ...\npublic boolean updateBirthDate(String\
  \ newBirthDate) {\nboolean newDateApproved;\n// 执行适当的验证。\n// 请记住，斜体表示伪代码 ...\nif\
  \ (日期不是 mm/dd/yyyy 格式) {\nnewDateApproved = false;\n}\nelse if (mm 不在 01 到 12 范围内)\
  \ {\nnewDateApproved = false;\n}\nelse if (该月的天数对于所选月份无效) {\nnewDateApproved = false;\n\
  }\nelse if (该年不是闰年，但指定了 2/29) {\nnewDateApproved = false;\n}\n// 其他验证测试以此类推。\nelse\
  \ {\n// 如果代码执行到这里，说明传递给此方法的值一切正常，\n// 因此我们可以继续用此值更新 birthDate 属性的值。\nbirthDate =\
  \ newBirthDate;\n// 设置标志以指示成功！\nnewDateApproved = true;\n}\nreturn newDateApproved;\n\
  }\n// 等等。\n}\n```\n\n如果尝试从客户端代码向该方法传递格式不正确的出生日期，例如：\n\n```\ns.updateBirthDate(\"\
  foo\");\n```\n\n该更改将被拒绝，并且 `s` 的 `birthDate` 属性的值将保持不变。实际上，我们可能会将更新出生日期的尝试放在一个“if”语句中，以便能够检测并响应此类拒绝：\n\
  \n```\n// 在某个环节，newDate 变量获取了一个无效值。\nString newDate = \"Jan 1 1990\";\n// 稍后在应用程序中\
  \ ...\nif (!(s.updateBirthDate(newDate)) {\n// 伪代码。\n// 如果值被拒绝，执行任何需要执行的操作 ...\n\
  }\n```\n\n另一方面，如果 `birthDate` 被声明为 `Student` 类的 ***公共*** 属性，那么编译器将允许直接设置该属性，如下所示：\n\
  \n```\ns.birthDate = \"Jan 1 1990\";\n```\n\n因此，通过绕过“set”方法通常会为我们执行的基于业务规则的错误检查，就有可能破坏该属性的值。\n\
  \n### 当私有特性更改时限制“连锁反应”\n\n尽管我们尽了最大努力来避免这种情况，但在应用程序部署后，我们常常需要回过头来修改其设计，这要么是因为需求发生了不可避免的变化，要么是因为我们不幸发现了需要处理的设计缺陷。不幸的是，在非面向对象（或设计不佳的面向对象）应用程序中，这可能会让我们面临“连锁反应”，即整个应用程序中数十、数百或***数千***行代码需要被更改、重新测试等。\n\
  \n设计变更负面影响最显著的例子之一就是臭名昭著的 **Y2K 问题**。当 2000 年临近，需要更改日期格式以适应四位数的年份时，要在全球***数百万***个应用程序的***数十亿***行代码中搜索所有此类情况——并在不无意中***破坏***其他任何东西的情况下***修复***它们——这一负担令人难以置信。当时许多人确信世界会因此崩溃，而事实上，它竟然没有崩溃，这真是令人惊叹！\n\
  \n因此，封装与信息隐藏结合带来的最***显著***的好处或许是，***类的隐藏实现细节***——即其私有数据结构和/或（实际上是私有的）访问器代码——***可以在不影响客户端代码与属于该类的对象交互方式的情况下进行更改***。为了说明这一原则，我们将构建一个示例。\n\
  \n假设在 `Student` 类中声明了一个属性，如下所示：\n\n```\nprivate int age;\n```\n\n并且我们声明了一个相应的 `getAge()`\
  \ 方法，如下所示：\n\n```\npublic int getAge() {\nreturn age;\n}\n```\n\n（我们选择不声明 `setAge`\
  \ 方法，因为我们决定让 `age` 成为一个只读属性。）\n\n然后，我们在无数应用程序中使用我们的 `Student` 类；因此，在这些应用程序的客户端代码中，实际上有***数千***个地方，我们编写了如下语句，依赖“get”方法来为我们提供学生的年龄（作为\
  \ `int` 值），例如：\n\n```\nint currentAge = s.getAge();\n```\n\n几年后，我们决定修改 `Student`\
  \ 类的数据结构，不再显式维护一个 `age` 属性，而是使用学生的 `birthDate` 属性在需要时计算学生的年龄。因此，我们修改 `Student` 类的代码如下：\n\
  \n表 4-1\n\n修改 Student 类的私有细节：修改前与修改后对比\n\n| “修改前”代码 | “修改后”代码 |\n| --- | --- |\n\
  | `public class Student {`**   // 我们有一个显式的****   // age 属性。****   private int age;**`public\
  \ int getAge() {`**      return age;**`}``// 等等。``}` | `import java.util.Date;``public\
  \ class Student {`**   // 我们用 birthDate****   // 替换了 age。****   private Date birthDate;**`public\
  \ int getAge() {`**      // 按需计算年龄****      // （伪代码）。****      return** ***系统日期\
  \ - birthDate*****;**`}``// 等等。``}` |\n\n在 `Student` 的“修改后”版本中，我们通过从今天的日期中减去学生的出生日期（存储为属性值）来计算学生的年龄。这是一个可以非正式地称为**伪属性**的例子——对客户端代码而言，存在一个\
  \ `getAge()` 方法暗示存在一个名为 `age` 的属性，而实际上可能并没有。\n\n美妙之处在于，***我们不在乎*** `Student` 类设计的***私有***细节是否发生了变化！在无数应用程序的客户端代码中，我们使用诸如\n\
  \n```\nint currentAge = s.getAge();\n```\n\n来获取学生年龄（作为 `int` 值）的数千个地方，这段代码将继续***原样***工作，无需对客户端代码进行任何更改，因为表达式\n\
  \n```\ns.getAge()\n```\n\n\n\n仍然会求值为一个代表 `Student s` 年龄的 `int` 值。因此，我们避免了“可怕的”连锁反应，并***显著***减少了适应设计变更所需的工作量。这种变更被称为**封装**，或仅限于\
  \ `Student` 类的内部代码。\n\n当然，如果类的开发者更改了其***公共***特性——最常见的是公共方法头——那么所有使用该方法向此类对象发送消息的客户端代码都可能需要更改。例如，如果我们更改\
  \ `Student` 类的设计，使 `getAge()` 方法现在声明返回一个 `double` 值，如下所示：\n\n```\npublic class Student\
  \ {\n// 我们将 age 属性的类型从 int 改为 double ...\nprivate double age;\n// ... 并相应更改了 getAge()\
  \ 方法的返回类型。\npublic double getAge() {\nreturn age;\n}\n// 等等\n}\n```\n\n那么我们的许多客户端代码***确实***可能会“崩溃”，如下例所示：\n\
  \n```\n// 这将无法编译！\nint currentAge = s.getAge();\n```\n\n这段特定的客户端代码会“崩溃”，因为我们现在存在类型不匹配。我们返回的是一个\
  \ `double` 值，但试图将其赋值给一个 `int` 变量，正如我们在第 2 章中学到的，这将产生如下编译器错误：\n\n```\npossible loss\
  \ of precision\nfound    : double\nrequired : int\n```\n\n我们必须搜索可能存在于多个应用程序中的所有无数实例，在这些实例中，我们在\
  \ `Student` 引用上调用 `getAge()` 方法，并修改每一行这样的代码，要么进行从 `double` 到 `int` 的显式强制转换，如下所示：\n\
  \n```\n// 我们现在使用强制转换。\nint currentAge = (int) s.getAge();\n```\n\n因此，我们可能会招致显著的连锁反应。但同样，这种连锁反应是由于我们更改了类的***公共***特性——准确地说，是公共方法头。\n\
  \n只要我们将更改限制在类的私有特性上，连锁反应就不是问题；任何先前编写用于使用 `public Student` 方法的客户端代码将继续按预期工作。\n\n\
  ### 在类自身的方法中使用访问器方法\n\n在本章前面，我们讨论过类允许通过名称直接访问其自身的属性，如下面的 `printStudentInfo` 方法所示：\n\
  \n```\npublic class Student {\nprivate String name;\nprivate String ssn;\n// 等等\n\
  // 细节省略。\npublic void printStudentInfo() {\n// 我们直接访问自己的属性。\nSystem.out.println(\"\
  Name:  \" + this.name);\nSystem.out.println(\"Student ID:  \" + this.ssn);\n// 等等\n\
  }\n// 等等\n```\n\n然而，最佳实践是类在需要访问其自身属性值时***使用自己的“get”/“set”方法***。让我们修改 `printStudentInfo`\
  \ 方法来演示这一最佳实践：\n\n```\npublic class Student {\nprivate String name;\nprivate String\
  \ ssn;\n// 等等\n// “常规”访问器方法。\npublic String getName() {\nreturn name;\n}\npublic\
  \ void setName(String n) {\nname = n;\n}\npublic String getSsn() {\nreturn ssn;\n\
  }\npublic void setSsn(String s) {\nssn = s;\n}\npublic void printStudentInfo() {\n\
  // 我们现在使用自己的“get”方法来访问自己的属性值。\nSystem.out.println(\"Name:  \" + this.getName());\n\
  System.out.println(\"Student ID:  \" + this.getSsn());\n// 等等\n}\n// 等等\n```\n\n\
  为什么使用类自身的“get”/“set”方法而不是直接访问属性很重要？假设在未来某个日期，`Student` 类的 `getName` 和 `getSsn` 方法被修改如下：\n\
  \n```\npublic String getName() {\n// 业务规则已更改！我们现在希望在将名称返回给客户端代码之前，\n// 重新格式化存储在\
  \ Student 对象中的名称。\n// （伪代码。）\nString reformattedName = name 重新格式化为\n\"LastName,\
  \ FirstName\" 的形式；\nreturn reformattedName;\n}\npublic String getSsn() {\n// 业务规则已更改！我们现在希望在将\
  \ ssn 返回给客户端代码之前，\n// 重新格式化存储在 Student 对象中的 ssn 以插入破折号。\n// （伪代码。）\nString reformattedSsn\
  \ = ssn 重新格式化为 \"xxx-xx-xxxx\" 的形式；\nreturn reformattedSsn;\n}\n```\n\n因为我们重新设计了\
  \ `printStudentInfo` 方法来调用 `this.getName()` 和 `this.getSsn()`，我们将自动受益于 `getName`\
  \ 和 `getSsn` 方法中业务逻辑的更改：\n\n```\n// 客户端代码。\nStudent s = new Student();\ns.setName(\"\
  Susan Yamate\");\ns.setSsn(\"123456789\");\ns.printStudentInfo();\n```\n\n输出如下：\n\
  \n```\nName:  Yamate, Susan\nStudent ID: 123-45-6789\n```\n\n另一方面，如果我们从 `printStudentInfo`\
  \ 方法内部直接访问 `name` 和 `ssn` 属性：\n\n```\npublic void printStudentInfo() {\n// 我们直接按名称访问私有属性，而不是使用相应的\
  \ get 方法。\nSystem.out.println(\"Name:  \" + name);\nSystem.out.println(\"Student\
  \ ID:  \" + ssn);\n// 等等\n}\n```\n\n我们将***不会***受益于业务逻辑的更改：\n\n```\n// 客户端代码。\nStudent\
  \ s = new Student();\ns.setName(\"Susan Yamate\");\ns.setSsn(\"123456789\");\ns.printAllAttributes();\n\
  ```\n\n输出如下（格式***不正确***）：\n\n```\nName:  Susan Yamate\nStudent ID: 123456789\n```\n\
  \n同样的原则也适用于在另一个方法内部***更新***属性值时使用类自身的**“*set*”**方法——例如，`Student` 类的 `assignMajor`\
  \ 方法的这个版本：\n\n```\npublic class Student {\nprivate String name;\nprivate String\
  \ ssn;\nprivate String major;\nprivate Professor advisor;\n// 等等\n// 提供了 set/get\
  \ 方法；细节省略。\npublic void assignMajor(String m, Professor p) {\n// 首选方式。\nthis.setMajor(m);\n\
  this.setAdvisor(p);\n}\n// 等等\n```\n\n优于这个版本：\n\n```\npublic class Student {\nprivate\
  \ String name;\nprivate String ssn;\nprivate String major;\nprivate Professor advisor;\n\
  // 等等\n// 提供了 set/get 方法；细节省略。\npublic void assignMajor(String m, Professor p) {\n\
  // 不太理想。\nthis.major = m;\nthis.advisor = p;\n}\n// 等等\n```\n\n因为 `Student` 类的“set”方法今天可能只是简单的“单行代码”：\n\
  \n```\npublic void setMajor(String m) {\nmajor = m;\n}\n```\n\n但未来可能会增强以反映更复杂的业务逻辑：\n\
  \n```\npublic void setMajor(String m) {\n// 伪代码。\n在数据库中查找 m 以验证其是否为“已批准”的专业名称，\n\
  然后再更新 major 属性\nif (m 有效) {\nmajor = m;\n}\n}\n```\n\n当然，有一个地方我们***不能***调用类的“get”/“set”方法，那就是在“get”/“set”方法***内部***。这样做会导致无限递归的方法：\n\
  \n```\n// 此方法是递归的！\npublic void setName(String n) {\nthis.setName(n);\n}\n```\n\n\
  这可以正常编译，但在调用时会产生运行时错误，如下所示：\n\n```\n// 客户端代码。\nStudent s = new Student();\ns.setName(\"\
  Fred Schnurd\");\n```\n\n错误如下：\n\n```\nException in thread \"main\" java.lang.StackOverflowError\n\
  at Student.setName(Student.java:8)\nat Student.setName(Student.java:8)\nat Student.setName(Student.java:8)\n\
  at Student.setName(Student.java:8)\nat Student.setName(Student.java:8)\n（重复了 1024\
  \ 次！）\n```\n\n\n\n## 公有/私有规则的例外情况\n\n尽管通常情况是：\n\n*   属性被声明为 `private`\n*   方法被声明为\
  \ `public`\n*   私有属性通过公有方法访问\n\n但这条规则存在许多例外情况。\n\n***例外一****——****内部管理属性***：一个属性可能被类严格用于内部管理目的。（就像你放在水槽下的洗洁精，客人无需知道它的存在！）对于此类属性，我们无需费心提供公有访问器。\n\
  \n以 `Student` 类为例，可能有一个 `int` 类型的属性 `countOfDsAndFs`，用于跟踪学生获得的不及格成绩数量，以判断该学生是否处于学业警告状态。我们随后可以提供一个\
  \ `Student` 类方法 `onAcademicProbation`，如下所示：\n\n```\npublic class Student {\n// 私有内部管理属性。\n\
  private int countOfDsAndFs;\n// 本例中省略了其他属性 ...\npublic boolean onAcademicProbation()\
  \ {\nboolean onProbation = false;\n// 如果学生获得超过三个不及格成绩，\n// 他/她将被置于学业警告状态。\nif (countOfDsAndFs\
  \ > 3) {\nonProbation = true;\n}\nreturn onProbation;\n}\n// 本例中省略了其他方法 ...\n}\n\
  ```\n\n`onAcademicProbation` 方法使用私有属性 `countOfDsAndFs` 的值来判断学生是否处于学业警告状态，但***客户端代码***无需知道存在\
  \ `countOfDsAndFs` 这样一个属性，因此没有为该属性提供显式的公有访问器方法。此类属性是通过执行某些***其他***方法时的***副作用***来设置的，如下例所示，同样取自\
  \ `Student` 类：\n\n```\npublic void completeCourse(String courseName, int creditHours,\
  \ char grade) {\n// 更新此私有属性被视为完成课程的“副作用”。\nif (grade == 'D' || grade == 'F') countOfDsAndFs++;\n\
  // 本例中省略了其他处理细节 ...\n}\n```\n\n***例外二****——****内部管理方法***：某些方法也可能严格用于内部管理目的，在这种情况下，它们也可以声明为\
  \ `private` 而非 `public`。（邻居无需知道我们每隔一周请一位清洁工来打扫！）\n\n`Student` 类中此类方法的一个例子是 `updateGpa`，每当学生完成一门课程并获得成绩时，它会重新计算\
  \ `gpa` 属性的值。唯一可能需要调用此方法的时机可能是在 `Student` 的另一个方法内部——例如，公有方法 `completeCourse`——如下所示：\n\
  \n```\npublic class Student {\nprivate double gpa;\nprivate int totalCoursesTaken;\n\
  private int totalQualityPointsEarned;\nprivate int countOfDsAndFs;\n// 省略了其他细节 ...\n\
  public void completeCourse(String courseName,\nint creditHours, char grade) {\n\
  if (grade == 'D' || grade == 'F') {\ncountOfDsAndFs++;\n}\n// 在成绩单中记录成绩。\n// 细节省略\
  \ ...\n// 更新一个属性 ...\ntotalCoursesTaken = totalCoursesTaken + 1;\n// ... 并从此公有方法内部调用一个\
  \ PRIVATE 内部管理方法，\n// 以相应调整学生的 GPA。\nupdateGpa(creditHours, grade);\n}\n// GPA 如何更新的细节是一个深藏不露的秘密！\n\
  // 甚至下一个方法的存在性也因其被声明为 PRIVATE 而\n// 对“外部世界”隐藏（即，客户端代码无法访问）。\nprivate void updateGpa(int\
  \ creditHours, char grade) {\nint letterGradeValue = 0;\nif (grade == 'A') letterGradeValue\
  \ = 4;\nif (grade == 'B') letterGradeValue = 3;\nif (grade == 'C') letterGradeValue\
  \ = 2;\nif (grade == 'D') letterGradeValue = 1;\n// 对于 'F'，保持为 0。\nint qualityPoints\
  \ = creditHours * letterGradeValue;\n// 更新两个属性。\ntotalQualityPointsEarned =\ntotalQualityPointsEarned\
  \ + qualityPoints;\ngpa = totalQualityPointsEarned/totalCoursesTaken;\n}\n}\n```\n\
  \n客户端代码不应能够直接导致 `Student` 对象的 `gpa` 被更新；这只能作为完成课程的副作用发生。通过将 `updateGpa` 方法设为 `private`，我们阻止了任何客户端代码显式调用此方法以脱离上下文操纵该属性的值。\n\
  \n***例外三****——****“只读”属性***：如果我们只为属性提供一个“get”方法，而不提供“set”方法，那么从客户端代码的角度来看，该属性实际上是只读的。例如，我们可能对学生的\
  \ ID 号这样做，该 ID 号在创建 Student 对象时由系统设置，之后应保持不变：\n\n```\npublic class Student {\nprivate\
  \ String studentId;\n// 细节省略\n// 我们通过只为 studentId 编写 get 方法，使其成为只读属性。\npublic String\
  \ getStudentId() {\nreturn studentId;\n}\n// 有意省略了 set 方法。\n}\n```\n\n我们***究竟***如何初始设置此类属性的值？我们已经看到，某些属性的值会作为执行方法的副作用而被修改（就像我们之前讨论的\
  \ `countOfDsAndFs` 属性）。我们稍后在本章讨论构造函数时，还会看到如何显式初始化这样一个只读属性。\n\n***例外四****——****公有属性***：在极少数情况下，一个类可能会为了方便访问而将选定的属性声明为\
  \ `public`；***仅当没有业务逻辑管理这些属性本身时，才会这样做***。\n\n一个例子是预定义的 Java `Point` 类，它用于定义二维空间中的\
  \ (x, y) 坐标；其属性被简单地声明为：\n\n```\npublic class Point {\n// 两个属性都是公有的：\npublic double\
  \ x;\npublic double y;\n// 等等。\n}\n```\n\n这样，在客户端代码中，我们可以轻松地按如下方式赋值：\n\n```\nPoint\
  \ p = new Point();\np.x = 3.7;\np.y = -4.8;\n```\n\n话虽如此，在创建自己的类时，***请抵制住***仅仅为了偷懒避免编写“get”/“set”方法而将属性声明为\
  \ `public` 可访问性的冲动！我们已经看到了“get”/“set”方法在适当情况下强制执行业务逻辑方面的诸多好处。事实证明，绝大多数属性都需要由此类业务逻辑来管理。\n\
  \n## 构造函数\n\n当我们在前一章讨论实例化对象时，你可能对 `new` 关键字涉及的有趣语法感到好奇：\n\n```\nStudent x = new\
  \ Student();\n```\n\n特别是，你可能想知道为什么语句末尾会有一个括号。\n\n事实证明，当我们通过 `new` 关键字实例化一个对象时，我们实际上是在调用一种与类相关联的特殊函数，称为**构造函数**。调用构造函数相当于向\
  \ JVM 发出请求，要求其在运行时通过分配足够的内存来容纳对象的属性，从而构造（实例化）一个全新的对象。回到我们“对象如同氦气球”的比喻，我们是在请求 JVM\
  \ 充入一个特定类型的新氦气球。\n\n\n\n### 默认构造函数\n\n如果我们没有为某个类显式声明任何构造函数，Java 会自动为该类提供一个**默认构造函数**。默认构造函数是无参的——即不接受任何参数——并且只执行初始化新对象所需的“最低限度”操作：即将所有属性设置为其零等效的默认值。\n\
  \n因此，即使我们设计了一个完全没有显式构造函数的类，如下面的 `Student` 类：\n\n```\npublic class Student {\n//\
  \ 属性。\nprivate String name;\n// 其他细节省略……\n// 我们声明了方法，但没有显式构造函数。\npublic String getName()\
  \ {\nreturn name;\n}\npublic void setName(String newName) {\nname = newName;\n}\n\
  // 等等。\n}\n```\n\n我们仍然可以编写客户端代码来实例化一个“基础版”的 `Student` 对象，如下所示：\n\n```\nStudent s1\
  \ = new Student();\n```\n\n因为 JVM 会为 `Student` 类使用默认构造函数。\n\n### 编写我们自己的显式构造函数\n\
  \n我们不必依赖 Java 为每个类提供默认构造函数；相反，如果我们希望在首次实例化对象时执行更有趣/更复杂的初始化操作，我们可以为特定类编写自己设计的构造函数。\n\
  \n请注意，构造函数的头部语法与方法的头部语法略有不同：\n\n*   构造函数的名称必须与我们正在为其编写构造函数的类名完全相同——在这个问题上我们没有选择余地。\n\
  *   与方法的头部一样，构造函数的头部也提供一个用圆括号括起来的参数列表。并且，与方法的头部一样，如果合适，参数列表可以为空。\n*   我们***不能***为构造函数指定返回类型；根据定义，构造函数会返回一个对新创建对象的引用，该对象的类型由构造函数所属的类表示。也就是说，形式如下的构造函数：\n\
  \n    ```\n    // 注意：没有返回类型！\n    public Student() { ... }\n    ```\n\n    会返回一个新实例化的\
  \ `Student` 对象引用。形式如下的构造函数：\n\n    ```\n    // 注意：没有返回类型！\n    public Professor()\
  \ { ... }\n    ```\n\n    会返回一个新实例化的 `Professor` 对象引用。以此类推。\n\n```\npublic     \
  \   _____________          Student()\n访问修饰符    无返回类型！       构造函数名称必须与类名匹配，\n后面跟着用圆括号括起来的、\n\
  以逗号分隔的形式参数列表\n```\n\n构造函数语法与方法语法的另一个不同之处在于，调用构造函数不涉及点号表示法：\n\n```\nProfessor p =\
  \ new Professor();\n```\n\n这是因为我们不是在请求某个特定对象的服务；相反，我们是在请求 JVM 创建一个全新的对象。\n\n###\
  \ 向构造函数传递参数\n\n为类声明显式构造函数最常见的动机之一，是提供一种便捷的方式，在实例化时传入对象的属性初始值。\n\n如果我们使用默认构造函数实例化一个基础版对象，那么我们必须逐一调用该对象的“set”方法来初始化其属性值，如下面的代码片段所示：\n\
  \n```\n// 创建一个基础版的 Student 对象。\nStudent s = new Student();\n// 逐一初始化属性。\ns.setName(\"\
  Fred Schnurd\");\ns.setSsn(\"123-45-6789\");\ns.setMajor(\"MATH\");\n// 等等。\n```\n\
  \n如果需要初始化的属性很多，这可能会相当繁琐。\n\n或者，如果我们设计一个接受参数的构造函数，就可以在一行代码中同时完成实例化对象和提供有意义的初始属性值，例如：\n\
  \n```\n// 这一行代码替换了之前的四行代码。\nStudent s = new Student(\"Fred Schnurd\", \"123-45-6789\"\
  , \"MATH\");\n```\n\n为了实现这一点，我们当然需要声明一个具有适当头部的 `Student` 类构造函数，如下所示：\n\n```\npublic\
  \ class Student {\n// 属性。\nprivate String name;\nprivate String ssn;\nprivate String\
  \ major;\n// 等等。\n// 我们声明了一个接受三个参数的构造函数，以便传入三个属性值。\npublic Student(String s, String\
  \ n, String m) {\nthis.setName(n);\nthis.setSsn(s);\nthis.setMajor(m);\n}\n// 等等。\n\
  ```\n\n构造函数参数也可以用作控制标志，以影响构造函数的行为，如下一个构造函数示例所示：\n\n```\npublic Student(String name,\
  \ boolean assignDefaults) {\nsetName(n);\nif (assignDefaults) {\nthis.setSsn(\"\
  ?\");\nthis.setMajor(\"UNDECLARED\");\n}\n}\n```\n\n上述构造函数的客户端代码可能如下所示：\n\n```\n\
  // 我们确实希望为其他属性分配默认值。\nStudent s = new Student(\"Cynthia Coleman\", true);\n```\n\
  \n### 替换默认的无参构造函数\n\n如果我们愿意，可以为我们的类显式编写一个无参构造函数，以执行比仅仅实例化一个基础版对象更有趣的操作，从而用我们自己设计的版本***替换***默认的无参构造函数。下面的类对此进行了说明：\n\
  \n```\npublic class Student {\n// 属性。\nprivate String name;\nprivate String major;\n\
  // 等等。\n// 我们显式编写了一个无参构造函数，从而替换了默认版本。\npublic Student() {\n// 也许我们希望将属性值初始化为非零等效的其他值。\n\
  this.setName(\"?\");\nthis.setMajor(\"UNDECLARED\");\n// 等等。\n}\n// 此示例中省略了其他方法。\n\
  }\n```\n\n### 更复杂的构造函数\n\n我们可以编写一个构造函数，使其在构造一个新的 `Student` 时执行任何合理的操作：\n\n*   我们可能希望实例化与\
  \ `Student` 对象相关的其他对象：\n\n    ```\n    public class Student() {\n    // 每个 Student\
  \ 都维护一个指向其个人 Transcript 对象的句柄。\n    private Transcript transcript;\n    public Student()\
  \ {\n    // 为这个新 Student 创建一个新的 Transcript 对象。\n    transcript = new Transcript();\n\
  \    // 等等。\n    }\n    // 等等。\n    }\n    ```\n\n*   我们可能希望访问关系数据库，读取初始化 `Student`\
  \ 属性所需的数据：\n\n    ```\n    public class Student {\n    // 属性。\n    String studentId;\n\
  \    String name;\n    double gpa;\n    // 等等。\n    // 构造函数。\n    public Student(String\
  \ id) {\n    studentId = id;\n    // 伪代码。\n    使用 studentId 作为主键从关系数据库的 Student\
  \ 表中检索数据；\n    如果在 Student 表中找到 studentId {\n    检索 Student 记录中的所有数据；\n    name\
  \ = 从数据库中检索到的名称；\n    gpa = 从数据库中检索到的值；\n    // 等等。\n    }\n    }\n    // 等等。\n\
  \    }\n    ```\n\n*   我们可能希望与其他已存在的对象通信，以宣布新 `Student` 的存在：\n\n    ```\n    public\
  \ class Student {\n    // 细节省略。\n    // 构造函数。\n    public Student(String major)\
  \ {\n    // 通知学生指定的专业院系，有一名新生加入了大学。\n    // 伪代码。\n    majorDept.notify(关于这个学生……);\n\
  \    // 等等。\n    }\n    // 等等。\n    }\n    ```\n\n*   等等——***任何***应用程序所需的内容。\n\n\
  在本书后面编写 SRS 时，我们将看到此类构造函数的示例。\n\n\n\n### 重载构造函数\n\n正如在 Java 中允许重载方法一样，我们也允许重载构造函数。也就是说，我们可以为一个给定的类编写任意多个不同的构造函数，只要它们具有不同的参数签名。\n\
  \n以下是一个声明了三个不同构造函数的 `Student` 类示例：\n\n```\npublic class Student {\nprivate String\
  \ name;\nprivate String ssn;\nprivate int age;\n// 等等。\n// 构造函数 #1：不接受参数；取代默认构造函数。\n\
  public Student() {\n// 如果需要，为选定的属性分配默认值。\nthis.setSsn(\"?\");\n// 那些未在构造函数中显式初始化的属性将\n\
  // 自动采用其各自类型的零等效值。\n}\n// 构造函数 #2：接受一个 String 参数。\npublic Student(String s) {\n\
  this.setSsn(s);\n}\n// 构造函数 #3：接受两个 String 和一个 int 作为参数。\npublic Student(String\
  \ s, String n, int i) {\nthis.setSsn(s);\nthis.setName(n);\nthis.setAge(i);\n}\n\
  // 此示例中省略了其他方法。\n}\n```\n\n通过重载类的构造函数，我们使类更加灵活，为客户代码提供了多种构造函数供其根据情况选择。以下是一个客户代码示例，展示了三种\
  \ `Student` 构造函数的使用：\n\n```\n// 我们对第一个学生一无所知，因此使用无参构造函数来实例化 s1。\nStudent s1 = new\
  \ Student();\n// 我们只知道第二个学生的 ssn（仅此而已），因此使用第二种\n// 形式的构造函数来实例化 s2。\nStudent s2 =\
  \ new Student(\"123-45-6789\");\n// 我们知道第三个学生的 ssn、姓名和年龄，因此使用\n// 第三种形式的构造函数来实例化\
  \ s3。\nStudent s3 = new Student(\"987-65-4321\", \"John Smith\", 21);\n```\n\n与重载方法一样，编译器能够根据参数签名明确地匹配出每种情况下调用的是哪个版本的构造函数：\n\
  \n*   `()`：无参数告诉编译器我们正在调用构造函数 #1。\n\n*   `(\"123-45-6789\")`：一个 `String` 参数告诉编译器我们正在调用构造函数\
  \ #2。\n\n*   `(\"987-65-4321\", \"John Smith\", 21)`：两个 `String` 和一个 `int` 作为参数告诉编译器我们正在调用构造函数\
  \ #3。\n\n这个示例也强化了为什么不能有两个构造函数具有相同参数签名。如果我们***被允许***引入第四个构造函数，其参数签名与构造函数 #2 重复，例如：\n\
  \n```\n// 构造函数 #4：接受一个 String 参数，从而重复了\n// 构造函数 #2 的参数签名。\npublic Student(String\
  \ n) {  // 这将无法编译！！！\nthis.setName(n);\n}\n```\n\n那么编译器将不知道在以下客户代码中我们试图调用的是哪个构造函数——#2\
  \ 还是 #4：\n\n```\n// 伪代码。\nStudent x = new Student(aStringExpression);\n```\n\n因此，为了避免这种歧义情况，编译器会在上述构造函数\
  \ #4 的声明处生成一条错误消息，如下所示：\n\n```\nStudent(java.lang.String) is already defined in\
  \ Student\npublic Student(String n) { }\n^\n```\n\n### 关于默认构造函数的重要注意事项\n\n关于 Java\
  \ 中的默认构造函数，有一个非常重要的注意事项：如果我们为类声明了***任何***自己的构造函数，无论其***参数签名***如何，那么默认的无参构造函数将***不会***自动提供。这是有意为之，因为假设如果我们已经费心为类编写了任何构造函数，那么该类必然有一些默认构造函数无法预见的特殊初始化需求。\n\
  \n此语言特性的含义如下：如果我们希望或需要某个特定类有一个不接受参数的构造函数，***同时***还需要其他***确实***接受参数的构造函数版本，那么***我们必须显式地编写一个无参构造函数***。为了说明这一点，让我们考虑一个只声明了一个显式构造函数的\
  \ `Student` 类：\n\n```\npublic class Student {\n// 细节省略。\n// 只显式声明了一个构造函数，该函数接受一个\n\
  // String 参数。\npublic Student(String s) {\nthis.setSsn(s);\n}\n// 等等。\n}\n```\n\n\
  在客户代码中，我们可以基于此类实例化一个 `Student`，如下所示：\n\n```\nStudent s = new Student(\"123-45-6789\"\
  );\n```\n\n但如果我们尝试使用（现在已不存在的）默认构造函数：\n\n```\nStudent s = new Student();\n```\n\n\
  我们将得到以下编译错误：\n\n```\ncannot find symbol\nsymbol  : constructor Student()\nlocation:\
  \ class Student\nStudent s = new Student();\n^\n```\n\n一般来说，如果我们为类提供了***任何***构造函数，最佳实践是始终显式提供一个无参构造函数（以替代丢失的默认构造函数）。当我们讨论第\
  \ 5 章的**继承**时，将再次探讨这种做法的重要性。\n\nJava 初学者常犯的一个错误是在构造函数头部意外地声明了返回类型，例如：\n\n```\npublic\
  \ void Student() { ... }\n```\n\n这是一个特别难以追踪的 bug，因为虽然此类头部声明***可以编译***，但编译器将其视为***方法***而***不是构造函数***，因此不能作为构造函数使用。更糟糕的是，开发者会***认为***他们已经编写了一个无参构造函数，而实际上并没有；任何在应用程序中***使用***此类构造函数的尝试都会遇到以下看似神秘的编译错误消息：\n\
  \n```\nStudent s = new Student();\n```\n\n这是编译器错误：\n\n```\ncannot find symbol\n\
  symbol:  constructor Student()\nlocation:  class Student\nStudent s = new Student();\n\
  ^\n```\n\n\n\n### 使用 `this` 关键字实现构造器复用\n\n在本章前面部分，我们介绍了 `this` 关键字，并说明了如何在同一个类的方法内部使用它来有选择地限定类的特性，例如：\n\
  \n```\npublic class Student {\n// 细节省略。\npublic void printAllAttributes() {\nSystem.out.println(\"\
  Name:  \" + this.getName());\nSystem.out.println(\"Student ID:  \" + this.getSsn());\n\
  // 等等。\n}\n}\n```\n\n现在，我们将探讨 `this` 关键字的第二种用法，即在同一类中通过一个构造器复用另一个构造器的代码。\n\n可以想象，如果我们为一个类重载了构造器，那么所有版本的构造器都需要执行一些共同的初始化步骤。例如，假设对于所有新生，我们必须：\n\
  \n*   向注册处报告该学生的存在。\n*   为该学生创建成绩单。\n\n如果我们为 `Student` 类声明三个构造器，那么在这三个构造器中重复相同的逻辑将会非常繁琐（请参见**加粗**的代码行）：\n\
  \n```\npublic class Student {\n// 属性细节省略。\n// 构造器 #1。\npublic Student() {\n// 为选定的属性分配默认值……细节省略。\n\
  // 伪代码。\nalert the registrar's office of this student's existence\n// 为该学生创建成绩单。\n\
  transcript = new Transcript();\n}\n// 构造器 #2。\npublic Student(String s) {\nthis.setSsn(s);\n\
  // 此代码是从上面重复的！\n// 伪代码。\nalert the registrar's office of this student's existence\n\
  // 为该学生创建成绩单。\ntranscript = new Transcript();\n// 代码重复结束\n}\n// 构造器 #3。\npublic\
  \ Student(String s, String n, int i) {\nthis.setSsn(s);\nthis.setName(n);\nthis.setAge(i);\n\
  // 又是重复！！！\n// 伪代码。\nalert the registrar's office of this student's existence\n\
  // 为该学生创建成绩单。\ntranscript = new Transcript();\n// 代码重复结束\n}\n// 等等。\n}\n```\n\n\
  更糟糕的是，如果逻辑需要更改，我们必须在所有三个构造器中都进行修改。幸运的是，`this` 关键字拯救了我们。在类 X 的任何一个构造器内部，我们可以通过以下语法调用同一个类\
  \ X 的任何其他构造器：\n\n```\nthis(参数签名);\n```\n\n让我们重写之前的三个 `Student` 构造器，使得构造器 #2 利用 #1\
  \ 的逻辑，构造器 #3 利用 #2 的逻辑：\n\n```\npublic class Student {\n// 属性细节省略。\n// 构造器 #1。\n\
  public Student() {\n// 为选定的属性分配默认值……细节省略。\n// 在这个第一个构造器中执行所有三个构造器共有的操作。\n// 伪代码。\n\
  alert the registrar's office of this student's existence\n// 为该学生创建成绩单。\ntranscript\
  \ = new Transcript();\n}\n// 构造器 #2。\npublic Student(String s) {\n// 在第二个构造器中复用第一个构造器的代码！\n\
  this();  // 调用无参构造器\n// 然后，执行构造器 #2 所需的任何额外操作。\nthis.setSsn(s);\n}\n// 构造器 #3。\n\
  public Student(String s, String n, int i) {\n// 在第三个构造器中复用第二个构造器的代码！\nthis(s); \
  \ // 调用带一个 String 参数的构造器\n// 然后，执行构造器 #3 所需的任何额外操作。\nthis.setName(n);\nthis.setAge(i);\n\
  }\n// 等等。\n}\n```\n\n通过在构造器 #2 中调用 `this();` 并在构造器 #3 中调用 `this(s);`，我们成功消除了所有代码重复。\n\
  \n使用 `this(...);` 语法从一个构造器复用代码到另一个构造器时，请注意该语句必须是构造器中的***第一条***语句；也就是说，以下代码将无法编译：\n\
  \n```\n// 构造器 #3。\npublic Student(String s, String n, int i) {\n// 执行构造器 #3 所需的任何额外操作；\n\
  // 细节省略。\n...\n// 然后，尝试复用构造器 #2 的代码；\n// 下一行代码无法编译！\nthis(s);\n}\n```\n\n错误信息如下：\n\
  \n```\ncall to this must be first statement in constructor\nthis(s);\n^\n```\n\n\
  我们将在第 13 章再次讨论 `this` 关键字，以探讨其第三种使用场景。\n\n\n\n## 软件的本质，再探\n\n正如我们在第 3 章中所讨论的，软件最本质的形式由两个主要部分组成：***数据***\
  \ 和作用于这些数据的***函数***（见图 4-9）。\n\n![](img/78624_3_En_4_Fig9_HTML.png)\n\n一个阴阳符号。它由一侧的数据和另一侧的函数组成。\n\
  \n图 4-9\n\n在最简单的形式下，软件由数据和作用于这些数据的函数组成\n\n我们还比较了设计软件的功能分解方法与面向对象方法。回顾一下：\n\n*在软件开发的功能分解方法中，我们主要关注的是应用程序要执行的函数；数据则是事后才考虑的事情。*\n\
  \n也就是说，\n\n*   数据从一个函数传递到下一个函数。\n*   因此，数据结构必须在应用程序中的***许多***地方——即被许多函数——所理解。\n\
  *   如果应用程序的数据结构在部署后必须更改，通常会在整个应用程序中引起不小的连锁反应。\n*   如果应用程序完全集成后，由于逻辑错误导致数据完整性错误，通常很难精确定位错误可能发生在哪里——即***在哪个具体的函数中***。\n\
  \n我们现在知道，通过利用封装和信息隐藏机制，面向对象的软件开发方法弥补了这些缺点中的绝大部分：\n\n*   数据被***封装***在对象内部作为***属性***，并且，如果我们将这些属性声明为具有***私有***访问权限，那么数据结构只需要被数据所属的对象/***类***所理解。\n\
  *   如果某个类的（私有）属性声明在应用程序部署后必须更改——就像我们修改 `Student` 类的数据结构，用 `Date birthDate` 属性替换\
  \ `int age` 属性时那样——实际上***没有连锁反应***：只需要更改受影响类的方法的内部逻辑即可。\n\n    （回想一下，我们在一个 `Student`\
  \ 类示例中修改了 `getAge` 方法的内部工作方式，但调用 `getAge` 的***所有***客户端代码都不需要更改，因为我们没有改变该方法的***公共***方法签名。）\n\
  \n*   ***每个类负责确保其对象数据的完整性***。因此，如果某个对象的数据出现完整性错误，我们几乎可以断定是该对象所属的类的方法逻辑有误。\n\n  \
  \  （回想一下之前 `Student` 类示例中的 `updateBirthdate` 方法。该方法包含了各种有效性检查，以确保作为参数传入的 `String`\
  \ 代表一个有效的出生日期。如果某个***无效的***出生日期不知何故混了进来，我们就会知道特别是 `updateBirthdate` 方法的验证逻辑存在问题。）\n\
  \n如果每个软件应用程序都由数据和作用于这些数据的函数组成，那么***一个对象可以被视为一种“迷你应用程序”***，其方法（函数）作用于其属性（数据），如图 4-10\
  \ 所示。你将在第 5 章中了解到这些对象如何“联合起来”协作完成应用程序的总体任务。\n\n![](img/78624_3_En_4_Fig10_HTML.png)\n\
  \n一个阴阳符号。它由一侧的数据属性和另一侧的函数方法组成。\n\n图 4-10\n\n一个对象是一个封装了数据和函数的“迷你应用程序”\n\n## 本章小结\n\
  \n在本章中，你学习了\n\n*   如何正式指定方法头，即可以向对象请求服务的“语言”，以及如何使用点表示法制定消息来实际请求对象执行此类服务\n*   多个对象通常必须协作执行特定的系统功能，例如为学生注册课程\n\
  *   对象 A 只有在拥有对象 B 的句柄时才能与对象 B 通信，以及获取此类句柄/引用的各种方式\n*   类如何通过一种称为***信息隐藏***的机制来指定其特性（属性、方法）的公共/私有访问权限\n\
  *   信息隐藏作为一种语言特性有多么强大，无论是在保护对象数据的完整性方面，还是在当应用程序的私有实现细节不可避免地发生变化时防止客户端代码产生连锁反应方面\n\
  *   如何声明和使用访问器（“get”/“set”）方法，以便从客户端代码优雅地访问对象的私有属性\n*   如何指定和使用一种称为***构造函数***的特殊函数类型，以控制在实例化新对象时发生什么\n\
  *   ***重载***如何使一个类能够拥有多个同名方法和/或多个构造函数，只要它们的参数签名不同即可\n\n练习题\n\n1.  给定一个类 `Book`，定义具有以下属性：\n\
  \n    ```\n    Author author;\n    String title;\n    int noOfPages;\n    boolean\
  \ fiction;\n    ```\n\n    为每个属性编写标准的“get”/“set”方法头。\n\n2.  [*编码*] 根据练习 1 中要求的属性和“get”/“set”方法，实际编写并编译\
  \ `Book` 类。\n\n3.  通常可以根据客户端代码中传递给对象的消息来推断类的设计。考虑以下客户端代码片段：\n\n    ```\n    Student\
  \ s;\n    Professor p;\n    boolean b;\n    String x = \"Math\";\n    s.setMajor(x);\n\
  \    if (!s.hasAdvisor()) {\n    b = s.designateAdvisor(p);\n    }\n    ```\n\n\
  \    根据此客户端代码的结构，`Student` 和 `Professor` 类隐含了哪些特性——属性、方法？请尽可能具体地说明：\n    *   每个特性的访问权限\n\
  \    *   每个特性将如何声明（例如，每个方法头的细节，尽可能“发现”它们）\n\n4.  [*编码*] 扩展你在第 3 章练习 2 中开发的 `Student`\
  \ 和 `Professor` 类（以及可选地，你在第 3 章练习 3 中开发的 `Department` 类），如下所示：\n    *   为每个属性包含访问器方法。\n\
  \    *   在所有特性上体现适当的访问权限。\n    *   每个类包含一个或多个构造函数。\n    *   编写一个方法头为 `public void\
  \ printAllAttributes()` 的方法，用于将所有属性的值显示到命令提示符，例如：\n\n    ```\n    Student Name:\
  \ John Smith\n    Student ID: 123-45-6789\n    ```\n\n    等等。\n\n    然后，修改附带的 `MainClass`\
  \ 的 `main` 方法，以利用你的新构造函数实例化每种对象类型的一个实例。\n\n5.  以下代码有什么问题？根据你在本章中学到的知识，指出违反面向对象约定或最佳实践的地方，无论\
  \ Java 编译器是否会“抱怨”它们。\n\n    ```\n    public class Building {\n    private String\
  \ address;\n    public int numberOfFloors;\n    void GetnumberOfFloors() {\n   \
  \ return numberOfFloors;\n    }\n    private void SetNoOfFloors(float n) {\n   \
  \ NumberOfFloors = n;\n    }\n    public void display() {\n    System.out.println(\"\
  Address:  \" + address);\n    System.out.println(\"No. of Floors:  \" + numberOfFloors);\n\
  \    }\n    ```\n\n\n\n"
- "# 5. 对象之间的关系\n\n关联与链接 多重性 多重性与链接 聚合与组合 继承 通过新抽象来应对需求变化 （不恰当的）方法 #1：修改 Student 类\
  \ （不恰当的）方法 #2：“克隆”Student 类以创建 GraduateStudent 类 正确的方法（#3）：利用继承 继承的“is a”本质 继承的好处\
  \ 类的层次结构 Object 类 继承真的是一种关系吗？ 避免类层次结构中的“连锁反应” 派生类的规则：“应该做的事” 覆盖 复用超类行为：“super”关键字\
  \ 派生类的规则：“不应该做的事” 私有特性与继承 继承与构造函数 关于多重继承的几点说明 再谈面向对象编程语言的三个显著特征 总结\n\n你在第 4 章中了解到，任意两个对象之间可以存在一种“短暂的”关系，这种关系基于它们交换消息的事实，就像两个在街上擦肩而过的陌生人可能会互相说“你好！”一样。我们非正式地将这种对象之间的关系称为**行为关系**，因为它们源于一个对象\
  \ X 相对于另一个对象 Y 所采取的行为或动作。\n\n在行为关系中，对象 X 要么临时获得一个指向对象 Y 的引用作为方法调用的参数，要么临时向另一个对象\
  \ Z 请求一个指向 Y 的句柄。然而，重点在于***临时***：当 X 与 Y 通信完毕后，对象 X 通常会丢弃对 Y 的引用。\n\n就像你与某些人（家人、朋友、同事）之间存在重要且更持久的关系一样，对象之间也存在一种更持久的关系概念。我们非正式地将这种关系称为**结构关系**，因为为了跟踪这种关系，一个对象实际上会以属性的形式维护对其相关对象的长期引用，这是我们在第\
  \ 3 章中讨论过的一种技术。\n\n在本章中，你将学习\n\n*   可以在类之间定义的各种结构关系，这些关系反过来决定了在运行时各个对象如何相互链接\n\n\
  *   一种称为**继承**的强大面向对象编程语言机制，它使我们能够仅通过描述新类与现有类的不同之处来派生新类\n\n*   通过继承派生类时，哪些可以做、哪些不可以做的规则\n\
  \n*   当继承生效时，我们必须如何完善对 (a) 构造函数和 (b) 特性可访问性的理解\n\n## 关联与链接\n\n存在于类之间的结构关系的正式名称是**关联**。对于学生注册系统，一些示例关联可能如下：\n\
  \n*   一个 `Student` ***注册了*** 一个 `Course`。\n\n*   一个 `Professor` ***教授*** 一个 `Course`。\n\
  \n*   一个 `DegreeProgram` ***要求*** 一个 `Course`。\n\n关联指的是***类***之间的关系，而术语**链接**则用于指存在于两个特定***对象***（***实例***）之间的结构关系。给定关联“一个\
  \ `Student` ***注册了*** 一个 `Course`”，我们可能有以下链接：\n\n*   Chloe Shylow（一个特定的 `Student`\
  \ 对象）注册了 Math 101（一个特定的 `Course` 对象）。\n\n*   Fred Schnurd（一个特定的 `Student` 对象）注册了\
  \ Basketweaving 972（一个特定的 `Course` 对象）。\n\n*   Mary Smith（一个特定的 `Student` 对象）注册了\
  \ Basketweaving 972（一个特定的 `Course` 对象——事实证明，这是与 Fred Schnurd 链接的***同一个*** `Course`\
  \ 对象）。\n\n正如一个对象是一个类的特定实例，其属性值已被填充一样，链接在概念上可以被视为一个关联的特定实例，其参与对象已被填充，如图 5-1 所示。\n\
  \n![](img/78624_3_En_5_Fig1_HTML.jpg)\n\n一个用于创建链接的模板。它由一段文本组成，内容为：关联，空白处 注册了 空白处。下面一行写着：链接，James\
  \ Conroy 注册了 Physics E D 311。\n\n图 5-1\n\n关联是创建链接的模板\n\n另一种理解关联与链接之间区别的方式是：\n\n\
  *   关联是某种类型/类的对象之间的一种***潜在***关系。\n\n*   链接是那些特定类型的对象之间的一种***实际***关系。\n\n例如，给定任意一个\
  \ `Student` 对象 X 和任意一个 `Course` 对象 Y，这两个对象之间***存在***一种 *注册了* 类型的链接的***可能性***，这***正是因为***在这两个对象所属的类之间定义了一个\
  \ *注册了* 的关联。换句话说，***关联使链接成为可能***。\n\n大多数关联存在于两个***不同***的类之间；这种关联被称为**二元关联**。例如，*注册了*\
  \ 关联就是一个二元关联，因为它关联了两个不同的类——`Student` 和 `Course`。另一方面，**一元关联**，或**自反关联**，则存在于***同一个类***的两个实例之间，例如：\n\
  \n*   一个 `Course` ***是***（另一个）`Course` 的***先修课程***。\n\n*   一个 `Professor` ***指导***（其他）`Professor`。\n\
  \n尽管自反关联两端指定的类是相同的，但***对象***通常是该类的不同实例：\n\n*   Math 101（一个 `Course` 对象）是 Math 202（一个***不同的***\
  \ `Course` 对象）的先修课程。\n\n*   Smith 教授（一个 `Professor` 对象）指导 Jones 教授和 Green 教授（其他\
  \ `Professor` 对象）。\n\n虽然比较罕见，但也可能存在***同一个***对象在自反关系中扮演两个角色的情况。例如，对于关联“一个 Professor\
  \ ***是代表其他 Professor 的主席***”，某个特定院系的主席教授将是他们自己的代表。\n\n更高阶的关联也是可能的。**三元关联**涉及三个类——例如，“一个\
  \ `Student` 从某个特定的 `Professor` 那里修读一个 `Course`”，如图 5-2 所示。\n\n![](img/78624_3_En_5_Fig2_HTML.png)\n\
  \n三条不同方向的相互连接的线，其顶点处分别标有文本：学生、教授和课程。\n\n图 5-2\n\n一个三元关联\n\n\n\n我们通常将高阶关联分解为适当数量的二元关联。例如，我们可以将上述的三方关联表示为三个二元关联（见图\
  \ 5-3）：\n\n![](img/78624_3_En_5_Fig3_HTML.png)\n\n一个带有虚线的三角形图，顶点处标注有文本：学生、教授和课程。底边标注有“授课”，两侧边分别标注有“指导”和“听课”。\n\
  \n图 5-3\n\n使用三个二元关联的等效表示\n\n*   一个 `Student`（学生）***attends***（参加）一个 `Course`（课程）。\n\
  *   一个 `Professor`（教授）***teaches***（教授）一个 `Course`（课程）。\n*   一个 `Professor`（教授）***instructs***（指导）一个\
  \ `Student`（学生）。\n\n在给定的关联中，每个参与类都被认为具有一个**角色**。在 ***advises***（指导）关联（一个 `Professor`\
  \ ***advises*** 一个 `Student`）中，`Professor` 的角色可能被称为“导师”，而 `Student` 的角色可能被称为“受指导者”。\n\
  \n只有当有助于阐明抽象概念时，我们才会费心为参与关联的对象指定角色名称。在“is enrolled in”（已注册）关联（一个 `Student` ***is\
  \ enrolled in*** 一个 `Course`）中，没有必要为关联两端的 `Student` 和 `Course` 发明角色名称，因为这样的角色名称不会显著增加抽象概念的清晰度。\n\
  \n### 多重性\n\n对于类 A 和类 B 之间的给定关联类型 X，术语**多重性**指的是可以与给定类型 B 实例相关联的类型 A 对象的数量。例如，一个\
  \ `Student` 参加 ***多个*** `Course`，但一个 `Student` 在导师角色上只有 ***一个*** `Professor`。\n\n\
  多重性有三种基本的“风格”：**一对一**、**一对多**和**多对多**。\n\n#### 一对一 (1:1)\n\n在一对一 (1:1) 关联中，类 A 的一个实例恰好与类\
  \ B 的一个实例相关——不多不少，反之亦然。例如：\n\n*   一个 `Student` 恰好有一个 `Transcript`（成绩单），并且一个 `Transcript`\
  \ 恰好属于一个 `Student`。\n*   一个 `Professor` 恰好主持一个 `Department`（系），并且一个 `Department`\
  \ 恰好有一个 `Professor` 担任系主任角色。\n\n我们可以通过说明类在任一端的参与是可选还是强制来进一步约束关联。例如，我们可以将前面的关联修改如下：\n\
  \n*   一个 `Professor` ***可选地*** 恰好主持一个 `Department`，但一个 `Department` ***必须*** 恰好有一个\
  \ `Professor` 担任系主任角色。\n\n这个修订版的关联比之前的版本更真实地描绘了现实世界的情况。虽然大学里的每个系通常确实有一位系主任，但并非每位教授都是系主任——没有那么多的系可供分配！然而，确实如此，***如果***\
  \ 一位教授碰巧是一个系的系主任，那么该教授只 ***一个*** 系的系主任。\n\n#### 一对多 (1:m)\n\n在一对多 (1:m) 关联中，可以有\
  \ ***多个*** 类 B 的实例以特定方式与 ***单个*** 类 A 的实例相关；但是，从类 B 实例的角度来看，只能有 ***一个*** 类 A 的实例与之如此相关。例如：\n\
  \n*   一个 `Department` 雇佣了 ***多个*** `Professor`，但一个 `Professor` 为 ***恰好一个*** `Department`\
  \ 工作。\n*   一个 `Professor` 指导 ***多个*** `Student`，但一个给定的 `Student` 恰好有 ***一个*** `Professor`\
  \ 作为导师。\n\n请注意，此处的“多个”可以解释为“零个或多个（可选）”或“一个或多个（强制）”。为了更具体一些，我们可以将之前的一对多关联细化如下：\n\n\
  *   一个 `Department` 雇佣了 ***一个或多个***（“多个”，***强制***）`Professor`，但一个 `Professor` 为恰好一个\
  \ `Department` 工作。\n*   一个 `Professor` 指导 ***零个或多个***（“多个”，***可选***）`Student`，但一个给定的\
  \ `Student` 恰好有一个 `Professor` 作为导师。\n\n此外，与一对一关系一样，一对多关联的“一”端也可以被指定为强制或可选。例如，如果我们在建模一个不要求学生必须选择导师的大学环境，我们可以将之前的关联细化如下：\n\
  \n*   一个 `Professor` 指导 ***零个或多个***（“多个”，***可选***）`Student`，但一个给定的 `Student` 可以\
  \ ***可选地*** 拥有 ***至多一个***（即 ***零个或一个***）`Professor` 作为导师。\n\n#### 多对多 (m:m)\n\n\
  在多对多 (m:m) 关联中，类 A 的一个给定实例可以有多个类 B 的实例与之相关，反之亦然。例如：\n\n*   一个 `Student` 注册了多个 `Course`，并且一个\
  \ `Course` 有多个 `Student` 注册其中。\n*   一个给定的 `Course` 可以有多个先修 `Course`，并且一个给定的 `Course`\
  \ 反过来可以成为多个 ***其他*** `Course` 的先修课程。（这是多对多 ***自反*** 关联的一个例子。）\n\n与一对多关联一样，在 (m:m)\
  \ 关联的任一端，“多个”可以解释为 ***零*** 个或多个（***可选***）或 ***一个*** 或多个（***强制***），例如：\n\n*   一个\
  \ `Student` 注册了 ***零个或多个***（“多个”，***可选***）`Course`，并且一个 `Course` 有 ***一个或多个***（“多个”，***强制***）`Student`\
  \ 注册其中。\n\n当然，特定关联的有效性——涉及的类、其多重性以及两个参与类在关联中参与的可选或强制性质——完全取决于被建模的现实世界情况。如果你正在建模一个大学，其中系可以有多个系主任，或者学生可以有多个导师，那么你对多重性的选择将与前面示例中使用的不同。\n\
  \n\n\n### 多重性与链接\n\n请注意，多重性这一概念适用于关联，但不适用于链接。***链接总是成对存在于两个对象之间***（或者，如前所述，在极少数情况下存在于一个对象与其自身之间）。因此，多重性本质上定义了从给定对象出发可以产生多少条特定关联类型的链接。通过一个例子可以最好地说明这一点。\n\
  \n再次考虑多对多的“选课”关联：\n\n*   一个`学生`可以选修零门或多门`课程`，而一门`课程`则有一名或多名`学生`选修。\n\n一个***特定***的`学生`对象可以有零条、一条或多条指向`课程`对象的链接，但其中***任何一条***链接都恰好连接***两个***对象：一个单一的`学生`对象和一个单一的`课程`对象。例如，在图\
  \ 5-4 中\n\n![](img/78624_3_En_5_Fig4_HTML.jpg)\n\n一个由学生 X、Y、Z 与课程 A、B、C、D 构成的网络。它包含的链接有：X\
  \ 到 A，Y 到 A，Y 到 B，Y 到 C，以及 Y 到 D。\n\n图 5-4\n\n通过对象间的成对链接说明类之间的多对多关联\n\n*   `学生`\
  \ X 有一条链接（指向`课程` A）。\n\n*   `学生` Y 有四条链接（指向`课程` A、B、C 和 D）。\n\n*   `学生` Z 没有任何指向`课程`对象的链接。（Z\
  \ 这学期休学了！）\n\n相反，一个***特定***的`课程`对象必须有一条或多条指向`学生`对象的链接，以满足“选课”关联的强制性和多重性要求，但同样，其中***任何一条***链接都恰好连接***两个***对象：一个单一的`课程`对象和一个单一的`学生`对象。例如，在图\
  \ 5-4 中\n\n*   `课程` A 有两条链接（指向`学生` X 和 Y）。\n\n*   `课程` B、C 和 D 各有一条链接（都指向同一个`学生`\
  \ Y）。\n\n这个示例场景确实维护了`学生`类和`课程`类之间的多对多“选课”关联；它只是这两个类之间可能存在的无数种场景中的一种。\n\n为了确保这个概念清晰明了，我们再来看另一个例子，这次使用一对一关联：\n\
  \n*   一位`教授`***可选地***担任恰好一个`系`的主任，并且一个`系`***必须***恰好有一位`教授`担任主任职务。\n\n在图 5-5 中，我们看到\n\
  \n![](img/78624_3_En_5_Fig5_HTML.jpg)\n\n一个由教授 1、2、3、4 与系 A、B 构成的网络。它包含的链接有：教授 1\
  \ 到 A，以及教授 4 到 B。\n\n图 5-5\n\n通过对象间的**二元**链接说明类之间的一对一关联\n\n*   `教授`对象 1 和 4 各有一条链接，分别指向`系`对象\
  \ A 和 B。\n\n*   `教授`对象 2 和 3 没有此类链接。\n\n此外，从`系`对象的角度来看，每个`系`确实恰好有一条指向`教授`的链接。因此，这个示例维护了`教授`和`系`之间的一对一“主任”关联，同时进一步说明了`教授`类在此类链接参与中的可选性。同样，它只是这两个类之间可能存在的无数种场景中的一种。\n\
  \n## 聚合与组合\n\n**聚合**是一种特殊的关联形式，也可称为“由……组成”、“由……构成”或“拥有”关系。与关联一样，聚合用于表示两个类 A 和 B\
  \ 之间的关系。但是，通过聚合，我们表示的不仅仅是关系：我们是在声明，属于类 A 的对象（称为**聚合体**）由属于类 B 的**组件对象**组成或包含。\n\n\
  例如，一辆汽车由发动机、变速箱、四个车轮等组成，因此如果`汽车`、`发动机`、`变速箱`和`车轮`都是类，那么我们可以形成以下聚合关系：\n\n*   一辆`汽车`***包含***一个`发动机`。\n\
  \n*   一辆`汽车`***包含***一个`变速箱`。\n\n*   一辆`汽车`***包含***多个（此处为四个）`车轮`。\n\n或者，以 SRS 相关的例子来说，我们可以说：\n\
  \n*   一所`大学`***由***多个`学院`组成（工程学院、法学院等）。\n\n*   一个`学院`***由***多个`系`组成。\n\n*   以此类推。\n\
  \n然而，我们通常不会说一个`系`***由***多位`教授`组成；相反，我们可能会说一个`系`***雇佣***了多位`教授`。\n\n请注意，这些聚合声明看起来与关联非常相似，只是关联的名称恰好是“由……组成”或“包含”。这是因为从广义上讲，聚合***就是***一种关联。\n\
  \n那么，为什么还要费心去区分聚合和关联呢？如果聚合本质上是一种关联，我们是否还需要***承认***聚合是类之间一种独特的关系类型？严格来说，答案是否定的。\n\
  \n*   在 UML 中，聚合和关联的概念确实有不同的表示方式，我们将在第 10 章讨论。\n\n*   然而，事实证明，这两种抽象概念最终在代码中的实现方式是完全相同的。\n\
  \n因此，可以说并非绝对有必要区分聚合和关联的概念。尽管如此，任何有志于精通对象建模和 UML 的人都应该意识到这种微妙的区别，哪怕仅仅是为了能够与其他使用此类符号的\
  \ UML 从业者进行有效沟通。\n\n***组合***是一种强形式的聚合，其中“部分”不能脱离“整体”而存在。例如，对于“一本书由多个章节组成”这一关系，我们可以认为，如果一本书不复存在，那么属于它的章节也无法存在；而对于“一辆汽车***由***多个车轮***组成***”这一关系，我们知道车轮可以从汽车上拆下来并仍然有用。因此，我们会将“书-章节”关系归类为***组合***，而将“汽车-车轮”关系归类为***聚合***。\n\
  \n## 继承\n\n尽管你学过的许多用于实现高度代码灵活性和可维护性的面向对象技术（例如封装和信息隐藏）可以说在非面向对象语言中也能以某种形式实现，但**继承**机制才是真正将面向对象语言与非面向对象语言区分开来的关键。\n\
  \n在我们深入讨论继承的工作原理之前，让我们先通过观察缺少继承时会出现的问题，来为继承建立一个令人信服的理由。\n\n\n\n### 以新抽象应对需求变化\n\n\
  假设我们已经通过 `Student` 类准确且全面地建模了学生的所有基本特征，并用 Java 实现了该类。`Student` 类的简化版本如下：\n\n```\n\
  public class Student {\nprivate String name;\nprivate String studentId;\n// 等等\n\
  public String getName() {\nreturn name;\n}\npublic void setName(String name) {\n\
  this.name = n;\n}\npublic String getStudentId() {\nreturn studentId;\n}\npublic\
  \ void setStudentId (String studentId) {\nthis.studentId = studentId;\n}\n// 等等\n\
  }\n```\n\n再假设我们的 `Student` 类已经过严格测试，被证明没有错误，并且实际应用于多个系统中：例如，学生注册系统，以及同一所大学的学生计费系统和校友关系系统。\n\
  \n现在出现了一个新需求：将研究生建模为一种特殊类型的学生。事实证明，除了我们已经为“普通”学生建模的信息之外，我们需要跟踪的研究生信息只有：\n\n*   该学生在进入研究生课程之前获得的学士学位\n\
  *   该学生获得学士学位的院校\n\n描述研究生所需的所有其他特征——属性 `name`、`studentId` 等，以及相应的访问器方法——都与我们已为 `Student`\
  \ 类编程的内容相同，因为研究生***就是***学生，毕竟。\n\n我们该如何应对这个针对 `GraduateStudent` 类的新需求呢？如果我们不精通面向对象的概念，可能会尝试以下方法之一。\n\
  \n### （不恰当的）方法 #1：修改 Student 类\n\n我们可以向现有的 `Student` 类添加属性来反映学士学位信息，并为这些新属性添加“获取”/“设置”方法，如下所示：\n\
  \n```\npublic class Student {\nprivate String name;\nprivate String studentId;\n\
  // 我们为 Student 添加了两个属性，以处理研究生新需求。\nprivate String undergraduateDegree;\nprivate\
  \ String undergraduateInstitution;\n// 等等\n// 我们还添加了四个访问器方法。\npublic String getName(...\n\
  public void setName(...\npublic String getStudentId(...\npublic void setStudentId(...\n\
  public String getUndergraduateDegree(...\npublic void setUndergraduateDegree(...\n\
  public String getUndergraduateInstitution(...\npublic void setUndergraduateInstitution(...\n\
  // 等等\n}\n```\n\n由于这些新特性并非***所有***学生都相关——仅与研究生相关——我们或许只能让这些属性对于尚未获得学士学位的学生保持未初始化状态。然而，为了跟踪这些属性是否应该为某个\
  \ `Student` 对象包含值，我们可能还需要添加一个 `boolean` 属性作为标志，以及该属性的访问器方法：\n\n```\npublic class\
  \ Student {\nprivate String name;\nprivate String studentId;\nprivate String undergraduateDegree;\n\
  private String undergraduateInstitution;\n// 如果这是研究生，我们将下一个属性设为 true，否则设为 false。\n\
  private boolean graduateStudent;\n// 等等\npublic String getName(...\npublic void\
  \ setName(...\npublic String getStudentId(...\npublic void setStudentId(...\npublic\
  \ String getUndergraduateDegree(...\npublic void setUndergraduateDegree(...\npublic\
  \ String getUndergraduateInstitution(...\npublic void setUndergraduateInstitution(...\n\
  public boolean isGraduateStudent(...\npublic void setGraduateStudent(...\n// 等等\n\
  }\n```\n\n最后，在我们为此类编写的任何方法中——或者将来为此类编写的方法中——我们都必须考虑这个 `boolean` 属性的值：\n\n```\npublic\
  \ void display() {\nSystem.out.println(getName());\nSystem.out.println(getStudentId());\n\
  // 如果某个学生不是研究生，那么属性 \"undergraduateDegree\" 和 \"undergraduateInstitution\" 的值\n\
  // 将是未定义/无关的，因此我们只应在处理研究生时打印它们。\nif (this.isGraduateStudent()) {\nSystem.out.println(getUndergraduateDegree());\n\
  System.out.println(getUndergraduateInstitution());\n}\n// 等等\n}\n```\n\n在每个 `Student`\
  \ 方法（`display` 方法只是其中之一）中都必须判断某个学生是否为研究生，这会导致代码混乱，难以调试和维护。然而，如果我们要在混合中添加第三种、第四种或第五种“专门化”的\
  \ `Student` 类型，情况***真的***会变得一团糟。例如，考虑一下如果我们想用它来表示第三种学生类型：即继续教育学生（他们不追求学位，只是为了持续专业提升而修读课程），`display`\
  \ 方法会变得多么复杂。\n\n*   对于这类学生，我们可能希望将他们的当前工作单位作为一个属性来跟踪。\n*   我们很可能还需要添加另一个 `boolean`\
  \ 标志作为属性，以跟踪某个 `Student` 是否为继续教育学生。\n\n我们可能会再次扩展 `Student` 类，如下面代码中**粗体**所示，以反映新添加的属性和访问器方法：\n\
  \n```\npublic class Student {\nprivate String name;\nprivate String studentId;\n\
  private String undergraduateDegree;\nprivate String undergraduateInstitution;\n\
  private String placeOfEmployment;\nprivate boolean graduateStudent;\nprivate boolean\
  \ continuingEdStudent;\n// 等等\npublic String getName(...\npublic void setName(...\n\
  public String getStudentId(...\npublic void setStudentId(...\npublic String getUndergraduateDegree(...\n\
  public void setUndergraduateDegree(...\npublic String getUndergraduateInstitution(...\n\
  public void setUndergraduateInstitution(...\npublic boolean isGraduateStudent(...\n\
  public void setGraduateStudent(...\npublic boolean isContinuingEdStudent(...\npublic\
  \ void setContinuingEdStudent(...\n// 等等\n}\n```\n\n现在，我们还必须在所有涉及 `placeOfEmployment`\
  \ 概念的 `Student` 方法中考虑 `boolean isContinuingEdStudent` 属性的值。看看这对 `display` 方法的逻辑有何影响：\n\
  \n```\npublic void display() {\nSystem.out.println(getName());\nSystem.out.println(getStudentId());\n\
  // 等等\nif (this.isGraduateStudent()) {\nSystem.out.println(getUndergraduateDegree());\n\
  System.out.println(getUndergraduateInstitution());\n}\nif (this.isContinuingEdStudent())\
  \ {\nSystem.out.println(getPlaceOfEmployment());\n}\n// 等等\n}\n```\n\n现在，想象一下，如果我们要容纳***几十种***不同的学生类型，我们的代码会变得多么“意大利面条式”。***方法\
  \ #1 显然不是答案***！这种方法的基本缺陷在于，我们过于努力地试图用***单一***抽象 `Student` 来表示***多种***现实世界对象类型。虽然研究生、继续教育学生和“普通”学生确实有一些共同特征，但它们毕竟是***不同***的对象类型。\n\
  \n\n\n### （不恰当的）方法二：“克隆”学生类来创建研究生类\n\n我们可以通过***复制***`Student.java`的代码来创建一个新的`GraduateStudent`类，将后者重命名为`GraduateStudent`，然后在***副本***中添加研究生所需的额外特性。\n\
  \n以下是生成的`GraduateStudent`类：\n\n```\n// GraduateStudent.java\npublic class GraduateStudent\
  \ {\n// 学生属性被重复！\nprivate String name;\nprivate String birthDate;\n// 等等\n// 添加研究生所需的两个新属性。\n\
  private String undergraduateDegree;\nprivate String undergraduateInstitution;\n\
  // 学生方法被重复！\npublic String getName(...\npublic void setName(...\npublic String getBirthDate(...\n\
  public void setBirthDate(...\n// 等等\n// 添加研究生所需的新访问器方法。\npublic String getUndergraduateDegree(...\n\
  public void setUndergraduateDegree(...\npublic String getUndergraduateInstitution(...\n\
  public void setUndergraduateInstitution(...\n}\n```\n\n这将是一个非常糟糕的设计，因为我们在两个地方（`Student.java`和`GraduateStudent.java`）拥有大量相同的代码。如果以后想要修改某个方法的工作方式或属性的定义——例如，将`birthDate`属性的类型从`String`改为`Date`，并相应修改该属性的访问器方法——那么我们就必须在***两个***类中做出相同的修改。同样，如果我们定义了三种、四种或***十几种***不同的`Student`类型，且它们都是原始`Student`类的“克隆”，那么这个问题会迅速加剧；代码维护的负担将很快变得难以承受。***方法二显然也不是正确答案***！\n\
  \n严格来说，上述两种方法都能工作，但结果代码中固有的冗余/复杂性会使应用程序难以维护。不幸的是，在非面向对象语言中，这种复杂的方法通常是我们处理新对象类型需求的***唯一***选择。难怪随着需求不可避免地随时间演变，应用程序会变得如此复杂且维护成本高昂。幸运的是，我们还有另一种非常强大的方法，专门适用于面向对象编程语言：我们可以利用**继承**机制。\n\
  \n### 正确方法（方法三）：利用继承\n\n使用面向对象编程语言，我们可以通过利用**继承**的力量来解决特化`Student`类的问题。继承是一种通过仅说明新类与已建立的另一个类之间的差异（在特性方面）来定义新类的机制。\n\
  \n使用继承，我们可以声明一个名为`GraduateStudent`的新类，它“原样”继承`Student`类的所有特性。`GraduateStudent`类只需指定与研究生相关的两个额外属性——`undergraduateDegree`和`undergraduateInstitution`——以及它们的访问器方法，如下面的`GraduateStudent`类所示。请注意，在\
  \ Java 类声明中，继承是通过`extends`关键字触发的：`public class` *新类* `extends` *现有类* `{ ... }`。\n\
  \n```\npublic class GraduateStudent extends Student {\n// 声明两个超出 Student 类已声明范围的新属性……\n\
  private String undergraduateDegree;\nprivate String undergraduateInstitution;\n\
  // ……以及每个新属性的访问器方法。\npublic String getUndergraduateDegree {\nreturn undergraduateDegree;\n\
  }\npublic void setUndergraduateDegree(String s) {\nundergraduateDegree = s;\n}\n\
  public String getUndergraduateInstitution {\nreturn undergraduateInstitution;\n\
  }\npublic void setUndergraduateInstitution(String s) {\nundergraduateInstitution\
  \ = s;\n}\n// 这就是 GraduateStudent 类的完整声明！\n// 简洁明了！\n}\n```\n\n这就是我们建立新`GraduateStudent`类所需声明的全部内容：两个属性加上相关的四个访问器方法。无需在`GraduateStudent`的代码中重复`Student`类的任何特性，因为我们会自动继承这些特性。这就像我们“抄袭”了`Student`类的属性和方法代码，从`Student`复制并粘贴到`GraduateStudent`中，但无需实际执行这些繁琐操作。因此，`GraduateStudent`类拥有***n***\
  \ + 6 个特性：在`GraduateStudent.java`文件中显式声明的六个特性，加上从`Student`继承的***n***个特性。\n\n当我们利用继承时，我们起始的原始类——此处为`Student`——被称为（**直接**）**超类**。新类——`GraduateStudent`——被称为（**直接**）**子类**。子类被称为**扩展**其直接超类。\n\
  \n\n\n### 继承的“是一个”本质\n\n继承通常被称为两个类之间的“是一个”关系，因为如果类 B（`GraduateStudent`）派生自类 A（`Student`），那么\
  \ B 实际上***是*** A 的一个特例。因此，任何关于超类的描述也必然适用于其所有子类；也就是说：\n\n*   `Student` 上课，因此 `GraduateStudent`\
  \ 也上课。\n*   `Student` 有导师，因此 `GraduateStudent` 也有导师。\n*   `Student` 攻读学位，因此 `GraduateStudent`\
  \ 也攻读学位。\n\n事实上，判断继承是否合理的一个“试金石”如下：***如果存在某个关于类 A 的描述不适用于其拟议的子类 B，那么 B 就不是 A 的有效子类***。\n\
  \n由于子类是超类的特例，术语**特化**用于指代从一个类派生出另一个类的过程。另一方面，**泛化**则用于指代相反的过程：即识别出几个现有类的共同特征，并为它们创建一个新的、共同的超类。\n\
  \n假设我们现在希望声明一个 `Professor` 类来补充我们的 `Student` 类。`Student` 和 `Professor` 有一些共同特征：属性\
  \ `name`、`birthDate` 等，以及操作这些属性的方法。然而，它们也各自拥有独特的特征：\n\n*   `Professor` 类可能需要属性 `title`（一个\
  \ `String`）和 `worksFor`（对 `Department` 的引用）。\n*   相反，`Student` 类的 `studentID`、`degreeSought`\
  \ 和 `majorField` 属性对于 `Professor` 来说是不相关的。\n\n由于每个类都拥有对方认为无用的属性，因此这两个类都不能从对方派生。然而，在两个地方***重复***它们的公共属性声明和方法代码将非常低效。在这种情况下，我们希望创建一个名为\
  \ `Person` 的新***超类***，将 `Student` 和 `Professor` 共有的特征整合到 `Person` 类中，然后让 `Student`\
  \ 和 `Professor` 通过 `extend` `Person` 来继承这些共同特征。这种情况下的结果代码如下。\n\n首先，我们将在名为 `Person.java`\
  \ 的文件中定义 `Person` 超类：\n\n```\n// Person.java\npublic class Person {\n// 学生和教授共有的属性。\n\
  private String name;\nprivate String address;\nprivate String birthDate;\n// 共有的访问器方法。\n\
  public String getName() {\nreturn name;\n}\npublic void setName(String name) {\n\
  this.name = name;\n}\n// 其他两个属性的方法类似\n// 其他通用的 Person 方法（如果有）将放在这里 - 细节省略。\n}\n\
  ```\n\n接下来，我们将精简之前展示的 `Student` 类，移除那些它将从 `Person` 继承的特征：\n\n```\n// Student.java\n\
  public class Student extends Person {\n// 仅特定于 Student 的属性；冗余属性 - 即那些与 Professor\
  \ 共享，\n// 因此现在由 Person 声明的属性 - 已从 Student 中移除。\nprivate String studentId;\nprivate\
  \ String majorField;\nprivate String degreeSought;\n// 特定于 Student 的访问器方法 - 冗余方法已移除。\n\
  public String getStudentId() {\nreturn studentId;\n}\npublic void setStudentId(String\
  \ studentId) {\nthis.studentId = studentId;\n}\n// 其他两个显式声明的 Student 属性的方法类似。\n\
  // 其他特定于 Student 的方法（如果有）放在这里；细节省略。\n}\n```\n\n最后，我们将定义第二个新的（子）类 `Professor`。这个类将放入一个单独的\
  \ `Professor.java` 文件中：\n\n```\n// Professor.java\npublic class Professor extends\
  \ Person {\n// 仅特定于 Professor 的属性；冗余属性 - 即那些与 Student 共享，\n// 因此现在由 Person 声明的属性\
  \ - 不包含在此处。\nprivate String title;\nprivate Department worksFor;\n// 特定于 Professor\
  \ 的访问器方法放在这里。\npublic String getTitle() {\nreturn title;\n}\npublic void setTitle(String\
  \ title) {\nthis.title = title;\n}\npublic Department getWorksFor() {\nreturn worksFor;\n\
  }\npublic void setWorksFor(Department worksFor) {\nthis.worksFor = worksFor;\n}\n\
  // 其他特定于 Professor 的方法（如果有）放在这里；细节省略。\n}\n```\n\n通过将 `Student` 和 `Professor` 的共享特征泛化到一个名为\
  \ `Person` 的公共超类中，如果将来需要，我们将能够轻松地引入第三种、第四种或第五种 `Person` 类型，并且它们都将通过继承机制***共享这些相同的特征***。此外，如果我们希望为这些子类引入新的子类型——例如将\
  \ `AdjunctProfessor` 和 `TenuredProfessor` 作为 `Professor` 类的子类——它们都将因其共同的 `Person`\
  \ “血统”而派生出一组共同的特征。\n\n### 继承的好处\n\n继承可能是面向对象编程语言中最强大和最独特的方面之一，原因如下：\n\n*   ***我们极大地减少了代码冗余***，从而在需求变更或发现逻辑缺陷时减轻了代码维护的负担。\n\
  *   ***子类比没有继承时简洁得多***。子类只包含将其与其直接超类区分开来的本质内容。例如，从 `GraduateStudent` 类定义中，我们知道研究生是“已经拥有教育机构本科学位的学生”。因此，与相同应用程序的传统/非面向对象版本相比，***给定面向对象应用程序的代码总量显著减少***。\n\
  *   ***通过继承，我们可以在不修改已充分测试的代码的情况下重用和扩展它***。如您所见，我们能够在不以任何方式干扰 `Student` 类代码的情况下创建一个新类\
  \ `GraduateStudent`。因此，我们可以放心，任何依赖于实例化通用 `Student` 对象并向其发送消息的客户端代码都不会受到创建子类 `GraduateStudent`\
  \ 的影响，从而避免了重新测试现有应用程序大部分内容的需要。（相反，如果我们采用非面向对象的方法“修补” `Student` 类代码以试图满足研究生的需求，我们将不得不重新测试整个现有应用程序，以确保没有任何东西“损坏”！）\n\
  *   ***最棒的是，即使我们拥有某个现有类的源代码，我们也可以从中派生新类***！只要我们拥有该类的***编译后的字节码版本***，继承机制就能正常工作；我们不需要类的原始源代码来扩展它。***这是使用面向对象语言实现生产力的最显著方式之一***：找到一个类（无论是别人编写的还是语言内置的），它能完成你所需的大部分功能，然后创建该类的子类，仅添加你为实现自己目的所需的功能。\n\
  \n    我们将在第 6 章中查看一个扩展预定义 Java 集合类的具体示例。\n\n*   最后，正如我们在第 1 章中讨论的，***分类是人类组织信息的自然方式***；因此，我们按照同样的思路组织软件是合情合理的，这使得软件更加直观，从而更易于开发、维护、扩展以及与用户沟通。\n\
  \n\n\n### 类层次结构\n\n随着时间的推移，我们构建了一个通过继承相互关联的类的倒置树；这样的树被称为**类层次结构**。图 5-6 展示了一个类层次结构的示例。请注意，箭头用于从每个子类***向上***指向其直接超类。\n\
  \n![](img/78624_3_En_5_Fig6_HTML.png)\n\n一个包含从 A 到 F 的块的树形图，具有从底部到顶部的层次结构。A 是 Person，B\
  \ 是 Student，C 是 Professor，D 是 Undergraduate，E 是 Graduate，F 是 Continuing。B、D、E 和\
  \ F 被标记为一个子树。\n\n图 5-6\n\n一个示例类层次结构\n\n下面是一些术语说明：\n\n*   我们可以将每个类称为层次结构中的一个**节点**。\n\
  *   层次结构中的任何给定节点都被称为（直接或间接）***派生自***层次结构中其上方所有节点，这些节点统称为其**祖先**。\n*   层次结构中***紧邻***给定节点上方的祖先被认为是该节点的直接超类。\n\
  *   相反，层次结构中给定节点下方的所有节点都被称为其**后代**。\n*   位于层次结构顶部的节点被称为**根节点**。\n*   **终端节点**或**叶节点**是没有后代的节点。\n\
  *   派生自同一直接超类的两个节点被称为**兄弟节点**。\n\n将这些术语应用于图 5-6 中的示例层次结构：\n\n*   类 `A`（`Person`）是整个层次结构的根节点。\n\
  *   类 `B`、`C`、`D`、`E` 和 `F` 都被称为派生自类 `A`，因此都是 `A` 的后代。\n*   类 `D`、`E` 和 `F` 可以被称为派生自类\
  \ `B`。\n*   类 `D`、`E` 和 `F` 是兄弟节点；类 `B` 和 `C` 也是如此。\n*   类 `D` 有两个祖先：`B`（其直接超类）和\
  \ `A`。\n*   类 `C`、`D`、`E` 和 `F` 是终端节点，因为它们（至少目前）没有任何派生自它们的类。\n\n与任何层次结构一样，这个层次结构也可能随时间演变：\n\
  \n*   它可能通过添加新的兄弟节点/分支而***变宽***。\n*   它可能因未来的特化而***向下扩展***。\n*   它可能因未来的泛化而***向上扩展***。\n\
  \n当新需求出现或我们对现有需求的理解加深时，就会对层次结构进行此类更改。例如，我们可能确定需要 `MastersStudent` 和 `PhDStudent`\
  \ 类作为 `GraduateStudent` 的特化，或者需要一个 `Administrator` 类作为 `Student` 和 `Professor` 的兄弟节点。这将产生如图\
  \ 5-7 所示的修订后的层次结构。\n\n![](img/78624_3_En_5_Fig7_HTML.jpg)\n\n一个包含从 A 到 H 的块的树形图，具有从底部到顶部的层次结构。A\
  \ 是 Person，B 是 Student，C 是 Professor，I 是 Admin，D 是 Undergraduate，E 是 Graduate，F\
  \ 是 Continuing，G 是 PhD，H 是 Masters。\n\n图 5-7\n\n类层次结构不可避免地会随时间扩展\n\n### Object 类\n\
  \n在 Java 语言中，内置的 `Object` 类是所有其他引用类型（无论是用户定义的还是语言内置的）的最终超类。即使一个类没有显式声明扩展 `Object`，这种扩展也是隐含的。也就是说，当我们如下声明一个类时：\n\
  \n```\npublic class Person { ... }\n```\n\n就好像我们编写了：\n\n```\npublic class Person\
  \ extends Object { ... }\n```\n\n而无需显式这样做。并且，当我们编写：\n\n```\npublic class Student\
  \ extends Person { ... }\n```\n\n那么，由于 `Person` 类派生自 `Object`，`Student` 也派生自 `Object`。因此，图\
  \ 5-7 所示层次结构的***真正***根节点——以及***所有***（Java）类层次结构的根节点——都是 `Object` 类。\n\n我们将在第 13\
  \ 章深入讨论 `Object` 类的重要性，以及所有 Java 对象最终都派生自 `Object` 这一事实。\n\n### 继承真的是一种关系吗？\n\n\
  关联、聚合和继承都被称为***类***之间的关系。继承与关联和聚合的不同之处在于***对象***层面。\n\n正如你在本章前面所见，关联（以及作为关联特殊形式的聚合）可以说关联了单个对象，即两个不同的对象由于它们各自类之间存在关联而相互链接。另一方面，继承***不***涉及连接不同的对象；相反，继承是一种描述***单个对象***集体特征的方式。通过继承，一个对象***同时***是子类及其所有超类的实例：一个\
  \ `GraduateStudent` 是一个 `Student`，而 `Student` 是一个 `Person`，`Person` 是一个 `Object`，所有这些都合为一体！\n\
  \n因此，再次审视图 5-7 中的层次结构，我们看到：\n\n*   层次结构中的***所有***类——类 A（`Person`）及其所有后代 B 到 I——都可以被认为产生\
  \ `Person` 对象。\n*   类 B（`Student`）及其后代 D 到 H 都可以被认为产生 `Student` 对象。\n\n这种对象具有“多重身份”的概念非常重要，我们将在本书中多次回顾。\n\
  \n所以，回到本节标题提出的问题，继承确实是***类***之间的关系，但***不是***不同***对象***之间的关系。\n\n### 避免类层次结构中的“连锁反应”\n\
  \n一旦建立了类层次结构并编写了应用程序代码，对***非***叶节点类（即那些有后代的类）的更改有可能在层次结构下游引入不希望的连锁反应。例如，如果我们在建立了\
  \ `GraduateStudent` 类之后，回过头来向 `Student` 类添加一个 `minorField` 属性，那么 `GraduateStudent`\
  \ 类将自动继承这个新属性。也许这正是我们想要的；另一方面，当我们最初构思 `Student` 时，可能没有预料到会派生出 `GraduateStudent`\
  \ 类，因此这可能***不是***我们想要的！\n\n作为 `Student` 超类的开发者，如果我们能与所有派生类（`GraduateStudent`、`MastersStudent`\
  \ 和 `PhDStudent`）的开发者沟通，以获得他们对 `Student` 任何拟议更改的批准，那将是***理想的***。但这通常不切实际；事实上，如果我们的代码正在被分发并在其他项目中重用，我们甚至常常***不知道***我们的类已被扩展。这引出了一个通用经验法则：\n\
  \n*只要可能，一旦类以代码形式部署在应用程序中，就应避免向非叶节点类添加功能，以避免在整个继承层次结构中引起连锁反应。*\n\n这说起来容易做起来难！然而，这强调了在面向对象应用程序开发项目中，在进入编码阶段之前，尽可能多花时间在需求分析和对象建模阶段的重要性。这不会阻止新需求随时间出现，但至少我们应该尽一切可能避免对***当前***需求的疏忽。\n\
  \n\n\n### 派生类的规则：“应做事项”\n\n在派生新类时，我们可以通过多种方式对起始的父类进行特化：\n\n*   我们可以通过***添加特性***来***扩展***父类。在我们的\
  \ `GraduateStudent` 示例中，我们添加了六个特性：两个属性——`undergraduateDegree` 和 `undergraduateInstitution`——以及四个访问器方法：`getUndergraduateDegree`/`setUndergraduateDegree`\
  \ 和 `getUndergraduateInstitution`/`setUndergraduateInstitution`。\n\n*   我们还可以***特化***子类执行从父类继承的一个或多个***服务***的方式。\n\
  \n例如，当一名“普通”学生注册课程时，SRS 的业务规则可能要求我们确保：\n\n*   该学生已修完必要的先修课程。\n*   该课程是该学生攻读学位所要求的。\n\
  \n另一方面，当一名***研究生***注册课程时，业务规则可能涉及同时完成上述两项检查，并确保该学生的研究生委员会认为该课程是合适的。\n\n特化子类执行服务的方式——即子类对给定消息的响应方式，与其父类对同一消息的响应方式相比——是通过一种称为**重写**的技术来实现的。\n\
  \n### 重写\n\n重写涉及“重新布线”方法内部的工作方式，而不改变该方法的客户端代码接口/签名。例如，假设我们为 `Student` 类定义了一个 `print`\
  \ 方法，用于打印 `Student` 所有属性的值：\n\n```\npublic class Student {\n// 属性。\nprivate String\
  \ name;\nprivate String studentId;\nprivate String majorField;\nprivate double gpa;\n\
  // 等等。\n// 每个属性的访问器方法也会提供；细节省略。\npublic void print() {\n// 打印 Student 类已知的所有属性的值。\n\
  // （记住：\"\\n\" 是换行符。）\nSystem.out.println(\"学生姓名：  \" + getName() + \"\\n\" +\n\"\
  学号：  \" + getStudentId() + \"\\n\" +\n\"专业领域：  \" + getMajorField() + \"\\n\" +\n\
  \"GPA：  \" + getGpa());\n}\n}\n```\n\n通过继承，`Student` 的所有子类都将继承此方法。\n\n我们继续从 `Student`\
  \ 派生出 `GraduateStudent` 子类，并为 `GraduateStudent` 添加两个属性——`undergraduateDegree` 和\
  \ `undergraduateInstitution`。如果我们采取“懒惰”的方式，直接让 `GraduateStudent` 原样继承 `Student`\
  \ 的 `print` 方法，那么每当我们为 `GraduateStudent` 调用 `print` 方法时，打印出来的将只是从 `Student` 继承的四个属性——`name`、`studentId`、`major`\
  \ 和 `gpa`——因为 `print` 方法被显式编程为只打印这些属性的值。理想情况下，我们希望当为 `GraduateStudent` 调用 `print`\
  \ 方法时，它能打印出这四个属性***以及*** `undergraduateDegree` 和 `undergraduateInstitution` 这两个额外属性。\n\
  \n使用面向对象语言，我们可以***重写***（或取代）父类的方法版本，代之以子类特定的版本。要在 Java 中重写父类的方法（而非仅仅原样继承该方法），必须在子类中重复父类中声明的方法头；然后，我们可以自由地重新编程子类中该方法的***主体***，以特化其行为。\n\
  \n让我们看看 `GraduateStudent` 类如何重写 `Student` 类的 `print` 方法。为方便起见，我在此重复了 `Student` 类的代码：\n\
  \n```\npublic class Student {\n// 属性。\nprivate String name;\nprivate String studentId;\n\
  private String majorField;\nprivate double gpa;\n// 等等。\n// 每个属性的访问器方法也会提供；细节省略。\n\
  public void print() {\n// 打印 Student 类已知的所有属性的值；\n// 再次注意访问器方法的使用。\nSystem.out.println(\"\
  学生姓名：  \" + getName() + \"\\n\" +\n\"学号：  \" + getStudentId() + \"\\n\" +\n\"专业领域：\
  \  \" + getMajorField() + \"\\n\" +\n\"GPA：  \" + getGpa());\n}\n}\n//----------------------------------------------\n\
  public class GraduateStudent extends Student {\nprivate String undergraduateDegree;\n\
  private String undergraduateInstitution;\n// 每个新添加属性的访问器方法也会提供；\n// 细节省略。\n// 我们正在重写\
  \ Student 类的 print 方法；\n// 注意，我们逐字重复了 Student 类中的 print 方法头，这会触发重写。\npublic void\
  \ print() {\n// 我们打印 GraduateStudent 类已知的所有属性的值：\n// 即从 Student 继承的属性以及上面显式声明的属性。\n\
  System.out.println(\"学生姓名：  \" + this.getName() + \"\\n\" +\n\"学号：  \" + this.getStudentId()\
  \ + \"\\n\" +\n\"专业领域：  \" + this.getMajorField() + \"\\n\" +\n\"GPA：  \" + this.getGpa()\
  \ + \"\\n\" +\n\"本科学位：  \" + this.getUndergraduateDegree() +\n\"\\n\" + \"本科院校：\
  \  \" +\nthis.getUndergraduateInstitution());\n}\n}\n```\n\n因此，`GraduateStudent`\
  \ 类的 `print` 版本重写了原本会从 `Student` 类继承的版本。\n\n在复杂的继承层次结构中，我们经常需要多次重写某个方法。在图 5-8 所示的层次结构中：\n\
  \n*   根类 A（`Person`）声明了一个方法头为 `public void print()` 的方法，该方法打印 `Person` 类声明的所有属性。\n\
  *   子类 B（`Student`）重写了此方法，更改了方法体的内部逻辑，使其不仅打印从 `Person` 继承的属性，还打印 `Student` 类自身添加的属性。\n\
  *   子类 E（`GraduateStudent`）再次重写了此方法，使其不仅打印从 `Student` 继承的属性（包括从 `Person` 继承的属性），还打印\
  \ `GraduateStudent` 类自身添加的属性。\n\n请注意，在所有情况下，方法签名***必须***保持不变——`print()`——才能发生重写。\n\
  \n![](img/78624_3_En_5_Fig8_HTML.jpg)\n\n一个包含从 A 到 F 的块的树形图，层次结构从下到上。A 是 Person，B\
  \ 是 Student，C 是 Professor，D 是 Undergraduate，E 是 Graduate，F 是 Continuing。print 命令写在\
  \ A、B、E 和 F 块上。\n\n图 5-8\n\n一个方法可以在类层次结构中被多次重写\n\n在这种情况下，任何没有专门重写某个方法的类，都将继承其最近祖先对该方法的定义。因此：\n\
  \n*   图 5-8 中的类 C 和 D 分别继承由 A 和 B 定义的 `print()` 版本。\n*   B、E 和 F 都在重写其父类的 `print()`\
  \ 方法。\n\n\n\n### 复用超类行为：“super”关键字\n\n前面关于重写的示例并不理想，因为 `GraduateStudent` 的 `print`\
  \ 方法的前四行代码与 `Student` 类中 `print` 方法的代码重复了。以下是 `Student` 版本的该方法：\n\n```\npublic void\
  \ print() {\n// 打印 Student 类已知的所有属性值；再次注意，这里使用了访问器方法。\nSystem.out.println(\"Student\
  \ Name:  \" + getName() + \"\\n\" +\n\"Student No.:  \" + getStudentId() + \"\\\
  n\" +\n\"Major Field:  \" + getMajorField() + \"\\n\" +\n\"GPA:  \" + getGpa());\n\
  }\n```\n\n以下是 `GraduateStudent` 版本：\n\n```\npublic void print() {\n// 这段代码是从 Student\
  \ 版本中重复的！\nSystem.out.println(\"Student Name:  \" + getName() + \"\\n\" +\n\"Student\
  \ No.:  \" + getStudentId() + \"\\n\" +\n\"Major Field:  \" + getMajorField() +\
  \ \"\\n\" +\n\"GPA:  \" + getGpa() + \"\\n\" +\n\"Undergrad. Deg.:  \" + getUndergraduateDegree()\
  \ + \"\\n\" +\n\"Undergrad. Inst.:  \" + getUndergraduateInstitution());\n}\n```\n\
  \n应用程序中应尽可能避免冗余，因为冗余代码会带来维护上的麻烦。当我们需要修改应用程序中某一处的代码时，我们不想还得记住去修改其他无数处，更糟糕的是，忘记修改而导致逻辑不一致。\n\
  \n幸运的是，Java 提供了一种两全其美的方法——也就是说，一种既能***重写*** `print` 方法，又能***同时复用其代码***的方法。我们可以像下面这样为\
  \ `GraduateStudent` 类编写 `print` 方法：\n\n```\npublic class GraduateStudent extends\
  \ Student {\n// 细节省略。\npublic void print() {\n// 通过调用 Student 超类定义的 print 方法来复用代码...\n\
  super.print();\n// ...然后继续做一些额外的事情——即打印这个派生类特有的属性。\nSystem.out.println(\"Undergrad.\
  \ Deg.:  \" + getUndergraduateDegree() + \"\\n\" +\n\"Undergrad. Inst.:  \" + getUndergraduateInstitution());\n\
  }\n}\n```\n\n当我们希望调用由超类定义的方法 *methodName* 的版本时，我们使用 Java 关键字 `super` 作为方法调用的限定符：\n\
  \n```\nsuper.methodName(arguments);\n```\n\n也就是说，在上面的例子中，我们本质上是在对编译器说：“首先，按照超类 `Student`\
  \ 执行 `print` 方法的方式执行它，然后再做一些额外的事情——即打印新的 `GraduateStudent` 属性的值。”\n\n请注意，语法\n\n\
  ```\nsuper.methodName(arguments);\n```\n\n涉及在一个方法内部***调用***另一个方法。让我们看一个稍微复杂一点的例子来强调这种语法。\n\
  \n我们从以下超类声明开始：\n\n```\npublic class Superclass {\npublic void foo(int x, int y)\
  \ { ... }\n}\n```\n\n并从中派生出这个子类：\n\n```\npublic class Subclass extends Superclass\
  \ {\n// 我们正在重写 foo 方法。\n// （注意，这里我们使用 a 和 b 作为参数名来重写超类中的参数 x 和 y；\n// 只要它们的类型相同，这是完全没问题的。）\n\
  public void foo(int a, int b) {\n// 后续细节...\n}\n}\n```\n\n关于如何在子类重写的 `foo` 方法中使用\
  \ `super` 关键字，我们有很多选择，如下面示例中**加粗**的段落（以及相应的注释）所示：\n\n```\npublic class Subclass\
  \ extends Superclass {\n// 我们正在重写 foo 方法。\npublic void foo(int a, int b) {\n// 我们可以将参数值\
  \ a 和 b 传递给超类的 foo 版本...\nsuper.foo(a, b);\n}\n}\n```\n\n或者\n\n```\npublic class\
  \ Subclass extends Superclass {\n// 我们正在重写 foo 方法。\npublic void foo(int a, int b)\
  \ {\nint x = 2;  // 一个局部变量\n// 我们可以将选定的参数值传递给超类的 foo 版本...\nsuper.foo(a, x);\n}\n\
  }\n```\n\n甚至\n\n```\npublic class Subclass extends Superclass {\n// 我们正在重写 foo 方法。\n\
  public void foo(int a, int b) {\nint x = 2;  // 一个局部变量\n// 这里，我们既没有使用 a 也没有使用 b\
  \ 作为参数。\nsuper.foo(x, 3);\n}\n}\n```\n\n请注意，我们对 `super.foo(...)` 的调用可以出现在方法内的任何位置：\n\
  \n```\npublic class Subclass extends Superclass {\n// 我们正在重写 foo 方法。\npublic void\
  \ foo(int a, int b) {\n// 伪代码。\n执行一些操作;\nsuper.foo(a, b);\n// 伪代码。\n执行更多操作;\n}\n\
  }\n```\n\n并且，如果在 `Superclass` 中 `foo` 被声明为具有非 `void` 的返回类型——比如 `int`——我们甚至可以返回调用\
  \ `super.foo(...)` 的结果：\n\n```\npublic class Subclass extends Superclass {\n// 我们正在重写\
  \ foo 方法（这里，我们假设 foo 在超类中被声明为 int 返回类型）。\npublic int foo(int a, int b) {\nint x\
  \ = 3 * a;\nint y = 17 * b;\nreturn super.foo(x, y);\n}\n}\n```\n\n底线是，我们可以以任何合理的方式使用\
  \ `super.`*methodName*`(...)` 来实现子类中被重写方法的版本。\n\n`super` 关键字的另一个重要用途与复用构造函数代码有关；我们将在本章后面了解\
  \ `super` 的这种替代用法。\n\n\n\n### 派生类的规则：“禁忌”\n\n在派生新类时，有些事我们***不应***尝试去做。（事实证明，面向对象语言的编译器实际上会阻止我们成功编译试图执行这些操作的程序。）\n\
  \n***我们不应改变特性的语义——即其意图或含义***。例如：\n\n*   如果超类（如 `Student`）的 `print` 方法旨在在命令窗口中显示对象所有属性的值，那么子类（如\
  \ `GraduateStudent`）的 `print` 方法就不应被重写，例如，将其所有输出重定向到文件。\n\n*   如果超类（如 `Person`）的\
  \ `name` 属性旨在以“姓, 名”的顺序存储人名，那么子类（如 `Student`）的 `name` 属性也应以相同方式使用。\n\n***我们无法物理上删除特性，也不应通过忽略它们来有效删除***。试图这样做会破坏“is\
  \ a”层次结构的精神。根据定义，继承要求类 A 的***所有***祖先的***所有***特性也必须适用于类 A 本身，这样 A 才能成为真正的子类。例如，如果\
  \ `GraduateStudent` 可以删除从 `Student` 继承的 `degreeSought` 属性，那么 `GraduateStudent` ***真的***还是\
  \ `Student` 吗？严格来说，答案是否定的。\n\n此外，从实践角度来看，如果我们通过重写一个方法为“什么都不做”的版本来有效禁用该方法，如下面的 `BadStudent`\
  \ 示例所示：\n\n```\npublic class Student {\n// 细节省略。\npublic void printStudentInfo()\
  \ {\n// 伪代码。\n打印所有属性值...\n}\n}\npublic class BadStudent extends Student {\n// 细节省略。\n\
  // 我们通过“存根化”来重写 Student 的 printStudentInfo 方法——\n// 即提供一个空的方法体，使其实际上什么都不做。\n// （注意：这确实能编译通过！）\n\
  public void printStudentInfo() { }\n}\n```\n\n那么***其他人***可能希望从***我们的***子类派生出一个子类：\n\
  \n```\npublic class NaiveStudent extends BadStudent { ...\n```\n\n假设他们将从我们的 `BadStudent`\
  \ 超类继承一个***有意义的*** `printStudentInfo` 版本。考虑到继承的“全有或全无”特性，尤其是如果其他开发者无法访问 `BadStudent`\
  \ 的***源代码***来查看，他们这样假设是合理的。不幸的是，由于我们破坏了“is a”关系的精神，以损害 `printStudentInfo` 方法的方式，我们给他们——以及任何可能选择从\
  \ `BadStudent` 派生类的人——带来了一个“有缺陷”的方法。***底线是永远不要这样做***！\n\n最后，***我们不应在重写方法时尝试更改其签名***。例如，如果\
  \ `Student` 类从 `Person` 继承的 `print` 方法具有签名 `print()`，那么 `Student` 类就不能将此方法的头部更改为接受一个参数，例如\
  \ `print(int noOfCopies)`。这样做会创建一个完全不同的方法，这是由于另一种语言特性，称为**重载**，这是我们在第 4 章讨论过的概念。也就是说，在以下示例中：\n\
  \n```\npublic class Person {\n// 细节省略。\npublic void print() { ... }\n}\npublic class\
  \ Student extends Person {\n// 细节省略。\n// 我们天真地尝试修改 print 方法的签名。\npublic void print(int\
  \ noOfCopies) { ... }\n}\n```\n\n`Student` 类最终将拥有***两个***重载版本的 `print` 方法：一个显式声明为接受一个\
  \ `int` 参数的版本，以及从 `Person` 类继承的无参数版本。\n\n### 私有特性与继承\n\n如前所述，继承是一种“全有或全无”的命题。也就是说，如果类\
  \ Y 被声明为类 X 的子类：\n\n```\npublic class Y extends X { ... }\n```\n\n那么 Y 不能挑选继承 X\
  \ 的哪些特性。特别是，虽然 X 声明的所有属性将成为所有 Y 类型对象“骨骼结构”的固有部分，但超类 X 的某些属性可能无法在子类 Y 中通过名称***直接引用***，这取决于属性在超类中被赋予的访问权限。\n\
  \n考虑以下代码：\n\n```\npublic class Person {\n访问权限修饰符 int age;\n// 其他细节省略。\n}\n```\n\n\
  你在第 4 章学习了两种访问权限：`public` 和 `private`。事实证明，Java 中实际上有***三种***不同的显式访问权限修饰符关键字。也就是说，*<访问权限修饰符>*\
  \ 可以是以下之一：\n\n*   `private`\n\n*   `public`\n\n*   `protected`（一种仅在超类/子类关系中相关的访问权限修饰符，你很快就会看到）\n\
  \n如果完全省略访问权限修饰符，则特性默认具有所谓的**包可见性**。我们将在第 13 章讨论这个概念。\n\n假设我们按如下方式从 `Person` 派生 `Student`\
  \ 类：\n\n```\npublic class Student extends Person {\n// 细节省略。\n// 我们声明一个操作 age 属性的方法。\n\
  public boolean isOver65( ) {\nif (age > 65) {  // age 在 Person 中被声明为属性，并被 Student\
  \ 继承\nreturn true;\n} else {\nreturn false;\n}\n// 其他细节省略。\n}\n```\n\n当我们尝试编译这个\
  \ `Student` 类时会发生什么？这个问题的答案取决于 `age` 属性在 `Person` 类中声明时被授予了什么访问权限。\n\n如果 `age` 在\
  \ `Person` 中被声明为 `private`，就像大多数属性通常那样：\n\n```\npublic class Person {\nprivate int\
  \ age;\n// 等等。\n}\n```\n\n那么我们在 `Student` 类中以下代码中**高亮**的那行代码上会遇到编译错误：\n\n```\npublic\
  \ class Student extends Person {\n// 细节省略。\npublic boolean isOver65( ) {\nif (age\
  \ > 65) {  // 这行无法编译！\nreturn true;\n}  else {\nreturn false;\n}\n// 其他细节省略。\n}\n\
  ```\n\n错误信息将是：\n\n```\ncannot find symbol\nsymbol:    variable age\nlocation:  class\
  \ Student\nif (age > 65) {\n^\n```\n\n这是为什么？由于 `age` 属性在 `Person` 中被声明为 `private`，符号\
  \ `age` 不会被继承，因此它在 `Student` 类中不在作用域内。然而，当 `Student` 对象被实例化时，为其分配的内存确实允许存储学生的年龄，因为如前所述，它是\
  \ `Person` “骨骼结构”的一部分，而 `Student` 通过继承***是一个*** `Person`。\n\n我们如何绕过这个障碍？事实证明，在 Java\
  \ 中有三种选择。\n\n***选项 #1***：我们可以将 `age` 的访问权限改为 `public`，在 `Person` 中：\n\n```\npublic\
  \ class Person {\npublic int age;\n// 等等。\n}\n```\n\n从而使其被继承，并可在 `Student` 子类中通过名称直接访问。之前在我们的\
  \ `Student` 子类中导致编译器错误的那行代码，即：\n\n```\nif (age > 65) {\n```\n\n现在将无错误地编译。然而，这种方法的缺点是，通过将\
  \ `age` 属性设为 `public`，我们也将允许***客户端代码***自由访问 `age` 属性：\n\n```\npublic class Example\
  \ {\npublic static void main(String[] args) {\nStudent s = new Student();\n// 细节省略。\n\
  s.age = 23; // 这能编译通过，但不可取。\n}\n}\n```\n\n一般来说，这是一种不好的做法，原因在第 4 章已详细讨论过。\n\n***选项\
  \ #2***：我们可以将 `age` 的访问权限修改为 `protected`，在 `Person` 中：\n\n\n\n```\npublic class\
  \ Person {\nprotected int age;\n// 等等\n}\n```\n\n`protected` 访问权限是介于 `private` 和\
  \ `public` 之间的一种“中间地带”，因为 `protected` 特性会被子类继承/***作为符号在作用域内***；也就是说，`age` 现在会在 `Student`\
  \ 类中被识别为一个符号，因此\n\n```\nif (age > 65) {\n```\n\n可以在 `Student` 中编译通过。然而，`protected`\
  \ 特性***无法***被那些***不是***从超类派生的类访问。例如，以下代码无法编译：\n\n```\npublic class Example {\npublic\
  \ static void main(String[] args) {\nStudent s = new Student();\n// 细节省略。\ns.age\
  \ = 23; // 如果 age 在 Person 中被声明为 protected，则此行无法编译。\n}\n}\n```\n\n这算是朝着正确方向迈出的一步，但遗憾的是，它要求我们修改\
  \ `Person` 类的源代码，而我们要尽可能避免这样做。此外，我们甚至可能***没有*** `Person` 的源代码可供使用。\n\n***方案 #3***：***最佳***方法是让\
  \ `age` ***保持***为 `Person` 的 `private` 属性，但使用从 `Person` 类继承的***公开可访问***的 `getAge`/`setAge`\
  \ 方法来操作 `Student` 的年龄值：\n\n```\npublic class Person {\n// 让 age 保持为 private！\nprivate\
  \ int age;\n// 等等\n// 我们假设 Person 声明了公开的\n// get/set 方法用于 age ... 细节省略。\n}\npublic\
  \ class Student extends Person {\npublic boolean isOver65( ) {\n// 一切正常！我们使用公开继承的\
  \ getAge\n// 方法来访问 Student 的年龄。\nif (getAge() > 65) {\nreturn true;\n} else {\n\
  return false;\n}\n}\n```\n\n正如我们在第 4 章首次学到的，最佳实践是始终使用类自身的“get”和“set”方法，从其自身方法内部访问属性值。通过这样做，我们可以利用“get”/“set”方法可能为该属性提供的任何特殊处理。你现在又学到了另一个原因，说明为什么在涉及继承时，这样做是一种最佳实践。\n\
  \n而且，如果我们***没有***继承一个 `public` 的“get”/“set”方法来访问超类声明的 `private` 属性，那么我们可以认为，我们一开始就***不应该***“摆弄”这样的属性！\n\
  \n### 继承与构造函数\n\n你在第 4 章学习了构造函数，它们是用于实例化对象的特殊过程。既然你已经了解了继承，我想提醒你注意，在继承层次结构中，构造函数存在一些复杂性。\n\
  \n#### 构造函数不被继承\n\n构造函数不被继承。这引发了一些有趣的挑战，最好通过示例来说明。\n\n让我们先为 `Person` 类声明一个接受两个参数的构造函数：\n\
  \n```\npublic class Person {\nprivate String name;\nprivate String ssn;\n// 其他细节省略。\n\
  public Person(String n, String s) {\n// 初始化属性。\nsetName(n);\nsetSsn(s);\n// 伪代码。\n\
  执行与实例化 Person 相关的其他复杂操作\n}\n}\n```\n\n从第 4 章关于构造函数的讨论中我们知道，`Person` 类现在只识别一个构造函数签名——即接受两个参数的那个——因为默认的无参构造函数已被消除。（我们稍后会回到这一点，讨论其对继承的影响。）\n\
  \n接下来，让我们从 `Person` 派生 `Student` 类，声明***两个***构造函数——一个接受两个参数，另一个接受三个参数：\n\n```\n\
  public class Student extends Person {\nprivate String major;\n// 其他细节省略。\n// 两个参数的构造函数。\n\
  public Student(String n, String s) {\n// 注意此构造函数与 Person 构造函数之间的逻辑冗余——我们稍后会回来修复。\n\
  // 初始化属性。\nsetName(n);\nsetSsn(s);\nsetMajor(“UNDECLARED”);\n// 伪代码。\n执行与实例化 Person\
  \ 相关的其他复杂操作 ...\n... 以及专门与实例化 Student 相关的更复杂操作。\n}\n// 三个参数的构造函数。\npublic Student(String\
  \ n, String s, String m) {\n// 更多冗余！\n// 初始化属性。\nsetName(n);\nsetSsn(s);\nsetMajor(m);\n\
  // 伪代码。\n执行与实例化 Person 相关的其他复杂操作 ...\n... 以及专门与实例化 Student 相关的更复杂操作。\n}\n}\n```\n\
  \n由于声明了显式构造函数，`Student` 类也失去了其默认的无参构造函数。\n\n我们首先注意到，我们在 `Student` 类的***两个***构造函数中都重复了\
  \ `Person` 构造函数提供的代码：\n\n```\n// 初始化属性。\nsetName(n);\nsetSsn(s);\n// 伪代码。\n执行与实例化\
  \ Person 相关的其他复杂操作 ...\n```\n\n正如我之前多次说过的，在应用程序中应尽可能避免代码冗余；幸运的是，Java 为我们提供了一种机制，可以在子类的构造函数中重用超类的构造函数代码。\n\
  \n\n\n#### 用于构造函数复用的 `super(...)`\n\n我们通过本章前面讨论过的用于复用超类标准方法的同一个 `super` 关键字，来实现超类构造函数的代码复用。不过，复用构造函数代码的语法略有不同。如果我们想显式地复用某个特定父类的构造函数，可以在子类构造函数体中这样引用它：\n\
  \n```\nsuper(arguments);  // 注意，复用构造函数代码时\n// 不涉及“点”操作符\n```\n\n使用 `super(`*参数*`);`\
  \ 来调用超类构造函数，类似于使用 `this(`*参数*`);` 在***同一个***类中从一个构造函数调用另一个构造函数，这是你在第 4 章中学到的技巧。\n\
  \n如果超类存在多个构造函数，我们可以通过传递给 `super(...)` 的参数来选择想要复用的那一个；因为对于给定类，如果构造函数被重载，它们都有唯一的参数签名，编译器可以轻松区分我们调用的是哪个超类构造函数。这在下面修订版的\
  \ `Student` 类中得到了说明（注意**加粗**的代码）：\n\n```\npublic class Student extends Person {\n\
  // name 和 ssn 继承自 Person ...\nprivate String major;\n// 带两个参数的构造函数。\npublic Student(String\
  \ n, String s) {\n// 我们通过传入两个 String 参数（即 n 和 s 的值）来显式调用接受两个\n// String 参数的 Person\
  \ 构造函数。\nsuper(n, s);\n// 然后，继续执行那些仅需为 Student 独特处理的事情。\nsetMajor(\"UNDECLARED\"\
  );\n// 伪代码。\n执行与具体实例化 Student 相关的复杂操作。\n}\n// 带三个参数的构造函数。\npublic Student(String\
  \ n, String s, String m) {\n// 参见上面的注释。\nsuper(n, s);\nsetMajor(m);\n// 伪代码。\n执行与具体实例化\
  \ Student 相关的复杂操作。\n}\n}\n```\n\n需要注意的重要一点是，如果我们在子类构造函数中使用 `super(...)` 语法显式调用超类构造函数，那么该调用***必须***是子类构造函数中的***第一条***语句——也就是说，下面的构造函数将无法编译：\n\
  \n```\npublic Student(String n, String s, String m) {\nsetMajor(m);\n// 这无法编译，因为对超类构造函数的调用必须位于子类构造函数的第一条语句。\n\
  super(n, s);\n}\n```\n\n会出现以下错误信息：\n\n```\ncall to super(n, s) must be first statement\
  \ in constructor\n```\n\n将 `super(...)` 调用作为构造函数中第一行代码的要求，源于继承的“是一个”特性。当我们创建一个 `Student`\
  \ 对象时，实际上我们同时创建了一个 `Object`、一个 `Person` 和一个 `Student`，它们合为一体。因此，无论我们是否在子类构造函数中使用\
  \ `super(...)` ***显式***调用超类构造函数，事实是，Java 在进入给定类的构造函数代码之前，***总是***会尝试执行该类所有祖先类的构造函数，从类层次结构中最通用的到最具体的。例如，如果我们实例化一个\
  \ `Student`\n\n```\nStudent s = new Student(\"Fred\", \"123-45-6789\");\n```\n\n\
  那么，在幕后，会先自动执行一个 `Object` 构造函数，接着执行一个 `Person` 构造函数，然后执行我们显式调用的那个 `Student` 构造函数——在这个例子中，是接受两个\
  \ `String` 参数的那个。问题是，***如果给定超类定义了多个构造函数，那么会调用哪个超类构造函数***？除非我们像在 `Student` 构造函数中那样显式调用某个特定的构造函数，例如\n\
  \n```\npublic Student(String n, String s) {\nsuper(n, s);\n// 等等\n```\n\n否则，超类的无参构造函数会被自动调用。也就是说，如果我们编写一个没有***显式***调用\
  \ `super(`*参数*`)` 的构造函数，如下所示\n\n```\npublic Student(String n, String s) {\n// 没有显式调用\
  \ super(...)\nsetName(n);\nsetSsn(s);\nsetMajor(\"UNDECLARED\");\n// 等等\n}\n```\n\
  \n这相当于我们编写了\n\n```\npublic Student(String n, String s) {\nsuper(); // 隐式调用\nsetName(n);\n\
  setSsn(s);\nsetMajor(\"UNDECLARED\");\n// 等等\n}\n```\n\n***这里就出现了一个潜在问题***，下一节将对此进行描述。\n\
  \n\n\n#### 替换默认无参构造函数\n\n如果某个类我们没有显式定义任何构造函数，那么如第 4 章所述，Java 会尝试为该类提供一个默认的无参构造函数。我们刚刚看到的是，当调用某个***派生***类（如\
  \ `Student`）的默认无参构造函数时，编译器会自动尝试以自顶向下的方式，为继承层次结构中的每个***祖先***类调用一个无参构造函数。因此，在编写如下代码时：\n\
  \n```\n// Person.java\npublic class Person {\n// 属性……细节省略。\n// 未提供显式构造函数！！！\n//\
  \ 我们要“偷懒”，让 Java 为 Person 类提供默认无参构造函数。\n// 方法……细节省略。\n}\n//---------------------------------------\n\
  // Student.java\npublic class Student extends Person {\n// 属性……细节省略。\n// 未提供显式构造函数！！！\n\
  // 我们要“偷懒”，让 Java 为 Student 类提供默认无参构造函数。\n// 方法……细节省略。\n}\n```\n\n这就像我们按如下方式设计了类：\n\
  \n```\n// Person.java\npublic class Person {\n// 属性……细节省略。\n// 如果显式编写，Person 的默认无参构造函数本质上如下所示：\n\
  public Person() {\n// 调用 Object 类的默认构造函数。\nsuper();\n}\n// 方法……细节省略。\n}\n//--------------------------------------------\n\
  // Student.java\npublic class Student extends Person {\n// 属性……细节省略。\n// 如果显式编写，Student\
  \ 的默认无参构造函数本质上如下所示：\npublic Student() {\n// 调用 Person 类的默认构造函数。\nsuper();\n}\n//\
  \ 方法……细节省略。\n}\n```\n\n这意味着，如果我们从类 A 派生出类 B，并且没有为 B 编写显式构造函数，那么 **B 的（默认）无参构造函数会自动寻找\
  \ A 的无参构造函数**。因此，如下示例代码***将无法编译***：\n\n```\n// Person.java\npublic class Person\
  \ {\nprivate String name;\n// 我们为此（超）类编写了一个带一个参数的显式构造函数；\n// 这样做之后，我们就失去了 Person\
  \ 类的默认无参构造函数。\npublic Person(String n) {\nname = n;\n}\n// 注意，我们没有费心用自己的设计来替换无参构造函数。\n\
  // 这将会给我们带来问题，稍后就会看到。\n// 方法……细节省略。\n}\n//------------------------------------\n\
  // Student.java\npublic class Student extends Person {\n// 属性……细节省略。\n// 未提供显式构造函数！！！\n\
  // 我们要“偷懒”，让 Java 为 Student 类提供默认无参构造函数。\n// 方法……细节省略。\n}\n```\n\n当我们尝试编译这段代码时，会收到关于以下\
  \ `Student` 类的***看似非常晦涩***的编译器错误消息：\n\n```\nStudent.java: 找不到符号\n符号:   构造函数 Person()\n\
  位置: 类 Person\npublic class Student extends Person {\n^\n```\n\n这是因为 Java 编译器正试图为\
  \ `Student` 类创建一个不带参数的默认无参构造函数。为了做到这一点，编译器知道它需要能够从 `Student` 默认构造函数内部调用 `Person`\
  \ 的无参构造函数——然而，`Person` 并不存在这样的构造函数！\n\n避免这种困境的最佳方法是记住：***每当为类 X 编写任何显式构造函数时，始终显式地为类\
  \ X 编写一个无参构造函数，以替换“丢失”的默认构造函数***。\n\n### 关于多重继承的简要说明\n\n本章中我们研究的所有继承层次结构都被非正式地称为**单继承**层次结构，因为层次结构中的任何特定类只能有一个***单一***的直接超类/直接祖先。例如，在图\
  \ 5-9 所示的层次结构中：\n\n*   类 B、C 和 I 都有单一的直接超类 A。\n*   类 D、E 和 F 都有单一的直接超类 B。\n*   类\
  \ G 和 H 都有单一的直接超类 E。\n\n![](img/78624_3_En_5_Fig9_HTML.jpg)\n\n一个包含从 A 到 H 的块的树形图，层次结构从下到上。A\
  \ 是 Person，B 是 Student，C 是 Professor，I 是 Admin，D 是 Undergraduate，E 是 Graduate，F\
  \ 是 Continuing，G 是 PhD，H 是 Masters。\n\n图 5-9\n\n一个单继承层次结构示例\n\n如果出于某种原因，我们需要融合两个不同超类的特征来创建一个混合的第三类，**多重继承**似乎就是答案。与单继承相对的多重继承允许类层次结构中的任何给定类拥有***两个或更多***类作为直接祖先。例如，我们有一个代表授课人员的\
  \ `Professor` 类和一个代表听课人员的 `Student` 类。如果有一位教授想通过 SRS 注册一门课程，或者有一位学生——很可能是研究生——被要求教授一门本科课程，我们该怎么办？为了准确地将这两种人中的任何一种表示为对象，我们需要能够将\
  \ `Professor` 类的特征与 `Student` 类的特征结合起来——形成一个混合体 `ProfessorStudent`。这在我们的类层次结构中可能如图\
  \ 5-10 所示。\n\n![](img/78624_3_En_5_Fig10_HTML.jpg)\n\n一个块状图，层次结构从下到上为：ProfessorStudent、Student、Professor、Person。\n\
  \n图 5-10\n\n多重继承允许子类拥有多个直接超类\n\n表面上看，这似乎很方便。然而，多重继承本身存在许多复杂问题——实际上问题如此之多，以至于 Java\
  \ 语言设计者选择不支持多重继承。相反，他们提供了一种替代机制来处理创建具有“分裂人格”的对象的需求：即一个对象可以表现得像两个或更多不同的现实世界实体。这种机制涉及**接口**的概念，将在第\
  \ 7 章中详细探讨。因此，如果你主要对与 Java 语言相关的对象概念感兴趣，可以跳过本节剩余部分。另一方面，如果你好奇为什么多重继承如此棘手，请继续阅读。\n\
  \n前面例子中我们做的事情存在一个问题。我们之前讨论过，通过继承，子类会自动继承其超类的属性和方法。那么当我们有两个或更多直接超类时呢？如果这些超类在特征上没有重叠，那就没问题。但如果有问题的直接超类存在***冲突***的特征——例如，具有***相同***签名但***不同***代码体实现的\
  \ `public` 方法，如下面的简单示例所示，该怎么办？\n\n我们从一个极其简单的 `Person` 类开始，它声明了一个属性和一个方法：\n\n```\n\
  public class Person {\nprivate String name;\n// 访问器方法细节省略。\npublic String printDescription()\
  \ {\nSystem.out.println(getName());\n// 例如 \"John Doe\"\n}\n}\n```\n\n\n\n后来，我们决定通过创建两个子类——`Professor`\
  \ 和 `Student`——来特化 `Person`，这两个子类各自添加了一些属性，并重写了 `printDescription` 方法以利用它们新添加的属性，如下所示：\n\
  \n```\npublic class Student extends Person {\n// 我们添加了两个属性。\nprivate String major;\n\
  private String studentId;\n// 访问器方法细节已省略。\n// 重写从 Person 继承而来的此方法。\npublic String\
  \ printDescription() {\nreturn getName() + \" [\" + getMajor() + \"; \" +\ngetStudentId()\
  \ + \"]\";\n// 例如：\"Mary Smith [Math; 10273]\"\n}\n}\n//------------------------------------\n\
  public class Professor extends Person {\n// 我们添加了两个属性。\nprivate String title;\n\
  private String employeeId;\n// 访问器方法细节已省略。\n// 重写从 Person 继承而来的此方法。\npublic String\
  \ printDescription() {\nreturn getName() + \" [\" + getTitle() + \"; \"\n+ getEmployeeId()\
  \ + \"]\";\n// 例如：\"Harry Henderson [Chairman; A723]\"\n}\n}\n```\n\n请注意，这两个子类都以不同的方式重写了\
  \ `printDescription` 方法，以利用各自类独有的属性。\n\n在该系统演进的未来某个时刻，我们确定需要将单个对象同时表示为 `Student`\
  \ 和 `Professor`，因此我们创建了混合类 `StudentProfessor`，作为 `Student` 和 `Professor` 两者的子类。我们并不特别想添加任何属性或方法——我们只想融合两个超类的特性——因此我们理想中希望按如下方式声明\
  \ `StudentProfessor`：\n\n*   `StudentProfessor` 不能同时继承 `Professor` 和 `Student` 版本的\
  \ `printDescription` 方法，因为那样我们最终会在 `ProfessorStudent` 中得到两个签名相同的（重载）方法，这是 Java 编译器所不允许的。\n\
  \n*   很可能我们***两者都不想***继承，因为两者都没有充分利用另一个超类的属性。也就是说，`Professor` 版本的 `printDescription`\
