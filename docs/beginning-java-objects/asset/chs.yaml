  \n图 14-9\n对象间的多层协作\n\n### ScheduleOfClasses 类\n\n图 14-10 展示了`ScheduleOfClasses`类的\
  \ UML 表示。后续章节将提供关于此类的更多细节。\n\n![](img/78624_3_En_14_Fig10_HTML.png)\n\n一张课程安排类框图，包含学期信息。\n\
  \n图 14-10\n`ScheduleOfClasses`类\n\n#### ScheduleOfClasses 属性\n\n`ScheduleOfClasses`类是一个相当简单的类，它作为我们可能希望将集合对象封装在其他类中的一个示例。它仅包含两个属性：一个简单的`String`，表示该课程安排有效的学期（例如，“SP2005”代表\
  \ 2005 年春季学期）；以及一个`HashMap`，用于维护该学期提供的所有`Section`对象的句柄：\n\n```\nprivate String semester;\n\
  // 此 HashMap 存储 Section 对象引用，使用\n// 课程编号和课程节号的字符串拼接作为键，\n// 例如 \"MATH101 - 1\"。\n\
  private HashMap sectionsOffered;\n```\n\n除了一个简单的构造函数、一个`display`方法以及属性的`accessor`方法之外，`ScheduleOfClasses`类还声明了三个相对简单的方法，如下所述。\n\
  \n#### addSection( )\n\n此方法用于向`HashMap`中添加一个`Section`对象，然后将此`ScheduleOfClasses`对象与该`Section`对象进行双向链接：\n\
  \n```\npublic void addSection(Section s) {\n// 我们通过拼接课程编号和课程节号（用连字符分隔）来构成键。\nString\
  \ key = s.getRepresentedCourse().getCourseNo() +\n\" - \" + s.getSectionNo();\n\
  sectionsOffered.put(key, s);\n// 将 ScheduleOfClasses 与 Section 进行双向链接。\ns.setOfferedIn(this);\n\
  }\n```\n\n#### findSection( )\n\n这是一个便捷方法，用于在封装的集合中查找`Section`，使用传入的完整课程节号作为查找键：\n\
  \n```\n// 完整课程节号是课程编号和课程节号的拼接，用连字符分隔；\n// 例如 \"ART101 - 1\"。\npublic Section findSection(String\
  \ fullSectionNo) {\nreturn sectionsOffered.get(fullSectionNo);\n}\n```\n\n#### isEmpty( )\n\
  \n这是另一个便捷方法，用于判断封装的集合是否为空。在内部，它将判断工作委托给`sectionsOffered`集合：\n\n```\npublic boolean\
  \ isEmpty() {\nif (sectionsOffered.size() == 0) return true;\nelse return false;\n\
  }\n```\n\n### TranscriptEntry 关联类（静态方法）\n\n图 14-11 展示了`TranscriptEntry`类的 UML 表示。后续章节将提供关于此类的更多细节。\n\
  \n![](img/78624_3_En_14_Fig11_HTML.png)\n\n一张成绩单条目框图，包含成绩信息。\n\n图 14-11\n`TranscriptEntry`类\n\
  \n#### TranscriptEntry 属性\n\n正如本章前面所述，`TranscriptEntry`类有一个简单的属性`grade`，并维护与其他三个类的关联（见图\
  \ 14-12）：\n\n![](img/78624_3_En_14_Fig12_HTML.jpg)\n\n学生和课程部分的框图直接连接到成绩单条目和成绩单。学生通过“参加”连接到课程部分，以获取成绩并维护成绩单。\n\
  \n图 14-12\n`TranscriptEntry`维护与 SRS 其他类的多种关系\n\n*   ***获得成绩***，与`Student`的一对多关联\n\
  *   ***分配成绩***，与`Section`的一对多关联\n*   一个未命名的、与`Transcript`类的一对多聚合关系\n\n`TranscriptEntry`位于所有这些关联的“多”端，因此它只需要维护每个类型对象的单个句柄——不需要集合属性：\n\
  \n```\nprivate String grade;\nprivate Student student;\nprivate Section section;\n\
  private Transcript transcript;\n```\n\n#### TranscriptEntry 构造函数\n\n此类的构造函数完成了维护所有这些关系的大部分工作。\n\
  \n通过调用`setStudent`，它将关联的`Student`对象的句柄存储在相应的属性中：\n\n```\n//----------------\n//\
  \ 构造函数。\n//----------------\npublic TranscriptEntry(Student s, String grade, Section\
  \ se) {\nthis.setStudent(s);\n```\n\n请注意，我们选择***不***双向维护*获得成绩*关联；也就是说，我们在此类或`Student`类中都没有提供代码，让`Student`对象获得此`TranscriptEntry`对象的句柄。这个决定基于这样一个事实：我们不期望`Student`对象需要直接操作`TranscriptEntry`对象。每个`Student`对象都有一种间接方式访问其所有`TranscriptEntry`对象，即通过`Student`对象整体维护的其`Transcript`对象的句柄，以及`Transcript`对象反过来维护的其`TranscriptEntry`对象的句柄。您可能会认为，当我们需要确定`Student`在特定`Section`中获得的成绩时，让`Student`对象能够直接获取给定的`TranscriptEntry`可能会很有用，但我们通过`Section`类的`getGrade`方法提供了另一种实现方式。\n\
  \n尽管可能看起来并非如此，但我们正在双向维护与`Section`的*分配成绩*关联。我们在`TranscriptEntry`构造函数中只看到了“握手”的一半：\n\
  \n```\nthis.setSection(se);\n```\n\n但回想一下，当我们查看`Section`类的`postGrade`方法时，我们讨论了`Section`负责维护此关联的双向性。当`Section`的`postGrade`方法调用`TranscriptEntry`构造函数时，`Section`对象会收到此`TranscriptEntry`对象的句柄，并将其存储在相应的属性中。因此，我们只需要在`TranscriptEntry`中关注这个“握手”的后半部分。\n\
  \n另一方面，`TranscriptEntry`对象全权负责维护其自身与`Transcript`对象之间关联的双向性：\n\n```\n// 获取学生的成绩单\
  \ ...\nTranscript t = s.getTranscript();\n// ... 然后将成绩单和成绩单条目\n// 双向链接起来。\nthis.setTranscript(t);\n\
  t.addTranscriptEntry(this);\n}\n```\n\n\n\n#### validateGrade() 与 passingGrade()\n\
  \n`TranscriptEntry` 类提供了我们首个关于 `public static` 方法的 SRS 示例。它声明了两个方法：`validateGrade`\
  \ 和 `passingGrade`，它们可以作为 `TranscriptEntry` 类上的实用方法，在 SRS 应用程序中的任何位置被调用：\n\n*  \
  \ 第一个方法用于验证特定字符串（例如“B+”）是否为有效成绩。此处我们看到了构成此类成绩的业务规则：\n\n    ```\n    public static\
  \ boolean validateGrade(String grade) {\n    boolean outcome = false;\n    if (grade.equals(\"\
  F\") ||\n    grade.equals(\"I\")) {\n    outcome = true;\n    }\n    if (grade.startsWith(\"\
  A\") ||\n    grade.startsWith(\"B\") ||\n    grade.startsWith(\"C\") ||\n    grade.startsWith(\"\
  D\")) {\n    if (grade.length() == 1) outcome = true;\n    else if (grade.length()\
  \ == 2) {\n    if (grade.endsWith(\"+\") ||\n    grade.endsWith(\"-\")) {\n    outcome\
  \ = true;\n    }\n    }\n    }\n    return outcome;\n    }\n    ```\n\n*   第二个方法用于确定特定字符串（例如“D+”）是否为***及格***成绩。在这种情况下，应用了一套略有不同的业务规则：\n\
  \n    ```\n    public static boolean passingGrade(String grade) {\n    boolean outcome\
  \ = false;\n    // 首先，确保它是一个有效成绩。\n    if (validateGrade(grade)) {\n    // 接着，确保成绩为\
  \ D 或更高。\n    if (grade.startsWith(\"A\") ||\n    grade.startsWith(\"B\") ||\n \
  \   grade.startsWith(\"C\") ||\n    grade.startsWith(\"D\")) {\n    outcome = true;\n\
  \    }\n    }\n    return outcome;\n    }\n    ```\n\n正如我们在第 7 章中讨论的，`public static`\
  \ 方法可以在整个宿主类上被调用——换句话说，使用这些方法无需实例化对象。\n\n### Transcript 类\n\n图 14-13 展示了 `Transcript`\
  \ 类的 UML 表示。后续章节将提供关于此类的更多细节。\n\n![](img/78624_3_En_14_Fig13_HTML.png)\n\n成绩单的框图包含“验证完成”命令。\n\
  \n图 14-13\n\n`Transcript` 类\n\n#### Transcript 属性\n\n`Transcript` 类参与两个关系：\n\n*\
  \   ***维护***，与 `Student` 的一对一关联\n*   一个未命名的、与 `TranscriptEntry` 的一对多聚合\n\nSRS 类图没有为\
  \ `Transcript` 类指明任何其他属性，因此我们仅编码这两个：\n\n```\nprivate ArrayList transcriptEntries;\n\
  private Student studentOwner;\n```\n\n#### verifyCompletion()\n\n`Transcript` 类有一个特别有趣的方法\
  \ `verifyCompletion`，用于确定 `Transcript` 是否包含满足特定 `Course` 要求的证据。此方法遍历由 `Transcript`\
  \ 对象维护的 `TranscriptEntries` 的 `ArrayList`：\n\n```\npublic boolean verifyCompletion(Course\
  \ c) {\nboolean outcome = false;\n// 遍历所有 TranscriptEntries，寻找一个\n// 反映所关注课程 Section\
  \ 的条目。\nfor (TranscriptEntry te : transcriptEntries) {\n```\n\n对于每个条目，它获取该条目所代表的\
  \ `Section` 对象的句柄，然后在该对象上调用 `isSectionOf` 方法，以确定该 `Section` 是否代表所关注的 `Course`：\n\
  \n```\nSection s = te.getSection();\nif (s.isSectionOf(c)) {\n```\n\n假设该 `Section`\
  \ 确实相关，该方法接下来使用 `TranscriptEntry` 类的 `static passingGrade` 方法来确定在此 `Section` 中获得的成绩是否为及格成绩。如果是及格成绩，我们可以立即终止循环，因为为了从此方法返回\
  \ `true` 结果，我们只需要找到所关注 `Course` 的***一个***及格成绩示例：\n\n```\n// 确保成绩足够高。\nif (TranscriptEntry.passingGrade(te.getGrade()))\
  \ {\noutcome = true;\n// 我们已经找到一个，因此可以\n// 现在终止循环。\nbreak;\n}\n}\n}\nreturn outcome;\n\
  }\n}\n```\n\n### SRS 驱动程序\n\n现在我们已经编写了 SRS 模型所需的所有类，我们需要一种方法来测试它们。我们可以等到构建了 GUI\
  \ 前端后再全面测试应用程序；然而，尽早（而非推迟）了解核心类是否正常工作会更好。一个非常有用的技术是编写一个命令行驱动的程序，用于实例化不同类型的对象并调用其关键方法，将结果显示在命令行窗口中供我们检查。\n\
  \n我们将通过创建一个名为 `SRS` 的类（其中包含一个 `main` 方法）来开发这样一个程序，该方法将作为我们的测试“驱动程序”。\n\n#### 公共静态属性\n\
  \n我们将在此程序中实例化一些 `Professor`、`Student`、`Course` 和 `Section` 对象，因此我们需要一种方法来组织对这些对象的引用。我们将创建集合对象作为\
  \ `SRS` 类的属性，以保存这些不同的对象类型。同时，我们将它们声明为 `public static` 属性，这意味着我们将这些主要对象集合全局提供给整个应用程序；然后可以在整个\
  \ SRS 应用程序中通过 `SRS.`*集合名称*（例如 `SRS.faculty`）访问它们：\n\n```\n// 通过将对象集合声明为主类中的公共静态属性，\n\
  // 我们可以有效地创建“全局”数据；\npublic static ArrayList faculty;\npublic static ArrayList studentBody;\n\
  public static ArrayList courseCatalog;\n// 下一个集合——Section 对象引用的集合——根据我们在 UML 中建模\
  \ SRS 的方式，\n// 被封装在一个专用类中；\n// 请注意，我们本可以以类似方式封装前三个集合。\npublic static ScheduleOfClasses\
  \ scheduleOfClasses =\nnew ScheduleOfClasses(\"SP2005\");\n```\n\nSRS 的 `ScheduleOfClasses`\
  \ 类作为 `Section` 对象的集合点；对于其他类型的对象，我们使用简单的 `ArrayList`，尽管我们可以继续设计类似于 `ScheduleOfClasses`\
  \ 的类来作为封装的集合，可能分别命名为 `Faculty`、`StudentBody` 和 `CourseCatalog`。我们不需要为 `Transcript`\
  \ 对象（我们将通过 `Student` 对象维护的句柄来访问它们）或 `TranscriptEntry` 对象（我们将通过 `Transcript` 对象本身来访问它们）创建集合。\n\
  \n\n\n#### 主要方法\n\n现在我们将深入探讨 `SRS` 驱动类的 `main` 方法。首先，为四种主要对象类型声明引用变量：\n\n```\npublic\
  \ static void main(String[] args) {\nProfessor p1, p2, p3;\nStudent s1, s2, s3;\n\
  Course c1, c2, c3, c4, c5;\nSection sec1, sec2, sec3, sec4, sec5, sec6, sec7;\n\
  ```\n\n然后，我们将使用它们各自的构造函数来创建对象实例，并将句柄存储在适当的集合中：\n\n```\n// 通过调用适当的构造函数创建各种对象。\n//\
  \ （通常我们会从数据库或文件中读取此类数据……）\n// -----------\n// 教授。\n// -----------\np1 = new Professor(\"\
  Jacquie Barker\", \"123-45-6789\",\n\"兼职教授\", \"信息技术\");\np2 = new Professor(\"\
  Claudio Cioffi\", \"567-81-2345\",\n\"正教授\", \"计算社会科学\");\np3 = new Professor(\"\
  Snidely Whiplash\", \"987-65-4321\",\n\"正教授\", \"体育教育\");\n// 将这些添加到适当的 ArrayList\
  \ 中。\nfaculty = new ArrayList();\nfaculty.add(p1);\nfaculty.add(p2);\nfaculty.add(p3);\n\
  // ---------\n// 学生。\n// ---------\ns1 = new Student(\"Joe Blow\", \"111-11-1111\"\
  , \"数学\", \"理学硕士\");\ns2 = new Student(\"Fred Schnurd\", \"222-22-2222\",\n\"信息技术\"\
  , \"博士\");\ns3 = new Student(\"Mary Smith\", \"333-33-3333\", \"物理\", \"理学学士\");\n\
  // 将这些添加到适当的 ArrayList 中。\nstudentBody = new ArrayList();\nstudentBody.add(s1);\n\
  studentBody.add(s2);\nstudentBody.add(s3);\n// --------\n// 课程。\n// --------\nc1\
  \ = new Course(\"CMP101\",\n\"计算机技术入门\", 3.0);\nc2 = new Course(\"OBJ101\",\n\"\
  软件开发的面向对象方法\", 3.0);\nc3 = new Course(\"CMP283\",\n\"高级语言（Java）\", 3.0);\nc4 = new\
  \ Course(\"CMP999\",\n\"活体大脑计算机\", 3.0);\nc5 = new Course(\"ART101\",\n\"篮筐编织入门\"\
  , 3.0);\n// 将这些添加到适当的 ArrayList 中。\ncourseCatalog = new ArrayList();\ncourseCatalog.add(c1);\n\
  courseCatalog.add(c2);\ncourseCatalog.add(c3);\ncourseCatalog.add(c4);\ncourseCatalog.add(c5);\n\
  ```\n\n我们使用 `Course` 类的 `addPrerequisite` 方法来关联一些 `Course`，使得 `c1` 是 `c2` 的先修课程，`c2`\
  \ 是 `c3` 的先修课程，`c3` 是 `c4` 的先修课程。在我们的测试案例中，唯一没有指定先修课程的 `Course` 是 `c1` 和 `c5`：\n\
  \n```\n// 建立一些先修关系（c1 => c2 => c3 => c4）。\nc2.addPrerequisite(c1);\nc3.addPrerequisite(c2);\n\
  c4.addPrerequisite(c3);\n```\n\n为了创建 `Section` 对象，我们利用了 `Course` 类的 `scheduleSection`\
  \ 方法，你可能还记得，该方法包含一个对 `Section` 类构造函数的嵌入调用。每次调用 `scheduleSection` 都会返回一个指向新创建的 `Section`\
  \ 对象的句柄，我们将其存储在适当的集合中：\n\n```\n// ---------\n// 教学班。\n// ---------\n// 通过调用 Course\
  \ 的 scheduleSection 方法（该方法内部\n// 会调用 Section 的构造函数）来安排每门课程的教学班。\nsec1 = c1.scheduleSection('M',\
  \ \"8:10 - 10:00 PM\", \"GOVT101\", 30);\nsec2 = c1.scheduleSection('W', \"6:10\
  \ - 8:00 PM\", \"GOVT202\", 30);\nsec3 = c2.scheduleSection('R', \"4:10 - 6:00 PM\"\
  , \"GOVT105\", 25);\nsec4 = c2.scheduleSection('T', \"6:10 - 8:00 PM\", \"SCI330\"\
  , 25);\nsec5 = c3.scheduleSection('M', \"6:10 - 8:00 PM\", \"GOVT101\", 20);\nsec6\
  \ = c4.scheduleSection('R', \"4:10 - 6:00 PM\", \"SCI241\", 15);\nsec7 = c5.scheduleSection('M',\
  \ \"4:10 - 6:00 PM\", \"ARTS25\", 40);\n// 将这些添加到课程表中。\nscheduleOfClasses.addSection(sec1);\n\
  scheduleOfClasses.addSection(sec2);\nscheduleOfClasses.addSection(sec3);\nscheduleOfClasses.addSection(sec4);\n\
  scheduleOfClasses.addSection(sec5);\nscheduleOfClasses.addSection(sec6);\nscheduleOfClasses.addSection(sec7);\n\
  ```\n\n接下来，我们使用 `Professor` 类声明的 `agreeToTeach` 方法将 `Professor` 分配给 `Section`：\n\
  \n```\n// 为每个教学班招募一位教授来授课。\np3.agreeToTeach(sec1);\np2.agreeToTeach(sec2);\np1.agreeToTeach(sec3);\n\
  p3.agreeToTeach(sec4);\np1.agreeToTeach(sec5);\np2.agreeToTeach(sec6);\np3.agreeToTeach(sec7);\n\
  ```\n\n然后，我们通过让 `Student` 使用 `enroll` 方法注册到各个 `Section` 来模拟学生注册。回想一下，该方法会返回由我们的\
  \ `EnrollmentStatus enum`（枚举）定义的一组预定义状态值之一，因此为了显示每种情况下返回的状态，我们创建了一个“辅助”的 `reportStatus`\
  \ 方法，专门用于格式化信息消息：\n\n```\nSystem.out.println(\"===============================\"\
  );\nSystem.out.println(\"学生注册已开始！\");\nSystem.out.println(\"===============================\"\
  );\nSystem.out.println();\n// 模拟学生尝试注册到各个课程的教学班。\nSystem.out.println(\"学生 \" + s1.getName()\
  \ +\n\" 正在尝试注册到 \" +\nsec1.toString());\nEnrollmentStatus status = sec1.enroll(s1);\n\
  this.reportStatus(status);\n```\n\n由于前面的三行代码——`println`、`enroll` 和 `reportStatus`\
  \ 方法调用——将会重复多次，我们编写了一个名为 `attemptToEnroll` 的“辅助”方法来完成这三件事，并在程序的其余部分使用更简洁的 `attemptToEnroll(...)`\
  \ 语法。（`attemptToEnroll` 方法稍后会单独讨论。）\n\n```\n// 尝试让同一名学生同时注册同一门课程的不同教学班！这应该会失败。\n\
  attemptToEnroll(s1, sec2);\n// 这个注册请求应该没问题……\nattemptToEnroll(s2, sec2);\n// ……但是在这里，该学生尚未满足先修课程要求，因此注册请求应被拒绝。\n\
  attemptToEnroll(s2, sec3);\n// 这些请求应该都没问题。\nattemptToEnroll(s2, sec7);\nattemptToEnroll(s3,\
  \ sec1);\n// 尘埃落定后，以下是成功注册的学生情况：\n//\n// sec1:  s1, s3\n// sec2:  s2\n// sec7: \
  \ s2\n```\n\n接下来，我们通过为每个 `Student`-`Section` 组合调用 `postGrade` 方法来模拟学期末的成绩录入：\n\n\
  ```\n// 学期结束了（哇，真快！）。教授们为特定学生打分。\nsec1.postGrade(s1, \"C+\");\nsec1.postGrade(s3,\
  \ \"A\");\nsec2.postGrade(s2, \"B+\");\nsec7.postGrade(s2, \"A-\");\n```\n\n最后，我们通过显示所创建的各种对象的内部状态——本质上是一个“对象转储”——来充分利用我们的各种\
  \ `display` 方法：\n\n```\n// 让我们通过调用各种 display() 方法来检查一切是否设置正确。\nSystem.out.println(\"\
  ====================\");\nSystem.out.println(\"课程表：\");\nSystem.out.println(\"====================\"\
  );\nSystem.out.println();\nscheduleOfClasses.display();\nSystem.out.println(\"======================\"\
  );\nSystem.out.println(\"教授信息：\");\nSystem.out.println(\"======================\"\
  );\nSystem.out.println();\np1.display();\np2.display();\np3.display();\nSystem.out.println(\"\
  ====================\");\nSystem.out.println(\"学生信息：\");\nSystem.out.println(\"\
  ====================\");\nSystem.out.println();\ns1.display();\ns2.display();\n\
  s3.display();\n}\n```\n\n以下是前面提到的 `attemptToEnroll` 辅助方法，以及它内部使用的 `reportStatus`\
  \ 方法：\n\n```\nprivate static void reportStatus(EnrollmentStatus s) {\nSystem.out.println(\"\
  状态：\" + s.value());\nSystem.out.println();\n}\nprivate static void attemptToEnroll(Student\
  \ s, Section sec) {\nSystem.out.println(\"学生 \" + s.getName() +\n\" 正在尝试注册到 \" +\n\
  sec.toString());\n// 在一个辅助方法内部调用另一个辅助方法！\nreportStatus(sec.enroll(s));\n}\n}\n```\n\
