  \ (varargs) 总结\n\n在本书的第一部分，你已经对 Java 语法有了扎实的了解，特别是它如何用于说明基本的对象概念。然而，在深入探讨学生注册系统\
  \ (SRS) 模型层的具体编码之前，我们想向你介绍更多关于 Java 语言的细节，这些细节将在后续编写 SRS 模型层时用到。\n\n在本章中，你将了解：\n\
  \n*   Java 归档（“jar”）文件的本质和用途\n\n*   Java 文档注释的机制\n\n*   `String` 的对象本质\n\n*   一种称为\
  \ `enum` 的特殊类，可用于枚举特定变量允许采用的显式值\n\n*   如何通过链接消息来形成高度复杂的表达式\n\n*   对象如何在其自身方法内部引用自身\n\
  \n*   Java 运行时异常的本质以及如何优雅地处理它们，包括定义和使用我们自己的自定义异常类型\n\n*   为命令行驱动的“无 GUI”程序提供输入的几种方法\n\
  \n*   Java `Object` 类的一些重要特性\n\n## Java 专用术语\n\n如前所述，本书的目的是向你传授对象原则，这些原则在很大程度上是与语言无关的，因此，我倾向于使用通用的（有时是非正式的）面向对象术语，而不是\
  \ Oracle 使用的 Java 专用术语。话虽如此，我现在想向你介绍一些 ***Java 专用术语***，这些术语用于描述 Oracle 公司维护的正式 Java\
  \ 语言规范 (JLS) 中使用的一些基本对象概念。\n\n表 13-1\n\n通用面向对象术语与 Java 术语对比\n\n| 本书使用的通用面向对象术语 |\
  \ Sun Microsystems 使用的正式 Java 专用术语 | 用于描述以下概念 |\n| --- | --- | --- |\n| 属性 | 字段，实例变量\
  \ | 每个对象创建一次，即类的每个实例。每个对象都有自己独立的一组实例变量。 |\n| 静态变量（非正式：静态属性） | 静态字段，类变量 | 每个类只存在一次的变量。\
  \ |\n| 方法 | 实例方法 | 在对象上调用的函数。 |\n| 静态方法 | 类方法 | 可以在整个类上调用的函数，无需引用特定对象。类方法既不能调用实例方法，也不能访问实例变量。\
  \ |\n| 特性 | 成员 | 类中可能被继承的那些组件：例如，实例/类变量和实例/类方法，但***不***包括构造函数。 |\n\n为了完善这些术语，术语**局部变量**指的是在方法内部声明的变量，因此其作用域局限于该方法。（方法参数也局部于该方法，但\
  \ Java 将它们与“局部变量”区分开来）。局部变量既不是静态变量也不是实例变量。\n\n以下代码片段说明了所有三种类型的变量：\n\n```\npublic\
  \ class Student {\n// 属性。\nprivate String name;  // <== name 是一个实例变量\nprivate static\
  \ int totalStudents;  // <== totalStudents 是一个\n//  类变量\n// 方法。\npublic void foo(int\
  \ y) { // <== 参数 y 局部于该方法\nint x;  // <== x 是一个局部变量\n// 等等。\n}\n// 等等。\n}\n```\n\
  \n## Java 归档 (jar) 文件\n\n构成应用程序的 Java 字节码通常以 **Java 归档（“jar”）文件**的形式进行打包和交付。让我们以一个简单的应用程序为例，它包含：\n\
  \n*   三个用户定义类型——类 `Person`、`Student` 和 `Professor`\n\n*   一个名为 `MyApp` 的 `main`\
  \ 方法包装类\n\n来说明 jar 文件的使用。我们简单示例的代码如下所示：\n\n```\npublic class Person {\nprivate String\
  \ name;\npublic void setName(String n) {\nname = n;\n}\n}\npublic class Student\
  \ extends Person {\nprivate Professor advisor;\npublic void setAdvisor(Professor\
  \ p) {\nadvisor = p;\n}\n}\npublic class Professor extends Person {\nprivate String\
  \ title;\npublic void setTitle(String t) {\ntitle = t;\n}\n}\n```\n\n以支持以下程序：\n\n\
  ```\npublic class MyApp {\npublic static void main(String[] args) {\nProfessor p\
  \ = new Professor();\nStudent s = new Student();\ns.setAdvisor(p);\n}\n}\n```\n\n\
  \n\n### 创建 Jar 文件\n\n首先，编译我们的代码：\n\n```\njavac *.java\n```\n\n然后，要创建一个 jar 文件，我们输入：\n\
  \n```\njar cvf jar 文件名.jar 要包含在 jar 文件中的文件列表\n```\n\n其中命令行参数 `cvf` 表示：\n\n*   我们希望\
  \ `c`***创建***一个 jar 文件。\n\n*   我们希望命令是 `v`***详细***的——也就是说，我们希望命令在创建 jar 文件时显示所有正在进行的操作。\n\
  \n*   我们正在指定要创建的 jar 文件的（`f`***文件***）名。\n\n例如，要将我们简单应用程序的字节码放入一个名为 `MyJar.jar` 的\
  \ jar 文件中，我们可以输入：\n\n```\njar cvf MyJar.jar Person.class Student.class Professor.class\
  \ MyApp.class\n```\n\n（请注意，字节码文件可以按任意顺序列出）。或者，我们可以使用通配符一次包含多个文件：\n\n```\njar cvf\
  \ MyJar.jar *.class\n```\n\n由于我们使用了 `v`（详细）命令选项，`jar` 工具将显示以下输出：\n\n```\nadded manifest\n\
  adding: Person.class(in = 222) (out= 178)(deflated 19%)\nadding: Student.class(in\
  \ = 419) (out= 287)(deflated 31%)\nadding: Professor.class(in = 219) (out= 176)(deflated\
  \ 19%)\nadding: MyApp.class(in = 1751) (out= 1021)(deflated 41%)\n```\n\n请注意，我们可以在\
  \ jar 文件中包含任何我们想要的文件类型，而不仅仅是字节码文件。例如，如果我们想将源代码和字节码一起归档，我们可以输入命令：\n\n```\njar cvf\
  \ MyJar.jar *.class *.java\n```\n\njar 文件实际上是一个 ZIP 文件。虽然我们将通过 Java 开发工具包（JDK）附带的命令行\
  \ `jar` 工具来创建、检查以及（偶尔）从 jar 文件中提取单个字节码文件，但许多标准的 ***ZIP*** 工具也能够读取/提取 jar 文件中的文件。因此，与\
  \ ZIP 文件一样，我们实际上可以在 jar 中存储任何文件类型：源代码、字节码、图像文件，甚至其他 jar 文件。\n\n### 检查 Jar 文件的内容\n\
  \n要检查/列出 jar 文件的内容而不“解压”（提取）文件，我们使用命令：\n\n```\njar tvf jar 文件名.jar\n```\n\n其中 `t`\
  \ 命令行参数表示我们希望查看指定 jar 文件的 `t`***目录***，例如：\n\n```\njar tvf MyJar.jar\n```\n\n输出：\n\
  \n```\n0 Sun Feb 20 13:55:34 EST 2005 META-INF/\n71 Sun Feb 20 13:55:34 EST 2005\
  \ META-INF/MANIFEST.MF\n222 Mon Feb 07 16:07:16 EST 2005 Person.class\n419 Fri Feb\
  \ 18 10:06:02 EST 2005 Student.class\n219 Mon Feb 07 16:07:16 EST 2005 Professor.class\n\
  1751 Wed Feb 06 07:36:44 EST 2002 MyApp.class\n```\n\n一旦我们的 jar 文件创建完成，就可以轻松地将其与用户或其他开发者共享，例如通过电子邮件附件发送，或将其存储在网络文件系统的共享位置。\n\
  \n### 使用 Jar 文件中的字节码\n\n要告知 JVM 我们想要***使用*** jar 文件中的字节码，我们使用一个命令行选项来设置一个名为 **classpath**\
  \ 的环境变量，如下所示：\n\n```\njava –cp jar 文件路径 包含 main 方法的类\n```\n\n例如，如果我们将 `MyJar.jar`\
  \ 文件存储在名为 `S:\\applications` 的共享目录中，那么要执行存储在该 jar 文件***内部***的 `MyApp` 程序，我们可以输入：\n\
  \n```\njava –cp S:\\applications\\MyJar.jar MyApp\n```\n\n如果同时需要引用多个 jar 文件，在 DOS\
  \ 下引用之间用分号分隔，在 UNIX 下用冒号分隔，例如，在 DOS 下：\n\n```\njava –cp S:\\applications\\MyJar.jar;T:\\\
  stuff\\AnotherJar.jar SomeApp\n```\n\n### 从 Jar 文件中提取内容\n\n请注意，我们***不需要***从 jar\
  \ 文件中提取字节码才能使用它；JVM 能够根据需要从 jar 文件***内部***检索单个字节码文件。但是，如果我们希望从 jar 文件中提取选定的文件——比如说，其中包含了\
  \ Java 源文件，并且我们想处理单个源文件——我们可以输入命令：\n\n```\njar xvf jar 文件名.jar 要提取的文件列表（以空格分隔）\n\
  ```\n\n例如：\n\n```\njar xvf MyApp.jar Student.java Professor.java\n```\n\n其中 `x`\
  \ 命令选项表示我们希望***提***`x`***取***文件；要提取 jar 文件中的***所有***源代码，我们可以输入：\n\n```\njar xvf\
  \ MyApp.jar *.java\n```\n\n而要提取 jar 文件中的***所有内容***，我们可以输入：\n\n```\njar xvf MyApp.jar\n\
  ```\n\n请注意，如果你将 jar 文件的内容提取到一个包含同名文件的目录中，提取的文件将自动***覆盖***同名的文件；你***不会***事先收到警告！因此，在将\
  \ jar 文件“解压”到某个目录之前，最好先备份该目录中的文件，或者，始终在一个单独的空目录中“解压”文件。\n\n### “打包”整个目录层次结构\n\n\
  可以通过以下命令将整个目录层次结构（所有子文件夹）的内容合并到一个 jar 文件中：\n\n```\njar cvf jar 文件名 顶层目录名\n```\n\n\
  例如，本书附带的 SRS 代码示例存储在我计算机上一个名为 `C:\\My Documents\\BJO Second Edition\\Code` 的父目录下的目录层次结构中。要创建一个包含所有代码的\
  \ jar 文件，我可以输入命令：\n\n```\njar cvf BJOcode.jar \"C:\\My Documents\\BJO Second Edition\\\
  Code\"\n```\n\n（注意，如果路径包含空格，我们使用双引号将其括起来）或者，也可以：\n\n```\ncd \"C:\\My Documents\\\
  BJO Second Edition\"\njar cvf BJOcode.jar Code\n```\n\n以下摘录的结果输出说明了如何遍历所有子目录以将其内容包含在\
