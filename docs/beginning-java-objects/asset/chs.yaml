  \n> 此致\n> \n> *杰奎*\n\n引言\n\n首先，这是一本关于软件对象的书：它们是什么，为什么它们如此“神奇”却又如此直接，以及如何构建一个软件应用程序来恰当地使用对象。\n\
  \n这也是一本关于 Java 的书：不是一本硬核的、“关于 Java 的一切”的书，而是一本温和而全面的语言入门书，特别强调如何从对象模型过渡到可运行的 Java\
  \ 应用程序——这是其他书籍很少（如果有的话）提供的内容。\n\n## 本书目标\n\n我写这本书的目标（希望也是你购买它的目标）是：\n\n*   ***让你熟悉基本的面向对象术语和概念。***\n\
  \n*   ***让你获得对象建模的动手实践经验***，即开发一个面向对象的“蓝图”，作为后续构建面向对象软件系统的基础。\n\n*   ***说明如何将这样的对象模型转化为可运行的软件应用程序——具体来说是\
  \ Java 应用程序***，尽管你将学到的对象建模技术同样适用于任何面向对象语言。\n\n*   ***在此过程中帮助你成为一名熟练的 Java 程序员。***\n\
  \n如果你已经熟悉 Java 语言（但不熟悉面向对象基础），那么了解其面向对象的根源对于成功使用该语言至关重要。另一方面，如果你是 Java 新手，那么这本书将为你提供恰当的“起步指导”。***无论哪种情况，对于任何希望精通\
  \ Java 等面向对象编程语言的人来说，这本书都是“必读之作”。***\n\n同样重要的是，本书***并非***旨在：\n\n*   ***让你一夜之间成为对象建模专家：***\
  \ 像所有高级技能一样，完全掌握对象建模需要两样东西：扎实的理论基础和大量的实践！我在本书中为你提供了基础，包括统一建模语言（UML）的介绍，UML 是渲染软件应用程序面向对象“蓝图”的行业标准。（UML\
  \ 于 1997 年首次被采纳为面向对象软件系统建模的标准，至今仍具有现实意义。）话虽如此，真正精通对象建模的唯一方法是长期参与面向对象建模和开发项目。\n\n\
  \    我的书将赋予你技能，并希望赋予你***信心***，让你开始在专业环境中应用对象技术，而这正是你真正学习发生的地方，特别是如果你有一位经验丰富的面向对象导师来指导你完成第一个“工业级”项目。\n\
  \n*   ***教你关于 Java“所有”需要知道的知识：*** Java 是一门非常丰富的语言，包含数百个核心类和数千个可由这些类执行的操作。此外，Oracle\
  \ 公司大约每年都会发布新版本的 Java 语言，但好消息是，以恰当的面向对象方式表示软件问题所需的关键 Java 特性多年来并未改变。如果 Java 提供了十几种替代方法来完成某项特定任务，我会解释我认为最适合当前问题的一两种方法，让你了解事情是如何完成的。尽管如此，你在本书中一定会学到足够的\
  \ Java 语言知识，为担任专业 Java 程序员做好准备。\n\n凭借从本书中获得的基础，你将做好准备，能够欣赏市面上众多其他 Java 参考书所提供的更全面的\
  \ Java 讲解，或者通过深入的 UML 参考书对对象建模技术进行更深入的研究。我们将在第 15 章中推荐此类书籍。\n\n\n\n## 为什么理解对象对于成为成功的面向对象程序员至关重要？\n\
  \n我一次又一次地遇到这样的软件开发人员——在我工作的地方、客户办公室、专业会议上、大学校园里——他们试图通过参加 Java 课程、阅读 Java 书籍或安装使用\
  \ Eclipse、IntelliJ IDEA、NetBeans 或 BlueJ 等 Java 集成开发环境（IDE）来掌握 Java 这样的面向对象编程语言（OOPL）。然而，几乎所有方法都缺少一个根本性的要素：对对象本质的基本理解，更重要的是，***掌握如何从头开始构建软件应用程序以充分利用对象的知识***。\n\
  \n想象一下，有人请你建造一栋房子，而你了解房屋建造的基础知识。事实上，你是一位享誉全球、服务供不应求的房屋建造专家！你使用过所有已知的建筑材料——砖、木材、石材、金属等——建造过各种建筑风格的房屋。因此，当客户告诉你他们想让你使用一种他们提供的新型建筑材料时，你欣然同意。\n\
  \n![](img/78624_3_En_BookFrontmatter_Figc_HTML.jpg)\n\n插图描绘了一位女性角色和一袋美元，背景是四栋房屋结构。\n\
  \n开工当天，一辆卡车驶入工地，卸下一大堆奇形怪状的蓝色星形积木，中间还有孔洞。你完全懵了！你用熟悉的材料建造过无数房屋，但面对如何用蓝色星星组装房屋，你***毫无头绪***。\n\
  \n![](img/78624_3_En_BookFrontmatter_Figd_HTML.jpg)\n\n图片中一个人物角色挠着头，旁边散落着各种星星。\n\
  \n你挠着头，拿出锤子和钉子，试图像处理木材一样把蓝色星星钉在一起，但星星之间根本无法很好地契合。接着，你尝试用砌砖用的砂浆填补缝隙，但砂浆也粘不住这些蓝色星星。然而，由于你必须在严格的成本和工期限制下为客户建造这栋房子（而且你羞于承认，作为***专家***级的房屋建造者，你竟然不知道如何使用这些现代材料），你只能硬着头皮继续干。最终，你拼凑出了一个（至少表面上）看起来像房子的东西。\n\
  \n![](img/78624_3_En_BookFrontmatter_Fige_HTML.jpg)\n\n一幅草图：一个人物角色挠着头，旁边文字写着“我希望这已经够好了”，背景是一栋房屋结构、一棵树和太阳。\n\
  \n客户前来验收，结果大失所望。他们选择蓝色星星作为建筑材料的原因之一，是这种材料极其节能；但由于你用钉子和砂浆来组装星星，它们固有的隔热性能大打折扣。\n\n\
  为了弥补，客户要求你更换房屋所有窗户，改用三层隔热玻璃窗，以减少热量散失。***此时你惊慌失措！*** 更换窗户意味着你必须彻底拆开墙壁，这无异于毁掉整栋房子。\n\
  \n当你把情况告诉客户时，他们***勃然大怒***！他们选择蓝色星星作为建筑材料的另一个原因，是其模块化特性，便于适应设计变更；但由于你组装星星的方式不当，这种灵活性也丧失了。\n\
  \n![](img/78624_3_En_BookFrontmatter_Figf_HTML.jpg)\n\n一幅插图：两个人形角色，旁边文字写着“干得真差劲！”和“你还自称建造师！！”，背景是一栋房屋结构、一棵树和太阳。\n\
  \n可悲的是，这正是许多程序员在构建面向对象应用程序时的写照——他们缺乏对这种应用程序基本构建块（即软件对象）核心属性的适当培训。更糟糕的是，绝大多数准面向对象程序员对理解对象是使用面向对象语言编程的必要条件浑然不觉。于是，他们直接开始用\
  \ Java 这样的语言编程，最终结果远非理想：当应用程序部署后，面对不可避免的“中途修正”以应对需求变化时，应用程序缺乏灵活性。\n\n## 这本书为谁而写？\n\
  \n***任何希望充分利用 Java 这类面向对象编程语言的人！*** 本书专为以下人群编写：\n\n*   尚未接触 Java，但希望从一开始就正确掌握该语言的人\n\
  *   曾购买 Java 书籍并认真阅读，理解语言的“位和字节”，但不太清楚如何构建应用程序以充分利用 Java 面向对象特性的人\n*   曾构建过 Java\
  \ 应用程序，但当应用程序生命周期后期出现新需求时，因维护或修改困难而感到失望的人\n*   曾学习过对象建模相关知识，但对如何从对象模型过渡到真实代码（Java\
  \ 或其他语言）感到“模糊”的人\n\n归根结底，***任何真正想掌握 Java 这类面向对象语言的人，必须首先成为对象方面的专家！***\n\n为了从本书中获得最大价值，你应具备一定的编程经验；几乎任何编程语言都可以。你需要理解简单的编程概念，例如：\n\
  \n*   简单数据类型（整数、浮点数等）\n*   变量及其作用域（包括全局数据的概念）\n*   流程控制（“`if` ... `then` ... `else`”语句、`for`/do/while\
  \ 循环等）\n*   数组是什么以及如何使用\n*   软件函数/子程序/过程的概念：如何传入数据并返回结果\n\n但你无需事先接触过 Java。也无需接触过对象——至少从软件意义上讲！正如你将在第\
  \ 2 章中学到的，人类天生就会从对象的角度看待整个世界。\n\n即使你已经开发过一个完整的 Java 应用程序，如果你在构建应用程序的对象方面仍感到模糊，现在阅读本书也绝不晚；了解面向对象的“为什么”而不仅仅是语言的机制，最终会让你成为更优秀的\
  \ Java 程序员。你很可能在本书中看到一些熟悉的内容（以 Java 代码示例的形式），但当你学习在 Java（或其他任何面向对象编程语言）编程中许多做法的原理时，希望能获得许多新的见解。\n\
  \n由于本书源于我在大学授课的课程，因此非常适合作为大学一学期课程或高中高级先修课程中对象建模或 Java 编程的教材。\n\n## 如果你对对象建模感兴趣，但不一定对\
  \ Java 编程感兴趣呢？\n\n我的书对你还有价值吗？***当然有！*** 即使你不打算以编程为职业（正如我的许多对象建模学生那样），我发现接触用 Java\
  \ 这类面向对象语言编写的代码示例，确实有助于巩固对象概念。因此，即使你之后从未打算动手进行 Java 编程，也鼓励你阅读第 1 部分和第 3 部分。\n\n\
  ## 本书的组织结构\n\n本书围绕三大主题展开，如下所述。\n\n\n\n### 第一部分：对象基础入门\n\n在深入探讨对象建模的具体方法以及 Java 中面向对象编程的细节之前，确保我们对对象相关术语的理解保持一致至关重要。第一部分包含第\
  \ 1 章至第 7 章，将从定义所有软件开发方法（无论是否面向对象）所依赖的基本概念入手，循序渐进地展开。不过，这些章节会迅速过渡到高级对象概念的讨论，因此到第一部分结束时，你将具备“对象敏锐度”。\n\
  \n### 第二部分：对象建模 101\n\n在第二部分（本书第 8 章至第 12 章）中，我将重点阐述我们在开发应用程序对象模型时所做工作的基本原则，以及更重要的是，***为什么***要这样做——这些原则是所有对象建模技术所共有的。熟悉\
  \ UML 非常重要，因此我会教你 UML 的基础知识，并在本书的所有具体建模示例中使用它。运用这些章节中介绍的建模技术，我们将为学生注册系统（SRS）开发一个对象模型“蓝图”，该系统的需求规格说明将在本引言末尾给出。\n\
  \n### 第三部分：将对象“蓝图”转化为 Java 代码\n\n在本书的第三部分（第 13 章至第 15 章）中，我将演示如何将我们在第二部分中开发的 SRS\
  \ 对象模型转化为一个功能完备的 Java 应用程序，使其作为三层应用程序中的**模型层**。同时，我们还将从概念上讨论如何利用第三方技术来提供用户界面（即**表示层**）和数据持久化（即**数据层**）。SRS\
  \ 源代码可从 GitHub（`github.com/Apress/Beginning-Java-Objects-3e`）下载，我强烈建议你在阅读到该章节时下载并尝试运行这些代码。\n\
  \nSRS 的需求规格说明采用叙述性风格编写，这也是软件系统需求常见的表达方式。你可能会自信地认为今天就能构建一个应用程序来解决这个问题，但读完本书后，你应该会对自己将其构建为***面向对象***应用程序的能力更有信心。附录中提供了另外三个案例研究——分别针对处方跟踪系统（PTS）、会议室预订系统和航空订票系统；这些案例将作为每章末尾许多练习题的基础。\n\
  \n最后一章提供了一些建议，指导你在读完本书后如何继续你的面向对象探索之旅。在该章中，我为你推荐了一份书单，根据你应用所学知识的不同意图，这些书籍将帮助你达到更高水平的熟练度。\n\
  \n## 排版约定\n\n为了帮助你充分利用本书内容并掌握要点，我们在全书中使用了一些排版约定。\n\n例如：\n\n注释以这种形式呈现，反映重要的背景信息。\n\
  \n至于正文中的样式：\n\n*   当我们引入重要词汇时，会使用**粗体**进行突出显示。\n\n*   我们会在正文中以如下方式显示文件名、URL 和代码：`objectstart.com`。\n\
  \n*   在较长的代码段落中，如果我们想特别引起你对某些行的注意，会使用**粗体**标记这些代码行：\n\n    ```\n    // 粗体用于引起对新增或重要代码的注意：\n\
  \    Student s = new Student();\n    // 而未加粗的代码则是在当前上下文中不太重要，或之前已经见过的代码。\n    int\
  \ x = 3;\n    ```\n\n*   我们使用*斜体*与`常规代码字体`来区分伪代码：\n\n    ```\n    // 这是真实代码：\n \
  \   for (int i = 0; i <= 10; i++) {\n    // 这是伪代码！\n    compute the grade for the\
  \ ith Student\n    }\n    ```\n\n## 本书基于哪个 Java 版本？\n\n如前所述，甲骨文公司持续定期发布 Java 语言的新版本。***好消息是***，由于本书只关注核心\
  \ Java 语言语法——即自 Java 诞生以来一直稳定的语言特性——因此本书并不限定于特定版本。当你阅读本书所学到的技术和概念，在 Java 新版本出现时同样适用。话虽如此，本书中的所有代码示例均兼容\
  \ Java 8 至 17 版本。（一般来说，Java 语言的新版本是向前兼容的，这意味着为旧版本语言编写的代码在新版本中也能正确编译。）\n\n\n\n##\
  \ 开始前的最后思考\n\n我书中的许多内容——尤其是第一部分开头部分——对于经验丰富的程序员来说可能显得过于简单。这是因为面向对象技术大多建立在已实践多年的基础软件工程原则之上，且在许多情况下只是以略微不同的方式重新包装。确实有一些新技巧让面向对象语言变得极其强大，而这些在非面向对象语言中几乎无法实现——例如**继承**和**多态**，你将在第\
  \ 5 章和第 7 章中分别了解它们。（这些技术可以在非面向对象语言中手动模拟，就像程序员可以自己从头编写数据库管理系统（DBMS），而不是使用 Oracle\
  \ 或 SQL Server 这样的商业产品——但谁***想***这么做呢？）\n\n对于***经验丰富***的程序员来说，掌握面向对象技术的最大挑战在于重新调整他们思考待自动化问题的方式：\n\
  \n*   使用非面向对象方法开发过应用程序的软件工程师/程序员，通常需要“摒弃”传统软件分析与设计方法中的某些做法。\n\n*   矛盾的是，刚起步的程序员（或面向对象建模新手）有时反而更容易将面向对象软件开发方法作为其***唯一***方法来学习。\n\
  \n幸运的是，我们在开发软件时需要思考对象的方式，恰好就是人们通常思考世界万物的自然方式。因此，学会“思考”对象——并用 Java 编写对象程序——就像（第）一、（第）二、（第）三步一样简单！\n\
  \n本书源代码可在 [`​github.​com/​Apress/​Beginning-Java-Objects-3rd-ed`](https://github.com/Apress/Beginning-Java-Objects-3rd-ed)\
  \ 找到。\n\n学生注册系统（SRS）案例研究 学生注册系统（SRS）需求规格说明\n\n我们被要求开发一个自动化的学生注册系统（SRS）。该系统将使学生能够每学期在线注册课程，并跟踪学生完成学位的进度。\n\
  \n当学生首次入学时，他们使用 SRS 制定学习计划，说明他们计划修读哪些课程以满足特定学位项目的要求，并选择一位指导教师。SRS 将验证所提议的学习计划是否满足学生所寻求学位的要求。学习计划确定后，在每个学期前的注册期间，学生可以在线查看课程安排，选择他们希望参加的课程，如果某门课程由多位教授授课，还需指明首选的分班（星期几和具体时间）。SRS\
  \ 将通过查阅学生的在线成绩单（包含已完成课程和所获成绩）来验证学生是否已满足每门申请课程的必要先修条件（学生可随时在线查看成绩单）。\n\n假设（a）所申请课程的先修条件已满足，（b）该课程符合学生学习计划的要求，且（c）每门课程均有空余名额，则学生即可注册该课程。\n\
  \n如果（a）和（b）满足，但（c）不满足，则学生将被列入先到先得的等候名单。如果之前被列入等候名单的课程/分班出现空位（或因其他学生退课，或因课程座位容量增加），学生将自动注册该等候课程，并会收到相关电子邮件通知。如果不再需要该课程，学生有责任自行退课；否则将被收取课程费用。\n\
  \n关于作者 关于技术审校\n\n"
- '# 第一部分 面向对象基础


  '
- "# 1. 抽象与建模\n\n通过抽象实现简化 通过抽象实现泛化 将抽象组织成分类层次结构 抽象作为软件开发的基础 抽象的复用 固有挑战 如何成为成功的面向对象建模者？\
  \ 本章小结\n\n作为人类，我们一生中每天都充斥着信息。即使我们能暂时关闭所有不断轰炸我们的“电子信息来源”——电子邮件、语音邮件、播客、推文等——仅凭我们的五种感官，每天就能从周围环境收集数百万比特的信息。然而，我们却能理解所有这些信息，通常不会感到不知所措。我们的大脑会自然地简化所观察到的一切细节，通过一种称为**抽象**的过程使这些细节变得易于管理。\n\
  \n在本章中，你将学习\n\n*   抽象如何简化我们对世界的看法\n\n*   我们如何将知识分层组织，以最大限度地减少在任何给定时间需要处理的信息量\n\n\
  *   抽象与软件开发的相关性\n\n*   作为软件开发人员，在尝试用软件模拟现实世界情境时面临的固有挑战\n\n\n\n## 通过抽象实现简化\n\n请花点时间环顾你正在阅读本书的房间。起初，你可能会觉得值得观察的事物并不多：一些家具、灯具，或许还有几盆植物、几件艺术品，甚至还有其他人或宠物。也许还有一扇窗户，可以眺望外面的世界。\n\
  \n现在再看一次。你看到的每一样东西，都蕴含着无数可供观察的细节：它的尺寸、颜色、设计用途、构成它的组件（桌子的腿、灯里的灯泡）等等。此外，这些组件中的每一个又都关联着各自的细节：制作桌腿的材料类型（木材或金属）、灯泡的瓦数等等。现在，再调动你的其他感官：有人打鼾的声音（希望不是在读这本书的时候！）、走廊那头微波炉里飘出的爆米花香味，等等。最后，想想这些物体所有看不见的细节：是谁制造了它们，或者它们的化学、分子或基因组成是什么。\n\
  \n显然，我们大脑需要处理的信息量是极其庞大的。然而，对于绝大多数人来说，这并不会构成问题，因为我们天生就擅长**抽象**——这是一个识别并专注于情境或对象的重要特征，同时过滤或忽略所有非本质细节的过程。\n\
  \n抽象的一个常见例子是道路地图。作为一种抽象，道路地图呈现了特定地理区域内与试图使用地图导航的人（例如驾车者）相关的那些特征：主要道路和兴趣点、大型水体等障碍物。必然地，一张道路地图不可能包含现实世界中实际存在的每一栋建筑、每一棵树、每一个路标、每一块广告牌、每一个红绿灯、每一家快餐店等等。如果它包含了，那么它就会变得杂乱无章，几乎无法使用；所有重要的特征都无法凸显出来。将一张道路地图与同一地区的*地形图*、*气候图*和*人口密度图*进行比较：每一张图都抽象出了现实世界中不同的特征——即那些与地图目标用户相关的特征。\n\
  \n再举一个例子，考虑一处风景。一位艺术家可能会从色彩、纹理和形状的角度来看待这片风景，将其视为一幅画作的潜在主题。一位房屋建造商可能会从房产上最佳建筑地点的角度来审视同一片风景，评估需要砍伐多少棵树才能为建筑项目腾出空间。一位生态学家可能会仔细研究单个树种以及其他植物/动物生命的生物多样性，着眼于保护和维护它们，而一个孩子可能只是在寻找所有树木中适合搭建树屋的最佳地点。在这四位观察者对风景的抽象中，有些元素是共通的——例如树木的类型、大小和位置——而其他元素则并非与所有抽象都相关。\n\
  \n## 通过抽象实现泛化\n\n如果我们从抽象中消除足够多的细节，它就会变得足够通用，可以适用于广泛的具体情境或实例。这种通用的抽象通常非常有用。例如，一张人体内通用细胞的示意图，如图\
  \ 1-1 所示，可能只包含实际细胞中发现的少数结构特征。\n\n![](img/78624_3_En_1_Fig1_HTML.png)\n\n一张通用细胞的示意图。它标有以下部分：线粒体、细胞膜和细胞核。\n\
  \n图 1-1\n\n细胞的通用抽象\n\n这张过度简化的示意图看起来不像真正的神经细胞、肌肉细胞或血细胞；然而，它仍然可以在教育环境中用来描述所有这些细胞类型的结构和功能的某些方面——即各种细胞类型共有的那些特征。\n\
  \n抽象越简单——也就是说，它呈现的特征越少——它就越通用，在描述各种现实世界情境时也就越灵活。抽象越复杂，它的限制就越多，因此它能有效描述的情境也就越少。\n\
  \n\n\n### 将抽象概念组织成分类层次结构\n\n尽管我们的大脑擅长抽象出诸如路线图和景观之类的概念，但在一生中我们仍需处理数百万个独立的抽象概念。为了应对这种复杂性，人类会依据既定标准将信息系统地分类；这一过程被称为**分类**。\n\
  \n例如，科学将所有自然物归类为动物、植物或矿物界。一个自然物要被归类为动物，必须满足以下规则：\n\n*   它必须是（或曾经是）一个生命体。\n*   它必须能够自主运动。\n\
  *   它必须能对刺激做出快速运动反应。\n\n另一方面，构成植物的规则则有所不同：\n\n*   它必须是一个生命体（与动物相同）。\n*   它必须缺乏明显的神经系统。\n\
  *   它必须拥有纤维素细胞壁。\n\n有了这样明确的规则，将物体放入合适的类别（即**类**）就相当直接了。然后我们可以“向下钻取”，指定额外的规则来区分不同类型的动物，例如，直到我们从上到下构建出一个由越来越复杂的抽象概念组成的层次结构。图\
  \ 1-2 展示了一个简单的**抽象层次结构**示例。\n\n![](img/78624_3_En_1_Fig2_HTML.jpg)\n\n一张自然物图表。自然物被分为三组：植物、动物和矿物。动物又分为鸟类、鱼类、哺乳动物、爬行动物等。哺乳动物又分为狗、牛和猴子。\n\
  \n图 1-2\n\n一个简单的自然物抽象层次结构\n\n在思考像图 1-2 所示的抽象层次结构时，我们会在脑海中上下移动，自动聚焦于层次结构中在特定时间点对我们重要的单一层或子集（称为**子树**）。例如，我们可能只关心哺乳动物，因此可以专注于哺乳动物子树，如图\
  \ 1-3 所示，暂时忽略层次结构的其余部分。\n\n![](img/78624_3_En_1_Fig3_HTML.png)\n\n一张哺乳动物子集的图表。哺乳动物分为狗、牛和猴子。\n\
  \n图 1-3\n\n专注于层次结构的一个小子集，压力会小得多\n\n通过这样做，我们自动将任何时刻需要在脑海中同时处理的概念数量减少到整个抽象层次结构的一个可管理的子集；在我们这个简单的例子中，我们现在只处理四个概念，而不是原来的十三个。无论一个抽象层次结构变得多么复杂，只要组织得当，它就不会让我们感到不知所措。\n\
  \n要精确地找出在抽象层次结构中正确分类一个物体所需的规则，并不总是那么容易。以我们可能为定义“什么是鸟”而制定的规则为例：即某种东西\n\n*   有羽毛\n\
  *   有翅膀\n*   会下蛋\n*   能够飞行\n\n根据这些规则，鸵鸟和企鹅都不能被归类为鸟（尽管两者都应该是），因为它们都不能飞行（见图 1-4）。\n\
  \n![](img/78624_3_En_1_Fig4_HTML.jpg)\n\n一张分为两列的图表：鸟类和非鸟类。鸟类一列包含鹦鹉和麻雀等鸟类。非鸟类一列包含鸵鸟、企鹅和一个冰淇淋蛋筒。\n\
  \n图 1-4\n\n推导出正确的分类规则可能很困难\n\n如果我们试图通过删除“能够飞行”这条规则来使规则集限制性更小，那么剩下的规则是：\n\n*   有羽毛\n\
  *   有翅膀\n*   会下蛋\n\n根据这个规则集，我们现在可以正确地将鸵鸟和企鹅都归类为鸟类，如图 1-5 所示。\n\n![](img/78624_3_En_1_Fig5_HTML.jpg)\n\
  \n一张分为两列的图表：鸟类和非鸟类。鸟类一列包含鹦鹉、鸵鸟、企鹅和麻雀等鸟类。非鸟类一列包含一个气球和一个冰淇淋蛋筒。\n\n图 1-5\n\n已建立正确的分类规则\n\
  \n这个规则集仍然不必要地复杂，因为事实证明，“会下蛋”这条规则是多余的：无论我们保留还是删除它，都不会改变我们对什么是鸟、什么不是鸟的判断。因此，我们再次简化规则集：\n\
  \n*   有羽毛\n*   有翅膀\n\n我们大胆地尝试将简化过程再推进一步，删除另一条规则，将鸟定义为某种东西：\n\n*   有翅膀\n\n如图 1-6\
  \ 所示，这次我们走得太远了：鸟的抽象概念现在变得如此宽泛，以至于我们会把飞机、昆虫以及各种其他非鸟类都包括进来！\n\n![](img/78624_3_En_1_Fig6_HTML.jpg)\n\
  \n一张分为两列的图表：鸟类和非鸟类。鸟类一列包含鹦鹉、鸵鸟、企鹅和麻雀等鸟类。非鸟类一列包含一个气球和一个冰淇淋蛋筒。一只鸟说道：“嘿，这里变得拥挤不堪了。”\n\
  \n图 1-6\n\n过于宽松的规则集和过于严格的规则集一样成问题\n\n为了分类目的而定义规则的过程，涉及调整出恰到好处的规则集——既不过于宽泛，也不过于严格，且不包含冗余——以定义特定类别的正确成员资格。\n\
  \n### 抽象作为软件开发的基础\n\n在确定信息系统开发项目的需求时，我们通常从收集系统所基于的现实世界情况的细节开始。这些细节通常是以下两者的结合：\n\n\
  *   我们在采访系统预期用户时，他们明确提供给我们的信息\n*   我们通过其他方式观察到的信息\n\n我们必须判断这些细节中哪些与系统的最终目的相关。这一点至关重要，因为我们无法将它们全部自动化。包含过多细节会使最终系统过于复杂，从而使其在未来更难设计、编程、测试、调试、文档化、维护和扩展。\n\
  \n与所有抽象概念一样，在构建软件系统时，我们关于包含与排除的所有决策，都必须在未来系统的整体目的和**领域**（即主题焦点）的背景下做出。例如，在软件系统中表示一个人时，他们的眼睛颜色重要吗？他们的基因图谱呢？薪水？爱好？答案是，一个人的这些特征中的***任何一个***都可能相关或不相关，这取决于要开发的系统是：\n\
  \n*   薪资系统\n*   市场营销人口统计系统\n*   验光师的患者数据库\n*   联邦调查局的“头号通缉犯”追踪系统\n\n一旦我们确定了某个情境的基本方面（我们将在本书第\
  \ 2 部分探讨这一点），我们就可以准备该情境的**模型**。**建模**是我们为将要制造的东西开发模式的过程。定制住宅的蓝图、印刷电路板的原理图以及饼干模具都是此类模式的例子。正如我们将在第\
  \ 2 部分和第 3 部分中介绍的，软件系统的**对象模型**就是这样一个模式。建模和抽象相辅相成，因为模型本质上是对抽象概念的一种物理或图形化描绘；在有效建模之前，我们必须先确定待建模对象的基本细节。\n\
  \n\n\n## 抽象的重用\n\n在学习新事物时，我们会自动搜索大脑中已构建并掌握的其他抽象/模型，寻找可以借鉴的相似之处。例如，当你第一次学习骑两轮自行车时，可能会借鉴小时候骑三轮车的经验（见图\
  \ 1-7）。两者都有用于转向的车把，都有用于推动自行车前进的踏板。尽管抽象并不完全匹配——两轮自行车带来了需要保持平衡的新挑战——但相似之处足以让你运用已掌握的转向和踩踏板技能，并专注于学习如何在两个轮子上保持平衡这一新技能。\n\
  \n![](img/78624_3_En_1_Fig7_HTML.jpg)\n\n一个云状图形，内含文字：我会做的事情。下方列出：消费、睡觉、编程、骑车。在“消费”下方，文字为：吃巧克力和披萨，以及喝饮料。\n\
  \n图 1-7\n\n人类大脑擅长通过建立在已有抽象的基础上进行学习\n\n这种通过比较特征来寻找足够相似、可成功重用的抽象的技术，被称为**模式匹配与重用**。正如我们将在本书后面讨论的，模式重用也是面向对象软件开发的一项重要技术，因为它使我们不必在每个新项目中重新发明轮子。如果我们能重用之前项目中的抽象或模型，就可以专注于新项目与旧项目不同的方面，从而大幅提高生产力。\n\
  \n## 固有的挑战\n\n尽管抽象对人类来说是一个如此自然的过程，但为软件系统开发合适的模型可能是软件工程中最困难的方面，因为：\n\n*   存在无限的可能性。抽象在一定程度上取决于观察者：几个不同的观察者独立工作，几乎必然会得出不同的模型。谁的模型最好？***激烈的***争论随之而来！\n\
  \n*   更复杂的是，几乎从来不存在唯一“最佳”或“正确”的模型，只有相对于待解决问题而言“更好”或“更差”的模型。同一情况可以用多种同样有效的方式建模。在本书第二部分实际进行建模时，我们将看到为学生注册系统（SRS）案例研究（在引言末尾介绍）提供的多种有效替代抽象。\n\
  \n*   但请注意，确实存在不正确的模型：即歪曲现实世界情况的模型（例如，将一个人建模为拥有两种不同的血型）。\n\n*   没有一种试金石测试可以确定模型是否充分捕捉了用户的所有需求。判断抽象是否合适的最终证据，在于由此产生的软件系统最终是否成功。因此，在整个敏捷开发生命周期中，学会频繁、简洁且无歧义地沟通我们的模型至关重要，沟通对象包括：\n\
  \    *   我们应用程序的未来用户，以便在我们开始软件开发之前，他们能对我们对问题的理解进行合理性检查；\n    *   我们的软件工程师同事，以便团队成员能共享关于我们将要协作构建内容的共同愿景。\n\
  \n尽管存在这些挑战，但在开始构建系统之前，将前期的抽象“做对”至关重要。在软件生命周期中越晚发现建模错误，修复成本就会成倍增加。这并不意味着抽象应该是僵化的——恰恰相反！对象建模的艺术与科学，如果应用得当，会产生一个足够灵活、能够承受各种功能变更的模型。此外，软件对象的特殊属性进一步有助于实现灵活的软件解决方案，你将在本书后续部分了解到这一点。\n\
  \n### 成为一名成功的对象建模者需要什么？\n\n提出一个合适的抽象作为软件系统模型的基础，需要：\n\n*   ***对问题领域的洞察***：理想情况下，我们能够借鉴自己的现实世界经验，例如作为学生（无论是过去还是现在）的经历，这在确定学生注册系统（SRS）的需求时会派上用场，该系统是本书第二和第三部分建模与编码工作的基础。\n\
  \n*   ***创造力***：我们必须能够“跳出框框”思考，以防我们采访的未来用户长期沉浸在该问题领域中，以至于未能看到可能实现的创新。\n\n*   ***良好的倾听技巧***：当系统的未来用户描述他们目前如何完成工作，或设想在我们将要开发的系统帮助下未来如何工作时，这些技巧会非常有用。\n\
  \n*   ***良好的观察技巧***：行动往往胜于言语。仅仅通过观察用户的日常工作，我们可能就能捕捉到一个他们因习以为常而忽略提及的关键细节。\n\n但这还不够。我们还需要：\n\
  \n![](img/78624_3_En_1_Fig8_HTML.jpg)\n\n一个景观流程图包含两个场景。景观要么毗邻湖泊，要么毗邻树木。树木分为落叶树和针叶树。\n\
  \n图 1-8\n\n用 UML 符号描述景观\n\n*   一个有条理的***过程***，用于确定抽象应该是什么。如果我们遵循一个经过验证的建模步骤清单，就能大大降低遗漏某些重要特征或忽略关键需求的可能性。\n\
  \n*   一种向软件开发者同事以及应用程序的利益相关者/预期用户***沟通***最终模型的方式，要求简洁且无歧义。虽然用叙述性文字描述抽象是可行的，但一图胜千言，因此我们用来沟通模型的语言通常是**图形化符号**。在本书中，我们将重点使用统一建模语言（UML；见图\
  \ 1-8）符号作为我们的模型沟通语言（你将在第 10 章和第 11 章学习 UML 的基础知识）。将图形化模型视为待构建软件应用程序的蓝图。\n\n*   理想情况下，还需要一个***软件工具***来帮助我们自动化生成此类蓝图的过程。\n\
  \n本书第二部分将详细涵盖建模的这三个方面：过程、符号和工具。\n\n在本书的剩余部分，我们将重点研究以下案例研究，作为对象建模和 Java 编码课程的基础：\n\
  \n学生注册系统（SRS）需求规格说明\n\n我们被要求开发一个自动化的学生注册系统（SRS）。该系统将使学生能够每学期在线注册课程，并跟踪学生完成学位的进度。\n\
  \n\n\n当学生首次在大学注册时，他们会使用 SRS 制定学习计划，说明计划修读哪些课程以满足特定学位项目的要求，并选择一位指导老师。SRS 将验证所提议的学习计划是否满足学生所寻求学位的要求。学习计划确定后，在每个学期前的注册期间，学生可以在线查看课程安排，并选择他们希望参加的课程。如果某门课程由多位教授授课，学生还需指明首选的分班（星期几和具体时间）。SRS\
  \ 将通过查阅学生在线成绩单（学生可随时在线查看成绩单）中已完成的课程和所获成绩，来验证学生是否已满足每门申请课程的必要先修条件。\n\n假设满足以下条件：(a)\
  \ 所申请课程的先修条件已满足，(b) 课程符合学生的学习计划要求，且 (c) 每门课程均有空余名额，则学生将被注册到该课程。\n\n如果 (a) 和 (b)\
  \ 满足，但 (c) 不满足，学生将被列入先到先得的等候名单。如果之前被列入等候名单的课程/分班出现空位（无论是由于其他学生退课，还是课程容量增加），学生将自动注册到该等候课程，并会收到一封相关通知邮件。如果学生不再需要该课程，则有责任自行退课；否则，他们将需要支付该课程的费用。\n\
  \n## 本章小结\n\n在本章中，你已了解到：\n\n*   **抽象**是人们感知世界所使用的一项基本技术。\n\n*   对需要自动化的**问题**进行抽象是所有软件开发必要的第一步。\n\
  \n*   我们根据精心构建的规则，自然地**将信息组织成分类层次结构**，这些规则既不过于笼统，也不过于严格。\n\n*   在尝试建模新概念时，我们经常**重用已有的抽象**。\n\
  \n*   对将要构建的系统进行抽象（即创建**模型**），在某种意义上是我们与生俱来的能力，但矛盾的是，这也是软件开发人员在信息系统项目生命周期中必须完成的最困难的任务之一。同时，这也是最重要的任务之一。\n\
  \n练习\n\n1.  选择一个你希望从面向对象角度进行建模的问题领域。理想情况下，这将是你实际工作中将要处理的问题，或者是你非常感兴趣的问题。假设你将编写一个程序来自动化该问题领域的某些方面，并仿照\
  \ SRS 案例研究，撰写一页纸的程序需求概述。\n\n    确保你的第一段总结了系统的意图，就像 SRS 案例研究的第一段那样。同时，要强调***功能需求***——即非技术最终用户可能陈述的系统行为方式——并避免陈述***技术需求***，例如“该系统必须运行在\
  \ Unix 平台上，并且必须使用 TCP/IP 协议来……”\n\n2.  阅读附录中的处方跟踪系统（PTS）案例研究。你认为这个案例研究作为一项抽象的效果如何？是否有你认为可以省略的细节，或者你认为重要但缺失的细节？如果你有机会采访\
  \ PTS 的预期用户，你可能会问他们哪些额外的问题，以更好地完善这一抽象？\n\n1.  绘制一个类层次结构草图，以合理的方式关联以下所有类：\n\n   \
  \ 苹果\n\n    香蕉\n\n    牛肉\n\n    饮料\n\n    奶酪\n\n    可食用品\n\n    乳制品\n\n    食物\n\n\
  \    水果\n\n    青豆\n\n    肉类\n\n    牛奶\n\n    猪肉\n\n    菠菜\n\n    蔬菜\n\n    证明你的答案，并特别说明在此过程中遇到的任何挑战。\n\
  \n2.  从以下不同视角来看，电视机的哪些方面是需要重点抽象的？\n    *   想要购买电视机的消费者？\n    *   负责设计电视机的工程师？\n\
  \    *   销售电视机的零售商？\n    *   电视机制造商？\n\n"
- "# 2. Java 基础入门\n\nJava 的体系结构中立性 简单 Java 程序的结构 注释 类声明 main 方法 搭建简单的 Java 开发环境 Java\
  \ 的运行机制 将 Java 源代码编译为字节码 执行字节码 基本数据类型 变量 变量命名规范 变量初始化 String 类型 大小写敏感性 Java 表达式\
