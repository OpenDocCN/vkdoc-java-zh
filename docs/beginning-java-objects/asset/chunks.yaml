- fmt: '# Three Distinguishing Features of an Object-Oriented Programming Language


    In order to be considered truly object-oriented, a programming language must provide
    support for three key mechanisms:


    - User-defined (reference) types

    - Inheritance

    - Polymorphism


    You’ve just learned about the first of these mechanisms; we’ll discuss the other
    two in chapters to follow.


    ## Summary


    In this chapter, you’ve learned that


    - An **object** is a software abstraction of a physical or conceptual real-world
    object.

    - A **class** serves as a template for creating objects. Specifically, a class
    defines (a) the data that an object will encapsulate, known as the object’s **attributes**,
    and (b) the behaviors that an object will be able to perform, known as an object’s
    operations/**methods**.

    - An object may be thought of as an **instance** of a class to which attribute
    **values** have been assigned—in essence, a **filled-in** template.

    - Just as we can declare variables to be of primitive types such as `int`, `double`,
    and `boolean`, we can also declare variables to be of **user-defined types** such
    as `Student` and `Professor`. User-defined types are declared as classes.

    - When we create a new object at run time (a process known as **instantiation**),
    we typically store a reference to (“handle” on) that object in a **reference variable**.
    We can then use the reference variable as a symbolic name for accessing and communicating
    with the object.

    - We can define attributes of a class A to serve as references to objects belonging
    to another class B. In doing so, we allow each object to encapsulate the information
    that rightfully belongs to that object, but enable objects to find one another
    in memory at run time so that they can contact one another to share information
    whenever necessary.


    ## Exercises


    1. [*Coding*] Render the `Student` and `Professor` classes as presented in this
    chapter in Java code. In so doing, (a) omit method declarations, and (b) declare
    any `Date` attributes to be of type `String` instead. Finally, create a third
    class called `MainClass` to serve as a “wrapper” for a `main` method that instantiates
    one `Student` object and one `Professor` object.


    2. [*Coding*] Revise the code that you wrote for Exercise 2 to include a fourth
    class, `Department`; declare whatever `Department` attributes seem reasonable
    but, once again, omit method declarations for now. Then, go back and modify the
    `major` attribute of `Student` to refer to a `Department` and the `worksFor` attribute
    of `Professor` to refer to a `Department`. Finally, modify the `MainClass`’s `main`
    method to instantiate a `Department` object along with a `Student` and a `Professor`.


    3. For the problem area whose requirements you defined for Exercise 3 in Chapter
    [1](#78624_3_En_1_Chapter.xhtml), list the classes that you might need to create
    in order to model it properly.


    4. List the classes that you might need to create in order to model the Prescription
    Tracking System (PTS) discussed in the Appendix.


    5. Would `Color` be a good candidate for a user-defined type/class? Why or why
    not?


    - `Classroom`

    - `Department`

    - `Degree`


