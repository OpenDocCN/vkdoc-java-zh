    // We''re going to be "lazy," and let Java provide us with

    // a default parameterless constructor for the Student class.

    // Methods ... details omitted.

    }

    ```


    When we try to compile this code, we’ll get the seemingly ***very cryptic*** compiler
    error message regarding the following `Student` class:


    ```

    Student.java: cannot find symbol

    symbol:    constructor Person()

    location:  class Person

    public class Student extends Person {

    ^

    ```


    This is because the Java compiler is trying to create a default parameterless
    constructor with no arguments for the `Student` class. In order to do so, the
    compiler knows that it is going to need to be able to invoke a parameterless constructor
    for `Person` from within the `Student` default constructor—however, no such constructor
    for `Person` exists!


    The best way to avoid such a dilemma is to remember to ***always explicitly program
    a parameterless constructor for a class X any time you program any explicit constructor
    for class X, to replace the “lost” default constructor***.


    ### A Few Words About Multiple Inheritance


    All of the inheritance hierarchies that we’ve looked at in this chapter are known
    informally as **single-inheritance** hierarchies, because any particular class
    in the hierarchy may only have a ***single*** direct superclass/immediate ancestor.
    In the hierarchy shown in Figure [5-9](#78624_3_En_5_Chapter.xhtml#Fig9), for
    example


    *   Classes B, C, and I all have the single direct superclass A.


    *   Classes D, E, and F have the single direct superclass B.


    *   Classes G and H have the single direct superclass E.


    ![](images/78624_3_En_5_Chapter/78624_3_En_5_Fig9_HTML.jpg)


    A tree diagram with blocks A to H has a hierarchy from bottom to top. A is a person,
    B is a student, C is a professor, I is an admin, D is an undergraduate, E is a
    graduate, F is continuing, G is a P h D, and H is masters.


    Figure 5-9


    A sample single-inheritance hierarchy


    If we for some reason find ourselves needing to meld together the characteristics
    of two different superclasses to create a hybrid third class, **multiple inheritance**
    may seem to be the answer. With multiple (as opposed to single) inheritance, any
    given class in a class hierarchy is permitted to have ***two or more*** classes
    as immediate ancestors. For example, we have a `Professor` class representing
    people who teach classes and a `Student` class representing people who take classes.
    What might we do if we have a professor who wants to enroll in a class via the
    SRS? Or a student—most likely a graduate student—who has been asked to teach an
    undergraduate-level course? In order to accurately represent either of these two
    people as objects, we would need to be able to combine the features of the `Professor`
    class with those of the `Student` class—a hybrid `ProfessorStudent`. This might
    be portrayed in our class hierarchy as shown in Figure [5-10](#78624_3_En_5_Chapter.xhtml#Fig10).


    ![](images/78624_3_En_5_Chapter/78624_3_En_5_Fig10_HTML.jpg)


    A block diagram has the following hierarchy from bottom to top. Professor student,
    student, professor, and person.


    Figure 5-10


    Multiple inheritance permits a subclass to have multiple direct superclasses


    On the surface, this seems quite handy. However, there are many complications
    inherent in multiple inheritance—so many, in fact, that the Java language designers
    chose not to support multiple inheritance. Instead, they’ve provided an alternative
    mechanism for handling the requirement of creating an object with a “split personality”:
    that is, one that can behave like two or more different real-world entities. This
    mechanism involves the notion of **interfaces** and will be explored in detail
    in Chapter [7](#78624_3_En_7_Chapter.xhtml). Therefore, if you’re primarily interested
    in object concepts only as they pertain to the Java language, you may wish to
    skip the rest of this section. If, on the other hand, you’re curious as to why
    multiple inheritance is so tricky, then please read on.


    Here’s the problem with what we’ve done in the preceding example. We discussed
    previously that, with inheritance, a subclass automatically inherits the attributes
    and methods of its superclass. What about when we have two or more direct superclasses?
    If these superclasses have no overlaps in terms of their features, then we are
    fine. But what if the direct superclasses in question were, as an example, to
    have ***conflicting*** features—perhaps `public` methods with the ***same*** signature,
    but with ***different*** code body implementations, as illustrated in the following
    simple example?


    We’ll start with a trivially simple `Person` class that declares one attribute
    and one method:


    ```

    public class Person {

    private String name;

    // Accessor method details omitted.

    public String printDescription() {

    System.out.println(getName());

    // e.g., "John Doe"

    }

    }

    ```'
