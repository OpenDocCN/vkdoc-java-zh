    Having employed use case analysis techniques in Chapter [9](#78624_3_En_9_Chapter.xhtml)
    to round out the Student Registration System (SRS) requirements specification,
    we’re ready to tackle the next stage of modeling, which is determining how we’re
    going to meet those requirements in an OO fashion.


    We saw in Part 1 of the book that objects form the building blocks of an OO system
    and that classes are the templates used to define and instantiate objects. An
    OO model, then, must specify the following:


    - **What types of objects we’re going to need to create and instantiate in order
    to represent the proper abstraction**: In particular, their attributes, methods,
    and structural relationships with one another. Because these elements of an OO
    system, once established, are fairly static—in the same way that a house, once
    built, has a specific layout, a given number of rooms, a particular roofline,
    and so forth—we often refer to this process as preparing the **static model**.


    We can certainly change the static structure of a house over time by undertaking
    remodeling projects, just as we can change the static structure of an OO software
    system as new requirements emerge by deriving new subclasses, inventing new methods
    for existing classes, and so forth. However, if a structure—whether a home or
    a software system—is properly designed from the outset, then the need for such
    changes should arise relatively infrequently over its lifetime and shouldn’t be
    overly difficult to accommodate.


    - **How these objects will need to collaborate in carrying out the overall requirements,
    or “mission,” of the system**: The ways in which objects interact can change literally
    from one moment to the next based upon the circumstances that are in effect. One
    moment, a `Course` object may be registering a `Student` object, and the next,
    it might be responding to a query by a `Professor` object as to the current student
    headcount. We refer to the process of detailing object collaborations as preparing
    the **dynamic model**. Think of this as all of the different day-to-day activities
    that go on in a home: same structure, different functions.


    The static and dynamic models are simply two different sides of the same coin:
    they jointly comprise the OO “blueprint” that we’ll work from in implementing
    the model layer for an object-oriented Student Registration System application
    in Part 3 of the book.


    In this chapter, we’ll focus on building the static model for the SRS, leaving
    a discussion of the dynamic model for Chapter [11](#78624_3_En_11_Chapter.xhtml).
    You’ll learn:


    - A technique for identifying the appropriate classes and their attributes

    - How to determine the structural relationships that exist among these classes

    - How to graphically portray this information as a **class diagram** using UML
    notation


    ## Identifying Appropriate Classes


    Our first challenge in object modeling is to determine what classes we’re going
    to need as our system building blocks. Unfortunately, the process of class identification
    is rather “fuzzy”; it relies heavily on intuition, prior modeling experience,
    and familiarity with the subject area, or **domain**, of the system to be developed.
    So how does an object modeling novice ever get started? One tried and true (but
    somewhat tedious) procedure for identifying candidate classes is to use the “hunt
    and gather” method: that is, to hunt for and gather a list of all nouns/noun phrases
    from the project documentation set and to then use a process of elimination to
    whittle this list down into a set of appropriate classes.


    In the case of the SRS, our documentation set thus far consists of the following:


    - The requirements specification

    - The use case model that we prepared in Chapter [9](#78624_3_En_9_Chapter.xhtml)'
