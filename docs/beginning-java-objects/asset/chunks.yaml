    Next, we provide accessor methods for all of the attributes, observing proper
    accessor method signature syntax as recommended in Chapter [4](#78624_3_En_4_Chapter.xhtml).
    All of our accessor methods, in all classes, will be declared with `public` accessibility:


    ```

    //------------------

    // Accessor methods.

    //------------------

