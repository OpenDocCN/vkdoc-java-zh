- fmt: '### The `finally` Block


    A `try` block may optionally have a `finally` block associated with it; if provided,
    a `finally` block follows any `catch` blocks associated with that same `try` block.


    The code within a `finally` block is **guaranteed** to execute no matter what
    happens in the `try`/`catch` code that precedes it, that is, whether:


    - The `try` block executes to completion without throwing any exceptions whatsoever.

    - The `try` block throws an exception that is handled by one of the `catch` blocks.

    - The `try` block throws an exception that is **not** handled by **any** of the
    `catch` blocks (a situation that we’ll explore a bit later in this chapter).


    Let’s add a `finally` block to our evolving `Problem`*x* program example; we’ll
    use the version that included print statements, so that we may once again trace
    our code’s execution:


    ```

    public class Problem5 {

    public static void main(String[] args) {

    Student s1 = null;

    Student s2 = null;

    // Details omitted ...

    // Later on, we instantiate an object for s1 to refer to, but

    // forget to do so for s2.

    s1 = new Student();

    // More details omitted ...

    System.out.println("We''re about to enter the try block ...");

    try {

    System.out.println("We''re about to call s1.setName(...)");

    s1.setName("Fred");

    System.out.println("We''re about to call s2.setName(...)");

    s2.setName("Mary");

    System.out.println("We''ve reached the end of the try block ...");

    }

    // Here are our catch blocks (three in total).

    catch (ArithmeticException e) {

    System.out.println("Executing the first catch block ...");

    }

    catch (NullPointerException e2) {

    System.out.println("Executing the second catch block ...");

    }

    catch (ArrayIndexOutOfBoundsException e3) {

    System.out.println("Executing the third catch block ...");

    }

    finally {

    System.out.println("Executing the finally block ...");

    }

    System.out.println("We''re past the last catch block ...");

    }

    }

    ```


    When executed, this version of the program would produce the following output:


    ```

    We''re about to enter the try block ...

    We''re about to call s1.setName(...)

    We''re about to call s2.setName(...)

    Executing the second catch block ...

    Executing the finally block ...

    We''re past the last catch block ...

    ```


    Let’s now **repair** the code in our `try` block so that it doesn’t throw any
    exceptions, to see what output our program will produce:


    ```

    public class NoProblemo {

    public static void main(String[] args) {

    Student s1 = null;

    Student s2 = null;

    // Details omitted ...

    // Later on, we instantiate objects for both s1 and s2

    // to refer to, thus alleviating the NullPointerException

    // in the try block below.

    s1 = new Student();

    s2 = new Student();

    // More details omitted ...

    System.out.println("We''re about to enter the try block ...");

    try {

    System.out.println("We''re about to call s1.setName(...)");

    s1.setName("Fred");

    System.out.println("We''re about to call s2.setName(...)");

    s2.setName("Mary");

    System.out.println("We''ve reached the end of the try block ...");

    }

    // Here are our catch blocks (three in total).

    catch (ArithmeticException e) {

    System.out.println("Executing first catch block ...");

    }

    catch (NullPointerException e2) {

    System.out.println("Executing second catch block ...");

    }

    catch (ArrayIndexOutOfBoundsException e3) {

    System.out.println("Executing third catch block ...");

    }

    finally {

    System.out.println("Executing finally block ...");

    }

    System.out.println("We''re past the last catch block ...");

    }

    }

    ```


    When executed, this version of the program would produce the following output
    — note that all `catch` blocks are **bypassed**:


    ```

    We''re about to enter the try block ...

    We''re about to call s1.setName(...)

    We''re about to call s2.setName(...)

    We’ve reached the end of the try block ...

    Executing the finally block ...

    We''re past the last catch block ...

    ```


    A final variation on our `Problem`*x* program once again throws a `NullPointerException`,
    but does **not** catch the appropriate type of exception in any of the `catch`
    blocks:


    ```

    public class Problem6 {

    public static void main(String[] args) {

    Student s1 = null;

    Student s2 = null;

    // Details omitted ...

    // Later on, we instantiate an object for s1 to refer to, but

    // forget to do so for s2.

    s1 = new Student();

    // More details omitted ...

    System.out.println("We''re about to enter the try block ...");

    try {

    System.out.println("We''re about to call s1.setName(...)");

    s1.setName("Fred");

    System.out.println("We''re about to call s2.setName(...)");

    s2.setName("Mary");

    System.out.println("We''ve reached the end of the try block ...");

    }

    // Here are our catch blocks (two in total) – note that we

    // are *not* catching NullPointerException this time.

    catch (ArithmeticException e) {

    System.out.println("Executing first catch block ...");

    }

    catch (ArrayIndexOutOfBoundsException e2) {

    System.out.println("Executing second catch block ...");

    }

    finally {

    System.out.println("Executing finally block ...");

    }

    System.out.println("We''re past the last catch block ...");

    }

    }

    ```


    When executed, this version of the program would produce the following output:


    ```

    We''re about to enter the try block ...

    We''re about to call s1.setName(...)

    We''re about to call s2.setName(...)

    Executing the finally block ...

    ```


    Note that we never make it to the final print statement


    ```

    System.out.println("We''re past the last catch block ...");

    ```


    because an **uncaught** exception causes the overall code block in which it occurs
    — in our example, the `main` method — to terminate abnormally.


    We thus see that no matter what happens in the `try`/`catch` code, a `finally`
    block, if present, is **always** executed.


    Note that we may omit `catch` clauses for a `try` block if a `finally` block is
    present:


    ```

    // Catch blocks are unnecessary if a finally block is present.

    try { ... }

    finally { ... }

    ```'
