- fmt: '### Default Constructors


    If we don’t explicitly declare any constructors for a class, Java automatically
    provides a **default constructor** for that class. The default constructor is
    parameterless—that is, it takes no arguments—and does the “bare minimum” required
    to initialize a new object: namely, setting all attributes to their zero-equivalent
    default values.


    Thus, even though we may have designed a class with no explicit constructors whatsoever,
    as with the following `Student` class:


    ```

    public class Student {

    // Attributes.

    private String name;

    // other details omitted ...

    // We''ve declared methods, but NO EXPLICIT CONSTRUCTORS.

    public String getName() {

    return name;

    }

    public void setName(String newName) {

    name = newName;

    }

    // etc.

    }

    ```


    we are still able to write client code to instantiate a “bare-bones” `Student`
    object as follows:


    ```

    Student s1 = new Student();

    ```


    because the JVM uses the default constructor for the `Student` class.


    ### Writing Our Own Explicit Constructors


    We needn’t rely on Java to provide a default constructor for each of our classes;
    we can instead write constructors of our own design for a particular class if
    we wish to do something more interesting/complex to initialize an object when
    it is first instantiated.


    Note that the header syntax for a constructor is a bit different from that of
    a method:


    - A constructor’s name must be exactly the same as the name of the class for which
    we’re writing the constructor—we have no choice in the matter.

    - A parameter list, enclosed in parentheses, is provided for a constructor header
    as with method headers. And, as with method headers, the parameter list may be
    left empty if appropriate.

    - We ***cannot*** specify a return type for a constructor; by definition, a constructor
    returns a reference to a newly created object of the type represented by the class
    to which the constructor belongs. That is, a constructor of the form:


    ```

    // Note:  no return type!

    public Student() { ... }

    ```


    returns a newly instantiated `Student` object reference. A constructor of the
    form:


    ```

    // Note:  no return type!

    public Professor() { ... }

    ```


    returns a newly instantiated `Professor` object reference. And so forth.


    ```

    public        _____________          Student()

    access      NO return type!     constructor name must match

    modifier                          class name, followed by

    comma-separated list of formal

    parameters enclosed in ()

    ```


    Another disparity with respect to constructor syntax as compared with that of
    methods is that invoking a constructor does not involve dot notation:


    ```

    Professor p = new Professor();

    ```


    This is because we aren’t requesting a service of a particular object; rather,
    we’re requesting that a brand-new object be crafted by the JVM.


    ### Passing Arguments to Constructors


    One of the most common motivations for declaring an explicit constructor for a
    class is to provide a convenient way to pass in initial values for an object’s
    attributes at the time of instantiation.


    If we use a default constructor to instantiate a bare-bones object, we then must
    invoke the object’s “set” methods one by one to initialize its attribute values,
    as illustrated by this next snippet:


    ```

    // Create a bare bones Student object.

    Student s = new Student();

    // Initialize the attributes one by one.

    s.setName("Fred Schnurd");

    s.setSsn("123-45-6789");

    s.setMajor("MATH");

    // etc.

    ```


    This can be rather tedious if there are a lot of attributes to initialize.


    Alternatively, if we design a constructor that accepts arguments, we can simultaneously
    instantiate an object and provide meaningful initial attribute values in a single
    line of code, for example:


    ```

    // This single line of code replaces the previous four lines.

    Student s = new Student("Fred Schnurd", "123-45-6789", "MATH");

    ```


    In order to accomplish this, we’d of course have to declare a `Student` class
    constructor with an appropriate header, as shown here:


    ```

    public class Student {

    // Attributes.

    private String name;

    private String ssn;

    private String major;

    // etc.

    // We''ve declared a constructor that accepts three arguments, to accommodate

    // passing in three attribute values.

    public Student(String s, String n, String m) {

    this.setName(n);

    this.setSsn(s);

    this.setMajor(m);

    }

    // etc.

    ```


    Constructor arguments can also be used as control flags for influencing how a
    constructor behaves, as illustrated in the next example constructor:


    ```

    public Student(String name, boolean assignDefaults) {

    setName(n);

    if (assignDefaults) {

    this.setSsn("?");

    this.setMajor("UNDECLARED");

    }

    }

    ```


    Client code for the preceding might look as follows:


    ```

    // We DO want to assign default values to other attributes.

    Student s = new Student("Cynthia Coleman", true);

    ```


    ### Replacing the Default Parameterless Constructor


    If we wish, we can explicitly program a parameterless constructor for our classes
    to do something more interesting than merely instantiating a bare-bones object,
    thereby ***replacing*** the default parameterless constructor with one of our
    own design. This is illustrated by the following class:


    ```

    public class Student {

    // Attributes.

    private String name;

    private String major;

    // etc.

    // We''ve explicitly programmed a parameterless constructor, thus replacing

    // the default version.

    public Student() {

    // Perhaps we wish to initialize attribute values to something other than

    // their zero equivalents.

    this.setName("?");

    this.setMajor("UNDECLARED");

    // etc.

    }

    // Other methods omitted from this example.

    }

    ```


    ### More Elaborate Constructors


    We can program a constructor to do whatever makes sense in constructing a new
    `Student`:


    - We may wish to instantiate additional objects related to the `Student` object:


    ```

    public class Student() {

    // Every Student maintains a handle on his/her own individual Transcript

    // object.

    private Transcript transcript;

    public Student() {

    // Create a new Transcript object for this new Student.

    transcript = new Transcript();

    // etc.

    }

    // etc.

    }

    ```


    - We may wish to access a relational database to read in the data needed to initialize
    the `Student`’s attributes:


    ```

    public class Student {

    // Attributes.

    String studentId;

    String name;

    double gpa;

    // etc.

    // Constructor.

    public Student(String id) {

    studentId = id;

    // Pseudocode.

    use studentId as a primary key to retrieve data from the Student table of a

    relational database;

    if (studentId found in Student table) {

    retrieve all data in the Student record;

    name = name retrieved from database;

    gpa = value retrieved from database;

    // etc.

    }

    }

    // etc.

    }

    ```


    - We may wish to communicate with other already existing objects to announce a
    new `Student`’s existence:


    ```

    public class Student {

    // Details omitted.

    // Constructor.

    public Student(String major) {

    // Alert the student''s designated major department that a new student has

    // joined the university.

    // Pseudocode.

    majorDept.notify(about this student ...);

    // etc.

    }

    // etc.

    }

    ```


    - And so forth—***whatever*** is required of our application.


    We’ll see examples of such constructors later in the book, when we craft the SRS.'
