- fmt: '# Simplification Through Abstraction


    Take a moment to look around the room in which you’re reading this book. At first,
    you may think that there really aren’t that many things to observe: some furniture,
    light fixtures, perhaps some plants, artwork, even some other people or pets.
    Maybe there is a window to gaze out of that opens up the outside world to observation.


    Now look again. For each thing that you see, there are a myriad of details to
    observe: its size, its color, its intended purpose, the components from which
    it’s assembled (the legs on a table, the lightbulbs in a lamp), etc. In addition,
    each one of these components in turn has details associated with it: the type
    of material used to make the legs of the table (wood or metal), the wattage of
    the lightbulbs, etc. Now factor in your other senses: the sound of someone snoring
    (hopefully not while reading this book!), the smell of popcorn coming from the
    microwave oven down the hall, and so forth. Finally, think about all of the unseen
    details of these objects: who manufactured them or what their chemical, molecular,
    or genetic composition is.


    It’s clear that the amount of information to be processed by our brains is truly
    overwhelming. For the vast majority of people, this doesn’t pose a problem, however,
    because we’re innately skilled at `abstraction`, a process that involves recognizing
    and focusing on the important characteristics of a situation or object and filtering
    out or ignoring all of the unessential details.


    One familiar example of an abstraction is a road map. As an abstraction, a road
    map represents those features of a given geographic area relevant to someone trying
    to navigate with the map, perhaps by car: major roads and places of interest,
    obstacles such as large bodies of water, etc. Of necessity, a road map can’t include
    every building, tree, street sign, billboard, traffic light, fast-food restaurant,
    etc. that physically exists in the real world. If it did, then it would be so
    cluttered as to be virtually unusable; none of the important features would stand
    out. Compare a road map to a topographical map, a climatological map, and a population
    density map of the same region: each abstracts out different features of the real
    world—namely, those relevant to the intended user of the map in question.


    As another example, consider a landscape. An artist may look at the landscape
    from the perspective of colors, textures, and shapes as a prospective subject
    for a painting. A home builder may look at the same landscape from the perspective
    of where the best building site may be on the property, assessing how many trees
    will need to be cleared to make way for a construction project. An ecologist may
    closely study the individual species of trees and other plant/animal life for
    their biodiversity, with an eye toward preserving and protecting them, whereas
    a child may simply be looking at all of the trees in search of the best site for
    a tree house. Some elements are common to all four observers’ abstractions of
    the landscape—the types, sizes, and locations of trees, for example—while others
    aren’t relevant to all of the abstractions.


    ## Generalization Through Abstraction


    If we eliminate enough detail from an abstraction, it becomes generic enough to
    apply to a wide range of specific situations or instances. Such generic abstractions
    can often be quite useful. For example, a diagram of a generic cell in the human
    body, such as the one in Figure [1-1](#78624_3_En_1_Chapter.xhtml#Fig1), might
    include only a few features of the structures that are found in an actual cell.


    ![](images/78624_3_En_1_Chapter/78624_3_En_1_Fig1_HTML.png)


    An illustration of a generic cell. It has the following parts labeled: mitochondria,
    cell membrane, and nucleus.


    Figure 1-1


    A generic abstraction of a cell


    This overly simplified diagram doesn’t look like a real nerve cell or a real muscle
    cell or a real blood cell; and yet, it can still be used in an educational setting
    to describe certain aspects of the structure and function of all of these cell
    types—namely, those features that the various cell types have in common.


    The simpler an abstraction—that is, the fewer features it presents—the more general
    it is, and the more versatile it is in describing a variety of real-world situations.
    The more complex an abstraction, the more restrictive it is, and thus the fewer
    situations it is useful in describing.'
  raw: '## Simplification Through Abstraction


    Take a moment to look around the room in which you’re reading this book. At first,
    you may think that there really aren’t that many things to observe: some furniture,
    light fixtures, perhaps some plants, artwork, even some other people or pets.
    Maybe there is a window to gaze out of that opens up the outside world to observation.


    Now look again. For each thing that you see, there are a myriad of details to
    observe: its size, its color, its intended purpose, the components from which
    it’s assembled (the legs on a table, the lightbulbs in a lamp), etc. In addition,
    each one of these components in turn has details associated with it: the type
    of material used to make the legs of the table (wood or metal), the wattage of
    the lightbulbs, etc. Now factor in your other senses: the sound of someone snoring
    (hopefully not while reading this book!), the smell of popcorn coming from the
    microwave oven down the hall, and so forth. Finally, think about all of the unseen
    details of these objects: who manufactured them or what their chemical, molecular,
    or genetic composition is.


    It’s clear that the amount of information to be processed by our brains is truly
    overwhelming. For the vast majority of people, this doesn’t pose a problem, however,
    because we’re innately skilled at **abstraction**, a process that involves recognizing
    and focusing on the important characteristics of a situation or object and filtering
    out or ignoring all of the unessential details.


    One familiar example of an abstraction is a road map. As an abstraction, a road
    map represents those features of a given geographic area relevant to someone trying
    to navigate with the map, perhaps by car: major roads and places of interest,
    obstacles such as large bodies of water, etc. Of necessity, a road map can’t include
    every building, tree, street sign, billboard, traffic light, fast-food restaurant,
    etc. that physically exists in the real world. If it did, then it would be so
    cluttered as to be virtually unusable; none of the important features would stand
    out. Compare a road map to a topographical map, a climatological map, and a population
    density map of the same region: each abstracts out different features of the real
    world—namely, those relevant to the intended user of the map in question.


    As another example, consider a landscape. An artist may look at the landscape
    from the perspective of colors, textures, and shapes as a prospective subject
    for a painting. A home builder may look at the same landscape from the perspective
    of where the best building site may be on the property, assessing how many trees
    will need to be cleared to make way for a construction project. An ecologist may
    closely study the individual species of trees and other plant/animal life for
    their biodiversity, with an eye toward preserving and protecting them, whereas
    a child may simply be looking at all of the trees in search of the best site for
    a tree house. Some elements are common to all four observers’ abstractions of
    the landscape—the types, sizes, and locations of trees, for example—while others
    aren’t relevant to all of the abstractions.


    ## Generalization Through Abstraction


    If we eliminate enough detail from an abstraction, it becomes generic enough to
    apply to a wide range of specific situations or instances. Such generic abstractions
    can often be quite useful. For example, a diagram of a generic cell in the human
    body, such as the one in Figure [1-1](#78624_3_En_1_Chapter.xhtml#Fig1), might
    include only a few features of the structures that are found in an actual cell.


    ![](images/78624_3_En_1_Chapter/78624_3_En_1_Fig1_HTML.png)


    An illustration of a generic cell. It has the following parts labeled: mitochondria,
    cell membrane, and nucleus.


    Figure 1-1


    A generic abstraction of a cell


    This overly simplified diagram doesn’t look like a real nerve cell or a real muscle
    cell or a real blood cell; and yet, it can still be used in an educational setting
    to describe certain aspects of the structure and function of all of these cell
    types—namely, those features that the various cell types have in common.


    The simpler an abstraction—that is, the fewer features it presents—the more general
    it is, and the more versatile it is in describing a variety of real-world situations.
    The more complex an abstraction, the more restrictive it is, and thus the fewer
    situations it is useful in describing.'
  trans: '

    ## 通过抽象实现简化


    请花点时间环顾你正在阅读本书的房间。起初，你可能会觉得值得观察的事物并不多：一些家具、灯具，或许还有几盆植物、几件艺术品，甚至还有其他人或宠物。也许还有一扇窗户，可以眺望外面的世界。


    现在再看一次。你看到的每一样东西，都蕴含着无数可供观察的细节：它的尺寸、颜色、设计用途、构成它的组件（桌子的腿、灯里的灯泡）等等。此外，这些组件中的每一个又都关联着各自的细节：制作桌腿的材料类型（木材或金属）、灯泡的瓦数等等。现在，再调动你的其他感官：有人打鼾的声音（希望不是在读这本书的时候！）、走廊那头微波炉里飘出的爆米花香味，等等。最后，想想这些物体所有看不见的细节：是谁制造了它们，或者它们的化学、分子或基因组成是什么。


    显然，我们大脑需要处理的信息量是极其庞大的。然而，对于绝大多数人来说，这并不会构成问题，因为我们天生就擅长**抽象**——这是一个识别并专注于情境或对象的重要特征，同时过滤或忽略所有非本质细节的过程。


    抽象的一个常见例子是道路地图。作为一种抽象，道路地图呈现了特定地理区域内与试图使用地图导航的人（例如驾车者）相关的那些特征：主要道路和兴趣点、大型水体等障碍物。必然地，一张道路地图不可能包含现实世界中实际存在的每一栋建筑、每一棵树、每一个路标、每一块广告牌、每一个红绿灯、每一家快餐店等等。如果它包含了，那么它就会变得杂乱无章，几乎无法使用；所有重要的特征都无法凸显出来。将一张道路地图与同一地区的*地形图*、*气候图*和*人口密度图*进行比较：每一张图都抽象出了现实世界中不同的特征——即那些与地图目标用户相关的特征。


    再举一个例子，考虑一处风景。一位艺术家可能会从色彩、纹理和形状的角度来看待这片风景，将其视为一幅画作的潜在主题。一位房屋建造商可能会从房产上最佳建筑地点的角度来审视同一片风景，评估需要砍伐多少棵树才能为建筑项目腾出空间。一位生态学家可能会仔细研究单个树种以及其他植物/动物生命的生物多样性，着眼于保护和维护它们，而一个孩子可能只是在寻找所有树木中适合搭建树屋的最佳地点。在这四位观察者对风景的抽象中，有些元素是共通的——例如树木的类型、大小和位置——而其他元素则并非与所有抽象都相关。


    ## 通过抽象实现泛化


    如果我们从抽象中消除足够多的细节，它就会变得足够通用，可以适用于广泛的具体情境或实例。这种通用的抽象通常非常有用。例如，一张人体内通用细胞的示意图，如图 1-1
    所示，可能只包含实际细胞中发现的少数结构特征。


    ![](img/78624_3_En_1_Fig1_HTML.png)


    一张通用细胞的示意图。它标有以下部分：线粒体、细胞膜和细胞核。


    图 1-1


    细胞的通用抽象


    这张过度简化的示意图看起来不像真正的神经细胞、肌肉细胞或血细胞；然而，它仍然可以在教育环境中用来描述所有这些细胞类型的结构和功能的某些方面——即各种细胞类型共有的那些特征。


    抽象越简单——也就是说，它呈现的特征越少——它就越通用，在描述各种现实世界情境时也就越灵活。抽象越复杂，它的限制就越多，因此它能有效描述的情境也就越少。

