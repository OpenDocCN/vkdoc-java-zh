  trans: "\n### 捕获方法返回的值\n\n每当我们调用一个返回类型非 `void` 的方法时，我们可以选择忽略或响应该方法返回的值。在之前的示例中，我们将\
    \ `Student` 类的 `registerForCourse` 方法声明为返回 `boolean` 类型：\n\n```\nboolean registerForCourse(String\
    \ courseID, int secNo)\n```\n\n但在调用该方法时，我们并未关注返回的 `boolean` 值是什么：\n\n```\nx.registerForCourse(\"\
    MATH 101\", 10);\n```\n\n如果我们希望响应非 `void` 方法返回的值，可以选择将该值捕获到声明为适当类型的变量中，如下例所示：\n\
    \n```\nboolean successfullyRegistered = x.registerForCourse(\"MATH 101\", 10);\n\
    if (!successfullyRegistered) { // 或：if (successfullyRegistered == false)\n// 伪代码。\n\
    注册失败时要执行的操作 ...\n}\n```\n\n然而，如果我们只打算在代码中使用一次方法返回的值，那么费心声明一个像 `successfullyRegistered`\
    \ 这样的显式变量来捕获结果就显得多余了。我们可以通过将消息表达式***嵌套***在更复杂的语句中来直接响应结果。例如，我们可以重写前面的代码片段，消除变量\
    \ `successfullyRegistered`，如下所示：\n\n```\n// 注册一门课程并响应方法返回的值。\nif (!(x.registerForCourse(\"\
    MATH 101\", 10))) {\n// 伪代码。\n注册失败时要执行的操作 ...\n}\n```\n\n由于 `registerForCourse`\
    \ 方法返回一个 `boolean` 值，消息 `x.registerForCourse(...)` 是一个 `boolean` 表达式，可以在 `if`\
    \ 语句的 `if` 子句中使用。此外，我们可以像上例那样对表达式应用 `!`（“非”）运算符。\n\n在开发面向对象应用程序时，我们经常将方法调用与其他类型的语句结合使用——例如，在向命令窗口打印输出时：\n\
    \n```\nStudent s = new Student();\n// 省略细节。\nSystem.out.println(\"名为 \" + s.getName()\
    \ + \" 的学生\" +\n\" 的 GPA 为 \" + s.getGPA());\n```\n\n### 方法签名\n\n我们已经了解到，方法头至少包含方法的返回类型、名称和形式参数列表：\n\
    \n```\nvoid switchMajor(String newDepartment, Professor newAdvisor)\n```\n\n然而，从用于在对象上调用方法的代码角度来看，返回类型和参数名称在检查时并不直接可见：\n\
    \n```\nStudent s = new Student();\nProfessor p = new Professor();\n// 省略细节 ...\n\
    s.chooseMajor(\"MATH\", p);\n```\n\n通过检查最后一行代码，我们可以推断出：\n\n*   `chooseMajor` 是为\
    \ `Student` 类定义的方法的名称；否则，编译器会拒绝这一行。\n\n*   `chooseMajor` 方法声明了两个参数，类型分别为 `String`\
    \ 和 `Professor`，因为我们传入的参数类型正是这些：具体来说，是一个 `String` 字面量和一个对 `Professor` 对象的引用。\n\
    \n然而，我们***无法***通过检查这段代码确定的是：(a) 对应方法头中形式参数的***命名***方式，或 (b) 该方法的***返回类型***声明为什么；它可能是\
    \ `void`，或者该方法可能返回一个非 `void` 的结果，而我们只是选择忽略它。\n\n因此，我们将方法的**签名**定义为方法头中那些通过检查调用方法的代码可以“发现”的方面，即：\n\
    \n*   方法的***名称***\n\n*   方法声明的***参数***的顺序、类型和数量\n\n但***排除***：\n\n*   参数名称\n\n\
    *   方法的返回类型\n\n此外，我们将引入非正式术语**参数签名**，指方法签名的***子集***，由参数的顺序、类型和数量组成，但排除方法***名称***。\n\
    \n“参数签名”并非行业标准术语，但它仍然很有用。我们将在本书中一直使用它。\n\n以下是一些方法头及其对应方法/参数签名的示例：\n\n*   ***方法头***：`int\
    \ getAge(int ageType)`\n    *   ***方法签名***：`getAge(int)`\n\n    *   ***参数签名***：`(int)`\n\
    \n*   ***方法头***：`void chooseMajor(String newDepartment, Professor newAdvisor)`\n\
    \    *   ***方法签名***：`chooseMajor(String, Professor)`\n\n    *   ***参数签名***：`(String,\
    \ Professor)`\n\n*   ***方法头***：`String getName()`\n    *   ***方法签名***：`getName()`\n\
    \n    *   ***参数签名***：`()`\n\n### 选择描述性的方法名称\n\n为方法分配直观、描述性的名称有助于使应用程序的代码具有自文档性。当与精心设计的变量名称（如下面代码示例中所选的名称）结合使用时，注释（几乎）是多余的：\n\
    \n```\npublic class IntuitiveNames {\npublic static void main(String[] args) {\n\
    Student student;\nProfessor professor;\nCourse course1;\nCourse course2;\nCourse\
    \ course3;\n// 在程序稍后部分 ...\n// 这段代码相当容易理解！\n// 学生选择一位教授作为其导师 ...\nstudent.chooseAdvisor(professor);\n\
    // ... 并注册三门课程中的第一门。\nstudent.registerForCourse(course1);\n// 等等。\n```\n\n现在，将前面的代码与下面“模糊”得多的代码进行对比：\n\
    \n```\npublic class FuzzyNames {\npublic static void main(String[] args) {\nStudent\
    \ s;\nProfessor p;\nCourse c1;\nCourse c2;\nCourse c3;\n// 在程序稍后部分 ...\n// 如果没有注释，接下来的这段代码就不那么直观了。\n\
    s.choose(p);\ns.reg(c1);\n// 等等。\n```\n"
- fmt: '# Method Overloading


    **Overloading** is a language mechanism that allows two or more different methods
    belonging to the same class to have the **same** name as long as they have **different**
    argument signatures. Overloading is supported by numerous non-OO languages like
    `C` as well as by OO languages like `Java`.


    For example, the `Student` class may legitimately define the following five different
    `print` method headers:


    ```

    void print(String fileName) { ... // version #1

    void print(int detailLevel) { ... // version #2

    void print(int detailLevel, String fileName) { ... // version #3

    int print(String reportTitle, int maxPages) { ... // version #4

    boolean print() { ... // version #5

    ```


    Hence, the `print` method is said to be **overloaded**. Note that all five of
    the methods differ in terms of their argument signatures:


    - The first takes a single `String` as an argument.

    - The second takes a single `int`.

    - The third takes two arguments—an `int` followed by a `String`.

    - The fourth takes two arguments—a `String` followed by an `int` (although these
    are the same parameter types as in the previous header, they are in a different
    order).

    - The fifth takes no arguments at all.


    Thus, all five of these headers represent valid, different methods, and all can
    coexist happily within the `Student` class without any complaints from the compiler.


    We can then choose which of these five “flavors” of the `print` method we’d like
    a `Student` object to perform based on what form of message we send to a `Student`
    object:


    ```

    Student s = new Student();

    // Invoking the version of print that takes a single String argument.

    s.print("output.rpt");

    // Invoking the version of print that takes a single int argument.

    s.print(2);

    // Invoking the version that takes two arguments, an int followed by a String.

    s.print(2, "output.rpt");

    // etc.

    ```


    The compiler is able to unambiguously match up which version of the `print` method
    is being called in each instance based on the argument signatures.


    This example illustrates why overloaded methods must have unique argument signatures:
    if we **were** permitted to introduce the following additional `print` method
    as a sixth method of `Student`:


    ```

    boolean print(int levelOfDetail) { ... // version #6

    ```


    despite the fact that its argument signature—a single `int`—duplicates the argument
    signature of one of the other five `print` methods:


    ```

    void print(int detailLevel) { ... // version #2

    ```


    then the compiler would be unable to determine which version of the `print` method,
    #2 or #6, we are trying to invoke with the following line of code:


    ```

    s.print(3);  // Which version to we want to execute:  #2 or #6?  HELP!!!

    ```


    So, to make life simple, the compiler prevents this type of ambiguity from arising
    in the first place by preventing classes from declaring like-named methods with
    identical argument signatures. The compiler error we’d generate if we were to
    try to declare version #6 of the `print` method along with the other five versions
    would be as follows:


    ```

    print(int) is already defined in Student

    boolean print(int levelOfDetail) {

    ^

    ```


    The ability to overload methods allows us to create an entire family of similarly
    named methods that do essentially the same job. Think back to Chapter [2](#78624_3_En_2_Chapter.xhtml)
    where we discussed the `System.out.println` method, which is used to display printed
    output to the command window. As it turns out, there is not one but **many** versions
    of the `System.out.println` method; each overloaded version accepts a different
    argument type (`println(int)`, `println(String)`, `println(double)`, etc.). Using
    an overloaded `System.out.println` method is much simpler and neater than having
    to use separate methods named `printlnString`, `printlnInt`, `printlnDouble`,
    and so on.


    Note that there is no such thing as **attribute** overloading; that is, if a class
    tries to declare two attributes with the same name:


    ```

    public class Student {

    private String studentId;

    private int studentId;

    // etc.

    ```


    the compiler will generate an error message on the second declaration:


    ```

    studentId is already defined in Student

    ```'
