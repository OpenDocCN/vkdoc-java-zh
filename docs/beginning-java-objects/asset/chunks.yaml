    \nCongratulations! After completing Chapters [1](#78624_3_En_1_Chapter.xhtml)`–`[14](#78624_3_En_14_Chapter.xhtml),\
    \ you now know what many Java developers unfortunately don’t get a solid jump-start\
    \ on, namely:\n\n*   How to take full advantage of Java as an object-oriented\
    \ language\n\n*   How to develop the model layer of an application to properly\
    \ address the requirements of an application at the outset of development\n\n\
    You’ve also now learned enough Java to be able to build a command-line-driven\
    \ program. Is this knowledge useful? Absolutely! Command-line-driven (Java) programs\
    \ are often used to automate “back-end” (server-side) processes as part of a larger\
    \ enterprise application or system.\n\nThat being said, you may ultimately wish\
    \ to learn how to develop full-blown user-driven applications like the SRS, including\n\
    \n*   A graphical user interface, by which users will be able to “drive” the model`—`most\
    \ likely a browser-based UI\n\n*   A means of persisting the state of our objects\
    \ from one invocation of the application to the next by storing information about\
    \ their states (attribute values) in a database\n\nThe technologies involved with\
    \ these aspects of building a user-driven, browser-based application are constantly\
    \ evolving. Each of these alternative technologies warrants an entire book (or\
    \ more) to do justice to it and is outside of the scope of this book to address\
    \ in detail. However, we want you to understand ***conceptually*** what’s involved\
    \ with accomplishing both of these tasks.\n\nIn this chapter, you will learn\n\
    \n*   The typical architecture for a three-tier user-driven application\n\n* \
    \  An approach to building the persistence tier\n\n*   An approach to building\
    \ the presentation tier\n\n*   The role of the controller in the application tier\n\
    \n*   The importance of achieving independence among these three tiers\n\n   \
    \ A bit of nomenclature: The terms “tier” and “layer” are often used interchangeably.\n\
    \n    The terms “data” and “persistence” are often used interchangeably.\n\n \
    \   The terms “view” and “presentation” are often used interchangeably.\n\n##\
    \ A Three-Tier Architecture\n\nFigure [15-1](#78624_3_En_15_Chapter.xhtml#Fig1)\
    \ illustrates a typical three-tier architecture for a browser-based application.\n\
    \n![](images/78624_3_En_15_Chapter/78624_3_En_15_Fig1_HTML.jpg)\n\nAn illustration\
    \ of the client's browser, the web server, and the database server. The web server\
    \ is divided into 3 tiers presentation, application, and persistence.\n\nFigure\
    \ 15-1\n\nThree tiers of a browser-based application\n\n*   The **presentation\
    \ tier** consists of a collection of web pages comprising the user interface,\
    \ residing on a (hardware) web server under control of a (software) web server\
    \ (e.g., Apache Tomcat).\n\n*   The **application tier** consists of the model\
    \ classes/objects plus **controller** software (more about this in a moment).\n\
    \n*   The **persistence tier** consists of one or more classes resident on the\
    \ web server responsible for communicating with the database that stores (persists)\
    \ objects’ states, which typically resides on a separate hardware server.\n\n\
