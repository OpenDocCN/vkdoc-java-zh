- fmt: "# Testing the Model\n\nTesting a model doesn’t involve “rocket science”; rather,\
    \ it calls for some commonsense measures designed to identify errors and/or omissions.\n\
    \n- First of all, revisit all requirements-related project documentation—the original\
    \ problem statement and the supporting use cases—to ensure that no requirements\
    \ were overlooked. We’ll do so for our SRS model in a moment.\n- Conduct a minimum\
    \ of two separate formal walk-throughs of the model: one with the development\
    \ team members and the other with the future users of the system. Prior to each\
    \ walk-through, make sure to distribute copies of the following documentation\
    \ to each of the participants far enough in advance to allow them adequate time\
    \ to review these, if they so desire (but be prepared to discuss significant aspects\
    \ of these at the meeting in case the participants haven’t reviewed them):\n \
    \ - Executive summary version of the problem statement narrative\n  - Class diagram\n\
    \  - Data dictionary\n  - Use case documentation\n  - Significant scenarios and\
    \ corresponding message trace diagrams\n\nBy this stage in the project, you’ll\
    \ have hopefully already educated your users on how to read UML diagrams, and\
    \ they’ll have informally seen numerous iterations of the evolving models. If\
    \ any of the participants in the upcoming walk-throughs aren’t familiar with any\
    \ of the notation, however, take time in advance to tutor them in this regard.\
    \ (The information contained in Chapters [10](#78624_3_En_10_Chapter.xhtml) and\
    \ [11](#78624_3_En_11_Chapter.xhtml) of this book should be more than adequate\
    \ as the basis for such a tutorial.)\n\nWhen conducting the walk-through, designate\
    \ someone to be the narrator and discussion leader and a different person to be\
    \ responsible for recording significant discussion content, particularly changes\
    \ that need to be made. Having one person trying to do both is too distracting,\
    \ and important notes may be missed as a result. If appropriate, you may even\
    \ arrange to tape-record the discussion.\n\nRemain open-minded throughout the\
    \ review process. It’s human nature to want to defend something that we’ve worked\
    \ hard on putting together, but remember that it’s far better to find and correct\
    \ shortcomings now, when the SRS is still a paper skeleton, than after it has\
    \ been rendered into code.\n\n# Revisiting Requirements\n\nIn revisiting the SRS\
    \ case study problem statement, we find that we’ve indeed missed one requirement,\
    \ namely:\n\n*The SRS will verify whether or not the proposed plan of study satisfies\
    \ the requirements of the degree that the student is seeking.*\n\nWe didn’t model\
    \ `Degree` as a class—recall that we debated whether or not to do so back in Chapter\
    \ [10](#78624_3_En_10_Chapter.xhtml) and ultimately decided against it. Nor, for\
    \ that matter, do we reflect the requirements of a particular degree program in\
    \ our model. Let’s look at what it would take to do so properly at this time.\n\
    \nResearching the way in which our university specifies degree program requirements,\
    \ we learn the following:\n\n- Every degree program specifies five “core” courses—that\
    \ is, courses that a student must take. For example, for the degree of Master\
    \ of Science in information technology (MSIT), students are required to complete\
    \ the following five core courses:\n  - Analysis of Algorithms\n  - Application\
    \ Programming Design\n  - Computer Systems Architecture\n  - Data Structures\n\
    \  - Information Systems Project Management\n- Students are expected to select\
    \ an area of specialization, known as a **concentration**, within their degree\
    \ program. For the MSIT degree, our university offers three different concentrations:\n\
    \  - Object Technology\n  - Database Management Systems\n  - Networking and Communications\n\
    - Each concentration in turn specifies three mandatory, concentration-specific\
    \ courses. For the MSIT degree with a concentration in Object Technology, the\
    \ required concentration-specific courses are:\n  - Object Methods for Software\
    \ Development\n  - Advanced Java Programming\n  - Object Database Management Systems\n\
    - Finally, the student must take two additional electives to bring their course\
    \ total to ten.\n\nPhew! To model all of these interdependencies would require\
    \ a fairly complex class diagram structure, as shown in Figure [12-1](#78624_3_En_12_Chapter.xhtml#Fig1).\n\
    \n![](images/78624_3_En_12_Chapter/78624_3_En_12_Fig1_HTML.jpg)\n\nA block diagram\
    \ illustrates the degree program, concentration, plan of study, and courses, which\
    \ are interrelated with defined core requirements, fulfillment, observation, and\
    \ required courses as core, concentration, and electives.\n\n**Figure 12-1** —\
    \ Modeling degree program requirements proves to be rather complicated\n\nWe go\
    \ back to our project sponsors—the future users of the SRS—and break the news\
    \ to them that we’ve just uncovered a previously missed requirement that is going\
    \ to significantly increase the complexity and cost of our automation effort.\
    \ The sponsors decide that having the SRS verify the correctness of a student’s\
    \ plan of study is too ambitious a goal; they instead decide that a student will\
    \ use the SRS to submit a proposed plan of study, but that their advisor will\
    \ then be responsible for subsequently verifying and approving it. So all we wind\
    \ up having to do to correct our SRS class diagram as last presented is to add\
    \ one attribute to the `PlanOfStudy` class, reflecting the date on which it was\
    \ approved, and a new *approves* association connecting the `Professor` class\
    \ to the `PlanOfStudy` class, and we’re good to go!\n\nNote that we don’t need\
    \ to add an `approvePlan` method to the `PlanOfStudy` class, because as discussed\
    \ in Chapter [10](#78624_3_En_10_Chapter.xhtml) we may assume the presence of\
    \ “set” methods for all attributes; the `setDateApproved` method would suffice\
    \ for marking a plan as approved. And the *approves* association between the `PlanOfStudy`\
    \ and `Professor` classes (see the diagram excerpt in Figure [12-2](#78624_3_En_12_Chapter.xhtml#Fig2))\
    \ ensures us that each `PlanOfStudy` object will maintain a handle on the `Professor`\
    \ object who actually approved the plan on the date indicated.\n\n![](images/78624_3_En_12_Chapter/78624_3_En_12_Fig2_HTML.jpg)\n\
    \nA block diagram illustrates four segmented boxes, which include Person, Plan\
    \ of Study, Professor, and Student table. At the top, an arrow mark indicates\
    \ approval of the Plan of Study, including the date approved, verification of\
    \ the plan, observation of the student's major and degree enrollment, and advice\
    \ for the professor's title and person.\n\n**Figure 12-2** — Making minor adjustments\
    \ to the SRS class diagram"
