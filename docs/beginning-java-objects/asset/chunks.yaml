  trans: '

    #### 聚合


    聚合，正如你在第 5 章所学到的，是一种特殊形式的关联，它恰好暗示了包含关系。它与“普通”关联的区别在于，在关联线接触“包含”类的一端放置一个菱形。例如，为了描述一所大学由多个学院组成——工程学院、法学院、医学院等——我们会使用如图
    10-18 所示的表示法。


    ![](img/78624_3_En_10_Fig18_HTML.png)


    一个框图从上到下表示两个分别标记为“大学”和“学院”的方块。学院指向大学的一端带有菱形。


    图 10-18


    用菱形表示聚合


    聚合关系实际上可以朝向任何方向，只要菱形正确地锚定在“包含”类上，如图 10-19 所示。


    ![](img/78624_3_En_10_Fig19_HTML.jpg)


    一个图表示三对分别标记为“大学”和“学院”的矩形方块，方向各不相同。在每个实例中，学院指向大学的一端都带有菱形。


    图 10-19


    聚合可以朝向任何方向


    聚合线通常不需要标记，因为聚合本身就暗示了“部分”-“整体”关系。


    然而，正如在第 5 章中提到的，即使完全不使用聚合，我们也能实现目标！为了表示上述概念，我们可以在`University`和`School`类之间创建一个简单的关联，并将其标记为“*由……组成*”，如图
    10-20 所示。


    ![](img/78624_3_En_10_Fig20_HTML.jpg)


    一个框图表示左侧标记为“大学”和右侧标记为“学院”的两个方块。中间的文字说明“大学由学院组成”。


    图 10-20


    作为聚合替代方案的简单关联


    决定使用聚合还是普通关联是微妙的，因为事实证明，两者在代码中的实现方式基本相同，正如你将在本书第 3 部分中看到的那样。


    与关联线不同（关联线通常应使用其所代表的关联名称进行标记），聚合线通常不标记，因为聚合的定义本身就暗示了包含关系。


    当两个或多个不同的类代表某个“整体”的“部分”时，每个“部分”都与该“整体”分别构成一个聚合关系，如图 10-21 所示。


    ![](img/78624_3_En_10_Fig21_HTML.jpg)


    一个图表示顶部一个标记为“整体”的方块，底部两个分别标记为“部分 A”和“部分 B”的方块。底部的方块指向顶部的方块。


    图 10-21


    两个聚合关系，使用两个菱形绘制


    然而，我们经常将这些聚合线合并成一个类似组织结构图的单一结构，如图 10-22 所示。


    ![](img/78624_3_En_10_Fig22_HTML.png)


    一个图表示顶部一个标记为“整体”的方块，底部两个分别标记为“部分 A”和“部分 B”的方块。底部的方块合并指向顶部的方块。


    图 10-22


    涉及同一个“整体”类的两个聚合关系，使用单个菱形绘制


    这样做并不意味着部分 A 与部分 B 之间存在任何关系；这仅仅是一种简化图表的方式。


    组合，正如你在第 5 章所学到的，是一种强形式的聚合，其中“部分”不能脱离“整体”而存在。它使用“实心”/“黑色”菱形，而不是“空心”/“白色”菱形，如图
    10-23 所示。


    ![](img/78624_3_En_10_Fig23_HTML.jpg)


    一个插图从下到上表示两个分别标记为“章节”和“书籍”的矩形方块。“章节”指向“书籍”。中间的文字写着“实心菱形”。


    图 10-23


    实心菱形表示组合，这是一种强形式的聚合


    #### 继承


    继承（泛化/特化）通过一条线将派生类连接到其基类，然后在该线上标记一个接触基类的三角形来表示（见图 10-24）。


    ![](img/78624_3_En_10_Fig24_HTML.png)


    一个插图从下到上表示两个分别标记为“教授”和“人”的矩形方块。“教授”指向“人”的一端带有箭头。


    图 10-24


    继承用三角形表示


    与聚合一样，参与继承关系的类可以以任何方向表示，只要三角形指向/接触基类即可。


    继承线***不应***标记，因为它们明确无误地表示了“是一个”关系。


    与聚合类似，当两个或多个不同的类代表同一个父类的派生类时，每个派生类都与父类分别构成一个继承关系，如图 10-25 所示，但我们经常将这些继承线合并成一个单一结构，如图
    10-26 所示。


    ![](img/78624_3_En_10_Fig26_HTML.png)


    一个插图表示底部两个分别标记为“子类 A”和“子类 B”的矩形方块合并后，指向顶部一个标记为“超类”的方块。


    图 10-26


    使用单个三角形表示两个派生类


    ![](img/78624_3_En_10_Fig25_HTML.png)


    一个插图表示底部两个分别标记为“子类 A”和“子类 B”的矩形方块，分别指向顶部一个标记为“超类”的方块。


    图 10-25


    使用两个不同的三角形表示两个派生类


    这样做并不意味着派生类`A`与派生类`B`之间的关系与之前的描述有任何不同——在这两种情况下，这些类都被视为拥有共同父类的兄弟类。这仅仅是一种简化图表的方式。

    '
- fmt: '### Reflecting Multiplicity


    You learned in Chapter [5](#78624_3_En_5_Chapter.xhtml) that for a given association
    type `X` between classes `A` and `B`, the term “multiplicity” refers to the number
    of instances of objects of type `A` that must/may be associated with a given instance
    of type `B` and vice versa. When preparing a class diagram, we mark each end of
    an association line to indicate what its multiplicity should be from the perspective
    of an object belonging to the class at the other end of the line. In other words:


    - We mark the number of instances of `B` that can relate to a single instance
    of `A` at `B`’s end of the line.

    - We mark the number of instances of `A` that can relate to a single instance
    of `B` at `A`’s end of the line.


    This is depicted in Figure [10-27](#78624_3_En_10_Chapter.xhtml#Fig27).


    ![](images/78624_3_En_10_Chapter/78624_3_En_10_Fig27_HTML.jpg)


    *An illustration represents 2 rectangular blocks labeled A and B connected through
    a line from left to right. The text on the left denotes how many instances of
    A can relate to a single instance of B. on the right, it reads how many instances
    of B can relate to an instance of A.*


    **Figure 10-27** — Indicating multiplicity between classes


    By way of review, given a single object belonging to class `A`, there are four
    different scenarios for how object(s) of type `B` may be related to it:


    - The `A`-type object may be related to **exactly one** instance of a `B`-type
    object, as in the situation “a `Student` (`A`) *has* a `Transcript` (`B`).” Here,
    the existence of an instance of `B` for every instance of `A` is **mandatory**.

    - The `A`-type object may be related to **at most one** instance of a `B`-type
    object, as in the situation “a `Professor` (`A`) *chairs* a `Department` (`B`).”
    Here, the existence of an instance of `B` for every instance of `A` is **optional**.

    - The `A`-type object may be related to **one or more** instances of a `B`-type
    object, as in the situation “a `Department` (`A`) *employs* **many** `Professor`s
    (`B`).” Here, the existence of at least one instance of `B` for every instance
    of `A` is **mandatory**.

    - The `A`-type object may be related to **zero or more** instances of a “B” type
    object, as in the situation “a `Student` (`A`) *is attending* **many** `Section`s
    (`B`).” (At our hypothetical university, a student is permitted to take a semester
    off.) Here, the existence of at least one instance of `B` for every instance of
    `A` is **optional**.


    In UML notation, multiplicity symbols are as follows:


    - “Exactly one” is represented by the notation `1`.

    - “At most one” is represented by the notation `0..1`, which is alternatively
    read as “zero or one.”

    - “One or more” is represented by the notation `1..*`.

    - “Zero or more” is represented by the notation `0..*`.

    - We use the notation `*` when we know that the multiplicity should be “many”
    but we aren’t certain (or we don’t care to specify) whether it should be “zero
    or more” or “one or more.”

    - It’s even possible to represent an arbitrary range of explicit numerical values
    `x..y`, such as using `3..7` to indicate, for example, that “a `Department` employs
    no fewer than three, and no more than seven, `Professor`s.”


    Here are some UML examples:


    “A `Student` *has* exactly one `Transcript`, and a `Transcript` *belongs to* exactly
    one `Student`.” (See Figure [10-28](#78624_3_En_10_Chapter.xhtml#Fig28).)


    ![](images/78624_3_En_10_Chapter/78624_3_En_10_Fig28_HTML.jpg)


    *An illustration represents 2 rectangular blocks labeled student and transcript
    connected through a line from left to right. The text on the middle line reads
    has a.*


    **Figure 10-28** — An example of mandatory one-to-one multiplicity


    “A `Professor` *works for* exactly one `Department`, but a `Department` *has*
    many (one or more) `Professor`s as employees.” (See Figure [10-29](#78624_3_En_10_Chapter.xhtml#Fig29).)


    ![](images/78624_3_En_10_Chapter/78624_3_En_10_Fig29_HTML.jpg)


    *An illustration represents 2 rectangular blocks labeled professor and department
    connected through a line from left to right. The text on the middle line reads
    works for.*


    **Figure 10-29** — An example of mandatory one-to-many multiplicity


    “A `Professor` optionally *chairs* at most one `Department`, while a `Department`
    *has* exactly one `Professor` in the role of chairman.” (See Figure [10-30](#78624_3_En_10_Chapter.xhtml#Fig30).)


    ![](images/78624_3_En_10_Chapter/78624_3_En_10_Fig30_HTML.jpg)


    *An illustration represents 2 rectangular blocks labeled professor and department
    connected through a line from left to right. The text on the middle line reads
    chairs.*


    **Figure 10-30** — An example of optional one-to-many multiplicity


    “A `Student` *attends* many (zero or more) `Section`s, and a `Section` *is attended
    by* many (zero or more) `Student`s.” (See Figure [10-31](#78624_3_En_10_Chapter.xhtml#Fig31).)


    ![](images/78624_3_En_10_Chapter/78624_3_En_10_Fig31_HTML.jpg)


    *An illustration represents 2 rectangular blocks labeled student and section connected
    through a line from left to right. The text on the middle line reads attends.
    Each block indicates 0 dot, dot star.*


    **Figure 10-31** — An example of optional many-to-many multiplicity


    A `Section` that continues to have zero `Student`s signed up to attend will most
    likely be canceled; nonetheless, there is a period of time after a `Section` is
    first made available for enrollment via the SRS that it will have zero `Student`s
    enrolled.


    “A `Course` *is a prerequisite for* many (zero or more) `Course`s, and a `Course`
    *can have* many (zero or more) *prerequisite* `Course`s.” (See Figure [10-32](#78624_3_En_10_Chapter.xhtml#Fig32).)


