    ### 派生类的规则：“禁忌”


    在派生新类时，有些事我们***不应***尝试去做。（事实证明，面向对象语言的编译器实际上会阻止我们成功编译试图执行这些操作的程序。）


    ***我们不应改变特性的语义——即其意图或含义***。例如：


    *   如果超类（如 `Student`）的 `print` 方法旨在在命令窗口中显示对象所有属性的值，那么子类（如 `GraduateStudent`）的
    `print` 方法就不应被重写，例如，将其所有输出重定向到文件。


    *   如果超类（如 `Person`）的 `name` 属性旨在以“姓, 名”的顺序存储人名，那么子类（如 `Student`）的 `name` 属性也应以相同方式使用。


    ***我们无法物理上删除特性，也不应通过忽略它们来有效删除***。试图这样做会破坏“is a”层次结构的精神。根据定义，继承要求类 A 的***所有***祖先的***所有***特性也必须适用于类
    A 本身，这样 A 才能成为真正的子类。例如，如果 `GraduateStudent` 可以删除从 `Student` 继承的 `degreeSought`
    属性，那么 `GraduateStudent` ***真的***还是 `Student` 吗？严格来说，答案是否定的。


    此外，从实践角度来看，如果我们通过重写一个方法为“什么都不做”的版本来有效禁用该方法，如下面的 `BadStudent` 示例所示：


