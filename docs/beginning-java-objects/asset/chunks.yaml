- fmt: "### Capturing the Value Returned by a Method\n\nWhenever we invoke a method\
    \ with a non-`void` return type, it’s up to us to choose to either ignore or react\
    \ to the value that the method returns. In an earlier example, we declared the\
    \ `Student` class’s `registerForCourse` method to have a return type of `boolean`:\n\
    \n```\nboolean registerForCourse(String courseID, int secNo)\n```\n\nBut we didn’t\
    \ pay any attention to what `boolean` value was returned when we invoked the method:\n\
    \n```\nx.registerForCourse(\"MATH 101\", 10);\n```\n\nIf we wish to react to the\
    \ value returned by a non-`void` method, we may choose to capture the value in\
    \ a variable declared to be of the appropriate type, as in the following example:\n\
    \n```\nboolean successfullyRegistered = x.registerForCourse(\"MATH 101\", 10);\n\
    if (!successfullyRegistered) { // or:  if (successfullyRegistered == false)\n\
    // Pseudocode.\naction to be taken if registration failed ...\n}\n```\n\nHowever,\
    \ if we only plan on using the returned value from a method once in our code,\
    \ then going to the trouble of declaring an explicit variable such as `successfullyRegistered`\
    \ to capture the result is overkill. We can instead react to the result simply\
    \ by ***nesting*** a message expression within a more complex statement. For example,\
    \ we can rewrite the preceding code snippet to eliminate the variable `successfullyRegistered`\
    \ as follows:\n\n```\n// Register for a course and react to the value that is\
    \ returned by the method.\nif (!(x.registerForCourse(\"MATH 101\", 10))) {\n//\
    \ Pseudocode.\naction to be taken if registration failed ...\n}\n```\n\nBecause\
    \ the `registerForCourse` method returns a `boolean` value, the message `x.registerForCourse(...)`\
    \ is a `boolean` expression and can be used within the `if` clause of an `if`\
    \ statement. Furthermore, we can apply the `!` (“not”) operator to the expression,\
    \ as in the preceding example.\n\nWe often combine method calls with other types\
    \ of statements when developing object-oriented applications—for example, when\
    \ printing to the command window:\n\n```\nStudent s = new Student();\n// Details\
    \ omitted.\nSystem.out.println(\"The student named \" + s.getName() +\n\" has\
    \ a GPA of \" + s.getGPA());\n```\n\n### Method Signatures\n\nWe’ve already learned\
    \ that a method header consists at a minimum of the method’s return type, name,\
    \ and formal parameter list:\n\n```\nvoid switchMajor(String newDepartment, Professor\
    \ newAdvisor)\n```\n\nFrom the standpoint of the code used to invoke a method\
    \ on an object, however, the return type and parameter names aren’t immediately\
    \ evident upon inspection:\n\n```\nStudent s = new Student();\nProfessor p = new\
    \ Professor();\n// Details omitted ...\ns.chooseMajor(\"MATH\", p);\n```\n\nWe\
    \ can infer from inspecting the last line of code that:\n\n* `chooseMajor` is\
    \ the name of a method defined for the `Student` class; otherwise, the compiler\
    \ would reject this line.\n* The `chooseMajor` method declares two parameters\
    \ of types `String` and `Professor`, respectively, because those are the types\
    \ of the arguments that we’re passing in: specifically, a `String` literal and\
    \ a reference to a `Professor` object.\n\nHowever, what we ***cannot*** determine\
    \ from inspecting this code is (a) how the formal parameters were ***named***\
    \ in the corresponding method header or (b) what the ***return type*** of this\
    \ method is declared to be; it may be `void`, or the method may be returning a\
    \ non-`void` result that we’ve simply chosen to ignore.\n\nFor this reason, we\
    \ refer to a method’s **signature** as those aspects of a method header that are\
    \ “discoverable” by inspecting the code used to invoke the method, namely:\n\n\
    * The method’s ***name***\n* The order, types, and number of ***parameters declared\
    \ by*** the method\n\nbut ***excluding***:\n\n* The parameter names\n* The method’s\
    \ return type\n\nFurthermore, we’ll introduce the informal terminology **argument\
    \ signature** to refer to that ***subset*** of a method signature consisting of\
    \ the order, types, and number of arguments, but excluding the method ***name***.\n\
    \n“Argument signature” isn’t an industry-standard term, but one that is nonetheless\
    \ useful. We’ll use it throughout the book.\n\nSome examples of method headers\
    \ and their corresponding method/argument signatures are as follows:\n\n* ***Method\
    \ header***: `int getAge(int ageType)`\n  * ***Method signature***: `getAge(int)`\n\
    \  * ***Argument signature***: `(int)`\n\n* ***Method header***: `void chooseMajor(String\
    \ newDepartment, Professor newAdvisor)`\n  * ***Method signature***: `chooseMajor(String,\
    \ Professor)`\n  * ***Argument signature***: `(String, Professor)`\n\n* ***Method\
    \ header***: `String getName()`\n  * ***Method signature***: `getName()`\n  *\
    \ ***Argument signature***: `()`\n\n### Choosing Descriptive Method Names\n\n\
    Assigning intuitive, descriptive names to our methods helps make an application’s\
    \ code self-documenting. When combined with carefully crafted variable names such\
    \ as those chosen in the following code example, comments are (virtually) unnecessary:\n\
    \n```\npublic class IntuitiveNames {\npublic static void main(String[] args) {\n\
    Student student;\nProfessor professor;\nCourse course1;\nCourse course2;\nCourse\
    \ course3;\n// Later in the program ...\n// This code is fairly straightforward\
    \ to understand!\n// A student chooses a professor as its advisor ...\nstudent.chooseAdvisor(professor);\n\
    // ... and registers for the first of three courses.\nstudent.registerForCourse(course1);\n\
    // etc.\n```\n\nNow, contrast the preceding code with the much “fuzzier” code\
    \ that follows:\n\n```\npublic class FuzzyNames {\npublic static void main(String[]\
    \ args) {\nStudent s;\nProfessor p;\nCourse c1;\nCourse c2;\nCourse c3;\n// Later\
    \ in the program ...\n// Without comments, this next bit of code is not nearly\
    \ as intuitive.\ns.choose(p);\ns.reg(c1);\n// etc.\n```"
