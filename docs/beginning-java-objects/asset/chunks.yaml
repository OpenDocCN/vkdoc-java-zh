  trans: '#### `finally` 块


    一个 `try` 块可以选择性地关联一个 `finally` 块；如果提供了 `finally` 块，它必须跟在同一个 `try` 块的所有 `catch`
    块之后。


    无论前面的 `try`/`catch` 代码中发生什么，`finally` 块中的代码都***保证***会执行，也就是说，无论出现以下哪种情况：


    *   `try` 块正常执行完毕，没有抛出任何异常。

    *   `try` 块抛出了一个异常，并被某个 `catch` 块捕获处理。

    *   `try` 块抛出了一个异常，但***没有***被***任何*** `catch` 块捕获（这种情况我们将在本章稍后探讨）。


    让我们为我们不断演进的 `Problem`*x* 程序示例添加一个 `finally` 块；我们将使用包含打印语句的版本，以便再次追踪代码的执行过程：


    ```java

    public class Problem5 {

    public static void main(String[] args) {

    Student s1 = null;

    Student s2 = null;

    // 细节省略...

    // 稍后，我们为 s1 实例化了一个对象，但

    // 忘记为 s2 做同样的事。

    s1 = new Student();

    // 更多细节省略...

    System.out.println("我们即将进入 try 块...");

    try {

    System.out.println("我们即将调用 s1.setName(...)");

    s1.setName("Fred");

    System.out.println("我们即将调用 s2.setName(...)");

    s2.setName("Mary");

    System.out.println("我们已经到达 try 块的末尾...");

    }

    // 这里是我们的 catch 块（总共三个）。

    catch (ArithmeticException e) {

    System.out.println("执行第一个 catch 块...");

    }

    catch (NullPointerException e2) {

    System.out.println("执行第二个 catch 块...");

    }

    catch (ArrayIndexOutOfBoundsException e3) {

    System.out.println("执行第三个 catch 块...");

    }

    finally {

    System.out.println("执行 finally 块...");

    }

    System.out.println("我们已经过了最后一个 catch 块...");

    }

    }

    ```


    执行时，该版本的程序将产生以下输出：


    ```

    我们即将进入 try 块...

    我们即将调用 s1.setName(...)

    我们即将调用 s2.setName(...)

    执行第二个 catch 块...

    执行 finally 块...

    我们已经过了最后一个 catch 块...

    ```


    现在，让我们***修复*** `try` 块中的代码，使其不抛出任何异常，看看程序会产生什么输出：


    ```java

    public class NoProblemo {

    public static void main(String[] args) {

    Student s1 = null;

    Student s2 = null;

    // 细节省略...

    // 稍后，我们为 s1 和 s2 都实例化了对象

    // 以供引用，从而消除了下面 try 块中的

    // NullPointerException。

    s1 = new Student();

    s2 = new Student();

    // 更多细节省略...

    System.out.println("我们即将进入 try 块...");

    try {

    System.out.println("我们即将调用 s1.setName(...)");

    s1.setName("Fred");

    System.out.println("我们即将调用 s2.setName(...)");

    s2.setName("Mary");

    System.out.println("我们已经到达 try 块的末尾...");

    }

    // 这里是我们的 catch 块（总共三个）。

    catch (ArithmeticException e) {

    System.out.println("执行第一个 catch 块...");

    }

    catch (NullPointerException e2) {

    System.out.println("执行第二个 catch 块...");

    }

    catch (ArrayIndexOutOfBoundsException e3) {

    System.out.println("执行第三个 catch 块...");

    }

    finally {

    System.out.println("执行 finally 块...");

    }

    System.out.println("我们已经过了最后一个 catch 块...");

    }

    }

    ```


    执行时，该版本的程序将产生以下输出——请注意，所有 `catch` 块都被***跳过了***：


    ```

    我们即将进入 try 块...

    我们即将调用 s1.setName(...)

    我们即将调用 s2.setName(...)

    我们已经到达 try 块的末尾...

    执行 finally 块...

    我们已经过了最后一个 catch 块...

    ```


    我们 `Problem`*x* 程序的最后一个变体再次抛出了一个 `NullPointerException`，但***没有***在任何 `catch` 块中捕获相应类型的异常：


    ```java

    public class Problem6 {

    public static void main(String[] args) {

    Student s1 = null;

    Student s2 = null;

    // 细节省略...

    // 稍后，我们为 s1 实例化了一个对象，但

    // 忘记为 s2 做同样的事。

    s1 = new Student();

    // 更多细节省略...

    System.out.println("我们即将进入 try 块...");

    try {

    System.out.println("我们即将调用 s1.setName(...)");

    s1.setName("Fred");

    System.out.println("我们即将调用 s2.setName(...)");

    s2.setName("Mary");

    System.out.println("我们已经到达 try 块的末尾...");

    }

    // 这里是我们的 catch 块（总共两个）——请注意，这次我们

    // *没有*捕获 NullPointerException。

    catch (ArithmeticException e) {

    System.out.println("执行第一个 catch 块...");

    }

    catch (ArrayIndexOutOfBoundsException e2) {

    System.out.println("执行第二个 catch 块...");

    }

    finally {

    System.out.println("执行 finally 块...");

    }

    System.out.println("我们已经过了最后一个 catch 块...");

    }

    }

    ```


    执行时，该版本的程序将产生以下输出：


    ```

    我们即将进入 try 块...

    我们即将调用 s1.setName(...)

    我们即将调用 s2.setName(...)

    执行 finally 块...

    ```


    请注意，我们从未到达最后的打印语句


    ```java

    System.out.println("我们已经过了最后一个 catch 块...");

    ```


    因为一个***未捕获***的异常会导致其发生的整个代码块——在我们的例子中是 `main` 方法——异常终止。


    因此我们看到，无论 `try`/`catch` 代码中发生什么，如果存在 `finally` 块，它***总是***会被执行。


    请注意，如果存在 `finally` 块，我们可以省略 `try` 块的 `catch` 子句：


    ```java

    // 如果存在 finally 块，则 catch 块不是必需的。

    try { ... }

    finally { ... }

    ```'
- fmt: '### Catching Exceptions


    If the method in which an exception arises does not catch the exception, then
    the client code that called that method is given a chance to catch it.


    Consider the following three-class example:


    - In our `main` method, we invoke `methodX` on a `Student` object:

    - In the `Student`’s `methodX` code, we in turn invoke `methodY` on a `Professor`
    object:


    ```

    public class MainProgram {

    public static void main(String[] args) {

    Student s = new Student();

    s.methodX();

    }

    }

    ```


    - Finally, here’s the `Professor` class:


    ```

    public class Student {

    // Details omitted.

    public void methodX() {

    Professor p = new Professor();

    p.methodY();

    }

    }

    ```


    ```

    public class Professor {

    // Details omitted.

    public void methodY() {

    // Details omitted ...

    }

    }

    ```


    When the JVM executes our `MainProgram`, its `main` method is invoked, which in
    turn invokes `s.methodX()`, which in turn invokes `p.methodY()`; this produces
    what is known as a **call stack** at run time, illustrated in Figure [13-18](#78624_3_En_13_Chapter.xhtml#Fig18).


    ![](images/78624_3_En_13_Chapter/78624_3_En_13_Fig18_HTML.png)


    A block diagram illustrates the p method, s method, and main program.


    Figure 13-18


    The JVM keeps track of the order in which methods are called one from another
    by creating a call stack


    A **stack** is a last in, first out (LIFO) data structure; the most recent method
    call is **pushed** onto the top of the call stack, and when that method exits,
    it is removed from (**popped** off) the call stack. So, as an example, when `methodY`
    finishes executing and execution control is returned to `methodX`, `methodY` is
    popped off as illustrated conceptually in Figure [13-19](#78624_3_En_13_Chapter.xhtml#Fig19).


    ![](images/78624_3_En_13_Chapter/78624_3_En_13_Fig19_HTML.jpg)


    An illustration of the s method. The main program arrow is directed to the p method.


    Figure 13-19


    When a method exits, it is removed from the call stack


    Let’s now assume that a `NullPointerException` is thrown while executing `methodY`.
    If the appropriate `try`/`catch` logic is incorporated ***within the body of***
    `methodY` to handle/resolve such a `NullPointerException`, as shown in the following


    ```

    public class Professor {

    // Details omitted.

    public void methodY() {

    try { ... }

    catch (NullPointerException e) { ... }

    }

    }

    ```


    then neither the `Student` nor `MainProgram` class will be aware that such an
    exception was ever thrown. From the perspective of the call stack, awareness of
    the exception is contained within the current level of the stack, as illustrated
    in Figure [13-20](#78624_3_En_13_Chapter.xhtml#Fig20).


    ![](images/78624_3_En_13_Chapter/78624_3_En_13_Fig20_HTML.png)


    A block diagram illustrates the p method, s method, and main program. In the p
    method explosion symbol is inside the oval.


    Figure 13-20


    The `try`/`catch` logic within `methodY` limits awareness of the exception to
    the current level in the call stack


    Let’s assume instead that `methodY` does ***not*** catch/handle `NullPointerException`s:


    ```

    public class Professor {

    // Details omitted.

    public void methodY() {

    // A NullPointerException is thrown here, but

    // is NOT caught/handled.

    // (Details omitted.)

    }

    }

    ```


    If a `NullPointerException` is thrown while executing ***this*** version of `methodY`,
    it will travel down the call stack one level to the `Student` class’s `methodX`,
    which is where the call to `p.methodY()` originated. If the `Student` class’s
    `methodX` code happens to include the necessary exception handling code, as shown
    in the following


    ```

    public class Student {

    // Details omitted.

    public void methodX() {

    Professor p = new Professor();

    // Exception handling is performed here.

    try {

    p.methodY();

    }

    catch (NullPointerException e) { ... }

    }

    }

    ```


    then the exception is contained by `methodX` in the `Student` class, and the `MainProgram`
    will thus be unaware that such an exception was ever thrown. This is illustrated
    in terms of the call stack in Figure [13-21](#78624_3_En_13_Chapter.xhtml#Fig21).


    ![](images/78624_3_En_13_Chapter/78624_3_En_13_Fig21_HTML.jpg)


    The block diagram illustrates the p method, s method, and main program. In the
    p method, the explosion symbol is inside the oval and forwarded to the s method.


    Figure 13-21


    The exception “escapes” the `methodY` level of the call stack, but is contained/handled
    by `methodX`


    Now, let’s assume that ***neither*** `methodY` of `Professor` ***nor*** `methodX`
    of `Student` handles `NullPointerException`s, but that our `main` method is written
    to do so, as shown in the following:


    ```

    public class Professor {

    // Details omitted.

    public void methodY() {

    // A NullPointerException is thrown here, but

    // is NOT caught/handled.

    // (Details omitted.)

    }

    }

    //-----------------------------

    public class Student {

    // Details omitted.

    public void methodX() {

    Professor p = new Professor();

    // We’re not doing any exception handling

    // here, either.

    p.methodY();

    }

    }

    //-----------------------------

    public class MainProgram {

    public static void main(String[] args) {

    Student s = new Student();

    // Exception handling introduced here.

    try {

    s.methodX();

    }

    catch (NullPointerException e) { ... }

    }

    }

    ```


    In this case, a `NullPointerException` thrown in `methodY` would make its way
    through the call stack to the `main` method, where it would be contained as shown
    in Figure [13-22](#78624_3_En_13_Chapter.xhtml#Fig22). In this case, the ***user***
    of this application is unaware that an exception has occurred.


    ![](images/78624_3_En_13_Chapter/78624_3_En_13_Fig22_HTML.jpg)


    The block diagram illustrates the p method, s method, and main program. In the
    p method, the explosion symbol inside the oval is forwarded to the s method and
    main program.


    Figure 13-22


    The `NullPointerException` makes its way to the `main` method


    As a final variation, let’s assume that even the `main` method omits explicit
    exception handling. If a `NullPointerException` were to arise in `methodY`, we’d
    see the following **stack trace** appear in the command window:


    ```

    java PSExample

    Exception in thread "main" java.lang.NullPointerException

    at Professor.methodY(Professor.java: ...)

    at Student.methodX(Student.java: ...)

    at MainProgram.main(MainProgram.java: ...)

    ```


    From the perspective of the call stack, the situation is as shown in Figure [13-23](#78624_3_En_13_Chapter.xhtml#Fig23).


    ![](images/78624_3_En_13_Chapter/78624_3_En_13_Fig23_HTML.jpg)


    The block diagram illustrates the p method, s method, and main program. In the
    p method, the explosion symbol inside the oval is forwarded to the s method and
    main program. Below it has a java P S example exception in thread main java lang
    null pointer exception, professor, student, and main program.


    Figure 13-23


    If our application as a whole omits exception handling, the JVM terminates the
    application and reports the exception to the command window for the user to observe


    We’ll learn a bit later in the chapter that the Java compiler will force us to
    catch selected types of exception, but not `NullPointerException`s in particular.'
