    that objects exchange in carrying out some system function—***can’t*** be left
    to occur randomly. Rather, they must be orchestrated in such a way as to lead,
    in cause-and-effect fashion, to some desired result. In the same way that a musical
    score indicates which notes must be played by various instruments to produce a
    melody, a **scenario** prescribes the sequence of internal messages (events) that
    must occur in carrying out some system function from beginning to end.


    I introduced use cases in Chapter [9](#78624_3_En_9_Chapter.xhtml) as a way to
    specify all of the goals for an application from the standpoint of external actors—users
    or other computer systems. *Merriam-Webster’s Collegiate Dictionary, Eleventh
    Edition*, defines the term ***scenario*** as


    *A sequence of events esp. when imagined; esp : an account or synopsis of a possible
    course of action or events.*


    which is precisely how the term is used in the object modeling sense.


    A scenario is one hypothetical instance of how a particular use case might play
    out. Just as an object is an instance of a class and a link is an instance of
    an association, ***a scenario may be thought of as an instance of a use case***.
    Or, stated another way, just as a class is a template for creating objects and
    an association is a template for creating links, ***a use case is a template for
    creating scenarios***. A single use case thus inspires many different scenarios,
    in the same way that planning a driving trip from one city to another can involve
    many different routes.


    We describe scenarios in narrative fashion, as a series of steps observed from
    the standpoint of a hypothetical observer who is able to see not only what is
    happening outwardly as the system carries out a particular request but also what
    is going on behind the scenes, internally to the system. (Note, however, that
    even though we’re now concerned with internal system processes, we’re still only
    interested in ***functional*** requirements as defined in Chapter [9](#78624_3_En_9_Chapter.xhtml),
    not in the “bits and bytes” of how the computer works.)


    The following is a sample scenario representing the “Register for a course” use
    case, one of several use cases that we identified for the SRS in Chapter [9](#78624_3_En_9_Chapter.xhtml).


    ### Scenario #1 for the “Register for a Course” Use Case


    In this first scenario, a student by the name of Fred successfully registers for
    a course. The specific sequence of events is as follows:


    1.  Fred, a student, logs on to the SRS.


    2.  He views the schedule of classes for the current semester to determine which
    section(s) he wishes to register for.


    3.  Fred requests a seat in a particular section of a course entitled “Beginning
    Object Concepts,” course number OBJ101, section 1.


    4.  Fred’s plan of study is checked to ensure that the requested course is appropriate
    for his overall degree goals. (We assume that students are not permitted to take
    courses outside of their plans of study.)


    5.  His transcript is checked to ensure that he has satisfied all of the prerequisites
    for the requested course, if there are any.


    6.  Seating availability in the section is confirmed.


    7.  The section is added to Fred’s current course load.


    From Fred’s vantage point (sitting in front of a computer screen!), here’s what
    he perceives to be occurring: after logging on to the SRS, he indicates that he
    wishes to register for OBJ101, section 1, by choosing it from the available course
    list and then clicks the Add button (see Figure [11-5](#78624_3_En_11_Chapter.xhtml#Fig5)).


    ![](images/78624_3_En_11_Chapter/78624_3_En_11_Fig5_HTML.jpg)


    A screen displays a student registration system that includes fields for S S N,
    Name, Total Courses, Registered For, and Schedule of Classes. An arrow points
    to the Add button, indicating that students can add courses to their registration
    by clicking the button. The system allows students to view their current registration
    status and make changes as needed.


    Figure 11-5


    Fred’s view of things, part 1


    A few moments later, Fred receives a confirmation message, as shown in Figure
    [11-6](#78624_3_En_11_Chapter.xhtml#Fig6).


    ![](images/78624_3_En_11_Chapter/78624_3_En_11_Fig6_HTML.jpg)


    A screen displays a student registration system that includes fields for S S N,
    Name, Total Courses, Registered For, and Schedule of Classes. A pop-up screen
    displays the request successful seat confirmed in C M P 101 and ok button.


    Figure 11-6


    Fred’s view of things, part 2


    Fred is unaware (for the most part) of all of the “behind-the-scenes” processing
    steps that are taking place on his behalf.


    The preceding scenario represents a “best-case” scenario, where everything goes
    smoothly and Fred ends up being successfully registered for the requested course.
    But, as we know all too well, things don’t always work out this smoothly, as evidenced
    by the following alternative scenario for the ***same*** use case. Everything
    is the same between Scenario #1 and Scenario #2 except for the steps that are
    shown in ***bold***.'
