  trans: '

    ## 生成数据字典


    在分析工作的早期，明确并开始记录术语的使用至关重要。**数据字典**正是为此目的而设计的理想工具。对于每个候选类，数据字典应包含该条目在整个模型/系统上下文中的简单定义；如果有助于说明定义，可以附上示例。


    以下侧边栏展示了我们迄今为止完整的 SRS 数据字典。


    SRS 数据字典，第一版：类定义


    *   ***课程：*** 一系列持续一整个学期的讲座、作业、考试等，所有这些都围绕特定学科领域，通常对应特定学分数，是攻读学位的一个学习单元。例如，“面向对象入门”是信息技术理学硕士学位的必修**课程**。


    *   ***学习计划：*** 学生为满足特定学位的**课程**要求而计划修读的**课程**列表。


    *   ***教授：*** 负责教授**教学班**或指导**学生**的教职员工。


    *   ***教学班：*** 特定**课程**在特定学期、特定星期几和特定时间段的开设安排（例如，**课程**“面向对象入门”在 2025 年春季学期每周一
    1:00 至 3:00 下午授课）。


    *   ***学生：*** 当前在大学注册，并有资格注册一个或多个**教学班**的人员。


    *   ***成绩单：*** 记录特定**学生**在该大学迄今为止修读的所有**课程**的文件，包括每门**课程**的修读学期、所获成绩、授予的学分，以及所获总学分和该**学生**的平均绩点（GPA）。


    请注意，一个术语的定义中包含一个或多个其他术语是允许的，实际上也是鼓励的；当我们这样做时，后者会用**粗体文本**突出显示。


    数据字典与其他 SRS 叙述性文档一起，成为关于模型的后续信息来源。随着模型的演进，我们将扩展字典，使其包含属性、关联和方法的定义。


    在表示某个类的 Java 代码中，将该类的字典定义作为头部注释也是一个好主意。不过，请确保此内联文档与外部字典定义保持同步。


    ## 确定类之间的关联


    一旦我们确定了初始候选类列表，下一步就是确定这些类如何相互关联。为此，我们回到叙述性文档集（现已包含 SRS 需求规格说明、用例和数据字典），这次重点研究***动词***短语。我们研究动词短语的目标是选择那些暗示结构关系的短语，正如我们在第
    5 章中定义的——关联、聚合和继承——但排除或忽略那些表示（瞬态）动作或行为的短语。（我们将在第 11 章从用例的角度关注行为。）


    例如，规格说明指出学生“选择一位指导教授”。这确实是一个动作，但该动作的结果是教授与学生之间持久的结构关系，可以通过关联“一位`教授` *指导* 一位`学生`”来建模。


    作为学生的指导教授，教授还会与学生见面、回答学生的问题、推荐学生修读的课程、批准学生的学习计划等——这些是教授扮演指导角色时的行为，但不会直接导致对象之间形成任何新的关系。


    让我们在需求规格说明上尝试动词短语分析方法。所有相关的动词短语都在下面的侧边栏中突出显示（请注意，我忽略了诸如“我们被要求开发一个自动化的 SRS……”等明显不相关的动词短语）。


    在 SRS 规格说明中突出显示动词短语


    我们被要求为大学开发一个自动化的学生注册系统（SRS）。该系统将**使学生能够在线注册课程**每学期，并**跟踪他们完成学位的进度**。


    当学生首次**在大学注册**时，他们使用 SRS 来**制定学习计划**，说明他们**计划修读哪些课程**以**满足特定学位课程的要求**，并**选择一位指导教授**。SRS
    将**验证拟定的学习计划是否满足该学生所寻求学位的要求**。


    一旦**学习计划已制定**，那么在每学期之前的注册期间，学生可以**在线查看课程安排**并**选择他们希望参加的任何课程，指明首选的教学班**（星期几和一天中的时间），如果该**课程由不止一位教授授课**。SRS
    将**通过查阅学生的在线成绩单**（课程完成情况和所获成绩）来**验证学生是否已满足每门申请课程的必要先修条件**（**学生可以随时在线查看他们的成绩单**）。


    假设 (a) **所申请课程的先修条件已满足**，(b) **课程符合学生学习计划的要求之一**，并且 (c) **每门课程中都有空位**，则**学生将被注册到这些课程中**。


    如果 (a) 和 (b) 满足，但 (c) 不满足，则**学生将被列入先到先得的候补名单**。如果**他们之前被列入候补名单的课程/教学班变得有空位**（要么是因为其他**学生已退课**，要么是因为**该课程的座位容量已增加**），则**学生将自动注册到候补课程中**，并且**一封电子邮件**通知**会发送**给学生。如果不再需要该课程，学生有责任**退课**；否则，**他们将被收取该课程的费用**。


    **学生可以退课**，截止日期为**该课程授课**学期的第一周结束前。


    让我们仔细分析其中几个：

    '
- fmt: '*   “Students [...] register [...] for courses”: Although the act of registering
    is a behavior, the end result is that a static relationship is created between
    a `Student` and a `Section`, as represented by the association “a `Student` *registers*
    for a `Section`.” Note that the specification mentions registering for “courses,”
    not “sections,” but as we stated in our data dictionary, a `Student` registers
    for concrete `Section`s as embodiments of `Course`s. Keep in mind when reviewing
    a specification that natural language is often imprecise and that as a result
    we have to read between the lines as to what the author really meant in every
    case. (If we’re going to be the ones to write the specification, here is an incentive
    to keep the language as clear and concise as possible.)

    *   “[Students track] their progress toward completion of their degree”: Again,
    this is a behavior, but it nonetheless implies a structural relationship between
    a `Student` and a `Degree`. However, recall that we didn’t elect to represent
    `Degree` as a class—we opted to reflect it as a simple `String` attribute of the
    `Student` class—and so this suggested relationship is immaterial with respect
    to the candidate class list that we’ve developed.

    *   “Student first enrolls at the university”: This is a behavior that results
    in a static relationship between a `Student` and the `University`; but we deemed
    the notion of “university” to be external to the system and so chose not to create
    a `University` class in our model. So we disregard this verb phrase, as well.

    *   “[Student] sets forth a plan of study”: This is a behavior that results in
    the static relationship “a `Student` *pursues/observes* a `Plan of Study`.”

    *   “Students are able to view the schedule of classes online”: This is strictly
    a transient behavior of the SRS; no lasting relationship results from this action,
    so we disregard this verb phrase.

    *   And so on.


    ## Association Matrices


    Another complementary technique for both determining and recording what the relationships
    between classes should be is to create an *n* × *n* **association matrix**, where
    *n* represents the number of candidate classes that we’ve identified. Label the
    rows and the columns with the names of the classes, as shown for the empty matrix
    represented by Table [10-1](#78624_3_En_10_Chapter.xhtml#Tab1).


    **Table 10-1** An “Empty” Association Matrix for the SRS


    | | `Section` | `Course` | `PlanOfStudy` | `Professor` | `Student` | `Transcript`
    |

    | --- | --- | --- | --- | --- | --- | --- |

    | `Section` | | | | | | |

    | `Course` | | | | | | |

    | `PlanOfStudy` | | | | | | |

    | `Professor` | | | | | | |

    | `Student` | | | | | | |

    | `Transcript` | | | | | | |


    Then, complete the matrix as follows.


    In each cell of the matrix, list all of the associations that you can identify
    between the class named at the head of the row and the class named at the head
    of the column. For example, in the cell highlighted in Table [10-2](#78624_3_En_10_Chapter.xhtml#Tab2)
    at the intersection of the `Student` “row” and the `Section` “column,” we have
    listed three potential associations:


    *   A `Student` *is waitlisted for* a `Section`.

    *   A `Student` *is registered for* a `Section`. (This could be alternatively
    phrased as “a `Student` *is currently attending* a `Section`.”)

    *   A `Student` *has previously taken* a `Section`. This third association is
    important if we plan on maintaining a history of all of the classes that a student
    has ever taken in their career as a student, which we must do if we are to prepare
    a student’s transcript online. (As it turns out, we’ll be able to get by with
    a single association that does “double duty” for the latter two of these, as you’ll
    see later on in this chapter.)


    Mark a cell with an × if there are no known relationships between the classes
    in question or if the potential relationships between the classes are irrelevant.
    For example, in Table [10-2](#78624_3_En_10_Chapter.xhtml#Tab2) the cells representing
    the intersection between `Professor` and `Course` are marked with an ×, even though
    there is an association possible—“a `Professor` *is qualified to teach* a `Course`”—because
    it isn’t relevant to the mission of the SRS.


    As mentioned in Chapter [4](#78624_3_En_4_Chapter.xhtml), all associations are
    inherently bidirectional. This implies that if a cell in row *j*, column *k* indicates
    one or more associations, then the cell in row *k*, column *j* should reflect
    the reciprocal of these relationships. For example, since the intersection of
    the `PlanOfStudy` “row” and the `Course` “column” indicates that “a `PlanOfStudy`
    *calls for* a `Course`,” then the intersection of the `Course` “row” and the `PlanOfStudy`
    “column” must indicate that “a `Course` *is called for by* a `PlanOfStudy`.”


    It’s not always practical to state the reciprocal of an association; for example,
    our association matrix shows that “a `Student` *plans to take* a `Course`,” but
    trying to state its reciprocal—“a `Course` *is planned to be taken by* a `Student`”—is
    quite awkward. In such cases where a reciprocal association would be awkward to
    phrase, simply indicate its presence with the symbol ✓.


    **Table 10-2** Our Completed Association Matrix


    | | `Section` | `Course` | `PlanOfStudy` | `Professor` | `Student` | `Transcript`
    |

    | --- | --- | --- | --- | --- | --- | --- |

    | `Section` | × | *instance of* | × | *is taught by* | ✓ | *included in* |

    | `Course` | ✓ | *prerequisite for* | *is called for by* | × | ✓ | × |

    | `PlanOfStudy` | × | *calls for* | × | × | *observed by* | × |

    | `Professor` | *teaches* | × | × | × | *advises,teaches* | × |

    | `Student` | *registered for, waitlisted for, has previously taken* | *plans
    to take* | *observes* | *is advised by, studies under* | × | *owns* |

    | `Transcript` | *includes* | × | × | × | *belongs to* | × |


    We’ll be portraying these associations in graphical form shortly. For now, let’s
    go back and extend our data dictionary to explain what each of these associations
    means. The following sidebar shows one such example.


    **ADDITIONS TO THE SRS DATA DICTIONARY**


    **Calls for** (a Plan of Study calls for a Course): In order to demonstrate that
    a **student** will satisfy the requirements for their chosen degree program, the
    **student** must formulate a **plan of study**. This **plan of study** lays out
    all of the **courses** that a **student** intends to take and possibly specifies
    in which semester the **student** hopes to complete each **course**.'
  raw: '*   ***“Students [...] register [...] for courses”***: Although the act of
    registering is a behavior, the end result is that a static relationship is created
    between a `Student` and a `Section`, as represented by the association “a `Student`
    *registers* for a `Section`.” Note that the specification mentions registering
    for “courses,” not “sections,” but as we stated in our data dictionary, a `Student`
    registers for concrete `Section`s as embodiments of `Course`s. Keep in mind when
    reviewing a specification that natural language is often imprecise and that as
    a result we have to read between the lines as to what the author really meant
    in every case. (If we’re going to be the ones to write the specification, here
    is an incentive to keep the language as clear and concise as possible.)


    *   ***“[Students track] their progress toward completion of their degree”***:
    Again, this is a behavior, but it nonetheless implies a structural relationship
    between a `Student` and a `Degree`. However, recall that we didn’t elect to represent
    `Degree` as a class—we opted to reflect it as a simple `String` attribute of the
    `Student` class—and so this suggested relationship is immaterial with respect
    to the candidate class list that we’ve developed.


    *   ***“Student first enrolls at the university”***: This is a behavior that results
    in a static relationship between a `Student` and the `University`; but we deemed
    the notion of “university” to be external to the system and so chose not to create
    a `University` class in our model. So we disregard this verb phrase, as well.


    *   ***“[Student] sets forth a plan of study”***: This is a behavior that results
    in the static relationship “a `Student` *pursues/observes* a `Plan of Study`.”


    *   ***“Students are able to view the schedule of classes online”***: This is
    strictly a transient behavior of the SRS; no lasting relationship results from
    this action, so we disregard this verb phrase.


    *   And so on.


    ### Association Matrices


    Another complementary technique for both determining and recording what the relationships
    between classes should be is to create an ***n*** × ***n*** **association matrix****,**
    where ***n*** represents the number of candidate classes that we’ve identified.
    Label the rows and the columns with the names of the classes, as shown for the
    empty matrix represented by Table [10-1](#78624_3_En_10_Chapter.xhtml#Tab1).


    Table 10-1


    An “Empty” Association Matrix for the SRS


    |   | `Section` | `Course` | `PlanOfStudy` | `Professor` | `Student` | `Transcript`
    |

    | --- | --- | --- | --- | --- | --- | --- |

    | `Section` |   |   |   |   |   |   |

    | `Course` |   |   |   |   |   |   |

    | `PlanOfStudy` |   |   |   |   |   |   |

    | `Professor` |   |   |   |   |   |   |

    | `Student` |   |   |   |   |   |   |

    | `Transcript` |   |   |   |   |   |   |


    Then, complete the matrix as follows.


    In each cell of the matrix, list all of the associations that you can identify
    between the class named at the head of the row and the class named at the head
    of the column. For example, in the cell highlighted in Table [10-2](#78624_3_En_10_Chapter.xhtml#Tab2)
    at the intersection of the `Student` “row” and the `Section` “column,” we have
    listed three potential associations:


    *   A `Student` *is waitlisted for* a `Section`.


    *   A `Student` *is registered for* a `Section`. (This could be alternatively
    phrased as “a `Student` *is currently attending* a `Section`.”)


    *   A `Student` *has previously taken* a `Section`. This third association is
    important if we plan on maintaining a history of all of the classes that a student
    has ever taken in their career as a student, which we must do if we are to prepare
    a student’s transcript online. (As it turns out, we’ll be able to get by with
    a single association that does “double duty” for the latter two of these, as you’ll
    see later on in this chapter.)


    Mark a cell with an × if there are no known relationships between the classes
    in question or if the potential relationships between the classes are irrelevant.
    For example, in Table [10-2](#78624_3_En_10_Chapter.xhtml#Tab2) the cells representing
    the intersection between `Professor` and `Course` are marked with an ×, even though
    there is an association possible—“a `Professor` *is qualified to teach* a `Course`”—because
    it isn’t relevant to the mission of the SRS.


    As mentioned in Chapter [4](#78624_3_En_4_Chapter.xhtml), all associations are
