- fmt: '# Project Management Aids


    Many CASE tools provide some sort of version control, enabling you to maintain
    different generations of the same model. If you make a change to your model, but
    then after reviewing the change with your users decide that you’d prefer to return
    to the way things were previously, it’s trivial to do if version control is in
    place.


    CASE tools also often provide configuration management/team collaboration capabilities,
    to enable a group of modelers to easily share in the creation of a single model.


    ## Some Drawbacks of Using CASE Tools


    CASE tools aren’t without their drawbacks, however:


    *   **CASE tools can be expensive**. It’s not unusual for a high-end CASE tool
    to cost hundreds or even thousands of dollars per “seat.” The **good news** is
    that, in recent years, many shareware/free UML modeling tools have become available,
    as mentioned earlier in this chapter.


    *   **CASE tools can sometimes be inflexible**. I talk about adapting processes,
    notations, and tools to suit your own needs throughout Part 2 of the book, but
    tools don’t always cooperate. I’ll point out in upcoming chapters some specific
    examples of situations where you might want to bend the notation a little bit,
    if your CASE tool will accommodate it.


    *   **You run the risk of getting “locked into” a particular vendor’s product**
    if the CASE tool in question can’t export your model in a vendor-neutral fashion
    (e.g., as XML).


    *   **It’s easy to get caught up with form over substance**! This is true of any
    automated tool—even a word processor tends to lure people into spending more time
    on the cosmetics of a document than is warranted, long after the substantive content
    is rock solid.


    Generally speaking, however, the pros of using an OO CASE tool significantly outweigh
    the cons—consider the cons as “words to the wise” on how to successfully apply
    such a tool to your modeling efforts.


    ### A Reminder


    Although I’ve said it several times already in this book, it’s important to remind
    you that the process of object modeling is **language neutral**. I presented Java
    syntax in Part 1 of the book because the ultimate goal is to make you comfortable
    with both object modeling and Java programming. In Part 2 of the book, however,
    we’re going to drift away from Java, because we truly are at a point where the
    concepts you’ll be learning are just as applicable to Java as they are to Python
    or C# any other OO programming language. But never fear—we’ll return to Java “big
    time” in Part 3.


    ## Summary


    By far, the most important lesson to take away from this chapter is the following:


    **Don’t get caught up in form over substance!**


    The model that you produce is only a means to an end… and the process, notation,
    and tools that you use to produce the model are but a **means** to the means to
    this end. If you get too hung up on which notation to use or which process to
    use or which tool to use, you may wind up spinning your wheels in “analysis paralysis.”
    Don’t lose sight of your ultimate goal: to build **usable, flexible, maintainable,
    reliable, functionally correct software systems.**


    ### Exercises


    1.  Briefly describe the methodology—process, notation, and tool(s)—that you used
    on a recent software development project. What aspects of this methodology worked
    well for you and your teammates, and what, in hindsight, do you think could have
    been approached more effectively?


    2.  Research one of the object modeling technologies/techniques mentioned in the
    “Modeling Methodology = Process + Notation + Tool” section earlier in this chapter,
    and report briefly on the process, notation, and tools involved.


    # 9. Formalizing Requirements Through Use Cases


    [What Are Use Cases?](#78624_3_En_9_Chapter.xhtml#Sec1) [Functional vs. Technical
    Requirements](#78624_3_En_9_Chapter.xhtml#Sec2) [Involving the Users](#78624_3_En_9_Chapter.xhtml#Sec3)
    [Actors](#78624_3_En_9_Chapter.xhtml#Sec4) [Identifying Actors and Determining
    Their Roles](#78624_3_En_9_Chapter.xhtml#Sec5) [Diagramming a System and Its Actors](#78624_3_En_9_Chapter.xhtml#Sec6)
    [Specifying Use Cases](#78624_3_En_9_Chapter.xhtml#Sec7) [Matching Up Use Cases
    with Actors](#78624_3_En_9_Chapter.xhtml#Sec8) [To Diagram or Not to Diagram?](#78624_3_En_9_Chapter.xhtml#Sec9)
    [Summary](#78624_3_En_9_Chapter.xhtml#Sec10)


    When you get ready to leave on a vacation, you may run through a mental or written
    checklist to make sure that you’ve properly prepared for your departure. Did you
    pack everything you need to take? Did you pack **too much**? Did you arrange to
    have the appropriate services (newspaper, mail delivery, etc.) stopped? Did you
    arrange for someone to water the plants and feed your pet rat? Once you depart
    on your trip, you want to enjoy yourself and know that when you arrive home again,
    you won’t find any disasters waiting for you.


    This isn’t unlike a software development project: we need to organize a checklist
    of the things that must be provided for by the system before we embark on its
    development, so that the project runs smoothly and so that we don’t create a disaster
    (in the form of unmet requirements and dissatisfied customers/users) when the
    system is delivered.


    The art and science of requirements analysis—for it truly is both!—is so extensive
    a topic that an entire book could be devoted to this subject alone. There is one
    technique in particular for discovering and rounding out requirements known as
    **use case modeling**, which is a cornerstone of the Rational Unified Process
    (RUP) and which warrants your consideration. Use cases aren’t strictly an artifact
    of OO methodologies; they can be prepared for any software system, regardless
    of the development methodology to be used. However, they made their debut within
    the software development community in the context of object systems and have gained
    widespread popularity in that context.


    In this chapter, you’ll learn


    *   How we must anticipate all of the different roles that users will play when
    interacting with our future system


    *   That we must assume each of the users’ viewpoints in describing the services
    that a software application as a whole is to provide


    *   How to prepare use cases as a means of documenting all of the users’ collective
    requirements


    I’ll also give you enough general background about requirements analysis to provide
    an appropriate context for use case modeling.


    ## What Are Use Cases?


    In determining what the desired functionality of a system is to be, we must seek
    answers to the following questions:


    *   **Who** (in terms of categories of user) will want to use our system?


    *   What **services** will the system need to provide in order to be of value
    to each category of user?


    *   When users interact with the system for a particular purpose, what is their
    expectation as to the **desired outcome**?


    **Use cases** are a natural way to express the answers to these questions. Each
    use case is a simple statement, narrative or graphical in fashion, that describes
    a particular goal or outcome of the system and who expects that outcome. For example,
    one goal of the SRS is to “enable a student user to register for a course,” and
    thus we’ve just expressed our first use case! (Yes, use cases really are that
    straightforward. In fact, we **need** for them to be that straightforward, so
    that they are understandable by the users/sponsors of the system, as we’ll discuss
    further in a moment.)'
