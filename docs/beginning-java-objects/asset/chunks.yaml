- fmt: '### Jump Statements


    The Java language defines two jump statements that are used to redirect program
    execution to another statement elsewhere in the code. The two types of jump statement
    are the `break` and `continue` statements.


    You’ve already seen `break` statements in action earlier in this chapter, when
    they were used in conjunction with `switch` statements. A `break` statement can
    also be used to abruptly terminate `for` or `while` loops. When a `break` statement
    is encountered during loop execution, the loop immediately terminates, and program
    execution is transferred to the line of code immediately following the loop, as
    in the following example:


    ```

    // We start out with the intention of incrementing x from 1 to 4 ...

    for (int x = 1; x <= 4; x++) {

    // ... but when x reaches the value 3, we prematurely terminate this

    // loop with a break statement.

    if (x == 3) {

    break;

    }

    System.out.println(x);

    }

    System.out.println("Loop finished");

    ```


    The output produced by this code would be as follows:


    ```


    Loop finished

    ```


    A `continue` statement, on the other hand, is used to exit from the current iteration
    of a loop without terminating overall loop execution. That is, a `continue` statement
    transfers program execution back up to the top of the loop without finishing the
    particular iteration that is already in progress; the loop counter is incremented,
    in the case of a `for` loop, and execution continues.


    Let’s look at the same example as before, but we’ll replace the `break` statement
    with a `continue` statement:


    ```

    // We start out with the intention of incrementing x from 1 to 4 ...

    for (int x = 1; x <= 4; x++) {

    // ... but when x reaches the value 3, we prematurely terminate

    // this iteration of the loop (only) with a continue statement.

    if (x == 3) {

    continue;

    }

    System.out.println(x);

    }

    System.out.println("Loop finished");

    ```


    The output produced by this code would be as follows:


    ```


    Loop finished

    ```


    ## Block-Structured Languages and the Scope of a Variable


    Java is a block-structured language. As mentioned earlier in the chapter, a “block”
    of code is a series of zero or more lines of code enclosed within braces `{ ...
    }`.


    Blocks may be nested inside one another to any arbitrary depth, as illustrated
    by the following code example:


    ```

    public class SimpleProgram {

    // We''re inside of the "class" block (one level deep).

    public static void main(String[] args) {

    // We''re inside of the "main method" block (two levels deep).

    int x = 3;

    int y = 4;

    int z = 5;

    if (x > 2) {

    // We''re now one level deeper (level 3), in an "if" block.

    if (y > 3) {

    // We''re one level deeper still (level 4), in a

    // nested "if" block.

    // (We could go on and on!)

    } // We''ve just ended the level 4 block.

    // (We could have additional code here, at level 3.)

    } // Level 3 is done!

    // (We could have additional code here, at level 2.)

    } // That''s it for level 2!

    // (We could have additional code here, at level 1.)

    } // Adios, amigos! Level 1 (the "class" block) has just ended.

    ```


    Variables can be declared in any block within a program. The scope of a variable
    is that portion of code in which the variable can be referenced by name—specifically,
    from the point where the variable name is first declared down to the closing (right)
    brace for the block of code in which it was declared. A variable is said to be
    in scope as long as the compiler recognizes its name. Once program execution exits
    a block of code, any variables that were declared inside that block go out of
    scope and will be inaccessible to the program; the compiler effectively forgets
    that the variable was ever declared.


    As an example of the consequences of variable scope, let’s look at a simple program
    called `ScopeExample`. This program makes use of three nested code blocks: one
    for the `class` body, one for the `main` method body, and one as part of an `if`
    statement inside the body of the `main` method. We in turn declare two variables—`x`,
    in the `main` code block (at level 2), and `y`, in the `if` block (level 3):


    ```

    public class ScopeExample { // Start of block level 1.

    public static void main(String[] args) { // Start of block level 2.

    double x = 2.0;  // Declare "x" at block level 2.

    if (x < 5.0) { // Start of block level 3.

    double y = 1.0;  // Declare "y" inside block level 3.

    System.out.println("The value of x = " + x);   // x, declared at level 2, is

    // still in scope at level 3.

    System.out.println("The value of y = " + y);

    } // Variable "y" goes out of scope when the "if" block (level 3) ends.

    // "y" has gone out of scope, and is no longer recognized by the compiler.

    // If we try to reference "y" in a subsequent statement, the compiler will

    // generate an error. "x", on the other hand, remains in scope until the main

    // method block (level 2) ends.

    System.out.println("The value of x = " + x);    // This will compile.

    System.out.println("The value of y = "  + y);   // This WON''T compile.

    } // Variable "x" goes out of scope when the main method block (level 2) ends.

    }

    ```


    In the preceding example, variable `y` goes out of scope as soon as the `if` block
    ends. If we try to access `y` later in the program, as we do in the bolded line
    of the preceding code, the compiler will generate the following error message:


    ```

    cannot resolve symbol

    symbol : variable y

    System.out.println("The value of y = "  + y);

    ^

    ```


    Note that a given variable is accessible to any nested inner code blocks that
    follow its declaration. For example, in the preceding `ScopeExample` program,
    variable `x`, declared at the `main` method block level (level 2), is accessible
    inside the `if` statement code block (level 3).'
