    ## 开始前的最后思考


    我书中的许多内容——尤其是第一部分开头部分——对于经验丰富的程序员来说可能显得过于简单。这是因为面向对象技术大多建立在已实践多年的基础软件工程原则之上，且在许多情况下只是以略微不同的方式重新包装。确实有一些新技巧让面向对象语言变得极其强大，而这些在非面向对象语言中几乎无法实现——例如**继承**和**多态**，你将在第
    5 章和第 7 章中分别了解它们。（这些技术可以在非面向对象语言中手动模拟，就像程序员可以自己从头编写数据库管理系统（DBMS），而不是使用 Oracle
    或 SQL Server 这样的商业产品——但谁***想***这么做呢？）


    对于***经验丰富***的程序员来说，掌握面向对象技术的最大挑战在于重新调整他们思考待自动化问题的方式：


    *   使用非面向对象方法开发过应用程序的软件工程师/程序员，通常需要“摒弃”传统软件分析与设计方法中的某些做法。


    *   矛盾的是，刚起步的程序员（或面向对象建模新手）有时反而更容易将面向对象软件开发方法作为其***唯一***方法来学习。


    幸运的是，我们在开发软件时需要思考对象的方式，恰好就是人们通常思考世界万物的自然方式。因此，学会“思考”对象——并用 Java 编写对象程序——就像（第）一、（第）二、（第）三步一样简单！


    本书源代码可在 [`​github.​com/​Apress/​Beginning-Java-Objects-3rd-ed`](https://github.com/Apress/Beginning-Java-Objects-3rd-ed)
    找到。


    学生注册系统（SRS）案例研究 学生注册系统（SRS）需求规格说明


    我们被要求开发一个自动化的学生注册系统（SRS）。该系统将使学生能够每学期在线注册课程，并跟踪学生完成学位的进度。


    当学生首次入学时，他们使用 SRS 制定学习计划，说明他们计划修读哪些课程以满足特定学位项目的要求，并选择一位指导教师。SRS 将验证所提议的学习计划是否满足学生所寻求学位的要求。学习计划确定后，在每个学期前的注册期间，学生可以在线查看课程安排，选择他们希望参加的课程，如果某门课程由多位教授授课，还需指明首选的分班（星期几和具体时间）。SRS
    将通过查阅学生的在线成绩单（包含已完成课程和所获成绩）来验证学生是否已满足每门申请课程的必要先修条件（学生可随时在线查看成绩单）。


    假设（a）所申请课程的先修条件已满足，（b）该课程符合学生学习计划的要求，且（c）每门课程均有空余名额，则学生即可注册该课程。


    如果（a）和（b）满足，但（c）不满足，则学生将被列入先到先得的等候名单。如果之前被列入等候名单的课程/分班出现空位（或因其他学生退课，或因课程座位容量增加），学生将自动注册该等候课程，并会收到相关电子邮件通知。如果不再需要该课程，学生有责任自行退课；否则将被收取课程费用。


    关于作者 关于技术审校


    # 第一部分 面向对象基础


    # 1. 抽象与建模


    通过抽象实现简化 通过抽象实现泛化 将抽象组织成分类层次结构 抽象作为软件开发的基础 抽象的复用 固有挑战 如何成为成功的面向对象建模者？ 本章小结


    作为人类，我们一生中每天都充斥着信息。即使我们能暂时关闭所有不断轰炸我们的“电子信息来源”——电子邮件、语音邮件、播客、推文等——仅凭我们的五种感官，每天就能从周围环境收集数百万比特的信息。然而，我们却能理解所有这些信息，通常不会感到不知所措。我们的大脑会自然地简化所观察到的一切细节，通过一种称为**抽象**的过程使这些细节变得易于管理。


    在本章中，你将学习


    *   抽象如何简化我们对世界的看法


    *   我们如何将知识分层组织，以最大限度地减少在任何给定时间需要处理的信息量


    *   抽象与软件开发的相关性


    *   作为软件开发人员，在尝试用软件模拟现实世界情境时面临的固有挑战

