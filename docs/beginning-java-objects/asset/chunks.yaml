  raw: '### The Benefits of User-Defined Types


    The following are among the benefits of user-defined types:


    *   User-defined types provide an intuitive way to represent real-world objects,
    resulting in ***easier-to-verify requirements***.


    *   Classes are convenient units of reusable code, which means ***less code to
    write from scratch when building an application***.


    *   Through encapsulation, we ***minimize data redundancy***—each item of data
    is stored once, in the object to which it belongs—thereby ***lessening the likelihood
    of data integrity errors*** across an application.


    *   Through information hiding, we ***insulate our application against ripple
    effects*** if private details of a class must change after deployment, thereby
    ***dramatically reducing maintenance costs***.


    *   Objects are responsible for ensuring the integrity of their own data, making
    it ***easier to isolate errors in an application’s (business) logic***; we know
    to inspect the method(s) of the class to which a corrupted object belongs.


    *   Once defined, a user-defined type (class) can be reused again and again across
    applications and even across organizations.


    ### The Benefits of Inheritance


    The following are among the benefits of inheritance:


    *   We can extend already deployed code without having to change and then retest
    it, resulting in ***dramatically reduced maintenance costs***.


    *   Subclasses are much more succinct, which means ***less code overall to write/maintain***.


    ### The Benefits of Polymorphism


    The following is one of the benefits of polymorphism:


    *   It ***minimizes “ripple effects”*** on client code when new subclasses are
    added to the class hierarchy of an existing application, resulting in ***dramatically
    reduced maintenance costs***.


    One Very Important Caveat


    A common misconception is that switching to object technology will dramatically
    reduce the time required to develop a given application. Anecdotes abound of managers
    who have expected that a team using an object-oriented approach should be able
    to craft an application in a fraction of the time that it would take them to build
    its non-OO counterpart—***despite the fact that team in question might be using
    OO techniques for the first time ever***! Unfortunately, due to the learning curve
    involved in switching to the OO paradigm—particularly for software developers
    who’ve been entrenched in non-OO techniques for many years—it will typically take
    ***longer*** for a team inexperienced with objects to develop their first OO application.


    Where economies of scale ***do*** come into play for a properly designed OO application,
    however, is during the ***maintenance phase*** of the application’s life cycle.
    The maintenance phase of an application—OO or otherwise—is typically much longer,
    and hence more costly, than the development phase. A general rule of thumb is
    that most application lifetimes are split between 20 percent development and 80
    percent maintenance. By dramatically reducing ripple effects through the thoughtful
    application of (a) encapsulation/information hiding and (b) inheritance/polymorphism,
    we stand to reduce maintenance costs—and hence overall software life cycle costs—significantly.


    And, once we become adept in the OO paradigm, we should indeed be able to shorten
    application ***development*** time, as well. By virtue of the fact that classes
    can readily be reused and optionally extended/specialized via inheritance—***including
    the vast number of predefined classes that are provided as an integral part of
    an OOPL framework***—we’ll have less code to write overall for a given application.
    If we in turn we embrace the philosophy of code sharing and reuse across projects,
    we can gain significant productivity in terms of development as well as maintenance
    across the life cycles of ***multiple*** applications.


    ## Abstract Classes


    We discussed in Chapter [5](#78624_3_En_5_Chapter.xhtml) how beneficial it is
    to consolidate common features of two or more classes into a common superclass,
    a process known as ***generalization***. For example, we noticed similarities
    between the `Student` and `Professor` classes (e.g., both declared a `name` attribute
    and methods to `get`/`set` its value), and so we created the `Person` class after
    the fact to serve as a generalization of both `Student`s and `Professor`s.


    Let’s now assume that we know at the very outset of an application development
    effort that we’re going to want to take advantage of specialization. For example,
    with regard to the SRS, perhaps we’re going to want to model various types of
    `Course` objects: lecture courses, lab courses, independent study courses, etc.
    We therefore want to start out on the right foot by designing a `Course` superclass
    first, to handle all of the common features of these various types of courses
    before we set out to derive specialized subclasses.


    We might determine up front that all `Course`s, regardless of type, are going
    to need the following common attributes


    *   `String courseName`


    *   `String courseNumber`


    *   `int creditValue`


    *   *CollectionType* `enrolledStudents`


    *   `Professor instructor`


    as well as the following common behaviors:


    *   `enrollStudent`


    *   `assignInstructor`


    *   `establishCourseSchedule`


    Some of these behaviors may be generic enough so that we can afford to program
    them in detail for the `Course` class, knowing that it’s a pretty safe bet that
    any subclasses of `Course` will be able to inherit these methods as is, without
    needing to override them. For example, the `enrollStudent` and `assignInstructor`
    methods could be written generically as follows:


    ```

    import java.util.ArrayList;

    public class Course {

    private String courseName;

    private String courseNumber;

    private int creditValue;

    private ArrayList enrolledStudents;

    private Professor instructor;

    // Accessor methods would also be provided; details omitted ...

    public void enrollStudent(Student s) {

    enrolledStudents.add(s);

    }

    public void assignInstructor(Professor p) {

    setInstructor(p);

    }

    // etc.

    ```


    When we attempt to program a generic version of the `establishCourseSchedule`
    method, however, we realize that the business rules governing how to establish
    a course schedule differ significantly for different types of courses:


    *   A lecture course may meet only once a week for three hours at a time.


    *   A lab course may meet twice a week for two hours each time.


    *   An independent study course may meet on a custom schedule that has been jointly
    negotiated by a given student and professor.


    It would be a waste of time for us to bother trying to program a generic, “one-size-fits-all”
    version of the `establishCourseSchedule` method within the `Course` class, because
    no matter what generic logic we’d attempt to provide, ***all three subclasses***—`LectureCourse`,
    `LabCourse`, and `IndependentStudyCourse`—would wind up having to replace such
    logic by overriding the method to make it meaningful for them.


    What other options do we have, then? Can we afford to simply ***omit*** the `establishCourseSchedule`
    method from the `Course` class entirely, adding such a method to each of the subclasses
    of `Course` as a ***new*** feature instead? Not if we want to take advantage of
    polymorphism with respect to this method. Consider the following example:


    ```

    ArrayList courses = new ArrayList();

    // Add a variety of different Course types to the collection.

    courses.add(new LectureCourse());

    courses.add(new LabCourse());

    courses.add(new IndependentStudyCourse());

    // etc.

    for (Course c : courses) {

    // This next line of code is polymorphic.

    c.establishCourseSchedule("1/24/2005", "5/10/2005");

    }

    ```'
  trans: '

    ### 用户自定义类型的优势


    用户自定义类型具有以下优势：


    *   用户自定义类型提供了一种直观的方式来表现现实世界中的对象，从而形成***更易于验证的需求***。


    *   类是便捷的可复用代码单元，这意味着***在构建应用程序时，需要从头编写的代码更少***。


    *   通过封装，我们***最大限度地减少了数据冗余***——每个数据项只在其所属的对象中存储一次——从而***降低了整个应用程序中出现数据完整性错误的可能性***。


    *   通过信息隐藏，如果部署后必须更改类的私有细节，我们***可以使应用程序免受连锁反应的影响***，从而***大幅降低维护成本***。


    *   对象负责确保自身数据的完整性，这使得***更容易隔离应用程序（业务）逻辑中的错误***；我们知道要检查损坏对象所属类的方法。


    *   一旦定义，用户自定义类型（类）可以在不同应用程序甚至不同组织之间反复复用。


    ### 继承的优势


    继承具有以下优势：


    *   我们可以扩展现有已部署的代码，而无需修改并重新测试，从而***大幅降低维护成本***。


    *   子类更加简洁，这意味着***需要编写/维护的总体代码更少***。


    ### 多态的优势


    多态具有以下优势之一：


    *   当向现有应用程序的类层次结构中添加新的子类时，它***最大限度地减少了对客户端代码的“连锁反应”***，从而***大幅降低维护成本***。


    ### 一个非常重要的告诫


    一个常见的误解是，转向面向对象技术会大幅缩短开发特定应用程序所需的时间。有很多这样的轶事：管理者期望使用面向对象方法的团队能够用构建非面向对象应用程序所需时间的一小部分来构建一个应用程序——***尽管该团队可能是第一次使用面向对象技术！***
    不幸的是，由于转向面向对象范式需要学习曲线——特别是对于那些多年来一直固守非面向对象技术的软件开发人员——对于一个缺乏面向对象经验的团队来说，开发他们的第一个面向对象应用程序通常需要***更长***的时间。


    然而，对于设计得当的面向对象应用程序来说，规模经济***确实***发挥作用的地方是在应用程序生命周期的***维护阶段***。应用程序（无论是面向对象还是其他）的维护阶段通常比开发阶段长得多，因此成本也更高。一个通用的经验法则是，大多数应用程序的生命周期分为
    20%的开发阶段和 80%的维护阶段。通过深思熟虑地应用（a）封装/信息隐藏和（b）继承/多态来大幅减少连锁反应，我们有望显著降低维护成本——从而降低整个软件生命周期的成本。


    而且，一旦我们熟练掌握了面向对象范式，我们确实也应该能够缩短应用程序的***开发***时间。由于类可以轻松复用，并可以通过继承进行可选地扩展/特化——***包括作为面向对象编程语言框架组成部分提供的海量预定义类***——对于给定的应用程序，我们需要编写的总体代码会更少。如果我们进而接受跨项目共享和复用代码的理念，我们就能在***多个***应用程序的生命周期内，在开发以及维护方面获得显著的生产力提升。


    ## 抽象类


    我们在第 5 章中讨论了将两个或多个类的共同特征合并到一个公共超类中是多么有益，这个过程称为***泛化***。例如，我们注意到`Student`类和`Professor`类之间的相似性（例如，两者都声明了一个`name`属性和用于`get`/`set`其值的方法），因此我们事后创建了`Person`类，作为`Student`和`Professor`的泛化。


    现在，我们假设在应用程序开发工作的一开始，我们就知道想要利用特化。例如，关于 SRS，也许我们想要建模各种类型的`Course`对象：讲座课程、实验课程、独立学习课程等。因此，我们希望从一开始就走在正确的道路上，首先设计一个`Course`超类，以处理这些不同类型课程的所有共同特征，然后再着手派生特化的子类。


    我们可能预先确定，所有`Course`对象，无论类型如何，都需要以下共同属性：


    *   `String courseName`


    *   `String courseNumber`


    *   `int creditValue`


    *   *CollectionType* `enrolledStudents`


    *   `Professor instructor`


    以及以下共同行为：


    *   `enrollStudent`


    *   `assignInstructor`


    *   `establishCourseSchedule`


    其中一些行为可能足够通用，以至于我们可以为`Course`类详细地编写它们的程序，因为我们确信`Course`的任何子类都能按原样继承这些方法，而无需重写它们。例如，`enrollStudent`和`assignInstructor`方法可以按如下方式通用地编写：


    ```

    import java.util.ArrayList;

    public class Course {

    private String courseName;

    private String courseNumber;

    private int creditValue;

    private ArrayList enrolledStudents;

    private Professor instructor;

    // 也会提供访问器方法；细节省略...

    public void enrollStudent(Student s) {

    enrolledStudents.add(s);

    }

    public void assignInstructor(Professor p) {

    setInstructor(p);

    }

    // 等等

    ```


    然而，当我们尝试编写`establishCourseSchedule`方法的通用版本时，我们意识到，对于不同类型的课程，管理如何建立课程安排的业务规则差异很大：


    *   讲座课程可能每周只上一次，每次三小时。

    *   实验课程可能每周上两次，每次两小时。

    *   独立学习课程可能按照特定学生和教授共同协商的定制时间表进行。


    我们费心尝试在`Course`类中编写一个通用的、“一刀切”版本的`establishCourseSchedule`方法将是浪费时间，因为无论我们尝试提供什么通用逻辑，***所有三个子类***——`LectureCourse`、`LabCourse`和`IndependentStudyCourse`——最终都将不得不通过重写该方法来替换该逻辑，使其对它们有意义。


    那么，我们还有其他什么选择呢？我们能否简单地从`Course`类中***省略***`establishCourseSchedule`方法，而将这样的方法作为***新***特性添加到`Course`的每个子类中？如果我们想针对此方法利用多态，就不能这样做。考虑以下示例：


    ```

    ArrayList courses = new ArrayList();

    // 向集合中添加各种不同的 Course 类型。

    courses.add(new LectureCourse());

    courses.add(new LabCourse());

    courses.add(new IndependentStudyCourse());

    // 等等

    for (Course c : courses) {

    // 下一行代码是多态的。

    c.establishCourseSchedule("1/24/2005", "5/10/2005");

    }

    ```

    '
- fmt: "\n正如我们在本章前面讨论的，多态表达式`c.establishCourseSchedule(...)`只有在`Course`类定义了这样的方法签名时，Java编译器才会认为其有效。那么，是否有可能通过向`Course`类添加一个具有所需方法头但不执行任何有意义操作的“虚拟”`establishCourseSchedule`方法来“欺骗”编译器呢？如果我们用空方法体编写该方法：\n\
    \n```\n// 此方法什么都不做！其方法体为空。\npublic void establishCourseSchedule(String startDate,\
    \ String endDate) { }\n```\n\n它确实可以编译，然后我们可以让每个子类用有意义的版本覆盖这个“什么都不做”的方法。虽然**可以**这样做，但出于以下原因，这**不被认为**是良好的编程实践：\n\
    \n*   通过为`Course`类提供`establishCourseSchedule`方法，我们声明了`Course`对象将能够代表应用程序提供此类服务。\n\
    *   然而，如果客户端代码曾经调用一个通用的`Course`对象来**执行**此服务：\n\n```\n    Course c = new Course();\n\
    \    // 我们相信正在调用 c 来执行指定的服务，\n    // 但在幕后，什么也没有发生。\n    c.establishCourseSchedule(\"\
    1/24/2005\", \"5/10/2005\");\n    ```\n\n该方法实现会做其名称**暗示**它要做的事情；就此而言，它根本什么都没做！\n\
    \n此外，也无法保证任何从`Course`派生的类会覆盖此方法以执行有意义的操作，因此我们最终可能会得到一个完全无法以有意义的方式执行`establishCourseSchedule`服务的`Course`类型层次结构。\n\
    \n**这似乎是一个两难境地**！我们**知道**需要为`Course`的所有子类编写一个特定类型的`establishCourseSchedule`方法。我们**不想**费心在超类中编写一个**无意义**的该方法版本，但为了促进多态性，我们必须让`Course`类识别这样的方法头。我们如何传达在`Course`的所有子类中都需要一个`establishCourseSchedule`方法的要求，更重要的是，**强制其未来的实现**？\n\
    \n像Java这样的面向对象语言通过**抽象类**的概念来提供解决方案。抽象类用于定义类需要执行**什么**行为，而无需提供**如何**执行每个此类行为的显式实现。我们编写抽象类的方式与编写非抽象类（也称为**具体类**）大致相同，但有一个例外：对于那些我们无法（或不愿）编写通用实现的行为（例如，前面例子中的`establishCourseSchedule`方法），我们允许指定方法**头**，而无需编写相应的方法**体**。我们将这种“无方法体”或仅包含方法头的声明称为**抽象方法**。并且，为了将此类方法与有方法体的方法区分开来，我们将后者称为**已实现方法**。\n\
    \n让我们回到`Course`类定义，添加一个抽象的`establishCourseSchedule`方法：\n\n```\n// 注意类声明中 \"abstract\"\
    \ 关键字的使用。\npublic abstract class Course {\nprivate String courseName;\nprivate\
    \ String courseNumber;\nprivate int creditValue;\nprivate ArrayList enrolledStudents;\n\
    private Professor instructor;\n// 其他细节已省略。\npublic void enrollStudent(Student\
    \ s) {\nenrolledStudents.add(s);\n}\npublic void assignInstructor(Professor p)\
    \ {\nsetInstructor(p);\n}\n// 注意 \"abstract\" 关键字和结尾分号的使用。\npublic abstract void\
    \ establishCourseSchedule(String startDate,\nString endDate);\n}\n```\n\n通过在`establishCourseSchedule`方法头中、返回类型之前添加`abstract`关键字，该方法被声明为抽象的。请注意，抽象方法的方法头在参数列表的右括号之后没有花括号。相反，方法头后面跟着一个分号（`;`）——也就是说，它缺少通常包含方法如何执行的详细逻辑的代码体。因此，该方法必须显式标记为`abstract`，以告知编译器我们并非意外忘记编写此方法；相反，我们在**有意**省略方法体时知道自己在做什么。\n\
    \n每当一个类包含一个或多个抽象方法时，我们还必须通过在类声明中的`class`关键字之前插入`abstract`关键字，将整个类声明为抽象的：\n\n```\n\
    public abstract class Course { ... }\n```\n\n如果我们忘记将一个包含一个或多个抽象方法的类标记为`abstract`，则会出现类似以下的编译错误：\n\
    \n```\nCourse should be declared abstract; it does not define\nestablishCourseSchedule(String,\
    \ String)\n```\n\n请注意，抽象类中的所有方法不必都是抽象的；抽象类也可以声明已实现的方法。例如，在我们的抽象`Course`类中，`enrollStudent`和`assignInstructor`方法都是已实现的。\n\
    \n通过在`Course`类中提供一个抽象的`establishCourseSchedule`方法，我们指定了所有类型的`Course`对象必须能够执行的一项服务，但没有确定给定子类应**如何**执行该服务的私有细节。相反，我们将此留给了每个子类——`LectureCourse`、`LabCourse`和`IndependentStudyCourse`——来指定其自身适合类的方式执行该服务。这是通过要求每个子类用**已实现的**版本**覆盖**该**抽象**方法来实现的。\n"
  raw: "As we discussed earlier in the chapter, the polymorphic expression `c.establishCourseSchedule(...)`\
    \ will be deemed valid by the Java compiler only if the `Course` class has defined\
    \ such a method signature. Well, then, is it possible to “trick” the compiler\
    \ by adding a “dummy” `establishCourseSchedule` method to the `Course` class that\
    \ has the required method header, but that does nothing meaningful? If we program\
    \ the method with an empty body\n\n```\n// This method does NOTHING!  Its method\
    \ body is empty.\npublic void establishCourseSchedule(String startDate, String\
    \ endDate) { }\n```\n\nit would indeed compile, and we could then allow each subclass\
    \ to override the “do nothing” version of this method with a meaningful version.\
    \ While it’s ***possible*** to do so, it’s ***not*** considered good programming\
    \ practice to do so, for the following reasons:\n\n*   By providing the `Course`\
    \ class with an `establishCourseSchedule` method, we’re declaring that `Course`\
    \ objects will be able to provide such a service on behalf of an application.\n\
    \n*   However, if client code were to ever call upon a generic `Course` object\
    \ to ***perform*** this service\n\n```\n    Course c = new Course();\n    // We\
    \ believe that we're calling upon c to perform the indicated service,\n    //\
    \ but behind the scenes, nothing is happening.\n    c.establishCourseSchedule(\"\
    1/24/2005\", \"5/10/2005\");\n    ```\n\nthe method as implemented would do what\
    \ its name ***implies*** that it will do; for that matter, it doesn’t do anything\
    \ at all!\n\nFurthermore, there’s no guarantee that any classes derived from `Course`\
    \ will override this method to do something meaningful, either, so we could wind\
    \ up with an entire hierarchy of `Course` types that are incapable of performing\
    \ the `establishCourseSchedule` service in a meaningful way.\n\n***This is seemingly\
    \ a dilemma***! We ***know*** we’ll need a type-specific `establishCourseSchedule`\
    \ method to be programmed for all subclasses of `Course`. We ***don’t*** want\
    \ to go to the trouble of programming a ***meaningless*** version of this method\
    \ in the superclass, but we must nonetheless equip the `Course` class to recognize\
    \ such a method header in order to facilitate polymorphism. How do we communicate\
    \ the requirement for an `establishCourseSchedule` method in all subclasses of\
    \ `Course` and, more important, ***enforce its future implementation***?\n\nOO\
    \ languages such as Java come to the rescue with the concept of **abstract classes**.\
    \ An abstract class is used to define ***what*** behaviors a class is required\
    \ to perform without having to provide an explicit implementation of ***how***\
    \ each and every such behavior will be carried out. We program an abstract class\
    \ in much the same way that we program a nonabstract class (a.k.a. a **concrete\
    \ class**), with one exception: for those behaviors for which we can’t (or care\
    \ not to) program a generic implementation (e.g., the `establishCourseSchedule`\
    \ method in the preceding example), we’re permitted to specify method ***headers***\
    \ without having to program the corresponding method ***bodies***. We refer to\
    \ a “bodiless,” or header-only, method declaration as an **abstract method**.\
    \ And, to differentiate such methods from methods with bodies, we’ll refer to\
    \ the latter as **implemented methods**.\n\nLet’s go back to our `Course` class\
    \ definition to add an `abstract establishCourseSchedule` method:\n\n```\n// Note\
    \ the use of the \"abstract\" keyword in the class declaration.\npublic abstract\
    \ class Course {\nprivate String courseName;\nprivate String courseNumber;\nprivate\
    \ int creditValue;\nprivate ArrayList enrolledStudents;\nprivate Professor instructor;\n\
    // Other details omitted.\npublic void enrollStudent(Student s) {\nenrolledStudents.add(s);\n\
    }\npublic void assignInstructor(Professor p) {\nsetInstructor(p);\n}\n// Note\
    \ the use of the \"abstract\" keyword and the terminating\n// semicolon.\npublic\
    \ abstract void establishCourseSchedule(String startDate,\nString endDate);\n\
    }\n```\n\nThe `establishCourseSchedule` method is declared to be abstract by adding\
    \ the `abstract` keyword to its header, just before the return type. Note that\
    \ the header of an abstract method has no braces following the closing parenthesis\
    \ of the parameter list. Instead, the header is followed by a semicolon (`;`)—that\
    \ is, it’s missing its code body, which normally contains the detailed logic of\
    \ how the method is to be performed. The method must therefore be explicitly labeled\
    \ as `abstract` to inform the compiler that we didn’t accidentally forget to program\
    \ this method; rather, we knew what we were doing when we ***intentionally***\
    \ omitted the body.\n\nWhenever a class contains one or more abstract methods,\
    \ then we must declare the class abstract as a whole as well, by inserting the\
    \ `abstract` keyword ahead of the `class` keyword in the class declaration:\n\n\
    ```\npublic abstract class Course { ... }\n```\n\nIf we forget to designate as\
    \ `abstract` a class that contains one or more abstract methods, a compilation\
    \ error such as the following will arise:\n\n```\nCourse should be declared abstract;\
    \ it does not define\nestablishCourseSchedule(String, String)\n```\n\nNote that\
    \ it isn’t necessary for all of the methods in an abstract class to be abstract;\
    \ an abstract class can also declare implemented methods. For example, in our\
    \ abstract `Course` class, both the `enrollStudent` and `assignInstructor` methods\
    \ are implemented.\n\nBy providing an abstract `establishCourseSchedule` method\
    \ in the `Course` class, we’ve specified a service that all types of `Course`\
    \ objects must be able to perform, but without pinning down the private details\
    \ of ***how*** the service should be performed by a given subclass. We’re instead\
    \ leaving it up to each of the subclasses—`LectureCourse`, `LabCourse`, and `IndependentStudyCourse`—to\
    \ specify its own class-appropriate way of performing the service. This is accomplished\
    \ by requiring each of the subclasses to ***override*** the ***abstract*** method\
    \ with an ***implemented*** version."
  trans: "\n正如我们在本章前面所讨论的，多态表达式 `c.establishCourseSchedule(...)` 只有在 `Course` 类定义了这样的方法签名时，才会被\
    \ Java 编译器视为有效。那么，是否有可能通过在 `Course` 类中添加一个具有所需方法头但无实际意义的“虚拟” `establishCourseSchedule`\
    \ 方法来“欺骗”编译器呢？如果我们用空方法体来编写这个方法：\n\n```\n// 此方法什么都不做！其方法体为空。\npublic void establishCourseSchedule(String\
    \ startDate, String endDate) { }\n```\n\n它确实能编译通过，然后我们可以让每个子类用有意义的版本覆盖这个“什么都不做”的方法。虽然***可以***这样做，但出于以下原因，这***不***被认为是良好的编程实践：\n\
    \n*   通过为 `Course` 类提供一个 `establishCourseSchedule` 方法，我们声明了 `Course` 对象将能够代表应用程序提供此类服务。\n\
    \n*   然而，如果客户端代码曾经调用一个通用的 `Course` 对象来***执行***此服务：\n\n```\n    Course c = new\
    \ Course();\n    // 我们相信正在调用 c 来执行指定的服务，\n    // 但在幕后，什么也没有发生。\n    c.establishCourseSchedule(\"\
    1/24/2005\", \"5/10/2005\");\n    ```\n\n那么，所实现的方法会做其名称所***暗示***的事情；就此而言，它实际上什么也没做！\n\
    \n此外，也无法保证任何从 `Course` 派生的类会覆盖此方法以执行有意义的操作，因此我们最终可能会得到一个完整的 `Course` 类型层次结构，它们都无法以有意义的方式执行\
    \ `establishCourseSchedule` 服务。\n\n***这似乎是一个两难困境***！我们***知道***需要为 `Course` 的所有子类编写一个特定类型的\
    \ `establishCourseSchedule` 方法。我们***不想***费心在超类中编写一个***无意义***的此方法版本，但为了支持多态，我们仍然必须让\
    \ `Course` 类能够识别这样的方法头。我们如何传达在 `Course` 的所有子类中都需要一个 `establishCourseSchedule`\
    \ 方法的要求，更重要的是，***强制其未来的实现***？\n\n像 Java 这样的面向对象语言通过**抽象类**的概念来提供解决方案。抽象类用于定义类需要执行***什么***行为，而无需提供***如何***执行每个此类行为的显式实现。我们编写抽象类的方式与编写非抽象类（也称为**具体类**）大致相同，但有一个例外：对于那些我们无法（或不愿）编写通用实现的行为（例如，前面例子中的\
    \ `establishCourseSchedule` 方法），我们被允许指定方法***头***，而无需编写相应的方法***体***。我们将这种“无方法体”或仅包含方法头的声明称为**抽象方法**。并且，为了将此类方法与有方法体的方法区分开来，我们将后者称为**已实现方法**。\n\
    \n让我们回到 `Course` 类定义，添加一个 `abstract establishCourseSchedule` 方法：\n\n```\n// 注意类声明中\
    \ \"abstract\" 关键字的使用。\npublic abstract class Course {\nprivate String courseName;\n\
    private String courseNumber;\nprivate int creditValue;\nprivate ArrayList enrolledStudents;\n\
    private Professor instructor;\n// 其他细节已省略。\npublic void enrollStudent(Student\
    \ s) {\nenrolledStudents.add(s);\n}\npublic void assignInstructor(Professor p)\
    \ {\nsetInstructor(p);\n}\n// 注意 \"abstract\" 关键字和结尾分号的使用。\npublic abstract void\
    \ establishCourseSchedule(String startDate,\nString endDate);\n}\n```\n\n通过在方法头中、返回类型之前添加\
    \ `abstract` 关键字，`establishCourseSchedule` 方法被声明为抽象方法。请注意，抽象方法的方法头在参数列表的右括号之后没有花括号。相反，方法头后面跟着一个分号（`;`）——也就是说，它缺少了通常包含方法如何执行的详细逻辑的代码体。因此，该方法必须被显式标记为\
    \ `abstract`，以告知编译器我们并非意外忘记编写此方法；相反，我们在***有意***省略方法体时，清楚自己在做什么。\n\n每当一个类包含一个或多个抽象方法时，我们还必须在类声明中、`class`\
    \ 关键字之前插入 `abstract` 关键字，将整个类声明为抽象类：\n\n```\npublic abstract class Course { ...\
    \ }\n```\n\n如果我们忘记将一个包含一个或多个抽象方法的类标记为 `abstract`，则会出现如下编译错误：\n\n```\nCourse 应声明为\
    \ abstract；它未定义\nestablishCourseSchedule(String, String)\n```\n\n请注意，抽象类中的所有方法不必都是抽象的；抽象类也可以声明已实现的方法。例如，在我们的抽象\
    \ `Course` 类中，`enrollStudent` 和 `assignInstructor` 方法都是已实现的。\n\n通过在 `Course` 类中提供一个抽象的\
    \ `establishCourseSchedule` 方法，我们指定了所有类型的 `Course` 对象必须能够执行的一项服务，但没有锁定给定子类应***如何***执行该服务的私有细节。相反，我们将此留给了每个子类——`LectureCourse`、`LabCourse`\
    \ 和 `IndependentStudyCourse`——来指定其自身适合该类的执行服务方式。这是通过要求每个子类用***已实现***的版本***覆盖***该***抽象***方法来实现的。\n"
- fmt: '### Implementing Abstract Methods


    When we derive a class from an abstract superclass, the subclass will inherit
    all of the superclass’s features, including all of its **abstract** methods. To
    replace an inherited abstract method with a concrete version, the subclass need
    merely override it; in so doing, we drop the `abstract` keyword from the method
    header and replace the terminating semicolon with a method body (i.e., code enclosed
    in braces).


    Let’s illustrate this approach by deriving a class called `LectureCourse` from
    the `Course` class:


    ```

    // Deriving a concrete subclass from an abstract superclass.

    public class LectureCourse extends Course {

    // Details omitted.

    // Override the abstract establishCourseSchedule method with a concrete

    // version by (a) removing the abstract keyword from the method header

    // and (b) providing a method body.

    public void establishCourseSchedule(String startDate,

    String endDate) {

    // Logic specific to the business rules for a LectureCourse

    // would be provided here ... pseudocode.

    determine what day of the week the startDate falls on;

    determine how many weeks there are between startDate and endDate;

    schedule one three-hour class meeting per week on the appropriate

    day of the week;

    }

    }

    ```


    Note that in overriding the `establishCourseSchedule` method, we’ve dropped the
    `abstract` keyword from the method header because the method is no longer abstract;
    we’ve implemented it by providing it with a method body. In so doing, we’re also
    able to drop the `abstract` keyword from the `LectureCourse` class declaration:


    ```

    // No need for the "abstract" keyword here!

    public class LectureCourse extends Course { ... }

    ```


    because `LectureCourse` no longer contains any abstract methods; it is now a **concrete**
    class.


    Unless a class derived from an abstract class implements **all** of the abstract
    methods that it inherits, the subclass must still be declared to be abstract.
    For example, say that in deriving a class named `IndependentStudyCourse` from
    our abstract `Course` class, we neglect to implement the `abstract establishCourseSchedule`
    method. If we were to try to compile `IndependentStudyCourse`, we’d get the following
    compilation error:


    ```

    IndependentStudyCourse should be declared abstract; it does not define

    establishCourseSchedule(String, String) in Course

    ```


    To get our `IndependentStudyCourse` class to compile properly, we have two options
    for how to amend it:


    - We have to implement the `abstract establishCourseSchedule` method inherited
    from `Course`, as we did for the `LectureCourse` subclass.

    - We have to declare the `IndependentStudyCourse` class as a whole to be `abstract`:


    ```

    public abstract class IndependentStudyCourse extends Course { ... }

    ```


    Note that allowing a subclass to remain abstract isn’t necessarily a mistake,
    as we’ll discuss a bit later in this chapter.


    ### Abstract Classes and Instantiation


    Abstract classes **cannot be instantiated**. That is, if the `Course` class is
    declared to be abstract, then we can’t ever instantiate generic `Course` objects
    in our application—an attempt to do so will result in a compilation error:


    ```

    Course c = new Course();  // Impossible!

    ```


    Here’s the error message:


    ```

    Course is abstract; cannot be instantiated

    ```


    Why does the compiler prevent us from creating `Course` objects? The answer lies
    in the fact that the `Course` class declares an `establishCourseSchedule` method
    **header**, thus implying that `Course`s are able to perform this service, but
    providing no body to explain **how** the method is to be performed. If we **were**
    able to instantiate a `Course` object, it would therefore be expected to know
    how to respond to a service request such as the following:


    ```

    c.establishCourseSchedule("01/24/2005", "05/10/2005");  // Behavior undefined!

    ```


    But because there is no executable method body associated with the abstract `establishCourseSchedule`
    method, the `Course` object in question wouldn’t know how to behave in response
    to such a message at run time. So the compiler is actually doing us a favor by
    preventing us from creating this impossible run-time situation to begin with.


    **We’ve just hit upon the mechanism for how abstract methods serve to enforce
    implementation requirements**! Declaring an abstract method in a superclass ultimately
    **forces** all subclasses to provide implementations of all inherited abstract
    methods; otherwise, the subclasses themselves will also be abstract, and we won’t
    be able to instantiate them either. Therefore, somewhere along the line in a derivation
    hierarchy, a class derived from an abstract class must provide concrete implementations
    for all of its inherited abstract methods if we wish to “break the spell of abstractness”—that
    is, if we wish to instantiate objects of that particular derived type. Referring
    to Figure [7-1](#78624_3_En_7_Chapter.xhtml#Fig1)


    ![](images/78624_3_En_7_Chapter/78624_3_En_7_Fig1_HTML.jpg)


    4 blocks of different java codes with a flow from bottom to top. Block A has abstract
    class A which is abstracted from class X and B. Class B is abstracted from class
    Y.


    Figure 7-1


    “Breaking the spell of abstractness” by implementing abstract methods


    - Class `A` is abstract because it declares an abstract method `foo`; objects
    of type `A` therefore **cannot** be instantiated.

    - Class `X` is derived from `A` and is a concrete class because it concretely
    implements the abstract method `foo` as inherited from `A`. Thus, we **can** instantiate
    objects of type `X`.

    - Class `B` is abstract because it inherits the abstract method `foo` from `A`
    without implementing it. Note that `B` also introduces a second abstract method,
    `bar`, of its own. Objects of type `B` therefore **cannot** be instantiated.

    - Class `Y` is concrete because it implements all of the abstract methods that
    it has inherited from its various ancestors—`foo` from `A` and `bar` from `B`.
    Thus, we **can** instantiate objects of type `Y`.


    As mentioned earlier, allowing a subclass (e.g., `IndependentStudyCourse` from
    the earlier example) to remain an abstract class isn’t necessarily a mistake.
    It’s perfectly acceptable to have multiple layers of abstract classes in an inheritance
    hierarchy; we simply need a terminal/leaf class to be concrete in order for it
    to be useful in creating objects.


    ### Declaring Reference Variables of Abstract Types


    Despite the fact that we’re prevented from instantiating an abstract class, we’re
    nonetheless permitted to declare **reference variables** to be of an abstract
    type; this is necessary to facilitate polymorphism, as in the following code:


    ```

    for (Course c : courses) {

    c.establishCourseSchedule(...);

    }

    ```


    Here, we’re declaring `c` to be of (abstract) type `Course` at compile time, knowing
    that, at **run time**, `c` will actually be referring to an object belonging to
    a **specific concrete subclass** of `Course`, for reasons that we discussed earlier.'
