  trans: '

    ## TreeMap 类


    Java 的 `TreeMap` 类是另一种字典类型的集合。`TreeMap` 与 `HashMap` 非常相似，但有一个显著的区别：


    *   当我们遍历一个 `TreeMap` 时，对象会按照 ***键的升序（排序后的顺序）*** 自动从集合中检索出来。


    *   相反，当我们遍历一个 `HashMap` 时，无法保证检索项目的顺序。


    让我们编写一个程序来演示 `HashMap` 和 `TreeMap` 之间的这种区别。在程序中，我们将实例化这两种集合类型各一个。这次，我们将向集合中插入
    `String` 对象，而不是 `Student` 对象；我们将让同一个 `String` 同时充当 ***键和值***：


    ```

    import java.util.*;

    public class TreeHash {

    public static void main(String[] args) {

    // 实例化两个集合——一个 HashMap 和一个 TreeMap——键类型和对象类型均为 String。

    HashMap h = new HashMap();

    TreeMap t = new TreeMap();

    // 向 HashMap 中插入几个 String 对象，其中 String 同时充当键和值。

    h.put("FISH", "FISH");

    h.put("DOG", "DOG");

    h.put("CAT", "CAT");

    h.put("ZEBRA", "ZEBRA");

    h.put("RAT", "RAT");

    // 以相同的顺序将相同的 String 对象插入到 TreeMap 中。

    t.put("FISH", "FISH");

    t.put("DOG", "DOG");

    t.put("CAT", "CAT");

    t.put("ZEBRA", "ZEBRA");

    t.put("RAT", "RAT");

    // 遍历 HashMap 以检索所有 String 对象……

    System.out.println("从 HashMap 中检索：");

    for (String s : h.values()) {

    System.out.println(s);

    }

    System.out.println();

    // ……然后遍历 TreeMap。

    System.out.println("从 TreeMap 中检索：");

    for (String s : t.values()) {

    System.out.println(s);

    }

    }

    }

    ```


    输出结果如下：


    ```

    从 HashMap 中检索：

    ZEBRA

    CAT

    FISH

    DOG

    RAT

    从 TreeMap 中检索：

    CAT

    DOG

    FISH

    RAT

    ZEBRA

    ```


    请注意，`TreeMap` 确实对 `String` 进行了排序，而 `String` 从 `HashMap` 中检索时则是任意顺序——既不是插入顺序，也不是排序后的顺序。


    我们之前讨论过的 `HashMap` 类的所有其他方法，对于 `TreeMap` 来说都以相同的方式工作。


    如果 `TreeMap` 实际上与 `HashMap` 相同，只是多了排序迭代的好处，那我们为什么不干脆忽略 `HashMap` 类，总是使用 `TreeMap`
    类来创建字典集合呢？答案在于字典可以使用 ***任何对象类型*** 作为键。


    如果我们像迄今为止所有示例中那样使用 `String` 作为键，`TreeMap` 可以轻松确定如何对它们进行排序，因为 `String` 类定义了一个 `compareTo`
    方法，`TreeMap` 类可以利用该方法。然而，如果我们使用 ***用户自定义类型*** 作为键，那么就需要由我们来编程定义对该对象类型进行排序的含义。


    例如，假设我们创建一个字典集合，其中 `Department` 对象作为键，而系主任 `Professor` 对象作为给定键引用的值。如果我们将该集合声明为
    `TreeMap`，那么如果我们计划遍历该集合，就必须定义一个 `Department` 在排序顺序中“排在另一个之前”的含义。实现这一功能所需的代码相当高级——肯定超出了我们目前所学的
    Java 知识范围。可以说，如果我们并非真正 ***需要*** 按键的排序顺序遍历字典，那么当 `HashMap` 就能很好地满足需求时，不值得为了使用 `TreeMap`
    而增加额外的麻烦。


    ## 同一个对象可以被多个集合同时引用


    如前所述，当我们谈论将对象插入集合时，实际上是指插入对该对象的引用，而不是对象本身。这意味着 ***同一个*** 对象可以被 ***多个*** 集合同时引用。


    把人想象成一个对象，把他们的电话号码想象成联系这个人的引用。现在，正如我在本章前面提出的，把地址簿想象成一个集合：很容易看出，***同一个*** 人的电话号码（引用）可以同时记录在许多
    ***不同的*** 地址簿（集合）中。


    让我们考虑一个与 SRS 相关的示例。对于注册参加某门特定课程的学生，我们可能同时维护以下内容：


    *   这些学生的有序列表，用于了解谁在后续课程的候补名单上最先注册

    *   一个字典，允许我们根据学生的 `name` 检索给定的 `Student` 对象

    *   甚至可能还有第二个 SRS 范围内的字典，根据学生的学号组织大学中的 ***所有*** 学生


    这在概念上如图 6-14 所示。


    ![](img/78624_3_En_6_Fig14_HTML.jpg)


    John 123、Sam 456 和 Fred 789 的三个云状图形，以及两个空白云状图形，连接到“参加 Math 101 的学生”、“等待参加 Math
    202 的学生”和“SRS 全体学生”的数组。


    图 6-14


    一个给定的对象可以被多个集合同时引用


    初级 OO 程序员常犯的一个错误是，假设如果清空了一个给定的集合（可能通过显式调用其 `clear` 方法），那么该集合之前引用的对象就会被垃圾回收。回想一下我们在第
    3 章中关于垃圾回收的讨论：只有当给定对象不再有 ***任何*** 句柄时，其内存才会被 JVM 回收。鉴于对象通常被多个集合同时引用，我们不能假设清空单个集合就会释放它所引用的对象。例如，如果我们清空图
    6-14 中“参加 Math 101 的学生”集合的内容，“John”、“Fred”和“Sam”这些 `Student` 对象仍然会被另外两个集合引用。除非这些
    `Student` 对象随后也从那些其他集合中被移除，否则它们不会被垃圾回收。


    ## 发明我们自己的集合类型


    如前所述，不同类型的集合具有不同的属性和行为。因此，你必须熟悉你所选择的 OO 语言中可用的各种预定义集合类型，并在特定情况下选择最适合你需求的那一种。或者，如果没有一种适合你，那就发明你自己的！这时我们才开始真正感受到
    OO 语言的力量。既然我们有能力发明自己的用户自定义类型，那么自然我们也可以自由地定义自己的 ***集合*** 类型。


    我们有几种创建自己集合类型的方法：


    *   ***方法 #1***：我们可以从头开始设计一个全新的集合类。

    *   ***方法 #2***：我们可以使用在第 5 章中学到的技术来扩展一个预定义的集合类。

    *   ***方法 #3***：我们可以创建一个“包装器”类，封装其中一个内置的集合类型，以“抽象掉”操作集合所涉及的一些细节。


    接下来，让我们依次讨论这三种方法。

    '
- fmt: '### Approach #1: Designing a New Collection Class from Scratch


    Creating a brand-new collection class from scratch is typically quite a bit of
    work. Since most OO languages provide such a wide range of predefined collection
    types, it’s almost always possible to find a preexisting collection type to use
    as a starting point, in which case one of the other two approaches would almost
    always be preferred.


    If we were to want to create a new collection class from scratch, however, we’d
    almost certainly want such a class to take advantage of the predefined `Collection`
    interface. We’ll discuss the notion of interfaces in general, and of the `Collection`
    interface specifically, in Chapter [7](#78624_3_En_7_Chapter.xhtml).


    Note that, despite the fact that an array serves as a simple sort of ordered list
    collection, it is not formally a Java `Collection` in the “capital C” sense of
    the word.


    ### Approach #2: Extending a Predefined Collection Class (`MyIntCollection`)


    To illustrate this approach, let’s extend the `ArrayList` class to create a collection
    class called `MyIntCollection`. An object of type `MyIntCollection` will be able
    to, at a minimum, respond to all of the same service requests that an `ArrayList`
    can respond to, because by virtue of inheritance, `MyIntCollection` is an `ArrayList`.
    However, we want our `MyIntCollection` class to do some extra work: we want it
    to keep track of the smallest and largest `int` values stored within a given `MyIntCollection`
    instance. To accomplish this, we’ll add a few new features, along with overriding
    the `add` method that we’d otherwise inherit as is from `ArrayList`.


    We’ll look at the code for the `MyIntCollection` class in its entirety first,
    and then we’ll walk through it step by step afterward:


    ```

    import java.util.ArrayList;

    public class MyIntCollection extends ArrayList {

    // We inherit all of the attributes and methods of a standard ArrayList

    // as is, then define a few extra attributes and methods of our own:

    // two ints to keep track of the smallest and largest values

    // added to the collection, plus another int to keep a running

    // total of all values added to the collection.

    private int smallestInt;

    private int largestInt;

    private int total;

    // Replace the default constructor.

    public MyIntCollection() {

    // Do everything defined by the constructor of the ArrayList

    // base class first - we needn''t know what those things are, simply

    // that we ought to do them!

    super();

    // Initialize the total.

    total = 0;

    }

    // Override the add() method as inherited from ArrayList.

    public boolean add(int i) {

    // Remember this int as the largest/smallest, if appropriate.

    // (The FIRST time we add a value, that value will, by definition,

    // be BOTH the smallest AND the largest that we''ve seen so far!)

    if (this.isEmpty()) {

    smallestInt = i;

    largestInt = i;

    }

    else {

    if (i  largestInt) {

    largestInt = i;

    }

    }

    // Include this value in the running total.

    total = total + i;

    // Insert the int into the collection using the add method as implemented

    // by the ArrayList base class.  Again, we needn''t understand

    // the inner workings of HOW this method does so ...

    return super.add(i);

    }

    // Several new methods.

    public int getSmallestInt() {

    return smallestInt;

    }

    public int getLargestInt() {

    return largestInt;

    }

    public double getAverage() {

    // Note that we must cast ints to doubles to avoid

    // truncation when dividing.

    return ((double) total) / ((double) this.size());

    }

    }

    ```


    Now, let’s walk through selected portions of the `MyIntCollection` code.


    #### Wrapper Classes for Primitive Types


    The first unusual bit of syntax that we notice is with regard to the class that
    we’re extending:


    ```

    public class MyIntCollection extends ArrayList {

    ```


    If we are going to be placing `int` values in our collection, why are we designating
    `Integer` as the type of element to be inserted?


    Unlike arrays, whose elements may be either primitive or reference types, Java
    collections are designed to hold only reference types. An `int` is not an object,
    and so if we wish to store primitive values in collections, we must “box” them
    inside of objects, as illustrated conceptually in Figure [6-15](#78624_3_En_6_Chapter.xhtml#Fig15).


    ![](images/78624_3_En_6_Chapter/78624_3_En_6_Fig15_HTML.jpg)


    An array of 3 blocks. Each block is mapped to a balloon labeled integer object
    17, integer object 36, and integer object 8, respectively.


    **Figure 6-15** We must “box” primitive values in objects in order to insert them
    into a collection


    The Java language provides a different “wrapper” class to serve as a “box” for
    each of the eight distinct primitive types: `Integer`, `Float`, `Double`, `Byte`,
    `Short`, `Long`, `Boolean`, and `Character`. All of these classes are included
    in the core `java.lang` package.


    Prior to Java 5.0, programmers were responsible for writing the explicit code
    necessary to “wrap” primitive values inside of corresponding wrapper objects before
    inserting them into a collection, as well as the code to “unwrap” them when retrieving
    them from a collection; as of Java version 5.0, the autoboxing feature was introduced
    to save us the trouble of having to do this explicitly. Simply by declaring a
    collection as containing the appropriate wrapper type, we are free to insert and
    retrieve primitive values as is:


    ```

    ArrayList x = new ArrayList();

    // Directly add a primitive (int) value to the ArrayList;

    // it automatically gets "boxed" inside of an Integer object.

    x.add(17);

    // Details omitted ...

    // Directly retrieve a primitive (int) value from the

    // ArrayList; it automatically gets "unboxed" from its

    // enclosing Integer object.

    int y = x.elementAt(0); // y now has the value 17

    ```


    We’ll revisit the wrapper classes for primitive types several more times in the
    book, as they serve many useful purposes.


    #### Reusing a Base Class Constructor


    The constructor that we’ve provided for the `MyIntCollection` class takes advantage
    of the `super` keyword to reuse the constructor code of the base `ArrayList` class,
    a technique that we discussed in Chapter [5](#78624_3_En_5_Chapter.xhtml):


    ```

    public MyIntCollection() {

    // Do everything defined by the constructor of the ArrayList

    // base class first - we needn''t know what those things are, simply

    // that we ought to do them!

    super();

    ```


    It isn’t necessary for us to know the behind-the-scenes details that take place
    when an instance of an `ArrayList` is created. Simply by including


    ```

    super();

    ```


    as the first line of code in our constructor, we ensure that such details are
    taken care of for us.


    Strictly speaking, you could omit the preceding line of code, for as you learned
    in Chapter [5](#78624_3_En_5_Chapter.xhtml), a call to `super()` is implied as
    the first line of code of a derived class’s constructor. However, inserting this
    line of code explicitly doesn’t hurt and in fact clarifies what is actually happening
    when this constructor is executed.'
