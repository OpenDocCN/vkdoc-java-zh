  trans: '

    ### （不恰当的）方法二：“克隆”学生类来创建研究生类


    我们可以通过***复制***`Student.java`的代码来创建一个新的`GraduateStudent`类，将后者重命名为`GraduateStudent`，然后在***副本***中添加研究生所需的额外特性。


    以下是生成的`GraduateStudent`类：


    ```

    // GraduateStudent.java

    public class GraduateStudent {

    // 学生属性被重复！

    private String name;

    private String birthDate;

    // 等等

    // 添加研究生所需的两个新属性。

    private String undergraduateDegree;

    private String undergraduateInstitution;

    // 学生方法被重复！

    public String getName(...

    public void setName(...

    public String getBirthDate(...

    public void setBirthDate(...

    // 等等

    // 添加研究生所需的新访问器方法。

    public String getUndergraduateDegree(...

    public void setUndergraduateDegree(...

    public String getUndergraduateInstitution(...

    public void setUndergraduateInstitution(...

    }

    ```


    这将是一个非常糟糕的设计，因为我们在两个地方（`Student.java`和`GraduateStudent.java`）拥有大量相同的代码。如果以后想要修改某个方法的工作方式或属性的定义——例如，将`birthDate`属性的类型从`String`改为`Date`，并相应修改该属性的访问器方法——那么我们就必须在***两个***类中做出相同的修改。同样，如果我们定义了三种、四种或***十几种***不同的`Student`类型，且它们都是原始`Student`类的“克隆”，那么这个问题会迅速加剧；代码维护的负担将很快变得难以承受。***方法二显然也不是正确答案***！


    严格来说，上述两种方法都能工作，但结果代码中固有的冗余/复杂性会使应用程序难以维护。不幸的是，在非面向对象语言中，这种复杂的方法通常是我们处理新对象类型需求的***唯一***选择。难怪随着需求不可避免地随时间演变，应用程序会变得如此复杂且维护成本高昂。幸运的是，我们还有另一种非常强大的方法，专门适用于面向对象编程语言：我们可以利用**继承**机制。


    ### 正确方法（方法三）：利用继承


    使用面向对象编程语言，我们可以通过利用**继承**的力量来解决特化`Student`类的问题。继承是一种通过仅说明新类与已建立的另一个类之间的差异（在特性方面）来定义新类的机制。


    使用继承，我们可以声明一个名为`GraduateStudent`的新类，它“原样”继承`Student`类的所有特性。`GraduateStudent`类只需指定与研究生相关的两个额外属性——`undergraduateDegree`和`undergraduateInstitution`——以及它们的访问器方法，如下面的`GraduateStudent`类所示。请注意，在
    Java 类声明中，继承是通过`extends`关键字触发的：`public class` *新类* `extends` *现有类* `{ ... }`。


    ```

    public class GraduateStudent extends Student {

    // 声明两个超出 Student 类已声明范围的新属性……

    private String undergraduateDegree;

    private String undergraduateInstitution;

    // ……以及每个新属性的访问器方法。

    public String getUndergraduateDegree {

    return undergraduateDegree;

    }

    public void setUndergraduateDegree(String s) {

    undergraduateDegree = s;

    }

    public String getUndergraduateInstitution {

    return undergraduateInstitution;

    }

    public void setUndergraduateInstitution(String s) {

    undergraduateInstitution = s;

    }

    // 这就是 GraduateStudent 类的完整声明！

    // 简洁明了！

    }

    ```


    这就是我们建立新`GraduateStudent`类所需声明的全部内容：两个属性加上相关的四个访问器方法。无需在`GraduateStudent`的代码中重复`Student`类的任何特性，因为我们会自动继承这些特性。这就像我们“抄袭”了`Student`类的属性和方法代码，从`Student`复制并粘贴到`GraduateStudent`中，但无需实际执行这些繁琐操作。因此，`GraduateStudent`类拥有***n***
    + 6 个特性：在`GraduateStudent.java`文件中显式声明的六个特性，加上从`Student`继承的***n***个特性。


    当我们利用继承时，我们起始的原始类——此处为`Student`——被称为（**直接**）**超类**。新类——`GraduateStudent`——被称为（**直接**）**子类**。子类被称为**扩展**其直接超类。

    '
- fmt: '### The “is a” Nature of Inheritance


    Inheritance is often referred to as the “is a” relationship between two classes,
    because if a class `B` (`GraduateStudent`) is derived from a class `A` (`Student`),
    then `B` truly **is a** special case of `A`. Anything that we can say about a
    superclass must therefore also be true about all of its subclasses; that is:


    - A `Student` attends classes, and so a `GraduateStudent` attends classes.

    - A `Student` has an advisor, and so a `GraduateStudent` has an advisor.

    - A `Student` pursues a degree, and so a `GraduateStudent` pursues a degree.


    In fact, an “acid test” for legitimate use of inheritance is as follows: **if
    there is something that can be said about a class `A` that can’t be said about
    a proposed subclass `B`, then `B` isn’t a valid subclass of `A`**.


    Because subclasses are special cases of their superclasses, the term **specialization**
    is used to refer to the process of deriving one class from another. **Generalization**,
    on the other hand, is a term used to refer to the opposite process: namely, recognizing
    the common features of several existing classes and creating a new, common superclass
    for them all.


    Let’s say we now wish to declare a `Professor` class to complement our `Student`
    class. `Student`s and `Professor`s have some features in common: attributes `name`,
    `birthDate`, etc. and the methods that manipulate these attributes. Yet, they
    each have unique features, as well:


    - The `Professor` class might require the attributes `title` (a `String`) and
    `worksFor` (a reference to a `Department`).

    - Conversely, the `Student` class’s `studentID`, `degreeSought`, and `majorField`
    attributes are irrelevant for a `Professor`.


    Because each class has attributes that the other would find useless, neither class
    can be derived from the other. Nonetheless, to **duplicate** their common attribute
    declarations and method code in two places would be very inefficient. In such
    a circumstance, we’d want to invent a new **superclass** called `Person`, consolidate
    the features common to both `Student`s and `Professor`s in the `Person` class,
    and then have `Student` and `Professor` inherit these common features by `extend`ing
    `Person`. The resultant code in this situation follows.


    First, we’ll define the `Person` superclass in a file named `Person.java`:


    ```

    // Person.java

    public class Person {

    // Attributes common to Students and Professors.

    private String name;

    private String address;

    private String birthDate;

    // Common accessor methods.

    public String getName() {

    return name;

    }

    public void setName(String name) {

    this.name = name;

    }

    // etc. for the other two attributes

    // Other general-purpose Person methods, if any, would go here - details omitted.

    }

    ```


    Next, we’ll streamline our `Student` class as previously presented to remove those
    features that it will now inherit from `Person`:


    ```

    // Student.java

    public class Student extends Person {

    // Attributes specific only to a Student; redundant attributes - i.e., those

    // that are shared with Professor, and hence are now declared by Person - have

    // been REMOVED from Student.

    private String studentId;

    private String majorField;

    private String degreeSought;

    // Student-specific accessor methods - redundant methods have been removed.

    public String getStudentId() {

    return studentId;

    }

    public void setStudentId(String studentId) {

    this.studentId = studentId;

    }

    // etc. for the other two explicitly declared Student attributes.

    // Other Student-specific methods go here, if any; details omitted.

    }

    ```


    Finally, we’ll define the second new (sub)class, `Professor`. This class would
    go into a separate `Professor.java` file:


    ```

    // Professor.java

    public class Professor extends Person {

    // Attributes specific only to a Professor; redundant attributes - i.e., those

    // that are shared with Student, and hence are now declared by Person - are

    // not included here.

    private String title;

    private Department worksFor;

    // Professor-specific accessor methods go here.

    public String getTitle() {

    return title;

    }

    public void setTitle(String title) {

    this.title = title;

    }

    public Department getWorksFor() {

    return worksFor;

    }

    public void setWorksFor(Department worksFor) {

    this.worksFor = worksFor;

    }

    // Other Professor-specific methods go here, if any; details omitted.

    }

    ```


    By generalizing the shared features of `Student`s and `Professor`s into a common
    superclass called `Person`, we’ll easily be able to introduce a third type of
    `Person` or a fourth or a fifth, if needed in the future, and they’ll all **share
    in these same features** through the mechanism of inheritance. Furthermore, if
    we wish to introduce new subtypes of these subclasses—perhaps `AdjunctProfessor`
    and `TenuredProfessor` as subclasses of the `Professor` class—they’ll all derive
    a common set of features as a result of their shared `Person` “ancestry.”


    ### The Benefits of Inheritance


    Inheritance is perhaps one of the most powerful and unique aspects of an OO programming
    language for the following reasons:


    - **We dramatically reduce code redundancy**, thus lessening the burden of code
    maintenance when requirements change or logic flaws are detected.

    - **Subclasses are much more succinct than they would be without inheritance**.
    A subclass contains only the essence of what differentiates it from its direct
    superclass. We know from looking at the `GraduateStudent` class definition, for
    example, that a graduate student is “a student who already holds an undergraduate
    degree from an educational institution.” As a result, **the total body of code
    for a given OO application is significantly reduced** as compared with the traditional/non-OO
    version of the same application.

    - **Through inheritance, we can reuse and extend code that has already been thoroughly
    tested without modifying it**. As you saw, we were able to invent a new class—`GraduateStudent`—without
    disturbing the `Student` class code in any way. We can therefore rest assured
    that any client code that relies on instantiating generic `Student` objects and
    passing messages to them will be unaffected by the creation of subclass `GraduateStudent`,
    and thus we avoid having to retest huge portions of our existing application(s).
    (Had we used a non-OO approach of “tinkering” with the `Student` class code to
    try to accommodate graduate student requirements, on the other hand, we would
    have had to retest our entire existing application to make sure that nothing had
    “broken”!)

    - **Best of all, we can derive a new class from an existing class even if we don’t
    own the source code for the latter**! As long as we have the **compiled bytecode
    version** of a class, the inheritance mechanism works just fine; we don’t need
    the original source code of a class in order to extend it. **This is one of the
    most dramatic ways to achieve productivity with an object-oriented language**:
    find a class (either one written by someone else or one that is built into the
    language) that does much of what you need, and create a subclass of that class,
    adding just those features that you need for your own purposes.


    We’ll look at a specific example of extending one of the predefined Java collection
    classes in Chapter [6](#78624_3_En_6_Chapter.xhtml).


    - Finally, as we discussed in Chapter [1](#78624_3_En_1_Chapter.xhtml), **classification
    is the natural way that humans organize information**; so it only makes sense
    that we’d organize software along the same lines, making it much more intuitive
    and hence easier to develop, maintain, extend, and communicate with users about.'
