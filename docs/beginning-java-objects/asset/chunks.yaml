    }

    // 注意，我们没有费心用自己的设计来替换无参构造函数。

    // 这将会给我们带来问题，稍后就会看到。

    // 方法……细节省略。

    }

    //------------------------------------

    // Student.java

    public class Student extends Person {

    // 属性……细节省略。

    // 未提供显式构造函数！！！

    // 我们要“偷懒”，让 Java 为 Student 类提供默认无参构造函数。

    // 方法……细节省略。

