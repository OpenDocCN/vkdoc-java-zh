    ### 算术运算符


    Java 语言提供了一些基本的算术运算符，如表 2-1 所示。


    表 2-1


    Java 算术运算符


    | 运算符 | 描述 |

    | --- | --- |

    | `+` | 加法 |

    | `-` | 减法 |

    | `*` | 乘法 |

    | `/` | 除法 |

    | `%` | 取余（`%` 运算符左侧的操作数除以右侧操作数所得的余数，例如 `10 % 3 = 1`，因为 3 乘以 3 等于 9，10 减去 9 余
    1） |


    `+` 和 `-` 运算符也可以用作一元运算符，表示正数或负数：`-3.7`、`+42`。


    除了简单的赋值运算符 `=` 之外，还有一些专门的**复合赋值运算符**，它们将变量赋值与算术运算结合在一起，如表 2-2 所示。


    表 2-2


    Java 复合赋值运算符


    | 运算符 | 描述 |

    | --- | --- |

    | `+=` | `a += b` 等价于 `a = a + b`。 |

    | `-=` | `a -= b` 等价于 `a = a - b`。 |

    | `*=` | `a *= b` 等价于 `a = a * b`。 |

    | `/=` | `a /= b` 等价于 `a = a / b`。 |

    | `%=` | `a %= b` 等价于 `a = a % b`。 |


    我们要介绍的最后两个算术运算符是**一元递增**（`++`）和**递减**（`--`）运算符，它们用于将 `int` 变量的值增加或减少 1，或将浮点（`float`、`double`）类型的值增加或减少
    1.0。它们被称为一元运算符，因为它们应用于单个变量，而二元运算符则如前所述，组合两个表达式的值。


    一元递增和递减运算符也可以应用于 `char` 变量，以在 Unicode 排序序列中向前或向后移动一个字符位置。例如，在以下代码片段中，变量 `c` 的值将从
    ''`e`'' 递增到 ''`f`''：


    ```

    char c = ''e'';

    c++; // c 将从 ''e'' 递增到 ''f''。

    ```


    递增和递减运算符可以以**前缀**或**后缀**的方式使用。如果将运算符放在其操作的变量***之前***（***前缀***模式），则对该变量的递增或递减操作会在该语句通过该变量进行任何赋值***之前***执行。例如，考虑以下使用前缀递增（`++`）运算符的代码片段。假设
    `a` 和 `b` 之前已在程序中声明为 `int` 变量：


    ```

    a = 1;

    b = ++a;

    ```


    执行完上述代码行后，变量 `a` 的值将为 2，变量 `b` 的值也将为 2。这是因为在第二行代码中，变量 `a` 的递增（从 1 到 2）发生在将 `a`
    的值赋给变量 `b`***之前***。因此，单行代码


    ```

    b = ++a;

    ```


    在逻辑上等价于以下***两行***代码：


    ```

    a = a + 1;  // 先递增 a 的值 ...

    b = a;      // ... 然后使用其值。

    ```


    另一方面，如果将递增/递减运算符放在其操作的变量***之后***（***后缀***模式），则递增或递减操作会在该语句通过该变量进行任何赋值***之后***，使用该变量的***原始***值。让我们看一个相同的代码片段，但递增运算符以***后缀***方式编写：


    ```

    a = 1;

    b = a++;

    ```


    执行完上述代码行后，变量 `b` 的值将为 1，而变量 `a` 的值将为 2。这是因为在第二行代码中，变量 `a` 的递增（从 1 到 2）发生在将 `a`
    的值赋给变量 `b`***之后***。因此，单行代码


    ```

    b = a++;

    ```


    在逻辑上等价于以下***两行***代码：


    ```

    b = a;      // 先使用 a 的值 ...

    a = a + 1;  // ... 然后递增其值。

    ```


    这是一个稍微复杂一点的例子；请阅读附带的注释，以确保您能理解 `x` 最终如何被赋值为 10：


    ```

    int y = 2;

    int z = 4;

    int x = y++ * ++z;  // x 将被赋值为 10，因为 z 会在其值用于乘法表达式

    // 之前从 4 递增到 5，而 y 会保持为 2，直到其值用于乘法表达式之后。

    ```


    稍后您会看到，递增和递减运算符通常与循环结合使用。


    ### 关系运算符和逻辑运算符


    **逻辑表达式**以指定的方式比较两个（简单或复杂）表达式 *exp1* 和 *exp2*，结果为 `boolean` 类型的值 `true` 或 `false`。


    为了创建逻辑表达式，Java 提供了表 2-3 中所示的**关系运算符**。


    表 2-3


    Java 关系运算符


    | 运算符 | 描述 |

    | --- | --- |

    | *exp1* `==` *exp2* | 如果 *exp1* 等于 *exp2*，则为 `true`（注意使用***双***等号来测试相等性） |

    | *exp1* `>` *exp2* | 如果 *exp1* 大于 *exp2*，则为 `true` |

    | *exp1* `>=` *exp2* | 如果 *exp1* 大于或等于 *exp2*，则为 `true` |

    | *exp1* `<` *exp2* | 如果 *exp1* 小于 *exp2*，则为 `true` |

    | *exp1* `<=` *exp2* | 如果 *exp1* 小于或等于 *exp2*，则为 `true` |

    | *exp1* `!=` *exp2* | 如果 *exp1* 不等于 *exp2*，则为 `true`（`!` 读作“非”） |


    除了关系运算符之外，Java 还提供了**逻辑运算符**，可用于组合/修改逻辑表达式。最常用的逻辑运算符列于表 2-4 中。


    表 2-4


    Java 逻辑运算符


    | 运算符 | 描述 |

    | --- | --- |

    | *exp1* `&&` *exp2* | 逻辑“与”；仅当 *exp1 和 exp2 都为真*时，复合表达式才为真。 |

    | *exp1* `&#124;&#124;` *exp2* | 逻辑“或”；如果 *exp1 或 exp2* 中有一个为真，则复合表达式为真。 |

    | `!`*exp* | 逻辑“非”；如果 *exp* 为假则为 `true`，如果 *exp* 为真则为 `false`。 |


    以下是一个使用逻辑“与”运算符来编写复合逻辑表达式“如果 x 大于 2.0 且 y 不等于 4.0”的示例：


    ```

    if ((x > 2.0) && (y != 4.0)) { ... }

    ```


    逻辑表达式最常见的是与流程控制结构一起使用，这将在本章后面讨论。

    '
- fmt: '### Evaluating Expressions and Operator Precedence


    As mentioned earlier in the chapter, expressions of arbitrary complexity can be
    built up by layering nested parentheses—for example, `(((8 * (y + z)) + y) * x)`.
    The compiler generally evaluates such expressions from the innermost to outermost
    parentheses, left to right. Assuming that `x`, `y`, and `z` are declared and initialized
    as shown here:


    ```

    int x = 1;

    int y = 2;

    int z = 3;

    ```


    then the expression on the right-hand side of the following assignment statement:


    ```

    int answer = ((8 * (y + z)) + y) * x;

    ```


    would be evaluated piece by piece as follows:


    ```

    ((8 * (y + z)) + y) * x

    ((8 * 5) + y) * x

    (40 + y) * x

    42 * x

    ```


    In the absence of parentheses, certain operators take precedence over others in
    terms of when they will be applied in evaluating an expression. For example, multiplication
    or division is performed before addition or subtraction. Operator precedence can
    be explicitly altered through the use of parentheses; operations performed inside
    parentheses take precedence over operations outside of parentheses. Consider the
    following code snippet:


    ```

    int j = 2 + 3 * 4;     // j will be assigned the value 14

    int k = (2 + 3) * 4;   // k will be assigned the value 20

    ```


    On the first line of code, which uses no parentheses, the multiplication operation
    takes precedence over the addition operation, and so the overall expression evaluates
    to the value `2 + 12 = 14`; it’s as if we’ve explicitly written `2 + (3 * 4)`
    without having to do so.


    On the second line of code, parentheses are explicitly placed around the operation
    `2 + 3` so that the addition operation will be performed first, and the resultant
    sum will then be multiplied by `4` for an overall expression value of `5 * 4 =
    20`.


    Returning to an earlier example:


    ```

    if ((x > 2.0) && (y != 4.0)) { ... }

    ```


    note that the `>` and `!=` operators take precedence over the `&&` operator, such
    that we could eliminate the nested parentheses as follows:


    ```

    if (x > 2.0 && y != 4.0) { ... }

    ```


    However, the extra parentheses certainly don’t hurt, and in fact it can be argued
    that they make the expression’s intention clearer.


    ### The Type of an Expression


    The **type of an expression** is the Java type of the value to which the expression
    ultimately evaluates. For example, given the code snippet:


    ```

    double x = 3.0;

    double y = 2.0;

    if ((x > 2.0) && (y != 4.0)) { ... }

    ```


    the expression `(x > 2.0) && (y != 4.0)` evaluates to `true`, and hence the expression
    `(x > 2.0) && (y != 4.0)` is said to be a `boolean`-type expression. However,
    in the following code snippet:


    ```

    int x = 1;

    int y = 2;

    int z = 3;

    int answer = ((8 * (y + z)) + y) * x;

    ```


    the expression `((8 * (y + z)) + y) * x` evaluates to `42`, and hence the expression
    `((8 * (y + z)) + y) * x` is said to be an `int`(eger)-type expression.


    ## Automatic Type Conversions and Explicit Casting


    Java supports **automatic type conversion**. This means that if we try to assign
    a value to a variable:


    ```

    // Pseudocode.

    x = expression;

    ```


    and the expression on the **right-hand side** of the assignment statement evaluates
    to a **different** type than the type with which the variable on the **left-hand
    side** of the assignment statement was declared, Java will automatically convert
    the value of the right-hand expression to match the type of `x`, but **only if
    precision won’t be lost in doing so**. This is best understood by looking at an
    example:


    ```

    int x;

    double y;

    y = 2.7;

    x = y;  // We''re trying to assign a double value to an int variable.

    ```


    In the preceding code snippet, we’re attempting to assign the `double` value of
    `y`, `2.7`, to `x`, which is declared to be an `int`. If this assignment were
    to take place, the fractional part of `y` would be truncated, and `x` would wind
    up with an integer value of `2`. This represents a loss in precision, also known
    as a **narrowing conversion**.


    A C or C++ compiler will permit this assignment, silently truncating the value.
    Rather than assuming that this is what we intend to do, however, the Java compiler
    will generate an error on the last line of code as follows:


    ```

    possible loss of precision

    found: double

    required: int

    ```


    In order to signal to the Java compiler that we’re willing to accept the loss
    of precision, we must perform an **explicit cast**—that is, we must precede the
    expression whose value is to be converted with the target type, enclosed in parentheses:


    ```

    // Pseudocode.

    x = (type) expression;

    ```


    In other words, we’d have to rewrite the last line of the preceding example as
    follows in order for the Java compiler to permit the assignment of a more precise
    floating-point value to a less precise integer variable:


    ```

    int x;

    double y;

    y = 2.7;

    x = (int) y;  // This will compile now, because we have explicitly

    // informed the compiler that we WANT a

    // narrowing conversion to occur.

    ```


    Of course, if we were to **reverse** the direction of the assignment, assigning
    the `int` value of variable `x` to the `double` variable `y`, the Java compiler
    would have no problem with the assignment:


    ```

    int x;

    double y;

    x = 2;

    y = x;    // Assign a less precise int value to a double variable that is capable
    of

    // handling more precision – this is fine as is.

    ```


    In this particular case, we’re assigning a value of **less** precision—`2`—to
    a variable capable of **more** precision; `y` will wind up with the value of `2.0`.
    This is known as a **widening conversion**. Such conversions are performed automatically
    in Java and need not be explicitly cast.


    Note that there’s an idiosyncrasy with regard to assigning constant values to
    variables of type `float` in Java; the following statement won’t compile:


    ```

    float y = 3.5;   // This won''t compile!

    ```


    because a numeric constant value with a fractional component like `3.5` is automatically
    treated by Java as a more precise `double` value and so the compiler will view
    this as a narrowing conversion and will refuse to carry out the assignment. To
    **force** such an assignment, we must either explicitly cast the floating-point
    constant into a `float`:


    ```

    float y = (float) 3.5;   // This will compile, thanks to the cast.

    ```


    or, alternatively, we can force the constant on the right-hand side of the assignment
    statement to be viewed by the Java compiler as a `float` by using the suffix `F`
    or `f`, as shown here:


    ```

    float y = 3.5F;   // OK, because we''re indicating that the constant is to be

    // treated as a float, not as a double.

    ```


    We’ll typically use `double`s instead of `float`s whenever we need to declare
    floating-point variables in our SRS application in Part 3 of the book, just to
    avoid these hassles of type conversion.


    Expressions of type `char` can be converted to any other numeric type, as illustrated
    in this next example:


    ```

    char c = ''a'';

    // Assigning a char value to a numeric variable transfers its

    // ASCII numeric equivalent value.

    int x = c;

    double z = c;

    System.out.println(x);

    System.out.println(z);

    ```


    Here’s the output:


    ```

    97.0

    ```


    The only Java type that can’t be cast, either implicitly or explicitly, into another
    type is the `boolean` type.


    You’ll see other applications of casting, involving objects, later in the book.


    ## Loops and Other Flow Control Structures


    Very rarely will a program execute sequentially, line by line, from start to finish.
    Instead, the path of execution through a program’s logic will often be **conditional**:


    - It may be necessary to have the program execute a certain block of code if some
    condition is met or a **different** block of code if the condition **isn’t** met.

    - A program may have to repeatedly execute a particular block of code a fixed
    number of times or until a particular result is attained.


    The Java language provides a number of different types of loops and other flow
    control structures to take care of these situations.'
