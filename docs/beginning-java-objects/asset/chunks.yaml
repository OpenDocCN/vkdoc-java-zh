- fmt: "# Instantiation\n\nA class definition may be thought of as a template for\
    \ creating software objects—a “pattern” used to\n\n- Allocate a prescribed amount\
    \ of memory within the JVM to house the ***attributes*** of a new object\n- Associate\
    \ a certain set of ***behaviors*** with that object\n\nThe term **instantiation**\
    \ is used to refer to the process by which an object is created in memory at run\
    \ time based upon a class definition. From a single class definition—for example,\
    \ `Student`—we can create many objects with identical data structures and behaviors,\
    \ in the same way that we use a single cookie cutter to make many cookies all\
    \ of the same shape. Another way to refer to an object, then, is as an **instance**\
    \ of a particular class—for example, “A `Student` object is an instance of the\
    \ `Student` class.” (We’ll talk about the actual process of instantiating objects\
    \ as it occurs in Java in a bit more detail later in this chapter.)\n\nClasses\
    \ may thus be differentiated from objects as follows:\n\n![](images/78624_3_En_3_Chapter/78624_3_En_3_Fig5_HTML.jpg)\n\
    \nA table has columns of attribute name, data type, and value with 9 rows of data\
    \ underneath. The rows include name, student I D, birth date, address, and g p\
    \ a, among others. The text at the top reads, the student class defines a template.\n\
    \nFigure 3-5\n\nA class prescribes a template for instantiating objects…\n\n-\
    \ A ***class*** defines the features—attributes, methods—that every object belonging\
    \ to the class must possess; a class can thus be thought of as serving as an ***object\
    \ template***, as illustrated in Figure [3-5](#78624_3_En_3_Chapter.xhtml#Fig5).\n\
    \n![](images/78624_3_En_3_Chapter/78624_3_En_3_Fig6_HTML.jpg)\n\nA table has columns\
    \ of attribute name, data type, and value with 9 rows of data underneath. The\
    \ rows include name, student I D, birth date, address, and g p a, among others.\
    \ The text at the top reads, and each student object fills in its own unique attribute\
    \ values.\n\nFigure 3-6\n\n… and an object then fills in its own unique attribute\
    \ values\n\n- An ***object***, on the other hand, is a unique instance of a ***filled-in\
    \ template*** for which attribute values have been provided and upon which methods\
    \ may be performed, as illustrated in Figure [3-6](#78624_3_En_3_Chapter.xhtml#Fig6).\n\
    \n# Encapsulation\n\n**Encapsulation** is a formal term referring to the mechanism\
    \ that bundles together the state and behavior of an object into a single logical\
    \ unit. Everything that we need to know about a given student is, in theory, contained\
    \ within the boundaries of a `Student` object, either\n\n- Directly, as an attribute\
    \ of that object\n- Indirectly, as a method that can answer a question or make\
    \ a determination about the object’s state\n\nEncapsulation isn’t unique to OO\
    \ languages, but in some senses it is perfected by them. If you’re familiar with\
    \ C, you know that a C `struct`(ure) encapsulates data\n\n```\nstruct employee\
    \ {\n    char name[30];\n    int age;\n}\n```\n\nand a C function encapsulates\
    \ logic—data is passed in and operated on, and an answer is optionally returned:\n\
    \n```\nfloat average(float x, float y) {\n    return (x + y)/2.0;\n}\n```\n\n\
    But only with OO programming languages is the notion of encapsulating data and\
    \ behavior in a single class construct, to represent an abstraction of a real-world\
    \ entity, truly embraced.\n\n# User-Defined Types and Reference Variables\n\n\
    In a non-OO programming language such as C, the statement\n\n```\nint x;\n```\n\
    \nis a **declaration** that variable `x` is an `int`(eger), one of several primitive\
    \ data types defined to be part of the C language. What does this ***really***\
    \ mean? It means that\n\n- `x` is a ***symbolic name*** that we’ve invented to\
    \ refer to an `int`(eger) value that is stored somewhere in the computer’s memory.\
    \ We don’t care where this value is stored, however, because\n- Whenever we want\
    \ to operate on this particular integer value in our program, we refer to it via\
    \ its symbolic name `x`, for example:\n\n    ```\n    if (x > 17) x = x + 5;\n\
    \    ```\n\n- Furthermore, the “thing” that we’ve named `x` understands how to\
    \ respond to a number of different operations, such as addition (`+`), subtraction\
    \ (`–`), multiplication (`*`), division (`/`), logical comparisons (`>`, `<`,\
    \ `=`), and so on, as defined by the `int` type.\n\nIn an OO language like Java,\
    \ we can define a class such as `Student` and then declare a variable to be of\
    \ type `Student`, as follows:\n\n```\nStudent y;\n```\n\nWhat does this ***really***\
    \ mean? It means that\n\n- `y` is a symbolic name that we’ve invented to refer\
    \ to a `Student` object (i.e., an instance of the `Student` class) that is stored\
    \ somewhere in the computer’s memory. We don’t care where this object is stored,\
    \ however, because\n- Whenever we want to operate on this particular object in\
    \ our program, we refer to it via its symbolic name `y`, for example:\n\n    ```\n\
    \    if (y.isOnAcademicProbation()) {\n        System.out.println (\"Uh oh ...\"\
    );\n    }\n    ```\n\n- Furthermore, the “thing” that we’ve named `y` understands\
    \ how to respond to a number of different service requests—how to register for\
    \ a course, drop a course, and so on—that have been defined by the `Student` class.\n\
    \nNote the parallels between `y` as a `Student` and `x` as an `int` in the preceding\
    \ examples. Just as `int` is said to be a ***predefined type*** in Java (and other\
    \ languages), the `Student` class is said to be a **user-defined type**. And,\
    \ because `y` in the preceding example is a variable that ***refers to*** an instance\
    \ (object) of class `Student`, `y` is known as a **reference variable**.\n\nIn\
    \ contrast, variables declared to be one of the eight primitive types in Java—`int`,\
    \ `double`, `float`, `byte`, `short`, `long`, `char`, and `boolean`—are ***not***\
    \ reference variables, because in Java, primitive types are ***not*** **reference\
    \ types**; that is, they do not refer to ***objects***:\n\n```\n// x is NOT a\
    \ reference variable, because in Java,\n// an int is NOT an object.\nint x;\n\
    // yesNo is NOT a reference variable, because in Java,\n// a boolean is NOT an\
    \ object.\nboolean yesNo;\n// etc.\n```\n\nVarious OO languages differ in their\
    \ treatment of simple types. In some OO languages (e.g., Smalltalk), ***all***\
    \ types, including “simple” types such as `int` and `char`, are reference types,\
    \ whereas in other languages (e.g., Java and C++), they are not.\n\nThe fact that\
    \ Java contains a mix of reference types and nonreference types affects the way\
    \ that we manipulate variables under certain circumstances, such as when we’re\
    \ placing primitive values into **collections**, a subject that we’ll explore\
    \ in Chapter [6](#78624_3_En_6_Chapter.xhtml).\n\n## Naming Conventions for Reference\
    \ Variables\n\nNames for reference variables follow the same convention as method\
    \ and attribute names—that is, they use camel casing. Some sample reference variable\
    \ declarations are as follows:\n\n```\nCourse prerequisiteOfThisCourse;\nProfessor\
    \ facultyAdvisor;\nStudent student;\n```\n\nThe last of these, `Student student;`,\
    \ might take some getting used to if you are new to case-sensitive programming\
    \ languages. However, it is considered good programming practice to pattern reference\
    \ variable names after the name of the class to which they belong if there is\
    \ only one such variable within scope in a particular body of code. Because the\
    \ class name starts with an uppercase “S” and the reference variable name starts\
    \ with a lowercase “s,” `Student` and `student` are ***completely different symbols***\
    \ as far as the compiler is concerned."
