    ### 私有特性与继承


    如前所述，继承是一种“全有或全无”的命题。也就是说，如果类 Y 被声明为类 X 的子类：


    ```

    public class Y extends X { ... }

    ```


    那么 Y 不能挑选继承 X 的哪些特性。特别是，虽然 X 声明的所有属性将成为所有 Y 类型对象“骨骼结构”的固有部分，但超类 X 的某些属性可能无法在子类
    Y 中通过名称***直接引用***，这取决于属性在超类中被赋予的访问权限。


    考虑以下代码：


    ```

    public class Person {

    访问权限修饰符 int age;

    // 其他细节省略。

    }

    ```


    你在第 4 章学习了两种访问权限：`public` 和 `private`。事实证明，Java 中实际上有***三种***不同的显式访问权限修饰符关键字。也就是说，*<访问权限修饰符>*
    可以是以下之一：


    *   `private`


    *   `public`


    *   `protected`（一种仅在超类/子类关系中相关的访问权限修饰符，你很快就会看到）


    如果完全省略访问权限修饰符，则特性默认具有所谓的**包可见性**。我们将在第 13 章讨论这个概念。


    假设我们按如下方式从 `Person` 派生 `Student` 类：


    ```

    public class Student extends Person {

    // 细节省略。

    // 我们声明一个操作 age 属性的方法。

    public boolean isOver65( ) {

    if (age > 65) {  // age 在 Person 中被声明为属性，并被 Student 继承

    return true;

    } else {

    return false;

    }

    // 其他细节省略。

    }

    ```


    当我们尝试编译这个 `Student` 类时会发生什么？这个问题的答案取决于 `age` 属性在 `Person` 类中声明时被授予了什么访问权限。


    如果 `age` 在 `Person` 中被声明为 `private`，就像大多数属性通常那样：


    ```

    public class Person {

    private int age;

    // 等等。

    }

    ```


    那么我们在 `Student` 类中以下代码中**高亮**的那行代码上会遇到编译错误：


    ```

    public class Student extends Person {

    // 细节省略。

    public boolean isOver65( ) {

    if (age > 65) {  // 这行无法编译！

    return true;

    }  else {

    return false;

    }

    // 其他细节省略。

    }

    ```


    错误信息将是：


    ```

    cannot find symbol

    symbol:    variable age

    location:  class Student

    if (age > 65) {

    ^

    ```


    这是为什么？由于 `age` 属性在 `Person` 中被声明为 `private`，符号 `age` 不会被继承，因此它在 `Student` 类中不在作用域内。然而，当
    `Student` 对象被实例化时，为其分配的内存确实允许存储学生的年龄，因为如前所述，它是 `Person` “骨骼结构”的一部分，而 `Student`
    通过继承***是一个*** `Person`。


    我们如何绕过这个障碍？事实证明，在 Java 中有三种选择。


    ***选项 #1***：我们可以将 `age` 的访问权限改为 `public`，在 `Person` 中：


    ```

    public class Person {

    public int age;

    // 等等。

    }

    ```


    从而使其被继承，并可在 `Student` 子类中通过名称直接访问。之前在我们的 `Student` 子类中导致编译器错误的那行代码，即：


    ```

    if (age > 65) {

    ```


    现在将无错误地编译。然而，这种方法的缺点是，通过将 `age` 属性设为 `public`，我们也将允许***客户端代码***自由访问 `age` 属性：


    ```

