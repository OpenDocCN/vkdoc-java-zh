    // 我们通过拼接课程编号和课程节号（用连字符分隔）来构成键。

    String key = s.getRepresentedCourse().getCourseNo() +

    " - " + s.getSectionNo();

    sectionsOffered.put(key, s);

    // 将 ScheduleOfClasses 与 Section 进行双向链接。

    s.setOfferedIn(this);

    }

    ```


