  trans: "\n### 准备时序图\n\n要为场景 #1 准备时序图，我们需要执行以下步骤：\n\n*   我们绘制垂直虚线，每个参与场景的对象或参与者对应一条；这些线被称为对象的**生命线**。请注意，对象/参与者可以在图中从左到右以任意顺序列出，尽管通常的做法是将外部用户/参与者放在最左侧。\n\
    \n*   在每条生命线的顶部，根据情况，我们放置一个**实例图标**——即一个包含对象参与者（可选）名称和类的方框——或者一个火柴人符号来表示参与者。（关于如何构成实例图标的规则，请参考第\
    \ 10 章中关于创建对象图的章节。）\n\n*   然后，对于场景中提到的每个事件，我们将其对应的消息反映为一条从发送者生命线指向接收者生命线的水平***实线***箭头。\n\
    \n*   来自消息的响应（换句话说，方法的返回值，或者对于声明为 `void` 返回类型的方法，简单的 `return;` 语句）显示为从原始消息的**接收者**生命线***返回***到消息**发送者**生命线的水平***虚线***箭头。\n\
    \n*   消息箭头在图中按时间顺序从上到下排列。\n\n场景 #1 的完整时序图如图 11-8 所示。\n\n![](img/78624_3_En_11_Fig8_HTML.jpg)\n\
    \n时序图说明了以下步骤：登录、从数据库检索对象、请求显示课程表、课程表已显示、请求座位、验证学习计划、学习计划已验证、检查先修课程、已确认、确认座位可用性、添加到课程负载并显示确认座位消息。\n\
    \n图 11-8\n\n场景 #1 的时序图\n\n让我们逐步浏览该图，以确保您理解图中反映的所有活动：\n\n![](img/78624_3_En_11_Fig9_HTML.png)\n\
    \n时序图说明了以下步骤：学生、登录、从数据库检索对象。\n\n图 11-9\n\n当 Fred 登录时，一个 `Student` 对象被实例化。\n\n\
    1.  当 Fred 登录系统时，他作为对象的“另一个自我”被激活（见图 11-9）。\n\n可以推测，代表每个 `Student` 的信息——换句话说，`Student`\
    \ 对象的属性值——在离线状态下保存在持久存储中（例如 DBMS 或文件），直到学生登录时，这些信息才被用来在内存中实例化一个 `Student` 对象，以镜像刚刚登录的用户。我们将在第\
    \ 15 章讨论如何从持久存储中重构对象。\n\n![](img/78624_3_En_11_Fig10_HTML.png)\n\n图表说明了请求显示课程表以及课程表已显示。\n\
    \n图 11-10\n\n按要求，显示了课程表\n\n1.  当用户/参与者 Fred 请求显示学期课程表时，我们反映消息“请求显示课程表”被发送给一个匿名的\
    \ `ScheduleOfClasses` 对象。来自 `ScheduleOfClasses` 对象的虚线箭头响应表明课程表正在通过 GUI 显示给用户（严格来说）（见图\
    \ 11-10）。\n\n我选择用*斜体*而不是常规字体来标记响应箭头，这与官方 UML 符号略有不同。\n\n1.  图中显示的下一条消息是从用户到 `Section`\
    \ 对象的消息，请求在该课程中获得一个座位。\n\n这条消息显示为源自用户。实际上，它源自 SRS GUI 的一个 GUI 组件对象，但在分析工作的这个阶段，我们不必担心这些实现细节。\n\
    \n请注意，这条消息没有立即得到回复；这是因为 `Section` 对象在能够授予该学生座位之前，需要咨询其他几个对象，即：\n\n![](img/78624_3_En_11_Fig11_HTML.png)\n\
    \n图表说明了确认座位可用性。\n\n图 11-11\n\n所请求教学班的可用性已确认\n\n1.  假设这两个其他对象都给出了肯定的响应（根据此场景的编写方式，它们理应如此），那么\
    \ `Section` 对象随后会执行一些内部处理，以验证该教学班确实有 Fred 的位置。我们将单个对象内的内部处理反映为一条循环回到其起始生命线的箭头，如图\
    \ 11-11 所示。\n\n*   `Section` 向代表 Fred 学习计划的对象发送一条消息，要求该对象确认 Fred 所请求的课程是否是其完成学位课程所需的课程之一。\n\
    \n*   接下来，`Section` 向代表 Fred 成绩单的对象发送一条消息，要求该对象确认该学生是否已令人满意地完成了先修课程——例如 COMP 001。\n\
    \n当然，如果我们要反映时序图中每个对象执行的***所有***内部处理，那么图中将***充斥***着这样的循环！我们选择显示这个特定循环的唯一原因是因为它在场景\
    \ #1 中被明确地作为一个步骤提出来；如果我们从图中省略它，可能会显得我们意外地忽略了这一步。\n\n1.  最后，在所有检查都通过后，`Section`\
    \ 对象还有两个职责：\n    *   首先，它向“Fred”`Student` 对象发送一条新消息，请求 `Student` 对象将此 `Section`\
    \ 添加到 Fred 的课程负载中。\n\n*   接下来，`Section` 对象向用户/参与者 Fred 发送一个响应（通过 GUI），确认他在该教学班中的座位。这是对用户在该场景开始时发送的原始“请求座位”消息的响应！所有为完成该请求所必需的额外“幕后”处理——涉及\
    \ `Section` 对象与 `PlanOfStudy` 对象、`Transcript` 对象和 `Student` 对象的协作——对用户来说是透明的。正如我们在本章前面看到的，Fred\
    \ 只是从 SRS GUI 上显示的课程表中选择了某个教学班，点击了“添加”按钮，片刻之后，他的屏幕上就出现了一条确认消息。\n\n当然，与所有建模一样，这个特定的时序图不一定是描绘所选场景的最佳或唯一方式。而且，就此而言，我们可以讨论一个场景相对于另一个场景的相对优点。重要的是要记住，准备时序图只是达到目的的一种手段：即发现待构建系统的动态方面——也就是方法——以补充我们对系统的静态/结构知识。回想一下，本书第\
    \ 2 部分的***最终***目标是生成一个面向对象的蓝图，我们可以将其作为在第 3 部分中编码 SRS 模型层的基础。但是，正如已经指出的，我们在第 10\
    \ 章中创建的类图有一个明显的缺陷：其所有类的操作部分都是空的。幸运的是，时序图为我们提供了缺失的信息，我们接下来将讨论这一点。\n"
- fmt: '# Using Sequence Diagrams to Determine Methods


    Now that we’ve prepared a sequence diagram, how do we put the information that
    it contains to good use? In particular, how do we “harvest” information from such
    diagrams concerning the methods that the various classes need to implement?


    The process is actually quite simple. We step through the diagram, one lifeline
    at a time, and study all arrows pointing to that line:


    - Arrows representing a new request being made of an object—solid-line arrows—signal
    methods that the receiving object must be able to perform. For example, we see
    a solid-line arrow labeled “check prerequisite” pointing to the lifeline representing
    a `Transcript` object. This tells us that the `Transcript` class needs to define
    a method that will allow some client object to pass in a particular course object
    reference and receive back a response indicating whether or not the `Transcript`
    contains evidence that the course was successfully completed.


    - We’re free to name our methods in whatever intuitive way makes the most sense,
    consistent with the method naming conventions discussed in Chapter [4](#78624_3_En_4_Chapter.xhtml).
    We’re using the method in this particular scenario to check completion of a prerequisite
    course, so we could declare the method as follows:


    ```

    boolean checkPrerequisite(Course c)

    ```


    But this name is unnecessarily restrictive; what we’re **really** doing with this
    method is checking the successful completion of some `Course c`. The fact that
    it happens to be a prerequisite of some other course is immaterial to how this
    method will perform. So by naming the method


    ```

    boolean verifyCompletion(Course c)

    ```


    instead, we’ll be able to use it anywhere in our application that we need to verify
    successful completion of a course—for example, when we check whether a student
    has met all of the course requirements necessary to graduate. (Of course, we could
    have still used the method in this fashion even if it had been named `checkPrerequisite`,
    but then our code would be less accurately self-documenting.)


    - Arrows representing responses from an operation that some other object has performed—dashed-line
    arrows—don’t get modeled as methods/operations. These do, however, hint at the
    return type of the method from which this response is being issued. For example,
    since the response to the “verify plan of study” message is “plan of study verified,”
    this would imply that the method is returning a `boolean` result; hence, we’d
    declare a method header as follows:


    - Loops also represent method calls, performed by an object on itself; these may
    either represent private “housekeeping” methods or public methods that other client
    objects may avail themselves of.


    ```

    boolean verifyPlan(Course c)

    ```


    Table [11-2](#78624_3_En_11_Chapter.xhtml#Tab2) summarizes all of the arrows reflected
    by the sequence diagram for Scenario #1 from a few pages back.


    **Table 11-2** Determining the Methods Implied by Scenario #1


    | Arrow Labeled | Drawn Pointing to Class `X` | A New Request or a Response to
    a Previous Request? | Method to be Added to Class `X` |

    | --- | --- | --- | --- |

    | log on | `Student` | Request | (A method to reconstitute this object from persistent
    storage, such as a file or database; perhaps a special form of constructor—we’ll
    discuss this in Part 3 of the book) |

    | request display of schedule | `ScheduleOfClasses` | Request | `void Display()`
    |

    | *schedule displayed* | `Student` | *Response* | *N/A* |

    | request seat | `Section` | Request | `boolean enroll(Student s)` |

    | verify plan of study | `PlanOfStudy` | Request | `boolean verifyPlan(Course
    c)` |

    | *plan of study verified* | `Section` | *Response* | *N/A* |

    | check prerequisite | `Transcript` | Request | `boolean verifyCompletion(Course
    c)` |

    | *prerequisite confirmed* | `Section` | *Response* | *N/A* |

    | confirm seat availability | `Section` | Request | `boolean confirmSeatAvailability()`
    (perhaps a private housekeeping method) |

    | add to course load | `Student` | Request | `void addSection(Section s)` |

    | *display message confirming seat* | *(actor/user)* | *Response* | *N/A (will
    eventually involve calling upon some method of a user interface object—we’ll worry
    about this in Part 3 of the book)* |


    Thus we have identified six new “standard” methods plus one constructor that will
    need to be added to our class diagram, which we’ll do shortly.


    Repeating this process of sequence diagram production and analysis for various
    other use case/scenario combinations will flush out most of the methods that we’ll
    need to implement for the SRS. Despite our best efforts, however, a few methods
    may not surface until we’ve begun to program our classes—this is to be expected.


    ## Communication Diagrams


    The UML notation introduced a second type of interaction diagram, called a **communication
    diagram**, as an alternative to sequence diagrams. Both types of diagram present
    essentially the same information, but portray it in a different manner.


    In a communication diagram, we eliminate the lifelines used to portray objects
    and actors. Rather, we lay out instance icons representing objects and stick figures
    representing actors in whatever configuration is most visually appealing. We then
    use lines and arrows to represent the flow of messages and responses back and
    forth between these objects/actors. Because we lose the top-to-bottom chronological
    sense of message flow that we had with the sequence diagrams, we compensate by
    numbering the arrows in the order that they would occur during execution of a
    particular scenario.


    The communication diagram in Figure [11-12](#78624_3_En_11_Chapter.xhtml#Fig12)
    is equivalent to the sequence diagram that we produced for Scenario #1.


    ![](images/78624_3_En_11_Chapter/78624_3_En_11_Fig12_HTML.jpg)


    A state diagram illustrates the relationships between several elements, including
    the student, plan of study, C M P 01 section, schedule of classes, and transcript.
    These elements are interconnected and represent different states and transitions
    within the student''s academic journey.


    **Figure 11-12** Communication diagram for Scenario #1


    Again, from Fred’s vantage point, he observes only a few of these actions, as
    shown in Figure [11-13](#78624_3_En_11_Chapter.xhtml#Fig13).


    ![](images/78624_3_En_11_Chapter/78624_3_En_11_Fig13_HTML.jpg)


    A schematic illustration depicts the process of a student logging on, requesting
    to display their schedule, requesting a seat, receiving a message confirming the
    seat, and viewing the displayed schedule.


    **Figure 11-13** Fred sees only a small subset of the SRS collaborations


    Because sequence and communication diagrams reflect essentially the same information,
    many object modeling software tools automatically enable us to produce one diagram
    from the other with the push of a button.'
