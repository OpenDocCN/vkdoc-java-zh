- fmt: '# Information “Flows” Along an Association “Pipeline”


    Beginning modelers also tend to make the mistake of introducing undesired redundancy
    when it comes to attributes in general. In the association portrayed in Figure
    [10-43](#78624_3_En_10_Chapter.xhtml#Fig43), we see that the `name` attribute
    of the `Professor` class is inappropriately mirrored by the `chairmanName` attribute
    of the `Department` class.


    ![](images/78624_3_En_10_Chapter/78624_3_En_10_Fig43_HTML.jpg)


    An illustration represents 2 rectangular blocks labeled professor and department.
    It indicates the attributes of each. A text at the bottom explains the name of
    the professor is appropriately encapsulated in the professor block, which is inappropriately
    duplicated as the chairman''s name in the department.


    Figure 10-43


    The `name` and `chairmanName` attributes are redundant


    While it’s true that a `Department` object needs to know the name of the `Professor`
    object that chairs that `Department`, it’s inappropriate to explicitly create
    a `chairmanName` attribute to reflect this information. Because the `Department`
    object maintains a reference to its associated `Professor` object as an attribute,
    the `Department` has ready access to this information any time it needs it, simply
    by invoking the `Professor` object’s `getName` method. This piece of information
    is rightfully encapsulated in the `Professor` class, where it belongs, and shouldn’t
    be duplicated anywhere else. A corrected version of the preceding diagram is shown
    in Figure [10-44](#78624_3_En_10_Chapter.xhtml#Fig44), with the redundancy eliminated.


    ![](images/78624_3_En_10_Chapter/78624_3_En_10_Fig44_HTML.jpg)


    An illustration represents 2 blocks labeled professor and department. The attributes
    of the professor are name, title, and s s n, and attributes for the department
    are, department name and number.


    Figure 10-44


    The redundancy of Figure [10-43](#78624_3_En_10_Chapter.xhtml#Fig43) has been
    eliminated


    In essence, whenever you see an association/aggregation line in a diagram, you
    can think of this as a conceptual “pipeline” across which information can “flow”
    between related objects as needed.


    At the analysis stage, we don’t typically worry about the accessibility (public,
    private) of attributes or about the directionality of associations—we usually
    assume that the values of all of the attributes reflected in a diagram are obtainable
    by calling the appropriate “get” methods on an object.


    Sometimes, this “pipeline” extends across ***multiple*** objects, as illustrated
    by the next example.


    In Figure [10-45](#78624_3_En_10_Chapter.xhtml#Fig45), we have a diagram involving
    three classes.


    ![](images/78624_3_En_10_Chapter/78624_3_En_10_Fig45_HTML.jpg)


    A block diagram represents the elements of a section at the center along with
    the elements of the course on the left and the elements of the professor on the
    right. It explains the course is offered as a section and the professor teaches
    the section.


    Figure 10-45


    An association “pipeline” between the `Course`, `Section`, and `Professor` classes


    Let’s say that someone wishes to obtain a list of all of the `Professor`s who
    have ever taught the `Course` entitled “Beginning Objects.” Because each `Course`
    object maintains a handle on all of its `Section` objects, past and present, the
    `Course` object representing Beginning Objects can ask each of its `Section` objects
    the name of the `Professor` who previously taught, or is currently teaching, that
    `Section`. The `Section` objects, in turn, each maintain a handle on the `Professor`
    object who taught/teaches the `Section` and can use the `Professor` object’s `getName`
    method to retrieve the name. So information flows along the association “pipeline”
    from the `Professor` objects to their associated `Section` objects and from there
    back to the `Course` object that we started with (see Figure [10-46](#78624_3_En_10_Chapter.xhtml#Fig46)).


    ![](images/78624_3_En_10_Chapter/78624_3_En_10_Fig46_HTML.jpg)


    An illustration represents a number of speech bubbles containing a set of dialogs
    around the key nodes denoting a course object, section object, and professor object.
    It denotes the links to other unrelated sections.


    Figure 10-46


    Association “pipelines” can be quite elaborate!


    You’ll learn a formal, UML-appropriate way to analyze and depict such “object
    conversations” in Chapter [11](#78624_3_En_11_Chapter.xhtml).


    These three classes’ attributes are modeled in the code that follows, highlighting
    all of the association-driven attributes:


    ```

    public class Course {

    // Attributes.

    // Pseudocode.

    private Collection offeredAs;   // a collection of Section object

    // "handles"

    private String courseName;

    private int courseNumber;

    private double creditHourValue;

    // etc.

    }

    public class Section {

    // Attributes.

    private Course represents;   // a "handle" on the related Course

    // object

    private int sectionNo;

    private String dayOfWeek;

    private String timeOfDay;

    private String semester;

    private Professor taughtBy;  // a "handle" on the related Prof. object

    // etc.

    }

    public class Professor {

    // Pseudocode.

    private Collection sectionsTaught; // a collection of Section obj.

    // "handles"

    private String name;

    private String ssn;

    // etc.

    }

    ```


    If we knew that the `Course` class was going to regularly need to know who all
    the `Professors` were that had ever taught the `Course`, we might decide to introduce
    the redundant association “a `Professor` *has taught* a `Course`” into our diagram,
    as illustrated in Figure [10-47](#78624_3_En_10_Chapter.xhtml#Fig47).


    ![](images/78624_3_En_10_Chapter/78624_3_En_10_Fig47_HTML.jpg)


    An illustration represents the elements of course, section, and professor. It
    indicates the interconnection among each unit which explains course is offered
    as a section and the professor teaches the section. The professor has thought
    the course.


    Figure 10-47


    We add redundant associations when objects frequently need a more direct “pipeline”
    for communication


    This has the advantage of improving the speed with which a `Course` object can
    determine who has ever taught it: with the addition of the redundant association
    in Figure [10-47](#78624_3_En_10_Chapter.xhtml#Fig47), `Course` objects can now
    talk ***directly*** to `Professor` objects without using `Section` objects as
    “go-betweens”—but the cost of this performance improvement is that we’ve just
    introduced additional complexity to our application, reflected by the highlighted
    additions to the following code:


    ```

    public class Course {

    // Attributes.

    // Pseudocode.

    private Collection offeredAs;      // a collection of Section object

    // "handles"

    private String courseName;

    private int courseNumber;

    private float creditHourValue;

    // Pseudocode.

    private Collection professors;    // a collection of Professor obj.

    // "handles"

    // etc.

    }

    public class Section {

    // Attributes.

    private Course represents;   // a "handle" on the related Course

    // object

    private int sectionNo;

    private String dayOfWeek;

    private String timeOfDay;

    private String semester;

    private Professor taughtBy;  // a "handle" on the related Prof. object

    // etc.

    }

    public class Professor {

    // Pseudocode.

    private Collection coursesTaught;     // a collection of Course obj.

    // "handles"

    private Collection sectionsTaught;      // a collection of Section obj.

    // "handles"

    private String name;

    private String ssn;

    // etc.

    }

    ```


    By adding the redundant association, we now have extra work to do in terms of
    maintaining referential integrity. That is, if a different `Professor` is assigned
    to teach a particular `Section`, we have two links to update rather than one:
    the link between the `Professor` and the `Section` and the link between the `Professor`
    and the related `Course`.'
