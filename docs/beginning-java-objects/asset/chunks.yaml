- fmt: 'The bottom line is that deciding which associations to include, and which
    to eliminate as derivable from others, is similar to the decision of which web
    pages you might wish to create a bookmark for in your web browser: you bookmark
    those that you visit frequently, and type out the URL longhand, or alternatively
    traverse a chain of links, for those that you only occasionally need to access.
    The same is true for object linkages: the decision of which to implement in code
    depends on which “communication pathways” through the application you’re going
    to want to use most frequently. You’ll get a much better sense of what these communication
    patterns are when we move on to modeling object behaviors in Chapter [11](#78624_3_En_11_Chapter.xhtml).


    ## “Mixing and Matching” Relationship Notations


    It’s possible to intertwine the various relationship types in some rather sophisticated
    ways. To appreciate this fact, let’s study the model in Figure [10-48](#78624_3_En_10_Chapter.xhtml#Fig48)
    to see what it’s telling us.


    ![](images/78624_3_En_10_Chapter/78624_3_En_10_Fig48_HTML.jpg)


    A model diagram represents the student and professor combinedly belonging to a
    class of person, which is associated with a department. The school is comprised
    of the department, and the University is comprised of the school


    Figure 10-48


    A sample UML model


    First of all, we see some familiar uses of aggregation and inheritance:


    *   The use of aggregation in the upper-left corner of the diagram—a two-tier
    aggregation—communicates the facts that a `University` is comprised of one or
    more `School`s and that a `School` is comprised of one or more `Department`s,
    but that any one `Department` is associated with only a single `School` and any
    one `School` is associated with only a single `University`.


    *   The use of inheritance in the lower-right corner of the diagram indicates
    that `Person` is the common base class for both `Student` and `Professor`. Stated
    another way, a `Student` *is a* `Person`, and a `Professor` *is a* `Person`.


    The first “interesting” use of the notation that we observe is that an association
    can be used to relate classes at differing levels in an aggregation, as in the
    use of the *funds R&D (research and development)* association used to relate the
    `University` and `Department` classes. This indicates that the `University` funds
    one or more `Department`s for research and development purposes, but that a given
    `Department` may or may not be funded for R&D.


    Next, we note the use of the *employs* association to relate the `Department`
    and `Person` classes, indicating that a `Department` *employs* one or more `Person`s,
    but that a given `Person` *may work for* only one `Department`, if indeed that
    `Person` works for any `Department` at all.


    Because `Person` is the superclass of both the `Student` and `Professor` subclasses,
    then by virtue of the “is a” relationship, anything we can say about a `Person`
    must also be true of its derived classes. Therefore


    *   **Associations/aggregations that a base class participates in are inherited
    by its derived classes.** (This makes sense, because we now know that associations
    are rendered as reference variable attributes.) Thus, a given `Student` may optionally
    *work for* one `Department`, perhaps as a teaching assistant, and a given `Professor`
    may optionally *work for* one `Department`, because `Student` and `Professor`
    are derived from `Person`.


    *   Also, because we can deduce (via the aggregation relationship) which `School`
    and `University` a given `Department` belongs to, the fact that a `Person` *works
    for* a given `Department` also implies which `School` and `University` the `Person`
    *works for*.


    Finally, we note that an association can be used to relate classes at differing
    levels in an inheritance hierarchy, as in the use of the *mentors* association
    to relate the `Person` and `Professor` classes. Here, we’re stating that a `Professor`
    optionally *mentors* many `Person`s—`Student`s and/or `Professor`s—and conversely
    that a `Person`—either a `Student` or a `Professor`—is mentored by optionally
    many `Professor`s specifically. We label the end of the association line closest
    to the `Professor` class with the role designation “mentor” to emphasize that
    `Professor`s are mentors at the `University`, but that `Person`s in general (i.e.,
    `Student`s) are not.


    What if we instead wanted to reflect the fact that **both** `Student`s and `Professor`s
    may serve in the capacity of a mentor? We could substitute a reflexive association
    on the `Person` class, as shown in Figure [10-49](#78624_3_En_10_Chapter.xhtml#Fig49),
    which, by virtue of inheritance, actually implies four relationship possibilities:


    ![](images/78624_3_En_10_Chapter/78624_3_En_10_Fig49_HTML.png)


    A block diagram represents the student and professor combinedly pointing an arrow
    toward the person. The block labeled person indicates mentor.


    Figure 10-49


    Various possible “mentorship” associations are implied


    *   A `Professor` mentoring a `Student`


    *   A `Professor` mentoring another `Professor`


    *   A `Student` mentoring another `Student`


    *   A `Student` mentoring a `Professor` (which is not very likely)


    If we wanted to reflect that only the first three of these are possible, we’d
    have to resort to the rather more complex version shown in Figure [10-50](#78624_3_En_10_Chapter.xhtml#Fig50),
    where the three relationships of interest are all reflected as separate association
    lines (two reflexive, one binary).


    ![](images/78624_3_En_10_Chapter/78624_3_En_10_Fig50_HTML.jpg)


    A block diagram represents the student and professor combinedly pointing an arrow
    toward the person. The blocks labeled student and professor indicate mentors.


    Figure 10-50


    Specific mentor associations made explicit


    As cumbersome as it is to change the diagram to reflect these refinements in our
    understanding, it would be orders of magnitude more painful to change the software
    once the application has been coded.'
