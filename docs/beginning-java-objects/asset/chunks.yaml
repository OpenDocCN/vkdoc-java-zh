  raw: '### Rules for Deriving Classes: The “Do’s”


    When deriving a new class, we can do several things to specialize the superclass
    that we are starting out with:


    *   We may ***extend*** the superclass by ***adding features***. In our `GraduateStudent`
    example, we added six features: two attributes—`undergraduateDegree` and `undergraduateInstitution`—and
    four accessor methods, `getUndergraduateDegree`/`setUndergraduateDegree` and `getUndergraduateInstitution`/`setUndergraduateInstitution`.


    *   We also may ***specialize*** the way that a subclass performs one or more
    of the ***services*** inherited from its superclass.


    For example, when a “generic” student enrolls for a course, the business rules
    for the SRS may require us to ensure that


    *   The student has taken the necessary prerequisite courses.


    *   The course is required for the degree that the student is seeking.


    When a ***graduate student*** enrolls for a course, on the other hand, the business
    rules may involve doing both of these things as well as ensuring that the student’s
    graduate committee feels that the course is appropriate.


    Specializing the way that a subclass performs a service—that is, how it responds
    to a given message as compared with the way that its superclass would have responded
    to the same message—is accomplished via a technique known as **overriding**.


    ### Overriding


    Overriding involves “rewiring” how a method works internally, without changing
    the client code interface to/signature of that method. For example, let’s say
    that we’ve defined a `print` method for the `Student` class to print out the values
    of all of a `Student`’s attributes:


    ```

    public class Student {

    // Attributes.

    private String name;

    private String studentId;

    private String majorField;

    private double gpa;

    // etc.

    // Accessor methods for each attribute would also be provided; details omitted.

    public void print() {

    // Print the values of all of the attributes that the Student class

    // knows about.  (Remember: "\n" is a newline.)

    System.out.println("Student Name:  " + getName() + "\n" +

    "Student No.:  " + getStudentId() + "\n" +

    "Major Field:  " + getMajorField() + "\n" +

    "GPA:  " + getGpa());

    }

    }

    ```


    By virtue of inheritance, all of the subclasses of `Student` will inherit this
    method.


    We go on to derive the `GraduateStudent` subclass from `Student`, adding two attributes
    to `GraduateStudent`—`undergraduateDegree` and `undergraduateInstitution`. If
    we take the “lazy” approach of just letting `GraduateStudent` inherit the `print`
    method of `Student` as is, then whenever we invoke the `print` method for a `GraduateStudent`,
    all that will be printed are the values of the four attributes inherited from
    `Student`—`name`, `studentId`, `major`, and `gpa`—because these are the only attributes
    that the `print` method has been explicitly programmed to print the values of.
    Ideally, we would like the `print` method, when invoked for a `GraduateStudent`,
    to print these same four attributes ***plus*** the two additional attributes of
    `undergraduateDegree` and `undergraduateInstitution`.


    With an object-oriented language, we are able to ***override***, or supersede,
    the superclass’s version of a method with a subclass-specific version. To override
    a superclass’s method in Java rather than merely inheriting the method as is,
    the header of the method as declared in the superclass must be repeated in the
    subclass; we are then free to reprogram the ***body*** of that method in the subclass
    to specialize its behavior.


    Let’s look at how the `GraduateStudent` class would go about overriding the `print`
    method of the `Student` class. For your convenience, I’ve repeated the code of
    the `Student` class here:


    ```

    public class Student {

    // Attributes.

    private String name;

    private String studentId;

    private String majorField;

    private double gpa;

    // etc.

    // Accessor methods for each attribute would also be provided; details omitted.

    public void print() {

    // Print the values of all the attributes that the Student class

    // knows about; again, note the use of accessor methods.

    System.out.println("Student Name:  " + getName() + "\n" +

    "Student No.:  " + getStudentId() + "\n" +

    "Major Field:  " + getMajorField() + "\n" +

    "GPA:  " + getGpa());

    }

    }

    //----------------------------------------------

    public class GraduateStudent extends Student {

    private String undergraduateDegree;

    private String undergraduateInstitution;

    // Accessor methods for each newly added attribute would also be provided;

    // details omitted.

    // We are overriding the Student class''s print method; note that

    // we''ve repeated the print method header verbatim from the

    // Student class, which triggers overriding.

    public void print() {

    // We print the values of all of the attributes that the

    // GraduateStudent class knows about:  namely, those that it

    // inherited from Student plus those that it explicitly declares above.

    System.out.println("Student Name:  " + this.getName() + "\n" +

    "Student No.:  " + this.getStudentId() + "\n" +

    "Major Field:  " + this.getMajorField() + "\n" +

    "GPA:  " + this.getGpa() + "\n" +

    "Undergrad. Deg.:  " + this.getUndergraduateDegree() +

    "\n" + "Undergrad. Inst.:  " +

    this.getUndergraduateInstitution());

    }

    }

    ```


    The `GraduateStudent` class’s version of `print` thus overrides, or supersedes,
    the version that would otherwise have been inherited from the `Student` class.


    In a complex inheritance hierarchy, we often have occasion to override a given
    method multiple times. In the hierarchy shown in Figure [5-8](#78624_3_En_5_Chapter.xhtml#Fig8)


    *   Root class A (`Person`) declares a method with the header `public void print()`
    that prints out all of the attributes declared for the `Person` class.


    *   Subclass B (`Student`) overrides this method, changing the internal logic
    of the method body to print not only the attributes inherited from `Person` but
    also those that were added by the `Student` class itself.


    *   Subclass E (`GraduateStudent`) overrides this method again, to print not only
    the attributes inherited from `Student` (which include those inherited from `Person`)
    but also those that were added by the `GraduateStudent` class itself.


    Note that, in all cases, the method signature ***must*** remain the same—`print()`—for
    overriding to take place.


    ![](images/78624_3_En_5_Chapter/78624_3_En_5_Fig8_HTML.jpg)


    A tree diagram with blocks A to F has a hierarchy from bottom to top. A is a person,
    B is a student, C is a professor, D is an undergraduate, E is a graduate, and
    F is continuing. The print command is written on A, B, E, and F blocks.


    Figure 5-8


    A method may be overridden multiple times within a class hierarchy


    Under such circumstances, any class not specifically overriding a given method
    itself will inherit the definition of that method used by its most immediate ancestor.
    Thus,


    *   Classes C and D in Figure [5-8](#78624_3_En_5_Chapter.xhtml#Fig8) inherit
    the versions of `print()` that are defined by A and B, respectively.


    *   B, E, and F are all overriding the `print()` method of their parent classes.'
  trans: '

    ### 派生类的规则：“应做事项”


    在派生新类时，我们可以通过多种方式对起始的父类进行特化：


    *   我们可以通过***添加特性***来***扩展***父类。在我们的 `GraduateStudent` 示例中，我们添加了六个特性：两个属性——`undergraduateDegree`
    和 `undergraduateInstitution`——以及四个访问器方法：`getUndergraduateDegree`/`setUndergraduateDegree`
    和 `getUndergraduateInstitution`/`setUndergraduateInstitution`。


    *   我们还可以***特化***子类执行从父类继承的一个或多个***服务***的方式。


    例如，当一名“普通”学生注册课程时，SRS 的业务规则可能要求我们确保：


    *   该学生已修完必要的先修课程。

    *   该课程是该学生攻读学位所要求的。


    另一方面，当一名***研究生***注册课程时，业务规则可能涉及同时完成上述两项检查，并确保该学生的研究生委员会认为该课程是合适的。


    特化子类执行服务的方式——即子类对给定消息的响应方式，与其父类对同一消息的响应方式相比——是通过一种称为**重写**的技术来实现的。


    ### 重写


    重写涉及“重新布线”方法内部的工作方式，而不改变该方法的客户端代码接口/签名。例如，假设我们为 `Student` 类定义了一个 `print` 方法，用于打印
    `Student` 所有属性的值：


    ```

    public class Student {

    // 属性。

    private String name;

    private String studentId;

    private String majorField;

    private double gpa;

    // 等等。

    // 每个属性的访问器方法也会提供；细节省略。

    public void print() {

    // 打印 Student 类已知的所有属性的值。

    // （记住："\n" 是换行符。）

    System.out.println("学生姓名：  " + getName() + "\n" +

    "学号：  " + getStudentId() + "\n" +

    "专业领域：  " + getMajorField() + "\n" +

    "GPA：  " + getGpa());

    }

    }

    ```


    通过继承，`Student` 的所有子类都将继承此方法。


    我们继续从 `Student` 派生出 `GraduateStudent` 子类，并为 `GraduateStudent` 添加两个属性——`undergraduateDegree`
    和 `undergraduateInstitution`。如果我们采取“懒惰”的方式，直接让 `GraduateStudent` 原样继承 `Student`
    的 `print` 方法，那么每当我们为 `GraduateStudent` 调用 `print` 方法时，打印出来的将只是从 `Student` 继承的四个属性——`name`、`studentId`、`major`
    和 `gpa`——因为 `print` 方法被显式编程为只打印这些属性的值。理想情况下，我们希望当为 `GraduateStudent` 调用 `print`
    方法时，它能打印出这四个属性***以及*** `undergraduateDegree` 和 `undergraduateInstitution` 这两个额外属性。


    使用面向对象语言，我们可以***重写***（或取代）父类的方法版本，代之以子类特定的版本。要在 Java 中重写父类的方法（而非仅仅原样继承该方法），必须在子类中重复父类中声明的方法头；然后，我们可以自由地重新编程子类中该方法的***主体***，以特化其行为。


    让我们看看 `GraduateStudent` 类如何重写 `Student` 类的 `print` 方法。为方便起见，我在此重复了 `Student` 类的代码：


    ```

    public class Student {

    // 属性。

    private String name;

    private String studentId;

    private String majorField;

    private double gpa;

    // 等等。

    // 每个属性的访问器方法也会提供；细节省略。

    public void print() {

    // 打印 Student 类已知的所有属性的值；

    // 再次注意访问器方法的使用。

    System.out.println("学生姓名：  " + getName() + "\n" +

    "学号：  " + getStudentId() + "\n" +

    "专业领域：  " + getMajorField() + "\n" +

    "GPA：  " + getGpa());

    }

    }

    //----------------------------------------------

    public class GraduateStudent extends Student {

    private String undergraduateDegree;

    private String undergraduateInstitution;

    // 每个新添加属性的访问器方法也会提供；

    // 细节省略。

    // 我们正在重写 Student 类的 print 方法；

    // 注意，我们逐字重复了 Student 类中的 print 方法头，这会触发重写。

    public void print() {

    // 我们打印 GraduateStudent 类已知的所有属性的值：

    // 即从 Student 继承的属性以及上面显式声明的属性。

    System.out.println("学生姓名：  " + this.getName() + "\n" +

    "学号：  " + this.getStudentId() + "\n" +

    "专业领域：  " + this.getMajorField() + "\n" +

    "GPA：  " + this.getGpa() + "\n" +

    "本科学位：  " + this.getUndergraduateDegree() +

    "\n" + "本科院校：  " +

    this.getUndergraduateInstitution());

    }

    }

    ```


    因此，`GraduateStudent` 类的 `print` 版本重写了原本会从 `Student` 类继承的版本。


    在复杂的继承层次结构中，我们经常需要多次重写某个方法。在图 5-8 所示的层次结构中：


    *   根类 A（`Person`）声明了一个方法头为 `public void print()` 的方法，该方法打印 `Person` 类声明的所有属性。

    *   子类 B（`Student`）重写了此方法，更改了方法体的内部逻辑，使其不仅打印从 `Person` 继承的属性，还打印 `Student` 类自身添加的属性。

    *   子类 E（`GraduateStudent`）再次重写了此方法，使其不仅打印从 `Student` 继承的属性（包括从 `Person` 继承的属性），还打印
    `GraduateStudent` 类自身添加的属性。


    请注意，在所有情况下，方法签名***必须***保持不变——`print()`——才能发生重写。


    ![](img/78624_3_En_5_Fig8_HTML.jpg)


    一个包含从 A 到 F 的块的树形图，层次结构从下到上。A 是 Person，B 是 Student，C 是 Professor，D 是 Undergraduate，E
    是 Graduate，F 是 Continuing。print 命令写在 A、B、E 和 F 块上。


    图 5-8


    一个方法可以在类层次结构中被多次重写


    在这种情况下，任何没有专门重写某个方法的类，都将继承其最近祖先对该方法的定义。因此：


    *   图 5-8 中的类 C 和 D 分别继承由 A 和 B 定义的 `print()` 版本。

    *   B、E 和 F 都在重写其父类的 `print()` 方法。

