- fmt: '### Using Wrapper Classes for Input Conversion


    Recall our introduction in Chapter [6](#78624_3_En_6_Chapter.xhtml) to Java’s
    predefined **wrapper classes** for each of the eight distinct primitive Java types—`Integer`,
    `Float`, `Double`, `Byte`, `Short`, `Long`, `Boolean`, and `Character`—all within
    the core `java.lang` package. Our previous discussion of these classes centered
    on their use in “wrapping” primitive types for purposes of storing them in a Java
    collection. We’re now going to explore an alternative use of these classes, as
    **utility classes**, for performing data conversions.


    One such example of when we might need to perform a data conversion operation
    is when obtaining data via a user interface. Whether we use a GUI to acquire user
    input or a command-line interface as we’re exploring in this chapter, data is
    always acquired from a user in `String` format. We often need to convert this
    data into one of the Java numeric types (`int`, `double`, etc.) in order to be
    able to manipulate it mathematically.


    Each of the wrapper classes declares a number of `static` methods that are useful
    when we need to perform data conversions. For example, the `Integer` class defines
    a `static` method with the header:


    ```

    static int parseInt(String s)

    ```


    Pass in a `String` as an argument to this method, and the `Integer` class will
    convert it to an `int`(eger) for us if it represents a valid integer or will throw
    a `NumberFormatException` if it does not. Similarly, the `Double` class declares
    a `static parseDouble` method, the `Float` class declares a `static parseFloat`
    method, and so forth.


    Here’s a simple example to illustrate how the `Integer.parseInt` method might
    be used:


    ```

    public class IntegerTest {

    public static void main(String[] args) {

    String[] ints = { "123", "foobar", "456", "789" };

    int i = 0;

    for (i = 0; i < ints.length; i++) {

    try {

    int test = Integer.parseInt(ints[i]);

    System.out.println(test + " converted just fine!");

    }

    catch (NumberFormatException e) {

    System.out.println("Whoops!  " + ints[i] +

    " is an invalid integer.");

    }

    }

    }

    }

    ```


    This program, when run, produces the following output:


    ```

    123 converted just fine!

    Whoops!  foobar is an invalid integer.

    456 converted just fine!

    789 converted just fine!

    ```


    Note that we inserted the `try` statement **inside of** the `for` loop, so that
    it would take effect once per loop iteration; if we had instead inserted the whole
    `for` loop into the `try` block, as illustrated in the following:


    ```

    public class IntegerTest {

    public static void main(String[] args) {

    String[] ints = { "123", "foobar", "456", "789" };

    int i = 0;

    try {

    // Now, the entire for loop is within the try block.

    for (i = 0; i < ints.length; i++) {

    int test = Integer.parseInt(ints[i]);

    System.out.println(test + " converted just fine!");

    }

    }

    catch (NumberFormatException e) {

    System.out.println("Whoops!  " + ints[i] + " is an invalid integer.");

    }

    }

    }

    ```


    then the first occurrence of a `NumberFormatException` would have **terminated**
    the `for` loop, producing the following alternate output:


    ```

    123 converted just fine!

    Whoops!  foobar is an invalid integer.

    ```


    Another `static` method defined by the `Integer` class (and the other wrapper
    classes, as well) is used to do the reverse:


    ```

    static String toString(int)

    ```


    This method accepts an `int`(eger) value as an argument, converting it into a
    proper `String`, as the following example illustrates:


    ```

    int i = 56;

    String s = Integer.toString(i);     // s now has a String value of "56"

    ```


    There is a shortcut way for doing the same thing, however: we simply need to concatenate
    the value of `i` to an empty `String` (`""`) as follows:


    ```

    int i = 56;

    String s = "" + i;   // s now has a String value of "56"

    ```


    ## Features of the Object Class


    We learned in Chapter [5](#78624_3_En_5_Chapter.xhtml) that the `Object` class,
    provided in the core `java.lang` package, is the ultimate superclass for all classes
    in Java, user-defined or otherwise. Thus, all Java objects, regardless of type,
    inherit a common set of interesting features from the `Object` class, which we’ll
    explore in this section.


    ### Determining the Class That an Object Belongs To


    Every Java object inherits a method from the `Object` class with the header:


    ```

    Class getClass()

    ```


    This method, when invoked on an object reference—for example, `x.getClass();`—returns
    a reference to an object of type `Class` representing an abstraction of the class
    that object `x` belongs to.


    The `Class` class, in turn, defines a method with the header:


    ```

    String getName()

    ```


    This method, when invoked on a `Class` reference, returns the **fully qualified
    name** of the class for classes that belong to a **named** package (*packagename*.*Classname*—for
    example, `java.util.ArrayList`) or a simple class name—for example, `Professor`—for
    classes that belong to the default (unnamed) package (as will be the case for
    our SRS classes).


    Chaining these two methods together, we can ask any object reference to identify
    which class the object it references belongs to, as follows:


    ```

    reference.getClass().getName();

    ```


    For example:


    ```

    Professor pr = new Professor();

    System.out.println(pr.getClass().getName());

    ```


    Output:


    ```

    Professor

    ```


    or


    ```

    // Test to see if x is referring to a Professor object.

    // Note that if x were null, we''d get a NullPointerException, so we''ve

    // inserted a test for "nullness" before calling the getClass method on x.

    if (x != null && x.getClass().getName().equals("Professor")) { ...

    ```


    Returning to our discussion of exception handling from earlier in this chapter,
    we can also use the `getClass().getName()` approach within a `catch` block to
    determine what sort of exception has occurred:


    ```

    try { ... }

    catch (SomeExceptionType e) {

    System.out.println("Drat!  An exception of type " +

    e.getClass().getName() + " has occurred.");

    }

    ```


    Sample output:


    ```

    Drat!  An exception of type java.lang.NullPointerException has occurred.

    ```


    Another way to test whether a given object reference belongs to a particular class
    is via the `instanceof` operator. This is a `boolean` operator that allows us
    to determine if some reference variable *x* is referring to an object of class/type
    *Y*. Here’s a simple code example to illustrate the use of this operator; in this
    example, we assume that `Person` is an abstract class and that both `Student`
    and `Professor` are concrete classes derived from `Person`:


    ```

    Person x;

    // Later in the program ...

    x = new Professor();

    // Still later in the program ...

    // Determine the precise runtime identity of x.

    if (x instanceof Student) {

    System.out.println("x is a Student");

    }

    if (x instanceof Professor) {

    System.out.println("x is a Professor");

    }

    if (x instanceof Person) {

    System.out.println("x is a Person");

    }

    ```


    Output:


    ```

    x is a Professor

    x is a Person

    ```'
