  trans: "\n*   在声明接口时，我们使用关键字 `interface` 而非 `class`：\n\n```\n    public interface\
    \ Teacher { ... }\n    ```\n\n*   由于接口的所有方法都隐式地是 `public` 和 `abstract`，我们在声明它们时无需指定这两个关键字（尽管这样做不会产生编译错误）。然而，如果我们试图为接口内的方法分配\
    \ `public` 以外的访问权限，***将会*** 收到错误：\n\n```\n    public interface teacher {\n   \
    \ // 这无法编译——接口方法必须全部是 public。\n    private void takeSabbatical();\n    // 等等\n\
    \    ```\n\n以下是编译器错误信息：\n\n```\nmodifier private not allowed here\nprivate void\
    \ takeSabbatical();\n^\n```\n\n由于接口规定的所有方法都是抽象的，***没有*** 任何一个方法拥有方法体。\n\n与类一样，每个接口的源代码通常放在其自己的\
    \ `.java` 文件中，该文件的外部名称与其中包含的接口名称相匹配（例如，`Teacher` 接口应放在名为 `Teacher.java` 的文件中）。然后，接口会以与类相同的方式编译成字节码。例如，命令\n\
    \n```\njavac Teacher.java\n```\n\n将生成一个名为 `Teacher.class` 的字节码文件。\n\n请注意，接口不能声明变量（本章稍后讨论的一个例外情况除外），也不能声明任何已实现的方法。简而言之，它们就是抽象方法头的集合。因此，就“抽象程度谱系”而言，***接口比抽象类更抽象***（而抽象类又比具体类更抽象），因为接口将更多细节留给了想象。\n\
    \n**重新格式化为编者注** 从 Java 8 开始，引入了**函数式接口**的概念；此类接口在声明和使用规则上略有不同，这超出了本章的讨论范围。\n\n\
    ### 实现接口\n\n一旦我们定义了一个像 `Teacher` 这样的接口，就可以通过声明感兴趣的类***实现*** `Teacher` 接口，来指定各种类对象为教师——例如，`Professor`\
    \ 对象、`Student` 对象或通用的 `Person` 对象——使用以下语法：\n\n```\n// 实现一个接口 ...\npublic class\
    \ Professor implements Teacher { ... }\n```\n\n也就是说，我们使用 `implements` 关键字，而不是像从一个类派生另一个类时那样使用\
    \ `extends` 关键字。\n\n回顾我们在第 6 章中关于包的讨论。如果我们希望实现一个预定义的 Java 接口类型（Java 语言提供了许多这样的类型），我们必须记得使用\
    \ `import` 指令让编译器知道该接口类型，例如：\n\n`import` *包名.预定义接口类型*`;`\n\n`public class MyClass\
    \ implements` *预定义接口类型* `{ ... }`\n\n一旦一个类声明它正在实现一个接口，为了实现编译通过，实现类***必须***实现该接口声明的所有（隐式抽象的）方法。举个例子，假设我们按如下方式编写\
    \ `Professor` 类，实现了 `Teacher` 接口要求的四个方法中的三个，但忽略了实现 `approveEnrollment` 方法：\n\n\
    ```\npublic class Professor implements Teacher {\nprivate String name;\nprivate\
    \ String employeeId;\n// 等等\n// 我们实现了 Teacher 接口要求的四个方法中的三个，以提供方法体。\npublic boolean\
    \ agreeToTeach(Course c) {\n方法体的逻辑在此；细节省略 ...\n}\npublic void designateTextbook(TextBook\
    \ b, Course c) {\n方法体的逻辑在此；细节省略 ...\n}\npublic Syllabus defineSyllabus(Course\
    \ c) {\n方法体的逻辑在此；细节省略 ...\n}\n// 然而，我们未能提供 approveEnrollment 方法的实现。\n// 与 Teacher\
    \ 接口无关的 Professor 的其他杂项方法也可以声明……细节省略。\n}\n```\n\n如果我们尝试像上面那样编译 `Professor` 类，将会收到以下编译器错误：\n\
    \n```\nProfessor should be declared abstract; it does not implement\napproveEnrollment(Student,\
    \ Course) in Teacher\n```\n\n回想一下，这与我们从抽象类派生一个类但未能重写其中一个继承的抽象方法时生成的编译器错误消息***完全相同***。以下是之前一个示例的结果，涉及抽象超类\
    \ `Course` 和子类 `IndependentStudyCourse`：\n\n```\nIndependentStudyCourse should\
    \ be declared abstract; it does not implement\nestablishCourseSchedule(String,\
    \ String) in Course\n```\n\n因此，实现一个接口在概念上类似于扩展一个抽象类，因为接口和抽象类都是用于规定实现子类必须能够执行的抽象行为的替代结构。\n\
    \n我们何时应该使用一种而不是另一种？\n\n*   如果我们希望为这些规定行为附带特定的数据结构，或者需要在抽象行为之外提供一些具体行为，我们将创建一个抽象类。\n\
    \n*   否则，我们将创建一个接口。\n\n表 7-1 和 7-2 总结了接口与抽象类之间的语法差异。\n\n表 7-2\n\n扩展抽象类与实现接口的语法差异\n\
    \n| 使用抽象类的示例 | 使用接口的示例 |\n| --- | --- |\n| **Professor** ***扩展*** **Teacher**：\
    \ | **Professor** ***实现*** **Teacher**： |\n| `public class Professor extends Teacher\
    \ {``// Professor 继承自抽象超类的属性（如果有的话），``// 并可选择性地添加额外属性。``private Department worksFor;``//\
    \ 等等``// 我们重写从 Teacher 类继承的抽象方法``// 以提供具体实现。``public void agreeToTeach(Course\
    \ c) {`*      方法体的逻辑在此；**      细节省略 ...*`}``// 其他抽象方法同理。``// 可以添加额外方法；``// 细节省略。``}`\
    \ | `public class Professor implements``Teacher {``// Professor 必须提供其全部``// 自身的数据结构，因为接口无法提供这些。``private\
    \ String name;``private String employeeId;``private Department worksFor``;``//\
    \ 等等``// 我们实现 Teacher 接口要求的方法。``public void agreeToTeach(Course c) {`*    方法体的逻辑在此；**    细节省略\
    \ ...*`}``// 其他抽象方法同理。``// 可以添加额外方法；``// 细节省略。``}` |\n\n表 7-1\n\n声明抽象类与接口的语法差异\n\
    \n| 使用抽象类的示例 | 使用接口的示例 |\n| --- | --- |\n| **将 Teacher 类型声明为抽象类：** | **将 Teacher\
    \ 类型声明为接口：** |\n| `public abstract class Teacher {``// 抽象类可以规定数据结构。``private String\
    \ name;``private String employeeId``;``// 等等``// 我们使用 \"abstract\" 关键字声明抽象方法；``//\
