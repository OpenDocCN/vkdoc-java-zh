    ![](images/78624_3_En_10_Chapter/78624_3_En_10_Fig32_HTML.png)


    An illustration represents 2 rectangular blocks. The block in the foreground is
    labeled course and the background block denotes prerequisite. Each block indicates
    0 dot, dot star.


    Figure 10-32


    An example of optional many-to-many multiplicity on a reflexive association


    We reflect multiplicity on aggregations as well as on simple associations. For
