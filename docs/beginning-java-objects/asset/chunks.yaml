    \ The text at the top reads, and each student object fills in its own unique attribute\
    \ values.\n\nFigure 3-6\n\n… and an object then fills in its own unique attribute\
    \ values\n\n*   An ***object***, on the other hand, is a unique instance of a\
    \ ***filled-in template*** for which attribute values have been provided and upon\
    \ which methods may be performed, as illustrated in Figure [3-6](#78624_3_En_3_Chapter.xhtml#Fig6).\n\
    \n## Encapsulation\n\n**Encapsulation** is a formal term referring to the mechanism\
    \ that bundles together the state and behavior of an object into a single logical\
    \ unit. Everything that we need to know about a given student is, in theory, contained\
    \ within the boundaries of a `Student` object, either\n\n*   Directly, as an attribute\
    \ of that object\n\n*   Indirectly, as a method that can answer a question or\
    \ make a determination about the object’s state\n\n    Encapsulation isn’t unique\
    \ to OO languages, but in some senses it is perfected by them. If you’re familiar\
    \ with C, you know that a C `struct`(ure) encapsulates data\n\n    `struct employee\
    \ {`\n\n    `char name[30];`\n\n    `int age;`\n\n    `}`\n\n    and a C function\
    \ encapsulates logic—data is passed in and operated on, and an answer is optionally\
    \ returned:\n\n    `float average(float x, float y) {`\n\n    `return (x + y)/2.0;`\n\
    \n    `}`\n\n    But only with OO programming languages is the notion of encapsulating\
    \ data and behavior in a single class construct, to represent an abstraction of\
    \ a real-world entity, truly embraced.\n\n## User-Defined Types and Reference\
    \ Variables\n\nIn a non-OO programming language such as C, the statement\n\n```\n\
    int x;\n```\n\nis a **declaration** that variable `x` is an `int`(eger), one of\
    \ several primitive data types defined to be part of the C language. What does\
    \ this ***really*** mean? It means that\n\n*   `x` is a ***symbolic name*** that\
    \ we’ve invented to refer to an `int`(eger) value that is stored somewhere in\
    \ the computer’s memory. We don’t care where this value is stored, however, because\n\
    \n*   Whenever we want to operate on this particular integer value in our program,\
    \ we refer to it via its symbolic name `x`, for example:\n\n    ```\n    if (x\
    \ > 17) x = x + 5;\n    ```\n\n*   Furthermore, the “thing” that we’ve named `x`\
    \ understands how to respond to a number of different operations, such as addition\
    \ (+), subtraction (–), multiplication (*), division (/), logical comparisons\
    \ (>, <, =), and so on, as defined by the `int` type.\n\nIn an OO language like\
    \ Java, we can define a class such as `Student` and then declare a variable to\
    \ be of type `Student`, as follows:\n\n```\nStudent y;\n```\n\nWhat does this\
    \ ***really*** mean? It means that\n\n*   `y` is a symbolic name that we’ve invented\
    \ to refer to a `Student` object (i.e., an instance of the `Student` class) that\
    \ is stored somewhere in the computer’s memory. We don’t care where this object\
    \ is stored, however, because\n\n*   Whenever we want to operate on this particular\
    \ object in our program, we refer to it via its symbolic name `y`, for example:\n\
    \n    ```\n    if (y.isOnAcademicProbation()) {\n    System.out.println (\"Uh\
    \ oh ...\");\n    }\n    ```\n\n*   Furthermore, the “thing” that we’ve named\
    \ `y` understands how to respond to a number of different service requests—how\
    \ to register for a course, drop a course, and so on—that have been defined by\
    \ the `Student` class.\n\nNote the parallels between `y` as a `Student` and `x`\
    \ as an `int` in the preceding examples. Just as `int` is said to be a ***predefined\
    \ type*** in Java (and other languages), the `Student` class is said to be a **user-defined\
    \ type**. And, because `y` in the preceding example is a variable that ***refers\
    \ to*** an instance (object) of class `Student`, `y` is known as a **reference\
    \ variable**.\n\nIn contrast, variables declared to be one of the eight primitive\
    \ types in Java—`int`, `double`, `float`, `byte`, `short`, `long`, `char`, and\
    \ `boolean`—are ***not*** reference variables, because in Java, primitive types\
    \ are ***not*** **reference types**; that is, they do not refer to ***objects***:\n\
    \n```\n// x is NOT a reference variable, because in Java,\n// an int is NOT an\
    \ object.\nint x;\n// yesNo is NOT a reference variable, because in Java,\n//\
    \ a boolean is NOT an object.\nboolean yesNo;\n// etc.\n```\n\nVarious OO languages\
    \ differ in their treatment of simple types. In some OO languages (e.g., Smalltalk),\
    \ ***all*** types, including “simple” types such as `int` and `char`, are reference\
    \ types, whereas in other languages (e.g., Java and C++), they are not.\n\nThe\
    \ fact that Java contains a mix of reference types and nonreference types affects\
    \ the way that we manipulate variables under certain circumstances, such as when\
    \ we’re placing primitive values into **collections**, a subject that we’ll explore\
    \ in Chapter [6](#78624_3_En_6_Chapter.xhtml).\n\n### Naming Conventions for Reference\
    \ Variables\n\nNames for reference variables follow the same convention as method\
    \ and attribute names—that is, they use camel casing. Some sample reference variable\
    \ declarations are as follows:\n\n```\nCourse prerequisiteOfThisCourse;\nProfessor\
    \ facultyAdvisor;\nStudent student;\n```\n\nThe last of these, `Student student;`,\
    \ might take some getting used to if you are new to case-sensitive programming\
    \ languages. However, it is considered good programming practice to pattern reference\
    \ variable names after the name of the class to which they belong if there is\
    \ only one such variable within scope in a particular body of code. Because the\
    \ class name starts with an uppercase “S” and the reference variable name starts\
    \ with a lowercase “s,” `Student` and `student` are ***completely different symbols***\
    \ as far as the compiler is concerned."
  trans: "\n## 实例化\n\n类定义可以被视为创建软件对象的模板——一种用于以下目的的“模式”：\n\n*   在 JVM 中分配指定数量的内存，以容纳新对象的***属性***\n\
    *   将一组特定的***行为***与该对象关联\n\n术语**实例化**指的是在运行时根据类定义在内存中创建对象的过程。从一个单一的类定义（例如 `Student`）出发，我们可以创建许多具有相同数据结构和行为的对象，就像我们使用一个饼干模具来制作许多形状相同的饼干一样。因此，对象的另一种称呼是特定类的**实例**——例如，“一个\
    \ `Student` 对象是 `Student` 类的一个实例。”（我们将在本章稍后部分更详细地讨论 Java 中实例化对象的实际过程。）\n\n因此，类与对象的区别如下：\n\
    \n![](img/78624_3_En_3_Fig5_HTML.jpg)\n\n一个表格包含属性名、数据类型和值三列，下方有 9 行数据。这些行包括姓名、学生\
    \ ID、出生日期、地址和 GPA 等。顶部的文字为：Student 类定义了一个模板。\n\n图 3-5\n\n一个类规定了实例化对象的模板……\n\n\
    *   ***类***定义了属于该类的每个对象必须拥有的特征——属性、方法；因此，类可以被视为一个***对象模板***，如图 3-5 所示。\n\n![](img/78624_3_En_3_Fig6_HTML.jpg)\n\
    \n一个表格包含属性名、数据类型和值三列，下方有 9 行数据。这些行包括姓名、学生 ID、出生日期、地址和 GPA 等。顶部的文字为：每个 Student\
    \ 对象填入其独有的属性值。\n\n图 3-6\n\n……然后对象填入其独有的属性值\n\n*   另一方面，***对象***是一个***已填充模板***的唯一实例，该模板已提供属性值，并且可以对其执行方法，如图\
    \ 3-6 所示。\n\n## 封装\n\n**封装**是一个正式术语，指的是将对象的状态和行为捆绑到一个单一逻辑单元中的机制。理论上，我们需要了解的关于某个特定学生的一切信息都包含在\
    \ `Student` 对象的边界内，要么是：\n\n*   直接地，作为该对象的一个属性\n*   间接地，作为一个能够回答问题或判断对象状态的方法\n\n\
    \    封装并非面向对象语言独有，但从某种意义上说，它在面向对象语言中得到了完善。如果你熟悉 C 语言，你会知道 C 语言的 `struct`（结构体）封装了数据：\n\
    \n    `struct employee {`\n\n    `char name[30];`\n\n    `int age;`\n\n    `}`\n\
    \n    而 C 语言的函数封装了逻辑——数据被传入并进行操作，并可选择性地返回一个结果：\n\n    `float average(float x,\
    \ float y) {`\n\n    `return (x + y)/2.0;`\n\n    `}`\n\n    但只有在面向对象编程语言中，将数据和行为封装在单一的类构造中，以表示现实世界实体的抽象这一概念才真正得到贯彻。\n\
    \n## 用户定义类型与引用变量\n\n在像 C 这样的非面向对象编程语言中，语句\n\n```\nint x;\n```\n\n是一个**声明**，表明变量\
    \ `x` 是一个 `int`（整数），它是 C 语言中定义的几种基本数据类型之一。这***实际上***意味着什么？它意味着：\n\n*   `x` 是我们发明的一个***符号名称***，用于引用存储在计算机内存某处的\
    \ `int`（整数）值。但我们并不关心这个值存储在哪里，因为\n*   每当我们在程序中想要操作这个特定的整数值时，我们通过它的符号名称 `x` 来引用它，例如：\n\
    \n    ```\n    if (x > 17) x = x + 5;\n    ```\n\n*   此外，我们命名为 `x` 的这个“东西”知道如何响应多种不同的操作，例如加法\
    \ (+)、减法 (–)、乘法 (*)、除法 (/)、逻辑比较 (>, <, =) 等，这些操作由 `int` 类型定义。\n\n在像 Java 这样的面向对象语言中，我们可以定义一个类，例如\
    \ `Student`，然后声明一个变量为 `Student` 类型，如下所示：\n\n```\nStudent y;\n```\n\n这***实际上***意味着什么？它意味着：\n\
    \n*   `y` 是我们发明的一个符号名称，用于引用存储在计算机内存某处的 `Student` 对象（即 `Student` 类的一个实例）。但我们并不关心这个对象存储在哪里，因为\n\
    *   每当我们在程序中想要操作这个特定对象时，我们通过它的符号名称 `y` 来引用它，例如：\n\n    ```\n    if (y.isOnAcademicProbation())\
    \ {\n    System.out.println (\"Uh oh ...\");\n    }\n    ```\n\n*   此外，我们命名为 `y`\
    \ 的这个“东西”知道如何响应多种不同的服务请求——如何注册课程、退选课程等等——这些请求由 `Student` 类定义。\n\n请注意前面例子中 `y`\
    \ 作为 `Student` 类型和 `x` 作为 `int` 类型之间的相似之处。正如 `int` 被称为 Java（及其他语言）中的***预定义类型***一样，`Student`\
    \ 类被称为**用户定义类型**。并且，由于前面例子中的 `y` 是一个***引用*** `Student` 类实例（对象）的变量，因此 `y` 被称为**引用变量**。\n\
    \n相比之下，声明为 Java 中八种基本类型之一的变量——`int`、`double`、`float`、`byte`、`short`、`long`、`char`\
    \ 和 `boolean`——***不是***引用变量，因为在 Java 中，基本类型***不是*** **引用类型**；也就是说，它们不引用***对象***：\n\
    \n```\n// x 不是引用变量，因为在 Java 中，\n// int 不是对象。\nint x;\n// yesNo 不是引用变量，因为在 Java\
    \ 中，\n// boolean 不是对象。\nboolean yesNo;\n// 等等。\n```\n\n不同的面向对象语言对简单类型的处理方式不同。在某些面向对象语言（例如\
    \ Smalltalk）中，***所有***类型，包括像 `int` 和 `char` 这样的“简单”类型，都是引用类型，而在其他语言（例如 Java 和\
    \ C++）中则不是。\n\nJava 包含引用类型和非引用类型的混合这一事实，会影响我们在某些情况下操作变量的方式，例如当我们将基本类型的值放入**集合**时，我们将在第\
    \ 6 章探讨这个主题。\n\n### 引用变量的命名约定\n\n引用变量的命名遵循与方法名和属性名相同的约定——即使用驼峰命名法。一些引用变量声明的示例如下：\n\
    \n```\nCourse prerequisiteOfThisCourse;\nProfessor facultyAdvisor;\nStudent student;\n\
    ```\n\n最后一条声明 `Student student;`，如果你不熟悉区分大小写的编程语言，可能需要一些时间来适应。然而，如果在特定代码块的作用域内只有一个属于该类的变量，那么将引用变量名模式化为其所属类的名称被认为是一种良好的编程实践。由于类名以大写字母“S”开头，而引用变量名以小写字母“s”开头，因此对于编译器来说，`Student`\
    \ 和 `student` 是***完全不同的符号***。\n"
- fmt: '# Instantiating Objects: A Closer Look


    Different OO languages differ in terms of when an object is actually instantiated
    (created). In Java, when we declare a variable to be of a user-defined type, as
    in


    ```

    Student y;

    ```


    we haven’t actually created an object in memory yet. Rather, we’ve simply declared
    a reference variable of type `Student` named `y`. This reference variable has
    the ***potential*** to refer to a `Student` object, but it doesn’t refer to one
    just yet; rather, as with variables of the various simple types, `y`’s value is
    undefined as far as the compiler is concerned (it is `null`) until we explicitly
    assign it a value.


    If we want to instantiate a ***brand-new*** `Student` object for `y` to refer
    to, we have to take the distinct step of using a special Java keyword, `new`,
    to allocate a new `Student` object within the JVM’s memory at run time. We associate
    the new object with the reference variable `y` via an assignment statement, as
    follows:


    ```

    y = new Student();

    ```


    Don’t worry about the parentheses at the end of the preceding statement. I’ll
    talk about their significance in Chapter [4](#78624_3_En_4_Chapter.xhtml), when
    we discuss the notion of **constructors**.


    Think of the newly created object as a helium balloon, as shown in Figure [3-7](#78624_3_En_3_Chapter.xhtml#Fig7),
    and a reference variable as the hand that holds a string tied to the balloon so
    that we may access the object whenever we’d like.


    ![](images/78624_3_En_3_Chapter/78624_3_En_3_Fig7_HTML.png)


    An illustration of a balloon labeled student object. A hand with the label y holds
    the string of the balloon.


    Figure 3-7


    Using a reference variable to keep track of an object in memory


    Because a reference variable is sometimes informally said to “hold on to” an object,
    we often use the informal term **handle**, as in the expression “Reference variable
    `y` maintains a handle on a `Student` object.”


    If you’re familiar with the concept of ***pointers*** from languages such as C
    and C++, a reference is similar to a pointer in that it refers behind the scenes
    to the memory location/address where a particular object is stored. Java references
    ***differ*** from pointers, however, in that references can’t be manipulated arithmetically
    the way that pointers can.


    We could also create a new object without immediately assigning it to a reference
    variable, as in the following line of code:


    ```

    new Student();

    ```


    But such an object would be like a helium balloon without a string: it would indeed
    exist, but we’d never be able to access this object in our program. It would,
    in essence, “float away” from us in memory immediately after being “inflated.”


    Note that we can combine the two steps—declaring a reference variable and actually
    instantiating an object for that variable to refer to—in a single line of code:


    ```

    Student y = new Student();

    ```


    Another way to initialize reference variable `y` is to use an assignment statement
    to “hand” `y` a reference to an ***already existing*** object, that is, an object
    (“helium balloon”) that is already being referenced by a ***different*** reference
    variable `x`. Let’s look at an example:


    ```

    // We declare a reference variable, and instantiate our first Student object.

    Student x = new Student();

    // We declare a second reference variable, but do *not* instantiate

    // a second Student object.

    Student y;

    // We assign y a reference to the SAME object that x is referring to

    // (x continues to refer to it, too).  We now, in essence,

    // have two "strings" tied to the same "balloon."

    y = x;

    ```


    The conceptual outcome of the preceding assignment statement is illustrated in
    Figure [3-8](#78624_3_En_3_Chapter.xhtml#Fig8): two “strings,” being held by two
    different “hands,” tied to the same “balloon”—that is, two ***different*** reference
    variables referring to the ***same*** physical object in memory.


    ![](images/78624_3_En_3_Chapter/78624_3_En_3_Fig8_HTML.jpg)


    An illustration of a balloon labeled student object. 2 hands with the labels x
    and y hold the 2 strings of the balloon.


    Figure 3-8


    Maintaining multiple handles on the same object


    We therefore see that ***multiple*** reference variables may simultaneously refer
    to the ***same*** object. However, any ***one*** reference variable may only hold
    on to/refer to ***one*** object at a time. Therefore, if a reference variable
    is already holding on to an object, it must let go of that object to reference
    a different object. If there comes a time when all of the handles for a particular
    object have been released, then that object is no longer accessible to our program,
    like a helium balloon that has been let loose.


    Let’s expand our previous example to illustrate these concepts (note the **highlighted**
    code that has been added):


    ```

    // We declare a reference variable, and instantiate our first Student object.

    Student x = new Student();

    // We declare a second reference variable, but do not instantiate a

    // second object.

    Student y;

    // We assign y a reference to the SAME object that x is referring to

    // (x continues to refer to it, too).

    y = x;

    // We declare a THIRD reference variable and instantiate a SECOND

    // Student object.

    Student z = new Student();

    ```


    At this point in time, we now have two references to the ***first*** `Student`
    object, `x` and `y`, and one reference, `z`, to the ***second*** `Student` object,
    as illustrated in Figure [3-9](#78624_3_En_3_Chapter.xhtml#Fig9).


    ![](images/78624_3_En_3_Chapter/78624_3_En_3_Fig9_HTML.jpg)


    An illustration of two balloons labeled student object number 1 and student object
    number 2\. Student object 1 has 2 strings of x and y, and object 2 has a string
    of z.


    Figure 3-9


    A second object comes into existence


    Let’s expand our example yet again (note the **highlighted** code that has been
    added):


    ```

    // We declare a reference variable, and instantiate our first Student object.

    Student x = new Student();

    // We declare a second reference variable, but do *not* instantiate

    // a second object.

    Student y;

    // We assign y a reference to the SAME object that x is referring to

    // (x continues to refer to it, too).

    y = x;

    // We now declare a third reference variable and instantiate a second

    // Student object.

    Student z = new Student();

    // We reassign y to refer to the same object that z is referring to;

    // y therefore lets go of the first Student object and grabs on to the second.

    y = z;

    ```


    Because we’ve now asked `y` to refer to the same object that `z` is referring
    to—namely, the ***second*** `Student` object—`y` must release its handle on the
    ***first*** `Student` object. This is illustrated in Figure [3-10](#78624_3_En_3_Chapter.xhtml#Fig10).
    (Note that `x` is still holding on to the first `Student` object, however.)


    ![](images/78624_3_En_3_Chapter/78624_3_En_3_Fig10_HTML.jpg)


    An illustration of two balloons labeled student object number 1 and student object
    number 2\. They have strings of x and z interconnected via a string of y.


    Figure 3-10


    Transferring object handles


    We’ll now complete our example with the code that we’ve **highlighted**:


    ```

    // We declare a reference variable, and instantiate our first

    // Student object.

    Student x = new Student();

    // We declare a second reference variable, but do *not* instantiate

    // a second object.

    Student y;

    // We assign y a reference to the SAME object that x is referring to

    // (x continues to refer to it, too).

    y = x;

    // We now declare a third reference variable and instantiate a second

    // Student object.

    Student z = new Student();

    // We reassign y to refer to the same object that z is referring to.

    y = z;

    // We reassign x to refer to the same object that z is referring to.

    // x therefore lets go of the first Student object, and grabs on to

    // the second, as well.

    x = z;

    ```'
