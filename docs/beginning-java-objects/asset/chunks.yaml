- fmt: '### ArrayList Features


    In our `ArrayListExample` program, we use the `add` method to insert `Student`
    references into the collection:


    ```

    // Store references to all three Students in the collection.

    students.add(a);

    students.add(b);

    students.add(c);

    ```


    The `ArrayList` class supports a total of 38 public methods—many of which are
    common to all collection types—and three overloaded public constructors. Some
    of the more commonly used `ArrayList` methods, which we’ll use in building the
    SRS, are as follows:


    - `boolean add(E element)`: Appends the specified element to the end of the list.
    `E` refers to whatever type was specified inside of angle brackets `<...>` when
    the `ArrayList` was first declared/instantiated—for example, `Student` in the
    following declaration:


    ```

    ArrayList students = new ArrayList();

    Student s = new Student();

    students.add(s);

    // or:

    students.add(new Student());

    ```


    With this (and any other) method, we are permitted to pass in an argument of type
    `E` ***or of any subtype thereof***:


    ```

    ArrayList students = new ArrayList();

    // As long as GraduateStudent is derived from Student, all is well!

    students.add(new GraduateStudent());

    ```


    - `void add(int n, E element)`: ***Inserts*** the specified element at the *n*th
    position in the list, shifting all subsequent items over to make room for the
    newly added element, for example:


    ```

    Student s = new Student();

    students.add(0, s);

    // As of the preceding line of code, whatever reference was previously

    // in the first (0th) position will now be in the SECOND position (i.e.,

    // in position #1), because we''ve inserted a NEW Student reference

    // in the first (0th) position.

    ```


    - `void clear()`: Removes all elements from the collection, rendering it empty.


    Whether or not these elements subsequently get ***garbage collected*** as a result
    of eliminating their handles from the collection will depend on whether any ***other***
    handles are being maintained on these objects. We’ll revisit this topic later
    in this chapter.


    - `boolean contains(Object element)`: Returns `true` if the specific object referenced
    by the argument is also referenced by the `ArrayList` and `false` otherwise:


    ```

    // Create a collection.

    ArrayList x = new ArrayList();

    // Instantiate two Students, but only add the FIRST of them

    // to ArrayList x.

    Student s1 = new Student();

    Student s2 = new Student();

    x.add(s1);

    // Declare a third reference variable of type Student, and have it refer to

    // the SAME student as s1:  that is, a Student whose reference has already been

    // added to collection x.

    Student s3 = s1;

    ```


    The situation with regard to objects `x`, `s1`, `s2`, and `s3` can be thought
    of conceptually as illustrated in Figure [6-10](#78624_3_En_6_Chapter.xhtml#Fig10).


    ![](images/78624_3_En_6_Chapter/78624_3_En_6_Fig10_HTML.jpg)


    A diagram of 2 balloons and an array of 4 X blocks. The first balloon is labeled
    s 2\. The second balloon is marked s 1 and s 3 and mapped to the first block of
    the array.


    Figure 6-10


    `Student s1` was placed into collection `x`, and because `s1` and `s3` reference
    the **same** `Student`, `x` **contains** `s3`


    Continuing with our example, the following first `if` test will return a value
    of `false`, while the second will return `true`, because `s3` refers to the ***same***
    `Student` object that `s1` refers to:


    ```

    // Tests for containment:  the first test will return false ...

    if (x.contains(s2)) { ... }

    // ... while the second will return true.

    if (x.contains(s3)) { ... }

    ```


    - `int size()`: Returns a count of the number of elements currently referenced
    by the `ArrayList`. An empty `ArrayList` will report a size of 0.


    - `boolean isEmpty()`: Returns `true` if the `ArrayList` in question contains
    no elements and `false` otherwise.


    - `boolean remove(Object element)`: Locates and ***removes*** a single instance
    of the ***specific object*** referred to by the argument from the `ArrayList`,
    closing up the hole that would otherwise be left behind. It returns `true` if
    such an object was found and removed or `false` if the object wasn’t found:


    ```

    // Create a collection.

    ArrayList x = new ArrayList();

    // Instantiate two Students, and add both to x.

    Student s1 = new Student();

    Student s2 = new Student();

    x.add(s1);

    x.add(s2);

    // Remove s1.

    x.remove(s1);

    // x now only contains one reference, to s2.

    ```


    - And so forth.


    ### Iterating Through ArrayLists


    The `for` loop syntax that we use for iterating through an `ArrayList` (such as
    the `students ArrayList` in our `ArrayListExample` program) is as follows:


    ```

    for (type referenceVariable : collectionName) {

    // Pseudocode.

    manipulate the referenceVariable as desired

    }

    ```


    For example:


    ```

    for (Student s : students) {

    System.out.println(s.getName());

    }

    ```


    This `for` statement is to be interpreted as follows: “for every `Student` object
    (which we’ll temporarily refer to as `s`) in the `students` collection, perform
    whatever logic is specified within the body of the loop.” We are then able to
    refer to `s` within the body of the `for` loop to manipulate it as desired, thus
    processing the items in the `ArrayList` one by one.'
