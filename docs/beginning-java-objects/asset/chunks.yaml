  trans: "\n### 绘制系统及其参与者图表\n\n一旦我们确定了系统的参与者，就可以选择绘制图表。UML 符号要求将所有参与者——无论是人类用户还是计算机系统——都表示为火柴人，然后通过直线将它们连接到代表系统的矩形，如图\
    \ 9-1 所示。\n\n![](img/78624_3_En_9_Fig1_HTML.png)\n\n一个由 7 个火柴人组成的图表映射到一个标有“S R\
    \ S”的方块上。这些火柴人分别标注为学生、教师、系主任、注册员、计费系统、招生系统和教室调度系统。\n\n图 9-1\n\n一个“规范的”UML 用例图\n\
    \n这个图看起来相当简单，然而，对于像 SRS 开发这样的项目来说，这确实是一个可以生成的合理图表。\n\n我倾向于使用略微修改过的 UML 符号版本，具体如下：\n\
    \n*   我扩展了矩形的用途，不仅用它来表示核心系统，也用它来表示所有作为外部系统的参与者，而不是将后者表示为人类火柴人。\n\n*   我发现使用箭头来反映信息的流向——即参与者是提供信息还是消费信息——更具传达性。例如，在如下修改后的符号版本中，我将学生表示为既提供信息又消费信息，而注册员仅消费信息。\n\
    \n    请注意，注册员确实也提供信息，但不是直接提供给 SRS。他们向招生系统提供关于哪些学生在大学注册的信息；然后这些信息由招生系统输入 SRS。因此，招生系统被显示为作为参与者向\
    \ SRS 提供信息；但从 SRS 的角度来看，注册员仅仅是一个消费者。\n\n通过这些符号上的细微改动，如图 9-2 所示，用例图变成了一个更具传达性的工具。\n\
    \n![](img/78624_3_En_9_Fig2_HTML.jpg)\n\n一个由学生、教师、系主任和注册员四个火柴人组成的图表，通过一个标有“S R\
    \ S”的方块与计费系统、招生系统和教室调度系统的方块相互连接。\n\n图 9-2\n\n用例符号的自定义版本\n\n当然，如果你决定偏离像 UML 这样广泛理解的符号标准，你需要遵循以下步骤：\n\
    \n1.  在你的软件开发同事之间达成共识，确保整个团队使用相同的语言。\n\n2.  将此类偏离（连同整个符号体系）记录并传达给你的客户/用户，以便他们也能理解你特定的“方言”。\n\
    \n3.  确保此类文档被纳入项目的完整文档集，以便未来的文档审阅者能立即理解你的符号“修饰”。\n\n然而，如果你让这些增强足够直观，它们可能不言自明。\n\
    \n当然，正如第 8 章所指出的，你还需要考虑你正在使用的 CASE 工具（如果有的话）是否支持此类修改。\n\n在本书第二部分的各个章节中，我会反复提醒你：调整或扩展你选择采用的任何流程、符号或工具，以最好地适应你公司或项目的目的，是完全可接受的；这些方法论组件中没有一个是“神圣不可侵犯的”。\n\
    \n## 指定用例\n\n在初步确定了 SRS 的参与者之后，接下来我们将列举这些参与者将如何使用系统的各种方式——换句话说，就是用例本身。\n\n一个用例代表一个逻辑“线程”，或一系列因果事件，始于参与者与系统的首次接触，止于该参与者最初使用系统的目标达成。请注意，参与者总是发起一个用例；系统代表自身发起的操作不值得开发一个用例（尽管它们确实值得作为功能需求或技术需求来表达，正如本章前面所定义的）。\n\
    \n用例强调系统“要做什么”——即功能需求——而不关心这些功能在内部“如何”实现，在这方面它们与方法签名并无不同。事实上，你可以将用例视为整个系统的“行为签名”。\n\
    \nSRS 的一些高级用例示例可能包括：\n\n*   注册一门课程。\n*   退选一门课程。\n*   确定学生的课程负荷。\n*   选择一位指导教师。\n\
    *   制定学习计划。\n*   查看课程表。\n*   请求某门课程的学生名单。\n*   请求某位学生的成绩单。\n*   维护课程信息（例如，更改课程描述、反映不同的授课教师等）。\n\
    *   确定学生的毕业资格。\n*   发布某门课程的期末成绩。\n\n请记住，用例是由参与者发起的，这就是为什么我没有将 SRS 需求规范中提到的其他功能（例如“通过电子邮件通知学生”）列为用例的原因。\n\
    \n我们可以将任何一个用例分解为多个步骤，每个步骤代表一个更详细的用例。例如，“注册一门课程”可以分解为以下步骤：\n\n1.  验证学生是否已满足先修课程要求。\n\
    2.  检查学生的学习计划，确保该课程是必修课。\n3.  检查课程是否有空余座位。\n4.  （可选）将学生列入候补名单。\n5.  等等。\n\n用例之间可以以父子关系相互关联，更详细的用例可以被多个通用用例共享。例如，“请求学生名单”和“发布期末成绩”这两个通用用例都可能涉及更详细的“验证教授正在教授该课程”这一用例。\n\
    \n不幸的是，与所有需求分析一样，没有神奇的公式可以应用来判断你是否已经识别出所有重要的用例或所有参与者，以及/或者你是否在子用例方面达到了足够的深度。用例开发的过程是迭代的；当后续迭代未能产生实质性变化时，你可能就完成了！与用户进行大量的访谈和评审，以及定期对整个用例集进行团队走查，对于确保没有遗漏任何重要内容大有裨益。\n"
- fmt: "# Matching Up Use Cases with Actors\n\nThe next important step is to match\
    \ up use cases with actors. The relationship between actors and use cases is potentially\
    \ many-to-many in that the same actor may initiate many different use cases and\
    \ a single use case may be relevant to many different actors. By cross-referencing\
    \ actors with use cases, we ensure that\n\n- We didn’t identify an actor who,\
    \ in the final analysis, really has no use for the system after all.\n- Conversely,\
    \ we didn’t specify a use case that nobody really cares about after all.\n\nFor\
    \ each use case–actor combination, it’s useful to determine whether the actor\
    \ consumes information and/or provides information. Another way to view this aspect\
    \ of a system is whether actors need write access (providing) to the system’s\
    \ information resources vs. having read-only access (consuming).\n\nIf the number\
    \ of actors and/or use cases isn’t prohibitive, a simple table such as Table [9-1](#78624_3_En_9_Chapter.xhtml#Tab1)\
    \ can be used to summarize all of the preceding.\n\n**Table 9-1** A Simple Actor/Use\
    \ Case Cross-Referencing Technique\n\n| Initiating Actor ==> | Student | Faculty\
    \ | Billing System | Etc. |\n| --- | --- | --- | --- | --- |\n| Use case: | |\
    \ | | |\n| **Register for a course** | Provides info | N/A | N/A | |\n| **Post\
    \ final grades** | Consumes info | Provides info | N/A | |\n| **Request a transcript**\
    \ | Consumes info | Consumes info | N/A | |\n| Etc. | | | | |\n\n# To Diagram\
    \ or Not to Diagram?\n\nThe use case concept is fairly straightforward, and hence\
    \ simple narrative text as we’ve seen thus far in the chapter is often sufficient\
    \ for expressing use cases. UML does, however, provide a formal means for diagramming\
    \ use cases and their interactions with actors. As mentioned earlier, actors (whether\
    \ people or systems) are represented as stick figures; use cases are represented\
    \ as ovals labeled underneath with a brief phrase describing the use case; and\
    \ the box surrounding the oval(s) represents the system boundaries.\n\nFigure\
    \ [9-3](#78624_3_En_9_Chapter.xhtml#Fig3) shows a sample UML use case diagram.\
    \ Here, we depict three actors—Student, Faculty, and Registrar—as having occasion\
    \ to participate individually in the `Request Transcript` use case.\n\n![](images/78624_3_En_9_Chapter/78624_3_En_9_Fig3_HTML.jpg)\n\
    \nA diagram of 3 stick figures of the student, faculty, and registrar is mapped\
    \ to a block of request transcript.\n\n**Figure 9-3** A sample UML use case diagram\n\
    \nWhen deciding whether or not to go to the trouble of diagramming your use cases\
    \ rather than merely expressing them in narrative form, think back to the rationale\
    \ for producing use cases in the first place: namely, to think through the software\
    \ development team’s understanding of the system requirements and to then communicate\
    \ to the users/sponsors in order to obtain consensus. It’s up to you, your project\
    \ team, and your users/sponsors to determine whether diagrams enhance this process\
    \ or not. If they do, use them; if they don’t, go with narrative use case documentation\
    \ instead.\n\nOnce you’ve documented a system’s actors and use cases, whether\
    \ in text alone or with accompanying diagrams, these become part of the core documentation\
    \ set defining the problem to be automated. In the next chapter, we’ll examine\
    \ how to use such documentation as a starting point for determining what classes\
    \ we’ll need to create and instantiate as our system “building blocks.”\n\n# Summary\n\
    \nIn this chapter, you’ve seen that\n\n- Use case analysis is a simple yet powerful\
    \ technique for specifying the requirements for a system more precisely and completely.\n\
    - Use cases are based upon the goal-oriented functional requirements for a system.\n\
    - Use cases are used to describe\n  - The desired behavior/functionality of the\
    \ system to be built\n  - The external users or systems (known as actors) who\
    \ avail themselves of these services\n  - The interactions between the two\n\n\
    # EXERCISES\n\n1. Determine the actors that might be appropriate for the Prescription\
    \ Tracking System (PTS) case study discussed in the Appendix.\n\n2. For the problem\
    \ area whose requirements you defined for Exercise 3 in Chapter [1](#78624_3_En_1_Chapter.xhtml),\
    \ determine who the appropriate actors might be.\n\n3. Based on the PTS specification\
    \ in the Appendix, list (a) the use cases that are explicitly called for by the\
    \ specification and (b) any additional use cases that you suspect might be worth\
    \ exploring with the future users of the system.\n\n4. Repeat Exercise 3, but\
    \ in the context of the problem area whose requirements you defined for Exercise\
    \ 3 in Chapter [1](#78624_3_En_1_Chapter.xhtml).\n\n5. Create a table mapping\
    \ the actors you identified for the PTS in Exercise 1 to the use cases you listed\
    \ for the PTS in Exercise 3, indicating whether a particular actor’s participation\
    \ in a use case is as an information provider or a consumer.\n\n6. Create a table\
    \ mapping the actors you identified in Exercise 2 to the use cases you listed\
    \ in Exercise 4, indicating whether a particular actor’s participation in a use\
    \ case is as an information provider or an information consumer."
