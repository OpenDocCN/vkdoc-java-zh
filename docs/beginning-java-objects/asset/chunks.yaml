    // Constructor(s).

    //----------------

    public TranscriptEntry(Student s, String grade, Section se) {

    this.setStudent(s);

    ```


    Note that we have chosen ***not*** to maintain the *earns grade* association bidirectionally;
    that is, we have provided no code in either this or the `Student` class to provide
    the `Student` object with a handle on this `TranscriptEntry` object. This decision
    was based upon the fact that we don’t expect a `Student` to ever have to manipulate
    `TranscriptEntry` objects directly. Every `Student` object has an indirect means
    of reaching all of its `TranscriptEntry` objects, via the handle that a `Student`
    object maintains on its `Transcript` object as a whole and the handles that the
    `Transcript` object in turn maintains on its `TranscriptEntry` objects. You might
    think that giving a `Student` object the ability to directly pull a given `TranscriptEntry`
    might be useful when we want to determine the grade that the `Student` earned
    for a particular `Section`, but we have provided an alternative means of doing
    so, via the `Section` class’s `getGrade` method.


