  raw: '### Interfaces and Polymorphism


    Let’s look at an example of polymorphism as it applies to interfaces. We’ll assume
    that


    *   The `Professor` and `Student` classes are both derived from the `Person` class.


    *   `Professor` and `Student` are sibling classes—neither derives from the other.


    *   `Person` implements the `Teacher` interface, and thus by virtue of inheritance,
    both `Professor` and `Student` ***implicitly*** implement the `Teacher` interface.


    We may declare a collection to hold `Teacher` references and then populate it
    with a mixture of `Student` and `Professor` object references as follows:


    ```

    ArrayList teachers = new ArrayList();

    teachers.add(new Student("Becky Elkins"));

    teachers.add(new Professor("Bobby Cranston"));

    // etc.

    ```


    We may then iterate through the `teachers` collection in polymorphic fashion,
    referring to all of its elements as `Teacher`s


    ```

    for (Teacher t : teachers) {

    // This line of code is polymorphic.

    t.agreeToTeach(c);

    }

    ```


    because we constrained the collection to contain only `Teacher`-type object references
    when we first declared it.


    ### The Importance of Interfaces


    Interfaces are one of the most poorly understood, and hence underused, features
    of the OO programming languages that support them. This is quite unfortunate,
    as interfaces are extremely powerful if used properly.


    Whenever possible/feasible in developing an application, if we use ***interface***
    types rather than specific class types in declaring


    *   (Private) Attributes


    *   Formal parameters to methods


    *   Method return types


    our classes will be more flexible in terms of how client code can use them. Let’s
    explore two different examples to see why this is so.


    #### Example #1


    In this example, let’s assume that


    *   The `Professor` and `Student` classes are both immediate subclasses of `Person`,
    along with a third subclass, `Janitor`.


    *   In this example, `Person` does ***not*** implement the `Teacher` interface,
    because we don’t wish to designate either `Janitor`s or `Student`s as `Teacher`s;
    instead, we have the `Professor` class (only) ***explicitly*** implement the `Teacher`
    interface.


    The four class declarations are as follows:


    ```

    public class Person { ... }

    // Only Professors are Teachers in this example.

    public class Professor extends Person implements Teacher { ... }

    public class Student extends Person { ... }

    public class Janitor extends Person { ... }

    ```


    Next, we’ll design a class called `Course` with a `private` attribute of type
    `Professor` called `instructor`, along with accessor methods for this attribute:


    ```

    public class Course {

    private Professor instructor;

    // Other attributes omitted from this example ...

    public Professor getInstructor() {

    return instructor;

    }

    public void setInstructor(Professor p) {

    instructor = p;

    }

    // Other methods omitted from this example ...

    }

    ```


    We’d then perhaps use this class from client code as follows to assign a specific
    `Professor` to teach a specific `Course`:


    ```

    // Client code.

    Course c = new Course("Math 101");

    Professor p = new Professor("John Smith");

    c.setInstructor(p);

    ```


    Let’s say that at some future date the university decides to permit selected students
    to teach courses. To implement this new business rule, we derive a new subclass
    of `Student` called `StudentInstructor` and have it implement the `Teacher` interface.
    Our classes are thus as follows:


    ```

    public class Person { ... }

    // Professors are Teachers ...

    public class Professor extends Person implements Teacher { ... }

    public class Student extends Person { ... }

    // ... and now selected Students are Teachers, as well!

    public class StudentInstructor extends Student implements Teacher { ... }

    public class Janitor extends Person { ... }

    ```


    We would not be able to assign a `StudentInstructor` to teach a `Course` given
    the current design of our `Course` class, however, because a `StudentInstructor`
    is not a `Professor` in terms of our class hierarchy; that is, the following client
    code would not compile:


    ```

    Course c = new Course("Math 101");

    StudentInstructor si = new StudentInstructor("Mary Jones");

    // An attempt to assign a student as an instructor won''t compile.

    c.setInstructor(si);

    ```


    We’d get the following compilation error:


    ```

    setInstructor(Professor) in Course cannot be applied to StudentInstructor

    ```


    Now, let’s look at an improvement to our original `Course` class design. Instead
    of declaring the `instructor` attribute of `Course` to be of type `Professor`
    (a specific ***class*** type), let’s declare it to be of type `Teacher` (an ***interface***
    type) instead. We’ll also adjust the return type of the “`get`” method and the
    parameter type of the “`set`” method for this attribute accordingly:


    ```

    public class Course {

    // We''ve changed our declaration of the instructor attribute to take

    // advantage of an interface type.

    private Teacher instructor;

    // Other attributes omitted from this example ...

    // We make a corresponding change to the return type of our get method ...

    public Teacher getInstructor() {

    return instructor;

    }

    // ... and to the type of the parameter that we pass into the set method.

    public void setInstructor(Teacher t) {

    instructor = t;

    }

    // Other methods omitted from this example ...

    }

    ```


    We’re thus opening up more possibilities for client code. Using our improved `Course`
    class design, we can assign a `Professor` as an instructor for a `Course`


    ```

    // Client code.

    Course c = new Course("Math 101");

    Professor p = new Professor("John Smith");

    c.setInstructor(p);

    ```


    or a `StudentInstructor` as an instructor for a `Course`


    ```

    // Client code.

    Course c = new Course("Math 101");

    StudentInstructor si = new StudentInstructor("George Jones");

    c.setInstructor(si);

    ```


    or a reference `x` to any other ***future*** type of object as yet to be invented


    ```

    c.setInstructor(x);

    ```


    as long as `x` is an instance of a class that implements the `Teacher` interface.


    We can therefore see that using an interface type when declaring


    *   The (private) `instructor` attribute of `Course`


    *   The parameter passed into the `setInstructor` method of `Course`


    *   The return types of the `getInstructor` method


    results in a much more flexible design for our application overall.'
  trans: '

    ### 接口与多态


    让我们看一个多态应用于接口的示例。我们假设：


    *   `Professor` 和 `Student` 类都派生自 `Person` 类。

    *   `Professor` 和 `Student` 是同级类——两者互不派生。

    *   `Person` 实现了 `Teacher` 接口，因此通过继承关系，`Professor` 和 `Student` 都***隐式地***实现了 `Teacher`
    接口。


    我们可以声明一个集合来保存 `Teacher` 引用，然后用 `Student` 和 `Professor` 对象引用的混合体填充它，如下所示：


    ```

    ArrayList teachers = new ArrayList();

    teachers.add(new Student("Becky Elkins"));

    teachers.add(new Professor("Bobby Cranston"));

    // 等等

    ```


    然后，我们可以以多态的方式遍历 `teachers` 集合，将其所有元素视为 `Teacher` 类型：


    ```

    for (Teacher t : teachers) {

    // 这行代码是多态的。

    t.agreeToTeach(c);

    }

    ```


    因为我们在首次声明该集合时，就将其约束为仅包含 `Teacher` 类型的对象引用。


    ### 接口的重要性


    接口是支持它们的面向对象编程语言中最被误解、因而也最未被充分利用的特性之一。这非常可惜，因为如果使用得当，接口会非常强大。


    在开发应用程序时，只要可能/可行，如果我们使用***接口***类型而不是特定的类类型来声明：


    *   （私有）属性

    *   方法的形参

    *   方法的返回类型


    那么我们的类在客户端代码如何使用它们方面将更加灵活。让我们通过两个不同的示例来探究原因。


    #### 示例 #1


    在此示例中，我们假设：


    *   `Professor` 和 `Student` 类都是 `Person` 的直接子类，此外还有第三个子类 `Janitor`。

    *   在此示例中，`Person` ***不***实现 `Teacher` 接口，因为我们不希望将 `Janitor` 或 `Student` 指定为 `Teacher`；相反，我们让
    `Professor` 类（仅此一个）***显式地***实现 `Teacher` 接口。


    这四个类的声明如下：


    ```

    public class Person { ... }

    // 在此示例中，只有教授是教师。

    public class Professor extends Person implements Teacher { ... }

    public class Student extends Person { ... }

    public class Janitor extends Person { ... }

    ```


    接下来，我们将设计一个名为 `Course` 的类，它有一个类型为 `Professor` 的 `private` 属性 `instructor`，以及该属性的访问器方法：


    ```

    public class Course {

    private Professor instructor;

    // 此示例中省略了其他属性 ...

    public Professor getInstructor() {

    return instructor;

    }

    public void setInstructor(Professor p) {

    instructor = p;

    }

    // 此示例中省略了其他方法 ...

    }

    ```


    然后，我们可能会在客户端代码中使用此类，为特定的 `Course` 分配特定的 `Professor` 来授课：


    ```

    // 客户端代码。

    Course c = new Course("Math 101");

    Professor p = new Professor("John Smith");

    c.setInstructor(p);

    ```


    假设在未来的某个时候，大学决定允许选定的学生授课。为了实现这个新的业务规则，我们派生出一个名为 `StudentInstructor` 的 `Student`
    新子类，并让它实现 `Teacher` 接口。因此，我们的类如下所示：


    ```

    public class Person { ... }

    // 教授是教师 ...

    public class Professor extends Person implements Teacher { ... }

    public class Student extends Person { ... }

    // ... 现在选定的学生也是教师了！

    public class StudentInstructor extends Student implements Teacher { ... }

    public class Janitor extends Person { ... }

    ```


    然而，鉴于我们当前 `Course` 类的设计，我们无法将 `StudentInstructor` 分配给 `Course` 来授课，因为 `StudentInstructor`
    在我们的类层次结构中不是 `Professor`；也就是说，以下客户端代码将无法编译：


    ```

    Course c = new Course("Math 101");

    StudentInstructor si = new StudentInstructor("Mary Jones");

    // 尝试将学生分配为讲师将无法编译。

    c.setInstructor(si);

    ```


    我们会得到以下编译错误：


    ```

    setInstructor(Professor) in Course cannot be applied to StudentInstructor

    ```


    现在，让我们看看对原始 `Course` 类设计的改进。我们不将 `Course` 的 `instructor` 属性声明为 `Professor` 类型（一种特定的***类***类型），而是将其声明为
    `Teacher` 类型（一种***接口***类型）。我们还将相应调整此属性的“`get`”方法的返回类型和“`set`”方法的参数类型：


    ```

    public class Course {

    // 我们更改了 instructor 属性的声明，以利用接口类型。

    private Teacher instructor;

    // 此示例中省略了其他属性 ...

    // 我们对 get 方法的返回类型进行相应的更改 ...

    public Teacher getInstructor() {

    return instructor;

    }

    // ... 并对传入 set 方法的参数类型进行更改。

    public void setInstructor(Teacher t) {

    instructor = t;

    }

    // 此示例中省略了其他方法 ...

    }

    ```


    因此，我们为客户端代码开辟了更多可能性。使用改进后的 `Course` 类设计，我们可以将 `Professor` 分配为 `Course` 的讲师：


    ```

    // 客户端代码。

    Course c = new Course("Math 101");

    Professor p = new Professor("John Smith");

    c.setInstructor(p);

    ```


    或者将 `StudentInstructor` 分配为 `Course` 的讲师：


    ```

    // 客户端代码。

    Course c = new Course("Math 101");

    StudentInstructor si = new StudentInstructor("George Jones");

    c.setInstructor(si);

    ```


    或者将引用 `x` 分配给任何其他***未来***尚未发明的对象类型：


    ```

    c.setInstructor(x);

    ```


    只要 `x` 是实现了 `Teacher` 接口的类的实例即可。


    因此，我们可以看到，在声明以下内容时使用接口类型：


    *   `Course` 的（私有）`instructor` 属性

    *   传入 `Course` 的 `setInstructor` 方法的参数

    *   `getInstructor` 方法的返回类型


    会使得我们整个应用程序的设计更加灵活。

