- fmt: '### Strings Are Immutable


    Strings are said to be **immutable**: that is, the value of a particular `String`
    object cannot be changed once it has first been assigned at the time of instantiation.
    When we ***seem*** to be programmatically modifying an existing `String` object’s
    value, we are actually creating a ***new*** `String` object with the desired value.


    Let’s look at an example of how this works. The following line of code would result
    in a `String` object with the value `"Foo"` being created somewhere in memory,
    as illustrated in Figure [13-8](#78624_3_En_13_Chapter.xhtml#Fig8):


    ![](images/78624_3_En_13_Chapter/78624_3_En_13_Fig8_HTML.png)


    An illustration of a balloon that has the word foo written inside it, and a thread
    tied to the balloon with the label x at the tip of the thread.


    Figure 13-8


    A `String` object has been instantiated with the literal value `"Foo"`


    ```

    String x = "Foo";

    ```


    Continuing our example, this next line of code would result in a ***second***
    `String` object with the value `"Foobar!"` being created somewhere else in memory:


    ```

    // We''re not really CHANGING the value of the specific String object

    // originally referenced by x; rather, we''re creating a new String

    // object with the desired value for x to reference.

    x = x + "bar!";

    ```


    The original `"Foo"` `String` would still exist for some period of time, but is
    no longer directly accessible to us by reference and will soon be garbage collected
    — see Figure [13-9](#78624_3_En_13_Chapter.xhtml#Fig9).


    ![](images/78624_3_En_13_Chapter/78624_3_En_13_Fig9_HTML.png)


    An illustration that includes two balloons connected by threads. The first balloon
    contains the word foobar and has a thread tied to it with the label x at the tip.
    The second balloon is labeled "foo" and is located above the foobar balloon, with
    the thread crossing at the bottom.


    Figure 13-9


    When we assign a new value to `String` reference `x`, we’re actually instantiating
    a new `String` object


    While the net result is the same from the programmer’s perspective — namely, that
    the value of `x` will now be `"Foobar!"` as far as we’re concerned


    ```

    System.out.println(x);

    ```


    Output:


    ```

    Foobar!

    ```


    the implication of this behind-the-scenes phenomenon is that building up long
    `String` values through iterative `String` concatenation can be quite inefficient.
    As an example, consider the following code:


    ```

    // Initialize s to an empty String.

    String s = "";

    for (int x = 0; x < 10; x++) {

    // Append another digit to s.

    s = s + x;

    }

    System.out.println(s);

    ```


    Output:


    ```


    ```


    With each successive iteration of the preceding `for` loop, we “change” the value
    of `s` by creating yet another `String` object: `"0"` in the first iteration,
    `"01"` in the second iteration, and so forth. By the time the loop is finished,
    we’ll have created ***ten separate*** **String** ***objects***, ***nine*** of
    which are waiting around to be garbage collected! This is illustrated in Figure
    [13-10](#78624_3_En_13_Chapter.xhtml#Fig10).


    ![](images/78624_3_En_13_Chapter/78624_3_En_13_Fig10_HTML.jpg)


    An illustration that includes 10 balloons connected by threads. The first balloon
    contains the number 0123456789 and has a thread tied to it with the label x at
    the tip. The second through tenth balloons are labeled with the numbers 0, 01,
    012, 0123, 01234, 012345, 0123456, 01234567, and 012345678, respectively. These
    balloons are located around the first balloon and are connected by threads that
    cross at the bottom, except for the first balloon with the numbers 0 to 9.


    Figure 13-10


    Using `String` concatenation iteratively can be inefficient


    For this reason, the `java.util` package provides a special-purpose class for
    iteratively building up the value of a single `String` instance: the `StringBuffer`
    class.


    ### The StringBuffer Class


    Let’s rewrite our previous example of concatenating digits using the `StringBuffer`
    class instead; remember that we’d have to include the `import` directive


    ```

    import java.util.StringBuffer;

    ```


    in whatever class this code is found:


    ```

    // Instantiate an empty StringBuffer.

    StringBuffer sb = new StringBuffer();

    for (int x = 0; x < 10; x++) {

    // Append another digit to sb.

    sb.append(x);

    }

    // Extract the new String value from the StringBuffer.

    String result = sb.toString();

    // Let''s see what we got!

    System.out.println(result);

    ```


    Our output will be the same as with the previous example:


    ```


    ```


    However, by switching to the `StringBuffer` approach of incremental `String` concatenation,
    we’ve instantiated only one object — a single `StringBuffer` — rather than creating
    ten `String` objects, nine of which are effectively wasted, as was the case with
    the previous version of this code (recall Figure [13-10](#78624_3_En_13_Chapter.xhtml#Fig10)).
    When the number of iterations increases — say, from 10 to 10,000 — the performance
    improvement in using a `StringBuffer` can be dramatic.


    Note that once we’ve finished “assembling” the `String` value of interest in a
    `StringBuffer`, we use the `toString` method of the `StringBuffer` class to extract
    the value as a `String` object:


    ```

    String result = sb.toString();

    ```


    We may use the `add` method of the `StringBuffer` class to append expressions
    of literally any type to a `StringBuffer` instance, because the `add` method is
    overloaded: there’s a version that accepts a `String` expression as an argument,
    a version that accepts an `int` expression, and so forth.'
  raw: '### Strings Are Immutable


    Strings are said to be **immutable**: that is, the value of a particular `String`
    object cannot be changed once it has first been assigned at the time of instantiation.
    When we ***seem*** to be programmatically modifying an existing `String` object’s
    value, we are actually creating a ***new*** `String` object with the desired value.


    Let’s look at an example of how this works. The following line of code would result
    in a `String` object with the value `"Foo"` being created somewhere in memory,
    as illustrated in Figure [13-8](#78624_3_En_13_Chapter.xhtml#Fig8):


    ![](images/78624_3_En_13_Chapter/78624_3_En_13_Fig8_HTML.png)


    An illustration of a balloon that has the word foo written inside it, and a thread
    tied to the balloon with the label x at the tip of the thread.


    Figure 13-8


    A `String` object has been instantiated with the literal value `"Foo"`


    ```

    String x = "Foo";

    ```


    Continuing our example, this next line of code would result in a ***second***
    `String` object with the value “`Foobar!`” being created somewhere else in memory:


    ```

    // We''re not really CHANGING the value of the specific String object

    // originally referenced by x; rather, we''re creating a new String

    // object with the desired value for x to reference.

    x = x + "bar!";

    ```


    The original “`Foo`” `String` would still exist for some period of time, but is
    no longer directly accessible to us by reference and will soon be garbage collected`—`see
    Figure [13-9](#78624_3_En_13_Chapter.xhtml#Fig9).


    ![](images/78624_3_En_13_Chapter/78624_3_En_13_Fig9_HTML.png)


