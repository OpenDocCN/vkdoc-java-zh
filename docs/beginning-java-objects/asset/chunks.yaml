    \nA diagram of 3 stick figures of the student, faculty, and registrar is mapped\
    \ to a block of request transcript.\n\nFigure 9-3\n\nA sample UML use case diagram\n\
    \nWhen deciding whether or not to go to the trouble of diagramming your use cases\
    \ rather than merely expressing them in narrative form, think back to the rationale\
    \ for producing use cases in the first place: namely, to think through the software\
    \ development team’s understanding of the system requirements and to then communicate\
    \ to the users/sponsors in order to obtain consensus. It’s up to you, your project\
    \ team, and your users/sponsors to determine whether diagrams enhance this process\
    \ or not. If they do, use them; if they don’t, go with narrative use case documentation\
    \ instead.\n\nOnce you’ve documented a system’s actors and use cases, whether\
    \ in text alone or with accompanying diagrams, these become part of the core documentation\
    \ set defining the problem to be automated. In the next chapter, we’ll examine\
    \ how to use such documentation as a starting point for determining what classes\
    \ we’ll need to create and instantiate as our system “building blocks.”\n\n##\
    \ Summary\n\nIn this chapter, you’ve seen that\n\n*   Use case analysis is a simple\
    \ yet powerful technique for specifying the requirements for a system more precisely\
    \ and completely.\n\n*   Use cases are based upon the goal-oriented functional\
    \ requirements for a system.\n\n*   Use cases are used to describe\n    *   The\
    \ desired behavior/functionality of the system to be built\n\n    *   The external\
    \ users or systems (known as actors) who avail themselves of these services\n\n\
    \    *   The interactions between the two\n\nEXERCISES\n\n1.  Determine the actors\
    \ that might be appropriate for the Prescription Tracking System (PTS) case study\
    \ discussed in the Appendix.\n\n2.  For the problem area whose requirements you\
    \ defined for Exercise 3 in Chapter [1](#78624_3_En_1_Chapter.xhtml), determine\
    \ who the appropriate actors might be.\n\n3.  Based on the PTS specification in\
    \ the Appendix, list (a) the use cases that are explicitly called for by the specification\
    \ and (b) any additional use cases that you suspect might be worth exploring with\
    \ the future users of the system.\n\n4.  Repeat Exercise 3, but in the context\
    \ of the problem area whose requirements you defined for Exercise 3 in Chapter\
    \ [1](#78624_3_En_1_Chapter.xhtml).\n\n5.  Create a table mapping the actors you\
    \ identified for the PTS in Exercise 1 to the use cases you listed for the PTS\
    \ in Exercise 3, indicating whether a particular actor’s participation in a use\
    \ case is as an information provider or a consumer.\n\n6.  Create a table mapping\
    \ the actors you identified in Exercise 2 to the use cases you listed in Exercise\
    \ 4, indicating whether a particular actor’s participation in a use case is as\
    \ an information provider or an information consumer."
  trans: "\n## 将用例与参与者对应起来\n\n下一步重要的工作是将用例与参与者对应起来。参与者和用例之间的关系可能是多对多的，即同一个参与者可能发起多个不同的用例，而一个用例也可能与多个不同的参与者相关。通过将参与者与用例进行交叉引用，我们可以确保：\n\
    \n*   我们不会识别出那些最终对系统毫无用处的参与者。\n*   反之，我们也不会指定那些最终无人关心的用例。\n\n对于每个用例-参与者组合，确定参与者是消费信息还是提供信息是很有用的。从另一个角度来看待系统的这一方面，就是判断参与者是需要对系统信息资源进行写入访问（提供信息），还是只拥有只读访问权限（消费信息）。\n\
    \n如果参与者和/或用例的数量不算太多，可以使用一个简单的表格（例如表 9-1）来总结上述所有内容。\n\n**表 9-1**\n\n**一种简单的参与者/用例交叉引用技术**\n\
    \n| 发起参与者 ==> | 学生 | 教师 | 计费系统 | 等等 |\n| --- | --- | --- | --- | --- |\n| 用例：\
    \ |  |  |  |  |\n| **注册课程** | 提供信息 | 不适用 | 不适用 |  |\n| **发布最终成绩** | 消费信息 | 提供信息\
    \ | 不适用 |  |\n| **申请成绩单** | 消费信息 | 消费信息 | 不适用 |  |\n| 等等 |  |  |  |  |\n\n## 画图还是不画图？\n\
    \n用例的概念相当直接，因此本章到目前为止所看到的简单叙述性文本通常足以表达用例。然而，UML 确实提供了一种正式的方法来绘制用例图及其与参与者的交互。如前所述，参与者（无论是人还是系统）用火柴人表示；用例用椭圆表示，椭圆下方用简短的短语描述该用例；而包围椭圆的方框代表系统边界。\n\
    \n图 9-3 展示了一个示例 UML 用例图。在这里，我们描绘了三个参与者——学生、教师和注册员——他们各自都有机会参与到“申请成绩单”这个用例中。\n\n\
    ![](img/78624_3_En_9_Fig3_HTML.jpg)\n\n一个包含学生、教师和注册员三个火柴人的图表，映射到一个“申请成绩单”的方框上。\n\
    \n**图 9-3**\n\n**一个示例 UML 用例图**\n\n在决定是否要费心绘制用例图，而不是仅仅用叙述形式表达它们时，请回想一下最初创建用例的理由：即，梳理软件开发团队对系统需求的理解，然后与用户/赞助方沟通以达成共识。由你、你的项目团队以及你的用户/赞助方来决定图表是否能增强这个过程。如果能，就使用它们；如果不能，就改用叙述性的用例文档。\n\
    \n一旦你记录了系统的参与者和用例，无论是仅通过文本还是附带了图表，这些都将成为定义待自动化问题的核心文档集的一部分。在下一章中，我们将探讨如何以这类文档为起点，来确定我们需要创建和实例化哪些类，作为系统的“构建块”。\n\
    \n## 总结\n\n在本章中，你了解到：\n\n*   用例分析是一种简单而强大的技术，用于更精确、更完整地指定系统需求。\n*   用例基于系统的目标导向功能需求。\n\
    *   用例用于描述：\n    *   待构建系统的期望行为/功能\n    *   使用这些服务的外部用户或系统（称为参与者）\n    *   两者之间的交互\n\
    \n**练习题**\n\n1.  确定可能适用于附录中讨论的处方跟踪系统（PTS）案例研究的参与者。\n2.  针对你在第 1 章练习 3 中定义其需求的问题领域，确定哪些是合适的参与者。\n\
    3.  基于附录中的 PTS 规范，列出 (a) 规范中明确要求的用例，以及 (b) 你认为值得与系统未来用户探讨的任何额外用例。\n4.  重复练习 3，但针对你在第\
    \ 1 章练习 3 中定义其需求的问题领域。\n5.  创建一个表格，将你在练习 1 中为 PTS 确定的参与者映射到你在练习 3 中为 PTS 列出的用例，并指明特定参与者在某个用例中是作为信息提供者还是消费者。\n\
    6.  创建一个表格，将你在练习 2 中确定的参与者映射到你在练习 4 中列出的用例，并指明特定参与者在某个用例中是作为信息提供者还是信息消费者。\n"
