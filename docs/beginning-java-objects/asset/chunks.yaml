    # 5. 对象之间的关系


    关联与链接 多重性 多重性与链接 聚合与组合 继承 通过新抽象来应对需求变化 （不恰当的）方法 #1：修改 Student 类 （不恰当的）方法 #2：“克隆”Student
    类以创建 GraduateStudent 类 正确的方法（#3）：利用继承 继承的“is a”本质 继承的好处 类的层次结构 Object 类 继承真的是一种关系吗？
    避免类层次结构中的“连锁反应” 派生类的规则：“应该做的事” 覆盖 复用超类行为：“super”关键字 派生类的规则：“不应该做的事” 私有特性与继承 继承与构造函数
    关于多重继承的几点说明 再谈面向对象编程语言的三个显著特征 总结


    你在第 4 章中了解到，任意两个对象之间可以存在一种“短暂的”关系，这种关系基于它们交换消息的事实，就像两个在街上擦肩而过的陌生人可能会互相说“你好！”一样。我们非正式地将这种对象之间的关系称为**行为关系**，因为它们源于一个对象
    X 相对于另一个对象 Y 所采取的行为或动作。


    在行为关系中，对象 X 要么临时获得一个指向对象 Y 的引用作为方法调用的参数，要么临时向另一个对象 Z 请求一个指向 Y 的句柄。然而，重点在于***临时***：当
    X 与 Y 通信完毕后，对象 X 通常会丢弃对 Y 的引用。


    就像你与某些人（家人、朋友、同事）之间存在重要且更持久的关系一样，对象之间也存在一种更持久的关系概念。我们非正式地将这种关系称为**结构关系**，因为为了跟踪这种关系，一个对象实际上会以属性的形式维护对其相关对象的长期引用，这是我们在第
    3 章中讨论过的一种技术。


    在本章中，你将学习


    *   可以在类之间定义的各种结构关系，这些关系反过来决定了在运行时各个对象如何相互链接


    *   一种称为**继承**的强大面向对象编程语言机制，它使我们能够仅通过描述新类与现有类的不同之处来派生新类


    *   通过继承派生类时，哪些可以做、哪些不可以做的规则


    *   当继承生效时，我们必须如何完善对 (a) 构造函数和 (b) 特性可访问性的理解


    ## 关联与链接


    存在于类之间的结构关系的正式名称是**关联**。对于学生注册系统，一些示例关联可能如下：


    *   一个 `Student` ***注册了*** 一个 `Course`。


    *   一个 `Professor` ***教授*** 一个 `Course`。


    *   一个 `DegreeProgram` ***要求*** 一个 `Course`。


    关联指的是***类***之间的关系，而术语**链接**则用于指存在于两个特定***对象***（***实例***）之间的结构关系。给定关联“一个 `Student`
    ***注册了*** 一个 `Course`”，我们可能有以下链接：


    *   Chloe Shylow（一个特定的 `Student` 对象）注册了 Math 101（一个特定的 `Course` 对象）。


    *   Fred Schnurd（一个特定的 `Student` 对象）注册了 Basketweaving 972（一个特定的 `Course` 对象）。


    *   Mary Smith（一个特定的 `Student` 对象）注册了 Basketweaving 972（一个特定的 `Course` 对象——事实证明，这是与
    Fred Schnurd 链接的***同一个*** `Course` 对象）。


    正如一个对象是一个类的特定实例，其属性值已被填充一样，链接在概念上可以被视为一个关联的特定实例，其参与对象已被填充，如图 5-1 所示。


    ![](img/78624_3_En_5_Fig1_HTML.jpg)


    一个用于创建链接的模板。它由一段文本组成，内容为：关联，空白处 注册了 空白处。下面一行写着：链接，James Conroy 注册了 Physics E D
    311。


    图 5-1


    关联是创建链接的模板


    另一种理解关联与链接之间区别的方式是：


    *   关联是某种类型/类的对象之间的一种***潜在***关系。


    *   链接是那些特定类型的对象之间的一种***实际***关系。


    例如，给定任意一个 `Student` 对象 X 和任意一个 `Course` 对象 Y，这两个对象之间***存在***一种 *注册了* 类型的链接的***可能性***，这***正是因为***在这两个对象所属的类之间定义了一个
    *注册了* 的关联。换句话说，***关联使链接成为可能***。


    大多数关联存在于两个***不同***的类之间；这种关联被称为**二元关联**。例如，*注册了* 关联就是一个二元关联，因为它关联了两个不同的类——`Student`
    和 `Course`。另一方面，**一元关联**，或**自反关联**，则存在于***同一个类***的两个实例之间，例如：


    *   一个 `Course` ***是***（另一个）`Course` 的***先修课程***。


    *   一个 `Professor` ***指导***（其他）`Professor`。


    尽管自反关联两端指定的类是相同的，但***对象***通常是该类的不同实例：


    *   Math 101（一个 `Course` 对象）是 Math 202（一个***不同的*** `Course` 对象）的先修课程。


    *   Smith 教授（一个 `Professor` 对象）指导 Jones 教授和 Green 教授（其他 `Professor` 对象）。


    虽然比较罕见，但也可能存在***同一个***对象在自反关系中扮演两个角色的情况。例如，对于关联“一个 Professor ***是代表其他 Professor
    的主席***”，某个特定院系的主席教授将是他们自己的代表。


    更高阶的关联也是可能的。**三元关联**涉及三个类——例如，“一个 `Student` 从某个特定的 `Professor` 那里修读一个 `Course`”，如图
    5-2 所示。


    ![](img/78624_3_En_5_Fig2_HTML.png)


    三条不同方向的相互连接的线，其顶点处分别标有文本：学生、教授和课程。


    图 5-2


    一个三元关联

