  raw: '### Accessing the Features of a Class from Within Its Own Methods


    Note that we can access all of a given class’s features, ***regardless of their
    accessibility***, from ***within*** any of that class’s ***own*** method bodies;
    that is, `public`/`private` designations only affect access to a feature ***from
    outside the class itself*** (i.e., ***from client code***).


    Let’s study the following example to see how one feature of a class may be accessed
    from within another:


    ```

    public class Student {

    // A few private attributes.

    private String name;

    private String ssn;

    private double totalLoans;

    private double tuitionOwed;

    // Get/set methods would be provided for all of these attributes;

    // details omitted ...

    public void printStudentInfo() {

    // Accessing attributes of the Student class.

    System.out.println("Name:  " + name);

    System.out.println("Student ID:  " + ssn);

    // etc.

    }

    public boolean allBillsPaid() {

    boolean answer = false;

    // Accessing another method of the Student class.

    double amt = moneyOwed();

    if (amt == 0.0) {

    answer = true;

    }

    else {

    answer = false;

    }

    return answer;

    }

    private double moneyOwed() {

    // Accessing attributes of the Student class.

    return totalLoans + tuitionOwed;

    }

    }

    ```


    The first thing we observe is that we needn’t use dot notation to access any of
    the features of the `Student` class from ***within*** `Student` methods. It’s
    automatically understood by the compiler that a class is accessing one of its
    own features when a **simple name**—that is, a name without a dot notation prefix,
    also known as an **unqualified name**—is used, for example:


    ```

    public void printStudentInfo() {

    // Here, we''re accessing the "name" attribute without dot notation.

    System.out.println("Name:  " + name);

    // etc.

    }

    ```


    and


    ```

    public boolean allBillsPaid() {

    boolean answer = false;

    // Here, we''re accessing the "moneyOwed" method without dot notation.

    double amt = moneyOwed();

    // etc.

    }

    ```


    That being said, the Java keyword `this` can be used in dot notation fashion—`this.featureName`—within
    any of a class’s methods to emphasize the fact that we’re accessing another feature
    of ***this same class***. I’ve rewritten the `Student` example from earlier to
    take advantage of the `this` keyword:


    ```

    public class Student {

    // A few private attributes.

    private String name;

    private String ssn;

    private double totalLoans;

    private double tuitionOwed;

    // Get/set methods would be provided for all of these attributes;

    // details omitted ...

    public void printStudentInfo() {

    // We''ve added the prefix "this.".

    System.out.println("Name:  " + this.name);

    System.out.println("Student ID:  " + this.ssn);

    // etc.

    }

    public boolean allBillsPaid() {

    boolean answer = false;

    // We''ve added the prefix "this.".

    double amt = this.moneyOwed();

    if (amt == 0.0) {

    answer = true;

    }

    else {

    answer = false;

    }

    return answer;

    }

    private double moneyOwed() {

    // We''ve added the prefix "this.".

    return this.totalLoans + this.tuitionOwed;

    }

    }

    ```


    Either approach—prefixing internal feature references with `this.` or omitting
    such a qualifying prefix—is acceptable; common practice is to forego the use of
    the `this.` prefix except when necessary to disambiguate a method parameter from
    a similarly named attribute. That is, it is permissible to declare a method parameter
    with the same name as an attribute, as illustrated by the following code:


    ```

    public class Student {

    private String major;

    // Other attributes omitted.

    // Note that we''ve used "major" as the name of a parameter

    // to the following method - this duplicates the name of

    // the "major" attribute above.  This is OK, however, if

    // we use "this." within the method body below to disambiguate

    // the two.

    public void updateMajor(String major) {

    // In the next line of code, "this.major" on the left side

    // of the assignment statement refers to the ATTRIBUTE

    // named "major", whereas "major" on the right side of

    // the assignment statement refers to the PARAMETER

    // named "major".

    this.major = major;

    }

    // etc.

    }

    ```


    Of course, we could avoid having to use `this.` as a prefix simply by choosing
    an alternative name for our method parameter:


    ```

    public class Student {

    private String major;

    // Other attributes omitted.

    public void updateMajor(String m) {

    // No ambiguity!

    major = m;

    }

    // etc.

    }

    ```


    It’s important to avoid ***accidentally*** giving parameters/local variables names
    that duplicate the names of attributes, as this can lead to bugs that are hard
    to diagnose. For example, in the `Student` class that follows are both an ***attribute***
    and a ***local variable*** named `major`. Please refer to the comments in the
    code example for an explanation of why this is problematic:


    ```

    public class Student {

    // Attributes.

    private String major;

    public void updateMajor() {

    // We''ve inadvertantly declared a local variable, "major", with

    // the SAME name as an attribute of this class.  This is a BAD IDEA!

    // Note that this code will compile WITHOUT ERROR ...

    String major = null;

    // Later in the method:

    // We THINK we''re updating the value of ATTRIBUTE "major" below,

    // but we''re instead updating LOCAL VARIABLE "major", which will

    // go out of scope as soon as this method ends;

    // meanwhile, the value of ATTRIBUTE "major" is unchanged!

    major = major.toUppercase();

    // etc.

    }

    }

    ```


    We’ll see other uses for the `this` keyword, involving code reuse and object self-referencing,
    later in the book.


    ## Accessing Private Features from Client Code


    If private features can’t be accessed outside of an object’s own methods, how
    does client code ever manipulate them? Through ***public*** features, of course!


    Good OO programming practice calls for providing public **accessor methods** by
    which clients of an object can effectively manipulate selected private attributes
    to read or modify their values. Why is this? ***So that we may empower an object
    to have the “final say” in whether or not what client code is trying to do to
    its attributes is valid***. That is, we want an object to be involved in determining
    whether or not any of the business rules defined by its class are being violated.
    Before looking at specific examples that illustrate ***why*** this is so important,
    let’s first discuss the mechanics of ***how*** we declare accessor methods.'
  trans: '

    ### 从类自身方法内部访问类的特性


    请注意，我们可以从某个类的**任何**自身方法体**内部**访问该类的所有特性，***无论其可访问性如何***；也就是说，`public`/`private`
    修饰符仅影响从**类外部**（即**从客户端代码**）访问某个特性。


    让我们通过以下示例来了解如何从类的一个方法内部访问另一个特性：


    ```

    public class Student {

    // 几个私有属性。

    private String name;

    private String ssn;

    private double totalLoans;

    private double tuitionOwed;

    // 所有这些属性都会提供 get/set 方法；

    // 细节省略……

    public void printStudentInfo() {

    // 访问 Student 类的属性。

    System.out.println("Name:  " + name);

    System.out.println("Student ID:  " + ssn);

    // 等等。

    }

    public boolean allBillsPaid() {

    boolean answer = false;

    // 访问 Student 类的另一个方法。

    double amt = moneyOwed();

    if (amt == 0.0) {

    answer = true;

    }

    else {

    answer = false;

    }

    return answer;

    }

    private double moneyOwed() {

    // 访问 Student 类的属性。

    return totalLoans + tuitionOwed;

    }

    }

    ```


    我们首先注意到，从 `Student` 方法**内部**访问 `Student` 类的任何特性时，无需使用点号表示法。编译器会自动理解，当使用**简单名称**（即不带点号前缀的名称，也称为**非限定名称**）时，类正在访问自身的某个特性，例如：


    ```

    public void printStudentInfo() {

    // 这里，我们访问 "name" 属性时没有使用点号表示法。

    System.out.println("Name:  " + name);

    // 等等。

    }

    ```


    以及


    ```

    public boolean allBillsPaid() {

    boolean answer = false;

    // 这里，我们访问 "moneyOwed" 方法时没有使用点号表示法。

    double amt = moneyOwed();

    // 等等。

    }

    ```


    话虽如此，Java 关键字 `this` 可以在类的任何方法中以点号表示法形式使用——`this.featureName`——以强调我们正在访问**同一个类**的另一个特性。我将之前的
    `Student` 示例重写，以利用 `this` 关键字：


    ```

    public class Student {

    // 几个私有属性。

    private String name;

    private String ssn;

    private double totalLoans;

    private double tuitionOwed;

    // 所有这些属性都会提供 get/set 方法；

    // 细节省略……

    public void printStudentInfo() {

    // 我们添加了前缀 "this."。

    System.out.println("Name:  " + this.name);

    System.out.println("Student ID:  " + this.ssn);

    // 等等。

    }

    public boolean allBillsPaid() {

    boolean answer = false;

    // 我们添加了前缀 "this."。

    double amt = this.moneyOwed();

    if (amt == 0.0) {

    answer = true;

    }

    else {

    answer = false;

    }

    return answer;

    }

    private double moneyOwed() {

    // 我们添加了前缀 "this."。

    return this.totalLoans + this.tuitionOwed;

    }

    }

    ```


    两种方式——在内部特性引用前加上 `this.` 前缀或省略此类限定前缀——都是可以接受的；常见做法是除非必要（例如消除方法参数与同名属性之间的歧义），否则不使用
    `this.` 前缀。也就是说，允许声明与属性同名的参数，如下代码所示：


    ```

    public class Student {

    private String major;

    // 其他属性省略。

    // 注意，我们在以下方法中使用了 "major" 作为参数名

    // ——这与上面 "major" 属性的名称重复。不过这是可以的，

    // 只要我们在下面的方法体中使用 "this." 来区分两者。

    public void updateMajor(String major) {

    // 在下一行代码中，赋值语句左侧的 "this.major"

    // 指的是名为 "major" 的**属性**，而赋值语句右侧的 "major"

    // 指的是名为 "major" 的**参数**。

    this.major = major;

    }

    // 等等。

    }

    ```


    当然，我们可以通过为方法参数选择另一个名称来避免使用 `this.` 前缀：


    ```

    public class Student {

    private String major;

    // 其他属性省略。

    public void updateMajor(String m) {

    // 没有歧义！

    major = m;

    }

    // 等等。

    }

    ```


    重要的是要避免**意外地**给参数/局部变量起与属性同名的名称，因为这可能导致难以诊断的错误。例如，在下面的 `Student` 类中，同时存在一个名为 `major`
    的**属性**和一个**局部变量**。请参考代码示例中的注释，了解为什么这会产生问题：


    ```

    public class Student {

    // 属性。

    private String major;

    public void updateMajor() {

    // 我们无意中声明了一个局部变量 "major"，其名称

    // 与该类的属性相同。这是个**坏主意**！

    // 注意，这段代码会**编译通过，不会报错**……

    String major = null;

    // 在方法后面：

    // 我们**以为**下面是在更新**属性** "major" 的值，

    // 但实际上更新的是**局部变量** "major"，

    // 该方法一结束，该变量就会超出作用域；

    // 与此同时，**属性** "major" 的值保持不变！

    major = major.toUppercase();

    // 等等。

    }

    }

    ```


    我们将在本书后面看到 `this` 关键字的其他用途，涉及代码重用和对象自引用。


    ## 从客户端代码访问私有特性


    如果私有特性无法在对象自身方法之外访问，客户端代码如何操作它们呢？当然是通过**公有**特性！


    良好的面向对象编程实践要求提供公有的**访问器方法**，通过它们，对象的客户端可以有效地操作选定的私有属性，以读取或修改其值。这是为什么呢？***这样我们就能让对象在判断客户端代码对其属性的操作是否有效时拥有“最终决定权”***。也就是说，我们希望对象参与判断其类定义的任何业务规则是否被违反。在查看具体示例说明***为什么***这如此重要之前，我们先讨论一下***如何***声明访问器方法的机制。

