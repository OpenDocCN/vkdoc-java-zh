    ## 信息沿关联“管道”流动


    初学建模者还容易犯一个错误：在涉及一般属性时引入不必要的冗余。在图 10-43 所示的关联中，我们看到 `Professor` 类的 `name` 属性被
    `Department` 类的 `chairmanName` 属性不恰当地镜像了。


    ![](img/78624_3_En_10_Fig43_HTML.jpg)


    图示为两个矩形块，分别标注为“教授”和“系部”。图中显示了各自的属性。底部文字说明：教授的姓名被恰当地封装在教授块中，但却被不恰当地复制为系部中的系主任姓名。


    图 10-43


    `name` 和 `chairmanName` 属性是冗余的


    虽然 `Department` 对象确实需要知道担任其系主任的 `Professor` 对象的姓名，但显式创建一个 `chairmanName` 属性来反映这一信息是不恰当的。因为
    `Department` 对象将对其关联的 `Professor` 对象的引用作为一个属性来维护，所以 `Department` 在任何需要的时候都可以随时访问此信息，只需调用
    `Professor` 对象的 `getName` 方法即可。这条信息理应封装在它所属的 `Professor` 类中，不应在其他任何地方重复。图 10-44
    展示了前一个图经过修正后的版本，其中消除了冗余。


    ![](img/78624_3_En_10_Fig44_HTML.jpg)


    图示为两个块，分别标注为“教授”和“系部”。教授的属性包括姓名、职称和社保号；系部的属性包括系名和编号。


    图 10-44


    图 10-43 中的冗余已被消除


    本质上，每当你在图中看到一条关联/聚合线时，你可以将其视为一个概念性的“管道”，信息可以根据需要沿着该管道在相关对象之间“流动”。


    在分析阶段，我们通常不关心属性（公有、私有）的可访问性或关联的方向性——我们通常假设图中反映的所有属性的值都可以通过调用对象上适当的“获取”方法来获得。


    有时，这个“管道”会跨越***多个***对象，如下一个示例所示。


    在图 10-45 中，我们有一个涉及三个类的图。


    ![](img/78624_3_En_10_Fig45_HTML.jpg)


    一个框图展示了位于中心的“教学班”元素，以及左侧的“课程”元素和右侧的“教授”元素。它说明了：课程以教学班的形式提供，教授负责教授该教学班。


    图 10-45


    `Course`、`Section` 和 `Professor` 类之间的关联“管道”


    假设有人希望获得所有曾教授过名为“面向对象入门”这门 `Course` 的 `Professor` 的列表。由于每个 `Course` 对象都维护着对其所有
    `Section` 对象（包括过去和现在的）的引用，代表“面向对象入门”的 `Course` 对象可以询问它的每个 `Section` 对象，之前或当前教授该
    `Section` 的 `Professor` 是谁。反过来，每个 `Section` 对象都维护着对其所教授/正在教授的 `Professor` 对象的引用，并可以使用
    `Professor` 对象的 `getName` 方法来获取姓名。因此，信息沿着关联“管道”从 `Professor` 对象流向它们关联的 `Section`
    对象，再从那里流回我们最初开始的 `Course` 对象（见图 10-46）。


    ![](img/78624_3_En_10_Fig46_HTML.jpg)


    图示为一系列对话气泡，包含围绕关键节点（表示课程对象、教学班对象和教授对象）的一组对话。它标明了指向其他无关教学班的链接。


    图 10-46


    关联“管道”可能相当复杂！


    你将在第 11 章学习一种正式的、符合 UML 规范的方法来分析和描述此类“对象对话”。


    以下代码对这三个类的属性进行了建模，并突出显示了所有由关联驱动的属性：


    ```

    public class Course {

    // 属性。

    // 伪代码。

    private Collection offeredAs;   // 一个 Section 对象引用的集合

    private String courseName;

    private int courseNumber;

    private double creditHourValue;

    // 等等。

    }

    public class Section {

    // 属性。

    private Course represents;   // 对相关 Course 对象的引用

    private int sectionNo;

    private String dayOfWeek;

    private String timeOfDay;

    private String semester;

    private Professor taughtBy;  // 对相关 Professor 对象的引用

    // 等等。

    }

    public class Professor {

    // 伪代码。

    private Collection sectionsTaught; // 一个 Section 对象引用的集合

    private String name;

    private String ssn;

    // 等等。

    }

    ```


    如果我们知道 `Course` 类将经常需要知道所有曾教授过该 `Course` 的 `Professor` 是谁，我们可能会决定在图中引入冗余关联“一个
    `Professor` *曾教授过* 一个 `Course`”，如图 10-47 所示。


    ![](img/78624_3_En_10_Fig47_HTML.jpg)


    图示展示了课程、教学班和教授的元素。它标明了各单元之间的相互连接，说明课程以教学班的形式提供，教授教授该教学班。教授曾教授过该课程。


    图 10-47


    当对象频繁需要更直接的“管道”进行通信时，我们会添加冗余关联


    这样做的好处是提高了 `Course` 对象确定谁曾教授过它的速度：通过在图 10-47 中添加冗余关联，`Course` 对象现在可以***直接***与
    `Professor` 对象通信，而无需使用 `Section` 对象作为“中间人”——但这种性能提升的代价是，我们刚刚为应用程序引入了额外的复杂性，这反映在以下代码中突出显示的新增部分：


    ```

    public class Course {

    // 属性。

    // 伪代码。

    private Collection offeredAs;      // 一个 Section 对象引用的集合

    private String courseName;

    private int courseNumber;

    private float creditHourValue;

    // 伪代码。

    private Collection professors;    // 一个 Professor 对象引用的集合

    // 等等。

    }

    public class Section {

    // 属性。

    private Course represents;   // 对相关 Course 对象的引用

    private int sectionNo;

    private String dayOfWeek;

    private String timeOfDay;

    private String semester;

    private Professor taughtBy;  // 对相关 Professor 对象的引用

    // 等等。

    }

    public class Professor {

    // 伪代码。

    private Collection coursesTaught;     // 一个 Course 对象引用的集合

    private Collection sectionsTaught;      // 一个 Section 对象引用的集合

    private String name;

    private String ssn;

    // 等等。

    }

    ```


    通过添加冗余关联，我们现在在维护引用完整性方面有了额外的工作。也就是说，如果指派了另一位 `Professor` 来教授某个特定的 `Section`，我们需要更新两个链接而不是一个：`Professor`
    与 `Section` 之间的链接，以及 `Professor` 与相关 `Course` 之间的链接。

