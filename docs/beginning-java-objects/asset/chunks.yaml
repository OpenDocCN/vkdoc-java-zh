    #### postGrade( )


    `postGrade` 方法用于通过创建一个 `TranscriptEntry` 对象，将 `Section` 与被分配成绩的 `Student` 关联起来，从而为
    `Student` 分配成绩。


    我们首先通过调用 `TranscriptEntry` 类定义的 `static` 工具方法 `validateGrade`，来验证拟分配给 `Student
    s` 的 `grade`（`s` 和 `grade` 都作为参数传入 `postGrade` 方法）格式是否正确。管理何为“有效”成绩表示的业务规则都编码在该方法中；当我们稍后在本章探索
    `TranscriptEntry` 类时，这些业务规则将会揭晓。目前，我们只需要知道，如果 `validateGrade` 方法通过返回 `false` 拒绝了拟分配的成绩，我们随即退出
    `postGrade` 方法，并向客户端代码返回 `false`，以表示为 `Student s` 提交成绩的请求已被拒绝：


    ```

    public boolean postGrade(Student s, String grade) {

