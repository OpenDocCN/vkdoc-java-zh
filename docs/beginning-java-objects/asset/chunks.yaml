  trans: "\n#### 让 MyIntCollection2 投入工作\n\n操作这种自定义 `int` 集合“风味”所需的客户端代码，与我们之前操作第一个版本的\
    \ `MyIntCollection` 所使用的客户端代码***完全相同***——这***充分证明了封装的力量***！此处重复了客户端代码，只是将所有对 `MyIntCollection`\
    \ 的引用替换为对 `MyIntCollection2` 的引用——但需要修改的仅此而已！\n\n```\npublic class MyIntCollection2Example\
    \ {\npublic static void main(String[] args) {\n// 实例化我们新设计的集合之一！\nMyIntCollection2\
    \ mic = new MyIntCollection2();\n// 向我们的“特殊”集合添加四个随机整数。\nmic.add(3);\nmic.add(6);\n\
    mic.add(1);\nmic.add(9);\n// 利用 size 方法 ...\nSystem.out.println(\"该集合包含 \" + mic.size()\
    \ +\n\" 个 int 值\");\n// ... 然后向 mic 询问关于其内容的“专门”问题。\nSystem.out.println(\"最小值是：\
    \  \" + mic.getSmallestInt());\nSystem.out.println(\"最大值是：  \" + mic.getLargestInt());\n\
    System.out.println(\"平均值是：  \" + mic.getAverage());\n}\n}\n```\n\n输出结果将与之前相同。\n\
    \n### 方法 #2 与方法 #3 的权衡\n\n正如 `MyIntCollection` 和 `MyIntCollection2` 示例所示，创建自定义集合的两种方法——扩展预定义集合类与封装此类集合的实例——所需的编码工作量是相当的。那么，一种方法相对于另一种方法有什么优势呢？\n\
    \n扩展预定义集合类（方法 #2）的一个优势是，当我们在运行时实例化此类时，在内存中只创建一个对象——即 `MyIntCollection` 的实例，由于继承关系，它***同时***也是一个\
    \ `ArrayList`。相比之下，当我们创建 `MyIntCollection2` 的实例时，最终会创建两个对象，如图 6-16 所示。因此，方法 #2\
    \ 在内存使用方面更经济一些。\n\n![](img/78624_3_En_6_Fig16_HTML.jpg)\n\n两个气球图，每个图包含一个由三个方块组成的数组。一个图中数组在内部，另一个图中数组在外部。文字分别显示：一个\
    \ MyIntCollection 的实例是一个对象实例的 ArrayList，以及一个 ArrayList 的两个对象实例。\n\n图 6-16\n\n\
    运行时实例化一个对象与两个对象\n\n另一种选择，封装预定义集合类实例（方法 #3）的一个优势是，我们可以选择向客户端代码暴露尽可能少的封装集合的公共行为。\n\
    \n*   `MyIntCollection` 作为一个 `ArrayList`，继承了 `ArrayList` 类的所有 30 个 `public` 行为。即使我们只认为\
    \ `MyIntCollection` 的 `size` 和 `add` 方法相关，其他 28 个方法也同样暴露给/可供客户端代码访问。\n*   相比之下，`MyIntCollection2`\
    \ 并未定义这 28 个方法。\n*   另一方面，根据我们设计 `MyIntCollection2` 类的方式，它只暴露了这些公共行为中的***两个***——`size`\
    \ 和 `add`——从而简化了客户端代码使用我们类的任务。此外，如果我们愿意，还可以通过给这些方法在 `MyIntCollection2` 中赋予完全不同的名称来***伪装***它们，如下所示：\n\
    \n    ```\n    public class MyIntCollection2 {\n    // 细节省略 ...\n    // 这之前是 size()\
    \ 方法 ...\n    public int getIntCount() {\n    // 委托！\n    return numbers.size();\n\
    \    }\n    // 这之前是 add() 方法 ...\n    public boolean insertAnInt(int i) {\n  \
    \  // 如果合适，记住这个 int 作为最大值/最小值。\n    // （第一次添加值时，默认情况下它既是最大值也是最小值！）\n    // 委托给封装的集合。\n\
    \    if (numbers.isEmpty()) { ...\n    // 等等。\n    ```\n\n    这充分利用了封装和信息隐藏的强大功能。\n\
    \n方法 #2 的一个显著优势是，由于通过继承成为真正的 `ArrayList`，你的自定义集合类型可以在 Java 语言中任何允许使用传统 `ArrayList`\
    \ 的地方使用。\n\n底线是，方法 #2 和方法 #3 各有优缺点。通过理解两者之间的细微差别，你将能够根据具体情况在它们之间做出选择。\n\n## 集合作为方法返回类型\n\
    \n集合提供了一种克服第 4 章中提到的“方法只能返回单个结果”这一限制的方法。如果我们将方法的返回类型定义为***集合***类型，就可以向客户端代码返回一个任意大小的对象引用集合。\n\
    \n在以下 `Course` 类的代码片段中，提供了一个 `getRegisteredStudents` 方法，使客户端代码能够请求获取注册到特定课程的所有\
    \ `Student` 对象集合的引用：\n\n```\npublic class Course {\nprivate ArrayList enrolledStudents;\n\
    // 细节省略 ...\n// 以下方法返回对整个集合的引用，\n// 该集合包含注册到该课程的所有 Student 对象。\npublic ArrayList\
    \ getRegisteredStudents() {\nreturn enrolledStudents;\n}\n// 等等。\n```\n\n以下是客户端代码如何使用此类方法的示例：\n\
    \n```\n// 实例化一门课程和几个学生。\nCourse c = new Course();\nStudent s1 = new Student();\n\
    Student s2 = new Student();\nStudent s3 = new Student();\n// 将学生注册到课程中。\nc.enroll(s1);\n\
    c.enroll(s2);\nc.enroll(s3);\n// 现在，请求课程提供其所有注册学生集合的句柄，\n// 并遍历该集合，为每个学生打印成绩报告。\n\
    for (Student s : c.getRegisteredStudents()) {\ns.printGradeReport();\n}\n```\n\
    \n注意 `for` 语句中嵌套方法调用的使用；由于 `c.getRegisteredStudents()` 是一个 `ArrayList` 类型的表达式，该表达式可以在\
    \ `for` 语句中用于指定我们要遍历的集合。\n\n在第 7 章中，当我们讨论接口（特别是 `Collection` 接口）时，我们将探讨另一种从方法返回集合的方式，这种方式能使我们的代码更加通用。\n"
- fmt: '# Collections of Derived Types


    As mentioned previously, arrays, as simple collections, contain items (either
    primitive values or object references) that are all of the same type: all `int`(egers),
    for example, or all (references to) `Student` objects. As it turns out, regardless
    of what type of collection we’re using, we’ll typically want to constrain it to
    contain similarly typed objects, for reasons that we’ll explore in Chapter [7](#78624_3_En_7_Chapter.xhtml)
    when we discuss *polymorphism*. However, the power of inheritance steps in to
    make collections quite flexible in terms of what they contain.


    It turns out that if we declare a collection to hold objects of a given superclass—for
    example, `Person`—then we’re free to insert objects explicitly declared to be
    of type `Person` *or of any type derived from* `Person`—for example, `UndergraduateStudent`,
    `GraduateStudent`, and `Professor`. This is due to the “is a” nature of inheritance;
    `UndergraduateStudent`, `GraduateStudent`, and `Professor` objects, as subclasses
    of `Person`, are simply special cases of `Person` objects. The Java compiler would
    therefore be perfectly happy to see code such as the following:


    ```

    Person[] people = new Person[100];

    Professor p = new Professor();

    UndergraduateStudent s1 = new UndergraduateStudent();

    GraduateStudent s2 = new GraduateStudent();

    // Add a mixture of professors and students in random order to the array.

    people[0] = s1;

    people[1] = p;

    people[2] = s2;

    // etc.

    ```


    or for an `ArrayList`:


    ```

    ArrayList people = new ArrayList();

    Professor p = new Professor();

    UndergraduateStudent s1 = new UndergraduateStudent();

    GraduateStudent s2 = new GraduateStudent();

    // Add a mixture of professors and students in random order to the ArrayList.

    people.add(s1);

    people.add(p);

    people.add(s2);

    // etc.

    ```


    ## Revisiting Our Student Class Design


    You may recall that when we talked about the attributes of the `Student` class
    back in Chapter [3](#78624_3_En_3_Chapter.xhtml), we held off on assigning types
    to the `courseLoad` and `transcript` attributes, as shown in Table [6-1](#78624_3_En_6_Chapter.xhtml#Tab1).


    **Table 6-1** Proposed Data Structure for the *Student* Class


    | Attribute Name | Data Type |

    | --- | --- |

    | `name` | `String` |

    | `studentID` | `String` |

    | `birthDate` | `Date` |

    | `address` | `String` |

    | `major` | `String` |

    | `gpa` | `double` |

    | `advisor` | `Professor` |

    | `courseLoad` | **???** |

    | `transcript` | **???** |


    Armed with what we now know about collections, we can now complete our `Student`
    class design.


    ### The courseLoad Attribute of Student


    The `courseLoad` attribute is meant to represent a list of all `Course` objects
    that the `Student` is presently enrolled in. So it makes perfect sense that this
    attribute be declared as simply a standard collection of `Course` object references—an
    `ArrayList`, perhaps:


    ```

    import java.util.ArrayList;

    public class Student {

    private String name;

    private String studentId;

    private ArrayList courseLoad;

    // etc.

    ```


    ### The transcript Attribute of Student


    The `transcript` attribute is a bit more challenging. What is a transcript, in
    real-world terms? It’s a report of all of the courses that a student has taken
    since they were first admitted to this university, along with the semester in
    which each course was taken, the number of credit hours that each course was worth,
    and the letter grade that the student received for the course. A typical transcript
    entry, when printed, might look as follows:


    ```

    CS101      Beginning Objects        3.0         A

    ```


    If we think of each line item on a printed transcript as an *object*, we can declare
    a `TranscriptEntry` class to describe them, as follows:


    ```

    public class TranscriptEntry {

    // One TranscriptEntry object represents a single line item on a printed

    // transcript.

    private Course courseTaken;

    private String semesterTaken;  // e.g., "Fall 2006"

    private String gradeReceived;  // e.g., "B+"

    // Constructor.

    public TranscriptEntry(Course c, String semester, String grade) {

    // Details omitted ...

    }

    // Accessor method details omitted ...

    public void printTranscriptEntry() {

    // We "talk to" the courseTaken object/attribute to obtain the

    // majority of the required information (an example of

    // delegation). Reminder:  \t is a tab character.

    System.out.println(

    this.getCourseTaken().getCourseNo() + "\t" +

    this.getCourseTaken().getTitle() + "\t" +

    this.getCourseTaken().getCreditHours() + "\t" +

    this.getGradeReceived());

    }

    // Other methods TBD ...

    }

    ```


    Since each `TranscriptEntry` object maintains a handle on a `Course` object, the
    `TranscriptEntry` object can avail itself of the `Course` object’s course number,
