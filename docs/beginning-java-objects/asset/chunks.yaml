    other places or, worse yet, forget to do so and wind up with inconsistency in
    our logic.


    Fortunately, Java provides a way for us to have our cake and eat it, too—that
    is, a way for us to ***override*** the `print` method while ***simultaneously
    reusing its code***. We’d code the `print` method for the `GraduateStudent` class
    as follows:


    ```

    public class GraduateStudent extends Student {

    // Details omitted.

    public void print() {

    // Reuse code by calling the print method as defined by the Student

    // superclass ...

    super.print();

    // ... and then go on to do something extra - namely, print this derived

    // class''s specific attributes.

    System.out.println("Undergrad. Deg.:  " + getUndergraduateDegree() + "\n" +

    "Undergrad. Inst.:  " + getUndergraduateInstitution());

    }

    }

    ```


    We use the Java keyword `super` as the qualifier for a method call


    ```

    super.methodName(arguments);

    ```


    whenever we wish to invoke the version of method *methodName* that was defined
    by our superclass. That is, in the preceding example, we’re essentially saying
    to the compiler, “First, execute the `print` method the way that the superclass,
    `Student`, would have executed it, and then do something extra—namely, print out
    the values of the new `GraduateStudent` attributes.”


    Note that the syntax


    ```

    super.methodName(arguments);

    ```


    involves ***invoking*** one method from within another. Let’s look at a slightly
    more involved example to emphasize this syntax.


    We’ll start with this superclass declaration


    ```

    public class Superclass {

    public void foo(int x, int y) { ... }

    }

    ```


    and derive this subclass from it:


    ```

    public class Subclass extends Superclass {

    // We''re overriding the foo method.

    // (Note that we''re using a and b as parameter names here to override

    // parameters x and y in the superclass; this is perfectly fine as long

    // as their types are identical.)

    public void foo(int a, int b) {

    // Details to follow ...

    }

    }

    ```


    We have numerous options as to how we might use the `super` keyword within the
    overridden `foo` method of a subclass, as illustrated by the **bolded** passages
    (and corresponding comments) in the examples that follow:


    ```

    public class Subclass extends Superclass {

    // We''re overriding the foo method.

    public void foo(int a, int b) {

    // We can pass the argument values a and b through to our superclass''s

    // version of foo ...

    super.foo(a, b);

    }

    }

    ```


    or


    ```

    public class Subclass extends Superclass {

    // We''re overriding the foo method.

    public void foo(int a, int b) {

    int x = 2;  // a local variable

    // We can pass selected argument values through to our superclass''s

    // version of foo ...

    super.foo(a, x);

    }

    }

    ```


    or even


    ```

    public class Subclass extends Superclass {

    // We''re overriding the foo method.

    public void foo(int a, int b) {

    int x = 2;  // a local variable

    // Here, we''re using neither a nor b as arguments.

    super.foo(x, 3);

    }

    }

    ```


    Note that our invocation of `super.foo(...)` can occur anywhere within the method:


    ```

    public class Subclass extends Superclass {

    // We''re overriding the foo method.

    public void foo(int a, int b) {

    // Pseudocode.

    do some stuff;

    super.foo(a, b);

    // Pseudocode.

    do more stuff;

    }

    }

    ```


    And, if `foo` were declared to have a non-`void` return type in `Superclass`—say,
    `int`—we could even return the result of calling `super.foo(...)`:


    ```

    public class Subclass extends Superclass {

    // We''re overriding the foo method (here, we

    // assume that foo was declared with an int return

    // type in the superclass).

    public int foo(int a, int b) {

    int x = 3 * a;

    int y = 17 * b;

    return super.foo(x, y);

    }

    }

    ```


    The bottom line is we can use `super.`*methodName*`(...)` in whatever way makes
    sense in carrying out a subclass’s version of a method that is being overridden.


    Another important use of the `super` keyword has to do with reusing constructor
    code; we’ll learn about this alternative use of `super` later in this chapter.'
  trans: '

    ### 复用超类行为：“super”关键字


    前面关于重写的示例并不理想，因为 `GraduateStudent` 的 `print` 方法的前四行代码与 `Student` 类中 `print` 方法的代码重复了。以下是
    `Student` 版本的该方法：


    ```

    public void print() {

    // 打印 Student 类已知的所有属性值；再次注意，这里使用了访问器方法。

    System.out.println("Student Name:  " + getName() + "\n" +

    "Student No.:  " + getStudentId() + "\n" +

    "Major Field:  " + getMajorField() + "\n" +

    "GPA:  " + getGpa());

    }

    ```


    以下是 `GraduateStudent` 版本：


    ```

    public void print() {

    // 这段代码是从 Student 版本中重复的！

    System.out.println("Student Name:  " + getName() + "\n" +

    "Student No.:  " + getStudentId() + "\n" +

    "Major Field:  " + getMajorField() + "\n" +

    "GPA:  " + getGpa() + "\n" +

    "Undergrad. Deg.:  " + getUndergraduateDegree() + "\n" +

    "Undergrad. Inst.:  " + getUndergraduateInstitution());

    }

    ```


    应用程序中应尽可能避免冗余，因为冗余代码会带来维护上的麻烦。当我们需要修改应用程序中某一处的代码时，我们不想还得记住去修改其他无数处，更糟糕的是，忘记修改而导致逻辑不一致。


    幸运的是，Java 提供了一种两全其美的方法——也就是说，一种既能***重写*** `print` 方法，又能***同时复用其代码***的方法。我们可以像下面这样为
    `GraduateStudent` 类编写 `print` 方法：


    ```

    public class GraduateStudent extends Student {

    // 细节省略。

    public void print() {

    // 通过调用 Student 超类定义的 print 方法来复用代码...

    super.print();

    // ...然后继续做一些额外的事情——即打印这个派生类特有的属性。

    System.out.println("Undergrad. Deg.:  " + getUndergraduateDegree() + "\n" +

    "Undergrad. Inst.:  " + getUndergraduateInstitution());

    }

    }

    ```


    当我们希望调用由超类定义的方法 *methodName* 的版本时，我们使用 Java 关键字 `super` 作为方法调用的限定符：


    ```

    super.methodName(arguments);

    ```


    也就是说，在上面的例子中，我们本质上是在对编译器说：“首先，按照超类 `Student` 执行 `print` 方法的方式执行它，然后再做一些额外的事情——即打印新的
    `GraduateStudent` 属性的值。”


    请注意，语法


    ```

    super.methodName(arguments);

    ```


    涉及在一个方法内部***调用***另一个方法。让我们看一个稍微复杂一点的例子来强调这种语法。


    我们从以下超类声明开始：


    ```

    public class Superclass {

    public void foo(int x, int y) { ... }

    }

    ```


    并从中派生出这个子类：


    ```

    public class Subclass extends Superclass {

    // 我们正在重写 foo 方法。

    // （注意，这里我们使用 a 和 b 作为参数名来重写超类中的参数 x 和 y；

    // 只要它们的类型相同，这是完全没问题的。）

    public void foo(int a, int b) {

    // 后续细节...

    }

    }

    ```


    关于如何在子类重写的 `foo` 方法中使用 `super` 关键字，我们有很多选择，如下面示例中**加粗**的段落（以及相应的注释）所示：


    ```

    public class Subclass extends Superclass {

    // 我们正在重写 foo 方法。

    public void foo(int a, int b) {

    // 我们可以将参数值 a 和 b 传递给超类的 foo 版本...

    super.foo(a, b);

    }

    }

    ```


    或者


    ```

    public class Subclass extends Superclass {

    // 我们正在重写 foo 方法。

    public void foo(int a, int b) {

    int x = 2;  // 一个局部变量

    // 我们可以将选定的参数值传递给超类的 foo 版本...

    super.foo(a, x);

    }

    }

    ```


    甚至


    ```

    public class Subclass extends Superclass {

    // 我们正在重写 foo 方法。

    public void foo(int a, int b) {

    int x = 2;  // 一个局部变量

    // 这里，我们既没有使用 a 也没有使用 b 作为参数。

    super.foo(x, 3);

    }

    }

    ```


    请注意，我们对 `super.foo(...)` 的调用可以出现在方法内的任何位置：


    ```

    public class Subclass extends Superclass {

    // 我们正在重写 foo 方法。

    public void foo(int a, int b) {

    // 伪代码。

    执行一些操作;

    super.foo(a, b);

    // 伪代码。

    执行更多操作;

    }

    }

    ```


    并且，如果在 `Superclass` 中 `foo` 被声明为具有非 `void` 的返回类型——比如 `int`——我们甚至可以返回调用 `super.foo(...)`
    的结果：


    ```

    public class Subclass extends Superclass {

    // 我们正在重写 foo 方法（这里，我们假设 foo 在超类中被声明为 int 返回类型）。

    public int foo(int a, int b) {

    int x = 3 * a;

    int y = 17 * b;

    return super.foo(x, y);

    }

    }

    ```


    底线是，我们可以以任何合理的方式使用 `super.`*methodName*`(...)` 来实现子类中被重写方法的版本。


    `super` 关键字的另一个重要用途与复用构造函数代码有关；我们将在本章后面了解 `super` 的这种替代用法。

