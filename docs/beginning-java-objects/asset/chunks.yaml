    \ so we’ll drop the latter two noun phrases for now.\n\nWhen choosing candidate\
    \ class names, we should avoid choosing nouns that imply **roles** between objects.\
    \ As you learned in Chapter [5](#78624_3_En_5_Chapter.xhtml), a role is something\
    \ that an object belonging to class `A` possesses by virtue of its relationship\
    \ to/association with an object belonging to class `B`. For example, a professor\
    \ holds the role of “faculty advisor” when that professor is associated with a\
    \ student via an *advises* association. Even if a professor were to lose all of\
    \ their advisees, thus losing the role of faculty advisor, their would still be\
    \ a professor by virtue of being employed by the university—it’s inherent in the\
    \ person’s nature relative to the SRS.\n\nIf a professor were to lose their job\
    \ with the university, one might argue that they are no longer a professor; but\
    \ then, this person would have no dealings with the SRS, either, so it’s a moot\
    \ point.\n\nFor this reason, we prefer “Professor” to “Faculty Advisor” as a candidate\
    \ class name, but make a mental note to ourselves that faculty advisor would make\
    \ a good potential association when we get to considering such things later on.\n\
    \nRegarding the notion of a course, we see that we’ve collected numerous noun\
    \ phrases that all refer to a course in one form or another: “class,” “course,”\
    \ “preferred section,” “requested course,” “section,” “prerequisite,” “waitlisted\
    \ class,” “class that they were previously waitlisted for,” “section that they\
    \ were previously waitlisted for.” Within this grouping, several roles are implied:\n\
    \n*   “Waitlisted class” in its several different forms implies a role in an association\
    \ between a `Student` and a `Course`.\n\n*   “Prerequisite” implies a role in\
    \ an association between two `Course`s.\n\n*   “Requested course” implies a role\
    \ in an association between a `Student` and a `Course`.\n\n*   “Preferred section”\
    \ implies a role in an association between a `Student` and a `Course`.\n\nEliminating\
    \ all of these role designations, we’re left with only three terms: “class,” “course,”\
    \ and “section.” Before we hastily eliminate all but one of these as synonyms,\
    \ let’s think carefully about what real-world concepts we’re trying to represent.\n\
    \n*   The notion that we typically associate with the term “course” is that of\
    \ a semester-long series of lectures, assignments, exams, etc. that all relate\
    \ to a particular subject area and that are a unit of education toward earning\
    \ a degree. For example, Beginning Math is a course.\n\n*   The terms “class”\
    \ and “section,” on the other hand, generally refer to the offering of a ***particular***\
    \ course in a ***given*** semester on a given day of the week and at a given time\
    \ of day. For example, the course Math 101 is being offered this coming Spring\
    \ semester as three classes/sections:\n    *   Section 1, which meets Tuesdays\
    \ from 4:00 to 6:00 p.m.\n\n*   Section 2, which meets Wednesdays from 6:00 to\
    \ 8:00 p.m.\n\n*   Section 3, which meets Thursdays from 3:00 to 5:00 p.m.\n\n\
    There is thus a one-to-many association between `Course` and `Class`/`Section`.\
    \ The same course is offered potentially many times in a given semester and over\
    \ many semesters during the “lifetime” of the course.\n\nTherefore, “course” and\
    \ “class/section” truly represent different abstractions, and we’ll keep ***both***\
    \ concepts in our candidate class list. Since “class” and “section” appear to\
    \ be synonyms, however, we need to choose one term and discard the other. Our\
    \ initial inclination would be to keep “class” and discard “section,” but in order\
    \ to avoid confusion when referring to a class named `Class` (!), we’ll opt for\
    \ “section” instead."
  trans: "\n下一轮处理稍显棘手。我们需要将明显的同义词分组，从每组同义词中选出最适合作为类名的术语。让领域专家参与建模团队对此步骤至关重要，因为要准确判断某些术语的细微语义差别并进行合理分组，并非易事。\n\
    \n我们将看似同义的术语归为一组，如图 10-4 所示，**加粗**显示每组同义词中我们倾向于优先选择的术语。*斜体* 词表示尚未识别出同义词的术语。\n\n\
    ![](img/78624_3_En_10_Fig4_HTML.jpg)\n\n一张 Excel 表格的截图，展示了包含 27 个单词和短语的表格的 A 列。这些单词和短语按班级、课程、成绩单、学位、教授和学习计划进行分组。\n\
    \n图 10-4\n\n同义词分组\n\n现在，我们来回顾一下做出这些选择的理由。\n\n只要可能，我们优先选择等效表达中的较短形式——用“degree”代替“degree\
    \ program”，用“plan of study”代替“plan of study requirements”——以使模型更加简洁。\n\n尽管“transcript”本身并非严格意义上的同义词，但其概念隐含了“已修课程”和“已获成绩”的记录，因此我们暂时舍弃后两个名词短语。\n\
    \n在选择候选类名时，应避免选用暗示对象之间**角色**的名词。如第 5 章所学，角色是指属于类 `A` 的对象因其与类 `B` 对象的关系/关联而具有的属性。例如，当一位教授通过“指导”关联与学生相关联时，该教授便承担了“指导教师”的角色。即使这位教授失去了所有指导的学生，从而失去了“指导教师”的角色，他/她仍然是教授——因为受雇于大学这一事实是固有的，是此人相对于\
    \ SRS 的本质属性。\n\n如果一位教授失去了大学的工作，有人可能会争辩说他/她不再是教授；但这样一来，此人也不会再与 SRS 有任何关联，因此这已无关紧要。\n\
    \n基于此，我们更倾向于将“Professor”而非“Faculty Advisor”作为候选类名，但需在脑海中记下：当我们后续考虑关联关系时，“faculty\
    \ advisor”将是一个很好的潜在关联名称。\n\n关于“课程”的概念，我们看到收集了大量名词短语，它们都以某种形式指代一门课程：“class”、“course”、“preferred\
    \ section”、“requested course”、“section”、“prerequisite”、“waitlisted class”、“class\
    \ that they were previously waitlisted for”、“section that they were previously\
    \ waitlisted for”。在这一组中，隐含了多个角色：\n\n*   “Waitlisted class”及其多种变体，暗示了 `Student`\
    \ 与 `Course` 之间关联中的角色。\n*   “Prerequisite”暗示了两个 `Course` 之间关联中的角色。\n*   “Requested\
    \ course”暗示了 `Student` 与 `Course` 之间关联中的角色。\n*   “Preferred section”暗示了 `Student`\
    \ 与 `Course` 之间关联中的角色。\n\n排除所有这些角色名称后，我们只剩下三个术语：“class”、“course”和“section”。在仓促地将它们视为同义词并只保留一个之前，让我们仔细思考一下我们试图表示的现实世界概念。\n\
    \n*   我们通常与术语“course”关联的概念是：一系列持续整个学期的讲座、作业、考试等，这些都与特定学科领域相关，并且是获得学位的教育单元。例如，“基础数学”是一门课程。\n\
    *   另一方面，术语“class”和“section”通常指在**特定**学期、一周中的特定日期和一天中的特定时间开设的***特定***课程。例如，Math\
    \ 101 课程将在即将到来的春季学期开设三个班级/教学班：\n    *   教学班 1，周二下午 4:00 至 6:00 上课。\n    *   教学班\
    \ 2，周三下午 6:00 至 8:00 上课。\n    *   教学班 3，周四下午 3:00 至 5:00 上课。\n\n因此，`Course` 与\
    \ `Class`/`Section` 之间存在一对多的关联。同一门课程在给定学期内可能开设多次，并在课程的“生命周期”内跨越多个学期开设。\n\n因此，“course”和“class/section”确实代表了不同的抽象概念，我们将在候选类列表中保留***两者***。然而，由于“class”和“section”似乎是同义词，我们需要选择一个术语并舍弃另一个。我们最初的倾向是保留“class”并舍弃“section”，但为了避免在引用名为\
    \ `Class` (!) 的类时产生混淆，我们最终选择使用“section”。\n"
- fmt: "### Refining the Candidate Class List\n\nA list of candidate classes has begun\
    \ to emerge. Here is our remaining “short list” (please disregard the trailing\
    \ symbols [*, +] for the moment—I’ll explain their significance shortly):\n\n\
    - `Course`\n- `Day of week`*\n- `Degree`*\n- `Email message`+\n- `Plan of study`\n\
    - `Professor`\n- `Room`*\n- `Schedule of classes`+\n- `Seating capacity`*\n- `Section`\n\
    - `Semester`*\n- `Student`\n- `Time of day`*\n- `Transcript`\n- (First-come, first-served)\
    \ `Waitlist`\n\nNot all of these will necessarily survive to the final model,\
    \ however, as we’re going to scrutinize each one very closely before deeming it\
    \ worthy of implementation as a class. One classic test for determining whether\
    \ or not an item can stand on its own as a class is to ask these questions:\n\n\
    - Can we think of any ***attributes*** for this class?\n- Can we think of any\
    \ ***services*** that would be expected of objects belonging to this class?\n\n\
    One example is the term “room.” We could invent a `Room` class as follows:\n\n\
    ```\npublic class Room {\n    // Attributes.\n    int roomNo;\n    String building;\n\
    \    int seatingCapacity;\n    // etc.\n}\n```\n\nOr we could simply represent\
    \ a room location as a `String` attribute of the `Section` class:\n\n```\npublic\
    \ class Section {\n    // Attributes.\n    Course offeringOf;\n    String semester;\n\
    \    char dayOfWeek;  // 'M', 'T', 'W', 'R', 'F'\n    String timeOfDay;\n    String\
    \ classroomLocation; // building name and room name:  e.g.,\n                \
    \              // \"Innovation Hall Room 333\"\n    // etc.\n}\n```\n\nWhich approach\
    \ to representing a room is preferred? It all depends on whether or not a room\
    \ needs to be a focal point of our application. If the SRS were meant to also\
    \ serve as a Classroom Scheduling System, then we might indeed wish to instantiate\
    \ `Room` objects so as to be able to ask them to perform such services as printing\
    \ out their weekly usage schedules or telling us their seating capacities. However,\
    \ since these services weren’t mentioned as requirements in the SRS specification,\
    \ we’ll opt for eliminating `Room` as a candidate class and instead making a room\
    \ designation a simple `String` attribute of the `Section` class. We reserve the\
    \ right, however, to change our minds about this later on; it’s not unusual for\
    \ some items to “flip-flop” over the life cycle of a modeling exercise between\
    \ being classes on their own vs. being represented as simple attributes of other\
    \ classes.\n\nFollowing a similar train of thought for all of the items marked\
    \ with an asterisk (*) in the preceding candidate class list, we’ll opt to treat\
    \ them all as attributes rather than making them classes of their own:\n\n- “Day\
    \ of week” will be incorporated as either a `String` or `char` attribute of the\
    \ `Section` class.\n- “Degree” will be incorporated as a `String` attribute of\
    \ the `Student` class.\n- “Seating capacity” will be incorporated as an `int`\
    \ attribute of the `Section` class.\n- “Semester” will be incorporated as a `String`\
    \ attribute of the `Section` class.\n- “Time of day” will be incorporated as a\
    \ `String` attribute of the `Section` class.\n\nWhen we’re first modeling an application,\
    \ we want to focus exclusively on functional requirements to the exclusion of\
    \ technical requirements, as defined in Chapter [9](#78624_3_En_9_Chapter.xhtml);\
    \ this means that we need to avoid getting into the technical details of how the\
    \ system is going to function behind the scenes. Ideally, we want to focus solely\
    \ on what are known as **domain classes**—that is, abstractions that an end user\
    \ will recognize and that represent “real-world” entities—and to avoid introducing\
    \ any extra classes that are used solely as behind-the-scenes “scaffolding” to\
    \ hold the application together, known alternatively as **implementation classes**\
    \ or **solution space classes**. Examples of the latter would be the creation\
    \ of a collection object to organize and maintain references to all of the `Professor`\
    \ objects in the system or the use of a dictionary to provide a way to quickly\
    \ find a particular `Student` object based on the associated student ID number.\
    \ We’ll talk more about solution space objects in Part 3 of the book; for the\
    \ time being, the items flagged with a plus sign (+) in the candidate class list\
    \ earlier—“email message,” “schedule of classes”—seem arguably more like implementation\
    \ classes than domain classes:\n\n- An email message is typically a transient\
    \ piece of data, not unlike a pop-up message that appears on the screen while\
    \ using an application. An email message gets sent out of the SRS, and after it’s\
    \ read by the recipient, we have no control over whether the email is retained\
    \ or deleted. It’s unlikely that the SRS is going to archive copies of all email\
    \ messages that have been sent—there certainly was no requirement to do so—so\
    \ we won’t worry about modeling them as objects at this stage in our analysis.\n\
    - Email messages will resurface in Chapter [11](#78624_3_En_11_Chapter.xhtml),\
    \ when we talk about the behaviors of the SRS application, because sending an\
    \ email message is definitely an important behavior; but emails don’t constitute\
    \ an important structural piece of the application, so we don’t want to introduce\
    \ a class for them at this stage in the modeling process. When we actually get\
    \ to programming the system, we might indeed create an `EmailMessage` class in\
    \ Java, but it needn’t be modeled as a domain class. (If, on the other hand, we\
    \ were modeling an email messaging system in anticipation of building one, then\
    \ `EmailMessage` could indeed be a key domain class in our model.)\n- We could\
    \ go either way with the schedule of classes—include it as a candidate class,\
    \ or drop it from our list. The schedule of classes, as a single object, may not\
    \ be something that the user will manipulate directly, but there will be some\
    \ notion behind the scenes of a schedule of classes collection controlling which\
    \ `Section` objects should be presented to the user as a GUI pick list when they\
    \ register in a given semester. We’ll omit `ScheduleOfClasses` from our candidate\
    \ class list for now, but we can certainly revisit our decision as the model evolves.\n\
    \nDetermining whether or not a candidate class constitutes a domain class instead\
    \ of an implementation class is admittedly a gray area, and either of the preceding\
    \ candidate class “rejects” could be successfully argued into or out of the list\
    \ of core domain classes for the SRS. In fact, this entire exercise of identifying\
    \ classes hopefully illustrates a concept that was first introduced in Chapter\
    \ [2](#78624_3_En_2_Chapter.xhtml); because of its importance, it is repeated\
    \ again in the following sidebar.\n\n**THE CHALLENGES OF OBJECT MODELING**\n\n\
    Developing an appropriate model for a software system is perhaps the most difficult\
    \ aspect of software engineering, because\n\n***There are an unlimited number\
    \ of possibilities***. Abstraction is to a certain extent in the eye of the beholder:\
    \ several different observers working independently are almost guaranteed to arrive\
    \ at different models. Whose is the best? Passionate arguments have ensued!"
  raw: '### Refining the Candidate Class List


    A list of candidate classes has begun to emerge. Here is our remaining “short
    list” (please disregard the trailing symbols [*, +] for the moment—I’ll explain
    their significance shortly):


    *   Course


    *   Day of week*


    *   Degree*


    *   Email message+


    *   Plan of study


    *   Professor


    *   Room*


    *   Schedule of classes+


    *   Seating capacity*


    *   Section


    *   Semester*


    *   Student


    *   Time of day*


    *   Transcript


    *   (First-come, first-served) Waitlist


    Not all of these will necessarily survive to the final model, however, as we’re
    going to scrutinize each one very closely before deeming it worthy of implementation
    as a class. One classic test for determining whether or not an item can stand
    on its own as a class is to ask these questions:


    *   Can we think of any ***attributes*** for this class?


    *   Can we think of any ***services*** that would be expected of objects belonging
    to this class?


    One example is the term “room.” We could invent a `Room` class as follows:


    ```

    public class Room {

    // Attributes.

    int roomNo;

    String building;

    int seatingCapacity;

    // etc.

    }

    ```


    Or we could simply represent a room location as a `String` attribute of the `Section`
    class:


    ```

    public class Section {

    // Attributes.

    Course offeringOf;

    String semester;

    char dayOfWeek;  // ''M'', ''T'', ''W'', ''R'', ''F''

    String timeOfDay;

    String classroomLocation; // building name and room name:  e.g.,

    // "Innovation Hall Room 333"

    // etc.

    }

    ```


    Which approach to representing a room is preferred? It all depends on whether
    or not a room needs to be a focal point of our application. If the SRS were meant
    to also serve as a Classroom Scheduling System, then we might indeed wish to instantiate
    `Room` objects so as to be able to ask them to perform such services as printing
    out their weekly usage schedules or telling us their seating capacities. However,
    since these services weren’t mentioned as requirements in the SRS specification,
    we’ll opt for eliminating `Room` as a candidate class and instead making a room
    designation a simple `String` attribute of the `Section` class. We reserve the
    right, however, to change our minds about this later on; it’s not unusual for
    some items to “flip-flop” over the life cycle of a modeling exercise between being
    classes on their own vs. being represented as simple attributes of other classes.


    Following a similar train of thought for all of the items marked with an asterisk
    (*) in the preceding candidate class list, we’ll opt to treat them all as attributes
    rather than making them classes of their own:


    *   “Day of week” will be incorporated as either a `String` or `char` attribute
    of the `Section` class.


    *   “Degree” will be incorporated as a `String` attribute of the `Student` class.


    *   “Seating capacity” will be incorporated as an `int` attribute of the `Section`
    class.


    *   “Semester” will be incorporated as a `String` attribute of the `Section` class.


    *   “Time of day” will be incorporated as a `String` attribute of the `Section`
    class.


    When we’re first modeling an application, we want to focus exclusively on functional
    requirements to the exclusion of technical requirements, as defined in Chapter
    [9](#78624_3_En_9_Chapter.xhtml); this means that we need to avoid getting into
    the technical details of how the system is going to function behind the scenes.
    Ideally, we want to focus solely on what are known as **domain classes**—that
    is, abstractions that an end user will recognize and that represent “real-world”
    entities—and to avoid introducing any extra classes that are used solely as behind-the-scenes
    “scaffolding” to hold the application together, known alternatively as **implementation
    classes** or **solution space classes**. Examples of the latter would be the creation
    of a collection object to organize and maintain references to all of the `Professor`
    objects in the system or the use of a dictionary to provide a way to quickly find
    a particular `Student` object based on the associated student ID number. We’ll
    talk more about solution space objects in Part 3 of the book; for the time being,
    the items flagged with a plus sign (+) in the candidate class list earlier—“email
    message,” “schedule of classes”—seem arguably more like implementation classes
    than domain classes:


    *   An email message is typically a transient piece of data, not unlike a pop-up
    message that appears on the screen while using an application. An email message
    gets sent out of the SRS, and after it’s read by the recipient, we have no control
    over whether the email is retained or deleted. It’s unlikely that the SRS is going
    to archive copies of all email messages that have been sent—there certainly was
    no requirement to do so—so we won’t worry about modeling them as objects at this
    stage in our analysis.


    *   Email messages will resurface in Chapter [11](#78624_3_En_11_Chapter.xhtml),
    when we talk about the behaviors of the SRS application, because sending an email
    message is definitely an important behavior; but emails don’t constitute an important
    structural piece of the application, so we don’t want to introduce a class for
    them at this stage in the modeling process. When we actually get to programming
    the system, we might indeed create an `EmailMessage` class in Java, but it needn’t
    be modeled as a domain class. (If, on the other hand, we were modeling an email
    messaging system in anticipation of building one, then `EmailMessage` could indeed
    be a key domain class in our model.)


    *   We could go either way with the schedule of classes—include it as a candidate
    class, or drop it from our list. The schedule of classes, as a single object,
    may not be something that the user will manipulate directly, but there will be
    some notion behind the scenes of a schedule of classes collection controlling
    which `Section` objects should be presented to the user as a GUI pick list when
    they register in a given semester. We’ll omit `ScheduleOfClasses` from our candidate
    class list for now, but we can certainly revisit our decision as the model evolves.


    Determining whether or not a candidate class constitutes a domain class instead
    of an implementation class is admittedly a gray area, and either of the preceding
    candidate class “rejects” could be successfully argued into or out of the list
    of core domain classes for the SRS. In fact, this entire exercise of identifying
    classes hopefully illustrates a concept that was first introduced in Chapter [2](#78624_3_En_2_Chapter.xhtml);
    because of its importance, it is repeated again in the following sidebar.


    THE CHALLENGES OF OBJECT MODELING


    Developing an appropriate model for a software system is perhaps the most difficult
    aspect of software engineering, because


    ***There are an unlimited number of possibilities***. Abstraction is to a certain
    extent in the eye of the beholder: several different observers working independently
    are almost guaranteed to arrive at different models. Whose is the best? Passionate
    arguments have ensued!'
  trans: '

    ### 精炼候选类列表


    候选类列表已初具雏形。以下是我们剩余的“精简列表”（请暂时忽略末尾的符号 [*, +]——稍后我会解释它们的含义）：


    *   Course（课程）


    *   Day of week*（星期*）


    *   Degree*（学位*）


    *   Email message+（电子邮件消息+）


    *   Plan of study（学习计划）


    *   Professor（教授）


    *   Room*（房间*）


    *   Schedule of classes+（课程表+）


    *   Seating capacity*（座位容量*）


    *   Section（教学班）


    *   Semester*（学期*）


    *   Student（学生）


    *   Time of day*（时段*）


    *   Transcript（成绩单）


    *   (First-come, first-served) Waitlist（（先到先得）候补名单）


    然而，并非所有这些候选类都能最终存活到最终模型中，因为我们将对每一个候选类进行非常严格的审查，然后才判定其是否值得作为类来实现。判断一个项目是否能独立成为一个类的经典测试是提出以下问题：


    *   我们能否为这个类想到任何***属性***？


    *   我们能否想到属于这个类的对象应具备的任何***服务***？


    一个例子是“房间”这个术语。我们可以创建一个 `Room` 类，如下所示：


    ```

    public class Room {

    // 属性。

    int roomNo;

    String building;

    int seatingCapacity;

    // 等等。

    }

    ```


    或者，我们可以简单地将房间位置表示为 `Section` 类的一个 `String` 属性：


    ```

    public class Section {

    // 属性。

    Course offeringOf;

    String semester;

    char dayOfWeek;  // ''M'', ''T'', ''W'', ''R'', ''F''

    String timeOfDay;

    String classroomLocation; // 建筑名称和房间名称：例如，

    // "创新大厅 333 室"

    // 等等。

    }

    ```


    哪种表示房间的方法更可取？这完全取决于房间是否需要成为我们应用程序的焦点。如果 SRS 还打算用作教室排课系统，那么我们可能确实希望实例化 `Room` 对象，以便能够要求它们执行诸如打印每周使用计划或告知我们其座位容量等服务。然而，由于这些服务并未在
    SRS 规范中被提及为需求，我们将选择将 `Room` 从候选类中剔除，而是将房间标识作为 `Section` 类的一个简单 `String` 属性。不过，我们保留以后改变主意的权利；在建模工作的生命周期中，某些项目在“作为独立类”与“表示为其他类的简单属性”之间“反复摇摆”的情况并不少见。


    对前面候选类列表中所有标有星号 (*) 的项目采用类似的思路，我们将选择将它们全部视为属性，而不是将它们作为独立的类：


    *   “星期”将被整合为 `Section` 类的一个 `String` 或 `char` 属性。


    *   “学位”将被整合为 `Student` 类的一个 `String` 属性。


    *   “座位容量”将被整合为 `Section` 类的一个 `int` 属性。


    *   “学期”将被整合为 `Section` 类的一个 `String` 属性。


    *   “时段”将被整合为 `Section` 类的一个 `String` 属性。


    在初次建模一个应用程序时，我们希望完全专注于功能需求，而排除技术需求，正如第 9 章所定义的那样；这意味着我们需要避免陷入系统如何在后台运行的技术细节。理想情况下，我们希望只关注所谓的**领域类**——即最终用户能够识别并代表“现实世界”实体的抽象——并避免引入任何仅用作后台“脚手架”来支撑应用程序的额外类，这些类也称为**实现类**或**解空间类**。后者的例子包括创建一个集合对象来组织并维护对系统中所有
    `Professor` 对象的引用，或者使用一个字典来提供一种基于关联的学生 ID 号快速查找特定 `Student` 对象的方法。我们将在本书的第 3 部分详细讨论解空间对象；目前，前面候选类列表中标记有加号
    (+) 的项目——“电子邮件消息”、“课程表”——似乎更像是实现类而非领域类：


    *   电子邮件消息通常是一种短暂的数据，类似于在使用应用程序时屏幕上出现的弹出消息。一封电子邮件消息从 SRS 发送出去后，一旦收件人阅读，我们就无法控制该邮件是被保留还是删除。SRS
    不太可能归档所有已发送电子邮件的副本——当然也没有这样的需求——因此，在分析的这个阶段，我们不会费心将它们建模为对象。


    *   电子邮件消息将在第 11 章中再次出现，届时我们将讨论 SRS 应用程序的行为，因为发送电子邮件消息无疑是一个重要的行为；但电子邮件并不构成应用程序的重要结构部分，因此我们不想在建模过程的这个阶段为它们引入一个类。当我们实际开始编写系统程序时，我们可能确实会在
    Java 中创建一个 `EmailMessage` 类，但它不需要被建模为领域类。（另一方面，如果我们正在为构建一个电子邮件消息系统而建模，那么 `EmailMessage`
    确实可能成为我们模型中的一个关键领域类。）


    *   对于课程表，我们可以选择两种方式——将其作为候选类包含在内，或将其从列表中删除。课程表作为一个单一对象，可能不是用户会直接操作的东西，但在后台会有某种课程表集合的概念，用于控制在给定学期学生注册时，哪些
    `Section` 对象应作为 GUI 选择列表呈现给用户。我们现在将 `ScheduleOfClasses` 从候选类列表中省略，但随着模型的演进，我们当然可以重新审视这个决定。


    判断一个候选类究竟是领域类还是实现类，诚然是一个灰色地带，前面任何一个被“否决”的候选类，都可以通过有力的论证被纳入或排除在 SRS 的核心领域类列表之外。事实上，整个识别类的练习希望能阐明一个最初在第
    2 章中引入的概念；由于其重要性，在此以侧边栏的形式再次重复。


    对象建模的挑战


    为软件系统开发一个合适的模型或许是软件工程中最困难的方面，因为


    ***存在无限的可能性***。抽象在某种程度上是见仁见智的：几个独立工作的不同观察者几乎肯定会得出不同的模型。谁的模型最好？激烈的争论随之而来！

    '
- fmt: '为了进一步复杂化问题，**几乎从来不存在唯一“最佳”或“正确”的模型**，只有相对于待解决问题而言“更好”或“更差”的模型（包括错误的模型）。同一情境可以用多种同样有效的方式建模。


    最后，不存在能够确定模型是否**充分捕获了用户所有需求**的“决定性测试”。


    在我们继续进行SRS建模练习的过程中，特别是当我们从建模过渡到本书第三部分的实现时，我们将有很多机会重新思考我们在此做出的决定。需要记住的关键点是，在我们真正开始编程之前，模型并非“一成不变”，即使在那之后，如果我们明智地使用了对象，模型也可以相当轻松地进行修改，以处理大多数新需求。将模型想象成由建模粘土制成：在项目的分析和设计阶段，我们将以敏捷的方式不断重塑它，直到我们对结果满意为止。


    与此同时，回到为SRS提出候选类列表的任务上来。经过最新一轮审查后幸存下来的术语如下：


    *   `Course`

    *   `PlanOfStudy`

    *   `Professor`

    *   `Section`

    *   `Student`

    *   `Transcript`

    *   `WaitList`


    让我们最后一次审视`WaitList`。确实有一个需求要求SRS维护学生在先到先得的等待列表中的位置。但事实证明，这个需求实际上可以通过`Student`类和`Section`类之间的关联，再加上一种称为**关联类**的东西（你将在本章后面了解到）的组合来处理。这对于初学者建模者来说并不显而易见，因此我们完全预料到`WaitList`类可能会作为建议的SRS类进入最终名单。但我们假设团队中有一位经验丰富的对象建模者，他说服我们删除了这个类；当我们完成本章末尾的SRS类图时，我们将看到这是一个合适的举措。


    因此，基于对SRS规范的短语分析，我们确定以下类列表：


    *   `Course`

    *   `PlanOfStudy`

    *   `Professor`

    *   `Section`

    *   `Student`

    *   `Transcript`


    ### 重新审视用例


    在我们认为类列表已经准备就绪之前，还需要做一件事，那就是重新审视我们的用例——特别是参与者——看看是否**这些**中的任何一个应该被添加为类。你可能还记得，我们在第[9](#78624_3_En_9_Chapter.xhtml)章中为SRS确定了七个潜在的参与者：


    *   Student

    *   Faculty

    *   Department Chair

    *   Registrar

    *   Billing System

    *   Admissions System

    *   Classroom Scheduling System


    **这些参与者中是否有任何一个值得在SRS中被建模为类？** 以下是判断方法：如果与任何参与者类型`A`关联的任何用户在登录SRS时需要操作（访问或修改）关于参与者类型`B`的信息，那么`B`需要作为类包含在我们的模型中。这最好通过几个例子来说明：


    *   当学生登录SRS时，他们是否需要操作关于教职工的信息？是的，例如，当学生选择导师时，他们可能需要查看各种教职工的信息以选择合适的导师。所以**Faculty参与者角色必须在SRS中表示为一个类**；事实上，我们已经指定了一个`Professor`类，所以我们已经覆盖了这一点。但学生用户本身并不关心系主任。


    *   按照同样的逻辑，**我们需要将Student参与者角色表示为一个类**，因为当教授登录SRS时，他们将操作`Student`对象，例如打印课程名册或为学生分配成绩。由于`Student`已经出现在我们的候选类列表中，我们也已经覆盖了这一点。


    *   当**任何**参与者——教职工、学生、注册官、计费系统、招生系统或教室调度系统——访问SRS时，他们中是否有人需要操作关于注册官的信息？不需要，至少根据我们目前看到的SRS需求，不需要。因此，**我们不需要将Registrar参与者角色建模为一个类。**


    *   **计费、招生和教室调度系统也是如此**：它们需要“幕后”访问SRS管理的信息，但登录SRS的任何人都不期望能够直接操作这三个系统中的任何一个，因此**它们不需要在SRS中用领域类来表示**。


    再次强调，当我们用代码实现SRS时，我们可能会发现创建“解决方案空间”的Java类来表示与其他自动化系统的接口是合适的；但这样的类不属于SRS的**领域**模型。


    因此，在重新审视所有参与者角色后，我们提出的候选类列表保持不变：


    *   `Course`

    *   `PlanOfStudy`

    *   `Professor`

    *   `Section`

    *   `Student`

    *   `Transcript`


    这是一个“完美”的列表吗？不，没有这样的东西。事实上，在一切尘埃落定之前，这个列表可能会——而且实际上很可能会——以以下方式演变：


    *   我们可能会在以后添加类：那些我们从规范中删除的术语，或者甚至没有出现在规范中但通过持续调查发现的术语。

    *   我们可能会看到泛化的机会——也就是说，我们可能会看到两个或多个类各自的属性、方法或与其他类的关系之间存在足够的共性，从而有必要创建一个共同的基类。

    *   此外，如前所述，我们可能会重新考虑将某些概念表示为简单属性（学期、教室等）而不是完整类，反之亦然的决定。


    正如本章迄今为止所展示的，候选类列表的开发充满了不确定性。因此，在开始你的第一次对象建模工作时，让团队中有经验的对象建模者可用是非常重要的。大多数有经验的建模者不会使用短语分析这种机械方法来推导候选类列表；这些人可以大致审查规范并直接挑选出重要的类，就像专业珠宝商可以轻松地从一堆假宝石中挑选出真钻石一样。然而，“重要”到底意味着什么？这就是“模糊性”所在。精确定义什么使一个概念重要而另一个不那么重要是不可能的。我试图通过处理SRS示例来说明一些经验法则，但你最终需要一位合格的导师来指导你，直到你培养出——并信任——自己对这类事情的直觉。


    然而，底线是，即使是专家建模者，也无法真正确认给定候选类的适当性，直到他们在完整上下文中看到它在类图中的拟议用途，该图还反映了关联、属性和方法，我们将在本章后面以及第[11](#78624_3_En_11_Chapter.xhtml)章中探讨这些内容。'
  raw: 'To further complicate matters*,* ***there is virtually never only one “best”
    or “correct” model***, only “better” or “worse” models (including incorrect models)
    relative to the problem to be solved. The same situation can be modeled in a variety
    of equally valid ways.


    Finally, there is no “acid test” to determine if a model has ***adequately captured
    all of a user’s requirements.***


    As we continue along with our SRS modeling exercise, and particularly as we move
    from modeling to implementation in Part 3 of the book, we’ll have many opportunities
    to rethink the decisions that we’ve made here. The key point to remember is that
    the model isn’t “cast in stone” until we actually begin programming, and even
    then, if we’ve used objects wisely, the model can be fairly painlessly modified
    to handle most new requirements. Think of a model as being formed out of modeling
    clay: we’ll continue to reshape it in Agile fashion over the course of the analysis
    and design phases of our project until we’re satisfied with the result.


    Meanwhile, back to the task of coming up with a list of candidate classes for
    the SRS. The terms that have survived our latest round of scrutiny are as follows:


    *   `Course`


    *   `PlanOfStudy`


    *   `Professor`


    *   `Section`


    *   `Student`


    *   `Transcript`


    *   `WaitList`


    Let’s examine `WaitList` one last time. There is indeed a requirement for the
    SRS to maintain a student’s position on a first-come, first-served waitlist. But
    it turns out that this requirement can actually be handled through a combination
    of an association between the `Student` and `Section` classes, plus something
    known as an **association class**, which you’ll learn about later in this chapter.
    This would not be immediately obvious to a beginning modeler, and so we’d fully
    expect that the `WaitList` class might make the final cut as a suggested SRS class.
    But we’re going to assume that we have an experienced object modeler on the team,
    who convinces us to eliminate the class; we’ll see that this is a suitable move
    when we complete the SRS class diagram at the end of the chapter.


    So we’ll settle on the following list of classes, based on our noun phrase analysis
    of the SRS specification:


    *   `Course`


    *   `PlanOfStudy`


    *   `Professor`


    *   `Section`


    *   `Student`


    *   `Transcript`


    ### Revisiting the Use Cases


    One more thing that we need to do before we deem our class list good to go is
    to revisit our use cases—in particular, the actors—to see if any of ***these***
    ought to be added as classes. You may recall that we identified seven potential
    actors for the SRS in Chapter [9](#78624_3_En_9_Chapter.xhtml):


    *   Student


    *   Faculty


    *   Department Chair


    *   Registrar


    *   Billing System


    *   Admissions System


    *   Classroom Scheduling System


    ***Do any of these deserve to be modeled as classes in the SRS?*** Here’s how
    to make that determination: if any user associated with any actor type `A` is
    going to need to manipulate (access or modify) information concerning an actor
    type `B` when `A` is logged on to the SRS, then `B` needs to be included as a
    class in our model. This is best illustrated with a few examples:


    *   When a student logs on to the SRS, might they need to manipulate information
    about faculty? Yes, when a student selects an advisor, for example, they might
    need to view information about a variety of faculty members in order to choose
    an appropriate advisor. So ***the Faculty actor role must be represented as a
    class in the SRS***; indeed, we have already designated a `Professor` class, so
    we’re covered there. But student users are not concerned with department chairs
    per se.


    *   Following the same logic, ***we’d need to represent the Student actor role
    as a class*** because when professors log on to the SRS, they will be manipulating
    `Student` objects when printing out a course roster or assigning grades to students,
    for example. Since `Student` already appears in our candidate class list, we’re
    covered there, as well.


    *   When ***any*** of the actors—Faculty, Students, the Registrar, the Billing
    System, the Admissions System, or the Classroom Scheduling System—access the SRS,
    will there be a need for any of them to manipulate information about the registrar?
    No, at least not according to the SRS requirements that we’ve seen so far. Therefore,
    ***we needn’t model the Registrar actor role as a class.***


    *   ***The same holds true for the Billing, Admissions, and Classroom Scheduling
    Systems***: they require “behind-the-scenes” access to information managed by
    the SRS, but nobody logging on to the SRS expects to be able to manipulate any
    of these three systems directly, so ***they needn’t be represented by domain classes
    in the SRS***.


    Again, when we get to implementing the SRS in code, we may indeed find it appropriate
    to create “solution space” Java classes to represent interfaces to these other
    automated systems; but such classes don’t belong in a ***domain*** model of the
    SRS.


    Therefore, our proposed candidate class list remains unchanged after revisiting
    all actor roles:


    *   `Course`


    *   `PlanOfStudy`


    *   `Professor`


    *   `Section`


    *   `Student`


    *   `Transcript`


    Is this a “perfect” list? No, there is no such thing. In fact, before all is said
    and done, the list may—and in fact probably will—evolve in the following ways:


    *   We may add classes later on: terms we eliminated from the specification or
    terms that don’t even appear in the specification, but which we’ll unearth through
    continued investigation.


    *   We may see an opportunity to generalize—that is, we may see enough commonality
    between two or more classes’ respective attributes, methods, or relationships
    with other classes to warrant the creation of a common base class.


    *   In addition, as mentioned earlier, we may rethink our decisions regarding
    representing some concepts as simple attributes (semester, room, etc.) instead
    of as full-blown classes and vice versa.


    The development of a candidate class list is, as illustrated in this chapter thus
    far, fraught with uncertainty. For this reason, it’s important to have someone
    experienced with object modeling available to your team when embarking on your
    first object modeling effort. Most experienced modelers don’t use the rote method
    of noun phrase analysis to derive a candidate class list; such folks can pretty
    much review a specification and directly pick out significant classes, in the
    same way that a professional jeweler can easily choose a genuine diamond from
    among a pile of fake gemstones. Nevertheless, what does “significant” really mean?
    That’s where the “fuzziness” comes in. It’s impossible to define precisely what
    makes one concept significant and another less so. I’ve tried to illustrate some
    rules of thumb by working through the SRS example, but you ultimately need a qualified
    mentor to guide you until you develop—and trust—your own intuitive sense for such
    things.


    The bottom line, however, is that even expert modelers can’t really confirm the
    appropriateness of a given candidate class until they see its proposed use in
    the full context of a class diagram that also reflects associations, attributes,
    and methods, which we’ll explore later in this chapter as well as in Chapter [11](#78624_3_En_11_Chapter.xhtml).'
