    教室位置：  ARTS25\n教授姓名：  Snidely Whiplash\n\n```\n\n首先，我们来看看 `Student` 类的属性，以确定哪些信息是我们可以直接获取的。`Student`\
    \ 继承自 `Person`\n\n```\nprivate String name;\nprivate String ssn;\n```\n\n并添加了\n\
