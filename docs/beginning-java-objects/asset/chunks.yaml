    ![](images/78624_3_En_10_Chapter/78624_3_En_10_Fig34_HTML.png)


    An illustration represents 2 rectangular blocks labeled superclass A and subclass
    B. Subclass b points an arrow toward superclass A.


    Figure 10-34


    Multiplicity adornments are inappropriate for inheritance relationships


    If we wanted to illustrate some sort of relationship between different objects
