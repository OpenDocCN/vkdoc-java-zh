    ```


    我们还了解到，可以通过使用命令行选项来控制 JVM 行为的某些方面；这些标志位于 `java` 命令和类名之间。例如，我们在本章前面了解到，可以通过使用 `–cp`
    选项来设置程序的***类路径***——即告知 JVM 在哪里搜索字节码文件，如下所示：


    ```

