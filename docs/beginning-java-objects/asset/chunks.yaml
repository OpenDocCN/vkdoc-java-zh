  trans: '

    ## 打印到控制台窗口


    大多数应用程序通过图形用户界面显示消息来与用户通信。然而，有时能够将简单的文本消息显示到我们运行程序的控制台窗口也很有用，这是一种快速而粗糙的验证程序是否正常运行的方法。


    要将文本消息打印到屏幕，我们使用以下语法：


    ```

    System.out.println(要打印的表达式);

    ```


    `System.out.println` 方法可以接受非常复杂的表达式，并尽力将其最终转换为一个单一的 `String` 值，然后显示在屏幕上。以下是一些示例：


    ```

    System.out.println("Hi!");         // 打印字符串字面量/常量。

    String s = "Hi!";

    System.out.println(s);             // 打印字符串变量的值。

    String t = "foo";

    String u = "bar";

    System.out.println(t + u + "!");   // 使用字符串连接运算符 (+)

    // 打印 "foobar!"。

    int x = 3;

    int y = 4;

    System.out.println(x);             // 将整数值 3 的字符串表示形式

    // 打印到屏幕。

    System.out.println(x + y);         // 计算 x 和 y 的和，然后将整数值 7 的

    // 字符串表示形式打印到屏幕。

    ```


    请注意，在最后一行代码中，加号 (`+`) 被解释为***加法***运算符，而不是 `String` ***连接***运算符，因为它分隔了两个都声明为 `int`
    类型的变量。因此，3 + 4 的和被计算为 7，然后被打印出来。然而，在下一个示例中，我们得到了不同（并且可以说是不期望的）行为：


    ```

    System.out.println("x 加 y 的和是：" + x + y);

    ```


    上一行代码会导致打印出以下内容：


    ```

    x 加 y 的和是：34

    ```


    这是为什么呢？回想一下，我们是从左到右计算表达式的，因此由于两个加号中的第一个分隔了一个 `String` 字面量和一个 `int`


    ```

    System.out.println("x 加 y 的和是：" + x + y);

    ```


    第一个加号被解释为 `String` 连接运算符，生成了中间 `String` 值 `"x 加 y 的和是：3"`。第二个加号将这个中间 `String`
    值与一个 `int` 分隔开，因此第二个加号***也***被解释为 `String` 连接运算符，生成了最终的 `String` 值 `"x 加 y 的和是：34"`，并将其打印到命令窗口。


    要打印 `x` 和 `y` 的***正确***和，我们必须通过将加法表达式括在嵌套括号中来强制第二个加号被解释为整数加法运算符：


    ```

    System.out.println("x 加 y 的和是：" + (x + y));

    ```


    嵌套括号导致最内层的表达式首先被计算，从而正确地计算出 `x + y` 的和。因此，这个 `println` 语句在屏幕上显示了正确的消息：


    ```

    x 加 y 的和是：7

    ```


    在编写涉及复杂表达式的代码时，最好大量使用括号，以便向编译器明确你的意图。正确使用时，多余的括号从不会造成伤害！


    ### print 与 println 的区别


    当我们调用 `System.out.println` 方法时，括号内包含的任何表达式都会被打印，随后跟一个（平台相关的）**行终止符**。以下代码片段


    ```

    System.out.println("第一行。");

    System.out.println("第二行。");

    System.out.println("第三行。");

    ```


    会产生三行独立的输出：


    ```

    第一行。

    第二行。

    第三行。

    ```


    相比之下，`System.out.print()` 方法


    ```

    System.out.print(要打印的表达式);

    ```


    会导致括号内包含的任何表达式被打印，但***不***带尾随的行终止符。将 `print` 与 `println` 结合使用，允许我们跨***一系列*** Java
    语句生成***单行***输出，如下例所示：


    ```

    System.out.print("J");        // 这里使用 print。

    System.out.print("AV");       // 这里使用 print。

    System.out.println("A!!!");   // 注意最后一条语句使用了 println。

    ```


    这段代码片段产生单行输出：


    ```

    JAVA!!!

    ```


    当单个打印语句过长而无法放在一行时，如下例所示


    ```

    // 伪代码。

    语句;

    另一条语句;

    System.out.println("这里是一个很长的单个打印语句的示例……"

    + "它长到换行，使得程序列表难以阅读。");

    又一条语句;

    ```


    我们可以通过将此类语句的内容分解为多个连接的 `String` 表达式，然后在加号边界处断开语句，使程序列表更易读：


    ```

    // 伪代码。

    语句;

    另一条语句;

    System.out.println("这里是一个如何" +

    "用加号断开长打印语句" +

    "的示例。");

    又一条语句;

    ```


    尽管前面的 `System.out.println` 调用跨了三行代码，但它将被打印为单行输出：


    ```

    这里是一个如何用加号断开长打印语句的示例。

    ```


    ### 转义序列


    Java 定义了许多**转义序列**，以便我们可以在 `String` 或 `char` 字面量中表示特殊字符，例如换行符和制表符。最常用的转义序列列在表
    2-5 中。


    表 2-5


    Java 转义序列


    | 转义序列 | 描述 |

    | --- | --- |

    | `\n` | 换行 |

    | `\b` | 退格 |

    | `\t` | 制表符 |

    | `\\` | 反斜杠 |

    | `\''` | 单引号，在单引号内使用（例如，`char singleQuote = ''\'''';`） |

    | `\"` | 双引号，在双引号内使用（例如，`String doubleQuote = "\"";`） |


    一个或多个转义序列可以包含在传递给 `print` 和 `println` 方法的表达式中。例如，考虑以下代码片段：


    ```

    System.out.println("一……");

    System.out.println("\t……二……");

    System.out.println("\t\t……三…… \"呜呼！！！\"");

    ```


    当执行上述代码时，会显示以下输出：


    ```

    一……

    ……二……

    ……三…… "呜呼！！！"

    ```


    第二行和第三行输出分别缩进了一个和两个制表位，这是由于使用了 `\t`，而表达式 `"呜呼！！！"` 被打印在双引号内，这是因为我们使用了 `\"`。


    ## Java 风格要素


    优秀程序员的一个标志是他们能编写出***人类可读***的代码，以便同事能够使用和修改他们的程序。以下部分提供了一些指南和约定，将帮助你编写清晰、可读的 Java
    代码。

    '
- fmt: "### Proper Use of Indentation\n\nOne of the best ways to make a Java program\
    \ readable is through proper use of indentation to clearly delineate its block\
    \ structure. Statements within a block of code should be indented relative to\
    \ the starting/ending line of the enclosing block (i.e., indented relative to\
    \ the lines carrying the braces). The standard recommendation is to use four spaces\
    \ (note that some of the examples in this book vary from that standard).\n\nTo\
    \ see how indentation can make a program readable, consider the following two\
    \ programs. In the first simple program, proper indentation is used:\n\n```\n\
    public class IndentationExample {\n    public static void main(String[] args)\
    \ {\n        for (int i = 1; i <= 4; i++) {\n            System.out.print(i);\n\
    \            if ((i == 2) || (i == 4))  {\n                if (i == 2) {\n   \
    \                 System.out.print(\"Two \");\n                }\n           \
    \     else {\n                    System.out.print(\"Four \");\n             \
    \   }\n                System.out.println(\"is an even number\");\n          \
