    ```


    But recall that when we looked at the `postGrade` method of the `Section` class,
    we discussed the fact that `Section` was responsible for maintaining the bidirectionality
    of this association. When the `Section`’s `postGrade` method invokes the `TranscriptEntry`
    constructor, the `Section` object is returned a handle on this `TranscriptEntry`
    object, which it stores in the appropriate attribute. So we only need to worry
    about the second half of this “handshake” here in `TranscriptEntry`.


    On the other hand, the `TranscriptEntry` object has full responsibility for maintaining
    the bidirectionality of the association between itself and the `Transcript` object:


    ```

    // Obtain the Student''s transcript ...

    Transcript t = s.getTranscript();

    // ... and then link the Transcript and the TranscriptEntry

    // together bidirectionally.

    this.setTranscript(t);

    t.addTranscriptEntry(this);

    }

