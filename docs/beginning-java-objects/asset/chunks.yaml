    \      }\n    }\n    return outcome;\n}\n```\n\n### SRS驱动程序\n\n现在我们已经编写了SRS模型所需的所有类，我们需要一种方法来测试它们。我们可以等到构建了GUI前端后再全面测试应用程序；然而，尽早了解核心类是否正常工作会更好。一个非常有用的技术是编写一个命令行驱动的程序，实例化不同类型的对象，调用它们的关键方法，并将结果显示在命令行窗口中供我们检查。\n\
    \n我们将通过创建一个名为`SRS`的类来实现这样一个程序，该类包含一个`main`方法，作为我们的测试“驱动程序”。\n\n#### 公共静态属性\n\n\
    我们将在此程序中实例化一些`Professor`、`Student`、`Course`和`Section`对象，因此我们需要一种方法来组织对这些对象的引用。我们将创建集合对象作为`SRS`类的属性，以保存这些不同的对象类型。同时，我们将它们声明为`public\
    \ static`属性，这意味着我们将这些主要对象集合全局提供给整个应用程序；然后可以在整个SRS应用程序中通过`SRS.`*collectionName*（例如`SRS.faculty`）访问它们：\n\
    \n```java\n// We can effectively create \"global\" data by declaring\n// collections\
    \ of objects as public static attributes in\n// the main class;\npublic static\
    \ ArrayList faculty;\npublic static ArrayList studentBody;\npublic static ArrayList\
    \ courseCatalog;\n// The next collection -- of Section object references -- is\
    \ encapsulated\n// within a special-purpose class by virtue of how we modeled\
    \ the SRS in UML;\n// note that we could have encapsulated the preceding three\
    \ collections in\n// similar fashion.\npublic static ScheduleOfClasses scheduleOfClasses\
    \ =\n    new ScheduleOfClasses(\"SP2005\");\n```\n\nSRS的`ScheduleOfClasses`类充当`Section`对象的集合点；对于其他类型的对象，我们使用简单的`ArrayList`，尽管我们可以设计类似于`ScheduleOfClasses`的类来作为封装的集合，分别命名为`Faculty`、`StudentBody`和`CourseCatalog`。我们不需要为`Transcript`对象（我们将通过`Student`对象维护的句柄访问它们）或`TranscriptEntry`对象（我们将通过`Transcript`对象本身访问它们）创建集合。"
  raw: "#### validateGrade(), passingGrade( )\n\nThe `TranscriptEntry` class provides\
    \ our first SRS example of `public static` methods. It declares two methods, `validateGrade`\
    \ and `passingGrade`, that may be invoked as utility methods on the `TranscriptEntry`\
    \ class from anywhere in the SRS application:\n\n*   The first is used to validate\
    \ whether or not a particular string—say, “B+”—is a valid grade. Here we see the\
    \ business rules disclosed for what constitutes such a grade:\n\n    ```\n   \
    \ public static boolean validateGrade(String grade) {\n    boolean outcome = false;\n\
    \    if (grade.equals(\"F\") ||\n    grade.equals(\"I\")) {\n    outcome = true;\n\
    \    }\n    if (grade.startsWith(\"A\") ||\n    grade.startsWith(\"B\") ||\n \
    \   grade.startsWith(\"C\") ||\n    grade.startsWith(\"D\")) {\n    if (grade.length()\
    \ == 1) outcome = true;\n    else if (grade.length() == 2) {\n    if (grade.endsWith(\"\
    +\") ||\n    grade.endsWith(\"-\")) {\n    outcome = true;\n    }\n    }\n   \
    \ }\n    return outcome;\n    }\n    ```\n\n*   The second is used to determine\
    \ whether or not a particular string—say “D+”—is a ***passing*** grade. A slightly\
    \ different set of business rules is applied in this case:\n\n    ```\n    public\
    \ static boolean passingGrade(String grade) {\n    boolean outcome = false;\n\
    \    // First, make sure it is a valid grade.\n    if (validateGrade(grade)) {\n\
    \    // Next, make sure that the grade is a D or better.\n    if (grade.startsWith(\"\
    A\") ||\n    grade.startsWith(\"B\") ||\n    grade.startsWith(\"C\") ||\n    grade.startsWith(\"\
    D\")) {\n    outcome = true;\n    }\n    }\n    return outcome;\n    }\n    ```\n\
    \nAs we discussed in Chapter [7](#78624_3_En_7_Chapter.xhtml), `public static`\
    \ methods can be invoked on the hosting class as a whole—in other words, an object\
    \ needn’t be instantiated in order to use these methods.\n\n### The Transcript\
    \ Class\n\nFigure [14-13](#78624_3_En_14_Chapter.xhtml#Fig13) shows the UML representation\
    \ of the `Transcript` class. The sections that follow provide more detail about\
    \ this class.\n\n![](images/78624_3_En_14_Chapter/78624_3_En_14_Fig13_HTML.png)\n\
    \nA block diagram of the transcript includes the command verify completion.\n\n\
    Figure 14-13\n\nThe `Transcript` class\n\n#### Transcript Attributes\n\nThe `Transcript`\
    \ class participates in two relationships:\n\n*   ***maintains***, a one-to-one\
    \ association with `Student`\n\n*   An unnamed, one-to-many aggregation with `TranscriptEntry`\n\
    \nThe SRS class diagram does not call out any other attributes for the `Transcript`\
    \ class, so we only encode these two:\n\n```\nprivate ArrayList transcriptEntries;\n\
    private Student studentOwner;\n```\n\n#### verifyCompletion( )\n\nThe `Transcript`\
    \ class has one particularly interesting method, `verifyCompletion`, which is\
    \ used to determine whether or not the `Transcript` contains evidence that a particular\
    \ `Course` requirement has been satisfied. This method steps through the `ArrayList`\
    \ of `TranscriptEntries` maintained by the `Transcript` object:\n\n```\npublic\
    \ boolean verifyCompletion(Course c) {\nboolean outcome = false;\n// Step through\
    \ all TranscriptEntries, looking for one\n// that reflects a Section of the Course\
    \ of interest.\nfor (TranscriptEntry te : transcriptEntries) {\n```\n\nFor each\
    \ entry, it obtains a handle on the `Section` object represented by this entry\
    \ and then invokes the `isSectionOf` method on that object to determine whether\
    \ or not that `Section` represents the `Course` of interest:\n\n```\nSection s\
    \ = te.getSection();\nif (s.isSectionOf(c)) {\n```\n\nAssuming that the `Section`\
    \ is indeed relevant, the method next uses the `static passingGrade` method of\
    \ the `TranscriptEntry` class to determine whether or not the grade earned in\
    \ this `Section` was a passing grade. If it was a passing grade, we can terminate\
    \ the loop immediately, since we need to find only ***one*** example of a passing\
    \ grade for the `Course` of interest in order to return a `true` outcome from\
    \ this method:\n\n```\n// Ensure that the grade was high enough.\nif (TranscriptEntry.passingGrade(te.getGrade()))\
    \ {\noutcome = true;\n// We've found one, so we can afford to\n// terminate the\
    \ loop now.\nbreak;\n}\n}\n}\nreturn outcome;\n}\n}\n```\n\n### The SRS Driver\
    \ Program\n\nNow that we’ve coded all of the classes called for by our model of\
    \ the SRS, we need a way to test these. We could wait to put our application through\
    \ its paces until we’ve built a GUI front end; however, it would be nice to know\
    \ sooner rather than later that our core classes are working properly. One very\
    \ helpful technique for doing so is to write a command-line–driven program to\
    \ instantiate objects of varying types and to invoke their critical methods, displaying\
    \ the results to the command-line window for us to inspect.\n\nWe’ll develop just\
    \ such a program by creating a class called `SRS` with a `main` method that will\
    \ serve as our test “driver.”\n\n#### Public Static Attributes\n\nWe are going\
    \ to instantiate some `Professor`, `Student`, `Course`, and `Section` objects\
    \ in this program, so we need a way to organize references to these objects. We’ll\
    \ create collection objects as attributes of the `SRS` class to hold each of these\
    \ different object types. While we’re at it, we’ll declare them to be `public\
    \ static` attributes, which means that we’re making these main object collections\
    \ globally available to the entire application; these can then be accessed throughout\
    \ the SRS application as `SRS.`*collectionName* (e.g., `SRS.faculty`):\n\n```\n\
    // We can effectively create \"global\" data by declaring\n// collections of objects\
    \ as public static attributes in\n// the main class;\npublic static ArrayList\
    \ faculty;\npublic static ArrayList studentBody;\npublic static ArrayList courseCatalog;\n\
    // The next collection -- of Section object references -- is encapsulated\n//\
    \ within a special-purpose class by virtue of how we modeled the SRS in UML;\n\
    // note that we could have encapsulated the preceding three collections in\n//\
    \ similar fashion.\npublic static ScheduleOfClasses scheduleOfClasses =\nnew ScheduleOfClasses(\"\
    SP2005\");\n```\n\nThe SRS `ScheduleOfClasses` class serves as a collection point\
    \ for `Section` objects; for the other types of objects, we use simple `ArrayList`s,\
    \ although we could go ahead and design classes comparable to `ScheduleOfClasses`\
    \ to serve as encapsulated collections, perhaps named `Faculty`, `StudentBody`,\
    \ and `CourseCatalog`, respectively. We don’t need a collection for `Transcript`\
    \ objects—we’ll get to these via the handles that `Student` objects maintain—or\
    \ for `TranscriptEntry` objects (we’ll get to these via the `Transcript` objects\
    \ themselves)."
