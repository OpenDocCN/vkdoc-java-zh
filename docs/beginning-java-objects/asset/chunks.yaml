- fmt: "### Delegation Revisited\n\nIn discussing the `Student` class, I briefly mentioned\
    \ the `displayCourseSchedule` method as a complex example of delegation and promised\
    \ to come back and discuss it further.\n\nWhat are the “raw materials”—data—available\
    \ for an object to use when it is responding to a service request by executing\
    \ one of its methods? By way of review, an object has at its disposal the following\
    \ data sources:\n\n- Simple data and/or object references (handles) that have\
    \ been encapsulated as attributes within the object itself\n- Simple data and/or\
    \ object references that are passed in as arguments in the method signature\n\
    - Data that is made available globally to the application as `public static` attributes\
    \ of some other class\n- Data that can be requested from any of the objects that\
    \ this object has a handle on\n\nIt is this last source of data—data available\
    \ by collaborating with other objects—that is going to play a particularly significant\
    \ role in implementing the `displayCourseSchedule` method for the `Student` class.\n\
    \nLet’s say we want the `displayCourseSchedule` method to display the following\
    \ information for each `Section` that a `Student` is currently enrolled in:\n\n\
    ```\nCourse No.:\nSection No.:\nCourse Name:\nMeeting Day and Time Held:\nRoom\
    \ Location:\nProfessor's Name:\n```\n\nFor example:\n\n```\nCourse Schedule for\
    \ Fred Schnurd\nCourse No.:  CMP101\nSection No.:  2\nCourse Name:  Beginning\
    \ Computer Technology\nMeeting Day and Time Held:  W - 6:10 - 8:00 PM\nRoom Location:\
    \  GOVT202\nProfessor's Name:  Claudio Cioffi\n\nCourse No.:  ART101\nSection\
    \ No.:  1\nCourse Name:  Beginning Basketweaving\nMeeting Day and Time Held: \
    \ M - 4:10 - 6:00 PM\nRoom Location:  ARTS25\nProfessor's Name:  Snidely Whiplash\n\
    ```\n\nLet’s start by looking at the attributes of the `Student` class, to see\
    \ which of this information is readily available to us. `Student` inherits from\
    \ `Person`:\n\n```\nprivate String name;\nprivate String ssn;\n```\n\nand adds:\n\
    \n```\nprivate String major;\nprivate String degree;\nprivate Transcript transcript;\n\
    private ArrayList attends;\n```\n\nLet’s begin to write the method. By stepping\
    \ through the `attends ArrayList`, we can gain access to `Section` objects one\
    \ by one:\n\n```\npublic void displayCourseSchedule() {\n    // Display a title\
    \ first.\n    System.out.println(\"Course Schedule for \" + this.getName());\n\
