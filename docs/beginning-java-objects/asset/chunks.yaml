    *   `String replace(char old, char new)`: Creates a brand-new `String` object
    in which all instances of the `old` character are replaced with the `new` character`—`the
    original `String`’s value is unaffected:


    ```

    String s = "foobar";

    int i = s.indexOf("bar");  // i will equal 3

    int j = s.indexOf("cat");  // j will equal -1

    int k = s.indexOf("f");    // k will equal 0

