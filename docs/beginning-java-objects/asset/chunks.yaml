    ## Summary


    In this chapter, we discussed


    *   How formal Java-specific terminology differs from the informal terminology
    commonly used to describe object concepts

    *   The object nature of `String`s and some of the methods provided to manipulate
    them

    *   How we can form highly complex expressions by chaining messages

    *   How Java exceptions arise and how to gracefully handle them, including the
    ability to define our own custom exception types

    *   How to read input from the command line when a Java application is invoked,
    as well as how to prompt the user for keyboard inputs, useful techniques when
    running a command-line-driven application

    *   Using the `this` keyword to self-reference an object from within one of its
    methods

    *   The utility features of the wrapper classes — `Integer`, `Double`, etc. —
    to convert `String` data to numeric values and vice versa

    *   The nature of object identities in Java, how to discover the true class that
    an object belongs to, and how to test the equality of two Java objects

    *   The importance of overriding the `toString` method for all user-defined classes
