  trans: '

    我们通常将高阶关联分解为适当数量的二元关联。例如，我们可以将上述的三方关联表示为三个二元关联（见图 5-3）：


    ![](img/78624_3_En_5_Fig3_HTML.png)


    一个带有虚线的三角形图，顶点处标注有文本：学生、教授和课程。底边标注有“授课”，两侧边分别标注有“指导”和“听课”。


    图 5-3


    使用三个二元关联的等效表示


    *   一个 `Student`（学生）***attends***（参加）一个 `Course`（课程）。

    *   一个 `Professor`（教授）***teaches***（教授）一个 `Course`（课程）。

    *   一个 `Professor`（教授）***instructs***（指导）一个 `Student`（学生）。


    在给定的关联中，每个参与类都被认为具有一个**角色**。在 ***advises***（指导）关联（一个 `Professor` ***advises***
    一个 `Student`）中，`Professor` 的角色可能被称为“导师”，而 `Student` 的角色可能被称为“受指导者”。


    只有当有助于阐明抽象概念时，我们才会费心为参与关联的对象指定角色名称。在“is enrolled in”（已注册）关联（一个 `Student` ***is
    enrolled in*** 一个 `Course`）中，没有必要为关联两端的 `Student` 和 `Course` 发明角色名称，因为这样的角色名称不会显著增加抽象概念的清晰度。


    ### 多重性


    对于类 A 和类 B 之间的给定关联类型 X，术语**多重性**指的是可以与给定类型 B 实例相关联的类型 A 对象的数量。例如，一个 `Student`
    参加 ***多个*** `Course`，但一个 `Student` 在导师角色上只有 ***一个*** `Professor`。


    多重性有三种基本的“风格”：**一对一**、**一对多**和**多对多**。


    #### 一对一 (1:1)


    在一对一 (1:1) 关联中，类 A 的一个实例恰好与类 B 的一个实例相关——不多不少，反之亦然。例如：


    *   一个 `Student` 恰好有一个 `Transcript`（成绩单），并且一个 `Transcript` 恰好属于一个 `Student`。

    *   一个 `Professor` 恰好主持一个 `Department`（系），并且一个 `Department` 恰好有一个 `Professor`
    担任系主任角色。


    我们可以通过说明类在任一端的参与是可选还是强制来进一步约束关联。例如，我们可以将前面的关联修改如下：


    *   一个 `Professor` ***可选地*** 恰好主持一个 `Department`，但一个 `Department` ***必须*** 恰好有一个
    `Professor` 担任系主任角色。


    这个修订版的关联比之前的版本更真实地描绘了现实世界的情况。虽然大学里的每个系通常确实有一位系主任，但并非每位教授都是系主任——没有那么多的系可供分配！然而，确实如此，***如果***
    一位教授碰巧是一个系的系主任，那么该教授只 ***一个*** 系的系主任。


    #### 一对多 (1:m)


    在一对多 (1:m) 关联中，可以有 ***多个*** 类 B 的实例以特定方式与 ***单个*** 类 A 的实例相关；但是，从类 B 实例的角度来看，只能有
    ***一个*** 类 A 的实例与之如此相关。例如：


    *   一个 `Department` 雇佣了 ***多个*** `Professor`，但一个 `Professor` 为 ***恰好一个*** `Department`
    工作。

    *   一个 `Professor` 指导 ***多个*** `Student`，但一个给定的 `Student` 恰好有 ***一个*** `Professor`
    作为导师。


    请注意，此处的“多个”可以解释为“零个或多个（可选）”或“一个或多个（强制）”。为了更具体一些，我们可以将之前的一对多关联细化如下：


    *   一个 `Department` 雇佣了 ***一个或多个***（“多个”，***强制***）`Professor`，但一个 `Professor`
    为恰好一个 `Department` 工作。

    *   一个 `Professor` 指导 ***零个或多个***（“多个”，***可选***）`Student`，但一个给定的 `Student` 恰好有一个
    `Professor` 作为导师。


    此外，与一对一关系一样，一对多关联的“一”端也可以被指定为强制或可选。例如，如果我们在建模一个不要求学生必须选择导师的大学环境，我们可以将之前的关联细化如下：


    *   一个 `Professor` 指导 ***零个或多个***（“多个”，***可选***）`Student`，但一个给定的 `Student` 可以
    ***可选地*** 拥有 ***至多一个***（即 ***零个或一个***）`Professor` 作为导师。


    #### 多对多 (m:m)


    在多对多 (m:m) 关联中，类 A 的一个给定实例可以有多个类 B 的实例与之相关，反之亦然。例如：


    *   一个 `Student` 注册了多个 `Course`，并且一个 `Course` 有多个 `Student` 注册其中。

    *   一个给定的 `Course` 可以有多个先修 `Course`，并且一个给定的 `Course` 反过来可以成为多个 ***其他*** `Course`
    的先修课程。（这是多对多 ***自反*** 关联的一个例子。）


    与一对多关联一样，在 (m:m) 关联的任一端，“多个”可以解释为 ***零*** 个或多个（***可选***）或 ***一个*** 或多个（***强制***），例如：


    *   一个 `Student` 注册了 ***零个或多个***（“多个”，***可选***）`Course`，并且一个 `Course` 有 ***一个或多个***（“多个”，***强制***）`Student`
    注册其中。


    当然，特定关联的有效性——涉及的类、其多重性以及两个参与类在关联中参与的可选或强制性质——完全取决于被建模的现实世界情况。如果你正在建模一个大学，其中系可以有多个系主任，或者学生可以有多个导师，那么你对多重性的选择将与前面示例中使用的不同。

    '
- fmt: '### Multiplicity and Links


    Note that the concept of multiplicity pertains to associations, but not to links.
    Links always exist in pairwise fashion between two objects (or, as mentioned earlier,
    in rare cases between an object and itself). Therefore, multiplicity in essence
    defines how many links of a certain association type can originate from a given
    object. This is best illustrated with an example.


    Consider once again the many-to-many “is enrolled in” association:


    - A `Student` enrolls in zero or more `Courses`, and a `Course` has one or more
    `Students` enrolled in it.


    A specific `Student` object can have zero, one, or more links to `Course` objects,
    but any one of those links is between exactly two objects: a single `Student`
    object and a single `Course` object. In Figure [5-4](#78624_3_En_5_Chapter.xhtml#Fig4),
    for example


    ![](images/78624_3_En_5_Chapter/78624_3_En_5_Fig4_HTML.jpg)


    A network of X, Y, and Z students with the courses A, B, C, and D. It has the
    links of X to A, Y to A, Y to B, Y to C, and Y to D.


    Figure 5-4


    Illustrating a many-to-many association between classes with pairwise links between
    objects


    - `Student` X has one link (to `Course` A).

    - `Student` Y has four links (to `Course`s A, B, C, and D).

    - `Student` Z has no links to any `Course` objects whatsoever. (Z is taking the
    semester off!)


    Conversely, a specific `Course` object must have one or more links to `Student`
    objects to satisfy the mandatory nature and multiplicity of the “is enrolled in”
    association, but again, any one of those links is between exactly two objects:
    a single `Course` object and a single `Student` object. In Figure [5-4](#78624_3_En_5_Chapter.xhtml#Fig4),
    for example


    - `Course` A has two links (to `Students` X and Y).

    - `Courses` B, C, and D each have one link (to the same `Student`, Y).


    This example scenario does indeed uphold the many-to-many “is enrolled in” association
    between the `Student` and `Course` classes; it’s but one of an infinite number
    of possible scenarios that may exist between the classes in question.


    Just to make sure that this concept is clear, let’s look at another example, this
    time using the one-to-one association:


    - A `Professor` optionally chairs exactly one `Department`, and it is mandatory
    that a `Department` has exactly one `Professor` in the role of chairperson.


    In Figure [5-5](#78624_3_En_5_Chapter.xhtml#Fig5), we see that


    ![](images/78624_3_En_5_Chapter/78624_3_En_5_Fig5_HTML.jpg)


    A network of professors 1, 2, 3, and 4 with departments A and B. It has the links
    of professor 1 to A and professor 4 to B.


    Figure 5-5


    Illustrating a one-to-one association between classes with binary links between
    objects


    - `Professor` objects 1 and 4 each have one link, to `Department` objects A and
    B, respectively.

    - `Professor` objects 2 and 3 have no such links.


    Moreover, from the `Department` objects’ perspective, each `Department` does indeed
    have exactly one link to a `Professor`. Therefore, this example upholds the one-to-one
    “chairs” association between `Professor` and `Department` while further illustrating
    the optional nature of the `Professor` class’s participation in such links. Again,
    it’s but one of an infinite number of possible scenarios that may exist between
    the classes in question.


    ## Aggregation and Composition


    **Aggregation** is a special form of association, alternatively referred to as
    the “consists of,” “is composed of,” or “has a” relationship. Like an association,
    an aggregation is used to represent a relationship between two classes, A and
    B. But, with an aggregation, we’re representing more than mere relationship: we’re
    stating that an object belonging to class A, known as an **aggregate**, is composed
    of, or contains, **component objects** belonging to class B.


    For example, a car is composed of an engine, a transmission, four wheels, etc.,
    so if `Car`, `Engine`, `Transmission`, and `Wheel` were all classes, then we could
    form the following aggregations:


    - A `Car` contains an `Engine`.

    - A `Car` contains a `Transmission`.

    - A `Car` contains many (in this case, four) `Wheel`s.


    Or, as an example related to the SRS, we can say that


    - A `University` is composed of many `School`s (the School of Engineering, the
    School of Law, etc.).

    - A `School` is composed of many `Department`s.

    - And so forth.


    We wouldn’t typically say, however, that a `Department` is composed of many `Professor`s;
    instead, we’d probably state that a `Department` employs many `Professor`s.


    Note that these aggregation statements appear very similar to associations, where
    the name of the association just so happens to be “is composed of” or “contains.”
    That’s because an aggregation is an association in the broad sense of the term.


    Why the fuss over trying to differentiate between aggregation and association?
    If an aggregation is really an association, must we even acknowledge aggregation
    as a distinct type of relationship between classes? Strictly speaking, the answer
    is no.


    - There are indeed distinct representations in UML for the notions of aggregation
    vs. association, which we’ll discuss in Chapter [10](#78624_3_En_10_Chapter.xhtml).

    - However, as it turns out, both of these abstractions are ultimately rendered
    in code in precisely the same way.


    Thus, it can be argued that it isn’t really absolutely necessary to differentiate
    the notion of aggregation from association. Nonetheless, it behooves anyone who
    aspires to become proficient with object modeling and UML to be aware of this
    subtle distinction, if for no other reason than to be able to communicate effectively
    with other UML practitioners who are using such notation.


    **Composition** is a strong form of aggregation, in which the “parts” cannot exist
    without the “whole.” As an example, given the relationship “a `Book` is composed
    of many `Chapter`s,” we could argue that a chapter cannot exist if the book to
    which it belongs ceases to exist; whereas given the relationship “a `Car` is composed
    of many `Wheel`s,” we know that a wheel can be removed from a car and still serve
    a useful purpose. Thus, we’d categorize the `Book`-`Chapter` relationship as composition
    and the `Car`-`Wheel` relationship as aggregation.


    ## Inheritance


    Whereas many of the OO techniques that you’ve learned for achieving a high degree
    of code flexibility and maintainability—for example, encapsulation and information
    hiding—are arguably achievable with non-OO languages in some form or another,
    the **inheritance** mechanism is what truly sets OO languages apart from their
    non-OO counterparts.


    Before we dive into an in-depth discussion of how inheritance works, let’s establish
    a compelling case for inheritance by looking at the problems that arise in its
    absence.'
  raw: '### Multiplicity and Links


    Note that the concept of multiplicity pertains to associations, but not to links.
    ***Links always exist in pairwise fashion between two objects*** (or, as mentioned
    earlier, in rare cases between an object and itself). Therefore, multiplicity
    in essence defines how many links of a certain association type can originate
    from a given object. This is best illustrated with an example.


    Consider once again the many-to-many “is enrolled in” association:


    *   A `Student` enrolls in zero or more `Courses`, and a `Course` has one or more
    `Students` enrolled in it.


    A ***specific*** `Student` object can have zero, one, or more links to `Course`
    objects, but any ***one*** of those links is between exactly ***two*** objects:
    a single `Student` object and a single `Course` object. In Figure [5-4](#78624_3_En_5_Chapter.xhtml#Fig4),
    for example


    ![](images/78624_3_En_5_Chapter/78624_3_En_5_Fig4_HTML.jpg)


    A network of X, Y, and Z students with the courses A, B, C, and D. It has the
    links of X to A, Y to A, Y to B, Y to C, and Y to D.


    Figure 5-4


    Illustrating a many-to-many association between classes with pairwise links between
    objects


    *   `Student` X has one link (to `Course` A).


    *   `Student` Y has four links (to `Course`s A, B, C, and D).


    *   `Student` Z has no links to any `Course` objects whatsoever. (Z is taking
    the semester off!)


    Conversely, a ***specific*** `Course` object must have one or more links to `Student`
    objects to satisfy the mandatory nature and multiplicity of the “is enrolled in”
    association, but again, any ***one*** of those links is between exactly ***two***
    objects: a single `Course` object and a single `Student` object. In Figure [5-4](#78624_3_En_5_Chapter.xhtml#Fig4),
    for example


    *   `Course` A has two links (to `Students` X and Y).


    *   `Courses` B, C, and D each have one link (to the same `Student`, Y).


    This example scenario does indeed uphold the many-to-many “is enrolled in” association
    between the `Student` and `Course` classes; it’s but one of an infinite number
    of possible scenarios that may exist between the classes in question.


    Just to make sure that this concept is clear, let’s look at another example, this
    time using the one-to-one association:


    *   A `Professor` ***optionally*** chairs exactly one `Department`, and it is
    ***mandatory*** that a `Department` has exactly one `Professor` in the role of
    chairperson.


    In Figure [5-5](#78624_3_En_5_Chapter.xhtml#Fig5), we see that


    ![](images/78624_3_En_5_Chapter/78624_3_En_5_Fig5_HTML.jpg)


    A network of professors 1, 2, 3, and 4 with departments A and B. It has the links
    of professor 1 to A and professor 4 to B.


    Figure 5-5


    Illustrating a one-to-one association between classes with **binary** links between
    objects


    *   `Professor` objects 1 and 4 each have one link, to `Department` objects A
    and B, respectively.


    *   `Professor` objects 2 and 3 have no such links.


    Moreover, from the `Department` objects’ perspective, each `Department` does indeed
    have exactly one link to a `Professor`. Therefore, this example upholds the one-to-one
    “chairs” association between `Professor` and `Department` while further illustrating
    the optional nature of the `Professor` class’s participation in such links. Again,
    it’s but one of an infinite number of possible scenarios that may exist between
    the classes in question.


    ## Aggregation and Composition


    **Aggregation** is a special form of association, alternatively referred to as
    the “consists of,” “is composed of,” or “has a” relationship. Like an association,
    an aggregation is used to represent a relationship between two classes, A and
    B. But, with an aggregation, we’re representing more than mere relationship: we’re
    stating that an object belonging to class A, known as an **aggregate**, is composed
    of, or contains, **component objects** belonging to class B.


    For example, a car is composed of an engine, a transmission, four wheels, etc.,
    so if `Car`, `Engine`, `Transmission`, and `Wheel` were all classes, then we could
    form the following aggregations:


    *   A `Car` ***contains*** an `Engine`.


    *   A `Car` ***contains*** a `Transmission`.


    *   A `Car` ***contains*** many (in this case, four) `Wheel`s.


    Or, as an example related to the SRS, we can say that


    *   A `University` ***is composed of*** many `School`s (the School of Engineering,
    the School of Law, etc.).


    *   A `School` ***is composed of*** many `Department`s.


    *   And so forth.


    We wouldn’t typically say, however, that a `Department` ***is composed of*** many
    `Professor`s; instead, we’d probably state that a `Department` ***employs*** many
    `Professor`s.


    Note that these aggregation statements appear very similar to associations, where
    the name of the association just so happens to be “is composed of” or “contains.”
    That’s because an aggregation ***is*** an association in the broad sense of the
    term.


    Why the fuss over trying to differentiate between aggregation and association?
    If an aggregation is really an association, must we even ***acknowledge*** aggregation
    as a distinct type of relationship between classes? Strictly speaking, the answer
    is no.


    *   There are indeed distinct representations in UML for the notions of aggregation
    vs. association, which we’ll discuss in Chapter [10](#78624_3_En_10_Chapter.xhtml).


    *   However, as it turns out, both of these abstractions are ultimately rendered
    in code in precisely the same way.


    Thus, it can be argued that it isn’t really absolutely necessary to differentiate
    the notion of aggregation from association. Nonetheless, it behooves anyone who
    aspires to become proficient with object modeling and UML to be aware of this
    subtle distinction, if for no other reason than to be able to communicate effectively
    with other UML practitioners who are using such notation.


    ***Composition*** is a strong form of aggregation, in which the “parts” cannot
    exist without the “whole.” As an example, given the relationship “a `Book` is
    composed of many `Chapter`s,” we could argue that a chapter cannot exist if the
    book to which it belongs ceases to exist; whereas given the relationship “a `Car`
    ***is composed of*** many `Wheel`s,” we know that a wheel can be removed from
    a car and still serve a useful purpose. Thus, we’d categorize the `Book-Chapter`
    relationship as ***composition*** and the `Car`-`Wheel` relationship as ***aggregation***.


    ## Inheritance


    Whereas many of the OO techniques that you’ve learned for achieving a high degree
    of code flexibility and maintainability—for example, encapsulation and information
    hiding—are arguably achievable with non-OO languages in some form or another,
    the **inheritance** mechanism is what truly sets OO languages apart from their
    non-OO counterparts.


    Before we dive into an in-depth discussion of how inheritance works, let’s establish
    a compelling case for inheritance by looking at the problems that arise in its
    absence.'
  trans: '

    ### 多重性与链接


    请注意，多重性这一概念适用于关联，但不适用于链接。***链接总是成对存在于两个对象之间***（或者，如前所述，在极少数情况下存在于一个对象与其自身之间）。因此，多重性本质上定义了从给定对象出发可以产生多少条特定关联类型的链接。通过一个例子可以最好地说明这一点。


    再次考虑多对多的“选课”关联：


    *   一个`学生`可以选修零门或多门`课程`，而一门`课程`则有一名或多名`学生`选修。


    一个***特定***的`学生`对象可以有零条、一条或多条指向`课程`对象的链接，但其中***任何一条***链接都恰好连接***两个***对象：一个单一的`学生`对象和一个单一的`课程`对象。例如，在图
    5-4 中


    ![](img/78624_3_En_5_Fig4_HTML.jpg)


    一个由学生 X、Y、Z 与课程 A、B、C、D 构成的网络。它包含的链接有：X 到 A，Y 到 A，Y 到 B，Y 到 C，以及 Y 到 D。


    图 5-4


    通过对象间的成对链接说明类之间的多对多关联


    *   `学生` X 有一条链接（指向`课程` A）。


    *   `学生` Y 有四条链接（指向`课程` A、B、C 和 D）。


    *   `学生` Z 没有任何指向`课程`对象的链接。（Z 这学期休学了！）


    相反，一个***特定***的`课程`对象必须有一条或多条指向`学生`对象的链接，以满足“选课”关联的强制性和多重性要求，但同样，其中***任何一条***链接都恰好连接***两个***对象：一个单一的`课程`对象和一个单一的`学生`对象。例如，在图
    5-4 中


    *   `课程` A 有两条链接（指向`学生` X 和 Y）。


    *   `课程` B、C 和 D 各有一条链接（都指向同一个`学生` Y）。


    这个示例场景确实维护了`学生`类和`课程`类之间的多对多“选课”关联；它只是这两个类之间可能存在的无数种场景中的一种。


    为了确保这个概念清晰明了，我们再来看另一个例子，这次使用一对一关联：


    *   一位`教授`***可选地***担任恰好一个`系`的主任，并且一个`系`***必须***恰好有一位`教授`担任主任职务。


    在图 5-5 中，我们看到


    ![](img/78624_3_En_5_Fig5_HTML.jpg)


    一个由教授 1、2、3、4 与系 A、B 构成的网络。它包含的链接有：教授 1 到 A，以及教授 4 到 B。


    图 5-5


    通过对象间的**二元**链接说明类之间的一对一关联


    *   `教授`对象 1 和 4 各有一条链接，分别指向`系`对象 A 和 B。


    *   `教授`对象 2 和 3 没有此类链接。


    此外，从`系`对象的角度来看，每个`系`确实恰好有一条指向`教授`的链接。因此，这个示例维护了`教授`和`系`之间的一对一“主任”关联，同时进一步说明了`教授`类在此类链接参与中的可选性。同样，它只是这两个类之间可能存在的无数种场景中的一种。


    ## 聚合与组合


    **聚合**是一种特殊的关联形式，也可称为“由……组成”、“由……构成”或“拥有”关系。与关联一样，聚合用于表示两个类 A 和 B 之间的关系。但是，通过聚合，我们表示的不仅仅是关系：我们是在声明，属于类
    A 的对象（称为**聚合体**）由属于类 B 的**组件对象**组成或包含。


    例如，一辆汽车由发动机、变速箱、四个车轮等组成，因此如果`汽车`、`发动机`、`变速箱`和`车轮`都是类，那么我们可以形成以下聚合关系：


    *   一辆`汽车`***包含***一个`发动机`。


    *   一辆`汽车`***包含***一个`变速箱`。


    *   一辆`汽车`***包含***多个（此处为四个）`车轮`。


    或者，以 SRS 相关的例子来说，我们可以说：


    *   一所`大学`***由***多个`学院`组成（工程学院、法学院等）。


    *   一个`学院`***由***多个`系`组成。


    *   以此类推。


    然而，我们通常不会说一个`系`***由***多位`教授`组成；相反，我们可能会说一个`系`***雇佣***了多位`教授`。


    请注意，这些聚合声明看起来与关联非常相似，只是关联的名称恰好是“由……组成”或“包含”。这是因为从广义上讲，聚合***就是***一种关联。


    那么，为什么还要费心去区分聚合和关联呢？如果聚合本质上是一种关联，我们是否还需要***承认***聚合是类之间一种独特的关系类型？严格来说，答案是否定的。


    *   在 UML 中，聚合和关联的概念确实有不同的表示方式，我们将在第 10 章讨论。


    *   然而，事实证明，这两种抽象概念最终在代码中的实现方式是完全相同的。


    因此，可以说并非绝对有必要区分聚合和关联的概念。尽管如此，任何有志于精通对象建模和 UML 的人都应该意识到这种微妙的区别，哪怕仅仅是为了能够与其他使用此类符号的
    UML 从业者进行有效沟通。


    ***组合***是一种强形式的聚合，其中“部分”不能脱离“整体”而存在。例如，对于“一本书由多个章节组成”这一关系，我们可以认为，如果一本书不复存在，那么属于它的章节也无法存在；而对于“一辆汽车***由***多个车轮***组成***”这一关系，我们知道车轮可以从汽车上拆下来并仍然有用。因此，我们会将“书-章节”关系归类为***组合***，而将“汽车-车轮”关系归类为***聚合***。


    ## 继承


    尽管你学过的许多用于实现高度代码灵活性和可维护性的面向对象技术（例如封装和信息隐藏）可以说在非面向对象语言中也能以某种形式实现，但**继承**机制才是真正将面向对象语言与非面向对象语言区分开来的关键。


    在我们深入讨论继承的工作原理之前，让我们先通过观察缺少继承时会出现的问题，来为继承建立一个令人信服的理由。

    '
- fmt: "### Responding to Shifting Requirements with a New Abstraction\n\nLet’s assume\
    \ that we’ve accurately and thoroughly modeled all of the essential features of\
    \ students via our `Student` class and that we’ve programmed the class in Java.\
    \ A simplified version of the `Student` class is as follows:\n\n```\npublic class\
    \ Student {\n    private String name;\n    private String studentId;\n    // etc.\n\
    \    public String getName() {\n        return name;\n    }\n    public void setName(String\
    \ name) {\n        this.name = n;\n    }\n    public String getStudentId() {\n\
    \        return studentId;\n    }\n    public void setStudentId(String studentId)\
    \ {\n        this.studentId = studentId;\n    }\n    // etc.\n}\n```\n\nLet’s\
    \ further assume that our `Student` class has been rigorously tested, has been\
    \ found to be bug-free, and is actually being used in a number of applications:\
    \ our Student Registration System, for example, as well as perhaps a Student Billing\
    \ System and an Alumni Relations System for the same university.\n\nA new requirement\
    \ has just arisen for modeling graduate students as a special type of student.\
    \ As it turns out, the only information about a graduate student that we need\
    \ to track above and beyond that which we’ve already modeled for a “generic” student\
    \ is:\n\n- What undergraduate degree the student previously received before entering\
    \ their graduate program of study\n- What institution the student received the\
    \ undergraduate degree from\n\nAll of the other features necessary to describe\
    \ a graduate student—the attributes `name`, `studentId`, and so forth, along with\
    \ the corresponding accessor methods—are the same as those that we’ve already\
    \ programmed for the `Student` class, because a graduate student *is* a student,\
    \ after all.\n\nHow might we approach this new requirement for a `GraduateStudent`\
    \ class? If we weren’t well versed in object-oriented concepts, we might try one\
    \ of the following approaches.\n\n### (Inappropriate) Approach #1: Modify the\
    \ `Student` Class\n\nWe could add attributes to our existing `Student` class to\
    \ reflect undergraduate degree information, along with “get”/“set” methods for\
    \ these new attributes, as follows:\n\n```\npublic class Student {\n    private\
    \ String name;\n    private String studentId;\n    // We've added two attributes\
    \ to Student to handle the new requirements for\n    // graduate students.\n \
    \   private String undergraduateDegree;\n    private String undergraduateInstitution;\n\
    \    // etc.\n    // We've also added four accessor methods.\n    public String\
    \ getName(...\n    public void setName(...\n    public String getStudentId(...\n\
    \    public void setStudentId(...\n    public String getUndergraduateDegree(...\n\
    \    public void setUndergraduateDegree(...\n    public String getUndergraduateInstitution(...\n\
    \    public void setUndergraduateInstitution(...\n    // etc.\n}\n```\n\nBecause\
    \ these new features are not relevant to *all* students—only to graduate students—we’d\
    \ perhaps simply allow these attributes to remain uninitialized for students who\
    \ haven’t yet received an undergraduate degree. However, to keep track of whether\
    \ or not these attributes are supposed to contain values for a given `Student`\
    \ object, we’d probably also want to add a `boolean` attribute to serve as a flag,\
    \ along with accessor methods for this attribute:\n\n```\npublic class Student\
    \ {\n    private String name;\n    private String studentId;\n    private String\
    \ undergraduateDegree;\n    private String undergraduateInstitution;\n    // We'll\
    \ set this next attribute to true if this is a\n    // graduate student, false\
    \ otherwise.\n    private boolean graduateStudent;\n    // etc.\n    public String\
    \ getName(...\n    public void setName(...\n    public String getStudentId(...\n\
    \    public void setStudentId(...\n    public String getUndergraduateDegree(...\n\
    \    public void setUndergraduateDegree(...\n    public String getUndergraduateInstitution(...\n\
    \    public void setUndergraduateInstitution(...\n    public boolean isGraduateStudent(...\n\
    \    public void setGraduateStudent(...\n    // etc.\n}\n```\n\nFinally, in any\
    \ methods that we’ve written for this class—or those that we write for this class\
    \ in the future—we’d have to take the value of this `boolean` attribute into account:\n\
    \n```\npublic void display() {\n    System.out.println(getName());\n    System.out.println(getStudentId());\n\
    \    // If a particular student is NOT a graduate student, then the values\n \
    \   // of the attributes \"undergraduateDegree\" and \"undergraduateInstitution\"\
    \n    // would be undefined/irrelevant, and so we only want to print them\n  \
    \  // if we are dealing with a GRADUATE student.\n    if (this.isGraduateStudent())\
    \ {\n        System.out.println(getUndergraduateDegree());\n        System.out.println(getUndergraduateInstitution());\n\
    \    }\n    // etc.\n}\n```\n\nHaving to sort out whether or not a given student\
    \ is a graduate student in each and every `Student` method (the `display` method\
    \ being but one) results in convoluted code that is difficult to debug and maintain.\
    \ Where this *really* gets messy, however, is if we have to add a third or a fourth\
    \ or a fifth type of “specialized” `Student` to the mix. For example, consider\
    \ how complicated the `display` method would become if we wanted to use it to\
    \ represent a third type of student: namely, continuing education students, who\
    \ don’t seek a degree, but rather are just taking courses for continuing professional\
    \ enrichment.\n\n- Perhaps for such students, we’d like to track their current\
    \ place of employment as an attribute.\n- We’d most likely need to add yet another\
    \ `boolean` flag as an attribute, as well, to keep track of whether or not a particular\
    \ `Student` is a continuing education student.\n\nWe’d perhaps extend our `Student`\
    \ class once more, as highlighted in **bold** in the following code, to reflect\
    \ the newly added attributes and accessor methods:\n\n```\npublic class Student\
    \ {\n    private String name;\n    private String studentId;\n    private String\
    \ undergraduateDegree;\n    private String undergraduateInstitution;\n    private\
    \ String placeOfEmployment;\n    private boolean graduateStudent;\n    private\
    \ boolean continuingEdStudent;\n    // etc.\n    public String getName(...\n \
    \   public void setName(...\n    public String getStudentId(...\n    public void\
    \ setStudentId(...\n    public String getUndergraduateDegree(...\n    public void\
    \ setUndergraduateDegree(...\n    public String getUndergraduateInstitution(...\n\
    \    public void setUndergraduateInstitution(...\n    public boolean isGraduateStudent(...\n\
    \    public void setGraduateStudent(...\n    public boolean isContinuingEdStudent(...\n\
    \    public void setContinuingEdStudent(...\n    // etc.\n}\n```\n\nWe also now\
    \ must take the value of the `boolean isContinuingEdStudent` attribute into account\
    \ in all of the `Student` methods involving the notion of `placeOfEmployment`.\
    \ Take a look at how this impacts the logic of the `display` method:\n\n```\n\
    public void display() {\n    System.out.println(getName());\n    System.out.println(getStudentId());\n\
    \    // etc.\n    if (this.isGraduateStudent()) {\n        System.out.println(getUndergraduateDegree());\n\
    \        System.out.println(getUndergraduateInstitution());\n    }\n    if (this.isContinuingEdStudent())\
    \ {\n        System.out.println(getPlaceOfEmployment());\n    }\n    // etc.\n\
    }\n```\n\nNow, imagine how much *more* “spaghetti-like” our code might become\
    \ if we had *dozens* of different student types to accommodate. **Approach #1\
    \ is clearly not the answer**! The underlying flaw with this approach is that\
    \ we’re trying too hard to force a *single* abstraction, `Student`, to represent\
    \ *multiple* real-world object types. While graduate students, continuing education\
    \ students, and “generic” students certainly have some features in common, they\
    \ are nonetheless *different* types of object."
  raw: '### Responding to Shifting Requirements with a New Abstraction


    Let’s assume that we’ve accurately and thoroughly modeled all of the essential
    features of students via our `Student` class and that we’ve programmed the class
    in Java. A simplified version of the `Student` class is as follows:


    ```

    public class Student {

    private String name;

    private String studentId;

    // etc.

    public String getName() {

    return name;

    }

    public void setName(String name) {

    this.name = n;

    }

    public String getStudentId() {

    return studentId;

    }

    public void setStudentId (String studentId) {

    this.studentId = studentId;

    }

    // etc.

    }

    ```


    Let’s further assume that our `Student` class has been rigorously tested, has
    been found to be bug-free, and is actually being used in a number of applications:
    our Student Registration System, for example, as well as perhaps a Student Billing
    System and an Alumni Relations System for the same university.


    A new requirement has just arisen for modeling graduate students as a special
    type of student. As it turns out, the only information about a graduate student
    that we need to track above and beyond that which we’ve already modeled for a
    “generic” student is


    *   What undergraduate degree the student previously received before entering
    their graduate program of study


    *   What institution the student received the undergraduate degree from


    All of the other features necessary to describe a graduate student—the attributes
    `name`, `studentId`, and so forth, along with the corresponding accessor methods—are
    the same as those that we’ve already programmed for the `Student` class, because
    a graduate student ***is*** a student, after all.


    How might we approach this new requirement for a `GraduateStudent` class? If we
    weren’t well versed in object-oriented concepts, we might try one of the following
    approaches.


    ### (Inappropriate) Approach #1: Modify the Student Class


    We could add attributes to our existing `Student` class to reflect undergraduate
    degree information, along with “get”/“set” methods for these new attributes, as
    follows:


    ```

    public class Student {

    private String name;

    private String studentId;

    // We''ve added two attributes to Student to handle the new requirements for

    // graduate students.

    private String undergraduateDegree;

    private String undergraduateInstitution;

    // etc.

    // We''ve also added four accessor methods.

    public String getName(...

    public void setName(...

    public String getStudentId(...

    public void setStudentId(...

    public String getUndergraduateDegree(...

    public void setUndergraduateDegree(...

    public String getUndergraduateInstitution(...

    public void setUndergraduateInstitution(...

    // etc.

    }

    ```


    Because these new features are not relevant to ***all*** students—only to graduate
    students—we’d perhaps simply allow these attributes to remain uninitialized for
    students who haven’t yet received an undergraduate degree. However, to keep track
    of whether or not these attributes are supposed to contain values for a given
    `Student` object, we’d probably also want to add a `boolean` attribute to serve
    as a flag, along with accessor methods for this attribute:


    ```

    public class Student {

    private String name;

    private String studentId;

    private String undergraduateDegree;

    private String undergraduateInstitution;

    // We''ll set this next attribute to true if this is a

    // graduate student, false otherwise.

    private boolean graduateStudent;

    // etc.

    public String getName(...

    public void setName(...

    public String getStudentId(...

    public void setStudentId(...

    public String getUndergraduateDegree(...

    public void setUndergraduateDegree(...

    public String getUndergraduateInstitution(...

    public void setUndergraduateInstitution(...

    public boolean isGraduateStudent(...

    public void setGraduateStudent(...

    // etc.

    }

    ```


    Finally, in any methods that we’ve written for this class—or those that we write
    for this class in the future—we’d have to take the value of this `boolean` attribute
    into account:


    ```

    public void display() {

    System.out.println(getName());

    System.out.println(getStudentId());

    // If a particular student is NOT a graduate student, then the values

    // of the attributes "undergraduateDegree" and "undergraduateInstitution"

    // would be undefined/irrelevant, and so we only want to print them

    // if we are dealing with a GRADUATE student.

    if (this.isGraduateStudent()) {

    System.out.println(getUndergraduateDegree());

    System.out.println(getUndergraduateInstitution());

    }

    // etc.

    }

    ```


    Having to sort out whether or not a given student is a graduate student in each
    and every `Student` method (the `display` method being but one) results in convoluted
    code that is difficult to debug and maintain. Where this ***really*** gets messy,
    however, is if we have to add a third or a fourth or a fifth type of “specialized”
    `Student` to the mix. For example, consider how complicated the `display` method
    would become if we wanted to use it to represent a third type of student: namely,
    continuing education students, who don’t seek a degree, but rather are just taking
    courses for continuing professional enrichment.


    *   Perhaps for such students, we’d like to track their current place of employment
    as an attribute.


    *   We’d most likely need to add yet another `boolean` flag as an attribute, as
    well, to keep track of whether or not a particular `Student` is a continuing education
    student.


    We’d perhaps extend our `Student` class once more, as highlighted in **bold**
    in the following code, to reflect the newly added attributes and accessor methods:


    ```

    public class Student {

    private String name;

    private String studentId;

    private String undergraduateDegree;

    private String undergraduateInstitution;

    private String placeOfEmployment;

    private boolean graduateStudent;

    private boolean continuingEdStudent;

    // etc.

    public String getName(...

    public void setName(...

    public String getStudentId(...

    public void setStudentId(...

    public String getUndergraduateDegree(...

    public void setUndergraduateDegree(...

    public String getUndergraduateInstitution(...

    public void setUndergraduateInstitution(...

    public boolean isGraduateStudent(...

    public void setGraduateStudent(...

    public boolean isContinuingEdStudent(...

    public void setContinuingEdStudent(...

    // etc.

    }

    ```


    We also now must take the value of the `boolean isContinuingEdStudent` attribute
    into account in all of the `Student` methods involving the notion of `placeOfEmployment`.
    Take a look at how this impacts the logic of the `display` method:


    ```

    public void display() {

    System.out.println(getName());

    System.out.println(getStudentId());

    // etc.

    if (this.isGraduateStudent()) {

    System.out.println(getUndergraduateDegree());

    System.out.println(getUndergraduateInstitution());

    }

    if (this.isContinuingEdStudent()) {

    System.out.println(getPlaceOfEmployment());

    }

    // etc.

    }

    ```


    Now, imagine how much ***more*** “spaghetti-like” our code might become if we
    had ***dozens*** of different student types to accommodate. ***Approach #1 is
    clearly not the answer***! The underlying flaw with this approach is that we’re
    trying too hard to force a ***single*** abstraction, `Student`, to represent ***multiple***
    real-world object types. While graduate students, continuing education students,
    and “generic” students certainly have some features in common, they are nonetheless
    ***different*** types of object.'
  trans: '

    ### 以新抽象应对需求变化


    假设我们已经通过 `Student` 类准确且全面地建模了学生的所有基本特征，并用 Java 实现了该类。`Student` 类的简化版本如下：


    ```

    public class Student {

    private String name;

    private String studentId;

    // 等等

    public String getName() {

    return name;

    }

    public void setName(String name) {

    this.name = n;

    }

    public String getStudentId() {

    return studentId;

    }

    public void setStudentId (String studentId) {

    this.studentId = studentId;

    }

    // 等等

    }

    ```


    再假设我们的 `Student` 类已经过严格测试，被证明没有错误，并且实际应用于多个系统中：例如，学生注册系统，以及同一所大学的学生计费系统和校友关系系统。


    现在出现了一个新需求：将研究生建模为一种特殊类型的学生。事实证明，除了我们已经为“普通”学生建模的信息之外，我们需要跟踪的研究生信息只有：


    *   该学生在进入研究生课程之前获得的学士学位

    *   该学生获得学士学位的院校


    描述研究生所需的所有其他特征——属性 `name`、`studentId` 等，以及相应的访问器方法——都与我们已为 `Student` 类编程的内容相同，因为研究生***就是***学生，毕竟。


    我们该如何应对这个针对 `GraduateStudent` 类的新需求呢？如果我们不精通面向对象的概念，可能会尝试以下方法之一。


    ### （不恰当的）方法 #1：修改 Student 类


    我们可以向现有的 `Student` 类添加属性来反映学士学位信息，并为这些新属性添加“获取”/“设置”方法，如下所示：


    ```

    public class Student {

    private String name;

    private String studentId;

    // 我们为 Student 添加了两个属性，以处理研究生新需求。

    private String undergraduateDegree;

    private String undergraduateInstitution;

    // 等等

    // 我们还添加了四个访问器方法。

    public String getName(...

    public void setName(...

    public String getStudentId(...

    public void setStudentId(...

    public String getUndergraduateDegree(...

    public void setUndergraduateDegree(...

    public String getUndergraduateInstitution(...

    public void setUndergraduateInstitution(...

    // 等等

    }

    ```


    由于这些新特性并非***所有***学生都相关——仅与研究生相关——我们或许只能让这些属性对于尚未获得学士学位的学生保持未初始化状态。然而，为了跟踪这些属性是否应该为某个
    `Student` 对象包含值，我们可能还需要添加一个 `boolean` 属性作为标志，以及该属性的访问器方法：


    ```

    public class Student {

    private String name;

    private String studentId;

    private String undergraduateDegree;

    private String undergraduateInstitution;

    // 如果这是研究生，我们将下一个属性设为 true，否则设为 false。

    private boolean graduateStudent;

    // 等等

    public String getName(...

    public void setName(...

    public String getStudentId(...

    public void setStudentId(...

    public String getUndergraduateDegree(...

    public void setUndergraduateDegree(...

    public String getUndergraduateInstitution(...

    public void setUndergraduateInstitution(...

    public boolean isGraduateStudent(...

    public void setGraduateStudent(...

    // 等等

    }

    ```


    最后，在我们为此类编写的任何方法中——或者将来为此类编写的方法中——我们都必须考虑这个 `boolean` 属性的值：


    ```

    public void display() {

    System.out.println(getName());

    System.out.println(getStudentId());

    // 如果某个学生不是研究生，那么属性 "undergraduateDegree" 和 "undergraduateInstitution" 的值

    // 将是未定义/无关的，因此我们只应在处理研究生时打印它们。

    if (this.isGraduateStudent()) {

    System.out.println(getUndergraduateDegree());

    System.out.println(getUndergraduateInstitution());

    }

    // 等等

    }

    ```


    在每个 `Student` 方法（`display` 方法只是其中之一）中都必须判断某个学生是否为研究生，这会导致代码混乱，难以调试和维护。然而，如果我们要在混合中添加第三种、第四种或第五种“专门化”的
    `Student` 类型，情况***真的***会变得一团糟。例如，考虑一下如果我们想用它来表示第三种学生类型：即继续教育学生（他们不追求学位，只是为了持续专业提升而修读课程），`display`
    方法会变得多么复杂。


    *   对于这类学生，我们可能希望将他们的当前工作单位作为一个属性来跟踪。

    *   我们很可能还需要添加另一个 `boolean` 标志作为属性，以跟踪某个 `Student` 是否为继续教育学生。


    我们可能会再次扩展 `Student` 类，如下面代码中**粗体**所示，以反映新添加的属性和访问器方法：


    ```

    public class Student {

    private String name;

    private String studentId;

    private String undergraduateDegree;

    private String undergraduateInstitution;

    private String placeOfEmployment;

    private boolean graduateStudent;

    private boolean continuingEdStudent;

    // 等等

    public String getName(...

    public void setName(...

    public String getStudentId(...

    public void setStudentId(...

    public String getUndergraduateDegree(...

    public void setUndergraduateDegree(...

    public String getUndergraduateInstitution(...

    public void setUndergraduateInstitution(...

    public boolean isGraduateStudent(...

    public void setGraduateStudent(...

    public boolean isContinuingEdStudent(...

    public void setContinuingEdStudent(...

    // 等等

    }

    ```


    现在，我们还必须在所有涉及 `placeOfEmployment` 概念的 `Student` 方法中考虑 `boolean isContinuingEdStudent`
    属性的值。看看这对 `display` 方法的逻辑有何影响：


    ```

    public void display() {

    System.out.println(getName());

    System.out.println(getStudentId());

    // 等等

    if (this.isGraduateStudent()) {

    System.out.println(getUndergraduateDegree());

    System.out.println(getUndergraduateInstitution());

    }

    if (this.isContinuingEdStudent()) {

    System.out.println(getPlaceOfEmployment());

    }

    // 等等

    }

    ```


    现在，想象一下，如果我们要容纳***几十种***不同的学生类型，我们的代码会变得多么“意大利面条式”。***方法 #1 显然不是答案***！这种方法的基本缺陷在于，我们过于努力地试图用***单一***抽象
    `Student` 来表示***多种***现实世界对象类型。虽然研究生、继续教育学生和“普通”学生确实有一些共同特征，但它们毕竟是***不同***的对象类型。

