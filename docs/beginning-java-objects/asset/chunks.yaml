    \n![](images/78624_3_En_13_Chapter/78624_3_En_13_Fig6_HTML.jpg)\n\n屏幕显示生成的文档，包含关于包、所有类的信息，以及一个包含`Person`类中`dogYear`方法、`Person`类中`name`变量和`Person`类实例的索引标签。\n\
    \n**图 13-6**  \n…显示所有符号的字母顺序列表\n\n![](images/78624_3_En_13_Chapter/78624_3_En_13_Fig5_HTML.jpg)\n\
    \n屏幕显示一组选项，包括包、类、树、已弃用、索引和帮助。此外，文字提到一个手形符号悬停在索引标签上。\n\n**图 13-5**  \n点击索引链接…\n\
    \n## 字符串的对象本质\n\n在第 [2](#78624_3_En_2_Chapter.xhtml) 章中，我们介绍了`String`类型以及其他八种原始\
    \ Java 类型：`int`、`double`、`char`、`boolean`、`float`、`byte`、`short`和`long`。当时，我们强调了符号“`String`”必须大写，而其他八种类型名称则全部小写。我们当时***没有***说明的是，`String`是一种***引用类型***——也就是说，声明为`String`类型的变量引用的是***对象***。（回想一下我们在第\
