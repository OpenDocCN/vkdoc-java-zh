    ### 字符串操作


    正如我们在第 2 章中学到的，加号（`+`）运算符用于拼接 `String` 值：


    ```

    String x = "foo";

    String y = "bar";

    String z = x + y + "!";  // z 的值为 "foobar!"

    ```


    但现在我们理解了 `String` 的对象本质，还可以利用 `String` 类声明的众多方法来操作 `String`：


    *   `int length()`：将此方法应用于 `String` 引用时，会以整数形式返回该 `String` 的长度：


    *   `boolean startsWith(String s)`：如果应用此方法的 `String` 以作为参数传入的 `String` 开头，则返回
    `true`，否则返回 `false`：


    ```

    // 接上例，其中 z 等于 "foobar!"：

    int len = z.length();  // len 现在等于 7

    ```


    *   `boolean endsWith(String s)`：如果应用此方法的 `String` 以作为参数传入的 `String` 结尾，则返回 `true`，否则返回
    `false`：


    ```

    String s = "foobar";

    // 以下表达式计算结果为 true。

    if (s.startsWith("foo")) ...

    ```


    *   `boolean contains(String s)`：如果应用此方法的 `String` 包含作为参数传入的 `String`，则返回 `true`，否则返回
    `false`：


    ```

    String s = "foobar";

    // 以下表达式计算结果为 true。

    if (s.endsWith("bar")) ...

    ```


    *   `int indexOf(String s)`：返回一个非负整数值，表示作为参数传入的 `String` 在应用此方法的 `String` 中出现的起始字符位置（从
    0 开始计数）；如果未找到该 `String` 参数，则返回负值（通常为 `–1`）：


    ```

    String s = "foobar";

    // 以下表达式计算结果为 true。

    if (s.contains("oo")) ...

    ```


    *   `String replace(char old, char new)`：创建一个全新的 `String` 对象，其中所有 `old` 字符的实例都被替换为
    `new` 字符——原始 `String` 的值不受影响：


    ```

    String s = "foobar";

    int i = s.indexOf("bar");  // i 将等于 3

    int j = s.indexOf("cat");  // j 将等于 -1

    int k = s.indexOf("f");    // k 将等于 0

    ```


    *   `String substring(int i)`：通过复制现有 `String` 对象中从第 `i` 个位置开始到末尾的子字符串，创建一个全新的
    `String` 对象：


    ```

    String s = "o1o2o3o4";

    // 注意字符周围使用单引号

    // 而字符串周围使用双引号。

    String p = s.replace(''o'', ''x'');   // p 的值为 "x1x2x3x4"，而

    // s 保留值 "o1o2o3o4"

    ```


    *   `String substring(int i, int j)`：通过复制现有 `String` 对象中从第 `i` 个位置开始到第 `j` 个位置***之前***结束的子字符串，创建一个全新的
    `String` 对象：


    ```

    String s = "foobar";

    String p = s.substring(3); // p 的值为 "bar"

    ```


    *   `char charAt(int index)`：返回位于 `String` 中第 `i` 个位置的 `char`（字符）值：


    ```

    String s = "foobar";

    String p = s.substring(1, 5);  // p 的值为 "ooba";

    ```


    ```

    String s = "foobar";

    // 逐个字符遍历字符串。

    for (int i = 0; i < s.length(); i++) {

    System.out.println(s.charAt(i));

    }

    ```


    输出：


    *   `boolean equals(String)`：比较应用此方法的 `String` 对象的值与作为参数传入引用的 `String` 对象的值；如果值相同则返回
    `true`，否则返回 `false`：


    ```

    f

    o

    o

    b

    a

    r

    ```


    ```

    String s = "dog";

    String t = "cat";

    String u = "dog";

    // 以下表达式计算结果为 true ...

    if (s.equals(u)) { ...

    // ... 而以下表达式计算结果为 false。

    if (s.equals(t)) { ...

    ```


    请注意，我们通常应***避免***使用双等号（`==`）运算符来测试两个 `String` 对象的值是否相等；也就是说，根据我们实例化 `String` 对象
    `s1` 和 `s2` 的方式，以下代码可能会产生看似不一致的结果：


    ```

    // 我们通常应避免这样做 ...

    if (s1 == s2) { ...

    ```


    这是因为 `==` 运算符在用于比较引用类型（如 `String`、`Person` 或通用 `Object`）时，实际上是在比较它们的***内存地址***，以查看两个变量是否引用***同一个对象***，如图
    13-7 所示。


    ![](img/78624_3_En_13_Fig7_HTML.jpg)


    结果描绘了比较 x == y 为 true（如气球所示），在其下方，比较 x == y 为 false（由两个气球表示）。


    图 13-7


    评估 `x == y` 的结果可能因涉及的 String 实例数量而异


    我们将在本章稍后部分重新讨论对象（尤其是 `String`）的这一概念。

