- fmt: '### Copying the Contents of an `ArrayList` into an Array


    From time to time, we’ll have a need to copy the contents of a collection into
    an array. We’ll use a method declared by the `ArrayList` class with the following
    header:


    ```

    type[] toArray(type[] arrayRef)

    ```


    That is, we’ll invoke the `toArray` method on an `ArrayList` object, passing in
    an array of the desired *type* as an argument, and the method will in turn hand
    us back an array that contains a copy of the contents of the `ArrayList`, as follows:


    *   If the array that we pass in is of sufficient capacity to hold the contents
    of the `ArrayList`, that ***same*** array object is filled and returned.

    *   Otherwise, a ***brand-new*** array of the appropriate type and size is ***created***,
    filled, and returned, and the one that we pass in as an argument is ignored.


    Since it’s easy to create an array whose size matches that of an existing `ArrayList`—we’ll
    see how to do so in just a moment—we’ll do so whenever we have occasion to invoke
    the `toArray` method on an `ArrayList` within the SRS application.


    Let’s look at an example. First, we’ll create an `ArrayList` named `students`,
    “stuffing” it with three `Student` references:


    ```

    ArrayList students = new ArrayList();

    students.add(new Student("Herbie"));

    students.add(new Student("Klemmie"));

    students.add(new Student("James"));

    ```


    Next, we’ll declare and instantiate an array named `copyOfStudents` that’s designed
    to be just the right size to hold the contents of the `students ArrayList`—note
    the use of a nested call to `students.size()` to accomplish this:


    ```

    Student[] copyOfStudents = new Student[students.size()];

    ```


    Then, to copy the contents of the `ArrayList` into the `copyOfStudents` array,
    we simply have to invoke the `toArray` method on `students`, passing in `copyOfStudents`
    as an argument:


    ```

    students.toArray(copyOfStudents);

    ```


    Let’s verify that the copy works by iterating first through the `ArrayList` and
    then through the array, printing the names of the `Student` objects referenced
    by each:


    ```

    System.out.println("The ArrayList contains the following students:");

    for (Student s : students) {

    System.out.println(s.getName());

    }

    System.out.println();

    System.out.println("The array contains the following students:");

    for (int i = 0; i < copyOfStudents.length; i++) {

    System.out.println(copyOfStudents[i].getName());

    }

    ```


    Here’s the output:


    ```

    The ArrayList contains the following students:

    Herbie

    Klemmie

    James

    The array contains the following students:

    Herbie

    Klemmie

    James

    ```


    Success! Both the array and the `ArrayList` now refer to the same three `Student`s,
    as depicted conceptually in Figure [6-11](#78624_3_En_6_Chapter.xhtml#Fig11).


    ![](images/78624_3_En_6_Chapter/78624_3_En_6_Fig11_HTML.jpg)


    2 sets of 3 blocks of an array list and an array, respectively. They are labeled
    students and copy of students with each block connected via a balloon.


    Figure 6-11


    Using the `toArray` method of the `ArrayList` class, we copy the contents of an
    `ArrayList` to an array


    ## The `HashMap` Collection Class


    As mentioned earlier in the chapter, a Java `HashMap` is a dictionary-type collection—that
    is, a `HashMap` gives us direct access to a given object based on a unique key
    value. Both the key and the object itself can be declared to be of any type.


    Let’s look at a simple example program called `HashMapExample` that illustrates
    the basics of manipulating `HashMap`s. This program involves


    *   Creating and populating a `HashMap` with `Student` object references, using
    the value of their `idNo` attribute (a `String`) as the key

    *   Attempting to retrieve several individual `Student`s based on specific `idNo`
    values

    *   Iterating through the entire collection of `Student`s


    For purposes of this example, we’ll use the following simplified `Student` class
    declaration:


    ```

    public class Student {

    private String idNo;

    private String name;

    // Constructor.

    public Student(String i, String n) {

    idNo = i;

    name = n;

    }

    public String getName() {

    return name;

    }

    public String getIdNo() {

    return idNo;

    }

    }

    ```


    And we’ll use the value of each `Student`’s `idNo` attribute as the key.


    Let’s look at the program in its entirety first, and we’ll walk through selected
    passages afterward:


    ```

    import java.util.HashMap;

    public class HashMapExample {

    public static void main(String[] args) {

    // Instantiate a HashMap with String as the key type and Student as

    // the value type.

    HashMap students = new HashMap();

    // Instantiate three Students; the constructor arguments are

    // used to initialize Student attributes idNo and name,

    // respectively, which are both declared to be Strings.

    Student s1 = new Student("12345-12", "Fred");

    Student s2 = new Student("98765-00", "Barney");

    Student s3 = new Student("71024-91", "Wilma");

    // Insert all three Students into the HashMap, using their idNo

    // as a key.

    students.put(s1.getIdNo(), s1);

    students.put(s2.getIdNo(), s2);

    students.put(s3.getIdNo(), s3);

    // Retrieve a Student based on a particular (valid) ID.

    String id = "98765-00";

    System.out.println("Let''s try to retrieve a Student with ID = " + id);

    Student x = students.get(id);

    // If the value returned by the get method is non-null, then

    // we indeed found a matching Student ...

    if (x != null) {

    System.out.println("Found!  Name = " + x.getName());

    }

    // ... whereas if the value returned was null, then we didn''t find

    // a match on the id that was passed in as an argument to get().

    else {

