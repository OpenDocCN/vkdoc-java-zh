    // Are x and y referring to the SAME OBJECT?

    if (x == y) { ... // true

    ```


    because `x` and `y` not only have the same ***value*** `"Foo"` but they also refer
    to the ***same specific*** `String` ***object***.


    *   Where we see a difference is when we attempt to compare `w` and `z` in similar
    fashion:


    ```

    // Are the VALUES of w and z the same?

    if (w.equals(z)) { ... // true

    // Are w and z referring to the SAME OBJECT?

    if (w == z) { ... // FALSE!!!

    ```


    The first test evaluates to `true`, because the ***values*** of `w` and `z` are
    equivalent, but the second test evaluates to `false`, because `w` and `z` refer
    to two ***different*** objects.


    In the vast majority of cases, when we say we wish to compare two `String`s, we
    typically mean that we want to compare their ***values***, ***not*** their unique
    identities as objects. Thus, we virtually always compare `String`s for equality
    using the `equals` method rather than the `==` operator.


    We’ll revisit this distinction between the `==` operator and the `equals` method
    once more, when we talk about generic `Object`s later in this chapter.


    ## Message Chains


    When we talked about Java expressions in Part 1 of the book, there was one form
    of expression that we omitted: namely, **message chains**. We’ve repeated our
    list of what constitutes Java expressions from Chapter [4](#78624_3_En_4_Chapter.xhtml)
    in the following, ***highlighting*** this latest addition:


    *   ***A constant***: 7, false


    *   ***A*** ***char****(acter) literal***: `''A''`, `''&''`


    *   ***A*** ***String*** ***literal***: `"foo"`, `""`


    *   ***The name of any variable declared to be of one of the predefined types
    that we’ve seen so far***: `myString, x`


    *   ***Any one of the preceding that is modified by one of the Java unary operators***:
    `i++`


    *   ***A message/method invocation on an object reference***: `z.length()`


    *   ***Any two of the preceding that are combined with one of the Java binary
    operators***: `z.length() + 2`


    *   ***A “chain” of two or more messages concatenated by periods (“dots”):***
    `p.getName().length()`


    *   ***Any of the preceding types of expression enclosed in parentheses***: `(p.getName().length()
    + 2)`


    With Java (and other OOPLs), it is quite commonplace to form complex expressions
    by concatenating (and sometimes nesting) method calls. As with all expressions,
    we evaluate complex method expressions from innermost to outermost parentheses,
    left to right. So, based on the following code example


    ```

    // Instantiate three objects.

    Student s = new Student();

    Professor p = new Professor();

    Department d = new Department();

    // Set selected attribute values.

    d.setName("MATH");

    p.setDepartment(d);

    s.setAdvisor(p);

    ```


    let’s evaluate the following line of code:


    *   There are two levels of parenthesis nesting in this example, but the inner
    sets of parentheses represent the argument signatures of the various methods being
    invoked, and so we’ll focus on evaluating the expression within the ***outer***
    set of parentheses:


    ```

    s.setMajor(s.getAdvisor().getDepartment().getName());

    ```


    *   Evaluating this expression from left to right, the first subexpression, `s.getAdvisor()`,
    returns a reference to a `Professor` object; it’s as if we’ve simplified our original
    line of code as follows:


    ```

    s.getAdvisor().getDepartment().getName()

    ```


    *   Next, we apply the `getDepartment` method to this `Professor`, which returns
    a reference to a `Department`; it’s as if we’ve simplified the original line of
    code even further, as follows:


    ```

    // From:

    s.setMajor(s.getAdvisor().getDepartment().getName());

    // To:

    s.setMajor(p.getDepartment().getName());

    ```


    *   Next, we apply the `getName` method to this `Department`, which returns a
    reference to a `String` object whose value is `"Math"`; it’s as if we’ve simplified
    the original expression further still, as follows:


    ```

    // From:

    s.setMajor(p.getDepartment().getName());

    // To:

    s.setMajor(d.getName());

    ```


    *   Finally, we evaluate the statement as a whole, which assigns the `String`
    value `"Math"` as the major field for `Student s`.


    ```

    // From:

    s.setMajor(d.getName());

    // To:

    s.setMajor("Math");

    ```


    We’ll see many such concatenated method calls in the SRS code.


    The ***type*** of a chained message expression is the type of the result that
    the ***last*** method in the chain returns. For example, if


    *   `s` is a `Student` reference


    *   `getAdvisor` is a `Student` method that returns a `Professor` reference


    *   `getName` is a `Professor` method that returns a `String` reference


    *   `length` is a `String` method that returns an `int` value


    then `s.getAdvisor().getName().length()` is an `int`(eger) expression.'
