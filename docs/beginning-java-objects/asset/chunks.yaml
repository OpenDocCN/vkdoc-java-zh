    ## Object/Instance Diagrams


    When describing how objects can interact, we sometimes find it helpful to sketch
    out a scenario of specific objects and their linkages, and for that we create
    an **object diagram**, a.k.a. **instance diagram**. An instance, or object, looks
    much the same as a class in UML notation, the main differences being that


    ![](images/78624_3_En_10_Chapter/78624_3_En_10_Fig36_HTML.png)


    A rectangular block reads joe blow, colon, student.


    Figure 10-36


    Representing an object


    *   We typically provide both the name of the object and its type, separated by
    a colon. We underline the text to emphasize that this is an object, not a class
    (see Figure [10-36](#78624_3_En_10_Chapter.xhtml#Fig36)).


    ![](images/78624_3_En_10_Chapter/78624_3_En_10_Fig37_HTML.png)


    A text box represents a rectangular block inside which is labeled student x. The
    text inside the box reads, class name omitted since object name implies its type.


    Figure 10-37


    We omit the class name if it’s otherwise obvious


    *   The object’s type may be omitted if it’s obvious from the object’s name; for
    example, the name “student x” implies that the object in question belongs to the
    `Student` class (see Figure [10-37](#78624_3_En_10_Chapter.xhtml#Fig37)).


    ![](images/78624_3_En_10_Chapter/78624_3_En_10_Fig38_HTML.png)


    A text box represents a rectangular block inside which is labeled colon, student.
    The text inside the box reads, Anonymous student object, no name suggested.


    Figure 10-38


    Representing an anonymous object


    *   Alternatively, the object’s name may be omitted if we want to refer to a “generic”
    object of a given type; such an object is known as an **anonymous object**. Note
    that we must precede the class name with a colon (:) in such a situation (see
    Figure [10-38](#78624_3_En_10_Chapter.xhtml#Fig38)).


    Therefore, if we wanted to indicate that Dr. Brown, a `Professor`, is the advisor
    for three `Student`s, we could create the object diagram shown in Figure [10-39](#78624_3_En_10_Chapter.xhtml#Fig39).


    ![](images/78624_3_En_10_Chapter/78624_3_En_10_Fig39_HTML.jpg)


    A block diagram represents a block on the left labeled doctor brown, professor.
    It is connected to 3 blocks on the right which denote student. The lines connecting
    the professor and student reads advice.


    Figure 10-39


    Dr. Brown advises three students


    To reflect that a `Student` by the name of Joe Blow is attending two `Section`s
    this semester, one of which is also attended by a `Student` named Mary Green,
    we could create the diagram in Figure [10-40](#78624_3_En_10_Chapter.xhtml#Fig40).


    ![](images/78624_3_En_10_Chapter/78624_3_En_10_Fig40_HTML.jpg)


    A block diagram explains a student named Joe Blow attends 2 sections for beginning
    math and intermediate arts. Another student named Mary Green also attends the
    section for beginning math.


    Figure 10-40


    An instance diagram involving numerous objects


    ## Associations As Attributes


    Given Figure [10-41](#78624_3_En_10_Chapter.xhtml#Fig41), which shows the association
    “a `Course` *is offered as* a `Section`,” we see that a `Course` object can be
    related to many different `Section` objects, but that any one `Section` object
    can be related to a ***single*** `Course` object.


    ![](images/78624_3_En_10_Chapter/78624_3_En_10_Fig41_HTML.jpg)


    Two rectangular blocks labeled course and section from left to right, are connected
    through a line. A text on the line reads offered as pointing towards the section.


    Figure 10-41


    A one-to-many association between the `Course` and `Section` classes


    By way of review, what does it mean for two objects to be related? It means that
    they maintain “handles” on one another so that they can easily find one another
    to communicate and collaborate, a concept that we covered in detail in Chapter
    [4](#78624_3_En_4_Chapter.xhtml). If we were to sketch out the attributes of the
    `Course` and `Section` classes based solely on the diagram in Figure [10-41](#78624_3_En_10_Chapter.xhtml#Fig41),
    we’d need to allow for these handles as reference variables, as follows:


    ```

    public class Section {

    // Attributes.

    private Course represents;   // A "handle" on a single related Course

    // object.

    // etc.

    }

    public class Course {

    // Attributes.

    private Collection<Section offeredAs;   // A collection of related Section

    // object "handles."

    // etc.

    }

    ```


    So we see that the presence of an association between two classes `A` and `B`
    in a class diagram implies that class `A` ***potentially*** has an attribute declared
    to be either


    *   A reference to a ***single*** instance/object of type `B`


    *   A ***collection*** of references to ***many*** objects of type `B`


    depending on the multiplicity involved and vice versa. I say “potentially” because,
    when we get to the point of actually programming this application, we may or may
    not wish to code this relationship bidirectionally, even though at the analysis
    stage all associations are presumed to be bidirectional. We’ll look at the pros
    and cons of coding bidirectional relationships in Chapter [14](#78624_3_En_14_Chapter.xhtml).


    Because the presence of an association line implies attributes as object references
    in both related classes, it’s inappropriate to additionally list such attributes
    in the attributes compartment of the respective classes (see Figure [10-42](#78624_3_En_10_Chapter.xhtml#Fig42)).


    ![](images/78624_3_En_10_Chapter/78624_3_En_10_Fig42_HTML.jpg)


    An illustration represents 2 rectangular blocks. The block on the left reads course
    offered as collection. The block on the right reads section represents the course.
    A text in the middle reads, do not redundantly list attributes that are implied
    by association.


    Figure 10-42


    Redundantly reflecting references as attributes is inappropriate; the presence
    of an association implies these


    This is a mistake commonly made by beginners. The biggest resultant problem with
    doing so arises when using the code generation capability of a CASE tool: if the
    attribute is listed explicitly in a class’s attributes compartment and is also
    implied by an association, it may appear in the generated code ***twice***, as
    shown in the following snippet representing code that might be generated from
    the erroneous UML diagram shown in Figure [10-42](#78624_3_En_10_Chapter.xhtml#Fig42):


    `public class Course {`


    `// Redundant attributes are generated in the code.`


    ***Collection<Section>*** `offeredAs;   // by virtue of an explicit attribute`


    ***Collection<Section>*** `offered_as;  // by virtue of the association`


    `// etc.`


    `}`'
