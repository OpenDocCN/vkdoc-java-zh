    \n```\npublic class Student {\n// 属性通常声明为 private。\nprivate String name;\nprivate\
    \ Professor facultyAdvisor;\n// 本例中省略了其他属性 ...\n// 提供公共访问器方法，用于从客户端代码读取/修改\n//\
    \ private 属性。\n// 客户端代码将使用此方法读取（\"get\"）特定 Student 对象的\n// \"name\" 属性的值。\npublic\
    \ String getName() {\nreturn name;\n}\n// 客户端代码将使用此方法修改（\"set\"）特定 Student 对象的\n\
    // \"name\" 属性的值。\npublic void setName(String newName) {\nname = newName;\n}\n\
    // 客户端代码将使用此方法读取（\"get\"）特定 Student 对象的\n// facultyAdvisor 属性的值。\npublic Professor\
    \ getFacultyAdvisor() {\nreturn facultyAdvisor;\n}\n// 客户端代码将使用此方法修改（\"set\"）特定\
    \ Student 对象的\n// facultyAdvisor 属性的值。\npublic void setFacultyAdvisor(Professor\
    \ p) {\nfacultyAdvisor = p;\n}\n// 等等。\n}\n```\n\n“get” 和 “set” 的命名法是从 ***客户端代码***\
    \ 的角度出发的：将 “set” 方法视为 ***客户端代码*** 将值 ***存入*** 对象属性的方式（参见图 4-7）…\n\n![](img/78624_3_En_4_Fig7_HTML.png)\n\
    \n一个砖墙形状的框图，对象名为 fred，带有一个指向内部的箭头 set。\n\n图 4-7\n\n“set” 方法用于将数据传递 **到** 对象内部\n\
    \n… 而 “get” 方法则是 ***客户端代码*** 从对象 ***获取*** 属性值的方式（参见图 4-8）。\n\n![](img/78624_3_En_4_Fig8_HTML.png)\n\
    \n一个砖墙形状的框图，对象名为 fred，带有一个指向外部的箭头 get。\n\n图 4-8\n\n“get” 方法用于从对象 **获取** 数据\n\n\
    ### 推荐的 “Get”/“Set” 方法头\n\n对于以下形式的属性声明\n\n```\naccessibility*  attribute-type\
    \ attributeName;     * 通常为 private\n```\n\n例如，\n\n```\nprivate String majorField;\n\
    ```\n\n编写常规访问器方法头的规则如下。\n\n***对于 “get” 方法，公式如下：***\n\n```\npublic attribute-type\
    \ getAttributeName()\n```\n\n例如：\n\n*   方法名称的编写方式是将相关属性名称的首字母大写（例如 `majorField`），并在前面加上\
    \ “get”（例如 `getMajorField`）。\n\n*   请注意，我们通常不会向 “get” 方法传递任何参数，因为我们只希望对象将其某个属性的值返回给我们；我们通常不需要告诉对象任何特殊信息，它就能知道如何执行此操作。\n\
    \n*   此外，由于我们期望对象返回特定属性的值，因此 “get” 方法的返回类型必须与相关属性的类型匹配。如果我们 “获取” 的是 `int` 属性的值，那么相应\
    \ “get” 方法的返回类型必须是 `int`；如果我们 “获取” 的是 `Professor` 属性的值，那么相应 “get” 方法的返回类型必须是 `Professor`；以此类推。\n\
    \n*   以下是一个完整的典型 “get” 方法，在 `Student` 类的上下文中展示：\n\n```\n    public class Student\
    \ {\n    private String majorField;\n    // 本例中省略了其他属性。\n    public String getMajorField()\
    \ {\n    // 返回 majorField 属性的值。\n    return majorField;\n    }\n    // 等等。\n \
    \   }\n    ```\n\n```\npublic String getMajorField()\n```\n\n***对于 “set” 方法，公式如下：***\n\
    \n```\npublic void setAttributeName(attributeType parameterName)\n```\n\n例如：\n\
    \n*   方法名称的编写方式是将相关属性名称的首字母大写（例如 `majorField`），并在前面加上 “set”（例如 `setMajorField`）。\n\
    \n*   对于 “set” 方法，我们必须传入希望对象在设置其相应属性值时使用的值，并且传入值的类型必须与正在设置的属性的类型匹配。如果我们 “设置” 的是\
    \ `int` 属性的值，那么传入相应 “set” 方法的参数必须是 `int`；如果我们 “设置” 的是 `Professor` 属性的值，那么传入相应\
    \ “set” 方法的参数必须是 `Professor`；以此类推。\n\n*   由于简单的 “set” 方法通常期望静默地执行其任务，而不向客户端返回值，因此我们通常将\
    \ “set” 方法的返回类型声明为 `void`。\n\n*   以下是一个完整的典型 “set” 方法，在 `Student` 类的上下文中展示：\n\n\
    ```\n    public class Student {\n    private String majorField;\n    // 本例中省略了其他属性。\n\
    \    public String getMajorField() {\n    // 返回 majorField 属性的值。\n    return majorField;\n\
    \    }\n    public void setMajorField(String major) {\n    // 将作为参数传入的值赋值为 majorField\
    \ 属性的新值。\n    majorField = major;\n    }\n    }\n    ```\n\n```\npublic void setMajorField(String\
    \ major)\n```\n\n“get” 方法的命名约定有一个例外：当属性类型为 `boolean` 时，建议将 “get” 方法命名为以动词 `is`\
    \ 开头，而不是以 `get` 开头。然而，`boolean` 属性的 “set” 方法仍遵循标准命名约定，例如：\n\n```\npublic class\
    \ Student {\nprivate boolean honorsStudent;\n// 本例中省略了其他属性 ...\n// Get 方法。对于 boolean\
    \ 类型，方法名以 \"is\" 开头，而非 \"get\"。\npublic boolean isHonorsStudent() {\nreturn honorsStudent;\n\
    }\n// Set 方法。\npublic void setHonorsStudent(boolean x) {\nhonorsStudent = x;\n\
    }\n// 等等。\n}\n```\n\n到目前为止，我们看到的所有 “get”/“set” 方法体都是简单的 “单行代码”：我们要么在 “get” 方法中使用简单的\
    \ `return` 语句返回相关属性的值，要么在 “set” 方法中将传入参数的值复制到内部属性中以进行存储。这并不意味着所有 “get”/“set” 方法都必须如此简单；事实上，访问器方法中实际编码的内容有无限可能，因为正如我们之前讨论的，方法必须实现业务规则，不仅涉及对象的行为方式，还涉及其数据可以假设的有效状态。\n\
    \n举一个简单的例子，假设我们总是希望以 “S. BARKER” 这样的格式存储 `Student` 的 `name`，例如 “Steve Barker”，其中我们将名字缩写为单个字母，并将整个名称表示为全大写。因此，我们可能希望将\
    \ `Student` 类的 `setName` 方法编写如下：\n\n```\npublic void setName(String newName) {\n\
    // 首先，根据需要重新格式化 newName ...\n// 伪代码。\nif (newName 包含完整的名) {\n// 修改 newName 的值。\n\
    newName = 将 newName 中的名转换为单个字符后跟一个句点;\n}\n// 接下来，将 newName 转换为全大写。\n// 伪代码。\n\
    newName = newName 的大写版本;\n// 只有这样，我们才用（修改后的）值更新 name 属性。\nname = newName;\n}\n\
    ```\n"
- fmt: '### IDE-Generated Get/Set Methods


    With most IDEs, get and set methods are generated automatically. In such cases,
    the name of the parameter being passed into the set method will typically be identical
    to the name of the attribute, for example:


    ```

    public class Student {

    String majorField;

    // other details  omitted

    public void setMajorField(String majorField) {

    this.majorField = majorField;

    }

    ```


    The use of the keyword `this` followed by a dot (`.`) in front of `majorField`
    in the preceding code indicates to the compiler that the ***local variable***
    `majorField`’s value is to be transferred to the ***attribute*** by the same name.


    ### The “Persistence” of Attribute Values


    Because I haven’t explicitly stated so before, and because it may not be obvious
    to everyone, I’d like to call attention now to the fact that an object’s attribute
    values persist as long as the object itself persists in memory. That is, once
    we instantiate a `Student` object in our application


    ```

    Student s = new Student();

    ```


    then any values that we assign to `s`’s attributes


    ```

    s.setName("Mel");

    ```


    will persist until such time as either the value is explicitly changed


    ```

    // Renaming Student s.

    s.setName("Klemmie");

    ```


    or the object as a whole is garbage collected by the Java Virtual Machine (JVM),
    a process that we discussed in Chapter [3](#78624_3_En_3_Chapter.xhtml). So, to
    return to our analogy of objects as helium balloons from Chapter [3](#78624_3_En_3_Chapter.xhtml),
    as long as the “helium balloon” representing `Student s` stays “inflated,” whenever
    we ask `s` for its name, it will “remember” whatever value we’ve ***last*** assigned
    to its `name` attribute.


    ### Using Accessor Methods from Client Code


    We already know how to use dot notation to invoke methods on objects from client
    code, and so we’ll do the same when invoking accessor methods on object references:


    ```

    Student s = new Student();

    // Modify ("set") the attribute value.

    s.setName("Joe");

    // Read ("get") the attribute value.

    System.out.println("Name: " +  s.getName());

    ```


    I promised earlier in this chapter to discuss how a given `Student` can be informed
    as to which particular `Professor` is its `facultyAdvisor`; now that you know
    about “set” methods, doing so is a snap! Assuming that (a) `facultyAdvisor` is
    an attribute of the `Student` class declared to be of type `Professor` and (b)
    we’ve written a “set” method for this attribute with the “standard” header `public
    void setFacultyAdvisor(Professor p)`, here’s the client code for “acquainting”
    students with their advisors:


    ```

    Student s1 = new Student();

    Student s2 = new Student();

    Student s3 = new Student();

    Student s4 = new Student();

    // etc.

    Professor p1 = new Professor();

    Professor p2 = new Professor();

    // etc.

    // Details omitted ...

    s1.setFacultyAdvisor(p1);

    s2.setfacultyAdvisor(p1);

    s3.setFacultyAdvisor(p2);

    s4.setFacultyAdvisor(p2);

    // etc.

    ```


    ## The Power of Encapsulation Plus Information Hiding


    You learned earlier that encapsulation is the mechanism that bundles together
    the state (attribute values) and behavior (methods) of an object. Now that you’ve
    gained some insights into public/private accessibility, encapsulation warrants
    a more in-depth discussion.


    It’s useful to think of an object as a “fortress” that “guards” its data—namely,
    the values of all of its attributes. Rather than trying to march straight through
    the walls of a fortress, which typically results in death and destruction (!),
    we ideally would approach the guard at the gate to ask permission to enter. Generally
    speaking, the same is true for objects: we can’t directly access the values of
    an object’s privately declared attributes without an object’s permission and knowledge—that
    is, without using one of an object’s publicly accessible methods to access the
    attribute’s value.


    Assume that you’ve just met someone for the first time and wish to know their
    name. One way to determine their name would be to reach into their pocket, pull
    out their wallet, and look at their driver’s license—essentially, accessing their
    private attribute values without their permission! The more socially acceptable
    way would be to simply ask them for their name—akin to using their `getName` method—and
    to allow them to respond accordingly. They may respond with their formal name
    or a nickname or an alias, or they may say, “It’s none of your business!”—but
    the important point is that you’re giving the person (object) ***control*** over
    their response based on how the logic of the accessor method is coded.


    By restricting access to an object’s private attributes through public accessors,
    we derive three important benefits:


    *   Preventing unauthorized access to encapsulated data

    *   Helping ensure data integrity

    *   Limiting “ripple effects” that can otherwise occur throughout an application
    when the private implementation details of a class must change


    Let’s discuss each of these benefits in detail.


    ### Preventing Unauthorized Access to Encapsulated Data


    Some of the information that a `Student` object maintains about itself—say, the
    student’s identification number—may be highly confidential. A `Student` object
    may choose to selectively pass along this information when necessary—for example,
    when registering for a course—but may not wish to hand out this information to
    any object that happens to casually ask for it.


    Simply by making the attribute private, and intentionally omitting a public “get”
    method with which to request the attribute’s value, there’d be no way for another
    object to request the `Student` object’s identification number.'
