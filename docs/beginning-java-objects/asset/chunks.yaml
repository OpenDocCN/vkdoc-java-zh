- fmt: '## Producing a Data Dictionary


    Early on in our analysis efforts, it’s important that we clarify and begin to
    document our use of terminology. A **data dictionary** is ideal for this purpose.
    For each candidate class, the data dictionary should include a simple definition
    of what this item means in the context of the model/system as a whole; include
    an example if it helps illustrate the definition.


    The following sidebar shows our complete SRS data dictionary so far.


    **THE SRS DATA DICTIONARY, TAKE 1: CLASS DEFINITIONS**


    - ***Course:*** A semester-long series of lectures, assignments, exams, etc. that
    all relate to a particular subject area and that are typically associated with
    a particular number of credit hours, a unit of study toward a degree. For example,
    Beginning Objects is a required **course** for the Master of Science degree in
    information systems technology.


    - ***PlanOfStudy:*** A list of the **courses** that a student intends to take
    to fulfill the **course** requirements for a particular degree.


    - ***Professor:*** A member of the faculty who teaches **sections** or advises
    **students**.


    - ***Section:*** The offering of a particular **course** during a particular semester
    on a particular day of the week and at a particular time of day (e.g., **course**
    Beginning Objects as taught in the Spring 2025 semester on Mondays from 1:00 to
    3:00 p.m.).


    - ***Student:*** A person who is currently enrolled at the university and who
    is eligible to register for one or more **sections**.


    - ***Transcript:*** A record of all of the **courses** taken to date by a particular
    **student** at this university, including which semester each **course** was taken
    in, the grade received, and the credits granted for the **course**, as well as
    a reflection of an overall total number of credits earned and the **student’s**
    grade point average (GPA).


    Note that it’s permissible, and in fact encouraged, for the definition of one
    term to include one or more of the other terms; when we do so, we highlight the
    latter in **bold text**.


    The data dictionary joins the set of other SRS narrative documents as a subsequent
    source of information about the model. As our model evolves, we’ll expand the
    dictionary to include definitions of attributes, associations, and methods.


    It’s a good idea to also include the dictionary definition of a class as a header
    comment in the Java code representing that class. Make sure to keep this inline
    documentation in sync with the external dictionary definition, however.


    ## Determining Associations Between Classes


    Once we’ve settled on an initial candidate class list, the next step is to determine
    how these classes are interrelated. To do this, we go back to our narrative documentation
    set (which has grown to consist of the SRS requirements specification, use cases,
    and data dictionary) and study ***verb*** phrases this time. Our goal in looking
    at verb phrases is to choose those that suggest structural relationships, as we’ve
    defined in Chapter [5](#78624_3_En_5_Chapter.xhtml)—associations, aggregations,
    and inheritance—but to eliminate or ignore those that represent (transient) actions
    or behaviors. (We’ll focus on behaviors, but from the standpoint of use cases,
    in Chapter [11](#78624_3_En_11_Chapter.xhtml).)


    For example, the specification states that a student “chooses a faculty advisor.”
    This is indeed an action, but the result of this action is a lasting structural
    relationship between a professor and a student, which can be modeled via the association
    “a `Professor` *advises* a `Student`.”


    As a student’s advisor, a professor also meets with the student, answers the student’s
    questions, recommends courses for the student to take, approves the student’s
    plan of study, etc.—these are behaviors on the part of a professor acting in the
    role of an advisor, but don’t directly result in any new relationships being formed
    between objects.


    Let’s try the verb phrase analysis approach on the requirements specification.
    All relevant verb phrases are highlighted in the sidebar that follows (note that
    I omitted such obviously irrelevant verb phrases as “We’ve been asked to develop
    an automated SRS… ”).


    **HIGHLIGHTING VERB PHRASES IN THE SRS SPECIFICATION**


    We have been asked to develop an automated Student Registration System (SRS) for
    the university. This system will **enable students to register** online **for
    courses** each semester, as well as **track their progress toward completion of
    their degree**.


    When a student first **enrolls at the university**, they use the SRS to **set
    forth a plan of study** as to which **courses they plan on taking** to **satisfy
    a particular degree program** and **choose a faculty advisor**. The SRS will **verify
    whether or not the proposed plan of study satisfies the requirements of the degree
    that the student is seeking**.


    Once a **plan of study has been established**, then, during the registration period
    preceding each semester, a student is able to **view the schedule of classes**
    online and **choose whichever classes they wish to attend, indicating the preferred
    section** (day of the week and time of day) if the **class is offered by more
    than one professor**. The SRS will **verify whether or not the student has satisfied
    the necessary prerequisites** for each requested course by **referring to the
    student’s online transcript** of courses completed and grades received (the **student
    may review their transcript** online at any time).


    Assuming that (a) the **prerequisites for the requested course(s) are satisfied**,
    (b) the **course(s) meet(s) one of the student’s plan of study requirements**,
    and (c) **there is room available** in each of the class(es), the **student is
    enrolled in the class(es)**.


    If (a) and (b) are satisfied, but (c) is not, the **student is placed on a first-come,
    first-served waitlist**. If a **class/section that they were previously waitlisted
    for becomes available** (either because some other **student has dropped the class**
    or because the **seating capacity for the class has been increased**), the **student
    is automatically enrolled in the waitlisted class,** and an **email message**
    to that effect **is sent** to the student. It is the student’s responsibility
    to **drop the class** if it is no longer desired; otherwise, **they will be billed
    for the course**.


    **Students may drop a class** up to the end of the first week of the semester
    in which the **class is being taught**.


    Let’s scrutinize a few of these:'
