  raw: '## Why Is Understanding Objects So Critical to Being a Successful OO Programmer?


    Time and again, I meet software developers—at my place of employment, at clients’
    offices, at professional conferences, on college campuses—who have attempted to
    master an object-oriented programming language (OOPL) like Java by taking a course
    in Java, reading a book about Java, or installing and using a Java integrated
    development environment (IDE) such as Eclipse, IntelliJ IDEA, NetBeans, or BlueJ.
    However, there is something fundamentally missing from virtually all of these
    approaches: a basic understanding of what objects are all about and, more importantly,
    ***knowledge of how to structure a software application from the ground up to
    make the most of objects***.


    Imagine that you’ve been asked to build a house and that you know the basics of
    home construction. In fact, you’re a world-renowned home builder whose services
    are in high demand! You’ve built homes of every possible architectural style,
    using every known type of building material: brick, lumber, stone, metal, etc.
    So, when your client tells you that they want you to use a brand-new type of construction
    material, which they’ll provide, you’re happy to oblige.


    ![](images/78624_3_En_BookFrontmatter_Figc_HTML.jpg)


    An illustration denotes a female character and a bag of US dollars, with four
    house structures in the background.


    On the day construction is to begin, a truck pulls up at the building site and
    unloads a large pile of odd-looking blue star-shaped blocks with holes in the
    middle. You’re totally baffled! You’ve built countless homes using more familiar
    materials, but you haven’t got a ***clue*** about how to assemble a house using
    blue stars.


    ![](images/78624_3_En_BookFrontmatter_Figd_HTML.jpg)


    A picture of a human character scratching his head is closest, along with various
    stars.


    Scratching your head, you pull out a hammer and some nails and try to nail the
    blue stars together as if you were working with lumber, but the stars don’t fit
    together very well. You then try to fill in the gaps with the same mortar that
    you would use to adhere bricks to one another, but the mortar doesn’t stick to
    these blue stars very well. Because you’re working under tight cost and schedule
    constraints for building this home for your client, however (and because you’re
    too embarrassed to admit that you, as an ***expert*** home builder, don’t know
    how to work with these modern materials), you press on. Eventually, you wind up
    with something that looks (on the surface, at least) like a house.


    ![](images/78624_3_En_BookFrontmatter_Fige_HTML.jpg)


    A sketch of a human character scratching his head and text titled I hope this
    is good enough, as well as a house structure with a tree and a sun in the background.


    Your client comes to inspect the work and is terribly disappointed. One of the
    reasons they had selected blue stars as a construction material was that they
    are extremely energy efficient; but, because you have used nails and mortar to
    assemble the stars, they have lost a great deal of their inherent ability to insulate
    the home.


    To compensate, your client asks you to replace all of the windows in the home
    with triple-pane thermal glass windows so that they will allow less heat to escape.
    ***You’re panicking at this point!*** Swapping out the windows will require you
    to literally rip the walls apart, destroying the house.


    When you tell your customer this, they go ***ballistic***! Another reason that
    they selected blue stars as a construction material was because of their modularity
    and hence ease of accommodating design changes; but, because of the ineffective
    way with which you’ve assembled these stars, they’ve lost this flexibility, as
    well.


    ![](images/78624_3_En_BookFrontmatter_Figf_HTML.jpg)


    An illustration of two human characters and text labeled What a lousy job! and
    you call yourself a Builder !!! , as well as a house structure with a tree and
    a sun in the background.


    This is, sad to say, the way many programmers wind up building an OO application
    when they don’t have appropriate training in the fundamental properties of the
    building blocks of such an application, namely, software objects. Worse yet, the
    vast majority of would-be OO programmers are blissfully ignorant of the need to
    understand objects in order to program in an OO language. So they take off programming
    with a language like Java and wind up with a far from ideal result: an application
    that lacks flexibility when an inevitable “midcourse correction” occurs in response
    to changing requirements after the application has been deployed.


    ## Whom Is This Book Written For?


    ***Anyone who wants to get the most out of an object-oriented programming language
    like Java!*** It has been written for


    *   Anyone who has yet to tackle Java, but wants to get off on the right foot
    with the language


    *   Anyone who has ever purchased a book on Java and has read it faithfully, who
    understands the “bits and bytes” of the language, but doesn’t quite know how to
    structure an application to best take advantage of Java’s object-oriented features


    *   Anyone who has built a Java application, but was disappointed with how difficult
    it was to maintain or modify it when new requirements were presented later in
    the application’s life cycle


    *   Anyone who has previously learned something about object modeling, but is
    “fuzzy” on how to transition from an object model to real, live code (Java or
    otherwise)


    The bottom line is that ***anyone who really wants to master an OO language like
    Java must become an expert in objects FIRST!***


    In order to gain the most value from this book, you should have some programming
    experience under your belt; virtually any language will do. You should understand
    simple programming concepts such as


    *   Simple data types (integer, floating point, etc.)


    *   Variables and their scope (including the notion of global data)


    *   Flow control (“`if` ... `then` ... `else`” statements, `for`/do/while loops,
    etc.)


    *   What arrays are and how to use them


    *   The notion of a software function/subroutine/procedure: how to pass data in
    and get results back out


    But you needn’t have had any prior exposure to Java. And you needn’t have ever
    been exposed to objects, either—in the software sense, at least! As you’ll learn
    in Chapter [2](#78624_3_En_2_Chapter.xhtml), human beings naturally view the entire
    world from the perspective of objects.


    Even if you’ve already developed a full-fledged Java application, it’s certainly
    not too late to read this book if you still feel fuzzy when it comes to the object
    aspects of structuring an application; it ultimately makes someone a better Java
    programmer to know the “whys” of object orientation rather than merely the mechanics
    of the language. You’ll most likely see some familiar landmarks (in the form of
    Java code examples) in this book, but will hopefully gain many new insights as
    you learn the rationale for why we do many of the things that we do when programming
    in Java (or any other OO programming language for that matter).


    Because this book has its roots in courses that I teach at the university level,
    it’s ideally suited for use as a textbook for a semester-long university or advanced
    placement high school course in either object modeling or Java programming.


    ## What If You’re Interested in Object Modeling, but Not Necessarily in Java Programming?


    Will my book still be of value to you? ***Definitely!*** Even if you don’t plan
    on making a career of programming (as is true of many of my object modeling students),
    I’ve found that being exposed to code examples written in an OO language like
    Java really helps to cement object concepts. So you’re encouraged to read Parts
    1 and 3 even if you never intend to set your hands to the keyboard for purposes
    of Java programming afterward.


    ## How This Book Is Organized


    The book is structured around three major topics, as follows.'
  trans: '

    ## 为什么理解对象对于成为成功的面向对象程序员至关重要？


    我一次又一次地遇到这样的软件开发人员——在我工作的地方、客户办公室、专业会议上、大学校园里——他们试图通过参加 Java 课程、阅读 Java 书籍或安装使用
    Eclipse、IntelliJ IDEA、NetBeans 或 BlueJ 等 Java 集成开发环境（IDE）来掌握 Java 这样的面向对象编程语言（OOPL）。然而，几乎所有方法都缺少一个根本性的要素：对对象本质的基本理解，更重要的是，***掌握如何从头开始构建软件应用程序以充分利用对象的知识***。


    想象一下，有人请你建造一栋房子，而你了解房屋建造的基础知识。事实上，你是一位享誉全球、服务供不应求的房屋建造专家！你使用过所有已知的建筑材料——砖、木材、石材、金属等——建造过各种建筑风格的房屋。因此，当客户告诉你他们想让你使用一种他们提供的新型建筑材料时，你欣然同意。


    ![](img/78624_3_En_BookFrontmatter_Figc_HTML.jpg)


    插图描绘了一位女性角色和一袋美元，背景是四栋房屋结构。


    开工当天，一辆卡车驶入工地，卸下一大堆奇形怪状的蓝色星形积木，中间还有孔洞。你完全懵了！你用熟悉的材料建造过无数房屋，但面对如何用蓝色星星组装房屋，你***毫无头绪***。


    ![](img/78624_3_En_BookFrontmatter_Figd_HTML.jpg)


    图片中一个人物角色挠着头，旁边散落着各种星星。


    你挠着头，拿出锤子和钉子，试图像处理木材一样把蓝色星星钉在一起，但星星之间根本无法很好地契合。接着，你尝试用砌砖用的砂浆填补缝隙，但砂浆也粘不住这些蓝色星星。然而，由于你必须在严格的成本和工期限制下为客户建造这栋房子（而且你羞于承认，作为***专家***级的房屋建造者，你竟然不知道如何使用这些现代材料），你只能硬着头皮继续干。最终，你拼凑出了一个（至少表面上）看起来像房子的东西。


    ![](img/78624_3_En_BookFrontmatter_Fige_HTML.jpg)


    一幅草图：一个人物角色挠着头，旁边文字写着“我希望这已经够好了”，背景是一栋房屋结构、一棵树和太阳。


    客户前来验收，结果大失所望。他们选择蓝色星星作为建筑材料的原因之一，是这种材料极其节能；但由于你用钉子和砂浆来组装星星，它们固有的隔热性能大打折扣。


    为了弥补，客户要求你更换房屋所有窗户，改用三层隔热玻璃窗，以减少热量散失。***此时你惊慌失措！*** 更换窗户意味着你必须彻底拆开墙壁，这无异于毁掉整栋房子。


    当你把情况告诉客户时，他们***勃然大怒***！他们选择蓝色星星作为建筑材料的另一个原因，是其模块化特性，便于适应设计变更；但由于你组装星星的方式不当，这种灵活性也丧失了。


    ![](img/78624_3_En_BookFrontmatter_Figf_HTML.jpg)


    一幅插图：两个人形角色，旁边文字写着“干得真差劲！”和“你还自称建造师！！”，背景是一栋房屋结构、一棵树和太阳。


    可悲的是，这正是许多程序员在构建面向对象应用程序时的写照——他们缺乏对这种应用程序基本构建块（即软件对象）核心属性的适当培训。更糟糕的是，绝大多数准面向对象程序员对理解对象是使用面向对象语言编程的必要条件浑然不觉。于是，他们直接开始用
    Java 这样的语言编程，最终结果远非理想：当应用程序部署后，面对不可避免的“中途修正”以应对需求变化时，应用程序缺乏灵活性。


    ## 这本书为谁而写？


    ***任何希望充分利用 Java 这类面向对象编程语言的人！*** 本书专为以下人群编写：


    *   尚未接触 Java，但希望从一开始就正确掌握该语言的人

    *   曾购买 Java 书籍并认真阅读，理解语言的“位和字节”，但不太清楚如何构建应用程序以充分利用 Java 面向对象特性的人

    *   曾构建过 Java 应用程序，但当应用程序生命周期后期出现新需求时，因维护或修改困难而感到失望的人

    *   曾学习过对象建模相关知识，但对如何从对象模型过渡到真实代码（Java 或其他语言）感到“模糊”的人


    归根结底，***任何真正想掌握 Java 这类面向对象语言的人，必须首先成为对象方面的专家！***


    为了从本书中获得最大价值，你应具备一定的编程经验；几乎任何编程语言都可以。你需要理解简单的编程概念，例如：


    *   简单数据类型（整数、浮点数等）

    *   变量及其作用域（包括全局数据的概念）

    *   流程控制（“`if` ... `then` ... `else`”语句、`for`/do/while 循环等）

    *   数组是什么以及如何使用

    *   软件函数/子程序/过程的概念：如何传入数据并返回结果


    但你无需事先接触过 Java。也无需接触过对象——至少从软件意义上讲！正如你将在第 2 章中学到的，人类天生就会从对象的角度看待整个世界。


    即使你已经开发过一个完整的 Java 应用程序，如果你在构建应用程序的对象方面仍感到模糊，现在阅读本书也绝不晚；了解面向对象的“为什么”而不仅仅是语言的机制，最终会让你成为更优秀的
    Java 程序员。你很可能在本书中看到一些熟悉的内容（以 Java 代码示例的形式），但当你学习在 Java（或其他任何面向对象编程语言）编程中许多做法的原理时，希望能获得许多新的见解。


    由于本书源于我在大学授课的课程，因此非常适合作为大学一学期课程或高中高级先修课程中对象建模或 Java 编程的教材。


    ## 如果你对对象建模感兴趣，但不一定对 Java 编程感兴趣呢？


    我的书对你还有价值吗？***当然有！*** 即使你不打算以编程为职业（正如我的许多对象建模学生那样），我发现接触用 Java 这类面向对象语言编写的代码示例，确实有助于巩固对象概念。因此，即使你之后从未打算动手进行
    Java 编程，也鼓励你阅读第 1 部分和第 3 部分。


    ## 本书的组织结构


    本书围绕三大主题展开，如下所述。

    '
- fmt: "### Part 1: The ABCs of Objects\n\nBefore I dive into the how-to’s of object\
    \ modeling and the details of OO programming in Java, it’s important that we all\
    \ speak the same language with respect to objects. Part 1, consisting of Chapters\
    \ [1](#78624_3_En_1_Chapter.xhtml)–[7](#78624_3_En_7_Chapter.xhtml), starts out\
    \ slowly, by defining basic concepts that underlie all software development approaches,\
    \ OO or otherwise. But the chapters quickly ramp up to a discussion of advanced\
    \ object concepts so that, by the end of Part 1, you will be “object savvy.”\n\
    \n### Part 2: Object Modeling 101\n\nIn Part 2—Chapters [8](#78624_3_En_8_Chapter.xhtml)–[12](#78624_3_En_12_Chapter.xhtml)\
    \ of the book—I focus on the underlying principles of how and, more importantly,\
    \ ***why*** we do the things that we do when we develop an object model of an\
    \ application—principles that are common to all object modeling techniques. It’s\
    \ important to be conversant in the UML, and so I teach you the basics of the\
    \ UML and use it for all of the concrete modeling examples in my book. Using the\
    \ modeling techniques presented in these chapters, we’ll develop an object model\
    \ “blueprint” for a Student Registration System (SRS), the requirements specification\
    \ for which is presented at the end of this introduction.\n\n### Part 3: Translating\
    \ an Object “Blueprint” into Java Code\n\nIn Part 3 of the book—Chapters [13](#78624_3_En_13_Chapter.xhtml)–[15](#78624_3_En_15_Chapter.xhtml)—I\
    \ illustrate how to render the SRS object model that we’ve developed in Part 2\
    \ into a fully functioning Java application, to serve as the **model layer** in\
    \ a three-tier application, and we’ll also talk conceptually about how third-party\
    \ technologies can be harnessed to provide both a user interface (known as the\
    \ **presentation layer or tier**) and data persistence (known as the **data layer\
    \ or tier**). The SRS source code is available for download from GitHub (`github.com/Apress/Beginning-Java-Objects-3e`),\
    \ and I strongly encourage you to download and experiment with this code when\
    \ you reach that chapter.\n\nThe requirements specification for the SRS is written\
    \ in the narrative style with which software system requirements are often expressed.\
    \ You may feel confident that you could build an application today to solve this\
    \ problem, but by the end of my book, you should feel much more confident in your\
    \ ability to build it as an ***object-oriented*** application. Three additional\
    \ case studies—for a Prescription Tracking System (PTS), a Conference Room Reservation\
    \ System, and an Airline Reservation System, respectively—are presented in the\
    \ Appendix; these serve as the basis for many of the exercises presented at the\
    \ end of each chapter.\n\nSuggestions have been provided in the final chapter\
    \ for how you might wish to continue your object-oriented discovery process after\
    \ finishing my book. In that chapter, I furnish you with a list of recommended\
    \ books that will take you to the next level of proficiency, depending on what\
    \ your intention is for applying what you’ve learned in my book.\n\n## Conventions\n\
    \nTo help you get the most from the text and keep track of what’s happening, we’ve\
    \ used a number of conventions throughout the book.\n\nFor instance:\n\nNotes\
    \ are shown in this fashion and reflect important background information.\n\n\
    As for styles in the text:\n\n*   When we introduce important words, we **bold**\
    \ them to highlight them.\n\n*   We show file names, URLs, and code within the\
    \ text like so: `objectstart.com`.\n\n*   We **bold** lines of code within long\
    \ code passages if we want to call your attention to those lines in particular:\n\
    \n    ```\n    // Bolding is used to call attention to new or significant code:\n\
    \    Student s = new Student();\n    // whereas unbolded code is code that's less\
    \ important in the\n    // present context, or has been seen before.\n    int\
    \ x = 3;\n    ```\n\n*   We use *italic* vs. `regular code font` to represent\
    \ pseudocode:\n\n    ```\n    // This is real code:\n    for (int i = 0; i <=\
    \ 10; i++) {\n    // This is pseudocode!\n    compute the grade for the ith Student\n\
    \    }\n    ```\n\n## Which Version of Java Is This Book Based On?\n\nAs mentioned\
    \ previously, Oracle Corporation continues to release new versions of the Java\
    \ language on a regular basis. The ***good news*** is that, because I focus only\
    \ on core Java language syntax in my book—language features that have been stable\
    \ since Java’s inception—this book isn’t version specific. The techniques and\
    \ concepts that you’ll learn by reading my book will serve you equally well when\
    \ new versions of Java appear. That being said, all of the code examples in BJO\
    \ are compatible with Java versions 8 through 17. (Generally speaking, new versions\
    \ of the Java language are forward-compatible, meaning that code written for an\
    \ older version of the language will compile properly in a newer version.)"
