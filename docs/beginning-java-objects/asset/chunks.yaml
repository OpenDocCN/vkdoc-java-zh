  trans: '

    # 11. 系统动态/行为方面的建模


    行为如何影响状态 事件 场景 “课程注册”用例的场景 #1 “课程注册”用例的场景 #2 顺序图 确定场景 #1 中的对象和外部参与者 准备顺序图 使用顺序图确定方法
    通信图 修订后的 SRS 类图 总结


    到目前为止，我们一直专注于所建模问题的**静态结构**——就像我们定制住宅的平面图。正如你在第 10 章所学到的，这种静态结构通过类图及配套文档来传达。类图的构建块包括：


    *   类。

    *   关联/聚合。

    *   属性。

    *   泛化/特化层次结构（也称为继承关系）。

    *   操作/方法。***这些在我们的类图中明显缺失***。为什么？因为它们不属于静态结构的一部分，所以我们还没有讨论如何确定它们；本章将重点讨论这个主题。


    正如我之前多次提到的，面向对象软件系统是一组协作的对象，每个对象都有自己的“生命周期”。然而，如果每个对象都只顾自己的事务，而不考虑其他对象需要它做什么，那么将会陷入彻底的混乱！对象能够协作以执行某些整体系统任务（例如为学生注册课程）的唯一方式是，每个类都定义了适当的方法——***服务***——使其实例能够在协作中履行各自的角色。


    为了确定这些方法/服务必须是什么，我们必须通过建模情境的**动态**方面来补充我们对待构建系统静态结构的认识：即，并发活动对象如何随时间交互，以及这些交互如何影响每个对象的状态。生成动态模型以补充静态模型，不仅能使我们确定每个类所需的方法，还能为我们提供改进静态结构的新见解。


    在本章中，你将学习**动态模型**的构建块：


    *   事件

    *   场景

    *   顺序图

    *   通信图


    以及如何利用从这些建模产物中收集到的知识，来识别完成类图所需的操作/方法。


    ## 行为如何影响状态


    回到第 3 章，我们将对象的***状态***定义为在给定时间点该对象所有属性值的集合，包括：


    *   该对象所有“简单”属性的值——换句话说，不表示其他领域对象的属性

    *   所有表示与其他领域对象链接的引用变量属性的值


    表 11-1 重复了第 6 章中的 `Student` 属性列表，并增加了一列来指示每个属性属于哪个类别。


    **表 11-1**


    *Student* 类属性


    | 属性名称 | 数据类型 | 是否表示指向 SRS 领域对象的链接？ |

    | --- | --- | --- |

    | `Name` | `String` | 否 |

    | `studentID` | `String` | 否 |

    | `birthDate` | `Date` | 否 |

    | `Address` | `String` | 否 |

    | `Major` | `String` | 否 |

    | `Gpa` | `double` | 否 |

    | `Advisor` | `Professor` | 是 |

    | `courseLoad` | `Course` 对象集合 | 是 |

    | `Transcript` | `TranscriptEntry` 对象集合，或 `Transcript` | 是 |


    在第 10 章中，你学习了 UML 对象图，它用于描绘特定个体对象之间链接的“快照”。让我们使用对象图来反映 SRS 领域中几个假设对象的状态。


    图 11-1 显示 Smith 博士（一位 `Professor`）在数学系工作；Green 博士（另一位 `Professor`）在科学系工作；Bill
    和 Mary 都是 `Student`，分别主修数学和科学。


    ![](img/78624_3_En_11_Fig1_HTML.jpg)


    一个状态图展示了两个系：数学系和科学系。在数学系，Smith 博士担任教授，Bill 主修数学。在科学系，Green 博士担任教授，Mary 主修科学。


    **图 11-1**


    对象的状态包括它与其他对象保持的链接


    Bill 对自己的专业选择不满意，于是给他钦佩的教授 Green 博士打电话预约。Bill 想讨论转到科学系的可能性。在与 Green 博士会面并讨论了他的情况后，Bill
    确实决定转专业。我非正式地使用对象图上的箭头反映了这些对象交互，如图 11-2 所示；随着本章的深入，你将学习用 UML 符号表示对象交互的正式方法。


    ![](img/78624_3_En_11_Fig2_HTML.jpg)


    一个状态图展示了两个系：数学系和科学系。在数学系，Smith 博士担任教授，Bill 主修数学。在科学系，Green 博士担任教授，Mary 主修科学。Bill
    学生打电话预约、会面，并转专业到科学系。


    **图 11-2**


    对象的交互会影响它们的状态


    当所有这些活动尘埃落定后，我们看到系统的最终状态发生了变化，如图 11-3 中修订后的对象图所示。具体来说：


    *   Bill 的状态发生了变化，因为他与数学系对象的链接已被替换为与科学系对象的链接。

    *   数学系对象的状态发生了变化，因为它不再与 Bill 有链接。

    *   科学系的状态发生了变化，因为它现在有一个之前没有的额外链接（指向 Bill）。


    但请注意，尽管 Green 博士与 Bill 合作帮助他做出转专业的决定，但“Green 博士”（`Professor`）对象的***状态并未***因这次协作而改变。


    ![](img/78624_3_En_11_Fig3_HTML.jpg)


    一个状态图展示了两个系：数学系和科学系。在数学系，Smith 博士担任教授，Bill 主修数学。在科学系，Green 博士担任教授，Mary 主修科学。从
    Bill 的主修数学到科学系有一条新链接。


    **图 11-3**


    一些交互对象**不会**经历状态变化


    因此我们看到：


    *   对象的动态活动可能导致**系统静态结构**的变化——即所有对象状态的集合。

    *   然而，这些活动不一定影响协作中***所有***对象的状态。

    '
- fmt: "### Events\n\nYou saw in Chapter [4](#78624_3_En_4_Chapter.xhtml) that object\
    \ collaborations are triggered by events. By way of review, an **event** is an\
    \ external stimulus to an object, signaled to the object in the form of a **message**\
    \ (method call). An event can be:\n\n- **User initiated** (e.g., the result of\
