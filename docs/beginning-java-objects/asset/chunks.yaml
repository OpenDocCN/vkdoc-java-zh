    \ are two aspects to consider:\n\n- First, is a particular name deemed **valid**\
    \ by the Java compiler?\n- Second, does a particular **valid** name adhere to\
    \ the naming **convention** that has been adopted by the OO programming community\
    \ across all languages?\n\n**Valid** variable names in Java must start with either\
    \ an alphabetic character or a dollar sign (whose use is discouraged, since it\
    \ is used by the compiler when generating code) and may contain any of these characters\
    \ plus numeric digits. No other characters are allowed in variable names.\n\n\
    The following are all valid variable names in Java:\n\n```\nint simple;      \
    \         // starts with alphabetic character\nint more$money_is_2much;  // may\
    \ contain dollar signs, and/or underscores, and/or\n// digits, and/or alphabetic\
    \ characters\n```\n\nThese are invalid:\n\n```\nint 1bad;                 // inappropriate\
    \ starting character\nint number#sign;          // contains invalid character\n\
    int foo-bar;              // ditto\nint plus+sign;            // ditto\nint x@y;\
    \                  // ditto\nint dot.notation;         // ditto\n```\n\nThat being\
    \ said, the **convention** that is observed throughout the OO programming community\
    \ is to form variable names using primarily alphabetic characters, avoiding the\
    \ use of underscores, and furthermore to adhere to a style known as **camel casing**.\
    \ With camel casing, the first letter of a variable name is in **lowercase**,\
    \ the **first** letter of each subsequent concatenated word in the variable name\
    \ is in **uppercase**, and the rest of the characters are in **lowercase**. All\
    \ of the following variable names are both valid and conventional:\n\n```\nint\
    \ grade;\ndouble averageGrade;\nString myPetRat;\nboolean weAreFinished;\n```\n\
    \nRecall that, as mentioned earlier, Java keywords can’t be used as variable names.\
    \ The following won’t compile, because `public` is a Java keyword:\n\n```\nint\
    \ public;\n```\n\nIn fact, the compiler would generate the following **two** error\
    \ messages:\n\n```\nnot a statement\nint public;\n^\n';' expected\nint public;\n\
    ^\n```\n\n### Variable Initialization\n\nIn Java, variables aren’t necessarily\
    \ assigned an initial value when they’re declared, but all variables **must**\
    \ be explicitly assigned a value before the variable’s value is **used** in an\
    \ assignment statement. For example, in the following code snippet, two `int`(eger)\
    \ variables are declared; an initial value is explicitly assigned to variable\
    \ `foo`, but not to variable `bar`. A subsequent attempt to add the two variables’\
    \ values together results in a compiler error:\n\n```\nint foo;\nint bar;\n//\
    \ We're explicitly initializing foo, but not bar.\nfoo = 3;\nfoo = foo + bar;\
    \   // This line won't compile.\n```\n\nThe following compiler error would arise\
    \ on the last line of code:\n\n```\nvariable bar might not have been initialized\n\
    foo = foo + bar;\n^\n```\n\nTo correct this error, we would need to assign an\
    \ explicit value to `bar`, as well as `foo`, before using them in the addition\
    \ expression:\n\n```\nint foo;\nint bar;\nfoo = 3;\n// We're now initializing\
    \ BOTH variables explicitly.\nbar = 7;\nfoo = foo + bar;  // This line will now\
    \ compile properly.\n```\n\nIn Chapter [13](#78624_3_En_13_Chapter.xhtml) you’ll\
    \ learn that the rules of automatic initialization are somewhat different when\
    \ dealing with the “inner workings” of objects.\n\n### The String Type\n\nI’ll\
    \ discuss one more important Java type in this chapter: the `String` type, which\
    \ is not considered to be a primitive type (we’ll discuss the special nature of\
    \ Strings as objects in Chapter [13](#78624_3_En_13_Chapter.xhtml)). A `String`\
    \ represents a sequence of zero or more Unicode characters.\n\nThe symbol `String`\
    \ starts with a capital “S,” whereas the names of primitive types are expressed\
    \ in all lowercase: `int`, `float`, `boolean`, etc. This capitalization difference\
    \ is deliberate and mandatory—`string` (lowercase) won’t work as a type:\n\n```\n\
    string s = \"foo\";  // This won't compile.\n```\n\nError message:\n\n```\ncannot\
    \ find symbol\nsymbol:  string\n```\n\nThere are several ways to create and initialize\
    \ a `String` variable. The easiest and most commonly used way is to declare a\
    \ variable of type `String` and to assign the variable a value using a **string\
    \ literal**. A string literal is any text enclosed in **double** quotes, even\
    \ if it consists of only a **single character**:\n\n```\nString name = \"Steve\"\
    ;\nString shortString = \"A\";\n```\n\nTwo commonly used approaches for initializing\
    \ a `String` variable with a temporary placeholder value are as follows:\n\n-\
    \ Assigning an empty string, represented by two consecutive double quote marks:\n\
    \n  ```\n  String s = \"\";\n  ```\n\n- Assigning the value `null`, which is a\
    \ Java reserved word that is used to signal that a `String` has not yet been assigned\
    \ a “real” value:\n\n  ```\n  String s = null;\n  ```\n\nThe plus sign (`+`) operator\
    \ is used for arithmetic addition with numeric data types, but when used in conjunction\
    \ with `String`s, it represents **string concatenation**. Any number of `String`\
    \ values can be concatenated with the `+` operator, as the following code snippet\
    \ illustrates:\n\n```\nString x = \"foo\";\nString y = \"bar\";\nString z = x\
    \ + y + \"!\";  // z assumes the value \"foobar!\" (x and y's values are\n// unaffected)\n\
    ```\n\nYou’ll learn about some of the many other operations that can be performed\
    \ with or on `String`s, along with insights into their OO nature, in Chapter [13](#78624_3_En_13_Chapter.xhtml).\n\
    \n### Case Sensitivity\n\nJava is a **case-sensitive** language. That is, the\
    \ use of uppercase vs. lowercase in Java is deliberate and mandatory, for example:\n\
    \n- Variable names that are spelled the same way but that differ in their use\
    \ of case represent **different** variables:\n\n  ```\n  // These are two DIFFERENT\
