  trans: '

    ## 元数据


    初学者经常提出的一个问题是：为什么我们不使用继承关系来关联`Course`和`Section`类，而是像我们选择的那样使用简单的关联？表面上看，让`Section`成为`Course`的派生类似乎确实很有吸引力，因为`Course`列出的所有属性——`courseNo`、`courseName`和`creditValue`——也适用于`Section`；那么，为什么我们不让`Section`像`Student`和`Professor`继承`Person`的所有属性那样，***继承***这些属性呢？一个简单的例子就能很快说明为什么继承并不合适。


    假设因为“面向对象概念入门”是一门非常受欢迎的课程，大学在 2025 年春季学期开设了该课程的三个教学班。因此，我们实例化了一个`Course`对象和三个`Section`对象。如果`Section`是`Course`的派生类，那么所有***四个***对象都会携带`courseNo`、`courseName`和`creditValue`属性。填写这四个对象的属性值，如表
    10-3 所示，我们看到这四个对象的属性值存在大量重复：我们***重复***了相同的`courseNo`、`courseName`和`creditValue`属性值四次。这是因为`Course`对象中包含的信息是***众多***`Section`对象所共有的，因此也描述了这些对象。


    表 10-3


    四个对象实例间的数据重复


    | 属性名 | Course 对象的属性值 |

    | --- | --- |

    | `courseName` | 面向对象概念入门 |

    | `courseNo` | OBJECTS 101 |

    | `creditValue` | 3 |


    | 属性名 | Section 对象 #1 的属性值 | Section 对象 #2 的属性值 | Section 对象 #3 的属性值 |

    | --- | --- | --- | --- |

    | `courseName` | 面向对象概念入门 | 面向对象概念入门 | 面向对象概念入门 |

    | `courseNo` | OBJECTS 101 | OBJECTS 101 | OBJECTS 101 |

    | `creditValue` | 3 | 3 | 3 |

    | `studentsRegistered` | (待定) | (待定) | (待定) |

    | `instructor` | 指向教授 X 的引用 | 指向教授 Y 的引用 | 指向教授 Z 的引用 |

    | `semesterOffered` | 2025 年春季 | 2025 年春季 | 2025 年春季 |

    | `dayOfWeek` | 星期一 | 星期二 | 星期四 |

    | `timeOfDay` | 下午 7:00 | 下午 4:00 | 下午 6:00 |

    | `classroom` | A 厅，123 室 | B 厅，234 室 | A 厅，345 室 |


    为了减少冗余并促进封装，我们应该消除这些属性的***继承***，而是为 *n* 个相关的`Section`对象实例只创建一个`Course`对象实例。然后，我们可以让每个`Section`对象持有一个指向公共`Course`对象的句柄，以便在需要时检索这些共享值。这正是我们通过一对多的
    *offered as* 关联所建模的方式。


    当某个类`A`的实例封装了描述另一个类`B`的众多实例（例如`Course`之于`Section`）的信息时，我们将`A`对象（`Course`）包含的信息称为相对于`B`对象（`Section`）的**元数据**。


    ## 总结


    我们的对象模型已经开始成形！我们清楚地了解了 SRS 所需的静态结构——类、它们的属性以及它们之间的相互关系——并且能够以简洁的图形形式传达这些知识。本章未涵盖
    UML 符号的许多其他修饰，但我们已研究了足以满足大多数“工业级”建模项目的核心概念。


    然而，我们的类图中有一个明显的“漏洞”：我们所有的类都有空的操作区域。我们将在第 11 章中通过学习一些用于确定对象***动态行为***的补充建模技术来解决这个缺陷。


    在本章中，你学习了


    *   用于识别候选领域类的名词短语分析技术

    *   用于确定这些类之间潜在关系的动词短语分析技术

    *   提出候选类具有一定主观性，因此我们必须保持灵活性，反复审视我们的模型，直到我们和用户对结果都满意为止

    *   生成数据字典作为项目文档集一部分的重要性

    *   如何使用 UML 符号以类图的形式图形化地描绘模型的静态结构

    *   为项目团队配备经验丰富的对象建模导师的重要性


    练习


    1.  为附录中介绍的处方跟踪系统 (PTS) 案例研究列出一份候选类列表，以及一个关联矩阵。

    2.  使用 UML 符号为 PTS 案例研究开发一个类图。反映所有重要的属性和类之间的关系，包括适当的多样性。理想情况下，如果你有可用的对象建模软件工具，应该使用它。

    3.  为 PTS 准备一份数据字典，包括所有类、属性和关联的定义。

    4.  为你为第 1 章练习 3 定义的需求所对应的问题领域，列出一份候选类列表，以及一个关联矩阵。

    5.  使用 UML 符号为你为第 1 章练习 3 定义的需求所对应的问题领域，开发一个类图。反映所有重要的属性和类之间的关系，包括适当的多样性。理想情况下，如果你有可用的对象建模软件工具，应该使用它。

    6.  为你为第 1 章练习 3 定义的需求所对应的问题领域，准备一份数据字典，包括所有类、属性和关联的定义。

    '
- fmt: '# 11. Modeling the Dynamic/Behavioral Aspects of the System


    [How Behavior Affects State](#78624_3_En_11_Chapter.xhtml#Sec1) [Events](#78624_3_En_11_Chapter.xhtml#Sec2)
    [Scenarios](#78624_3_En_11_Chapter.xhtml#Sec8) [Scenario #1 for the “Register
    for a Course” Use Case](#78624_3_En_11_Chapter.xhtml#Sec9) [Scenario #2 for the
    “Register for a Course” Use Case](#78624_3_En_11_Chapter.xhtml#Sec10) [Sequence
    Diagrams](#78624_3_En_11_Chapter.xhtml#Sec11) [Determining Objects and External
    Actors for Scenario #1](#78624_3_En_11_Chapter.xhtml#Sec12) [Preparing the Sequence
    Diagram](#78624_3_En_11_Chapter.xhtml#Sec13) [Using Sequence Diagrams to Determine
    Methods](#78624_3_En_11_Chapter.xhtml#Sec14) [Communication Diagrams](#78624_3_En_11_Chapter.xhtml#Sec15)
    [Revised SRS Class Diagram](#78624_3_En_11_Chapter.xhtml#Sec16) [Summary](#78624_3_En_11_Chapter.xhtml#Sec17)


    Thus far, we’ve been focused on the **static structure** of the problem being
    modeled—the floor plan for our custom home, as it were. As you learned in Chapter
    [10](#78624_3_En_10_Chapter.xhtml), this static structure is communicated via
    a class diagram plus supporting documentation. The building blocks of a class
    diagram are:


    - Classes.

    - Associations/aggregations.

    - Attributes.

    - Generalization/specialization hierarchies (also known as inheritance relationships).

    - Operations/methods. ***These are conspicuously absent from our class diagram***.
    Why? Because they aren’t part of the static structure, so we haven’t discussed
    how to determine these yet; this topic is the focus of this chapter.


    As I’ve said many times already, an OO software system is a set of collaborating
    objects, each with a “life” of its own. If each object went about its own business
    without regard to what any other object needed it to do, however, utter chaos
    would reign! The only way that objects can collaborate to perform some overall
    system mission, such as registering a student for a course, is if each class defines
    the appropriate methods—***services***—that will enable its instances to fulfill
    their respective roles in the collaboration.


    In order to determine what these methods/services must be, we must complement
    our knowledge of the static structure of the system to be built by also modeling
    the **dynamic** aspects of the situation: that is, the ways in which concurrently
    active objects interact over time and how these interactions affect each object’s
    state. Producing a dynamic model to complement the static model will not only
    enable us to determine the methods required for each class but also give us new
    insights into ways to improve upon the static structure.


    In this chapter, you’ll learn about the building blocks of a **dynamic model**:


    - Events

    - Scenarios

    - Sequence diagrams

    - Communication diagrams


    and how to use the knowledge gleaned from these modeling artifacts to identify
    the operations/methods that are needed to complete our class diagram.


    ## How Behavior Affects State


    Back in Chapter [3](#78624_3_En_3_Chapter.xhtml), we defined the ***state*** of
    an object as the collective set of all of the object’s attribute values at a given
    point in time, including:


    - The values of all of the “simple” attributes for that object—in other words,
    attributes that don’t represent other domain objects

    - The values of all of the reference variable attributes representing links to
    other domain objects


    Table [11-1](#78624_3_En_11_Chapter.xhtml#Tab1) repeats our list of `Student`
    attributes from Chapter [6](#78624_3_En_6_Chapter.xhtml), with an additional column
    to indicate which category each attribute falls into.


    **Table 11-1** *Student* Class Attributes


    | Attribute Name | Data Type | Represents Link(s) to an SRS Domain Object? |

    | --- | --- | --- |

    | `Name` | `String` | No |

    | `studentID` | `String` | No |

    | `birthDate` | `Date` | No |

    | `Address` | `String` | No |

    | `Major` | `String` | No |

    | `Gpa` | `double` | No |

    | `Advisor` | `Professor` | Yes |

    | `courseLoad` | Collection of `Course` objects | Yes |

    | `Transcript` | Collection of `TranscriptEntry` objects, or `Transcript` | Yes
    |


    In Chapter 10, you learned about UML object diagrams as a way of portraying a
    “snapshot” of the links between specific individual objects. Let’s use an object
    diagram to reflect the state of a few hypothetical objects within the SRS domain.


    Figure [11-1](#78624_3_En_11_Chapter.xhtml#Fig1) shows that Dr. Smith (a `Professor`)
    works for the Math Department; Dr. Green (another `Professor`) works for the Science
    Department; and Bill and Mary, both `Student`s, are majoring in Math and Science,
    respectively.


    ![](images/78624_3_En_11_Chapter/78624_3_En_11_Fig1_HTML.jpg)


    A state diagram illustrates two departments, Math and Science. In the Math department,
    Doctor Smith works as a professor, and Bill majors as a student. In the Science
    department, Doctor Green works as a professor, and Mary majors as a student.


    **Figure 11-1** The state of an object includes the links it maintains with other
    objects


    Bill is dissatisfied with his choice of major and calls Dr. Green, a professor
    whom he admires, to make an appointment. Bill wants to discuss the possibility
    of transferring to the Science Department. After meeting with Dr. Green and discussing
    his situation, Bill indeed decides to switch majors. I’ve informally reflected
    these object interactions using arrows on the object diagram, shown in Figure
    [11-2](#78624_3_En_11_Chapter.xhtml#Fig2); as this chapter progresses, you’ll
    learn the official way to portray object interactions in UML notation.


    ![](images/78624_3_En_11_Chapter/78624_3_En_11_Fig2_HTML.jpg)


    A state diagram illustrates two departments, Math and Science. In the Math department,
    Doctor Smith works as a professor, and Bill majors as a student. In the Science
    department, Doctor Green works as a professor, and Mary majors as a student. The
    bill student calls to make appointments, meets with, and switches majors related
    to the science department.


    **Figure 11-2** Objects’ interactions can affect their state


    When the dust settles from all of this activity, we see that the resultant state
    of the system has changed, as reflected in the revised object diagram in Figure
    [11-3](#78624_3_En_11_Chapter.xhtml#Fig3). In particular:


    - Bill’s state has changed, because his link to the Math Department object has
    been replaced with a link to the Science Department object.

    - The Math Department object’s state has changed, because it no longer has a link
    to Bill.

    - The Science Department’s state has changed, because it now has an additional
    link (to Bill) that wasn’t previously there.


    Note, however, that although Dr. Green collaborated with Bill in helping him make
    his decision to switch majors, the state of the “Dr. Green” (`Professor`) object
    ***has not changed*** as a result of the collaboration.


    ![](images/78624_3_En_11_Chapter/78624_3_En_11_Fig3_HTML.jpg)


    A state diagram illustrates two departments, Math and Science. In the Math department,
    Doctor Smith works as a professor, and Bill majors as a student. In the Science
    department, Doctor Green works as a professor, and Mary majors as a student. There
    is a new link from Bill''s major in Math to the Science department.


    **Figure 11-3** Some interacting objects **don’t** experience a change of state


    So we see that:


    - Objects’ dynamic activities can result in changes to the **static structure
    of a system**—that is, the states of all of its objects taken collectively.

    - However, such activities needn’t affect the state of ***all*** objects involved
    in a collaboration.'
