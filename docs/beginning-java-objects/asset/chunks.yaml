  raw: '## Collections of Derived Types


    As mentioned previously, arrays, as simple collections, contain items (either
    primitive values or object references) that are all of the same type: all `int`(egers),
    for example, or all (references to) `Student` objects. As it turns out, regardless
    of what type of collection we’re using, we’ll typically want to constrain it to
    contain similarly typed objects, for reasons that we’ll explore in Chapter [7](#78624_3_En_7_Chapter.xhtml)
    when we discuss ***polymorphism***. However, the power of inheritance steps in
    to make collections quite flexible in terms of what they contain.


    It turns out that if we declare a collection to hold objects of a given superclass—for
    example, `Person`—then we’re free to insert objects explicitly declared to be
    of type `Person` ***or of any type derived from*** `Person`—for example, `UndergraduateStudent`,
    `GraduateStudent`, and `Professor`. This is due to the “is a” nature of inheritance;
    `UndergraduateStudent`, `GraduateStudent`, and `Professor` objects, as subclasses
    of `Person`, are simply special cases of `Person` objects. The Java compiler would
    therefore be perfectly happy to see code such as the following


    ```

    Person[] people = new Person[100];

    Professor p = new Professor();

    UndergraduateStudent s1 = new UndergraduateStudent();

    GraduateStudent s2 = new GraduateStudent();

    // Add a mixture of professors and students in random order to the array.

    people[0] = s1;

    people[1] = p;

    people[2] = s2;

    // etc.

    ```


    or for an `ArrayList`


    ```

    ArrayList people = new ArrayList();

    Professor p = new Professor();

    UndergraduateStudent s1 = new UndergraduateStudent();

    GraduateStudent s2 = new GraduateStudent();

    // Add a mixture of professors and students in random order to the ArrayList.

    people.add(s1);

    people.add(p);

    people.add(s2);

    // etc.

    ```


    ## Revisiting Our Student Class Design


    You may recall that when we talked about the attributes of the `Student` class
    back in Chapter [3](#78624_3_En_3_Chapter.xhtml), we held off on assigning types
    to the `courseLoad` and `transcript` attributes, as shown in Table [6-1](#78624_3_En_6_Chapter.xhtml#Tab1).


    Table 6-1


    Proposed Data Structure for the *Student* Class


    | Attribute Name | Data Type |

    | --- | --- |

    | `name` | `String` |

    | `studentID` | `String` |

    | `birthDate` | `Date` |

    | `address` | `String` |

    | `major` | `String` |

    | `gpa` | `double` |

    | `advisor` | `Professor` |

    | `courseLoad` | **???** |

    | `transcript` | **???** |


    Armed with what we now know about collections, we can now complete our `Student`
    class design.


    ### The courseLoad Attribute of Student


    The `courseLoad` attribute is meant to represent a list of all `Course` objects
    that the `Student` is presently enrolled in. So it makes perfect sense that this
    attribute be declared as simply a standard collection of `Course` object references—an
    `ArrayList`, perhaps:


    ```

    import java.util.ArrayList;

    public class Student {

    private String name;

    private String studentId;

    private ArrayList courseLoad;

    // etc.

    ```


    ### The transcript Attribute of Student


    The `transcript` attribute is a bit more challenging. What is a transcript, in
    real-world terms? It’s a report of all of the courses that a student has taken
    since they were first admitted to this university, along with the semester in
    which each course was taken, the number of credit hours that each course was worth,
    and the letter grade that the student received for the course. A typical transcript
    entry, when printed, might look as follows:


    ```

    CS101      Beginning Objects        3.0         A

    ```


    If we think of each line item on a printed transcript as an ***object***, we can
    declare a `TranscriptEntry` class to describe them, as follows:


    ```

    public class TranscriptEntry {

    // One TranscriptEntry object represents a single line item on a printed

    // transcript.

    private Course courseTaken;

    private String semesterTaken;  // e.g., "Fall 2006"

    private String gradeReceived;  // e.g., "B+"

    // Constructor.

    public TranscriptEntry(Course c, String semester, String grade) {

    // Details omitted ...

    }

    // Accessor method details omitted ...

    public void printTranscriptEntry() {

    // We "talk to" the courseTaken object/attribute to obtain the

    // majority of the required information (an example of

    // delegation). Reminder:  \t is a tab character.

    System.out.println(

    this.getCourseTaken().getCourseNo() + "\t" +

    this.getCourseTaken().getTitle() + "\t" +

    this.getCourseTaken().getCreditHours() + "\t" +

    this.getGradeReceived());

    }

    // Other methods TBD ...

    }

    ```


    Since each `TranscriptEntry` object maintains a handle on a `Course` object, the
    `TranscriptEntry` object can avail itself of the `Course` object’s course number,
    title, or credit hour value (needed for computing the GPA)—all privately encapsulated
    in the `Course` object as attributes—by calling the appropriate accessor methods
    on that `Course` object as needed.


    Back in the `Student` class, we can now define the `Student`’s `transcript` attribute
    to be a ***collection*** of `TranscriptEntry` objects:


    ```

    import java.util.*;

    public class Student {

    private String name;

    private String studentId;

    private ArrayList transcript;

    // etc.

    ```


    We can then equip the `Student` class with an `addTranscriptEntry` method for
    use in inserting a new `TranscriptEntry` into the `transcript` collection


    ```

    public void addTranscriptEntry(TranscriptEntry te) {

    // Store the TranscriptEntry in our ArrayList.

    transcript.add(te);

    }

    ```


    along with a `printTranscript` method for iterating through this collection:


    ```

    // This method merely iterates through the collection,

    // delegating the work of printing to the individual

    // TranscriptEntry objects.

    public void printTranscript() {

    // Print header information on the transcript:

    // Student’s name, name of the university, date

    // printed, etc.

    System.out.println("Academic transcript for " +

    this.getName());

    // Other transcript header details omitted ...

    // Print individual transcript line items.

    for (TranscriptEntry t : transcript) {

    t.printTranscriptEntry();

    }

    }

    // etc.

    }

    ```


    Figure [6-17](#78624_3_En_6_Chapter.xhtml#Fig17) illustrates how `Student`, `ArrayList`,
    `TranscriptEntry`, and `Course` objects would thus be “wired together” in memory
    at run time.


    ![](images/78624_3_En_6_Chapter/78624_3_En_6_Fig17_HTML.jpg)


    An array list of 4 blocks. It has the first 2 blocks connected to the transcript
    entry clouds of the transcript, course taken, semester taken, and grade received
    for a student and 2 courses.


    Figure 6-17


    As “wired together” in memory, a `Student` references an `ArrayList`, which in
    turn references `TranscriptEntry` objects. These in turn each reference a `Course`
    object


    Finally, let’s look at the client code that might be involved in putting these
    classes to work:


    ```

    Student s = new Student("1234567", "James Huddleston");

    Course c = new Course("LANG 800", "Advanced Language Studies");

    s.registerForCourse(c);

    // Time passes ... details omitted.

    // Semester is finished!  Assign a grade to this student (he''s brilliant!).

    TranscriptEntry te = new TranscriptEntry(c, "Spring 2006", "A+");

    s.addTranscriptEntry(te);

    // Additional grades assigned for other courses ... details omitted.

    s.printTranscript();

    ```


    The manner in which we’re assigning a grade to a student for a course that they
    have completed (namely, by instantiating a `TranscriptEntry` object and then calling
    the `Student`’s `addTranscriptEntry` method)


    ```

    TranscriptEntry te = new TranscriptEntry(c, "Spring 2006", "A+");

    s.addTranscriptEntry(te);

    ```


    is not as intuitive as it could be to someone reading this client code. Let’s
    see if we can improve upon our design with a goal of rendering client code that
    is a bit more straightforward.'
