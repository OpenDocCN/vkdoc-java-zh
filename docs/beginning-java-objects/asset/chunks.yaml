- fmt: '### (Inappropriate) Approach #2: “Clone” the `Student` Class to Create a `GraduateStudent`
    Class


    We could instead create a new `GraduateStudent` class by copying the code of `Student.java`
    to create `GraduateStudent.java`, renaming the latter class `GraduateStudent`,
    and then adding the extra features required of a graduate student to the copy.


    Here’s the resultant `GraduateStudent` class:


    ```java

    // GraduateStudent.java

    public class GraduateStudent {

    // Student attributes DUPLICATED!

    private String name;

    private String birthDate;

    // etc.

    // Add the two new attributes required of a GraduateStudent.

    private String undergraduateDegree;

    private String undergraduateInstitution;

    // Student methods DUPLICATED!

    public String getName(...

    public void setName(...

    public String getBirthDate(...

    public void setBirthDate(...

    // etc.

    // Add the new accessor methods required of a GraduateStudent.

    public String getUndergraduateDegree(...

    public void setUndergraduateDegree(...

    public String getUndergraduateInstitution(...

    public void setUndergraduateInstitution(...

    }

    ```


    This would be a very poor design, since we’d have much of the same code in two
    places: `Student.java` and `GraduateStudent.java`. If we wanted to change how
    a particular method worked or how an attribute was defined later on—say, a change
    of the type of the `birthDate` attribute from `String` to `Date`, with a corresponding
    change to the accessor methods for that attribute—then we’d have to make the same
    changes in both classes. Again, this problem quickly gets compounded if we’ve
    defined three or four or a dozen different types of `Student`, all created as
    “clones” of the original `Student` class; the code maintenance burden would quickly
    become excessive. Approach #2 is clearly not the answer, either!


    Strictly speaking, either of the preceding two approaches would work, but the
    inherent redundancy/complexity of the resultant code would make the application
    prohibitively difficult to maintain. Unfortunately, with non-OO languages, such
    convoluted approaches would typically be our only options for handling the requirement
    for a new type of object. It’s no wonder that applications become so complicated
    and expensive to maintain as requirements inevitably evolve over time. Fortunately,
    we do have yet another very powerful approach that we can take specific to OO
    programming languages: we can take advantage of the mechanism of **inheritance**.


    ### The Proper Approach (#3): Taking Advantage of Inheritance


    With an object-oriented programming language, we can solve the problem of specializing
    the `Student` class by harnessing the power of **inheritance**, a mechanism for
    defining a new class by stating only the differences (in terms of features) between
    the new class and another class that we’ve already established.


    Using inheritance, we can declare a new class named `GraduateStudent` that inherits
    all of the features of the `Student` class “as is.” The `GraduateStudent` class
    would then only have to specify the two extra attributes associated with a graduate
    student—`undergraduateDegree` and `undergraduateInstitution`—plus their accessor
    methods, as shown in the following `GraduateStudent` class. Note that inheritance
    is triggered in a Java class declaration using the `extends` keyword: `public
    class` *NewClass* `extends` *ExistingClass* `{ ... }`.


    ```java

    public class GraduateStudent extends Student {

    // Declare two new attributes above and beyond

    // what the Student class has already declared ...

    private String undergraduateDegree;

    private String undergraduateInstitution;

    // ... and accessor methods for each of these new attributes.

    public String getUndergraduateDegree {

    return undergraduateDegree;

    }

    public void setUndergraduateDegree(String s) {

    undergraduateDegree = s;

    }

    public String getUndergraduateInstitution {

    return undergraduateInstitution;

    }

    public void setUndergraduateInstitution(String s) {

    undergraduateInstitution = s;

    }

    // That''s the ENTIRE GraduateStudent class declaration!

    // Short and sweet!

    }

    ```


    That’s all we need to declare in establishing our new `GraduateStudent` class:
    two attributes plus the associated four accessor methods. There is no need to
    duplicate any of the features of the `Student` class within the code of `GraduateStudent`,
    because we’re automatically inheriting these. It’s as if we had “plagiarized”
    the code for the attributes and methods of the `Student` class, copying this code
    from `Student` and pasting it into `GraduateStudent`, but without the fuss of
    actually having done so. The `GraduateStudent` class thus has ***n*** + 6 features:
    the six features that are explicitly declared within the `GraduateStudent.java`
    file plus ***n*** more that are inherited from `Student`.


    When we take advantage of inheritance, the original class that we’re starting
    from—`Student`, in this case—is called the (**direct**) **superclass.** The new
    class—`GraduateStudent`—is called a (**direct**) **subclass.** A subclass is said
    to **extend** its direct superclass.'
