    ### 识别参与者并确定其角色


    我们必须为系统相关的各类用户所扮演的每一种不同角色创建一个参与者。要识别这些角色，我们通常首先查阅**叙事性需求规格说明**（如果存在的话），即功能需求的陈述，例如学生注册系统的规格说明。该规格说明明确提及的用户类别只有学生用户。因此，我们肯定会将“学生”视为
    SRS 的参与者类型之一。


    然而，如果我们跳出规格说明的局限进行思考，不难发现其他可能从使用 SRS 中受益的潜在用户类别：


    *   **教师**可能希望了解即将教授的某门课程有多少学生注册，或者他们可能使用该系统提交最终成绩，这些成绩会相应地反映在学生的成绩单上。


    *   **系主任**可能希望了解各门课程的受欢迎程度，或者反之，判断某门课程是否因学生群体缺乏兴趣而应被取消。


    *   **注册处工作人员**可能希望使用 SRS 来验证某位特定学生是否预计能在特定学期满足毕业要求。


    *   **校友**可能希望使用 SRS 来申请获取其成绩单副本。


    *   **潜在学生**——即那些正在考虑申请入学但尚未提交申请的人——可能希望浏览即将在下一学期开设的课程，以帮助他们判断该大学的课程设置是否符合自己的兴趣。


    *   等等。


    同样，由于我之前提到其他计算机系统也可以作为参与者，我们可能需要在 SRS 与大学中其他现有的自动化系统之间构建接口，例如：


    *   **计费系统**，以便根据学生当前的课程负荷进行准确计费。

    *   **教室排课系统**，以确保根据学生人数将课程分配到容量足够的教室。

    *   **招生系统**，以便在新学生被录取并有资格注册课程时通知 SRS。


    当然，我们必须尽早决定待构建系统的范围，以避免“需求膨胀”或“范围蔓延”。试图容纳之前假设的所有参与者将导致一项庞大的工程，对系统的赞助方来说可能成本过高。例如，为潜在学生提供使用
    SRS 预览大学课程设置的功能是否合理？或者是否有另一个不同的系统——比如某种在线课程目录——更适合此目的？通过与所有预期用户群体进行深入访谈，可以恰当地界定系统范围，而我们设想的一些参与者可能会因此被排除。


    在我们的具体案例中，我们假设 SRS 的赞助方已决定，在构建系统时无需满足校友或潜在学生的需求——也就是说，我们无需将校友或潜在学生视为参与者。这里的关键点是，此类决定由赞助方做出，***而非程序员***！软件工程师的职责之一确实是识别需求，并且该职责的一部分当然可能包括提出软件工程师认为对用户有益的功能改进建议。但系统赞助方对最终构建的内容拥有最终决定权。


    许多软件工程师之所以陷入困境，是因为他们自认为比客户更了解用户的真正需求。你或许确实有绝妙的想法可以提出，但请将其仅仅视为一个***建议***，并将你的任务视为要么说服赞助方/用户接受其价值，要么优雅地接受他们拒绝你建议的决定。


    请注意，同一用户可能在不同场合以不同角色与系统交互。也就是说，一位担任系主任的教授在试图决定某门课程是否应被取消时，可能扮演“系主任”参与者的角色。或者，同一位教授在希望查询
    SRS 以了解其正在教授的某门课程的学生人数时，可能扮演“教师”用户的角色。

    '
- fmt: "### Diagramming a System and Its Actors\n\nOnce we’ve settled on the actors\
    \ for our system, we may wish to optionally diagram them. UML notation calls for\
    \ representing all actors—whether a human user or a computer system—as stick figures\
    \ and then connecting these via straight lines to a rectangle representing the\
    \ system, as you see in Figure [9-1](#78624_3_En_9_Chapter.xhtml#Fig1).\n\n![](images/78624_3_En_9_Chapter/78624_3_En_9_Fig1_HTML.png)\n\
    \nA diagram of 7 stick figures is mapped to a block of S R S. The figures are\
    \ labeled student, faculty, department chair, registrar, billing system, admissions\
    \ system, and classroom scheduling system.\n\nFigure 9-1\n\nA “proper” UML use\
    \ case diagram\n\nThis figure appears rather simplistic, and yet, this is a legitimate\
    \ diagram that might be produced for a project such as the SRS development effort.\n\
    \nI prefer to use a slightly modified version of UML notation, as follows:\n\n\
    - I’ve extended the use of a rectangle to represent not only the core system but\
    \ also all actors that are external systems, rather than representing the latter\
    \ as human stick figures.\n- I find that using arrowheads to reflect a directional\
    \ flow of information—that is, whether an actor provides or consumes information—is\
    \ a bit more communicative. For example, in the amended version of the notation\
    \ as follows, I represent a student as both providing and consuming information,\
    \ whereas a registrar only consumes information.\n\n  Note that the registrar\
    \ does indeed provide information, but not to the SRS directly. They provide information\
    \ to the Admissions System as to which students are registered at the university;\
    \ this information then gets fed into the SRS by the Admissions System. So the\
    \ Admissions System is shown as providing information as an actor to the SRS;\
    \ but, from the standpoint of the SRS, the registrar is simply a consumer.\n\n\
    With these slight changes in notation, as reflected in Figure [9-2](#78624_3_En_9_Chapter.xhtml#Fig2),\
    \ the use case diagram becomes a much more communicative instrument.\n\n![](images/78624_3_En_9_Chapter/78624_3_En_9_Fig2_HTML.jpg)\n\
    \nA diagram of 4 stick figures of the student, faculty, department chair, and\
    \ registrar is interconnected with blocks of the billing system, admissions system,\
    \ and classroom scheduling system via a block of S R S.\n\nFigure 9-2\n\nA customized\
    \ version of use case notation\n\nOf course, if you do decide to deviate from\
    \ a widely understood notational standard such as UML, you’ll need to follow these\
    \ steps:\n\n1. Reach consensus among your fellow software developers, to ensure\
    \ that the team as a whole is speaking the same language.\n2. Document and communicate\
    \ such deviations (along with the notation as a whole) to your customers/users,\
    \ so that they, too, understand your particular “dialect.”\n3. Make sure that\
    \ such documentation is incorporated into the full documentation set for the project,\
    \ so that future reviewers of the documentation will immediately understand your\
    \ notational “embellishments.”\n\nIf you make these enhancements intuitive enough,\
    \ however, they may just speak for themselves.\n\nOf course, as pointed out in\
    \ Chapter [8](#78624_3_En_8_Chapter.xhtml), you’ll also need to consider whether\
    \ the CASE tool you’re using, if any, will support such alterations.\n\nTime and\
    \ again throughout Part 2 of this book, I’ll remind you that it’s perfectly acceptable\
    \ to adapt or extend any process, notation, or tool that you care to adopt to\
    \ best suit your company’s or project’s purposes; none of these methodology components\
    \ is “sacred.”\n\n## Specifying Use Cases\n\nHaving made a first cut at what the\
    \ SRS actors are, we’ll next enumerate in what ways the system will be used by\
    \ these actors—in other words, the use cases themselves.\n\nA use case represents\
    \ a logical “thread,” or a series of cause-and-effect events, beginning with an\
    \ actor’s first contact with the system and ending with the achievement of that\
    \ actor’s goal for using the system in the first place. Note that an actor always\
    \ initiates a use case; actions initiated by a system on its own behalf don’t\
    \ warrant the development of a use case (although they do warrant expression as\
    \ either a functional or technical requirement, as defined earlier in the chapter).\n\
    \nUse cases emphasize “what” the system is to do—functional requirements—without\
    \ concern for “how” such things will be accomplished internally, and they aren’t\
    \ unlike method signatures in this regard. In fact, you can think of a use case\
    \ as a “behavioral signature” for the system as a whole.\n\nSome example high-level\
    \ use cases for the SRS might be\n\n- Register for a course.\n- Drop a course.\n\
    - Determine a student’s course load.\n- Choose a faculty advisor.\n- Establish\
    \ a plan of study.\n- View the schedule of classes.\n- Request a student roster\
    \ for a given course.\n- Request a transcript for a given student.\n- Maintain\
    \ course information (e.g., change the course description, reflect a different\
    \ instructor for the course, etc.).\n- Determine a student’s eligibility for graduation.\n\
    - Post final semester grades for a given course.\n\nRemember that a use case is\
    \ initiated by an actor, which is why I didn’t list other functionality called\
    \ out by the SRS requirements specification, such as “Notify student by email,”\
    \ as use cases.\n\nWe may decompose any one of the use cases into steps, with\
    \ each step representing a more detailed use case. For example, “Register for\
    \ a course” may be decomposed into these steps:\n\n1. Verify that a student has\
    \ met the prerequisites.\n2. Check student’s plan of study to ensure that this\
    \ course is required.\n3. Check for availability of a seat in the course.\n4.\
    \ (Optionally) Place student on a waitlist.\n5. And so forth.\n\nUse cases may\
    \ be interrelated in parent-child fashion, with more detailed use cases being\
    \ shared by more than one general use case. For example, the “Request a student\
    \ roster” and “Post final semester grades” general use cases may both involve\
    \ the more detailed “Verify that professor is teaching the course in question”\
    \ use case.\n\nUnfortunately, as is true of all requirements analysis, there is\
    \ no magical formula to apply in order to determine whether or not you’ve identified\
    \ all of the important use cases or all of the actors and/or whether you’ve gone\
    \ into sufficient depth in terms of sub`–`use cases. The process of use case development\
    \ is iterative; when subsequent iterations fail to yield substantial changes,\
    \ you’re probably finished! Copious interviews and reviews with users, along with\
    \ periodic team walk-throughs of the use case set as a whole, go a long way in\
    \ ensuring that nothing important has been missed."
  raw: "### Diagramming a System and Its Actors\n\nOnce we’ve settled on the actors\
    \ for our system, we may wish to optionally diagram them. UML notation calls for\
    \ representing all actors—whether a human user or a computer system—as stick figures\
    \ and then connecting these via straight lines to a rectangle representing the\
    \ system, as you see in Figure [9-1](#78624_3_En_9_Chapter.xhtml#Fig1).\n\n![](images/78624_3_En_9_Chapter/78624_3_En_9_Fig1_HTML.png)\n\
    \nA diagram of 7 stick figures is mapped to a block of S R S. The figures are\
    \ labeled student, faculty, department chair, registrar, billing system, admissions\
    \ system, and classroom scheduling system.\n\nFigure 9-1\n\nA “proper” UML use\
    \ case diagram\n\nThis figure appears rather simplistic, and yet, this is a legitimate\
    \ diagram that might be produced for a project such as the SRS development effort.\n\
    \nI prefer to use a slightly modified version of UML notation, as follows:\n\n\
    *   I’ve extended the use of a rectangle to represent not only the core system\
    \ but also all actors that are external systems, rather than representing the\
    \ latter as human stick figures.\n\n*   I find that using arrowheads to reflect\
    \ a directional flow of information—that is, whether an actor provides or consumes\
    \ information—is a bit more communicative. For example, in the amended version\
    \ of the notation as follows, I represent a student as both providing and consuming\
    \ information, whereas a registrar only consumes information.\n\n    Note that\
    \ the registrar does indeed provide information, but not to the SRS directly.\
    \ They provide information to the Admissions System as to which students are registered\
    \ at the university; this information then gets fed into the SRS by the Admissions\
    \ System. So the Admissions System is shown as providing information as an actor\
    \ to the SRS; but, from the standpoint of the SRS, the registrar is simply a consumer.\n\
    \nWith these slight changes in notation, as reflected in Figure [9-2](#78624_3_En_9_Chapter.xhtml#Fig2),\
    \ the use case diagram becomes a much more communicative instrument.\n\n![](images/78624_3_En_9_Chapter/78624_3_En_9_Fig2_HTML.jpg)\n\
