- fmt: '### Overloading Constructors


    Just as we are permitted to overload methods in Java, we are permitted to overload
    constructors. That is, we may write as many different constructors for a given
    class as we wish, as long as they have different argument signatures.


    Here is an example of a `Student` class that declares three different constructors:


    ```

    public class Student {

    private String name;

    private String ssn;

    private int age;

    // etc.

    // Constructor #1:  takes no arguments; supercedes the default constructor.

    public Student() {

    // Assign default values to selected attributes, if desired.

    this.setSsn("?");

    // Those that aren''t explicitly initialized in the constructor will

    // automatically assume the zero-equivalent value for their respective type.

    }

    // Constructor #2:  takes a single String argument.

    public Student(String s) {

    this.setSsn(s);

    }

    // Constructor #3:  takes two Strings and an int as arguments.

    public Student(String s, String n, int i) {

    this.setSsn(s);

    this.setName(n);

    this.setAge(i);

    }

    // Other methods omitted from this example.

    }

    ```


    By overloading the constructor for a class, we make the class more versatile by
    giving client code a variety of constructors to choose from, depending on the
    circumstances. Here is an example of client code illustrating the use of all three
    forms of `Student` constructor:


    ```

    // We don''t know ANYTHING about our first student, so we use the

    // parameterless constructor to instantiate s1.

    Student s1 = new Student();

    // We know the ssn (only) for our second student, and so we use the second

    // form of constructor to instantiate s2.

    Student s2 = new Student("123-45-6789");

    // We know the ssn, name, and age of our third student, and so we use

    // the third form of constructor to instantiate s3.

    Student s3 = new Student("987-65-4321", "John Smith", 21);

    ```


    As with overloaded methods, the compiler is able to unambiguously match up which
    version of constructor is being invoked in each case based on the argument signatures:


    *   `()`: No arguments tell the compiler that we are invoking constructor #1.

    *   `("123-45-6789")`: One `String` argument tells the compiler that we are invoking
    constructor #2.

    *   `("987-65-4321", "John Smith", 21)`: Two `String`s and an `int` as arguments
    tell the compiler that we are invoking constructor #3.


    This example also reinforces why no two constructors may have the same argument
    signature. If we were permitted to introduce a fourth constructor whose argument
    signature duplicated that of constructor #2, for example


    ```

    // Constructor #4:  takes a single String argument, thereby duplicating the

    // argument signature of constructor #2.

    public Student(String n) {  // THIS WON''T COMPILE!!!

    this.setName(n);

    }

    ```


    then the compiler would not know which constructor—#2 or #4—we’re trying to invoke
    in the following client code:


    ```

    // Pseudocode.

    Student x = new Student(aStringExpression);

    ```


    So, to avoid such an ambiguous situation, the compiler generates an error message
    on the preceding declaration of constructor #4, as follows:


    ```

    Student(java.lang.String) is already defined in Student

    public Student(String n) { }

    ^

    ```


    ### An Important Caveat Regarding the Default Constructor


    There is one very important caveat about default constructors in Java: if we declare
    any of our own constructors for a class, with any argument signature, then the
    default parameterless constructor is not automatically provided. This is by design,
    because it is assumed that if we’ve gone to the trouble to program any constructors
    whatsoever for a class, then we must have some special initialization requirements
    for that class that the default constructor could not possibly anticipate.


    The implication of this language feature is as follows: if we want or need a constructor
    that accepts no arguments for a particular class along with other versions of
    constructors that do take arguments, we must explicitly program a parameterless
    constructor. To illustrate this point, let’s consider a `Student` class that only
    declares one explicit constructor:


    ```

    public class Student {

    // Details omitted.

    // Only one constructor is explicitly declared, and which takes a

    // single String argument.

    public Student(String s) {

    this.setSsn(s);

    }

    // etc.

    }

    ```


    In client code, we may instantiate a `Student` based on this class as follows:


    ```

    Student s = new Student("123-45-6789");

    ```


    But if we try to use the (what is now nonexistent) default constructor


    ```

    Student s = new Student();

    ```


    we’ll get the following compilation error:


    ```

    cannot find symbol

    symbol  : constructor Student()

    location: class Student

    Student s = new Student();

    ^

    ```


    Generally speaking, it is considered a best practice to always explicitly provide
    a parameterless constructor (to replace the lost default) if we are providing
    any constructors for a class at all. We’ll revisit the importance of this practice
    when we discuss **inheritance** in Chapter [5](#78624_3_En_5_Chapter.xhtml).


    One common mistake made by beginning Java programmers is to accidentally declare
    a return type in a constructor header, for example:


    ```

    public void Student() { ... }

    ```


    This is a particularly difficult bug to track down, because while such header
    declarations will compile, they are viewed by the compiler as methods and not
    as constructors and cannot be used as such. What’s worse, developers will think
    that they’ve programmed a parameterless constructor when in fact they haven’t;
    any attempt to use such a constructor in their application will meet with the
    following seemingly cryptic compilation error message:


    ```

    Student s = new Student();

    ```


    This is the compiler error:


    ```

    cannot find symbol

    symbol:  constructor Student()

    location:  class Student

    Student s = new Student();

    ^

    ```'
