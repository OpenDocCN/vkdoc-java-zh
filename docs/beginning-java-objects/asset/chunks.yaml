    \        // inappropriate starting character\nint number#sign;          // contains\
    \ invalid character\nint foo-bar;              // ditto\nint plus+sign;      \
    \      // ditto\nint x@y;                  // ditto\nint dot.notation;       \
    \  // ditto\n```\n\nThat being said, the ***convention*** that is observed throughout\
    \ the OO programming community is to form variable names using primarily alphabetic\
    \ characters, avoiding the use of underscores, and furthermore to adhere to a\
    \ style known as **camel casing**. With camel casing, the first letter of a variable\
    \ name is in ***lowercase***, the ***first*** letter of each subsequent concatenated\
    \ word in the variable name is in ***uppercase***, and the rest of the characters\
    \ are in ***lowercase***. All of the following variable names are both valid and\
    \ conventional:\n\n```\nint grade;\ndouble averageGrade;\nString myPetRat;\nboolean\
    \ weAreFinished;\n```\n\nRecall that, as mentioned earlier, Java keywords can’t\
    \ be used as variable names. The following won’t compile, because `public` is\
    \ a Java keyword:\n\n```\nint public;\n```\n\nIn fact, the compiler would generate\
    \ the following ***two*** error messages:\n\n```\nnot a statement\nint public;\n\
    ^\n';' expected\nint public;\n^\n```\n\n## Variable Initialization\n\nIn Java,\
    \ variables aren’t necessarily assigned an initial value when they’re declared,\
    \ but all variables ***must*** be explicitly assigned a value before the variable’s\
    \ value is ***used*** in an assignment statement. For example, in the following\
    \ code snippet, two `int`(eger) variables are declared; an initial value is explicitly\
    \ assigned to variable `foo`, but not to variable `bar`. A subsequent attempt\
    \ to add the two variables’ values together results in a compiler error:\n\n```\n\
    int foo;\nint bar;\n// We're explicitly initializing foo, but not bar.\nfoo =\
    \ 3;\nfoo = foo + bar;   // This line won't compile.\n```\n\nThe following compiler\
    \ error would arise on the last line of code:\n\n```\nvariable bar might not have\
    \ been initialized\nfoo = foo + bar;\n^\n```\n\nTo correct this error, we would\
    \ need to assign an explicit value to `bar`, as well as `foo`, before using them\
    \ in the addition expression:\n\n```\nint foo;\nint bar;\nfoo = 3;\n// We're now\
    \ initializing BOTH variables explicitly.\nbar = 7;\nfoo = foo + bar;  // This\
    \ line will now compile properly.\n```\n\nIn Chapter [13](#78624_3_En_13_Chapter.xhtml)\
    \ you’ll learn that the rules of automatic initialization are somewhat different\
    \ when dealing with the “inner workings” of objects.\n\n## The String Type\n\n\
    I’ll discuss one more important Java type in this chapter: the `String` type,\
    \ which is not considered to be a primitive type (we’ll discuss the special nature\
    \ of Strings as objects in Chapter [13](#78624_3_En_13_Chapter.xhtml)). A `String`\
    \ represents a sequence of zero or more Unicode characters.\n\nThe symbol `String`\
    \ starts with a capital “S,” whereas the names of primitive types are expressed\
    \ in all lowercase: `int`, `float`, `boolean`, etc. This capitalization difference\
    \ is deliberate and mandatory—`string` (lowercase) won’t work as a type:\n\n```\n\
    string s = \"foo\";  // This won't compile.\n```\n\nError message:\n\n```\ncannot\
    \ find symbol\nsymbol:  string\n```\n\nThere are several ways to create and initialize\
    \ a `String` variable. The easiest and most commonly used way is to declare a\
    \ variable of type `String` and to assign the variable a value using a **string\
    \ literal**. A string literal is any text enclosed in ***double*** quotes, even\
    \ if it consists of only a ***single character***:\n\n```\nString name = \"Steve\"\
    ;\nString shortString = \"A\";\n```\n\nTwo commonly used approaches for initializing\
    \ a `String` variable with a temporary placeholder value are as follows:\n\n*\
    \   Assigning an empty string, represented by two consecutive double quote marks:\n\
    \n    ```\n    String s = \"\";\n    ```\n\n*   Assigning the value `null`, which\
    \ is a Java reserved word that is used to signal that a `String` has not yet been\
    \ assigned a “real” value:\n\n    ```\n    String s = null;\n    ```\n\nThe plus\
    \ sign (`+`) operator is used for arithmetic addition with numeric data types,\
    \ but when used in conjunction with `String`s, it represents **string concatenation**.\
    \ Any number of `String` values can be concatenated with the `+` operator, as\
    \ the following code snippet illustrates:\n\n```\nString x = \"foo\";\nString\
    \ y = \"bar\";\nString z = x + y + \"!\";  // z assumes the value \"foobar!\"\
    \ (x and y's values are\n// unaffected)\n```\n\nYou’ll learn about some of the\
    \ many other operations that can be performed with or on `String`s, along with\
    \ insights into their OO nature, in Chapter [13](#78624_3_En_13_Chapter.xhtml).\n\
    \n## Case Sensitivity\n\nJava is a **case-sensitive** language. That is, the use\
    \ of uppercase vs. lowercase in Java is deliberate and mandatory, for example:\n\
    \n*   Variable names that are spelled the same way but that differ in their use\
    \ of case represent ***different*** variables:\n\n    ```\n    // These are two\
    \ DIFFERENT variables as far as the Java compiler\n    // is concerned.\n    int\
    \ x;  // lowercase\n    int X;  // uppercase\n    ```\n\n*   All keywords are\
    \ rendered in lowercase: `public`, `class`, `int`, `boolean`, and so forth. ***Don’t\
    \ get “creative” about capitalizing these***, as the compiler will violently object—often\
    \ with unintelligible compilation error messages, as in the following example,\
    \ where the reserved word `for` is improperly capitalized:\n\n    ```\n    //\
    \ The reserved word 'for' should be lowercase.\n    For (int i = 0; i < 3; i++)\
    \ {\n    ```\n\n    This in turn produces the following seemingly bizarre compiler\
    \ error:\n\n    ```\n    '.class' expected\n    For (int i = 0; i < 3; i++) {\n\
    \    ^\n    ```\n\n*   The name of the `main` method is lowercase.\n\n*   As mentioned\
    \ earlier, the `String` type starts with an uppercase “S.”\n\n## Java Expressions\n\
    \nJava is an **expression-oriented language**. A **simple** **expression** in\
    \ Java is either\n\n*   ***A constant***: `7`, `false`\n\n*   ***A*** *char**(acter)\
    \ literal enclosed in single quotes***: `'A'`, `'3'`\n\n*   ***A*** *String* ***literal\
    \ enclosed in double quotes***: `\"foo\"`, `\"Java\"`\n\n*   ***The name of any\
    \ properly declared variables***: `myString`, `x`\n\n*   ***Any*** two ***of the\
    \ preceding types of expression that are combined with one of the Java*** binary\
    \ operators ***(discussed in detail later in this chapter)***: `x + 2`\n\n*  \
    \ ***Any*** one ***of the preceding types of expression that is modified by one\
    \ of the Java*** unary operators ***(discussed in detail later in this chapter)***:\
    \ `i++`\n\n*   ***Any of the preceding types of expression enclosed in parentheses***:\
    \ `(x + 2)`\n\nplus a few more types of expression having to do with objects that\
    \ you’ll learn about later in the book.\n\nExpressions of arbitrary complexity\
    \ can be assembled from the various different simple expression types by nesting\
    \ parentheses, for example: `((((4/x) + y) * 7) + z)`."
  trans: "\n### 变量命名规范\n\n在讨论 Java 变量名时，需要考虑两个方面：\n\n*   首先，某个特定名称是否被 Java 编译器视为***有效***？\n\
    \n*   其次，某个特定的***有效***名称是否遵循了面向对象编程社区在所有语言中采用的命名***规范***？\n\nJava 中***有效***的变量名必须以字母字符或美元符号开头（不鼓励使用美元符号，因为编译器在生成代码时会用到它），并且可以包含这些字符以及数字。变量名中不允许出现其他字符。\n\
    \n以下是 Java 中所有有效的变量名：\n\n```\nint simple;               // 以字母字符开头\nint more$money_is_2much;\
    \  // 可以包含美元符号、下划线和/或\n// 数字、字母字符\n```\n\n以下是无效的变量名：\n\n```\nint 1bad;       \
    \          // 起始字符不合适\nint number#sign;          // 包含无效字符\nint foo-bar;     \
    \         // 同上\nint plus+sign;            // 同上\nint x@y;                  //\
    \ 同上\nint dot.notation;         // 同上\n```\n\n话虽如此，面向对象编程社区遵循的***规范***是主要使用字母字符来构成变量名，避免使用下划线，并且遵循一种称为**驼峰命名法**的风格。使用驼峰命名法时，变量名的首字母为***小写***，变量名中后续每个拼接单词的***首***字母为***大写***，其余字符为***小写***。以下所有变量名既有效又符合规范：\n\
    \n```\nint grade;\ndouble averageGrade;\nString myPetRat;\nboolean weAreFinished;\n\
    ```\n\n回想一下，如前所述，Java 关键字不能用作变量名。以下代码无法编译，因为 `public` 是一个 Java 关键字：\n\n```\nint\
    \ public;\n```\n\n实际上，编译器会生成以下***两条***错误信息：\n\n```\n不是语句\nint public;\n^\n需要 ';'\n\
    int public;\n^\n```\n\n## 变量初始化\n\n在 Java 中，变量在声明时不一定被赋予初始值，但在赋值语句中***使用***变量的值之前，所有变量***必须***被显式地赋予一个值。例如，在以下代码片段中，声明了两个\
    \ `int`（整型）变量；变量 `foo` 被显式地赋予了初始值，但变量 `bar` 没有。随后尝试将这两个变量的值相加会导致编译器错误：\n\n```\n\
    int foo;\nint bar;\n// 我们显式地初始化了 foo，但没有初始化 bar。\nfoo = 3;\nfoo = foo + bar; \
    \  // 这行代码无法编译。\n```\n\n在最后一行代码上会出现以下编译器错误：\n\n```\n变量 bar 可能尚未初始化\nfoo = foo\
    \ + bar;\n^\n```\n\n要纠正此错误，我们需要在加法表达式中使用 `bar` 和 `foo` 之前，为它们都显式地赋值：\n\n```\n\
    int foo;\nint bar;\nfoo = 3;\n// 我们现在显式地初始化了两个变量。\nbar = 7;\nfoo = foo + bar;\
    \  // 这行代码现在可以正常编译。\n```\n\n在第 13 章中，你将了解到，在处理对象的“内部工作机制”时，自动初始化的规则会有所不同。\n\n\
    ## String 类型\n\n在本章中，我将讨论另一个重要的 Java 类型：`String` 类型，它不被视为基本类型（我们将在第 13 章中讨论 String\
    \ 作为对象的特殊性质）。`String` 表示零个或多个 Unicode 字符的序列。\n\n符号 `String` 以大写字母“S”开头，而基本类型的名称则全部用小写字母表示：`int`、`float`、`boolean`\
    \ 等。这种大小写差异是有意为之且强制性的——`string`（小写）不能用作类型：\n\n```\nstring s = \"foo\";  // 这行代码无法编译。\n\
    ```\n\n错误信息：\n\n```\n找不到符号\n符号:    string\n```\n\n有多种创建和初始化 `String` 变量的方法。最简单且最常用的方法是声明一个\
    \ `String` 类型的变量，并使用**字符串字面量**为变量赋值。字符串字面量是任何用***双***引号括起来的文本，即使它只包含一个***单字符***：\n\
    \n```\nString name = \"Steve\";\nString shortString = \"A\";\n```\n\n使用临时占位符值初始化\
    \ `String` 变量的两种常用方法如下：\n\n*   赋值为空字符串，由两个连续的双引号表示：\n\n    ```\n    String s =\
    \ \"\";\n    ```\n\n*   赋值为 `null`，这是一个 Java 保留字，用于表示 `String` 尚未被赋予“真正的”值：\n\n\
    \    ```\n    String s = null;\n    ```\n\n加号（`+`）运算符用于数值数据类型的算术加法，但当与 `String`\
    \ 一起使用时，它表示**字符串拼接**。任意数量的 `String` 值都可以使用 `+` 运算符进行拼接，如下代码片段所示：\n\n```\nString\
    \ x = \"foo\";\nString y = \"bar\";\nString z = x + y + \"!\";  // z 的值为 \"foobar!\"\
    （x 和 y 的值不受影响）\n```\n\n你将在第 13 章中了解一些其他可以对 `String` 执行或使用 `String` 执行的操作，以及对其面向对象特性的深入见解。\n\
    \n## 大小写敏感性\n\nJava 是一种**区分大小写**的语言。也就是说，在 Java 中使用大写字母与小写字母是有意为之且强制性的，例如：\n\n\
    *   拼写相同但大小写使用不同的变量名代表***不同的***变量：\n\n    ```\n    // 就 Java 编译器而言，这是两个不同的变量。\n\
    \    int x;  // 小写\n    int X;  // 大写\n    ```\n\n*   所有关键字都用小写字母表示：`public`、`class`、`int`、`boolean`\
    \ 等。***不要“创意性地”将它们大写***，因为编译器会强烈反对——通常会给出难以理解的编译错误信息，如下例所示，其中保留字 `for` 被错误地大写了：\n\
    \n    ```\n    // 保留字 'for' 应为小写。\n    For (int i = 0; i < 3; i++) {\n    ```\n\
    \n    这反过来会产生以下看似奇怪的编译器错误：\n\n    ```\n    需要 '.class'\n    For (int i = 0; i\
    \ < 3; i++) {\n    ^\n    ```\n\n*   `main` 方法的名称是小写的。\n\n*   如前所述，`String` 类型以大写字母“S”开头。\n\
    \n## Java 表达式\n\nJava 是一种**面向表达式的语言**。Java 中的**简单** **表达式**可以是以下任意一种：\n\n*   ***常量***：`7`、`false`\n\
    \n*   ***用单引号括起来的字符字面量***：`'A'`、`'3'`\n\n*   ***用双引号括起来的字符串字面量***：`\"foo\"`、`\"\
    Java\"`\n\n*   ***任何正确声明的变量的名称***：`myString`、`x`\n\n*   ***上述任意两种表达式与一个 Java 二元运算符（本章后面会详细讨论）组合而成***：`x\
    \ + 2`\n\n*   ***上述任意一种表达式被一个 Java 一元运算符（本章后面会详细讨论）修改而成***：`i++`\n\n*   ***上述任意一种表达式用括号括起来***：`(x\
    \ + 2)`\n\n再加上一些与对象相关的其他表达式类型，你将在本书后面学到。\n\n通过嵌套括号，可以从各种不同的简单表达式类型组合出任意复杂度的表达式，例如：`((((4/x)\
    \ + y) * 7) + z)`。\n"
- fmt: "### Arithmetic Operators\n\nThe Java language provides a number of basic arithmetic\
    \ operators, as shown in Table [2-1](#78624_3_En_2_Chapter.xhtml#Tab1).\n\nTable\
    \ 2-1  \nJava Arithmetic Operators\n\n| Operator | Description |\n| --- | ---\
    \ |\n| `+` | Addition |\n| `-` | Subtraction |\n| `*` | Multiplication |\n| `/`\
    \ | Division |\n| `%` | Remainder (the remainder when the operand to the left\
    \ of the `%` operator is divided by the operand to the right, for example, `10\
    \ % 3 = 1`, because 3 goes into 10 three times, leaving a remainder of 1) |\n\n\
    The `+` and `-` operators can also be used as unary operators to indicate positive\
    \ or negative numbers: `-3.7`, `+42`.\n\nIn addition to the simple assignment\
    \ operator, `=`, there are a number of specialized compound assignment operators,\
    \ which combine variable assignment with an arithmetic operation, as shown in\
    \ Table [2-2](#78624_3_En_2_Chapter.xhtml#Tab2).\n\nTable 2-2  \nJava Compound\
    \ Assignment Operators\n\n| Operator | Description |\n| --- | --- |\n| `+=` |\
    \ `a += b` is equivalent to `a = a + b`. |\n| `-=` | `a -= b` is equivalent to\
    \ `a = a - b`. |\n| `*=` | `a *= b` is equivalent to `a = a * b`. |\n| `/=` |\
    \ `a /= b` is equivalent to `a = a / b`. |\n| `%=` | `a %= b` is equivalent to\
    \ `a = a % b`. |\n\nThe final two arithmetic operators that we’ll look at are\
    \ the unary increment (`++`) and decrement (`--`) operators, which are used to\
    \ increase or decrease the value of an `int` variable by 1 or of a floating-point\
    \ (`float`, `double`) value by 1.0. They’re known as unary operators because they’re\
    \ applied to a single variable, whereas binary operators combine the values of\
    \ two expressions as discussed previously.\n\nThe unary increment and decrement\
    \ operators can also be applied to `char` variables to step forward or backward\
    \ one character position in the Unicode sorting sequence. For example, in the\
    \ following code snippet, the value of variable `c` will be incremented from `'e'`\
    \ to `'f'`:\n\n```\nchar c = 'e';\nc++; // c will be incremented from 'e' to 'f'.\n\
    ```\n\nThe increment and decrement operators can be used in either a prefix or\
    \ postfix manner. If the operator is placed *before* the variable it’s operating\
    \ on (prefix mode), the increment or decrement of that variable is performed *before*\
    \ the variable’s *updated* value is used in any assignments made via that statement.\
    \ For example, consider the following code snippet, which uses the prefix increment\
    \ (`++`) operator. Assume that `a` and `b` have previously been declared as `int`\
    \ variables in our program:\n\n```\na = 1;\nb = ++a;\n```\n\nAfter the preceding\
    \ lines of code have executed, the value of variable `a` will be 2, as will the\
    \ value of variable `b`. This is because, on the second line of code, the increment\
    \ of variable `a` (from 1 to 2) occurs *before* the value of `a` is assigned to\
    \ variable `b`. Thus, the single line of code\n\n```\nb = ++a;\n```\n\nis logically\
    \ equivalent to the following *two* lines of code:\n\n```\na = a + 1;  // Increment\
    \ a's value first ...\nb = a;      // ... THEN use its value.\n```\n\nOn the other\
    \ hand, if the increment/decrement operator is placed *after* the variable it’s\
    \ operating on (postfix mode), the increment or decrement occurs *after* the variable’s\
    \ *original* value is used in any assignments made via that statement. Let’s look\
    \ at the same code snippet with the increment operator written in a postfix manner:\n\
    \n```\na = 1;\nb = a++;\n```\n\nAfter the preceding lines of code have executed,\
    \ the value of variable `b` will be 1, whereas the value of variable `a` will\
    \ be 2. This is because, on the second line of code, the increment of variable\
    \ `a` (from 1 to 2) occurs *after* the value of `a` is assigned to variable `b`.\
    \ Thus, the single line of code\n\n```\nb = a++;\n```\n\nis logically equivalent\
    \ to the following *two* lines of code:\n\n```\nb = a;      // Use a's value first\
    \ ...\na = a + 1;  // ... THEN increment its value.\n```\n\nHere’s a slightly\
    \ more complex example; please read the accompanying comment to make sure that\
    \ you can see how `x` will end up being assigned the value 10:\n\n```\nint y =\
    \ 2;\nint z = 4;\nint x = y++ * ++z;  // x will be assigned the value 10, because\
    \ z will be\n// incremented from 4 to 5 BEFORE its value is used in the\n// multiplication\
    \ expression, whereas y will remain at 2 until\n// AFTER its value is used in\
    \ the multiplication expression.\n```\n\nAs you’ll see in a bit, the increment\
    \ and decrement operators are commonly used in conjunction with loops.\n\n###\
    \ Relational and Logical Operators\n\nA logical expression compares two (simple\
    \ or complex) expressions *exp1* and *exp2* in a specified way, resolving to a\
    \ `boolean` value of `true` or `false`.\n\nTo create logical expressions, Java\
    \ provides the relational operators shown in Table [2-3](#78624_3_En_2_Chapter.xhtml#Tab3).\n\
    \nTable 2-3  \nJava Relational Operators\n\n| Operator | Description |\n| ---\
    \ | --- |\n| *exp1* `==` *exp2* | `true` if *exp1* equals *exp2* (note the use\
    \ of a double equal sign for testing equality) |\n| *exp1* `>` *exp2* | `true`\
    \ if *exp1* is greater than *exp2* |\n| *exp1* `>=` *exp2* | `true` if *exp1*\
    \ is greater or equal to *exp2* |\n| *exp1* `<` *exp2* | `true` if *exp1* is less\
    \ than *exp2* |\n| *exp1* `<=` *exp2* | `true` if *exp1* is less than or equal\
    \ to *exp2* |\n| *exp1* `!=` *exp2* | `true` if *exp1* is not equal to *exp2*\
    \ (`!` is read as “not”) |\n\nIn addition to the relational operators, Java provides\
    \ logical operators that can be used to combine/modify logical expressions. The\
    \ most commonly used logical operators are listed in Table [2-4](#78624_3_En_2_Chapter.xhtml#Tab4).\n\
    \nTable 2-4  \nJava Logical Operators\n\n| Operator | Description |\n| --- | ---\
    \ |\n| *exp1* `&&` *exp2* | Logical “and”; compound expression is true only if\
    \ *both exp1 and exp2* are true. |\n| *exp1* `&#124;&#124;` *exp2* | Logical “or”;\
    \ compound expression is true if *either exp1 or exp2* is true. |\n| `!`*exp*\
    \ | Logical “not”; `true` if *exp* is false and `false` if *exp* is true. |\n\n\
    Here’s an example that uses the logical “and” operator to program the compound\
    \ logical expression “if x is greater than 2.0 and y is not equal to 4.0”:\n\n\
    ```\nif ((x > 2.0) && (y != 4.0)) { ... }\n```\n\nLogical expressions are most\
    \ commonly seen used with flow control structures, discussed later in this chapter."
  raw: '### Arithmetic Operators


    The Java language provides a number of basic arithmetic operators, as shown in
    Table [2-1](#78624_3_En_2_Chapter.xhtml#Tab1).


    Table 2-1


    Java Arithmetic Operators


    | Operator | Description |

    | --- | --- |

    | `+` | Addition |

    | `-` | Subtraction |

    | `*` | Multiplication |

    | `/` | Division |

    | `%` | Remainder (the remainder when the operand to the left of the `%` operator
    is divided by the operand to the right, for example, `10 % 3 = 1`, because 3 goes
    into 10 three times, leaving a remainder of 1) |


    The `+` and `-` operators can also be used as unary operators to indicate positive
    or negative numbers: `-3.7`, `+42`.


    In addition to the simple assignment operator, `=`, there are a number of specialized
    **compound assignment operators**, which combine variable assignment with an arithmetic
    operation, as shown in Table [2-2](#78624_3_En_2_Chapter.xhtml#Tab2).


    Table 2-2


    Java Compound Assignment Operators


    | Operator | Description |

    | --- | --- |

    | `+=` | `a += b` is equivalent to `a = a + b`. |

    | `-=` | `a -= b` is equivalent to `a = a - b`. |

    | `*=` | `a *= b` is equivalent to `a = a * b`. |

    | `/=` | `a /= b` is equivalent to `a = a / b`. |

    | `%=` | `a %= b` is equivalent to `a = a % b`. |


    The final two arithmetic operators that we’ll look at are the **unary increment**
    (`++`) and **decrement** (`--`) operators, which are used to increase or decrease
    the value of an `int` variable by 1 or of a floating-point (`float`, `double`)
    value by 1.0. They’re known as unary operators because they’re applied to a single
    variable, whereas binary operators combine the values of two expressions as discussed
    previously.


    The unary increment and decrement operators can also be applied to `char` variables
    to step forward or backward one character position in the Unicode sorting sequence.
    For example, in the following code snippet, the value of variable `c` will be
    incremented from ‘`e`’ to ‘`f`’:


    ```

    char c = ''e'';

    c++; // c will be incremented from ''e'' to ''f''.

    ```


    The increment and decrement operators can be used in either a **prefix** or **postfix**
    manner. If the operator is placed ***before*** the variable it’s operating on
    (***prefix*** mode), the increment or decrement of that variable is performed
    ***before*** the variable’s ***updated*** value is used in any assignments made
    via that statement. For example, consider the following code snippet, which uses
    the prefix increment (`++`) operator. Assume that `a` and `b` have previously
    been declared as `int` variables in our program:


    ```

    a = 1;

    b = ++a;

    ```


    After the preceding lines of code have executed, the value of variable `a` will
    be 2, as will the value of variable `b`. This is because, on the second line of
    code, the increment of variable `a` (from 1 to 2) occurs ***before*** the value
    of `a` is assigned to variable `b`. Thus, the single line of code


    ```

    b = ++a;

    ```


    is logically equivalent to the following ***two*** lines of code:


    ```

    a = a + 1;  // Increment a''s value first ...

    b = a;      // ... THEN use its value.

    ```


    On the other hand, if the increment/decrement operator is placed ***after*** the
    variable it’s operating on (***postfix*** mode), the increment or decrement occurs
    ***after*** the variable’s ***original*** value is used in any assignments made
    via that statement. Let’s look at the same code snippet with the increment operator
    written in a ***postfix*** manner:


    ```

    a = 1;

    b = a++;

    ```


    After the preceding lines of code have executed, the value of variable `b` will
    be 1, whereas the value of variable `a` will be 2\. This is because, on the second
    line of code, the increment of variable `a` (from 1 to 2) occurs ***after*** the
    value of `a` is assigned to variable `b`. Thus, the single line of code


    ```

    b = a++;

    ```


    is logically equivalent to the following ***two*** lines of code:


    ```

    b = a;      // Use a''s value first `...

    a = a + 1;  // ... THEN increment its value.

    ```


    Here’s a slightly more complex example; please read the accompanying comment to
    make sure that you can see how `x` will end up being assigned the value 10:


    ```

    int y = 2;

    int z = 4;

    int x = y++ * ++z;  // x will be assigned the value 10, because z will be

    // incremented from 4 to 5 BEFORE its value is used in the

    // multiplication expression, whereas y will remain at 2 until

    // AFTER its value is used in the multiplication expression.

    ```


    As you’ll see in a bit, the increment and decrement operators are commonly used
    in conjunction with loops.


    ### Relational and Logical Operators


    A **logical expression** compares two (simple or complex) expressions *exp1* and
    *exp2* in a specified way, resolving to a `boolean` value of `true` or `false`.


    To create logical expressions, Java provides the **relational operators** shown
    in Table [2-3](#78624_3_En_2_Chapter.xhtml#Tab3).


    Table 2-3


    Java Relational Operators


    | Operator | Description |

    | --- | --- |

    | *exp1* `==` *exp2* | `true` if *exp1* equals *exp2* (note the use of a ***double***
    equal sign for testing equality) |

    | *exp1* `>` *exp2* | `true` if *exp1* is greater than *exp2* |

    | *exp1* `>=` *exp2* | `true` if *exp1* is greater or equal to *exp2* |

    | *exp1* `<` *exp2* | `true` if *exp1* is less than *exp2* |

    | *exp1* `<=` *exp2* | `true` if *exp1* is less than or equal to *exp2* |

    | *exp1* `!=` *exp2* | `true` if *exp1* is not equal to *exp2* (`!` is read as
    “not”) |


    In addition to the relational operators, Java provides **logical operators** that
    can be used to combine/modify logical expressions. The most commonly used logical
    operators are listed in Table [2-4](#78624_3_En_2_Chapter.xhtml#Tab4).


    Table 2-4


    Java Logical Operators


    | Operator | Description |

    | --- | --- |

    | *exp1* `&&` *exp2* | Logical “and”; compound expression is true only if *both
    exp1 and exp2* are true. |

    | *exp1* `&#124;&#124;` *exp2* | Logical “or”; compound expression is true if
    *either exp1 or exp2* is true. |

    | `!`*exp* | Logical “not”; `true` if *exp* is false and `false` if *exp* is true.
    |


    Here’s an example that uses the logical “and” operator to program the compound
    logical expression “if x is greater than 2.0 and y is not equal to 4.0”:


    ```

    if ((x > 2.0) && (y != 4.0)) { ... }

    ```


    Logical expressions are most commonly seen used with flow control structures,
    discussed later in this chapter.'
