- fmt: '### `display()`


    As we did for `Person`, we choose to provide a `display` method for `Student`
    for use in testing our command-line version of the SRS. Because a `Student` is
    a `Person` and because we’ve already gone to the trouble of programming a `display`
    method for the attributes inherited from `Person`, we’ll reuse that method code
    by making use of the `super` keyword before going on to additionally display attribute
    values specific to a `Student` object:


    ```

    public void display() {

    // First, let''s display the generic Person info.

    super.display();

    // Then, display Student-specific info.

    System.out.println("Student-Specific Information:");

    System.out.println("\tMajor:  " + this.getMajor());

    System.out.println("\tDegree:  " + this.getDegree());

    this.displayCourseSchedule();

    this.printTranscript();

    // Finish with a blank line.

    System.out.println();

    }

    ```


    Note that we are calling two of the `Student` class’s other methods, `displayCourseSchedule`
    and `printTranscript`, from within the `Student`’s `display` method. We chose
    to program these as separate methods vs. incorporating their code into the body
    of the `display` method to keep the `display` method from getting too cluttered.


    ### `toString()`


    By extending an abstract class, as we are in deriving the `Student` subclass from
    `Person`, we implicitly agree to override any abstract method(s) specified by
    the parent class with concrete methods. In the case of the `Person` class, we
    have one such method, `toString`:


    ```

    // We are forced to program this method because it is specified

    // as an abstract method in our parent class (Person); failing to

    // do so would render the Student class abstract, as well.

    //

    // For a Student, we wish to return a String as follows:

    //

    //     Joe Blow (123-45-6789) [Master of Science - Math]

    public String toString() {

    return this.getName() + " (" + this.getSsn() + ") [" + this.getDegree() +

    " - " + this.getMajor() + "]";

    }

    ```


    ### `displayCourseSchedule()`


    The `displayCourseSchedule` method is a more complex example of delegation; we’ll
    defer a discussion of this method until we’ve discussed a few more of the SRS
    classes.


    ### `addSection()`


    When a `Student` enrolls in a `Section`, this method will be used to pass a reference
    to that `Section` to the `Student` object so that the `Section` reference may
    be stored in the `attends ArrayList`:


    ```

    public void addSection(Section s) {

    attends.add(s);

    }

    ```


    This is yet another example of delegation: the `Student` object is delegating
    the work of organizing `Section` references to its encapsulated collection.


    ### `dropSection()`


    When a `Student` withdraws from a `Section`, this method will be used to pass
    a reference to the “dropped” `Section` to the `Student` object. The `Student`
    object in turn delegates the work of removing the `Section` from the `attends
    ArrayList` by invoking its `remove` method:


    ```

    public void dropSection(Section s) {

    attends.remove(s);

    }

    ```


    ### `isEnrolledIn()`


    This method is used to determine whether a given `Student` is already enrolled
    in a particular `Section`—that is, whether that `Student`’s `attends` collection
    is already referring to the `Section` in question—by taking advantage of the `ArrayList`
    class’s `contains` method:


    ```

    // Determine whether the Student is already enrolled in THIS

    // EXACT Section.

    public boolean isEnrolledIn(Section s) {

    if (attends.contains(s)) return true;

    else return false;

    }

    ```


    As you can see, there is a lot of delegation going on within the `Student` class’s
    methods. The `ArrayList` that we’ve encapsulated as an attribute of `Student`
    does a lot of behind-the-scenes work for the `Student` object to which it belongs.


    ### `isCurrentlyEnrolledInSimilar()`


    Although not specified by our model, I’ve added another version of the `isEnrolledIn`
    method called `isCurrentlyEnrolledInSimilar`, because I found a need for such
    a method when coding the `Section` class (coming up later in this chapter). No
    matter how much thought you put into the object modeling stage of an OO software
    development project, you will inevitably determine the need for additional attributes
    and methods for your classes once coding is under way, because coding causes you
    to think at a very fine-grained level of detail about the “mechanics” of your
    application.


    Because this method is somewhat complex, the method code is shown in its entirety
    first, followed by an in-depth explanation:


    ```

    // Determine whether the Student is already enrolled in ANY

    // Section of this SAME Course.

    public boolean isCurrentlyEnrolledInSimilar(Section s1) {

    boolean foundMatch = false;

    Course c1 = s1.getRepresentedCourse();

    for (Section s2 : attends) {

    Course c2 = s2.getRepresentedCourse();

    if (c1 == c2) {

    // There is indeed a Section in the attends()

    // ArrayList representing the same Course.

    // Check to see if the Student is CURRENTLY

    // ENROLLED (i.e., whether or not he or she has

    // yet received a grade).  If there is no

    // grade, he/she is currently enrolled; if

    // there is a grade, then he/she completed

    // the course sometime in the past.

    if (s2.getGrade(this) == null) {

    // No grade was assigned!  This means

    // that the Student is currently

    // enrolled in a Section of this

    // same Course.

    foundMatch = true;

    break;

    }

    }

    }

    return foundMatch;

    }

    ```


