    \n*   当你学习如何在第二部分中对问题进行建模时，这些概念将得到进一步巩固。\n*   当你学习如何在第三部分中将模型转换为 Java 代码时，它们将再次得到巩固。\n\
    \n在本章中，你学到了：\n\n*   不同的对象能够以不同的类特定方式响应完全相同的消息，这得益于一种称为***多态***的面向对象语言特性。\n*  \
    \ 如果你希望在一组（派生）类中规定共同的行为，但又不想深入探讨这些行为***如何***执行的具体细节，那么***抽象类***非常有用。也就是说，你指定了对象必须能够执行***什么***服务——即对象必须能够响应的消息，这些消息由方法头定义——而无需编写方法体。\n\
    *   ***接口***是一种更抽象的规定行为的方式，因为它们只能声明抽象方法（和常量）。\n*   通过实现多个接口，一个对象类可以在应用程序中扮演多个角色。\n\
    *   在声明属性、方法返回类型和方法参数时使用接口类型，可以使自定义类更加通用，并且更能适应需求变化。\n*   ***静态变量***可用于让整个对象类共享数据，并且可以通过***静态方法***在类级别上操作，而不是在该类的特定对象/实例上操作。\n\
    *   我们可以利用静态方法以及 `public static final` 变量来创建***自定义工具类***。\n\n回顾本书引言中的房屋建造示例，你现在已经了解了“蓝星”（对象）的独特属性以及它们为何是优越的建筑材料。但你仍然需要学习如何绘制蓝图，以便在构建应用程序时有效地使用它们——你将在第二部分中学习如何做到这一点。\n\
    \n## 练习\n\n| 抽象类 抽象方法 抽象 访问器方法 聚合 祖先类 属性签名 关联 属性 行为关系 二元关联 类 类层次结构 分类 客户端代码 集合\
    \ 集合框架 复合类 具体类 构造函数 委托 字典（集合类型） 封装 最终变量 | 泛化 “获取”方法 句柄 已实现方法 信息隐藏 继承 实例 实例化 接口\
    \ 局部变量 链接 消息 方法 方法头 方法签名 建模 多重继承 多重性 对象（软件意义上的） 操作 有序列表 重载 重写 | 多态 预定义类型 原始类型\
    \ 私有访问权限 受保护访问权限 公有访问权限 引用类型 引用变量 根（类层次结构的） 服务 集合（集合类型） “设置”方法 兄弟类 特化 （对象的）状态\
    \ 静态属性 静态方法 静态变量 子类 超类 用户定义类型 |\n\n1.  自我测试。浏览以下面向对象术语列表——有些是正式的，有些是非正式的——看看你是否能用自己的话定义每个术语，而无需参考正文：\n\
    \n1.  哪些属于 SRS 类的属性适合声明为静态？\n\n2.  哪些属于处方跟踪系统类（如附录所述）的属性适合声明为静态？\n\n3.  有人认为，Java\
    \ 语言中实现多个接口的能力消除了对多重继承支持的需求。你同意还是不同意？为什么？你能想到实现多个接口与真正的多重继承相比有哪些“不足之处”吗？\n\n4.\
    \  以下客户端代码场景会导致编译错误。你能解释每种情况下的原因吗？尝试***不***编译代码来回答这个问题。尽可能精确地说明原因——它们可能不像乍看起来那么明显！\n\
    \n假设 `Professor` 和 `Student` 都是实现了 `Teacher` 接口的类。\n\n场景 #1：\n\n```\nProfessor\
    \ p;\nStudent s = new Student();\nTeacher t;\nt = s;\np = t;\n```\n\n场景 #2：\n\n\
    1.  [*编码*] 通过编写 `Professor`、`Student` 和 `Teacher` 类型的简单版本以及一个包含客户端代码的主类/方法来测试你对练习\
    \ 5 的答案。\n\n```\nProfessor p = new Professor();\nStudent s;\nTeacher t = new Student();\n\
    s = t;\n```\n\n# 第二部分 对象建模 101\n\n# 8. 对象建模过程简述\n\n对象建模的“宏观”目标 建模方法论 = 过程 + 符号\
    \ + 工具 我推荐的对象建模过程简述 关于对象建模软件工具的思考 提醒 总结\n\n让我们看看在本书引言中遇到的那位房屋建造者。他们刚刚参加完一个题为“蓝星：建筑师的梦想成真”的研讨会回来。他们现在了解了蓝星的独特属性，并明白了为什么它们是优越的建筑材料——就像你了解了软件对象作为应用程序“建筑材料”的独特属性一样。但他们仍然缺乏在实际建筑项目中使用蓝星的经验；特别是，他们还不知道如何为一座要用蓝星建造的房屋制定合适的蓝图。而我们仍然需要了解如何为将要由对象构建的软件系统制定“蓝图”。这正是本书第二部分的重点。\n\
    \n在本章中，你将学习：\n\n*   对象建模的目标和理念\n*   我们在选择或设计建模方法论方面有多大的灵活性\n*   对象建模软件工具的优缺点\n\
    \n## 对象建模的“宏观”目标\n\n我们在对象建模中的目标是，为将要自动化的系统呈现一个精确、简洁、易于理解的面向对象模型，即“蓝图”。这个模型将作为一种重要的沟通工具：\n\
    \n*   ***对于我们将要构建的系统的未来用户而言，对象模型传达了我们对其需求的理解***。让用户审查并批准该模型将确保我们在项目开始时走上正轨，因为在需求分析阶段的一个判断错误，其修复成本可能比在系统还只是“用户眼中的一道微光”时发现并纠正这种误解要高出几个数量级。\n\
    \n*   ***对于软件开发团队而言，对象模型传达了为了满足这些需求而需要构建的软件的结构和功能***。这不仅有利于软件工程师本人，也有利于负责质量保证、测试和文档的人员。\n\
    \n*   在应用程序投入运行很久之后，对象模型作为“原理图”继续存在，***帮助众多负责支持和维护应用程序的人员理解其结构和功能***。\n\n    当然，最后一点只有在对象模型准确反映系统实际构建方式（而不仅仅是最初设想的方式）时才成立。复杂系统的设计在构建过程中不可避免地会发生变化，因此在系统构建过程中应注意保持对象模型的最新状态。\n"
- fmt: '### Modeling Methodology = Process + Notation + Tool


    According to Webster’s Dictionary, a **methodology** is


    *A set of systematic procedures used by a discipline [to achieve a particular
    desired outcome].*


    A modeling methodology, OO or otherwise, ideally involves three components:


    - ***A process***: The “how to” steps for gathering the requirements and determining
    the abstraction to be modeled

    - ***A notation***: A graphical “language” for communicating the model

    - ***A tool***: An automated way of rendering the notation, typically in “drag-and-drop”
    fashion


    Although these constitute the ideal components of a modeling methodology, they
    are not all of equal importance:


    - Adhering to a sound ***process*** is certainly critical.

    - However, we can sometimes get by with a narrative text description of an abstraction
    without having to resort to portraying it with formal graphical ***notation***.

    - And, when we ***do*** choose to depict an abstraction formally via a graphical
    notation, it isn’t mandatory that we use a specialized ***tool*** for doing so.


    In other words, following an organized process is the most critical aspect of
    object modeling; using a particular notation is important, but less so; and our
    choice of a particular tool for rendering the model is the least important aspect
    of the three (see Figure [8-1](#78624_3_En_8_Chapter.xhtml#Fig1)).


    ![](images/78624_3_En_8_Chapter/78624_3_En_8_Fig1_HTML.jpg)


    A text reads process plus notation plus tool in different font styles and sizes
    in decreasing order.


    **Figure 8-1** Of the three aspects of a methodology, a sound process is by far
    the most important


    Many important contributions in the form of new processes, notations, and tools
    have been made in the OO methodology arena over the years by numerous well-known
    methodologists. In some sense, if you’re just getting into objects for the first
    time now, you’re fortunate, because you managed to avoid the “methodology wars”
    that raged for many years as methodologists and their followers argued about what
    were in some cases esoteric details.


    Here is a partial list of contributions made in the object methodology arena over
    the past few decades; the list is in no particular order:


    - ***James Rumbaugh et al.***: The Object Modeling Technique (OMT)

    - ***Grady Booch***: The Booch Method

    - ***Sally Shlaer and Stephen Mellor***: Emphasis on state diagrams

    - ***Rebecca Wirfs-Brock et al.***: Responsibility-driven design, Class-Responsibilities-Collaborators
    (CRC) cards

    - ***Bertrand Meyer***: The Eiffel programming language, the notion of programming
    by contract

    - ***James Martin and James Odell***: Retooling of their functional decomposition
    methodologies for use with OO systems

    - ***Peter Coad and Edward Yourdon***: As in the preceding entry

    - ***Ivar Jacobson***: Use cases as a means of formalizing requirements

    - ***Derek Coleman et al. (HP)***: The Fusion Method

    - ***Erich Gamma, Richard Helm, Ralph Johnson, and John Vlissides (the “Gang of
    Four”)***: Design pattern reuse


    In recent years, there was a major push in the industry to meld the best ideas
    of competing methodologies into a single approach, with particular emphasis placed
    on coming up with a universal modeling notation. The resultant notation, known
    as the **Unified Modeling Language** (**UML**), represents the collaborative efforts
    of three of the leaders in the OO methodology field—James Rumbaugh, Grady Booch,
    and Ivar Jacobson—and has become the industry-standard object modeling notation.
    (You’ll learn the basics of UML in Chapters [10](#78624_3_En_10_Chapter.xhtml)
    and [11](#78624_3_En_11_Chapter.xhtml).)


    Along with UML, these three gentlemen—known affectionately in the industry as
    the “Three Amigos”—have also contributed heavily to the evolution of an overall
    methodology known as the **Rational Unified Process** (**RUP**), a full-blown
    software development methodology encompassing modeling, project management, and
    configuration management workflows. But I’m not going to dwell on the details
    of this particular methodology in this book, because it isn’t my intention to
    teach you any one ***specific*** methodology in great detail. By learning a sound,
    ***generic*** process for object modeling, you’ll be armed with the knowledge
    you need to read about, evaluate, and select a specific methodology such as RUP
    or to craft your own hybrid approach by mixing and matching the processes, notations,
    and tool(s) from various methodologies that make the most sense for your organization.


    As for modeling tools, you don’t need one, strictly speaking, to appreciate the
    material presented in this book. But I’ve anticipated that you’ll likely want
    to get your “hands dirty” with a modeling tool. Because of this, I include a general
    discussion of modeling tool pros and cons a bit later in this chapter.


    It’s important to keep in mind that a methodology is but a means to an end, and
    it’s the ***end***—a usable, flexible, maintainable, reliable, and functionally
    correct software system, along with thorough, clear supporting documentation—that
    we care most about when all is said and done.


    To help illustrate this point, let’s use a simple analogy. Say that our goal is
    to cheer people up. We decide to hand-draw (process) a smiley face (an abstraction
    of the desired behavior, rendered with a graphical notation) with a pencil (tool),
    as shown in Figure [8-2](#78624_3_En_8_Chapter.xhtml#Fig2).


    ![](images/78624_3_En_8_Chapter/78624_3_En_8_Fig2_HTML.jpg)


    A diagram of a smiley with a hand holding a pencil above. They have the labels
    notation and abstraction, process, and tool, respectively.


    **Figure 8-2** A methodology encompasses process, notation, and tools


    After we’re done, we put our paintbrush away, hang our smiley face picture on
    the wall, and go about our business. A few days go by, and we note that people
    are indeed cheered up by our picture, and so our original goal has been achieved.
    In hindsight, we could have accomplished this same goal using


    - A variety of “processes”—hand drawing, rubber stamping, cutting pictures from
    a magazine

    - A variety of “notations”—the graphical notation of a smiley face or a cartoon
    or the narrative text of a joke or sign

    - A variety of “tools”—a pen, a pencil, a paintbrush, a crayon


    Now, back to our homebuilding analogy. Long after the architect and construction
    crew have left a building site, taking their equipment and tools with them, the
    house that they have built will remain standing as a testimonial to the quality
    of the materials they used, how sound a construction approach they employed, and
    how elegant a blueprint they had to start with. The blueprint will come in handy
    later on when the time comes to remodel or maintain the home, so we certainly
    won’t throw it away; but the “livability” and ease/affordability of maintaining
    the home will be the primary measure of success.


    The same is true for software development: the real legacy of a software development
    project is the resultant software system, which is, after all, the reason for
    using a methodology to produce a model in the first place. We must take care to
    avoid getting so caught up in debating the relative merits of one methodology
    vs. another that we fail to produce useful software. As you can see in Figure
    [8-3](#78624_3_En_8_Chapter.xhtml#Fig3), there are ***many*** paths to the same
    destination.


    ![](images/78624_3_En_8_Chapter/78624_3_En_8_Fig3_HTML.png)


    An illustration of different paths to reach the finish line reads different combinations
    of processes, notations, and tools can all lead us to the same goal. It has an
    arrow signboard of, to our goal.


    **Figure 8-3** Many different approaches can serve us well when building software'
