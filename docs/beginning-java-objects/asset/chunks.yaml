- fmt: "### Another Form of the “Is A” Relationship\n\nYou learned in Chapter [5](#78624_3_En_5_Chapter.xhtml)\
    \ that inheritance is often referred to as the “is a” relationship. As it turns\
    \ out, implementing an interface is another form of “is a” relationship; that\
    \ is:\n\n- If the `Professor` class **extends** the `Person` **class**, then a\
    \ `Professor` **is a** `Person`.\n- If the `Professor` class **implements** the\
    \ `Teacher` **interface**, then a `Professor` **is a** `Teacher`.\n\nWhen a class\
    \ A implements an interface X, all of the classes that are subsequently derived\
    \ from A may also be said to implement that same interface X. For example, if\
    \ we derive a class called `AdjunctProfessor` from `Professor`, then since `Professor`\
    \ implements the `Teacher` interface, an `AdjunctProfessor` is a `Teacher`, as\
    \ well:\n\n```\npublic class Professor implements Teacher {\n    // Attribute\
    \ details omitted.\n    // The Professor class must implement all four of the\
    \ methods called for by\n    // the Teacher interface.\n    public boolean agreeToTeach(Course\
    \ c) { ... }\n    public void designateTextbook(TextBook b, Course c) { ... }\n\
    \    public Syllabus defineSyllabus(Course c) { ... }\n    public boolean approveEnrollment(Student\
    \ s, Course c) { ... }\n    // Other details omitted.\n}\n// Even though AdjunctProfessor\
    \ isn't explicitly declared to implement Teacher,\n// it does so IMPLICITLY, because\
    \ it inherits all of a Teacher's behaviors from\n// the Professor class.\npublic\
    \ class AdjunctProfessor extends Professor { ... }\n```\n\nThis makes intuitive\
    \ sense, because `AdjunctProfessor` will either inherit all of the methods called\
    \ for by the `Teacher` interface from `Professor` as is or optionally override\
    \ one or more of them. Either way, an `AdjunctProfessor` will be “equipped” to\
    \ perform **all** of the services required to serve in the role of a `Teacher`\
    \ on behalf of an application:\n\n- Agree to teach a particular course.\n- Designate\
    \ a textbook to be used for the course.\n- Define a syllabus for the course.\n\
    - Approve the enrollment of a particular student in the course.\n\nRecall that\
    \ this is the **precise** purpose for having declared the `Teacher` interface\
    \ in the first place: to define a behavioral role in an application. So, even\
    \ though `AdjunctProfessor` isn’t explicitly declared to implement `Teacher`,\
    \ it does so **implicitly**.\n\n### Interfaces and Casting\n\nNote that the compiler\
    \ is perfectly happy for us to assign a `Professor` object to a `Teacher` reference\
    \ variable:\n\n```\nTeacher t = new Professor();\n```\n\nbecause the compiler\
    \ generally allows assignments to occur if the type of the expression to the right\
    \ of the equal sign (`=`) is a type that is compatible with the variable to the\
    \ left of the equal sign. Since `Professor` **implements** `Teacher`, a `Professor`\
    \ **is a** `Teacher`, and so this assignment is permitted.\n\nThe opposite is\
    \ **not** permitted, however: we cannot directly assign a `Teacher` reference\
    \ to a `Professor` reference variable, because not all `Teacher`s are necessarily\
    \ `Professor`s—many different classes can implement the same interface. For example,\
    \ assuming that both the `Student` and `Professor` classes implement the `Teacher`\
    \ interface, the last line of the following code will generate a compiler error:\n\
    \n```\nProfessor p = new Professor();\nStudent s = new Student();\nTeacher t;\n\
    // Details omitted.\n// The compiler won't allow this.\np = t;\n```\n\nHere’s\
    \ the compiler error:\n\n```\nincompatible types\nfound:    Teacher\nrequired:\
    \ Professor\np = t;\n^\n```\n\nHowever, if we know that `t` will be referring\
    \ to an object of an appropriate type at run time, we may **force** such an assignment\
    \ to occur through use of a cast. Recall from Chapter [2](#78624_3_En_2_Chapter.xhtml)\
    \ that we use casting to convince the compiler that an assignment should occur\
    \ even though precision is lost in doing so (e.g., when assigning a `double` value\
    \ to an `int` variable):\n\n```\nint x;\ndouble y;\n// Cast the double value into\
    \ an int before assigning it to x.\nx = (int) y;\n```\n\nRecall that this was\
    \ referred to as a **narrowing conversion**. In a sense, attempting to assign\
    \ a `Teacher` reference to a `Professor` reference variable is also a narrowing\
    \ conversion: we’re trying to narrow down all of the possible types of object\
    \ that a `Teacher` variable could possibly be referencing at run time to a **single**\
    \ type, `Professor`. In the preceding example, since both the `Professor` and\
    \ `Student` classes implement the `Teacher` interface, `t` could, at run time,\
    \ be referring to a `Student` object or a `Professor` object, as illustrated in\
    \ Figure [7-2](#78624_3_En_7_Chapter.xhtml#Fig2).\n\n![](images/78624_3_En_7_Chapter/78624_3_En_7_Fig2_HTML.jpg)\n\
    \n**Figure 7-2** – A `Teacher` reference variable can refer to multiple types\
    \ of object at run time\n\nHowever, if we **know** that, based on the way we’ve\
    \ written our code, `t` will be referring to a `Professor` object at run time,\
    \ we may force the assignment through the use of a cast as follows:\n\n```\nProfessor\
    \ p1 = new Professor();\nTeacher t;\n// We assign a Professor reference to t.\n\
    t = p1;\n// Details omitted.\n// Later in our application, we are confident that\
    \ t is still referring\n// to the same Professor, and so we assign t to p2 by\
    \ using a cast.\nProfessor p2 = (Professor) t;\n```\n\nThe resultant situation\
    \ in memory is depicted in Figure [7-3](#78624_3_En_7_Chapter.xhtml#Fig3). Our\
    \ use of a cast on the last line of code:\n\n```\nProfessor p2 = (Professor) t;\n\
    ```\n\nis effectively telling the compiler “Trust me, I know that `t` will be\
    \ referring to a `Professor` object at run time, so doing this assignment makes\
    \ sense.”\n\n![](images/78624_3_En_7_Chapter/78624_3_En_7_Fig3_HTML.jpg)\n\n**Figure\
    \ 7-3** – Because `t` refers to a `Professor` object at run time, we force an\
    \ assignment of `t` to `p2` via a cast\n\nIf we force a cast, but we’re **wrong**—that\
    \ is, if the run-time type of `t` is **not** compatible with the `Professor` type—then\
    \ we’ll get a `ClassCastException` type of error at run time. (We’ll talk about\
    \ how to deal with such an error, a technique known as **exception handling**,\
    \ in Chapter [13](#78624_3_En_13_Chapter.xhtml).) Returning to our previous example,\
    \ let’s change the code a bit so that a cast would be inappropriate:\n\n```\n\
    // We instantiate both a Professor and a Student object; recall that\n// in this\
    \ example, both classes implement the Teacher interface.\nProfessor p = new Professor();\n\
    Student s = new Student();\nTeacher t;\n// We assign a Student reference to t.\
    \  This is permitted, because a Student\n// is a Teacher.\nt = s;\n// Details\
    \ omitted ...\n// Later on, we mistakenly try to cast t as a Professor, but t\
    \ is really\n// referring to a Student.\np = (Professor) t;\n```\n\nThe last line\
    \ of code will compile, because the compiler trusts that we know what we are doing,\
    \ but since the actual situation at run time is as depicted in Figure [7-4](#78624_3_En_7_Chapter.xhtml#Fig4),\
    \ such a cast is **invalid**—there’s no way to transform a `Student` into a `Professor`\
    \ object at run time—and so we get the following error message when **executing**\
    \ this code:\n\n![](images/78624_3_En_7_Chapter/78624_3_En_7_Fig4_HTML.jpg)\n\n\
    **Figure 7-4** – A `ClassCastException` arises at run time when trying to refer\
    \ to a `Student` object as a `Professor`\n\n```\nException in thread \"main\"\
    \ java.lang.ClassCastException: Student\n    at classname.main(classname.java:line#)\n\
    ```\n\nWe’ll revisit the use of casts with object references later in this chapter\
    \ and again in Chapter [13](#78624_3_En_13_Chapter.xhtml)."
  raw: '### Another Form of the “Is A” Relationship


    You learned in Chapter [5](#78624_3_En_5_Chapter.xhtml) that inheritance is often
    referred to as the “is a” relationship. As it turns out, implementing an interface
    is another form of “is a” relationship; that is


    *   If the `Professor` class ***extends*** the `Person` ***class***, then a `Professor`
    ***is a*** `Person`.


    *   If the `Professor` class ***implements*** the `Teacher` ***interface***, then
    a `Professor` ***is a*** `Teacher`.


    When a class A implements an interface X, all of the classes that are subsequently
    derived from A may also be said to implement that same interface X. For example,
    if we derive a class called `AdjunctProfessor` from `Professor`, then since `Professor`
    implements the `Teacher` interface, an `AdjunctProfessor` is a `Teacher`, as well:


    ```

    public class Professor implements Teacher {

    // Attribute details omitted.

    // The Professor class must implement all four of the methods called for by

    // the Teacher interface.

    public boolean agreeToTeach(Course c) { ... }

    public void designateTextbook(TextBook b, Course c) { ... }

    public Syllabus defineSyllabus(Course c) { ... }

    public boolean approveEnrollment(Student s, Course c) { ... }

    // Other details omitted.

    }

    // Even though AdjunctProfessor isn''t explicitly declared to implement Teacher,

    // it does so IMPLICITLY, because it inherits all of a Teacher''s behaviors from

    // the Professor class.

    public class AdjunctProfessor extends Professor { ... }

    ```


    This makes intuitive sense, because `AdjunctProfessor` will either inherit all
    of the methods called for by the `Teacher` interface from `Professor` as is or
    optionally override one or more of them. Either way, an `AdjunctProfessor` will
    be “equipped” to perform ***all*** of the services required to serve in the role
    of a `Teacher` on behalf of an application:


    *   Agree to teach a particular course.


    *   Designate a textbook to be used for the course.


    *   Define a syllabus for the course.


    *   Approve the enrollment of a particular student in the course.


    Recall that this is the ***precise*** purpose for having declared the `Teacher`
    interface in the first place: to define a behavioral role in an application. So,
    even though `AdjunctProfessor` isn’t explicitly declared to implement `Teacher`,
    it does so ***implicitly***.


    ### Interfaces and Casting


    Note that the compiler is perfectly happy for us to assign a `Professor` object
    to a `Teacher` reference variable


    ```

    Teacher t = new Professor();

    ```


    because the compiler generally allows assignments to occur if the type of the
    expression to the right of the equal sign (`=`) is a type that is compatible with
    the variable to the left of the equal sign. Since `Professor` ***implements***
    `Teacher`, a `Professor` ***is a*** `Teacher`, and so this assignment is permitted.


    The opposite is ***not*** permitted, however: we cannot directly assign a `Teacher`
    reference to a `Professor` reference variable, because not all `Teacher`s are
    necessarily `Professor`s—many different classes can implement the same interface.
    For example, assuming that both the `Student` and `Professor` classes implement
    the `Teacher` interface, the last line of the following code will generate a compiler
    error:


    ```

    Professor p = new Professor();

    Student s = new Student();

    Teacher t;

    // Details omitted.

    // The compiler won''t allow this.

    p = t;

    ```


    Here’s the compiler error:


    ```

    incompatible types

    found:    Teacher

    required: Professor

    p = t;

    ^

    ```


    However, if we know that `t` will be referring to an object of an appropriate
    type at run time, we may ***force*** such an assignment to occur through use of
    a cast. Recall from Chapter [2](#78624_3_En_2_Chapter.xhtml) that we use casting
    to convince the compiler that an assignment should occur even though precision
    is lost in doing so (e.g., when assigning a `double` value to an `int` variable):


    ```

    int x;

    double y;

    // Cast the double value into an int before assigning it to x.

    x = (int) y;

    ```


    Recall that this was referred to as a ***narrowing conversion***. In a sense,
    attempting to assign a `Teacher` reference to a `Professor` reference variable
    is also a narrowing conversion: we’re trying to narrow down all of the possible
    types of object that a `Teacher` variable could possibly be referencing at run
    time to a ***single*** type, `Professor`. In the preceding example, since both
    the `Professor` and `Student` classes implement the `Teacher` interface, `t` could,
    at run time, be referring to a `Student` object or a `Professor` object, as illustrated
    in Figure [7-2](#78624_3_En_7_Chapter.xhtml#Fig2).


    ![](images/78624_3_En_7_Chapter/78624_3_En_7_Fig2_HTML.jpg)


    A diagram of 2 balloons labeled professor and student objects with teacher reference
    variable t strings.


    Figure 7-2


    A `Teacher` reference variable can refer to multiple types of object at run time


    However, if we ***know*** that, based on the way we’ve written our code, `t` will
    be referring to a `Professor` object at run time, we may force the assignment
    through the use of a cast as follows:


    ```

    Professor p1 = new Professor();

    Teacher t;

    // We assign a Professor reference to t.

    t = p1;

    // Details omitted.

    // Later in our application, we are confident that t is still referring

    // to the same Professor, and so we assign t to p2 by using a cast.

    Professor p2 = (Professor) t;

    ```


    The resultant situation in memory is depicted in Figure [7-3](#78624_3_En_7_Chapter.xhtml#Fig3).
    Our use of a cast on the last line of code


    ```

    Professor p2 = (Professor) t;

    ```


    is effectively telling the compiler “Trust me, I know that `t` will be referring
    to a `Professor` object at run time, so doing this assignment makes sense.”


    ![](images/78624_3_En_7_Chapter/78624_3_En_7_Fig3_HTML.jpg)


    A diagram of a professor object balloon has 3 strings professor p 1, professor
    p 2, and teacher t.


    Figure 7-3


    Because `t` refers to a `Professor` object at run time, we force an assignment
    of `t` to `p2` via a cast


    If we force a cast, but we’re ***wrong***—that is, if the run-time type of `t`
    is ***not*** compatible with the `Professor` type—then we’ll get a `ClassCastException`
    type of error at run time. (We’ll talk about how to deal with such an error, a
    technique known as ***exception handling***, in Chapter [13](#78624_3_En_13_Chapter.xhtml).)
    Returning to our previous example, let’s change the code a bit so that a cast
    would be inappropriate:


    ```

    // We instantiate both a Professor and a Student object; recall that

    // in this example, both classes implement the Teacher interface.

    Professor p = new Professor();

    Student s = new Student();

    Teacher t;

    // We assign a Student reference to t.  This is permitted, because a Student

    // is a Teacher.

    t = s;

    // Details omitted ...

    // Later on, we mistakenly try to cast t as a Professor, but t is really

    // referring to a Student.

    p = (Professor) t;

    ```


    The last line of code will compile, because the compiler trusts that we know what
    we are doing, but since the actual situation at run time is as depicted in Figure
    [7-4](#78624_3_En_7_Chapter.xhtml#Fig4), such a cast is ***invalid***—there’s
    no way to transform a `Student` into a `Professor` object at run time—and so we
    get the following error message when ***executing*** this code:


    ![](images/78624_3_En_7_Chapter/78624_3_En_7_Fig4_HTML.jpg)


    A diagram of student object and professor object balloons. Student object has
    2 reference strings s and t, and professor object has a reference string p and
    class cast exception t.


    Figure 7-4


    A `ClassCastException` arises at run time when trying to refer to a `Student`
    object as a `Professor`


    ```

    Exception in thread "main" java.lang.ClassCastException: Student

    at classname.main(classname.java:line#)

    ```


    We’ll revisit the use of casts with object references later in this chapter and
    again in Chapter [13](#78624_3_En_13_Chapter.xhtml).'
  trans: "\n### “是一个”关系的另一种形式\n\n你在第 5 章已经学到，继承通常被称为“是一个”关系。事实证明，实现接口是“是一个”关系的另一种形式，即：\n\
    \n*   如果 `Professor` 类***继承***了 `Person` ***类***，那么 `Professor` ***是一个*** `Person`。\n\
    *   如果 `Professor` 类***实现***了 `Teacher` ***接口***，那么 `Professor` ***是一个*** `Teacher`。\n\
    \n当一个类 A 实现了接口 X 时，所有随后从 A 派生的类也可以说实现了同一个接口 X。例如，如果我们从 `Professor` 派生一个名为 `AdjunctProfessor`\
    \ 的类，那么由于 `Professor` 实现了 `Teacher` 接口，`AdjunctProfessor` 也是一个 `Teacher`：\n\n\
    ```\npublic class Professor implements Teacher {\n    // 属性细节省略。\n    // Professor\
    \ 类必须实现 Teacher 接口要求的所有四个方法。\n    public boolean agreeToTeach(Course c) { ...\
    \ }\n    public void designateTextbook(TextBook b, Course c) { ... }\n    public\
    \ Syllabus defineSyllabus(Course c) { ... }\n    public boolean approveEnrollment(Student\
    \ s, Course c) { ... }\n    // 其他细节省略。\n}\n// 尽管 AdjunctProfessor 没有显式声明实现 Teacher，\n\
    // 但它隐式地实现了，因为它从 Professor 类继承了 Teacher 的所有行为。\npublic class AdjunctProfessor\
    \ extends Professor { ... }\n```\n\n这在直觉上是合理的，因为 `AdjunctProfessor` 要么按原样从 `Professor`\
    \ 继承 `Teacher` 接口要求的所有方法，要么选择性地覆盖其中一或多个方法。无论哪种方式，`AdjunctProfessor` 都将“具备”执行代表应用程序担任\
    \ `Teacher` 角色所需的***所有***服务的能力：\n\n*   同意教授特定课程。\n*   指定课程使用的教科书。\n*   定义课程的教学大纲。\n\
    *   批准特定学生注册该课程。\n\n回想一下，这正是一开始声明 `Teacher` 接口的***确切***目的：在应用程序中定义一个行为角色。因此，即使\
    \ `AdjunctProfessor` 没有显式声明实现 `Teacher`，它也会***隐式地***实现。\n\n### 接口与类型转换\n\n请注意，编译器完全允许我们将\
    \ `Professor` 对象赋值给 `Teacher` 引用变量：\n\n```\nTeacher t = new Professor();\n```\n\
    \n因为如果等号（`=`）右侧表达式的类型与等号左侧的变量兼容，编译器通常允许进行赋值。由于 `Professor` ***实现***了 `Teacher`，`Professor`\
    \ ***是一个*** `Teacher`，因此允许此赋值。\n\n然而，相反的情况是***不允许***的：我们不能直接将 `Teacher` 引用赋值给\
    \ `Professor` 引用变量，因为并非所有 `Teacher` 都一定是 `Professor`——许多不同的类可以实现同一个接口。例如，假设 `Student`\
    \ 和 `Professor` 类都实现了 `Teacher` 接口，以下代码的最后一行将产生编译器错误：\n\n```\nProfessor p = new\
    \ Professor();\nStudent s = new Student();\nTeacher t;\n// 细节省略。\n// 编译器不允许这样做。\n\
    p = t;\n```\n\n以下是编译器错误信息：\n\n```\nincompatible types\nfound:    Teacher\nrequired:\
    \ Professor\np = t;\n^\n```\n\n然而，如果我们知道 `t` 在运行时将引用一个适当类型的对象，我们可以通过使用类型转换来***强制***进行这样的赋值。回想一下第\
    \ 2 章，我们使用类型转换来说服编译器应该进行赋值，即使这样做会损失精度（例如，将 `double` 值赋值给 `int` 变量时）：\n\n```\n\
    int x;\ndouble y;\n// 在将 double 值赋值给 x 之前，将其转换为 int。\nx = (int) y;\n```\n\n回想一下，这被称为***窄化转换***。从某种意义上说，尝试将\
    \ `Teacher` 引用赋值给 `Professor` 引用变量也是一种窄化转换：我们试图将 `Teacher` 变量在运行时可能引用的所有对象类型缩小到***单一***类型\
    \ `Professor`。在前面的例子中，由于 `Professor` 和 `Student` 类都实现了 `Teacher` 接口，`t` 在运行时可能引用\
    \ `Student` 对象或 `Professor` 对象，如图 7-2 所示。\n\n![](img/78624_3_En_7_Fig2_HTML.jpg)\n\
    \n一个包含两个气球的图表，分别标记为 professor 和 student 对象，并带有 Teacher 引用变量 t 的字符串。\n\n图 7-2\n\
    \n一个 `Teacher` 引用变量在运行时可以引用多种类型的对象\n\n然而，如果我们***知道***，根据我们编写代码的方式，`t` 在运行时将引用一个\
    \ `Professor` 对象，我们可以通过使用类型转换来强制进行赋值，如下所示：\n\n```\nProfessor p1 = new Professor();\n\
    Teacher t;\n// 我们将 Professor 引用赋值给 t。\nt = p1;\n// 细节省略。\n// 稍后在应用程序中，我们确信 t 仍然引用同一个\
    \ Professor，\n// 因此我们通过使用类型转换将 t 赋值给 p2。\nProfessor p2 = (Professor) t;\n```\n\
    \n内存中的最终情况如图 7-3 所示。我们在最后一行代码中使用类型转换：\n\n```\nProfessor p2 = (Professor) t;\n\
    ```\n\n实际上是在告诉编译器：“相信我，我知道 `t` 在运行时将引用一个 `Professor` 对象，所以进行这个赋值是有意义的。”\n\n![](img/78624_3_En_7_Fig3_HTML.jpg)\n\
    \n一个 professor 对象气球有三条字符串：professor p 1、professor p 2 和 teacher t。\n\n图 7-3\n\n\
    因为 `t` 在运行时引用一个 `Professor` 对象，我们通过类型转换强制将 `t` 赋值给 `p2`\n\n如果我们强制进行类型转换，但我们是***错误***的——也就是说，如果\
    \ `t` 的运行时类型与 `Professor` 类型***不***兼容——那么我们在运行时将得到一个 `ClassCastException` 类型的错误。（我们将在第\
    \ 13 章讨论如何处理此类错误，这种技术称为***异常处理***。）回到之前的例子，让我们稍微修改代码，使类型转换变得不合适：\n\n```\n// 我们实例化了一个\
    \ Professor 对象和一个 Student 对象；回想一下，\n// 在这个例子中，两个类都实现了 Teacher 接口。\nProfessor p\
    \ = new Professor();\nStudent s = new Student();\nTeacher t;\n// 我们将 Student 引用赋值给\
    \ t。这是允许的，因为 Student\n// 是一个 Teacher。\nt = s;\n// 细节省略 ...\n// 稍后，我们错误地尝试将 t 转换为\
    \ Professor，但 t 实际上\n// 引用的是一个 Student。\np = (Professor) t;\n```\n\n最后一行代码会编译通过，因为编译器相信我们知道自己在做什么，但由于运行时的实际情况如图\
    \ 7-4 所示，这样的类型转换是***无效***的——在运行时无法将 `Student` 转换为 `Professor` 对象——因此我们在***执行***此代码时会得到以下错误信息：\n\
    \n![](img/78624_3_En_7_Fig4_HTML.jpg)\n\n一个 student 对象和 professor 对象的气球图。Student\
    \ 对象有两条引用字符串 s 和 t，professor 对象有一条引用字符串 p 和类转换异常 t。\n\n图 7-4\n\n当尝试将 `Student`\
    \ 对象视为 `Professor` 时，在运行时会出现 `ClassCastException`\n\n```\nException in thread\
    \ \"main\" java.lang.ClassCastException: Student\nat classname.main(classname.java:line#)\n\
    ```\n\n我们将在本章后面以及第 13 章再次讨论对象引用中类型转换的使用。\n"
- fmt: '### Implementing Multiple Interfaces


    Another important distinction between extending an abstract class and implementing
    an interface is that whereas a given class may only be derived from **one** direct
    superclass, a class may implement as **many** interfaces as desired. If a class
    is to implement multiple interfaces, we must name all such interfaces as a comma-separated
    list after the `implements` keyword in the class declaration:


    ```

    public class ClassName implements Interface1, Interface2, ..., InterfaceN { ...
    }

    ```


    In so doing, the implementing class would then need to implement all of the methods
    prescribed by **all** of these interfaces collectively.


    As an example, if we were to invent a second interface called `Administrator`,
    which in turn specified the following method headers:


    ```

    public interface Administrator {

    boolean approveNewCourse(Course c);

    boolean hireProfessor(Professor p);

    void cancelCourse(Course c);

    }

    ```


    we could then declare that the `Professor` class implements **both** the `Teacher`
    and `Administrator` interfaces as follows:


    ```

    // The Professor class implements two interfaces.

    public class Professor implements Teacher, Administrator {

    // Details omitted.

    // The Professor class must implement all four of the methods called for by

    // the Teacher interface ...

    public boolean agreeToTeach(Course c) { ... }

    public void designateTextbook(TextBook b, Course c) { ... }

    public Syllabus defineSyllabus(Course c) { ... }

    public boolean approveEnrollment(Student s, Course c) { ... }

    // ... as well as all three of the methods called for by

    // the Administrator interface.

    public boolean approveNewCourse(Course c) { ... }

    public boolean hireProfessor(Professor p) { ... }

    public void cancelCourse(Course c) { ... }

    // Details omitted.

    }

    ```


    If a class implements two or more interfaces that call for methods with identical
    signatures, we need only implement one such method in the implementing class—that
    method will do “double duty” in satisfying both interfaces’ implementation requirements
    as far as the compiler is concerned.


    When a class implements more than one interface, its objects are capable of assuming
    multiple identities or roles in an application; such objects can therefore be
    “handled” by various types of reference variables. Based on the preceding definition
    of a `Professor` as both a `Teacher` and an `Administrator`, the following client
    code would be possible:


    ```

    // Instantiate a Professor object, and maintain a handle on it via

    // a reference variable of type Professor.

    Professor p = new Professor();

    // We then declare reference variables of the two types of interfaces that the

    // Professor class implements.

    Teacher t;

    Administrator a;

    t = p;  // We store a second handle on the same Professor in a reference variable
    of

    // type Teacher; this is possible because a Professor IS A Teacher!

    a = p;  // We store a third handle on the same Professor in a reference variable
    of

    // type Administrator; this is possible because a Professor IS AN

    // Administrator!

    ```


    This code is illustrated conceptually in Figure [7-5](#78624_3_En_7_Chapter.xhtml#Fig5).


    ![](images/78624_3_En_7_Chapter/78624_3_En_7_Fig5_HTML.jpg)


    A diagram of a professor object balloon has 3 strings professor p, administrator
    a, and teacher t.


    **Figure 7-5** A `Professor` object has three different identities/roles in our
    application


    This is conceptually the same thing as you, as a person, being viewed as having
    different roles by different people: you’re viewed as an employee by your manager,
    as a son or daughter by your parents, perhaps as a partner by your significant
    other, as a parent by your children, etc.


    We may then command the **same** object at run time as either a `Professor`:


    ```

    // setDepartment is a method defined by the Professor class ...

    p.setDepartment("Computer Science");

    ```


    or as a `Teacher`:


    ```

    // agreeToTeach is a method defined by the Teacher interface ...

    t.agreeToTeach(c);

    ```


    or as an `Administrator`:


    ```

    // approveNewCourse is a method defined by the Administrator interface ...

    a.approveNewCourse(c);

    ```


    because it’s all three, rolled into one.


    A class may simultaneously extend a **single** superclass and implement **one
    or more** interfaces, as follows:


    ```

    public class Professor extends Person implements Teacher, Administrator { ...
    }

    ```


    Under such circumstances, `extends` *className* should always precede `implements`
    *interfaceNameList* in the declaration.


    ### Interfaces and Casting, Revisited


    Continuing with the previous example, note that, despite the fact that `t` would,
    at **run time**, be referring to a `Professor` object, we **cannot** ask `t` to
    perform a method declared by the `Professor` class:


    ```

    Professor p = new Professor();

    Teacher t = p;

    // setDepartment is a method defined for the Professor class, but t is

    // declared to be of type Teacher ... this won''t compile!

    t.setDepartment("Computer Science");

    ```


    The compiler will check the type of `t`, determining that `t` is **declared**
    to be of type `Teacher`, and since the `Teacher` interface doesn’t declare a `setDepartment`
    method, the compiler will reject the last line of the preceding code with the
    following compilation error:


    ```

    cannot find symbol

    symbol:  method setDepartment(String)

    location:  interface Teacher

    ```


    Thus, even if the code that we’ve written **guarantees** that `t` would be referring
    to a `Professor` at **run time**, we may only command `t` at **compile** time
    as a `Teacher`, because not all `Teacher`s are necessarily `Professor`s as far
    as the compiler is concerned.


    Once again, casting comes to our rescue: if we are **certain** that `t` will indeed
    be referring to a `Professor` object at run time, we may invoke the `setDepartment`
    method on that object by casting the reference to `t` as follows:


    ```

    Professor p = new Professor();

    Teacher t = p;

    // setDepartment is a method defined for the Professor class; since we know

    // that t will refer to a Professor at run time, we use a cast so that

    // this will compile.

    ((Professor) t).setDepartment("Computer Science");

    ```


    Note the use of nested parentheses: `((Professor) t).setDepartment(...)`. We use
    nested parentheses to force the cast to occur **before** we attempt to invoke
    the `setDepartment` method on `t`. If we were to write the line of code **without**
    nested parentheses, as follows:


    ```

    (Professor) t.setDepartment("Computer Science");

    ```


    then the compiler would interpret this as saying, “First, invoke the `setDepartment`
    method on `t`, and **then** cast the result that is **returned** from this method
    invocation to be a `Professor`,” which is not what we want. (And, in fact, since
    a `set` method typically is declared to have a return type of `void`, the preceding
    line won’t even compile.)


    ### Interfaces and Instantiation


    As with abstract classes, interfaces cannot be instantiated. That is, if we define
    `Teacher` to be an interface, we may not instantiate it directly:


    ```

    Teacher t = new Teacher();  // Impossible!

    ```


    because interfaces don’t have constructors—only classes do, as templates for instantiating
    objects—and so we’d encounter the following compilation error:


    ```

    Teacher is abstract; cannot be instantiated

    ```


    Recall that this is the **exact same type** of compiler error message that is
    generated if we attempt to instantiate an abstract class. Here’s the result from
    an earlier example:


    ```

    Course is abstract; cannot be instantiated

    ```


    While we’re indeed prevented from instantiating an interface, we’re nonetheless
    permitted to declare reference variables to be of an interface type, as we were
    able to do with abstract classes:


    ```

    Teacher t;  // This is OK.

    ```


    This is necessary to facilitate polymorphism, as discussed in the next section.'
