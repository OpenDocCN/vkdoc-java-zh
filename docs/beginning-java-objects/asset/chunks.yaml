  trans: '

    ### 功能分解


    采用功能分解方法时，我们首先陈述系统预期执行的总体功能——例如“学生注册”。然后，我们将该功能分解为子功能：


    *   “向课程目录添加新课程”

    *   “允许学生注册课程”

    *   “打印学生课程表”

    *   等等


    接着，我们将这些功能进一步分解为更小的子功能。例如，我们可能将“允许学生注册课程”分解为：


    *   “显示可用课程列表”

    *   “允许学生选择课程”

    *   “验证学生是否满足所有先修条件”

    *   等等


    我们持续将功能分解为越来越小的逻辑单元，直到无法再合理细分，如图 3-2 所示。


    ![](img/78624_3_En_3_Fig2_HTML.jpg)


    学生注册的框图流程如下：显示可用课程列表，允许学生选择课程，并验证学生是否满足所有先修条件。这三个步骤均连接到“等等”模块。


    图 3-2


    我们自上而下地对应用程序进行了功能分解……


    然后，我们将最底层的功能分配给不同的程序员进行编码和**单元测试**（即独立测试）。最后，我们以模块化的方式自下而上地组装这些功能，在集成过程中测试每个连续阶段的结果，直到构建出完整的应用程序，如图
    3-3 所示。


    ![](img/78624_3_En_3_Fig3_HTML.jpg)


    学生注册的框图流程自下而上如下：“等等”模块连接到显示可用课程列表、允许学生选择课程以及验证学生是否满足所有先修条件。


    图 3-3


    ……并自下而上地组装应用程序


    采用功能分解方法进行软件开发时，我们的主要关注点是应用程序要执行的***功能***；***数据***则是事后才考虑的事情。也就是说：


    *   数据从一个函数传递到下一个函数，就像汽车在汽车工厂中通过流水线工艺制造一样。

    *   因此，数据结构必须在应用程序中的***许多***地方（即许多函数）被理解。

    *   如果应用程序部署后其数据结构需要更改，通常会在整个应用程序中引起***重大***的“连锁反应”。因数据结构变更导致连锁反应最显著的例子之一就是千年虫危机，一个看似简单的日期格式变更——从两位年份改为四位年份——引发了全球恐慌！为了在
    2000 年 1 月 1 日午夜钟声敲响之前，找到并修复那些预计会带来灾难性后果的连锁反应，人们花费了***数十亿***美元。

    *   尽管我们在部署前尽了最大努力对应用程序进行全面测试，但错误总是会悄然潜入而未被发现。如果应用程序完全集成后，因逻辑错误导致数据完整性出现问题，通常很难精确确定错误可能发生的位置——即***在哪个具体函数中***——因为数据已经在函数之间传递了无数次。


    ### 面向对象方法


    正如你在接下来的几章中将会看到的，面向对象的软件开发方法弥补了上述绝大部分缺陷。


    *   采用面向对象软件开发时，我们首先关注设计应用程序的***数据结构***，其次才是其功能。

    *   数据被***封装***在对象内部；因此，只有数据所属的对象才需要理解其数据结构。

    *   如果应用程序部署后某个对象的数据结构需要更改，实际上***不会产生连锁反应***；只需更改受影响对象的内部逻辑即可。

    *   ***每个对象负责确保其自身数据的完整性***。因此，如果某个对象的数据内部出现数据完整性错误，我们基本可以断定是该对象***自身***导致了这个问题，从而可以集中精力检查该对象的内部功能逻辑来定位“错误”。


    ## 什么是对象？


    在讨论软件对象之前，我们先来谈谈一般的现实世界对象。根据《韦氏大学词典》的定义，对象是“(1) 可以通过感官感知的物质实体；(2) 思想、情感或行为所指向的某种精神或物质实体。”


    定义的第一部分指的是我们通常所理解的对象：即我们可以看见、触摸并占据空间的物理“事物”。由于我们打算在整个书中使用“学生注册系统”案例研究作为学习对象的基础，让我们思考一些在学术环境的通用背景下有意义的**物理对象**的例子，即：


    *   上课的***学生***

    *   教授学生的***教授***

    *   上课的***教室***

    *   这些教室里的***视听设备***

    *   教室所在的***教学楼***

    *   学生使用的***教科书***

    *   等等


    当然，虽然所有这些类型的对象在典型的大学校园里都很常见，但它们并非都与学生注册课程相关，也并非都是学生注册系统案例研究所明确提及的，但我们暂时不必担心这一点。在本书的第二部分，你将学习一种技术，利用需求规格说明作为基础，来识别哪些类型的对象与特定的抽象相关。


    现在，让我们关注定义的后半部分，特别是短语***“思想……所指向的某种精神实体”***。在学术环境中，有许多重要的**概念对象**；其中一些包括：


    *   学生参加的**课程**

    *   教职员工所属的**院系**

    *   学生获得的**学位**


    当然，还有很多其他的。尽管我们看不见、摸不着、尝不到、闻不到也听不到它们，但在整体抽象中，概念对象与物理对象同等重要。


    从软件的角度来看，一个（软件）**对象**是一种软件构造/模块，它将**状态**（**数据**）和**行为**（**函数**）捆绑在一起，共同代表了对现实世界（物理或概念）对象的抽象。这在概念上如图
    3-4 所示。


    ![](img/78624_3_En_3_Fig4_HTML.png)


    一个阴阳符号，分别标有“数据的状态”和“函数的行为”。


    图 3-4


    软件对象将状态（数据）和行为（函数）捆绑在一起


    接下来，让我们分别深入探讨对象的两个方面——状态和行为。

    '
- fmt: '### State/Data/Attributes


    If we wish to record information about a student, what data might we require?
    Some examples might be:


    - The student’s name

    - Their student ID number

    - The student’s birth date

    - Their address

    - The student’s designated major field of study

    - Their cumulative grade point average (a.k.a. GPA)

    - Whom the student’s faculty advisor is

    - A list of the courses that the student is currently enrolled in this semester
    (i.e., the student’s current ***course load***)

    - A history of all of the courses that the student has taken to date, the semester/year
    in which each was taken, and the grade that was earned for each (i.e., the student’s
    ***transcript***)

    - And so on


    Now, how about for an academic course? Perhaps we’d wish to record:


    - The course number (e.g., “ART 101”)

    - The course name (e.g., “Introductory Basketweaving”)

    - A list of all of the courses that must have been successfully completed by a
    student prior to registering for this course (i.e., the course’s ***prerequisites***)

    - The number of credit hours that the course is worth

    - A list of the professors who have been approved to teach this course

    - And so on


    In object nomenclature, the data elements used to describe an object are referred
    to as the object’s **attributes**.


    An object’s attribute values, when taken collectively, are said to define the
    **state**, or condition, of the object. For example, if we wanted to determine
    whether or not a student is “eligible to graduate” (a ***state***), we might look
    at a combination of the following:


    - The student’s transcript (an ***attribute value***)

    - The list of courses the student is currently enrolled in (a second ***attribute
    value***)


    to determine if the student indeed is expected to have satisfied the course requirements
    for their chosen major field of study (a third attribute value) by the end of
    the current academic year.


    A given attribute may be simple—for example, GPA, which can be represented as
    a simple floating-point number (perhaps a `double` in Java)—or complex, for example,
    “transcript,” which represents a rather extensive collection of information with
    no simple representation.


    Programmers new to the object paradigm often ask, “Why not represent a transcript
    as a `String`? A ***long*** `String`, no doubt, but a `String` nonetheless?” You’ll
    learn over successive chapters that there is a far more elegant way to represent
    the notion of a student’s transcript in object-oriented terms.


    ### Behavior/Operations/Methods


    Now, let’s revisit the same two types of object—a student and a course—and talk
    about these objects’ respective behaviors.


    A student’s behaviors (relevant to academic matters, at any rate!) might include:


    - Enrolling in a course

    - Dropping a course

    - Designating a major field of study

    - Selecting a faculty advisor

    - Telling us their GPA

    - Telling us whether or not they have taken a particular course and, if so, when
    the course was taken, which professor taught it, and what grade the student received


    It’s a bit harder to think of an inanimate, conceptual object like a course as
    having behaviors, but if we were to imagine a course to be a living thing, we
    could envision that a course’s behaviors might include:


    - Permitting a student to register

    - Determining whether or not a given student is already registered

    - Telling us how many students have registered so far or, conversely, how many
    seats remain before the course is full

    - Telling us what its prerequisite courses are

    - Telling us how many credit hours the course is worth

    - Telling us which professor is assigned to teach the course this semester

    - And so on


    When we talk about software objects specifically, we define an object’s behaviors,
    also known as its **operations**, as both the things that an object does to ***access***
    its attribute values (data) and the things that an object does to ***modify/maintain***
    its attribute values (data).


    If we take a moment to reflect back on the behaviors we expect of a student as
    listed previously, we see that each operation involves one or more of the student’s
    attributes, for example:


    - Telling you their GPA involves ***accessing*** the value of the student’s “GPA”
    attribute.

    - Choosing a major field of study involves ***modifying*** the value of the student’s
    “major field of study” attribute.

    - Enrolling in a course involves ***modifying*** the value of the student’s “course
    load” attribute.


    Since you recently learned that the collective set of attribute values for an
    object defines its state, you now can see that operations are capable of ***changing
    an object’s state***. Let’s say that we define the state of a student who hasn’t
    yet selected a major field of study as an “undeclared” student. Asking such a
    student object to perform its “choosing a major field of study” method will cause
    that object to update the value of its “major field of study” attribute to reflect
    the newly selected major field. This, then, changes the student’s state from “undeclared”
    to “declared.”


    Yet another way to think of an object’s operations are as ***services*** that
    can be requested of the object on behalf of the application. For example, one
    service that we might ask a course object to perform is to provide us with a list
    of all of the students who are currently registered for the course (i.e., a ***student
    roster***).


    When we actually get around to programming an object’s behaviors in a language
    like Java, we refer to the programming language representation of an operation
    as a **method**, whereas, strictly speaking, the term “operation” is typically
    used to refer to a behavior conceptually.'
