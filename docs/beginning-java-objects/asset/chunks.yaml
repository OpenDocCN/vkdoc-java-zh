- fmt: "### Helping Ensure Data Integrity\n\nAs mentioned previously, one of the arguments\
    \ against declaring public attributes is that the object loses control over its\
    \ data, for as we saw earlier, a public attribute’s value can be changed by client\
    \ code without regard to any business rules that the object’s class may wish to\
    \ impose. On the other hand, when an accessor method is used to change the value\
    \ of a private attribute, value checking can be built into the “set” method to\
    \ ensure that the attribute value won’t be set to an “improper” value.\n\nAs an\
    \ example, let’s say that we’ve declared a `Student` attribute as follows:\n\n\
    ```\nprivate String birthDate;\n```\n\nOur intention is to record birth dates\
    \ in the format “mm/dd/yyyy”. By requiring that client code invoke methods to\
    \ manipulate the `birthDate` attribute (instead of permitting direct public access\
    \ to the attribute), we can provide logic within those methods to validate the\
    \ format of any newly proposed birth date and reject those that are invalid. We’ll\
    \ illustrate this concept by declaring an `updateBirthDate` method for the `Student`\
    \ class as shown in the following code:\n\n```\npublic class Student {\n    private\
    \ String birthDate;\n    // other attributes omitted from this example ...\n \
    \   public boolean updateBirthDate(String newBirthDate) {\n        boolean newDateApproved;\n\
    \        // Perform appropriate validations.\n        // Remember, italics represent\
    \ pseudocode ...\n        if (date is not in the format mm/dd/yyyy) {\n      \
    \      newDateApproved = false;\n        }\n        else if (mm not in the range\
    \ 01 to 12) {\n            newDateApproved = false;\n        }\n        else if\
    \ (the day number isn't valid for the selected month) {\n            newDateApproved\
    \ = false;\n        }\n        else if (the year is NOT a leap year, but 2/29\
    \ was specified) {\n            newDateApproved = false;\n        }\n        //\
    \ etc. for other validation tests.\n        else {\n            // If we've gotten\
    \ this far in the code, all is well with what was\n            // passed in as\
    \ a value to this method, and so we can go ahead and\n            // update the\
    \ value of the birthDate attribute with this value.\n            birthDate = newBirthDate;\n\
    \            // Set our flag to indicate success!\n            newDateApproved\
    \ = true;\n        }\n        return newDateApproved;\n    }\n    // etc.\n}\n\
    ```\n\nIf an attempt is made to pass an improperly formatted birth date to the\
    \ method from client code, as in\n\n```\ns.updateBirthDate(\"foo\");\n```\n\n\
    the change will be rejected and the value of `s`’s `birthDate` attribute will\
    \ be unchanged. In fact, we’d probably insert the attempt to update the birth\
    \ date within an “if” statement so that we could detect and react to such a rejection:\n\
    \n```\n// Somewhere along the line, the newDate variable takes on an invalid value.\n\
    String newDate = \"Jan 1 1990\";\n// Later in the application ...\nif (!(s.updateBirthDate(newDate))\
    \ {\n    // Pseudocode.\n    do whatever we need to do if value is rejected ...\n\
    }\n```\n\nOn the other hand, if `birthDate` had been declared to be a **public**\
    \ attribute of the `Student` class, then setting the attribute directly as follows\
    \ would be permitted by the compiler:\n\n```\ns.birthDate = \"Jan 1 1990\";\n\
    ```\n\nHence, it would be possible to corrupt the attribute’s value by bypassing\
    \ the error checking, based on business rules, that a “set” method would normally\
    \ perform for us.\n\n### Limiting “Ripple Effects” When Private Features Change\n\
    \nDespite our best attempts to avoid such situations, we often have a need to\
    \ go back and modify the design of an application after it has been deployed,\
    \ either when an inevitable change in requirements occurs or if we unfortunately\
    \ discover a design flaw that needs attention. Unfortunately, in a non-OO (or\
    \ poorly designed OO) application, this can open us up to “ripple effects,” wherein\
    \ dozens or hundreds or **thousands** of lines of code throughout an application\
    \ have to be changed, retested, etc.\n\nOne of the most dramatic examples of the\
    \ negative impact of a design change was the notorious **Y2K problem**. When the\
    \ need to change date formats to accommodate a four-digit year arose as the year\
    \ 2000 approached, the burden to hunt through **billions** of lines of code in\
    \ **millions** of applications worldwide to find all such cases—and to **fix**\
    \ them without unintentionally **breaking** anything else—was mind-boggling. Many\
    \ folks were convinced at the time that the world would actually melt down as\
    \ a result, and in fact, it’s quite amazing that it didn’t!\n\nPerhaps the most\
    \ **dramatic** benefit of encapsulation combined with information hiding, therefore,\
    \ is that the **hidden implementation details of a class**—that is, its private\
    \ data structure and/or its (effectively private) accessor code—**can change without\
    \ affecting how client code interacts with objects belonging to that class**.\
    \ To illustrate this principle, we’ll craft an example.\n\nLet’s say that an attribute\
    \ is declared in the `Student` class as follows\n\n```\nprivate int age;\n```\n\
    \nand that we declare a corresponding `getAge()` method as follows:\n\n```\npublic\
    \ int getAge() {\n    return age;\n}\n```\n\n(We’ve chosen not to declare a `setAge`\
    \ method because we’ve decided that we want `age` to be a read-only attribute.)\n\
    \nWe then proceed to use our `Student` class in countless applications; so, in\
    \ literally **thousands** of places within the client code of these applications,\
    \ we write statements such as the following, relying on the “get” method to provide\
    \ us with a student’s age as an `int` value, for example:\n\n```\nint currentAge\
    \ = s.getAge();\n```\n\nA few years later, we decide to modify the data structure\
    \ of the `Student` class so that, instead of maintaining an `age` attribute explicitly,\
    \ we instead use the student’s `birthDate` attribute to compute a student’s age\
    \ whenever it’s needed. We thus modify our `Student` class code as follows:\n\n\
    **Table 4-1**  \nModifying Private Details of the Student Class: A Before vs.\
    \ After View\n\n| The “Before” Code | The “After” Code |\n| --- | --- |\n| `public\
    \ class Student {`<br>**   // We have an explicit**<br>**   // age attribute.**<br>**   private\
    \ int age;**<br>`public int getAge() {`<br>**      return age;**<br>`}`<br>`//\
    \ etc.`<br>`}` | `import java.util.Date;`<br>`public class Student {`<br>**   //\
    \ We replace age with**<br>**   // birthDate.**<br>**   private Date birthDate;**<br>`public\
    \ int getAge() {`<br>**      // Compute the age on demand**<br>**      // (pseudocode).**<br>**      return**\
    \ ***system date - birthDate***<br>`}`<br>`// etc.`<br>`}` |\n\nIn the “after”\
    \ version of `Student`, we’re computing the student’s age by subtracting their\
    \ birth date (stored as an attribute value) from today’s date. This is an example\
    \ of what can be informally referred to as a **pseudoattribute**—to client code,\
    \ the presence of a `getAge()` method implies that there is an attribute by the\
    \ name of `age`, when in fact there may not be.\n\nThe beauty is that **we don’t\
    \ care** that the **private** details of the `Student` class design have changed!\
    \ In all of the thousands of places within the client code of countless applications\
    \ where we’ve used code such as\n\n```\nint currentAge = s.getAge();\n```\n\n\
    to retrieve a student’s age as an `int` value, this code will continue to work\
    \ **as is**, without any changes to client code being necessary, because the expression\n\
    \n```\ns.getAge()\n```"
  raw: '### Helping Ensure Data Integrity


    As mentioned previously, one of the arguments against declaring public attributes
    is that the object loses control over its data, for as we saw earlier, a public
    attribute’s value can be changed by client code without regard to any business
    rules that the object’s class may wish to impose. On the other hand, when an accessor
    method is used to change the value of a private attribute, value checking can
    be built into the “set” method to ensure that the attribute value won’t be set
    to an “improper” value.


    As an example, let’s say that we’ve declared a `Student` attribute as follows:


    ```

    private String birthDate;

    ```


    Our intention is to record birth dates in the format “mm/dd/yyyy”. By requiring
    that client code invoke methods to manipulate the `birthDate` attribute (instead
    of permitting direct public access to the attribute), we can provide logic within
    those methods to validate the format of any newly proposed birth date and reject
    those that are invalid. We’ll illustrate this concept by declaring an `updateBirthDate`
    method for the `Student` class as shown in the following code:


    ```

    public class Student {

    private String birthDate;

    // other attributes omitted from this example ...

    public boolean updateBirthDate(String newBirthDate) {

    boolean newDateApproved;

    // Perform appropriate validations.

    // Remember, italics represent pseudocode ...

    if (date is not in the format mm/dd/yyyy) {

    newDateApproved = false;

    }

    else if (mm not in the range 01 to 12) {

    newDateApproved = false;

    }

    else if (the day number isn''t valid for the selected month) {

    newDateApproved = false;

    }

    else if (the year is NOT a leap year, but 2/29 was specified) {

    newDateApproved = false;

    }

    // etc. for other validation tests.

    else {

    // If we''ve gotten this far in the code, all is well with what was

    // passed in as a value to this method, and so we can go ahead and

    // update the value of the birthDate attribute with this value.

    birthDate = newBirthDate;

    // Set our flag to indicate success!

    newDateApproved = true;

    }

    return newDateApproved;

    }

    // etc.

    }

    ```


    If an attempt is made to pass an improperly formatted birth date to the method
    from client code, as in


    ```

    s.updateBirthDate("foo");

    ```


    the change will be rejected and the value of `s`’s `birthDate` attribute will
    be unchanged. In fact, we’d probably insert the attempt to update the birth date
    within an “if” statement so that we could detect and react to such a rejection:


    ```

    // Somewhere along the line, the newDate variable takes on an invalid value.

    String newDate = "Jan 1 1990";

    // Later in the application ...

    if (!(s.updateBirthDate(newDate)) {

    // Pseudocode.

    do whatever we need to do if value is rejected ...

    }

    ```


    On the other hand, if `birthDate` had been declared to be a ***public*** attribute
    of the `Student` class, then setting the attribute directly as follows would be
    permitted by the compiler:


    ```

    s.birthDate = "Jan 1 1990";

    ```


    Hence, it would be possible to corrupt the attribute’s value by bypassing the
    error checking, based on business rules, that a “set” method would normally perform
    for us.


    ### Limiting “Ripple Effects” When Private Features Change


    Despite our best attempts to avoid such situations, we often have a need to go
    back and modify the design of an application after it has been deployed, either
    when an inevitable change in requirements occurs or if we unfortunately discover
    a design flaw that needs attention. Unfortunately, in a non-OO (or poorly designed
    OO) application, this can open us up to “ripple effects,” wherein dozens or hundreds
    or ***thousands*** of lines of code throughout an application have to be changed,
    retested, etc.


    One of the most dramatic examples of the negative impact of a design change was
    the notorious **Y2K problem**. When the need to change date formats to accommodate
    a four-digit year arose as the year 2000 approached, the burden to hunt through
    ***billions*** of lines of code in ***millions*** of applications worldwide to
    find all such cases—and to ***fix*** them without unintentionally ***breaking***
    anything else—was mind-boggling. Many folks were convinced at the time that the
    world would actually melt down as a result, and in fact, it’s quite amazing that
    it didn’t!


    Perhaps the most ***dramatic*** benefit of encapsulation combined with information
    hiding, therefore, is that the ***hidden implementation details of a class***—that
    is, its private data structure and/or its (effectively private) accessor code—***can
    change without affecting how client code interacts with objects belonging to that
    class***. To illustrate this principle, we’ll craft an example.


    Let’s say that an attribute is declared in the `Student` class as follows


    ```

    private int age;

    ```


    and that we declare a corresponding `getAge()` method as follows:


    ```

    public int getAge() {

    return age;

    }

    ```


    (We’ve chosen not to declare a `setAge` method because we’ve decided that we want
    `age` to be a read-only attribute.)


    We then proceed to use our `Student` class in countless applications; so, in literally
    ***thousands*** of places within the client code of these applications, we write
    statements such as the following, relying on the “get” method to provide us with
    a student’s age as an `int` value, for example:


    ```

    int currentAge = s.getAge();

    ```


    A few years later, we decide to modify the data structure of the `Student` class
    so that, instead of maintaining an `age` attribute explicitly, we instead use
    the student’s `birthDate` attribute to compute a student’s age whenever it’s needed.
    We thus modify our `Student` class code as follows:


    Table 4-1


    Modifying Private Details of the Student Class: A Before vs. After View


    | The “Before” Code | The “After” Code |

    | --- | --- |

    | `public class Student {`**   // We have an explicit****   // age attribute.****   private
    int age;**`public int getAge() {`**      return age;**`}``// etc.``}` | `import
    java.util.Date;``public class Student {`**   // We replace age with****   // birthDate.****   private
    Date birthDate;**`public int getAge() {`**      // Compute the age on demand****      //
    (pseudocode).****      return** ***system date - birthDate*****;**`}``// etc.``}`
    |


    In the “after” version of `Student`, we’re computing the student’s age by subtracting
    their birth date (stored as an attribute value) from today’s date. This is an
    example of what can be informally referred to as a **pseudoattribute**—to client
    code, the presence of a `getAge()` method implies that there is an attribute by
    the name of `age`, when in fact there may not be.


    The beauty is that ***we don’t care*** that the ***private*** details of the `Student`
    class design have changed! In all of the thousands of places within the client
    code of countless applications where we’ve used code such as


    ```

    int currentAge = s.getAge();

    ```


    to retrieve a student’s age as an `int` value, this code will continue to work
    ***as is***, without any changes to client code being necessary, because the expression


    ```

    s.getAge()

    ```'
  trans: '

    ### 帮助确保数据完整性


    如前所述，反对声明公共属性的理由之一是对象会失去对其数据的控制，因为正如我们之前所见，公共属性的值可以被客户端代码更改，而不必考虑对象类可能希望施加的任何业务规则。另一方面，当使用访问器方法来更改私有属性的值时，可以在“set”方法中内置值检查，以确保属性值不会被设置为“不适当”的值。


    举个例子，假设我们声明了一个 `Student` 属性，如下所示：


    ```

    private String birthDate;

    ```


    我们的意图是以“mm/dd/yyyy”格式记录出生日期。通过要求客户端代码调用方法来操作 `birthDate` 属性（而不是允许直接公共访问该属性），我们可以在这些方法中提供逻辑来验证任何新提议的出生日期的格式，并拒绝无效的格式。我们将通过为
    `Student` 类声明一个 `updateBirthDate` 方法来演示这一概念，如下代码所示：


    ```

    public class Student {

    private String birthDate;

    // 此示例中省略了其他属性 ...

    public boolean updateBirthDate(String newBirthDate) {

    boolean newDateApproved;

    // 执行适当的验证。

    // 请记住，斜体表示伪代码 ...

    if (日期不是 mm/dd/yyyy 格式) {

    newDateApproved = false;

    }

    else if (mm 不在 01 到 12 范围内) {

    newDateApproved = false;

    }

    else if (该月的天数对于所选月份无效) {

    newDateApproved = false;

    }

    else if (该年不是闰年，但指定了 2/29) {

    newDateApproved = false;

    }

    // 其他验证测试以此类推。

    else {

    // 如果代码执行到这里，说明传递给此方法的值一切正常，

    // 因此我们可以继续用此值更新 birthDate 属性的值。

    birthDate = newBirthDate;

    // 设置标志以指示成功！

    newDateApproved = true;

    }

    return newDateApproved;

    }

    // 等等。

    }

    ```


    如果尝试从客户端代码向该方法传递格式不正确的出生日期，例如：


    ```

    s.updateBirthDate("foo");

    ```


    该更改将被拒绝，并且 `s` 的 `birthDate` 属性的值将保持不变。实际上，我们可能会将更新出生日期的尝试放在一个“if”语句中，以便能够检测并响应此类拒绝：


    ```

    // 在某个环节，newDate 变量获取了一个无效值。

    String newDate = "Jan 1 1990";

    // 稍后在应用程序中 ...

    if (!(s.updateBirthDate(newDate)) {

    // 伪代码。

    // 如果值被拒绝，执行任何需要执行的操作 ...

    }

    ```


    另一方面，如果 `birthDate` 被声明为 `Student` 类的 ***公共*** 属性，那么编译器将允许直接设置该属性，如下所示：


    ```

    s.birthDate = "Jan 1 1990";

    ```


    因此，通过绕过“set”方法通常会为我们执行的基于业务规则的错误检查，就有可能破坏该属性的值。


    ### 当私有特性更改时限制“连锁反应”


    尽管我们尽了最大努力来避免这种情况，但在应用程序部署后，我们常常需要回过头来修改其设计，这要么是因为需求发生了不可避免的变化，要么是因为我们不幸发现了需要处理的设计缺陷。不幸的是，在非面向对象（或设计不佳的面向对象）应用程序中，这可能会让我们面临“连锁反应”，即整个应用程序中数十、数百或***数千***行代码需要被更改、重新测试等。


    设计变更负面影响最显著的例子之一就是臭名昭著的 **Y2K 问题**。当 2000 年临近，需要更改日期格式以适应四位数的年份时，要在全球***数百万***个应用程序的***数十亿***行代码中搜索所有此类情况——并在不无意中***破坏***其他任何东西的情况下***修复***它们——这一负担令人难以置信。当时许多人确信世界会因此崩溃，而事实上，它竟然没有崩溃，这真是令人惊叹！


    因此，封装与信息隐藏结合带来的最***显著***的好处或许是，***类的隐藏实现细节***——即其私有数据结构和/或（实际上是私有的）访问器代码——***可以在不影响客户端代码与属于该类的对象交互方式的情况下进行更改***。为了说明这一原则，我们将构建一个示例。


    假设在 `Student` 类中声明了一个属性，如下所示：


    ```

    private int age;

    ```


    并且我们声明了一个相应的 `getAge()` 方法，如下所示：


    ```

    public int getAge() {

    return age;

    }

    ```


    （我们选择不声明 `setAge` 方法，因为我们决定让 `age` 成为一个只读属性。）


    然后，我们在无数应用程序中使用我们的 `Student` 类；因此，在这些应用程序的客户端代码中，实际上有***数千***个地方，我们编写了如下语句，依赖“get”方法来为我们提供学生的年龄（作为
    `int` 值），例如：


    ```

    int currentAge = s.getAge();

    ```


    几年后，我们决定修改 `Student` 类的数据结构，不再显式维护一个 `age` 属性，而是使用学生的 `birthDate` 属性在需要时计算学生的年龄。因此，我们修改
    `Student` 类的代码如下：


    表 4-1


    修改 Student 类的私有细节：修改前与修改后对比


    | “修改前”代码 | “修改后”代码 |

    | --- | --- |

    | `public class Student {`**   // 我们有一个显式的****   // age 属性。****   private int
    age;**`public int getAge() {`**      return age;**`}``// 等等。``}` | `import java.util.Date;``public
    class Student {`**   // 我们用 birthDate****   // 替换了 age。****   private Date birthDate;**`public
    int getAge() {`**      // 按需计算年龄****      // （伪代码）。****      return** ***系统日期
    - birthDate*****;**`}``// 等等。``}` |


    在 `Student` 的“修改后”版本中，我们通过从今天的日期中减去学生的出生日期（存储为属性值）来计算学生的年龄。这是一个可以非正式地称为**伪属性**的例子——对客户端代码而言，存在一个
    `getAge()` 方法暗示存在一个名为 `age` 的属性，而实际上可能并没有。


    美妙之处在于，***我们不在乎*** `Student` 类设计的***私有***细节是否发生了变化！在无数应用程序的客户端代码中，我们使用诸如


    ```

    int currentAge = s.getAge();

    ```


    来获取学生年龄（作为 `int` 值）的数千个地方，这段代码将继续***原样***工作，无需对客户端代码进行任何更改，因为表达式


    ```

    s.getAge()

    ```

    '
- fmt: '`still evaluates to an `int` value representing `Student s`’s age. Hence,
    we’ve avoided “dreaded” ripple effects and have ***dramatically*** reduced the
    amount of effort necessary to accommodate a design change. Such changes are said
    to be **encapsulated**, or limited to the internal code of the `Student` class
    only.


    Of course, all bets are off if the developer of a class changes one of its ***public***
    features—most often, a public method header—because then all of the client code
    that passes messages to objects of this type using this method will potentially
    have to change. For example, if we were to change the `Student` class design so
    that the `getAge()` method is now declared to return a `double` value, as follows


    ```

    public class Student {

    // We''ve changed the type of the age attribute from int to double ...

    private double age;

    // ... and the return type of the getAge() method accordingly.

    public double getAge() {

    return age;

    }

    // etc.

    ```


    then much of our client code ***would*** indeed potentially “break,” as in the
    following example:


    ```

    // This will no longer compile!

    int currentAge = s.getAge();

    ```


    This particular client code will “break” because we now have a type mismatch.
    We are getting back a `double` value, but are trying to assign it to an `int`
    variable, which as we learned in Chapter [2](#78624_3_En_2_Chapter.xhtml) will
    generate a compiler error as follows:


    ```

    possible loss of precision

    found    : double

    required : int

    ```


    We’d have to hunt for all of the countless instances throughout potentially many
    applications where we are calling the `getAge()` method on a `Student` reference
    and modify each such line of code to either do an explicit cast from `double`
    to `int`, as follows:


    ```

    // We''re now using a cast.

    int currentAge = (int) s.getAge();

    ```


    Thus, we’d potentially incur a significant ripple effect. But again, this ripple
    effect is due to the fact that we changed a ***public*** feature of our class—a
    public method header, to be precise.


    As long as we restrict our changes to the private features of a class, ripple
    effects aren’t an issue; any client code that was previously written to use `public
    Student` methods will continue to work as intended.


    ### Using Accessor Methods from Within a Class’s Own Methods


    Earlier in the chapter, we discussed the fact that a class is permitted to directly
    access its own attributes by name, as in the following `printStudentInfo` method:


    ```

    public class Student {

    private String name;

    private String ssn;

    // etc.

    // Details omitted.

    public void printStudentInfo() {

    // We''re accessing our own attributes directly.

    System.out.println("Name:  " + this.name);

    System.out.println("Student ID:  " + this.ssn);

    // etc.

    }

    // etc.

    ```


    However, it’s considered to be a best practice for a class to ***use its own “get”/“set”
    methods*** whenever it needs to access one of its own attribute values. Let’s
    revise the `printStudentInfo` method to illustrate this best practice:


    ```

    public class Student {

    private String name;

    private String ssn;

    // etc.

    // "Garden variety" accessor methods.

    public String getName() {

    return name;

    }

    public void setName(String n) {

    name = n;

    }

    public String getSsn() {

    return ssn;

    }

    public void setSsn(String s) {

    ssn = s;

    }

    public void printStudentInfo() {

    // We''re now using our own "get" methods to access our own

    // attribute values.

    System.out.println("Name:  " + this.getName());

    System.out.println("Student ID:  " + this.getSsn());

    // etc.

    }

    // etc.

    ```


    Why is it important to use a class’s own “get”/“set” methods rather than accessing
    attributes directly? Let’s say that, at some future date, the `getName` and `getSsn`
    methods of the `Student` class are modified as follows:


    ```

    public String getName() {

    // Business rules have changed!  We now want to reformat the name

    // as stored within a Student object before returning it to

    // client code.

    // (Pseudocode.)

    String reformattedName = name reformatted in the form

    "LastName, FirstName";

    return reformattedName;

    }

    public String getSsn() {

    // Business rules have changed!  We now want to reformat the

    // ssn as stored within a Student object to insert dashes

    // before returning it to client code.

    // (Pseudocode.)

    String reformattedSsn = ssn reformatted in the form "xxx-xx-xxxx";

    return reformattedSsn;

    }

    ```


    Because we’ve redesigned the `printStudentInfo` method to invoke `this.getName()`
    and `this.getSsn()`, we’ll automatically benefit from the changes in business
    logic within the `getName` and `getSsn` methods:


    ```

    // Client code.

    Student s = new Student();

    s.setName("Susan Yamate");

    s.setSsn("123456789");

    s.printStudentInfo();

    ```


    Here’s the output:


    ```

    Name:  Yamate, Susan

    Student ID: 123-45-6789

    ```


    On the other hand, if we had accessed the `name` and `ssn` attributes directly
    from within the `printStudentInfo` method


    ```

    public void printStudentInfo() {

    // We''re accessing private attributes directly by name rather than

    // using the corresponding get methods.

    System.out.println("Name:  " + name);

    System.out.println("Student ID:  " + ssn);

    // etc.

    }

    ```


    we would ***not*** benefit from changes in business logic:


    ```

    // Client code.

    Student s = new Student();

    s.setName("Susan Yamate");

    s.setSsn("123456789");

    s.printAllAttributes();

    ```


    Here’s the output (***incorrectly*** formatted):


    ```

    Name:  Susan Yamate

    Student ID: 123456789

    ```


    The same holds true for using a class’s own **“*****set”*** methods when ***updating***
    the value of an attribute from within another method—for example, this version
    of the `assignMajor` method of `Student`


    ```

    public class Student {

    private String name;

    private String ssn;

    private String major;

    private Professor advisor;

    // etc.

    // Set/get methods provided; details omitted.

    public void assignMajor(String m, Professor p) {

    // Preferred.

    this.setMajor(m);

    this.setAdvisor(p);

    }

    // etc.

    ```


    is preferred over this version


    ```

    public class Student {

    private String name;

    private String ssn;

    private String major;

    private Professor advisor;

    // etc.

    // Set/get methods provided; details omitted.

    public void assignMajor(String m, Professor p) {

    // Not as desirable.

    this.major = m;

    this.advisor = p;

    }

    // etc.

    ```


    because the `Student` class’s “set” methods may be simple “one-liners” today


    ```

    public void setMajor(String m) {

    major = m;

    }

    ```


    but may be enhanced to reflect more sophisticated business logic at some point
    in the future:


    ```

    public void setMajor(String m) {

    // Pseudocode.

    look up m in a database to verify that it is an "approved" major designation

    before updating the major attribute

    if (m is valid) {

    major = m;

    }

    }

    ```


    Of course, the one place where we ***cannot*** invoke a class’s “get”/“set” methods
    is ***within*** the “get”/“set” methods themselves. To do so would result in an
    infinitely recursive method


    ```

    // This method is recursive!

    public void setName(String n) {

    this.setName(n);

    }

    ```


    which will compile properly, but will produce a run-time error when invoked, as
    follows:


    ```

    // Client code.

    Student s = new Student();

    s.setName("Fred Schnurd");

    ```


    Here’s the error:


    ```

    Exception in thread "main" java.lang.StackOverflowError

    at Student.setName(Student.java:8)

    at Student.setName(Student.java:8)

    at Student.setName(Student.java:8)

    at Student.setName(Student.java:8)

    at Student.setName(Student.java:8)

    (repeated 1024 times!)

    ```'
