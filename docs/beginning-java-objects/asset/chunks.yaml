    \ static` 方法可以在整个宿主类上被调用——换句话说，使用这些方法无需实例化对象。\n\n### Transcript 类\n\n图 14-13 展示了\
    \ `Transcript` 类的 UML 表示。后续章节将提供关于此类的更多细节。\n\n![](img/78624_3_En_14_Fig13_HTML.png)\n\
    \n成绩单的框图包含“验证完成”命令。\n\n图 14-13\n\n`Transcript` 类\n\n#### Transcript 属性\n\n`Transcript`\
    \ 类参与两个关系：\n\n*   ***维护***，与 `Student` 的一对一关联\n*   一个未命名的、与 `TranscriptEntry`\
    \ 的一对多聚合\n\nSRS 类图没有为 `Transcript` 类指明任何其他属性，因此我们仅编码这两个：\n\n```\nprivate ArrayList\
    \ transcriptEntries;\nprivate Student studentOwner;\n```\n\n#### verifyCompletion()\n\
    \n`Transcript` 类有一个特别有趣的方法 `verifyCompletion`，用于确定 `Transcript` 是否包含满足特定 `Course`\
    \ 要求的证据。此方法遍历由 `Transcript` 对象维护的 `TranscriptEntries` 的 `ArrayList`：\n\n```\n\
    public boolean verifyCompletion(Course c) {\nboolean outcome = false;\n// 遍历所有\
    \ TranscriptEntries，寻找一个\n// 反映所关注课程 Section 的条目。\nfor (TranscriptEntry te : transcriptEntries)\
    \ {\n```\n\n对于每个条目，它获取该条目所代表的 `Section` 对象的句柄，然后在该对象上调用 `isSectionOf` 方法，以确定该\
    \ `Section` 是否代表所关注的 `Course`：\n\n```\nSection s = te.getSection();\nif (s.isSectionOf(c))\
    \ {\n```\n\n假设该 `Section` 确实相关，该方法接下来使用 `TranscriptEntry` 类的 `static passingGrade`\
    \ 方法来确定在此 `Section` 中获得的成绩是否为及格成绩。如果是及格成绩，我们可以立即终止循环，因为为了从此方法返回 `true` 结果，我们只需要找到所关注\
    \ `Course` 的***一个***及格成绩示例：\n\n```\n// 确保成绩足够高。\nif (TranscriptEntry.passingGrade(te.getGrade()))\
    \ {\noutcome = true;\n// 我们已经找到一个，因此可以\n// 现在终止循环。\nbreak;\n}\n}\n}\nreturn outcome;\n\
    }\n}\n```\n\n### SRS 驱动程序\n\n现在我们已经编写了 SRS 模型所需的所有类，我们需要一种方法来测试它们。我们可以等到构建了 GUI\
    \ 前端后再全面测试应用程序；然而，尽早（而非推迟）了解核心类是否正常工作会更好。一个非常有用的技术是编写一个命令行驱动的程序，用于实例化不同类型的对象并调用其关键方法，将结果显示在命令行窗口中供我们检查。\n\
    \n我们将通过创建一个名为 `SRS` 的类（其中包含一个 `main` 方法）来开发这样一个程序，该方法将作为我们的测试“驱动程序”。\n\n#### 公共静态属性\n\
    \n我们将在此程序中实例化一些 `Professor`、`Student`、`Course` 和 `Section` 对象，因此我们需要一种方法来组织对这些对象的引用。我们将创建集合对象作为\
    \ `SRS` 类的属性，以保存这些不同的对象类型。同时，我们将它们声明为 `public static` 属性，这意味着我们将这些主要对象集合全局提供给整个应用程序；然后可以在整个\
    \ SRS 应用程序中通过 `SRS.`*集合名称*（例如 `SRS.faculty`）访问它们：\n\n```\n// 通过将对象集合声明为主类中的公共静态属性，\n\
    // 我们可以有效地创建“全局”数据；\npublic static ArrayList faculty;\npublic static ArrayList\
    \ studentBody;\npublic static ArrayList courseCatalog;\n// 下一个集合——Section 对象引用的集合——根据我们在\
    \ UML 中建模 SRS 的方式，\n// 被封装在一个专用类中；\n// 请注意，我们本可以以类似方式封装前三个集合。\npublic static ScheduleOfClasses\
    \ scheduleOfClasses =\nnew ScheduleOfClasses(\"SP2005\");\n```\n\nSRS 的 `ScheduleOfClasses`\
    \ 类作为 `Section` 对象的集合点；对于其他类型的对象，我们使用简单的 `ArrayList`，尽管我们可以继续设计类似于 `ScheduleOfClasses`\
    \ 的类来作为封装的集合，可能分别命名为 `Faculty`、`StudentBody` 和 `CourseCatalog`。我们不需要为 `Transcript`\
    \ 对象（我们将通过 `Student` 对象维护的句柄来访问它们）或 `TranscriptEntry` 对象（我们将通过 `Transcript` 对象本身来访问它们）创建集合。\n"
- fmt: '### The `main` Method


    We’ll now dive into the `main` method for the `SRS` driver class. We’ll start
    by declaring reference variables for each of the four main object types:


    ```

    public static void main(String[] args) {

    Professor p1, p2, p3;

    Student s1, s2, s3;

    Course c1, c2, c3, c4, c5;

    Section sec1, sec2, sec3, sec4, sec5, sec6, sec7;

    ```


    We’ll then use their various constructors to fabricate object instances, storing
    handles in the appropriate collections:


    ```

    // Create various objects by calling the appropriate

    // constructors.  (We''d normally be reading in such data

    // from a database or file ...)

    // -----------

    // Professors.

    // -----------

    p1 = new Professor("Jacquie Barker", "123-45-6789",

    "Adjunct Professor", "Information Technology");

    p2 = new Professor("Claudio Cioffi", "567-81-2345",

    "Full Professor", "Computational Social Sciences");

    p3 = new Professor("Snidely Whiplash", "987-65-4321",

    "Full Professor", "Physical Education");

    // Add these to the appropriate ArrayList.

    faculty = new ArrayList();

    faculty.add(p1);

    faculty.add(p2);

    faculty.add(p3);

    // ---------

    // Students.

    // ---------

    s1 = new Student("Joe Blow", "111-11-1111", "Math", "M.S.");

    s2 = new Student("Fred Schnurd", "222-22-2222",

    "Information Technology", "Ph. D.");

    s3 = new Student("Mary Smith", "333-33-3333", "Physics", "B.S.");

    // Add these to the appropriate ArrayList.

    studentBody = new ArrayList();

    studentBody.add(s1);

    studentBody.add(s2);

    studentBody.add(s3);

    // --------

    // Courses.

    // --------

    c1 = new Course("CMP101",

    "Beginning Computer Technology", 3.0);

    c2 = new Course("OBJ101",

    "Object Methods for Software Development", 3.0);

    c3 = new Course("CMP283",

    "Higher Level Languages (Java)", 3.0);

    c4 = new Course("CMP999",

    "Living Brain Computers", 3.0);

    c5 = new Course("ART101",

    "Beginning Basketweaving", 3.0);

    // Add these to the appropriate ArrayList.

    courseCatalog = new ArrayList();

    courseCatalog.add(c1);

    courseCatalog.add(c2);

    courseCatalog.add(c3);

    courseCatalog.add(c4);

    courseCatalog.add(c5);

    ```


    We use the `addPrerequisite` method of the `Course` class to interrelate some
    of the `Course`s, so that `c1` is a prerequisite for `c2`, `c2` for `c3`, and
    `c3` for `c4`. The only `Course`s that do not specify prerequisites in our test
    case are `c1` and `c5`:


    ```

    // Establish some prerequisites (c1 => c2 => c3 => c4).

    c2.addPrerequisite(c1);

    c3.addPrerequisite(c2);

    c4.addPrerequisite(c3);

    ```


    To create `Section` objects, we take advantage of the `Course` class’s `scheduleSection`
    method, which, as you may recall, contains an embedded call to a `Section` class
    constructor. Each invocation of `scheduleSection` returns a handle to a newly
    created `Section` object, which we store in the appropriate collection:


    ```

    // ---------

    // Sections.

    // ---------

    // Schedule sections of each Course by calling the

    // scheduleSection method of Course (which internally

    // invokes the Section constructor).

    sec1 = c1.scheduleSection(''M'', "8:10 - 10:00 PM", "GOVT101", 30);

    sec2 = c1.scheduleSection(''W'', "6:10 - 8:00 PM", "GOVT202", 30);

    sec3 = c2.scheduleSection(''R'', "4:10 - 6:00 PM", "GOVT105", 25);

    sec4 = c2.scheduleSection(''T'', "6:10 - 8:00 PM", "SCI330", 25);

    sec5 = c3.scheduleSection(''M'', "6:10 - 8:00 PM", "GOVT101", 20);

    sec6 = c4.scheduleSection(''R'', "4:10 - 6:00 PM", "SCI241", 15);

    sec7 = c5.scheduleSection(''M'', "4:10 - 6:00 PM", "ARTS25", 40);

    // Add these to the Schedule of Classes.

    scheduleOfClasses.addSection(sec1);

    scheduleOfClasses.addSection(sec2);

    scheduleOfClasses.addSection(sec3);

    scheduleOfClasses.addSection(sec4);

    scheduleOfClasses.addSection(sec5);

    scheduleOfClasses.addSection(sec6);

    scheduleOfClasses.addSection(sec7);

    ```


    Next, we use the `agreeToTeach` method declared for the `Professor` class to assign
    `Professor`s to `Section`s:


    ```

    // Recruit a professor to teach each of the sections.

    p3.agreeToTeach(sec1);

    p2.agreeToTeach(sec2);

    p1.agreeToTeach(sec3);

    p3.agreeToTeach(sec4);

    p1.agreeToTeach(sec5);

    p2.agreeToTeach(sec6);

    p3.agreeToTeach(sec7);

    ```


    We then simulate student registration by having `Student`s enroll in the various
    `Section`s using the `enroll` method. Recall that this method returns one of a
    set of predefined status values as defined by our `EnrollmentStatus enum`(eration),
    and so in order to display which status is returned in each case, we created a
    “housekeeping” `reportStatus` method solely for the purpose of formatting an informational
    message:


    ```

    System.out.println("===============================");

    System.out.println("Student registration has begun!");

    System.out.println("===============================");

    System.out.println();

    // Simulate students attempting to enroll in sections of

    // various courses.

    System.out.println("Student " + s1.getName() +

    " is attempting to enroll in " +

    sec1.toString());

    EnrollmentStatus status = sec1.enroll(s1);

    this.reportStatus(status);

    ```


    Since the preceding three lines of code—the `println`, `enroll`, and `reportStatus`
    method calls—are going to be repeated multiple times, we have written a “housekeeping”
    method called `attemptToEnroll` that does these three things and will use the
    more concise `attemptToEnroll(...)` syntax for the remainder of this program.
    (The `attemptToEnroll` method is discussed separately shortly.)


    ```

    // Try concurrently enrolling the same Student in a different Section

    // of the SAME Course!  This should fail.

    attemptToEnroll(s1, sec2);

    // This enrollment request should be fine ...

    attemptToEnroll(s2, sec2);

    // ... but here, the student in question hasn''t satisfied the

    // prerequisities, so the enrollment request should be rejected.

    attemptToEnroll(s2, sec3);

    // These requests should both be fine.

    attemptToEnroll(s2, sec7);

    attemptToEnroll(s3, sec1);

    // When the dust settles, here''s what folks wound up

    // being SUCCESSFULLY registered for:

    //

    // sec1:  s1, s3

    // sec2:  s2

    // sec7:  s2

    ```


    Next, we simulate the assignment of grades at the end of the semester by invoking
    the `postGrade` method for each `Student`-`Section` combination:


    ```

    // Semester is finished (boy, that was quick!). Professors

    // assign grades for specific students.

    sec1.postGrade(s1, "C+");

    sec1.postGrade(s3, "A");

    sec2.postGrade(s2, "B+");

    sec7.postGrade(s2, "A-");

    ```


    Finally, we put our various `display` methods to good use by displaying the internal
    state of the various objects that we created—in essence, an “object dump”:


    ```

    // Let''s see if everything got set up properly

    // by calling various display() methods.

    System.out.println("====================");

    System.out.println("Schedule of Classes:");

    System.out.println("====================");

    System.out.println();

    scheduleOfClasses.display();

    System.out.println("======================");

    System.out.println("Professor Information:");

    System.out.println("======================");

    System.out.println();

    p1.display();

    p2.display();

    p3.display();

    System.out.println("====================");

    System.out.println("Student Information:");

    System.out.println("====================");

    System.out.println();

    s1.display();

    s2.display();

    s3.display();

    }

    ```


    Here is the `attemptToEnroll` housekeeping method mentioned earlier, along with
    the `reportStatus` method that it in turn uses:


    ```

    private static void reportStatus(EnrollmentStatus s) {

    System.out.println("Status:  " + s.value());

    System.out.println();

    }

    private static void attemptToEnroll(Student s, Section sec) {

    System.out.println("Student " + s.getName() +

    " is attempting to enroll in " +

    sec.toString());

    // Utilize one housekeeping method from within another!

    reportStatus(sec.enroll(s));

    }

