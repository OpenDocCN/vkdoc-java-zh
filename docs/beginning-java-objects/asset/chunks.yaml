    \ Collection](#78624_3_En_6_Chapter.xhtml#Sec5) [Ordered Lists](#78624_3_En_6_Chapter.xhtml#Sec6)\
    \ [Dictionaries](#78624_3_En_6_Chapter.xhtml#Sec7) [Sets](#78624_3_En_6_Chapter.xhtml#Sec8)\
    \ [Arrays As Simple Collections](#78624_3_En_6_Chapter.xhtml#Sec9) [Declaring\
    \ and Instantiating Arrays](#78624_3_En_6_Chapter.xhtml#Sec10) [Accessing Individual\
    \ Array Elements](#78624_3_En_6_Chapter.xhtml#Sec11) [Initializing Array Contents](#78624_3_En_6_Chapter.xhtml#Sec12)\
    \ [Manipulating Arrays of Objects](#78624_3_En_6_Chapter.xhtml#Sec13) [A More\
    \ Sophisticated Type of Collection: The ArrayList Class](#78624_3_En_6_Chapter.xhtml#Sec14)\
    \ [Using the ArrayList Class: An Example](#78624_3_En_6_Chapter.xhtml#Sec15) [Import\
    \ Directives and Packages](#78624_3_En_6_Chapter.xhtml#Sec16) [The Namespace of\
    \ a Class](#78624_3_En_6_Chapter.xhtml#Sec17) [User-Defined Packages and the Default\
    \ Package](#78624_3_En_6_Chapter.xhtml#Sec18) [Generics](#78624_3_En_6_Chapter.xhtml#Sec19)\
    \ [ArrayList Features](#78624_3_En_6_Chapter.xhtml#Sec20) [Iterating Through ArrayLists](#78624_3_En_6_Chapter.xhtml#Sec21)\
    \ [Copying the Contents of an ArrayList into an Array](#78624_3_En_6_Chapter.xhtml#Sec22)\
    \ [The HashMap Collection Class](#78624_3_En_6_Chapter.xhtml#Sec23) [The TreeMap\
    \ Class](#78624_3_En_6_Chapter.xhtml#Sec24) [The Same Object Can Be Simultaneously\
    \ Referenced by Multiple Collections](#78624_3_En_6_Chapter.xhtml#Sec25) [Inventing\
    \ Our Own Collection Types](#78624_3_En_6_Chapter.xhtml#Sec26) [Approach #1: Designing\
    \ a New Collection Class from Scratch](#78624_3_En_6_Chapter.xhtml#Sec27) [Approach\
    \ #2: Extending a Predefined Collection Class (MyIntCollection)](#78624_3_En_6_Chapter.xhtml#Sec28)\
    \ [Approach #3: Encapsulating a Standard Collection (MyIntCollection2)](#78624_3_En_6_Chapter.xhtml#Sec33)\
    \ [Trade-Offs of Approach #2 vs. Approach #3](#78624_3_En_6_Chapter.xhtml#Sec35)\
    \ [Collections As Method Return Types](#78624_3_En_6_Chapter.xhtml#Sec36) [Collections\
    \ of Derived Types](#78624_3_En_6_Chapter.xhtml#Sec37) [Revisiting Our Student\
    \ Class Design](#78624_3_En_6_Chapter.xhtml#Sec38) [The courseLoad Attribute of\
    \ Student](#78624_3_En_6_Chapter.xhtml#Sec39) [The transcript Attribute of Student](#78624_3_En_6_Chapter.xhtml#Sec40)\
    \ [The transcript Attribute, Take 2](#78624_3_En_6_Chapter.xhtml#Sec41) [Our Completed\
    \ Student Data Structure](#78624_3_En_6_Chapter.xhtml#Sec42) [Summary](#78624_3_En_6_Chapter.xhtml#Sec43)\n\
    \nYou learned about the process of creating objects based on class definitions,\
    \ a process known as **instantiation**, in Chapter [3](#78624_3_En_3_Chapter.xhtml).\
    \ When we’re only creating a few objects, we can afford to declare individualized\
    \ reference variables for these objects: `Student`s `s1`, `s2`, and `s3`, perhaps,\
    \ or `Professor`s `profA`, `profB`, and `profC`. But, at other times, individualized\
    \ reference variables are impractical:\n\n*   Sometimes, there will be too many\
    \ objects, as when creating `Course` objects to represent the hundreds of courses\
    \ in a university’s course catalog.\n*   Worse yet, we may not even ***know***\
    \ how many objects of a particular type we’ll need to instantiate at ***run time***\
    \ and so cannot declare a predefined number of reference variables at ***compile\
    \ time***.\n\nFortunately, OOPLs solve this problem by providing a special category\
    \ of object called a **collection** that is used to hold and organize references\
    \ to other objects.\n\nIn this chapter, you’ll learn about:\n\n*   The properties\
    \ of three generic collection types: **ordered lists**, **sets**, and **dictionaries**\n\
    *   The specifics of several different predefined Java collection types/classes,\
    \ along with how we represent and manipulate classic arrays in Java\n*   How logically\
    \ related classes like collections are bundled together in Java into **packages**\
    \ and how we must **import** packages if we wish to make use of the classes that\
    \ they contain\n*   How collections enable us to model very sophisticated real-world\
    \ concepts or situations\n*   Design techniques for inventing our own collection\
    \ types\n\n## What Are Collections?\n\nWe’d like a way to gather up objects as\
    \ they are created so that we can manage them as a group and operate on them collectively,\
    \ along with referring to them individually when necessary, for example:\n\n*\
    \   A professor may wish to step through all `Student` objects registered for\
    \ a particular course that the professor is teaching in order to assign their\
    \ final semester grades.\n*   The Student Registration System (SRS) application\
    \ as a whole may need to iterate through all of the `Course` objects in the current\
    \ schedule of classes to determine if any of them should be canceled due to insufficient\
    \ enrollment.\n\nWe use a special type of object called a **collection** to organize\
    \ other objects. Think of a collection like an egg carton and the objects it holds\
    \ like the eggs: both the egg carton and the eggs are objects, but with decidedly\
    \ different properties.\n\n### Collections Are Defined by Classes and Must Be\
    \ Instantiated\n\nThe Java language predefines a number of different collection\
    \ classes. As with any class, a collection object must be instantiated before\
    \ it can be put to work. That is, if we merely declare a reference variable to\
    \ be of a collection type\n\n```\nCollectionType x;\n```\n\nfor example\n\n```\n\
    ArrayList x;  // ArrayList is one of Java's predefined collection types.\n```\n\
    \nthen until we “hand” `x` a ***specific*** collection object to ***refer*** to,\
    \ `x` is said to be undefined.\n\nNote the use of less-than greater-than symbols\
    \ to surround/specify the type of object the collection is to manage: `ArrayList<Student>`.\
    \ We will discuss the concept of generics a bit later in this chapter.\n\nWe must\
    \ take the distinct step of using the `new` operator to invoke a specific constructor\
    \ for the type of collection that we wish to create:\n\n```\nx = new CollectionType();\n\
    ```\n\nFor example:\n\n```\nx = new ArrayList();\n```\n\nThink of the newly created\
    \ collection object as an ***empty*** egg carton and the reference variable referring\
    \ to the collection as the handle that allows us to locate and access—***reference***—this\
    \ “egg carton” in the JVM’s memory whenever we’d like.\n\nIf we leave the element\
    \ type off the instantiation statement, as in\n\n```\nx = new ArrayList();\n```\n\
    \nthen the element type is implied by the declaration of `x` to be `Student`.\
    \ I prefer to explicitly list the element type."
