    public class Person {

    // 属性……细节省略。

    // 如果显式编写，Person 的默认无参构造函数本质上如下所示：

    public Person() {

    // 调用 Object 类的默认构造函数。

    super();

    }

    // 方法……细节省略。

    }

    //--------------------------------------------

    // Student.java

    public class Student extends Person {

    // 属性……细节省略。

    // 如果显式编写，Student 的默认无参构造函数本质上如下所示：

