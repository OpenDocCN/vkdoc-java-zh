- fmt: '### The `transcript` Attribute, Take 2


    We’ll add a bit more sophistication to our abstraction by declaring a class called
    `Transcript` to encapsulate a standard type of collection, the technique that
    we employed when creating the `MyIntCollection2` class earlier in this chapter:


    ```

    public class Transcript {

    // The Transcript class ENCAPSULATES a garden variety ArrayList

    // of TranscriptEntry references.

    private ArrayList transcriptEntries;

    // Maintain a handle on the Student to whom this

    // transcript belongs.

    Student owner;

    // Constructor/accessor details omitted.

    // Rather than having client code manufacture a TranscriptEntry object

    // to pass in as an argument, we''ll "disguise" what we are doing a bit.

    public void courseCompleted(Course c, String semester, String grade) {

    // Instantiate and insert a brand-new TranscriptEntry object into the

    // ArrayList - details hidden away!

    transcriptEntries.add(new TranscriptEntry(c, semester, grade));

    }

    // We''ve transferred the logic of the Student class''s printTranscript

    // method into the Transcript class''s print method.

    public void print() {

    for (TranscriptEntry te : transcript) {

    te.printTranscriptEntry();

    }

    }

    // etc.

    }

    ```


    Of particular note is the fact that we’ve effectively hidden our use of `TranscriptEntry`
    objects from client code by providing a `courseCompleted` method. This method
    accepts the “raw materials” necessary to create a `TranscriptEntry` object—namely,
    a `Course` reference plus `String`s representing the semester in which the course
    was completed and the grade received—and invokes the `TranscriptEntry` constructor
    from within the privacy of the `courseCompleted` method body. As you’ll see shortly,
    this relieves client code from having to deal with the `TranscriptEntry` class;
    `TranscriptEntry` is now strictly a “helper” class that exists to serve the `Transcript`
    class behind the scenes.


    Chapter [13](#78624_3_En_13_Chapter.xhtml) introduces the notion of **inner classes**,
    a construct used to “bury” the declaration of one class, such as `TranscriptEntry`,
    wholly within another so that it truly is a private type.


    We’ll now go back to the `Student` class and change our declaration of the `transcript`
    attribute from an `ArrayList` to a `Transcript`:


    ```

    public class Student {

    private String name;

    private String studentId;

    // This used to be declared as an ArrayList.

    private Transcript transcript;

    // etc.

    ```


    We can in turn simplify the `printTranscript` method of the `Student` class, to
    take advantage of delegation—it’s now a one-liner!


    ```

    public void printTranscript() {

    // We now DELEGATE the work of printing all entries to

    // the Transcript itself!

    transcript.print();

    }

    // etc.

    ```


    Finally, let’s look at the client code that might be involved in putting these
    new and improved classes to work. I’ve repeated the client code example used before,
    bolding the subset of client code that has changed as a result of our improved
    design:


    ```

    Student s = new Student("1234567", "James Huddleston");

    Course c = new Course("LANG 800", "Advanced Language Studies");

    s.registerForCourse(c);

    // Time passes ... details omitted.

    // Semester is finished!  Assign a grade to this student (he''s brilliant!).

    // It''s now accomplished as a single line of arguably more intuitive code.

    s.courseCompleted(c, "Spring 2006", "A+");

    // Additional grades assigned for other courses ... details omitted.

    s.printTranscript();

    ```


    The manner in which we’re assigning a grade to a student for a course that they
    have completed—namely, by calling the `courseCompleted` method of `Student`—is
    arguably much clearer and more self-documenting to anyone reading this client
    code than the previous version of client code. Here’s the code before:


    ```

    TranscriptEntry te = new TranscriptEntry(c, "Fall 2006", "B+");

    s.addTranscriptEntry(te);

    ```


    And here’s the code after:


    ```

    s.courseCompleted(c, "Spring 2006", "A+");

    ```


    This “Take 2” approach of introducing two new classes/abstractions—`TranscriptEntry`
    and `Transcript`—is a bit more sophisticated than the first approach, where we
    only introduced `TranscriptEntry` as an abstraction.


    - We’ve simplified the `Student` class considerably. `Student` code needn’t be
    complicated by the details of how transcripts are represented or managed internally
    or even that there is such a thing as a `TranscriptEntry` object—those details
    are hidden inside of the `Transcript` class, as they should be.


    - More significantly, we’ve simplified our client code. The `Student` class need
    be designed and coded only once, but client code written to manipulate `Student`
    objects will potentially occur in countless places across numerous applications.


    Whenever possible, it’s desirable to bury implementation details inside of a class
    rather than exposing client code to such details; this lessens the burden on developers/maintainers
    of client code by lessening the likelihood of logic errors in such code.


    Figure [6-18](#78624_3_En_6_Chapter.xhtml#Fig18) illustrates how `Student`, `Transcript`,
    `ArrayList`, `TranscriptEntry`, and `Course` objects would be “wired together”
    at run time, and Table [6-2](#78624_3_En_6_Chapter.xhtml#Tab2) provides a side-by-side
    comparison of the code used in our two “takes” on representing the notion of student
    transcripts.


    **Table 6-2** Comparing the “Take 1” and “Take 2” Code Versions'
