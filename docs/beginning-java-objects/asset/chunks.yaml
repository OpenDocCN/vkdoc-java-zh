    of an OOPL, Revisited](#78624_3_En_5_Chapter.xhtml#Sec29) [Summary](#78624_3_En_5_Chapter.xhtml#Sec30)


    You learned in Chapter 4 that any two objects can have a “fleeting” relationship
    based on the fact that they exchange messages, in the same way that two strangers
    passing on the street might say “Hello!” to one another. We informally call such
    relationships between objects **behavioral relationships**, because they arise
    out of the behaviors, or actions, taken by one object X relative to another object
    Y.


    With behavioral relationships, object X either is temporarily handed a reference
    to object Y as an argument in a method call or temporarily requests a handle on
    Y from another object Z. However, the emphasis is on ***temporary***: when X is
    finished communicating with Y, object X often discards the reference to Y.


    In the same way that you have significant and more lasting relationships with
    some people (family members, friends, colleagues), there is also the notion of
    a more permanent relationship between objects. We informally refer to such relationships
    as **structural relationships** because, in order to keep track of such relationships,
    an object actually maintains long-term references to its related objects in the
    form of attributes, a technique that we discussed in Chapter 3.


    In this chapter, you’ll learn


    *   The various kinds of structural relationships that can be defined between
    classes, which in turn govern how individual objects may be linked together at
    run time


    *   How a powerful OOPL mechanism called **inheritance** enables us to derive
    new classes by describing only how they differ from existing classes


    *   The rules for what we can and can’t do when deriving classes through inheritance


    *   How we must refine our understanding of (a) constructors and (b) accessibility
    of features when inheritance is at work


    ## Associations and Links


    The formal name for a structural relationship that exists between classes is an
    **association**. With respect to the Student Registration System, some sample
    associations might be as follows:


    *   A `Student` ***is enrolled in*** a `Course`.


    *   A `Professor` ***teaches*** a `Course`.


    *   A `DegreeProgram` ***requires*** a `Course`.


    Whereas an association refers to a relationship between ***classes***, the term
    **link** is used to refer to a structural relationship that exists between two
    specific ***objects*** (***instances***). Given the association “a `Student` ***is
    enrolled in*** a `Course`,” we might have the following links:


    *   Chloe Shylow (a particular `Student` object) is enrolled in Math 101 (a particular
    `Course` object).


    *   Fred Schnurd (a particular `Student` object) is enrolled in Basketweaving
    972 (a particular `Course` object).


    *   Mary Smith (a particular `Student` object) is enrolled in Basketweaving 972
    (a particular `Course` object—as it turns out, the ***same*** `Course` object
    that Fred Schnurd is linked to).


    In the same way that an object is a specific instance of a class with its attribute
    values filled in, a link may be conceptually thought of as a specific instance
    of an association with its participating objects filled in, as illustrated in
    Figure 5-1.


    ![](images/78624_3_En_5_Chapter/78624_3_En_5_Fig1_HTML.jpg)


    A template for creating links. It consists of a text that reads, Association,
    blank space is enrolled in blank space. The line below reads, Link, James Conroy
    is enrolled in Physics E D 311.


    Figure 5-1


    An association is a template for creating links


    Yet another way to think of the difference between an association and a link is
    that


    *   An association is a ***potential*** relationship between objects of a certain
    type/class.


    *   A link is an ***actual*** relationship between objects of those particular
    types.


    For example, given any `Student` object X and any `Course` object Y, there is
    the ***potential*** for a link of type *is enrolled in* to exist between those
    two objects ***precisely because*** there is an *is enrolled in* association defined
    between the two classes that those objects belong to. In other words, ***associations
    enable links***.


    Most associations arise between two ***different*** classes; such associations
    are known as **binary associations**. The *is enrolled in* association, for example,
    is a binary association, because it interrelates two different classes—`Student`
    and `Course`. A **unary**, or **reflexive association**, on the other hand, is
    between two instances of the ***same class***, for example:


    *   A `Course` ***is a prerequisite for*** (another) `Course`(s).


    *   A `Professor` ***supervises*** (other) `Professor`(s).


    Even though the two classes specified at either end of a reflexive association
    are the same, the ***objects*** are typically different instances of that class:


    *   Math 101 (a `Course` object) is a prerequisite for Math 202 (a ***different***
    `Course` object).


    *   Professor Smith (a `Professor` object) supervises Professors Jones and Green
    (other `Professor` objects).


    Although somewhat rare, there can be situations in which the ***same*** object
    can serve in both roles of a reflexive relationship. For example, with regard
    to the association “a Professor ***is the chairman who represents*** other Professors,”
    the actual Professor who is the chair of a given department would be their own
    representative.


    Higher-order associations are also possible. A **ternary association** involves
    three classes—for example, “a `Student` takes a `Course` from a particular `Professor`,”
    as illustrated in Figure 5-2.


    ![](images/78624_3_En_5_Chapter/78624_3_En_5_Fig2_HTML.png)


    Three interconnected lines in different directions have the texts student, professor,
    and course at the vertices.


    Figure 5-2


    A ternary association'
