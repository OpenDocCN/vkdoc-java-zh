- fmt: '### Compiling Java Source Code into Bytecode


    To compile Java source code from the command line, we use the `cd` command, as
    necessary, to navigate into the working directory where our source code resides.
    We then type the following command:


    ```

    javac sourcecode_filename

    ```


    For example:


    ```

    javac SimpleProgram.java

    ```


    to compile it.


    If there were more than one `.java` source code file in the same directory, we
    could either list the names of the files to be compiled, separated by spaces:


    ```

    javac Foo.java Bar.java Another.java

    ```


    or use the wildcard character (`*`), for example:


    ```

    javac *.java

    ```


    to compile multiple files at the same time.


    If all goes well—namely, if no compiler errors arise—then a bytecode file by the
    name of `SimpleProgram.class` will appear in the same directory where the `SimpleProgram.java`
    source code file resides. If compiler errors do arise, on the other hand, we of
    course must correct our source code and attempt to recompile it.


    ### Executing Bytecode


    Once a program has been successfully compiled, we execute the bytecode version
    via the command:


    ```

    java bytecode_filename     (note that we OMIT the .class suffix)

    ```


    For example:


    ```

    java SimpleProgram

    ```


    Note that it’s important to **omit** the `.class` suffix of the bytecode file
    name (which is `SimpleProgram.class` in this case). Typing the suffix will result
    in the error shown in the following:


    ```

    Exception in thread "main" java.lang.NoClassDefFoundError: SimpleProgram/java

    ```


    By default, the JVM will look in your default working directory for such bytecode
    files. If the JVM finds the specified bytecode file, it executes its `main` method,
    and your program is off and running!


    If for some reason the bytecode you are trying to execute is not in this default
    location, you must inform the JVM of additional directories in which to search,
    known as **specifying a classpath**. You can do so by specifying a list of directories
    (separated by semicolons (`;`) under Windows or by colons (`:`) under Linux and
    macOS) after the `-cp` flag on the `java` command as follows:


    ```

    java –cp list_of_directory_names_to_be_searched bytecode_filename

    ```


    For example, on Windows:


    ```

    java –cp C:\home\javastuff;D:\reference\workingdir;S:\foo\bar\files SimpleProgram

    ```


    At a minimum, we typically want the JVM to search our **current working directory**
    for bytecode files. This happens by default if no `-cp` value is provided:


    ```

    java SimpleProgram

    ```


    but it’s generally a best practice to specify the current working directory as
    a single period (`.`), which is the Windows/Linux/macOS shorthand for “the current
    working directory,” as a classpath entry, for example:


    ```

    java –cp  .  SimpleProgram

    ```


    or, when multiple entries are needed in the classpath, to specify “.” as one of
    the entries, for example, on Windows:


    ```

    java –cp C:\home\javastuff;D:\reference\workingdir;. SimpleProgram

    ```


    Now that we’ve looked at the mechanics of compiling and running Java programs,
    let’s explore some of the basic syntax features of Java in more detail.


    ## Primitive Types


    Java is said to be a **strongly typed** programming language in that when a variable
    is declared, its type must also be declared. Among other things, declaring a variable’s
    type tells the compiler how much memory to allocate for the variable at run time
    and also constrains the contexts in which that variable may subsequently be used
    in our program.


    The Java language defines eight **primitive types** (all eight of these type names
    are Java keywords), as follows.


    Four types of **integer** numeric data:


    *   `byte`: 8-bit unsigned integer

    *   `short`: 16-bit signed integer

    *   `int`: 32-bit signed integer

    *   `long`: 64-bit signed integer


    Two **floating-point** numeric types:


    *   `float`: 32-bit single-precision floating point

    *   `double`: 64-bit double-precision floating point


    Plus two additional primitive types:


    *   `char`: A single character, stored using 16-bit Unicode encoding (vs. 8-bit
    ASCII encoding), enabling Java to handle a wide range of international character
    sets.

    *   `boolean`: A variable that may only assume one of two values: `true` or `false`
    (both of these values are reserved words in Java). Boolean variables are often
    used as flags to signal whether or not some code should be conditionally performed,
    as in the following code snippet:


    ```

    boolean error = false;  // Initialize the flag.

    // ...

    // Later in the program (pseudocode):

    if (some error situation arises) {

    // Set the flag to true to signal that an error has occurred.

    error = true;

    }

    // ...

    // Still later in the program:

    // Test the flag’s value.

    if (error == true) {

    // Pseudocode.

    take corrective action ...

    }

    ```


    We’ll talk specifically about the syntax of the `if` statement, one of several
    different kinds of Java flow control statements, a bit later in this chapter.


    ### An important reminder


    If you wish to attempt to compile any of the Java code snippets that you come
    across throughout the book, remember that (a) pseudocode (*italicized*) won’t
    compile and (b) all code must, at a minimum, be enclosed within a `main` method,
    which in turn must be enclosed within a `class` declaration, as was illustrated
    in Figure [2-5](#78624_3_En_2_Chapter.xhtml#Fig5).


    ## Variables


    Before a variable can be used in a Java program, the type and name of the variable
    must be **declared** to the Java compiler, for example:


    ```

    int count;

    ```


    Assigning a value to a variable is accomplished by using the Java **assignment
    operator**, an equal sign (`=`). An assignment statement consists of a (previously
    declared) variable name to the left of the `=` and an expression that evaluates
