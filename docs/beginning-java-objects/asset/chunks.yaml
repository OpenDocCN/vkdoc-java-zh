    ## The Object Nature of Strings


    In Chapter [2](#78624_3_En_2_Chapter.xhtml), we introduced the `String` type along
    with eight other primitive Java types: `int`, `double`, `char`, `boolean`, `float`,
    `byte`, `short`, and `long`. At that time, we emphasized the fact that the symbol
    “`String`” must be capitalized, whereas the other eight type names are expressed
    in all lowercase. What we ***didn’t*** make clear at the time is that `String`
    is a ***reference type***`—`that is, variables declared to be of type `String`
    refer to ***objects***. (Recall from our discussion in Chapter [3](#78624_3_En_3_Chapter.xhtml)
    that variables declared to be one of the primitive types in Java do ***not***
    refer to objects.)


    ```

    // s refers to an OBJECT of type String.

    String s = "Java";

    ```


    Thus, `String` is said to be a reference type whose structural and behavioral
    characteristics are defined by the `String` class, one of the classes defined
    within the core `java.lang` package.'
