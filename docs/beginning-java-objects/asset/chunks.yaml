    We also have to take care when stepping through an array of object references
    to avoid “land mines” due to empty/`null` elements. That is, if we’re iterating
    through an array, but the array isn’t completely filled with `Student` object
    references, then our invocation of the `getName` method will fail as soon as we
    reach the first empty/`null` element, because in essence we’d be trying to talk
