    \ many active objects simultaneously. Thus, a Java programmer cannot be totally\
    \ oblivious to memory management; managing memory is just less error-prone in\
    \ Java than it is in C/C++.\n\n## Objects As Attributes\n\nWhen I first discussed\
    \ the attributes and methods associated with the `Student` class, I stated that\
    \ some of the attributes could be represented by predefined types provided by\
    \ the Java language, whereas the types of a few others (`advisor`, `courseLoad`,\
    \ and `transcript`) were temporarily left unspecified. Let’s now put what you’ve\
    \ learned about user-defined types to good use with respect to one of these attributes:\
    \ the `Student` class’s `advisor` attribute.\n\nRather than declaring the `advisor`\
    \ attribute as simply a `String` representing the advisor’s name, we’ll declare\
    \ it to be of user-defined type—namely, type `Professor`, another class that we’ve\
    \ invented. This attribute type is reflected in Table [3-2](#78624_3_En_3_Chapter.xhtml#Tab2).\n\
    \nTable 3-2\n\nStudent Class Attributes Revisited\n\n| Attribute | Type |\n| ---\
    \ | --- |\n| `name` | `String` |\n| `studentID` | `String` |\n| `birthDate` |\
    \ `Date` |\n| `address` | `String` |\n| `major` | `String` |\n| `gpa` | `double`\
    \ |\n| **advisor** | **Professor** |\n| `courseLoad` | ??? |\n| `transcript` |\
    \ ??? |\n\nThis is reflected as well as in our `Student` class declaration:\n\n\
    ```\npublic class Student {\n// Attribute declarations typically appear first\
    \ ...\nString name;\nString studentId;\nDate birthDate;\nString address;\nString\
    \ major;\ndouble gpa;\n// A class is a user-defined type, and so we may declare\
    \ attributes\n// to be of such a type.\nProfessor advisor;\n// type? courseLoad\
    \ - we'll declare this attribute later.\n// type? transcript – ditto.\n// ...\
    \ followed by method declarations (details omitted for now).\n}\n```\n\nBy having\
    \ declared the `advisor` attribute to be of type `Professor`—that is, by having\
    \ the `advisor` attribute serve as a ***reference variable***—we’ve just enabled\
    \ a `Student` object to maintain a handle on the actual `Professor` object that\
    \ represents the professor who is advising the student.\n\nThe `Professor` class,\
    \ in turn, might be defined to have the attributes listed in Table [3-3](#78624_3_En_3_Chapter.xhtml#Tab3).\n\
    \nTable 3-3\n\nProfessor Class Attributes\n\n| Attribute | Type |\n| --- | ---\
    \ |\n| `Name` | `String` |\n| `employeeID` | `String` |\n| `birthdate` | `Date`\
    \ |\n| `Address` | `String` |\n| `worksFor` | `String (or Department)` |\n| **Advisee**\
    \ | **Student** |\n| `teachingAssignments` | ??? |\n\nAgain, by having declared\
    \ the `advisee` attribute to be of type `Student`—that is, by making the `advisee`\
    \ attribute a reference variable—we’ve just given a `Professor` object a way to\
    \ hold on to/refer to the actual `Student` object that represents the student\
    \ whom the professor is advising.\n\nThe methods of the `Professor` class might\
    \ be as follows:\n\n*   `transferToDepartment`\n\n*   `adviseStudent`\n\n*   `agreeToTeachCourse`\n\
    \n*   `assignGrades`\n\n*   And so forth\n\nJust as we did for the `Student` class\
    \ earlier in the chapter, we’d render this `Professor` class design in Java code\
    \ as follows:\n\n```\npublic class Professor {\n// Attributes.\nString name;\n\
    String employeeId;\nDate birthDate;\nString address;\nString worksFor;\nStudent\
    \ advisee;\ndouble gpa;\n// type? teachingAssignments – we'll declare this attribute\
    \ later.\n// ... followed by method declarations (details omitted for now).\n\
    }\n```\n\nThis class definition would reside in a source file named `Professor.java`\
    \ and would be subsequently compiled into bytecode form as a file named `Professor.class`.\n\
    \nNote that, as mentioned earlier for the `Student` class, we’d need to insert\
    \ the declaration\n\n`import java.util.Date;`\n\nahead of the declaration\n\n\
    `public class Professor { ... }`\n\nin order for the code to compile properly.\n\
    \nThe following are a few noteworthy points about the `Professor` class:"
