    // protected in Person.

    }

    }

    ```


    This would be a step in the right direction, but unfortunately requires us to
    modify the source code of the `Person` class, which we’d like to avoid if at all
    possible. Furthermore, we may not even **have** the `Person` source code at our
    disposal.


    **Option #3**: The **best** approach is to allow `age` to **remain** a `private`
    attribute of `Person`, but to use the **publicly accessible** `getAge`/`setAge`
    methods that we inherit from the `Person` class to manipulate the value of a `Student`’s
    age:


    ```java

