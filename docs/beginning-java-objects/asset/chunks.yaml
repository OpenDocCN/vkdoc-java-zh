  trans: '

    # 10. 系统静态/数据方面的建模


    识别合适的类 名词短语分析 精炼候选类列表 重新审视用例 生成数据字典 确定类之间的关联 关联矩阵 识别属性 UML 表示法：对抽象的静态方面进行建模 类、属性和操作
    类之间的关系 反映多重性 对象/实例图 作为属性的关联 信息沿关联“管道”“流动” 关系表示法的“混合与匹配” 关联类 我们“已完成”的学生注册系统类图 元数据
    总结


    在第 9 章中，我们运用用例分析技术完善了学生注册系统（SRS）的需求规格说明，现在已准备好进入下一阶段的建模，即确定如何以面向对象的方式满足这些需求。


    我们在本书的第一部分看到，对象构成了面向对象系统的基本构建块，而类则是用于定义和实例化对象的模板。因此，一个面向对象模型必须指定以下内容：


    *   ***我们需要创建和实例化哪些类型的对象，以表示正确的抽象***：具体来说，包括它们的属性、方法以及彼此之间的结构关系。由于面向对象系统的这些元素一旦建立，就相当静态——就像一栋房子一旦建成，就有特定的布局、一定数量的房间、特定的屋顶轮廓线等等——我们通常将这个过程称为准备**静态模型**。


    当然，随着时间的推移，我们可以通过进行翻新项目来改变房子的静态结构，就像随着新需求的出现，我们可以通过派生新的子类、为现有类发明新方法等来改变面向对象软件系统的静态结构一样。然而，如果一个结构——无论是房屋还是软件系统——从一开始就设计得当，那么在其生命周期内，进行此类更改的需求应该相对较少出现，并且不应过于难以适应。


    *   ***这些对象将如何协作，以完成系统的整体需求或“使命”***：对象交互的方式实际上可能根据生效的环境而随时变化。前一时刻，一个`Course`对象可能正在注册一个`Student`对象，下一时刻，它可能正在响应一个`Professor`对象关于当前学生人数的查询。我们将详细描述对象协作的过程称为准备**动态模型**。可以将其想象成房屋中发生的所有不同的日常活动：结构相同，功能不同。


    静态模型和动态模型只是同一枚硬币的两面：它们共同构成了面向对象的“蓝图”，我们将在本书第三部分实现面向对象的学生注册系统应用程序的模型层时，以此为基础进行工作。


    在本章中，我们将重点构建 SRS 的静态模型，而将动态模型的讨论留到第 11 章。你将学习


    *   一种识别合适类及其属性的技术


    *   如何确定这些类之间存在的结构关系


    *   如何使用 UML 表示法以**类图**的形式图形化地呈现这些信息


    ## 识别合适的类


    我们在对象建模中的第一个挑战是确定需要哪些类作为系统的构建块。不幸的是，类识别的过程相当“模糊”；它在很大程度上依赖于直觉、先前的建模经验，以及对要开发的系统主题领域或**领域**的熟悉程度。那么，一个对象建模新手究竟***如何***开始呢？一种经过验证（但有些繁琐）的识别候选类的过程是使用“搜寻与收集”方法：即从项目文档集中搜寻并收集所有名词/名词短语的列表，然后使用排除法将这个列表精简为一组合适的类。


    就 SRS 而言，到目前为止，我们的文档集包括以下内容：


    *   需求规格说明


    *   我们在第 9 章中准备的用例模型

    '
- fmt: "### Noun Phrase Analysis\n\nLet’s perform noun phrase analysis on the SRS\
    \ requirements specification first, which was originally presented in the Introduction\
    \ to the book, a copy of which is provided in the following sidebar. All noun\
    \ phrases are highlighted in bold.\n\n**HIGHLIGHTING NOUN PHRASES IN THE SRS SPECIFICATION**\n\
    \nWe have been asked to develop an automated Student Registration System (`SRS`)\
    \ for the university. This system will enable students to register online for\
    \ courses each semester, as well as track their progress toward completion of\
    \ their degree.\n\nWhen a student first enrolls at the university, they use the\
    \ `SRS` to set forth a plan of study as to which courses they plan on taking to\
    \ satisfy a particular degree program and choose a faculty advisor. The `SRS`\
    \ will verify whether or not the proposed plan of study satisfies the requirements\
    \ of the degree that the student is seeking.\n\nOnce a plan of study has been\
    \ established, then, during the registration period preceding each semester, students\
    \ are able to view the schedule of classes online and choose whichever classes\
    \ they wish to attend, indicating the preferred section (day of the week and time\
    \ of day) if the class is offered by more than one professor. The `SRS` will verify\
    \ whether or not the student has satisfied the necessary prerequisites for each\
    \ requested course by referring to the student’s online transcript of courses\
    \ completed and grades received (the student may review their transcript online\
    \ at any time).\n\nAssuming that (a) the prerequisites for the requested course(s)\
    \ are satisfied, (b) the course(s) meet(s) one of the student’s plan of study\
    \ requirements, and (c) there is room available in each of the class(es), the\
    \ student is enrolled in the class(es).\n\nIf (a) and (b) are satisfied, but (c)\
    \ is not, the student is placed on a first-come, first-served waitlist. If a class/section\
    \ that they were previously waitlisted for becomes available (either because some\
    \ other student has dropped the class or because the seating capacity for the\
    \ class has been increased), the student is automatically enrolled in the waitlisted\
    \ class, and an email message to that effect is sent to the student. It is the\
    \ student’s responsibility to drop the class if it is no longer desired; otherwise,\
    \ the student will be billed for the course.\n\nStudents may drop a class up to\
    \ the end of the first week of the semester in which the class is being taught.\n\
    \nA simple spreadsheet serves as an ideal tool for recording our initial findings;\
    \ we enter noun phrases as a single-column list in the order in which they occur\
    \ in the specification. Don’t worry about trying to eliminate duplicates or consolidating\
    \ synonyms just yet; we’ll do that in a moment. The resultant spreadsheet is shown\
