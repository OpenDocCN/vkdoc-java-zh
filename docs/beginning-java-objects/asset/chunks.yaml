    使用 UML，无论前面两个矩形如何放置，我们仍然可以始终将关联标记为“*指导*”。


    很容易陷入试图让图表在类的位置、最小化交叉线等方面“完美”的陷阱。请尽量在早期抵制这种冲动，因为在建模工作完成之前，图表不可避免地会被多次修改。


    一元（自反）关联——即属于同一个类的两个不同对象之间的关系——用一条从同一个类矩形出发并返回的关联线来表示。例如，为了描述“一个`课程`*是*（另一个不同的）`课程`的*先修课程*”的关联，我们将使用图
    10-17 中所示的符号。


    ![](img/78624_3_En_10_Fig17_HTML.png)


    一个图表表示两个矩形方块。前景中的方块表示“课程”，背景中的方块表示“先修课程”。


    图 10-17


    涉及`课程`类的自反关联

    '
- fmt: '### Aggregation


    Aggregation, which as you learned in Chapter [5](#78624_3_En_5_Chapter.xhtml)
    is a specialized form of association that happens to imply containment, is differentiated
    from a “normal” association by placing a diamond at the end of the association
    line that touches the “containing” class. For example, to portray the fact that
    a university is comprised of schools—School of Engineering, School of Law, School
    of Medicine, etc.—we’d use the notation shown in Figure [10-18](#78624_3_En_10_Chapter.xhtml#Fig18).


    ![](images/78624_3_En_10_Chapter/78624_3_En_10_Fig18_HTML.png)


    A block diagram represents 2 blocks labeled university and school from top to
    bottom. The school points a diamond shape towards the university.


    Figure 10-18: Indicating aggregation with a diamond


    An aggregation relationship can actually be oriented in any direction, as long
    as the diamond is properly anchored on the “containing” class as shown in Figure
    [10-19](#78624_3_En_10_Chapter.xhtml#Fig19).


    ![](images/78624_3_En_10_Chapter/78624_3_En_10_Fig19_HTML.jpg)


    A diagram represents 3 pairs of rectangular blocks labeled university and school
    with different orientations. In each instance, the school points a diamond shape
    toward the university.


    Figure 10-19: Aggregations can be oriented in any direction


    An aggregation line needn’t be labeled, as it is understood that an aggregation
    implies the “part”-“whole” relationship.


    As mentioned in Chapter [5](#78624_3_En_5_Chapter.xhtml), however, we can get
    by without ever using aggregation! To represent the preceding concept, we could
    have just created a simple association between the `University` and `School` classes
    and labeled it “*is composed of*” as shown in Figure [10-20](#78624_3_En_10_Chapter.xhtml#Fig20).


    ![](images/78624_3_En_10_Chapter/78624_3_En_10_Fig20_HTML.jpg)


    A block diagram denotes 2 blocks labeled university on the left and school on
    the right. A text in the middle explains the university is composed of the school.


    Figure 10-20: A simple association as an alternative to an aggregation


    The decision of whether to use aggregation vs. plain association is subtle, because
    it turns out that both can be rendered in code in essentially the same way, as
    you’ll see in Part 3 of the book.


    Unlike association lines, which should always be labeled with the name of the
    association that they represent, aggregation lines are typically not labeled,
    since an aggregation by definition implies containment.


    When two or more different classes represent “parts” of some other “whole,” each
    “part” is involved in a separate aggregation with the “whole,” as shown in Figure
    [10-21](#78624_3_En_10_Chapter.xhtml#Fig21).


    ![](images/78624_3_En_10_Chapter/78624_3_En_10_Fig21_HTML.jpg)


    A diagram denotes a block at the top labeled whole and 2 blocks at the bottom
    labeled part a and part b. The blocks at the bottom point toward the upper block.


    Figure 10-21: Two aggregations, drawn using two diamonds


    However, we often join such aggregation lines into a single structure that looks
    something like an organization chart, as shown in Figure [10-22](#78624_3_En_10_Chapter.xhtml#Fig22).


    ![](images/78624_3_En_10_Chapter/78624_3_En_10_Fig22_HTML.png)


    A diagram denotes a block at the top labeled whole and 2 blocks at the bottom
    labeled part a and part b. The blocks at the bottom combinedly point toward the
    upper block.


    Figure 10-22: Two aggregations involving the same “whole” class, drawn using a
    single diamond


    Doing so is not meant to imply anything about the relationship of Part A to Part
    B; it’s simply a way to clean up the diagram.


    Composition, which as you learned in Chapter [5](#78624_3_En_5_Chapter.xhtml)
    is a strong form of aggregation in which the “parts” cannot exist without the
    “whole,” uses a “filled-in”/“black” diamond rather than an “open”/“white” diamond,
    as illustrated in Figure [10-23](#78624_3_En_10_Chapter.xhtml#Fig23).


    ![](images/78624_3_En_10_Chapter/78624_3_En_10_Fig23_HTML.jpg)


    An illustration represents 2 rectangular blocks labeled chapter and book from
    bottom to top. The chapter point towards the book. A text in the middle reads
    filled diamond.


    Figure 10-23: A filled diamond signals composition, a strong form of aggregation


    ### Inheritance


    Inheritance (generalization/specialization) is illustrated by connecting a derived
    class to its base class with a line and then marking the line with a triangle
    that touches the base class (see Figure [10-24](#78624_3_En_10_Chapter.xhtml#Fig24)).


    ![](images/78624_3_En_10_Chapter/78624_3_En_10_Fig24_HTML.png)


    An illustration represents 2 rectangular blocks labeled professor and person from
    bottom to top. The professor points an arrow toward the person.


    Figure 10-24: Inheritance is designated with a triangle


    As with aggregation, the classes involved in an inheritance relationship can be
    portrayed in any orientation, as long as the triangle points to/touches the base
    class.


    Inheritance lines should **not** be labeled, as they unambiguously represent the
    “is a” relationship.


    As with aggregation, when two or more different classes represent derived classes
    of the same parent class, each derived class is involved in a separate inheritance
    relationship with the parent, as shown in Figure [10-25](#78624_3_En_10_Chapter.xhtml#Fig25),
    but we often join the inheritance lines into a single structure, as illustrated
    in Figure [10-26](#78624_3_En_10_Chapter.xhtml#Fig26).


    ![](images/78624_3_En_10_Chapter/78624_3_En_10_Fig26_HTML.png)


    An illustration represents 2 rectangular blocks at the bottom, labeled subclass
    A and B are merged and point arrows toward a block at the top labeled superclass.


    Figure 10-26: Depicting two derived classes with a single triangle


    ![](images/78624_3_En_10_Chapter/78624_3_En_10_Fig25_HTML.png)


    An illustration represents 2 rectangular blocks at the bottom, labeled subclass
    A and B pointing arrows toward a block labeled superclass, at the top.


    Figure 10-25: Depicting two derived classes with two different triangles


    Doing so isn’t meant to imply anything different about the relationship of derived
    class `A` to derived class `B` as compared with the previous depiction—these classes
    are considered to be sibling classes with a common parent class in both cases.
    It’s simply a way to clean up the diagram.'
