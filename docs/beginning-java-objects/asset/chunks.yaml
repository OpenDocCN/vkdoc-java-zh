  trans: '

    ## Java 与架构无关


    要执行用 C 或 C++ 这类传统编译语言编写的程序，源代码必须首先被编译成一种称为**二进制代码**或**机器代码**的可执行形式。二进制代码本质上是由
    0 和 1 组成的模式，能够被程序运行所依赖的底层**硬件架构**所理解。


    即使原始的 C 或 C++ 源代码被编写成**平台无关**的——也就是说，程序没有利用任何特定于平台的语言扩展，例如特定类型的文件访问或图形用户界面（GUI）操作——最终生成的可执行版本仍然会与特定平台的架构绑定，因此只能在该架构上运行。也就是说，为
    Linux 工作站编译的程序版本无法在 Windows PC 上运行，为 Windows PC 编译的版本无法在 macOS 机器上运行，以此类推。这一概念如图
    2-1 所示。


    ![](img/78624_3_En_2_Fig1_HTML.jpg)


    平台无关的 C 源代码的流程图。它被分为针对 Windows、Linux 和 Sun Solaris 的 C 编译器。每个编译器都生成平台相关的二进制代码。


    图 2-1


    传统编译语言生成平台相关的可执行程序


    相比之下，Java 源代码并非为特定平台编译，而是编译成一种称为**字节码**的特殊中间格式，这种格式被认为是既平台无关又**架构中立**的。也就是说，无论
    Java 程序是在 Windows、Linux、macOS 还是任何其他拥有 Java 编译器的操作系统上编译，生成的字节码都是相同的，因此可以在任何安装了（特定于平台的）Java
    虚拟机（JVM）的计算机上运行。这一点如图 2-2 所示。


    ![](img/78624_3_En_2_Fig2_HTML.jpg)


    平台无关的 Java 源代码的流程图。它被分为针对 Windows、Linux 和 Sun Solaris 的 Java 编译器。每个编译器都生成平台无关的字节码。


    图 2-2


    Java 编译器生成平台无关的字节码


    JVM 是一种特殊的软件，它知道如何**解释**和执行 Java 字节码。也就是说，Java 程序并非像传统编译程序那样直接在操作系统的控制下运行，而是 JVM
    本身在操作系统的直接控制下运行，而我们的 Java 程序则在 JVM 的控制下运行，如图 2-3 所示。JVM 本质上充当了一个翻译器，将通用的 Java
    字节码“语言”翻译成特定计算机能够理解的机器代码（二进制代码）“语言”，就像人类口译员通过翻译对话中的语句来促进说德语和说日语的人之间的讨论一样。


    ![](img/78624_3_En_2_Fig3_HTML.jpg)


    一台计算机的示意图，两侧各有两个部分。左侧是为 C 或 C++ 生成的编译后的二进制代码。右侧是直接运行在硬件架构之上的平台相关的 JVM。它通向被解释的
    Java 字节码。


    图 2-3


    使用平台相关的 JVM 来执行平台无关的字节码


    Java 语言的解释性本质通常使其执行速度比编译语言稍慢一些，因为在应用程序执行时涉及一个额外的处理层，如图 2-3 所示。然而，对于涉及人类用户交互的传统信息系统应用来说，速度上的差异是难以察觉的；其他因素，例如网络速度（对于分布式应用）、数据库管理系统（DBMS）服务器的速度（如果使用了数据库），尤其是人类在响应应用程序用户界面时的“思考时间”，都可能使任何
    JVM 响应时间的延迟相形见绌。


    只要你在给定的目标平台上安装了合适的 JVM，就可以将 Java 字节码从一个平台转移到另一个平台，而无需重新编译原始的 Java 源代码，并且它仍然能够运行。也就是说，字节码是可跨平台转移的，如图
    2-4 所示。


    ![](img/78624_3_En_2_Fig4_HTML.jpg)


    一台计算机和一台笔记本电脑 A 和 B 的两幅示意图，分列两侧。左侧是平台 A 的平台相关 JVM，右侧是平台 B 的平台相关 JVM，它们下方是相同的字节码。


    图 2-4


    完全相同的字节码能被两个不同平台上的 JVM 理解


    伪代码 vs. 真实 Java 代码


    在本书第 1 部分和第 2 部分的代码示例中，我偶尔会使用少量伪代码来隐藏不相关的逻辑细节。为了明确说明我何时使用伪代码而非真实代码，我使用*斜体*而不是`常规
    SansMono 紧缩字体`。


    这是真实的 Java 语法：


    ```

    for (int i = 0; i <= 10; i++) {

    ```


    这是伪代码：


    ```

    compute the grade for the ith Student

    }

    ```


    我会再提醒你几次这个事实，以免你忘记并在过程中不小心尝试输入并编译伪代码。


    ## 一个简单 Java 程序的结构


    图 2-5 展示了一个最简单的 Java 程序。


    ![](img/78624_3_En_2_Fig5_HTML.jpg)


    一个 Java 程序结构，包含三个部分：介绍性注释、类声明和 main 方法。main 方法位于类声明框内。


    图 2-5


    一个简单 Java 程序的结构


    让我们来了解一下我们简单程序的关键元素。


    ### 注释


    在我们的简单 Java 程序中，首先看到的是一个介绍性注释：


    ```

    // This simple program illustrates some basic Java syntax.

    ```


    Java 支持三种不同的注释风格：传统注释、行尾注释和 Java 文档注释。

    '
- fmt: '# Traditional Comments


    Java **traditional comments** derive from the C language and begin with a forward
    slash followed by an asterisk (`/*`) and end with an asterisk followed by a forward
    slash (`*/`). Everything enclosed between these delimiters is treated as a comment
    and is therefore ignored by the Java compiler, no matter how many lines the comment
    spans:


    ```

    /* This is a traditional (C-style) comment. */

    /* This is a multiline traditional comment. This is a handy way to temporarily

    comment out entire sections of code without having to delete them.

    From the time that the compiler encounters the first "slash asterisk"

    above, it doesn''t care what we type here; even legitimate lines of code,

    as shown below, are treated as comment lines and thus ignored by the

    compiler until the first "asterisk slash" combination is encountered.

    x = y + z;

    a = b / c;

    j = s + c + f;

    */

    /* We often use leading asterisks on the second through last line of a traditional

    * comment simply for cosmetic reasons, so that the comment is more visually

    * distinct; but, these extra asterisks are strictly cosmetic – only the

    * initial "slash asterisk" and the final "asterisk slash" are noted by the

    * compiler as having any significance.

    */

    ```


    Note that we can’t **nest** block comments—that is, the following will **not**
    compile:


    ```

    /* This starts a comment ...

    x = 3;

    /* Whoops!  We are mistakenly trying to nest a SECOND comment

    before terminating the FIRST!

    This is going to cause us compilation problems, because the

    compiler is going to IGNORE the start of this second/inner comment -- we''re IN

    a comment already, after all! -- and so as soon as we try to terminate

    this SECOND/inner comment, the compiler will think that we''ve terminated the

    FIRST/outer comment instead ... */

    z = 2;

    // The compiler will "complain" on the next line.

    */

    ```


    When the compiler reaches what we intended to be the terminating `*/` of the “outer”
    comment on the last line of the preceding code example, the following two compilation
    errors will be reported:


    ```

    illegal start of expression

    */

    ^

    ```


    and


    ```

    '';'' expected

    */

    ^

    ```


    # End-of-Line Comments


    The second type of Java comment derives from C++ and is known as an **end-of-line
    comment**. We use a double slash (`//`) to note the beginning of a comment that
    automatically ends when the end of the line is reached, as shown here:


    ```

    x = y + z;   // text of comment continues through to the end of the line ==>

    a = b / c;

    // Here''s a BLOCK of sequential end-of-line comments.

    // This serves as an alternative to using traditional comments

    // (/* ... */) and is preferred by many Java programmers.

    m = n * p;

    ```


    # Java Documentation Comments


    The third and final type of Java comment, **Java documentation comments** (a.k.a.
    **“javadoc comments”**), can be parsed from source code files by a special `javadoc`
    command-line utility program (which comes standard with the Java Development Kit
    [JDK]) and used to automatically generate HTML documentation for an application.


    We’ll defer an in-depth look at javadoc comments until Chapter [13](#78624_3_En_13_Chapter.xhtml).


    # The Class Declaration


    Next comes a **class wrapper**—more properly termed a **class declaration**—of
    the form


    ```

    public class ClassName {

    ...

    }

    ```


    For example:


    ```

    public class SimpleProgram {

    ...

    }

    ```


    where braces `{ ... }` enclose the **class body** that includes the main logic
    of the program along with other optional building blocks of a class.


    In subsequent chapters, you’ll learn all about the significance of classes in
    an OO programming language. For now, simply note that the symbols `public` and
    `class` are two of Java’s **keywords**—that is, symbols reserved for specific
    uses within the Java language—whereas `SimpleProgram` is a name/symbol that I’ve
    invented.


    # The main Method


    Within the `SimpleProgram` class declaration, we find the starting point for the
    program, called the **main method** in Java. (In an object-oriented language,
    functions are referred to as **methods**.) The `main` method serves as the entry
    point for a Java application. When we execute a Java program by interpreting its
    bytecode with an instance of the JVM, the JVM calls the `main` method to jump-start
    our application.


    With trivial applications such as the `SimpleProgram` example, all of the program’s
    logic can be contained within this single `main` method. For more complex applications,
    on the other hand, the `main` method can’t possibly contain all of the logic for
    the entire system. You’ll learn how to construct an application that transcends
    the boundaries of the `main` method, involving multiple Java source code files/classes,
    a bit later in the book.


    The first line of the method, shown here


    ```

    public static void main(String[] args) {

    ```


    defines what is known as the `main` method’s **method header** and should appear
    exactly as shown (for now—we’ll revisit this topic again in Chapter [13](#78624_3_En_13_Chapter.xhtml)).


    Our `main` method’s **method body**, enclosed in braces `{ ... }`, consists of
    a single statement:


    ```

    System.out.println("Hello!");

    ```


    which prints the message


    ```

    Hello!

    ```


    to the command window from which our program is launched. We’ll examine this statement’s
    syntax further in a bit, but for now, note the use of a semicolon (`;`) at the
    end of the statement. Semicolons are placed at the end of all individual Java
    statements. Braces `{ ... }`, in turn, delimit **blocks** of code, the significance
    of which I’ll discuss in more detail a bit later in this chapter.


    Other things that we’d typically do inside of the `main` method of a more elaborate
    program include declaring variables, initializing data, displaying a user interface,
    creating objects, and calling other methods.


    Now that we’ve looked at the anatomy of a simple Java program, let’s get a very
    simple Java development environment set up for you.


    # Setting Up a Simple Java Development Environment


    For folks just getting started with Java programming, I advocate using a simple
    text editor at first so that you aren’t distracted by the bells and whistles of
    a specific IDE and so that the IDE doesn’t do so much work for you that you don’t
    really learn what’s going on at the most basic levels. That being said, an editor
    that understands Java syntax is definitely helpful, and so I personally recommend
    a very inexpensive tool called TextPad, available at [`www.textpad.com/home`](http://www.textpad.com/home).


    Once you have installed TextPad or selected another simple text editor of your
    choice, it’s time to install the Java development environment. Because vendor
    instructions change frequently, it isn’t practical for us to provide step-by-step
    instructions; as of the time of writing of this book, the latest instructions
    can be found on Oracle’s website at [`https://docs.oracle.com/en/java/javase/18/install`](https://docs.oracle.com/en/java/javase/18/install).
    If this link is out of date, please search the `doc.oracle.com` website for the
    latest version of the Java Platform, Standard Edition, JDK Installation Guide.


    Once you’ve gotten your Java development environment up and running, let’s take
    a look at how Java code is compiled and executed.


    # The Mechanics of Java


    The simplest way to compile and execute a Java program regardless of platform
    is via command-line commands.'
  raw: '#### Traditional Comments


    Java **traditional comments** derive from the C language and begin with a forward
    slash followed by an asterisk (`/*`) and end with an asterisk followed by a forward
    slash (`*/`). Everything enclosed between these delimiters is treated as a comment
    and is therefore ignored by the Java compiler, no matter how many lines the comment
    spans:


    ```

    /* This is a traditional (C-style) comment. */

    /* This is a multiline traditional comment. This is a handy way to temporarily

    comment out entire sections of code without having to delete them.

    From the time that the compiler encounters the first "slash asterisk"

    above, it doesn''t care what we type here; even legitimate lines of code,

    as shown below, are treated as comment lines and thus ignored by the

    compiler until the first "asterisk slash" combination is encountered.

    x = y + z;

    a = b / c;

    j = s + c + f;

    */

    /* We often use leading asterisks on the second through last line of a traditional

    * comment simply for cosmetic reasons, so that the comment is more visually

    * distinct; but, these extra asterisks are strictly cosmetic – only the

    * initial "slash asterisk" and the final "asterisk slash" are noted by the

    * compiler as having any significance.

    */

    ```


    Note that we can’t ***nest*** block comments—that is, the following will ***not***
    compile:


    ```

    /* This starts a comment ...

    x = 3;

    /* Whoops!  We are mistakenly trying to nest a SECOND comment

    before terminating the FIRST!

    This is going to cause us compilation problems, because the

    compiler is going to IGNORE the start of this second/inner comment -- we''re IN

    a comment already, after all! -- and so as soon as we try to terminate

    this SECOND/inner comment, the compiler will think that we''ve terminated the

    FIRST/outer comment instead ... */

    z = 2;

    // The compiler will "complain" on the next line.

    */

    ```


    When the compiler reaches what we intended to be the terminating `*/` of the “outer”
    comment on the last line of the preceding code example, the following two compilation
    errors will be reported:


    ```

    illegal start of expression

    */

    ^

