- fmt: '# Polymorphism


    The term **polymorphism** refers to the ability of two or more objects belonging
    to different classes to respond to exactly the same message (method call) in different
    class-specific ways.


    As an example, if we were to instruct three different people—a surgeon, a hair
    stylist, and an actor—to “Cut!” then:


    - The surgeon would begin to make an incision.

    - The hair stylist would begin to cut someone’s hair.

    - The actor would abruptly stop acting out the current scene, awaiting directorial
    guidance.


    These three different professionals may be thought of as `Person` objects belonging
    to different professional subclasses: `Surgeon`, `HairStylist`, and `Actor`. Each
    was given the same message—“Cut!”—but carried out the operation differently as
    prescribed by the subclass that each belongs to.


    Let’s now turn to a software example relevant to the SRS. Assume that we’ve defined
    a `Student` superclass and two subclasses, `GraduateStudent` and `UndergraduateStudent`.
    In Chapter [5](#78624_3_En_5_Chapter.xhtml), we discussed the fact that a `print`
    method designed to print the values of all of a `Student`’s attributes wouldn’t
    necessarily suffice for printing the attribute values for a `GraduateStudent`,
    because the code as written for the `Student` superclass wouldn’t know about any
    attributes that may have been added to the `GraduateStudent` subclass. We then
    looked at how to **override** the `print` method of `Student` to create specialized
    versions of the method for all of its subclasses. The syntax for doing so, which
    was first introduced in Chapter [5](#78624_3_En_5_Chapter.xhtml) with the `GraduateStudent`
    class, is repeated again here for your review. I’ve added the `UndergraduateStudent`
    class code, as well:


    ```

    //-------------

    // Student.java

    //-------------

    public class Student {

    private String name;

    private String studentId;

    private String major;

    private double gpa;

    // Public get/set methods would also be provided (details omitted) ...

    public void print() {

    // We can print only the attributes that the Student class

    // knows about.

    System.out.println("Student Name:  " + getName() + "\n" +

    "Student No.:  " +  getStudentId()  + "\n" +

    "Major Field:  " +  getMajor()  + "\n" +

    "GPA:  " + getGpa());

    }

    }

    //---------------------

    // GraduateStudent.java

    //---------------------

    public class GraduateStudent extends Student {

    // Adding several attributes.

    private String undergraduateDegree;

    private String undergraduateInstitution;

    // Public get/set methods would also be provided (details omitted) ...

    // Overriding the print method.

    public void print() {

    // Reuse code from the Student superclass ...

    super.print();

    // ... and then go on to print this subclass''s specific attributes.

    System.out.println("Undergrad. Deg.: " + getUndergraduateDegree() +

    "\n" + "Undergrad. Inst.:  " +

    getUndergraduateInstitution() + "\n" +

    "THIS IS A GRADUATE STUDENT ...");

    }

    }

    //--------------------------

    // UndergraduateStudent.java

    //--------------------------

    public class UndergraduateStudent extends Student {

    // Adding an attribute.

    private String highSchool;

    // Public get/set methods would also be provided (details omitted) ...

    // Overriding the print method.

    public void print() {

    // Reuse code from the Student superclass ...

    super.print();

    // ... and then go on to print this subclass''s specific attributes.

    System.out.println("High School Attended:  " + getHighSchool() +

    "\n" + "THIS IS AN UNDERGRADUATE STUDENT ...");

    }

    }

    ```


    In our main SRS application, we’ll declare an `ArrayList` called `studentBody`
    to hold references to `Student` objects. We’ll then populate the `ArrayList` with
    `Student` object references—some `GraduateStudent`s and some `UndergraduateStudent`s,
    randomly mixed—as shown here:


    ```

    // Declare and instantiate an ArrayList of Students.

    ArrayList studentBody = new ArrayList();

    // Instantiate various types of Student object.

    UndergraduateStudent u1 = new UndergraduateStudent();

    UndergraduateStudent u2 = new UndergraduateStudent();

    GraduateStudent g1 = new GraduateStudent();

    GraduateStudent g2 = new GraduateStudent();

    // etc.

    // Insert them into the ArrayList in random order.

    studentBody.add(u1);

    studentBody.add(g1);

    studentBody.add(g2);

    studentBody.add(u2);

    // etc.

    ```


    Since we’re storing both `GraduateStudent` and `UndergraduateStudent` objects
    in this `ArrayList`, we’ve declared the `ArrayList` to be of a base type common
    to all objects that the collection is intended to contain, namely, `Student`.
    By virtue of the “is a” nature of inheritance, an `UndergraduateStudent` object
    **is a** `Student`, and a `GraduateStudent` object **is a** `Student`, and so
    the compiler won’t complain when we insert either type of object into this `ArrayList`.


    Note that the compiler **would** object, however, if we tried to insert a `Professor`
    object into the same `ArrayList`, because a `Professor` isn’t a `Student`, at
    least not in terms of the class hierarchy that we’ve defined for the SRS. If we
    wanted to include `Professor`s in our `ArrayList` along with various types of
    `Student`s, we’d have to declare the `ArrayList` as holding a base type common
    to **both** the `Student` and `Professor` classes, namely, `Person` (or `Object`,
    which as we discussed in Chapter [5](#78624_3_En_5_Chapter.xhtml) is the implied
    superclass for all inheritance hierarchies in Java).


    Perhaps we’d like to print the attribute values of all of the `Student`s in our
    `studentBody` collection. We’d want each `Student` object—whether it’s a `GraduateStudent`
    or an `UndergraduateStudent` instance—to use the version of the `print` method
    appropriate for its (sub)class. The following code will accomplish this nicely:


    ```

    // Step through the ArrayList (collection) ...

    for (Student s : studentBody) {

    // ... invoking the print method of each Student object.

    s.print();

    }

    ```


    Variable `s` is declared in the `for` statement to be a reference to a **generic**
    `Student` object, because that’s the type of reference that we declared `studentBody`
    to hold. As we step through this collection of `Student` objects at **run time**,
    however, each object will **automatically** know which version of the `print`
    method it should execute, based on its own internal knowledge of the **specific**
    type/(sub)class that it belongs to (`GraduateStudent` vs. `UndergraduateStudent`,
    in this example). We’d wind up with a report similar to the following, where the
    **bolded** lines emphasize the differences in output between the `GraduateStudent`
    and `UndergraduateStudent` versions of the `print` method:


    ```

    Student Name:  John Smith

    Student No.:  12345

    Major Field:  Biology

    GPA:  2.7

    High School Attended:  Rocky Mountain High

    THIS IS AN UNDERGRADUATE STUDENT ...

    Student Name:  Paula Green

    Student No.:  34567

    Major Field:  Education

    GPA:  3.6

    Undergrad. Deg.:  B.A. English

    Undergrad. Inst.:  UCLA

    THIS IS A GRADUATE STUDENT ...

    Student Name:  Dinesh Prabhu

    Student No.:  98765

    Major Field:  Computer Science

    GPA:  4.0

    Undergrad. Deg.:  B.S. Computer Engineering

    Undergrad. Inst.:  Case Western Reserve University

    THIS IS A GRADUATE STUDENT ...

    Student Name:  Jose Rodriguez

    Student No.:  82640

    Major Field:  Math

    GPA:  3.1

    High School Attended:  James Ford Rhodes High

    THIS IS AN UNDERGRADUATE STUDENT ...

    ```


    The term **polymorphism** is defined in Merriam-Webster’s Dictionary as “the quality
    or state of being able to assume different forms.” The line of code


    ```

    s.print();

    ```


    in the preceding example is said to be **polymorphic** because the logic performed
    in response to the message can take many different forms, depending on the class
    identity of the object at run time.'
  raw: '## Polymorphism


    The term **polymorphism** refers to the ability of two or more objects belonging
    to ***different*** classes to respond to exactly the ***same*** message (method
    call) in different class-specific ways.


    As an example, if we were to instruct three different people—a surgeon, a hair
    stylist, and an actor—to “Cut!” then


    *   The surgeon would begin to make an incision.


    *   The hair stylist would begin to cut someone’s hair.


    *   The actor would abruptly stop acting out the current scene, awaiting directorial
    guidance.


    These three different professionals may be thought of as `Person` objects belonging
    to different professional subclasses: `Surgeon`, `HairStylist`, and `Actor`. Each
    was given the same message—“Cut!”—but carried out the operation differently as
    prescribed by the subclass that each belongs to.


    Let’s now turn to a software example relevant to the SRS. Assume that we’ve defined
    a `Student` superclass and two subclasses, `GraduateStudent` and `UndergraduateStudent`.
    In Chapter [5](#78624_3_En_5_Chapter.xhtml), we discussed the fact that a `print`
    method designed to print the values of all of a `Student`’s attributes wouldn’t
    necessarily suffice for printing the attribute values for a `GraduateStudent`,
    because the code as written for the `Student` superclass wouldn’t know about any
    attributes that may have been added to the `GraduateStudent` subclass. We then
    looked at how to ***override*** the `print` method of `Student` to create specialized
    versions of the method for all of its subclasses. The syntax for doing so, which
    was first introduced in Chapter [5](#78624_3_En_5_Chapter.xhtml) with the `GraduateStudent`
    class, is repeated again here for your review. I’ve added the `UndergraduateStudent`
    class code, as well:


    ```

    //-------------

    // Student.java

    //-------------

    public class Student {

    private String name;

    private String studentId;

    private String major;

    private double gpa;

    // Public get/set methods would also be provided (details omitted) ...

    public void print() {

    // We can print only the attributes that the Student class

    // knows about.

    System.out.println("Student Name:  " + getName() + "\n" +

    "Student No.:  " +  getStudentId()  + "\n" +

    "Major Field:  " +  getMajor()  + "\n" +

    "GPA:  " + getGpa());

    }

    }

    //---------------------

    // GraduateStudent.java

    //---------------------

    public class GraduateStudent extends Student {

    // Adding several attributes.

    private String undergraduateDegree;

    private String undergraduateInstitution;

    // Public get/set methods would also be provided (details omitted) ...

    // Overriding the print method.

    public void print() {

    // Reuse code from the Student superclass ...

    super.print();

    // ... and then go on to print this subclass''s specific attributes.

    System.out.println("Undergrad. Deg.: " + getUndergraduateDegree() +

    "\n" + "Undergrad. Inst.:  " +

    getUndergraduateInstitution() + "\n" +

    "THIS IS A GRADUATE STUDENT ...");

    }

    }

    //--------------------------

    // UndergraduateStudent.java

    //--------------------------

    public class UndergraduateStudent extends Student {

    // Adding an attribute.

    private String highSchool;

    // Public get/set methods would also be provided (details omitted) ...

    // Overriding the print method.

    public void print() {

    // Reuse code from the Student superclass ...

    super.print();

    // ... and then go on to print this subclass''s specific attributes.

    System.out.println("High School Attended:  " + getHighSchool() +

    "\n" + "THIS IS AN UNDERGRADUATE STUDENT ...");

    }

    }

    ```


    In our main SRS application, we’ll declare an `ArrayList` called `studentBody`
    to hold references to `Student` objects. We’ll then populate the `ArrayList` with
    `Student` object references—some `GraduateStudent`s and some `UndergraduateStudent`s,
    randomly mixed—as shown here:


    ```

    // Declare and instantiate an ArrayList of Students.

    ArrayList studentBody = new ArrayList();

    // Instantiate various types of Student object.

    UndergraduateStudent u1 = new UndergraduateStudent();

    UndergraduateStudent u2 = new UndergraduateStudent();

    GraduateStudent g1 = new GraduateStudent();

    GraduateStudent g2 = new GraduateStudent();

    // etc.

    // Insert them into the ArrayList in random order.

    studentBody.add(u1);

    studentBody.add(g1);

    studentBody.add(g2);

    studentBody.add(u2);

    // etc.

    ```


    Since we’re storing both `GraduateStudent` and `UndergraduateStudent` objects
    in this `ArrayList`, we’ve declared the `ArrayList` to be of a base type common
    to all objects that the collection is intended to contain, namely, `Student`.
    By virtue of the “is a” nature of inheritance, an `UndergraduateStudent` object
    ***is a*** `Student`, and a `GraduateStudent` object ***is a*** `Student`, and
    so the compiler won’t complain when we insert either type of object into this
    `ArrayList`.


    Note that the compiler ***would*** object, however, if we tried to insert a `Professor`
    object into the same `ArrayList`, because a `Professor` isn’t a `Student`, at
    least not in terms of the class hierarchy that we’ve defined for the SRS. If we
    wanted to include `Professor`s in our `ArrayList` along with various types of
    `Student`s, we’d have to declare the `ArrayList` as holding a base type common
    to ***both*** the `Student` and `Professor` classes, namely, `Person` (or `Object`,
    which as we discussed in Chapter [5](#78624_3_En_5_Chapter.xhtml) is the implied
    superclass for all inheritance hierarchies in Java).


    Perhaps we’d like to print the attribute values of all of the `Student`s in our
    `studentBody` collection. We’d want each `Student` object—whether it’s a `GraduateStudent`
    or an `UndergraduateStudent` instance—to use the version of the `print` method
    appropriate for its (sub)class. The following code will accomplish this nicely:


    ```

    // Step through the ArrayList (collection) ...

    for (Student s : studentBody) {

    // ... invoking the print method of each Student object.

    s.print();

    }

    ```


    Variable `s` is declared in the `for` statement to be a reference to a ***generic***
    `Student` object, because that’s the type of reference that we declared `studentBody`
    to hold. As we step through this collection of `Student` objects at ***run time***,
    however, each object will ***automatically*** know which version of the `print`
    method it should execute, based on its own internal knowledge of the ***specific***
    type/(sub)class that it belongs to (`GraduateStudent` vs. `UndergraduateStudent`,
    in this example). We’d wind up with a report similar to the following, where the
    **bolded** lines emphasize the differences in output between the `GraduateStudent`
    and `UndergraduateStudent` versions of the `print` method:


    ```

    Student Name:  John Smith

    Student No.:  12345

    Major Field:  Biology

    GPA:  2.7

    High School Attended:  Rocky Mountain High

    THIS IS AN UNDERGRADUATE STUDENT ...

    Student Name:  Paula Green

    Student No.:  34567

    Major Field:  Education

    GPA:  3.6

    Undergrad. Deg.:  B.A. English

    Undergrad. Inst.:  UCLA

    THIS IS A GRADUATE STUDENT ...

    Student Name:  Dinesh Prabhu

    Student No.:  98765

    Major Field:  Computer Science

    GPA:  4.0

    Undergrad. Deg.:  B.S. Computer Engineering

    Undergrad. Inst.:  Case Western Reserve University

    THIS IS A GRADUATE STUDENT ...

    Student Name:  Jose Rodriguez

    Student No.:  82640

    Major Field:  Math

    GPA:  3.1

    High School Attended:  James Ford Rhodes High

    THIS IS AN UNDERGRADUATE STUDENT ...

    ```


    The term ***polymorphism*** is defined in Merriam-Webster’s Dictionary as “the
    quality or state of being able to assume different forms.” The line of code


    ```

    s.print();

    ```


    in the preceding example is said to be ***polymorphic*** because the logic performed
    in response to the message can take many different forms, depending on the class
    identity of the object at run time.'
  trans: '

    ## 多态性


    **多态性**这一术语指的是属于***不同***类的两个或多个对象，能够以特定于类的方式，对完全***相同***的消息（方法调用）做出响应的能力。


    举个例子，如果我们指示三个不同的人——一位外科医生、一位发型师和一位演员——执行“剪！”这个指令，那么：


    *   外科医生会开始做切口。

    *   发型师会开始剪某人的头发。

    *   演员会突然停止表演当前场景，等待导演的指示。


    这三位不同的专业人士可以被视为属于不同专业子类的 `Person` 对象：`Surgeon`、`HairStylist` 和 `Actor`。每个人都收到了相同的消息——“剪！”——但根据各自所属的子类规定，以不同的方式执行了操作。


    现在，让我们转向一个与 SRS 相关的软件示例。假设我们定义了一个 `Student` 超类和两个子类，`GraduateStudent` 和 `UndergraduateStudent`。在第
    5 章中，我们讨论过这样一个事实：一个旨在打印 `Student` 所有属性值的 `print` 方法，不一定足以打印 `GraduateStudent`
    的属性值，因为为 `Student` 超类编写的代码并不知道可能已添加到 `GraduateStudent` 子类中的任何属性。然后，我们研究了如何***重写***
    `Student` 的 `print` 方法，为其所有子类创建该方法的专用版本。实现此目的的语法（首次在第 5 章中通过 `GraduateStudent`
    类介绍）在此处重复，供您复习。我还添加了 `UndergraduateStudent` 类的代码：


    ```

    //-------------

    // Student.java

    //-------------

    public class Student {

    private String name;

    private String studentId;

    private String major;

    private double gpa;

    // Public get/set methods would also be provided (details omitted) ...

    public void print() {

    // We can print only the attributes that the Student class

    // knows about.

    System.out.println("Student Name:  " + getName() + "\n" +

    "Student No.:  " +  getStudentId()  + "\n" +

    "Major Field:  " +  getMajor()  + "\n" +

    "GPA:  " + getGpa());

    }

    }

    //---------------------

    // GraduateStudent.java

    //---------------------

    public class GraduateStudent extends Student {

    // Adding several attributes.

    private String undergraduateDegree;

    private String undergraduateInstitution;

    // Public get/set methods would also be provided (details omitted) ...

    // Overriding the print method.

    public void print() {

    // Reuse code from the Student superclass ...

    super.print();

    // ... and then go on to print this subclass''s specific attributes.

    System.out.println("Undergrad. Deg.: " + getUndergraduateDegree() +

    "\n" + "Undergrad. Inst.:  " +

    getUndergraduateInstitution() + "\n" +

    "THIS IS A GRADUATE STUDENT ...");

    }

    }

    //--------------------------

    // UndergraduateStudent.java

    //--------------------------

    public class UndergraduateStudent extends Student {

    // Adding an attribute.

    private String highSchool;

    // Public get/set methods would also be provided (details omitted) ...

    // Overriding the print method.

    public void print() {

    // Reuse code from the Student superclass ...

    super.print();

    // ... and then go on to print this subclass''s specific attributes.

    System.out.println("High School Attended:  " + getHighSchool() +

    "\n" + "THIS IS AN UNDERGRADUATE STUDENT ...");

    }

    }

    ```


    在我们的主 SRS 应用程序中，我们将声明一个名为 `studentBody` 的 `ArrayList`，用于保存对 `Student` 对象的引用。然后，我们将用
    `Student` 对象引用填充这个 `ArrayList`——其中一些是 `GraduateStudent`，一些是 `UndergraduateStudent`，随机混合——如下所示：


    ```

    // Declare and instantiate an ArrayList of Students.

    ArrayList studentBody = new ArrayList();

    // Instantiate various types of Student object.

    UndergraduateStudent u1 = new UndergraduateStudent();

    UndergraduateStudent u2 = new UndergraduateStudent();

    GraduateStudent g1 = new GraduateStudent();

    GraduateStudent g2 = new GraduateStudent();

    // etc.

    // Insert them into the ArrayList in random order.

    studentBody.add(u1);

    studentBody.add(g1);

    studentBody.add(g2);

    studentBody.add(u2);

    // etc.

    ```


    由于我们将 `GraduateStudent` 和 `UndergraduateStudent` 对象都存储在这个 `ArrayList` 中，因此我们将
    `ArrayList` 声明为具有一个基类型，该基类型是该集合旨在包含的所有对象的公共类型，即 `Student`。凭借继承的“是一个”性质，一个 `UndergraduateStudent`
    对象***是一个*** `Student`，一个 `GraduateStudent` 对象***是一个*** `Student`，因此当我们向此 `ArrayList`
    插入任一类型的对象时，编译器不会报错。


    请注意，然而，如果我们试图将一个 `Professor` 对象插入到同一个 `ArrayList` 中，编译器***会***反对，因为 `Professor`
    不是 `Student`，至少在我们为 SRS 定义的类层次结构中不是。如果我们想将 `Professor` 与各种类型的 `Student` 一起包含在我们的
    `ArrayList` 中，我们必须将 `ArrayList` 声明为保存***同时***是 `Student` 和 `Professor` 类的公共基类型，即
    `Person`（或 `Object`，正如我们在第 5 章中讨论的那样，它是 Java 中所有继承层次结构的隐含超类）。


    也许我们想打印 `studentBody` 集合中所有 `Student` 的属性值。我们希望每个 `Student` 对象——无论是 `GraduateStudent`
    还是 `UndergraduateStudent` 实例——都使用适合其（子）类的 `print` 方法版本。以下代码将很好地实现这一点：


    ```

    // Step through the ArrayList (collection) ...

    for (Student s : studentBody) {

    // ... invoking the print method of each Student object.

    s.print();

    }

    ```


    变量 `s` 在 `for` 语句中被声明为对***泛型*** `Student` 对象的引用，因为这是我们声明 `studentBody` 所保存的引用类型。然而，当我们在***运行时***遍历这个
    `Student` 对象集合时，每个对象都会根据其自身对其所属的***特定***类型/（子）类（在此示例中为 `GraduateStudent` 与 `UndergraduateStudent`）的内部认知，***自动***知道它应该执行哪个版本的
    `print` 方法。我们最终会得到类似于以下的报告，其中**加粗**的行强调了 `GraduateStudent` 和 `UndergraduateStudent`
    版本的 `print` 方法在输出上的差异：


    ```

    Student Name:  John Smith

    Student No.:  12345

    Major Field:  Biology

    GPA:  2.7

    High School Attended:  Rocky Mountain High

    THIS IS AN UNDERGRADUATE STUDENT ...

    Student Name:  Paula Green

    Student No.:  34567

    Major Field:  Education

    GPA:  3.6

    Undergrad. Deg.:  B.A. English

    Undergrad. Inst.:  UCLA

    THIS IS A GRADUATE STUDENT ...

    Student Name:  Dinesh Prabhu

    Student No.:  98765

    Major Field:  Computer Science

    GPA:  4.0

    Undergrad. Deg.:  B.S. Computer Engineering

    Undergrad. Inst.:  Case Western Reserve University

    THIS IS A GRADUATE STUDENT ...

    Student Name:  Jose Rodriguez

    Student No.:  82640

    Major Field:  Math

    GPA:  3.1

    High School Attended:  James Ford Rhodes High

    THIS IS AN UNDERGRADUATE STUDENT ...

    ```


    术语***多态性***在《韦氏词典》中被定义为“能够呈现不同形态的性质或状态”。前面示例中的代码行


    ```

    s.print();

    ```


    被称为是***多态的***，因为响应消息而执行的逻辑可以根据运行时对象的类标识呈现多种不同的形式。

    '
- fmt: "当然，这种通过遍历集合并逐个要求每个对象以自己类特有的方式执行某些操作的方法，只有在集合中的所有对象都理解所发送的消息时才有效。也就是说，`studentBody`集合中的所有对象***必须***定义了一个签名为`print()`的方法。然而，我们***保证***了在运行时`studentBody`集合中的每个对象***都会***拥有这样一个方法，具体如下：\n\
    \n*   首先，我们将`studentBody ArrayList`声明为持有`Student`类型（或其子类）的对象，因此编译器不允许我们将非`Student`对象的引用放入`ArrayList`中。也就是说，任何将非`Student`引用添加到`studentBody`集合的尝试都会在编译时被拒绝：\n\
    \n```\n    ArrayList studentBody = new ArrayList();\n    Professor p = new Professor();\n\
    \    // 下一行代码无法编译。\n    studentBody.add(p);\n```\n\n以下是编译错误：\n\n*   其次，我们在`Student`超类中提供了一个无参的`print`方法。如果我们没有这样做，那么Java编译器会对`for`循环中包含的代码行提出异议：\n\
    \n```\n    // 遍历 ArrayList（集合）...\n    for (Student s : studentBody) {\n    //\
    \ 如果 Student 类没有定义签名为 \"print()\" 的方法，则下一行代码无法编译。\n    s.print();\n    }\n```\n\
    \n```\n找不到符号\n符号: 方法 add(Professor)\n位置: 类 java.util.ArrayList\n```\n\n以下是编译错误：\n\
    \n```\n找不到符号\n符号: 方法 print()\n位置: 类 Student\n```\n\n这个错误之所以出现，是因为编译器检查了`Student`类（`s`被声明为该类的成员）是否存在一个无参的`print`方法。在***运行时***，`s`实际上可能引用一个普通的`Student`、一个`GraduateStudent`、一个`UndergraduateStudent`或任何其他从`Student`类派生的类型；然而，编译器无法在***编译时***预测`s`所引用的对象的真实***运行时***类型是什么（编译器没有水晶球可用），因此它会根据普通`Student`的定义做出“通过/不通过”的决定。\n\
    \n最后，通过继承，`Student`的任何***子类***都保证要么***继承***`Student`版本的无参`print`方法，要么选择用自己的方法***覆盖***它。无论哪种方式，所有从`Student`派生的类都将拥有这样一个方法。\n\
    \n底线是，所有插入到`studentBody ArrayList`中的对象都***保证***在运行时“懂得`print`”。\n\n稍加反思，你现在可以看到，在这次关于多态性的讨论开始之前，你已经学到了在编程语言中实现多态性所需的一切。***继承结合覆盖促成了多态性***。\n\
    \n### 多态性简化了代码维护\n\n为了理解多态性的强大之处，让我们看看如果使用一种***不支持***多态性的编程语言，我们可能不得不如何应对同样的挑战——以不同的类型特定方式处理不同的对象。\n\
    \n在没有多态性的情况下，我们通常会使用一系列`if`测试来处理涉及多种学生类型的场景：\n\n```\nfor (Student s : studentBody)\
    \ {\n// 处理下一个学生。\n// 伪代码。\nif (s 是本科生)\ns.printAsUndergraduateStudent();\nelse\
    \ if (s 是研究生)\ns.printAsGraduateStudent();\nelse if ...\n}\n```\n\n随着情况数量的增加，结果代码的“意大利面条”性质也会随之增长。请记住，这种`if`测试会出现在应用程序中***无数***的地方，即，在我们遍历声明为持有各种类型`Student`的集合的任何地方。\n\
    \n现在，让我们将其与我们通过`studentBody`集合进行的***多态***遍历进行对比：\n\n```\n// 遍历 ArrayList（集合）...\n\
    for (Student s : studentBody) {\n// ... 调用下一个 Student 对象的 print 方法。\ns.print();\
    \ // 多态性在起作用！\n}\n```\n\n得益于多态性，一行代码——`s.print();`——就能处理所有类型的`Student`，从而使我们的代码更加简洁。更好的是，多态的客户端代码***对变化具有鲁棒性***。例如，假设在我们的SRS应用程序被编码、测试和部署很久之后，我们从`GraduateStudent`派生出名为`PhDStudent`和`MastersStudent`的类，每个类又各自覆盖了`GraduateStudent`的`print`方法，以提供自己“风味”的打印功能。我们现在可以自由地将`MastersStudent`和`PhDStudent`对象随机插入到我们的`studentBody`集合中，与`GraduateStudent`和`UndergraduateStudent`对象一起，而我们用于遍历集合的多态代码***无需更改***！以下代码说明了这一点：\n\
    \n```\n// 声明并实例化一个 ArrayList。\nArrayList studentBody = new ArrayList();\n// 实例化各种类型的\
    \ Student 对象。我们现在处理的是四种不同的派生类型！\nUndergraduateStudent u1 = new UndergraduateStudent();\n\
    PhDStudent p1 = new PhDStudent();\nGraduateStudent g1 = new GraduateStudent();\n\
    MastersStudent m1 = new MastersStudent();\n// 等等。\n// 将它们以随机顺序插入 ArrayList。\n\
    studentBody.add(u1);\nstudentBody.add(p1);\nstudentBody.add(g1);\nstudentBody.add(m1);\n\
    // 等等。\n// 然后，在我们的应用程序稍后...\n// 这正是我们之前见过的完全相同的代码！\n// 遍历 ArrayList（集合）...\nfor\
    \ (Student s : studentBody) {\n// ... 并调用下一个 Student 对象的 print 方法。\n// 由于 Java\
    \ 的多态特性，下一行代码不需要任何更改！\ns.print();\n}\n```\n\n我们客户端代码中的`for`循环无需更改以适应新的子类——`MastersStudent`和`PhDStudent`——因为作为`Student`的子类，这些新类型的对象再次***保证***通过继承加上（可选的）覆盖来理解***相同的***`print`消息。\n\
    \n然而，对于我们之前编写的非多态示例，情况则完全不同。那个版本的客户端代码确实需要更改以适应这些新的学生类型；具体来说，我们必须搜索整个应用程序，找到我们试图区分`Student`各种子类的每一个地方，并通过添加额外的`case`来使我们的`if`测试更加复杂，如下所示：\n\
    \n```\nfor (Student s : studentBody) {\n// 处理每个学生。\n// 伪代码。\nif (s 是本科生)\ns.printAsUndergraduateStudent();\n\
    else if (s 是硕士生)\ns.printAsMastersStudent();\nelse if (s 是博士生)\ns.printAsPhDStudent();\n\
    else if (s 是普通研究生)\ns.printAsGraduateStudent();\nelse if ...\n}\n```\n\n导致“意大利面条堆”越来越高。非多态应用程序的维护很快就会变成一场***噩梦***！\n\
    \n正如我们之前看到的封装和信息隐藏一样，多态性是另一种极其有效的机制，用于在应用程序部署后需求发生变化时最小化对应用程序的连锁影响。我们能够向应用程序的类层次结构中引入新的子类以满足此类需求，而我们现有的客户端代码不会“崩溃”。\n\
    \n## 面向对象编程语言的三个显著特征\n\n我们现在已经定义了使一种语言真正面向对象所需的所有三个特性：\n\n*   （程序员创建的）用户定义类型\n\
    *   继承\n*   多态性\n\n作为回顾，让我们看看这些语言特性各自的好处。"
  raw: "Of course, this approach of iterating through a collection to ask each object,\
    \ one by one, to do something in its own class-specific way won’t work unless\
    \ all objects in the collection understand the message being sent. That is, all\
    \ objects in the `studentBody` collection ***must*** have defined a method with\
    \ the signature `print()`. However, we’ve ***guaranteed*** that every object in\
    \ the `studentBody` collection at run time ***will*** have such a method, as follows:\n\
    \n*   First of all, we declared the `studentBody ArrayList` to hold objects of\
    \ type `Student` (or subclasses thereof), so the compiler will therefore not allow\
    \ us to put non-`Student` object references into the `ArrayList`. That is, any\
    \ attempt to add a non-`Student` reference to the `studentBody` collection will\
    \ be rejected at compile time:\n\n```\n    ArrayList studentBody = new ArrayList();\n\
    \    Professor p = new Professor();\n    // This next line won't compile.\n  \
    \  studentBody.add(p);\n    ```\n\nHere’s the compilation error:\n\n*   Second,\
    \ we provided the `Student` superclass with a parameterless `print` method. Had\
    \ we not done so, then the Java compiler would have objected to the line of code\
    \ contained within the `for` loop:\n\n```\n    // Step through the ArrayList (collection)\
    \ ...\n    for (Student s : studentBody) {\n    // This next line won't compile\
    \ if the Student class doesn't define a\n    // method with the signature \"print()\"\
    .\n    s.print();\n    }\n    ```\n\n```\ncannot find symbol\nsymbol: method add(Professor)\n\
    location: class java.util.ArrayList\n```\n\nHere’s the compilation error:\n\n\
    ```\ncannot find symbol\nsymbol: method print()\nlocation: class Student\n```\n\
    \nThis error arises because the compiler checks the `Student` class (of which\
    \ `s` is declared to be a member) for the presence of a parameterless `print`\
    \ method. At ***run time***, `s` might actually be referring to a generic `Student`\
    \ or to a `GraduateStudent` or to an `UndergraduateStudent` or to any other type\
    \ derived from the `Student` class; however, the compiler has no way of predicting\
    \ at ***compile time*** what the true ***run-time*** type of the object referred\
    \ to by `s` will be (the compiler doesn’t have a crystal ball at its disposal),\
    \ and so it will make a go`–`no go decision based on how a generic `Student` is\
    \ defined.\n\nFinally, by virtue of inheritance, any ***subclass*** of `Student`\
    \ is guaranteed to either ***inherit*** the `Student`’s version of the parameterless\
    \ `print` method or to optionally ***override*** it with one of its own. Either\
    \ way, all classes derived from `Student` will have such a method.\n\nThe bottom\
    \ line is that all objects inserted into the `studentBody ArrayList` are ***guaranteed***\
    \ to be “`print` savvy” at run time.\n\nReflecting for a moment, you can now see\
    \ that you had previously learned about everything that’s needed to facilitate\
    \ polymorphism in a programming language before this discussion of polymorphism\
    \ even began. ***Inheritance combined with overriding facilitates polymorphism***.\n\
    \n### Polymorphism Simplifies Code Maintenance\n\nTo appreciate the power of polymorphism,\
    \ let’s look at how we might have to approach this same challenge—handling different\
    \ objects in different type-specific ways—with a programming language that ***doesn’t***\
    \ support polymorphism.\n\nIn the absence of polymorphism, we’d typically handle\
    \ scenarios having to do with a variety of kinds of students using a series of\
    \ `if` tests:\n\n```\nfor (Student s : studentBody) {\n// Process the next student.\n\
    // Pseudocode.\nif (s is an undergraduate student)\ns.printAsUndergraduateStudent();\n\
    else if (s is a graduate student)\ns.printAsGraduateStudent();\nelse if ...\n\
    }\n```\n\nAs the number of cases grows, so too does the “spaghetti” nature of\
    \ the resultant code. And keep in mind that this sort of `if` test would arise\
    \ in ***countless*** places throughout an application, namely, wherever we are\
    \ iterating through a collection declared to hold `Student`s of various types.\n\
    \nLet’s now contrast this with our ***polymorphic*** iteration through the `studentBody`\
    \ collection:\n\n```\n// Step through the ArrayList (collection) ...\nfor (Student\
    \ s : studentBody) {\n// ... invoking the print method of the next Student object.\n\
    s.print(); // polymorphism at work!\n}\n```\n\nThanks to polymorphism, a single\
    \ line of code—`s.print();`—can handle all types of `Student`s, thus making our\
    \ code much more concise. Better still, polymorphic client code is ***robust to\
    \ change***. For example, let’s say that, long after our SRS application has been\
    \ coded, tested, and deployed, we derive classes called `PhDStudent` and `MastersStudent`\
    \ from `GraduateStudent`, each of which in turn overrides the `print` method of\
    \ `GraduateStudent` to provide its own “flavor” of print functionality. We’re\
    \ now free to randomly insert `MastersStudent`s and `PhDStudent`s into our `studentBody`\
    \ collection, along with `GraduateStudent`s and `UndergraduateStudent`s, and our\
    \ polymorphic code for iterating through the collection ***doesn’t have to change***!\
    \ The following code illustrates this:\n\n```\n// Declare and instantiate an ArrayList.\n\
    ArrayList studentBody = new ArrayList;\n// Instantiate various types of Student\
    \ object.  We're now dealing with FOUR\n// different derived types!\nUndergraduateStudent\
    \ u1 = new UndergraduateStudent();\nPhDStudent p1 = new PhDStudent();\nGraduateStudent\
    \ g1 = new GraduateStudent();\nMastersStudent m1 = new MastersStudent();\n// etc.\n\
    // Insert them into the ArrayList in random order.\nstudentBody.add(u1);\nstudentBody.add(p1);\n\
    studentBody.add(g1);\nstudentBody.add(m1);\n// etc.\n// Then, later in our application\
    \ ...\n// This is the EXACT SAME CODE that we've seen before!\n// Step through\
    \ the ArrayList (collection) ...\nfor (Student s : studentBody) {\n// ... and\
    \ invoke the print method of the next Student object.\n// Because of the polymorphic\
    \ nature of Java, this next line didn't require\n// any changes!\ns.print();\n\
    }\n```\n\nThe `for` loop in our client code didn’t have to change to accommodate\
    \ the new subclasses—`MastersStudent` and `PhDStudent`—because, as subclasses\
    \ of `Student`, these new types of object are once again ***guaranteed*** to understand\
    \ the ***same*** `print` message by virtue of inheritance plus (optional) overriding.\n\
    \nThe story is quite different, however, with the nonpolymorphic example that\
    \ we crafted earlier. That version of client code would indeed have to change\
    \ to accommodate these new student types; specifically, we’d have to hunt through\
    \ our application to find every situation where we were trying to differentiate\
    \ among the various subclasses of `Student` and complicate our `if` tests even\
    \ further by adding additional cases as follows\n\n```\nfor (Student s : studentBody)\
    \ {\n// Process each student.\n// Pseudocode.\nif (s is an undergraduate student)\n\
    s.printAsUndergraduateStudent();\nelse if (s is a Masters student)\ns.printAsMastersStudent();\n\
    else if (s is a PhD student)\ns.printAsPhDStudent();\nelse if (s is a generic\
    \ graduate student)\ns.printAsGraduateStudent();\nelse if ...\n}\n```\n\ncausing\
    \ the “spaghetti piles” to grow ever taller. Maintenance of nonpolymorphic applications\
    \ quickly becomes a ***nightmare***!\n\nAs we saw with encapsulation and information\
    \ hiding earlier, polymorphism is another extremely effective mechanism for minimizing\
    \ ripple effects on an application if requirements change after the application\
    \ has been deployed. We’re able to introduce new subclasses to an application’s\
    \ class hierarchy in order to meet such requirements, and our existing client\
    \ code won’t “break.”\n\n## Three Distinguishing Features of an Object-Oriented\
    \ Programming Language\n\nWe’ve now defined all three of the features required\
    \ to make a language truly object oriented:\n\n*   (Programmer creation of) User-defined\
    \ types\n\n*   Inheritance\n\n*   Polymorphism\n\nBy way of review, let’s look\
    \ at the benefits of each of these language features."
  trans: "\n当然，这种遍历集合并逐个要求每个对象以其类特有的方式执行操作的方法，只有在集合中所有对象都能理解所发送的消息时才有效。也就是说，`studentBody`\
    \ 集合中的所有对象***必须***定义了一个签名为 `print()` 的方法。然而，我们***保证***了运行时 `studentBody` 集合中的每个对象***都会***拥有这样一个方法，具体如下：\n\
    \n*   首先，我们将 `studentBody ArrayList` 声明为持有 `Student` 类型（或其子类）的对象，因此编译器不允许我们将非\
    \ `Student` 对象的引用放入该 `ArrayList` 中。也就是说，任何试图向 `studentBody` 集合添加非 `Student` 引用的操作都将在编译时被拒绝：\n\
    \n```\n    ArrayList studentBody = new ArrayList();\n    Professor p = new Professor();\n\
    \    // 下一行代码无法编译。\n    studentBody.add(p);\n    ```\n\n以下是编译错误：\n\n*   其次，我们为\
    \ `Student` 超类提供了一个无参的 `print` 方法。如果我们没有这样做，那么 Java 编译器就会对 `for` 循环中包含的那行代码提出异议：\n\
    \n```\n    // 遍历 ArrayList（集合）...\n    for (Student s : studentBody) {\n    //\
    \ 如果 Student 类没有定义签名为 \"print()\" 的方法，下一行代码将无法编译。\n    s.print();\n    }\n   \
    \ ```\n\n```\n找不到符号\n符号:   方法 add(Professor)\n位置: 类 java.util.ArrayList\n```\n\
    \n以下是编译错误：\n\n```\n找不到符号\n符号:   方法 print()\n位置: 类 Student\n```\n\n这个错误之所以出现，是因为编译器检查了\
    \ `Student` 类（`s` 被声明为该类的成员）中是否存在一个无参的 `print` 方法。在***运行时***，`s` 实际上可能引用的是一个普通的\
    \ `Student` 对象，或者是一个 `GraduateStudent` 对象，或者是一个 `UndergraduateStudent` 对象，又或者是任何其他从\
    \ `Student` 类派生的类型；然而，编译器无法在***编译时***预测 `s` 所引用对象的真实***运行时***类型（编译器可没有水晶球），因此它会根据普通\
    \ `Student` 类的定义来做出“通过/不通过”的决定。\n\n最后，通过继承机制，`Student` 的任何***子类***都保证要么***继承***\
    \ `Student` 版本的无参 `print` 方法，要么选择用自己的方法***覆盖***它。无论哪种方式，所有从 `Student` 派生的类都会拥有这样一个方法。\n\
    \n底线是，插入到 `studentBody ArrayList` 中的所有对象都***保证***在运行时“懂得 `print`”。\n\n稍加反思，你现在就能明白，在开始讨论多态之前，你其实已经学到了在编程语言中实现多态所需的一切知识。***继承结合覆盖促成了多态***。\n\
    \n### 多态简化代码维护\n\n为了理解多态的强大之处，让我们看看如果使用一种***不支持***多态的编程语言，我们可能需要如何应对同样的挑战——以不同的类型特定方式处理不同的对象。\n\
    \n在没有多态的情况下，我们通常会使用一系列 `if` 测试来处理涉及多种学生类型的场景：\n\n```\nfor (Student s : studentBody)\
    \ {\n// 处理下一个学生。\n// 伪代码。\nif (s 是本科生)\ns.printAsUndergraduateStudent();\nelse\
    \ if (s 是研究生)\ns.printAsGraduateStudent();\nelse if ...\n}\n```\n\n随着情况数量的增加，结果代码的“意大利面条式”特性也会随之增长。请记住，这种\
    \ `if` 测试会出现在应用程序中***无数***的地方，即，只要我们在遍历一个声明为持有各种类型 `Student` 对象的集合时，都会遇到。\n\n\
    现在，让我们将其与我们通过 `studentBody` 集合进行的***多态***遍历进行对比：\n\n```\n// 遍历 ArrayList（集合）...\n\
    for (Student s : studentBody) {\n// ... 调用下一个 Student 对象的 print 方法。\ns.print();\
    \ // 多态在起作用！\n}\n```\n\n得益于多态，一行代码——`s.print();`——就能处理所有类型的 `Student` 对象，从而使我们的代码更加简洁。更好的是，多态的客户端代码***对变更具有鲁棒性***。例如，假设在我们的\
    \ SRS 应用程序被编码、测试和部署很久之后，我们从 `GraduateStudent` 派生了名为 `PhDStudent` 和 `MastersStudent`\
    \ 的类，每个类又各自覆盖了 `GraduateStudent` 的 `print` 方法，以提供自己“风味”的打印功能。现在，我们可以自由地将 `MastersStudent`\
    \ 和 `PhDStudent` 对象与 `GraduateStudent` 和 `UndergraduateStudent` 对象一起随机插入到我们的 `studentBody`\
    \ 集合中，而我们用于遍历集合的多态代码***无需更改***！以下代码说明了这一点：\n\n```\n// 声明并实例化一个 ArrayList。\nArrayList\
    \ studentBody = new ArrayList;\n// 实例化各种类型的 Student 对象。我们现在处理的是四种不同的派生类型！\nUndergraduateStudent\
    \ u1 = new UndergraduateStudent();\nPhDStudent p1 = new PhDStudent();\nGraduateStudent\
    \ g1 = new GraduateStudent();\nMastersStudent m1 = new MastersStudent();\n// 等等。\n\
    // 将它们以随机顺序插入 ArrayList。\nstudentBody.add(u1);\nstudentBody.add(p1);\nstudentBody.add(g1);\n\
    studentBody.add(m1);\n// 等等。\n// 然后，在应用程序的后续部分...\n// 这与我们之前看到的代码完全相同！\n// 遍历\
    \ ArrayList（集合）...\nfor (Student s : studentBody) {\n// ... 并调用下一个 Student 对象的\
    \ print 方法。\n// 由于 Java 的多态特性，下一行代码不需要任何更改！\ns.print();\n}\n```\n\n我们客户端代码中的 `for`\
    \ 循环无需更改以适应新的子类——`MastersStudent` 和 `PhDStudent`——因为作为 `Student` 的子类，这些新类型的对象再次***保证***能够通过继承加上（可选的）覆盖来理解***相同的***\
    \ `print` 消息。\n\n然而，对于我们之前构建的非多态示例，情况则完全不同。那个版本的客户端代码确实需要更改以适应这些新的学生类型；具体来说，我们必须搜索整个应用程序，找到我们试图区分\
    \ `Student` 各个子类的每一种情况，并通过添加额外的 case 来使我们的 `if` 测试更加复杂，如下所示：\n\n```\nfor (Student\
    \ s : studentBody) {\n// 处理每个学生。\n// 伪代码。\nif (s 是本科生)\ns.printAsUndergraduateStudent();\n\
    else if (s 是硕士生)\ns.printAsMastersStudent();\nelse if (s 是博士生)\ns.printAsPhDStudent();\n\
    else if (s 是普通研究生)\ns.printAsGraduateStudent();\nelse if ...\n}\n```\n\n导致“意大利面条堆”越堆越高。非多态应用程序的维护很快就会变成一场***噩梦***！\n\
    \n正如我们之前看到的封装和信息隐藏一样，多态是另一种极其有效的机制，用于在应用程序部署后需求发生变化时，最小化对应用程序的连锁影响。我们能够向应用程序的类层次结构中引入新的子类以满足此类需求，而我们现有的客户端代码不会“崩溃”。\n\
    \n## 面向对象编程语言的三个显著特征\n\n我们现在已经定义了使一种语言真正面向对象所需的全部三个特征：\n\n*   （程序员创建的）用户定义类型\n\
    \n*   继承\n\n*   多态\n\n作为回顾，让我们看看这些语言特性各自的好处。\n"
- fmt: "### The Benefits of User-Defined Types\n\nThe following are among the benefits\
    \ of user-defined types:\n\n- User-defined types provide an intuitive way to represent\
    \ real-world objects, resulting in **easier-to-verify requirements**.\n- Classes\
    \ are convenient units of reusable code, which means **less code to write from\
    \ scratch when building an application**.\n- Through encapsulation, we **minimize\
    \ data redundancy**—each item of data is stored once, in the object to which it\
    \ belongs—thereby **lessening the likelihood of data integrity errors** across\
    \ an application.\n- Through information hiding, we **insulate our application\
    \ against ripple effects** if private details of a class must change after deployment,\
    \ thereby **dramatically reducing maintenance costs**.\n- Objects are responsible\
    \ for ensuring the integrity of their own data, making it **easier to isolate\
    \ errors in an application’s (business) logic**; we know to inspect the method(s)\
    \ of the class to which a corrupted object belongs.\n- Once defined, a user-defined\
    \ type (class) can be reused again and again across applications and even across\
    \ organizations.\n\n### The Benefits of Inheritance\n\nThe following are among\
    \ the benefits of inheritance:\n\n- We can extend already deployed code without\
    \ having to change and then retest it, resulting in **dramatically reduced maintenance\
    \ costs**.\n- Subclasses are much more succinct, which means **less code overall\
    \ to write/maintain**.\n\n### The Benefits of Polymorphism\n\nThe following is\
    \ one of the benefits of polymorphism:\n\n- It **minimizes “ripple effects”**\
    \ on client code when new subclasses are added to the class hierarchy of an existing\
    \ application, resulting in **dramatically reduced maintenance costs**.\n\n###\
    \ One Very Important Caveat\n\nA common misconception is that switching to object\
    \ technology will dramatically reduce the time required to develop a given application.\
    \ Anecdotes abound of managers who have expected that a team using an object-oriented\
    \ approach should be able to craft an application in a fraction of the time that\
    \ it would take them to build its non-OO counterpart—**despite the fact that team\
    \ in question might be using OO techniques for the first time ever**! Unfortunately,\
    \ due to the learning curve involved in switching to the OO paradigm—particularly\
    \ for software developers who’ve been entrenched in non-OO techniques for many\
    \ years—it will typically **longer** for a team inexperienced with objects to\
    \ develop their first OO application.\n\nWhere economies of scale **do** come\
    \ into play for a properly designed OO application, however, is during the **maintenance\
    \ phase** of the application’s life cycle. The maintenance phase of an application—OO\
    \ or otherwise—is typically much longer, and hence more costly, than the development\
    \ phase. A general rule of thumb is that most application lifetimes are split\
    \ between 20 percent development and 80 percent maintenance. By dramatically reducing\
    \ ripple effects through the thoughtful application of (a) encapsulation/information\
    \ hiding and (b) inheritance/polymorphism, we stand to reduce maintenance costs—and\
    \ hence overall software life cycle costs—significantly.\n\nAnd, once we become\
