- fmt: 'We typically decompose higher-order associations into the appropriate number
    of binary associations. We can, for example, represent the preceding three-way
    association as three binary associations instead (see Figure [5-3](#78624_3_En_5_Chapter.xhtml#Fig3)):


    ![](images/78624_3_En_5_Chapter/78624_3_En_5_Fig3_HTML.png)


    A triangle diagram with dashed lines has the text, student, professor, and course
    at the vertices. It has the text, teaches at the base, and instructs and attends
    on either side.


    **Figure 5-3** An equivalent representation using three binary associations


    - A `Student` ***attends*** a `Course`.

    - A `Professor` ***teaches*** a `Course`.

    - A `Professor` ***instructs*** a `Student`.


    Within a given association, each participant class is said to have a **role**.
    In the ***advises*** association (a `Professor` ***advises*** a `Student`), the
    role of the `Professor` might be said to be “advisor,” and the role of the `Student`
    might be said to be “advisee.”


    We only bother to assign names to the roles for the objects participating in an
    association if it helps clarify the abstraction. In the “is enrolled in” association
    (a `Student` ***is enrolled in*** a `Course`), there is no need to invent role
    names for the `Student` and `Course` ends of the association, because such role
    names wouldn’t add significantly to the clarity of the abstraction.


    ### Multiplicity


    For a given association type X between classes A and B, the term **multiplicity**
    refers to the number of objects of type A that may be associated with a given
    instance of type B. For example, a `Student` attends ***multiple*** `Courses`,
    but a `Student` has only ***one*** `Professor` in the role of advisor.


    There are three basic “flavors” of multiplicity: **one-to-one**, **one-to-many**,
    and **many-to-many**.


    #### One-to-One (1:1)


    With a one-to-one (1:1) association, exactly one instance of class A is related
    to exactly one instance of class B—no fewer, no more, and vice versa. For example:


    - A `Student` has exactly one `Transcript`, and a `Transcript` belongs to exactly
    one `Student`.

    - A `Professor` chairs exactly one `Department`, and a `Department` has exactly
    one `Professor` in the role of chairperson.


    We can further constrain an association by stating whether the participation of
    the class at either end is optional or mandatory. For example, we can change the
    preceding association to read as follows:


    - A `Professor` ***optionally*** chairs exactly one `Department`, but it is ***mandatory***
    that a `Department` has exactly one `Professor` in the role of chairperson.


    This revised version of the association is a more realistic portrayal of real-world
    circumstances than the previous version. While every department in a university
    typically does indeed have a chairperson, not every professor is a chairperson
    of a department—there aren’t enough departments to go around! However, it’s true
    that, ***if*** a professor happens to be a chairperson of a department, then that
    professor is the chairperson of only ***one*** department.


    #### One-to-Many (1:m)


    In a one-to-many (1:m) association, there can be ***many*** instances of class
    B related to a ***single*** instance of class A in a particular fashion; but,
    from the perspective of an instance of class B, there can only be ***one*** instance
    of class A that is so related. For example:


    - A `Department` employs ***many*** `Professor`s, but a `Professor` works for
    ***exactly one*** `Department`.

    - A `Professor` advises ***many*** `Student`s, but a given `Student` has ***exactly
    one*** `Professor` as an advisor.


    Note that “many” in this case can be interpreted as either “zero or more (optional)”
    or as “one or more (mandatory).” To be a bit more specific, we can refine the
    previous one-to-many associations as follows:


    - A `Department` employs ***one or more*** (“many,” ***mandatory***) `Professor`s,
    but a `Professor` works for exactly one `Department`.

    - A `Professor` advises ***zero or more*** (“many,” ***optional***) `Student`s,
    but a given `Student` has exactly one `Professor` as an advisor.


    In addition, as with one-to-one relationships, the “one” end of a one-to-many
    association may also be designated as mandatory or as optional. If we’re modeling
    a university setting in which students aren’t required to select an advisor, for
    example, we’d refine the previous association as follows:


    - A `Professor` advises ***zero or more*** (“many,” ***optional***) `Student`s,
    but a given `Student` may ***optionally*** have ***at most one*** (i.e., ***zero
    or one***) `Professor` as an advisor.


    #### Many-to-Many (m:m)


    With a many-to-many (m:m) association, a given single instance of class A can
    have many instances of class B related to it and vice versa. For example:


    - A `Student` enrolls in many `Course`s, and a `Course` has many `Student`s enrolled
    in it.

    - A given `Course` can have many prerequisite `Course`s, and a given `Course`
    can in turn ***be*** a prerequisite for many ***other*** `Course`s. (This is an
    example of a many-to-many ***reflexive*** association.)


    As with one-to-many associations, “many” can be interpreted as ***zero*** or more
    (***optional***) or as ***one*** or more (***mandatory***) at either end of an
    (m:m) association, for example:


    - A `Student` enrolls in ***zero or more*** (“many,” ***optional***) `Course`s,
    and a `Course` has ***one or more*** (“many,” ***mandatory***) `Student`s enrolled
    in it.


    Of course, the validity of a particular association—the classes that are involved,
    its multiplicity, and the optional or mandatory nature of participation in the
    association on the part of both participating classes—is wholly dependent on the
    real-world circumstances being modeled. If you were modeling a university in which
    departments could have more than one chairperson or where students could have
    more than one advisor, your choice of multiplicities would differ from those used
    in the preceding examples.'
