    Using the `toArray` method of the `ArrayList` class, we copy the contents of an
    `ArrayList` to an array


    ## The HashMap Collection Class


    As mentioned earlier in the chapter, a Java `HashMap` is a dictionary-type collection—that
    is, a `HashMap` gives us direct access to a given object based on a unique key
    value. Both the key and the object itself can be declared to be of any type.


    Let’s look at a simple example program called `HashMapExample` that illustrates
    the basics of manipulating `HashMap`s. This program involves


    *   Creating and populating a `HashMap` with `Student` object references, using
    the value of their `idNo` attribute (a `String`) as the key


    *   Attempting to retrieve several individual `Student`s based on specific `idNo`
    values


    *   Iterating through the entire collection of `Student`s


    For purposes of this example, we’ll use the following simplified `Student` class
    declaration:


    ```

    public class Student {

    private String idNo;

    private String name;

    // Constructor.

    public Student(String i, String n) {

    idNo = i;

    name = n;

    }

    public String getName() {

    return name;

    }

    public String getIdNo() {

    return idNo;

    }

    }

    ```


    And we’ll use the value of each `Student`’s `idNo` attribute as the key.


    Let’s look at the program in its entirety first, and we’ll walk through selected
    passages afterward:


    ```

    import java.util.HashMap;

    public class HashMapExample {

    public static void main(String[] args) {

    // Instantiate a HashMap with String as the key type and Student as

    // the value type.

    HashMap students = new HashMap();

    // Instantiate three Students; the constructor arguments are

    // used to initialize Student attributes idNo and name,

    // respectively, which are both declared to be Strings.

    Student s1 = new Student("12345-12", "Fred");

    Student s2 = new Student("98765-00", "Barney");

    Student s3 = new Student("71024-91", "Wilma");

    // Insert all three Students into the HashMap, using their idNo

    // as a key.

    students.put(s1.getIdNo(), s1);

    students.put(s2.getIdNo(), s2);

    students.put(s3.getIdNo(), s3);

    // Retrieve a Student based on a particular (valid) ID.

    String id = "98765-00";

    System.out.println("Let''s try to retrieve a Student with ID = " + id);

    Student x = students.get(id);

    // If the value returned by the get method is non-null, then

    // we indeed found a matching Student ...

    if (x != null) {

    System.out.println("Found!  Name = " + x.getName());

    }

    // ... whereas if the value returned was null, then we didn''t find

    // a match on the id that was passed in as an argument to get().

    else {

    System.out.println("Invalid ID:  " + id);

    }

    System.out.println();

    // Try an invalid ID.

    id = "00000-00";

    System.out.println("Let''s try to retrieve a Student with ID = " + id);

    x = students.get(id);

    if (x != null) {

    System.out.println("Found!  Name = " + x.getName());

    }

    else {

    System.out.println("Invalid ID:  " + id);

    }

    System.out.println();

    System.out.println("Here are all of the students:");

    System.out.println();

    // Iterate through the HashMap to process all Students.

    for (Student s : students.values()) {

    System.out.println("ID:  " + s.getIdNo());

    System.out.println("Name:  " + s.getName());

    System.out.println();

    }

    }

    }

    ```


    Here’s the output:


    ```

    Let''s try to retrieve a Student with ID = 98765-00

    Found!  Name = Barney

    Let''s try to retrieve a Student with ID = 00000-00

    Invalid ID:  00000-00

    Here are all of the students:

    ID:  12345-12

    Name:  Fred

    ID:  98765-00

    Name:  Barney

    ID:  71024-91

    Name:  Wilma

    ```


    The first point of interest is that when we declare and instantiate a `HashMap`,
    we must specify types for ***two*** elements: the ***key***, which is of type
    `String` in our example, and the ***value*** that this key represents`—`the value
    being looked up`—`which is of type `Student` in our example:


    ```

    HashMap students = new HashMap();

    ```


    We use the `put` method to insert an object into a `HashMap`:


    ```

    students.put(s1.getIdNo(), s1);

    ```'
