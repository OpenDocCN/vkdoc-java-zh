  trans: "\n## 本章小结\n\n在本章中，你学习了 Java 语言的一些基础知识。具体来说，我们涵盖了：\n\n*   Java 的架构中立特性\n\
    *   一个简单 Java 程序的结构\n*   如何从命令行编译和执行 Java 程序的机制\n*   八种基本 Java 类型和 `String` 类型\n\
    *   如何声明和初始化这些类型的变量\n*   如何将一种类型的表达式转换为另一种类型，以及何时需要这样做\n*   算术、赋值、逻辑和关系表达式与运算符\n\
    *   Java 中可用的循环及其他几种流程控制结构\n*   如何定义代码块以及变量作用域的概念\n*   如何使用 `System.out.println`\
    \ 和 `System.out.print` 方法打印文本消息\n*   良好 Java 编程风格的一些基本要素\n\n关于 Java 还有很多需要学习——这些知识在构建本书第三部分的\
    \ SRS 应用程序时会用到——但我需要先解释一些基本的对象概念。所以，让我们进入第 3 章！\n\n练习题\n\n1.  将你目前学到的 Java 知识与你已经熟悉的另一种编程语言进行比较。这两种语言有哪些相似之处？又有哪些不同？\n\
    \n2.  [*编码*] 创建一个程序，使用 (a) `for` 循环和 `continue` 语句，以及 (b) `while` 循环和一个作为标志的 `boolean`\
    \ 变量，将 2 到 10 之间的偶数打印到命令窗口。\n\n3.  给定以下初始变量声明和值赋值，在不使用 Java 编译器的情况下，手动计算最后一行代码中表达式的值：\n\
    \n    ```\n    int a = 1;\n    int b = 1;\n    int c = 1;\n    ((((c++ + --a)\
    \ * b) != 2) && true)\n    ```\n\n使用嵌套的 `for` 或 `if` 循环，编写一个名为 `Stars.java` 的程序，生成以下输出：\n\
    \n```\n1: *\n2: **\n3: ***\n4: ****\n5: *****\n```\n\n# 3. 对象与类\n\n最简单的软件 功能分解\
    \ 面向对象方法 什么是对象？ 状态/数据/属性 行为/操作/方法 什么是类？ 关于命名约定的说明 声明一个类，Java 风格 实例化 封装 用户定义类型与引用变量\
    \ 引用变量的命名约定 实例化对象：深入探讨 垃圾回收 对象作为属性 一个编译“技巧”：“桩代码”类 组合 引用作为属性的优势 面向对象编程语言的三个显著特征\
    \ 本章小结\n\n对象是面向对象应用程序的基本构建块。正如你在第 1 章中学到的，抽象涉及对现实世界进行建模，你将在本章中看到，对象是构成这种模型的各种现实世界元素的“微型抽象”。\n\
    \n在本章中，你将学习：\n\n*   与“传统”非面向对象方法相比，面向对象软件开发方法的优势\n*   如何使用类来指定对象的数据和行为\n*   如何在运行时创建对象\n\
    *   如何声明**引用变量**以在程序中符号化地引用对象\n*   对象如何在内存中相互追踪\n\n## 最简单的软件\n\n在最简单的层面上，每个软件应用程序都由两个主要组件组成：***数据***\
    \ 和操作这些数据（即输入、输出、计算、存储、检索、打印等）的***函数***。（见图 3-1。）\n\n![](img/78624_3_En_3_Fig1_HTML.png)\n\
    \n一个阴阳符号，分别标有“数据”和“函数”。\n\n图 3-1\n\n最简单的软件由数据以及操作这些数据的函数组成\n\n面向对象之前的软件设计方式被称为（**自顶向下**）**功能分解**。让我们将功能分解的软件设计方法与面向对象方法进行比较。\n"
- fmt: '### Functional Decomposition


    With functional decomposition, we started with a statement of the overall function
    that a system was expected to perform—for example, “Student Registration.” We
    then broke that function down into subfunctions:


    - “Add a New Course to the Course Catalog”

    - “Allow a Student to Enroll in a Course”

    - “Print a Student’s Class Schedule”

    - And so forth


    We next decomposed those functions into smaller subfunctions. For example, we
    might decompose “Allow Student to Enroll in a Course” into:


    - “Display List of Available Courses”

    - “Allow Student to Select a Course”

    - “Verify That Student Has Met All Prerequisites”

    - And so forth


    We kept decomposing functions into smaller and smaller logical pieces until we
    could reasonably subdivide no further, as illustrated in Figure [3-2](#78624_3_En_3_Chapter.xhtml#Fig2).


    ![](images/78624_3_En_3_Chapter/78624_3_En_3_Fig2_HTML.jpg)


    A block diagram of student registration has the following flow. Display the list
    of available courses, allow students to select a course, and verify that the student
    has met all prerequisites. All 3 are connected to blocks of etcetera.


    Figure 3-2


    We functionally decomposed an application from the top down…


    We then assigned the lowest-level functions to different programmers to code and
    **unit test** (i.e., test in isolation). Finally, we assembled these functions
    in modular fashion from the bottom up, testing the results of each successive
    stage in the integration process, until we had a complete application built, as
    illustrated in Figure [3-3](#78624_3_En_3_Chapter.xhtml#Fig3).


    ![](images/78624_3_En_3_Chapter/78624_3_En_3_Fig3_HTML.jpg)


    A block diagram of student registration has the following flow from bottom to
    top. Blocks of etcetera are connected to display the list of available courses,
    allow students to select a course, and verify that the student has met all prerequisites.


    Figure 3-3


    …and assembled the application from the bottom up


    With the functional decomposition approach to software development, our primary
    focus was on the **functions** that an application was to perform; **data** was
    an afterthought. That is,


    - Data was passed around from one function to the next, like a car being manufactured
    via an assembly line process in an automotive plant.

    - Data structure thus had to be understood in **many** places (i.e., by many functions)
    throughout an application.

    - If an application’s data structure had to change after the application was deployed,
    **major** “ripple effects” often arose throughout the application. One of the
    most dramatic examples of a ripple effect due to a change in data structure was
    the Y2K crisis, wherein a seemingly simple change in date formats—from a two-
    to four-digit year—caused a worldwide panic! **Billions** of dollars were spent
    on trying to find and repair what were expected to be disastrous ripple effects
    before the clock struck midnight on January 1, 2000.

    - Despite our best efforts to test an application thoroughly before deploying
    it, bugs always manage to creep through undetected. If data integrity errors arose
    as a result of faulty logic after an application had been fully integrated, it
    was often very difficult to pinpoint precisely where—that is, **in which specific
    function(s)**—the error might have occurred, because the data had been passed
    from function to function so many times.


    ### The Object-Oriented Approach


    As you’ll see over the next several chapters, the OO approach to software development
    remedies the vast majority of these shortcomings.


    - With OO software development, we focus on designing the application’s **data
    structure** first and its functions second.

    - Data is **encapsulated** inside of objects; thus, data structure has to be understood
    only by the object to which the data belongs.

    - If an object’s data structure has to change after the application has been deployed,
    there are virtually **no ripple effects**; only the internal logic of the affected
    object must change.

    - **Each object is responsible for ensuring the integrity of its own data**. Thus,
    if data integrity errors arise within a given object’s data, we can pretty much
    assume that it was the object **itself** that allowed this to happen, and we can
    therefore focus on that object’s internal functional logic to isolate the “bug.”


    ## What Is an Object?


    Before we talk about software objects, let’s talk about real-world objects in
    general. According to Merriam-Webster’s Collegiate Dictionary, an object is “(1)
    something material that may be perceived by the senses; (2) something mental or
    physical toward which thought, feeling, or action is directed.”


    The first part of this definition refers to objects as we typically think of them:
    as physical “things” that we can see and touch and that occupy space. Because
    we intend to use the Student Registration System (SRS) case study as the basis
    for learning about objects throughout this book, let’s think of some examples
    of **physical objects** that make sense in the general context of an academic
    setting, namely:


    - The **students** who attend classes

    - The **professors** who teach the students

    - The **classrooms** in which class meetings take place

    - The **audiovisual equipment** in these classrooms

    - The **buildings** in which the classrooms are located

    - The **textbooks** students use

    - And so forth


    Of course, while all of these types of objects are commonly found on a typical
    college campus, not all of them are relevant to registering students for courses,
    nor are they all necessarily called out by the SRS case study, but we won’t worry
    about that for the time being. In Part 2 of this book, you’ll learn a technique
    for using a requirements specification as the basis for identifying which types
    of objects are relevant to a particular abstraction.


    Now, let’s focus on the second half of the definition, particularly on the phrase
    **“something mental… toward which thought, feeling, or action is directed.”**
    There are a great many **conceptual objects** that play important roles in an
    academic setting; some of these are:


    - The **courses** that students attend

    - The **departments** that faculty work for

    - The **degrees** that students receive


    And, of course, there are many others. Even though we can’t see, touch, taste,
    smell, or hear them, conceptual objects are every bit as important as physical
    objects in an overall abstraction.


    From a software perspective, a (software) **object** is a software construct/module
    that bundles together **state** (**data**) and **behavior** (**functions**), which,
    taken together, represent an abstraction of a real-world (physical or conceptual)
    object. This is illustrated conceptually in Figure [3-4](#78624_3_En_3_Chapter.xhtml#Fig4).


    ![](images/78624_3_En_3_Chapter/78624_3_En_3_Fig4_HTML.png)


    A yin and yang symbol has the labels state of data and behavior of functions,
    respectively.


    Figure 3-4


    A software object bundles state (data) and behavior (functions)


    Let’s explore the two sides of objects—their state and behavior—separately, in
    more depth.'
