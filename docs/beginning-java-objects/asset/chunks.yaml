- fmt: '# Identifying Attributes


    To determine what the attributes for each of our domain classes should be, we
    make yet another pass through the requirements specification looking for clues.
    We already stumbled upon a few attributes earlier, when we weeded out some nouns/noun
    phrases from our candidate class list:


    - For the `Section` class, we identified “day of week,” “room,” “seating capacity,”
    “semester,” and “time of day” as attributes.

    - For the `Student` class, we identified “degree” as an attribute.


    We can also bring any prior knowledge that we have about the domain into play
    when assigning attributes to classes. Our knowledge of the way that universities
    operate, for example, suggests that all students will need some sort of student
    ID number as an attribute, even though this isn’t mentioned anywhere in the SRS
    specification. This is a detail that we’d have to go back to our end users for
    clarification on.


    Finally, we can also look at how similar information has been represented in existing
    legacy systems for clues as to what a class’s attributes should be. For example,
    if a Student Billing System already exists at the university based on a relational
    database design, we might wish to study the structure of the relational database
    table housing student information. The columns that have been provided in that
    table—`name`, `address`, `birthDate`, etc.—are potential attribute choices.


    # UML Notation: Modeling the Static Aspects of an Abstraction


    Now that we have a much better understanding about the static aspects of our model,
    we’re ready to portray these in graphical fashion to complement the narrative
    documentation that we’ve developed for the SRS. We’ll be using the UML to produce
    a class diagram. Here are the rules for how various aspects of the model are to
    be portrayed.


    ## Classes, Attributes, and Operations


    We represent classes as rectangles. When we first conceive of a class—before we
    know what any of its attributes or methods are going to be—we simply place the
    class name in the rectangle, as illustrated in Figure 10-5.


    ![](images/78624_3_En_10_Chapter/78624_3_En_10_Fig5_HTML.png)


    Figure 10-5: UML depiction of the `Student` class


    An abstract class is denoted by presenting the class name in italics, as shown
    in Figure 10-6.


    ![](images/78624_3_En_10_Chapter/78624_3_En_10_Fig6_HTML.png)


    Figure 10-6: UML depiction of an abstract class


    When we’re ready to reflect the attributes and behaviors of a class, we divide
    the class rectangle into three compartments—the class name compartment, the attributes
    compartment, and the operations compartment—as shown in Figure 10-7. Note that
    UML favors the nomenclature of “operations” vs. “methods” to reinforce the notion
    that the diagram is intended to be programming language independent.


    ![](images/78624_3_En_10_Chapter/78624_3_En_10_Fig7_HTML.png)


    Figure 10-7: Class rectangles are divided into three compartments


    Some CASE tools automatically portray all three (empty) compartments when a class
    is first created, even if we haven’t specified any attributes or operations yet,
    as shown in Figure 10-8.


    ![](images/78624_3_En_10_Chapter/78624_3_En_10_Fig8_HTML.png)


    Figure 10-8: Alternative UML class depiction as rendered by some CASE tools


    As we begin to identify what the attributes and/or operations need to be for a
    particular class, we can add these to the diagram in as much or as little detail
    as we care to.


    We may choose simply to list attribute names (see Figure 10-9), or we may specify
    their names along with their types (see Figure 10-10).


    ![](images/78624_3_En_10_Chapter/78624_3_En_10_Fig10_HTML.png)


    Figure 10-10: Sometimes both attribute names and types are shown


    ![](images/78624_3_En_10_Chapter/78624_3_En_10_Fig9_HTML.png)


    Figure 10-9: Sometimes just attribute names are presented


    We may even wish to specify an initial starting value for an attribute, as in
    `gpa : double = 0.0`, although this is less common.


    Static attributes are identified as such by underlining their names (see Figure
    10-11).


    ![](images/78624_3_En_10_Chapter/78624_3_En_10_Fig11_HTML.png)


    Figure 10-11: Identifying static attributes by underlining


    We may choose simply to list operation names in the operations compartment of
    a class rectangle, as shown in Figure 10-12, or we may optionally choose to use
    an expanded form of operation definition, as we have for the `registerForCourse`
    operation in Figure 10-13.


    ![](images/78624_3_En_10_Chapter/78624_3_En_10_Fig13_HTML.png)'
