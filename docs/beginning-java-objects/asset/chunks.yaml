    \n图 3-14\n\n第二个 `Student` 对象现在也已从我们的程序中丢失\n\n### 垃圾回收\n\n事实证明，如果一个对象的所有引用都被释放，那么该对象在\
    \ JVM 中占用的内存似乎就会被永久浪费。在像 C++ 这样的语言中，如果程序员没有在释放对象所有引用之前明确地回收不再需要的对象的内存，这种情况确实可能发生。未能做到这一点是\
    \ C++ 程序中长期存在的问题根源，通常被称为**内存泄漏**。\n\n在 C++ 中，这是通过以下语句实现的：\n\n`x.delete();`\n\n\
    但在 Java 中，这样的语句是不必要的，原因我们即将讨论。\n\n另一方面，在 Java 中，JVM 会定期执行**垃圾回收**，这是一个在应用程序执行期间自动为我们回收“丢失”对象内存的过程。以下是\
