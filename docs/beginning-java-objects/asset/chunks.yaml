- fmt: '### `if` Statements


    The `if` statement is a basic conditional branch statement that executes one or
    more lines of code if a condition, represented as a logical expression, is satisfied.
    Alternatively, one or more lines of code can be executed if the condition is **not**
    satisfied by placing that code after the keyword `else`. The use of an `else`
    clause within an `if` statement is optional.


    The basic syntax of the `if` statement is as follows:


    ```

    // Pseudocode.

    if (logical-expression) {

    execute whatever code is contained within these braces if

    logical-expression evaluates to true

    }

    ```


    Or add an optional `else` clause:


    ```

    // Pseudocode.

    if (logical-expression) {

    execute whatever code is contained within these braces if

    logical-expression evaluates to true

    }

    else {

    execute whatever code is contained within these braces if

    logical-expression evaluates to false

    }

    ```


    If only one executable statement follows either the `if` or (optional) `else`
    keyword, the braces can be omitted, as shown here:


    ```

    // Pseudocode.

    if (logical-expression) single statement to execute if logical-expression is true;

    else single statement to execute if logical-expression is false;

    ```


    For example:


    ```

    if (x > 3) y = x;

    else z = x;

    ```


    Alternatively, optional line breaks can be inserted:


    ```

    if (x > 3)

    y = x;

    else

    z = x;

    ```


    But it’s generally considered good practice to always use braces as follows:


    ```

    if (x > 3) {

    y = x;

    }

    else {

    z = x;

    }

    ```


    A single `boolean` variable, as a simple form of Boolean expression, can serve
    as the logical expression/condition of an `if` statement. For example, it’s perfectly
    acceptable to write the following:


    ```

    // Use boolean variable "finished" as a flag that will get set to true when

    // some particular operation is completed.

    boolean finished;

    // Initialize it to false.

    finished = false;

    // The details of intervening code, in which the flag may or may not get set to

    // true, have been omitted ...

    // Test the flag.

    if (finished) { // equivalent to:  if (finished == true) {

    System.out.println("We are finished!  :o)");

    }

    ```


    The `!` (“not”) operator can be used to negate a logical expression, so that the
    block of code associated with an `if` statement is executed when the expression
    evaluates to `false` instead:


    ```

    if (!finished) { // equivalent to:  if (finished == false)

    System.out.println("We are NOT finished ... :op");

    }

    ```


    When testing for equality of two expressions, remember that we must use **two**
    consecutive equal signs, not just one:


    ```

    if (x == 3) { // Note use of double equal signs (==) to test for equality.

    y = x;

    }

    ```


    A common mistake made by beginning Java programmers—particularly those who’ve
    previously programmed in C or C++—is to try to use a **single** equal sign to
    test for equality, as in this example:


    ```

    // Note incorrect use of single equal sign below.

    if (x = 3) {

    y = x;

    }

    ```


    In Java, an `if` test must be based on a valid **logical** expression; `x = 3`
    isn’t a logical expression, but rather an **assignment** expression. In fact,
    the preceding `if` statement won’t even compile in Java, whereas it **would**
    compile in the C and C++ programming languages, because in those languages, `if`
    tests are based on evaluating expressions to either the **integer** value 0 (interpreted
    to mean `false`) or nonzero (interpreted to mean `true`).


    It’s possible to nest `if-else` constructs to test more than one condition. If
    nested, an inner `if` (plus optional `else`) statement is placed within either
    the `if` part or the `else` part of an outer `if`. Here is one commonly seen syntax
    for a two-level nested `if-else` construct:


    ```

    if (logical-expression-1) {

    execute this code

    }

    else {

    if (logical-expression-2) {

    execute this alternate code

    }

    else {

    execute this code if neither of the above expressions evaluate to true

    }

    }

    ```


    There’s no limit to how many nested `if-else` constructs can be used, although
    if nested too deeply, the code may become difficult for a human reader to understand
    and hence maintain.


    The nested `if` statement shown in the preceding example may alternatively be
    written without using nesting as follows:


    ```

    if (logical-expression-1) {

    execute this code

    }

    else if (logical-expression-2) {

    execute this alternate code

    }

    else {

    execute this code if neither of the above expressions evaluate to true

    }

    ```


    Note that the two forms are logically equivalent.


    ### `switch` Statements


    A `switch` statement is similar to an `if-else` construct in that it allows the
    conditional execution of one or more lines of code. However, instead of evaluating
    a logical expression as an `if-else` construct does, a `switch` statement compares
    the value of an expression against values defined by one or more `case` labels.
    If a match is found, the code following the matching `case` label is executed.
    An optional `default` label can be included to define code that is to be executed
    if the expression matches **none** of the `case` labels.


    The general syntax of a `switch` statement is as follows:


    ```

    switch (int-or-char-expression) {

    case value1:

    one or more lines of code to execute if value of expression matches value1

    break;

    case value2:

    one or more lines of code to execute if value of expression matches value2

    break;

    // more case labels, as needed ...

    case valueN:

    one or more lines of code to execute if value of expression matches valueN

    break;

    default:

    default code to execute if none of the cases match

    }

    ```


    For example:


    ```

    // x is assumed to have been previously declared as an int.

    switch (x) {

    case 1:  // executed if x equals 1

    System.out.println("One ...");

    break;

    case 2:  // executed if x equals 2

    System.out.println("Two ...");

    break;

    default:  // executed if x has a value other than 1 or 2

    System.out.println("Neither one nor two ...");

    }

    ```


    Note the following:


    - The expression in parentheses following the `switch` keyword must be an expression
    that evaluates to a `char` or `int` value (or, as we will learn later in the book,
    to a few other special expression types).

    - The values following the `case` labels must be constant `char` or `int` values
    (or, as we will learn later in the book, to a few other special expression types).

    - The `break;` statement causes the `switch` to stop executing once a given case
    has been completed; execution resumes after the closing `}` of the `switch` statement.

    - Colons (`:`), not semicolons (`;`), terminate the `case` and `default` labels.

    - The statements following a given `case` label don’t have to be enclosed in braces.
    They constitute a **statement list** rather than a code block.


    Unlike an `if` statement, a `switch` statement isn’t automatically terminated
    when a match is found and the code following the matching `case` label is executed.
    To exit a `switch` statement, a `break` statement must be used. If a `break` statement
    isn’t included following a given `case` label, execution will “fall through” to
    the next `case` or `default` label. This behavior can be used to our advantage:
    when the same logic is to be executed for more than one `case` label, two or more
    `case` labels can be stacked up back to back, as shown here:


    ```

    // x is assumed to have been previously declared as an int

    switch (x) {

    case 1:

    code to be executed if x equals 1

    case 2:

    code to be executed if x equals 1 OR 2

    case 3:

    code to be executed if x equals 1, 2, OR 3

    break;

    case 4:

    code to be executed if x equals 4

    }

    ```'
