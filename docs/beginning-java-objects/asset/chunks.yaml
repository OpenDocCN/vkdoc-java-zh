  trans: '

    ## 什么是类？


    **类**是一种抽象概念，用于描述一组相似对象中所有对象的共同特征。例如，可以创建一个名为“Student”的类，来描述学生选课系统（SRS）所能识别的所有学生对象。


    一个类定义了：


    *   属于该类的每个对象的***数据结构***（即***属性***的名称和类型）

    *   这些对象要执行的操作/***方法***：具体来说，包括这些操作是什么、如何正式调用对象来执行它们，以及对象为了实际执行这些操作需要在幕后采取哪些行动


    例如，`Student` 类可能被设计为拥有表 3-1 中列出的九个属性。


    表 3-1


    学生类的拟议属性


    | 属性 | Java 类型 |

    | --- | --- |

    | `name` | `String` |

    | `studentId` | `String` |

    | `birthDate` | `Date` |

    | `address` | `String` |

    | `major` | `String` |

    | `gpa` | `Double` |

    | `advisor` | ??? |

    | `courseLoad` | ??? |

    | `transcript` | ??? |


    请注意，`Student` 的许多属性可以用 Java 内置类型（例如 `String`、`double` 和 `Date`）来表示，但其中一些属性——`advisor`、`courseLoad`
    和 `transcript`——过于复杂，Java 内置类型无法处理。你将在本书稍后部分学习如何处理此类属性。


    在操作方面，`Student` 类可能定义五个方法，其名称如下：


    *   `registerForCourse`

    *   `dropCourse`

    *   `chooseMajor`

    *   `changeAdvisor`

    *   `printTranscript`


    你将在第 4 章学习如何在 Java 中正式声明方法。


    请注意，一个对象只能执行其所属类已定义方法的事情。从这个意义上说，对象就像一台电器：它可以做它被设计用来做的事情（DVD 播放器提供播放、暂停、停止和搜索特定电影场景的按钮），仅此而已（你不能要求
    DVD 烤一个百吉饼——至少成功的机会不大！）。因此，成功设计对象的一个重要方面是确保预见到它为了在系统中执行其“使命”所需的所有行为。你将在本书第 2 部分学习如何根据应用程序的整体需求，正式确定对象的使命、数据结构和行为应该是什么。


    术语**特性**（feature）被用来统称一个类的属性和方法。也就是说，一个包含九个属性声明和五个方法声明的类定义被认为有 14 个特性。


    ### 关于命名约定的说明


    所有面向对象编程语言（OOPL），包括 Java，都遵循以下命名约定：


    *   在命名类时，我们以***大写***字母开头，但整个名称使用大小写混合：`Student`、`Course`、`Professor` 等。当一个类的名称理想情况下应该是一个多词短语时，例如“course
    catalog”，我们将每个单词的首字母大写，并将这些单词连接起来，不使用空格、破折号或下划线分隔——例如 `CourseCatalog`。这种风格被称为**帕斯卡命名法**（Pascal
    casing）。

    *   属性和方法名称的约定是以***小写***字母开头，但名称中后续单词的首字母大写。因此，典型的属性名称可能是 `name`、`studentId` 或
    `courseLoad`，而典型的方法名称可能是 `registerForCourse` 和 `printTranscript`。这种风格被称为**驼峰命名法**（camel
    casing）。


    ### 声明一个类：Java 风格


    一旦我们确定了希望赋予一组相似对象的共同数据结构和行为，我们就必须在 Java 类的上下文中将它们正式声明为属性和方法。例如，我们将按照表 3-1 中所示的方式，对
    `Student` 类的数据结构进行编程，如下所示：


    ```

    public class Student {

    // 属性声明通常出现在类声明的最前面 ...

    String name;

    String studentId;

    Date birthDate;

    String address;

    String major;

    double gpa;

    // 类型？ advisor – 我们稍后会声明这个属性

    // 类型？ courseLoad - 同上

    // 类型？ transcript - 同上

    // ... 然后是方法声明（细节省略——你将在第 4 章学习如何在 Java 中编写方法。）

    }

    ```


    与本书迄今为止所见的所有 Java 类定义一样，此类定义将位于一个名为 *ClassName*`.java`（具体来说是 `Student.java`）的源文件中，随后将被编译成字节码形式，文件名为
    `Student.``class`。请注意，类声明中出现了保留字 `public`。我们将在本书后面讨论公共可见性的概念。


    请注意，为了使上述代码能够编译，我们需要在声明


    `public class Student { ... }`


    之前插入语句


    `import java.util.Date;`


    我们将在第 6 章讨论 `import` 指令。


    请注意，我们的 `Student` 类不需要声明 `main` 方法。与本书前面展示的用于封装程序 `main` 方法的类不同


    ```

    public class Simple {

    public static void main(String[] args) {

    System.out.println("I love Java!!!");

    }

    }

    ```


    `Student` 类服务于不同的目的：即，我们正在定义 `Student` 对象的数据结构和行为应该是什么。因为 `Student` 类不包含 `main`
    方法，所以尝试用 JVM 执行其字节码是没有意义的——输入


    ```

    java Student

    ```


    会导致错误消息


    ```

    Error: main method not found in class Student, please define the main method as:

    public static void main(String [] args)

    ```

