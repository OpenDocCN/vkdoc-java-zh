    ## A More Sophisticated Type of Collection: The ArrayList Class


    `Array`s are ideal for organizing a fixed number of like-typed elements—for example,
    a `String` array containing the abbreviated names of the days of the week:


    ```

    String[] daysOfWeek = { "Mon.", "Tue.", "Wed.", "Thu.", "Fri.", "Sat.", "Sun."
    };

    ```


    However, as mentioned earlier, it’s often difficult—if not impossible—for us to
    predict in advance the number of objects that a collection will need to hold (e.g.,
    how many courses a given student is going to register for when they are logged
    on to the SRS). When using an `Array` as a collection type, however, we’re required
    to make such a determination when we first instantiate the array, and, once sized,
    an array can’t be expanded. To use an array under such unpredictable circumstances,
    we’d therefore have to ensure that it was big enough to handle the worst-case
    scenario, which isn’t very efficient.


    Fortunately, OO languages provide a wide variety of collection types besides arrays
    for us to choose from; each has its own unique properties and advantages. As mentioned
    earlier in the chapter, one important differentiating feature of ***all*** Java
    collection types ***besides*** arrays is that they needn’t be sized in advance:
    when we add items to a non-array collection, it automatically ***grows*** in size,
    and as we remove items, the collection will ***shrink*** accordingly (recall Figure
    [6-3](#78624_3_En_6_Chapter.xhtml#Fig3)).


    Let’s now take a look at one of the most commonly used predefined Java collection
    classes, `ArrayList`, to see how it implements the notion of an ordered list collection.


    ### Using the ArrayList Class: An Example


    Here is a simple program that illustrates the use of an `ArrayList` collection
    to hold on to references to `Student` objects. We’ll look at the program in its
    entirety first, and we’ll then step through it to examine key points one by one:


    ```

    import java.util.*;

    public class ArrayListExample {

    public static void main(String[] args) {

    // Instantiate a collection.

    ArrayList students = new ArrayList();  // or simply new ArrayList();

    // Create a few Student objects.

    Student a = new Student("Herbie");

    Student b = new Student("Klem");

    Student c = new Student("James");

    // Store references to all three Students in the collection.

    students.add(a);

    students.add(b);

    students.add(c);

    // ... and then iterate through them one by one,

    // printing each student''s name.

    for (Student s : students) {

    System.out.println(s.getName());

    }

    }

    }

    ```'
