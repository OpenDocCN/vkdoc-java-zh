- fmt: "### Declaring Accessor Methods\n\nThe following code, excerpted from the `Student`\
    \ class, illustrates the conventional accessor methods—informally known as **“get”**\
    \ and **“set” methods**—that we might write for reading/writing the value of two\
    \ `private` attributes of the `Student` class called `name` and `facultyAdvisor`,\
    \ respectively:\n\n```\npublic class Student {\n// Attributes are typically declared\
    \ to be private.\nprivate String name;\nprivate Professor facultyAdvisor;\n//\
    \ other attributes omitted from this example ...\n// Provide public accessor methods\
    \ for reading/modifying\n// private attributes from client code.\n// Client code\
    \ will use this method to read (\"get\") the value of the\n// \"name\" attribute\
    \ of a particular Student object.\npublic String getName() {\nreturn name;\n}\n\
    // Client code will use this method to modify (\"set\") the value of the\n// \"\
    name\" attribute of a particular Student object.\npublic void setName(String newName)\
    \ {\nname = newName;\n}\n// Client code will use this method to read (\"get\"\
    ) the value of the\n// facultyAdvisor attribute of a particular Student object.\n\
    public Professor getFacultyAdvisor() {\nreturn facultyAdvisor;\n}\n// Client code\
    \ will use this method to modify (\"set\") the value of the\n// facultyAdvisor\
    \ attribute of a particular Student object.\npublic void setFacultyAdvisor(Professor\
    \ p) {\nfacultyAdvisor = p;\n}\n// etc.\n}\n```\n\nThe nomenclature “get” and\
    \ “set” is stated from the standpoint of ***client code***: think of a “set” method\
    \ as the way that ***client code*** stuffs a value ***into*** an object’s attribute\
    \ (see Figure [4-7](#78624_3_En_4_Chapter.xhtml#Fig7))…\n\n![](images/78624_3_En_4_Chapter/78624_3_En_4_Fig7_HTML.png)\n\
    \nA block diagram in the shape of a brick wall has the object name fred with an\
    \ arrow set pointing inwards.\n\nFigure 4-7\n\nA “set” method is used to pass\
    \ data **into** an object\n\n… and the “get” method as the way that ***client\
    \ code*** retrieves an attribute value ***from*** an object (see Figure [4-8](#78624_3_En_4_Chapter.xhtml#Fig8)).\n\
    \n![](images/78624_3_En_4_Chapter/78624_3_En_4_Fig8_HTML.png)\n\nA block diagram\
    \ in the shape of a brick wall has the object name fred with an arrow get pointing\
    \ outwards.\n\nFigure 4-8\n\nA “get” method is used to retrieve data **from**\
    \ an object\n\n### Recommended “Get”/“Set” Method Headers\n\nFor an attribute\
    \ declaration of the form\n\n```\naccessibility*  attribute-type attributeName;\
    \     * typically private\n```\n\nfor example,\n\n```\nprivate String majorField;\n\
    ```\n\nthe rules for formulating conventional accessor method headers are as follows.\n\
    \n***For a “get” method, the formula is as follows:***\n\n```\npublic attribute-type\
    \ getAttributeName()\n```\n\nFor example:\n\n*   The name of the method is formulated\
    \ by capitalizing the first letter of the attribute name in question (e.g., `majorField`)\
    \ and sticking “get” in front (e.g., `getMajorField`).\n\n*   Note that we don’t\
    \ typically pass any arguments into a “get” method, because all we want an object\
    \ to do is to hand us back the value of one of its attributes; we don’t typically\
    \ need to tell the object anything special for it to know how to do this.\n\n\
    *   Also, because we’re expecting an object to hand back the value of a specific\
    \ attribute, the return type of the “get” method must match the type of the attribute\
    \ of interest. If we’re “getting” the value of an `int` attribute, then the return\
    \ type of the corresponding “get” method must be `int`; if we’re “getting” the\
    \ value of a `Professor` attribute, then the return type of the corresponding\
    \ “get” method must be `Professor`; and so forth.\n\n*   Here’s a typical “get”\
    \ method in its entirety, shown in the context of the `Student` class:\n\n```\n\
    \    public class Student {\n    private String majorField;\n    // Other attributes\
    \ omitted from this example.\n    public String getMajorField() {\n    // Return\
    \ the value of the majorField attribute.\n    return majorField;\n    }\n    //\
    \ etc.\n    }\n    ```\n\n```\npublic String getMajorField()\n```\n\n***For a\
    \ “set” method, the formula is as follows:***\n\n```\npublic void setAttributeName(attributeType\
    \ parameterName)\n```\n\nFor example:\n\n*   The name of the method is formulated\
    \ by capitalizing the first letter of the attribute name in question (e.g., `majorField`)\
    \ and sticking “set” in front (e.g., `setMajorField`).\n\n*   In the case of a\
    \ “set” method, we must pass in the value that we want the object to use when\
    \ setting its corresponding attribute value, and the type of the value that we’re\
    \ passing in must match the type of the attribute being set. If we’re “setting”\
    \ the value of an `int` attribute, then the argument that is passed into the corresponding\
    \ “set” method must be an `int`; if we’re “setting” the value of a `Professor`\
    \ attribute, then the argument that is passed into the corresponding “set” method\
    \ must be a `Professor`; and so forth.\n\n*   Since simple “set” methods are typically\
    \ expected to perform their mission silently, without returning a value to the\
    \ client, we typically declare “set” methods to have a return type of `void`.\n\
    \n*   Here’s a typical “set” method in its entirety, shown in the context of the\
    \ `Student` class:\n\n```\n    public class Student {\n    private String majorField;\n\
    \    // Other attributes omitted from this example.\n    public String getMajorField()\
    \ {\n    // Return the value of the majorField attribute.\n    return majorField;\n\
    \    }\n    public void setMajorField(String major) {\n    // Assign the value\
    \ passed in as an argument as the new value of\n    // the majorField attribute.\n\
    \    majorField = major;\n    }\n    }\n    ```\n\n```\npublic void setMajorField(String\
    \ major)\n```\n\nThere is one exception to the “get” method naming convention:\
    \ when an attribute is of type `boolean`, it’s recommended to name the “get” method\
    \ starting with the verb `is` instead of with `get`. The “set” method for a `boolean`\
    \ attribute would still follow the standard naming convention, however, for example:\n\
    \n```\npublic class Student {\nprivate boolean honorsStudent;\n// other attributes\
    \ omitted from this example ...\n// Get method.  For a boolean, the method name\
    \ starts with \"is\" vs. \"get\".\npublic boolean isHonorsStudent() {\nreturn\
    \ honorsStudent;\n}\n// Set method.\npublic void setHonorsStudent(boolean x) {\n\
    honorsStudent = x;\n}\n// etc.\n}\n```\n\nAll of the “get”/“set” method bodies\
    \ that we’ve seen thus far are simple “one-liners”: we’re either returning the\
    \ value of the attribute of interest with a simple `return` statement in a “get”\
    \ method or copying the value of the passed-in argument to the internal attribute\
    \ in a “set” method so as to store it. This isn’t to imply that all “get”/“set”\
    \ methods need be this simple; in fact, there are endless possibilities for what\
    \ actually gets coded in accessor methods, because, as we discussed earlier, methods\
    \ must implement business rules, not only about how an object behaves but also\
    \ what valid states its data can assume.\n\nAs a simple example, let’s say that\
    \ we always want to store a `Student`’s `name` such as “Steve Barker” in the format\
    \ “S. BARKER,” where we abbreviate the first name to a single letter and represent\
    \ the entire name in all uppercase. We might therefore wish to write the `setName`\
    \ method of the `Student` class as follows:\n\n```\npublic void setName(String\
    \ newName) {\n// First, reformat the newName, as necessary ...\n// Pseudocode.\n\
    if (newName contains full first name) {\n// Amend the value of newName.\nnewName\
    \ = newName with first name converted to a single character\nfollowed by a period;\n\
    }\n// Next, convert newName to all uppercase.\n// Pseudocode.\nnewName = upper\
    \ case version of newName;\n// Only then do we update the name attribute with\
    \ the (modified) value.\nname = newName;\n}\n```"
  raw: "### Declaring Accessor Methods\n\nThe following code, excerpted from the `Student`\
    \ class, illustrates the conventional accessor methods—informally known as **“get”**\
    \ and **“set” methods**—that we might write for reading/writing the value of two\
    \ `private` attributes of the `Student` class called `name` and `facultyAdvisor`,\
    \ respectively:\n\n```\npublic class Student {\n// Attributes are typically declared\
    \ to be private.\nprivate String name;\nprivate Professor facultyAdvisor;\n//\
    \ other attributes omitted from this example ...\n// Provide public accessor methods\
    \ for reading/modifying\n// private attributes from client code.\n// Client code\
    \ will use this method to read (\"get\") the value of the\n// \"name\" attribute\
    \ of a particular Student object.\npublic String getName() {\nreturn name;\n}\n\
    // Client code will use this method to modify (\"set\") the value of the\n// \"\
    name\" attribute of a particular Student object.\npublic void setName(String newName)\
    \ {\nname = newName;\n}\n// Client code will use this method to read (\"get\"\
    ) the value of the\n// facultyAdvisor attribute of a particular Student object.\n\
    public Professor getFacultyAdvisor() {\nreturn facultyAdvisor;\n}\n// Client code\
    \ will use this method to modify (\"set\") the value of the\n// facultyAdvisor\
    \ attribute of a particular Student object.\npublic void setFacultyAdvisor(Professor\
    \ p) {\nfacultyAdvisor = p;\n}\n// etc.\n}\n```\n\nThe nomenclature “get” and\
    \ “set” is stated from the standpoint of ***client code***: think of a “set” method\
    \ as the way that ***client code*** stuffs a value ***into*** an object’s attribute\
    \ (see Figure [4-7](#78624_3_En_4_Chapter.xhtml#Fig7))…\n\n![](images/78624_3_En_4_Chapter/78624_3_En_4_Fig7_HTML.png)\n\
    \nA block diagram in the shape of a brick wall has the object name fred with an\
    \ arrow set pointing inwards.\n\nFigure 4-7\n\nA “set” method is used to pass\
    \ data **into** an object\n\n… and the “get” method as the way that ***client\
    \ code*** retrieves an attribute value ***from*** an object (see Figure [4-8](#78624_3_En_4_Chapter.xhtml#Fig8)).\n\
    \n![](images/78624_3_En_4_Chapter/78624_3_En_4_Fig8_HTML.png)\n\nA block diagram\
    \ in the shape of a brick wall has the object name fred with an arrow get pointing\
    \ outwards.\n\nFigure 4-8\n\nA “get” method is used to retrieve data **from**\
    \ an object\n\n### Recommended “Get”/“Set” Method Headers\n\nFor an attribute\
    \ declaration of the form\n\n```\naccessibility*  attribute-type attributeName;\
    \     * typically private\n```\n\nfor example,\n\n```\nprivate String majorField;\n\
    ```\n\nthe rules for formulating conventional accessor method headers are as follows.\n\
    \n***For a “get” method, the formula is as follows:***\n\n```\npublic attribute-type\
    \ getAttributeName()\n```\n\nFor example:\n\n*   The name of the method is formulated\
    \ by capitalizing the first letter of the attribute name in question (e.g., `majorField`)\
    \ and sticking “get” in front (e.g., `getMajorField`).\n\n*   Note that we don’t\
    \ typically pass any arguments into a “get” method, because all we want an object\
    \ to do is to hand us back the value of one of its attributes; we don’t typically\
    \ need to tell the object anything special for it to know how to do this.\n\n\
    *   Also, because we’re expecting an object to hand back the value of a specific\
    \ attribute, the return type of the “get” method must match the type of the attribute\
    \ of interest. If we’re “getting” the value of an `int` attribute, then the return\
    \ type of the corresponding “get” method must be `int`; if we’re “getting” the\
    \ value of a `Professor` attribute, then the return type of the corresponding\
    \ “get” method must be `Professor`; and so forth.\n\n*   Here’s a typical “get”\
    \ method in its entirety, shown in the context of the `Student` class:\n\n```\n\
    \    public class Student {\n    private String majorField;\n    // Other attributes\
    \ omitted from this example.\n    public String getMajorField() {\n    // Return\
    \ the value of the majorField attribute.\n    return majorField;\n    }\n    //\
    \ etc.\n    }\n    ```\n\n```\npublic String getMajorField()\n```\n\n***For a\
    \ “set” method, the formula is as follows:***\n\n```\npublic void setAttributeName(attributeType\
    \ parameterName)\n```\n\nFor example:\n\n*   The name of the method is formulated\
    \ by capitalizing the first letter of the attribute name in question (e.g., `majorField`)\
    \ and sticking “set” in front (e.g., `setMajorField`).\n\n*   In the case of a\
    \ “set” method, we must pass in the value that we want the object to use when\
    \ setting its corresponding attribute value, and the type of the value that we’re\
    \ passing in must match the type of the attribute being set. If we’re “setting”\
    \ the value of an `int` attribute, then the argument that is passed into the corresponding\
    \ “set” method must be an `int`; if we’re “setting” the value of a `Professor`\
    \ attribute, then the argument that is passed into the corresponding “set” method\
    \ must be a `Professor`; and so forth.\n\n*   Since simple “set” methods are typically\
    \ expected to perform their mission silently, without returning a value to the\
    \ client, we typically declare “set” methods to have a return type of `void`.\n\
    \n*   Here’s a typical “set” method in its entirety, shown in the context of the\
    \ `Student` class:\n\n```\n    public class Student {\n    private String majorField;\n\
    \    // Other attributes omitted from this example.\n    public String getMajorField()\
    \ {\n    // Return the value of the majorField attribute.\n    return majorField;\n\
    \    }\n    public void setMajorField(String major) {\n    // Assign the value\
    \ passed in as an argument as the new value of\n    // the majorField attribute.\n\
    \    majorField = major;\n    }\n    }\n    ```\n\n```\npublic void setMajorField(String\
    \ major)\n```\n\nThere is one exception to the “get” method naming convention:\
    \ when an attribute is of type `boolean`, it’s recommended to name the “get” method\
    \ starting with the verb `is` instead of with `get`. The “set” method for a `boolean`\
    \ attribute would still follow the standard naming convention, however, for example:\n\
    \n```\npublic class Student {\nprivate boolean honorsStudent;\n// other attributes\
    \ omitted from this example ...\n// Get method.  For a boolean, the method name\
    \ starts with \"is\" vs. \"get\".\npublic boolean isHonorsStudent() {\nreturn\
    \ honorsStudent;\n}\n// Set method.\npublic void setHonorsStudent(boolean x) {\n\
    honorsStudent = x;\n}\n// etc.\n}\n```\n\nAll of the “get”/“set” method bodies\
    \ that we’ve seen thus far are simple “one-liners”: we’re either returning the\
    \ value of the attribute of interest with a simple `return` statement in a “get”\
    \ method or copying the value of the passed-in argument to the internal attribute\
    \ in a “set” method so as to store it. This isn’t to imply that all “get”/“set”\
    \ methods need be this simple; in fact, there are endless possibilities for what\
    \ actually gets coded in accessor methods, because, as we discussed earlier, methods\
    \ must implement business rules, not only about how an object behaves but also\
    \ what valid states its data can assume.\n\nAs a simple example, let’s say that\
    \ we always want to store a `Student`’s `name` such as “Steve Barker” in the format\
    \ “S. BARKER,” where we abbreviate the first name to a single letter and represent\
    \ the entire name in all uppercase. We might therefore wish to write the `setName`\
    \ method of the `Student` class as follows:\n\n```\npublic void setName(String\
    \ newName) {\n// First, reformat the newName, as necessary ...\n// Pseudocode.\n\
    if (newName contains full first name) {\n// Amend the value of newName.\nnewName\
    \ = newName with first name converted to a single character\nfollowed by a period;\n\
    }\n// Next, convert newName to all uppercase.\n// Pseudocode.\nnewName = upper\
    \ case version of newName;\n// Only then do we update the name attribute with\
    \ the (modified) value.\nname = newName;\n}\n```"
  trans: "\n### 声明访问器方法\n\n以下代码摘自 `Student` 类，展示了我们为读取/写入 `Student` 类中两个名为 `name`\
