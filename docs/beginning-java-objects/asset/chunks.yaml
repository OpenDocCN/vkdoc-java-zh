    `false`。`finished` 变量用作标志：只要 `finished` 为 `false`，`while` 循环后面的代码块就会继续执行。当 `i`
    的值达到 4 时，`finished` 标志将被设置为 `true`，此时 `while` 循环将终止：


    ```

    public class WhileDemo {

