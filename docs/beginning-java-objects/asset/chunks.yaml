    ### 重写 equals 方法


    假设我们希望在使用 `equals` 方法比较两个 `Person` 实例时，如果它们的社会安全号码（`ssn`）属性值相同，就认为它们“相等”。为了实现这一点，我们需要像下面这样重写
    `equals` 方法；我们将首先完整地展示代码，然后解释其中的一些细节：


    ```

    public class Person {

    private String ssn;

    private String name;

    // 等等。

    // 构造方法。

    public Person(String s, String n) {

    this.setSsn(s);

    this.setName(n);

    }

    // 访问器方法。

    public String getSsn() {

    return ssn;

    }

    // 等等。

    // 重写从 Object 类继承的 equals 方法。

    public boolean equals(Object o) {

    boolean isEqual;

    // 尝试将 Object 引用转换为 Person 引用。

    // 如果失败，将抛出 ClassCastException 异常。

    try {

    Person p = (Person) o;

    // 如果能执行到代码的这里，说明我们正在处理一个 Person 对象；

    // 接下来，我们将比较 ssn。

    if (this.getSsn().equals(p.getSsn())) {

    // 我们认为 p 与当前 Person 对象相等。

    isEqual = true;

    }

    else {

    isEqual = false;

    }

    }

    catch (ClassCastException e) {

    // 它们不相等——o 甚至不是一个 Person 对象！

    isEqual = false;

    }

    return isEqual;

    }

    }

    ```


    让我们详细探讨一下 `equals` 方法：


    *   `Object` 类声明的 `equals` 方法头接受一个通用的 `Object` 作为参数。在为 `Person` 重写此方法时，我们不能更改此签名以显式接受一个
    `Person` 引用。相反，我们将尝试将 `o` ***强制转换*** 为对 `Person` 的引用，以确定在运行时 `o` 是否***确实***引用了一个
    `Person`；如果强制转换尝试成功，那么我们将得到两个指向同一对象的句柄——`Object o` 和 `Person p`：


    *   如果上一行代码***没有***抛出 `ClassCastException`，那么我们就知道 `o` 确实引用了一个 `Person`。我们的下一步是比较
    `p`（也就是 `o`）的 `ssn` 属性值与***当前*** `Person` 的 `ssn` 属性值——即我们最初调用其 `equals` 方法的那个
    `Person`：


    ```

    // 重写从 Object 类继承的 equals 方法。

    public boolean equals(Object o) {

    boolean isEqual;

    // 尝试将 Object 引用转换为 Person 引用。

    // 如果失败，将抛出 ClassCastException 异常。

    try {

    Person p = (Person) o;

    ```


    *   如果 `ssn` 值相等，那么 `p`（和 `o`）所引用的 `Person` 就被认为“等于”***当前*** `Person`；否则，它们不相等：


    ```

    // 如果能执行到代码的这里，说明我们正在处理一个 Person 对象；

    // 接下来，我们将比较 ssn。

    if (this.getSsn().equals(p.getSsn())) {

    ```


    *   相反，如果当我们尝试将 `o` 强制转换为 `Person` 时抛出了 `ClassCastException`，那么我们就知道 `o` 不“等于”我们正在比较的当前
    `Person`——毕竟，`o` 甚至都不是一个 `Person`！


    ```

    // 我们认为 p 与当前 Person 对象相等。

    isEqual = true;

    }

    else {

    isEqual = false;

    }

    }

    ```


    ```

    catch (ClassCastException e) {

    // 它们不相等——o 甚至不是一个 Person 对象！

    isEqual = false;

    }

    ```


    现在我们已经为 `Person` 类重写了 `equals` 方法，让我们回到之前测试 `Person` 对象相等性的示例程序。我们将完全按照之前编写的代码重新运行（为方便起见，代码重复如下）：


    ```

    public class EqualsTest2 {

    public static void main(String[] args) {

    // 我们将创建一个 Person 对象 ...

    Person p1 = new Person("222-22-2222", "Fred");

    // ... 并维护两个指向它的句柄（p1 和 p2）。

    Person p2 = p1;

    // 我们将创建第二个不同的 Person 对象，其属性值与第一个 Person 对象完全相同，

    // 并使用变量 p3 来维护指向这第二个对象的句柄。

    Person p3 = new Person("222-22-2222", "Fred");

    // p1 和 p2 是否“相等”？

    System.out.println("表达式 p1 == p2 的结果为：" + (p1 == p2));

    System.out.println("表达式 p1.equals(p2) 的结果为：" +

    (p1.equals(p2)));

    // p1 和 p3 是否“相等”？

    System.out.println("表达式 p1 == p3 的结果为：" + (p1 == p3));

    System.out.println("表达式 p1.equals(p3) 的结果为：" +

    (p1.equals(p3)));

    ```


    然而，由于我们已经为 `Person` 类重写了 `equals` 方法，执行代码时将会得到不同的结果；输出如下：


    ```

    表达式 p1 == p2 的结果为：true

    表达式 p1.equals(p2) 的结果为：true

    表达式 p1 == p3 的结果为：false

    表达式 p1.equals(p3) 的结果为：true

    ```


    请注意，尽管 `p1` 和 `p3` 引用的是两个物理上不同的 `Person` 对象，但这些对象的 `ssn` 属性具有***相同的值***，因此它们现在被认为“相等”。


    对于任何你经常需要测试对象等价性的类，请考虑重写其 `equals` 方法。


    ### 重写 toString 方法


    回想一下，（重载的）`print` 和 `println` 方法会尽力将作为参数传入的任何表达式渲染成等价的 `String` 表示形式。这对于简单数据类型来说相对直接：


    ```

    int x = 7;

    double y = 3.8;

    boolean z = false;

    System.out.println(x);

    System.out.println(y);

    System.out.println(z);

    ```


    输出：


    ```

    7

    3.8

    false

    ```


    或者对于***解析***为这些类型之一的表达式：


    ```

    int x = 7;

    double y = 3.8;

    boolean z = false;

    System.out.println(x + y);

    System.out.println(x == y);

    ```


    输出：


    ```

    10.8

    false

    ```


    另一方面，如果我们尝试打印一个解析为***对象引用***的表达式的值：


    ```

    Student s = new Student("Harvey", "123-45-6789");

    // 尝试直接打印对象引用。

    System.out.println(s);

    ```


    我们很可能会得到一个相当晦涩难懂的结果，类似于下面这样：


    ```

    Student@71f71130

    ```


    其中“`Student@71f71130`”表示一个仅与 JVM 相关的内部对象 ID。***这是为什么呢？***


    碰巧的是，所有对象都从 `Object` 类继承了一个方法，其方法头为：


    ```

    String toString();

    ```


    从 `Object` 类继承的 `toString` 方法被定义为打印对象所属的类名，后跟一个“at”符号（@），再跟一个内部对象 ID——*类名@内部 ID*——正如我们在前面的
    `Student` 示例中看到的那样。


    请注意，对于解析为对象引用的表达式，`println` 和 `print` 方法会***自动***调用该对象的 `toString` 方法；也就是说，以下两行代码是等价的：


    ```

    System.out.println(s.toString());

    ```


    和


    ```

    System.out.println(s);

    ```


    我们可能真正想做的是打印 `Student` 对象的一个或多个属性，作为该对象的***表示形式***，例如，也许打印学生的 `name`，后跟括号中的 `ssn`：


    ```

    John Smith (123-45-6789)

    ```


    我们可以通过为 `Student` 类***重写*** `toString` 方法来实现这一点，以定义我们希望打印什么内容作为 `Student` 的表示形式。例如，`Student`
    类可以像下面这样重写 `toString` 方法：


    ```

    public String toString() {

    return this.getName() + " (" + this.getSsn() + ")");

    }

    ```


    因此，以下代码：


    ```

    Student s = new Student("Harvey", "123-45-6789");

    System.out.println(s);

    ```


    现在将按预期产生替代输出：


    ```

    Harvey (123-45-6789)

    ```


    通常，为所有用户定义的类例行重写 `toString` 方法是一个好习惯。

