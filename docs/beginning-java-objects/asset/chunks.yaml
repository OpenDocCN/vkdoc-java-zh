- fmt: "### Preparing the Sequence Diagram\n\nTo prepare a sequence diagram for Scenario\
    \ #1, we do the following:\n\n- We draw vertical dashed lines, one per object\
    \ or actor that participates in the scenario; these are referred to as the objects'\
    \ **lifelines**. Note that the objects/actors can be listed in any order from\
    \ left to right in a diagram, although it's common practice to place the external\
    \ user/actor at the far left.\n- At the top of each lifeline, as appropriate,\
    \ we place either an **instance icon**—that is, a box containing the (optional)\
    \ name and class of an object participant—or a stick figure symbol to designate\
    \ an actor. (For rules governing how an instance icon is to be formed, please\
    \ refer back to the section on creating object diagrams in Chapter [10](#78624_3_En_10_Chapter.xhtml).)\n\
    - Then, for each event called out by our scenario, we reflect its corresponding\
    \ message as a horizontal ***solid-line*** arrow drawn from the lifeline of the\
    \ sender to the lifeline of the receiver.\n- Responses back from messages (in\
    \ other words, return values from methods or simple `return;` statements in the\
    \ case of methods declared to have a `void` return type) are shown as horizontal\
    \ ***dashed-line*** arrows drawn from the lifeline of the **receiver** of the\
    \ original message ***back to*** the lifeline for the **sender** of the message.\n\
    - Message arrows appear in chronological order from top to bottom in the diagram.\n\
    \nThe completed sequence diagram for Scenario #1 is shown in Figure [11-8](#78624_3_En_11_Chapter.xhtml#Fig8).\n\
    \n![](images/78624_3_En_11_Chapter/78624_3_En_11_Fig8_HTML.jpg)\n\nA sequence\
    \ diagram illustrates the following steps: log on, retrieve object from database,\
    \ request display of schedule, schedule displayed, request seat, verify plan of\
    \ study, plan of study verified, check pre-requests, confirmed, confirm seat availability,\
    \ add to course load, and display message confirming seat.\n\n**Figure 11-8**\
    \ Sequence diagram for Scenario #1\n\nLet's step through the diagram to make sure\
    \ you understand all of the activities that are reflected in the diagram:\n\n\
    ![](images/78624_3_En_11_Chapter/78624_3_En_11_Fig9_HTML.png)\n\nA sequence diagram\
    \ illustrates the following steps: student, log on, and retrieve object from database.\n\
    \n**Figure 11-9** When Fred logs on, a `Student` object is instantiated.\n\n1.\
    \ When Fred logs on to the system, his \"alter ego\" as an object is activated\
    \ (see Figure [11-9](#78624_3_En_11_Chapter.xhtml#Fig9)).\n\nPresumably, information\
    \ representing each `Student`—in other words, the `Student` object's attribute\
    \ values—is maintained offline in persistent storage, such as a DBMS or file,\
    \ until such time as the student logs on, at which time the information is used\
    \ to instantiate a `Student` object in memory, mirroring the user who has just\
    \ logged on. We'll talk about reconstituting objects from persistent storage in\
    \ Chapter [15](#78624_3_En_15_Chapter.xhtml).\n\n![](images/78624_3_En_11_Chapter/78624_3_En_11_Fig10_HTML.png)\n\
    \nA diagram illustrates the request display of the schedule and the schedule is\
    \ displayed.\n\n**Figure 11-10** As requested, a schedule of classes is displayed\n\
    \n2. When Fred the user/actor requests that the semester class schedule be displayed,\
    \ we reflect the message \"request display of schedule\" being sent to an anonymous\
    \ `ScheduleOfClasses` object. The dashed-line-arrow response from the `ScheduleOfClasses`\
    \ object indicates that the schedule is being displayed to the user, strictly\
    \ speaking, via a GUI (see Figure [11-10](#78624_3_En_11_Chapter.xhtml#Fig10)).\n\
    \nI've chosen to label the response arrows with *italic* instead of regular font,\
    \ a slight departure from official UML notation.\n\n3. The next message shown\
    \ in our diagram is a message from the user to the `Section` object, requesting\
    \ a seat in the class.\n\nThis message is shown originating from the user. In\
    \ reality, it originates from a GUI component object of the SRS GUI, but we aren't\
    \ worrying about such implementation details at this stage in the analysis effort.\n\
    \nNote that there is no immediate reply to this message; that's because the `Section`\
    \ object has a few other objects that it needs to consult with before it can grant\
    \ a seat to this student, namely:\n\n![](images/78624_3_En_11_Chapter/78624_3_En_11_Fig11_HTML.png)\n\
    \nA diagram illustrates confirm seat availability.\n\n**Figure 11-11** Availability\
    \ of the requested section is confirmed\n\n4. Assuming that both of these other\
    \ objects respond favorably, as they are expected to do by virtue of how this\
    \ scenario was written, the `Section` object then performs some internal processing\
    \ to verify that there is indeed room for Fred in this section. We reflect internal\
    \ processing within a single object as an arrow that loops back to the same lifeline\
    \ that it starts with, as shown in Figure [11-11](#78624_3_En_11_Chapter.xhtml#Fig11).\n\
    \n- The `Section` sends a message to the object representing Fred's plan of study,\
    \ asking that object to confirm that the course that Fred has requested is one\
    \ of the courses required of Fred in completing his degree program.\n- The `Section`\
    \ next sends a message to the object representing Fred's transcript, asking that\
    \ object to confirm that a prerequisite course—say COMP 001—has been satisfactorily\
    \ completed by this student.\n\nOf course, if we were to reflect ***all*** of\
    \ the internal processing that is performed by every one of the objects in our\
    \ sequence diagram, it would be ***flooded*** with such loops! The only reason\
    \ that we've chosen to show this particular loop is because it's explicitly called\
    \ out as a step in Scenario #1; if we had omitted it from our diagram, it might\
    \ appear that we had accidentally overlooked this step.\n\n5. Finally, with all\
    \ checks having been satisfied, the `Section` object has two remaining responsibilities:\n\
    \   - First, it sends a new message to the \"Fred\" `Student` object, requesting\
    \ that the `Student` object add this `Section` to Fred's course load.\n   - Next,\
    \ the `Section` object sends a response back to Fred the user/actor (via the GUI)\
    \ confirming his seat in the section. This is the response to the original \"\
    request seat\" message that was sent by the user toward the beginning of the scenario!\
    \ All of the extra \"behind-the-scenes\" processing necessary to fulfill the request—involving\
    \ a `Section` object collaborating with a `PlanOfStudy` object, a `Transcript`\
    \ object, and a `Student` object—is transparent to the user. As we saw earlier\
    \ in the chapter, Fred merely selected a section from the schedule of classes\
    \ that was displayed on the SRS GUI, clicked the Add button, and, a few moments\
    \ later, saw a confirmation message appear on his screen.\n\nOf course, as with\
    \ all modeling, this particular sequence diagram isn't necessarily the best, or\
    \ only, way to portray the selected scenario. And, for that matter, we can argue\
    \ the relative merits of one scenario as compared with another. It's important\
    \ to keep in mind that preparing sequence diagrams is but a means to an end: namely,\
    \ discovering the dynamic aspects of the system to be built—that is, the methods—to\
    \ complement our static/structural knowledge of the system. Recall that our ***ultimate***\
    \ goal for Part 2 of the book is to produce an OO blueprint that we can use as\
    \ the basis for coding the SRS model layer in Part 3. But, as already pointed\
    \ out, the class diagram that we created in Chapter [10](#78624_3_En_10_Chapter.xhtml)\
    \ had a noticeable deficiency: all of its classes' operations compartments were\
    \ empty. Fortunately, sequence diagrams provide us with the missing pieces of\
    \ information, as we'll next discuss."
