    图 10-13


    有时也会反映参数签名和返回类型。


    ![](images/78624_3_En_10_Chapter/78624_3_En_10_Fig12_HTML.png)


    一个被水平划分为三个部分的矩形框。顶部写着“学生”，中间部分包含“姓名”、“社保号”、“出生日期”和“GPA”。底部部分写着“注册课程”、“退课”和“选择专业”，并带有括号。


    图 10-12


    有时只呈现方法名。


    请注意，UML 类图中操作规范的正式语法为：


    ```

    [visibility] name [(parameter list)] [: return type]

    ```


    例如：


    ```

    registerForCourse(Course x) : boolean

    ```


    这与我们习惯的 Java 方法头语法不同：


    ```

    returnType methodName(parameter list)

    ```


    例如：


    ```

    boolean registerForCourse(Course x)

    ```


    特别要注意，UML 将操作名、参数和返回类型的组合称为**操作签名**，但在 Java 中，返回类型是方法头的一部分，但***不是*** ***方法签名***的一部分。


    使这些操作签名具有通用性而非特定于语言的依据是，同一个模型可以在多种目标编程语言中实现。然而，可以说第一种形式并不比第二种形式天生更好或更清晰。因此，如果你知道自己将使用
    Java 编程，那么在你的类图中反映标准的 Java 方法头可能是有意义的，前提是你的对象建模工具支持这一点。


    在类图中展示每个类的所有属性和操作通常是不切实际的，因为图表会变得过于杂乱，从而失去其作为沟通工具的作用。请将数据字典视为关于模型的官方、完整的信息来源，并在图表中仅反映那些在描述每个类使命时特别重要的属性和操作。特别是，“获取”和“设置”操作对所有属性都是隐含的，不应显式显示。


    此外，不要因为某个类的属性或操作区域为空，就认为该类没有关联该类型的特性；这可能仅仅意味着模型仍在演进中。


    ### 类之间的关系


    第 [4](#78624_3_En_4_Chapter.xhtml) 章定义了类之间可能存在的几种不同类型的结构关系：关联、聚合（一种特定类型的关联）和继承。让我们探讨每种关系类型是如何以图形方式表示的。


    #### 关联


    二元关联——即两个不同类之间的关系——通过在表示参与类的矩形之间画一条线，并用关联的名称标记该线来表示。如果角色名能为模型增加价值，则可以在关联线的两端反映角色名，否则应省略。


    我们还在线的每一端标记适当的**多重性指示符**，以反映关系是一对一、一对多还是多对多（见图 [10-14](#78624_3_En_10_Chapter.xhtml#Fig14)）；我们将在本章稍后部分探讨如何做到这一点。


    ![](images/78624_3_En_10_Chapter/78624_3_En_10_Fig14_HTML.jpg)


    一个框图解释了多重性指示符指向左侧的类 1 和右侧的类 2。类之间的中间区域用于关联名称。文本在底部写着类 1 和类 2 的角色。


    图 10-14


    表示类之间的关联


    在此建模阶段，所有关联都被假定为双向的，并且参与类在类图中的排列顺序无关紧要。因此，为了描述“一个`Professor`*指导*一个`Student`”的关联，图
    [10-15](#78624_3_En_10_Chapter.xhtml#Fig15) 中的图形符号都被认为是等价的。


    ![](images/78624_3_En_10_Chapter/78624_3_En_10_Fig15_HTML.jpg)


    一个框图表示 8 个标记为“学生”和“教授”的块，按不同顺序排列，分为两列。它指示了在 4 个不同实例中，教授指导学生并且是学生的导师。


    图 10-15


    `Professor`和`Student`类之间“指导”关联的等价表示


    在复杂的图表中，为了简化所有关联名称而实现类的最佳放置通常是不可能的。因此，UML 引入了一个简单的约定，即使用一个小箭头（◄）来反映关联名称的解读方向，这给了我们在图表中放置类矩形的更大自由度，如图
    [10-16](#78624_3_En_10_Chapter.xhtml#Fig16) 所示。


    ![](images/78624_3_En_10_Chapter/78624_3_En_10_Fig16_HTML.jpg)


    一个框图表示两个块，左侧标记为“学生”，右侧标记为“教授”。它指示教授指导学生并且教授是导师。


    图 10-16


    使用箭头指示关联标签的方向


    使用 UML，无论前面两个矩形如何放置，我们仍然可以始终将关联标记为“*指导*”。


    很容易陷入试图使图表“完美”的陷阱，例如在类的位置、最小化交叉线等方面。请尽早抵制这种冲动，因为在建模工作完成之前，图表不可避免地会被多次修改。


    一元（自反）关联——即属于同一类的两个不同对象之间的关系——用一条从同一类矩形出发并返回的关联线来表示。例如，为了描述“一个`Course`*是*另一个（不同的）`Course`*的先修课程*”的关联，我们将使用图
    [10-17](#78624_3_En_10_Chapter.xhtml#Fig17) 中所示的符号。


    ![](images/78624_3_En_10_Chapter/78624_3_En_10_Fig17_HTML.png)


    一个图表示两个矩形块。前景中的块表示“课程”，背景中的块表示“先修课程”。


    图 10-17


    涉及`Course`类的自反关联'
