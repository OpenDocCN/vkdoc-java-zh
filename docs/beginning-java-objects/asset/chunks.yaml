    As you learned in Chapter [3](#78624_3_En_3_Chapter.xhtml), objects are the building
    blocks of an object-oriented software system. In such a system, objects collaborate
    with one another to accomplish common system goals, similar to the ants in an
    anthill or the employees of a corporation or the cells in your body. Each object
    has a specific structure and mission; these respective missions complement one
    another in accomplishing the overall mission of the system as a whole.


