    ## 实例化对象：深入探讨


    不同的面向对象语言在对象实际实例化（创建）的时机上有所不同。在 Java 中，当我们声明一个变量为用户自定义类型时，例如：


    ```

    Student y;

    ```


    我们实际上还没有在内存中创建一个对象。相反，我们只是声明了一个名为 `y` 的 `Student` 类型引用变量。这个引用变量具有指向一个 `Student`
    对象的 ***潜力***，但它目前还没有指向任何一个；更确切地说，与各种简单类型的变量一样，在编译器看来，`y` 的值是未定义的（即为 null），直到我们显式地为其赋值。


    如果我们想实例化一个 ***全新的*** `Student` 对象供 `y` 引用，我们必须采取一个明确的步骤：使用特殊的 Java 关键字 `new`，在运行时于
    JVM 内存中分配一个新的 `Student` 对象。我们通过一条赋值语句将新对象与引用变量 `y` 关联起来，如下所示：


    ```

    y = new Student();

    ```


    不必担心上述语句末尾的圆括号。我将在第 4 章讨论**构造器**的概念时，说明它们的重要性。


    可以将新创建的对象想象成一个氦气球，如图 3-7 所示，而引用变量则像是握住系在气球上那根绳子的手，这样我们就可以随时访问这个对象。


    ![](img/78624_3_En_3_Fig7_HTML.png)


    一个标有“学生对象”的气球插图。一只标有 y 的手握着气球的绳子。


    图 3-7


    使用引用变量跟踪内存中的对象


    由于引用变量有时被非正式地称为“持有”一个对象，我们经常使用非正式术语**句柄**，例如在表达式“引用变量 `y` 维护着一个 `Student` 对象的句柄”中。


    如果你熟悉 C 和 C++ 等语言中的***指针***概念，那么引用与指针类似，因为它幕后指向存储特定对象的内存位置/地址。然而，Java 引用***不同于***指针，因为引用不能像指针那样进行算术运算。


    我们也可以创建一个新对象而不立即将其赋值给引用变量，如下代码行所示：


    ```

    new Student();

    ```


    但这样的对象就像一个没有绳子的氦气球：它确实存在，但我们永远无法在程序中访问到这个对象。本质上，它在“充气”后就会立即从内存中“飘走”。


    请注意，我们可以将两个步骤——声明引用变量和实际实例化该变量要引用的对象——合并到一行代码中：


    ```

    Student y = new Student();

    ```


    初始化引用变量 `y` 的另一种方法是使用赋值语句，将指向一个***已存在***对象的引用“交给”`y`，即一个已经被***另一个***引用变量 `x` 引用的对象（“氦气球”）。让我们看一个例子：


    ```

    // 我们声明一个引用变量，并实例化第一个 Student 对象。

    Student x = new Student();

    // 我们声明第二个引用变量，但*不*实例化

    // 第二个 Student 对象。

    Student y;

    // 我们将 y 赋值为指向 x 所引用的*同一个*对象

    // （x 也继续指向它）。本质上，我们现在

    // 有两条“绳子”系在同一个“气球”上。

    y = x;

    ```


    上述赋值语句的概念性结果如图 3-8 所示：两条“绳子”被两只不同的“手”握着，系在同一个“气球”上——即两个***不同***的引用变量指向内存中***同一个***物理对象。


    ![](img/78624_3_En_3_Fig8_HTML.jpg)


    一个标有“学生对象”的气球插图。两只标有 x 和 y 的手握着气球的两根绳子。


    图 3-8


    在同一个对象上维护多个句柄


    因此我们看到，***多个***引用变量可以同时指向***同一个***对象。然而，任何一个***引用变量一次只能持有/指向***一个***对象。因此，如果一个引用变量已经持有一个对象，它必须释放该对象才能指向另一个不同的对象。如果某个特定对象的所有句柄都被释放了，那么该对象对我们的程序来说就不再可访问，就像一个被放飞了的氦气球。


    让我们扩展之前的例子来说明这些概念（注意**高亮**显示的已添加代码）：


    ```

    // 我们声明一个引用变量，并实例化第一个 Student 对象。

    Student x = new Student();

    // 我们声明第二个引用变量，但不实例化

    // 第二个对象。

    Student y;

    // 我们将 y 赋值为指向 x 所引用的*同一个*对象

    // （x 也继续指向它）。

    y = x;

    // 我们声明第三个引用变量并实例化第二个

    // Student 对象。

    Student z = new Student();

    ```


    此时，我们现在有两个指向***第一个*** `Student` 对象的引用 `x` 和 `y`，以及一个指向***第二个*** `Student` 对象的引用
    `z`，如图 3-9 所示。


    ![](img/78624_3_En_3_Fig9_HTML.jpg)


    一个插图，显示两个气球，分别标有“学生对象 1”和“学生对象 2”。学生对象 1 有 x 和 y 两根绳子，对象 2 有 z 一根绳子。


    图 3-9


    第二个对象出现


    让我们再次扩展我们的例子（注意**高亮**显示的已添加代码）：


    ```

    // 我们声明一个引用变量，并实例化第一个 Student 对象。

    Student x = new Student();

    // 我们声明第二个引用变量，但*不*实例化

    // 第二个对象。

    Student y;

    // 我们将 y 赋值为指向 x 所引用的*同一个*对象

    // （x 也继续指向它）。

    y = x;

    // 我们现在声明第三个引用变量并实例化第二个

    // Student 对象。

    Student z = new Student();

    // 我们重新将 y 赋值为指向 z 所引用的同一个对象；

    // 因此 y 释放了第一个 Student 对象，并抓住了第二个。

    y = z;

    ```


    因为我们现在要求 `y` 指向 `z` 所引用的同一个对象——即***第二个*** `Student` 对象——`y` 必须释放它对***第一个*** `Student`
    对象的句柄。如图 3-10 所示。（但请注意，`x` 仍然持有第一个 `Student` 对象。）


    ![](img/78624_3_En_3_Fig10_HTML.jpg)


    一个插图，显示两个气球，分别标有“学生对象 1”和“学生对象 2”。它们分别有 x 和 z 的绳子，并通过 y 的绳子相互连接。


    图 3-10


    转移对象句柄


    现在，我们将用**高亮**显示的代码来完成我们的例子：


    ```

    // 我们声明一个引用变量，并实例化第一个

    // Student 对象。

    Student x = new Student();

    // 我们声明第二个引用变量，但*不*实例化

    // 第二个对象。

    Student y;

    // 我们将 y 赋值为指向 x 所引用的*同一个*对象

    // （x 也继续指向它）。

    y = x;

    // 我们现在声明第三个引用变量并实例化第二个

    // Student 对象。

    Student z = new Student();

    // 我们重新将 y 赋值为指向 z 所引用的同一个对象。

    y = z;

    // 我们重新将 x 赋值为指向 z 所引用的同一个对象。

    // 因此 x 释放了第一个 Student 对象，并也抓住了

    // 第二个。

    x = z;

    ```

