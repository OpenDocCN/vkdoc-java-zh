    public class Person {

    protected int age;

    // etc.

    }

    ```


    `protected` accessibility is a sort of “middle ground” between `private` and `public`
    accessibility in that `protected` features are inherited by/in scope as symbols
    within subclasses; that is, `age` would now be recognized as a symbol in the `Student`
    class, such that


    ```java

