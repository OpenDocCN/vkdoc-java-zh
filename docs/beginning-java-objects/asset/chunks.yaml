  raw: '### Copying the Contents of an ArrayList into an Array


    From time to time, we’ll have a need to copy the contents of a collection into
    an array. We’ll use a method declared by the `ArrayList` class with the following
    header:


    ```

    type[] toArray(type[] arrayRef)

    ```


    That is, we’ll invoke the `toArray` method on an `ArrayList` object, passing in
    an array of the desired *type* as an argument, and the method will in turn hand
    us back an array that contains a copy of the contents of the `ArrayList`, as follows:


    *   If the array that we pass in is of sufficient capacity to hold the contents
    of the `ArrayList`, that ***same*** array object is filled and returned.


    *   Otherwise, a ***brand-new*** array of the appropriate type and size is ***created***,
    filled, and returned, and the one that we pass in as an argument is ignored.


    Since it’s easy to create an array whose size matches that of an existing `ArrayList`—we’ll
    see how to do so in just a moment—we’ll do so whenever we have occasion to invoke
    the `toArray` method on an `ArrayList` within the SRS application.


    Let’s look at an example. First, we’ll create an `ArrayList` named `students`,
    “stuffing” it with three `Student` references:


    ```

    ArrayList students = new ArrayList();

    students.add(new Student("Herbie"));

    students.add(new Student("Klemmie"));

    students.add(new Student("James"));

    ```


    Next, we’ll declare and instantiate an array named `copyOfStudents` that’s designed
    to be just the right size to hold the contents of the `students ArrayList`—note
    the use of a nested call to `students.size()` to accomplish this:


    ```

    Student[] copyOfStudents = new Student[students.size()];

    ```


    Then, to copy the contents of the `ArrayList` into the `copyOfStudents` array,
    we simply have to invoke the `toArray` method on `students`, passing in `copyOfStudents`
    as an argument:


    ```

    students.toArray(copyOfStudents);

    ```


    Let’s verify that the copy works by iterating first through the `ArrayList` and
    then through the array, printing the names of the `Student` objects referenced
    by each:


    ```

    System.out.println("The ArrayList contains the following students:");

    for (Student s : students) {

    System.out.println(s.getName());

    }

    System.out.println();

    System.out.println("The array contains the following students:");

    for (int i = 0; i < copyOfStudents.length; i++) {

    System.out.println(copyOfStudents[i].getName());

    }

    ```


    Here’s the output:


    ```

    The ArrayList contains the following students:

    Herbie

    Klemmie

    James

    The array contains the following students:

    Herbie

    Klemmie

    James

    ```


    Success! Both the array and the `ArrayList` now refer to the same three `Student`s,
    as depicted conceptually in Figure [6-11](#78624_3_En_6_Chapter.xhtml#Fig11).


    ![](images/78624_3_En_6_Chapter/78624_3_En_6_Fig11_HTML.jpg)


