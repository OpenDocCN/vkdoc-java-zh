    // Methods.

    void takeOutTheTrash() {  ... }

    boolean mowTheLawn() { ... }

    void washTheCar(Car c)  { ... }

    }

    ```


    We decide that we want our teenaged sons Larry, Moe, and Curly to each do one
    of these three chores. How would we ask them to do this? If we were to simply
    say


    *   “Please wash the Camry.”


    *   “Please take out the trash.”


    *   “Please mow the lawn, and let me know if you see any crabgrass.”


    chances are that ***none*** of the chores would get done, because we haven’t tasked
    a ***specific*** son with fulfilling any of these requests! Larry, Moe, and Curly
    will probably all stay glued to the TV, because none of them will acknowledge
    that a request has been directed toward them specifically.


    On the other hand, if we were to instead say


    *   “***Larry***, please wash the Camry.”


    *   “***Moe***, please take out the trash.”


    *   “***Curly***, please mow the lawn, and let me know if you see any crabgrass.”


    we’d be directing each request to a ***specific*** son; again, using Java syntax,
    this might be expressed as follows:


    ```

    // We declare and instantiate three Person objects:

    Person larry = new Person();

    Person moe = new Person();

    Person curly = new Person();

    // And, while we''re at it, a Car object, as well!

    Car camry = new Car();

    // We send a message to each son, indicating the service that we wish

    // each of them to perform:

    larry.washTheCar(camry);

    moe.takeOutTheTrash();

    boolean crabgrassFound = curly.mowTheLawn();

    ```


    By applying each method call to a specific “son” (`Person` object reference),
    there is no ambiguity as to which object is being asked to perform which service.


    Assuming that `takeOutTheTrash` is a method defined for the `Person` class as
    previously illustrated, the following code won’t compile in Java (or, for that
    matter, in any OOPL) because the method call is **unqualified**—that is, the dot
    notation is missing:


    ```

    public class BadCode {

    public static void main(String[] args) {

    // This next line won''t compile -- where''s the "dot"?  That is, which object

    // are we talking to???

    takeOutTheTrash();

    }

    }

    ```


    The following compilation error would be reported:


    ```

    cannot find symbol

    symbol  :    method takeOutTheTrash()

    location:  class BadCode

    ```


    However, in a ***non***-OOPL like C, there is no notion of objects or classes,
    and so functions in such languages are ***always*** invoked “in a vacuum” (i.e.,
    in the programming environment as a whole):


    ```

    // A C program.

    void main() {

    sqrt(42.0);

    // etc.

    }

    ```


    ### Java Expressions, Revisited


    When we discussed Java expressions in Chapter [2](#78624_3_En_2_Chapter.xhtml),
    there was one form of expression that was omitted from the list—namely, ***messages***—because
    we hadn’t yet talked about objects. I’ve repeated the list of what constitutes
    Java expressions here, adding message expressions to the mix:


    *   ***A constant***: `7`, `false`


    *   ***A*** ***char****(acter) literal***: `''A''`, `''&''`


    *   ***A*** ***String*** ***literal***: `"foo"`


    *   ***The name of any variable declared to be of one of the predefined types
    that we’ve seen so far***: `myString`, `x`


    *   ***Any one of the preceding that is modified by one of the Java unary operators***:
    `i++`


    *   ***A method invocation (“message”)***: `z.length()`


    *   ***Any two of the preceding that are combined with one of the Java binary
    operators***: `z.length() + 2`


    *   ***Any of the preceding simple expressions enclosed in parentheses***: `(z.length()
    + 2)`


    The ***type*** of a message expression is the type of the result that the method
    returns. For example, if `length()` is a method with a return type of `int`, then
    the expression `z.length()` is an expression of type `int`, and, if `registerForCourse`
    is a method with a return type of `boolean`, then the expression `s.registerForCourse(...)`
    is an expression of type `boolean`.'
