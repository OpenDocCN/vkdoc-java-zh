- fmt: '# Message Passing Between Objects


    Let’s now look at a message passing example involving two objects. Assume that
    we have two classes defined—`Student` and `Course`—and that the following methods
    are defined for each.


    - For the `Student` class:


    ```

    boolean successfullyCompleted(Course c)

    ```


    Given a reference `c` to a particular `Course` object, we’re asking the `Student`
    object receiving this message to confirm that the student has indeed taken the
    course in question and received a passing grade.


    - For the `Course` class:


    ```

    boolean register(Student s)

    ```


    Given a reference `s` to a particular `Student` object, we’re asking the `Course`
    object receiving this message to do whatever is necessary to register the student.
    In this case, we expect a `Course` to ultimately respond `true` or `false` to
    indicate success or failure of the registration request.


    Figure [4-2](#78624_3_En_4_Chapter.xhtml#Fig2) reflects one possible message interchange
    between a `Course` object `c` and a `Student` object `s`; each numbered step in
    the diagram is narrated in the text that follows. Solid-line arrows represent
    messages being passed/methods being invoked; dashed-line arrows represent values
    being returned from methods.


    ![](images/78624_3_En_4_Chapter/78624_3_En_4_Fig2_HTML.jpg)


    A block diagram with a loop of the message transfer between object `c` of a course
    and object `s` of a student via the commands `c dot register` and `s dot successfully
    completed` that returns the feedback as `true`.


    **Figure 4-2** Message passing between `Student` and `Course` objects


    (Please refer back to Figure [4-2](#78624_3_En_4_Chapter.xhtml#Fig2) when reading
    through steps 1–4.)


    1. A `Course` object `c` receives the message


    ```

    c.register(s);

    ```


    where `s` represents a particular `Student` object. (For now, we won’t worry about
    the origin of this message; it was most likely triggered by a user’s interaction
    with the SRS GUI. We’ll see the complete code context of how all of these messages
    are issued later in this chapter, in the section entitled “Objects As Clients
    and Suppliers.”)


    2. In order for `Course` object `c` to officially determine whether or not `s`
    should be permitted to register, `c` sends the message


    ```

    s.successfullyCompleted(c2);

    ```


    to `Student s`, where `c2` represents a reference to a **different** `Course`
    object that happens to be a prerequisite of `Course c`. (Don’t worry about how
    `Course c` knows that `c2` is one of its prerequisites; this involves interacting
    with `c`’s internal `prerequisites` attribute, which we haven’t talked about yet.
    Also, `Course c2` isn’t depicted in Figure [4-2](#78624_3_En_4_Chapter.xhtml#Fig2)
    because, strictly speaking, `c2` isn’t engaged in this “discussion” between objects
    `c` and `s`. `c2` is being talked **about**, but isn’t doing any talking itself!)


    3. `Student` object `s` replies to `c` with the value `true`, indicating that
    `s` has successfully completed the prerequisite course. (We will for the time
    being ignore the details as to how `s` determines this; it involves interacting
    with `s`’s internal `transcript` attribute, which we haven’t covered the structure
    of just yet.)


    4. Convinced that the student has complied with the prerequisite requirements
    for the course, `Course` object `c` finishes the job of registering the student
    (internal details omitted for now) and confirms the registration by responding
    with a value of `true` to the originator of the service request.


    This example was overly simplistic; in reality, `Course c` may have had to speak
    to numerous other objects as well:


    - A `Classroom` object (the room in which the course is to be held, to make sure
    that it has sufficient room for another student)

    - A `DegreeProgram` object (the degree sought by the student, to make sure that
    the requested course is indeed required for the degree that the student is pursuing)

    - And so forth—before sending a `true` response to indicate that the request to
    register `Student s` has been fulfilled


    We’ll see a slightly more complex version of this message exchange later in the
    chapter.


    ## Delegation


    If a request is made of an object A and, in fulfilling the request, A in turn
    requests assistance from another object B, this is known as **delegation** by
    A to B. The concept of delegation among objects is exactly the same as delegation
    between people in the real world: if your “significant other” asks you to mow
    the lawn while they are out running errands and you in turn hire a neighborhood
    teenager to mow the lawn, then, as far as your partner is concerned, the lawn
    has been mowed. The fact that you delegated the activity to someone else is (hopefully!)
    irrelevant.


    The fact that delegation has occurred between objects is often transparent to
    the initiator of a message, as well. In our previous message passing example,
    `Course c` delegated part of the work of registering `Student s` **back to** `s`
    when `c` asked `s` to verify having taken a prerequisite course. However, from
    the perspective of the originator of the registration request—`c.register(s);`—this
    seems like a simple interaction: namely, the requestor asked `c` to register a
    student, and it did so! All of the behind-the-scenes details of what `c` had to
    do to accomplish this are hidden from the requestor (see Figure [4-3](#78624_3_En_4_Chapter.xhtml#Fig3)).


    ![](images/78624_3_En_4_Chapter/78624_3_En_4_Fig3_HTML.jpg)


    A block diagram of an eye connects to the object `c` of a course via the command
    `c dot register` that returns the feedback as `true`.


    **Figure 4-3** A requestor sees only the external details of a message exchange'
