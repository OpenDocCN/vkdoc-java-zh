  trans: "\n## 获取对象的句柄\n\n对象 A 能够向对象 B 传递消息的唯一方式是 A 拥有对 B 的引用/句柄。这可以通过几种不同的方式实现。\n\
    \n*   ***对象 A 可能将指向 B 的引用作为其自身的一个属性来维护***。例如，下面是第 3 章中的一个例子，一个 `Student` 对象拥有一个\
    \ `Professor` 引用作为其属性：\n\n```\n    public class Student {\n    // 属性。\n    String\
    \ name;\n    Professor facultyAdvisor;\n    // 等等。\n    ```\n\n（同样，本章稍后你将学习如何告知一个\
    \ `Student` 对象***哪个*** `Professor` 对象将作为其 `facultyAdvisor`。）\n\n打个比方，这就像一个人 A\
    \ 将另一个人 B 的电话号码“永久”记录在他的通讯录中，这样每当 A 需要与 B 联系时，他就可以查找并拨打 B 的电话。\n\n*   ***对象 A\
    \ 可能通过其某个方法的参数获得指向 B 的引用***。这就是在前面的消息传递示例中，当调用 `c` 的 `register` 方法时，`Course` 对象\
    \ `c` 如何获得对 `Student` 对象 `s` 的访问权限：\n\n```\n    c.register(s);\n    ```\n\n这类似于一个人\
    \ A 拿到一张写有另一个人 B 电话号码的纸条，这样 A 就可以给 B 打电话。\n\n*   ***指向对象 B 的引用可能被设为“全局可用”***，使得所有其他对象都能访问它。我们将在本书后面讨论实现此目的的技术，并在构建\
    \ SRS 时使用这些技术。\n\n这相当于在广告牌上公布 B 的电话号码，让***任何人***都可以打电话！\n\n*   ***对象 A 可能必须通过调用某个第三方对象\
    \ C 上的方法来显式请求指向 B 的句柄/引用***。由于这可能是 A 获取 B 句柄最复杂的方式，我们将用一个例子来说明。\n\n这类似于一个人 A 必须打电话给另一个人\
    \ C，向 C 索要 B 的电话号码。\n\n回到几页前 `Course` 对象 `c` 和 `Student` 对象 `s` 之间的交互示例，让我们让这个交互稍微复杂一点：\n\
    \n*   首先，我们引入第三个对象：一个 `Transcript` 对象 `t`，它代表 `Student` 对象 `s` 所修所有课程的记录。\n\n\
    *   此外，我们假设 `Student s` 将指向 `Transcript t` 的句柄作为 `s` 的一个属性（具体来说是 `transcript`\
    \ 属性）来维护，并且反过来，`Transcript t` 将指向其“所有者” `Student s` 的句柄作为 `t` 的一个属性来维护：\n\n```\n\
    \    public class Student {\n    // 属性。\n    Transcript transcript;\n    // 等等。\n\
    \    }\n    public class Transcript {\n    // 属性。\n    Student owner;\n    //\
    \ 等等。\n    }\n    ```\n\n图 4-4 反映了 `Course c`、`Student s` 和 `Transcript t` 之间更复杂的消息交换；图中每个带编号的步骤都在随后的文本中进行了说明。同样，实线箭头表示正在传递的消息/正在调用的方法；虚线箭头表示从方法返回的值。\n\
    \n![](img/78624_3_En_4_Fig4_HTML.jpg)\n\n一个框图，显示了课程对象 c、学生对象 s 和成绩单对象 t 之间通过命令\
    \ c.register、s.getTranscript 和 t.successfulCompletion 进行消息传递的循环。它返回反馈为 true，并带有对成绩单\
    \ t 的引用。\n\n图 4-4\n\n一个涉及三个对象的更复杂的消息传递示例\n\n（在阅读步骤 1`–`6 时，请参考图 4-4。）\n\n1.  在这个增强的对象交互中，第一步与之前描述的完全相同：即，一个\
    \ `Course` 对象 `c` 接收到消息\n\n```\n    c.register(s);\n    ```\n\n其中 `s` 代表一个 `Student`\
    \ 对象。\n\n2.  现在，`Course c` 不再像之前那样向 `Student s` 发送消息 `s.successfullyCompleted(c2)`（其中\
    \ `c2` 代表一门先修课程 `Course`），而是向该 `Student` 发送消息\n\n```\n    s.getTranscript();\n\
    \    ```\n\n因为 `c` 想直接检查 `s` 的成绩单。这条消息对应于 `Student` 类上的一个方法，其方法头声明如下：\n\n```\n\
    \    Transcript getTranscript()\n    ```\n\n请注意，此方法被定义为返回一个 `Transcript` 对象引用——具体来说，就是指向属于该学生的\
    \ `Transcript` 对象的句柄。\n\n3.  由于 `Student s` 将指向其 `Transcript` 对象的句柄作为一个属性来维护，因此\
    \ `s` 可以轻松地通过将指向 `t` 的句柄传回给 `Course` 对象 `c` 来响应此消息。\n\n4.  现在 `Course c` 拥有了它***自己***指向\
    \ `Transcript t` 的临时句柄，对象 `c` 可以直接与 `t` 对话。对象 `c` 接着向 `t` 询问 `t` 是否有任何记录表明 `Student\
    \ s` 已成功完成 `c` 的先修课程 `c2`，它通过传递消息\n\n```\n    t.successfulCompletion(c2);\n  \
    \  ```\n\n来实现。这意味着为 `Transcript` 类定义了一个方法，其方法头为\n\n```\n    boolean successfulCompletion(Course\
    \ c)\n    ```\n\n5.  `Transcript` 对象 `t` 向 `Course c` 响应值 `true`，表明 `Student s`\
    \ 确实已成功完成所讨论的先修课程。（请注意，`Student s` 并不知道 `c` 正在与 `t` 通信；`s` 只知道 `c` 在之前的一条消息中要求它返回一个指向\
    \ `t` 的句柄，但 `s` 并不了解 `c` 为何要这个句柄。）\n\n这与现实世界中的情况并无不同，即一个人 A 向另一个人 C 索要 B 的电话号码，却没有告诉\
    \ C ***为什么***他们想给 B 打电话。\n\n6.  在确认 `Student s` 已满足其先修课程要求后，`Course` 对象 `c` 完成注册该学生的工作（此处省略内部细节），并通过向步骤\
    \ 1 中最初发起注册请求的发起者响应一个值 `true` 来确认注册。既然 `c` 已完成此事务，它便丢弃其（临时的）指向 `t` 的句柄。\n\n请注意，从最初向\
    \ `Course c` 发送消息\n\n```\nc.register(s);\n```\n\n的发起者的角度来看，这个更复杂的交互看起来与之前更简单的交互***完全相同***，如图\
    \ 4-5 所示。原始消息的发送者只知道 `Course c` 最终对该请求响应了一个值 `true`。\n\n![](img/78624_3_En_4_Fig5_HTML.jpg)\n\
    \n一个框图，显示一个眼睛通过命令 c.register 连接到课程对象 c，该命令返回反馈为 true。\n\n图 4-5\n\n从请求者的角度来看，这个更复杂交互的外部细节看起来完全相同\n"
- fmt: '# Objects As Clients and Suppliers


    In the preceding example of message passing between a `Course` object and a `Student`
    object, we can consider `Course` object `c` to be a **client** of `Student` object
    `s`, because `c` is requesting that `s` perform one of its methods—namely, `getTranscript`—as
    a **service** to `c`. This is identical to the real-world concept of **you**,
    as a client, requesting the services of an accountant or an attorney or an architect.
    Similarly, `c` is a client of `Transcript t` when `c` asks `t` to perform its
    `successfulCompletion` method. We therefore refer to code that invokes a method
    on an object X as **client code** relative to X because such code benefits from
    the services performed by X.


    Let’s look at a few examples of client code corresponding to the message passing
    example involving a `Course`, `Student`, and `Transcript` object from a few pages
    back. This first code example, taken from the `main` method of an application,
    instantiates two objects—`Course c` and `Student s`—and invokes a method on one
    of them, which gets them “talking”:


    ```

    public class MyApp {

    public static void main(String[] args) {

    Course c = new Course();

    Student s = new Student();

    // details omitted ...

    // Invoke a method on Course object c.

    // (This is labeled as message (1) in the earlier figure; the returned

    // value, labeled as (6) in that figure, is being captured in boolean

    // variable "success".)

    boolean success = c.register(s);

    // etc.

    }

    }

    ```


    In this example, the `main` method body is considered to be **client code** relative
    to `Course` object `c` because the `main` method calls upon `c` to perform its
    `register` method as a service.


    Let’s now look at the code that implements the body of the `register` method,
    inside of the `Course` class:


    ```

    public class Course {

    // Attribute details omitted ...

    public boolean register(Student s) {

    boolean outcome = false;

    // Request a handle on Student s''s Transcript object.

    // (This is labeled as message (2) in the earlier figure.)

    Transcript t = s.getTranscript();

    // (The return value from this method is labeled as (3) in

    // the earlier figure.)

    // Now, request a service on that Transcript object.

    // (Assume that c2 is a handle on some prerequisite Course ...)

    // (This is labeled as message (4) in the earlier figure.)

    if (t.successfulCompletion(c2)) {

    // (This next return value is labeled as (5) in the earlier figure.)

    outcome = true;

    }

    else {

    outcome = false;

    }

    return outcome;

    }

    // etc.

    ```


    We see that the `register` method body of the `Course` class is considered to
    be **client code** relative to **both** `Student` object `s` and `Transcript`
    object `t` because this code calls upon both `s` and `t` to each perform a service:
    `s.getTranscript()` and `t.successfulCompletion(c2)`.


    Whenever an object A is a client of object B, object B in turn can be thought
    of as a **supplier** to A. Note that the roles of client and supplier are not
    absolute between two objects; such roles are only relevant for the duration of
    a particular message passing event. If I ask you to pass me the bread, I am your
    client, and you are my supplier; and if a moment later you ask me to pass you
    the butter, then you are my client, and I am your supplier.


    The notion of objects as clients and suppliers is discussed further in *Object-Oriented
    Software Construction* by Bertrand Meyer (Prentice Hall, 2000).


    ## Information Hiding/Accessibility


    Just as we’ve been using dot notation to formulate messages to objects, we can
    also use dot notation to refer to an object’s attributes. For example, if we declare
    a reference variable `x` to be of type `Student`, we can refer to any of `Student
    x`’s attributes from client code via the following notation


    ```

    x.attribute_name

    ```


    where the dot is used to qualify the name of the **attribute** of interest with
    the name of the reference variable representing the object to which it belongs:
    `x.name`, `x.gpa`, and so forth.


    Here are a few additional examples:


    ```

    // Instantiate two objects.

    Student x = new Student();

    Student y = new Student();

    // Use dot notation to access attributes as variables.

    // Assign student x''s name ...

    x.name = "John Smith";

    // ... and student y''s name.

    y.name = "Joe Blow";

    // Compare the ages of the two students.

    if (x.age == y.age) { ... }

    ```


    However, just because we **can** access attributes this way doesn’t mean that
    we **should**. There are many reasons we’ll want to **restrict** access to an
    object’s data so as to give the object complete control over when and how its
    data is altered and several mechanisms for how we can get the Java compiler’s
    help in enforcing such restrictions.


    In practice, objects often restrict access to some of their features (attributes
    or methods). Such restriction is known as **information hiding**. In a well-designed
    object-oriented application, a class typically publicizes **what** its objects
    can do—that is, the services the objects are capable of providing, as declared
    via the class’s method headers—but **hides** the internal details both of **how**
    they perform these services and of the data (attributes) that they maintain internally
    in order to **support** these services.


    By way of analogy, think of a Yellow Pages advertisement for a dry cleaner. Such
    an ad will promote the services that the dry cleaner provides—that is, **what**
    they can do for you: “We clean formal wear,” “We specialize in cleaning area rugs,”
    and so forth. However, the ad typically **won’t** disclose the details of **how**
    they do the cleaning—for example, what specific chemicals or equipment that they
    use—because you, the potential customer, needn’t know such details in order to
    determine whether a particular dry cleaner can provide the services that you need.


    We use the term **accessibility** to refer to whether or not a particular feature
    of an object can be accessed outside of the class in which it is declared—that
    is, whether it is accessible from client code via dot notation. The accessibility
    of a feature is established by placing an **access modifier** keyword at the beginning
    of its declaration:


    ```

    public class MyClass {

    // Attributes.

    access-modifier int x;

    // etc.

    // Methods.

    access-modifier void foo() { ... }

    // etc.

    }

    ```


    Java defines several different access modifiers. Let’s explore the implications
    of using the two primary access modifiers: `private` and `public`.


    There is a third access modifier, `protected`, as well as default `package-`level
    access that we’ll defer discussing until later in the book.'
