    # 14. 将模型转换为 Java 代码


    从本章获得最大价值的建议 重温 SRS 类图 Person 类（指定抽象类） Student 类（通过继承实现复用、扩展抽象类、委托） Professor
    类（关系的双向性） Course 类（自反关系、单向关系） Section 类（表示关联类、公共静态最终属性、枚举） 再谈委托 ScheduleOfClasses
    类 TranscriptEntry 关联类（静态方法） Transcript 类 SRS 驱动程序 总结


    现在，是时候将注意力转回到本书第 2 部分中生成的 UML 类图，以便将该面向对象的“蓝图”转换为 Java 代码，并专注于如何准确地在面向对象编程语言中对
    SRS 领域信息进行建模。在本章中，你将学习如何在 Java 代码中表示以下所有面向对象的结构：


    *   不同多重性的关联（一对一、一对多和多对多），包括聚合

    *   继承关系

    *   关联类

    *   自反关联

    *   抽象类

    *   元数据

    *   静态属性和方法


    以及关于何时使用这些不同结构的实用指南。我们还将介绍一种通过命令行驱动应用程序来测试核心类的技术。


    ## 从本章获得最大价值的建议


    掌握一门语言的***最佳***方法之一是从可运行的代码开始并进行实验。一个好的方法是通过实际编译和运行 SRS 应用程序来获得一些 Java 的实践经验；研究它，以便熟悉我们使用的技术；最后，自己修改它。如你所知，每章末尾提供的练习为你可能希望尝试的实验提供了具体建议。因此，在深入阅读本章之前，***如果你还没有下载，我鼓励你从本书的
    GitHub 仓库（***[***github.com/apress/beginning-java-objects-3e***](http://github.com/apress/beginning-java-objects-3e)***）下载第***
    ***14*** ***章的 Java 源代码***。


    我为 SRS 应用程序编写的代码量很大；在每一章中都完整列出每个 Java 类的全部代码是不现实的。因此，为了尽可能为你提供有效的学习体验，我选择只展示那些对你理解转换为
    Java 语言的对象概念尤为关键的代码部分。


    我意识到，你当然需要访问完整的源代码来全面理解已实现的 SRS 应用程序，这也是你现在下载 SRS 源代码的另一个重要原因。我建议打印一份 SRS 源代码并将其放入活页夹中，这样你就可以在阅读本章时在打印稿上做笔记。


    ## 重温 SRS 类图


    让我们将注意力转回到本书第 2 部分中生成的 SRS 类图。在与 SRS 的赞助商沟通后，我们了解到他们决定削减一些功能以降低开发成本：


    *   首先，他们决定不通过 SRS 自动化学生的学习计划。相反，将由每个学生自己确保他们注册的课程适合他们正在攻读的学位。

    *   由于自动学习计划被取消，将不再需要跟踪学生的指导教授是谁。最初在 `Professor` 和 `Student` 类之间建模 *advises* 关系的唯一原因是，当学生首次通过
    SRS 提交暂定学习计划时，可以调用其指导教授来批准该计划。

    *   最后，我们的赞助商认为，在课程名额已满时维护候补名单是一种他们可以舍弃的奢侈功能，因为大多数学生在得知课程名额已满后，会立即选择其他课程。


    因此，我们相应地精简了 SRS 类图，以消除这些不必要的功能。此外，为了避免图表过于杂乱，我们选择不在 UML 中反映属性类型或完整的方法签名。生成的图表如图
    14-1 所示。


    ![](img/78624_3_En_14_Fig1_HTML.jpg)


    一张蓝图展示了注册和选课过程中的各种状态和转换。它包括课程和教学班、学生和教授，以及成绩单和课程安排等元素。


    图 14-1


    第 14 章的新 UML“蓝图”


    幸运的是，生成的模型仍然提供了我们需要学习如何编程的所有关键面向对象元素的示例，如表 14-1 所列。


    表 14-1


    图 14-1 中体现的面向对象特性


    | 面向对象特性 | 在 SRS 类图中的体现如下 |

    | --- | --- |

    | 继承 | `Person` 类作为 `Student` 和 `Professor` 子类的基类。 |

    | 聚合 | 我们有两个示例：`Transcript` 类表示 `TranscriptEntry` 对象的聚合，`ScheduleOfClasses` 类表示
    `Section` 对象的聚合。 |

    | 一对一关联 | `Student` 和 `Transcript` 类之间的 *maintains* 关联。 |

    | 一对多关联 | `Professor` 和 `Section` 之间的 *teaches* 关联，`Course` 和 `Section` 之间的 *offered
    as* 关联。 |

    | 多对多关联 | `Student` 和 `Section` 之间的 *attends* 关联，`Course` 类实例之间的 *prerequisite*（自反）关联。
    |

    | 关联类 | `TranscriptEntry` 类与 *attends* 关联相关联。 |

    | 自反关联 | `Course` 类实例之间的 *prerequisite* 关联。 |

    | 抽象类 | `Person` 类将实现为抽象类。 |

    | 元数据 | 每个 `Course` 对象包含与多个 `Section` 对象相关的信息。 |

    | 静态属性 | 虽然在类图中没有具体说明，但在编写 `Section` 类代码时，我们将利用 `static` 属性。 |

    | 静态方法 | 虽然在类图中没有具体说明，但在编写 `TranscriptEntry` 类代码时，我们将利用 `static` 方法。 |


    在本章中，我们将编写 SRS 类图所需的八个模型类：


    ```

    Course.java

    Person.java

    Professor.java

    ScheduleOfClasses.java

    Section.java

    Student.java

    Transcript.java

    TranscriptEntry.java

    ```


    以及一个“包装器”类 `SRS`，它将封装我们应用程序的 `main` 方法，以及一个辅助的 `enum`（枚举）`EnrollmentStatus`，其用途将在适当的时候解释。

