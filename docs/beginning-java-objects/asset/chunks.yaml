- fmt: '#### Attributes of Student


    There are two attributes explicitly called out for the `Student` class in our
    UML diagram: `major` and `degree`. However, we learned in Chapter [10](#78624_3_En_10_Chapter.xhtml)
    that we must also encode associations as attributes. `Student` participates in
    two associations:


    - *attends*, a many-to-many association with the `Section` class

    - *maintains*, a one-to-one association with the `Transcript` class


    So we must allow for each `Student` to maintain handles on a single `Transcript`
    object and on many `Section` objects.


    Of the various types of Java collection covered in Chapter [6](#78624_3_En_6_Chapter.xhtml),
    an `ArrayList` seems like the best choice for managing multiple `Section` handles:


    - An `Array` is a bit too rigid; we’d have to size the `Array` in advance to be
    large enough to accommodate references to all of the `Section`s that a `Student`
    will ever attend over the course of their studies at the university. An `ArrayList`,
    on the other hand, can start out small and automatically grow in size as needed.

    - The decision of using an `ArrayList` vs. a dictionary type of collection comes
    down to whether or not we’ll need to retrieve an object reference from the collection
    based on some key value. We don’t anticipate the need for such a lookup capability
    as it pertains to the `Section`s that a `Student` has attended; we *will* need
    the ability to verify if a `Student` has taken a particular `Section` or not,
    but this can be accomplished by using the `ArrayList` class’s `contains` method.
    That is, if `attends` is declared to be of type `ArrayList`, then we can use the
    statement


    ```

    if (attends.contains(someSection)) { ...

    ```


    to verify whether or not a `Student` has taken a particular `Section`. For most
    other uses of the `attends` collection, we’ll need to step through the entire
    collection anyway, as when printing out a `Student`’s course schedule. So an `ArrayList`
    should serve our purposes quite nicely.


    The attributes for the `Student` class thus turn out as follows:


    ```

    //------------

    // Attributes.

    //------------

    private String major;

    private String degree;

    private Transcript transcript;

    private ArrayList attends;

    ```


    Of course, by virtue of inheritance, `Student` also inherits the attributes declared
    by `Person`—namely, `name` and `ssn`—but with *private* accessibility. Hence,
    as we discussed in Chapter [5](#78624_3_En_5_Chapter.xhtml), these attributes
    do indeed become part of the “bone structure” of a `Student` object, but the symbols
    `name` and `ssn` are not within the *namespace* of the `Student` class. Thus,
    we’ll use the associated *public* accessor (“get”/“set”) methods, also inherited
    from `Person`, to access them as needed.


    Since we are using the `ArrayList` class, we’ll need to remember to include the
    following `import` directive at the beginning of the `Student` class, ahead of
    the class declaration:


    ```

    import java.util.ArrayList;

    ```


    #### Student Constructors


    We’ll provide two constructors for convenience of initializing attributes:


    ```

    //----------------

    // Constructor(s).

    //----------------

    public Student(String name, String ssn, String major, String degree) {

    ```


    In the first `Student` constructor, we use the construct `super(`*arguments*`)`
    to reuse the code of one of the `Person` class constructors from within our `Student`
    constructor, to establish the “`Person`ness” of a `Student`. Recall from our discussion
    of the `super` keyword in Chapter [5](#78624_3_En_5_Chapter.xhtml) that any invocation
    of `super(...)` must be the *first* such line in a subclass’s constructor:


    ```

    // Reuse the code of the parent''s constructor.

    super(name, ssn);

    ```


    After setting the values of the `major` and `degree` attributes based on arguments
    passed into the constructor


    ```

    this.setMajor(major);

    this.setDegree(degree);

    ```


    we set about to instantiate the `transcript` attribute as follows:


    ```

    // Create a brand new Transcript to serve as this Student''s

    // transcript.

    this.setTranscript(new Transcript(this));

    ```


    Let’s evaluate the preceding line of code from the inside out:


    - First, we instantiate a brand-new *unnamed* `Transcript` object, passing a reference
    to *this* `Student` in as the lone argument to the `Transcript` constructor:


    ```

    new Transcript(this)

    ```


    (Since we haven’t discussed the structure of the `Transcript` class yet, the signature
    of its constructor may seem a bit puzzling, but it will make sense once we get
    a chance to review the `Transcript` class in its entirety later in this chapter.)


    - We then nest this instantiation request inside of a call to `setTranscript`:


    - Note that we *could* have accomplished this with *two* lines of code instead
    of one:


    ```

    this.setTranscript(new Transcript(this));

    ```


    ```

    Transcript t = new Transcript();

    this.setTranscript(t);

    ```


    But there is no point in going to the trouble of declaring a variable `t` to serve
    as a reference to a `Transcript` object if we’re only going to reference the variable
    one time and then discard it when it goes out of scope as soon as the constructor
    exits. As we discussed in Chapter [13](#78624_3_En_13_Chapter.xhtml), it is commonplace
    to chain together/nest method calls in a single Java statement.


    Finally, as we discussed in Chapter [6](#78624_3_En_6_Chapter.xhtml), we routinely
    instantiate collection attributes such as the `attends ArrayList` in a constructor
    to guarantee that we have an empty “egg carton” ready for us when it is time to
    add “eggs”:


    ```

    // Note that we''re instantiating empty support Collection(s).

    attends = new ArrayList();

    }

    ```


    We choose to overload the `Student` constructor by providing a second constructor,
    shown in the following code, to be used if we wish to create a `Student` object
    for which we don’t yet know the name, major field of study, or degree sought.
    As discussed in Chapter [4](#78624_3_En_4_Chapter.xhtml), we use the syntax `this(arguments)`
    to reuse the code from the first `Student` constructor within the second, passing
    in the `String` value `"TBD"` to serve as a temporary value for the `name`, `major`,
    and `degree` attributes:


    ```

    // A second simpler form of constructor.

    public Student(String ssn) {

    // Reuse the code of the first Student constructor.

    this("TBD", ssn, "TBD", "TBD");

    }

    ```


    #### Student Accessor Methods


    We provide accessor methods for all of the simple (non-collection) attributes:


    ```

    //------------------

    // Accessor methods.

    //------------------

    public void setMajor(String major) {

    this.major = major;

    }

    public String getMajor() {

    return major;

    }

    public void setDegree(String degree) {

    this.degree = degree;

    }

    public String getDegree() {

    return degree;

    }

    public void setTranscript(Transcript t) {

    transcript = t;

    }

    public Transcript getTranscript() {

    return transcript;

    }

    ```


    And, as mentioned previously, `Student` inherits the accessor methods of the `Person`
    class, as well.


    For the `attends` collection attribute, we will provide the methods `addSection`
    and `dropSection` in lieu of traditional `accessor` methods, to be used for adding
    and removing `Section` objects to and from the `ArrayList`; we’ll talk about these
    methods momentarily.'
