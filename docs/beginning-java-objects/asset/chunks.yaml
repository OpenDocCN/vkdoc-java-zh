    ## Javadoc 注释


    在第 2 章中，我们简要提到了 ***Java 文档注释***（也称为“***javadoc***”***注释***）的概念，这是一种特殊的注释类型，我们可以通过它自动为应用程序生成
    HTML 文档。下面我们来探讨如何实现这一点。


    Java 文档注释与传统注释一样，可以跨越多行代码。然而，javadoc 注释以斜杠后跟***两个***星号 /** 开头，并以星号斜杠 */ 结尾。在 javadoc
    注释的主体中，我们可以使用许多预定义的 **javadoc 标签**（其名称以“`@`”开头）来控制最终生成的 HTML 的外观。


    下面是一个简单的 `Person` 类，其中包含了 javadoc 注释（以**粗体**显示）：


    ```

    // Person.java

    /**

    * 一个人是一个人类。我们可以在学术环境中使用 Person 来表示学生

    * 或教授。

    */

    public class Person {

    //------------

    // 属性。

    //------------

    /**

    * 一个人的法定姓名。通常表示为

    * "FirstName I. LastName"。

    */

    public String name;

    /**

    * 一个人的年龄（以年为单位）。无论一个人的下一个生日多么临近，

    * 他们的年龄始终反映他们在最近一个生日时的年龄。

    */

    private int age;

    //-------------

    // 构造方法。

    //-------------

    /**

    * 此构造方法初始化属性 name 和 age。

    * @param n 人的姓名，按名 - 中间名首字母 -

    * 姓的顺序排列。

    * @param a 人的年龄。

    */

    public Person(String n, int a) {

    name = n;

    age = a;

    }

    /**

    * 此方法用于确定一个人的狗年年龄。

    */

    public double dogYears() {

    return age/7.0;

    }

    }

    ```


    以下是关于上述示例的一些观察：


    *   `public` 特性会自动出现在 javadoc 生成的文档中；而 `private` 特性默认情况下不会出现。因此，尽管我们已用 javadoc
    风格记录了 `private age` 属性，但 `age` 不会反映在最终的 HTML 文档中，我们稍后会看到这一点。


    *   `@param` 是一个 javadoc 特有的标签，用于定义方法中某个特定参数的用途；其使用的一般语法是 `@param` *参数名 描述*。


    *   中间的空行和/或非 javadoc 注释（如果存在）会被 `javadoc` 工具忽略：


    ```

    /**

    * 一个人的法定姓名。通常表示为 "FirstName I. LastName"。

    */

    // 这里有一个非 Javadoc 注释不会造成影响，中间的空行也不会。

    public String name;

    ```


    要为这个类生成 HTML 文档，我们使用 Java 开发工具包（JDK）自带的命令行 `javadoc` 工具。我们可以输入命令


    ```

    javadoc Person.java

    ```


    为单个类生成文档，或者输入


    ```

    javadoc *.java

    ```


    如果需要同时为多个 `.java` 文件生成文档。


    输入 `javadoc` 命令后，会自动生成多个文件，如下面的输出所示：


    ```

    C:\> javadoc Person.java

    Loading source file Person.java...

    Constructing Javadoc information...

    Standard Doclet version 1.5.0-beta2

    Building tree for all the packages and classes...

    Generating Person.html...

    Generating package-frame.html...

    Generating package-summary.html...

    Generating package-tree.html...

    Generating constant-values.html...

    Building index for all the packages and classes...

    Generating overview-tree.html...

    Generating index-all.html...

    Generating deprecated-list.html...

    Building index for all classes...

    Generating allclasses-frame.html...

    Generating allclasses-noframe.html...

    Generating index.html...

    Generating help-doc.html...

    Generating stylesheet.css...

    ```


    要查看生成的文档，我们使用网页浏览器加载 `index.html` 文件，这将打开我们文档的“主页”，如图 13-1 所示。（请注意，此页面的具体布局可能因
    Java 版本不同而有所变化。）

