    ### 功能需求与技术需求


    深入思考系统的所有用例，其目的在于全面探索系统的功能需求，以确保不会忽略某一特定类别的用户或系统的潜在用途。我们区分功能需求与技术需求如下。


    **功能需求**是指从系统使用者的角度来看，系统应如何运作或发挥功能的那些方面。功能需求又可细分为：


    *   ***“目标导向型”功能需求***：这类需求陈述了系统的目的，而不考虑该需求在用户视角下将如何“展开”——例如，“系统必须能够生成可定制的报告。”在指定目标导向型需求时，应避免讨论实现细节**。**


    *   ***“外观与体验”需求***：这类需求在用户期望系统外在表现（例如，图形用户界面如何呈现）以及用户期望其如何行为方面更为具体，同样是从用户的角度出发。例如，我们可能有一个需求：“用户将点击主图形用户界面上的一个按钮，然后会出现一条确认消息……”一个好的做法是编写一份**运行概念**文档，作为“纸质原型”，描述您设想的未来系统将如何呈现和运作，以便在您开始建模之前，就能与尚未建成的系统的目标用户进行讨论。


    在准备用例时，我们强调目标导向型功能需求**。**


    另一方面，**技术需求**更多地涉及系统***如何***在内部构建，以***满足***功能需求；例如，“系统将使用 TCP/IP 协议……”或“我们将使用字典集合作为跟踪学生的手段……”我们可以将这些视为程序员应如何着手处理***解决方案***的需求，这与功能需求（即对***待解决问题***的陈述）形成对比。


    诸如此类的技术需求在用例分析中不起作用。


    尽管系统的用户可能具备技术素养，但最好以即使对计算机内部工作原理一无所知的用户也能理解的方式来表达功能需求。这有助于确保技术需求不会渗入功能需求陈述中，这是许多缺乏经验的软件开发人员常犯的错误。当我们允许技术需求影响功能需求时，它们会在开发生命周期中过早地人为限制问题的解决方案。


    ### 让用户参与


    由于系统的目标用户最了解他们需要系统做什么，因此让他们参与用例定义过程至关重要。如果目标用户（作为个体）尚未被具体定义或招募（例如对于将要商业销售的软件产品），则仍需通过识别具有类似经验的人员作为“用户代理”来考虑他们的预期需求。理想情况下，用户或用户代理将自行编写部分或全部用例；至少，您需要采访这些人，代表他们编写用例，然后获得他们的确认，证明您所写的内容确实是准确的。


    用例是软件开发项目生命周期中最早出现的可交付成果/工件之一，但也是确保系统成功而最后被充分利用的东西之一。


    事实证明，它们作为编写测试脚本的基础非常有用，可以确保在系统和用户验收测试期间所有功能线程都得到执行。


    它们还有助于准备**需求追溯矩阵**——即一份最终检查清单，用户可据此验证在系统交付时，他们所有的初始需求是否确实都已得到满足。


    回到本节开头提出的问题，让我们回答第一个问题——即“谁（哪类用户）会想要使用我们的系统？”——在用例术语中，这被称为识别**参与者**。


    ## 参与者


    **参与者**代表在系统建成后将要与之交互的任何个人或事物；参与者驱动用例。参与者通常分为两大类：


    *   人类用户


    *   其他计算机系统


    “交互”通常被定义为使用系统来实现某些结果，但也可以简单地理解为 (a) 向系统提供/贡献信息和/或 (b) 从系统接收/消费信息。


    ***提供***信息，我指的是参与者是否输入了实质性的信息，这些信息增加了系统存储的集体数据——例如，系主任定义一门新课程，或学生注册他们的学习计划。这不包括用户为了查询信息而必须提供的相对琐碎的信息——例如，输入学生
    ID 以请求其成绩单。


    ***消费***信息，我指的是参与者是否使用系统来获取信息——例如，教职员工打印他们将要教授的课程的学生名册，或学生在线查看他们的课程表。

    '
- fmt: '### Identifying Actors and Determining Their Roles


    We must create an actor for every different role that will be assumed by various
    categories of user relative to the system. To identify such roles, we typically
    turn first to the **narrative requirements specification**, if one exists—that
    is, a statement of the functional requirements, such as the Student Registration
    System specification. The only category of user explicitly mentioned by that specification
    is a student user. So we would definitely consider `Student` to be one of the
    actor types for the `SRS`.


    If we think beyond the specification, however, it isn’t difficult to come up with
    other potential categories of user who might also benefit from using the `SRS`:


    - `Faculty` may wish to get a headcount of how many students are registered for
    one of the upcoming classes that they are going to be teaching, or they may use
    the system to post final grades, which in turn are reflected by a student’s transcript.

    - `Department chairs` may wish to see how popular various courses are or, conversely,
    whether or not a course ought to be canceled due to lack of interest on the part
    of the student body.

    - Personnel in the registrar’s office may wish to use the `SRS` to verify that
    a particular student is projected to have met the requirements to graduate in
    a given semester.

    - `Alumni` may wish to use the `SRS` to request copies of their transcripts.

    - `Prospective students`—that is, those who are thinking about applying for admission
    but who haven’t yet done so—may wish to browse the courses that are going to be
    offered in an upcoming semester to help them determine whether or not the university
    has a curriculum that meets their interests.

    - And so on.


    Similarly, since I said that other computer systems can be actors, we might have
    to build interfaces between the `SRS` and other existing automated systems at
    the university, such as:


    - The `Billing System`, so that students can be billed accurately based on their
    current course load

    - The `Classroom Scheduling System`, to ensure that classes to be taught are assigned
    to rooms of adequate capacity based on the student headcount

    - The `Admissions System`, so that the `SRS` can be notified when a new student
    has been admitted and is eligible to register for courses


    Of course, we have to make a decision early on as to what the scope of the system
    we’re going to build should be, to avoid “requirements inflation” or “scope creep.”
    To try and accommodate all of the actors hypothesized earlier would result in
    a massive undertaking that may simply be too costly for the sponsors of the system.
    For example, does it make sense to provide for potential students to use the `SRS`
    to preview what the university offers in the way of courses, or is there a different
    system—say, an online course catalog of some sort—that is better suited to this
    purpose? Through in-depth interviews with all of the intended user groups, the
    scope of the system can be appropriately bounded, and some of the actors that
    we conceived of may be eliminated as a result.


    In our particular case, we’ll assume that the sponsors of the `SRS` have decided
    that we needn’t accommodate the needs of alumni or prospective students in building
    the system—that is, that we needn’t recognize alumni or prospective students as
    actors. A key point here is that the sponsors decide such things, ***not the programmers***!
    One responsibility of a software engineer is indeed to identify requirements,
    and certainly part of that responsibility may include suggesting functional enhancements
    that the software engineer feels will be of benefit to the user. But the sponsors
    of the system rightfully have the final say in what actually gets built.


    Many software engineers get into trouble because they assume that they “know better”
    than their clients as to what the users really need. You may indeed have a brilliant
    idea to suggest, but think of it simply as that—a ***suggestion***—and consider
    your task as one of either convincing the sponsors/users of its merit or graciously
    accepting their decision to decline your suggestion.


    Note that the same user may interact with the system on different occasions in
    different roles. That is, a professor who chairs a department may assume the role
    of a `Department Chair` actor when they are trying to determine whether or not
    a course should be cancelled. Alternatively, the same professor may assume the
    role of a `Faculty` user when they wish to query the `SRS` for the student headcount
    for a particular course that they are teaching.'
