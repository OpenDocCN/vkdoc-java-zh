- fmt: "### Public Accessibility\n\nWhen a feature is declared to have **public accessibility**,\
    \ it’s freely accessible from client code using dot notation. For example, if\
    \ we were to declare the `name` attribute of the `Student` class as being publicly\
    \ accessible by placing the keyword `public` just ahead of the attribute’s type\
    \ in the declaration:\n\n```\npublic class Student {\n    public String name;\n\
    \    // etc.\n}\n```\n\nwe’ve granted client code permission to directly access\
    \ the `name` attribute of a `Student` object via dot notation; that is, it would\
    \ be perfectly acceptable to write client code as follows:\n\n```\npublic class\
    \ MyProgram {\n    public static void main(String[] args) {\n        Student x\
    \ = new Student();\n        // Because name is a public attribute of the Student\
    \ class, we may access\n        // it via dot notation from client code.\n   \
    \     x.name = \"Fred Schnurd\";  // assign a value to x's name attribute\n  \
    \      // or:\n        System.out.println(x.name);  // retrieve the value of x's\
    \ name attribute\n        // etc.\n    }\n}\n```\n\nSimilarly, if we were to declare\
    \ the `isHonorsStudent` method of `Student` as having public accessibility, which\
    \ we do by adding the keyword `public` to the beginning of the method header declaration:\n\
    \n```\npublic class Student {\n    // Attribute details omitted from this example.\n\
    \    // Methods.\n    public boolean isHonorsStudent() { ... }\n    // etc.\n\
    }\n```\n\nwe’ve granted client code permission to invoke the `isHonorsStudent`\
    \ method on a `Student` object via dot notation; that is, it would be perfectly\
    \ acceptable to write client code as follows:\n\n```\npublic class MyProgram {\n\
    \    public static void main(String[] args) {\n        Student x = new Student();\n\
    \        // Because isHonorsStudent is a public method, we may access it\n   \
    \     // via dot notation from client code.\n        if (x.isHonorsStudent())\
    \ { ... }\n        // etc.\n    }\n}\n```\n\n### Private Accessibility\n\nWhen\
    \ a feature is declared to have **private accessibility**, on the other hand,\
    \ it’s ***not*** accessible outside of the class in which it’s declared—that is,\
    \ we may ***not*** use dot notation to access such a feature from client code.\
    \ For example, if we were to declare the `ssn` attribute of the `Student` class\
    \ to have `private` accessibility:\n\n```\npublic class Student {\n    public\
    \ String name;\n    private String ssn;\n    // etc.\n}\n```\n\nthen we would\
    \ not be permitted to access `ssn` directly via dot notation from client code.\
    \ In the following code example, a compiler error would arise on the line that\
    \ is **bolded**:\n\n```\npublic class MyProgram {\n    public static void main(String[]\
    \ args) {\n        Student x = new Student();\n        // Not permitted from client\
    \ code!  ssn is private to the\n        // Student class, and so this will not\
    \ compile.\n        x.ssn = \"123-45-6789\";\n        // etc.\n    }\n}\n```\n\
    \nThe resultant error message would be:\n\n```\nssn has private access in Student\n\
    ```\n\nThe same is true for ***methods*** that are declared to be `private`—that\
    \ is, such methods can’t be invoked from client code. For example, if we were\
    \ to declare the `printInfo` method of `Student` as being `private`:\n\n```\n\
    public class Student {\n    // Attribute details omitted from this example.\n\
    \    // Methods.\n    public boolean isHonorsStudent() { ... }\n    private void\
    \ printInfo() { ... }\n    // etc.\n}\n```\n\nthen it would not be possible to\
    \ invoke the `printInfo` method on a `Student` object from within client code.\
    \ In the following code snippet, a compiler error would arise on the line that\
    \ is **bolded**:\n\n```\npublic class MyProgram {\n    public static void main(String[]\
    \ args) {\n        Student x = new Student();\n        // Because printInfo()\
    \ is a private method, we may not access it\n        // via dot notation from\
    \ client code; this won't compile:\n        x.printInfo();\n        // etc.\n\
    \    }\n}\n```\n\nThe resultant error message would be:\n\n```\nprintInfo() has\
    \ private access in Student\n```\n\n### Publicizing Services\n\nAs it turns out,\
    \ methods of a class are typically declared to be `public` because an object (class)\
    \ needs to publicize its services (as in the Yellow Pages advertisement analogy)\
    \ so that client code may request these services. By contrast, most attributes\
    \ are typically declared to be `private` (and effectively “hidden”), so that an\
    \ object can maintain ultimate control over its data. We’ll look at several detailed\
    \ examples later in this chapter of how an object goes about doing so.\n\nAlthough\
    \ it isn’t explicitly declared as such, the internal code that implements each\
    \ method (i.e., the method body) is also, in a sense, ***implicitly*** private.\
    \ When a client object A asks another object B to perform one of its methods,\
    \ A doesn’t need to know the behind-the-scenes details of ***how*** B is doing\
    \ what it’s doing; object A needs simply to trust that object B will perform the\
    \ “advertised” service. This is depicted conceptually in Figure [4-6](#78624_3_En_4_Chapter.xhtml#Fig6),\
    \ where those aspects of a class/object deemed to be private are depicted as being\
    \ sealed off from client code by an impenetrable brick wall.\n\n![](images/78624_3_En_4_Chapter/78624_3_En_4_Fig6_HTML.jpg)\n\
    \nA box gives the difference between public and private information. Public has\
    \ access to details declared such as the registration and the dropout information\
    \ of a course. While private has the internal details of name, social security\
    \ number, and address effectively protected by a block of wall.\n\n**Figure 4-6**\
    \ Public vs. private visibility\n\n### Method Headers, Revisited\n\nLet’s amend\
    \ the definition of a method header from a bit earlier in the chapter. A method\
    \ header actually consists of the following:\n\n*   ***A method’s access modifier***\n\
    *   A method’s return type—that is, the data type of the information that is going\
    \ to be passed back by object B to object A, if any, when the method is finished\
    \ executing\n*   A method’s name\n*   An optional list of comma-separated formal\
    \ parameters (specifying their types and names) to be passed to the method, enclosed\
    \ in parentheses\n\nAs an example, here is a typical method header that we might\
    \ define for the `Student` class, with the access modifier included:\n\n```\n\
    public     boolean    registerForCourse (String courseID, int secNo)\naccess \
    \    return type    method name    comma-separated list of formal\nmodifier  \
    \                     parameters, enclosed in parentheses\n(parentheses may be\
    \ left empty)\n```"
  raw: '### Public Accessibility


    When a feature is declared to have **public accessibility**, it’s freely accessible
    from client code using dot notation. For example, if we were to declare the `name`
    attribute of the `Student` class as being publicly accessible by placing the keyword
    `public` just ahead of the attribute’s type in the declaration


    ```

    public class Student {

    public String name;

    // etc.

    ```


    we’ve granted client code permission to directly access the `name` attribute of
    a `Student` object via dot notation; that is, it would be perfectly acceptable
    to write client code as follows:


    ```

    public class MyProgram {

    public static void main(String[] args) {

    Student x = new Student();

    // Because name is a public attribute of the Student class, we may access

    // it via dot notation from client code.

    x.name = "Fred Schnurd";  // assign a value to x''s name attribute

    // or:

    System.out.println(x.name);  // retrieve the value of x''s name attribute

    // etc.

    }

    }

    ```


    Similarly, if we were to declare the `isHonorsStudent` method of `Student` as
    having public accessibility, which we do by adding the keyword `public` to the
    beginning of the method header declaration


    ```

    public class Student {

    // Attribute details omitted from this example.

    // Methods.

    public boolean isHonorsStudent() { ... }

    // etc.

    }

    ```


    we’ve granted client code permission to invoke the `isHonorsStudent` method on
    a `Student` object via dot notation; that is, it would be perfectly acceptable
    to write client code as follows:


    ```

    public class MyProgram {

    public static void main(String[] args) {

    Student x = new Student();

    // Because isHonorsStudent is a public method, we may access it

    // via dot notation from client code.

    if (x.isHonorsStudent()) { ... }

    // etc.

    ```


    ### Private Accessibility


    When a feature is declared to have **private accessibility**, on the other hand,
    it’s ***not*** accessible outside of the class in which it’s declared—that is,
    we may ***not*** use dot notation to access such a feature from client code. For
    example, if we were to declare the `ssn` attribute of the `Student` class to have
    `private` accessibility


    ```

    public class Student {

    public String name;

    private String ssn;

    // etc.

    ```


    then we would not be permitted to access `ssn` directly via dot notation from
    client code. In the following code example, a compiler error would arise on the
    line that is **bolded**:


    ```

    public class MyProgram {

    public static void main(String[] args) {

    Student x = new Student();

    // Not permitted from client code!  ssn is private to the

    // Student class, and so this will not compile.

    x.ssn = "123-45-6789";

    // etc.

    ```


    The resultant error message would be


    ```

    ssn has private access in Student

    ```


    The same is true for ***methods*** that are declared to be `private`—that is,
    such methods can’t be invoked from client code. For example, if we were to declare
    the `printInfo` method of `Student` as being `private`


    ```

    public class Student {

    // Attribute details omitted from this example.

    // Methods.

    public boolean isHonorsStudent() { ... }

    private void printInfo() { ... }

    // etc.

    }

    ```


    then it would not be possible to invoke the `printInfo` method on a `Student`
    object from within client code. In the following code snippet, a compiler error
    would arise on the line that is **bolded**:


    ```

    public class MyProgram {

    public static void main(String[] args) {

    Student x = new Student();

    // Because printInfo() is a private method, we may not access it

    // via dot notation from client code; this won''t compile:

    x.printInfo();

    // etc.

    ```


    The resultant error message would be


    ```

    printInfo() has private access in Student

    ```


    ### Publicizing Services


    As it turns out, methods of a class are typically declared to be `public` because
    an object (class) needs to publicize its services (as in the Yellow Pages advertisement
    analogy) so that client code may request these services. By contrast, most attributes
    are typically declared to be `private` (and effectively “hidden”), so that an
    object can maintain ultimate control over its data. We’ll look at several detailed
    examples later in this chapter of how an object goes about doing so.


    Although it isn’t explicitly declared as such, the internal code that implements
    each method (i.e., the method body) is also, in a sense, ***implicitly*** private.
    When a client object A asks another object B to perform one of its methods, A
    doesn’t need to know the behind-the-scenes details of ***how*** B is doing what
    it’s doing; object A needs simply to trust that object B will perform the “advertised”
    service. This is depicted conceptually in Figure [4-6](#78624_3_En_4_Chapter.xhtml#Fig6),
    where those aspects of a class/object deemed to be private are depicted as being
    sealed off from client code by an impenetrable brick wall.


    ![](images/78624_3_En_4_Chapter/78624_3_En_4_Fig6_HTML.jpg)


    A box gives the difference between public and private information. Public has
    access to details declared such as the registration and the dropout information
    of a course. While private has the internal details of name, social security number,
    and address effectively protected by a block of wall.


    Figure 4-6


    Public vs. private visibility


    ### Method Headers, Revisited


    Let’s amend the definition of a method header from a bit earlier in the chapter.
    A method header actually consists of the following:


    *   ***A method’s access modifier***


    *   A method’s return type—that is, the data type of the information that is going
    to be passed back by object B to object A, if any, when the method is finished
    executing


    *   A method’s name


    *   An optional list of comma-separated formal parameters (specifying their types
    and names) to be passed to the method, enclosed in parentheses


    As an example, here is a typical method header that we might define for the `Student`
    class, with the access modifier included:


    ```

    public     boolean    registerForCourse (String courseID, int secNo)

    access     return type    method name    comma-separated list of formal

    modifier                       parameters, enclosed in parentheses

    (parentheses may be left empty)

    ```'
  trans: "\n### 公共可访问性\n\n当一个特性被声明为具有**公共可访问性**时，客户端代码可以通过点符号自由访问它。例如，如果我们在声明中将关键字\
    \ `public` 放在 `Student` 类的 `name` 属性的类型之前，从而将其声明为公共可访问的：\n\n```\npublic class\
    \ Student {\npublic String name;\n// 等等\n}\n```\n\n我们就授予了客户端代码通过点符号直接访问 `Student`\
    \ 对象的 `name` 属性的权限；也就是说，编写如下客户端代码是完全可接受的：\n\n```\npublic class MyProgram {\npublic\
    \ static void main(String[] args) {\nStudent x = new Student();\n// 因为 name 是\
    \ Student 类的公共属性，我们可以通过点符号从客户端代码访问它。\nx.name = \"Fred Schnurd\";  // 为 x 的 name\
    \ 属性赋值\n// 或者：\nSystem.out.println(x.name);  // 获取 x 的 name 属性的值\n// 等等\n}\n}\n\
    ```\n\n类似地，如果我们将 `Student` 的 `isHonorsStudent` 方法声明为具有公共可访问性，我们通过在方法头声明开头添加关键字\
    \ `public` 来实现：\n\n```\npublic class Student {\n// 此示例省略了属性细节。\n// 方法。\npublic\
    \ boolean isHonorsStudent() { ... }\n// 等等\n}\n```\n\n我们就授予了客户端代码通过点符号在 `Student`\
    \ 对象上调用 `isHonorsStudent` 方法的权限；也就是说，编写如下客户端代码是完全可接受的：\n\n```\npublic class MyProgram\
    \ {\npublic static void main(String[] args) {\nStudent x = new Student();\n//\
    \ 因为 isHonorsStudent 是一个公共方法，我们可以通过点符号从客户端代码访问它。\nif (x.isHonorsStudent()) { ...\
    \ }\n// 等等\n}\n```\n\n### 私有可访问性\n\n另一方面，当一个特性被声明为具有**私有可访问性**时，它***不能***在声明它的类外部被访问——也就是说，我们***不能***使用点符号从客户端代码访问此类特性。例如，如果我们将\
    \ `Student` 类的 `ssn` 属性声明为具有 `private` 可访问性：\n\n```\npublic class Student {\n\
    public String name;\nprivate String ssn;\n// 等等\n}\n```\n\n那么我们将不允许从客户端代码通过点符号直接访问\
    \ `ssn`。在以下代码示例中，**加粗**的那一行会出现编译器错误：\n\n```\npublic class MyProgram {\npublic\
    \ static void main(String[] args) {\nStudent x = new Student();\n// 客户端代码不允许！ssn\
    \ 是 Student 类的私有属性，因此这无法编译。\nx.ssn = \"123-45-6789\";\n// 等等\n}\n```\n\n产生的错误信息将是：\n\
    \n```\nssn has private access in Student\n```\n\n对于声明为 `private` 的***方法***也是如此——也就是说，此类方法不能从客户端代码调用。例如，如果我们将\
    \ `Student` 的 `printInfo` 方法声明为 `private`：\n\n```\npublic class Student {\n//\
    \ 此示例省略了属性细节。\n// 方法。\npublic boolean isHonorsStudent() { ... }\nprivate void\
    \ printInfo() { ... }\n// 等等\n}\n```\n\n那么就不可能从客户端代码中在 `Student` 对象上调用 `printInfo`\
    \ 方法。在以下代码片段中，**加粗**的那一行会出现编译器错误：\n\n```\npublic class MyProgram {\npublic static\
    \ void main(String[] args) {\nStudent x = new Student();\n// 因为 printInfo() 是一个私有方法，我们不能通过点符号从客户端代码访问它；这无法编译：\n\
    x.printInfo();\n// 等等\n}\n```\n\n产生的错误信息将是：\n\n```\nprintInfo() has private access\
    \ in Student\n```\n\n### 公开服务\n\n事实证明，类的方法通常被声明为 `public`，因为对象（类）需要公开其服务（就像黄页广告的类比一样），以便客户端代码可以请求这些服务。相比之下，大多数属性通常被声明为\
    \ `private`（并且实际上是“隐藏的”），以便对象可以对其数据保持最终控制。我们将在本章后面看到几个关于对象如何做到这一点的详细示例。\n\n尽管没有明确声明，但实现每个方法的内部代码（即方法体）在某种意义上也是***隐式***私有的。当客户端对象\
    \ A 请求另一个对象 B 执行其某个方法时，A 不需要知道 B ***如何***执行其操作的幕后细节；对象 A 只需要相信对象 B 会执行“广告中宣传的”服务。这在图\
    \ 4-6 中概念性地进行了描绘，其中类/对象中被视为私有的那些方面被描绘成被一堵不可穿透的砖墙与客户端代码隔离开来。\n\n![](img/78624_3_En_4_Fig6_HTML.jpg)\n\
    \n一个方框说明了公共信息和私有信息之间的区别。公共信息可以访问诸如课程的注册和退课信息等声明的细节。而私有信息则包含姓名、社会安全号码和地址等内部细节，这些细节被一堵墙有效地保护起来。\n\
    \n图 4-6\n\n公共可见性与私有可见性\n\n### 方法头，再探\n\n让我们修改本章前面关于方法头的定义。一个方法头实际上由以下部分组成：\n\n\
    *   ***方法的访问修饰符***\n*   方法的返回类型——即方法执行完毕后，对象 B 将要传回给对象 A 的信息的数据类型（如果有的话）\n*  \
    \ 方法的名称\n*   一个可选的、用逗号分隔的形式参数列表（指定其类型和名称），这些参数将被传递给方法，并括在圆括号中\n\n例如，下面是一个我们可能为\
    \ `Student` 类定义的典型方法头，其中包含了访问修饰符：\n\n```\npublic     boolean    registerForCourse\
    \ (String courseID, int secNo)\n访问        返回类型      方法名称        用逗号分隔的形式参数列表，\n\
    修饰符                                   括在圆括号中\n                               \
    \          （圆括号可以为空）\n```\n"
- fmt: "### Accessing the Features of a Class from Within Its Own Methods\n\nNote\
    \ that we can access all of a given class’s features, regardless of their accessibility,\
    \ from within any of that class’s own method bodies; that is, `public`/`private`\
    \ designations only affect access to a feature from outside the class itself (i.e.,\
    \ from client code).\n\nLet’s study the following example to see how one feature\
    \ of a class may be accessed from within another:\n\n```java\npublic class Student\
    \ {\n    // A few private attributes.\n    private String name;\n    private String\
    \ ssn;\n    private double totalLoans;\n    private double tuitionOwed;\n    //\
    \ Get/set methods would be provided for all of these attributes;\n    // details\
    \ omitted ...\n    public void printStudentInfo() {\n        // Accessing attributes\
    \ of the Student class.\n        System.out.println(\"Name:  \" + name);\n   \
    \     System.out.println(\"Student ID:  \" + ssn);\n        // etc.\n    }\n \
    \   public boolean allBillsPaid() {\n        boolean answer = false;\n       \
    \ // Accessing another method of the Student class.\n        double amt = moneyOwed();\n\
    \        if (amt == 0.0) {\n            answer = true;\n        }\n        else\
    \ {\n            answer = false;\n        }\n        return answer;\n    }\n \
    \   private double moneyOwed() {\n        // Accessing attributes of the Student\
    \ class.\n        return totalLoans + tuitionOwed;\n    }\n}\n```\n\nThe first\
    \ thing we observe is that we needn’t use dot notation to access any of the features\
    \ of the `Student` class from within `Student` methods. It’s automatically understood\
    \ by the compiler that a class is accessing one of its own features when a **simple\
    \ name**—that is, a name without a dot notation prefix, also known as an **unqualified\
    \ name**—is used, for example:\n\n```java\npublic void printStudentInfo() {\n\
    \    // Here, we're accessing the \"name\" attribute without dot notation.\n \
    \   System.out.println(\"Name:  \" + name);\n    // etc.\n}\n```\n\nand\n\n```java\n\
    public boolean allBillsPaid() {\n    boolean answer = false;\n    // Here, we're\
    \ accessing the \"moneyOwed\" method without dot notation.\n    double amt = moneyOwed();\n\
    \    // etc.\n}\n```\n\nThat being said, the Java keyword `this` can be used in\
    \ dot notation fashion—`this.featureName`—within any of a class’s methods to emphasize\
    \ the fact that we’re accessing another feature of **this same class**. I’ve rewritten\
    \ the `Student` example from earlier to take advantage of the `this` keyword:\n\
    \n```java\npublic class Student {\n    // A few private attributes.\n    private\
    \ String name;\n    private String ssn;\n    private double totalLoans;\n    private\
    \ double tuitionOwed;\n    // Get/set methods would be provided for all of these\
    \ attributes;\n    // details omitted ...\n    public void printStudentInfo()\
