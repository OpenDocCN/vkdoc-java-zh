  trans: '

    ### 类层次结构


    随着时间的推移，我们构建了一个通过继承相互关联的类的倒置树；这样的树被称为**类层次结构**。图 5-6 展示了一个类层次结构的示例。请注意，箭头用于从每个子类***向上***指向其直接超类。


    ![](img/78624_3_En_5_Fig6_HTML.png)


    一个包含从 A 到 F 的块的树形图，具有从底部到顶部的层次结构。A 是 Person，B 是 Student，C 是 Professor，D 是 Undergraduate，E
    是 Graduate，F 是 Continuing。B、D、E 和 F 被标记为一个子树。


    图 5-6


    一个示例类层次结构


    下面是一些术语说明：


    *   我们可以将每个类称为层次结构中的一个**节点**。

    *   层次结构中的任何给定节点都被称为（直接或间接）***派生自***层次结构中其上方所有节点，这些节点统称为其**祖先**。

    *   层次结构中***紧邻***给定节点上方的祖先被认为是该节点的直接超类。

    *   相反，层次结构中给定节点下方的所有节点都被称为其**后代**。

    *   位于层次结构顶部的节点被称为**根节点**。

    *   **终端节点**或**叶节点**是没有后代的节点。

    *   派生自同一直接超类的两个节点被称为**兄弟节点**。


    将这些术语应用于图 5-6 中的示例层次结构：


    *   类 `A`（`Person`）是整个层次结构的根节点。

    *   类 `B`、`C`、`D`、`E` 和 `F` 都被称为派生自类 `A`，因此都是 `A` 的后代。

    *   类 `D`、`E` 和 `F` 可以被称为派生自类 `B`。

    *   类 `D`、`E` 和 `F` 是兄弟节点；类 `B` 和 `C` 也是如此。

    *   类 `D` 有两个祖先：`B`（其直接超类）和 `A`。

    *   类 `C`、`D`、`E` 和 `F` 是终端节点，因为它们（至少目前）没有任何派生自它们的类。


    与任何层次结构一样，这个层次结构也可能随时间演变：


    *   它可能通过添加新的兄弟节点/分支而***变宽***。

    *   它可能因未来的特化而***向下扩展***。

    *   它可能因未来的泛化而***向上扩展***。


    当新需求出现或我们对现有需求的理解加深时，就会对层次结构进行此类更改。例如，我们可能确定需要 `MastersStudent` 和 `PhDStudent`
    类作为 `GraduateStudent` 的特化，或者需要一个 `Administrator` 类作为 `Student` 和 `Professor` 的兄弟节点。这将产生如图
    5-7 所示的修订后的层次结构。


    ![](img/78624_3_En_5_Fig7_HTML.jpg)


    一个包含从 A 到 H 的块的树形图，具有从底部到顶部的层次结构。A 是 Person，B 是 Student，C 是 Professor，I 是 Admin，D
    是 Undergraduate，E 是 Graduate，F 是 Continuing，G 是 PhD，H 是 Masters。


    图 5-7


    类层次结构不可避免地会随时间扩展


    ### Object 类


    在 Java 语言中，内置的 `Object` 类是所有其他引用类型（无论是用户定义的还是语言内置的）的最终超类。即使一个类没有显式声明扩展 `Object`，这种扩展也是隐含的。也就是说，当我们如下声明一个类时：


    ```

    public class Person { ... }

    ```


    就好像我们编写了：


    ```

    public class Person extends Object { ... }

    ```


    而无需显式这样做。并且，当我们编写：


    ```

    public class Student extends Person { ... }

    ```


    那么，由于 `Person` 类派生自 `Object`，`Student` 也派生自 `Object`。因此，图 5-7 所示层次结构的***真正***根节点——以及***所有***（Java）类层次结构的根节点——都是
    `Object` 类。


    我们将在第 13 章深入讨论 `Object` 类的重要性，以及所有 Java 对象最终都派生自 `Object` 这一事实。


    ### 继承真的是一种关系吗？


    关联、聚合和继承都被称为***类***之间的关系。继承与关联和聚合的不同之处在于***对象***层面。


    正如你在本章前面所见，关联（以及作为关联特殊形式的聚合）可以说关联了单个对象，即两个不同的对象由于它们各自类之间存在关联而相互链接。另一方面，继承***不***涉及连接不同的对象；相反，继承是一种描述***单个对象***集体特征的方式。通过继承，一个对象***同时***是子类及其所有超类的实例：一个
    `GraduateStudent` 是一个 `Student`，而 `Student` 是一个 `Person`，`Person` 是一个 `Object`，所有这些都合为一体！


    因此，再次审视图 5-7 中的层次结构，我们看到：


    *   层次结构中的***所有***类——类 A（`Person`）及其所有后代 B 到 I——都可以被认为产生 `Person` 对象。

    *   类 B（`Student`）及其后代 D 到 H 都可以被认为产生 `Student` 对象。


    这种对象具有“多重身份”的概念非常重要，我们将在本书中多次回顾。


    所以，回到本节标题提出的问题，继承确实是***类***之间的关系，但***不是***不同***对象***之间的关系。


    ### 避免类层次结构中的“连锁反应”


    一旦建立了类层次结构并编写了应用程序代码，对***非***叶节点类（即那些有后代的类）的更改有可能在层次结构下游引入不希望的连锁反应。例如，如果我们在建立了
    `GraduateStudent` 类之后，回过头来向 `Student` 类添加一个 `minorField` 属性，那么 `GraduateStudent`
    类将自动继承这个新属性。也许这正是我们想要的；另一方面，当我们最初构思 `Student` 时，可能没有预料到会派生出 `GraduateStudent`
    类，因此这可能***不是***我们想要的！


    作为 `Student` 超类的开发者，如果我们能与所有派生类（`GraduateStudent`、`MastersStudent` 和 `PhDStudent`）的开发者沟通，以获得他们对
    `Student` 任何拟议更改的批准，那将是***理想的***。但这通常不切实际；事实上，如果我们的代码正在被分发并在其他项目中重用，我们甚至常常***不知道***我们的类已被扩展。这引出了一个通用经验法则：


    *只要可能，一旦类以代码形式部署在应用程序中，就应避免向非叶节点类添加功能，以避免在整个继承层次结构中引起连锁反应。*


    这说起来容易做起来难！然而，这强调了在面向对象应用程序开发项目中，在进入编码阶段之前，尽可能多花时间在需求分析和对象建模阶段的重要性。这不会阻止新需求随时间出现，但至少我们应该尽一切可能避免对***当前***需求的疏忽。

    '
- fmt: "### Rules for Deriving Classes: The “Do’s”\n\nWhen deriving a new class, we\
    \ can do several things to specialize the superclass that we are starting out\
    \ with:\n\n- We may **extend** the superclass by **adding features**. In our `GraduateStudent`\
    \ example, we added six features: two attributes—`undergraduateDegree` and `undergraduateInstitution`—and\
    \ four accessor methods, `getUndergraduateDegree`/`setUndergraduateDegree` and\
    \ `getUndergraduateInstitution`/`setUndergraduateInstitution`.\n- We also may\
    \ **specialize** the way that a subclass performs one or more of the **services**\
    \ inherited from its superclass.\n\nFor example, when a “generic” student enrolls\
    \ for a course, the business rules for the SRS may require us to ensure that:\n\
    \n- The student has taken the necessary prerequisite courses.\n- The course is\
    \ required for the degree that the student is seeking.\n\nWhen a **graduate student**\
    \ enrolls for a course, on the other hand, the business rules may involve doing\
    \ both of these things as well as ensuring that the student’s graduate committee\
    \ feels that the course is appropriate.\n\nSpecializing the way that a subclass\
    \ performs a service—that is, how it responds to a given message as compared with\
    \ the way that its superclass would have responded to the same message—is accomplished\
    \ via a technique known as **overriding**.\n\n### Overriding\n\nOverriding involves\
    \ “rewiring” how a method works internally, without changing the client code interface\
    \ to/signature of that method. For example, let’s say that we’ve defined a `print`\
    \ method for the `Student` class to print out the values of all of a `Student`’s\
    \ attributes:\n\n```java\npublic class Student {\n    // Attributes.\n    private\
    \ String name;\n    private String studentId;\n    private String majorField;\n\
    \    private double gpa;\n    // etc.\n    // Accessor methods for each attribute\
    \ would also be provided; details omitted.\n    public void print() {\n      \
    \  // Print the values of all of the attributes that the Student class\n     \
    \   // knows about.  (Remember: \"\\n\" is a newline.)\n        System.out.println(\"\
    Student Name:  \" + getName() + \"\\n\" +\n                \"Student No.:  \"\
    \ + getStudentId() + \"\\n\" +\n                \"Major Field:  \" + getMajorField()\
    \ + \"\\n\" +\n                \"GPA:  \" + getGpa());\n    }\n}\n```\n\nBy virtue\
    \ of inheritance, all of the subclasses of `Student` will inherit this method.\n\
    \nWe go on to derive the `GraduateStudent` subclass from `Student`, adding two\
    \ attributes to `GraduateStudent`—`undergraduateDegree` and `undergraduateInstitution`.\
    \ If we take the “lazy” approach of just letting `GraduateStudent` inherit the\
    \ `print` method of `Student` as is, then whenever we invoke the `print` method\
    \ for a `GraduateStudent`, all that will be printed are the values of the four\
    \ attributes inherited from `Student`—`name`, `studentId`, `major`, and `gpa`—because\
    \ these are the only attributes that the `print` method has been explicitly programmed\
    \ to print the values of. Ideally, we would like the `print` method, when invoked\
    \ for a `GraduateStudent`, to print these same four attributes **plus** the two\
    \ additional attributes of `undergraduateDegree` and `undergraduateInstitution`.\n\
    \nWith an object-oriented language, we are able to **override**, or supersede,\
    \ the superclass’s version of a method with a subclass-specific version. To override\
    \ a superclass’s method in Java rather than merely inheriting the method as is,\
    \ the header of the method as declared in the superclass must be repeated in the\
    \ subclass; we are then free to reprogram the **body** of that method in the subclass\
    \ to specialize its behavior.\n\nLet’s look at how the `GraduateStudent` class\
    \ would go about overriding the `print` method of the `Student` class. For your\
    \ convenience, I’ve repeated the code of the `Student` class here:\n\n```java\n\
    public class Student {\n    // Attributes.\n    private String name;\n    private\
    \ String studentId;\n    private String majorField;\n    private double gpa;\n\
    \    // etc.\n    // Accessor methods for each attribute would also be provided;\
