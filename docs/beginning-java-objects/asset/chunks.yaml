  trans: "\n### 继承的“是一个”本质\n\n继承通常被称为两个类之间的“是一个”关系，因为如果类 B（`GraduateStudent`）派生自类\
    \ A（`Student`），那么 B 实际上***是*** A 的一个特例。因此，任何关于超类的描述也必然适用于其所有子类；也就是说：\n\n*   `Student`\
    \ 上课，因此 `GraduateStudent` 也上课。\n*   `Student` 有导师，因此 `GraduateStudent` 也有导师。\n\
    *   `Student` 攻读学位，因此 `GraduateStudent` 也攻读学位。\n\n事实上，判断继承是否合理的一个“试金石”如下：***如果存在某个关于类\
    \ A 的描述不适用于其拟议的子类 B，那么 B 就不是 A 的有效子类***。\n\n由于子类是超类的特例，术语**特化**用于指代从一个类派生出另一个类的过程。另一方面，**泛化**则用于指代相反的过程：即识别出几个现有类的共同特征，并为它们创建一个新的、共同的超类。\n\
    \n假设我们现在希望声明一个 `Professor` 类来补充我们的 `Student` 类。`Student` 和 `Professor` 有一些共同特征：属性\
    \ `name`、`birthDate` 等，以及操作这些属性的方法。然而，它们也各自拥有独特的特征：\n\n*   `Professor` 类可能需要属性\
    \ `title`（一个 `String`）和 `worksFor`（对 `Department` 的引用）。\n*   相反，`Student` 类的 `studentID`、`degreeSought`\
    \ 和 `majorField` 属性对于 `Professor` 来说是不相关的。\n\n由于每个类都拥有对方认为无用的属性，因此这两个类都不能从对方派生。然而，在两个地方***重复***它们的公共属性声明和方法代码将非常低效。在这种情况下，我们希望创建一个名为\
    \ `Person` 的新***超类***，将 `Student` 和 `Professor` 共有的特征整合到 `Person` 类中，然后让 `Student`\
    \ 和 `Professor` 通过 `extend` `Person` 来继承这些共同特征。这种情况下的结果代码如下。\n\n首先，我们将在名为 `Person.java`\
    \ 的文件中定义 `Person` 超类：\n\n```\n// Person.java\npublic class Person {\n// 学生和教授共有的属性。\n\
    private String name;\nprivate String address;\nprivate String birthDate;\n// 共有的访问器方法。\n\
    public String getName() {\nreturn name;\n}\npublic void setName(String name) {\n\
    this.name = name;\n}\n// 其他两个属性的方法类似\n// 其他通用的 Person 方法（如果有）将放在这里 - 细节省略。\n}\n\
    ```\n\n接下来，我们将精简之前展示的 `Student` 类，移除那些它将从 `Person` 继承的特征：\n\n```\n// Student.java\n\
    public class Student extends Person {\n// 仅特定于 Student 的属性；冗余属性 - 即那些与 Professor\
    \ 共享，\n// 因此现在由 Person 声明的属性 - 已从 Student 中移除。\nprivate String studentId;\nprivate\
    \ String majorField;\nprivate String degreeSought;\n// 特定于 Student 的访问器方法 - 冗余方法已移除。\n\
    public String getStudentId() {\nreturn studentId;\n}\npublic void setStudentId(String\
    \ studentId) {\nthis.studentId = studentId;\n}\n// 其他两个显式声明的 Student 属性的方法类似。\n\
    // 其他特定于 Student 的方法（如果有）放在这里；细节省略。\n}\n```\n\n最后，我们将定义第二个新的（子）类 `Professor`。这个类将放入一个单独的\
    \ `Professor.java` 文件中：\n\n```\n// Professor.java\npublic class Professor extends\
    \ Person {\n// 仅特定于 Professor 的属性；冗余属性 - 即那些与 Student 共享，\n// 因此现在由 Person 声明的属性\
    \ - 不包含在此处。\nprivate String title;\nprivate Department worksFor;\n// 特定于 Professor\
    \ 的访问器方法放在这里。\npublic String getTitle() {\nreturn title;\n}\npublic void setTitle(String\
    \ title) {\nthis.title = title;\n}\npublic Department getWorksFor() {\nreturn\
    \ worksFor;\n}\npublic void setWorksFor(Department worksFor) {\nthis.worksFor\
    \ = worksFor;\n}\n// 其他特定于 Professor 的方法（如果有）放在这里；细节省略。\n}\n```\n\n通过将 `Student`\
    \ 和 `Professor` 的共享特征泛化到一个名为 `Person` 的公共超类中，如果将来需要，我们将能够轻松地引入第三种、第四种或第五种 `Person`\
    \ 类型，并且它们都将通过继承机制***共享这些相同的特征***。此外，如果我们希望为这些子类引入新的子类型——例如将 `AdjunctProfessor`\
    \ 和 `TenuredProfessor` 作为 `Professor` 类的子类——它们都将因其共同的 `Person` “血统”而派生出一组共同的特征。\n\
    \n### 继承的好处\n\n继承可能是面向对象编程语言中最强大和最独特的方面之一，原因如下：\n\n*   ***我们极大地减少了代码冗余***，从而在需求变更或发现逻辑缺陷时减轻了代码维护的负担。\n\
    *   ***子类比没有继承时简洁得多***。子类只包含将其与其直接超类区分开来的本质内容。例如，从 `GraduateStudent` 类定义中，我们知道研究生是“已经拥有教育机构本科学位的学生”。因此，与相同应用程序的传统/非面向对象版本相比，***给定面向对象应用程序的代码总量显著减少***。\n\
    *   ***通过继承，我们可以在不修改已充分测试的代码的情况下重用和扩展它***。如您所见，我们能够在不以任何方式干扰 `Student` 类代码的情况下创建一个新类\
    \ `GraduateStudent`。因此，我们可以放心，任何依赖于实例化通用 `Student` 对象并向其发送消息的客户端代码都不会受到创建子类 `GraduateStudent`\
    \ 的影响，从而避免了重新测试现有应用程序大部分内容的需要。（相反，如果我们采用非面向对象的方法“修补” `Student` 类代码以试图满足研究生的需求，我们将不得不重新测试整个现有应用程序，以确保没有任何东西“损坏”！）\n\
    *   ***最棒的是，即使我们拥有某个现有类的源代码，我们也可以从中派生新类***！只要我们拥有该类的***编译后的字节码版本***，继承机制就能正常工作；我们不需要类的原始源代码来扩展它。***这是使用面向对象语言实现生产力的最显著方式之一***：找到一个类（无论是别人编写的还是语言内置的），它能完成你所需的大部分功能，然后创建该类的子类，仅添加你为实现自己目的所需的功能。\n\
    \n    我们将在第 6 章中查看一个扩展预定义 Java 集合类的具体示例。\n\n*   最后，正如我们在第 1 章中讨论的，***分类是人类组织信息的自然方式***；因此，我们按照同样的思路组织软件是合情合理的，这使得软件更加直观，从而更易于开发、维护、扩展以及与用户沟通。\n"
- fmt: '### Class Hierarchies


    Over time, we build up an inverted tree of classes that are interrelated through
    inheritance; such a tree is called a class hierarchy. One such class hierarchy
    example is shown in Figure [5-6](#78624_3_En_5_Chapter.xhtml#Fig6). Note that
    arrows are used to point upward from each subclass to its direct superclass.


    ![](images/78624_3_En_5_Chapter/78624_3_En_5_Fig6_HTML.png)


    A tree diagram with blocks A to F has a hierarchy from bottom to top. A is a person,
    B is a student, C is a professor, D is an undergraduate, E is a graduate, and
    F is continuing. B, D, E, and F are labeled a subtree.


    Figure 5-6


    A sample class hierarchy


    A bit of nomenclature follows:


    - We may refer to each class as a node in the hierarchy.

    - Any given node in the hierarchy is said to be (directly or indirectly) derived
    from all of the nodes above it in the hierarchy, known collectively as its ancestors.

    - The ancestor that is immediately above a given node in the hierarchy is considered
    to be that node’s direct superclass.

    - Conversely, all nodes below a given node in the hierarchy are said to be its
    descendants.

    - The node that sits at the top of the hierarchy is referred to as the root node.

    - A terminal, or leaf, node is one that has no descendants.

    - Two nodes that are derived from the same direct superclass are known as siblings.


    Applying this terminology to the example hierarchy in Figure [5-6](#78624_3_En_5_Chapter.xhtml#Fig6):


    - Class `A` (`Person`) is the root node of the entire hierarchy.

    - Classes `B`, `C`, `D`, `E`, and `F` are all said to be derived from class `A`
    and thus are all descendants of `A`.

    - Classes `D`, `E`, and `F` can be said to be derived from class `B`.

    - Classes `D`, `E`, and `F` are siblings; so are classes `B` and `C`.

    - Class `D` has two ancestors, `B` (its direct superclass) and `A`.

    - Classes `C`, `D`, `E`, and `F` are terminal nodes in that they don’t have any
    classes derived from them (as of yet, at any rate).


    As with any hierarchy, this one may evolve over time:


    - It may widen with the addition of new siblings/branches in the tree.

    - It may expand downward as a result of future specialization.

    - It may expand upward as a result of future generalization.


    Such changes to the hierarchy are made as new requirements emerge or as our understanding
    of the existing requirements improves. For example, we may determine the need
    for `MastersStudent` and `PhDStudent` classes as specializations of `GraduateStudent`
    or of an `Administrator` class as a sibling to `Student` and `Professor`. This
    would yield the revised hierarchy shown in Figure [5-7](#78624_3_En_5_Chapter.xhtml#Fig7).


    ![](images/78624_3_En_5_Chapter/78624_3_En_5_Fig7_HTML.jpg)


    A tree diagram with blocks A to H has a hierarchy from bottom to top. A is a person,
    B is a student, C is a professor, I is an admin, D is an undergraduate, E is a
    graduate, F is continuing, G is a PhD, and H is masters.


    Figure 5-7


    Class hierarchies inevitably expand over time


    ### The Object Class


    In the Java language, the built-in `Object` class serves as the ultimate superclass
    for all other reference types, both user-defined and those built into the language.
    Even when a class is not explicitly declared to extend `Object`, such extension
    is implied. That is, when we declare a class as follows


    ```

    public class Person { ... }

    ```


    it is as if we’ve written


    ```

    public class Person extends Object { ... }

    ```


    without having to explicitly do so. And, when we write


    ```

    public class Student extends Person { ... }

    ```


    then, because the `Person` class is derived from `Object`, `Student` is derived
    from `Object` as well. Thus, the true root of the hierarchy illustrated in Figure
    [5-7](#78624_3_En_5_Chapter.xhtml#Fig7)—and of all (Java) class hierarchies—is
    the `Object` class.


    We’ll talk in depth about the significance of the `Object` class, and the fact
    that all Java objects are ultimately descended from `Object`, in Chapter [13](#78624_3_En_13_Chapter.xhtml).


    ### Is Inheritance Really a Relationship?


    Association, aggregation, and inheritance are all said to be relationships between
    classes. Where inheritance differs from association and aggregation is at the
    object level.


    As you saw earlier in this chapter, association (and aggregation, as a special
    form of association) can be said to relate individual objects, in the sense that
    two different objects are linked to one another by virtue of the existence of
    an association between their respective classes. Inheritance, on the other hand,
    does not involve linking distinct objects; rather, inheritance is a way of describing
    the collective features of a single object. With inheritance, an object is simultaneously
    an instance of a subclass and all of its superclasses: a `GraduateStudent` is
    a `Student` that is a `Person` that is an `Object`, all wrapped into one!


    So, in looking once again at the hierarchy of Figure [5-7](#78624_3_En_5_Chapter.xhtml#Fig7),
    we see that


    - All classes in the hierarchy—class A (`Person`) as well as all of its descendants
    B through I—may be thought of as yielding `Person` objects.

    - Class B (`Student`), along with its descendants D through H, may all be thought
    of as yielding `Student` objects.


    This notion of an object having “multiple identities” is a significant one that
    we’ll revisit several times throughout the book.


    So, getting back to the question posed as the title of this section, inheritance
    is indeed a relationship between classes, but not between distinct objects.


    ### Avoiding “Ripple Effects” in a Class Hierarchy


    Once a class hierarchy is established and an application has been coded, changes
    to non-leaf classes (i.e., those classes that have descendants) have the potential
    to introduce undesired ripple effects further down the hierarchy. For example,
    if after we’ve established the `GraduateStudent` class, we go back and add a `minorField`
    attribute to the `Student` class, then the `GraduateStudent` class will automatically
    inherit this new attribute. Perhaps this is what we want; on the other hand, we
    might not have anticipated the derivation of a `GraduateStudent` class when we
    first conceived of `Student`, and so this may not be what we want!


    As the developers of the `Student` superclass, it would be ideal if we could speak
    with the developers of all derived classes—`GraduateStudent`, `MastersStudent`,
    and `PhDStudent`—to obtain their approval for any proposed changes to `Student`.
    But this is typically not practical; in fact, we often don’t even know that our
    class has been extended if, for example, our code is being distributed and reused
    on other projects. This evokes a general rule of thumb:


    *Whenever possible, avoid adding features to non-leaf classes once they have been
    deployed in code form in an application, to avoid ripple effects throughout an
    inheritance hierarchy.*


    This is easier said than done! However, it reinforces the importance of spending
    as much time as possible on the requirements analysis and object modeling stages
    of an OO application development project before diving into the coding stage.
    This won’t prevent new requirements from emerging over time, but we should at
    least do everything possible to avoid oversights regarding the current requirements.'
