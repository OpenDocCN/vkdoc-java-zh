    `name` and `ssn` attributes, a best practice that was recommended in Chapter [4](#78624_3_En_4_Chapter.xhtml).


    And, because the creation of any constructor for a class eliminates that class’s
    default constructor as we discussed in Chapter [4](#78624_3_En_4_Chapter.xhtml),
    we’ll program a replacement for the default constructor, as well, to avoid some
    of the issues related with constructors and inheritance that we discussed in Chapter
    [5](#78624_3_En_5_Chapter.xhtml):


    ```

    public Person() {

    this.setName("?");

    this.setSsn("???-??-????");

    }

    ```


