- fmt: '# My Recommended Object Modeling Process, in a Nutshell


    I present here a basic preview of the modeling process that I advocate and that
    I’m going to illustrate in depth throughout the remainder of Part 2 of the book:


    - Begin by obtaining or writing a narrative problem statement, similar to the
    Student Registration System (SRS) problem statement presented at the beginning
    of the book or the alternative case study problem statements included as the Appendix.
    Think about the different categories of users that will be interacting with the
    system, and the various situations in which they’ll each use it, to make sure
    that you uncover any not-so-obvious requirements that may have been missed. (I’ll
    discuss a formal technique for doing this—known as **use case modeling**—in Chapter
    [9](#78624_3_En_9_Chapter.xhtml).)


    - Handle the data side of the application by identifying the different classes
    of “real-world” objects that your application will need to be concerned with,
    and determine how these interrelate. (I’ll illustrate the process of creating
    a formal **class diagram** in Chapter [10](#78624_3_En_10_Chapter.xhtml).)


    - Handle the functional side of the application by studying how objects need to
    collaborate to accomplish the system’s mission, determining what behaviors/responsibilities
    will be required of each class. (I’ll illustrate the process of modeling the behavioral
    aspects of an OO system in Chapter [11](#78624_3_En_11_Chapter.xhtml).)


    - Test the model to ensure that it does indeed meet all of the original requirements.
    (I’ll discuss testing models in Chapter [12](#78624_3_En_12_Chapter.xhtml).)


    You’ll see plenty of examples of each of these techniques in the chapters to follow,
    and you’ll get an opportunity to practice these techniques based on the exercises
    suggested at the end of each chapter. Armed with a solid model of the SRS, you’ll
    then be ready to render the model into Java code, which is the subject of Part
    3 of the book.


    Note that these process steps need not be performed in strictly sequential fashion.
    In fact, as you become comfortable with each of the steps, you may find yourself
    carrying some of them out in parallel or in shuffled order. For example, contemplating
    the behavioral aspects of a model may bring to light new data requirements. In
    fact, for all but the most trivial models, it’s commonplace to cycle through these
    steps multiple times, “dialing in” increased levels of understanding, hence more
    detail in the model and supporting documentation, with each iteration.


    It’s also important to note that the formality of the process should be adjusted
    to the size of the project team and the complexity of the requirements. If we
    separate the ***form*** of using a methodology from the ***substance*** of what
    that methodology produces in the way of **artifacts**—models, documentation, code,
    and so on—then a good rule of thumb is that a project team should spend no more
    than 10`–`20 percent of its time on ***form*** and 80`–`90 percent on ***substance***.
    If the team finds itself spending so much time on form that little or no progress
    is being made on substance, it’s time to re-evaluate the methodology and its various
    components, to see where simplifying adjustments or improvements to efficiency
    may be made.


    ## Thoughts Regarding Object Modeling Software Tools


    It’s worthwhile to spend a little bit of time talking about the pros and cons
    of using an object modeling software tool. For purposes of learning how to produce
    models, a generic drawing tool such as PowerPoint may be good enough; for that
    matter, you may simply want to sketch your models using paper and pencil. But
    getting some hands-on experience with using a tool specifically designed for object
    modeling will better prepare you for your first “industrial-strength” project,
    so you may wish to acquire one before embarking upon the next chapter.


    You can find information about various object modeling software tools, including
    links to free or evaluation copies of software, by conducting an Internet search
    for “object modeling tools” or “UML tools.”


    I make it a practice not to mention specific tools, vendors, versions, etc. in
    this book, as they change much too rapidly. As soon as a software product is mentioned
    in print, it’s virtually guaranteed that it will either change names, change vendors
    who market it, or disappear completely.


    Object modeling tools fall under the general heading of **Computer-Aided Software
    Engineering**, or **CASE**, **tools**. CASE tools afford us many advantages, but
    aren’t without their drawbacks.


    ### Advantages of Using CASE Tools


    There are many arguments in favor of using CASE tools; several of the more compelling
    are as follows.


    #### Ease of Use


    CASE tools provide a quick drag-and-drop way to create visual models. Rather than
    trying to render a given notation with a generic drawing tool, where your basic
    drawing components are simple lines, arrows, text, boxes, and other geometric
    shapes, CASE tools provide one or more palettes of prefabricated graphical components
    specific to the supported notation. For example, you can drag and drop the graphical
    representation for a class rather than having to painstakingly fabricate it from
    simpler drawing components.


    #### Added Information Content


    CASE tools produce “intelligent” drawings that enforce the syntax rules of a particular
    notation. This is in contrast to a generic drawing package, which will pretty
    much let you draw whatever you like, whether it adheres to the notational syntax
    or not.


    The controls imposed by a CASE tool can be a mixed blessing: on the plus side,
    they will prevent you from making syntactic errors, but as I discuss a little
    later, they may also prevent you from making desired adjustments to the notation.


    Also, information about the classes reflected in a diagram—their names, attributes,
    methods, and relationships—is typically stored in a repository that underlies
    the diagram. Most CASE tools provide documentation generation features based upon
    this repository, enabling you to automatically generate project documentation
    such as a data dictionary report, a type of report that I’ll discuss in Chapter
    [10](#78624_3_En_10_Chapter.xhtml). Some tools even allow you to tap into this
    repository programmatically, should you find a need to do so.


    #### Automated Code Generation


    Most CASE tools provide code generation capabilities, enabling you to transition
    from a diagram to skeletal Java (or other language) code with the push of a button.
    You may or may not wish to avail yourself of this feature, however, for the following
    reasons:


    - Depending on how much control the CASE tool gives you as to the structure that
    the generated code takes, the code that is generated will potentially not meet
    team/corporate standards.


    - With most tools, you’re unable to edit the generated code externally to the
    tool, because the tool will then be “unaware” of the changes that you’ve made,
    meaning that the next time the code is generated, your changes will be overwritten
    and obliterated.


    - This has implications for reusing code from other projects, as well: make sure
    that your tool of choice allows you to import and introduce software components
    that didn’t originate within the tool.


    It’s sometimes better in the end to write your code from scratch, for even though
    it may take a bit longer at the outset, it often is much easier to manage such
    code over the lifetime of the project, and you avoid become “enslaved” to a particular
    modeling tool for ongoing code maintenance. In the worst-case scenario, the tool
    vendor goes out of business, and you’re left with an unsupported product and perhaps
    unsupportable project.'
