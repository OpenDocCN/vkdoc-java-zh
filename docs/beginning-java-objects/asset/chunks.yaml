  raw: '### Noun Phrase Analysis


    Let’s perform noun phrase analysis on the SRS requirements specification first,
    which was originally presented in the Introduction to the book, a copy of which
    is provided in the following sidebar. All noun phrases are highlighted in bold.


    HIGHLIGHTING NOUN PHRASES IN THE SRS SPECIFICATION


    We have been asked to develop an ***automated Student Registration System*** (***SRS***)
    for the ***university***. This ***system*** will enable ***students*** to register
    online for ***courses*** each ***semester***, as well as track their ***progress***
    toward ***completion*** of their ***degree***.


    When a ***student*** first enrolls at the ***university***, they use the ***SRS***
    to set forth a ***plan of study*** as to which ***courses*** they plan on taking
    to satisfy a particular ***degree program*** and choose a ***faculty advisor***.
    The ***SRS*** will verify whether or not the proposed ***plan of study*** satisfies
    the ***requirements of the degree*** that the ***student*** is seeking.


    Once a ***plan of study*** has been established, then, during the ***registration
    period*** preceding each ***semester***, ***students*** are able to view the ***schedule
    of classes*** online and choose whichever ***classes*** they wish to attend, indicating
    the ***preferred section*** (***day of the week*** and ***time of day***) if the
    ***class*** is offered by more than one ***professor***. The ***SRS*** will verify
    whether or not the ***student*** has satisfied the necessary ***prerequisites***
    for each ***requested course*** by referring to the ***student***’s online ***transcript***
    of ***courses completed*** and ***grades received*** (the ***student*** may review
    their ***transcript*** online at any time).


    Assuming that (a) the ***prerequisites*** for the ***requested course(s)*** are
    satisfied, (b) the ***course(s)*** meet(s) one of the ***student***’s ***plan
    of study requirements***, and (c) there is ***room*** available in each of the
    ***class(es)***, the ***student*** is enrolled in the ***class(es*****)**.


    If (a) and (b) are satisfied, but (c) is not, the ***student*** is placed on a
    ***first-come***, ***first-served waitlist***. If a ***class/section that they
    were previously waitlisted for*** becomes available (either because some other
    ***student*** has dropped the ***class*** or because the ***seating capacity***
    for the ***class*** has been increased), the ***student*** is automatically enrolled
    in the ***waitlisted class***, and an ***email message*** to that effect is sent
    to the ***student***. It is the student’s ***responsibility*** to drop the ***class***
    if it is no longer desired; otherwise, the student will be billed for the ***course***.


    ***Students*** may drop a ***class*** up to the ***end*** of the ***first week
    of the semester in which the class is being taught***.


    A simple spreadsheet serves as an ideal tool for recording our initial findings;
    we enter noun phrases as a single-column list in the order in which they occur
    in the specification. Don’t worry about trying to eliminate duplicates or consolidating
    synonyms just yet; we’ll do that in a moment. The resultant spreadsheet is shown
    in part in Figure [10-1](#78624_3_En_10_Chapter.xhtml#Fig1).


    ![](images/78624_3_En_10_Chapter/78624_3_En_10_Fig1_HTML.jpg)


    A screenshot of an excel sheet represents column A of a table containing 25 words
    and phrases. Some of the words include system, students, courses, semester, and
    degree. Some of the phrases are the plan of study, requirements of the degree,
    schedule of classes, and faculty advisor.


    Figure 10-1


    Noun phrases found in the SRS specification


    We’re working with a very concise requirements specification (approximately 350
    words in length), and yet this process is already proving to be very tedious!
    It would be impossible to carry out an exhaustive noun phrase analysis for anything
    but a trivially simple specification. If you’re faced with a voluminous requirements
    specification, start by writing an “executive summary” of no more than a few pages
    to paraphrase the system’s mission, and then use your summary version of the specification
    as the starting point for your noun survey. Paraphrasing a specification in this
    fashion provides the added benefit of ensuring that you have read through the
    system requirements and understand the “big picture.” Of course, you’ll need to
    review your summary narrative with your customers/users to ensure that you’ve
    accurately captured all key points.


    After we’ve typed all of the nouns/noun phrases into the spreadsheet, we sort
    the spreadsheet and eliminate duplicates; this includes eliminating plural forms
    of singular terms (e.g., eliminate “students” in favor of “student”). We want
    all of our class names to be singular in the final analysis, so if any plural
    forms remain in the list after eliminating duplicates (e.g., “prerequisites”),
    we make these singular, as well. In so doing, our SRS list shrinks to 38 items
    in length, as shown in Figure [10-2](#78624_3_En_10_Chapter.xhtml#Fig2).


    ![](images/78624_3_En_10_Chapter/78624_3_En_10_Fig2_HTML.jpg)


    A screenshot of an excel sheet represents column-A of a table containing 38 words
    and phrases. Some of the words include class, completion, course, and end. Some
    of the phrases include an automated student registration system, first-come, first-served
    waitlist, and plan of study requirements.


    Figure 10-2


    Removing duplicates streamlines the noun phrase list


    Remember, we’re trying to identify both physical and conceptual objects: as stated
    in Chapter [3](#78624_3_En_3_Chapter.xhtml), “***something mental or physical
    toward which thought, feeling, or action is directed***.” Let’s now make another
    pass to eliminate the following:


    *   References to the system itself (“automated Student Registration System,”
    “SRS,” “system”).


    *   References to the university. Because we’re building the SRS within the context
    of a single university, the university in some senses “sits outside” and “surrounds”
    the SRS; we don’t need to manipulate information about the university within the
    SRS, and so we may eliminate the term “university” from our candidate class list.


    Note, however, that if we were building a system that needed to span multiple
    universities—say, a system that compared graduate programs of study in information
    technology across the top 100 universities in the country—then we would indeed
    need to model each university as a separate object, in which case we’d keep “university”
    on our candidate class list.


    *   Other miscellaneous terms that don’t seem to fit the definition of an object
    are “completion,” “end,” ”progress,” “responsibility,” “registration period,”
    and “requirements of the degree.” Admittedly, some of these are debatable, particularly
    the last two; to play it safe, you may wish to create a list of rejected terms
    to be revisited later on in the modeling life cycle.


    The list shrinks to 27 items as a result, as shown in Figure [10-3](#78624_3_En_10_Chapter.xhtml#Fig3)—it’s
    starting to get manageable now!


    ![](images/78624_3_En_10_Chapter/78624_3_En_10_Fig3_HTML.jpg)


    A screenshot of an excel sheet represents column-A of a table containing 27 words
    and phrases. Some of the words include class, course, degree program, and degree.
    Some of the phrases include the class that he or she was previously waitlisted
    for and the section that he or she was previously waitlisted for.


    Figure 10-3


    Further streamlining the SRS noun phrase list'
  trans: '

    ### 名词短语分析


    首先，让我们对 SRS 需求规格说明书进行名词短语分析，该说明书最初出现在本书的引言中，其副本见下方侧边栏。所有名词短语均以粗体突出显示。


    **在 SRS 规格说明书中突出显示名词短语**


    我们被要求为**大学**开发一套**自动化学生注册系统**（**SRS**）。该**系统**将使**学生**能够每**学期**在线注册**课程**，并跟踪他们完成**学位**的**进度**。


    当**学生**首次在**大学**注册时，他们使用**SRS**制定一份**学习计划**，说明他们计划修读哪些**课程**以满足特定的**学位项目**，并选择一位**指导教师**。**SRS**将验证所提议的**学习计划**是否满足该**学生**所寻求的**学位要求**。


    一旦**学习计划**确定，那么在每**学期**之前的**注册期间**，**学生**可以在线查看**课程安排**，并选择他们希望参加的**课程**，如果该**课程**由不止一位**教授**授课，还需指明**首选教学班**（**星期几**和**一天中的时间段**）。**SRS**将通过查阅该**学生**的在线**成绩单**（包含**已修课程**和**已获成绩**）来验证该**学生**是否已满足每门**申请课程**的必要**先修条件**（**学生**可随时在线查看其**成绩单**）。


    假设 (a) **申请课程**的**先修条件**已满足，(b) **课程**符合**学生**的**学习计划要求**之一，并且 (c) 每门**课程**均有**空位**，则该**学生**将被注册到这些**课程**中。


    如果 (a) 和 (b) 满足，但 (c) 不满足，则该**学生**将被列入**先到先得**的**候补名单**。如果**他们之前被列入候补名单的课程/教学班**变得有空位（要么因为其他**学生**退掉了该**课程**，要么因为该**课程**的**座位容量**增加了），该**学生**将自动注册到该**候补课程**，并且一封相关**电子邮件**将发送给该**学生**。如果不再需要该**课程**，**学生**有**责任**退掉它；否则，该**学生**将被收取该**课程**的费用。


    **学生**可以在**课程授课学期的第一周结束**之前退掉一门**课程**。


    一个简单的电子表格是记录我们初步发现的理想工具；我们按照名词短语在规格说明书中出现的顺序，将其作为单列列表输入。暂时不必担心去重或合并同义词；我们稍后会进行这些操作。生成的电子表格部分内容如图
    10-1 所示。


    ![](img/78624_3_En_10_Fig1_HTML.jpg)


    一张 Excel 表格的截图，显示了包含 25 个单词和短语的 A 列。其中一些单词包括系统、学生、课程、学期和学位。一些短语包括学习计划、学位要求、课程安排和指导教师。


    图 10-1


    在 SRS 规格说明书中找到的名词短语


    我们正在处理一份非常简洁的需求规格说明书（大约 350 个单词），但这个过程已经显得非常繁琐！除非规格说明书极其简单，否则要对其进行详尽的名词短语分析是不可能的。如果你面对一份冗长的需求规格说明书，请先撰写一份不超过几页的“执行摘要”，用以概括系统的使命，然后使用这份摘要版本的规格说明书作为你名词调查的起点。以这种方式改写规格说明书还有一个额外的好处，即确保你已经通读了系统需求并理解了“全局图景”。当然，你需要与你的客户/用户一起审查你的摘要叙述，以确保你准确捕捉了所有关键点。


    在我们将所有名词/名词短语输入电子表格后，我们对电子表格进行排序并删除重复项；这包括删除单数术语的复数形式（例如，删除“students”，保留“student”）。我们希望所有类名在最终分析中都是单数形式，因此如果在去重后列表中仍有任何复数形式（例如“prerequisites”），我们也将其改为单数。这样一来，我们的
    SRS 列表长度缩减至 38 项，如图 10-2 所示。


    ![](img/78624_3_En_10_Fig2_HTML.jpg)


    一张 Excel 表格的截图，显示了包含 38 个单词和短语的 A 列。其中一些单词包括班级、完成、课程和结束。一些短语包括自动化学生注册系统、先到先得候补名单和学习计划要求。


    图 10-2


    删除重复项精简了名词短语列表


    请记住，我们试图识别物理对象和概念对象：正如第 3 章所述，“**思想、情感或行动所指向的某种精神或物质实体**”。现在让我们再进行一轮筛选，以排除以下内容：


    *   对系统本身的引用（“自动化学生注册系统”、“SRS”、“系统”）。

    *   对大学的引用。因为我们是在单一大学的背景下构建 SRS，大学在某种意义上“位于外部”并“包围着”SRS；我们不需要在 SRS 内部操作关于大学的信息，因此我们可以从候选类列表中排除术语“university”。


    但请注意，如果我们正在构建一个需要跨越多个大学的系统——例如，一个比较全国前 100 所大学信息技术研究生学习项目的系统——那么我们确实需要将每所大学建模为一个独立的对象，在这种情况下，我们会将“university”保留在候选类列表中。


    *   其他似乎不符合对象定义的杂项术语，包括“completion”、“end”、“progress”、“responsibility”、“registration
    period”和“requirements of the degree”。诚然，其中一些术语存在争议，尤其是最后两个；为了保险起见，你可能希望创建一个被排除术语的列表，以便在建模生命周期的后期重新审视。


    结果，列表缩减至 27 项，如图 10-3 所示——现在开始变得易于管理了！


    ![](img/78624_3_En_10_Fig3_HTML.jpg)


    一张 Excel 表格的截图，显示了包含 27 个单词和短语的 A 列。其中一些单词包括班级、课程、学位项目和学位。一些短语包括他或她之前被列入候补名单的班级和他或她之前被列入候补名单的教学班。


    图 10-3


    进一步精简 SRS 名词短语列表

