- fmt: '### The `Person` Class (Specifying Abstract Classes)


    Let’s start with writing the code for the `Person` class (see Figure [14-2](#78624_3_En_14_Chapter.xhtml#Fig2)).


    ![](images/78624_3_En_14_Chapter/78624_3_En_14_Fig2_HTML.png)


    A block diagram of a person includes the social security number and name.


    Figure 14-2


    The `Person` class


    The first thing that we notice in the UML diagram is that the name of the class
    is italicized, which as you learned in Chapter [10](#78624_3_En_10_Chapter.xhtml)
    means that `Person` is to be implemented as an abstract class. By including the
    keyword `abstract` in the class declaration, we prevent client code from ever
    being able to instantiate a `Person` object directly:


    ```

    public abstract class Person {

    ```


    #### Attributes of `Person`


    The `Person` class icon specifies two simple attributes. We’ll make all of our
    attributes `private` throughout the SRS application unless otherwise stated:


    ```

    //------------

    // Attributes.

    //------------

    private String name;

    private String ssn;

    ```


    #### `Person` Constructors


    We’ll provide a constructor for the `Person` class that accepts two arguments,
    so as to initialize our two attributes:


    ```

    //----------------

    // Constructor(s).

    //----------------

    public Person(String name, String ssn) {

    this.setName(name);

    this.setSsn(ssn);

    }

    ```


    Note that we use the `Person` class’s own `set` methods to set the values of the
    `name` and `ssn` attributes, a best practice that was recommended in Chapter [4](#78624_3_En_4_Chapter.xhtml).


    And, because the creation of any constructor for a class eliminates that class’s
    default constructor as we discussed in Chapter [4](#78624_3_En_4_Chapter.xhtml),
    we’ll program a replacement for the default constructor, as well, to avoid some
    of the issues related with constructors and inheritance that we discussed in Chapter
    [5](#78624_3_En_5_Chapter.xhtml):


    ```

    public Person() {

    this.setName("?");

    this.setSsn("???-??-????");

    }

    ```


    #### `Person` Accessor Methods


    Next, we provide accessor methods for all of the attributes, observing proper
    accessor method signature syntax as recommended in Chapter [4](#78624_3_En_4_Chapter.xhtml).
    All of our accessor methods, in all classes, will be declared with `public` accessibility:


    ```

    //------------------

    // Accessor methods.

    //------------------

    public void setName(String n) {

    name = n;

    }

    public String getName() {

    return name;

    }

    public void setSsn(String s) {

    ssn = s;

    }

    public String getSsn() {

    return ssn;

    }

    ```


    #### `toString()`


    We’d like for all subclasses of the `Person` class to override the version of
    the `toString` method that would normally be inherited from the `Object` class,
    a practice that we discussed in Chapter [13](#78624_3_En_13_Chapter.xhtml). However,
    we don’t want to bother coding the details of such a method for `Person`; we’d
    prefer to let each subclass handle the details of how the `toString` method will
    work in its own class-appropriate way.


    The best way to enforce this requirement for a `toString` method is to declare
    an abstract method for this method in `Person`, as we discussed in Chapter [7](#78624_3_En_7_Chapter.xhtml):


    ```

    //-----------------------------

    // Miscellaneous other methods.

    //-----------------------------

    // We''ll let each subclass determine how it wishes to be

    // represented as a String value.

    public abstract String toString();

    ```


    This will ensure that all classes derived from `Person` override this abstract
    method with a concrete version of their own. (This is not mandatory in all cases;
    we simply wish for all of the SRS-derived classes to do so.)


    Note that since the `Person` class itself would normally have inherited a generic
    version of `toString` from the `Object` class, we’re in essence overriding the
    concrete `toString` of `Object` with an abstract version in `Person`—this is a
    perfectly fine thing to do.


    #### `display()`


    We also want all subclasses of `Person` to implement a `display` method, to be
    used for printing the values of a `Person` object’s attributes to the command
    window. We’ll use the `display` method solely for testing our application, to
    verify that an object’s attributes have been properly initialized. But, rather
    than making this method abstract, as well, we’ll go ahead and actually program
    the body of this method, since we know how we’d like the attributes of `Person`
    to be displayed when these are inherited, at a minimum:


    ```

    public void display() {

    System.out.println("Person Information:");

    System.out.println("\tName:  " + this.getName());

    System.out.println("\tSoc. Security No.:  " + this.getSsn());

    }

    ```


    By doing so, we are facilitating code reuse: subclasses of `Person` (`Student`,
    `Professor`) will be able to use the `super` keyword to incorporate this logic
    in their own `display` methods without having to duplicate it, as we discussed
    in Chapter [5](#78624_3_En_5_Chapter.xhtml). As an example, here is a preview
    excerpt from the `Student` class’s `display` method:


    ```

    public void display() {

    // First, let''s display the generic Person info.

    super.display();

    // etc.

    ```


    Again, note that we are invoking the `Person` class’s `get` methods from within
    the `println` calls vs. accessing attributes directly. Also observe that we are
    inserting a tab character (`\t`) in the second and third `println` calls so that
    those two lines of printed output will be indented by one tab stop.


