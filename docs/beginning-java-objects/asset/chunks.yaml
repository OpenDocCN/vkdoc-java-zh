    *   `int indexOf(String s)`: Returns a non-negative integer value indicating the
    starting character position (counting from 0) at which the `String` provided as
    an argument is found within the `String` to which this method is applied or a
    negative value (typically `–`1) if the `String` argument is not found:


    ```

    String s = "foobar";

    // This will evaluate to true.

    if (s.contains("oo")) ...

