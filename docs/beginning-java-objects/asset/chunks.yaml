- fmt: '# The TreeMap Class


    The Java `TreeMap` class is another dictionary-type collection. `TreeMap`s are
    very similar to `HashMap`s, with one notable difference:


    - When we iterate through a `TreeMap`, objects are automatically retrieved from
    the collection in **ascending key (sorted) order**.

    - When we iterate through a `HashMap`, on the other hand, there’s no guarantee
    as to the order in which items will be retrieved.


    Let’s write a program to demonstrate this difference between `HashMap`s and `TreeMap`s.
    In our program, we’ll instantiate one of each of these two types of collection.
    This time, we’ll insert `String`s into the collections rather than `Student`s;
    we’ll let the same `String` serve as **both** the key and the value:


    ```

    import java.util.*;

    public class TreeHash {

    public static void main(String[] args) {

    // Instantiate two collections -- a HashMap and a TreeMap -- with

    // String as both the key type and the object type.

    HashMap h = new HashMap();

    TreeMap t = new TreeMap();

    // Insert several Strings into the HashMap, where the String serves

    // as both the key and the value.

    h.put("FISH", "FISH");

    h.put("DOG", "DOG");

    h.put("CAT", "CAT");

    h.put("ZEBRA", "ZEBRA");

    h.put("RAT", "RAT");

    // Insert the same Strings, in the same order, into the TreeMap.

    t.put("FISH", "FISH");

    t.put("DOG", "DOG");

    t.put("CAT", "CAT");

    t.put("ZEBRA", "ZEBRA");

    t.put("RAT", "RAT");

    // Iterate through the HashMap to retrieve all Strings ...

    System.out.println("Retrieving from the HashMap:");

    for (String s : h.values()) {

    System.out.println(s);

    }

    System.out.println();

    // ... and then through the TreeMap.

    System.out.println("Retrieving from the TreeMap:");

    for (String s : t.values()) {

    System.out.println(s);

    }

    }

    }

    ```


    Here’s the output:


    ```

    Retrieving from the HashMap:

    ZEBRA

    CAT

    FISH

    DOG

    RAT

    Retrieving from the TreeMap:

    CAT

    DOG

    FISH

    RAT

    ZEBRA

    ```


    Note that the `TreeMap` did indeed sort the `String`s, whereas the `String`s were
    retrieved in an arbitrary order—neither in the order in which they were inserted
    nor in sorted order—from the `HashMap`.


    All of the other methods that we discussed for the `HashMap` class work in the
    same fashion for `TreeMap`s.


    If `TreeMap`s are effectively identical to `HashMap`s with the added benefit of
    sorted iteration, why don’t we simply ignore the `HashMap` class and always use
    the `TreeMap` class to create dictionary collections instead? The answer lies
    in the fact that dictionaries can use **any object type** as a key.


    If we use `String`s as keys, as we’ve done in all of our examples thus far, a
    `TreeMap` has no trouble determining how to sort them, because the `String` class
    defines a `compareTo` method that the `TreeMap` class takes advantage of. However,
    if we use a **user-defined type** as a key, the burden is on us to programmatically
    define what it means to sort that object type.


    Let’s say, for example, that we create a dictionary collection where a `Department`
    object serves as the key and the `Professor` who chairs the department is the
    value referenced by a given key. If we declare the collection to be a `TreeMap`,
    we must define what it means for one `Department` to “come before” another in
    sorted fashion if we plan on iterating through the collection. The code required
    to do so is rather advanced—certainly beyond the scope of what we’ve learned about
    Java thus far. Suffice it to say that if we don’t truly **need** to iterate through
    a dictionary in sorted key order, it’s not worth the extra trouble of using `TreeMap`
    when `HashMap` will do quite nicely.


    # The Same Object Can Be Simultaneously Referenced by Multiple Collections


    As mentioned earlier, when we talk about inserting an object into a collection,
    what we really mean is that we’re inserting a reference to the object, not the
    object itself. This implies that the **same** object can be referenced by **multiple**
    collections simultaneously.


    Think of a person as an object and their telephone number as a reference for reaching
    that person. Now, as I proposed earlier in this chapter, think of an address book
    as a collection: it’s easy to see that the **same** person’s phone number (reference)
    can be recorded in many **different** address books (collections) simultaneously.


    Let’s consider an example relevant to the SRS. Given the students who are registered
    to attend a particular course, we may simultaneously maintain the following:


    - An ordered list of these students for purposes of knowing who registered first
    on the waitlist for a follow-on course

    - A dictionary that allows us to retrieve a given `Student` object based on the
    student’s `name`

    - Perhaps even a second SRS-wide dictionary that organizes **all** students at
    the university based on their student ID numbers


    This is depicted conceptually in Figure 6-14.


    ![](images/78624_3_En_6_Chapter/78624_3_En_6_Fig14_HTML.jpg)


    **Figure 6-14** A given object may be referenced by multiple collections simultaneously


    One common mistake made by beginning OO programmers is to assume that if a given
    collection is emptied (perhaps via an explicit call to its `clear` method), then
    the objects that the collection was previously referencing will be garbage collected.
    Recall our discussion of garbage collection from Chapter 3: only when there are
    no longer **any** handles on a given object will its memory be recycled by the
    JVM. Given that objects are often referenced by multiple collections simultaneously,
    we cannot assume that clearing a single collection will free up the objects that
    it is referencing. For example, if we were to clear the contents of the “Students
    attending Math 101” collection of Figure 6-14, the “John,” “Fred,” and “Sam” `Student`
    objects would still be referenced by two other collections. Unless these `Student`
    objects were subsequently removed from those other collections, as well, they
    would not be garbage collected.


    # Inventing Our Own Collection Types


    As mentioned earlier, different types of collections have different properties
    and behaviors. You must therefore familiarize yourself with the various predefined
    collection types available for your OO language of choice and choose the one that
    is the most appropriate for what you need in a given situation. Or, if none of
    them suits you, invent your own! This is where we start to get a real sense of
    the power of an OO language. Since we have the ability to invent our own user-defined
    types, it of course follows that we have free rein to define our own **collection**
    types.


    We have several ways to create our own collection types:


    - **Approach #1**: We can design a brand-new collection class from scratch.

    - **Approach #2**: We can use the techniques that we learned in Chapter 5 to extend
    a predefined collection class.

    - **Approach #3**: We can create a “wrapper” class that encapsulates one of the
    built-in collection types, to “abstract away” some of the details involved with
    manipulating the collection.


    Let’s discuss each of these three approaches in turn.'
