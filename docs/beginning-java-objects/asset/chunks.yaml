    ## 一种更复杂的集合类型：ArrayList 类


    `Array` 非常适合组织固定数量的同类元素——例如，一个包含星期几缩写名称的 `String` 数组：


    ```

    String[] daysOfWeek = { "Mon.", "Tue.", "Wed.", "Thu.", "Fri.", "Sat.", "Sun."
    };

    ```


    然而，如前所述，我们通常很难——甚至不可能——预先预测一个集合需要容纳多少个对象（例如，某个学生在登录 SRS 时将要注册多少门课程）。但是，当使用 `Array`
