    else {\nif (i < smallestInt) smallestInt = i;\nif (i > largestInt) largestInt\
    \ = i;\n}\n// 增加总数。\ntotal = total + i;\n// 将整数添加到 numbers 集合中。\n// 委托给封装的集合。\n\
    return numbers.add(i);\n}\n// 所有其余方法与 MyIntCollection 的相同。\npublic int getSmallestInt()\
    \ {\nreturn smallestInt;\n}\npublic int getLargestInt() {\nreturn largestInt;\n\
    }\npublic double getAverage() {\nreturn ((double) total)/this.size();\n}\n}\n\
    ```\n"
- fmt: "### Putting `MyIntCollection2` to Work\n\nThe client code needed to manipulate\
    \ this “flavor” of custom `int` collection is ***identical*** to the client code\
    \ that we used to manipulate the first version of `MyIntCollection`—***a testimonial\
    \ to the power of encapsulation***! The client code is repeated here, substituting\
    \ all references to `MyIntCollection` with references to `MyIntCollection2`—but\
    \ that’s all that had to change!\n\n```\npublic class MyIntCollection2Example\
    \ {\npublic static void main(String[] args) {\n// Instantiate one of our newly\
    \ designed collections!\nMyIntCollection2 mic = new MyIntCollection2();\n// Add\
    \ four random integers to our \"special\" collection.\nmic.add(3);\nmic.add(6);\n\
    mic.add(1);\nmic.add(9);\n// Take advantage of the size method ...\nSystem.out.println(\"\
    The collection contains \" + mic.size() +\n\" int values\");\n// ... and then\
    \ ask mic \"specialized\" questions about its contents.\nSystem.out.println(\"\
    The smallest value is:  \" + mic.getSmallestInt());\nSystem.out.println(\"The\
    \ largest value is:  \" + mic.getLargestInt());\nSystem.out.println(\"The average\
    \ is:  \" + mic.getAverage());\n}\n}\n```\n\nThe output would be the same as before.\n\
    \n### Trade-Offs of Approach #2 vs. Approach #3\n\nAs illustrated with the `MyIntCollection`\
    \ and `MyIntCollection2` examples, the coding effort required with either of the\
    \ two approaches to creating a custom collection—extending a predefined collection\
    \ class vs. encapsulating an instance of such a collection—is comparable. What\
    \ are the advantages, then, of one approach vs. the other?\n\nOne advantage of\
    \ extending a predefined collection class (approach #2) is that when we instantiate\
    \ such a class at run time, we create only one object in memory—an instance of\
    \ `MyIntCollection`, which is ***simultaneously*** an `ArrayList` by virtue of\
    \ inheritance. By comparison, when we create an instance of `MyIntCollection2`,\
    \ we wind up creating two objects, as illustrated in Figure [6-16](#78624_3_En_6_Chapter.xhtml#Fig16).\
    \ Thus, approach #2 is a bit more economical in terms of memory usage.\n\n![](images/78624_3_En_6_Chapter/78624_3_En_6_Fig16_HTML.jpg)\n\
    \n2 balloon diagrams with an array of 3 blocks. One has the array inside, while\
    \ the other has the array outside. The texts read an instance of `MyIntCollection`\
    \ is an `ArrayList` of one object instance, and an `ArrayList` of two object instances,\
    \ respectively.\n\n**Figure 6-16** Instantiating one vs. two objects at run time\n\
    \nAlternatively, an advantage of encapsulating a predefined collection class instance\
    \ (approach #3) is that we can choose to expose as few of the encapsulated collection’s\
    \ public behaviors as we wish to our client code.\n\n*   `MyIntCollection`, as\
    \ an `ArrayList`, inherits all 30 `public` behaviors of the `ArrayList` class.\
    \ Even if we see relevance only in the `size` and `add` methods of `MyIntCollection`,\
    \ the other 28 methods are exposed to/accessible by client code, as well.\n\n\
    *   In contrast, `MyIntCollection2` does not define those 28 methods.\n\n*   Based\
    \ on the way that we designed the `MyIntCollection2` class, on the other hand,\
    \ it exposes only ***two*** of these public behaviors—`size` and `add`—thus simplifying\
    \ the task of using our class from the perspective of client code. Furthermore,\
    \ if we wanted to, we could ***disguise*** these methods by giving them entirely\
    \ different names in `MyIntCollection2`, as follows:\n\n    ```\n    public class\
    \ MyIntCollection2 {\n    // details omitted ...\n    // This was formerly the\
    \ size() method ...\n    public int getIntCount() {\n    // DELEGATION!\n    return\
    \ numbers.size();\n    }\n    // This was formerly the add() method ...\n    public\
    \ boolean insertAnInt(int i) {\n    // Remember this int as the largest/smallest,\n\
    \    // if appropriate.  (The FIRST time we add a value, it by default\n    //\
    \ will be BOTH the smallest AND the largest!)\n    // DELEGATE to the encapsulated\
    \ collection.\n    if (numbers.isEmpty()) { ...\n    // etc.\n    ```\n\n    This\
    \ is thus taking full advantage of the power of encapsulation and information\
    \ hiding.\n\nOne significant advantage to approach #2 is that as a true `ArrayList`\
    \ by virtue of inheritance, your custom collection type may be used anywhere within\
    \ the Java language that a conventional `ArrayList` is permitted to be used.\n\
    \nThe bottom line is that either approach #2 or approach #3 has both advantages\
    \ and disadvantages. By understanding the subtle differences between the two,\
    \ you’ll be able to choose between them on a case-by-case basis.\n\n## Collections\
    \ As Method Return Types\n\nCollections provide a way to overcome the limitation\
    \ noted in Chapter [4](#78624_3_En_4_Chapter.xhtml) about methods being able to\
    \ return only a single result. If we define a method as having a return type that\
    \ is a ***collection*** type, we can return an arbitrarily sized collection of\
    \ object references to client code.\n\nIn the following code snippet for the `Course`\
    \ class, a `getRegisteredStudents` method is provided to enable client code to\
    \ request a reference to the entire collection of `Student` objects that are registered\
    \ for a particular course:\n\n```\npublic class Course {\nprivate ArrayList enrolledStudents;\n\
    // Details omitted ...\n// The following method returns a reference to an entire\
    \ collection\n// containing however many Students are registered for the Course\
    \ in question.\npublic ArrayList getRegisteredStudents() {\nreturn enrolledStudents;\n\
    }\n// etc.\n```\n\nHere’s an example of how client code might then use such a\
    \ method:\n\n```\n// Instantiate a course and several students.\nCourse c = new\
    \ Course();\nStudent s1 = new Student();\nStudent s2 = new Student();\nStudent\
    \ s3 = new Student();\n// Enroll the students in the course.\nc.enroll(s1);\n\
    c.enroll(s2);\nc.enroll(s3);\n// Now, ask the course to give us a handle on the\
    \ collection of\n// all of its registered students and iterate through the collection,\n\
    // printing out a grade report for each student.\nfor (Student s : c.getRegisteredStudents())\
    \ {\ns.printGradeReport();\n}\n```\n\nNote the use of a nested method call in\
    \ the `for` statement; since `c.getRegisteredStudents()` is an expression of type\
    \ `ArrayList`, this expression can be used in the `for` statement to designate\
    \ the collection that we wish to iterate through.\n\nIn Chapter [7](#78624_3_En_7_Chapter.xhtml),\
    \ when we discuss interfaces in general and the `Collection` interface in particular,\
    \ we’ll look at an alternative way of returning a collection from a method that\
    \ makes our code more versatile."
