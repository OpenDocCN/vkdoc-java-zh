    \ 212.0;\npublic static final double CENTIGRADE_BOILING = 100.0;\npublic static\
    \ double FahrenheitToCentigrade(double tempF) {\n// We can utilize our new attributes\
    \ in our method code.\nreturn (tempF  - FAHRENHEIT_FREEZING) * (5.0/9.0);\n}\n\
    public static double CentigradeToFahrenheit(double tempC) {\n// Ditto.\nreturn\
    \ tempC * (9.0/5.0) + FAHRENHEIT_FREEZING;\n}\n}\n```\n\nWe could then take advantage\
    \ of these constants in our client code, as well:\n\n```\nSoup s = new Soup(\"\
    chicken noodle\");\n// Bring the soup to a boil.\nif (s.getTemperature() < Temperature.FAHRENHEIT_BOILING)\
    \ {\ns.cook();\n}\n```\n\nBecause all of the features of the `Temperature` class\
    \ are `static`, we need never instantiate a `Temperature` object in our application."
  trans: "\n### final 关键字\n\nJava 的 `final` 关键字可以应用于变量、方法和整个类。**final 变量**是指在程序中只能被赋值一次的变量；在首次赋值之后，该变量的值就不能再被更改。我们通过在变量类型前放置\
    \ `final` 关键字来声明这样的变量，如下所示：\n\n```\npublic class Example {\n// 静态变量可以被声明为 final\
    \ ...\npublic static final Student x;\n// ... 属性（非静态）也可以。\nprivate final int y;\n\
    public void someMethod() {\n// 甚至局部变量也可以被声明为 final。\nfinal int z;\n// 等等。\n```\n\
    \n虽然***局部*** `final` 变量可以在声明之外单独赋值，但对于其他 final ***变量***，我们不能这样做；也就是说，在下面的扩展示例中，我们会在标记的行上遇到编译错误：\n\
    \n```\npublic class Example {\n// 静态变量可以被声明为 final ...\npublic static final Student\
    \ x;\n// ... 属性（非静态）也可以。\nprivate final int y;\npublic void someMethod() {\n//\
    \ 甚至局部变量也可以被声明为 final。\nfinal int z;\n// 然而，虽然我们被允许在方法中为局部 final 变量\n// 在声明之外单独赋值\
    \ ...\nz = 3;\n// .. 但我们不能对 final 静态变量或属性这样做。\nx = new Student();  // 编译错误！\n\
    y = 2;  // 编译错误！\n}\n// 等等。\n```\n\n编译器将生成以下错误信息：\n\n```\ncannot assign a value\
    \ to final variable x\nx = 1;\n^\ncannot assign a value to final variable y\n\
    y = 2;\n^\n```\n\n为了避免此类问题，我们必须在声明***类和实例*** final 变量时为其赋值：\n\n```\npublic class\
    \ Example {\n// 在声明静态 final 变量/final 属性时同时为其赋值。\npublic static final int x = 1;\n\
    private final int y = 2;\n// 等等。\n```\n\n回到我们的 `Math` 类示例，我们现在可以看到，如果 `Math.PI`\
    \ 被声明为 ***final*** 静态变量，客户端代码将被禁止修改其值，这正是它应有的行为。\n\n再举一个例子，回顾我们在第 6 章关于数组的讨论，数组有一个公共的\
    \ `length` 属性，其值代表数组的容量：\n\n```\nint[] x = new int[9];\nfor (int i = 0; i < x.length;\
    \ i++) { … }\n```\n\n事实证明，`length` 属性被声明为 `final`，这样我们就无法通过编程方式更改其值。继续前面的示例，以下代码将无法编译：\n\
    \n```\n// 让我们尝试扩大数组！\nx.length = 12;  // 这行代码无法编译\n```\n\n产生的编译错误如下：\n\n```\n\
    cannot assign value to final variable length\nx.length = 12;\n^\n```\n\n#### 公共静态\
    \ final 变量与接口\n\n如前文所述，接口不允许声明变量，但有一个例外：事实证明，接口允许声明 `public static final` 变量作为***全局常量***——即在整个应用程序范围内可见且可访问的常量值。\n\
    \n例如，假设大学管理员在聘用新教授时，必须指定该教授是全职工作还是兼职工作。如果我们愿意，可以在 `Administrator` 接口中声明 `public\
    \ static final` 变量来象征性地表示这两种值，如下列代码所示，这些值将作为参数值传递给 `hireProfessor` 方法：\n\n```\n\
    public interface Administrator {\n// 定义符号值，用作 hireProfessor 方法第二个参数的参数值。\npublic\
    \ static final int FULL_TIME = 1;\npublic static final int PART_TIME = 2;\n//\
    \ workStatus 的有效值为 FULL_TIME (1) 或 PART_TIME (2)。\npublic boolean hireProfessor(Professor\
    \ p, int workStatus);\n// 声明了其他方法头；细节省略。\n}\n```\n\n这使得客户端代码在调用 `hireProfessor`\
    \ 方法时可以利用这些值，如下所示：\n\n```\n// 客户端代码。\nAdministrator pAdmin = new Professor();\n\
    Professor p = new Professor();\n// 聘用 p 为全职教员。\npAdmin.hireProfessor(p, Administrator.FULL_TIME);\n\
    ```\n\n类或接口的 `public static final` 变量的命名约定相当特殊：我们传统上使用全大写字符来命名它们，因此在多词名称中使用下划线字符（`_`）来视觉上分隔单词——例如\
    \ `FULL_TIME` 和 `PART_TIME`。这就解释了为什么 `Math` 类的 `public static final PI` 属性是全大写的——例如\
    \ `Math.PI` 而非 `Math.pi`。\n\n在第 13 章中，你将学习到**枚举**，这是一种能够以更优雅的方式实现相同目的的语言特性。\n\n\
    如前所述，`final` 关键字也可以应用于方法和整个类：\n\n*   声明为 `final` 的方法不能在子类中被重写：\n\n    ```\n  \
    \  public class Person {\n    // 细节省略。\n    public final int computeAge() { ...\
    \ }\n    // 等等。\n    }\n    ```\n\n*   声明为 final 的类不能被继承：\n\n    ```\n    // 不能从这个类派生出任何子类。\n\
    \    public final class PhDStudent extends GraduateStudent { ... }\n    ```\n\n\
    \    Java 中许多预定义的类都被声明为 `final`。其中一个例子是 `java.lang.String` 类。\n\n### 自定义工具类\n\n\
    我们可以利用与创建预定义 Java 工具类（如 `Math` 类）相同的技术来创建我们自己的***自定义***工具类。例如，假设我们经常需要将华氏温度转换为摄氏温度，反之亦然。我们可以创建一个名为\
    \ `Temperature` 的工具类，如下所示：\n\n```\n// 一个提供华氏度与摄氏度转换的工具类。\npublic class Temperature\
    \ {\npublic static double FahrenheitToCentigrade(double tempF) {\nreturn (tempF\
    \ - 32.0) * (5.0/9.0);\n}\npublic static double CentigradeToFahrenheit(double\
    \ tempC) {\nreturn tempC * (9.0/5.0) + 32.0;\n}\n}\n```\n\n然后，要使用这个类，我们只需编写如下客户端代码：\n\
    \n```\ndouble degreesF = 212.0;\ndouble degreesC = Temperature.FahrenheitToCentigrade(degreesF);\n\
    System.out.println(\"A temperature of \" + degreesF + \" degrees F = \" +\ndegreesC\
    \ + \"degrees C\");\n```\n\n这将给我们以下输出：\n\n```\nA temperature of 212.0 degrees\
    \ F = 100.0 degrees C\n```\n\n我们甚至可能希望在我们的工具类中包含一些常用的常量——例如，水的沸点和冰点（以华氏度和摄氏度表示）——作为\
    \ `public static final` 变量：\n\n```\n// 一个提供华氏度与摄氏度转换的工具类。\npublic class Temperature\
    \ {\n// 我们添加了一些 public static final 变量。\npublic static final double FAHRENHEIT_FREEZING\
    \ = 32.0;\npublic static final double CENTIGRADE_FREEZING = 0.0;\npublic static\
    \ final double FAHRENHEIT_BOILING = 212.0;\npublic static final double CENTIGRADE_BOILING\
    \ = 100.0;\npublic static double FahrenheitToCentigrade(double tempF) {\n// 我们可以在方法代码中利用我们的新属性。\n\
    return (tempF  - FAHRENHEIT_FREEZING) * (5.0/9.0);\n}\npublic static double CentigradeToFahrenheit(double\
    \ tempC) {\n// 同理。\nreturn tempC * (9.0/5.0) + FAHRENHEIT_FREEZING;\n}\n}\n```\n\
    \n然后，我们也可以在客户端代码中利用这些常量：\n\n```\nSoup s = new Soup(\"chicken noodle\");\n// 把汤煮沸。\n\
    if (s.getTemperature() < Temperature.FAHRENHEIT_BOILING) {\ns.cook();\n}\n```\n\
    \n因为 `Temperature` 类的所有特性都是 `static` 的，所以我们永远不需要在应用程序中实例化 `Temperature` 对象。\n"
- fmt: '# Summary


    **Congratulations**! You’ve made it through all of the major object technology
    concepts that you’ll need to know for the rest of the book, and you’ve learned
    a great deal of Java syntax in the process. Please make sure that you’re comfortable
    with these concepts before proceeding, as they form the foundation for the rest
    of your object learning experience:


    - These same concepts will be reinforced when you learn how to model a problem
    in Part 2.

    - They will be reinforced yet again when you learn how to render a model as Java
    code in Part 3.


    In this chapter, you’ve learned that:


    - Different objects can respond to the same exact message in different class-specific
    ways, thanks to an OO language feature known as **polymorphism**.

    - **Abstract classes** are useful if you want to prescribe common behaviors among
    a group of (derived) classes without having to go into details about **how** those
    behaviors should be performed. That is, you specify **what** services an object
    must be able to perform—the messages that an object must be able to respond to,
    as defined by method headers—without programming method bodies.

    - **Interfaces** are an even more abstract way to prescribe behaviors in that
    they may only declare abstract methods (and constants).

    - By implementing multiple interfaces, a class of objects may take on multiple
    roles in an application.

    - Using interface types when declaring attributes, method return types, and parameters
    to methods makes user-defined classes much more versatile and robust to requirements
    changes.

    - **Static variables** may be used to enable an entire class of objects to share
    data and can be manipulated on a class vs. on specific objects/instances of that
    class via **static methods**.

    - We can take advantage of static methods along with `public static final` variables
    to create **custom utility classes**.


    Reflecting back on the home construction example from the Introduction to this
    book, you now know all about the unique properties of “blue stars” (objects) and
    why they are superior construction materials. But you still need to learn how
    to lay out a blueprint for how to use them effectively in building an application—you’ll
    learn how to do so in Part 2.


    ## Exercises


    | Abstract class | Abstract method | Abstraction | Accessor method | Aggregation
    | Ancestor class | Attribute signature | Association | Attribute | Behavioral
    relationship | Binary association | Class | Class hierarchy | Classification |
    Client code | Collection | Collections framework | Composite class | Concrete
    class | Constructor | Delegation | Dictionary (type of collection) | Encapsulation
    | Final variable |

    | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- | ---
    | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- |

    | Generalization | “Get” method | Handle | Implemented method | Information hiding
    | Inheritance | Instance | Instantiation | Interface | Local variable | Link |
    Message | Method | Method header | Method signature | Modeling | Multiple inheritance
    | Multiplicity | Object (in the software sense) | Operation | Ordered list | Overloading
    | Overriding |

    | Polymorphism | Predefined type | Primitive type | Private accessibility | Protected
    accessibility | Public accessibility | Reference type | Reference variable | Root
    (of a class hierarchy) | Service | Set (type of collection) | “Set” method | Sibling
    class | Specialization | State (of an object) | Static attribute | Static method
    | Static variable | Subclass | Superclass | User-defined type |


    1. **Test yourself.** Run through the following list of OO terms—some formal,
    some informal—and see if you can define each in your own words without referring
    back to the text:

    2. Which attributes, belonging to which SRS classes, might be well suited to being
    declared as `static`?

    3. Which attributes, belonging to which Prescription Tracking System classes (as
    described in the Appendix), might be well suited to being declared as `static`?

    4. It has been argued that the ability to implement multiple interfaces in the
    Java language eliminates the need for multiple inheritance support. Do you agree
    or disagree? Why or why not? Can you think of any ways in which implementing multiple
    interfaces “falls short” as compared with true multiple inheritance?

    5. The following client code scenarios would cause compilation errors. Can you
    explain why this is so in each case? Try answering this question **without** compiling
    the code. Be as precise as possible as to the reasons—they may not be as obvious
    as first meets the eye!


    Assume that `Professor` and `Student` are both classes that implement the `Teacher`
    interface.


    **Scenario #1:**


    ```

    Professor p;

    Student s = new Student();

    Teacher t;

    t = s;

    p = t;

    ```


    **Scenario #2:**


    1. [*Coding*] Test your answers to Exercise 5 by coding simple versions of the
    `Professor`, `Student`, and `Teacher` types plus a main class/method to house
    your client code.


    ```

    Professor p = new Professor();

    Student s;

    Teacher t = new Student();

    s = t;

    ```


    # Part II: Object Modeling 101


    # 8. The Object Modeling Process in a Nutshell


    [The “Big Picture” Goal of Object Modeling](#78624_3_En_8_Chapter.xhtml#Sec1)
    | [Modeling Methodology = Process + Notation + Tool](#78624_3_En_8_Chapter.xhtml#Sec2)
    | [My Recommended Object Modeling Process, in a Nutshell](#78624_3_En_8_Chapter.xhtml#Sec3)
    | [Thoughts Regarding Object Modeling Software Tools](#78624_3_En_8_Chapter.xhtml#Sec4)
    | [A Reminder](#78624_3_En_8_Chapter.xhtml#Sec11) | [Summary](#78624_3_En_8_Chapter.xhtml#Sec12)


    Let’s look in on the home builder whom we met in the Introduction to this book.
    They’ve just returned from a seminar entitled “Blue Stars: A Builder’s Dream Come
    True.” They now know about the unique properties of blue stars, and they appreciate
    why they are superior construction materials—just as you’ve learned about the
    unique properties of software objects as application “construction materials.”
    But they are still inexperienced with actually using blue stars in a construction
    project; in particular, they don’t yet know how to develop a blueprint suitable
    for a home that is to be built from blue stars. And we still need to see how to
    develop a “blueprint” for a software system that is to be constructed from objects.
    This is the focus of Part 2 of this book.


    In this chapter, you’ll learn:


    - The goals and philosophy behind object modeling

    - How much flexibility we have in terms of selecting or devising a modeling methodology

    - The pros and cons of object modeling software tools


    ## The “Big Picture” Goal of Object Modeling


    Our goal in object modeling is to render a precise, concise, understandable object-oriented
    model, or “blueprint,” of the system to be automated. This model will serve as
    an important tool for communication:


    - **To the future users of the system that we are about to build, an object model
    communicates our understanding of the system requirements.** Having the users
    review and approve the model will ensure that we get off on the right foot with
    a project, for a mistake in judgment at the requirements analysis stage can prove
    much more costly to fix—by orders of magnitude—than if such a misunderstanding
    is found and corrected when the system is still just a “gleam in the user’s eye.”

    - **To the software development team, an object model communicates the structure
    and function of the software that needs to be built in order to satisfy those
    requirements.** This benefits not only the software engineers themselves but also
    the folks who are responsible for quality assurance, testing, and documentation.

    - Long after the application is operational, an object model lives on as a “schematic
    diagram” **to help the myriad folks responsible for supporting and maintaining
    an application to understand its structure and function.**


    Of course, this last point is true only if the object model accurately reflects
    the system as it was actually built, not just as it was originally conceived.
    The design of complex systems invariably changes during their construction, so
    care should be taken to keep the object model up to date as the system is built.'
