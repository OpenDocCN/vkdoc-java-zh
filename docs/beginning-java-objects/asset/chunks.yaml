  trans: "\n## 数组作为简单集合\n\n你可能已经通过其他编程语言（无论是面向对象还是非面向对象）熟悉了一种简单的集合类型——**数组**。\n\n\
    正如本章前面提到的，数组是一种简单的有序列表。我们可以将数组想象成一系列隔间，每个隔间的大小都适合数组整体要容纳的任何数据类型。数组通常存储相同类型的元素——例如，`int`（整型）或`char`（字符型），或者在面向对象语言中，存储对象引用（对`Student`对象、`Course`对象、`Professor`对象等的引用）。\n\
    \n### 声明和实例化数组\n\n由于许多 Java 语言的新手习惯于在 C 语言等非面向对象语言中使用数组，Java 语言支持从 C 语言借鉴而来的声明和操作数组的语法，因此这种语法明显“不像对象”！\n\
    \nJava 官方语法中，声明变量`x`作为指向包含特定数据类型元素的数组的引用，如下所示：\n\n```\ndatatype[] x;\n```\n\n\
    例如：\n\n```\nint[] x;\n```\n\n这应理解为“`int`（整型）数组`x`”（或者另一种理解：“`x`指向一个`int`类型的数组”）。\n\
    \n由于 Java 数组是对象，因此必须使用`new`运算符进行实例化。然而，与本章后面将要讨论的任何 Java 预定义集合类不同，我们在首次实例化数组时必须指定数组能容纳多少个元素（即其**容量**，以元素数量表示）；此后数组大小固定，无法更改。\n\
    \n以下代码片段展示了构造数组时略显特殊的语法。在这个特定示例中，我们声明并实例化了一个用于存储`Student`对象引用的数组，如图 6-7 所示：\n\n\
    ![](img/78624_3_En_6_Fig7_HTML.jpg)\n\n一组 X 数组块，标记为 x[0]、x[1]至 x[19]。它们映射到标记为学生对象的气泡。\n\
    \n图 6-7\n\n`数组 x`设计用于存储最多 20 个`Student`引用\n\n```\n// 我们将变量 x 声明为指向数组对象的引用，\n//\
    \ 该数组将用于存储 20 个 Student 对象引用。\nStudent[] x = new Student[20];\n```\n\n这种对数组使用`new`运算符的方式很特殊，因为我们没有看到在`new`关键字后面跟着以括号`(...)`结尾的典型构造函数调用（就像实例化其他类型对象时那样）。相反，我们使用***方括号***`[...]`来包含数组所需的容量。尽管其外观非常规，但下面这行代码\n\
    \n```\nStudent[] x = new Student[20];\n```\n\n实际上在幕后实例化了一个数组对象。\n\n事实证明，Java 中还有另一种创建数组的方法，看起来更“像对象”，但代码并不“优雅”：\n\
    \n`// 声明一个包含 20 个 Student 引用的数组\"x\"。`\n\n`Object x = Array.newInstance(Class.forName(\"\
    Student\"), 20);`\n\n要完全理解这段代码的作用超出了你目前所学对象的范围；只需知道几乎所有 Java 程序员都使用简写形式即可：\n\n\
    `Student[] x = new Student[20];`\n\n### 访问单个数组元素\n\n单个数组元素通过在数组名称末尾附加方括号来访问，方括号内包含一个`int`（整型）表达式，表示要访问元素的**索引**，即相对于数组起始位置的位置（例如，`x[3]`）。这种语法称为**数组访问表达式**，它取代了使用传统的“get”/“set”方法来访问数组内容。\n\
    \n请注意，当我们根据索引引用数组中的单个元素时，我们从 0 开始计数。事实证明，Java 以及大多数其他语言中的绝大多数集合类型都是**从零开始索引**的。因此，在我们之前的示例中，存储在`Student[]\
    \ x`中的元素将分别被引用为`x[0]`、`x[1]`、……、`x[19]`，如图 6-7 所示。在下面的代码示例中，我们声明并实例化了一个大小为 3 的`double`数组。然后，我们将`double`值`4.7`赋给数组的“***第零个***”（***第一个***）元素。最后，我们检索数组***最后一个***元素的值，该元素被称为`data[2]`，因为数组大小为\
    \ 3：\n\n```\n// 声明一个能容纳三个 double 值的数组。\ndouble[] data = new double[3];\n// 将第一个（第零个）元素设置为\
    \ 4.7。\ndata[0] = 4.7;\n// 省略细节...\n// 访问最后一个元素的值。\ndouble temp = data[2];\n```\n\
    \n在下一个代码示例中，我们填充一个名为`squareRoot`的`double`类型数组，作为平方根值的查找表，其中单元格`squareRoot[n]`中存储的值表示`n`的平方根。我们将数组声明为比所需大小大一个元素，以便我们可以忽略第零个单元格——也就是说，为了方便查找，我们希望\
    \ 1 的平方根包含在数组的单元格 1 中，而不是单元格 0 中：\n\n```\ndouble[] squareRoot = new double[11];\
    \  // 我们将忽略单元格 0\n// 注意我们跳过了单元格 0。\nfor (int n = 1; n <= 10; n++) {\n    squareRoot[n]\
    \ = Math.sqrt(n);\n    System.out.println(\"The square root of \" + n + \" = \"\
    \ +\n    squareRoot[n]);\n}\n```\n\n输出如下：\n\n```\nThe square root of 1 = 1.0\n\
    The square root of 2 = 1.4142135623730951\nThe square root of 3 = 1.7320508075688772\n\
    The square root of 4 = 2.0\nThe square root of 5 = 2.23606797749979\nThe square\
    \ root of 6 = 2.449489742783178\nThe square root of 7 = 2.6457513110645907\nThe\
    \ square root of 8 = 2.8284271247461903\nThe square root of 9 = 3.0\nThe square\
    \ root of 10 = 3.1622776601683795\n```\n\n`Math.sqrt()`方法计算传递给方法的`double`参数的平方根。在上面的示例中，我们传入了一个`int`，它会自动转换为`double`。我们将在第\
    \ 7 章再次讨论`Math`类。\n"
- fmt: '### Initializing Array Contents


    Values can be assigned to individual elements of an array using indexes as shown
    earlier; alternatively, we can initialize an array with a complete set of values
    with a single Java statement when the array is first instantiated. In the latter
    case, initial values are provided as a comma-separated list enclosed in braces.
    For example, the following code instantiates and initializes a five-element `String`
    array:


    ```

    String[] names = { "Steve", "Jacquie", "Chloe", "Shylow", "Baby Grode" };

    ```


    Java automatically counts the number of initial values that we’re providing and
    sizes the array appropriately. The preceding approach is much more concise than
    the equivalent alternative shown here:


    ```

    String[] names = new String[5];

    names[0] = "Steve";

    names[1] = "Jacquie";

    names[2] = "Chloe";

    names[3] = "Shylow";

    names[4] = "Baby Grode";

    ```


    However, the result in both cases is the same: an array object of capacity 5 is
    instantiated, the zeroeth (first) element of the array will reference the `String
    "Steve"`, the next element will reference `"Jacquie"`, and so on.


    Note that it isn’t possible to bulk load an array in this fashion **after** the
    array has been instantiated, as a separate line of code. That is, the following
    won’t compile:


    ```

    String[] names = new String[4];

    // This next line won''t compile.

    names = {"Mike", "Cheryl", "Mickey", "Will" };

    ```


    If a set of comma-separated initial values aren’t provided when an array is first
    instantiated, the elements of the array are automatically initialized to their
    zero-equivalent values:


    - An `int` array would be initialized to contain integer zeroes (`0`s).

    - A `double` array would be initialized to contain floating-point zeroes (`0.0`s).

    - A `boolean` array would be initialized to contain the value `false` in each
    cell.

    - And so on.


    And, if we declare and instantiate an array intended to hold references to objects,
    as in


    ```

    Student[] studentBody = new Student[100];

    ```


    then we’d wind up with an array object filled with `null` values.


    ### Manipulating Arrays of Objects


    To fill our `Student` array with values other than `null`, we’d have to individually
    store `Student` object references in each cell of the array. If we wanted to create
    **brand-new** `Student` objects to store in our array, we could write code as
    follows:


    ```

    studentBody[0] = new Student("Fred");

    studentBody[1] = new Student("Mary");

    // etc.

    ```


    or


    ```

    Student s = new Student("Fred");

    studentBody[0] = s;

    // Reuse s!

    s = new Student("Mary");

    studentBody[1] = s;

    // etc.

    ```


    In the latter example, note that we’re “recycling” the **same** reference variable,
    `s`, to create many **different** `Student` objects. This works because, after
    each instantiation, we store a **second** handle on each newly created object
    in an array element, thus allowing `s` to let go of **its** handle on that same
    object, as depicted in Figure [6-8](#78624_3_En_6_Chapter.xhtml#Fig8). This technique
    is used frequently, with **all** collection types, in virtually all OO programming
    languages.


    ![](images/78624_3_En_6_Chapter/78624_3_En_6_Fig8_HTML.png)


    3 schematics from top to bottom. The top 1 has a student object balloon labeled
    s and 3 array blocks of the student body. Center 1 has the balloon connected to
    the first block of the student body. And the bottom 1 has 2 separate balloons
    of student objects where 1 is mapped to the first block.


    **Figure 6-8** Handing new objects one by one into a collection, using a single
    reference variable as a temporary handle


    If we’re simply using the default (parameterless) constructor to instantiate “bare-bones”
    `Student` objects, however, we’d probably populate our array using a looping construct
    and eliminate the need for reference variable `s` entirely:


    ```

    for (int i = 0; i < 20; i++) {

    // We''re using the default constructor.

    studentBody[i] = new Student();

    }

    ```


    Assuming that we’ve fully populated all elements of the `studentBody` array, an
    indexed reference to any particular populated element in the array—for example,
    `studentBody[i]`—represents a `Student` object and can be used accordingly. In
    the following line of code, for example, we’re invoking the `getName` method on
    such a `Student`:


    ```

    studentBody[i].getName();  // We''re using dot notation to call a method on

    // studentBody[i], the ith Student object referenced by

    // the array.

    ```


    Being able to reference individual objects within a collection in this fashion
    enables us to step through a collection using a looping construct to process its
    objects one by one. As an example, let’s use a `for` loop to iterate through all
    of the `Student`s in our `studentBody` array to print their names—in essence,
    we’re printing a student roster:


    ```

    // Step through all elements of the array.

    for (int i = 0; i < studentBody.length; i++) {

    System.out.println(studentBody[i].getName());

    }

    ```


    Note the stopping condition on the `for` loop:


    ```

    i < studentBody.length

    ```


    It turns out that arrays have a **public attribute** named `length` whose value
    represents the capacity of the array in terms of the number of elements that it
    may accommodate. Since we count starting with 0 for the first element, we must
    stop one short of the value of `length` to avoid stepping past the end of the
    array.


    If ever we accidentally try to step beyond the end of an array at run time, as
    in the following example


    ```

    // Array x contains 3 elements, indexed as 0, 1, and 2.

    int[] x = new int[3];

    // However, rather than stopping at element 2, we accidentally try to step

    // to (nonexistent) element 3 in our loop:

    for (int i = 0; i <= 3; i++) {

    System.out.println(x[i]);

    }

    ```


    we’ll get the following **run-time** error message:


    ```

    Exception in thread "main" java.lang.ArrayIndexOutOfBoundsException: 3

    ```


    We’ll discuss in Chapter [13](#78624_3_En_13_Chapter.xhtml) how these types of
    run-time failures—known as **exceptions**—can be programmatically anticipated
    and handled through a mechanism known as **exception handling**.'
