    ### while Statements


    A `while` statement is similar in function to a `for` statement in that both are
    used to repeatedly execute an associated block of code. However, if it’s impractical
    to predict the number of times that the code block is to be executed when the
    loop first begins, a `while` statement is the preferred choice, because a `while`
    statement continues to execute as long as a specified condition is met.


    The general syntax for the `while` statement is as follows:


    ```

    while (condition) {

    code to repeatedly execute while expression continues to evaluate to true

    }

    ```


    The condition can be either a simple or a complex logical expression that evaluates
    to a `true` or `false` value, for example:


    ```

    int x = 1;

    int y = 1;

    while ((x < 20) || (y < 10)) {

    hopefully we''ll do something within this loop body that increments the value
    of

    either x or y, to avoid an infinite loop!

    }

    ```


    When program execution reaches a `while` statement, the condition is evaluated
    first. If the condition is `true`, the block of code following the condition is
    executed. When the block of code is finished, the condition is evaluated again,
    and if it’s still `true`, the process repeats itself until the condition evaluates
    to `false`, at which point the `while` loop terminates.


    Here’s a simple example illustrating the use of a `while` loop to print consecutive
