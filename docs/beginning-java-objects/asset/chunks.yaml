- fmt: '### The Namespace of a Class


    Generally speaking, the **namespace** for a given class contains the following
    categories of names, among others:


    1. The name of the class itself (e.g., `Student`)

    2. The names of all of the features (attributes, methods, etc.) declared by the
    class

    3. The names of any local variables declared within any methods of the class (including
    parameters being passed in)

    4. The names of all classes belonging to the **same** package that the class we’re
    compiling belongs to (we’ll talk more about packaging classes later in this chapter
    and then again in Chapter [13](#78624_3_En_13_Chapter.xhtml))

    5. The names of all **public** classes in the `java.lang` package: `String`, `Math`,
    `System`, etc.


    You’ll learn what constitutes a `public` (vs. a nonpublic) class in Chapter [13](#78624_3_En_13_Chapter.xhtml).


    6. The names of all **public** classes in any **other** package that has been
    **imported** by the class that we’re compiling

    7. The names of all **public** features (attributes, methods) of the classes listed
    in points 5 and 6

    8. And so forth


    As a simple example, when compiling the following class


    ```

    // Simple.java

    public class Simple {

    private int foo;

    public void bar(double x) {

    boolean maybe;

    if (x < 0) maybe = true;

    else maybe = false;

    }

    }

    ```


    the compiler would recognize the following names/symbols:


    1. `Simple` (the class name)

    2. `foo`, `bar` (names of features of the `Simple` class)

    3. `x`, `maybe` (local variables of `Simple`’s methods)

    4. The names of all classes belonging to the **default** (unnamed) package, since
    `Simple` is **in** the default package

    5. The names of all public classes in the `java.lang` package: `String`, `Math`,
    `System`, etc.

    6. The names of all public classes in any other package that has been imported.
    Since `Simple` contains no `import` directives, there are no symbols in this category
    in `Simple`’s namespace

    7. The names of all public features (attributes, methods) of the classes listed
    in points 4 and 5


    The Java compiler compiles classes one by one and “resets” its notion of what
    is within scope for each new class that it compiles. Therefore, importing a package
    is only effective for the particular `.java` source code file in which the `import`
    directive resides. If, for example, you have three separate classes, each stored
    in its own `.java` file, that all need to manipulate `ArrayList`s, then all three
    `.java` files must include an appropriate `import` directive, either


    ```

    import java.util.*;

    ```


    or


    ```

    import java.util.ArrayList;

    ```


    We could avoid importing a package/class by **fully qualifying** the names of
    any classes, methods, etc. that we use from such a package. That is, we can prefix
    the name of the class or method with the name of the package from which it originates
    every time that we use it in our code, as shown in the next example:


    ```

    // Note:  NO import directive!

    public class Simple {

    public static void main(String[] args) {

    java.util.ArrayList x = new java.util.ArrayList();

    java.util.ArrayList y = new java.util.ArrayList();

    // etc.

    ```


    This, of course, requires a lot more typing and impairs the readability of our
    code. By importing a package, on the other hand, we’re telling the compiler how
    to resolve **simple**/**unqualified** names—the **real** (**qualified**) name
    of the `ArrayList` class is `java.util.ArrayList`, but we’re able to refer to
    it by the simple name `ArrayList` because of the `import` directive.


    Although most built-in Java packages have names that consist of two terms separated
    by a period (dot)—for example, `java.awt`—some built-in Java package names consist
    of three or more dot-separated terms—for example, `java.awt.event`. There’s really
    no limit to the number of terms that can be concatenated to form a package name.


    When one package name is a subset of another package name—as in the case of `java.awt`
    and `java.awt.event`—**both** must be imported separately if **both** are needed
    in the same class scope. That is, an asterisk at the end of an `import` directive


    ```

    import nameA.nameB.*;

    ```


    only serves to import **members** of the specified package, not to extend the
    package name per se:


    ```

    // This first import directive is not sufficient to import java.awt.event members;

    // it only imports members of the java.awt package.

    import java.awt.*;

    // We''d need to include this second import directive, as well.

    import java.awt.event.*;

    ```


    ### User-Defined Packages and the Default Package


    Java also provides programmers with the ability to logically group their **own**
    classes into packages. For example, we could invent a package such as `com.objectstart.srs`
    to house all classes related to our SRS application. Then, anyone else wishing
    to incorporate our SRS classes within an application that they are going to write
    could include the directive


    ```

    import com.objectstart.srs;

    ```


    in their code.


    We will revisit this notion later in the book, but, as it turns out, if we do
    nothing in particular to take advantage of programmer-defined packages, then as
    long as all of the compiled `.class` files for an application reside in the **same**
    directory on our computer system, they are automatically considered to be in the
    same package, known as the **default package**. This is what enables us to write
    code such as the following


    ```

    public class SRS {

    public static void main(String[] args) {

    Student s = new Student();

    Professor p = new Professor();

    // etc.

    ```


    without using `import` directives, because the class definitions for all of the
    classes that we’ve written and compiled—`Student`, `Professor`, and `SRS`—all
    coexist within the **same** (default unnamed) package.


    The bottom line is that `import` directives as a building block of a `.java` source
    code file are only needed if we are using classes that either are not found in
    package `java.lang` or do not coexist in our own (default) package.


    ### Generics


    Let’s return to our examination of the `ArrayListExample` program from earlier
    in the chapter, which is repeated in its entirety here for your convenience:


    ```

    import java.util.*;

    public class ArrayListExample {

    public static void main(String[] args) {

    // Instantiate a collection.

    ArrayList students = new ArrayList();

    // Create a few Student objects.

    Student a = new Student();

    Student b = new Student();

    Student c = new Student();

    // Store references to all three Students in the collection.

    students.add(a);

    students.add(b);

    students.add(c);

    // ... and then iterate through them one by one,

    // printing each student’s name.

    for (Student s : students) {

    System.out.println(s.getName());

    }

    }

    }

    ```


    The next bit of “unusual” syntax occurs on the line of code that declares and
    instantiates our `ArrayList`:


    ```

    ArrayList students = new ArrayList();

    ```


    The predefined Java collection classes are designed to operate **generically**
    on object references of any type, but then provided a syntactic means of **constraining**
    the type of element that a particular collection is to manage. Now, whenever we
    want to instantiate a collection such as an `ArrayList`, we can indicate the type
    of element that the collection is intended to hold by enclosing the type name
    in angle brackets `<...>` immediately after the class name:


    ```

    ArrayList faculty = new ArrayList();

    ArrayList names = new ArrayList();

    ```


    and so forth. In essence, `ArrayList<xxx>` becomes the type of the collection
    that we’re instantiating.


    Note that there is a trick to inserting **primitive** types (`int`, `double`,
    `boolean`, etc.) into a collection. We’ll discuss this when the notion of **autoboxing**
    is introduced a bit later in the chapter.'
