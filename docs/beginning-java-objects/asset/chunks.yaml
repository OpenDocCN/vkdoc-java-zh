    ### 关于多重继承的简要说明


    本章中我们研究的所有继承层次结构都被非正式地称为**单继承**层次结构，因为层次结构中的任何特定类只能有一个***单一***的直接超类/直接祖先。例如，在图
    5-9 所示的层次结构中：


    *   类 B、C 和 I 都有单一的直接超类 A。

    *   类 D、E 和 F 都有单一的直接超类 B。

    *   类 G 和 H 都有单一的直接超类 E。


    ![](img/78624_3_En_5_Fig9_HTML.jpg)


    一个包含从 A 到 H 的块的树形图，层次结构从下到上。A 是 Person，B 是 Student，C 是 Professor，I 是 Admin，D 是
    Undergraduate，E 是 Graduate，F 是 Continuing，G 是 PhD，H 是 Masters。


    图 5-9


    一个单继承层次结构示例


    如果出于某种原因，我们需要融合两个不同超类的特征来创建一个混合的第三类，**多重继承**似乎就是答案。与单继承相对的多重继承允许类层次结构中的任何给定类拥有***两个或更多***类作为直接祖先。例如，我们有一个代表授课人员的
    `Professor` 类和一个代表听课人员的 `Student` 类。如果有一位教授想通过 SRS 注册一门课程，或者有一位学生——很可能是研究生——被要求教授一门本科课程，我们该怎么办？为了准确地将这两种人中的任何一种表示为对象，我们需要能够将
    `Professor` 类的特征与 `Student` 类的特征结合起来——形成一个混合体 `ProfessorStudent`。这在我们的类层次结构中可能如图
    5-10 所示。


    ![](img/78624_3_En_5_Fig10_HTML.jpg)


    一个块状图，层次结构从下到上为：ProfessorStudent、Student、Professor、Person。


    图 5-10


    多重继承允许子类拥有多个直接超类


    表面上看，这似乎很方便。然而，多重继承本身存在许多复杂问题——实际上问题如此之多，以至于 Java 语言设计者选择不支持多重继承。相反，他们提供了一种替代机制来处理创建具有“分裂人格”的对象的需求：即一个对象可以表现得像两个或更多不同的现实世界实体。这种机制涉及**接口**的概念，将在第
    7 章中详细探讨。因此，如果你主要对与 Java 语言相关的对象概念感兴趣，可以跳过本节剩余部分。另一方面，如果你好奇为什么多重继承如此棘手，请继续阅读。


    前面例子中我们做的事情存在一个问题。我们之前讨论过，通过继承，子类会自动继承其超类的属性和方法。那么当我们有两个或更多直接超类时呢？如果这些超类在特征上没有重叠，那就没问题。但如果有问题的直接超类存在***冲突***的特征——例如，具有***相同***签名但***不同***代码体实现的
    `public` 方法，如下面的简单示例所示，该怎么办？


    我们从一个极其简单的 `Person` 类开始，它声明了一个属性和一个方法：


    ```

    public class Person {

    private String name;

    // 访问器方法细节省略。

    public String printDescription() {

    System.out.println(getName());

    // 例如 "John Doe"

    }

    }

    ```

