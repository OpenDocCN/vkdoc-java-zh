    \n2.  In order for `Course` object `c` to officially determine whether or not\
    \ `s` should be permitted to register, `c` sends the message\n\n```\n    s.successfullyCompleted(c2);\n\
    \    ```\n\nto `Student s`, where `c2` represents a reference to a ***different***\
    \ `Course` object that happens to be a prerequisite of `Course c`. (Don’t worry\
    \ about how `Course c` knows that `c2` is one of its prerequisites; this involves\
    \ interacting with `c`’s internal `prerequisites` attribute, which we haven’t\
    \ talked about yet. Also, `Course c2` isn’t depicted in Figure [4-2](#78624_3_En_4_Chapter.xhtml#Fig2)\
    \ because, strictly speaking, `c2` isn’t engaged in this “discussion” between\
    \ objects `c` and `s`. `c2` is being talked ***about***, but isn’t doing any talking\
    \ itself!)\n\n3.  `Student` object `s` replies to `c` with the value `true`, indicating\
    \ that `s` has successfully completed the prerequisite course. (We will for the\
    \ time being ignore the details as to how `s` determines this; it involves interacting\
    \ with `s`’s internal `transcript` attribute, which we haven’t covered the structure\
    \ of just yet.)\n\n4.  Convinced that the student has complied with the prerequisite\
    \ requirements for the course, `Course` object `c` finishes the job of registering\
    \ the student (internal details omitted for now) and confirms the registration\
    \ by responding with a value of `true` to the originator of the service request.\n\
    \nThis example was overly simplistic; in reality, `Course c` may have had to speak\
    \ to numerous other objects as well:\n\n*   A `Classroom` object (the room in\
    \ which the course is to be held, to make sure that it has sufficient room for\
    \ another student)\n\n*   A `DegreeProgram` object (the degree sought by the student,\
    \ to make sure that the requested course is indeed required for the degree that\
    \ the student is pursuing)\n\n*   And so forth—before sending a `true` response\
    \ to indicate that the request to register `Student s` has been fulfilled\n\n\
    We’ll see a slightly more complex version of this message exchange later in the\
    \ chapter.\n\n## Delegation\n\nIf a request is made of an object A and, in fulfilling\
    \ the request, A in turn requests assistance from another object B, this is known\
    \ as **delegation** by A to B. The concept of delegation among objects is exactly\
    \ the same as delegation between people in the real world: if your “significant\
    \ other” asks you to mow the lawn while they are out running errands and you in\
    \ turn hire a neighborhood teenager to mow the lawn, then, as far as your partner\
    \ is concerned, the lawn has been mowed. The fact that you delegated the activity\
    \ to someone else is (hopefully!) irrelevant.\n\nThe fact that delegation has\
    \ occurred between objects is often transparent to the initiator of a message,\
    \ as well. In our previous message passing example, `Course c` delegated part\
    \ of the work of registering `Student s` ***back to*** `s` when `c` asked `s`\
    \ to verify having taken a prerequisite course. However, from the perspective\
    \ of the originator of the registration request—`c.register(s);`—this seems like\
    \ a simple interaction: namely, the requestor asked c to register a student, and\
    \ it did so! All of the behind-the-scenes details of what c had to do to accomplish\
    \ this are hidden from the requestor (see Figure [4-3](#78624_3_En_4_Chapter.xhtml#Fig3)).\n\
    \n![](images/78624_3_En_4_Chapter/78624_3_En_4_Fig3_HTML.jpg)\n\nA block diagram\
    \ of an eye connects to the object c of a course via the command c dot register\
    \ that returns the feedback as true.\n\nFigure 4-3\n\nA requestor sees only the\
    \ external details of a message exchange"
  trans: "\n## 对象间的消息传递\n\n现在让我们看一个涉及两个对象的消息传递示例。假设我们定义了两个类——`Student`和`Course`——并且为每个类定义了以下方法。\n\
    \n*   对于`Student`类：\n\n```\n    boolean successfullyCompleted(Course c)\n    ```\n\
    \n给定一个指向特定`Course`对象的引用`c`，我们要求接收此消息的`Student`对象确认该学生确实已修读相关课程并获得了及格成绩。\n\n* \
    \  对于`Course`类：\n\n```\n    boolean register(Student s)\n    ```\n\n给定一个指向特定`Student`对象的引用`s`，我们要求接收此消息的`Course`对象执行注册该学生所需的任何操作。在这种情况下，我们期望`Course`最终返回`true`或`false`，以指示注册请求的成功或失败。\n\
    \n图 4-2 展示了一个`Course`对象`c`与`Student`对象`s`之间可能的消息交换过程；图中每个编号步骤都在后续文本中进行了说明。实线箭头表示正在传递的消息/正在调用的方法；虚线箭头表示从方法返回的值。\n\
    \n![](img/78624_3_En_4_Fig2_HTML.jpg)\n\n一个框图，展示了课程对象 c 与学生对象 s 之间通过命令 c 点 register\
    \ 和 s 点 successfullyCompleted 进行消息传递的循环，并返回反馈为 true。\n\n图 4-2\n\n`Student`与`Course`对象之间的消息传递\n\
    \n（在阅读步骤 1`–`4 时，请参考图 4-2。）\n\n1.  一个`Course`对象`c`接收到消息\n\n```\n    c.register(s);\n\
    \    ```\n\n其中`s`代表一个特定的`Student`对象。（目前，我们不必担心此消息的来源；它很可能是由用户与 SRS 图形界面的交互触发的。我们将在本章稍后的“对象作为客户端和供应方”一节中看到所有这些消息是如何发出的完整代码上下文。）\n\
    \n2.  为了让`Course`对象`c`正式确定是否应允许`s`注册，`c`向`Student s`发送消息\n\n```\n    s.successfullyCompleted(c2);\n\
    \    ```\n\n其中`c2`代表对另一个***不同***`Course`对象的引用，该对象恰好是`Course c`的先修课程。（不必担心`Course\
    \ c`如何知道`c2`是其先修课程之一；这涉及与`c`的内部`prerequisites`属性交互，我们尚未讨论该属性。另外，`Course c2`未在图\
    \ 4-2 中描绘，因为严格来说，`c2`并未参与对象`c`和`s`之间的这场“讨论”。`c2`是被***谈论***的对象，但本身并未进行任何对话！）\n\n\
    3.  `Student`对象`s`向`c`回复值`true`，表示`s`已成功完成先修课程。（我们暂时忽略`s`如何确定这一点的细节；这涉及与`s`的内部`transcript`属性交互，我们尚未介绍其结构。）\n\
    \n4.  确信该学生已满足课程的先修要求后，`Course`对象`c`完成注册学生的工作（内部细节暂时省略），并通过向服务请求的发起者响应值`true`来确认注册。\n\
    \n这个例子过于简单；实际上，`Course c`可能还需要与许多其他对象进行通信：\n\n*   一个`Classroom`对象（课程所在的教室，以确保有足够空间容纳另一名学生）\n\
    *   一个`DegreeProgram`对象（学生所追求的学位，以确保所请求的课程确实是该学生攻读学位所需的）\n*   等等——在发送`true`响应以指示注册`Student\
    \ s`的请求已完成之前\n\n我们将在本章稍后看到这个消息交换的一个稍微复杂的版本。\n\n## 委托\n\n如果向对象 A 发出请求，并且在完成该请求的过程中，A\
    \ 又向另一个对象 B 请求协助，这被称为 A 对 B 的**委托**。对象之间的委托概念与现实世界中人与人之间的委托完全相同：如果你的“另一半”让你在他们外出办事时修剪草坪，而你转而雇佣邻居家的青少年修剪草坪，那么，就你的伴侣而言，草坪已经修剪好了。你将活动委托给他人这一事实（希望是）无关紧要！\n\
    \n对象之间发生委托的事实通常对消息的发起者也是透明的。在我们之前的消息传递示例中，当`Course c`要求`s`验证是否已修读先修课程时，`c`将注册`Student\
    \ s`的部分工作***委托回***了`s`。然而，从注册请求的发起者——`c.register(s);`——的角度来看，这似乎是一个简单的交互：即，请求者要求\
    \ c 注册一名学生，而 c 确实做到了！c 为完成此操作所需的所有幕后细节对请求者都是隐藏的（见图 4-3）。\n\n![](img/78624_3_En_4_Fig3_HTML.jpg)\n\
    \n一个框图，一只眼睛通过命令 c 点 register 连接到课程对象 c，并返回反馈为 true。\n\n图 4-3\n\n请求者仅看到消息交换的外部细节\n"
- fmt: "# Obtaining Handles on Objects\n\nThe only way that an object A can pass a\
    \ message to an object B is if A has access to a reference to/handle on B. This\
    \ can happen in several different ways.\n\n- **Object A might maintain a reference\
    \ to B as one of A’s attributes**. For example, here’s the example from Chapter\
    \ [3](#78624_3_En_3_Chapter.xhtml) of a `Student` object having a `Professor`\
    \ reference as an attribute:\n\n```\npublic class Student {\n    // Attributes.\n\
    \    String name;\n    Professor facultyAdvisor;\n    // etc.\n}\n```\n\n(Again,\
    \ you’ll learn how to inform a `Student` object of **which** `Professor` object\
    \ is to serve as its `facultyAdvisor` a bit later in the chapter.)\n\nBy way of\
    \ analogy, this is like a person A “permanently” recording the phone number for\
    \ person B in their address book so that A can look up and call B whenever A needs\
    \ to interact with B.\n\n- **Object A may be handed a reference to B as an argument\
    \ of one of A’s methods**. This is how `Course` object `c` obtained access to\
    \ `Student` object `s` in the preceding message passing example, when `c`’s `register`\
    \ method was called:\n\n```\nc.register(s);\n```\n\nThis is analogous to person\
    \ A being handed a slip of paper with person B’s phone number on it, so that A\
    \ may call B.\n\n- **A reference to object B may be made “globally available”\
    \ to the entire application**, such that all other objects can access it. We’ll\
    \ discuss techniques for doing so later in the book and employ such techniques\
    \ in building the SRS.\n\nThis is analogous to advertising person B’s phone number\
    \ on a billboard for **anyone** to call!\n\n- **Object A may have to explicitly\
    \ request a handle on/reference to B by calling a method on some third object\
    \ C**. Since this is potentially the most complex way for A to obtain a handle\
    \ on B, we’ll illustrate this with an example.\n\nThis is analogous to person\
    \ A having to call person C to ask C for person B’s phone number.\n\nGoing back\
    \ to the example interaction between `Course` object `c` and `Student` object\
    \ `s` from a few pages ago, let’s complicate the interaction a bit:\n\n- First,\
    \ we’ll introduce a third object: a `Transcript` object `t`, which represents\
    \ a record of all courses taken by `Student` object `s`.\n\n- Furthermore, we’ll\
    \ assume that `Student s` maintains a handle on `Transcript t` as one of `s`’s\
    \ attributes (specifically, the `transcript` attribute) and, conversely, that\
    \ `Transcript t` maintains a handle on its “owner,” `Student s`, as one of `t`’s\
    \ attributes:\n\n```\npublic class Student {\n    // Attributes.\n    Transcript\
    \ transcript;\n    // etc.\n}\npublic class Transcript {\n    // Attributes.\n\
    \    Student owner;\n    // etc.\n}\n```\n\nFigure [4-4](#78624_3_En_4_Chapter.xhtml#Fig4)\
    \ reflects this more elaborate message interchange between `Course c`, `Student\
    \ s`, and `Transcript t`; each numbered step in the diagram is narrated in the\
    \ text that follows. Again, solid-line arrows represent messages being passed/methods\
    \ being invoked; dashed-line arrows represent values being returned from methods.\n\
    \n![](images/78624_3_En_4_Chapter/78624_3_En_4_Fig4_HTML.jpg)\n\nA block diagram\
    \ with a loop of the message transfer between object c of a course, object s of\
    \ a student, and object t of a transcript via the commands c dot register, s dot\
    \ get transcript, and t dot successful completion. It returns the feedback as\
    \ true with a reference to transcript t.\n\n**Figure 4-4** A more complex message\
    \ passing example involving three objects\n\n(Please refer back to Figure [4-4](#78624_3_En_4_Chapter.xhtml#Fig4)\
    \ when reading through steps 1–6.)\n\n1. In this enhanced object interaction,\
    \ the first step is exactly as previously described: namely, a `Course` object\
    \ `c` receives the message\n\n```\nc.register(s);\n```\n\nwhere `s` represents\
    \ a `Student` object.\n\n2. Now, instead of `Course c` sending the message `s.successfullyCompleted(c2)`\
    \ to `Student s` as before, where `c2` represents a prerequisite `Course`, `Course`\
    \ object `c` instead sends the message\n\n```\ns.getTranscript();\n```\n\nto the\
    \ `Student`, because `c` wants to check `s`’s transcript firsthand. This message\
    \ corresponds to a method on the `Student` class whose header is declared as follows:\n\
    \n```\nTranscript getTranscript()\n```\n\nNote that this method is defined to\
    \ return a `Transcript` object reference—specifically, a handle on the `Transcript`\
    \ object belonging to this student.\n\n3. Because `Student s` maintains a handle\
    \ on its `Transcript` object as an attribute, it’s a snap for `s` to respond to\
    \ this message by passing a handle on `t` back to `Course` object `c`.\n\n4. Now\
    \ that `Course c` has its **own** temporary handle on `Transcript t`, object `c`\
    \ can talk directly to `t`. Object `c` proceeds to ask `t` whether `t` has any\
    \ record of `c`’s prerequisite course `c2` having successfully been completed\
    \ by `Student s` by passing the message\n\n```\nt.successfulCompletion(c2);\n\
    ```\n\nThis implies that there is a method defined for the `Transcript` class\
    \ with the header\n\n```\nboolean successfulCompletion(Course c)\n```\n\n5. `Transcript`\
    \ object `t` responds with the value `true` to `Course c`, indicating that `Student\
    \ s` has indeed successfully completed the prerequisite course in question. (Note\
    \ that `Student s` is unaware that `c` is talking to `t`; `s` knows that it was\
    \ asked by `c` to return a handle on `t` in an earlier message, but `s` has no\
    \ insights as to **why** `c` asked for the handle.)\n\nThis is not unlike the\
    \ real-world situation in which person A asks person C for person B’s phone number,\
    \ without telling C **why** they want to call B.\n\n6. Satisfied that `Student\
    \ s` has complied with its prerequisite requirements, `Course` object `c` finishes\
    \ the job of registering the student (internal details omitted for now) and confirms\
    \ the registration by responding with a value of `true` to the originator of the\
    \ registration request that first arose in step 1. Now that `c` has finished with\
    \ this transaction, it discards its (temporary) handle on `t`.\n\nNote that, from\
    \ the perspective of whoever sent the original message\n\n```\nc.register(s);\n\
    ```\n\nto `Course c`, this more complicated interaction appears **identical**\
    \ to the earlier, simpler interaction, as shown in Figure [4-5](#78624_3_En_4_Chapter.xhtml#Fig5).\
    \ All the sender of the original message knows is that `Course c` eventually responded\
    \ with a value of `true` to the request.\n\n![](images/78624_3_En_4_Chapter/78624_3_En_4_Fig5_HTML.jpg)\n\
    \nA block diagram of an eye connects to the object c of a course via the command\
    \ c dot register that returns the feedback as true.\n\n**Figure 4-5** The external\
    \ details of this more complex interaction appear identical from the requestor’s\
    \ standpoint"
