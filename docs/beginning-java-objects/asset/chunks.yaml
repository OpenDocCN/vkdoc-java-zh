- fmt: '### Using the `this` Keyword to Facilitate Constructor Reuse


    Earlier in this chapter, we covered the `this` keyword and illustrated how it
    can be used to optionally qualify features of a class when accessed from within
    methods of the same class, as in


    ```

    public class Student {

    // Details omitted.

    public void printAllAttributes() {

    System.out.println("Name:  " + this.getName());

    System.out.println("Student ID:  " + this.getSsn());

    // etc.

    }

    }

    ```


    We’re now going to explore a second alternative use of the `this` keyword, related
    to reusing code from one constructor by another within the same class.


    It’s conceivable that if we’ve overloaded the constructor for a class, there will
    be some common initialization steps required of all versions. For example, let’s
    say that, for all new students, we must


    * Alert the registrar’s office of this student’s existence.

    * Create a transcript for this student.


    If we were to declare three constructors for the `Student` class, it would be
    tedious to duplicate the same logic across all three (see the bolded lines of
    code):


    ```

    public class Student {

    // Attribute details omitted.

    // Constructor #1.

    public Student() {

    // Assign default values to selected attributes ... details omitted.

    // Pseudocode.

    alert the registrar''s office of this student''s existence

    // Create a transcript for this student.

    transcript = new Transcript();

    }

    // Constructor #2.

    public Student(String s) {

    this.setSsn(s);

    // This code is duplicated from above!

    // Pseudocode.

    alert the registrar''s office of this student''s existence

    // Create a transcript for this student.

    transcript = new Transcript();

    // end of code duplication

    }

    // Constructor #3.

    public Student(String s, String n, int i) {

    this.setSsn(s);

    this.setName(n);

    this.setAge(i);

    // DUPLICATION YET AGAIN!!!

    // Pseudocode.

    alert the registrar''s office of this student''s existence

    // Create a transcript for this student.

    transcript = new Transcript();

    // end of code duplication

    }

    // etc.

    }

    ```


    Worse yet, if the logic needed to change, we’d have to change it in all three
    constructors. Fortunately, the `this` keyword comes to our rescue. From within
    any constructor of a class X, we can invoke any other constructor of the same
    class X via the following syntax:


    ```

    this(argument signature);

    ```


    Let’s rewrite our previous three `Student` constructors so that constructor #2
    takes advantage of the logic of #1 and #3 takes advantage of #2:


    ```

    public class Student {

    // Attribute details omitted.

    // Constructor #1.

    public Student() {

    // Assign default values to selected attributes ... details omitted.

    // Do the things common to all three constructors in this first

    // constructor.

    // Pseudocode.

    alert the registrar''s office of this student''s existence

    // Create a transcript for this student.

    transcript = new Transcript();

    }

    // Constructor #2.

    public Student(String s) {

    // REUSE the code of the first constructor within the second!

    this();  // invoking the parameterless constructor

    // Then, do whatever else extra is necessary for constructor #2.

    this.setSsn(s);

    }

    // Constructor #3.

    public Student(String s, String n, int i) {

    // REUSE the code of the second constructor within the third!

    this(s);  // Invoking the constructor with one String argument

    // Then, do whatever else extra is necessary for constructor #3.

    this.setName(n);

    this.setAge(i);

    }

    // etc.

    }

    ```


    By invoking `this();` from within constructor #2 and `this(s);` from within constructor
    #3, we were able to eliminate all duplication of code.


    When using the `this(...);` syntax to reuse code from one constructor to another,
    note that the statement must be the ***first*** statement in the constructor;
    that is, the following code will not compile:


    ```

    // Constructor #3.

    public Student(String s, String n, int i) {

    // Do whatever extra is necessary for constructor #3;

    // details omitted.

    ...

    // Then, attempt to reuse the code of constructor #2;

    // THIS NEXT LINE WON''T COMPILE!

    this(s);

    }

    ```


    Here’s the error:


    ```

    call to this must be first statement in constructor

    this(s);

    ^

    ```


    We’ll revisit the `this` keyword yet again in Chapter [13](#78624_3_En_13_Chapter.xhtml),
    to discuss a third context in which it can be used.'
