  trans: '

    关键在于，决定哪些关联需要包含、哪些可以视为从其他关联推导而消除，类似于你在浏览器中决定为哪些网页创建书签：你会为频繁访问的页面添加书签，而对于偶尔需要访问的页面，则手动输入完整网址，或者通过***链***接导航。对象关联也是如此：决定在代码中实现哪些关联，取决于你打算在应用程序中最频繁使用哪些“通信路径”。当我们进入第
    11 章对对象***行为***进行建模时，你会对这些通信模式有更清晰的认识。


    ## “混合与匹配”关系符号


    我们可以通过相当复杂的方式将各种关系类型交织在一起。为了理解这一点，让我们研究图 10-48 中的模型，看看它告诉我们什么。


    ![](img/78624_3_En_10_Fig48_HTML.jpg)


    模型图表示学生和教授共同属于“人”这一类别，而“人”与“系”相关联。“学校”由“系”组成，“大学”由“学校”组成。


    图 10-48


    一个 UML 模型示例


    首先，我们看到一些熟悉的聚合和继承用法：


    *   图左上角的聚合用法——一个两层聚合——传达了以下事实：一个`大学`由一个或多个`学院`组成，一个`学院`由一个或多个`系`组成，但任何一个`系`只与一个`学院`关联，任何一个`学院`只与一个`大学`关联。


    *   图右下角的继承用法表明`人`是`学生`和`教授`的共同基类。换句话说，`学生` *是一种* `人`，`教授` *是一种* `人`。


    我们观察到的第一个“有趣”的符号用法是，关联可用于连接聚合中不同层级的类，例如使用 *funds R&D（研发资助）* 关联来连接`大学`和`系`这两个类。这表明`大学`为一个或多个`系`提供研发资金，但一个***特定***的`系`可能获得也可能不获得研发资助。


    接下来，我们注意到使用 *employs* 关联来连接`系`和`人`这两个类，表明一个`系` *雇佣* 一个或多个`人`，但一个特定的`人` *可能只为*
    一个`系`工作——如果该`人`确实为***任何***`系`工作的话。


    由于`人`是`学生`和`教授`这两个子类的超类，那么根据“is a”关系，任何关于`人`的陈述也必须适用于其派生类。因此：


    *   ***基类参与的关联/聚合会被其派生类继承。***（这很合理，因为我们现在知道关联被实现为引用变量属性。）因此，一个特定的`学生`可能选择性地*为*一个`系`工作（例如作为助教），一个特定的`教授`也可能选择性地*为*一个`系`工作，因为`学生`和`教授`都派生自`人`。


    *   此外，由于我们可以（通过聚合关系）推断出一个特定的`系`属于哪个`学院`和`大学`，那么一个`人`*为*某个`系`工作这一事实也隐含了该`人`*为*哪个`学院`和`大学`工作。


    最后，我们注意到关联可用于连接继承层次结构中不同层级的类，例如使用 *mentors* 关联来连接`人`和`教授`这两个类。这里，我们表明一个`教授`可以选择性地*指导*许多`人`——`学生`和/或`教授`——反之，一个`人`——无论是`学生`还是`教授`——可以被多个`教授`（具体而言）指导。我们将最靠近`教授`类的关联线端点标记为角色“导师”，以强调`教授`在`大学`中是导师，但一般的`人`（即`学生`）则不是。


    如果我们想反映***学生***和***教授***都可以担任导师这一事实呢？我们可以在`人`类上使用一个自反关联，如图 10-49 所示，由于继承关系，这实际上隐含了四种关系可能性：


    ![](img/78624_3_En_10_Fig49_HTML.png)


    一个框图表示学生和教授共同指向人。标记为“人”的方框表示导师。


    图 10-49


    隐含的各种可能的“指导”关联


    *   `教授`指导`学生`

    *   `教授`指导另一位`教授`

    *   `学生`指导另一位`学生`

    *   `学生`指导`教授`（这种情况不太可能）


    如果我们想反映只有前三种情况是可能的，我们就必须采用图 10-50 中所示的更复杂的版本，其中三个感兴趣的关系都表示为独立的关联线（两个自反关联，一个二元关联）。


    ![](img/78624_3_En_10_Fig50_HTML.jpg)


    一个框图表示学生和教授共同指向人。标记为“学生”和“教授”的方框表示导师。


    图 10-50


    明确指定的具体导师关联


    尽管修改图表以反映我们对模型理解的这些细化之处已经相当繁琐，但一旦应用程序编码完成后再去修改软件，其痛苦程度将高出几个数量级。

    '
- fmt: '# Association Classes


    We sometimes find ourselves in a situation where we identify an attribute that
    is critical to our model, but which doesn’t seem to fit nicely into any one class.
    As an example, let’s revisit the (many-to-many) association “a `Student` *attends*
    a `Section`,” as shown in Figure [10-51](#78624_3_En_10_Chapter.xhtml#Fig51).
    (Note that we’re using the “generic” ***many*** multiplicity symbol this time,
    a single asterisk (`*`), at each end of the association line.)


    ![](images/78624_3_En_10_Chapter/78624_3_En_10_Fig51_HTML.jpg)


    Two blocks labeled student and section are connected through a line. A text at
    the top of the line explains the student attends section.


    Figure 10-51


    A many-to-many association between `Student` and `Section`


    At the end of every semester, a student receives a letter grade for every section
    that they attended during that semester. We decide that the grade should be represented
    as a `String` attribute (e.g., “A-”, “C+”). However, where does the “grade” attribute
    belong?


    - It’s not an attribute of the `Student` class, because a student doesn’t get
    a single overall grade for all of their coursework, but rather an individual grade
    for each section attended.

    - It’s not an attribute of the `Section` class, either, because not all students
    attending a section typically receive the same letter grade.


    If we think about this situation for a moment, we realize that the grade is actually
    an attribute of the ***pairing*** of a given `Student` object with a given `Section`;
    that is, it’s an attribute of the ***link*** that exists between these two objects.


    With UML, we create a separate class, known as an **association class**, to house
    attribute(s) belonging to the link between objects and attach it with a ***dashed***
    line to the association line, as shown in Figure [10-52](#78624_3_En_10_Chapter.xhtml#Fig52).


    Because association classes represent attributes of a link between two objects,
    these are sometimes informally referred to as “**link attributes**.”


    ![](images/78624_3_En_10_Chapter/78624_3_En_10_Fig52_HTML.jpg)


    A block diagram represents 2 blocks labeled student and section connected together.
    Another block at the bottom denotes the grade received, where the datatype of
    the grade is the string.


    Figure 10-52


    Placing an association class on a many-to-many association


    Any time you see an association class in a class diagram, realize that there is
    an alternative equivalent way to represent the same situation ***without*** using
    an association class:


    - In the case of a ***many-to-many association*** involving an association class,
    we can split the many-to-many association into two one-to-many associations, inserting
    what was formerly the association class as a “standard” class between the other
    two classes. Doing this for the preceding *attends* association, we wind up with
    the alternative equivalent representation in Figure [10-53](#78624_3_En_10_Chapter.xhtml#Fig53).


    One important point to note is that the “many” ends of these two new associations
    reside with the newly inserted class, because a `Student` *receives* many `Grade`s
    and a `Section` *issues* many `Grade`s.


    ![](images/78624_3_En_10_Chapter/78624_3_En_10_Fig53_HTML.jpg)


    A block diagram explains a student receives a grade, and the section issues a
    grade. The data type of grade is String. It also denotes the student attends section.


    Figure 10-53


    An alternative representation for Figure [10-52](#78624_3_En_10_Chapter.xhtml#Fig52)


    ![](images/78624_3_En_10_Chapter/78624_3_En_10_Fig55_HTML.jpg)


    A block diagram represents 2 blocks on the left denoting professor and salary.
    The professor points toward a block on the right denoting department, which explains
    the professor works for the department.


    Figure 10-55


    An alternative representation for Figure [10-54](#78624_3_En_10_Chapter.xhtml#Fig54)


    ![](images/78624_3_En_10_Chapter/78624_3_En_10_Fig54_HTML.jpg)


    A block diagram represents the connection between 3 blocks labeled professor,
    department, and salary. It explains the professor works for a department and receives
    a salary. The data type of salary is Double.


    Figure 10-54


    Placing an association class on a one-to-many association


    - If we happen to have an association class for a ***one-to-many association***,
    as in the *works for* association between `Professor` and `Department` in Figure
    [10-54](#78624_3_En_10_Chapter.xhtml#Fig54), then the association class’s attribute(s)
    can, in theory, be “folded into” the class at the “many” end of the association
    instead, and we can do away with the association class completely as shown in
    Figure [10-55](#78624_3_En_10_Chapter.xhtml#Fig55).

    - With a ***one-to-one association***, we can fold the association class’s attributes
    into ***either*** of the two classes.


    That being said, this practice of folding association class attributes into one
    end of a one-to-many or one-to-one association is discouraged, however, because
    it reduces the amount of information communicated by the model. In the preceding
    example, the only reason that a `Professor` has a `salary` attribute is because
    he or she *works for* a `Department`; knowledge of this “cause-and-effect” connection
    between employment and salary is lost if the association class is eliminated as
    such from the model.


    Note that association classes may themselves participate in relationships with
    other classes. The diagram in Figure [10-56](#78624_3_En_10_Chapter.xhtml#Fig56),
    for example, shows the association class `Role` participating in a one-to-many
    association with the class `USPresident`; an example illustrating this model would
    be “Film Star Anthony Hopkins starred in the movie *Nixon* in the role of Richard
    M. Nixon, thus portraying the ***real*** former U.S. President Richard M. Nixon.”


    ![](images/78624_3_En_10_Chapter/78624_3_En_10_Fig56_HTML.jpg)


    A block diagram explains film star stars in a film. The film star receives a role
    that portrays the U S president. The data type for the role name is String.


    Figure 10-56


    Association classes themselves can participate in associations with other classes'
