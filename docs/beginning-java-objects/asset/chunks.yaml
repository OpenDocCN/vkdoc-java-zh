- fmt: "为什么我们会在一个`catch`子句就足够的情况下，费心去使用***三个***`catch`子句？因为我们捕获的异常越具体，我们的恢复代码就可以越具体：\n\
    \n```java\ntry {\n    // 伪代码。\n    // 可能抛出多种异常（包括 DataTruncation 异常）的数据库访问操作...\n\
    }\ncatch (DataTruncation e1) {\n    // 伪代码。\n    // 专门响应数据截断问题...\n}\ncatch (SQLWarning\
    \ e2) { ... }\ncatch (SQLException e3) { ... }\n```\n\n下面的替代版本是***不***合适的，因为这三个`catch`子句是按从最不具体到最具体的顺序列出的；因此，***第一个***`catch`子句总是会捕获所有形式的`SQLException`，而后两个`catch`子句将永远不会被执行到：\n\
    \n```java\ntry {\n    // 伪代码。\n    // 数据库访问操作...\n}\ncatch (SQLException e1) {\n\
    \    // 这个 catch 子句会捕获任何/所有的 SQLException，\n    // 包括 SQLWarning 和 DataTruncation\
    \ ... 细节省略。\n}\ncatch (SQLWarning e2) {\n    // 这个 catch 子句是浪费的——它永远无法被执行到！\n\
    }\ncatch (DataTruncation e3) {\n    // 这个 catch 子句也是浪费的——它永远无法被执行到！\n}\n```\n\n\
    ### 捕获通用异常类型\n\n一些程序员使用“懒惰”的方法，捕获最通用的`Exception`类型，然后***什么也不做***来恢复，仅仅是为了让编译器闭嘴：\n\
    \n```java\ntry {\n    // 伪代码。\n    // 做任何事情！！！\n}\ncatch (Exception e) { } //\
    \ 空花括号 => 不做任何恢复操作！！！\n```\n\n***这不是一个好习惯！*** 这样做，我们掩盖了异常已经发生的事实：我们的程序可能处于严重的功能失调状态，也许正在嘎然而止（！），但会保持***沉默***，不说明原因，因为前面展示的`catch`子句抑制了通常会显示的典型堆栈跟踪。\n\
    \n这并不是说我们永远不应该捕获通用的`Exception`；我们可能希望这样做的一个合理情况是，当我们正在为应用程序编写一个特殊用途的错误处理子系统时，如下面的伪代码所示：\n\
    \n```java\npublic class Example {\n    public static void main(String[] args)\
    \ {\n        try {\n            // 伪代码。\n            // 我们所有的应用程序主逻辑都在这里...\n\
    \        }\n        catch (Exception e) {\n            // 在我们编写的自定义 MyExceptionHandler\
    \ 类上调用一个静态方法。\n            MyExceptionHandler.handleException(e);\n        }\n\
    \    }\n}\n```\n\n这里我们假设，我们开发的自定义`MyExceptionHandler`类的静态`handleException`方法封装了以集中、一致的方式处理应用程序中生成的所有异常的逻辑（例如，通过将它们记录在应用程序日志文件中，或实时向系统管理员发出问题警报）。\n\
    \n### 编译器对异常处理的强制\n\n一般来说，Java 编译器会强制我们将可能抛出异常的代码包含在一个带有适当`catch`子句的`try`块中。例如，如果我们尝试从文件中读取数据（正如我们将在第[15]章中实际做的那样）：\n\
    \n```java\npublic class FileIOExample {\n    public static void main(String[]\
    \ args) {\n        // 伪代码。\n        // 打开感兴趣的文件；\n        // while (尚未到达文件末尾)\
    \ {\n        //     从文件读取下一行；\n        //     // 等等。\n        // }\n    }\n}\n\
    ```\n\n我们会得到编译器错误，抱怨我们打开文件、从文件读取等尝试必须被处理：\n\n```\nUnreported exception java.io.FileNotFoundException;\
    \ must be caught or\ndeclared to be thrown\n```\n\n在这种情况下，我们有两个选择：\n\n*   理想情况下，我们将有问题的代码包含在一个带有适当`catch`子句的`try`块中：\n\
    \n```java\nimport java.io.FileNotFoundException;\npublic class FileIOExample {\n\
    \    public static void main(String[] args) {\n        try {\n            // 伪代码。\n\
    \            // 打开感兴趣的文件；\n            // while (尚未到达文件末尾) {\n            // \
    \    从文件读取下一行；\n            //     // 等等。\n            // }\n        }\n     \
    \   catch (FileNotFoundException e) { ... }\n        // 等等。\n    }\n}\n```\n\n\
