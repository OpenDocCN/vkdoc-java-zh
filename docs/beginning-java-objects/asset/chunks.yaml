- fmt: '# `postGrade()`


    `postGrade`方法用于为学生分配成绩，通过创建`TranscriptEntry`对象来将此`Section`与正在分配成绩的`Student`关联起来。


    我们首先验证要分配给`Student s`（`s`和`grade`都作为参数传递给`postGrade`方法）的成绩格式是否正确，方法是调用`TranscriptEntry`类定义的静态工具方法`validateGrade`。管理“有效”成绩表示的业务规则都封装在该方法中；这些业务规则将在本章后面探索`TranscriptEntry`类时揭示。目前，我们只需要知道，如果`validateGrade`方法通过返回`false`拒绝提议的成绩，我们就退出`postGrade`方法，向客户端代码返回`false`，表示为学生`s`发布成绩的请求已被拒绝：


    ```

    public boolean postGrade(Student s, String grade) {

    // First, validate that the grade is properly formed by calling

    // a utility method provided by the TranscriptEntry class.

    if (!TranscriptEntry.validateGrade(grade)) return false;

    ```


    接下来，为了确保我们不会无意中尝试为某个`Student`多次分配成绩，我们首先检查`assignedGrades HashMap`是否已包含该学生的条目。如果对`HashMap`的`get`方法调用返回非`null`值，则说明已为该`Student`发布了成绩，我们终止方法执行，再次返回`false`：


    ```

    // Make sure that we haven''t previously assigned a

    // grade to this Student by looking in the HashMap

    // for an entry using this Student as the key.  If

    // we discover that a grade has already been assigned,

    // we return a value of false to indicate that

    // we are at risk of overwriting an existing grade.

    // (A different method, eraseGrade(), can then be written

    // to allow a Professor to change his/her mind.)

    if (assignedGrades.get(s) != null) return false;

    ```


    假设之前没有分配成绩，我们调用适当的构造函数创建一个新的`TranscriptEntry`对象。当你研究`TranscriptEntry`类的内部工作原理时，你会看到该对象将维护对已分配成绩的`Student`和分配成绩的`Section`的引用：


    ```

    // First, we create a new TranscriptEntry object.  Note

    // that we are passing in a reference to THIS Section,

    // because we want the TranscriptEntry object,

    // as an association class ..., to maintain

    // "handles" on the Section as well as on the Student.

    // (We''ll let the TranscriptEntry constructor take care of

    // linking this T.E. to the correct Transcript.)

    TranscriptEntry te = new TranscriptEntry(s, grade, this);

    ```


    为了使后一个链接成为双向的，我们还将`TranscriptEntry`对象的引用存储在`Section`的`assignedGrades HashMap`中：


    ```

    // Then, we "remember" this grade because we wish for

    // the connection between a T.E. and a Section to be

    // bidirectional.

    assignedGrades.put(s, te);

    return true;

    }

    ```


    # `getGrade()`


    `getGrade`方法使用作为参数传递给此方法的`Student`引用作为`assignedGrades HashMap`的查找键，以检索为该`Student`存储的`TranscriptEntry`：


    ```

    public String getGrade(Student s) {

    String grade = null;

    // Retrieve the associated TranscriptEntry object for this specific

    // student from the assignedGrades HashMap, if one exists, and in turn

    // retrieve its assigned grade.

    TranscriptEntry te = assignedGrades.get(s);

    ```


    如果找到了`TranscriptEntry`，我们使用它的`getGrade`方法检索实际成绩（作为`String`值），以便此方法返回：


    ```

    if (te != null) {

    grade = te.getGrade();

    }

    ```


    否则，我们返回`null`值，表示尚未为感兴趣的`Student`分配成绩：


    ```

    // If we found no TranscriptEntry for this Student, a null value

    // will be returned to signal this.

    return grade;

    }

    ```


    # `confirmSeatAvailability()`


    从`enroll`内部调用的`confirmSeatAvailability`方法是一个内部的“内务管理”方法。通过将其声明为`private`而非`public`可见性，我们限制其使用，以便只有`Section`类的其他方法才能调用它：


    ```

    private boolean confirmSeatAvailability() {

    if (enrolledStudents.size() < this.getSeatingCapacity()) return true;

    else return false;

    }

    ```'
  raw: '#### postGrade( )


    The `postGrade` method is used to assign a grade to a `Student` by creating a
    `TranscriptEntry` object to link this `Section` to the `Student` being assigned
    a grade.


    We begin by validating that the proposed `grade` to be assigned to `Student s`
    (both `s` and `grade` are passed in as arguments to the `postGrade` method) is
    properly formed by calling a `static` utility method, `validateGrade`, that is
    defined by the `TranscriptEntry` class. The business rules that govern what constitutes
    a “valid” grade representation are encoded within that method; these business
    rules will be revealed when we explore the `TranscriptEntry` class later in this
    chapter. For the time being, all we need know is that, if the `validateGrade`
    method rejects the proposed grade by returning a value of `false`, we in turn
    exit the `postGrade` method, returning a value of `false` to client code to indicate
    that the request to post a grade for `Student s` has been rejected:


    ```

    public boolean postGrade(Student s, String grade) {

    // First, validate that the grade is properly formed by calling

    // a utility method provided by the TranscriptEntry class.

    if (!TranscriptEntry.validateGrade(grade)) return false;

    ```


    Next, to ensure that we aren’t inadvertently trying to assign a grade to a particular
    `Student` more than once, we first check the `assignedGrades HashMap` to see if
    it already contains an entry for this `Student`. If the `get` method call on the
    `HashMap` returns anything but `null`, then we know a grade has already been posted
    for this `Student`, and we terminate execution of the method, once again returning
    a value of `false`:


    ```

    // Make sure that we haven''t previously assigned a

    // grade to this Student by looking in the HashMap

    // for an entry using this Student as the key.  If

    // we discover that a grade has already been assigned,

    // we return a value of false to indicate that

    // we are at risk of overwriting an existing grade.

    // (A different method, eraseGrade(), can then be written

    // to allow a Professor to change his/her mind.)

    if (assignedGrades.get(s) != null) return false;

    ```


    Assuming that a grade was not previously assigned, we invoke the appropriate constructor
    to create a new `TranscriptEntry` object. As you will see when we study the inner
    workings of the `TranscriptEntry` class, this object will maintain handles on
    both the `Student` to whom a grade has been assigned and the `Section` for which
    the grade was assigned:


    ```

    // First, we create a new TranscriptEntry object.  Note

    // that we are passing in a reference to THIS Section,

    // because we want the TranscriptEntry object,

    // as an association class ..., to maintain

    // "handles" on the Section as well as on the Student.

    // (We''ll let the TranscriptEntry constructor take care of

    // linking this T.E. to the correct Transcript.)

    TranscriptEntry te = new TranscriptEntry(s, grade, this);

    ```


    To enable this latter link to be bidirectional, we also store a handle on the
    `TranscriptEntry` object in the `Section`’s `assignedGrades HashMap` for this
    purpose:


    ```

    // Then, we "remember" this grade because we wish for

    // the connection between a T.E. and a Section to be

    // bidirectional.

    assignedGrades.put(s, te);

    return true;

    }

    ```


    #### getGrade( )


    The `getGrade` method uses the `Student` reference passed in as an argument to
    this method as a lookup key for the `assignedGrades HashMap`, to retrieve the
    `TranscriptEntry` stored therein for this `Student`:


    ```

    public String getGrade(Student s) {

    String grade = null;

    // Retrieve the associated TranscriptEntry object for this specific

    // student from the assignedGrades HashMap, if one exists, and in turn

    // retrieve its assigned grade.

    TranscriptEntry te = assignedGrades.get(s);

    ```


    If a `TranscriptEntry` is found, we use its `getGrade` method to retrieve the
    actual grade (as a `String` value) so that it may be returned by this method:


    ```

    if (te != null) {

    grade = te.getGrade();

    }

    ```


    Otherwise, we return a value of `null` to signal that no grade has yet been assigned
    for the `Student` of interest:


    ```

    // If we found no TranscriptEntry for this Student, a null value

    // will be returned to signal this.

    return grade;

    }

    ```


    #### confirmSeatAvailability( )


    The `confirmSeatAvailability` method called from within `enroll` is an internal
    “housekeeping” method. By declaring it to have `private` vs. `public` visibility,
    we restrict its use so that only other methods of the `Section` class may invoke
    it:


    ```

    private boolean confirmSeatAvailability() {

    if (enrolledStudents.size() < this.getSeatingCapacity()) return true;

    else return false;

    }

    ```'
