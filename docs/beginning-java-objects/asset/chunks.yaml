- fmt: '#### Course Attributes


    Referring back to the SRS class diagram, we see that `Course` has three simple
    attributes and participates in two associations:


    - `offeredAs`, a one-to-many association with the `Section` class

    - `prerequisite`, a many-to-many reflexive association


    for a total of five attributes:


    ```

    //------------

    // Attributes.

    //------------

    private String courseNo;

    private String courseName;

    private double credits;

    private ArrayList offeredAsSection;

    private ArrayList prerequisites;

    ```


    Note that a reflexive association is handled in exactly the same way that any
    other association is handled—that is, we’ve provided the `Course` class with an
    `ArrayList` attribute called `prerequisites` that enables a given `Course` object
    to maintain handles on other `Course` objects.


    We have chosen not to encode this reflexive association bidirectionally. That
    is, a given `Course` object X will know which other `Course` objects A, B, C,
    etc. serve as its prerequisites, but it will not know which `Course` objects L,
    M, N, etc. consider X to be one of their prerequisites, as illustrated in Figure
    [14-6](#78624_3_En_14_Chapter.xhtml#Fig6).


    ![](images/78624_3_En_14_Chapter/78624_3_En_14_Fig6_HTML.jpg)


    A diagram has 3 course objects L, M, and N connected to course object X. It leads
    to course objects A, B, and C. The text below reads, course object X maintains
    handles on its prerequisite courses, but it is unaware of which courses consider
    X to be a prerequisite of theirs.


    **Figure 14-6** The reflexive `prerequisite` association is not implemented bidirectionally


    Our rationale for implementing this association unidirectionally is as follows.
    A given `Course` X has reason to know which courses are its prerequisites, so
    that when a `Student` S attempts to enroll in X, X can inquire of S whether S
    has completed all such prerequisites. X doesn’t need to know about courses that
    require X as a prerequisite—it’s up to those courses to worry about X!


    Had we wanted this association to be bidirectional, we would have had to include
    a second `ArrayList` of `Course` references as an attribute in the `Course` class,
    as shown in bold:


    ```

    //------------

    // Attributes.

    //------------

    private String courseNo;

    private String courseName;

    private double credits;

    private ArrayList offeredAsSection;

    private ArrayList prerequisites;

    private ArrayList prerequisiteOf;

    ```


    so that `Course` object X could hold on to this latter group of `Course` objects
    separately.


    #### Course Methods


    Most of the `Course` methods use techniques that should already be familiar to
    you, based on our discussions of the `Person`, `Professor`, and `Student` classes.
    I’ll highlight a few of the more interesting `Course` methods here and leave it
    for you as an exercise to review the rest.


    #### `hasPrerequisites()`


    This method inspects the size of the `prerequisites ArrayList` to determine whether
    or not a given `Course` has any prerequisite `Courses`:


    ```

    public boolean hasPrerequisites() {

    if (prerequisites.size() > 0) return true;

    else return false;

    }

    ```


    #### `getPrerequisites()`


    This method returns a reference to the `prerequisites ArrayList` as a generic
    `Collection` reference, hiding the true identity of the type of collection that
    we’ve encapsulated:


    ```

    public Collection getPrerequisites() {

    return prerequisites;

    }

    ```


    We see this method in use within the `Course display` method, and we’ll also see
    it in use by the `Section` class a bit later on.


    #### `scheduleSection()`


    This method illustrates several interesting techniques:


    ```

    public Section scheduleSection(char day, String time, String room,

    int capacity) {

    // Create a new Section (note the creative way in

    // which we are assigning a section number) ...

    Section s = new Section(offeredAsSection.size() + 1,

    day, time, this, room, capacity);

    // ... and then remember it!

    this.addSection(s);

    return s;

    }

    ```


    First, note that this method invokes the `Section` class constructor to instantiate
    a new `Section` object, `s`, storing one handle on this `Section` object in the
    `offeredAsSection ArrayList` before returning a second handle on the object to
    client code.


    Second, we are generating the first argument to the `Section` constructor—representing
    the section number—as a “one-up” number by adding 1 to the size of the `offeredAsSection
    ArrayList`. The first time that we invoke the `scheduleSection` method for a given
    `Course` object, the `ArrayList` will be empty, and so the expression


    ```

    offeredAsSection.size() + 1

    ```


    will evaluate to 1, and hence we’ll be creating `Section` number 1. The second
    time that this method is invoked for the same `Course` object, the `ArrayList`
    will already contain a handle on the first `Section` object that was created,
    so the expression


    ```

    offeredAsSection.size() + 1

    ```


    will evaluate to 2, and hence we’ll be creating `Section` number 2, and so forth.


    There is, however, a flaw with this approach: if we were to create, and then delete,
    `Section` objects, the size of the `ArrayList` would expand and contract, and
    we could wind up with duplicate `Section` numbers.


    Now, let’s turn our attention to the `Section` class.


