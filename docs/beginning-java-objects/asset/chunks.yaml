- fmt: '### Organizing Abstractions into Classification Hierarchies


    Even though our brains are adept at abstracting concepts such as road maps and
    landscapes, that still leaves us with millions of separate abstractions to deal
    with over our lifetimes. To cope with this aspect of complexity, human beings
    systematically arrange information into categories according to established criteria;
    this process is known as **classification**.


    For example, science categorizes all natural objects as belonging to either the
    animal, plant, or mineral kingdom. In order for a natural object to be classified
    as an animal, it must satisfy the following rules:


    - It must be (or have at one time been) a living being.

    - It must be capable of spontaneous movement.

    - It must be capable of rapid motor response to stimulation.


    The rules for what constitutes a plant, on the other hand, are different:


    - It must be a living being (same as for an animal).

    - It must lack an obvious nervous system.

    - It must possess cellulose cell walls.


    Given clear-cut rules such as these, placing an object into the appropriate category,
    or **class**, is rather straightforward. We can then “drill down,” specifying
    additional rules that differentiate various types of animal, for example, until
    we’ve built up a hierarchy of increasingly more complex abstractions from top
    to bottom. A simple example of such an **abstraction hierarchy** is shown in Figure
    [1-2](#78624_3_En_1_Chapter.xhtml#Fig2).


    ![](images/78624_3_En_1_Chapter/78624_3_En_1_Fig2_HTML.jpg)


    A chart of natural objects. The natural objects are divided into three groups:
    Plant, Animal, and Mineral. The animal is divided into bird, fish, mammal, reptile,
    and so on. Mammal is divided into Dog, Cow, and Monkey.


    **Figure 1-2** A simple abstraction hierarchy of natural objects


    When thinking about an abstraction hierarchy such as the one shown in Figure [1-2](#78624_3_En_1_Chapter.xhtml#Fig2),
    we mentally step up and down the hierarchy, automatically zeroing in on only the
    single layer or subset of the hierarchy (known as a **subtree**) that is important
    to us at a given point in time. For example, we may only be concerned with mammals
    and so can focus on the mammalian subtree, shown in Figure [1-3](#78624_3_En_1_Chapter.xhtml#Fig3),
    temporarily ignoring the rest of the hierarchy.


    ![](images/78624_3_En_1_Chapter/78624_3_En_1_Fig3_HTML.png)


    A chart of the mammal subset. Mammal is divided into Dog, Cow, and Monkey.


    **Figure 1-3** Focusing on a small subset of the hierarchy is less overwhelming


    By doing so, we automatically reduce the number of concepts that we mentally need
    to juggle at any one time to a manageable subset of the overall abstraction hierarchy;
    in our simplistic example, we’re now dealing with only four concepts rather than
    the original 13. No matter how complex an abstraction hierarchy grows to be, it
    needn’t overwhelm us if it’s properly organized.


    Coming up with precisely which rules are necessary to properly classify an object
    within an abstraction hierarchy isn’t always easy. Take, for example, the rules
    we might define for what constitutes a bird: namely, something that


    - Has feathers

    - Has wings

    - Lays eggs

    - Is capable of flying


    Given these rules, neither an ostrich nor a penguin could be classified as a bird
    (although both should be), because neither can fly (see Figure [1-4](#78624_3_En_1_Chapter.xhtml#Fig4)).


    ![](images/78624_3_En_1_Chapter/78624_3_En_1_Fig4_HTML.jpg)


    A chart with two columns: birds and non-birds. The birds'' column consists of
    birds such as a parrot and a sparrow. The non-birds'' column consists of an ostrich,
    a penguin, and an ice cream cone.


    **Figure 1-4** Deriving the correct classification rules can be difficult


    If we attempt to make the rule set less restrictive by eliminating the “is capable
    of flying” rule, we’re left with


    - Has feathers

    - Has wings

    - Lays eggs


    According to this rule set, we now may properly classify both the ostrich and
    the penguin as birds, as shown in Figure [1-5](#78624_3_En_1_Chapter.xhtml#Fig5).


    ![](images/78624_3_En_1_Chapter/78624_3_En_1_Fig5_HTML.jpg)


    A chart of two columns: birds and non-birds. The birds'' column consists of birds
    such as a parrot, an ostrich, a penguin, and a sparrow. The non-birds'' column
    consists of a balloon and an ice cream cone.


    **Figure 1-5** Proper classification rules have been established


    This rule set is still unnecessarily complicated, because as it turns out, the
    “lays eggs” rule is redundant: whether we keep it or eliminate it, it doesn’t
    change our decision of what constitutes a bird vs. a non-bird. Therefore, we simplify
    the rule set once again:


    - Has feathers

    - Has wings


    Feeling particularly daring (!), we try to take our simplification process one
    step further by eliminating yet another rule, defining a bird as something that


    - Has wings


    As Figure [1-6](#78624_3_En_1_Chapter.xhtml#Fig6) shows, we’ve gone too far this
    time: the abstraction of a bird is now so general that we’d include airplanes,
    insects, and all sorts of other non-birds in the mix!


    ![](images/78624_3_En_1_Chapter/78624_3_En_1_Fig6_HTML.jpg)


    A chart of two columns: birds and non-birds. The birds'' column consists of birds
    such as a parrot, an ostrich, a penguin, and a sparrow. The non-birds'' column
    consists of a balloon and an ice cream cone. A bird says the following, "Hey,
    It''s getting awfully crowded in here."


    **Figure 1-6** A rule set that is too relaxed is as much of a problem as an overly
    restrictive rule set


    The process of rule definition for purposes of categorization involves dialing
    in just the right set of rules—not too general, not too restrictive, and containing
    no redundancies—to define the correct membership in a particular class.


    ### Abstraction as the Basis for Software Development


    When pinning down the requirements for an information systems development project,
    we typically start by gathering details about the real-world situation on which
    the system is to be based. These details are usually a combination of


    - Those that are explicitly offered to us as we interview the intended users of
    the system

    - Those that we otherwise observe


    We must make a judgment call as to which of these details are relevant to the
    system’s ultimate purpose. This is essential, as we can’t automate them all. To
    include too much detail is to overly complicate the resultant system, making it
    that much more difficult to design, program, test, debug, document, maintain,
    and extend in the future.


    As with all abstractions, all of our decisions of inclusion vs. elimination when
    building a software system must be made within the context of the overall purpose
    and **domain**, or subject matter focus, of the future system. When representing
    a person in a software system, for example, is their eye color important? How
    about their genetic profile? Salary? Hobbies? The answer is ***any*** of these
    features of a person may be relevant or irrelevant, depending on whether the system
    to be developed is a


    - Payroll system

    - Marketing demographics system

    - Optometrist’s patient database

    - FBI’s “most wanted” tracking system


    Once we’ve determined the essential aspects of a situation—something that we’ll
    explore in Part 2 of this book—we can prepare a **model** of that situation. **Modeling**
    is the process by which we develop a pattern for something to be made. A blueprint
    for a custom home, a schematic diagram of a printed circuit, and a cookie cutter
    are all examples of such patterns. As we’ll cover in Parts 2 and 3, an **object
    model** of a software system is such a pattern. Modeling and abstraction go hand
    in hand, because a model is essentially a physical or graphical portrayal of an
    abstraction; before we can model something effectively, we must have determined
    the essential details of the subject to be modeled.'
