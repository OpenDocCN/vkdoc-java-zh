- fmt: "### The `StringTokenizer` Class\n\nAnother handy `String`-related class provided\
    \ by the `java.util` package is the `StringTokenizer` class. With this class,\
    \ we’re able to **parse** (break apart) a `String` into **tokens** (segments/substrings)\
    \ based on arbitrary delimiters.\n\nThe easiest way to learn how to use this class\
    \ is with an example; again, we’d need to include the directive\n\n```java\nimport\
    \ java.util.StringTokenizer;\n```\n\nin whatever class this code is found. We’ll\
    \ present the example in its entirety first and then will narrate it step by step:\n\
    \n```java\nString s = \"This is a test.\";\nStringTokenizer st = new StringTokenizer(s);\n\
    while (st.hasMoreTokens()) {\n    System.out.println(st.nextToken());\n}\n```\n\
    \nOutput:\n\n```\nThis\nis\na\ntest.\n```\n\nLet’s narrate the preceding example:\n\
    \n- The default `StringTokenizer` constructor takes one argument, the `String`\
    \ value to be parsed, and parses along **white space** boundaries—blank spaces,\
    \ tab characters, and the like:\n\n```java\nString s = \"This is a test.\";\n\
    StringTokenizer st = new StringTokenizer(s);\n```\n\n- We use the `boolean hasMoreTokens`\
    \ method of the `StringTokenizer` class to ascertain whether or not we’ve reached\
    \ the end of the particular `String` instance being parsed; this method returns\
    \ `true` if there are more tokens remaining or `false` if the `String` being parsed\
    \ has been exhausted:\n\n```java\nwhile (st.hasMoreTokens()) {\n```\n\n- The `String\
    \ nextToken` method is used to pluck out the next token/segment of the `String`:\n\
    \n```java\nSystem.out.println(st.nextToken());\n}\n```\n\nA second overloaded\
    \ form of constructor, `StringTokenizer(String s, String delimiter)`, can be used\
    \ if we want to specify a **specific** delimiter to be used when parsing a `String`.\
    \ For example, to parse along slash (`/`) boundaries, as when perhaps parsing\
    \ a date, we’d write code as follows (observe that we enclose the delimiter, which\
    \ can be **one or more** characters long, within **double** quote marks):\n\n\
    ```java\nString date = \"11/17/1985\";\n// Note use of double quote marks below.\n\
    StringTokenizer st = new StringTokenizer(date, \"/\");\nwhile (st.hasMoreTokens())\
    \ {\n    System.out.println(st.nextToken());\n}\n```\n\nOutput:\n\n```\n11\n17\n\
    1985\n```\n\nNote that the delimiter—`\"/\"`, in this example—is stripped off\
    \ each token.\n\nAs another example, to parse on the three-character delimiter\
    \ `\"-#-\"`, we’d write\n\n```java\nString fruit = \"apple-#-banana-#-cherry\"\
    ;\nStringTokenizer st = new StringTokenizer(fruit, \"-#-\");\nwhile (st.hasMoreTokens())\
    \ {\n    System.out.println(st.nextToken());\n}\n```\n\nOutput:\n\n```\napple\n\
    banana\ncherry\n```\n\nAs our final example, let’s assume that we’re reading records\
    \ one by one from a file and want to parse on tab characters only vs. on all white\
    \ space; we’d write code as follows:\n\n```java\n// Pseudocode.\nString record\
    \ = read a record from a file;\n// Parse on tabs only, not on all white space.\n\
    StringTokenizer st = new StringTokenizer(record, \"\\t\");\nwhile (st.hasMoreTokens())\
    \ {\n    System.out.println(st.nextToken());\n}\n```\n\nAssuming that `record`\
    \ contains the following text (where `<tab>` indicates the presence of an invisible\
    \ tab character)\n\n```\nBill Jost\t123-45-6789\tCleveland, Ohio\n```\n\nwe’d\
    \ observe the following output:\n\n```\nBill Jost\n123-45-6789\nCleveland, Ohio\n\
    ```\n\nNote that the blank spaces between words have been left intact; had we\
    \ instead parsed this record with the default `StringTokenizer`, which parses\
    \ on all white space\n\n```java\n// Pseudocode.\nString record = read a record\
    \ from a file;\n// Parse on any/all white space.\nStringTokenizer st = new StringTokenizer(record);\n\
    while (st.hasMoreTokens()) {\n    System.out.println(st.nextToken());\n}\n```\n\
    \nwe’d have gotten the following as output instead:\n\n```\nBill\nJost\n123-45-6789\n\
    Cleveland,\nOhio\n```\n\n`StringTokenizer`s are particularly useful when reading\
    \ and parsing structured records from data files; we’ll use this technique in\
    \ building our SRS application, in Chapter [15](#78624_3_En_15_Chapter.xhtml).\n\
    \n### Instantiating Strings and the String Literal Pool\n\nThere are two ways\
    \ to instantiate `String` objects in Java. The first, which we’ve seen in use\
    \ many times before, allows us to simply assign a literal value to a `String`\
    \ variable:\n\n```java\nString s = \"I am a String!\";\n```\n\nBut, because `String`s\
    \ are objects, we may also use the `new` keyword to formally invoke an explicit\
    \ `String` constructor, as follows:\n\n```java\nString t = new String(\"I am a\
    \ String, too!\");\n```\n\nWe’ll refer to the first way of instantiating `String`s—the\
    \ way that **doesn’t** use the `new` operator—as the **“shortcut” method** of\
    \ `String` instantiation and the second way as the **formal method**. There is\
    \ a subtle difference in terms of what happens behind the scenes with these two\
    \ methods of `String` instantiation, as follows.\n\nWhen we use the shortcut method\
    \ of `String` instantiation\n\n```java\nString x = \"Foo\"; // shortcut method\n\
    ```\n\nthe JVM checks its `String` **literal pool**—a special place in the JVM’s\
    \ memory that enables automatic shared access to `String` objects—to see if there\
    \ is already a `String` object in the literal pool with that exact same value:\n\
    \n![](images/78624_3_En_13_Chapter/78624_3_En_13_Fig11_HTML.jpg)\n\nThe diagram\
    \ illustrates the string literal pool within the JVM with four balloons. In one\
    \ balloon, the word foo is written with threads X and Y.\n\n**Figure 13-11** Using\
    \ the shortcut method of `String` instantiation inserts a newly created `String`\
    \ object into the `String` literal pool\n\n- If so, the JVM **reuses** that existing\
    \ instance without creating a second.\n- Conversely, if a matching instance is\
    \ **not** found in the literal pool, the JVM creates one and places it in the\
    \ literal pool. This is illustrated conceptually in Figure [13-11](#78624_3_En_13_Chapter.xhtml#Fig11).\n\
    \nLet’s now use the shortcut method a second time in the same program, in an attempt\
    \ to instantiate another `String` object `y` with the same value as `x`:\n\n```java\n\
    String x = \"Foo\";\nString y = \"Foo\"; // shortcut method again\n```\n\nThis\
    \ time, since the JVM finds an instance of a `String` with the value `\"Foo\"\
    ` in the literal pool from when we instantiated `x`, the JVM assigns `y` as a\
    \ **second** handle to the **same** `String` object. This is illustrated conceptually\
    \ in Figure [13-12](#78624_3_En_13_Chapter.xhtml#Fig12).\n\n![](images/78624_3_En_13_Chapter/78624_3_En_13_Fig12_HTML.jpg)\n\
    \nThe diagram illustrates the string literal pool within the JVM with four balloons.\
    \ In one balloon, the word foo is written with threads X and Y.\n\n**Figure 13-12**\
    \ Two shortcut instantiations of `String`s with the same value wind up sharing\
    \ the same `String` object within the `String` literal pool\n\nNow, let’s declare\
    \ and instantiate a third `String` variable `z` in the same program, giving it\
    \ the same value as `x` and `y`. However, rather than using the shortcut method\
    \ for `String` instantiation with `z`, we’ll use the `new` keyword to explicitly\
    \ invoke a `String` constructor:\n\n```java\nString x = \"Foo\";\nString y = \"\
    Foo\";\nString z = new String(\"Foo\");  // formal method this time\n```\n\nOur\
    \ use of `new` instructs the JVM to **bypass** the literal pool: that is, a **brand-new**\
    \ instance of a `String` object with the value `\"Foo\"` will be created **outside**\
    \ of the literal pool, as illustrated in Figure [13-13](#78624_3_En_13_Chapter.xhtml#Fig13).\n\
    \n![](images/78624_3_En_13_Chapter/78624_3_En_13_Fig13_HTML.jpg)\n\nThe diagram\
    \ illustrates the string literal pool within the JVM with four balloons. In one\
    \ balloon, the word foo is written with threads X and Y. The outer balloon is\
    \ labeled Z and foo is written on it.\n\n**Figure 13-13** Use of the `new` keyword\
    \ to instantiate a `String`, on the other hand, explicitly creates a new `String`\
    \ instance every time\n\nFigure [13-14](#78624_3_En_13_Chapter.xhtml#Fig14) completes\
    \ our example, wherein we create a fourth similarly valued `String`, `w`, again\
    \ using the formal method:\n\n```java\nString x = \"Foo\";\nString y = \"Foo\"\
    ;\nString z = new String(\"Foo\");\nString w = new String(\"Foo\");  // formal\
    \ method again\n```"
