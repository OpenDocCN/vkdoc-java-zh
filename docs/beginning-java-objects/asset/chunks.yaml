- fmt: "# Using Custom Exceptions and Enums in Java\n\nLet’s now look at how we’d\
    \ go about using our new exception type to signal an error condition back to client\
    \ code. First, let’s put this exception type to work in the `Student` class. We’ll\
    \ present the code for the `Student` class in its entirety first and then narrate\
    \ it in detail afterward:\n\n```\npublic class Student {\n    private String name;\n\
    \    private String ssn;\n    // Other details omitted.\n    // Accessor methods.\n\
    \    public String getSsn() { ... }\n    public void setSsn() { ... }\n    public\
    \ String getName() { ... }\n    public void setName(String n) throws MissingValueException\
    \ {\n        // We want to report an error if the String that has been\n     \
    \   // passed in is blank.\n        if (n.equals(\"\")) {\n            throw new\
    \ MissingValueException(this,\n                \"A student's name cannot be blank\"\
    );\n        }\n        else {\n            name = n;\n        }\n    }\n    //\
    \ etc.\n}\n```\n\nThe first bit of unusual syntax that we notice in the preceding\
    \ code is in the method header declaration for the `setName` method:\n\n```\n\
    public void setName(String n) throws MissingValueException {\n```\n\nSince we\
    \ have the potential to throw a `MissingValueException` from within this method,\
    \ we must declare that the `setName` method `throws MissingValueException`.\n\n\
    Then, inside the body of the `setName` method, we wish to throw a `MissingValueException`\
    \ if we detect that client code has passed in an empty `String` (`\"\"`) as the\
    \ proposed name for this `Student`. We do so via the syntax\n\n```\nthrow new\
    \ MissingValueException(this, \"A student's name cannot be blank\");\n```\n\n\
    That is, the keyword `throw` is followed by the `new` keyword, which in turn is\
    \ followed by a call to our `MissingValueException` constructor. Thus, we’ve just\
    \ “shot off a signal flare,” carrying both a reference to the `Student` object\
    \ in question and an informative message as to ***why*** we’ve shot off the flare:\
    \ namely, because “A student’s name cannot be blank.”\n\nNow, let’s see how client\
    \ code ***reacts*** to this “signal flare.” If we were to attempt to write client\
    \ code as follows\n\n```\npublic class Example {\n    public static void main(String[]\
    \ args) {\n        // Pseudocode.\n        String name = read value from GUI;\n\
    \        Student s = new Student();\n        s.setName(name);\n        // etc.\n\
    ```\n\nthe following compiler error would arise on the line that attempts to invoke\
    \ the `setName` method of `Student s`:\n\n```\nUnreported exception MissingValueException;\
    \ must be caught or declared to be thrown\ns.setName(name);\n```\n\nBecause we\
    \ included the `throws MissingValueException` clause on our `setName` method declaration\
    \ in the `Student` class, we are ***forced*** by the Java compiler to catch this\
    \ type of exception in our client code! That is, we must place our attempt to\
    \ invoke the `setName` method on `s` in a `try` block and follow it with an appropriate\
    \ `catch` block, as shown in the following:\n\n```\npublic class Example {\n \
    \   public static void main(String[] args) {\n        // Pseudocode.\n       \
    \ String name = read value from GUI;\n        Student s = new Student();\n   \
    \     try {\n            s.setName(name);\n        }\n        catch (MissingValueException\
    \ e) {\n            System.out.println(e.getMessage());\n            System.out.println(\"\
    ID of affected student:  \" +\n                e.getStudent().getSsn());\n   \
    \     }\n        // etc.\n```\n\nIn our `catch` block, we’ve taken advantage of\
    \ both the inherited `getMessage` method and the custom `getStudent` method of\
    \ the `MissingValueException` class to produce output as follows:\n\n```\nA student's\
    \ name cannot be blank\nID of affected student:  123-45-6789\n```\n\n## Throwing\
    \ Multiple Types of Exception\n\nNote that we can throw more than one type of\
    \ exception from the same method. In the following example, it’s assumed that\
    \ we’ve declared a custom `InvalidCharacterException` in addition to `MissingValueException`:\n\
    \n```\npublic class Student {\n    // Details omitted.\n    public void setName(String\
    \ s) throws MissingValueException,\n        InvalidCharacterException {\n    \
    \    if (s.equals(\"\")) {\n            throw new MissingValueException(this,\n\
    \                \"A student's name cannot be blank\");\n        }\n        //\
    \ Pseudocode.\n        else if (s contains an invalid character) {\n         \
    \   throw new InvalidCharacterException(this, s +\n                \" contains\
    \ a non-alphabetic character\");\n        }\n        else name = s;\n    }\n \
    \   // etc.\n}\n```\n\n# Enum(eration)s\n\nSituations often arise in an application\
    \ where we wish to constrain the value that a variable can assume to a finite\
    \ set of valid choices. For example, let’s say that SRS University offers degrees\
    \ in the following five major fields:\n\n*   Mathematics\n*   Biology\n*   Chemistry\n\
    *   Computer Science\n*   Physical Education\n\nWe design our `Student` class\
    \ so that one of its attributes, `String major`, reflects the discipline that\
    \ a given student is majoring in. Then, to ensure that client code doesn’t pass\
    \ in an inappropriate value for the student’s major field of study, we invent\
    \ a custom exception called `InvalidMajorException` and use it to signal issues\
    \ in this regard, as illustrated in the following:\n\n```\npublic class Student\
    \ {\n    private String name;\n    private String major;\n    // etc.\n    //\
    \ Constructor.\n    public Student(String name, String major) throws InvalidMajorException\
    \ {\n        this.setName(name);\n        // Pseudocode.\n        if (major not\
    \ one of the five approved majors) {\n            throw new InvalidMajorException();\n\
    \        }\n        else {\n            this.setMajor(major);\n        }\n   \
    \ }\n    // Accessor methods.\n    public void setName(String n) {\n        name\
    \ = n;\n    }\n    public void setMajor(String m) {\n        major = m;\n    }\n\
    \    // etc.\n}\n```\n\nIn so doing, we cannot prevent or detect errors in client\
    \ code at ***compile*** time\n\n```\n// Client code.\n// The compiler forces us\
    \ to place Student constructor calls in\n// an appropriate try block ...\ntry\
    \ {\n    // ... but we nonetheless have WRITTEN code that is\n    // guaranteed\
    \ to throw a runtime exception, because the\n    // COMPILER has no way to determine\
    \ the error.\n    Student s = new Student(\"Dorothy Jost\", \"Culinary Arts\"\
    );\n}\ncatch (InvalidMajorException e) { ... }\n```\n\nbecause the `InvalidMajorException`\
    \ doesn’t arise until this code is ***executed***. However, we ***know*** that\
    \ there are five, and ***only*** five, valid `String` values for a student’s major…\
    \ Is there perhaps a way to constrain the `major` attribute so that we can prevent\
    \ misassignment at ***compile time***? The answer is ***yes!*** We use a construct\
    \ called an **enum**`—`short for “enumeration”`—`to define/***enumerate*** a finite\
    \ set of values that a given variable may assume.\n\nAlong with `class`es and\
    \ `interface`s, an `enum` is another form of user-defined type in Java that lives\
    \ in its own `.java` source code file and is compiled into bytecode:\n\n```\n\
    // EnumName.java\npublic enum EnumName { ... }\n```\n\nMore specifically, an `enum`\
    \ is a very simplistic sort of class, consisting of only\n\n*   A single attribute,\
    \ named `value`, declared to be of whatever (primitive or reference) type we wish\
    \ for it to be:\n\n```\n    // A single attribute.\n    // (Pseudocode.)\n   \
    \ private final type value;\n```\n\nNote that `value` is declared to be both `private`\
    \ and `final`; as we learned in Chapter [7](#78624_3_En_7_Chapter.xhtml), the\
    \ keyword `final` indicates that an `enum` instance’s `value` attribute may only\
    \ be assigned a value ***once*** in its “lifetime,” after which the value cannot\
    \ be changed.\n\n*   A list (enumeration) of values that the `value` attribute\
    \ is permitted to assume, represented as a comma-separated list of ***symbolic\
    \ name****–****value pairs***:\n\n```\n// Comma separated list of name-value pairs.\n\
    // (Pseudocode.)\nsymbolicName1(value1),\nsymbolicName2(value2),\n...\nsymbolicNameN(valueN);\n\
    ```\n\n*   A simple constructor, used to initialize the `value` attribute:\n\n\
    ```\n// Constructor.\n// (Pseudocode.)\nEnumName(type v) {\n    value = v;\n}\n\
    ```\n\nNote that an enum’s constructor ***isn’t*** declared to be `public`, because\
    \ it is not invoked from client code; rather, it is used internally to the `enum`\
    \ (in declaring the preceding list of symbolic name`–`value pairs).\n\n*   A single\
    \ accessor method, `value()`, used by client code to retrieve the value of the\
    \ `enum`’s lone attribute.\n\nPutting this all together, the general template\
    \ for declaring an `enum` is as follows, where the *italicized* items are those\
    \ that we can customize:"
