    Sometimes just method names are presented


    Note that the formal syntax for operation specifications in a UML class diagram


    ```

    [visibility] name [(parameter list)] [: return type]

    ```


    for example


    ```

    registerForCourse(Course x) : boolean

    ```


    differs from the syntax that we’re used to seeing for Java method headers:


    ```

    returnType methodName(parameter list)

    ```


    For example:


    ```

    boolean registerForCourse(Course x)

    ```


    Note in particular that the UML refers to the combination of operation name, parameters,
    and return type as the **operation signature**, but that in Java the return type
    is part of the method header but ***not*** part of the ***method signature***.


    The rationale for making these operation signatures generic vs. language specific
    is so that the same model may be rendered in any of a variety of target programming
    languages. It can be argued, however, that there is nothing inherently better
    or clearer about the first form vs. the second. Therefore, if you know that you’re
    going to be programming in Java, it might make sense to reflect standard Java
    method headers in your class diagram, if your object modeling tool will accommodate
    this.


    It’s often impractical to show all of the attributes and operations of every class
    in a class diagram, because the diagram will get so cluttered that it will lose
    its power as a communications tool. Consider the data dictionary to be the official,
    complete source of information concerning the model, and reflect in the diagram
    only those attributes and operations that are particularly important in describing
    the mission of each class. In particular, “get” and “set” operations are implied
    for all attributes and shouldn’t be explicitly shown.


    Also, just because the attribute or operation compartment of a class is empty,
    don’t assume that there are no features of that type associated with a class;
    it may simply mean that the model is still evolving.


    ### Relationships Between Classes


    Chapter [4](#78624_3_En_4_Chapter.xhtml) defined several different types of structural
    relationship that may exist between classes: associations, aggregations (a specific
    type of association), and inheritance. Let’s explore how each of these relationship
    types is represented graphically.


    #### Associations


    Binary associations—in other words, relationships between two different classes—are
    indicated by drawing a line between the rectangles representing the participating
    classes and labeling the line with the name of the association. Role names can
    be reflected at either end of the association line if they add value to the model,
    but should otherwise be omitted.


    We also mark each end of the line with the appropriate **multiplicity designator**,
    to reflect whether the relationship is one-to-one, one-to-many, or many-to-many
    (see Figure [10-14](#78624_3_En_10_Chapter.xhtml#Fig14)); we’ll look at how to
    do this a bit later in the chapter.


    ![](images/78624_3_En_10_Chapter/78624_3_En_10_Fig14_HTML.jpg)


    A block diagram explains the multiplicity indicator goes to class 1 on the left
    and class 2 on the right. The middle area between the classes is for the association
    name. The text reads the roles of classes 1 and 2 at the bottom.


    Figure 10-14


    Representing associations between classes


    All associations are assumed to be bidirectional at this stage in the modeling
    effort, and it doesn’t matter in which order the participating classes are arranged
    in a class diagram. So, to depict the association “a `Professor` *advises* a `Student`,”
    the graphical notations in Figure [10-15](#78624_3_En_10_Chapter.xhtml#Fig15)
    are all considered equivalent.


    ![](images/78624_3_En_10_Chapter/78624_3_En_10_Fig15_HTML.jpg)


    A block diagram denotes 8 blocks labeled student and professor in different orders,
    arranged in 2 columns. It indicates the professor advises the student and is the
    advisor to the student in 4 different instances.


    Figure 10-15


    Equivalent depictions of the advises association between the `Professor` and `Student`
    classes


    Achieving an optimal placement of classes for purposes of simplifying all of the
    association names in a diagram is often not possible in an elaborate diagram.
    Therefore, UML has introduced the simple convention of using a small arrowhead
    (◄) to reflect the direction in which the association name is to be interpreted,
    giving us a lot more freedom in how we place our class rectangles in a diagram,
    as shown in Figure [10-16](#78624_3_En_10_Chapter.xhtml#Fig16).


    ![](images/78624_3_En_10_Chapter/78624_3_En_10_Fig16_HTML.jpg)


    A block diagram denotes 2 blocks labeled student on the left and professor on
    the right. It indicates professor advises the student and the professor is the
    advisor.


    Figure 10-16


    Using an arrowhead to indicate the direction of an association label


    With UML, no matter how the preceding two rectangles are situated, we can still
    always label the association “*advises*.”


    It’s easy to get caught up in the trap of trying to make diagrams “perfect” in
    terms of how classes are positioned, to minimize crossed lines, etc. Try to resist
    the urge to do so early on, because the diagram will inevitably get changed many
    times before the modeling effort is finished.


    Unary (reflexive) associations—that is, relationships between two different objects
    belonging to the same class—are drawn with an association line that loops back
    to the same class rectangle from which it originates. For example, to depict the
    association “a `Course` *is a prerequisite for* a (different) `Course`,” we’d
    use the notation shown in Figure [10-17](#78624_3_En_10_Chapter.xhtml#Fig17).


    ![](images/78624_3_En_10_Chapter/78624_3_En_10_Fig17_HTML.png)


    A diagram represents 2 rectangular blocks. The block in the foreground denotes
    the course and the block in the background depicts the prerequisite.


    Figure 10-17


    A reflexive association involving the `Course` class'
