    \nJava 中引入垃圾回收机制几乎消除了 C++ 中出现的那种内存泄漏。但请注意，如果我们同时维护太多活跃对象的引用，JVM 本身仍然有可能耗尽内存。因此，Java\
    \ 程序员不能完全忽视内存管理；只是在 Java 中管理内存比在 C/C++ 中更不容易出错。\n\n## 对象作为属性\n\n当我第一次讨论与 `Student`\
    \ 类相关的属性和方法时，我提到某些属性可以由 Java 语言提供的预定义类型表示，而其他一些属性（`advisor`、`courseLoad` 和 `transcript`）的类型暂时未指定。现在，让我们将学到的关于用户自定义类型的知识应用到其中一个属性上：`Student`\
    \ 类的 `advisor` 属性。\n\n我们不再将 `advisor` 属性简单地声明为一个表示导师姓名的 `String`，而是将其声明为用户自定义类型——即\
    \ `Professor` 类型，这是我们发明的另一个类。此属性类型反映在表 3-2 中。\n\n表 3-2\n\n重新审视 Student 类属性\n\n\
    | 属性 | 类型 |\n| --- | --- |\n| `name` | `String` |\n| `studentID` | `String` |\n\
    | `birthDate` | `Date` |\n| `address` | `String` |\n| `major` | `String` |\n|\
    \ `gpa` | `double` |\n| **advisor** | **Professor** |\n| `courseLoad` | ??? |\n\
    | `transcript` | ??? |\n\n这一点也反映在我们的 `Student` 类声明中：\n\n```\npublic class Student\
    \ {\n// 属性声明通常放在最前面 ...\nString name;\nString studentId;\nDate birthDate;\nString\
    \ address;\nString major;\ndouble gpa;\n// 类是一种用户自定义类型，因此我们可以将属性声明为这种类型。\nProfessor\
    \ advisor;\n// 类型? courseLoad - 我们稍后会声明这个属性。\n// 类型? transcript – 同上。\n// ...\
    \ 后面是方法声明（此处省略细节）。\n}\n```\n\n通过将 `advisor` 属性声明为 `Professor` 类型——也就是说，让 `advisor`\
    \ 属性作为一个***引用变量***——我们刚刚使一个 `Student` 对象能够维护一个指向实际 `Professor` 对象的引用，该对象代表了指导该学生的教授。\n\
    \n反过来，`Professor` 类可能被定义为具有表 3-3 中列出的属性。\n\n表 3-3\n\nProfessor 类属性\n\n| 属性 | 类型\
