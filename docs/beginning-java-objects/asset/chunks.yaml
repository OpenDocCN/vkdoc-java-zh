- fmt: "*   `How`方法用于指定对象的行为\n*   构成方法的各种代码元素\n*   对象如何将其方法作为服务公开给其他对象\n*   对象如何相互通信以请求彼此的服务，从而实现协作\n\
    *   对象如何维护其数据以及如何保护数据以确保其完整性\n*   面向对象语言特性**信息隐藏**（`information hiding`）的强大之处，以及当类的私有实现细节不可避免地发生变化时，如何使用信息隐藏来限制对应用程序代码的连锁影响\n\
    *   一种称为**构造函数**（`constructor`）的特殊函数如何用于在对象首次实例化时初始化其状态\n\n## 事件驱动对象协作\n\n简而言之，面向对象软件开发的过程包括以下四个基本步骤：\n\
    \n1.  正确建立应用程序的功能需求和总体任务\n2.  设计合适的类——它们的数据结构、行为以及彼此之间的关系——以满足这些需求和任务\n3.  实例化这些类，以创建合适类型和数量的对象实例\n\
    4.  通过**外部触发事件**（`external triggering events`）使这些对象运转起来\n\n想象一个蚁丘：乍一看，你可能看不到任何明显的活动。但如果你在附近扔下一块糖果，蚂蚁们会突然开始一阵忙碌，四处收集“好东西”，并修复如果你把糖果扔得***离蚁丘太近***可能造成的任何损坏！\n\
    \n在面向对象应用程序（“蚁丘”）中，对象（“蚂蚁”）可能由外部事件触发，例如：\n\n*   点击SRS图形用户界面上的一个按钮，表示学生希望注册某门特定课程\n\
    *   从其他自动化系统接收信息，例如当SRS从大学的计费系统收到所有已支付学费的学生名单时\n\n一旦面向对象系统注意到此类触发事件，合适的对象就会做出反应，自行执行服务和/或以连锁反应的方式请求其他对象的服务，直到实现应用程序的某个总体目标。例如，学生用户通过SRS应用程序的GUI提出的课程注册请求可能涉及许多不同对象的协作，如图[4-1](#78624_3_En_4_Chapter.xhtml#Fig1)所示：\n\
    \n![](images/78624_3_En_4_Chapter/78624_3_En_4_Fig1_HTML.jpg)\n\n一个GUI点击的流程图，包含学生、学位项目、课程、教室和成绩单等相互连接的对象。左上角的文字写着：外部事件让对象开始对话。\n\
    \n图4-1\n\nSRS对象必须协作才能完成SRS的总体任务\n\n*   一个`Student`对象（对***真实***学生用户的抽象）\n*   一个`DegreeProgram`对象，用于确保所请求的课程确实是学生毕业所必需的\n\
    *   相应的`Course`对象，用于确保该课程有空位给学生\n*   一个`Classroom`对象，代表课程将要上课的教室，以验证其座位容量\n* \
    \  一个`Transcript`对象——具体来说，是相关`Student`的`Transcript`——以确保学生已满足该课程的所有先修条件\n\n与此同时，SRS的学生用户对幕后所有为实现其目标而“忙碌”的对象一无所知。学生只需填写几个字段并点击SRS\
    \ GUI上的一个按钮，片刻之后就会看到一条确认或拒绝其注册请求的消息。\n\n一旦事件链的最终目标达成（例如，为学生注册一门课程），应用程序的对象实际上就变得空闲，并可能保持这种状态直到下一个触发事件发生。面向对象应用程序在某些方面类似于台球游戏：用球杆击打母球，它（希望如此！）会击中另一个球，而那个球可能会与另外三个球相撞，依此类推。然而，最终所有球都会静止不动，直到母球再次被击打。\n\
    \n## 声明方法\n\n让我们更详细地讨论如何将对象的行为正式指定为Java方法。回顾第[3](#78624_3_En_3_Chapter.xhtml)章，对象的行为可以被视为该对象能够执行的服务。为了使对象A请求对象B的某项服务，A需要知道与B通信的特定语言。也就是说：\n\
    \n*   ***对象A需要清楚它希望B执行B的哪个方法/服务***。把你自己想象成对象A，把宠物狗想象成对象B。你是想让你的狗坐下？待着？随行？还是去捡东西？\n\
    *   ***根据服务请求，对象A可能需要向B提供一些额外信息，以便B确切知道如何执行***。如果你告诉你的狗去捡东西，狗需要知道***捡什么***：一个球？一根棍子？还是邻居家的猫？\n\
    *   ***反过来，对象B需要知道对象A是否期望B报告其被要求执行任务的结果***。在命令去捡东西的情况下，你的狗有希望会把请求的物品作为结果带给你。然而，如果你的狗在另一个房间，你喊出“坐下！”的命令，你不会看到命令的结果；你必须相信狗已经按照你的要求做了。\n\
    \n我们通过声明一个**方法头**（`method header`）来指定/定义每个方法的这三个方面。然后，我们必须在**方法体**（`method body`）中为B将如何执行所请求的服务编写幕后逻辑。\n\
    \n对于熟悉C编程语言的读者来说，Java方法声明在语法上与C函数声明几乎相同。非面向对象语言（如C）中的函数与面向对象语言（如Java）中的方法之间唯一的哲学差异在于它们执行的上下文：非面向对象函数由整个编程环境执行，而面向对象语言中的方法由特定对象执行。随着本章的展开，我们将更详细地探讨这一差异。\n\
    \n我们先来看方法头。\n\n### 方法头\n\n**方法头**（`method header`）是从编程角度对该方法如何被调用的正式规范。一个方法头至少包含：\n\
    \n*   方法的**返回类型**（`return type`）——即当B的方法执行完毕后，将返回给对象A的信息类型（如果有的话）。\n*   方法的名称。\n\
    *   一个可选的、用逗号分隔的**形式参数**（`formal parameters`）列表（指定其类型和名称），这些参数将被传递给方法，并括在圆括号中。如果不需要传递任何参数，则使用一对空圆括号；这样的方法被称为“不接受参数”，我们将其称为**无参数方法**（`parameterless`）。\n\
    \n例如，以下是我们可能为`Student`类定义的一个典型方法头：\n\n```\nboolean  registerForCourse(String courseID,\
    \ int secNo)\n返回类型  方法名称    用逗号分隔的形式参数列表，\n                    括在圆括号中\n      \
    \              （圆括号可以为空）\n```\n\n在叙述性文本中非正式地引用诸如`registerForCourse`之类的方法时，一些作者会在方法名后附加一对空圆括号`()`，例如`registerForCourse()`。然而，这并不一定意味着***正式***的方法头是无参数的。"
  raw: '*   How methods are used to specify an object’s behaviors


    *   The various code elements that make up a method


    *   How objects publicize their methods as services to one another


    *   How objects communicate with one another to request one another’s services
    in order to collaborate


    *   How objects maintain their data and how they guard their data to ensure its
    integrity


    *   The power of an OO language feature known as **information hiding** and how
    information hiding can be used to limit ripple effects on an application’s code
    when the private implementation details of a class inevitably change


    *   How a special type of function known as a **constructor** can be used to initialize
    the state of an object when it is first instantiated


    ## Events Drive Object Collaboration


    At its simplest, the process of object-oriented software development involves
    the following four basic steps:


    1.  Properly establishing the functional requirements for, and overall mission
    of, an application


    2.  Designing the appropriate classes—their data structures, behaviors, and relationships
    with one another—necessary to fulfill these requirements and mission


    3.  Instantiating these classes to create the appropriate types and number of
    object instances


    4.  Setting these objects in motion through **external triggering events**


    Think of an anthill: At first glance, you may see no apparent activity taking
    place. But if you drop a candy bar nearby, a flurry of activity suddenly begins
    as ants rush around to gather up the “goodies,” as well as to repair any damage
    that may have been caused if you dropped the candy bar ***too close*** to the
    anthill!


    Within an OO application (the “anthill”), the objects (“ants”) may be set in motion
    by an external event such as


    *   The click of a button on the SRS graphical user interface, indicating a student’s
    desire to register for a particular course


    *   The receipt of information from some other automated system, such as when
    the SRS receives a list of all students who have paid their tuition from the university’s
    Billing System


    As soon as such a triggering event has been noted by an OO system, the appropriate
    objects react, performing services themselves and/or requesting services of other
    objects in chain reaction fashion, until some overall goal of the application
    has been accomplished. For example, the request to register for a course as made
    by a student user via the SRS application’s GUI may involve the collaboration
    of many different objects, as illustrated in Figure [4-1](#78624_3_En_4_Chapter.xhtml#Fig1):


    ![](images/78624_3_En_4_Chapter/78624_3_En_4_Fig1_HTML.jpg)


    A flow diagram of the G U I click includes the interconnected objects of a student,
    a degree program, a course, a classroom, and a transcript. The text at the top
    left reads, an external event gets the objects talking.


    Figure 4-1


    SRS objects must collaborate to accomplish the overall SRS mission


    *   A `Student` object (an abstraction of the ***real*** student user)


    *   A `DegreeProgram` object, to ensure that the requested course is truly required
    for the student to graduate


    *   The appropriate `Course` object, to make sure that there is a seat available
    for the student in that course


    *   A `Classroom` object, representing the room in which the course will be meeting,
    to verify its seating capacity


    *   A `Transcript` object—specifically, the `Transcript` of the `Student` of interest—to
    ensure that the student has met all prerequisites for the course


    Meanwhile, a student user of the SRS is blissfully ignorant of all the objects
    that are “scurrying around” behind the scenes to accomplish their goal. The student
    merely fills in a few fields and clicks a button on the SRS GUI and a few moments
    later sees a message that either confirms or rejects their registration request.


    Once the ultimate goal of an event chain has been achieved (e.g., registering
    a student for a course), an application’s objects effectively become idle and
    may remain so until the next such triggering event occurs. An object-oriented
    application is in some ways similar to a game of billiards: hit the cue ball with
    your cue, and it (hopefully!) hits another ball, which might collide with three
    other balls, and so on. Eventually, however, all balls will come to a standstill
    until the cue ball is hit again.


    ## Declaring Methods


    Let’s talk in a bit more detail about how we formally specify an object’s behaviors
    as Java methods. Recall from Chapter [3](#78624_3_En_3_Chapter.xhtml) that an
    object’s behaviors may be thought of as services that the object can perform.
    In order for an object A to request some service of an object B, A needs to know
    the specific language with which to communicate with B. That is,


    *   ***Object A needs to be clear as to exactly which of B’s methods/services
    A wants B to perform***. Think of yourself as object A and a pet dog as object
    B. Do you want your dog to sit? Stay? Heel? Fetch?


    *   ***Depending on the service request, object A may need to give B some additional
    information so that B knows exactly how to proceed***. If you tell your dog to
    fetch, the dog needs to know ***what*** to fetch: a ball? A stick? The neighbor’s
    cat?


    *   ***Object B in turn needs to know whether object A expects B to report back
    the outcome of what it has been asked to do***. In the case of a command to fetch
    something, your dog will hopefully bring the requested item to you as an outcome.
    However, if your dog is in another room and you call out the command “Sit!” you
    won’t see the result of your command; you have to trust that the dog has done
    what you have asked it to do.


    We take care of specifying/defining these three aspects of each method by declaring
    a **method header**. We must then program the behind-the-scenes logic for ***how***
    B will perform the requested service in the **method body**.


    For readers familiar with the C programming language, a Java method declaration
    is virtually the same syntactically as a C function declaration. The only philosophical
    difference between a function in a non-OO language like C and a method in an OO
    language like Java is the context in which they are executed: a non-OO function
    is executed by the programming environment as a whole, whereas a method in an
    OO language is executed by a particular object. We’ll explore this difference
    in more detail as this chapter unfolds.


    Let’s look at method headers first.


    ### Method Headers


    A **method header** is a formal specification (from a programming standpoint)
    of how that method is to be invoked. A method header, at minimum, consists of


    *   A method’s **return type**—that is, the type of information that is going
    to be returned by object B to object A, if any, when B’s method finishes executing.


    *   A method’s name.


    *   An optional list of comma-separated **formal parameters** (specifying their
    types and names) to be passed to the method, enclosed in parentheses. If no parameters
    need be passed in, an empty set of parentheses is used; such methods are said
    to “take no parameters,” and we’ll refer to them as **parameterless**.


    As an example, here is a typical method header that we might define for the `Student`
    class:


    ```

    boolean  registerForCourse(String courseID, int secNo)

    return type  method name    comma-separated list of formal parameters,

    enclosed in parentheses

    (parentheses may be left empty)

    ```


    When casually referring to a method such as `registerForCourse` in narrative text,
    some authors attach an empty set of parentheses, `()`, to the method name, for
    example, `registerForCourse()`. This doesn’t necessarily imply that the ***formal***
    header is parameterless, however.'
  trans: "\n*   方法如何用于指定对象的行为\n*   构成方法的各种代码元素\n*   对象如何将其方法作为服务公开给其他对象\n*   对象之间如何相互通信以请求对方的服务，从而实现协作\n\
    *   对象如何维护其数据，以及如何保护数据以确保其完整性\n*   一种称为**信息隐藏**的面向对象语言特性的强大之处，以及当类的私有实现细节不可避免地发生变化时，信息隐藏如何用于限制对应用程序代码的连锁影响\n\
    *   一种称为**构造函数**的特殊函数类型，如何在对象首次实例化时用于初始化其状态\n\n## 事件驱动对象协作\n\n简而言之，面向对象软件开发的过程包含以下四个基本步骤：\n\
    \n1.  正确确立应用程序的功能需求及其总体任务\n2.  设计满足这些需求和任务所需的适当类——包括它们的数据结构、行为以及彼此之间的关系\n3.  实例化这些类，以创建适当类型和数量的对象实例\n\
    4.  通过**外部触发事件**使这些对象运转起来\n\n想象一个蚁丘：乍一看，你可能看不到任何明显的活动。但如果你在附近扔下一块糖果，突然之间就会开始一阵忙碌，蚂蚁们会蜂拥而至，收集“好东西”，并修复如果你把糖果扔得***离蚁丘太近***可能造成的任何损坏！\n\
    \n在面向对象应用程序（“蚁丘”）中，对象（“蚂蚁”）可能由外部事件触发而开始运转，例如：\n\n*   点击 SRS 图形用户界面上的一个按钮，表示学生希望注册某门特定课程\n\
    *   从其他自动化系统接收信息，例如当 SRS 从大学的计费系统收到所有已支付学费的学生名单时\n\n一旦面向对象系统注意到此类触发事件，相应的对象就会做出反应，以连锁反应的方式自行执行服务和/或请求其他对象的服务，直到完成应用程序的某个总体目标。例如，学生用户通过\
    \ SRS 应用程序的 GUI 提出的课程注册请求，可能涉及许多不同对象的协作，如图 4-1 所示：\n\n![](img/78624_3_En_4_Fig1_HTML.jpg)\n\
    \n一个 GUI 点击的流程图，包含学生、学位项目、课程、教室和成绩单等相互连接的对象。左上角的文字说明：一个外部事件让对象开始“交谈”。\n\n图 4-1\n\
    \nSRS 对象必须协作才能完成 SRS 的总体任务\n\n*   一个 `Student` 对象（对***真实***学生用户的抽象）\n*   一个 `DegreeProgram`\
    \ 对象，用于确保所请求的课程确实是学生毕业所必需的\n*   相应的 `Course` 对象，用于确保该课程有空位可供该学生注册\n*   一个 `Classroom`\
    \ 对象，代表课程将要上课的教室，用于验证其座位容量\n*   一个 `Transcript` 对象——具体来说，是相关 `Student` 的 `Transcript`——用于确保该学生已满足该课程的所有先修条件\n\
    \n与此同时，SRS 的学生用户对幕后所有为实现目标而“忙碌奔波”的对象一无所知。学生只需填写几个字段并点击 SRS GUI 上的一个按钮，片刻之后就会看到一条消息，确认或拒绝其注册请求。\n\
    \n一旦事件链的最终目标达成（例如，为学生注册一门课程），应用程序的对象就会有效地进入空闲状态，并可能一直保持到下一个此类触发事件发生。面向对象应用程序在某些方面类似于台球游戏：用球杆击打母球，它（希望如此！）会击中另一个球，这个球可能会再撞到另外三个球，依此类推。然而，最终所有球都会静止不动，直到母球再次被击打。\n\
    \n## 声明方法\n\n让我们更详细地讨论如何将对象的行为正式指定为 Java 方法。回顾第 3 章，对象的行为可以被视为该对象能够执行的服务。为了使对象\
    \ A 请求对象 B 的某项服务，A 需要知道与 B 通信的特定语言。也就是说：\n\n*   ***对象 A 需要明确它究竟希望 B 执行 B 的哪个方法/服务***。把你自己想象成对象\
    \ A，把宠物狗想象成对象 B。你是想让你的狗坐下？别动？随行？还是叼回东西？\n*   ***根据服务请求的不同，对象 A 可能需要向 B 提供一些额外信息，以便\
    \ B 确切知道如何执行***。如果你让狗去叼回东西，狗需要知道***叼回什么***：一个球？一根棍子？邻居家的猫？\n*   ***反过来，对象 B 需要知道对象\
    \ A 是否期望 B 报告其被要求执行任务的结果***。在命令叼回东西的情况下，你的狗有希望会把要求的物品叼回来作为结果。然而，如果你的狗在另一个房间，你喊出“坐下！”的命令，你将看不到命令的结果；你只能相信狗已经按你的要求做了。\n\
    \n我们通过声明一个**方法头**来指定/定义每个方法的这三个方面。然后，我们必须在**方法体**中编写 B 将如何执行所请求服务的幕后逻辑。\n\n对于熟悉\
    \ C 编程语言的读者来说，Java 方法声明在语法上与 C 函数声明几乎相同。像 C 这样的非面向对象语言中的函数与像 Java 这样的面向对象语言中的方法之间唯一的哲学差异在于它们执行的上下文：非面向对象函数由整个编程环境执行，而面向对象语言中的方法则由特定的对象执行。随着本章内容的展开，我们将更详细地探讨这一差异。\n\
    \n我们先来看方法头。\n\n### 方法头\n\n**方法头**是从编程角度对该方法如何被调用的正式规范。一个方法头至少包含：\n\n*   方法的**返回类型**——即当\
    \ B 的方法执行完毕时，将要从对象 B 返回给对象 A 的信息类型（如果有的话）。\n*   方法的名称。\n*   一个可选的、用逗号分隔的**形式参数**列表（指定其类型和名称），这些参数将被传递给方法，并括在圆括号中。如果不需要传递任何参数，则使用一对空圆括号；这样的方法被称为“不接受参数”，我们将它们称为**无参数方法**。\n\
    \n例如，以下是我们可能为 `Student` 类定义的一个典型方法头：\n\n```\nboolean  registerForCourse(String\
    \ courseID, int secNo)\n返回类型  方法名       用逗号分隔的形式参数列表，\n                      \
    \ 括在圆括号中\n                       （圆括号可以为空）\n```\n\n在叙述性文本中非正式地提及像 `registerForCourse`\
    \ 这样的方法时，一些作者会在方法名后附加一对空圆括号 `()`，例如 `registerForCourse()`。然而，这并不一定意味着***正式***的方法头是无参数的。\n"
- fmt: '### Method Naming Conventions


    Java method names are crafted using the *camel casing* style; recall from Chapter
    [2](#78624_3_En_2_Chapter.xhtml) that variable names are also crafted using camel
    casing. By way of review, with camel casing:


    - The first letter of the method name is in lowercase.

    - The first letter of each subsequent concatenated word in the method name is
    in uppercase, and the remaining characters are in lowercase.

    - We don’t use any “punctuation” characters—dashes, underscores, etc.—to separate
    these words.


    As an example, `chooseAdvisor` is an appropriate method name, whereas none of
    the following would be appropriate: `ChooseAdvisor` (uppercase “C”), `chooseadvisor`
    (lowercase “a”), `choose_advisor` (separating underscore).


    ### Passing Arguments to Methods


    The purpose of passing arguments into a method is twofold:


    - To provide it with the (optional) “fuel” necessary to do its job

    - To otherwise guide its behavior in some fashion


    With the `registerForCourse` method shown previously, for example, it’s necessary
    to tell the specific `Student` object performing the method which course we want
    it to register for; we’ll do so by passing in two arguments, a course ID (e.g.,
    “MATH 101”) and a section number (e.g., `10`, which happens to meet Monday nights
    from 8:00 to 10:00 p.m.), as illustrated here:


    ```

    boolean registerForCourse(String courseID, int secNo)

    ```


    Had we instead declared the `registerForCourse` method header with an *empty*
    parameter list:


    ```

    boolean registerForCourse()

    ```


    the request would be ambiguous, because the `Student` object performing this method
    would have no idea as to which course/section it’s expected to register for.


    Not all methods require such “fuel,” however; some methods are able to produce
    results solely based on the information stored internally within an object as
    attribute values, in which case no additional guidance is needed in the form of
    arguments. For example, the method:


    ```

    int getAge()

    ```


    is designed to be parameterless because a `Student` object can presumably tell
    us its age without having to be given any qualifying information, perhaps by comparing
    the value of its `birthDate` attribute with the system date. Let’s say, however,
    that we wanted a `Student` object to be able to report its age expressed either
    in years or in months; in such a case, we might wish to declare the `getAge` method
    as follows:


    ```

    int getAge(int ageType)

    ```


    allowing us to pass in an `int`(eger) argument to serve as a control flag for
    informing the `Student` object of how we want the answer to be returned. That
    is, we might program the `getAge` method so that:


    - If we pass in a value of 1, it means that we want the answer to be returned
    in terms of years.

    - If we pass in a value of 2, we want the answer to be returned in terms of months
    (e.g., a 21-year-old student would respond that it is 252 months old).


    An alternative way of handling the requirement to retrieve the age of a `Student`
    object in two different forms would be to define two separate methods, such as
    perhaps the following:


    ```

    int getAgeInYears()

    int getAgeInMonths()

    ```


    But in object-oriented programming, it’s common practice to control a method’s
    behavior through the values (and types) of arguments.


    ### Method Return Types


    The `registerForCourse` method as previously declared is shown to have a return
    type of `boolean`, which implies that this method will return one of the following
    two values:


    - A value of `true`, to signal “mission accomplished”—namely, that the `Student`
    object has successfully registered for the course that it was instructed to register
    for.

    - A value of `false`, to signal that the registration request has been denied
    for some reason. Perhaps the desired section was full, or the student didn’t meet
    the prerequisites of the course, or the requested course/section has been canceled,
    etc.


    In Chapter [13](#78624_3_En_13_Chapter.xhtml), you’ll learn techniques for communicating
    and determining precisely *why* the mission of a method has failed when we discuss
    **exception handling**.


    Note that a method may be designed so as to not return anything—that is, it may
    go about its business silently, without needing to report the outcome of its efforts.
    If so, it is declared to have a return type of `void` (another of Java’s keywords).
    As an example, consider the `Student` method header:


    ```

    void setName(String newName)

    ```


    This method requires one argument—a `String` representing the new name that we
    want this `Student` object to assume—and performs “silently” by setting the `Student`
    object’s internal `name` attribute to whatever value is being passed into the
    method, returning no answer in response.


    Here’s an additional example of a method header that we might declare for the
    `Student` class with a `void` return type:


    ```

    void switchMajor(String newDepartment, Professor newAdvisor)

    ```


    This method represents a request for a `Student` object to change its major field
    of study, which involves designating both a new academic department (e.g., “BIOLOGY”)
    and a reference to the `Professor` object that is to serve as the student’s advisor
    in this new department.


    The preceding example demonstrates that we can declare parameters to be of any
    type, including user-defined types such as `Professor`. The same is true for the
    return type of a method; for example, a method with the following header:


    ```

    Professor getAdvisor()

    ```


    could be used to ask a `Student` object who its advisor is. Rather than merely
    returning the *name* of the advisor, the `Student` object returns a reference
    to the `Professor` object as a whole (as recorded by the `Student`’s internal
    `facultyAdvisor` attribute; you’ll learn how to inform a `Student` object of *which*
    `Professor` object is to serve as its `facultyAdvisor` a bit later in the chapter).


    Note that a method can return at most one result, which may seem limiting. What
    if, for example, we want to ask a `Student` object for a list of *all* of the
    `Course`s that the `Student` has ever taken—must we ask for these one by one through
    multiple method calls? Fortunately not. The result handed back by a method can
    actually be a reference to an object of arbitrary complexity, including a special
    type of object called a **collection** that can contain references to *multiple*
    other objects. We’ll talk about collections in depth in Chapter [6](#78624_3_En_6_Chapter.xhtml).'
