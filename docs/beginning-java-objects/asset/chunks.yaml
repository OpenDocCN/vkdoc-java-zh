- fmt: '## Javadoc Comments


    In Chapter [2](#78624_3_En_2_Chapter.xhtml), we briefly mentioned the notion of
    **Java documentation comments** (a.k.a. “**javadoc**” **comments**), a special
    type of comment from which we can automatically generate HTML documentation for
    an application. Let’s explore how this is accomplished.


    Java documentation comments, like traditional comments, can span multiple lines
    of code. However, javadoc comments start with a slash followed by **two** asterisks
    `/**` and end with an asterisk slash `*/`. Within the body of a javadoc comment,
    we are able to use a number of predefined **javadoc tags** (whose names start
    with “`@`”) to control how the resultant HTML will look.


    Here’s a simple `Person` class that incorporates javadoc comments (**bolded**):


    ```

    // Person.java

    /**

    * A person is a human being. We might use a Person to represent a student

    * or a professor in an academic setting.

    */

    public class Person {

    //------------

    // Attributes.

    //------------

    /**

    * A person''s legal name. Typically represented as

    * "FirstName I. LastName".

    */

    public String name;

    /**

    * A person''s age in years. No matter how imminent a person’s next birthday

    * is, their age will always reflect how old they were at their most

    * recent birthday.

    */

    private int age;

    //-------------

    // Constructor.

    //-------------

    /**

    * This constructor initializes attributes name and age.

    * @param n the Person''s name, in first name - middle initial –

    * last name order.

    * @param a the Person''s age.

    */

    public Person(String n, int a) {

    name = n;

    age = a;

    }

    /**

    * This method is used to determine a person''s age in dog years.

    */

    public double dogYears() {

    return age/7.0;

    }

    }

    ```


    Here are some observations about the preceding example:


    *   `public` features automatically appear in javadoc-generated documentation;
    `private` features, by default, do not. Thus, despite the fact that we’ve documented
    the `private age` attribute in javadoc style, `age` will not be reflected in the
    resultant HTML documentation, as we’ll see in a moment.


    *   `@param` is a javadoc-specific tag used to define the purpose of a particular
    parameter to a method; the general syntax for its use is `@param` *parameterName
    description*.


    *   Intervening blank lines and/or non-javadoc comments, if present, are ignored
    by the `javadoc` utility:


    ```

    /**

    * A person''s legal name. Typically represented as "FirstName I. LastName".

    */

    // Having a non-Javadoc comment here won’t hurt, nor will intervening

    // blank lines.

    public String name;

    ```


    To generate HTML documentation for this class, we use the command-line `javadoc`
    utility that comes standard with the Java Development Kit (JDK). We can either
    type the command


    ```

    javadoc Person.java

    ```


    to generate documentation for a single class, or we may type


    ```

    javadoc *.java

    ```


    if documentation is to be generated for more than one `.java` file at the same
    time.


    A number of files are automatically generated as a result of typing a `javadoc`
    command, as illustrated by the output shown in the following:


    ```

    C:\> javadoc Person.java

    Loading source file Person.java...

    Constructing Javadoc information...

    Standard Doclet version 1.5.0-beta2

    Building tree for all the packages and classes...

    Generating Person.html...

    Generating package-frame.html...

    Generating package-summary.html...

    Generating package-tree.html...

    Generating constant-values.html...

    Building index for all the packages and classes...

    Generating overview-tree.html...

    Generating index-all.html...

    Generating deprecated-list.html...

    Building index for all classes...

    Generating allclasses-frame.html...

    Generating allclasses-noframe.html...

    Generating index.html...

    Generating help-doc.html...

    Generating stylesheet.css...

    ```


    To view the resultant documentation, we use a web browser to load the `index.html`
    file, which will bring up the “home page” for our documentation, as shown in Figure
    [13-1](#78624_3_En_13_Chapter.xhtml#Fig1). (Note that the exact layout of this
    page may change from one Java version to another.)'
