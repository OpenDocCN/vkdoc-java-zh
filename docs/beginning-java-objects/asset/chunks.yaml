    We’ll put this `SRSPersistenceLayer` class to work shortly when we talk about
    the job of the controller, but first let’s take a look at building the presentation
    layer.


    ## Building a Web-Based Presentation Layer


    In order to build a web-based presentation layer, we must first determine all
    of the different web pages that will be necessary to provide the user with the
    functionality called for by the original requirements. For the SRS, a minimum
    collection of pages might include those illustrated in Figure [15-2](#78624_3_En_15_Chapter.xhtml#Fig2):


    ![](images/78624_3_En_15_Chapter/78624_3_En_15_Fig2_HTML.jpg)


    3 S R S user interface blocks labeled A, B, and C. A is a log-on window with the
    student I D and password. B displays the student I D and the courses, with the
    drop, add, and logoff buttons. C has the course catalog for Math 101, 102, and
    103 with register and return to course load buttons.


    **Figure 15-2** Minimal set of web pages required to build a simple SRS user interface


    - **A**: An initial logon page

    - **B**: A page that displays the logged-on student’s current course load, with
    buttons to add a course, drop a course, or log off

    - **C**: A page that lists all available sections sorted by department so that
    the student may search for and select courses of interest, with a button to register
    for a section or to return to their current course load page view without taking
    action


    Each page is comprised of static HTML content along with optional embedded executable
    code necessary to customize the page content for that user.


    For example, the initial logon page (A) would be all static HTML: a simple form
    with two input fields to collect the student’s unique ID number and password plus
    a submit button as sketched out in the following (note that this is incomplete
    HTML):


    The format of the logon page will never change and hence is wholly static HTML.


    By contrast, the page that displays the student’s list of registered courses needs
    to be **dynamically generated** to display the correct student’s current list
    of enrolled courses and thus might contain Java logic (underlined in the following)
    as follows (note that this is incomplete HTML):


    ```

    STUDENT NAME: student.getName()


    CURRENTLY ENROLLED IN:


    Collection enrolledIn = student.getEnrolledSections();

    for (Section section : enrolledIn) {

    out.println(section.getSectionNo() + " " section.getDayOfWeek()

    + " " + section.getTimeOfDay() + " " + section.getRoom());


    }

    ```


    The manner in which the student object referenced previously gets populated so
    that this code can be executed is illustrated in the section to follow.


    Note that each web page contains one or more FORMs, which in turn contain one
    or more SUBMIT buttons; clicking a SUBMIT button on a web page is what sends the
    completed form to the controller to start processing/reacting to the user’s actions.


    ## Example Controller Logic


    In some respects, you can think of the controller as a master “if-then-else” construct,
    determining which web page to display next based on the results of the user’s
    interaction with the previous web page displayed. This flow is illustrated with
    numbered arrows in Figure [15-3](#78624_3_En_15_Chapter.xhtml#Fig3); each arrow
    involves processing by the controller before the next page is displayed.


    ![](images/78624_3_En_15_Chapter/78624_3_En_15_Fig3_HTML.jpg)


    3 S R S user interface blocks labeled A, B, and C. A is a log-on window. B displays
    the student I D and the courses. C displays the course catalog. The log-on button
    in A leads to layer B. The drop button in B drops a course. The add button in
    layer B leads to C and adds a course.


    **Figure 15-3** The Controller monitors actions taken by the user (button presses)
    to determine which actions are to be performed behind the scenes. (Numbers in
    circles correspond with entries in the numbered event list below.)


    1.  If the student types in their student ID and password on web page A and clicks
    the Logon button, the controller will use the information provided by the student
    in the `STUDENTID` and `PASSWORD` input fields, calling the `initialize()` method
    of the `SRSPersistenceLayer` to query the database for a student with these credentials;
    if logon is successful, the controller will display web page B after executing
    the embedded code in that page to display the student’s current list of courses.


    2.  If the student clicks the Add button on web page B, the controller will use
    the `SRSPersistenceLayer` to query the database for a list of all available courses;
    the controller will then display web page C after executing code in web page C
    to display all of the courses as a list.


    3.  If the student selects a course on web page C and clicks the Register button,
    the controller will update the student object’s course load, use the `SRSPersistenceLayer`
    to store the newly updated student’s data in the database, and return to web page
    B after rerunning the code to display all of the students’ registered courses
    so that the newly added course will appear.


    4.  The Return to Course Load button on web page C effectively performs in similar
    fashion to the Register button on web page C.


    5.  If the student is viewing page B and wants to drop a section, they select
    the section from the list and click the Drop button. The controller will update
    the student object’s course load, use the data layer to store the newly updated
    student’s data in the database, and refresh page B by rerunning the code to display
    all of the student’s registered courses with the dropped course having been removed.


    6.  Clicking the Logoff button on screen B will disconnect the session from the
    database, logging the student off, and will redisplay logon page A.


