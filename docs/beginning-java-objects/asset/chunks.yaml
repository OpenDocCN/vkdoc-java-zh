  raw: '### Proper Use of Indentation


    One of the best ways to make a Java program readable is through proper use of
    indentation to clearly delineate its block structure. Statements within a block
    of code should be indented relative to the starting/ending line of the enclosing
    block (i.e., indented relative to the lines carrying the braces). The standard
    recommendation is to use four spaces (note that some of the examples in this book
    vary from that standard).


    To see how indentation can make a program readable, consider the following two
    programs. In the first simple program, proper indentation is used:


    ```

    public class IndentationExample {

    public static void main(String[] args) {

    for (int i = 1; i <= 4; i++) {

    System.out.print(i);

    if ((i == 2) || (i == 4))  {

    if (i == 2) {

    System.out.print("Two ");

    }

    else {

    System.out.print("Four ");

    }

    System.out.println("is an even number");

    }

    else if ((i == 1) || (i == 3))  {

    if (i == 1) {

    System.out.print("One ");

    }

    else {

    System.out.print("Three ");

    }

    System.out.println("is an odd number");

    }

    }

    }

    }

    ```


    And it’s relatively easy to see how the following output would be produced:


    ```

    1 is an odd number

    2 is an even number

    3 is an odd number

    4 is an even number

    ```


    Now let’s remove all indentation from the program:


    ```

    public class IndentationExample {

    public static void main(String[] args) {

    for (int i = 1; i <= 4; i++) {

    System.out.print(i);

    if ((i == 2) || (i == 4))  {

    if (i == 2) {

    System.out.print("Two ");

    }

    else {

    System.out.print("Four ");

    }

    System.out.println("is an even number");

    }

    else if ((i == 1) || (i == 3))  {

    if (i == 1) {

    System.out.print("One ");

    }

    else {

    System.out.print("Three ");

    }

    System.out.println("is an odd number");

    }

    }

    }

    }

    ```


    Both versions of this program are understood by the Java compiler, and both produce
    the same output when executed, but the first version is much more readable to
    a human being.


    Failure to properly indent not only makes programs unreadable but also makes them
    harder to debug, particularly if a compilation error arises due to unbalanced/missing
    braces. In such a situation, the compilation error message often gets reported
    on a line much later in the program than where the problem actually exists. For
    example, the following program is missing an opening/left brace on line 9, but
    the compiler doesn’t report an error until line 23:


    ```

    public class IndentationExample2 {

    public static void main(String[] args) {

    int x = 2;

    int y = 3;

    int z = 1;

    if (x >= 0) {

    if (y > x) {

    if (y > 2) // we''re missing a left brace here on line 9, but ...

    System.out.println("A");

    z = x + y;

    }

    else {

    System.out.println("B");

    z = x - y;

    }

    }

    else {

    System.out.println("C");

    z = y - x;

    }

    }

    else System.out.println("D");  // ... compiler first complains here!

    // (line 23)

    }

    }

    ```


    What’s even worse, the error message that the compiler generates in such a situation
    can be rather cryptic. In this particular example, the compiler (incorrectly)
    points to line 23 as the problem, with a misleading error message:


    ```

    IndentationExample2.java:23: illegal start of type

    else System.out.println("D");

    ^

    ```


    This error message doesn’t help us locate the ***real*** problem on line 9\. However,
    at least we’ve properly indented our code, and so it will likely be far easier
    to hunt down the missing brace than it would be if our indentation were sloppy
    or nonexistent.


    If ever you get a compilation error that makes absolutely no sense whatsoever,
    consider looking earlier in the program for missing punctuation—that is, a missing
    brace, parenthesis, or semicolon!


    Sometimes, we have so many levels of nested indentation, or individual statements
    are so long, that lines wrap when viewed in an editor or printed as hard copy:


    ```

    while (a  d) {

    for (int j = 0; j < 29; j++) {

    x = y + z + a - b + (c * (d / e) + f) -

    g + h + j - l - m - n + o + p * q / r + s;

    }

    }

    }

    ```


    To avoid this, it’s best to break the line in question along white space or punctuation
    boundaries, indenting continuation lines relative to the start of the line:


    ```

    while (a  d) {

    for (int j = 0; j < 29; j++) {

    // This is cosmetically preferred.  Note indentation

    // of continuation lines.

    x = y + z + a - b + (c * (d / e) + f) -

    g + h + j - l - m - n + o + p *

    q / r + s;

    }

    }

    }

    ```


    ### Use Comments Wisely


    Another important feature that makes code more readable is the liberal use of
    meaningful comments. Always keep in mind when writing code that ***you*** may
    know what you’re trying to do, but someone else trying to read your code may not.
    (Actually, we sometimes even need to remind ***ourselves*** of why we did what
    we did if we haven’t looked at code that we’ve written in a while.)


    Here are some basic rules of thumb:


    *   If there can be any doubt as to what a passage of code does, precede it with
    a comment.


    *   Indent each comment to the same level as the block of code or statement to
    which it applies.


    ### Placement of Braces


    For block-structured languages that use braces to delimit the start/end of blocks,
    there are two general schools of thought as to where the ***left/opening*** brace
    of a code block should be placed.


    The first style is to place an opening brace at the ***end*** of the line of code
    that starts a given block. Each closing brace goes on its own line, aligned with
    the ***first*** character of the line containing the opening brace:


    ```

    public class Test {

    public static void main(String[] args) {

    for (int i = 0; i < 3; i++) {

    System.out.println(i);

    }

    }

    }

    ```


    An alternative brace placement style is to place every opening brace on a line
    by itself, aligned with the immediately preceding line. Each closing brace goes
    on its own line as before, aligned with the corresponding opening brace:


    ```

    public class Test

    {

    public static void main(String[] args)

    {

    for (int i = 0; i < 3; i++)

    {

    System.out.println(i);

    }

    }

    }

    ```


    Either approach to left/opening brace placement is fine; the first of the two
    approaches produces code listings that are a bit more compact (i.e., contain less
    white space) and is the more popular of the two styles. It’s a good practice to
    maintain consistency in your code, however, so pick whichever brace placement
    style you prefer and stick with it.


    ### Descriptive Variable Names


    As with indentation and comments, the goal when choosing variable names is to
    make a program as readable, and hence self-documenting, as possible. Avoid using
    single letters as variable names, except for loop control variables (or as parameters
    to methods, discussed later in the book).


    Abbreviations should be used sparingly and only when the abbreviation is commonly
    used and widely understood by developers. Consider the following variable declaration:


    ```

    int grd;

    ```


    It’s not completely clear what the variable name `grd` is supposed to represent.
    Is the variable supposed to represent a grid, a grade, or a gourd? A better practice
    would be to spell out the entire word:


    ```

    int grade;

    ```


    At the other end of the spectrum, names that are too long, such as perhaps


    ```

    double averageThirdQuarterReturnOnInvestment;

    ```


    can make a code listing overwhelming to anyone trying to read it. It can sometimes
    be challenging to shorten a variable name while still keeping it descriptive,
    but do try to keep the length of your variable names within reason, for example:


    ```

    double avg3rdQtrROI;

    ```'
