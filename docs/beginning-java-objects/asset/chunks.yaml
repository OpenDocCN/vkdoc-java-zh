- fmt: '### Creating Jar Files


    We start by compiling our code:


    ```

    javac *.java

    ```


    Then, to create a jar file, we type:


    ```

    jar cvf jarfilename.jar list_of_files_to_be_included_in_jar_file

    ```


    where the command-line argument `cvf` indicates that:


    - We wish to `c`reate a jar file.

    - We wish the command to be `v`erbose — that is, we want the command to display
    everything that is going on as the jar file is created.

    - We are designating the (`f`ile)name of the jar file that is to be created.


    For example, to place our simple application’s bytecode into a jar file named
    `MyJar.jar`, we’d type:


    ```

    jar cvf MyJar.jar Person.class Student.class Professor.class MyApp.class

    ```


    (Note that the bytecode files can be listed in any order). Alternatively, we could
    use a wildcard character to include multiple files at once:


    ```

    jar cvf MyJar.jar *.class

    ```


    Because of our use of the `v` (verbose) command option, the following output would
    be displayed by the `jar` utility:


    ```

    added manifest

    adding: Person.class(in = 222) (out= 178)(deflated 19%)

    adding: Student.class(in = 419) (out= 287)(deflated 31%)

    adding: Professor.class(in = 219) (out= 176)(deflated 19%)

    adding: MyApp.class(in = 1751) (out= 1021)(deflated 41%)

    ```


    Note that we can include any type of file that we wish in a jar file, not only
    bytecode files. For example, if we want to archive our source code along with
    our bytecode, we can type the command:


    ```

    jar cvf MyJar.jar *.class *.java

    ```


    A jar file is a ZIP file in disguise. While we’ll create, inspect, and (occasionally)
    extract individual bytecode files from a jar file via the command-line `jar` utility
    that comes with the Java Development Kit (JDK), many standard ZIP utilities are
    also able to read/extract files from jar files. Thus, as with ZIP files, we can
    store literally any file type within a jar: source code, bytecode, image files,
    even other jar files.


    ### Inspecting the Contents of a Jar File


    To inspect/list the contents of a jar file without “unjarring” (extracting) files,
    we use the command:


    ```

    jar tvf jarfilename.jar

    ```


    where the `t` command-line argument indicates that we wish to see a `t`able of
    contents for the named jar file, for example:


    ```

    jar tvf MyJar.jar

    ```


    Output:


    ```

    0 Sun Feb 20 13:55:34 EST 2005 META-INF/

    71 Sun Feb 20 13:55:34 EST 2005 META-INF/MANIFEST.MF

    222 Mon Feb 07 16:07:16 EST 2005 Person.class

    419 Fri Feb 18 10:06:02 EST 2005 Student.class

    219 Mon Feb 07 16:07:16 EST 2005 Professor.class

    1751 Wed Feb 06 07:36:44 EST 2002 MyApp.class

    ```


    Once our jar file is created, it is a simple matter to share that file with a
    user or another developer, perhaps by sending it to them as an email attachment
    or by storing it in a shared location on a network file system.


    ### Using the Bytecode Contained Within a Jar File


    To inform the JVM that we want to use the bytecode within a jar file, we use a
    command-line option to set an environment variable called the **classpath** as
    follows:


    ```

    java –cp path_to_jar_file class_containing_main_method

    ```


    For example, if we store our `MyJar.jar` file in a shared directory by the name
    of `S:\applications`, then to execute the `MyApp` program that is stored within
    that jar file, we would type:


    ```

    java –cp S:\applications\MyJar.jar MyApp

    ```


    If more than one jar file is to be referenced at the same time, the references
    are separated by semicolons under DOS and colons under UNIX, for example, under
    DOS:


    ```

    java –cp S:\applications\MyJar.jar;T:\stuff\AnotherJar.jar SomeApp

    ```


    ### Extracting Contents from Jar Files


    Note that we need not extract bytecode from a jar file in order to use it; the
    JVM is able to retrieve individual bytecode files from within jar files as needed.
    However, should we ever wish to extract selected files from a jar file — say that
    Java source files were included and we’d like to work with individual source files
    — we’d type the command:


    ```

    jar xvf jarfilename.jar space_separated_list_of_files_to_be_extracted

    ```


    For example:


    ```

    jar xvf MyApp.jar Student.java Professor.java

    ```


    where the `x` command option indicates that we wish to e`x`tract files; to extract
    all source code in a jar file, we’d type:


    ```

    jar xvf MyApp.jar *.java

    ```


    And to extract everything from a jar file, we’d type:


    ```

    jar xvf MyApp.jar

    ```


    Note that if you extract the contents of a jar file into a directory that contains
    files by the same names as those you are extracting, the extracted files will
    automatically overwrite similarly named files; you will not be warned beforehand!
    So it’s a good idea to make a backup copy of the files in a directory before “unjarring”
    a jar file there or, alternatively, to always “unjar” a file in a separate empty
    directory.


    ### “Jarring” Entire Directory Hierarchies


    It’s possible to incorporate the contents of an entire directory hierarchy (all
    subfolders) into a single jar file via the command:


    ```

    jar cvf jarFileName topLevelDirectoryName

    ```


    For example, the SRS code examples that accompany this book are stored within
    a hierarchy of directories on my computer under a parent directory named `C:\My
    Documents\BJO Second Edition\Code`. To create a jar file containing all of the
    code, I’d type the command:


    ```

    jar cvf BJOcode.jar "C:\My Documents\BJO Second Edition\Code"

    ```


    (note that we use double quotes to surround a path if it contains blank spaces)
    or, alternatively:


    ```

    cd "C:\My Documents\BJO Second Edition"

    jar cvf BJOcode.jar Code

    ```


    The resultant output, excerpted in the following, illustrates how all of the subdirectories
    are traversed so as to include their contents in the jar file:


    ```

    added manifest

    adding: Code/(in = 0) (out= 0)(stored 0%)

    adding: Code/Ch14/(in = 0) (out= 0)(stored 0%)

    adding: Code/Ch14/SRS/(in = 0) (out= 0)(stored 0%)

    adding: Code/Ch14/SRS/Course.java(in = 2784) (out= 953)(deflated 65%)

    adding: Code/Ch14/SRS/EnrollmentStatus.java(in = 872) (out= 438)(deflated 49%)

    adding: Code/Ch14/SRS/Person.java(in = 1223) (out= 513)(deflated 58%)

    adding: Code/Ch14/SRS/Professor.java(in = 2967) (out= 1122)(deflated 62%)

    etc.

    adding: Code/Ch15/(in = 0) (out= 0)(stored 0%)

    adding: Code/Ch15/SRS/(in = 0) (out= 0)(stored 0%)

    adding: Code/Ch15/SRS/Course.java(in = 2784) (out= 953)(deflated 65%)

    adding: Code/Ch15/SRS/CourseCatalog.java(in = 1640) (out= 713)(deflated 56%)

    etc.

    adding: Code/Ch16/(in = 0) (out= 0)(stored 0%)

    adding: Code/Ch16/BeanExample.java(in = 668) (out= 378)(deflated 43%)

    adding: Code/Ch16/BorderLayoutLayout.java(in = 1272) (out= 470)(deflated 63%)

    adding: Code/Ch16/BorderLayoutLayout2.java(in = 1279) (out= 476)(deflated 62%)

    adding: Code/Ch16/Calculator1.java(in = 2449) (out= 966)(deflated 60%)

    adding: Code/Ch16/Calculator2.java(in = 2462) (out= 921)(deflated 62%)

    adding: Code/Ch16/Calculator3.java(in = 3514) (out= 1229)(deflated 65%)

    etc.

    adding: Code/Ch16/SRS/(in = 0) (out= 0)(stored 0%)

    adding: Code/Ch16/SRS/Course.java(in = 2784) (out= 953)(deflated 65%)

    adding: Code/Ch16/SRS/CourseCatalog.java(in = 1640) (out= 713)(deflated 56%)

    etc.

    ```'
