    既然一个 `catch` 子句就足够了，为什么我们还要费心使用***三个*** `catch` 子句呢？因为我们捕获的异常越具体，我们的恢复代码就可以越具体：


    ```

    try {

    // 伪代码。

    数据库访问操作，可能会抛出多种异常，

    包括 DataTruncation 异常等...

    }

    catch (DataTruncation e1) {

    // 伪代码。

    专门响应数据截断问题...

    }

    catch (SQLWarning e2) { ... }

    catch (SQLException e3) { ... }

    ```


    以下替代版本是***不***合适的，因为这三个 `catch` 子句是按照从最不具体到最具体的顺序列出的；因此，***第一个*** `catch` 子句总是会捕获所有形式的
    `SQLException`，而后两个 `catch` 子句将永远不会被执行：


    ```

    try {

    // 伪代码。

    数据库访问操作...

    }

    catch (SQLException e1) {

    // 这个 catch 子句会捕获任何/所有 SQLException，

    // 包括 SQLWarning 和 DataTruncation ... 细节省略。

    }

    catch (SQLWarning e2) {

    // 这个 catch 子句是浪费的——它永远不会被执行！

    }

    catch (DataTruncation e3) {

    // 这个 catch 子句也是浪费的——它永远不会被执行！

    }

    ```


    ### 捕获通用异常类型


    一些程序员使用“懒惰”的方法，捕获最通用的 `Exception` 类型，然后***不做任何***恢复操作，仅仅是为了让编译器闭嘴：


    ```

    try {

    // 伪代码。

    做任何事情！！！

    }

    catch (Exception e) { } // 空花括号 => 不做任何恢复操作！！！

    ```


    ***这不是一个好习惯！*** 这样做，我们掩盖了异常已经发生的事实：我们的程序可能处于严重的功能失调状态，也许正在嘎然而止 (!)，但会保持***沉默***，不说明原因，因为前面展示的
    `catch` 子句抑制了通常会显示的典型堆栈跟踪。


    这并不是说我们永远不应该捕获通用的 `Exception`；一个我们可能希望这样做的合理情况是，如果我们正在为应用程序编写一个特殊用途的错误处理子系统，如下面的伪代码所示：


    ```

    public class Example {

    public static void main(String[] args) {

    try {

    // 伪代码。

    我们所有的主应用程序逻辑都在这里...

    }

    catch (Exception e) {

    // 调用我们编写的自定义

    // MyExceptionHandler 类上的一个静态方法。

    MyExceptionHandler.handleException(e);

    }

    }

    }

    ```


    这里我们假设，我们开发的自定义 `MyExceptionHandler` 类的静态 `handleException` 方法封装了以集中、一致的方式处理整个应用程序中生成的所有异常的逻辑（例如，通过将它们记录在应用程序日志文件中，或实时向系统管理员发出问题警报）。


    ### 编译器对异常处理的强制要求


    一般来说，Java 编译器会强制我们将可能抛出异常的代码包含在一个带有适当 `catch` 块（或多个块）的 `try` 块中。例如，如果我们尝试从文件中读取数据，就像我们将在第
    15 章中实际做的那样：


    ```

    public class FileIOExample {

    public static void main(String[] args) {

    // 伪代码。

    打开目标文件；

    while (尚未到达文件末尾) {

    从文件中读取下一行；

    // 等等。

    }

    }

    }

    ```


    我们会收到编译器错误，抱怨我们打开文件、从文件读取等尝试必须被处理：


    ```

    未报告的异常 java.io.FileNotFoundException；必须被捕获或声明抛出

    ```


    在这种情况下，我们有两个选择：


    *   理想情况下，我们会将相关代码包含在一个带有适当 `catch` 块（或多个块）的 `try` 块中：


    *   或者，我们可以向可能引发未捕获异常的方法的头部添加一个 throws 子句，如下所示：


    ```

    import java.io.FileNotFoundException;

    public class FileIOExample {

    public static void main(String[] args) {

    try {

    // 伪代码。

    打开目标文件；

    while (尚未到达文件末尾) {

    从文件中读取下一行；

    // 等等。

    }

    }

    catch (FileNotFoundException e) { ... }

    // 等等。

    ```


    ```

    import java.io.FileNotFoundException;

    public class FileIOExample {

    // 通过在 main 方法声明中添加 throws 子句，我们避免了

    // 担心捕获 FileNotFoundException。

    public static void main(String[] args) throws FileNotFoundException {

    // 伪代码。

    打开目标文件；

    while (尚未到达文件末尾) {

    从文件中读取下一行；

    // 等等。

    }

    }

    }

    ```


    编译器不强制要求捕获的唯一异常类型是那些派生自 `RuntimeException` 类的异常，而 `RuntimeException` 是 `Exception`
    类的直接子类。几种更常见的 `RuntimeException` 类型是 `NullPointerException`、`ArithmeticException`（当我们尝试非法的算术运算时发生，例如除以零）和
    `ClassCastException`（正如我们在第 7 章中讨论的，如果我们尝试错误地将对象引用转换为不合适的类型时发生）。通常，这些类型的异常代表了设计缺陷，我们应该在构建应用程序时，在其投入生产之前，就对其进行“防弹”处理。


    ### 利用我们捕获到的异常


    请注意，`catch` 子句的声明看起来有点像方法头声明，因为我们声明了一个 `Exception` 类型（或其子类型之一）的参数，作为参数传递给 `catch`
