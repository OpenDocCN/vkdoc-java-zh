    ```

    public class NaiveStudent extends BadStudent { ...

    ```


    假设他们将从我们的 `BadStudent` 超类继承一个***有意义的*** `printStudentInfo` 版本。考虑到继承的“全有或全无”特性，尤其是如果其他开发者无法访问
    `BadStudent` 的***源代码***来查看，他们这样假设是合理的。不幸的是，由于我们破坏了“is a”关系的精神，以损害 `printStudentInfo`
