    ```


    Of course, we’d store this class definition in a `.java` file`—MissingValueException.java`
    in this particular case`—`and compile it into a bytecode file named `MissingValueException.class`.


    As to what we program in the body of our custom exception, we have several options.
    The simplest of all user-defined exceptions is a class with an ***empty body***:


    ```

    public class MissingValueException extends Exception { }

    ```


    As trivial as this class is, we’ve nonetheless accomplished an important goal:
    namely, we’ve defined a new exception type, `MissingValueException`, which can
    be explicitly thrown and caught by our application. We’ll illustrate how this
    is done shortly, but before we do so, let’s improve upon our custom exception
    class design a bit by introducing a constructor as shown in the following:


    ```

    public class MissingValueException extends Exception {

    // We''ve added a constructor ...

    public MissingValueException(String message) {

    // ... which simply invokes the base class constructor.

    super(message);

    }

    }

    ```


    Why might we want to do this?


    *   Recall that the generic `Exception` class declares a method with the header
    `String getMessage()` that can be used to extract an informative message from
    an exception when we catch it.


    *   The text of this message is originally fed into an `Exception` instance as
    an argument via the constructor `public Exception(String message)`.


    The `getMessage` method will of course be inherited by the `MissingValueException`
    class. However, as we discussed previously, constructors are not inherited, and
    so if we want to initialize the message of a `MissingValueException` instance
    in a similar fashion, we must explicitly declare such a constructor for our `MissingValueException`
    class; we may then reuse the code of the Exception superclass constructor via
    the syntax `super(message);`


    Let’s make one final enhancement to our `MissingValueException` class. As a subclass,
    we are free to add whatever features make sense above and beyond those that are
    inherited from the superclass; so we’ll add one attribute, `Student student`,
    plus a `get` method for this attribute. The purpose for doing so will become clear
    in a moment. We’ll also modify the constructor header to accommodate ***two***
    parameters`—`a `String` message and a `Student—`as shown in the following:


    ```

    public class MissingValueException extends Exception {

    // We''ve added an attribute ...

    private Student student;

    // ... modified our constructor to take two arguments so

    // that we can pass in a value for both the Student attribute

    // and the message that this exception will carry with it ...

    public MissingValueException(Student s, String message) {

    super(message);

    student = s;

    }

    // ... and added a get method for our Student attribute.

    public Student getStudent() {

    return student;

    }

    }

    ```


    This is about as elaborate as a custom exception needs to be in order to give
    us maximum versatility.'
