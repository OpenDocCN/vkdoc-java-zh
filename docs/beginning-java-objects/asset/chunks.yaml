    \ is more abstract than an abstract class*** (which is in turn more abstract than\
    \ a concrete class) because an interface leaves even more details to the imagination.\n\
    \n**Reformat as editorial note** As of Java 8, the notion of a **functional interface**\
    \ was introduced; such interfaces differ a bit in terms of the rules for declaring\
    \ and using them beyond the scope of this chapter to discuss.\n\n### Implementing\
    \ Interfaces\n\nOnce we’ve defined an interface such as `Teacher`, we can set\
