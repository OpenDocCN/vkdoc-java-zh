- fmt: '### Scenario #2 for the “Register for a Course” Use Case


    In this scenario, Fred once again attempts to register for a course. While he
    meets all of the requirements, the requested section is unfortunately full. The
    SRS offers Fred the option of putting his name on a waitlist. The specific sequence
    of events is as follows:


    1. Fred, a student, logs on to the SRS.

    2. Fred views the schedule of classes for the current semester to determine which
    section(s) he wishes to register for.

    3. Fred requests a seat in a particular section of a course entitled “Beginning
    Object Concepts,” course number `OBJ101`, section 1.

    4. Fred’s plan of study is checked to ensure that the requested course is appropriate
    for his overall degree goals.

    5. His transcript is checked to ensure that he has satisfied all of the prerequisites
    for the requested course, if any.

    6. Seating availability in the section is checked, but the section is found to
    be full.

    7. Fred is asked if he wishes to be put on a first-come, first-served waitlist.

    8. Fred elects to be placed on the waitlist.


    With a little imagination, you can undoubtedly think of numerous other scenarios
    for this use case, involving such circumstances as Fred having requested a course
    that isn’t called for by his plan of study or a course for which he hasn’t met
    the prerequisites. And there are many other use cases to be considered, as well,
    as were discussed in Chapter [9](#78624_3_En_9_Chapter.xhtml).


    Are there practical limits to the number of alternative scenarios that we should
    consider for a given use case? As with all requirements analysis, the criteria
    for when to stop are somewhat subjective. We stop when it appears that we can
    no longer generate significantly different scenarios; trivial variations are to
    be avoided.


    When devising scenarios, it’s often helpful to observe the future users of the
    system that we’re modeling as they go about performing the same business functions
    today. In the case of student registration, for example, what manual or automated
    steps does a student have to go through presently to register for a course? What
    steps does the university take before deeming a student eligible to register?
    Whether the registration process is 100 percent manual at present or is based
    on an automated system that you’re going to be replacing or augmenting, observing
    the steps that are involved today in carrying out a particular business goal can
    serve as the basis for one or more useful scenarios.


    Scenarios, once written, should be added to our project’s use case documentation;
    generally, we pair all scenarios with their associated use cases in that document.


    Why are scenarios so important? Because they’re the means by which we start to
    gain insight into the behaviors that will be required of our objects. We’ll need
    a way to formalize these scenarios so that the actual methods needed for each
    of our classes become apparent; UML sequence diagrams are the means by which we
    do so, so let’s now discuss how to prepare these.


    ## Sequence Diagrams


    Sequence diagrams are one of two types of UML interaction diagrams (we’ll explore
    the second type, communication diagrams, a bit later in this chapter). Sequence
    diagrams are a way of graphically portraying how messages should flow from one
    object to another in carrying out a given scenario.


    We’ll illustrate the process of creating a sequence diagram by creating one for
    Scenario #1 of the “Register for a course” use case.


    ### Determining Objects and External Actors for Scenario #1


    To prepare a sequence diagram, we must first determine:


    - Which classes of objects (from among those that we specified in our static model
    [class diagram] in Chapter [10](#78624_3_En_10_Chapter.xhtml)) are involved in
    carrying out a particular scenario

    - Which external actors are involved


    Looking back at Scenario #1 for the “Register for a course” use case, we determine
    that the following objects are involved:


    - One `Student` object (representing Fred)

    - One `Section` object (representing the course entitled “Beginning Object Concepts,”
    course number `OBJ101`, section number 1)

    - One `PlanOfStudy` object, belonging to Fred

    - One `Transcript` object, also belonging to Fred


    The scenario also mentions that the student “views the schedule of classes for
    the current semester to determine which section(s) he wishes to register for.”
    You may recall that when we were determining what our candidate classes should
    be back in Chapter [10](#78624_3_En_10_Chapter.xhtml), we debated whether or not
    to add `ScheduleOfClasses` as a candidate class to our model, and we elected to
    leave it out at that time. In order to fully represent the details of Scenario
    #1, we’re going to reverse that decision and retrofit `ScheduleOfClasses` into
    our UML class diagram now as follows:


    - We’ll show `ScheduleOfClasses` participating in a one-to-many aggregation with
    the `Section` class because one `ScheduleOfClasses` object will be instantiated
    per semester to represent all of the sections that are being taught that semester.
    (It’s an abstraction of the paper booklet or online schedule that students look
    at in choosing which classes they wish to register for in a given semester.)

    - We’ll also transfer the `semester` attribute from the `Section` class to `ScheduleOfClasses`.
    Since each `Section` object will now be maintaining a handle on its associated
    `ScheduleOfClasses` object by virtue of the aggregation relationship between them,
    a `Section` object will be able to request semester information whenever it is
    needed.


    The results of these changes to our class diagram are highlighted in Figure [11-7](#78624_3_En_11_Chapter.xhtml#Fig7).


    ![](images/78624_3_En_11_Chapter/78624_3_En_11_Fig7_HTML.jpg)


    *Figure 11-7 Fine-tuning the UML diagram*


    Acknowledging `ScheduleOfClasses` as a class in our model allows us to now reference
    a `ScheduleOfClasses` object in our sequence diagram, as we’ll see in a moment.
    Scenarios often unearth new classes, attributes, and relationships, thus contributing
    to our structural “picture” of the system; this is a common occurrence and is
    a desirable side effect of dynamic modeling.


    Of course, we must also remember to add a definition of `ScheduleOfClasses` to
    our data dictionary.


    **ScheduleOfClasses**: A list of all classes/sections that are being offered for
    a particular semester; students review the schedule of classes to determine which
    sections they wish to register for.


    Finally, since the scenario explicitly mentions interactions between the student
    user and the system, we’ll reflect Fred the actor separately from Fred the object.
    Doing so will allow us to represent the SRS interacting externally with the user,
    as well as showing the system’s internal object-to-object interactions. We refer
    to an object that represents an abstraction of an actor as an instance of a boundary
    class.


    Our adjusted list of object/actor participants is now as follows:


    - One `Student` object (representing Fred)

    - One `Section` object (representing the course entitled “Beginning Objects,”
    course number `OBJ101`, section number 1)

    - One `PlanOfStudy` object, belonging to Fred

    - One `Transcript` object, also belonging to Fred

    - One `ScheduleOfClasses` object

    - One `Student` actor (Fred again!)'
