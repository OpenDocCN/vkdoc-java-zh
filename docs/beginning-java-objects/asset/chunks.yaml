  trans: '

    ### 初始化数组内容


    如前所述，可以使用索引将值分配给数组的各个元素；或者，我们也可以在首次实例化数组时，通过单个 Java 语句用一组完整的值来初始化数组。在后一种情况下，初始值以逗号分隔的列表形式提供，并括在花括号中。例如，以下代码实例化并初始化了一个包含五个元素的
    `String` 数组：


    ```

    String[] names = { "Steve", "Jacquie", "Chloe", "Shylow", "Baby Grode" };

    ```


    Java 会自动统计我们提供的初始值的数量，并相应地调整数组大小。上述方法比下面展示的等效替代方案要简洁得多：


    ```

    String[] names = new String[5];

    names[0] = "Steve";

    names[1] = "Jacquie";

    names[2] = "Chloe";

    names[3] = "Shylow";

    names[4] = "Baby Grode";

    ```


    然而，两种方式的结果是相同的：实例化了一个容量为 5 的数组对象，数组的第零个（第一个）元素将引用 `String "Steve"`，下一个元素将引用 `"Jacquie"`，依此类推。


    请注意，在数组实例化***之后***，无法以单独代码行的方式通过这种方式批量加载数组。也就是说，以下代码将无法编译：


    ```

    String[] names = new String[4];

    // 下一行代码无法编译。

    names = {"Mike", "Cheryl", "Mickey", "Will" };

    ```


    如果在首次实例化数组时没有提供一组逗号分隔的初始值，数组的元素将自动初始化为其零等效值：


    *   `int` 数组将被初始化为包含整数零（`0`）。

    *   `double` 数组将被初始化为包含浮点零（`0.0`）。

    *   `boolean` 数组将被初始化为每个元素包含值 `false`。

    *   以此类推。


    并且，如果我们声明并实例化一个旨在保存对象引用的数组，例如：


    ```

    Student[] studentBody = new Student[100];

    ```


    那么我们将得到一个填充了 `null` 值的数组对象。


    ### 操作对象数组


    要用 `null` 以外的值填充我们的 `Student` 数组，我们必须将 `Student` 对象引用单独存储到数组的每个元素中。如果我们想创建***全新的***
    `Student` 对象来存储到数组中，可以编写如下代码：


    ```

    studentBody[0] = new Student("Fred");

    studentBody[1] = new Student("Mary");

    // 等等。

    ```


    或者


    ```

    Student s = new Student("Fred");

    studentBody[0] = s;

    // 重用 s！

    s = new Student("Mary");

    studentBody[1] = s;

    // 等等。

    ```


    在后一个示例中，请注意我们正在“回收”***同一个***引用变量 `s` 来创建许多***不同的*** `Student` 对象。这是可行的，因为在每次实例化之后，我们将每个新创建对象的***第二个***句柄存储在数组元素中，从而允许
    `s` 释放它对***该***对象的***其***句柄，如图 6-8 所示。这种技术在几乎所有面向对象编程语言中，都***所有***集合类型中频繁使用。


    ![](img/78624_3_En_6_Fig8_HTML.png)


    从上到下的 3 个示意图。顶部示意图有一个标记为 s 的学生对象气泡和 3 个学生身体数组块。中间示意图中，气泡连接到学生身体的第一个块。底部示意图有 2
    个独立的学生对象气泡，其中 1 个映射到第一个块。


    图 6-8


    使用单个引用变量作为临时句柄，将新对象逐个放入集合中


    然而，如果我们只是使用默认（无参数）构造函数来实例化“基础”的 `Student` 对象，我们可能会使用循环结构来填充数组，并完全消除对引用变量 `s` 的需求：


    ```

    for (int i = 0; i < 20; i++) {

    // 我们正在使用默认构造函数。

    studentBody[i] = new Student();

    }

    ```


    假设我们已经完全填充了 `studentBody` 数组的所有元素，那么对数组中任何特定已填充元素的索引引用——例如 `studentBody[i]`——就代表一个
    `Student` 对象，并且可以相应地使用。例如，在下面的代码行中，我们正在调用这样一个 `Student` 对象的 `getName` 方法：


    ```

    studentBody[i].getName();  // 我们使用点符号来调用 studentBody[i] 上的方法，

    // studentBody[i] 是数组引用的第 i 个 Student 对象。

    ```


    能够以这种方式引用集合中的单个对象，使我们能够使用循环结构遍历集合，逐个处理其中的对象。例如，让我们使用一个 `for` 循环来遍历 `studentBody`
    数组中的所有 `Student` 对象，以打印它们的名字——本质上，我们是在打印学生名册：


    ```

    // 遍历数组的所有元素。

    for (int i = 0; i < studentBody.length; i++) {

    System.out.println(studentBody[i].getName());

    }

    ```


    注意 `for` 循环的停止条件：


    ```

    i < studentBody.length

    ```


    事实证明，数组有一个名为 `length` 的***公共属性***，其值表示数组的容量，即它可以容纳的元素数量。由于我们从 0 开始计数第一个元素，我们必须停在
    `length` 值的前一个位置，以避免超出数组末尾。


    如果我们在运行时意外地尝试超出数组末尾，如下例所示：


    ```

    // 数组 x 包含 3 个元素，索引为 0、1 和 2。

    int[] x = new int[3];

    // 然而，我们没有停在元素 2，而是在循环中意外地尝试访问

    // 到（不存在的）元素 3：

    for (int i = 0; i <= 3; i++) {

    System.out.println(x[i]);

    }

    ```


    我们将收到以下***运行时***错误消息：


    ```

    Exception in thread "main" java.lang.ArrayIndexOutOfBoundsException: 3

    ```


    我们将在第 13 章讨论如何通过一种称为**异常处理**的机制，在程序上预见并处理这些类型的运行时故障——称为**异常**。

    '
- fmt: "注意，`length`属性是一个***只读***属性——也就是说，我们不能显式地为其赋值，例如试图在运行时扩大数组（回想一下，这是不可能的：数组一旦确定大小，就无法扩展）。如果我们尝试这样做，如下面的代码片段所示：\n\
    \n```\nint[] x = new int[3];\n// 让我们天真地尝试扩大数组 x！\nx.length = 10;\n```\n\n将会得到以下编译错误：\n\
    \n```\ncannot assign a value to final variable length\n```\n\n我们将在第[7](#78624_3_En_7_Chapter.xhtml)章中重新讨论`final`变量。\n\
    \n在遍历对象引用数组时，我们也必须小心，以避免因空/`null`元素而导致的“地雷”。也就是说，如果我们在遍历一个数组，但该数组并未完全填充`Student`对象引用，那么一旦我们遇到第一个空/`null`元素，调用`getName`方法就会失败，因为本质上我们是在试图与一个不存在的对象通信。让我们看一个例子：\n\
    \n```\n// 当我们首次实例化一个对象引用数组时，所有单元格都包含值 null。\nStudent[] students = new Student[3];\n\
    // 在单元格 0 和 1 中存储 Student 对象引用，但保留\n// 单元格 2 为空（即，它保留默认值 null）。\nstudents[0] =\
    \ new Student(\"Elmer\");\nstudents[1] = new Student(\"Klemmie\");\n// 尝试遍历数组，打印每个\
    \ Student 的名字。\n// 元素 2 处潜伏着一个“地雷”！！！\nfor (int i = 0; i < studentBody.length;\
    \ i++) {\n    System.out.println(studentBody[i].getName());\n}\n```\n\n如果执行这段代码，一旦`i`的值达到2，我们将得到以下***运行时***错误信息：\n\
    \n```\nException in thread \"main\" java.lang.NullPointerException\n```\n\n因为`studentBody[2]`的值是`null`；我们无法在一个不存在的对象上调用方法（即“与之通信”）。\n\
    \n同样，我们将在第[13](#78624_3_En_13_Chapter.xhtml)章中介绍如何处理运行时异常。\n\n有一种简单的方法可以避免数组中的此类“地雷”——在尝试访问某个位置的元素之前，先检查该数组元素的值是否为`null`：\n\
