  trans: '

    ## 关联类


    有时我们会遇到这样的情况：识别出一个对模型至关重要的属性，但它似乎无法很好地归属于任何一个类。举个例子，让我们重新审视图 10-51 中所示的（多对多）关联“一个`学生`
    *参加* 一个`教学班`”。（请注意，这次我们在关联线的两端使用了“通用”的***多***重性符号，即单个星号 (*)。）


    ![](img/78624_3_En_10_Fig51_HTML.jpg)


    两个分别标记为“学生”和“教学班”的方块通过一条线连接。线上方文字说明：学生参加教学班。


    图 10-51


    `学生`与`教学班`之间的多对多关联


    每学期结束时，学生会根据该学期参加的每个教学班获得一个字母等级。我们决定将这个等级表示为一个`字符串`属性（例如，“A-”、“C+”）。然而，这个“等级”属性应该属于哪里呢？


    *   它不属于`学生`类，因为学生并非针对所有课程获得一个单一的总评等级，而是针对参加的每个教学班获得一个单独的等级。

    *   它也不属于`教学班`类，因为参加同一个教学班的所有学生通常不会获得相同的字母等级。


    如果我们稍加思考，就会意识到这个等级实际上是给定`学生`对象与给定`教学班`对象之间***配对***的一个属性；也就是说，它是这两个对象之间存在的***链接***的一个属性。


    在 UML 中，我们创建一个单独的类，称为**关联类**，用于存放属于对象间链接的属性，并用一条***虚线***将其连接到关联线上，如图 10-52 所示。


    由于关联类表示两个对象之间链接的属性，因此有时非正式地称其为“**链接属性**”。


    ![](img/78624_3_En_10_Fig52_HTML.jpg)


    一个框图展示了两个分别标记为“学生”和“教学班”的方块连接在一起。底部另一个方块表示“已获等级”，其数据类型为字符串。


    图 10-52


    在多对多关联上放置关联类


    每当你在类图中看到关联类时，要意识到存在另一种等效的表示方式，可以***不***使用关联类来描述相同的情况：


    *   对于涉及关联类的***多对多关联***，我们可以将多对多关联拆分为两个一对多关联，并将原来的关联类作为“标准”类插入到另外两个类之间。对上述的*参加*关联执行此操作后，我们得到了图
    10-53 中的等效替代表示。


    需要注意的重要一点是，这两个新关联的“多”端都位于新插入的类上，因为一个`学生`*获得*多个`等级`，而一个`教学班`*给出*多个`等级`。


    ![](img/78624_3_En_10_Fig53_HTML.jpg)


    一个框图解释了学生获得等级，教学班给出等级。等级的数据类型是字符串。它还表示学生参加教学班。


    图 10-53


    图 10-52 的替代表示


    ![](img/78624_3_En_10_Fig55_HTML.jpg)


    一个框图左侧有两个方块，分别表示“教授”和“薪资”。教授指向右侧一个表示“院系”的方块，说明教授为院系工作。


    图 10-55


    图 10-54 的替代表示


    ![](img/78624_3_En_10_Fig54_HTML.jpg)


    一个框图展示了三个分别标记为“教授”、“院系”和“薪资”的方块之间的连接。它说明教授为院系工作并获得薪资。薪资的数据类型是 Double。


    图 10-54


    在一对多关联上放置关联类


    *   如果我们恰好有一个针对***一对多关联***的关联类，如图 10-54 中`教授`和`院系`之间的*工作于*关联，那么理论上，关联类的属性可以“折叠”到关联的“多”端类中，从而完全去掉关联类，如图
    10-55 所示。

    *   对于***一对一关联***，我们可以将关联类的属性折叠到***两个类中的任意一个***中。


    话虽如此，但这种将关联类属性折叠到一对多或一对一关联一端的方法并不被推荐，因为它会减少模型所传达的信息量。在前面的例子中，`教授`拥有`薪资`属性的唯一原因是他/她*为*某个`院系`*工作*；如果从模型中如此消除关联类，这种雇佣关系与薪资之间的“因果”联系就会丢失。


    请注意，关联类本身也可以与其他类建立关系。例如，图 10-56 中的图表展示了关联类`角色`与类`美国总统`之间参与的一对多关联；说明此模型的一个例子是：“电影明星安东尼·霍普金斯在电影《尼克松》中饰演理查德·M·尼克松一角，从而刻画了***真实的***前美国总统理查德·M·尼克松。”


    ![](img/78624_3_En_10_Fig56_HTML.jpg)


    一个框图解释了电影明星主演电影。电影明星获得一个角色，该角色刻画美国总统。角色名称的数据类型是字符串。


    图 10-56


    关联类本身可以参与与其他类的关联

