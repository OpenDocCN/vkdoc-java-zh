    异常类层次结构 捕获通用异常类型 编译器对异常处理的强制要求 利用捕获到的异常 Try/Catch 块的嵌套 用户自定义异常类型 抛出多种类型的异常 枚举
    为命令行驱动程序提供输入 接受命令行参数：args 数组 引入自定义命令行标志以控制程序行为 接受键盘输入：Scanner 类 使用包装类进行输入转换 Object
    类的特性 确定对象所属的类 测试对象的相等性 重写 equals 方法 重写 toString 方法 静态初始化器 变量初始化，再探 可变参数 (varargs)
    总结


    在本书的第一部分，你已经对 Java 语法有了扎实的了解，特别是它如何用于说明基本的对象概念。然而，在深入探讨学生注册系统 (SRS) 模型层的具体编码之前，我们想向你介绍更多关于
    Java 语言的细节，这些细节将在后续编写 SRS 模型层时用到。


    在本章中，你将了解：


    *   Java 归档（“jar”）文件的本质和用途


    *   Java 文档注释的机制


    *   `String` 的对象本质


    *   一种称为 `enum` 的特殊类，可用于枚举特定变量允许采用的显式值


    *   如何通过链接消息来形成高度复杂的表达式


    *   对象如何在其自身方法内部引用自身


    *   Java 运行时异常的本质以及如何优雅地处理它们，包括定义和使用我们自己的自定义异常类型


    *   为命令行驱动的“无 GUI”程序提供输入的几种方法


    *   Java `Object` 类的一些重要特性


    ## Java 专用术语


    如前所述，本书的目的是向你传授对象原则，这些原则在很大程度上是与语言无关的，因此，我倾向于使用通用的（有时是非正式的）面向对象术语，而不是 Oracle 使用的
    Java 专用术语。话虽如此，我现在想向你介绍一些 ***Java 专用术语***，这些术语用于描述 Oracle 公司维护的正式 Java 语言规范 (JLS)
    中使用的一些基本对象概念。


    表 13-1


    通用面向对象术语与 Java 术语对比


    | 本书使用的通用面向对象术语 | Sun Microsystems 使用的正式 Java 专用术语 | 用于描述以下概念 |

    | --- | --- | --- |

    | 属性 | 字段，实例变量 | 每个对象创建一次，即类的每个实例。每个对象都有自己独立的一组实例变量。 |

    | 静态变量（非正式：静态属性） | 静态字段，类变量 | 每个类只存在一次的变量。 |

    | 方法 | 实例方法 | 在对象上调用的函数。 |

    | 静态方法 | 类方法 | 可以在整个类上调用的函数，无需引用特定对象。类方法既不能调用实例方法，也不能访问实例变量。 |

    | 特性 | 成员 | 类中可能被继承的那些组件：例如，实例/类变量和实例/类方法，但***不***包括构造函数。 |


    为了完善这些术语，术语**局部变量**指的是在方法内部声明的变量，因此其作用域局限于该方法。（方法参数也局部于该方法，但 Java 将它们与“局部变量”区分开来）。局部变量既不是静态变量也不是实例变量。


    以下代码片段说明了所有三种类型的变量：


    ```

    public class Student {

    // 属性。

    private String name;  // <== name 是一个实例变量

    private static int totalStudents;  // <== totalStudents 是一个

    //  类变量

    // 方法。

    public void foo(int y) { // <== 参数 y 局部于该方法

    int x;  // <== x 是一个局部变量

    // 等等。

    }

    // 等等。

    }

    ```


    ## Java 归档 (jar) 文件


    构成应用程序的 Java 字节码通常以 **Java 归档（“jar”）文件**的形式进行打包和交付。让我们以一个简单的应用程序为例，它包含：


    *   三个用户定义类型——类 `Person`、`Student` 和 `Professor`


    *   一个名为 `MyApp` 的 `main` 方法包装类


    来说明 jar 文件的使用。我们简单示例的代码如下所示：


    ```

    public class Person {

    private String name;

    public void setName(String n) {

    name = n;

    }

    }

    public class Student extends Person {

    private Professor advisor;

    public void setAdvisor(Professor p) {

    advisor = p;

    }

    }

    public class Professor extends Person {

    private String title;

    public void setTitle(String t) {

    title = t;

    }

    }

    ```


    以支持以下程序：


    ```

    public class MyApp {

    public static void main(String[] args) {

    Professor p = new Professor();

    Student s = new Student();

    s.setAdvisor(p);

    }

    }

    ```

