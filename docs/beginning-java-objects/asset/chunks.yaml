    # 1. Abstraction and Modeling


    [Simplification Through Abstraction](#78624_3_En_1_Chapter.xhtml#Sec1) [Generalization
    Through Abstraction](#78624_3_En_1_Chapter.xhtml#Sec2) [Organizing Abstractions
    into Classification Hierarchies](#78624_3_En_1_Chapter.xhtml#Sec3) [Abstraction
    as the Basis for Software Development](#78624_3_En_1_Chapter.xhtml#Sec4) [Reuse
    of Abstractions](#78624_3_En_1_Chapter.xhtml#Sec5) [Inherent Challenges](#78624_3_En_1_Chapter.xhtml#Sec6)
