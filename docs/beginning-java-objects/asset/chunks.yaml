    Let’s say we want the `equals` method, when used to compare two `Person` instances,
    to deem them “equal” if they have the same value for their Social Security number
    (`ssn`) attribute. To accomplish this, we’d override the `equals` method as shown
    in the following; we’ll present the code in its entirety first and then explain
    some of the details afterward:


    ```

    public class Person {

    private String ssn;

    private String name;

    // etc.

    // Constructor.

    public Person(String s, String n) {

    this.setSsn(s);

    this.setName(n);

    }

    // Accessor methods.

    public String getSsn() {

    return ssn;

    }

    // etc.

    // Overriding the equals method that we inherited from the Object class.

    public boolean equals(Object o) {

    boolean isEqual;

    // Try to cast the Object reference into a Person reference.

    // If this fails, we''ll get a ClassCastException.

    try {

    Person p = (Person) o;

    // If we make it to this point in the code, we know we''re

    // dealing with a Person object; next, we''ll compare ssn''s.

    if (this.getSsn().equals(p.getSsn())) {

    // We''ll deem p equal to THIS person.

    isEqual = true;

    }

    else {

    isEqual = false;

    }

    }

    catch (ClassCastException e) {

    // They''re not equal – o isn''t even a Person!

    isEqual = false;

    }

    return isEqual;

    }

    }

    ```


    Let’s explore the `equals` method in detail:


    - The `equals` method header as declared by the `Object` class accepts a generic
    `Object` as an argument. When overriding this method for `Person`, we may not
    change this signature to accept a `Person` reference explicitly. Rather, we’ll
    attempt to **cast** `o` to be a reference to a `Person` to determine if, at run
    time, `o` really **is** referring to a `Person`; if the cast attempt succeeds,
    then we’ll wind up with two handles on the same object—`Object o` and `Person
    p`:


    - If a `ClassCastException` is **not** thrown by the previous line of code, then
    we know that `o` is indeed referring to a `Person`. Our next step is to then compare
    the `ssn` attribute value of `p` (a.k.a. `o`) to the `ssn` attribute value of
    **this** `Person`—that is, the `Person` whose `equals` method we’ve invoked to
    begin with:


    ```

    // Overriding the equals method that we inherited from the Object class.

    public boolean equals(Object o) {

    boolean isEqual;

    // Try to cast the Object reference into a Person reference.

    // If this fails, we''ll get a ClassCastException.

    try {

    Person p = (Person) o;

    ```


    - If the `ssn` values are equal, then the `Person` referred to by `p` (and `o`)
    is deemed “equal to” **this** `Person`; otherwise, they are not equal:


    ```

    // If we make it to this point in the code, we know we''re

    // dealing with a Person object; next, we''ll compare ssn''s.

    if (this.getSsn().equals(p.getSsn())) {

    ```


    - Conversely, if a `ClassCastException` arose when we tried to cast `o` as a `Person`,
    then we know that `o` doesn’t “equal” this `Person` to whom we’re comparing—after
    all, `o` isn’t even a `Person`!


    ```

    // We''ll deem p equal to THIS person.

    isEqual = true;

    }

    else {

    isEqual = false;

    }

    }

    ```


    ```

    catch (ClassCastException e) {

    // They''re not equal – o isn''t even a Person!

    isEqual = false;

    }

    ```


    Now that we’ve overridden the `equals` method for the `Person` class, let’s return
    to our earlier example program where we were testing the equality of `Person`
    objects. We’ll rerun the code exactly as it was written before (code repeated
    in the following for your convenience):


    ```

    public class EqualsTest2 {

    public static void main(String[] args) {

    // We''ll create one Person object ...

    Person p1 = new Person("222-22-2222", "Fred");

    // ... and maintain two handles on it (p1 and p2).

    Person p2 = p1;

    // We''ll create a second different Person object with exactly the same

    // attribute values as the first Person object that we created, and will

    // use variable p3 to maintain a handle on this second object.

    Person p3 = new Person("222-22-2222", "Fred");

    // Are p1 and p2 "equal"?

    System.out.println("The expression p1 == p2 evaluates to: " + (p1 == p2));

    System.out.println("The expression p1.equals(p2) evaluates to: " +

    (p1.equals(p2)));

    // Are p1 and p3 "equal"?

    System.out.println("The expression p1 == p3 evaluates to: " + (p1 == p3));

    System.out.println("The expression p1.equals(p3) evaluates to: " +

    (p1.equals(p3)));

    ```


    However, because we’ve overridden the `equals` method for the `Person` class,
    we’ll now get a different result when we execute the code; the output is as follows:


    ```

    The expression p1 == p2 evaluates to: true

    The expression p1.equals(p2) evaluates to: true

    The expression p1 == p3 evaluates to: false

    The expression p1.equals(p3) evaluates to: true

    ```


    Note that even though `p1` and `p3` are referring to two physically distinct `Person`
    objects, these objects have **identical values** for their `ssn` attribute, and
    so they are now deemed to be “equal.”


    Consider overriding the `equals` method of any class for which you have a frequent
    need to test the equivalence of objects.


    ### Overriding the `toString` Method


    Recall that the (overloaded) `print` and `println` methods do their best to render
    whatever expression is passed in as an argument into an equivalent `String` representation.
    This is relatively straightforward for simple data types:


    ```

    int x = 7;

    double y = 3.8;

    boolean z = false;

    System.out.println(x);

    System.out.println(y);

    System.out.println(z);

    ```


    Output:


    ```

    7

    3.8

    false

    ```


    or for expressions that **resolve** to one of these types:


    ```

    int x = 7;

    double y = 3.8;

    boolean z = false;

    System.out.println(x + y);

    System.out.println(x == y);

    ```


    Output:


    ```

    10.8

    false

    ```


    If we were to try to print the value of an expression that resolves to an **object
    reference**, on the other hand:


    ```

    Student s = new Student("Harvey", "123-45-6789");

    // Try to print the object reference directly.

    System.out.println(s);

    ```


    we’d most likely get a rather cryptic-looking result, similar to the following:


    ```

    Student@71f71130

    ```


    where “`Student@71f71130`” represents an internal object ID relevant only to the
    JVM. **Why is this?**


    It just so happens that all objects inherit a method from the `Object` class with
    the header:


    ```

    String toString();

    ```


    As inherited from the `Object` class, the `toString` method is defined to print
    the name of the class to which an object belongs, followed by an “at” sign (`@`),
    followed by an internal object ID—*Classname@internalID*—as we saw with the preceding
    `Student` example.


    Note that for expressions that resolve to an object reference, the `println` and
    `print` methods **automatically** invoke that object’s `toString` method; that
    is, the following two lines of code are equivalent:


    ```

    System.out.println(s.toString());

    ```


    and


    ```

    System.out.println(s);

    ```


    What we probably meant to do was to print one or more of the `Student` object’s
    attributes as a **representation** of the object, for example, perhaps the student’s
    `name`, followed by their `ssn` in parentheses:


    ```

    John Smith (123-45-6789)

    ```


    We can accomplish this by **overriding** the `toString` method for the `Student`
    class to define what it is that we wish to have printed as a representation of
    a `Student`. For example, the `Student` class may override the `toString` method
    as follows:


    ```

    public String toString() {

    return this.getName() + " (" + this.getSsn() + ")");

    }

    ```


    As a result, the following code:


    ```

    Student s = new Student("Harvey", "123-45-6789");

    System.out.println(s);

    ```


    would now produce the alternative output:


    ```

    Harvey (123-45-6789)

    ```


    as desired.


    It’s generally a good idea to routinely override the `toString` method for all
    user-defined classes.'
