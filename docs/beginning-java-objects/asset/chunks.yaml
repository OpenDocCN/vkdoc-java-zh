    as a complete statement:


    ```

    return;

    ```


    However, it turns out that for methods with a return type of `void`, the use of
    a `return;` statement is ***optional.*** If omitted, a `return;` statement is
    implied as the last line of the method. That is, the following two versions of
    method `doSomething` are equivalent:


    ```

    void doSomething() {

    int x = 3;

    int y = 4;

    int z = x + y;

    }

    ```


    and


    ```

    void doSomething() {

    int x = 3;

    int y = 4;

    int z = x + y;

    return;

    }

    ```


    The bodies of methods with a ***non***-`void` return type, on the other hand,
    ***must*** include at least one explicit `return` statement. The `return` keyword
    in such a case must be followed by an expression that evaluates to a value compatible
    with the method’s declared return type. For example, if a method is defined to
    have a return type of `int`, then any of the following `return` statements would
    be acceptable:


    ```

    return 0;        // returning a constant integer value

    return x;        // returning the value of x (assuming that x

    // has previously been declared to be an int)

    return x + y;    // returning the value of the expression "x + y" (here,

    // we''re assuming that "x + y" evaluates to an int value)

    return (int) z;  // casting the value of z (assume z was declared as a double)

    // to an int value

    ```


    and so forth. As another example, if a method is defined to have a return type
    of `boolean`, then any of the following `return` statements would be acceptable:


    ```

    return false;        // returning a boolean constant value

    return outcome;      // returning the value of variable outcome

    // (assuming that outcome has previously been

    // declared to be of type boolean)

    return (x < 3);      // returning the boolean value that results when

    // the (numeric) value of x is compared to 3:

    // if x is less than 3, this method returns a

    // value of true; otherwise, it returns false.

    ```


    A method body is permitted to include more than one `return` statement. Good programming
    practice, however, is to have only ***one*** `return` statement in a method, at
    the very end. Let’s look once again at the `isHonorsStudent` method discussed
    previously, which has two `return` statements:


    ```

    boolean isHonorsStudent() {

    if (gpa >= 3.5) {

    return true;   // first return statement

    }

    else {

    return false;  // second return statement

    }

    }

    ```


    Let’s rewrite this method to use a locally declared `boolean` variable, `result`,
    to capture the `true`/`false` answer that is to ultimately be returned. We’ll
    return the value of `result` with a single `return` statement at the very end
    of the method:


    ```

    boolean isHonorsStudent() {

    // Declare a local variable to keep track of the outcome; arbitrarily

    // initialize it to false.

    boolean result = false;

    if (gpa >= 3.5) {

    // Instead of returning true, we record the value in our "result"

    // variable:

    result = true;

    }

    else {

    // Instead of returning false, we record the value in our "result"

    // variable:

    result = false;

    }

    // We now have a single return statement at the end of our method to return the

    // result.

    return result;

    }

    ```


    As it turns out, since we initially assigned the value `false` to `result`, setting
    it to `false` explicitly in the `else` clause is unnecessary; we could therefore
    simplify the `isHonorsStudent` method as follows:


    ```

    boolean isHonorsStudent() {

    // Declare a local variable to keep track of the outcome; arbitrarily

    // initialize it to false.

    boolean result = false;

    if (gpa >= 3.5) {

    result = true;

    }

    // Note that we''ve removed the ''else'' clause ... if the "if" test

    // fails, variable "result" already has a value of false.

    return result;

    }

    ```


    There is, however, one situation in which multiple `return` statements are considered
    acceptable, and that is when a method needs to perform a series of operations
    where failure at any step along the way constitutes failure as a whole. This situation
    is illustrated via pseudocode:


    ```

    // Pseudocode.

    boolean someMethod() {

    // Perform a test … if it fails, we wish to abort the method as

    // a whole.

    if (first test fails) {

    return false;

    }

    // If we pass the first test, we do some additional processing ...

    do something interesting ...

    // Then, perhaps we perform a second test, where again failure of the

    // test warrants immediately giving up in our ''quest''.

    if (second test fails) {

    return false;

    }

    // If we pass the second test, we do some additional processing ...

    // details omitted.

    // If we reach this point in our code, we return a value of true

    // to signal that we made it to the finish line!

    return true;

    }

    ```


    Note that the Java compiler will verify that ***all*** logical pathways through
    a method return an appropriately typed result. For example, the following method
    will generate a compiler error because a proper `return` statement will only be
    reached if the `if` test succeeds; if the `if` test fails, the `return` statement
    is bypassed:


    ```

    boolean xGreaterThanThree(int x) {

    if (x <= 3) {

    return false;

    }

    }

    ```


    The specific compiler error message in this case would be as follows:


    ```

    missing return statement:

    boolean xGreaterThanThree(int x) {

    ```


    ## Methods Implement Business Rules


    The logic contained within a method body defines the **business logic**, also
    known as **business rules**, for an abstraction. In the `isHonorsStudent` method,
    for example


    ```

    boolean isHonorsStudent() {

    boolean result = false;

    if (gpa >= 3.5) {

    result = true;

    }

    return result;

    }

    ```


    a single business rule is expressed for determining whether or not a student is
    an honors student, namely,


    *If a student has a grade point average (GPA) of 3.5 or higher, then they are
    an honors student.*


    If the business rules underlying this method were more complex—say, if the rules
    were as follows


    > *In order for a student to be considered an honors student, the student must*


    1.  > *Have a grade point average (GPA) of 3.5 or higher*


    2.  > *Have taken at least three courses*


    3.  > *Have received no grade lower than “B” in any of these courses*


    then our method’s logic would of necessity be more complex:


    ```

    boolean isHonorsStudent() {

    boolean result = false;

    // Pseudocode.

    if ((gpa >= 3.5) &&

    (number of courses taken >= 3) &&

    (no grades lower than a B have been received)) {

    result = true;

    }

    return result;

    }

    ```


    In a sense, even a method ***header*** expresses a simple form of business rule/requirement`—`in
    this particular case, that there is such a notion as an “honors student” in the
    first place. But the ***details*** of an application’s business rule(s) are encoded
    in its various classes’ method ***bodies***.'
  trans: "\n### return 语句\n\n`return` 语句是一种跳转语句，用于退出方法：\n\n```\nvoid doSomething()\
    \ {\n// 伪代码。\n执行此方法所需的任何操作 ...\nreturn;\n}\n```\n\n每当遇到 `return` 语句时，方法将从该行代码处停止执行，并且执行控制权会立即返回到最初调用该方法的代码。\n\
    \n对于返回类型为 `void` 的方法，`return` 关键字单独使用，作为一个完整的语句：\n\n```\nreturn;\n```\n\n然而，事实证明，对于返回类型为\
    \ `void` 的方法，使用 `return;` 语句是***可选的***。如果省略，则会在方法的最后一行隐式地添加一个 `return;` 语句。也就是说，以下两个版本的\
    \ `doSomething` 方法是等价的：\n\n```\nvoid doSomething() {\nint x = 3;\nint y = 4;\n\
    int z = x + y;\n}\n```\n\n和\n\n```\nvoid doSomething() {\nint x = 3;\nint y =\
    \ 4;\nint z = x + y;\nreturn;\n}\n```\n\n另一方面，返回类型为***非***`void` 的方法体***必须***包含至少一个显式的\
    \ `return` 语句。在这种情况下，`return` 关键字后面必须跟一个表达式，该表达式的计算结果必须与该方法声明的返回类型兼容。例如，如果一个方法被定义为返回类型\
    \ `int`，那么以下任何 `return` 语句都是可以接受的：\n\n```\nreturn 0;        // 返回一个常量整数值\nreturn\
    \ x;        // 返回变量 x 的值（假设 x\n                 // 先前已被声明为 int 类型）\nreturn x +\
    \ y;    // 返回表达式 \"x + y\" 的值（这里，\n                 // 我们假设 \"x + y\" 的计算结果为 int\
    \ 值）\nreturn (int) z;  // 将变量 z 的值（假设 z 被声明为 double 类型）\n                 // 强制转换为\
    \ int 值\n```\n\n等等。再举一个例子，如果一个方法被定义为返回类型 `boolean`，那么以下任何 `return` 语句都是可以接受的：\n\
    \n```\nreturn false;        // 返回一个布尔常量值\nreturn outcome;      // 返回变量 outcome\
    \ 的值\n                     // （假设 outcome 先前已被声明为 boolean 类型）\nreturn (x < 3);\
    \      // 返回将 x 的（数值）与 3 比较后得到的布尔值：\n                     // 如果 x 小于 3，此方法返回 true；\n\
    \                     // 否则，返回 false。\n```\n\n一个方法体允许包含多个 `return` 语句。然而，良好的编程实践是，在一个方法中只使用***一个***\
    \ `return` 语句，并且放在方法的最后。让我们再次看看之前讨论过的 `isHonorsStudent` 方法，它有两个 `return` 语句：\n\
    \n```\nboolean isHonorsStudent() {\nif (gpa >= 3.5) {\nreturn true;   // 第一个 return\
    \ 语句\n}\nelse {\nreturn false;  // 第二个 return 语句\n}\n}\n```\n\n让我们重写这个方法，使用一个局部声明的\
    \ `boolean` 变量 `result` 来捕获最终要返回的 `true`/`false` 答案。我们将在方法的最后通过一个单独的 `return`\
    \ 语句返回 `result` 的值：\n\n```\nboolean isHonorsStudent() {\n// 声明一个局部变量来跟踪结果；任意地\n\
    // 将其初始化为 false。\nboolean result = false;\nif (gpa >= 3.5) {\n// 我们不直接返回 true，而是将值记录在\
    \ \"result\" 变量中：\nresult = true;\n}\nelse {\n// 我们不直接返回 false，而是将值记录在 \"result\"\
    \ 变量中：\nresult = false;\n}\n// 现在，我们在方法的末尾有一个单独的 return 语句来返回结果。\nreturn result;\n\
    }\n```\n\n事实证明，由于我们最初将 `false` 赋值给了 `result`，因此在 `else` 子句中显式地将其设置为 `false` 是不必要的；因此，我们可以将\
    \ `isHonorsStudent` 方法简化为如下形式：\n\n```\nboolean isHonorsStudent() {\n// 声明一个局部变量来跟踪结果；任意地\n\
    // 将其初始化为 false。\nboolean result = false;\nif (gpa >= 3.5) {\nresult = true;\n\
    }\n// 注意，我们已经移除了 'else' 子句……如果 \"if\" 测试\n// 失败，变量 \"result\" 已经具有 false 值。\n\
    return result;\n}\n```\n\n然而，有一种情况被认为是可以接受使用多个 `return` 语句的，那就是当一个方法需要执行一系列操作，并且其中任何一步的失败都意味着整个过程的失败时。这种情况通过伪代码说明如下：\n\
    \n```\n// 伪代码。\nboolean someMethod() {\n// 执行一个测试……如果失败，我们希望中止整个方法。\nif (第一个测试失败)\
    \ {\nreturn false;\n}\n// 如果我们通过了第一个测试，我们会进行一些额外的处理……\n做一些有趣的事情 ...\n// 然后，也许我们执行第二个测试，同样，如果测试失败，\n\
    // 就应立即放弃我们的“任务”。\nif (第二个测试失败) {\nreturn false;\n}\n// 如果我们通过了第二个测试，我们会进行一些额外的处理……\n\
    // 省略细节。\n// 如果我们到达代码中的这一点，我们返回 true 值\n// 以表明我们成功到达终点！\nreturn true;\n}\n```\n\
    \n请注意，Java 编译器会验证通过方法的所有***逻辑路径***是否都返回了类型正确的结果。例如，以下方法将产生编译错误，因为只有当 `if` 测试成功时才能到达正确的\
    \ `return` 语句；如果 `if` 测试失败，则 `return` 语句会被跳过：\n\n```\nboolean xGreaterThanThree(int\
    \ x) {\nif (x <= 3) {\nreturn false;\n}\n}\n```\n\n在这种情况下，具体的编译器错误消息如下：\n\n```\n\
    缺少 return 语句：\nboolean xGreaterThanThree(int x) {\n```\n\n## 方法实现业务规则\n\n方法体包含的逻辑定义了抽象的**业务逻辑**，也称为**业务规则**。例如，在\
    \ `isHonorsStudent` 方法中\n\n```\nboolean isHonorsStudent() {\nboolean result =\
    \ false;\nif (gpa >= 3.5) {\nresult = true;\n}\nreturn result;\n}\n```\n\n表达了一条用于判断学生是否为优等生的简单业务规则，即：\n\
    \n*如果学生的平均绩点（GPA）达到 3.5 或更高，那么他们就是优等生。*\n\n如果此方法背后的业务规则更复杂——例如，规则如下：\n\n> *学生要被视为优等生，必须满足以下条件：*\n\
    \n1.  > *平均绩点（GPA）达到 3.5 或更高*\n\n2.  > *至少修读了三门课程*\n\n3.  > *在这些课程中，没有一门课的成绩低于“B”*\n\
    \n那么我们的方法逻辑必然会更加复杂：\n\n```\nboolean isHonorsStudent() {\nboolean result = false;\n\
    // 伪代码。\nif ((gpa >= 3.5) &&\n(修读的课程数量 >= 3) &&\n(没有收到低于 B 的成绩)) {\nresult = true;\n\
    }\nreturn result;\n}\n```\n\n从某种意义上说，即使是方法的***头***也表达了一种简单的业务规则/需求形式——在这个特定案例中，即首先存在“优等生”这样的概念。但应用程序业务规则的***细节***则编码在其各个类的方法***体***中。\n"
- fmt: "# Objects As the Context for Method Invocation\n\nAs mentioned in passing\
    \ a bit earlier in the chapter, methods in an OO programming language (OOPL) differ\
    \ from functions in a non-OOPL in that:\n\n- Functions are executed by the programming\
    \ environment as a whole.\n- Methods are executed by specific objects.\n\nThat\
    \ is, we are able to invoke a C function “in a vacuum” as follows:\n\n```c\n//\
    \ A C program.\nvoid main() {\nsqrt(42.0);  // invoke the sqrt (square root) function\
    \ ...\n// etc.\n}\n```\n\nWhereas in an OOPL like Java, we typically must **qualify**\
    \ the method call by prefixing it with the name of the reference variable representing\
    \ the object that is to perform the method, followed by a period (**dot**). This\
    \ is illustrated for the `registerForCourse` method as follows:\n\n```java\n//\
    \ Instantiate two Student objects.\nStudent x = new Student();\nStudent y = new\
    \ Student();\n// Invoke the registerForCourse method on Student object x, asking\
    \ it to\n// register for course MATH 101, section 10; Student y is unaffected.\n\
    x.registerForCourse(\"MATH 101\", 10);\n```\n\nWe refer to an expression of the\
    \ form `referenceVariable.methodName(args)` as a **message**—that is, this line\
    \ of code:\n\n```java\nx.registerForCourse(\"MATH 101\", 10);\n```\n\ncan be interpreted\
    \ as either “invoking a method on object `x`” or “sending a message to object\
    \ `x`.” Either way, such code should be viewed as ***requesting object `x` to\
    \ perform a method as a service, on behalf of the application to which the object\
    \ belongs***.\n\nThe terminology “sending a message to an object” originated with\
    \ the Smalltalk language and is used when speaking of OOPLs generically. When\
    \ talking about Java specifically, the terminology “invoking a method on an object”\
    \ is preferred. Similarly, the Java-specific alternative for the generic OOPL\
    \ term “message” is “method invocation.” Throughout the book, I’ll alternate between\
    \ the generic and Java-specific forms for referring to these notions, but tend\
    \ to favor the generic “message” nomenclature.\n\nBecause we use a “dot” to append\
    \ a method call to a particular reference variable, we informally refer to the\
    \ notation `referenceVariable.methodName(args)` as **dot notation**.\n\nAnother\
    \ informal way to think of the notation `x.methodName(args)` is that we are “**talking\
    \ to” object `x`**; specifically, we are “talking to” object `x` to request it\
    \ to perform a particular method/service. Let’s return to the analogy of household\
    \ chores introduced earlier in the chapter to illustrate this point.\n\nRecall\
    \ that a person is capable of the following household chores:\n\n- Taking out\
    \ the trash\n- Mowing the lawn\n- Washing the car\n\nHere’s an expression of this\
    \ abstraction as Java code:\n\n```java\npublic class Person {\n    // Attributes\
    \ omitted from this snippet ...\n    // Methods.\n    void takeOutTheTrash() {\
    \  ... }\n    boolean mowTheLawn() { ... }\n    void washTheCar(Car c)  { ...\
    \ }\n}\n```\n\nWe decide that we want our teenaged sons Larry, Moe, and Curly\
    \ to each do one of these three chores. How would we ask them to do this? If we\
    \ were to simply say:\n\n- “Please wash the Camry.”\n- “Please take out the trash.”\n\
    - “Please mow the lawn, and let me know if you see any crabgrass.”\n\nChances\
    \ are that ***none*** of the chores would get done, because we haven’t tasked\
    \ a ***specific*** son with fulfilling any of these requests! Larry, Moe, and\
    \ Curly will probably all stay glued to the TV, because none of them will acknowledge\
    \ that a request has been directed toward them specifically.\n\nOn the other hand,\
    \ if we were to instead say:\n\n- “***Larry***, please wash the Camry.”\n- “***Moe***,\
    \ please take out the trash.”\n- “***Curly***, please mow the lawn, and let me\
    \ know if you see any crabgrass.”\n\nWe’d be directing each request to a ***specific***\
    \ son; again, using Java syntax, this might be expressed as follows:\n\n```java\n\
    // We declare and instantiate three Person objects:\nPerson larry = new Person();\n\
    Person moe = new Person();\nPerson curly = new Person();\n// And, while we're\
    \ at it, a Car object, as well!\nCar camry = new Car();\n// We send a message\
    \ to each son, indicating the service that we wish\n// each of them to perform:\n\
    larry.washTheCar(camry);\nmoe.takeOutTheTrash();\nboolean crabgrassFound = curly.mowTheLawn();\n\
    ```\n\nBy applying each method call to a specific “son” (`Person` object reference),\
    \ there is no ambiguity as to which object is being asked to perform which service.\n\
    \nAssuming that `takeOutTheTrash` is a method defined for the `Person` class as\
    \ previously illustrated, the following code won’t compile in Java (or, for that\
    \ matter, in any OOPL) because the method call is **unqualified**—that is, the\
    \ dot notation is missing:\n\n```java\npublic class BadCode {\n    public static\
    \ void main(String[] args) {\n        // This next line won't compile -- where's\
    \ the \"dot\"?  That is, which object\n        // are we talking to???\n     \
    \   takeOutTheTrash();\n    }\n}\n```\n\nThe following compilation error would\
    \ be reported:\n\n```\ncannot find symbol\nsymbol  :    method takeOutTheTrash()\n\
    location:  class BadCode\n```\n\nHowever, in a ***non***-OOPL like C, there is\
    \ no notion of objects or classes, and so functions in such languages are ***always***\
    \ invoked “in a vacuum” (i.e., in the programming environment as a whole):\n\n\
    ```c\n// A C program.\nvoid main() {\nsqrt(42.0);\n// etc.\n}\n```\n\n## Java\
    \ Expressions, Revisited\n\nWhen we discussed Java expressions in Chapter [2](#78624_3_En_2_Chapter.xhtml),\
    \ there was one form of expression that was omitted from the list—namely, ***messages***—because\
    \ we hadn’t yet talked about objects. I’ve repeated the list of what constitutes\
    \ Java expressions here, adding message expressions to the mix:\n\n- ***A constant***:\
    \ `7`, `false`\n- ***A char(acter) literal***: `'A'`, `'&'`\n- ***A String literal***:\
    \ `\"foo\"`\n- ***The name of any variable declared to be of one of the predefined\
    \ types that we’ve seen so far***: `myString`, `x`\n- ***Any one of the preceding\
    \ that is modified by one of the Java unary operators***: `i++`\n- ***A method\
    \ invocation (“message”)***: `z.length()`\n- ***Any two of the preceding that\
    \ are combined with one of the Java binary operators***: `z.length() + 2`\n- ***Any\
    \ of the preceding simple expressions enclosed in parentheses***: `(z.length()\
    \ + 2)`\n\nThe ***type*** of a message expression is the type of the result that\
    \ the method returns. For example, if `length()` is a method with a return type\
    \ of `int`, then the expression `z.length()` is an expression of type `int`, and,\
    \ if `registerForCourse` is a method with a return type of `boolean`, then the\
    \ expression `s.registerForCourse(...)` is an expression of type `boolean`."
