    #### getGrade( )


    `getGrade` 方法使用作为参数传入此方法的 `Student` 引用作为 `assignedGrades HashMap` 的查找键，以检索其中为该
    `Student` 存储的 `TranscriptEntry`：


    ```

    public String getGrade(Student s) {

    String grade = null;

    // 从 assignedGrades HashMap 中检索此特定学生

