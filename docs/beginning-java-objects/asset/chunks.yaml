    \ the source code for each interface typically goes into its own `.java` file,\
    \ whose external name matches the name of the interface contained within (e.g.,\
    \ the `Teacher` interface would go into a file named `Teacher.java`). Interfaces\
    \ are then compiled into bytecode in the same way that classes are compiled. For\
    \ example, the command\n\n```\njavac Teacher.java\n```\n\nwill produce a bytecode\
    \ file named `Teacher.class`.\n\nNote that interfaces may not declare variables\
