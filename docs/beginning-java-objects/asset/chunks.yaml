- fmt: '# Arrays As Simple Collections


    One simple type of collection that you may already be familiar with from your
    work with other programming languages—OO or otherwise—is an **array**.


    As mentioned in passing earlier in the chapter, an array is a simple type of ordered
    list. We can think of an array as a series of compartments, with each compartment
    sized appropriately for whatever type of data the array as a whole is intended
    to hold. Arrays typically hold items of like type—for example, `int`(eger)s or
    `char`(acter)s or, in an OO language, object references (references to `Student`
    objects, `Course` objects, `Professor` objects, etc.).


    ## Declaring and Instantiating Arrays


    Because many newcomers to the Java language are used to programming with arrays
    in non-OO languages like C, the Java language supports syntax for declaring and
    manipulating arrays that is borrowed from C and hence is decidedly “un-objectlike”!


    The official Java syntax for declaring that a variable `x` will serve as a reference
    to an array containing items of a particular data type is as follows:


    ```

    datatype[] x;

    ```


    For example:


    ```

    int[] x;

    ```


    which is to be read “`int`(eger) array `x`” (or, alternatively, “`x` refers to
    an array of `int`s”).


    Because Java arrays are objects, they must be instantiated using the `new` operator.
    However, unlike any of the Java predefined collection classes we’ll be talking
    about later in this chapter, we must specify how many items an array is capable
    of holding (i.e., its **capacity** in terms of its number of elements) when we
    first instantiate the array; the size is then fixed and cannot be changed.


    Here is a code snippet that illustrates the somewhat unusual syntax for constructing
    an array. In this particular example, we’re declaring and instantiating an array
    designed to hold `Student` object references, as depicted in Figure [6-7](#78624_3_En_6_Chapter.xhtml#Fig7):


    ![](images/78624_3_En_6_Chapter/78624_3_En_6_Fig7_HTML.jpg)


    A set of X array blocks labeled x of 0, x of 1 through x of 19\. They are mapped
    to balloons labeled student objects.


    Figure 6-7


    `Array x` is designed to hold up to 20 `Student` references


    ```

    // We declare variable x as a reference to an array object

    // that will be used to store 20 Student object references.

    Student[] x = new Student[20];

    ```


    This application of the `new` operator with arrays is unusual in that we don’t
    see a typical constructor call ending in parentheses `(...)` following the `new`
    keyword, the way we do when we’re instantiating other types of objects. Instead,
    we use ***square brackets*** `[...]` to enclose the desired capacity of the array.
    Despite its unconventional appearance, however, the line of code


    ```

    Student[] x = new Student[20];

    ```


    is indeed instantiating an array object behind the scenes.


    It turns out that there is another way to create an array in Java that looks more
    “objectlike,” but the code isn’t “pretty”:


    ```

    // Declare an array "x" of 20 Student references.

    Object x  = Array.newInstance(Class.forName("Student"), 20);

    ```


    To fully appreciate what this code is doing is beyond the scope of what you’ve
    learned about objects thus far; suffice it to say that virtually all Java programmers
    use the shorthand form instead:


    ```

    Student[] x = new Student[20];

    ```


    ## Accessing Individual Array Elements


    Individual array elements are accessed by appending square brackets to the end
    of the array name, enclosing an `int`(eger) expression representing the **index**,
    or position relative to the beginning of the array, of the element to be accessed
    (e.g., `x[3]`). This syntax is known as an **array access expression** and takes
    the place of using classic “get”/“set” methods to access array contents.


    Note that when we refer to individual items in an array based on their index,
    we start counting at 0\. As it turns out, the vast majority of collection types
    in Java, as well as in other languages, are **zero-based**. So the items stored
    in `Student[] x` in our previous example would be referenced as `x[0]`, `x[1]`,
    … , `x[19]`, as was illustrated in Figure [6-7](#78624_3_En_6_Chapter.xhtml#Fig7).
    In the following code example, we declare and instantiate a `double` array of
    size 3\. We then assign the `double` value `4.7` to the “***zeroeth***” (***first***)
    element of the array. Finally, we retrieve the value of the ***last*** element
    of the array, which is referred to as `data[2]`, because the size of the array
    is 3:


    ```

    // Declare an array capable of holding three double values.

    double[] data = new double[3];

    // Set the FIRST (zeroeth) element to 4.7.

    data[0] = 4.7;

    // Details omitted ...

    // Access the LAST element''s value.

    double temp = data[2];

    ```


    In the next code example, we populate an array named `squareRoot` of type `double`
    to serve as a lookup table of square root values, where the value stored in cell
    `squareRoot[n]` represents the square root of `n`. We declare the array to be
    one element larger than we need it to be so that we may ignore the zeroeth cell—that
    is, for ease of lookup, we want the square root of 1 to be contained in cell 1
    of the array, not in cell 0:


    ```

    double[] squareRoot = new double[11];  // we''ll ignore cell 0

    // Note that we''re skipping cell 0.

    for (int n = 1; n <= 10; n++) {

    squareRoot[n] = Math.sqrt(n);

    System.out.println("The square root of " + n + " = " +

    squareRoot[n]);

    }

    ```


    Here’s the output:


    ```

    The square root of 1 = 1.0

    The square root of 2 = 1.4142135623730951

    The square root of 3 = 1.7320508075688772

    The square root of 4 = 2.0

    The square root of 5 = 2.23606797749979

    The square root of 6 = 2.449489742783178

    The square root of 7 = 2.6457513110645907

    The square root of 8 = 2.8284271247461903

    The square root of 9 = 3.0

    The square root of 10 = 3.1622776601683795

    ```


    The `Math.sqrt()` method computes the square root of a `double` argument passed
    to the method. We’re passing in an `int` in the preceding example, which automatically
    gets cast to a `double`. We’ll revisit the `Math` class again in Chapter [7](#78624_3_En_7_Chapter.xhtml).'
