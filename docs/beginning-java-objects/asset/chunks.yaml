    // Let''s allow age to REMAIN private!

    private int age;

    // etc.

    // We assume that Person declares public

    // get/set methods for age ... details omitted.

    }

    public class Student extends Person {

    public boolean isOver65( ) {

    // All is well!  We''re using our publicly inherited getAge

    // method to access our Student''s age.

    if (getAge() > 65) {

    return true;

    } else {

    return false;

    }

    }

    }

    ```


    As we first learned in Chapter [4](#78624_3_En_4_Chapter.xhtml), it is considered
    a best practice to always use a class’s own “get” and “set” methods to access
    its attribute values from within its own methods. By doing so, we take advantage
    of any special processing that the “get”/“set” method might provide relative to
    that attribute. You’ve just learned yet another reason doing so is a best practice,
    when inheritance is involved.


    And, if we **don’t** inherit a `public` “get”/“set” method with which to access
    a `private` attribute declared by a superclass, then we can argue that we ought
    not to be “tinkering” with such an attribute in the first place!


    ### Inheritance and Constructors


    You learned about constructors as special procedures used to instantiate objects
    in Chapter [4](#78624_3_En_4_Chapter.xhtml). Now that you’ve learned about inheritance,
    there are a number of complexities with regard to constructors in the context
    of inheritance hierarchies that I’d like to alert you to.


    #### Constructors Are Not Inherited


    Constructors are not inherited. This raises some interesting challenges that are
    best illustrated via an example.


    Let’s start by declaring a constructor for the `Person` class that takes two arguments:


    ```java

    public class Person {

    private String name;

    private String ssn;

    // Other details omitted.

    public Person(String n, String s) {

    // Initialize our attributes.

    setName(n);

    setSsn(s);

    // Pseudocode.

    do other complex things related to instantiating a Person

    }

    }

    ```


    We know from our discussion of constructors in Chapter [4](#78624_3_En_4_Chapter.xhtml)
    that the `Person` class now only recognizes one constructor signature—that which
    takes two arguments—because the default parameterless constructor has been eliminated.
    (We’ll return to discuss the implications of this with regard to inheritance in
    a moment.)


    Next, let’s derive the `Student` class from `Person`, declaring **two** constructors—one
    that takes two arguments and one that takes three arguments:


    ```java

    public class Student extends Person {

    private String major;

    // Other details omitted.

    // Constructor with two arguments.

    public Student(String n, String s) {

    // Note the redundancy of logic between this constructor and

    // the Person constructor - we''ll come back and fix this in a

    // moment.

    // Initialize our attributes.

    setName(n);

    setSsn(s);

    setMajor(“UNDECLARED”);

    // Pseudocode.

    do other complex things related to instantiating a Person ...

    ... and still more complex things related to instantiating a Student

    specifically.

    }

    // Constructor with three arguments.

    public Student(String n, String s, String m) {

    // More redundancy!

    // Initialize our attributes.

    setName(n);

    setSsn(s);

    setMajor(m);

    // Pseudocode.

    do other complex things related to instantiating a Person ...

    ... and still more complex things related to instantiating a Student

    specifically.

    }

    }

    ```


    As a result of having declared explicit constructors, the `Student` class has
    also lost its default parameterless constructor.


    The first thing that we notice is that we’ve duplicated code that was provided
    by the `Person` constructor in **both** of the constructors for the `Student`
    class:


    ```java

