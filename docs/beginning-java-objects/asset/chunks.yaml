  raw: '### Events


    You saw in Chapter [4](#78624_3_En_4_Chapter.xhtml) that object collaborations
    are triggered by events. By way of review, an ***event*** is an external stimulus
    to an object, signaled to the object in the form of a ***message*** (method call).
    An event can be


    *   ***User initiated*** (e.g., the result of clicking a button or link on a GUI)


    *   ***Initiated by another computer system*** (e.g., the arrival of information
    being transferred from the Student Billing System to the Student Registration
    System)


    *   ***Initiated by another object within the same system*** (e.g., a `Course`
    object requesting some service of a `Transcript` object)


    When an object receives notification of an event via a message, it may react in
    one or more of the following ways:


    *   An object may change its state.


    *   An object may direct an event (message) toward another object.


    *   An object may return a value.


    *   An object may react with the external boundaries of its system.


    *   An object may seemingly ignore an event.


    Let’s discuss these five types of reaction in detail, one by one.


    #### An Object May Change Its State


    An object may change its state (the values of its “simple” attributes and/or links
    to other objects), as in the case of a `Professor` object receiving a message
    to take on a new `Student` advisee, illustrated by the following code snippet:


    ```

    Professor p = new Professor();

    Student s = new Student();

    // Details omitted.

    p.addAdvisee(s);

    ```


    Let’s look at the code for the `Professor` class’s `addAdvisee` method to see
    how the `Professor` will respond to this message. We see that the `Professor`
    object is inserting the reference to `Student` object `s` that it is being handed
    as an argument into a `Collection` of `Student` object references called `advisees`:


    ```

    public class Professor {

    // Attributes.

    Collection advisees;  // Holds Student object references.

    // Other details omitted.

    public void addAdvisee(Student s) {

    // Insert s into the advisees collection.

    advisees.add(s);

    }

    }

    ```


    In so doing, `Professor` object `p` will have formed a new link of type *advises*
    with `Student` object `s` (see Figure [11-4](#78624_3_En_11_Chapter.xhtml#Fig4)).


    ![](images/78624_3_En_11_Chapter/78624_3_En_11_Fig4_HTML.jpg)


    A state diagram illustrates the relationship between professors and students,
    which is interrelated with 0, 1 Advises and 0, stars. The 0,1 Advises indicates
    that a professor may advise zero or one students, while the 0, stars indicate
    that a student may have zero or multiple stars, which may represent academic achievements
    or commendations from the professor.


    Figure 11-4


    Revisiting the UML diagram for the advises association


    Typical “set” methods fall into this category of event response.


    #### An Object May Direct an Event (Message) Toward Another Object


    An object may direct an event (message) toward another object (including, perhaps,
    the sender of the original message), as in the case of a `Section` object receiving
    a message to register a `Student`, illustrated by the following code snippet:


    ```

    Section x = new Section();

    Student s = new Student();

    // Details omitted.

    x.register(s);

    ```


    If we next look at the method code for the `Section` class’s `register` method
    to see how it will respond to this message, we see that the `Section` object in
    turn sends a message to the `Student` to be enrolled, to verify that the `Student`
    has completed a necessary prerequisite course:


    ```

    public class Section {

    // Details omitted.

    public boolean register(Student s) {

    // Verify that the student has completed a necessary

    // prerequisite course. (We are delegating part

    // of the work to another object, Student s.)

    // Pseudocode.

    boolean completed = s.successfullyCompleted(some prerequisite);

    if (completed) {

    // Pseudocode.

    register the student and return a value of true;

    }

    else {

    // Pseudocode.

    return a value of false to signal that the registration

    request has been rejected;

    }

    }

    }

    ```


    This happens to be an example of ***delegation***, which we discussed in Chapter
    [4](#78624_3_En_4_Chapter.xhtml): namely, another object (a `Student`, in this
    case) helping to fulfill a service request originally made of the `Section` object.


    #### An Object May Return a Value


    An object may return a value. The returned value may be one of the following:


    *   The value of one of the object’s attributes


    *   Some computed value (i.e., a “pseudoattribute,” as we discussed in Chapter
    4)


    *   A value that was obtained from some ***other*** object through delegation


    *   A status code (as in `true`/`false` responses, signaling success or failure
    of `boolean` methods)


    Typical “get” methods fall into this category of event response.


    #### An Object May Interact with the External Boundaries of Its System


    An object may interact with the external boundaries of its system; that is, it
    may display some information on a GUI or cause information to be passed to another
    application. As you’ll learn in Chapters [15](#78624_3_En_15_Chapter.xhtml) and
    [16](https://doi.org/10.1007/978-1-4842-9060-6_16), however, what appears to be
    an external system boundary is often implemented in Java as yet another object.


    #### An Object May Seemingly Ignore an Event


    Finally, an object may seemingly ignore an event, as would be the case if a `Professor`
    object received the message to add an advisee, but determined that the `Student`
    whom it was being asked to take on as an advisee was ***already*** an advisee:


    ```

    Student s = new Student();

    Professor p = new Professor();

    // Details omitted.

    // Professor p will seemingly "ignore" this next message.

    p.addAdvisee(s);

    ```


    Let’s look a slightly different version of the `addAdvisee` method than we saw
    previously:


    ```

    public class Professor {

    Collection advisees;  // Holds Student object references.

    // Details omitted.

    public void addAdvisee(Student s) {

    // ONLY insert s into the ''advisees'' collection IF IT

    // ISN''T ALREADY IN THERE.

    // Pseudocode.

    if (s is already in collection) return;  // do nothing

    else advisees.add(s);

    }

    }

    ```


    Actually, to say that the `Professor` object is doing nothing is an oversimplification:
    at a minimum, the object is executing the appropriate method code, which is performing
    some internal state checks (“Is this student already one of my advisees?”). It’s
    just that, when the dust settles, the `Professor` object has neither changed state
    nor fired off any messages to other objects, so it ***appears*** as if nothing
    has happened.'
  trans: '

    ### 事件


    你在第 4 章中已经看到，对象之间的协作是由事件触发的。回顾一下，***事件*** 是作用于对象的外部刺激，以 ***消息***（方法调用）的形式传递给对象。事件可以是：


    *   ***用户发起***（例如，在图形用户界面上点击按钮或链接的结果）

    *   ***由另一个计算机系统发起***（例如，信息从学生计费系统传输到学生注册系统）

    *   ***由同一系统内的另一个对象发起***（例如，一个 `Course` 对象请求 `Transcript` 对象提供某项服务）


    当一个对象通过消息接收到事件通知时，它可能会以下列一种或多种方式做出反应：


    *   对象可能改变其状态。

    *   对象可能将事件（消息）导向另一个对象。

    *   对象可能返回一个值。

    *   对象可能与其系统的外部边界进行交互。

    *   对象可能看似忽略了该事件。


    让我们逐一详细讨论这五种反应类型。


    #### 对象可能改变其状态


    对象可能改变其状态（其“简单”属性的值和/或与其他对象的链接），例如，一个 `Professor` 对象接收到一条消息，要求其接纳一名新的 `Student`
    作为指导对象，如下面的代码片段所示：


    ```

    Professor p = new Professor();

    Student s = new Student();

    // 细节省略。

    p.addAdvisee(s);

    ```


    让我们看看 `Professor` 类的 `addAdvisee` 方法的代码，了解 `Professor` 将如何响应此消息。我们看到 `Professor`
    对象正在将作为参数传入的 `Student` 对象 `s` 的引用插入到一个名为 `advisees` 的 `Student` 对象引用集合中：


    ```

    public class Professor {

    // 属性。

    Collection advisees;  // 保存 Student 对象引用。

    // 其他细节省略。

    public void addAdvisee(Student s) {

    // 将 s 插入到 advisees 集合中。

    advisees.add(s);

    }

    }

    ```


    这样一来，`Professor` 对象 `p` 将与 `Student` 对象 `s` 形成一条新的 *指导* 类型的链接（见图 11-4）。


    ![](img/78624_3_En_11_Fig4_HTML.jpg)


    状态图展示了教授与学生之间的关系，该关系与 0、1 指导 和 0、星号 相互关联。0、1 指导 表示一位教授可能指导零个或一个学生，而 0、星号 表示一个学生可能拥有零个或多个星号，这些星号可能代表学术成就或来自教授的表彰。


    图 11-4


    重温指导关联的 UML 图


    典型的“设置”方法属于此类事件响应。


    #### 对象可能将事件（消息）导向另一个对象


    对象可能将事件（消息）导向另一个对象（可能包括原始消息的发送者），例如，一个 `Section` 对象接收到一条注册 `Student` 的消息，如下面的代码片段所示：


    ```

    Section x = new Section();

    Student s = new Student();

    // 细节省略。

    x.register(s);

    ```


    如果我们接下来查看 `Section` 类的 `register` 方法的代码，了解它将如何响应此消息，我们会看到 `Section` 对象反过来向要注册的
    `Student` 发送一条消息，以验证该 `Student` 是否已完成必要的先修课程：


    ```

    public class Section {

    // 细节省略。

    public boolean register(Student s) {

    // 验证该学生是否已完成必要的先修课程。

    // （我们将部分工作委托给另一个对象，即 Student s。）

    // 伪代码。

    boolean completed = s.successfullyCompleted(some prerequisite);

    if (completed) {

    // 伪代码。

    注册该学生并返回 true 值；

    }

    else {

    // 伪代码。

    返回 false 值以表示注册请求已被拒绝；

    }

    }

    }

    ```


    这恰好是我们在第 4 章中讨论过的***委托***的一个例子：即另一个对象（此处为 `Student`）帮助完成最初由 `Section` 对象提出的服务请求。


    #### 对象可能返回一个值


    对象可能返回一个值。返回的值可以是以下之一：


    *   对象某个属性的值

    *   某个计算出的值（即我们在第 4 章讨论过的“伪属性”）

    *   通过委托从某个***其他***对象获取的值

    *   状态码（例如 `true`/`false` 响应，表示 `boolean` 方法的成功或失败）


    典型的“获取”方法属于此类事件响应。


    #### 对象可能与其系统的外部边界进行交互


    对象可能与其系统的外部边界进行交互；也就是说，它可能在图形用户界面上显示某些信息，或导致信息传递给另一个应用程序。然而，正如你将在第 15 章和第 [16](https://doi.org/10.1007/978-1-4842-9060-6_16)
    章中学到的，看似是外部系统边界的东西，在 Java 中通常被实现为另一个对象。


    #### 对象可能看似忽略了该事件


    最后，对象可能看似忽略了该事件，例如，一个 `Professor` 对象收到添加指导学生的消息，但确定被要求接纳为指导对象的 `Student` ***已经***
    是其指导对象：


    ```

    Student s = new Student();

    Professor p = new Professor();

    // 细节省略。

    // Professor p 将看似“忽略”下一条消息。

    p.addAdvisee(s);

    ```


    让我们看看与之前略有不同的 `addAdvisee` 方法版本：


    ```

    public class Professor {

    Collection advisees;  // 保存 Student 对象引用。

    // 细节省略。

    public void addAdvisee(Student s) {

    // 仅当 s 尚未在 ''advisees'' 集合中时，才将其插入。

    // 伪代码。

    if (s is already in collection) return;  // 不执行任何操作

    else advisees.add(s);

    }

    }

    ```


    实际上，说 `Professor` 对象什么都没做是一种过于简化的说法：至少，该对象正在执行相应的方法代码，该代码正在执行一些内部状态检查（“这个学生已经是我的指导对象了吗？”）。只不过，当一切尘埃落定时，`Professor`
    对象既没有改变状态，也没有向其他对象发送任何消息，所以它***看起来***好像什么都没发生过。

    '
- fmt: '# Scenarios


    Events originating externally to an application occur randomly: we can’t predict,
    for example, when a user is going to click a button on a GUI. In order for an
    application to perform useful functions, however, the *internal* events that arise
    in *response* to these external events—in other words, the messages that objects
    exchange in carrying out some system function—*can’t* be left to occur randomly.
    Rather, they must be orchestrated in such a way as to lead, in cause-and-effect
    fashion, to some desired result. In the same way that a musical score indicates
    which notes must be played by various instruments to produce a melody, a **scenario**
    prescribes the sequence of internal messages (events) that must occur in carrying
    out some system function from beginning to end.


    I introduced use cases in Chapter [9](#78624_3_En_9_Chapter.xhtml) as a way to
    specify all of the goals for an application from the standpoint of external actors—users
    or other computer systems. *Merriam-Webster’s Collegiate Dictionary, Eleventh
    Edition*, defines the term ***scenario*** as


    *A sequence of events esp. when imagined; esp : an account or synopsis of a possible
    course of action or events.*


    which is precisely how the term is used in the object modeling sense.


    A scenario is one hypothetical instance of how a particular use case might play
    out. Just as an object is an instance of a class and a link is an instance of
    an association, ***a scenario may be thought of as an instance of a use case***.
    Or, stated another way, just as a class is a template for creating objects and
    an association is a template for creating links, ***a use case is a template for
    creating scenarios***. A single use case thus inspires many different scenarios,
    in the same way that planning a driving trip from one city to another can involve
    many different routes.


    We describe scenarios in narrative fashion, as a series of steps observed from
    the standpoint of a hypothetical observer who is able to see not only what is
    happening outwardly as the system carries out a particular request but also what
    is going on behind the scenes, internally to the system. (Note, however, that
    even though we’re now concerned with internal system processes, we’re still only
    interested in ***functional*** requirements as defined in Chapter [9](#78624_3_En_9_Chapter.xhtml),
    not in the “bits and bytes” of how the computer works.)


    The following is a sample scenario representing the “Register for a course” use
    case, one of several use cases that we identified for the SRS in Chapter [9](#78624_3_En_9_Chapter.xhtml).


    ## Scenario #1 for the “Register for a Course” Use Case


    In this first scenario, a student by the name of Fred successfully registers for
    a course. The specific sequence of events is as follows:


    1. Fred, a student, logs on to the SRS.

    2. He views the schedule of classes for the current semester to determine which
    section(s) he wishes to register for.

    3. Fred requests a seat in a particular section of a course entitled “Beginning
    Object Concepts,” course number OBJ101, section 1.

    4. Fred’s plan of study is checked to ensure that the requested course is appropriate
    for his overall degree goals. (We assume that students are not permitted to take
    courses outside of their plans of study.)

    5. His transcript is checked to ensure that he has satisfied all of the prerequisites
    for the requested course, if there are any.

    6. Seating availability in the section is confirmed.

    7. The section is added to Fred’s current course load.


    From Fred’s vantage point (sitting in front of a computer screen!), here’s what
    he perceives to be occurring: after logging on to the SRS, he indicates that he
    wishes to register for OBJ101, section 1, by choosing it from the available course
    list and then clicks the Add button (see Figure [11-5](#78624_3_En_11_Chapter.xhtml#Fig5)).


    ![](images/78624_3_En_11_Chapter/78624_3_En_11_Fig5_HTML.jpg)


    A screen displays a student registration system that includes fields for S S N,
    Name, Total Courses, Registered For, and Schedule of Classes. An arrow points
    to the Add button, indicating that students can add courses to their registration
    by clicking the button. The system allows students to view their current registration
    status and make changes as needed.


    Figure 11-5


    Fred’s view of things, part 1


    A few moments later, Fred receives a confirmation message, as shown in Figure
    [11-6](#78624_3_En_11_Chapter.xhtml#Fig6).


    ![](images/78624_3_En_11_Chapter/78624_3_En_11_Fig6_HTML.jpg)


    A screen displays a student registration system that includes fields for S S N,
    Name, Total Courses, Registered For, and Schedule of Classes. A pop-up screen
    displays the request successful seat confirmed in C M P 101 and ok button.


    Figure 11-6


    Fred’s view of things, part 2


    Fred is unaware (for the most part) of all of the “behind-the-scenes” processing
    steps that are taking place on his behalf.


    The preceding scenario represents a “best-case” scenario, where everything goes
    smoothly and Fred ends up being successfully registered for the requested course.
    But, as we know all too well, things don’t always work out this smoothly, as evidenced
    by the following alternative scenario for the ***same*** use case. Everything
    is the same between Scenario #1 and Scenario #2 except for the steps that are
    shown in ***bold***.'
  raw: '## Scenarios


