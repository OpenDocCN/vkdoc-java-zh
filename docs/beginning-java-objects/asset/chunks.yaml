    setName(n);

    setSsn(s);

    // Pseudocode.

    do other complex things related to instantiating a Person ...

    ```


    As I’ve said numerous times before, code redundancy is to be avoided in an application
    whenever possible; fortunately, Java provides us with a mechanism for reusing
    a superclass’s constructor code from within a subclass’s constructor.'
