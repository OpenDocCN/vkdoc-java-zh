    It’s now time to turn our attention back to the UML class diagram that we produced
    in Part 2 of the book in order to render that object-oriented “blueprint” into
    Java code, focusing solely on what it takes to accurately model the SRS domain
    information in an OO programming language. In this chapter, you’ll learn how to
    represent all of the following object-oriented constructs in Java code:


    *   Associations of varying multiplicities (one-to-one, one-to-many, and many-to-many),
    including aggregations

    *   Inheritance relationships

    *   Association classes

    *   Reflexive associations

    *   Abstract classes

    *   Metadata

    *   Static attributes and methods


    along with practical guidelines as to when to use these various constructs. We’ll
    also cover a technique for testing your core classes via a command-line–driven
    application.


    ## Suggestions for Getting the Maximum Value from This Chapter


    One of the ***best*** ways to master a language is to start with code that works
    and to experiment with it. A good approach is to get some hands-on experience
    with Java by actually compiling and running the SRS application; studying it,
    so as to familiarize yourself with the techniques that we’ve used; and, finally,
    modifying it yourself. As you know, exercises provided at the end of each chapter
    provide specific suggestions for experiments that you may wish to try. Therefore,
    before you dive into this chapter, ***I encourage you to download the Java source
    code for Chapter*** [***14***](#78624_3_En_14_Chapter.xhtml) ***from the book’s
