    In this chapter, you’ve learned some basic aspects of the Java language. In particular,
    we covered


    - The architecture-neutral nature of Java

    - The anatomy of a simple Java program

    - The mechanics of how to compile and execute a Java program from the command
    line

    - The eight primitive Java types and the `String` type

    - How variables of these types are declared and initialized

    - How an expression of one type can be cast into a different type and when it’s
    necessary to do so

    - Arithmetic, assignment, logical, and relational expressions and operators

    - Loops and several other flow control structures available with Java

    - How to define blocks of code and the concept of variable scope

    - How to print text messages with the `System.out.println` and `System.out.print`
    methods

    - Some basic elements of good Java programming style


    There’s a lot more to learn about Java—things you’ll need to know in building
    the SRS application in Part 3 of the book—but I need to explain a number of basic
    object concepts first. So on to Chapter 3!


    ## Exercises


    1. Compare what you’ve learned about Java so far to another programming language
    that you’re already familiar with. What is similar about the two languages? What
    is different?


    2. [*Coding*] Create a program that will print the even numbers from 2 to 10 to
    the command window using (a) a `for` loop and a `continue` statement and (b) a
    `while` loop and a `boolean` variable as a flag.


    3. Given the following initial variable declarations and value assignments, evaluate
    the expression on the last line of code manually, without using the Java compiler:


    ```

    int a = 1;

    int b = 1;

    int c = 1;

    ((((c++ + --a) * b) != 2) && true)

    ```


    Using nested `for` or `if` loops, write a program called `Stars.java` that produces
    the following output:


    ```

    1: *

    2: **

    3: ***

    4: ****

    5: *****

    ```


    # Objects and Classes


    Objects are the fundamental building blocks of an object-oriented application.
    Just as you learned in Chapter 1 that abstraction involves producing a model of
    the real world, you’ll see in this chapter that objects are “mini abstractions”
    of the various real-world elements that comprise such a model.


    In this chapter, you’ll learn


    - The advantages of an object-oriented approach to software development as compared
    with the “traditional” non-OO approach

    - How to use classes to specify an object’s data and behavior

    - How to create objects at run time

    - How to declare **reference variables** to refer to objects symbolically within
    a program

    - How objects keep track of one another in memory


    ## Software at Its Simplest


    At its simplest, every software application consists of two primary components:
    ***data*** and ***functions*** that operate on (i.e., input, output, calculate,
    store, retrieve, print, etc.) that data. (See Figure 3-1.)


    ![Figure 3-1](images/78624_3_En_3_Chapter/78624_3_En_3_Fig1_HTML.png)


    *Figure 3-1* At its simplest, software consists of data and functions that operate
    on that data


    The pre-OO way of designing software was known as (**top-down**) **functional
    decomposition**. Let’s compare the functional decomposition approach of designing
    software with the OO approach.'
