- fmt: "## Software at Its Simplest, Revisited\n\nAs we discussed in Chapter [3](#78624_3_En_3_Chapter.xhtml),\
    \ software at its simplest consists of two primary components: **data** and **functions**\
    \ that operate on that data (see Figure [4-9](#78624_3_En_4_Chapter.xhtml#Fig9)).\n\
    \n![](images/78624_3_En_4_Chapter/78624_3_En_4_Fig9_HTML.png)\n\nA yin and yang\
    \ symbol. It consists of data on one side and functions on the other.\n\n**Figure\
    \ 4-9** At it simplest, software consists of data and functions that operate on\
    \ that data\n\nWe also compared the functional decomposition approach of designing\
    \ software with the object-oriented approach. By way of review:\n\n*With the functional\
    \ decomposition approach to software development, our primary focus was on the\
    \ functions that an application was to perform; data was an afterthought.*\n\n\
    That is:\n\n- Data was passed around from one function to the next.\n- Data structure\
    \ thus had to be understood in **many** places—that is, by many functions—throughout\
    \ an application.\n- If an application’s data structure had to change after the\
    \ application was deployed, nontrivial ripple effects often arose throughout the\
    \ application.\n- If data integrity errors arose as a result of faulty logic after\
    \ an application had been fully integrated, it was often very difficult to pinpoint\
    \ precisely where—that is, **in which specific function(s)**—the error might have\
    \ occurred.\n\nWe now know that by taking advantage of the mechanisms of encapsulation\
    \ plus information hiding, the object-oriented approach to software development\
    \ remedies the vast majority of these shortcomings:\n\n- Data is **encapsulated**\
    \ inside of objects as **attributes**, and, if we declare these attributes as\
    \ having **private** accessibility, then the data structure has to be understood\
    \ only by the object/**class** to which the data belongs.\n- If the (private)\
    \ attribute declarations of a class have to change after an application has been\
    \ deployed—as was the case when we modified the data structure of the `Student`\
    \ class, replacing an `int age` attribute with a `Date birthDate` attribute—there\
    \ are virtually **no ripple effects**: only the internal logic of the affected\
    \ class’s methods must change.\n\n  (Recall that we modified the internal workings\
    \ of the `getAge` method in one of our `Student` class examples, but that **none**\
    \ of the client code that called `getAge` had to change, because we hadn’t altered\
    \ the **public** method signature of the method.)\n\n- **Each class is responsible\
    \ for ensuring the integrity of its object’s data**. Thus, if data integrity errors\
    \ arise within a given object’s data, we can pretty much assume that it is the\
    \ class to which the object belongs whose method logic is faulty.\n\n  (Recall\
    \ the `updateBirthdate` method from an earlier `Student` class example. This method\
    \ contained all sorts of validity checks to ensure that the `String` being passed\
    \ in as an argument represented a valid birth date. Had an **invalid** birth date\
    \ somehow crept in, we’d know that there was something faulty about the validation\
    \ logic of the `updateBirthdate` method in particular.)\n\nIf every software application\
    \ consists of data and functions that operate on that data, then **an object can\
    \ be thought of as a sort of “mini application”** whose methods (functions) operate\
    \ on its attributes (data), as shown in Figure [4-10](#78624_3_En_4_Chapter.xhtml#Fig10).\
    \ You’ll learn in Chapter [5](#78624_3_En_5_Chapter.xhtml) how such objects “join\
    \ forces” to collaborate on accomplishing the overall mission of an application.\n\
    \n![](images/78624_3_En_4_Chapter/78624_3_En_4_Fig10_HTML.png)\n\nA yin and yang\
    \ symbol. It consists of attributes of data on one side and methods of functions\
    \ on the other.\n\n**Figure 4-10** An object is a “mini application” that encapsulates\
    \ data and functions\n\n## Summary\n\nIn this chapter, you’ve learned:\n\n- How\
    \ to formally specify method headers, the “language” with which services may be\
    \ requested of an object, and how to formulate messages—using dot notation—to\
    \ actually request an object to perform such services\n- That multiple objects\
    \ often have to collaborate in carrying out a particular system function, such\
    \ as registering a student for a course\n- That an object A can only communicate\
    \ with another object B if A has a handle on B and the various ways that such\
    \ a handle/reference can be obtained\n- How classes designate the `public`/`private`\
    \ accessibility of their features (attributes, methods) through a mechanism known\
    \ as **information hiding**\n- How powerful a language feature information hiding\
    \ is, both in terms of protecting the integrity of an object’s data and preventing\
    \ ripple effects in client code when private implementation details of an application\
    \ inevitably change\n- How to declare and use accessor (“get”/“set”) methods to\
    \ gracefully access the private attributes of an object from client code\n- How\
    \ a special type of function called a **constructor** is specified and used to\
    \ control what is to occur when we instantiate new objects\n- How **overloading**\
    \ enables a class to have multiple methods with the same name and/or multiple\
    \ constructors as long as their argument signatures are different\n\n## Exercises\n\
    \n1. Given a class `Book` defined as having the following attributes:\n\n   ```\n\
    \   Author author;\n   String title;\n   int noOfPages;\n   boolean fiction;\n\
    \   ```\n\n   Write standard “get”/“set” method headers for each of these attributes.\n\
    \n2. [*Coding*] Actually code and compile the `Book` class based on the attributes\
    \ and “get”/“set” methods called for in Exercise 1.\n\n3. It’s often possible\
    \ to discern something about a class’s design based on the messages that are getting\
    \ passed to objects in client code. Consider the following client code snippet:\n\
    \n   ```\n   Student s;\n   Professor p;\n   boolean b;\n   String x = \"Math\"\
    ;\n   s.setMajor(x);\n   if (!s.hasAdvisor()) {\n       b = s.designateAdvisor(p);\n\
    \   }\n   ```\n\n   What features—attributes, methods—are implied for the `Student`\
    \ and `Professor` classes by virtue of how this client code is structured? Be\
    \ as specific as possible with respect to:\n   - The accessibility of each feature\n\
    \   - How each feature would be declared (e.g., the details, to the extent that\
    \ you can “discover” them, of each method header)\n\n4. [*Coding*] Expand the\
    \ `Student` and `Professor` classes that you developed for Exercise 2 of Chapter\
    \ [3](#78624_3_En_3_Chapter.xhtml) (and, optionally, the `Department` class that\
    \ you developed for Exercise 3 of Chapter [3](#78624_3_En_3_Chapter.xhtml)) as\
    \ follows:\n   - Include accessor methods for every attribute.\n   - Reflect the\
    \ appropriate accessibility on all features.\n   - Include one or more constructors\
    \ per class.\n   - Write a method with the header `public void printAllAttributes()`\
    \ that can be used to display the values of all attributes to the command prompt,\
    \ for example:\n\n     ```\n     Student Name: John Smith\n     Student ID: 123-45-6789\n\
    \     ```\n\n     etc.\n\n   Then, modify the accompanying `MainClass`’s `main`\
    \ method to take advantage of your new constructors to instantiate one of each\
    \ of the object types.\n\n5. What’s wrong with the following code? Point out things\
    \ that go against OO convention or best practices based on what you’ve learned\
    \ in this chapter, regardless of whether or not the Java compiler would “complain”\
    \ about them.\n\n   ```\n   public class Building {\n       private String address;\n\
    \       public int numberOfFloors;\n       void GetnumberOfFloors() {\n      \
    \     return numberOfFloors;\n       }\n       private void SetNoOfFloors(float\
    \ n) {\n           NumberOfFloors = n;\n       }\n       public void display()\
    \ {\n           System.out.println(\"Address:  \" + address);\n           System.out.println(\"\
    No. of Floors:  \" + numberOfFloors);\n       }\n   }\n   ```"
