    through this chapter.


    ## The SRS Class Diagram Revisited


    Let’s turn our attention back to the SRS class diagram that we produced in Part
    2 of the book. In speaking with our sponsors for the SRS, we learn that they’ve
    decided to cut back on a few features in the interest of reducing development
    costs:


