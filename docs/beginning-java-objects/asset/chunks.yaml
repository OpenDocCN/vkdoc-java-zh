    \ of overriding is less than ideal because the first four lines of the `print`\
    \ method of `GraduateStudent` duplicated the code from the `Student` class’s version\
    \ of `print`. Here’s the `Student` version of the method once again:\n\n```\n\
    public void print() {\n    // Print the values of all the attributes that the\
    \ Student class\n    // knows about; again, note the use of accessor methods.\n\
    \    System.out.println(\"Student Name:  \" + getName() + \"\\n\" +\n        \
    \               \"Student No.:  \" + getStudentId() + \"\\n\" +\n            \
    \           \"Major Field:  \" + getMajorField() + \"\\n\" +\n               \
    \        \"GPA:  \" + getGpa());\n}\n```\n\nAnd here’s the `GraduateStudent` version:\n\
    \n```\npublic void print() {\n    // This code is repeated from the Student version!\n\
    \    System.out.println(\"Student Name:  \" + getName() + \"\\n\" +\n        \
    \               \"Student No.:  \" + getStudentId() + \"\\n\" +\n            \
    \           \"Major Field:  \" + getMajorField() + \"\\n\" +\n               \
    \        \"GPA:  \" + getGpa() + \"\\n\" +\n                       \"Undergrad.\
    \ Deg.:  \" + getUndergraduateDegree() + \"\\n\" +\n                       \"\
    Undergrad. Inst.:  \" + getUndergraduateInstitution());\n}\n```\n\nRedundancy\
    \ in an application is to be avoided whenever possible, because redundant code\
    \ represents a maintenance headache. When we have to change code in one place\
    \ in an application, we don’t want to have to remember to change it in countless\
    \ other places or, worse yet, forget to do so and wind up with inconsistency in\
    \ our logic.\n\nFortunately, Java provides a way for us to have our cake and eat\
    \ it, too—that is, a way for us to override the `print` method while simultaneously\
    \ reusing its code. We’d code the `print` method for the `GraduateStudent` class\
    \ as follows:\n\n```\npublic class GraduateStudent extends Student {\n    // Details\
    \ omitted.\n    public void print() {\n        // Reuse code by calling the print\
    \ method as defined by the Student\n        // superclass ...\n        super.print();\n\
    \        // ... and then go on to do something extra - namely, print this derived\n\
    \        // class's specific attributes.\n        System.out.println(\"Undergrad.\
    \ Deg.:  \" + getUndergraduateDegree() + \"\\n\" +\n                         \
    \  \"Undergrad. Inst.:  \" + getUndergraduateInstitution());\n    }\n}\n```\n\n\
    We use the Java keyword `super` as the qualifier for a method call\n\n```\nsuper.methodName(arguments);\n\
    ```\n\nwhenever we wish to invoke the version of method *methodName* that was\
    \ defined by our superclass. That is, in the preceding example, we’re essentially\
    \ saying to the compiler, “First, execute the `print` method the way that the\
    \ superclass, `Student`, would have executed it, and then do something extra—namely,\
    \ print out the values of the new `GraduateStudent` attributes.”\n\nNote that\
    \ the syntax\n\n```\nsuper.methodName(arguments);\n```\n\ninvolves invoking one\
    \ method from within another. Let’s look at a slightly more involved example to\
    \ emphasize this syntax.\n\nWe’ll start with this superclass declaration\n\n```\n\
    public class Superclass {\n    public void foo(int x, int y) { ... }\n}\n```\n\
    \nand derive this subclass from it:\n\n```\npublic class Subclass extends Superclass\
    \ {\n    // We're overriding the foo method.\n    // (Note that we're using a\
    \ and b as parameter names here to override\n    // parameters x and y in the\
    \ superclass; this is perfectly fine as long\n    // as their types are identical.)\n\
    \    public void foo(int a, int b) {\n        // Details to follow ...\n    }\n\
    }\n```\n\nWe have numerous options as to how we might use the `super` keyword\
    \ within the overridden `foo` method of a subclass, as illustrated by the bolded\
    \ passages (and corresponding comments) in the examples that follow:\n\n```\n\
    public class Subclass extends Superclass {\n    // We're overriding the foo method.\n\
    \    public void foo(int a, int b) {\n        // We can pass the argument values\
    \ a and b through to our superclass's\n        // version of foo ...\n       \
    \ super.foo(a, b);\n    }\n}\n```\n\nor\n\n```\npublic class Subclass extends\
    \ Superclass {\n    // We're overriding the foo method.\n    public void foo(int\
    \ a, int b) {\n        int x = 2;  // a local variable\n        // We can pass\
    \ selected argument values through to our superclass's\n        // version of\
    \ foo ...\n        super.foo(a, x);\n    }\n}\n```\n\nor even\n\n```\npublic class\
    \ Subclass extends Superclass {\n    // We're overriding the foo method.\n   \
    \ public void foo(int a, int b) {\n        int x = 2;  // a local variable\n \
    \       // Here, we're using neither a nor b as arguments.\n        super.foo(x,\
    \ 3);\n    }\n}\n```\n\nNote that our invocation of `super.foo(...)` can occur\
    \ anywhere within the method:\n\n```\npublic class Subclass extends Superclass\
    \ {\n    // We're overriding the foo method.\n    public void foo(int a, int b)\
    \ {\n        // Pseudocode.\n        do some stuff;\n        super.foo(a, b);\n\
    \        // Pseudocode.\n        do more stuff;\n    }\n}\n```\n\nAnd, if `foo`\
    \ were declared to have a non-`void` return type in `Superclass`—say, `int`—we\
    \ could even return the result of calling `super.foo(...)`:\n\n```\npublic class\
    \ Subclass extends Superclass {\n    // We're overriding the foo method (here,\
    \ we\n    // assume that foo was declared with an int return\n    // type in the\
    \ superclass).\n    public int foo(int a, int b) {\n        int x = 3 * a;\n \
    \       int y = 17 * b;\n        return super.foo(x, y);\n    }\n}\n```\n\nThe\
    \ bottom line is we can use `super.methodName(...)` in whatever way makes sense\
    \ in carrying out a subclass’s version of a method that is being overridden.\n\
    \nAnother important use of the `super` keyword has to do with reusing constructor\
    \ code; we’ll learn about this alternative use of `super` later in this chapter."
