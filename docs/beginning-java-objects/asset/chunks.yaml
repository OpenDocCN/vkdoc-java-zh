- fmt: "### Rules for Deriving Classes: The “Don’ts”\n\nWhen deriving a new class,\
    \ there are some things that we should **not** attempt to do. (And, as it turns\
    \ out, OO language compilers will actually prevent us from successfully compiling\
    \ programs that attempt to do most of these things.)\n\n**We shouldn’t change\
    \ the semantics—that is, the intention or meaning—of a feature.** For example:\n\
    \n- If the `print` method of a superclass such as `Student` is intended to display\
    \ the values of all of an object’s attributes in the command window, then the\
    \ `print` method of a subclass such as `GraduateStudent` shouldn’t, for example,\
    \ be overridden so that it directs all of its output to a file instead.\n- If\
    \ the `name` attribute of a superclass such as `Person` is intended to store a\
    \ person’s name in “last name, first name” order, then the `name` attribute of\
    \ a subclass such as `Student` should be used in the same fashion.\n\n**We can’t\
    \ physically eliminate features, nor should we effectively eliminate them by ignoring\
    \ them.** To attempt to do so would break the spirit of the “is a” hierarchy.\
    \ By definition, inheritance requires that **all** features of **all** ancestors\
    \ of a class A must also apply to class A itself in order for A to truly be a\
    \ proper subclass. If a `GraduateStudent` could eliminate the `degreeSought` attribute\
    \ that it inherits from `Student`, for example, is a `GraduateStudent` **really**\
    \ a `Student` after all? Strictly speaking, the answer is no.\n\nFurthermore,\
    \ from a practical standpoint, if we effectively disable a method by overriding\
    \ it with a “do nothing” version, as illustrated in the following `BadStudent`\
    \ example:\n\n```\npublic class Student {\n    // Details omitted.\n    public\
    \ void printStudentInfo() {\n        // Pseudocode.\n        print all attribute\
    \ values ...\n    }\n}\n\npublic class BadStudent extends Student {\n    // Details\
    \ omitted.\n    // We're overriding the printStudentInfo method of Student by\n\
    \    // \"stubbing it out\" - that is, by providing it with an EMPTY method\n\
    \    // body, so that it effectively does NOTHING.\n    // (Note that this WILL\
    \ compile!)\n    public void printStudentInfo() { }\n}\n```\n\n**someone else**\
    \ might wish to derive a subclass from **our** subclass later on:\n\n```\npublic\
    \ class NaiveStudent extends BadStudent { ...\n```\n\nassuming that they’ll inherit\
    \ a **meaningful** version of `printStudentInfo` from our `BadStudent` superclass.\
    \ This is a reasonable thing for them to assume, given the “all or nothing” nature\
    \ of inheritance, especially if this other developer doesn’t have access to the\
    \ **source code** of `BadStudent` to look at. Unfortunately, because we’ve broken\
    \ the spirit of the “is a” relationship in the way that we’ve compromised the\
    \ `printStudentInfo` method, we’ve burdened them—and anyone else who might choose\
    \ to derive a class from `BadStudent`—with a “defective” method. **The bottom\
    \ line is never do this!**\n\nFinally, **we shouldn’t attempt to change a method’s\
    \ signature when we override it.** For example, if the `print` method inherited\
    \ by the `Student` class from `Person` has the signature `print()`, then the `Student`\
    \ class can’t change this method’s header to accept an argument, say, `print(int\
    \ noOfCopies)`. To do so is to create a different method entirely, due to another\
    \ language feature known as **overloading**, a concept that we discussed in Chapter\
    \ [4](#78624_3_En_4_Chapter.xhtml). That is, in the following example:\n\n```\n\
    public class Person {\n    // Details omitted.\n    public void print() { ...\
    \ }\n}\n\npublic class Student extends Person {\n    // Details omitted.\n   \
    \ // We're naively trying to modify the print method signature here.\n    public\
    \ void print(int noOfCopies) { ... }\n}\n```\n\nthe `Student` class will wind\
    \ up with **two** overloaded versions of the `print` method: the version that\
    \ it has explicitly declared to take one `int` argument plus the parameterless\
    \ version that it has inherited from the `Person` class.\n\n### Private Features\
    \ and Inheritance\n\nAs mentioned earlier, inheritance is an “all or nothing”\
    \ proposition. That is, if class Y is declared to be a subclass of class X:\n\n\
    ```\npublic class Y extends X { ... }\n```\n\nthen Y cannot pick and choose which\
    \ features of X it will inherit. In particular, while all of the attributes declared\
    \ by X will become an inherent part of the “bone structure” of all objects of\
    \ type Y, some of the attributes of superclass X may not be **directly referenceable**\
    \ by name within subclass Y, depending on what accessibility the attributes were\
    \ assigned in the superclass.\n\nConsider the following code:\n\n```\npublic class\
    \ Person {\n    accessibility modifier int age;\n    // Other details omitted.\n\
    }\n```\n\nYou learned about two types of accessibility in Chapter [4](#78624_3_En_4_Chapter.xhtml):\
    \ `public` and `private`. As it turns out, there are actually **three** different\
    \ explicit accessibility modifier keywords in Java. That is, *<accessibility modifier>*\
    \ can be one of the following:\n\n- `private`\n- `public`\n- `protected` (an accessibility\
    \ modifier that is only relevant within a superclass/subclass relationship, as\
    \ you’ll see shortly)\n\nIf the accessibility modifier is omitted entirely, a\
    \ feature has what is known as **package visibility** by default. We’ll discuss\
    \ this notion in Chapter [13](#78624_3_En_13_Chapter.xhtml).\n\nSuppose that we\
    \ were to derive the `Student` class from `Person` as follows:\n\n```\npublic\
    \ class Student extends Person {\n    // Details omitted.\n    // We declare a\
    \ method that manipulates the age attribute.\n    public boolean isOver65() {\n\
    \        if (age > 65) {  // age was declared as an attribute in Person and is\
    \ inherited by Student\n            return true;\n        } else {\n         \
    \   return false;\n        }\n    }\n    // Other details omitted.\n}\n```\n\n\
    What will happen when we try to compile this `Student` class? The answer to this\
    \ question depends on what accessibility was granted to the `age` attribute when\
    \ it was declared in the `Person` class.\n\nIf `age` is declared to be `private`\
    \ in `Person`, as most attributes typically are:\n\n```\npublic class Person {\n\
    \    private int age;\n    // etc.\n}\n```\n\nthen we’ll encounter a compilation\
    \ error on the line of code **highlighted** in the following code for the `Student`\
    \ class:\n\n```\npublic class Student extends Person {\n    // Details omitted.\n\
    \    public boolean isOver65() {\n        if (age > 65) {  // this won't compile!\n\
    \            return true;\n        } else {\n            return false;\n     \
    \   }\n    }\n    // Other details omitted.\n}\n```\n\nThe error message will\
    \ be:\n\n```\ncannot find symbol\nsymbol:    variable age\nlocation:  class Student\n\
    if (age > 65) {\n^\n```\n\nWhy is this? Since the `age` attribute is declared\
    \ to be `private` in `Person`, the symbol `age` is not inherited, so it is not\
    \ in scope within the `Student` class. Yet, the memory allocated for a `Student`\
    \ object when it is instantiated does indeed allow for storage of a student’s\
    \ age, because as mentioned earlier, it is part of the “bone structure” of a `Person`,\
    \ and a `Student` **is a** `Person` by virtue of inheritance.\n\nWhat can we do\
    \ to get around this roadblock? It turns out that we have three choices in Java.\n\
    \n**Option #1**: We can change the accessibility of `age` to be `public` in `Person`:\n\
    \n```\npublic class Person {\n    public int age;\n    // etc.\n}\n```\n\nthus\
    \ making it inherited and directly accessible by name in the `Student` subclass.\
    \ The line of code that previously generated a compiler error in our `Student`\
    \ subclass, namely:\n\n```\nif (age > 65) {\n```\n\nwould now compile without\
    \ error. The downside of this approach, however, is that by making the `age` attribute\
    \ `public` in `Person`, we’d thus be allowing **client code** to freely access\
    \ the `age` attribute, as well:\n\n```\npublic class Example {\n    public static\
    \ void main(String[] args) {\n        Student s = new Student();\n        // Details\
    \ omitted.\n        s.age = 23; // This would compile, but is undesirable.\n \
    \   }\n}\n```\n\nThis is, generally speaking, a bad practice, for the reasons\
    \ discussed at length in Chapter [4](#78624_3_En_4_Chapter.xhtml).\n\n**Option\
    \ #2**: We could modify the accessibility of `age` to be `protected` in `Person`:"
  raw: '### Rules for Deriving Classes: The “Don’ts”


    When deriving a new class, there are some things that we should ***not*** attempt
    to do. (And, as it turns out, OO language compilers will actually prevent us from
    successfully compiling programs that attempt to do most of these things.)


    ***We shouldn’t change the semantics—that is, the intention or meaning—of a feature***.
    For example:


    *   If the `print` method of a superclass such as `Student` is intended to display
    the values of all of an object’s attributes in the command window, then the `print`
    method of a subclass such as `GraduateStudent` shouldn’t, for example, be overridden
    so that it directs all of its output to a file instead.


    *   If the `name` attribute of a superclass such as `Person` is intended to store
    a person’s name in “last name, first name” order, then the `name` attribute of
    a subclass such as `Student` should be used in the same fashion.


    ***We can’t physically eliminate features, nor should we effectively eliminate
    them by ignoring them***. To attempt to do so would break the spirit of the “is
    a” hierarchy. By definition, inheritance requires that ***all*** features of ***all***
    ancestors of a class A must also apply to class A itself in order for A to truly
    be a proper subclass. If a `GraduateStudent` could eliminate the `degreeSought`
    attribute that it inherits from `Student`, for example, is a `GraduateStudent`
    ***really*** a `Student` after all? Strictly speaking, the answer is no.


    Furthermore, from a practical standpoint, if we effectively disable a method by
    overriding it with a “do nothing” version, as illustrated in the following `BadStudent`
    example


    ```

    public class Student {

    // Details omitted.

    public void printStudentInfo() {

    // Pseudocode.

    print all attribute values ...

    }

    }

    public class BadStudent extends Student {

    // Details omitted.

    // We''re overriding the printStudentInfo method of Student by

    // "stubbing it out" - that is, by providing it with an EMPTY method

    // body, so that it effectively does NOTHING.

    // (Note that this WILL compile!)

    public void printStudentInfo() { }

    }

    ```


    ***someone else*** might wish to derive a subclass from ***our*** subclass later
    on


    ```

    public class NaiveStudent extends BadStudent { ...

    ```


    assuming that they’ll inherit a ***meaningful*** version of `printStudentInfo`
    from our `BadStudent` superclass. This is a reasonable thing for them to assume,
    given the “all or nothing” nature of inheritance, especially if this other developer
    doesn’t have access to the ***source code*** of `BadStudent` to look at. Unfortunately,
    because we’ve broken the spirit of the “is a” relationship in the way that we’ve
    compromised the `printStudentInfo` method, we’ve burdened them—and anyone else
    who might choose to derive a class from `BadStudent`—with a “defective” method.
    ***The bottom line is never do this***!


    Finally, ***we shouldn’t attempt to change a method’s signature when we override
    it***. For example, if the `print` method inherited by the `Student` class from
    `Person` has the signature `print()`, then the `Student` class can’t change this
    method’s header to accept an argument, say, `print(int noOfCopies)`. To do so
    is to create a different method entirely, due to another language feature known
    as **overloading**, a concept that we discussed in Chapter [4](#78624_3_En_4_Chapter.xhtml).
    That is, in the following example


    ```

    public class Person {

    // Details omitted.

    public void print() { ... }

    }

    public class Student extends Person {

    // Details omitted.

    // We''re naively trying to modify the print method signature here.

    public void print(int noOfCopies) { ... }

    }

    ```


    the `Student` class will wind up with ***two*** overloaded versions of the `print`
    method: the version that it has explicitly declared to take one `int` argument
    plus the parameterless version that it has inherited from the `Person` class.


    ### Private Features and Inheritance


    As mentioned earlier, inheritance is an “all or nothing” proposition. That is,
    if class Y is declared to be a subclass of class X


    ```

    public class Y extends X { ... }

    ```


    then Y cannot pick and choose which features of X it will inherit. In particular,
    while all of the attributes declared by X will become an inherent part of the
    “bone structure” of all objects of type Y, some of the attributes of superclass
    X may not be ***directly referenceable*** by name within subclass Y, depending
    on what accessibility the attributes were assigned in the superclass.


    Consider the following code:


    ```

    public class Person {

    accessibility modifier int age;

    // Other details omitted.

    }

    ```


    You learned about two types of accessibility in Chapter [4](#78624_3_En_4_Chapter.xhtml):
    `public` and `private`. As it turns out, there are actually ***three*** different
    explicit accessibility modifier keywords in Java. That is, *<accessibility modifier>*
    can be one of the following:


    *   `private`


    *   `public`


    *   `protected` (an accessibility modifier that is only relevant within a superclass/subclass
    relationship, as you’ll see shortly)


    If the accessibility modifier is omitted entirely, a feature has what is known
    as **package visibility** by default. We’ll discuss this notion in Chapter [13](#78624_3_En_13_Chapter.xhtml).


    Suppose that we were to derive the `Student` class from `Person` as follows:


    ```

    public class Student extends Person {

    // Details omitted.

    // We declare a method that manipulates the age attribute.

    public boolean isOver65( ) {

    if (age > 65) {  // age was declared as an attribute in Person and is inherited
    by Student

    return true;

    } else {

    return false;

    }

    // Other details omitted.

    }

    ```


    What will happen when we try to compile this `Student` class? The answer to this
    question depends on what accessibility was granted to the `age` attribute when
    it was declared in the `Person` class.


    If `age` is declared to be `private` in `Person`, as most attributes typically
    are


    ```

    public class Person {

    private int age;

    // etc.

    }

    ```


    then we’ll encounter a compilation error on the line of code **highlighted** in
    the following code for the `Student` class:


    ```

    public class Student extends Person {

    // Details omitted.

    public boolean isOver65( ) {

    if (age > 65) {  // this won''t compile!

    return true;

    }  else {

    return false;

    }

    // Other details omitted.

    }

    ```


    The error message will be


    ```

    cannot find symbol

    symbol:    variable age

    location:  class Student

    if (age > 65) {

    ^

    ```


    Why is this? Since the `age` attribute is declared to be `private` in `Person`,
    the symbol `age` is not inherited, so it is not in scope within the `Student`
    class. Yet, the memory allocated for a `Student` object when it is instantiated
    does indeed allow for storage of a student’s age, because as mentioned earlier,
    it is part of the “bone structure” of a `Person`, and a `Student` ***is a*** `Person`
    by virtue of inheritance.


