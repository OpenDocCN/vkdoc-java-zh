- fmt: '### Static Methods


    Just as static variables are associated with a class as a whole vs. with a specific
    individual object, `static` methods are in turn methods that may be invoked on
    a class as a whole.


    Let’s declare all of the methods related to the `totalStudents` variable—namely,
    `getTotalStudents`, `setTotalStudents`, and `reportTotalEnrollment`—to be `static`:


    ```

    public class Student {

    private static int totalStudents;

    // Other details omitted.

    // Constructor.

    public Student(...) {

    // Details omitted.

    // Automatically increment the student count every time we

    // instantiate a new Student.

    totalStudents++;

    }

    // The following three methods are now static methods; note, however, that

    // the method BODIES are UNCHANGED from when these were nonstatic methods.

    public static int getTotalStudents() {

    return totalStudents;

    }

    public static void setTotalStudents(int x) {

    totalStudents = x;

    }

    public static int reportTotalEnrollment() {

    System.out.println("Total Enrollment:  " + getTotalStudents());

    }

    // etc.

    }

    ```


    Static methods can either be invoked on a class as a whole


    ```

    Student.reportTotalEnrollment();

    ```


    or on an object belonging to the class for which it is defined


    ```

    s.reportTotalEnrollment();

    ```


    and the effect will be the same.


    ### Restrictions on Static Methods


    Note that there is an important restriction on static methods: such methods are
    not permitted to access nonstatic features of the class to which the methods belong.
    Before we discuss the rationale for this, let’s consider a specific example.


    If we were to attempt to write a static `print` method for our `Student` class
    that in turn accessed the nonstatic `getName` method of `Student`, the compiler
    would prevent us from doing so. Here’s the proposed code:


    ```

    public class Student {

    // Two variables -- one nonstatic, one static.

    private String name;

    private static int totalStudents;

    // etc.

    // We declare accessor methods for both variables:

    // STATIC get/set methods for STATIC variable "totalStudents" ...

    public static int getTotalStudents() { … }

    public static void setTotalStudents(int x) { … }

    // ... and NONstatic get/set methods for NONstatic attribute "name".

    public String getName() { … }

    public void setName(String n) { … }

    // Another static method.

    public static void print() {

    // A static method may NOT access NONstatic features

    // such as "getName()" -- the following line won''t compile.

    System.out.println(getName() + " is one of " + getTotalStudents() +

    "students.");

    }

    }

    ```


    The compiler would generate the following error message regarding the `println`
    statement in the `static print` method:


    ```

    non-static method getName() cannot be referenced from a static context

    ```


    Why is this? As we discussed in Chapter [3](#78624_3_En_3_Chapter.xhtml), classes
    are empty templates as far as attributes are concerned; it’s not until we instantiate
    an object that its attribute values get filled in. If a static method is invoked
    on a class as a whole and that method is in turn to try to access the value of
    an attribute, the value of that attribute would be undefined for the class, as
    illustrated conceptually in Figure [7-9](#78624_3_En_7_Chapter.xhtml#Fig9). Since
    our `static print` method invokes the nonstatic `getName` method, which in turn
    accesses the (nonstatic) variable `name`, we’re precluded from calling the `getName`
    method from `print`.


    ![](images/78624_3_En_7_Chapter/78624_3_En_7_Fig9_HTML.jpg)


    A java code to get the name and total students at the top leads to a diagram of
    the student class with the name and total students. The text reads, if a static
    method is invoked on the class as a whole, values of any nonstatic features such
    as the get name method would be undefined.


    Figure 7-9


    Nonstatic attribute values are undefined in the context of a class


    Another restriction on static methods is that they may not be declared to be `abstract`:


    ```

    public class Student {

    // This won''t compile.

    public abstract static void incrementEnrollment();

    }

    ```


    The following compiler error would result:


    ```

    illegal combination of modifiers: abstract and static

    ```


    ### Utility Classes


    We can take advantage of static features to design utility classes, which are
    classes that provide convenient ways of performing frequently used behaviors without
    having to instantiate an object to perform such behaviors. Such classes are often
    comprised wholly of static methods and public static variables.


    The Java language includes several predefined utility classes. One example of
    such a class is the `Math` class of the `java.lang` package. The `Math` class
    declares a variety of static methods to compute trigonometric, exponential, logarithmic,
    and power functions; to round numeric values; and to generate random numbers.
    We saw the use of one such static method—`Math.sqrt()`—in an example in Chapter
    [6](#78624_3_En_6_Chapter.xhtml):


    ```

    squareRoot[i] = Math.sqrt(i);

    ```


    The mathematical constant π is declared as a `public static` attribute of the
    `Math` class named `Math.PI` and can be accessed from client code as follows:


    ```

    // Compute the area of a circle.

    double area = Math.PI * radius * radius;

    ```


    In order to prevent client code from modifying the values of such “constants”


    ```

    Math.PI = 0.0;  // Whoops!  This isn''t good!

    ```


    utility classes make use of final variables, as discussed in the following section.


    Chapter [6](#78624_3_En_6_Chapter.xhtml) mentioned that the Java language provides
    a different class to serve as a “wrapper” for each of the eight distinct primitive
    types: `Integer`, `Float`, `Double`, `Byte`, `Short`, `Long`, `Boolean`, and `Character`.
    We’ll talk about their roles as utility classes in Chapter [13](#78624_3_En_13_Chapter.xhtml).'
