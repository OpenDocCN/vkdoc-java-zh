- fmt: '# Metadata


    One question that is often raised by beginning modelers is why we don’t use an
    inheritance relationship to relate the `Course` and `Section` classes, rather
    than using a simple association as we’ve chosen to do. On the surface, it does
    indeed seem tempting to want `Section` to be a derived class of `Course`, because
    all of the attributes listed for a `Course`—`courseNo`, `courseName`, and `creditValue`—also
    pertain to a `Section`; so why wouldn’t we want `Section` to inherit these, in
    the same way that `Student` and `Professor` inherit all of the attributes of `Person`?
    A simple example should quickly illustrate why inheritance isn’t appropriate.


    Let’s say that because “Beginning Object Concepts” is such a popular course, the
    university is offering three sections of the course for the Spring 2025 semester.
    We therefore instantiate one `Course` object and three `Section` objects. If `Section`
    were a derived class of `Course`, then all four objects would carry `courseNo`,
    `courseName`, and `creditValue` attributes. Filling in the attribute values for
    these four objects, as shown in Table [10-3](#78624_3_En_10_Chapter.xhtml#Tab3),
    we see that there is quite a bit of repetition in the attribute values across
    these four objects: we’ve repeated the same `courseNo`, `courseName`, and `creditValue`
    attribute values four times. That’s because the information contained within a
    `Course` object is common to, and hence describes, numerous `Section` objects.


    **Table 10-3** Duplication of Data Across Four Object Instances


    | Attribute Name | Attribute Values for the Course Object |

    | --- | --- |

    | `courseName` | Beginning Object Concepts |

    | `courseNo` | OBJECTS 101 |

    | `creditValue` | 3 |


    | Attribute Name | Attr. Values for Section Object #1 | Attr. Values for Section
    Object #2 | Attr. Values for Section Object #3 |

    | --- | --- | --- | --- |

    | `courseName` | Beginning Object Concepts | Beginning Object Concepts | Beginning
    Object Concepts |

    | `courseNo` | OBJECTS 101 | OBJECTS 101 | OBJECTS 101 |

    | `creditValue` | 3 | 3 | 3 |

    | `studentsRegistered` | (To be determined) | (To be determined) | (To be determined)
    |

    | `instructor` | Reference to professor X | Reference to professor Y | Reference
    to professor Z |

    | `semesterOffered` | Spring 2025 | Spring 2025 | Spring 2025 |

    | `dayOfWeek` | Monday | Tuesday | Thursday |

    | `timeOfDay` | 7:00 p.m. | 4:00 p.m. | 6:00 p.m. |

    | `classroom` | Hall A, Room 123 | Hall B, Room 234 | Hall A, Room 345 |


    To reduce redundancy and to promote encapsulation, we should eliminate inheritance
    of these attributes and instead create only one instance of a `Course` object
    for *n* instances of its related `Section` objects. We can then have each `Section`
    object maintain a handle on the common `Course` object so as to retrieve these
    shared values whenever necessary. This is precisely what we’ve modeled via the
    one-to-many *offered as* association.


    Whenever an instance of some class `A` encapsulates information that describes
    numerous instances of some other class `B` (such as `Course` does for `Section`),
    we refer to the information contained by the `A` object (`Course`) as **metadata**
    relative to the `B` objects (`Section`s).


    # Summary


    Our object model has started to take shape! We have a good idea of what the static
    structure needs to be for the SRS—the classes, their attributes, and their relationships
    with one another—and are able to communicate this knowledge in a concise, graphical
    form. There are many more embellishments to the UML notation that we haven’t covered
    in this chapter, but we’ve examined the core concepts that will suffice for most
    “industrial-strength” modeling projects.


    There is an obvious “hole” in our class diagram, however: all of our classes have
    empty operations compartments. We’ll address this deficiency by learning some
    complementary modeling techniques for determining the dynamic behavior of our
    objects in Chapter [11](#78624_3_En_11_Chapter.xhtml).


    In this chapter, you learned


    * The noun phrase analysis technique for identifying candidate domain classes

    * The verb phrase analysis technique for determining potential relationships among
    these classes

    * That coming up with candidate classes is a bit subjective and hence that we
    must remain flexible, revisiting our model numerous times until we—and our users—are
    satisfied with the outcome

    * The importance of producing a data dictionary as part of a project’s documentation
    set

    * How to graphically portray the static structure of a model as a class diagram
    using UML notation

    * The importance of having an experienced object modeling mentor available to
    a project team


    # EXERCISES


    1. Come up with a list of candidate classes for the Prescription Tracking System
    (PTS) case study presented in the Appendix, as well as an association matrix.


    2. Develop a class diagram for the PTS case study, using UML notation. Reflect
    all significant attributes and relationships among classes, including the appropriate
    multiplicity. Ideally, you should use an object modeling software tool if you
    have one available to you.


    3. Prepare a data dictionary for the PTS, to include definitions of all classes,
    attributes, and associations.


    4. Devise a list of candidate classes for the problem area whose requirements
    you defined for Exercise 3 in Chapter [1](#78624_3_En_1_Chapter.xhtml), as well
    as an association matrix.


    5. Develop a class diagram for the problem area whose requirements you defined
    for Exercise 3 in Chapter [1](#78624_3_En_1_Chapter.xhtml), using UML notation.
    Reflect all significant attributes and relationships among classes, including
    the appropriate multiplicity. Ideally, you should use an object modeling software
    tool if you have one available to you.


    6. Prepare a data dictionary for the problem area whose requirements you defined
    for Exercise 3 in Chapter [1](#78624_3_En_1_Chapter.xhtml) to include definitions
    of all classes, attributes, and associations.'
